document_id: EZK.48,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Division of the Land
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Now these are the names of the tribes: from the north end, beside the way of Hethlon to Lebo-hamath, as far as Hazar-enan, which is on the northern border of Damascus, beside Hamath, and running from the east to the west, Dan, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The holy allotment shall be for these, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: namely
    - type: text
      text: ' for the priests, toward the north 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits in length,
    - type: text
      text: ' and toward the west 10,000 in width, and toward the east 10,000 in width, and toward the south 25,000 in length; and the sanctuary of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall be in the midst of it. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: it
      children:
      - type: text
        text: It shall be
    - type: text
      text: ' for the priests who are sanctified of the sons of Zadok, who have kept My charge, and who did not go astray when the children (descendants) of Israel went astray as the [other] Levites did. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And this [land offering] shall be an allotment to them from the allotment of the land, a most holy portion beside the border of the [other] Levites. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alongside the border of the priests, the [other] Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall have
    - type: text
      text: ' 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' in length and 10,000 in width. The whole length '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' and the width 10,000. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And they shall not sell any of it or exchange it, or allow this choice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: ' of land to pass '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to others;
    - type: text
      text: ' for it is holy to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“The remaining [strip of] 5,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' in width and 25,000 in length shall be for the city’s common (secular) use, for a place in which to live and for open country. The city shall be in the midst of it. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the measurements of it: the north side 4,500 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits,
    - type: text
      text: ' the south side 4,500, the east side 4,500, and the west side 4,500. [Rev 21:16] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The city shall have open country: toward the north 250 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits,
    - type: text
      text: ' and toward the south 250, toward the east 250, and toward the west 250. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The remainder of the length alongside the holy allotment shall be 10,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' to the east and 10,000 to the west; and it shall be beside the holy allotment. The produce from it shall be food for the workers of the city. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The workers of the city, from all the tribes of Israel shall cultivate it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Beside the border of Dan, from the east side to the west side, Asher, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The whole allotment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' 25,000 by 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits;
    - type: text
      text: ' you shall set apart the holy allotment, a square, with the property of the city.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Portion for the Prince
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“The remainder, on both sides of the holy allotment and of the property possessed by the city, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall belong
    - type: text
      text: ' to the prince. In front of the 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' of the allotment toward the east border and westward in front of the 25,000 toward the west border, alongside the [tribal] portions, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it shall be
    - type: text
      text: ' for the prince. The holy allotment with the sanctuary of the temple shall be in the midst of it. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Exclusive of the property of the Levites and of the property of the city, which are in the middle of that which belongs to the prince, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: everything
    - type: text
      text: ' between the border of Judah and the border of Benjamin shall be for the prince.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Portion for Other Tribes
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“As for the rest of the tribes: from the east side to the west side, Benjamin, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Beside the border of Benjamin, from the east side to the west side, Simeon, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Beside the border of Simeon, from the east side to the west side, Issachar, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Beside the border of Issachar, from the east side to the west side, Zebulun, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Beside the border of Zebulun, from the east side to the west side, Gad, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And beside the border of Gad, at the south side, southward, the border shall extend from Tamar to the waters of Meribath-kadesh, to the Brook [of Egypt], to the Great [Mediterranean] Sea. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'This is the land which you shall divide by lot among the tribes of Israel as their inheritance, and these are their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: several
    - type: text
      text: ' portions,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The City Gates
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Beside the border of Asher, from the east side to the west side, Naphtali, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“These are the exits of the city: on the north side, [which is to extend] 4,500 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' by measurement, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'there shall also be gates of the city, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: named
    - type: text
      text: ' after the names of the tribes of Israel, three gates toward the north: one gate of Reuben, one gate of Judah, one gate of Levi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'On the east side, 4,500 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits,
    - type: text
      text: ' also three gates: one gate of Joseph, one gate of Benjamin, one gate of Dan. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'On the south side, 4,500 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits,
    - type: text
      text: ' by measurement, also three gates: one gate of Simeon, one gate of Issachar, one gate of Zebulun. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'On the west side, 4,500 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits,
    - type: text
      text: ' three gates: one gate of Gad, one gate of Asher, one gate of Naphtali. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'The distance around the city shall be 18,000 (4 x 4,500) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits;
    - type: text
      text: ' and the name of the city from that day [and ever after] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be,
    - type: text
      text: ' ‘The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is There.’ ” [Rev 21:12, 13, 16]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Beside the border of Naphtali, from the east side to the west side, Manasseh, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Beside the border of Manasseh, from the east side to the west side, Ephraim, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Beside the border of Ephraim, from the east side to the west side, Reuben, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Beside the border of Reuben, from the east side to the west side, Judah, one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“And beside the border of Judah, from the east side to the west side, shall be the allotment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contribution of land which you shall set apart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offer, 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' in width, and in length like one of the [tribal] portions, from the east side to the west side; and the sanctuary shall be in the midst of it. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The allotment [of land] that you shall set apart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offer to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' in length and 10,000 in width.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Portion for the Priests
    marker-yv: yv-h
