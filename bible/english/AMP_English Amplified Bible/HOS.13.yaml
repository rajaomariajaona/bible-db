document_id: HOS.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ephraim’s Idolatry
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When Ephraim spoke, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was
    - type: text
      text: ' trembling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terror.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He exalted himself [above the other tribes] in Israel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But through [the worship of] Baal he became guilty and died [spiritually, and then came ruin, sealing Israel’s doom as a nation].
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where now is your king
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That he may save you [when you are attacked] in all your cities?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your judges of whom you asked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Give me a king and princes”?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I gave you a king in My anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I took him away in My wrath [as punishment].
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The wickedness of Ephraim [which is not yet completely punished] is bound up [as in a bag];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His sin is stored up [for judgment and destruction].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The pains of childbirth come on him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he is not a wise son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For it is not the time to delay [his chance at a new birth] as the womb opens [but he ignores the opportunity to change].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall I ransom them from the power of Sheol (the place of the dead)?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall I redeem them from death?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The apostle Paul brings this passage to mind—but with a change of meaning made possible by the resurrection of Christ.
      marker-yv: yv-n
    - type: text
      text: O death, where are your thorns?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Sheol, where is your sting?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Compassion is hidden from My eyes [because of their failure to repent]. [1 Cor 15:55]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶For though he flourishes among the reeds (his fellow tribes),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An east wind (Assyria) will come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The breath of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rising from the desert;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Ephraim’s spring will become dry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his fountain will be dried up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assyria will plunder his treasury of every precious object.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samaria will be found guilty [and become desolate],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because she rebelled against her God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will fall by the sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their infants will be dashed in pieces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their pregnant women will be ripped open.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now they sin more and more,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And make for themselves molten images,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Idols skillfully made from their silver [as it pleased them],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All of them the work of the craftsmen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They say of these [very works of their hands], “Let those who sacrifice kiss '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' show respect to the calves [as if they were living gods]!”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore they will be [swiftly dissipated] like the morning cloud
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or like dew which soon disappears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like chaff which swirls with the whirlwind from the threshing floor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And like smoke from the chimney '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' through the window [worthless and without substance—they will vanish].'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Yet I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have been
    - type: text
      text: ' the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since [the time you became a nation in] the land of Egypt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you were not to know any god except Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there is no savior besides Me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I knew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' regarded you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cared for you in the wilderness,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the land of drought.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they had
    - type: text
      text: ' their pasture, they became satisfied,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And being satisfied, their heart became proud (self-centered);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore they forgot Me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will be like a lion to them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Like a leopard I will watch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lie in wait [ready to attack] by the road [to Assyria].'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will encounter them like a bear robbed of her cubs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will tear open their chests;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There I will also devour them like a lioness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a wild beast would tear them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶It is your destruction, O Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you are
    - type: text
      text: ' against Me, [and have rebelled] against your help.'
