document_id: HOS.13,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Ephraim’s Idolatry
  - type: text
    content: 'When Ephraim spoke, '
  - type: text
    content: there was
  - type: text
    content: ' trembling '
  - type: text
    content: and
  - type: text
    content: ' terror.'
  - type: text
    content: He exalted himself [above the other tribes] in Israel;
  - type: text
    content: But through [the worship of] Baal he became guilty and died [spiritually, and then came ruin, sealing Israel’s doom as a nation].
  '10':
  - type: text
    content: Where now is your king
  - type: text
    content: That he may save you [when you are attacked] in all your cities?
  - type: text
    content: And your judges of whom you asked,
  - type: text
    content: “Give me a king and princes”?
  '11':
  - type: text
    content: I gave you a king in My anger,
  - type: text
    content: And I took him away in My wrath [as punishment].
  '12':
  - type: text
    content: ¶The wickedness of Ephraim [which is not yet completely punished] is bound up [as in a bag];
  - type: text
    content: His sin is stored up [for judgment and destruction].
  '13':
  - type: text
    content: The pains of childbirth come on him;
  - type: text
    content: But he is not a wise son,
  - type: text
    content: For it is not the time to delay [his chance at a new birth] as the womb opens [but he ignores the opportunity to change].
  '14':
  - type: text
    content: Shall I ransom them from the power of Sheol (the place of the dead)?
  - type: text
    content: Shall I redeem them from death?
  - type: note
    content: The apostle Paul brings this passage to mind—but with a change of meaning made possible by the resurrection of Christ.
  - type: text
    content: O death, where are your thorns?
  - type: text
    content: O Sheol, where is your sting?
  - type: text
    content: Compassion is hidden from My eyes [because of their failure to repent]. [1 Cor 15:55]
  '15':
  - type: text
    content: ¶For though he flourishes among the reeds (his fellow tribes),
  - type: text
    content: An east wind (Assyria) will come,
  - type: text
    content: The breath of the L
  - type: heading
    content: ord
  - type: text
    content: ' rising from the desert;'
  - type: text
    content: And Ephraim’s spring will become dry
  - type: text
    content: And his fountain will be dried up.
  - type: text
    content: Assyria will plunder his treasury of every precious object.
  '16':
  - type: text
    content: Samaria will be found guilty [and become desolate],
  - type: text
    content: Because she rebelled against her God;
  - type: text
    content: They will fall by the sword,
  - type: text
    content: Their infants will be dashed in pieces,
  - type: text
    content: And their pregnant women will be ripped open.
  '2':
  - type: text
    content: And now they sin more and more,
  - type: text
    content: And make for themselves molten images,
  - type: text
    content: Idols skillfully made from their silver [as it pleased them],
  - type: text
    content: All of them the work of the craftsmen.
  - type: text
    content: 'They say of these [very works of their hands], “Let those who sacrifice kiss '
  - type: text
    content: and
  - type: text
    content: ' show respect to the calves [as if they were living gods]!”'
  '3':
  - type: text
    content: Therefore they will be [swiftly dissipated] like the morning cloud
  - type: text
    content: Or like dew which soon disappears,
  - type: text
    content: Like chaff which swirls with the whirlwind from the threshing floor,
  - type: text
    content: 'And like smoke from the chimney '
  - type: text
    content: or
  - type: text
    content: ' through the window [worthless and without substance—they will vanish].'
  '4':
  - type: text
    content: '¶Yet I '
  - type: text
    content: have been
  - type: text
    content: ' the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God'
  - type: text
    content: Since [the time you became a nation in] the land of Egypt;
  - type: text
    content: And you were not to know any god except Me,
  - type: text
    content: For there is no savior besides Me.
  '5':
  - type: text
    content: 'I knew '
  - type: text
    content: and
  - type: text
    content: ' regarded you '
  - type: text
    content: and
  - type: text
    content: ' cared for you in the wilderness,'
  - type: text
    content: In the land of drought.
  '6':
  - type: text
    content: 'When '
  - type: text
    content: they had
  - type: text
    content: ' their pasture, they became satisfied,'
  - type: text
    content: And being satisfied, their heart became proud (self-centered);
  - type: text
    content: Therefore they forgot Me.
  '7':
  - type: text
    content: So I will be like a lion to them;
  - type: text
    content: 'Like a leopard I will watch '
  - type: text
    content: and
  - type: text
    content: ' lie in wait [ready to attack] by the road [to Assyria].'
  '8':
  - type: text
    content: I will encounter them like a bear robbed of her cubs,
  - type: text
    content: And I will tear open their chests;
  - type: text
    content: There I will also devour them like a lioness,
  - type: text
    content: As a wild beast would tear them.
  '9':
  - type: text
    content: ¶It is your destruction, O Israel,
  - type: text
    content: 'Because '
  - type: text
    content: you are
  - type: text
    content: ' against Me, [and have rebelled] against your help.'
