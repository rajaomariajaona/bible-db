      - type: text
        text: '.) issued a decree permitting the Jews to return home and mandating the rebuilding of the temple (Ezra 1:1-4). Some 50,000 returned (Ezra 2:64, 65) and shortly thereafter laid the foundation of the temple (Ezra 3:8-10), but when neighboring Samaritans antagonized the Jews, work on the temple stopped and the temple work lay dormant for some sixteen years. It was during the reign of Darius the Great that Haggai and Zechariah rebuked the people and admonished them to complete the temple. The people responded and the temple was completed in 516 '
