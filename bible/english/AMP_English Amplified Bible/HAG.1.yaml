  - type: note
    content: The people of Judah had completed seventy years of captivity in Babylon (Jer 25:11, 12; Dan 9:2). In October 539 b.c., the Medes and Persians conquered Babylon, whereupon Cyrus the Great (founder of the Persian Empire, his reign extended from 559-529 b.c.) issued a decree permitting the Jews to return home and mandating the rebuilding of the temple (Ezra 1:1-4). Some 50,000 returned (Ezra 2:64, 65) and shortly thereafter laid the foundation of the temple (Ezra 3:8-10), but when neighboring Samaritans antagonized the Jews, work on the temple stopped and the temple work lay dormant for some sixteen years. It was during the reign of Darius the Great that Haggai and Zechariah rebuked the people and admonished them to complete the temple. The people responded and the temple was completed in 516 b.c.
  - type: text
