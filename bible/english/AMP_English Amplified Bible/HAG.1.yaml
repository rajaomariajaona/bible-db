  - type: text
    content: 'In the second year of '
  - type: note
    content: Darius the Great ruled Persia (capital city, Persepolis) from 522-486 b.c. He was an avid builder who used paid workers for his projects instead of slaves, a concept which at that time was revolutionary. He was a gifted visionary, and an energetic king whose social and economic goals endured and greatly benefited both his subjects and future generations. He developed efficient highways, standardized coinage, weights, measures, and he promoted religious tolerance and human rights.
