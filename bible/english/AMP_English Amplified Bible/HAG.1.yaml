    - type: text
      text: away
  - type: text
    text: . Why?” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts. “Because of My house, which lies in ruins while each of you runs to his own house [eager to enjoy it]. '
  - type: usfm
