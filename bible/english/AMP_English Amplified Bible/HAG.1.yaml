  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I called for a drought on the land and the hill country, on the grain, on the new wine, on the oil, on what the ground produces, on men, on cattle, and on all the labor of your hands.”
