document_id: EXO.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Curtains of Linen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Moreover, you shall make the tabernacle (sacred tent of worship) with ten [interior] curtains of fine twisted linen, and blue, purple, and scarlet fabric; you shall make them with [embroidered] cherubim, the handwork of a skillful craftsman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The length of each curtain shall be twenty-eight cubits, and the width of each curtain four cubits; all of the curtains shall measure the same. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The five curtains shall be joined to one another, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the other
  - type: text
    text: ' five curtains shall be joined to one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You shall make loops of blue on the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: outer
  - type: text
    text: ' edge of the last curtain in the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: first
  - type: text
    text: ' set, and likewise in the second set. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'You shall make fifty loops on the one curtain, and fifty loops on the edge of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: last
  - type: text
    text: ' curtain that is in the second set. The loops on one curtain correspond to the loops on the other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You shall make fifty gold hooks, and fasten the curtains together with the hooks; and the tabernacle shall be one unit.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Curtains of Goats’ Hair
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Then you shall make [exterior] curtains of goats’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hair
  - type: text
    text: ' as a tent over the tabernacle. You shall make eleven curtains in all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Each curtain shall be thirty cubits long and four cubits wide. The eleven curtains shall all measure the same. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'You shall join five curtains by themselves and the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' six curtains by themselves, and you shall double over the sixth curtain at the front of the tent [to make a closed door]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Make fifty loops on the edge of the outermost curtain in the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: first
  - type: text
    text: ' set, and fifty loops on the edge of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: outermost
  - type: text
    text: ' curtain in the second set.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“You shall make fifty bronze hooks and put the hooks into the loops and join the tent together so that it may be one unit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The overlapping part that is left over from the tent curtains, the half curtain that is left over, shall lap over the back of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The cubit on one side and the cubit on the other, of what is left over in the length of the curtains of the tent shall lap over the sides of the tabernacle on one side and the other side, to cover it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You shall make a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: third
  - type: text
    text: ' covering for the tent of rams’ '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Similar to morocco leather.
    marker-yv: yv-n
  - type: text
    text: 'skins dyed red, and a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fourth
  - type: text
    text: ' covering above that of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hebrew uncertain.
    marker-yv: yv-n
  - type: text
    text: porpoise skins.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Boards and Sockets
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Then you shall make the boards for the tabernacle of acacia wood, standing upright [as a trellis-like frame]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The length of each board shall be ten cubits and the width of each board shall be one and a half cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Make two dovetails in each board for fitting [them] together; you shall do the same for all the tabernacle boards. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'You shall make the boards for the tabernacle [in the following quantities]: twenty boards for the south side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You shall make forty silver sockets under the twenty boards, two sockets under each board for its two dovetails, and two sockets under another board for its two dovetails; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'for the north side of the tabernacle there shall be twenty boards, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and their forty silver sockets, two sockets under each board. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For the back or west side of the tabernacle you shall make six boards. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Make two boards for the corners of the tabernacle at the rear [on both sides]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They shall be joined together underneath, and joined together on top with one ring. So shall it be for both of them; they shall form the two [rear] corners. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: There shall be eight boards and sixteen silver sockets; two sockets under each board.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Then you shall make [fifteen] bars of acacia wood: five for the boards of one side of the tabernacle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and five bars for the boards of the other side of the tabernacle, and five bars for the boards of the rear end of the tabernacle, for the back wall toward the west. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And the middle bar in the center of the boards shall pass through [horizontally] from end to end. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'You shall overlay the boards with gold and make their rings of gold to hold the bars. You shall overlay the bars with gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: You shall erect the tabernacle according to its plan [the direction corresponding to its meaning and purpose] which has been shown to you on the mountain.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Veil and Screen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“You shall make a veil [to divide the two rooms] of blue, purple, and scarlet fabric and fine twisted linen, skillfully worked with cherubim on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'You shall hang it on four pillars (support poles) of acacia wood overlaid with gold, with gold hooks, on four silver sockets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'You shall hang the veil from the hooks [that connect the curtains together], and you shall bring the ark of the Testimony there within the veil. The veil shall separate for you the Holy Place and the Holy of Holies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'You shall put the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 25:17.
    marker-yv: yv-n
  - type: text
    text: 'mercy seat on the ark of the Testimony in the Holy of Holies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: You shall set the table [for the bread] outside the veil [in the Holy Place] on the north side, and the lampstand opposite the table on the south side of the tabernacle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“You shall make a screen [to provide a covering] for the doorway of the tent of blue, purple, and scarlet fabric and finely woven [embroidered] linen, the work of an embroiderer. [John 10:9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: You shall make five pillars (support poles) of acacia wood to support the hanging curtain and overlay them with gold. Their hooks shall be of gold, and you shall cast five [base] sockets of bronze for them.
