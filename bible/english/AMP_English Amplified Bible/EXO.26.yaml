document_id: EXO.26,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Curtains of Linen
  - type: text
    content: '“Moreover, you shall make the tabernacle (sacred tent of worship) with ten [interior] curtains of fine twisted linen, and blue, purple, and scarlet fabric; you shall make them with [embroidered] cherubim, the handwork of a skillful craftsman. '
  '10':
  - type: text
    content: 'Make fifty loops on the edge of the outermost curtain in the '
  - type: text
    content: first
  - type: text
    content: ' set, and fifty loops on the edge of the '
  - type: text
    content: outermost
  - type: text
    content: ' curtain in the second set.'
  '11':
  - type: text
    content: '“You shall make fifty bronze hooks and put the hooks into the loops and join the tent together so that it may be one unit. '
  '12':
  - type: text
    content: 'The overlapping part that is left over from the tent curtains, the half curtain that is left over, shall lap over the back of the tabernacle. '
  '13':
  - type: text
    content: 'The cubit on one side and the cubit on the other, of what is left over in the length of the curtains of the tent shall lap over the sides of the tabernacle on one side and the other side, to cover it. '
  '14':
  - type: text
    content: 'You shall make a '
  - type: text
    content: third
  - type: text
    content: ' covering for the tent of rams’ '
  - type: note
    content: Similar to morocco leather.
  - type: text
    content: 'skins dyed red, and a '
  - type: text
    content: fourth
  - type: text
    content: ' covering above that of '
  - type: note
    content: Hebrew uncertain.
  - type: text
    content: porpoise skins.
  - type: heading
    content: Boards and Sockets
  '15':
  - type: text
    content: '“Then you shall make the boards for the tabernacle of acacia wood, standing upright [as a trellis-like frame]. '
  '16':
  - type: text
    content: 'The length of each board shall be ten cubits and the width of each board shall be one and a half cubits. '
  '17':
  - type: text
    content: 'Make two dovetails in each board for fitting [them] together; you shall do the same for all the tabernacle boards. '
  '18':
  - type: text
    content: 'You shall make the boards for the tabernacle [in the following quantities]: twenty boards for the south side. '
  '19':
  - type: text
    content: 'You shall make forty silver sockets under the twenty boards, two sockets under each board for its two dovetails, and two sockets under another board for its two dovetails; '
  '2':
  - type: text
    content: 'The length of each curtain shall be twenty-eight cubits, and the width of each curtain four cubits; all of the curtains shall measure the same. '
  '20':
  - type: text
    content: 'for the north side of the tabernacle there shall be twenty boards, '
  '21':
  - type: text
    content: 'and their forty silver sockets, two sockets under each board. '
  '22':
  - type: text
    content: 'For the back or west side of the tabernacle you shall make six boards. '
  '23':
  - type: text
    content: 'Make two boards for the corners of the tabernacle at the rear [on both sides]. '
  '24':
  - type: text
    content: 'They shall be joined together underneath, and joined together on top with one ring. So shall it be for both of them; they shall form the two [rear] corners. '
  '25':
  - type: text
    content: There shall be eight boards and sixteen silver sockets; two sockets under each board.
  '26':
  - type: text
    content: '“Then you shall make [fifteen] bars of acacia wood: five for the boards of one side of the tabernacle, '
  '27':
  - type: text
    content: 'and five bars for the boards of the other side of the tabernacle, and five bars for the boards of the rear end of the tabernacle, for the back wall toward the west. '
  '28':
  - type: text
    content: 'And the middle bar in the center of the boards shall pass through [horizontally] from end to end. '
  '29':
  - type: text
    content: 'You shall overlay the boards with gold and make their rings of gold to hold the bars. You shall overlay the bars with gold. '
  '3':
  - type: text
    content: 'The five curtains shall be joined to one another, and '
  - type: text
    content: the other
  - type: text
    content: ' five curtains shall be joined to one another. '
  '30':
  - type: text
    content: You shall erect the tabernacle according to its plan [the direction corresponding to its meaning and purpose] which has been shown to you on the mountain.
  - type: heading
    content: The Veil and Screen
  '31':
  - type: text
    content: '“You shall make a veil [to divide the two rooms] of blue, purple, and scarlet fabric and fine twisted linen, skillfully worked with cherubim on it. '
  '32':
  - type: text
    content: 'You shall hang it on four pillars (support poles) of acacia wood overlaid with gold, with gold hooks, on four silver sockets. '
  '33':
  - type: text
    content: 'You shall hang the veil from the hooks [that connect the curtains together], and you shall bring the ark of the Testimony there within the veil. The veil shall separate for you the Holy Place and the Holy of Holies. '
  '34':
  - type: text
    content: 'You shall put the '
  - type: note
    content: See note 25:17.
  - type: text
    content: 'mercy seat on the ark of the Testimony in the Holy of Holies. '
  '35':
  - type: text
    content: You shall set the table [for the bread] outside the veil [in the Holy Place] on the north side, and the lampstand opposite the table on the south side of the tabernacle.
  '36':
  - type: text
    content: '“You shall make a screen [to provide a covering] for the doorway of the tent of blue, purple, and scarlet fabric and finely woven [embroidered] linen, the work of an embroiderer. [John 10:9] '
  '37':
  - type: text
    content: You shall make five pillars (support poles) of acacia wood to support the hanging curtain and overlay them with gold. Their hooks shall be of gold, and you shall cast five [base] sockets of bronze for them.
  '4':
  - type: text
    content: 'You shall make loops of blue on the '
  - type: text
    content: outer
  - type: text
    content: ' edge of the last curtain in the '
  - type: text
    content: first
  - type: text
    content: ' set, and likewise in the second set. '
  '5':
  - type: text
    content: 'You shall make fifty loops on the one curtain, and fifty loops on the edge of the '
  - type: text
    content: last
  - type: text
    content: ' curtain that is in the second set. The loops on one curtain correspond to the loops on the other. '
  '6':
  - type: text
    content: You shall make fifty gold hooks, and fasten the curtains together with the hooks; and the tabernacle shall be one unit.
  - type: heading
    content: Curtains of Goats’ Hair
  '7':
  - type: text
    content: '“Then you shall make [exterior] curtains of goats’ '
  - type: text
    content: hair
  - type: text
    content: ' as a tent over the tabernacle. You shall make eleven curtains in all. '
  '8':
  - type: text
    content: 'Each curtain shall be thirty cubits long and four cubits wide. The eleven curtains shall all measure the same. '
  '9':
  - type: text
    content: 'You shall join five curtains by themselves and the '
  - type: text
    content: other
  - type: text
    content: ' six curtains by themselves, and you shall double over the sixth curtain at the front of the tent [to make a closed door]. '
