document_id: DEU.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Rewards of Obedience
  - type: text
    content: “Therefore you shall love the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, and always keep His charge, His statutes, His precepts, and His commandments [it is your obligation to Him]. '
  '10':
  - type: text
    content: 'For the land which you are entering to possess is not like the land of Egypt from which you have come, where you sowed your seed and watered '
  - type: note
    content: Egyptian crops were watered by irrigation, so this may refer to a simple irrigation device that was operated by the foot, or to the practice of opening and closing small water channels with the foot.
  - type: text
    content: 'it with your foot like a garden of vegetables. '
  '11':
  - type: text
    content: 'But the land into which you are about to cross to possess, a land of hills and valleys, drinks water from the rain of heaven, '
  '12':
  - type: text
    content: a land for which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God cares; the eyes of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God are always on it, from the beginning of the year to the end of the year.'
  '13':
  - type: text
    content: '“It shall come about, if you listen obediently '
  - type: text
    content: and
  - type: text
    content: ' pay attention to My commandments which I command you today—to love the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God and to serve Him with all your heart and with all your soul [your choices, your thoughts, your whole being]— '
  '14':
  - type: text
    content: 'that '
  - type: note
    content: So some ancient versions; MT reads I.
  - type: text
    content: 'He will give the rain for your land in its season, the early [fall] rain and the late [spring] rain, so that you may gather in your grain and your new wine and your [olive] oil. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: So some ancient versions; MT reads I.
  - type: text
    content: 'He will give grass in your fields for your cattle, and you will eat and be satisfied. '
  '16':
  - type: text
    content: Beware that your hearts are not deceived, and that you do not turn away [from the L
  - type: heading
    content: ord
  - type: text
    content: '] and serve other gods and worship them, '
  '17':
  - type: text
    content: or [else] the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' anger will be kindled '
  - type: text
    content: and
  - type: text
    content: ' burn against you, and He will shut up the heavens so that there will be no rain and the land will not yield its fruit; and you will perish quickly from the good land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' is giving you.'
  '18':
  - type: text
    content: '“Therefore, you shall impress these words of mine on your heart and on your soul, and tie them as a sign on your hand, and they shall be as '
  - type: note
    content: See note 6:8.
  - type: text
    content: 'bands (frontals, frontlets) on your forehead. '
  '19':
  - type: text
    content: 'You shall teach them [diligently] to your '
  - type: note
    content: Lit sons, also v 21.
  - type: text
    content: 'children [impressing God’s precepts on their minds and penetrating their hearts with His truths], speaking of them when you sit in your house and when you walk along the road and when you lie down and when you rise up. '
  '2':
  - type: text
    content: 'Know this day that I am not '
  - type: text
    content: speaking
  - type: text
    content: ' to your children who have not known [by personal experience] and who have not seen [firsthand] the instruction '
  - type: text
    content: and
  - type: text
    content: ' discipline of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God—His greatness, His mighty hand and His outstretched arm; '
  '20':
  - type: text
    content: 'You shall write them on the '
  - type: note
    content: See note 6:9.
  - type: text
    content: 'doorposts of your house and on your gates, '
  '21':
  - type: text
    content: so that your days and the days of your children may be multiplied in the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' swore to your fathers to give them, as '
  - type: note
    content: Lit the days of.
  - type: text
    content: 'long as the heavens are above the earth. '
  '22':
  - type: text
    content: For if you are careful to keep all this commandment which I am commanding you to do, to love the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, to walk [that is, to live each and every day] in all His ways and to hold tightly to Him— '
  '23':
  - type: text
    content: then the L
  - type: heading
    content: ord
  - type: text
    content: ' will drive out all these nations from before you, and you shall dispossess nations greater and mightier than you. '
  '24':
  - type: text
    content: 'Every place on which the sole of your foot treads shall become yours; your territory shall be from the wilderness to Lebanon, and from the river, the river Euphrates, as far as the western sea (the Mediterranean). '
  '25':
  - type: text
    content: No man will be able to stand before you; the L
  - type: heading
    content: ord
  - type: text
    content: ' your God will lay the fear and the dread of you on all the land on which you set foot, just as He has spoken to you.'
  '26':
  - type: text
    content: '“Behold, today I am setting before you a blessing and a curse— '
  '27':
  - type: text
    content: 'the blessing, if you listen to '
  - type: text
    content: and
  - type: text
    content: ' obey the commandments of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, which I am commanding you today; '
  '28':
  - type: text
    content: 'and the curse, if you do not listen to '
  - type: text
    content: and
  - type: text
    content: ' obey the commandments of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, but turn aside from the way which I am commanding you today, by following (acknowledging, worshiping) other gods which you have not known.'
  '29':
  - type: text
    content: “It shall come about, when the L
  - type: heading
    content: ord
  - type: text
    content: ' your God brings you into the land which you are entering to possess, that you shall place the blessing on Mount Gerizim and the curse on Mount Ebal. [Josh 8:30-35] '
  '3':
  - type: text
    content: 'and His signs and His works which He did in the midst of Egypt to Pharaoh the king of Egypt and to all his land; '
  '30':
  - type: text
    content: 'Are they not across the Jordan, west of the road, toward the sunset, in the land of the Canaanites who live in the Arabah, opposite Gilgal, beside the oaks of Moreh? '
  '31':
  - type: text
    content: For you are about to cross the Jordan to go in to possess the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you, and you shall possess it and live in it, '
  '32':
  - type: text
    content: and you shall be careful to do all the statutes and the judgments which I am setting before you today.
  '4':
  - type: text
    content: 'and what He did to the army of Egypt, to its horses and its chariots, when He made the water of the '
  - type: note
    content: Lit Sea of Reeds.
  - type: text
    content: Red Sea engulf them as they pursued you, and how the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: note
    content: Lit to this day.
  - type: text
    content: 'completely destroyed them; '
  '5':
  - type: text
    content: 'and what He did to you in the wilderness until you came to this place; '
  '6':
  - type: text
    content: 'and what He did to Dathan and Abiram, the sons of Eliab, the son of Reuben, when the earth opened its mouth and swallowed them, their households, their tents, and every living thing that '
  - type: note
    content: Lit was at their feet.
  - type: text
    content: 'followed them, in the midst of all Israel. [Num 26:9, 10] '
  '7':
  - type: text
    content: For your eyes have seen all the great work of the L
  - type: heading
    content: ord
  - type: text
    content: ' which He did.'
  '8':
  - type: text
    content: '“Therefore, you shall keep all the commandments which I am commanding you today, so that you may be strong and go in and take possession of the land which you are crossing over [the Jordan] to possess; '
  '9':
  - type: text
    content: so that you may live long on the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' swore (solemnly promised) to your fathers to give to them and to their descendants, a land [of great abundance,] '
  - type: note
    content: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
  - type: text
    content: 'flowing with milk and honey. '
