document_id: DEU.11,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rewards of Obedience
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Therefore you shall love the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, and always keep His charge, His statutes, His precepts, and His commandments [it is your obligation to Him]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the land which you are entering to possess is not like the land of Egypt from which you have come, where you sowed your seed and watered '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Egyptian crops were watered by irrigation, so this may refer to a simple irrigation device that was operated by the foot, or to the practice of opening and closing small water channels with the foot.
      marker-yv: yv-n
    - type: text
      text: 'it with your foot like a garden of vegetables. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the land into which you are about to cross to possess, a land of hills and valleys, drinks water from the rain of heaven, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: a land for which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God cares; the eyes of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God are always on it, from the beginning of the year to the end of the year.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“It shall come about, if you listen obediently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay attention to My commandments which I command you today—to love the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God and to serve Him with all your heart and with all your soul [your choices, your thoughts, your whole being]— '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So some ancient versions; MT reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: I
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'He will give the rain for your land in its season, the early [fall] rain and the late [spring] rain, so that you may gather in your grain and your new wine and your [olive] oil. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So some ancient versions; MT reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: I
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'He will give grass in your fields for your cattle, and you will eat and be satisfied. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Beware that your hearts are not deceived, and that you do not turn away [from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] and serve other gods and worship them, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: or [else] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' anger will be kindled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' burn against you, and He will shut up the heavens so that there will be no rain and the land will not yield its fruit; and you will perish quickly from the good land which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is giving you.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, you shall impress these words of mine on your heart and on your soul, and tie them as a sign on your hand, and they shall be as '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 6:8.
      marker-yv: yv-n
    - type: text
      text: 'bands (frontals, frontlets) on your forehead. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall teach them [diligently] to your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons,
        - type: text
          text: ' also v 21.'
      marker-yv: yv-n
    - type: text
      text: 'children [impressing God’s precepts on their minds and penetrating their hearts with His truths], speaking of them when you sit in your house and when you walk along the road and when you lie down and when you rise up. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Know this day that I am not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: speaking
    - type: text
      text: ' to your children who have not known [by personal experience] and who have not seen [firsthand] the instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God—His greatness, His mighty hand and His outstretched arm; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall write them on the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 6:9.
      marker-yv: yv-n
    - type: text
      text: 'doorposts of your house and on your gates, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so that your days and the days of your children may be multiplied in the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' swore to your fathers to give them, as '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the days of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'long as the heavens are above the earth. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For if you are careful to keep all this commandment which I am commanding you to do, to love the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, to walk [that is, to live each and every day] in all His ways and to hold tightly to Him— '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will drive out all these nations from before you, and you shall dispossess nations greater and mightier than you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every place on which the sole of your foot treads shall become yours; your territory shall be from the wilderness to Lebanon, and from the river, the river Euphrates, as far as the western sea (the Mediterranean). '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No man will be able to stand before you; the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God will lay the fear and the dread of you on all the land on which you set foot, just as He has spoken to you.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Behold, today I am setting before you a blessing and a curse— '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the blessing, if you listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey the commandments of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, which I am commanding you today; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the curse, if you do not listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey the commandments of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, but turn aside from the way which I am commanding you today, by following (acknowledging, worshiping) other gods which you have not known.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “It shall come about, when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God brings you into the land which you are entering to possess, that you shall place the blessing on Mount Gerizim and the curse on Mount Ebal. [Josh 8:30-35] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and His signs and His works which He did in the midst of Egypt to Pharaoh the king of Egypt and to all his land; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are they not across the Jordan, west of the road, toward the sunset, in the land of the Canaanites who live in the Arabah, opposite Gilgal, beside the oaks of Moreh? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For you are about to cross the Jordan to go in to possess the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is giving you, and you shall possess it and live in it, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and you shall be careful to do all the statutes and the judgments which I am setting before you today.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and what He did to the army of Egypt, to its horses and its chariots, when He made the water of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Sea of Reeds
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Red Sea engulf them as they pursued you, and how the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to this day
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'completely destroyed them; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and what He did to you in the wilderness until you came to this place; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and what He did to Dathan and Abiram, the sons of Eliab, the son of Reuben, when the earth opened its mouth and swallowed them, their households, their tents, and every living thing that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: was at their feet.
      marker-yv: yv-n
    - type: text
      text: 'followed them, in the midst of all Israel. [Num 26:9, 10] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For your eyes have seen all the great work of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He did.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, you shall keep all the commandments which I am commanding you today, so that you may be strong and go in and take possession of the land which you are crossing over [the Jordan] to possess; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so that you may live long on the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' swore (solemnly promised) to your fathers to give to them and to their descendants, a land [of great abundance,] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
      marker-yv: yv-n
    - type: text
      text: 'flowing with milk and honey. '
