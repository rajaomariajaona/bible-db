document_id: ISA.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Will Remove the Leaders
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen carefully, the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts is removing from Jerusalem and from Judah'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Both supply and support, the whole supply of bread
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the whole supply of water;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The brave man and the warrior [He is also removing],
- type: usfm
  marker: q1
  children:
  - type: text
    text: The judge and the prophet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The diviner and the elder,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The captain of fifty and the man of honor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The counselor and the expert artisan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the skillful enchanter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And I will make '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mere
  - type: text
    text: ' boys their princes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And capricious (impulsive, unpredictable) children will rule over them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And the people will be oppressed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each one by another, and each one by his neighbor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The boy will be arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insolent toward the elder'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the vulgar (common) toward the honorable [person of rank].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When a man takes hold of his brother in the house of his father, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“You have a robe, you shall be our judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruler,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And this pile of ruins will be under your control,”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He will protest on that day, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I will not be a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: binder of wounds.
    marker-yv: yv-n
  - type: text
    text: governor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For in my house there is neither bread nor clothing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You should not make me a judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruler of the people.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For Jerusalem has stumbled and Judah has fallen,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because their words and their actions are against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To rebel against His glorious presence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defiantly provoke Him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Their partiality testifies against them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They display their sin like Sodom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They do not even hide it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Woe (judgment is coming) to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: their soul
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: them!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they have brought evil on themselves [as a reward].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Say to the righteous that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it will go
  - type: text
    text: ' well with them,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they will eat the fruit of their [righteous] actions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Woe (judgment is coming) to the wicked! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: It shall go
  - type: text
    text: ' badly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For what his hand has done shall be done to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: O My people! Children are their oppressors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And women rule over them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O My people! Your leaders lead you astray
- type: usfm
  marker: q1
  children:
  - type: text
    text: And confuse (destroy, swallow up) the direction of your paths.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Will Judge
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' rises to contend,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And stands to judge the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' enters into judgment with the elders of His people and their princes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For it is you who have devoured the vineyard [with your oppression, you have robbed the people and ruined the country];
- type: usfm
  marker: q1
  children:
  - type: text
    text: The plunder of the poor is in your houses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “What do you mean by crushing My people
- type: usfm
  marker: q1
  children:
  - type: text
    text: And grinding the face of the poor?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Declares the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judah’s Women Denounced
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶Moreover, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, “Because the daughters of Zion are proud'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And walk with outstretched necks and seductive (flirtatious, alluring) eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And trip along with mincing steps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an affected gait'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And walk with jingling '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Decorative chains attached from one ankle to the other to insure a measured gait.
    marker-yv: yv-n
  - type: text
    text: anklets on their feet,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Therefore the Lord will afflict the crown of the head of the daughters of Zion with scabs [making them bald],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will expose their foreheads (send them into captivity).”'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'In that day the Lord will take away the beauty of their anklets, [braided] caps, crescent [head] ornaments, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dangling earrings, bracelets, and the hanging veils '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scarves, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'head wraps (turbans), [short, jingling] ankle chains, sashes, perfume boxes, amulets (charms), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'signet [finger] rings, nose rings, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'festival robes, outer tunics, shawls, handbags, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: hand mirrors, [fine linen] undergarments, headbands, and veils [covering the entire body].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Now it will come to pass that instead of the sweet fragrance of spices there will be [the stench of] rottenness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instead of a belt, a rope;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instead of well-set hair, baldness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instead of fine clothes, a robe of sackcloth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And branding [of captives by the scorching heat] instead of beauty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Your men will fall by the sword
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your mighty men in battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And Jerusalem’s gates will lament (cry out in grief) and mourn [as those who wail for the dead];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And she, being ruined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolate, will sit upon the ground.'
