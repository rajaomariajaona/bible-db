  '1':
  - type: heading
    content: God Will Remove the Leaders
  - type: text
    content: Listen carefully, the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts is removing from Jerusalem and from Judah'
  - type: text
    content: Both supply and support, the whole supply of bread
  - type: text
    content: And the whole supply of water;
  '10':
  - type: text
    content: 'Say to the righteous that '
  - type: text
    content: it will go
  - type: text
    content: ' well with them,'
  - type: text
    content: For they will eat the fruit of their [righteous] actions.
  '11':
  - type: text
    content: 'Woe (judgment is coming) to the wicked! '
  - type: text
    content: It shall go
  - type: text
    content: ' badly '
  - type: text
    content: with him,
  - type: text
    content: For what his hand has done shall be done to him.
  '12':
  - type: text
    content: O My people! Children are their oppressors,
  - type: text
    content: And women rule over them.
  - type: text
    content: O My people! Your leaders lead you astray
  - type: text
    content: And confuse (destroy, swallow up) the direction of your paths.
  - type: heading
    content: God Will Judge
  '13':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' rises to contend,'
  - type: text
    content: And stands to judge the people.
  '14':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' enters into judgment with the elders of His people and their princes,'
  - type: text
    content: “For it is you who have devoured the vineyard [with your oppression, you have robbed the people and ruined the country];
  - type: text
    content: The plunder of the poor is in your houses.
  '15':
  - type: text
    content: “What do you mean by crushing My people
  - type: text
    content: And grinding the face of the poor?”
  - type: text
    content: Declares the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts.'
  - type: heading
    content: Judah’s Women Denounced
  '16':
  - type: text
    content: ¶Moreover, the L
  - type: heading
    content: ord
  - type: text
    content: ' said, “Because the daughters of Zion are proud'
  - type: text
    content: And walk with outstretched necks and seductive (flirtatious, alluring) eyes,
  - type: text
    content: 'And trip along with mincing steps '
  - type: text
    content: and
  - type: text
    content: ' an affected gait'
  - type: text
    content: 'And walk with jingling '
  - type: note
    content: Decorative chains attached from one ankle to the other to insure a measured gait.
  - type: text
    content: anklets on their feet,
  '17':
  - type: text
    content: Therefore the Lord will afflict the crown of the head of the daughters of Zion with scabs [making them bald],
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' will expose their foreheads (send them into captivity).”'
  '18':
  - type: text
    content: 'In that day the Lord will take away the beauty of their anklets, [braided] caps, crescent [head] ornaments, '
  '19':
  - type: text
    content: 'dangling earrings, bracelets, and the hanging veils '
  - type: text
    content: and
  - type: text
    content: ' scarves, '
  '2':
  - type: text
    content: The brave man and the warrior [He is also removing],
  - type: text
    content: The judge and the prophet,
  - type: text
    content: The diviner and the elder,
  '20':
  - type: text
    content: 'head wraps (turbans), [short, jingling] ankle chains, sashes, perfume boxes, amulets (charms), '
  '21':
  - type: text
    content: 'signet [finger] rings, nose rings, '
  '22':
  - type: text
    content: 'festival robes, outer tunics, shawls, handbags, '
  '23':
  - type: text
    content: hand mirrors, [fine linen] undergarments, headbands, and veils [covering the entire body].
  '24':
  - type: text
    content: Now it will come to pass that instead of the sweet fragrance of spices there will be [the stench of] rottenness;
  - type: text
    content: Instead of a belt, a rope;
  - type: text
    content: Instead of well-set hair, baldness;
  - type: text
    content: Instead of fine clothes, a robe of sackcloth;
  - type: text
    content: And branding [of captives by the scorching heat] instead of beauty.
  '25':
  - type: text
    content: Your men will fall by the sword
  - type: text
    content: And your mighty men in battle.
  '26':
  - type: text
    content: And Jerusalem’s gates will lament (cry out in grief) and mourn [as those who wail for the dead];
  - type: text
    content: 'And she, being ruined '
  - type: text
    content: and
  - type: text
    content: ' desolate, will sit upon the ground.'
  '3':
  - type: text
    content: The captain of fifty and the man of honor,
  - type: text
    content: The counselor and the expert artisan,
  - type: text
    content: And the skillful enchanter.
  '4':
  - type: text
    content: 'And I will make '
  - type: text
    content: mere
  - type: text
    content: ' boys their princes,'
  - type: text
    content: And capricious (impulsive, unpredictable) children will rule over them.
  '5':
  - type: text
    content: And the people will be oppressed,
  - type: text
    content: Each one by another, and each one by his neighbor;
  - type: text
    content: 'The boy will be arrogant '
  - type: text
    content: and
  - type: text
    content: ' insolent toward the elder'
  - type: text
    content: And the vulgar (common) toward the honorable [person of rank].
  '6':
  - type: text
    content: 'When a man takes hold of his brother in the house of his father, '
  - type: text
    content: saying,
  - type: text
    content: '“You have a robe, you shall be our judge '
  - type: text
    content: and
  - type: text
    content: ' ruler,'
  - type: text
    content: And this pile of ruins will be under your control,”
  '7':
  - type: text
    content: He will protest on that day, saying,
  - type: text
    content: '“I will not be a '
  - type: note
    content: Or binder of wounds.
  - type: text
    content: governor;
  - type: text
    content: For in my house there is neither bread nor clothing;
  - type: text
    content: 'You should not make me a judge '
  - type: text
    content: and
  - type: text
    content: ' ruler of the people.”'
  '8':
  - type: text
    content: For Jerusalem has stumbled and Judah has fallen,
  - type: text
    content: Because their words and their actions are against the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'To rebel against His glorious presence '
  - type: text
    content: and
  - type: text
    content: ' defiantly provoke Him.'
  '9':
  - type: text
    content: Their partiality testifies against them,
  - type: text
    content: They display their sin like Sodom;
  - type: text
    content: They do not even hide it.
  - type: text
    content: 'Woe (judgment is coming) to '
  - type: note
    content: Lit their soul.
  - type: text
    content: them!
  - type: text
    content: For they have brought evil on themselves [as a reward].
