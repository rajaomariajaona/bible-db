  - type: text
    content: '“Listen carefully, I have taken from your hand the cup of staggering '
  - type: text
    content: and
  - type: text
    content: ' intoxication,'
  - type: text
    content: The cup of My wrath;
  - type: text
    content: You shall never drink it again.
  '23':
  - type: text
    content: “I will put it into the hands of your tormentors,
  - type: text
    content: Who have said to you, ‘Lie down so that we may walk over you.’
  - type: text
    content: You have even made your back like the ground
  - type: text
