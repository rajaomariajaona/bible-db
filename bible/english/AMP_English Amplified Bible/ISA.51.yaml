  - type: text
    content: How shall I comfort you?
  '2':
  - type: text
    content: “Look to Abraham your father
  - type: text
    content: And to Sarah who gave birth to you in pain;
  - type: text
    content: 'For I called him when '
  - type: text
    content: he was but
  - type: text
    content: ' one,'
  - type: text
    content: Then I blessed him and made him many.”
  '20':
  - type: text
    content: Your sons have fainted;
  - type: text
    content: 'They lie '
  - type: text
    content: helpless
  - type: text
    content: ' at the head of every street,'
  - type: text
