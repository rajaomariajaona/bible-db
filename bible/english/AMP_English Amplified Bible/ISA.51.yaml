  - type: text
    content: 'And I will quickly '
  - type: text
    content: establish
  - type: text
    content: ' My justice as a light to the peoples.'
  '5':
  - type: text
    content: “My righteousness (justice) is near, My salvation has gone forth,
  - type: text
