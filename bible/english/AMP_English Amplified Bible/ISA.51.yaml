  '12':
  - type: text
    content: ¶“I, even I, am He who comforts you.
  - type: text
    content: Who are you that you are afraid of man who dies
  - type: text
    content: And of a son of man who is made [as destructible] as grass,
  '13':
  - type: text
    content: That you have forgotten the L
  - type: heading
    content: ord
  - type: text
