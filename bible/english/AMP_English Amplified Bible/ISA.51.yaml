document_id: ISA.51
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel Exhorted
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Listen to Me, you who pursue righteousness (right standing with God),
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inquire of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look to the rock from which you were cut
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to the excavation of the quarry from which you were dug.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Look to Abraham your father
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to Sarah who gave birth to you in pain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For I called him when '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he was but
  - type: text
    text: ' one,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I blessed him and made him many.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will comfort Zion [in her captivity];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will comfort all her ruins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will make her wilderness like Eden,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And her desert like the garden of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Joy and gladness will be found in her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thanksgiving and the voice of a melody.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶“Listen carefully to Me [says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '], O My people,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And hear Me, O My nation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For a [divine] law will go forth from Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will quickly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: establish
  - type: text
    text: ' My justice as a light to the peoples.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “My righteousness (justice) is near, My salvation has gone forth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My arms will judge the peoples;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands will wait for Me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they will wait with hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident expectation for My arm.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Lift up your eyes to the heavens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then look to the earth beneath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the heavens will be torn to pieces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vanish like smoke,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the earth will wear out like a garment
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its inhabitants will die in like manner.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But My salvation will be forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My righteousness (justice) [and faithfully fulfilled promise] will not be broken. [Matt 24:35; Heb 1:11; 2 Pet 3:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Listen to Me, you who know righteousness (right standing with God),
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The people in whose heart is My law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruction;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do not fear the reproach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taunting of man,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor be distressed at their reviling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “For the moth will eat them like a garment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the worm will eat them like wool.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But My righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice [faithfully promised] will exist forever,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My salvation to all generations.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '¶Awake, awake, put on strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' might, O arm of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Awake as in the ancient days, as in the generations of long ago.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Was it not You who cut Rahab (Egypt) in pieces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who pierced the dragon [of Egypt]? [Is 30:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Was it not You who dried up the [Red] Sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The waters of the great deep,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who made the depths of the sea a pathway
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the redeemed to cross over?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So the redeemed of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will return'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And come with joyful shouting to Zion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everlasting joy will be on their heads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will obtain gladness and joy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And sorrow and sighing will flee away. [Rev 7:17; 21:1, 4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶“I, even I, am He who comforts you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who are you that you are afraid of man who dies
- type: usfm
  marker: q1
  children:
  - type: text
    text: And of a son of man who is made [as destructible] as grass,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: That you have forgotten the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your Maker,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who stretched out the heavens
- type: usfm
  marker: q1
  children:
  - type: text
    text: And laid the foundations of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you continually tremble with fear all day long because of the rage of the oppressor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As he takes aim to destroy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And where is the rage of the oppressor?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The [captive] exile will soon be set free, and will not die in the dungeon, nor will his food be lacking. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, who stirs up the sea so that its waves roar—the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts is His name. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I have put My words in your mouth and have covered you with the shadow of My hand, to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: plant
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: establish the [renewed] heavens and lay the foundations of the [renewed] earth, and to say to Zion (Jerusalem), ‘You are My people.’ ” [Is 65:17; 66:22; Rev 21:1]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶Wake yourself up! Wake yourself up! Stand up, O Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who have drunk at the hand of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' the cup of His wrath,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You who have drunk the cup of staggering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intoxication to the dregs [leaving only sediment].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: There is no one to guide her among all the sons she has borne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor is there anyone to take her by the hand among all the sons she has reared.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These two '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tragedies
  - type: text
    text: ' have befallen you;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who will show sympathy for you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mourn with you?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The desolation and destruction [on the land and city], famine and sword [on the inhabitants];
- type: usfm
  marker: q1
  children:
  - type: text
    text: How shall I comfort you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Your sons have fainted;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They lie '
  - type: usfm
    marker: it
    children:
    - type: text
      text: helpless
  - type: text
    text: ' at the head of every street,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like an antelope in a net,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Full [from drinking] of the wrath of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rebuke of your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ¶Therefore, now hear this, you who are afflicted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who are drunk, but not with wine [but overwhelmed by the wrath of God].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So says your Lord, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who is
  - type: text
    text: ' also your God'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who pleads the cause of His people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Listen carefully, I have taken from your hand the cup of staggering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intoxication,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The cup of My wrath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You shall never drink it again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “I will put it into the hands of your tormentors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who have said to you, ‘Lie down so that we may walk over you.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have even made your back like the ground
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like the street for those who walk over it.”
