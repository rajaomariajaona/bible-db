  - type: text
    content: There is no one to guide her among all the sons she has borne,
  - type: text
    content: Nor is there anyone to take her by the hand among all the sons she has reared.
  '19':
  - type: text
    content: 'These two '
  - type: text
    content: tragedies
  - type: text
    content: ' have befallen you;'
  - type: text
