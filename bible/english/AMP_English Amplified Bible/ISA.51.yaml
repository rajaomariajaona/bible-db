  - type: text
    content: As he takes aim to destroy?
  - type: text
    content: And where is the rage of the oppressor?
  '14':
  - type: text
    content: 'The [captive] exile will soon be set free, and will not die in the dungeon, nor will his food be lacking. '
  '15':
  - type: text
    content: For I am the L
  - type: heading
