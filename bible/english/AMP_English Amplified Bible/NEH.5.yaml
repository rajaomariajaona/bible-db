    content: Usury Abolished
  - type: text
    content: 'Now there was a great outcry of the [poorer] people and their wives against their Jewish brothers [to whom they were deeply in debt]. '
  '10':
  - type: text
    content: 'And likewise I, my brothers, and my servants are lending them money and grain. Please, let us stop [charging] this interest. [Ex 22:25] '
  '11':
  - type: text
    content: 'Please, give back to them this very day their fields, their vineyards, their olive groves, and their houses, and also a hundredth part of the money, the grain, the new wine, and the oil that you are lending them.” '
  '12':
  - type: text
    content: 'Then they said, “We will give it back and not require anything from them. We will do exactly as you say.” Then I called the priests and took an oath from them that they would act in accordance with this promise. '
