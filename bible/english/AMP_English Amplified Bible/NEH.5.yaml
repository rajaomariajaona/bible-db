    content: 'Then I was very angry when I heard their outcry and these words [of accusation]. '
  '7':
  - type: text
    content: 'I thought it over and then challenged the nobles and the rulers. I said to them, “You are exacting usury (excessive interest) from your own brother (relative).” So I held a great assembly to confront them. '
  '8':
