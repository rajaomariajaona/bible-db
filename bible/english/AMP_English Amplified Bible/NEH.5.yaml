document_id: NEH.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Usury Abolished
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now there was a great outcry of the [poorer] people and their wives against their Jewish brothers [to whom they were deeply in debt]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And likewise I, my brothers, and my servants are lending them money and grain. Please, let us stop [charging] this interest. [Ex 22:25] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Please, give back to them this very day their fields, their vineyards, their olive groves, and their houses, and also a hundredth part of the money, the grain, the new wine, and the oil that you are lending them.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then they said, “We will give it back and not require anything from them. We will do exactly as you say.” Then I called the priests and took an oath from them that they would act in accordance with this promise. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I also '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The folds of a robe over the chest formed a place where objects could be carried and protected, so Nehemiah’s gesture was a vivid illustration of the divine punishment he was invoking upon violators.
      marker-yv: yv-n
    - type: text
      text: 'shook out the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bosom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: front of my garment and said, “So may God shake out every man from his house and from his possessions who does not keep this promise; like this may he be shaken out and emptied.” And all the assembly said, “Amen!” And they praised the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . Then the people acted in accordance with this promise.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nehemiah’s Example
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Moreover, from the day that I was appointed to be their governor in the land of Judah, from the twentieth year to the thirty-second year of King Artaxerxes, for twelve years, neither I nor my relatives have eaten the governor’s food '
    - type: usfm
      marker: it
      children:
      - type: text
        text: allowance
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But the former governors who were [in office] before me put heavy burdens on the people and took food and wine from them in addition to forty shekels of silver [as an excessive monthly salary]; even their servants assumed authority over the people. But I did not do so because of the [reverent] fear of God. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I also applied myself to the work on this wall; we did not buy any land, and all my servants were gathered together there for the work. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Moreover, there were at my table a hundred and fifty Jews and officials, besides those who came to us from the nations that were around us. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now the following were prepared for each day: one ox and six choice sheep; also fowls (poultry) were prepared for me; and in intervals of ten days all sorts of wine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was provided
    - type: text
      text: ' in abundance. Yet for all this, I did not demand the governor’s food '
    - type: usfm
      marker: it
      children:
      - type: text
        text: allowance,
    - type: text
      text: ' because the servitude was heavy on this people. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Remember me, O my God, for good, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: according to
    - type: text
      text: ' all I have done for this people. [Heb 6:10]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For there were some who were saying, “We, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: along with
    - type: text
      text: ' our sons and our daughters, are many; therefore allow us to get grain, so that we may eat and survive.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'There were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others
    - type: text
      text: ' who were saying, “We are mortgaging our fields, our vineyards, and our houses to buy grain because of the famine.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'There were also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others
    - type: text
      text: ' who were saying, “We have borrowed money on our fields and vineyards for the [Persian] king’s [heavy] tax. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now our flesh (skin) is the same as that of our brothers (relatives), and our children are like their children, yet here we are forcing (selling) our sons and our daughters to be slaves; and some of our daughters are forced into bondage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: already,
    - type: text
      text: ' and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: our hands are
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: we are powerless [to redeem them] because our fields and vineyards belong to others.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then I was very angry when I heard their outcry and these words [of accusation]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I thought it over and then challenged the nobles and the rulers. I said to them, “You are exacting usury (excessive interest) from your own brother (relative).” So I held a great assembly to confront them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I said to them, “According to our ability we have redeemed (purchased back) our Jewish brothers who were sold to the [Gentile] nations; now would you even sell your brothers, that they might be sold to us?” Then they were silent and could not find a [single] word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to say
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So I said, “What you are doing is not good. Should you not walk in the fear of our God to prevent the taunting by the [pagan] nations, our enemies? '
