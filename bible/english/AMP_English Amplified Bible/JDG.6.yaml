document_id: JDG.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Oppressed by Midian
  - type: text
    content: Then the Israelites did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ; and the L
  - type: heading
    content: ord
  - type: text
    content: ' gave them into the hand of Midian for seven years. '
  '10':
  - type: text
    content: and I said to you, “I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God; you shall not fear the gods of the Amorites in whose land you live.” But you have not listened to '
  - type: text
    content: and
  - type: text
    content: ' obeyed My voice.’ ”'
  - type: heading
    content: Gideon Is Visited
  '11':
  - type: text
    content: 'Now the '
  - type: note
    content: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see note Gen 16:7).
  - type: text
    content: Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' came and sat under the terebinth tree at Ophrah, which belonged to Joash the Abiezrite, and his son Gideon was beating wheat in the wine press [instead of the threshing floor] to [hide it and] save it from the Midianites. '
  '12':
  - type: text
    content: And the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' appeared to him and said to him, “The L'
  - type: heading
    content: ord
  - type: text
    content: ' is with you, O brave man.” '
  '13':
  - type: text
    content: But Gideon said to him, “Please my lord, if the L
  - type: heading
    content: ord
  - type: text
    content: ' is with us, then why has all this happened to us? And where are all His wondrous works which our fathers told us about when they said, ‘Did not the L'
  - type: heading
    content: ord
  - type: text
    content: ' bring us up from Egypt?’ But now the L'
  - type: heading
    content: ord
  - type: text
    content: ' has abandoned us and put us into the hand of Midian.” '
  '14':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' turned to him and said, “Go in this strength of yours and save Israel from the hand of Midian. Have I not sent you?” '
  '15':
  - type: text
    content: 'But Gideon said to Him, “Please Lord, how am I to rescue Israel? Behold, my family is the least [significant] in Manasseh, and I am the youngest (smallest) in my father’s house.” '
  '16':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' answered him, “I will certainly be with you, and you will strike down the Midianites as [if they were only] one man.” '
  '17':
  - type: text
    content: 'Gideon replied to Him, “If I have found any favor in Your sight, then show me a sign that it is You who speaks with me. '
  '18':
  - type: text
    content: Please do not depart from here until I come back to You, and bring my offering and place it before You.” And He said, “I will wait until you return.”
  '19':
  - type: text
    content: 'Then Gideon went and prepared a young goat and unleavened bread from an ephah of flour. The meat he put in a basket and the broth in a pot, and he brought '
  - type: text
    content: the food
  - type: text
    content: ' to Him under the oak (terebinth) and presented it. '
  '2':
  - type: text
    content: 'The [powerful] hand of Midian prevailed against Israel. Because of Midian the sons of Israel made for themselves the dens (hideouts) which were in the mountains, and the caves and the [mountain] strongholds. '
  '20':
  - type: text
    content: 'The Angel of God said to him, “Take the meat and unleavened bread and lay them on this rock, and pour out the broth [over them].” And he did so. '
  '21':
  - type: text
    content: Then the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' put out the end of the staff that was in His hand and touched the meat and the unleavened bread; and fire flared up from the rock and consumed the meat and the unleavened bread. Then the Angel of the L'
  - type: heading
    content: ord
  - type: text
    content: ' vanished from his sight. '
  '22':
  - type: text
    content: When Gideon realized [without any doubt] that He was the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ', he declared, “'
  - type: note
    content: Lit Alas.
  - type: text
    content: Oh no, Lord G
  - type: heading
    content: od
  - type: text
    content: '! For now I have seen the Angel of the L'
  - type: heading
    content: ord
  - type: text
    content: ' face to face [and I am doomed]!” '
  '23':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “Peace to you, do not be afraid; you shall not die.” '
  '24':
  - type: text
    content: Then Gideon built an altar there to the L
  - type: heading
    content: ord
  - type: text
    content: ' and named it The L'
  - type: heading
    content: ord
  - type: text
    content: ' is Peace. To this day it is still in Ophrah, of the Abiezrites.'
  '25':
  - type: text
    content: Now on that same night the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Gideon, “Take your father’s bull, the second bull seven years old, and tear down the altar of Baal that belongs to your father, and cut down '
  - type: note
    content: I.e. a wooden pole set up to honor a pagan goddess.
  - type: text
    content: 'the Asherah that is beside it; '
  '26':
  - type: text
    content: and build an altar to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God on top of this mountain stronghold [with stones laid down] in an orderly way. Then take the second bull and offer a burnt sacrifice using the wood of the Asherah which you shall cut down.” '
  '27':
  - type: text
    content: Then Gideon took ten men of his servants and did just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had told him; but because he was too afraid of his father’s household (relatives) and the men of the city to do it during daylight, he did it at night.'
  - type: heading
    content: The Altar of Baal Destroyed
  '28':
  - type: text
    content: 'Early the next morning when the men of the city got up, they discovered that the altar of Baal was torn down, and the Asherah which was beside it was cut down, and the second bull was offered on the altar which had been built. '
  '29':
  - type: text
    content: 'So they said to one another, “Who has done this thing?” When they searched about and inquired, they were told, “Gideon the son of Joash did it.” '
  '3':
  - type: text
    content: 'For it was whenever Israel had sown [their seed] that the Midianites would come up with the Amalekites and the people of the east and go up against them. '
  '30':
  - type: text
    content: 'Then the men of the city said to Joash, “Bring out your son, so that he may be executed, because he has torn down the altar of Baal and cut down the Asherah which was beside it.” '
  '31':
  - type: text
    content: 'But Joash said to all who stood against him, “Will you '
  - type: note
    content: Lit contend.
  - type: text
    content: 'plead for Baal? Will you save him? Whoever pleads for Baal shall be put to death while it is still morning. If Baal is a god, let him defend himself, because someone has torn down his altar.” '
  '32':
  - type: text
    content: 'Therefore on that day he named Gideon Jerubbaal, '
  - type: note
    content: Lit to say.
  - type: text
    content: meaning, “Let Baal plead,” because he had torn down his altar.
  '33':
  - type: text
    content: 'Then all the Midianites and the Amalekites and the people of the east assembled together; and they crossed over [the Jordan] and camped in the Valley of Jezreel. '
  '34':
  - type: text
    content: So the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: note
    content: I.e. came upon.
  - type: text
    content: 'clothed Gideon [and empowered him]; and he blew a trumpet, and the Abiezrites were called together [as a militia] to follow him. '
  '35':
  - type: text
    content: He sent messengers throughout [the tribe of] Manasseh, and the fighting men were also called together to follow him; and he sent messengers to [the tribes of] Asher, Zebulun, and Naphtali, and they came up to meet them.
  - type: heading
    content: Sign of the Fleece
  '36':
  - type: text
    content: 'Then Gideon said to God, “If You are going to rescue Israel through me, as You have spoken, '
  '37':
  - type: text
    content: 'behold, I will put a fleece of [freshly sheared] wool on the threshing floor. If there is dew only on the fleece, and it is dry on all the ground [around it], then I will know that You will rescue Israel through me, as You have said.” '
  '38':
  - type: text
    content: 'And it was so. When he got up early the next morning and squeezed the dew out of the fleece, he wrung from it a bowl full of water. '
  '39':
  - type: text
    content: 'Then Gideon said to God, “Do not let your anger burn against me, so that I may speak once more. Please let me make a test once more with the fleece; now let only the fleece be dry, and let there be dew on all the ground.” '
  '4':
  - type: text
    content: 'So they would camp against them and destroy the crops of the land as far as Gaza, and leave no sustenance in Israel as well as no sheep, ox, or donkey. '
  '40':
  - type: text
    content: God did so that night; for it was dry only on the fleece, and there was dew on all the ground [around it].
  '5':
  - type: text
    content: 'For they would come up with their livestock and their tents, and they would come in as numerous as locusts; both they and their camels were innumerable. So they came into the land to devastate it. '
  '6':
  - type: text
    content: So Israel was greatly impoverished because of the Midianites, and the Israelites cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' [for help].'
  '7':
  - type: text
    content: Now it came about when they cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' because of Midian, '
  '8':
  - type: text
    content: that the L
  - type: heading
    content: ord
  - type: text
    content: ' sent a prophet to the Israelites, and he said to them, “Thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, ‘I brought you up from Egypt and brought you out of the house of slavery. '
  '9':
  - type: text
    content: 'And I rescued you from the hand of the Egyptians and from the hand of all who oppressed you, and drove them out before you and gave you their land, '
