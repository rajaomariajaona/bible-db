  '22':
  - type: text
    content: 'Then they came to Bethsaida; and some people brought a blind man to Jesus and begged Him to touch him. '
  '23':
  - type: text
    content: 'Taking the blind man by the hand, He led him out of the village; and after spitting on his eyes and laying His hands on him, He asked him, '
  - type: text
    content: “Do you see anything?”
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And he looked up and said, “I see people, but [they look] like trees, walking around.” '
  '25':
  - type: text
    content: 'Then again Jesus laid His hands on his eyes; and the man stared intently and [his sight] was [completely] restored, and he '
  - type: text
    content: began
  - type: text
    content: ' to see everything clearly. '
  '26':
  - type: text
    content: 'And He sent him to his home, saying, '
  - type: text
    content: “Do not even enter the village.”
  - type: heading
    content: Peter’s Confession of Christ
  '27':
  - type: text
    content: 'Then Jesus and His disciples went out to the villages of '
  - type: note
    content: Located in the area known today as the Golan Heights.
  - type: text
    content: 'Caesarea Philippi; and on the way He asked His disciples, '
  - type: text
    content: “Who do people say that I am?”
  - type: text
    content: ' [Matt 16:13-16; Luke 9:18-20] '
  '28':
  - type: text
    content: 'They answered Him, “John the Baptist; and others say Elijah; but others, one of the prophets.” '
  '29':
  - type: text
    content: 'And He asked them, '
  - type: text
    content: “But who do you say that I am?”
  - type: text
    content: ' Peter replied to Him, “You [in contrast to the others] are the Christ (the Messiah, the Anointed).” '
  '3':
  - type: text
    content: If I send them away to their homes hungry, they will faint
  - type: text
    content: ' [from exhaustion] '
  - type: text
    content: on the road; because some of them have come a long way.”
  - type: text
    content: ' '
  '30':
  - type: text
    content: Then Jesus strictly warned them not to tell anyone about Him.
  '31':
  - type: text
    content: 'And He began to teach them that the Son of Man must [of necessity] suffer many things and be rejected [as the Messiah] by the elders and the chief priests and the scribes, and must be put to death, and after three days rise [from death to life]. [Matt 16:21-28; Luke 9:22-27] '
  '32':
  - type: text
    content: 'He was stating the matter plainly [not holding anything back]. Then Peter took Him aside and began to reprimand Him. '
  '33':
  - type: text
    content: 'But turning around [with His back to Peter] and seeing His disciples, He rebuked Peter, saying, '
  - type: text
    content: '“Get behind Me, Satan; for your mind is not set on God’s will '
  - type: text
    content: or
  - type: text
    content: ' His values and purposes, but on what pleases man.”'
  '34':
  - type: text
    content: 'Jesus called the crowd together with His disciples, and said to them, '
  - type: text
    content: “If anyone wishes to follow Me
  - type: text
    content: ' [as My disciple], '
  - type: text
    content: he must deny himself
  - type: text
    content: ' [set aside selfish interests], '
  - type: text
    content: 'and '
  - type: note
    content: See note Matt 10:38.
  - type: text
    content: take up his cross
  - type: text
    content: ' [expressing a willingness to endure whatever may come] '
  - type: text
    content: and follow Me
  - type: text
    content: ' [believing in Me, conforming to My example in living and, if need be, suffering or perhaps dying because of faith in Me]. '
  '35':
  - type: text
    content: For whoever wishes to save his life
  - type: text
    content: ' [in this world] '
  - type: text
    content: will
  - type: text
    content: ' [eventually] '
  - type: text
    content: lose it
  - type: text
    content: ' [through death], '
  - type: text
    content: but whoever loses his life
  - type: text
    content: ' [in this world] '
  - type: text
    content: for My sake and the gospel’s will save it
  - type: text
    content: ' [from the consequences of sin and separation from God]. [Matt 10:39; Luke 17:33; John 12:25] '
  '36':
  - type: text
    content: For what does it benefit a man to gain the whole world
  - type: text
    content: ' [with all its pleasures], '
  - type: text
    content: and forfeit his soul?
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'For what will a man give in exchange for his soul '
  - type: text
    content: and
  - type: text
    content: ' eternal life'
  - type: text
    content: ' [in God’s kingdom]? '
  '38':
  - type: text
    content: For whoever is ashamed
  - type: text
    content: ' [here and now] '
  - type: text
    content: of Me and My words in this adulterous and sinful generation, the Son of Man will also be ashamed of him when He comes in the glory of His Father with the holy angels.”
  '4':
  - type: text
    content: 'His disciples replied to Him, “Where will anyone be able to find enough bread here in this isolated place to feed these people?” '
  '5':
  - type: text
    content: 'He asked them, '
  - type: text
    content: “How many loaves
  - type: text
    content: ' [of bread] '
  - type: text
    content: do you have?”
  - type: text
    content: ' They said, “Seven.” '
  '6':
  - type: text
    content: 'He directed the people to sit down on the ground; and taking the seven loaves, He gave thanks and broke them, and [repeatedly] gave them to His disciples to set before them, and they served the crowd. '
  '7':
  - type: text
    content: 'They also had a few small fish; and when Jesus had blessed them [and given thanks], He ordered these [fish] to be set before them as well. '
  '8':
  - type: text
    content: 'And the people ate and were satisfied; and they picked up seven large baskets full of the broken pieces that were left over. '
  '9':
  - type: text
    content: 'About four thousand [men] were there [besides women and children]; and He sent them away. '
