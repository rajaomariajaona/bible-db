document_id: MRK.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Four Thousand Fed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In those days, when there was again a large crowd [gathered before Him] and they had nothing to eat, Jesus called His disciples and told them, [Matt 15:32-39] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I feel compassion for the crowd; they have been with Me now for three days and have nothing
  - type: text
    text: ' [left] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to eat.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If I send them away to their homes hungry, they will faint
  - type: text
    text: ' [from exhaustion] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: on the road; because some of them have come a long way.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'His disciples replied to Him, “Where will anyone be able to find enough bread here in this isolated place to feed these people?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How many loaves
  - type: text
    text: ' [of bread] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: do you have?”
  - type: text
    text: ' They said, “Seven.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He directed the people to sit down on the ground; and taking the seven loaves, He gave thanks and broke them, and [repeatedly] gave them to His disciples to set before them, and they served the crowd. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They also had a few small fish; and when Jesus had blessed them [and given thanks], He ordered these [fish] to be set before them as well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the people ate and were satisfied; and they picked up seven large baskets full of the broken pieces that were left over. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'About four thousand [men] were there [besides women and children]; and He sent them away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then immediately He got into the boat with His disciples and went to the district of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may have been another name for Magadan or Magdala.
    marker-yv: yv-n
  - type: text
    text: Dalmanutha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The Pharisees came out and began to argue [contentiously and debate] with Him, demanding from Him a sign from heaven, to test Him [because of their unbelief]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He groaned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sighed deeply in His spirit and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Why does this generation demand a sign? I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: if a sign will be given.
      - type: text
        text: ' The statement takes the form of an oath, which is an emphatic way of forbidding something.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: no sign will be given to this generation!”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Leaving them, He again boarded the boat and left for the other side.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now the disciples had forgotten to bring bread, and they had only one loaf with them in the boat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jesus repeatedly ordered them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Watch out! Beware of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A substance such as yeast that consists mostly of fungi. This analogy relates the impurity of a leavening agent to the impurity of the man-made tradition and hypocrisy of the Pharisees that was preventing the nation of Israel from accepting the Messiah.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: leaven of the Pharisees and the leaven of Herod.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' discussing this with one another, saying, “It is because we have no bread [that He said this].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus, aware of this [discussion], said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you discussing
  - type: text
    text: ' [the fact] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that you have no bread? Do you still not see or understand? Are your hearts hardened?
  - type: text
    text: ' [Is 6:9, 10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: hough you have eyes
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: do you not see
    - type: text
      text: '? A'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd though you have ears
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: do you not hear
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: listen
  - type: text
    text: ' [to what I have said]? '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And do you not remember,
  - type: text
    text: ' [Jer 5:21] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: when I broke the five loaves for the five thousand, how many baskets full of broken pieces you picked up?”
  - type: text
    text: ' They answered, “Twelve.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And
  - type: text
    text: ' [when I broke] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the seven
  - type: text
    text: ' [loaves] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for the four thousand, how many large baskets full of broken pieces did you pick up?”
  - type: text
    text: ' And they answered, “Seven.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And He was saying to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you still not understand?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then they came to Bethsaida; and some people brought a blind man to Jesus and begged Him to touch him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Taking the blind man by the hand, He led him out of the village; and after spitting on his eyes and laying His hands on him, He asked him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you see anything?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And he looked up and said, “I see people, but [they look] like trees, walking around.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then again Jesus laid His hands on his eyes; and the man stared intently and [his sight] was [completely] restored, and he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to see everything clearly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And He sent him to his home, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do not even enter the village.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Peter’s Confession of Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Jesus and His disciples went out to the villages of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Located in the area known today as the Golan Heights.
    marker-yv: yv-n
  - type: text
    text: 'Caesarea Philippi; and on the way He asked His disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who do people say that I am?”
  - type: text
    text: ' [Matt 16:13-16; Luke 9:18-20] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They answered Him, “John the Baptist; and others say Elijah; but others, one of the prophets.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And He asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But who do you say that I am?”
  - type: text
    text: ' Peter replied to Him, “You [in contrast to the others] are the Christ (the Messiah, the Anointed).” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then Jesus strictly warned them not to tell anyone about Him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And He began to teach them that the Son of Man must [of necessity] suffer many things and be rejected [as the Messiah] by the elders and the chief priests and the scribes, and must be put to death, and after three days rise [from death to life]. [Matt 16:21-28; Luke 9:22-27] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He was stating the matter plainly [not holding anything back]. Then Peter took Him aside and began to reprimand Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But turning around [with His back to Peter] and seeing His disciples, He rebuked Peter, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Get behind Me, Satan; for your mind is not set on God’s will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' His values and purposes, but on what pleases man.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus called the crowd together with His disciples, and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If anyone wishes to follow Me
  - type: text
    text: ' [as My disciple], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he must deny himself
  - type: text
    text: ' [set aside selfish interests], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 10:38.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: take up his cross
  - type: text
    text: ' [expressing a willingness to endure whatever may come] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and follow Me
  - type: text
    text: ' [believing in Me, conforming to My example in living and, if need be, suffering or perhaps dying because of faith in Me]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For whoever wishes to save his life
  - type: text
    text: ' [in this world] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will
  - type: text
    text: ' [eventually] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: lose it
  - type: text
    text: ' [through death], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but whoever loses his life
  - type: text
    text: ' [in this world] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for My sake and the gospel’s will save it
  - type: text
    text: ' [from the consequences of sin and separation from God]. [Matt 10:39; Luke 17:33; John 12:25] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For what does it benefit a man to gain the whole world
  - type: text
    text: ' [with all its pleasures], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and forfeit his soul?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For what will a man give in exchange for his soul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eternal life'
  - type: text
    text: ' [in God’s kingdom]? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For whoever is ashamed
  - type: text
    text: ' [here and now] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of Me and My words in this adulterous and sinful generation, the Son of Man will also be ashamed of him when He comes in the glory of His Father with the holy angels.”
