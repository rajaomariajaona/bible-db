  - type: text
    content: 'In those days, when there was again a large crowd [gathered before Him] and they had nothing to eat, Jesus called His disciples and told them, [Matt 15:32-39] '
  '10':
  - type: text
    content: 'Then immediately He got into the boat with His disciples and went to the district of '
  - type: note
    content: This may have been another name for Magadan or Magdala.
  - type: text
    content: Dalmanutha.
  '11':
  - type: text
    content: 'The Pharisees came out and began to argue [contentiously and debate] with Him, demanding from Him a sign from heaven, to test Him [because of their unbelief]. '
  '12':
  - type: text
    content: 'He groaned '
  - type: text
    content: and
  - type: text
    content: ' sighed deeply in His spirit and said, '
  - type: text
    content: '“Why does this generation demand a sign? I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, '
  - type: note
    content: Lit if a sign will be given. The statement takes the form of an oath, which is an emphatic way of forbidding something.
  - type: text
    content: no sign will be given to this generation!”
  - type: text
    content: ' '
  '13':
  - type: text
    content: Leaving them, He again boarded the boat and left for the other side.
  '14':
  - type: text
    content: 'Now the disciples had forgotten to bring bread, and they had only one loaf with them in the boat. '
  '15':
  - type: text
    content: 'Jesus repeatedly ordered them, saying, '
  - type: text
    content: '“Watch out! Beware of the '
  - type: note
    content: A substance such as yeast that consists mostly of fungi. This analogy relates the impurity of a leavening agent to the impurity of the man-made tradition and hypocrisy of the Pharisees that was preventing the nation of Israel from accepting the Messiah.
  - type: text
