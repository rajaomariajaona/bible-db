document_id: JER.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Broken Jar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Go and buy a potter’s earthenware jar, and take some of the elders of the people and some of the senior priests '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and go out to the Valley of Ben-hinnom (son of Hinnom), which is near the entrance of the Potsherd Gate; and proclaim there the words that I tell you, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and say, ‘Hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', O kings of Judah and inhabitants of Jerusalem. Thus says the Lord of hosts, the God of Israel, “Behold (listen carefully), I am going to bring such disaster on this place that the ears of everyone who hears about it will tingle [in shock]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Because the people [of Jerusalem] have abandoned (rejected) Me and have made this an alien '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profaned place by burning sacrifices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incense in it to other gods, that neither they nor their fathers nor the kings of Judah ever knew, and because they have filled this place with the blood of the innocent '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and have built the high places of Baal to burn their sons in the fire as burnt offerings to Baal, which I never commanded or spoke of, nor did it ever enter My mind (heart); '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: therefore, listen very closely, the days are coming,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “when this place shall no longer be called Topheth or the Valley of Ben-hinnom, but the Valley of Slaughter. [Jer 7:31-32] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will pour out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' nullify the counsel (plans) of [the men of] Judah and Jerusalem in this place, and I will make their people fall by the sword before their enemies and by the hand of those who seek their lives; and I will give their dead bodies as food for the birds of the air and for the beasts of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I will make this city a desolation and an '
  - type: usfm
    marker: it
    children:
    - type: text
      text: object of
  - type: text
    text: ' hissing; everyone who passes by it will be amazed and will hiss [in scorn] because of all its plagues '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disasters. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And I will make them eat the flesh of their sons and their daughters, and each one will eat one another’s flesh during the siege and distress brought by their enemies and those who seek their lives.” ’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Then you are to break the jar in the sight of the men who accompany you, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: and say to them, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “This is the way I will break this people and this city as one breaks a potter’s vessel, so that it cannot be mended. They will bury [corpses] in Topheth until there is no more room left [in that place] to bury [the dead]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: This I will do to this place,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “and to its inhabitants; and I will even make this city like Topheth. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The houses of Jerusalem and the houses of the kings of Judah will be defiled like this place, Topheth, all the houses on whose rooftops incense has been burned to all the host of heaven (sun, moon, stars), and where drink offerings have been poured out to other gods.” ’ ” [Acts 7:42, 43]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then Jeremiah came from Topheth, where the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had sent him to prophesy; and he stood in the court of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' house and said to all the people: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, ‘Behold, I am going to bring on this city and on all its towns, all the devastation that I have declared against it, because they have become stiff-necked and refused to hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey My words.’ ”'
