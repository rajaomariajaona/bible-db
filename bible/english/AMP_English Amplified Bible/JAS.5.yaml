document_id: JAS.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Misuse of Riches
  - type: text
    content: 'Come [quickly] now, you rich [who lack true faith and hoard and misuse your resources], weep and howl over the miseries [the woes, the judgments] that are coming upon you. '
  '10':
  - type: text
    content: 'As an example, brothers and sisters, of suffering and patience, take the prophets who spoke in the name of the Lord [as His messengers and representatives]. '
  '11':
  - type: text
    content: 'You know we call those blessed [happy, spiritually prosperous, favored by God] who were steadfast '
  - type: text
    content: and
  - type: text
    content: ' endured [difficult circumstances]. You have heard of the '
  - type: text
    content: patient
  - type: text
    content: ' endurance of Job and you have seen the Lord’s outcome [how He richly blessed Job]. The Lord is full of compassion and is merciful. [Job 1:21, 22; 42:10; Ps 111:4]'
  '12':
  - type: text
    content: But above all, my fellow believers, do not swear, either by heaven or by earth or with any other oath; but let your yes be [a truthful] yes, and your no be [a truthful] no, so that you may not fall under judgment. [Matt 5:34-37]
  '13':
  - type: text
    content: 'Is anyone among you suffering? He must pray. Is anyone joyful? He is to sing praises [to God]. '
  '14':
  - type: text
    content: 'Is anyone among you sick? He must call for the elders (spiritual leaders) of the church and they are to pray over him, anointing him with '
  - type: note
    content: The oil symbolizes the presence of God.
  - type: text
    content: 'oil in the name of the Lord; '
  '15':
  - type: text
    content: 'and the prayer of faith will restore the one who is sick, and the Lord will raise him up; and if he has committed sins, he will be forgiven. '
  '16':
  - type: text
    content: 'Therefore, confess your sins to one another [your false steps, your offenses], and pray for one another, that you may be healed '
  - type: text
    content: and
  - type: text
    content: ' restored. The heartfelt '
  - type: text
    content: and
  - type: text
    content: ' persistent prayer of a righteous man (believer) is able to accomplish much [when put into action and made effective by God—it is dynamic and can have tremendous power]. '
  '17':
  - type: text
    content: 'Elijah was a man with a nature like ours [with the same physical, mental, and spiritual limitations and shortcomings], and he prayed '
  - type: note
    content: Lit with prayer, an idiom of emphasis derived from Hebrew.
  - type: text
    content: 'intensely for it not to rain, and it did not rain on the earth for three years and six months. [1 Kin 17:1] '
  '18':
  - type: text
    content: Then he prayed again, and the sky gave rain and the land produced its crops [as usual]. [1 Kin 18:42-45]
  '19':
  - type: text
    content: 'My brothers and sisters, if anyone among you strays from the truth '
  - type: text
    content: and
  - type: text
    content: ' falls into error and [another] one turns him back [to God], '
  '2':
  - type: text
    content: 'Your wealth has rotted '
  - type: text
    content: and
  - type: text
    content: ' is ruined and your [fine] clothes have become moth-eaten. '
  '20':
  - type: text
    content: let the [latter] one know that the one who has turned a sinner from the error of his way will save that one’s soul from death and cover a multitude of sins [that is, obtain the pardon of the many sins committed by the one who has been restored].
  '3':
  - type: text
    content: 'Your gold and silver are corroded, and their corrosion will be a witness against you and will consume your flesh like fire. You have stored up your treasure in the last days [when it will do you no good]. '
  '4':
  - type: text
    content: 'Look! The wages that you have [fraudulently] withheld from the laborers who have mowed your fields are crying out [against you for vengeance]; and the cries of the harvesters have come to the ears of '
  - type: note
    content: The Lord of Hosts; Sovereign God; Lord of the armies of heaven and earth.
  - type: text
    content: 'the Lord of Sabaoth. [1 Sam 1:3] '
  '5':
  - type: text
    content: 'On the earth you have lived luxuriously '
  - type: text
    content: and
  - type: text
    content: ' abandoned yourselves to soft living and led a life of wanton pleasure [self-indulgence, self-gratification]; you have fattened your hearts in a day of slaughter. '
  '6':
  - type: text
    content: 'You have condemned and have put to death the righteous '
  - type: text
    content: man;
  - type: text
    content: ' he offers you no resistance.'
  - type: heading
    content: Exhortation
  '7':
  - type: text
    content: 'So wait patiently, brothers and sisters, until the coming of the Lord. The farmer waits [expectantly] for the precious harvest from the land, being patient about it, until it receives the early and late rains. '
  '8':
  - type: text
    content: 'You too, be patient; strengthen your hearts [keep them energized and firmly committed to God], because the coming of the Lord is near. '
  '9':
  - type: text
    content: 'Do not complain against one another, believers, so that you will not be judged [for it]. Look! The Judge is standing '
  - type: note
    content: Lit before.
  - type: text
    content: 'right at the door. '
