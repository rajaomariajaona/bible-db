document_id: JAS.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Misuse of Riches
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Come [quickly] now, you rich [who lack true faith and hoard and misuse your resources], weep and howl over the miseries [the woes, the judgments] that are coming upon you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As an example, brothers and sisters, of suffering and patience, take the prophets who spoke in the name of the Lord [as His messengers and representatives]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You know we call those blessed [happy, spiritually prosperous, favored by God] who were steadfast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' endured [difficult circumstances]. You have heard of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: patient
    - type: text
      text: ' endurance of Job and you have seen the Lord’s outcome [how He richly blessed Job]. The Lord is full of compassion and is merciful. [Job 1:21, 22; 42:10; Ps 111:4]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But above all, my fellow believers, do not swear, either by heaven or by earth or with any other oath; but let your yes be [a truthful] yes, and your no be [a truthful] no, so that you may not fall under judgment. [Matt 5:34-37]
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is anyone among you suffering? He must pray. Is anyone joyful? He is to sing praises [to God]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is anyone among you sick? He must call for the elders (spiritual leaders) of the church and they are to pray over him, anointing him with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The oil symbolizes the presence of God.
      marker-yv: yv-n
    - type: text
      text: 'oil in the name of the Lord; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the prayer of faith will restore the one who is sick, and the Lord will raise him up; and if he has committed sins, he will be forgiven. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, confess your sins to one another [your false steps, your offenses], and pray for one another, that you may be healed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restored. The heartfelt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persistent prayer of a righteous man (believer) is able to accomplish much [when put into action and made effective by God—it is dynamic and can have tremendous power]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elijah was a man with a nature like ours [with the same physical, mental, and spiritual limitations and shortcomings], and he prayed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: with prayer,
        - type: text
          text: ' an idiom of emphasis derived from Hebrew.'
      marker-yv: yv-n
    - type: text
      text: 'intensely for it not to rain, and it did not rain on the earth for three years and six months. [1 Kin 17:1] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he prayed again, and the sky gave rain and the land produced its crops [as usual]. [1 Kin 18:42-45]
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My brothers and sisters, if anyone among you strays from the truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' falls into error and [another] one turns him back [to God], '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your wealth has rotted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is ruined and your [fine] clothes have become moth-eaten. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: let the [latter] one know that the one who has turned a sinner from the error of his way will save that one’s soul from death and cover a multitude of sins [that is, obtain the pardon of the many sins committed by the one who has been restored].
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your gold and silver are corroded, and their corrosion will be a witness against you and will consume your flesh like fire. You have stored up your treasure in the last days [when it will do you no good]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look! The wages that you have [fraudulently] withheld from the laborers who have mowed your fields are crying out [against you for vengeance]; and the cries of the harvesters have come to the ears of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' of Hosts; Sovereign God; L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' of the armies of heaven and earth.'
      marker-yv: yv-n
    - type: text
      text: 'the Lord of Sabaoth. [1 Sam 1:3] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the earth you have lived luxuriously '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abandoned yourselves to soft living and led a life of wanton pleasure [self-indulgence, self-gratification]; you have fattened your hearts in a day of slaughter. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have condemned and have put to death the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man;
    - type: text
      text: ' he offers you no resistance.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Exhortation
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So wait patiently, brothers and sisters, until the coming of the Lord. The farmer waits [expectantly] for the precious harvest from the land, being patient about it, until it receives the early and late rains. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You too, be patient; strengthen your hearts [keep them energized and firmly committed to God], because the coming of the Lord is near. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not complain against one another, believers, so that you will not be judged [for it]. Look! The Judge is standing '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: before
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'right at the door. '
