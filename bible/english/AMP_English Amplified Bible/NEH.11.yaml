verses:
  '1':
  - type: heading
    content: Time Passes; Heads of Provinces
  - type: text
    content: 'Now the leaders of the people lived in Jerusalem; but the rest of the people cast lots to bring one [person] out of ten to live in Jerusalem, the holy city, while nine-tenths '
  - type: text
    content: remained
  - type: text
    content: ' in the '
  - type: text
    content: other
  - type: text
    content: ' cities. '
  '10':
  - type: text
    content: 'Of the priests: Jedaiah the son of Joiarib, Jachin, '
  '11':
  - type: text
    content: 'Seraiah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the leader of the house of God, '
  '12':
  - type: text
    content: 'and their brothers (relatives, fellow workers) who did the work of the house, 822; and Adaiah the son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashhur, the son of Malchijah, '
  '13':
  - type: text
    content: 'and his brothers, heads of fathers’ '
  - type: text
    content: households
  - type: text
    content: ', 242; and Amashsai the son of Azarel, the son of Ahzai, the son of Meshillemoth, the son of Immer, '
  '14':
  - type: text
    content: and their brothers, brave men, 128. Their overseer was Zabdiel the son of Haggedolim [one of the great men].
  '15':
  - type: text
    content: 'Now from the Levites: Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, the son of Bunni; '
  '16':
  - type: text
    content: 'and Shabbethai and Jozabad, from the leaders of the Levites, who were in charge of the outside work of the house of God; '
  '17':
  - type: text
    content: 'Mattaniah the son of Mica, the son of Zabdi, the son of Asaph, who was the leader to begin the thanksgiving in prayer, and Bakbukiah, second among his brothers; and Abda the son of Shammua, the son of Galal, the son of Jeduthun. '
  '18':
  - type: text
    content: 'All the Levites in the holy city '
  - type: text
    content: totaled
  - type: text
    content: ' 284.'
  '19':
  - type: text
    content: 'The gatekeepers: Akkub, Talmon, and their kinsmen, who kept watch at the gates, '
  - type: text
    content: totaled
  - type: text
    content: ' 172.'
  - type: heading
    content: Outside Jerusalem
  '2':
  - type: text
    content: And the people blessed all the men who volunteered to live in Jerusalem.
  '20':
  - type: text
    content: 'Now the rest of Israel, the priests and the Levites, were in all the cities of Judah, each on his own inheritance. '
  '21':
  - type: text
    content: But the temple servants were living in Ophel; Ziha and Gishpa were in charge of the temple servants.
  '22':
  - type: text
    content: 'The overseer of the Levites in Jerusalem was Uzzi the son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Mica, from Asaph’s sons, who were the singers in regard to the work of the house of God. '
  '23':
  - type: text
    content: 'For '
  - type: text
    content: there was
  - type: text
    content: ' a '
  - type: note
    content: Some believe this refers to the regulations established by King David instead of the Persian king; however, Ezra 6:9, 10 records the fact that King Darius supplied appropriate items for sacrifice and requested daily prayers for “…the king and his sons.” Artaxerxes may have continued this practice.
  - type: text
    content: command from the [
  - type: note
    content: Artaxerxes.
  - type: text
    content: 'Persian] king regarding the singers, '
  - type: text
    content: as to their
  - type: text
    content: ' daily task. '
  '24':
  - type: text
    content: Pethahiah the son of Meshezabel, of the sons of Zerah the son of Judah, was the king’s representative in all matters concerning the people.
  '25':
  - type: text
    content: 'As for the villages with their fields, some sons (descendants) of Judah lived in Kiriath-arba and its '
  - type: note
    content: Lit daughters, and so throughout the chapter.
  - type: text
    content: 'towns, Dibon and its towns, and Jekabzeel and its villages, '
  '26':
  - type: text
    content: 'in Jeshua, in Moladah, in Beth-pelet, '
  '27':
  - type: text
    content: 'in Hazar-shual and in Beersheba and its towns, '
  '28':
  - type: text
    content: 'in Ziklag and in Meconah and its towns, '
  '29':
  - type: text
    content: 'in En-rimmon, in Zorah, and in Jarmuth, '
  '3':
  - type: text
    content: 'These are the heads of the provinces who lived in Jerusalem, but in the cities of Judah everyone lived on his property in their cities—the Israelites, the priests, the Levites, the temple servants, and the descendants of Solomon’s servants. '
  '30':
  - type: text
    content: 'Zanoah, Adullam, and their villages, Lachish and its fields, and Azekah and its towns. So they camped from Beersheba as far as the Hinnom Valley. '
  '31':
  - type: text
    content: 'The sons (descendants) of Benjamin also '
  - type: text
    content: lived
  - type: text
    content: ' from Geba '
  - type: text
    content: onward,
  - type: text
    content: ' at Michmash, Aija, Bethel and its towns, '
  '32':
  - type: text
    content: 'at Anathoth, Nob, Ananiah, '
  '33':
  - type: text
    content: 'Hazor, Ramah, Gittaim, '
  '34':
  - type: text
    content: 'Hadid, Zeboim, Neballat, '
  '35':
  - type: text
    content: 'Lod, and Ono, the Valley of the Craftsmen. '
  '36':
  - type: text
    content: And certain divisions of the Levites in Judah belonged to Benjamin.
  '4':
  - type: text
    content: 'And some of the sons of Judah and some of the sons of Benjamin lived in Jerusalem. From the sons of Judah: Athaiah the son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalalel, of the sons of Perez; '
  '5':
  - type: text
    content: 'Maaseiah the son of Baruch, the son of Col-hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, the son of the Shilonite. '
  '6':
  - type: text
    content: All the sons of Perez who lived at Jerusalem were 468 able men.
  '7':
  - type: text
    content: 'These are the sons of Benjamin: Sallu the son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, son of Jeshaiah; '
  '8':
  - type: text
    content: 'and after him Gabbai and Sallai, 928. '
  '9':
  - type: text
    content: Joel the son of Zichri was their overseer, and Judah the son of Hassenuah was second in command of the city.
