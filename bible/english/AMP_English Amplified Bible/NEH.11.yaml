document_id: NEH.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Time Passes; Heads of Provinces
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the leaders of the people lived in Jerusalem; but the rest of the people cast lots to bring one [person] out of ten to live in Jerusalem, the holy city, while nine-tenths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: remained
  - type: text
    text: ' in the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And the people blessed all the men who volunteered to live in Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'These are the heads of the provinces who lived in Jerusalem, but in the cities of Judah everyone lived on his property in their cities—the Israelites, the priests, the Levites, the temple servants, and the descendants of Solomon’s servants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And some of the sons of Judah and some of the sons of Benjamin lived in Jerusalem. From the sons of Judah: Athaiah the son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalalel, of the sons of Perez; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Maaseiah the son of Baruch, the son of Col-hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, the son of the Shilonite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: All the sons of Perez who lived at Jerusalem were 468 able men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'These are the sons of Benjamin: Sallu the son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, son of Jeshaiah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and after him Gabbai and Sallai, 928. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Joel the son of Zichri was their overseer, and Judah the son of Hassenuah was second in command of the city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Of the priests: Jedaiah the son of Joiarib, Jachin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Seraiah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the leader of the house of God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and their brothers (relatives, fellow workers) who did the work of the house, 822; and Adaiah the son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashhur, the son of Malchijah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and his brothers, heads of fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ', 242; and Amashsai the son of Azarel, the son of Ahzai, the son of Meshillemoth, the son of Immer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: and their brothers, brave men, 128. Their overseer was Zabdiel the son of Haggedolim [one of the great men].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now from the Levites: Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, the son of Bunni; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and Shabbethai and Jozabad, from the leaders of the Levites, who were in charge of the outside work of the house of God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mattaniah the son of Mica, the son of Zabdi, the son of Asaph, who was the leader to begin the thanksgiving in prayer, and Bakbukiah, second among his brothers; and Abda the son of Shammua, the son of Galal, the son of Jeduthun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'All the Levites in the holy city '
  - type: usfm
    marker: it
    children:
    - type: text
      text: totaled
  - type: text
    text: ' 284.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The gatekeepers: Akkub, Talmon, and their kinsmen, who kept watch at the gates, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: totaled
  - type: text
    text: ' 172.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Outside Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now the rest of Israel, the priests and the Levites, were in all the cities of Judah, each on his own inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But the temple servants were living in Ophel; Ziha and Gishpa were in charge of the temple servants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The overseer of the Levites in Jerusalem was Uzzi the son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Mica, from Asaph’s sons, who were the singers in regard to the work of the house of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there was
  - type: text
    text: ' a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some believe this refers to the regulations established by King David instead of the Persian king; however, Ezra 6:9, 10 records the fact that King Darius supplied appropriate items for sacrifice and requested daily prayers for “…the king and his sons.” Artaxerxes may have continued this practice.
    marker-yv: yv-n
  - type: text
    text: command from the [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Artaxerxes.
    marker-yv: yv-n
  - type: text
    text: 'Persian] king regarding the singers, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as to their
  - type: text
    text: ' daily task. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Pethahiah the son of Meshezabel, of the sons of Zerah the son of Judah, was the king’s representative in all matters concerning the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'As for the villages with their fields, some sons (descendants) of Judah lived in Kiriath-arba and its '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: daughters,
      - type: text
        text: ' and so throughout the chapter.'
    marker-yv: yv-n
  - type: text
    text: 'towns, Dibon and its towns, and Jekabzeel and its villages, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'in Jeshua, in Moladah, in Beth-pelet, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'in Hazar-shual and in Beersheba and its towns, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'in Ziklag and in Meconah and its towns, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'in En-rimmon, in Zorah, and in Jarmuth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Zanoah, Adullam, and their villages, Lachish and its fields, and Azekah and its towns. So they camped from Beersheba as far as the Hinnom Valley. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The sons (descendants) of Benjamin also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lived
  - type: text
    text: ' from Geba '
  - type: usfm
    marker: it
    children:
    - type: text
      text: onward,
  - type: text
    text: ' at Michmash, Aija, Bethel and its towns, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'at Anathoth, Nob, Ananiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Hazor, Ramah, Gittaim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hadid, Zeboim, Neballat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Lod, and Ono, the Valley of the Craftsmen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: And certain divisions of the Levites in Judah belonged to Benjamin.
