document_id: LEV.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Law of Grain Offerings
  - type: text
    content: '‘When '
  - type: note
    content: Lit a soul.
  - type: text
    content: 'anyone presents a grain offering to the Lord, his offering shall be of fine flour, and he shall pour [olive] oil over it and put frankincense on it. '
  '10':
  - type: text
    content: What is left of the grain offering belongs to Aaron and his sons; it is a most holy part of the offerings to the L
  - type: heading
    content: ord
  - type: text
    content: ' by fire.'
  '11':
  - type: text
    content: ‘No grain offering that you bring to the L
  - type: heading
    content: ord
  - type: text
    content: ' shall be made with leaven, for you shall not offer up in smoke any leaven [which symbolizes the spread of sin] or any honey [which, like leaven, is subject to fermentation] in any offering by fire to the L'
  - type: heading
    content: ord
  - type: text
    content: '. [1 Cor 5:8] '
  '12':
  - type: text
    content: As an offering of first fruits you may offer them [leaven and honey] to the L
  - type: heading
    content: ord
  - type: text
    content: ', but they shall not go up [in smoke] on the altar as a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma. '
  '13':
  - type: text
    content: You shall season every grain offering with salt so that the salt (preservation) of the covenant of your God will not be missing from your grain offering. You shall offer salt with all your offerings. [Mark 9:49, 50]
  '14':
  - type: text
    content: ‘If you bring a grain offering of early ripened things to the L
  - type: heading
    content: ord
  - type: text
    content: ', you shall bring fresh heads of grain roasted in the fire, crushed grain of new growth, for the grain offering of your early ripened things. '
  '15':
  - type: text
    content: 'You shall put oil on it and lay incense on it; it is a grain offering. '
  '16':
  - type: text
    content: The priest shall offer up in smoke its memorial portion, part of the crushed grain and part of its oil with all its incense; it is an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: .
  '2':
  - type: text
    content: 'He shall bring it to Aaron’s sons the priests. Out of it he shall take a handful of the fine flour and oil, with all of its frankincense, and the priest shall offer this up in smoke on the altar [of burnt offering] as the memorial portion of it. It is an offering by fire, a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '3':
  - type: text
    content: What is left of the grain offering belongs to Aaron and his sons; it is a most holy part of the offerings to the L
  - type: heading
    content: ord
  - type: text
    content: ' by fire.'
  '4':
  - type: text
    content: '‘When you bring an offering of grain baked in the oven, it shall be '
  - type: note
    content: Leaven (yeast) symbolized corruption and sin.
  - type: text
    content: 'unleavened cakes of fine flour mixed with oil, or unleavened wafers spread with oil. '
  '5':
  - type: text
    content: 'If your offering is grain baked on a griddle, it shall be of fine unleavened flour, mixed with oil. '
  '6':
  - type: text
    content: 'You are to break it into pieces, and you shall pour oil on it; it is a grain offering. '
  '7':
  - type: text
    content: 'Now if your offering is grain cooked in a lidded pan, it shall be made of fine flour with oil. '
  '8':
  - type: text
    content: When you bring the grain offering that is made of these things to the L
  - type: heading
    content: ord
  - type: text
    content: ', it shall be presented to the priest, and he shall bring it to the altar [of burnt offering]. '
  '9':
  - type: text
    content: 'The priest shall take from the grain offering its memorial portion and offer it up in smoke on the altar. It is an offering by fire, a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
