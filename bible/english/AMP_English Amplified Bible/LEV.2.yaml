document_id: LEV.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Law of Grain Offerings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '‘When '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a soul
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'anyone presents a grain offering to the Lord, his offering shall be of fine flour, and he shall pour [olive] oil over it and put frankincense on it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: What is left of the grain offering belongs to Aaron and his sons; it is a most holy part of the offerings to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' by fire.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ‘No grain offering that you bring to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall be made with leaven, for you shall not offer up in smoke any leaven [which symbolizes the spread of sin] or any honey [which, like leaven, is subject to fermentation] in any offering by fire to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [1 Cor 5:8] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: As an offering of first fruits you may offer them [leaven and honey] to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', but they shall not go up [in smoke] on the altar as a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You shall season every grain offering with salt so that the salt (preservation) of the covenant of your God will not be missing from your grain offering. You shall offer salt with all your offerings. [Mark 9:49, 50]
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ‘If you bring a grain offering of early ripened things to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', you shall bring fresh heads of grain roasted in the fire, crushed grain of new growth, for the grain offering of your early ripened things. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'You shall put oil on it and lay incense on it; it is a grain offering. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The priest shall offer up in smoke its memorial portion, part of the crushed grain and part of its oil with all its incense; it is an offering by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He shall bring it to Aaron’s sons the priests. Out of it he shall take a handful of the fine flour and oil, with all of its frankincense, and the priest shall offer this up in smoke on the altar [of burnt offering] as the memorial portion of it. It is an offering by fire, a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: What is left of the grain offering belongs to Aaron and his sons; it is a most holy part of the offerings to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' by fire.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '‘When you bring an offering of grain baked in the oven, it shall be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Leaven (yeast) symbolized corruption and sin.
      marker-yv: yv-n
    - type: text
      text: 'unleavened cakes of fine flour mixed with oil, or unleavened wafers spread with oil. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'If your offering is grain baked on a griddle, it shall be of fine unleavened flour, mixed with oil. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'You are to break it into pieces, and you shall pour oil on it; it is a grain offering. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now if your offering is grain cooked in a lidded pan, it shall be made of fine flour with oil. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: When you bring the grain offering that is made of these things to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', it shall be presented to the priest, and he shall bring it to the altar [of burnt offering]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The priest shall take from the grain offering its memorial portion and offer it up in smoke on the altar. It is an offering by fire, a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
