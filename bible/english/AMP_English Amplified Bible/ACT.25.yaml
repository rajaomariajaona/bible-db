verses:
  '1':
  - type: heading
    content: Paul before Festus
  - type: text
    content: 'Now Festus arrived in the province, and three days later he went up to Jerusalem from Caesarea [Maritima]. '
  '10':
  - type: text
    content: 'Paul said, “I am standing before Caesar’s tribunal, where I ought to be tried. I have done nothing wrong to the Jews, as you also very well know. '
  '11':
  - type: text
    content: 'Therefore, if I am guilty and have committed anything worthy of death, I do not try to escape death; but if there is nothing to the accusations which these men are bringing against me, no one can hand me over to them. I '
  - type: note
    content: Roman citizens had the right to be tried before Caesar.
  - type: text
    content: 'appeal to Caesar (Emperor Nero).” '
  '12':
  - type: text
    content: Then Festus, after conferring with [the men who formed] his council, answered, “You have appealed to Caesar; to Caesar you shall go.”
  '13':
  - type: text
    content: 'Now several days later, '
  - type: note
    content: Herod Agrippa II was the seventh and last of the Herods mentioned in the NT.
  - type: text
    content: 'Agrippa [II] the king and '
  - type: note
    content: Eldest daughter of Herod Agrippa I.
  - type: text
    content: 'Bernice [his sister] arrived at Caesarea and paid their respects to Festus [the new governor]. '
  '14':
  - type: text
    content: 'While they were spending many days there, Festus laid Paul’s case before the king, saying, “There is a man here who was left as a prisoner by Felix. '
  '15':
  - type: text
    content: 'When I was at Jerusalem, the chief priests and the elders of the Jews [told me about him and] brought charges against him, petitioning for a sentence of condemnation against him. '
  '16':
  - type: text
    content: 'I told them that it was not the custom of the Romans to hand over any man [for punishment] before the accused meets his accusers face to face and has the opportunity to defend himself against the charges. '
  '17':
  - type: text
    content: 'So after they arrived together here, I did not delay, but on the next day took my place on the tribunal and ordered that the man be brought before me. '
  '18':
  - type: text
    content: 'When his accusers stood up, they brought no charges against him of crimes that I was expecting [neither civil nor criminal actions], '
  '19':
  - type: text
    content: 'instead they had some points of disagreement with him about their own '
  - type: note
    content: Or superstition.
  - type: text
    content: 'religion and about one Jesus, a man who had died, but whom Paul kept asserting '
  - type: text
    content: and
  - type: text
    content: ' insisting [over and over] to be alive. '
  '2':
  - type: text
    content: 'And [there in Jerusalem] the chief priests and the leading men of the Jews brought charges against Paul [before Festus], and they repeatedly pleaded with him, '
  '20':
  - type: text
    content: 'And I, being at a loss as to how to investigate these things, asked whether he was willing to go to Jerusalem and be tried there regarding these matters. '
  '21':
  - type: text
    content: 'But when Paul appealed to be held in custody for a decision by the Emperor [Nero], I ordered him to be kept in custody until I '
  - type: text
    content: could
  - type: text
    content: ' send him to Caesar.” '
  '22':
  - type: text
    content: Then Agrippa said to Festus, “I would like to hear the man myself.” “Tomorrow,” Festus replied, “you will hear him.”
  - type: heading
    content: Paul before Agrippa
  '23':
  - type: text
    content: 'So the next day Agrippa and [his sister] Bernice came with great pageantry, and they went into the auditorium accompanied by the military commanders and the prominent men of the city. At the command of Festus, Paul was brought in. '
  '24':
  - type: text
    content: 'Then Festus said, “King Agrippa and all you gentlemen present with us, you see this man [Paul] about whom all the Jewish people appealed to me, both at Jerusalem and here, loudly insisting that he ought not to live any longer. '
  '25':
  - type: text
    content: 'But I found that he had done nothing worthy of death; however, since he appealed to the Emperor [Nero], I decided to send him [to Rome]. '
  '26':
  - type: text
    content: 'But I have nothing specific about him to write to my lord. So I have brought him before '
  - type: text
    content: all of
  - type: text
    content: ' you, and especially before you, King Agrippa, so that after the investigation has taken place, I will have something to put in writing. '
  '27':
  - type: text
    content: 'For it seems absurd '
  - type: text
    content: and
  - type: text
    content: ' unreasonable to me to send a prisoner [to Rome] without indicating the charges against him.”'
  '3':
  - type: text
    content: asking as a concession against Paul, that he would have him brought to Jerusalem; (
  - type: text
    content: meanwhile
  - type: text
    content: ' planning an ambush to kill him on the way). '
  '4':
  - type: text
    content: 'Festus answered that Paul was being held in custody in Caesarea [Maritima] and that he himself was about to leave shortly. '
  '5':
  - type: text
    content: “So,” he said, “let those who are in a position of authority among you go there with me, and if there is anything criminal about the man, let them bring charges against him.”
  '6':
  - type: text
    content: 'Now after Festus had spent no more than eight or ten days among them, he went down to Caesarea, and on the next day he took his seat on the tribunal (the judicial bench), and ordered Paul to be brought [before him]. '
  '7':
  - type: text
    content: 'After Paul arrived, the Jews who had come down from Jerusalem stood around him, bringing many serious charges against him which they were not able to prove, '
  '8':
  - type: text
    content: 'while Paul declared in his own defense, “I have done no wrong '
  - type: text
    content: and
  - type: text
    content: ' committed no offense either against the Law of the Jews or against the temple or against Caesar.” '
  '9':
  - type: text
    content: But Festus, wishing to do the Jews a favor, answered Paul, “
  - type: note
    content: Paul was offered a choice because of his rights as a Roman citizen.
  - type: text
    content: 'Are you willing to go up to Jerusalem and stand trial there in my presence [before the Jewish Sanhedrin] on these '
  - type: text
    content: charges?
  - type: text
    content: '” '
