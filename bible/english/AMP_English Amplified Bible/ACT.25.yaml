document_id: ACT.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul before Festus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Festus arrived in the province, and three days later he went up to Jerusalem from Caesarea [Maritima]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And [there in Jerusalem] the chief priests and the leading men of the Jews brought charges against Paul [before Festus], and they repeatedly pleaded with him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: asking as a concession against Paul, that he would have him brought to Jerusalem; (
  - type: usfm
    marker: it
    children:
    - type: text
      text: meanwhile
  - type: text
    text: ' planning an ambush to kill him on the way). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Festus answered that Paul was being held in custody in Caesarea [Maritima] and that he himself was about to leave shortly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “So,” he said, “let those who are in a position of authority among you go there with me, and if there is anything criminal about the man, let them bring charges against him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now after Festus had spent no more than eight or ten days among them, he went down to Caesarea, and on the next day he took his seat on the tribunal (the judicial bench), and ordered Paul to be brought [before him]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'After Paul arrived, the Jews who had come down from Jerusalem stood around him, bringing many serious charges against him which they were not able to prove, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'while Paul declared in his own defense, “I have done no wrong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' committed no offense either against the Law of the Jews or against the temple or against Caesar.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But Festus, wishing to do the Jews a favor, answered Paul, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul was offered a choice because of his rights as a Roman citizen.
    marker-yv: yv-n
  - type: text
    text: 'Are you willing to go up to Jerusalem and stand trial there in my presence [before the Jewish Sanhedrin] on these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: charges?
  - type: text
    text: '” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Paul said, “I am standing before Caesar’s tribunal, where I ought to be tried. I have done nothing wrong to the Jews, as you also very well know. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore, if I am guilty and have committed anything worthy of death, I do not try to escape death; but if there is nothing to the accusations which these men are bringing against me, no one can hand me over to them. I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Roman citizens had the right to be tried before Caesar.
    marker-yv: yv-n
  - type: text
    text: 'appeal to Caesar (Emperor Nero).” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Festus, after conferring with [the men who formed] his council, answered, “You have appealed to Caesar; to Caesar you shall go.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now several days later, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Herod Agrippa II was the seventh and last of the Herods mentioned in the NT.
    marker-yv: yv-n
  - type: text
    text: 'Agrippa [II] the king and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eldest daughter of Herod Agrippa I.
    marker-yv: yv-n
  - type: text
    text: 'Bernice [his sister] arrived at Caesarea and paid their respects to Festus [the new governor]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'While they were spending many days there, Festus laid Paul’s case before the king, saying, “There is a man here who was left as a prisoner by Felix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When I was at Jerusalem, the chief priests and the elders of the Jews [told me about him and] brought charges against him, petitioning for a sentence of condemnation against him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I told them that it was not the custom of the Romans to hand over any man [for punishment] before the accused meets his accusers face to face and has the opportunity to defend himself against the charges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So after they arrived together here, I did not delay, but on the next day took my place on the tribunal and ordered that the man be brought before me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When his accusers stood up, they brought no charges against him of crimes that I was expecting [neither civil nor criminal actions], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'instead they had some points of disagreement with him about their own '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: superstition
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'religion and about one Jesus, a man who had died, but whom Paul kept asserting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insisting [over and over] to be alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And I, being at a loss as to how to investigate these things, asked whether he was willing to go to Jerusalem and be tried there regarding these matters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But when Paul appealed to be held in custody for a decision by the Emperor [Nero], I ordered him to be kept in custody until I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: could
  - type: text
    text: ' send him to Caesar.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then Agrippa said to Festus, “I would like to hear the man myself.” “Tomorrow,” Festus replied, “you will hear him.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul before Agrippa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So the next day Agrippa and [his sister] Bernice came with great pageantry, and they went into the auditorium accompanied by the military commanders and the prominent men of the city. At the command of Festus, Paul was brought in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Festus said, “King Agrippa and all you gentlemen present with us, you see this man [Paul] about whom all the Jewish people appealed to me, both at Jerusalem and here, loudly insisting that he ought not to live any longer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But I found that he had done nothing worthy of death; however, since he appealed to the Emperor [Nero], I decided to send him [to Rome]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But I have nothing specific about him to write to my lord. So I have brought him before '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all of
  - type: text
    text: ' you, and especially before you, King Agrippa, so that after the investigation has taken place, I will have something to put in writing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For it seems absurd '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unreasonable to me to send a prisoner [to Rome] without indicating the charges against him.”'
