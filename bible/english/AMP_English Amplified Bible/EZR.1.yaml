  - type: text
    content: 'Now in the '
  - type: note
    content: Cyrus the Great captured Babylon in Oct 539 b.c. This was about seventy years after the first Hebrew captives were taken to Babylon.
  - type: text
    content: 'first year of '
  - type: note
    content: Cyrus the Great established the Persian Empire and ruled from 559-530 b.c. His kingdom extended from Turkey in the west to the Indus River in the east, covering most of Southwest Asia and much of Central Asia. He was a great soldier as well as a wise and benevolent king, whose respect for religious freedom led to the return of the Hebrew captives to Jerusalem. Ancient historians report that the tomb assumed to be his was visited by Alexander the Great (356-323 b.c.) when he conquered Persepolis in 330 b.c. The tomb still exists among the ruins of Pasargadae in modern Iran.
