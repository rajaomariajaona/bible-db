segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Proclamation of Cyrus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cyrus the Great captured Babylon in Oct 539 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . This was about seventy years after the first Hebrew captives were taken to Babylon.
    marker-yv: yv-n
  - type: text
    text: 'first year of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cyrus the Great established the Persian Empire and ruled from 559-530 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. His kingdom extended from Turkey in the west to the Indus River in the east, covering most of Southwest Asia and much of Central Asia. He was a great soldier as well as a wise and benevolent king, whose respect for religious freedom led to the return of the Hebrew captives to Jerusalem. Ancient historians report that the tomb assumed to be his was visited by Alexander the Great (356-323 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '.) when he conquered Persepolis in 330 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . The tomb still exists among the ruins of Pasargadae in modern Iran.
    marker-yv: yv-n
  - type: text
    text: Cyrus king of Persia [that is, the first year he ruled Babylon], in order to fulfill the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' by the mouth of Jeremiah [the prophet], the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' stirred up (put in motion) the spirit of Cyrus king of Persia, so that he sent a proclamation throughout all his kingdom, and also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: put it
  - type: text
    text: ' in writing, saying: [Jer 29:10-14]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Thus says Cyrus king of Persia, ‘The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'It is remarkable that Cyrus actually used God’s special name, the tetragrammaton '
      - type: usfm
        marker: it
        children:
        - type: text
          text: YHWH
      - type: text
        text: ' (traditionally rendered “L'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: '”). Certainly Cyrus recognized the true God, but he probably considered Him as one of a number of existing gods, as was typical for a polytheist. For Cyrus '
      - type: usfm
        marker: it
        children:
        - type: text
          text: God of heaven
      - type: text
        text: ' probably meant just that, along with '
      - type: usfm
        marker: it
        children:
        - type: text
          text: God of Israel
      - type: text
        text: ' and the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: God who is in Jerusalem
      - type: text
        text: ' (v 3).'
    marker-yv: yv-n
  - type: text
    text: L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of heaven, has given me all the kingdoms of the earth and He has appointed me to build Him a house at Jerusalem, which is in Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Whoever there is among you of all His people, may his God be with him! Let him go up to Jerusalem, which is in Judah and rebuild the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel; He is God who is in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In any place where a survivor (Jewish exile) may live, let the men (Gentiles) of that place support him with silver and gold, with goods and cattle, together with freewill offerings for the house of God in Jerusalem.’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Holy Articles Restored
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the heads of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' of Judah and Benjamin, and the priests and Levites, all those whose spirits God had stirred up, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew verb “to stand” or “arise” is often an instruction to get ready to fulfill a command, somewhat similar to the military command “attention.”
    marker-yv: yv-n
  - type: text
    text: arose to go up and rebuild the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which is in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'All those who were around them encouraged them with articles of silver, with gold, with goods, with cattle, and with valuable things, in addition to all that was given as a freewill offering. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Also King Cyrus brought out the articles of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', which Nebuchadnezzar had carried away from Jerusalem [when he captured that city] and had put in the house of his gods. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Cyrus, king of Persia, had Mithredath the treasurer bring them out, and he counted them out to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is occasionally a debate over the identities of Sheshbazzar and Zerubbabel. Sheshbazzar was an older Jewish official who was appointed by Cyrus and served in Judah (5:24). Zerubbabel was a younger man who was recognized as a political leader among the Jews. He was the son of Shealtiel and an ancestor of Jesus (5:2; Matt 1:12, 13).
    marker-yv: yv-n
  - type: text
    text: 'Sheshbazzar, the governor (leader) of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they counted: 30 dishes (basins) of gold, 1,000 dishes of silver, 29 duplicates; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '30 [small] gold bowls, 410 [small] silver bowls of a second '
  - type: usfm
    marker: it
    children:
    - type: text
      text: kind,
  - type: text
    text: ' and 1,000 other articles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'All the articles of gold and of silver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: totaled
  - type: text
    text: ' 5,400. All these Sheshbazzar [the governor] brought up with the exiles who went from Babylon up to Jerusalem.'
