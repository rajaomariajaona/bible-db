    content: 'And Cyrus, king of Persia, had Mithredath the treasurer bring them out, and he counted them out to '
  - type: note
    content: There is occasionally a debate over the identities of Sheshbazzar and Zerubbabel. Sheshbazzar was an older Jewish official who was appointed by Cyrus and served in Judah (5:24). Zerubbabel was a younger man who was recognized as a political leader among the Jews. He was the son of Shealtiel and an ancestor of Jesus (5:2; Matt 1:12, 13).
  - type: text
