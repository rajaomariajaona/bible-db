  '2':
  - type: text
    content: '“Thus says Cyrus king of Persia, ‘The '
  - type: note
    content: It is remarkable that Cyrus actually used God’s special name, the tetragrammaton YHWH (traditionally rendered “Lord”). Certainly Cyrus recognized the true God, but he probably considered Him as one of a number of existing gods, as was typical for a polytheist. For Cyrus God of heaven probably meant just that, along with God of Israel and the God who is in Jerusalem (v 3).
  - type: text
    content: L
  - type: heading
    content: ord
  - type: text
    content: ', the God of heaven, has given me all the kingdoms of the earth and He has appointed me to build Him a house at Jerusalem, which is in Judah. '
  '3':
  - type: text
    content: Whoever there is among you of all His people, may his God be with him! Let him go up to Jerusalem, which is in Judah and rebuild the house of the L
  - type: heading
