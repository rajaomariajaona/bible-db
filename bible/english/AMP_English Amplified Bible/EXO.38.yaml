document_id: EXO.38,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tabernacle Completed
  - type: text
    content: 'Then Bezalel made the altar of burnt offering of acacia wood; its top was square, five cubits long and five cubits wide, and three cubits high. '
  '10':
  - type: text
    content: 'their twenty support poles, and their twenty bronze sockets; the hooks of the support poles and their connecting rings were silver. '
  '11':
  - type: text
    content: 'And for the north side [of the court the curtains were also] a hundred cubits; their twenty support poles and their twenty bronze sockets; the hooks of the support poles and their connecting rings were silver. '
  '12':
  - type: text
    content: 'For the west side [of the court] there were curtains of fifty cubits with their ten support poles and their ten sockets; the hooks of the support poles and their connecting rings were silver. '
  '13':
  - type: text
    content: 'For the east side [the front of the courtyard, there were curtains of] fifty cubits. '
  '14':
  - type: text
    content: 'The curtains for one side '
  - type: text
    content: of the court gate were
  - type: text
    content: ' fifteen cubits, with their three support poles and their three sockets; '
  '15':
  - type: text
    content: 'and '
  - type: text
    content: the same
  - type: text
    content: ' for the other side [of the court gate]. Left and right of the court gate there were curtains of fifteen cubits; with their three support poles and their three sockets. '
  '16':
  - type: text
    content: 'All the curtains around the court were of fine twisted linen. '
  '17':
  - type: text
    content: 'The sockets for the support poles were '
  - type: text
    content: made of
  - type: text
    content: ' bronze, the hooks of the support poles and their connecting rings were '
  - type: text
    content: made of
  - type: text
    content: ' silver; and silver overlaid their tops. All the support poles of the court had silver connecting rings. '
  '18':
  - type: text
    content: 'The screen (curtain) for the gate of the courtyard [on the east side] was the work of an embroiderer, in blue, purple, and scarlet fabric, and fine twisted linen; it was twenty cubits long and five cubits high, corresponding to the curtains of the court. '
  '19':
  - type: text
    content: 'Their four support poles and their four sockets were bronze; their hooks were silver, and silver overlaid their tops and their connecting rings. '
  '2':
  - type: text
    content: 'And he made its horns (horn-shaped projections) on the four corners of it; the horns were '
  - type: text
    content: of one piece
  - type: text
    content: ' with it, and he overlaid it with bronze. '
  '20':
  - type: text
    content: All the pegs for the tabernacle and the court were bronze.
  - type: heading
    content: The Cost of the Tabernacle
  '21':
  - type: text
    content: 'This is the sum of the things for the tabernacle, the tabernacle of the Testimony, as counted according to the command of Moses, for the work of the Levites, under the direction of Ithamar the son of Aaron the priest. '
  '22':
  - type: text
    content: Now Bezalel the son of Uri, the son of Hur, of the tribe of Judah, made everything that the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded Moses. '
  '23':
  - type: text
    content: With him was Oholiab the son of Ahisamach, of the tribe of Dan, an engraver and a skillful craftsman and an embroiderer in blue and in purple and in scarlet fabric, and in fine linen.
  '24':
  - type: text
    content: 'All the gold that was used for the work, in all the building '
  - type: text
    content: and
  - type: text
    content: ' furnishing of the sanctuary, the gold from the wave offering, was twenty-nine talents and seven hundred and thirty shekels, according to the shekel of the sanctuary. '
  '25':
  - type: text
    content: 'The silver from those of the congregation who were assembled '
  - type: text
    content: and
  - type: text
    content: ' counted was 100 talents and 1,775 shekels, according to the shekel of the sanctuary; '
  '26':
  - type: text
    content: 'a beka for each man (that is, half a shekel according to the shekel of the sanctuary) for everyone who was counted, from twenty years old and upward, for 603,550 men. '
  '27':
  - type: text
    content: 'The hundred talents of silver were for casting the sockets of the sanctuary and the sockets of the veil (partition curtain); a hundred sockets for the hundred talents, a talent for a socket. '
  '28':
  - type: text
    content: 'Of the 1,775 '
  - type: text
    content: shekels,
  - type: text
    content: ' he made hooks for the support poles and overlaid their tops and made connecting rings for them. '
  '29':
  - type: text
    content: 'The bronze of the wave offering was seventy talents and 2,400 shekels. '
  '3':
  - type: text
    content: 'He made all the utensils '
  - type: text
    content: and
  - type: text
    content: ' vessels of the altar [of burnt offering], the pots, shovels, basins [to catch the blood of the sacrificed animal], meat hooks and the firepans [to store live coals]. He made all its utensils of bronze. '
  '30':
  - type: text
    content: 'With it Bezalel made the sockets for the doorway of the Tent of Meeting, and the bronze altar and its bronze grating, and all the utensils of the altar, '
  '31':
  - type: text
    content: and the sockets of the court all around and the sockets of the court gate, and all the pegs of the tabernacle and all the pegs around the court.
  '4':
  - type: text
    content: 'He made for the altar a grating of bronze mesh under its rim, extending halfway up it. '
  '5':
  - type: text
    content: 'He cast four rings for the four corners of the bronze grating as holders for the carrying poles. '
  '6':
  - type: text
    content: 'And he made the carrying poles of acacia wood and overlaid them with bronze. '
  '7':
  - type: text
    content: He put the poles through the rings on the sides of the altar, with which to carry it; he made it hollow with planks.
  '8':
  - type: text
    content: 'Bezalel made the basin and its base of bronze from the mirrors of the attending women who served '
  - type: text
    content: and
  - type: text
    content: ' ministered at the doorway of the Tent of Meeting.'
  '9':
  - type: text
    content: 'Then he made the court: for the south side the curtains of the court were of fine twisted linen, a hundred cubits; '
