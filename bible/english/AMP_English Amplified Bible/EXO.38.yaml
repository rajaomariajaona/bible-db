document_id: EXO.38,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Tabernacle Completed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Bezalel made the altar of burnt offering of acacia wood; its top was square, five cubits long and five cubits wide, and three cubits high. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'their twenty support poles, and their twenty bronze sockets; the hooks of the support poles and their connecting rings were silver. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And for the north side [of the court the curtains were also] a hundred cubits; their twenty support poles and their twenty bronze sockets; the hooks of the support poles and their connecting rings were silver. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For the west side [of the court] there were curtains of fifty cubits with their ten support poles and their ten sockets; the hooks of the support poles and their connecting rings were silver. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For the east side [the front of the courtyard, there were curtains of] fifty cubits. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The curtains for one side '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the court gate were
    - type: text
      text: ' fifteen cubits, with their three support poles and their three sockets; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the same
    - type: text
      text: ' for the other side [of the court gate]. Left and right of the court gate there were curtains of fifteen cubits; with their three support poles and their three sockets. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'All the curtains around the court were of fine twisted linen. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The sockets for the support poles were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made of
    - type: text
      text: ' bronze, the hooks of the support poles and their connecting rings were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made of
    - type: text
      text: ' silver; and silver overlaid their tops. All the support poles of the court had silver connecting rings. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The screen (curtain) for the gate of the courtyard [on the east side] was the work of an embroiderer, in blue, purple, and scarlet fabric, and fine twisted linen; it was twenty cubits long and five cubits high, corresponding to the curtains of the court. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Their four support poles and their four sockets were bronze; their hooks were silver, and silver overlaid their tops and their connecting rings. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he made its horns (horn-shaped projections) on the four corners of it; the horns were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of one piece
    - type: text
      text: ' with it, and he overlaid it with bronze. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: All the pegs for the tabernacle and the court were bronze.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Cost of the Tabernacle
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'This is the sum of the things for the tabernacle, the tabernacle of the Testimony, as counted according to the command of Moses, for the work of the Levites, under the direction of Ithamar the son of Aaron the priest. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Now Bezalel the son of Uri, the son of Hur, of the tribe of Judah, made everything that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded Moses. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: With him was Oholiab the son of Ahisamach, of the tribe of Dan, an engraver and a skillful craftsman and an embroiderer in blue and in purple and in scarlet fabric, and in fine linen.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'All the gold that was used for the work, in all the building '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' furnishing of the sanctuary, the gold from the wave offering, was twenty-nine talents and seven hundred and thirty shekels, according to the shekel of the sanctuary. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The silver from those of the congregation who were assembled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counted was 100 talents and 1,775 shekels, according to the shekel of the sanctuary; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'a beka for each man (that is, half a shekel according to the shekel of the sanctuary) for everyone who was counted, from twenty years old and upward, for 603,550 men. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The hundred talents of silver were for casting the sockets of the sanctuary and the sockets of the veil (partition curtain); a hundred sockets for the hundred talents, a talent for a socket. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Of the 1,775 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels,
    - type: text
      text: ' he made hooks for the support poles and overlaid their tops and made connecting rings for them. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The bronze of the wave offering was seventy talents and 2,400 shekels. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He made all the utensils '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vessels of the altar [of burnt offering], the pots, shovels, basins [to catch the blood of the sacrificed animal], meat hooks and the firepans [to store live coals]. He made all its utensils of bronze. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'With it Bezalel made the sockets for the doorway of the Tent of Meeting, and the bronze altar and its bronze grating, and all the utensils of the altar, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: and the sockets of the court all around and the sockets of the court gate, and all the pegs of the tabernacle and all the pegs around the court.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He made for the altar a grating of bronze mesh under its rim, extending halfway up it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He cast four rings for the four corners of the bronze grating as holders for the carrying poles. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he made the carrying poles of acacia wood and overlaid them with bronze. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He put the poles through the rings on the sides of the altar, with which to carry it; he made it hollow with planks.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Bezalel made the basin and its base of bronze from the mirrors of the attending women who served '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ministered at the doorway of the Tent of Meeting.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then he made the court: for the south side the curtains of the court were of fine twisted linen, a hundred cubits; '
