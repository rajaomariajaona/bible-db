document_id: JER.18,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Potter and the Clay
  - type: text
    content: The word which came to Jeremiah from the L
  - type: heading
    content: ord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'and if they do evil in My sight by not obeying My voice, then I will reverse My decision concerning the good with which I had promised to bless them. '
  '11':
  - type: text
    content: Now then, say to the men of Judah and to the citizens of Jerusalem, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Behold, I am shaping a disaster and working out a plan against you. Turn back, each of you from his evil way; correct your habits and change your actions for the better.” ’ '
  '12':
  - type: text
    content: But they will say, ‘That is hopeless! For we are going to follow our own plans, and each of us will act in accordance with the stubbornness of his evil heart.’
  '13':
  - type: text
    content: ¶“Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: ‘Ask now among the nations,
  - type: text
    content: Who has heard of such things?
  - type: text
    content: The virgin Israel
  - type: text
    content: 'Has done a very vile '
  - type: text
    content: and
  - type: text
    content: ' horrible thing.'
  '14':
  - type: text
    content: '‘Will the snow of [Mount] Lebanon melt '
  - type: text
    content: and
  - type: text
    content: ' vanish from its rocks [which tower above Israel]?'
  - type: text
    content: 'Will the cold, rushing waters of foreign '
  - type: text
    content: lands
  - type: text
    content: ' [that flow down from the distant land] be dried up?'
  '15':
  - type: text
    content: ‘Yet My people have forgotten Me;
  - type: text
    content: They burn incense to worthless gods,
  - type: text
    content: They have stumbled from their ways
  - type: text
    content: From the ancient roads,
  - type: text
    content: To walk in pathways,
  - type: text
    content: Not on a highway,
  '16':
  - type: text
    content: 'Making their land a desolation '
  - type: text
    content: and
  - type: text
    content: ' a horror,'
  - type: text
    content: A thing to be
  - type: text
    content: ' hissed at perpetually;'
  - type: text
    content: Everyone who passes by will be astounded
  - type: text
    content: And shake his head [in scorn].
  '17':
  - type: text
    content: ‘I will scatter them like an east wind
  - type: text
    content: Before the enemy;
  - type: text
    content: I will show them My back and not My face
  - type: text
    content: In the day of their disaster [says the L
  - type: heading
    content: ord
  - type: text
    content: '].’ ”'
  '18':
  - type: text
    content: Then [my enemies] said, “Come and let us work out schemes against Jeremiah. Surely the law is not going to be lost to the priest [as Jeremiah predicts], nor the counsel from the wise, nor the word from the prophet. Come and let us strike him with our tongue [by making charges against him before the king], and let us ignore anything he says.”
  '19':
  - type: text
    content: ¶Pay attention to me, O L
  - type: heading
    content: ord
  - type: text
    content: ' [and intercede];'
  - type: text
    content: Listen to what my adversaries are saying [and are plotting against me]—
  '2':
  - type: text
    content: '“Arise and go down to the potter’s house, and there I will make you hear My words.” '
  '20':
  - type: text
    content: Should good be repaid with evil?
  - type: text
    content: Yet they have dug a pit for me.
  - type: text
    content: Remember [with compassion] that I stood before You
  - type: text
    content: To speak good on their behalf,
  - type: text
    content: To turn Your anger away from them.
  '21':
  - type: text
    content: Therefore, give their children over to the famine;
  - type: text
    content: Give them over to the power of the sword.
  - type: text
    content: And let their wives become childless and widowed;
  - type: text
    content: Let their men meet death [by virulent disease],
  - type: text
    content: Their young men be struck down by the sword in battle.
  '22':
  - type: text
    content: Let an outcry be heard from their houses
  - type: text
    content: When You suddenly bring [a troop of] raiders upon them,
  - type: text
    content: For they have dug a pit to capture me
  - type: text
    content: And have hidden snares for my feet.
  '23':
  - type: text
    content: Yet You, O L
  - type: heading
    content: ord
  - type: text
    content: ', know'
  - type: text
    content: All their deadly plotting against me;
  - type: text
    content: Do not forgive their wickedness
  - type: text
    content: Or blot out their sin from Your sight.
  - type: text
    content: But let them be overthrown before You;
  - type: text
    content: Deal with them in the time of Your anger.
  '3':
  - type: text
    content: 'Then I went down to the potter’s house, and saw that he was working at the wheel. '
  '4':
  - type: text
    content: But the vessel that he was making from clay was spoiled by the potter’s hand; so he made it over, reworking it and making it into another pot that seemed good to him.
  '5':
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me: '
  '6':
  - type: text
    content: “O house of Israel, can I not do with you as this potter does?” says the L
  - type: heading
    content: ord
  - type: text
    content: '. “Look carefully, as the clay is in the potter’s hand, so are you in My hand, O house of Israel. '
  '7':
  - type: text
    content: 'At one moment I might [suddenly] speak concerning a nation or kingdom, that I will uproot and break down and destroy; '
  '8':
  - type: text
    content: 'if that nation against which I have spoken turns from its evil, I will '
  - type: note
    content: Lit repent of.
  - type: text
    content: 'relent '
  - type: text
    content: and
  - type: text
    content: ' reverse My decision concerning the devastation that I intended to do. '
  '9':
  - type: text
    content: 'Or at another time I might [suddenly] speak about a nation or kingdom that I will build up or establish; '
