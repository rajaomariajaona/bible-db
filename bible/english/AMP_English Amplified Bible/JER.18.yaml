document_id: JER.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Potter and the Clay
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The word which came to Jeremiah from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and if they do evil in My sight by not obeying My voice, then I will reverse My decision concerning the good with which I had promised to bless them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now then, say to the men of Judah and to the citizens of Jerusalem, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Behold, I am shaping a disaster and working out a plan against you. Turn back, each of you from his evil way; correct your habits and change your actions for the better.” ’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they will say, ‘That is hopeless! For we are going to follow our own plans, and each of us will act in accordance with the stubbornness of his evil heart.’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Therefore thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Ask now among the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has heard of such things?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The virgin Israel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Has done a very vile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' horrible thing.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Will the snow of [Mount] Lebanon melt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vanish from its rocks [which tower above Israel]?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will the cold, rushing waters of foreign '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lands
    - type: text
      text: ' [that flow down from the distant land] be dried up?'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Yet My people have forgotten Me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They burn incense to worthless gods,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have stumbled from their ways
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the ancient roads,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To walk in pathways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not on a highway,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Making their land a desolation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a horror,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A thing to be
    - type: text
      text: ' hissed at perpetually;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone who passes by will be astounded
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shake his head [in scorn].
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I will scatter them like an east wind
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the enemy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will show them My back and not My face
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of their disaster [says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '].’ ”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then [my enemies] said, “Come and let us work out schemes against Jeremiah. Surely the law is not going to be lost to the priest [as Jeremiah predicts], nor the counsel from the wise, nor the word from the prophet. Come and let us strike him with our tongue [by making charges against him before the king], and let us ignore anything he says.”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Pay attention to me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [and intercede];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to what my adversaries are saying [and are plotting against me]—
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Arise and go down to the potter’s house, and there I will make you hear My words.” '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should good be repaid with evil?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they have dug a pit for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember [with compassion] that I stood before You
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To speak good on their behalf,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To turn Your anger away from them.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, give their children over to the famine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give them over to the power of the sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let their wives become childless and widowed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let their men meet death [by virulent disease],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their young men be struck down by the sword in battle.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let an outcry be heard from their houses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When You suddenly bring [a troop of] raiders upon them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have dug a pit to capture me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have hidden snares for my feet.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', know'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their deadly plotting against me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not forgive their wickedness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or blot out their sin from Your sight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But let them be overthrown before You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deal with them in the time of Your anger.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I went down to the potter’s house, and saw that he was working at the wheel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the vessel that he was making from clay was spoiled by the potter’s hand; so he made it over, reworking it and making it into another pot that seemed good to him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “O house of Israel, can I not do with you as this potter does?” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. “Look carefully, as the clay is in the potter’s hand, so are you in My hand, O house of Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At one moment I might [suddenly] speak concerning a nation or kingdom, that I will uproot and break down and destroy; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if that nation against which I have spoken turns from its evil, I will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: repent of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'relent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverse My decision concerning the devastation that I intended to do. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or at another time I might [suddenly] speak about a nation or kingdom that I will build up or establish; '
