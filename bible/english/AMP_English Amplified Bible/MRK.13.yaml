document_id: MRK.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Things to Come
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'As He was coming out of the temple [grounds], one of His disciples said to Him, “Teacher, look what '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The massive size and polished surfaces of the fitted stones that formed the temple structure created a magnificent sight (cf Luke 21:5). The refurbishing of the temple was begun by Herod the Great in 20 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '. and was completed in '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: '. 64 by Herod Agrippa II. The rabbis had a saying: “Whoever has not seen the temple of Herod has never seen a beautiful building” (as quoted from the Talmud). They also said that Herod built it of yellow, white, and perhaps blue marble; and that he intended to cover it with gold, but the rabbis advised him not to because it was beautiful just as it was, looking like the waves of the sea.'
      marker-yv: yv-n
    - type: text
      text: 'wonderful stones and what wonderful buildings!” [Matt 24; Luke 21:5-36] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The gospel
    - type: text
      text: ' [that is, the good news regarding the way of salvation] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: must first be preached to all the
    - type: text
      text: ' [Gentile] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: nations.
    - type: text
      text: ' [Col 1:6, 23] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When they take you and turn you over
    - type: text
      text: ' [to the court], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: do not worry beforehand about what to say, but say whatever is given to you
    - type: text
      text: ' [by God] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in that hour; for it is not you who speak, but it is the Holy Spirit
    - type: text
      text: ' [who will speak through you]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Brother will betray brother to
    - type: text
      text: ' [be put to] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: death, and a father
    - type: text
      text: ' [will hand over] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'his child; and children will rise up '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' take a stand against parents and have them put to death.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You will be hated by everyone because of
    - type: text
      text: ' [your association with] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My name, but the one who
    - type: text
      text: ' [patiently perseveres empowered by the Holy Spirit and] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: endures to the end, he will be saved.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“But when you see the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the detestable one who desecrates the temple. See note Matt 24:15.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: sc
        children:
        - type: text
          text: abomination of desolation
      - type: text
        text: ' standing'
    - type: text
      text: ' [in the temple sanctuary] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'where it ought not to be (let the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the reader of the book of Daniel (cf Matt 24:15). Jesus is indicating that the final fulfillment of this prophecy is yet to come.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: reader understand) then those who are in Judea must flee to the mountains.
    - type: text
      text: ' [Dan 9:27; 11:31; 12:11] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever is on the housetop must not go down
    - type: text
      text: ' [to enter the house], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: or go inside to take anything out of his house;
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: whoever is in the field must not turn back to get his coat.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And woe to those women who are pregnant and to those who are nursing babies in those days!
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pray that it will not occur in winter,
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for at that time there will be such tribulation as has not occurred, from the beginning of the creation which God made, until now—and never will
    - type: text
      text: ' [be again]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jesus replied to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“You see these great buildings? Not one stone will be left on another which will not be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 70, just six years after the temple complex was completed, it was destroyed by the Roman general Titus and his army, who thoroughly devastated Jerusalem.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: torn down!”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if the Lord had not shortened the days, no human life would have been saved; but for the sake of the elect, whom He chose
    - type: text
      text: ' [for Himself], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He shortened the days.
    - type: text
      text: ' [Dan 12:1] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then if anyone says to you, ‘Look, here is the Christ (the Messiah, the Anointed)!’ or, ‘Look, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: He is
      - type: text
        text: ' there!’ do not believe it;'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for false Christs and false prophets will arise, and they will provide signs and wonders in order to deceive, if
    - type: text
      text: ' [such a thing were] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: possible, even the elect
    - type: text
      text: ' [those God has chosen for Himself]. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But be on your guard; I have told you everything in advance.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Return of Christ
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But in those days, after
    - type: text
      text: ' [the suffering and distress of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'that tribulation, '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: the sun will be darkened
      - type: text
        text: ', '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: and the moon will not give its light
      - type: text
        text: ','
    - type: text
      text: ' [Is 13:10] '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: sc
        children:
        - type: text
          text: and the stars will be falling
      - type: text
        text: ' from the sky, and the powers that are in the heavens will be shaken.'
    - type: text
      text: ' [Is 34:4] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then they will see '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: the
      - type: text
        text: ' S'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: on of
      - type: text
        text: ' M'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: an coming in clouds
      - type: text
        text: ' with great power and glory'
    - type: text
      text: ' [in royal majesty and splendor]. [Dan 7:13, 14] '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And then He will send out the angels, and will gather together His elect
    - type: text
      text: ' [those He has chosen for Himself] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: from the four winds, from the farthest end of the earth to the farthest end of heaven.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Now learn this lesson from the fig tree: as soon as its branch becomes tender and it puts out its leaves, you recognize that summer is near.'
    - type: text
      text: ' [Matt 24:32, 33; Luke 21:29-31] '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Even so, you too, when you see these things happening, know
    - type: text
      text: ' [for certain] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'that He is near, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: right
      - type: text
        text: ' at the door.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'As He was sitting on the Mount of Olives opposite the temple, Peter and James and John and Andrew asked Him privately, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, this generation'
    - type: text
      text: ' [the people living when these signs and events begin] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will not pass away until all these things take place.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heaven and earth
    - type: text
      text: ' [as now known] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Rev 21:1, “…the first heaven and the first earth passed away….”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pass away, but My words will not pass away.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But of that
    - type: text
      text: ' [exact] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: day or hour no one knows, not even the angels in heaven, nor the Son
    - type: text
      text: ' [in His humanity], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but the Father '
      - type: usfm
        marker: it
        children:
        - type: text
          text: alone.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Be on guard and stay constantly alert '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One early ms adds “and pray.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '[and pray]; for you do not know when the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: appointed
      - type: text
        text: ' time will come.'
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'It is like a man away on a journey, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: who
      - type: text
        text: ' when he left home put his servants in charge, each with his '
      - type: usfm
        marker: it
        children:
        - type: text
          text: particular
      - type: text
        text: ' task, and also ordered the doorkeeper to be '
      - type: usfm
        marker: it
        children:
        - type: text
          text: continually
      - type: text
        text: ' alert.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Therefore, be '
      - type: usfm
        marker: it
        children:
        - type: text
          text: continually
      - type: text
        text: ' on the alert—for you do not know when the master of the house is coming, whether in the evening, or at midnight, or when the rooster crows, or in the morning—'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '[stay alert,] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'in case he should come suddenly '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' unexpectedly and find you asleep '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' unprepared.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What I say to you I say to everyone, ‘Be on the alert
    - type: text
      text: ' [stay awake and be continually cautious]!’ ”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Tell us, when will these things happen, and what will be the sign when all these things are about to be fulfilled?” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jesus began to say to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Be careful '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' see to it that no one misleads you.'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Many will come in My name
    - type: text
      text: ' [misusing My name or claiming to be the Messiah], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'saying, ‘I am '
      - type: usfm
        marker: it
        children:
        - type: text
          text: He!’
      - type: text
        text: ' and will deceive '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' mislead many.'
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When you hear of wars and rumors of wars, do not be alarmed (frightened, troubled); '
      - type: usfm
        marker: it
