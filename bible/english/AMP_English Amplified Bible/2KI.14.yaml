document_id: 2KI.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amaziah Reigns over Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the second year of Joash the son of Jehoahaz, king of Israel, Amaziah the son of Joash king of Judah became king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You have indeed defeated Edom, and your heart has lifted you up [in pride]. Enjoy your glory but stay at home; for why should you plunge into misery so that you, even you, would fall [at my hand], and Judah with you?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But Amaziah would not listen. So Jehoash king of Israel went up; and he and Amaziah king of Judah faced each other [in combat] at Beth-shemesh, which belongs to Judah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Judah was defeated by Israel, and every man fled to his tent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then Jehoash king of Israel captured Amaziah the king of Judah, the son of Jehoash (Joash), the son of Ahaziah, at Beth-shemesh, and came to Jerusalem and broke through the wall of Jerusalem from the Gate of Ephraim to the Corner Gate, 400 cubits (600 feet). '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He seized all the gold and silver and all the utensils found in the house (temple) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and in the treasuries of the king’s house, as well as hostages, and returned to Samaria.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeroboam II Succeeds Jehoash (Joash) in Israel
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now the rest of the acts of Jehoash which he did, and his might and how he fought with Amaziah the king of Judah, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Jehoash slept with his fathers [in death] and was buried in Samaria with the kings of Israel. His son Jeroboam [II] became king in his place.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Azariah (Uzziah) Succeeds Amaziah in Judah
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Amaziah the son of Joash king of Judah lived for fifteen years after the death of Jehoash the son of Jehoahaz king of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The rest of the acts of Amaziah, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now a conspiracy was formed against him in Jerusalem, and Amaziah fled [south] to Lachish; but they sent [men] after him to Lachish and killed him there. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He was twenty-five years old when he became king, and he reigned twenty-nine years in Jerusalem. His mother’s name was Jehoaddin of Jerusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then they carried him on horses and he was buried at Jerusalem with his fathers in the City of David. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And all the people of Judah took Azariah, who was [only] sixteen years old, and made him king in place of his father Amaziah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'He built '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A major port city located on the Gulf of Aqaba.
      marker-yv: yv-n
    - type: text
      text: Elath and restored it to Judah after the king [his father Amaziah] slept with his fathers [in death].
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'In the fifteenth year of Amaziah the son of Joash king of Judah, Jeroboam [II] the son of Joash (Jehoash) king of Israel became king in Samaria, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and reigned
    - type: text
      text: ' forty-one years. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; he did not turn from all the [idolatrous] sins of Jeroboam [I] the son of Nebat, who made Israel sin. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Jeroboam restored Israel’s border from the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An area about a hundred miles north of Damascus.
      marker-yv: yv-n
    - type: text
      text: entrance of Hamath to the Sea of the Arabah (Dead Sea), in accordance with the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, which He spoke through His servant Jonah the son of Amittai, the prophet who was from Gath-hepher. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' saw the affliction (suffering) of Israel as very bitter; there was no one left, bond or free, nor any helper for Israel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had not said that He would blot out the name of Israel from under the heavens, so He saved them by the hand of Jeroboam [II] the son of Joash [king of Israel].'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zechariah Reigns over Israel
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The rest of the acts of Jeroboam [II], all that he did, his might, how he fought, and how he recovered Damascus and Hamath for Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which had belonged
    - type: text
      text: ' to Judah, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Jeroboam [II] slept with his fathers [in death], even with the kings of Israel. Zechariah his son became king in his place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He did right in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', though not like David his father (ancestor). He acted in accordance with everything that his father Joash had done. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'However, the high places were not removed; the people were still sacrificing and burning incense on the high places. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'As soon as the kingdom was firmly in Amaziah’s hand, he executed his servants who had killed his father the king. [2 Kin 12:20] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But he did not put the sons of the murderers to death, in compliance with what is written in the Book of the Law of Moses, in which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded, saying, “The fathers shall not be put to death for the sons, nor shall the sons be put to death for the fathers; but each shall be put to death [only] for his own sin.” [Deut 24:16]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Amaziah killed 10,000 [men] of Edom in the Valley of Salt, and took '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Petra
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Sela (rock) by war, and renamed it Joktheel, to this day.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Amaziah sent messengers to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 12:1.
      marker-yv: yv-n
    - type: text
      text: 'Jehoash (Joash) the son of Jehoahaz, the son of Jehu, king of Israel, saying, “Come, let us face each other [in combat].” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jehoash the king of Israel sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Amaziah king of Judah, saying, “The [little] thorn-bush in Lebanon sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to the [tall] cedar in Lebanon, saying, ‘Give your daughter to my son as wife.’ But a wild beast that was in Lebanon passed by and trampled the thorn-bush. '
