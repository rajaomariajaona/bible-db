  - type: text
    content: ' tongues, how will I benefit you unless I also speak to you [clearly] either by revelation [revealing God’s mystery], or by knowledge [teaching about God], or by prophecy [foretelling the future, speaking a new message from God to the people], or by instruction [teaching precepts that develop spiritual maturity]? '
  '7':
