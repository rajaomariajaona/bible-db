  - type: note
    content: When used elsewhere in the New Testament, in specific reference to a woman (cf Eph 5:22; Col 3:18; Titus 2:4, 5; 1 Peter 3:1, 5), this word refers to a married woman, so these admonitions (vv 34, 35) may be directed primarily to the wives of believing husbands.
  - type: text
    content: 'women should be silent in the churches, for they are not authorized to speak, but are to take a subordinate place, as the Law says. '
  '35':
  - type: text
    content: 'If there is anything they want to learn [that is, if they have questions about anything being said or taught], they are to ask their own husbands at home; for it is improper for a '
  - type: note
    content: Paul does not comment on unmarried women; they probably have to abide by the prohibition against speaking out in church as well, and ask questions outside the service.
  - type: text
    content: 'woman to talk in church. '
  '36':
  - type: text
    content: Did the word of the Lord originate from you [Corinthians], or has it come to you only [so that you know best what God requires]?
  '37':
  - type: text
    content: 'If anyone thinks '
  - type: text
    content: and
  - type: text
    content: ' claims that he is a prophet [a true spokesman for God] or spiritually astute [filled with and energized by the Holy Spirit], let him recognize that the things which I write to you are the Lord’s commandment. '
  '38':
  - type: text
    content: If anyone does not recognize this [that it is a command of the Lord], he is not recognized [by God].
  '39':
  - type: text
    content: 'Therefore, believers, desire earnestly to prophesy [to foretell the future, to speak a new message from God to the people], and do not forbid speaking in '
  - type: text
    content: unknown
  - type: text
    content: ' tongues. '
  '4':
  - type: text
    content: 'One who speaks in a tongue edifies himself; but one who prophesies edifies the church [promotes growth in spiritual wisdom, devotion, holiness, and joy]. '
  '40':
  - type: text
    content: But all things must be done appropriately and in an orderly manner.
  '5':
  - type: text
    content: 'Now I wish that all of you spoke in '
  - type: text
