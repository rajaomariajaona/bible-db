    content: 'Yet '
  - type: text
    content: even
  - type: text
    content: ' lifeless things, whether flute or harp, when producing a sound, if they do not produce distinct [musical] tones, how will anyone [listening] know what is piped or played? '
  '8':
  - type: text
    content: 'And if the [war] bugle produces an indistinct sound, who will prepare himself for battle? '
  '9':
