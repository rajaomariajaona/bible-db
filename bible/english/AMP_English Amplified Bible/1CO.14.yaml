document_id: 1CO.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prophecy a Superior Gift
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pursue [this] love [with eagerness, make it your goal], yet earnestly desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cultivate the spiritual '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gifts
    - type: text
      text: ' [to be used by believers for the benefit of the church], but especially that you may '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In both the Old and the New Testaments, prophets are divinely inspired to foretell the future in the process of delivering God’s word to the people. Paul is saying to the Corinthians that all gifts are worthy and necessary (cf 12:11, 18, 29, 30), but that they should give the gift of prophecy the highest priority (cf Deut 18).
      marker-yv: yv-n
    - type: text
      text: 'prophesy [to foretell the future, to speak a new message from God to the people]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There are, I suppose, a great many kinds of languages in the world [unknown to us], and none is lacking in meaning. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if I do not know the meaning of the language, I will [appear to] be a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: barbarian,
        - type: text
          text: ' i.e. one who did not speak Greek; especially a person from an uncivilized region whose speech could not be readily translated.'
      marker-yv: yv-n
    - type: text
      text: 'foreigner to the one who is speaking [since he knows exactly what he is saying], and the one who is speaking will [appear to] be a foreigner to me. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it is with you, since you are so very eager to have spiritual gifts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' manifestations of the Spirit, strive to excel in ways that will build up the church [spiritually].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore let one who speaks in a tongue pray that he may [be gifted to] translate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' explain [what he says]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if I pray in a tongue, my spirit prays, but my mind is unproductive [because it does not understand what my spirit is praying]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then what am I to do? I will pray with the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: May refer to Paul’s spirit, the Holy Spirit, or the gifts of the Holy Spirit.
      marker-yv: yv-n
    - type: text
      text: 'spirit [by the Holy Spirit that is within me] and I will pray with the mind [using words I understand]; I will sing with the spirit [by the Holy Spirit that is within me] and I will sing with the mind [using words I understand]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Otherwise if you bless [and give thanks to God] in the spirit only, how will any outsider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' someone who is not gifted [in spiritual matters] say the “Amen” [of agreement] to your thanksgiving, since he does not know what you are saying? [1 Chr 16:36; Ps 106:48] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are giving thanks well enough [in a way that God is glorified], but the other person [who does not understand you] is not edified [and spiritually strengthened since he cannot join in your thanksgiving]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I thank God that I speak in [unknown] tongues more than all of you; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nevertheless, in public worship I would rather say five '
    - type: usfm
      marker: it
      children:
      - type: text
        text: understandable
    - type: text
      text: ' words in order to instruct others, than ten thousand words in a tongue [which others cannot understand].'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Instruction for the Church
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For one who speaks in an '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unknown
    - type: text
      text: ' tongue does not speak to people but to God; for no one understands him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' catches his meaning, but by the Spirit he speaks mysteries [secret truths, hidden things]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Brothers and sisters, do not be children [immature, childlike] in your thinking; be infants in [matters of] evil [completely innocent and inexperienced], but in your minds be mature [adults]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It is written in the Law, “B
    - type: usfm
      marker: sc
      children:
      - type: text
        text: y men of strange tongues and by the lips of foreigners
    - type: text
      text: ' I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: will speak to this people
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and not even then will they listen to
    - type: text
      text: ' M'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e
    - type: text
      text: ',” says the Lord. [Is 28:11, 12] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, [unknown] tongues are [meant] for a [supernatural] sign, not to believers but to unbelievers [who might be receptive]; while prophecy [foretelling the future, speaking a new message from God to the people] is not for unbelievers but for believers. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then, if the whole church gathers together and all of you speak in [unknown] tongues, and outsiders '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' those who are not gifted [in spiritual matters] or unbelievers come in, will they not say that you are out of your mind? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if all prophesy [foretelling the future, speaking a new message from God to the people], and an unbeliever or outsider comes in, he is convicted [of his sins] by all, and he is called to account by all [because he can understand what is being said]; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the secrets of his heart are laid bare. And so, falling on his face, he will worship God, declaring that God is really among you.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the right course,
    - type: text
      text: ' believers? When you meet together, each one has a psalm, a teaching, a revelation (disclosure of special knowledge), a tongue, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' an interpretation. Let everything be constructive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' edifying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' done for the good of all the church. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anyone speaks in a tongue, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it should be limited
    - type: text
      text: ' to two or at the most three, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each one speaking
    - type: text
      text: ' in turn, and one must interpret [what is said]. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if there is no one to interpret, the one [who wishes to speak in a tongue] must keep silent in church; let him speak to himself and to God. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let two or three prophets speak [as inspired by the Holy Spirit], while the rest pay attention '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weigh carefully what is said. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But [on the other hand] the one who prophesies speaks to people for edification [to promote their spiritual growth] and [speaks words of] encouragement [to uphold and advise them concerning the matters of God] and [speaks words of] consolation [to compassionately comfort them]. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if an inspired revelation is made to another who is seated, then the first one must be silent. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For [in this way] you can all prophesy one by one, so that everyone may be instructed and everyone may be encouraged; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the spirits of prophets are subject to the prophets [the prophecy is under the speaker’s control, and he can stop speaking]; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for God [who is the source of their prophesying] is not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a God
    - type: text
      text: ' of confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disorder but of peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' order.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: A
    - type: text
      text: s [is the practice] in all the churches of the saints (God’s people),
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: When used elsewhere in the New Testament, in specific reference to a woman (cf Eph 5:22; Col 3:18; Titus 2:4, 5; 1 Peter 3:1, 5), this word refers to a married woman, so these admonitions (vv 34, 35) may be directed primarily to the wives of believing husbands.
      marker-yv: yv-n
    - type: text
      text: 'women should be silent in the churches, for they are not authorized to speak, but are to take a subordinate place, as the Law says. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If there is anything they want to learn [that is, if they have questions about anything being said or taught], they are to ask their own husbands at home; for it is improper for a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul does not comment on unmarried women; they probably have to abide by the prohibition against speaking out in church as well, and ask questions outside the service.
      marker-yv: yv-n
    - type: text
      text: 'woman to talk in church. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Did the word of the Lord originate from you [Corinthians], or has it come to you only [so that you know best what God requires]?
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anyone thinks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' claims that he is a prophet [a true spokesman for God] or spiritually astute [filled with and energized by the Holy Spirit], let him recognize that the things which I write to you are the Lord’s commandment. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If anyone does not recognize this [that it is a command of the Lord], he is not recognized [by God].
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, believers, desire earnestly to prophesy [to foretell the future, to speak a new message from God to the people], and do not forbid speaking in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unknown
    - type: text
      text: ' tongues. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One who speaks in a tongue edifies himself; but one who prophesies edifies the church [promotes growth in spiritual wisdom, devotion, holiness, and joy]. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But all things must be done appropriately and in an orderly manner.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I wish that all of you spoke in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unknown
    - type: text
      text: ' tongues, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' more [I wish] that you would prophesy. The one who prophesies is greater [and more useful] than the one who speaks in tongues, unless he translates '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' explains [what he says], so that the church may '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: receive edification
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: be edified [instructed, improved, strengthened].
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, believers, if I come to you speaking in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unknown
    - type: text
      text: ' tongues, how will I benefit you unless I also speak to you [clearly] either by revelation [revealing God’s mystery], or by knowledge [teaching about God], or by prophecy [foretelling the future, speaking a new message from God to the people], or by instruction [teaching precepts that develop spiritual maturity]? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' lifeless things, whether flute or harp, when producing a sound, if they do not produce distinct [musical] tones, how will anyone [listening] know what is piped or played? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if the [war] bugle produces an indistinct sound, who will prepare himself for battle? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it is with you, if you speak words [in an unknown tongue] that are not intelligible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clear, how will anyone understand what you are saying? You will be talking into the air [wasting your breath]! '
