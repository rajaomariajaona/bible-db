    content: 'But if there is no one to interpret, the one [who wishes to speak in a tongue] must keep silent in church; let him speak to himself and to God. '
  '29':
  - type: text
    content: 'Let two or three prophets speak [as inspired by the Holy Spirit], while the rest pay attention '
  - type: text
    content: and
  - type: text
    content: ' weigh carefully what is said. '
  '3':
  - type: text
    content: 'But [on the other hand] the one who prophesies speaks to people for edification [to promote their spiritual growth] and [speaks words of] encouragement [to uphold and advise them concerning the matters of God] and [speaks words of] consolation [to compassionately comfort them]. '
  '30':
  - type: text
    content: 'But if an inspired revelation is made to another who is seated, then the first one must be silent. '
  '31':
  - type: text
    content: 'For [in this way] you can all prophesy one by one, so that everyone may be instructed and everyone may be encouraged; '
  '32':
  - type: text
    content: 'for the spirits of prophets are subject to the prophets [the prophecy is under the speaker’s control, and he can stop speaking]; '
