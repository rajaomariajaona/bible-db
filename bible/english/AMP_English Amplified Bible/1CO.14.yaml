  - type: text
    content: ' those who are not gifted [in spiritual matters] or unbelievers come in, will they not say that you are out of your mind? '
  '24':
  - type: text
    content: 'But if all prophesy [foretelling the future, speaking a new message from God to the people], and an unbeliever or outsider comes in, he is convicted [of his sins] by all, and he is called to account by all [because he can understand what is being said]; '
  '25':
  - type: text
    content: the secrets of his heart are laid bare. And so, falling on his face, he will worship God, declaring that God is really among you.
  '26':
