  - type: note
    content: In both the Old and the New Testaments, prophets are divinely inspired to foretell the future in the process of delivering God’s word to the people. Paul is saying to the Corinthians that all gifts are worthy and necessary (cf 12:11, 18, 29, 30), but that they should give the gift of prophecy the highest priority (cf Deut 18).
  - type: text
