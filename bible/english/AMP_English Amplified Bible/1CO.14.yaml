    content: 'Therefore, [unknown] tongues are [meant] for a [supernatural] sign, not to believers but to unbelievers [who might be receptive]; while prophecy [foretelling the future, speaking a new message from God to the people] is not for unbelievers but for believers. '
  '23':
  - type: text
    content: 'So then, if the whole church gathers together and all of you speak in [unknown] tongues, and outsiders '
  - type: text
