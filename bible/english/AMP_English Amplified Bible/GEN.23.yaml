document_id: GEN.23,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Death and Burial of Sarah
  - type: text
    content: 'Sarah lived a hundred and twenty-seven years; this was the length of the life of Sarah. '
  '10':
  - type: text
    content: 'Now Ephron was present there among the sons of Heth; so within the hearing of all the sons of Heth and all who were entering the gate of his city, Ephron the Hittite answered Abraham, saying, '
  '11':
  - type: text
    content: '“No, my lord, hear me; I '
  - type: note
    content: This was not an offer to give the land to Abraham as a gift, but part of the negotiating process of the time.
  - type: text
    content: 'give you the [entire] field, and I also give you the cave that is in it. In the presence of the men of my people I give (sell) it to you; bury your dead [there].” '
  '12':
  - type: text
    content: 'Then Abraham bowed down before the people of the land. '
  '13':
  - type: text
    content: 'He said to Ephron in the presence of the people of the land, “If you will only please listen to me '
  - type: text
    content: and
  - type: text
    content: ' accept my offer. I will give you the price of the field; accept it from me and I will bury my dead there.” '
  '14':
  - type: text
    content: 'Ephron replied to Abraham, '
  '15':
  - type: text
    content: '“My lord, listen to me. The land [you seek] is worth four hundred shekels of silver; what is that between you and me? So bury your dead.” '
  '16':
  - type: text
    content: 'So Abraham listened to Ephron [and agreed to his terms]; and he weighed out for Ephron the [amount of] silver which he had named in the hearing of the Hittites: four hundred shekels of silver, according to the weights current among the merchants.'
  '17':
  - type: text
    content: 'So the field of Ephron in Machpelah, which was to the east of Mamre (Hebron)—the field and the cave which was in it, and all the trees that were in the field and in all its borders around it—were deeded over [legally] '
  '18':
  - type: text
    content: 'to Abraham as his possession in the presence of the Hittites, before all who were entering at the gate of his city. '
  '19':
  - type: text
    content: 'After this, Abraham buried Sarah his wife in the cave of the field of '
  - type: note
    content: Here were buried Abraham and Sarah, Isaac and Rebekah, and Jacob and Leah (Gen 49:31; 50:13).
  - type: text
    content: 'Machpelah to the east of Mamre (that is, Hebron) in the land of Canaan. '
  '2':
  - type: text
    content: 'Sarah died in Kiriath-arba '
  - type: note
    content: This comment indicates that the text was written at a very early date, before Israel entered the promised land, because afterward Hebron was well known. Not only was it conspicuous in Joshua’s and Caleb’s day, but it became a “city of refuge.” Besides all this, David was king in Hebron for seven years.
  - type: text
    content: '(that is, Hebron) in the land of Canaan, and Abraham went to mourn for Sarah and to weep for her. '
  '20':
  - type: text
    content: 'The field and the cave in it were deeded over to Abraham by the Hittites as a [permanent] possession '
  - type: text
    content: and
  - type: text
    content: ' burial place.'
  '3':
  - type: text
    content: 'Then Abraham stood up before his dead [wife’s body], and spoke to the '
  - type: note
    content: The Hittites, along with the Egyptians and the Assyrians, were among the great powers in the ancient Middle East. They were famous for their fine horses, many of which were acquired by Solomon through trade. They also discovered and held secret the process of smelting iron when iron was treasured almost as much as gold. These Hittites were of Indo-European origin. The relationship, if any, between these Anatolian Hittites and the descendants of Canaan’s son, Heth, is unclear.
  - type: text
    content: 'sons of Heth (Hittites), saying, '
  '4':
  - type: text
    content: '“I am a stranger and a sojourner (resident alien) among you; give (sell) me property for a burial place among you so that I may bury my dead [in the proper manner].” '
  '5':
  - type: text
    content: 'The Hittites replied to Abraham, '
  '6':
  - type: text
    content: '“Listen to us, my lord; you are a prince of God [a mighty prince] among us; bury your dead in the choicest of our graves; none of us will refuse you his grave '
  - type: text
    content: or
  - type: text
    content: ' hinder you from burying your dead [wife].” '
  '7':
  - type: text
    content: 'So Abraham stood up and bowed to the people of the land, the Hittites. '
  '8':
  - type: text
    content: 'And Abraham said to them, “If you are willing to grant my dead a [proper] burial, listen to me, and plead with Ephron the son of Zohar for me, '
  '9':
  - type: text
    content: 'so that he may give (sell) me the cave of Machpelah which he owns—it is at the end of his field; let him give it to me here in your presence for the full price as a burial site [which I may keep forever among you].” '
