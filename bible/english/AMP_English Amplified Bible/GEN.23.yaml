    - type: text
      text: Death and Burial of Sarah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Sarah lived a hundred and twenty-seven years; this was the length of the life of Sarah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sarah died in Kiriath-arba '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This comment indicates that the text was written at a very early date, before Israel entered the promised land, because afterward Hebron was well known. Not only was it conspicuous in Joshua’s and Caleb’s day, but it became a “city of refuge.” Besides all this, David was king in Hebron for seven years.
    marker-yv: yv-n
  - type: text
    text: '(that is, Hebron) in the land of Canaan, and Abraham went to mourn for Sarah and to weep for her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Abraham stood up before his dead [wife’s body], and spoke to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hittites, along with the Egyptians and the Assyrians, were among the great powers in the ancient Middle East. They were famous for their fine horses, many of which were acquired by Solomon through trade. They also discovered and held secret the process of smelting iron when iron was treasured almost as much as gold. These Hittites were of Indo-European origin. The relationship, if any, between these Anatolian Hittites and the descendants of Canaan’s son, Heth, is unclear.
    marker-yv: yv-n
  - type: text
    text: 'sons of Heth (Hittites), saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“I am a stranger and a sojourner (resident alien) among you; give (sell) me property for a burial place among you so that I may bury my dead [in the proper manner].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The Hittites replied to Abraham, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Listen to us, my lord; you are a prince of God [a mighty prince] among us; bury your dead in the choicest of our graves; none of us will refuse you his grave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hinder you from burying your dead [wife].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Abraham stood up and bowed to the people of the land, the Hittites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Abraham said to them, “If you are willing to grant my dead a [proper] burial, listen to me, and plead with Ephron the son of Zohar for me, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'so that he may give (sell) me the cave of Machpelah which he owns—it is at the end of his field; let him give it to me here in your presence for the full price as a burial site [which I may keep forever among you].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now Ephron was present there among the sons of Heth; so within the hearing of all the sons of Heth and all who were entering the gate of his city, Ephron the Hittite answered Abraham, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“No, my lord, hear me; I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was not an offer to give the land to Abraham as a gift, but part of the negotiating process of the time.
    marker-yv: yv-n
  - type: text
    text: 'give you the [entire] field, and I also give you the cave that is in it. In the presence of the men of my people I give (sell) it to you; bury your dead [there].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Abraham bowed down before the people of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He said to Ephron in the presence of the people of the land, “If you will only please listen to me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accept my offer. I will give you the price of the field; accept it from me and I will bury my dead there.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ephron replied to Abraham, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“My lord, listen to me. The land [you seek] is worth four hundred shekels of silver; what is that between you and me? So bury your dead.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Abraham listened to Ephron [and agreed to his terms]; and he weighed out for Ephron the [amount of] silver which he had named in the hearing of the Hittites: four hundred shekels of silver, according to the weights current among the merchants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So the field of Ephron in Machpelah, which was to the east of Mamre (Hebron)—the field and the cave which was in it, and all the trees that were in the field and in all its borders around it—were deeded over [legally] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'to Abraham as his possession in the presence of the Hittites, before all who were entering at the gate of his city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'After this, Abraham buried Sarah his wife in the cave of the field of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Here were buried Abraham and Sarah, Isaac and Rebekah, and Jacob and Leah (Gen 49:31; 50:13).
    marker-yv: yv-n
  - type: text
    text: 'Machpelah to the east of Mamre (that is, Hebron) in the land of Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The field and the cave in it were deeded over to Abraham by the Hittites as a [permanent] possession '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burial place.'
