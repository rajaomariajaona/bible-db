- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' a new song,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And praise Him in the congregation of His godly ones (believers).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let Israel rejoice in their Maker;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let Zion’s children rejoice in their King. [Zech 9:9; Matt 21:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Let them praise His name with dancing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them sing praises to Him with the tambourine and lyre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' takes pleasure in His people;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will beautify the humble with salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶Let the godly ones exult in glory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them sing for joy on their beds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Let the high praises of God be in their throats,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a two-edged sword in their hands, [Heb 4:12; Rev 1:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: To execute vengeance on the nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: And punishment on the peoples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: To bind their kings with chains
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their nobles with fetters of iron,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: To execute on them the judgment written.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is the honor for all His godly ones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! (Hallelujah!)'
