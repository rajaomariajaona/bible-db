  '1':
  - type: heading
    content: Psalm 149
  - type: heading
    content: Israel Invoked to Praise the Lord.
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '!'
  - type: text
    content: Sing to the L
  - type: heading
    content: ord
  - type: text
    content: ' a new song,'
  - type: text
    content: And praise Him in the congregation of His godly ones (believers).
  '2':
  - type: text
    content: Let Israel rejoice in their Maker;
  - type: text
    content: Let Zion’s children rejoice in their King. [Zech 9:9; Matt 21:5]
  '3':
  - type: text
    content: Let them praise His name with dancing;
  - type: text
    content: Let them sing praises to Him with the tambourine and lyre.
  '4':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' takes pleasure in His people;'
  - type: text
    content: He will beautify the humble with salvation.
  '5':
  - type: text
    content: ¶Let the godly ones exult in glory;
  - type: text
    content: Let them sing for joy on their beds.
  '6':
  - type: text
    content: Let the high praises of God be in their throats,
  - type: text
    content: And a two-edged sword in their hands, [Heb 4:12; Rev 1:16]
  '7':
  - type: text
    content: To execute vengeance on the nations
  - type: text
    content: And punishment on the peoples,
  '8':
  - type: text
    content: To bind their kings with chains
  - type: text
    content: And their nobles with fetters of iron,
  '9':
  - type: text
    content: To execute on them the judgment written.
  - type: text
    content: This is the honor for all His godly ones.
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! (Hallelujah!)'
