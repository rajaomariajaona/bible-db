      - type: text
        text: A ruler or nobleman traveling in the wilderness would have a crew of workmen preparing and clearing the road ahead of him. In spiritual terms, John the Baptist was clearing the way for the arrival of the Messiah by preparing the hearts of his followers.
    marker-yv: yv-n
