    content: The Preaching of John the Baptist
  - type: text
    content: 'The beginning of the [facts regarding the] good news of '
  - type: note
    content: Mark’s gospel is believed to be directed primarily to Gentile believers in Rome. Since Gentiles would not necessarily be familiar with the Jewish title Messiah, he emphasizes instead the fact that Jesus is the Son of God.
  - type: text
    content: Jesus Christ, the Son of God.
  '10':
  - type: note
    content: Mark uses the word “immediately” almost forty times in his gospel.
  - type: text
    content: 'Immediately coming up out of the water, he (John) saw the heavens torn open, and the '
  - type: note
