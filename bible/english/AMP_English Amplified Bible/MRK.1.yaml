  '16':
  - type: text
    content: 'As Jesus was walking by the shore of the '
  - type: note
    content: A fresh water lake about 13 miles long and 7 miles wide, almost 700 feet below sea level and center of a busy fishing industry.
  - type: text
    content: 'Sea of Galilee, He saw Simon [Peter] and Simon’s brother, '
  - type: note
    content: One of the followers of John the Baptist (John 1:40).
  - type: text
    content: 'Andrew, casting a net in the sea; for they were fishermen. '
  '17':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: “
  - type: note
    content: 'The concept of “follow” can represent three separate possibilities: in the early stages of His ministry, (1) walking with Him physically (literally), that is merely being in His presence regardless of personal belief or commitment; (2) accepting and identifying with the salvation He offered; and later on (3) being identified with Him by being subject to the scorn and rejection of unbelievers because of personal belief and commitment to Him.'
  - type: text
    content: Follow Me
  - type: text
    content: ' [as My disciples, accepting Me as your Master and Teacher and walking the same path of life that I walk], '
  - type: text
    content: and I will make you fishers of men.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Immediately they left their nets and followed Him [becoming His disciples, believing and trusting in Him and following His example]. '
  '19':
  - type: text
    content: 'Going on a little farther, He saw James the son of Zebedee, and his brother John, who were also in the boat mending '
  - type: text
    content: and
  - type: text
    content: ' cleaning the nets. '
