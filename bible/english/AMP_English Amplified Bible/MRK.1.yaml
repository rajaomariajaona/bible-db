    content: 'Immediately the [Holy] Spirit forced Him out into the wilderness. '
  '13':
  - type: text
    content: 'He was in the wilderness forty days being tempted [to do evil] by Satan; and He was with the wild animals, and the angels ministered '
  - type: text
