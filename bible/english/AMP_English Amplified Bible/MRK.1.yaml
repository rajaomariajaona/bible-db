  '30':
  - type: text
    content: 'Now Simon’s mother-in-law was lying sick with a fever; and immediately they told Him about her. '
  '31':
  - type: text
    content: 'Jesus went to her, and taking her by the hand, raised her up; and the fever left her, and she '
  - type: text
    content: began
  - type: text
    content: ' to serve them [as her guests].'
  '32':
  - type: text
    content: 'Now when evening came, after the sun had set [and the Sabbath Day had ended, in a steady stream] they were bringing to Him all who were sick and those who were under the power of demons, '
  '33':
  - type: text
    content: 'until the whole city had gathered together at the door. '
  '34':
  - type: text
    content: And Jesus healed many who were suffering with various diseases; and He drove out many demons, but would not allow the demons to speak, because they knew Him [recognizing Him as the Son of God].
  '35':
  - type: text
    content: 'Early in the morning, while it was still dark, Jesus got up, left [the house], and went out to a secluded place, and was praying there. '
  '36':
  - type: text
    content: 'Simon [Peter] and his companions searched [everywhere, looking anxiously] for Him, '
  '37':
  - type: text
    content: 'and they found Him and said, “Everybody is looking for You!” '
  '38':
  - type: text
    content: 'He replied, '
  - type: text
    content: “Let us go on to the neighboring towns, so I may preach there also; that is why I came
  - type: text
    content: ' [from the Father].” '
  '39':
  - type: text
    content: So He went throughout Galilee, preaching [the gospel] in their synagogues and casting out demons.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Considered the last of the Old Testament prophets, John the Baptist was the son of Zecharias (Zechariah) the priest and his wife, Elizabeth. Elizabeth and Mary, the mother of Jesus, were related (Luke 1:36), and Mary may have been with Elizabeth at the time John was born (Luke 1:56). John the Baptist is not to be confused with John the Apostle who, along with his brother James, was among the twelve disciples of Jesus.
  - type: text
    content: 'John the Baptist appeared in the wilderness preaching a baptism of repentance for the forgiveness of sins [that is, requiring a change of one’s old way of thinking, turning away from sin and seeking God and His righteousness]. '
  '40':
  - type: text
    content: 'And a leper came to Him, begging Him and falling on his knees before Him, saying, “If You are willing, You are able to make me '
  - type: note
    content: Lepers were ceremonially unclean according to OT law (Lev 13:45, etc.) and were not to come into physical contact with other people. The leper’s request was the same as asking for healing.
  - type: text
    content: 'clean.” [Matt 8:2-4; Luke 5:12-14] '
  '41':
  - type: text
    content: 'Moved with compassion [for his suffering], Jesus reached out with His hand and touched him, and said to him, '
  - type: text
    content: “I am willing; be cleansed.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'The leprosy left him immediately and he was cleansed [completely healed and restored to health]. '
  '43':
  - type: text
    content: 'And Jesus [deeply moved] admonished him sternly and sent him away immediately, '
  '44':
  - type: text
    content: 'saying to him, '
  - type: text
    content: “See that you tell no one anything
  - type: text
    content: ' [about this]; '
  - type: text
    content: but go, show yourself to the priest and offer for your purification what Moses commanded, as proof to them
  - type: text
    content: ' [that you are really healed].” [Lev 13:45; 14:2-32] '
  '45':
  - type: text
    content: But he went out and began to proclaim it freely and to spread the news [of his healing], to such an extent that Jesus could no longer openly enter a city [where He was known], but stayed out in the unpopulated places; yet people were still coming to Him from everywhere.
  '5':
  - type: text
    content: 'And all the country of Judea and all the people of Jerusalem were '
  - type: text
    content: continually
  - type: text
    content: ' going out to him; and they were being baptized by him in the Jordan River, as they confessed their sins. '
  '6':
  - type: text
    content: 'John wore clothing made of camel’s hair and had a [wide] leather '
  - type: note
    content: This band (sash, girdle) was about six inches wide and had clasps or fasteners in front. It was used to carry personal items such as a dagger, money or other necessary things.
  - type: text
    content: 'band around his waist, and he ate locusts and wild honey. [Lev 11:22; 2 Kin 1:8] '
  '7':
  - type: text
    content: 'And he was preaching, saying, “After me comes He who is mightier [more powerful, more noble] than I, and I am not worthy to stoop down and untie the straps of His sandals [even as His slave]. '
  '8':
  - type: text
    content: 'As for me, I baptized you [who came to me] with water [only]; but He will baptize you [who truly repent] '
  - type: note
    content: The Greek here can be translated with, in, or by.
  - type: text
    content: with the Holy Spirit.”
  - type: heading
    content: The Baptism of Jesus
  '9':
  - type: text
    content: 'In those days Jesus came from Nazareth of Galilee and was baptized by John in the Jordan. [Matt 3:13-17; Luke 3:21, 22; John 1:32] '
