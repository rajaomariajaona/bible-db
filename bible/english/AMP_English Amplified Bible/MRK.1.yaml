  '20':
  - type: text
    content: Immediately Jesus called to them; and they left their father Zebedee in the boat with the hired workers, and went away to follow Him [becoming His disciples, believing and trusting in Him and following His example].
  '21':
  - type: text
    content: 'They went into Capernaum, and immediately on the Sabbath Jesus went into the synagogue and '
  - type: text
    content: began
  - type: text
    content: ' to teach. [Luke 4:31-37] '
  '22':
  - type: text
    content: 'They were completely amazed at His teaching; because He was teaching them as one having [God-given] authority, and not as the scribes. '
  '23':
  - type: text
    content: 'Just then there was a man in their synagogue with an unclean spirit; and he cried out [terribly from the depths of his throat], '
  '24':
  - type: text
    content: saying, “
  - type: note
    content: Lit What to me and to you, originally a Hebrew idiom which does not translate well into English. The idiom is meant to inform the other person that the speaker is not aware of any obligation between them and does not wish to deal with the other person (cf 2 Sam 16:10).
  - type: text
    content: 'What business do You have with us, Jesus of Nazareth? Have You come to destroy us? I know who You are—the Holy One of God!” '
  '25':
  - type: text
    content: 'Jesus rebuked him, saying, '
  - type: text
    content: “Be quiet (muzzled, silenced), and come out of him!”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'The unclean spirit threw the man into convulsions, and screeching with a loud voice, came out of him. '
  '27':
  - type: text
    content: 'They were all so amazed that they debated '
  - type: text
    content: and
  - type: text
    content: ' questioned each other, saying, “What is this? A new teaching with authority! He commands even the unclean spirits (demons), and they obey Him.” '
  '28':
  - type: text
    content: Immediately the news about Him spread everywhere throughout the district surrounding Galilee.
  - type: heading
    content: Healing the Crowds
  '29':
  - type: text
    content: 'And immediately they left the synagogue and went into the house of Simon [Peter] and Andrew, accompanied by James and John. [Matt 8:14-17; Luke 4:38-41] '
  '3':
  - type: text
    content: 'A '
  - type: heading
    content: voice of one shouting in the wilderness
  - type: text
    content: ','
  - type: text
