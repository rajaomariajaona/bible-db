    - type: usfm
      marker: ft
      children:
      - type: text
        text: Considered the last of the Old Testament prophets, John the Baptist was the son of Zecharias (Zechariah) the priest and his wife, Elizabeth. Elizabeth and Mary, the mother of Jesus, were related (Luke 1:36), and Mary may have been with Elizabeth at the time John was born (Luke 1:56). John the Baptist is not to be confused with John the Apostle who, along with his brother James, was among the twelve disciples of Jesus.
    marker-yv: yv-n
  - type: text
    text: 'John the Baptist appeared in the wilderness preaching a baptism of repentance for the forgiveness of sins [that is, requiring a change of one’s old way of thinking, turning away from sin and seeking God and His righteousness]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And all the country of Judea and all the people of Jerusalem were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' going out to him; and they were being baptized by him in the Jordan River, as they confessed their sins. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'John wore clothing made of camel’s hair and had a [wide] leather '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This band (sash, girdle) was about six inches wide and had clasps or fasteners in front. It was used to carry personal items such as a dagger, money or other necessary things.
    marker-yv: yv-n
  - type: text
    text: 'band around his waist, and he ate locusts and wild honey. [Lev 11:22; 2 Kin 1:8] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he was preaching, saying, “After me comes He who is mightier [more powerful, more noble] than I, and I am not worthy to stoop down and untie the straps of His sandals [even as His slave]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'As for me, I baptized you [who came to me] with water [only]; but He will baptize you [who truly repent] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek here can be translated '
      - type: usfm
        marker: it
        children:
        - type: text
          text: with
      - type: text
        text: ', '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in
      - type: text
        text: ', or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: by
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: with the Holy Spirit.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Baptism of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In those days Jesus came from Nazareth of Galilee and was baptized by John in the Jordan. [Matt 3:13-17; Luke 3:21, 22; John 1:32] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mark uses the word “immediately” almost forty times in his gospel.
    marker-yv: yv-n
  - type: text
    text: 'Immediately coming up out of the water, he (John) saw the heavens torn open, and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The three persons of the Godhead were present: the Father, the Son, and the Holy Spirit.'
    marker-yv: yv-n
  - type: text
    text: 'Spirit like a dove descending on Him (Jesus); '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 3:17.
    marker-yv: yv-n
  - type: text
    text: 'voice came out of heaven saying: “You are My beloved Son, in You I am well-pleased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delighted!” [Ps 2:7; Is 42:1]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Immediately the [Holy] Spirit forced Him out into the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He was in the wilderness forty days being tempted [to do evil] by Satan; and He was with the wild animals, and the angels ministered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' to Him.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Preaches in Galilee
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now after John [the Baptist] was arrested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf 6:17 ff.
    marker-yv: yv-n
  - type: text
    text: 'taken into custody, Jesus went to Galilee, preaching the good news of [the kingdom of] God, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The
  - type: text
    text: ' [appointed period of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: time is fulfilled, and the kingdom of God is at hand; repent
  - type: text
    text: ' [change your inner self—your old way of thinking, regret past sins, live your life in a way that proves repentance; seek God’s purpose for your life] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and believe
  - type: text
    text: ' [with a deep, abiding trust] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in the good news
  - type: text
    text: ' [regarding salvation].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'As Jesus was walking by the shore of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A fresh water lake about 13 miles long and 7 miles wide, almost 700 feet below sea level and center of a busy fishing industry.
    marker-yv: yv-n
  - type: text
    text: 'Sea of Galilee, He saw Simon [Peter] and Simon’s brother, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One of the followers of John the Baptist (John 1:40).
    marker-yv: yv-n
  - type: text
    text: 'Andrew, casting a net in the sea; for they were fishermen. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The concept of “follow” can represent three separate possibilities: in the early stages of His ministry, (1) walking with Him physically (literally), that is merely being in His presence regardless of personal belief or commitment; (2) accepting and identifying with the salvation He offered; and later on (3) being identified with Him by being subject to the scorn and rejection of unbelievers because of personal belief and commitment to Him.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Follow Me
  - type: text
    text: ' [as My disciples, accepting Me as your Master and Teacher and walking the same path of life that I walk], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and I will make you fishers of men.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Immediately they left their nets and followed Him [becoming His disciples, believing and trusting in Him and following His example]. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Going on a little farther, He saw James the son of Zebedee, and his brother John, who were also in the boat mending '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cleaning the nets. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Immediately Jesus called to them; and they left their father Zebedee in the boat with the hired workers, and went away to follow Him [becoming His disciples, believing and trusting in Him and following His example].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They went into Capernaum, and immediately on the Sabbath Jesus went into the synagogue and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to teach. [Luke 4:31-37] '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'They were completely amazed at His teaching; because He was teaching them as one having [God-given] authority, and not as the scribes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Just then there was a man in their synagogue with an unclean spirit; and he cried out [terribly from the depths of his throat], '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: saying, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: What to me and to you,
      - type: text
        text: ' originally a Hebrew idiom which does not translate well into English. The idiom is meant to inform the other person that the speaker is not aware of any obligation between them and does not wish to deal with the other person (cf 2 Sam 16:10).'
    marker-yv: yv-n
  - type: text
    text: 'What business do You have with us, Jesus of Nazareth? Have You come to destroy us? I know who You are—the Holy One of God!” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus rebuked him, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be quiet (muzzled, silenced), and come out of him!”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The unclean spirit threw the man into convulsions, and screeching with a loud voice, came out of him. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They were all so amazed that they debated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' questioned each other, saying, “What is this? A new teaching with authority! He commands even the unclean spirits (demons), and they obey Him.” '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Immediately the news about Him spread everywhere throughout the district surrounding Galilee.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Healing the Crowds
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And immediately they left the synagogue and went into the house of Simon [Peter] and Andrew, accompanied by James and John. [Matt 8:14-17; Luke 4:38-41] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now Simon’s mother-in-law was lying sick with a fever; and immediately they told Him about her. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jesus went to her, and taking her by the hand, raised her up; and the fever left her, and she '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to serve them [as her guests].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now when evening came, after the sun had set [and the Sabbath Day had ended, in a steady stream] they were bringing to Him all who were sick and those who were under the power of demons, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'until the whole city had gathered together at the door. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And Jesus healed many who were suffering with various diseases; and He drove out many demons, but would not allow the demons to speak, because they knew Him [recognizing Him as the Son of God].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Early in the morning, while it was still dark, Jesus got up, left [the house], and went out to a secluded place, and was praying there. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Simon [Peter] and his companions searched [everywhere, looking anxiously] for Him, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and they found Him and said, “Everybody is looking for You!” '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'He replied, '
