      - type: text
        text: The Preaching of John the Baptist
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The beginning of the [facts regarding the] good news of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mark’s gospel is believed to be directed primarily to Gentile believers in Rome. Since Gentiles would not necessarily be familiar with the Jewish title '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Messiah,
        - type: text
          text: ' he emphasizes instead the fact that Jesus is the Son of God.'
      marker-yv: yv-n
    - type: text
      text: Jesus Christ, the Son of God.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mark uses the word “immediately” almost forty times in his gospel.
      marker-yv: yv-n
    - type: text
      text: 'Immediately coming up out of the water, he (John) saw the heavens torn open, and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The three persons of the Godhead were present: the Father, the Son, and the Holy Spirit.'
      marker-yv: yv-n
    - type: text
      text: 'Spirit like a dove descending on Him (Jesus); '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Matt 3:17.
      marker-yv: yv-n
    - type: text
      text: 'voice came out of heaven saying: “You are My beloved Son, in You I am well-pleased '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delighted!” [Ps 2:7; Is 42:1]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately the [Holy] Spirit forced Him out into the wilderness. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was in the wilderness forty days being tempted [to do evil] by Satan; and He was with the wild animals, and the angels ministered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' to Him.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Preaches in Galilee
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now after John [the Baptist] was arrested '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf 6:17 ff.
      marker-yv: yv-n
    - type: text
      text: 'taken into custody, Jesus went to Galilee, preaching the good news of [the kingdom of] God, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The
    - type: text
      text: ' [appointed period of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: time is fulfilled, and the kingdom of God is at hand; repent
    - type: text
      text: ' [change your inner self—your old way of thinking, regret past sins, live your life in a way that proves repentance; seek God’s purpose for your life] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and believe
    - type: text
      text: ' [with a deep, abiding trust] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in the good news
    - type: text
      text: ' [regarding salvation].”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus was walking by the shore of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A fresh water lake about 13 miles long and 7 miles wide, almost 700 feet below sea level and center of a busy fishing industry.
      marker-yv: yv-n
    - type: text
      text: 'Sea of Galilee, He saw Simon [Peter] and Simon’s brother, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of the followers of John the Baptist (John 1:40).
      marker-yv: yv-n
    - type: text
      text: 'Andrew, casting a net in the sea; for they were fishermen. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The concept of “follow” can represent three separate possibilities: in the early stages of His ministry, (1) walking with Him physically (literally), that is merely being in His presence regardless of personal belief or commitment; (2) accepting and identifying with the salvation He offered; and later on (3) being identified with Him by being subject to the scorn and rejection of unbelievers because of personal belief and commitment to Him.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Follow Me
    - type: text
      text: ' [as My disciples, accepting Me as your Master and Teacher and walking the same path of life that I walk], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and I will make you fishers of men.”
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately they left their nets and followed Him [becoming His disciples, believing and trusting in Him and following His example]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Going on a little farther, He saw James the son of Zebedee, and his brother John, who were also in the boat mending '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cleaning the nets. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is written '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forever remains in the [writings of the] prophet Isaiah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “B
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ehold
    - type: text
      text: ', I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: send
    - type: text
      text: ' M'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: y messenger ahead of
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: W
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ho will prepare
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: our way—
    - type: text
      text: ' [Mal 3:1]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Immediately Jesus called to them; and they left their father Zebedee in the boat with the hired workers, and went away to follow Him [becoming His disciples, believing and trusting in Him and following His example].
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went into Capernaum, and immediately on the Sabbath Jesus went into the synagogue and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to teach. [Luke 4:31-37] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were completely amazed at His teaching; because He was teaching them as one having [God-given] authority, and not as the scribes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then there was a man in their synagogue with an unclean spirit; and he cried out [terribly from the depths of his throat], '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: saying, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: What to me and to you,
        - type: text
          text: ' originally a Hebrew idiom which does not translate well into English. The idiom is meant to inform the other person that the speaker is not aware of any obligation between them and does not wish to deal with the other person (cf 2 Sam 16:10).'
      marker-yv: yv-n
    - type: text
      text: 'What business do You have with us, Jesus of Nazareth? Have You come to destroy us? I know who You are—the Holy One of God!” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus rebuked him, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be quiet (muzzled, silenced), and come out of him!”
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The unclean spirit threw the man into convulsions, and screeching with a loud voice, came out of him. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were all so amazed that they debated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' questioned each other, saying, “What is this? A new teaching with authority! He commands even the unclean spirits (demons), and they obey Him.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Immediately the news about Him spread everywhere throughout the district surrounding Galilee.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Healing the Crowds
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And immediately they left the synagogue and went into the house of Simon [Peter] and Andrew, accompanied by James and John. [Matt 8:14-17; Luke 4:38-41] '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: voice of one shouting in the wilderness
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘P
    - type: usfm
      marker: sc
      children:
      - type: text
        text: repare the way of the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A ruler or nobleman traveling in the wilderness would have a crew of workmen preparing and clearing the road ahead of him. In spiritual terms, John the Baptist was clearing the way for the arrival of the Messiah by preparing the hearts of his followers.
      marker-yv: yv-n
    - type: text
      text: M
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ake
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: is paths straight
    - type: text
      text: '!’ ” [Is 40:3]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Simon’s mother-in-law was lying sick with a fever; and immediately they told Him about her. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus went to her, and taking her by the hand, raised her up; and the fever left her, and she '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to serve them [as her guests].'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when evening came, after the sun had set [and the Sabbath Day had ended, in a steady stream] they were bringing to Him all who were sick and those who were under the power of demons, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'until the whole city had gathered together at the door. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jesus healed many who were suffering with various diseases; and He drove out many demons, but would not allow the demons to speak, because they knew Him [recognizing Him as the Son of God].
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Early in the morning, while it was still dark, Jesus got up, left [the house], and went out to a secluded place, and was praying there. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon [Peter] and his companions searched [everywhere, looking anxiously] for Him, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they found Him and said, “Everybody is looking for You!” '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let us go on to the neighboring towns, so I may preach there also; that is why I came
    - type: text
      text: ' [from the Father].” '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So He went throughout Galilee, preaching [the gospel] in their synagogues and casting out demons.
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Considered the last of the Old Testament prophets, John the Baptist was the son of Zecharias (Zechariah) the priest and his wife, Elizabeth. Elizabeth and Mary, the mother of Jesus, were related (Luke 1:36), and Mary may have been with Elizabeth at the time John was born (Luke 1:56). John the Baptist is not to be confused with John the Apostle who, along with his brother James, was among the twelve disciples of Jesus.
      marker-yv: yv-n
    - type: text
      text: 'John the Baptist appeared in the wilderness preaching a baptism of repentance for the forgiveness of sins [that is, requiring a change of one’s old way of thinking, turning away from sin and seeking God and His righteousness]. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a leper came to Him, begging Him and falling on his knees before Him, saying, “If You are willing, You are able to make me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lepers were ceremonially unclean according to OT law (Lev 13:45, etc.) and were not to come into physical contact with other people. The leper’s request was the same as asking for healing.
      marker-yv: yv-n
    - type: text
      text: 'clean.” [Matt 8:2-4; Luke 5:12-14] '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moved with compassion [for his suffering], Jesus reached out with His hand and touched him, and said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am willing; be cleansed.”
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leprosy left him immediately and he was cleansed [completely healed and restored to health]. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus [deeply moved] admonished him sternly and sent him away immediately, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “See that you tell no one anything
    - type: text
      text: ' [about this]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but go, show yourself to the priest and offer for your purification what Moses commanded, as proof to them
    - type: text
      text: ' [that you are really healed].” [Lev 13:45; 14:2-32] '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he went out and began to proclaim it freely and to spread the news [of his healing], to such an extent that Jesus could no longer openly enter a city [where He was known], but stayed out in the unpopulated places; yet people were still coming to Him from everywhere.
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And all the country of Judea and all the people of Jerusalem were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' going out to him; and they were being baptized by him in the Jordan River, as they confessed their sins. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'John wore clothing made of camel’s hair and had a [wide] leather '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This band (sash, girdle) was about six inches wide and had clasps or fasteners in front. It was used to carry personal items such as a dagger, money or other necessary things.
      marker-yv: yv-n
    - type: text
      text: 'band around his waist, and he ate locusts and wild honey. [Lev 11:22; 2 Kin 1:8] '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And he was preaching, saying, “After me comes He who is mightier [more powerful, more noble] than I, and I am not worthy to stoop down and untie the straps of His sandals [even as His slave]. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As for me, I baptized you [who came to me] with water [only]; but He will baptize you [who truly repent] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek here can be translated '
        - type: usfm
          marker: it
          children:
          - type: text
            text: with
        - type: text
          text: ', '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in
        - type: text
          text: ', or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: by
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: with the Holy Spirit.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Baptism of Jesus
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days Jesus came from Nazareth of Galilee and was baptized by John in the Jordan. [Matt 3:13-17; Luke 3:21, 22; John 1:32] '
