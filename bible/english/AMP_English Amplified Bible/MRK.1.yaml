      - type: text
        text: Lepers were ceremonially unclean according to OT law (Lev 13:45, etc.) and were not to come into physical contact with other people. The leper’s request was the same as asking for healing.
    marker-yv: yv-n
  - type: text
    text: 'clean.” [Matt 8:2-4; Luke 5:12-14] '
  - type: usfm
