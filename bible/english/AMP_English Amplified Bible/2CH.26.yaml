document_id: 2CH.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Uzziah Succeeds Amaziah in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then all the people of Judah took Uzziah, who was sixteen years old, and made him king in place of his father Amaziah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He built Eloth and restored it to Judah after the king [Amaziah] slept with his fathers [in death]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Uzziah was sixteen years old when he became king, and he reigned fifty-two years in Jerusalem. His mother’s name was Jechiliah of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He did right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in accordance with everything that his father Amaziah had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He continued to seek God in the days of Zechariah, who had understanding '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Many mss read '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in the fear of God
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: through the vision of God; and as long as he sought (inquired of, longing for) the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', God caused him to prosper.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Uzziah Succeeds in War
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He went out and made war against the Philistines, and broke through the wall of Gath, the wall of Jabneh, and the wall of Ashdod; and he built cities near Ashdod and [elsewhere] among the Philistines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'God helped him against the Philistines, and against the Arabs who lived in Gur-baal, and the Meunites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The Ammonites paid tribute (money) to Uzziah, and his fame spread abroad, even as far as the border of Egypt, for he became very strong. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Uzziah also built towers in Jerusalem at the Corner Gate, the Valley Gate, and at the corner buttress [of the wall], and fortified them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He also built towers in the wilderness and dug many cisterns, for he had a great deal of livestock, both in the lowlands and in the plain. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He also had
  - type: text
    text: ' farmers and vinedressers in the hill country and in the fertile fields, for he loved the soil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moreover, Uzziah had an army ready for battle, which went into combat by divisions according to the number of their muster as recorded by Jeiel the scribe and Maaseiah the official, under the direction of Hananiah, one of the king’s commanders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The total number of the heads of the fathers’ households, of valiant men, was 2,600. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Under their command was an army of 307,500, who could wage war with great power, to help the king against the enemy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Moreover, Uzziah prepared shields, spears, helmets, body armor, bows, and sling stones for the entire army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: In Jerusalem he made machines of war invented by skillful men to be put on the towers and on the [corner] battlements for the purpose of shooting arrows and large stones. And his fame spread far, for he was marvelously helped until he was strong.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Pride Is Uzziah’s Undoing
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But when Uzziah became strong, he became so proud [of himself and his accomplishments] that he acted corruptly, and he was unfaithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sinned against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God, for he went '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Only priests were permitted to enter the temple proper and perform such ceremonies.
    marker-yv: yv-n
  - type: text
    text: into the temple of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to burn incense on the altar of incense. [Num 3:38] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then Azariah the priest went in after him, and with him eighty priests of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', men of courage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They opposed King Uzziah and said to him, “It is not for you, Uzziah, to burn incense to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', but for the priests, the sons of Aaron who have been consecrated to burn incense. Get out of the sanctuary, for you have been unfaithful and will have no honor from the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Uzziah, with a censer in his hand to burn incense, was enraged; and while he was enraged with the priests, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or possibly '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a skin disease,
      - type: text
        text: ' because the Hebrew word is a general term that can refer to true leprosy (Hansen’s disease) or lesser skin diseases. In any case, it was a severe judgment from God because the disease rendered Uzziah ceremonially unclean, limiting his contact with other people and banning him from participation in worship services (see v 21).'
    marker-yv: yv-n
  - type: text
    text: leprosy broke out on his forehead before the priests in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', beside the incense altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: As Azariah the chief priest and all the priests looked toward him, behold, he was leprous on his forehead; and they hurried him out of there, and he also hurried to get out because the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had stricken him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: King Uzziah was a leper to the day of his death; and, being a leper, he lived in a separate house, for he was excluded from the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. And his son Jotham took charge of the king’s household, judging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' governing the people of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now the rest of the acts of Uzziah, from the first to the last, Isaiah the prophet, the son of Amoz, has written. [Is 1:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So Uzziah slept with his fathers [in death], and they buried him with his fathers in the burial field of the kings [outside the royal tombs], for they said, “He is a leper.” And his son Jotham became king in his place.
