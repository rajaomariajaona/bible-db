document_id: 1SA.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David Protected from Saul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Saul told his son Jonathan and all his servants to kill David, but Jonathan, Saul’s son, greatly delighted in David. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So he told David, “Saul my father is seeking to kill you. Now then, please be on guard in the morning, and stay in a secret place and hide yourself. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As for me, I will go out and stand beside my father in the field where you are, and I will speak with my father about you, and if I learn anything, then I will tell you.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Jonathan spoke well of David to Saul his father and said to him, “May the king not sin against his servant David, since he has not sinned against you, and since his deeds have been very beneficial to you. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For he took his life in his hand and killed the Philistine, and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brought about a great victory for all Israel; you saw it and rejoiced. Why then would you sin against innocent blood by killing David without a cause?” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Saul listened to Jonathan and swore [an oath], “As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, he shall not be put to death.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Jonathan called David and told him all these things. And Jonathan brought David to Saul, and he was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: before his face.
      - type: text
        text: ' This is often used as an idiom meaning “to serve in a special capacity.”'
    marker-yv: yv-n
  - type: text
    text: in his presence [serving him] as previously.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then there was war again, and David went out and fought with the Philistines and defeated them with a great slaughter, and they fled before him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then an evil spirit from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came on Saul as he was sitting in his house with his spear in his hand, and David was playing the harp with his hand. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Saul tried to pin David to the wall with the spear, but he escaped from Saul’s presence, so that Saul only stuck the spear into the wall. Then David fled and escaped that night.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Saul sent messengers to David’s house to watch for him, so that he might kill him in the morning. But Michal, David’s wife, told him, “If you do not save your life tonight, tomorrow you will be killed.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So Michal let David down through the window, and he fled and escaped. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Michal took the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exactly what this was is not known, but the Hebrew word (
      - type: usfm
        marker: it
        children:
        - type: text
          text: teraphim)
      - type: text
        text: ' is the usual one to refer to household idols. It could have been an image bequeathed by Saul to Michal, perhaps indicative of Saul’s lapse from God, or just a spoil of war with no meaning for the Israelites. In any case, it appears to have been an image or idol about the size of a man, since Michal is able to use it as a ruse to trick Saul’s messengers (v 14).'
    marker-yv: yv-n
  - type: text
    text: 'household idol and laid it on the bed, put a pillow of goats’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hair
  - type: text
    text: ' at its head, and covered it with clothes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when Saul sent messengers to take David, she said, “He is sick.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Saul sent the messengers [again] to see David, saying, “Bring him up to me on his bed [if necessary], so that I may kill him.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the messengers came in, there was the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 13.
    marker-yv: yv-n
  - type: text
    text: 'household idol on the bed with a quilt of goats’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hair
  - type: text
    text: ' at its head. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Saul said to Michal, “Why have you deceived me like this and let my enemy go, so that he has escaped?” Michal answered Saul, “He said to me, ‘Let me go! Why should I kill you?’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So David fled and escaped and came to Samuel at Ramah, and told him everything that Saul had done to him. And he and Samuel went and stayed in Naioth. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Saul was told, “David is at Naioth in Ramah.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Saul sent messengers to take David; but when they saw the group of prophets prophesying, and Samuel standing and presiding over them, the Spirit of God came on the messengers of Saul; and they also prophesied. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When Saul was informed, he sent other messengers, and they also prophesied. So Saul sent messengers again, the third time, and they prophesied as well. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Saul went to Ramah himself and came to the great well that is in Secu; and he asked, “Where are Samuel and David?” And he was told, “They are at Naioth [with the prophets] in Ramah.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So he went on to Naioth in Ramah; and the Spirit of God came upon him too, and he went along continually prophesying until he came to Naioth in Ramah. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He also took off his [royal] robes [and armor] and prophesied before Samuel and lay down naked all that day and night. So they say, “Is Saul also among the prophets?” [1 Sam 10:10]
