document_id: HOS.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The People’s Apostasy Rebuked
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay close attention, O priests!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give heed, O house of Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, O house of the king!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the [pronounced] judgment pertains to you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is meant for you to hear,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you have been a snare at Mizpah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a net spread out over Tabor (military strongholds on either side of the Jordan River).
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The princes of Judah are like those who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. like an official changing the laws of what is right and what is wrong by changing the legal standards.
      marker-yv: yv-n
    - type: text
      text: 'move a boundary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: marker;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pour out My wrath on them like [an unrestrained flood of] water. [Deut 19:14; Prov 22:28]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ephraim is oppressed; he is broken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crushed by [divine] judgment,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because he was determined to follow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man’s
    - type: text
      text: ' command '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '“Vanities” is the rendering of '
        - type: usfm
          marker: it
          children:
          - type: text
            text: The Septuagint
        - type: text
          text: ' (Greek translation of the Old Testament); “filth,” the rendering of the DSS.'
      marker-yv: yv-n
    - type: text
      text: (vanities, filth, secular precepts).
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I am like a moth to Ephraim
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like dry rot to the house of Judah [in My judgment against them].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When Ephraim saw his sickness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Judah his wound,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then Ephraim went to Assyria [instead of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ']'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sent to [Assyria’s] great King Jareb [for help].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he cannot heal you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will he cure you of your wound [received in judgment].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' like a lion to Ephraim'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like a young lion to the house of Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, even I, will tear to pieces and go on [tearing];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will carry off [the prey] and there will be no one to rescue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will go away and return to My place [on high]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Until they acknowledge their offense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bear their guilt and seek My face;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In their distress they will earnestly seek Me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The revolters have gone deep into depravity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I [the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God] will chastise them all.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know Ephraim, and Israel is not hidden from Me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For now, O Ephraim, you have played the prostitute '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have worshiped idols;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel has defiled itself.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their [immoral] practices will not permit them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To return to their God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the spirit of prostitution is within them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they do not know the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [they do not recognize, appreciate, heed or cherish Him].'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the pride '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-reliance of Israel testifies against him.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore Israel, and [especially] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ephraim was the most dominant of the ten tribes in the Kingdom of Israel, and this and other economic factors led to '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Ephraim
        - type: text
          text: ' becoming a synonym for the entire Northern Kingdom.'
      marker-yv: yv-n
    - type: text
      text: 'Ephraim, stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall in their wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt;'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Southern Kingdom or Kingdom of Judah consisted primarily of the tribes of Judah and Benjamin. After the united kingdom divided, Judah continued to be ruled by the kings of the Davidic line. Jerusalem was the capital city of Judah.
      marker-yv: yv-n
    - type: text
      text: Judah also has stumbled with them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will go with their flocks and with their herds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To seek the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [diligently searching for Him], but they will not find Him;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has withdrawn from them [refusing to hear the prayers of the unrepentant].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have dealt treacherously against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have borne illegitimate (pagan) children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Instead of a celebration, judgment would occur at the time of the New Moon Festival; 2:11.
      marker-yv: yv-n
    - type: text
      text: New Moon will devour them along with their land [bringing judgment and captivity].
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Blow the horn in Gibeah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The trumpet in Ramah [the lofty hills on Benjamin’s northern border].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sound the alarm at Beth-aven:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Behind you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' coming after you [is the enemy], O Benjamin [be on guard]!”'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim will become a desolation in the day of rebuke;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among the tribes of Israel I declare what is certain.
