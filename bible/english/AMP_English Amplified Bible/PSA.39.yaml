    children:
    - type: text
      text: '3'
  - type: text
    text: My heart was hot within me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: While I was musing the fire burned;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then I spoke with my tongue:'
- type: usfm
