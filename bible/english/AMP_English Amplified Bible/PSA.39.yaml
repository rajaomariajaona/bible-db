    children:
    - type: text
      text: ord
  - type: text
    text: ', let me know my [life’s] end'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [to appreciate] the extent of my days;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me know how frail I am [how transient is my stay here].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Behold, You have made my days as [short as] hand widths,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my lifetime is as nothing in Your sight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Surely every man at his best is a mere breath [a wisp of smoke, a vapor that vanishes]! [Eccl 1:2] '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Surely every man walks around like a shadow [in a charade];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surely they make an uproar for nothing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Each one builds up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: riches,
  - type: text
    text: ' not knowing who will receive them. [Eccl 2:18, 19; 1 Cor 7:31; James 4:14]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“And now, Lord, for what do I expectantly wait?
- type: usfm
  marker: q1
  children:
  - type: text
    text: My hope [my confident expectation] is in You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Save me from all my transgressions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do not make me the scorn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproach of the [self-righteous, arrogant] fool.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “I am mute, I do not open my mouth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because it is You who has done it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Remove Your plague from me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am wasting away because of the conflict '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' opposition of Your hand.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “With rebukes You discipline man for sin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You consume like a moth what is precious to him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Surely every man is a mere breath [a wisp of smoke, a vapor that vanishes]. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶“Hear my prayer, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and listen to my cry;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not be silent at my tears;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am Your temporary guest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A sojourner like all my fathers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“O look away from me, that I may smile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' again know joy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before I depart and am no more.”
