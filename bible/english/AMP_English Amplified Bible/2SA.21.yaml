document_id: 2SA.21,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gibeonite Revenge
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: There was famine in the days of David for three consecutive years; and David sought the presence (face) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [asking the reason]. The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' replied, “It is because of Saul and his bloody house, because '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is no more information about this elsewhere. The Gibeonites had tricked Israel into making a treaty with them (Josh 9:3-15) and Saul apparently tried to exterminate them to right the original wrong perpetrated by them against Israel (cf v 2).
      marker-yv: yv-n
    - type: text
      text: 'he put the Gibeonites to death.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Rizpah the daughter of Aiah took sackcloth and spread it out for herself on the rock, from the beginning of harvest [in the spring] until [the autumn] rain fell on them; and she allowed neither the birds of the sky to rest on their bodies by day, nor the beasts of the field [to feed on them] by night. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'David was told what Rizpah the daughter of Aiah, the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Gen 22:24.
      marker-yv: yv-n
    - type: text
      text: 'concubine of Saul, had done. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then David went and took the bones of Saul and Jonathan his son from the men of Jabesh-gilead, who had stolen them from the open square of Beth-shan, where the Philistines had hanged them on the day when the Philistines had killed Saul in Gilboa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He brought up the bones of Saul and of Jonathan his son from there, and they gathered the bones of those who had been hanged [with their arms and legs broken]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They buried the bones of Saul and Jonathan his son in the country of Benjamin in Zela, in the tomb of Kish his father; and they did all that the king commanded. After that, God was moved by prayer for the land.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now the Philistines were at war again with Israel. David went down with his servants, and as they fought against the Philistines, David became weary. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then Ishbi-benob, who was among the descendants of the giant, the weight of whose spear was three hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' (six pounds) of bronze, was armed with a new '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sword,
    - type: text
      text: ' and he intended to kill David. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But Abishai the son of Zeruiah came to David’s aid, and struck and killed the Philistine. Then David’s men swore to him, “You shall not go out again with us to battle, so that you do not extinguish the lamp of Israel.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'After this, there was war again with the Philistines at Gob (Gezer). At that time Sibbecai the Hushathite killed Saph (Sippai), who was among the descendants of the giant. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'There was war with the Philistines again at Gob, and Elhanan the son of Jaare-oregim, a Bethlehemite, killed Goliath the Gittite, whose spear shaft was like a weaver’s beam. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So the king called the Gibeonites and spoke to them (now the Gibeonites were not of the sons (descendants) of Israel but of the remnant (survivors) of the Amorites. The Israelites had sworn [an oath] to [spare] them, but Saul in his zeal for the sons of Israel and Judah had sought to strike down the Gibeonites). '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'There was war at Gath again, where there was a man of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: great
    - type: text
      text: ' stature who had six fingers on each hand and six toes on each foot, twenty-four in number; he also was a descendant of the giants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And when he taunted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defied Israel, Jonathan the son of Shimei, David’s brother, killed him. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: These four [warriors] were descended from the giant in Gath, and they fell by the hands of David and his servants.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So David said to the Gibeonites, “What should I do for you? How can I make it good so that you will bless the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' inheritance (Israel)?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The Gibeonites said to him, “We will not accept silver or gold belonging to Saul or his household (descendants); nor is it for us to put any man to death in Israel.” David said, “I will do for you whatever you say.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So they said to the king, “The man who consumed us and planned to exterminate us from remaining in any territory of Israel, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: let seven men [chosen] from his sons (descendants) be given to us and we will hang them before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [that is, put them on display, impaled with broken legs and arms] in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Saul’s home had been in Gibeah (1 Sam 10:26).
      marker-yv: yv-n
    - type: text
      text: Gibeah of Saul, the chosen one of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” And the king said, “I will give them.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But the king spared Mephibosheth the son of Jonathan, the son of Saul, because of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' oath that was between David and Saul’s son Jonathan. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So the king took the two sons of Rizpah the daughter of Aiah, whom she bore to Saul, Armoni and Mephibosheth, and the five sons of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So Greek and some Hebrew mss; MT has '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Michal
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Merab the daughter of Saul, whom she had borne to Adriel the son of Barzillai the Meholathite. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He handed them over to the Gibeonites, and they hanged them on the hill before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and the seven died together. They were put to death in the first days of the grain harvest, the beginning of the barley harvest [in the spring].'
