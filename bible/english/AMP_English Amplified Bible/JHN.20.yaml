    content: The Empty Tomb
  - type: text
    content: 'Now on the first day of the week Mary Magdalene came to the tomb early, while it was still dark, and saw the stone [already] removed from the [groove across the entrance of the] tomb. [Matt 28:1-8; Mark 16:1-8; Luke 24:1-10] '
  '10':
  - type: text
    content: Then the disciples went back again to their own homes.
  '11':
  - type: text
    content: 'But Mary [who had returned] was standing outside the tomb sobbing; and so, as she wept, she stooped down and looked into the tomb; '
  '12':
  - type: text
    content: 'and she saw two angels in white sitting '
  - type: text
    content: there,
  - type: text
    content: ' one at the head and one at the feet, where the body of Jesus had lain. '
  '13':
  - type: text
    content: 'And they said to her, “Woman, why are you crying?” She told them, “Because they have taken away my Lord, and I do not know where they have laid Him.” '
  '14':
  - type: text
    content: 'After saying this, she turned around and saw Jesus standing '
  - type: text
    content: there,
  - type: text
