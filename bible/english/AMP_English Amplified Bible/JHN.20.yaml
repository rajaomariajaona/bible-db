  '3':
  - type: text
    content: 'So Peter and the other disciple left, and they were going to the tomb. [Luke 24:12] '
  '30':
  - type: text
    content: 'There are also many other signs (attesting miracles) that Jesus performed in the presence of the disciples, which are not written in this book; '
  '31':
  - type: text
    content: but these have been written so that you may believe [with a deep, abiding trust] that Jesus is the Christ (the Messiah, the Anointed), the Son of God; and that by believing [and trusting in and relying on Him] you may have life in His name. [Ps 2:7, 12]
  '4':
  - type: text
    content: 'And the two were running together, but the other disciple outran Peter and arrived at the tomb first. '
  '5':
  - type: text
    content: 'Stooping down and looking in, he saw the linen '
  - type: note
    content: Removing the burial wrappings and spices from a dead, decaying body would have been not only extremely difficult (if not impossible), but overwhelmingly nauseating. If a tomb robber had even attempted such a thing, the tomb would have been left in shambles. It would make no sense for a tomb robber to remove a dead body from the wrappings before stealing it.
  - type: text
    content: 'wrappings [neatly] lying '
  - type: text
    content: there;
  - type: text
    content: ' but he did not go in. '
  '6':
  - type: text
    content: 'Then Simon Peter came up, following him, and went into the tomb and saw the linen wrappings [neatly] lying '
  - type: text
    content: there;
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'and the [burial] '
  - type: note
    content: The word used here, soudarion, is taken from Latin (sudarium), where it refers to a linen handkerchief (cf Acts 19:12) or large linen napkin. This suggests something of the dimensions of the cloth, which was probably a new, unused piece of material.
  - type: text
    content: 'face-cloth which had been on Jesus’ head, not lying with the [other] linen wrappings, but '
  - type: note
    content: Jesus either caused the tight linen wrappings to fall from His body miraculously or His resurrected body miraculously passed through the linen wrappings, leaving them just as they were where He was lying (except for the face-cloth), unlike Lazarus who emerged from the tomb and had to be released from the wrappings. In either case, the grave wrappings would collapse on themselves on the flat surface of the slab where His body had been placed. The text also indicates that Jesus may have removed the face-cloth Himself once His hands were free, and neatly placed it apart from the other wrappings.
  - type: text
    content: 'rolled up in a place by itself. '
  '8':
  - type: text
    content: 'So the other disciple, who had reached the tomb first, went in too; and he saw [the wrappings and the face-cloth] and '
  - type: note
    content: 'John, the “other disciple,” knew immediately that no one could have fabricated the sight before him: (1) no one could have surreptitiously removed the stone covering the entrance (cf Matt 28:2), even if the guards assigned to the tomb had fallen asleep, as they were later paid to say by the chief priests (Matt 28:13); (2) removing the grave clothes from a dead body in a dark tomb in the middle of the night made no sense (cf note v 5); (3) stealing Jesus’ body would have accomplished nothing. The disciples’ reaction of disbelief when told of His resurrection implies they were neither expecting nor prepared for this miraculous event (cf Matt 28:16, 17; Mark 16:8-14; Luke 24:6-11). The actual resurrection of a living, flesh-and-bone Jesus gave the disciples the courage to begin proclaiming anew the message of salvation, and provided the strength for them to face both great personal suffering and martyrdom for their faith.'
  - type: text
    content: 'believed [without any doubt that Jesus had risen from the dead]. '
  '9':
  - type: text
    content: 'For as yet they did not understand the Scripture, that He must rise from the dead. [Ps 16:10] '
