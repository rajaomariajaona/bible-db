document_id: JHN.20,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Empty Tomb
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now on the first day of the week Mary Magdalene came to the tomb early, while it was still dark, and saw the stone [already] removed from the [groove across the entrance of the] tomb. [Matt 28:1-8; Mark 16:1-8; Luke 24:1-10] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the disciples went back again to their own homes.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Mary [who had returned] was standing outside the tomb sobbing; and so, as she wept, she stooped down and looked into the tomb; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and she saw two angels in white sitting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there,
    - type: text
      text: ' one at the head and one at the feet, where the body of Jesus had lain. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to her, “Woman, why are you crying?” She told them, “Because they have taken away my Lord, and I do not know where they have laid Him.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After saying this, she turned around and saw Jesus standing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there,
    - type: text
      text: ' but she did not know that it was Jesus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Woman, why are you crying? For whom are you looking?”
    - type: text
      text: ' Supposing that He was the gardener, she replied, “Sir, if you are the one who has carried Him away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from here,
    - type: text
      text: ' tell me where you have put Him, and I will take Him away.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Mary!”
    - type: text
      text: ' She turned and said to Him in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. Jewish Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'Hebrew, “Rabboni!” (which means, Teacher). '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In her joy Mary had probably reverently embraced Jesus at the knees or ankles.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do not hold Me, for I have not yet ascended to the Father; but go to My brothers and tell them, ‘I am ascending to My Father and your Father, and to My God and your God.’ ”
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mary Magdalene came, reporting to the disciples that she had seen the Lord and that He had said these things to her.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus among His Disciples
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when it was evening on that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: same
    - type: text
      text: ' day, the first day of the week, though the disciples were [meeting] behind barred doors for fear of the Jews, Jesus came and stood among them, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A normal Hebrew greeting.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Peace to you.”
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she ran and went to Simon Peter and to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 19:26.
      marker-yv: yv-n
    - type: text
      text: 'other disciple (John), whom Jesus loved (esteemed), and said to them, “They have taken away the Lord out of the tomb, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This indicates others were also present.
      marker-yv: yv-n
    - type: text
      text: 'we do not know where they have laid Him!” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After He said this, He showed them His hands and His side. When the disciples saw the Lord, they were filled with great joy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to them again, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Peace to you; as the Father has sent Me, I also send you
    - type: text
      text: ' [as My representatives].” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when He said this, He breathed on them and said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Receive the Holy Spirit.
    - type: text
      text: ' [Acts 1:8; 2:1-3] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you forgive the sins of anyone they are forgiven
    - type: text
      text: ' [because of their faith]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'if you retain '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the sins
      - type: text
        text: ' of anyone, they are retained'
    - type: text
      text: ' [and remain unforgiven because of their unbelief].”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Thomas, one of the twelve [disciples], who was called Didymus (the twin), was not with them when Jesus came. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the other disciples kept telling him, “We have seen the Lord!” But he said to them, “Unless I see in His hands the marks of the nails, and put my finger into the nail prints, and put my hand into His side, I will never believe.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eight days later His disciples were again inside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the house,
    - type: text
      text: ' and Thomas was with them. Jesus came, though the doors had been barred, and stood among them and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Peace to you.”
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to Thomas, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Reach here with your finger, and see My hands; and put out your hand and place it in My side. Do not be unbelieving, but
    - type: text
      text: ' [stop doubting and] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: believe.”
    - type: text
      text: ' [Luke 24:39] '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thomas answered Him, “My Lord and my God!” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Because you have seen Me, do you now believe? Blessed
    - type: text
      text: ' [happy, spiritually secure, and favored by God] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: are they who did not see
    - type: text
      text: ' [Me] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and yet believed
    - type: text
      text: ' [in Me].”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Purpose of Writing this Gospel
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Peter and the other disciple left, and they were going to the tomb. [Luke 24:12] '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There are also many other signs (attesting miracles) that Jesus performed in the presence of the disciples, which are not written in this book; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but these have been written so that you may believe [with a deep, abiding trust] that Jesus is the Christ (the Messiah, the Anointed), the Son of God; and that by believing [and trusting in and relying on Him] you may have life in His name. [Ps 2:7, 12]
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the two were running together, but the other disciple outran Peter and arrived at the tomb first. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Stooping down and looking in, he saw the linen '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Removing the burial wrappings and spices from a dead, decaying body would have been not only extremely difficult (if not impossible), but overwhelmingly nauseating. If a tomb robber had even attempted such a thing, the tomb would have been left in shambles. It would make no sense for a tomb robber to remove a dead body from the wrappings before stealing it.
      marker-yv: yv-n
    - type: text
      text: 'wrappings [neatly] lying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there;
    - type: text
      text: ' but he did not go in. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Simon Peter came up, following him, and went into the tomb and saw the linen wrappings [neatly] lying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there;
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the [burial] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The word used here, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: soudarion,
        - type: text
          text: ' is taken from Latin ('
        - type: usfm
          marker: it
          children:
          - type: text
            text: sudarium)
        - type: text
          text: ', where it refers to a linen handkerchief (cf Acts 19:12) or large linen napkin. This suggests something of the dimensions of the cloth, which was probably a new, unused piece of material.'
      marker-yv: yv-n
    - type: text
      text: 'face-cloth which had been on Jesus’ head, not lying with the [other] linen wrappings, but '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus either caused the tight linen wrappings to fall from His body miraculously or His resurrected body miraculously passed through the linen wrappings, leaving them just as they were where He was lying (except for the face-cloth), unlike Lazarus who emerged from the tomb and had to be released from the wrappings. In either case, the grave wrappings would collapse on themselves on the flat surface of the slab where His body had been placed. The text also indicates that Jesus may have removed the face-cloth Himself once His hands were free, and neatly placed it apart from the other wrappings.
      marker-yv: yv-n
    - type: text
      text: 'rolled up in a place by itself. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the other disciple, who had reached the tomb first, went in too; and he saw [the wrappings and the face-cloth] and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'John, the “other disciple,” knew immediately that no one could have fabricated the sight before him: (1) no one could have surreptitiously removed the stone covering the entrance (cf Matt 28:2), even if the guards assigned to the tomb had fallen asleep, as they were later paid to say by the chief priests (Matt 28:13); (2) removing the grave clothes from a dead body in a dark tomb in the middle of the night made no sense (cf note v 5); (3) stealing Jesus’ body would have accomplished nothing. The disciples’ reaction of disbelief when told of His resurrection implies they were neither expecting nor prepared for this miraculous event (cf Matt 28:16, 17; Mark 16:8-14; Luke 24:6-11). The actual resurrection of a living, flesh-and-bone Jesus gave the disciples the courage to begin proclaiming anew the message of salvation, and provided the strength for them to face both great personal suffering and martyrdom for their faith.'
      marker-yv: yv-n
    - type: text
      text: 'believed [without any doubt that Jesus had risen from the dead]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as yet they did not understand the Scripture, that He must rise from the dead. [Ps 16:10] '
