document_id: ISA.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Look Not to Egypt but to God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe (judgment is coming) to those who go down to Egypt for help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who rely on horses
- type: usfm
  marker: q1
  children:
  - type: text
    text: And trust in chariots because they are many,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in horsemen because they are very strong,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But they do not look to the Holy One of Israel, nor seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consult the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Yet He is also wise and will bring disaster,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And does not retract His words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But will arise against the house of evildoers
- type: usfm
  marker: q1
  children:
  - type: text
    text: And against the helpers of those who do evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Now the Egyptians are men and not God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their horses are flesh and not spirit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will stretch out His hand,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he (Egypt) who helps will stumble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he (Judah) who is helped will fall,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all of them will perish together.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For so the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says to me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “As the lion or the young lion growls over his prey,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And though a large group of shepherds is called out against him
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will not be terrified at their voice nor cringe at their noise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts will come down to wage war on Mount Zion and on its hill.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Like flying birds, so will the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts protect Jerusalem;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will protect and save it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will pass over and rescue it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Return to Him from whom you have so deeply defected, O sons of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For in that day every man will reject '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' throw away his idols of silver and his idols of gold [in disgust], which your own hands have sinfully made for you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then the Assyrian will fall by a sword not of man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a sword not of man will devour him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he will flee from the sword [of God],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his young men will become forced labor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “His rock [his stronghold] will pass away because of panic,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his princes will be terrified at the [sight of the battle] standard,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', whose fire is in Zion and whose furnace is in Jerusalem.'
