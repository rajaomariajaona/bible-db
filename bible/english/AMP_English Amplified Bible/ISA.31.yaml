document_id: ISA.31,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Look Not to Egypt but to God
  - type: text
    content: Woe (judgment is coming) to those who go down to Egypt for help,
  - type: text
    content: Who rely on horses
  - type: text
    content: And trust in chariots because they are many,
  - type: text
    content: And in horsemen because they are very strong,
  - type: text
    content: 'But they do not look to the Holy One of Israel, nor seek '
  - type: text
    content: and
  - type: text
    content: ' consult the L'
  - type: heading
    content: ord
  - type: text
    content: '!'
  '2':
  - type: text
    content: Yet He is also wise and will bring disaster,
  - type: text
    content: And does not retract His words,
  - type: text
    content: But will arise against the house of evildoers
  - type: text
    content: And against the helpers of those who do evil.
  '3':
  - type: text
    content: Now the Egyptians are men and not God,
  - type: text
    content: And their horses are flesh and not spirit;
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' will stretch out His hand,'
  - type: text
    content: And he (Egypt) who helps will stumble,
  - type: text
    content: And he (Judah) who is helped will fall,
  - type: text
    content: And all of them will perish together.
  '4':
  - type: text
    content: For so the L
  - type: heading
    content: ord
  - type: text
    content: ' says to me,'
  - type: text
    content: “As the lion or the young lion growls over his prey,
  - type: text
    content: And though a large group of shepherds is called out against him
  - type: text
    content: He will not be terrified at their voice nor cringe at their noise,
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts will come down to wage war on Mount Zion and on its hill.”'
  '5':
  - type: text
    content: Like flying birds, so will the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts protect Jerusalem;'
  - type: text
    content: He will protect and save it,
  - type: text
    content: He will pass over and rescue it.
  '6':
  - type: text
    content: 'Return to Him from whom you have so deeply defected, O sons of Israel. '
  '7':
  - type: text
    content: 'For in that day every man will reject '
  - type: text
    content: and
  - type: text
    content: ' throw away his idols of silver and his idols of gold [in disgust], which your own hands have sinfully made for you.'
  '8':
  - type: text
    content: Then the Assyrian will fall by a sword not of man,
  - type: text
    content: And a sword not of man will devour him.
  - type: text
    content: And he will flee from the sword [of God],
  - type: text
    content: And his young men will become forced labor.
  '9':
  - type: text
    content: “His rock [his stronghold] will pass away because of panic,
  - type: text
    content: And his princes will be terrified at the [sight of the battle] standard,”
  - type: text
    content: Declares the L
  - type: heading
    content: ord
  - type: text
    content: ', whose fire is in Zion and whose furnace is in Jerusalem.'
