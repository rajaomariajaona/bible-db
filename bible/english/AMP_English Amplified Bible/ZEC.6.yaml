      children:
      - type: text
        text: The Four Chariots
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now again I looked up, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. four angelic spirits appointed by God to dispense His judgment.
      marker-yv: yv-n
    - type: text
      text: 'four chariots were coming out from between two mountains; and the mountains were mountains of [firm, immovable] bronze (divine judgment). '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an offering
    - type: text
      text: ' from the exiles, from Heldai, from Tobijah, and from Jedaiah [as representatives]; and you go the same day and enter the house of Josiah the son of Zephaniah, where they have arrived from Babylon.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Symbolic Crowns
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Take silver and gold [from them], and make an '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ornate
    - type: text
      text: ' crown and set it on the head of Joshua the son of Jehozadak, the high priest. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then say to Joshua, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, “Behold (look, keep in sight, watch), a Man (Messiah) whose name is Branch, for He shall branch out from His place (Israel, the Davidic line); and He shall build the [ultimate] temple of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Is 4:2; Jer 23:5; 33:15; Zech 3:8] '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Yes, [you are to build a temple of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', but] it is He who shall build the [ultimate] temple of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and He shall bear the honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty [as the only begotten of the Father] and sit and rule on His throne. And He shall be a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Messiah will be both king and priest.
      marker-yv: yv-n
    - type: text
      text: 'Priest on His throne, and the counsel of peace shall be between the two offices [Priest and King].” ’ [John 1:14; 17:5; Heb 2:9] '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now the crown shall become a reminder in the temple of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to Helem, Tobijah, Jedaiah, and Hen the son of Zephaniah. [Matt 10:41] '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And those who are far away will come and [help] build the temple of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” Then you shall know [without any doubt] that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts sent me (Zechariah) to you. And it will come about if you will diligently obey the [voice of the] L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The first chariot had red horses (war, bloodshed), the second chariot had black horses (famine, death), [Rev 6:4-6] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the third chariot had white horses (victory), and the fourth chariot had strong dappled horses (death through judgment). [Rev 6:2, 8] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said to the angel who was speaking with me, “What are these, my lord?” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel answered me, “These are the four spirits of the heavens, which go out after presenting themselves before the Lord of all the earth, [Ps 104:4; Matt 24:31] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with the chariot with the black horses going toward the north country; then the one with the white horses follows after them [because there are two northern powers to overcome], and the chariot with the dappled horses goes toward the south country.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the strong horses went out, they were eager to patrol the earth. And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Go, patrol the earth.” So they patrolled the earth [watching and protecting it]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then He called out to me and said to me, “See, those who are going to the north country have quieted My Spirit [of wrath] in the north country.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' also came to me, saying, '
