document_id: ZEC.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Four Chariots
  - type: text
    content: 'Now again I looked up, and '
  - type: note
    content: I.e. four angelic spirits appointed by God to dispense His judgment.
  - type: text
    content: 'four chariots were coming out from between two mountains; and the mountains were mountains of [firm, immovable] bronze (divine judgment). '
  '10':
  - type: text
    content: '“Take '
  - type: text
    content: an offering
  - type: text
    content: ' from the exiles, from Heldai, from Tobijah, and from Jedaiah [as representatives]; and you go the same day and enter the house of Josiah the son of Zephaniah, where they have arrived from Babylon.'
  - type: heading
    content: The Symbolic Crowns
  '11':
  - type: text
    content: 'Take silver and gold [from them], and make an '
  - type: text
    content: ornate
  - type: text
    content: ' crown and set it on the head of Joshua the son of Jehozadak, the high priest. '
  '12':
  - type: text
    content: Then say to Joshua, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “Behold (look, keep in sight, watch), a Man (Messiah) whose name is Branch, for He shall branch out from His place (Israel, the Davidic line); and He shall build the [ultimate] temple of the L'
  - type: heading
    content: ord
  - type: text
    content: '. [Is 4:2; Jer 23:5; 33:15; Zech 3:8] '
  '13':
  - type: text
    content: Yes, [you are to build a temple of the L
  - type: heading
    content: ord
  - type: text
    content: ', but] it is He who shall build the [ultimate] temple of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and He shall bear the honor '
  - type: text
    content: and
  - type: text
    content: ' majesty [as the only begotten of the Father] and sit and rule on His throne. And He shall be a '
  - type: note
    content: The Messiah will be both king and priest.
  - type: text
    content: 'Priest on His throne, and the counsel of peace shall be between the two offices [Priest and King].” ’ [John 1:14; 17:5; Heb 2:9] '
  '14':
  - type: text
    content: Now the crown shall become a reminder in the temple of the L
  - type: heading
    content: ord
  - type: text
    content: ' to Helem, Tobijah, Jedaiah, and Hen the son of Zephaniah. [Matt 10:41] '
  '15':
  - type: text
    content: And those who are far away will come and [help] build the temple of the L
  - type: heading
    content: ord
  - type: text
    content: .” Then you shall know [without any doubt] that the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts sent me (Zechariah) to you. And it will come about if you will diligently obey the [voice of the] L'
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '2':
  - type: text
    content: 'The first chariot had red horses (war, bloodshed), the second chariot had black horses (famine, death), [Rev 6:4-6] '
  '3':
  - type: text
    content: 'the third chariot had white horses (victory), and the fourth chariot had strong dappled horses (death through judgment). [Rev 6:2, 8] '
  '4':
  - type: text
    content: 'Then I said to the angel who was speaking with me, “What are these, my lord?” '
  '5':
  - type: text
    content: 'The angel answered me, “These are the four spirits of the heavens, which go out after presenting themselves before the Lord of all the earth, [Ps 104:4; Matt 24:31] '
  '6':
  - type: text
    content: 'with the chariot with the black horses going toward the north country; then the one with the white horses follows after them [because there are two northern powers to overcome], and the chariot with the dappled horses goes toward the south country.” '
  '7':
  - type: text
    content: When the strong horses went out, they were eager to patrol the earth. And the L
  - type: heading
    content: ord
  - type: text
    content: ' said, “Go, patrol the earth.” So they patrolled the earth [watching and protecting it]. '
  '8':
  - type: text
    content: Then He called out to me and said to me, “See, those who are going to the north country have quieted My Spirit [of wrath] in the north country.”
  '9':
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' also came to me, saying, '
