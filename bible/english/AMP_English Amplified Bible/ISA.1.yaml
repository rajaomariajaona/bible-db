document_id: ISA.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Rebellion of God’s People
  - type: text
    content: The vision of [the prophet] Isaiah the son of Amoz concerning [the kingdom of] Judah and [its capital] Jerusalem, which he saw [as revealed by God] during the reigns of Uzziah, Jotham, Ahaz, and Hezekiah, kings of Judah.
  '10':
  - type: text
    content: ¶Hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' [rulers of Jerusalem],'
  - type: text
    content: You rulers of [another] Sodom,
  - type: text
    content: 'Listen to the law '
  - type: text
    content: and
  - type: text
    content: ' instruction of our God,'
  - type: text
    content: You people of [another] Gomorrah.
  '11':
  - type: text
    content: “What are your multiplied sacrifices to Me [without your repentance]?”
  - type: text
    content: Says the L
  - type: heading
    content: ord
  - type: text
    content: .
  - type: text
    content: “I have had enough of [your] burnt offerings of rams
  - type: text
    content: And the fat of well-fed cattle [without your obedience];
  - type: text
    content: And I take no pleasure in the blood of bulls or lambs or goats [offered without repentance].
  '12':
  - type: text
    content: “When you come to appear before Me,
  - type: text
    content: Who requires this of you, this trampling of My [temple] courts [by your sinful feet]?
  '13':
  - type: text
    content: “Do not bring worthless offerings again,
  - type: text
    content: '[Your] incense is repulsive to Me;'
  - type: text
    content: '[Your] New Moon and Sabbath [observances], the calling of assemblies—'
  - type: text
    content: I cannot endure wickedness [your sin, your injustice, your wrongdoing] and [the squalor of] the festive assembly.
  '14':
  - type: text
    content: “I hate [the hypocrisy of] your New Moon festivals and your appointed feasts.
  - type: text
    content: They have become a burden to Me;
  - type: text
    content: I am weary of bearing them.
  '15':
  - type: text
    content: “So when you spread out your hands [in prayer, pleading for My help],
  - type: text
    content: I will hide My eyes from you;
  - type: text
    content: Yes, even though you offer many prayers,
  - type: text
    content: I will not be listening.
  - type: text
    content: Your hands are full of blood!
  '16':
  - type: text
    content: ¶“Wash yourselves, make yourselves clean;
  - type: text
    content: Get your evil deeds out of My sight.
  - type: text
    content: Stop doing evil,
  '17':
  - type: text
    content: Learn to do good.
  - type: text
    content: Seek justice,
  - type: text
    content: Rebuke the ruthless,
  - type: text
    content: Defend the fatherless,
  - type: text
    content: Plead for the [rights of the] widow [in court].
  - type: heading
    content: “Let Us Reason”
  '18':
  - type: text
    content: ¶“Come now, and let us reason together,”
  - type: text
    content: Says the L
  - type: heading
    content: ord
  - type: text
    content: .
  - type: text
    content: “
  - type: note
    content: There was a legend among the rabbis that on the Day of Atonement a scarlet woolen thread was tied to the door of the temple, and when the scapegoat reached the wilderness (Lev 16:10), if the sins of Israel were forgiven the thread would miraculously turn white.
  - type: text
    content: Though your sins are like scarlet,
  - type: text
    content: They shall be as white as snow;
  - type: text
    content: Though they are red like crimson,
  - type: text
    content: They shall be like wool.
  '19':
  - type: text
    content: “If you are willing and obedient,
  - type: text
    content: You shall eat the best of the land;
  '2':
  - type: text
    content: Hear, O heavens, and listen, O earth;
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken:'
  - type: text
    content: “I have reared and brought up sons,
  - type: text
    content: 'But they have rebelled against Me '
  - type: text
    content: and
  - type: text
    content: ' have broken away.'
  '20':
  - type: text
    content: But if you refuse and rebel,
  - type: text
    content: You shall be devoured by the sword.”
  - type: text
    content: For the mouth of the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken.'
  - type: heading
    content: Zion Corrupted, to Be Redeemed
  '21':
  - type: text
    content: ¶How the faithful city has become a prostitute [idolatrous, despicable],
  - type: text
    content: She who was full of justice!
  - type: text
    content: Right standing with God once lodged in her,
  - type: text
    content: But now murderers.
  '22':
  - type: text
    content: 'Your silver has turned to '
  - type: note
    content: Lit galena.
  - type: text
    content: lead,
  - type: text
    content: Your wine is diluted with water.
  '23':
  - type: text
    content: Your rulers are rebels
  - type: text
    content: And companions of thieves;
  - type: text
    content: Everyone loves bribes
  - type: text
    content: And chases after gifts.
  - type: text
    content: They do not defend the fatherless,
  - type: text
    content: Nor does the widow’s cause come before them [instead they delay or turn a deaf ear].
  '24':
  - type: text
    content: ¶Therefore the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts,'
  - type: text
    content: 'The Mighty One of Israel, declares:'
  - type: text
    content: “Ah, I will be freed of My adversaries
  - type: text
    content: And avenge Myself on My enemies.
  '25':
  - type: text
    content: “And I will turn My hand against you,
  - type: text
    content: And will [thoroughly] purge away your dross as with lye
  - type: text
    content: And remove all your tin (impurity).
  '26':
  - type: text
    content: “Then I will restore your judges as at the first,
  - type: text
    content: And your counselors as at the beginning;
  - type: text
    content: Afterward you will be called the city of righteousness,
  - type: text
    content: The faithful city.”
  '27':
  - type: text
    content: ¶Zion will be redeemed with justice
  - type: text
    content: And her repentant ones with righteousness.
  '28':
  - type: text
    content: 'But rebels and sinners will be crushed '
  - type: text
    content: and
  - type: text
    content: ' destroyed together,'
  - type: text
    content: And those who abandon (turn away from) the L
  - type: heading
    content: ord
  - type: text
    content: ' will be consumed (perish).'
  '29':
  - type: text
    content: For you will be ashamed [of the degradation] of the oaks in which you took [idolatrous] pleasure,
  - type: text
    content: And you will be ashamed of the gardens [of passion] which you have chosen [for pagan worship].
  '3':
  - type: text
    content: “The ox [instinctively] knows its owner,
  - type: text
    content: And the donkey its master’s feeding trough,
  - type: text
    content: But Israel does not know [Me as L
  - type: heading
    content: ord
  - type: text
    content: '],'
  - type: text
    content: My people do not understand.”
  '30':
  - type: text
    content: 'For you will be like an oak whose leaf withers '
  - type: text
    content: and
  - type: text
    content: ' dies'
  - type: text
    content: And like a garden that has no water.
  '31':
  - type: text
    content: The strong man will become tinder,
  - type: text
    content: And his work a spark.
  - type: text
    content: So both will burn together
  - type: text
    content: And there will be none to quench them.
  '4':
  - type: text
    content: ¶Ah, sinful nation,
  - type: text
    content: A people loaded down with wickedness [with sin, with injustice, with wrongdoing],
  - type: text
    content: Offspring of evildoers,
  - type: text
    content: Sons who behave corruptly!
  - type: text
    content: They have abandoned (rejected) the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: They have despised the Holy One of Israel [provoking Him to anger],
  - type: text
    content: They have turned away from Him.
  '5':
  - type: text
    content: '¶Why should you be stricken '
  - type: text
    content: and
  - type: text
    content: ' punished again [since no change results from it]?'
  - type: text
    content: You [only] continue to rebel.
  - type: text
    content: The whole head is sick
  - type: text
    content: 'And the whole heart is faint '
  - type: text
    content: and
  - type: text
    content: ' sick.'
  '6':
  - type: text
    content: From the sole of the foot even to the head
  - type: text
    content: There is nothing healthy in the nation’s body,
  - type: text
    content: Only bruises, welts, and raw wounds,
  - type: text
    content: Not pressed out or bandaged,
  - type: text
    content: Nor softened with oil [as a remedy].
  '7':
  - type: text
    content: ¶Your land lies desolate [because of your disobedience],
  - type: text
    content: Your cities are burned with fire,
  - type: text
    content: Your fields—strangers are devouring them in your very presence;
  - type: text
    content: It is desolate, as overthrown by strangers.
  '8':
  - type: text
    content: The Daughter of Zion (Jerusalem) is left like a [deserted] shelter in a vineyard,
  - type: text
    content: Like a watchman’s hut in a cucumber field, like a besieged city [isolated, surrounded by devastation].
  '9':
  - type: text
    content: If the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts'
  - type: text
    content: Had not left us a few survivors,
  - type: text
    content: We would be like Sodom,
  - type: text
    content: We would be like Gomorrah. [Gen 19:24, 25; Rom 9:29]
  - type: heading
    content: God Has Had Enough
