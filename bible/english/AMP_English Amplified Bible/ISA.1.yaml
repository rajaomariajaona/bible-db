document_id: ISA.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rebellion of God’s People
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The vision of [the prophet] Isaiah the son of Amoz concerning [the kingdom of] Judah and [its capital] Jerusalem, which he saw [as revealed by God] during the reigns of Uzziah, Jotham, Ahaz, and Hezekiah, kings of Judah.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Hear the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [rulers of Jerusalem],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You rulers of [another] Sodom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruction of our God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You people of [another] Gomorrah.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What are your multiplied sacrifices to Me [without your repentance]?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have had enough of [your] burnt offerings of rams
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fat of well-fed cattle [without your obedience];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I take no pleasure in the blood of bulls or lambs or goats [offered without repentance].
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When you come to appear before Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who requires this of you, this trampling of My [temple] courts [by your sinful feet]?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not bring worthless offerings again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Your] incense is repulsive to Me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Your] New Moon and Sabbath [observances], the calling of assemblies—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cannot endure wickedness [your sin, your injustice, your wrongdoing] and [the squalor of] the festive assembly.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I hate [the hypocrisy of] your New Moon festivals and your appointed feasts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have become a burden to Me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am weary of bearing them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So when you spread out your hands [in prayer, pleading for My help],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will hide My eyes from you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, even though you offer many prayers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not be listening.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your hands are full of blood!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Wash yourselves, make yourselves clean;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get your evil deeds out of My sight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stop doing evil,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Learn to do good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seek justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rebuke the ruthless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Defend the fatherless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plead for the [rights of the] widow [in court].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: “Let Us Reason”
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Come now, and let us reason together,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There was a legend among the rabbis that on the Day of Atonement a scarlet woolen thread was tied to the door of the temple, and when the scapegoat reached the wilderness (Lev 16:10), if the sins of Israel were forgiven the thread would miraculously turn white.
      marker-yv: yv-n
    - type: text
      text: Though your sins are like scarlet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall be as white as snow;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they are red like crimson,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall be like wool.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you are willing and obedient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shall eat the best of the land;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear, O heavens, and listen, O earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have reared and brought up sons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But they have rebelled against Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have broken away.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you refuse and rebel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shall be devoured by the sword.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the mouth of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zion Corrupted, to Be Redeemed
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶How the faithful city has become a prostitute [idolatrous, despicable],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She who was full of justice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Right standing with God once lodged in her,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now murderers.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your silver has turned to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: galena
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: lead,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wine is diluted with water.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your rulers are rebels
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And companions of thieves;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone loves bribes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And chases after gifts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not defend the fatherless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor does the widow’s cause come before them [instead they delay or turn a deaf ear].
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Therefore the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Mighty One of Israel, declares:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Ah, I will be freed of My adversaries
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And avenge Myself on My enemies.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And I will turn My hand against you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will [thoroughly] purge away your dross as with lye
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And remove all your tin (impurity).
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then I will restore your judges as at the first,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your counselors as at the beginning;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afterward you will be called the city of righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The faithful city.”
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Zion will be redeemed with justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her repentant ones with righteousness.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But rebels and sinners will be crushed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed together,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who abandon (turn away from) the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be consumed (perish).'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you will be ashamed [of the degradation] of the oaks in which you took [idolatrous] pleasure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will be ashamed of the gardens [of passion] which you have chosen [for pagan worship].
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The ox [instinctively] knows its owner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the donkey its master’s feeding trough,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Israel does not know [Me as L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My people do not understand.”
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For you will be like an oak whose leaf withers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dies'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like a garden that has no water.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The strong man will become tinder,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his work a spark.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So both will burn together
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there will be none to quench them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Ah, sinful nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A people loaded down with wickedness [with sin, with injustice, with wrongdoing],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Offspring of evildoers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sons who behave corruptly!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have abandoned (rejected) the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have despised the Holy One of Israel [provoking Him to anger],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have turned away from Him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Why should you be stricken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punished again [since no change results from it]?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You [only] continue to rebel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole head is sick
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the whole heart is faint '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sick.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the sole of the foot even to the head
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is nothing healthy in the nation’s body,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Only bruises, welts, and raw wounds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not pressed out or bandaged,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor softened with oil [as a remedy].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Your land lies desolate [because of your disobedience],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your cities are burned with fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your fields—strangers are devouring them in your very presence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is desolate, as overthrown by strangers.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Daughter of Zion (Jerusalem) is left like a [deserted] shelter in a vineyard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a watchman’s hut in a cucumber field, like a besieged city [isolated, surrounded by devastation].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Had not left us a few survivors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We would be like Sodom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We would be like Gomorrah. [Gen 19:24, 25; Rom 9:29]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Has Had Enough
    marker-yv: yv-h
