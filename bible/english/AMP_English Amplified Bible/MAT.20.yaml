document_id: MAT.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Laborers in the Vineyard
  - type: text
    content: ' '
  - type: text
    content: “For the kingdom of heaven is like the owner of an estate who went out in the morning at dawn to hire workmen for his vineyard.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Now when the first
  - type: text
    content: ' [to be hired] '
  - type: text
    content: came, they thought they would get more; but each of them also received a denarius.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'When they received it, they protested '
  - type: text
    content: and
  - type: text
    content: ' grumbled at the owner of the estate,'
  - type: text
    content: ' '
  '12':
  - type: text
    content: saying, ‘These men who came last worked
  - type: text
    content: ' [only] '
  - type: text
    content: one hour, and yet you have made them equal
  - type: text
    content: ' [in wages] '
  - type: text
    content: to us who have carried
  - type: text
    content: ' [most of] '
  - type: text
    content: the burden and
  - type: text
    content: ' [worked in] '
  - type: text
    content: the scorching heat of the day.’
  - type: text
    content: ' '
  '13':
  - type: text
    content: But the owner of the estate replied to one of them, ‘Friend, I am doing you no injustice. Did you not agree with me for a denarius?
  - type: text
    content: ' '
  '14':
  - type: text
    content: Take what belongs to you and go, but I choose to give to this last man
  - type: text
    content: ' [hired] '
  - type: text
    content: the same as I give to you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Am I not lawfully permitted to do what I choose with what is mine? Or is your eye '
  - type: note
    content: Lit evil because I am good?
  - type: text
    content: envious because I am generous?’
  - type: text
    content: ' '
  '16':
  - type: text
    content: So those who are last
  - type: text
    content: ' [in this world] '
  - type: text
    content: shall be first
  - type: text
    content: ' [in the world to come], '
  - type: text
    content: and those who are first, last.”
  - type: heading
    content: Death, Resurrection Foretold
  '17':
  - type: text
    content: 'As Jesus was going up to Jerusalem, He took the twelve [disciples] aside, and along the way He said to them, '
  '18':
  - type: text
    content: '“Listen carefully: we are going up to Jerusalem; and the Son of Man will be handed over to the chief priests and scribes (Sanhedrin, Jewish High Court), and they will'
  - type: text
    content: ' [judicially] '
  - type: text
    content: 'condemn Him '
  - type: text
    content: and
  - type: text
    content: ' sentence Him to death,'
  - type: text
    content: ' '
  '19':
  - type: text
    content: and will hand Him over to the Gentiles (Roman authorities) to be mocked and scourged and crucified, and He will be raised
  - type: text
    content: ' [to life] '
  - type: text
    content: on the third day.”
  - type: heading
    content: Preferred Treatment Asked
  '2':
  - type: text
    content: 'When he had agreed with the laborers for a '
  - type: note
    content: A day’s wage for a common laborer.
  - type: text
    content: denarius for the day, he sent them into his vineyard.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Then [Salome] the '
  - type: note
    content: This woman is believed to be the sister of Jesus’ mother, Mary.
  - type: text
    content: 'mother of Zebedee’s children [James and John] came up to Jesus with her sons and, kneeling down [in respect], asked a favor of Him. [Mark 10:35-45] '
  '21':
  - type: text
    content: 'And He said to her, '
  - type: text
    content: “What do you wish?”
  - type: text
    content: ' She answered Him, “Command that in Your kingdom these two sons of mine may sit [in positions of honor and authority] one on Your right and one on Your left.” '
  '22':
  - type: text
    content: 'But Jesus replied, '
  - type: text
    content: “You do not realize what you are asking. Are you able to drink the cup
  - type: text
    content: ' [of suffering] '
  - type: text
    content: that I am about to drink?”
  - type: text
    content: ' They answered, “We are able.” '
  '23':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “You will drink My cup
  - type: text
    content: ' [of suffering]; '
  - type: text
    content: but to sit on My right and on My left this is not Mine to give, but it is for those for whom it has been prepared by My Father.”
  '24':
  - type: text
    content: 'And when the [other] ten heard this, they were resentful '
  - type: text
    content: and
  - type: text
    content: ' angry with the two brothers. '
  '25':
  - type: text
    content: 'But Jesus called them to Himself and said, '
  - type: text
    content: '“You know that the rulers of the Gentiles have absolute power '
  - type: text
    content: and
  - type: text
    content: ' lord it over them, and their great men exercise authority over them'
  - type: text
    content: ' [tyrannizing them]. [Mark 10:42-45; Luke 22:25-27] '
  '26':
  - type: text
    content: It is not this way among you, but whoever wishes to become great among you shall be your servant,
  - type: text
    content: ' '
  '27':
  - type: text
    content: and whoever wishes to be first among you shall be your
  - type: text
    content: ' [willing and humble] '
  - type: text
    content: slave;
  - type: text
    content: ' '
  '28':
  - type: text
    content: just as the Son of Man did not come to be served, but to serve, and to give His life as a ransom for many
  - type: text
    content: ' [paying the price to set them free from the penalty of sin].”'
  - type: heading
    content: Sight for the Blind
  '29':
  - type: text
    content: 'As they were leaving Jericho, a large crowd followed Him. [Mark 10:46-52; Luke 18:35-43] '
  '3':
  - type: text
    content: And he went out about the third hour (9:00 a.m.) and saw others standing idle in the market place;
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And two blind men were sitting by the road, and when they heard that Jesus was passing by, they cried out, “Lord, have mercy on us, Son of David (Messiah)!” '
  '31':
  - type: text
    content: 'The crowd sternly told them to be quiet, but they cried out all the more, “Lord, Son of David (Messiah) have mercy on us!” '
  '32':
  - type: text
    content: 'Jesus stopped and called them, and asked, '
  - type: text
    content: “What do you want Me to do for you?”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'They answered Him, “Lord, '
  - type: text
    content: we want
  - type: text
    content: ' our eyes to be opened.” '
  '34':
  - type: text
    content: Moved with compassion, Jesus touched their eyes; and immediately they regained their sight and followed Him [as His disciples].
  '4':
  - type: text
    content: and he said to them, ‘You also go into the vineyard, and I will pay you whatever is right (an appropriate wage).’ And they went.
  - type: text
    content: ' '
  '5':
  - type: text
    content: He went out about the sixth hour (noon) and the ninth hour (3:00 p.m.), and did the same thing.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And about the eleventh hour (5:00 p.m.) he went out and found others standing '
  - type: text
    content: around,
  - type: text
    content: ' and he said to them, ‘Why have you been standing here idle all day?’'
  - type: text
    content: ' '
  '7':
  - type: text
    content: They answered him, ‘Because no one hired us.’ He told them, ‘You go into the vineyard also.’
  '8':
  - type: text
    content: ' '
  - type: text
    content: “When evening came, the owner of the vineyard said to his manager, ‘Call the workers and pay them their wages, beginning with the last
  - type: text
    content: ' [to be hired] '
  - type: text
    content: and ending with the first
  - type: text
    content: ' [to be hired].’ [Lev 19:13; Deut 24:15] '
  '9':
  - type: text
    content: 'Those who had been '
  - type: text
    content: hired
  - type: text
    content: ' at the eleventh hour (5:00 p.m.) came and received a denarius each'
  - type: text
    content: ' [a day’s wage]. '
