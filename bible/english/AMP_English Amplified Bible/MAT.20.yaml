document_id: MAT.20,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Laborers in the Vineyard
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “For the kingdom of heaven is like the owner of an estate who went out in the morning at dawn to hire workmen for his vineyard.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now when the first
    - type: text
      text: ' [to be hired] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: came, they thought they would get more; but each of them also received a denarius.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When they received it, they protested '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' grumbled at the owner of the estate,'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: saying, ‘These men who came last worked
    - type: text
      text: ' [only] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: one hour, and yet you have made them equal
    - type: text
      text: ' [in wages] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to us who have carried
    - type: text
      text: ' [most of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the burden and
    - type: text
      text: ' [worked in] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the scorching heat of the day.’
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the owner of the estate replied to one of them, ‘Friend, I am doing you no injustice. Did you not agree with me for a denarius?
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Take what belongs to you and go, but I choose to give to this last man
    - type: text
      text: ' [hired] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the same as I give to you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Am I not lawfully permitted to do what I choose with what is mine? Or is your eye '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: evil because I am good?
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: envious because I am generous?’
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So those who are last
    - type: text
      text: ' [in this world] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: shall be first
    - type: text
      text: ' [in the world to come], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and those who are first, last.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Death, Resurrection Foretold
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'As Jesus was going up to Jerusalem, He took the twelve [disciples] aside, and along the way He said to them, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Listen carefully: we are going up to Jerusalem; and the Son of Man will be handed over to the chief priests and scribes (Sanhedrin, Jewish High Court), and they will'
    - type: text
      text: ' [judicially] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'condemn Him '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' sentence Him to death,'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and will hand Him over to the Gentiles (Roman authorities) to be mocked and scourged and crucified, and He will be raised
    - type: text
      text: ' [to life] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: on the third day.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Preferred Treatment Asked
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When he had agreed with the laborers for a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A day’s wage for a common laborer.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: denarius for the day, he sent them into his vineyard.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then [Salome] the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This woman is believed to be the sister of Jesus’ mother, Mary.
      marker-yv: yv-n
    - type: text
      text: 'mother of Zebedee’s children [James and John] came up to Jesus with her sons and, kneeling down [in respect], asked a favor of Him. [Mark 10:35-45] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And He said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you wish?”
    - type: text
      text: ' She answered Him, “Command that in Your kingdom these two sons of mine may sit [in positions of honor and authority] one on Your right and one on Your left.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You do not realize what you are asking. Are you able to drink the cup
    - type: text
      text: ' [of suffering] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that I am about to drink?”
    - type: text
      text: ' They answered, “We are able.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You will drink My cup
    - type: text
      text: ' [of suffering]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but to sit on My right and on My left this is not Mine to give, but it is for those for whom it has been prepared by My Father.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And when the [other] ten heard this, they were resentful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' angry with the two brothers. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But Jesus called them to Himself and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“You know that the rulers of the Gentiles have absolute power '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' lord it over them, and their great men exercise authority over them'
    - type: text
      text: ' [tyrannizing them]. [Mark 10:42-45; Luke 22:25-27] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is not this way among you, but whoever wishes to become great among you shall be your servant,
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and whoever wishes to be first among you shall be your
    - type: text
      text: ' [willing and humble] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: slave;
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: just as the Son of Man did not come to be served, but to serve, and to give His life as a ransom for many
    - type: text
      text: ' [paying the price to set them free from the penalty of sin].”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sight for the Blind
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'As they were leaving Jericho, a large crowd followed Him. [Mark 10:46-52; Luke 18:35-43] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he went out about the third hour (9:00 a.m.) and saw others standing idle in the market place;
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And two blind men were sitting by the road, and when they heard that Jesus was passing by, they cried out, “Lord, have mercy on us, Son of David (Messiah)!” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The crowd sternly told them to be quiet, but they cried out all the more, “Lord, Son of David (Messiah) have mercy on us!” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jesus stopped and called them, and asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you want Me to do for you?”
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'They answered Him, “Lord, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we want
    - type: text
      text: ' our eyes to be opened.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Moved with compassion, Jesus touched their eyes; and immediately they regained their sight and followed Him [as His disciples].
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he said to them, ‘You also go into the vineyard, and I will pay you whatever is right (an appropriate wage).’ And they went.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He went out about the sixth hour (noon) and the ninth hour (3:00 p.m.), and did the same thing.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And about the eleventh hour (5:00 p.m.) he went out and found others standing '
      - type: usfm
        marker: it
        children:
        - type: text
          text: around,
      - type: text
        text: ' and he said to them, ‘Why have you been standing here idle all day?’'
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They answered him, ‘Because no one hired us.’ He told them, ‘You go into the vineyard also.’
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When evening came, the owner of the vineyard said to his manager, ‘Call the workers and pay them their wages, beginning with the last
    - type: text
      text: ' [to be hired] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and ending with the first
    - type: text
      text: ' [to be hired].’ [Lev 19:13; Deut 24:15] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Those who had been '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hired
      - type: text
        text: ' at the eleventh hour (5:00 p.m.) came and received a denarius each'
    - type: text
      text: ' [a day’s wage]. '
