document_id: DAN.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Time of the End
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Now at that [end] time Michael, the great [angelic] prince who stands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: guard
  - type: text
    text: ' over the children of your people, will arise. And there will be a time of distress such as never occurred since there was a nation until that time; but at that time your people, everyone who is found written in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See 10:21; Mal 3:16; Luke 10:20.
    marker-yv: yv-n
  - type: text
    text: 'Book [of Life], will be rescued. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Many of those who sleep in the dust of the ground will awake (resurrect), these to everlasting life, but some to disgrace and everlasting contempt (abhorrence). [John 5:29] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Those who are [spiritually] wise will shine brightly like the brightness of the expanse of heaven, and those who lead many to righteousness, [will shine] like the stars forever and ever. [Matt 13:43] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But as for you, Daniel, conceal these words and seal up the scroll until the end of time. Many will go back and forth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' search anxiously [through the scroll], and knowledge [of the purpose of God as revealed by His prophets] will [greatly] increase.” [Amos 8:12]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then I, Daniel, looked, and behold, there stood two others, the one [angel] on this bank of the river and the other [angel] on that bank of the river. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And one said to the man dressed in linen, who was above the waters of the river, “How long '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will it be
  - type: text
    text: ' until the end of these wonders?” [Dan 10:5] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I heard the man dressed in linen, who was above the waters of the river, as he held up his right hand and his left hand toward heaven, and swore by Him who lives forever that it would be for a time, times, and a half a time (three and a half years); and as soon as they finish shattering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushing the power of the holy people, all these things will be finished. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'As for me, I heard, but I did not understand; so I said, “My lord, what will be the outcome of these things?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the angel said, “Go '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your way,
  - type: text
    text: ' Daniel, for the words are concealed and sealed up until the end of time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Many will be purged, purified (made white) and refined, but the wicked will behave wickedly. None of the wicked shall understand, but those who are [spiritually] wise will understand. [Dan 11:33-35] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'From the time that the regular sacrifice [that is, the daily burnt offering] is taken away and the abomination of desolation is set up [ruining the temple for worship of the true God], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there will be
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1,290 is 30 days more than 3 1/2 years of 360 day years (1,260 days). The extra 30 days allows for the judgment that will take place after the second coming of Christ.
    marker-yv: yv-n
  - type: text
    text: '1,290 days. [Dan 11:31] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'How blessed [happy, fortunate, spiritually prosperous] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beloved is he who waits expectantly [enduring without wavering for the period of tribulation] and comes to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The difference between this number and that in v 11 is 45 days, an interval that is not explained. The ancient rabbis speculated that when the Messiah comes, He will lead Israel into the wilderness and then disappear for 45 days to test their faith. The true believers will wait for Him, the rest will join other nations and eventually die there.
    marker-yv: yv-n
  - type: text
    text: '1,335 days! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But as for you (Daniel), go '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your way
  - type: text
    text: ' until the end [of your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Daniel was now over ninety years of age.
    marker-yv: yv-n
  - type: text
    text: 'life]; for you will rest and rise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: again
  - type: text
    text: ' for your allotted inheritance at the end of the age.” [Heb 11:32-40]'
