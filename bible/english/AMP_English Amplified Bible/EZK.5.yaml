document_id: EZK.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem’s Desolation Foretold
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And you [Ezekiel], son of man, take a sharp sword and use it as a barber’s razor and shave your head and your beard. Then take scales for weighing and divide the hair [into three parts]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, fathers will eat their sons among you, and sons will eat their fathers; and I will execute judgments on you and I will scatter to all the winds the remnant of you. [Lev 26:33; Deut 28:64; Ezek 12:14; Zech 2:6] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So, as I live,’ says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘surely, because you have defiled My sanctuary with all your detestable idols and with all your abominations, therefore I will also diminish you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' withdraw, and My eye will have no pity and I will not spare [you]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One third of you will die of virulent disease or be consumed by famine among you; one third will fall by the sword around you; and one third I will scatter to all the winds, and I will unsheathe a sword behind them.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Thus My anger will come to an end and I will satisfy My wrath on them, and I will be appeased; then they will know [without any doubt] that I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' have spoken in My zeal when I have spent My wrath on them. [Ezek 36:6; 38:19] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, I will make you a desolation and a disgrace among the nations which surround you and in the sight of all who pass by. [Lev 26:31, 32; Neh 2:17] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So it will be a disgrace, a taunt, a warning and an object of horror to the [pagan] nations who surround you when I execute judgments against you in anger and in wrath and in raging reprimands—I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', have spoken. [Deut 28:37; Ps 79:4; Jer 24:9] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I send against them the deadly arrows of hunger which were for the destruction of those whom I will send to destroy you, then I will increase the famine upon you and break your staff of bread. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Further, I will send against you hunger and wild beasts, and they will bereave you of children; virulent disease and bloodshed also will pass through you, and I will bring the sword on you. I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', have spoken.’ ”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall burn one third with fire in the center of the city, when the days of the siege are completed. Then you shall take one third and strike it with the sword all around the city, and one third you shall scatter to the wind; and I will unsheathe a sword behind them. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also take some of them and bind them in the edges of your robes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again take some hair and throw them into the fire and burn them in the fire; from it a fire will spread to all the house of Israel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘This is Jerusalem; I have set her in the center of the nations, and countries are around her. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she has rebelled against My ordinances more wickedly than the [pagan] nations and against My statutes more than the countries that are around her; for Israel has rejected My ordinances and has not walked in My statutes.’ [Rom 2:14, 15] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘Because you have more turmoil than the nations which surround you and have not walked in My statutes, nor kept My ordinances, nor observed the ordinances of the nations which surround you,’ [Deut 7:2-6; Josh 23:7; Judg 2:2] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: therefore, thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘Behold, I, I Myself, am against you, and I will execute judgments among you in the sight of the nations. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And because of all your abominations, I will do among you that which I have not done, and the like of which I will not do again. [Lam 4:6; Dan 9:12; Amos 3:2] '
