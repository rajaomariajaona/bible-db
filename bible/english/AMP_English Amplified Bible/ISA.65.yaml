    children:
    - type: text
      text: A Rebellious People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“I let Myself be sought by those who did not ask '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for Me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I let Myself be found by those who did not seek Me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I said, ‘Here am I, here am I,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the nation [Israel] which did not call on My Name. [Ex 3:14; Is 58:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“I have spread out My hands all the day long to a rebellious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stubborn people,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who walk in the way that is not good, [following] after their own thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intentions,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The people who continually provoke Me to My face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sacrificing [to idols] in gardens and making offerings with incense on bricks [instead of at the designated altar];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who sit among the graves [trying to conjure up evil spirits] and spend the night in the secret places [where spirits are thought to dwell];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who eat swine’s flesh,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And their pots '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hold
  - type: text
    text: ' the broth of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Meat that is ceremonially unclean or has been kept until the third day.
    marker-yv: yv-n
  - type: text
    text: unclean meat;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Who say, ‘Keep to yourself, do not come near me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: would transfer holiness to you
      - type: text
        text: ' (and thereby make the recipient subject to inconvenient restrictions).'
    marker-yv: yv-n
  - type: text
    text: am too holy for you [and you might defile me]!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: These [people] are smoke in My nostrils,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A fire that burns all the day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Indeed, it is written before Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not keep silent, but I will repay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will even repay it [directly] into their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bosom,
      - type: text
        text: ' i.e. the fold in the outer robe where personal items are sometimes kept.'
    marker-yv: yv-n
  - type: text
    text: arms,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Both your own wickedness and the wickedness of your fathers,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Since they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: too
  - type: text
    text: ' have made offerings with incense on the mountains'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And scorned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taunted Me on the hills,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I therefore will measure [punishment for] their former work [directly] into their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bosom
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: arms.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: This is what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “As the new wine is found in the cluster,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And one says, ‘Do not destroy it, for there is a blessing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' benefit in it,’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I will do for the sake of My servants
- type: usfm
  marker: q1
  children:
  - type: text
    text: In order not to destroy all of them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “I will bring forth descendants from Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And an heir of My mountains from Judah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even My chosen ones shall inherit it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My servants will live there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “And [the plain of] Sharon will be a place for flocks to graze,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Valley of Achor a resting place for herds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For My people who seek Me [who long for Me and require My presence in their lives].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “But you who abandon (turn away from) the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who forget '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ignore My holy mountain (Zion),'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who set a table for Gad [the Babylonian god of fortune],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And who fill a jug of mixed wine for Meni [the god of fate],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will destine you for the sword, [says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all of you will bow down to the slaughter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because when I called, you did not answer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When I spoke, you did not listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' obey.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you did [what was] evil in My sight
- type: usfm
  marker: q1
  children:
  - type: text
    text: And chose that in which I did not delight.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Therefore, the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' says this,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Listen carefully, My servants will eat, but you will be hungry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, My servants will drink, but you will be thirsty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, My servants will rejoice, but you will be put to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Indeed, My servants will shout for joy from a happy heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you will cry out with a heavy heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And you shall wail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' howl from a broken spirit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “And you will leave your name behind to My chosen ones [who will use it] as a curse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' will put you to death,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But He will call His servants by another name [a much greater name, just as the name Israel was greater than the name Jacob]. [Gen 32:28; Jer 29:22]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Because he who blesses himself on the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will bless himself by the God of truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who swears [an oath] on the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will swear by the God of truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because the former troubles are forgotten,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And because they are hidden from My sight. [2 Cor 1:20; Rev 3:14]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: New Heavens and a New Earth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶“Behold, I am creating new heavens and a new earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the former things [of life] will not be remembered or come to mind. [Is 66:22; 2 Pet 3:13; Rev 21:1]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “But be glad and rejoice forever over what I create;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Behold, I am creating Jerusalem to be a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: source of
  - type: text
    text: ' rejoicing'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And her people a joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “I will also rejoice in Jerusalem and be glad in My people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there will no longer be heard in her
- type: usfm
  marker: q1
  children:
  - type: text
    text: The voice of weeping and the sound of crying.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“No longer shall there be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: from there
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'in it an infant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who lives only a few
  - type: text
    text: ' days,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or an old man who does not finish his days;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the youth who dies at the age of a hundred,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the one who does not reach the age of a hundred
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: thought of as
  - type: text
    text: ' accursed.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“They will build houses and live '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will plant vineyards and eat the fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “They will not build and another occupy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will not plant and another eat [the fruit].
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For as the lifetime of a tree, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so will be
  - type: text
    text: ' the days of My people,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My chosen [people] will fully enjoy [and long make use of] the work of their hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “They will not labor in vain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: children
  - type: text
    text: ' for disaster;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they are the descendants of those blessed by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their offspring with them.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'It shall also come to pass that before they call, I will answer; and while they are still speaking, I will hear. [Is 30:19; 58:9; Matt 6:8] '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The wolf and the lamb will graze together, and the lion will eat straw like the ox [there will no longer be predator and prey]; and dust will be the serpent’s food. They will do no evil or harm in all My holy mountain (Zion),” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
