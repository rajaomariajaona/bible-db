document_id: 2KI.13,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Kings of Israel: Jehoahaz and Joash (Jehoash)'
  - type: text
    content: 'In the twenty-third year of Joash the son of Ahaziah, king of Judah, Jehoahaz the son of Jehu became king over Israel in Samaria, '
  - type: text
    content: and he reigned
  - type: text
    content: ' seventeen years. '
  '10':
  - type: text
    content: 'In the thirty-seventh year of Joash king of Judah, '
  - type: note
    content: See note 12:1.
  - type: text
    content: 'Jehoash (Joash) the son of Jehoahaz became king over Israel in Samaria, '
  - type: text
    content: and reigned
  - type: text
    content: ' sixteen years. '
  '11':
  - type: text
    content: He did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: '; he did not turn away from all the [idolatrous] sins of Jeroboam the son of Nebat, who made Israel sin; but he walked in them. '
  '12':
  - type: text
    content: 'Now the rest of the acts of Joash, everything that he did, and his might with which he fought against Amaziah king of Judah, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '13':
  - type: text
    content: Joash slept with his fathers [in death], and Jeroboam [II] sat on his throne. Joash was buried in Samaria with the kings of Israel.
  - type: heading
    content: Death of Elisha
  '14':
  - type: text
    content: 'Now Elisha had become sick with the illness by which he would die. And Joash the king of Israel came down to him and wept over him and said, “O my father, my father, the chariot of Israel and its horsemen!” [2 Kin 2:12] '
  '15':
  - type: text
    content: 'And Elisha said to him, “Take a bow and arrows.” So he took a bow and arrows. '
  '16':
  - type: text
    content: 'Then he said to the king of Israel, “Put your hand on the bow.” And he put his hand on it, and Elisha put his hands on the king’s hands. '
  '17':
  - type: text
    content: And he said, “Open the window to the east,” and he opened it. Then Elisha said, “Shoot!” And he shot. And Elisha said, “The L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' arrow of victory, the arrow of victory over Aram (Syria); for you will strike the Arameans in Aphek until you have destroyed them.” '
  '18':
  - type: text
    content: 'Then he said, “Take the arrows,” and he took them. And Elisha said to the king of Israel, “Strike the ground,” and he struck '
  - type: text
    content: it
  - type: text
    content: ' three times and stopped. '
  '19':
  - type: text
    content: 'So the man of God was angry with him and said, “You should have struck five or six times; then you would have struck down Aram until you had destroyed it. But now you shall strike Aram '
  - type: text
    content: only
  - type: text
    content: ' three times.”'
  '2':
  - type: text
    content: He did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', and followed the [idolatrous] sins of Jeroboam the son of Nebat, who made Israel sin; he did not turn from them. '
  '20':
  - type: text
    content: 'Elisha died, and they buried him. Now marauding bands of Moabites would invade the land in the spring of the year. '
  '21':
  - type: text
    content: And it happened that as a man was being buried [on an open bier], they saw a marauding band [coming]; and they threw the man into Elisha’s grave. But when the [body of the] man [was being let down and] touched the bones of Elisha he revived and stood up on his feet.
  '22':
  - type: text
    content: 'Hazael the king of Aram oppressed Israel all the days of Jehoahaz. '
  '23':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' was gracious to them and had compassion on them and turned toward them for the sake of '
  - type: note
    content: Abraham, Isaac, and Jacob had been dead a thousand years, yet God’s covenant with them was undiminishingly effective.
  - type: text
    content: His covenant with Abraham, Isaac, and Jacob, and He was unwilling to destroy them, and did not cast them from His presence until now. [Mal 3:6]
  '24':
  - type: text
    content: 'Hazael king of Aram (Syria) died; Ben-hadad his son became king in his place. '
  '25':
  - type: text
    content: Then Jehoash (Joash) the son of Jehoahaz recovered from Ben-hadad the son of Hazael the cities which he had taken from Jehoahaz his father by war. Three times Joash defeated Ben-hadad and recovered the cities of Israel. [2 Kin 13:19]
  '3':
  - type: text
    content: So the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' was kindled '
  - type: text
    content: and
  - type: text
    content: ' burned against Israel, and He handed them over time and again to Hazael the king of Aram (Syria), and of Ben-hadad the son of Hazael. '
  '4':
  - type: text
    content: But Jehoahaz sought the favor of the L
  - type: heading
    content: ord
  - type: text
    content: ', and the L'
  - type: heading
    content: ord
  - type: text
    content: ' listened to him; for He saw the oppression of Israel, how the king of Aram oppressed them. '
  '5':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' gave Israel a '
  - type: note
    content: Or deliverer.
  - type: text
    content: 'savior [to rescue them and give them peace], so that they escaped from under the hand of the Arameans; and the sons (descendants) of Israel lived in their tents as before. '
  '6':
  - type: text
    content: 'Yet they did not turn from the [idolatrous] sins of the [royal] house of Jeroboam, who made Israel sin; but walked in them. And the Asherah [set up by Ahab] also remained standing in Samaria [Israel’s capital]. '
  '7':
  - type: text
    content: 'For he left to Jehoahaz [king of Israel] an army of no more than fifty horsemen, ten chariots, and 10,000 footmen, for the king of Aram (Ben-hadad) had destroyed them and made them like dust to be trampled. '
  '8':
  - type: text
    content: 'Now the rest of the acts of Jehoahaz, everything that he did and his might, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '9':
  - type: text
    content: Jehoahaz slept with his fathers [in death], and they buried him in Samaria; Joash his son became king in his place.
