document_id: 2KI.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Kings of Israel: Jehoahaz and Joash (Jehoash)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the twenty-third year of Joash the son of Ahaziah, king of Judah, Jehoahaz the son of Jehu became king over Israel in Samaria, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and he reigned
  - type: text
    text: ' seventeen years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and followed the [idolatrous] sins of Jeroboam the son of Nebat, who made Israel sin; he did not turn from them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was kindled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burned against Israel, and He handed them over time and again to Hazael the king of Aram (Syria), and of Ben-hadad the son of Hazael. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But Jehoahaz sought the favor of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' listened to him; for He saw the oppression of Israel, how the king of Aram oppressed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave Israel a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: deliverer
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'savior [to rescue them and give them peace], so that they escaped from under the hand of the Arameans; and the sons (descendants) of Israel lived in their tents as before. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Yet they did not turn from the [idolatrous] sins of the [royal] house of Jeroboam, who made Israel sin; but walked in them. And the Asherah [set up by Ahab] also remained standing in Samaria [Israel’s capital]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For he left to Jehoahaz [king of Israel] an army of no more than fifty horsemen, ten chariots, and 10,000 footmen, for the king of Aram (Ben-hadad) had destroyed them and made them like dust to be trampled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now the rest of the acts of Jehoahaz, everything that he did and his might, are they not written in the Book of the Chronicles of the Kings of Israel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehoahaz slept with his fathers [in death], and they buried him in Samaria; Joash his son became king in his place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In the thirty-seventh year of Joash king of Judah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 12:1.
    marker-yv: yv-n
  - type: text
    text: 'Jehoash (Joash) the son of Jehoahaz became king over Israel in Samaria, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and reigned
  - type: text
    text: ' sixteen years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; he did not turn away from all the [idolatrous] sins of Jeroboam the son of Nebat, who made Israel sin; but he walked in them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now the rest of the acts of Joash, everything that he did, and his might with which he fought against Amaziah king of Judah, are they not written in the Book of the Chronicles of the Kings of Israel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Joash slept with his fathers [in death], and Jeroboam [II] sat on his throne. Joash was buried in Samaria with the kings of Israel.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Death of Elisha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now Elisha had become sick with the illness by which he would die. And Joash the king of Israel came down to him and wept over him and said, “O my father, my father, the chariot of Israel and its horsemen!” [2 Kin 2:12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Elisha said to him, “Take a bow and arrows.” So he took a bow and arrows. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then he said to the king of Israel, “Put your hand on the bow.” And he put his hand on it, and Elisha put his hands on the king’s hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And he said, “Open the window to the east,” and he opened it. Then Elisha said, “Shoot!” And he shot. And Elisha said, “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' arrow of victory, the arrow of victory over Aram (Syria); for you will strike the Arameans in Aphek until you have destroyed them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then he said, “Take the arrows,” and he took them. And Elisha said to the king of Israel, “Strike the ground,” and he struck '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' three times and stopped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So the man of God was angry with him and said, “You should have struck five or six times; then you would have struck down Aram until you had destroyed it. But now you shall strike Aram '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' three times.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elisha died, and they buried him. Now marauding bands of Moabites would invade the land in the spring of the year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And it happened that as a man was being buried [on an open bier], they saw a marauding band [coming]; and they threw the man into Elisha’s grave. But when the [body of the] man [was being let down and] touched the bones of Elisha he revived and stood up on his feet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hazael the king of Aram oppressed Israel all the days of Jehoahaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was gracious to them and had compassion on them and turned toward them for the sake of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Abraham, Isaac, and Jacob had been dead a thousand years, yet God’s covenant with them was undiminishingly effective.
    marker-yv: yv-n
  - type: text
    text: His covenant with Abraham, Isaac, and Jacob, and He was unwilling to destroy them, and did not cast them from His presence until now. [Mal 3:6]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hazael king of Aram (Syria) died; Ben-hadad his son became king in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Jehoash (Joash) the son of Jehoahaz recovered from Ben-hadad the son of Hazael the cities which he had taken from Jehoahaz his father by war. Three times Joash defeated Ben-hadad and recovered the cities of Israel. [2 Kin 13:19]
