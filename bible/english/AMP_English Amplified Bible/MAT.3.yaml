  '4':
  - type: text
    content: 'Now this same John had clothing made of camel’s hair and a [wide] leather '
  - type: note
    content: This band (sash, girdle) was about six inches wide and had clasps or fasteners in front. It was used to carry personal items such as a dagger, money or other necessary things.
  - type: text
    content: 'band around his waist; and his food was locusts and wild honey. [Lev 11:22; 2 Kin 1:8; Zech 13:4] '
  '5':
  - type: text
    content: 'At that time Jerusalem was going out to him, and all Judea and all the district around the Jordan; '
  '6':
  - type: text
    content: and they were being baptized by him in the Jordan River, as they confessed their sins.
  '7':
  - type: text
    content: 'But when he saw many of the '
  - type: note
    content: The Pharisees identified with the common people and had control over them. They were prominent legalistic leaders in Judaism who were experts in Mosaic Law and its rituals and traditions. They believed in the resurrection of the dead, immortality of the soul and in the existence of angels and spirits.
  - type: text
    content: 'Pharisees and '
  - type: note
    content: The Sadducees were aristocratic members of a priestly group (religious party) who controlled the temple. They denied the possibility of a resurrection and the existence of any spiritual beings apart from God. Although the Sadducees were in the minority, they were leaders of the Sanhedrin, controlling the Jewish High Court.
  - type: text
    content: 'Sadducees coming for baptism, he said to them, “You brood of vipers, who warned you to flee from the [divine] wrath '
  - type: text
    content: and
  - type: text
    content: ' judgment to come? '
  '8':
  - type: text
    content: 'So produce fruit that is consistent with repentance [demonstrating new behavior that proves a change of heart, and a conscious decision to turn away from sin]; '
  '9':
  - type: text
    content: 'and do not presume to say to yourselves [as a defense], ‘We have Abraham for our father [so our inheritance assures us of salvation]’; for I say to you that from these stones God is able to raise up children (descendants) for Abraham. [Luke 3:8] '
