      - type: text
        text: The Preaching of John the Baptist
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In those days '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Considered the last of the Old Testament prophets, John the Baptist was the son of Zecharias (Zechariah) the priest and his wife, Elizabeth. Elizabeth and Mary, the mother of Jesus, were related (Luke 1:36), and Mary may have been with Elizabeth at the time John was born (Luke 1:56). John the Baptist is not to be confused with John the Apostle who along with his brother, James, was among the twelve disciples of Jesus.
      marker-yv: yv-n
    - type: text
      text: 'John the Baptist appeared, preaching in the Wilderness of Judea [along the western side of the Dead Sea] and saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And already the axe [of God’s judgment] is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: laid at
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: swinging toward the root of the trees; therefore every tree that does not bear good fruit is cut down and thrown into the fire.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“As for me, I baptize you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek here can be translated '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in, with,
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: by
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'with water because of [your] repentance [that is, because you are willing to change your inner self—your old way of thinking, regret your sin and live a changed life], but He (the Messiah) who is coming after me is mightier [more powerful, more noble] than I, whose sandals I am not worthy to remove [even as His slave]; He will baptize you [who truly repent] with the Holy Spirit and [you who remain unrepentant] with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Another view of “fire” purports that the text refers to the fiery baptism of the Holy Spirit, not judgment. According to this view the fire indicates that the believer is purified as in the refining of gold. Fire burns up the impurities and the gold (the believer) survives (cf 1 Cor 3:12, 13; James 1:3). The Holy Spirit promised here has been associated with Pentecost, purification, testing, and judgment. Each person who accepts Jesus is filled with the Holy Spirit (Acts 1:5-8).
      marker-yv: yv-n
    - type: text
      text: 'fire (judgment). [Luke 3:16] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'His '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A tool roughly resembling a pitchfork, used to separate grains of wheat from the chaff by throwing the wheat into the air, and allowing the wind to blow away the lighter chaff.
      marker-yv: yv-n
    - type: text
      text: winnowing fork is in His hand, and He will thoroughly clear out His threshing floor; and He will gather His wheat (believers) into His barn (kingdom), but He will burn up the chaff (the unrepentant) with unquenchable fire.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Baptism of Jesus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then Jesus came from Galilee to John at the Jordan [River], to be baptized by him. [Mark 1:9-11; Luke 3:21, 22; John 1:32] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But John tried to prevent Him [vigorously protesting], saying, “It is I who need to be baptized by You, and do You come to me?” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But Jesus replied to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Permit it just now; for this is the fitting way for us '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This act of baptism identified Jesus with sinners whose sins He would ultimately bear, and to whom His righteousness would be imparted.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to fulfill all righteousness.”
    - type: text
      text: ' Then John permitted [it and baptized] Him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'After Jesus was baptized, He came up immediately out of the water; and behold, the heavens were opened, and he (John) saw the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The descent of the Holy Spirit identified Jesus in His humanity for His ministry as the Messiah.
      marker-yv: yv-n
    - type: text
      text: 'Spirit of God descending as a dove and lighting on Him (Jesus), [John 1:32] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and behold, a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the first instance recorded in the Gospels of the Father speaking audibly to His Son. Also see Matt 17:5; Mark 1:11; 9:7; Luke 3:22; 9:35; John 12:28.
      marker-yv: yv-n
    - type: text
      text: 'voice from heaven said, “This is My beloved Son, in whom I am well-pleased '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delighted!” [Ps 2:7; Is 42:1]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jews believed they would automatically be granted entrance into the Messianic kingdom, so this new teaching that repentance was required was very difficult to accept.
      marker-yv: yv-n
    - type: text
      text: 'Repent [change your inner self—your old way of thinking, regret past sins, live your life in a way that proves repentance; seek God’s purpose for your life], for the kingdom of heaven is at hand.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: This is the one who was mentioned by the prophet Isaiah when he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: he voice of one shouting in the wilderness
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘P
    - type: usfm
      marker: sc
      children:
      - type: text
        text: repare the road for the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A ruler or nobleman traveling in the wilderness would have a crew of workmen preparing and clearing the road ahead of him. In spiritual terms, the message was clearing the way for the arrival of the Messiah by preparing the hearts of His followers.
      marker-yv: yv-n
    - type: text
      text: M
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ake
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: is highways straight
    - type: text
      text: ' (level, direct)!’ ” [Is 40:3]'
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now this same John had clothing made of camel’s hair and a [wide] leather '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This band (sash, girdle) was about six inches wide and had clasps or fasteners in front. It was used to carry personal items such as a dagger, money or other necessary things.
      marker-yv: yv-n
    - type: text
      text: 'band around his waist; and his food was locusts and wild honey. [Lev 11:22; 2 Kin 1:8; Zech 13:4] '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'At that time Jerusalem was going out to him, and all Judea and all the district around the Jordan; '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: and they were being baptized by him in the Jordan River, as they confessed their sins.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But when he saw many of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Pharisees identified with the common people and had control over them. They were prominent legalistic leaders in Judaism who were experts in Mosaic Law and its rituals and traditions. They believed in the resurrection of the dead, immortality of the soul and in the existence of angels and spirits.
      marker-yv: yv-n
    - type: text
      text: 'Pharisees and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Sadducees were aristocratic members of a priestly group (religious party) who controlled the temple. They denied the possibility of a resurrection and the existence of any spiritual beings apart from God. Although the Sadducees were in the minority, they were leaders of the Sanhedrin, controlling the Jewish High Court.
      marker-yv: yv-n
    - type: text
      text: 'Sadducees coming for baptism, he said to them, “You brood of vipers, who warned you to flee from the [divine] wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judgment to come? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So produce fruit that is consistent with repentance [demonstrating new behavior that proves a change of heart, and a conscious decision to turn away from sin]; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and do not presume to say to yourselves [as a defense], ‘We have Abraham for our father [so our inheritance assures us of salvation]’; for I say to you that from these stones God is able to raise up children (descendants) for Abraham. [Luke 3:8] '
