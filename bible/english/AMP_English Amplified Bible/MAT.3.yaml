  '1':
  - type: heading
    content: The Preaching of John the Baptist
  - type: text
    content: 'In those days '
  - type: note
    content: Considered the last of the Old Testament prophets, John the Baptist was the son of Zecharias (Zechariah) the priest and his wife, Elizabeth. Elizabeth and Mary, the mother of Jesus, were related (Luke 1:36), and Mary may have been with Elizabeth at the time John was born (Luke 1:56). John the Baptist is not to be confused with John the Apostle who along with his brother, James, was among the twelve disciples of Jesus.
  - type: text
    content: 'John the Baptist appeared, preaching in the Wilderness of Judea [along the western side of the Dead Sea] and saying, '
  '10':
  - type: text
    content: 'And already the axe [of God’s judgment] is '
  - type: note
    content: Lit laid at.
  - type: text
    content: swinging toward the root of the trees; therefore every tree that does not bear good fruit is cut down and thrown into the fire.
  '11':
  - type: text
    content: '“As for me, I baptize you '
  - type: note
    content: The Greek here can be translated in, with, or by.
  - type: text
    content: 'with water because of [your] repentance [that is, because you are willing to change your inner self—your old way of thinking, regret your sin and live a changed life], but He (the Messiah) who is coming after me is mightier [more powerful, more noble] than I, whose sandals I am not worthy to remove [even as His slave]; He will baptize you [who truly repent] with the Holy Spirit and [you who remain unrepentant] with '
  - type: note
    content: Another view of “fire” purports that the text refers to the fiery baptism of the Holy Spirit, not judgment. According to this view the fire indicates that the believer is purified as in the refining of gold. Fire burns up the impurities and the gold (the believer) survives (cf 1 Cor 3:12, 13; James 1:3). The Holy Spirit promised here has been associated with Pentecost, purification, testing, and judgment. Each person who accepts Jesus is filled with the Holy Spirit (Acts 1:5-8).
  - type: text
    content: 'fire (judgment). [Luke 3:16] '
  '12':
  - type: text
    content: 'His '
  - type: note
    content: A tool roughly resembling a pitchfork, used to separate grains of wheat from the chaff by throwing the wheat into the air, and allowing the wind to blow away the lighter chaff.
  - type: text
    content: winnowing fork is in His hand, and He will thoroughly clear out His threshing floor; and He will gather His wheat (believers) into His barn (kingdom), but He will burn up the chaff (the unrepentant) with unquenchable fire.”
  - type: heading
    content: The Baptism of Jesus
  '13':
  - type: text
    content: 'Then Jesus came from Galilee to John at the Jordan [River], to be baptized by him. [Mark 1:9-11; Luke 3:21, 22; John 1:32] '
  '14':
  - type: text
    content: 'But John tried to prevent Him [vigorously protesting], saying, “It is I who need to be baptized by You, and do You come to me?” '
  '15':
  - type: text
    content: 'But Jesus replied to him, '
  - type: text
    content: '“Permit it just now; for this is the fitting way for us '
  - type: note
    content: This act of baptism identified Jesus with sinners whose sins He would ultimately bear, and to whom His righteousness would be imparted.
  - type: text
    content: to fulfill all righteousness.”
  - type: text
    content: ' Then John permitted [it and baptized] Him. '
  '16':
  - type: text
    content: 'After Jesus was baptized, He came up immediately out of the water; and behold, the heavens were opened, and he (John) saw the '
  - type: note
    content: The descent of the Holy Spirit identified Jesus in His humanity for His ministry as the Messiah.
  - type: text
    content: 'Spirit of God descending as a dove and lighting on Him (Jesus), [John 1:32] '
  '17':
  - type: text
    content: 'and behold, a '
  - type: note
    content: This is the first instance recorded in the Gospels of the Father speaking audibly to His Son. Also see Matt 17:5; Mark 1:11; 9:7; Luke 3:22; 9:35; John 12:28.
  - type: text
    content: 'voice from heaven said, “This is My beloved Son, in whom I am well-pleased '
  - type: text
    content: and
  - type: text
    content: ' delighted!” [Ps 2:7; Is 42:1]'
  '2':
  - type: text
    content: “
  - type: note
    content: Jews believed they would automatically be granted entrance into the Messianic kingdom, so this new teaching that repentance was required was very difficult to accept.
  - type: text
    content: 'Repent [change your inner self—your old way of thinking, regret past sins, live your life in a way that proves repentance; seek God’s purpose for your life], for the kingdom of heaven is at hand.” '
