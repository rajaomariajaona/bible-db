    - type: text
      text: '29'
  - type: text
    text: Now it happened at midnight that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' struck every firstborn in the land of Egypt, from the firstborn of Pharaoh who sat on his throne to the firstborn of the prisoner who was in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: house of a cistern
      - type: text
        text: . Cisterns, which were underground water reservoirs, were, when dry, sometimes used to confine prisoners.
    marker-yv: yv-n
  - type: text
    text: 'dungeon, and all the firstborn of the cattle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Pharaoh got up in the night, he and all his servants and all the Egyptians, and there was a great cry [of heartache and sorrow] in Egypt, for there was no house where there was not someone dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then he called for Moses and Aaron at night and said, “Get up, get out from among my people, both you and the Israelites; and go, serve the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', as you said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Take both your flocks and your herds, as you have said, and go, and [ask your God to] bless me also.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Exodus of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The Egyptians [anxiously] urged the people [to leave], to send them out of the land quickly, for they said, “We will all be dead.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: So the people took their dough before it was leavened, their kneading bowls being bound up in their clothes on their shoulders.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Now the Israelites had acted in accordance with the word of Moses; and they had asked the Egyptians for articles of silver and articles of gold, and clothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave the people favor in the sight of the Egyptians, so that they gave them what they asked. And so they plundered the Egyptians [of those things].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Now the Israelites journeyed from Rameses to Succoth, about six hundred thousand men on foot, besides [the women and] the children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'A mixed multitude [of non-Israelites from foreign nations] also went with them, along with both flocks and herds, a very large number of livestock. [Num 11:4; Deut 29:11] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: And they baked unleavened cakes of the dough which they brought from Egypt; it was not leavened, since they were driven [quickly] from Egypt and could not delay, nor had they prepared any food for themselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Now the period of time the children of Israel lived in Egypt was four hundred and thirty years. [Gen 15:13, 14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: At the end of the four hundred and thirty years, to that very day, all the hosts of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [gathered into tribal armies] left the land of Egypt.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
