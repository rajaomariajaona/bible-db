  '30':
  - type: text
    content: 'Pharaoh got up in the night, he and all his servants and all the Egyptians, and there was a great cry [of heartache and sorrow] in Egypt, for there was no house where there was not someone dead. '
  '31':
  - type: text
    content: Then he called for Moses and Aaron at night and said, “Get up, get out from among my people, both you and the Israelites; and go, serve the L
  - type: heading
    content: ord
  - type: text
    content: ', as you said. '
  '32':
  - type: text
    content: Take both your flocks and your herds, as you have said, and go, and [ask your God to] bless me also.”
  - type: heading
    content: Exodus of Israel
  '33':
  - type: text
    content: 'The Egyptians [anxiously] urged the people [to leave], to send them out of the land quickly, for they said, “We will all be dead.” '
  '34':
  - type: text
    content: So the people took their dough before it was leavened, their kneading bowls being bound up in their clothes on their shoulders.
  '35':
  - type: text
    content: 'Now the Israelites had acted in accordance with the word of Moses; and they had asked the Egyptians for articles of silver and articles of gold, and clothing. '
  '36':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' gave the people favor in the sight of the Egyptians, so that they gave them what they asked. And so they plundered the Egyptians [of those things].'
  '37':
  - type: text
    content: 'Now the Israelites journeyed from Rameses to Succoth, about six hundred thousand men on foot, besides [the women and] the children. '
  '38':
  - type: text
    content: 'A mixed multitude [of non-Israelites from foreign nations] also went with them, along with both flocks and herds, a very large number of livestock. [Num 11:4; Deut 29:11] '
  '39':
  - type: text
    content: And they baked unleavened cakes of the dough which they brought from Egypt; it was not leavened, since they were driven [quickly] from Egypt and could not delay, nor had they prepared any food for themselves.
  '4':
  - type: text
    content: 'Now if the household is too small for a lamb [to be consumed], let him and his next door neighbor take one according to the number of people [in the households]; according to what each man can eat, you are to divide the lamb. '
  '40':
  - type: text
    content: 'Now the period of time the children of Israel lived in Egypt was four hundred and thirty years. [Gen 15:13, 14] '
  '41':
  - type: text
    content: At the end of the four hundred and thirty years, to that very day, all the hosts of the L
  - type: heading
    content: ord
  - type: text
    content: ' [gathered into tribal armies] left the land of Egypt.'
  - type: heading
