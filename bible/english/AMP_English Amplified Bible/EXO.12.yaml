  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' Passover, for He passed over the houses of the Israelites in Egypt when He struck the Egyptians, but spared our houses.’ ” And the people bowed [their heads] low and worshiped [God].'
