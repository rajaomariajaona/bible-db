  - type: text
    content: 'foreigner is to eat it; '
  '44':
  - type: text
    content: 'but every man’s slave who is bought with money, after you have circumcised him, then he may eat it. '
  '45':
  - type: text
    content: 'No stranger (temporary resident, foreigner) or hired servant shall eat it. '
  '46':
  - type: text
    content: 'It is to be eaten inside one house; you shall not take any of the meat outside the house, nor shall you break any of its bones. [John 19:33, 36] '
  '47':
  - type: text
    content: 'The entire congregation of Israel shall keep '
  - type: text
