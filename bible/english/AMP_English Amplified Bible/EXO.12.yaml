  '10':
  - type: text
    content: 'You shall let none of the meat remain until the morning, and anything that remains left over until morning, you shall burn completely in the fire. '
  '11':
  - type: text
    content: 'Now you are to eat it in this manner: [be prepared for a journey] with your '
  - type: note
    content: A variation of a phrase often found in the Bible that is an urgent call to get ready for immediate action, or to prepare for a coming action or event. The phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of garments (tunics, cloaks, mantles, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. The girdle (band) also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things. Gird up your mind or gird up your heart are examples of variants of this phrase and call for mental or spiritual preparation for a coming challenge.
  - type: text
