  '6':
  - type: text
    content: 'You shall keep it until the fourteenth day of the same month, then the whole assembly of the congregation of Israel is to slaughter it '
  - type: note
    content: Lit between the two evenings, that is, between sunset and nightfall (likely 6:00-7:20 p.m.) each household was to slaughter its own lamb or goat.
  - type: text
    content: 'at twilight. '
  '7':
  - type: text
    content: 'Moreover, they shall take some of the blood and put it on the two doorposts and on the lintel [above the door] of the houses in which they eat it. [Matt 26:28; John 1:29; Heb 9:14] '
  '8':
  - type: text
    content: 'They shall eat the meat that same night, roasted in fire, and they shall eat it with unleavened bread and bitter herbs. '
  '9':
  - type: text
    content: 'Do not eat any of it raw or boiled in water, but roasted in fire—both its head and its legs, along with its inner parts. '
