  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses and Aaron, “This is the ordinance of the Passover: no '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a gentile who had not become a proselyte to Judaism; but see v 48 for an exception.
    marker-yv: yv-n
  - type: text
    text: 'foreigner is to eat it; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'but every man’s slave who is bought with money, after you have circumcised him, then he may eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'No stranger (temporary resident, foreigner) or hired servant shall eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'It is to be eaten inside one house; you shall not take any of the meat outside the house, nor shall you break any of its bones. [John 19:33, 36] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'The entire congregation of Israel shall keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' celebrate it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: If a stranger living temporarily among you wishes to celebrate the Passover to the L
  - type: usfm
