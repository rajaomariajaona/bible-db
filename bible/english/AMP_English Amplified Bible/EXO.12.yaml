  - type: text
    text: 'at twilight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moreover, they shall take some of the blood and put it on the two doorposts and on the lintel [above the door] of the houses in which they eat it. [Matt 26:28; John 1:29; Heb 9:14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They shall eat the meat that same night, roasted in fire, and they shall eat it with unleavened bread and bitter herbs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Do not eat any of it raw or boiled in water, but roasted in fire—both its head and its legs, along with its inner parts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You shall let none of the meat remain until the morning, and anything that remains left over until morning, you shall burn completely in the fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now you are to eat it in this manner: [be prepared for a journey] with your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A variation of a phrase often found in the Bible that is an urgent call to get ready for immediate action, or to prepare for a coming action or event. The phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of garments (tunics, cloaks, mantles, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. The girdle (band) also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gird up your mind
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: gird up your heart
      - type: text
        text: ' are examples of variants of this phrase and call for mental or spiritual preparation for a coming challenge.'
    marker-yv: yv-n
  - type: text
    text: loins girded [that is, with the outer garment tucked into the band], your sandals on your feet, and your staff in your hand; you shall eat it quickly—it is the L
  - type: usfm
    marker: sc
