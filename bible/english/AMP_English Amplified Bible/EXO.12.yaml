      text: Feast of Unleavened Bread
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ‘Now this day will be a memorial to you, and you shall keep it as a feast to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; throughout your generations you are to celebrate it as an ordinance forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '[In the celebration of the Passover in future years,] seven days you shall eat unleavened bread, but on the first day you shall remove the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the first time leaven is mentioned in the Bible. The Hebrew word (
      - type: usfm
        marker: it
        children:
        - type: text
          text: seor)
      - type: text
        text: ' refers specifically to the leavening agent (as opposed to dough containing it), which today is thought of as yeast, a type of fungus. In Jewish thinking, leaven was symbolic of impurity and corruption. As leaven spreads through dough, sin spreads through a population. Jesus used it as a symbol for the corrupt and hypocritical teachings of the Pharisees and Sadducees (see especially Luke 12:1; cf Matt 16:11; Mark 8:15), but He also used leaven’s ability to permeate a mass of dough many times its own size as an illustration of the spread of the kingdom of heaven (Matt 13:33; Luke 13:21).'
    marker-yv: yv-n
  - type: text
    text: 'leaven from your houses [because it represents the spread of sin]; for whoever eats leavened bread on the first day through the seventh day, that person shall be cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excluded from [the atonement made for] Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'On the first day [of the feast] you shall have a holy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' solemn assembly, and on the seventh day there shall be another holy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' solemn assembly; no work of any kind shall be done on those days, except for the preparation of food which every person must eat—only that may be done by you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'You shall also observe the Feast of Unleavened Bread, because on this very day I brought your hosts [grouped according to tribal armies] out of the land of Egypt; therefore you shall observe this day throughout your generations as an ordinance forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'In the first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: month,
  - type: text
    text: ' on the fourteenth day of the month at evening, you shall eat unleavened bread, [and continue] until the twenty-first day of the month at evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Seven days no leaven shall be found in your houses; whoever eats what is leavened shall be cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excluded from [the atonement made for] the congregation of Israel, whether a stranger or native-born. [1 Cor 5:6-8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You shall eat nothing leavened; in all your dwellings you shall eat unleavened bread.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Moses called for all the elders of Israel and said to them, “Go and take a lamb for yourselves according to [the size of] your families and slaughter the Passover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lamb
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You shall take a bunch of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This evidently was a bristly plant which was useful as a kind of brush.
    marker-yv: yv-n
  - type: text
    text: hyssop, dip it in the blood which is in the basin, and touch some of the blood to the lintel [above the doorway] and to the two doorposts; and none of you shall go outside the door of his house until morning.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Memorial of Redemption
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will pass through to strike the Egyptians; and when He sees the blood on the lintel [above the entry way] and on the two doorposts, the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will pass over the door and will not allow '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Another translation is “the destruction,” which would make Yahweh (God) Himself, and not an “Angel of the Lord,” the One who either “passes over” (Ex 12:13) or “destroys.”
    marker-yv: yv-n
  - type: text
