  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'You shall observe this event [concerning Passover] as an ordinance for you and for your children forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
