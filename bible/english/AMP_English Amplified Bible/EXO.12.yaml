    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' Passover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For I [the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] will pass through the land of Egypt on this night, and will strike down all the firstborn in the land of Egypt, both man and animal; against all the gods of Egypt I will execute judgments [exhibiting their worthlessness]. I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The blood shall be a sign for you on [the doorposts of] the houses where you live; when I see the blood I shall pass over you, and no affliction shall happen to you to destroy you when I strike the land of Egypt. [1 Cor 5:7; Heb 11:28]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
