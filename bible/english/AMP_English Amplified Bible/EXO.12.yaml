  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for having brought them out of the land of Egypt; this [same] night is for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', to be observed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' celebrated by all the Israelites throughout their generations.'
