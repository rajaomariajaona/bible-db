document_id: 1CO.11,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Christian Order
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Imitate me, just as I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: imitate
    - type: text
      text: ' Christ.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the woman ought to have a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sign of
    - type: text
      text: ' authority on her head, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be an indication that angels are present at gatherings of believers.
      marker-yv: yv-n
    - type: text
      text: 'for the sake of the angels [so as not to offend them]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless, woman is not independent of man, nor is man independent of woman. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as the woman originates from the man, so also man is born through the woman; and all things [whether male or female] originate from God [as their Creator]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse acknowledges custom as another, separate argument for a woman’s head covering (v 5).
      marker-yv: yv-n
    - type: text
      text: 'Judge for yourselves; is it proper for a woman to offer prayer to God [publicly] with her head uncovered? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Does not common sense itself teach you that if a man has long hair, it is a dishonor to him, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but if a woman has long hair, it is her ornament '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory? For her long hair is given to her as a covering. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now if anyone is inclined to be contentious [about this], we have no other practice [in worship than this], nor do the churches of God [in general].
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But in giving this next instruction, I do not praise you, because when you meet together it is not for the better but for the worse. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For, in the first place, when you meet together in church, I hear that there are divisions among you; and in part I believe it, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for [doubtless] there have to be factions among you, so that those who are of approved character may be clearly recognized among you. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appreciate you because you remember me in everything and you firmly hold to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The following discourse covers appropriate conduct and relationships within the church, as well as within church-related activities.
      marker-yv: yv-n
    - type: text
      text: 'traditions [the substance of my instructions], just as I have passed them on to you. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when you meet together, it is not to eat the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'When Christ instituted the Lord’s Supper (or the Lord’s Table), it was the Passover meal with the special rituals and explanations that He introduced (Matt 26:26 ff; Luke 22:15 ff). The description given here indicates that the early church celebrated the Lord’s Supper in similar fashion by having a full meal (the so-called '
        - type: usfm
          marker: it
          children:
          - type: text
            text: agape
        - type: text
          text: ' “love” feast) that included the special rites with the bread and wine (see v 21).'
      marker-yv: yv-n
    - type: text
      text: 'Lord’s Supper, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for when you eat, each one hurries to get his own supper first [not waiting for others or the poor]. So one goes hungry while another gets drunk. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What! Do you not have houses in which to eat and drink? Or do you show contempt for the church of God and humiliate those [impoverished believers] who have nothing? What will I say to you? Shall I praise you for this? In this I will not praise you!
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Lord’s Supper
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Many scholars believe this may be the first written description of the Lord’s Supper since this letter from Paul is dated earlier than any of the Gospels.
      marker-yv: yv-n
    - type: text
      text: 'For I received from the Lord Himself that [instruction] which I passed on to you, that the Lord Jesus on the night in which He was betrayed took bread; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and when He had given thanks, He broke it and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This is (represents) My body, which is
    - type: text
      text: ' [offered as a sacrifice] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for you. Do this in
    - type: text
      text: ' [affectionate] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: remembrance of Me.”
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same way, after supper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He took
    - type: text
      text: ' the cup, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This cup is the new covenant
    - type: text
      text: ' [ratified and established] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in My blood; do this, as often as you drink it, in
    - type: text
      text: ' [affectionate] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: remembrance of Me.”
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For every time you eat this bread and drink this cup, you are [symbolically] proclaiming [the fact of] the Lord’s death until He comes [again].
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then whoever eats the bread or drinks the cup of the Lord in a way that is unworthy [of Him] will be guilty of [profaning and sinning against] the body and blood of the Lord. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But a person must [prayerfully] examine himself [and his relationship to Christ], and only when he has done so should he eat of the bread and drink of the cup. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For anyone who eats and drinks [without solemn reverence and heartfelt gratitude for the sacrifice of Christ], eats and drinks a judgment on himself if he does not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. respect Christ’s sacrifice and his fellow believers for whom Christ also died.
      marker-yv: yv-n
    - type: text
      text: 'recognize the body [of Christ]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I want you to understand that Christ is the head (authority over) of every man, and man is the head of woman, and God is the head of Christ. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That [careless and unworthy participation] is the reason why many among you are weak and sick, and a number sleep [in death]. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if we evaluated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judged ourselves honestly [recognizing our shortcomings and correcting our behavior], we would not be judged. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when we [fall short and] are judged by the Lord, we are disciplined [by undergoing His correction] so that we will not be condemned [to eternal punishment] along with the world.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then, my brothers and sisters, when you come together to eat [the Lord’s Supper], wait for one another [and see to it that no one is left out]. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If anyone is too hungry [to wait], let him eat at home, so that you will not come together for judgment [on yourselves]. About the remaining matters [of which I was informed], I will take care of them when I come.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every man who prays or '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The references to men or women prophesying (here and v 5) indicate that Paul has church meetings in mind, where the speaker is leading the congregation in prayer or addressing them.
      marker-yv: yv-n
    - type: text
      text: 'prophesies with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' on his head dishonors his head [and the One who is his head]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And every woman who prays or prophesies when she has her '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In public, respectable women wore their hair done up in a modest style. In the Greco-Roman-Jewish culture of the time, hair worn down and loose would suggest a woman of questionable morals.
      marker-yv: yv-n
    - type: text
      text: 'head uncovered disgraces her head; for she is one and the same as the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possibly the mark of an adulteress or prostitute, but likely a sign of disgrace for any number of reasons. In one of Aristophanes’ comedies, for example, head shaving is recommended for a woman whose son is cowardly or otherwise worthless.
      marker-yv: yv-n
    - type: text
      text: 'woman whose head is shaved [in disgrace]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If a woman does not cover her head, she should have her hair cut off; and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'There is little doubt that this would appear disgraceful and embarrassing, but Paul is essentially providing his readers a simple way to determine for themselves if a woman should '
        - type: usfm
          marker: it
          children:
          - type: text
            text: cover her head
        - type: text
          text: ' while prophesying or leading prayer in church.'
      marker-yv: yv-n
    - type: text
      text: 'if it is disgraceful for a woman to have her hair cut off or her head shaved, she should cover her head. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A man ought not have his head covered [during worship], since he is the image and [reflected] glory of God; but the woman is [the expression of] man’s glory. [Gen 1:26] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For man does not originate from woman, but woman from man; [Gen 2:21-23] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for indeed man was not created for the sake of woman, but woman for the sake of man. [Gen 2:18] '
