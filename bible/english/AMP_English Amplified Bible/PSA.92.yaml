  - type: text
    text: Psalm 92
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Praise for the L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: s
    - type: text
      text: ' Goodness.'
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm. A Song for the Sabbath day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It is a good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delightful thing to give thanks to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: To sing praises to Your name, O Most High,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: To declare Your lovingkindness in the morning
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your faithfulness by night,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: With an instrument of ten strings and with the harp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With a solemn sound on the lyre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', have made me glad by Your works;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the works of Your hands I joyfully sing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶How great are Your works, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your thoughts are very deep [beyond man’s understanding].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A senseless man [in his crude and uncultivated state] knows nothing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nor does a [self-righteous] fool understand this:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: That though the wicked sprout up like grass
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all evildoers flourish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will be destroyed forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But You, L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', are on high forever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For behold, Your enemies, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: For behold, Your enemies will perish;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who do evil will be scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶But my horn [my emblem of strength and power] You have exalted like that of a wild ox;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am anointed with fresh oil [for Your service].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My eye has looked on my foes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My ears hear of the evildoers who rise up against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The righteous will flourish like the date palm [long-lived, upright and useful];
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will grow like a cedar in Lebanon [majestic and stable].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Planted in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will flourish in the courts of our God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '[Growing in grace] they will still thrive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bear fruit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosper in old age;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They will flourish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '92:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fat and very green
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: vital and fresh [rich in trust and love and contentment];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '[They are living memorials] to declare that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful [to His promises];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is my rock, and there is no unrighteousness in Him. [Rom 9:14]
