document_id: PSA.92,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 92
  - type: heading
    content: Praise for the Lord’s Goodness.
  - type: text
    content: A Psalm. A Song for the Sabbath day.
  - type: text
    content: 'It is a good '
  - type: text
    content: and
  - type: text
    content: ' delightful thing to give thanks to the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: To sing praises to Your name, O Most High,
  '10':
  - type: text
    content: ¶But my horn [my emblem of strength and power] You have exalted like that of a wild ox;
  - type: text
    content: I am anointed with fresh oil [for Your service].
  '11':
  - type: text
    content: My eye has looked on my foes;
  - type: text
    content: My ears hear of the evildoers who rise up against me.
  '12':
  - type: text
    content: The righteous will flourish like the date palm [long-lived, upright and useful];
  - type: text
    content: They will grow like a cedar in Lebanon [majestic and stable].
  '13':
  - type: text
    content: Planted in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: They will flourish in the courts of our God.
  '14':
  - type: text
    content: '[Growing in grace] they will still thrive '
  - type: text
    content: and
  - type: text
    content: ' bear fruit '
  - type: text
    content: and
  - type: text
    content: ' prosper in old age;'
  - type: text
    content: 'They will flourish '
  - type: text
    content: and
  - type: text
    content: ' be '
  - type: note
    content: Lit fat and very green.
  - type: text
    content: vital and fresh [rich in trust and love and contentment];
  '15':
  - type: text
    content: '[They are living memorials] to declare that the L'
  - type: heading
    content: ord
  - type: text
    content: ' is upright '
  - type: text
    content: and
  - type: text
    content: ' faithful [to His promises];'
  - type: text
    content: He is my rock, and there is no unrighteousness in Him. [Rom 9:14]
  '2':
  - type: text
    content: To declare Your lovingkindness in the morning
  - type: text
    content: And Your faithfulness by night,
  '3':
  - type: text
    content: With an instrument of ten strings and with the harp,
  - type: text
    content: With a solemn sound on the lyre.
  '4':
  - type: text
    content: For You, O L
  - type: heading
    content: ord
  - type: text
    content: ', have made me glad by Your works;'
  - type: text
    content: At the works of Your hands I joyfully sing.
  '5':
  - type: text
    content: ¶How great are Your works, O L
  - type: heading
    content: ord
  - type: text
    content: '!'
  - type: text
    content: Your thoughts are very deep [beyond man’s understanding].
  '6':
  - type: text
    content: A senseless man [in his crude and uncultivated state] knows nothing,
  - type: text
    content: 'Nor does a [self-righteous] fool understand this:'
  '7':
  - type: text
    content: That though the wicked sprout up like grass
  - type: text
    content: And all evildoers flourish,
  - type: text
    content: They will be destroyed forever.
  '8':
  - type: text
    content: But You, L
  - type: heading
    content: ord
  - type: text
    content: ', are on high forever.'
  '9':
  - type: text
    content: For behold, Your enemies, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: For behold, Your enemies will perish;
  - type: text
    content: All who do evil will be scattered.
