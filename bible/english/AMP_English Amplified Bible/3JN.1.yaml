document_id: 3JN.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You Walk in the Truth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The elder [of the church addresses this letter] to the beloved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' esteemed Gaius, whom I love in truth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason, if I come, I will call attention to what he is doing, unjustly accusing us with wicked words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unjustified charges. And not satisfied with this, he refuses to receive the [missionary] brothers himself, and also forbids those who want to [welcome them] and puts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' out of the church.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, do not imitate what is evil, but [imitate] what is good. The one who practices good [exhibiting godly character, moral courage and personal integrity] is of God; the one who practices [or permits or tolerates] evil has not seen God [he has no personal experience with Him and does not know Him at all]. [1 John 3:6] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Demetrius has received a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: good
    - type: text
      text: ' testimony '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' commendation from everyone—and from the truth [the standard of God’s word] itself; and we add our testimony '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' speak well of him, and you know that our testimony is true.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I had many things [to say when I began] to write to you, but I prefer not to put it down with pen (reed) and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A mixture of water, charcoal, and gum resin used for writing.
      marker-yv: yv-n
    - type: text
      text: 'black (ink); '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I hope to see you soon, and we will speak '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mouth to mouth
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: face to face. [Num 12:8]
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peace be to you. The friends [here] greet you. Greet the friends [personally] by name.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, I pray that in every way you may succeed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosper and be in good health [physically], just as [I know] your soul prospers [spiritually]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I was greatly pleased when [some of the] brothers came [from time to time] and testified to your [faithfulness to the] truth [of the gospel message], '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is,
    - type: text
      text: ' how you are walking in truth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I have no greater joy than this, to hear that my [spiritual] children are living [their lives] in the truth.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, you are acting faithfully in what you are providing for the brothers, and especially '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when they are
    - type: text
      text: ' strangers; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they have testified before the church of your love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' friendship. You will do well to [assist them and] send them on their way in a manner worthy of God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For these [traveling missionaries] went out for the sake of the Name [of Christ], accepting nothing [in the way of assistance] from the Gentiles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So we ought to support such people [welcoming them as guests and providing for them], so that we may be fellow workers for the truth [that is, for the gospel message of salvation].
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I wrote something to the church; but Diotrephes, who loves to put himself first, does not accept what we say '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refuses to recognize my authority. '
