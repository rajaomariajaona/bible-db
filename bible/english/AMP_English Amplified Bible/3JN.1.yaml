document_id: 3JN.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: You Walk in the Truth
  - type: text
    content: 'The elder [of the church addresses this letter] to the beloved '
  - type: text
    content: and
  - type: text
    content: ' esteemed Gaius, whom I love in truth.'
  '10':
  - type: text
    content: 'For this reason, if I come, I will call attention to what he is doing, unjustly accusing us with wicked words '
  - type: text
    content: and
  - type: text
    content: ' unjustified charges. And not satisfied with this, he refuses to receive the [missionary] brothers himself, and also forbids those who want to [welcome them] and puts '
  - type: text
    content: them
  - type: text
    content: ' out of the church.'
  '11':
  - type: text
    content: 'Beloved, do not imitate what is evil, but [imitate] what is good. The one who practices good [exhibiting godly character, moral courage and personal integrity] is of God; the one who practices [or permits or tolerates] evil has not seen God [he has no personal experience with Him and does not know Him at all]. [1 John 3:6] '
  '12':
  - type: text
    content: 'Demetrius has received a '
  - type: text
    content: good
  - type: text
    content: ' testimony '
  - type: text
    content: and
  - type: text
    content: ' commendation from everyone—and from the truth [the standard of God’s word] itself; and we add our testimony '
  - type: text
    content: and
  - type: text
    content: ' speak well of him, and you know that our testimony is true.'
  '13':
  - type: text
    content: 'I had many things [to say when I began] to write to you, but I prefer not to put it down with pen (reed) and '
  - type: note
    content: A mixture of water, charcoal, and gum resin used for writing.
  - type: text
    content: 'black (ink); '
  '14':
  - type: text
    content: 'but I hope to see you soon, and we will speak '
  - type: note
    content: Lit mouth to mouth.
  - type: text
    content: face to face. [Num 12:8]
  '15':
  - type: text
    content: Peace be to you. The friends [here] greet you. Greet the friends [personally] by name.
  '2':
  - type: text
    content: 'Beloved, I pray that in every way you may succeed '
  - type: text
    content: and
  - type: text
    content: ' prosper and be in good health [physically], just as [I know] your soul prospers [spiritually]. '
  '3':
  - type: text
    content: 'For I was greatly pleased when [some of the] brothers came [from time to time] and testified to your [faithfulness to the] truth [of the gospel message], '
  - type: text
    content: that is,
  - type: text
    content: ' how you are walking in truth. '
  '4':
  - type: text
    content: I have no greater joy than this, to hear that my [spiritual] children are living [their lives] in the truth.
  '5':
  - type: text
    content: 'Beloved, you are acting faithfully in what you are providing for the brothers, and especially '
  - type: text
    content: when they are
  - type: text
    content: ' strangers; '
  '6':
  - type: text
    content: 'and they have testified before the church of your love '
  - type: text
    content: and
  - type: text
    content: ' friendship. You will do well to [assist them and] send them on their way in a manner worthy of God. '
  '7':
  - type: text
    content: 'For these [traveling missionaries] went out for the sake of the Name [of Christ], accepting nothing [in the way of assistance] from the Gentiles. '
  '8':
  - type: text
    content: So we ought to support such people [welcoming them as guests and providing for them], so that we may be fellow workers for the truth [that is, for the gospel message of salvation].
  '9':
  - type: text
    content: 'I wrote something to the church; but Diotrephes, who loves to put himself first, does not accept what we say '
  - type: text
    content: and
  - type: text
    content: ' refuses to recognize my authority. '
