document_id: GEN.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob’s Fear of Esau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then as Jacob went on his way, the angels of God met him [to reassure and protect him]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When Jacob saw them, he said, “This is God’s camp.” So he named that place Mahanaim (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob may have been referring to the angels as another camp, along with his own, and viewing their presence as evidence of divine protection. This was Jacob’s second encounter with the “angels of God” (28:12).
    marker-yv: yv-n
  - type: text
    text: double camps). [Gen 32:7, 10]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Jacob sent messengers ahead of him to his brother Esau in the land of Seir, the country of Edom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He commanded them, saying, “This is what to say to my lord Esau: ‘Your servant Jacob says this, “I have been living temporarily with Laban, and have stayed there until now; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I have oxen, donkeys, flocks, male servants, and female servants; and I have sent [this message] to tell my lord, so that I may find grace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness in your sight.” ’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The messengers returned to Jacob, saying, “We went to your brother Esau, and now he is coming to meet you, and there are four hundred men with him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jacob was greatly afraid and distressed; and he divided the people who were with him, and the flocks and herds and camels, into two camps; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and he said, “If Esau comes to the one camp and attacks it, then the other camp which is left will escape.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jacob said, “O God of my father Abraham and God of my father Isaac, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', who said to me, ‘Return to your country and to your people, and I will make you prosper,’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I am unworthy of all the lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassion and of all the faithfulness which You have shown to Your servant. With only my staff [long ago] I crossed over this Jordan, and now I have become [blessed and increased into these] two groups [of people]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Save me, please, from the hand of my brother, from the hand of Esau; for I fear him, that he will come and attack me and the mothers with the children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And You [L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] said, ‘I will certainly make you prosper and make your descendants as [numerous as] the sand of the sea, which is too great to be counted.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Jacob spent the night there. Then he selected a present for his brother Esau from the livestock he had acquired: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'two hundred female goats, twenty male goats, two hundred ewes, twenty rams, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'thirty milking camels with their colts, forty cows, ten bulls, twenty female donkeys, and ten [donkey] colts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He put them into the care of his servants, every herd by itself, and said to his servants, “Go on ahead of me, and put an interval [of space] between the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: individual
  - type: text
    text: ' herds.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then he commanded the one in front, saying, “When Esau my brother meets you and asks to whom you belong, and where you are going, and whose are the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: animals
  - type: text
    text: ' in front of you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'then you shall say, ‘They are your servant Jacob’s; they are a gift sent to my lord Esau. And he also is behind us.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And so Jacob commanded the second and the third as well, and all that followed the herds, saying, “This is what you shall say to Esau when you meet him; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and you shall say, ‘Look, your servant Jacob is behind us.’ ” For he said [to himself], “I will try to appease him with the gift that is going ahead of me. Then afterward I will see him; perhaps he will accept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forgive me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So the gift [of the herds of livestock] went on ahead of him, and he himself spent that night back in the camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But he got up that same night and took his two wives, his two female servants, and his eleven children, and waded over the ford of the Jabbok. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then he took them and sent them across the brook. And he also sent across whatever he had.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob Wrestles
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Jacob was left alone, and a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was God Himself (as Jacob eventually realizes in Gen 32:30; see also v 29 and Hosea 12:4), in the form of an angel.
    marker-yv: yv-n
  - type: text
    text: 'Man [came and] wrestled with him until daybreak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When the Man saw that He had not prevailed against Jacob, He touched his hip joint; and Jacob’s hip was dislocated as he wrestled with Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then He said, “Let Me go, for day is breaking.” But Jacob said, “I will not let You go unless You declare a blessing on me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So He asked him, “What is your name?” And he said, “Jacob.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And He said, “Your name shall no longer be Jacob, but '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “He who strives with God,” or “God strives.”
    marker-yv: yv-n
  - type: text
    text: 'Israel; for you have struggled with God and with men and have prevailed.” [Hos 12:3, 4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Jacob asked Him, “Please tell me Your name.” But He said, “Why is it that you ask My name?” And He declared a blessing [of the covenant promises] on Jacob there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So Jacob named the place Peniel (the face of God), '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' “For I have seen God face to face, yet my life has not been snatched away.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Now the sun rose on him as he passed Penuel (Peniel), and he was limping because of his hip. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Therefore, to this day the Israelites do not eat the tendon of the hip which is on the socket of the thigh, because He touched the socket of Jacob’s thigh by the tendon of the hip.
