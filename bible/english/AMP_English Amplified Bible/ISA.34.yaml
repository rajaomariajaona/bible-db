document_id: ISA.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Wrath against Nations
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Come near, you nations, to hear; and listen, O peoples!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the earth and all that is in it hear, and the world and all that comes forth from it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is angry at all the nations,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' wrath is against all their armies;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He has '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: put them under the ban
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: utterly doomed them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has given them over to slaughter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So their slain will be thrown out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the stench of their corpses will rise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the mountains will flow with their blood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All the host of heaven will be dissolved,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the skies will be rolled up like a scroll;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All their hosts [the stars and the planets] will also wither away
- type: usfm
  marker: q1
  children:
  - type: text
    text: As a leaf withers from the vine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And as a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fig
  - type: text
    text: ' withers from the fig tree. [Rev 6:13, 14]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For My sword is satiated [with blood] in heaven;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, it will come down for judgment on Edom
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on the people whom I have doomed for destruction. [Obad 8-21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The sword of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is filled with blood [from sacrifices],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It drips with fat, with the blood of lambs and goats,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the fat of the kidneys of rams.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has a sacrifice in Bozrah (Edom’s capital city)'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a great slaughter in the land of Edom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Wild oxen will also fall with them
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the young bulls with the strong bulls;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their land will be soaked with blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their dust made greasy with fat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has a day of vengeance,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A year of retribution for the cause of Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The streams [of Edom] will be turned into pitch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its dust into brimstone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its land will become burning pitch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The burning will not be quenched night or day;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its smoke will go up forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From generation to generation it will lie in ruins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one will ever again pass through it. [Rev 19:3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the pelican and the porcupine will take possession of it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The owl and the raven will dwell in it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will stretch over it (Edom) the measuring line of desolation
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the plumb line of emptiness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Its nobles—there is no one there
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whom they may proclaim king—
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all its princes will be nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Thorns will come up in its fortified palaces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nettles and brambles in its fortified cities;
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will be a haunt for jackals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: An abode for ostriches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The creatures of the desert will encounter jackals
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: demon satyr
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: hairy goat will call to its kind;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indeed, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Thought by some to be a female demon associated with the night.
    marker-yv: yv-n
  - type: text
    text: Lilith (night demon) will settle there
- type: usfm
  marker: q1
  children:
  - type: text
    text: And find herself a place of rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: There the arrow snake will make her nest and lay her eggs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And hatch them and gather '
  - type: usfm
    marker: it
    children:
    - type: text
      text: her young
  - type: text
    text: ' under her protection;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, the birds of prey will be gathered there [to breed],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every one with its own kind.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Seek from the book of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and read:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not one of these [creatures] will be missing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: None will lack its mate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For His mouth has commanded,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His Spirit has gathered them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has cast the lot for them,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And His hand has divided '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' apportioned '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: it to them
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Edom to the wild beasts by measuring-line.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will possess it forever;
- type: usfm
  marker: q1
  children:
  - type: text
    text: From generation to generation they will dwell in it.
