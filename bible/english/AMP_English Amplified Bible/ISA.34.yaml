document_id: ISA.34,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Wrath against Nations
  - type: text
    content: Come near, you nations, to hear; and listen, O peoples!
  - type: text
    content: Let the earth and all that is in it hear, and the world and all that comes forth from it.
  '10':
  - type: text
    content: The burning will not be quenched night or day;
  - type: text
    content: Its smoke will go up forever.
  - type: text
    content: From generation to generation it will lie in ruins;
  - type: text
    content: No one will ever again pass through it. [Rev 19:3]
  '11':
  - type: text
    content: But the pelican and the porcupine will take possession of it;
  - type: text
    content: The owl and the raven will dwell in it.
  - type: text
    content: And He will stretch over it (Edom) the measuring line of desolation
  - type: text
    content: And the plumb line of emptiness.
  '12':
  - type: text
    content: Its nobles—there is no one there
  - type: text
    content: Whom they may proclaim king—
  - type: text
    content: And all its princes will be nothing.
  '13':
  - type: text
    content: Thorns will come up in its fortified palaces,
  - type: text
    content: Nettles and brambles in its fortified cities;
  - type: text
    content: It will be a haunt for jackals,
  - type: text
    content: An abode for ostriches.
  '14':
  - type: text
    content: The creatures of the desert will encounter jackals
  - type: text
    content: 'And the '
  - type: note
    content: Or demon satyr.
  - type: text
    content: hairy goat will call to its kind;
  - type: text
    content: 'Indeed, '
  - type: note
    content: Thought by some to be a female demon associated with the night.
  - type: text
    content: Lilith (night demon) will settle there
  - type: text
    content: And find herself a place of rest.
  '15':
  - type: text
    content: There the arrow snake will make her nest and lay her eggs,
  - type: text
    content: 'And hatch them and gather '
  - type: text
    content: her young
  - type: text
    content: ' under her protection;'
  - type: text
    content: Indeed, the birds of prey will be gathered there [to breed],
  - type: text
    content: Every one with its own kind.
  '16':
  - type: text
    content: Seek from the book of the L
  - type: heading
    content: ord
  - type: text
    content: ', and read:'
  - type: text
    content: Not one of these [creatures] will be missing;
  - type: text
    content: None will lack its mate.
  - type: text
    content: For His mouth has commanded,
  - type: text
    content: And His Spirit has gathered them.
  '17':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has cast the lot for them,'
  - type: text
    content: 'And His hand has divided '
  - type: text
    content: and
  - type: text
    content: ' apportioned '
  - type: note
    content: Lit it to them.
  - type: text
    content: Edom to the wild beasts by measuring-line.
  - type: text
    content: They will possess it forever;
  - type: text
    content: From generation to generation they will dwell in it.
  '2':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' is angry at all the nations,'
  - type: text
    content: 'And '
  - type: text
    content: His
  - type: text
    content: ' wrath is against all their armies;'
  - type: text
    content: 'He has '
  - type: note
    content: Lit put them under the ban.
  - type: text
    content: utterly doomed them,
  - type: text
    content: He has given them over to slaughter.
  '3':
  - type: text
    content: So their slain will be thrown out,
  - type: text
    content: And the stench of their corpses will rise,
  - type: text
    content: And the mountains will flow with their blood.
  '4':
  - type: text
    content: All the host of heaven will be dissolved,
  - type: text
    content: And the skies will be rolled up like a scroll;
  - type: text
    content: All their hosts [the stars and the planets] will also wither away
  - type: text
    content: As a leaf withers from the vine,
  - type: text
    content: 'And as a '
  - type: text
    content: fig
  - type: text
    content: ' withers from the fig tree. [Rev 6:13, 14]'
  '5':
  - type: text
    content: For My sword is satiated [with blood] in heaven;
  - type: text
    content: Indeed, it will come down for judgment on Edom
  - type: text
    content: And on the people whom I have doomed for destruction. [Obad 8-21]
  '6':
  - type: text
    content: The sword of the L
  - type: heading
    content: ord
  - type: text
    content: ' is filled with blood [from sacrifices],'
  - type: text
    content: It drips with fat, with the blood of lambs and goats,
  - type: text
    content: With the fat of the kidneys of rams.
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has a sacrifice in Bozrah (Edom’s capital city)'
  - type: text
    content: And a great slaughter in the land of Edom.
  '7':
  - type: text
    content: Wild oxen will also fall with them
  - type: text
    content: And the young bulls with the strong bulls;
  - type: text
    content: And their land will be soaked with blood,
  - type: text
    content: And their dust made greasy with fat.
  '8':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has a day of vengeance,'
  - type: text
    content: A year of retribution for the cause of Zion.
  '9':
  - type: text
    content: The streams [of Edom] will be turned into pitch,
  - type: text
    content: And its dust into brimstone,
  - type: text
    content: And its land will become burning pitch.
