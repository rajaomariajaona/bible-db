document_id: 2CH.27,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jotham Succeeds Uzziah in Judah
  - type: text
    content: 'Jotham was twenty-five years old when he became king, and he reigned for sixteen years in Jerusalem. His mother’s name was Jerushah the daughter of Zadok. '
  '2':
  - type: text
    content: He did right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', in accordance with everything that his father Uzziah had done; however, he did not enter the temple of the L'
  - type: heading
    content: ord
  - type: text
    content: '. But the people continued behaving corruptly. '
  '3':
  - type: text
    content: He built the upper gate of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', and did extensive building on the wall of Ophel. '
  '4':
  - type: text
    content: 'Moreover, he built cities in the hill country of Judah, and in the forests he built fortresses and towers. '
  '5':
  - type: text
    content: 'He also fought with the king of the Ammonites and prevailed over them. As a result the Ammonites gave him during that year a hundred talents of silver and ten thousand measures each of wheat and of barley. The Ammonites also paid him that much in the second year and third year. '
  '6':
  - type: text
    content: So Jotham grew powerful, because he directed his ways before the L
  - type: heading
    content: ord
  - type: text
    content: ' his God. '
  '7':
  - type: text
    content: 'Now the rest of the acts of Jotham, and all his wars and his ways, behold, they are written in the Book of the Kings of Israel and Judah. '
  '8':
  - type: text
    content: 'He was twenty-five years old when he became king, and he reigned for sixteen years in Jerusalem. '
  '9':
  - type: text
    content: And Jotham slept with his fathers [in death], and they buried him in the City of David. Ahaz his son became king in his place.
