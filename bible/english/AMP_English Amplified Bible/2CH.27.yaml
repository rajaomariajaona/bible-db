document_id: 2CH.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jotham Succeeds Uzziah in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jotham was twenty-five years old when he became king, and he reigned for sixteen years in Jerusalem. His mother’s name was Jerushah the daughter of Zadok. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He did right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in accordance with everything that his father Uzziah had done; however, he did not enter the temple of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. But the people continued behaving corruptly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He built the upper gate of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and did extensive building on the wall of Ophel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moreover, he built cities in the hill country of Judah, and in the forests he built fortresses and towers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He also fought with the king of the Ammonites and prevailed over them. As a result the Ammonites gave him during that year a hundred talents of silver and ten thousand measures each of wheat and of barley. The Ammonites also paid him that much in the second year and third year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Jotham grew powerful, because he directed his ways before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now the rest of the acts of Jotham, and all his wars and his ways, behold, they are written in the Book of the Kings of Israel and Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He was twenty-five years old when he became king, and he reigned for sixteen years in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And Jotham slept with his fathers [in death], and they buried him in the City of David. Ahaz his son became king in his place.
