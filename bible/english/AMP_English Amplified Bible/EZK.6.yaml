  '1':
  - type: heading
    content: Idolatrous Worship Denounced
  - type: text
    content: And the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: Then they will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ; I have not said in vain that I would bring this disaster [as punishment] on them.” ’
  '11':
  - type: text
    content: “Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘Strike with your fist, stamp with your foot and say, “Alas, because of all the evil atrocities of the house of Israel, which will fall by sword, by famine, and by virulent disease! '
  '12':
  - type: text
    content: 'He who is far away will die of the virulent disease, and he who is near will fall by the sword, and he who remains and is besieged will die by the famine. Thus I will spend My wrath on them. '
  '13':
  - type: text
    content: Then you will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ', when their slain are among their idols around their altars, on every high hill, on all the tops of the mountains, under every leafy tree and under every oak with thick branches, the places where they offered sweet incense '
  - type: text
    content: and
  - type: text
    content: ' a soothing aroma to all their idols. '
  '14':
  - type: text
    content: And I will stretch out My hand against them and make the land a more desolate waste than the wilderness toward Diblah [the Moabite city], throughout all the places where they live; and they will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: .” ’ ”
  '2':
  - type: text
    content: '“Son of man, set your face against the mountains of Israel and prophesy against them, '
  '3':
  - type: text
    content: and say, ‘You mountains of Israel, hear the word of the Lord G
  - type: heading
    content: od
  - type: text
    content: '! Thus says the Lord G'
  - type: heading
    content: od
  - type: text
    content: ' to the mountains and the hills, to the ravines and the valleys: “Behold, I Myself am going to bring a sword on you, and I will destroy your high places [of idolatrous worship], '
  '4':
  - type: text
    content: 'and your altars will become deserted and your pillars for sun-worship will be smashed in pieces; and I will throw down your slain in front of your idols [that cannot bring them back to life]. [Lev 26:30] '
  '5':
  - type: text
    content: 'I will also lay the dead bodies of the children of Israel in front of their [Canaanite] idols; and I will scatter your bones all around your altars. '
  '6':
  - type: text
    content: 'Everywhere you live, the cities will become waste and the high places will become deserted, so that your altars may bear their guilt '
  - type: text
    content: and
  - type: text
    content: ' become deserted, your idols may be broken and destroyed, your incense altars [for sun-worship] may be cut down, and your works may be blotted out. '
  '7':
  - type: text
    content: The slain will fall among you, then you shall know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: .
  '8':
  - type: text
    content: '“Yet I will leave some of you alive [a remnant], for you will have some who escaped the sword among the nations when you are scattered throughout the countries. '
  '9':
  - type: text
    content: 'Then those of you who escape will remember Me among the nations to which they will be exiled, how I have been broken by their lewdness '
  - type: text
    content: and
  - type: text
    content: ' their adulterous hearts which have turned away from Me, and by their eyes which lust after their idols; and they will loathe themselves for the evils which they have committed, for all their repulsive acts. '
