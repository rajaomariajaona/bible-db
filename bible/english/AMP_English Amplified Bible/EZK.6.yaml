document_id: EZK.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Idolatrous Worship Denounced
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, set your face against the mountains of Israel and prophesy against them, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and say, ‘You mountains of Israel, hear the word of the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '! Thus says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' to the mountains and the hills, to the ravines and the valleys: “Behold, I Myself am going to bring a sword on you, and I will destroy your high places [of idolatrous worship], '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and your altars will become deserted and your pillars for sun-worship will be smashed in pieces; and I will throw down your slain in front of your idols [that cannot bring them back to life]. [Lev 26:30] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I will also lay the dead bodies of the children of Israel in front of their [Canaanite] idols; and I will scatter your bones all around your altars. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Everywhere you live, the cities will become waste and the high places will become deserted, so that your altars may bear their guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become deserted, your idols may be broken and destroyed, your incense altars [for sun-worship] may be cut down, and your works may be blotted out. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The slain will fall among you, then you shall know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Yet I will leave some of you alive [a remnant], for you will have some who escaped the sword among the nations when you are scattered throughout the countries. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then those of you who escape will remember Me among the nations to which they will be exiled, how I have been broken by their lewdness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their adulterous hearts which have turned away from Me, and by their eyes which lust after their idols; and they will loathe themselves for the evils which they have committed, for all their repulsive acts. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then they will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; I have not said in vain that I would bring this disaster [as punishment] on them.” ’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘Strike with your fist, stamp with your foot and say, “Alas, because of all the evil atrocities of the house of Israel, which will fall by sword, by famine, and by virulent disease! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He who is far away will die of the virulent disease, and he who is near will fall by the sword, and he who remains and is besieged will die by the famine. Thus I will spend My wrath on them. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then you will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', when their slain are among their idols around their altars, on every high hill, on all the tops of the mountains, under every leafy tree and under every oak with thick branches, the places where they offered sweet incense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a soothing aroma to all their idols. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And I will stretch out My hand against them and make the land a more desolate waste than the wilderness toward Diblah [the Moabite city], throughout all the places where they live; and they will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .” ’ ”
