document_id: 1TI.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Instructions to Those Who Minister
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'All who are under the yoke as bond-servants (slaves) are to regard their own masters as worthy of honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' respect so that the name of God and the teaching [about Him] will not be spoken against. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Those who have believing masters are not to be disrespectful toward them because they are brothers [in Christ], but they should serve them even better, because those who benefit from their kindly service are believers and beloved. Teach and urge these [duties and principles].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'If anyone teaches a different doctrine and does not agree with the sound words of our Lord Jesus Christ, and with the doctrine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' teaching which is in agreement with godliness (personal integrity, upright behavior), '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'he is conceited and woefully ignorant [understanding nothing]. He has a morbid interest in controversial questions and disputes about words, which produces envy, quarrels, verbal abuse, evil suspicions, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and perpetual friction between men who are corrupted in mind and deprived of the truth, who think that godliness is a source of profit [a lucrative, money-making business—withdraw from them]. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But godliness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: actually
  - type: text
    text: ' is a source of great gain when accompanied by contentment [that contentment which comes from a sense of inner confidence based on the sufficiency of God]. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For we have brought nothing into the world, so [it is clear that] we cannot take anything out of it, either. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But if we have food and clothing, with these we will be content. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But those who [are not financially ethical and] crave to get rich [with a compulsive, greedy longing for wealth] fall into temptation and a trap and into many foolish and harmful desires that plunge people into ruin and destruction [leading to personal misery]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For the love of money [that is, the greedy desire for it and the willingness to gain it unethically] is a root of all sorts of evil, and some by longing for it have wandered away from the faith and pierced themselves [through and through] with many sorrows.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But as for you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An OT title referring to a man who officially spoke to God. In the NT this title is used only in reference to Timothy.
    marker-yv: yv-n
  - type: text
    text: 'O man of God, flee from these things; aim at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pursue righteousness [true goodness, moral conformity to the character of God], godliness [the fear of God], faith, love, steadfastness, and gentleness. [2 Tim 3:17] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fight the good fight of the faith [in the conflict with evil]; take hold of the eternal life to which you were called, and [for which] you made the good confession [of faith] in the presence of many witnesses. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: solemnly
  - type: text
    text: ' charge you in the presence of God, who gives life to all things, and [in the presence] of Christ Jesus, who made the good confession [in His testimony] before Pontius Pilate, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'to keep all His precepts without stain or reproach until the appearing of our Lord Jesus Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'which He will bring about in His own time—He who is the blessed and only Sovereign [the absolute Ruler], the King of those who reign as kings and Lord of those who rule as lords, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He alone possesses immortality [absolute exemption from death] and lives in unapproachable light, whom no man has ever seen or can see. To Him be honor and eternal power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dominion! Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'As for the rich in this present world, instruct them not to be conceited '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant, nor to set their hope on the uncertainty of riches, but on God, who richly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ceaselessly provides us with everything for our enjoyment. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Instruct them
  - type: text
    text: ' to do good, to be rich in good works, to be generous, willing to share [with others]. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'In this way storing up for themselves the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: enduring
  - type: text
    text: ' riches of a good foundation for the future, so that they may take hold of that which is truly life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'O Timothy, guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep safe the deposit [of godly truth] entrusted to you, turn away from worldly and godless chatter [with its profane, empty words], and the contradictions of what is falsely called “knowledge”— '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'which some have professed and by doing so have erred (missed the mark) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strayed from the faith.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: G
  - type: text
    text: race be with you.
