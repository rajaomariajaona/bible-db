verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tradition and Commandment
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then some Pharisees and scribes from Jerusalem came to Jesus and said, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'After Jesus called the crowd to Him, He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Listen and understand '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'this:'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'It is not what goes into the mouth of a man that defiles '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' dishonors him, but what comes out of the mouth, this defiles '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' dishonors him.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then the disciples came and said to Jesus, “Do You know that the Pharisees were offended when they heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you say
    - type: text
      text: ' this?” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Every plant which My heavenly Father did not plant will be torn up by the roots.
    - type: text
      text: ' [Is 60:21] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Leave them alone; they are blind guides
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Later mss add '
        - type: usfm
          marker: it
          children:
          - type: text
            text: of the blind
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '[leading blind followers]. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If a blind man leads a blind man, both will fall into a pit.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Heart of Man
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Peter asked Him, “Explain this parable [about what defiles a person] to us.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Are you still so dull
    - type: text
      text: ' [and unable to put things together]? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do you not understand that whatever goes into the mouth passes into the stomach, and is eliminated?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But whatever
    - type: text
      text: ' [word] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'comes out of the mouth comes from the heart, and this is what defiles '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' dishonors the man.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For out of the heart come evil thoughts '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' plans, murders, adulteries, sexual immoralities, thefts, false testimonies, slanders (verbal abuse, irreverent speech, blaspheming).'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Why do Your disciples violate the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the oral commentary on the Law, later codified as the Mishnah.
      marker-yv: yv-n
    - type: text
      text: 'tradition (religious laws) handed down by the [Jewish] elders? For Your disciples do not [ceremonially] wash their hands before they eat.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'These are the things which defile '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' dishonor the man; but eating with'
    - type: text
      text: ' [ceremonially] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: unwashed hands does not defile the man.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Syrophoenician Woman
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'After leaving there, Jesus withdrew to the district of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tyre and Sidon were located along the Gentile coastal region of Phoenicia. Tyre was 35 miles and Sidon 60 miles north of Galilee.
      marker-yv: yv-n
    - type: text
      text: 'Tyre and Sidon. [Mark 7:24-30] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Canaanites were ancient, pagan enemies of Israel.
      marker-yv: yv-n
    - type: text
      text: 'Canaanite woman from that district came out and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to cry out [urgently], saying, “Have mercy on me, O Lord, Son of David (Messiah); my daughter is cruelly possessed by a demon.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But He did not say a word in answer to her. And His disciples came and asked Him [repeatedly], “Send her away, because she keeps shouting out after us.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'He answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I was commissioned by God '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' sent only to the lost sheep of the house of Israel.”'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But she came and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to kneel down before Him, saying, “Lord, help me!” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“It is not good (appropriate, fair) to take the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A reference for the Jewish people.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'children’s bread and throw it to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jews used '
        - type: usfm
          marker: it
          children:
          - type: text
            text: kuon (dog)
        - type: text
          text: ' as a derogatory term referring to Gentiles. This dog ('
        - type: usfm
          marker: it
          children:
          - type: text
            text: kuon)
        - type: text
          text: ' was a despised, filthy, homeless street scavenger. When speaking with this woman, Jesus uses a word for “dog” ('
        - type: usfm
          marker: it
          children:
          - type: text
            text: kunarion)
        - type: text
          text: ' that refers to a household pet. The use of the word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: kunariois
        - type: text
          text: ' by both Jesus and the woman reflects the tenderness and spiritual depth of this exchange. More importantly, it foreshadows the fact that Gentile believers would not be spiritually homeless, but would also be welcomed into God’s household as His children. The gracious response of the woman recorded in v 27 confirms that on some level she understands this.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pet dogs.”
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'She said, “Yes, Lord; but even the pet dogs eat the crumbs that fall from their [young] masters’ table.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then Jesus answered her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Woman, your faith
    - type: text
      text: ' [your personal trust and confidence in My power] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is great; it will be done for you as you wish.”
    - type: text
      text: ' And her daughter was healed from that moment.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Healing Crowds
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jesus went on from there and passed along by [the eastern shore of] the Sea of Galilee. Then He went up on the hillside and was sitting there. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He replied to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why also do you violate the commandment of God for the sake of your tradition
    - type: text
      text: ' [handed down by the elders]? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And great crowds came to Him, bringing with them the lame, crippled, blind, mute, and many others, and they put them down at His feet; and He healed them. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'So the crowd was amazed when they saw the mute speaking, the crippled restored, the lame walking, and the blind seeing; and they praised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorified the God of Israel.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Four Thousand Fed
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then Jesus called His disciples to Him, and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I feel compassion for the crowd, because they have been with Me now three days and have nothing
    - type: text
      text: ' [left] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to eat; and I do not want to send them away hungry, because they might faint
    - type: text
      text: ' [from exhaustion] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: on the way
    - type: text
      text: ' [home].” [Mark 8:1-21] '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'The disciples said to Him, “Where are we to get enough bread in this isolated place to feed so large a crowd?” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And Jesus asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How many loaves
    - type: text
      text: ' [of bread] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: do you have?”
    - type: text
      text: ' They replied, “Seven, and a few small fish.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'He directed the crowd to sit down on the ground, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'and He took the seven loaves and the fish; and when He had given thanks, He broke them and started giving them to the disciples, and the disciples [gave them] to the people. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And they all ate and were satisfied, and they gathered up seven full baskets of the broken pieces that were left over. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: '[Among] those who ate were 4,000 men, not counting women and children.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Then Jesus sent the crowds away, got into the boat and went to the district of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A small town on the western shore of the Sea of Galilee, between Tiberias and Capernaum.
      marker-yv: yv-n
    - type: text
      text: Magadan.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
