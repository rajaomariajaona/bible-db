  - type: note
    content: Jews used kuon (dog) as a derogatory term referring to Gentiles. This dog (kuon) was a despised, filthy, homeless street scavenger. When speaking with this woman, Jesus uses a word for “dog” (kunarion) that refers to a household pet. The use of the word kunariois by both Jesus and the woman reflects the tenderness and spiritual depth of this exchange. More importantly, it foreshadows the fact that Gentile believers would not be spiritually homeless, but would also be welcomed into God’s household as His children. The gracious response of the woman recorded in v 27 confirms that on some level she understands this.
