          text: treats improperly father or mother is to be put to death
      - type: text
        text: .’
    - type: text
      text: ' [Ex 20:12; 21:17; Lev 20:9; Deut 5:16] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you say, ‘If anyone says to his father or mother, “Whatever
    - type: text
      text: ' [money or resource that] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have that would help you is
    - type: text
      text: ' [already dedicated and] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'given '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to God,”
    - type: text
