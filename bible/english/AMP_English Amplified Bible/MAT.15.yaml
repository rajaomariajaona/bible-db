    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: he is not to honor his father or his mother
    - type: text
      text: ' [by helping them with their need].’ '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So by this you have invalidated the word of God
    - type: text
      text: ' [depriving it of force and authority and making it of no effect] '
    - type: usfm
      marker: wj
      children:
      - type: text
