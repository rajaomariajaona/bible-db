  - type: heading
    content: The Two Witnesses
  - type: text
    content: 'Then there was given to me a '
  - type: note
    content: John is describing a rod that is about six feet long.
  - type: text
    content: measuring rod like a staff; and someone said, “
  - type: note
    content: The Greek corresponds to a Hebrew verb meaning “to stand” or “arise” which can be an instruction to prepare to fulfill a command, somewhat similar to the military command “attention.”
  - type: text
    content: 'Rise and measure the temple of God and the altar [of incense], and [count] those who worship in it. [Ezek 40-42] '
  '10':
  - type: text
    content: 'And those [non-believers] who live on the earth will gloat over them and rejoice; and they will send gifts [in celebration] to one another, because these two prophets tormented '
  - type: text
    content: and
  - type: text
    content: ' troubled those who live on the earth.'
  '11':
  - type: text
    content: 'But after three and a half days, the breath of life from God came into them, and they stood on their feet; and great fear '
  - type: text
    content: and
  - type: text
    content: ' panic fell on those who were watching them. [Ezek 37:5, 10] '
  '12':
  - type: text
    content: 'And the two witnesses heard a loud voice from heaven saying to them, “Come up here.” Then they ascended into heaven in the cloud, and their enemies watched them. [2 Kin 2:11] '
  '13':
  - type: text
    content: 'And in that [very] hour there was a great earthquake, and a tenth of the city fell '
  - type: text
    content: and
  - type: text
    content: ' was destroyed; seven thousand '
  - type: note
    content: Lit names of people.
  - type: text
    content: 'people were killed in the earthquake, and the rest [who survived] were overcome with terror, and '
  - type: note
    content: These give glory out of servile fear, not worship from the heart.
  - type: text
    content: they glorified the God of heaven [as they recognized His awesome power].
  '14':
  - type: text
    content: The second woe is past; behold, the third woe is coming quickly.
  - type: heading
    content: The Seventh Trumpet—Christ’s Reign Foreseen
  '15':
  - type: text
    content: Then the seventh angel sounded [his trumpet]; and there were loud voices in heaven, saying,
  - type: text
    content: “
  - type: text
    content: T
  - type: text
    content: 'he kingdom (dominion, rule) of the world has become '
  - type: text
    content: the kingdom
  - type: text
    content: ' of our Lord and of His Christ; and He will reign forever and ever.” [Ps 22:28; Dan 2:31-45; 7:13, 14, 27; Zech 14:9] '
  '16':
  - type: text
    content: 'And the twenty-four elders, who sit on their thrones before God, fell face downward and worshiped God, '
  '17':
  - type: text
    content: saying,
  - type: text
    content: “
  - type: text
    content: T
  - type: text
    content: 'o You we give thanks, O Lord God Almighty [the Omnipotent, the Ruler of all], Who are and Who were, because You have taken Your great power '
  - type: text
    content: and
  - type: text
    content: ' the sovereignty [which is rightly Yours] and have [now] begun to reign. '
  '18':
  - type: text
    content: 'And the nations (Gentiles) became enraged, and Your wrath '
  - type: text
    content: and
  - type: text
    content: ' indignation came, and the time came for the dead to be judged, and [the time came] to reward Your bond-servants the prophets and the saints (God’s people) and those who fear Your name, the small and the great, and [the time came] to destroy the destroyers of the earth.” [Ps 2:1; 2 Thess 1:3-12]'
  '19':
  - type: text
    content: And the temple of God which is in heaven was opened; and the ark of His covenant appeared in His temple, and there were flashes of lightning, loud rumblings and peals of thunder and an earthquake and a great hailstorm. [1 Kin 8:1-12]
  '2':
  - type: text
    content: 'But leave out the court [of the Gentiles] which is outside the temple and do not measure it, because it has been given to the Gentiles (the nations); and they will trample the holy city for forty-two months (three and one-half years). [Dan 8:9-14; Zech 12:3; Luke 21:24] '
  '3':
  - type: text
    content: 'And I will grant '
  - type: text
    content: authority
  - type: text
    content: ' to My two witnesses, and they will prophesy for twelve hundred and sixty days (forty-two months; three and one-half years), dressed in '
  - type: note
    content: See note 6:12.
  - type: text
    content: 'sackcloth.” [Deut 18:18; Mal 4:5; Mark 9:4] '
  '4':
  - type: text
    content: 'These [witnesses] are the two olive trees and the two lampstands which stand before the Lord of the earth. [Zech 4:3, 11-14] '
  '5':
  - type: text
    content: 'And if anyone wants to harm them, fire comes out of their mouth and devours their enemies; so if anyone wants to harm them, he must be killed in this way. [2 Kin 1:10-12; Jer 5:14] '
  '6':
  - type: text
    content: These [two witnesses] have the power [from God] to shut up the sky, so that no rain will fall during the days of their prophesying [regarding judgment and salvation]; and they have power over the waters (seas, rivers) to turn them into blood, and to strike the earth with every [kind of] plague, as often as they wish. [Ex 7:14-19; 1 Kin 17:1]
  '7':
  - type: text
    content: 'When they have finished their testimony '
  - type: text
    content: and
  - type: text
    content: ' given their evidence, the beast that comes up out of the abyss (bottomless pit) will wage war with them, and overcome them and kill them. [Dan 7:3, 7, 21] '
  '8':
  - type: text
    content: 'And their dead bodies '
  - type: text
    content: will lie exposed
  - type: text
    content: ' in the open street of the great city (Jerusalem), which in a spiritual sense is called [by the symbolic and allegorical names of] Sodom and Egypt, where also their Lord was crucified. [Is 1:9] '
  '9':
  - type: text
    content: 'Those from the peoples and tribes and languages and nations '
  - type: note
    content: In Revelation John sometimes uses the present tense to refer vividly to the future.
  - type: text
    content: 'look at their dead bodies for three and a half days, and will not allow their dead bodies to be laid in a tomb. '
