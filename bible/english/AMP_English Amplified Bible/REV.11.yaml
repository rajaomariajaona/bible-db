document_id: REV.11,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Two Witnesses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then there was given to me a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John is describing a rod that is about six feet long.
      marker-yv: yv-n
    - type: text
      text: measuring rod like a staff; and someone said, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek corresponds to a Hebrew verb meaning “to stand” or “arise” which can be an instruction to prepare to fulfill a command, somewhat similar to the military command “attention.”
      marker-yv: yv-n
    - type: text
      text: 'Rise and measure the temple of God and the altar [of incense], and [count] those who worship in it. [Ezek 40-42] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And those [non-believers] who live on the earth will gloat over them and rejoice; and they will send gifts [in celebration] to one another, because these two prophets tormented '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' troubled those who live on the earth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But after three and a half days, the breath of life from God came into them, and they stood on their feet; and great fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' panic fell on those who were watching them. [Ezek 37:5, 10] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the two witnesses heard a loud voice from heaven saying to them, “Come up here.” Then they ascended into heaven in the cloud, and their enemies watched them. [2 Kin 2:11] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And in that [very] hour there was a great earthquake, and a tenth of the city fell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' was destroyed; seven thousand '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: names of people
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'people were killed in the earthquake, and the rest [who survived] were overcome with terror, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These give glory out of servile fear, not worship from the heart.
      marker-yv: yv-n
    - type: text
      text: they glorified the God of heaven [as they recognized His awesome power].
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The second woe is past; behold, the third woe is coming quickly.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Seventh Trumpet—Christ’s Reign Foreseen
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then the seventh angel sounded [his trumpet]; and there were loud voices in heaven, saying,
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'he kingdom (dominion, rule) of the world has become '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the kingdom
    - type: text
      text: ' of our Lord and of His Christ; and He will reign forever and ever.” [Ps 22:28; Dan 2:31-45; 7:13, 14, 27; Zech 14:9] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the twenty-four elders, who sit on their thrones before God, fell face downward and worshiped God, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: saying,
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'o You we give thanks, O Lord God Almighty [the Omnipotent, the Ruler of all], Who are and Who were, because You have taken Your great power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the sovereignty [which is rightly Yours] and have [now] begun to reign. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And the nations (Gentiles) became enraged, and Your wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indignation came, and the time came for the dead to be judged, and [the time came] to reward Your bond-servants the prophets and the saints (God’s people) and those who fear Your name, the small and the great, and [the time came] to destroy the destroyers of the earth.” [Ps 2:1; 2 Thess 1:3-12]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And the temple of God which is in heaven was opened; and the ark of His covenant appeared in His temple, and there were flashes of lightning, loud rumblings and peals of thunder and an earthquake and a great hailstorm. [1 Kin 8:1-12]
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But leave out the court [of the Gentiles] which is outside the temple and do not measure it, because it has been given to the Gentiles (the nations); and they will trample the holy city for forty-two months (three and one-half years). [Dan 8:9-14; Zech 12:3; Luke 21:24] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And I will grant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: authority
    - type: text
      text: ' to My two witnesses, and they will prophesy for twelve hundred and sixty days (forty-two months; three and one-half years), dressed in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 6:12.
      marker-yv: yv-n
    - type: text
      text: 'sackcloth.” [Deut 18:18; Mal 4:5; Mark 9:4] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'These [witnesses] are the two olive trees and the two lampstands which stand before the Lord of the earth. [Zech 4:3, 11-14] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And if anyone wants to harm them, fire comes out of their mouth and devours their enemies; so if anyone wants to harm them, he must be killed in this way. [2 Kin 1:10-12; Jer 5:14] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: These [two witnesses] have the power [from God] to shut up the sky, so that no rain will fall during the days of their prophesying [regarding judgment and salvation]; and they have power over the waters (seas, rivers) to turn them into blood, and to strike the earth with every [kind of] plague, as often as they wish. [Ex 7:14-19; 1 Kin 17:1]
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When they have finished their testimony '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' given their evidence, the beast that comes up out of the abyss (bottomless pit) will wage war with them, and overcome them and kill them. [Dan 7:3, 7, 21] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And their dead bodies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will lie exposed
    - type: text
      text: ' in the open street of the great city (Jerusalem), which in a spiritual sense is called [by the symbolic and allegorical names of] Sodom and Egypt, where also their Lord was crucified. [Is 1:9] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Those from the peoples and tribes and languages and nations '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Revelation John sometimes uses the present tense to refer vividly to the future.
      marker-yv: yv-n
    - type: text
      text: 'look at their dead bodies for three and a half days, and will not allow their dead bodies to be laid in a tomb. '
