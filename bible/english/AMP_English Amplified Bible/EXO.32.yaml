  '1':
  - type: heading
    content: The Golden Calf
  - type: text
    content: 'Now when the people saw that Moses delayed coming down from the mountain, they gathered together before Aaron and said to him, “Come, make us a '
  - type: note
    content: Elohim in the Hebrew, a plural Hebrew form used most often to refer to the true God. It can also mean “gods,” which is an option here, but the account of the golden calf incident implies that the people wanted a single idol (see 32:4 and note). Assuming that they had just one idol in mind, it may be that the Israelites were demanding an idol representing God (Elohim) Himself.
  - type: text
    content: 'god who will go before us; as for this Moses, the man who brought us up from the land of Egypt, we do not know what has become of him.” '
  '10':
  - type: text
    content: 'Now therefore, let Me alone '
  - type: text
    content: and
  - type: text
    content: ' do not interfere, so that My anger may burn against them and that I may destroy them; and I will make of you (your descendants) a great nation.”'
  - type: heading
    content: Moses’ Entreaty
  '11':
  - type: text
    content: 'But Moses appeased '
  - type: text
    content: and
  - type: text
    content: ' entreated the L'
  - type: heading
    content: ord
  - type: text
    content: ' his God, and said, “L'
  - type: heading
    content: ord
  - type: text
    content: ', why does Your anger burn against Your people whom You have brought out of the land of Egypt with great power and a mighty hand? '
  '12':
  - type: text
    content: 'Why should the Egyptians say, ‘With evil [intent] their God brought them out to kill them in the mountains and destroy them from the face of the earth’? Turn away from Your burning anger and change Your mind about harming Your people. '
  '13':
  - type: text
    content: 'Remember Abraham, Isaac, and Israel (Jacob), Your servants to whom You swore [an oath] by Yourself, and said to them, ‘I will multiply your descendants as the stars of the heavens, and all this land of which I have spoken I will give to your descendants, and they shall inherit it forever.’ ” '
  '14':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' changed His mind about the harm which He had said He would do to His people.'
  '15':
  - type: text
    content: 'Then Moses turned and went down from the mountain with the two tablets of the Testimony in his hand; tablets that were written on both sides—they were written on one side and on the other. '
  '16':
  - type: text
    content: 'The tablets were the work of God; the writing was the writing of God engraved on the tablets. '
  '17':
  - type: text
    content: 'Now when Joshua heard the noise of the people as they shouted, he said to Moses, “There is a sound of battle in the camp.” '
  '18':
  - type: text
    content: But Moses said,
  - type: text
    content: “It is not the sound of the cry of victory,
  - type: text
    content: Nor is it the sound of the cry of defeat;
  - type: text
    content: But I hear the sound of singing.”
  - type: heading
    content: Moses’ Anger
  '19':
  - type: text
    content: 'And as soon as he approached the camp and he saw the calf and the dancing, Moses’ anger burned; and he threw the tablets from his hands and smashed them at the foot of the mountain. '
  '2':
  - type: text
    content: 'So Aaron replied to them, “Take off the gold rings that are in the ears of your wives, your sons and daughters, and bring them to me.” '
  '20':
  - type: text
    content: Then Moses took the calf they had made and burned it in the fire, and ground it to powder, and scattered it on the surface of the water and made the Israelites drink it.
  '21':
  - type: text
    content: 'Then Moses said to Aaron, “What did this people do to you, that you have brought so great a sin on them?” '
  '22':
  - type: text
    content: 'Aaron said, “Do not let the anger of my lord burn; you know the people yourself, that they are prone to evil. '
  '23':
  - type: text
    content: 'For they said to me, ‘Make us a god who will go before us; as for this Moses, the man who brought us out of the land of Egypt, we do not know what has become of him.’ '
  '24':
  - type: text
    content: I said to them, ‘Let whoever has gold [jewelry], take it off.’ So they gave it to me; then I threw it into the fire, and out came this calf.”
  '25':
  - type: text
    content: 'Now when Moses saw that the people were out of control—for Aaron had let them get out of control to the point of being an object of mockery among their enemies— '
  '26':
  - type: text
    content: then Moses stood in the gate of the camp, and said, “Whoever is on the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' side, come to me!” And all the sons of Levi [the priestly tribe] gathered together to him. '
  '27':
  - type: text
    content: He said to them, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel, ‘Every man strap his sword on his thigh and go back and forth from gate to gate throughout the camp, and every man kill his brother, and every man his friend, and every man his neighbor [all who continue pagan worship].’ ” '
  '28':
  - type: text
    content: 'So the sons of Levi did as Moses instructed, and about three thousand men of the people [of Israel] were killed that day. '
  '29':
  - type: text
    content: Then Moses said [to the Levites], “Dedicate yourselves today to the L
  - type: heading
    content: ord
  - type: text
    content: '—for each man has been against his own son and his own brother [in his attempt to escape execution]—so that He may restore '
  - type: text
    content: and
  - type: text
    content: ' bestow His blessing on you this day.”'
  '3':
  - type: text
    content: 'So all the people took off the gold rings that were in their ears and brought them to Aaron. '
  '30':
  - type: text
    content: Then the next day Moses said to the people, “You have committed a great sin. Now I will go up to the L
  - type: heading
    content: ord
  - type: text
    content: '; perhaps I can make atonement for your sin.” '
  '31':
  - type: text
    content: So Moses returned to the L
  - type: heading
    content: ord
  - type: text
    content: ', and said, “Oh, these people have committed a great sin [against You], and have made themselves a god of gold. '
  '32':
  - type: text
    content: 'Yet now, if You will, forgive their sin—and if not, please blot me out of Your book which You have written (kill me)!” '
  '33':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Whoever has sinned against Me, I will blot him out of My book [not you]. [Ps 69:28; Dan 12:1; Phil 4:3; Rev 3:5] '
  '34':
  - type: text
    content: 'But now go, lead the people [to the place] where I have told you. Behold, My '
  - type: note
    content: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see note Gen 16:7).
  - type: text
    content: 'Angel shall go before you; nevertheless, in the day when I punish, I will punish them for their sin!” [Ex 23:20; 33:2, 3] '
  '35':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' struck the people with a plague, because of what they had done with the calf which Aaron had made [for them].'
  '4':
  - type: text
    content: 'And he took '
  - type: text
    content: the gold
  - type: text
    content: ' from their hands, and fashioned it with an engraving tool and made it into a molten '
  - type: note
    content: The selection of a calf-god was probably inspired by the Egyptian bull-god Apis (Hapis), believed to be a living manifestation of the Egyptian god, Ptah.
  - type: text
    content: 'calf; and they said, “This is your god, O Israel, who brought you up from the land of Egypt.” '
  '5':
  - type: text
    content: Now when Aaron saw the molten calf, he built an altar before it; and Aaron made a proclamation, and said, “Tomorrow shall be a feast to the L
  - type: heading
    content: ord
  - type: text
    content: '!” '
  '6':
  - type: text
    content: So they got up early the next day and offered burnt offerings, and brought peace offerings; then the people sat down to eat and drink, and got up to play [shamefully—without moral restraint].
  '7':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Go down at once, for your people, whom you brought up from the land of Egypt, have corrupted themselves. '
  '8':
  - type: text
    content: 'They have quickly turned aside from the way which I commanded them. They have made themselves a molten calf, and have worshiped it and sacrificed to it, and said, ‘This is your god, O Israel, who brought you up from the land of Egypt!’ ” '
  '9':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “I have seen this people, and behold, they are a stiff-necked (stubborn, rebellious) people. '
