document_id: LEV.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Regulations concerning Priests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Speak to the priests, the sons of Aaron, and say to them:'
- type: usfm
  marker: p
  children:
  - type: text
    text: ‘
  - type: usfm
    marker: bd
    children:
    - type: text
      text: N
  - type: text
    text: 'o one shall defile himself [that is, become ceremonially unclean] for the dead among his people [by touching a corpse or assisting in preparing it for burial], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'except for his relatives who are nearest to him, his mother, his father, his son, his daughter, and his brother, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'also his virgin sister, who is near to him because she has had no husband; for her he may become unclean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He shall not become unclean as a relative by marriage among his people, and so profane himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The priests '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These practices were mourning customs associated with paganism.
    marker-yv: yv-n
  - type: text
    text: 'shall not shave their heads, nor shave off the edges of their beards, nor make any cuts in their body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They shall be holy to their God and not profane the name of their God; for they present the offerings by fire to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the food of their God; so they shall be holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They shall not take [as a wife] a woman who is a prostitute, nor a woman who is divorced from her husband; for the priest is holy to his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You shall consecrate him, therefore, for he offers the food of your God; he shall be holy to you; for I the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', who sanctifies you, am holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The daughter of any priest who profanes herself by prostitution profanes her father; she shall be burned in fire. [Josh 7:15, 25]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '‘But he who is the high priest among his brothers, on whose head the anointing oil has been poured and who has been consecrated to wear the [sacred] garments, shall not uncover his head nor tear his clothes [in mourning], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'nor shall he approach any dead person, nor defile himself [by doing so, even] for his father or for his mother; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: nor shall he go out of the sanctuary nor profane (make ceremonially unclean) the sanctuary of his God, for the consecration of the anointing oil of his God is on him; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He shall take a wife in her virginity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He may not marry a widow or a divorced woman or one who is profaned by prostitution, but he is to marry a virgin from his own people, [1 Tim 3:2-7; Titus 1:7-9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'so that he will not profane '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dishonor his children among his people; for I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who sanctifies the high priest.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Say to Aaron, ‘Throughout their generations none of your descendants who has any [physical] defect shall approach [the altar] to present the food of his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For no man who has a defect shall approach [God’s altar as a priest]: no man who is blind or lame, or who has a disfigured face, or any deformed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: limb,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'or a man who has a broken foot or a broken hand, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'or a hunchback or a dwarf, or one who has a defect in his eye or eczema or scabs or crushed testicles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'No man among the descendants of Aaron the priest who has a [physical] defect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is disfigured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' deformed is to approach [the altar] to present the offerings of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' by fire. He has a defect; he shall not approach [the altar] to present the food of his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'He may eat the food of his God, both of the most holy and of the holy things, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: but he shall not go within the veil or approach the altar [of incense], because he has a defect, so that he will not profane My sanctuaries; for I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who sanctifies them.’ ” [Heb 7:28] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So Moses spoke to Aaron and to his sons, and to all the Israelites.
