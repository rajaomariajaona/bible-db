  - type: text
    content: in Him who sent Me.
  - type: text
    content: ' '
  '45':
  - type: text
    content: And whoever sees Me sees the One who sent Me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'I have come as Light into the world, so that everyone who believes '
  - type: text
    content: and
  - type: text
    content: ' trusts in Me'
  - type: text
    content: ' [as Savior—all those who anchor their hope in Me and rely on the truth of My message] '
  - type: text
