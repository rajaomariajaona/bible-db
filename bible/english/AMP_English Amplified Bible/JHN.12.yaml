  '33':
  - type: text
    content: 'He said this to indicate the kind of death by which He was to die. '
  '34':
  - type: text
    content: At this the crowd answered Him, “
  - type: note
    content: At this time the crowd does not understand that Jesus is speaking about His approaching crucifixion and resurrection.
  - type: text
    content: 'We have heard from the Law that the Christ is to remain forever; how then can You say, '
  - type: text
    content: ‘The Son of Man must be lifted up’
  - type: text
    content: '? Who is this Son of Man?” [Ps 110:4] '
  '35':
  - type: text
    content: 'So Jesus said to them, '
  - type: text
    content: “The Light is among you
  - type: text
