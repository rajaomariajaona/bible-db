  '3':
  - type: text
    content: 'Then '
  - type: note
    content: There were two anointings of Jesus. This one in Bethany by Mary, the sister of Martha and Lazarus (Matt 26:7; Mark 14:3), and the other in the area of Galilee by an unnamed woman (Luke 7:37, 38).
  - type: text
    content: 'Mary took a pound of very expensive perfume of pure '
  - type: note
    content: This was a thick, scented oil obtained from the root of a flowering plant grown in the Himalayas of Tibet and in the northern regions of India and Nepal.
  - type: text
    content: 'nard, and she poured it on Jesus’ feet and wiped His feet with her hair; and the house was filled with the fragrance of the perfume. '
  '30':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “This voice has come for your sake, not for mine.
  - type: text
    content: ' '
