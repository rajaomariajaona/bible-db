  '42':
  - type: text
    content: 'Nevertheless, even many of the leading men believed in Him [as Savior and Messiah], but because of the Pharisees they would not confess it, for fear that [if they acknowledged Him openly] they would be put out of the synagogue (excommunicated); '
  '43':
  - type: text
