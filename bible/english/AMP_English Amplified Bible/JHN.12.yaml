document_id: JHN.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mary Anoints Jesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Six days before the Passover, Jesus went to Bethany, where Lazarus was, whom He had raised from the dead. [Matt 26:6-13; Mark 14:3-9] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So the chief priests planned to kill Lazarus also, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: because on account of him many of the Jews were going away [from the teaching and traditions of the Jewish leaders] and believing in Jesus [following Him as Savior and Messiah].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Triumphal Entry
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The next day, when the large crowd who had come to the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Passover
    - type: text
      text: ' feast heard that Jesus was coming to Jerusalem, [Matt 21:4-9; Mark 11:7-10; Luke 19:35-38] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'they took branches of palm trees [in homage to Him as King] and went out to meet Him, and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' shouting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kept shouting “Hosanna! B'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: lessed
    - type: text
      text: ' (celebrated, praised) '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: is
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e who comes in the name of the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', even the King of Israel!” [Ps 118:26] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Jesus, finding a young donkey, sat on it; just as it is written [in Scripture], '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “D
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o not fear
    - type: text
      text: ', D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: aughter of
    - type: text
      text: ' Z'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ion
    - type: text
      text: ; B
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ehold
    - type: text
      text: ', Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: our
    - type: text
      text: ' K'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ing is coming
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: seated on a donkey’s colt
    - type: text
      text: '.” [Zech 9:9] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'His disciples did not understand [the meaning of] these things at first; but when Jesus was glorified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exalted, they remembered that these things had been written about Him and had been done to Him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So the people, who were with Him when He called Lazarus out of the tomb and raised him from the dead, continued to tell others '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about Him
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For this reason the crowd went to meet Him, because they heard that He had performed this [miraculous] sign. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then the Pharisees [argued and] said to one another, “You see that your efforts are futile. Look! The whole world has gone [running] after Him!”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Greeks Seek Jesus
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So they gave a supper for Him there. Martha was serving, and Lazarus was one of those reclining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table
    - type: text
      text: ' with Him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now there were some Greeks (Gentiles) among those who were going up to worship at the feast; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'these came to Philip, who was from Bethsaida in Galilee, with a request, saying, “Sir, we wish to see Jesus.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Philip came and told Andrew; then Andrew and Philip went and told Jesus. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“The hour has come for the Son of Man to be glorified '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' exalted.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, unless a grain of wheat falls into the earth and dies, it remains alone'
    - type: text
      text: ' [just one grain, never more]. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But if it dies, it produces much grain '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' yields a harvest.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The one who loves his life
    - type: text
      text: ' [eventually] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: loses it
    - type: text
      text: ' [through death], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but the one who hates his life in this world
    - type: text
      text: ' [and is concerned with pleasing God] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will keep it for life eternal.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If anyone serves Me, he must
    - type: text
      text: ' [continue to faithfully] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: follow Me
    - type: text
      text: ' [without hesitation, holding steadfastly to Me, conforming to My example in living and, if need be, suffering or perhaps dying because of faith in Me]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and wherever I am
    - type: text
      text: ' [in heaven’s glory], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: there will My servant be also. If anyone serves Me, the Father will honor him.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Foretells His Death
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Now My soul is troubled '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' deeply distressed; what shall I say? ‘Father, save Me from this hour'
    - type: text
      text: ' [of trial and agony]’? '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But it is for this
    - type: text
      text: ' [very] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: purpose that I have come to this hour
    - type: text
      text: ' [this time and place]. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '[Rather, I will say,] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Father, glorify (honor, extol) Your name!’ ”
    - type: text
      text: ' Then a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Matt 3:17.
      marker-yv: yv-n
    - type: text
      text: 'voice came from heaven saying, “I have both glorified it, and will glorify it again.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The crowd '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of people
    - type: text
      text: ' who stood nearby and heard the voice said that it had thundered; others said, “An angel has spoken to Him!” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There were two anointings of Jesus. This one in Bethany by Mary, the sister of Martha and Lazarus (Matt 26:7; Mark 14:3), and the other in the area of Galilee by an unnamed woman (Luke 7:37, 38).
      marker-yv: yv-n
    - type: text
      text: 'Mary took a pound of very expensive perfume of pure '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a thick, scented oil obtained from the root of a flowering plant grown in the Himalayas of Tibet and in the northern regions of India and Nepal.
      marker-yv: yv-n
    - type: text
      text: 'nard, and she poured it on Jesus’ feet and wiped His feet with her hair; and the house was filled with the fragrance of the perfume. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This voice has come for your sake, not for mine.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now judgment is upon this world
    - type: text
      text: ' [the sentence is being passed]. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now the ruler of this world (Satan) will be cast out.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And I, if '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' when I am lifted up from the earth'
    - type: text
      text: ' [on the cross], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'will draw all '
      - type: usfm
        marker: it
        children:
        - type: text
          text: people
      - type: text
        text: ' to Myself'
    - type: text
      text: ' [Gentiles, as well as Jews].” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'He said this to indicate the kind of death by which He was to die. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: At this the crowd answered Him, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At this time the crowd does not understand that Jesus is speaking about His approaching crucifixion and resurrection.
      marker-yv: yv-n
    - type: text
      text: 'We have heard from the Law that the Christ is to remain forever; how then can You say, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘The Son of Man must be lifted up’
    - type: text
      text: '? Who is this Son of Man?” [Ps 110:4] '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'So Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Light is among you
    - type: text
      text: ' [only] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: a little while longer. Walk while you have the Light
    - type: text
      text: ' [keep on living by it], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so that darkness will not overtake you. He who walks in the darkness does not know where he is going
    - type: text
      text: ' [he is drifting aimlessly]. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'While you have the Light, believe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' trust in the Light'
    - type: text
      text: ' [have faith in it, hold on to it, rely on it], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so that you may become sons of Light
    - type: text
      text: ' [being filled with Light as followers of God].”'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: J
    - type: text
      text: 'esus said these things, and then He left and hid Himself from them. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Even though He had done so many signs (attesting miracles) right before them, yet they still did not believe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' failed to trust Him— '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: it
      children:
      - type: text
        text: This was
    - type: text
      text: ' to fulfill what Isaiah the prophet said: “L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: who has believed our message
    - type: text
      text: '? A'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd to whom has the arm
    - type: text
      text: ' (the power) '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: of the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord been shown
    - type: text
      text: ' (unveiled, revealed)?” [Is 53:1] '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Therefore they could not believe, for Isaiah said again, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But Judas Iscariot, one of His disciples, the one who was going to betray Him, said, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: “H
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e has blinded their eyes and
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e hardened their heart
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: to keep them from seeing with their eyes and understanding with their heart and being converted
    - type: text
      text: '; '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: otherwise
    - type: text
      text: ', I [their God] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: would heal them
    - type: text
      text: '.” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Isaiah said these things because he saw His glory and spoke about Him. [Is 6:9, 10] '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Nevertheless, even many of the leading men believed in Him [as Savior and Messiah], but because of the Pharisees they would not confess it, for fear that [if they acknowledged Him openly] they would be put out of the synagogue (excommunicated); '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: for they loved the approval of men more than the approval of God.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'But Jesus loudly declared, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“The one who believes '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' trusts in Me does not believe'
    - type: text
      text: ' [only] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in Me but
    - type: text
      text: ' [also believes] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in Him who sent Me.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And whoever sees Me sees the One who sent Me.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I have come as Light into the world, so that everyone who believes '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' trusts in Me'
    - type: text
      text: ' [as Savior—all those who anchor their hope in Me and rely on the truth of My message] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will not continue to live in darkness.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If anyone hears My words and does not keep them, I do not judge him; for I did not come to judge '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' condemn the world'
    - type: text
      text: ' [that is, to initiate the final judgment of the world], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but to save the world.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Whoever rejects Me and refuses to accept My teachings, has one who judges him; the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: very
      - type: text
        text: ' word that I spoke will judge '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' condemn him on the last day.'
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For I have never spoken on My own initiative '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or
      - type: text
        text: ' authority, but the Father Himself who sent Me has given Me a commandment '
      - type: usfm
        marker: it
        children:
        - type: text
          text: regarding
      - type: text
        text: ' what to say and what to speak.'
    - type: text
      text: ' [Deut 18:18, 19] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Why was this perfume not sold for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. about a year’s wages for an ordinary workman.
      marker-yv: yv-n
    - type: text
      text: 'three hundred denarii and [the money] given to the poor?” '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know that His commandment is eternal life. So the things I speak, I speak
    - type: text
      text: ' [in accordance with His exact instruction,] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: just as the Father has told Me.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now he said this, not because he cared about the poor [for he had never cared about them], but because he was a thief; and since he had the money box [serving as treasurer for the twelve disciples], he used to pilfer what was put into it. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let her alone, so that she may keep
    - type: text
      text: ' [the rest of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: it for the day of My burial.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You always have the poor with you, but you do not always have Me.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'A large crowd of Jews learned that He was there [at Bethany]; and they came, not only because of Jesus, but also to see Lazarus, whom He had raised from the dead. '
