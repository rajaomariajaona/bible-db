  - type: text
    content: 'Six days before the Passover, Jesus went to Bethany, where Lazarus was, whom He had raised from the dead. [Matt 26:6-13; Mark 14:3-9] '
  '10':
  - type: text
    content: 'So the chief priests planned to kill Lazarus also, '
