  '2':
  - type: text
    content: 'So they gave a supper for Him there. Martha was serving, and Lazarus was one of those reclining '
  - type: text
    content: at the table
  - type: text
    content: ' with Him. '
  '20':
  - type: text
    content: 'Now there were some Greeks (Gentiles) among those who were going up to worship at the feast; '
  '21':
  - type: text
    content: 'these came to Philip, who was from Bethsaida in Galilee, with a request, saying, “Sir, we wish to see Jesus.” '
  '22':
  - type: text
    content: 'Philip came and told Andrew; then Andrew and Philip went and told Jesus. '
  '23':
