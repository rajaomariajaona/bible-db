type_code: eng
verses:
  '1':
  - type: heading
    content: Rehoboam Reigns over Judah and Builds Cities
  - type: text
    content: 'Now when Rehoboam came to Jerusalem, he assembled the house of Judah and Benjamin, 180,000 chosen warriors to fight against [the ten tribes of] Israel to restore the kingdom to Rehoboam. '
  '10':
  - type: text
    content: 'Zorah, Aijalon, and Hebron, which are fortified cities in Judah and Benjamin. '
  '11':
  - type: text
    content: 'He strengthened the fortresses and put officers in them, with supplies of food, [olive] oil, and wine. '
  '12':
  - type: text
    content: And in each city he put [large] shields and spears, and made them very strong. So he held Judah and Benjamin.
  '13':
  - type: text
    content: Further, the priests and the Levites who were in all Israel took their stand with Rehoboam from all their districts.
  - type: heading
    content: Jeroboam Appoints False Priests
  '14':
  - type: text
    content: For the Levites left their pasture lands and their property and came to Judah and Jerusalem, because Jeroboam and his sons had excluded them from serving as priests to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Jeroboam appointed his own priests for the high places, for the satyrs (goat demons) and calves (idols) which he had made. [1 Kin 12:28] '
  '16':
  - type: text
    content: Those from all the tribes of Israel who set their hearts on seeking the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel followed '
  - type: note
    content: I.e. the Levites.
  - type: text
    content: them to Jerusalem, to sacrifice to the L
  - type: heading
    content: ord
  - type: text
    content: ' God of their fathers. '
  '17':
  - type: text
    content: So they strengthened the kingdom of Judah and supported Rehoboam the son of Solomon for three years; for they walked in the way of David and Solomon for three years.
  - type: heading
    content: Rehoboam’s Family
  '18':
  - type: text
    content: 'Rehoboam took as his wife Mahalath, the daughter of Jerimoth the son of David, and of Abihail the daughter of Eliab the son of Jesse. '
  '19':
  - type: text
    content: 'She bore him sons: Jeush, Shemariah, and Zaham. '
  '2':
  - type: text
    content: But the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Shemaiah the man of God, saying, '
  '20':
  - type: text
    content: 'After her he took Maacah the daughter (granddaughter) of Absalom, and she bore him Abijah, Attai, Ziza, and Shelomith. '
  '21':
  - type: text
    content: 'Rehoboam loved Maacah the daughter (granddaughter) of Absalom more than all his wives and '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: 'concubines—for he had taken eighteen wives and sixty concubines, and he fathered twenty-eight sons and sixty daughters. '
  '22':
  - type: text
    content: 'Rehoboam appointed Abijah the son of Maacah the chief leader among his brothers, because he '
  - type: text
    content: intended
  - type: text
    content: ' to make him king. '
  '23':
  - type: text
    content: 'He acted wisely and distributed some of his sons throughout the territories of Judah and Benjamin to all the fortified cities. He gave them abundant provisions, and he sought many wives '
  - type: text
    content: for them
  - type: text
    content: .
  '3':
  - type: text
    content: '“Say to Rehoboam the son of Solomon, king of Judah, and to all Israel in Judah and Benjamin, '
  '4':
  - type: text
    content: ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ': “You shall not go up nor fight against your brothers (countrymen); return, every man to his house, for this thing is from Me.” ’ ” And they listened to '
  - type: text
    content: and
  - type: text
    content: ' obeyed the words of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and turned back from going against Jeroboam.'
  '5':
  - type: text
    content: 'Rehoboam lived in Jerusalem and built [fortified] cities for defense in Judah. '
  '6':
  - type: text
    content: 'He '
  - type: note
    content: Or rebuilt.
  - type: text
    content: 'built Bethlehem, Etam, Tekoa, '
  '7':
  - type: text
    content: 'Beth-zur, Soco, Adullam, '
  '8':
  - type: text
    content: 'Gath, Mareshah, Ziph, '
  '9':
  - type: text
    content: 'Adoraim, Lachish, Azekah, '
