        children:
        - type: text
          text: God’s judgment and God’s mercy are the twin themes of the prophets. In this dramatic passage, the Lord describes the destruction that will sweep the earth in the day of His wrath. Yet the L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' is true to His promises: the remnant will be restored (Zeph 3:18-20); the last day is also “the day of redemption” (Eph 4:30). See also Matt 24:31; John 14:3; 1 Thess 4:15-17.'
      marker-yv: yv-n
    - type: text
      text: wrath,
  - type: usfm
