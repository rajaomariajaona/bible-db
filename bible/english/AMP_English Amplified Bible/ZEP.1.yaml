  - type: note
    content: Zephaniah’s great-great-grandfather, Hezekiah, ruled Judah (the Southern Kingdom) from 715-686 b.c. He was a godly king who restored the temple and abolished pagan worship. He was also notable as the great warrior who defended Jerusalem from the attacking Assyrians, and the great builder who developed the Siloam tunnel and reservoir to enhance the fresh water supply of Jerusalem.
