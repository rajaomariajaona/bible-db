        - type: text
          text: . He was a godly king who restored the temple and abolished pagan worship. He was also notable as the great warrior who defended Jerusalem from the attacking Assyrians, and the great builder who developed the Siloam tunnel and reservoir to enhance the fresh water supply of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'Hezekiah, in the days of Josiah the son of Amon, king of Judah:'
