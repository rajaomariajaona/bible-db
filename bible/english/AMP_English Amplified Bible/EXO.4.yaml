document_id: EXO.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Given Powers
  - type: text
    content: Then Moses answered [the L
  - type: heading
    content: ord
  - type: text
    content: '] and said, “What if they will not believe me or take seriously what I say? For they may say, ‘The L'
  - type: heading
    content: ord
  - type: text
    content: ' has not appeared to you.’ ” '
  '10':
  - type: text
    content: Then Moses said to the L
  - type: heading
    content: ord
  - type: text
    content: ', “Please, Lord, I am not a man of words (eloquent, fluent), neither before nor since You have spoken to Your servant; for I am '
  - type: note
    content: Lit heavy of mouth and heavy of tongue.
  - type: text
    content: 'slow of speech and tongue.” '
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “Who has made man’s mouth? Or who makes the mute or the deaf, or the seeing or the blind? Is it not I, the L'
  - type: heading
    content: ord
  - type: text
    content: '? '
  '12':
  - type: text
    content: 'Now then go, and I, even I, will be with your mouth, and will teach you what you shall say.” '
  '13':
  - type: text
    content: 'But he said, “Please my Lord, send '
  - type: text
    content: the message
  - type: text
    content: ' [of rescue to Israel] by [someone else,] whomever else You will [choose].”'
  - type: heading
    content: Aaron to Speak for Moses
  '14':
  - type: text
    content: Then the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' was kindled '
  - type: text
    content: and
  - type: text
    content: ' burned against Moses; He said, “Is there not your brother, Aaron the Levite? I know that he speaks fluently. Also, he is coming out to meet you, and when he sees you, he will be overjoyed. '
  '15':
  - type: text
    content: 'You must speak to him and put the words in his mouth; I, even I, will be with your mouth and with his mouth, and I will teach you what you are to do. '
  '16':
  - type: text
    content: 'Moreover, he shall speak for you to the people; he will act as a mouthpiece for you, and you will be as God to him [telling him what I say to you]. '
  '17':
  - type: text
    content: You shall take in your hand this staff, with which you shall perform the signs [the miracles which prove I sent you].”
  '18':
  - type: text
    content: 'Then Moses went away and returned to Jethro his father-in-law, and said to him, “Please, let me go back so that I may return to my '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'relatives in Egypt, and see if they are still alive.” And Jethro said to Moses, “Go in peace.” '
  '19':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses in Midian, “Go back to Egypt, for all the men who were seeking your life [for killing the Egyptian] are dead.” [Ex 2:11, 12] '
  '2':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “What is that in your hand?” And he said, “A staff.” '
  '20':
  - type: text
    content: So Moses took his wife [Zipporah] and his sons [Gershom and Eliezer] and seated them on donkeys, and returned to the land of Egypt. Moses also took the staff of God in his hand.
  '21':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “When you return to Egypt, see that you perform before Pharaoh all the wonders (miracles) which I have put in your hand, but I will harden his heart '
  - type: text
    content: and
  - type: text
    content: ' make him stubborn so that he will not let the people go. '
  '22':
  - type: text
    content: Then you shall say to Pharaoh, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Israel is My son, My firstborn. '
  '23':
  - type: text
    content: So I say to you, ‘Let My son go so that he may serve Me’; and if you refuse to let him go, behold, I will kill your son, your firstborn.” ’ ”
  '24':
  - type: text
    content: Now it happened at the lodging place, that the L
  - type: heading
    content: ord
  - type: text
    content: ' met Moses and sought to kill him [making him deathly ill because he had not circumcised one of his sons]. [Gen 17:9-14] '
  '25':
  - type: note
    content: Moses had not circumcised his son in obedience to the commandment that God had given to Abraham and his descendants (Gen 17:10 ff). It is possible that Moses refrained from doing the procedure because his wife Zipporah, a Midianite, had objected. If so, Zipporah now reluctantly performed the procedure herself as a last resort to save Moses’ life, not hiding her disgust over the situation.
  - type: text
    content: 'Then Zipporah took a flint knife and cut off the foreskin of her son and threw it at Moses’ feet, and said, “Indeed you are a husband of blood to me!” '
  '26':
  - type: text
    content: So He let Moses alone [to recover]. At that time Zipporah said, “
  - type: text
    content: You are
  - type: text
    content: ' a husband of blood”—because of the circumcision.'
  '27':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Aaron, “Go into the wilderness to meet Moses.” So he went and met him at the mountain of God (Sinai) and kissed him. '
  '28':
  - type: text
    content: Moses told Aaron all the words of the L
  - type: heading
    content: ord
  - type: text
    content: ' with which He had sent him, and all the signs that He had commanded him to do. '
  '29':
  - type: text
    content: 'Then Moses and Aaron went [into Egypt] and assembled all the elders of the Israelites; '
  '3':
  - type: text
    content: 'Then He said, “Throw it on the ground.” So Moses threw it on the ground, and it became a [living] serpent [like the royal symbol on the crown of Pharaoh]; and Moses ran from it. '
  '30':
  - type: text
    content: and Aaron said all the words which the L
  - type: heading
    content: ord
  - type: text
    content: ' had spoken to Moses. Then Moses performed the signs [given to him by God] before the people. '
  '31':
  - type: text
    content: So the people believed; and when they heard that the L
  - type: heading
    content: ord
  - type: text
    content: ' was concerned about the Israelites and that He had looked [with compassion] on their suffering, then they bowed their heads and worshiped [the L'
  - type: heading
    content: ord
  - type: text
    content: '].'
  '4':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Reach out your hand and grasp it by the tail.” So he reached out his hand and caught it, and it became a staff in his hand— '
  '5':
  - type: text
    content: '[“You shall do this,” said the L'
  - type: heading
    content: ord
  - type: text
    content: ',] “so that the elders may believe that the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of their fathers, the God of Abraham, the God of Isaac, and the God of Jacob, has [most certainly] appeared to you.”'
  '6':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' also said to him, “Put your hand into your robe [where it covers your chest].” So he put his hand into his robe, and when he took it out, his hand was '
  - type: note
    content: The Hebrew term for “leprous” referred to any of several severe rashes or skin diseases, including Hansen’s disease (true leprosy).
  - type: text
    content: 'leprous, as white as snow. '
  '7':
  - type: text
    content: 'Then God said, “Put your hand into your robe again.” So he put his hand back into his robe, and when he took it out, it was restored [and was] like the rest of his body. '
  '8':
  - type: text
    content: '“If they will not believe you or pay attention to the evidence of the first sign, they may believe the evidence of the second sign. '
  '9':
  - type: text
    content: But if they will not believe these two signs or pay attention to what you say, you are to take some water from the Nile and pour it on the dry ground; and the water which you take out of the river will turn into blood on the dry ground.”
