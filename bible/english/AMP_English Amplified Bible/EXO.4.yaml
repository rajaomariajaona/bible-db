  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Moses Given Powers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Moses answered [the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] and said, “What if they will not believe me or take seriously what I say? For they may say, ‘The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has not appeared to you.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to him, “What is that in your hand?” And he said, “A staff.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then He said, “Throw it on the ground.” So Moses threw it on the ground, and it became a [living] serpent [like the royal symbol on the crown of Pharaoh]; and Moses ran from it. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Reach out your hand and grasp it by the tail.” So he reached out his hand and caught it, and it became a staff in his hand— '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '[“You shall do this,” said the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ',] “so that the elders may believe that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of their fathers, the God of Abraham, the God of Isaac, and the God of Jacob, has [most certainly] appeared to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' also said to him, “Put your hand into your robe [where it covers your chest].” So he put his hand into his robe, and when he took it out, his hand was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew term for “leprous” referred to any of several severe rashes or skin diseases, including Hansen’s disease (true leprosy).
    marker-yv: yv-n
  - type: text
    text: 'leprous, as white as snow. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then God said, “Put your hand into your robe again.” So he put his hand back into his robe, and when he took it out, it was restored [and was] like the rest of his body. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“If they will not believe you or pay attention to the evidence of the first sign, they may believe the evidence of the second sign. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But if they will not believe these two signs or pay attention to what you say, you are to take some water from the Nile and pour it on the dry ground; and the water which you take out of the river will turn into blood on the dry ground.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then Moses said to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Please, Lord, I am not a man of words (eloquent, fluent), neither before nor since You have spoken to Your servant; for I am '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: heavy of mouth and heavy of tongue
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'slow of speech and tongue.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to him, “Who has made man’s mouth? Or who makes the mute or the deaf, or the seeing or the blind? Is it not I, the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now then go, and I, even I, will be with your mouth, and will teach you what you shall say.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But he said, “Please my Lord, send '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the message
  - type: text
    text: ' [of rescue to Israel] by [someone else,] whomever else You will [choose].”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Aaron to Speak for Moses
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was kindled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burned against Moses; He said, “Is there not your brother, Aaron the Levite? I know that he speaks fluently. Also, he is coming out to meet you, and when he sees you, he will be overjoyed. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You must speak to him and put the words in his mouth; I, even I, will be with your mouth and with his mouth, and I will teach you what you are to do. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moreover, he shall speak for you to the people; he will act as a mouthpiece for you, and you will be as God to him [telling him what I say to you]. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You shall take in your hand this staff, with which you shall perform the signs [the miracles which prove I sent you].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Moses went away and returned to Jethro his father-in-law, and said to him, “Please, let me go back so that I may return to my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'relatives in Egypt, and see if they are still alive.” And Jethro said to Moses, “Go in peace.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses in Midian, “Go back to Egypt, for all the men who were seeking your life [for killing the Egyptian] are dead.” [Ex 2:11, 12] '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So Moses took his wife [Zipporah] and his sons [Gershom and Eliezer] and seated them on donkeys, and returned to the land of Egypt. Moses also took the staff of God in his hand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “When you return to Egypt, see that you perform before Pharaoh all the wonders (miracles) which I have put in your hand, but I will harden his heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make him stubborn so that he will not let the people go. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then you shall say to Pharaoh, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Israel is My son, My firstborn. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So I say to you, ‘Let My son go so that he may serve Me’; and if you refuse to let him go, behold, I will kill your son, your firstborn.” ’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Now it happened at the lodging place, that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' met Moses and sought to kill him [making him deathly ill because he had not circumcised one of his sons]. [Gen 17:9-14] '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moses had not circumcised his son in obedience to the commandment that God had given to Abraham and his descendants (Gen 17:10 ff). It is possible that Moses refrained from doing the procedure because his wife Zipporah, a Midianite, had objected. If so, Zipporah now reluctantly performed the procedure herself as a last resort to save Moses’ life, not hiding her disgust over the situation.
    marker-yv: yv-n
  - type: text
    text: 'Then Zipporah took a flint knife and cut off the foreskin of her son and threw it at Moses’ feet, and said, “Indeed you are a husband of blood to me!” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So He let Moses alone [to recover]. At that time Zipporah said, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: You are
  - type: text
    text: ' a husband of blood”—because of the circumcision.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Aaron, “Go into the wilderness to meet Moses.” So he went and met him at the mountain of God (Sinai) and kissed him. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Moses told Aaron all the words of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with which He had sent him, and all the signs that He had commanded him to do. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Moses and Aaron went [into Egypt] and assembled all the elders of the Israelites; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: and Aaron said all the words which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had spoken to Moses. Then Moses performed the signs [given to him by God] before the people. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: So the people believed; and when they heard that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was concerned about the Israelites and that He had looked [with compassion] on their suffering, then they bowed their heads and worshiped [the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '].'
