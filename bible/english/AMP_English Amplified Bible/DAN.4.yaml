document_id: DAN.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The King Acknowledges God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebuchadnezzar the king, to all the peoples, nations, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: speakers of every
    - type: text
      text: ' language that live in all the earth: “May your peace abound! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘The visions that passed through my mind as I lay on my bed were these: I was looking, and behold, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was
    - type: text
      text: ' a tree in the middle of the earth, and its height was great.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘The tree grew large and became strong
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its height reached to heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it was visible to the end of the earth.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Its leaves were beautiful and its fruit abundant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in it was food for all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The beasts of the field found shade under it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the birds of the sky nested in its branches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all living creatures fed themselves from it.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And behold, I saw in the visions of my mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as I lay
    - type: text
      text: ' on my bed, an '
    - type: usfm
      marker: it
      children:
      - type: text
        text: angelic
    - type: text
      text: ' watcher, a holy one, descended from heaven.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘He shouted aloud and said this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Cut down the tree and cut off its branches;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shake off its leaves and scatter its fruit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the living creatures run from under it
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the birds fly from its branches.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Nevertheless leave the stump with its roots in the ground,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bound with a band of iron and bronze
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the new grass of the field;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let him be wet with the dew of heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let him feed with the animals in the grass of the earth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Let his mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nature be changed from a man’s'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And let an animal’s mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nature be given to him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let seven periods of time pass over him.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“This sentence is by the decree of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: angelic
    - type: text
      text: ' watchers'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the decision is a command of the holy ones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that the living may know [without any doubt]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the Most High [God] rules over the kingdom of mankind
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He bestows it on whomever He desires
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And sets over it the humblest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lowliest of men.” [Dan 2:21; 5:21]'
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This is the dream which I, King Nebuchadnezzar, have seen. Now you, Belteshazzar, explain its meaning, since none of the wise men of my kingdom are able to reveal its interpretation to me; but you are able, for a spirit of the holy gods is in you.’
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Daniel Interprets the Vision
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then Daniel, whose [Babylonian] name was Belteshazzar, was appalled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' speechless for a while [because he was deeply concerned about the destiny of the king], and his thoughts alarmed him. The king said, ‘Belteshazzar, do not let the dream or its interpretation frighten you.’ Belteshazzar answered, ‘My lord, may the dream be [meant] for those who hate you and its message for your enemies! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It has seemed good to me to declare the signs and wonders which the Most High God has done for me.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The tree that you saw, which became great and grew strong, whose height reached to heaven and which was visible to all the earth, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whose foliage was beautiful and its fruit abundant, and on which was food for all, under which the beasts of the field lived, and in whose branches the birds of the sky nested— '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'it is you, O king, who have become great and grown strong; your greatness has increased and it reaches to heaven, and your dominion [reaches] to the ends of the earth. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that the king saw an '
    - type: usfm
      marker: it
      children:
      - type: text
        text: angelic
    - type: text
      text: ' watcher, a holy one, descending from heaven and saying, “Cut the tree down and destroy it; but leave the stump with its roots in the earth, but with a band of iron and bronze '
    - type: usfm
      marker: it
      children:
      - type: text
        text: around it
    - type: text
      text: ' in the new grass of the field, and let him be wet with the dew of heaven, and let him feed with the beasts of the field until seven periods of time pass over him,” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'this is the interpretation, O king: It is the decree of the Most High [God], which has come upon my lord the king: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that you shall be driven from mankind and your dwelling place shall be with the beasts of the field; and that you be given grass to eat like the cattle and be wet with the dew of heaven; and seven periods of time shall pass over you, until you know [without any doubt] that the Most High [God] rules over the kingdom of mankind and He bestows it to whomever He desires. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in that it was commanded to leave the stump with the roots of the tree [in the earth], your kingdom shall be restored to you after you recognize (understand fully) that Heaven rules. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, O king, let my advice to you be [considered and found] acceptable; break away now from your sins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exhibit your repentance by doing what is right, and from your wickedness by showing mercy to the poor, so that [if you repent] there may possibly be a continuance of your prosperity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tranquility '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a healing of your error.’'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Vision Fulfilled
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All this happened to Nebuchadnezzar the king. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Twelve months later he was walking on the upper level of the royal palace of Babylon. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How great are His signs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And how mighty are His wonders!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His kingdom is an everlasting kingdom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His dominion is from generation to generation. [Dan 7:13, 14; Luke 1:31-33]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Vision of a Great Tree
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king said thoughtfully, ‘Is not this the great Babylon which I myself have built as the royal residence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seat of government by the might of my power and for the honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory of my majesty?’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While the words were still in the king’s mouth, a voice came [as if falling] from heaven, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
    - type: text
      text: ' ‘O King Nebuchadnezzar, to you it is declared: “The kingdom has been removed from you, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you will be driven away from mankind, and your dwelling place will be with the animals of the field. You will be given grass to eat like the cattle, and seven periods of time will pass over you until you know [without any doubt] that the Most High God rules over the kingdom of mankind and He bestows it on whomever He desires.” ’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately the word concerning Nebuchadnezzar was fulfilled. He was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is likely that Daniel and Nebuchadnezzar’s advisors continued to run the government while the king was incapacitated, keeping him in an inconspicuous place within the palace enclosure during his illness. The king may have been stricken with a very rare mental condition, boanthropy, in which patients believe themselves to be cattle.
      marker-yv: yv-n
    - type: text
      text: 'driven away from mankind and began eating grass like cattle, and his body was wet with the dew of heaven until his hair had grown like eagles’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feathers
    - type: text
      text: ' and his nails were like birds’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: claws
    - type: text
      text: .
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But at the end of the days [that is, at the seven periods of time], I, Nebuchadnezzar, raised my eyes toward heaven, and my understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reason returned to me; and I blessed the Most High [God] and I praised and honored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorified Him who lives forever,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His dominion is an everlasting dominion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And His kingdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: endures
    - type: text
      text: ' from generation to generation.'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All the inhabitants of the earth are regarded as nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He does according to His will in the host of heaven
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And among the inhabitants of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no one can hold back His hand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or say to Him, ‘What have You done?’
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now at the same time my reason returned to me; and for the glory of my kingdom, my majesty and splendor were returned to me, and my counselors and my nobles began seeking me out; so I was re-established in my kingdom, and still more greatness [than before] was added to me. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now I, Nebuchadnezzar, praise and exalt and honor the King of heaven, for all His works are true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithful and His ways are just, and He is able to humiliate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humble those who walk in [self-centered, self-righteous] pride.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I, Nebuchadnezzar, was at rest in my house and prospering in my palace. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw a dream and it made me afraid; and the fantasies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughts and the visions [that appeared] in my mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as I lay
    - type: text
      text: ' on my bed kept alarming me. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I gave orders to bring in before me all the wise men of Babylon, so that they might make known to me the interpretation of the dream. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the magicians, the enchanters (Magi), the Chaldeans [who were the master astrologers] and the diviners came in, and I told them the dream, but they could not interpret it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make known its meaning to me. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But at last Daniel came in before me, whose name is Belteshazzar, after the name of my god, and in whom is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or possibly '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the Spirit of the holy God
        - type: text
          text: ', and so throughout the chapter.'
      marker-yv: yv-n
    - type: text
      text: 'a spirit of the holy gods; and I told the dream to him, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying
    - type: text
      text: ', '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘O Belteshazzar, chief of the magicians, because I know that a spirit of the holy gods is in you and no mystery baffles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' troubles you, tell me the visions of my dream which I have seen, along with its interpretation.'
