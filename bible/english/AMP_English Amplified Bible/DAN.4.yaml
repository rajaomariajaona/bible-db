  '18':
  - type: text
    content: This is the dream which I, King Nebuchadnezzar, have seen. Now you, Belteshazzar, explain its meaning, since none of the wise men of my kingdom are able to reveal its interpretation to me; but you are able, for a spirit of the holy gods is in you.’
  - type: heading
    content: Daniel Interprets the Vision
  '19':
  - type: text
    content: '“Then Daniel, whose [Babylonian] name was Belteshazzar, was appalled '
  - type: text
    content: and
  - type: text
    content: ' speechless for a while [because he was deeply concerned about the destiny of the king], and his thoughts alarmed him. The king said, ‘Belteshazzar, do not let the dream or its interpretation frighten you.’ Belteshazzar answered, ‘My lord, may the dream be [meant] for those who hate you and its message for your enemies! '
  '2':
  - type: text
    content: It has seemed good to me to declare the signs and wonders which the Most High God has done for me.
  '20':
  - type: text
    content: 'The tree that you saw, which became great and grew strong, whose height reached to heaven and which was visible to all the earth, '
  '21':
  - type: text
    content: 'whose foliage was beautiful and its fruit abundant, and on which was food for all, under which the beasts of the field lived, and in whose branches the birds of the sky nested— '
  '22':
  - type: text
    content: 'it is you, O king, who have become great and grown strong; your greatness has increased and it reaches to heaven, and your dominion [reaches] to the ends of the earth. '
  '23':
  - type: text
    content: 'In that the king saw an '
  - type: text
    content: angelic
  - type: text
    content: ' watcher, a holy one, descending from heaven and saying, “Cut the tree down and destroy it; but leave the stump with its roots in the earth, but with a band of iron and bronze '
  - type: text
    content: around it
  - type: text
    content: ' in the new grass of the field, and let him be wet with the dew of heaven, and let him feed with the beasts of the field until seven periods of time pass over him,” '
  '24':
  - type: text
    content: 'this is the interpretation, O king: It is the decree of the Most High [God], which has come upon my lord the king: '
  '25':
  - type: text
    content: 'that you shall be driven from mankind and your dwelling place shall be with the beasts of the field; and that you be given grass to eat like the cattle and be wet with the dew of heaven; and seven periods of time shall pass over you, until you know [without any doubt] that the Most High [God] rules over the kingdom of mankind and He bestows it to whomever He desires. '
  '26':
  - type: text
    content: 'And in that it was commanded to leave the stump with the roots of the tree [in the earth], your kingdom shall be restored to you after you recognize (understand fully) that Heaven rules. '
  '27':
  - type: text
    content: 'Therefore, O king, let my advice to you be [considered and found] acceptable; break away now from your sins '
  - type: text
    content: and
  - type: text
    content: ' exhibit your repentance by doing what is right, and from your wickedness by showing mercy to the poor, so that [if you repent] there may possibly be a continuance of your prosperity '
  - type: text
    content: and
  - type: text
    content: ' tranquility '
  - type: text
    content: and
  - type: text
    content: ' a healing of your error.’'
  - type: heading
    content: The Vision Fulfilled
  '28':
  - type: text
    content: '“All this happened to Nebuchadnezzar the king. '
  '29':
  - type: text
    content: 'Twelve months later he was walking on the upper level of the royal palace of Babylon. '
  '3':
  - type: text
    content: “How great are His signs
  - type: text
    content: And how mighty are His wonders!
  - type: text
    content: His kingdom is an everlasting kingdom
  - type: text
    content: And His dominion is from generation to generation. [Dan 7:13, 14; Luke 1:31-33]
  - type: heading
    content: The Vision of a Great Tree
  '30':
  - type: text
    content: 'The king said thoughtfully, ‘Is not this the great Babylon which I myself have built as the royal residence '
  - type: text
    content: and
  - type: text
    content: ' seat of government by the might of my power and for the honor '
  - type: text
    content: and
  - type: text
    content: ' glory of my majesty?’ '
  '31':
  - type: text
    content: 'While the words were still in the king’s mouth, a voice came [as if falling] from heaven, '
  - type: text
    content: saying,
  - type: text
    content: ' ‘O King Nebuchadnezzar, to you it is declared: “The kingdom has been removed from you, '
  '32':
  - type: text
    content: 'and you will be driven away from mankind, and your dwelling place will be with the animals of the field. You will be given grass to eat like the cattle, and seven periods of time will pass over you until you know [without any doubt] that the Most High God rules over the kingdom of mankind and He bestows it on whomever He desires.” ’ '
  '33':
  - type: text
    content: 'Immediately the word concerning Nebuchadnezzar was fulfilled. He was '
  - type: note
    content: It is likely that Daniel and Nebuchadnezzar’s advisors continued to run the government while the king was incapacitated, keeping him in an inconspicuous place within the palace enclosure during his illness. The king may have been stricken with a very rare mental condition, boanthropy, in which patients believe themselves to be cattle.
  - type: text
    content: 'driven away from mankind and began eating grass like cattle, and his body was wet with the dew of heaven until his hair had grown like eagles’ '
  - type: text
    content: feathers
  - type: text
    content: ' and his nails were like birds’ '
  - type: text
    content: claws
  - type: text
    content: .
  '34':
  - type: text
    content: '“But at the end of the days [that is, at the seven periods of time], I, Nebuchadnezzar, raised my eyes toward heaven, and my understanding '
  - type: text
    content: and
  - type: text
    content: ' reason returned to me; and I blessed the Most High [God] and I praised and honored '
  - type: text
    content: and
  - type: text
    content: ' glorified Him who lives forever,'
  - type: text
    content: For His dominion is an everlasting dominion;
  - type: text
    content: 'And His kingdom '
  - type: text
    content: endures
  - type: text
    content: ' from generation to generation.'
  '35':
  - type: text
    content: “All the inhabitants of the earth are regarded as nothing.
  - type: text
    content: But He does according to His will in the host of heaven
  - type: text
    content: And among the inhabitants of the earth;
  - type: text
    content: And no one can hold back His hand
  - type: text
    content: Or say to Him, ‘What have You done?’
  '36':
  - type: text
    content: 'Now at the same time my reason returned to me; and for the glory of my kingdom, my majesty and splendor were returned to me, and my counselors and my nobles began seeking me out; so I was re-established in my kingdom, and still more greatness [than before] was added to me. '
  '37':
  - type: text
    content: 'Now I, Nebuchadnezzar, praise and exalt and honor the King of heaven, for all His works are true '
  - type: text
    content: and
  - type: text
    content: ' faithful and His ways are just, and He is able to humiliate '
  - type: text
    content: and
  - type: text
    content: ' humble those who walk in [self-centered, self-righteous] pride.”'
  '4':
  - type: text
    content: '“I, Nebuchadnezzar, was at rest in my house and prospering in my palace. '
  '5':
  - type: text
    content: 'I saw a dream and it made me afraid; and the fantasies '
  - type: text
    content: and
  - type: text
    content: ' thoughts and the visions [that appeared] in my mind '
  - type: text
    content: as I lay
  - type: text
    content: ' on my bed kept alarming me. '
  '6':
  - type: text
    content: 'So I gave orders to bring in before me all the wise men of Babylon, so that they might make known to me the interpretation of the dream. '
  '7':
  - type: text
    content: 'Then the magicians, the enchanters (Magi), the Chaldeans [who were the master astrologers] and the diviners came in, and I told them the dream, but they could not interpret it '
  - type: text
    content: and
  - type: text
    content: ' make known its meaning to me. '
  '8':
  - type: text
    content: 'But at last Daniel came in before me, whose name is Belteshazzar, after the name of my god, and in whom is '
  - type: note
    content: Or possibly the Spirit of the holy God, and so throughout the chapter.
  - type: text
    content: 'a spirit of the holy gods; and I told the dream to him, '
  - type: text
    content: saying
  - type: text
    content: ', '
  '9':
  - type: text
    content: '‘O Belteshazzar, chief of the magicians, because I know that a spirit of the holy gods is in you and no mystery baffles '
  - type: text
    content: or
  - type: text
    content: ' troubles you, tell me the visions of my dream which I have seen, along with its interpretation.'
