  - type: text
    text: '¶Pray for the peace of Jerusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “May they prosper who love you [holy city].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “May peace be within your walls
- type: usfm
  marker: q1
  children:
  - type: text
    text: And prosperity within your palaces.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For the sake of my brothers and my friends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will now say, “May peace be within you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For the sake of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God [which is Jerusalem],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will seek your (the city’s) good.
