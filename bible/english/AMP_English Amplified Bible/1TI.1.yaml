document_id: 1TI.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Correcting False Teaching
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paul, an apostle (special messenger, personally chosen representative) of Christ Jesus by the commandment of God our Savior, and of Christ Jesus (the Messiah, the Anointed) our Hope [the fulfillment of our salvation],
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'to Timothy, my true son in the faith: Grace, mercy, and peace [inner calm and spiritual well-being] from God the Father and Christ Jesus our Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As I urged you when I was on my way to Macedonia, stay on at Ephesus so that you may instruct certain individuals not to teach any different doctrines, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'nor to pay attention to legends (fables, myths) and endless genealogies, which give rise to useless speculation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' meaningless arguments rather than advancing God’s program '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of instruction
  - type: text
    text: ' which is grounded in faith [and requires surrendering the entire self to God in absolute trust and confidence]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But the goal of our instruction is love [which springs] from a pure heart and a good conscience and a sincere faith. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Some individuals have wandered away from these things into empty arguments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' useless discussions, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: wanting to be teachers of the Law [of Moses], even though they do not understand the terms they use or the subjects about which they make [such] confident declarations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now we know [without any doubt] that the Law is good, if one uses it lawfully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appropriately, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'understanding the fact that law is not enacted for the righteous person [the one in right standing with God], but for lawless and rebellious people, for the ungodly and sinful, for the irreverent and profane, for those who kill their fathers or mothers, for murderers, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'for sexually immoral persons, for homosexuals, for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. those who exploit other people for evil or selfish reasons.
    marker-yv: yv-n
  - type: text
    text: 'kidnappers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slave traders, for liars, for perjurers—and for whatever else is contrary to sound doctrine, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: according to the glorious gospel of the blessed God, with which I have been entrusted.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I thank Christ Jesus our Lord, who has granted me [the needed] strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made me able for this, because He considered me faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy, putting me into service [for this ministry], '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'even though I was formerly a blasphemer [of our Lord] and a persecutor [of His church] and a shameful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' outrageous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violent aggressor [toward believers]. Yet I was shown mercy because I acted out of ignorance in unbelief. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The grace of our Lord [His amazing, unmerited favor and blessing] flowed out in superabundance [for me, together] with the faith and love which are [realized] in Christ Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An unusual clause used only five times in the NT. See also 3:1; 4:9; 2 Tim 2:11; Titus 3:8.
    marker-yv: yv-n
  - type: text
    text: 'This is a faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy statement, deserving full acceptance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' approval, that Christ Jesus came into the world to save sinners, among whom I am foremost. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Yet for this reason I found mercy, so that in me as the foremost [of sinners], Jesus Christ might demonstrate His perfect patience as an example '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pattern for those who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: were destined to believe
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'would believe in Him for eternal life. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Now to the King of the ages [eternal], immortal, invisible, the only God, be honor and glory forever and ever. Amen.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This command I entrust to you, Timothy, my son, in accordance with the prophecies previously made concerning you, so that [inspired and aided] by them you may fight the good fight [in contending with false teachers], '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'keeping your faith [leaning completely on God with absolute trust and confidence in His guidance] and having a good conscience; for some [people] have rejected [their moral compass] and have made a shipwreck of their faith. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Among these are Hymenaeus and Alexander, whom I have '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. expelled from the safety of the church.
    marker-yv: yv-n
  - type: text
    text: 'handed over to Satan, so that they will be disciplined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taught not to blaspheme.'
