document_id: 1TI.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Correcting False Teaching
  - type: text
    content: Paul, an apostle (special messenger, personally chosen representative) of Christ Jesus by the commandment of God our Savior, and of Christ Jesus (the Messiah, the Anointed) our Hope [the fulfillment of our salvation],
  '10':
  - type: text
    content: 'for sexually immoral persons, for homosexuals, for '
  - type: note
    content: I.e. those who exploit other people for evil or selfish reasons.
  - type: text
    content: 'kidnappers '
  - type: text
    content: and
  - type: text
    content: ' slave traders, for liars, for perjurers—and for whatever else is contrary to sound doctrine, '
  '11':
  - type: text
    content: according to the glorious gospel of the blessed God, with which I have been entrusted.
  '12':
  - type: text
    content: 'I thank Christ Jesus our Lord, who has granted me [the needed] strength '
  - type: text
    content: and
  - type: text
    content: ' made me able for this, because He considered me faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy, putting me into service [for this ministry], '
  '13':
  - type: text
    content: 'even though I was formerly a blasphemer [of our Lord] and a persecutor [of His church] and a shameful '
  - type: text
    content: and
  - type: text
    content: ' outrageous '
  - type: text
    content: and
  - type: text
    content: ' violent aggressor [toward believers]. Yet I was shown mercy because I acted out of ignorance in unbelief. '
  '14':
  - type: text
    content: 'The grace of our Lord [His amazing, unmerited favor and blessing] flowed out in superabundance [for me, together] with the faith and love which are [realized] in Christ Jesus. '
  '15':
  - type: note
    content: An unusual clause used only five times in the NT. See also 3:1; 4:9; 2 Tim 2:11; Titus 3:8.
  - type: text
    content: 'This is a faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy statement, deserving full acceptance '
  - type: text
    content: and
  - type: text
    content: ' approval, that Christ Jesus came into the world to save sinners, among whom I am foremost. '
  '16':
  - type: text
    content: 'Yet for this reason I found mercy, so that in me as the foremost [of sinners], Jesus Christ might demonstrate His perfect patience as an example '
  - type: text
    content: or
  - type: text
    content: ' pattern for those who '
  - type: note
    content: Or were destined to believe.
  - type: text
    content: 'would believe in Him for eternal life. '
  '17':
  - type: text
    content: Now to the King of the ages [eternal], immortal, invisible, the only God, be honor and glory forever and ever. Amen.
  '18':
  - type: text
    content: 'This command I entrust to you, Timothy, my son, in accordance with the prophecies previously made concerning you, so that [inspired and aided] by them you may fight the good fight [in contending with false teachers], '
  '19':
  - type: text
    content: 'keeping your faith [leaning completely on God with absolute trust and confidence in His guidance] and having a good conscience; for some [people] have rejected [their moral compass] and have made a shipwreck of their faith. '
  '2':
  - type: text
    content: 'to Timothy, my true son in the faith: Grace, mercy, and peace [inner calm and spiritual well-being] from God the Father and Christ Jesus our Lord.'
  '20':
  - type: text
    content: 'Among these are Hymenaeus and Alexander, whom I have '
  - type: note
    content: I.e. expelled from the safety of the church.
  - type: text
    content: 'handed over to Satan, so that they will be disciplined '
  - type: text
    content: and
  - type: text
    content: ' taught not to blaspheme.'
  '3':
  - type: text
    content: 'As I urged you when I was on my way to Macedonia, stay on at Ephesus so that you may instruct certain individuals not to teach any different doctrines, '
  '4':
  - type: text
    content: 'nor to pay attention to legends (fables, myths) and endless genealogies, which give rise to useless speculation '
  - type: text
    content: and
  - type: text
    content: ' meaningless arguments rather than advancing God’s program '
  - type: text
    content: of instruction
  - type: text
    content: ' which is grounded in faith [and requires surrendering the entire self to God in absolute trust and confidence]. '
  '5':
  - type: text
    content: 'But the goal of our instruction is love [which springs] from a pure heart and a good conscience and a sincere faith. '
  '6':
  - type: text
    content: 'Some individuals have wandered away from these things into empty arguments '
  - type: text
    content: and
  - type: text
    content: ' useless discussions, '
  '7':
  - type: text
    content: wanting to be teachers of the Law [of Moses], even though they do not understand the terms they use or the subjects about which they make [such] confident declarations.
  '8':
  - type: text
    content: 'Now we know [without any doubt] that the Law is good, if one uses it lawfully '
  - type: text
    content: and
  - type: text
    content: ' appropriately, '
  '9':
  - type: text
    content: 'understanding the fact that law is not enacted for the righteous person [the one in right standing with God], but for lawless and rebellious people, for the ungodly and sinful, for the irreverent and profane, for those who kill their fathers or mothers, for murderers, '
