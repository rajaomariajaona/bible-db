document_id: GEN.50,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Burial Preparations and Mourning for Jacob
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Joseph fell upon his father’s face, and wept over him and kissed him [tenderly]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When they came to the threshing floor of Atad, which is beyond the Jordan, they mourned there with a great lamentation (expressions of mourning for the deceased) and [extreme demonstrations of] sorrow [according to Egyptian custom]; and Joseph observed a seven-day mourning for his father. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When the inhabitants of the land, the Canaanites, saw the mourning at the threshing floor of Atad, they said, “This is a grievous mourning for the Egyptians.” Therefore the place was named Abel-mizraim (mourning of Egypt); it is west of the Jordan.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Burial at Machpelah
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So Jacob’s sons did for him as he had commanded them; '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'for his sons carried him to the land of Canaan and buried him in the cave of the field of Machpelah, east of Mamre, which Abraham bought along with the field as a burial site from Ephron the Hittite. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: After he had buried his father, Joseph returned to Egypt, he and his brothers, and all who had gone up with him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When Joseph’s brothers saw that their father was dead, they said, “What if Joseph carries a grudge against us and pays us back in full for all the wrong which we did to him?” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So they sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Joseph, saying, “Your father commanded us before he died, saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '‘You are to say to Joseph, “I beg you, please forgive the transgression of your brothers and their sin, for they did you wrong.” ’ Now, please forgive the transgression of the servants of the God of your father.” And Joseph wept when they spoke to him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then his brothers went and fell down before him [in confession]; then they said, “Behold, we are your servants (slaves).” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But Joseph said to them, “Do not be afraid, for am I in the place of God? [Vengeance is His, not mine.] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Joseph ordered his servants the physicians to embalm (mummify) his father. So the physicians embalmed Israel (Jacob). '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'As for you, you meant evil against me, but God meant it for good in order to bring about this present outcome, that many people would be kept alive [as they are this day]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So now, do not be afraid; I will provide for you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' support you and your little ones.” So he comforted them [giving them encouragement and hope] and spoke [with kindness] to their hearts.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Death of Joseph
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Now Joseph lived in Egypt, he and his father’s household, and Joseph lived a hundred and ten years. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Joseph saw the third generation of Ephraim’s children; also the children of Machir, the son of Manasseh, were born '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' raised on Joseph’s knees. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Joseph said to his brothers, “I am about to die, but God will surely take care of you and bring you up out of this land to the land which He promised to Abraham, to Isaac, and to Jacob [to give you].” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then Joseph made the sons of Israel (Jacob) swear [an oath], saying, “God will surely visit you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take care of you [returning you to Canaan], and [when that happens] you shall carry my bones up from here.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'So Joseph died, being a hundred and ten years old; and they embalmed him and he was put '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joseph’s body remained in Egypt until the exodus to the promised land of Canaan about two hundred years later. Its final resting-place was Shechem, near Samaria, in the parcel of ground which Jacob bought from the sons of Hamor, the father of Shechem (Josh 24:32). Here each of his brothers was also buried (Acts 7:15, 16).
      marker-yv: yv-n
    - type: text
      text: in a coffin in Egypt.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Now forty days were required for this, for that is the customary number of days [of preparation] required for embalming. And the Egyptians wept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grieved for him [in public mourning as they would for royalty] for seventy days.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When the days of weeping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' public mourning for him were past, Joseph spoke to [the nobles of] the house of Pharaoh, saying, “If now I have found favor in your sight, please speak to Pharaoh, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '‘My father made me swear [an oath], saying, “Hear me, I am about to die; bury me in my tomb which I prepared for myself in the land of Canaan.” So now let me go up [to Canaan], please, and bury my father; then I will return.’ ” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And Pharaoh said, “Go up and bury your father, as he made you swear.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So Joseph went up [to Canaan] to bury his father, and with him went all the officials of Pharaoh, [the nobles of his court and] the elders of his household and all [the nobles and] the elders of the land of Egypt— '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and all the household of Joseph and his brothers and his father’s household. They left only their little ones and their flocks and herds in the land of Goshen. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Both chariots and horsemen also went up [to Canaan] with Joseph; and it was a very great company. '
