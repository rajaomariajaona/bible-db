document_id: MRK.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: 'When the Sabbath was over, Mary Magdalene, Mary the '
  - type: text
    content: mother
  - type: text
    content: ' of James, and Salome purchased [sweet-smelling] spices, so that they might go and '
  - type: note
    content: This was an act designed to indicate loving devotion to the deceased, and to lessen the odor of decay.
  - type: text
    content: 'anoint Him. [Matt 28:1-8; Luke 24:1-10; John 20:1-8] '
  '10':
  - type: text
    content: 'She went and reported it to those who had been with Him, while they were mourning and weeping. '
  '11':
  - type: text
    content: When they heard that He was alive and had been seen by her, they did not believe it.
  '12':
  - type: text
    content: 'After that, He appeared in a different form to two of them as they were walking along the way to the country. [Luke 24:13-35] '
  '13':
  - type: text
    content: They returned [to Jerusalem] and told the others, but they did not believe them either.
  - type: heading
    content: The Disciples Commissioned
  '14':
  - type: text
    content: 'Later, Jesus appeared to the eleven [disciples] themselves as they were reclining '
  - type: text
    content: at the table;
  - type: text
    content: ' and He called them to account for their unbelief and hardness of heart, because they had not believed those who had seen Him after He had risen [from death]. '
  '15':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Go into all the world and preach the gospel to all creation.
  - type: text
    content: ' '
  '16':
  - type: text
    content: He who has believed
  - type: text
    content: ' [in Me] '
  - type: text
    content: and has been baptized will be saved
  - type: text
    content: ' [from the penalty of God’s wrath and judgment]; '
  - type: text
    content: but he who has not believed will be condemned.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'These signs will accompany those who have believed: in My name they will cast out demons, they will speak in new tongues;'
  - type: text
    content: ' '
  '18':
  - type: text
    content: they will pick up serpents, and if they drink anything deadly, it will not hurt them; they will lay hands on the sick, and they will get well.”
  '19':
  - type: text
    content: 'So then, when the Lord Jesus had spoken to them, He was taken up into heaven and sat down at the right hand of God. [Ps 110:1] '
  '2':
  - type: text
    content: 'Very early on the first day of the week, they came to the tomb when the sun had risen. '
  '20':
  - type: text
    content: And they went out and preached everywhere, while the Lord was working with them and confirming the word by the signs that followed.]
  '3':
  - type: text
    content: 'And they were saying to one another, “Who will roll back the stone for us from the entrance of the tomb?” '
  '4':
  - type: text
    content: 'Looking up, they saw that the stone had been rolled away, though it was extremely large. '
  '5':
  - type: text
    content: 'Entering the tomb, they saw a young man sitting on the right, wearing a [long, stately] white robe; and they were amazed '
  - type: text
    content: and
  - type: text
    content: ' bewildered. '
  '6':
  - type: text
    content: 'And he said to them, “Do not be amazed; you are looking for Jesus the Nazarene, who was crucified. He has risen; He is not here. See, [here is] the place where they laid Him. [Ps 16:10] '
  '7':
  - type: text
    content: 'But go, tell His disciples and Peter, ‘He is going ahead of you to Galilee; you will see Him there, just as He told you.’ ” [Mark 14:28] '
  '8':
  - type: text
    content: They went out and fled from the tomb, for they were seized with trembling and astonishment; and they said nothing [about it] to anyone, because they were afraid.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Later mss add vv 9-20.
  - type: text
    content: '[Now Jesus, having risen [from death] early on the first day of the week, appeared first to Mary Magdalene, from whom He had cast out seven demons. '
