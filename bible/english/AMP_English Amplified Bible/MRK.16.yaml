document_id: MRK.16,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Resurrection
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When the Sabbath was over, Mary Magdalene, Mary the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mother
    - type: text
      text: ' of James, and Salome purchased [sweet-smelling] spices, so that they might go and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was an act designed to indicate loving devotion to the deceased, and to lessen the odor of decay.
      marker-yv: yv-n
    - type: text
      text: 'anoint Him. [Matt 28:1-8; Luke 24:1-10; John 20:1-8] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'She went and reported it to those who had been with Him, while they were mourning and weeping. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When they heard that He was alive and had been seen by her, they did not believe it.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'After that, He appeared in a different form to two of them as they were walking along the way to the country. [Luke 24:13-35] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They returned [to Jerusalem] and told the others, but they did not believe them either.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Disciples Commissioned
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Later, Jesus appeared to the eleven [disciples] themselves as they were reclining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table;
    - type: text
      text: ' and He called them to account for their unbelief and hardness of heart, because they had not believed those who had seen Him after He had risen [from death]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go into all the world and preach the gospel to all creation.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He who has believed
    - type: text
      text: ' [in Me] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and has been baptized will be saved
    - type: text
      text: ' [from the penalty of God’s wrath and judgment]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but he who has not believed will be condemned.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'These signs will accompany those who have believed: in My name they will cast out demons, they will speak in new tongues;'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: they will pick up serpents, and if they drink anything deadly, it will not hurt them; they will lay hands on the sick, and they will get well.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So then, when the Lord Jesus had spoken to them, He was taken up into heaven and sat down at the right hand of God. [Ps 110:1] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Very early on the first day of the week, they came to the tomb when the sun had risen. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And they went out and preached everywhere, while the Lord was working with them and confirming the word by the signs that followed.]
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And they were saying to one another, “Who will roll back the stone for us from the entrance of the tomb?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Looking up, they saw that the stone had been rolled away, though it was extremely large. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Entering the tomb, they saw a young man sitting on the right, wearing a [long, stately] white robe; and they were amazed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bewildered. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he said to them, “Do not be amazed; you are looking for Jesus the Nazarene, who was crucified. He has risen; He is not here. See, [here is] the place where they laid Him. [Ps 16:10] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But go, tell His disciples and Peter, ‘He is going ahead of you to Galilee; you will see Him there, just as He told you.’ ” [Mark 14:28] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They went out and fled from the tomb, for they were seized with trembling and astonishment; and they said nothing [about it] to anyone, because they were afraid.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Later mss add vv 9-20.
      marker-yv: yv-n
    - type: text
      text: '[Now Jesus, having risen [from death] early on the first day of the week, appeared first to Mary Magdalene, from whom He had cast out seven demons. '
