  - type: text
    content: ' my God, You are very great;'
  - type: text
    content: You are clothed with splendor and majesty,
  '10':
  - type: text
    content: ¶You send springs into the valleys;
  - type: text
    content: Their waters flow among the mountains.
  '11':
  - type: text
    content: They give drink to every beast of the field;
  - type: text
    content: The wild donkeys quench their thirst there.
  '12':
  - type: text
    content: Beside them the birds of the heavens have their nests;
  - type: text
    content: 'They lift up their voices '
  - type: text
    content: and
  - type: text
    content: ' sing among the branches. [Matt 13:32]'
  '13':
  - type: text
    content: He waters the mountains from His upper chambers;
  - type: text
    content: The earth is satisfied with the fruit of His works.
  '14':
  - type: text
    content: ¶He causes grass to grow for the cattle,
  - type: text
    content: And all that the earth produces for cultivation by man,
  - type: text
    content: So that he may bring food from the earth—
  '15':
  - type: text
    content: And wine which makes the heart of man glad,
  - type: text
    content: So that he may make his face glisten with oil,
  - type: text
    content: 'And bread to sustain '
  - type: text
    content: and
  - type: text
    content: ' strengthen man’s heart.'
  '16':
  - type: text
    content: The trees of the L
  - type: heading
    content: ord
  - type: text
    content: ' drink their fill,'
  - type: text
    content: The cedars of Lebanon which He has planted,
  '17':
  - type: text
    content: Where the birds make their nests;
  - type: text
    content: As for the stork, the fir trees are her house.
  '18':
  - type: text
    content: ¶The high mountains are for the wild goats;
  - type: text
    content: 'The rocks are a refuge for the '
  - type: note
    content: Small, shy, furry animals (Hyrax syriacus) found in the peninsula of the Sinai, northern Israel, and the region around the Dead Sea; KJV coney, orig NASB rock badgers.
  - type: text
    content: shephanim.
  '19':
  - type: text
    content: He made the moon for the seasons;
  - type: text
    content: The sun knows the [exact] place of its setting.
  '2':
  - type: text
    content: '[You are the One] who covers Yourself with light as with a garment,'
  - type: text
    content: Who stretches out the heavens like a tent curtain,
  '20':
  - type: text
    content: You [O L
  - type: heading
    content: ord
  - type: text
    content: '] make darkness and it becomes night,'
  - type: text
    content: In which prowls about every wild beast of the forest.
  '21':
  - type: text
    content: The young lions roar after their prey
  - type: text
    content: And seek their food from God.
  '22':
  - type: text
    content: When the sun arises, they withdraw
  - type: text
    content: And lie down in their dens.
  '23':
  - type: text
    content: Man goes out to his work
  - type: text
    content: And remains at his labor until evening.
  '24':
  - type: text
    content: ¶O L
  - type: heading
    content: ord
  - type: text
    content: ', how many '
  - type: text
    content: and
  - type: text
    content: ' varied are Your works!'
  - type: text
    content: In wisdom You have made them all;
  - type: text
    content: 'The earth is full of Your riches '
  - type: text
    content: and
  - type: text
    content: ' Your creatures.'
  '25':
  - type: text
    content: There is the sea, great and broad,
  - type: text
    content: In which are swarms without number,
  - type: text
    content: Creatures both small and great.
  '26':
  - type: text
    content: There the ships [of the sea] sail,
  - type: text
    content: And Leviathan [the sea monster], which You have formed to play there.
  '27':
  - type: text
    content: ¶They all wait for You
  - type: text
    content: To give them their food in its appointed season.
  '28':
  - type: text
    content: You give it to them, they gather it up;
  - type: text
    content: 'You open Your hand, they are filled '
  - type: text
    content: and
  - type: text
    content: ' satisfied with good [things].'
  '29':
  - type: text
    content: You hide Your face, they are dismayed;
  - type: text
    content: You take away their breath, they die
  - type: text
    content: And return to their dust.
  '3':
  - type: text
    content: Who lays the beams of His upper chambers in the waters [above the firmament],
  - type: text
    content: Who makes the clouds His chariot,
  - type: text
    content: Who walks on the wings of the wind,
  '30':
  - type: text
    content: You send out Your Spirit, they are created;
  - type: text
    content: You renew the face of the ground.
  '31':
  - type: text
    content: ¶May the glory of the L
  - type: heading
    content: ord
  - type: text
    content: ' endure forever;'
  - type: text
    content: May the L
  - type: heading
    content: ord
  - type: text
    content: ' rejoice '
  - type: text
    content: and
  - type: text
    content: ' be glad in His works—'
  '32':
  - type: text
    content: He looks at the earth, and it trembles;
  - type: text
    content: He touches the mountains, and they smoke.
  '33':
  - type: text
    content: I will sing to the L
  - type: heading
    content: ord
  - type: text
    content: ' as long as I live;'
  - type: text
    content: I will sing praise to my God while I have my being.
  '34':
  - type: text
    content: 'May my meditation be sweet '
  - type: text
    content: and
  - type: text
    content: ' pleasing to Him;'
  - type: text
    content: 'As for me, I will rejoice '
  - type: text
    content: and
  - type: text
    content: ' be glad in the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '35':
  - type: text
    content: Let sinners be consumed from the earth,
  - type: text
    content: And let the wicked be no more.
  - type: text
    content: 'Bless '
  - type: text
    content: and
  - type: text
    content: ' affectionately praise the L'
  - type: heading
    content: ord
  - type: text
    content: ', O my soul.'
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! (Hallelujah!)'
  '4':
  - type: text
    content: Who makes winds His messengers,
  - type: text
    content: Flames of fire His ministers. [Heb 1:7]
  '5':
  - type: text
    content: ¶He established the earth on its foundations,
  - type: text
    content: So that it will not be moved forever and ever. [Job 38:4, 6]
  '6':
  - type: text
    content: You covered it with the deep as with a garment;
  - type: text
    content: The waters were standing above the mountains. [Gen 1:2; 2 Pet 3:5]
  '7':
  - type: text
    content: At Your rebuke they fled;
  - type: text
    content: At the sound of Your thunder they hurried away.
  '8':
  - type: text
    content: The mountains rose, the valleys sank down
  - type: text
    content: To the place which You established for them.
  '9':
  - type: text
    content: You set a boundary [for the waters] that they may not cross over,
  - type: text
    content: So that they will not return to cover the earth.
