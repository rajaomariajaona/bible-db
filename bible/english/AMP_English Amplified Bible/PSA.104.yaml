    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ’
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: s
      - type: text
        text: ' Care over All His Works.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affectionately praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O my soul!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God, You are very great;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are clothed with splendor and majesty,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶You send springs into the valleys;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their waters flow among the mountains.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They give drink to every beast of the field;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wild donkeys quench their thirst there.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beside them the birds of the heavens have their nests;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They lift up their voices '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sing among the branches. [Matt 13:32]'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He waters the mountains from His upper chambers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth is satisfied with the fruit of His works.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶He causes grass to grow for the cattle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all that the earth produces for cultivation by man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that he may bring food from the earth—
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And wine which makes the heart of man glad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that he may make his face glisten with oil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And bread to sustain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthen man’s heart.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The trees of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' drink their fill,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cedars of Lebanon which He has planted,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where the birds make their nests;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for the stork, the fir trees are her house.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The high mountains are for the wild goats;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The rocks are a refuge for the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Small, shy, furry animals '
        - type: usfm
          marker: it
          children:
          - type: text
            text: (Hyrax syriacus)
        - type: text
          text: ' found in the peninsula of the Sinai, northern Israel, and the region around the Dead Sea; KJV '
        - type: usfm
          marker: it
          children:
          - type: text
            text: coney,
        - type: text
          text: ' orig NASB '
        - type: usfm
          marker: it
          children:
          - type: text
            text: rock badgers
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: shephanim.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made the moon for the seasons;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun knows the [exact] place of its setting.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[You are the One] who covers Yourself with light as with a garment,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who stretches out the heavens like a tent curtain,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You [O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] make darkness and it becomes night,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In which prowls about every wild beast of the forest.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young lions roar after their prey
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And seek their food from God.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the sun arises, they withdraw
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lie down in their dens.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Man goes out to his work
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And remains at his labor until evening.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', how many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' varied are Your works!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In wisdom You have made them all;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The earth is full of Your riches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Your creatures.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is the sea, great and broad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In which are swarms without number,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Creatures both small and great.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There the ships [of the sea] sail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Leviathan [the sea monster], which You have formed to play there.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶They all wait for You
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To give them their food in its appointed season.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You give it to them, they gather it up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You open Your hand, they are filled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfied with good [things].'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You hide Your face, they are dismayed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You take away their breath, they die
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And return to their dust.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who lays the beams of His upper chambers in the waters [above the firmament],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who makes the clouds His chariot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who walks on the wings of the wind,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You send out Your Spirit, they are created;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You renew the face of the ground.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶May the glory of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' endure forever;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rejoice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be glad in His works—'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He looks at the earth, and it trembles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He touches the mountains, and they smoke.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' as long as I live;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing praise to my God while I have my being.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May my meditation be sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing to Him;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As for me, I will rejoice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be glad in the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let sinners be consumed from the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let the wicked be no more.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affectionately praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O my soul.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! (Hallelujah!)'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who makes winds His messengers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Flames of fire His ministers. [Heb 1:7]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶He established the earth on its foundations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that it will not be moved forever and ever. [Job 38:4, 6]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You covered it with the deep as with a garment;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The waters were standing above the mountains. [Gen 1:2; 2 Pet 3:5]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At Your rebuke they fled;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the sound of Your thunder they hurried away.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mountains rose, the valleys sank down
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the place which You established for them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You set a boundary [for the waters] that they may not cross over,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that they will not return to cover the earth.
