document_id: 1SA.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jonathan’s Victory
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day Jonathan the son of Saul said to his young armor bearer, “Come, let us go over to the Philistine garrison on the other side.” But he did not tell his father. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if they say, ‘Come up to us,’ we will go up, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has handed them over to us; and this shall be the sign to us.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When both of them revealed themselves to the garrison of the Philistines, the Philistines said, “Look, the Hebrews are coming out of the holes where they have hidden themselves.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the men of the garrison responded to Jonathan and his armor bearer, “Come up to us and we will tell you something.” Jonathan said to his armor bearer, “Climb up after me, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has given them into the hands of Israel.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jonathan climbed up on his hands and feet, his armor bearer following after him. The enemy fell before Jonathan [in combat], and his armor bearer killed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some of them
    - type: text
      text: ' after him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That first slaughter which Jonathan and his armor bearer made was about twenty men within about half a [plow] furrow in a plot of land [the area of which a yoke of oxen could plow in a day]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there was trembling in the [Philistine] camp, in the field, and among all the people; even the garrison and the raiding party trembled [in fear], and the earth quaked and it became a trembling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terror from God.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul’s watchmen in Gibeah of Benjamin looked, and behold, the multitude melted away and they went here and there. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul said to the people with him, “Take a count and see who has left us.” When they had taken a count, behold, Jonathan and his armor bearer were missing. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul said to Ahijah [the priest], “Bring the ark of God here.” For at that time the ark of God was with the sons of Israel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Saul talked to the priest, the commotion in the Philistine camp continued and increased, so Saul said to the priest, “Withdraw your hand.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul was staying in the outskirts of Gibeah under a pomegranate tree in Migron; and with him were about six hundred men, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul and all the people who were with him rallied and went into the battle; and behold, every [Philistine] man’s sword was against his companion, in wild confusion. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Hebrews who were with the Philistines previously, who went up with them all around in the camp, they also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: turned
    - type: text
      text: ' to be with the Israelites who were with Saul and Jonathan. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the men of Israel who had hidden themselves in the hill country of Ephraim heard that the Philistines had fled, they too pursued them closely in the battle. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' saved Israel that day, and the battle spread beyond Beth-aven.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Saul’s Foolish Order
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the men of Israel were hard-pressed that day, because Saul had put the people under a curse, saying, “Cursed be the man who eats food before evening, and before I have taken vengeance on my enemies.” So none of the people ate any food. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the people of
    - type: text
      text: ' the land came to a forest, and there was honey on the ground. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the people entered the forest, the honey was dripping, but no man put his hand to his mouth [to taste it], because the people feared the oath [of Saul]. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jonathan had not heard when his father put the people under the oath. So he put out the end of the staff that was in his hand and dipped it into a honeycomb, and then he put his hand to his mouth, and his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: eyes brightened
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'energy was restored. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But one of the people told him, “Your father strictly put the people under an oath, saying, ‘Cursed be the man who eats food today.’ ” And the people were exhausted [and hungry]. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jonathan said, “My father has troubled the land [with his foolish curse]. See how my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: eyes have brightened
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'energy is restored because I tasted a little of this honey. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Ahijah the son of Ichabod’s brother Ahitub the son of Phinehas, the son of Eli, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' priest at Shiloh, was wearing the ephod. And the people did not know that Jonathan had gone. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: How much better [it would have been] if only the people had eaten freely today from the spoil of their enemies which they found! For now the slaughter among the Philistines has not been great.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They struck the Philistines that day from Michmash to Aijalon. And the people were very tired. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[When night came and the oath ended] the people rushed greedily upon the spoil. They took sheep, oxen, and calves, and slaughtered them on the ground; and they ate them [raw] with the blood [still in them]. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul was told, “Look, the people are sinning against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' by eating [the meat] with the blood.” And he said, “You have violated [the Law] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acted treacherously; roll a large stone to me today.” [Lev 7:26, 27] '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said, “Spread out among the people and tell them, ‘Each one of you bring me his ox or his sheep, and butcher it [properly] here and eat; and do not sin against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' by eating [the meat with] the blood.’ ” So that night each one brought his ox with him and butchered it there. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Saul built an altar to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; it was the first altar that he built to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul said, “Let us go down after the Philistines by night and plunder them until the morning light, and let us not leave a man of them [alive].” They said, “Do whatever seems good to you.” Then the priest said, “Let us approach God here.” '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul asked [counsel] of God, “Shall I go down after the Philistines? Will You hand them over to Israel?” But He did not answer him that day. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul said, “Come here, all you who are leaders of the people, and let us find out how this sin [causing God’s silence] happened today. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, who saves Israel, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the guilt
    - type: text
      text: ' is in my son Jonathan, he shall most certainly die.” But not one of all the people answered him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Between the passes by which Jonathan sought to cross over to get to the Philistine garrison, there was a rocky crag on the one side and a rocky crag on the other side; one [crag] was named Bozez, and the other, Seneh. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he said to all the Israelites, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To identify the guilty party, Saul decided to have lots cast, which was a common and accepted means of finding God’s will. It may be that the Urim and Thummim that were kept in the priest’s breastpiece were used for this purpose (Ex 28:30). Saul chose to narrow the search by first separating Jonathan and himself from the rest of the people, only to discover (v 41) that the people were in fact innocent.
      marker-yv: yv-n
    - type: text
      text: 'You shall be on one side; I and my son Jonathan will be on the other side.” The people said to Saul, “Do what seems good to you.” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, Saul said to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, “Give a perfect lot [identifying the transgressor].” Then Saul and Jonathan were selected [by lot], but the other men went free. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said, “Cast [lots] between me and my son Jonathan.” And Jonathan was selected.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul said to Jonathan, “Tell me what you have done.” So Jonathan told him, “I tasted a little honey with the end of the staff that was in my hand. Here I am, I must die!” '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul answered, “May God do so [to me], and more also [if I do not keep my word], for you shall most certainly die, Jonathan.” '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the people said to Saul, “Must Jonathan, who has brought about this great victory in Israel, be put to death? Far from it! As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, not one hair of his head shall fall to the ground, for he has worked with God this day.” So the people rescued Jonathan and he was not put to death. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul stopped pursuing the Philistines, and the Philistines went to their own place.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Constant Warfare
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Saul assumed control of the kingdom of Israel, he fought against all his enemies on every side: Moab, the sons (descendants) of Ammon, Edom, the kings of Zobah, and the Philistines. Wherever he turned, he inflicted punishment. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He acted valiantly and defeated the Amalekites, and rescued Israel from the hands of those who had plundered them.
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Saul’s sons were Jonathan, Ishvi, and Malchi-shua. The names of his two daughters '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'were these:'
    - type: text
      text: ' the name of the firstborn was Merab, and the name of the younger, Michal. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The one crag was on the north in front of Michmash, and the other on the south in front of Geba.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The name of Saul’s wife was Ahinoam the daughter of Ahimaaz. The commander of his army was named Abner, the son of Ner, Saul’s uncle. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kish was the father of Saul, and Ner the father of Abner was the son of Abiel.
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the war against the Philistines was severe (brutal, relentless) all the days of Saul; and whenever Saul saw any mighty or courageous man, he recruited him for his staff.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jonathan said to his young armor bearer, “Come, let us cross over to the garrison of these uncircumcised men; it may be that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will work for us. For there is nothing to prevent the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' from saving, whether by many or by few.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his armor bearer said to him, “Do everything that is in your heart (mind); here I am with you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: according to your heart
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'in whatever you think [best].” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan said, “See now, we are going to cross over to the [Philistine] men and reveal ourselves to them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If they say to us, ‘Wait until we come to you,’ then we will stand in our place and not go up to them. '
