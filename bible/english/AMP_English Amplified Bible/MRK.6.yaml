verses:
  '1':
  - type: heading
    content: Teaching at Nazareth
  - type: text
    content: 'Jesus left there and came to His hometown [Nazareth]; and His disciples followed Him. [Matt 13:54-58; Luke 4:16, 23] '
  '10':
  - type: text
    content: 'And He told them, '
  - type: text
    content: “Wherever you go into a house, stay there until you leave that town.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Any place that does not welcome you or listen to you, when you leave there, '
  - type: note
    content: A symbolic act expressing contempt for a place that had rejected the message of salvation.
  - type: text
    content: shake the dust off the soles of your feet as a testimony against them
  - type: text
    content: ' [breaking all ties with them because they rejected My message].” [Matt 10:14; Acts 13:51] '
  '12':
  - type: text
    content: 'So they went out and preached that men should repent [that is, think differently, recognize sin, turn away from it, and live changed lives]. '
  '13':
  - type: text
    content: And they were casting out many demons and were anointing with oil many who were sick, and healing them.
  - type: heading
    content: John’s Fate Recalled
  '14':
  - type: text
    content: 'King Herod [Antipas] heard about this, for Jesus’ name '
  - type: text
    content: and
  - type: text
    content: ' reputation had become well known. People were saying, “John the Baptist has been raised from the dead, and that is why these miraculous powers are at work in Him.” '
  '15':
  - type: text
    content: 'But others were saying, “He is '
  - type: note
    content: Many of the Jews believed that the prophet Elijah would return before the Messiah appeared.
  - type: text
    content: 'Elijah!” And others were saying, “It is a prophet, like one of the prophets [of old].” '
  '16':
  - type: text
    content: But when Herod heard [of it], he kept saying, “John, whom I beheaded, has risen [from the dead]!”
  '17':
  - type: text
    content: 'For Herod himself had sent [guards] and had John arrested and shackled in prison because of '
  - type: note
    content: See note Matt 14:3.
  - type: text
    content: 'Herodias, the wife of his [half-] brother Philip, because he (Herod) had married her. [Matt 14:3; Luke 3:19] '
  '18':
  - type: text
    content: 'For John had been saying to Herod, “It is not lawful [under Mosaic Law] for you to have your brother’s wife.” [Lev 18:16; 20:21] '
  '19':
  - type: text
    content: 'Herodias had a grudge against John and wanted to kill him, but she could not, '
  '2':
  - type: text
    content: 'When the Sabbath came, He began to teach in the synagogue; and many who listened to Him were astonished, saying, “Where did this man get these things [this knowledge and spiritual insight]? What is this wisdom [this confident understanding of the Scripture] that has been given to Him, and such miracles as these performed by His hands? '
  '20':
  - type: text
    content: 'because Herod feared John, knowing that he was a righteous and holy man, and he '
  - type: text
    content: continually
  - type: text
    content: ' kept him safe. When he heard John [speak], he was very perplexed; but he enjoyed listening to him. '
  '21':
  - type: text
    content: 'But an opportune time [finally] came [for Herodias]. Herod on his birthday gave a banquet for his officials (nobles, courtiers) and '
  - type: note
    content: Gr chiliarchois, originally referring to a commander of 1,000, but in Roman times of 600.
  - type: text
    content: 'military commanders and the leading men of Galilee. '
  '22':
  - type: text
    content: 'Now [Salome] the daughter of Herodias came in and danced [for the men]. She pleased '
  - type: text
    content: and
  - type: text
    content: ' beguiled Herod and his dinner guests; and the king said to the '
  - type: note
    content: Salome was probably only fourteen or fifteen years old.
  - type: text
    content: 'girl, “Ask me for whatever you want and I will give it to you.” '
  '23':
  - type: text
    content: 'And he swore to her, “Whatever you ask me, I will give it to you; '
  - type: note
    content: This was intended as an expression of generosity rather than a literal offer. In reality Herod was a tetrarch, a puppet ruler under Rome, and did not have authority over a “kingdom.”
  - type: text
    content: 'up to half of my kingdom.” [Esth 5:3, 6] '
  '24':
  - type: text
    content: 'She went out and said to her mother, “What shall I ask for?” And Herodias replied, “The head of John the Baptist!” '
  '25':
  - type: text
    content: 'And she rushed back to the king and asked, saying, “I want you to give me right now the head of John the Baptist on a platter!” '
  '26':
  - type: text
    content: 'The king was deeply grieved, but because of his oaths and his dinner guests [who might have regarded him as weak], he was unwilling to [break his word and] refuse her. '
  '27':
  - type: text
    content: 'So the king immediately sent for an executioner and commanded him to bring back John’s head. And he went and had John beheaded in the prison, '
  '28':
  - type: text
    content: 'and brought back his head on a platter, and gave it to the girl; and the girl gave it to her mother. '
  '29':
  - type: text
    content: 'When his disciples heard '
  - type: text
    content: about this,
  - type: text
    content: ' they came and took away John’s body and laid it in a tomb.'
  - type: heading
    content: Five Thousand Fed
  '3':
  - type: text
    content: 'Is this not the carpenter, '
  - type: note
    content: This question was intended as an insult because a Jewish man was never referred to as his mother’s son even if she was a widow.
  - type: text
    content: 'the son of Mary, and the brother of '
  - type: note
    content: James later became a leader in the Jerusalem church and authored the epistle of James.
  - type: text
    content: 'James and Joses and '
  - type: note
    content: Heb Judah, authored the epistle of Jude.
  - type: text
    content: 'Judas and Simon? Are His sisters not here with us?” And they were [deeply] offended by Him [and their disapproval blinded them to the fact that He was anointed by God as the Messiah]. '
  '30':
  - type: text
    content: 'The apostles [who had been sent out on a mission] gathered together with Jesus and told Him everything that they had done and taught. '
  '31':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Come away by yourselves to a secluded place and rest a little while”
  - type: text
    content: '—for there were many [people who were continually] coming and going, and they could not even find time to eat. '
  '32':
  - type: text
    content: 'And they went away by themselves in the boat to a secluded place. [Matt 14:13-21; Luke 9:10-17; John 6:1-13] '
  '33':
  - type: text
    content: 'Many [people] saw them leaving, and recognized '
  - type: text
    content: them
  - type: text
    content: ' and ran there together on foot from all the [surrounding] cities, and got there ahead of them. '
  '34':
  - type: text
    content: 'When Jesus went ashore, He saw a large crowd [waiting], and He was moved with compassion for them because they were like sheep without a shepherd [lacking guidance]; and He began to teach them many things. '
  '35':
  - type: text
    content: 'When the day was nearly gone, His disciples came to Him and said, “This is an isolated place, and it is already late; '
  '36':
  - type: text
    content: 'send the crowds away so that they may go into the surrounding countryside and villages and buy themselves something to eat.” '
  '37':
  - type: text
    content: 'But He replied, '
  - type: text
    content: “You give them something to eat!”
  - type: text
    content: ' And they asked Him, “Shall we go and buy 200 '
  - type: note
    content: One denarius was about a day’s wage.
  - type: text
    content: 'denarii worth of bread and give it to them to eat?” [2 Kin 4:42-44] '
  '38':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “How many loaves do you have? Go look!”
  - type: text
    content: ' And when they found out, they said, “Five [loaves], and two fish.” '
  '39':
  - type: text
    content: 'Then Jesus commanded them all to sit down by groups on the green grass. '
  '4':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “A prophet is not without honor (respect) except in his hometown and among his relatives and in his own household.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'They sat down in groups of hundreds and of fifties [so that the crowd resembled an orderly arrangement of colorful garden plots]. '
  '41':
  - type: text
    content: 'Taking the five loaves and two fish, He looked up to heaven and said a blessing [of praise and thanksgiving to the Father]. Then He broke the loaves and [repeatedly] gave them to the disciples to set before the people; and He divided up the two fish among them all. '
  '42':
  - type: text
    content: 'They all ate and were satisfied. '
  '43':
  - type: text
    content: 'And the disciples picked up twelve full baskets of the broken pieces [of the loaves], and of the fish. '
  '44':
  - type: text
    content: Those who ate the loaves were five thousand men [not counting the women and children].
  - type: heading
    content: Jesus Walks on the Water
  '45':
  - type: text
    content: 'Jesus immediately insisted that His disciples get into the boat and go ahead [of Him] to the other side to Bethsaida, while He was dismissing the crowd. [Matt 14:22-32; John 6:15-21] '
  '46':
  - type: text
    content: And after He said goodbye to them, He went to the mountain to pray.
  '47':
  - type: text
    content: 'Now when evening had come, the boat was in the middle of the sea, and Jesus was alone on the land. '
  '48':
  - type: text
    content: 'Seeing the disciples straining at the oars, because the wind was against them, at about the fourth watch of the night (3:00-6:00 a.m.) He came to them, walking on the sea. And [acted as if] He intended to pass by them. [Matt 14:25; John 6:19] '
  '49':
  - type: text
    content: 'But when they saw Him walking on the sea, they thought it was a ghost, and cried out [in horror]; '
  '5':
  - type: text
    content: 'And He could not do a miracle there at all [because of their unbelief] except that He laid His hands on a few sick people and healed them. '
  '50':
  - type: text
    content: 'for they all saw Him and were shaken '
  - type: text
    content: and
  - type: text
    content: ' terrified. But He immediately spoke with them and said, '
  - type: text
    content: “Take courage! It is I (I AM)! Stop being afraid.”
  - type: text
    content: ' [Ex 3:14] '
  '51':
  - type: text
    content: 'Then He got into the boat with them, and the wind ceased [as if exhausted by its own activity]; and they were completely overwhelmed, '
  '52':
  - type: text
    content: because they had not understood [the miracle of] the loaves [how it revealed the power and deity of Jesus]; but [in fact] their heart was hardened [being oblivious and indifferent to His amazing works].
  - type: heading
    content: Healing at Gennesaret
  '53':
  - type: text
    content: 'When they had crossed over [the sea], they reached the land of Gennesaret and anchored at the shore. '
  '54':
  - type: text
    content: 'They got out of the boat and immediately '
  - type: text
    content: people
  - type: text
    content: ' recognized Him, '
  '55':
  - type: text
    content: 'and ran throughout that surrounding countryside and began to carry around on their mats those who were sick, to any place where they heard He was. '
  '56':
  - type: text
    content: And wherever He came into villages, or cities, or the countryside, they were laying the sick in the market places and pleading with Him [to allow them] just to touch the fringe (tassel with a blue cord) of His robe; and all who touched it were healed.
  '6':
  - type: text
    content: He wondered at their unbelief.
  - type: text
    content: A
  - type: text
    content: nd He was going around in the villages teaching.
  - type: heading
    content: The Twelve Sent Out
  '7':
  - type: text
    content: 'And He called the twelve [disciples] and began to send them out [as His special messengers] two by two, and gave them authority '
  - type: text
    content: and
  - type: text
    content: ' power over the unclean spirits. '
  '8':
  - type: text
    content: 'He told them to take nothing for the journey except a mere walking stick—no bread, no [traveler’s] bag, no money in their belts— '
  '9':
  - type: text
    content: 'but to wear sandals; and [He told them] not to wear '
  - type: note
    content: It was common for travelers to wear two tunics which could be switched.
  - type: text
    content: 'two tunics. '
