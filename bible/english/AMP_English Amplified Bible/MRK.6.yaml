document_id: MRK.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Teaching at Nazareth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus left there and came to His hometown [Nazareth]; and His disciples followed Him. [Matt 13:54-58; Luke 4:16, 23] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When the Sabbath came, He began to teach in the synagogue; and many who listened to Him were astonished, saying, “Where did this man get these things [this knowledge and spiritual insight]? What is this wisdom [this confident understanding of the Scripture] that has been given to Him, and such miracles as these performed by His hands? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Is this not the carpenter, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This question was intended as an insult because a Jewish man was never referred to as his mother’s son even if she was a widow.
    marker-yv: yv-n
  - type: text
    text: 'the son of Mary, and the brother of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: James later became a leader in the Jerusalem church and authored the epistle of James.
    marker-yv: yv-n
  - type: text
    text: 'James and Joses and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Judah,
      - type: text
        text: ' authored the epistle of Jude.'
    marker-yv: yv-n
  - type: text
    text: 'Judas and Simon? Are His sisters not here with us?” And they were [deeply] offended by Him [and their disapproval blinded them to the fact that He was anointed by God as the Messiah]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A prophet is not without honor (respect) except in his hometown and among his relatives and in his own household.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And He could not do a miracle there at all [because of their unbelief] except that He laid His hands on a few sick people and healed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He wondered at their unbelief.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: A
  - type: text
    text: nd He was going around in the villages teaching.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Twelve Sent Out
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And He called the twelve [disciples] and began to send them out [as His special messengers] two by two, and gave them authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power over the unclean spirits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He told them to take nothing for the journey except a mere walking stick—no bread, no [traveler’s] bag, no money in their belts— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'but to wear sandals; and [He told them] not to wear '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was common for travelers to wear two tunics which could be switched.
    marker-yv: yv-n
  - type: text
    text: 'two tunics. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And He told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Wherever you go into a house, stay there until you leave that town.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Any place that does not welcome you or listen to you, when you leave there, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A symbolic act expressing contempt for a place that had rejected the message of salvation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: shake the dust off the soles of your feet as a testimony against them
  - type: text
    text: ' [breaking all ties with them because they rejected My message].” [Matt 10:14; Acts 13:51] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So they went out and preached that men should repent [that is, think differently, recognize sin, turn away from it, and live changed lives]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And they were casting out many demons and were anointing with oil many who were sick, and healing them.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: John’s Fate Recalled
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'King Herod [Antipas] heard about this, for Jesus’ name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reputation had become well known. People were saying, “John the Baptist has been raised from the dead, and that is why these miraculous powers are at work in Him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But others were saying, “He is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many of the Jews believed that the prophet Elijah would return before the Messiah appeared.
    marker-yv: yv-n
  - type: text
    text: 'Elijah!” And others were saying, “It is a prophet, like one of the prophets [of old].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But when Herod heard [of it], he kept saying, “John, whom I beheaded, has risen [from the dead]!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For Herod himself had sent [guards] and had John arrested and shackled in prison because of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 14:3.
    marker-yv: yv-n
  - type: text
    text: 'Herodias, the wife of his [half-] brother Philip, because he (Herod) had married her. [Matt 14:3; Luke 3:19] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For John had been saying to Herod, “It is not lawful [under Mosaic Law] for you to have your brother’s wife.” [Lev 18:16; 20:21] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Herodias had a grudge against John and wanted to kill him, but she could not, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'because Herod feared John, knowing that he was a righteous and holy man, and he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' kept him safe. When he heard John [speak], he was very perplexed; but he enjoyed listening to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But an opportune time [finally] came [for Herodias]. Herod on his birthday gave a banquet for his officials (nobles, courtiers) and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gr '
      - type: usfm
        marker: it
        children:
        - type: text
          text: chiliarchois,
      - type: text
        text: ' originally referring to a commander of 1,000, but in Roman times of 600.'
    marker-yv: yv-n
  - type: text
    text: 'military commanders and the leading men of Galilee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now [Salome] the daughter of Herodias came in and danced [for the men]. She pleased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beguiled Herod and his dinner guests; and the king said to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Salome was probably only fourteen or fifteen years old.
    marker-yv: yv-n
  - type: text
    text: 'girl, “Ask me for whatever you want and I will give it to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he swore to her, “Whatever you ask me, I will give it to you; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was intended as an expression of generosity rather than a literal offer. In reality Herod was a tetrarch, a puppet ruler under Rome, and did not have authority over a “kingdom.”
    marker-yv: yv-n
  - type: text
    text: 'up to half of my kingdom.” [Esth 5:3, 6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'She went out and said to her mother, “What shall I ask for?” And Herodias replied, “The head of John the Baptist!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And she rushed back to the king and asked, saying, “I want you to give me right now the head of John the Baptist on a platter!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The king was deeply grieved, but because of his oaths and his dinner guests [who might have regarded him as weak], he was unwilling to [break his word and] refuse her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So the king immediately sent for an executioner and commanded him to bring back John’s head. And he went and had John beheaded in the prison, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and brought back his head on a platter, and gave it to the girl; and the girl gave it to her mother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'When his disciples heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: about this,
  - type: text
    text: ' they came and took away John’s body and laid it in a tomb.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Five Thousand Fed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The apostles [who had been sent out on a mission] gathered together with Jesus and told Him everything that they had done and taught. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come away by yourselves to a secluded place and rest a little while”
  - type: text
    text: '—for there were many [people who were continually] coming and going, and they could not even find time to eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And they went away by themselves in the boat to a secluded place. [Matt 14:13-21; Luke 9:10-17; John 6:1-13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Many [people] saw them leaving, and recognized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' and ran there together on foot from all the [surrounding] cities, and got there ahead of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When Jesus went ashore, He saw a large crowd [waiting], and He was moved with compassion for them because they were like sheep without a shepherd [lacking guidance]; and He began to teach them many things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'When the day was nearly gone, His disciples came to Him and said, “This is an isolated place, and it is already late; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'send the crowds away so that they may go into the surrounding countryside and villages and buy themselves something to eat.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You give them something to eat!”
  - type: text
    text: ' And they asked Him, “Shall we go and buy 200 '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One denarius was about a day’s wage.
    marker-yv: yv-n
  - type: text
    text: 'denarii worth of bread and give it to them to eat?” [2 Kin 4:42-44] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How many loaves do you have? Go look!”
  - type: text
    text: ' And when they found out, they said, “Five [loaves], and two fish.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Then Jesus commanded them all to sit down by groups on the green grass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'They sat down in groups of hundreds and of fifties [so that the crowd resembled an orderly arrangement of colorful garden plots]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Taking the five loaves and two fish, He looked up to heaven and said a blessing [of praise and thanksgiving to the Father]. Then He broke the loaves and [repeatedly] gave them to the disciples to set before the people; and He divided up the two fish among them all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'They all ate and were satisfied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And the disciples picked up twelve full baskets of the broken pieces [of the loaves], and of the fish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Those who ate the loaves were five thousand men [not counting the women and children].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Walks on the Water
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jesus immediately insisted that His disciples get into the boat and go ahead [of Him] to the other side to Bethsaida, while He was dismissing the crowd. [Matt 14:22-32; John 6:15-21] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: And after He said goodbye to them, He went to the mountain to pray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Now when evening had come, the boat was in the middle of the sea, and Jesus was alone on the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Seeing the disciples straining at the oars, because the wind was against them, at about the fourth watch of the night (3:00-6:00 a.m.) He came to them, walking on the sea. And [acted as if] He intended to pass by them. [Matt 14:25; John 6:19] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'But when they saw Him walking on the sea, they thought it was a ghost, and cried out [in horror]; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'for they all saw Him and were shaken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terrified. But He immediately spoke with them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take courage! It is I (I AM)! Stop being afraid.”
  - type: text
    text: ' [Ex 3:14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Then He got into the boat with them, and the wind ceased [as if exhausted by its own activity]; and they were completely overwhelmed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: because they had not understood [the miracle of] the loaves [how it revealed the power and deity of Jesus]; but [in fact] their heart was hardened [being oblivious and indifferent to His amazing works].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Healing at Gennesaret
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'When they had crossed over [the sea], they reached the land of Gennesaret and anchored at the shore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'They got out of the boat and immediately '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' recognized Him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'and ran throughout that surrounding countryside and began to carry around on their mats those who were sick, to any place where they heard He was. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: And wherever He came into villages, or cities, or the countryside, they were laying the sick in the market places and pleading with Him [to allow them] just to touch the fringe (tassel with a blue cord) of His robe; and all who touched it were healed.
