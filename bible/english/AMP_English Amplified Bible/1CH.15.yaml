document_id: 1CH.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Plans to Move the Ark to Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: David
    - type: text
      text: ' built houses for himself in the City of David; and he prepared a place for the ark of God and pitched a tent for it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: of the sons of Uzziel, Amminadab the chief, with 112 of his relatives.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then David called for Zadok and Abiathar the priests, and for the Levites—Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and he said to them, “You are the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' of the Levites; consecrate yourselves, both you and your relatives, so that you may bring up the ark of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel, to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the place
    - type: text
      text: ' that I have prepared for it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Because you did not [carry it as God directed] the first time, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God made an [angry] outburst against us, for we did not seek Him in accordance with the ordinance.” [Num 1:50; 1 Chr 13:7-10] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So the priests and the Levites consecrated (dedicated) themselves to bring up the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The Levites carried the ark of God on their shoulders with the poles, as Moses commanded in accordance with the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then David told the chiefs of the Levites to appoint their relatives as the singers, with instruments of music—harps, lyres, and cymbals—to play loudly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to raise sounds of joy [with their voices]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So the Levites appointed Heman the son of Joel, and from his relatives, Asaph the son of Berechiah; and from the sons of Merari their relatives, Ethan the son of Kushaiah, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and with them their relatives of the second rank: Zechariah, Ben, Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Eliphelehu, and Mikneiah, Obed-edom, and Jeiel, the gatekeepers. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So the singers, Heman, Asaph, and Ethan '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were appointed
    - type: text
      text: ' to sound aloud the bronze cymbals; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Then David said, “No one is to carry the ark of God except the Levites; for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' chose them to carry the ark of God and to minister to Him forever.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and Zechariah, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah [were to play] with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: harps of maiden-like tone,
        - type: text
          text: ' i.e. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: soprano.
        - type: text
          text: ' This particular instrument may have resembled a guitar.'
      marker-yv: yv-n
    - type: text
      text: 'harps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tuned
    - type: text
      text: ' to Alamoth [that is, a high pitch]; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and Mattithiah, Eliphelehu, Mikneiah, Obed-edom, Jeiel, and Azaziah were to lead with lyres set to Sheminith [that is, the eighth string, a low pitch]. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Chenaniah, leader of the Levites, was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in charge of
    - type: text
      text: ' the singing; he gave instruction in singing because he was skilled. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Berechiah and Elkanah were gatekeepers for the ark. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer the priests blew the trumpets before the ark of God. Obed-edom and Jehiah (Jeiel) were also gatekeepers for the ark.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: So David, with the elders of Israel and the captains over thousands, went to bring up the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' from the house of Obed-edom with joy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Because God was helping the Levites who carried the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [to do it carefully and safely], they sacrificed seven bulls and seven rams. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'David was clothed with a robe of fine linen, as were all the Levites who carried the ark, and the singers and Chenaniah, director of the music of the singers. David also wore an ephod (a priestly upper garment) of linen. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Thus all Israel brought up the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with shouting, and with the sound of the horn, with trumpets, with loud-sounding cymbals, with harps and lyres.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: It happened that as the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to the City of David, Michal [David’s wife] the daughter of Saul, looking down through a window, saw King David leaping and dancing [in celebration]; and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Michal strongly disapproved of David’s undignified entry into the city wearing the ephod instead of his royal robes (see note 2 Sam 6:20).
      marker-yv: yv-n
    - type: text
      text: she despised him in her heart.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And David assembled all Israel at Jerusalem to bring up the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to the place which he had prepared for it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'David gathered together the sons of Aaron and the Levites: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'of the sons of Kohath, Uriel the chief, with 120 of his relatives; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'of the sons of Merari, Asaiah the chief, with 220 of his relatives; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'of the sons of Gershom, Joel the chief, with 130 of his relatives; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'of the sons of Elizaphan, Shemaiah the chief, with 200 of his relatives; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'of the sons of Hebron, Eliel the chief, with 80 of his relatives; '
