verses:
  '1':
  - type: heading
    content: Plans to Move the Ark to Jerusalem
  - type: text
    content: ' '
  - type: text
    content: David
  - type: text
    content: ' built houses for himself in the City of David; and he prepared a place for the ark of God and pitched a tent for it. '
  '10':
  - type: text
    content: of the sons of Uzziel, Amminadab the chief, with 112 of his relatives.
  '11':
  - type: text
    content: 'Then David called for Zadok and Abiathar the priests, and for the Levites—Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab, '
  '12':
  - type: text
    content: 'and he said to them, “You are the heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of the Levites; consecrate yourselves, both you and your relatives, so that you may bring up the ark of the L'
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel, to '
  - type: text
    content: the place
  - type: text
    content: ' that I have prepared for it. '
  '13':
  - type: text
    content: Because you did not [carry it as God directed] the first time, the L
  - type: heading
    content: ord
  - type: text
    content: ' our God made an [angry] outburst against us, for we did not seek Him in accordance with the ordinance.” [Num 1:50; 1 Chr 13:7-10] '
  '14':
  - type: text
    content: So the priests and the Levites consecrated (dedicated) themselves to bring up the ark of the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel. '
  '15':
  - type: text
    content: The Levites carried the ark of God on their shoulders with the poles, as Moses commanded in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '16':
  - type: text
    content: 'Then David told the chiefs of the Levites to appoint their relatives as the singers, with instruments of music—harps, lyres, and cymbals—to play loudly '
  - type: text
    content: and
  - type: text
    content: ' to raise sounds of joy [with their voices]. '
  '17':
  - type: text
    content: 'So the Levites appointed Heman the son of Joel, and from his relatives, Asaph the son of Berechiah; and from the sons of Merari their relatives, Ethan the son of Kushaiah, '
  '18':
  - type: text
    content: 'and with them their relatives of the second rank: Zechariah, Ben, Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Eliphelehu, and Mikneiah, Obed-edom, and Jeiel, the gatekeepers. '
  '19':
  - type: text
    content: 'So the singers, Heman, Asaph, and Ethan '
  - type: text
    content: were appointed
  - type: text
    content: ' to sound aloud the bronze cymbals; '
  '2':
  - type: text
    content: Then David said, “No one is to carry the ark of God except the Levites; for the L
  - type: heading
    content: ord
  - type: text
    content: ' chose them to carry the ark of God and to minister to Him forever.” '
  '20':
  - type: text
    content: 'and Zechariah, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah [were to play] with '
  - type: note
    content: Or harps of maiden-like tone, i.e. soprano. This particular instrument may have resembled a guitar.
  - type: text
    content: 'harps '
  - type: text
    content: tuned
  - type: text
    content: ' to Alamoth [that is, a high pitch]; '
  '21':
  - type: text
    content: 'and Mattithiah, Eliphelehu, Mikneiah, Obed-edom, Jeiel, and Azaziah were to lead with lyres set to Sheminith [that is, the eighth string, a low pitch]. '
  '22':
  - type: text
    content: 'Chenaniah, leader of the Levites, was '
  - type: text
    content: in charge of
  - type: text
    content: ' the singing; he gave instruction in singing because he was skilled. '
  '23':
  - type: text
    content: 'Berechiah and Elkanah were gatekeepers for the ark. '
  '24':
  - type: text
    content: Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer the priests blew the trumpets before the ark of God. Obed-edom and Jehiah (Jeiel) were also gatekeepers for the ark.
  '25':
  - type: text
    content: So David, with the elders of Israel and the captains over thousands, went to bring up the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' from the house of Obed-edom with joy. '
  '26':
  - type: text
    content: Because God was helping the Levites who carried the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' [to do it carefully and safely], they sacrificed seven bulls and seven rams. '
  '27':
  - type: text
    content: 'David was clothed with a robe of fine linen, as were all the Levites who carried the ark, and the singers and Chenaniah, director of the music of the singers. David also wore an ephod (a priestly upper garment) of linen. '
  '28':
  - type: text
    content: Thus all Israel brought up the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' with shouting, and with the sound of the horn, with trumpets, with loud-sounding cymbals, with harps and lyres.'
  '29':
  - type: text
    content: It happened that as the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to the City of David, Michal [David’s wife] the daughter of Saul, looking down through a window, saw King David leaping and dancing [in celebration]; and '
  - type: note
    content: Michal strongly disapproved of David’s undignified entry into the city wearing the ephod instead of his royal robes (see note 2 Sam 6:20).
  - type: text
    content: she despised him in her heart.
  '3':
  - type: text
    content: And David assembled all Israel at Jerusalem to bring up the ark of the L
  - type: heading
    content: ord
  - type: text
    content: ' to the place which he had prepared for it. '
  '4':
  - type: text
    content: 'David gathered together the sons of Aaron and the Levites: '
  '5':
  - type: text
    content: 'of the sons of Kohath, Uriel the chief, with 120 of his relatives; '
  '6':
  - type: text
    content: 'of the sons of Merari, Asaiah the chief, with 220 of his relatives; '
  '7':
  - type: text
    content: 'of the sons of Gershom, Joel the chief, with 130 of his relatives; '
  '8':
  - type: text
    content: 'of the sons of Elizaphan, Shemaiah the chief, with 200 of his relatives; '
  '9':
  - type: text
    content: 'of the sons of Hebron, Eliel the chief, with 80 of his relatives; '
