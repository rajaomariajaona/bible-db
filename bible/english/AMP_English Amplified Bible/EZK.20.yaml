document_id: EZK.20,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Dealings with Israel Rehearsed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the seventh year, in the fifth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: month,
    - type: text
      text: ' on the tenth of the month [after the beginning of the exile in Babylon], certain of the elders of Israel came to inquire of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and sat down before me. [Jer 25:11; 29:10] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So I made them leave the land of Egypt and brought them into the wilderness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I gave them My statutes and explained My ordinances to them, which, if a man keeps, he will live. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Also I gave them My Sabbaths to be a sign between Me and them, that they might know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who sanctifies them (separates and sets them apart). '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But the house of Israel rebelled against Me in the wilderness. They did not walk in My statutes and they despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected My ordinances, which, if a man keeps, he will live; and they greatly profaned My Sabbaths. Then I decided to pour out My wrath on them in the wilderness, to annihilate them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But I acted for My Name’s sake, that it would not be profaned in the sight of the [pagan] nations in whose sight I had brought them out [of slavery]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I also swore to them in the wilderness that I would not bring them into the land which I had given them, [a land of plenty] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note v 6.
      marker-yv: yv-n
    - type: text
      text: 'flowing with milk and honey, which is the ornament '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory of all lands, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'because they rejected My ordinances, and as for My statutes, they did not walk in them; they even profaned My Sabbaths, for their heart continually went after their [worthless] idols. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Yet My eye [looked on them with compassion and] spared them instead of destroying them, and I did not annihilate them in the wilderness.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“But I said to their children in the wilderness, ‘Do not walk in the statutes of your fathers nor observe their ordinances nor defile yourselves with their idols. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God; walk in My statutes and keep My ordinances and observe them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Then came the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to me, saying, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Sanctify My Sabbaths '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep them holy; and they shall be a sign between Me and you, that you may know [without any doubt] that I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Yet the children rebelled against Me; they did not walk in My statutes, nor were they careful to observe My ordinances, which, if a man keeps, he will live; they profaned My Sabbaths. Then I decided to pour out My wrath on them and finish My anger against them in the wilderness. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Yet I withdrew My hand and acted for My Name’s sake, that it would not be profaned in the sight of the [pagan] nations in whose sight I had brought them out [of slavery]. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Moreover, I swore to them in the wilderness that I would scatter them among the [Gentile] nations and disperse them among the countries, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'because they had not observed My ordinances, but had [dishonored and] rejected My statutes and had profaned My Sabbaths, and set their eyes on the [man-made] idols of their fathers. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '[Therefore] I also gave them statutes that were not good and ordinances by which they could not live; [Ps 81:12; Is 66:4; Rom 1:21-25, 28] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and I pronounced them unclean because of their offerings [to their idols], in that they made all their firstborn pass through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the fire
    - type: text
      text: ' [as pagan sacrifices], so that I might make them desolate, in order that they might know [without any doubt] that I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” ’ [Lev 20:2-5]
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “Therefore, son of man, speak to the house of Israel and say to them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Again in this your fathers have blasphemed Me, in that they acted faithlessly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treacherously against Me. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For when I had brought them into the land which I swore to give to them, they saw every high hill and every dark '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' leafy tree [as a place for idol worship], and there they offered their sacrifices and there they presented their offering that provoked My anger; there also they made their sweet-smelling aroma and there poured out their drink offerings. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then I said to them, ‘What is the high place to which you go?’ So the name of it is called Bamah (High Place) to this day.” ’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Son of man, speak to the elders of Israel and say to them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Have you come to inquire of Me? As I live,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “I will not be inquired of by you.” ’ '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Therefore, say to the house of Israel, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Will you [exiles] defile yourselves in the same manner as your fathers? And will you prostitute yourselves before their loathsome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heinous things? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: When you offer your gifts, when you make your sons pass through the fire, you are defiling yourselves with all your idols to this day. And shall I be asked by you [for an oracle], O house of Israel? As I live,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “I will not be inquired of by you. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: What comes into your mind will never happen, when you say, ‘We will be like the [pagan] nations, like the tribes of the [Gentile] countries, serving [idols made of] wood and stone.’
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Will Restore Israel to Her Land
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “As I live,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “most certainly with a mighty hand and an outstretched arm and with wrath poured out, I shall be King over you. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'I will bring you out from the peoples and will gather you from the countries in which you are scattered, with a mighty hand and with an outstretched arm, and with wrath poured out; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'and I will bring you into the wilderness of the peoples, and there I will enter into judgment with you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contend with you face to face. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'As I entered into judgment with your fathers in the wilderness of the land of Egypt, so I will enter into judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contend with you,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '. [Num 11; Ps 106:15; 1 Cor 10:5-10] '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: '“I will make you pass under the rod [as the shepherd does with his sheep when he counts them, and I will count you as Mine and constrain you] and bring you into the bond of the covenant [to which you are permanently bound]. [Lev 27:32] '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: And I will separate from you the rebels and those who transgress against Me; I will bring them out of the land where they temporarily live, but they will not enter the land of Israel. Thus you will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [Heb 4:2, 3]
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: “As for you, O house of Israel,” thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Go, let everyone serve his idols; but later you shall most certainly listen to Me, and you shall no longer profane My holy name with your gifts and with your idols. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Will you judge them, son of man, will you judge them? Then make them know [accurately] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand fully the repulsive acts of their fathers; [Matt 23:29-33; Acts 7:51, 52] '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: For on My holy mountain, on the high mountain of Israel (Zion),” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “there the whole house of Israel, all of them in the land, shall serve Me. There I will [graciously] accept them, and there I will seek (require) your offerings and the choicest of your gifts, with all your holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sacred things. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'I will accept you [graciously] as a pleasant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma when I bring you out from the peoples and gather you from the lands in which you have been scattered; and I will prove Myself holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' manifest My holiness among you in the sight of the nations. [Eph 5:2; Phil 4:18] '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: And you will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', when I bring you into the land of Israel, into the land which I swore to give to your fathers. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'There you will remember your ways and all your deeds with which you have defiled yourselves; and you will loathe yourselves in your own sight because of all your evil deeds which you have done. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: And you will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' when I have dealt with you for My Name’s sake, not in accordance with your evil ways nor with your corrupt conduct, O house of Israel,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .’ ”
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Now the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: '“Son of man, set your face toward Teman, and speak out against the south and prophesy against the forest land of the Negev (the South), '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: and say to the forest of the Negev, ‘Hear the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': thus says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Behold, I am about to kindle a fire in you, and it will devour every one of your green trees, as well as every one of your dry trees. The blazing flame will not be quenched and the whole surface from the south to the north will be burned by it. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: All flesh will see that I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' have kindled it; it will not be quenched.” ’ ” '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Then I said, “Ah, Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '! They are saying of me, ‘Is he not [just] speaking in parables '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' making allegories?’ ”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: and say to them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “On the day when I chose Israel and lifted up My hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swore to the descendants of the house of Jacob and made Myself known to them in the land of Egypt, when I swore to them, saying, I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'on that day I swore to them to bring them out of the land of Egypt into a land that I had selected for them, [plentiful and] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
      marker-yv: yv-n
    - type: text
      text: 'flowing with milk and honey, [a land] which is an ornament '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a glory to all lands. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then I said to them, ‘Let every man throw away the detestable things on which he feasts his eyes, and do not defile yourselves with the idols of Egypt; I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
