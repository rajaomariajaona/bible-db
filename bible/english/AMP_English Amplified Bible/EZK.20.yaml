document_id: EZK.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Dealings with Israel Rehearsed
  - type: text
    content: 'In the seventh year, in the fifth '
  - type: text
    content: month,
  - type: text
    content: ' on the tenth of the month [after the beginning of the exile in Babylon], certain of the elders of Israel came to inquire of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and sat down before me. [Jer 25:11; 29:10] '
  '10':
  - type: text
    content: 'So I made them leave the land of Egypt and brought them into the wilderness. '
  '11':
  - type: text
    content: 'I gave them My statutes and explained My ordinances to them, which, if a man keeps, he will live. '
  '12':
  - type: text
    content: Also I gave them My Sabbaths to be a sign between Me and them, that they might know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ' who sanctifies them (separates and sets them apart). '
  '13':
  - type: text
    content: 'But the house of Israel rebelled against Me in the wilderness. They did not walk in My statutes and they despised '
  - type: text
    content: and
  - type: text
    content: ' rejected My ordinances, which, if a man keeps, he will live; and they greatly profaned My Sabbaths. Then I decided to pour out My wrath on them in the wilderness, to annihilate them. '
  '14':
  - type: text
    content: 'But I acted for My Name’s sake, that it would not be profaned in the sight of the [pagan] nations in whose sight I had brought them out [of slavery]. '
  '15':
  - type: text
    content: 'I also swore to them in the wilderness that I would not bring them into the land which I had given them, [a land of plenty] '
  - type: note
    content: See note v 6.
  - type: text
    content: 'flowing with milk and honey, which is the ornament '
  - type: text
    content: and
  - type: text
    content: ' glory of all lands, '
  '16':
  - type: text
    content: 'because they rejected My ordinances, and as for My statutes, they did not walk in them; they even profaned My Sabbaths, for their heart continually went after their [worthless] idols. '
  '17':
  - type: text
    content: Yet My eye [looked on them with compassion and] spared them instead of destroying them, and I did not annihilate them in the wilderness.
  '18':
  - type: text
    content: '“But I said to their children in the wilderness, ‘Do not walk in the statutes of your fathers nor observe their ordinances nor defile yourselves with their idols. '
  '19':
  - type: text
    content: I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God; walk in My statutes and keep My ordinances and observe them. '
  '2':
  - type: text
    content: Then came the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' to me, saying, '
  '20':
  - type: text
    content: 'Sanctify My Sabbaths '
  - type: text
    content: and
  - type: text
    content: ' keep them holy; and they shall be a sign between Me and you, that you may know [without any doubt] that I am the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God.’ '
  '21':
  - type: text
    content: 'Yet the children rebelled against Me; they did not walk in My statutes, nor were they careful to observe My ordinances, which, if a man keeps, he will live; they profaned My Sabbaths. Then I decided to pour out My wrath on them and finish My anger against them in the wilderness. '
  '22':
  - type: text
    content: 'Yet I withdrew My hand and acted for My Name’s sake, that it would not be profaned in the sight of the [pagan] nations in whose sight I had brought them out [of slavery]. '
  '23':
  - type: text
    content: 'Moreover, I swore to them in the wilderness that I would scatter them among the [Gentile] nations and disperse them among the countries, '
  '24':
  - type: text
    content: 'because they had not observed My ordinances, but had [dishonored and] rejected My statutes and had profaned My Sabbaths, and set their eyes on the [man-made] idols of their fathers. '
  '25':
  - type: text
    content: '[Therefore] I also gave them statutes that were not good and ordinances by which they could not live; [Ps 81:12; Is 66:4; Rom 1:21-25, 28] '
  '26':
  - type: text
    content: 'and I pronounced them unclean because of their offerings [to their idols], in that they made all their firstborn pass through '
  - type: text
    content: the fire
  - type: text
    content: ' [as pagan sacrifices], so that I might make them desolate, in order that they might know [without any doubt] that I am the L'
  - type: heading
    content: ord
  - type: text
    content: .” ’ [Lev 20:2-5]
  '27':
  - type: text
    content: “Therefore, son of man, speak to the house of Israel and say to them, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Again in this your fathers have blasphemed Me, in that they acted faithlessly '
  - type: text
    content: and
  - type: text
    content: ' treacherously against Me. '
  '28':
  - type: text
    content: 'For when I had brought them into the land which I swore to give to them, they saw every high hill and every dark '
  - type: text
    content: and
  - type: text
    content: ' leafy tree [as a place for idol worship], and there they offered their sacrifices and there they presented their offering that provoked My anger; there also they made their sweet-smelling aroma and there poured out their drink offerings. '
  '29':
  - type: text
    content: 'Then I said to them, ‘What is the high place to which you go?’ So the name of it is called Bamah (High Place) to this day.” ’ '
  '3':
  - type: text
    content: “Son of man, speak to the elders of Israel and say to them, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Have you come to inquire of Me? As I live,” says the Lord G'
  - type: heading
    content: od
  - type: text
    content: ', “I will not be inquired of by you.” ’ '
  '30':
  - type: text
    content: Therefore, say to the house of Israel, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Will you [exiles] defile yourselves in the same manner as your fathers? And will you prostitute yourselves before their loathsome '
  - type: text
    content: and
  - type: text
    content: ' heinous things? '
  '31':
  - type: text
    content: When you offer your gifts, when you make your sons pass through the fire, you are defiling yourselves with all your idols to this day. And shall I be asked by you [for an oracle], O house of Israel? As I live,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “I will not be inquired of by you. '
  '32':
  - type: text
    content: What comes into your mind will never happen, when you say, ‘We will be like the [pagan] nations, like the tribes of the [Gentile] countries, serving [idols made of] wood and stone.’
  - type: heading
    content: God Will Restore Israel to Her Land
  '33':
  - type: text
    content: “As I live,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “most certainly with a mighty hand and an outstretched arm and with wrath poured out, I shall be King over you. '
  '34':
  - type: text
    content: 'I will bring you out from the peoples and will gather you from the countries in which you are scattered, with a mighty hand and with an outstretched arm, and with wrath poured out; '
  '35':
  - type: text
    content: 'and I will bring you into the wilderness of the peoples, and there I will enter into judgment with you '
  - type: text
    content: and
  - type: text
    content: ' contend with you face to face. '
  '36':
  - type: text
    content: 'As I entered into judgment with your fathers in the wilderness of the land of Egypt, so I will enter into judgment '
  - type: text
    content: and
  - type: text
    content: ' contend with you,” says the Lord G'
  - type: heading
    content: od
  - type: text
    content: '. [Num 11; Ps 106:15; 1 Cor 10:5-10] '
  '37':
  - type: text
    content: '“I will make you pass under the rod [as the shepherd does with his sheep when he counts them, and I will count you as Mine and constrain you] and bring you into the bond of the covenant [to which you are permanently bound]. [Lev 27:32] '
  '38':
  - type: text
    content: And I will separate from you the rebels and those who transgress against Me; I will bring them out of the land where they temporarily live, but they will not enter the land of Israel. Thus you will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: . [Heb 4:2, 3]
  '39':
  - type: text
    content: “As for you, O house of Israel,” thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Go, let everyone serve his idols; but later you shall most certainly listen to Me, and you shall no longer profane My holy name with your gifts and with your idols. '
  '4':
  - type: text
    content: 'Will you judge them, son of man, will you judge them? Then make them know [accurately] '
  - type: text
    content: and
  - type: text
    content: ' understand fully the repulsive acts of their fathers; [Matt 23:29-33; Acts 7:51, 52] '
  '40':
  - type: text
    content: For on My holy mountain, on the high mountain of Israel (Zion),” says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “there the whole house of Israel, all of them in the land, shall serve Me. There I will [graciously] accept them, and there I will seek (require) your offerings and the choicest of your gifts, with all your holy '
  - type: text
    content: and
  - type: text
    content: ' sacred things. '
  '41':
  - type: text
    content: 'I will accept you [graciously] as a pleasant '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma when I bring you out from the peoples and gather you from the lands in which you have been scattered; and I will prove Myself holy '
  - type: text
    content: and
  - type: text
    content: ' manifest My holiness among you in the sight of the nations. [Eph 5:2; Phil 4:18] '
  '42':
  - type: text
    content: And you will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ', when I bring you into the land of Israel, into the land which I swore to give to your fathers. '
  '43':
  - type: text
    content: 'There you will remember your ways and all your deeds with which you have defiled yourselves; and you will loathe yourselves in your own sight because of all your evil deeds which you have done. '
  '44':
  - type: text
    content: And you will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ' when I have dealt with you for My Name’s sake, not in accordance with your evil ways nor with your corrupt conduct, O house of Israel,” says the Lord G'
  - type: heading
    content: od
  - type: text
    content: .’ ”
  '45':
  - type: text
    content: Now the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '46':
  - type: text
    content: '“Son of man, set your face toward Teman, and speak out against the south and prophesy against the forest land of the Negev (the South), '
  '47':
  - type: text
    content: and say to the forest of the Negev, ‘Hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: ': thus says the Lord G'
  - type: heading
    content: od
  - type: text
    content: ', “Behold, I am about to kindle a fire in you, and it will devour every one of your green trees, as well as every one of your dry trees. The blazing flame will not be quenched and the whole surface from the south to the north will be burned by it. '
  '48':
  - type: text
    content: All flesh will see that I the L
  - type: heading
    content: ord
  - type: text
    content: ' have kindled it; it will not be quenched.” ’ ” '
  '49':
  - type: text
    content: Then I said, “Ah, Lord G
  - type: heading
    content: od
  - type: text
    content: '! They are saying of me, ‘Is he not [just] speaking in parables '
  - type: text
    content: and
  - type: text
    content: ' making allegories?’ ”'
  '5':
  - type: text
    content: and say to them, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “On the day when I chose Israel and lifted up My hand '
  - type: text
    content: and
  - type: text
    content: ' swore to the descendants of the house of Jacob and made Myself known to them in the land of Egypt, when I swore to them, saying, I am the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, '
  '6':
  - type: text
    content: 'on that day I swore to them to bring them out of the land of Egypt into a land that I had selected for them, [plentiful and] '
  - type: note
    content: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
  - type: text
    content: 'flowing with milk and honey, [a land] which is an ornament '
  - type: text
    content: and
  - type: text
    content: ' a glory to all lands. '
  '7':
  - type: text
    content: Then I said to them, ‘Let every man throw away the detestable things on which he feasts his eyes, and do not defile yourselves with the idols of Egypt; I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.’ '
  '8':
  - type: text
    content: 'But they rebelled against Me and were not willing to listen to Me; they did not throw away the detestable things on which they feasted their eyes, nor did they '
  - type: note
    content: Lit forsake.
  - type: text
    content: give up the idols of Egypt.
  - type: text
    content: “
  - type: text
    content: T
  - type: text
    content: 'hen I decided to pour out My wrath on them and finish My anger against them in the land of Egypt. '
  '9':
  - type: text
    content: 'But I acted for My Name’s sake, that it would not be profaned in the sight of the [pagan] nations among whom they lived, in whose sight I made Myself known to them by bringing them out of the land of Egypt. '
