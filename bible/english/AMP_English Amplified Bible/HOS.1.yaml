verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hosea’s Wife and Children
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' that came to Hosea the son of Beeri in the days of Uzziah, Jotham, Ahaz and Hezekiah, kings of Judah, and in the days of Jeroboam the son of Joash king of Israel.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '¶Yet the number of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In general, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons (children) of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses about things such as warfare or circumcision, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies to individual tribal groups, e.g., '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Reuben, Reuben, Reubenites,
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: sons of Israel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall be like the sand of the sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which cannot be measured or numbered;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where it is said to them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are not My people,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be said to them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: You are
    - type: text
      text: ' the sons of the living God.” [Gen 22:17; Rom 9:26]'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then the sons of Judah and the sons of Israel shall be gathered together,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will appoint for themselves one leader,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will go up from the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorious will be the day of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The spiritually reborn Israel, the people whom the Lord has chosen and blessed.
      marker-yv: yv-n
    - type: text
      text: Jezreel. [Is 11:12, 13; Ezek 37:15-28]
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' first spoke through Hosea, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to him, “Go, take for yourself a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some scholars interpret this to mean that Gomer was chaste at the time of the marriage, but later became an adulteress. As such, she symbolizes the future unfaithfulness of Israel.
      marker-yv: yv-n
    - type: text
      text: 'wife of prostitution and have children of [her] prostitution; for the land commits great acts of prostitution by '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsaking
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: not following the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So he went and took Gomer the daughter of Diblaim, and she conceived and bore him a son. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to him, “Name him Jezreel; for yet in a little while I will avenge the blood [that was shed in the Valley] of Jezreel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inflict the punishment for it on the house of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jehu murdered Ahab’s sons in order to seize the throne of Israel.
      marker-yv: yv-n
    - type: text
      text: 'Jehu, and I will put an end to the kingdom of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. Israel, the Northern Kingdom, which included ten of the original tribes of Israel. Samaria was the capital city.
      marker-yv: yv-n
    - type: text
      text: 'house of Israel. [2 Kin 10:1-11] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: On that day I will break the bow [of the military power] of Israel in the Valley of Jezreel.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then Gomer conceived again and gave birth to a daughter. And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Hosea, “Name her Lo-Ruhamah (not shown mercy), for I will no longer have mercy on the house of Israel, that I would ever forgive them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But I will have mercy on the house of Judah and will rescue them by the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God, and will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah also made this prophecy (Is 31:8, 9) and both he and Hosea lived to see its fulfillment (Is 37:36). See also 2 Kin 19:35-37.
      marker-yv: yv-n
    - type: text
      text: not rescue them by bow, sword, war, horses, or horsemen.” [Is 31:8; 37:33-35]
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now when Gomer had weaned Lo-Ruhamah, she conceived and gave birth to a son. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Name him Lo-Ammi (not my people), for you are not My people and I am not your God.”'
