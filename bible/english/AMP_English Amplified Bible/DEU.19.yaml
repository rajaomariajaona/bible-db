  '1':
  - type: heading
    content: Cities of Refuge
  - type: text
    content: “When the L
  - type: heading
    content: ord
  - type: text
    content: ' your God cuts off (destroys) the nations whose land He is giving you, and you dispossess them and live in their cities and in their houses, '
  '10':
  - type: text
    content: so that innocent blood will not be shed [by blood avengers] in your land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you as an inheritance, and blood guilt will not be on you [for the death of an innocent man].'
  '11':
  - type: text
    content: '“But if there is a man who hates his neighbor and lies in wait '
  - type: text
    content: and
  - type: text
    content: ' ambush for him and attacks him and strikes him down so that he dies, and the assailant escapes to one of these cities, '
  '12':
  - type: text
    content: 'then the elders of his own city shall send for him and have him taken back from there and turn him over to the avenger of blood, so that he may be put to death. '
  '13':
  - type: text
    content: You shall not pity him [the guilty one], but you shall purge the blood of the innocent from Israel, so that it may go well with you.
  - type: heading
    content: Laws of Landmark and Testimony
  '14':
  - type: text
    content: “You shall not move your neighbor’s boundary mark, which the forefathers [who first divided the territory] have set, in the land which you will inherit in the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you to possess.'
  '15':
  - type: text
    content: '“A single witness shall not appear '
  - type: text
    content: in a trial
  - type: text
    content: ' against a man for any wrong or any sin which he has committed; [only] '
  - type: note
    content: Lit in the mouth of.
  - type: text
    content: 'on the testimony '
  - type: text
    content: or
  - type: text
    content: ' evidence of two or three witnesses shall a charge be confirmed. '
  '16':
  - type: text
    content: 'If a malicious witness rises up against a man to [falsely] accuse him of wrongdoing, '
  '17':
  - type: text
    content: then both parties to the controversy shall stand before the L
  - type: heading
    content: ord
  - type: text
    content: ', before the priests and the judges who will be '
  - type: text
    content: in office
  - type: text
    content: ' at that time. '
  '18':
  - type: text
    content: 'The judges shall investigate thoroughly, and if the witness is a false witness, and he has accused his brother falsely, '
  '19':
  - type: text
    content: 'then you shall do to him just as he had intended to do to his brother. So you shall remove the evil from among you. '
  '2':
  - type: text
    content: you shall designate three cities for yourself in the central area of the land, which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you to possess. '
  '20':
  - type: text
    content: 'Those who remain will hear and be afraid, and will never again do such an evil thing among you. '
  '21':
  - type: text
    content: 'You shall not show pity [to the guilty one]: '
  - type: text
    content: it shall be
  - type: text
    content: ' life for life, eye for eye, tooth for tooth, hand for hand, foot for foot.'
  '3':
  - type: text
    content: 'You shall prepare '
  - type: text
    content: and
  - type: text
    content: ' maintain for yourself the roads [to these cities], and divide the territory of your land into three parts, so that anyone who kills another unintentionally may escape there [for asylum].'
  '4':
  - type: text
    content: '“Now this is the case of the offender (manslayer) who may escape there and live [protected from vengeance]: when he kills his neighbor unintentionally, not having hated him previously— '
  '5':
  - type: text
    content: 'as [for example] when '
  - type: text
    content: a man
  - type: text
    content: ' goes into the forest with his neighbor to cut wood, and his hand swings the axe to cut down the tree, but the iron '
  - type: text
    content: head
  - type: text
    content: ' slips off the wooden handle and hits his companion and he dies—the offender may escape to one of these cities and live; '
  '6':
  - type: text
    content: 'otherwise the '
  - type: note
    content: The nearest male relative of the victim, known as the “kinsman-redeemer” (Heb go’el), was responsible to find the guilty party and put him to death (Num 35:19). The person who had committed the homicide was protected until his trial, so long as he remained in one of the three cities. After that, if he was judged innocent of any premeditation (like someone today judged guilty of manslaughter, but not murder), he was to remain in the city under protection from the avenger until the death of the high priest, at which time he could return to his home as a free man (Num 35:28).
  - type: text
    content: 'avenger of blood might pursue the offender in the heat of anger, and overtake him, because it is a long way, and take his life, even though he did not deserve to die, since he did not hate his neighbor beforehand. '
  '7':
  - type: text
    content: Therefore, I command you, saying, ‘You shall set aside three cities [of refuge] for yourself.’
  '8':
  - type: text
    content: “If the L
  - type: heading
    content: ord
  - type: text
    content: ' your God enlarges your border, as He has sworn to your fathers to do, and gives you all the land which He promised to give to your fathers— '
  '9':
  - type: text
    content: 'if you keep '
  - type: text
    content: and
  - type: text
    content: ' carefully observe all these commandments which I am commanding you today, to love the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, and to walk [that is, to live each and every day] always in His ways—then you shall add three more cities [of refuge] for yourself, besides these three, '
