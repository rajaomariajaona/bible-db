document_id: DEU.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Cities of Refuge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “When the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God cuts off (destroys) the nations whose land He is giving you, and you dispossess them and live in their cities and in their houses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: you shall designate three cities for yourself in the central area of the land, which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you to possess. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You shall prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' maintain for yourself the roads [to these cities], and divide the territory of your land into three parts, so that anyone who kills another unintentionally may escape there [for asylum].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Now this is the case of the offender (manslayer) who may escape there and live [protected from vengeance]: when he kills his neighbor unintentionally, not having hated him previously— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'as [for example] when '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a man
  - type: text
    text: ' goes into the forest with his neighbor to cut wood, and his hand swings the axe to cut down the tree, but the iron '
  - type: usfm
    marker: it
    children:
    - type: text
      text: head
  - type: text
    text: ' slips off the wooden handle and hits his companion and he dies—the offender may escape to one of these cities and live; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'otherwise the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The nearest male relative of the victim, known as the “kinsman-redeemer” (Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: go’el)
      - type: text
        text: ', was responsible to find the guilty party and put him to death (Num 35:19). The person who had committed the homicide was protected until his trial, so long as he remained in one of the three cities. After that, if he was judged innocent of any premeditation (like someone today judged guilty of manslaughter, but not murder), he was to remain in the city under protection from the avenger until the death of the high priest, at which time he could return to his home as a free man (Num 35:28).'
    marker-yv: yv-n
  - type: text
    text: 'avenger of blood might pursue the offender in the heat of anger, and overtake him, because it is a long way, and take his life, even though he did not deserve to die, since he did not hate his neighbor beforehand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Therefore, I command you, saying, ‘You shall set aside three cities [of refuge] for yourself.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “If the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God enlarges your border, as He has sworn to your fathers to do, and gives you all the land which He promised to give to your fathers— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'if you keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carefully observe all these commandments which I am commanding you today, to love the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, and to walk [that is, to live each and every day] always in His ways—then you shall add three more cities [of refuge] for yourself, besides these three, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: so that innocent blood will not be shed [by blood avengers] in your land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you as an inheritance, and blood guilt will not be on you [for the death of an innocent man].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“But if there is a man who hates his neighbor and lies in wait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ambush for him and attacks him and strikes him down so that he dies, and the assailant escapes to one of these cities, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'then the elders of his own city shall send for him and have him taken back from there and turn him over to the avenger of blood, so that he may be put to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You shall not pity him [the guilty one], but you shall purge the blood of the innocent from Israel, so that it may go well with you.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Laws of Landmark and Testimony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “You shall not move your neighbor’s boundary mark, which the forefathers [who first divided the territory] have set, in the land which you will inherit in the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you to possess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“A single witness shall not appear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in a trial
  - type: text
    text: ' against a man for any wrong or any sin which he has committed; [only] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in the mouth of
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'on the testimony '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' evidence of two or three witnesses shall a charge be confirmed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'If a malicious witness rises up against a man to [falsely] accuse him of wrongdoing, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: then both parties to the controversy shall stand before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', before the priests and the judges who will be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in office
  - type: text
    text: ' at that time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The judges shall investigate thoroughly, and if the witness is a false witness, and he has accused his brother falsely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'then you shall do to him just as he had intended to do to his brother. So you shall remove the evil from among you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Those who remain will hear and be afraid, and will never again do such an evil thing among you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'You shall not show pity [to the guilty one]: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it shall be
  - type: text
    text: ' life for life, eye for eye, tooth for tooth, hand for hand, foot for foot.'
