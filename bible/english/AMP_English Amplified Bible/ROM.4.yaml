document_id: ROM.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Justification by Faith Evidenced in Old Testament
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then shall we say that Abraham, our forefather '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: according to the flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'humanly speaking, has found? [Has he obtained a favored standing?] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How then was it credited [to him]? Was it after he had been circumcised, or before? Not after, but while [he was] uncircumcised. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He received the sign of circumcision, a seal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' confirmation of the righteousness which he had by faith while [he was still] uncircumcised—this was so that he would be the [spiritual] father of all who believe without being circumcised—so that righteousness would be credited to them, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and [that he would be] the [spiritual] father of those circumcised who are not only circumcised, but who also walk in the steps of the faith of our father Abraham which he had before he was circumcised.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the promise to Abraham or to his descendants that he would be heir of the world was not through [observing the requirements of] the Law, but through the righteousness of faith. [Gen 17:4-6; 22:16-18] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If those who are [followers] of the Law are [the true] heirs [of Abraham], then faith [leading to salvation] is of no effect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' void, and the promise [of God] is nullified. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the Law results in [God’s] wrath [against sin], but where there is no law, there is no violation [of it either].
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, [inheriting] the promise depends entirely on faith [that is, confident trust in the unseen God], in order that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it may be given
    - type: text
      text: ' as an act of grace [His unmerited favor and mercy], so that the promise will be [legally] guaranteed to all the descendants [of Abraham]—not only for those [Jewish believers] who keep the Law, but also for those [Gentile believers] who share the faith of Abraham, who is the [spiritual] father of us all— '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(as it is written [in Scripture], “I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: have made you a father of many nations
    - type: text
      text: '”) in the sight of Him in whom he believed, that is, God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A reference to both the birth of Isaac, and the resurrection of Christ.
      marker-yv: yv-n
    - type: text
      text: 'who gives life to the dead and calls into being that which does not exist. [Gen 17:5] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In hope against hope Abraham believed that he would become a father of many nations, as he had been promised [by God]: “S'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o
    - type: text
      text: ' [numberless] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: shall your descendants be
    - type: text
      text: '.” [Gen 15:5] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Without becoming weak in faith he considered his own body, now as good as dead [for producing children] since he was about a hundred years old, and [he considered] the deadness of Sarah’s womb. [Gen 17:17; 18:11] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if Abraham was justified [that is, acquitted from the guilt of his sins] by works [those things he did that were good], he has something to boast about, but not before God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he did not doubt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' waver in unbelief concerning the promise of God, but he grew strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empowered by faith, giving glory to God, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'being fully convinced that God had the power to do what He had promised. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore his faith '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: was credited to him as righteousness
    - type: text
      text: ' (right standing with God). [Gen 15:6] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now not for his sake alone was it written that it was credited to him, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but for our sake also—to whom righteousness will be credited, as those who believe in Him who raised Jesus our Lord from the dead— '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who was betrayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crucified because of our sins, and was raised [from the dead] because of our justification [our acquittal—absolving us of all sin before God].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For what does the Scripture say? “A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: braham believed in
    - type: text
      text: ' (trusted, relied on) G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and it was credited to his account as righteousness
    - type: text
      text: ' (right living, right standing with God).” [Gen 15:6] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now to a laborer, his wages are not credited as a favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a gift, but as an obligation [something owed to him]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But to the one who does not work [that is, the one who does not try to earn his salvation by doing good], but believes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' completely trusts in Him who justifies the ungodly, his faith is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Faith is not an equivalent or substitute for righteousness, but God graciously treats it as if it were the same. Otherwise, no one could be saved from sin and have eternal life.
      marker-yv: yv-n
    - type: text
      text: 'credited to him as righteousness (right standing with God). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in this same way David speaks of the blessing on the one to whom God credits righteousness apart from works:'
