  - type: text
    text: “B
  - type: usfm
    marker: sc
    children:
    - type: text
      text: lessed
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
