    - type: text
      text: '1'
  - type: text
    text: 'What then shall we say that Abraham, our forefather '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:1 '
    - type: usfm
      marker: ft
