      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: according to the flesh
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'humanly speaking, has found? [Has he obtained a favored standing?] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For if Abraham was justified [that is, acquitted from the guilt of his sins] by works [those things he did that were good], he has something to boast about, but not before God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For what does the Scripture say? “A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: braham believed in
  - type: text
    text: ' (trusted, relied on) G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: and it was credited to his account as righteousness
  - type: text
    text: ' (right living, right standing with God).” [Gen 15:6] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now to a laborer, his wages are not credited as a favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a gift, but as an obligation [something owed to him]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But to the one who does not work [that is, the one who does not try to earn his salvation by doing good], but believes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' completely trusts in Him who justifies the ungodly, his faith is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Faith is not an equivalent or substitute for righteousness, but God graciously treats it as if it were the same. Otherwise, no one could be saved from sin and have eternal life.
    marker-yv: yv-n
  - type: text
    text: 'credited to him as righteousness (right standing with God). '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And in this same way David speaks of the blessing on the one to whom God credits righteousness apart from works:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
