  '1':
  - type: heading
    content: Justification by Faith Evidenced in Old Testament
  - type: text
    content: 'What then shall we say that Abraham, our forefather '
  - type: note
    content: Lit according to the flesh.
  - type: text
    content: 'humanly speaking, has found? [Has he obtained a favored standing?] '
  '10':
  - type: text
    content: 'How then was it credited [to him]? Was it after he had been circumcised, or before? Not after, but while [he was] uncircumcised. '
  '11':
  - type: text
    content: 'He received the sign of circumcision, a seal '
  - type: text
    content: or
  - type: text
    content: ' confirmation of the righteousness which he had by faith while [he was still] uncircumcised—this was so that he would be the [spiritual] father of all who believe without being circumcised—so that righteousness would be credited to them, '
  '12':
  - type: text
    content: and [that he would be] the [spiritual] father of those circumcised who are not only circumcised, but who also walk in the steps of the faith of our father Abraham which he had before he was circumcised.
  '13':
  - type: text
    content: 'For the promise to Abraham or to his descendants that he would be heir of the world was not through [observing the requirements of] the Law, but through the righteousness of faith. [Gen 17:4-6; 22:16-18] '
  '14':
  - type: text
    content: 'If those who are [followers] of the Law are [the true] heirs [of Abraham], then faith [leading to salvation] is of no effect '
  - type: text
    content: and
  - type: text
    content: ' void, and the promise [of God] is nullified. '
  '15':
  - type: text
    content: For the Law results in [God’s] wrath [against sin], but where there is no law, there is no violation [of it either].
  '16':
  - type: text
    content: 'Therefore, [inheriting] the promise depends entirely on faith [that is, confident trust in the unseen God], in order that '
  - type: text
    content: it may be given
  - type: text
    content: ' as an act of grace [His unmerited favor and mercy], so that the promise will be [legally] guaranteed to all the descendants [of Abraham]—not only for those [Jewish believers] who keep the Law, but also for those [Gentile believers] who share the faith of Abraham, who is the [spiritual] father of us all— '
  '17':
  - type: text
    content: '(as it is written [in Scripture], “I '
  - type: heading
    content: have made you a father of many nations
  - type: text
    content: '”) in the sight of Him in whom he believed, that is, God '
  - type: note
    content: A reference to both the birth of Isaac, and the resurrection of Christ.
  - type: text
    content: 'who gives life to the dead and calls into being that which does not exist. [Gen 17:5] '
  '18':
  - type: text
    content: 'In hope against hope Abraham believed that he would become a father of many nations, as he had been promised [by God]: “S'
  - type: heading
    content: o
  - type: text
    content: ' [numberless] '
  - type: heading
    content: shall your descendants be
  - type: text
    content: '.” [Gen 15:5] '
  '19':
  - type: text
    content: 'Without becoming weak in faith he considered his own body, now as good as dead [for producing children] since he was about a hundred years old, and [he considered] the deadness of Sarah’s womb. [Gen 17:17; 18:11] '
  '2':
  - type: text
    content: 'For if Abraham was justified [that is, acquitted from the guilt of his sins] by works [those things he did that were good], he has something to boast about, but not before God. '
  '20':
  - type: text
    content: 'But he did not doubt '
  - type: text
    content: or
  - type: text
    content: ' waver in unbelief concerning the promise of God, but he grew strong '
  - type: text
    content: and
  - type: text
    content: ' empowered by faith, giving glory to God, '
  '21':
  - type: text
    content: 'being fully convinced that God had the power to do what He had promised. '
  '22':
  - type: text
    content: 'Therefore his faith '
  - type: heading
    content: was credited to him as righteousness
  - type: text
    content: ' (right standing with God). [Gen 15:6] '
  '23':
  - type: text
    content: 'Now not for his sake alone was it written that it was credited to him, '
  '24':
  - type: text
    content: 'but for our sake also—to whom righteousness will be credited, as those who believe in Him who raised Jesus our Lord from the dead— '
  '25':
  - type: text
    content: 'who was betrayed '
  - type: text
    content: and
  - type: text
    content: ' crucified because of our sins, and was raised [from the dead] because of our justification [our acquittal—absolving us of all sin before God].'
  '3':
  - type: text
    content: For what does the Scripture say? “A
  - type: heading
