  - type: text
    content: ', '
  - type: heading
    content: and it was credited to his account as righteousness
  - type: text
    content: ' (right living, right standing with God).” [Gen 15:6] '
  '4':
  - type: text
    content: 'Now to a laborer, his wages are not credited as a favor '
  - type: text
    content: or
  - type: text
    content: ' a gift, but as an obligation [something owed to him]. '
  '5':
  - type: text
    content: 'But to the one who does not work [that is, the one who does not try to earn his salvation by doing good], but believes '
  - type: text
    content: and
  - type: text
    content: ' completely trusts in Him who justifies the ungodly, his faith is '
  - type: note
    content: Faith is not an equivalent or substitute for righteousness, but God graciously treats it as if it were the same. Otherwise, no one could be saved from sin and have eternal life.
  - type: text
    content: 'credited to him as righteousness (right standing with God). '
