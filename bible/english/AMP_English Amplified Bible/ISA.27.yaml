document_id: ISA.27,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Deliverance of Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In that day the Lord will punish Leviathan the fleeing serpent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With His fierce and great and mighty sword [rescuing Israel from her enemy],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even Leviathan the twisted serpent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And He will kill the dragon who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lives
    - type: text
      text: ' in the sea.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For the fortified city is isolated,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A settlement deserted and abandoned like the desert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There the calf will graze,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And there it will lie down and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: consume
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: feed on its branches.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When its branches are dry, they are broken off;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The women come and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: set light to
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: make a fire with them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are not a people of understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore He who made them will not have compassion on them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He who created them will not be gracious to them.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: In that day the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will thresh [out His grain] from the flowing stream of the River [Euphrates] to the Brook of Egypt, and you will be gathered up one by one, O sons of Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'It will come to pass in that day that a great trumpet will be blown, and those who were lost '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perishing in the land of Assyria and who were scattered in the land of Egypt will come and worship the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on the holy mountain at Jerusalem. [Zech 14:16; Matt 24:31; Rev 11:15]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ¶In that day [it will be said of the redeemed nation of Israel],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“A vineyard of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So DSS; MT reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: beauty
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: wine, sing in praise of it!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', am its Keeper;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I water it every moment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that no one will harm it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I guard it night and day.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “I have no wrath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Should anyone give Me briars '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thorns in battle,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would step on them, I would set them all on fire.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Or let him (Israel) cling to My strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rely on My protection [My stronghold],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him make peace with Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him make peace with Me.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Those coming, Jacob
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: In the generations to come Jacob will take root;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel will blossom and sprout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will fill the surface of the world with fruit. [Hos 14:1-6; Rom 11:12]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '¶Like the striking '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: of him,
        - type: text
          text: ' referring to an enemy of Israel.'
      marker-yv: yv-n
    - type: text
      text: by Him who has struck them, has He struck them?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or like the slaughter of His slain, have they been slain?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You contended with them by exile, by driving them away [from Canaan];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has expelled them with His fierce wind on the day of the east wind.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Therefore through this the wickedness [the sin, the injustice, the wrongdoing] of Jacob (Israel) will be atoned for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forgiven;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And this will be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: all the fruit
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the full price [that God requires] for taking away his sin:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When Israel makes all the stones of the [pagan] altars like crushed chalk stones;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the Asherim and the incense altars will not stand.
