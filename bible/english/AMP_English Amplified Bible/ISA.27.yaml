type_code: eng
verses:
  '1':
  - type: heading
    content: The Deliverance of Israel
  - type: text
    content: In that day the Lord will punish Leviathan the fleeing serpent
  - type: text
    content: With His fierce and great and mighty sword [rescuing Israel from her enemy],
  - type: text
    content: Even Leviathan the twisted serpent;
  - type: text
    content: 'And He will kill the dragon who '
  - type: text
    content: lives
  - type: text
    content: ' in the sea.'
  '10':
  - type: text
    content: For the fortified city is isolated,
  - type: text
    content: A settlement deserted and abandoned like the desert;
  - type: text
    content: There the calf will graze,
  - type: text
    content: 'And there it will lie down and '
  - type: note
    content: Lit consume.
  - type: text
    content: feed on its branches.
  '11':
  - type: text
    content: When its branches are dry, they are broken off;
  - type: text
    content: 'The women come and '
  - type: note
    content: Lit set light to.
  - type: text
    content: make a fire with them.
  - type: text
    content: For they are not a people of understanding,
  - type: text
    content: Therefore He who made them will not have compassion on them,
  - type: text
    content: And He who created them will not be gracious to them.
  '12':
  - type: text
    content: In that day the L
  - type: heading
    content: ord
  - type: text
    content: ' will thresh [out His grain] from the flowing stream of the River [Euphrates] to the Brook of Egypt, and you will be gathered up one by one, O sons of Israel. '
  '13':
  - type: text
    content: 'It will come to pass in that day that a great trumpet will be blown, and those who were lost '
  - type: text
    content: and
  - type: text
    content: ' perishing in the land of Assyria and who were scattered in the land of Egypt will come and worship the L'
  - type: heading
    content: ord
  - type: text
    content: ' on the holy mountain at Jerusalem. [Zech 14:16; Matt 24:31; Rev 11:15]'
  '2':
  - type: text
    content: ¶In that day [it will be said of the redeemed nation of Israel],
  - type: text
    content: '“A vineyard of '
  - type: note
    content: So DSS; MT reads beauty.
  - type: text
    content: wine, sing in praise of it!
  '3':
  - type: text
    content: “I, the L
  - type: heading
    content: ord
  - type: text
    content: ', am its Keeper;'
  - type: text
    content: I water it every moment.
  - type: text
    content: So that no one will harm it,
  - type: text
    content: I guard it night and day.
  '4':
  - type: text
    content: “I have no wrath.
  - type: text
    content: 'Should anyone give Me briars '
  - type: text
    content: and
  - type: text
    content: ' thorns in battle,'
  - type: text
    content: I would step on them, I would set them all on fire.
  '5':
  - type: text
    content: '“Or let him (Israel) cling to My strength '
  - type: text
    content: and
  - type: text
    content: ' rely on My protection [My stronghold],'
  - type: text
    content: Let him make peace with Me,
  - type: text
    content: Let him make peace with Me.”
  '6':
  - type: text
    content: ' '
  - type: note
    content: Lit Those coming, Jacob.
  - type: text
    content: In the generations to come Jacob will take root;
  - type: text
    content: Israel will blossom and sprout,
  - type: text
    content: And they will fill the surface of the world with fruit. [Hos 14:1-6; Rom 11:12]
  '7':
  - type: text
    content: '¶Like the striking '
  - type: note
    content: Or of him, referring to an enemy of Israel.
  - type: text
    content: by Him who has struck them, has He struck them?
  - type: text
    content: Or like the slaughter of His slain, have they been slain?
  '8':
  - type: text
    content: You contended with them by exile, by driving them away [from Canaan];
  - type: text
    content: He has expelled them with His fierce wind on the day of the east wind.
  '9':
  - type: text
    content: 'Therefore through this the wickedness [the sin, the injustice, the wrongdoing] of Jacob (Israel) will be atoned for '
  - type: text
    content: and
  - type: text
    content: ' forgiven;'
  - type: text
    content: 'And this will be '
  - type: note
    content: Lit all the fruit.
  - type: text
    content: 'the full price [that God requires] for taking away his sin:'
  - type: text
    content: When Israel makes all the stones of the [pagan] altars like crushed chalk stones;
  - type: text
    content: When the Asherim and the incense altars will not stand.
