document_id: PRO.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Wiles of the Prostitute
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, keep my words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And treasure my commandments within you [so they are readily available to guide you].
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And there a woman met him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dressed as a prostitute and sly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cunning of heart.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: She was boisterous and rebellious;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Her feet do not
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: She would not stay at home.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'At times '
    - type: usfm
      marker: it
      children:
      - type: text
        text: she was
    - type: text
      text: ' in the streets, at times in the market places,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lurking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' setting her ambush at every corner.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: So she caught him and kissed him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And with a brazen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' impudent face she said to him:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “I have peace offerings with me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Today I have paid my vows.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “So I came out to meet you [that you might share with me the feast of my offering],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Diligently I sought your face and I have found you.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“I have spread my couch with coverings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cushions of tapestry,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With colored fine linen of Egypt.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “I have perfumed my bed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With myrrh, aloes, and cinnamon.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Come, let us drink our fill of love until morning;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let us console '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight ourselves with love.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “For my husband is not at home.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has gone on a long journey;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Keep my commandments and live,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And keep my teaching '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' law as the apple of your eye.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: He has taken a bag of money with him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he will come home on the appointed day.”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: With her many persuasions she caused him to yield;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With her flattering lips she seduced him.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Suddenly he went after her, as an ox goes to the slaughter [not knowing the outcome],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or as one in stocks going to the correction [to be given] to a fool,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Until an arrow pierced his liver [with a mortal wound];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a bird fluttering straight into the net,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He did not know that it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would cost
    - type: text
      text: ' him his life.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ¶Now therefore, my sons, listen to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And pay attention to the words of my mouth.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Do not let your heart turn aside to her ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not stray into her [evil, immoral] paths.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: For she has cast down many [mortally] wounded;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, all who were killed by her were strong. [Neh 13:26]
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Her house is the way to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hades, the nether world, the place of the dead.
      marker-yv: yv-n
    - type: text
      text: Sheol,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Descending to the chambers of death. [1 Cor 6:9]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Bind them [securely] on your fingers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Write them on the tablet of your heart.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Say to [skillful and godly] wisdom, “You are my sister,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And regard understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' intelligent insight as your intimate friends;'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: That they may keep you from the immoral woman,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the foreigner [who does not observe God’s laws and] who flatters with her [smooth] words.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ¶For at the window of my house
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked out through my lattice.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And among the naive [the inexperienced and gullible],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I saw among the youths
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A young man lacking [good] sense,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Passing through the street near her corner;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he took the path to her house
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: In the twilight, in the evening;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the black and dark night.
