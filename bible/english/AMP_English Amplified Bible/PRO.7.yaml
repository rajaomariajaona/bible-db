document_id: PRO.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wiles of the Prostitute
  - type: text
    content: My son, keep my words
  - type: text
    content: And treasure my commandments within you [so they are readily available to guide you].
  '10':
  - type: text
    content: And there a woman met him,
  - type: text
    content: 'Dressed as a prostitute and sly '
  - type: text
    content: and
  - type: text
    content: ' cunning of heart.'
  '11':
  - type: text
    content: She was boisterous and rebellious;
  - type: note
    content: Lit Her feet do not.
  - type: text
    content: She would not stay at home.
  '12':
  - type: text
    content: 'At times '
  - type: text
    content: she was
  - type: text
    content: ' in the streets, at times in the market places,'
  - type: text
    content: 'Lurking '
  - type: text
    content: and
  - type: text
    content: ' setting her ambush at every corner.'
  '13':
  - type: text
    content: So she caught him and kissed him
  - type: text
    content: 'And with a brazen '
  - type: text
    content: and
  - type: text
    content: ' impudent face she said to him:'
  '14':
  - type: text
    content: “I have peace offerings with me;
  - type: text
    content: Today I have paid my vows.
  '15':
  - type: text
    content: “So I came out to meet you [that you might share with me the feast of my offering],
  - type: text
    content: Diligently I sought your face and I have found you.
  '16':
  - type: text
    content: '“I have spread my couch with coverings '
  - type: text
    content: and
  - type: text
    content: ' cushions of tapestry,'
  - type: text
    content: With colored fine linen of Egypt.
  '17':
  - type: text
    content: “I have perfumed my bed
  - type: text
    content: With myrrh, aloes, and cinnamon.
  '18':
  - type: text
    content: “Come, let us drink our fill of love until morning;
  - type: text
    content: 'Let us console '
  - type: text
    content: and
  - type: text
    content: ' delight ourselves with love.'
  '19':
  - type: text
    content: “For my husband is not at home.
  - type: text
    content: He has gone on a long journey;
  '2':
  - type: text
    content: Keep my commandments and live,
  - type: text
    content: 'And keep my teaching '
  - type: text
    content: and
  - type: text
    content: ' law as the apple of your eye.'
  '20':
  - type: text
    content: He has taken a bag of money with him,
  - type: text
    content: And he will come home on the appointed day.”
  '21':
  - type: text
    content: With her many persuasions she caused him to yield;
  - type: text
    content: With her flattering lips she seduced him.
  '22':
  - type: text
    content: Suddenly he went after her, as an ox goes to the slaughter [not knowing the outcome],
  - type: text
    content: Or as one in stocks going to the correction [to be given] to a fool,
  '23':
  - type: text
    content: Until an arrow pierced his liver [with a mortal wound];
  - type: text
    content: Like a bird fluttering straight into the net,
  - type: text
    content: 'He did not know that it '
  - type: text
    content: would cost
  - type: text
    content: ' him his life.'
  '24':
  - type: text
    content: ¶Now therefore, my sons, listen to me,
  - type: text
    content: And pay attention to the words of my mouth.
  '25':
  - type: text
    content: Do not let your heart turn aside to her ways,
  - type: text
    content: Do not stray into her [evil, immoral] paths.
  '26':
  - type: text
    content: For she has cast down many [mortally] wounded;
  - type: text
    content: Indeed, all who were killed by her were strong. [Neh 13:26]
  '27':
  - type: text
    content: 'Her house is the way to '
  - type: note
    content: Hades, the nether world, the place of the dead.
  - type: text
    content: Sheol,
  - type: text
    content: Descending to the chambers of death. [1 Cor 6:9]
  '3':
  - type: text
    content: Bind them [securely] on your fingers;
  - type: text
    content: Write them on the tablet of your heart.
  '4':
  - type: text
    content: Say to [skillful and godly] wisdom, “You are my sister,”
  - type: text
    content: 'And regard understanding '
  - type: text
    content: and
  - type: text
    content: ' intelligent insight as your intimate friends;'
  '5':
  - type: text
    content: That they may keep you from the immoral woman,
  - type: text
    content: From the foreigner [who does not observe God’s laws and] who flatters with her [smooth] words.
  '6':
  - type: text
    content: ¶For at the window of my house
  - type: text
    content: I looked out through my lattice.
  '7':
  - type: text
    content: And among the naive [the inexperienced and gullible],
  - type: text
    content: I saw among the youths
  - type: text
    content: A young man lacking [good] sense,
  '8':
  - type: text
    content: Passing through the street near her corner;
  - type: text
    content: And he took the path to her house
  '9':
  - type: text
    content: In the twilight, in the evening;
  - type: text
    content: In the black and dark night.
