document_id: 1CH.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Genealogy: The Priestly Line'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ch 5:27 in Hebrew.
      marker-yv: yv-n
    - type: text
      text: 'The sons of Levi: Gershom, Kohath and Merari. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Johanan became the father of Azariah (it was he who was priest in the house (temple) which Solomon built in Jerusalem) '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Azariah became the father of Amariah, and Amariah became the father of Ahitub, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ahitub became the father of Zadok, and Zadok became the father of Shallum, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Shallum became the father of Hilkiah, and Hilkiah became the father of Azariah, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Azariah became the father of Seraiah, and Seraiah became the father of Jehozadak; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Jehozadak went into captivity when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent [the people of] Judah and Jerusalem into exile by the hand of Nebuchadnezzar.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew this is the first verse in ch 6.
      marker-yv: yv-n
    - type: text
      text: 'The sons of Levi: Gershom, Kohath, and Merari. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the names of the sons of Gershom: Libni and Shimei. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Merari: Mahli and Mushi. These are the families of the Levites according to their fathers. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of Gershom: Libni his son, Jahath his son, Zimmah his son, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joah his son, Iddo his son, Zerah his son, Jeatherai his son. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Kohath: Amminadab his son, Korah his son, Assir his son, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elkanah his son, Ebiasaph his son, Assir his son, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahath his son, Uriel his son, Uzziah his son, and Shaul his son. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Elkanah: Amasai and Ahimoth. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As for
    - type: text
      text: ' Elkanah, the sons of Elkanah: Zophai his son and Nahath his son, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliab his son, Jeroham his son, Elkanah [Samuel’s father] his son. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Samuel: Joel the firstborn and Abijah the second. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Merari: Mahli, Libni his son, Shimei his son, Uzza his son, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Amram: Aaron, Moses and Miriam. And the sons of Aaron: Nadab, Abihu, Eleazar, and Ithamar. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shimea his son, Haggiah his son, Asaiah his son.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now these are those whom David appointed over the service of song in the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' after the ark [of the covenant] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ark was captured by the Philistines (1 Sam 4:11-22). They returned it after enduring seven plague-filled months. The Israelites placed it in the house of Abinadab, where it remained for many years until David had it brought up to the City of David (2 Sam 6:12).
      marker-yv: yv-n
    - type: text
      text: 'rested '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They ministered with singing before the tabernacle of the Tent of Meeting, until Solomon had built the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house (temple) in Jerusalem, performing their service in due order. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These men and their sons served from the Kohathites: Heman the singer, the son of Joel, the son of Samuel [the great prophet and judge], '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Elkanah [III], the son of Jeroham, the son of Eliel, the son of Toah, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Zuph, the son of Elkanah [II], the son of Mahath, the son of Amasai, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Elkanah [I], the son of Joel, the son of Azariah, the son of Zephaniah, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Tahath, the son of Assir, the son of Ebiasaph, the son of Korah, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Izhar, the son of Kohath, the son of Levi, the son of Israel (Jacob). '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Heman’s [tribal] brother Asaph stood at his right hand: Asaph the son of Berechiah, the son of Shimea, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eleazar became the father of Phinehas, Phinehas became the father of Abishua, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Michael, the son of Baaseiah, the son of Malchijah, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Ethni, the son of Zerah, the son of Adaiah, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Ethan, the son of Zimmah, the son of Shimei, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Jahath, the son of Gershom, the son of Levi. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their relatives the sons of Merari '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stood
    - type: text
      text: ' at the left hand: Ethan the son of Kishi, the son of Abdi, the son of Malluch, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Hashabiah, the son of Amaziah, the son of Hilkiah, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Amzi, the son of Bani, the son of Shemer, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the son of Mahli, the son of Mushi, the son of Merari, the son of Levi. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their relatives the Levites [who were not descended from Aaron] were appointed for all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the other kinds of
    - type: text
      text: ' service of the tabernacle of the house of God.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Aaron
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But [the line of] Aaron and his sons made offerings on the altar of burnt offering and on the altar of incense, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ministering
    - type: text
      text: ' for all the work of the Holy of Holies (Most Holy Place), and [they did so] to make atonement for Israel, according to all that Moses, God’s servant, had commanded. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Abishua became the father of Bukki, and Bukki became the father of Uzzi, '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the sons of Aaron: Eleazar his son, Phinehas his son, Abishua his son, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bukki his son, Uzzi his son, Zerahiah his son, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meraioth his son, Amariah his son, Ahitub his son, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zadok his son, Ahimaaz his son.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these are their settlements according to their camps within their borders: to the sons of Aaron of the families of the Kohathites (for theirs was the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: first
    - type: text
      text: ' allocation by lot) [Josh 21:10] '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to them they gave Hebron in the land of Judah and its surrounding pasture land; '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the fields of the city and its villages they gave to Caleb the son of Jephunneh. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the sons of Aaron they gave the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: following
    - type: text
      text: ' cities of refuge: Hebron, Libnah with its pasture lands, Jattir, Eshtemoa with its pasture lands, [Josh 21:13] '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hilen with its pasture lands, Debir with its pasture lands, '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ashan with its pasture lands, and Beth-shemesh with its pasture lands; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Uzzi became the father of Zerahiah, and Zerahiah became the father of Meraioth, '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and from the tribe of Benjamin: Geba, Alemeth, and Anathoth, with their pasture lands. All their cities throughout their families were thirteen cities.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then to the rest of the sons of Kohath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were given
    - type: text
      text: ' ten cities by lot from the family of the tribe [of Ephraim and of Dan and], from the half-tribe, the half of Manasseh. [Josh 21:5] '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the sons of Gershom, according to their families, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were given
    - type: text
      text: ' thirteen cities from the tribes of Issachar, Asher, Naphtali, and [the other half of] Manasseh in Bashan. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the sons of Merari '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were given
    - type: text
      text: ' twelve cities by lot, according to their families, from the tribes of Reuben, Gad, and Zebulun. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the sons of Israel gave to the Levites these cities with their pasture lands. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They gave by lot from the tribes of the sons of Judah, Simeon, and Benjamin these cities which are mentioned by name.
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of the families of the sons of Kohath had cities of their [allotted] territory from the tribe of Ephraim. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They gave to the Levites the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: following
    - type: text
      text: ' cities of refuge: Shechem in the hill country of Ephraim with its pasture lands, Gezer with its pasture lands; '
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jokmeam and Beth-horon with their pasture lands, '
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aijalon and Gath-rimmon, with their pasture lands; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meraioth became the father of Amariah, and Amariah became the father of Ahitub, '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and from the half-tribe of Manasseh [these cities], with their pasture lands: Aner and Bileam, for the rest of the families of the sons of Kohath.'
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the sons of Gershom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were given
    - type: text
      text: ' from the family of the half-tribe of Manasseh: Golan in Bashan and Ashtaroth, with their pasture lands; '
  '72':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Issachar: Kedesh and Daberath with their pasture lands, '
  '73':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ramoth and Anem with their pasture lands; '
  '74':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Asher: Mashal and Abdon with their pasture lands, '
  '75':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hukok and Rehob with their pasture lands; '
  '76':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and from the tribe of Naphtali: Kedesh in Galilee, Hammon, and Kiriathaim with their pasture lands.'
  '77':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the rest of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Levites,
    - type: text
      text: ' the sons of Merari '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were given,
    - type: text
      text: ' from the tribe of Zebulun: Rimmono and Tabor, with their pasture lands; '
  '78':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and on the other side of the Jordan at Jericho, on the east side of the Jordan '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Levites were given,
    - type: text
      text: ' from the tribe of Reuben: Bezer in the wilderness and Jahzah with their pasture lands, '
  '79':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kedemoth and Mephaath with their pasture lands; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ahitub became the father of Zadok, and Zadok became the father of Ahimaaz, '
  '80':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Gad: Ramoth in Gilead and Mahanaim with their pasture lands, '
  '81':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Heshbon and Jazer with their pasture lands.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ahimaaz became the father of Azariah, and Azariah became the father of Johanan, '
