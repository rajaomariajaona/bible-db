document_id: 1CH.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Genealogy: The Priestly Line'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ch 5:27 in Hebrew.
    marker-yv: yv-n
  - type: text
    text: 'The sons of Levi: Gershom, Kohath and Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The sons of Amram: Aaron, Moses and Miriam. And the sons of Aaron: Nadab, Abihu, Eleazar, and Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eleazar became the father of Phinehas, Phinehas became the father of Abishua, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and Abishua became the father of Bukki, and Bukki became the father of Uzzi, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and Uzzi became the father of Zerahiah, and Zerahiah became the father of Meraioth, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Meraioth became the father of Amariah, and Amariah became the father of Ahitub, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and Ahitub became the father of Zadok, and Zadok became the father of Ahimaaz, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and Ahimaaz became the father of Azariah, and Azariah became the father of Johanan, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and Johanan became the father of Azariah (it was he who was priest in the house (temple) which Solomon built in Jerusalem) '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and Azariah became the father of Amariah, and Amariah became the father of Ahitub, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and Ahitub became the father of Zadok, and Zadok became the father of Shallum, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and Shallum became the father of Hilkiah, and Hilkiah became the father of Azariah, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and Azariah became the father of Seraiah, and Seraiah became the father of Jehozadak; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: and Jehozadak went into captivity when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' sent [the people of] Judah and Jerusalem into exile by the hand of Nebuchadnezzar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew this is the first verse in ch 6.
    marker-yv: yv-n
  - type: text
    text: 'The sons of Levi: Gershom, Kohath, and Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'These are the names of the sons of Gershom: Libni and Shimei. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Merari: Mahli and Mushi. These are the families of the Levites according to their fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Of Gershom: Libni his son, Jahath his son, Zimmah his son, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Joah his son, Iddo his son, Zerah his son, Jeatherai his son. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The sons of Kohath: Amminadab his son, Korah his son, Assir his son, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Elkanah his son, Ebiasaph his son, Assir his son, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tahath his son, Uriel his son, Uzziah his son, and Shaul his son. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The sons of Elkanah: Amasai and Ahimoth. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: it
    children:
    - type: text
      text: As for
  - type: text
    text: ' Elkanah, the sons of Elkanah: Zophai his son and Nahath his son, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Eliab his son, Jeroham his son, Elkanah [Samuel’s father] his son. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The sons of Samuel: Joel the firstborn and Abijah the second. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The sons of Merari: Mahli, Libni his son, Shimei his son, Uzza his son, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Shimea his son, Haggiah his son, Asaiah his son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Now these are those whom David appointed over the service of song in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' after the ark [of the covenant] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ark was captured by the Philistines (1 Sam 4:11-22). They returned it after enduring seven plague-filled months. The Israelites placed it in the house of Abinadab, where it remained for many years until David had it brought up to the City of David (2 Sam 6:12).
    marker-yv: yv-n
  - type: text
    text: 'rested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: They ministered with singing before the tabernacle of the Tent of Meeting, until Solomon had built the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' house (temple) in Jerusalem, performing their service in due order. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'These men and their sons served from the Kohathites: Heman the singer, the son of Joel, the son of Samuel [the great prophet and judge], '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'the son of Elkanah [III], the son of Jeroham, the son of Eliel, the son of Toah, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'the son of Zuph, the son of Elkanah [II], the son of Mahath, the son of Amasai, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'the son of Elkanah [I], the son of Joel, the son of Azariah, the son of Zephaniah, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'the son of Tahath, the son of Assir, the son of Ebiasaph, the son of Korah, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'the son of Izhar, the son of Kohath, the son of Levi, the son of Israel (Jacob). '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Heman’s [tribal] brother Asaph stood at his right hand: Asaph the son of Berechiah, the son of Shimea, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'the son of Michael, the son of Baaseiah, the son of Malchijah, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'the son of Ethni, the son of Zerah, the son of Adaiah, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'the son of Ethan, the son of Zimmah, the son of Shimei, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'the son of Jahath, the son of Gershom, the son of Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Their relatives the sons of Merari '
  - type: usfm
    marker: it
    children:
    - type: text
      text: stood
  - type: text
    text: ' at the left hand: Ethan the son of Kishi, the son of Abdi, the son of Malluch, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'the son of Hashabiah, the son of Amaziah, the son of Hilkiah, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'the son of Amzi, the son of Bani, the son of Shemer, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'the son of Mahli, the son of Mushi, the son of Merari, the son of Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Their relatives the Levites [who were not descended from Aaron] were appointed for all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the other kinds of
  - type: text
    text: ' service of the tabernacle of the house of God.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Descendants of Aaron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'But [the line of] Aaron and his sons made offerings on the altar of burnt offering and on the altar of incense, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ministering
  - type: text
    text: ' for all the work of the Holy of Holies (Most Holy Place), and [they did so] to make atonement for Israel, according to all that Moses, God’s servant, had commanded. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'These are the sons of Aaron: Eleazar his son, Phinehas his son, Abishua his son, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Bukki his son, Uzzi his son, Zerahiah his son, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Meraioth his son, Amariah his son, Ahitub his son, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Zadok his son, Ahimaaz his son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Now these are their settlements according to their camps within their borders: to the sons of Aaron of the families of the Kohathites (for theirs was the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: first
  - type: text
    text: ' allocation by lot) [Josh 21:10] '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'to them they gave Hebron in the land of Judah and its surrounding pasture land; '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'but the fields of the city and its villages they gave to Caleb the son of Jephunneh. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'To the sons of Aaron they gave the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: following
  - type: text
    text: ' cities of refuge: Hebron, Libnah with its pasture lands, Jattir, Eshtemoa with its pasture lands, [Josh 21:13] '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Hilen with its pasture lands, Debir with its pasture lands, '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ashan with its pasture lands, and Beth-shemesh with its pasture lands; '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'and from the tribe of Benjamin: Geba, Alemeth, and Anathoth, with their pasture lands. All their cities throughout their families were thirteen cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Then to the rest of the sons of Kohath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were given
  - type: text
    text: ' ten cities by lot from the family of the tribe [of Ephraim and of Dan and], from the half-tribe, the half of Manasseh. [Josh 21:5] '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'To the sons of Gershom, according to their families, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were given
  - type: text
    text: ' thirteen cities from the tribes of Issachar, Asher, Naphtali, and [the other half of] Manasseh in Bashan. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'To the sons of Merari '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were given
  - type: text
    text: ' twelve cities by lot, according to their families, from the tribes of Reuben, Gad, and Zebulun. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'So the sons of Israel gave to the Levites these cities with their pasture lands. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: They gave by lot from the tribes of the sons of Judah, Simeon, and Benjamin these cities which are mentioned by name.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Some of the families of the sons of Kohath had cities of their [allotted] territory from the tribe of Ephraim. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'They gave to the Levites the '
  - type: usfm
    marker: it
    children:
