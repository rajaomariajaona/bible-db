document_id: ACT.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul Sails from Miletus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When we had torn ourselves away from them and set sail, we ran a straight course and came to Cos, and on the next day to Rhodes, and from there to Patara; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and after finding a ship crossing over to Phoenicia, we went on board and set sail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'After we came in sight of Cyprus, leaving it on our left (port side), we sailed on to Syria and put in at Tyre; for there the ship was to unload her cargo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'After looking up the disciples [in Tyre], we stayed there [with them] seven days; and they kept telling Paul through the [Holy] Spirit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Clearly the disciples felt prompted by the Holy Spirit to tell Paul not to go to Jerusalem. But a question remains as to whether the Spirit was actually forbidding Paul to go, or only preparing him for what he would have to suffer in Jerusalem (cf v 11). Either explanation is possible, but many Bible scholars prefer the latter.
    marker-yv: yv-n
  - type: text
    text: 'not to set foot in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When our days there came to an end, we left and proceeded on our journey, while all of the disciples, with their wives and children, escorted us on our way until '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we were
  - type: text
    text: ' outside the city. After kneeling down on the beach and praying, we told one another goodbye. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then we boarded the ship, and they returned to their homes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When we had completed the voyage from Tyre, we landed [twenty miles to the south] at Ptolemais, and after greeting the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'believers, we stayed with them for one day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'On the next day we left and came to Caesarea, and we went to the house of Philip the evangelist, who was one of the seven [deacons], and stayed with him. [Acts 6:3-6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He had four virgin daughters who had the gift of prophecy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As we were staying there for some time, a prophet named Agabus came down from Judea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And coming to [see] us, he took Paul’s [wide] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was not a belt like men wear today, but a band (sash, girdle), about six inches wide, usually made of leather, worn on top of the outer garment. It was fastened around the midsection of the body and served as a kind of pocket or pouch to carry personal items such as a dagger, money or other necessary things.
    marker-yv: yv-n
  - type: text
    text: 'band (belt, sash) and bound his own feet and hands, and said, “This is what the Holy Spirit says: ‘In this same way the Jews in Jerusalem will bind the man who owns this band, and they will hand him over to the Gentiles (pagans).’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now when we had heard this, both we and the local residents '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' pleading with Paul trying to persuade him not to go up to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Paul replied, “What are you doing, weeping and breaking my heart [like this]? For I am ready not only to be bound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' imprisoned, but even to die at Jerusalem for the name of the Lord Jesus.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And since he would not be dissuaded, we stopped pleading '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fell silent, saying, “The Lord’s will be done!”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul at Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'After this we got ready and started on our way up to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Some of the disciples from Caesarea also came with us, taking us to [the house of] Mnason, a man from Cyprus, a disciple of long standing with whom we were to lodge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When we arrived in Jerusalem, the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'brothers and sisters welcomed us gladly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On the next day Paul went with us to [see] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The half-brother of Jesus, author of the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Letter of James
      - type: text
        text: ' and leader of the church in Jerusalem, not to be confused with James the Apostle (John’s brother).'
    marker-yv: yv-n
  - type: text
    text: 'James, and all the elders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the church
  - type: text
    text: ' were present. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'After greeting them, Paul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to give a detailed account of the things that God had done among the Gentiles through his ministry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And when they heard it, they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' glorifying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praising God; and they said to him, “You see, brother, how many thousands of believers there are among the Jews, and they are all enthusiastic supporters of the Law [of Moses]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now they have been told about you, that you are teaching all the Jews who are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: living
  - type: text
    text: ' among the Gentiles to turn away from [the Law of] Moses, advising them not to circumcise their children or to live according to the [Mosaic] customs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'What then should be done? They will certainly hear that you have arrived. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Therefore do just what we tell you. We have four men who have taken a vow; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'take these men and purify yourself along with them, and pay their expenses [for the temple offerings] so that they may shave their heads. Then everyone will know that there is nothing to the things they have been told about you, but that you yourself also follow and keep the Law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But with regard to the Gentiles who have believed [in Christ], we have sent them a letter with our decision that they should abstain from meat sacrificed to idols and from [consuming] blood and from [the meat of] what has been strangled and from sexual immorality.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then Paul took the [four] men, and the next day he purified himself along with them [by submitting to the ritual]. He went into the temple to give notice of [the time] when the days of purification [ending each vow] would be fulfilled and the usual offering could be presented on behalf of each one.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul Seized in the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When the seven days [required to complete the ritual] were almost over, [some] Jews from [the province of] Asia [Minor], caught sight of him in the temple, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to stir up the crowd, and they seized him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'shouting, “Men of Israel, help us! This is the man who teaches all men everywhere against our people and the Law and this place. And besides, he has brought Greeks into the temple and has defiled this holy place.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For they had previously seen Trophimus the Ephesian in the city with Paul, and they assumed that he had brought the man into the temple [beyond the court of the Gentiles]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then the whole city was provoked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confused, and the people rushed together. They seized Paul and dragged him out of the temple, and immediately the gates were closed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Now while they were trying to kill him, word came to the commander of the [Roman] garrison that all Jerusalem was in a state of upheaval. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So he immediately took soldiers and centurions and ran down among them. When the people saw the commander and the soldiers, they stopped beating Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then the commander came up and arrested Paul, and ordered that he be bound with two chains. Then he asked who he was and what he had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But some in the crowd were shouting one thing and others something else; and since he could not determine the facts because of the uproar, he ordered that Paul be taken to the barracks [in the tower of Antonia]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'When Paul got to the steps, he was carried by the soldiers because of the violence of the mob; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: for the majority of the people kept following them, shouting, “Away with him! [Kill him!]”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Just as Paul was about to be taken into the barracks, he asked the commander, “May I say something to you?” And the man replied, “Do you know Greek? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then you are not [as I assumed] the Egyptian who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: before these days
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'some time ago stirred up a rebellion and led those 4,000 men of the Assassins out into the wilderness?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Paul said, “I am a Jew from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A major city located at the crossing of several ancient trade routes, Tarsus (Tarsos, Tarsisi) was also known for its literary schools which rivaled those located in Athens and Alexandria.
    marker-yv: yv-n
  - type: text
    text: 'Tarsus in Cilicia (Mersin Province, Turkey), a citizen of no insignificant city; and I beg you, allow me to speak to the people.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: When the commander had given him permission, Paul, standing on the steps, gestured with his hand to the people; and when there was a great hush, he spoke to them in the Hebrew dialect (Jewish Aramaic), saying,
