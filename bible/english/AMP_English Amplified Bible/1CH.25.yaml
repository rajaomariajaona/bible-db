    content: 'the twenty-first to Hothir, his sons and his relatives, twelve; '
  '29':
  - type: text
    content: 'the twenty-second to Giddalti, his sons and his relatives, twelve; '
  '3':
  - type: text
    content: 'Of Jeduthun, the sons of Jeduthun: Gedaliah, Zeri, Jeshaiah, Shimei, Hashabiah, and Mattithiah, six, under the direction of their father Jeduthun, who prophesied with the lyre in thanksgiving and praise to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'the twenty-third to Mahazioth, his sons and his relatives, twelve; '
  '31':
  - type: text
    content: the twenty-fourth to Romamti-ezer, his sons and his relatives, twelve.
  '4':
  - type: text
    content: 'Of Heman, the sons of Heman: Bukkiah, Mattaniah, Uzziel, Shebuel, Jerimoth, Hananiah, Hanani, Eliathah, Giddalti, Romamti-ezer, Joshbekashah, Mallothi, Hothir, and Mahazioth. '
  '5':
  - type: text
    content: 'All these [men] were the sons of Heman the king’s seer to '
  - type: note
    content: Lit lift up the horn.
  - type: text
    content: 'exalt him in accordance with the words of God; for God gave Heman fourteen sons and three daughters. [Ps 68:25] '
  '6':
  - type: text
    content: All these were under the direction of their father to sing in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', with cymbals, harps, and lyres, for the service of the house of God. Asaph, Jeduthun, and Heman were under the order '
  - type: text
    content: and
  - type: text
    content: ' direction of the king. '
  '7':
  - type: text
    content: So their number [who led the remainder of the 4,000], with their relatives who were trained in singing to the L
  - type: heading
    content: ord
  - type: text
    content: ', all who were skillful, was 288. [1 Chr 23:5]'
  - type: heading
    content: Divisions of Musicians
  '8':
  - type: text
    content: 'The musicians cast lots for their duties, everyone alike, the small (younger) as well as the great (older), the teacher '
  - type: text
    content: as well
  - type: text
    content: ' as the student.'
  '9':
  - type: text
    content: 'The first lot for Asaph fell to Joseph; the second to Gedaliah, to him, his relatives and his sons, twelve; '
