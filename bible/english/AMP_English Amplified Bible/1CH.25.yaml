      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'the fifteenth to Jeremoth, his sons and his relatives, twelve; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'the sixteenth to Hananiah, his sons and his relatives, twelve; '
  - type: usfm
