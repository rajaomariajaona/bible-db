  '1':
  - type: heading
    content: Number and Services of Musicians
  - type: text
    content: 'Moreover, David and the commanders of the army selected for the [temple] service some of the sons of Asaph, Heman, and Jeduthun, who were to '
  - type: note
    content: This was probably a form of praise and worship designed to declare God’s character and His truths with music and lyrics.
  - type: text
    content: 'prophesy with lyres, harps, and cymbals. The list of the musicians who performed their service was '
  - type: text
    content: 'as follows:'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'the third to Zaccur, his sons and his relatives, twelve; '
  '11':
  - type: text
    content: 'the fourth to Izri, his sons and his relatives, twelve; '
  '12':
  - type: text
    content: 'the fifth to Nethaniah, his sons and his relatives, twelve; '
  '13':
  - type: text
    content: 'the sixth to Bukkiah, his sons and his relatives, twelve; '
  '14':
  - type: text
    content: 'the seventh to Jesharelah, his sons and his relatives, twelve; '
  '15':
  - type: text
    content: 'the eighth to Jeshaiah, his sons and his relatives, twelve; '
  '16':
  - type: text
    content: 'the ninth to Mattaniah, his sons and his relatives, twelve; '
  '17':
  - type: text
    content: 'the tenth to Shimei, his sons and his relatives, twelve; '
  '18':
  - type: text
    content: 'the eleventh to Azarel, his sons and his relatives, twelve; '
  '19':
  - type: text
    content: 'the twelfth to Hashabiah, his sons and his relatives, twelve; '
  '2':
  - type: text
    content: 'Of the sons of Asaph: Zaccur, Joseph, Nethaniah, and Asharelah; the sons of Asaph were under the direction of Asaph, who prophesied '
  - type: note
    content: Control over prophecy is later affirmed by Paul (1 Cor 14:32); i.e. a prophet is not overcome by the Spirit to the point that he cannot control his actions. He can, for example, refrain from speaking, and in this case Asaph did not prophesy until ordered or given permission to do so by the king.
  - type: text
    content: 'under the '
  - type: note
    content: Lit hand.
  - type: text
    content: 'direction of the king. '
  '20':
  - type: text
    content: 'the thirteenth to Shubael, his sons and his relatives, twelve; '
  '21':
  - type: text
    content: 'the fourteenth to Mattithiah, his sons and his relatives, twelve; '
  '22':
  - type: text
    content: 'the fifteenth to Jeremoth, his sons and his relatives, twelve; '
