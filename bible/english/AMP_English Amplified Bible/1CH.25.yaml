  - type: usfm
    marker: it
    children:
    - type: text
      text: Number and Services of Musicians
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover, David and the commanders of the army selected for the [temple] service some of the sons of Asaph, Heman, and Jeduthun, who were to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was probably a form of praise and worship designed to declare God’s character and His truths with music and lyrics.
    marker-yv: yv-n
  - type: text
    text: 'prophesy with lyres, harps, and cymbals. The list of the musicians who performed their service was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'as follows:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Of the sons of Asaph: Zaccur, Joseph, Nethaniah, and Asharelah; the sons of Asaph were under the direction of Asaph, who prophesied '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Control over prophecy is later affirmed by Paul (1 Cor 14:32); i.e. a prophet is not overcome by the Spirit to the point that he cannot control his actions. He can, for example, refrain from speaking, and in this case Asaph did not prophesy until ordered or given permission to do so by the king.
    marker-yv: yv-n
  - type: text
    text: 'under the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hand
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'direction of the king. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Of Jeduthun, the sons of Jeduthun: Gedaliah, Zeri, Jeshaiah, Shimei, Hashabiah, and Mattithiah, six, under the direction of their father Jeduthun, who prophesied with the lyre in thanksgiving and praise to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Of Heman, the sons of Heman: Bukkiah, Mattaniah, Uzziel, Shebuel, Jerimoth, Hananiah, Hanani, Eliathah, Giddalti, Romamti-ezer, Joshbekashah, Mallothi, Hothir, and Mahazioth. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All these [men] were the sons of Heman the king’s seer to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lift up the horn
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'exalt him in accordance with the words of God; for God gave Heman fourteen sons and three daughters. [Ps 68:25] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: All these were under the direction of their father to sing in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', with cymbals, harps, and lyres, for the service of the house of God. Asaph, Jeduthun, and Heman were under the order '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' direction of the king. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So their number [who led the remainder of the 4,000], with their relatives who were trained in singing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', all who were skillful, was 288. [1 Chr 23:5]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Divisions of Musicians
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The musicians cast lots for their duties, everyone alike, the small (younger) as well as the great (older), the teacher '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as well
  - type: text
    text: ' as the student.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The first lot for Asaph fell to Joseph; the second to Gedaliah, to him, his relatives and his sons, twelve; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'the third to Zaccur, his sons and his relatives, twelve; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'the fourth to Izri, his sons and his relatives, twelve; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'the fifth to Nethaniah, his sons and his relatives, twelve; '
  - type: usfm
    marker: v
