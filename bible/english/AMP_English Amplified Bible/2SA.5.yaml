document_id: 2SA.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David King over All Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David had already been king of Judah at Hebron for more than seven years; now all the tribes recognize his kingship.
    marker-yv: yv-n
  - type: text
    text: 'all the tribes of Israel came to David at Hebron and said, “Behold, we are your bone and your flesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In times past, when Saul was king over us, it was you who led Israel out [to war] and brought Israel in [from battle]. And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' told you, ‘You shall shepherd My people Israel and be ruler over them.’ ” [1 Sam 15:27-29; 16:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So all the elders (tribal leaders) of Israel came to the king at Hebron, and King David made a covenant with them at Hebron before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; and they anointed him king over Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David was thirty years old when he became king, and he reigned forty years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: In Hebron he reigned over Judah seven years and six months, and in Jerusalem he reigned thirty-three years over all Israel and Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now the king and his men went to Jerusalem against the Jebusites, the inhabitants of the land, who said to David, “You shall not enter here, for the blind and the lame [even the weakest among us] will turn you away”; they thought, “David cannot come in here [because the walls are impenetrable].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nevertheless, David captured the stronghold (fortress) of Zion, that is, the City of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then David said on that day, “Whoever strikes the Jebusites, let him go up through the [underground] water shaft to strike the lame and the blind, who are detested by David’s soul [because of their arrogance].” So [for that reason] they say, “The blind or the lame (Jebusites) shall not come into the [royal] house [of Israel].” [1 Chr 11:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So David lived in the stronghold and called it the City of David. And he built all around [the surrounding area] from the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The exact nature of the Millo is unclear, but most scholars believe it was some sort of military fortification such as a tower, a citadel, a significant part of a wall or even an earth-fill or terraced rampart. It was located on the eastern side of the City of David. It was later repaired by King Hezekiah.
    marker-yv: yv-n
  - type: text
    text: 'Millo [fortification] and inward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: David became greater and greater, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of hosts (armies), was with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now Hiram the king of Tyre sent messengers to David with cedar trees, carpenters, and stonemasons; and they built a house (palace) for David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And David knew that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had established him as king over Israel, and that He had exalted his kingdom for His people Israel’s sake.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David took more '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 22:24.
    marker-yv: yv-n
  - type: text
    text: 'concubines and wives from Jerusalem, after he came from Hebron; and more sons and daughters were born to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And these are the names of those who were born to him in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ibhar, Elishua, Nepheg, Japhia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elishama, Eliada, and Eliphelet.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: War with the Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When the Philistines heard that David had been anointed king over Israel, all the Philistines went up to look for him, but he heard about it and went down to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Masada
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'stronghold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now the Philistines had come and spread out [for battle] in the Valley of Rephaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: David inquired of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “Shall I go up against the Philistines? Will You hand them over to me?” And the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to David, “Go up, for I will certainly hand them over to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So David came to Baal-perazim, and he defeated them there, and said, “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has broken through my enemies before me, like a breakthrough of water.” So he named that place Baal-perazim (master of breakthroughs). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The Philistines abandoned their [pagan] idols there, so David and his men took them away [to be burned].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The Philistines came up once again and spread out in the Valley of Rephaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When David inquired of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', He said, “You shall not go up, but circle around behind them and come at them in front of the balsam trees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And when you hear the sound of marching in the tops of the balsam trees, then you shall pay attention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' act promptly, for at that time the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will have gone out before you to strike the army of the Philistines.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: David did just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded him, and struck down the Philistines from Geba as far as Gezer.'
