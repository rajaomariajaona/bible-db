document_id: 2SA.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David King over All Israel
  - type: text
    content: 'Then '
  - type: note
    content: David had already been king of Judah at Hebron for more than seven years; now all the tribes recognize his kingship.
  - type: text
    content: 'all the tribes of Israel came to David at Hebron and said, “Behold, we are your bone and your flesh. '
  '10':
  - type: text
    content: David became greater and greater, for the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of hosts (armies), was with him.'
  '11':
  - type: text
    content: 'Now Hiram the king of Tyre sent messengers to David with cedar trees, carpenters, and stonemasons; and they built a house (palace) for David. '
  '12':
  - type: text
    content: And David knew that the L
  - type: heading
    content: ord
  - type: text
    content: ' had established him as king over Israel, and that He had exalted his kingdom for His people Israel’s sake.'
  '13':
  - type: text
    content: 'David took more '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: 'concubines and wives from Jerusalem, after he came from Hebron; and more sons and daughters were born to him. '
  '14':
  - type: text
    content: 'And these are the names of those who were born to him in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  '15':
  - type: text
    content: 'Ibhar, Elishua, Nepheg, Japhia, '
  '16':
  - type: text
    content: Elishama, Eliada, and Eliphelet.
  - type: heading
    content: War with the Philistines
  '17':
  - type: text
    content: 'When the Philistines heard that David had been anointed king over Israel, all the Philistines went up to look for him, but he heard about it and went down to the '
  - type: note
    content: Heb Masada.
  - type: text
    content: 'stronghold. '
  '18':
  - type: text
    content: 'Now the Philistines had come and spread out [for battle] in the Valley of Rephaim. '
  '19':
  - type: text
    content: David inquired of the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, “Shall I go up against the Philistines? Will You hand them over to me?” And the L'
  - type: heading
    content: ord
  - type: text
    content: ' said to David, “Go up, for I will certainly hand them over to you.” '
  '2':
  - type: text
    content: In times past, when Saul was king over us, it was you who led Israel out [to war] and brought Israel in [from battle]. And the L
  - type: heading
    content: ord
  - type: text
    content: ' told you, ‘You shall shepherd My people Israel and be ruler over them.’ ” [1 Sam 15:27-29; 16:1] '
  '20':
  - type: text
    content: So David came to Baal-perazim, and he defeated them there, and said, “The L
  - type: heading
    content: ord
  - type: text
    content: ' has broken through my enemies before me, like a breakthrough of water.” So he named that place Baal-perazim (master of breakthroughs). '
  '21':
  - type: text
    content: The Philistines abandoned their [pagan] idols there, so David and his men took them away [to be burned].
  '22':
  - type: text
    content: 'The Philistines came up once again and spread out in the Valley of Rephaim. '
  '23':
  - type: text
    content: When David inquired of the L
  - type: heading
    content: ord
  - type: text
    content: ', He said, “You shall not go up, but circle around behind them and come at them in front of the balsam trees. '
  '24':
  - type: text
    content: 'And when you hear the sound of marching in the tops of the balsam trees, then you shall pay attention '
  - type: text
    content: and
  - type: text
    content: ' act promptly, for at that time the L'
  - type: heading
    content: ord
  - type: text
    content: ' will have gone out before you to strike the army of the Philistines.” '
  '25':
  - type: text
    content: David did just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded him, and struck down the Philistines from Geba as far as Gezer.'
  '3':
  - type: text
    content: So all the elders (tribal leaders) of Israel came to the king at Hebron, and King David made a covenant with them at Hebron before the L
  - type: heading
    content: ord
  - type: text
    content: '; and they anointed him king over Israel. '
  '4':
  - type: text
    content: 'David was thirty years old when he became king, and he reigned forty years. '
  '5':
  - type: text
    content: In Hebron he reigned over Judah seven years and six months, and in Jerusalem he reigned thirty-three years over all Israel and Judah.
  '6':
  - type: text
    content: 'Now the king and his men went to Jerusalem against the Jebusites, the inhabitants of the land, who said to David, “You shall not enter here, for the blind and the lame [even the weakest among us] will turn you away”; they thought, “David cannot come in here [because the walls are impenetrable].” '
  '7':
  - type: text
    content: 'Nevertheless, David captured the stronghold (fortress) of Zion, that is, the City of David. '
  '8':
  - type: text
    content: 'Then David said on that day, “Whoever strikes the Jebusites, let him go up through the [underground] water shaft to strike the lame and the blind, who are detested by David’s soul [because of their arrogance].” So [for that reason] they say, “The blind or the lame (Jebusites) shall not come into the [royal] house [of Israel].” [1 Chr 11:6] '
  '9':
  - type: text
    content: 'So David lived in the stronghold and called it the City of David. And he built all around [the surrounding area] from the '
  - type: note
    content: The exact nature of the Millo is unclear, but most scholars believe it was some sort of military fortification such as a tower, a citadel, a significant part of a wall or even an earth-fill or terraced rampart. It was located on the eastern side of the City of David. It was later repaired by King Hezekiah.
  - type: text
    content: 'Millo [fortification] and inward. '
