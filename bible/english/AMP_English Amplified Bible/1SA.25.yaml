type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel’s Death
  - type: text
    content: Now Samuel died; and all Israel assembled and mourned for him, and they buried him at his house in Ramah. Then David left and went down to the Wilderness of Paran.
  - type: heading
    content: Nabal and Abigail
  '10':
  - type: text
    content: 'But Nabal answered David’s servants and said, “Who is David? And who is the son of Jesse? '
  - type: note
    content: Nabal was insulting David and his men by implying that as far as he was concerned, they could be nothing but runaway slaves.
  - type: text
    content: 'There are many servants today, each of whom is breaking away from his master. '
  '11':
  - type: text
    content: 'So should I take my bread and my water and my meat that I have slaughtered for my shearers, and give it to men when I do not know where they are from?” '
  '12':
  - type: text
    content: 'So David’s young men made their way back and returned; and they came and told him everything that was said [to them by Nabal]. '
  '13':
  - type: text
    content: 'David said to his men, “Each man put on your sword.” So each man put on his sword. David also put on his sword, and about four hundred men went up behind David while two hundred stayed '
  - type: text
    content: back
  - type: text
    content: ' with the provisions and supplies.'
  '14':
  - type: text
    content: 'But one of '
  - type: text
    content: Nabal’s
  - type: text
    content: ' young men told Abigail, Nabal’s wife, “Listen, David sent messengers out of the wilderness to bless (greet) our master, and he shouted at them [in contempt]. '
  '15':
  - type: text
    content: 'But '
  - type: text
    content: David’s
  - type: text
    content: ' men were very good to us, and we were not harmed '
  - type: text
    content: or
  - type: text
    content: ' treated badly, nor did we miss anything as long as we were with them, when we were in the fields. '
  '16':
  - type: text
    content: 'They were a wall [of protection] to us both night and day, all the time that we were with them tending the sheep. '
  '17':
  - type: text
    content: 'Now then, know this and consider what you should do, for evil is [already] planned against our master and against all his household; but he is such a '
  - type: note
    content: Lit son of Belial.
  - type: text
    content: 'worthless '
  - type: text
    content: and
  - type: text
    content: ' wicked man that one cannot speak [reasonably] to him.”'
  - type: heading
    content: Abigail Intercedes
  '18':
  - type: text
    content: 'Then Abigail hurried and took two hundred '
  - type: text
    content: loaves
  - type: text
    content: ' of bread, two jugs of wine, five sheep already prepared [for roasting], five measures of roasted grain, a hundred clusters of raisins, and two hundred cakes of figs, and loaded them on donkeys. '
  '19':
  - type: text
    content: 'She said to her young men (servants), “Go on ahead of me; behold, I am coming after you.” But she did not tell her husband Nabal. '
  '2':
  - type: text
    content: 'Now '
  - type: text
    content: there was
  - type: text
    content: ' a man in Maon whose business '
  - type: text
    content: and
  - type: text
    content: ' possessions were in Carmel; and the man was very rich. He had three thousand sheep and a thousand goats, and he was shearing his sheep in Carmel '
  '20':
  - type: text
    content: 'It happened that as she was riding on her donkey and coming down by [way of] the hidden part of the mountain, that suddenly David and his men were coming down toward her, and she met them. '
  '21':
  - type: text
    content: 'Now David had said, “Surely in vain I have protected '
  - type: text
    content: and
  - type: text
    content: ' guarded all that this man has in the wilderness, so that nothing was missing of all that belonged to him; and he has repaid me evil for good. '
  '22':
  - type: text
    content: 'May God do so to the enemies of David, and more also, if by morning I leave [alive] even one '
  - type: note
    content: Lit who urinates against a wall.
  - type: text
    content: male of any who belong to him.”
  '23':
  - type: text
    content: 'When Abigail saw David, she hurried and dismounted from the donkey, and '
  - type: note
    content: Lit fell.
  - type: text
    content: 'kneeled face downward before David and bowed down to the ground [in respect]. '
  '24':
  - type: note
    content: Lit Falling.
  - type: text
    content: 'Kneeling at his feet she said, “My lord, let the blame '
  - type: text
    content: and
  - type: text
    content: ' guilt be on me alone. And please let your maidservant speak '
  - type: note
    content: Lit in your ears.
  - type: text
    content: 'to you, and listen to the words of your maidservant. '
  '25':
  - type: text
    content: 'Please do not let my lord '
  - type: note
    content: Lit set his heart to.
  - type: text
    content: 'pay attention to this worthless man, Nabal, for as his name is, so is he. Nabal (fool) is his '
  - type: note
    content: Nabal means “worthless, good for nothing.”
  - type: text
    content: name and foolishness (stupidity) is with him; but I your maidservant did not see my lord’s young men whom you sent.
  '26':
  - type: text
    content: So now, my lord, as the L
  - type: heading
    content: ord
  - type: text
    content: ' lives, and as your soul lives, since the L'
  - type: heading
    content: ord
  - type: text
    content: ' has prevented you from shedding blood, and from avenging yourself by your own hand, now then let your enemies and those who seek to do evil to my lord, be as [self-destructive as] Nabal. '
  '27':
  - type: text
    content: 'Now this gift, which your maidservant has brought my lord, let it be given to the young men who '
  - type: note
    content: Lit walk at the feet of.
  - type: text
    content: 'accompany '
  - type: text
    content: and
  - type: text
    content: ' follow my lord. '
  '28':
  - type: text
    content: Please forgive the transgression of your maidservant; for the L
  - type: heading
    content: ord
  - type: text
    content: ' will certainly make my lord a secure '
  - type: text
    content: and
  - type: text
    content: ' enduring house, because my lord is fighting the battles of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and evil will not be found in you all your days. '
  '29':
  - type: text
    content: Should anyone rise up to pursue you and to seek your life, then the life of my lord will be bound in the [precious] bundle of the living with the L
  - type: heading
    content: ord
  - type: text
    content: ' your God; but the lives of your enemies—those He will hurl out as from the center of a sling. '
  '3':
  - type: text
    content: '(now the man’s name was Nabal and his wife’s name was Abigail. She was intelligent and beautiful in appearance, but the man was harsh and evil in his dealings; he was a '
  - type: note
    content: I.e. a descendant of Caleb.
  - type: text
    content: 'Calebite). '
  '30':
  - type: text
    content: And it will happen when the L
  - type: heading
    content: ord
  - type: text
    content: ' does for my lord according to all the good that He has spoken (promised) concerning you, and appoints you ruler over Israel, '
  '31':
  - type: text
    content: that this [incident] will not cause grief or [bring] a troubled conscience to my lord, both by having shed blood without cause and by my lord having avenged himself. When the L
  - type: heading
    content: ord
  - type: text
    content: ' deals well with my lord, then remember [with favor] your maidservant.”'
  '32':
  - type: text
    content: David said to Abigail, “Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, who sent you to meet me this day. '
  '33':
  - type: text
    content: 'And blessed be your discretion '
  - type: text
    content: and
  - type: text
    content: ' discernment, and blessed be you, who has kept me from bloodshed this day and from avenging myself by my own hand. '
  '34':
  - type: text
    content: Nevertheless, as the L
  - type: heading
    content: ord
  - type: text
    content: ' the God of Israel lives, who has prevented me from harming you, if you had not come quickly to meet me, most certainly by the morning light there would not have been left to Nabal so much as one male.” '
  '35':
  - type: text
    content: 'So David '
  - type: note
    content: Lit took from her hand.
  - type: text
    content: 'accepted what she had brought to him and said to her, “Go up to your house in peace. See, I have listened to you and have '
  - type: note
    content: Lit lifted up your face, an idiom used in various positive ways, probably based on the idea of a superior person permitting someone to look him in the eye.
  - type: text
    content: granted your request.”
  '36':
  - type: text
    content: 'Then Abigail came to Nabal, and he was holding a feast in his house [for the shearers], like the feast of a king. And Nabal’s '
  - type: note
    content: Lit heart.
  - type: text
    content: 'mood was joyous because he was very drunk; so she told him nothing at all until the morning light. '
  '37':
  - type: text
    content: 'But in the morning, when '
  - type: note
    content: Lit the wine had gone out of.
  - type: text
    content: 'Nabal was sober, and his wife told him these things, his '
  - type: note
    content: Nabal probably suffered a stroke.
  - type: text
    content: 'heart died within him and he became [paralyzed and helpless] like a stone. '
  '38':
  - type: text
    content: About ten days later, the L
  - type: heading
    content: ord
  - type: text
    content: ' struck Nabal and he died.'
  - type: heading
    content: David Marries Abigail
  '39':
  - type: text
    content: When David heard that Nabal was dead, he said, “Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ', who has pleaded the cause of my reproach [suffered] at the hand of Nabal and has kept His servant from [retaliating with] evil. For the Lord has returned the wickedness of Nabal on his own head.” Then David sent word to Abigail, proposing to take her as his wife. '
  '4':
  - type: text
    content: 'David heard in the wilderness that Nabal was shearing his sheep. '
  '40':
  - type: text
    content: 'When the servants of David came to Abigail at Carmel, they said to her, “David sent us to you to take you [to him] to be his wife.” '
  '41':
  - type: text
    content: 'And she stood and bowed with her face to the ground and said, “Behold, your maidservant is [ready to be] a maid to wash the feet of the servants of my lord.” '
  '42':
  - type: text
    content: 'Then Abigail quickly got up, and rode on a donkey, with five of her maidens who '
  - type: note
    content: Lit walked at her feet.
  - type: text
    content: attended her; and she followed the messengers of David and became his wife.
  '43':
  - type: text
    content: David had also taken Ahinoam of Jezreel, and they both became his wives.
  '44':
  - type: text
    content: But Saul had given Michal his [younger] daughter, David’s wife, to Palti the son of Laish, who was from Gallim.
  '5':
  - type: text
    content: 'So David sent ten young men; and David said to the young men, “Go up to Carmel and go to Nabal, and '
  - type: note
    content: Lit ask him of his peace (welfare). It was customary to greet someone by asking him of his welfare (Heb shalom), like “How are you?” However, David specifies the greeting in v 6 without the actual question, so the question here (v 5) is just a way of saying, “greet him.”
  - type: text
    content: 'greet him in my name; '
  '6':
  - type: text
    content: and this is what you shall say, ‘
  - type: note
    content: Lit To life!
  - type: text
    content: 'Have a long life! Peace be to you, and peace to your house, and peace to all that you have. '
  '7':
  - type: text
    content: 'Now I have heard that you have shearers. Now your shepherds have been with us and we have not harmed them, nor were they missing anything all the time they were in Carmel. '
  '8':
  - type: text
    content: 'Ask your young men and they will tell you. Therefore let my young men find favor in your sight [and be well-treated], for we have come on a '
  - type: note
    content: The time of shearing was a time of celebration and generosity.
  - type: text
    content: 'good (festive) day. '
  - type: note
    content: David and his men had given protection to Nabal’s flocks and shepherds, and it was appropriate for David to ask for compensation for this service.
  - type: text
    content: Please, give whatever you find at hand to your servants and to your son David.’ ”
  '9':
  - type: text
    content: 'When David’s young men came, they spoke to Nabal according to all these words in the name of David; then they waited. '
