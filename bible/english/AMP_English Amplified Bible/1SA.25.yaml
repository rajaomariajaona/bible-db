segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Samuel’s Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now Samuel died; and all Israel assembled and mourned for him, and they buried him at his house in Ramah. Then David left and went down to the Wilderness of Paran.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nabal and Abigail
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there was
  - type: text
    text: ' a man in Maon whose business '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' possessions were in Carmel; and the man was very rich. He had three thousand sheep and a thousand goats, and he was shearing his sheep in Carmel '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '(now the man’s name was Nabal and his wife’s name was Abigail. She was intelligent and beautiful in appearance, but the man was harsh and evil in his dealings; he was a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a descendant of Caleb.
    marker-yv: yv-n
  - type: text
    text: 'Calebite). '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David heard in the wilderness that Nabal was shearing his sheep. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So David sent ten young men; and David said to the young men, “Go up to Carmel and go to Nabal, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ask him of his peace
      - type: text
        text: ' (welfare). It was customary to greet someone by asking him of his welfare (Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shalom)
      - type: text
        text: ', like “How are you?” However, David specifies the greeting in v 6 without the actual question, so the question here (v 5) is just a way of saying, “greet him.”'
    marker-yv: yv-n
  - type: text
    text: 'greet him in my name; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and this is what you shall say, ‘
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: To life!
    marker-yv: yv-n
  - type: text
    text: 'Have a long life! Peace be to you, and peace to your house, and peace to all that you have. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now I have heard that you have shearers. Now your shepherds have been with us and we have not harmed them, nor were they missing anything all the time they were in Carmel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ask your young men and they will tell you. Therefore let my young men find favor in your sight [and be well-treated], for we have come on a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The time of shearing was a time of celebration and generosity.
    marker-yv: yv-n
  - type: text
    text: 'good (festive) day. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David and his men had given protection to Nabal’s flocks and shepherds, and it was appropriate for David to ask for compensation for this service.
    marker-yv: yv-n
  - type: text
    text: Please, give whatever you find at hand to your servants and to your son David.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When David’s young men came, they spoke to Nabal according to all these words in the name of David; then they waited. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But Nabal answered David’s servants and said, “Who is David? And who is the son of Jesse? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nabal was insulting David and his men by implying that as far as he was concerned, they could be nothing but runaway slaves.
    marker-yv: yv-n
  - type: text
    text: 'There are many servants today, each of whom is breaking away from his master. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So should I take my bread and my water and my meat that I have slaughtered for my shearers, and give it to men when I do not know where they are from?” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So David’s young men made their way back and returned; and they came and told him everything that was said [to them by Nabal]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David said to his men, “Each man put on your sword.” So each man put on his sword. David also put on his sword, and about four hundred men went up behind David while two hundred stayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: back
  - type: text
    text: ' with the provisions and supplies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But one of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nabal’s
  - type: text
    text: ' young men told Abigail, Nabal’s wife, “Listen, David sent messengers out of the wilderness to bless (greet) our master, and he shouted at them [in contempt]. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: David’s
  - type: text
    text: ' men were very good to us, and we were not harmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' treated badly, nor did we miss anything as long as we were with them, when we were in the fields. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They were a wall [of protection] to us both night and day, all the time that we were with them tending the sheep. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now then, know this and consider what you should do, for evil is [already] planned against our master and against all his household; but he is such a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: son of Belial.
    marker-yv: yv-n
  - type: text
    text: 'worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked man that one cannot speak [reasonably] to him.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abigail Intercedes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Abigail hurried and took two hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loaves
  - type: text
    text: ' of bread, two jugs of wine, five sheep already prepared [for roasting], five measures of roasted grain, a hundred clusters of raisins, and two hundred cakes of figs, and loaded them on donkeys. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'She said to her young men (servants), “Go on ahead of me; behold, I am coming after you.” But she did not tell her husband Nabal. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'It happened that as she was riding on her donkey and coming down by [way of] the hidden part of the mountain, that suddenly David and his men were coming down toward her, and she met them. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now David had said, “Surely in vain I have protected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guarded all that this man has in the wilderness, so that nothing was missing of all that belonged to him; and he has repaid me evil for good. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'May God do so to the enemies of David, and more also, if by morning I leave [alive] even one '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: who urinates against a wall
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: male of any who belong to him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When Abigail saw David, she hurried and dismounted from the donkey, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fell
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'kneeled face downward before David and bowed down to the ground [in respect]. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Falling.
    marker-yv: yv-n
  - type: text
    text: 'Kneeling at his feet she said, “My lord, let the blame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt be on me alone. And please let your maidservant speak '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in your ears.
    marker-yv: yv-n
  - type: text
    text: 'to you, and listen to the words of your maidservant. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Please do not let my lord '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: set his heart to
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'pay attention to this worthless man, Nabal, for as his name is, so is he. Nabal (fool) is his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:25 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Nabal
      - type: text
        text: ' means “worthless, good for nothing.”'
    marker-yv: yv-n
  - type: text
    text: name and foolishness (stupidity) is with him; but I your maidservant did not see my lord’s young men whom you sent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So now, my lord, as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, and as your soul lives, since the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has prevented you from shedding blood, and from avenging yourself by your own hand, now then let your enemies and those who seek to do evil to my lord, be as [self-destructive as] Nabal. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now this gift, which your maidservant has brought my lord, let it be given to the young men who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: walk at the feet of
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'accompany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' follow my lord. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Please forgive the transgression of your maidservant; for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will certainly make my lord a secure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enduring house, because my lord is fighting the battles of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and evil will not be found in you all your days. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Should anyone rise up to pursue you and to seek your life, then the life of my lord will be bound in the [precious] bundle of the living with the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; but the lives of your enemies—those He will hurl out as from the center of a sling. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And it will happen when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' does for my lord according to all the good that He has spoken (promised) concerning you, and appoints you ruler over Israel, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: that this [incident] will not cause grief or [bring] a troubled conscience to my lord, both by having shed blood without cause and by my lord having avenged himself. When the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' deals well with my lord, then remember [with favor] your maidservant.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: David said to Abigail, “Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, who sent you to meet me this day. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And blessed be your discretion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discernment, and blessed be you, who has kept me from bloodshed this day and from avenging myself by my own hand. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Nevertheless, as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' the God of Israel lives, who has prevented me from harming you, if you had not come quickly to meet me, most certainly by the morning light there would not have been left to Nabal so much as one male.” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'So David '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: took from her hand.
    marker-yv: yv-n
  - type: text
    text: 'accepted what she had brought to him and said to her, “Go up to your house in peace. See, I have listened to you and have '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lifted up your face,
      - type: text
        text: ' an idiom used in various positive ways, probably based on the idea of a superior person permitting someone to look him in the eye.'
    marker-yv: yv-n
  - type: text
    text: granted your request.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then Abigail came to Nabal, and he was holding a feast in his house [for the shearers], like the feast of a king. And Nabal’s '
