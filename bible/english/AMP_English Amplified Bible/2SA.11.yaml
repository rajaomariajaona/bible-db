document_id: 2SA.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Bathsheba, David’s Great Sin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then it happened in the spring, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. after the spring harvest provisions for the armies were plentiful.
    marker-yv: yv-n
  - type: text
    text: 'at the time when the kings go out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to battle,
  - type: text
    text: ' that David sent Joab and his servants with him, and all [the fighting men of] Israel, and they destroyed the Ammonites and besieged Rabbah. But David remained in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'One evening David got up from his couch and was walking on the [flat] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In middle eastern homes the roof was often used as a living space or patio.
    marker-yv: yv-n
  - type: text
    text: 'roof of the king’s palace, and from there he saw a woman bathing; and she was very beautiful in appearance. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' and inquired about the woman. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Someone
  - type: text
    text: ' said, “Is this not Bathsheba, the daughter of Eliam, the wife of Uriah the Hittite?” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David sent messengers and took her. When she came to him, he lay with her. And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This casual observation reflects the hypocrisy of David and Bathsheba’s sin. Evidently they both bathed and observed other ritual requirements of the Mosaic Law regarding sexual relations (Lev 15:18 etc.), as if that somehow mitigated the much graver sin of adultery. Both participants in adultery were to be punished by death (Lev 20:10).
    marker-yv: yv-n
  - type: text
    text: 'when she was purified from her uncleanness, she returned to her house. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The woman conceived; and she sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' and told David, “I am pregnant.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then David sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to Joab, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying
  - type: text
    text: ', “Send me Uriah the Hittite.” So Joab sent Uriah to David. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When Uriah came to him, David asked him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In each of these inquiries the noun '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shalom
      - type: text
        text: ' is used.'
    marker-yv: yv-n
  - type: text
    text: 'how Joab was, how the people were doing, and how the war was progressing. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then David said to Uriah, “Go down to your house, and wash your feet (spend time at home).” Uriah left the king’s palace, and a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word suggests food, but the actual nature of the gift is not specified.
    marker-yv: yv-n
  - type: text
    text: 'gift from the king was sent out after him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But Uriah slept at the entrance of the king’s palace with all the servants of his lord, and did not go down to his house. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When they told David, “Uriah did not go down to his house,” David said to Uriah, “Have you not [just] come from a [long] journey? Why did you not go to your house?” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Uriah said to David, “The ark and Israel and Judah are staying in huts (temporary shelters), and my lord Joab and the servants of my lord are camping in the open field. Should I go to my house to eat and drink and lie with my wife? By your life and the life of your soul, I will not do this thing.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then David said to Uriah, “Stay here today as well, and tomorrow I will let you leave.” So Uriah remained in Jerusalem that day and the next. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now David called him [to dinner], and he ate and drank with him, so that he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At this point David was hoping that Uriah’s drunkenness would make him forget his decision to stay with the troops, and that he would go home and have relations with his wife. David apparently thought that Bathsheba could later persuade Uriah that the child was his, even though she would be giving birth early.
    marker-yv: yv-n
  - type: text
    text: made Uriah drunk; in the evening he went out to lie on his bed with the servants of his lord, and [still] did not go down to his house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In the morning David wrote a letter to Joab and sent it '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: by the hand of.
    marker-yv: yv-n
  - type: text
    text: 'with Uriah. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He wrote in the letter, “Put Uriah in the front line of the heaviest fighting and leave him, so that he may be struck down and die.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So it happened that as Joab was besieging the city, he assigned Uriah to the place where he knew the [enemy’s] valiant men were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: positioned
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the men of the city came out and fought against Joab, and some of the people among the servants of David fell; Uriah the Hittite also died. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Joab sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' and informed David of all the events of the war. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he commanded the messenger, “When you have finished reporting all the events of the war to the king, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'then if the king becomes angry and he says to you, ‘Why did you go so near to the city to fight? Did you not know that they would shoot [arrows] from the wall? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Who killed Abimelech the son of Jerubbesheth (Gideon)? Was it not a woman who threw an upper millstone on him from the wall so that he died at Thebez? Why did you go so near the wall?’ Then you shall say, ‘Your servant Uriah the Hittite is also dead.’ ” [Judg 9:35, 53]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So the messenger left, and he came and told David everything that Joab had sent him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to report
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The messenger said to David, “The men indeed prevailed against us and came out to us in the field, but we were on them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pushed them as far as the entrance of the [city] gate. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the archers shot at your servants from the wall. Some of the king’s servants are dead, and your servant Uriah the Hittite is also dead.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then David said to the messenger, “Tell Joab this, ‘Do not let this thing disturb you, for the sword devours one [side] as well as another. Strengthen your battle against the city and overthrow it’; and so encourage Joab.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When Uriah’s wife [Bathsheba] heard that her husband Uriah was dead, she mourned for her husband. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when the time of mourning was past, David sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' and had her brought to his house, and she became his wife and bore him a son. But the thing that David had done [with Bathsheba] was evil in the sight of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
