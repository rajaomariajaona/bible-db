document_id: JER.16,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Distresses Foretold
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' also came to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Now when you tell these people all these words and they ask you, ‘Why has the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' decreed all this great tragedy against us? And what is our iniquity, what is the sin which we have committed against the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God?’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then you are to say to them, ‘It is because your fathers have abandoned (rejected) Me,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘and have walked after other gods and have served them and bowed down to the handmade idols and have abandoned (rejected) Me and have not kept My law, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and because you have done worse [things] than your fathers. Just look, every one of you walks in the stubbornness of his own evil heart, so that you do not listen [obediently] to Me. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore I will hurl you out of this land [of Judah] into the land [of the Babylonians] which neither you nor your fathers have known, and there you will serve other gods day and night, for I will show you no compassion.’
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Will Restore Them
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Therefore behold, the days are coming,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “when it will no longer be said, ‘As the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, who brought up the sons of Israel out of the land of Egypt,’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but, ‘As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, who brought up the sons of Israel from the land of the north and from all the countries to which He had driven them.’ And I will bring them back to their land which I gave to their fathers.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Behold (listen carefully), I will send for many fishermen,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “and they will fish for them; and afterward I will send for many hunters, and they will hunt them from every mountain and from every hill and out of the clefts of the rocks. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For My eyes are on all their ways; they are not hidden from My face, nor is their wickedness concealed from My eyes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will first doubly repay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punish them for their wickedness and their sin [before I return them to their land], because they have profaned My land; they have filled My inheritance with the carcasses of their detestable idols and with their abominations.”'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶[Then said Jeremiah] “O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', my Strength and my Stronghold,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And my Refuge in the day of distress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' need,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations will come to You
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the ends of the earth and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Our fathers have inherited nothing but lies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' illusion,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Worthless] things in which there is no benefit!’'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall not take a wife or have sons and daughters in this place (Jerusalem).” '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can a man make gods for himself?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such [things] are not gods!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Therefore,” [says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] “behold, I will make them know—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This time I will make them know
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My power and My might;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they will know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize [without any doubt] that My Name is the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' concerning the sons and daughters who are born in this place, and concerning the mothers who give birth to them, and the fathers who father them in this land: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “They will die of deadly diseases. They will not be mourned or buried; they will be like dung on the surface of the ground and come to an end by sword and famine, and their dead bodies will be food for the birds of the air and for the beasts of the earth.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Do not enter a house of mourning, nor go to lament (express grief) or bemoan [the dead], for I have taken My peace away from this people,” says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “even My lovingkindness and compassion. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Both great men and small will die in this land; they will not be buried, nor will they be lamented (mourned over with expressions of grief in death), nor will anyone cut himself or shave his head for them [in mourning]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: People
    - type: text
      text: ' will not offer food to the mourners, to comfort anyone [as they grieve] for the dead, nor give them a cup of consolation to drink for anyone’s father or mother. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you [Jeremiah] shall not go into a house of feasting to sit with them to eat and drink.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “Behold, I will remove from this place, before your very eyes and in your time, the sound of joy and the shout of gladness, the voice of the bridegroom and the voice of the bride.'
