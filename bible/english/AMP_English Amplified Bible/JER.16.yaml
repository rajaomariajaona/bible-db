document_id: JER.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Distresses Foretold
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' also came to me, saying, '
  '10':
  - type: text
    content: “Now when you tell these people all these words and they ask you, ‘Why has the L
  - type: heading
    content: ord
  - type: text
    content: ' decreed all this great tragedy against us? And what is our iniquity, what is the sin which we have committed against the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God?’ '
  '11':
  - type: text
    content: Then you are to say to them, ‘It is because your fathers have abandoned (rejected) Me,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘and have walked after other gods and have served them and bowed down to the handmade idols and have abandoned (rejected) Me and have not kept My law, '
  '12':
  - type: text
    content: 'and because you have done worse [things] than your fathers. Just look, every one of you walks in the stubbornness of his own evil heart, so that you do not listen [obediently] to Me. '
  '13':
  - type: text
    content: Therefore I will hurl you out of this land [of Judah] into the land [of the Babylonians] which neither you nor your fathers have known, and there you will serve other gods day and night, for I will show you no compassion.’
  - type: heading
    content: God Will Restore Them
  '14':
  - type: text
    content: “Therefore behold, the days are coming,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “when it will no longer be said, ‘As the L'
  - type: heading
    content: ord
  - type: text
    content: ' lives, who brought up the sons of Israel out of the land of Egypt,’ '
  '15':
  - type: text
    content: but, ‘As the L
  - type: heading
    content: ord
  - type: text
    content: ' lives, who brought up the sons of Israel from the land of the north and from all the countries to which He had driven them.’ And I will bring them back to their land which I gave to their fathers.'
  '16':
  - type: text
    content: “Behold (listen carefully), I will send for many fishermen,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “and they will fish for them; and afterward I will send for many hunters, and they will hunt them from every mountain and from every hill and out of the clefts of the rocks. '
  '17':
  - type: text
    content: 'For My eyes are on all their ways; they are not hidden from My face, nor is their wickedness concealed from My eyes. '
  '18':
  - type: text
    content: 'I will first doubly repay '
  - type: text
    content: and
  - type: text
    content: ' punish them for their wickedness and their sin [before I return them to their land], because they have profaned My land; they have filled My inheritance with the carcasses of their detestable idols and with their abominations.”'
  '19':
  - type: text
    content: ¶[Then said Jeremiah] “O L
  - type: heading
    content: ord
  - type: text
    content: ', my Strength and my Stronghold,'
  - type: text
    content: 'And my Refuge in the day of distress '
  - type: text
    content: and
  - type: text
    content: ' need,'
  - type: text
    content: The nations will come to You
  - type: text
    content: From the ends of the earth and say,
  - type: text
    content: '‘Our fathers have inherited nothing but lies '
  - type: text
    content: and
  - type: text
    content: ' illusion,'
  - type: text
    content: '[Worthless] things in which there is no benefit!’'
  '2':
  - type: text
    content: '“You shall not take a wife or have sons and daughters in this place (Jerusalem).” '
  '20':
  - type: text
    content: “Can a man make gods for himself?
  - type: text
    content: Such [things] are not gods!
  '21':
  - type: text
    content: ¶“Therefore,” [says the L
  - type: heading
    content: ord
  - type: text
    content: '] “behold, I will make them know—'
  - type: text
    content: This time I will make them know
  - type: text
    content: My power and My might;
  - type: text
    content: 'And they will know '
  - type: text
    content: and
  - type: text
    content: ' recognize [without any doubt] that My Name is the L'
  - type: heading
    content: ord
  - type: text
    content: .”
  '3':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' concerning the sons and daughters who are born in this place, and concerning the mothers who give birth to them, and the fathers who father them in this land: '
  '4':
  - type: text
    content: “They will die of deadly diseases. They will not be mourned or buried; they will be like dung on the surface of the ground and come to an end by sword and famine, and their dead bodies will be food for the birds of the air and for the beasts of the earth.”
  '5':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Do not enter a house of mourning, nor go to lament (express grief) or bemoan [the dead], for I have taken My peace away from this people,” says the L'
  - type: heading
    content: ord
  - type: text
    content: ', “even My lovingkindness and compassion. '
  '6':
  - type: text
    content: 'Both great men and small will die in this land; they will not be buried, nor will they be lamented (mourned over with expressions of grief in death), nor will anyone cut himself or shave his head for them [in mourning]. '
  '7':
  - type: text
    content: People
  - type: text
    content: ' will not offer food to the mourners, to comfort anyone [as they grieve] for the dead, nor give them a cup of consolation to drink for anyone’s father or mother. '
  '8':
  - type: text
    content: 'And you [Jeremiah] shall not go into a house of feasting to sit with them to eat and drink.” '
  '9':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “Behold, I will remove from this place, before your very eyes and in your time, the sound of joy and the shout of gladness, the voice of the bridegroom and the voice of the bride.'
