verses:
  '1':
  - type: heading
    content: The King’s Golden Image
  - type: text
    content: 'Nebuchadnezzar the king made a '
  - type: note
    content: Large images like this one were not made of solid gold.
  - type: text
    content: 'gold [-plated] image, whose height [including the pedestal] was sixty cubits (ninety feet) and its width six cubits (nine feet). He set it up on the plain of Dura in the province of Babylon. '
  '10':
  - type: text
    content: 'You, O king, have made a decree that everyone who hears the sound of the horn, pipe, lyre, trigon, harp, dulcimer, bagpipe, and all kinds of music is to fall down and worship the golden image. '
  '11':
  - type: text
    content: 'Whoever does not fall down and worship shall be thrown into the midst of a furnace of blazing fire. '
  '12':
  - type: text
    content: 'There are certain Jews whom you have appointed over the administration of the province of Babylon, '
  - type: text
    content: namely
  - type: text
    content: ' Shadrach, Meshach, and Abed-nego. These men, O king, pay no attention to you; they do not serve your gods or worship the golden image which you have set up.”'
  '13':
  - type: text
    content: 'Then Nebuchadnezzar in a furious rage gave a command to bring Shadrach, Meshach, and Abed-nego; and these men were brought before the king. '
  '14':
  - type: text
    content: 'Nebuchadnezzar said to them, “Is it true, Shadrach, Meshach, and Abed-nego, that you do not serve my gods or worship the golden image which I have set up? '
  '15':
  - type: text
    content: Now if you are ready, when you hear the sound of the horn, pipe, lyre, trigon, harp, dulcimer, and all kinds of music, to fall down and worship the image which I have made, very good. But if you do not worship, you shall be thrown at once into the midst of a furnace of blazing fire; and what god is there who can rescue you out of my hands?”
  '16':
  - type: text
    content: 'Shadrach, Meshach, and Abed-nego answered the king, “O Nebuchadnezzar, we do not need to answer you on this point. '
  '17':
  - type: text
    content: 'If it be so, our God whom we serve is able to rescue us from the furnace of blazing fire, and He will rescue us from your hand, O king. '
  '18':
  - type: text
    content: 'But even if '
  - type: text
    content: He does
  - type: text
    content: ' not, let it be known to you, O king, that we are not going to serve your gods or worship the golden image that you have set up!” [Job 13:15; Acts 4:19, 20]'
  - type: heading
    content: Daniel’s Friends Protected
  '19':
  - type: text
    content: 'Then Nebuchadnezzar was filled with fury, and his facial expression changed toward Shadrach, Meshach, and Abed-nego. Then he gave a command that the furnace was to be heated seven '
  - type: note
    content: I.e. units of intensity.
  - type: text
    content: 'times hotter than usual. '
  '2':
  - type: text
    content: 'Then Nebuchadnezzar the king sent '
  - type: text
    content: word
  - type: text
    content: ' to assemble the '
  - type: note
    content: The title of an official or governor designated by the king to rule over one or more provinces in the Median and Persian Empires. The authority granted to a satrap would be similar to that granted to a vassal prince and required that he submit regular written reports to the king through one of his chief commissioners. The satrap did not have authority over military personnel stationed in his provinces.
  - type: text
    content: 'satraps, the prefects and the governors, the counselors, the treasurers, the judges, the magistrates '
  - type: text
    content: and
  - type: text
    content: ' lawyers and all the chief officials of the provinces to come to the dedication of the image that King Nebuchadnezzar had set up. '
  '20':
  - type: text
    content: 'He commanded certain strong men in his army to tie up Shadrach, Meshach, and Abed-nego and to throw them into the furnace of blazing fire. '
  '21':
  - type: text
    content: 'Then these [three] men were tied up in their trousers, their coats, their turbans, and their other clothes, and were thrown into the midst of the furnace of blazing fire. '
  '22':
  - type: text
    content: 'Because the king’s command was urgent and the furnace was extremely hot, the flame of the fire killed the men who carried up Shadrach, Meshach, and Abed-nego. '
  '23':
  - type: text
    content: 'But these three men, Shadrach, Meshach, and Abed-nego, fell into the midst of the furnace of blazing fire '
  - type: text
    content: still
  - type: text
    content: ' tied up.'
  '24':
  - type: text
    content: 'Then Nebuchadnezzar the king [looked and] was astounded, and he jumped up and said to his counselors, “Did we not throw three men who were tied up into the midst of the fire?” They replied to the king, “Certainly, O king.” '
  '25':
  - type: text
    content: 'He answered, “Look! I see four men untied, walking around in the midst of the fire, and they are not hurt! And the appearance of the fourth is like '
  - type: note
    content: The KJV has “the Son of God” here, referring to the pre-incarnate Christ, because the usual term for God is Elohim, a plural form. Even if it was the pre-incarnate Christ, however, the pagan king would not have had Him in mind but a “son” of the Babylonian gods, perhaps a minor deity or an angel. The ancient rabbis of course would have fought any attempts by Christians to equate the fourth person in the furnace with the Son of God, so they portrayed God as turning Nebuchadnezzar over to Satan for punishment for the words he exclaimed here, as if he did in fact say “Son of God,” and they made out v 28 to be a confession on the king’s part that what he saw was after all just an angel.
  - type: text
    content: 'a son of the gods!” [Phil 2:5-8] '
  '26':
  - type: text
    content: 'Then Nebuchadnezzar approached the door of the blazing furnace and said, “Shadrach, Meshach, and Abed-nego, servants of the Most High God, come out [of there]! Come here!” Then Shadrach, Meshach, and Abed-nego came out of the midst of the fire. '
  '27':
  - type: text
    content: 'The satraps, the prefects, the governors and the king’s counselors gathered around them and saw that in regard to these men the fire had no effect on their bodies—their hair was not singed, their clothes were not scorched '
  - type: text
    content: or
  - type: text
    content: ' damaged, even the smell of smoke was not on them.'
  '28':
  - type: text
    content: 'Nebuchadnezzar responded and said, “Blessed be the God of Shadrach, Meshach, and Abed-nego, who has sent His angel and rescued His servants who believed in, trusted in, '
  - type: text
    content: and
  - type: text
    content: ' relied on Him! They violated the king’s command and surrendered their bodies rather than serve or worship any god except their own God. '
  '29':
  - type: text
    content: 'Therefore I make a decree that any people, nation, or language that speaks anything offensive against the God of Shadrach, Meshach, and Abed-nego shall be cut into pieces and their houses be made a heap of rubbish, for there is no other god who is able to save in this way!” '
  '3':
  - type: text
    content: 'Then the satraps, the prefects, the governors, the counselors, the treasurers, the judges, the magistrates '
  - type: text
    content: and
  - type: text
    content: ' lawyers, and all the chief officials of the provinces gathered together for the dedication of the image that King Nebuchadnezzar had set up; and they stood before it. '
  '30':
  - type: text
    content: Then the king caused Shadrach, Meshach, and Abed-nego to prosper in the province of Babylon.
  '4':
  - type: text
    content: 'Then the herald loudly proclaimed, “You are commanded, O peoples, nations, and '
  - type: text
    content: speakers of every
  - type: text
    content: ' language, '
  '5':
  - type: text
    content: 'that at the moment you hear the sound of the horn, pipe, lyre, trigon (four-stringed harp), dulcimer, bagpipe, and all kinds of music, you are to fall down and worship the golden image that King Nebuchadnezzar has set up. '
  '6':
  - type: text
    content: 'Whoever does not fall down and worship shall immediately be thrown into the midst of a furnace of blazing fire.” '
  '7':
  - type: text
    content: 'So when the people heard the sound of the horn, pipe, lyre, trigon, dulcimer, bagpipe and all kinds of music, all the peoples, nations, and '
  - type: text
    content: speakers of every
  - type: text
    content: ' language fell down and worshiped the golden image that Nebuchadnezzar the king had set up.'
  - type: heading
    content: Worship of the Image Refused
  '8':
  - type: text
    content: 'At that time certain Chaldeans came forward and brought [malicious] accusations against the Jews. '
  '9':
  - type: text
    content: 'They said to King Nebuchadnezzar, “O king, live forever! '
