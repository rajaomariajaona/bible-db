verses:
  '1':
  - type: heading
    content: The Prophetic Call to Samuel
  - type: text
    content: Now the boy Samuel was attending to the service of the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: note
    content: Lit before.
  - type: text
    content: under the supervision of Eli. The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' was rare '
  - type: text
    content: and
  - type: text
    content: ' precious in those days; visions [that is, new revelations of divine truth] were not widespread.'
  '10':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' came and stood and called as at the previous times, “Samuel! Samuel!” Then Samuel answered, “Speak, for Your servant is listening.” '
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Samuel, “Behold, I am about to do a thing in Israel at which both ears of everyone who hears it will ring. '
  '12':
  - type: text
    content: 'On that day I will carry out against Eli everything that I have spoken concerning his house (family), from beginning to end. '
  '13':
  - type: text
    content: 'Now I have told him that I am about to judge his house forever for the sinful behavior which he knew [was happening], because his sons were bringing a curse on themselves [dishonoring and blaspheming God] and he did not rebuke them. '
  '14':
  - type: text
    content: Therefore I have sworn to the house of Eli that the sinful behavior of Eli’s house (family) shall not be atoned for by sacrifice or offering forever.”
  '15':
  - type: text
    content: So Samuel lay down until morning. Then he opened the doors of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' house. But Samuel was afraid to tell the vision to Eli. '
  '16':
  - type: text
    content: 'But Eli called Samuel and said, “Samuel, my son.” And he answered, “Here I am.” '
  '17':
  - type: text
    content: 'Then Eli said, “What is it that He said to you? Please do not hide it from me. May God do the same to you, and more also, if you hide from me anything of all that He said to you.” '
  '18':
  - type: text
    content: So Samuel told him everything, hiding nothing from him. And Eli said, “It is the L
  - type: heading
    content: ord
  - type: text
    content: '; may He do what seems good '
  - type: note
    content: Lit in His eyes.
  - type: text
    content: to Him.”
  '19':
  - type: text
    content: Now Samuel grew; and the L
  - type: heading
    content: ord
  - type: text
    content: ' was with him and He let none of his words '
  - type: note
    content: Lit fall to the ground.
  - type: text
    content: 'fail [to be fulfilled]. [Josh 23:14] '
  '2':
  - type: text
    content: 'Yet it happened at that time, as Eli was lying down in his own place (now his eyesight had begun to grow dim and he could not see '
  - type: text
    content: well
  - type: text
    content: '). '
  '20':
  - type: text
    content: And all Israel from Dan [in the north] to Beersheba [in the south] knew that Samuel was appointed as a prophet of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '21':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' continued to appear in Shiloh, for the L'
  - type: heading
    content: ord
  - type: text
    content: ' revealed Himself to Samuel in Shiloh by the word of the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '3':
  - type: text
    content: and the [oil] lamp of God had not yet gone out, and Samuel was lying down in the temple of the L
  - type: heading
    content: ord
  - type: text
    content: ', where the ark of God was, '
  '4':
  - type: text
    content: that the L
  - type: heading
    content: ord
  - type: text
    content: ' called Samuel, and he answered, “Here I am.” '
  '5':
  - type: text
    content: 'He ran to Eli and said, “Here I am, for you called me.” But Eli said, “I did not call you; lie down again.” So he went and lay down. '
  '6':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' called yet again, “Samuel!” So Samuel got up and went to Eli and said, “Here I am, for you called me.” But Eli answered, “I did not call, my son; lie down again.” '
  '7':
  - type: text
    content: Now Samuel did not yet know [or personally experience] the L
  - type: heading
    content: ord
  - type: text
    content: ', and the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' was not yet revealed [directly] to him. '
  '8':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' called Samuel a third time. And he stood and went to Eli and said, “Here I am, for you did call me.” Then Eli understood that it was the L'
  - type: heading
    content: ord
  - type: text
    content: ' [who was] calling the boy. '
  '9':
  - type: text
    content: So Eli said to Samuel, “Go, lie down, and it shall be that if He calls you, you shall say, ‘Speak, L
  - type: heading
    content: ord
  - type: text
    content: ', for Your servant is listening.’ ” So Samuel went and lay down in his place.'
