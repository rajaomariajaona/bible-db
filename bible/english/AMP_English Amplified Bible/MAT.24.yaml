  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be careful that no one misleads you
  - type: text
    text: ' [deceiving you and leading you into error]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For many will come in My name
  - type: text
    text: ' [misusing it, and appropriating the strength of the name which belongs to Me], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: saying, ‘I am the Christ (the Messiah, the Anointed),’ and they will mislead many.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'You will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' hear of wars and rumors of wars. See that you are not frightened, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those things
    - type: text
      text: ' must take place, but that is not yet the end'
  - type: text
    text: ' [of the age]. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
