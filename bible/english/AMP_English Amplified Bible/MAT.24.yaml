    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus left the temple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: area
  - type: text
    text: ' and was going on His way when His disciples came up to Him to call His attention to the [magnificent and massive] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The massive size and polished surfaces of the fitted stones that formed the temple structure created a magnificent sight (cf Luke 21:5). The refurbishing of the temple was begun by Herod the Great in 20 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. and was completed in '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: '. 64 by Herod Agrippa II. The rabbis had a saying: “Whoever has not seen the temple of Herod has never seen a beautiful building” (as quoted from the Talmud). They also said that Herod built it of yellow, white, and perhaps blue marble; and that he intended to cover it with gold, but the rabbis advised him not to because it was beautiful just as it was, looking like the waves of the sea.'
    marker-yv: yv-n
  - type: text
    text: 'buildings of the temple. [Mark 13; Luke 21:5-36] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Do you see all these things? I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, not one stone here will be left on another, which will not be torn down.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: While Jesus was seated on the Mount of Olives, the disciples came to Him privately, and said, “Tell us, when will this [destruction of the temple] take place, and what will be the sign of Your coming, and of the end (completion, consummation) of the age?”
