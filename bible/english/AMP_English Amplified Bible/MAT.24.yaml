  - type: note
    content: The Greek for “vultures” can also be translated “eagles,” but the reference is most likely to the vulture, which the Greek word includes with eagles as a class. The meaning of this much discussed verse is either that the corpse represents the returning Christ, whose appearance will attract the attention of the entire world, that is, the vultures; or that the corrupt world is the corpse, about to be judged by the returning Christ (Rev 19:18).
