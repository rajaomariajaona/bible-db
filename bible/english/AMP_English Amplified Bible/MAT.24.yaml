    children:
    - type: text
      text: 'But all these things are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: merely
    - type: text
      text: ' the beginning of birth pangs'
  - type: text
    text: ' [of the intolerable anguish and the time of unprecedented trouble].'
