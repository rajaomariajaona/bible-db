  '1':
  - type: heading
    content: Signs of Christ’s Return
  - type: text
    content: 'Jesus left the temple '
  - type: text
    content: area
  - type: text
    content: ' and was going on His way when His disciples came up to Him to call His attention to the [magnificent and massive] '
  - type: note
    content: 'The massive size and polished surfaces of the fitted stones that formed the temple structure created a magnificent sight (cf Luke 21:5). The refurbishing of the temple was begun by Herod the Great in 20 b.c. and was completed in a.d. 64 by Herod Agrippa II. The rabbis had a saying: “Whoever has not seen the temple of Herod has never seen a beautiful building” (as quoted from the Talmud). They also said that Herod built it of yellow, white, and perhaps blue marble; and that he intended to cover it with gold, but the rabbis advised him not to because it was beautiful just as it was, looking like the waves of the sea.'
  - type: text
    content: 'buildings of the temple. [Mark 13; Luke 21:5-36] '
