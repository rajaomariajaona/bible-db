document_id: DEU.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Portion of the Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The Levitical priests, the entire tribe of Levi, shall own [privately] no portion [of land] or inheritance with Israel; they shall eat the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' offerings by fire and His portion. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There shall not be found among you anyone who makes his son or daughter pass through the fire [as a sacrifice], one who uses divination '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortune-telling, one who practices witchcraft, or one who interprets omens, or a sorcerer, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or one who casts a charm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' spell, or a medium, or a spiritist, or a necromancer [who seeks the dead]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For everyone who does these things is utterly repulsive to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; and because of these detestable practices the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is driving them out before you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall be blameless (complete, perfect) before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For these nations which you shall dispossess listen to those who practice witchcraft and to diviners '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortune-tellers, but as for you, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has not allowed you to do so.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God will raise up for you a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Prophet,
        - type: text
          text: ' if this is a prophetic reference to Jesus.'
      marker-yv: yv-n
    - type: text
      text: 'prophet like me [Moses] from among you, from your countrymen (brothers, brethren). You shall listen to him. [Matt 21:11; John 1:21] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is according to all that you asked of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God at Horeb (Mount Sinai) on the day of the assembly, saying, ‘Let me not hear the voice of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God again, nor see this great fire anymore, so that I will not die.’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, ‘They have spoken well. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will raise up a prophet from among their countrymen like you, and I will put My words in his mouth, and he shall speak to them all that I command him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall come about that whoever will not listen to My words which he shall speak in My name, I Myself will require it of him [and there will be consequences]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They shall have no inheritance [of land] among their countrymen (brothers, brethren); the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is their '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Certain towns and grazing lands were designated for the Levites’ use, as well as portions of the tithes and sacrifices of the people.
      marker-yv: yv-n
    - type: text
      text: inheritance, as He promised them.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the prophet who presumes to speak a word in My name which I have not commanded him to speak, or which he speaks in the name of other gods—that prophet shall die.’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you say in your heart, ‘How will we know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize the word which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has not spoken?’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When a prophet speaks in the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and the thing does not happen or come true, that is the thing which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has not spoken. The prophet has spoken it presumptuously; you shall not be afraid of him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now this shall be the priests’ portion from the people, from those offering a sacrifice, either an ox or a sheep: they shall give to the priest the shoulder and the two cheeks and the stomach. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall also give him the first fruits of your grain, your new wine [the first of the season], and your [olive] oil, and the first sheared fleece of your sheep. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has chosen him, him and his sons from all your tribes, to stand and serve in the name of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' forever.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now if a Levite comes from any of your cities throughout Israel where he resides, and comes whenever '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: it pleases his soul
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: he wishes to [the sanctuary] the place which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' chooses; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then he shall serve in the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God, like all his fellow Levites who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The literal Hebrew here is “stand before the face of,” and in this context it implies “stand ready to serve.”
      marker-yv: yv-n
    - type: text
      text: stand there before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They were to share equally in the benefits of the priesthood.
      marker-yv: yv-n
    - type: text
      text: 'equal portions to eat, except '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what they receive
    - type: text
      text: ' from the sale of their fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: estates
    - type: text
      text: . [Jer 32:6-15]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Spiritism Forbidden
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “When you enter the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is giving you, you shall not learn to imitate the detestable (repulsive) practices of those nations. '
