document_id: NEH.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Priests and Levites who Returned to Jerusalem with Zerubbabel
  - type: text
    content: 'Now these are the priests and Levites who came up with Zerubbabel the son of Shealtiel and with Jeshua: Seraiah, Jeremiah, Ezra, '
  '10':
  - type: text
    content: 'Now Jeshua became the father of Joiakim, Joiakim of Eliashib, Eliashib of Joiada, '
  '11':
  - type: text
    content: and Joiada became the father of Jonathan, and Jonathan of Jaddua.
  '12':
  - type: text
    content: 'And in the days of Joiakim, the priests, the heads of fathers’ '
  - type: text
    content: households
  - type: text
    content: ' were: of Seraiah, Meraiah; of Jeremiah, Hananiah; '
  '13':
  - type: text
    content: 'of Ezra, Meshullam; of Amariah, Jehohanan; '
  '14':
  - type: text
    content: 'of '
  - type: note
    content: I.e. Malluch in v 2.
  - type: text
    content: 'Malluchi, Jonathan; of Shebaniah, Joseph; '
  '15':
  - type: text
    content: 'of Harim, Adna; of Meraioth, Helkai; '
  '16':
  - type: text
    content: 'of Iddo, Zechariah; of Ginnethon, Meshullam; '
  '17':
  - type: text
    content: 'of Abijah, Zichri; of Miniamin and of Moadiah, Piltai; '
  '18':
  - type: text
    content: 'of Bilgah, Shammua; of Shemaiah, Jehonathan; '
  '19':
  - type: text
    content: 'of Joiarib, Mattenai; of Jedaiah, Uzzi; '
  '2':
  - type: text
    content: 'Amariah, Malluch, Hattush, '
  '20':
  - type: text
    content: 'of Sallai, Kallai; of Amok, Eber; '
  '21':
  - type: text
    content: of Hilkiah, Hashabiah; of Jedaiah, Nethanel.
  - type: heading
    content: The Chief Levites
  '22':
  - type: text
    content: 'As for the Levites in the days of Eliashib, Joiada, Johanan, and Jaddua, the heads of fathers’ '
  - type: text
    content: households
  - type: text
    content: ' were registered; so were the priests, during the reign of Darius the Persian. '
  '23':
  - type: text
    content: 'The sons of Levi, heads of fathers’ '
  - type: text
    content: households
  - type: text
    content: ', were recorded in the Book of the Chronicles until the days of Johanan the son of Eliashib. '
  '24':
  - type: text
    content: 'The heads of the Levites were Hashabiah, Sherebiah, and Jeshua the son of Kadmiel, and their brothers opposite them, to praise and to give thanks, as commanded by David the man of God, [one] division [singing] in response to [the men in the opposite] division. '
  '25':
  - type: text
    content: 'Mattaniah, Bakbukiah, Obadiah, Meshullam, Talmon, and Akkub were gatekeepers keeping watch at the storehouses of the gates. '
  '26':
  - type: text
    content: 'These men '
  - type: text
    content: served
  - type: text
    content: ' in the days of Joiakim the son of Jeshua, the son of Jozadak, and in the days of Nehemiah the governor and Ezra the priest and scribe.'
  - type: heading
    content: Dedication of the Wall
  '27':
  - type: text
    content: 'Now at the dedication of the wall of Jerusalem they sought out the Levites from all their places in order to bring them to Jerusalem to celebrate the dedication with gladness, with hymns of thanksgiving, and with songs '
  - type: text
    content: to the accompaniment
  - type: text
    content: ' of cymbals, harps, and lyres. '
  '28':
  - type: text
    content: 'So the sons of the singers gathered together from the district around Jerusalem, and from the villages of the Netophathites, '
  '29':
  - type: text
    content: 'from Beth-gilgal and from the fields of Geba and Azmaveth, for the singers had built villages for themselves around Jerusalem. '
  '3':
  - type: text
    content: 'Shecaniah, Rehum, Meremoth, '
  '30':
  - type: text
    content: The priests and the Levites purified themselves; they also purified the people, the gates, and the wall.
  - type: heading
    content: Procedures for the Temple
  '31':
  - type: text
    content: 'Then I had the leaders of Judah come up on the wall, and I appointed two large thanksgiving choirs, the first one proceeding to the right on top of the wall toward the Refuse Gate. '
  '32':
  - type: text
    content: 'Hoshaiah and half of the leaders of Judah followed them, '
  '33':
  - type: text
    content: 'with Azariah, Ezra, Meshullam, '
  '34':
  - type: text
    content: 'Judah, Benjamin, Shemaiah, and Jeremiah, '
  '35':
  - type: text
    content: 'and some of the priests’ sons with trumpets, and Zechariah the son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Micaiah, the son of Zaccur, the son of Asaph, '
  '36':
  - type: text
    content: 'and his brothers, Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani, with the musical instruments of David the man of God. And Ezra the scribe went in front of them. '
  '37':
  - type: text
    content: At the Fountain Gate they went directly up the steps of the City of David by the stairway of the wall above David’s house to the Water Gate on the east.
  '38':
  - type: text
    content: 'The second '
  - type: note
    content: Lit thanksgiving choir.
  - type: text
    content: 'choir went to the left; I followed with half of the people on the wall, above the Tower of the Furnaces, to the Broad Wall, '
  '39':
  - type: text
    content: 'and above the Gate of Ephraim, and by the Old Gate, by the Fish Gate, by the Tower of Hananel and the Tower of the Hundred, as far as the Sheep Gate; and they stopped at the Gate of the Guard. '
  '4':
  - type: text
    content: 'Iddo, Ginnethoi, Abijah, '
  '40':
  - type: text
    content: 'Then the two choirs stood in the house of God. So did I, and half of the officials with me; '
  '41':
  - type: text
    content: 'and the priests Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah and Hananiah, with trumpets; '
  '42':
  - type: text
    content: 'and Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malchijah, Elam, and Ezer. And the singers sang, with Jezrahiah as their leader. '
  '43':
  - type: text
    content: Also on that day they offered great sacrifices and rejoiced because God had given them great joy; the women and children also rejoiced, so that the joy of Jerusalem was heard from far away.
  '44':
  - type: text
    content: 'On that day men were appointed over the chambers for the stores, the contributions, the first fruits, and the tithes, to gather into them from the fields of the cities the portions required by the law for the priests and the Levites; for Judah rejoiced over the priests and Levites who served. '
  '45':
  - type: text
    content: 'And they performed the worship of their God and the service of purification; so did the singers and gatekeepers, as David and his son Solomon had commanded. '
  '46':
  - type: text
    content: 'For in the days of David and Asaph, in ancient times, there were leaders of singers, songs of praise and hymns of thanksgiving to God. '
  '47':
  - type: text
    content: 'So in the days of Zerubbabel and [later of] Nehemiah, all Israel would give the daily portions for the singers and the gatekeepers; and they set apart the consecrated '
  - type: text
    content: portion
  - type: text
    content: ' for the Levites, and the Levites set apart the consecrated '
  - type: text
    content: portion
  - type: text
    content: ' for the sons of Aaron [the priests].'
  '5':
  - type: text
    content: 'Mijamin, Maadiah, Bilgah, '
  '6':
  - type: text
    content: 'Shemaiah, Joiarib, Jedaiah, '
  '7':
  - type: text
    content: 'Sallu, Amok, Hilkiah, and Jedaiah. These were the heads of the priests and their '
  - type: note
    content: Lit brothers.
  - type: text
    content: kinsman in the days of Jeshua.
  '8':
  - type: text
    content: 'The Levites were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah who was in charge of the songs of thanksgiving '
  - type: text
    content: and
  - type: text
    content: ' praise, he and his brothers. '
  '9':
  - type: text
    content: 'Also Bakbukiah and Unni, their brothers, stood opposite them in their divisions of service. '
