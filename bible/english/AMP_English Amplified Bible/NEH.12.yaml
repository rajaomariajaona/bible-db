document_id: NEH.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Priests and Levites who Returned to Jerusalem with Zerubbabel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now these are the priests and Levites who came up with Zerubbabel the son of Shealtiel and with Jeshua: Seraiah, Jeremiah, Ezra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now Jeshua became the father of Joiakim, Joiakim of Eliashib, Eliashib of Joiada, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: and Joiada became the father of Jonathan, and Jonathan of Jaddua.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And in the days of Joiakim, the priests, the heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' were: of Seraiah, Meraiah; of Jeremiah, Hananiah; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'of Ezra, Meshullam; of Amariah, Jehohanan; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I.e. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Malluch
        - type: text
          text: ' in v 2.'
      marker-yv: yv-n
    - type: text
      text: 'Malluchi, Jonathan; of Shebaniah, Joseph; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'of Harim, Adna; of Meraioth, Helkai; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'of Iddo, Zechariah; of Ginnethon, Meshullam; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'of Abijah, Zichri; of Miniamin and of Moadiah, Piltai; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'of Bilgah, Shammua; of Shemaiah, Jehonathan; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'of Joiarib, Mattenai; of Jedaiah, Uzzi; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Amariah, Malluch, Hattush, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'of Sallai, Kallai; of Amok, Eber; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: of Hilkiah, Hashabiah; of Jedaiah, Nethanel.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Chief Levites
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'As for the Levites in the days of Eliashib, Joiada, Johanan, and Jaddua, the heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' were registered; so were the priests, during the reign of Darius the Persian. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The sons of Levi, heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ', were recorded in the Book of the Chronicles until the days of Johanan the son of Eliashib. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The heads of the Levites were Hashabiah, Sherebiah, and Jeshua the son of Kadmiel, and their brothers opposite them, to praise and to give thanks, as commanded by David the man of God, [one] division [singing] in response to [the men in the opposite] division. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mattaniah, Bakbukiah, Obadiah, Meshullam, Talmon, and Akkub were gatekeepers keeping watch at the storehouses of the gates. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'These men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: served
    - type: text
      text: ' in the days of Joiakim the son of Jeshua, the son of Jozadak, and in the days of Nehemiah the governor and Ezra the priest and scribe.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dedication of the Wall
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Now at the dedication of the wall of Jerusalem they sought out the Levites from all their places in order to bring them to Jerusalem to celebrate the dedication with gladness, with hymns of thanksgiving, and with songs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to the accompaniment
    - type: text
      text: ' of cymbals, harps, and lyres. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So the sons of the singers gathered together from the district around Jerusalem, and from the villages of the Netophathites, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'from Beth-gilgal and from the fields of Geba and Azmaveth, for the singers had built villages for themselves around Jerusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Shecaniah, Rehum, Meremoth, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The priests and the Levites purified themselves; they also purified the people, the gates, and the wall.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Procedures for the Temple
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then I had the leaders of Judah come up on the wall, and I appointed two large thanksgiving choirs, the first one proceeding to the right on top of the wall toward the Refuse Gate. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Hoshaiah and half of the leaders of Judah followed them, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'with Azariah, Ezra, Meshullam, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Judah, Benjamin, Shemaiah, and Jeremiah, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'and some of the priests’ sons with trumpets, and Zechariah the son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Micaiah, the son of Zaccur, the son of Asaph, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'and his brothers, Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani, with the musical instruments of David the man of God. And Ezra the scribe went in front of them. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: At the Fountain Gate they went directly up the steps of the City of David by the stairway of the wall above David’s house to the Water Gate on the east.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'The second '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: thanksgiving choir
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'choir went to the left; I followed with half of the people on the wall, above the Tower of the Furnaces, to the Broad Wall, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'and above the Gate of Ephraim, and by the Old Gate, by the Fish Gate, by the Tower of Hananel and the Tower of the Hundred, as far as the Sheep Gate; and they stopped at the Gate of the Guard. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Iddo, Ginnethoi, Abijah, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Then the two choirs stood in the house of God. So did I, and half of the officials with me; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'and the priests Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah and Hananiah, with trumpets; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'and Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malchijah, Elam, and Ezer. And the singers sang, with Jezrahiah as their leader. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Also on that day they offered great sacrifices and rejoiced because God had given them great joy; the women and children also rejoiced, so that the joy of Jerusalem was heard from far away.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'On that day men were appointed over the chambers for the stores, the contributions, the first fruits, and the tithes, to gather into them from the fields of the cities the portions required by the law for the priests and the Levites; for Judah rejoiced over the priests and Levites who served. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'And they performed the worship of their God and the service of purification; so did the singers and gatekeepers, as David and his son Solomon had commanded. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'For in the days of David and Asaph, in ancient times, there were leaders of singers, songs of praise and hymns of thanksgiving to God. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'So in the days of Zerubbabel and [later of] Nehemiah, all Israel would give the daily portions for the singers and the gatekeepers; and they set apart the consecrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: ' for the Levites, and the Levites set apart the consecrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: portion
    - type: text
      text: ' for the sons of Aaron [the priests].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mijamin, Maadiah, Bilgah, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Shemaiah, Joiarib, Jedaiah, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Sallu, Amok, Hilkiah, and Jedaiah. These were the heads of the priests and their '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brothers
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: kinsman in the days of Jeshua.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The Levites were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah who was in charge of the songs of thanksgiving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise, he and his brothers. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Also Bakbukiah and Unni, their brothers, stood opposite them in their divisions of service. '
