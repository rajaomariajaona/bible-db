      - type: text
        text: Job’s Past Was Glorious
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Job again took up his discussion and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The voices of the nobles were hushed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their tongues stuck to the roof of their mouths.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For when an ear heard [my name mentioned], it called me happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortunate;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when an eye saw [me], it testified for me [approvingly],
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I rescued the poor who cried for help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the orphan who had no helper.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The blessing of him who was about to perish came upon me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I made the widow’s heart sing for joy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I put on '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Blameless and upright as Job had been—and God had so pronounced him—his misunderstood afflictions had caused him to get dangerously off-center. Instead of keeping his mind focused on God and justifying Him, he is giving his whole thought to justifying himself. Instead of humility there is self-righteousness. In this chapter he uses pronouns referring to himself fifty times. But when he was able to see himself as God saw him, he loathed himself and repented “in dust and ashes” (42:6).
      marker-yv: yv-n
    - type: text
      text: righteousness, and it clothed me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My justice was like a robe and a turban!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I was eyes to the blind
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I was feet to the lame.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I was a father to the needy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I investigated the case I did not know [and assured justice].
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And I smashed the jaws of the wicked
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And snatched the prey from his teeth.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then I said, ‘I shall die in my nest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I shall multiply my days as the sand.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘My root is spread out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' open to the waters,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the dew lies all night upon my branch.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, that I were as in the months of old,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As in the days when God watched over me, [Eccl 7:10]
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘My glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor are fresh in me [being constantly renewed],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my bow gains [ever] new strength in my hand.’
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“They listened to me and waited
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And kept silent for my counsel.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “After I spoke, they did not speak again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my speech dropped upon them [like a refreshing shower].
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They waited for me [and for my words] as for the rain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they opened their mouths as for the spring rain.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I smiled at them when they did not believe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they did not diminish the light of my face.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I chose a way for them and sat as chief,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And dwelt as a king among his soldiers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As one who comforts mourners.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When His lamp shone upon my head
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' by His light I walked through darkness;'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As I was in the prime of my days,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the friendship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counsel of God were over my tent,'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
