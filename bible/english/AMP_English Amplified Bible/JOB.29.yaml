      marker-yv: yv-n
    - type: text
      text: the Almighty was still with me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my boys were around me,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When my steps [through rich pastures] were washed with butter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cream [from my livestock],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the rock poured out for me streams of oil [from my olive groves].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When I went out to the gate of the city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I took my seat [as a city father] in the square,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young men saw me and hid themselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The aged arose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stood [respectfully];'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The princes stopped talking
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And put their hands on their mouths;
