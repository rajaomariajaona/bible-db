  '14':
  - type: text
    content: '“I put on '
  - type: note
    content: Blameless and upright as Job had been—and God had so pronounced him—his misunderstood afflictions had caused him to get dangerously off-center. Instead of keeping his mind focused on God and justifying Him, he is giving his whole thought to justifying himself. Instead of humility there is self-righteousness. In this chapter he uses pronouns referring to himself fifty times. But when he was able to see himself as God saw him, he loathed himself and repented “in dust and ashes” (42:6).
  - type: text
    content: righteousness, and it clothed me;
  - type: text
    content: My justice was like a robe and a turban!
  '15':
  - type: text
    content: “I was eyes to the blind
  - type: text
    content: And I was feet to the lame.
  '16':
  - type: text
    content: “I was a father to the needy;
  - type: text
    content: I investigated the case I did not know [and assured justice].
  '17':
  - type: text
    content: “And I smashed the jaws of the wicked
  - type: text
    content: And snatched the prey from his teeth.
  '18':
