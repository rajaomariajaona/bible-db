document_id: EXO.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Ten Commandments
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then God spoke all these words:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, who has brought you out of the land of Egypt, out of the house of slavery.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “You shall have no other gods before Me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“You shall not make for yourself any idol, or any likeness (form, manifestation) of what is in heaven above or on the earth beneath or in the water under the earth [as an object to worship]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You shall not worship them nor serve them; for I, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, am a jealous (impassioned) God ['
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God does not tolerate the transfer of the honor and worship that is due Him to any other being or object.
    marker-yv: yv-n
  - type: text
    text: 'demanding what is rightfully and uniquely mine], visiting (avenging) the iniquity (sin, guilt) of the fathers on the children [that is, calling the children to account for the sins of their fathers], to the third and fourth generations of those who hate Me, [Is 42:8; 48:11] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but showing graciousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast lovingkindness to thousands [of generations] of those who love Me and keep My commandments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “You shall not take the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God in vain [that is, irreverently, in false affirmations or in ways that impugn the character of God]; for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will not hold guiltless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' leave unpunished the one who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Using the name of God in a casual, frivolous way establishes a mindset that diminishes and dishonors the omnipotent God. Using the name of God to abuse, manipulate, or deceive invites judgment.
    marker-yv: yv-n
  - type: text
    text: takes His name in vain [disregarding its reverence and its power].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Remember the Sabbath (seventh) day to keep it holy (set apart, dedicated to God). '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Six days you shall labor and do all your work, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: but the seventh day is a Sabbath [a day of rest dedicated] to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; on that day you shall not do any work, you or your son, or your daughter, or your male servant, or your female servant, or your livestock or the temporary resident (foreigner) who stays within your [city] gates. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For in six days the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' made the heavens and the earth, the sea and everything that is in them, and He rested (ceased) on the seventh day. That is why the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' blessed the Sabbath day and made it holy [that is, set it apart for His purposes].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Honor (respect, obey, care for) your father and your mother, so that your days may be prolonged in the land the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “You shall not commit murder (unjustified, deliberate homicide). [Gen 9:6; Ex 21:12, 14, 18]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“You shall not commit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus amplified this commandment in Matt 5:27, 28. Not only is adultery forbidden, but also any act of sexual impurity or unchastity, and any form of pornography or other obscenity.
    marker-yv: yv-n
  - type: text
    text: adultery. [Prov 6:25, 26; Matt 5:27, 28; Rom 1:24; Eph 5:3]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “You shall not steal [secretly, openly, fraudulently, or through carelessness]. [Prov 11:1; 16:8; 21:6; 22:16; Jer 17:11; Mal 3:8]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “You shall not testify falsely [that is, lie, withhold, or manipulate the truth] against your neighbor (any person). [Ex 23:1; Prov 19:9; 24:28]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “You shall not covet [that is, selfishly desire and attempt to acquire] your neighbor’s house; you shall not covet your neighbor’s wife, or his male servant, or his female servant, or his ox, or his donkey, or anything that belongs to your neighbor.” [Luke 12:15; Col 3:5]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now all the people witnessed the thunder and the flashes of lightning and the sound of the trumpet and the smoking mountain; and as they looked, the people were afraid, and they trembled [and moved backward] and stood at a [safe] distance. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then they said to Moses, “You speak to us and we will listen, but do not let God speak to us or we will die.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moses said to the people, “Do not be afraid; for God has come in order to test you, and in order that the fear of Him [that is, a profound reverence for Him] will remain with you, so that you do not sin.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So the people stood at a [safe] distance, but Moses approached the thick cloud where God was.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Thus you shall say to the Israelites, ‘You have seen for yourselves that I have spoken to you from heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'You shall not make '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other gods
  - type: text
    text: ' [to worship] besides Me; gods of silver or gods of gold, you shall not make [these lifeless idols] for yourselves. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'You shall make an altar of earth for Me, and sacrifice on it your burnt offerings and your peace offerings, your sheep and your oxen. In every place where I cause My Name to be recorded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remembered [through revelation of My divine nature] I will come to you and bless you. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'If you make an altar of stone for Me, you shall not build it of cut stones, for if you use a chisel on it, you will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. make it common and unholy.
    marker-yv: yv-n
  - type: text
    text: 'profane it. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nor shall you go up to My altar on steps, so that your nakedness will not be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: How the “nakedness” (private parts) would be exposed is not clear. Even the rabbis were puzzled because the regulation in 28:42 about linen undergarments would appear to solve any problem (according to the Talmud).
    marker-yv: yv-n
  - type: text
    text: exposed on it.’
