    content: The Ten Commandments
  - type: text
    content: 'Then God spoke all these words:'
  '10':
  - type: text
    content: but the seventh day is a Sabbath [a day of rest dedicated] to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God; on that day you shall not do any work, you or your son, or your daughter, or your male servant, or your female servant, or your livestock or the temporary resident (foreigner) who stays within your [city] gates. '
  '11':
  - type: text
    content: For in six days the L
  - type: heading
    content: ord
  - type: text
    content: ' made the heavens and the earth, the sea and everything that is in them, and He rested (ceased) on the seventh day. That is why the L'
  - type: heading
    content: ord
  - type: text
    content: ' blessed the Sabbath day and made it holy [that is, set it apart for His purposes].'
  '12':
  - type: text
    content: “Honor (respect, obey, care for) your father and your mother, so that your days may be prolonged in the land the L
  - type: heading
    content: ord
  - type: text
    content: ' your God gives you.'
  '13':
  - type: text
    content: “You shall not commit murder (unjustified, deliberate homicide). [Gen 9:6; Ex 21:12, 14, 18]
  '14':
  - type: text
    content: '“You shall not commit '
  - type: note
    content: Jesus amplified this commandment in Matt 5:27, 28. Not only is adultery forbidden, but also any act of sexual impurity or unchastity, and any form of pornography or other obscenity.
  - type: text
    content: adultery. [Prov 6:25, 26; Matt 5:27, 28; Rom 1:24; Eph 5:3]
  '15':
  - type: text
    content: “You shall not steal [secretly, openly, fraudulently, or through carelessness]. [Prov 11:1; 16:8; 21:6; 22:16; Jer 17:11; Mal 3:8]
  '16':
  - type: text
    content: “You shall not testify falsely [that is, lie, withhold, or manipulate the truth] against your neighbor (any person). [Ex 23:1; Prov 19:9; 24:28]
  '17':
  - type: text
    content: “You shall not covet [that is, selfishly desire and attempt to acquire] your neighbor’s house; you shall not covet your neighbor’s wife, or his male servant, or his female servant, or his ox, or his donkey, or anything that belongs to your neighbor.” [Luke 12:15; Col 3:5]
  '18':
  - type: text
    content: 'Now all the people witnessed the thunder and the flashes of lightning and the sound of the trumpet and the smoking mountain; and as they looked, the people were afraid, and they trembled [and moved backward] and stood at a [safe] distance. '
  '19':
  - type: text
    content: 'Then they said to Moses, “You speak to us and we will listen, but do not let God speak to us or we will die.” '
  '2':
  - type: text
    content: “I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, who has brought you out of the land of Egypt, out of the house of slavery.'
  '20':
  - type: text
    content: 'Moses said to the people, “Do not be afraid; for God has come in order to test you, and in order that the fear of Him [that is, a profound reverence for Him] will remain with you, so that you do not sin.” '
  '21':
  - type: text
    content: So the people stood at a [safe] distance, but Moses approached the thick cloud where God was.
  '22':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Thus you shall say to the Israelites, ‘You have seen for yourselves that I have spoken to you from heaven. '
  '23':
  - type: text
    content: 'You shall not make '
  - type: text
    content: other gods
  - type: text
    content: ' [to worship] besides Me; gods of silver or gods of gold, you shall not make [these lifeless idols] for yourselves. '
  '24':
  - type: text
    content: 'You shall make an altar of earth for Me, and sacrifice on it your burnt offerings and your peace offerings, your sheep and your oxen. In every place where I cause My Name to be recorded '
  - type: text
    content: and
  - type: text
    content: ' remembered [through revelation of My divine nature] I will come to you and bless you. '
  '25':
  - type: text
    content: 'If you make an altar of stone for Me, you shall not build it of cut stones, for if you use a chisel on it, you will '
  - type: note
    content: I.e. make it common and unholy.
  - type: text
    content: 'profane it. '
  '26':
  - type: text
    content: 'Nor shall you go up to My altar on steps, so that your nakedness will not be '
  - type: note
    content: How the “nakedness” (private parts) would be exposed is not clear. Even the rabbis were puzzled because the regulation in 28:42 about linen undergarments would appear to solve any problem (according to the Talmud).
  - type: text
    content: exposed on it.’
  '3':
  - type: text
    content: “You shall have no other gods before Me.
  '4':
  - type: text
    content: '“You shall not make for yourself any idol, or any likeness (form, manifestation) of what is in heaven above or on the earth beneath or in the water under the earth [as an object to worship]. '
  '5':
  - type: text
    content: You shall not worship them nor serve them; for I, the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, am a jealous (impassioned) God ['
  - type: note
    content: God does not tolerate the transfer of the honor and worship that is due Him to any other being or object.
  - type: text
    content: 'demanding what is rightfully and uniquely mine], visiting (avenging) the iniquity (sin, guilt) of the fathers on the children [that is, calling the children to account for the sins of their fathers], to the third and fourth generations of those who hate Me, [Is 42:8; 48:11] '
  '6':
  - type: text
    content: 'but showing graciousness '
  - type: text
    content: and
  - type: text
    content: ' steadfast lovingkindness to thousands [of generations] of those who love Me and keep My commandments.'
  '7':
  - type: text
    content: “You shall not take the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God in vain [that is, irreverently, in false affirmations or in ways that impugn the character of God]; for the L'
  - type: heading
    content: ord
  - type: text
    content: ' will not hold guiltless '
  - type: text
    content: nor
  - type: text
    content: ' leave unpunished the one who '
  - type: note
    content: Using the name of God in a casual, frivolous way establishes a mindset that diminishes and dishonors the omnipotent God. Using the name of God to abuse, manipulate, or deceive invites judgment.
  - type: text
    content: takes His name in vain [disregarding its reverence and its power].
  '8':
  - type: text
    content: '“Remember the Sabbath (seventh) day to keep it holy (set apart, dedicated to God). '
  '9':
