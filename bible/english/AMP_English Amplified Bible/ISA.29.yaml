document_id: ISA.29,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem Is Warned
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Woe (judgment is coming) to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hebrew for “Lion of God,” referring to Jerusalem.
      marker-yv: yv-n
    - type: text
      text: Ariel, to Ariel, the city where David [once] camped!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Add '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: year to year
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: yet another year; let the feasts run their course [but only one year more].
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has poured over you a spirit of deep sleep.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has closed your eyes, [you who are] the prophets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He has covered your heads, [you who are] the seers.
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The entire vision [of all these things] will be to you like the words of a scroll that is sealed, which they give to one who can read, saying, “Read this, please,” he shall say, “I cannot, for it is sealed.” '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then the book will be given to the one who cannot read, saying, “Read this, please.” And he will say, “I cannot read.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then the Lord said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because this nation approaches [Me only] with their words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And honors Me [only] with their lip service,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they remove their hearts far from Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And their reverence for Me is a tradition that is learned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by rote
    - type: text
      text: ' [without any regard for its meaning],'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Therefore, listen carefully, I will again do marvelous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' amazing things with this people, wonderful and astonishing things;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the wisdom of their wise men will perish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the understanding of their discerning men will be hidden.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ¶Woe (judgment is coming) to those who [try to] deeply hide their plans from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whose deeds are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: done
    - type: text
      text: ' in a dark place,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who say, “Who sees us?” or “Who knows us?”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'You turn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' upside down [with your perversity]!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall the potter be considered equal with the clay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the thing that is made would say to its maker, “He did not make me”;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or the thing that is formed say to him who formed it, “He has no understanding”?
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Blessing after Discipline
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ¶Is it not yet a very little while
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until Lebanon will be turned into a fertile field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fertile field regarded as a forest?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: On that day the deaf will hear the words of a book,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And out of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' gloom and darkness the eyes of the blind will see [the words of the book].'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The afflicted also will increase their joy in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the needy of mankind will rejoice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' celebrate in the Holy One of Israel.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Then I will harass Ariel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And she will be a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: city of
    - type: text
      text: ' mourning and lamenting (crying out in grief)'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet she will be like an '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Ariel” and the Hebrew word for “altar hearth” are spelled and pronounced the same.
      marker-yv: yv-n
    - type: text
      text: Ariel [an altar hearth] to Me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: For the tyrant will come to an end and the scorner will be finished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed all who are intent on doing evil will be cut off—
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Those who cause a person to be condemned with a [false] word,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lay a trap for him who upholds justice at the [city] gate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And defraud the one in the right with meaningless arguments.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Therefore, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who redeemed Abraham [from paganism] says this, concerning the house of Jacob (Israel):'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Jacob will not be ashamed, nor will his face turn pale [with disappointment because of his children’s degenerate behavior];
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: For when he sees his children, the work of My hands, in his midst,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will sanctify My Name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will sanctify the Holy One of Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And will stand in awe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverent fear of the God of Israel.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Those who err in mind will know the truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And those who criticize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' murmur discontentedly will accept instruction.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I will camp against you and encircle you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will hem you in with siege works,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will raise fortifications against you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then you [Jerusalem] will be brought low,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will speak from the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from the dust where you lie face down
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your muffled words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will come
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your voice will also be like that of a spirit from the earth [like one produced by a medium],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your speech will whisper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' squeak from the dust.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶But the multitude of your enemies [that assault you] will become like fine dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the multitude of the tyrants like the chaff which '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: passes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: blows away;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it will happen in an instant, suddenly [that your enemy is destroyed].
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You will be punished by the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts with thunder and earthquake and great noise,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With whirlwind and tempest and the flame of a consuming fire.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And the multitude of all the nations that fight against Ariel (Jerusalem),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even all who fight against her and her stronghold, and who distress her,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will be like a dream, a vision of the night.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: It will be as when a hungry man dreams
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That he is eating,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But when he awakens, his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: soul is empty
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: hunger is not satisfied;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or as when a thirsty man dreams
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That he is drinking,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when he awakens, in fact, he is faint
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his thirst is not quenched.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So will the multitude of all the nations be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who fight against Mount Zion.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '¶Stop '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take some time and wonder [at this prophecy],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blind yourselves and be blinded [at its fulfillment by your spiritual incompetence].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are drunk, but not from wine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stagger, but not from strong drink.
