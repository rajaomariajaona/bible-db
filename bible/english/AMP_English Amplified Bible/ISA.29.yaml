verses:
  '1':
  - type: heading
    content: Jerusalem Is Warned
  - type: text
    content: 'Woe (judgment is coming) to '
  - type: note
    content: Hebrew for “Lion of God,” referring to Jerusalem.
  - type: text
    content: Ariel, to Ariel, the city where David [once] camped!
  - type: text
    content: 'Add '
  - type: note
    content: Lit year to year.
  - type: text
    content: yet another year; let the feasts run their course [but only one year more].
  '10':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has poured over you a spirit of deep sleep.'
  - type: text
    content: He has closed your eyes, [you who are] the prophets;
  - type: text
    content: And He has covered your heads, [you who are] the seers.
  '11':
  - type: text
    content: 'The entire vision [of all these things] will be to you like the words of a scroll that is sealed, which they give to one who can read, saying, “Read this, please,” he shall say, “I cannot, for it is sealed.” '
  '12':
  - type: text
    content: Then the book will be given to the one who cannot read, saying, “Read this, please.” And he will say, “I cannot read.”
  '13':
  - type: text
    content: Then the Lord said,
  - type: text
    content: “Because this nation approaches [Me only] with their words
  - type: text
    content: And honors Me [only] with their lip service,
  - type: text
    content: But they remove their hearts far from Me,
  - type: text
    content: 'And their reverence for Me is a tradition that is learned '
  - type: text
    content: by rote
  - type: text
    content: ' [without any regard for its meaning],'
  '14':
  - type: text
    content: 'Therefore, listen carefully, I will again do marvelous '
  - type: text
    content: and
  - type: text
    content: ' amazing things with this people, wonderful and astonishing things;'
  - type: text
    content: And the wisdom of their wise men will perish,
  - type: text
    content: And the understanding of their discerning men will be hidden.”
  '15':
  - type: text
    content: ¶Woe (judgment is coming) to those who [try to] deeply hide their plans from the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'Whose deeds are '
  - type: text
    content: done
  - type: text
    content: ' in a dark place,'
  - type: text
    content: And who say, “Who sees us?” or “Who knows us?”
  '16':
  - type: text
    content: 'You turn '
  - type: text
    content: things
  - type: text
    content: ' upside down [with your perversity]!'
  - type: text
    content: Shall the potter be considered equal with the clay,
  - type: text
    content: That the thing that is made would say to its maker, “He did not make me”;
  - type: text
    content: Or the thing that is formed say to him who formed it, “He has no understanding”?
  - type: heading
    content: Blessing after Discipline
  '17':
  - type: text
    content: ¶Is it not yet a very little while
  - type: text
    content: Until Lebanon will be turned into a fertile field,
  - type: text
    content: And the fertile field regarded as a forest?
  '18':
  - type: text
    content: On that day the deaf will hear the words of a book,
  - type: text
    content: 'And out of '
  - type: text
    content: their
  - type: text
    content: ' gloom and darkness the eyes of the blind will see [the words of the book].'
  '19':
  - type: text
    content: The afflicted also will increase their joy in the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'And the needy of mankind will rejoice '
  - type: text
    content: and
  - type: text
    content: ' celebrate in the Holy One of Israel.'
  '2':
  - type: text
    content: Then I will harass Ariel,
  - type: text
    content: 'And she will be a '
  - type: text
    content: city of
  - type: text
    content: ' mourning and lamenting (crying out in grief)'
  - type: text
    content: 'Yet she will be like an '
  - type: note
    content: “Ariel” and the Hebrew word for “altar hearth” are spelled and pronounced the same.
  - type: text
    content: Ariel [an altar hearth] to Me.
  '20':
  - type: text
    content: For the tyrant will come to an end and the scorner will be finished,
  - type: text
    content: Indeed all who are intent on doing evil will be cut off—
  '21':
  - type: text
    content: Those who cause a person to be condemned with a [false] word,
  - type: text
    content: And lay a trap for him who upholds justice at the [city] gate,
  - type: text
    content: And defraud the one in the right with meaningless arguments.
  '22':
  - type: text
    content: Therefore, the L
  - type: heading
    content: ord
  - type: text
    content: ', who redeemed Abraham [from paganism] says this, concerning the house of Jacob (Israel):'
  - type: text
    content: “Jacob will not be ashamed, nor will his face turn pale [with disappointment because of his children’s degenerate behavior];
  '23':
  - type: text
    content: For when he sees his children, the work of My hands, in his midst,
  - type: text
    content: They will sanctify My Name;
  - type: text
    content: They will sanctify the Holy One of Jacob
  - type: text
    content: 'And will stand in awe '
  - type: text
    content: and
  - type: text
    content: ' reverent fear of the God of Israel.'
  '24':
  - type: text
    content: “Those who err in mind will know the truth,
  - type: text
    content: 'And those who criticize '
  - type: text
    content: and
  - type: text
    content: ' murmur discontentedly will accept instruction.'
  '3':
  - type: text
    content: I will camp against you and encircle you,
  - type: text
    content: And I will hem you in with siege works,
  - type: text
    content: And I will raise fortifications against you.
  '4':
  - type: text
    content: Then you [Jerusalem] will be brought low,
  - type: text
    content: You will speak from the earth,
  - type: text
    content: And from the dust where you lie face down
  - type: text
    content: 'Your muffled words '
  - type: text
    content: will come
  - type: text
    content: .
  - type: text
    content: Your voice will also be like that of a spirit from the earth [like one produced by a medium],
  - type: text
    content: 'And your speech will whisper '
  - type: text
    content: and
  - type: text
    content: ' squeak from the dust.'
  '5':
  - type: text
    content: ¶But the multitude of your enemies [that assault you] will become like fine dust,
  - type: text
    content: 'And the multitude of the tyrants like the chaff which '
  - type: note
    content: Lit passes.
  - type: text
    content: blows away;
  - type: text
    content: And it will happen in an instant, suddenly [that your enemy is destroyed].
  '6':
  - type: text
    content: You will be punished by the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts with thunder and earthquake and great noise,'
  - type: text
    content: With whirlwind and tempest and the flame of a consuming fire.
  '7':
  - type: text
    content: And the multitude of all the nations that fight against Ariel (Jerusalem),
  - type: text
    content: Even all who fight against her and her stronghold, and who distress her,
  - type: text
    content: Will be like a dream, a vision of the night.
  '8':
  - type: text
    content: It will be as when a hungry man dreams
  - type: text
    content: That he is eating,
  - type: text
    content: 'But when he awakens, his '
  - type: note
    content: Lit soul is empty.
  - type: text
    content: hunger is not satisfied;
  - type: text
    content: Or as when a thirsty man dreams
  - type: text
    content: That he is drinking,
  - type: text
    content: But when he awakens, in fact, he is faint
  - type: text
    content: And his thirst is not quenched.
  - type: text
    content: So will the multitude of all the nations be
  - type: text
    content: Who fight against Mount Zion.
  '9':
  - type: text
    content: '¶Stop '
  - type: text
    content: and
  - type: text
    content: ' take some time and wonder [at this prophecy],'
  - type: text
    content: Blind yourselves and be blinded [at its fulfillment by your spiritual incompetence].
  - type: text
    content: They are drunk, but not from wine;
  - type: text
    content: They stagger, but not from strong drink.
