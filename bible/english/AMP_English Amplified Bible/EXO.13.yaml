document_id: EXO.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Consecration of the Firstborn
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Sanctify to Me [that is, set apart for My purpose] every firstborn, the first offspring of every womb among the children of Israel, both of man and of animal; it is Mine.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moses said to the people, “Remember [solemnly observe and commemorate] this day on which you came out of Egypt, out of the house of bondage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slavery; for by a strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerful hand the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brought you out of this place. And nothing leavened shall be eaten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On this day in the month Abib, you are about to go onward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And it shall be when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brings you into the land of the Canaanite, the Hittite, the Amorite, the Hivite, and the Jebusite, which He swore to your fathers to give you, a land [of abundance] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
    marker-yv: yv-n
  - type: text
    text: 'flowing with milk and honey, that you shall keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' observe this rite (service) in this month. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For seven days you shall eat unleavened bread, and on the seventh day there shall be a feast to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Unleavened bread shall be eaten throughout the seven days; no leavened bread shall be seen with you, nor shall there be leaven within the borders of your territory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You shall explain this to your son on that day, saying, ‘It is because of what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' did for me when I came out of Egypt.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It shall serve as a sign to you on your hand (arm), and as a reminder on your forehead, so that the instruction (law) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' may be in your mouth; for with a strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerful hand the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brought you out of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Therefore, you shall keep this ordinance at this time from year to year.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Now it shall be when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brings you into the land of the Canaanite, as He swore to you and your fathers, and gives it to you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'you shall set apart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dedicate to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' all that first opens the womb. All the firstborn males of your livestock shall be the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Every firstborn of a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For most Israelites, the donkey would eventually be important for their livelihoods as a work-animal, so God foresaw the need and allowed this exception. Those who had no need for an additional donkey were not required to redeem it, but were to kill it in recognition of God’s right to the firstborn. On the other hand, redemption was of course the only option for a firstborn son. God thereby honors His own right to the firstborn, but at the same time forbids human sacrifice.
    marker-yv: yv-n
  - type: text
    text: 'donkey you shall redeem by [substituting] a lamb [as a sacrifice for it], but if you do not [wish to] redeem it, then you shall break its neck; and every firstborn among your sons you shall redeem [that is, ‘buy back’ from God with a suitable sacrifice]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And it shall be when your son asks you in time to come, saying, ‘What does this mean?’ you shall say to him, ‘With a strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerful hand the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brought us out of Egypt, from the house of bondage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slavery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For it happened, when Pharaoh stubbornly refused to let us go, that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' struck every firstborn in the land of Egypt, both the firstborn of man and the firstborn of animal. Therefore, I sacrifice to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' all the males, the first [to be born] of every womb, but every firstborn of my sons I redeem.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So it shall serve as a sign '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a reminder on your [left] hand (arm) and as '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: totaphoth,
      - type: text
        text: ' later renamed '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tefillin
      - type: text
        text: ' (“attachment”) but often called '
      - type: usfm
        marker: it
        children:
        - type: text
          text: phylacteries
      - type: text
        text: ' (Gr “safeguards”) these came to be small cube-shaped leather pouches which contained tiny parchments of Ex 13:1-16 and Deut 6:4-9; 11:13-21. They were strapped to the forehead and the left forearm of Jewish men (or the right forearm, if a man was left-handed) in obedience to the commands in this verse and Deut 6:8. Phylacteries and the parchments contained in them were very artistically made, and are still worn today by observant Jews during morning services.'
    marker-yv: yv-n
  - type: text
    text: 'frontlets between your eyes, for by a strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerful hand the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brought us out of Egypt.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Leads the People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So it happened, when Pharaoh let the people go, God did not lead them by way of the land of the Philistines, even though it was nearer; for God said, “The people might change their minds when they see war [that is, that there will be war], and return to Egypt.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But God led the people around by the way of the wilderness toward the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sea of Reeds.
      - type: text
        text: ' See note 10:19.'
    marker-yv: yv-n
  - type: text
    text: 'Red Sea; the sons of Israel went up in battle array (orderly ranks, marching formation) out of the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moses took the bones of Joseph with him, for Joseph had solemnly ordered (placed under an oath) the Israelites, saying, “God will assuredly take care of you, and you must carry my bones away from here with you.” [Gen 50:25] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They journeyed from Succoth [in Goshen] and camped at Etham on the edge of the wilderness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The [presence of the] L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was going before them by day in a pillar (column) of cloud to lead them along the way, and in a pillar of fire by night to give them light, so that they could travel by day and by night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He did not withdraw the pillar of cloud by day, nor the pillar of fire by night, from going before the people.
