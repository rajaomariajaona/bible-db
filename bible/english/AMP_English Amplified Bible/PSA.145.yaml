document_id: PSA.145,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 145
  - type: heading
    content: The Lord Extolled for His Goodness.
  - type: text
    content: A Psalm
  - type: text
    content: ' of praise. Of David.'
  - type: text
    content: I will exalt You, my God, O King,
  - type: text
    content: And [with gratitude and submissive wonder] I will bless Your name forever and ever.
  '10':
  - type: text
    content: 'All Your works shall give thanks to You '
  - type: text
    content: and
  - type: text
    content: ' praise You, O L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And Your godly ones will bless You.
  '11':
  - type: text
    content: They shall speak of the glory of Your kingdom
  - type: text
    content: And talk of Your power,
  '12':
  - type: text
    content: To make known to the sons of men Your mighty acts
  - type: text
    content: And the glorious majesty of Your kingdom.
  '13':
  - type: text
    content: Your kingdom is an everlasting kingdom,
  - type: text
    content: 'And Your dominion '
  - type: text
    content: endures
  - type: text
    content: ' throughout all generations. [Dan 7:14, 27]'
  '14':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' upholds all those [of His own] who fall'
  - type: text
    content: And raises up all those who are bowed down.
  '15':
  - type: text
    content: The eyes of all look to You [in hopeful expectation],
  - type: text
    content: And You give them their food in due time.
  '16':
  - type: text
    content: You open Your hand
  - type: text
    content: And satisfy the desire of every living thing.
  '17':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' is [unwaveringly] righteous in all His ways'
  - type: text
    content: 'And gracious '
  - type: text
    content: and
  - type: text
    content: ' kind in all His works.'
  '18':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is near to all who call on Him,'
  - type: text
    content: To all who call on Him in truth (without guile).
  '19':
  - type: text
    content: 'He will fulfill the desire of those who fear '
  - type: text
    content: and
  - type: text
    content: ' worship Him [with awe-inspired reverence and obedience];'
  - type: text
    content: He also will hear their cry and will save them.
  '2':
  - type: text
    content: 'Every day I will bless You '
  - type: text
    content: and
  - type: text
    content: ' lovingly praise You;'
  - type: text
    content: Yes, [with awe-inspired reverence] I will praise Your name forever and ever.
  '20':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' keeps all who love Him,'
  - type: text
    content: But all the wicked He will destroy.
  '21':
  - type: text
    content: My mouth will speak the praise of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'And all flesh will bless '
  - type: text
    content: and
  - type: text
    content: ' gratefully praise His holy name forever and ever.'
  '3':
  - type: text
    content: Great is the L
  - type: heading
    content: ord
  - type: text
    content: ', and highly to be praised,'
  - type: text
    content: And His greatness is [so vast and profound as to be] unsearchable [incomprehensible to man]. [Job 5:9; 9:10; Rom 11:33]
  '4':
  - type: text
    content: One generation shall praise Your works to another,
  - type: text
    content: 'And shall declare Your mighty '
  - type: text
    content: and
  - type: text
    content: ' remarkable acts.'
  '5':
  - type: text
    content: On the glorious splendor of Your majesty
  - type: text
    content: And on Your wonderful works, I will meditate.
  '6':
  - type: text
    content: People will speak of the power of Your awesome acts,
  - type: text
    content: And [with gratitude and submissive wonder] I will tell of Your greatness.
  '7':
  - type: text
    content: 'They will overflow [like a fountain] when they speak of Your great '
  - type: text
    content: and
  - type: text
    content: ' abundant goodness'
  - type: text
    content: And will sing joyfully of Your righteousness.
  '8':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' is gracious and full of compassion,'
  - type: text
    content: Slow to anger and abounding in lovingkindness.
  '9':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is good to all,'
  - type: text
    content: And His tender mercies are over all His works [the entirety of things created].
