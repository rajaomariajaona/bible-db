document_id: PSA.145,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 145
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ' Extolled for His Goodness.'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of praise. Of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will exalt You, my God, O King,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [with gratitude and submissive wonder] I will bless Your name forever and ever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All Your works shall give thanks to You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise You, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Your godly ones will bless You.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall speak of the glory of Your kingdom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And talk of Your power,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To make known to the sons of men Your mighty acts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the glorious majesty of Your kingdom.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your kingdom is an everlasting kingdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And Your dominion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: endures
    - type: text
      text: ' throughout all generations. [Dan 7:14, 27]'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' upholds all those [of His own] who fall'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And raises up all those who are bowed down.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The eyes of all look to You [in hopeful expectation],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You give them their food in due time.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You open Your hand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And satisfy the desire of every living thing.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is [unwaveringly] righteous in all His ways'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kind in all His works.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is near to all who call on Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To all who call on Him in truth (without guile).
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will fulfill the desire of those who fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship Him [with awe-inspired reverence and obedience];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He also will hear their cry and will save them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Every day I will bless You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingly praise You;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, [with awe-inspired reverence] I will praise Your name forever and ever.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' keeps all who love Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But all the wicked He will destroy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My mouth will speak the praise of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And all flesh will bless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gratefully praise His holy name forever and ever.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Great is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and highly to be praised,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His greatness is [so vast and profound as to be] unsearchable [incomprehensible to man]. [Job 5:9; 9:10; Rom 11:33]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One generation shall praise Your works to another,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And shall declare Your mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remarkable acts.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the glorious splendor of Your majesty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And on Your wonderful works, I will meditate.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will speak of the power of Your awesome acts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [with gratitude and submissive wonder] I will tell of Your greatness.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will overflow [like a fountain] when they speak of Your great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abundant goodness'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will sing joyfully of Your righteousness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is gracious and full of compassion,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Slow to anger and abounding in lovingkindness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is good to all,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His tender mercies are over all His works [the entirety of things created].
