document_id: PSA.51,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 51
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Contrite Sinner’s Prayer for Pardon.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David; when Nathan the prophet came to him after he had sinned with Bathsheba.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Have mercy on me, O God, according to Your lovingkindness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: According to the greatness of Your compassion blot out my transgressions.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶Create in me a clean heart, O God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And renew a right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast spirit within me.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Do not cast me away from Your presence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not take Your Holy Spirit from me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Restore to me the joy of Your salvation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sustain me with a willing spirit.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then I will teach transgressors Your ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And sinners shall be converted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' return to You.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ¶Rescue me from bloodguiltiness, O God, the God of my salvation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then my tongue will sing joyfully of Your righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Your justice.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: O Lord, open my lips,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That my mouth may declare Your praise.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For You do not delight in sacrifice, or else I would give it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are not pleased with burnt offering. [1 Sam 15:22]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: My [only] sacrifice [acceptable] to God is a broken spirit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A broken and contrite heart [broken with sorrow for sin, thoroughly penitent], such, O God, You will not despise.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ¶By Your favor do good to Zion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May You rebuild the walls of Jerusalem.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then will You delight in the sacrifices of righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In burnt offering and whole burnt offering;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then young bulls will be offered on Your altar.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Wash me thoroughly from my wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And cleanse me from my sin.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For I am conscious of my transgressions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I acknowledge them;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My sin is always before me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Against You, You only, have I sinned
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And done that which is evil in Your sight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that You are justified when You speak [Your sentence]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And faultless in Your judgment. [Rom 3:4]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶I was brought forth in [a state of] wickedness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In sin my mother conceived me [and from my beginning I, too, was sinful]. [John 3:6; Rom 5:12; Eph 2:3]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Behold, You desire truth in the innermost being,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the hidden part [of my heart] You will make me know wisdom.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Purify me with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This evidently was a bristly plant which was useful as a kind of brush.
      marker-yv: yv-n
    - type: text
      text: hyssop, and I will be clean;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wash me, and I will be whiter than snow.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Make me hear joy and gladness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be satisfied;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the bones which You have broken rejoice.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Hide Your face from my sins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And blot out all my iniquities.
