document_id: PSA.51,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 51
  - type: heading
    content: A Contrite Sinner’s Prayer for Pardon.
  - type: text
    content: To the Chief Musician. A Psalm of David; when Nathan the prophet came to him after he had sinned with Bathsheba.
  - type: text
    content: Have mercy on me, O God, according to Your lovingkindness;
  - type: text
    content: According to the greatness of Your compassion blot out my transgressions.
  '10':
  - type: text
    content: ¶Create in me a clean heart, O God,
  - type: text
    content: 'And renew a right '
  - type: text
    content: and
  - type: text
    content: ' steadfast spirit within me.'
  '11':
  - type: text
    content: Do not cast me away from Your presence
  - type: text
    content: And do not take Your Holy Spirit from me.
  '12':
  - type: text
    content: Restore to me the joy of Your salvation
  - type: text
    content: And sustain me with a willing spirit.
  '13':
  - type: text
    content: Then I will teach transgressors Your ways,
  - type: text
    content: 'And sinners shall be converted '
  - type: text
    content: and
  - type: text
    content: ' return to You.'
  '14':
  - type: text
    content: ¶Rescue me from bloodguiltiness, O God, the God of my salvation;
  - type: text
    content: 'Then my tongue will sing joyfully of Your righteousness '
  - type: text
    content: and
  - type: text
    content: ' Your justice.'
  '15':
  - type: text
    content: O Lord, open my lips,
  - type: text
    content: That my mouth may declare Your praise.
  '16':
  - type: text
    content: For You do not delight in sacrifice, or else I would give it;
  - type: text
    content: You are not pleased with burnt offering. [1 Sam 15:22]
  '17':
  - type: text
    content: My [only] sacrifice [acceptable] to God is a broken spirit;
  - type: text
    content: A broken and contrite heart [broken with sorrow for sin, thoroughly penitent], such, O God, You will not despise.
  '18':
  - type: text
    content: ¶By Your favor do good to Zion;
  - type: text
    content: May You rebuild the walls of Jerusalem.
  '19':
  - type: text
    content: Then will You delight in the sacrifices of righteousness,
  - type: text
    content: In burnt offering and whole burnt offering;
  - type: text
    content: Then young bulls will be offered on Your altar.
  '2':
  - type: text
    content: 'Wash me thoroughly from my wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt'
  - type: text
    content: And cleanse me from my sin.
  '3':
  - type: text
    content: 'For I am conscious of my transgressions '
  - type: text
    content: and
  - type: text
    content: ' I acknowledge them;'
  - type: text
    content: My sin is always before me.
  '4':
  - type: text
    content: Against You, You only, have I sinned
  - type: text
    content: And done that which is evil in Your sight,
  - type: text
    content: So that You are justified when You speak [Your sentence]
  - type: text
    content: And faultless in Your judgment. [Rom 3:4]
  '5':
  - type: text
    content: ¶I was brought forth in [a state of] wickedness;
  - type: text
    content: In sin my mother conceived me [and from my beginning I, too, was sinful]. [John 3:6; Rom 5:12; Eph 2:3]
  '6':
  - type: text
    content: Behold, You desire truth in the innermost being,
  - type: text
    content: And in the hidden part [of my heart] You will make me know wisdom.
  '7':
  - type: text
    content: 'Purify me with '
  - type: note
    content: This evidently was a bristly plant which was useful as a kind of brush.
  - type: text
    content: hyssop, and I will be clean;
  - type: text
    content: Wash me, and I will be whiter than snow.
  '8':
  - type: text
    content: 'Make me hear joy and gladness '
  - type: text
    content: and
  - type: text
    content: ' be satisfied;'
  - type: text
    content: Let the bones which You have broken rejoice.
  '9':
  - type: text
    content: Hide Your face from my sins
  - type: text
    content: And blot out all my iniquities.
