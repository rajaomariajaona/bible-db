document_id: EXO.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Last Plague
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “I will bring yet one more plague on Pharaoh and on Egypt; after that he will let you go. When he lets you go, he will most certainly drive you out of here completely. '
  '10':
  - type: text
    content: Moses and Aaron did all these wonders (miracles) before Pharaoh; yet the L
  - type: heading
    content: ord
  - type: text
    content: ' hardened Pharaoh’s heart, and he did not let the Israelites go out of his land.'
  '2':
  - type: text
    content: 'Speak so that all of the people [of Israel] may hear, and tell every man to ask from his neighbor, and every woman to ask from her neighbor, articles of silver, and articles of gold.” '
  '3':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' gave the people favor in the sight of the Egyptians. Moreover, the man Moses was greatly esteemed in the land of Egypt, [both] in the sight of Pharaoh’s servants and in the sight of the people.'
  '4':
  - type: text
    content: Then Moses said, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ': ‘At midnight I am going out into the midst of Egypt, '
  '5':
  - type: text
    content: 'and all the firstborn in the land [the pride, hope, and joy] of Egypt shall die, from the firstborn of Pharaoh who sits on his throne, to the firstborn of the slave girl who is behind the hand-mill, and all the firstborn of cattle as well. '
  '6':
  - type: text
    content: 'There shall be a great cry [of heartache and sorrow] throughout the land of Egypt, such as has never been before and such as shall never be again. '
  '7':
  - type: text
    content: 'But not even a dog will '
  - type: note
    content: Lit move his tongue, that is, bark in a threatening way.
  - type: text
    content: 'threaten any of the Israelites, whether man or animal, so that you may know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge how the L'
  - type: heading
    content: ord
  - type: text
    content: ' makes a distinction between Egypt and Israel.’ '
  '8':
  - type: text
    content: All these servants of yours will come down to me and bow down before me, saying, ‘Get out, you and all the people who follow you.’ After that I will leave.” And he left Pharaoh in the heat of anger.
  '9':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Pharaoh will not listen to you, so that My wonders (miracles) may be multiplied in the land of Egypt.” '
