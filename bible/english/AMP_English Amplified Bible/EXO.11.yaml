document_id: EXO.11,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Last Plague
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “I will bring yet one more plague on Pharaoh and on Egypt; after that he will let you go. When he lets you go, he will most certainly drive you out of here completely. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Moses and Aaron did all these wonders (miracles) before Pharaoh; yet the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' hardened Pharaoh’s heart, and he did not let the Israelites go out of his land.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Speak so that all of the people [of Israel] may hear, and tell every man to ask from his neighbor, and every woman to ask from her neighbor, articles of silver, and articles of gold.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave the people favor in the sight of the Egyptians. Moreover, the man Moses was greatly esteemed in the land of Egypt, [both] in the sight of Pharaoh’s servants and in the sight of the people.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then Moses said, “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': ‘At midnight I am going out into the midst of Egypt, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and all the firstborn in the land [the pride, hope, and joy] of Egypt shall die, from the firstborn of Pharaoh who sits on his throne, to the firstborn of the slave girl who is behind the hand-mill, and all the firstborn of cattle as well. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'There shall be a great cry [of heartache and sorrow] throughout the land of Egypt, such as has never been before and such as shall never be again. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But not even a dog will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: move his tongue,
        - type: text
          text: ' that is, bark in a threatening way.'
      marker-yv: yv-n
    - type: text
      text: 'threaten any of the Israelites, whether man or animal, so that you may know [without any doubt] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge how the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' makes a distinction between Egypt and Israel.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: All these servants of yours will come down to me and bow down before me, saying, ‘Get out, you and all the people who follow you.’ After that I will leave.” And he left Pharaoh in the heat of anger.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Pharaoh will not listen to you, so that My wonders (miracles) may be multiplied in the land of Egypt.” '
