document_id: PSA.42,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOOK TWO
    marker-yv: yv-h
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 42
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thirsting for God in Trouble and Exile.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. A skillful song, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a didactic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reflective poem, of the sons of Korah.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: As the deer pants [longingly] for the water brooks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew word translated “soul” in this psalm and elsewhere in the book of Psalms is '
        - type: usfm
          marker: it
          children:
          - type: text
            text: nephesh.
        - type: text
          text: ' This word usually refers to a person’s “life” or “self,” but can also mean “throat,” as perhaps in vv 1, 2.'
      marker-yv: yv-n
    - type: text
      text: soul pants [longingly] for You, O God.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: As a crushing of my bones [with a sword], my adversaries taunt me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While they say continually to me, “Where is your God?”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Why are you in despair, O my soul?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Why have you become restless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disquieted within me?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hope in God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait expectantly for Him, for I shall yet praise Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: saving acts of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: help of my countenance and my God.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: My soul (my life, my inner self) thirsts for God, for the living God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When will I come and see the face of God? [Ps 63:1, 2; John 7:37; 1 Thess 1:9, 10]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: My tears have been my food day and night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While they say to me all day long, “Where is your God?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: These things I [vividly] remember as I pour out my soul;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How I used to go along before the great crowd of people and lead them in procession to the house of God [like a choirmaster before his singers, timing the steps to the music and the chant of the song],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the voice of joy and thanksgiving, a great crowd keeping a festival.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶Why are you in despair, O my soul?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And why have you become restless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disturbed within me?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hope in God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait expectantly for Him, for I shall again praise Him'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the help of His presence.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: O my God, my soul is in despair within me [the burden more than I can bear];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I will [fervently] remember You from the land of the Jordan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the peaks of [Mount] Hermon, from Mount Mizar.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Deep calls to deep at the [thundering] sound of Your waterfalls;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All Your breakers and Your waves have rolled over me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Yet the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will command His lovingkindness in the daytime,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the night His song will be with me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A prayer to the God of my life.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ¶I will say to God my rock, “Why have You forgotten me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do I go mourning because of the oppression of the enemy?”
