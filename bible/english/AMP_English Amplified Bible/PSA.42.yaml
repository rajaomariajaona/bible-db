  '2':
  - type: text
    content: My soul (my life, my inner self) thirsts for God, for the living God.
  - type: text
    content: When will I come and see the face of God? [Ps 63:1, 2; John 7:37; 1 Thess 1:9, 10]
  '3':
  - type: text
    content: My tears have been my food day and night,
  - type: text
    content: While they say to me all day long, “Where is your God?”
  '4':
  - type: text
    content: These things I [vividly] remember as I pour out my soul;
  - type: text
    content: How I used to go along before the great crowd of people and lead them in procession to the house of God [like a choirmaster before his singers, timing the steps to the music and the chant of the song],
  - type: text
    content: With the voice of joy and thanksgiving, a great crowd keeping a festival.
  '5':
