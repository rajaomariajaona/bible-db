  '6':
  - type: text
    content: O my God, my soul is in despair within me [the burden more than I can bear];
  - type: text
    content: Therefore I will [fervently] remember You from the land of the Jordan
  - type: text
    content: And the peaks of [Mount] Hermon, from Mount Mizar.
  '7':
  - type: text
    content: Deep calls to deep at the [thundering] sound of Your waterfalls;
  - type: text
    content: All Your breakers and Your waves have rolled over me.
