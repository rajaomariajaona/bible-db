  - type: note
    content: It is no coincidence that Jesus raises this question after His preceding discussion with the lawyer/scribe. Matthew (22:35) notes that the lawyer had questioned Jesus to test Him. His goal was to extract from Jesus the admission that there is only one God (see v 32), and eventually to use that admission against Him when He claimed to be the Son of God and therefore God Himself. In reality, Jesus had admitted nothing that posed a problem for the concept of one God existing as three distinct Persons, and He drew attention to this fact by raising the issue of David’s relationship to the Messiah.
