document_id: GEN.48
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel’s Last Days
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now some time after these things happened, Joseph was told, “Your father is sick.” So he took his two sons Manasseh and Ephraim with him [to go to Goshen]. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when Jacob (Israel) was told, “Look now, your son Joseph has come to you,” Israel strengthened himself and sat up on the bed. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Jacob said to Joseph, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El Shaddai
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'God Almighty appeared to me at Luz (Bethel) in the land of Canaan and blessed me, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and said to me, ‘Behold, I will make you fruitful and numerous, and I will make you a great company of people, and will give this land to your descendants after you as an everlasting possession.’ [Gen 28:13-22; 35:6-15] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now your two sons [Ephraim and Manasseh], who were born to you in the land of Egypt before I came to you in Egypt, are mine; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This act of adoption effectively gave Joseph the birthright and a double allotment of the territory of the promised land when it was apportioned by Joshua (Josh 16; 17). The second son, Ephraim, was named before his older brother because Jacob planned to give him the primary blessing.
    marker-yv: yv-n
  - type: text
    text: 'Ephraim and Manasseh shall be mine [that is, adopted as my heirs and sons as surely], as Reuben and Simeon are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: my sons
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But other sons who were born to you after them shall be your own; they shall be called by the names of their [two] brothers in their inheritance. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now as for me, when I came from Paddan [in Mesopotamia], Rachel died beside me in the land of Canaan on the journey, when there was still some distance to go to Ephrath; and I buried her there on the way to Ephrath (that is, Bethlehem).”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When Israel [who was almost blind] saw Joseph’s sons, he said, “Who are these?” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joseph said to his father, “They are my sons, whom God has given me here [in Egypt].” So he said, “Please bring them to me, so that I may bless them.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now Israel’s eyes were so dim from age that he could not see [clearly]. Then Joseph brought them close to him, and he kissed and embraced them. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Israel said to Joseph, “I never expected to see your face, but see, God has shown me your children as well.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Joseph took the boys [from his father’s embrace], and he bowed [before him] with his face to the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Joseph took them both, Ephraim with his right hand toward Israel’s left, and Manasseh with his left hand toward Israel’s right, and brought them close to him. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Israel reached out his right hand and laid it on the head of Ephraim, who was the younger, and his left hand on Manasseh’s head, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God acts independently of priority based on birth order when He chooses men. He too “crossed His hands” in the case of Seth whom He chose over Cain; of Shem over Japheth; of Isaac over Ishmael; of Jacob over Esau; of Judah and Joseph over Reuben; of Moses over Aaron; and of David over all his brothers.
    marker-yv: yv-n
  - type: text
    text: 'crossing his hands [intentionally], even though Manasseh was the firstborn. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Jacob (Israel) blessed Joseph, and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The God before whom my fathers Abraham and Isaac walked [in faithful obedience],
- type: usfm
  marker: q1
  children:
  - type: text
    text: The God who has been my Shepherd [leading and caring for me] all my life to this day,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 16:7.
    marker-yv: yv-n
  - type: text
    text: Angel [that is, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' Himself] who has redeemed me [continually] from all evil,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bless the boys;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And may my name live on in them [may they be worthy of having their names linked with mine],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the names of my fathers Abraham and Isaac;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And may they grow into a [great] multitude in the midst of the earth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When Joseph saw that his father laid his right hand on Ephraim’s head, it displeased him [because he was not the firstborn]; and he grasped his father’s hand to move it from Ephraim’s head to Manasseh’s head. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Joseph said to his father, “Not so, my father, for this is the firstborn; place your right hand on Manasseh’s head.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But his father refused and said, “I know, my son, I know; Manasseh also will become a people and he will be great; but his younger brother shall be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This prophecy begins to be fulfilled during the time of the judges, as the tribe of Ephraim increased in prominence and became the head of the northern ten tribes. Joshua, whom Israel regarded as their ruler, was an Ephraimite. The ark of the covenant was placed in Shiloh in the territory of Ephraim, which also increased the tribe’s prestige. By its fulfillment, Jacob’s prophecy proved to be divinely inspired.
    marker-yv: yv-n
  - type: text
    text: 'greater than he, and his descendants shall become a multitude of nations.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then Jacob blessed them that day, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “By you Israel will pronounce a blessing, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘May God make you like Ephraim and Manasseh.’ ”
- type: usfm
  marker: m
  children:
  - type: text
    text: 'And he put Ephraim before Manasseh. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Israel said to Joseph, “Behold, I am about to die, but God will be with you, and bring you back to [Canaan] the land of your fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moreover, I have given you [the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 49:3.
    marker-yv: yv-n
  - type: text
    text: birthright,] one portion [Shechem, one mountain ridge] more than any of your brothers, which I took [reclaiming it] from the hand of the Amorites with my sword and with my bow.” [Gen 33:18, 19; Josh 24:32, 33; John 4:5]
