  - type: heading
    content: BOOK ONE
  - type: heading
    content: Psalm 1
  - type: heading
    content: The Righteous and the Wicked Contrasted.
  - type: text
    content: ' '
  - type: note
    content: This has been called “The Preface Psalm” because in some respects it introduces the complete book of Psalms as a godly message. It opens with a benediction, “Blessed,” as does the Sermon on the Mount (Matt 5:3).
  - type: text
    content: Blessed [fortunate, prosperous, and favored by God] is the man who does not walk in the counsel of the wicked [following their advice and example],
  - type: text
    content: Nor stand in the path of sinners,
  - type: text
    content: 'Nor sit [down to rest] in the seat of '
  - type: note
    content: I.e. shallow thinkers who are quick to mock or disdain.
  - type: text
    content: scoffers (ridiculers).
  '2':
  - type: text
    content: But his delight is in the law of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And on His law [His precepts and teachings] he [habitually] meditates day and night. [Rom 13:8-10; Gal 3:1-29; 2 Tim 3:16]
  '3':
  - type: text
    content: 'And he will be like a tree '
  - type: text
    content: firmly
  - type: text
    content: ' planted [and fed] by streams of water,'
  - type: text
    content: Which yields its fruit in its season;
  - type: text
    content: Its leaf does not wither;
  - type: text
    content: And in whatever he does, he prospers [and comes to maturity]. [Jer 17:7, 8]
  '4':
  - type: text
    content: ¶The wicked [those who live in disobedience to God’s law] are not so,
  - type: text
    content: But they are like the chaff [worthless and without substance] which the wind blows away.
  '5':
  - type: text
    content: Therefore the wicked will not stand [unpunished] in the judgment,
  - type: text
    content: Nor sinners in the assembly of the righteous.
  '6':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' knows '
  - type: text
    content: and
  - type: text
    content: ' fully approves the way of the righteous,'
  - type: text
    content: But the way of the wicked shall perish.
