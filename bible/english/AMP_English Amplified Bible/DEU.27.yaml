document_id: DEU.27,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar at Mount Ebal
  - type: text
    content: 'Then Moses and the elders of Israel commanded the people, saying, “Keep (remember, obey) all the commandments which I am commanding you today. '
  '10':
  - type: text
    content: So you shall obey the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, and do His commandments and statutes which I am commanding you today.”'
  - type: heading
    content: The Curses of Mount Ebal
  '11':
  - type: text
    content: 'Moses also commanded the people that day, saying, '
  '12':
  - type: text
    content: '“These [tribes] shall stand on Mount Gerizim to bless the people when you have crossed the Jordan: Simeon, Levi, Judah, Issachar, '
  - type: note
    content: The tribes of the descendants of Joseph’s sons, Ephraim and Manasseh, stood together as the tribe of Joseph.
  - type: text
    content: 'Joseph, and Benjamin. '
  '13':
  - type: text
    content: 'These [tribes] shall stand on Mount Ebal to '
  - type: text
    content: pronounce
  - type: text
    content: ' the curse [for disobedience]: Reuben, Gad, Asher, Zebulun, Dan, and Naphtali. '
  '14':
  - type: text
    content: 'The Levites shall answer with a loud voice to all the men of Israel:'
  '15':
  - type: text
    content: ‘Cursed is the man who makes a carved or cast image (idol), a repulsive thing to the L
  - type: heading
    content: ord
  - type: text
    content: ', the work of the hands of the artisan, and sets it up in secret.’ All the people shall answer and say, ‘Amen.’'
  '16':
  - type: text
    content: ‘Cursed is he who dishonors (treats with contempt) his father or his mother.’ And all the people shall say, ‘Amen.’
  '17':
  - type: text
    content: ‘Cursed is he who moves his neighbor’s boundary mark.’ And all the people shall say, ‘Amen.’
  '18':
  - type: text
    content: ‘Cursed is he who misleads a blind person on the road.’ And all the people shall say, ‘Amen.’
  '19':
  - type: text
    content: ‘Cursed is he who distorts (perverts) the justice due to a stranger, an orphan, and a widow.’ And all the people shall say, ‘Amen.’
  '2':
  - type: text
    content: So it shall be on the day when you cross the Jordan to [enter] the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God gives you, that you shall set up for yourself large stones and coat them with plaster (lime, whitewash). '
  '20':
  - type: text
    content: '‘Cursed is he who is intimate with his father’s [former] wife, because he has '
  - type: note
    content: Lit uncovered his father’s skirt.
  - type: text
    content: violated what belongs to his father.’ And all the people shall say, ‘Amen.’
  '21':
  - type: text
    content: ‘Cursed is he who is intimate with any animal.’ And all the people shall say, ‘Amen.’
  '22':
  - type: text
    content: ‘Cursed is he who is intimate with his [half-] sister, whether his father’s or his mother’s daughter.’ And all the people shall say, ‘Amen.’
  '23':
  - type: text
    content: ‘Cursed is he who is intimate with his mother-in-law.’ And all the people shall say, ‘Amen.’
  '24':
  - type: text
    content: ‘Cursed is he who strikes his neighbor in secret.’ And all the people shall say, ‘Amen.’
  '25':
  - type: text
    content: ‘Cursed is he who accepts a bribe to strike down an innocent person.’ And all the people shall say, ‘Amen.’
  '26':
  - type: text
    content: ‘Cursed is he who does not confirm the words of this law by doing them [keeping them, taking them to heart as the rule of his life].’ And all the people shall say, ‘Amen.’
  '3':
  - type: text
    content: You shall write on the stones all the words of this law when you cross over, so that you may go into the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God gives you, a land [of plenty] '
  - type: note
    content: See note 26:9.
  - type: text
    content: flowing with milk and honey, just as the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of your fathers has promised you. '
  '4':
  - type: text
    content: 'Now when you cross the Jordan you shall set up these stones on Mount Ebal, just as I am commanding you today and coat them with plaster. '
  '5':
  - type: text
    content: There you shall build an altar to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, an altar of stones; you shall not use an iron tool on them. '
  '6':
  - type: text
    content: You shall build the altar of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God with whole [uncut] stones, and offer burnt offerings on it to the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God; '
  '7':
  - type: text
    content: and you shall sacrifice peace offerings and shall eat there, and shall rejoice before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '8':
  - type: text
    content: And you shall write very clearly on the stones all the words of this law.”
  '9':
  - type: text
    content: Then Moses and the Levitical priests said to all Israel, “Be silent and listen, O Israel! This day you have become a people for the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
