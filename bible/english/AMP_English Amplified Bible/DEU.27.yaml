document_id: DEU.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Altar at Mount Ebal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Moses and the elders of Israel commanded the people, saying, “Keep (remember, obey) all the commandments which I am commanding you today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So it shall be on the day when you cross the Jordan to [enter] the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you, that you shall set up for yourself large stones and coat them with plaster (lime, whitewash). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You shall write on the stones all the words of this law when you cross over, so that you may go into the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you, a land [of plenty] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 26:9.
    marker-yv: yv-n
  - type: text
    text: flowing with milk and honey, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of your fathers has promised you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now when you cross the Jordan you shall set up these stones on Mount Ebal, just as I am commanding you today and coat them with plaster. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: There you shall build an altar to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, an altar of stones; you shall not use an iron tool on them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You shall build the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God with whole [uncut] stones, and offer burnt offerings on it to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and you shall sacrifice peace offerings and shall eat there, and shall rejoice before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And you shall write very clearly on the stones all the words of this law.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then Moses and the Levitical priests said to all Israel, “Be silent and listen, O Israel! This day you have become a people for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So you shall obey the voice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, and do His commandments and statutes which I am commanding you today.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Curses of Mount Ebal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moses also commanded the people that day, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“These [tribes] shall stand on Mount Gerizim to bless the people when you have crossed the Jordan: Simeon, Levi, Judah, Issachar, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The tribes of the descendants of Joseph’s sons, Ephraim and Manasseh, stood together as the tribe of Joseph.
    marker-yv: yv-n
  - type: text
    text: 'Joseph, and Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'These [tribes] shall stand on Mount Ebal to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pronounce
  - type: text
    text: ' the curse [for disobedience]: Reuben, Gad, Asher, Zebulun, Dan, and Naphtali. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The Levites shall answer with a loud voice to all the men of Israel:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ‘Cursed is the man who makes a carved or cast image (idol), a repulsive thing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the work of the hands of the artisan, and sets it up in secret.’ All the people shall answer and say, ‘Amen.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘Cursed is he who dishonors (treats with contempt) his father or his mother.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘Cursed is he who moves his neighbor’s boundary mark.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ‘Cursed is he who misleads a blind person on the road.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ‘Cursed is he who distorts (perverts) the justice due to a stranger, an orphan, and a widow.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '‘Cursed is he who is intimate with his father’s [former] wife, because he has '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: uncovered his father’s skirt
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: violated what belongs to his father.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ‘Cursed is he who is intimate with any animal.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ‘Cursed is he who is intimate with his [half-] sister, whether his father’s or his mother’s daughter.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ‘Cursed is he who is intimate with his mother-in-law.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ‘Cursed is he who strikes his neighbor in secret.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ‘Cursed is he who accepts a bribe to strike down an innocent person.’ And all the people shall say, ‘Amen.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ‘Cursed is he who does not confirm the words of this law by doing them [keeping them, taking them to heart as the rule of his life].’ And all the people shall say, ‘Amen.’
