document_id: JOS.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Forty-eight Cities of the Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the heads of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fathers
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'households of the Levites came to Eleazar the priest, and Joshua the son of Nun, and the heads of the households of the tribes of the sons of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They spoke to them at Shiloh in the land of Canaan, saying, “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses to give us cities to live in, with their pasture lands for our cattle.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So the sons of Israel gave the Levites from their inheritance these [forty-eight] cities and their pasture lands, in accordance with the command of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The [first] lot (allotment) came out for the families of the Kohathites. So those '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Levites were divided into three groups, the descendants of Levi’s three sons, Gershon, Kohath, and Merari. But only those Israelites who were descendants of Levi through Kohath’s grandson Aaron could be priests. The priesthood was made hereditary in the family of Aaron and restricted to it; however, even some of these were rendered ineligible by physical disabilities (Lev 21:16ff). The other families of Levi’s descendants, the Gershonites and Merarites, and those Kohathites who were not descended from Aaron, were entrusted with the care of the sanctuary. The priests ministered at the altar.
    marker-yv: yv-n
  - type: text
    text: Levites who were sons (descendants) of Aaron the priest received thirteen cities by lot from the tribe of Judah and from the tribe of Simeon and from the tribe of Benjamin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The rest of the sons of Kohath received ten cities by lot from the families of the tribe of Ephraim and from the tribe of Dan and from the half-tribe of Manasseh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The sons of Gershon received thirteen cities by lot from the families of the tribe of Issachar and from the tribe of Asher and from the tribe of Naphtali and from the half-tribe of Manasseh in Bashan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The sons of Merari according to their families received twelve cities from the tribe of Reuben and from the tribe of Gad and from the tribe of Zebulun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The sons of Israel gave by lot to the Levites these cities with their pasture lands, as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded through Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They gave these cities which are mentioned here by name from the tribe of the sons of Judah and from the tribe of the sons of Simeon; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and they were for the sons of Aaron, one of the families of the Kohathites, of the sons of Levi, because the lot fell to them first. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They gave them [the city of] Kiriath-arba, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Arba being
  - type: text
    text: ' the father of Anak (that is, Hebron) in the hill country of Judah, with its surrounding pasture lands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But the fields of the city and its villages they had given to Caleb the son of Jephunneh as his property.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So to the sons of Aaron the priest they gave Hebron, the city of refuge for anyone who committed manslaughter, with its pasture lands, and Libnah with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and Jattir with its pasture lands and Eshtemoa with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Holon with its pasture lands and Debir with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and Ain with its pasture lands and Juttah with its pasture lands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Beth-shemesh with its pasture lands; nine cities from these two tribes (Judah and Simeon). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'From the tribe of Benjamin, Gibeon with its pasture lands, and Geba with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Anathoth with its pasture lands and Almon with its pasture lands; four cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: All the cities of the sons of Aaron, the priests, were thirteen cities with their pasture lands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then the cities from the tribe of Ephraim were allotted to the families of the sons of Kohath, the Levites, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even to
  - type: text
    text: ' the rest of the sons of Kohath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They gave them Shechem, the city of refuge for anyone who committed manslaughter, with its pasture lands, in the hill country of Ephraim, and Gezer with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and Kibzaim with its pasture lands and Beth-horon with its pasture lands; four cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'From the tribe of Dan, Eltekeh with its pasture lands, Gibbethon with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aijalon with its pasture lands, Gath-rimmon with its pasture lands; four cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'From the half-tribe of Manasseh, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they allotted
  - type: text
    text: ' Taanach with its pasture lands and Gath-rimmon with its pasture lands; two cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'All the cities with their pasture lands for the families of the rest of the sons of Kohath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: totaled
  - type: text
    text: ' ten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'To the sons of Gershon, one of the families of the Levites, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they gave
  - type: text
    text: ' from the other half-tribe of Manasseh, [the city of] Golan in Bashan, the city of refuge for anyone who committed manslaughter, with its pasture lands, and Be-eshterah with its pasture lands; two cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'From the tribe of Issachar, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they gave
  - type: text
    text: ' Kishion with its pasture lands, Daberath with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jarmuth with its pasture lands, and En-gannim with its pasture lands; four cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'From the tribe of Asher, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they gave
  - type: text
    text: ' Mishal with its pasture lands, Abdon with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Helkath with its pasture lands and Rehob with its pasture lands; four cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'From the tribe of Naphtali, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they gave
  - type: text
    text: ' Kedesh in Galilee, the city of refuge for anyone who committed manslaughter, with its pasture lands and Hammoth-dor with its pasture lands and Kartan with its pasture lands; three cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: All the cities of the Gershonites according to their families were thirteen cities with their pasture lands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'To the families of the sons of Merari, the rest of the Levites, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they gave
  - type: text
    text: ' from the tribe of Zebulun, Jokneam with its pasture lands and Kartah with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dimnah with its pasture lands and Nahalal with its pasture lands; four cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'From the tribe of Reuben, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they gave
  - type: text
    text: ' Bezer with its pasture lands and Jahaz with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Kedemoth with its pasture lands and Mephaath with its pasture lands; four cities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'From the tribe of Gad, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they gave
  - type: text
    text: ' Ramoth in Gilead, the city of refuge for anyone who committed manslaughter, with its pasture lands and Mahanaim with its pasture lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Heshbon with its pasture lands and Jazer with its pasture lands; four cities in all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: All [these were] the cities of the sons of Merari according to their families, the rest of the families of the Levites; and their lot was twelve cities.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'All the cities of the Levites in the midst of the property of the sons of Israel were forty-eight cities with their pasture lands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: These cities each had its surrounding pasture lands; so it was with all these cities.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave Israel all the land which He had sworn to give to their fathers (ancestors), and they took possession of it and lived in it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave them rest [from conflict] on every side, in accordance with everything that He had sworn to their fathers, and not one of all their enemies stood before them [in battle]; the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' handed over all their enemies to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Not one of the good promises which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had spoken to the house of Israel failed; all had come to pass.'
