document_id: PSA.69,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 69
  - type: heading
    content: A Cry of Distress and Imprecation on Adversaries.
  - type: text
    content: 'To the Chief Musician; set to [the tune of] “Lilies.” '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: Save me, O God,
  - type: text
    content: For the waters have threatened my life [they have come up to my neck].
  '10':
  - type: text
    content: 'When I wept '
  - type: text
    content: and
  - type: text
    content: ' humbled myself with fasting,'
  - type: text
    content: It became my reproach.
  '11':
  - type: text
    content: When I made sackcloth my clothing [as one in mourning],
  - type: text
    content: I became a byword [a mere object of scorn] to them.
  '12':
  - type: text
    content: 'They who sit in the [city’s] gate talk about me '
  - type: text
    content: and
  - type: text
    content: ' mock me,'
  - type: text
    content: And I am the song of the drunkards.
  '13':
  - type: text
    content: ¶But as for me, my prayer is to You, O L
  - type: heading
    content: ord
  - type: text
    content: ', at an acceptable '
  - type: text
    content: and
  - type: text
    content: ' opportune time;'
  - type: text
    content: 'O God, in the greatness of Your favor '
  - type: text
    content: and
  - type: text
    content: ' in the abundance of Your lovingkindness,'
  - type: text
    content: Answer me with truth [that is, the faithfulness of Your salvation].
  '14':
  - type: text
    content: Rescue me from the mire and do not let me sink;
  - type: text
    content: Let me be rescued from those who hate me and from the deep waters.
  '15':
  - type: text
    content: Do not let the floodwater overwhelm me,
  - type: text
    content: Nor the deep waters swallow me up,
  - type: text
    content: Nor the pit [of Sheol] shut its mouth over me.
  '16':
  - type: text
    content: ¶Answer me, O L
  - type: heading
    content: ord
  - type: text
    content: ', for Your lovingkindness is sweet '
  - type: text
    content: and
  - type: text
    content: ' good '
  - type: text
    content: and
  - type: text
    content: ' comforting;'
  - type: text
    content: According to the greatness of Your compassion, turn to me.
  '17':
  - type: text
    content: Do not hide Your face from Your servant,
  - type: text
    content: For I am in distress; answer me quickly.
  '18':
  - type: text
    content: Draw near to my soul and redeem it;
  - type: text
    content: Ransom me because of my enemies [so that they do not delight in my distress].
  '19':
  - type: text
    content: You know my reproach and my shame and my dishonor [how I am insulted];
  - type: text
    content: My adversaries are all before You [each one fully known].
  '2':
  - type: text
    content: I have sunk in deep mire, where there is no foothold;
  - type: text
    content: I have come into deep waters, where a flood overwhelms me.
  '20':
  - type: text
    content: '¶Reproach '
  - type: text
    content: and
  - type: text
    content: ' insults have broken my heart and I am so sick.'
  - type: text
    content: I looked for sympathy, but there was none,
  - type: text
    content: And for comforters, but I found none.
  '21':
  - type: text
    content: They (self-righteous hypocrites) also gave me gall [poisonous and bitter] for my food,
  - type: text
    content: And for my thirst they gave me vinegar to drink. [Matt 27:34, 48]
  '22':
  - type: text
    content: ¶May their table [with all its abundance and luxury] become a snare [to them];
  - type: text
    content: 'And when they are in peace [secure at their sacrificial feasts], '
  - type: text
    content: may it become
  - type: text
    content: ' a trap.'
  '23':
  - type: text
    content: May their eyes be dimmed so that they cannot see,
  - type: text
    content: And make their loins shake continually [in terror and weakness].
  '24':
  - type: text
    content: Pour out Your indignation on them,
  - type: text
    content: And let [the fierceness of] Your burning anger overtake them.
  '25':
  - type: text
    content: May their encampment be desolate;
  - type: text
    content: May no one dwell in their tents. [Matt 23:38; Acts 1:20]
  '26':
  - type: text
    content: For they have persecuted him whom You have struck,
  - type: text
    content: 'And they tell of the pain of those whom You have pierced '
  - type: text
    content: and
  - type: text
    content: ' wounded.'
  '27':
  - type: text
    content: Add [unforgiven] iniquity to their iniquity [in Your book],
  - type: text
    content: 'And may they not come into Your '
  - type: note
    content: I.e. be justified and acquitted by You.
  - type: text
    content: righteousness.
  '28':
  - type: text
    content: May they be blotted out of the book of life [and their lives come to an end]
  - type: text
    content: And may they not be recorded with the righteous (those in right standing with God). [Rev 3:4, 5; 20:12, 15; 21:27]
  '29':
  - type: text
    content: ¶But I am sorrowful and in pain;
  - type: text
    content: May Your salvation, O God, set me [securely] on high.
  '3':
  - type: text
    content: I am weary with my crying; my throat is parched;
  - type: text
    content: My eyes fail while I wait [with confident expectation] for my God.
  '30':
  - type: text
    content: I will praise the name of God with song
  - type: text
    content: And magnify Him with thanksgiving.
  '31':
  - type: text
    content: And it will please the L
  - type: heading
    content: ord
  - type: text
    content: ' better than an ox'
  - type: text
    content: Or a young bull with horns and hoofs.
  '32':
  - type: text
    content: The humble have seen it and are glad;
  - type: text
    content: 'You who seek God [requiring Him as your greatest need], let your heart revive '
  - type: text
    content: and
  - type: text
    content: ' live. [Ps 22:26; 42:1]'
  '33':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' hears the needy'
  - type: text
    content: 'And does not despise His '
  - type: text
    content: who are
  - type: text
    content: ' prisoners.'
  '34':
  - type: text
    content: ¶Let heaven and earth praise Him,
  - type: text
    content: The seas and everything that moves in them.
  '35':
  - type: text
    content: For God will save Zion and rebuild the cities of Judah,
  - type: text
    content: That His servants may remain there and possess it.
  '36':
  - type: text
    content: The descendants of His servants will inherit it,
  - type: text
    content: And those who love His name will dwell in it.
  '4':
  - type: text
    content: Those who hate me without cause are more than the hairs of my head;
  - type: text
    content: Those who would destroy me are powerful, being my enemies wrongfully;
  - type: text
    content: I am forced to restore what I did not steal. [John 15:25]
  '5':
  - type: text
    content: ¶O God, You know my folly;
  - type: text
    content: My wrongs are not hidden from You.
  '6':
  - type: text
    content: 'Do not let those who wait [confidently] for You be '
  - type: note
    content: I.e. have their expectations in Your goodness be disappointed.
  - type: text
    content: 'ashamed through me, O Lord '
  - type: note
    content: Heb YHWH (Yahweh), usually rendered Lord.
  - type: text
    content: G
  - type: heading
    content: od
  - type: text
    content: ' of hosts;'
  - type: text
    content: Do not let those who seek You [as necessary for life itself] be dishonored through me, O God of Israel,
  '7':
  - type: text
    content: Because for Your sake I have borne reproach;
  - type: text
    content: 'Confusion '
  - type: text
    content: and
  - type: text
    content: ' dishonor have covered my face.'
  '8':
  - type: text
    content: I have become estranged from my brothers
  - type: text
    content: And an alien to my mother’s sons. [John 7:3-5]
  '9':
  - type: text
    content: For zeal for Your house has consumed me,
  - type: text
    content: And the [mocking] insults of those who insult You have fallen on me. [John 2:17; Rom 15:3]
