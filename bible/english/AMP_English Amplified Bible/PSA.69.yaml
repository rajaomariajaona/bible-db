document_id: PSA.69,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 69
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Cry of Distress and Imprecation on Adversaries.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician; set to [the tune of] “Lilies.” '
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me, O God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the waters have threatened my life [they have come up to my neck].
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When I wept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humbled myself with fasting,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It became my reproach.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I made sackcloth my clothing [as one in mourning],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I became a byword [a mere object of scorn] to them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They who sit in the [city’s] gate talk about me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mock me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I am the song of the drunkards.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶But as for me, my prayer is to You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', at an acceptable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' opportune time;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O God, in the greatness of Your favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in the abundance of Your lovingkindness,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Answer me with truth [that is, the faithfulness of Your salvation].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from the mire and do not let me sink;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me be rescued from those who hate me and from the deep waters.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not let the floodwater overwhelm me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor the deep waters swallow me up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor the pit [of Sheol] shut its mouth over me.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Answer me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for Your lovingkindness is sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comforting;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: According to the greatness of Your compassion, turn to me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not hide Your face from Your servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am in distress; answer me quickly.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Draw near to my soul and redeem it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ransom me because of my enemies [so that they do not delight in my distress].
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know my reproach and my shame and my dishonor [how I am insulted];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My adversaries are all before You [each one fully known].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have sunk in deep mire, where there is no foothold;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have come into deep waters, where a flood overwhelms me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insults have broken my heart and I am so sick.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked for sympathy, but there was none,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And for comforters, but I found none.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They (self-righteous hypocrites) also gave me gall [poisonous and bitter] for my food,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And for my thirst they gave me vinegar to drink. [Matt 27:34, 48]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶May their table [with all its abundance and luxury] become a snare [to them];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And when they are in peace [secure at their sacrificial feasts], '
    - type: usfm
      marker: it
      children:
      - type: text
        text: may it become
    - type: text
      text: ' a trap.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May their eyes be dimmed so that they cannot see,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And make their loins shake continually [in terror and weakness].
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour out Your indignation on them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let [the fierceness of] Your burning anger overtake them.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May their encampment be desolate;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May no one dwell in their tents. [Matt 23:38; Acts 1:20]
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have persecuted him whom You have struck,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they tell of the pain of those whom You have pierced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wounded.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Add [unforgiven] iniquity to their iniquity [in Your book],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And may they not come into Your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '69:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. be justified and acquitted by You.
      marker-yv: yv-n
    - type: text
      text: righteousness.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they be blotted out of the book of life [and their lives come to an end]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And may they not be recorded with the righteous (those in right standing with God). [Rev 3:4, 5; 20:12, 15; 21:27]
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶But I am sorrowful and in pain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May Your salvation, O God, set me [securely] on high.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am weary with my crying; my throat is parched;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes fail while I wait [with confident expectation] for my God.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will praise the name of God with song
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And magnify Him with thanksgiving.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it will please the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' better than an ox'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or a young bull with horns and hoofs.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The humble have seen it and are glad;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You who seek God [requiring Him as your greatest need], let your heart revive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' live. [Ps 22:26; 42:1]'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' hears the needy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And does not despise His '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who are
    - type: text
      text: ' prisoners.'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Let heaven and earth praise Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The seas and everything that moves in them.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God will save Zion and rebuild the cities of Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That His servants may remain there and possess it.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The descendants of His servants will inherit it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who love His name will dwell in it.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who hate me without cause are more than the hairs of my head;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who would destroy me are powerful, being my enemies wrongfully;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am forced to restore what I did not steal. [John 15:25]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O God, You know my folly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My wrongs are not hidden from You.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not let those who wait [confidently] for You be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '69:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. have their expectations in Your goodness be disappointed.
      marker-yv: yv-n
    - type: text
      text: 'ashamed through me, O Lord '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '69:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH (Yahweh),
        - type: text
          text: ' usually rendered L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' of hosts;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not let those who seek You [as necessary for life itself] be dishonored through me, O God of Israel,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because for Your sake I have borne reproach;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dishonor have covered my face.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have become estranged from my brothers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And an alien to my mother’s sons. [John 7:3-5]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For zeal for Your house has consumed me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the [mocking] insults of those who insult You have fallen on me. [John 2:17; Rom 15:3]
