  '22':
  - type: text
    content: ¶The stone which the builders rejected
  - type: text
    content: 'Has become the '
  - type: note
    content: This refers either to the prominent stone at the top of a corner tower, or perhaps more likely to the stone at the foundation of a corner, the first stone laid for a structure (cf Eph 2:20). The special significance of the latter is that the shape of its sides determined how the walls were laid out. The verse refers prophetically to Jesus the Messiah (see Matt 21:42 etc.), but the ancient rabbis interpreted it as a reference to David, who started as a humble shepherd, not the background one would expect for a king. Some prophetic passages refer to an event in the past that is a precursor or foreshadowing of the future prophetic event.
  - type: text
    content: 'chief corner '
  - type: text
    content: stone
  - type: text
    content: .
