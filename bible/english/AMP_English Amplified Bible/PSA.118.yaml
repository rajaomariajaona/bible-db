document_id: PSA.118,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 118
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thanksgiving for the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ’
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: s
      - type: text
        text: ' Saving Goodness.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O give thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for He is good;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶All nations encompassed me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' I will surely cut them off.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They encompassed me, yes, they surrounded me [on every side];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' I will cut them off.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They swarmed around me like bees;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They flare up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are extinguished like a fire of thorns;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' I will surely cut them off. [Deut 1:44]'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You [my enemy] pushed me violently so that I was falling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' helped me.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is my strength and song,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He has become my salvation.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '¶The sound of joyful shouting and salvation is in the tents of the righteous:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The right hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' does valiantly.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The right hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is exalted;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The right hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' does valiantly.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I will not die, but live,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And declare the works '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recount the illustrious acts of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has disciplined me severely,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He has not given me over to death. [2 Cor 6:9]
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ¶Open to me the [temple] gates of righteousness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I shall enter through them, I shall give thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Oh let Israel say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His lovingkindness endures forever.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: This is the gate of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous will enter through it. [Ps 24:7]
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I will give thanks to You, for You have heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' answered me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You have become my salvation [my Rescuer, my Savior].
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ¶The stone which the builders rejected
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Has become the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '118:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This refers either to the prominent stone at the top of a corner tower, or perhaps more likely to the stone at the foundation of a corner, the first stone laid for a structure (cf Eph 2:20). The special significance of the latter is that the shape of its sides determined how the walls were laid out. The verse refers prophetically to Jesus the Messiah (see Matt 21:42 etc.), but the ancient rabbis interpreted it as a reference to David, who started as a humble shepherd, not the background one would expect for a king. Some prophetic passages refer to an event in the past that is a precursor or foreshadowing of the future prophetic event.
      marker-yv: yv-n
    - type: text
      text: 'chief corner '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stone
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: This is from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is His doing;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is marvelous in our eyes. [Matt 21:42; Acts 4:11; 1 Pet 2:7]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: This [day in which God has saved me] is the day which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has made;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us rejoice and be glad in it.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', save now, we beseech You;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', we beseech You, send now prosperity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give us success!'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Blessed is the one who comes in the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have blessed you from the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [you who come into His sanctuary under His guardianship]. [Mark 11:9, 10]'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is God, and He has given us light [illuminating us with His grace and freedom and joy].'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bind the festival sacrifices with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '118:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: branches
        - type: text
          text: '. In Jewish tradition this is interpreted as a ritual for the Feast of Booths. The term “festival” is understood as a reference to the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: lulav,
        - type: text
          text: ' several branches bound together and later placed against the altar so that they reach to the top of the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: horns
        - type: text
          text: ' and bend over the altar.'
      marker-yv: yv-n
    - type: text
      text: cords to the horns of the altar.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: You are my God, and I give thanks to You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[You are] my God, I extol You.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: O give thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for He is good;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Oh let the house of Aaron say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His lovingkindness endures forever.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Oh let those who [reverently] fear the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', say,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His lovingkindness endures forever.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶Out of my distress I called on the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' answered me and set me free.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is on my side; I will not fear.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What can [mere] man do to me? [Heb 13:6]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is on my side, He is among those who help me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I will look [in triumph] on those who hate me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: It is better to take refuge in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than to trust in man.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: It is better to take refuge in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than to trust in princes.
