  - type: text
    content: 'Bind the festival sacrifices with '
  - type: note
    content: Lit branches. In Jewish tradition this is interpreted as a ritual for the Feast of Booths. The term “festival” is understood as a reference to the lulav, several branches bound together and later placed against the altar so that they reach to the top of the horns and bend over the altar.
  - type: text
    content: cords to the horns of the altar.
