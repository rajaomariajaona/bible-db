document_id: PRO.28,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Warnings and Instructions
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The wicked flee when no one pursues them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the righteous are as bold as a lion. [Lev 26:17, 36; Ps 53:5]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He who leads the upright astray on an evil path
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will himself fall into his own pit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the blameless will inherit good.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The rich man [who is conceited and relies on his wealth instead of God] is wise in his own eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the poor man who has understanding [because he relies on God] is able to see through him.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When the righteous triumph, there is great glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' celebration;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when the wicked rise [to prominence], men hide themselves.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He who conceals his transgressions will not prosper,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But whoever confesses and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsakes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'turns away from his sins will find compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy. [Ps 32:3, 5; 1 John 1:8-10]'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favored by God is the man who fears [sin and its consequence] at all times,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who hardens his heart [and is determined to sin] will fall into disaster.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Like a roaring lion and a charging bear
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is a wicked ruler over a poor people.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'A leader who is a great oppressor lacks understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' common sense [and his wickedness shortens his days],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who hates unjust gain will [be blessed and] prolong his days.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: A man who is burdened with the guilt of human blood (murder)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will be a fugitive until death; let no one support him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' give him refuge.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He who walks blamelessly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uprightly will be kept safe,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who is crooked (perverse) will suddenly fall.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He who cultivates his land will have plenty of bread,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who follows worthless people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' frivolous pursuits will have plenty of poverty.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When a land does wrong, it has many princes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when the ruler is a man of understanding and knowledge, its stability endures.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: A faithful (right-minded) man will abound with blessings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who hurries to be rich will not go unpunished. [Prov 13:11; 20:21; 23:4; 1 Tim 6:9]
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'To have regard for one person over another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to show favoritism is not good,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because for a piece of bread a man will transgress.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'He who has an evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' envious eye hurries to be rich'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And does not know that poverty will come upon him. [Prov 21:5; 28:20]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He who [appropriately] reprimands a [wise] man will afterward find more favor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than he who flatters with the tongue.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: He who robs his father or his mother
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And says, “This is no sin,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is [not only a thief but also] the companion of a man who destroys.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'An arrogant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greedy man stirs up strife,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who trusts in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosper.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He who trusts confidently in his own heart is a [dull, thickheaded] fool,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who walks in [skillful and godly] wisdom will be rescued. [James 1:5]
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: He who gives to the poor will never want,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who shuts his eyes [from their need] will have many curses. [Deut 15:7; Prov 19:17; 22:9]
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: When the wicked rise [to power], men hide themselves;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But when the wicked perish, the [consistently] righteous increase '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become great. [Prov 28:12]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'A poor man who oppresses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exploits the lowly'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is like a sweeping rain which leaves no food. [Matt 18:28]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Those who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsake
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: set aside the law [of God and man] praise the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who keep the law [of God and man] struggle with them. [Prov 29:18]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Evil men do not understand justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But they who long for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' understand it fully. [John 7:17; 1 Cor 2:15; 1 John 2:20, 27]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Better is the poor who walks in his integrity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Than he who is crooked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' two-faced though he is rich. [Prov 19:1]'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He who keeps the law [of God and man] is a wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discerning son,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who is a companion of gluttons humiliates his father [and himself].
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He who increases his wealth by interest and usury (excessive interest)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gathers it for him who is gracious to the poor. [Job 27:16, 17; Prov 13:22; Eccl 2:26]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He who turns his ear away from listening to the law [of God and man],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even his prayer is repulsive [to God]. [Ps 66:18; 109:7; Prov 15:8; Zech 7:11]
