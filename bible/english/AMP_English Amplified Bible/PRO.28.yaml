document_id: PRO.28,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Warnings and Instructions
  - type: text
    content: The wicked flee when no one pursues them,
  - type: text
    content: But the righteous are as bold as a lion. [Lev 26:17, 36; Ps 53:5]
  '10':
  - type: text
    content: He who leads the upright astray on an evil path
  - type: text
    content: Will himself fall into his own pit,
  - type: text
    content: But the blameless will inherit good.
  '11':
  - type: text
    content: The rich man [who is conceited and relies on his wealth instead of God] is wise in his own eyes,
  - type: text
    content: But the poor man who has understanding [because he relies on God] is able to see through him.
  '12':
  - type: text
    content: 'When the righteous triumph, there is great glory '
  - type: text
    content: and
  - type: text
    content: ' celebration;'
  - type: text
    content: But when the wicked rise [to prominence], men hide themselves.
  '13':
  - type: text
    content: He who conceals his transgressions will not prosper,
  - type: text
    content: 'But whoever confesses and '
  - type: note
    content: Lit forsakes.
  - type: text
    content: 'turns away from his sins will find compassion '
  - type: text
    content: and
  - type: text
    content: ' mercy. [Ps 32:3, 5; 1 John 1:8-10]'
  '14':
  - type: text
    content: 'Blessed '
  - type: text
    content: and
  - type: text
    content: ' favored by God is the man who fears [sin and its consequence] at all times,'
  - type: text
    content: But he who hardens his heart [and is determined to sin] will fall into disaster.
  '15':
  - type: text
    content: Like a roaring lion and a charging bear
  - type: text
    content: Is a wicked ruler over a poor people.
  '16':
  - type: text
    content: 'A leader who is a great oppressor lacks understanding '
  - type: text
    content: and
  - type: text
    content: ' common sense [and his wickedness shortens his days],'
  - type: text
    content: But he who hates unjust gain will [be blessed and] prolong his days.
  '17':
  - type: text
    content: A man who is burdened with the guilt of human blood (murder)
  - type: text
    content: 'Will be a fugitive until death; let no one support him '
  - type: text
    content: or
  - type: text
    content: ' give him refuge.'
  '18':
  - type: text
    content: 'He who walks blamelessly '
  - type: text
    content: and
  - type: text
    content: ' uprightly will be kept safe,'
  - type: text
    content: But he who is crooked (perverse) will suddenly fall.
  '19':
  - type: text
    content: He who cultivates his land will have plenty of bread,
  - type: text
    content: 'But he who follows worthless people '
  - type: text
    content: and
  - type: text
    content: ' frivolous pursuits will have plenty of poverty.'
  '2':
  - type: text
    content: When a land does wrong, it has many princes,
  - type: text
    content: But when the ruler is a man of understanding and knowledge, its stability endures.
  '20':
  - type: text
    content: A faithful (right-minded) man will abound with blessings,
  - type: text
    content: But he who hurries to be rich will not go unpunished. [Prov 13:11; 20:21; 23:4; 1 Tim 6:9]
  '21':
  - type: text
    content: 'To have regard for one person over another '
  - type: text
    content: and
  - type: text
    content: ' to show favoritism is not good,'
  - type: text
    content: Because for a piece of bread a man will transgress.
  '22':
  - type: text
    content: 'He who has an evil '
  - type: text
    content: and
  - type: text
    content: ' envious eye hurries to be rich'
  - type: text
    content: And does not know that poverty will come upon him. [Prov 21:5; 28:20]
  '23':
  - type: text
    content: He who [appropriately] reprimands a [wise] man will afterward find more favor
  - type: text
    content: Than he who flatters with the tongue.
  '24':
  - type: text
    content: He who robs his father or his mother
  - type: text
    content: And says, “This is no sin,”
  - type: text
    content: Is [not only a thief but also] the companion of a man who destroys.
  '25':
  - type: text
    content: 'An arrogant '
  - type: text
    content: and
  - type: text
    content: ' greedy man stirs up strife,'
  - type: text
    content: But he who trusts in the L
  - type: heading
    content: ord
  - type: text
    content: ' will be blessed '
  - type: text
    content: and
  - type: text
    content: ' prosper.'
  '26':
  - type: text
    content: He who trusts confidently in his own heart is a [dull, thickheaded] fool,
  - type: text
    content: But he who walks in [skillful and godly] wisdom will be rescued. [James 1:5]
  '27':
  - type: text
    content: He who gives to the poor will never want,
  - type: text
    content: But he who shuts his eyes [from their need] will have many curses. [Deut 15:7; Prov 19:17; 22:9]
  '28':
  - type: text
    content: When the wicked rise [to power], men hide themselves;
  - type: text
    content: 'But when the wicked perish, the [consistently] righteous increase '
  - type: text
    content: and
  - type: text
    content: ' become great. [Prov 28:12]'
  '3':
  - type: text
    content: 'A poor man who oppresses '
  - type: text
    content: and
  - type: text
    content: ' exploits the lowly'
  - type: text
    content: Is like a sweeping rain which leaves no food. [Matt 18:28]
  '4':
  - type: text
    content: 'Those who '
  - type: note
    content: Lit forsake.
  - type: text
    content: set aside the law [of God and man] praise the wicked,
  - type: text
    content: But those who keep the law [of God and man] struggle with them. [Prov 29:18]
  '5':
  - type: text
    content: Evil men do not understand justice,
  - type: text
    content: 'But they who long for '
  - type: text
    content: and
  - type: text
    content: ' seek the L'
  - type: heading
    content: ord
  - type: text
    content: ' understand it fully. [John 7:17; 1 Cor 2:15; 1 John 2:20, 27]'
  '6':
  - type: text
    content: Better is the poor who walks in his integrity
  - type: text
    content: 'Than he who is crooked '
  - type: text
    content: and
  - type: text
    content: ' two-faced though he is rich. [Prov 19:1]'
  '7':
  - type: text
    content: 'He who keeps the law [of God and man] is a wise '
  - type: text
    content: and
  - type: text
    content: ' discerning son,'
  - type: text
    content: But he who is a companion of gluttons humiliates his father [and himself].
  '8':
  - type: text
    content: He who increases his wealth by interest and usury (excessive interest)
  - type: text
    content: Gathers it for him who is gracious to the poor. [Job 27:16, 17; Prov 13:22; Eccl 2:26]
  '9':
  - type: text
    content: He who turns his ear away from listening to the law [of God and man],
  - type: text
    content: Even his prayer is repulsive [to God]. [Ps 66:18; 109:7; Prov 15:8; Zech 7:11]
