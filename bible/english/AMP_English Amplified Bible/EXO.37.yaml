type_code: eng
verses:
  '1':
  - type: heading
    content: Construction Continues
  - type: text
    content: 'Bezalel made the ark [of the covenant] of acacia wood—it was two and a half cubits long, and one and a half cubits wide, and one and a half cubits high. '
  '10':
  - type: text
    content: 'Bezalel made the table [for the bread] of acacia wood; it was two cubits long, a cubit wide, and one and a half cubits high. '
  '11':
  - type: text
    content: 'He overlaid it with pure gold, and made a border of gold for it all around [its top]. '
  '12':
  - type: text
    content: 'He made a rim for it [just under the top] a hand width wide all around, and a border of gold around its rim. '
  '13':
  - type: text
    content: 'He cast four rings of gold for it and fastened the rings to the four corners that were at its four legs. '
  '14':
  - type: text
    content: 'Close by the rim were the rings, the holders for the poles [to pass through] to carry the table. '
  '15':
  - type: text
    content: 'Bezalel made the carrying poles of acacia wood to carry the table and overlaid them with gold. '
  '16':
  - type: text
    content: He made the utensils which were to be on the table, its dishes and its pans [for bread], its bowls and its jars for pouring drink offerings, of pure gold.
  '17':
  - type: text
    content: 'Then he made the lampstand (menorah) of pure gold. He made the lampstand of hammered work, its base and its [center] shaft; its cups, its '
  - type: note
    content: The leaf-like outer part of the flower.
  - type: text
    content: 'calyxes, and its flowers were '
  - type: text
    content: all of one piece
  - type: text
    content: ' with it. '
  '18':
  - type: text
    content: 'There were six branches coming out of the sides of the lampstand, three branches from one side of '
  - type: text
    content: the center shaft
  - type: text
    content: ' and three branches from the other side of it; '
  '19':
  - type: text
    content: 'three cups shaped like almond '
  - type: text
    content: blossoms
  - type: text
    content: ', a calyx and a flower in one branch, and three cups shaped like almond '
  - type: text
    content: blossoms,
  - type: text
    content: ' a calyx and a flower in the opposite branch—so for the six branches coming out of '
  - type: text
    content: the center shaft of
  - type: text
    content: ' the lampstand. '
  '2':
  - type: text
    content: 'And he overlaid it with pure gold inside and out, and made a molding (border) of gold to go all around [the top of it]. '
  '20':
  - type: text
    content: 'On '
  - type: text
    content: the center shaft of
  - type: text
    content: ' the lampstand there were four cups shaped like almond '
  - type: text
    content: blossoms,
  - type: text
    content: ' with calyxes and flowers [one at the top]; '
  '21':
  - type: text
    content: 'and a calyx was under the '
  - type: text
    content: first
  - type: text
    content: ' pair of branches '
  - type: text
    content: coming
  - type: text
    content: ' out of it, and a calyx under the '
  - type: text
    content: second
  - type: text
    content: ' pair of branches, '
  - type: text
    content: coming
  - type: text
    content: ' out of it, and a calyx under the '
  - type: text
    content: third
  - type: text
    content: ' pair of branches '
  - type: text
    content: coming
  - type: text
    content: ' out of it, for the six branches coming out of the lampstand. '
  '22':
  - type: text
    content: 'Their calyxes and their branches were '
  - type: text
    content: of one piece
  - type: text
    content: ' with it; all of it was a single hammered work of pure gold. '
  '23':
  - type: text
    content: 'He made its seven lamps with its snuffers and its trays of pure gold. '
  '24':
  - type: text
    content: He made the lampstand and all its utensils from a talent of pure gold. [John 1:4, 5, 9; 2 Cor 4:6]
  '25':
  - type: text
    content: 'Then Bezalel made the incense altar of acacia wood; its top was a cubit square and it was two cubits high; the horns were '
  - type: text
    content: of one piece
  - type: text
    content: ' with it. '
  '26':
  - type: text
    content: 'He overlaid it with pure gold, its top, its sides all around and its horns; he also made a rim of gold around it. '
  '27':
  - type: text
    content: 'He made two rings of gold for it under its rim, on its two opposite sides, as holders for the poles [to pass through] to carry it. '
  '28':
  - type: text
    content: 'He made the poles of acacia wood and overlaid them with gold. '
  '29':
  - type: text
    content: He also made the holy anointing oil and the pure, fragrant incense of spices, the work of a perfumer.
  '3':
  - type: text
    content: 'He cast four rings of gold for it on its four feet, two rings on one side and two rings on the other side. '
  '4':
  - type: text
    content: 'He made carrying poles of acacia wood and overlaid them with gold. '
  '5':
  - type: text
    content: 'He put the carrying poles through the rings at the sides of the ark, to carry it. '
  '6':
  - type: text
    content: 'Bezalel made the mercy seat of pure gold; it was two and a half cubits long, and one and a half cubits wide. '
  '7':
  - type: text
    content: 'He made two cherubim of hammered gold; he made them at the two ends of the mercy seat, '
  '8':
  - type: text
    content: 'one cherub at one end and one cherub at the other end; he made the cherubim [of one piece] with the mercy seat at the two ends. '
  '9':
  - type: text
    content: 'The cherubim spread out their wings upward, covering '
  - type: text
    content: and
  - type: text
    content: ' protecting the mercy seat with their wings, with their faces toward each other; the faces of the cherubim were [looking downward] toward the mercy seat. [Heb 9:23-26]'
