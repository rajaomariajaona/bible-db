document_id: 2CH.33,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh Succeeds Hezekiah in Judah
  - type: text
    content: 'Manasseh was twelve years old when he became king, and he reigned for fifty-five years in Jerusalem. '
  '10':
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Manasseh and to his people, but they paid no attention. '
  '11':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' brought the commanders of the army of the king of Assyria against them, and they captured Manasseh with hooks [through his nose or cheeks] and bound him with bronze [chains] and took him to Babylon. '
  '12':
  - type: text
    content: But when he was in distress, he sought the L
  - type: heading
    content: ord
  - type: text
    content: ' his God and humbled himself greatly before the God of his fathers. '
  '13':
  - type: text
    content: When he prayed to Him, He was moved by his entreaty and heard his pleading, and brought him back to Jerusalem to his kingdom. Then Manasseh knew that the L
  - type: heading
    content: ord
  - type: text
    content: ' is God.'
  '14':
  - type: text
    content: 'After this he built an outer wall for the City of David on the west side of Gihon, in the river valley, to the entrance of the Fish Gate; and he encircled the '
  - type: note
    content: The original old city.
  - type: text
    content: 'Ophel '
  - type: text
    content: with it
  - type: text
    content: ' and made it very high. Then he put military commanders in all the fortified cities of Judah. '
  '15':
  - type: text
    content: He also removed the foreign gods and the idol from the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', as well as all the altars which he had built on the mountain of the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and in Jerusalem; and he threw them outside the city. '
  '16':
  - type: text
    content: Then he set up the altar of the L
  - type: heading
    content: ord
  - type: text
    content: ' and sacrificed peace offerings and thank offerings on it; and he ordered Judah to serve the L'
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel. [Ex 35:5, 22] '
  '17':
  - type: text
    content: 'Yet the people still sacrificed on the high places, '
  - type: text
    content: but
  - type: text
    content: ' only to the L'
  - type: heading
    content: ord
  - type: text
    content: ' their God.'
  '18':
  - type: text
    content: Now the rest of the acts of Manasseh, and his prayer to his God, and the words of the seers who spoke to him in the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel, behold, they are among the records of the kings of Israel. '
  '19':
  - type: text
    content: 'His prayer also and how God heard him, and all his sin, his unfaithfulness, and the sites on which he built high places and set up the Asherim and the carved images, before he humbled himself, behold, they are written in the records of the '
  - type: note
    content: Greek reads seers.
  - type: text
    content: 'Hozai. '
  '2':
  - type: text
    content: But he did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', like the repulsive acts of the [pagan] nations whom the L'
  - type: heading
    content: ord
  - type: text
    content: ' dispossessed before the sons (descendants) of Israel. '
  '20':
  - type: text
    content: So Manasseh slept with his fathers [in death], and they buried him in [the garden of] his own house. And his son Amon became king in his place.
  - type: heading
    content: Amon Becomes King in Judah
  '21':
  - type: text
    content: 'Amon was twenty-two years old when he became king, and he reigned for two years in Jerusalem. '
  '22':
  - type: text
    content: But he did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', just as his father Manasseh had done. Amon sacrificed to all the carved images which his father Manasseh had made, and he served them. '
  '23':
  - type: text
    content: Further, he did not humble himself before the L
  - type: heading
    content: ord
  - type: text
    content: ' as his father Manasseh [finally] had done, but Amon multiplied his guilt '
  - type: text
    content: and
  - type: text
    content: ' his sin. '
  '24':
  - type: text
    content: 'And his servants conspired against him and killed him in his own house (palace). '
  '25':
  - type: text
    content: But the people of the land struck down all those who had conspired against King Amon, and they made his son Josiah king in his place.
  '3':
  - type: text
    content: 'For he rebuilt the [idolatrous] high places which his father Hezekiah had torn down; and he set up altars for the Baals and made the '
  - type: note
    content: Wooden symbols of a female deity.
  - type: text
    content: 'Asherim, and worshiped all the host of heaven [the sun, the moon, stars and planets] and served them. [Deut 4:19] '
  '4':
  - type: text
    content: He built [pagan] altars in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', of which the L'
  - type: heading
    content: ord
  - type: text
    content: ' had said, “My Name shall be in Jerusalem forever.” '
  '5':
  - type: text
    content: He built altars for all the host of heaven in the two courts of the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '6':
  - type: text
    content: He made his sons pass through the fire [as an offering to his gods] in the Valley of Ben-hinnom; and he practiced witchcraft, used divination, and practiced sorcery, and dealt with mediums and spiritists. He did much evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', provoking Him to anger. '
  '7':
  - type: text
    content: 'Then he set the carved image of the idol which he had made in the house of God, of which God had said to David and to Solomon his son, “In this house and in Jerusalem, which I have chosen from all the tribes of Israel, I will put My Name [and the symbol of my Presence] forever; '
  '8':
  - type: text
    content: 'and I will not again remove Israel from the land which I appointed for your fathers, if they will only be careful to do everything that I have commanded them in regard to all the law, the statutes, and the ordinances '
  - type: text
    content: given
  - type: text
    content: ' through Moses.” '
  '9':
  - type: text
    content: So Manasseh caused Judah and the inhabitants of Jerusalem to sin, by doing more evil than the [pagan] nations whom the L
  - type: heading
    content: ord
  - type: text
    content: ' had destroyed before the sons of Israel.'
  - type: heading
    content: Manasseh’s Idolatry Rebuked
