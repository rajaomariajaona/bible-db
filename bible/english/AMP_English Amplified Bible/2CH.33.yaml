document_id: 2CH.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Manasseh Succeeds Hezekiah in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Manasseh was twelve years old when he became king, and he reigned for fifty-five years in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But he did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', like the repulsive acts of the [pagan] nations whom the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' dispossessed before the sons (descendants) of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For he rebuilt the [idolatrous] high places which his father Hezekiah had torn down; and he set up altars for the Baals and made the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Wooden symbols of a female deity.
    marker-yv: yv-n
  - type: text
    text: 'Asherim, and worshiped all the host of heaven [the sun, the moon, stars and planets] and served them. [Deut 4:19] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He built [pagan] altars in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', of which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had said, “My Name shall be in Jerusalem forever.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He built altars for all the host of heaven in the two courts of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He made his sons pass through the fire [as an offering to his gods] in the Valley of Ben-hinnom; and he practiced witchcraft, used divination, and practiced sorcery, and dealt with mediums and spiritists. He did much evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', provoking Him to anger. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he set the carved image of the idol which he had made in the house of God, of which God had said to David and to Solomon his son, “In this house and in Jerusalem, which I have chosen from all the tribes of Israel, I will put My Name [and the symbol of my Presence] forever; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and I will not again remove Israel from the land which I appointed for your fathers, if they will only be careful to do everything that I have commanded them in regard to all the law, the statutes, and the ordinances '
  - type: usfm
    marker: it
    children:
    - type: text
      text: given
  - type: text
    text: ' through Moses.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Manasseh caused Judah and the inhabitants of Jerusalem to sin, by doing more evil than the [pagan] nations whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had destroyed before the sons of Israel.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Manasseh’s Idolatry Rebuked
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Manasseh and to his people, but they paid no attention. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brought the commanders of the army of the king of Assyria against them, and they captured Manasseh with hooks [through his nose or cheeks] and bound him with bronze [chains] and took him to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But when he was in distress, he sought the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God and humbled himself greatly before the God of his fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When he prayed to Him, He was moved by his entreaty and heard his pleading, and brought him back to Jerusalem to his kingdom. Then Manasseh knew that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'After this he built an outer wall for the City of David on the west side of Gihon, in the river valley, to the entrance of the Fish Gate; and he encircled the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The original old city.
    marker-yv: yv-n
  - type: text
    text: 'Ophel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with it
  - type: text
    text: ' and made it very high. Then he put military commanders in all the fortified cities of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He also removed the foreign gods and the idol from the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', as well as all the altars which he had built on the mountain of the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and in Jerusalem; and he threw them outside the city. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then he set up the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and sacrificed peace offerings and thank offerings on it; and he ordered Judah to serve the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel. [Ex 35:5, 22] '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Yet the people still sacrificed on the high places, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' only to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now the rest of the acts of Manasseh, and his prayer to his God, and the words of the seers who spoke to him in the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel, behold, they are among the records of the kings of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'His prayer also and how God heard him, and all his sin, his unfaithfulness, and the sites on which he built high places and set up the Asherim and the carved images, before he humbled himself, behold, they are written in the records of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek reads '
      - type: usfm
        marker: it
        children:
        - type: text
          text: seers
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Hozai. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So Manasseh slept with his fathers [in death], and they buried him in [the garden of] his own house. And his son Amon became king in his place.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amon Becomes King in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Amon was twenty-two years old when he became king, and he reigned for two years in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But he did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', just as his father Manasseh had done. Amon sacrificed to all the carved images which his father Manasseh had made, and he served them. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Further, he did not humble himself before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' as his father Manasseh [finally] had done, but Amon multiplied his guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' his sin. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And his servants conspired against him and killed him in his own house (palace). '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But the people of the land struck down all those who had conspired against King Amon, and they made his son Josiah king in his place.
