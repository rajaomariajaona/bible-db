verses:
  '1':
  - type: heading
    content: Psalm 14
  - type: heading
    content: Folly and Wickedness of Men.
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: The [spiritually ignorant] fool has said in his heart, “There is no God.”
  - type: text
    content: 'They are corrupt, they have committed repulsive '
  - type: text
    content: and
  - type: text
    content: ' unspeakable deeds;'
  - type: text
    content: There is no one who does good. [Rom 3:10]
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has looked down from heaven upon the children of men'
  - type: text
    content: To see if there are any who understand (act wisely),
  - type: text
    content: Who [truly] seek after God, [longing for His wisdom and guidance].
  '3':
  - type: text
    content: They have all turned aside, together they have become corrupt;
  - type: text
    content: There is no one who does good, not even one. [Rom 3:11, 12]
  '4':
  - type: text
    content: '¶Have all the workers of wickedness '
  - type: text
    content: and
  - type: text
    content: ' injustice no knowledge,'
  - type: text
    content: Who eat up my people as they eat bread,
  - type: text
    content: And do not call upon the L
  - type: heading
    content: ord
  - type: text
    content: '?'
  '5':
  - type: text
    content: There they tremble with great fear,
  - type: text
    content: For God is with the [consistently] righteous generation.
  '6':
  - type: text
    content: You [evildoers] shamefully plan against the poor,
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' is his safe refuge.'
  '7':
  - type: text
    content: ¶Oh, that the salvation of Israel would come out of Zion!
  - type: text
    content: When the L
  - type: heading
    content: ord
  - type: text
    content: ' restores His captive people,'
  - type: text
    content: Then Jacob will rejoice, Israel will be glad. [Rom 11:25-27]
