document_id: PSA.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 14
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Folly and Wickedness of Men.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The [spiritually ignorant] fool has said in his heart, “There is no God.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They are corrupt, they have committed repulsive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unspeakable deeds;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no one who does good. [Rom 3:10]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has looked down from heaven upon the children of men'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To see if there are any who understand (act wisely),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who [truly] seek after God, [longing for His wisdom and guidance].
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have all turned aside, together they have become corrupt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no one who does good, not even one. [Rom 3:11, 12]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Have all the workers of wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' injustice no knowledge,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who eat up my people as they eat bread,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not call upon the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There they tremble with great fear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God is with the [consistently] righteous generation.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You [evildoers] shamefully plan against the poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is his safe refuge.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Oh, that the salvation of Israel would come out of Zion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' restores His captive people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then Jacob will rejoice, Israel will be glad. [Rom 11:25-27]
