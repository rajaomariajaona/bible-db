document_id: DEU.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Urged to Obey God’s Law
  - type: text
    content: '“Now, O Israel, listen '
  - type: text
    content: and
  - type: text
    content: ' pay attention to the statutes and the judgments (God’s legal decisions) which I am teaching you to do, so that you may live and go in and take possession of the land which the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of your fathers, is giving you. '
  '10':
  - type: text
    content: especially
  - type: text
    content: ' the day you stood before the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God at Horeb (Mount Sinai), when the L'
  - type: heading
    content: ord
  - type: text
    content: ' said to me, ‘Assemble the people to Me and I will let them hear My words, so that they may learn to fear Me [with awe-filled reverence and profound respect] all the days they live on the land, and so that they may teach their children.’ '
  '11':
  - type: text
    content: 'You approached and stood at the foot of the mountain, and the mountain burned with fire to the [very] heart of the heavens: darkness, cloud and thick gloom. '
  '12':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to you from the midst of the fire; you heard the sound of the words, but you saw no form—there was only a voice. '
  '13':
  - type: text
    content: 'So He declared to you His covenant which He commanded you to follow, '
  - type: note
    content: Lit the ten words.
  - type: text
    content: 'the Ten Commandments; and He wrote them on two tablets of stone. '
  '14':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' commanded me at that time to teach you the statutes and judgments, so that you might do them in the land which you are going over to possess.'
  '15':
  - type: text
    content: '“So pay attention '
  - type: text
    content: and
  - type: text
    content: ' watch '
  - type: note
    content: Lit your souls.
  - type: text
    content: yourselves carefully—for you did not see any form [of God] on the day the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to you at Horeb from the midst of the fire— '
  '16':
  - type: text
    content: 'so that you do not act corruptly and make for yourselves a carved '
  - type: text
    content: or
  - type: text
    content: ' sculpted image [to worship] in the form of any figure, the likeness of male or female, '
  '17':
  - type: text
    content: 'the likeness of any animal that is on the earth, or of any winged bird that flies in the '
  - type: note
    content: Lit heavens, the reference here is to the first heaven, the “heaven of the clouds.”
  - type: text
    content: 'sky, '
  '18':
  - type: text
    content: 'the likeness of anything that crawls on the ground, or of any fish that is in the waters beneath the earth. '
  '19':
  - type: text
    content: 'And '
  - type: text
    content: beware
  - type: text
    content: ' that you do not raise your eyes toward heaven and see the sun and the moon and the stars, all the host of heaven, and let yourselves be led astray and worship them and serve them, [mere created bodies] which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has allotted to [serve and benefit] all the peoples under the whole heaven. '
  '2':
  - type: text
    content: You shall not add to the word which I am commanding you, nor take away from it, so that you may keep the commandments of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God which I am commanding you. '
  '20':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' has taken you and brought you out of the iron [smelting] furnace, out of Egypt, to be a people for His own possession, as [you are] this day.'
  '21':
  - type: text
    content: “Now the L
  - type: heading
    content: ord
  - type: text
    content: ' was angry with me [at the waters of Meribah] because of you, and He swore [an oath] that I would not cross the Jordan, and that I would not enter the good land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you as an inheritance. '
  '22':
  - type: text
    content: 'For I am going to die in this land, I am not going to cross the Jordan, but you shall cross over and take possession of this good land. '
  '23':
  - type: text
    content: 'So be on your guard '
  - type: text
    content: and
  - type: text
    content: ' watch yourselves, so that you do not forget the covenant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God which He has made with you, and make for yourselves a carved '
  - type: text
    content: or
  - type: text
    content: ' sculpted image in the form of anything which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has forbidden you. '
  '24':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is a consuming fire; He is a '
  - type: note
    content: I.e. intolerant of unfaithfulness.
  - type: text
    content: jealous (impassioned) God [demanding what is rightfully and uniquely His].
  '25':
  - type: text
    content: '“When you become the father of children and grandchildren and have grown old in the land, then if you corrupt yourselves by making a carved '
  - type: text
    content: or
  - type: text
    content: ' sculpted image in the form of anything [for the purpose of worship], and do evil [things] in the sight of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, provoking Him to anger, '
  '26':
  - type: text
    content: 'I call heaven and earth as witnesses against you today, that you will soon utterly perish from the land which you are crossing the Jordan to possess. You shall not live long on it, but will be utterly destroyed. '
  '27':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will scatter '
  - type: text
    content: and
  - type: text
    content: ' disperse you among the peoples (pagan nations), and you will be left few in number among the nations where the L'
  - type: heading
    content: ord
  - type: text
    content: ' drives you. '
  '28':
  - type: text
    content: 'And there you will serve [false and foreign] gods, the work of human hands, [lifeless images of] wood and stone, which neither see nor hear nor eat nor smell [the offerings of food given to them]. '
  '29':
  - type: text
    content: But from there you will seek the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, and you will find '
  - type: text
    content: Him
  - type: text
    content: ' if you search for Him with all your heart and all your soul. '
  '3':
  - type: text
    content: Your eyes have seen what the L
  - type: heading
    content: ord
  - type: text
    content: ' did at Baal-peor; for all the men who followed [and participated in the worship of] Baal of Peor, the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God destroyed them from among you, [Num 25:1-9] '
  '30':
  - type: text
    content: 'When you are in distress '
  - type: text
    content: and
  - type: text
    content: ' tribulation and all these things come on you, in the latter days you will return to the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God and listen to His voice. '
  '31':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is a merciful '
  - type: text
    content: and
  - type: text
    content: ' compassionate God; He will not fail you, nor destroy you, nor forget the covenant with your fathers which He swore to them.'
  '32':
  - type: text
    content: '“Indeed, ask now about the days that are past, [those days] which were before you, since the day that God created man on the earth, and ask from one end of the heavens to the other. Has '
  - type: text
    content: anything
  - type: text
    content: ' been done like this great thing, or has '
  - type: text
    content: anything
  - type: text
    content: ' been heard like it? '
  '33':
  - type: text
    content: 'Did [any] people ever hear the voice of God speaking out of the midst of the fire, as you heard, and [still] live? '
  '34':
  - type: text
    content: 'Or has any [man-made] god ever tried to go and take for himself a nation from within '
  - type: text
    content: another
  - type: text
    content: ' nation by trials, by signs and wonders and by war and by a mighty hand and by an outstretched arm and by great terrors, as the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God did for you in Egypt before your [very] eyes? '
  '35':
  - type: text
    content: 'It was shown to you so that you might have [personal] knowledge '
  - type: text
    content: and
  - type: text
    content: ' comprehend that the L'
  - type: heading
    content: ord
  - type: text
    content: ' is God; there is no other besides Him. '
  '36':
  - type: text
    content: 'Out of the heavens He let you hear His voice to discipline '
  - type: text
    content: and
  - type: text
    content: ' admonish you; and on earth He let you see His great fire, and you heard His words from the midst of the fire. '
  '37':
  - type: text
    content: 'And because He loved your fathers, He chose their descendants who followed them, and brought you from Egypt with His Presence, with His great '
  - type: text
    content: and
  - type: text
    content: ' awesome power, '
  '38':
  - type: text
    content: 'dispossessing '
  - type: text
    content: and
  - type: text
    content: ' driving out from before you nations, [nations that were] greater and mightier than you, to bring you in, to give you their land as an inheritance, as it is this day. '
  '39':
  - type: text
    content: 'Therefore know '
  - type: text
    content: and
  - type: text
    content: ' understand today, and take it to your heart, that the L'
  - type: heading
    content: ord
  - type: text
    content: ' is God in the heavens above and on the earth below; there is no other. '
  '4':
  - type: text
    content: but you who held tightly to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God are alive today, every one of you.'
  '40':
  - type: text
    content: So you shall keep His statutes and His commandments which I am commanding you today, so that it may go well with you and with your children after you, and so that you may live long on the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you for all time.”'
  '41':
  - type: text
    content: 'Then Moses set apart three cities [of refuge] beyond the Jordan toward the rising of the sun (eastward), '
  '42':
  - type: text
    content: 'so that someone who committed manslaughter could flee there, [that is, a person] who killed his neighbor unintentionally and without previously having hostility toward him, and that by escaping to one of these cities he might [claim the right of asylum and] save his life: '
  '43':
  - type: text
    content: Bezer in the wilderness on the plateau for the Reubenites, and Ramoth in Gilead for the Gadites, and Golan in Bashan for the Manassites.
  '44':
  - type: text
    content: 'This is the law which Moses placed before the sons of Israel; '
  '45':
  - type: text
    content: 'these are the testimonies (legal provisions) and the statutes and the judgments which Moses spoke to the sons of Israel when they came out of Egypt, '
  '46':
  - type: text
    content: 'beyond the Jordan in the Valley opposite Beth-peor, in the land of Sihon king of the Amorites who lived at Heshbon, whom Moses and the sons of Israel defeated when they came out from Egypt. '
  '47':
  - type: text
    content: 'They took possession of his land and the land of Og king of Bashan, the two kings of the Amorites, who '
  - type: text
    content: reigned
  - type: text
    content: ' across the Jordan to the east, '
  '48':
  - type: text
    content: 'from Aroer, which is on the edge of the valley of the [river] Arnon, as far as Mount Sion (that is, Hermon), '
  '49':
  - type: text
    content: with all the Arabah (desert lowlands) across the Jordan to the east, even as far as the sea of the Arabah (the Dead Sea), at the foot of the slopes of Pisgah.
  '5':
  - type: text
    content: “Look, I have taught you statutes and judgments just as the L
  - type: heading
    content: ord
  - type: text
    content: ' my God has commanded me, so that you may do them in the land which you are entering to possess. '
  '6':
  - type: text
    content: 'So keep and do them, for that is your wisdom and your understanding in the sight of the peoples who will hear all these statutes and say, ‘Surely this great nation is a wise and understanding people.’ '
  '7':
  - type: text
    content: For what great nation is there that has a god so near to it as the L
  - type: heading
    content: ord
  - type: text
    content: ' our God [is to us] whenever we call on Him? '
  '8':
  - type: text
    content: 'Or what great nation has statutes and judgments so righteous (upright, just) as this whole law which I am '
  - type: note
    content: Lit giving.
  - type: text
    content: placing before you today?
  '9':
  - type: text
    content: '“Only pay attention and watch yourselves closely so that you do not forget the things which your eyes have seen and they do not depart from your heart all the days of your life. Make them known to your children and your grandchildren [impressing these things on their mind and penetrating their heart with these truths]— '
