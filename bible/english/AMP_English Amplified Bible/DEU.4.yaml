document_id: DEU.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel Urged to Obey God’s Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Now, O Israel, listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay attention to the statutes and the judgments (God’s legal decisions) which I am teaching you to do, so that you may live and go in and take possession of the land which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of your fathers, is giving you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You shall not add to the word which I am commanding you, nor take away from it, so that you may keep the commandments of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God which I am commanding you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Your eyes have seen what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' did at Baal-peor; for all the men who followed [and participated in the worship of] Baal of Peor, the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God destroyed them from among you, [Num 25:1-9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: but you who held tightly to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God are alive today, every one of you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Look, I have taught you statutes and judgments just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God has commanded me, so that you may do them in the land which you are entering to possess. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So keep and do them, for that is your wisdom and your understanding in the sight of the peoples who will hear all these statutes and say, ‘Surely this great nation is a wise and understanding people.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For what great nation is there that has a god so near to it as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God [is to us] whenever we call on Him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Or what great nation has statutes and judgments so righteous (upright, just) as this whole law which I am '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: giving
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: placing before you today?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Only pay attention and watch yourselves closely so that you do not forget the things which your eyes have seen and they do not depart from your heart all the days of your life. Make them known to your children and your grandchildren [impressing these things on their mind and penetrating their heart with these truths]— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: it
    children:
    - type: text
      text: especially
  - type: text
    text: ' the day you stood before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God at Horeb (Mount Sinai), when the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, ‘Assemble the people to Me and I will let them hear My words, so that they may learn to fear Me [with awe-filled reverence and profound respect] all the days they live on the land, and so that they may teach their children.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'You approached and stood at the foot of the mountain, and the mountain burned with fire to the [very] heart of the heavens: darkness, cloud and thick gloom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to you from the midst of the fire; you heard the sound of the words, but you saw no form—there was only a voice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So He declared to you His covenant which He commanded you to follow, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the ten words
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the Ten Commandments; and He wrote them on two tablets of stone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded me at that time to teach you the statutes and judgments, so that you might do them in the land which you are going over to possess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“So pay attention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watch '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: your souls
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: yourselves carefully—for you did not see any form [of God] on the day the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to you at Horeb from the midst of the fire— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'so that you do not act corruptly and make for yourselves a carved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sculpted image [to worship] in the form of any figure, the likeness of male or female, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the likeness of any animal that is on the earth, or of any winged bird that flies in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: heavens,
      - type: text
        text: ' the reference here is to the first heaven, the “heaven of the clouds.”'
    marker-yv: yv-n
  - type: text
    text: 'sky, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'the likeness of anything that crawls on the ground, or of any fish that is in the waters beneath the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: beware
  - type: text
    text: ' that you do not raise your eyes toward heaven and see the sun and the moon and the stars, all the host of heaven, and let yourselves be led astray and worship them and serve them, [mere created bodies] which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has allotted to [serve and benefit] all the peoples under the whole heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has taken you and brought you out of the iron [smelting] furnace, out of Egypt, to be a people for His own possession, as [you are] this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was angry with me [at the waters of Meribah] because of you, and He swore [an oath] that I would not cross the Jordan, and that I would not enter the good land which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you as an inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For I am going to die in this land, I am not going to cross the Jordan, but you shall cross over and take possession of this good land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So be on your guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watch yourselves, so that you do not forget the covenant of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God which He has made with you, and make for yourselves a carved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sculpted image in the form of anything which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has forbidden you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is a consuming fire; He is a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. intolerant of unfaithfulness.
    marker-yv: yv-n
  - type: text
    text: jealous (impassioned) God [demanding what is rightfully and uniquely His].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“When you become the father of children and grandchildren and have grown old in the land, then if you corrupt yourselves by making a carved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sculpted image in the form of anything [for the purpose of worship], and do evil [things] in the sight of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, provoking Him to anger, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I call heaven and earth as witnesses against you today, that you will soon utterly perish from the land which you are crossing the Jordan to possess. You shall not live long on it, but will be utterly destroyed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will scatter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disperse you among the peoples (pagan nations), and you will be left few in number among the nations where the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' drives you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And there you will serve [false and foreign] gods, the work of human hands, [lifeless images of] wood and stone, which neither see nor hear nor eat nor smell [the offerings of food given to them]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: But from there you will seek the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, and you will find '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him
  - type: text
    text: ' if you search for Him with all your heart and all your soul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'When you are in distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tribulation and all these things come on you, in the latter days you will return to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God and listen to His voice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is a merciful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassionate God; He will not fail you, nor destroy you, nor forget the covenant with your fathers which He swore to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“Indeed, ask now about the days that are past, [those days] which were before you, since the day that God created man on the earth, and ask from one end of the heavens to the other. Has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anything
  - type: text
    text: ' been done like this great thing, or has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anything
  - type: text
    text: ' been heard like it? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Did [any] people ever hear the voice of God speaking out of the midst of the fire, as you heard, and [still] live? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Or has any [man-made] god ever tried to go and take for himself a nation from within '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another
  - type: text
    text: ' nation by trials, by signs and wonders and by war and by a mighty hand and by an outstretched arm and by great terrors, as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God did for you in Egypt before your [very] eyes? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'It was shown to you so that you might have [personal] knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comprehend that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is God; there is no other besides Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Out of the heavens He let you hear His voice to discipline '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admonish you; and on earth He let you see His great fire, and you heard His words from the midst of the fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And because He loved your fathers, He chose their descendants who followed them, and brought you from Egypt with His Presence, with His great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' awesome power, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'dispossessing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' driving out from before you nations, [nations that were] greater and mightier than you, to bring you in, to give you their land as an inheritance, as it is this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Therefore know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand today, and take it to your heart, that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is God in the heavens above and on the earth below; there is no other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: So you shall keep His statutes and His commandments which I am commanding you today, so that it may go well with you and with your children after you, and so that you may live long on the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you for all time.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then Moses set apart three cities [of refuge] beyond the Jordan toward the rising of the sun (eastward), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'so that someone who committed manslaughter could flee there, [that is, a person] who killed his neighbor unintentionally and without previously having hostility toward him, and that by escaping to one of these cities he might [claim the right of asylum and] save his life: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Bezer in the wilderness on the plateau for the Reubenites, and Ramoth in Gilead for the Gadites, and Golan in Bashan for the Manassites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'This is the law which Moses placed before the sons of Israel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'these are the testimonies (legal provisions) and the statutes and the judgments which Moses spoke to the sons of Israel when they came out of Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'beyond the Jordan in the Valley opposite Beth-peor, in the land of Sihon king of the Amorites who lived at Heshbon, whom Moses and the sons of Israel defeated when they came out from Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'They took possession of his land and the land of Og king of Bashan, the two kings of the Amorites, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: reigned
  - type: text
    text: ' across the Jordan to the east, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'from Aroer, which is on the edge of the valley of the [river] Arnon, as far as Mount Sion (that is, Hermon), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: with all the Arabah (desert lowlands) across the Jordan to the east, even as far as the sea of the Arabah (the Dead Sea), at the foot of the slopes of Pisgah.
