      text: Hezekiah’s Illness and Recovery
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In those days [when Sennacherib first invaded Judah] Hezekiah became deathly ill. The prophet Isaiah the son of Amoz came and said to him, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘Set your house in order, for you shall die and not recover.’ ” [2 Chr 32:24-26; Is 38:1-8] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then Hezekiah turned his face to the wall and prayed to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Please, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', remember now [with compassion] how I have walked before You in faithfulness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' truth and with a whole heart [entirely devoted to You], and have done what is good in Your sight.” And Hezekiah wept bitterly. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Before Isaiah had gone out of the middle courtyard, the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to him, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Go back and tell Hezekiah the leader of My people, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of David your father (ancestor): “I have heard your prayer, I have seen your tears. Behold, I am healing you; on the third day you shall go up to the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will add fifteen years to your life and save you and this city [Jerusalem] from the hand of the king of Assyria; and I will protect this city for My own sake and for My servant David’s sake.” ’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then Isaiah said, “Bring a cake of figs. And they brought it and placed it on the [painful] inflammation, and he recovered.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hezekiah said to Isaiah, “What will be the sign that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will [completely] heal me, and that I shall go up to the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' on the third day?” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Isaiah said, “This will be the sign to you from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', that He will do the thing that He has spoken: shall the shadow [indicating the time of day] go forward ten steps, or go backward ten steps?” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hezekiah answered, “It is easy for the shadow to go forward ten steps; no, but let the shadow turn backward ten steps.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So Isaiah the prophet called out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and He brought the shadow on the steps ten steps backward by which it had gone down on the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: stairway;
      - type: text
        text: ' lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: steps
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: sundial of Ahaz.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hezekiah Shows Babylon His Treasures
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'At that time '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Many mss and ancient versions read '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Merodach-baladan;
      - type: text
        text: ' cf Is 39:1.'
    marker-yv: yv-n
  - type: text
    text: 'Berodach-baladan a son of Baladan, king of Babylon, sent letters and a gift to Hezekiah, for he had heard that Hezekiah had been sick. [Is 39:1-8] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hezekiah listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed them and ['
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hezekiah was showing off his wealth to the Babylonians, in disregard of the mercy God had just granted him.
    marker-yv: yv-n
  - type: text
    text: 'foolishly] showed them all his treasure house—the silver and gold and spices and precious oil and his armory and everything that was found in his treasuries. There was nothing in his house (palace) nor in all his realm that Hezekiah did not show them. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Isaiah the prophet came to King Hezekiah and said to him, “What did these men say [that would cause you to do this for them]? From where have they come to you?” Hezekiah said, “They have come from a far country, from Babylon.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Isaiah said, “What have they seen in your house?” Hezekiah answered, “They have seen everything that is in my house (palace). There is nothing in my treasuries that I have not shown them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then Isaiah said to Hezekiah, “Hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘Behold, the time is coming when everything that is in your house, and that your fathers have stored up until this day, will be carried to Babylon; nothing will be left,’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '‘And some of your sons (descendants) who will be born to you will be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah predicted the Babylonian captivity about a hundred and fifteen years before it occurred.
    marker-yv: yv-n
  - type: text
    text: 'taken away [as captives]; and they will become eunuchs in the palace of the king of Babylon.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then Hezekiah said to Isaiah, “The word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which you have spoken is good.” For he thought, “Is it not good, if [at least] there will be peace and security in my lifetime?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The rest of the acts of Hezekiah and all his might, and how he made the [Siloam] pool and the aqueduct and brought water into the city, are they not written in the Book of the Chronicles of the Kings of Judah? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hezekiah slept with his fathers [in death], and Manasseh his son became king in his place.
