document_id: 2KI.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah’s Illness and Recovery
  - type: text
    content: In those days [when Sennacherib first invaded Judah] Hezekiah became deathly ill. The prophet Isaiah the son of Amoz came and said to him, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘Set your house in order, for you shall die and not recover.’ ” [2 Chr 32:24-26; Is 38:1-8] '
  '10':
  - type: text
    content: 'Hezekiah answered, “It is easy for the shadow to go forward ten steps; no, but let the shadow turn backward ten steps.” '
  '11':
  - type: text
    content: So Isaiah the prophet called out to the L
  - type: heading
    content: ord
  - type: text
    content: ', and He brought the shadow on the steps ten steps backward by which it had gone down on the '
  - type: note
    content: Or stairway; lit steps.
  - type: text
    content: sundial of Ahaz.
  - type: heading
    content: Hezekiah Shows Babylon His Treasures
  '12':
  - type: text
    content: 'At that time '
  - type: note
    content: Many mss and ancient versions read Merodach-baladan; cf Is 39:1.
  - type: text
    content: 'Berodach-baladan a son of Baladan, king of Babylon, sent letters and a gift to Hezekiah, for he had heard that Hezekiah had been sick. [Is 39:1-8] '
  '13':
  - type: text
    content: 'Hezekiah listened to '
  - type: text
    content: and
  - type: text
    content: ' welcomed them and ['
  - type: note
    content: Hezekiah was showing off his wealth to the Babylonians, in disregard of the mercy God had just granted him.
  - type: text
    content: 'foolishly] showed them all his treasure house—the silver and gold and spices and precious oil and his armory and everything that was found in his treasuries. There was nothing in his house (palace) nor in all his realm that Hezekiah did not show them. '
  '14':
  - type: text
    content: 'Then Isaiah the prophet came to King Hezekiah and said to him, “What did these men say [that would cause you to do this for them]? From where have they come to you?” Hezekiah said, “They have come from a far country, from Babylon.” '
  '15':
  - type: text
    content: Isaiah said, “What have they seen in your house?” Hezekiah answered, “They have seen everything that is in my house (palace). There is nothing in my treasuries that I have not shown them.”
  '16':
  - type: text
    content: Then Isaiah said to Hezekiah, “Hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '17':
  - type: text
    content: ‘Behold, the time is coming when everything that is in your house, and that your fathers have stored up until this day, will be carried to Babylon; nothing will be left,’ says the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '18':
  - type: text
    content: '‘And some of your sons (descendants) who will be born to you will be '
  - type: note
    content: Isaiah predicted the Babylonian captivity about a hundred and fifteen years before it occurred.
  - type: text
    content: 'taken away [as captives]; and they will become eunuchs in the palace of the king of Babylon.’ ” '
  '19':
  - type: text
    content: Then Hezekiah said to Isaiah, “The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' which you have spoken is good.” For he thought, “Is it not good, if [at least] there will be peace and security in my lifetime?”'
  '2':
  - type: text
    content: Then Hezekiah turned his face to the wall and prayed to the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, '
  '20':
  - type: text
    content: 'The rest of the acts of Hezekiah and all his might, and how he made the [Siloam] pool and the aqueduct and brought water into the city, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '21':
  - type: text
    content: Hezekiah slept with his fathers [in death], and Manasseh his son became king in his place.
  '3':
  - type: text
    content: “Please, O L
  - type: heading
    content: ord
  - type: text
    content: ', remember now [with compassion] how I have walked before You in faithfulness '
  - type: text
    content: and
  - type: text
    content: ' truth and with a whole heart [entirely devoted to You], and have done what is good in Your sight.” And Hezekiah wept bitterly. '
  '4':
  - type: text
    content: Before Isaiah had gone out of the middle courtyard, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to him, saying, '
  '5':
  - type: text
    content: “Go back and tell Hezekiah the leader of My people, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of David your father (ancestor): “I have heard your prayer, I have seen your tears. Behold, I am healing you; on the third day you shall go up to the house of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'I will add fifteen years to your life and save you and this city [Jerusalem] from the hand of the king of Assyria; and I will protect this city for My own sake and for My servant David’s sake.” ’ ” '
  '7':
  - type: text
    content: Then Isaiah said, “Bring a cake of figs. And they brought it and placed it on the [painful] inflammation, and he recovered.”
  '8':
  - type: text
    content: Hezekiah said to Isaiah, “What will be the sign that the L
  - type: heading
    content: ord
  - type: text
    content: ' will [completely] heal me, and that I shall go up to the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' on the third day?” '
  '9':
  - type: text
    content: Isaiah said, “This will be the sign to you from the L
  - type: heading
    content: ord
  - type: text
    content: ', that He will do the thing that He has spoken: shall the shadow [indicating the time of day] go forward ten steps, or go backward ten steps?” '
