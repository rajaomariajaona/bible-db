        text: In ancient times Smyrna (modern Izmir, Turkey) was a beautiful, cosmopolitan city. Located on the Aegean coast, it vied with Ephesus and Pergamum in importance in Asia Minor. It was closely identified with Rome and the cult of emperor worship. Smyrna was later the home of Polycarp, the great Christian church leader who, at the age of eighty-six, was burned at the stake for his refusal to worship the Roman emperor.
