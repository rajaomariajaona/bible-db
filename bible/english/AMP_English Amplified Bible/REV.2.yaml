        text: ' are heavenly beings, they may serve in some way as representatives of the sinful people in their churches. Jewish tradition maintained that every nation and individual has a guardian angel, and that when God is about to punish a nation, He first punishes its angel. There is even a story of Michael, the guardian angel of Israel, being rebuked by God for the sins committed in the time of Ezekiel. So the original readers of Revelation might have assumed that the angels here are the guardian angels of the individual churches, sharing responsibility for the actions of the members.'
