  - type: note
    content: Thyatira (modern Akhisar, Turkey) was famous for its dyeing and indigo trade. It was the home of Lydia, the seller of purple fabrics, who was converted under the ministry of Paul (Acts 16:14). Located in a valley, midway between Pergamum and Sardis, it was originally established as a military base by one of the generals in the army of Alexander the Great.
