    content: The Valley of Hinnom located south of Jerusalem was the place where garbage burned continuously. Often regarded in ancient times as symbolic of hell (the lake of fire), reserved for the wicked. Paradise or Abraham’s bosom (cf Luke 16:22) was the place reserved for the good in anticipation of heaven. Mentioned in Matt 5:22, 29, 30; 10:28; 18:9; 23:15, 33; Mark 9:43, 45, 47; Luke 12:5; James 3:6.
