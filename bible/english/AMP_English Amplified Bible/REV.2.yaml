        text: Pergamum (modern Bergama, Turkey) was built on a promontory about sixteen miles from the Aegean Sea. It was famous as a worship center for many pagan gods including Zeus (Jupiter, king of gods), Dionysus (Bacchus, god of wine and intoxication), and Asklepios (god of healing). The enormous altar dedicated to Zeus is on display in the Pergamon Museum in Berlin. Pergamum also had an important temple dedicated to the worship of Caesar. Refusal to take part in the imperial cult was considered treason. A culturally sophisticated city as well as a center for pagan worship, Pergamum’s library, believed to contain over 200,000 volumes, was second only to the Library of Alexandria.
