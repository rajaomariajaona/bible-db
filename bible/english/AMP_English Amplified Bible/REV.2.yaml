        text: Ephesus, the largest city in Roman-controlled Asia Minor, developed into a major trade center because of its access to the Aegean Sea. It was the primary center for the worship of the goddess Artemis (Diana). The Temple of Artemis, the largest building in ancient times, was considered one of the Seven Wonders of the World. The open-air theatre in Ephesus could accommodate 25,000 spectators and was used for both drama and gladiatorial combat.
