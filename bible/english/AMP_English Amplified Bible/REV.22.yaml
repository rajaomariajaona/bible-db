document_id: REV.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Perfect Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the angel showed me a river of the water of life, clear as crystal, flowing from the throne of God and of the Lamb (Christ), [Ezek 47:1-12] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'in the middle of its street. On either side of the river was the tree of life, bearing twelve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: kinds of
  - type: text
    text: ' fruit, yielding its fruit every month; and the leaves of the tree were for the healing of the nations. [Gen 2:9; 3:22] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'There will no longer exist anything that is cursed [because sin and illness and death are gone]; and the throne of God and of the Lamb will be in it, and His bond-servants will serve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship Him [with great awe and joy and loving devotion]; [Zech 14:21] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'they will [be privileged to] see His face, and His name will be on their foreheads. [Ps 17:15; Matt 5:48; 1 John 3:2] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And there will no longer be night; they have no need for lamplight or sunlight, because the Lord God will illumine them; and they will reign [as kings] forever and ever. [Zech 14:7; Rev 1:6]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: You Are Invited to be Blessed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then he said to me, “These words are faithful and true.” And the Lord, the God of the spirits of the prophets, has sent His angel [as a representative] to show His bond-servants the things that must soon take place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“And behold, I am coming quickly. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the sixth of the seven promised blessings. See note 1:3.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Blessed (happy, prosperous, to be admired) is the one who heeds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' takes to heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remembers the words of the prophecy'
  - type: text
    text: ' [that is, the predictions, consolations, and warnings] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: contained in this book (scroll).”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I, John, am the one who heard and saw these things. And when I heard and saw them, I fell down to worship before the feet of the angel who showed me these things. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But he said to me, “Do not do that. I am a fellow servant with you and your brothers the prophets and with those who heed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remember [the truths contained in] the words of this book. Worship God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he said to me, “Do not seal up the words of the prophecy of this book, for the time [of their fulfillment] is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: While Daniel was instructed to seal his prophecy, John was now told to reveal his (see Dan 12:4).
    marker-yv: yv-n
  - type: text
    text: 'near. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Let the one who does wrong, still do wrong; and the one who is filthy (vile, impure), still be filthy; and the one who is righteous (just, upright), still be righteous; and the one who is holy, still be holy.” [Dan 12:10]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Behold, I (Jesus) am coming quickly, and My reward is with Me, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the final judgment for the believer will occur when he stands before Christ to have his fidelity and service judged, and the appropriate reward determined.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'to give to each one '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: as his work is
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: according to the merit of his deeds (earthly works, faithfulness).
  - type: text
    text: ' [Is 40:10; Jer 17:10; Matt 16:27; 2 Cor 5:10] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the Alpha and the Omega, the First and the Last, the Beginning and the End
  - type: text
    text: ' [the Eternal One].” [Is 44:6; 48:12; John 10:30]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the seventh and last of the promised blessings. See note 1:3.
    marker-yv: yv-n
  - type: text
    text: 'Blessed (happy, prosperous, to be admired) are those who wash their robes [in the blood of Christ by believing and trusting in Him—the righteous who do His commandments], so that they may have the right to the tree of life, and may enter by the gates into the city. [Gen 2:9; 3:22, 24] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Outside are the dogs [the godless, the impure, those of low moral character] and the sorcerers [with their intoxicating drugs, and magic arts], and the immoral persons [the perverted, the molesters, and the adulterers], and the murderers, and the idolaters, and everyone who loves and practices lying (deception, cheating).
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Final Invitation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I, Jesus, have sent My angel to testify to you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to give you assurance of these things for the churches. I am the Root (the Source, the Life) and the Offspring of David, the radiant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bright Morning Star.”'
  - type: text
    text: ' [Num 24:17; Is 11:1, 10]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The [Holy] Spirit and the bride (the church, believers) say, “Come.” And let the one who hears say, “Come.” And let the one who is thirsty come; let the one who wishes take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' drink the water of life without cost. [Is 55:1]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I testify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warn everyone who hears the words of the prophecy of this book [its predictions, consolations, and admonitions]: if anyone adds [anything] to them, God will add to him the plagues (afflictions, calamities) which are written in this book; [Deut 4:2] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and if anyone takes away from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' distorts the words of the book of this prophecy, God will take away [from that one] his share from the tree of life and from the holy city (new Jerusalem), which are written in this book.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He who testifies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affirms these things says, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Yes, I am coming quickly.”
  - type: text
    text: ' Amen. Come, Lord Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The grace of the Lord Jesus (the Christ, the Messiah) be with all [the saints—all believers, those set apart for God]. Amen.
