document_id: REV.22,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Perfect Life
  - type: text
    content: 'Then the angel showed me a river of the water of life, clear as crystal, flowing from the throne of God and of the Lamb (Christ), [Ezek 47:1-12] '
  '10':
  - type: text
    content: 'And he said to me, “Do not seal up the words of the prophecy of this book, for the time [of their fulfillment] is '
  - type: note
    content: While Daniel was instructed to seal his prophecy, John was now told to reveal his (see Dan 12:4).
  - type: text
    content: 'near. '
  '11':
  - type: text
    content: Let the one who does wrong, still do wrong; and the one who is filthy (vile, impure), still be filthy; and the one who is righteous (just, upright), still be righteous; and the one who is holy, still be holy.” [Dan 12:10]
  '12':
  - type: text
    content: ' '
  - type: text
    content: '“Behold, I (Jesus) am coming quickly, and My reward is with Me, '
  - type: note
    content: I.e. the final judgment for the believer will occur when he stands before Christ to have his fidelity and service judged, and the appropriate reward determined.
  - type: text
    content: 'to give to each one '
  - type: note
    content: Lit as his work is.
  - type: text
    content: according to the merit of his deeds (earthly works, faithfulness).
  - type: text
    content: ' [Is 40:10; Jer 17:10; Matt 16:27; 2 Cor 5:10] '
  '13':
  - type: text
    content: I am the Alpha and the Omega, the First and the Last, the Beginning and the End
  - type: text
    content: ' [the Eternal One].” [Is 44:6; 48:12; John 10:30]'
  '14':
  - type: text
    content: ' '
  - type: note
    content: This is the seventh and last of the promised blessings. See note 1:3.
  - type: text
    content: 'Blessed (happy, prosperous, to be admired) are those who wash their robes [in the blood of Christ by believing and trusting in Him—the righteous who do His commandments], so that they may have the right to the tree of life, and may enter by the gates into the city. [Gen 2:9; 3:22, 24] '
  '15':
  - type: text
    content: Outside are the dogs [the godless, the impure, those of low moral character] and the sorcerers [with their intoxicating drugs, and magic arts], and the immoral persons [the perverted, the molesters, and the adulterers], and the murderers, and the idolaters, and everyone who loves and practices lying (deception, cheating).
  - type: heading
    content: The Final Invitation
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“I, Jesus, have sent My angel to testify to you '
  - type: text
    content: and
  - type: text
    content: ' to give you assurance of these things for the churches. I am the Root (the Source, the Life) and the Offspring of David, the radiant '
  - type: text
    content: and
  - type: text
    content: ' bright Morning Star.”'
  - type: text
    content: ' [Num 24:17; Is 11:1, 10]'
  '17':
  - type: text
    content: 'The [Holy] Spirit and the bride (the church, believers) say, “Come.” And let the one who hears say, “Come.” And let the one who is thirsty come; let the one who wishes take '
  - type: text
    content: and
  - type: text
    content: ' drink the water of life without cost. [Is 55:1]'
  '18':
  - type: text
    content: 'I testify '
  - type: text
    content: and
  - type: text
    content: ' warn everyone who hears the words of the prophecy of this book [its predictions, consolations, and admonitions]: if anyone adds [anything] to them, God will add to him the plagues (afflictions, calamities) which are written in this book; [Deut 4:2] '
  '19':
  - type: text
    content: 'and if anyone takes away from '
  - type: text
    content: or
  - type: text
    content: ' distorts the words of the book of this prophecy, God will take away [from that one] his share from the tree of life and from the holy city (new Jerusalem), which are written in this book.'
  '2':
  - type: text
    content: 'in the middle of its street. On either side of the river was the tree of life, bearing twelve '
  - type: text
    content: kinds of
  - type: text
    content: ' fruit, yielding its fruit every month; and the leaves of the tree were for the healing of the nations. [Gen 2:9; 3:22] '
  '20':
  - type: text
    content: 'He who testifies '
  - type: text
    content: and
  - type: text
    content: ' affirms these things says, '
  - type: text
    content: “Yes, I am coming quickly.”
  - type: text
    content: ' Amen. Come, Lord Jesus.'
  '21':
  - type: text
    content: The grace of the Lord Jesus (the Christ, the Messiah) be with all [the saints—all believers, those set apart for God]. Amen.
  '3':
  - type: text
    content: 'There will no longer exist anything that is cursed [because sin and illness and death are gone]; and the throne of God and of the Lamb will be in it, and His bond-servants will serve '
  - type: text
    content: and
  - type: text
    content: ' worship Him [with great awe and joy and loving devotion]; [Zech 14:21] '
  '4':
  - type: text
    content: 'they will [be privileged to] see His face, and His name will be on their foreheads. [Ps 17:15; Matt 5:48; 1 John 3:2] '
  '5':
  - type: text
    content: And there will no longer be night; they have no need for lamplight or sunlight, because the Lord God will illumine them; and they will reign [as kings] forever and ever. [Zech 14:7; Rev 1:6]
  - type: heading
    content: You Are Invited to be Blessed
  '6':
  - type: text
    content: Then he said to me, “These words are faithful and true.” And the Lord, the God of the spirits of the prophets, has sent His angel [as a representative] to show His bond-servants the things that must soon take place.
  '7':
  - type: text
    content: ' '
  - type: text
    content: '“And behold, I am coming quickly. '
  - type: note
    content: This is the sixth of the seven promised blessings. See note 1:3.
  - type: text
    content: 'Blessed (happy, prosperous, to be admired) is the one who heeds '
  - type: text
    content: and
  - type: text
    content: ' takes to heart '
  - type: text
    content: and
  - type: text
    content: ' remembers the words of the prophecy'
  - type: text
    content: ' [that is, the predictions, consolations, and warnings] '
  - type: text
    content: contained in this book (scroll).”
  '8':
  - type: text
    content: 'I, John, am the one who heard and saw these things. And when I heard and saw them, I fell down to worship before the feet of the angel who showed me these things. '
  '9':
  - type: text
    content: 'But he said to me, “Do not do that. I am a fellow servant with you and your brothers the prophets and with those who heed '
  - type: text
    content: and
  - type: text
    content: ' remember [the truths contained in] the words of this book. Worship God.”'
