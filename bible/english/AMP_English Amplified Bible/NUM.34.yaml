document_id: NUM.34,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Instruction for Apportioning Canaan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘You shall mark out your eastern boundary from Hazar-enan to Shepham; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the [eastern] boundary shall go down from Shepham to Riblah on the east side of Ain and shall descend and reach to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: shoulder
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'slope on the east of the Sea of Chinnereth [the Sea of Galilee]; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the [eastern] boundary shall go down to the Jordan [River], and its limit shall be at the Salt (Dead) Sea. This shall be your land according to its boundaries all around.’ ”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses commanded the Israelites, saying, “This is the land you are to inherit by lot, which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded to be given to the nine tribes and the half-tribe [of Manasseh], '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the tribe of the sons of Reuben and the tribe of the sons of Gad have received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their inheritance
    - type: text
      text: ' by their fathers’ households, and the half-tribe of Manasseh have received their possession. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The two and a half tribes have received their inheritance across the Jordan [River] opposite Jericho, eastward toward the sunrise.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“These are the names of the men who shall divide the land among you as an inheritance: Eleazar the priest and Joshua the son of Nun. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall take one leader from every tribe to divide the land for the inheritance. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the names of the men: From the tribe of Judah, Caleb the son of Jephunneh; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Command the Israelites, ‘When you enter the land of Canaan, this is the land that shall be yours as an inheritance, the land of Canaan according to its boundaries, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of the sons of Simeon, Samuel the son of Ammihud; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of Benjamin, Elidad the son of Chislon; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of the sons of Dan a leader, Bukki the son of Jogli; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'of the sons of Joseph: from the tribe of the sons of Manasseh a leader, Hanniel the son of Ephod; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of the sons of Ephraim a leader, Kemuel the son of Shiphtan; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of the sons of Zebulun a leader, Elizaphan the son of Parnach; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of the sons of Issachar a leader, Paltiel the son of Azzan; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of the sons of Asher a leader, Ahihud the son of Shelomi; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from the tribe of the sons of Naphtali a leader, Pedahel the son of Ammihud.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the [twelve] men whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded [to work with Joshua and Eleazar] to divide the inheritance to the sons of Israel in the land of Canaan.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'your southern region shall be from the Wilderness of Zin along the side of Edom, and your southern boundary from the end of the Salt (Dead) Sea eastward. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your boundary shall turn from the south to the ascent of Akrabbim, and continue on to Zin, and its limit shall be south of Kadesh-barnea. Then it shall go on to Hazar-addar and pass on to Azmon. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the boundary shall turn from Azmon to the Brook of Egypt (Wadi el-arish), and its limit shall be at the [Mediterranean] Sea.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘As the western boundary you shall have the Great [Mediterranean] Sea and its coastline. This shall be your western boundary.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And this shall be your north border: from the Great [Mediterranean] Sea mark out your boundary line to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is not the Mount Hor of 33:38-39—the place where Aaron died. This Mount Hor is in the area of Upper Galilee.
      marker-yv: yv-n
    - type: text
      text: 'Mount Hor; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from Mount Hor you shall mark out your boundary to the entrance of Hamath, and the limit of the border shall be at Zedad; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then the [northern] boundary shall go on to Ziphron, and its limit shall be at Hazar-enan. This shall be your northern boundary.
