  '22':
  - type: text
    content: 'This [goal—my commitment to this principle] is the reason why I have often been prevented from coming to you [in Rome]. '
  '23':
  - type: text
    content: 'But now, with no further place for work in these regions, and since I have longed for many years to come to you— '
  '24':
  - type: text
    content: 'whenever I go [on my trip] to Spain—I hope to see you as I pass through [Rome], and to be helped on my journey there by you, after I have first enjoyed your company for a little while. '
  '25':
  - type: text
    content: 'But for now, I am going to Jerusalem to serve the saints (Jewish believers). '
  '26':
  - type: text
    content: 'For [Gentile believers in] '
  - type: note
    content: In addition to Macedonia and Achaia some churches in Asia Minor also contributed to this offering.
  - type: text
    content: 'Macedonia and Achaia have been pleased to make a contribution for the poor among the saints (Jewish believers) in Jerusalem. '
  '27':
  - type: text
    content: 'They were pleased to do it, and they are indebted to them. For if the Gentiles have come to share in their spiritual things, then they are indebted to serve them also in [tangible] material things. '
  '28':
  - type: text
    content: 'Therefore, when I have finished this [mission] and have safely given to them what has been raised, I will go on by way of you to Spain. '
  '29':
  - type: text
    content: I know that when I do come to you, I will come in the abundant blessing of Christ.
