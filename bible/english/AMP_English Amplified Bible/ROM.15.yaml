  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For whatever was written in earlier times was written for our instruction, so that through endurance and the encouragement of the Scriptures we might have hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overflow with confidence in His promises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now may the God who gives endurance and who supplies encouragement grant that you be of the same mind with one another according to Christ Jesus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'so that with one accord you may with one voice glorify '
  - type: usfm
    marker: it
    children:
    - type: text
