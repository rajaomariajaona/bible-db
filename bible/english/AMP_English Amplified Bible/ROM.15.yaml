  - type: note
    content: Located nearly 1,400 miles from Jerusalem, Illyricum was a Roman province of economic and strategic importance. It was a large region north of Macedonia located between the Adriatic Sea and the Danube River, and was known for its commercial seaports and gold mines. The great Roman road, Via Egnatia, started in Illyricum and ran eastward to Byzantium.
  - type: text
    content: 'Illyricum, I have fully preached the gospel [faithfully preaching the good news] of Christ [where it had not before been preached]. '
