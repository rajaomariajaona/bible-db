  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed us to the glory of [our great] God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For I tell you that Christ has become a servant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a minister to the circumcision (Jews) on behalf of God’s truth, to confirm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' verify the promises made to the fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and for the Gentiles to glorify God for His mercy [to them, since God had no covenant with them]. As it is written '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
