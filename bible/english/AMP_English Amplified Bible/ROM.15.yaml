  '16':
  - type: text
    content: 'to be a minister of Christ Jesus to the Gentiles. I minister as a priest the gospel of God, in order that my offering of the Gentiles may become acceptable [to Him], sanctified [made holy and set apart for His purpose] by the Holy Spirit. '
  '17':
  - type: text
    content: 'In Christ Jesus, then, I have found [legitimate] reason for boasting in things related [to my service] to God. '
  '18':
  - type: text
    content: 'For I will not [even] presume to speak of anything except what Christ has done through me [as an instrument in His hands], resulting in the obedience of the Gentiles [to the gospel], by word and deed, '
  '19':
  - type: text
    content: 'with the power of signs and wonders, [and all of it] in the power of the Spirit. So [starting] from Jerusalem and as far '
  - type: text
