  - type: text
    text: 'Now we who are strong [in our convictions and faith] ought to [patiently] put up with the weaknesses of those who are not strong, and not just please ourselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Let each one of us [make it a practice to] please his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. all those with whom we have contact.
    marker-yv: yv-n
  - type: text
    text: 'neighbor for his good, to build him up spiritually. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
