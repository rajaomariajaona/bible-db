  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'May the God of hope fill you with all joy and peace in believing [through the experience of your faith] that by the power of the Holy Spirit you will abound in hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overflow with confidence in His promises.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Personally I am convinced about you, my brothers and sisters, that you yourselves are full of goodness, amply filled with all [spiritual] knowledge, and competent to admonish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruct one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Still, on some points I have written to you very boldly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without reservation to remind you [about them] again, because of the grace that was given to me from God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'to be a minister of Christ Jesus to the Gentiles. I minister as a priest the gospel of God, in order that my offering of the Gentiles may become acceptable [to Him], sanctified [made holy and set apart for His purpose] by the Holy Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'In Christ Jesus, then, I have found [legitimate] reason for boasting in things related [to my service] to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For I will not [even] presume to speak of anything except what Christ has done through me [as an instrument in His hands], resulting in the obedience of the Gentiles [to the gospel], by word and deed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'with the power of signs and wonders, [and all of it] in the power of the Spirit. So [starting] from Jerusalem and as far '
  - type: usfm
    marker: it
    children:
    - type: text
      text: away
  - type: text
    text: ' as '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Located nearly 1,400 miles from Jerusalem, Illyricum was a Roman province of economic and strategic importance. It was a large region north of Macedonia located between the Adriatic Sea and the Danube River, and was known for its commercial seaports and gold mines. The great Roman road, Via Egnatia, started in Illyricum and ran eastward to Byzantium.
    marker-yv: yv-n
  - type: text
    text: 'Illyricum, I have fully preached the gospel [faithfully preaching the good news] of Christ [where it had not before been preached]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Accordingly I set a goal to preach the gospel, not where Christ’s name was already known, so that I would not build on another man’s foundation; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: but [instead I would act on this goal] as it is written [in Scripture],
- type: usfm
  marker: q1
  children:
  - type: text
    text: “T
  - type: usfm
    marker: sc
    children:
    - type: text
      text: hey who had no news of
  - type: text
    text: ' H'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: im shall see
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd they who have not heard
  - type: text
    text: ' [of Him] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: shall understand
  - type: text
    text: .” [Is 52:15]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This [goal—my commitment to this principle] is the reason why I have often been prevented from coming to you [in Rome]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But now, with no further place for work in these regions, and since I have longed for many years to come to you— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'whenever I go [on my trip] to Spain—I hope to see you as I pass through [Rome], and to be helped on my journey there by you, after I have first enjoyed your company for a little while. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But for now, I am going to Jerusalem to serve the saints (Jewish believers). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For [Gentile believers in] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In addition to Macedonia and Achaia some churches in Asia Minor also contributed to this offering.
    marker-yv: yv-n
  - type: text
    text: 'Macedonia and Achaia have been pleased to make a contribution for the poor among the saints (Jewish believers) in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They were pleased to do it, and they are indebted to them. For if the Gentiles have come to share in their spiritual things, then they are indebted to serve them also in [tangible] material things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Therefore, when I have finished this [mission] and have safely given to them what has been raised, I will go on by way of you to Spain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I know that when I do come to you, I will come in the abundant blessing of Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I urge you, believers, by our Lord Jesus Christ and by the love of the Spirit, to join together with me in your prayers to God in my behalf, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '[and pray] that I may be rescued from the unbelievers in Judea, and that my service for Jerusalem may be acceptable to the saints (Jewish believers) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'so that by God’s will I may come to you with joy and find rest in your company. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: May the God of peace be with you all! Amen.
