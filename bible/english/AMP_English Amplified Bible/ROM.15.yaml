  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor the God and Father of our Lord Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore, [continue to] accept '
  - type: usfm
