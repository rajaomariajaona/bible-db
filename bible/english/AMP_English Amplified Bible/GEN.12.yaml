document_id: GEN.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abram Journeys to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now [in Haran] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said to Abram,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go away from your country,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from your relatives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from your father’s house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the land which I will show you; [Heb 11:8-10]
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now there was a famine in the land; and Abram went down into Egypt to live temporarily, for the famine in the land was oppressive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' severe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And when he was about to enter Egypt, he said to Sarai his wife, “Listen: I know that you are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sarai was about sixty-five years old at this time.
      marker-yv: yv-n
    - type: text
      text: 'a beautiful woman; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'so when the Egyptians see you, they will say, ‘This is his wife’; and they will kill me [to acquire you], but they will let you live. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Please tell them that you are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sarai was Abraham’s half-sister. They had the same father, but different mothers (Gen 20:12).
      marker-yv: yv-n
    - type: text
      text: 'my sister so that things will go well for me for your sake, and my life will be spared because of you.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And when Abram entered Egypt, the Egyptians saw that Sarai was very beautiful. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Pharaoh’s princes (officials) also saw her and praised her to Pharaoh; and the woman was taken [for the purpose of marriage] into Pharaoh’s house (harem). '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Therefore Pharaoh treated Abram well for her sake; he acquired sheep, oxen, male and female donkeys, male and female servants, and camels.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' punished Pharaoh and his household with severe plagues because of Sarai, Abram’s wife. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then Pharaoh called Abram and said, “What is this that you have done to me? Why did you not tell me that she was your wife? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Why did you say, ‘She is my sister,’ so that I took her as my wife? Now then, here is your wife; take her and go!” '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These verses (2, 3) give the basic outline of God’s covenant with Abraham.
      marker-yv: yv-n
    - type: text
      text: I will make you a great nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will bless you [abundantly],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And make your name great (exalted, distinguished);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you shall be a blessing [a source of great good to others];
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So Pharaoh commanded his men concerning him; and they escorted him on his way, with his wife and all that he had.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And I will bless (do good for, benefit) those who bless you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will curse [that is, subject to My wrath and judgment] the one who curses (despises, dishonors, has contempt for) you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in you all the families (nations) of the earth will be blessed.” [Gal 3:8]
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So Abram departed [in faithful obedience] as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had directed him; and Lot [his nephew] left with him. Abram was seventy-five years old when he left Haran. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Abram took Sarai his wife and Lot his nephew, and all their possessions which they had acquired, and the people (servants) which they had acquired in Haran, and they set out to go to the land of Canaan. When they came to the land of Canaan, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Abram passed through the land as far as the site of Shechem, to the [great] terebinth (oak) tree of Moreh. Now the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the descendants of Ham’s son who was cursed by Noah.
      marker-yv: yv-n
    - type: text
      text: 'Canaanites were in the land at that time. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' appeared to Abram and said, “I will give this land to your descendants.” So Abram built an altar there to [honor] the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who had appeared to him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then he moved on from there to the mountain on the east of Bethel, and pitched his tent, with Bethel on the west and Ai on the east; and there he built an altar to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and called on the name of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [in worship through prayer, praise, and thanksgiving]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then Abram journeyed on, continuing toward the Negev (the South country of Judah).
