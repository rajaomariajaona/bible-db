document_id: GEN.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Abram Journeys to Egypt
  - type: text
    content: Now [in Haran] the L
  - type: heading
    content: ord
  - type: text
    content: ' had said to Abram,'
  - type: text
    content: “Go away from your country,
  - type: text
    content: And from your relatives
  - type: text
    content: And from your father’s house,
  - type: text
    content: To the land which I will show you; [Heb 11:8-10]
  '10':
  - type: text
    content: 'Now there was a famine in the land; and Abram went down into Egypt to live temporarily, for the famine in the land was oppressive '
  - type: text
    content: and
  - type: text
    content: ' severe. '
  '11':
  - type: text
    content: 'And when he was about to enter Egypt, he said to Sarai his wife, “Listen: I know that you are '
  - type: note
    content: Sarai was about sixty-five years old at this time.
  - type: text
    content: 'a beautiful woman; '
  '12':
  - type: text
    content: 'so when the Egyptians see you, they will say, ‘This is his wife’; and they will kill me [to acquire you], but they will let you live. '
  '13':
  - type: text
    content: 'Please tell them that you are '
  - type: note
    content: Sarai was Abraham’s half-sister. They had the same father, but different mothers (Gen 20:12).
  - type: text
    content: 'my sister so that things will go well for me for your sake, and my life will be spared because of you.” '
  '14':
  - type: text
    content: 'And when Abram entered Egypt, the Egyptians saw that Sarai was very beautiful. '
  '15':
  - type: text
    content: 'Pharaoh’s princes (officials) also saw her and praised her to Pharaoh; and the woman was taken [for the purpose of marriage] into Pharaoh’s house (harem). '
  '16':
  - type: text
    content: Therefore Pharaoh treated Abram well for her sake; he acquired sheep, oxen, male and female donkeys, male and female servants, and camels.
  '17':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' punished Pharaoh and his household with severe plagues because of Sarai, Abram’s wife. '
  '18':
  - type: text
    content: 'Then Pharaoh called Abram and said, “What is this that you have done to me? Why did you not tell me that she was your wife? '
  '19':
  - type: text
    content: 'Why did you say, ‘She is my sister,’ so that I took her as my wife? Now then, here is your wife; take her and go!” '
  '2':
  - type: text
    content: 'And '
  - type: note
    content: These verses (2, 3) give the basic outline of God’s covenant with Abraham.
  - type: text
    content: I will make you a great nation,
  - type: text
    content: And I will bless you [abundantly],
  - type: text
    content: And make your name great (exalted, distinguished);
  - type: text
    content: And you shall be a blessing [a source of great good to others];
  '20':
  - type: text
    content: So Pharaoh commanded his men concerning him; and they escorted him on his way, with his wife and all that he had.
  '3':
  - type: text
    content: And I will bless (do good for, benefit) those who bless you,
  - type: text
    content: And I will curse [that is, subject to My wrath and judgment] the one who curses (despises, dishonors, has contempt for) you.
  - type: text
    content: And in you all the families (nations) of the earth will be blessed.” [Gal 3:8]
  '4':
  - type: text
    content: So Abram departed [in faithful obedience] as the L
  - type: heading
    content: ord
  - type: text
    content: ' had directed him; and Lot [his nephew] left with him. Abram was seventy-five years old when he left Haran. '
  '5':
  - type: text
    content: 'Abram took Sarai his wife and Lot his nephew, and all their possessions which they had acquired, and the people (servants) which they had acquired in Haran, and they set out to go to the land of Canaan. When they came to the land of Canaan, '
  '6':
  - type: text
    content: 'Abram passed through the land as far as the site of Shechem, to the [great] terebinth (oak) tree of Moreh. Now the '
  - type: note
    content: I.e. the descendants of Ham’s son who was cursed by Noah.
  - type: text
    content: 'Canaanites were in the land at that time. '
  '7':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' appeared to Abram and said, “I will give this land to your descendants.” So Abram built an altar there to [honor] the L'
  - type: heading
    content: ord
  - type: text
    content: ' who had appeared to him. '
  '8':
  - type: text
    content: Then he moved on from there to the mountain on the east of Bethel, and pitched his tent, with Bethel on the west and Ai on the east; and there he built an altar to the L
  - type: heading
    content: ord
  - type: text
    content: ' and called on the name of the L'
  - type: heading
    content: ord
  - type: text
    content: ' [in worship through prayer, praise, and thanksgiving]. '
  '9':
  - type: text
    content: Then Abram journeyed on, continuing toward the Negev (the South country of Judah).
