document_id: JER.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Broken Covenant
  - type: text
    content: The word that came to Jeremiah from the L
  - type: heading
    content: ord
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'They have returned to the wickedness of their ancestors who refused to hear My words; they have followed other gods [in order] to serve them. The house of Israel and the house of Judah have broken My [solemn] covenant which I made with their fathers.” '
  '11':
  - type: text
    content: Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Behold I am bringing disaster '
  - type: text
    content: and
  - type: text
    content: ' suffering on them which they will not be able to escape; though they cry to Me, I will not listen to them. '
  '12':
  - type: text
    content: 'Then the cities of Judah and the people of Jerusalem will go and cry to the [man-made] gods to whom they burn incense, but they cannot save them in the time of their disaster. '
  '13':
  - type: text
    content: For [as many as] the number of your cities are your gods, O Judah; and [as many as] the number of the streets of Jerusalem are the altars you have set up to the shameful thing, altars to burn incense to Baal.
  '14':
  - type: text
    content: “Therefore do not pray for this people, nor lift up a cry or prayer for them, for I shall not listen when they cry to Me in the time of their disaster.
  '15':
  - type: text
    content: “What right has My beloved [to be] in My house
  - type: text
    content: 'When she has done many vile things '
  - type: text
    content: and
  - type: text
    content: ' acted treacherously [over and over again]?'
  - type: text
    content: 'Can vows '
  - type: text
    content: and
  - type: text
    content: ' the meat of your sacrifices remove your wickedness from you '
  - type: text
    content: and
  - type: text
    content: ' cancel the consequences of your sin,'
  - type: text
    content: So that you can [escape your judgment and] rejoice?”
  '16':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' [acknowledged you once as worthy and] called your name,'
  - type: text
    content: '“A green olive tree, fair '
  - type: text
    content: and
  - type: text
    content: ' beautiful in fruit and form”;'
  - type: text
    content: But with the roar of a great tempest
  - type: text
    content: He has set fire to it,
  - type: text
    content: And its branches are worthless. [Ps 52:8; Jer 21:14]
  '17':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, who planted you, has pronounced evil '
  - type: text
    content: and
  - type: text
    content: ' horror against you because of the evil of the house of Israel and of the house of Judah, which they have done to provoke Me [to anger] by offering sacrifices '
  - type: text
    content: and
  - type: text
    content: ' burning incense to Baal.'
  - type: heading
    content: Plots against Jeremiah
  '18':
  - type: text
    content: ¶Then the L
  - type: heading
    content: ord
  - type: text
    content: ' gave me knowledge [of their plot], and I knew it;'
  - type: text
    content: So You [O L
  - type: heading
    content: ord
  - type: text
    content: '] revealed their deeds to me.'
  '19':
  - type: text
    content: 'But I was like a gentle '
  - type: text
    content: and
  - type: text
    content: ' tame lamb brought to the slaughter;'
  - type: text
    content: 'And I did not know that they had devised plots '
  - type: text
    content: and
  - type: text
    content: ' schemes against me, saying,'
  - type: text
    content: “Let us destroy the tree with its fruit;
  - type: text
    content: Let us cut him off from the land of the living,
  - type: text
    content: That his name be remembered no longer.”
  '2':
  - type: text
    content: '“Hear the words of this [solemn] covenant, and speak to the men of Judah and to the people of Jerusalem. '
  '20':
  - type: text
    content: But, O L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, who judges righteously,'
  - type: text
    content: Who tests the feelings and the heart (mind),
  - type: text
    content: Let me see Your vengeance on them,
  - type: text
    content: For to You I have committed my cause.
  '21':
  - type: text
    content: Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' regarding the men of Anathoth, who seek your life, saying, “Do not prophesy in the name of the L'
  - type: heading
    content: ord
  - type: text
    content: ', so that you will not die by our hand.” '
  '22':
  - type: text
    content: Therefore, thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “Behold, I am about to punish them. Their young men will die by the sword, their sons and their daughters will die by famine; '
  '23':
  - type: text
    content: 'and there will be no remnant [of the conspirators] left, for I will bring disaster '
  - type: text
    content: and
  - type: text
    content: ' horror on the men of Anathoth in the year of their punishment.”'
  '3':
  - type: text
    content: Say to them, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, “Cursed is the man who does not heed the words of this covenant '
  '4':
  - type: text
    content: 'which I commanded your fathers at the time that I brought them out of the land of Egypt, from the iron furnace, saying, ‘Listen to My voice and do according to all that I command you. So you shall be My people, and I will be your God,’ '
  '5':
  - type: text
    content: 'that I may complete the oath which I swore to your fathers, to give them a land [of plenty] '
  - type: note
    content: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
  - type: text
    content: flowing with milk and honey, as it is this day.” ’ ” Then I answered, “Amen (so be it), O L
  - type: heading
    content: ord
  - type: text
    content: .”
  '6':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Proclaim all these words in the cities of Judah and in the streets of Jerusalem: ‘Hear the words of this [solemn] covenant and do them. '
  '7':
  - type: text
    content: 'For I solemnly warned your fathers at the time that I brought them up from the land of Egypt, even to this day, warning them persistently, saying, “Obey My voice.” '
  '8':
  - type: text
    content: Yet they did not obey or incline their ear [to listen to Me], but everyone walked in the stubborn way of his [own] evil heart. Therefore I brought on them all [the suffering threatened in] the words of this covenant, which I commanded them to do, but they did not.’ ”
  '9':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “A conspiracy has been found among the men of Judah and among the people of Jerusalem. '
