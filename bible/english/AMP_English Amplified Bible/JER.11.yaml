document_id: JER.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Broken Covenant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The word that came to Jeremiah from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Hear the words of this [solemn] covenant, and speak to the men of Judah and to the people of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Say to them, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, “Cursed is the man who does not heed the words of this covenant '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'which I commanded your fathers at the time that I brought them out of the land of Egypt, from the iron furnace, saying, ‘Listen to My voice and do according to all that I command you. So you shall be My people, and I will be your God,’ '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'that I may complete the oath which I swore to your fathers, to give them a land [of plenty] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
    marker-yv: yv-n
  - type: text
    text: flowing with milk and honey, as it is this day.” ’ ” Then I answered, “Amen (so be it), O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “Proclaim all these words in the cities of Judah and in the streets of Jerusalem: ‘Hear the words of this [solemn] covenant and do them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For I solemnly warned your fathers at the time that I brought them up from the land of Egypt, even to this day, warning them persistently, saying, “Obey My voice.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Yet they did not obey or incline their ear [to listen to Me], but everyone walked in the stubborn way of his [own] evil heart. Therefore I brought on them all [the suffering threatened in] the words of this covenant, which I commanded them to do, but they did not.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “A conspiracy has been found among the men of Judah and among the people of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They have returned to the wickedness of their ancestors who refused to hear My words; they have followed other gods [in order] to serve them. The house of Israel and the house of Judah have broken My [solemn] covenant which I made with their fathers.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Behold I am bringing disaster '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffering on them which they will not be able to escape; though they cry to Me, I will not listen to them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the cities of Judah and the people of Jerusalem will go and cry to the [man-made] gods to whom they burn incense, but they cannot save them in the time of their disaster. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For [as many as] the number of your cities are your gods, O Judah; and [as many as] the number of the streets of Jerusalem are the altars you have set up to the shameful thing, altars to burn incense to Baal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Therefore do not pray for this people, nor lift up a cry or prayer for them, for I shall not listen when they cry to Me in the time of their disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “What right has My beloved [to be] in My house
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When she has done many vile things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acted treacherously [over and over again]?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Can vows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the meat of your sacrifices remove your wickedness from you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cancel the consequences of your sin,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that you can [escape your judgment and] rejoice?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [acknowledged you once as worthy and] called your name,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“A green olive tree, fair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beautiful in fruit and form”;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But with the roar of a great tempest
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has set fire to it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its branches are worthless. [Ps 52:8; Jer 21:14]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, who planted you, has pronounced evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' horror against you because of the evil of the house of Israel and of the house of Judah, which they have done to provoke Me [to anger] by offering sacrifices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burning incense to Baal.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Plots against Jeremiah
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave me knowledge [of their plot], and I knew it;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So You [O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] revealed their deeds to me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But I was like a gentle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tame lamb brought to the slaughter;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I did not know that they had devised plots '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' schemes against me, saying,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let us destroy the tree with its fruit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let us cut him off from the land of the living,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That his name be remembered no longer.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, who judges righteously,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who tests the feelings and the heart (mind),
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me see Your vengeance on them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For to You I have committed my cause.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' regarding the men of Anathoth, who seek your life, saying, “Do not prophesy in the name of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', so that you will not die by our hand.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Therefore, thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “Behold, I am about to punish them. Their young men will die by the sword, their sons and their daughters will die by famine; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and there will be no remnant [of the conspirators] left, for I will bring disaster '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' horror on the men of Anathoth in the year of their punishment.”'
