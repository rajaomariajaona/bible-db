  - type: text
    content: 'He has prepared '
  - type: text
    content: and
  - type: text
    content: ' established His throne for judgment. [Heb 1:11]'
  '8':
  - type: text
    content: And He will judge the world in righteousness;
  - type: text
    content: He will execute judgment for the nations with fairness (equity). [Acts 17:31]
  '9':
  - type: text
    content: The L
  - type: heading
