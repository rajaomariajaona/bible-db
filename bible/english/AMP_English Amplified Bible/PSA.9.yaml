  - type: heading
    content: A Psalm of Thanksgiving for God’s Justice.
  - type: text
    content: 'To the Chief Musician; on '
  - type: note
    content: A transliteration of the Hebrew, whose meaning is unknown. Possibly referring to a tune titled “Death to the Son.” Perhaps for soprano voices.
  - type: text
    content: Muth-labben. A Psalm of David.
  - type: text
    content: 'I will give thanks '
  - type: text
    content: and
  - type: text
    content: ' praise the L'
  - type: heading
    content: ord
  - type: text
    content: ', with all my heart;'
  - type: text
    content: 'I will tell aloud all Your wonders '
  - type: text
    content: and
  - type: text
    content: ' marvelous deeds.'
  '10':
  - type: text
    content: And those who know Your name [who have experienced Your precious mercy] will put their confident trust in You,
  - type: text
    content: For You, O L
  - type: heading
    content: ord
  - type: text
    content: ', have not abandoned those who seek You. [Ps 42:1]'
  '11':
  - type: text
    content: ¶Sing praises to the L
  - type: heading
    content: ord
  - type: text
    content: ', who dwells in Zion;'
  - type: text
    content: Declare among the peoples His [great and wondrous] deeds.
  '12':
  - type: text
    content: For He who avenges blood [unjustly shed] remembers them (His people);
  - type: text
    content: 'He does not forget the cry of the afflicted '
  - type: text
    content: and
  - type: text
    content: ' abused.'
  '13':
  - type: text
    content: 'Have mercy on me '
  - type: text
    content: and
  - type: text
    content: ' be gracious to me, O L'
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: See how I am afflicted by those who hate me,
  - type: text
    content: You who lift me up from the gates of death,
  '14':
  - type: text
    content: That I may tell aloud all Your praises,
  - type: text
    content: That in the gates of the daughter of Zion (Jerusalem)
  - type: text
    content: 'I may rejoice in Your salvation '
  - type: text
    content: and
  - type: text
    content: ' Your help.'
  '15':
  - type: text
    content: The nations have sunk down in the pit which they have made;
  - type: text
    content: In the net which they hid, their own foot has been caught.
  '16':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has made Himself known;'
  - type: text
    content: He executes judgment;
  - type: text
    content: 'The wicked are trapped by the work of their own hands. '
  - type: text
    content: Higgaion (meditation) Selah.
  '17':
  - type: text
    content: ¶The wicked will turn to Sheol (the nether world, the place of the dead),
  - type: text
    content: Even
  - type: text
    content: ' all the nations who forget God.'
  '18':
  - type: text
    content: For the poor will not always be forgotten,
  - type: text
    content: Nor the hope of the burdened perish forever.
  '19':
  - type: text
    content: Arise, O L
  - type: heading
    content: ord
  - type: text
    content: ', do not let man prevail;'
  - type: text
    content: Let the nations be judged before You.
  '2':
  - type: text
    content: I will rejoice and exult in you;
  - type: text
    content: I will sing praise to Your name, O Most High.
  '20':
  - type: text
    content: 'Put them in [reverent] '
  - type: note
    content: The “fear” of God is a common concept in the OT, but is difficult to translate into English. It is not simply a matter of “fear” in the modern English sense. Nor is it only a sentiment of deep reverence. It implies obedience, as well.
  - type: text
    content: fear of You, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'So that the nations may know they are but [frail and mortal] men. '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: ¶When my enemies turn back,
  - type: text
    content: They stumble and perish before You.
  '4':
  - type: text
    content: For You have maintained my right and my cause;
  - type: text
    content: You have sat on the throne judging righteously.
  '5':
  - type: text
    content: 'You have rebuked the nations, You have destroyed the wicked '
  - type: text
    content: and
  - type: text
    content: ' unrepentant;'
  - type: text
    content: You have wiped out their name forever and ever.
  '6':
  - type: text
    content: 'The enemy has been cut off '
  - type: text
    content: and
  - type: text
    content: ' has vanished in everlasting ruins,'
  - type: text
    content: You have uprooted their cities;
  - type: text
    content: The very memory of them has perished.
  '7':
  - type: text
    content: ¶But the L
  - type: heading
    content: ord
  - type: text
    content: ' will remain '
  - type: text
    content: and
  - type: text
