document_id: PSA.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 9
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm of Thanksgiving for God’s Justice.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician; on '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A transliteration of the Hebrew, whose meaning is unknown. Possibly referring to a tune titled “Death to the Son.” Perhaps for soprano voices.
      marker-yv: yv-n
    - type: text
      text: Muth-labben. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I will give thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', with all my heart;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will tell aloud all Your wonders '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' marvelous deeds.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And those who know Your name [who have experienced Your precious mercy] will put their confident trust in You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', have not abandoned those who seek You. [Ps 42:1]'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶Sing praises to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who dwells in Zion;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare among the peoples His [great and wondrous] deeds.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For He who avenges blood [unjustly shed] remembers them (His people);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He does not forget the cry of the afflicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abused.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Have mercy on me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be gracious to me, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how I am afflicted by those who hate me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who lift me up from the gates of death,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: That I may tell aloud all Your praises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That in the gates of the daughter of Zion (Jerusalem)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I may rejoice in Your salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Your help.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The nations have sunk down in the pit which they have made;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the net which they hid, their own foot has been caught.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has made Himself known;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He executes judgment;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wicked are trapped by the work of their own hands. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Higgaion (meditation) Selah.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ¶The wicked will turn to Sheol (the nether world, the place of the dead),
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Even
    - type: text
      text: ' all the nations who forget God.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: For the poor will not always be forgotten,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor the hope of the burdened perish forever.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Arise, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', do not let man prevail;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the nations be judged before You.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will rejoice and exult in you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing praise to Your name, O Most High.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Put them in [reverent] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “fear” of God is a common concept in the OT, but is difficult to translate into English. It is not simply a matter of “fear” in the modern English sense. Nor is it only a sentiment of deep reverence. It implies obedience, as well.
      marker-yv: yv-n
    - type: text
      text: fear of You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So that the nations may know they are but [frail and mortal] men. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ¶When my enemies turn back,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stumble and perish before You.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For You have maintained my right and my cause;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have sat on the throne judging righteously.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You have rebuked the nations, You have destroyed the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unrepentant;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have wiped out their name forever and ever.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The enemy has been cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has vanished in everlasting ruins,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have uprooted their cities;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The very memory of them has perished.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will remain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sit enthroned forever;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He has prepared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established His throne for judgment. [Heb 1:11]'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And He will judge the world in righteousness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will execute judgment for the nations with fairness (equity). [Acts 17:31]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' also will be a refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a stronghold for the oppressed,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A refuge in times of trouble;
