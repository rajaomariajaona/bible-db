segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Pitfalls of Immorality
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My son, be attentive to my wisdom [godly wisdom learned by costly experience],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Incline your ear to my understanding; [1 Kin 4:29]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'That you may exercise discrimination '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discretion (good judgment),'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And your lips may reserve knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answer wisely [to temptation].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For the lips of an immoral woman drip honey [like a honeycomb]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And her speech is smoother than oil; [Ezek 20:30; Col 2:8-10; 2 Pet 2:14-17]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But in the end she is bitter like [the extract of] wormwood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sharp as a two-edged sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Her feet go down to death;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her steps take hold of Sheol (the nether world, the place of the dead),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So that she does not think [seriously] about the path of life;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Her ways are aimless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unstable; you cannot know where her path leads.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Now then, my sons, listen to me
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not depart from (forget) the words of my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Let your way [in life] be far from her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not go near the door of her house [avoid even being near the places of temptation], [Prov 4:15; Rom 16:17; 1 Thess 5:19-22]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Or you will give your honor to others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your years to the cruel one,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And strangers will be filled with your strength
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your hard-earned wealth will go to the house of a foreigner [who does not know God];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And you will groan when your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: life is
  - type: text
    text: ' ending,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When your flesh and your body are consumed;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And you say, “How I hated instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discipline,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And my heart despised correction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproof!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “I have not listened to the voice of my teachers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor have I inclined my ear to those who instructed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “I was almost in total ruin
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the midst of the assembly and congregation.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: All of the Ten Commandments are reflected in the book of Proverbs; here it is the seventh, “You shall not commit adultery.”
    marker-yv: yv-n
  - type: text
    text: 'Drink water from your own '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vv 15-18 describe the purity of a man’s relationship in marriage. The cistern and well represent his wife.
    marker-yv: yv-n
  - type: text
    text: cistern [of a pure marriage relationship]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And fresh running water from your own well.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Should your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. children of one’s promiscuity who are fatherless.
    marker-yv: yv-n
  - type: text
    text: springs (children) be dispersed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As streams of water in the streets?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '[Confine yourself to your own wife.] Let '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your children
  - type: text
    text: ' be yours alone,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the children
  - type: text
    text: ' of strangers with you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Let your fountain (wife) be blessed [with the rewards of fidelity],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And rejoice in the wife of your youth. [Song 4:12, 15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Let her be as
  - type: text
    text: ' a loving hind and graceful doe,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let her breasts refresh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satisfy you at all times;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Always be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: stagger
      - type: text
        text: ' (with passion).'
    marker-yv: yv-n
  - type: text
    text: 'exhilarated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight in her love.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Why should you, my son, be exhilarated with an immoral woman
- type: usfm
  marker: q1
  children:
  - type: text
    text: And embrace the bosom of an outsider (pagan)?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For the ways of man are directly before the eyes of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He carefully watches all of his paths [all of his comings and goings]. [2 Chr 16:9; Job 31:4; 34:21; Prov 15:3; Jer 16:17; Hos 7:2; Heb 4:13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The iniquities done by a wicked man will trap him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he will be held with the cords of his sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He will die for lack of instruction (discipline),
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And in the greatness of his foolishness he will go astray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be lost.'
