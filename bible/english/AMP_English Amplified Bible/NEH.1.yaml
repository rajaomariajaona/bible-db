        children:
        - type: text
          text: The cupbearer was an official of high rank in royal courts. He served the wine at the king’s table and sometimes tasted it first to be certain it was not poisoned. He was often a trusted confidant of the ruler, and his position was one of influence in the court.
      marker-yv: yv-n
    - type: text
      text: cupbearer to the king [of Persia].
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanani, one of my brothers, and some men from Judah came; and I asked them about the surviving Jews who had escaped and survived the captivity, and about Jerusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said to me, “The remnant there in the province who survived the captivity are in great distress and reproach; the wall of Jerusalem is broken down and its [fortified] gates have been burned (destroyed) by fire.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came about when I heard these words, I sat down and wept and mourned for days; and I was fasting and praying [constantly] before the God of heaven. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I said, “Please, O L
    - type: usfm
