    content: 'but if you return to Me and keep My commandments and do them, though those of you who have been scattered are in the most remote part of the '
  - type: note
    content: This seems to be a hypothetical expression, but the grammatical form is that of a real possibility, to emphasize that God will find His people no matter where in the world they may be.
  - type: text
