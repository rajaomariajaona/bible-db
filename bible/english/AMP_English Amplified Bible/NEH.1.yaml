      children:
      - type: text
        text: ord
    - type: text
      text: ' God of heaven, the great and awesome God, who keeps the covenant and lovingkindness for those who love Him and keep His commandments, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'please let Your ear be attentive and Your eyes open to hear the prayer of Your servant which I am praying before You, day and night, on behalf of Your servants, the '
