    content: Please, O Lord, let Your ear be attentive to the prayer of Your servant and the prayer of Your servants who delight to [reverently] fear Your Name [Your essence, Your nature, Your attributes, with awe]; and make Your servant successful this day and grant him compassion in the sight of this man [the king].”
  - type: text
