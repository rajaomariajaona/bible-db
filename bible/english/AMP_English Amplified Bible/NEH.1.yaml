  - type: text
    text: 'sons (descendants) of Israel (Jacob), confessing the sins of the sons of Israel which we have committed against You; I and my father’s house have sinned. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'We have acted very corruptly against You and have not kept the commandments, nor the statutes, nor the ordinances which You commanded Your servant Moses. [Deut 6:1-9] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Please remember the word which You commanded Your servant Moses, saying, ‘If you are unfaithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violate your obligations to Me I will scatter you [abroad] among the peoples; [Lev 26:33] '
  - type: usfm
