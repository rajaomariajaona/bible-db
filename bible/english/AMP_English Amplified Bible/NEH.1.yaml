            text: Israelites
        - type: text
          text: ' usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Reuben, Reuben, Reubenites
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'sons (descendants) of Israel (Jacob), confessing the sins of the sons of Israel which we have committed against You; I and my father’s house have sinned. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have acted very corruptly against You and have not kept the commandments, nor the statutes, nor the ordinances which You commanded Your servant Moses. [Deut 6:1-9] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Please remember the word which You commanded Your servant Moses, saying, ‘If you are unfaithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' violate your obligations to Me I will scatter you [abroad] among the peoples; [Lev 26:33] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but if you return to Me and keep My commandments and do them, though those of you who have been scattered are in the most remote part of the '
