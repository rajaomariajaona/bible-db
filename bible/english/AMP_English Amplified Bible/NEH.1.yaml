  '2':
  - type: text
    content: 'Hanani, one of my brothers, and some men from Judah came; and I asked them about the surviving Jews who had escaped and survived the captivity, and about Jerusalem. '
  '3':
  - type: text
    content: They said to me, “The remnant there in the province who survived the captivity are in great distress and reproach; the wall of Jerusalem is broken down and its [fortified] gates have been burned (destroyed) by fire.”
  '4':
  - type: text
    content: 'Now it came about when I heard these words, I sat down and wept and mourned for days; and I was fasting and praying [constantly] before the God of heaven. '
  '5':
  - type: text
    content: And I said, “Please, O L
  - type: heading
    content: ord
  - type: text
    content: ' God of heaven, the great and awesome God, who keeps the covenant and lovingkindness for those who love Him and keep His commandments, '
  '6':
  - type: text
    content: 'please let Your ear be attentive and Your eyes open to hear the prayer of Your servant which I am praying before You, day and night, on behalf of Your servants, the '
  - type: note
    content: In general, sons of Israel or Israel or Israelites refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision sons of Israel or Israel or Israelites usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. sons of Reuben, Reuben, Reubenites and so throughout.
  - type: text
    content: 'sons (descendants) of Israel (Jacob), confessing the sins of the sons of Israel which we have committed against You; I and my father’s house have sinned. '
  '7':
  - type: text
    content: 'We have acted very corruptly against You and have not kept the commandments, nor the statutes, nor the ordinances which You commanded Your servant Moses. [Deut 6:1-9] '
  '8':
