  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now they are Your servants and Your people whom You have redeemed by Your great power and by Your strong hand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Please, O Lord, let Your ear be attentive to the prayer of Your servant and the prayer of Your servants who delight to [reverently] fear Your Name [Your essence, Your nature, Your attributes, with awe]; and make Your servant successful this day and grant him compassion in the sight of this man [the king].”
  - type: usfm
