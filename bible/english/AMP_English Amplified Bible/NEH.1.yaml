        marker: fr
        children:
        - type: text
          text: '1:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This seems to be a hypothetical expression, but the grammatical form is that of a real possibility, to emphasize that God will find His people no matter where in the world they may be.
      marker-yv: yv-n
    - type: text
      text: 'heavens, I will gather them from there and will bring them to the place where I have chosen for My '
