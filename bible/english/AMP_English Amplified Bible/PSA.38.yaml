document_id: PSA.38
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 38
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prayer in Time of Discipline.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of David; to bring to remembrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', do not rebuke me in Your wrath,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor discipline me in Your burning anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For Your arrows have sunk into me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' penetrate deeply,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And Your hand has pressed down on me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' greatly disciplined me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: There is no soundness in my flesh because of Your indignation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no health in my bones because of my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For my iniquities have gone over my head [like the waves of a flood];
- type: usfm
  marker: q1
  children:
  - type: text
    text: As a heavy burden they weigh too much for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My wounds are loathsome and foul
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of my foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am bent over and greatly bowed down;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I go about mourning all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For my sides are filled with burning,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there is no health in my flesh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I am numb and greatly bruised [deadly cold and completely worn out];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I groan because of the disquiet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' moaning of my heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶Lord, all my desire is before You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my sighing is not hidden from You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My heart throbs violently, my strength fails me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as for the light of my eyes, even that has also gone from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My loved ones and my friends stand aloof from my plague;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my neighbors stand far away. [Luke 23:49]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Those who seek my life lay snares '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And those who seek to injure me threaten mischievous things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They devise treachery all the day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶But I, like a deaf man, do not hear;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am like a mute man who does not open his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Yes, I am like a man who does not hear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In whose mouth are no arguments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For in You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', I hope;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will answer, O Lord my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For I pray, “May they not rejoice over me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who, when my foot slips, would boast against me.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For I am ready to fall;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My sorrow is continually before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For I do confess my guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' iniquity;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am filled with anxiety because of my sin. [2 Cor 7:9, 10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But my [numerous] enemies are vigorous and strong,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who hate me without cause are many.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They repay evil for good, they attack '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' try to kill me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I follow what is good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Do not abandon me, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: O my God, do not be far from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Make haste to help me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Lord, my Salvation.
