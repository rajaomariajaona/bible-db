document_id: PSA.38,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 38
  - type: heading
    content: Prayer in Time of Discipline.
  - type: text
    content: A Psalm of David; to bring to remembrance.
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', do not rebuke me in Your wrath,'
  - type: text
    content: Nor discipline me in Your burning anger.
  '10':
  - type: text
    content: My heart throbs violently, my strength fails me;
  - type: text
    content: And as for the light of my eyes, even that has also gone from me.
  '11':
  - type: text
    content: My loved ones and my friends stand aloof from my plague;
  - type: text
    content: And my neighbors stand far away. [Luke 23:49]
  '12':
  - type: text
    content: 'Those who seek my life lay snares '
  - type: text
    content: for me,
  - type: text
    content: 'And those who seek to injure me threaten mischievous things '
  - type: text
    content: and
  - type: text
    content: ' destruction;'
  - type: text
    content: They devise treachery all the day long.
  '13':
  - type: text
    content: ¶But I, like a deaf man, do not hear;
  - type: text
    content: I am like a mute man who does not open his mouth.
  '14':
  - type: text
    content: Yes, I am like a man who does not hear,
  - type: text
    content: In whose mouth are no arguments.
  '15':
  - type: text
    content: For in You, O L
  - type: heading
    content: ord
  - type: text
    content: ', I hope;'
  - type: text
    content: You will answer, O Lord my God.
  '16':
  - type: text
    content: For I pray, “May they not rejoice over me,
  - type: text
    content: Who, when my foot slips, would boast against me.”
  '17':
  - type: text
    content: For I am ready to fall;
  - type: text
    content: My sorrow is continually before me.
  '18':
  - type: text
    content: 'For I do confess my guilt '
  - type: text
    content: and
  - type: text
    content: ' iniquity;'
  - type: text
    content: I am filled with anxiety because of my sin. [2 Cor 7:9, 10]
  '19':
  - type: text
    content: But my [numerous] enemies are vigorous and strong,
  - type: text
    content: And those who hate me without cause are many.
  '2':
  - type: text
    content: 'For Your arrows have sunk into me '
  - type: text
    content: and
  - type: text
    content: ' penetrate deeply,'
  - type: text
    content: 'And Your hand has pressed down on me '
  - type: text
    content: and
  - type: text
    content: ' greatly disciplined me.'
  '20':
  - type: text
    content: 'They repay evil for good, they attack '
  - type: text
    content: and
  - type: text
    content: ' try to kill me,'
  - type: text
    content: Because I follow what is good.
  '21':
  - type: text
    content: Do not abandon me, O L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: O my God, do not be far from me.
  '22':
  - type: text
    content: Make haste to help me,
  - type: text
    content: O Lord, my Salvation.
  '3':
  - type: text
    content: There is no soundness in my flesh because of Your indignation;
  - type: text
    content: There is no health in my bones because of my sin.
  '4':
  - type: text
    content: For my iniquities have gone over my head [like the waves of a flood];
  - type: text
    content: As a heavy burden they weigh too much for me.
  '5':
  - type: text
    content: My wounds are loathsome and foul
  - type: text
    content: Because of my foolishness.
  '6':
  - type: text
    content: I am bent over and greatly bowed down;
  - type: text
    content: I go about mourning all day long.
  '7':
  - type: text
    content: For my sides are filled with burning,
  - type: text
    content: And there is no health in my flesh.
  '8':
  - type: text
    content: I am numb and greatly bruised [deadly cold and completely worn out];
  - type: text
    content: 'I groan because of the disquiet '
  - type: text
    content: and
  - type: text
    content: ' moaning of my heart.'
  '9':
  - type: text
    content: ¶Lord, all my desire is before You;
  - type: text
    content: And my sighing is not hidden from You.
