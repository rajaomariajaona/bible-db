document_id: ISA.18,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Message to Ethiopia
  - type: text
    content: 'Woe (judgment is coming) to the land of '
  - type: note
    content: Perhaps a reference to the warships of Cush.
  - type: text
    content: whirring wings
  - type: text
    content: 'Which is beyond the rivers of '
  - type: note
    content: Ancient Ethiopia was south of Egypt and included portions of modern Egypt, Sudan, and Ethiopia.
  - type: text
    content: Cush (Ethiopia),
  '2':
  - type: text
    content: Which sends ambassadors by the sea,
  - type: text
    content: Even in vessels of papyrus on the surface of the waters.
  - type: text
    content: Go, swift messengers, to a nation [of people] tall and smooth (clean shaven),
  - type: text
    content: To a people feared far and wide,
  - type: text
    content: A powerful and oppressive nation
  - type: text
    content: Whose land the rivers divide.
  '3':
  - type: text
    content: All you inhabitants of the world, you who dwell on the earth,
  - type: text
    content: When a banner is raised on the mountains, you will see it!
  - type: text
    content: When a trumpet is blown, you will hear it!
  '4':
  - type: text
    content: For this is what the L
  - type: heading
    content: ord
  - type: text
    content: ' has said to me,'
  - type: text
    content: “I will be quiet and I will look on from My dwelling place,
  - type: text
    content: Like shimmering heat above the sunshine,
  - type: text
    content: Like a cloud of dew in the heat of harvest.”
  '5':
  - type: text
    content: For before the harvest, when the blossom is over
  - type: text
    content: And the flower becomes a ripening grape,
  - type: text
    content: He will cut off the sprigs [without buds] with pruning knives,
  - type: text
    content: And [He will] remove and cut away the spreading branches.
  '6':
  - type: text
    content: They (warriors) will be left together for the mountain birds of prey,
  - type: text
    content: And for the beasts of the earth;
  - type: text
    content: 'And the birds of prey will [spend the] summer '
  - type: text
    content: feeding
  - type: text
    content: ' on them,'
  - type: text
    content: And all the beasts of the earth will spend harvest time on them.
  '7':
  - type: text
    content: At that time a gift of homage will be brought to the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts'
  - type: text
    content: From a people tall and smooth (clean shaven),
  - type: text
    content: From a people feared far and wide,
  - type: text
    content: A powerful and oppressive nation,
  - type: text
    content: Whose land the rivers divide—
  - type: text
    content: 'To the place [of worship] of the '
  - type: note
    content: See note Deut 12:5.
  - type: text
    content: name of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, to Mount Zion [in Jerusalem]. [Deut 12:5; 2 Chr 32:23; Is 16:1; 45:14; Zeph 3:10]'
