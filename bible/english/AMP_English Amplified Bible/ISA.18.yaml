      - type: text
        text: Ancient Ethiopia was south of Egypt and included portions of modern Egypt, Sudan, and Ethiopia.
    marker-yv: yv-n
  - type: text
    text: Cush (Ethiopia),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Which sends ambassadors by the sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even in vessels of papyrus on the surface of the waters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go, swift messengers, to a nation [of people] tall and smooth (clean shaven),
- type: usfm
  marker: q1
  children:
  - type: text
    text: To a people feared far and wide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A powerful and oppressive nation
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whose land the rivers divide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: All you inhabitants of the world, you who dwell on the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When a banner is raised on the mountains, you will see it!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When a trumpet is blown, you will hear it!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For this is what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has said to me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will be quiet and I will look on from My dwelling place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like shimmering heat above the sunshine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a cloud of dew in the heat of harvest.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For before the harvest, when the blossom is over
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the flower becomes a ripening grape,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will cut off the sprigs [without buds] with pruning knives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [He will] remove and cut away the spreading branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They (warriors) will be left together for the mountain birds of prey,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for the beasts of the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the birds of prey will [spend the] summer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: feeding
  - type: text
    text: ' on them,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the beasts of the earth will spend harvest time on them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: At that time a gift of homage will be brought to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts'
- type: usfm
  marker: q1
  children:
  - type: text
    text: From a people tall and smooth (clean shaven),
- type: usfm
  marker: q1
  children:
  - type: text
    text: From a people feared far and wide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A powerful and oppressive nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whose land the rivers divide—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To the place [of worship] of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Deut 12:5.
    marker-yv: yv-n
  - type: text
    text: name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, to Mount Zion [in Jerusalem]. [Deut 12:5; 2 Chr 32:23; Is 16:1; 45:14; Zeph 3:10]'
