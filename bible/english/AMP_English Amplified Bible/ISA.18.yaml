- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Which is beyond the rivers of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:1 '
    - type: usfm
