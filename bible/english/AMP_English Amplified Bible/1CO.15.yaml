document_id: 1CO.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Fact of Christ’s Resurrection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now brothers and sisters, let me remind you [once again] of the good news [of salvation] which I preached to you, which you welcomed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepted and on which you stand [by faith]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'By this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: faith
  - type: text
    text: ' you are saved [reborn from above—spiritually transformed, renewed, and set apart for His purpose], if you hold firmly to the word which I preached to you, unless you believed in vain [just superficially and without complete commitment].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I passed on to you as of first importance what I also received, that Christ died for our sins according to [that which] the Scriptures [foretold], [Is 53:5-12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and that He was buried, and that He was [bodily] raised on the third day according to [that which] the Scriptures [foretold], [Ps 16:9, 10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and that He appeared to Cephas (Peter), then to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A title referring to the original disciples chosen by Jesus (including Judas). A few hours after betraying Jesus, Judas committed suicide (Matt 27:5) leaving only the eleven (Matt 28:16; Mark 16:14; Luke 24:9, 33).
    marker-yv: yv-n
  - type: text
    text: 'Twelve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'After that He appeared to more than five hundred brothers and sisters at one time, the majority of whom are still alive, but some have fallen asleep [in death]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then He was seen by James, then by all the apostles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and last of all, as to one '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul’s life-changing encounter with the resurrected Christ occurred on the road to Damascus (Acts 9).
    marker-yv: yv-n
  - type: text
    text: 'untimely (prematurely, traumatically) born, He appeared to me also. [Acts 9:1-9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For I am the least [worthy] of the apostles, and not fit to be called an apostle, because I [at one time] fiercely oppressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violently persecuted the church of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But by the [remarkable] grace of God I am what I am, and His grace toward me was not without effect. In fact, I worked harder than all of the apostles, though it was not I, but the grace of God [His unmerited favor and blessing which was] with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So whether it was I or they, this is what we preach, and this is what you believed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusted in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relied on with confidence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now if Christ is preached as raised from the dead, how is it that '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps these were converted Sadducees, who as a sect denied the possibility of a resurrection (Acts 23:8).
    marker-yv: yv-n
  - type: text
    text: 'some among you say that there is no resurrection of the dead? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But if there is no resurrection of the dead, then not even Christ has been raised; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and if Christ has not been raised, then our preaching is vain [useless, amounting to nothing], and your faith is also vain [imaginary, unfounded, devoid of value and benefit—not based on truth]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'We are even discovered to be false witnesses [misrepresenting] God, because we testified concerning Him that He raised Christ, whom He did not raise, if in fact the dead are not raised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For if the dead are not raised, then Christ has not been raised, either; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and if Christ has not been raised, your faith is worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerless [mere delusion]; you are still in your sins [and under the control and penalty of sin]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then those also who have fallen asleep in Christ are lost. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'If we who are [abiding] in Christ have hoped only in this life [and this is all there is], then we are of all people most miserable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be pitied.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Order of Resurrection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But now [as things really are] Christ has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in fact
  - type: text
    text: ' been raised from the dead, [and He became] the first fruits [that is, the first to be resurrected with an incorruptible, immortal body, foreshadowing the resurrection] of those who have fallen asleep [in death]. [Col 1:18] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For since [it was] by a man that death '
  - type: usfm
    marker: it
    children:
    - type: text
      text: came
  - type: text
    text: ' [into the world], it is also by a Man that the resurrection of the dead '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has come
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For just as '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because of our physical nature as descendants of Adam.
    marker-yv: yv-n
  - type: text
    text: 'in Adam all die, so also '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because of our spiritual nature as born-again believers in Christ.
    marker-yv: yv-n
  - type: text
    text: 'in Christ all will be made alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But each in his own order: Christ the first fruits, then those who are Christ’s [own will be resurrected with incorruptible, immortal bodies] at His coming. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'After that comes the end (completion), when He hands over the kingdom to God the Father, after He has made inoperative '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abolished every ruler and every authority and power. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For Christ must reign [as King] until He has put all His enemies under His feet. [Ps 110:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The last enemy to be abolished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put to an end is death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For H
  - type: usfm
    marker: sc
    children:
    - type: text
      text: e
  - type: text
    text: ' (the Father) '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: has put all things in subjection under
  - type: text
    text: ' H'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: is
  - type: text
    text: ' (Christ’s) '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: feet
  - type: text
    text: '. But when He says, “All things have been put in subjection [under Christ],” it is clear that He (the Father) who put all things in subjection to Him (Christ) is excepted [since the Father is not in subjection to His own Son]. [Ps 8:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: However, when all things are subjected to Him (Christ), then the Son Himself will also be subjected to the One (the Father) who put all things under Him, so that God may be all in all [manifesting His glory without any opposition, the supreme indwelling and controlling factor of life].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Otherwise, what will those do who are being '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This has nothing to do with Christian baptism or salvation. Paul may be referring to the practices of a pagan religion that required a ritual washing to enter an afterlife.
    marker-yv: yv-n
  - type: text
    text: 'baptized for the dead? If the dead are not raised at all, why are people even baptized for them? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '[For that matter] why are we [running such risks and putting ourselves] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul’s life was continuously threatened because of his public commitment to Christ.
    marker-yv: yv-n
  - type: text
    text: 'in danger [nearly] every hour [if there is no resurrection]? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'I assure you, believers, by the pride which I have in you in [your union with] Christ Jesus our Lord, I die daily [I face death and die to self]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'What good has it done me if, [merely] from a human point of view, I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may refer figuratively to the furious crowd that rose up against Paul in Ephesus, rather than to literal animals (Acts 19:23-41).
    marker-yv: yv-n
  - type: text
    text: 'fought with wild animals at Ephesus? If the dead are not raised [at all], '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: let us eat and drink
  - type: text
    text: ' [enjoying ourselves now], '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: for tomorrow we die
  - type: text
    text: '. [Is 22:13; 2 Cor 1:8, 9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Do not be deceived: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul quotes this one verse maxim from the writings of the Greek dramatist Menander (342-291 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .). “Bad company” in this case undoubtedly refers to the teachers who were denying the truth of the resurrection.
    marker-yv: yv-n
  - type: text
    text: '“Bad company corrupts good morals.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Be sober-minded [be sensible, wake up from your spiritual stupor] as you ought, and stop sinning; for some [of you] have no knowledge of God [you are disgracefully ignorant of Him, and ignore His truths]. I say this to your shame.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'But someone will say, “How are the dead raised? And with what kind of body will they come?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'You fool! Every time you plant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: seed
  - type: text
    text: ' you sow something that does not come to life [germinating, springing up and growing] unless it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: first
  - type: text
    text: ' dies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'The seed you sow is not the body (the plant) which it is going to become, but it is a bare seed, perhaps of wheat or some other grain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But God gives it a body just as He planned, and to each kind of seed a body of its own [is given]. [Gen 1:11] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'All flesh is not the same. There is one kind for humans, another for animals, another for birds, and another for fish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'There are also heavenly bodies [sun, moon and stars] and earthly bodies [humans, animals, and plants], but the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beauty of the heavenly is one kind, and the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: glory
  - type: text
    text: ' of the earthly is another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'There is a glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beauty of the sun, another glory of the moon, and yet another [distinctive] glory of the stars; and one star differs from another in glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'So it is with the resurrection of the dead. The [human] body that is sown is perishable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mortal, it is raised imperishable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' immortal. [Dan 12:3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'It is sown in dishonor, it is raised in glory; it is sown in weakness, it is raised in strength; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'it is sown a natural body [mortal, suited to earth], it is raised a spiritual body [immortal, suited to heaven]. As surely as there is a physical body, there is also a spiritual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: body
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'So it is written [in Scripture], “The first '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: man
  - type: text
    text: ', Adam, '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: became a living soul
  - type: text
    text: ' (an individual);” the last Adam (Christ) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: became
  - type: text
    text: ' a life-giving spirit [restoring the dead to life]. [Gen 2:7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'However, the spiritual [the immortal life] is not first, but the physical [the mortal life]; then the spiritual. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'The first man [Adam] is from the earth, earthy [made of dust]; the second Man [Christ, the Lord] is from heaven. [Gen 2:7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'As is the earthly man [the man of dust], so are those who are of earth; and as is the heavenly [Man], so are those who are of heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Just as we have borne the image of the earthly [the man of dust], '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Two early mss read “let us also.”
    marker-yv: yv-n
  - type: text
    text: we will also bear the image of the heavenly [the Man of heaven].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Mystery of Resurrection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Now I say this, believers, that flesh and blood cannot inherit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' be part of the kingdom of God; nor does the perishable (mortal) inherit the imperishable (immortal). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Listen very carefully, I tell you a mystery [a secret truth decreed by God and previously hidden, but now revealed]; we will not all sleep [in death], but we will all be [completely] changed [wondrously transformed], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'in a moment, in the twinkling of an eye, at [the sound of] the last trumpet call. For a trumpet will sound, and the dead [who believed in Christ] will be raised imperishable, and we will be [completely] changed [wondrously transformed]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'For this perishable [part of us] must put on the imperishable [nature], and this mortal [part of us that is capable of dying] must put on immortality [which is freedom from death]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: And when this perishable puts on the imperishable, and this mortal puts on immortality, then the Scripture will be fulfilled that says, “D
  - type: usfm
    marker: sc
    children:
    - type: text
      text: eath is swallowed up
  - type: text
    text: ' in victory (vanquished forever). [Is 25:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: death
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: where is your victory
  - type: text
    text: '? O '
  - type: usfm
    marker: sc
    children:
