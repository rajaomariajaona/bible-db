document_id: 1CO.15,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fact of Christ’s Resurrection
  - type: text
    content: 'Now brothers and sisters, let me remind you [once again] of the good news [of salvation] which I preached to you, which you welcomed '
  - type: text
    content: and
  - type: text
    content: ' accepted and on which you stand [by faith]. '
  '10':
  - type: text
    content: 'But by the [remarkable] grace of God I am what I am, and His grace toward me was not without effect. In fact, I worked harder than all of the apostles, though it was not I, but the grace of God [His unmerited favor and blessing which was] with me. '
  '11':
  - type: text
    content: 'So whether it was I or they, this is what we preach, and this is what you believed '
  - type: text
    content: and
  - type: text
    content: ' trusted in '
  - type: text
    content: and
  - type: text
    content: ' relied on with confidence.'
  '12':
  - type: text
    content: 'Now if Christ is preached as raised from the dead, how is it that '
  - type: note
    content: Perhaps these were converted Sadducees, who as a sect denied the possibility of a resurrection (Acts 23:8).
  - type: text
    content: 'some among you say that there is no resurrection of the dead? '
  '13':
  - type: text
    content: 'But if there is no resurrection of the dead, then not even Christ has been raised; '
  '14':
  - type: text
    content: 'and if Christ has not been raised, then our preaching is vain [useless, amounting to nothing], and your faith is also vain [imaginary, unfounded, devoid of value and benefit—not based on truth]. '
  '15':
  - type: text
    content: 'We are even discovered to be false witnesses [misrepresenting] God, because we testified concerning Him that He raised Christ, whom He did not raise, if in fact the dead are not raised. '
  '16':
  - type: text
    content: 'For if the dead are not raised, then Christ has not been raised, either; '
  '17':
  - type: text
    content: 'and if Christ has not been raised, your faith is worthless '
  - type: text
    content: and
  - type: text
    content: ' powerless [mere delusion]; you are still in your sins [and under the control and penalty of sin]. '
  '18':
  - type: text
    content: 'Then those also who have fallen asleep in Christ are lost. '
  '19':
  - type: text
    content: 'If we who are [abiding] in Christ have hoped only in this life [and this is all there is], then we are of all people most miserable '
  - type: text
    content: and
  - type: text
    content: ' to be pitied.'
  - type: heading
    content: The Order of Resurrection
  '2':
  - type: text
    content: 'By this '
  - type: text
    content: faith
  - type: text
    content: ' you are saved [reborn from above—spiritually transformed, renewed, and set apart for His purpose], if you hold firmly to the word which I preached to you, unless you believed in vain [just superficially and without complete commitment].'
  '20':
  - type: text
    content: 'But now [as things really are] Christ has '
  - type: text
    content: in fact
  - type: text
    content: ' been raised from the dead, [and He became] the first fruits [that is, the first to be resurrected with an incorruptible, immortal body, foreshadowing the resurrection] of those who have fallen asleep [in death]. [Col 1:18] '
  '21':
  - type: text
    content: 'For since [it was] by a man that death '
  - type: text
    content: came
  - type: text
    content: ' [into the world], it is also by a Man that the resurrection of the dead '
  - type: text
    content: has come
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'For just as '
  - type: note
    content: Because of our physical nature as descendants of Adam.
  - type: text
    content: 'in Adam all die, so also '
  - type: note
    content: Because of our spiritual nature as born-again believers in Christ.
  - type: text
    content: 'in Christ all will be made alive. '
  '23':
  - type: text
    content: 'But each in his own order: Christ the first fruits, then those who are Christ’s [own will be resurrected with incorruptible, immortal bodies] at His coming. '
  '24':
  - type: text
    content: 'After that comes the end (completion), when He hands over the kingdom to God the Father, after He has made inoperative '
  - type: text
    content: and
  - type: text
    content: ' abolished every ruler and every authority and power. '
  '25':
  - type: text
    content: 'For Christ must reign [as King] until He has put all His enemies under His feet. [Ps 110:1] '
  '26':
  - type: text
    content: 'The last enemy to be abolished '
  - type: text
    content: and
  - type: text
    content: ' put to an end is death. '
  '27':
  - type: text
    content: For H
  - type: heading
    content: e
  - type: text
    content: ' (the Father) '
  - type: heading
    content: has put all things in subjection under
  - type: text
    content: ' H'
  - type: heading
    content: is
  - type: text
    content: ' (Christ’s) '
  - type: heading
    content: feet
  - type: text
    content: '. But when He says, “All things have been put in subjection [under Christ],” it is clear that He (the Father) who put all things in subjection to Him (Christ) is excepted [since the Father is not in subjection to His own Son]. [Ps 8:6] '
  '28':
  - type: text
    content: However, when all things are subjected to Him (Christ), then the Son Himself will also be subjected to the One (the Father) who put all things under Him, so that God may be all in all [manifesting His glory without any opposition, the supreme indwelling and controlling factor of life].
  '29':
  - type: text
    content: 'Otherwise, what will those do who are being '
  - type: note
    content: This has nothing to do with Christian baptism or salvation. Paul may be referring to the practices of a pagan religion that required a ritual washing to enter an afterlife.
  - type: text
    content: 'baptized for the dead? If the dead are not raised at all, why are people even baptized for them? '
  '3':
  - type: text
    content: 'For I passed on to you as of first importance what I also received, that Christ died for our sins according to [that which] the Scriptures [foretold], [Is 53:5-12] '
  '30':
  - type: text
    content: '[For that matter] why are we [running such risks and putting ourselves] '
  - type: note
    content: Paul’s life was continuously threatened because of his public commitment to Christ.
  - type: text
    content: 'in danger [nearly] every hour [if there is no resurrection]? '
  '31':
  - type: text
    content: 'I assure you, believers, by the pride which I have in you in [your union with] Christ Jesus our Lord, I die daily [I face death and die to self]. '
  '32':
  - type: text
    content: 'What good has it done me if, [merely] from a human point of view, I '
  - type: note
    content: This may refer figuratively to the furious crowd that rose up against Paul in Ephesus, rather than to literal animals (Acts 19:23-41).
  - type: text
    content: 'fought with wild animals at Ephesus? If the dead are not raised [at all], '
  - type: heading
    content: let us eat and drink
  - type: text
    content: ' [enjoying ourselves now], '
  - type: heading
    content: for tomorrow we die
  - type: text
    content: '. [Is 22:13; 2 Cor 1:8, 9] '
  '33':
  - type: text
    content: 'Do not be deceived: '
  - type: note
    content: Paul quotes this one verse maxim from the writings of the Greek dramatist Menander (342-291 b.c.). “Bad company” in this case undoubtedly refers to the teachers who were denying the truth of the resurrection.
  - type: text
    content: '“Bad company corrupts good morals.” '
  '34':
  - type: text
    content: Be sober-minded [be sensible, wake up from your spiritual stupor] as you ought, and stop sinning; for some [of you] have no knowledge of God [you are disgracefully ignorant of Him, and ignore His truths]. I say this to your shame.
  '35':
  - type: text
    content: 'But someone will say, “How are the dead raised? And with what kind of body will they come?” '
  '36':
  - type: text
    content: 'You fool! Every time you plant '
  - type: text
    content: seed
  - type: text
    content: ' you sow something that does not come to life [germinating, springing up and growing] unless it '
  - type: text
    content: first
  - type: text
    content: ' dies. '
  '37':
  - type: text
    content: 'The seed you sow is not the body (the plant) which it is going to become, but it is a bare seed, perhaps of wheat or some other grain. '
  '38':
  - type: text
    content: 'But God gives it a body just as He planned, and to each kind of seed a body of its own [is given]. [Gen 1:11] '
  '39':
  - type: text
    content: 'All flesh is not the same. There is one kind for humans, another for animals, another for birds, and another for fish. '
  '4':
  - type: text
    content: 'and that He was buried, and that He was [bodily] raised on the third day according to [that which] the Scriptures [foretold], [Ps 16:9, 10] '
  '40':
  - type: text
    content: 'There are also heavenly bodies [sun, moon and stars] and earthly bodies [humans, animals, and plants], but the glory '
  - type: text
    content: and
  - type: text
    content: ' beauty of the heavenly is one kind, and the '
  - type: text
    content: glory
  - type: text
    content: ' of the earthly is another. '
  '41':
  - type: text
    content: 'There is a glory '
  - type: text
    content: and
  - type: text
    content: ' beauty of the sun, another glory of the moon, and yet another [distinctive] glory of the stars; and one star differs from another in glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance.'
  '42':
  - type: text
    content: 'So it is with the resurrection of the dead. The [human] body that is sown is perishable '
  - type: text
    content: and
  - type: text
    content: ' mortal, it is raised imperishable '
  - type: text
    content: and
  - type: text
    content: ' immortal. [Dan 12:3] '
  '43':
  - type: text
    content: 'It is sown in dishonor, it is raised in glory; it is sown in weakness, it is raised in strength; '
  '44':
  - type: text
    content: 'it is sown a natural body [mortal, suited to earth], it is raised a spiritual body [immortal, suited to heaven]. As surely as there is a physical body, there is also a spiritual '
  - type: text
    content: body
  - type: text
    content: '. '
  '45':
  - type: text
    content: 'So it is written [in Scripture], “The first '
  - type: heading
    content: man
  - type: text
    content: ', Adam, '
  - type: heading
    content: became a living soul
  - type: text
    content: ' (an individual);” the last Adam (Christ) '
  - type: text
    content: became
  - type: text
    content: ' a life-giving spirit [restoring the dead to life]. [Gen 2:7] '
  '46':
  - type: text
    content: 'However, the spiritual [the immortal life] is not first, but the physical [the mortal life]; then the spiritual. '
  '47':
  - type: text
    content: 'The first man [Adam] is from the earth, earthy [made of dust]; the second Man [Christ, the Lord] is from heaven. [Gen 2:7] '
  '48':
  - type: text
    content: 'As is the earthly man [the man of dust], so are those who are of earth; and as is the heavenly [Man], so are those who are of heaven. '
  '49':
  - type: text
    content: 'Just as we have borne the image of the earthly [the man of dust], '
  - type: note
    content: Two early mss read “let us also.”
  - type: text
    content: we will also bear the image of the heavenly [the Man of heaven].
  - type: heading
    content: The Mystery of Resurrection
  '5':
  - type: text
    content: 'and that He appeared to Cephas (Peter), then to the '
  - type: note
    content: A title referring to the original disciples chosen by Jesus (including Judas). A few hours after betraying Jesus, Judas committed suicide (Matt 27:5) leaving only the eleven (Matt 28:16; Mark 16:14; Luke 24:9, 33).
  - type: text
    content: 'Twelve. '
  '50':
  - type: text
    content: 'Now I say this, believers, that flesh and blood cannot inherit '
  - type: text
    content: nor
  - type: text
    content: ' be part of the kingdom of God; nor does the perishable (mortal) inherit the imperishable (immortal). '
  '51':
  - type: text
    content: 'Listen very carefully, I tell you a mystery [a secret truth decreed by God and previously hidden, but now revealed]; we will not all sleep [in death], but we will all be [completely] changed [wondrously transformed], '
  '52':
  - type: text
    content: 'in a moment, in the twinkling of an eye, at [the sound of] the last trumpet call. For a trumpet will sound, and the dead [who believed in Christ] will be raised imperishable, and we will be [completely] changed [wondrously transformed]. '
  '53':
  - type: text
    content: 'For this perishable [part of us] must put on the imperishable [nature], and this mortal [part of us that is capable of dying] must put on immortality [which is freedom from death]. '
  '54':
  - type: text
    content: And when this perishable puts on the imperishable, and this mortal puts on immortality, then the Scripture will be fulfilled that says, “D
  - type: heading
    content: eath is swallowed up
  - type: text
    content: ' in victory (vanquished forever). [Is 25:8] '
  '55':
  - type: text
    content: 'O '
  - type: heading
    content: death
  - type: text
    content: ', '
  - type: heading
    content: where is your victory
  - type: text
    content: '? O '
  - type: heading
    content: death
  - type: text
    content: ', '
  - type: heading
    content: where is your sting
  - type: text
    content: '?” [Hos 13:14] '
  '56':
  - type: text
    content: 'The sting of death is sin, and the power of sin [by which it brings death] is the law; '
  '57':
  - type: text
    content: but thanks be to God, who gives us the victory [as conquerors] through our Lord Jesus Christ.
  '58':
  - type: text
    content: 'Therefore, my beloved brothers and sisters, be steadfast, immovable, always excelling in the work of the Lord [always doing your best and doing more than is needed], being '
  - type: text
    content: continually
  - type: text
    content: ' aware that your labor [even to the point of exhaustion] in the Lord is not futile '
  - type: text
    content: nor
  - type: text
    content: ' wasted [it is never without purpose].'
  '6':
  - type: text
    content: 'After that He appeared to more than five hundred brothers and sisters at one time, the majority of whom are still alive, but some have fallen asleep [in death]. '
  '7':
  - type: text
    content: 'Then He was seen by James, then by all the apostles, '
  '8':
  - type: text
    content: 'and last of all, as to one '
  - type: note
    content: Paul’s life-changing encounter with the resurrected Christ occurred on the road to Damascus (Acts 9).
  - type: text
    content: 'untimely (prematurely, traumatically) born, He appeared to me also. [Acts 9:1-9] '
  '9':
  - type: text
    content: 'For I am the least [worthy] of the apostles, and not fit to be called an apostle, because I [at one time] fiercely oppressed '
  - type: text
    content: and
  - type: text
    content: ' violently persecuted the church of God. '
