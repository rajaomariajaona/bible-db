document_id: LEV.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Guilt Offerings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew, ch 5 numbering continues on through v 7.
    marker-yv: yv-n
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “When anyone sins and acts unfaithfully against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' by deceiving his neighbor (companion, associate) in regard to a deposit or a security entrusted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to him
  - type: text
    text: ', or through robbery, or if he has extorted from his neighbor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'or has found what was lost and lied about it and sworn falsely, so that he sins in regard to any one of the things a man may do— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'then if he has sinned and is guilty, he shall restore what he took by robbery, or what he got by extortion, or the deposit which was entrusted to him, or the lost thing which he found, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'or anything about which he has sworn falsely; he shall not only restore it in full, but shall add to it one-fifth more. He shall give it to the one to whom it belongs on the day of his guilt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then he shall bring to the priest his guilt offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', a ram without blemish from the flock, as valued by you, as a guilt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The priest shall make atonement for him before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and he will be forgiven for any one of the things which he may have done to incur guilt.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Priest’s Part in the Offerings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew, this is v 1 of ch 6.
    marker-yv: yv-n
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Command Aaron and his sons, saying, ‘This is the law of the burnt offering: the burnt offering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall remain
  - type: text
    text: ' on the hearth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that is
  - type: text
    text: ' on the altar all night until morning and the fire is to be kept burning on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The priest is to put on his linen robe, with his linen undergarments next to his body. Then he shall take up the ashes of the burnt offering which the fire has consumed on the altar and put them beside the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then he shall take off his garments and put on something else, and take the ashes outside the camp to a (ceremonially) clean place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The fire on the altar shall be kept burning; it shall not [be allowed to] go out. The priest shall burn wood on it every morning, and he shall arrange the burnt offering on it and offer the fat portions of the peace offerings up in smoke on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The fire shall be burning continually on the altar; it shall not [be allowed to] go out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '‘Now this is the law of the grain offering: the sons of Aaron shall present it before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in front of the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'One of them shall take up from it a handful of the fine flour of the grain offering with its oil and all the incense that is on the grain offering, and he shall offer it up in smoke on the altar, a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing aroma, as the memorial offering to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'What is left of it Aaron and his sons are to eat. It shall be eaten as unleavened bread in a holy place; they are to eat it in the courtyard of the Tent of Meeting. [1 Cor 9:13, 14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'It shall not be baked with leaven [which represents corruption or sin]. I have given it as their share of My offerings by fire; it is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: holy of holies,
      - type: text
        text: ' a common way to express the superlative “most holy.”'
    marker-yv: yv-n
  - type: text
    text: 'most holy, like the sin offering and the guilt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Every male among the sons of Aaron may eat it [as his share]; it is a permanent ordinance throughout your generations, from offerings by fire to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Anyone who
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Whatever touches them will become consecrated (ceremonially clean).’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “This is the offering which Aaron and his sons are to present to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' on the day when he is anointed: the tenth of an ephah of fine flour as a regular grain offering, half of it in the morning and half of it in the evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'It shall be prepared with oil on a griddle. When it is well stirred, you shall bring it. You shall present the grain offering in baked pieces as a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing aroma to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The priest from among the sons of Aaron who is anointed in his place shall offer it. By a permanent statute it shall be entirely offered up in smoke to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So every grain offering of the priest shall be burned entirely. It shall not be eaten.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Speak to Aaron and his sons, saying, ‘This is the law of the sin offering: the sin offering shall be killed before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in the [same] place where the burnt offering is killed; it is most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The priest who offers it for sin shall eat it. It shall be eaten in a holy place, in the courtyard of the Tent of Meeting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Anyone who
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Whatever touches its meat will become consecrated (ceremonially clean). When any of its blood splashes on a garment, you shall wash what was splashed on in a holy place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Also the earthenware vessel in which it was boiled shall be broken; and if it was boiled in a bronze vessel, then that vessel shall be scoured and rinsed in water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Every male among the priests may eat this offering; it is most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But no sin offering from which any of the blood is brought into the Tent of Meeting to make atonement in the Holy Place shall be eaten; it shall be [completely] burned in the fire. [Heb 13:11-13]
