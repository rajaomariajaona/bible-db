document_id: LEV.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Guilt Offerings
  - type: text
    content: ' '
  - type: note
    content: In Hebrew, ch 5 numbering continues on through v 7.
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'The priest is to put on his linen robe, with his linen undergarments next to his body. Then he shall take up the ashes of the burnt offering which the fire has consumed on the altar and put them beside the altar. '
  '11':
  - type: text
    content: 'Then he shall take off his garments and put on something else, and take the ashes outside the camp to a (ceremonially) clean place. '
  '12':
  - type: text
    content: 'The fire on the altar shall be kept burning; it shall not [be allowed to] go out. The priest shall burn wood on it every morning, and he shall arrange the burnt offering on it and offer the fat portions of the peace offerings up in smoke on it. '
  '13':
  - type: text
    content: The fire shall be burning continually on the altar; it shall not [be allowed to] go out.
  '14':
  - type: text
    content: '‘Now this is the law of the grain offering: the sons of Aaron shall present it before the L'
  - type: heading
    content: ord
  - type: text
    content: ' in front of the altar. '
  '15':
  - type: text
    content: 'One of them shall take up from it a handful of the fine flour of the grain offering with its oil and all the incense that is on the grain offering, and he shall offer it up in smoke on the altar, a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma, as the memorial offering to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'What is left of it Aaron and his sons are to eat. It shall be eaten as unleavened bread in a holy place; they are to eat it in the courtyard of the Tent of Meeting. [1 Cor 9:13, 14] '
  '17':
  - type: text
    content: 'It shall not be baked with leaven [which represents corruption or sin]. I have given it as their share of My offerings by fire; it is '
  - type: note
    content: Lit holy of holies, a common way to express the superlative “most holy.”
  - type: text
    content: 'most holy, like the sin offering and the guilt offering. '
  '18':
  - type: text
    content: Every male among the sons of Aaron may eat it [as his share]; it is a permanent ordinance throughout your generations, from offerings by fire to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  - type: note
    content: Or Anyone who.
  - type: text
    content: Whatever touches them will become consecrated (ceremonially clean).’ ”
  '19':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '2':
  - type: text
    content: “When anyone sins and acts unfaithfully against the L
  - type: heading
    content: ord
  - type: text
    content: ' by deceiving his neighbor (companion, associate) in regard to a deposit or a security entrusted '
  - type: text
    content: to him
  - type: text
    content: ', or through robbery, or if he has extorted from his neighbor, '
  '20':
  - type: text
    content: “This is the offering which Aaron and his sons are to present to the L
  - type: heading
    content: ord
  - type: text
    content: ' on the day when he is anointed: the tenth of an ephah of fine flour as a regular grain offering, half of it in the morning and half of it in the evening. '
  '21':
  - type: text
    content: 'It shall be prepared with oil on a griddle. When it is well stirred, you shall bring it. You shall present the grain offering in baked pieces as a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '22':
  - type: text
    content: The priest from among the sons of Aaron who is anointed in his place shall offer it. By a permanent statute it shall be entirely offered up in smoke to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '23':
  - type: text
    content: So every grain offering of the priest shall be burned entirely. It shall not be eaten.”
  '24':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '25':
  - type: text
    content: '“Speak to Aaron and his sons, saying, ‘This is the law of the sin offering: the sin offering shall be killed before the L'
  - type: heading
    content: ord
  - type: text
    content: ' in the [same] place where the burnt offering is killed; it is most holy. '
  '26':
  - type: text
    content: 'The priest who offers it for sin shall eat it. It shall be eaten in a holy place, in the courtyard of the Tent of Meeting. '
  '27':
  - type: note
    content: Or Anyone who.
  - type: text
    content: 'Whatever touches its meat will become consecrated (ceremonially clean). When any of its blood splashes on a garment, you shall wash what was splashed on in a holy place. '
  '28':
  - type: text
    content: 'Also the earthenware vessel in which it was boiled shall be broken; and if it was boiled in a bronze vessel, then that vessel shall be scoured and rinsed in water. '
  '29':
  - type: text
    content: 'Every male among the priests may eat this offering; it is most holy. '
  '3':
  - type: text
    content: 'or has found what was lost and lied about it and sworn falsely, so that he sins in regard to any one of the things a man may do— '
  '30':
  - type: text
    content: But no sin offering from which any of the blood is brought into the Tent of Meeting to make atonement in the Holy Place shall be eaten; it shall be [completely] burned in the fire. [Heb 13:11-13]
  '4':
  - type: text
    content: 'then if he has sinned and is guilty, he shall restore what he took by robbery, or what he got by extortion, or the deposit which was entrusted to him, or the lost thing which he found, '
  '5':
  - type: text
    content: 'or anything about which he has sworn falsely; he shall not only restore it in full, but shall add to it one-fifth more. He shall give it to the one to whom it belongs on the day of his guilt offering. '
  '6':
  - type: text
    content: Then he shall bring to the priest his guilt offering to the L
  - type: heading
    content: ord
  - type: text
    content: ', a ram without blemish from the flock, as valued by you, as a guilt offering. '
  '7':
  - type: text
    content: The priest shall make atonement for him before the L
  - type: heading
    content: ord
  - type: text
    content: ', and he will be forgiven for any one of the things which he may have done to incur guilt.”'
  - type: heading
    content: The Priest’s Part in the Offerings
  '8':
  - type: text
    content: ' '
  - type: note
    content: In Hebrew, this is v 1 of ch 6.
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '9':
  - type: text
    content: '“Command Aaron and his sons, saying, ‘This is the law of the burnt offering: the burnt offering '
  - type: text
    content: shall remain
  - type: text
    content: ' on the hearth '
  - type: text
    content: that is
  - type: text
    content: ' on the altar all night until morning and the fire is to be kept burning on the altar. '
