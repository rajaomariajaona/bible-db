document_id: JOB.32,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu Rebukes Job
  - type: text
    content: 'So these three men ceased answering Job, because he was righteous in his own eyes [and could not be persuaded otherwise by them]. '
  '10':
  - type: text
    content: “Therefore I say, ‘Listen to me;
  - type: text
    content: 'I also will give you my opinion [about Job’s situation] '
  - type: text
    content: and
  - type: text
    content: ' tell you plainly what I think.’'
  '11':
  - type: text
    content: ¶“You see, I waited for your words,
  - type: text
    content: I listened to your [wise] reasons,
  - type: text
    content: 'While you pondered '
  - type: text
    content: and
  - type: text
    content: ' searched out what to say.'
  '12':
  - type: text
    content: “I even paid close attention to [what] you [said],
  - type: text
    content: Indeed, not one of you convinced Job [nor could you refute him],
  - type: text
    content: Not one of you supplied [satisfactory] answers to his words.
  '13':
  - type: text
    content: “Beware if you say,
  - type: text
    content: ‘We have found wisdom;
  - type: text
    content: God thrusts Job down [justly], not man [for God alone is dealing with him].’
  '14':
  - type: text
    content: “Now Job has not directed his words against me [therefore I have no reason to be offended],
  - type: text
    content: Nor will I answer him with arguments like yours. [I speak for truth, not for revenge.]
  '15':
  - type: text
    content: '¶“They (Job’s friends) are dismayed '
  - type: text
    content: and
  - type: text
    content: ' embarrassed, they no longer answer;'
  - type: text
    content: 'The words have moved away '
  - type: text
    content: and
  - type: text
    content: ' failed them,” [says Elihu].'
  '16':
  - type: text
    content: “And shall I wait, because they say nothing,
  - type: text
    content: But stand still and say no more?
  '17':
  - type: text
    content: “I too will give my share of answers;
  - type: text
    content: 'I too will express my opinion '
  - type: text
    content: and
  - type: text
    content: ' share my knowledge.'
  '18':
  - type: text
    content: “For I am full of words;
  - type: text
    content: The spirit within me constrains me.
  '19':
  - type: text
    content: “My belly is like unvented wine;
  - type: text
    content: Like new wineskins it is about to burst.
  '2':
  - type: text
    content: 'But Elihu the son of Barachel the Buzite, of the family of Ram, became indignant. His indignation was kindled '
  - type: text
    content: and
  - type: text
    content: ' burned '
  - type: text
    content: and
  - type: text
    content: ' he became upset with Job because he justified himself rather than God [and even expressed doubts about God’s character]. '
  '20':
  - type: text
    content: “I must speak so that I may get relief;
  - type: text
    content: I will open my lips and answer.
  '21':
  - type: text
    content: “I will not [I warn you] be partial to any man [that is, let my respect for you mitigate what I say];
  - type: text
    content: Nor flatter any man.
  '22':
  - type: text
    content: “For I do not know how to flatter, [in an appropriate way, and I fear that],
  - type: text
    content: My Maker would soon take me away.
  '3':
  - type: text
    content: 'Elihu’s anger burned against Job’s three friends because they had found no answer [and were unable to determine Job’s error], and yet they had condemned Job '
  - type: text
    content: and
  - type: text
    content: ' declared him to be in the wrong [and responsible for his own afflictions]. '
  '4':
  - type: text
    content: 'Now Elihu had waited to speak to Job because the others were years older than he. '
  '5':
  - type: text
    content: And when Elihu saw that there was no answer in the mouths of these three men, he burned with anger.
  '6':
  - type: text
    content: Then Elihu the son of Barachel the Buzite said,
  - type: text
    content: “I am young, and you are aged;
  - type: text
    content: For that reason I was anxious and dared not tell you what I think.
  '7':
  - type: text
    content: “I thought age should speak,
  - type: text
    content: And a multitude of years should teach wisdom.
  '8':
  - type: text
    content: “But there is [a vital force and] a spirit [of intelligence] in man,
  - type: text
    content: And the breath of the Almighty gives them understanding. [Prov 2:6]
  '9':
  - type: text
    content: '“Those [who are] abundant '
  - type: text
    content: in years
  - type: text
    content: ' may not [always] be wise,'
  - type: text
    content: Nor may the elders [always] understand justice.
