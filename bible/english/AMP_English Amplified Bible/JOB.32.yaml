document_id: JOB.32,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Elihu Rebukes Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'So these three men ceased answering Job, because he was righteous in his own eyes [and could not be persuaded otherwise by them]. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Therefore I say, ‘Listen to me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I also will give you my opinion [about Job’s situation] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tell you plainly what I think.’'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶“You see, I waited for your words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I listened to your [wise] reasons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'While you pondered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' searched out what to say.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “I even paid close attention to [what] you [said],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, not one of you convinced Job [nor could you refute him],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not one of you supplied [satisfactory] answers to his words.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Beware if you say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘We have found wisdom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God thrusts Job down [justly], not man [for God alone is dealing with him].’
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Now Job has not directed his words against me [therefore I have no reason to be offended],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will I answer him with arguments like yours. [I speak for truth, not for revenge.]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '¶“They (Job’s friends) are dismayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' embarrassed, they no longer answer;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The words have moved away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' failed them,” [says Elihu].'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “And shall I wait, because they say nothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But stand still and say no more?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “I too will give my share of answers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I too will express my opinion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' share my knowledge.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “For I am full of words;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The spirit within me constrains me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “My belly is like unvented wine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like new wineskins it is about to burst.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But Elihu the son of Barachel the Buzite, of the family of Ram, became indignant. His indignation was kindled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' burned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he became upset with Job because he justified himself rather than God [and even expressed doubts about God’s character]. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “I must speak so that I may get relief;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will open my lips and answer.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “I will not [I warn you] be partial to any man [that is, let my respect for you mitigate what I say];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor flatter any man.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “For I do not know how to flatter, [in an appropriate way, and I fear that],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My Maker would soon take me away.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Elihu’s anger burned against Job’s three friends because they had found no answer [and were unable to determine Job’s error], and yet they had condemned Job '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' declared him to be in the wrong [and responsible for his own afflictions]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now Elihu had waited to speak to Job because the others were years older than he. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And when Elihu saw that there was no answer in the mouths of these three men, he burned with anger.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then Elihu the son of Barachel the Buzite said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am young, and you are aged;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that reason I was anxious and dared not tell you what I think.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “I thought age should speak,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a multitude of years should teach wisdom.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “But there is [a vital force and] a spirit [of intelligence] in man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the breath of the Almighty gives them understanding. [Prov 2:6]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Those [who are] abundant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in years
    - type: text
      text: ' may not [always] be wise,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor may the elders [always] understand justice.
