document_id: GEN.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abraham’s Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abraham took another wife, whose name was Keturah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'She gave birth to Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jokshan was the father of Sheba and Dedan. The sons of Dedan were Asshurim, Letushim, and Leummim. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The sons of Midian were Ephah, Epher, Hanoch, Abida, and Eldaah. All these were the sons of Keturah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now Abraham gave '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As the legal firstborn, Isaac was entitled to at least a double share of his father’s estate.
    marker-yv: yv-n
  - type: text
    text: 'everything that he had to Isaac; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but to the sons of his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 22:24.
    marker-yv: yv-n
  - type: text
    text: concubines [Hagar and Keturah], Abraham gave gifts while he was still living and he sent them to the east country, away from Isaac his son [of promise].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The days of Abraham’s life were a hundred and seventy-five years. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Abraham breathed his last and he died at a good old age, an old man who was satisfied [with life]; and he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This expression is a reference to the Old Testament belief in a life after death and to the expectation of a reunion with loved ones.
    marker-yv: yv-n
  - type: text
    text: 'was gathered to his people [who had preceded him in death]. [Gen 15:15; Heb 11:13-16] '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So his sons '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaac was seventy-five and Ishmael nearly ninety years of age when their father died. Jacob and Esau were fifteen, and may have been present.
    marker-yv: yv-n
  - type: text
    text: 'Isaac and Ishmael buried him in the cave of Machpelah, in the field of Ephron the son of Zohar the Hittite, which is east of Mamre, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'the field which Abraham purchased from the sons of Heth; there Abraham was buried with Sarah his wife. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Now after the death of Abraham, God blessed his son Isaac; and Isaac lived at Beer-lahai-roi.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Descendants of Ishmael
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: these are the generations of
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'these are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the records of
  - type: text
    text: ' the descendants of Ishmael, Abraham’s son, whom Hagar the Egyptian, Sarah’s maid, bore to Abraham; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and these are the names of the [twelve] sons of Ishmael, named in the order of their births: Nebaioth, the firstborn of Ishmael, and Kedar, Adbeel, Mibsam, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mishma, Dumah, Massa, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hadad, Tema, Jetur, Naphish, and Kedemah. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These are the sons of Ishmael and these are their names, by their settlements, and by their encampments (sheepfolds); twelve princes (sheiks) according to their tribes. [Foretold in Gen 17:20] '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ishmael lived a hundred and thirty-seven years; then he breathed his last and died, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 8.
    marker-yv: yv-n
  - type: text
    text: 'was gathered to his people [who had preceded him in death]. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ishmael’s sons (descendants) settled from Havilah to Shur which is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: before
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'east of Egypt as one goes toward Assyria; he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fell over against his brothers
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'settled '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in defiance
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: opposite (east) of all his relatives.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Isaac’s Sons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now these are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the records of
  - type: text
    text: ' the descendants of Isaac, Abraham’s son: Abraham was the father of Isaac. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Isaac was forty years old when he married Rebekah, the daughter of Bethuel the Aramean (Syrian) of Paddan-aram, the sister of Laban the Aramean. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Isaac prayed to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for his wife, because she was unable to conceive children; and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' granted his prayer and Rebekah his wife conceived [twins]. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But the children struggled together within her [kicking and shoving one another]; and she said, “If it is so [that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has heard our prayer], why then am I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this way?”
  - type: text
    text: ' So she went to inquire of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [praying for an answer]. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to her,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “[The founders of] two nations are in your womb;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the separation of two nations has begun in your body;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one people shall be stronger than the other;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the older shall serve the younger.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When her days to be delivered were fulfilled, behold, there were twins in her womb. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The first came out reddish all over like a hairy garment; and they named him Esau (hairy). '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Afterward his brother came out, and his hand grasped Esau’s heel, so he was named Jacob (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Another meaning may be '
      - type: usfm
        marker: it
        children:
        - type: text
          text: protect,
      - type: text
        text: ' i.e. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: may God protect.
    marker-yv: yv-n
  - type: text
    text: one who grabs by the heel, supplanter). Isaac was sixty years old when Rebekah gave birth to them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When the boys grew up, Esau was an able '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skilled hunter, a man of the outdoors, but Jacob was a quiet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peaceful man, living in tents. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now Isaac loved [and favored] Esau, because '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: game was in his mouth
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'he enjoyed eating his game, but Rebekah loved [and favored] Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jacob had cooked [reddish-brown lentil] stew [one day], when Esau came from the field and was famished; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'and Esau said to Jacob, “Please, let me have a quick swallow of that red stuff there, because I am exhausted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' famished.” For that reason Esau was [also] called Edom (Red). '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jacob answered, “First sell me your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In later times, this was the right of the firstborn to take over as head of the family and to receive a double share of the inheritance (cf Deut 21:17). The rewards given to Jacob appear to have been even greater (Gen 27:37). Furthermore, in Jewish tradition it was reported that before the tabernacle was set up, sacrifices were offered by the firstborn of a family.
    marker-yv: yv-n
  - type: text
    text: 'birthright (the rights of a firstborn).” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Esau said, “Look, I am about to die [if I do not eat soon]; so of what use is this birthright to me?” '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jacob said, “Swear [an oath] to me today [that you are selling it to me for this food]”; so he swore [an oath] to him, and sold him his birthright. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Then Jacob gave Esau bread and lentil stew; and he ate and drank, and got up and went on his way. In this way Esau scorned his birthright. [Heb 12:15-17]
