verses:
  '1':
  - type: heading
    content: Abraham’s Death
  - type: text
    content: 'Abraham took another wife, whose name was Keturah. '
  '10':
  - type: text
    content: 'the field which Abraham purchased from the sons of Heth; there Abraham was buried with Sarah his wife. '
  '11':
  - type: text
    content: Now after the death of Abraham, God blessed his son Isaac; and Isaac lived at Beer-lahai-roi.
  - type: heading
    content: Descendants of Ishmael
  '12':
  - type: text
    content: 'Now '
  - type: note
    content: Lit these are the generations of.
  - type: text
    content: 'these are '
  - type: text
    content: the records of
  - type: text
    content: ' the descendants of Ishmael, Abraham’s son, whom Hagar the Egyptian, Sarah’s maid, bore to Abraham; '
  '13':
  - type: text
    content: 'and these are the names of the [twelve] sons of Ishmael, named in the order of their births: Nebaioth, the firstborn of Ishmael, and Kedar, Adbeel, Mibsam, '
  '14':
  - type: text
    content: 'Mishma, Dumah, Massa, '
  '15':
  - type: text
    content: 'Hadad, Tema, Jetur, Naphish, and Kedemah. '
  '16':
  - type: text
    content: 'These are the sons of Ishmael and these are their names, by their settlements, and by their encampments (sheepfolds); twelve princes (sheiks) according to their tribes. [Foretold in Gen 17:20] '
  '17':
  - type: text
    content: 'Ishmael lived a hundred and thirty-seven years; then he breathed his last and died, and '
  - type: note
    content: See note v 8.
  - type: text
    content: 'was gathered to his people [who had preceded him in death]. '
  '18':
  - type: text
    content: 'Ishmael’s sons (descendants) settled from Havilah to Shur which is '
  - type: note
    content: Lit before.
  - type: text
    content: 'east of Egypt as one goes toward Assyria; he '
  - type: note
    content: Lit fell over against his brothers.
  - type: text
    content: 'settled '
  - type: note
    content: Or in defiance.
  - type: text
    content: opposite (east) of all his relatives.
  - type: heading
    content: Isaac’s Sons
  '19':
  - type: text
    content: 'Now these are '
  - type: text
    content: the records of
  - type: text
    content: ' the descendants of Isaac, Abraham’s son: Abraham was the father of Isaac. '
  '2':
  - type: text
    content: 'She gave birth to Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. '
  '20':
  - type: text
    content: 'Isaac was forty years old when he married Rebekah, the daughter of Bethuel the Aramean (Syrian) of Paddan-aram, the sister of Laban the Aramean. '
  '21':
  - type: text
    content: Isaac prayed to the L
  - type: heading
    content: ord
  - type: text
    content: ' for his wife, because she was unable to conceive children; and the L'
  - type: heading
    content: ord
  - type: text
    content: ' granted his prayer and Rebekah his wife conceived [twins]. '
  '22':
  - type: text
    content: But the children struggled together within her [kicking and shoving one another]; and she said, “If it is so [that the L
  - type: heading
    content: ord
  - type: text
    content: ' has heard our prayer], why then am I '
  - type: text
    content: this way?”
  - type: text
    content: ' So she went to inquire of the L'
  - type: heading
    content: ord
  - type: text
    content: ' [praying for an answer]. '
  '23':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to her,'
  - type: text
    content: “[The founders of] two nations are in your womb;
  - type: text
    content: And the separation of two nations has begun in your body;
  - type: text
    content: The one people shall be stronger than the other;
  - type: text
    content: And the older shall serve the younger.”
  '24':
  - type: text
    content: 'When her days to be delivered were fulfilled, behold, there were twins in her womb. '
  '25':
  - type: text
    content: 'The first came out reddish all over like a hairy garment; and they named him Esau (hairy). '
  '26':
  - type: text
    content: Afterward his brother came out, and his hand grasped Esau’s heel, so he was named Jacob (
  - type: note
    content: Another meaning may be protect, i.e. may God protect.
  - type: text
    content: one who grabs by the heel, supplanter). Isaac was sixty years old when Rebekah gave birth to them.
  '27':
  - type: text
    content: 'When the boys grew up, Esau was an able '
  - type: text
    content: and
  - type: text
    content: ' skilled hunter, a man of the outdoors, but Jacob was a quiet '
  - type: text
    content: and
  - type: text
    content: ' peaceful man, living in tents. '
  '28':
  - type: text
    content: 'Now Isaac loved [and favored] Esau, because '
  - type: note
    content: Lit game was in his mouth.
  - type: text
    content: 'he enjoyed eating his game, but Rebekah loved [and favored] Jacob. '
  '29':
  - type: text
    content: 'Jacob had cooked [reddish-brown lentil] stew [one day], when Esau came from the field and was famished; '
  '3':
  - type: text
    content: 'Jokshan was the father of Sheba and Dedan. The sons of Dedan were Asshurim, Letushim, and Leummim. '
  '30':
  - type: text
    content: 'and Esau said to Jacob, “Please, let me have a quick swallow of that red stuff there, because I am exhausted '
  - type: text
    content: and
  - type: text
    content: ' famished.” For that reason Esau was [also] called Edom (Red). '
  '31':
  - type: text
    content: 'Jacob answered, “First sell me your '
  - type: note
    content: In later times, this was the right of the firstborn to take over as head of the family and to receive a double share of the inheritance (cf Deut 21:17). The rewards given to Jacob appear to have been even greater (Gen 27:37). Furthermore, in Jewish tradition it was reported that before the tabernacle was set up, sacrifices were offered by the firstborn of a family.
  - type: text
    content: 'birthright (the rights of a firstborn).” '
  '32':
  - type: text
    content: 'Esau said, “Look, I am about to die [if I do not eat soon]; so of what use is this birthright to me?” '
  '33':
  - type: text
    content: 'Jacob said, “Swear [an oath] to me today [that you are selling it to me for this food]”; so he swore [an oath] to him, and sold him his birthright. '
  '34':
  - type: text
    content: Then Jacob gave Esau bread and lentil stew; and he ate and drank, and got up and went on his way. In this way Esau scorned his birthright. [Heb 12:15-17]
  '4':
  - type: text
    content: 'The sons of Midian were Ephah, Epher, Hanoch, Abida, and Eldaah. All these were the sons of Keturah. '
  '5':
  - type: text
    content: 'Now Abraham gave '
  - type: note
    content: As the legal firstborn, Isaac was entitled to at least a double share of his father’s estate.
  - type: text
    content: 'everything that he had to Isaac; '
  '6':
  - type: text
    content: 'but to the sons of his '
  - type: note
    content: See note 22:24.
  - type: text
    content: concubines [Hagar and Keturah], Abraham gave gifts while he was still living and he sent them to the east country, away from Isaac his son [of promise].
  '7':
  - type: text
    content: 'The days of Abraham’s life were a hundred and seventy-five years. '
  '8':
  - type: text
    content: 'Then Abraham breathed his last and he died at a good old age, an old man who was satisfied [with life]; and he '
  - type: note
    content: This expression is a reference to the Old Testament belief in a life after death and to the expectation of a reunion with loved ones.
  - type: text
    content: 'was gathered to his people [who had preceded him in death]. [Gen 15:15; Heb 11:13-16] '
  '9':
  - type: text
    content: 'So his sons '
  - type: note
    content: Isaac was seventy-five and Ishmael nearly ninety years of age when their father died. Jacob and Esau were fifteen, and may have been present.
  - type: text
    content: 'Isaac and Ishmael buried him in the cave of Machpelah, in the field of Ephron the son of Zohar the Hittite, which is east of Mamre, '
