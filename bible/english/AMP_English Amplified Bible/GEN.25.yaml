        text: Abraham’s Death
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham took another wife, whose name was Keturah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the field which Abraham purchased from the sons of Heth; there Abraham was buried with Sarah his wife. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now after the death of Abraham, God blessed his son Isaac; and Isaac lived at Beer-lahai-roi.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Ishmael
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: these are the generations of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'these are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the records of
    - type: text
      text: ' the descendants of Ishmael, Abraham’s son, whom Hagar the Egyptian, Sarah’s maid, bore to Abraham; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and these are the names of the [twelve] sons of Ishmael, named in the order of their births: Nebaioth, the firstborn of Ishmael, and Kedar, Adbeel, Mibsam, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mishma, Dumah, Massa, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadad, Tema, Jetur, Naphish, and Kedemah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the sons of Ishmael and these are their names, by their settlements, and by their encampments (sheepfolds); twelve princes (sheiks) according to their tribes. [Foretold in Gen 17:20] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ishmael lived a hundred and thirty-seven years; then he breathed his last and died, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note v 8.
      marker-yv: yv-n
    - type: text
      text: 'was gathered to his people [who had preceded him in death]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ishmael’s sons (descendants) settled from Havilah to Shur which is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: before
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'east of Egypt as one goes toward Assyria; he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
