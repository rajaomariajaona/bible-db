document_id: GEN.43
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Return to Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the famine was very severe in the land [of Canaan]. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And it happened that when the families of Jacob’s sons had finished eating [all of] the grain which they had brought from Egypt, their father said to them, “Go again, buy us a little food.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Judah said to him, “The man [representing Pharaoh] solemnly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sternly warned us, saying, ‘You will not see my face [again] unless your brother is with you.’ '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'If you will send our brother with us, we will go down [to Egypt] and buy you food. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if you will not send him, we will not go down there; for the man said to us, ‘You will not see my face unless your brother is with you.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Israel (Jacob) said, “Why did you treat me so badly by telling the man that you had '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another
  - type: text
    text: ' brother?” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they said, “The man asked us straightforward questions about ourselves and our relatives. He said, ‘Is your father still alive? Have you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another
  - type: text
    text: ' brother?’ And we '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: told him upon the mouth of these words
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'answered him accordingly. How could we possibly know that he would say, ‘Bring your brother down [here to Egypt]’? ” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Judah said to Israel his father, “Send the young man with me and we will get up and go [buy food], so that we may live and not die [of starvation], we as well as you and our little ones. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I will be security (a guarantee) for him; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: from my hand you shall require him
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'you may hold me [personally] responsible for him. If I do not bring him [back] to you and place him [safely] before you, then let me bear the blame before you forever. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For if we had not delayed like this, surely by now we would have returned the second time.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then their father Israel said to them, “If '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it must be
  - type: text
    text: ' so, then do this; take some of the choicest products of the land in your sacks, and carry it as a present [of tribute] to the man [representing Pharaoh], a little balm and a little honey, aromatic spices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' gum, resin, pistachio nuts, and almonds. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Take double the [amount of] money with you, and take back the money that was returned in the opening of your sacks; perhaps it was an oversight. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Take your brother [Benjamin] also, and get up, and go to the man; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and may '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El Shaddai
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'God Almighty grant you compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor before the man, so that he will release to you your other brother [Simeon] and Benjamin. And as for me, if I am bereaved of my children [Joseph, Simeon, and Benjamin], I am bereaved.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then the men took the present, and they took double the [amount of] money with them, and Benjamin; then they left and went down to Egypt and stood before Joseph.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joseph Sees Benjamin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When Joseph saw Benjamin with them, he said to the steward of his house, “Bring the men into the house, and kill an animal and make [a meal] ready; for the men will dine with me at noon.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So the man did as Joseph said, and brought the men to Joseph’s house. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The men were afraid, because they were brought to Joseph’s house; and [expecting the worst] they said, “It is because of the money that was returned in our sacks the first time [we came] that we are being brought in, so that he may find a reason to accuse us and assail us, and take us as slaves, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: seize
  - type: text
    text: ' our donkeys.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So they approached the steward of Joseph’s house, and talked with him at the entrance of the house, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and said, “Oh, my lord, we indeed came down here the first time to buy food; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and when we arrived at the inn [after leaving here], we opened our sacks and there was each man’s money [with which he had paid for grain], in full, returned in the mouth of his sack. So we have brought it back [this time]. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'We have also brought down with us additional money to buy food; we do not know who put our money [back] in our sacks [last time].” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But the steward [encouraged them and] said, “Peace be to you, do not be afraid; your God and the God of your father has [miraculously] given you treasure in your sacks. I [already] had your money [which you paid to us].” Then he brought Simeon out to them. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the steward brought the men into Joseph’s house and gave them water, and they washed [the dust off] their feet; and he gave their donkeys feed. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So they prepared the present [of tribute] for Joseph before his arrival at noon; for they had heard that they were to eat a meal there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When Joseph came home, they brought into the house to him the present [of tribute] which they had with them and bowed to the ground before him. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He asked them about their well-being, and said, “Is your old father well, of whom you spoke? Is he still alive?” '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And they answered, “Your servant our father is in good health; he is still alive.” And they bowed down [their heads before Joseph] in respect. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And he looked up and saw his brother Benjamin, his mother’s [only other] son, and said, “Is this your youngest brother, of whom you spoke to me?” And Joseph said, “God be gracious to you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' show you favor, my son.” '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Joseph hurried out [of the room] because his heart was deeply touched over his brother, and he sought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: privacy
  - type: text
    text: ' to weep; so he entered his chamber and wept there. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then he washed his face and came out, and, restraining himself, said, “Let the meal be served.” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So the servants served Joseph by himself [in honor of his rank], and his brothers by themselves, and the Egyptians who ate with him by themselves, because [according to custom] the Egyptians could not eat food with the Hebrews, for that is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an abomination, a violation of holiness or distinction.
    marker-yv: yv-n
  - type: text
    text: 'loathsome to the Egyptians. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now Joseph’s brothers were seated [by the steward] before him [in the order of their birth]—the firstborn according to his birthright and the youngest according to his youth; and the men looked at one another in astonishment [because so much was known about them]. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Joseph selected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sent portions to them from his own table, but Benjamin’s portion was five times as much as any of theirs. So they feasted and drank freely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' celebrated with him.'
