document_id: PRO.17,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Contrast the Upright and the Wicked
  - type: text
    content: 'Better is a dry morsel [of food served] with quietness '
  - type: text
    content: and
  - type: text
    content: ' peace'
  - type: text
    content: 'Than a house full of feasting [served] with strife '
  - type: text
    content: and
  - type: text
    content: ' contention.'
  '10':
  - type: text
    content: 'A reprimand goes deeper into one who has understanding '
  - type: text
    content: and
  - type: text
    content: ' a teachable spirit'
  - type: text
    content: Than a hundred lashes into a fool. [Is 32:6]
  '11':
  - type: text
    content: A rebellious man seeks only evil;
  - type: text
    content: Therefore a cruel messenger will be sent against him.
  '12':
  - type: text
    content: Let a man meet a [ferocious] bear robbed of her cubs
  - type: text
    content: Rather than the [angry, narcissistic] fool in his folly. [Hos 13:8]
  '13':
  - type: text
    content: Whoever returns evil for good,
  - type: text
    content: Evil will not depart from his house. [Ps 109:4, 5; Jer 18:20]
  '14':
  - type: text
    content: The beginning of strife is like letting out water [as from a small break in a dam; first it trickles and then it gushes];
  - type: text
    content: 'Therefore '
  - type: note
    content: The ancient rabbis derived from this statement the principle of seeking a settlement before a case comes to court (cf Matt 5:25; Luke 12:58).
  - type: text
    content: 'abandon the quarrel before it breaks out '
  - type: text
    content: and
  - type: text
    content: ' tempers explode.'
  '15':
  - type: text
    content: He who justifies the wicked, and he who condemns the righteous
  - type: text
    content: Are both repulsive to the L
  - type: heading
    content: ord
  - type: text
    content: . [Ex 23:7; Prov 24:24; Is 5:23]
  '16':
  - type: text
    content: Why is there money in the hand of a fool to buy wisdom,
  - type: text
    content: 'When he has no common sense '
  - type: text
    content: or
  - type: text
    content: ' even a heart for it?'
  '17':
  - type: text
    content: A friend loves at all times,
  - type: text
    content: And a brother is born for adversity.
  '18':
  - type: text
    content: A man lacking common sense gives a pledge
  - type: text
    content: And becomes guarantor [for the debt of another] in the presence of his neighbor.
  '19':
  - type: text
    content: 'He who loves transgression loves strife '
  - type: text
    content: and
  - type: text
    content: ' is quarrelsome;'
  - type: text
    content: He who [proudly] raises his gate seeks destruction [because of his arrogant pride].
  '2':
  - type: text
    content: 'A wise servant will rule over the [unworthy] son who acts shamefully '
  - type: text
    content: and
  - type: text
    content: ' brings disgrace [to the family]'
  - type: text
    content: And [the worthy servant] will share in the inheritance among the brothers.
  '20':
  - type: text
    content: He who has a crooked mind finds no good,
  - type: text
    content: And he who is perverted in his language falls into evil. [James 3:8]
  '21':
  - type: text
    content: He who becomes the parent of a fool [who is spiritually blind] does so to his sorrow,
  - type: text
    content: And the father of a fool [who is spiritually blind] has no joy.
  '22':
  - type: text
    content: 'A happy heart is good medicine '
  - type: text
    content: and
  - type: text
    content: ' a joyful mind causes healing,'
  - type: text
    content: But a broken spirit dries up the bones. [Prov 12:25; 15:13, 15]
  '23':
  - type: text
    content: A wicked man receives a bribe from the [hidden] pocket
  - type: text
    content: To pervert the ways of justice.
  '24':
  - type: text
    content: '[Skillful and godly] wisdom is in the presence of a person of understanding [and he recognizes it],'
  - type: text
    content: But the eyes of a [thickheaded] fool are on the ends of the earth.
  '25':
  - type: text
    content: 'A foolish son is a grief '
  - type: text
    content: and
  - type: text
    content: ' anguish to his father'
  - type: text
    content: And bitterness to her who gave birth to him.
  '26':
  - type: text
    content: It is also not good to fine the righteous,
  - type: text
    content: Nor to strike the noble for their uprightness.
  '27':
  - type: text
    content: 'He who has knowledge restrains '
  - type: text
    content: and
  - type: text
    content: ' is careful with his words,'
  - type: text
    content: 'And a man of understanding '
  - type: text
    content: and
  - type: text
    content: ' wisdom has a cool spirit (self-control, an even temper). [James 1:19]'
  '28':
  - type: text
    content: Even a [callous, arrogant] fool, when he keeps silent, is considered wise;
  - type: text
    content: 'When he closes his lips he is regarded as sensible (prudent, discreet) '
  - type: text
    content: and
  - type: text
    content: ' a man of understanding.'
  '3':
  - type: text
    content: The refining pot is for silver and the furnace for gold,
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' tests hearts. [Ps 26:2; Prov 27:21; Jer 17:10; Mal 3:3]'
  '4':
  - type: text
    content: An evildoer listens closely to wicked lips;
  - type: text
    content: 'And a liar pays attention to a destructive '
  - type: text
    content: and
  - type: text
    content: ' malicious tongue.'
  '5':
  - type: text
    content: Whoever mocks the poor taunts his Maker,
  - type: text
    content: And he who rejoices at [another’s] disaster will not go unpunished. [Job 31:29; Prov 14:31; Obad 12]
  '6':
  - type: text
    content: Grandchildren are the crown of aged men,
  - type: text
    content: And the glory of children is their fathers [who live godly lives]. [Ps 127:3; 128:3]
  '7':
  - type: text
    content: Excellent speech does not benefit a fool [who is spiritually blind],
  - type: text
    content: 'Much less do lying lips '
  - type: text
    content: benefit
  - type: text
    content: ' a prince.'
  '8':
  - type: text
    content: A bribe is like a bright, precious stone in the eyes of its owner;
  - type: text
    content: Wherever he turns, he prospers.
  '9':
  - type: text
    content: 'He who covers '
  - type: text
    content: and
  - type: text
    content: ' forgives an offense seeks love,'
  - type: text
    content: 'But he who repeats '
  - type: text
    content: or
  - type: text
    content: ' gossips about a matter separates intimate friends.'
