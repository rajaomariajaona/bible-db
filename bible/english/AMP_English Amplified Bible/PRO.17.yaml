document_id: PRO.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Contrast the Upright and the Wicked
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Better is a dry morsel [of food served] with quietness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peace'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Than a house full of feasting [served] with strife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contention.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A wise servant will rule over the [unworthy] son who acts shamefully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brings disgrace [to the family]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [the worthy servant] will share in the inheritance among the brothers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The refining pot is for silver and the furnace for gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' tests hearts. [Ps 26:2; Prov 27:21; Jer 17:10; Mal 3:3]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: An evildoer listens closely to wicked lips;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And a liar pays attention to a destructive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' malicious tongue.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Whoever mocks the poor taunts his Maker,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who rejoices at [another’s] disaster will not go unpunished. [Job 31:29; Prov 14:31; Obad 12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Grandchildren are the crown of aged men,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the glory of children is their fathers [who live godly lives]. [Ps 127:3; 128:3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Excellent speech does not benefit a fool [who is spiritually blind],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Much less do lying lips '
  - type: usfm
    marker: it
    children:
    - type: text
      text: benefit
  - type: text
    text: ' a prince.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A bribe is like a bright, precious stone in the eyes of its owner;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wherever he turns, he prospers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He who covers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forgives an offense seeks love,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he who repeats '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' gossips about a matter separates intimate friends.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A reprimand goes deeper into one who has understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a teachable spirit'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Than a hundred lashes into a fool. [Is 32:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A rebellious man seeks only evil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore a cruel messenger will be sent against him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let a man meet a [ferocious] bear robbed of her cubs
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rather than the [angry, narcissistic] fool in his folly. [Hos 13:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Whoever returns evil for good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Evil will not depart from his house. [Ps 109:4, 5; Jer 18:20]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The beginning of strife is like letting out water [as from a small break in a dam; first it trickles and then it gushes];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient rabbis derived from this statement the principle of seeking a settlement before a case comes to court (cf Matt 5:25; Luke 12:58).
    marker-yv: yv-n
  - type: text
    text: 'abandon the quarrel before it breaks out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tempers explode.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He who justifies the wicked, and he who condemns the righteous
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are both repulsive to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [Ex 23:7; Prov 24:24; Is 5:23]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Why is there money in the hand of a fool to buy wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When he has no common sense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' even a heart for it?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A friend loves at all times,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a brother is born for adversity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A man lacking common sense gives a pledge
- type: usfm
  marker: q1
  children:
  - type: text
    text: And becomes guarantor [for the debt of another] in the presence of his neighbor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He who loves transgression loves strife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is quarrelsome;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who [proudly] raises his gate seeks destruction [because of his arrogant pride].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He who has a crooked mind finds no good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who is perverted in his language falls into evil. [James 3:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: He who becomes the parent of a fool [who is spiritually blind] does so to his sorrow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the father of a fool [who is spiritually blind] has no joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A happy heart is good medicine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a joyful mind causes healing,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a broken spirit dries up the bones. [Prov 12:25; 15:13, 15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A wicked man receives a bribe from the [hidden] pocket
- type: usfm
  marker: q1
  children:
  - type: text
    text: To pervert the ways of justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '[Skillful and godly] wisdom is in the presence of a person of understanding [and he recognizes it],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the eyes of a [thickheaded] fool are on the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A foolish son is a grief '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anguish to his father'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And bitterness to her who gave birth to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: It is also not good to fine the righteous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor to strike the noble for their uprightness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He who has knowledge restrains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is careful with his words,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And a man of understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wisdom has a cool spirit (self-control, an even temper). [James 1:19]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Even a [callous, arrogant] fool, when he keeps silent, is considered wise;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When he closes his lips he is regarded as sensible (prudent, discreet) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a man of understanding.'
