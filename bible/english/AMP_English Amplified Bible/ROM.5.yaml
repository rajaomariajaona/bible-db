verses:
  '1':
  - type: heading
    content: Results of Justification
  - type: text
    content: 'Therefore, since we have been justified [that is, acquitted of sin, declared blameless before God] by faith, [let us grasp the fact that] we have peace with God [and the joy of reconciliation with Him] through our Lord Jesus Christ (the Messiah, the Anointed). '
  '10':
  - type: text
    content: 'For if while we were enemies we were reconciled to God through the death of His Son, '
  - type: text
    content: it is
  - type: text
    content: ' much more '
  - type: text
    content: certain,
  - type: text
    content: ' having been reconciled, that we will be saved [from the consequences of sin] by His life [that is, we will be saved because Christ lives today]. '
  '11':
  - type: text
    content: 'Not only that, but we also rejoice in God [rejoicing in His love and perfection] through our Lord Jesus Christ, through whom we have now received '
  - type: text
    content: and
  - type: text
    content: ' enjoy our reconciliation [with God]. [Jer 9:24]'
  '12':
  - type: text
    content: 'Therefore, just as sin came into the world through one man, and death through sin, so death spread to all people [no one being able to stop it or escape its power], because they all sinned. '
  '13':
  - type: text
    content: 'Sin was [committed] in the world before the Law [was given], but sin is not charged [against anyone] when there is no law [against it]. '
  '14':
  - type: text
    content: 'Yet death ruled [over mankind] from Adam to Moses [the Lawgiver], even over those who had not sinned '
  - type: note
    content: Lit in the likeness of Adam’s transgression.
  - type: text
    content: as Adam did. Adam is a type of Him (Christ) who was to come [but in reverse—Adam brought destruction, Christ brought salvation]. [Gen 5:5; 7:22; Deut 34:5]
  '15':
  - type: text
    content: 'But the free gift [of God] is not like the trespass [because the gift of grace overwhelms the fall of man]. For if many died by one man’s trespass [Adam’s sin], much more [abundantly] did God’s grace and the gift [that comes] by the grace of the one Man, Jesus Christ, overflow to [benefit] the many. '
  '16':
  - type: text
    content: 'Nor is the gift [of grace] like '
  - type: text
    content: that which came
  - type: text
    content: ' through the one who sinned. For on the one hand the judgment [following the sin] '
  - type: text
    content: resulted
  - type: text
    content: ' from one trespass and brought condemnation, but on the other hand the free gift '
  - type: text
    content: resulted
  - type: text
    content: ' from many trespasses and brought justification [the release from sin’s penalty for those who believe]. '
  '17':
  - type: text
    content: 'For if by the trespass of the one (Adam), death reigned through the one (Adam), much more '
  - type: text
    content: surely
  - type: text
    content: ' will those who receive the abundance of grace and the free gift of righteousness reign in [eternal] life through the One, Jesus Christ.'
  '18':
  - type: text
    content: 'So then as through one trespass [Adam’s sin] there resulted condemnation for all men, even so through one act of righteousness there resulted justification of life to '
  - type: note
    content: Salvation is available to all people who respond and place their personal trust in Christ.
  - type: text
    content: 'all men. '
  '19':
  - type: text
    content: 'For just as through one man’s disobedience [his failure to hear, his carelessness] the many were made sinners, so through the obedience of the one Man the many will be made righteous '
  - type: text
    content: and
  - type: text
    content: ' acceptable to God '
  - type: text
    content: and
  - type: text
    content: ' brought into right standing with Him. '
  '2':
  - type: text
    content: 'Through Him we also have access by faith into this [remarkable state of] grace in which we [firmly and safely and securely] stand. Let us rejoice in our '
