  - type: text
    content: 'hope '
  - type: text
    content: and
  - type: text
    content: ' the confident assurance of [experiencing and enjoying] the glory of [our great] God [the manifestation of His excellence and power]. '
  '20':
  - type: text
    content: 'But the Law came to increase '
  - type: text
    content: and
  - type: text
    content: ' expand [the awareness of] the trespass [by defining and unmasking sin]. But where sin increased, [God’s remarkable, gracious gift of] grace [His unmerited favor] has surpassed it '
  - type: text
    content: and
  - type: text
    content: ' increased all the more, '
  '21':
  - type: text
    content: so that, as sin reigned in death, so also grace would reign through righteousness which brings eternal life through Jesus Christ our Lord.
  '3':
  - type: text
    content: 'And not only '
  - type: text
