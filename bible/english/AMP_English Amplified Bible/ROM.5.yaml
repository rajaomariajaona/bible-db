document_id: ROM.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Results of Justification
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore, since we have been justified [that is, acquitted of sin, declared blameless before God] by faith, [let us grasp the fact that] we have peace with God [and the joy of reconciliation with Him] through our Lord Jesus Christ (the Messiah, the Anointed). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Through Him we also have access by faith into this [remarkable state of] grace in which we [firmly and safely and securely] stand. Let us rejoice in our '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the NT the word “hope” expresses a cherished desire along with the confident assurance of obtaining that which is longed for.
    marker-yv: yv-n
  - type: text
    text: 'hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the confident assurance of [experiencing and enjoying] the glory of [our great] God [the manifestation of His excellence and power]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And not only '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this,
  - type: text
    text: ' but [with joy] let us exult in our sufferings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejoice in our hardships, knowing that hardship (distress, pressure, trouble) produces patient endurance; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and endurance, proven character (spiritual maturity); and proven character, hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident assurance [of eternal salvation]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Such hope [in God’s promises] never disappoints '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us,
  - type: text
    text: ' because God’s love has been abundantly poured out within our hearts through the Holy Spirit who was given to us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'While we were still helpless [powerless to provide for our salvation], at the right time Christ died [as a substitute] for the ungodly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now it is an extraordinary thing for one to willingly give his life even for an upright man, though perhaps for a good man [one who is noble and selfless and worthy] someone might even dare to die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But God clearly shows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proves His own love for us, by the fact that while we were still sinners, Christ died for us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Therefore, since we have now been justified [declared free of the guilt of sin] by His blood, [how much more certain is it that] we will be saved from the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “wrath of God,” with the definite article in Greek, anticipates the outpouring of God’s wrath on rebellious sinners in the tribulation period (cf Rev 6:16, 17).
    marker-yv: yv-n
  - type: text
    text: 'wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of God
  - type: text
    text: ' through Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For if while we were enemies we were reconciled to God through the death of His Son, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it is
  - type: text
    text: ' much more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: certain,
  - type: text
    text: ' having been reconciled, that we will be saved [from the consequences of sin] by His life [that is, we will be saved because Christ lives today]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Not only that, but we also rejoice in God [rejoicing in His love and perfection] through our Lord Jesus Christ, through whom we have now received '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enjoy our reconciliation [with God]. [Jer 9:24]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore, just as sin came into the world through one man, and death through sin, so death spread to all people [no one being able to stop it or escape its power], because they all sinned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Sin was [committed] in the world before the Law [was given], but sin is not charged [against anyone] when there is no law [against it]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Yet death ruled [over mankind] from Adam to Moses [the Lawgiver], even over those who had not sinned '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in the likeness of Adam’s transgression
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: as Adam did. Adam is a type of Him (Christ) who was to come [but in reverse—Adam brought destruction, Christ brought salvation]. [Gen 5:5; 7:22; Deut 34:5]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the free gift [of God] is not like the trespass [because the gift of grace overwhelms the fall of man]. For if many died by one man’s trespass [Adam’s sin], much more [abundantly] did God’s grace and the gift [that comes] by the grace of the one Man, Jesus Christ, overflow to [benefit] the many. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nor is the gift [of grace] like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that which came
  - type: text
    text: ' through the one who sinned. For on the one hand the judgment [following the sin] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: resulted
  - type: text
    text: ' from one trespass and brought condemnation, but on the other hand the free gift '
  - type: usfm
    marker: it
    children:
    - type: text
      text: resulted
  - type: text
    text: ' from many trespasses and brought justification [the release from sin’s penalty for those who believe]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For if by the trespass of the one (Adam), death reigned through the one (Adam), much more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: surely
  - type: text
    text: ' will those who receive the abundance of grace and the free gift of righteousness reign in [eternal] life through the One, Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So then as through one trespass [Adam’s sin] there resulted condemnation for all men, even so through one act of righteousness there resulted justification of life to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Salvation is available to all people who respond and place their personal trust in Christ.
    marker-yv: yv-n
  - type: text
    text: 'all men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For just as through one man’s disobedience [his failure to hear, his carelessness] the many were made sinners, so through the obedience of the one Man the many will be made righteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acceptable to God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brought into right standing with Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the Law came to increase '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expand [the awareness of] the trespass [by defining and unmasking sin]. But where sin increased, [God’s remarkable, gracious gift of] grace [His unmerited favor] has surpassed it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' increased all the more, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: so that, as sin reigned in death, so also grace would reign through righteousness which brings eternal life through Jesus Christ our Lord.
