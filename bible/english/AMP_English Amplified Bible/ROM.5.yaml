  '5':
  - type: text
    content: 'Such hope [in God’s promises] never disappoints '
  - type: text
    content: us,
  - type: text
    content: ' because God’s love has been abundantly poured out within our hearts through the Holy Spirit who was given to us.'
  '6':
  - type: text
    content: 'While we were still helpless [powerless to provide for our salvation], at the right time Christ died [as a substitute] for the ungodly. '
  '7':
  - type: text
    content: 'Now it is an extraordinary thing for one to willingly give his life even for an upright man, though perhaps for a good man [one who is noble and selfless and worthy] someone might even dare to die. '
  '8':
  - type: text
    content: 'But God clearly shows '
  - type: text
    content: and
  - type: text
    content: ' proves His own love for us, by the fact that while we were still sinners, Christ died for us. '
