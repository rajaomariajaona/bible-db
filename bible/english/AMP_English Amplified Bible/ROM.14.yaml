document_id: ROM.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Principles of Conscience
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Jewish believers may have struggled with abandoning all the old requirements of the Law regarding eating things considered unclean, while some Gentile believers may have been overly sensitive to anything associated with paganism, such as eating meat offered to idols.
    marker-yv: yv-n
  - type: text
    text: 'one whose faith is weak, accept him [into your fellowship], but not for [the purpose of] quarreling over his opinions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'One man’s faith permits him to eat everything, while the weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: believer
  - type: text
    text: ' eats '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' vegetables [to avoid eating ritually unclean meat or something previously considered unclean]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The one who eats [everything] is not to look down on the one who does not eat, and the one who does not eat must not criticize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pass judgment on the one who eats [everything], for God has accepted him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who are you to judge the servant of another? Before his own master he stands [approved] or falls [out of favor]. And he [who serves the Master—the Lord] will stand, for the Lord is able to make him stand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'One person regards one day as better [or more important] than another, while another regards every day [the same as any other]. Let everyone be fully convinced (assured, satisfied) in his own mind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He who observes the day, observes it for the Lord. He who eats, eats for the Lord, since he gives thanks to God; while he who abstains, abstains for the Lord and gives thanks to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'None of us lives for himself [for his own benefit, but for the Lord], and none of us dies for himself [but for the Lord]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If we live, we live for the Lord, and if we die, we die for the Lord. So then, whether we live or die, we are the Lord’s. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For Christ died and lived again for this reason, that He might be Lord of both the dead and the living.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But you, why do you criticize your brother? Or you again, why do you look down on your [believing] brother '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' regard him with contempt? For we will all stand before the judgment seat of God [who alone is judge]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For it is written [in Scripture],
- type: usfm
  marker: q1
  children:
  - type: text
    text: “A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' I '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: live
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: says the
  - type: text
    text: ' L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: every knee shall bow to
  - type: text
    text: ' M'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: e
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd every tongue shall give praise to
  - type: text
    text: ' G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .” [Is 45:23]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So then, each of us will give an account of himself to God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then let us not criticize one another anymore, but rather determine this—not to put an obstacle or a stumbling block '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a source of temptation in another believer’s way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I know and am convinced [as one] in the Lord Jesus that nothing is unclean [ritually defiled, and unholy] in itself; but [nonetheless] it is unclean to anyone who thinks it is unclean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'If your brother is being hurt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' offended because of food [that you insist on eating], you are no longer walking in love [toward him]. Do not let what you eat destroy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spiritually harm one for whom Christ died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore do not let what is a good thing for you [because of your freedom to choose] be spoken of as evil [by someone else]; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'for the kingdom of God is not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a matter of
  - type: text
    text: ' eating and drinking [what one likes], but of righteousness and peace and joy in the Holy Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For the one who serves Christ in this way [recognizing that food choice is secondary] is acceptable to God and is approved by men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So then, let us pursue [with enthusiasm] the things which make for peace and the building up of one another [things which lead to spiritual growth]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Do not, for the sake of food, tear down the work of God. All things indeed are [ceremonially] clean, but they are wrong for the person who eats and offends [another’s conscience in the process]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'It is good to [do the right thing and] not eat meat or drink wine, or do anything that offends your brother '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weakens him spiritually. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The faith which you have [that gives you freedom of choice], have as your own conviction before God [just keep it between yourself and God, seeking His will]. Happy is he who has no reason to condemn himself for what he approves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But he who is uncertain [about eating a particular thing] is condemned if he eats, because he is not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: acting
  - type: text
    text: ' from faith. Whatever is not from faith is sin [whatever is done with doubt is sinful].'
