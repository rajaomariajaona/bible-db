        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There are both military and sporting analogies associated with the meaning of the word “submit.” It can refer to the act of “falling in line,” i.e. each soldier reporting to his proper place; or each team member respecting how the team works, i.e. acknowledging and participating in his assigned position.
    marker-yv: yv-n
  - type: text
    text: 'submissive to your own husbands [subordinate, not as inferior, but out of respect for the responsibilities entrusted to husbands and their accountability to God, and so partnering with them] so that even if some do not obey the word [of God], they may be won over [to Christ] without discussion by the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: godly
  - type: text
    text: ' lives of their wives, [Eph 5:22] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'when they see your modest and respectful behavior [together with your devotion and appreciation—love your husband, encourage him, and enjoy him as a blessing from God]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Your adornment must not be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: merely
  - type: text
    text: ' external—with interweaving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' elaborate knotting of the hair, and wearing gold jewelry, or [being superficially preoccupied with] dressing in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: expensive
  - type: text
    text: ' clothes; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'but let it be [the inner beauty of] the hidden person of the heart, with the imperishable quality '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unfading charm of a gentle and peaceful spirit, [one that is calm and self-controlled, not overanxious, but serene and spiritually mature] which is very precious in the sight of God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For in this way in former times the holy women, who hoped in God, used to adorn themselves, being submissive to their own husbands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adapting themselves to them; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'just as Sarah obeyed Abraham [following him and having regard for him as head of their house], calling him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In ancient times a common title of honor and respect.
    marker-yv: yv-n
  - type: text
    text: lord. And you have become her daughters if you do what is right without being frightened by any fear [that is, being respectful toward your husband but not giving in to intimidation, nor allowing yourself to be led into sin, nor to be harmed].
- type: usfm
  marker: p
  children:
  - type: usfm
