  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now who is there to hurt you if you become enthusiastic for what is good? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But even if you should suffer for the sake of righteousness [though it is not certain that you will], you are still blessed [happy, to be admired and favored by God]. D
  - type: usfm
    marker: sc
    children:
    - type: text
      text: o not be afraid of their intimidating threats
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
