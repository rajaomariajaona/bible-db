  '8':
  - type: text
    content: 'Finally, all of you be like-minded [united in spirit], sympathetic, brotherly, kindhearted [courteous and compassionate toward each other as members of one household], and humble in spirit; '
  '9':
  - type: text
    content: 'and never return evil for evil or insult for insult [avoid scolding, berating, and any kind of abuse], but on the contrary, give a blessing [pray for one another’s well-being, contentment, and protection]; for you have been called for this very purpose, that you might inherit a blessing [from God that brings well-being, happiness, and protection]. '
