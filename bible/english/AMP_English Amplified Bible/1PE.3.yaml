          text: a weaker vessel, the feminine
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'someone physically weaker, since she is a woman. Show her honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' respect as a fellow heir of the grace of life, so that your prayers will not be hindered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ineffective.'
- type: usfm
  marker: p
