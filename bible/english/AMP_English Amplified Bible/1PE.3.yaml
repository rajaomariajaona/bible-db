      text: or
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: disturbed
  - type: text
    text: ' [by their opposition]. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But in your hearts set Christ apart [as holy—acknowledging Him, giving Him first place in your lives] as Lord. Always be ready to give a [logical] defense to anyone who asks you to account for the hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident assurance [elicited by faith] that is within you, yet [do it] with gentleness and respect. [Is 8:12, 13] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And see to it that your conscience is entirely clear, so that every time you are slandered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' falsely accused, those who attack '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' disparage your good behavior in Christ will be shamed [by their own words]. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For it is better that you suffer [unjustly] for doing what is right, if that should be God’s will, than [to suffer justly] for doing wrong. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For indeed Christ died for sins once for all, the Just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Righteous for the unjust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unrighteous [the Innocent for the guilty] so that He might bring us to God, having been put to death in the flesh, but made alive in the Spirit; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'in which He also went and preached to the spirits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: now
  - type: text
    text: ' in prison, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'who once were disobedient, when the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: great
  - type: text
    text: ' patience of God was waiting in the days of Noah, during the building of the ark, in which a few, that is, eight persons [Noah’s family], were brought safely through the water. [Gen 6-8] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Corresponding to that [rescue through the flood], baptism [which is an expression of a believer’s new life in Christ] now '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Baptism is a public representation of that which actually saves the believer—one’s personal faith in the death, burial and resurrection of Jesus the Messiah.
    marker-yv: yv-n
  - type: text
    text: 'saves you, not by removing dirt from the body, but by an appeal to God for a good (clear) conscience, [demonstrating what you believe to be yours] through the resurrection of Jesus Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: who has gone into heaven and is at the right hand of God [that is, the place of honor and authority], with [all] angels and authorities and powers made subservient to Him.
