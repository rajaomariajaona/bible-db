    children:
    - type: text
      text: '7'
  - type: text
    text: 'In the same way, you husbands, live with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your wives
  - type: text
    text: ' in an understanding way [with great gentleness and tact, and with an intelligent regard for the marriage relationship], as with '
  - type: usfm
