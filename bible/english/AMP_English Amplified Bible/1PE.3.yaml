    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Finally, all of you be like-minded [united in spirit], sympathetic, brotherly, kindhearted [courteous and compassionate toward each other as members of one household], and humble in spirit; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and never return evil for evil or insult for insult [avoid scolding, berating, and any kind of abuse], but on the contrary, give a blessing [pray for one another’s well-being, contentment, and protection]; for you have been called for this very purpose, that you might inherit a blessing [from God that brings well-being, happiness, and protection]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
