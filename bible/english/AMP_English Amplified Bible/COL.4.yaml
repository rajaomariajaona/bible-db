document_id: COL.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Fellow Workers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Masters, [on your part] deal with your slaves justly and fairly, knowing that you also have a Master in heaven. [Lev 25:43, 53]
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aristarchus, my fellow prisoner, wishes to be remembered to you; as does Mark, the cousin of Barnabas (about whom you received instructions; if he comes to you, welcome him); '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and from Jesus, who is called Justus. These are the only fellow workers for the kingdom of God who are from the circumcision (Jewish Christians), and they have proved to be an encouragement '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a comfort to me. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Epaphras, who is one of you and a bond-servant of Christ Jesus, sends you greetings. [He is] always striving for you in his prayers, praying with genuine concern, [pleading] that you may [as people of character and courage] stand firm, [spiritually mature] and fully assured in all the will of God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For I testify for him that he has worked strenuously for you and for the believers in Laodicea and those in Hierapolis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Luke, the beloved physician, and Demas greet you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Give my greetings to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters at Laodicea, and to Nympha and the church that meets in her house. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When this letter has been read among you, see that it is read in the church of the Laodiceans; and also that you in turn read '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul is most likely referring to the letter he wrote to the Ephesians (see note Eph 1:1) during this same time period.
      marker-yv: yv-n
    - type: text
      text: 'my letter [that is coming to you] from Laodicea. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And say to Archippus, “See to it that you fulfill [carefully the duties of] the ministry which you have received in the Lord.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: I, Paul, write this greeting with my own hand. Remember my chains. May grace (God’s unmerited favor and blessing) be with you.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Be persistent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devoted to prayer, being alert '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' focused in your prayer life with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an attitude of
    - type: text
      text: ' thanksgiving. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'At the same time pray for us, too, that God will open a door [of opportunity] to us for the word, to proclaim the mystery of Christ, for which I have been imprisoned; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: that I may make it clear [and speak boldly and unfold the mystery] in the way I should.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Conduct yourself with wisdom in your interactions with outsiders (non-believers), make the most of each opportunity [treating it as something precious]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Let your speech at all times be gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasant, seasoned with salt, so that you will know how to answer each one [who questions you].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'As to all my affairs, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tychicus probably delivered this letter to Colossae, as well as Paul’s letter to Ephesus, while traveling on the same journey.
      marker-yv: yv-n
    - type: text
      text: 'Tychicus, who is a much-loved brother and faithful assistant and fellow bond-servant in the Lord, will give you all the information. [Eph 6:21] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I have sent him to you for this very purpose, that you may know how we are doing and that he may encourage your hearts; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and with him is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Onesimus was Philemon’s runaway slave who was converted to Christianity under Paul’s ministry.
      marker-yv: yv-n
    - type: text
      text: Onesimus, our faithful and beloved brother, who is one of you. They will let you know everything about the situation here [in Rome].
