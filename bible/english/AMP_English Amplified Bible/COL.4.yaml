document_id: COL.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Fellow Workers
  - type: text
    content: Masters, [on your part] deal with your slaves justly and fairly, knowing that you also have a Master in heaven. [Lev 25:43, 53]
  '10':
  - type: text
    content: 'Aristarchus, my fellow prisoner, wishes to be remembered to you; as does Mark, the cousin of Barnabas (about whom you received instructions; if he comes to you, welcome him); '
  '11':
  - type: text
    content: 'and from Jesus, who is called Justus. These are the only fellow workers for the kingdom of God who are from the circumcision (Jewish Christians), and they have proved to be an encouragement '
  - type: text
    content: and
  - type: text
    content: ' a comfort to me. '
  '12':
  - type: text
    content: 'Epaphras, who is one of you and a bond-servant of Christ Jesus, sends you greetings. [He is] always striving for you in his prayers, praying with genuine concern, [pleading] that you may [as people of character and courage] stand firm, [spiritually mature] and fully assured in all the will of God. '
  '13':
  - type: text
    content: 'For I testify for him that he has worked strenuously for you and for the believers in Laodicea and those in Hierapolis. '
  '14':
  - type: text
    content: 'Luke, the beloved physician, and Demas greet you. '
  '15':
  - type: text
    content: 'Give my greetings to the '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers and sisters at Laodicea, and to Nympha and the church that meets in her house. '
  '16':
  - type: text
    content: 'When this letter has been read among you, see that it is read in the church of the Laodiceans; and also that you in turn read '
  - type: note
    content: Paul is most likely referring to the letter he wrote to the Ephesians (see note Eph 1:1) during this same time period.
  - type: text
    content: 'my letter [that is coming to you] from Laodicea. '
  '17':
  - type: text
    content: And say to Archippus, “See to it that you fulfill [carefully the duties of] the ministry which you have received in the Lord.”
  '18':
  - type: text
    content: I, Paul, write this greeting with my own hand. Remember my chains. May grace (God’s unmerited favor and blessing) be with you.
  '2':
  - type: text
    content: 'Be persistent '
  - type: text
    content: and
  - type: text
    content: ' devoted to prayer, being alert '
  - type: text
    content: and
  - type: text
    content: ' focused in your prayer life with '
  - type: text
    content: an attitude of
  - type: text
    content: ' thanksgiving. '
  '3':
  - type: text
    content: 'At the same time pray for us, too, that God will open a door [of opportunity] to us for the word, to proclaim the mystery of Christ, for which I have been imprisoned; '
  '4':
  - type: text
    content: that I may make it clear [and speak boldly and unfold the mystery] in the way I should.
  '5':
  - type: text
    content: 'Conduct yourself with wisdom in your interactions with outsiders (non-believers), make the most of each opportunity [treating it as something precious]. '
  '6':
  - type: text
    content: 'Let your speech at all times be gracious '
  - type: text
    content: and
  - type: text
    content: ' pleasant, seasoned with salt, so that you will know how to answer each one [who questions you].'
  '7':
  - type: text
    content: 'As to all my affairs, '
  - type: note
    content: Tychicus probably delivered this letter to Colossae, as well as Paul’s letter to Ephesus, while traveling on the same journey.
  - type: text
    content: 'Tychicus, who is a much-loved brother and faithful assistant and fellow bond-servant in the Lord, will give you all the information. [Eph 6:21] '
  '8':
  - type: text
    content: 'I have sent him to you for this very purpose, that you may know how we are doing and that he may encourage your hearts; '
  '9':
  - type: text
    content: 'and with him is '
  - type: note
    content: Onesimus was Philemon’s runaway slave who was converted to Christianity under Paul’s ministry.
  - type: text
    content: Onesimus, our faithful and beloved brother, who is one of you. They will let you know everything about the situation here [in Rome].
