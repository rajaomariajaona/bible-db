document_id: LEV.26,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Blessings of Obedience
  - type: text
    content: ' '
  - type: note
    content: Through Moses God explains clearly how He will bless the Israelites for their faithful obedience and repeatedly emphasizes that His blessings are contingent on Israel’s responsiveness. If the Israelites want God’s blessings, they must not take Him for granted.
  - type: text
    content: '‘You shall not make idols for yourselves, nor shall you erect an image, a sacred pillar '
  - type: text
    content: or
  - type: text
    content: ' an obelisk, nor shall you place any figured stone in your land so that you may bow down to it; for I am the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '10':
  - type: text
    content: 'You will eat the old supply of [abundant] produce, and clear out the old [to make room] for the new. '
  '11':
  - type: text
    content: 'I will make My dwelling among you, and My soul will not reject '
  - type: text
    content: nor
  - type: text
    content: ' separate itself from you. '
  '12':
  - type: text
    content: 'I will walk among you and be your God, and you shall be My people. '
  '13':
  - type: text
    content: I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, who brought you out of the land of Egypt so that you would not be their slaves; and I broke the bars of your yoke and made you walk upright [with heads held high as free men].'
  - type: heading
    content: Penalties of Disobedience
  '14':
  - type: text
    content: '‘But if you do not obey Me and do not [obediently] do all these commandments, '
  '15':
  - type: text
    content: 'if, instead, you reject My statutes, and if your soul rejects My ordinances, so that you will not [obediently] do all My commandments, and in this way break My covenant, '
  '16':
  - type: text
    content: 'I, in turn, will do this to you: I will appoint over you sudden terror, consumption, and fever that will waste away the eyes and cause the soul to languish also. And you will sow your seed uselessly, for your enemies will eat what you plant. '
  '17':
  - type: text
    content: 'I will set My face against you so that '
  - type: note
    content: These verses specify the penalties for disobedience. The Scripture references indicate where the fulfillments of these prophecies are recorded. God keeps His word, whether a blessing or a judgment.
  - type: text
    content: 'you will be struck down before your enemies; those who hate you will rule over you, and you will flee when no one is pursuing you. [1 Sam 4:10; 31:1] '
  '18':
  - type: text
    content: 'If in spite of all this you still will not listen to Me '
  - type: text
    content: and
  - type: text
    content: ' be obedient, then I will punish you seven times more for your sins. '
  '19':
  - type: text
    content: 'I will break your pride in your power, and I will make your sky like iron [giving no rain and blocking all prayers] and your ground like bronze [hard to plow and yielding no produce]. [1 Kin 17:1] '
  '2':
  - type: text
    content: You shall keep My Sabbaths and have reverence for My sanctuary. I am the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '20':
  - type: text
    content: Your strength will be spent uselessly, for your land will not yield its produce and the trees of the land will not yield their fruit.
  '21':
  - type: text
    content: '‘If then, you act with hostility toward Me and are unwilling to obey Me, I will increase the plague on you seven times in accordance with your sins. '
  '22':
  - type: text
    content: 'I will let loose the [wild] animals of the field among you, which will bereave you of your children and destroy your livestock and make you so few in number that your roads will lie deserted '
  - type: text
    content: and
  - type: text
    content: ' desolate. [2 Kin 17:25, 26]'
  '23':
  - type: text
    content: '‘And if by these things you are not turned to Me, but act '
  - type: note
    content: Lit contrary to and so throughout the chapter.
  - type: text
    content: 'with hostility against Me, '
  '24':
  - type: text
    content: 'then I also will act with hostility against you, and I will strike you seven times for your sins. '
  '25':
  - type: text
    content: 'I will bring a sword on you that will execute vengeance for [breaking] the covenant; and when you gather together in your cities, I will send pestilence (virulent disease) among you, and you shall be handed over to the enemy. [Num 16:49; 2 Sam 24:15] '
  '26':
  - type: text
    content: When I break your staff of bread [that is, cut off your supply of food], ten women will bake your bread in one oven, and they will ration your bread; and you will eat and not be satisfied. [Hag 1:6]
  '27':
  - type: text
    content: '‘Yet if in spite of this you will not [attentively] listen to Me but act with hostility against me, '
  '28':
  - type: text
    content: 'then I will act with hostility against you in wrath, and I also will punish you seven times for your sins. '
  '29':
  - type: text
    content: 'You will eat the flesh of your sons and the flesh of your daughters. [2 Kin 6:28, 29] '
  '3':
  - type: text
    content: 'If you walk in My statutes and keep My commandments and [obediently] do them, '
  '30':
  - type: text
    content: 'I will destroy your high places [devoted to idolatrous worship], and cut down your incense altars, and heap your dead bodies upon the [crushed] bodies of your idols, and My soul will detest you [with deep and unutterable loathing]. [2 Kin 23:8, 20] '
  '31':
  - type: text
    content: 'I will lay waste your cities as well and will make your sanctuaries desolate, and I will not smell your sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aromas [of offerings by fire]. [2 Kin 25:4-10; 2 Chr 36:19] '
  '32':
  - type: text
    content: 'I will make the land desolate, and your enemies who settle in it will be appalled at it. '
  '33':
  - type: text
    content: I will scatter you among the nations and draw out the sword [of your enemies] after you; your land will become desolate and your cities will become ruins. [Ps 44:11-14]
  '34':
  - type: text
    content: '‘Then the land [of Israel] will enjoy its Sabbaths as long as it lies desolate, while you are in your enemies’ land; then the land will rest and enjoy its Sabbaths. '
  '35':
  - type: text
    content: 'As long as it lies desolate, it will have rest, the rest it did not have on your Sabbaths, while you were living on it. [2 Chr 36:21] '
  '36':
  - type: text
    content: 'As for those who are left of you, I will bring despair (lack of courage, weakness) into their hearts in the lands of their enemies; the sound of a scattered leaf will put them to flight, and they will flee as if [running] from the sword, and will fall even when no one is chasing them. '
  '37':
  - type: text
    content: 'They shall stumble over one another as if '
  - type: text
    content: to escape
  - type: text
    content: ' from a sword when no one is chasing them; and you will have no power to stand before your enemies. '
  '38':
  - type: text
    content: 'You will perish among the nations; the land of your enemies will consume you. '
  '39':
  - type: text
    content: Those of you who are left will rot away because of their wickedness in the lands of your enemies; also because of the wickedness of their forefathers they will rot away like them.
  '4':
  - type: text
    content: 'then I will give you rain in its season, and the land will yield her produce and the trees of the field bear their fruit. '
  '40':
  - type: text
    content: '‘If they confess their wickedness and the wickedness of their forefathers, in their unfaithfulness which they have committed against Me—and also in their acting with hostility toward Me— '
  '41':
  - type: text
    content: 'I also was acting with hostility toward them and brought them into the land of their enemies—then if their uncircumcised (sin-filled) hearts are humbled and they accept the punishment for their wickedness, [2 Kin 24:10-14; Dan 9:11-14] '
  '42':
  - type: text
    content: 'then I will remember My covenant with Jacob, and also My covenant with Isaac, and also My covenant with Abraham, and remember the land. [Ps 106:44-46] '
  '43':
  - type: text
    content: 'But the land will be abandoned by them and will enjoy its Sabbaths while it lies desolate without them; and they will accept the punishment for their wickedness '
  - type: text
    content: and
  - type: text
    content: ' make amends because they rejected My ordinances and their soul rejected My statutes. '
  '44':
  - type: text
    content: Yet in spite of this, when they are in the land of their enemies, I will not reject them, nor will I so despise them as to destroy them, breaking My covenant with them; for I am the L
  - type: heading
    content: ord
  - type: text
    content: ' their God. [Deut 4:31-35; Jer 33:4, 5, 23-26; Rom 11:2-5] '
  '45':
  - type: text
    content: But I will, for their sake, [earnestly] remember the covenant with their forefathers, whom I have brought out of the land of Egypt in the sight of the nations, that I might be their God. I am the L
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  '46':
  - type: text
    content: These are the statutes, ordinances, and laws which the L
  - type: heading
    content: ord
  - type: text
    content: ' established between Himself and the Israelites through Moses at Mount Sinai.'
  '5':
  - type: text
    content: 'And your threshing season will last until grape gathering and the grape gathering [time] will last until planting, and you will eat your bread and be filled and live securely in your land. '
  '6':
  - type: text
    content: 'I will also grant peace in the land, so that you may lie down and there will be no one to make you afraid. I will also eliminate harmful animals from the land, and no sword will pass through your land. '
  '7':
  - type: text
    content: 'And you will chase your enemies, and they will fall before you by the sword. '
  '8':
  - type: text
    content: 'Five of you will chase a hundred, and a hundred of you will put ten thousand to flight; your enemies will fall before you by the sword. '
  '9':
  - type: text
    content: 'For I will turn toward you [with favor and regard] and make you fruitful and multiply you, and I will establish '
  - type: text
    content: and
  - type: text
    content: ' confirm My covenant with you. [2 Kin 13:23] '
