      children:
      - type: text
        text: “There is no implication of envy in the ‘jealousy’ of God, but rather the boundless enthusiasm of the L
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ' which loves holiness, hates sin, brings judgment upon sinners, and intervenes on behalf of His godly ones.” Charles Feinberg, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: God Remembers
      - type: text
