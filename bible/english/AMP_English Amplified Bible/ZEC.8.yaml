document_id: ZEC.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Coming Peace and Prosperity of Zion
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts came [to me], saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For before those days there were no wages for man or animal; nor was there any peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' success for him who went out or came in because of his enemies, for I set all men against one another. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But now [in this time since you began to build] I will not treat the remnant of this people as in the former days,’ declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘For there the seed will produce peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosperity; the vine will yield its fruit, and the ground will produce its increase, and the heavens will give their dew. And I will cause the remnant of this people to inherit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' possess all these things. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And as you have been a curse among the nations, O house of Judah (Southern Kingdom) and house of Israel (Northern Kingdom), so I will save you, that you may be a blessing. Fear not; let your hands be strong.’ [Jer 22:8, 9]
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘Just as I planned to do harm to you when your fathers provoked Me to wrath,’ says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘and I did not relent, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so I have again planned in these days to do good to Jerusalem and to the house of Judah. Do not fear! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the things which you should do: speak the truth with one another; judge with truth and pronounce the judgment that brings peace in [the courts at] your gates. [Eph 4:25] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And let none of you devise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' even imagine evil in your heart against another, and do not love lying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' half-truths; for all these things I hate,’ declares the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts came to me (Zechariah), saying, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘The fast of the fourth [month to mourn the breaching of Jerusalem’s walls], the fast of the fifth [month to mourn the temple’s destruction], the fast of the seventh [month to mourn Gedaliah’s assassination], and the fast of the tenth [month to mourn the siege of Jerusalem] will become times of joy and gladness and cheerful feasts for the house of Judah; so [to bring this about] love truth and peace.’ [Jer 39:2; 2 Kin 25:1, 2, 8, 25]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘I am '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “There is no implication of envy in the ‘jealousy’ of God, but rather the boundless enthusiasm of the L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' which loves holiness, hates sin, brings judgment upon sinners, and intervenes on behalf of His godly ones.” Charles Feinberg, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: God Remembers
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'jealous for Zion with great jealousy [demanding what is rightfully and uniquely mine], and I am jealous for her with great wrath [against her enemies].’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘It will come to pass that peoples and the inhabitants of many cities will come [to Jerusalem]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The inhabitants of one [city] will go to another, saying, “Let us go at once to ask the favor of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and to seek the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. I will go also.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So many peoples and powerful nations will come to seek the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts in Jerusalem and to ask the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for His favor.’ '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘In those days ten men [as representatives] from all the nations will grasp the robe of a Jew, saying, “Let us go with you, for we have heard that God is with you.” ’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘I shall return to Zion and will dwell in the midst of Jerusalem, and Jerusalem shall be called the [faithful] City of Truth, and the mountain of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts will be called the Holy Mountain.’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘Old men and old women will again sit in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word refers to broad, spread-out spaces such as wide streets, squares, plazas, public parks, and so throughout.
      marker-yv: yv-n
    - type: text
      text: 'streets (public places) of Jerusalem, each man with his staff in his hand because of his advanced age. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the streets of the city will be filled with boys and girls playing in its streets.’ '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘If it is difficult in the eyes of the remnant of this people in those days [in which this comes to pass], will it also be difficult in My sight?’ declares the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. [Gen 18:14; Jer 32:17, 27; Luke 18:27] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘Behold, I am going to save My people from the east country and from the west, [Is 43:5, 6] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and I will bring them home and they will live in the midst of Jerusalem; and they shall be My people, and I will be their God in truth (faithfulness) and in righteousness.’
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘Let your hands be strong, you who in these days hear these words from the mouths of the prophets who, on the day that the foundation of the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts was laid, foretold that the temple might be rebuilt. '
