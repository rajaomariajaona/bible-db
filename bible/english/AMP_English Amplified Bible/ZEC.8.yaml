document_id: ZEC.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming Peace and Prosperity of Zion
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts came [to me], saying, '
  '10':
  - type: text
    content: 'For before those days there were no wages for man or animal; nor was there any peace '
  - type: text
    content: or
  - type: text
    content: ' success for him who went out or came in because of his enemies, for I set all men against one another. '
  '11':
  - type: text
    content: But now [in this time since you began to build] I will not treat the remnant of this people as in the former days,’ declares the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. '
  '12':
  - type: text
    content: '‘For there the seed will produce peace '
  - type: text
    content: and
  - type: text
    content: ' prosperity; the vine will yield its fruit, and the ground will produce its increase, and the heavens will give their dew. And I will cause the remnant of this people to inherit '
  - type: text
    content: and
  - type: text
    content: ' possess all these things. '
  '13':
  - type: text
    content: And as you have been a curse among the nations, O house of Judah (Southern Kingdom) and house of Israel (Northern Kingdom), so I will save you, that you may be a blessing. Fear not; let your hands be strong.’ [Jer 22:8, 9]
  '14':
  - type: text
    content: “For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘Just as I planned to do harm to you when your fathers provoked Me to wrath,’ says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘and I did not relent, '
  '15':
  - type: text
    content: 'so I have again planned in these days to do good to Jerusalem and to the house of Judah. Do not fear! '
  '16':
  - type: text
    content: 'These are the things which you should do: speak the truth with one another; judge with truth and pronounce the judgment that brings peace in [the courts at] your gates. [Eph 4:25] '
  '17':
  - type: text
    content: 'And let none of you devise '
  - type: text
    content: or
  - type: text
    content: ' even imagine evil in your heart against another, and do not love lying '
  - type: text
    content: or
  - type: text
    content: ' half-truths; for all these things I hate,’ declares the L'
  - type: heading
    content: ord
  - type: text
    content: .”
  '18':
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts came to me (Zechariah), saying, '
  '19':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘The fast of the fourth [month to mourn the breaching of Jerusalem’s walls], the fast of the fifth [month to mourn the temple’s destruction], the fast of the seventh [month to mourn Gedaliah’s assassination], and the fast of the tenth [month to mourn the siege of Jerusalem] will become times of joy and gladness and cheerful feasts for the house of Judah; so [to bring this about] love truth and peace.’ [Jer 39:2; 2 Kin 25:1, 2, 8, 25]'
  '2':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘I am '
  - type: note
    content: “There is no implication of envy in the ‘jealousy’ of God, but rather the boundless enthusiasm of the Lord which loves holiness, hates sin, brings judgment upon sinners, and intervenes on behalf of His godly ones.” Charles Feinberg, God Remembers.
  - type: text
    content: 'jealous for Zion with great jealousy [demanding what is rightfully and uniquely mine], and I am jealous for her with great wrath [against her enemies].’ '
  '20':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘It will come to pass that peoples and the inhabitants of many cities will come [to Jerusalem]. '
  '21':
  - type: text
    content: The inhabitants of one [city] will go to another, saying, “Let us go at once to ask the favor of the L
  - type: heading
    content: ord
  - type: text
    content: ' and to seek the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. I will go also.” '
  '22':
  - type: text
    content: So many peoples and powerful nations will come to seek the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts in Jerusalem and to ask the L'
  - type: heading
    content: ord
  - type: text
    content: ' for His favor.’ '
  '23':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘In those days ten men [as representatives] from all the nations will grasp the robe of a Jew, saying, “Let us go with you, for we have heard that God is with you.” ’ ”'
  '3':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘I shall return to Zion and will dwell in the midst of Jerusalem, and Jerusalem shall be called the [faithful] City of Truth, and the mountain of the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts will be called the Holy Mountain.’ '
  '4':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘Old men and old women will again sit in the '
  - type: note
    content: The Hebrew word refers to broad, spread-out spaces such as wide streets, squares, plazas, public parks, and so throughout.
  - type: text
    content: 'streets (public places) of Jerusalem, each man with his staff in his hand because of his advanced age. '
  '5':
  - type: text
    content: 'And the streets of the city will be filled with boys and girls playing in its streets.’ '
  '6':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘If it is difficult in the eyes of the remnant of this people in those days [in which this comes to pass], will it also be difficult in My sight?’ declares the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. [Gen 18:14; Jer 32:17, 27; Luke 18:27] '
  '7':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘Behold, I am going to save My people from the east country and from the west, [Is 43:5, 6] '
  '8':
  - type: text
    content: and I will bring them home and they will live in the midst of Jerusalem; and they shall be My people, and I will be their God in truth (faithfulness) and in righteousness.’
  '9':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘Let your hands be strong, you who in these days hear these words from the mouths of the prophets who, on the day that the foundation of the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts was laid, foretold that the temple might be rebuilt. '
