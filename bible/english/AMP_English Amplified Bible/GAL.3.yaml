document_id: GAL.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Faith Brings Righteousness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O you foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoughtless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' superficial Galatians, who has bewitched you [that you would act like this], to whom—right before your very eyes—Jesus Christ was publicly portrayed as crucified [in the gospel message]? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This is all I want to ask of you: did you receive the [Holy] Spirit as the result of obeying [the requirements of] the Law, or was it the result of hearing [the message of salvation and] with faith [believing it]? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Are you so foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' senseless? Having begun [your new life by faith] with the Spirit, are you now being perfected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reaching spiritual maturity by the flesh [that is, by your own works and efforts to keep the Law]? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Have you suffered so many things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' experienced so much all for nothing—if indeed it was all for nothing? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So then, does He who supplies you with His [marvelous Holy] Spirit and works miracles among you, do it as a result of the works of the Law [which you perform], or because you [believe confidently in the message which you] heard with faith?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Just as Abraham '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: believed
  - type: text
    text: ' G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: and it was credited to him as righteousness
  - type: text
    text: ', [as conformity to God’s will and purpose—so it is with you also]. [Gen 15:6] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So understand that it is the people who live by faith [with confidence in the power and goodness of God] who are [the true] sons of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Abraham was justified [declared free of the guilt of sin and its penalty] and declared righteous by God on the basis of his faith alone long before the Law and the ritual of circumcision were ever given to Moses.
    marker-yv: yv-n
  - type: text
    text: 'Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The Scripture, foreseeing that God would justify the Gentiles by faith, proclaimed the good news [of the Savior] to Abraham in advance [with this promise], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' “I'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: n you shall all the nations be blessed
  - type: text
    text: '.” [Gen 12:3] '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So then those who are people of faith [whether Jew or Gentile] are blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favored by God [and declared free of the guilt of sin and its penalty, and placed in right standing with Him] along with Abraham, the believer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For all who depend on the Law [seeking justification and salvation by obedience to the Law and the observance of rituals] are under a curse; for it is written, “C
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ursed
  - type: text
    text: ' (condemned to destruction) '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: is everyone who does not abide by all things written in the book of the law
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: so as to practice them
  - type: text
    text: '.” [Deut 27:26] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Now it is clear that no one is justified [that is, declared free of the guilt of sin and its penalty, and placed in right standing] before God by the Law, for “T
  - type: usfm
    marker: sc
    children:
    - type: text
      text: he righteous
  - type: text
    text: ' (the just, the upright) '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: shall live by faith
  - type: text
    text: '.” [Hab 2:4] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the Law does not rest on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' require faith [it has nothing to do with faith], but [instead, the Law] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: says,
  - type: text
    text: ' “H'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: e who practices them
  - type: text
    text: ' [the things prescribed by the Law] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: shall live by them
  - type: text
    text: ' [instead of faith].” [Lev 18:5] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Christ purchased our freedom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' redeemed us from the curse of the Law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' its condemnation by becoming a curse for us—for it is written, “C'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ursed is everyone who hangs
  - type: text
    text: ' [crucified] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: on a tree
  - type: text
    text: ' (cross)”— [Deut 21:23] '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: in order that in Christ Jesus the blessing of Abraham might also come to the Gentiles, so that we would all receive [the realization of] the promise of the [Holy] Spirit through faith.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Intent of the Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Brothers and sisters, I speak in terms of human relations: even though a last will and testament is just a human covenant, yet when it has been signed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made legally binding, no one sets it aside or adds to it [modifying it in some way]. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now the promises [in the covenants] were decreed to Abraham and to his seed. God does not say, “And to seeds (descendants, heirs),” as if [referring] to many [persons], but as to one, “And to your Seed,” who is [none other than] Christ. [Gen 13:15; 17:8] '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This is what I mean: the Law, which came into existence four hundred and thirty years later [after the covenant concerning the coming Messiah], does not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cannot invalidate the covenant previously established by God, so as to abolish the promise. [Ex 12:40] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For if the inheritance [of what was promised] is based on [observing] the Law [as these false teachers claim], it is no longer based on a promise; however, God granted it to Abraham [as a gift] by virtue of His promise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Why, then, the Law [what was its purpose]? It was added [after the promise to Abraham, to reveal to people their guilt] because of transgressions [that is, to make people conscious of the sinfulness of sin], and [the Law] was ordained through angels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delivered to Israel by the hand of a mediator [Moses, the mediator between God and Israel, to be in effect] until the Seed would come to whom the promise had been made. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now the mediator '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' go-between [in a transaction] is not [needed] for just one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: party;
  - type: text
    text: ' whereas God is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' one [and was the only One giving the promise to Abraham, but the Law was a contract between two, God and Israel; its validity depended on both]. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Is the Law then contrary to the promises of God? Certainly not! For if a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: system of
  - type: text
    text: ' law had been given which could impart life, then righteousness (right standing with God) would actually have been based on law. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the Scripture has imprisoned '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: all things
      - type: text
        text: . Paul is probably referring to the effect of sin on the entire world. He alludes to this in Rom 8:19-22. Consider, for example, the fact that God cursed the ground itself and plant life because of the sin of Adam and Eve (Gen 3:17, 18).
    marker-yv: yv-n
  - type: text
    text: everyone [everything—the entire world] under sin, so that [the inheritance, the blessing of salvation] which was promised through faith in Jesus Christ might be given to those who believe [in Him and acknowledge Him as God’s precious Son].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now before faith came, we were kept in custody under the Law, [perpetually] imprisoned [in preparation] for the faith that was destined to be revealed, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'with the result that the Law has become our tutor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' our disciplinarian '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to guide us
  - type: text
    text: ' to Christ, so that we may be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 2:16.
    marker-yv: yv-n
  - type: text
    text: 'justified [that is, declared free of the guilt of sin and its penalty, and placed in right standing with God] by faith. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But now that faith has come, we are no longer under [the control and authority of] a tutor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disciplinarian. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For you [who are born-again have been reborn from above—spiritually transformed, renewed, sanctified and] are all children of God [set apart for His purpose with full rights and privileges] through faith in Christ Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For all of you who were baptized into Christ [into a spiritual union with the Christ, the Anointed] have clothed yourselves with Christ [that is, you have taken on His characteristics and values]. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'There is [now no distinction in regard to salvation] neither Jew nor Greek, there is neither slave nor free, there is neither male nor female; for you [who believe] are all one in Christ Jesus [no one can claim a spiritual superiority]. [Rom 3:22; 1 Cor 12:13] '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And if you belong to Christ [if you are in Him], then you are Abraham’s descendants, and [spiritual] heirs according to [God’s] promise.
