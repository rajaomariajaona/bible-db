  '14':
  - type: text
    content: in order that in Christ Jesus the blessing of Abraham might also come to the Gentiles, so that we would all receive [the realization of] the promise of the [Holy] Spirit through faith.
  - type: heading
    content: Intent of the Law
  '15':
  - type: text
    content: 'Brothers and sisters, I speak in terms of human relations: even though a last will and testament is just a human covenant, yet when it has been signed '
  - type: text
    content: and
  - type: text
    content: ' made legally binding, no one sets it aside or adds to it [modifying it in some way]. '
  '16':
  - type: text
    content: 'Now the promises [in the covenants] were decreed to Abraham and to his seed. God does not say, “And to seeds (descendants, heirs),” as if [referring] to many [persons], but as to one, “And to your Seed,” who is [none other than] Christ. [Gen 13:15; 17:8] '
  '17':
  - type: text
    content: 'This is what I mean: the Law, which came into existence four hundred and thirty years later [after the covenant concerning the coming Messiah], does not '
  - type: text
    content: and
  - type: text
    content: ' cannot invalidate the covenant previously established by God, so as to abolish the promise. [Ex 12:40] '
  '18':
  - type: text
    content: For if the inheritance [of what was promised] is based on [observing] the Law [as these false teachers claim], it is no longer based on a promise; however, God granted it to Abraham [as a gift] by virtue of His promise.
  '19':
  - type: text
    content: 'Why, then, the Law [what was its purpose]? It was added [after the promise to Abraham, to reveal to people their guilt] because of transgressions [that is, to make people conscious of the sinfulness of sin], and [the Law] was ordained through angels '
  - type: text
    content: and
  - type: text
    content: ' delivered to Israel by the hand of a mediator [Moses, the mediator between God and Israel, to be in effect] until the Seed would come to whom the promise had been made. '
  '2':
  - type: text
    content: 'This is all I want to ask of you: did you receive the [Holy] Spirit as the result of obeying [the requirements of] the Law, or was it the result of hearing [the message of salvation and] with faith [believing it]? '
  '20':
  - type: text
    content: 'Now the mediator '
  - type: text
    content: or
  - type: text
    content: ' go-between [in a transaction] is not [needed] for just one '
  - type: text
    content: party;
  - type: text
    content: ' whereas God is '
  - type: text
    content: only
  - type: text
    content: ' one [and was the only One giving the promise to Abraham, but the Law was a contract between two, God and Israel; its validity depended on both]. '
  '21':
  - type: text
    content: 'Is the Law then contrary to the promises of God? Certainly not! For if a '
  - type: text
    content: system of
  - type: text
    content: ' law had been given which could impart life, then righteousness (right standing with God) would actually have been based on law. '
  '22':
  - type: text
    content: 'But the Scripture has imprisoned '
  - type: note
    content: Lit all things. Paul is probably referring to the effect of sin on the entire world. He alludes to this in Rom 8:19-22. Consider, for example, the fact that God cursed the ground itself and plant life because of the sin of Adam and Eve (Gen 3:17, 18).
  - type: text
    content: everyone [everything—the entire world] under sin, so that [the inheritance, the blessing of salvation] which was promised through faith in Jesus Christ might be given to those who believe [in Him and acknowledge Him as God’s precious Son].
  '23':
  - type: text
    content: 'Now before faith came, we were kept in custody under the Law, [perpetually] imprisoned [in preparation] for the faith that was destined to be revealed, '
  '24':
  - type: text
    content: 'with the result that the Law has become our tutor '
  - type: text
    content: and
  - type: text
    content: ' our disciplinarian '
  - type: text
    content: to guide us
  - type: text
    content: ' to Christ, so that we may be '
  - type: note
    content: See note 2:16.
  - type: text
    content: 'justified [that is, declared free of the guilt of sin and its penalty, and placed in right standing with God] by faith. '
  '25':
  - type: text
    content: 'But now that faith has come, we are no longer under [the control and authority of] a tutor '
  - type: text
    content: and
  - type: text
    content: ' disciplinarian. '
  '26':
  - type: text
    content: 'For you [who are born-again have been reborn from above—spiritually transformed, renewed, sanctified and] are all children of God [set apart for His purpose with full rights and privileges] through faith in Christ Jesus. '
  '27':
  - type: text
    content: 'For all of you who were baptized into Christ [into a spiritual union with the Christ, the Anointed] have clothed yourselves with Christ [that is, you have taken on His characteristics and values]. '
  '28':
  - type: text
    content: 'There is [now no distinction in regard to salvation] neither Jew nor Greek, there is neither slave nor free, there is neither male nor female; for you [who believe] are all one in Christ Jesus [no one can claim a spiritual superiority]. [Rom 3:22; 1 Cor 12:13] '
  '29':
  - type: text
    content: And if you belong to Christ [if you are in Him], then you are Abraham’s descendants, and [spiritual] heirs according to [God’s] promise.
  '3':
  - type: text
    content: 'Are you so foolish '
  - type: text
    content: and
  - type: text
    content: ' senseless? Having begun [your new life by faith] with the Spirit, are you now being perfected '
  - type: text
    content: and
  - type: text
    content: ' reaching spiritual maturity by the flesh [that is, by your own works and efforts to keep the Law]? '
  '4':
  - type: text
    content: 'Have you suffered so many things '
  - type: text
    content: and
  - type: text
    content: ' experienced so much all for nothing—if indeed it was all for nothing? '
  '5':
  - type: text
    content: So then, does He who supplies you with His [marvelous Holy] Spirit and works miracles among you, do it as a result of the works of the Law [which you perform], or because you [believe confidently in the message which you] heard with faith?
  '6':
  - type: text
    content: 'Just as Abraham '
  - type: heading
    content: believed
  - type: text
    content: ' G'
  - type: heading
    content: od
  - type: text
    content: ', '
  - type: heading
    content: and it was credited to him as righteousness
  - type: text
    content: ', [as conformity to God’s will and purpose—so it is with you also]. [Gen 15:6] '
  '7':
  - type: text
    content: 'So understand that it is the people who live by faith [with confidence in the power and goodness of God] who are [the true] sons of '
  - type: note
    content: Abraham was justified [declared free of the guilt of sin and its penalty] and declared righteous by God on the basis of his faith alone long before the Law and the ritual of circumcision were ever given to Moses.
  - type: text
    content: 'Abraham. '
  '8':
  - type: text
    content: 'The Scripture, foreseeing that God would justify the Gentiles by faith, proclaimed the good news [of the Savior] to Abraham in advance [with this promise], '
  - type: text
    content: saying,
  - type: text
    content: ' “I'
  - type: heading
    content: n you shall all the nations be blessed
  - type: text
    content: '.” [Gen 12:3] '
  '9':
  - type: text
    content: 'So then those who are people of faith [whether Jew or Gentile] are blessed '
  - type: text
    content: and
  - type: text
    content: ' favored by God [and declared free of the guilt of sin and its penalty, and placed in right standing with Him] along with Abraham, the believer.'
