document_id: 2PE.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Rise of False Prophets
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But [in those days] false prophets arose among the people, just as there will be false teachers among you, who will subtly introduce destructive heresies, even denying the Master who bought them, bringing swift destruction on themselves. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Many will follow their shameful ways, and because of them the way of truth will be maligned. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' greed they will exploit you with false arguments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' twisted doctrine. Their sentence [of condemnation which God has decreed] from a time long ago is not idle [but is still in force], and their destruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deepening misery is not asleep [but is on its way].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This verse begins one of the longest sentences in the NT. The sentence concludes in v 10a.
    marker-yv: yv-n
  - type: text
    text: 'For if God did not [even] spare angels that sinned, but threw them into '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For emphasis Peter uses a word (tartarus) from Greek mythology describing a hell reserved for the most horrendous of people to emphasize the terrible doom awaiting false prophets and teachers who manipulate and twist the truth of the gospel message.
    marker-yv: yv-n
  - type: text
    text: 'hell and sent them to pits of gloom to be kept [there] for judgment; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and if He did not spare the ancient world, but protected Noah, a preacher of righteousness, with seven others, when He brought [the judgment of] a flood upon the world of the ungodly; [Gen 6-8; 1 Pet 3:20] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and if He condemned the cities of Sodom and Gomorrah to destruction by reducing them to ashes, having made them an example to those who would live ungodly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lives
  - type: text
    text: ' thereafter; [Gen 19:24] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and if He rescued righteous '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lot was the nephew of Abraham and the son of Haran. He traveled with his uncle to Canaan and eventually settled in Sodom because of its proximity to good grazing land for his flocks. Peter presents a side of Lot not easily inferred from the OT account.
    marker-yv: yv-n
  - type: text
    text: 'Lot, who was tormented by the immoral conduct of unprincipled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ungodly men [Gen 19:16, 29] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '(for that just man, while living among them, felt his righteous soul tormented day after day by what he saw and heard of their lawless acts), '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'then [in light of the fact that all this is true, be sure that] the Lord knows how to rescue the godly from trial, and how to keep the unrighteous under punishment until the day of judgment, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and especially '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the descriptions that follow, Peter may specifically have in mind the false teachers of whom he spoke in vv 1-3.
    marker-yv: yv-n
  - type: text
    text: those who indulge in the corrupt passions of the sin nature, and despise authority.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: P
  - type: text
    text: 'resumptuous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reckless, self-willed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant [creatures, despising the majesty of the Lord], they do not tremble when they revile angelic majesties, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'whereas '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' angels who are superior in might and power do not bring a reviling (defaming) accusation against them before the Lord. [Jude 8] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But these [false teachers], like unreasoning animals, [mere] creatures of instinct, born to be captured and destroyed, reviling things they do not understand, will also perish in their own corruption [in their destroying they will be destroyed], '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'suffering wrong [destined for punishment] as the wages of doing wrong. They count it a delight to revel in the daytime [living luxuriously]. They are stains and blemishes [on mankind], reveling in their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One early ms reads '
      - type: usfm
        marker: it
        children:
        - type: text
          text: love feasts
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'deceptions even as they feast with you. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They have eyes full of adultery, constantly looking for sin, enticing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' luring away unstable souls. Having hearts trained in greed, [they are] children of a curse. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Abandoning the straight road [that is, the right way to live], they have gone astray; they have followed the way of [the false teacher] Balaam the son of Beor, who loved the reward of wickedness; [Num 22:5, 7] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'but he was rebuked for his own transgression: a mute donkey spoke with a man’s voice and restrained the prophet’s madness. [Num 22:21-31]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'These [false teachers] are springs without water and mists driven by a tempest, for whom is reserved the gloom of black darkness. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For uttering arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: words
  - type: text
    text: ' of vanity [pompous words disguised to sound scholarly or profound, but meaning nothing and containing no spiritual truth], they beguile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: using
  - type: text
    text: ' lustful desires, by sensuality, those who barely escape from the ones who live in error. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They promise them liberty, when they themselves are the slaves of depravity—for by whatever anyone is defeated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overcome, to that [person, thing, philosophy, or concept] he is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' enslaved. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For if, after they have escaped the pollutions of the world by [personal] knowledge of our Lord and Savior Jesus Christ, they are again entangled in them and are overcome, their last condition has become worse for them than the first. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For it would have been better for them not to have [personally] known the way of righteousness, than to have known it and then to have turned back from the holy commandment [verbally] handed on to them. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The thing spoken of in the true proverb has happened to them, “T
  - type: usfm
    marker: sc
    children:
    - type: text
      text: he dog returns to his own vomit
  - type: text
    text: ',” and, “A sow is washed only to wallow [again] in the mire.” [Prov 26:11]'
