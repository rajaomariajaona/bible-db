    content: The Conquest of Jericho
  - type: text
    content: 'Now Jericho [a fortified city with high walls] was tightly closed because [of the people’s fear] of the sons of Israel; no one went out or came in. '
  '10':
  - type: text
    content: 'But Joshua commanded the people, “You shall not shout [the battle cry] nor let your voice be heard nor let a word come out of your mouth, until the day I tell you to shout. Then you shall shout!” '
  '11':
  - type: text
    content: So Joshua had the ark of the L
  - type: heading
    content: ord
  - type: text
    content: ' taken around the city [on the first day], circling it once; then they came back into the camp and spent the night in the camp.'
  '12':
