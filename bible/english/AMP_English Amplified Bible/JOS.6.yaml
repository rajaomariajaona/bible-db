  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Joshua, “See, I have given Jericho into your hand, with its king and the mighty warriors. '
  '20':
  - type: text
    content: 'So the people shouted [the battle cry], and the priests blew the trumpets. When the people heard the sound of the trumpet, they raised a great shout and the wall [of Jericho] fell down, so that the sons of Israel went up into the city, every man straight ahead [climbing over the rubble], and they overthrew the city. '
  '21':
  - type: text
    content: Then they utterly destroyed everything that was in the city, both man and woman, young and old, and ox and sheep and donkey, with the edge of the sword.
  '22':
  - type: text
    content: 'But Joshua said to the two men who had spied out the land, “Go into the prostitute’s house and bring the woman and all that she has out of there, as you have sworn to her.” '
  '23':
  - type: text
    content: 'So the young men, the spies, went in and brought out Rahab and her father and her mother and her brothers and everything that she had; they also brought out all her relatives and allowed them to stay outside the camp of Israel [at Gilgal during the time required for ceremonial cleansing]. [Num 31:19] '
  '24':
  - type: text
    content: Then they completely burned the city and everything that was in it. They put only the silver and the gold, and the articles of bronze and of iron, into the treasury of the house (tabernacle) of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '25':
  - type: text
    content: So Joshua spared Rahab the prostitute, with her father’s household and everything that she had; and she has lived among Israel to this day, because she hid the messengers (scouts) whom Joshua sent to spy out Jericho.
  '26':
  - type: text
    content: Then Joshua made them take an oath at that time, saying, “Cursed before the L
  - type: heading
    content: ord
  - type: text
    content: ' is the man who rises up and rebuilds this city, Jericho; with '
  - type: text
    content: the loss of
  - type: text
    content: ' his firstborn he shall lay its foundation, and with '
  - type: text
    content: the loss of
  - type: text
    content: ' his youngest son he shall set up its gates.” [1 Kin 16:34] '
  '27':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' was with Joshua, and his fame was in all the land.'
  '3':
  - type: text
    content: 'Now you shall march around the city, all the men of war circling the city once. You shall do this [once each day] for six days. '
  '4':
  - type: text
    content: 'Also, seven priests shall carry seven trumpets [made] of rams’ horns ahead of the ark; then on the seventh day you shall march around the city seven times, and the priests shall blow the trumpets. '
  '5':
  - type: text
    content: When they make a long blast with the ram’s horn, and when you hear the sound of the trumpet, all the people shall cry out with a great shout (battle cry); and the wall of the city will fall down in its place, and the people shall go up, each man [going] straight ahead [climbing over the rubble].”
  '6':
  - type: text
    content: 'So Joshua the son of Nun called for the priests and said to them, “Take up the ark of the covenant, and have seven priests carry seven trumpets '
  - type: text
    content: made
  - type: text
    content: ' of rams’ horns ahead of the ark of the L'
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '7':
  - type: text
    content: He said to the people, “Go forward! March around the city, and let the armed men go ahead of the ark of the L
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '8':
  - type: text
    content: 'And it was so, that when Joshua had spoken to the people, the seven priests carrying the seven trumpets '
  - type: text
