    - type: text
      text: Parable of Ten Virgins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Then the kingdom of heaven will be like ten virgins, who took their lamps and went to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In a procession, the bridegroom and his friends brought the bride from her father’s house to his house where the wedding feast was prepared.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: meet the bridegroom.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Five of them were foolish
  - type: text
    text: ' [thoughtless, silly, and careless], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and five were wise
  - type: text
    text: ' [far-sighted, practical, and sensible]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For when the foolish took their lamps, they did not take any
  - type: text
    text: ' [extra] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: oil with them,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but the wise took flasks of oil along with their lamps.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now while the bridegroom was delayed, they all began to nod off, and they fell asleep.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But at midnight there was a shout, ‘Look! The bridegroom
  - type: text
    text: ' [is coming]! '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Go out to meet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: .’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then all those virgins got up and put their own lamps in order
  - type: text
    text: ' [trimmed the wicks and added oil and lit them]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But the foolish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: virgins
    - type: text
      text: ' said to the wise, ‘Give us some of your oil, because our lamps are going out.’'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But the wise replied, ‘No, otherwise there will not be enough for us and for you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: too;
    - type: text
      text: ' go instead to the dealers and buy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: oil
    - type: text
      text: ' for yourselves.’'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But while they were going away to buy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: oil,
    - type: text
      text: ' the bridegroom came, and those who were ready went in with him to the wedding feast; and the door was shut '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' locked'
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Later the others also came, and said, ‘Lord, Lord, open
  - type: text
    text: ' [the door] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for us.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But He replied, ‘I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, I do not know you'
  - type: text
    text: ' [we have no relationship].’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Therefore, be on the alert
  - type: text
    text: ' [be prepared and ready], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you do not know the day nor the hour
  - type: text
    text: ' [when the Son of Man will come].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Talents
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“For it is just like a man who was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about
    - type: text
      text: ' to take a journey, and he called his servants together and entrusted them with his possessions.'
  - type: text
    text: ' [Luke 19:12-27] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'To one he gave five '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A talent was a measurement of weight, usually 58-80 pounds. One talent of silver was worth more than 15 years’ wages. One talent of gold was worth even more.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: talents, to another, two, and to another, one, each according to his own ability; and then he went on his journey.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The one who had received the five talents went at once and traded with them, and he
  - type: text
    text: ' [made a profit and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: gained five more.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Likewise the one who had two
  - type: text
    text: ' [made a profit and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: gained two more.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But the one who had received the one went and dug '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a hole
    - type: text
      text: ' in the ground and hid his master’s money.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now after a long time the master of those servants returned and settled accounts with them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And the one who had received the five talents came and brought him five more, saying, ‘Master, you entrusted to me five talents. See, I have
  - type: text
    text: ' [made a profit and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: gained five more talents.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'His master said to him, ‘Well done, good and faithful servant. You have been faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy over a little, I will put you in charge of many things; share in the joy of your master.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Also the one who had the two talents came forward, saying, ‘Master, you entrusted two talents to me. See, I have
  - type: text
    text: ' [made a profit and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: gained two more talents.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'His master said to him, ‘Well done, good and faithful servant. You have been faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy over a little, I will put you in charge of many things; share in the joy of your master.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“The one who had received one talent also came forward, saying, ‘Master, I knew you to be a harsh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' demanding man, reaping'
  - type: text
    text: ' [the harvest] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'where you did not sow and gathering where you did not scatter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So I was afraid
  - type: text
    text: ' [to lose the talent], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and I went and hid your talent in the ground. See, you have what is your own.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But his master answered him, ‘You wicked, lazy servant, you knew that I reap
  - type: text
    text: ' [the harvest] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'where I did not sow and gather where I did not scatter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then you ought to have put my money with the bankers, and at my return I would have received my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: money
    - type: text
      text: ' back with interest.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So take the talent away from him, and give it to the one who has the ten talents.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “For to everyone who has
  - type: text
    text: ' [and values his blessings and gifts from God, and has used them wisely], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: more will be given, and
  - type: text
    text: ' [he will be richly supplied so that] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he will have an abundance; but from the one who does not have
  - type: text
    text: ' [because he has ignored or disregarded his blessings and gifts from God], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even what he does have will be taken away.
  - type: text
    text: ' [Matt 13:12; Luke 19:26] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And throw out the worthless servant into the outer darkness; in that place
  - type: text
    text: ' [of grief and torment] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: there will be weeping
  - type: text
    text: ' [over sorrow and pain] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and grinding of teeth
  - type: text
    text: ' [over distress and anger].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Judgment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
