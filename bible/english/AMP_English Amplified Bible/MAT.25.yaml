      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“But when the Son of Man comes in His glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty and all the angels with Him, then He will sit on the throne of His glory.'
  - type: text
    text: ' [Rev 20:4-6] '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All the nations will be gathered before Him
  - type: text
    text: ' [for judgment]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and He will separate them from one another, as a shepherd separates his sheep from the goats;
  - type: text
    text: ' [Ezek 34:17] '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and He will put the sheep on His right
  - type: text
    text: ' [the place of honor], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the goats on His left
  - type: text
    text: ' [the place of rejection].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the King will say to those on His right, ‘Come, you blessed of My Father
  - type: text
    text: ' [you favored of God, appointed to eternal salvation], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: inherit the kingdom prepared for you from the foundation of the world.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For I was hungry, and you gave Me something to eat; I was thirsty, and you gave Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' to drink; I was a stranger, and you invited Me in;'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: I was
    - type: text
      text: ' naked, and you clothed Me; I was sick, and you visited Me'
  - type: text
    text: ' [with help and ministering care]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I was in prison, and you came to Me
  - type: text
    text: ' [ignoring personal danger].’ [Is 58:7] '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then the righteous will answer Him, ‘Lord, when did we see You hungry, and feed You, or thirsty, and give You something to drink?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And when did we see You as a stranger, and invite You in, or naked, and clothe You?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And when did we see You sick, or in prison, and come to You?’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The King will answer and say to them, ‘I assure you '
