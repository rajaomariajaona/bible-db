document_id: JOL.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Terrible Visitation
  - type: text
    content: Blow the trumpet in Zion [warning of impending judgment],
  - type: text
    content: Sound an alarm on My holy mountain [Zion]!
  - type: text
    content: 'Let all the inhabitants of the land tremble '
  - type: text
    content: and
  - type: text
    content: ' shudder in fear,'
  - type: text
    content: For the [judgment] day of the L
  - type: heading
    content: ord
  - type: text
    content: ' is coming;'
  - type: text
    content: It is close at hand, [Ezek 7:2-4; Amos 5:16-20]
  '10':
  - type: text
    content: The earth quakes before them,
  - type: text
    content: The heavens tremble,
  - type: text
    content: The sun and the moon grow dark
  - type: text
    content: And the stars lose their brightness. [Rev 9:2-4; 16:14]
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' utters His voice before His army,'
  - type: text
    content: For His camp is very great,
  - type: text
    content: 'Because strong '
  - type: text
    content: and
  - type: text
    content: ' powerful is he who [obediently] carries out His word.'
  - type: text
    content: For the day of the L
  - type: heading
    content: ord
  - type: text
    content: ' is indeed great and very terrible [causing dread];'
  - type: text
    content: Who can endure it? [Is 26:20, 21; 34:1-4, 8; Rev 6:16, 17]
  '12':
  - type: text
    content: “Even now,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: '“Turn '
  - type: text
    content: and
  - type: text
    content: ' come to Me with all your heart [in genuine repentance],'
  - type: text
    content: With fasting and weeping and mourning [until every barrier is removed and the broken fellowship is restored];
  '13':
  - type: text
    content: Rip your heart to pieces [in sorrow and contrition] and not your garments.”
  - type: text
    content: Now return [in repentance] to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God,'
  - type: text
    content: For He is gracious and compassionate,
  - type: text
    content: Slow to anger, abounding in lovingkindness [faithful to His covenant with His people];
  - type: text
    content: And He relents [His sentence of] evil [when His people genuinely repent].
  '14':
  - type: text
    content: Who knows whether He will relent [and revoke your sentence],
  - type: text
    content: And leave a blessing behind Him,
  - type: text
    content: Even a grain offering and a drink offering [from the bounty He provides you]
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' your God?'
  '15':
  - type: text
    content: Blow a trumpet in Zion [warning of impending judgment],
  - type: text
    content: Dedicate a fast [as a day of restraint and humility], call a solemn assembly.
  '16':
  - type: text
    content: Gather the people, sanctify the congregation,
  - type: text
    content: Assemble the elders,
  - type: text
    content: Gather the children and the nursing infants.
  - type: text
    content: Let the bridegroom come out of his room
  - type: text
    content: And the bride out of her bridal chamber. [No one is excused from the assembly.]
  '17':
  - type: text
    content: Let the priests, the ministers of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Weep between the porch and the altar,
  - type: text
    content: 'And let them say, “Have compassion '
  - type: text
    content: and
  - type: text
    content: ' spare Your people, O L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And do not make Your inheritance (Israel) an object of ridicule,
  - type: text
    content: Or a [humiliating] byword among the [Gentile] nations.
  - type: text
    content: Why should they say among the peoples,
  - type: text
    content: ‘Where is their God?’ ”
  - type: heading
    content: Deliverance Promised
  '18':
  - type: text
    content: ¶Then the L
  - type: heading
    content: ord
  - type: text
    content: ' will be jealous for His land [ready to defend it since it is rightfully and uniquely His]'
  - type: text
    content: And will have compassion on His people [and will spare them].
  '19':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will answer and say to His people,'
  - type: text
    content: “Behold, I am going to send you grain and new wine and oil,
  - type: text
    content: 'And you will be satisfied '
  - type: text
    content: in full
  - type: text
    content: ' with them;'
  - type: text
    content: And I will never again make you an object of ridicule among the [Gentile] nations.
  '2':
  - type: text
    content: A day of darkness and gloom,
  - type: text
    content: A day of clouds and of thick [dark] mist,
  - type: text
    content: Like the dawn spread over the mountains;
  - type: text
    content: There is a [pagan, hostile] people numerous and mighty,
  - type: text
    content: The like of which has never been before
  - type: text
    content: Nor will be again afterward
  - type: text
    content: Even for years of many generations.
  '20':
  - type: text
    content: '“But I will remove the northern '
  - type: text
    content: army
  - type: text
    content: ' far away from you,'
  - type: text
    content: And I will drive it into a parched and desolate land,
  - type: text
    content: With its forward guard into the eastern sea (Dead Sea)
  - type: text
    content: And with its rear guard into the western sea (Mediterranean Sea).
  - type: text
    content: And its stench will arise and its foul odor of decay will come up [this is the fate of the northern army in the final day of the L
  - type: heading
    content: ord
  - type: text
    content: '],'
  - type: text
    content: 'For '
  - type: note
    content: Interpreters are divided as to whether it is the northern destroyer who has done “great things,” or the Lord. The latter view is supported by v 21.
  - type: text
    content: He has done great things.” [Is 34:1-4, 8; Amos 4:10]
  '21':
  - type: text
    content: ¶Do not fear, O land; be glad and rejoice,
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has done great things! [Zech 12:8-10]'
  '22':
  - type: text
    content: Do not be afraid, you animals of the field,
  - type: text
    content: For the pastures of the wilderness have turned green;
  - type: text
    content: The tree has produced its fruit,
  - type: text
    content: And the fig tree and the vine have yielded in full.
  '23':
  - type: text
    content: So rejoice, O children of Zion,
  - type: text
    content: And delight in the L
  - type: heading
    content: ord
  - type: text
    content: ', your God;'
  - type: text
    content: For He has given you the early [autumn] rain in vindication
  - type: text
    content: And He has poured down the rain for you,
  - type: text
    content: The early [autumn] rain and the late [spring] rain, as before.
  '24':
  - type: text
    content: And the threshing floors shall be full of grain,
  - type: text
    content: And the vats shall overflow with new wine and oil.
  '25':
  - type: text
    content: “And I will compensate you for the years
  - type: text
    content: That the swarming locust has eaten,
  - type: text
    content: The creeping locust, the stripping locust, and the gnawing locust—
  - type: text
    content: My great army which I sent among you.
  '26':
  - type: text
    content: “You will have plenty to eat and be satisfied
  - type: text
    content: And praise the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God'
  - type: text
    content: Who has dealt wondrously with you;
  - type: text
    content: And My people shall never be put to shame.
  '27':
  - type: text
    content: “And you shall know [without any doubt] that I am in the midst of Israel [to protect and bless you],
  - type: text
    content: And that I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God,'
  - type: text
    content: And there is no other;
  - type: text
    content: My people will never be put to shame.
  - type: heading
    content: The Promise of the Spirit
  '28':
  - type: text
    content: ¶“It shall come about after this
  - type: text
    content: That I shall pour out My Spirit on all mankind;
  - type: text
    content: And your sons and your daughters will prophesy,
  - type: text
    content: Your old men will dream dreams,
  - type: text
    content: Your young men will see visions.
  '29':
  - type: text
    content: “Even on the male and female servants
  - type: text
    content: I will pour out My Spirit in those days.
  - type: heading
    content: The Day of the Lord
  '3':
  - type: text
    content: Before them a fire devours,
  - type: text
    content: And behind them a flame burns;
  - type: text
    content: Before them the land is like the Garden of Eden,
  - type: text
    content: But behind them a desolate wilderness;
  - type: text
    content: And nothing at all escapes them.
  '30':
  - type: text
    content: '“I will show signs '
  - type: text
    content: and
  - type: text
    content: ' wonders [displaying My power] in the heavens and on the earth,'
  - type: text
    content: Blood and fire and columns of smoke.
  '31':
  - type: text
    content: “The sun will be turned into darkness
  - type: text
    content: And the moon into blood
  - type: text
    content: Before the great and terrible day of the L
  - type: heading
    content: ord
  - type: text
    content: ' comes. [Is 13:6, 9-11; 24:21-23; Ezek 32:7-10; Matt 24:29, 30; Rev 6:12-17]'
  '32':
  - type: text
    content: “And it shall come about that whoever calls on the name of the L
  - type: heading
    content: ord
  - type: text
    content: Will be saved [from the coming judgment]
  - type: text
    content: For on Mount Zion and in Jerusalem
  - type: text
    content: There will be those who escape,
  - type: text
    content: As the L
  - type: heading
    content: ord
  - type: text
    content: ' has said,'
  - type: text
    content: Even among the remnant [of survivors] whom the L
  - type: heading
    content: ord
  - type: text
    content: ' calls. [Acts 2:17-21; Rom 10:13]'
  '4':
  - type: text
    content: Their appearance is like the appearance of horses,
  - type: text
    content: And they run like war horses.
  '5':
  - type: text
    content: Like the noise of chariots
  - type: text
    content: They leap on the tops of the mountains,
  - type: text
    content: Like the crackling of a flame of fire devouring the stubble,
  - type: text
    content: Like a mighty people set in battle formation. [Rev 9:7, 9]
  '6':
  - type: text
    content: Before them the people are in anguish;
  - type: text
    content: All faces become pale [with terror].
  '7':
  - type: text
    content: They run like warriors;
  - type: text
    content: They climb the wall like soldiers.
  - type: text
    content: They each march [straight ahead] in line,
  - type: text
    content: And they do not deviate from their paths.
  '8':
  - type: text
    content: They do not crowd each other;
  - type: text
    content: Each one marches in his path.
  - type: text
    content: When they burst through the defenses (weapons),
  - type: text
    content: They do not break ranks.
  '9':
  - type: text
    content: They rush over the city,
  - type: text
    content: They run on the wall;
  - type: text
    content: They climb up into the houses,
  - type: text
    content: They enter at the windows like a thief.
