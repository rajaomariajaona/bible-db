document_id: JOL.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Terrible Visitation
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blow the trumpet in Zion [warning of impending judgment],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sound an alarm on My holy mountain [Zion]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all the inhabitants of the land tremble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shudder in fear,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the [judgment] day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is coming;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is close at hand, [Ezek 7:2-4; Amos 5:16-20]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth quakes before them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heavens tremble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun and the moon grow dark
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the stars lose their brightness. [Rev 9:2-4; 16:14]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' utters His voice before His army,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His camp is very great,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' powerful is he who [obediently] carries out His word.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is indeed great and very terrible [causing dread];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can endure it? [Is 26:20, 21; 34:1-4, 8; Rev 6:16, 17]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Even now,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Turn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' come to Me with all your heart [in genuine repentance],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With fasting and weeping and mourning [until every barrier is removed and the broken fellowship is restored];
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rip your heart to pieces [in sorrow and contrition] and not your garments.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now return [in repentance] to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He is gracious and compassionate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Slow to anger, abounding in lovingkindness [faithful to His covenant with His people];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He relents [His sentence of] evil [when His people genuinely repent].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who knows whether He will relent [and revoke your sentence],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And leave a blessing behind Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even a grain offering and a drink offering [from the bounty He provides you]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God?'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blow a trumpet in Zion [warning of impending judgment],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dedicate a fast [as a day of restraint and humility], call a solemn assembly.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather the people, sanctify the congregation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assemble the elders,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather the children and the nursing infants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the bridegroom come out of his room
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the bride out of her bridal chamber. [No one is excused from the assembly.]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the priests, the ministers of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep between the porch and the altar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And let them say, “Have compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spare Your people, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not make Your inheritance (Israel) an object of ridicule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or a [humiliating] byword among the [Gentile] nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should they say among the peoples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Where is their God?’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Deliverance Promised
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be jealous for His land [ready to defend it since it is rightfully and uniquely His]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will have compassion on His people [and will spare them].
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will answer and say to His people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, I am going to send you grain and new wine and oil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And you will be satisfied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in full
    - type: text
      text: ' with them;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will never again make you an object of ridicule among the [Gentile] nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A day of darkness and gloom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A day of clouds and of thick [dark] mist,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the dawn spread over the mountains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is a [pagan, hostile] people numerous and mighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The like of which has never been before
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will be again afterward
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even for years of many generations.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But I will remove the northern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: army
    - type: text
      text: ' far away from you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will drive it into a parched and desolate land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With its forward guard into the eastern sea (Dead Sea)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And with its rear guard into the western sea (Mediterranean Sea).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its stench will arise and its foul odor of decay will come up [this is the fate of the northern army in the final day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Interpreters are divided as to whether it is the northern destroyer who has done “great things,” or the Lord. The latter view is supported by v 21.
      marker-yv: yv-n
    - type: text
      text: He has done great things.” [Is 34:1-4, 8; Amos 4:10]
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Do not fear, O land; be glad and rejoice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has done great things! [Zech 12:8-10]'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be afraid, you animals of the field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the pastures of the wilderness have turned green;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The tree has produced its fruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fig tree and the vine have yielded in full.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So rejoice, O children of Zion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And delight in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', your God;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He has given you the early [autumn] rain in vindication
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He has poured down the rain for you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The early [autumn] rain and the late [spring] rain, as before.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the threshing floors shall be full of grain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the vats shall overflow with new wine and oil.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And I will compensate you for the years
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the swarming locust has eaten,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The creeping locust, the stripping locust, and the gnawing locust—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My great army which I sent among you.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You will have plenty to eat and be satisfied
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And praise the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has dealt wondrously with you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My people shall never be put to shame.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And you shall know [without any doubt] that I am in the midst of Israel [to protect and bless you],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no other;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My people will never be put to shame.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Promise of the Spirit
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“It shall come about after this
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I shall pour out My Spirit on all mankind;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your sons and your daughters will prophesy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your old men will dream dreams,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your young men will see visions.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Even on the male and female servants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pour out My Spirit in those days.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Day of the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before them a fire devours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And behind them a flame burns;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before them the land is like the Garden of Eden,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But behind them a desolate wilderness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And nothing at all escapes them.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I will show signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonders [displaying My power] in the heavens and on the earth,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blood and fire and columns of smoke.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The sun will be turned into darkness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the moon into blood
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the great and terrible day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' comes. [Is 13:6, 9-11; 24:21-23; Ezek 32:7-10; Matt 24:29, 30; Rev 6:12-17]'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And it shall come about that whoever calls on the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will be saved [from the coming judgment]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For on Mount Zion and in Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be those who escape,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even among the remnant [of survivors] whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' calls. [Acts 2:17-21; Rom 10:13]'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their appearance is like the appearance of horses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they run like war horses.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the noise of chariots
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They leap on the tops of the mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the crackling of a flame of fire devouring the stubble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a mighty people set in battle formation. [Rev 9:7, 9]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before them the people are in anguish;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All faces become pale [with terror].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They run like warriors;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They climb the wall like soldiers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They each march [straight ahead] in line,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they do not deviate from their paths.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not crowd each other;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each one marches in his path.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they burst through the defenses (weapons),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not break ranks.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They rush over the city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They run on the wall;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They climb up into the houses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They enter at the windows like a thief.
