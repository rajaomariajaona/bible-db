        children:
        - type: text
          text: See note 2:3.
      marker-yv: yv-n
    - type: text
      text: 'sons of the prophets said to Elisha, “Look now, the place where we '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
