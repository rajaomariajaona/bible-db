  - type: text
    content: ' of silver, and a fourth of a '
  - type: note
    content: One kab is about two quarts.
  - type: text
    content: 'kab of '
  - type: note
    content: Normally dung was used as fertilizer or for fuel; however, in this verse “dove’s dung” may be a nickname for a wild pealike vegetable.
  - type: text
