  - type: text
    content: ' of silver. '
  '26':
  - type: text
    content: 'As the king of Israel (Jehoram) was passing by on the [city] wall a woman cried out to him, “Help, my lord, O king!” '
  '27':
  - type: text
    content: He said, “If the L
  - type: heading
    content: ord
  - type: text
    content: ' does not help you, from where shall I get you help? From the threshing floor, or from the wine press?” '
  '28':
  - type: text
    content: 'And the king said to her, “What is the matter with you?” She answered, “This woman said to me, ‘Give your son so we may eat him today, and we will eat my son tomorrow.’ '
  '29':
  - type: text
    content: 'So we cooked my son and ate him. The next day I said to her, ‘Give your son so that we may eat him’; but she had hidden her son.” '
  '3':
  - type: text
    content: 'Then one said, “Please be willing to go with your servants.” So he answered, “I shall go.” '
  '30':
  - type: text
    content: 'When the king heard the woman’s words, he '
  - type: note
    content: Usually an act symbolizing grief or anguish.
  - type: text
    content: 'tore his clothes—now he was still walking along on the wall—and the people looked [at him], and he had on '
  - type: note
    content: A coarse cloth usually made of goat’s hair and worn as a sign of mourning.
  - type: text
    content: 'sackcloth underneath [his royal robe] next to his skin. '
  '31':
  - type: text
    content: Then he said, “
  - type: note
    content: Jehoram, the king of Israel, may have been angry at Elisha because the prophet had persuaded him not to kill the enemy army when he had the chance (v 22). He may also have blamed Elisha for the famine (or for failing to ask God to end it), though there is no indication that Elisha had called for it or announced it.
  - type: text
    content: May God do so to me and more also, if the head of Elisha the son of Shaphat remains on him today!”
  '32':
  - type: text
    content: 'Now Elisha was sitting in his house, and the elders were sitting with him. And '
  - type: text
    content: the king
  - type: text
    content: ' sent a man ahead of him [to behead Elisha]; but before the messenger arrived, Elisha told the elders, “Do you see how this son of [Jezebel] a murderer has sent [a man] to remove my head? Look, when the messenger comes, shut the door and hold it securely against him. Is not the sound of his master’s feet [just] behind him?” '
  '33':
  - type: text
    content: While Elisha was still talking with them, the messenger came down to him [followed by the king] and the king said, “This evil [situation] is from the L
  - type: heading
    content: ord
  - type: text
    content: '! Why should I wait for [help from] the L'
  - type: heading
    content: ord
  - type: text
    content: ' any longer?”'
  '4':
  - type: text
    content: 'So he went with them; and when they came to the Jordan, they cut down [some of] the trees. '
  '5':
  - type: text
    content: 'But it happened that as one was cutting down a beam, the axe head fell into the water; and he cried out and said, “Oh no, my master! It was borrowed!” '
  '6':
  - type: text
    content: 'The man of God said, “Where did it fall?” When he showed him the place, Elisha cut off a stick and threw it in there, and made the iron [axe head] float. '
  '7':
  - type: text
    content: He said, “Pick it up for yourself.” So he reached out with his hand and took it.
  - type: heading
    content: The Arameans Plot to Capture Elisha
  '8':
  - type: text
    content: 'Now the king of Aram (Syria) was making war against Israel, and he consulted with his servants, saying, “My camp shall be in such and such a place.” '
  '9':
  - type: text
    content: 'The man of God sent '
  - type: text
    content: word
  - type: text
    content: ' to the king of Israel saying, “Be careful not to pass by this place, because the Arameans are pulling back to there.” '
