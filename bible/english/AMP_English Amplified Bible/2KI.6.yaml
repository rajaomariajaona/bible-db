  '11':
  - type: text
    content: 'Now the heart of the king of Aram (Syria) was enraged over this thing. He called his servants and said to them, “Will you not tell me which of us is helping the king of Israel?” '
  '12':
  - type: text
    content: 'One of his servants said, “None [of us is helping him], my lord, O king; but Elisha, the prophet who is in Israel, tells the king of Israel the words that you speak in your bedroom.” '
  '13':
  - type: text
    content: 'So he said, “Go and see where he is, so that I may send [men] and seize him.” And he was told, “He is in Dothan.” '
  '14':
  - type: text
    content: So he sent horses and chariots and a powerful army there. They came by night and surrounded the city.
  '15':
  - type: text
    content: 'The servant of the man of God got up early and went out, and behold, there was an army with horses and chariots encircling the city. Elisha’s servant said to him, “Oh no, my master! What are we to do?” '
  '16':
  - type: text
    content: 'Elisha answered, “Do not be afraid, for those who are with us are more than those who are with them.” '
  '17':
  - type: text
    content: Then Elisha prayed and said, “L
  - type: heading
    content: ord
  - type: text
    content: ', please, open his eyes that he may see.” And the L'
  - type: heading
    content: ord
  - type: text
    content: ' opened the servants eyes and he saw; and behold, the mountain was full of horses and chariots of fire surrounding Elisha. '
  '18':
  - type: text
    content: When the Arameans came down to him, Elisha prayed to the L
  - type: heading
    content: ord
  - type: text
    content: ' and said, “Please strike this people (nation) with '
  - type: note
    content: This is an unusual Hebrew word that implies they were blinded by a dazzling bright light (see Gen 19:11).
  - type: text
    content: 'blindness.” And God struck them with blindness, in accordance with Elisha’s request. '
  '19':
  - type: text
    content: Then Elisha said to the Arameans, “This is not the way, nor is this the city. Follow me and I will lead you to the man whom you are seeking.” And he led them to Samaria.
  '2':
  - type: text
    content: 'Please let us go to the Jordan [River] and let each man take from there a beam [for the building]; and let us make a place there for ourselves where we may live.” And he answered, “Go.” '
  '20':
  - type: text
    content: When they had come into Samaria, Elisha said, “L
  - type: heading
    content: ord
  - type: text
    content: ', open the eyes of these '
  - type: text
    content: men,
  - type: text
    content: ' so that they may see.” And the L'
  - type: heading
    content: ord
  - type: text
    content: ' opened their eyes and they saw. Behold, they were in the midst of Samaria. '
  '21':
  - type: text
    content: 'When the king of Israel (Jehoram) saw them, he said to Elisha, “My father, shall I kill them? Shall I kill them?” '
  '22':
  - type: text
    content: 'Elisha answered, “You shall not kill them. Would you kill those you have taken captive with your sword and bow? Serve them bread and water, so that they may eat and drink, and go back to their master [King Ben-hadad].” '
  '23':
  - type: text
    content: So the king prepared a great feast for them; and when they had eaten and drunk he sent them away, and they went to their master. And the marauding bands of Aram did not come into the land of Israel again.
  - type: heading
    content: The Siege of Samaria—Cannibalism
  '24':
  - type: text
    content: 'But it came about after this, that Ben-hadad king of Aram (Syria) gathered his whole army together and went up and besieged Samaria. '
  '25':
  - type: text
    content: 'Now there was a great famine in Samaria; and they '
  - type: note
    content: The purpose of a siege was to starve out or weaken the inhabitants of a fortified city, minimizing risk to the attacking army. The success of the siege depended on whether the city was sufficiently stocked with food and water. Here, with a famine, not only does the city fall well short of adequate provisions, but those inhabitants who have a surplus of anything edible or useful make the situation even worse by engaging in price-gouging.
  - type: text
    content: 'besieged it until a '
  - type: note
    content: Apparently the famine was so severe that the inhabitants were purchasing products that were barely edible as well as being ceremonially unclean.
  - type: text
    content: 'donkey’s head was sold for eighty '
  - type: text
