document_id: ACT.22,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul’s Defense before the Jews
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Brethren and fathers (kinsmen), hear my defense which I now offer to you.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And I asked, ‘What shall I do, Lord?’ And the Lord answered me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '‘Get up and go into Damascus. There you will be told all that is appointed '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' destined for you to do.’'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But since I could not see because of the [glorious intensity and dazzling] brightness of that light, I was led by the hand by those who were with me and came into Damascus.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“And one Ananias, a devout man according to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the Law
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the standard of the Law, and well spoken of by all the Jews who lived there, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'came to [see] me, and standing near, he said to me, ‘Brother Saul, receive your sight!’ And at that very moment I [recovered my sight and] looked up at him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he said, ‘The God of our fathers has appointed you to know His will, [and to progressively understand His plan with clarity and power] and to see the Righteous One [Jesus Christ, the Messiah] and to hear a message from His [own] mouth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For you will be His witness to all men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: testifying
    - type: text
      text: ' of what you have seen and heard. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Now, why do you delay? Get up and be baptized, and wash away your sins by calling on His name [for salvation].’
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Then it happened when I had returned to Jerusalem and was praying in the temple [enclosure], that I fell into a trance (vision); '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and I saw Him saying to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Hurry and get out of Jerusalem quickly, because they will not accept your testimony about Me.’
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And I said, ‘Lord, they themselves know [without any doubt] that in one synagogue after another I used to imprison and beat those who believed in You [and Your message of salvation]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When they heard that he was addressing them in the Hebrew dialect, they became even more quiet. And he continued,
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And when the blood of Your witness Stephen was being shed, I also was standing nearby approving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consenting [to his death], and guarding the coats of those who were killing him.’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the Lord said to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Go, I will send you far away to the Gentiles.’ ”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'They listened to Paul until [he made] this [last] statement, but now they raised their voices and shouted, “Away with such a man from the earth! He is not fit to live!” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And as they were shouting and throwing off their coats [getting ready to stone Paul] and tossing dust into the air [expressing their anger], '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'the commander ordered him to be brought into the barracks, stating that he was to be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was standard practice with slaves or others of no social standing under Roman rule. The thinking was that such people did not have the integrity to tell the truth, and had to be tortured to drag the truth out of them.
      marker-yv: yv-n
    - type: text
      text: 'interrogated with a whip in order to learn why the people were shouting against him that way. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But when they had stretched him out '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: for the whip
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'with the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leather
    - type: text
      text: ' straps [in preparation for the whip], Paul said to the centurion who was standing by, “Is it legal for you to whip a man who is a Roman '
    - type: usfm
      marker: it
      children:
      - type: text
        text: citizen
    - type: text
      text: ' and uncondemned [without a trial]?” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'When the centurion heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,
    - type: text
      text: ' he went to the commander and said to him, “What are you about to do? This man is a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Death was the punishment for someone falsely claiming to be a Roman.
      marker-yv: yv-n
    - type: text
      text: 'Roman!” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'So the commander came and asked Paul, “Tell me, are you a Roman?” And he said, “Yes.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The commander replied, “I '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Messalina (third wife of Emperor Claudius) was said to have illegally “sold” Roman citizenships at high prices; however, there were also legitimate ways to obtain citizenship.
      marker-yv: yv-n
    - type: text
      text: 'purchased this citizenship [of mine] for a large sum of money [so how did you acquire yours?].” Paul said, “But I was actually born a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: citizen
    - type: text
      text: '.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So those who were about to interrogate him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by torture
    - type: text
      text: ' immediately let him go; and the commander was also afraid when he realized that Paul was a Roman and he had put him in chains.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“I am a Jew, born in Tarsus of Cilicia, but brought up in this city, educated at the feet of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'According to the Talmud, Gamaliel, who was the leading scholar of the Torah from '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 20 to 40, taught a school of 1,000 advanced students.
      marker-yv: yv-n
    - type: text
      text: 'Gamaliel according to the strictness of the law of our fathers, being ardent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' passionate for God just as all of you are today. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: But on the next day, wanting to know the real reason why Paul was being accused by the Jews, he released him and ordered the chief priests and the whole Council (Sanhedrin, Jewish High Court) to assemble; and brought Paul down and presented him before them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I persecuted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pursued the followers of this '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 9:2. Paul was probably referring to Jesus Himself.
      marker-yv: yv-n
    - type: text
      text: 'Way to the death, binding them with chains and putting [followers of Jesus] both men and women into prisons, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: as the high priest and all the Council of the elders (Sanhedrin, Jewish High Court) can testify; because from them I received letters to the brothers, and I was on my way to Damascus in order to bring those [believers] who were there to Jerusalem in chains to be punished.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“But as I was on my way, approaching Damascus about noontime, a great blaze of light suddenly flashed from heaven '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shone around me. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And I fell to the ground and heard a voice saying to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Saul, Saul, why are you persecuting Me?’
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And I replied, ‘Who are You, Lord?’ And He said to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘I am Jesus the Nazarene, whom you are persecuting.’
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now those who were with me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'At first look, what Paul says here seems to contradict Luke the writer’s own description of what happened in 9:7. However, Luke says there that Paul’s companions saw '
        - type: usfm
          marker: it
          children:
          - type: text
            text: no one,
        - type: text
          text: ' not that they did not see the light; and this may be an indication that Paul did not just see the light but saw Jesus in the light. As for what was heard, there is a subtle distinction in the Greek between the two accounts. The Greek word for “hear” takes an object in one form for the source of a sound, and in another form for the substance or content of a sound. In 9:7 Luke uses the first form, indicating that Paul’s companions heard the voice as a sound. Here in 22:9, the second form is used, indicating that the others did not hear the substance of the sound—that is, they could not make out what the voice was saying.'
      marker-yv: yv-n
    - type: text
      text: 'saw the light, but did not understand the voice of the One who was speaking to me. '
