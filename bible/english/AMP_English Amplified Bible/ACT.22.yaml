  '30':
  - type: text
    content: But on the next day, wanting to know the real reason why Paul was being accused by the Jews, he released him and ordered the chief priests and the whole Council (Sanhedrin, Jewish High Court) to assemble; and brought Paul down and presented him before them.
  '4':
  - type: text
    content: 'I persecuted '
  - type: text
    content: and
  - type: text
    content: ' pursued the followers of this '
  - type: note
    content: See note 9:2. Paul was probably referring to Jesus Himself.
  - type: text
    content: 'Way to the death, binding them with chains and putting [followers of Jesus] both men and women into prisons, '
  '5':
  - type: text
    content: as the high priest and all the Council of the elders (Sanhedrin, Jewish High Court) can testify; because from them I received letters to the brothers, and I was on my way to Damascus in order to bring those [believers] who were there to Jerusalem in chains to be punished.
  '6':
  - type: text
    content: '“But as I was on my way, approaching Damascus about noontime, a great blaze of light suddenly flashed from heaven '
  - type: text
