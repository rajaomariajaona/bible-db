  '14':
  - type: text
    content: 'And he said, ‘The God of our fathers has appointed you to know His will, [and to progressively understand His plan with clarity and power] and to see the Righteous One [Jesus Christ, the Messiah] and to hear a message from His [own] mouth. '
  '15':
