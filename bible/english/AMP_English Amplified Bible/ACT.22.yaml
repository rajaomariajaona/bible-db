  '16':
  - type: text
    content: Now, why do you delay? Get up and be baptized, and wash away your sins by calling on His name [for salvation].’
  '17':
  - type: text
    content: '“Then it happened when I had returned to Jerusalem and was praying in the temple [enclosure], that I fell into a trance (vision); '
  '18':
  - type: text
    content: 'and I saw Him saying to me, '
  - type: text
    content: ‘Hurry and get out of Jerusalem quickly, because they will not accept your testimony about Me.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And I said, ‘Lord, they themselves know [without any doubt] that in one synagogue after another I used to imprison and beat those who believed in You [and Your message of salvation]. '
  '2':
  - type: text
    content: When they heard that he was addressing them in the Hebrew dialect, they became even more quiet. And he continued,
  '20':
  - type: text
    content: 'And when the blood of Your witness Stephen was being shed, I also was standing nearby approving '
  - type: text
    content: and
  - type: text
