  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Now those who were with me '
  - type: note
    content: At first look, what Paul says here seems to contradict Luke the writer’s own description of what happened in 9:7. However, Luke says there that Paul’s companions saw no one, not that they did not see the light; and this may be an indication that Paul did not just see the light but saw Jesus in the light. As for what was heard, there is a subtle distinction in the Greek between the two accounts. The Greek word for “hear” takes an object in one form for the source of a sound, and in another form for the substance or content of a sound. In 9:7 Luke uses the first form, indicating that Paul’s companions heard the voice as a sound. Here in 22:9, the second form is used, indicating that the others did not hear the substance of the sound—that is, they could not make out what the voice was saying.
  - type: text
    content: 'saw the light, but did not understand the voice of the One who was speaking to me. '
