  '21':
  - type: text
    content: 'And the Lord said to me, '
  - type: text
    content: ‘Go, I will send you far away to the Gentiles.’ ”
  '22':
  - type: text
    content: 'They listened to Paul until [he made] this [last] statement, but now they raised their voices and shouted, “Away with such a man from the earth! He is not fit to live!” '
  '23':
  - type: text
    content: 'And as they were shouting and throwing off their coats [getting ready to stone Paul] and tossing dust into the air [expressing their anger], '
  '24':
