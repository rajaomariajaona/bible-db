  - type: text
    content: “Brethren and fathers (kinsmen), hear my defense which I now offer to you.”
  '10':
  - type: text
    content: 'And I asked, ‘What shall I do, Lord?’ And the Lord answered me, '
  - type: text
    content: '‘Get up and go into Damascus. There you will be told all that is appointed '
  - type: text
