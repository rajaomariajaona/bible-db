document_id: 2TH.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Man of Lawlessness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now in regard to the coming of our Lord Jesus Christ and our '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the rapture of believers.
      marker-yv: yv-n
    - type: text
      text: 'gathering together to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: meet
    - type: text
      text: ' Him, we ask you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters, [Mark 13:27; 1 Thess 2:19; 4:15-17] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and by unlimited seduction to evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with all the deception of wickedness for those who are perishing, because they did not welcome the love of the truth [of the gospel] so as to be saved [they were spiritually blind, and rejected the truth that would have saved them]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Because of this God will send upon them a misleading influence, [an activity of error and deception] so they will believe the lie, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'in order that all may be judged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemned who did not believe the truth [about their sin, and the need for salvation through Christ], but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: instead
    - type: text
      text: ' took pleasure in unrighteousness.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But we should '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are [morally] obligated [as debtors] always to give thanks to God for you, believers beloved by the Lord, because God has chosen you from the beginning for salvation through the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'There are two kinds of sanctification: first, positional sanctification means '
        - type: usfm
          marker: it
          children:
          - type: text
            text: set apart for God
        - type: text
          text: ' and in some instances '
        - type: usfm
          marker: it
          children:
          - type: text
            text: set apart for God’s purpose;
        - type: text
          text: ' second, practical sanctification is a progressive process and means '
        - type: usfm
          marker: it
          children:
          - type: text
            text: growing in righteous living
        - type: text
          text: . This is dependent on a person’s reliance on the Holy Spirit.
      marker-yv: yv-n
    - type: text
      text: 'sanctifying work of the Spirit [that sets you apart for God’s purpose] and by your faith in the truth [of God’s word that leads you to spiritual maturity]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'It was to this end that He called you through our gospel [the good news of Jesus’ death, burial, and resurrection], so that you may obtain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' share in the glory of our Lord Jesus Christ. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So then, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters, stand firm and hold [tightly] to the traditions which you were taught, whether by word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of mouth
    - type: text
      text: ' or by letter from us.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now may our Lord Jesus Christ Himself and God our Father, who has loved us and given us everlasting comfort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouragement and the good [well-founded] hope [of salvation] by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' grace, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'comfort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourage and strengthen your hearts [keeping them steadfast and on course] in every good work and word.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'not to be quickly unsettled or alarmed either by a [so-called prophetic revelation of a] spirit or a message or a letter [alleged to be] from us, to the effect that the day of the Lord has [already] come. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Let no one in any way deceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' entrap you, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that day will not come
    - type: text
      text: ' unless the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul is referring to a specific, future event.
      marker-yv: yv-n
    - type: text
      text: 'apostasy comes first [that is, the great rebellion, the abandonment of the faith by professed Christians], and the man of lawlessness is revealed, the son of destruction [the Antichrist, the one who is destined to be destroyed], [Dan 7:25; 8:25; 1 Tim 4:1] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'who opposes and exalts himself [so proudly and so insolently] above '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: everyone who is called God
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'every so-called god or object of worship, so that he [actually enters and] takes his seat in the temple of God, publicly proclaiming that he himself is God. [Ezek 28:2; Dan 11:36, 37] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Do you not remember that when I was still with you, I was telling you these things? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And you know what restrains him now [from being revealed]; it is so that he will be revealed at his own [appointed] time. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For the mystery of lawlessness [rebellion against divine authority and the coming reign of lawlessness] is already at work; [but it is restrained] only until He who now restrains it is taken out of the way. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then the lawless one [the Antichrist] will be revealed and the Lord Jesus will slay him with the breath of His mouth and bring him to an end by the appearance of His coming. [Is 11:4] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The coming of the [Antichrist, the lawless] one is through the activity of Satan, [attended] with great power [all kinds of counterfeit miracles] and [deceptive] signs and false wonders [all of them lies], '
