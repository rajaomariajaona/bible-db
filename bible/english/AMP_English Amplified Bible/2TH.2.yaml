  '5':
  - type: text
    content: 'Do you not remember that when I was still with you, I was telling you these things? '
  '6':
  - type: text
    content: 'And you know what restrains him now [from being revealed]; it is so that he will be revealed at his own [appointed] time. '
  '7':
  - type: text
    content: 'For the mystery of lawlessness [rebellion against divine authority and the coming reign of lawlessness] is already at work; [but it is restrained] only until He who now restrains it is taken out of the way. '
  '8':
  - type: text
    content: 'Then the lawless one [the Antichrist] will be revealed and the Lord Jesus will slay him with the breath of His mouth and bring him to an end by the appearance of His coming. [Is 11:4] '
  '9':
  - type: text
    content: 'The coming of the [Antichrist, the lawless] one is through the activity of Satan, [attended] with great power [all kinds of counterfeit miracles] and [deceptive] signs and false wonders [all of them lies], '
