  - type: text
    content: 'apostasy comes first [that is, the great rebellion, the abandonment of the faith by professed Christians], and the man of lawlessness is revealed, the son of destruction [the Antichrist, the one who is destined to be destroyed], [Dan 7:25; 8:25; 1 Tim 4:1] '
  '4':
  - type: text
    content: 'who opposes and exalts himself [so proudly and so insolently] above '
  - type: note
