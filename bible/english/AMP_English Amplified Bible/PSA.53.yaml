document_id: PSA.53,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 53
  - type: heading
    content: Folly and Wickedness of Men.
  - type: text
    content: 'To the Chief Musician; in a mournful strain. A skillful song, '
  - type: text
    content: or
  - type: text
    content: ' didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem of David.'
  - type: text
    content: The [empty-headed] fool has said in his heart, “There is no God.”
  - type: text
    content: 'They are corrupt '
  - type: text
    content: and
  - type: text
    content: ' evil, and have committed repulsive injustice;'
  - type: text
    content: There is no one who does good.
  '2':
  - type: text
    content: God has looked down from heaven upon the children of men
  - type: text
    content: To see if there is anyone who understands,
  - type: text
    content: Who seeks after God [who requires Him, who longs for Him as essential to life].
  '3':
  - type: text
    content: 'Every one of them has turned aside '
  - type: text
    content: and
  - type: text
    content: ' fallen away;'
  - type: text
    content: 'Together they have become filthy '
  - type: text
    content: and
  - type: text
    content: ' corrupt;'
  - type: text
    content: There is no one who does good, no, not even one. [Rom 3:10-12]
  '4':
  - type: text
    content: '¶Have workers of wickedness no knowledge '
  - type: text
    content: or
  - type: text
    content: ' no understanding?'
  - type: text
    content: 'They eat up My people '
  - type: text
    content: as though
  - type: text
    content: ' they ate bread'
  - type: text
    content: And have not called upon God.
  '5':
  - type: text
    content: 'There they were, in great terror '
  - type: text
    content: and
  - type: text
    content: ' dread, where there had been no terror '
  - type: text
    content: or
  - type: text
    content: ' dread;'
  - type: text
    content: For God scattered the bones of him who besieged you;
  - type: text
    content: You have put them to shame, because God has rejected them.
  '6':
  - type: text
    content: Oh, that the salvation of Israel would come out of Zion!
  - type: text
    content: When God restores [the fortunes of] His people,
  - type: text
    content: Let Jacob rejoice, let Israel be glad.
