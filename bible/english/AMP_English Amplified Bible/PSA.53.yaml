document_id: PSA.53,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 53
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Folly and Wickedness of Men.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician; in a mournful strain. A skillful song, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' didactic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reflective poem of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The [empty-headed] fool has said in his heart, “There is no God.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They are corrupt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evil, and have committed repulsive injustice;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no one who does good.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has looked down from heaven upon the children of men
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To see if there is anyone who understands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who seeks after God [who requires Him, who longs for Him as essential to life].
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Every one of them has turned aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fallen away;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Together they have become filthy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' corrupt;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no one who does good, no, not even one. [Rom 3:10-12]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Have workers of wickedness no knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' no understanding?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They eat up My people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as though
    - type: text
      text: ' they ate bread'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have not called upon God.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There they were, in great terror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dread, where there had been no terror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dread;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God scattered the bones of him who besieged you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have put them to shame, because God has rejected them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, that the salvation of Israel would come out of Zion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When God restores [the fortunes of] His people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let Jacob rejoice, let Israel be glad.
