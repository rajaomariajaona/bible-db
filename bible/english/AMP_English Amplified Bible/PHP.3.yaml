type_code: eng
verses:
  '1':
  - type: heading
    content: The Goal of Life
  - type: text
    content: 'Finally, my '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'fellow believers, continue to rejoice '
  - type: text
    content: and
  - type: text
    content: ' delight in the L'
  - type: heading
    content: ord
  - type: text
    content: . To write the same things again is no trouble for me, and it is a safeguard for you.
  '10':
  - type: text
    content: And this, so
  - type: text
    content: ' that I may know Him [experientially, becoming more thoroughly acquainted with Him, understanding the remarkable wonders of His Person more completely] and [in that same way experience] the power of His resurrection [which overflows and is active in believers], and [that I may share] the fellowship of His sufferings, by being '
  - type: text
    content: continually
  - type: text
    content: ' conformed [inwardly into His likeness even] to His death [dying as He did]; '
  '11':
  - type: note
    content: Lit if somehow.
  - type: text
    content: so that I may attain to the resurrection [that will raise me] from the dead.
  '12':
  - type: text
    content: 'Not that I have already obtained it [this goal of being Christlike] or have already been made perfect, but I actively press on '
  - type: note
    content: Lit even if I may. Paul knew that he could not really reach perfection in this life, but his goal was to “press on” as if it were attainable.
  - type: text
    content: 'so that I may take hold of that [perfection] for which Christ Jesus took hold of me '
  - type: text
    content: and
  - type: text
    content: ' made me His own. [1 Cor 9:24; 1 Tim 6:12] '
  '13':
  - type: note
    content: Lit Brethren.
  - type: text
    content: 'Brothers and sisters, I do not consider that I have made it my own yet; but one thing '
  - type: text
    content: 'I do:'
  - type: text
    content: ' forgetting what '
  - type: text
    content: lies
  - type: text
    content: ' behind and reaching forward to what '
  - type: text
    content: lies
  - type: text
    content: ' ahead, '
  '14':
  - type: text
    content: 'I press on toward the goal to win the [heavenly] prize of the upward call of God in Christ Jesus. '
  '15':
  - type: text
    content: 'All of us who are mature [pursuing spiritual perfection] should have this attitude. And if in any respect you have a different attitude, that too God will make clear to you. '
  '16':
  - type: text
    content: Only let us stay true to what we have already attained.
  '17':
  - type: text
    content: 'Brothers and sisters, together follow my example and observe those who live by the pattern we gave you. '
  '18':
  - type: text
    content: 'For there are many, of whom I have often told you, and now tell you even with tears, who live as enemies of the cross of Christ [rejecting and opposing His way of salvation], '
  '19':
  - type: text
    content: 'whose fate is destruction, whose god is '
  - type: text
    content: their
  - type: text
    content: ' belly [their worldly appetite, their sensuality, their vanity], and '
  - type: text
    content: whose
  - type: text
    content: ' glory is in their shame—who focus their mind on earthly '
  - type: text
    content: and
  - type: text
    content: ' temporal things. '
  '2':
  - type: text
    content: 'Look out for the '
  - type: note
    content: Jews often used “dogs” as a derogatory term to refer to Gentiles, so Paul’s reference to his Jewish opponents in this verse is ironic. Most dogs were untamed scavengers and considered disgusting because they ate anything.
  - type: text
    content: 'dogs [the Judaizers, the legalists], look out for the troublemakers, look out for the '
  - type: note
    content: Because circumcision was not necessary for salvation, the circumcision demanded by the Judaizers was nothing more than mutilation.
  - type: text
    content: 'false circumcision [those who claim circumcision is necessary for salvation]; '
  '20':
  - type: text
    content: 'But [we are different, because] our citizenship is in heaven. And from there we eagerly await [the coming of] the Savior, the Lord Jesus Christ; '
  '21':
  - type: text
    content: 'who, by exerting that power which enables Him even to subject everything to Himself, will [not only] transform [but completely refashion] our '
  - type: text
    content: earthly
  - type: text
    content: ' bodies so that they will be like His glorious '
  - type: text
    content: resurrected
  - type: text
    content: ' body.'
  '3':
  - type: text
    content: 'for we [who are born-again have been reborn from above—spiritually transformed, renewed, set apart for His purpose and] are the '
  - type: text
    content: 'true'
  - type: text
    content: ' circumcision, who worship in the Spirit of God and glory '
  - type: text
    content: and
  - type: text
    content: ' take pride '
  - type: text
    content: and
  - type: text
    content: ' exult in Christ Jesus and place no confidence [in what we have or who we are] in the flesh— '
  '4':
  - type: text
    content: 'though I myself might have [some grounds for] confidence in the flesh [if I were pursuing salvation by works]. If anyone else thinks that he has reason to be confident in the flesh [that is, in his own efforts to achieve salvation], I '
  - type: text
    content: have
  - type: text
    content: ' far more: '
  '5':
  - type: text
    content: 'circumcised when I was eight days old, of the nation of Israel, of the tribe of Benjamin, a Hebrew of Hebrews [an exemplary Hebrew]; as to the [observance of the] Law, a Pharisee; '
  '6':
  - type: text
    content: as to my zeal [for Jewish tradition], a persecutor of the church; and as to righteousness [supposed right living] which [my fellow Jews believe] is in the Law, I proved myself blameless.
  '7':
  - type: text
    content: 'But whatever '
  - type: text
    content: former
  - type: text
    content: ' things were gains to me [as I thought then], these things [once regarded as advancements in merit] I have come to consider as loss [absolutely worthless] for the sake of Christ [and the purpose which He has given my life]. '
  '8':
  - type: text
    content: 'But more than that, I count everything as loss compared to the priceless privilege '
  - type: text
    content: and
  - type: text
    content: ' supreme advantage of knowing Christ Jesus my Lord [and of growing more deeply and thoroughly acquainted with Him—a joy unequaled]. For His sake I have lost everything, and I consider it all garbage, so that I may gain Christ, '
  '9':
  - type: text
    content: 'and may be found in Him [believing and relying on Him], not having any righteousness of my own derived from [my obedience to] the Law '
  - type: text
    content: and
  - type: text
    content: ' its rituals, but [possessing] that [genuine righteousness] which comes through faith in Christ, the righteousness which comes from God on the basis of faith. '
