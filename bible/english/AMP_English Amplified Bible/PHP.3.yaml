document_id: PHP.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Goal of Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Finally, my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'fellow believers, continue to rejoice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight in the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . To write the same things again is no trouble for me, and it is a safeguard for you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Look out for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jews often used “dogs” as a derogatory term to refer to Gentiles, so Paul’s reference to his Jewish opponents in this verse is ironic. Most dogs were untamed scavengers and considered disgusting because they ate anything.
    marker-yv: yv-n
  - type: text
    text: 'dogs [the Judaizers, the legalists], look out for the troublemakers, look out for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because circumcision was not necessary for salvation, the circumcision demanded by the Judaizers was nothing more than mutilation.
    marker-yv: yv-n
  - type: text
    text: 'false circumcision [those who claim circumcision is necessary for salvation]; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'for we [who are born-again have been reborn from above—spiritually transformed, renewed, set apart for His purpose and] are the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'true'
  - type: text
    text: ' circumcision, who worship in the Spirit of God and glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exult in Christ Jesus and place no confidence [in what we have or who we are] in the flesh— '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'though I myself might have [some grounds for] confidence in the flesh [if I were pursuing salvation by works]. If anyone else thinks that he has reason to be confident in the flesh [that is, in his own efforts to achieve salvation], I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have
  - type: text
    text: ' far more: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'circumcised when I was eight days old, of the nation of Israel, of the tribe of Benjamin, a Hebrew of Hebrews [an exemplary Hebrew]; as to the [observance of the] Law, a Pharisee; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: as to my zeal [for Jewish tradition], a persecutor of the church; and as to righteousness [supposed right living] which [my fellow Jews believe] is in the Law, I proved myself blameless.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But whatever '
  - type: usfm
    marker: it
    children:
    - type: text
      text: former
  - type: text
    text: ' things were gains to me [as I thought then], these things [once regarded as advancements in merit] I have come to consider as loss [absolutely worthless] for the sake of Christ [and the purpose which He has given my life]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But more than that, I count everything as loss compared to the priceless privilege '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' supreme advantage of knowing Christ Jesus my Lord [and of growing more deeply and thoroughly acquainted with Him—a joy unequaled]. For His sake I have lost everything, and I consider it all garbage, so that I may gain Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and may be found in Him [believing and relying on Him], not having any righteousness of my own derived from [my obedience to] the Law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' its rituals, but [possessing] that [genuine righteousness] which comes through faith in Christ, the righteousness which comes from God on the basis of faith. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: it
    children:
    - type: text
      text: And this, so
  - type: text
    text: ' that I may know Him [experientially, becoming more thoroughly acquainted with Him, understanding the remarkable wonders of His Person more completely] and [in that same way experience] the power of His resurrection [which overflows and is active in believers], and [that I may share] the fellowship of His sufferings, by being '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' conformed [inwardly into His likeness even] to His death [dying as He did]; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: if somehow
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: so that I may attain to the resurrection [that will raise me] from the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Not that I have already obtained it [this goal of being Christlike] or have already been made perfect, but I actively press on '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: even if I may.
      - type: text
        text: ' Paul knew that he could not really reach perfection in this life, but his goal was to “press on” as if it were attainable.'
    marker-yv: yv-n
  - type: text
    text: 'so that I may take hold of that [perfection] for which Christ Jesus took hold of me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made me His own. [1 Cor 9:24; 1 Tim 6:12] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Brothers and sisters, I do not consider that I have made it my own yet; but one thing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'I do:'
  - type: text
    text: ' forgetting what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lies
  - type: text
    text: ' behind and reaching forward to what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lies
  - type: text
    text: ' ahead, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I press on toward the goal to win the [heavenly] prize of the upward call of God in Christ Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'All of us who are mature [pursuing spiritual perfection] should have this attitude. And if in any respect you have a different attitude, that too God will make clear to you. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Only let us stay true to what we have already attained.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Brothers and sisters, together follow my example and observe those who live by the pattern we gave you. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For there are many, of whom I have often told you, and now tell you even with tears, who live as enemies of the cross of Christ [rejecting and opposing His way of salvation], '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'whose fate is destruction, whose god is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' belly [their worldly appetite, their sensuality, their vanity], and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: whose
  - type: text
    text: ' glory is in their shame—who focus their mind on earthly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' temporal things. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But [we are different, because] our citizenship is in heaven. And from there we eagerly await [the coming of] the Savior, the Lord Jesus Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'who, by exerting that power which enables Him even to subject everything to Himself, will [not only] transform [but completely refashion] our '
  - type: usfm
    marker: it
    children:
    - type: text
      text: earthly
  - type: text
    text: ' bodies so that they will be like His glorious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: resurrected
  - type: text
    text: ' body.'
