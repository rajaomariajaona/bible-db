    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'It came [to Jeremiah] also in the days of Jehoiakim the son of Josiah, king of Judah, [continuing] until the end of the eleventh year of Zedekiah the son of Josiah, king of Judah, [and continuing] until the exile of [the people of] Jerusalem in the fifth month (July-August, 586 '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: b
    - type: text
      text: .
    - type: usfm
      marker: sc
      children:
      - type: text
        text: c
    - type: text
      text: .). [2 Kin 25:8-11]
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Now the word of the L
    - type: usfm
