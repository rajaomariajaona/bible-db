          text: Jeremiah’s hometown, two or three miles north of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'Anathoth in the land of Benjamin, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “See, I have appointed you this day over the nations and over the kingdoms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To uproot and break down,
  - type: usfm
    marker: q1
    children:
    - type: text
