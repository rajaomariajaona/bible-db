  - type: text
    content: 'I will speak My judgments against them for all the wickedness of those who have abandoned (rejected) Me, offered sacrifices '
  - type: text
    content: or
  - type: text
    content: ' burned incense to other gods, and worshiped the [idolatrous] works of their own hands. '
  '17':
  - type: text
    content: 'But you [Jeremiah], '
  - type: note
    content: Gird up your loins, a phrase often found in the Bible, may be an urgent call to get ready for immediate action, or it may be a call to prepare for a coming action or event. The phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of a garment (tunic, cloaks, mantle, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather.
  - type: text
    content: 'gird up your loins [in preparation]! Get up and tell them all which I command you. Do not be distraught '
  - type: text
