    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me a second time, saying, “What do you see?” And I said, “I see a boiling pot, tilting away from the north [its mouth about to pour out on the south, on Judea].” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, “Out of the north the evil [which the prophets foretold as the result of national sin] will reveal itself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spill out on all the people of the land. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: For, behold, I will call all the tribes of the kingdoms of the north,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; “and they will come and each one will set his throne at the entrance of the gates of Jerusalem, and against all its surrounding walls, and against all the cities of Judah [as My judicial act, the consequence of Judah’s deliberate disobedience]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I will speak My judgments against them for all the wickedness of those who have abandoned (rejected) Me, offered sacrifices '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' burned incense to other gods, and worshiped the [idolatrous] works of their own hands. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But you [Jeremiah], '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Gird up your loins,
        - type: text
          text: ' a phrase often found in the Bible, may be an urgent call to get ready for immediate action, or it may be a call to prepare for a coming action or event. The phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of a garment (tunic, cloaks, mantle, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather.'
      marker-yv: yv-n
    - type: text
      text: 'gird up your loins [in preparation]! Get up and tell them all which I command you. Do not be distraught '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' break down at the sight of their [hostile] faces, or I will bewilder you before them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' allow you to be overcome. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now behold, I have made you today like a fortified city and like an iron pillar and like bronze walls against the whole land—against the [successive] kings of Judah, against its leaders, against its priests, and against the people of the land [giving you divine strength which no hostile power can overcome]. [Is 50:7; 54:17; Jer 6:27; 15:20; Luke 21:15; Acts 6:10] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'They will fight against you, but they will not [ultimately] prevail over you, for I am with you [always] to protect you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliver you,” says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
