    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then I said, “Ah, Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, I do not know how to speak,
  - type: usfm
    marker: q1
    children:
    - type: text
