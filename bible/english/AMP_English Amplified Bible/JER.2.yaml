    children:
    - type: text
      text: '1'
  - type: text
    text: Now the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Go and proclaim in the ears of Jerusalem, saying, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I remember [earnestly] the lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devotion of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In 2:2-3:5 '
      - type: usfm
        marker: it
        children:
        - type: text
          text: you
      - type: text
        text: ' and '
      - type: usfm
        marker: it
        children:
        - type: text
          text: your
      - type: text
        text: ' are plural and their antecedent is always the nation of Israel. The nation is sometimes called “Israel” and sometimes “the house of Israel.”'
    marker-yv: yv-n
  - type: text
    text: your youth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your time of betrothal [like that of a bride during the early years in Egypt and again at Sinai],
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you followed Me in the wilderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through a land not sown.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In general, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons (children) of Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israelites
      - type: text
        text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God).'
    marker-yv: yv-n
  - type: text
    text: Israel was holy [something set apart from ordinary purposes, consecrated] to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: The first fruits of His harvest [in which no outsider was allowed to share].
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who ate of it [injuring Israel] became guilty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Evil came on them,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', O house of Jacob, and all the families of the house of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“What injustice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unrighteousness did your fathers find in Me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That they have wandered far from Me
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [habitually] walked after emptiness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' futility and became empty?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “They did not say, ‘Where is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who brought us up from the land of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who led us through the wilderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through a land of deserts and of pits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through a land of drought and of the deep darkness [of the shadow of death],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through a land that no man passed through
- type: usfm
  marker: q1
  children:
  - type: text
    text: And where no man lived?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “I brought you into a plentiful land
- type: usfm
  marker: q1
  children:
  - type: text
    text: To eat its fruit and [enjoy] its good things.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you came and defiled My land
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you made My inheritance repulsive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “[Even] the priests did not say, ‘Where is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who deal with the law [given to Moses] did not know Me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shepherds also transgressed against Me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the prophets prophesied by [the authority and in the name of] Baal
- type: usfm
  marker: q1
  children:
  - type: text
    text: And walked after [idolatrous] things that did not benefit [them].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶“Therefore I will still contend (struggle) with you [by bringing judgment on you],” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “And I will contend with your children’s children.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “For cross over to the coasts of Kittim (Cyprus) [to the west] and see,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Send also to Kedar (Arabia) [to the east] and carefully observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And see whether there has been such [a thing] as this!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Has a nation [ever] changed gods
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though they were not gods [but merely man-made objects]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But My people have exchanged their Glory (the true God)
- type: usfm
  marker: q1
  children:
  - type: text
    text: For that [man-made idol] which does not benefit [them].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Be appalled, O heavens, at this;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Be shocked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shudder with horror [at the behavior of the people],” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“For My people have committed two evils:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have abandoned (rejected) Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The fountain of living water,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they have carved out their own cisterns,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Broken cisterns
- type: usfm
  marker: q1
  children:
  - type: text
    text: That cannot hold water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ¶“Is Israel a servant? Is he a slave by birth?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Why has he become a captive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a prey?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “The young lions have roared at him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They have made their voices heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' roared loudly.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they have made his land a waste;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His cities have been destroyed and are burned ruins, without inhabitant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Moreover, the men of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ruins of ancient Memphis are located on the west bank of the Nile River, about twelve miles south of Cairo.
    marker-yv: yv-n
  - type: text
    text: 'Memphis and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This city was located on the eastern edge of the Nile delta. Known today as Tell Defenneh (Defneh). Memphis and Tahpanhes were the most powerful Egyptian cities at this time.
    marker-yv: yv-n
  - type: text
    text: Tahpanhes [as powerful enemies]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have shaved the crown of your head [to degrade you].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Have you not brought this on yourself
- type: usfm
  marker: q1
  children:
  - type: text
    text: By abandoning (rejecting) the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When He led you in the way?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Now what are you doing by going to Egypt [in search of an ally],
- type: usfm
  marker: q1
  children:
  - type: text
    text: To drink the [muddy] waters of the Nile?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or what are you doing by going to Assyria [in search of an ally],
- type: usfm
  marker: q1
  children:
  - type: text
    text: To drink the [muddy] waters of the Euphrates?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Your own wickedness will discipline you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your desertion of the faith will punish you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Know therefore that it is an evil and bitter thing
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you to abandon (reject) the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And for you to be indifferent to Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dismiss the [reverent] fear of Me,” says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ¶“For long ago you broke your yoke [in deliberate disobedience]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And tore off your bonds [of the law that I gave you];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You said, ‘I will not serve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey You!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For on every high hill
- type: usfm
  marker: q1
  children:
  - type: text
    text: And under every green tree
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have lain down [in idolatrous worship] like a [compliant] prostitute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Yet I had planted you [O house of Israel as] a choice vine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A completely faithful seed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How then have you turned against Me
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Into degenerate shoots of a foreign '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wild vine [alien to Me]?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “For though you wash yourself with lye
- type: usfm
  marker: q1
  children:
  - type: text
    text: And use much soap,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stain of your guilt is [still] before Me [and you are soiled and dirty],” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “How can you say, ‘I am not defiled,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have not gone after [man-made gods like] the Baals’?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at your way in the valley;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Know [without any doubt] what you have done!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You are a swift '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' restless young [female] camel [in the heat of her passion] running here and there,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Or [you have the untamed and reckless nature of] a wild donkey accustomed to the wilderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That sniffs the wind in her passion [for the scent of a mate].
- type: usfm
  marker: q1
  children:
  - type: text
    text: In her mating season who can restrain her?
- type: usfm
  marker: q1
  children:
  - type: text
    text: No males seeking her need to weary themselves;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In her month they will find her [looking for them].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “[Cease your mad running after idols to]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep your feet from becoming bare
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your throat from becoming dry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you said, ‘It is hopeless!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For I have loved strangers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foreign gods,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will walk after them.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ¶“As the thief is shamed when he is caught,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So the house of Israel is shamed—
- type: usfm
  marker: q1
  children:
  - type: text
    text: They, their kings, their leaders,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their priests, and their prophets—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Who say to a tree, ‘You are my father,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to a stone, ‘You gave me birth.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they have turned their backs to Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And not their faces;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But in the time of their trouble they will say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Arise [O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] and save us.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “But where are your gods
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which you made for yourself?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them get up, if they can save you
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the time of your trouble!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For [as many as] the number of your cities
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are your gods, O Judah. [Why do not your many man-made idols run to help you?]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '¶“Why do you complain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contend with Me?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have all rebelled (transgressed) against Me,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “In vain I have punished your people [with the consequences of their disobedience];
- type: usfm
  marker: q1
  children:
  - type: text
    text: They received no insight from correction [and refused to change].
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your [own] sword has devoured your prophets
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a destroying lion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“O generation [that you are], consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' regard carefully the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have I been a wilderness to Israel [like a land without food],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A land of thick '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deep darkness [like a path without light]?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Why do My people say, ‘We [have broken loose and we] are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: free to
  - type: text
    text: ' roam [at will];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: We will no longer come to You’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “Can a virgin forget [to wear] her ornaments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or a bride her attire [that identifies her as a married woman]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet My people have forgotten Me
- type: usfm
  marker: q1
  children:
  - type: text
    text: Days without number.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “How well you prepare your path
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obtain [adulterous] love!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the most wicked of women
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have learned [indecent] ways from you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Also on your skirts is found
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lifeblood of the innocent poor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You did not find them breaking in [a house].
- type: usfm
  marker: q1
  children:
  - type: text
    text: But in spite of all these things [your disobedience, your love of idolatry, your lack of compassion]—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Yet you keep saying, ‘I am innocent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surely His anger has turned away from me.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Behold (listen very carefully), I will bring you to judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' will plead my case against you'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because you say, ‘I have not sinned.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“Why do you go around '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wander so much'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Changing your way?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Also, you will be shamed by Egypt
- type: usfm
  marker: q1
  children:
  - type: text
    text: As you were shamed by Assyria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “From Egypt also you will come away [as captives]
- type: usfm
  marker: q1
  children:
  - type: text
    text: With your hands on your head;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has rejected those in whom you trust (confide),'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you will not be successful with them.”
