document_id: ROM.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Impartiality of God
  - type: text
    content: 'Therefore you have no excuse '
  - type: text
    content: or
  - type: text
    content: ' justification, everyone of you who [hypocritically] '
  - type: note
    content: This is not a prohibition of judgment, nor is it a command to stop using godly wisdom, common sense, and moral courage together with God’s written word to discern right from wrong, to distinguish between morality and immorality, and to judge doctrinal truth. There are many judgments that are not only legitimate, but are commanded (cf John 7:24; 1 Cor 5:3, 12; Gal 1:8, 9; 1 John 4:1-3; 2 John 10); however, you cannot judge another if you are committing the same type of sin.
  - type: text
    content: 'judges '
  - type: text
    content: and
  - type: text
    content: ' condemns others; for in passing judgment on another person, you condemn yourself, because you who judge [from a position of arrogance or self-righteousness] are '
  - type: text
    content: habitually
  - type: text
    content: ' practicing the very same things [which you denounce]. '
  '10':
  - type: text
    content: 'but glory and honor and '
  - type: text
    content: inner
  - type: text
    content: ' peace [will be given] to everyone who '
  - type: text
    content: habitually
  - type: text
    content: ' does good, to the Jew first and also to the Greek. '
  '11':
  - type: text
    content: For God shows no partiality [no arbitrary favoritism; with Him one person is not more important than another]. [Deut 10:17; 2 Chr 19:7]
  '12':
  - type: text
    content: 'For all who have sinned without the Law will also perish without [regard to] the Law, and all who have sinned under the Law will be judged '
  - type: text
    content: and
  - type: text
    content: ' condemned by the Law. '
  '13':
  - type: text
    content: 'For it is not those who merely hear the Law [as it is read aloud] who are just '
  - type: text
    content: or
  - type: text
    content: ' righteous before God, but it is those who [actually] obey the Law who will be '
  - type: note
    content: Because of one’s personal faith in Jesus Christ as Savior, God graciously credits His righteousness to the believer. Justification denotes a legal standing with God as designated only by God. God declares a believer to be acquitted or innocent, then designates the believer to be brought into right standing before Him.
  - type: text
    content: 'justified [pronounced free of the guilt of sin and declared acceptable to Him]. '
  '14':
  - type: text
    content: 'When Gentiles, who do not have the Law [since it was given only to Jews], do '
  - type: note
    content: Lit by nature.
  - type: text
    content: 'instinctively the things the Law requires [guided only by their conscience], they are a law to themselves, though they do not have the Law. '
  '15':
  - type: text
    content: 'They show that the '
  - type: note
    content: Lit work of the Law.
  - type: text
    content: 'essential requirements of the Law are written in their hearts; and their conscience [their sense of right and wrong, their moral choices] bearing witness and their thoughts alternately accusing or perhaps defending them '
  '16':
  - type: text
    content: 'on that day when, '
  - type: note
    content: Lit according to my gospel.
  - type: text
    content: as my gospel proclaims, God will judge the secrets [all the hidden thoughts and concealed sins] of men through Christ Jesus. [Eccl 12:14]
  - type: heading
    content: The Jew Is Condemned by the Law
  '17':
  - type: text
    content: 'But if you bear the name “Jew” and rely on the Law [for your salvation] and boast in [your special relationship to] God, '
  '18':
  - type: text
    content: 'and [if you claim to] know His will and '
  - type: note
    content: Or discerningly distinguish between the things which differ.
  - type: text
    content: 'approve the things that are '
  - type: note
    content: Or excellent.
  - type: text
    content: 'essential '
  - type: text
    content: or
  - type: text
    content: ' have a sense of what is excellent, based on your instruction from the Law, '
  '19':
  - type: text
    content: 'and [if you] are confident that you are a [qualified] guide to the blind [those untaught in theology], a light to those who are in darkness, '
  '2':
  - type: text
    content: 'And we know that the judgment of God falls justly '
  - type: text
    content: and
  - type: text
    content: ' in accordance with truth on those who practice such things. '
  '20':
  - type: text
    content: 'and [that you are] '
  - type: note
    content: Or an instructor.
  - type: text
    content: 'a corrector of the foolish, a teacher of the [spiritually] '
  - type: note
    content: Lit infants.
  - type: text
    content: 'childish, having in the Law the embodiment of knowledge and of the truth— '
  '21':
  - type: text
    content: 'well then, you who teach others, do you not teach yourself? You who preach against stealing, do you steal [in ways that are discrete, but just as sinful]? '
  '22':
  - type: text
    content: 'You who say that one must not commit adultery, '
  - type: note
    content: In Judaism at that time, one of the leading schools of thought (that of Hillel) taught that a man could divorce his wife for any reason, such as cooking a bad meal. Paul may have in mind men who use a flimsy excuse to divorce their wives, with the real intent of marrying another woman. In God’s eyes, this is an act of adultery.
  - type: text
    content: 'do you commit adultery? You who detest idols, do you rob [pagan] temples [of valuable idols and offerings]? [Deut 7:25; Acts 19:37] '
  '23':
  - type: text
    content: 'You who boast in the Law, do you [repeatedly] dishonor God by '
  - type: note
    content: The Pharisees were distorting and breaking God’s law by giving their own interpretations priority over the plain meaning of the Scriptures.
  - type: text
    content: 'breaking the Law? '
  '24':
  - type: text
    content: For, “
  - type: heading
    content: the name of
  - type: text
    content: ' G'
  - type: heading
    content: od is blasphemed among the
  - type: text
    content: ' G'
  - type: heading
    content: entiles because of you
  - type: text
    content: ',” just as it is written [in Scripture]. [Is 52:5; Ezek 36:20]'
  '25':
  - type: text
    content: 'Circumcision [the sign of the covenant of Abraham] is indeed of value if you practice the Law; but if you '
  - type: text
    content: habitually
  - type: text
    content: ' break the Law, your circumcision has become uncircumcision [it is meaningless in God’s sight]. '
  '26':
  - type: text
    content: 'So if the uncircumcised man keeps the requirements of the Law, will not his uncircumcision be regarded [by God] as circumcision? '
  '27':
  - type: text
    content: 'Then he who is physically uncircumcised but keeps [the spirit of] the Law will judge you who, '
  - type: note
    content: Lit through the letter.
  - type: text
    content: 'even though you have the written code and circumcision, break the Law. '
  '28':
  - type: text
    content: 'For he is not a [real] Jew who is only one outwardly, nor is [true] circumcision something external and physical. '
  '29':
  - type: text
    content: 'But he is a Jew who is one inwardly; and [true] circumcision is '
  - type: text
    content: circumcision
  - type: text
    content: ' of the heart, by the Spirit, not by [the fulfillment of] the letter [of the Law]. His praise is not from men, but from God.'
  '3':
  - type: text
    content: 'But do you think this, O man, when you judge '
  - type: text
    content: and
  - type: text
    content: ' condemn those who practice such things, and yet do the same yourself, that you will escape God’s judgment '
  - type: text
    content: and
  - type: text
    content: ' elude His verdict? '
  '4':
  - type: text
    content: 'Or do you have no regard for the wealth of His kindness and tolerance and patience [in withholding His wrath]? Are you [actually] unaware '
  - type: text
    content: or
  - type: text
    content: ' ignorant [of the fact] that God’s kindness leads you to repentance [that is, to change your inner self, your old way of thinking—seek His purpose for your life]? '
  '5':
  - type: text
    content: 'But because of your callous stubbornness and unrepentant heart you are [deliberately] storing up wrath for yourself on the day of wrath when God’s righteous judgment will be revealed. '
  '6':
  - type: text
    content: 'He '
  - type: heading
    content: will pay back to each person according to his deeds
  - type: text
    content: ' [justly, as his deeds deserve]: [Ps 62:12; Prov 24:12] '
  '7':
  - type: text
    content: 'to those who by persistence in doing good seek [unseen but certain heavenly] glory, honor, and immortality, [He will give the gift of] eternal life. '
  '8':
  - type: text
    content: 'But for those who are selfishly ambitious '
  - type: text
    content: and
  - type: text
    content: ' self-seeking and disobedient to the truth but responsive to wickedness, [there will be] wrath and indignation. '
  '9':
  - type: text
    content: There will be
  - type: text
    content: ' tribulation and anguish [torturing confinement] for every human soul who does [or permits] evil, to the Jew first and also to the Greek, '
