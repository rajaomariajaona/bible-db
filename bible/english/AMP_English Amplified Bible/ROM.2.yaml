document_id: ROM.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Impartiality of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore you have no excuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' justification, everyone of you who [hypocritically] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is not a prohibition of judgment, nor is it a command to stop using godly wisdom, common sense, and moral courage together with God’s written word to discern right from wrong, to distinguish between morality and immorality, and to judge doctrinal truth. There are many judgments that are not only legitimate, but are commanded (cf John 7:24; 1 Cor 5:3, 12; Gal 1:8, 9; 1 John 4:1-3; 2 John 10); however, you cannot judge another if you are committing the same type of sin.
    marker-yv: yv-n
  - type: text
    text: 'judges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemns others; for in passing judgment on another person, you condemn yourself, because you who judge [from a position of arrogance or self-righteousness] are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: habitually
  - type: text
    text: ' practicing the very same things [which you denounce]. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And we know that the judgment of God falls justly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in accordance with truth on those who practice such things. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But do you think this, O man, when you judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemn those who practice such things, and yet do the same yourself, that you will escape God’s judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' elude His verdict? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Or do you have no regard for the wealth of His kindness and tolerance and patience [in withholding His wrath]? Are you [actually] unaware '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ignorant [of the fact] that God’s kindness leads you to repentance [that is, to change your inner self, your old way of thinking—seek His purpose for your life]? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But because of your callous stubbornness and unrepentant heart you are [deliberately] storing up wrath for yourself on the day of wrath when God’s righteous judgment will be revealed. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: will pay back to each person according to his deeds
  - type: text
    text: ' [justly, as his deeds deserve]: [Ps 62:12; Prov 24:12] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'to those who by persistence in doing good seek [unseen but certain heavenly] glory, honor, and immortality, [He will give the gift of] eternal life. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But for those who are selfishly ambitious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' self-seeking and disobedient to the truth but responsive to wickedness, [there will be] wrath and indignation. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There will be
  - type: text
    text: ' tribulation and anguish [torturing confinement] for every human soul who does [or permits] evil, to the Jew first and also to the Greek, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'but glory and honor and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: inner
  - type: text
    text: ' peace [will be given] to everyone who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: habitually
  - type: text
    text: ' does good, to the Jew first and also to the Greek. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For God shows no partiality [no arbitrary favoritism; with Him one person is not more important than another]. [Deut 10:17; 2 Chr 19:7]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For all who have sinned without the Law will also perish without [regard to] the Law, and all who have sinned under the Law will be judged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemned by the Law. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For it is not those who merely hear the Law [as it is read aloud] who are just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' righteous before God, but it is those who [actually] obey the Law who will be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because of one’s personal faith in Jesus Christ as Savior, God graciously credits His righteousness to the believer. Justification denotes a legal standing with God as designated only by God. God declares a believer to be acquitted or innocent, then designates the believer to be brought into right standing before Him.
    marker-yv: yv-n
  - type: text
    text: 'justified [pronounced free of the guilt of sin and declared acceptable to Him]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Gentiles, who do not have the Law [since it was given only to Jews], do '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: by nature
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'instinctively the things the Law requires [guided only by their conscience], they are a law to themselves, though they do not have the Law. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They show that the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: work of the Law
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'essential requirements of the Law are written in their hearts; and their conscience [their sense of right and wrong, their moral choices] bearing witness and their thoughts alternately accusing or perhaps defending them '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'on that day when, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: according to my gospel
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: as my gospel proclaims, God will judge the secrets [all the hidden thoughts and concealed sins] of men through Christ Jesus. [Eccl 12:14]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Jew Is Condemned by the Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But if you bear the name “Jew” and rely on the Law [for your salvation] and boast in [your special relationship to] God, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and [if you claim to] know His will and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: discerningly distinguish between the things which differ
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'approve the things that are '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: excellent
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'essential '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' have a sense of what is excellent, based on your instruction from the Law, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and [if you] are confident that you are a [qualified] guide to the blind [those untaught in theology], a light to those who are in darkness, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and [that you are] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: an instructor
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'a corrector of the foolish, a teacher of the [spiritually] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: infants
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'childish, having in the Law the embodiment of knowledge and of the truth— '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'well then, you who teach others, do you not teach yourself? You who preach against stealing, do you steal [in ways that are discrete, but just as sinful]? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You who say that one must not commit adultery, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Judaism at that time, one of the leading schools of thought (that of Hillel) taught that a man could divorce his wife for any reason, such as cooking a bad meal. Paul may have in mind men who use a flimsy excuse to divorce their wives, with the real intent of marrying another woman. In God’s eyes, this is an act of adultery.
    marker-yv: yv-n
  - type: text
    text: 'do you commit adultery? You who detest idols, do you rob [pagan] temples [of valuable idols and offerings]? [Deut 7:25; Acts 19:37] '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'You who boast in the Law, do you [repeatedly] dishonor God by '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Pharisees were distorting and breaking God’s law by giving their own interpretations priority over the plain meaning of the Scriptures.
    marker-yv: yv-n
  - type: text
    text: 'breaking the Law? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For, “
  - type: usfm
    marker: sc
    children:
    - type: text
      text: the name of
  - type: text
    text: ' G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od is blasphemed among the
  - type: text
    text: ' G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: entiles because of you
  - type: text
    text: ',” just as it is written [in Scripture]. [Is 52:5; Ezek 36:20]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Circumcision [the sign of the covenant of Abraham] is indeed of value if you practice the Law; but if you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: habitually
  - type: text
    text: ' break the Law, your circumcision has become uncircumcision [it is meaningless in God’s sight]. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So if the uncircumcised man keeps the requirements of the Law, will not his uncircumcision be regarded [by God] as circumcision? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then he who is physically uncircumcised but keeps [the spirit of] the Law will judge you who, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: through the letter
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'even though you have the written code and circumcision, break the Law. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For he is not a [real] Jew who is only one outwardly, nor is [true] circumcision something external and physical. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But he is a Jew who is one inwardly; and [true] circumcision is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: circumcision
  - type: text
    text: ' of the heart, by the Spirit, not by [the fulfillment of] the letter [of the Law]. His praise is not from men, but from God.'
