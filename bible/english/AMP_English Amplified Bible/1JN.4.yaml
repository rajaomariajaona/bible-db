document_id: 1JN.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Testing the Spirits
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, do not believe every spirit [speaking through a self-proclaimed prophet]; instead test the spirits to see whether they are from God, because many false prophets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' teachers have gone out into the world. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In this is love, not that we loved God, but that He loved us and sent His Son to be the propitiation [that is, the atoning sacrifice, and the satisfying offering] for our sins [fulfilling God’s requirement for justice against sin and placating His wrath]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, if God so loved us [in this incredible way], we also ought to love one another. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No one has seen God at any time. But if we love one another [with unselfish concern], God abides in us, and His love [the love that is His essence abides in us and] is completed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perfected in us. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By this we know [with confident assurance] that we abide in Him and He in us, because He has given to us His [Holy] Spirit. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We [who were with Him in person] have seen and testify [as eye-witnesses] that the Father has sent the Son to be the Savior of the world.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever confesses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledges that Jesus is the Son of God, God abides in him, and he in God. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have come to know [by personal observation and experience], and have believed [with deep, consistent faith] the love which God has for us. God is love, and the one who abides in love abides in God, and God abides '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' in him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In this [union and fellowship with Him], love is completed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perfected with us, so that we may have confidence in the day of judgment [with assurance and boldness to face Him]; because as He is, so are we in this world. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There is no fear in love [dread does not exist]. But perfect (complete, full-grown) love drives out fear, because fear involves [the expectation of divine] punishment, so the one who is afraid [of God’s judgment] is not perfected in love [has not grown into a sufficient understanding of God’s love]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We love, because '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Because God bestowed on humanity a free will, man is not forced to love Him, but rather consciously and freely chooses the response he makes to God’s love.
      marker-yv: yv-n
    - type: text
      text: 'He first loved us. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By this you know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize the Spirit of God: every spirit that acknowledges '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confesses [the fact] that Jesus Christ has [actually] come in the flesh [as a man] is from God [God is its source]; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anyone says, “I love God,” and hates (works against) his [Christian] brother he is a liar; for the one who does not love his brother whom he has seen, cannot love God whom he has not seen. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this commandment we have from Him, that the one who loves God should also [unselfishly] love his brother '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek the best for him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and every spirit that does not confess Jesus [acknowledging that He has come in the flesh, but would deny any of the Son’s true nature] is not of God; this is the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spirit
    - type: text
      text: ' of the antichrist, which you have heard is coming, and is now already in the world. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Little children (believers, dear ones), you are of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' you belong to Him and have [already] overcome them [the agents of the antichrist]; because He who is in you is greater than he (Satan) who is in the world [of sinful mankind]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They [who teach twisted doctrine] are of the world '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' belong to it; therefore they speak from the [viewpoint of the] world [with its immoral freedom and baseless theories—demanding compliance with their opinions and ridiculing the values of the upright], and the [gullible people of the] world listen closely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay attention to them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We [who teach God’s word] are from God [energized by the Holy Spirit], and whoever knows God [through personal experience] listens to us [and has a deeper understanding of Him]. Whoever is not of God does not listen to us. By this we know [without any doubt] the spirit of truth [motivated by God] and the spirit of error [motivated by Satan].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Is Love
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, let us [unselfishly] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 2:10.
      marker-yv: yv-n
    - type: text
      text: 'love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek the best for one another, for love is from God; and everyone who loves [others] is born of God and knows God [through personal experience]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The one who does not love has not become acquainted with God [does not and never did know Him], for God is love. [He is the originator of love, and it is an enduring attribute of His nature.] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By this the love of God was displayed in us, in that God has sent His [One and] only begotten Son [the One who is truly unique, the only One of His kind] into the world so that we might live through Him. '
