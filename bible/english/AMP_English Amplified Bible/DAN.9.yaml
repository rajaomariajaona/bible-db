  '1':
  - type: heading
    content: Daniel’s Prayer for His People
  - type: text
    content: 'In the first year of Darius the son of '
  - type: note
    content: Not the Ahasuerus (Xerxes) of the book of Esther.
  - type: text
    content: 'Ahasuerus, of Median descent, who was made king over the realm of the '
  - type: note
    content: See note 1:4.
  - type: text
    content: 'Chaldeans— '
  '10':
  - type: text
    content: and we have not obeyed the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' our God by walking in His laws which He set before us through His servants the prophets. '
  '11':
  - type: text
    content: 'Yes, all Israel has transgressed Your law, even turning aside, not obeying Your voice; so the curse has been poured out on us and the oath which is written in the Law of Moses the servant of God, because we have sinned against Him. [Lev 26:14-45; Deut 28:15-68] '
  '12':
  - type: text
    content: 'And He has carried out completely His [threatening] words which He had spoken against us and against our rulers [the kings, princes, and judges] who ruled us, to bring on us a great tragedy; for under the whole heaven there has not been done anything [so dreadful] like that which [He commanded and] was done to Jerusalem. '
  '13':
  - type: text
    content: 'Just as it is written in the Law of Moses, all this tragedy has come on us. Yet we have not wholeheartedly begged for forgiveness '
  - type: text
    content: and
  - type: text
    content: ' sought the favor of the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God by turning from our wickedness and paying attention to '
  - type: text
    content: and
  - type: text
    content: ' placing value in Your truth. [Deut 4:29; 28:15ff] '
  '14':
  - type: text
    content: Therefore the L
  - type: heading
    content: ord
  - type: text
    content: ' has kept the tragedy ready and has brought it on us, for the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God is [uncompromisingly] righteous '
  - type: text
    content: and
  - type: text
    content: ' openly just in all His works which He does—He keeps His word; and we have not obeyed His voice.'
  '15':
  - type: text
    content: '“And now, O Lord our God, who brought Your people out of the land of Egypt with a mighty hand and who made for Yourself a name, as it is today—we have sinned, we have been wicked. '
  '16':
  - type: text
    content: 'O Lord, in accordance with all Your righteous '
  - type: text
    content: and
  - type: text
    content: ' just acts, please let Your anger and Your wrath turn away from Your city Jerusalem, Your holy mountain. Because of our sins and the wickedness of our fathers, Jerusalem and Your people '
  - type: text
    content: have become
  - type: text
    content: ' an object of scorn '
  - type: text
    content: and
  - type: text
    content: ' a contemptuous byword to all who are around us. '
  '17':
  - type: text
    content: 'Now therefore, our God, listen to (heed) the prayer of Your servant '
  - type: note
    content: Compare this verse with Ezek 14:12-20.
  - type: text
    content: '(Daniel) and his supplications, and for Your own sake let Your face shine on Your desolate sanctuary. '
  '18':
  - type: text
    content: 'O my God, incline Your ear and hear; open Your eyes and look at our desolations and the city which is called by Your name; for we are not presenting our supplications before You because of our own merits '
  - type: text
    content: and
  - type: text
    content: ' righteousness, but because of Your great mercy '
  - type: text
    content: and
  - type: text
    content: ' compassion. '
  '19':
  - type: text
    content: O Lord, hear! O Lord, forgive! O Lord, listen and take action! Do not delay, for Your own sake, O my God, because Your city and Your people are called by Your name.”
  - type: heading
    content: Gabriel Brings an Answer
  '2':
  - type: text
    content: in the first year of his reign, I, Daniel, understood from the books the number of years which, according to the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' to Jeremiah the prophet, must pass before the desolations [which had been] pronounced on Jerusalem would end; and it was seventy years. [Jer 25:11, 12; 29:10] '
  '20':
  - type: text
    content: While I was still speaking and praying, and confessing my sin and the sin of my people Israel, and presenting my supplication before the L
  - type: heading
    content: ord
  - type: text
    content: ' my God in behalf of the holy mountain of my God, '
  '21':
  - type: text
    content: 'while I was still speaking in prayer and '
  - type: note
    content: Lit wearied with weariness.
  - type: text
    content: 'extremely exhausted, the man Gabriel, whom I had seen in the earlier vision, came to me about the time of the evening sacrifice. [Dan 8:16] '
  '22':
  - type: text
    content: 'He instructed me and he talked with me and said, “O Daniel, I have now come to give you insight '
  - type: text
    content: and
  - type: text
    content: ' wisdom and understanding. '
  '23':
  - type: text
    content: 'At the beginning of your supplications, the command [to give you an answer] was issued, and I have come to tell you, for you are highly regarded '
  - type: text
    content: and
  - type: text
    content: ' greatly beloved. Therefore consider the message and begin to understand the [meaning of the] vision.'
  - type: heading
    content: Seventy Weeks and the Messiah
  '24':
  - type: text
    content: '“Seventy weeks [of years, or 490 years] '
  - type: note
    content: I.e. cut off, decided, determined. This phrase occurs only here and indicates a period of time set aside for a certain purpose. The prophecy that follows pertains only to the Jews and Jerusalem. It records six objectives to be achieved by the Messiah. The first three are resolved by the death and resurrection of Jesus; the final three are resolved at His second coming.
  - type: text
    content: 'have been decreed for your people and for your holy city (Jerusalem), to finish the transgression, to make an end of sins, to make atonement (reconciliation) for wickedness, to bring in everlasting righteousness (right-standing with God), to seal up vision and prophecy '
  - type: text
    content: and
  - type: text
    content: ' prophet, and to anoint the Most Holy '
  - type: text
    content: Place
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'So you are to know and understand that from the issuance of the command to restore and rebuild Jerusalem until [the coming of] the Messiah (the Anointed One), the Prince, '
  - type: text
    content: there will be
  - type: text
    content: ' seven weeks [of years] and sixty-two weeks [of years]; it will be built again, with [a city] plaza and moat, even in times of trouble. '
  '26':
  - type: text
    content: 'Then after the sixty-two weeks [of years] the Anointed One will be cut off [and denied His Messianic kingdom] and have nothing [and no one to defend Him], and the people of the [other] prince who is to come will destroy the city and the sanctuary. Its end '
  - type: text
    content: will come
  - type: text
    content: ' with a flood; even to the end there will be war; desolations are determined. [Is 53:7-9; Nah 1:8; Matt 24:6-14] '
  '27':
  - type: text
    content: 'And he will enter into a binding '
  - type: text
    content: and
  - type: text
    content: ' irrevocable covenant with the many for one week (seven years), but in the middle of the week he will stop the sacrifice and grain offering [for the remaining three and one-half years]; and on the wing of abominations '
  - type: text
    content: will come
  - type: text
    content: ' one who makes desolate, even until the complete destruction, one that is decreed, is poured out on the one who causes the horror.”'
  '3':
  - type: text
    content: 'So I directed my attention to the Lord God to seek Him by prayer and supplications, with fasting, sackcloth and ashes. '
  '4':
  - type: text
    content: I prayed to the L
  - type: heading
    content: ord
  - type: text
    content: ' my God and confessed and said, “O Lord, the great and awesome God, who keeps His covenant and extends lovingkindness toward those who love Him and keep His commandments, '
  '5':
  - type: text
    content: 'we have sinned and committed wrong, and have behaved wickedly and have rebelled, turning away from Your commandments and ordinances. '
  '6':
  - type: text
    content: 'Further, we have not listened to '
  - type: text
    content: and
  - type: text
    content: ' heeded Your servants the prophets, who spoke in Your name to our kings, our princes and our fathers, and to all the people of the land.'
  '7':
  - type: text
    content: '“Righteousness belongs to You, O Lord, but to us confusion '
  - type: text
    content: and
  - type: text
    content: ' open shame, as it is this day—to the men of Judah, to the inhabitants of Jerusalem, and to all Israel, those who are nearby and those who are far away, in all the countries to which You have driven them, because of the [treacherous] acts of unfaithfulness which they have committed against You. '
  '8':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', to us belong confusion '
  - type: text
    content: and
  - type: text
    content: ' open shame—to our kings, to our princes, and to our fathers—because we have sinned against You. '
  '9':
  - type: text
    content: 'To the Lord our God '
  - type: text
    content: belong
  - type: text
    content: ' mercy '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness and forgiveness, for we have rebelled against Him; '
