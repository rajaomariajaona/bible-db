document_id: DAN.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Daniel’s Prayer for His People
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the first year of Darius the son of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Not the Ahasuerus (Xerxes) of the book of Esther.
      marker-yv: yv-n
    - type: text
      text: 'Ahasuerus, of Median descent, who was made king over the realm of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:4.
      marker-yv: yv-n
    - type: text
      text: 'Chaldeans— '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: and we have not obeyed the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God by walking in His laws which He set before us through His servants the prophets. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Yes, all Israel has transgressed Your law, even turning aside, not obeying Your voice; so the curse has been poured out on us and the oath which is written in the Law of Moses the servant of God, because we have sinned against Him. [Lev 26:14-45; Deut 28:15-68] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And He has carried out completely His [threatening] words which He had spoken against us and against our rulers [the kings, princes, and judges] who ruled us, to bring on us a great tragedy; for under the whole heaven there has not been done anything [so dreadful] like that which [He commanded and] was done to Jerusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Just as it is written in the Law of Moses, all this tragedy has come on us. Yet we have not wholeheartedly begged for forgiveness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sought the favor of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God by turning from our wickedness and paying attention to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' placing value in Your truth. [Deut 4:29; 28:15ff] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Therefore the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has kept the tragedy ready and has brought it on us, for the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God is [uncompromisingly] righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' openly just in all His works which He does—He keeps His word; and we have not obeyed His voice.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“And now, O Lord our God, who brought Your people out of the land of Egypt with a mighty hand and who made for Yourself a name, as it is today—we have sinned, we have been wicked. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'O Lord, in accordance with all Your righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' just acts, please let Your anger and Your wrath turn away from Your city Jerusalem, Your holy mountain. Because of our sins and the wickedness of our fathers, Jerusalem and Your people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have become
    - type: text
      text: ' an object of scorn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a contemptuous byword to all who are around us. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now therefore, our God, listen to (heed) the prayer of Your servant '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare this verse with Ezek 14:12-20.
      marker-yv: yv-n
    - type: text
      text: '(Daniel) and his supplications, and for Your own sake let Your face shine on Your desolate sanctuary. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'O my God, incline Your ear and hear; open Your eyes and look at our desolations and the city which is called by Your name; for we are not presenting our supplications before You because of our own merits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteousness, but because of Your great mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compassion. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: O Lord, hear! O Lord, forgive! O Lord, listen and take action! Do not delay, for Your own sake, O my God, because Your city and Your people are called by Your name.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gabriel Brings an Answer
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: in the first year of his reign, I, Daniel, understood from the books the number of years which, according to the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to Jeremiah the prophet, must pass before the desolations [which had been] pronounced on Jerusalem would end; and it was seventy years. [Jer 25:11, 12; 29:10] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: While I was still speaking and praying, and confessing my sin and the sin of my people Israel, and presenting my supplication before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God in behalf of the holy mountain of my God, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'while I was still speaking in prayer and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: wearied with weariness
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'extremely exhausted, the man Gabriel, whom I had seen in the earlier vision, came to me about the time of the evening sacrifice. [Dan 8:16] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'He instructed me and he talked with me and said, “O Daniel, I have now come to give you insight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wisdom and understanding. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'At the beginning of your supplications, the command [to give you an answer] was issued, and I have come to tell you, for you are highly regarded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greatly beloved. Therefore consider the message and begin to understand the [meaning of the] vision.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Seventy Weeks and the Messiah
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“Seventy weeks [of years, or 490 years] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I.e. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: cut off, decided, determined.
        - type: text
          text: ' This phrase occurs only here and indicates a period of time set aside for a certain purpose. The prophecy that follows pertains only to the Jews and Jerusalem. It records six objectives to be achieved by the Messiah. The first three are resolved by the death and resurrection of Jesus; the final three are resolved at His second coming.'
      marker-yv: yv-n
    - type: text
      text: 'have been decreed for your people and for your holy city (Jerusalem), to finish the transgression, to make an end of sins, to make atonement (reconciliation) for wickedness, to bring in everlasting righteousness (right-standing with God), to seal up vision and prophecy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prophet, and to anoint the Most Holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Place
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So you are to know and understand that from the issuance of the command to restore and rebuild Jerusalem until [the coming of] the Messiah (the Anointed One), the Prince, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there will be
    - type: text
      text: ' seven weeks [of years] and sixty-two weeks [of years]; it will be built again, with [a city] plaza and moat, even in times of trouble. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then after the sixty-two weeks [of years] the Anointed One will be cut off [and denied His Messianic kingdom] and have nothing [and no one to defend Him], and the people of the [other] prince who is to come will destroy the city and the sanctuary. Its end '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will come
    - type: text
      text: ' with a flood; even to the end there will be war; desolations are determined. [Is 53:7-9; Nah 1:8; Matt 24:6-14] '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And he will enter into a binding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' irrevocable covenant with the many for one week (seven years), but in the middle of the week he will stop the sacrifice and grain offering [for the remaining three and one-half years]; and on the wing of abominations '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will come
    - type: text
      text: ' one who makes desolate, even until the complete destruction, one that is decreed, is poured out on the one who causes the horror.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So I directed my attention to the Lord God to seek Him by prayer and supplications, with fasting, sackcloth and ashes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I prayed to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God and confessed and said, “O Lord, the great and awesome God, who keeps His covenant and extends lovingkindness toward those who love Him and keep His commandments, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'we have sinned and committed wrong, and have behaved wickedly and have rebelled, turning away from Your commandments and ordinances. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Further, we have not listened to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heeded Your servants the prophets, who spoke in Your name to our kings, our princes and our fathers, and to all the people of the land.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Righteousness belongs to You, O Lord, but to us confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' open shame, as it is this day—to the men of Judah, to the inhabitants of Jerusalem, and to all Israel, those who are nearby and those who are far away, in all the countries to which You have driven them, because of the [treacherous] acts of unfaithfulness which they have committed against You. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', to us belong confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' open shame—to our kings, to our princes, and to our fathers—because we have sinned against You. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'To the Lord our God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belong
    - type: text
      text: ' mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness and forgiveness, for we have rebelled against Him; '
