    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' ‘Look'
  - type: text
    text: ' [He is] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: here!’ Do not go away
  - type: text
    text: ' [to see Him], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and do not run after '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For just like the lightning, when it flashes out of one part '
