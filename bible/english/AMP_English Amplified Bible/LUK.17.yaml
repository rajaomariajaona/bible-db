    children:
    - type: text
      text: Instructions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus said to His disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stumbling blocks
  - type: text
    text: ' [temptations and traps set to lure one to sin] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: are sure to come, but woe (judgment is coming) to him through whom they come!
  - type: text
    text: ' [Matt 18:7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It would be better for him if a millstone
  - type: text
    text: ' [as large as one turned by a donkey] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'were hung around his neck and he were hurled into the sea, than for him to cause one of these '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. believers.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: little ones to stumble
  - type: text
    text: ' [in sin and lose faith]. [Matt 18:6; Mark 9:42] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Pay attention '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' always be on guard'
  - type: text
    text: ' [looking out for one another]! '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If your brother sins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disregards God’s precepts, solemnly warn him; and if he repents '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' changes, forgive him.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Even if he sins against you seven times a day, and returns to you seven times and says, ‘I repent,’ you must forgive him
  - type: text
    text: ' [that is, give up resentment and consider the offense recalled and annulled].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The apostles said to the Lord, “Increase our faith [our ability to confidently trust in God and in His power].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the Lord said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“If you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus used this moment to emphasize that a person’s confident, abiding faith combined with God’s will and power can produce absolutely amazing results. God is fully capable of doing that which man regards as impossible (Mark 14:36; James 4:3).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: have
  - type: text
    text: ' [confident, abiding] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: faith in God
  - type: text
    text: ' [even as small] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as a mustard seed, you could say to this mulberry tree
  - type: text
    text: ' [which has very strong roots], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Be pulled up by the roots and be planted in the sea’; and
  - type: text
    text: ' [if the request was in agreement with the will of God] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: it would have obeyed you.
  - type: text
    text: ' [Matt 17:20; Mark 11:23; 1 John 5:14]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Which of you who has a servant plowing or tending sheep will say to him when he comes in from the field, ‘Come at once and sit down to eat?’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Will he not instead say to him, ‘Prepare something for me to eat, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: appropriately
    - type: text
      text: ' clothe yourself'
  - type: text
    text: ' [for service] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and serve me while I eat and drink; then afterward you may eat and drink?’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He does not thank the servant just because he did what he was ordered to do, does he?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'So you too, when you have done everything that was assigned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' commanded you, say, ‘We are unworthy servants'
  - type: text
    text: ' [undeserving of praise or a reward, for we have not gone beyond our obligation]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'we have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: merely
    - type: text
      text: ' done what we ought to do.’ ”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ten Lepers Cleansed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'While Jesus was on the way to Jerusalem, He was passing [along the border] between Samaria and Galilee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'As He entered a village, He was met by ten lepers who stood at a distance; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and they raised their voices and called out, “Jesus, Master, have mercy on us!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When He saw them, He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go and show yourselves to the priests.”
  - type: text
    text: ' And as they went, they were [miraculously] healed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made clean. [Lev 14:2-32] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'One of them, when he saw that he was healed, turned back, glorifying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praising '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honoring God with a loud voice; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and he lay face downward at Jesus’ feet, thanking Him [over and over]. He was a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Samaritans and the Jews ordinarily despised each other.
    marker-yv: yv-n
  - type: text
    text: 'Samaritan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Jesus asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Were not ten
  - type: text
    text: ' [of you] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: cleansed? Where are the
  - type: text
    text: ' [other] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: nine?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Was there no one found to return and to give thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise to God, except this foreigner?”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Get up and go
  - type: text
    text: ' [on your way]. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Your faith
  - type: text
    text: ' [your personal trust in Me and your confidence in God’s power] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has restored you to health.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now having been asked by the Pharisees when the kingdom of God would come, He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“The kingdom of God is not coming with signs to be observed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' with a visible display;'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: nor will people say, ‘Look! Here it is!’ or, ‘There it is!’ For the kingdom of God is among you
  - type: text
    text: ' [because of My presence].”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
