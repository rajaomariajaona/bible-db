        children:
        - type: text
          text: under heaven
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of the sky, so
  - type: text
    text: ' [visible] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will the Son of Man be in His day.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But first He must suffer many things and be repudiated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' considered unfit'
  - type: text
    text: ' [to be the Messiah] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: by this
  - type: text
    text: ' [unbelieving] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: generation.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And just as it was in the days of Noah, so it will be in the '
  - type: usfm
