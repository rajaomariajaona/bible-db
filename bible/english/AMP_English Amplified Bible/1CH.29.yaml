verses:
  '1':
  - type: heading
    content: Offerings for the Temple
  - type: text
    content: 'And King David said to all the assembly, “My son Solomon, whom alone God has chosen, is still young and inexperienced and the work is great; for the '
  - type: note
    content: Lit palace.
  - type: text
    content: temple is not for man but for the L
  - type: heading
    content: ord
  - type: text
    content: ' God. '
  '10':
  - type: text
    content: Therefore David blessed the L
  - type: heading
    content: ord
  - type: text
    content: ' in the sight of all the assembly and said, “Blessed (praised, adored, and thanked) are You, O L'
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel (Jacob) our father, forever and ever. '
  '11':
  - type: text
    content: Yours, O L
  - type: heading
    content: ord
  - type: text
    content: ', is the greatness and the power and the glory and the victory and the majesty, indeed everything that is in the heavens and on the earth; Yours is the dominion '
  - type: text
    content: and
  - type: text
    content: ' kingdom, O L'
  - type: heading
    content: ord
  - type: text
    content: ', and You exalt Yourself as head over all. '
  '12':
  - type: text
    content: 'Both riches and honor '
  - type: text
    content: come
  - type: text
    content: ' from You, and You rule over all. In Your hand is power and might; and it is in Your hands to make great and to give strength to everyone. '
  '13':
  - type: text
    content: Now therefore, our God, we thank You, and praise Your glorious name.
  '14':
  - type: text
    content: '“But who am I, and who are my people, that we should be able to offer as generously as this? For all things come from You, and from Your own hand we have given to You. '
  '15':
  - type: text
    content: 'For we are '
  - type: note
    content: I.e. temporary residents, resident aliens.
  - type: text
    content: 'sojourners before You, and tenants, as all our fathers were; our days on the earth are like a shadow, and there is no hope [of remaining]. '
  '16':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ' our God, all this abundance that we have prepared to build You a house for Your holy Name, it is from Your hand, and is all Your own. '
  '17':
  - type: text
    content: 'I know also, my God, that You test the heart and delight in uprightness '
  - type: text
    content: and
  - type: text
    content: ' integrity. In the uprightness of my heart I have willingly offered all these '
  - type: text
    content: things
  - type: text
    content: '. So now with joy I have seen Your people who are present here, make their offerings willingly '
  - type: text
    content: and
  - type: text
    content: ' freely to You. '
  '18':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', God of Abraham, Isaac, and Israel, our fathers, keep forever such purposes '
  - type: text
    content: and
  - type: text
    content: ' thoughts in the minds of Your people, and direct their hearts toward You; '
  '19':
  - type: text
    content: and give to my son Solomon a perfect heart to keep Your commandments, Your testimonies, and Your statutes, and to do all [that is necessary] to build the temple [for You], for which I have made provision.”
  '2':
  - type: text
    content: 'So with all my ability I have provided for the house of my God the gold for the '
  - type: text
    content: things of
  - type: text
    content: ' gold, silver for the '
  - type: text
    content: things of
  - type: text
    content: ' silver, bronze for the '
  - type: text
    content: things of
  - type: text
    content: ' bronze, iron for the '
  - type: text
    content: things of
  - type: text
    content: ' iron, and wood for the '
  - type: text
    content: things of
  - type: text
    content: ' wood, '
  - type: text
    content: as well as
  - type: text
    content: ' onyx stones and stones to be inlaid, stones of antimony (a brittle, silvery-white metal) and stones of various colors, and all kinds of precious stones and alabaster in abundance. '
  '20':
  - type: text
    content: Then David said to all the assembly, “Now bless (praise, thank) the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.” And all the assembly blessed the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of their fathers, and bowed down and honored the L'
  - type: heading
    content: ord
  - type: text
    content: ' and the king [as His earthly representative].'
  - type: heading
    content: Sacrifices
  '21':
  - type: text
    content: The next day they offered sacrifices and burnt offerings to the L
  - type: heading
    content: ord
  - type: text
    content: ': 1,000 bulls, 1,000 rams, and 1,000 lambs, with their drink offerings (libations) and sacrifices in abundance for all Israel. '
  '22':
  - type: text
    content: They ate and drank that day before the L
  - type: heading
    content: ord
  - type: text
    content: ' with great rejoicing.'
  - type: heading
    content: Solomon Again Made King
  - type: text
    content: T
  - type: text
    content: hey made Solomon the son of David king a second time, and anointed him as ruler for the L
  - type: heading
    content: ord
  - type: text
    content: ' and Zadok as [high] priest. '
  '23':
  - type: text
    content: Then Solomon sat on the throne of the L
  - type: heading
    content: ord
  - type: text
    content: ' as king in place of David his father; and he prospered, and all Israel obeyed him. '
  '24':
  - type: text
    content: 'All of the leaders and warriors, and also all the sons of King David, pledged allegiance to King Solomon. '
  '25':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' highly exalted Solomon in the sight of all Israel, and bestowed on him royal majesty which had not been on any king before him in Israel.'
  '26':
  - type: text
    content: 'Thus David the son of Jesse reigned over all Israel. '
  '27':
  - type: text
    content: The time that he reigned over Israel was forty years; he reigned seven years in Hebron and thirty-three years in Jerusalem.
  - type: heading
    content: Death of David
  '28':
  - type: text
    content: 'He died in a good old age [his seventy-first year], full of days (satisfied), riches and honor. Solomon his son reigned in his place. '
  '29':
  - type: text
    content: 'Now the acts of King David, from first to last, are written in the chronicles (records) of Samuel the seer, in the chronicles of Nathan the prophet, and in the chronicles of Gad the seer, '
  '3':
  - type: text
    content: 'Moreover, because I delight in the house of my God, the [personal] treasure that I have of gold and silver, I give to the house of my God, in addition to all that I have already provided for the holy house: '
  '30':
  - type: text
    content: 'with [accounts of] all his reign, and his power, and the times '
  - type: text
    content: and
  - type: text
    content: ' circumstances which came on him, on Israel, and on all the kingdoms of the [surrounding] lands.'
  '4':
  - type: text
    content: namely
  - type: text
    content: ', 3,000 talents of gold from the gold of Ophir, and 7,000 talents of refined silver, to overlay the walls of the buildings; '
  '5':
  - type: text
    content: 'gold for the '
  - type: text
    content: things of
  - type: text
    content: ' gold, silver for the '
  - type: text
    content: things of
  - type: text
    content: ' silver, that is, for all the work to be done by craftsmen. Now who is willing to '
  - type: note
    content: Lit fill his hand.
  - type: text
    content: consecrate himself today to the L
  - type: heading
    content: ord
  - type: text
    content: ?”
  '6':
  - type: text
    content: 'Then the rulers of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ', and leaders of the tribes of Israel, and the commanders of thousands and of hundreds, with the overseers of the king’s work, offered willingly '
  '7':
  - type: text
    content: 'and gave for the service of the house of God: 5,000 talents and 10,000 darics of gold, and 10,000 talents of silver, and 18,000 talents of bronze, and 100,000 talents of iron. '
  '8':
  - type: text
    content: 'Whoever had '
  - type: text
    content: precious
  - type: text
    content: ' stones gave them to the treasury of the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ', in the care of Jehiel the Gershonite. '
  '9':
  - type: text
    content: 'Then the people rejoiced because they had given willingly, for with a whole '
  - type: text
    content: and
  - type: text
    content: ' blameless heart they had offered freely to the L'
  - type: heading
    content: ord
  - type: text
    content: . King David also rejoiced greatly.
  - type: heading
    content: David’s Prayer
