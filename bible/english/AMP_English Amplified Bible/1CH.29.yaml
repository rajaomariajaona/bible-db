document_id: 1CH.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Offerings for the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And King David said to all the assembly, “My son Solomon, whom alone God has chosen, is still young and inexperienced and the work is great; for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: palace
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: temple is not for man but for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So with all my ability I have provided for the house of my God the gold for the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things of
  - type: text
    text: ' gold, silver for the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things of
  - type: text
    text: ' silver, bronze for the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things of
  - type: text
    text: ' bronze, iron for the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things of
  - type: text
    text: ' iron, and wood for the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things of
  - type: text
    text: ' wood, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as well as
  - type: text
    text: ' onyx stones and stones to be inlaid, stones of antimony (a brittle, silvery-white metal) and stones of various colors, and all kinds of precious stones and alabaster in abundance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moreover, because I delight in the house of my God, the [personal] treasure that I have of gold and silver, I give to the house of my God, in addition to all that I have already provided for the holy house: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: it
    children:
    - type: text
      text: namely
  - type: text
    text: ', 3,000 talents of gold from the gold of Ophir, and 7,000 talents of refined silver, to overlay the walls of the buildings; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'gold for the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things of
  - type: text
    text: ' gold, silver for the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things of
  - type: text
    text: ' silver, that is, for all the work to be done by craftsmen. Now who is willing to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fill his hand
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: consecrate himself today to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the rulers of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ', and leaders of the tribes of Israel, and the commanders of thousands and of hundreds, with the overseers of the king’s work, offered willingly '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and gave for the service of the house of God: 5,000 talents and 10,000 darics of gold, and 10,000 talents of silver, and 18,000 talents of bronze, and 100,000 talents of iron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Whoever had '
  - type: usfm
    marker: it
    children:
    - type: text
      text: precious
  - type: text
    text: ' stones gave them to the treasury of the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in the care of Jehiel the Gershonite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the people rejoiced because they had given willingly, for with a whole '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blameless heart they had offered freely to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . King David also rejoiced greatly.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David’s Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Therefore David blessed the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in the sight of all the assembly and said, “Blessed (praised, adored, and thanked) are You, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel (Jacob) our father, forever and ever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Yours, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', is the greatness and the power and the glory and the victory and the majesty, indeed everything that is in the heavens and on the earth; Yours is the dominion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kingdom, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and You exalt Yourself as head over all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Both riches and honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: come
  - type: text
    text: ' from You, and You rule over all. In Your hand is power and might; and it is in Your hands to make great and to give strength to everyone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now therefore, our God, we thank You, and praise Your glorious name.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“But who am I, and who are my people, that we should be able to offer as generously as this? For all things come from You, and from Your own hand we have given to You. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For we are '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. temporary residents, resident aliens.
    marker-yv: yv-n
  - type: text
    text: 'sojourners before You, and tenants, as all our fathers were; our days on the earth are like a shadow, and there is no hope [of remaining]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, all this abundance that we have prepared to build You a house for Your holy Name, it is from Your hand, and is all Your own. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I know also, my God, that You test the heart and delight in uprightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' integrity. In the uprightness of my heart I have willingly offered all these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things
  - type: text
    text: '. So now with joy I have seen Your people who are present here, make their offerings willingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' freely to You. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', God of Abraham, Isaac, and Israel, our fathers, keep forever such purposes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoughts in the minds of Your people, and direct their hearts toward You; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: and give to my son Solomon a perfect heart to keep Your commandments, Your testimonies, and Your statutes, and to do all [that is necessary] to build the temple [for You], for which I have made provision.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then David said to all the assembly, “Now bless (praise, thank) the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.” And all the assembly blessed the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of their fathers, and bowed down and honored the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the king [as His earthly representative].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sacrifices
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The next day they offered sacrifices and burnt offerings to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': 1,000 bulls, 1,000 rams, and 1,000 lambs, with their drink offerings (libations) and sacrifices in abundance for all Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They ate and drank that day before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with great rejoicing.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon Again Made King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: hey made Solomon the son of David king a second time, and anointed him as ruler for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and Zadok as [high] priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Solomon sat on the throne of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' as king in place of David his father; and he prospered, and all Israel obeyed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'All of the leaders and warriors, and also all the sons of King David, pledged allegiance to King Solomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' highly exalted Solomon in the sight of all Israel, and bestowed on him royal majesty which had not been on any king before him in Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Thus David the son of Jesse reigned over all Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The time that he reigned over Israel was forty years; he reigned seven years in Hebron and thirty-three years in Jerusalem.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Death of David
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He died in a good old age [his seventy-first year], full of days (satisfied), riches and honor. Solomon his son reigned in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now the acts of King David, from first to last, are written in the chronicles (records) of Samuel the seer, in the chronicles of Nathan the prophet, and in the chronicles of Gad the seer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'with [accounts of] all his reign, and his power, and the times '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' circumstances which came on him, on Israel, and on all the kingdoms of the [surrounding] lands.'
