document_id: EZK.38,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy about Gog and Future Invasion of Israel
  - type: text
    content: And the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “It will come about on that day that thoughts will come into your mind, and you will devise an evil plan, '
  '11':
  - type: text
    content: 'and you will say, ‘I will go up against an open country; I will come against those who are at rest '
  - type: text
    content: and
  - type: text
    content: ' peaceful, who live securely, all of them living without walls and having neither bars nor gates, '
  '12':
  - type: text
    content: 'to take spoil and seize plunder, to turn your hand against the ruins which are now inhabited, and against the people who are gathered from the nations, who have acquired cattle and goods, who live at the '
  - type: note
    content: Lit navel.
  - type: text
    content: 'center of the world [Israel].’ '
  '13':
  - type: text
    content: Sheba and Dedan and the merchants of Tarshish (southern Spain), with all its young lions (villages) will say to you, ‘Have you come to take spoil? Have you assembled your hordes [of fighting men] to seize plunder, to carry away silver and gold, to take away cattle and goods, to take great spoil?’ ” ’
  '14':
  - type: text
    content: “Therefore, son of man, prophesy and say to Gog, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “On that day when My people Israel live securely, will you not become aware of it [and become active]? '
  '15':
  - type: text
    content: 'You will come from your place in the remote parts of the north, you and many nations with you, all of them riding horses, a great horde, and a mighty army; '
  '16':
  - type: text
    content: and you will go up against My people Israel like a cloud to cover the land. In the last days it will come about that I will bring you against My land, so that the nations may know Me when I show Myself holy through you before their eyes, O Gog.”
  '17':
  - type: text
    content: ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Are you the one of whom I spoke in former days through My servants, the prophets of Israel, who prophesied in those days for many years that I would bring you (Gog) against them? '
  '18':
  - type: text
    content: It will come about on that day, when Gog comes against the land of Israel,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “that My wrath will rise and show on My face. '
  '19':
  - type: text
    content: 'In My zeal and in My blazing rage I declare that on that day there will most certainly be a '
  - type: note
    content: Today the Great Rift Valley, the longest fault line in the world (about 4,000 miles), runs from Syria through Israel to Mozambique in east Africa. Israel and the surrounding areas have experienced a significant number of moderate earthquakes (4.0 to 5.2 in magnitude) since the year 2000, and one could not rule out a massive earthquake even in the near future. Thus the stage is already set for the catastrophic earthquake described here.
  - type: text
    content: 'great earthquake in the land of Israel, '
  '2':
  - type: text
    content: '“Son of man, set your face against Gog of the land of Magog, the chief ruler of Meshech and Tubal, and prophesy against him, '
  '20':
  - type: text
    content: 'so that the fishes of the sea, the birds of the sky, the animals of the field, all the creatures that crawl on the earth, and all the men that are on the face of the earth will tremble '
  - type: text
    content: and
  - type: text
    content: ' shake at My presence; the mountains will crumble, the steep places will fall, and every wall will fall to the ground. '
  '21':
  - type: text
    content: I will call for a sword against Gog throughout all My mountains,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: '. “Every man’s (invading soldier’s) sword will be against his brother (ally) [in panic and confusion]. '
  '22':
  - type: text
    content: 'With pestilence and with bloodshed I will enter into judgment with Gog; and I will rain on him torrents of rain with [great] hailstones, '
  - type: note
    content: Perhaps a volcanic explosion.
  - type: text
    content: 'fire and brimstone on his hordes and on the many nations that are with him. [Ps 11:6] '
  '23':
  - type: text
    content: 'Thus I shall magnify Myself '
  - type: text
    content: and
  - type: text
    content: ' demonstrate My greatness and sanctify Myself, and I will be recognized '
  - type: text
    content: and
  - type: text
    content: ' will make Myself known in the sight of many nations; they will know [without any doubt] that I am the L'
  - type: heading
    content: ord
  - type: text
    content: .” ’
  '3':
  - type: text
    content: and say, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Behold, I am against you, O Gog, chief ruler of Meshech and Tubal. '
  '4':
  - type: text
    content: 'I will turn you around and put hooks into your jaws, and I will bring you out, and all your army, horses and horsemen, all of them magnificently clothed in full armor, a great horde with '
  - type: note
    content: See note Jer 46:3.
  - type: text
    content: 'buckler (small shield) and [large] shield, all of them wielding swords; '
  '5':
  - type: text
    content: 'Persia (Iran), Cush (Ethiopia), and Put (Libya, N. Africa) with them, all of them with shield and helmet; '
  '6':
  - type: text
    content: Gomer and all its troops; Beth-togarmah from the remote parts of the north and all its troops—many peoples with you.
  '7':
  - type: text
    content: 'You [Gog] be prepared; prepare yourself, you and all your hordes that are assembled around you, and be a guard '
  - type: text
    content: and
  - type: text
    content: ' a lookout for them. '
  '8':
  - type: text
    content: 'After many days you will be summoned [for service]; in the latter years you shall come into the land that is restored from [the ravages of] the sword, '
  - type: text
    content: where people
  - type: text
    content: ' have been gathered out of many nations to the mountains of Israel, which had been a continual wasteland; but its people were brought out of the nations, and they are living securely, all of them. [Is 24:22] '
  '9':
  - type: text
    content: You will go up [against them], you will come like a storm; you shall be like a cloud covering the land, you and all your troops, and many peoples with you.”
