document_id: EZK.38
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prophecy about Gog and Future Invasion of Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, set your face against Gog of the land of Magog, the chief ruler of Meshech and Tubal, and prophesy against him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and say, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Behold, I am against you, O Gog, chief ruler of Meshech and Tubal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I will turn you around and put hooks into your jaws, and I will bring you out, and all your army, horses and horsemen, all of them magnificently clothed in full armor, a great horde with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Jer 46:3.
    marker-yv: yv-n
  - type: text
    text: 'buckler (small shield) and [large] shield, all of them wielding swords; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Persia (Iran), Cush (Ethiopia), and Put (Libya, N. Africa) with them, all of them with shield and helmet; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Gomer and all its troops; Beth-togarmah from the remote parts of the north and all its troops—many peoples with you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'You [Gog] be prepared; prepare yourself, you and all your hordes that are assembled around you, and be a guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a lookout for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'After many days you will be summoned [for service]; in the latter years you shall come into the land that is restored from [the ravages of] the sword, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: where people
  - type: text
    text: ' have been gathered out of many nations to the mountains of Israel, which had been a continual wasteland; but its people were brought out of the nations, and they are living securely, all of them. [Is 24:22] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You will go up [against them], you will come like a storm; you shall be like a cloud covering the land, you and all your troops, and many peoples with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “It will come about on that day that thoughts will come into your mind, and you will devise an evil plan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and you will say, ‘I will go up against an open country; I will come against those who are at rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peaceful, who live securely, all of them living without walls and having neither bars nor gates, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'to take spoil and seize plunder, to turn your hand against the ruins which are now inhabited, and against the people who are gathered from the nations, who have acquired cattle and goods, who live at the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: navel
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'center of the world [Israel].’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sheba and Dedan and the merchants of Tarshish (southern Spain), with all its young lions (villages) will say to you, ‘Have you come to take spoil? Have you assembled your hordes [of fighting men] to seize plunder, to carry away silver and gold, to take away cattle and goods, to take great spoil?’ ” ’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Therefore, son of man, prophesy and say to Gog, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “On that day when My people Israel live securely, will you not become aware of it [and become active]? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You will come from your place in the remote parts of the north, you and many nations with you, all of them riding horses, a great horde, and a mighty army; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: and you will go up against My people Israel like a cloud to cover the land. In the last days it will come about that I will bring you against My land, so that the nations may know Me when I show Myself holy through you before their eyes, O Gog.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Are you the one of whom I spoke in former days through My servants, the prophets of Israel, who prophesied in those days for many years that I would bring you (Gog) against them? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: It will come about on that day, when Gog comes against the land of Israel,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “that My wrath will rise and show on My face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'In My zeal and in My blazing rage I declare that on that day there will most certainly be a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Today the Great Rift Valley, the longest fault line in the world (about 4,000 miles), runs from Syria through Israel to Mozambique in east Africa. Israel and the surrounding areas have experienced a significant number of moderate earthquakes (4.0 to 5.2 in magnitude) since the year 2000, and one could not rule out a massive earthquake even in the near future. Thus the stage is already set for the catastrophic earthquake described here.
    marker-yv: yv-n
  - type: text
    text: 'great earthquake in the land of Israel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'so that the fishes of the sea, the birds of the sky, the animals of the field, all the creatures that crawl on the earth, and all the men that are on the face of the earth will tremble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shake at My presence; the mountains will crumble, the steep places will fall, and every wall will fall to the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I will call for a sword against Gog throughout all My mountains,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '. “Every man’s (invading soldier’s) sword will be against his brother (ally) [in panic and confusion]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'With pestilence and with bloodshed I will enter into judgment with Gog; and I will rain on him torrents of rain with [great] hailstones, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps a volcanic explosion.
    marker-yv: yv-n
  - type: text
    text: 'fire and brimstone on his hordes and on the many nations that are with him. [Ps 11:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Thus I shall magnify Myself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demonstrate My greatness and sanctify Myself, and I will be recognized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' will make Myself known in the sight of many nations; they will know [without any doubt] that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .” ’
