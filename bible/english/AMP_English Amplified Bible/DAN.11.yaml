    text: 'Some of those who are [spiritually] wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have insight will fall [as martyrs] in order to refine, to purge and to make those among God’s people pure, until the end time; because it is yet to come at the time appointed [by God].'
