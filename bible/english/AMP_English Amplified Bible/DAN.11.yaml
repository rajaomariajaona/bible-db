    text: 'He will have no regard for the gods of his fathers or for the desire of women, nor will he have regard for any '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' god, for he shall magnify himself above them all. '
  - type: usfm
