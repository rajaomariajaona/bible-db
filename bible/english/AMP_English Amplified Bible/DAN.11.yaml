    marker-yv: yv-n
  - type: text
    text: 'king (the Antichrist) will do exactly as he pleases; he will exalt himself and magnify himself above every god and will speak astounding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgusting things against the God of gods and he will prosper until the indignation is finished, for that which is determined [by God] will be done. '
  - type: usfm
