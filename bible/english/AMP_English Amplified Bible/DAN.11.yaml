document_id: DAN.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Conflicts to Come
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Also I, in the first year of Darius the Mede, I (Gabriel) arose to be an encouragement and a protection for him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And now I will tell you the truth. Behold, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cambyses the son of Cyrus, Psuedo-Smerdis, and Darius I Hystaspes.
    marker-yv: yv-n
  - type: text
    text: 'three more kings are going to arise in Persia. Then a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Xerxes I who is also known as Ahasuerus in the Book of Esther.
    marker-yv: yv-n
  - type: text
    text: 'fourth will become far richer than all of them. When he becomes strong through his riches he will stir up the whole '
  - type: usfm
    marker: it
    children:
    - type: text
      text: empire
  - type: text
    text: ' against the realm of Greece. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There are many reasons for identifying this king as Alexander the Great, as well as identifying the other rulers according to their relationship to the events of those times. There is nothing in the context which makes it necessary to limit the passage to Alexander. Some ruler may arise in the end times to whom the prophecy will also apply.
    marker-yv: yv-n
  - type: text
    text: 'mighty [warlike, threatening] king will arise who will rule with great authority and do as he pleases. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But as soon as he (Alexander) has risen, his kingdom will be broken [by his death] and divided toward the four winds of heaven [the north, south, east, and west], but not to his descendants, nor according to the [Grecian] authority with which he ruled, for his kingdom will be torn out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uprooted and given to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 8:22.
    marker-yv: yv-n
  - type: text
    text: others (his four generals) to the exclusion of these.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Then the king of the South (Egypt) will be strong, along with one of his princes who will be stronger than he and have dominance over him; his domain will be a great dominion. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'After some years '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: they will
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the Syrian king of the North and the Egyptian king of the South will make an alliance; the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Berenice was the daughter of Ptolemy II Philadelphus.
    marker-yv: yv-n
  - type: text
    text: 'daughter (Berenice) of the king of the South will come to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: King Antiochus II Theos of Syria.
    marker-yv: yv-n
  - type: text
    text: 'king of the North to make an equitable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peaceful agreement (marriage); '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: King Antiochus II, Berenice and their baby were later murdered by the divorced wife of Antiochus II.
    marker-yv: yv-n
  - type: text
    text: 'but she will not retain the power of her position, nor will he retain his power. She will be handed over with her attendants and her father as well as he who supported her in those times. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But out of a branch of her [familial] roots will one (her brother, Ptolemy III Euergetes I) arise in his place, and he will come against the [Syrian] army and enter the fortress of the king of the North, and he will deal with them and will prevail. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Also he will carry off to Egypt their [Syrian] gods with their cast images and their precious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' costly treasure of silver and of gold, and he will refrain from waging war against the king of the North for some years. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Seleucus II Callinicus, successor to Antiochus II Theos.
    marker-yv: yv-n
  - type: text
    text: king of the North will come into the realm of the king of the South, but he will retreat to his own country [badly defeated].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“His sons will prepare for battle and assemble a multitude of great forces; which will keep on coming and overflow [the land], and pass through, so that they may again wage war as far as his fortress. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The king of the South (Ptolemy IV Philopator of Egypt) will be enraged and go out and fight with the king of the North (Antiochus III the Great); and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the latter
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the Syrian king will raise a great multitude (army), but the multitude shall be given into the hand of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Egyptian king
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When the multitude (army) is captured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carried away, the heart of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Egyptian king
  - type: text
    text: ' will be proud (arrogant), and he will cause tens of thousands to fall, but he will not prevail. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For the king of the North will again raise a multitude (army) greater than the one before, and after several years he will advance with a great army and substantial equipment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“In those times many will rise up against the king of the South (Egypt); also the violent men among your own people will arise in order to fulfill the [earlier] visions, but they will fail. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the king of the North (Syria) will come and build up siege ramps and capture a well-fortified city. The forces of the South will not stand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their ground,
  - type: text
    text: ' not even the finest troops, for there will be no strength to stand [against the Syrian king]. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But he (Syria) who comes against him (Egypt) will do exactly as he pleases, and no one will be able to stand against him; he (Antiochus III the Great) will also stay for a time in the Beautiful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Glorious Land [of Israel], with destruction in his hand. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He will be determined to come with the power of his entire kingdom, and propose equitable conditions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terms of peace, which he will put into effect [by making an agreement with the king of the South]. He will also give him his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cleopatra I, daughter of Antiochus III the Great, king of Syria, was married to Ptolemy V Epiphanes of Egypt. She supported her husband instead of her father during his attempt to conquer Egypt.
    marker-yv: yv-n
  - type: text
    text: 'daughter (Cleopatra I), '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in an attempt
  - type: text
    text: ' to overthrow the kingdom, but it will not succeed or be to his advantage. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'After this, he (Antiochus III the Great, King of Syria) will turn his attention to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Greek and Mediterranean territories under Rome’s influence.
    marker-yv: yv-n
  - type: text
    text: 'islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands and capture many [of them]. But a commander (Lucius Scipio Asiaticus of Rome) will put an end to his aggression [toward Rome’s territorial interests]; in fact, he will repay his insolence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turn his audacity back upon him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then he will turn back toward the fortresses of his own land [of Syria], but he will stumble and fall and not be found.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Then in his place one (his eldest son, Seleucus IV Philopator) will arise who will send an oppressor through the Jewel of his kingdom; yet within a few days he will be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Seleucus IV was poisoned soon after coming to power.
    marker-yv: yv-n
  - type: text
    text: 'shattered, though not in anger nor in battle. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And in his place [in Syria] will arise a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This contemptible conqueror is identified as Antiochus IV Epiphanes, the younger son of Antiochus III the Great, king of Syria, and is a type of the final Antichrist referred to in Dan 11:36; 2 Thess 2:3-12; 1 John 4:3; 2 John 7; and Rev 13:5-8. Antiochus IV Epiphanes attempted to destroy the worship of the true God by robbing the temple of its gold and silver treasures related to worship and setting up a statue of Jupiter in the Holy of Holies. He also breached the walls of Jerusalem, ordered a daily sacrifice of pig, forbade circumcision and destroyed all the sacred scrolls he could find (see note 8:10).
    marker-yv: yv-n
  - type: text
    text: 'despicable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despised person, to whom royal majesty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the honor of kingship have not been conferred, but he will come [without warning] in a time of tranquility and seize the kingdom by intrigue. [Dan 8:9-12, 23-25] '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The overwhelming forces [of the invading armies of Egypt] will be flooded away before him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' smashed; and also the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Onias III, the high priest at Jerusalem, was murdered by his brother Menelaus, who supported Antiochus IV Epiphanes. Antiochus IV later named Menelaus as high priest.
    marker-yv: yv-n
  - type: text
    text: 'prince of the covenant [will be smashed]. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Antiochus IV allied himself with Ptolemy VI Philometer, in opposition to Ptolemy VII Euergetes II, as a deceptive way to plunder and conquer much of Egypt.
    marker-yv: yv-n
  - type: text
    text: 'alliance is made with him he will work deceitfully, and he will go up and gain power with a small '
  - type: usfm
    marker: it
    children:
    - type: text
      text: force of
  - type: text
    text: ' people. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'In a time of tranquility, [without warning] he will enter the most productive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' richest parts of the kingdom [of Egypt], and he will accomplish that which his fathers never did, nor his fathers’ fathers; he will distribute plunder, spoil and goods among them. He will devise plans against strongholds, but only for a time [decreed by God]. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He will stir up his strength and courage against [his former Egyptian ally] the king of the South (Ptolemy VI) with a great army; so the king of the South will prepare an extremely great and powerful army to wage war, but he will not stand, for schemes will be devised against him. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Yes, those who eat his fine food will betray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroy him (Ptolemy VI), and his army will be swept away, and many will fall down slain. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And as for both of these '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ptolemy VI who was designated to rule at Memphis, and Ptolemy VII who was designated to rule at Alexandria, lied to Antiochus IV Epiphanes, and established a joint rule.
    marker-yv: yv-n
  - type: text
    text: 'kings, their hearts will be set on doing evil; they will speak lies over the same table, but it will not succeed, for the end is yet to come at the appointed time. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then he (Antiochus IV Epiphanes) will return to his land with great treasure (plunder); and his heart will be set against the holy covenant, and he will take action and return to his own land (Syria).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“At the time appointed [by God] he will return and come into the South, but this last time will not be successful as were the previous invasions [of Egypt]. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'For ships of Cyprus [in Roman hands] will come against him; therefore he will be discouraged and turn back [to Israel] and carry out his rage against the holy covenant and take action; so he will return and show favoritism toward those [Jews] who abandon (break) the holy covenant [with God]. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Armed forces of his will arise [in Jerusalem] and defile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desecrate the sanctuary, the [spiritual] stronghold, and will do away with the regular sacrifice [that is, the daily burnt offering]; and they will set up [a pagan altar in the sanctuary which is] the abomination of desolation. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'With smooth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: words
  - type: text
    text: ' [of flattery and praise] he will turn to godlessness those who [are willing to] disregard the [Mosaic] covenant, but the people who [are spiritually mature and] know their God will display strength and take action [to resist]. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They who are wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have spiritual insight among the people will instruct many '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' help them understand; yet for many days some [of them and their followers] will fall by the sword and by flame, by captivity and by plunder. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Now when they fall they will receive a little help, and many will join with them in hypocrisy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
