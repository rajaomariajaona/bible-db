  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Instead, he will honor a god of fortresses, a god whom his fathers did not know; he will honor him with gold and silver, with precious stones and with expensive things. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'He will act against the strongest fortresses with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the help of
  - type: text
    text: ' a foreign god; he will give great honor to those who acknowledge him and he will cause them to rule over the many, and will parcel out land for a price.'
