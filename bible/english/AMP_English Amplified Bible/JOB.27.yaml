document_id: JOB.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Affirms His Righteousness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Job continued his discourse and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“As God lives, who has taken away my right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' denied me justice,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the Almighty, who has caused bitterness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grief for my soul,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As long as my life is within me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the breath of God is [still] in my nostrils,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My lips will not speak unjustly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor will my tongue utter deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Far be it from me that I should admit you are right [in your accusations against me];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until I die, I will not remove my integrity from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“I hold fast my uprightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my right standing with God and I will not let them go;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart does not reproach me for any of my days.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The State of the Godless
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“May my enemy be as the wicked,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who rises up against me be as the unrighteous (unjust).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “For what is the hope of the godless, even though he has gained [in this world],
- type: usfm
  marker: q1
  children:
  - type: text
    text: When God takes his life?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Will God hear his cry
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distress come upon him?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Will he take delight in the Almighty?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will he call on God at all times?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I will teach you regarding the hand (power) of God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not conceal what is with the Almighty [God’s actual treatment of the wicked].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Behold, all of you have seen it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Why then do you act vainly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foolishly [cherishing worthless concepts]?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“This [which I am about to explain] is the portion of a wicked man from God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the inheritance which tyrants '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressors receive from the Almighty:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Though his children are many, they are destined for the sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his descendants will not have sufficient bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Those who survive him will be buried because of the plague,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [their] widows will not be able to weep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Though he heaps up silver like dust
- type: usfm
  marker: q1
  children:
  - type: text
    text: And piles up clothing like clay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He may prepare it, but the just will wear it
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the innocent will divide the silver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “He builds his house like a spider’s web,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a (temporary) hut which a watchman makes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “He lies down rich, but never will again;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He opens his eyes, and it is gone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Terrors overtake him like a [suddenly rising] flood;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A windstorm steals him away in the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “The east wind lifts him up, and he is gone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: It sweeps him out of his place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“For it will hurl [thunderbolts of God’s wrath] at him unsparingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without compassion;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He flees in haste from its power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “People will clap their hands at him [to mock and ridicule him]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And hiss him out of his place.
