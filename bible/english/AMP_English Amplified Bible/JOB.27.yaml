document_id: JOB.27,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Affirms His Righteousness
  - type: text
    content: Job continued his discourse and said,
  '10':
  - type: text
    content: “Will he take delight in the Almighty?
  - type: text
    content: Will he call on God at all times?
  '11':
  - type: text
    content: “I will teach you regarding the hand (power) of God;
  - type: text
    content: I will not conceal what is with the Almighty [God’s actual treatment of the wicked].
  '12':
  - type: text
    content: “Behold, all of you have seen it;
  - type: text
    content: 'Why then do you act vainly '
  - type: text
    content: and
  - type: text
    content: ' foolishly [cherishing worthless concepts]?'
  '13':
  - type: text
    content: ¶“This [which I am about to explain] is the portion of a wicked man from God,
  - type: text
    content: 'And the inheritance which tyrants '
  - type: text
    content: and
  - type: text
    content: ' oppressors receive from the Almighty:'
  '14':
  - type: text
    content: Though his children are many, they are destined for the sword;
  - type: text
    content: And his descendants will not have sufficient bread.
  '15':
  - type: text
    content: “Those who survive him will be buried because of the plague,
  - type: text
    content: And [their] widows will not be able to weep.
  '16':
  - type: text
    content: “Though he heaps up silver like dust
  - type: text
    content: And piles up clothing like clay,
  '17':
  - type: text
    content: He may prepare it, but the just will wear it
  - type: text
    content: And the innocent will divide the silver.
  '18':
  - type: text
    content: “He builds his house like a spider’s web,
  - type: text
    content: Like a (temporary) hut which a watchman makes.
  '19':
  - type: text
    content: “He lies down rich, but never will again;
  - type: text
    content: He opens his eyes, and it is gone.
  '2':
  - type: text
    content: '“As God lives, who has taken away my right '
  - type: text
    content: and
  - type: text
    content: ' denied me justice,'
  - type: text
    content: 'And the Almighty, who has caused bitterness '
  - type: text
    content: and
  - type: text
    content: ' grief for my soul,'
  '20':
  - type: text
    content: “Terrors overtake him like a [suddenly rising] flood;
  - type: text
    content: A windstorm steals him away in the night.
  '21':
  - type: text
    content: “The east wind lifts him up, and he is gone;
  - type: text
    content: It sweeps him out of his place.
  '22':
  - type: text
    content: '“For it will hurl [thunderbolts of God’s wrath] at him unsparingly '
  - type: text
    content: and
  - type: text
    content: ' without compassion;'
  - type: text
    content: He flees in haste from its power.
  '23':
  - type: text
    content: “People will clap their hands at him [to mock and ridicule him]
  - type: text
    content: And hiss him out of his place.
  '3':
  - type: text
    content: As long as my life is within me,
  - type: text
    content: And the breath of God is [still] in my nostrils,
  '4':
  - type: text
    content: My lips will not speak unjustly,
  - type: text
    content: Nor will my tongue utter deceit.
  '5':
  - type: text
    content: “Far be it from me that I should admit you are right [in your accusations against me];
  - type: text
    content: Until I die, I will not remove my integrity from me.
  '6':
  - type: text
    content: '“I hold fast my uprightness '
  - type: text
    content: and
  - type: text
    content: ' my right standing with God and I will not let them go;'
  - type: text
    content: My heart does not reproach me for any of my days.
  - type: heading
    content: The State of the Godless
  '7':
  - type: text
    content: ¶“May my enemy be as the wicked,
  - type: text
    content: And he who rises up against me be as the unrighteous (unjust).
  '8':
  - type: text
    content: “For what is the hope of the godless, even though he has gained [in this world],
  - type: text
    content: When God takes his life?
  '9':
  - type: text
    content: “Will God hear his cry
  - type: text
    content: 'When trouble '
  - type: text
    content: and
  - type: text
    content: ' distress come upon him?'
