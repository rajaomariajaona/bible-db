document_id: JOS.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rest of the Land Divided
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the whole congregation of the Israelites assembled at Shiloh [in the tribal territory of Ephraim], and set up the Tent of Meeting there; and the land was subdued before them.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Joshua cast lots for them in Shiloh before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and there Joshua divided the land to the sons of Israel, [to each tribe] according to their portions.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Territory of Benjamin
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now the lot (allotment) of the tribe of the sons of Benjamin came up according to their families, and the territory of their lot fell between [the tribes of] the sons of Judah and the sons of Joseph. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'On the north side their border began at the Jordan, then it went up the slope of Jericho on the north, and up through the hill country westward, and it ended at the Beth-aven wilderness. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then the border continued southward toward Luz, to the slope of Luz (that is, Bethel); then the border went down to Ataroth-addar, by the hill that lies south of lower Beth-horon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The border changed course [from there] and turned around on the western side southward, from the hill that lies to the south opposite Beth-horon; it ended at Kiriath-baal (that is, Kiriath-jearim), a city of [the tribe of] the sons of Judah. This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: formed
    - type: text
      text: ' the western side [of Benjamin’s territory]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The southern side was from the edge of Kiriath-jearim, and the border went on westward and went to the source of the waters of Nephtoah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the border went down to the edge of the hill overlooking the Valley of Ben-hinnom (son of Hinnom), which is at the north end of the Valley of Rephaim; and it descended to the Valley of Hinnom, south to the slope of the Jebusite, and went on down to En-rogel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then it turned toward the north and went on to En-shemesh and on to Geliloth, which is opposite the ascent of Adummim, and it went down to the stone of Bohan the son of Reuben. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'It continued to the north to the side opposite [Beth-] Arabah and went down to the Arabah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The border continued along to the north of the slope of Beth-hoglah; and the border ended at the northern bay of the Salt (Dead) Sea, at the south end of the Jordan. This was the southern border. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'There remained among the Israelites '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. Benjamin, Simeon, Zebulun, Issachar, Asher, Naphtali, and Dan.
      marker-yv: yv-n
    - type: text
      text: 'seven tribes who had not yet divided their inheritance. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And the Jordan River was its border on the east side. This was the inheritance of the sons of Benjamin, according to their families and according to its borders all around.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Now the cities of the tribe of the sons of Benjamin according to their families were Jericho and Beth-hoglah and Emek-keziz, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'and Beth-arabah and Zemaraim and Bethel, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and Avvim and Parah and Ophrah, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and Chephar-ammoni and Ophni and Geba; twelve cities with their villages; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Gibeon and Ramah and Beeroth, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and Mizpeh and Chephirah and Mozah, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'and Rekem and Irpeel and Taralah, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: and Zelah, Haeleph and the Jebusite (that is, Jerusalem), Gibeah, Kiriath; fourteen cities with their villages. This is the inheritance of [the tribe of] the sons of Benjamin according to their families (clans).
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So Joshua asked them, “How long will you put off entering to take possession of the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of your fathers, has given you? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Provide for yourselves three men from each tribe so that I may send them, and that they may go through the land and write a description of it with regard to their [tribal] inheritance; then they shall return to me. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They shall divide it into seven parts; [the tribe of] Judah shall remain in its territory on the south, and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the tribe of Ephraim and the half-tribe of Manasseh.
      marker-yv: yv-n
    - type: text
      text: 'house of Joseph shall remain in its territory on the north. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'You shall describe the land in seven divisions, and bring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the description
    - type: text
      text: ' here to me. I will cast lots for you here '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was an important acknowledgement that the outcome of the lot-casting would be controlled by God. It was not a matter of random selection.
      marker-yv: yv-n
    - type: text
      text: before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But the Levites have no portion among you, because the priesthood of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The priests received their sustenance from the various offerings that the people were compelled to bring (Lev 6:26, 29; 7:6-10; etc.).
      marker-yv: yv-n
    - type: text
      text: their inheritance. Gad and Reuben and half the tribe of Manasseh also have received their inheritance eastward beyond the Jordan, which Moses the servant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave them.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So the men arose and went [on their way], and Joshua commanded those who went to describe the land, saying, “Go and walk throughout the land and describe it, and return to me; and I will cast lots for you here before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in Shiloh.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So the men set out and passed through the land, and described it by cities in seven divisions in a book; and they came back to Joshua to the camp at Shiloh. '
