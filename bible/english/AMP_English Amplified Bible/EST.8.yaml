document_id: EST.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Mordecai Promoted
  - type: text
    content: 'On that day King Ahasuerus (Xerxes) gave the '
  - type: note
    content: I.e. all the property and possessions of Haman.
  - type: text
    content: house of Haman, the enemy of the Jews, to Queen Esther; and Mordecai came before the king, because Esther had disclosed what [
  - type: note
    content: Mordecai was her cousin and guardian (2:7).
  - type: text
    content: 'relation] he was to her. '
  '10':
  - type: text
    content: 'He wrote [a decree] in the name of King Ahasuerus, and sealed it with the king’s ring, and sent letters by couriers on horseback, riding on the royal [mail] relay horses, the offspring of the racing mares. '
  '11':
  - type: text
    content: 'In it the king granted the Jews who were in every city '
  - type: text
    content: the right
  - type: text
    content: ' to assemble and to defend their lives; to destroy, to kill, and to annihilate any armed force that might attack them, their little children, and women; and to take the enemies’ goods as plunder, '
  '12':
  - type: text
    content: 'on one day in all the provinces of King Ahasuerus, the thirteenth [day] of the twelfth month (that is, the month of Adar). '
  '13':
  - type: text
    content: 'A copy of the edict was to be issued as a law in every province and as a proclamation to all peoples, so that the Jews would be ready on that day, to avenge themselves on their enemies. '
  '14':
  - type: text
    content: So the couriers, who were mounted on the royal relay horses, left quickly, urged on by the king’s command; and the decree was issued at the citadel in Susa [the capital].
  '15':
  - type: text
    content: 'Then Mordecai departed from the presence of the king in royal apparel of blue and white, with a large crown of gold and with a robe of fine linen and purple wool; and the city of Susa shouted and rejoiced. '
  '16':
  - type: text
    content: 'For [at this time] the Jews had light [a dawn of new hope] and gladness and joy and honor. '
  '17':
  - type: text
    content: 'In each and every province and in each and every city, wherever the king’s command and his decree arrived, the Jews '
  - type: text
    content: celebrated with
  - type: text
    content: ' gladness and joy, a feast and a holiday. And many among the peoples of the land '
  - type: note
    content: Or embraced Judaism.
  - type: text
    content: became Jews, for the fear of the Jews [and their God] had fallen on them.
  '2':
  - type: text
    content: The king took off his signet ring which he had taken away from Haman, and gave it to Mordecai. And Esther put Mordecai in charge of the house of Haman.
  '3':
  - type: text
    content: 'Then Esther spoke again to the king and fell down at his feet and wept and implored him to avert the evil '
  - type: text
    content: plot
  - type: text
    content: ' of Haman the Agagite and his plan which he had devised against the Jews [because the decree to annihilate the Jews was still in effect]. '
  '4':
  - type: text
    content: 'Then the king held out to Esther the golden scepter. So Esther arose and stood before the king. '
  '5':
  - type: text
    content: 'Then she said, “If it pleases the king and if I have found favor before him and the matter is proper in the king’s view and I am pleasing in his sight, let it be written to revoke the letters devised by Haman the son of Hammedatha, the Agagite, which he wrote [in order] to destroy the Jews who are in all the king’s provinces. '
  '6':
  - type: text
    content: 'For how can I endure to see the tragedy that will happen to my people? Or how can I endure to see the destruction of my kindred?” '
  '7':
  - type: text
    content: Then King Ahasuerus said to Queen Esther and to Mordecai the Jew, “Behold, I have given Esther the house of Haman, and they have hanged him on the gallows because he stretched out his hand against the Jews.
  - type: heading
    content: The King’s Decree Avenges the Jews
  '8':
  - type: text
    content: Also, concerning the Jews, write as you see fit, in the king’s name, and seal it with the king’s signet ring—for a decree which is written in the king’s name and sealed with the king’s signet ring may not be revoked.”
  '9':
  - type: text
    content: 'So the king’s scribes were called at that time in the third month (that is, the month of Sivan) on the twenty-third day; and it was written in accordance with everything that Mordecai commanded, to the Jews, to the chief rulers (satraps), and the governors and officials of the provinces which '
  - type: text
    content: extended
  - type: text
    content: ' from India to Ethiopia (Cush), 127 provinces, to every province in its own script (writing), and to every people in their own language and to the Jews according to their script and their language. '
