document_id: EST.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mordecai Promoted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On that day King Ahasuerus (Xerxes) gave the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. all the property and possessions of Haman.
    marker-yv: yv-n
  - type: text
    text: house of Haman, the enemy of the Jews, to Queen Esther; and Mordecai came before the king, because Esther had disclosed what [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mordecai was her cousin and guardian (2:7).
    marker-yv: yv-n
  - type: text
    text: 'relation] he was to her. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The king took off his signet ring which he had taken away from Haman, and gave it to Mordecai. And Esther put Mordecai in charge of the house of Haman.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Esther spoke again to the king and fell down at his feet and wept and implored him to avert the evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: plot
  - type: text
    text: ' of Haman the Agagite and his plan which he had devised against the Jews [because the decree to annihilate the Jews was still in effect]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the king held out to Esther the golden scepter. So Esther arose and stood before the king. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then she said, “If it pleases the king and if I have found favor before him and the matter is proper in the king’s view and I am pleasing in his sight, let it be written to revoke the letters devised by Haman the son of Hammedatha, the Agagite, which he wrote [in order] to destroy the Jews who are in all the king’s provinces. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For how can I endure to see the tragedy that will happen to my people? Or how can I endure to see the destruction of my kindred?” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then King Ahasuerus said to Queen Esther and to Mordecai the Jew, “Behold, I have given Esther the house of Haman, and they have hanged him on the gallows because he stretched out his hand against the Jews.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The King’s Decree Avenges the Jews
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Also, concerning the Jews, write as you see fit, in the king’s name, and seal it with the king’s signet ring—for a decree which is written in the king’s name and sealed with the king’s signet ring may not be revoked.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the king’s scribes were called at that time in the third month (that is, the month of Sivan) on the twenty-third day; and it was written in accordance with everything that Mordecai commanded, to the Jews, to the chief rulers (satraps), and the governors and officials of the provinces which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: extended
  - type: text
    text: ' from India to Ethiopia (Cush), 127 provinces, to every province in its own script (writing), and to every people in their own language and to the Jews according to their script and their language. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He wrote [a decree] in the name of King Ahasuerus, and sealed it with the king’s ring, and sent letters by couriers on horseback, riding on the royal [mail] relay horses, the offspring of the racing mares. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'In it the king granted the Jews who were in every city '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the right
  - type: text
    text: ' to assemble and to defend their lives; to destroy, to kill, and to annihilate any armed force that might attack them, their little children, and women; and to take the enemies’ goods as plunder, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'on one day in all the provinces of King Ahasuerus, the thirteenth [day] of the twelfth month (that is, the month of Adar). '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A copy of the edict was to be issued as a law in every province and as a proclamation to all peoples, so that the Jews would be ready on that day, to avenge themselves on their enemies. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So the couriers, who were mounted on the royal relay horses, left quickly, urged on by the king’s command; and the decree was issued at the citadel in Susa [the capital].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Mordecai departed from the presence of the king in royal apparel of blue and white, with a large crown of gold and with a robe of fine linen and purple wool; and the city of Susa shouted and rejoiced. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For [at this time] the Jews had light [a dawn of new hope] and gladness and joy and honor. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'In each and every province and in each and every city, wherever the king’s command and his decree arrived, the Jews '
  - type: usfm
    marker: it
    children:
    - type: text
      text: celebrated with
  - type: text
    text: ' gladness and joy, a feast and a holiday. And many among the peoples of the land '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: embraced Judaism
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: became Jews, for the fear of the Jews [and their God] had fallen on them.
