document_id: 2CH.25,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Amaziah Succeeds Joash in Judah
  - type: text
    content: 'Amaziah was twenty-five years old when he became king, and he reigned for twenty-nine years in Jerusalem. His mother’s name was Jehoaddan of Jerusalem. '
  '10':
  - type: text
    content: 'So Amaziah dismissed the troops that came to him from Ephraim, to go home. So their anger was kindled '
  - type: text
    content: and
  - type: text
    content: ' burned greatly against Judah, and they returned home in the heat of anger.'
  '11':
  - type: text
    content: 'Now Amaziah took courage and led his people out to the Valley of Salt, and he struck down 10,000 of the men of Seir (Edom). '
  '12':
  - type: text
    content: 'The sons of Judah also captured 10,000 alive and brought them to the top of the cliff. They threw them down from the top of the cliff and they were all crushed to pieces. '
  '13':
  - type: text
    content: 'But the troops whom Amaziah sent back, '
  - type: text
    content: those
  - type: text
    content: ' not allowed to go with him to battle, attacked '
  - type: text
    content: and
  - type: text
    content: ' raided the cities of Judah, from Samaria to Beth-horon, and struck down 3,000 men and took a large amount of spoil.'
  - type: heading
    content: Amaziah Rebuked for Idolatry
  '14':
  - type: text
    content: 'After Amaziah came back from the slaughter of the Edomites, he brought the gods of the sons of Seir, and set them up to be his gods, bowed before them, and burned incense to them. '
  '15':
  - type: text
    content: So the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' burned against Amaziah, and He sent him a prophet who said to him, “Why have you '
  - type: note
    content: Lit sought.
  - type: text
    content: 'desired the gods of the people who did not save their own people from your hand?” '
  '16':
  - type: text
    content: As he was talking, the king said to him, “Have we made you the king’s counselor? Stop! Why should you be put to death?” Then the prophet stopped and said, “I know that God has decided to destroy you because you have done this and have ignored my advice.”
  - type: heading
    content: Amaziah Defeated by Joash of Israel
  '17':
  - type: text
    content: 'Then Amaziah king of Judah took counsel and sent '
  - type: text
    content: word
  - type: text
    content: ' to Joash the son of Jehoahaz the son of Jehu, king of Israel, saying, “Come [to battle], let us face each other.” [2 Kin 14:8-20] '
  '18':
  - type: text
    content: 'Then Joash king of Israel sent '
  - type: text
    content: word
  - type: text
    content: ' to Amaziah king of Judah, saying, “The [little] thorn bush in Lebanon sent '
  - type: text
    content: word
  - type: text
    content: ' to the [great] cedar in Lebanon, saying, ‘Give your daughter to my son in marriage.’ But a wild beast in Lebanon passed by and trampled down the thorn bush. '
  '19':
  - type: text
    content: 'You say, ‘See, I have struck down '
  - type: text
    content: and
  - type: text
    content: ' defeated Edom.’ Your heart lifts you up to boast [about your victory]. Now stay at home; why should you meddle '
  - type: text
    content: and
  - type: text
    content: ' court disaster so that you, even you, will fall and Judah with you?”'
  '2':
  - type: text
    content: He did right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', yet not wholeheartedly. '
  '20':
  - type: text
    content: 'But Amaziah would not listen, for it was from God, so that He might hand Judah over '
  - type: text
    content: to Joash
  - type: text
    content: ' because they had desired the gods of Edom. '
  '21':
  - type: text
    content: 'So Joash king of Israel went up; and he and Amaziah king of Judah faced one another at Beth-shemesh, which belonged to Judah. '
  '22':
  - type: text
    content: 'And Judah was defeated by Israel, and they fled, every man to his tent. '
  '23':
  - type: text
    content: 'Then Joash king of Israel captured Amaziah king of Judah, the son of Joash the son of Jehoahaz (Ahaziah), at Beth-shemesh, and brought him to Jerusalem and broke down the wall of Jerusalem from the Ephraim Gate to the Corner Gate, 400 '
  - type: note
    content: I.e. one cubit equals about 18 in.
  - type: text
    content: 'cubits. '
  '24':
  - type: text
    content: He took
  - type: text
    content: ' all the gold and silver and all the utensils which were found in the house of God with [the doorkeeper] Obed-edom, and the treasures of the king’s house (palace), and the hostages, and returned to Samaria.'
  '25':
  - type: text
    content: 'And Amaziah the son of Joash king of Judah lived fifteen years after the death of Joash the son of Jehoahaz king of Israel. '
  '26':
  - type: text
    content: 'Now the rest of the acts of Amaziah, from the first to the last, are they not written in the Book of the Kings of Judah and Israel? '
  '27':
  - type: text
    content: Now from the time that Amaziah turned away from following the L
  - type: heading
    content: ord
  - type: text
    content: ', they conspired against him in Jerusalem, and he fled to Lachish; but they sent '
  - type: text
    content: men
  - type: text
    content: ' after him to Lachish and killed him there. '
  '28':
  - type: text
    content: Then they brought him on horses and buried him with his fathers in the City of [David in] Judah.
  '3':
  - type: text
    content: 'When his kingdom was firmly established, he killed his servants who had struck down his father the king. '
  '4':
  - type: text
    content: 'But he did not kill their children; for '
  - type: text
    content: he did
  - type: text
    content: ' as it is written in the Law, in the Book of Moses, where the L'
  - type: heading
    content: ord
  - type: text
    content: ' commanded, “The fathers shall not die for the children, nor the children die for the fathers, but each shall be put to death for his own sin.”'
  - type: heading
    content: Amaziah Defeats Edomites
  '5':
  - type: text
    content: 'Amaziah assembled [the men of] Judah and appointed them in accordance with '
  - type: text
    content: their
  - type: text
    content: ' fathers’ (ancestors’) households under commanders of thousands and of hundreds throughout Judah and Benjamin. He numbered them from twenty years old and above and found there to be 300,000 choice men fit for war and '
  - type: text
    content: able to
  - type: text
    content: ' handle spear and shield. '
  '6':
  - type: text
    content: 'He also hired 100,000 brave warriors from Israel for a hundred talents of silver. '
  '7':
  - type: text
    content: But a man of God came to him, saying, “O king, do not let this army of Israel go with you, for the L
  - type: heading
    content: ord
  - type: text
    content: ' is not with Israel '
  - type: text
    content: nor with
  - type: text
    content: ' any of the sons of '
  - type: note
    content: The dominant tribe in the Israel, the Northern Kingdom.
  - type: text
    content: 'Ephraim. '
  '8':
  - type: text
    content: 'But if you do go [in spite of this warning], be strong '
  - type: text
    content: and
  - type: text
    content: ' courageous for battle; yet God will cause you to stumble '
  - type: text
    content: and
  - type: text
    content: ' fall before the enemy, for God has power to help and to cause '
  - type: text
    content: people
  - type: text
    content: ' to stumble.” '
  '9':
  - type: text
    content: 'Amaziah said to the man of God, “But what '
  - type: text
    content: shall we
  - type: text
    content: ' do about the hundred talents which I gave to the troops of Israel?” The man of God answered, “The L'
  - type: heading
    content: ord
  - type: text
    content: ' is able to give you much more than this.” '
