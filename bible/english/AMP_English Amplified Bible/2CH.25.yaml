document_id: 2CH.25,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amaziah Succeeds Joash in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Amaziah was twenty-five years old when he became king, and he reigned for twenty-nine years in Jerusalem. His mother’s name was Jehoaddan of Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So Amaziah dismissed the troops that came to him from Ephraim, to go home. So their anger was kindled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' burned greatly against Judah, and they returned home in the heat of anger.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now Amaziah took courage and led his people out to the Valley of Salt, and he struck down 10,000 of the men of Seir (Edom). '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The sons of Judah also captured 10,000 alive and brought them to the top of the cliff. They threw them down from the top of the cliff and they were all crushed to pieces. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But the troops whom Amaziah sent back, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' not allowed to go with him to battle, attacked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' raided the cities of Judah, from Samaria to Beth-horon, and struck down 3,000 men and took a large amount of spoil.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amaziah Rebuked for Idolatry
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'After Amaziah came back from the slaughter of the Edomites, he brought the gods of the sons of Seir, and set them up to be his gods, bowed before them, and burned incense to them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So the anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' burned against Amaziah, and He sent him a prophet who said to him, “Why have you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sought
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'desired the gods of the people who did not save their own people from your hand?” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: As he was talking, the king said to him, “Have we made you the king’s counselor? Stop! Why should you be put to death?” Then the prophet stopped and said, “I know that God has decided to destroy you because you have done this and have ignored my advice.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amaziah Defeated by Joash of Israel
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Amaziah king of Judah took counsel and sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Joash the son of Jehoahaz the son of Jehu, king of Israel, saying, “Come [to battle], let us face each other.” [2 Kin 14:8-20] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then Joash king of Israel sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Amaziah king of Judah, saying, “The [little] thorn bush in Lebanon sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to the [great] cedar in Lebanon, saying, ‘Give your daughter to my son in marriage.’ But a wild beast in Lebanon passed by and trampled down the thorn bush. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'You say, ‘See, I have struck down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defeated Edom.’ Your heart lifts you up to boast [about your victory]. Now stay at home; why should you meddle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' court disaster so that you, even you, will fall and Judah with you?”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He did right in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', yet not wholeheartedly. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But Amaziah would not listen, for it was from God, so that He might hand Judah over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Joash
    - type: text
      text: ' because they had desired the gods of Edom. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So Joash king of Israel went up; and he and Amaziah king of Judah faced one another at Beth-shemesh, which belonged to Judah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And Judah was defeated by Israel, and they fled, every man to his tent. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then Joash king of Israel captured Amaziah king of Judah, the son of Joash the son of Jehoahaz (Ahaziah), at Beth-shemesh, and brought him to Jerusalem and broke down the wall of Jerusalem from the Ephraim Gate to the Corner Gate, 400 '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. one cubit equals about 18 in.
      marker-yv: yv-n
    - type: text
      text: 'cubits. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: it
      children:
      - type: text
        text: He took
    - type: text
      text: ' all the gold and silver and all the utensils which were found in the house of God with [the doorkeeper] Obed-edom, and the treasures of the king’s house (palace), and the hostages, and returned to Samaria.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And Amaziah the son of Joash king of Judah lived fifteen years after the death of Joash the son of Jehoahaz king of Israel. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Now the rest of the acts of Amaziah, from the first to the last, are they not written in the Book of the Kings of Judah and Israel? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Now from the time that Amaziah turned away from following the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', they conspired against him in Jerusalem, and he fled to Lachish; but they sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' after him to Lachish and killed him there. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then they brought him on horses and buried him with his fathers in the City of [David in] Judah.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When his kingdom was firmly established, he killed his servants who had struck down his father the king. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But he did not kill their children; for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he did
    - type: text
      text: ' as it is written in the Law, in the Book of Moses, where the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded, “The fathers shall not die for the children, nor the children die for the fathers, but each shall be put to death for his own sin.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amaziah Defeats Edomites
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Amaziah assembled [the men of] Judah and appointed them in accordance with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' fathers’ (ancestors’) households under commanders of thousands and of hundreds throughout Judah and Benjamin. He numbered them from twenty years old and above and found there to be 300,000 choice men fit for war and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: able to
    - type: text
      text: ' handle spear and shield. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He also hired 100,000 brave warriors from Israel for a hundred talents of silver. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But a man of God came to him, saying, “O king, do not let this army of Israel go with you, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is not with Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor with
    - type: text
      text: ' any of the sons of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The dominant tribe in the Israel, the Northern Kingdom.
      marker-yv: yv-n
    - type: text
      text: 'Ephraim. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But if you do go [in spite of this warning], be strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' courageous for battle; yet God will cause you to stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall before the enemy, for God has power to help and to cause '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' to stumble.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Amaziah said to the man of God, “But what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall we
    - type: text
      text: ' do about the hundred talents which I gave to the troops of Israel?” The man of God answered, “The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is able to give you much more than this.” '
