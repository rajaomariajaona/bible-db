  - type: text
    content: 'o King Artaxerxes from your servants, the men in the region west of the [Euphrates] River; and now: '
  '12':
  - type: text
    content: 'Let it be known to the king that the Jews who came up from you have come to us at Jerusalem. They are rebuilding this rebellious and evil city and are finishing its walls and repairing the foundations. '
  '13':
  - type: text
    content: 'Now let it be known to the king, that if that city is rebuilt and the walls are finished, then they will not pay tax, custom, or toll, and the revenue of the kings will be diminished. '
  '14':
  - type: text
    content: 'Now because we are in the service of the palace, and it is not proper for us to witness the king’s dishonor, for that reason we have sent '
  - type: text
    content: word
  - type: text
    content: ' and informed the king, '
  '15':
  - type: text
    content: 'in order that a search may be made in the record books of your fathers. And you will discover in the record books and learn that this is a rebellious city, damaging to kings and provinces, and that in the past they have incited rebellion within it. That is why that city was laid waste (destroyed). '
  '16':
  - type: text
    content: 'We are informing the king that if that city is rebuilt and its walls finished, it will mean that you will have no possession in '
  - type: text
    content: the province
  - type: text
    content: ' west of the [Euphrates] River.”'
  - type: heading
    content: The King Replies and Work Stops
  '17':
  - type: text
    content: ' '
  - type: text
    content: Then
  - type: text
    content: ' the king sent an answer to Rehum the [Persian] commander, to Shimshai the scribe, and to the rest of their colleagues who live in Samaria and in the rest of '
  - type: text
    content: the provinces
  - type: text
    content: ' west of the River: “Peace (Greetings). And now, '
  '18':
  - type: text
    content: 'The document which you sent to us has been translated and read before me. '
  '19':
  - type: text
    content: 'I have issued a command and a search has been made, and it has been discovered that this city [Jerusalem] in earlier times has revolted against the kings, and that rebellion and sedition have been perpetrated in it. '
  '2':
  - type: text
    content: 'they came to Zerubbabel [who was now governor] and to the heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' and said to them, “Let us build with you, for we seek your God [and worship] just as you do; and we have sacrificed to Him since the days of Esarhaddon king of Assyria, who brought us up here.” [2 Kin 17:24-29] '
  '20':
  - type: text
    content: 'There have also been mighty kings over Jerusalem who have ruled over all '
  - type: text
    content: the provinces
  - type: text
    content: ' west of the [Euphrates] River, and tax, custom, and toll were paid to them. '
  '21':
  - type: text
    content: 'So, now issue a decree to make these men stop [work], so that this city is not rebuilt until a [new] command is issued by me. '
  '22':
  - type: text
    content: 'Beware of being negligent in carrying out this '
  - type: text
    content: matter
  - type: text
    content: . Why should damage increase to the detriment of the kings?”
  '23':
  - type: text
    content: Then as soon as the copy of King Artaxerxes’ document was read before Rehum and Shimshai the scribe, and their colleagues, they went up hurriedly to Jerusalem to the Jews, and made them stop [work] by force of arms.
  '24':
  - type: text
    content: 'Then the '
  - type: note
    content: The long digression in Ezra 4:6-23 describes later opposition to Jewish efforts to restore the walls and rebuild the city during the reigns of Xerxes (486-465 b.c.) and Artaxerxes I (465-424 b.c.). Here in Ezra 4:24 Ezra reverts back to the time of Darius I (522-486 b.c.) and the rebuilding of the temple, which ceased because of the discouragement described in Ezra 4:4, 5, resumed again (Ezra 5:2), and was completed in the sixth year of the reign of Darius I (Ezra 6:15).
  - type: text
    content: work on the house of God in Jerusalem stopped. It was suspended until the second year of the reign of Darius king of Persia.
  '3':
  - type: text
    content: 'But Zerubbabel and Jeshua and the rest of the heads of fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of Israel said to them, “You have nothing in common with us in building a house to our God; but we ourselves will together build to the L'
  - type: heading
