  - type: text
    content: 'discouraged the people of Judah, and frightened them [to deter them] from building, '
  '5':
  - type: text
    content: and hired advisers [to work] against them to frustrate their plans during the entire time that Cyrus king of Persia reigned, [and this lasted] even until the reign of Darius king of Persia.
  '6':
  - type: text
    content: 'Now in the reign of '
  - type: note
