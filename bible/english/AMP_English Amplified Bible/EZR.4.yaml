document_id: EZR.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Adversaries Hinder the Work
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now when [the Samaritans] the adversaries of Judah and Benjamin heard that the exiles from the captivity were building a temple to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and the rest of the nations whom the great and noble '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. probably Ashurbanipal.
      marker-yv: yv-n
    - type: text
      text: 'Osnappar deported and settled in the city of Samaria, and in the rest of the region '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: beyond
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'west of the [Euphrates] River. Now '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'this is a copy of the letter which they sent to him:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'o King Artaxerxes from your servants, the men in the region west of the [Euphrates] River; and now: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Let it be known to the king that the Jews who came up from you have come to us at Jerusalem. They are rebuilding this rebellious and evil city and are finishing its walls and repairing the foundations. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now let it be known to the king, that if that city is rebuilt and the walls are finished, then they will not pay tax, custom, or toll, and the revenue of the kings will be diminished. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now because we are in the service of the palace, and it is not proper for us to witness the king’s dishonor, for that reason we have sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and informed the king, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'in order that a search may be made in the record books of your fathers. And you will discover in the record books and learn that this is a rebellious city, damaging to kings and provinces, and that in the past they have incited rebellion within it. That is why that city was laid waste (destroyed). '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'We are informing the king that if that city is rebuilt and its walls finished, it will mean that you will have no possession in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the province
    - type: text
      text: ' west of the [Euphrates] River.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The King Replies and Work Stops
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then
    - type: text
      text: ' the king sent an answer to Rehum the [Persian] commander, to Shimshai the scribe, and to the rest of their colleagues who live in Samaria and in the rest of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the provinces
    - type: text
      text: ' west of the River: “Peace (Greetings). And now, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The document which you sent to us has been translated and read before me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'I have issued a command and a search has been made, and it has been discovered that this city [Jerusalem] in earlier times has revolted against the kings, and that rebellion and sedition have been perpetrated in it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'they came to Zerubbabel [who was now governor] and to the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' and said to them, “Let us build with you, for we seek your God [and worship] just as you do; and we have sacrificed to Him since the days of Esarhaddon king of Assyria, who brought us up here.” [2 Kin 17:24-29] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'There have also been mighty kings over Jerusalem who have ruled over all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the provinces
    - type: text
      text: ' west of the [Euphrates] River, and tax, custom, and toll were paid to them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So, now issue a decree to make these men stop [work], so that this city is not rebuilt until a [new] command is issued by me. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Beware of being negligent in carrying out this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: matter
    - type: text
      text: . Why should damage increase to the detriment of the kings?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Then as soon as the copy of King Artaxerxes’ document was read before Rehum and Shimshai the scribe, and their colleagues, they went up hurriedly to Jerusalem to the Jews, and made them stop [work] by force of arms.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The long digression in Ezra 4:6-23 describes later opposition to Jewish efforts to restore the walls and rebuild the city during the reigns of Xerxes (486-465 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '.) and Artaxerxes I (465-424 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '.). Here in Ezra 4:24 Ezra reverts back to the time of Darius I (522-486 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .) and the rebuilding of the temple, which ceased because of the discouragement described in Ezra 4:4, 5, resumed again (Ezra 5:2), and was completed in the sixth year of the reign of Darius I (Ezra 6:15).
      marker-yv: yv-n
    - type: text
      text: work on the house of God in Jerusalem stopped. It was suspended until the second year of the reign of Darius king of Persia.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But Zerubbabel and Jeshua and the rest of the heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' of Israel said to them, “You have nothing in common with us in building a house to our God; but we ourselves will together build to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel, just as King Cyrus, the king of Persia, has commanded us.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then [the Samaritans and others of] the people of the land '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: weakened the hands of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'discouraged the people of Judah, and frightened them [to deter them] from building, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: and hired advisers [to work] against them to frustrate their plans during the entire time that Cyrus king of Persia reigned, [and this lasted] even until the reign of Darius king of Persia.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now in the reign of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Esth 1:1.
      marker-yv: yv-n
    - type: text
      text: Ahasuerus (Xerxes), in the beginning of his reign, the Samaritans wrote [to him] an accusation against the inhabitants of Judah and Jerusalem [who had returned from exile].
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Later, in the days of [King] Artaxerxes, Bishlam, Mithredath, Tabeel and the rest of their associates wrote to Artaxerxes king of Persia; and the text of the letter was written in Aramaic and translated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' Aramaic.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Letter to King Artaxerxes
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Rehum the [Persian] commander [of the Samaritans] and Shimshai the scribe wrote a letter against Jerusalem to Artaxerxes the king as follows— '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wrote
    - type: text
      text: ' Rehum the [Persian] commander, Shimshai the scribe, and the rest of their associates, the judges, the lesser governors, the officials, the secretaries, the men of Erech, the Babylonians, the men of Susa, that is, the Elamites, '
