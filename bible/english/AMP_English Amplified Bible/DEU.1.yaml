    content: This area is now part of the modern-day Hashemite Kingdom of Jordan. In ancient times it was a strip of mountainous land on the eastern side of the Dead Sea. Moab, forefather of the Moabites, was the son of Lot, through his elder daughter (Gen 19:30-38).
  - type: text
