    content: '“Then we set out from Horeb (Sinai), and went through all that great and terrible wilderness which you saw on the way to the hill country of the '
  - type: note
    content: A tribal people descended from Canaan the son of Ham the son of Noah. The Amorites were so prominent that “Amorite” is sometimes used interchangeably with “Canaanite” to refer to all the people living in Canaan.
  - type: text
