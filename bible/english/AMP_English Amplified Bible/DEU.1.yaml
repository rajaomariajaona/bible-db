document_id: DEU.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel’s History after the Exodus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the words which Moses spoke to all '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In general, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons (children) of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Reuben, Reuben, Reubenites
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'Israel [while they were still] beyond [that is, on the east side of] the Jordan [River] in the wilderness [across from Jerusalem], in the Arabah [the long, deep valley running north and south from the eastern arm of the Red Sea to beyond the Dead Sea] opposite Suph, between Paran and Tophel and Laban and Hazeroth and Dizahab (place of gold). '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has multiplied you, and look, today you are as numerous as the stars of heaven. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of your fathers, add to you a thousand times as many as you are and bless you, just as He has promised you! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How can I alone bear the weight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pressure and burden of you and your strife (contention) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complaining? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Choose for yourselves wise, understanding, experienced, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' respected men from your tribes, and I will appoint them as heads (leaders) over you.’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you answered me, ‘The thing which you have said to do is good.’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I took the leaders of your tribes, wise and experienced men, and made them leaders over you, commanders of thousands, and hundreds, and fifties, and tens, and officers (administrators) for your tribes.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then I commanded your judges at that time, saying, ‘Hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the matters
    - type: text
      text: ' between your brothers [your fellow countrymen], and judge righteously '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fairly between a man and his brother, or the stranger (resident alien, foreigner) who is with him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: recognize faces.
      marker-yv: yv-n
    - type: text
      text: 'show partiality in judgment; you shall hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay attention to the [cases of the] least [important] as well as the great. You shall not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fear because of the face of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'fear man, for the judgment is God’s. The case that is too hard for you [to judge], you shall bring to me, and I will hear it.’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I commanded you at that time [regarding] all the things that you should do.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then we set out from Horeb (Sinai), and went through all that great and terrible wilderness which you saw on the way to the hill country of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A tribal people descended from Canaan the son of Ham the son of Noah. The Amorites were so prominent that “Amorite” is sometimes used interchangeably with “Canaanite” to refer to all the people living in Canaan.
      marker-yv: yv-n
    - type: text
      text: Amorites, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God commanded us; and we came to Kadesh-barnea. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is [only] eleven days’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: journey
    - type: text
      text: ' from Horeb (Mount Sinai) by way of Mount Seir to Kadesh-barnea [on Canaan’s border; yet Israel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God punished the children of Israel for their lack of faith (Num 14:1-3), their disobedience, and their worship of false gods at Mount Sinai (Ex 32:1-6; Deut 9:12, 16); however, God also used this time to teach the Israelites, through Moses, exactly what was expected of them once they possessed their promised land.
      marker-yv: yv-n
    - type: text
      text: 'wandered in the wilderness for forty years before crossing the border and entering Canaan, the promised land]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I said to you, ‘You have come to the hill country of the Amorites which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God is about to give us. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Behold, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has set the land before you; go up and take possession '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of it
    - type: text
      text: ', just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of your fathers, has spoken to you. Do not fear or be dismayed.’'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then all of you approached me and said, ‘Let us send men [into the land] before us, so that they may explore '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' search the area for us, and bring back to us word regarding the way we should go, and the cities we should enter.’ '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The plan pleased me and I took twelve of your men, one man from each tribe. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They turned and went up into the hill country, and came to the Valley of Eshcol and spied it out. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they took some of the fruit of the land in their hands and brought it down to us; and they reported back to us, and said, ‘It is a good land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God is about to give us.’'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yet you were not willing to go up [to take possession of it], but rebelled against the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You murmured '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were ill-tempered (discontented) in your tents, and said, ‘Because the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' hates us He has brought us from the land of Egypt to hand us over to the Amorites to destroy us. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Where can we go up? Our brothers (spies) have made our hearts melt [in fear] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' demoralized us by saying, “The people are bigger and taller than we; the cities are large, and fortified [all the way up] to heaven. And besides, we saw the [giant-like] sons of the Anakim there.” ’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said to you, ‘Do not be shocked, nor fear them. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the fortieth year, on the first day of the eleventh month, Moses spoke to the children of Israel in accordance with all that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to say
    - type: text
      text: ' to them, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God who goes before you will fight for you Himself, just as He did for you in Egypt before your [very] eyes, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and in the wilderness where you saw how the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God carried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protected you, just as a man carries his son, all along the way which you traveled until you arrived at this place.’ '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet in spite of this word, you did not trust [that is, confidently rely on and believe] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: who went before you along the way, in fire by night and in a cloud by day, to seek a place for you to make camp and to show you the way in which you should go.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' heard the sound of your words, and He was angry and took an oath, saying, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Not one of these men, this evil generation, shall see the good land which I swore (solemnly promised) to give to your fathers, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: except Caleb the son of Jephunneh; he shall see it, and to him and to his children I will give the land on which he has walked, because he has followed the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' completely [and remained true to Him].’ '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was angry with me also because of you, saying, ‘Not even you shall enter Canaan. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua the son of Nun, who stands before you, he shall enter there. Encourage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthen him, for he shall cause Israel to inherit it. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, your little ones whom you said would become prey, and your sons, who today have no knowledge of good or evil, shall enter Canaan, and I will give it to them and they shall possess it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'after he had defeated Sihon the king of the Amorites, who lived in Heshbon, and Og the king of Bashan, who lived at Ashtaroth in Edrei. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But as for you, turn around and set out for the wilderness by way of the Red Sea (Sea of Reeds).’
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Then you answered and said to me, ‘We have sinned against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . We will go up and fight, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God has commanded us.’ So you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: girded
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'equipped every man with weapons of war, and regarded it as easy to go up into the hill country. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, ‘Say to them, “Do not go up and do not fight, for I am not among you [because of your rebellion]; otherwise you will be [badly] defeated by your enemies.” ’ '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I spoke to you, but you would not listen. Instead you rebelled against the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and acted presumptuously and went up into the hill country. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Amorites who lived in that hill country came out against you and chased you as bees do, and struck you down in Seir as far as Hormah. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And you returned and wept before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; but the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' would not listen to your voice nor pay attention to you. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So you stayed in Kadesh; many days you stayed there.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beyond (east of) the Jordan in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This area is now part of the modern-day Hashemite Kingdom of Jordan. In ancient times it was a strip of mountainous land on the eastern side of the Dead Sea. Moab, forefather of the Moabites, was the son of Lot, through his elder daughter (Gen 19:30-38).
      marker-yv: yv-n
    - type: text
      text: land of Moab, Moses began to explain this law, saying,
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God spoke to us at Horeb, saying, ‘You have stayed long enough on this mountain. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Turn and resume your journey, and go to the hill country of the Amorites, and to all their neighbors in the Arabah, in the hill country and in the lowland (the Shephelah), in the Negev (South country) and on the coast of the [Mediterranean] Sea, the land of the Canaanites, and Lebanon, as far as the great river, the river Euphrates. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Look, I have set the land before you; go in and take possession of the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' swore (solemnly promised) to your fathers, to Abraham, to Isaac, and to Jacob, to give to them and to their descendants after them.’'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I spoke to you at that time, saying, ‘I am not able to bear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the burden
    - type: text
      text: ' of you alone. '
