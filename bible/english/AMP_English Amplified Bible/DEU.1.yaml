  - type: note
    content: God punished the children of Israel for their lack of faith (Num 14:1-3), their disobedience, and their worship of false gods at Mount Sinai (Ex 32:1-6; Deut 9:12, 16); however, God also used this time to teach the Israelites, through Moses, exactly what was expected of them once they possessed their promised land.
  - type: text
