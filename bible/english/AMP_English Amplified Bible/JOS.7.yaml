document_id: JOS.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel Is Defeated at Ai
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But the sons of Israel acted unfaithfully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violated their obligation in regard to the things [off limits] under the ban [those things belonging to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '], for Achan, the son of Carmi, the son of Zabdi, the son of Zerah, from the tribe of Judah, took some of the things under the ban [for personal gain]. Therefore the anger of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' burned against the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now Joshua sent men from Jericho to Ai, which is near Beth-aven, east of Bethel, and said to them, “Go up and spy out the land.” So the men went up and spied out Ai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then they returned to Joshua and said to him, “Do not make all the people go up [to fight]; have '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' about two thousand or three thousand men go up and attack Ai; do not make the entire army go up there, for they [of Ai] are few.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So about three thousand men from the sons of Israel went up there, but they fled [in retreat] from the men of Ai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The men of Ai killed about thirty-six of Israel’s men, and chased them from the gate as far as [the bluffs of] Shebarim and struck them down as they descended [the steep pass], so the hearts of the people melted [in despair and began to doubt God’s promise] and became like water (disheartened).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then Joshua tore his clothes and fell face downward on the ground before the ark of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' until evening, he and the elders of Israel; and [with great sorrow] they put dust on their heads. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Joshua said, “Alas, O Lord '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: YHWH
      - type: text
        text: ', usually rendered L'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', why have You brought this people across the Jordan at all, only to hand us over to the Amorites, to destroy us? If only we had been willing to live beyond the Jordan! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'O Lord, what can I say now that [the army of] Israel has turned back [in retreat and fled] before their enemies? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For the Canaanites and all the inhabitants of the land will hear about it, and will surround us and cut off our name from the earth. And what will You do for Your great name [to keep it from dishonor]?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Joshua, “Get up! Why is it that you have fallen on your face? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Israel has sinned; they have also transgressed My covenant which I commanded them [to keep]. They have even taken some of the things under the ban, and they have both stolen and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kept secret
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'denied [the theft]. Moreover, they have also put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the stolen objects
  - type: text
    text: ' among their own things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'That is why the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons.
    marker-yv: yv-n
  - type: text
    text: 'soldiers of Israel could not stand [and defend themselves] before their enemies; they turned their backs [and ran] before them, because they have become accursed. I will not be with you anymore unless you destroy the things under the ban from among you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rise up! Consecrate the people and say, ‘Consecrate yourselves for tomorrow, for thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel: “There are things under the ban among you, O Israel. You cannot stand [victorious] before your enemies until you remove the things under the ban from among you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: In the morning you shall come forward by your tribes. And it shall be that the tribe which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' chooses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by lot
  - type: text
    text: ' shall come forward by families, and the family which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' chooses shall come forward by [separate] households, and the household which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' chooses shall come forward man by man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: It shall be that the one who is chosen with the things under the ban shall be [killed and his body] burned with fire, he and all that belongs to him, because he has transgressed the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and because he has done a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Achan, the guilty party (v 18), had not only violated the divine ban with full knowledge of what he was doing, but had attempted to escape prosecution by concealing the evidence. This was a despicable affront to God, calling for severest of punishments.
    marker-yv: yv-n
  - type: text
    text: 'disgraceful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disobedient thing in Israel.’ ” [Josh 7:25]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Sin of Achan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Joshua got up early in the morning and had Israel come forward by tribes, and the tribe of Judah was chosen [by lot]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He had the families of Judah come forward, and the family of the Zerahites was chosen; and he had the family of the Zerahites come forward man by man, and Zabdi was chosen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He brought his household forward man by man; and Achan the son of Carmi, son of Zabdi, son of Zerah, of the tribe of Judah, was chosen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then Joshua said to Achan, “My son, I implore you, give glory to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, and give praise to Him [in recognition of His righteous judgments]; and tell me now what you have done. Do not hide it from me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So Achan answered Joshua and said, “In truth, I have sinned against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, and this is what I have done: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'when I saw among the spoils [in Jericho] a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a valuable, elaborately woven and decorated royal robe, perhaps even bejeweled.
    marker-yv: yv-n
  - type: text
    text: beautiful robe from Shinar (southern Babylon) and two hundred shekels of silver and a bar of gold weighing fifty shekels, I wanted them and took them. Behold, they are hidden in the ground inside my tent, with the silver underneath.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Joshua sent messengers, and they ran to the tent; and they saw the stolen objects hidden in his tent, with the silver underneath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And they took them from the tent and brought them to Joshua and to all the sons of Israel, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: emptied
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: spread them out before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Joshua and all Israel with him, took Achan the son of Zerah, the silver, the [royal] robe, the bar of gold, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The family was punished along with him as his co-conspirators.
    marker-yv: yv-n
  - type: text
    text: 'his sons, his daughters, his oxen, his donkeys, his sheep, his tent, and everything that he had; and they brought them up to the Valley of Achor (Disaster). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Joshua said, “Why have you brought disaster on us? The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will bring you disaster this day.” Then all Israel stoned them [to death] with stones; afterward they burned their bodies in the fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then they piled up over him a great heap of stones that remains to this day. Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' turned from the fierceness of His anger. Therefore the name of that place has been called the Valley of Achor (Disaster) to this day.'
