document_id: EZK.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Water from the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then he [my guide] brought me back to the door of the house [the temple of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ']; and behold, water was flowing from under the threshold of the house (temple) toward the east, for the front of the temple was facing east. And the water was flowing down from under, from the right side of the house, from south of the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then he brought me out by way of the north gate and led me around on the outside to the outer gate by the way of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the gate
  - type: text
    text: ' that faces east. And behold, water was spurting out from the south side [of the gate]. [Zech 14:8; Rev 22:1, 2]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When the man went out toward the east with a measuring line in his hand, he measured a thousand cubits, and he led me through the water, water that was ankle-deep. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Again he measured a thousand [cubits] and led me through the water, water that was knee-deep. Again he measured a thousand [cubits] and led me through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the water,
  - type: text
    text: ' water '
  - type: usfm
    marker: it
    children:
    - type: text
      text: reaching
  - type: text
    text: ' the hips. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Again he measured a thousand [cubits]; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and it was
  - type: text
    text: ' a river that I could not pass through, for the water had risen, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: enough
  - type: text
    text: ' water to swim in, a river that could not be crossed [by wading]. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he said to me, “Son of man, have you seen this?” Then he brought me back to the bank of the river. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now when I had returned, behold, on the bank of the river were very many trees on the one side and on the other. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then he said to me, “These waters go out toward the eastern region and go down into the Arabah (the Jordan Valley); then they go toward the sea, being made to flow into the sea, and the waters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the Dead Sea
  - type: text
    text: ' shall be healed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become fresh. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'It will come about that every living creature which swarms in every place where the river goes, will live. And there will be a very great number of fish, because these waters go there so that the waters of the sea are healed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become fresh; so everything will live wherever the river goes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And it will come about that fishermen will stand beside it [at the banks of the Dead Sea]; from Engedi to Eneglaim there will be dry places to spread nets. Their fish will be of very many kinds, like the fish of the Great [Mediterranean] Sea. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But its swamps and marshes will not become fresh [and wholesome for animal life]; they will [as the river subsides] be left encrusted with salt. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'By the river on its bank, on one side and on the other, will grow all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: kinds of
  - type: text
    text: ' trees for food. Their leaves will not wither and their fruit will not fail. They shall bear every month because their water flows from the sanctuary, and their fruit will be for food and their leaves for healing.” [Rev 22:2]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Boundaries and Division of the Land
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the boundary by which you shall divide the land as an inheritance among the twelve tribes of Israel; Joseph '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall have
  - type: text
    text: ' two portions. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You shall divide it as an inheritance, each one equally with the other. I lifted up My hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swore to give it to your fathers, and this land shall fall to you as an inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“And this shall be the boundary of the land on the north side: from the Great [Mediterranean] Sea by way of Hethlon to the entrance of Zedad, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hamath, Berothah, Sibraim, which is between the border of Damascus and the border of Hamath; [as far as] Hazer-hatticon, which is on the border of Hauran. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So the boundary will extend from the [Mediterranean] Sea to Hazar-enan at the border of Damascus, and on the north, northward, is the border of Hamath. This is the north side.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“The east side, from between Hauran, Damascus, Gilead, and the land of Israel, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the Jordan; from the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: north
  - type: text
    text: ' border to the eastern sea you shall measure. This is the east side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“The south side, southward, from Tamar [near the Dead Sea] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall extend
  - type: text
    text: ' as far as the waters of Meribath-kadesh, to the Brook of Egypt and to the Great [Mediterranean] Sea. This is the south side toward the south.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“The west side '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall be
  - type: text
    text: ' the Great [Mediterranean] Sea, from the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: south
  - type: text
    text: ' border to a point opposite Lebo-hamath [north of Mount Hermon]. This is the west side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“So you shall divide this land among yourselves according to the tribes of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You shall divide it by lot as an inheritance among yourselves and among the foreigners who stay among you, who give birth to sons among you. They shall be to you as the native-born [in the country] among the children (descendants) of Israel; they shall be allotted an inheritance with you among the tribes of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: In whatever tribe the foreigner resides, there shall you give him his inheritance,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .
