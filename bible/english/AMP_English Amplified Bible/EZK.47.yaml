  - type: heading
    content: Water from the Temple
  - type: text
    content: Then he [my guide] brought me back to the door of the house [the temple of the L
  - type: heading
    content: ord
  - type: text
    content: ']; and behold, water was flowing from under the threshold of the house (temple) toward the east, for the front of the temple was facing east. And the water was flowing down from under, from the right side of the house, from south of the altar. '
  '10':
  - type: text
    content: 'And it will come about that fishermen will stand beside it [at the banks of the Dead Sea]; from Engedi to Eneglaim there will be dry places to spread nets. Their fish will be of very many kinds, like the fish of the Great [Mediterranean] Sea. '
  '11':
  - type: text
    content: 'But its swamps and marshes will not become fresh [and wholesome for animal life]; they will [as the river subsides] be left encrusted with salt. '
  '12':
  - type: text
    content: 'By the river on its bank, on one side and on the other, will grow all '
  - type: text
    content: kinds of
  - type: text
    content: ' trees for food. Their leaves will not wither and their fruit will not fail. They shall bear every month because their water flows from the sanctuary, and their fruit will be for food and their leaves for healing.” [Rev 22:2]'
  - type: heading
    content: Boundaries and Division of the Land
