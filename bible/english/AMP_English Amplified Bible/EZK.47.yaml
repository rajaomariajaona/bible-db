  '14':
  - type: text
    content: 'You shall divide it as an inheritance, each one equally with the other. I lifted up My hand '
  - type: text
    content: and
  - type: text
    content: ' swore to give it to your fathers, and this land shall fall to you as an inheritance.'
  '15':
  - type: text
    content: '“And this shall be the boundary of the land on the north side: from the Great [Mediterranean] Sea by way of Hethlon to the entrance of Zedad, '
  '16':
  - type: text
    content: 'Hamath, Berothah, Sibraim, which is between the border of Damascus and the border of Hamath; [as far as] Hazer-hatticon, which is on the border of Hauran. '
  '17':
  - type: text
    content: So the boundary will extend from the [Mediterranean] Sea to Hazar-enan at the border of Damascus, and on the north, northward, is the border of Hamath. This is the north side.
  '18':
  - type: text
    content: '“The east side, from between Hauran, Damascus, Gilead, and the land of Israel, '
  - type: text
    content: shall be
  - type: text
    content: ' the Jordan; from the '
  - type: text
    content: north
  - type: text
    content: ' border to the eastern sea you shall measure. This is the east side.'
  '19':
  - type: text
    content: '“The south side, southward, from Tamar [near the Dead Sea] '
  - type: text
    content: shall extend
  - type: text
    content: ' as far as the waters of Meribath-kadesh, to the Brook of Egypt and to the Great [Mediterranean] Sea. This is the south side toward the south.'
  '2':
  - type: text
    content: 'Then he brought me out by way of the north gate and led me around on the outside to the outer gate by the way of '
  - type: text
    content: the gate
  - type: text
    content: ' that faces east. And behold, water was spurting out from the south side [of the gate]. [Zech 14:8; Rev 22:1, 2]'
  '20':
  - type: text
    content: '“The west side '
  - type: text
    content: shall be
  - type: text
    content: ' the Great [Mediterranean] Sea, from the '
  - type: text
    content: south
  - type: text
    content: ' border to a point opposite Lebo-hamath [north of Mount Hermon]. This is the west side.'
  '21':
  - type: text
    content: '“So you shall divide this land among yourselves according to the tribes of Israel. '
  '22':
  - type: text
    content: 'You shall divide it by lot as an inheritance among yourselves and among the foreigners who stay among you, who give birth to sons among you. They shall be to you as the native-born [in the country] among the children (descendants) of Israel; they shall be allotted an inheritance with you among the tribes of Israel. '
  '23':
  - type: text
    content: In whatever tribe the foreigner resides, there shall you give him his inheritance,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: .
  '3':
  - type: text
    content: 'When the man went out toward the east with a measuring line in his hand, he measured a thousand cubits, and he led me through the water, water that was ankle-deep. '
  '4':
  - type: text
    content: 'Again he measured a thousand [cubits] and led me through the water, water that was knee-deep. Again he measured a thousand [cubits] and led me through '
  - type: text
    content: the water,
  - type: text
    content: ' water '
  - type: text
    content: reaching
  - type: text
    content: ' the hips. '
  '5':
  - type: text
    content: 'Again he measured a thousand [cubits]; '
  - type: text
    content: and it was
  - type: text
    content: ' a river that I could not pass through, for the water had risen, '
  - type: text
    content: enough
  - type: text
    content: ' water to swim in, a river that could not be crossed [by wading]. '
  '6':
  - type: text
    content: 'And he said to me, “Son of man, have you seen this?” Then he brought me back to the bank of the river. '
  '7':
  - type: text
    content: 'Now when I had returned, behold, on the bank of the river were very many trees on the one side and on the other. '
  '8':
  - type: text
    content: 'Then he said to me, “These waters go out toward the eastern region and go down into the Arabah (the Jordan Valley); then they go toward the sea, being made to flow into the sea, and the waters '
  - type: text
    content: of the Dead Sea
  - type: text
    content: ' shall be healed '
  - type: text
    content: and
  - type: text
    content: ' become fresh. '
  '9':
  - type: text
    content: 'It will come about that every living creature which swarms in every place where the river goes, will live. And there will be a very great number of fish, because these waters go there so that the waters of the sea are healed '
  - type: text
    content: and
  - type: text
    content: ' become fresh; so everything will live wherever the river goes. '
