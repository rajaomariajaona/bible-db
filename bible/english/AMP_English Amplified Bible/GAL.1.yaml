    content: Introduction
  - type: text
    content: 'Paul, an apostle (not commissioned '
  - type: text
    content: and
  - type: text
    content: ' sent from men nor through the agency of man, but through Jesus Christ—the Messiah—and God the Father, who raised Him from the dead), '
  '10':
  - type: text
    content: 'Am I now '
  - type: note
    content: Paul’s question indicates that his opponents were accusing him of preaching only to gain a following.
  - type: text
    content: 'trying to win the favor '
  - type: text
    content: and
  - type: text
    content: ' approval of men, or of God? Or am I seeking to please someone? If I were still trying to be popular with men, I would not be a bond-servant of Christ.'
  - type: heading
    content: Paul Defends His Ministry
  '11':
  - type: text
    content: 'For I want you to know, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers, that the gospel which was preached by me is not man’s gospel [it is not a human invention, patterned after any human concept]. '
  '12':
  - type: text
    content: 'For indeed I did not receive it from man, nor was I taught it, but '
  - type: text
    content: I received it
  - type: text
    content: ' through a [direct] revelation of Jesus Christ.'
  '13':
  - type: text
    content: 'You have heard of my career '
  - type: text
    content: and
  - type: text
    content: ' former manner of life in Judaism, how I used to hunt down '
  - type: text
    content: and
  - type: text
    content: ' persecute the church of God extensively and [with fanatical zeal] tried [my best] to destroy it. '
  '14':
  - type: text
    content: 'And [you have heard how] I surpassed many of my contemporaries among my countrymen in [my advanced study of the laws of] Judaism, as I was extremely loyal to the traditions of my ancestors. '
  '15':
  - type: text
    content: 'But when God, who had chosen me '
  - type: text
    content: and
  - type: text
    content: ' set me apart before I was born, and called me through His grace, was pleased [Is 49:1; Jer 1:5] '
  '16':
  - type: text
    content: 'to reveal His Son in me so that I might preach Him among the Gentiles [as the good news—the way of salvation], I did not immediately consult with '
  - type: note
    content: Lit flesh and blood.
  - type: text
    content: 'anyone [for guidance regarding God’s call and His revelation to me]. '
  '17':
  - type: text
    content: 'Nor did I [even] go up to Jerusalem to those who were apostles before me; but I went to Arabia '
  - type: text
    content: and
  - type: text
    content: ' stayed awhile, and afterward returned once more to Damascus.'
  '18':
  - type: text
    content: 'Then three years later I did go up to Jerusalem to get acquainted with Cephas (Peter), and I stayed with him fifteen days. '
  '19':
  - type: text
    content: 'But I did not see any other apostle except James, the [half-] brother of the Lord. '
  '2':
  - type: text
    content: and all the brothers who are with me,
  - type: text
    content: T
  - type: text
    content: 'o the churches of Galatia:'
  '20':
  - type: text
    content: '(Now in what I am writing to you, I assure you as if I were standing before God that I am not lying.) '
  '21':
  - type: text
    content: 'Then I went into the regions of Syria and Cilicia. '
  '22':
  - type: text
    content: 'And I was still unknown by sight to the churches which were in Christ in Judea (Jerusalem and the surrounding region); '
  '23':
  - type: text
    content: 'they only kept hearing, “He who used to persecute us is now preaching the [good news of the] faith which he once was trying to destroy.” '
  '24':
  - type: text
    content: And they were glorifying God [as the Author and Source of what had taken place and all that had been accomplished] in me.
  '3':
  - type: text
    content: 'Grace to you and peace [inner calm and spiritual well-being] from God our Father and the Lord Jesus Christ, '
  '4':
  - type: text
    content: 'who gave Himself [as a sacrifice to atone] for our sins [to save and sanctify us] so that He might rescue us from this present evil '
  - type: note
    content: Or world.
  - type: text
    content: 'age, in accordance with the will '
  - type: text
    content: and
  - type: text
    content: ' purpose '
  - type: text
    content: and
  - type: text
    content: ' plan of our God and Father— '
  '5':
  - type: text
    content: to Him be [ascribed all] the glory through the ages of the ages. Amen.
  - type: heading
    content: Perversion of the Gospel
  '6':
  - type: text
    content: 'I am astonished '
  - type: text
    content: and
  - type: text
    content: ' extremely irritated that you are so quickly shifting your allegiance '
  - type: text
    content: and
  - type: text
    content: ' deserting Him who called you by the grace of Christ, for a different [even contrary] gospel; '
  '7':
  - type: text
    content: 'which is really not another [gospel]; but there are [obviously] '
  - type: note
    content: These people are often called “Judaizers;” they were Jews professing to be believers, who taught that Gentile Christians had to conform to certain OT laws and rituals (especially circumcision) in order to be saved. They denied the saving power of God’s grace alone and also sought to discredit Paul’s apostleship and undermine his ministry. Some scholars question the validity of some or all of the Judaizers’ true faith in Christ and His message of salvation.
  - type: text
    content: 'some [people masquerading as teachers] who are disturbing '
  - type: text
    content: and
  - type: text
    content: ' confusing you [with a misleading, counterfeit teaching] and want to distort the gospel of Christ [twisting it into something which it absolutely is not]. '
  '8':
  - type: text
    content: 'But even if we, or an angel from heaven, should preach to you a gospel contrary to that which we [originally] preached to you, let him be condemned to destruction! '
  '9':
  - type: text
    content: As we have said before, so I now say again, if anyone is preaching to you a gospel different from that which you received [from us], let him be condemned to destruction!
