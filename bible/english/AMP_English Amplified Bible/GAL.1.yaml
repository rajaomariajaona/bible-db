document_id: GAL.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Introduction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, an apostle (not commissioned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sent from men nor through the agency of man, but through Jesus Christ—the Messiah—and God the Father, who raised Him from the dead), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and all the brothers who are with me,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: 'o the churches of Galatia:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Grace to you and peace [inner calm and spiritual well-being] from God our Father and the Lord Jesus Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'who gave Himself [as a sacrifice to atone] for our sins [to save and sanctify us] so that He might rescue us from this present evil '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: world
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'age, in accordance with the will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plan of our God and Father— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: to Him be [ascribed all] the glory through the ages of the ages. Amen.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Perversion of the Gospel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I am astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extremely irritated that you are so quickly shifting your allegiance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deserting Him who called you by the grace of Christ, for a different [even contrary] gospel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'which is really not another [gospel]; but there are [obviously] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These people are often called “Judaizers;” they were Jews professing to be believers, who taught that Gentile Christians had to conform to certain OT laws and rituals (especially circumcision) in order to be saved. They denied the saving power of God’s grace alone and also sought to discredit Paul’s apostleship and undermine his ministry. Some scholars question the validity of some or all of the Judaizers’ true faith in Christ and His message of salvation.
    marker-yv: yv-n
  - type: text
    text: 'some [people masquerading as teachers] who are disturbing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confusing you [with a misleading, counterfeit teaching] and want to distort the gospel of Christ [twisting it into something which it absolutely is not]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But even if we, or an angel from heaven, should preach to you a gospel contrary to that which we [originally] preached to you, let him be condemned to destruction! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: As we have said before, so I now say again, if anyone is preaching to you a gospel different from that which you received [from us], let him be condemned to destruction!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Am I now '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul’s question indicates that his opponents were accusing him of preaching only to gain a following.
    marker-yv: yv-n
  - type: text
    text: 'trying to win the favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' approval of men, or of God? Or am I seeking to please someone? If I were still trying to be popular with men, I would not be a bond-servant of Christ.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul Defends His Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For I want you to know, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'believers, that the gospel which was preached by me is not man’s gospel [it is not a human invention, patterned after any human concept]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For indeed I did not receive it from man, nor was I taught it, but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I received it
  - type: text
    text: ' through a [direct] revelation of Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'You have heard of my career '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' former manner of life in Judaism, how I used to hunt down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecute the church of God extensively and [with fanatical zeal] tried [my best] to destroy it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And [you have heard how] I surpassed many of my contemporaries among my countrymen in [my advanced study of the laws of] Judaism, as I was extremely loyal to the traditions of my ancestors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But when God, who had chosen me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set me apart before I was born, and called me through His grace, was pleased [Is 49:1; Jer 1:5] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'to reveal His Son in me so that I might preach Him among the Gentiles [as the good news—the way of salvation], I did not immediately consult with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: flesh and blood
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'anyone [for guidance regarding God’s call and His revelation to me]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nor did I [even] go up to Jerusalem to those who were apostles before me; but I went to Arabia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stayed awhile, and afterward returned once more to Damascus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then three years later I did go up to Jerusalem to get acquainted with Cephas (Peter), and I stayed with him fifteen days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But I did not see any other apostle except James, the [half-] brother of the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '(Now in what I am writing to you, I assure you as if I were standing before God that I am not lying.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then I went into the regions of Syria and Cilicia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And I was still unknown by sight to the churches which were in Christ in Judea (Jerusalem and the surrounding region); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'they only kept hearing, “He who used to persecute us is now preaching the [good news of the] faith which he once was trying to destroy.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And they were glorifying God [as the Author and Source of what had taken place and all that had been accomplished] in me.
