    content: But if you will not listen to Me and keep the Sabbath day holy by not carrying a load as you come in the gates of Jerusalem on the Sabbath day, then I will kindle a fire in her gates that cannot be extinguished, and it will devour the palaces of Jerusalem.” ’ ”
