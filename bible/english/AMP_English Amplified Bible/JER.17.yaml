    - type: text
      text: The Deceitful Heart
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The sin of Judah is written down with an iron stylus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: With a diamond point it is engraved upon the tablet of their heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on the horns of their altars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: As they remember their children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: remember
  - type: text
    text: ' [in detail] their [pagan] altars and their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Wooden carvings of the goddess Asherah.
    marker-yv: yv-n
  - type: text
    text: Asherim
- type: usfm
  marker: q1
  children:
  - type: text
    text: Beside green trees on the high hills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O [Jerusalem] My mountain in the countryside,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will give [to the Babylonians, as the cost of your sin] your wealth and all your treasures as plunder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And throughout your territory, your high places of sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And you will, through your own fault, let go of your [grip on your] inheritance
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I gave you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will make you serve your enemies
- type: usfm
  marker: q1
  children:
  - type: text
    text: In a land which you do not know;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you have kindled a fire in My anger
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which will burn forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Cursed is the man who trusts in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on mankind,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Making [weak, faulty human] flesh his strength,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And whose mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heart turn away from the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “For he will be like a shrub in the [parched] desert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shall not see prosperity when it comes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But shall live in the rocky places of the wilderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In an uninhabited salt land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Blessed [with spiritual security] is the man who believes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusts in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And whose hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident expectation is the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “For he will be [nourished] like a tree planted by the waters,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That spreads out its roots by the river;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will not fear the heat when it comes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But its leaves will be green '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' moist.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And it will not be anxious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' concerned in a year of drought'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor stop bearing fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶“The heart is deceitful above all things
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And it is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: incurable
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: extremely sick;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who can understand it fully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know its secret motives? [Matt 13:15-17; Mark 7:21-23; Eph 4:20-24]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “I, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', search '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' examine the mind,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I test the heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To give to each man according to his ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: According to the results of his deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Like the partridge that hatches eggs which she has not laid,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So is he who makes a fortune in ways that are unjust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will be lost to him before his days are over,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in the end he will be [nothing but] a fool.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶A glorious throne, set on high from the beginning,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is the place of our sanctuary (the temple).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the hope of Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who abandon You will be shamed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who turn away on earth will be written down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they have abandoned the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the fountain of living waters.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Heal me, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and I will be healed;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Save me and I will be saved,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You are my praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Behold, they keep saying to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Where is the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [that is, the disaster that you prophesied]?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let it come now!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But as for me, I have not tried to escape from being a shepherd [walking] after You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor have I longed for the woeful day [of judgment];
- type: usfm
  marker: q1
  children:
  - type: text
    text: You know that, whatever I said
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Was [spoken] in Your presence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was from You.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Do not be a terror to me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You are my refuge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my hope in the day of disaster.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Let those who persecute me be shamed, but as for me, protect me from shame;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them lose courage, but let me be undaunted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring on them a day of tragedy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And destroy them with double destruction!
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Sabbath Must Be Kept
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Thus the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “Go and stand in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: gate of the sons of the people.
    marker-yv: yv-n
  - type: text
    text: 'public gate, through which the kings of Judah come in and go out, and [stand] also in all the gates of Jerusalem; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: and say to them, ‘Listen to the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', kings of Judah, and all Judah, and all the people of Jerusalem who enter through these gates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Pay attention for your own good, [and for the sake of your future] do not carry any load on the Sabbath day or bring anything in through the gates of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You shall not carry a load out of your houses on the Sabbath day nor do any work, but keep the Sabbath day holy [by setting it apart as a day of worship], as I commanded your fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Yet they would not listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' control their behavior; but they were stiff-necked in order not to hear and take instruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But it will come about, if you listen diligently to Me,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “to bring no load in through the gates of this city on the Sabbath day, but keep the Sabbath day holy by doing no work on it, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'then kings and princes who will sit on the throne of David will enter through the gates of this city, riding in chariots and on horses—the kings and their princes, the men of Judah and the inhabitants of Jerusalem; and this city will be inhabited '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure throughout the ages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: People will come from the cities of Judah and the places all around Jerusalem, from the land of Benjamin, from the lowland, from the hill country and from the South (the Negev), bringing burnt offerings and sacrifices, grain offerings and incense, and bringing sacrifices of thanksgiving to the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But if you will not listen to Me and keep the Sabbath day holy by not carrying a load as you come in the gates of Jerusalem on the Sabbath day, then I will kindle a fire in her gates that cannot be extinguished, and it will devour the palaces of Jerusalem.” ’ ”
