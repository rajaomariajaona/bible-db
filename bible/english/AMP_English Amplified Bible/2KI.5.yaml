    content: 'When the king of Israel read the letter, he '
  - type: note
    content: It was a religious obligation among the Jews to tear one’s clothing as a sign of grief, or of horror and outrage over blasphemy. Here Jehoram the king does it because he has been asked to perform something which only God can do.
  - type: text
    content: tore his clothes [in shock and outrage at the request] and said, “Am I God, to kill and to make alive, that this man sends to me [a request] to heal a man of his leprosy? Just consider [what he is asking] and see how he is seeking an opportunity [for a battle] with me.”
