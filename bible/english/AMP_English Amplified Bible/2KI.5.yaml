document_id: 2KI.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Naaman Is Healed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Naaman, commander of the army of the king of Aram (Syria), was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: considered
    - type: text
      text: ' a great man by his king, and was highly respected because through Naaman the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had given victory to Aram (Syria). He was also a man of courage, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but he was
    - type: text
      text: ' a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew word translated '
        - type: usfm
          marker: it
          children:
          - type: text
            text: leprosy
        - type: text
          text: ' actually is a general term for skin diseases, and whether true leprosy (Hansen’s disease) or a lesser disease is in view depends on the context. It is likely that Naaman suffered from leprosy, because both the girl (v 3) and Jehoram (v 7) seem to think that only a miracle can cure him.'
      marker-yv: yv-n
    - type: text
      text: 'leper. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha sent a messenger to him, saying, “Go and wash in the Jordan seven times, and your flesh will be restored to you and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you will
    - type: text
      text: ' be clean.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Naaman was furious and went away and said, “Indeed! I thought ‘He would at least come out to [see] me and stand and call on the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God, and wave his hand over the place [of leprosy] and heal the leper.’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are not Abana and Pharpar, the rivers of Damascus [in Aram], better than all the waters of Israel? Could I not wash in them and be clean?” So he turned and went away in a rage. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then his servants approached and said to him, “My father, if the prophet had told you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to do some
    - type: text
      text: ' great thing, would you not have done it? How much more then, when he has said to you, ‘Wash, and be clean?’ ” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he went down and plunged himself into the Jordan seven times, just as the man of God had said; and his flesh was restored like that of a little child and he was clean.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gehazi’s Greed
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Naaman returned to the man of God, he and all the people in his group, and stood before him. He said, “Behold, I know that there is no God in all the earth, except in Israel; so now accept a blessing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gift from your servant.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Elisha said, “As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, before whom I stand, I will accept nothing.” He urged him to take it, but Elisha refused. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman said, “If not, then please, let your servant be given a load of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the ancient world, pagans believed a god could only be worshiped on the native soil of the nation which he served. Naaman wanted the soil for an altar (cf Ex 20:24) so that he could worship God in Aram (Syria).
      marker-yv: yv-n
    - type: text
      text: earth for a team of mules; for [from this day on] your servant will no longer offer a burnt offering nor a sacrifice to other gods, but only to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', [the God of Israel]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In this matter may the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' pardon your servant: when my master [the king] goes into the house of [his god] Rimmon to worship there, and he leans on my hand and I bow in the house of Rimmon, when I bow down in the house of Rimmon, may the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' pardon your servant in this matter [of attending the king when he worships].” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said to him, “Go in peace.” So Naaman departed and was a good distance away from him,
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Arameans (Syrians) had gone out in bands [as raiders] and had taken captive a little girl from the land of Israel; and she waited on Naaman’s wife [as a servant]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: when Gehazi, the servant of Elisha the man of God, said, “My master has spared this Naaman the Aramean (Syrian), by not accepting from him what he brought. As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, I will run after him and get something from him.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Gehazi pursued Naaman. When Naaman saw someone running after him, he got down from the chariot to meet him and said, “Is all well?” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “All is well. My master has sent me to say, ‘Just now two young men of the sons of the prophets have come to me from the hill country of Ephraim. Please give them a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 60 lbs.
      marker-yv: yv-n
    - type: text
      text: 'talent of silver and two changes of clothes.’ ” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman said, “Please take two talents.” And he urged him [to accept], and tied up two talents of silver in two bags with two changes of clothes and gave them to two of his servants; and they carried them in front of Gehazi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he came to the hill, he took them from their hand and put them in the house [for safekeeping]; and he sent the men away, and they left. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he went in and stood before his master. Elisha asked him, “Where have you been, Gehazi?” He said, “Your servant went nowhere.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha said to him, “Did my heart not go '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with you,
    - type: text
      text: ' when the man turned from his chariot to meet you? Is it a [proper] time to accept money and clothing and olive orchards and vineyards and sheep and oxen and male and female servants? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, the leprosy of Naaman shall cling to you and to your descendants forever.” So Gehazi departed from his presence, a leper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as white
    - type: text
      text: ' as snow. [Ex 4:6; Num 12:10]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She said to her mistress, “I wish that my master [Naaman] were with the prophet who is in Samaria! Then he would heal him of his leprosy.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman went in and told his master [the king], “The girl who is from the land of Israel said such and such.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king of Aram (Syria) said, “Go now, and I will send a letter to the king of Israel (Jehoram the son of Ahab).” So he left and took with him ten talents of silver and 6,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of gold, and ten changes of clothing.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought the letter to the king of Israel. It said, “And now when this letter comes to you, I will have sent my servant Naaman to you, so that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is clear from Jehoram’s reaction (v 7) that the letter expressly asked him to heal Naaman. It is possible that there was a misunderstanding on Naaman’s part or on the part of the Aramean king. More likely, the language of the request was in accordance with a royal protocol, giving credit for the healing to the king of Israel, who, it was expected, would send Naaman to Elisha and not take the request literally.
      marker-yv: yv-n
    - type: text
      text: 'you may heal him of his leprosy.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the king of Israel read the letter, he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It was a religious obligation among the Jews to tear one’s clothing as a sign of grief, or of horror and outrage over blasphemy. Here Jehoram the king does it because he has been asked to perform something which only God can do.
      marker-yv: yv-n
    - type: text
      text: tore his clothes [in shock and outrage at the request] and said, “Am I God, to kill and to make alive, that this man sends to me [a request] to heal a man of his leprosy? Just consider [what he is asking] and see how he is seeking an opportunity [for a battle] with me.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Elisha the man of God heard that the king of Israel had torn his clothes, he sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to the king, asking, “Why have you torn your clothes? Just let Naaman come to me, and he shall know that there is a [true] prophet in Israel.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Naaman came with his horses and chariots and stopped at the entrance of Elisha’s house. '
