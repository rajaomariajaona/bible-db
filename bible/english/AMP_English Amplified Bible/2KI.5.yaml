  '6':
  - type: text
    content: 'And he brought the letter to the king of Israel. It said, “And now when this letter comes to you, I will have sent my servant Naaman to you, so that '
  - type: note
    content: It is clear from Jehoram’s reaction (v 7) that the letter expressly asked him to heal Naaman. It is possible that there was a misunderstanding on Naaman’s part or on the part of the Aramean king. More likely, the language of the request was in accordance with a royal protocol, giving credit for the healing to the king of Israel, who, it was expected, would send Naaman to Elisha and not take the request literally.
  - type: text
