  '1':
  - type: heading
    content: David’s Kindness to Mephibosheth
  - type: text
    content: 'And David said, “Is there still anyone left of the house (family) of Saul to whom I may show kindness for Jonathan’s sake?” '
  '10':
  - type: text
    content: 'You and your sons and your servants shall cultivate the land for him, and you shall bring in '
  - type: text
    content: the produce,
  - type: text
    content: ' so that your master’s grandson may have food to eat; but Mephibosheth, your master’s grandson, shall always eat at my table.” Now Ziba had fifteen sons and twenty servants. '
  '11':
  - type: text
    content: 'Then Ziba said to the king, “Your servant will do according to everything that my lord the king commands.” So Mephibosheth ate at David’s table as one of the king’s sons. '
  '12':
  - type: text
    content: 'Mephibosheth had a young son whose name was Mica. And all who lived in Ziba’s house were servants to Mephibosheth. '
  '13':
  - type: text
    content: So Mephibosheth lived in Jerusalem, for he always ate at the king’s table. And he was lame in both feet.
  '2':
  - type: text
    content: There was a servant of the house of Saul whose name was Ziba, so they called him to David. And the king said to him, “Are you Ziba?” He said, “
