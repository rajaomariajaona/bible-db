    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Kindness to Mephibosheth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said, “Is there still anyone left of the house (family) of Saul to whom I may show kindness for Jonathan’s sake?” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You and your sons and your servants shall cultivate the land for him, and you shall bring in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the produce,
    - type: text
      text: ' so that your master’s grandson may have food to eat; but Mephibosheth, your master’s grandson, shall always eat at my table.” Now Ziba had fifteen sons and twenty servants. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ziba said to the king, “Your servant will do according to everything that my lord the king commands.” So Mephibosheth ate at David’s table as one of the king’s sons. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mephibosheth had a young son whose name was Mica. And all who lived in Ziba’s house were servants to Mephibosheth. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Mephibosheth lived in Jerusalem, for he always ate at the king’s table. And he was lame in both feet.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There was a servant of the house of Saul whose name was Ziba, so they called him to David. And the king said to him, “Are you Ziba?” He said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: I am
    - type: text
      text: ' your servant.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said, “Is there no longer anyone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: left
    - type: text
      text: ' of the house (family) of Saul to whom I may show the goodness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' graciousness of God?” Ziba replied to the king, “There is still a son of Jonathan, [one] whose feet are crippled.” [1 Sam 20:14-17] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king said to him, “Where is he?” And Ziba replied to the king, “He is in the house of Machir the son of Ammiel, in Lo-debar.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King David sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and had him brought from the house of Machir the son of Ammiel, from Lo-debar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mephibosheth the son of Jonathan, the son of Saul, came to David and fell face down and lay himself down [in respect]. David said, “Mephibosheth.” And he answered, “Here is your servant!” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to him, “Do not be afraid, for I will certainly show you kindness for the sake of your father Jonathan, and will restore to you all the land of your grandfather Saul; and you shall always eat at my table.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again Mephibosheth lay himself face down and said, “What is your servant, that you would be concerned for a dead dog like me?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king summoned Ziba, Saul’s servant, and said to him, “I have given your master’s grandson everything that belonged to Saul and to all his house (family). '
