  '4':
  - type: text
    content: 'So the king said to him, “Where is he?” And Ziba replied to the king, “He is in the house of Machir the son of Ammiel, in Lo-debar.” '
  '5':
  - type: text
    content: 'Then King David sent '
  - type: text
    content: word
  - type: text
    content: ' and had him brought from the house of Machir the son of Ammiel, from Lo-debar. '
  '6':
  - type: text
    content: 'Mephibosheth the son of Jonathan, the son of Saul, came to David and fell face down and lay himself down [in respect]. David said, “Mephibosheth.” And he answered, “Here is your servant!” '
  '7':
  - type: text
    content: 'David said to him, “Do not be afraid, for I will certainly show you kindness for the sake of your father Jonathan, and will restore to you all the land of your grandfather Saul; and you shall always eat at my table.” '
  '8':
  - type: text
    content: Again Mephibosheth lay himself face down and said, “What is your servant, that you would be concerned for a dead dog like me?”
  '9':
  - type: text
    content: 'Then the king summoned Ziba, Saul’s servant, and said to him, “I have given your master’s grandson everything that belonged to Saul and to all his house (family). '
