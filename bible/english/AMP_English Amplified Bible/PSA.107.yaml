document_id: PSA.107
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: BOOK FIVE
  marker-yv: yv-h
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 107
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ' Rescues People from Many Troubles.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for He is good;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For His compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness endure forever!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let the redeemed of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' say so,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whom He has redeemed from the hand of the adversary,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And gathered them from the lands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the east and from the west,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From the north and from the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '107:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sea
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: south.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶They wandered in the wilderness in a [solitary] desert region;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And did not find a way to an inhabited city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hungry and thirsty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They fainted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then they cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in their trouble,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He rescued them from their distresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He led them by the straight way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To an inhabited city [where they could establish their homes].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Let them give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for His lovingkindness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for His wonderful acts to the children of men!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For He satisfies the parched throat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And fills the hungry appetite with what is good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶Some dwelt in darkness and in the deep (deathly) darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prisoners [bound] in misery and chains, [Luke 1:79]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Because they had rebelled against the precepts of God
- type: usfm
  marker: q1
  children:
  - type: text
    text: And spurned the counsel of the Most High.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Therefore He humbled their heart with hard labor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They stumbled and there was no one to help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then they cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in their trouble,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He saved them from their distresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He brought them out of darkness and the deep (deathly) darkness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And broke their bonds apart. [Ps 68:6; Acts 12:7; 16:26]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Let them give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for His lovingkindness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for His wonderful acts to the children of men!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For He has shattered the gates of bronze
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cut the bars of iron apart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶Fools, because of their rebellious way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And because of their sins, were afflicted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They detested all kinds of food,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they drew near to the gates of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then they cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in their trouble,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He saved them from their distresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He sent His word and healed them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And rescued them from their destruction. [2 Kin 20:4, 5; Matt 8:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Let them give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for His lovingkindness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for His wonderful acts to the children of men! [Heb 13:15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And let them offer the sacrifices of thanksgiving,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And speak of His deeds with shouts of joy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ¶Those who go down to the sea in ships,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who do business on great waters;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: They have seen the works of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His wonders in the deep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: For He spoke and raised up a stormy wind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which lifted up the waves of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They went up toward the heavens [on the crest of the wave], they went down again to the depths [of the watery trough];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their courage melted away in their misery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They staggered and trembled like a drunken man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And were at their wits’ end [all their wisdom was useless].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then they cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in their trouble,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He brought them out of their distresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He hushed the storm to a gentle whisper,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that the waves of the sea were still. [Ps 65:7; 89:9; Matt 8:26]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then they were glad because of the calm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He guided them to their desired haven (harbor).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Let them give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for His lovingkindness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for His wonderful acts to the children of men!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Let them exalt Him also in the congregation of the people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And praise Him at the seat of the elders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ¶He turns rivers into a wilderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And springs of water into a thirsty ground; [1 Kin 17:1, 7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: A productive land into a [barren] salt waste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the wickedness of those who dwell in it. [Gen 13:10; 14:3; 19:25]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: He turns a wilderness into a pool of water
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a dry land into springs of water; [Is 41:18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: And there He has the hungry dwell,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that they may establish an inhabited city,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: And sow fields and plant vineyards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And produce an abundant harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Also He blesses them so that they multiply greatly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He does not let [the number of] their cattle decrease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ¶When they are diminished and bowed down (humbled)
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through oppression, misery, and sorrow,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: He pours contempt on princes
- type: usfm
  marker: q1
  children:
  - type: text
    text: And makes them wander in a pathless wasteland.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Yet He sets the needy securely on high, away from affliction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And makes their families like a flock.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: The upright see it and rejoice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But all unrighteousness shuts its mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Who is wise? Let him observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed these things;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [thoughtfully] consider the lovingkindness of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
