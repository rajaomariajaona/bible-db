document_id: PSA.107,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: BOOK FIVE
  - type: heading
    content: Psalm 107
  - type: heading
    content: The Lord Rescues People from Many Troubles.
  - type: text
    content: O give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ', for He is good;'
  - type: text
    content: 'For His compassion '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness endure forever!'
  '10':
  - type: text
    content: ¶Some dwelt in darkness and in the deep (deathly) darkness,
  - type: text
    content: Prisoners [bound] in misery and chains, [Luke 1:79]
  '11':
  - type: text
    content: Because they had rebelled against the precepts of God
  - type: text
    content: And spurned the counsel of the Most High.
  '12':
  - type: text
    content: Therefore He humbled their heart with hard labor;
  - type: text
    content: They stumbled and there was no one to help.
  '13':
  - type: text
    content: Then they cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' in their trouble,'
  - type: text
    content: And He saved them from their distresses.
  '14':
  - type: text
    content: He brought them out of darkness and the deep (deathly) darkness
  - type: text
    content: And broke their bonds apart. [Ps 68:6; Acts 12:7; 16:26]
  '15':
  - type: text
    content: Let them give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ' for His lovingkindness,'
  - type: text
    content: And for His wonderful acts to the children of men!
  '16':
  - type: text
    content: For He has shattered the gates of bronze
  - type: text
    content: And cut the bars of iron apart.
  '17':
  - type: text
    content: ¶Fools, because of their rebellious way,
  - type: text
    content: And because of their sins, were afflicted.
  '18':
  - type: text
    content: They detested all kinds of food,
  - type: text
    content: And they drew near to the gates of death.
  '19':
  - type: text
    content: Then they cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' in their trouble,'
  - type: text
    content: And He saved them from their distresses.
  '2':
  - type: text
    content: Let the redeemed of the L
  - type: heading
    content: ord
  - type: text
    content: ' say so,'
  - type: text
    content: Whom He has redeemed from the hand of the adversary,
  '20':
  - type: text
    content: He sent His word and healed them,
  - type: text
    content: And rescued them from their destruction. [2 Kin 20:4, 5; Matt 8:8]
  '21':
  - type: text
    content: Let them give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ' for His lovingkindness,'
  - type: text
    content: And for His wonderful acts to the children of men! [Heb 13:15]
  '22':
  - type: text
    content: And let them offer the sacrifices of thanksgiving,
  - type: text
    content: And speak of His deeds with shouts of joy!
  '23':
  - type: text
    content: ¶Those who go down to the sea in ships,
  - type: text
    content: Who do business on great waters;
  '24':
  - type: text
    content: They have seen the works of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And His wonders in the deep.
  '25':
  - type: text
    content: For He spoke and raised up a stormy wind,
  - type: text
    content: Which lifted up the waves of the sea.
  '26':
  - type: text
    content: They went up toward the heavens [on the crest of the wave], they went down again to the depths [of the watery trough];
  - type: text
    content: Their courage melted away in their misery.
  '27':
  - type: text
    content: They staggered and trembled like a drunken man,
  - type: text
    content: And were at their wits’ end [all their wisdom was useless].
  '28':
  - type: text
    content: Then they cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' in their trouble,'
  - type: text
    content: And He brought them out of their distresses.
  '29':
  - type: text
    content: He hushed the storm to a gentle whisper,
  - type: text
    content: So that the waves of the sea were still. [Ps 65:7; 89:9; Matt 8:26]
  '3':
  - type: text
    content: And gathered them from the lands,
  - type: text
    content: From the east and from the west,
  - type: text
    content: 'From the north and from the '
  - type: note
    content: Lit sea.
  - type: text
    content: south.
  '30':
  - type: text
    content: Then they were glad because of the calm,
  - type: text
    content: And He guided them to their desired haven (harbor).
  '31':
  - type: text
    content: Let them give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ' for His lovingkindness,'
  - type: text
    content: And for His wonderful acts to the children of men!
  '32':
  - type: text
    content: Let them exalt Him also in the congregation of the people,
  - type: text
    content: And praise Him at the seat of the elders.
  '33':
  - type: text
    content: ¶He turns rivers into a wilderness,
  - type: text
    content: And springs of water into a thirsty ground; [1 Kin 17:1, 7]
  '34':
  - type: text
    content: A productive land into a [barren] salt waste,
  - type: text
    content: Because of the wickedness of those who dwell in it. [Gen 13:10; 14:3; 19:25]
  '35':
  - type: text
    content: He turns a wilderness into a pool of water
  - type: text
    content: And a dry land into springs of water; [Is 41:18]
  '36':
  - type: text
    content: And there He has the hungry dwell,
  - type: text
    content: So that they may establish an inhabited city,
  '37':
  - type: text
    content: And sow fields and plant vineyards,
  - type: text
    content: And produce an abundant harvest.
  '38':
  - type: text
    content: Also He blesses them so that they multiply greatly,
  - type: text
    content: And He does not let [the number of] their cattle decrease.
  '39':
  - type: text
    content: ¶When they are diminished and bowed down (humbled)
  - type: text
    content: Through oppression, misery, and sorrow,
  '4':
  - type: text
    content: ¶They wandered in the wilderness in a [solitary] desert region;
  - type: text
    content: And did not find a way to an inhabited city.
  '40':
  - type: text
    content: He pours contempt on princes
  - type: text
    content: And makes them wander in a pathless wasteland.
  '41':
  - type: text
    content: Yet He sets the needy securely on high, away from affliction,
  - type: text
    content: And makes their families like a flock.
  '42':
  - type: text
    content: The upright see it and rejoice;
  - type: text
    content: But all unrighteousness shuts its mouth.
  '43':
  - type: text
    content: 'Who is wise? Let him observe '
  - type: text
    content: and
  - type: text
    content: ' heed these things;'
  - type: text
    content: And [thoughtfully] consider the lovingkindness of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '5':
  - type: text
    content: Hungry and thirsty,
  - type: text
    content: They fainted.
  '6':
  - type: text
    content: Then they cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' in their trouble,'
  - type: text
    content: And He rescued them from their distresses.
  '7':
  - type: text
    content: He led them by the straight way,
  - type: text
    content: To an inhabited city [where they could establish their homes].
  '8':
  - type: text
    content: Let them give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ' for His lovingkindness,'
  - type: text
    content: And for His wonderful acts to the children of men!
  '9':
  - type: text
    content: For He satisfies the parched throat,
  - type: text
    content: And fills the hungry appetite with what is good.
