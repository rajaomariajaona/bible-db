document_id: PSA.99,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 99
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Praise to the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ' for His Fidelity to Israel.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' reigns, let the peoples tremble [with submissive wonder]!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sits enthroned above the cherubim, let the earth shake!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is great in Zion,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And He is exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' magnified above all the peoples.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them [reverently] praise Your great and awesome name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holy is He. [Rev 15:4]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The strength of the King loves justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteous judgment;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have established fairness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have executed justice and righteousness in Jacob (Israel).
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exalt the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And worship at His footstool;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holy is He.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Moses and Aaron were among His priests,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Samuel was among those who called on His name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They called upon the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and He answered them.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He spoke to them in the pillar of cloud;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They kept His testimonies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the statutes that He gave them. [Ps 105:9, 10]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You answered them, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were a forgiving God to them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And yet an avenger of their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: evil
    - type: text
      text: ' practices.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exalt the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And worship at His holy hill [Zion, the temple mount],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God is holy.'
