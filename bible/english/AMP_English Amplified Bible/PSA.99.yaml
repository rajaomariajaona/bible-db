type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 99
  - type: heading
    content: Praise to the Lord for His Fidelity to Israel.
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' reigns, let the peoples tremble [with submissive wonder]!'
  - type: text
    content: He sits enthroned above the cherubim, let the earth shake!
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is great in Zion,'
  - type: text
    content: 'And He is exalted '
  - type: text
    content: and
  - type: text
    content: ' magnified above all the peoples.'
  '3':
  - type: text
    content: Let them [reverently] praise Your great and awesome name;
  - type: text
    content: Holy is He. [Rev 15:4]
  '4':
  - type: text
    content: 'The strength of the King loves justice '
  - type: text
    content: and
  - type: text
    content: ' righteous judgment;'
  - type: text
    content: You have established fairness;
  - type: text
    content: You have executed justice and righteousness in Jacob (Israel).
  '5':
  - type: text
    content: Exalt the L
  - type: heading
    content: ord
  - type: text
    content: ' our God'
  - type: text
    content: And worship at His footstool;
  - type: text
    content: Holy is He.
  '6':
  - type: text
    content: ¶Moses and Aaron were among His priests,
  - type: text
    content: And Samuel was among those who called on His name;
  - type: text
    content: They called upon the L
  - type: heading
    content: ord
  - type: text
    content: ' and He answered them.'
  '7':
  - type: text
    content: He spoke to them in the pillar of cloud;
  - type: text
    content: They kept His testimonies
  - type: text
    content: And the statutes that He gave them. [Ps 105:9, 10]
  '8':
  - type: text
    content: You answered them, O L
  - type: heading
    content: ord
  - type: text
    content: ' our God;'
  - type: text
    content: You were a forgiving God to them,
  - type: text
    content: 'And yet an avenger of their '
  - type: text
    content: evil
  - type: text
    content: ' practices.'
  '9':
  - type: text
    content: Exalt the L
  - type: heading
    content: ord
  - type: text
    content: ' our God'
  - type: text
    content: And worship at His holy hill [Zion, the temple mount],
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' our God is holy.'
