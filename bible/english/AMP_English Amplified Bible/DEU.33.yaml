      text: and
  - type: text
    text: ' blessed are you, O Israel;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is like you, a people saved by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Shield of your help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Sword of your majesty!
- type: usfm
  marker: q1
  children:
