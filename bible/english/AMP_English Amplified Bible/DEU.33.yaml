        text: The law required that the high priest act just as impartially when one of his immediate family died, as if the departed were not related to him (Lev 21:10-12); however, another application may be intended—referring to the events at the foot of Sinai, when the Levites killed other Israelites as Moses directed them (Ex 32:26-28).
