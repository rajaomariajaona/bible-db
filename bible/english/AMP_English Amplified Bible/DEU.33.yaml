  '6':
  - type: text
    content: ¶“May [the tribe of] Reuben live and not die out,
  - type: note
    content: Or Nor. The Hebrew can be taken either way, though the parallelism of thought slightly favors “nor let.” However, some argue for the wording “but let” due to the fact that Reuben had committed the grave offense of fornication with Bilhah, his father’s concubine (Gen 49:3, 4; also see note Gen 22:24). It is maintained that Moses’ blessing for Reuben is somewhat mixed, asking that the tribe not become extinct, but that it always be few in number.
  - type: text
    content: But let his men be few.”
