document_id: JOS.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tribes beyond Jordan Return
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Joshua called the Reubenites and the Gadites and the half-tribe of Manasseh, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and said to them, “You have kept all that Moses the servant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded you, and have listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed my voice in everything that I commanded you. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You have not deserted your brothers these many days to this day, but have [carefully] kept the obligation of the commandment of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has given rest to your brothers, as He has promised them; so turn now and go to your tents, to the land of your possession, which Moses the servant of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave you beyond the [east side of the] Jordan. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Only be very careful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' diligently observe the commandment and the law which Moses the servant of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has commanded you to love the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God and walk in all His ways and keep His commandments and hold fast to Him and serve Him with all your heart and with all your soul [your very life].” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Joshua blessed them and sent them away, and they went to their tents.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now to the one-half of the tribe of Manasseh Moses had given '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a possession
  - type: text
    text: ' in Bashan, but to the other half Joshua gave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a possession
  - type: text
    text: ' on the west side of the Jordan among their brothers. So when Joshua sent them away to their tents, he blessed them, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and he said to them, “Return to your tents with great riches and with very much livestock, with silver, gold, bronze, iron, and with very many clothes; divide the spoil of your enemies with your brothers (fellow tribesmen).” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the sons (descendants) of Reuben and the sons of Gad and the half-tribe of Manasseh returned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: home
  - type: text
    text: ' and departed from the [other] sons (western tribes) of Israel at Shiloh which is in the land of Canaan, to go to the land of Gilead, to the land of their own which they had possessed, in accordance with the command of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' through Moses.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Offensive Altar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When they came to the region of the Jordan which is in the land of Canaan, the sons of Reuben and the sons of Gad and the half-tribe of Manasseh built an altar there by the Jordan, an altar that was great to behold. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the [other] sons of Israel heard it said, “Look, the sons of Reuben and the sons of Gad and the half-tribe of Manasseh have built an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The immediate assumption of the Israelites was that this altar was an act of rebellion and was built to compete with the true altar of God in Shiloh.
    marker-yv: yv-n
  - type: text
    text: 'altar at the edge of the land of Canaan, in the region [west] of the Jordan, on the side '
  - type: usfm
    marker: it
    children:
    - type: text
      text: belonging to
  - type: text
    text: ' the sons of Israel.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When the sons of Israel heard of it, the whole congregation of the Israelites gathered at Shiloh to make war against them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the sons of Israel sent Phinehas the son of Eleazar the priest to the sons of Reuben and the sons of Gad and the half-tribe of Manasseh, in the land of Gilead, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and with him ten leaders, one leader from each father’s household from each of the tribes of Israel; and each one was the head of his father’s household among the thousands of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They came to the sons of Reuben and the sons of Gad and the half-tribe of Manasseh, in the land of Gilead, and they said to them, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “This is what the entire congregation of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says, ‘What is this disloyal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unfaithful act which you have committed against the God of Israel, so as to turn away from following the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' this day, by building yourselves an altar, to rebel against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' this day? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Is the wrongdoing (idolatry) of Peor not enough for us, from which we have not cleansed ourselves to this day, even though the affliction [in which twenty-four thousand died] came on the congregation of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', [Num 25:1-9] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: that you would turn away this day from following the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '? If you rebel against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' today, He will be angry with the entire congregation of Israel tomorrow. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: If, however, the land of your possession is unclean, then cross into the land of the possession of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', where the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' tabernacle is situated, and settle down among us. But do not rebel against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', or rebel against us by building an altar for yourselves, besides the altar of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God [at Shiloh]. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Did not Achan the son of Zerah act unfaithfully in the things under the ban, and [as a result God’s] wrath came on the entire congregation of Israel? And that man did not perish alone in his wrongdoing.’ ” [Josh 7:1-26]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then the sons of Reuben and the sons of Gad and the half-tribe of Manasseh answered and said to the heads of the families of Israel, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “The Mighty One, God, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the Mighty One, God, the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! He knows, and may Israel itself know. If it was in rebellion, or if in an unfaithful act against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', do not save us this day! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: If we have built an altar for ourselves to turn away from following the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', or if [we did so] to offer a burnt offering or grain offering on it, or if to offer sacrifices of peace offerings on it, may the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' Himself require it [of us and hold us responsible]. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But in truth we have done this out of concern, for a reason, saying, ‘In time to come your sons (descendants) may say to our sons, “What '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to you and to the L
        - type: usfm
          marker: sc
          children:
          - type: usfm
            marker: it
            children:
            - type: text
              text: ord
        - type: text
          text: .
    marker-yv: yv-n
  - type: text
    text: claim do you have to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has made the Jordan a border between us and you, you sons of Reuben and sons of Gad; you have no part in the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .” So your sons (descendants) may cause our sons to stop fearing the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“So we said, ‘Let us prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' build an altar, not for burnt offering or for sacrifice, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: but to be a witness between us and you and between the generations after us, that we are to perform the service of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' before Him with our burnt offerings, and with our sacrifices and with our peace offerings, so that your sons (descendants) will not say to our sons in time to come, “You have no part in the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So we said, ‘If your descendants should say this to us or to our descendants in time to come, then we can reply, “See the copy of the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which our fathers made, not for burnt offering or for sacrifice, but rather it is a witness between us and you.” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Far be it from us that we should rebel against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and turn away from following the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' this day, by building an altar for burnt offering, for grain offering or for sacrifice, besides the altar of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God which is before His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dwelling place
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: tabernacle [in Shiloh].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So when Phinehas the priest and the leaders of the congregation and heads of the families of Israel who were with him, heard the words which the sons of Reuben and the sons of Gad and the sons of Manasseh spoke, it '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: was good in their eyes
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'pleased them. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Phinehas the son of Eleazar the priest said to the sons of Reuben and the sons of Gad and the sons of Manasseh, “Today we know that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is among us, because you have not committed this unfaithful act against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; indeed you have saved Israel from the hand of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then Phinehas the son of Eleazar the priest and the leaders returned from the sons of Reuben and the sons of Gad, from the land of Gilead to the land of Canaan, to the sons of Israel, and brought back word to them. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The report '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: was good in the eyes of
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'pleased the sons of Israel, and the sons of Israel blessed God; and they said no more about going to battle against them to destroy the land in which the sons of Reuben and the sons of Gad were living. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The sons of Reuben and the sons of Gad called the altar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Witness;
  - type: text
    text: ' “For it is a witness between us that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is God.”'
