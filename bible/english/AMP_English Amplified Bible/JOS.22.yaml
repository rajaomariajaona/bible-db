type_code: eng
verses:
  '1':
  - type: heading
    content: Tribes beyond Jordan Return
  - type: text
    content: 'Then Joshua called the Reubenites and the Gadites and the half-tribe of Manasseh, '
  '10':
  - type: text
    content: 'When they came to the region of the Jordan which is in the land of Canaan, the sons of Reuben and the sons of Gad and the half-tribe of Manasseh built an altar there by the Jordan, an altar that was great to behold. '
  '11':
  - type: text
    content: 'And the [other] sons of Israel heard it said, “Look, the sons of Reuben and the sons of Gad and the half-tribe of Manasseh have built an '
  - type: note
    content: The immediate assumption of the Israelites was that this altar was an act of rebellion and was built to compete with the true altar of God in Shiloh.
  - type: text
    content: 'altar at the edge of the land of Canaan, in the region [west] of the Jordan, on the side '
  - type: text
    content: belonging to
  - type: text
    content: ' the sons of Israel.” '
  '12':
  - type: text
    content: When the sons of Israel heard of it, the whole congregation of the Israelites gathered at Shiloh to make war against them.
  '13':
  - type: text
    content: 'Then the sons of Israel sent Phinehas the son of Eleazar the priest to the sons of Reuben and the sons of Gad and the half-tribe of Manasseh, in the land of Gilead, '
  '14':
  - type: text
    content: 'and with him ten leaders, one leader from each father’s household from each of the tribes of Israel; and each one was the head of his father’s household among the thousands of Israel. '
  '15':
  - type: text
    content: 'They came to the sons of Reuben and the sons of Gad and the half-tribe of Manasseh, in the land of Gilead, and they said to them, '
  '16':
  - type: text
    content: “This is what the entire congregation of the L
  - type: heading
    content: ord
  - type: text
    content: ' says, ‘What is this disloyal '
  - type: text
    content: and
  - type: text
    content: ' unfaithful act which you have committed against the God of Israel, so as to turn away from following the L'
  - type: heading
    content: ord
  - type: text
    content: ' this day, by building yourselves an altar, to rebel against the L'
  - type: heading
    content: ord
  - type: text
    content: ' this day? '
  '17':
  - type: text
    content: Is the wrongdoing (idolatry) of Peor not enough for us, from which we have not cleansed ourselves to this day, even though the affliction [in which twenty-four thousand died] came on the congregation of the L
  - type: heading
    content: ord
  - type: text
    content: ', [Num 25:1-9] '
  '18':
  - type: text
    content: that you would turn away this day from following the L
  - type: heading
    content: ord
  - type: text
    content: '? If you rebel against the L'
  - type: heading
    content: ord
  - type: text
    content: ' today, He will be angry with the entire congregation of Israel tomorrow. '
  '19':
  - type: text
    content: If, however, the land of your possession is unclean, then cross into the land of the possession of the L
  - type: heading
    content: ord
  - type: text
    content: ', where the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' tabernacle is situated, and settle down among us. But do not rebel against the L'
  - type: heading
    content: ord
  - type: text
    content: ', or rebel against us by building an altar for yourselves, besides the altar of the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God [at Shiloh]. '
  '2':
  - type: text
    content: and said to them, “You have kept all that Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded you, and have listened to '
  - type: text
    content: and
  - type: text
    content: ' obeyed my voice in everything that I commanded you. '
  '20':
  - type: text
    content: Did not Achan the son of Zerah act unfaithfully in the things under the ban, and [as a result God’s] wrath came on the entire congregation of Israel? And that man did not perish alone in his wrongdoing.’ ” [Josh 7:1-26]
  '21':
  - type: text
    content: 'Then the sons of Reuben and the sons of Gad and the half-tribe of Manasseh answered and said to the heads of the families of Israel, '
  '22':
  - type: text
    content: “The Mighty One, God, the L
  - type: heading
    content: ord
  - type: text
    content: ', the Mighty One, God, the L'
  - type: heading
    content: ord
  - type: text
    content: '! He knows, and may Israel itself know. If it was in rebellion, or if in an unfaithful act against the L'
  - type: heading
    content: ord
  - type: text
    content: ', do not save us this day! '
  '23':
  - type: text
    content: If we have built an altar for ourselves to turn away from following the L
  - type: heading
    content: ord
  - type: text
    content: ', or if [we did so] to offer a burnt offering or grain offering on it, or if to offer sacrifices of peace offerings on it, may the L'
  - type: heading
    content: ord
  - type: text
    content: ' Himself require it [of us and hold us responsible]. '
  '24':
  - type: text
    content: 'But in truth we have done this out of concern, for a reason, saying, ‘In time to come your sons (descendants) may say to our sons, “What '
  - type: note
    content: Lit to you and to the Lord.
  - type: text
    content: claim do you have to the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel? '
  '25':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has made the Jordan a border between us and you, you sons of Reuben and sons of Gad; you have no part in the L'
  - type: heading
    content: ord
  - type: text
    content: .” So your sons (descendants) may cause our sons to stop fearing the L
  - type: heading
    content: ord
  - type: text
    content: .’
  '26':
  - type: text
    content: '“So we said, ‘Let us prepare '
  - type: text
    content: and
  - type: text
    content: ' build an altar, not for burnt offering or for sacrifice, '
  '27':
  - type: text
    content: but to be a witness between us and you and between the generations after us, that we are to perform the service of the L
  - type: heading
    content: ord
  - type: text
    content: ' before Him with our burnt offerings, and with our sacrifices and with our peace offerings, so that your sons (descendants) will not say to our sons in time to come, “You have no part in the L'
  - type: heading
    content: ord
  - type: text
    content: '.” ’ '
  '28':
  - type: text
    content: So we said, ‘If your descendants should say this to us or to our descendants in time to come, then we can reply, “See the copy of the altar of the L
  - type: heading
    content: ord
  - type: text
    content: ' which our fathers made, not for burnt offering or for sacrifice, but rather it is a witness between us and you.” ’ '
  '29':
  - type: text
    content: Far be it from us that we should rebel against the L
  - type: heading
    content: ord
  - type: text
    content: ' and turn away from following the L'
  - type: heading
    content: ord
  - type: text
    content: ' this day, by building an altar for burnt offering, for grain offering or for sacrifice, besides the altar of the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God which is before His '
  - type: note
    content: Lit dwelling place.
  - type: text
    content: tabernacle [in Shiloh].”
  '3':
  - type: text
    content: You have not deserted your brothers these many days to this day, but have [carefully] kept the obligation of the commandment of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '30':
  - type: text
    content: 'So when Phinehas the priest and the leaders of the congregation and heads of the families of Israel who were with him, heard the words which the sons of Reuben and the sons of Gad and the sons of Manasseh spoke, it '
  - type: note
    content: Lit was good in their eyes.
  - type: text
    content: 'pleased them. '
  '31':
  - type: text
    content: Phinehas the son of Eleazar the priest said to the sons of Reuben and the sons of Gad and the sons of Manasseh, “Today we know that the L
  - type: heading
    content: ord
  - type: text
    content: ' is among us, because you have not committed this unfaithful act against the L'
  - type: heading
    content: ord
  - type: text
    content: ; indeed you have saved Israel from the hand of the L
  - type: heading
    content: ord
  - type: text
    content: .”
  '32':
  - type: text
    content: 'Then Phinehas the son of Eleazar the priest and the leaders returned from the sons of Reuben and the sons of Gad, from the land of Gilead to the land of Canaan, to the sons of Israel, and brought back word to them. '
  '33':
  - type: text
    content: 'The report '
  - type: note
    content: Lit was good in the eyes of.
  - type: text
    content: 'pleased the sons of Israel, and the sons of Israel blessed God; and they said no more about going to battle against them to destroy the land in which the sons of Reuben and the sons of Gad were living. '
  '34':
  - type: text
    content: 'The sons of Reuben and the sons of Gad called the altar '
  - type: text
    content: Witness;
  - type: text
    content: ' “For it is a witness between us that the L'
  - type: heading
    content: ord
  - type: text
    content: ' is God.”'
  '4':
  - type: text
    content: And now the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has given rest to your brothers, as He has promised them; so turn now and go to your tents, to the land of your possession, which Moses the servant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' gave you beyond the [east side of the] Jordan. '
  '5':
  - type: text
    content: 'Only be very careful '
  - type: text
    content: and
  - type: text
    content: ' diligently observe the commandment and the law which Moses the servant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' has commanded you to love the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God and walk in all His ways and keep His commandments and hold fast to Him and serve Him with all your heart and with all your soul [your very life].” '
  '6':
  - type: text
    content: So Joshua blessed them and sent them away, and they went to their tents.
  '7':
  - type: text
    content: 'Now to the one-half of the tribe of Manasseh Moses had given '
  - type: text
    content: a possession
  - type: text
    content: ' in Bashan, but to the other half Joshua gave '
  - type: text
    content: a possession
  - type: text
    content: ' on the west side of the Jordan among their brothers. So when Joshua sent them away to their tents, he blessed them, '
  '8':
  - type: text
    content: 'and he said to them, “Return to your tents with great riches and with very much livestock, with silver, gold, bronze, iron, and with very many clothes; divide the spoil of your enemies with your brothers (fellow tribesmen).” '
  '9':
  - type: text
    content: 'So the sons (descendants) of Reuben and the sons of Gad and the half-tribe of Manasseh returned '
  - type: text
    content: home
  - type: text
    content: ' and departed from the [other] sons (western tribes) of Israel at Shiloh which is in the land of Canaan, to go to the land of Gilead, to the land of their own which they had possessed, in accordance with the command of the L'
  - type: heading
    content: ord
  - type: text
    content: ' through Moses.'
  - type: heading
    content: The Offensive Altar
