document_id: ISA.23,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Fall of Tyre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The [mournful, inspired] oracle (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. an urgent message the prophet is under compulsion to proclaim.
      marker-yv: yv-n
    - type: text
      text: 'a burden to be carried) concerning '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ancient Tyre was a Phoenician trading center with two separate urban areas; the major trading center was located on a fortified island and the suburban center was located on the adjacent coast. They were connected by a causeway built by Alexander the Great during his siege of Tyre.
      marker-yv: yv-n
    - type: text
      text: 'Tyre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, O ships of Tarshish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tyre
    - type: text
      text: ' is destroyed, without house, without harbor;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is reported to them from the land of Cyprus (Kittim).
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Overflow your land like [the overflow of] the Nile, O Daughter of Tarshish;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no more restraint [on you to make you pay tribute to Tyre].
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He has stretched out His hand over the sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has shaken the kingdoms;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has given a command concerning Canaan to destroy her strongholds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' her fortresses [like Tyre and Sidon].'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ¶He has said, “You shall never again exult [in triumph], O crushed Virgin Daughter of Sidon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, cross over to Cyprus; even there you will find no rest.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now look at the land of the Chaldeans (Babylonia)—this is the people which was not; the Assyrians allocated Tyre for desert creatures—they set up their '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Besieging a heavily fortified (walled) city was an ancient military tactic. The attackers would surround the city and cut off all supplies and communication to or from the inhabitants, then they would use siege towers to tear down the walls. The tower was a massive support structure for a heavy beam or log that was sharpened on one end and hung horizontally. It would be pushed against a wall and worked in such a way as to dislodge the stones that had been stacked to form the wall.
      marker-yv: yv-n
    - type: text
      text: siege towers, they stripped its palaces, they made it a ruin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Wail, O ships of Tarshish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your stronghold [of Tyre] is destroyed.
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now in that day Tyre will be forgotten for seventy years, like the days of one king. At the end of seventy years it will happen to Tyre as in the prostitute’s song:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Take a harp, walk around the city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O forgotten prostitute;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Play the strings skillfully, sing many songs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That you may be remembered.
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: It will come to pass at the end of seventy years that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will remember Tyre. Then she will return to her prostitute’s wages and will play the [role of a] prostitute [by trading] with all the kingdoms on the face of the earth. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But her commercial gain and her prostitute’s wages will be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tyre was destroyed by Nebuchadnezzar in 572 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '. and lay desolate for seventy years. The new city built on the island was taken by Alexander the Great in 332 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . Eventually Christianity prevailed at Tyre. Jesus visited there (Matt 15:21) and so did Paul (Acts 21:3-6). In his commentary on Isaiah Eusebius says that when the church of God was founded in Tyre, much of its wealth was consecrated to God and presented for the support of ministers. This is also the testimony of Jerome, the Latin church father writing in the fourth century.
      marker-yv: yv-n
    - type: text
      text: dedicated to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; it will not be treasured or stored up, but her commercial gain will become sufficient food and stately clothing for those who dwell (minister) in the presence of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Be silent, you inhabitants of the coastland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So some versions; MT reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: merchant
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: merchants of Sidon;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The DSS so read. MT reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Who crossed the sea, they replenished you
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Your messengers crossed the sea
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they were
    - type: text
      text: ' on great waters.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The grain of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An Egyptian name meaning “the pond of Horus”; it is probably a branch of the Nile or an unspecified lake.
      marker-yv: yv-n
    - type: text
      text: Shihor, the harvest of the Nile River, was Tyre’s revenue;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And she was the market of nations.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Be ashamed, O Sidon [mother-city of Tyre, now like a widow bereaved of her children];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the sea speaks, the stronghold of the sea, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have neither labored nor given birth [to children];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have neither brought up young men nor reared virgins.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When the report '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reaches
    - type: text
      text: ' Egypt,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be in agony at the report about Tyre.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Cross over to Tarshish [to seek safety as exiles];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, O inhabitants of the coastland [of Tyre].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Is this your jubilant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose origin dates back to antiquity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose feet used to carry her [far away] to colonize distant places?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶Who has planned this against Tyre, the bestower of crowns,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose merchants were princes, whose traders were the honored of the earth?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts has planned it, to defile the pride of all beauty,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To bring into contempt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humiliation all the honored of the earth.'
