  - type: text
    content: For your stronghold [of Tyre] is destroyed.
  '15':
  - type: text
    content: 'Now in that day Tyre will be forgotten for seventy years, like the days of one king. At the end of seventy years it will happen to Tyre as in the prostitute’s song:'
