  '18':
  - type: text
    content: 'But her commercial gain and her prostitute’s wages will be '
  - type: note
    content: Tyre was destroyed by Nebuchadnezzar in 572 b.c. and lay desolate for seventy years. The new city built on the island was taken by Alexander the Great in 332 b.c. Eventually Christianity prevailed at Tyre. Jesus visited there (Matt 15:21) and so did Paul (Acts 21:3-6). In his commentary on Isaiah Eusebius says that when the church of God was founded in Tyre, much of its wealth was consecrated to God and presented for the support of ministers. This is also the testimony of Jerome, the Latin church father writing in the fourth century.
