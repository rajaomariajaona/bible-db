  '13':
  - type: text
    content: 'Now look at the land of the Chaldeans (Babylonia)—this is the people which was not; the Assyrians allocated Tyre for desert creatures—they set up their '
  - type: note
    content: Besieging a heavily fortified (walled) city was an ancient military tactic. The attackers would surround the city and cut off all supplies and communication to or from the inhabitants, then they would use siege towers to tear down the walls. The tower was a massive support structure for a heavy beam or log that was sharpened on one end and hung horizontally. It would be pushed against a wall and worked in such a way as to dislodge the stones that had been stacked to form the wall.
  - type: text
    content: siege towers, they stripped its palaces, they made it a ruin.
