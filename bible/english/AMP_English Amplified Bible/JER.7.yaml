  '20':
  - type: text
    content: Therefore thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Behold, My anger and My wrath will be poured out on this place, on man and beast, on the trees of the field and the fruit of the ground; and it will burn and [the fire will] not be quenched.”'
  '21':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “Add your burnt offerings to your sacrifices and eat the meat. '
  '22':
  - type: text
    content: 'For in the day that I brought them out of the land of Egypt, I did not speak to your fathers or command them concerning burnt offerings or sacrifices. '
  '23':
  - type: text
    content: 'But this thing I did command them: ‘Listen to '
  - type: text
    content: and
  - type: text
    content: ' obey My voice, and I will be your God, and you shall be My people; and you will walk in all the way which I command you, so that it may be well with you.’ '
  '24':
  - type: text
    content: 'But they did not obey Me or bend their ear [to hear Me], but followed the counsels and the stubbornness of their [own] evil heart (mind), and [they turned and] went backward instead of forward. '
  '25':
  - type: text
    content: 'Since the day that your fathers came out of the land of Egypt until this day, I have [persistently] sent you all My servants the prophets, sending them daily, early [and late]. '
  '26':
  - type: text
    content: 'Yet they did not listen to Me '
  - type: text
    content: and
  - type: text
    content: ' obey Me or bend their ear [to hear Me], but stiffened their neck; they did more evil '
  - type: text
    content: and
  - type: text
    content: ' behaved worse than their fathers.'
  '27':
  - type: text
    content: '“You shall speak all these words to them, but they will not listen to you; and you shall [also] call to them, but they will not answer you. '
  '28':
  - type: text
    content: You shall say to them, ‘This is the nation that did not obey the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' their God or accept correction '
  - type: text
    content: and
  - type: text
    content: ' warning; truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness have perished and have completely vanished from their mouths.'
  '29':
  - type: text
    content: ‘Cut off your hair [your crown, O Jerusalem] and throw it away,
  - type: text
    content: And take up a mournful cry on the barren heights,
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has rejected and abandoned'
  - type: text
    content: The generation of His wrath.’
  '3':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “Change your ways and your behavior, and I will let you live in this place. '
  '30':
  - type: text
    content: For the children of Judah have done evil in My sight,” says the L
  - type: heading
    content: ord
  - type: text
    content: '; “they have set their disgusting '
  - type: text
    content: and
  - type: text
    content: ' shamefully vile things in the house which is called by My Name, to defile it. '
  '31':
  - type: text
    content: They have built the high places of Topheth, which is in the Valley of Ben-hinnom (son of Hinnom), to burn their sons and their daughters in the fire [to honor Molech, the fire god]—which I did not command, nor did it come into My heart (mind). [Lev 18:21; Josh 15:8; 2 Kin 16:2, 3; 21:1, 6; Is 30:33]
  '32':
  - type: text
    content: “Therefore, behold, the days are coming,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ', “when it will no longer be called Topheth or the Valley of Ben-hinnom, but the Valley of the Slaughter, for [in bloody warfare] they will bury [the dead] in Topheth until there is no more room. [Jer 19:6] '
  '33':
  - type: text
    content: 'And the dead bodies of this people will be food for the birds of the air and for the beasts of the earth and no one will frighten them away. '
  '34':
  - type: text
    content: Then I will cause the voices of joy and gladness, and the voices of the bridegroom and the bride to vanish from the cities of Judah and from the streets of Jerusalem; for the land will become a ruin—a wasteland.
  '4':
  - type: text
    content: 'Do not trust in the deceptive '
  - type: text
    content: and
  - type: text
    content: ' lying words [of the false prophets who claim that Jerusalem will be protected by God because of the temple], saying, ‘This is the temple of the L'
  - type: heading
    content: ord
  - type: text
    content: ', the temple of the L'
  - type: heading
    content: ord
  - type: text
    content: ', the temple of the L'
  - type: heading
    content: ord
  - type: text
    content: '.’ '
  '5':
  - type: text
    content: 'For if you thoroughly change your ways and your behavior, if you thoroughly '
  - type: text
    content: and
  - type: text
    content: ' honestly practice justice between a man and his neighbor, '
  '6':
  - type: text
    content: 'if you do not oppress the transient '
  - type: text
    content: and
  - type: text
    content: ' the foreigner, the orphan, or the widow, and do not shed innocent blood [by oppression and by unjust judicial murders] in Jerusalem, nor follow after other gods to your own ruin, '
  '7':
  - type: text
    content: then I will let you live in this place, in the land that I gave to your fathers [to live in] forever and ever.
  '8':
  - type: text
    content: '“Behold, you are trusting in deceptive '
  - type: text
    content: and
  - type: text
    content: ' useless words that bring no benefit. '
  '9':
  - type: text
    content: 'Will you steal, murder, commit adultery, swear [oaths] falsely, offer sacrifices '
  - type: text
    content: or
  - type: text
    content: ' burn incense to Baal, and follow after other gods that you have not known, '
