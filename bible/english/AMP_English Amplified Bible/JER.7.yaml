  '11':
  - type: text
    content: Has this house, which is called by My Name, become a den of robbers in your eyes [a place of retreat for you between acts of violence]? Behold, I Myself have seen it,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '12':
  - type: text
    content: '“But go now to My place which was in Shiloh [in Ephraim], where I first set My Name, and see what I did to it because of the wickedness of My people Israel. [1 Sam 4:10-18] '
  '13':
  - type: text
    content: And now, because you have done all these things,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “and I spoke [persistently] to you, even rising up early and speaking, but you did not listen, and I called you but you did not answer, '
  '14':
  - type: text
    content: 'therefore, I will do to this house (the temple) which is called by My Name, in which you trust, and to the place which I gave you and your fathers, just as I did to Shiloh. '
  '15':
  - type: text
    content: I will cast you out of My sight, as I have cast out all your brothers (relatives through Jacob), all the descendants of Ephraim.
  '16':
  - type: text
    content: '“Therefore, do not pray for this people [of Judah] or lift up a cry or entreaty for them or make intercession to Me, for I do not hear you. '
  '17':
  - type: text
    content: 'Do you not see what they are doing in the cities of Judah and in the streets of Jerusalem? '
  '18':
  - type: text
    content: 'The children gather wood, the fathers kindle the fire, and the women knead the dough to make cakes for the '
  - type: note
    content: A goddess of fertility, probably the Babylonian title for Ishtar. She is identified with the planet Venus. Offerings to this goddess included cakes made in the shape of a star (44:19).
  - type: text
    content: 'queen of heaven; and they pour out drink offerings to other gods that they may offend '
  - type: text
    content: and
  - type: text
    content: ' provoke Me to anger. '
  '19':
  - type: text
    content: 'Do they offend '
  - type: text
    content: and
  - type: text
    content: ' provoke Me to anger?” says the L'
  - type: heading
    content: ord
  - type: text
    content: '. “Is it not themselves [they offend], to their own shame?” '
  '2':
  - type: text
