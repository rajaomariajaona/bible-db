document_id: JER.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Message at the Temple Gate
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The word that came to Jeremiah from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and [then dare to] come and stand before Me in this house, which is called by My '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “Name” of God is equivalent to His gracious presence in passages such as this one. The place where God puts His Name is the place where He chooses to dwell.
      marker-yv: yv-n
    - type: text
      text: 'Name, and say, ‘We are protected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set free [by this act of religious ritual]!’—only to go on with this wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' these disgusting and loathsome things? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Has this house, which is called by My Name, become a den of robbers in your eyes [a place of retreat for you between acts of violence]? Behold, I Myself have seen it,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But go now to My place which was in Shiloh [in Ephraim], where I first set My Name, and see what I did to it because of the wickedness of My people Israel. [1 Sam 4:10-18] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And now, because you have done all these things,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “and I spoke [persistently] to you, even rising up early and speaking, but you did not listen, and I called you but you did not answer, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore, I will do to this house (the temple) which is called by My Name, in which you trust, and to the place which I gave you and your fathers, just as I did to Shiloh. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will cast you out of My sight, as I have cast out all your brothers (relatives through Jacob), all the descendants of Ephraim.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, do not pray for this people [of Judah] or lift up a cry or entreaty for them or make intercession to Me, for I do not hear you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not see what they are doing in the cities of Judah and in the streets of Jerusalem? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children gather wood, the fathers kindle the fire, and the women knead the dough to make cakes for the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A goddess of fertility, probably the Babylonian title for Ishtar. She is identified with the planet Venus. Offerings to this goddess included cakes made in the shape of a star (44:19).
      marker-yv: yv-n
    - type: text
      text: 'queen of heaven; and they pour out drink offerings to other gods that they may offend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provoke Me to anger. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do they offend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provoke Me to anger?” says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. “Is it not themselves [they offend], to their own shame?” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Stand in the gate of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house and proclaim there this word and say, ‘Hear the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', all you of Judah who enter by these gates to worship the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.’ ” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Behold, My anger and My wrath will be poured out on this place, on man and beast, on the trees of the field and the fruit of the ground; and it will burn and [the fire will] not be quenched.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “Add your burnt offerings to your sacrifices and eat the meat. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in the day that I brought them out of the land of Egypt, I did not speak to your fathers or command them concerning burnt offerings or sacrifices. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But this thing I did command them: ‘Listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey My voice, and I will be your God, and you shall be My people; and you will walk in all the way which I command you, so that it may be well with you.’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they did not obey Me or bend their ear [to hear Me], but followed the counsels and the stubbornness of their [own] evil heart (mind), and [they turned and] went backward instead of forward. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since the day that your fathers came out of the land of Egypt until this day, I have [persistently] sent you all My servants the prophets, sending them daily, early [and late]. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet they did not listen to Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey Me or bend their ear [to hear Me], but stiffened their neck; they did more evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' behaved worse than their fathers.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall speak all these words to them, but they will not listen to you; and you shall [also] call to them, but they will not answer you. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall say to them, ‘This is the nation that did not obey the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God or accept correction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' warning; truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness have perished and have completely vanished from their mouths.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Cut off your hair [your crown, O Jerusalem] and throw it away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And take up a mournful cry on the barren heights,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has rejected and abandoned'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The generation of His wrath.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “Change your ways and your behavior, and I will let you live in this place. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For the children of Judah have done evil in My sight,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; “they have set their disgusting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shamefully vile things in the house which is called by My Name, to defile it. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They have built the high places of Topheth, which is in the Valley of Ben-hinnom (son of Hinnom), to burn their sons and their daughters in the fire [to honor Molech, the fire god]—which I did not command, nor did it come into My heart (mind). [Lev 18:21; Josh 15:8; 2 Kin 16:2, 3; 21:1, 6; Is 30:33]
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Therefore, behold, the days are coming,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “when it will no longer be called Topheth or the Valley of Ben-hinnom, but the Valley of the Slaughter, for [in bloody warfare] they will bury [the dead] in Topheth until there is no more room. [Jer 19:6] '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the dead bodies of this people will be food for the birds of the air and for the beasts of the earth and no one will frighten them away. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I will cause the voices of joy and gladness, and the voices of the bridegroom and the bride to vanish from the cities of Judah and from the streets of Jerusalem; for the land will become a ruin—a wasteland.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not trust in the deceptive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lying words [of the false prophets who claim that Jerusalem will be protected by God because of the temple], saying, ‘This is the temple of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the temple of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the temple of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.’ '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if you thoroughly change your ways and your behavior, if you thoroughly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honestly practice justice between a man and his neighbor, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if you do not oppress the transient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the foreigner, the orphan, or the widow, and do not shed innocent blood [by oppression and by unjust judicial murders] in Jerusalem, nor follow after other gods to your own ruin, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then I will let you live in this place, in the land that I gave to your fathers [to live in] forever and ever.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Behold, you are trusting in deceptive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' useless words that bring no benefit. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Will you steal, murder, commit adultery, swear [oaths] falsely, offer sacrifices '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' burn incense to Baal, and follow after other gods that you have not known, '
