    content: 'and [then dare to] come and stand before Me in this house, which is called by My '
  - type: note
    content: The “Name” of God is equivalent to His gracious presence in passages such as this one. The place where God puts His Name is the place where He chooses to dwell.
  - type: text
    content: 'Name, and say, ‘We are protected '
  - type: text
