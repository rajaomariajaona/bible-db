  - type: text
    content: ', '
  - type: heading
    content: therefore
  - type: text
    content: ' I '
  - type: heading
    content: spoke
  - type: text
    content: '.” We also believe, therefore we also speak, [Ps 116:10] '
  '14':
  - type: text
    content: 'knowing that He who raised the Lord Jesus will also raise us with Jesus and will present us [along] with you in His presence. '
  '15':
  - type: text
    content: For all [these] things are for your sake, so that as [God’s remarkable, undeserved] grace reaches to more and more people it may increase thanksgiving, to the glory of [our great] God.
  '16':
  - type: text
    content: 'Therefore we do not become discouraged [spiritless, disappointed, or afraid]. Though our outer self is [progressively] wasting away, yet our inner '
  - type: text
    content: self
  - type: text
    content: ' is being [progressively] renewed day by day. '
  '17':
  - type: text
    content: 'For our momentary, light distress [this passing trouble] is producing for us an eternal weight of glory [a fullness] beyond all measure [surpassing all comparisons, a transcendent splendor and an endless blessedness]! '
  '18':
  - type: text
    content: 'So we look not at the things which are seen, but at the things which are unseen; for the things which are visible are temporal [just brief and fleeting], but the things which are invisible are everlasting '
  - type: text
    content: and
  - type: text
    content: ' imperishable.'
  '2':
  - type: text
    content: 'But we have renounced the disgraceful things hidden because of shame; not walking in trickery or adulterating the word of God, but by stating the truth [openly and plainly], we commend ourselves to everyone’s conscience in the sight of God. '
  '3':
  - type: text
    content: 'But even if our gospel is [in some sense] hidden [behind a veil], it is hidden [only] to those who are perishing; '
  '4':
  - type: text
    content: 'among them the god of this world [Satan] has blinded the minds of the unbelieving to prevent them from seeing the illuminating light of the gospel of the glory of Christ, who is the image of God. '
  '5':
  - type: text
    content: 'For we do not preach ourselves, but Jesus Christ as Lord, and ourselves [merely] as your bond-servants for Jesus’ sake. '
  '6':
  - type: text
    content: 'For God, who said, “Let light shine out of darkness,” is the One who has shone in our hearts to give us the Light of the knowledge of the glory '
  - type: text
    content: and
  - type: text
    content: ' majesty of God [clearly revealed] in the face of Christ. [Gen 1:3]'
  '7':
  - type: text
    content: 'But we have this '
  - type: text
    content: precious
  - type: text
    content: ' treasure [the good news about salvation] in [unworthy] earthen vessels [of human frailty], so that the grandeur '
  - type: text
    content: and
  - type: text
    content: ' surpassing greatness of the power will be [shown to be] from God [His sufficiency] and not from ourselves. '
  '8':
  - type: text
    content: 'We are pressured in every way [hedged in], but not crushed; perplexed [unsure of finding a way out], but not driven to despair; '
  '9':
  - type: text
    content: 'hunted down '
  - type: text
