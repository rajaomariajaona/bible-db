  '1':
  - type: heading
    content: Paul’s Apostolic Ministry
  - type: text
    content: 'Therefore, since we have this ministry, just as we received mercy [from God, granting us salvation, opportunities, and blessings], we do not get discouraged '
  - type: text
    content: nor
  - type: text
    content: ' lose our motivation. '
  '10':
  - type: text
    content: 'always carrying around in the body the dying of Jesus, so that the [resurrection] life of Jesus also may be shown in our body. '
  '11':
  - type: text
    content: 'For we who live are constantly [experiencing the threat of] being handed over to death for Jesus’ sake, so that the [resurrection] life of Jesus also may be evidenced in our mortal body [which is subject to death]. '
  '12':
  - type: text
    content: 'So '
  - type: text
    content: physical
  - type: text
    content: ' death is [actively] at work in us, but [spiritual] life [is actively at work] in you.'
  '13':
  - type: text
    content: 'Yet we have the same spirit of faith as he had, who wrote '
  - type: text
    content: in Scripture,
  - type: text
    content: ' “I '
  - type: heading
