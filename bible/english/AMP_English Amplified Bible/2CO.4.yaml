document_id: 2CO.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul’s Apostolic Ministry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore, since we have this ministry, just as we received mercy [from God, granting us salvation, opportunities, and blessings], we do not get discouraged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' lose our motivation. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'always carrying around in the body the dying of Jesus, so that the [resurrection] life of Jesus also may be shown in our body. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For we who live are constantly [experiencing the threat of] being handed over to death for Jesus’ sake, so that the [resurrection] life of Jesus also may be evidenced in our mortal body [which is subject to death]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: physical
    - type: text
      text: ' death is [actively] at work in us, but [spiritual] life [is actively at work] in you.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Yet we have the same spirit of faith as he had, who wrote '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in Scripture,
    - type: text
      text: ' “I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: believed
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: therefore
    - type: text
      text: ' I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: spoke
    - type: text
      text: '.” We also believe, therefore we also speak, [Ps 116:10] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'knowing that He who raised the Lord Jesus will also raise us with Jesus and will present us [along] with you in His presence. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: For all [these] things are for your sake, so that as [God’s remarkable, undeserved] grace reaches to more and more people it may increase thanksgiving, to the glory of [our great] God.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore we do not become discouraged [spiritless, disappointed, or afraid]. Though our outer self is [progressively] wasting away, yet our inner '
    - type: usfm
      marker: it
      children:
      - type: text
        text: self
    - type: text
      text: ' is being [progressively] renewed day by day. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For our momentary, light distress [this passing trouble] is producing for us an eternal weight of glory [a fullness] beyond all measure [surpassing all comparisons, a transcendent splendor and an endless blessedness]! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'So we look not at the things which are seen, but at the things which are unseen; for the things which are visible are temporal [just brief and fleeting], but the things which are invisible are everlasting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' imperishable.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But we have renounced the disgraceful things hidden because of shame; not walking in trickery or adulterating the word of God, but by stating the truth [openly and plainly], we commend ourselves to everyone’s conscience in the sight of God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But even if our gospel is [in some sense] hidden [behind a veil], it is hidden [only] to those who are perishing; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'among them the god of this world [Satan] has blinded the minds of the unbelieving to prevent them from seeing the illuminating light of the gospel of the glory of Christ, who is the image of God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For we do not preach ourselves, but Jesus Christ as Lord, and ourselves [merely] as your bond-servants for Jesus’ sake. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For God, who said, “Let light shine out of darkness,” is the One who has shone in our hearts to give us the Light of the knowledge of the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty of God [clearly revealed] in the face of Christ. [Gen 1:3]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But we have this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: precious
    - type: text
      text: ' treasure [the good news about salvation] in [unworthy] earthen vessels [of human frailty], so that the grandeur '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' surpassing greatness of the power will be [shown to be] from God [His sufficiency] and not from ourselves. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'We are pressured in every way [hedged in], but not crushed; perplexed [unsure of finding a way out], but not driven to despair; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'hunted down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persecuted, but not deserted [to stand alone]; struck down, but never destroyed; '
