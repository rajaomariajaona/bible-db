document_id: ISA.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Thanksgiving Expressed
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And on that day you will say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will give thanks to You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For though You were angry with me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your anger has turned away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And You comfort me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Behold, God, my salvation!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will trust and not be afraid,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' is my strength and song;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, He has become my salvation.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Therefore with joy you will draw water
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the springs of salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And in that day you will say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', call on His name [in prayer].'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make His deeds known among the peoples [of the earth];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Proclaim [to them] that His name is exalted!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sing praises to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for He has done excellent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorious things;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let this be known throughout the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Rejoice and shout for joy, O inhabitant of Zion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For great in your midst is the Holy One of Israel.
