document_id: EXO.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Birth of Moses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. Amram; Ex 6:20 identifies Amram and Jochebed as the parents of Aaron and Moses.
      marker-yv: yv-n
    - type: text
      text: 'man of the house of Levi [the priestly tribe] went and took as his wife a daughter of Levi. [Ex 6:18, 20; Num 26:59] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the child grew, and she brought him to Pharaoh’s daughter and he became her son. And she named him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Moses is a wonderful choice. It means “drawing out” in Hebrew, but in Egyptian, a similar word means “man of royalty” (e.g. the syllable “mose” in names like Thutmose).
      marker-yv: yv-n
    - type: text
      text: Moses, and said, “Because I drew him out of the water.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'One day, after Moses had grown [into adulthood], it happened that he went to his countrymen and looked [with compassion] at their hard labors; and he saw an Egyptian beating a Hebrew, one of his countrymen. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He turned to look around, and seeing no one, he killed the Egyptian and hid him in the sand. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He went out the next day and saw two Hebrew men fighting with each other; and he said to the aggressor, “Why are you striking your friend?” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But the man said, “Who made you a prince and a judge over us? Do you intend to kill me as you killed the Egyptian?” Then Moses was afraid and said, “Certainly this incident is known.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Moses Escapes to Midian
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This pharaoh is likely to be identified as Thutmose III (1483-1450 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .).
      marker-yv: yv-n
    - type: text
      text: 'Pharaoh heard about this matter, he tried to kill Moses. Then Moses fled from Pharaoh’s presence and took refuge in the land of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: After Sarah died Abraham took Keturah his concubine (see note Gen 22:24) as a secondary wife. Midian was the fourth of six sons born to Keturah. Abraham gave gifts to Isaac’s half-brothers and sent them eastward so that they would have no claim on Isaac’s position as Abraham’s only heir and the son of promise.
      marker-yv: yv-n
    - type: text
      text: Midian, where he sat down by a well.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now the priest of Midian had seven daughters; and they came and drew water [from the well where Moses was resting] and filled the troughs to water their father’s flock. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then shepherds came and drove them away, but Moses stood up and helped them and watered their flock. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'When they came to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Reuel’s other name, Jethro (Excellency), may have been a title indicating his rank in the tribe.
      marker-yv: yv-n
    - type: text
      text: 'Reuel (Jethro) their father, he said, “How is it that you have come back so soon today?” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'They said, “An Egyptian saved us from the shepherds. He even drew water [from the well] for us and watered the flock.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The woman conceived and gave birth to a son; and when she saw that he was [especially] beautiful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' healthy, she hid him for three months [to protect him from the Egyptians]. [Acts 7:20; Heb 11:23] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then he said to his daughters, “Where is he? Why have you left the man behind? Invite him to have something to eat.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Moses was willing to remain with the man, and he gave Moses his daughter Zipporah [to be his wife]. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: She gave birth to a son, and he named him Gershom (stranger); for he said, “I have been a stranger in a foreign land.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now it happened after a long time [about forty years] that the king of Egypt died. And the children of Israel (Jacob) groaned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sighed because of the bondage, and they cried out. And their cry for help because of their bondage '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The description of God in this passage (vv 23-25) attributes human qualities to God, including human emotions and ways of thinking or decision-making. It is meant to relate to a human point of view, without concern for a strict theological accounting of God’s nature. In reality, God is present everywhere, and is always aware of everything that has happened and will happen.
      marker-yv: yv-n
    - type: text
      text: 'ascended to God. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So God heard their groaning and God remembered His covenant with Abraham, Isaac, and Jacob (Israel). [Gen 12:1-3; 15:18-21; 17:3-8, 21; 35:10-12] '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'God saw the sons of Israel, and God took notice [of them] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' was concerned about them [knowing all, understanding all, remembering all]. [Ps 56:8, 9; 139:2]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When she could no longer hide him, she got him a basket (chest) made of papyrus reeds and covered it with tar and pitch [making it waterproof]. Then she put the child in it and set it among the reeds by the bank of the Nile. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And his sister [Miriam] stood some distance away to find out what would happen to him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: If the pharaoh is Thutmose I, then this is likely his daughter, Hatshepsut.
      marker-yv: yv-n
    - type: text
      text: 'daughter of Pharaoh came down to bathe at the Nile, and [she, together with] her maidens walked along the river’s bank; she saw the basket among the reeds and sent her maid [to get it], and she brought it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to her.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When she opened it, she saw the child, and behold, the baby was crying. And she took pity on him and said, “This is one of the Hebrews’ children.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then his sister said to Pharaoh’s daughter, “Shall I go and call a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a nursing woman
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'wet-nurse from the Hebrew women to nurse the child for you?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And Pharaoh’s daughter said to her, “Go '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ahead
    - type: text
      text: '.” So the girl went and called the child’s mother. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then Pharaoh’s daughter said to her, “Take this child away and nurse him for me, and I will give you your wages.” So the woman took the child and nursed him. '
