document_id: DEU.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Tablets Rewritten
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “At that time the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, ‘Cut out for yourself two tablets of stone like the first, and come up to Me on the mountain, and make an ark (chest) of wood for yourself. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “And I stayed on the mountain, like the first time, forty days and nights, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' listened to me at that time also; the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was not willing to destroy you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, ‘Arise, go on your journey ahead of the people, so that they may go in and take possession of the land which I swore to their fathers to give to them.’'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “And now, Israel, what does the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God require from you, but to fear [and worship] the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God [with awe-filled reverence and profound respect], to walk [that is, to live each and every day] in all His ways and to love Him, and to serve the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God with all your heart and with all your soul [your choices, your thoughts, your whole being], '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to keep the commandments of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and His statutes which I am commanding you today for your good? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Behold, the heavens and the highest of heavens belong to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, the earth and all that is in it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Yet the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: strengthened His heart
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'had a delight in loving your fathers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set His affection on them, and He chose their descendants after them, you above all peoples, as it is this day. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So circumcise [that is, remove sin from] your heart, and be stiff-necked (stubborn, obstinate) no longer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Elohim
        - type: text
          text: . The primary word translated “God” in the O.T.; the mighty God, the Creator; the great triune God manifested as Father, Son, and Holy Spirit.
      marker-yv: yv-n
    - type: text
      text: 'God is the God of gods and the Lord of lords, the great, the mighty, the awesome God who does not show '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: lift up faces
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'partiality nor take a bribe. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: is doing
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'executes justice for the orphan and the widow, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: is loving
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'shows His love for the stranger (resident alien, foreigner) by giving him food and clothing. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Therefore, show your love for the stranger, for you were strangers in the land of Egypt. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I will write on the tablets the words that were on the first tablets which you shattered, and you shall put them in the ark.’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: You shall fear [and worship] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God [with awe-filled reverence and profound respect]; you shall serve Him and cling to Him [hold tightly to Him, be united with Him], and you shall swear [oaths] by His name. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'He is your praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory; He is your God, who has done for you these great and awesome things which you have seen with your own eyes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Your fathers went down to Egypt, seventy persons [in all], and now the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has made you as numerous as the stars of heaven.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So I made an ark of acacia wood and cut out two tablets of stone like the first, and went up the mountain '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The size of the two tablets of stone on which the Ten Commandments were written is uncertain. They probably were not great tombstone-sized slabs like those depicted in works of art, but were likely smaller rectangular plates, two of which could be carried by one man.
      marker-yv: yv-n
    - type: text
      text: 'with the two tablets in my hand. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' wrote on the tablets, like the first writing, the Ten '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Words
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Commandments which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had spoken to you on the mountain from the midst of the fire on the day of the assembly; then the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave them to me. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then I turned and came down from the mountain and put the tablets in the ark which I had made; and they are there, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded me.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '(Now the sons of Israel traveled from the wells of the sons of Jaakan to Moserah. There Aaron died and there he was buried and Eleazar his son ministered as priest in his place. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'From there they traveled to Gudgodah, and from Gudgodah to Jotbathah, a land of brooks of water. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: At that time the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' set apart the tribe of Levi to carry the ark of the covenant of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', to stand before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to serve Him and to bless in His name until this day. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Therefore, Levi does not have a portion or inheritance [of tribal land] with his brothers; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Serving as priests, the Levites were to live off the various offerings presented by the people (Num 18:21; Deut 18:1; Josh 13:14). In addition, each of the other tribes set aside cities within their respective territories for the Levites (Num 35:1-8).
      marker-yv: yv-n
    - type: text
      text: the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is his inheritance, as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: has spoken to
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: has promised him.)
