document_id: DEU.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tablets Rewritten
  - type: text
    content: “At that time the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, ‘Cut out for yourself two tablets of stone like the first, and come up to Me on the mountain, and make an ark (chest) of wood for yourself. '
  '10':
  - type: text
    content: “And I stayed on the mountain, like the first time, forty days and nights, and the L
  - type: heading
    content: ord
  - type: text
    content: ' listened to me at that time also; the L'
  - type: heading
    content: ord
  - type: text
    content: ' was not willing to destroy you. '
  '11':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, ‘Arise, go on your journey ahead of the people, so that they may go in and take possession of the land which I swore to their fathers to give to them.’'
  '12':
  - type: text
    content: “And now, Israel, what does the L
  - type: heading
    content: ord
  - type: text
    content: ' your God require from you, but to fear [and worship] the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God [with awe-filled reverence and profound respect], to walk [that is, to live each and every day] in all His ways and to love Him, and to serve the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God with all your heart and with all your soul [your choices, your thoughts, your whole being], '
  '13':
  - type: text
    content: and
  - type: text
    content: ' to keep the commandments of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and His statutes which I am commanding you today for your good? '
  '14':
  - type: text
    content: Behold, the heavens and the highest of heavens belong to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, the earth and all that is in it. '
  '15':
  - type: text
    content: Yet the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: note
    content: Lit strengthened His heart.
  - type: text
    content: 'had a delight in loving your fathers '
  - type: text
    content: and
  - type: text
    content: ' set His affection on them, and He chose their descendants after them, you above all peoples, as it is this day. '
  '16':
  - type: text
    content: 'So circumcise [that is, remove sin from] your heart, and be stiff-necked (stubborn, obstinate) no longer. '
  '17':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' your '
  - type: note
    content: Heb Elohim. The primary word translated “God” in the O.T.; the mighty God, the Creator; the great triune God manifested as Father, Son, and Holy Spirit.
  - type: text
    content: 'God is the God of gods and the Lord of lords, the great, the mighty, the awesome God who does not show '
  - type: note
    content: Lit lift up faces.
  - type: text
    content: 'partiality nor take a bribe. '
  '18':
  - type: text
    content: 'He '
  - type: note
    content: Lit is doing.
  - type: text
    content: 'executes justice for the orphan and the widow, and '
  - type: note
    content: Lit is loving.
  - type: text
    content: 'shows His love for the stranger (resident alien, foreigner) by giving him food and clothing. '
  '19':
  - type: text
    content: 'Therefore, show your love for the stranger, for you were strangers in the land of Egypt. '
  '2':
  - type: text
    content: 'I will write on the tablets the words that were on the first tablets which you shattered, and you shall put them in the ark.’ '
  '20':
  - type: text
    content: You shall fear [and worship] the L
  - type: heading
    content: ord
  - type: text
    content: ' your God [with awe-filled reverence and profound respect]; you shall serve Him and cling to Him [hold tightly to Him, be united with Him], and you shall swear [oaths] by His name. '
  '21':
  - type: text
    content: 'He is your praise '
  - type: text
    content: and
  - type: text
    content: ' glory; He is your God, who has done for you these great and awesome things which you have seen with your own eyes. '
  '22':
  - type: text
    content: Your fathers went down to Egypt, seventy persons [in all], and now the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has made you as numerous as the stars of heaven.'
  '3':
  - type: text
    content: 'So I made an ark of acacia wood and cut out two tablets of stone like the first, and went up the mountain '
  - type: note
    content: The size of the two tablets of stone on which the Ten Commandments were written is uncertain. They probably were not great tombstone-sized slabs like those depicted in works of art, but were likely smaller rectangular plates, two of which could be carried by one man.
  - type: text
    content: 'with the two tablets in my hand. '
  '4':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' wrote on the tablets, like the first writing, the Ten '
  - type: note
    content: Lit Words.
  - type: text
    content: Commandments which the L
  - type: heading
    content: ord
  - type: text
    content: ' had spoken to you on the mountain from the midst of the fire on the day of the assembly; then the L'
  - type: heading
    content: ord
  - type: text
    content: ' gave them to me. '
  '5':
  - type: text
    content: Then I turned and came down from the mountain and put the tablets in the ark which I had made; and they are there, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded me.”'
  '6':
  - type: text
    content: '(Now the sons of Israel traveled from the wells of the sons of Jaakan to Moserah. There Aaron died and there he was buried and Eleazar his son ministered as priest in his place. '
  '7':
  - type: text
    content: 'From there they traveled to Gudgodah, and from Gudgodah to Jotbathah, a land of brooks of water. '
  '8':
  - type: text
    content: At that time the L
  - type: heading
    content: ord
  - type: text
    content: ' set apart the tribe of Levi to carry the ark of the covenant of the L'
  - type: heading
    content: ord
  - type: text
    content: ', to stand before the L'
  - type: heading
    content: ord
  - type: text
    content: ' to serve Him and to bless in His name until this day. '
  '9':
  - type: text
    content: 'Therefore, Levi does not have a portion or inheritance [of tribal land] with his brothers; '
  - type: note
    content: Serving as priests, the Levites were to live off the various offerings presented by the people (Num 18:21; Deut 18:1; Josh 13:14). In addition, each of the other tribes set aside cities within their respective territories for the Levites (Num 35:1-8).
  - type: text
    content: the L
  - type: heading
    content: ord
  - type: text
    content: ' is his inheritance, as the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God '
  - type: note
    content: Lit has spoken to.
  - type: text
    content: has promised him.)
