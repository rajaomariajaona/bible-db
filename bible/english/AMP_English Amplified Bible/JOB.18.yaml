document_id: JOB.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bildad Speaks of the Wicked
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then Bildad the Shuhite answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “A noose is hidden for him on the ground,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a trap for him on the path.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Terrors frighten him on every side
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And chase at his heels.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“The strength [of the wicked] is famished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weakened,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And disaster is ready at his side [if he stops].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “His skin is devoured by disease;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The firstborn of death [the worst of diseases] consumes his limbs.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “He is torn from his tent which he trusted [for safety],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he is marched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brought to the king of terrors (death).'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Nothing of his dwells in his tent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brimstone (burning sulfur) is scattered over his dwelling [to purify it].
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “The roots [of the wicked] are dried up below,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And above, his branch is cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' withers.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Memory of him perishes from the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he has no name on the street.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“He is driven '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' propelled from light into darkness,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And chased from the inhabited world.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “He has no offspring or prosperity among his people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor any survivor where he sojourned.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“How long will you hunt for words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' continue these speeches?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do some clear thinking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' show understanding and then we can talk.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“Those in the west are astonished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appalled at his fate,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those in the east are seized with horror.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Surely such are the dwellings of the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the ungodly,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And such is the place of him who does not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' honor God.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Why are we regarded as beasts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As if [we are] stupid (senseless) in your eyes?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “You who tear yourself apart in anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is the earth to be abandoned for your sake,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or the rock to be moved out of its place?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶“Indeed, the light of the wicked will be put out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the flame of his fire will not shine. [Prov 13:9; 24:20]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “The light will be dark in his tent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his lamp beside him will be put out. [Ps 18:28]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “The vigorous stride will be shortened,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his own counsel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the scheme [in which he trusted] will bring his downfall.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “For the wicked is thrown into a net by his own feet (wickedness),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he steps on the webbing [of the lattice-covered pit].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “A snare catches him by the heel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a trap snaps shut on him.
