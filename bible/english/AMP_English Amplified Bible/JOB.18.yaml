document_id: JOB.18,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad Speaks of the Wicked
  - type: text
    content: Then Bildad the Shuhite answered and said,
  '10':
  - type: text
    content: “A noose is hidden for him on the ground,
  - type: text
    content: And a trap for him on the path.
  '11':
  - type: text
    content: “Terrors frighten him on every side
  - type: text
    content: And chase at his heels.
  '12':
  - type: text
    content: '“The strength [of the wicked] is famished '
  - type: text
    content: and
  - type: text
    content: ' weakened,'
  - type: text
    content: And disaster is ready at his side [if he stops].
  '13':
  - type: text
    content: “His skin is devoured by disease;
  - type: text
    content: The firstborn of death [the worst of diseases] consumes his limbs.
  '14':
  - type: text
    content: “He is torn from his tent which he trusted [for safety],
  - type: text
    content: 'And he is marched '
  - type: text
    content: and
  - type: text
    content: ' brought to the king of terrors (death).'
  '15':
  - type: text
    content: “Nothing of his dwells in his tent;
  - type: text
    content: Brimstone (burning sulfur) is scattered over his dwelling [to purify it].
  '16':
  - type: text
    content: “The roots [of the wicked] are dried up below,
  - type: text
    content: 'And above, his branch is cut off '
  - type: text
    content: and
  - type: text
    content: ' withers.'
  '17':
  - type: text
    content: “Memory of him perishes from the earth,
  - type: text
    content: And he has no name on the street.
  '18':
  - type: text
    content: '“He is driven '
  - type: text
    content: and
  - type: text
    content: ' propelled from light into darkness,'
  - type: text
    content: And chased from the inhabited world.
  '19':
  - type: text
    content: “He has no offspring or prosperity among his people,
  - type: text
    content: Nor any survivor where he sojourned.
  '2':
  - type: text
    content: '“How long will you hunt for words '
  - type: text
    content: and
  - type: text
    content: ' continue these speeches?'
  - type: text
    content: 'Do some clear thinking '
  - type: text
    content: and
  - type: text
    content: ' show understanding and then we can talk.'
  '20':
  - type: text
    content: '“Those in the west are astonished '
  - type: text
    content: and
  - type: text
    content: ' appalled at his fate,'
  - type: text
    content: And those in the east are seized with horror.
  '21':
  - type: text
    content: '“Surely such are the dwellings of the wicked '
  - type: text
    content: and
  - type: text
    content: ' the ungodly,'
  - type: text
    content: 'And such is the place of him who does not know '
  - type: text
    content: or
  - type: text
    content: ' recognize '
  - type: text
    content: or
  - type: text
    content: ' honor God.”'
  '3':
  - type: text
    content: “Why are we regarded as beasts,
  - type: text
    content: As if [we are] stupid (senseless) in your eyes?
  '4':
  - type: text
    content: “You who tear yourself apart in anger,
  - type: text
    content: Is the earth to be abandoned for your sake,
  - type: text
    content: Or the rock to be moved out of its place?
  '5':
  - type: text
    content: ¶“Indeed, the light of the wicked will be put out,
  - type: text
    content: And the flame of his fire will not shine. [Prov 13:9; 24:20]
  '6':
  - type: text
    content: “The light will be dark in his tent,
  - type: text
    content: And his lamp beside him will be put out. [Ps 18:28]
  '7':
  - type: text
    content: “The vigorous stride will be shortened,
  - type: text
    content: 'And his own counsel '
  - type: text
    content: and
  - type: text
    content: ' the scheme [in which he trusted] will bring his downfall.'
  '8':
  - type: text
    content: “For the wicked is thrown into a net by his own feet (wickedness),
  - type: text
    content: And he steps on the webbing [of the lattice-covered pit].
  '9':
  - type: text
    content: “A snare catches him by the heel,
  - type: text
    content: And a trap snaps shut on him.
