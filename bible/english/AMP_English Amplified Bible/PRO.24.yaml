document_id: PRO.24,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Precepts and Warnings
  - type: text
    content: Do not be envious of evil men,
  - type: text
    content: Nor desire to be with them;
  '10':
  - type: text
    content: ¶If you are slack (careless) in the day of distress,
  - type: text
    content: Your strength is limited.
  '11':
  - type: text
    content: ¶Rescue those who are being taken away to death,
  - type: text
    content: And those who stagger to the slaughter, Oh hold them back [from their doom]!
  '12':
  - type: text
    content: If you [claim ignorance and] say, “See, we did not know this,”
  - type: text
    content: 'Does He not consider it who weighs '
  - type: text
    content: and
  - type: text
    content: ' examines the hearts '
  - type: text
    content: and
  - type: text
    content: ' their motives?'
  - type: text
    content: 'And does He not know it who guards your life '
  - type: text
    content: and
  - type: text
    content: ' keeps your soul?'
  - type: text
    content: And will He not repay [you and] every man according to his works?
  '13':
  - type: text
    content: ¶My son, eat honey, because it is good,
  - type: text
    content: And the drippings of the honeycomb are sweet to your taste.
  '14':
  - type: text
    content: 'Know that [skillful and godly] wisdom is [so very good] for your life '
  - type: text
    content: and
  - type: text
    content: ' soul;'
  - type: text
    content: 'If you find wisdom, then there will be a future '
  - type: text
    content: and
  - type: text
    content: ' a reward,'
  - type: text
    content: 'And your hope '
  - type: text
    content: and
  - type: text
    content: ' expectation will not be cut off.'
  '15':
  - type: text
    content: ¶Do not lie in wait, O wicked man, against the dwelling of the righteous;
  - type: text
    content: Do not destroy his resting place;
  '16':
  - type: text
    content: For a righteous man falls seven times, and rises again,
  - type: text
    content: 'But the wicked stumble in '
  - type: text
    content: time of
  - type: text
    content: ' disaster '
  - type: text
    content: and
  - type: text
    content: ' collapse. [Job 5:19; Ps 34:19; 37:24; Mic 7:8]'
  '17':
  - type: text
    content: '¶Do not rejoice '
  - type: text
    content: and
  - type: text
    content: ' gloat when your enemy falls,'
  - type: text
    content: And do not let your heart be glad [in self-righteousness] when he stumbles,
  '18':
  - type: text
    content: Or the L
  - type: heading
    content: ord
  - type: text
    content: ' will see your gloating and be displeased,'
  - type: text
    content: And turn His anger away from your enemy.
  '19':
  - type: text
    content: ¶Do not get upset because of evildoers,
  - type: text
    content: Or be envious of the wicked,
  '2':
  - type: text
    content: For their minds plot violence,
  - type: text
    content: And their lips talk of trouble [for the innocent].
  '20':
  - type: text
    content: For there will be no future for the evil man;
  - type: text
    content: The lamp of the wicked will be put out.
  '21':
  - type: text
    content: ¶My son, fear the L
  - type: heading
    content: ord
  - type: text
    content: ' and the king;'
  - type: text
    content: And do not associate with those who are given to change [of allegiance, and are revolutionary],
  '22':
  - type: text
    content: For their tragedy will rise suddenly,
  - type: text
    content: And who knows the punishment that both [the L
  - type: heading
    content: ord
  - type: text
    content: ' and the king] will bring on the rebellious?'
  '23':
  - type: text
    content: '¶These also are sayings of the wise:'
  - type: text
    content: To show partiality in judgment is not good.
  '24':
  - type: text
    content: He who says to the wicked, “You are righteous,”
  - type: text
    content: Peoples will curse him, nations will denounce him;
  '25':
  - type: text
    content: 'But to those [honorable judges] who rebuke the '
  - type: text
    content: wicked,
  - type: text
    content: ' it will go well with them '
  - type: text
    content: and
  - type: text
    content: ' they will find delight,'
  - type: text
    content: And a good blessing will come upon them.
  '26':
  - type: text
    content: He kisses the lips [and wins the hearts of people]
  - type: text
    content: 'Who gives a right '
  - type: text
    content: and
  - type: text
    content: ' straightforward answer.'
  '27':
  - type: text
    content: ¶Prepare your work outside
  - type: text
    content: And get it ready for yourself in the field;
  - type: note
    content: Establishing your priorities and proceeding in an orderly manner brings its own reward.
  - type: text
    content: 'Afterward build your house '
  - type: text
    content: and
  - type: text
    content: ' establish a home.'
  '28':
  - type: text
    content: '¶Do not be a witness against your '
  - type: note
    content: I.e. anyone who comes into your life, not necessarily one who lives nearby.
  - type: text
    content: neighbor without cause,
  - type: text
    content: And do not deceive with your lips [speak neither lies nor half-truths]. [Eph 4:25]
  '29':
  - type: text
    content: Do not say, “I will do to him as he has done to me;
  - type: text
    content: I will pay the man back for his deed.” [Prov 20:22; Matt 5:39, 44; Rom 12:17, 19]
  '3':
  - type: text
    content: ¶Through [skillful and godly] wisdom a house [a life, a home, a family] is built,
  - type: text
    content: And by understanding it is established [on a sound and good foundation],
  '30':
  - type: text
    content: ¶I went by the field of the lazy man,
  - type: text
    content: 'And by the vineyard of the man lacking understanding '
  - type: text
    content: and
  - type: text
    content: ' common sense;'
  '31':
  - type: text
    content: And, behold, it was all overgrown with thorns,
  - type: text
    content: And nettles were covering its surface,
  - type: text
    content: And its stone wall was broken down.
  '32':
  - type: text
    content: When I saw, I considered it well;
  - type: text
    content: I looked and received instruction.
  '33':
  - type: text
    content: “Yet a little sleep, a little slumber,
  - type: text
    content: A little folding of the hands to rest [and daydream],”
  '34':
  - type: text
    content: Then your poverty will come as a robber,
  - type: text
    content: And your want like an armed man.
  '4':
  - type: text
    content: And by knowledge its rooms are filled
  - type: text
    content: With all precious and pleasant riches.
  '5':
  - type: text
    content: ¶A wise man is strong,
  - type: text
    content: And a man of knowledge strengthens his power; [Prov 21:22; Eccl 9:16]
  '6':
  - type: text
    content: For by wise guidance you can wage your war,
  - type: text
    content: 'And in an abundance of [wise] counselors there is victory '
  - type: text
    content: and
  - type: text
    content: ' safety.'
  '7':
  - type: text
    content: '¶Wisdom is too exalted for a [hardened, arrogant] '
  - type: note
    content: See note 1:7.
  - type: text
    content: fool;
  - type: text
    content: He does not open his mouth in the gate [where the city’s rulers sit in judgment].
  '8':
  - type: text
    content: ¶He who plans to do evil
  - type: text
    content: 'Will be called a schemer '
  - type: text
    content: or
  - type: text
    content: ' deviser of evil.'
  '9':
  - type: text
    content: The devising of folly is sin,
  - type: text
    content: And the scoffer is repulsive to men.
