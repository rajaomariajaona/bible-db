document_id: PRO.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Precepts and Warnings
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Do not be envious of evil men,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor desire to be with them;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For their minds plot violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their lips talk of trouble [for the innocent].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ¶Through [skillful and godly] wisdom a house [a life, a home, a family] is built,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by understanding it is established [on a sound and good foundation],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And by knowledge its rooms are filled
- type: usfm
  marker: q1
  children:
  - type: text
    text: With all precious and pleasant riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶A wise man is strong,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a man of knowledge strengthens his power; [Prov 21:22; Eccl 9:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For by wise guidance you can wage your war,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And in an abundance of [wise] counselors there is victory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' safety.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '¶Wisdom is too exalted for a [hardened, arrogant] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 1:7.
    marker-yv: yv-n
  - type: text
    text: fool;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He does not open his mouth in the gate [where the city’s rulers sit in judgment].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶He who plans to do evil
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will be called a schemer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' deviser of evil.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The devising of folly is sin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the scoffer is repulsive to men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶If you are slack (careless) in the day of distress,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your strength is limited.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶Rescue those who are being taken away to death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who stagger to the slaughter, Oh hold them back [from their doom]!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If you [claim ignorance and] say, “See, we did not know this,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Does He not consider it who weighs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' examines the hearts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their motives?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And does He not know it who guards your life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keeps your soul?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will He not repay [you and] every man according to his works?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶My son, eat honey, because it is good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the drippings of the honeycomb are sweet to your taste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Know that [skillful and godly] wisdom is [so very good] for your life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soul;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'If you find wisdom, then there will be a future '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a reward,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And your hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectation will not be cut off.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶Do not lie in wait, O wicked man, against the dwelling of the righteous;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not destroy his resting place;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For a righteous man falls seven times, and rises again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the wicked stumble in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: time of
  - type: text
    text: ' disaster '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' collapse. [Job 5:19; Ps 34:19; 37:24; Mic 7:8]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '¶Do not rejoice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gloat when your enemy falls,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not let your heart be glad [in self-righteousness] when he stumbles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Or the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will see your gloating and be displeased,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And turn His anger away from your enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶Do not get upset because of evildoers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or be envious of the wicked,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: For there will be no future for the evil man;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lamp of the wicked will be put out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ¶My son, fear the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the king;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not associate with those who are given to change [of allegiance, and are revolutionary],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For their tragedy will rise suddenly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And who knows the punishment that both [the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the king] will bring on the rebellious?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '¶These also are sayings of the wise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To show partiality in judgment is not good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He who says to the wicked, “You are righteous,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peoples will curse him, nations will denounce him;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But to those [honorable judges] who rebuke the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wicked,
  - type: text
    text: ' it will go well with them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they will find delight,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a good blessing will come upon them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He kisses the lips [and wins the hearts of people]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who gives a right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' straightforward answer.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ¶Prepare your work outside
- type: usfm
  marker: q1
  children:
  - type: text
    text: And get it ready for yourself in the field;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Establishing your priorities and proceeding in an orderly manner brings its own reward.
    marker-yv: yv-n
  - type: text
    text: 'Afterward build your house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish a home.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '¶Do not be a witness against your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. anyone who comes into your life, not necessarily one who lives nearby.
    marker-yv: yv-n
  - type: text
    text: neighbor without cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not deceive with your lips [speak neither lies nor half-truths]. [Eph 4:25]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Do not say, “I will do to him as he has done to me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will pay the man back for his deed.” [Prov 20:22; Matt 5:39, 44; Rom 12:17, 19]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ¶I went by the field of the lazy man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And by the vineyard of the man lacking understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' common sense;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And, behold, it was all overgrown with thorns,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And nettles were covering its surface,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its stone wall was broken down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: When I saw, I considered it well;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I looked and received instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “Yet a little sleep, a little slumber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A little folding of the hands to rest [and daydream],”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Then your poverty will come as a robber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your want like an armed man.
