    - type: text
      text: The Murmuring of Miriam and Aaron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Miriam is presumed to be the leader of the attack on Moses’ authority because she is mentioned before Aaron and because of the severity of her punishment.
    marker-yv: yv-n
  - type: text
    text: 'Miriam and Aaron spoke against Moses because of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because the ancient borders of Cush and Midian sometimes overlapped Miriam may have considered Moses’ wife, Zipporah, a Cushite instead of a Midianite (Ex 2:21); however, it is also possible that Zipporah had died and this refers to a second wife. Marriage with a Canaanite was forbidden (Ex 34:11, 16), but not marriage with an Egyptian or Cushite. Joseph’s wife was an Egyptian (Gen 41:45).
    marker-yv: yv-n
  - type: text
    text: 'Cushite woman whom he had married (for he had married a Cushite woman); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and they said, “Has the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' really spoken only through Moses? Has He not spoken also through us?” And the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' heard it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some scholars believe this comment was added to the text after Moses’ death.
    marker-yv: yv-n
  - type: text
    text: 'Now the man Moses was very humble (gentle, kind, devoid of self-righteousness), more than any man who was on the face of the earth.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Suddenly the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, Aaron, and Miriam, “Come out, you three, to the Tent of Meeting (tabernacle).” And the three of them came out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came down in a pillar of cloud and stood at the doorway of the tabernacle, and He called Aaron and Miriam, and they came forward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And He said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Hear now My words:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: If there is a prophet among you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will make Myself known to him in a vision'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will speak to him in a dream.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “But it is not so with My servant Moses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He is entrusted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful in all My house. [Heb 3:2, 5, 6]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “With him I speak mouth to mouth [directly],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Clearly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' openly and not in riddles;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he beholds the form of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why then were you not afraid to speak against My servant Moses?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was kindled against Miriam and Aaron, and He departed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But when the cloud had withdrawn from over the tent, behold, Miriam was leprous, as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: white as
  - type: text
    text: ' snow. And Aaron turned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' looked at Miriam, and, behold, she was leprous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Aaron said to Moses, “Oh, my lord, I plead with you, do not account this sin to us, in which we have acted foolishly and in which we have sinned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Oh, do not let her be like one dead, already half decomposed when he comes from his mother’s womb.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So Moses cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “Heal her please, O God, I plead with You!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “If her father had but '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. rebuked her publicly.
    marker-yv: yv-n
  - type: text
    text: 'spit in her face, would she not bear her shame for seven days? Let her be shut up outside the camp for seven days, and afterward she may return.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So Miriam was shut up outside the camp for seven days, and the people did not move on until Miriam was brought in again [and declared ceremonially clean from her leprosy].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Afterward the people moved on from Hazeroth and camped in the Wilderness of Paran.
