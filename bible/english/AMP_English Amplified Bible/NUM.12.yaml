    content: The Murmuring of Miriam and Aaron
  - type: text
    content: 'Now '
  - type: note
    content: Miriam is presumed to be the leader of the attack on Moses’ authority because she is mentioned before Aaron and because of the severity of her punishment.
  - type: text
    content: 'Miriam and Aaron spoke against Moses because of the '
  - type: note
    content: Because the ancient borders of Cush and Midian sometimes overlapped Miriam may have considered Moses’ wife, Zipporah, a Cushite instead of a Midianite (Ex 2:21); however, it is also possible that Zipporah had died and this refers to a second wife. Marriage with a Canaanite was forbidden (Ex 34:11, 16), but not marriage with an Egyptian or Cushite. Joseph’s wife was an Egyptian (Gen 41:45).
  - type: text
    content: 'Cushite woman whom he had married (for he had married a Cushite woman); '
