document_id: GEN.41,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pharaoh’s Dream
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened at the end of two full years that Pharaoh dreamed that he was standing by the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the river,
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'Nile. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[Two years ago] Pharaoh was angry with his servants, and he put me in confinement in the house of the captain of the guard, both me and the chief baker. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We dreamed a dream on the same night, he and I; each of us dreamed according to [the significance of] the interpretation of his own dream. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was with us [in the prison] a young man, a Hebrew, servant to the captain of the guard; and we told him, and he interpreted our dreams for us, to each man according to the significance of his own dream. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And just as he interpreted [the dreams] for us, so it happened; I was restored to my office [as chief cupbearer], and the baker was hanged.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joseph Interprets
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Pharaoh sent and called for Joseph, and they hurriedly brought him out of the dungeon; and when Joseph shaved himself and changed his clothes [making himself presentable], he came to Pharaoh. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaoh said to Joseph, “I have dreamed a dream, and there is no one who can interpret it; and I have heard it said about you that you can understand a dream and interpret it.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph answered Pharaoh, “It is not in me [to interpret the dream]; God [not I] will give Pharaoh a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: answer of peace
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'favorable answer [through me].” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Pharaoh said to Joseph, “In my dream, I was standing on the bank of the Nile; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and seven fat, sleek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' handsome cows came up out of the river, and they grazed in the reed grass [of a marshy pasture]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lo, seven other cows came up after them, very ugly and gaunt [just skin and bones]; such emaciated animals as I have never seen in all the land of Egypt. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And lo, there came up out of the Nile seven [healthy] cows, sleek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' handsome and fat; and they grazed in the reed grass [in a marshy pasture]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the lean and ugly cows ate up the first seven fat cows. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet when they had devoured them, it could not be detected that they had eaten them, because they were still as thin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' emaciated as before. Then I awoke [but again I fell asleep and dreamed]. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw in my [second] dream, seven ears [of grain], plump and good, growing on a single stalk; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and lo, seven [other] ears, withered, thin, and scorched by the east wind, sprouted after them; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the thin ears devoured the seven good ears. Now I told this to the magicians '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothsayers, but there was no one who could explain it [to me].”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joseph said to Pharaoh, “The [two] dreams are one [and the same and have one interpretation]; God has shown Pharaoh what He is about to do. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The seven good cows are seven years, and the seven good ears are seven years; the [two] dreams are one [and the same]. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The seven thin and ugly cows that came up after them are seven years; and also the seven thin ears, dried up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scorched by the east wind, they are seven years of famine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hunger. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the message just as I have told Pharaoh: God has shown Pharaoh what He is about to do. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Listen very carefully: seven years of great abundance will come throughout all the land of Egypt; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then behold, seven other cows came up after them out of the Nile, ugly and gaunt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' raw-boned, and stood by the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fat
    - type: text
      text: ' cows on the bank of the Nile. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but afterward seven years of famine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hunger will come, and [there will be such desperate need that] all the great abundance [of the previous years] will be forgotten in the land of Egypt [as if it never happened], and famine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destitution will ravage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy the land. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the great abundance will become forgotten in the land because of that subsequent famine, for it will be very severe. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That the dream was repeated twice to Pharaoh [and in two different ways] indicates that this matter is fully determined '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established by God, and God will bring it to pass very quickly. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now let Pharaoh [prepare ahead and] look for a man discerning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clear-headed and wise, and set him [in charge] over the land of Egypt [as governor under Pharaoh]. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let Pharaoh take action to appoint overseers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' officials over the land, and set aside one-fifth [of the produce] of the [entire] land of Egypt in the seven years of abundance. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let them gather [as a tax] all [of the fifth of] the food of these good years that are coming, and store up grain under the direction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority of Pharaoh, and let them guard the food [in fortified granaries] in the cities. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That food shall be put [in storage] as a reserve for the land against the seven years of famine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hunger which will occur in the land of Egypt, so that the land (people) will not be ravaged during the famine.”'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the plan seemed good to Pharaoh and to all of his servants.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joseph Is Made a Ruler of Egypt
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Pharaoh said to his servants, “Can we find a man like this [a man equal to Joseph], in whom is the divine spirit [of God]?” '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Pharaoh said to Joseph, “Since [your] God has shown you all this, there is no one as discerning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clear-headed and wise as you are. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the ugly and gaunt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' raw-boned cows ate up the seven sleek and fat cows. Then Pharaoh awoke. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You shall have charge over my house, and all my people shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: yield to your mouth
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'be governed according to your word and pay respect [to you with reverence, submission, and obedience]; only in [matters of] the throne will I be greater than you [in Egypt].” '
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Pharaoh said to Joseph, “See, I have set you [in charge] over all the land of Egypt.” '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Pharaoh took off his signet ring from his hand and put it on Joseph’s hand, and dressed him in [official] vestments of fine linen and put a gold chain around his neck. '
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He had him ride in his second chariot; and runners proclaimed before him, “[Attention,] bow the knee!” And he set him over all the land of Egypt. '
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Moreover, Pharaoh said to Joseph, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Though
    - type: text
      text: ' I am Pharaoh, yet without your permission shall no man raise his hand [to do anything] or set his foot [to go anywhere] in all the land of Egypt [all classes of people shall submit to your authority].” '
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Pharaoh named Joseph '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably Egyptian for “God speaks; he lives.”
      marker-yv: yv-n
    - type: text
      text: Zaphenath-paneah; and he gave him Asenath, the daughter of Potiphera, priest of On (Heliopolis in Egypt), as his wife. And Joseph went out over all the land of Egypt [to inspect and govern it].
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joseph [had been in Egypt thirteen years and] was thirty years old when he stood before Pharaoh, king of Egypt. Joseph departed from the presence of Pharaoh and went through all the land of Egypt [performing his duties]. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the seven abundant years the earth produced handfuls [for each seed planted]. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph gathered all the [surplus] food of the seven [good] years in the land of Egypt and stored [enormous quantities of] the food in the cities. He stored away in every city the food [collected] from its own surrounding fields. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus Joseph gathered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stored up grain in great abundance like the sand of the sea, until he stopped counting it, for it could not be measured.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Sons of Joseph
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he fell asleep and dreamed a second time; and behold, seven ears of grain came up on a single stalk, plump and good. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now two sons were born to Joseph before the years of famine came, whom Asenath, the daughter of Potiphera, priest of On, bore to him. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph named the firstborn Manasseh (causing to forget), for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he said,
    - type: text
      text: ' “God has made me forget all my trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hardship and all [the sorrow of the loss of] my father’s household.” '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He named the second [son] Ephraim (fruitfulness), for “God has caused me to be fruitful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' very successful in the land of my suffering.”'
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the seven years of plenty came to an end in the land of Egypt, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the seven years of famine began to come, just as Joseph had said [they would]; the famine was in all the [surrounding] lands, but in the land of Egypt there was bread (food). '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when all the land of Egypt was famished, the people cried out to Pharaoh for food; and Pharaoh said to all the Egyptians, “Go to Joseph; do whatever he says to you.” '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the famine was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spread
    - type: text
      text: ' over all the land, Joseph opened all the storehouses, and sold [surplus grain] to the Egyptians; and the famine grew [extremely] severe in the land of Egypt. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And [the people of] all countries came to Egypt to Joseph to buy grain, because the famine was severe over all the [known] earth.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then behold, seven ears [of grain], thin and dried up by the east wind, sprouted after them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the thin ears swallowed the seven plump and full ears. And Pharaoh awoke, and it was a dream. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when morning came his spirit was troubled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disturbed and he sent and called for all the magicians and all the wise men of Egypt. And Pharaoh told them his dreams, but no one could interpret them to him.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the chief cupbearer spoke to Pharaoh, saying, “I would mention my faults today. '
