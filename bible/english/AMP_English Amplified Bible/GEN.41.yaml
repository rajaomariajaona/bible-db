document_id: GEN.41,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Pharaoh’s Dream
  - type: text
    content: 'Now it happened at the end of two full years that Pharaoh dreamed that he was standing by the '
  - type: note
    content: Lit the river, and so throughout.
  - type: text
    content: 'Nile. '
  '10':
  - type: text
    content: '[Two years ago] Pharaoh was angry with his servants, and he put me in confinement in the house of the captain of the guard, both me and the chief baker. '
  '11':
  - type: text
    content: 'We dreamed a dream on the same night, he and I; each of us dreamed according to [the significance of] the interpretation of his own dream. '
  '12':
  - type: text
    content: 'Now there was with us [in the prison] a young man, a Hebrew, servant to the captain of the guard; and we told him, and he interpreted our dreams for us, to each man according to the significance of his own dream. '
  '13':
  - type: text
    content: And just as he interpreted [the dreams] for us, so it happened; I was restored to my office [as chief cupbearer], and the baker was hanged.”
  - type: heading
    content: Joseph Interprets
  '14':
  - type: text
    content: 'Then Pharaoh sent and called for Joseph, and they hurriedly brought him out of the dungeon; and when Joseph shaved himself and changed his clothes [making himself presentable], he came to Pharaoh. '
  '15':
  - type: text
    content: 'Pharaoh said to Joseph, “I have dreamed a dream, and there is no one who can interpret it; and I have heard it said about you that you can understand a dream and interpret it.” '
  '16':
  - type: text
    content: 'Joseph answered Pharaoh, “It is not in me [to interpret the dream]; God [not I] will give Pharaoh a '
  - type: note
    content: Lit answer of peace.
  - type: text
    content: 'favorable answer [through me].” '
  '17':
  - type: text
    content: 'So Pharaoh said to Joseph, “In my dream, I was standing on the bank of the Nile; '
  '18':
  - type: text
    content: 'and seven fat, sleek '
  - type: text
    content: and
  - type: text
    content: ' handsome cows came up out of the river, and they grazed in the reed grass [of a marshy pasture]. '
  '19':
  - type: text
    content: 'Lo, seven other cows came up after them, very ugly and gaunt [just skin and bones]; such emaciated animals as I have never seen in all the land of Egypt. '
  '2':
  - type: text
    content: 'And lo, there came up out of the Nile seven [healthy] cows, sleek '
  - type: text
    content: and
  - type: text
    content: ' handsome and fat; and they grazed in the reed grass [in a marshy pasture]. '
  '20':
  - type: text
    content: 'And the lean and ugly cows ate up the first seven fat cows. '
  '21':
  - type: text
    content: 'Yet when they had devoured them, it could not be detected that they had eaten them, because they were still as thin '
  - type: text
    content: and
  - type: text
    content: ' emaciated as before. Then I awoke [but again I fell asleep and dreamed]. '
  '22':
  - type: text
    content: 'I saw in my [second] dream, seven ears [of grain], plump and good, growing on a single stalk; '
  '23':
  - type: text
    content: 'and lo, seven [other] ears, withered, thin, and scorched by the east wind, sprouted after them; '
  '24':
  - type: text
    content: 'and the thin ears devoured the seven good ears. Now I told this to the magicians '
  - type: text
    content: and
  - type: text
    content: ' soothsayers, but there was no one who could explain it [to me].”'
  '25':
  - type: text
    content: 'Then Joseph said to Pharaoh, “The [two] dreams are one [and the same and have one interpretation]; God has shown Pharaoh what He is about to do. '
  '26':
  - type: text
    content: 'The seven good cows are seven years, and the seven good ears are seven years; the [two] dreams are one [and the same]. '
  '27':
  - type: text
    content: 'The seven thin and ugly cows that came up after them are seven years; and also the seven thin ears, dried up '
  - type: text
    content: and
  - type: text
    content: ' scorched by the east wind, they are seven years of famine '
  - type: text
    content: and
  - type: text
    content: ' hunger. '
  '28':
  - type: text
    content: 'This is the message just as I have told Pharaoh: God has shown Pharaoh what He is about to do. '
  '29':
  - type: text
    content: 'Listen very carefully: seven years of great abundance will come throughout all the land of Egypt; '
  '3':
  - type: text
    content: 'Then behold, seven other cows came up after them out of the Nile, ugly and gaunt '
  - type: text
    content: and
  - type: text
    content: ' raw-boned, and stood by the '
  - type: text
    content: fat
  - type: text
    content: ' cows on the bank of the Nile. '
  '30':
  - type: text
    content: 'but afterward seven years of famine '
  - type: text
    content: and
  - type: text
    content: ' hunger will come, and [there will be such desperate need that] all the great abundance [of the previous years] will be forgotten in the land of Egypt [as if it never happened], and famine '
  - type: text
    content: and
  - type: text
    content: ' destitution will ravage '
  - type: text
    content: and
  - type: text
    content: ' destroy the land. '
  '31':
  - type: text
    content: 'So the great abundance will become forgotten in the land because of that subsequent famine, for it will be very severe. '
  '32':
  - type: text
    content: 'That the dream was repeated twice to Pharaoh [and in two different ways] indicates that this matter is fully determined '
  - type: text
    content: and
  - type: text
    content: ' established by God, and God will bring it to pass very quickly. '
  '33':
  - type: text
    content: 'So now let Pharaoh [prepare ahead and] look for a man discerning '
  - type: text
    content: and
  - type: text
    content: ' clear-headed and wise, and set him [in charge] over the land of Egypt [as governor under Pharaoh]. '
  '34':
  - type: text
    content: 'Let Pharaoh take action to appoint overseers '
  - type: text
    content: and
  - type: text
    content: ' officials over the land, and set aside one-fifth [of the produce] of the [entire] land of Egypt in the seven years of abundance. '
  '35':
  - type: text
    content: 'Let them gather [as a tax] all [of the fifth of] the food of these good years that are coming, and store up grain under the direction '
  - type: text
    content: and
  - type: text
    content: ' authority of Pharaoh, and let them guard the food [in fortified granaries] in the cities. '
  '36':
  - type: text
    content: 'That food shall be put [in storage] as a reserve for the land against the seven years of famine '
  - type: text
    content: and
  - type: text
    content: ' hunger which will occur in the land of Egypt, so that the land (people) will not be ravaged during the famine.”'
  '37':
  - type: text
    content: Now the plan seemed good to Pharaoh and to all of his servants.
  - type: heading
    content: Joseph Is Made a Ruler of Egypt
  '38':
  - type: text
    content: 'So Pharaoh said to his servants, “Can we find a man like this [a man equal to Joseph], in whom is the divine spirit [of God]?” '
  '39':
  - type: text
    content: 'Then Pharaoh said to Joseph, “Since [your] God has shown you all this, there is no one as discerning '
  - type: text
    content: and
  - type: text
    content: ' clear-headed and wise as you are. '
  '4':
  - type: text
    content: 'Then the ugly and gaunt '
  - type: text
    content: and
  - type: text
    content: ' raw-boned cows ate up the seven sleek and fat cows. Then Pharaoh awoke. '
  '40':
  - type: text
    content: 'You shall have charge over my house, and all my people shall '
  - type: note
    content: Lit yield to your mouth.
  - type: text
    content: 'be governed according to your word and pay respect [to you with reverence, submission, and obedience]; only in [matters of] the throne will I be greater than you [in Egypt].” '
  '41':
  - type: text
    content: 'Then Pharaoh said to Joseph, “See, I have set you [in charge] over all the land of Egypt.” '
  '42':
  - type: text
    content: 'Then Pharaoh took off his signet ring from his hand and put it on Joseph’s hand, and dressed him in [official] vestments of fine linen and put a gold chain around his neck. '
  '43':
  - type: text
    content: 'He had him ride in his second chariot; and runners proclaimed before him, “[Attention,] bow the knee!” And he set him over all the land of Egypt. '
  '44':
  - type: text
    content: Moreover, Pharaoh said to Joseph, “
  - type: text
    content: Though
  - type: text
    content: ' I am Pharaoh, yet without your permission shall no man raise his hand [to do anything] or set his foot [to go anywhere] in all the land of Egypt [all classes of people shall submit to your authority].” '
  '45':
  - type: text
    content: 'Then Pharaoh named Joseph '
  - type: note
    content: Probably Egyptian for “God speaks; he lives.”
  - type: text
    content: Zaphenath-paneah; and he gave him Asenath, the daughter of Potiphera, priest of On (Heliopolis in Egypt), as his wife. And Joseph went out over all the land of Egypt [to inspect and govern it].
  '46':
  - type: text
    content: 'Now Joseph [had been in Egypt thirteen years and] was thirty years old when he stood before Pharaoh, king of Egypt. Joseph departed from the presence of Pharaoh and went through all the land of Egypt [performing his duties]. '
  '47':
  - type: text
    content: 'In the seven abundant years the earth produced handfuls [for each seed planted]. '
  '48':
  - type: text
    content: 'And Joseph gathered all the [surplus] food of the seven [good] years in the land of Egypt and stored [enormous quantities of] the food in the cities. He stored away in every city the food [collected] from its own surrounding fields. '
  '49':
  - type: text
    content: 'Thus Joseph gathered '
  - type: text
    content: and
  - type: text
    content: ' stored up grain in great abundance like the sand of the sea, until he stopped counting it, for it could not be measured.'
  - type: heading
    content: The Sons of Joseph
  '5':
  - type: text
    content: 'Then he fell asleep and dreamed a second time; and behold, seven ears of grain came up on a single stalk, plump and good. '
  '50':
  - type: text
    content: 'Now two sons were born to Joseph before the years of famine came, whom Asenath, the daughter of Potiphera, priest of On, bore to him. '
  '51':
  - type: text
    content: 'Joseph named the firstborn Manasseh (causing to forget), for '
  - type: text
    content: he said,
  - type: text
    content: ' “God has made me forget all my trouble '
  - type: text
    content: and
  - type: text
    content: ' hardship and all [the sorrow of the loss of] my father’s household.” '
  '52':
  - type: text
    content: 'He named the second [son] Ephraim (fruitfulness), for “God has caused me to be fruitful '
  - type: text
    content: and
  - type: text
    content: ' very successful in the land of my suffering.”'
  '53':
  - type: text
    content: 'When the seven years of plenty came to an end in the land of Egypt, '
  '54':
  - type: text
    content: 'the seven years of famine began to come, just as Joseph had said [they would]; the famine was in all the [surrounding] lands, but in the land of Egypt there was bread (food). '
  '55':
  - type: text
    content: 'So when all the land of Egypt was famished, the people cried out to Pharaoh for food; and Pharaoh said to all the Egyptians, “Go to Joseph; do whatever he says to you.” '
  '56':
  - type: text
    content: 'When the famine was '
  - type: text
    content: spread
  - type: text
    content: ' over all the land, Joseph opened all the storehouses, and sold [surplus grain] to the Egyptians; and the famine grew [extremely] severe in the land of Egypt. '
  '57':
  - type: text
    content: And [the people of] all countries came to Egypt to Joseph to buy grain, because the famine was severe over all the [known] earth.
  '6':
  - type: text
    content: 'Then behold, seven ears [of grain], thin and dried up by the east wind, sprouted after them. '
  '7':
  - type: text
    content: 'Then the thin ears swallowed the seven plump and full ears. And Pharaoh awoke, and it was a dream. '
  '8':
  - type: text
    content: 'So when morning came his spirit was troubled '
  - type: text
    content: and
  - type: text
    content: ' disturbed and he sent and called for all the magicians and all the wise men of Egypt. And Pharaoh told them his dreams, but no one could interpret them to him.'
  '9':
  - type: text
    content: 'Then the chief cupbearer spoke to Pharaoh, saying, “I would mention my faults today. '
