    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the first time leaven is mentioned in the New Testament. See Ex 12:15 for the first mention of leaven in the Old Testament. The Hebrew word (
      - type: usfm
        marker: it
        children:
        - type: text
          text: seor)
      - type: text
        text: ' refers specifically to the leavening agent (as opposed to dough containing it), which today is thought of as yeast, a type of fungi. In Jewish thinking, leaven was symbolic of impurity and corruption. Jesus used it as a symbol for the corrupt and hypocritical teachings of the Pharisees and Sadducees (see especially Luke 12:1; cf Matt 16:11; Mark 8:15), but He also used leaven’s ability to permeate a mass of dough many times its own size as an illustration of the spread of the kingdom of heaven as here and in Luke 13:21.'
    marker-yv: yv-n
  - type: usfm
