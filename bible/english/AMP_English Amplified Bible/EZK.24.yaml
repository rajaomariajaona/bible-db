verses:
  '1':
  - type: heading
    content: Parable of the Boiling Pot
  - type: text
    content: Again in the ninth year [of King Jehoiachin’s captivity by Nebuchadnezzar of Babylon], in the tenth month, on the tenth [day] of the month, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: “Heap on wood, kindle the fire,
  - type: text
    content: Boil the meat well [done]
  - type: text
    content: And mix in the spices,
  - type: text
    content: And let the bones be burned.
  '11':
  - type: text
    content: “Then set the empty pot (Jerusalem) back on the coals
  - type: text
    content: So that it may be hot
  - type: text
    content: And its bronze may glow
  - type: text
    content: And its filthiness may be melted
  - type: text
    content: And its rust (scum) may be consumed.
  '12':
  - type: text
    content: “She has wearied Me with toil,
  - type: text
    content: Yet her great rust has not left her;
  - type: text
    content: 'Her thick rust '
  - type: text
    content: and
  - type: text
    content: ' filth will not be burned away by fire [no matter how hot the flame].'
  '13':
  - type: text
    content: '“In your filthiness are lewdness '
  - type: text
    content: and
  - type: text
    content: ' outrage.'
  - type: text
    content: 'Therefore I '
  - type: text
    content: would
  - type: text
    content: ' have cleansed you,'
  - type: text
    content: Yet you were not [willing to be] cleansed,
  - type: text
    content: You will not be cleansed from your filthiness again
  - type: text
    content: Until I have satisfied My wrath against you.
  '14':
  - type: text
    content: I the L
  - type: heading
    content: ord
  - type: text
    content: ' have spoken; it is coming and I will act. I will not relent, and I will not have compassion and I will not be sorry; in accordance with your ways and in accordance with your deeds I will judge '
  - type: text
    content: and
  - type: text
    content: ' punish you,” says the Lord G'
  - type: heading
    content: od
  - type: text
    content: .’ ”
  - type: heading
    content: Death of Ezekiel’s Wife Is a Sign
  '15':
  - type: text
    content: Also the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '16':
  - type: text
    content: '“Son of man, listen carefully, I am about to take away from you the desire of your eyes [your wife] with a single stroke. Yet you shall not mourn and you shall not weep, and your tears shall not flow. '
  '17':
  - type: text
    content: 'Sigh '
  - type: text
    content: and
  - type: text
    content: ' groan in silence; do not mourn for the dead. Bind on your turban and put your sandals on your feet, and do not cover your mustache or eat the bread of [mourners furnished by other] men.” '
  '18':
  - type: text
    content: 'So I spoke to the people in the morning, and '
  - type: note
    content: This was the same day that the temple in Jerusalem was burned (586 b.c.).
  - type: text
    content: 'in the evening my wife died. And the next morning I did as I was commanded. '
  '19':
  - type: text
    content: 'The people said to me, “These things that you are doing—tell us, what do they mean for us?” '
  '2':
  - type: text
    content: '“Son of man, record the name of the day, this very day. The king of Babylon has laid siege to Jerusalem this very day. '
  '20':
  - type: text
    content: Then I answered them, “The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '21':
  - type: text
    content: ‘Speak to the house of Israel, “Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘Behold, I will '
  - type: note
    content: I.e. allow the temple in Jerusalem to be destroyed by pagans.
  - type: text
    content: 'profane My sanctuary, the pride of your strength, the desire of your eyes, and the delight of your soul; and your sons and your daughters whom you have left behind [in Jerusalem] will fall by the sword. '
  '22':
  - type: text
    content: 'You will do as I [Ezekiel] have done; you shall not cover your mustache nor eat the bread of [mourning brought to you by other] men. '
  '23':
  - type: text
    content: 'Your turbans will be on your heads and your sandals on your feet. You will not mourn or weep, but you will rot away in your sins and you will groan to one another. [Lev 26:39] '
  '24':
  - type: text
    content: So Ezekiel will be a sign to you; in accordance with all that he has done you will do. And when this [destruction of the temple] comes, then you will know [without any doubt] that I am the Lord G
  - type: heading
    content: od
  - type: text
    content: .’ ”
  '25':
  - type: text
    content: '‘As for you, son of man, on the day when I take their strength '
  - type: text
    content: and
  - type: text
    content: ' their stronghold from them, their joy and their glory, the desire of their eyes and '
  - type: note
    content: Lit the lifting up of their soul.
  - type: text
    content: 'their heart’s [chief] delight (the temple), and I also take their sons and their daughters, '
  '26':
  - type: text
    content: 'that on that day a survivor will come to you to let you hear [of the destruction of Jerusalem] with your [own] ears. '
  '27':
  - type: text
    content: 'On that day '
  - type: note
    content: At the beginning of Ezekiel’s prophetic ministry (see 3:26, 27; 33:22) God told him he would be mute except when he was speaking a divine prophecy.
  - type: text
    content: your mouth will be opened to him who escaped, and you will speak and no longer be mute. In this way you shall be a sign to them, and they will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  '3':
  - type: text
    content: Speak a parable against the rebellious house [of Judah] and say to them, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: “Put on a pot; put it on and also pour water into it;
  '4':
  - type: text
    content: Put in it the pieces [of meat],
  - type: text
    content: Every good piece (the people of Jerusalem), the thigh and the shoulder;
  - type: text
    content: Fill it with choice bones.
  '5':
  - type: text
    content: “Take the choicest of the flock,
  - type: text
    content: And also pile wood under the pot.
  - type: text
    content: Make it boil vigorously
  - type: text
    content: And boil its bones in the pot.”
  '6':
  - type: text
    content: ¶‘Therefore, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: “Woe (judgment is coming) to the bloody city,
  - type: text
    content: To the pot in which there is rust
  - type: text
    content: And whose rust has not gone out of it!
  - type: text
    content: Take out of it piece by piece,
  - type: text
    content: Without making any choice.
  '7':
  - type: text
    content: “For her blood [that she has shed] remains in her midst;
  - type: text
    content: She put it on the bare rock;
  - type: text
    content: She did not pour it on the ground
  - type: text
    content: To cover it with dust.
  '8':
  - type: text
    content: “That it may cause wrath to come up to take vengeance,
  - type: text
    content: I have put her blood [guilt for her children sacrificed to Molech] on the bare rock,
  - type: text
    content: That it may not be covered.”
  '9':
  - type: text
    content: ‘Therefore, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: “Woe to the bloody city!
  - type: text
    content: I will also make the pile [of wood] high.
