document_id: EZK.24,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Parable of the Boiling Pot
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again in the ninth year [of King Jehoiachin’s captivity by Nebuchadnezzar of Babylon], in the tenth month, on the tenth [day] of the month, the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Heap on wood, kindle the fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Boil the meat well [done]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And mix in the spices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let the bones be burned.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then set the empty pot (Jerusalem) back on the coals
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that it may be hot
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its bronze may glow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its filthiness may be melted
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its rust (scum) may be consumed.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “She has wearied Me with toil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet her great rust has not left her;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Her thick rust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' filth will not be burned away by fire [no matter how hot the flame].'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“In your filthiness are lewdness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' outrage.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would
    - type: text
      text: ' have cleansed you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you were not [willing to be] cleansed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will not be cleansed from your filthiness again
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until I have satisfied My wrath against you.
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' have spoken; it is coming and I will act. I will not relent, and I will not have compassion and I will not be sorry; in accordance with your ways and in accordance with your deeds I will judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punish you,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Death of Ezekiel’s Wife Is a Sign
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Also the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, listen carefully, I am about to take away from you the desire of your eyes [your wife] with a single stroke. Yet you shall not mourn and you shall not weep, and your tears shall not flow. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sigh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' groan in silence; do not mourn for the dead. Bind on your turban and put your sandals on your feet, and do not cover your mustache or eat the bread of [mourners furnished by other] men.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I spoke to the people in the morning, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This was the same day that the temple in Jerusalem was burned (586 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .).
      marker-yv: yv-n
    - type: text
      text: 'in the evening my wife died. And the next morning I did as I was commanded. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people said to me, “These things that you are doing—tell us, what do they mean for us?” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, record the name of the day, this very day. The king of Babylon has laid siege to Jerusalem this very day. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I answered them, “The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Speak to the house of Israel, “Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘Behold, I will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. allow the temple in Jerusalem to be destroyed by pagans.
      marker-yv: yv-n
    - type: text
      text: 'profane My sanctuary, the pride of your strength, the desire of your eyes, and the delight of your soul; and your sons and your daughters whom you have left behind [in Jerusalem] will fall by the sword. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will do as I [Ezekiel] have done; you shall not cover your mustache nor eat the bread of [mourning brought to you by other] men. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your turbans will be on your heads and your sandals on your feet. You will not mourn or weep, but you will rot away in your sins and you will groan to one another. [Lev 26:39] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Ezekiel will be a sign to you; in accordance with all that he has done you will do. And when this [destruction of the temple] comes, then you will know [without any doubt] that I am the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .’ ”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘As for you, son of man, on the day when I take their strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their stronghold from them, their joy and their glory, the desire of their eyes and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the lifting up of their soul
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'their heart’s [chief] delight (the temple), and I also take their sons and their daughters, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that on that day a survivor will come to you to let you hear [of the destruction of Jerusalem] with your [own] ears. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At the beginning of Ezekiel’s prophetic ministry (see 3:26, 27; 33:22) God told him he would be mute except when he was speaking a divine prophecy.
      marker-yv: yv-n
    - type: text
      text: your mouth will be opened to him who escaped, and you will speak and no longer be mute. In this way you shall be a sign to them, and they will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .’ ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Speak a parable against the rebellious house [of Judah] and say to them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Put on a pot; put it on and also pour water into it;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put in it the pieces [of meat],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every good piece (the people of Jerusalem), the thigh and the shoulder;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fill it with choice bones.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Take the choicest of the flock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And also pile wood under the pot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make it boil vigorously
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And boil its bones in the pot.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶‘Therefore, thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe (judgment is coming) to the bloody city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the pot in which there is rust
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whose rust has not gone out of it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take out of it piece by piece,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without making any choice.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For her blood [that she has shed] remains in her midst;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She put it on the bare rock;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She did not pour it on the ground
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To cover it with dust.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “That it may cause wrath to come up to take vengeance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have put her blood [guilt for her children sacrificed to Molech] on the bare rock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That it may not be covered.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Therefore, thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to the bloody city!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will also make the pile [of wood] high.
