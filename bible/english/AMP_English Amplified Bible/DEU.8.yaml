document_id: DEU.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Gracious Dealings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Every commandment that I am commanding you today you shall be careful to do, so that you may live and multiply, and go in and possess the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' swore [to give] to your fathers. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: When you have eaten and are satisfied, then you shall bless the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God for the good land which He has given you.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Beware that you do not forget the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God by failing to keep His commandments and His judgments (precepts) and His statutes which I am commanding you today; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'otherwise, when you have eaten and are satisfied, and have built good houses and lived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in them,
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and when your herds and flocks multiply, and your silver and gold multiply, and all that you have increases, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: then your heart will become lifted up [by self-conceit and arrogance] and you will forget the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God who brought you from the land of Egypt, out of the house of slavery. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'He led you through the great and terrible wilderness, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with its
    - type: text
      text: ' fiery serpents and scorpions and thirsty ground where there was no water; it was He who brought water for you out of the flinty rock. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'He fed you manna in the wilderness, [a substance] which your fathers did not know, so that He might humble you [by dependence on Him] and that He might test you, to do good [things] for you at the end. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Otherwise, you may say in your heart, ‘My power and the strength of my hand made me this wealth.’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But you shall remember [with profound respect] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, for it is He who is giving you power to make wealth, that He may confirm His covenant which He swore (solemnly promised) to your fathers, as it is this day. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And it shall come about if you ever forget the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God and follow other gods and serve them and worship them, I testify against you today that you will most certainly perish. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And you shall remember [always] all the ways which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has led you these forty years in the wilderness, so that He might humble you and test you, to know what was in your heart (mind), whether you would keep His commandments or not. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Like the nations which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' causes to perish before you, so shall you perish; because you would not listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey the voice of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He humbled you and allowed you to be hungry and fed you with manna, [a substance] which you did not know, nor did your fathers know, so that He might make you understand [by personal experience] that man does not live by bread alone, but man lives by every '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' that proceeds out of the mouth of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Your clothing did not wear out on you, nor did your feet swell these forty years. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Therefore, know in your heart (be fully cognizant) that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God disciplines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instructs you just as a man disciplines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instructs his son. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Therefore, you shall keep the commandments of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, to walk [that is, to live each and every day] in His ways and fear [and worship] Him [with awe-filled reverence and profound respect]. [Prov 8:13] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is bringing you into a good land, a land of brooks of water, of fountains and springs, flowing forth in valleys and hills; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'a land of wheat and barley, and vines and fig trees and pomegranates, a land of olive oil and honey; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'a land where you will eat bread without shortage, in which you will lack nothing; a land whose stones are iron, and out of whose hills you can dig copper. '
