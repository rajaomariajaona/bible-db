document_id: DEU.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Gracious Dealings
  - type: text
    content: “Every commandment that I am commanding you today you shall be careful to do, so that you may live and multiply, and go in and possess the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' swore [to give] to your fathers. '
  '10':
  - type: text
    content: When you have eaten and are satisfied, then you shall bless the L
  - type: heading
    content: ord
  - type: text
    content: ' your God for the good land which He has given you.'
  '11':
  - type: text
    content: “Beware that you do not forget the L
  - type: heading
    content: ord
  - type: text
    content: ' your God by failing to keep His commandments and His judgments (precepts) and His statutes which I am commanding you today; '
  '12':
  - type: text
    content: 'otherwise, when you have eaten and are satisfied, and have built good houses and lived '
  - type: text
    content: in them,
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'and when your herds and flocks multiply, and your silver and gold multiply, and all that you have increases, '
  '14':
  - type: text
    content: then your heart will become lifted up [by self-conceit and arrogance] and you will forget the L
  - type: heading
    content: ord
  - type: text
    content: ' your God who brought you from the land of Egypt, out of the house of slavery. '
  '15':
  - type: text
    content: 'He led you through the great and terrible wilderness, '
  - type: text
    content: with its
  - type: text
    content: ' fiery serpents and scorpions and thirsty ground where there was no water; it was He who brought water for you out of the flinty rock. '
  '16':
  - type: text
    content: 'He fed you manna in the wilderness, [a substance] which your fathers did not know, so that He might humble you [by dependence on Him] and that He might test you, to do good [things] for you at the end. '
  '17':
  - type: text
    content: 'Otherwise, you may say in your heart, ‘My power and the strength of my hand made me this wealth.’ '
  '18':
  - type: text
    content: But you shall remember [with profound respect] the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, for it is He who is giving you power to make wealth, that He may confirm His covenant which He swore (solemnly promised) to your fathers, as it is this day. '
  '19':
  - type: text
    content: And it shall come about if you ever forget the L
  - type: heading
    content: ord
  - type: text
    content: ' your God and follow other gods and serve them and worship them, I testify against you today that you will most certainly perish. '
  '2':
  - type: text
    content: And you shall remember [always] all the ways which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has led you these forty years in the wilderness, so that He might humble you and test you, to know what was in your heart (mind), whether you would keep His commandments or not. '
  '20':
  - type: text
    content: Like the nations which the L
  - type: heading
    content: ord
  - type: text
    content: ' causes to perish before you, so shall you perish; because you would not listen to '
  - type: text
    content: and
  - type: text
    content: ' obey the voice of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '3':
  - type: text
    content: 'He humbled you and allowed you to be hungry and fed you with manna, [a substance] which you did not know, nor did your fathers know, so that He might make you understand [by personal experience] that man does not live by bread alone, but man lives by every '
  - type: text
    content: word
  - type: text
    content: ' that proceeds out of the mouth of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Your clothing did not wear out on you, nor did your feet swell these forty years. '
  '5':
  - type: text
    content: Therefore, know in your heart (be fully cognizant) that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God disciplines '
  - type: text
    content: and
  - type: text
    content: ' instructs you just as a man disciplines '
  - type: text
    content: and
  - type: text
    content: ' instructs his son. '
  '6':
  - type: text
    content: Therefore, you shall keep the commandments of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, to walk [that is, to live each and every day] in His ways and fear [and worship] Him [with awe-filled reverence and profound respect]. [Prov 8:13] '
  '7':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is bringing you into a good land, a land of brooks of water, of fountains and springs, flowing forth in valleys and hills; '
  '8':
  - type: text
    content: 'a land of wheat and barley, and vines and fig trees and pomegranates, a land of olive oil and honey; '
  '9':
  - type: text
    content: 'a land where you will eat bread without shortage, in which you will lack nothing; a land whose stones are iron, and out of whose hills you can dig copper. '
