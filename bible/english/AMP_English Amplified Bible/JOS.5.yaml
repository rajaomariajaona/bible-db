document_id: JOS.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel Is Circumcised
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now it happened when all the kings of the Amorites who were beyond the Jordan to the west, and all the kings of the Canaanites who were by the sea, heard that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had dried up the waters of the Jordan before the Israelites until they had crossed over, their hearts melted [in despair], and there was no [fighting] spirit in them any longer because of the Israelites [and what God had done for them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: At that time the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Joshua, “Make for yourself flint knives and circumcise the [new generation of the] sons of Israel as [was done] before.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Joshua made flint knives and circumcised the sons of Israel at '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hebrew for “the hill of the foreskins,” named for the event.
    marker-yv: yv-n
  - type: text
    text: 'Gibeath-haaraloth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This is the reason why Joshua circumcised them: all the people who came out of Egypt who were males, all the men of war, had died in the wilderness along the way after they left Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All the males who came out were circumcised, but all the males who were born in the wilderness on the way as they left Egypt had not been circumcised. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the Israelites walked forty years in the wilderness, until all the nation, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that is,
  - type: text
    text: ' the men of war who came out of Egypt, died because they did not listen to the voice of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; to them the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had sworn [an oath] that He would not let them see the land which He had promised to their fathers to give us, a land [of abundance] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
    marker-yv: yv-n
  - type: text
    text: 'flowing with milk and honey. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So it was their uncircumcised sons whom He raised up in their place, whom Joshua circumcised, because circumcision had not been performed on the way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then, when they had finished circumcising all [the males of] the nation, they stayed in their places in the camp until they were healed. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Joshua, “This day I have rolled away the reproach (derision, ridicule) of Egypt from you.” So the name of that place is called Gilgal (rolling) to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'While the Israelites camped at Gilgal they observed the Passover on the evening of the fourteenth day of the month on the desert plains of Jericho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On the day after Passover, on that very day, they ate some of the produce of the land, unleavened bread, and roasted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: grain.
  - type: text
    text: ' [Lev 23:14] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And the manna ceased on the day after they had eaten some of the produce of the land, so that the Israelites no longer had manna, but they ate some of the produce of the land of Canaan during that year.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now when Joshua was by Jericho, he looked up, and behold, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Whether the divine messenger was an angel or the pre-incarnate Christ is not clear from the Hebrew text; however, the message of godly assistance and pending victory was made clear to Joshua by the encounter.
    marker-yv: yv-n
  - type: text
    text: 'a man was standing opposite him with his drawn sword in his hand, and Joshua went to him and said to him, “Are you for us or for our adversaries?” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He said, “No; rather I have come now as captain of the army of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” Then Joshua fell with his face toward the earth and bowed down, and said to him, “What does my lord have to say to his servant?” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The captain of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' army said to Joshua, “Remove your sandals from your feet, because the place where you are standing is holy (set apart to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ).” And Joshua did so. [Ex 3:5]
