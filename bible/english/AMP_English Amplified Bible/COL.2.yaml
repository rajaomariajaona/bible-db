document_id: COL.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: You Are Built Up in Christ
  - type: text
    content: 'For I want you to know how great a struggle I have for you and for those [believers] at '
  - type: note
    content: Along with Colossae, Laodicea was located in the valley of the Lycus River and is one of the seven churches mentioned in Rev 1-3.
  - type: text
    content: 'Laodicea, and for all who [like yourselves] have never seen me face to face. '
  '10':
  - type: text
    content: 'And in Him you have been made complete [achieving spiritual stature through Christ], and He is the head over all rule and authority [of every angelic and earthly power]. '
  '11':
  - type: text
    content: 'In Him you were also circumcised with a circumcision not made with hands, but by the [spiritual] circumcision of Christ in the stripping off of the body of the flesh [the sinful carnal nature], '
  '12':
  - type: text
    content: 'having been buried with Him in baptism and raised with Him [to a new life] through [your] faith in the working of God, [as displayed] when He raised Christ from the dead. '
  '13':
  - type: text
    content: 'When you were dead in your sins and in the uncircumcision of your flesh (worldliness, manner of life), God made you alive together with Christ, having [freely] forgiven us all our sins, '
  '14':
  - type: text
    content: 'having canceled out the '
  - type: note
    content: This term refers to a debtor’s handwritten note acknowledging the debt.
  - type: text
    content: 'certificate of debt consisting of '
  - type: note
    content: I.e. the requirements found in the Mosaic Law which were violated. The debt is the punishment due for the violator’s sins. Gentiles were never directly liable to the Law, but as Paul explains in Rom 2:12-16, God holds them responsible for violating the principles of the Law that they acknowledge of their own volition.
  - type: text
    content: 'legal demands [which were in force] against us and which were hostile to us. And this certificate He has set aside '
  - type: text
    content: and
  - type: text
    content: ' completely removed by nailing it to the cross. '
  '15':
  - type: text
    content: 'When He had disarmed the rulers and authorities [those supernatural forces of evil operating against us], He made a public example of them [exhibiting them as captives in His triumphal procession], having triumphed over them through '
  - type: note
    content: Lit it or Him.
  - type: text
    content: the cross.
  '16':
  - type: text
    content: 'Therefore let no one judge you in regard to food and drink or in regard to [the observance of] a festival or a new moon or a Sabbath day. '
  '17':
  - type: text
    content: 'Such things are only a shadow of what is to come '
  - type: text
    content: and
  - type: text
    content: ' they have only symbolic value; but the substance [the reality of what is foreshadowed] belongs to Christ. '
  '18':
  - type: text
    content: 'Let no one defraud you of your prize [your freedom in Christ and your salvation] by insisting on mock humility and the worship of angels, going into detail about '
  - type: text
    content: visions
  - type: text
    content: ' [he claims] he has seen [to justify his authority], puffed up [in conceit] by his unspiritual mind, '
  '19':
  - type: text
    content: and not holding fast to the head [of the body, Jesus Christ], from whom the entire body, supplied and knit together by its joints and ligaments, grows with the growth [that can come only] from God.
  '2':
  - type: text
    content: '[For my hope is] that their hearts may be encouraged as they are knit together in [unselfish] '
  - type: note
    content: See note 1:4.
  - type: text
    content: 'love, so that they may have all the riches that come from the full assurance of understanding [the joy of salvation], resulting in a true [and more intimate] knowledge of the '
  - type: note
    content: See note 1:26.
  - type: text
    content: 'mystery of God, '
  - type: text
    content: that is,
  - type: text
    content: ' Christ, '
  '20':
  - type: text
    content: 'If you have died with Christ to the '
  - type: note
    content: See note v 8.
  - type: text
    content: 'elementary principles of the world, why, as if you were still living in the world, do you submit to rules '
  - type: text
    content: and
  - type: text
    content: ' regulations, such as, '
  '21':
  - type: text
    content: '“Do not handle [this], do not taste [that], do not [even] touch!”? '
  '22':
  - type: text
    content: '(these things all perish with use)—in accordance with the commandments and teachings of men. [Is 29:13] '
  '23':
  - type: text
    content: These practices indeed have the appearance [that popularly passes as that] of wisdom in self-made religion and mock humility and severe treatment of the body (asceticism), but are of no value against sinful indulgence [because they do not honor God].
  '3':
  - type: text
    content: 'in whom are hidden all the treasures of wisdom and knowledge [regarding the word and purposes of God]. '
  '4':
  - type: text
    content: 'I say this so that no one will deceive you with persuasive [but thoroughly deceptive] arguments. '
  '5':
  - type: text
    content: 'For even though I am absent [from you] in body, nevertheless I am with you in spirit, '
  - type: note
    content: Lit rejoicing and seeing.
  - type: text
    content: delighted to see your good discipline [as you stand shoulder to shoulder and form a solid front] and to see the stability of your faith in Christ [your steadfast reliance on Him and your unwavering confidence in His power, wisdom, and goodness].
  '6':
  - type: text
    content: 'Therefore as you have received Christ Jesus the Lord, walk in [union with] Him [reflecting His character in the things you do and say—living lives that lead others away from sin], '
  '7':
  - type: text
    content: 'having been deeply rooted [in Him] and '
  - type: text
    content: now
  - type: text
    content: ' being '
  - type: text
    content: continually
  - type: text
    content: ' built up in Him and [becoming increasingly more] established '
  - type: note
    content: Or by.
  - type: text
    content: in your faith, just as you were taught, and overflowing in it with gratitude.
  '8':
  - type: text
    content: 'See to it that no one takes you captive through philosophy and empty deception [pseudo-intellectual babble], according to the tradition [and musings] of '
  - type: text
    content: mere
  - type: text
    content: ' men, following the '
  - type: note
    content: Perhaps a reference to ancient philosophies based on the belief that only the material world is real.
  - type: text
    content: 'elementary principles of this world, rather than following [the truth—the teachings of] Christ. '
  '9':
  - type: text
    content: 'For in Him all the fullness of Deity (the Godhead) dwells in bodily form [completely expressing the divine essence of God]. '
