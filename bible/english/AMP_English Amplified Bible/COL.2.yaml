document_id: COL.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You Are Built Up in Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'For I want you to know how great a struggle I have for you and for those [believers] at '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Along with Colossae, Laodicea was located in the valley of the Lycus River and is one of the seven churches mentioned in Rev 1-3.
      marker-yv: yv-n
    - type: text
      text: 'Laodicea, and for all who [like yourselves] have never seen me face to face. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And in Him you have been made complete [achieving spiritual stature through Christ], and He is the head over all rule and authority [of every angelic and earthly power]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'In Him you were also circumcised with a circumcision not made with hands, but by the [spiritual] circumcision of Christ in the stripping off of the body of the flesh [the sinful carnal nature], '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'having been buried with Him in baptism and raised with Him [to a new life] through [your] faith in the working of God, [as displayed] when He raised Christ from the dead. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When you were dead in your sins and in the uncircumcision of your flesh (worldliness, manner of life), God made you alive together with Christ, having [freely] forgiven us all our sins, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'having canceled out the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This term refers to a debtor’s handwritten note acknowledging the debt.
      marker-yv: yv-n
    - type: text
      text: 'certificate of debt consisting of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the requirements found in the Mosaic Law which were violated. The debt is the punishment due for the violator’s sins. Gentiles were never directly liable to the Law, but as Paul explains in Rom 2:12-16, God holds them responsible for violating the principles of the Law that they acknowledge of their own volition.
      marker-yv: yv-n
    - type: text
      text: 'legal demands [which were in force] against us and which were hostile to us. And this certificate He has set aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' completely removed by nailing it to the cross. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When He had disarmed the rulers and authorities [those supernatural forces of evil operating against us], He made a public example of them [exhibiting them as captives in His triumphal procession], having triumphed over them through '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: it
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Him
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: the cross.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore let no one judge you in regard to food and drink or in regard to [the observance of] a festival or a new moon or a Sabbath day. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Such things are only a shadow of what is to come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' they have only symbolic value; but the substance [the reality of what is foreshadowed] belongs to Christ. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Let no one defraud you of your prize [your freedom in Christ and your salvation] by insisting on mock humility and the worship of angels, going into detail about '
    - type: usfm
      marker: it
      children:
      - type: text
        text: visions
    - type: text
      text: ' [he claims] he has seen [to justify his authority], puffed up [in conceit] by his unspiritual mind, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: and not holding fast to the head [of the body, Jesus Christ], from whom the entire body, supplied and knit together by its joints and ligaments, grows with the growth [that can come only] from God.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '[For my hope is] that their hearts may be encouraged as they are knit together in [unselfish] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:4.
      marker-yv: yv-n
    - type: text
      text: 'love, so that they may have all the riches that come from the full assurance of understanding [the joy of salvation], resulting in a true [and more intimate] knowledge of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:26.
      marker-yv: yv-n
    - type: text
      text: 'mystery of God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is,
    - type: text
      text: ' Christ, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'If you have died with Christ to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note v 8.
      marker-yv: yv-n
    - type: text
      text: 'elementary principles of the world, why, as if you were still living in the world, do you submit to rules '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' regulations, such as, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Do not handle [this], do not taste [that], do not [even] touch!”? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '(these things all perish with use)—in accordance with the commandments and teachings of men. [Is 29:13] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: These practices indeed have the appearance [that popularly passes as that] of wisdom in self-made religion and mock humility and severe treatment of the body (asceticism), but are of no value against sinful indulgence [because they do not honor God].
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'in whom are hidden all the treasures of wisdom and knowledge [regarding the word and purposes of God]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I say this so that no one will deceive you with persuasive [but thoroughly deceptive] arguments. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For even though I am absent [from you] in body, nevertheless I am with you in spirit, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: rejoicing and seeing
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: delighted to see your good discipline [as you stand shoulder to shoulder and form a solid front] and to see the stability of your faith in Christ [your steadfast reliance on Him and your unwavering confidence in His power, wisdom, and goodness].
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Therefore as you have received Christ Jesus the Lord, walk in [union with] Him [reflecting His character in the things you do and say—living lives that lead others away from sin], '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'having been deeply rooted [in Him] and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now
    - type: text
      text: ' being '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' built up in Him and [becoming increasingly more] established '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: by
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: in your faith, just as you were taught, and overflowing in it with gratitude.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'See to it that no one takes you captive through philosophy and empty deception [pseudo-intellectual babble], according to the tradition [and musings] of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mere
    - type: text
      text: ' men, following the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps a reference to ancient philosophies based on the belief that only the material world is real.
      marker-yv: yv-n
    - type: text
      text: 'elementary principles of this world, rather than following [the truth—the teachings of] Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For in Him all the fullness of Deity (the Godhead) dwells in bodily form [completely expressing the divine essence of God]. '
