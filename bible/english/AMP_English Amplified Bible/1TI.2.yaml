document_id: 1TI.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Call to Prayer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'First of all, then, I urge that petitions (specific requests), prayers, intercessions (prayers for others) and thanksgivings be offered on behalf of all people, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'but instead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: adorned
    - type: text
      text: ' by good deeds [helping others], as is proper for women who profess to worship God. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'A woman must quietly receive instruction with all submissiveness. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I do not allow a woman to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The early church evidently followed Jewish practices in religious education. In Israel, mothers taught their daughters, and it was the father’s responsibility to teach his sons in all areas, including religious education. So Paul’s prohibitions here are consistent with the practices of his day.
      marker-yv: yv-n
    - type: text
      text: 'teach or exercise authority over a man, but to remain quiet [in the congregation]. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For Adam was formed first [by God from the earth], then Eve; [Gen 2:7, 21, 22] '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and it was not Adam who was deceived, but the woman who was led astray and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: has come to be in
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'fell into sin. [Gen 3:1-6] '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: women
    - type: text
      text: ' will be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is considered one of the more difficult verses in the NT to interpret. Part of the difficulty is that the Greek verb rendered “preserved” is literally “saved,” which could refer either to physical preservation or to salvation. Some expositors interpret the verb as referring to the blessings of a woman’s role as wife and mother, especially in regard to raising godly children. However, the wording of the verse seen here reflects the interpretation that Paul is speaking, in broad terms, of protection from the dangers of childbirth.
      marker-yv: yv-n
    - type: text
      text: 'preserved (saved) through [the pain and dangers of] the bearing of children '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The blessings on a woman are the result of her adherence to the virtues listed.
      marker-yv: yv-n
    - type: text
      text: 'if they continue in faith and love and holiness with self-control '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discretion.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nero ruled as emperor of Rome at this time.
      marker-yv: yv-n
    - type: text
      text: 'kings and all who are in [positions of] high authority, so that we may live a peaceful and quiet life in all godliness and dignity. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'This [kind of praying] is good and acceptable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing in the sight of God our Savior, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Salvation is offered to everyone, but each individual must choose to accept or reject God’s gracious offer.
      marker-yv: yv-n
    - type: text
      text: 'desires all people to be saved and to come to the knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognition of the [divine] truth. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For there is [only] one God, and [only] one Mediator between God and mankind, the Man Christ Jesus, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'who gave Himself as a ransom [a substitutionary sacrifice to atone] for all, the testimony given at the right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proper time. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And for this matter I was appointed a preacher and an apostle—I am telling the truth, I am not lying [when I say this]—a teacher of the Gentiles in faith and truth.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore I want the men in every place to pray, lifting up holy hands, without anger and disputing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' quarreling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' doubt [in their mind].'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Women Instructed
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Likewise, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I want
    - type: text
      text: ' women to adorn themselves modestly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appropriately and discreetly in proper clothing, not with [elaborately] braided hair and gold or pearls or expensive clothes, '
