document_id: PSA.41,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 41
  - type: heading
    content: The Psalmist in Sickness Complains of Enemies and False Friends.
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: Blessed [by God’s grace and compassion] is he who considers the helpless;
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will save him in the day of trouble.'
  '10':
  - type: text
    content: ¶But You, O L
  - type: heading
    content: ord
  - type: text
    content: ', be gracious to me and '
  - type: note
    content: Lit raise me up.
  - type: text
    content: restore me [to health],
  - type: text
    content: So that I may repay them.
  '11':
  - type: text
    content: 'By this I know that You favor '
  - type: text
    content: and
  - type: text
    content: ' delight in me,'
  - type: text
    content: Because my enemy does not shout in triumph over me.
  '12':
  - type: text
    content: As for me, You uphold me in my integrity,
  - type: text
    content: And You set me in Your presence forever.
  '13':
  - type: text
    content: ¶Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: From everlasting to everlasting [from this age to the next, and forever].
  - type: text
    content: Amen and Amen (so be it).
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will protect him and keep him alive;'
  - type: text
    content: And he will be called blessed in the land;
  - type: text
    content: You do not hand him over to the desire of his enemies.
  '3':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will sustain '
  - type: text
    content: and
  - type: text
    content: ' strengthen him on his sickbed;'
  - type: text
    content: In his illness, You will restore him to health.
  '4':
  - type: text
    content: ¶As for me, I said, “O L
  - type: heading
    content: ord
  - type: text
    content: ', be gracious to me;'
  - type: text
    content: Heal my soul, for I have sinned against You.”
  '5':
  - type: text
    content: 'My enemies speak evil of me, '
  - type: text
    content: saying,
  - type: text
    content: “When will he die and his name perish?”
  '6':
  - type: text
    content: And when one comes to see me, he speaks empty words,
  - type: text
    content: While his heart gathers malicious gossip [against me];
  - type: text
    content: When he goes away, he tells it [everywhere].
  '7':
  - type: text
    content: All who hate me whisper together about me;
  - type: text
    content: 'Against me they devise my hurt [imagining the worst for me], '
  - type: text
    content: saying,
  '8':
  - type: text
    content: '“A wicked thing is poured out upon him '
  - type: text
    content: and
  - type: text
    content: ' holds him;'
  - type: text
    content: And when he lies down, he will not rise up again.”
  '9':
  - type: text
    content: Even my own close friend in whom I trusted,
  - type: text
    content: Who ate my bread,
  - type: text
    content: Has lifted up his heel against me [betraying me]. [John 13:18]
