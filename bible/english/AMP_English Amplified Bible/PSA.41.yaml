document_id: PSA.41,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 41
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Psalmist in Sickness Complains of Enemies and False Friends.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Blessed [by God’s grace and compassion] is he who considers the helpless;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will save him in the day of trouble.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶But You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', be gracious to me and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: raise me up
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: restore me [to health],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that I may repay them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'By this I know that You favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight in me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because my enemy does not shout in triumph over me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: As for me, You uphold me in my integrity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You set me in Your presence forever.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ¶Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From everlasting to everlasting [from this age to the next, and forever].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen and Amen (so be it).
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will protect him and keep him alive;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he will be called blessed in the land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You do not hand him over to the desire of his enemies.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will sustain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthen him on his sickbed;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In his illness, You will restore him to health.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶As for me, I said, “O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', be gracious to me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heal my soul, for I have sinned against You.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'My enemies speak evil of me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When will he die and his name perish?”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And when one comes to see me, he speaks empty words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While his heart gathers malicious gossip [against me];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he goes away, he tells it [everywhere].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: All who hate me whisper together about me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Against me they devise my hurt [imagining the worst for me], '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“A wicked thing is poured out upon him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' holds him;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when he lies down, he will not rise up again.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Even my own close friend in whom I trusted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who ate my bread,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has lifted up his heel against me [betraying me]. [John 13:18]
