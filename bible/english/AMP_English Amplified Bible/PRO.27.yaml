document_id: PRO.27,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Warnings and Instructions
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not boast about tomorrow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you do not know what a day may bring. [Luke 12:19, 20; James 4:13]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not abandon your own friend and your father’s friend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not go to your brother’s house in the day of your disaster.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Better is a neighbor who is near than a brother who is far away.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, be wise, and make my heart glad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I may reply to him who reproaches (reprimands, criticizes) me. [Prov 10:1; 23:15, 24]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A prudent man sees evil and hides himself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' avoids it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the naive [who are easily misled] continue on and are punished [by suffering the consequences of sin]. [Prov 22:3]
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[The judge tells the creditor,] “Take the garment of one who is surety (guarantees a loan) for a stranger;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And hold him in pledge when he is surety for an immoral woman [for it is unlikely the debt will be repaid].” [Prov 20:16]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who blesses his neighbor with a loud voice early in the morning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be counted as a curse to him [for it will either be annoying or his purpose will be suspect].
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A constant dripping on a day of steady rain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a contentious (quarrelsome) woman are alike; [Prov 19:13]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever attempts to restrain her [criticism] might as well try to stop the wind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And grasps oil with his right hand.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As iron sharpens iron,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So one man sharpens [and influences] another [through discussion].
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who tends the fig tree will eat its fruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he who faithfully protects '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cares for his master will be honored. [1 Cor 9:7, 13]'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As in water face '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reflects
    - type: text
      text: ' face,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the heart of man reflects man.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let another praise you, and not your own mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A stranger, and not your own lips.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sheol (the place of the dead) and Abaddon (the underworld) are never satisfied;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor are the eyes of man ever satisfied. [Prov 30:16; Hab 2:5]
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The refining pot is for silver and the furnace for gold [to separate the impurities of the metal],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And each is tested by the praise given to him [and his response to it, whether humble or proud].
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though you pound a [hardened, arrogant] fool [who rejects wisdom] in a mortar with a pestle like grain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet his foolishness will not leave him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Be diligent to know the condition of your flocks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And pay attention to your herds;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For riches are not forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor does a crown '
    - type: usfm
      marker: it
      children:
      - type: text
        text: endure
    - type: text
      text: ' to all generations.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the grass is gone, the new growth is seen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And herbs of the mountain are gathered in,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The lambs will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: supply wool
    - type: text
      text: ' for your clothing,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the goats will bring the price of a field.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there will be
    - type: text
      text: ' enough goats’ milk for your food,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the food of your household,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And for the maintenance of your maids.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stone is heavy and the sand weighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But a fool’s [unreasonable] wrath is heavier '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' more burdensome than both of them.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wrath is cruel and anger is an overwhelming flood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But who is able to endure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stand before [the sin of] jealousy?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Better is an open reprimand [of loving correction]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than love that is hidden. [Prov 28:23; Gal 2:14]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faithful are the wounds of a friend [who corrects out of love and concern],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the kisses of an enemy are deceitful [because they serve his hidden agenda].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who is satisfied loathes honey,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But to the hungry soul any bitter thing is sweet.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a bird that wanders from her nest [with its comfort and safety],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is a man who wanders from his home.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oil and perfume make the heart glad;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So does the sweetness of a friend’s counsel that comes from the heart.
