document_id: PRO.27,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Warnings and Instructions
  - type: text
    content: Do not boast about tomorrow,
  - type: text
    content: For you do not know what a day may bring. [Luke 12:19, 20; James 4:13]
  '10':
  - type: text
    content: Do not abandon your own friend and your father’s friend,
  - type: text
    content: And do not go to your brother’s house in the day of your disaster.
  - type: text
    content: Better is a neighbor who is near than a brother who is far away.
  '11':
  - type: text
    content: My son, be wise, and make my heart glad,
  - type: text
    content: That I may reply to him who reproaches (reprimands, criticizes) me. [Prov 10:1; 23:15, 24]
  '12':
  - type: text
    content: 'A prudent man sees evil and hides himself '
  - type: text
    content: and
  - type: text
    content: ' avoids it,'
  - type: text
    content: But the naive [who are easily misled] continue on and are punished [by suffering the consequences of sin]. [Prov 22:3]
  '13':
  - type: text
    content: '[The judge tells the creditor,] “Take the garment of one who is surety (guarantees a loan) for a stranger;'
  - type: text
    content: And hold him in pledge when he is surety for an immoral woman [for it is unlikely the debt will be repaid].” [Prov 20:16]
  '14':
  - type: text
    content: He who blesses his neighbor with a loud voice early in the morning,
  - type: text
    content: It will be counted as a curse to him [for it will either be annoying or his purpose will be suspect].
  '15':
  - type: text
    content: A constant dripping on a day of steady rain
  - type: text
    content: And a contentious (quarrelsome) woman are alike; [Prov 19:13]
  '16':
  - type: text
    content: Whoever attempts to restrain her [criticism] might as well try to stop the wind,
  - type: text
    content: And grasps oil with his right hand.
  '17':
  - type: text
    content: As iron sharpens iron,
  - type: text
    content: So one man sharpens [and influences] another [through discussion].
  '18':
  - type: text
    content: He who tends the fig tree will eat its fruit,
  - type: text
    content: 'And he who faithfully protects '
  - type: text
    content: and
  - type: text
    content: ' cares for his master will be honored. [1 Cor 9:7, 13]'
  '19':
  - type: text
    content: 'As in water face '
  - type: text
    content: reflects
  - type: text
    content: ' face,'
  - type: text
    content: So the heart of man reflects man.
  '2':
  - type: text
    content: Let another praise you, and not your own mouth;
  - type: text
    content: A stranger, and not your own lips.
  '20':
  - type: text
    content: Sheol (the place of the dead) and Abaddon (the underworld) are never satisfied;
  - type: text
    content: Nor are the eyes of man ever satisfied. [Prov 30:16; Hab 2:5]
  '21':
  - type: text
    content: The refining pot is for silver and the furnace for gold [to separate the impurities of the metal],
  - type: text
    content: And each is tested by the praise given to him [and his response to it, whether humble or proud].
  '22':
  - type: text
    content: Even though you pound a [hardened, arrogant] fool [who rejects wisdom] in a mortar with a pestle like grain,
  - type: text
    content: Yet his foolishness will not leave him.
  '23':
  - type: text
    content: ¶Be diligent to know the condition of your flocks,
  - type: text
    content: And pay attention to your herds;
  '24':
  - type: text
    content: For riches are not forever,
  - type: text
    content: 'Nor does a crown '
  - type: text
    content: endure
  - type: text
    content: ' to all generations.'
  '25':
  - type: text
    content: When the grass is gone, the new growth is seen,
  - type: text
    content: And herbs of the mountain are gathered in,
  '26':
  - type: text
    content: 'The lambs will '
  - type: text
    content: supply wool
  - type: text
    content: ' for your clothing,'
  - type: text
    content: And the goats will bring the price of a field.
  '27':
  - type: text
    content: 'And '
  - type: text
    content: there will be
  - type: text
    content: ' enough goats’ milk for your food,'
  - type: text
    content: For the food of your household,
  - type: text
    content: And for the maintenance of your maids.
  '3':
  - type: text
    content: Stone is heavy and the sand weighty,
  - type: text
    content: 'But a fool’s [unreasonable] wrath is heavier '
  - type: text
    content: and
  - type: text
    content: ' more burdensome than both of them.'
  '4':
  - type: text
    content: Wrath is cruel and anger is an overwhelming flood,
  - type: text
    content: 'But who is able to endure '
  - type: text
    content: and
  - type: text
    content: ' stand before [the sin of] jealousy?'
  '5':
  - type: text
    content: Better is an open reprimand [of loving correction]
  - type: text
    content: Than love that is hidden. [Prov 28:23; Gal 2:14]
  '6':
  - type: text
    content: Faithful are the wounds of a friend [who corrects out of love and concern],
  - type: text
    content: But the kisses of an enemy are deceitful [because they serve his hidden agenda].
  '7':
  - type: text
    content: He who is satisfied loathes honey,
  - type: text
    content: But to the hungry soul any bitter thing is sweet.
  '8':
  - type: text
    content: Like a bird that wanders from her nest [with its comfort and safety],
  - type: text
    content: So is a man who wanders from his home.
  '9':
  - type: text
    content: Oil and perfume make the heart glad;
  - type: text
    content: So does the sweetness of a friend’s counsel that comes from the heart.
