document_id: ISA.26,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Song of Trust in God’s Protection
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day this song will be sung in the land of Judah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We have a strong city;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sets up salvation as walls and ramparts.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Though
    - type: text
      text: ' the wicked is shown compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favor,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not learn righteousness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the land of uprightness he deals unjustly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And refuses to see the majesty of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶
    - type: usfm
      marker: it
      children:
      - type: text
        text: Though
    - type: text
      text: ' Your hand is lifted up [to strike], O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the wicked do not see it.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them see Your zeal for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your
    - type: text
      text: ' people and be put to shame;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, let the fire reserved for Your enemies consume them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', You will establish peace for us,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since You have also performed for us all that we have done.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God, other masters besides You have ruled over us;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But through You alone we confess Your name.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The [wicked] dead will not live [again], the spirits of the dead will not rise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' return;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore You have punished and destroyed them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You have wiped out every memory of them [every trace of them].
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have increased the nation, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have increased the nation, You are glorified;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have extended all the borders of the land.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', they sought You in distress;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They managed only a prayerful whisper
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When Your discipline was upon them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As a woman with child approaches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the time
    - type: text
      text: ' to give birth,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She is in pain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' struggles and cries out in her labor,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So we were before You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We have been with child, we have twisted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' struggled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in labor;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We gave birth, as it seems, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' to wind.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We could not accomplish salvation for the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor were inhabitants of the world '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fallen
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: born.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your dead will live;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So with some ancient versions; MT reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: My dead body
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Their dead bodies will rise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who lie in the dust, awake and shout for joy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your dew is a dew of [celestial] light [heavenly, supernatural],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the earth will give birth to the spirits of the dead. [Ezek 37:11, 12]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Open the gates, that the righteous nation may enter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The one that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: keeps trustworthiness
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'remains faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Come, my people, enter your chambers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shut your doors behind you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hide for a little while
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until the [L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: '] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: curse
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: wrath is past.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen carefully, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is about to come out of His [heavenly] place'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To punish the inhabitants of the earth for their wickedness [their sin, their injustice, their wrongdoing];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth will reveal the [innocent] blood shed upon her
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will no longer cover her slain.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“You will keep in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: peace, peace,
        - type: text
          text: ' a Hebrew idiom of emphasis.'
      marker-yv: yv-n
    - type: text
      text: 'perfect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' constant peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the one
    - type: text
      text: ' whose mind is steadfast [that is, committed and focused on You—in both '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew word for '
        - type: usfm
          marker: it
          children:
          - type: text
            text: inclination
        - type: text
          text: ' became a technical term in Jewish tradition, and the rabbis frequently referred to the “evil inclination” much in the same sense as the sin nature. They also recognized a “good inclination,” which the righteous choose to follow, and urged people to make their good inclination king over the evil inclination.'
      marker-yv: yv-n
    - type: text
      text: inclination and character],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because he trusts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' takes refuge in You [with hope and confident expectation].'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Trust [confidently] in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' forever [He is your fortress, your shield, your banner],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' is an everlasting Rock [the Rock of Ages].'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For He has thrown down the [arrogant] ones who dwell on high, the lofty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inaccessible city;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lays it low, He lays it low to the ground, He hurls it to the dust.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The foot will trample it,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Even
    - type: text
      text: ' the feet of the suffering, and the steps of the helpless.”'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶The way of the righteous [those in right-standing with God—living in moral and spiritual integrity] is smooth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' level;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Upright One, make a level path for the just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteous.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, in the path of Your judgments, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have waited expectantly for You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your name, even Your memory, is the desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deep longing of our souls.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the night my soul longs for You [O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, my spirit within me seeks You diligently;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For [only] when Your judgments are experienced on the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will the inhabitants of the world learn righteousness.
