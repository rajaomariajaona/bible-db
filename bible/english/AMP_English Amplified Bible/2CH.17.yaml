document_id: 2CH.17,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat Succeeds Asa
  - type: text
    content: 'Jehoshaphat his son then became king [of Judah] in Asa’s place, and strengthened his position over Israel. '
  '10':
  - type: text
    content: Now the dread of the L
  - type: heading
    content: ord
  - type: text
    content: ' was on all the kingdoms of the lands surrounding Judah, so that they did not make war against Jehoshaphat. '
  '11':
  - type: text
    content: 'Some of the Philistines brought gifts and silver as tribute to Jehoshaphat; the Arabians also brought him flocks: 7,700 rams and 7,700 male goats. '
  '12':
  - type: text
    content: 'So Jehoshaphat became greater and greater. He built fortresses and storage cities in Judah. '
  '13':
  - type: text
    content: 'He had large supplies in the cities of Judah, and soldiers, courageous men, in Jerusalem. '
  '14':
  - type: text
    content: 'This was the number of them by their fathers’ (ancestors’) households: of Judah, the commanders of thousands, Adnah the commander, and with him 300,000 courageous men; '
  '15':
  - type: text
    content: 'and next to him was Jehohanan the commander, and with him 280,000; '
  '16':
  - type: text
    content: and next to him Amasiah the son of Zichri, who volunteered for the L
  - type: heading
    content: ord
  - type: text
    content: ', and with him 200,000 courageous men; '
  '17':
  - type: text
    content: 'and of Benjamin: Eliada, a brave man, and with him 200,000 men armed with bow and shield; '
  '18':
  - type: text
    content: 'and next to him was Jehozabad, and with him 180,000 armed '
  - type: text
    content: and
  - type: text
    content: ' ready for military service. '
  '19':
  - type: text
    content: These are the ones who were in the service of the king, besides those he had placed in fortified cities throughout Judah.
  '2':
  - type: text
    content: He placed troops in all the fortified cities of Judah, and set garrisons in the land of Judah and in the cities of Ephraim which his father Asa had captured.
  - type: heading
    content: His Good Reign
  '3':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' was with Jehoshaphat because he '
  - type: note
    content: Lit walked in the earlier ways of his father.
  - type: text
    content: 'followed the example of his father (ancestor) David. He did not seek [to follow] the Baals [the false gods], '
  '4':
  - type: text
    content: 'but sought the God of his father, and walked in (obeyed) His commandments, and did not act as Israel did. '
  '5':
  - type: text
    content: Therefore the L
  - type: heading
    content: ord
  - type: text
    content: ' established the kingdom in his hand; and all Judah brought tribute to Jehoshaphat, and he had great wealth and honor. '
  '6':
  - type: text
    content: 'His heart was encouraged '
  - type: text
    content: and
  - type: text
    content: ' he took great pride in the ways of the L'
  - type: heading
    content: ord
  - type: text
    content: ; moreover, he again removed the high places [of pagan worship] and the Asherim from Judah.
  '7':
  - type: text
    content: 'Then in the third year of his reign he sent his officials, Ben-hail, Obadiah, Zechariah, Nethanel, and Micaiah, to teach in the cities of Judah; '
  '8':
  - type: text
    content: 'and with them were the Levites—Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth, Jehonathan, Adonijah, Tobijah, and Tobadonijah; and with them the priests Elishama and Jehoram. '
  '9':
  - type: text
    content: 'They taught in Judah '
  - type: text
    content: having
  - type: text
    content: ' the Book of the Law of the L'
  - type: heading
    content: ord
  - type: text
    content: ' with them; they went throughout all the cities of Judah and taught among the people.'
