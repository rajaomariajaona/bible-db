document_id: 2CH.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jehoshaphat Succeeds Asa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat his son then became king [of Judah] in Asa’s place, and strengthened his position over Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the dread of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was on all the kingdoms of the lands surrounding Judah, so that they did not make war against Jehoshaphat. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of the Philistines brought gifts and silver as tribute to Jehoshaphat; the Arabians also brought him flocks: 7,700 rams and 7,700 male goats. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jehoshaphat became greater and greater. He built fortresses and storage cities in Judah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He had large supplies in the cities of Judah, and soldiers, courageous men, in Jerusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This was the number of them by their fathers’ (ancestors’) households: of Judah, the commanders of thousands, Adnah the commander, and with him 300,000 courageous men; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and next to him was Jehohanan the commander, and with him 280,000; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and next to him Amasiah the son of Zichri, who volunteered for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and with him 200,000 courageous men; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of Benjamin: Eliada, a brave man, and with him 200,000 men armed with bow and shield; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and next to him was Jehozabad, and with him 180,000 armed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ready for military service. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the ones who were in the service of the king, besides those he had placed in fortified cities throughout Judah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He placed troops in all the fortified cities of Judah, and set garrisons in the land of Judah and in the cities of Ephraim which his father Asa had captured.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: His Good Reign
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with Jehoshaphat because he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: walked in the earlier ways of his father
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'followed the example of his father (ancestor) David. He did not seek [to follow] the Baals [the false gods], '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'but sought the God of his father, and walked in (obeyed) His commandments, and did not act as Israel did. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Therefore the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' established the kingdom in his hand; and all Judah brought tribute to Jehoshaphat, and he had great wealth and honor. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'His heart was encouraged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he took great pride in the ways of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; moreover, he again removed the high places [of pagan worship] and the Asherim from Judah.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then in the third year of his reign he sent his officials, Ben-hail, Obadiah, Zechariah, Nethanel, and Micaiah, to teach in the cities of Judah; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and with them were the Levites—Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth, Jehonathan, Adonijah, Tobijah, and Tobadonijah; and with them the priests Elishama and Jehoram. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They taught in Judah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: having
    - type: text
      text: ' the Book of the Law of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with them; they went throughout all the cities of Judah and taught among the people.'
