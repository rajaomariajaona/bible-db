  - type: heading
    content: Psalm 22
  - type: heading
    content: A Cry of Anguish and a Song of Praise.
  - type: text
    content: To the Chief Musician; set to [the tune of] Aijeleth Hashshahar (The Doe of the Dawn). A Psalm of David.
  - type: text
    content: ' '
  - type: note
    content: This psalm may have been prayed by Jesus when He was on the cross. It begins with, “My God, my God, why have You forsaken me?” and ends with a thought of finality. The psalm is quoted in Matt 27:46; Mark 15:34; and alluded to in Matt 27:35, 39, 43 and John 19:23, 24, 28 as being fulfilled at Christ’s crucifixion.
  - type: text
    content: My God, my God, why have You forsaken me?
  - type: text
    content: Why are You so far from helping me, and from the words of my groaning? [Matt 27:46]
  '10':
