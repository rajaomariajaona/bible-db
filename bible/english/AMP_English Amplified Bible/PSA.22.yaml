document_id: PSA.22,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 22
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Cry of Anguish and a Song of Praise.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; set to [the tune of] Aijeleth Hashshahar (The Doe of the Dawn). A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm may have been prayed by Jesus when He was on the cross. It begins with, “My God, my God, why have You forsaken me?” and ends with a thought of finality. The psalm is quoted in Matt 27:46; Mark 15:34; and alluded to in Matt 27:35, 39, 43 and John 19:23, 24, 28 as being fulfilled at Christ’s crucifixion.
      marker-yv: yv-n
    - type: text
      text: My God, my God, why have You forsaken me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why are You so far from helping me, and from the words of my groaning? [Matt 27:46]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was cast upon You from birth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From my mother’s womb You have been my God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Do not be far from me, for trouble is near;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no one to help.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many [enemies like] bulls have surrounded me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bulls
    - type: text
      text: ' of Bashan have encircled me. [Ezek 39:18; Amos 4:1]'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They open wide their mouths against me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a ravening and a roaring lion.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am poured out like water,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all my bones are out of joint.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is like wax;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is melted [by anguish] within me.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My strength is dried up like a fragment of clay pottery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my [dry] tongue clings to my jaws;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You have laid me in the dust of death. [John 19:28]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For [a pack of] dogs have surrounded me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A gang of evildoers has encircled me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They pierced my hands and my feet. [Is 53:7; John 19:37]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can count all my bones;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They look, they stare at me. [Luke 23:27, 35]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They divide my clothing among them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And cast lots for my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A prophetic reference to the long, seamless shirt-like tunic worn by Jesus as an undergarment.
      marker-yv: yv-n
    - type: text
      text: garment. [John 19:23, 24]
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶But You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', do not be far from me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O You my help, come quickly to my assistance.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my God, I call out by day, but You do not answer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And by night, but I find no rest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' quiet.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue my life from the sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My only '
    - type: usfm
      marker: it
      children:
      - type: text
        text: life
    - type: text
      text: ' from the paw of the dog (the executioner).'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me from the lion’s mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the horns of the wild oxen You answer me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶I will tell of Your name to my countrymen;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the midst of the congregation I will praise You. [John 20:17; Rom 8:29; Heb 2:12]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who fear the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [with awe-inspired reverence], praise Him!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All you descendants of Jacob, honor Him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fear Him [with submissive wonder], all you descendants of Israel.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He has not despised nor detested the suffering of the afflicted;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor has He hidden His face from him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when he cried to Him for help, He listened.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶My praise will be of You in the great assembly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pay my vows [made in the time of trouble] before those who [reverently] fear Him.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The afflicted will eat and be satisfied;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Those who [diligently] seek Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require Him [as their greatest need] will praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your hearts live forever!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the ends of the earth will remember and turn to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And all the families of the nations will bow down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship before You,'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the kingship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the kingdom are the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He rules over the nations.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the prosperous of the earth will eat and worship;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All those who go down to the dust (the dead) will bow before Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even he who cannot keep his soul alive.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But You are holy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O You who are enthroned in [the holy place where] the praises of Israel [are offered].
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Posterity will serve Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will tell of the Lord to the next generation.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will come and declare His righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To a people yet to be born—that He has done it [and that it is finished]. [John 19:30]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In You our fathers trusted [leaned on, relied on, and were confident];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They trusted and You rescued them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cried out to You and were delivered;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They trusted in You and were not disappointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' ashamed.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶But I am [treated as] a worm [insignificant and powerless] and not a man;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am the scorn of men and despised by the people. [Matt 27:39-44]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All who see me laugh at me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mock me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They [insultingly] open their lips, they shake their head, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
    - type: text
      text: ' [Matt 27:43]'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“He trusted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' committed himself to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', let Him save him.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let Him rescue him, because He delights in him.” [Matt 27:39, 43; Mark 15:29, 30; Luke 23:35]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Yet You are He who pulled me out of the womb;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made me trust when on my mother’s breasts.
