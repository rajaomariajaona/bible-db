    content: The doorways of the side chambers toward the free space were one doorway toward the north and another doorway toward the south; and the width of the free space was five cubits all around.
  '12':
  - type: text
    content: The building that was in front of the separate area on the side toward the west was seventy cubits wide; and the wall of the building was five cubits thick all around, and its length was ninety cubits.
  '13':
  - type: text
    content: 'Then he measured the temple, a hundred cubits long; the separate area and the building with its walls were also a hundred cubits long. '
