    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The side chambers became wider at each successive level as they encompassed the temple. Because the structure surrounding the temple went higher by stages on all sides of the temple, for that reason the width of the temple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: increased
  - type: text
