      text: '5'
  - type: text
    text: 'Then he measured the wall of the temple, six cubits [thick, to accommodate side chambers]; and the width of every side chamber, four cubits, all around the temple on every side. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
