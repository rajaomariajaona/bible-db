document_id: REV.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Six Bowls of Wrath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I heard a loud voice from the temple, saying to the seven angels, “Go and pour out on the earth the seven bowls of the wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation of God.” [Ps 69:24; Is 66:6]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: angel
  - type: text
    text: ' went and poured out his bowl on the earth; and loathsome and malignant sores came on the people who had the mark of the beast and who worshiped his image. [Ex 9:10, 11; Deut 28:35]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The second '
  - type: usfm
    marker: it
    children:
    - type: text
      text: angel
  - type: text
    text: ' poured out his bowl into the sea, and it turned into blood like that of a corpse [foul and disgusting]; and every living '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: soul
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: thing in the sea died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the third '
  - type: usfm
    marker: it
    children:
    - type: text
      text: angel
  - type: text
    text: ' poured out his bowl into the rivers and the springs of water; and they turned into blood. [Ex 7:17-21] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And I heard the angel of the waters saying, “Righteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' just are You, Who are and Who were, O Holy One, because You judged these things; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'for they have poured out the blood of the saints (God’s people) and the prophets, and You [in turn] have given them blood to drink. They deserve Your judgment.” [Ps 79:3] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And I heard [another from] the altar saying, “Yes, O Lord God, the Almighty [the Omnipotent, the Ruler of all], Your judgments are true and fair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous.” [Ps 119:137]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the fourth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: angel
  - type: text
    text: ' poured out his bowl on the sun, and it was given power to scorch humanity with [raging] fire. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: People were [severely] burned by the great heat; and they reviled the name of God who has power over these plagues, but they did not repent [of their sin] and glorify Him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the fifth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: angel
  - type: text
    text: ' poured out his bowl on the throne of the beast, and his kingdom was plunged into darkness; and people gnawed their tongues because of the pain [of their excruciating anguish and severe torment], [Ex 10:21] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and they blasphemed the God of heaven because of their anguish and their sores (abscesses, boils); and they did not repent of what they had done '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' hate their wickedness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the sixth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: angel
  - type: text
    text: ' poured out his bowl on the great river, the Euphrates; and its water was dried up, so that the way would be prepared for [the coming of] the kings from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the rising sun.
      - type: text
        text: ' Using this phrase, or just '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the rising,
      - type: text
        text: ' was the ancient way of referring to the east. A dry Euphrates would enable massive armies to travel quickly from the region of Iraq (Babylonia) to territory north of Israel (Syria) in preparation for the battle at Har-Magedon (v 16).'
    marker-yv: yv-n
  - type: text
    text: the east. [Is 11:15, 16]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Armageddon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I saw three loathsome spirits like frogs, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: leaping
  - type: text
    text: ' from the mouth of the dragon (Satan) and from the mouth of the beast (Antichrist, dictator) and from the mouth of the false prophet; [Ex 8:3; 1 Kin 22:21-23] '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'for they are [actually] the spirits of demons, performing [miraculous] signs. And they go out to the kings of the entire inhabited earth, to gather them together for the war of the great day of God, the Almighty. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '(“Behold, I am coming like a thief. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the third of the seven promised blessings. See note 1:3.
    marker-yv: yv-n
  - type: text
    text: 'Blessed is he who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'These are metaphorical statements referring to a believer who is always expecting the return of Christ, and maintains a lifestyle (the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: clothing)
      - type: text
        text: ' of which he will not be ashamed when that day comes.'
    marker-yv: yv-n
  - type: text
    text: 'stays awake and who keeps his clothes [that is, stays spiritually ready for the Lord’s return], so that he will not be naked—spiritually unprepared—and men will not see his shame.”) [Matt 24:42-44; 1 Thess 5:2-4] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they (demons) gathered the kings and armies of the world together at the place which in Hebrew is called '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name means “mountain of Megiddo” and indicates a region west and slightly south of the Sea of Galilee.
    marker-yv: yv-n
  - type: text
    text: Har-Magedon (Armageddon).
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Seventh Bowl of Wrath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the seventh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: angel
  - type: text
    text: ' poured out his bowl into the air, and a loud voice came out of the temple from the throne [of God], saying, “It is done. [It is all over, it is all accomplished, it has come.]” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And there were flashes of lightning and loud rumblings and peals of thunder; and there was a massive earthquake—nothing like it has ever occurred since mankind originated on the earth, so severe and far-reaching was that earthquake. [Ex 19:16-18; Dan 12:1] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The great city was split into three parts, and the cities of the nations fell. And God kept in mind Babylon the great, to give her the cup of the wine of His fierce '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' furious wrath. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then every island fled away, and no mountains could be found. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And giant hailstones, as heavy as a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A talent weighs about a hundred pounds.
    marker-yv: yv-n
  - type: text
    text: 'talent, fell from the sky on the people; and people reviled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spoke abusively of God for the plague of the hail, because the plague was so very great. [Ex 9:22-25]'
