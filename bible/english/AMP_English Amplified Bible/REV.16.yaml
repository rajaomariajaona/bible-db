document_id: REV.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Six Bowls of Wrath
  - type: text
    content: 'Then I heard a loud voice from the temple, saying to the seven angels, “Go and pour out on the earth the seven bowls of the wrath '
  - type: text
    content: and
  - type: text
    content: ' indignation of God.” [Ps 69:24; Is 66:6]'
  '10':
  - type: text
    content: 'Then the fifth '
  - type: text
    content: angel
  - type: text
    content: ' poured out his bowl on the throne of the beast, and his kingdom was plunged into darkness; and people gnawed their tongues because of the pain [of their excruciating anguish and severe torment], [Ex 10:21] '
  '11':
  - type: text
    content: 'and they blasphemed the God of heaven because of their anguish and their sores (abscesses, boils); and they did not repent of what they had done '
  - type: text
    content: nor
  - type: text
    content: ' hate their wickedness.'
  '12':
  - type: text
    content: 'Then the sixth '
  - type: text
    content: angel
  - type: text
    content: ' poured out his bowl on the great river, the Euphrates; and its water was dried up, so that the way would be prepared for [the coming of] the kings from '
  - type: note
    content: Lit the rising sun. Using this phrase, or just the rising, was the ancient way of referring to the east. A dry Euphrates would enable massive armies to travel quickly from the region of Iraq (Babylonia) to territory north of Israel (Syria) in preparation for the battle at Har-Magedon (v 16).
  - type: text
    content: the east. [Is 11:15, 16]
  - type: heading
    content: Armageddon
  '13':
  - type: text
    content: 'And I saw three loathsome spirits like frogs, '
  - type: text
    content: leaping
  - type: text
    content: ' from the mouth of the dragon (Satan) and from the mouth of the beast (Antichrist, dictator) and from the mouth of the false prophet; [Ex 8:3; 1 Kin 22:21-23] '
  '14':
  - type: text
    content: 'for they are [actually] the spirits of demons, performing [miraculous] signs. And they go out to the kings of the entire inhabited earth, to gather them together for the war of the great day of God, the Almighty. '
  '15':
  - type: text
    content: '(“Behold, I am coming like a thief. '
  - type: note
    content: This is the third of the seven promised blessings. See note 1:3.
  - type: text
    content: 'Blessed is he who '
  - type: note
    content: These are metaphorical statements referring to a believer who is always expecting the return of Christ, and maintains a lifestyle (the clothing) of which he will not be ashamed when that day comes.
  - type: text
    content: 'stays awake and who keeps his clothes [that is, stays spiritually ready for the Lord’s return], so that he will not be naked—spiritually unprepared—and men will not see his shame.”) [Matt 24:42-44; 1 Thess 5:2-4] '
  '16':
  - type: text
    content: 'And they (demons) gathered the kings and armies of the world together at the place which in Hebrew is called '
  - type: note
    content: The name means “mountain of Megiddo” and indicates a region west and slightly south of the Sea of Galilee.
  - type: text
    content: Har-Magedon (Armageddon).
  - type: heading
    content: Seventh Bowl of Wrath
  '17':
  - type: text
    content: 'Then the seventh '
  - type: text
    content: angel
  - type: text
    content: ' poured out his bowl into the air, and a loud voice came out of the temple from the throne [of God], saying, “It is done. [It is all over, it is all accomplished, it has come.]” '
  '18':
  - type: text
    content: 'And there were flashes of lightning and loud rumblings and peals of thunder; and there was a massive earthquake—nothing like it has ever occurred since mankind originated on the earth, so severe and far-reaching was that earthquake. [Ex 19:16-18; Dan 12:1] '
  '19':
  - type: text
    content: 'The great city was split into three parts, and the cities of the nations fell. And God kept in mind Babylon the great, to give her the cup of the wine of His fierce '
  - type: text
    content: and
  - type: text
    content: ' furious wrath. '
  '2':
  - type: text
    content: 'So the first '
  - type: text
    content: angel
  - type: text
    content: ' went and poured out his bowl on the earth; and loathsome and malignant sores came on the people who had the mark of the beast and who worshiped his image. [Ex 9:10, 11; Deut 28:35]'
  '20':
  - type: text
    content: 'Then every island fled away, and no mountains could be found. '
  '21':
  - type: text
    content: 'And giant hailstones, as heavy as a '
  - type: note
    content: A talent weighs about a hundred pounds.
  - type: text
    content: 'talent, fell from the sky on the people; and people reviled '
  - type: text
    content: and
  - type: text
    content: ' spoke abusively of God for the plague of the hail, because the plague was so very great. [Ex 9:22-25]'
  '3':
  - type: text
    content: 'The second '
  - type: text
    content: angel
  - type: text
    content: ' poured out his bowl into the sea, and it turned into blood like that of a corpse [foul and disgusting]; and every living '
  - type: note
    content: Lit soul.
  - type: text
    content: thing in the sea died.
  '4':
  - type: text
    content: 'Then the third '
  - type: text
    content: angel
  - type: text
    content: ' poured out his bowl into the rivers and the springs of water; and they turned into blood. [Ex 7:17-21] '
  '5':
  - type: text
    content: 'And I heard the angel of the waters saying, “Righteous '
  - type: text
    content: and
  - type: text
    content: ' just are You, Who are and Who were, O Holy One, because You judged these things; '
  '6':
  - type: text
    content: 'for they have poured out the blood of the saints (God’s people) and the prophets, and You [in turn] have given them blood to drink. They deserve Your judgment.” [Ps 79:3] '
  '7':
  - type: text
    content: 'And I heard [another from] the altar saying, “Yes, O Lord God, the Almighty [the Omnipotent, the Ruler of all], Your judgments are true and fair '
  - type: text
    content: and
  - type: text
    content: ' righteous.” [Ps 119:137]'
  '8':
  - type: text
    content: 'Then the fourth '
  - type: text
    content: angel
  - type: text
    content: ' poured out his bowl on the sun, and it was given power to scorch humanity with [raging] fire. '
  '9':
  - type: text
    content: People were [severely] burned by the great heat; and they reviled the name of God who has power over these plagues, but they did not repent [of their sin] and glorify Him.
