document_id: PSA.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 5
  - type: heading
    content: Prayer for Protection from the Wicked.
  - type: text
    content: To the Chief Musician; on wind instruments. A Psalm of David.
  - type: text
    content: Listen to my words, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'Consider my groaning '
  - type: text
    content: and
  - type: text
    content: ' sighing.'
  '10':
  - type: text
    content: Hold them guilty, O God;
  - type: text
    content: 'Let them fall by their own designs '
  - type: text
    content: and
  - type: text
    content: ' councils!'
  - type: text
    content: Cast them out because of the abundance of their transgressions,
  - type: text
    content: 'For they are mutinous '
  - type: text
    content: and
  - type: text
    content: ' have rebelled against You.'
  '11':
  - type: text
    content: '¶But let all who take refuge '
  - type: text
    content: and
  - type: text
    content: ' put their trust in You rejoice,'
  - type: text
    content: Let them ever sing for joy;
  - type: text
    content: 'Because You cover '
  - type: text
    content: and
  - type: text
    content: ' shelter them,'
  - type: text
    content: 'Let those who love Your name be joyful '
  - type: text
    content: and
  - type: text
    content: ' exult in You.'
  '12':
  - type: text
    content: For You, O L
  - type: heading
    content: ord
  - type: text
    content: ', bless the righteous man [the one who is in right standing with You];'
  - type: text
    content: You surround him with favor as with a shield.
  '2':
  - type: text
    content: Heed the sound of my cry for help, my King and my God,
  - type: text
    content: For to You I pray.
  '3':
  - type: text
    content: In the morning, O L
  - type: heading
    content: ord
  - type: text
    content: ', You will hear my voice;'
  - type: text
    content: 'In the morning I will prepare [a prayer and a sacrifice] for You and watch '
  - type: text
    content: and
  - type: text
    content: ' wait [for You to speak to my heart].'
  '4':
  - type: text
    content: ¶For You are not a God who takes pleasure in wickedness;
  - type: text
    content: No evil [person] dwells with You.
  '5':
  - type: text
    content: 'The boastful '
  - type: text
    content: and
  - type: text
    content: ' the arrogant will not stand in Your sight;'
  - type: text
    content: You hate all who do evil.
  '6':
  - type: text
    content: You destroy those who tell lies;
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' detests '
  - type: text
    content: and
  - type: text
    content: ' rejects the bloodthirsty and deceitful man.'
  '7':
  - type: text
    content: 'But as for me, I will enter Your house through the abundance of Your steadfast love '
  - type: text
    content: and
  - type: text
    content: ' tender mercy;'
  - type: text
    content: At Your holy temple I will bow [obediently] in reverence for You.
  '8':
  - type: text
    content: ¶O L
  - type: heading
    content: ord
  - type: text
    content: ', lead me in Your righteousness because of my enemies;'
  - type: text
    content: Make Your way straight (direct, right) before me.
  '9':
  - type: text
    content: 'For there is nothing trustworthy '
  - type: text
    content: or
  - type: text
    content: ' reliable '
  - type: text
    content: or
  - type: text
    content: ' truthful in what they say;'
  - type: text
    content: Their heart is destruction [just a treacherous chasm, a yawning gulf of lies].
  - type: text
    content: Their throat is an open grave;
  - type: text
    content: They [glibly] flatter with their [silken] tongue. [Rom 3:13]
