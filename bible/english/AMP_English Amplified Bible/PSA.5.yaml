document_id: PSA.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 5
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Protection from the Wicked.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; on wind instruments. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to my words, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Consider my groaning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sighing.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hold them guilty, O God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them fall by their own designs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' councils!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cast them out because of the abundance of their transgressions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For they are mutinous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have rebelled against You.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶But let all who take refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put their trust in You rejoice,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them ever sing for joy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because You cover '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shelter them,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let those who love Your name be joyful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exult in You.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', bless the righteous man [the one who is in right standing with You];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You surround him with favor as with a shield.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heed the sound of my cry for help, my King and my God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For to You I pray.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the morning, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', You will hear my voice;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the morning I will prepare [a prayer and a sacrifice] for You and watch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait [for You to speak to my heart].'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶For You are not a God who takes pleasure in wickedness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No evil [person] dwells with You.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The boastful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the arrogant will not stand in Your sight;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You hate all who do evil.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You destroy those who tell lies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' detests '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejects the bloodthirsty and deceitful man.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But as for me, I will enter Your house through the abundance of Your steadfast love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tender mercy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At Your holy temple I will bow [obediently] in reverence for You.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', lead me in Your righteousness because of my enemies;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make Your way straight (direct, right) before me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For there is nothing trustworthy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reliable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' truthful in what they say;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their heart is destruction [just a treacherous chasm, a yawning gulf of lies].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their throat is an open grave;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They [glibly] flatter with their [silken] tongue. [Rom 3:13]
