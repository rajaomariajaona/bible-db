document_id: 2CH.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Ark Is Brought into the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Thus all the work that Solomon did for the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was finished. He brought in the things that his father David had dedicated, and he put the silver and the gold and all the utensils in the treasuries of the house of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Solomon assembled the elders of Israel and all the heads of the tribes, the leaders of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' of the Israelites, in Jerusalem to bring the ark of the covenant of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' up from the City of David, which is Zion. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All the men of Israel gathered before the king at the feast in the seventh month. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And all the elders of Israel came, and the Levites took up the ark. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The Levitical priests brought up the ark, the Tent of Meeting, and all the holy utensils that were in the Tent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And King Solomon and all the assembly of Israel who gathered together with him before the ark were sacrificing so many sheep and oxen that they could not be counted or numbered. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then the priests brought the ark of the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to its place, to the inner sanctuary of the house, into the Holy of Holies, under the wings of the cherubim; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'for the cherubim spread out their wings over the place of the ark, making a covering above the ark and its carrying poles. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The poles were so long that the ends of the poles of the ark were visible from the front of the Holy of Holies (inner sanctuary), but were not visible from the outside. They are there to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'There was nothing in the ark except '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Apparently the jar of manna (Ex 16:32-34) and Aaron’s staff (Num 17:10, 11) had been lost.
    marker-yv: yv-n
  - type: text
    text: the two tablets [of the Ten Commandments] which Moses put there at Mount Horeb, when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' made a covenant with the Israelites, when they came out of Egypt. [Ex 31:18]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Glory of God Fills the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When the priests came out of the Holy Place (for all the priests who were present had sanctified themselves [separating themselves from everything unclean], without regard to their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. assigned groups.
    marker-yv: yv-n
  - type: text
    text: 'assigned divisions), '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and all of the Levitical singers, Asaph, Heman, and Jeduthun, with their sons and relatives, clothed in fine linen, with cymbals, harps, and lyres were standing at the east end of the altar, and with them a hundred and twenty priests blowing trumpets '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: in unison when the trumpeters and singers were to make themselves heard with one voice praising and thanking the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and when they raised their voices accompanied by the trumpets and cymbals and [other] instruments of music, and when they praised the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' “For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He
  - type: text
    text: ' is good, for His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness endure forever,” then the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was filled with a cloud, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'so that the priests could not remain standing to minister because of the cloud; for the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' filled the house of God.'
