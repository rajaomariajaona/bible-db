type_code: eng
verses:
  '1':
  - type: heading
    content: Korah’s Rebellion
  - type: text
    content: 'Now Korah the son of Izhar, the son of Kohath, the son of Levi, with Dathan and Abiram the sons of Eliab, and On the son of Peleth, descendants of Reuben, took '
  - type: text
    content: action,
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'and that He has brought you near [to Him], '
  - type: text
    content: Korah
  - type: text
    content: ' and all your brothers, sons of Levi with you? Would you seek the priesthood also? '
  '11':
  - type: text
    content: Therefore you and all your company are gathered together against the L
  - type: heading
    content: ord
  - type: text
    content: ; but as for Aaron, who is he that you murmur against him?”
  '12':
  - type: text
    content: 'Then Moses sent to call Dathan and Abiram, the sons of Eliab; but they said [defiantly], “We will not come up. '
  '13':
  - type: text
    content: 'Is it a small thing that you have brought us up out of a land [of plenty] '
  - type: note
    content: This phrase referred to the abundant fertility of the land. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
  - type: text
    content: 'flowing with milk and honey to kill us in the wilderness, but you would also lord it over us? '
  '14':
  - type: text
    content: Indeed, you have not brought us into a land flowing with milk and honey, nor given us an inheritance of fields and vineyards. Will you gouge out the eyes of these men? We will not come up!”
  '15':
  - type: text
    content: Then Moses became very angry and said to the L
  - type: heading
    content: ord
  - type: text
    content: ', “Pay no attention to their offering! I have not taken one donkey from them, nor have I harmed any one of them.” '
  '16':
  - type: text
    content: Moses said to Korah, “You and all your company are to appear before the L
  - type: heading
    content: ord
  - type: text
    content: ' tomorrow, both you and they along with Aaron. '
  '17':
  - type: text
    content: Each of you take his censer and put incense on it, and each of you bring his censer before the L
  - type: heading
    content: ord
  - type: text
    content: ', two hundred and fifty censers; also you and Aaron '
  - type: text
    content: shall
  - type: text
    content: ' each '
  - type: text
    content: bring
  - type: text
    content: ' his censer.” '
  '18':
  - type: text
    content: 'So they each took his own censer and put fire on it and laid incense on it; and they stood at the doorway of the Tent of Meeting (tabernacle), with Moses and Aaron. '
  '19':
  - type: text
    content: 'Then Korah assembled all the congregation against Moses and Aaron at the doorway of the Tent of Meeting (tabernacle). And the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' appeared to all the congregation.'
  '2':
  - type: text
    content: 'and they rose up [in rebellion] before Moses, together with some of the Israelites, two hundred and fifty leaders of the congregation chosen in the assembly, men of distinction. '
  '20':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '21':
  - type: text
    content: '“Separate yourselves from among this congregation, so that I may consume them immediately.” '
  '22':
  - type: text
    content: But they fell on their faces [before the L
  - type: heading
    content: ord
  - type: text
    content: '], and said, “O God, God of the spirits of all flesh! When one man sins, will You be angry with the entire congregation?”'
  '23':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '24':
  - type: text
    content: “Say to the congregation, ‘Get away from around the tents of Korah, Dathan, and Abiram.’ ”
  '25':
  - type: text
    content: 'Then Moses arose and went to Dathan and Abiram, and the elders of Israel followed him. '
  '26':
  - type: text
    content: 'And he said to the congregation, “Get away from the tents of these wicked men, and touch nothing of theirs, or you will be swept away in all their sin.” '
  '27':
  - type: text
    content: 'So they got back from around the tents of Korah, Dathan, and Abiram; and Dathan and Abiram came out and stood at the doorway of their tents with their wives and their sons and their little children. '
  '28':
  - type: text
    content: Then Moses said, “By this you shall know that the L
  - type: heading
    content: ord
  - type: text
    content: ' has sent me to do all these works; for I do not act of my own accord. '
  '29':
  - type: text
    content: If these men die the common death of all mankind or if what happens to everyone happens to them, then [you will know for sure that] the L
  - type: heading
    content: ord
  - type: text
    content: ' has not sent me. '
  '3':
  - type: text
    content: They assembled together against Moses and Aaron, and said to them, “You have gone far enough, for all the congregation are holy, every one of them, and the L
  - type: heading
    content: ord
  - type: text
    content: ' is among them. Why then do you exalt yourselves above the assembly of the L'
  - type: heading
    content: ord
  - type: text
    content: ?”
  '30':
  - type: text
    content: But if the L
  - type: heading
    content: ord
  - type: text
    content: ' creates an entirely new thing, and the ground opens its mouth and swallows them up, along with all that belongs to them, and they descend alive into Sheol (the nether world, the place of the dead), then you will understand that these men have spurned '
  - type: text
    content: and
  - type: text
    content: ' rejected the L'
  - type: heading
    content: ord
  - type: text
    content: '!”'
  '31':
  - type: text
    content: 'As soon as Moses finished speaking all these words, the ground under them split open; '
  '32':
  - type: text
    content: 'and the earth opened its mouth and swallowed them and their households, and all the men who supported Korah, with all their possessions. [Num 26:10, 11] '
  '33':
  - type: text
    content: 'So they and all that belonged to them went down alive to Sheol; and the earth closed over them, and they perished from among the assembly. '
  '34':
  - type: text
    content: 'All Israel who were around them fled at their outcry, for they said, “The earth may swallow us '
  - type: text
    content: also
  - type: text
    content: '.” '
  '35':
  - type: text
    content: Fire also came forth from the L
  - type: heading
    content: ord
  - type: text
    content: ' and consumed the two hundred and fifty men who were offering the incense.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Ch 17 of the Hebrew text begins here.
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '37':
  - type: text
    content: '“Tell Eleazar the son of Aaron, the priest, that he is to pick up the censers from the midst of the blaze for they are holy; and you scatter the burning coals abroad. '
  '38':
  - type: text
    content: As for the censers of these people who have sinned at the cost of their lives, have the censers made into hammered sheets as a plating for the altar [of burnt offering], for they were presented before the L
  - type: heading
    content: ord
  - type: text
    content: ' and they are sacred. They shall be a [warning] sign to the sons of Israel.” '
  '39':
  - type: text
    content: 'So Eleazar the priest took the bronze censers which the Levites who were burned had offered, and they were hammered out [into broad sheets] as a plating for the [bronze] altar [of burnt offering], '
  '4':
  - type: text
    content: 'And when Moses heard this, he fell face downward; '
  '40':
  - type: text
    content: as a reminder to the sons of Israel so that no layman—that is, one who is not of the descendants of Aaron should approach to offer incense before the L
  - type: heading
    content: ord
  - type: text
    content: ; so that he will not become like Korah and as his company—just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had said to him through Moses.'
  - type: heading
    content: Murmuring and Plague
  '41':
  - type: text
    content: But on the next day the entire congregation of the Israelites murmured against Moses and Aaron, saying, “You have caused the death of the people of the L
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '42':
  - type: text
    content: 'When the congregation was assembled against Moses and Aaron, they turned '
  - type: text
    content: and
  - type: text
    content: ' looked at the Tent of Meeting (tabernacle), and behold, the cloud covered it and the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' appeared. '
  '43':
  - type: text
    content: 'Then Moses and Aaron came to the front of the Tent of Meeting (tabernacle), '
  '44':
  - type: text
    content: and the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses saying, '
  '45':
  - type: text
    content: “Get away from among this congregation, so that I may consume them immediately.” Then Moses and Aaron fell on their faces [in silence before the L
  - type: heading
    content: ord
  - type: text
    content: ']. '
  '46':
  - type: text
    content: Moses said to Aaron, “Take a censer and put fire in it from the altar and lay incense on it; then bring it quickly to the congregation and make atonement for them, for wrath has gone forth from the L
  - type: heading
    content: ord
  - type: text
    content: '; the plague has begun!” '
  '47':
  - type: text
    content: 'So Aaron took the burning censer as Moses commanded, and ran into the midst of the assembly; and behold, the plague had [already] begun among the people; and he put on the incense and made atonement for the people. '
  '48':
  - type: text
    content: 'He stood between the dead and the living, so that the plague was brought to an end. '
  '49':
  - type: text
    content: 'But those who died in the plague were 14,700, besides those who died because of Korah. '
  '5':
  - type: text
    content: and he spoke to Korah and all his company, saying, “In the morning the L
  - type: heading
    content: ord
  - type: text
    content: ' will show who belongs to Him, and who is holy, and will bring him near to Himself; the one whom He will choose He will bring near to Himself. [2 Tim 2:19] '
  '50':
  - type: text
    content: Then Aaron returned to Moses at the doorway of the Tent of Meeting (tabernacle), for the plague had been brought to an end.
  '6':
  - type: text
    content: 'Do this: Take censers for yourselves, Korah and all your company, '
  '7':
  - type: text
    content: then put fire in them and place incense on them in the presence of the L
  - type: heading
    content: ord
  - type: text
    content: ' tomorrow; and the man whom the L'
  - type: heading
    content: ord
  - type: text
    content: ' chooses shall be the one who is holy. You have gone far enough, you sons of Levi.”'
  '8':
  - type: text
    content: 'Then Moses said to Korah, “Hear now, you sons of Levi, '
  '9':
  - type: text
    content: does it seem but a small thing to you that the God of Israel has separated you from the congregation of Israel, to bring you near to Himself, to do the service of the tabernacle of the L
  - type: heading
    content: ord
  - type: text
    content: ', and to stand before the congregation to minister to them; '
