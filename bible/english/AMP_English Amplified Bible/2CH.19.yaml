document_id: 2CH.19,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehu Rebukes Jehoshaphat
  - type: text
    content: 'Jehoshaphat the king of Judah returned safely to his house (palace) in Jerusalem. '
  '10':
  - type: text
    content: Whenever any dispute comes to you from your brothers (relatives) who live in their cities, between blood and blood, between law and commandment, or between statutes and judgments, you are to warn [and instruct] them so that they may not be guilty before the L
  - type: heading
    content: ord
  - type: text
    content: '; otherwise [God’s] wrath will come on you and your brothers. Do this and you will not be guilty. '
  '11':
  - type: text
    content: Behold, Amariah the chief priest will be over you in all matters of the L
  - type: heading
    content: ord
  - type: text
    content: ', and Zebadiah the son of Ishmael, the governor of the house of Judah, in all the king’s matters; and the Levites will serve you as officers. Deal courageously, and may the L'
  - type: heading
    content: ord
  - type: text
    content: ' be with the upright.”'
  '2':
  - type: text
    content: Jehu the son of Hanani the seer went out to meet him and said to King Jehoshaphat, “Should you help the ungodly and love those who hate the L
  - type: heading
    content: ord
  - type: text
    content: ' and in doing so '
  - type: text
    content: bring
  - type: text
    content: ' wrath from the L'
  - type: heading
    content: ord
  - type: text
    content: ' on yourself? '
  '3':
  - type: text
    content: 'But there are '
  - type: text
    content: some
  - type: text
    content: ' good things found in you, for you have removed the Asherim (idols) from the land and you have set your heart to seek God [with all your soul’s desire].”'
  '4':
  - type: text
    content: So Jehoshaphat lived in Jerusalem, and he went out again among the people from Beersheba to the hill country of Ephraim and brought them back to the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of their fathers.'
  - type: heading
    content: Reforms Instituted
  '5':
  - type: text
    content: 'He appointed judges in the land in all the fortified cities of Judah, city by city, '
  '6':
  - type: text
    content: and he said to the judges, “Be careful what you do, for you do not judge for man, but for the L
  - type: heading
    content: ord
  - type: text
    content: ' who is with you in the matter of judgment. '
  '7':
  - type: text
    content: So now let the fear (reverent awe) of the L
  - type: heading
    content: ord
  - type: text
    content: ' be on you [to keep you from making unjust decisions]; be careful in what you do, for there is no injustice with the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God, or partiality, or acceptance of a bribe.”'
  '8':
  - type: text
    content: 'In Jerusalem also Jehoshaphat appointed some of the Levites, priests, and heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of Israel to '
  - type: text
    content: render
  - type: text
    content: ' the judgment of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and to judge disputes among the inhabitants of Jerusalem. '
  '9':
  - type: text
    content: Then the king commanded them, “Do this in the fear of the L
  - type: heading
    content: ord
  - type: text
    content: ', faithfully and wholeheartedly. '
