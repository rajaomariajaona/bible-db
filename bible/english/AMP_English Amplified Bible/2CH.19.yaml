document_id: 2CH.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehu Rebukes Jehoshaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jehoshaphat the king of Judah returned safely to his house (palace) in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jehu the son of Hanani the seer went out to meet him and said to King Jehoshaphat, “Should you help the ungodly and love those who hate the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and in doing so '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bring
  - type: text
    text: ' wrath from the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' on yourself? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But there are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' good things found in you, for you have removed the Asherim (idols) from the land and you have set your heart to seek God [with all your soul’s desire].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So Jehoshaphat lived in Jerusalem, and he went out again among the people from Beersheba to the hill country of Ephraim and brought them back to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of their fathers.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Reforms Instituted
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He appointed judges in the land in all the fortified cities of Judah, city by city, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and he said to the judges, “Be careful what you do, for you do not judge for man, but for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who is with you in the matter of judgment. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So now let the fear (reverent awe) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' be on you [to keep you from making unjust decisions]; be careful in what you do, for there is no injustice with the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, or partiality, or acceptance of a bribe.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'In Jerusalem also Jehoshaphat appointed some of the Levites, priests, and heads of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' of Israel to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: render
  - type: text
    text: ' the judgment of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and to judge disputes among the inhabitants of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then the king commanded them, “Do this in the fear of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', faithfully and wholeheartedly. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Whenever any dispute comes to you from your brothers (relatives) who live in their cities, between blood and blood, between law and commandment, or between statutes and judgments, you are to warn [and instruct] them so that they may not be guilty before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; otherwise [God’s] wrath will come on you and your brothers. Do this and you will not be guilty. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Behold, Amariah the chief priest will be over you in all matters of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and Zebadiah the son of Ishmael, the governor of the house of Judah, in all the king’s matters; and the Levites will serve you as officers. Deal courageously, and may the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' be with the upright.”'
