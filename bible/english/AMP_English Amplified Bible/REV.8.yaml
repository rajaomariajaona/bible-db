document_id: REV.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Seventh Seal—the Trumpets
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He (the Lamb) broke open the seventh seal, there was silence in heaven for about half an hour [in awe of God’s impending judgment]. [Zeph 1:7] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The third angel sounded [his trumpet], and a great star fell from heaven, burning like a torch [flashing across the sky], and it fell on a third of the rivers and on the springs of [fresh] waters. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The name of the star is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: apsinthos,
        - type: text
          text: ' cf Eng “absinthe.” This is a plant from which a bitter oil is extracted that is highly toxic to the nervous system. The name “wormwood” comes from the fact that the oil was used medicinally to kill intestinal worms.'
      marker-yv: yv-n
    - type: text
      text: Wormwood; and a third of the waters became wormwood, and many people died from the waters, because they had become bitter (toxic).
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the fourth angel sounded [his trumpet], and a third of the sun and a third of the moon and a third of the stars were struck, so that a third of them would be darkened and a third of the daylight would not shine, and the night in the same way [would not shine]. [Ex 10:21-23]
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I looked, and I heard a solitary eagle flying in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word used here refers to the meridian or zenith, the highest point of the sun in the sky, where the sun is directly overhead.
      marker-yv: yv-n
    - type: text
      text: midheaven [for all to see], saying with a loud voice, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: During the first four trumpets, judgment fell on nature, but in the final three trumpet judgments (chs 9-11), unbelieving humanity will be directly punished through torment, death, and at last total destruction.
      marker-yv: yv-n
    - type: text
      text: Woe, woe, woe [great wrath is coming] to those who dwell on the earth, because of the remaining blasts of the trumpets which the three angels are about to sound [announcing ever greater judgments]!”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw the seven angels who stand before God, and seven '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Old Testament, trumpets announced God’s commands to congregate, move camp, and prepare for war (Num 10:1-9). Trumpets were also used to announce celebrations (Num 10:10; 29:1), royal coronations (1 Kin 1:34, 39; 2 Kin 9:13), and God’s impending wrath (Josh 6:1-8; Zeph 1:14-16). Angels will blow trumpets during the judgment and resurrection (Matt 24:31; 1 Cor 15:52; 1 Thess 4:16).
      marker-yv: yv-n
    - type: text
      text: trumpets were given to them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Another angel came and stood at the altar. He had a golden '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a special container for burning incense.
      marker-yv: yv-n
    - type: text
      text: 'censer, and much '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. fragrant spices which exude perfume when burned.
      marker-yv: yv-n
    - type: text
      text: 'incense was given to him, so that he might add it to the prayers of all the saints (God’s people) on the golden altar in front of the throne. [Ps 141:2] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the smoke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fragrant aroma of the incense, with the prayers of the saints (God’s people), ascended before God from the angel’s hand. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the angel took the censer and filled it with fire from the altar, and hurled it to the earth; and there were peals of thunder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loud rumblings and sounds and flashes of lightning and an earthquake. [Lev 16:12; Ezek 10:2]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the seven angels who had the seven trumpets prepared themselves to sound them [initiating the judgments].
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The first [angel] sounded [his trumpet], and there was [a storm of] hail and fire, mixed with blood, and it was hurled to the earth; and a third of the earth was burned up, and a third of the trees were burned up, and all the green grass was burned up. [Ex 9:13-35]
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The second angel sounded [his trumpet], and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' like a great mountain blazing with fire was hurled into the sea; and a third of the sea was turned to blood; [Jer 51:25] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and a third of the living creatures that were in the sea died, and a third of the ships were destroyed.
