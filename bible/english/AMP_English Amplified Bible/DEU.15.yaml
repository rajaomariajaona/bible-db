document_id: DEU.15,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sabbatical Year
  - type: text
    content: '“At the end of every seven years you shall grant a release (remission, pardon) '
  - type: text
    content: from debt.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'You shall freely '
  - type: text
    content: and
  - type: text
    content: ' generously give to him, and your heart shall not be resentful when you give to him, because for this [generous] thing the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God will bless you in all your work and in all your undertakings. '
  '11':
  - type: text
    content: For the poor will never cease to be in the land; therefore I command you, saying, ‘You shall freely open your hand to your brother, to your needy, and to your poor in your land.’
  '12':
  - type: text
    content: '“If your fellow Israelite, a Hebrew man or woman, is sold to you, and serves you for six years, then in the seventh year you shall set him free [from your service]. '
  '13':
  - type: text
    content: 'When you set him free, you shall not let him go away empty-handed. '
  '14':
  - type: text
    content: You shall give him generous provisions from your flock, from your threshing floor and from your wine press; you shall give to him as the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has blessed you. '
  '15':
  - type: text
    content: 'And you shall remember '
  - type: text
    content: and
  - type: text
    content: ' thoughtfully consider that you were [once] a slave in the land of Egypt, and the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God redeemed you; therefore, I am commanding you these things today. '
  '16':
  - type: text
    content: 'Now if the servant says to you, ‘I will not leave you,’ because he loves you and your household, since he is doing well with you; '
  '17':
  - type: text
    content: then take an awl and pierce it through his ear into the door, and he shall [willingly] be your servant always. Also you shall do the same for your maidservant. [Ex 21:6]
  '18':
  - type: text
    content: '“It shall not seem hard to you when you set him free, for he has served you six years '
  - type: text
    content: with
  - type: text
    content: ' double the service of a hired man; so the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God will bless you in everything you do.'
  '19':
  - type: text
    content: “You shall consecrate (set apart) to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God all the firstborn males that are born of your herd and flock. You shall not work with the firstborn of your herd, nor shear the firstborn of your flock. '
  '2':
  - type: text
    content: 'This is the regulation for the release: every '
  - type: note
    content: Lit master of a loan.
  - type: text
    content: 'creditor shall forgive what he has loaned to his neighbor; he shall not '
  - type: note
    content: Lit collect.
  - type: text
    content: require repayment from his neighbor and his brother, because the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' release has been proclaimed. '
  '20':
  - type: text
    content: You and your household shall eat it every year before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God in the place [for worship] which the L'
  - type: heading
    content: ord
  - type: text
    content: ' chooses. '
  '21':
  - type: text
    content: 'But if it has any defect '
  - type: text
    content: or
  - type: text
    content: ' injury, '
  - type: text
    content: such as
  - type: text
    content: ' lameness or blindness, or any serious defect, you shall not sacrifice it to the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '22':
  - type: text
    content: 'You shall eat it within your [city] gates; the [ceremonially] unclean and the clean alike '
  - type: text
    content: may eat it
  - type: text
    content: ', as [if it were] a gazelle or a deer. '
  '23':
  - type: text
    content: Only you shall not eat its blood; you are to pour it out on the ground like water.
  '3':
  - type: text
    content: 'You may require repayment from a foreigner, but whatever of yours is with your brother [Israelite] your hand shall release. '
  '4':
  - type: text
    content: However, there will be no poor among you, since the L
  - type: heading
    content: ord
  - type: text
    content: ' will most certainly bless you in the land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you as an inheritance to possess, '
  '5':
  - type: text
    content: 'if only you will listen to '
  - type: text
    content: and
  - type: text
    content: ' obey the voice of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, to observe carefully all these commandments which I am commanding you today. '
  '6':
  - type: text
    content: When the L
  - type: heading
    content: ord
  - type: text
    content: ' your God blesses '
  - type: note
    content: Lit according to the word to you.
  - type: text
    content: you as He has promised you, then you will lend to many nations, but you will not borrow; and you will rule over many nations, but they will not rule over you.
  '7':
  - type: text
    content: '“If there is a poor man among you, one of your fellow Israelites, in '
  - type: note
    content: Lit one of your gates.
  - type: text
    content: any of your cities in the land that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you, you shall not '
  - type: note
    content: Lit harden your heart.
  - type: text
    content: 'be heartless, nor '
  - type: note
    content: Lit close your hand to.
  - type: text
    content: 'close-fisted with your poor brother; '
  '8':
  - type: text
    content: 'but you shall freely open your hand to him, and shall generously lend to him '
  - type: note
    content: Lit sufficient for his need.
  - type: text
    content: 'whatever he needs. '
  '9':
  - type: text
    content: Beware that there is no wicked thought in your heart, saying, ‘The seventh year, the year of release (remission, pardon), is approaching,’ and your eye is hostile (unsympathetic) toward your poor brother, and you give him nothing [since he would not have to repay you]; for he may cry out to the L
  - type: heading
    content: ord
  - type: text
    content: ' against you, and it will become a sin for you. '
