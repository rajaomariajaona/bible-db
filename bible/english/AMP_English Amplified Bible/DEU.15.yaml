document_id: DEU.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Sabbatical Year
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“At the end of every seven years you shall grant a release (remission, pardon) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from debt.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This is the regulation for the release: every '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: master of a loan
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'creditor shall forgive what he has loaned to his neighbor; he shall not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: collect
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: require repayment from his neighbor and his brother, because the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' release has been proclaimed. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You may require repayment from a foreigner, but whatever of yours is with your brother [Israelite] your hand shall release. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: However, there will be no poor among you, since the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will most certainly bless you in the land which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you as an inheritance to possess, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'if only you will listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey the voice of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, to observe carefully all these commandments which I am commanding you today. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God blesses '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: according to the word to you
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: you as He has promised you, then you will lend to many nations, but you will not borrow; and you will rule over many nations, but they will not rule over you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“If there is a poor man among you, one of your fellow Israelites, in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: one of your gates
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: any of your cities in the land that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you, you shall not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: harden your heart
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'be heartless, nor '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: close your hand to
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'close-fisted with your poor brother; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but you shall freely open your hand to him, and shall generously lend to him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sufficient for his need
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'whatever he needs. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Beware that there is no wicked thought in your heart, saying, ‘The seventh year, the year of release (remission, pardon), is approaching,’ and your eye is hostile (unsympathetic) toward your poor brother, and you give him nothing [since he would not have to repay you]; for he may cry out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' against you, and it will become a sin for you. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You shall freely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generously give to him, and your heart shall not be resentful when you give to him, because for this [generous] thing the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will bless you in all your work and in all your undertakings. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For the poor will never cease to be in the land; therefore I command you, saying, ‘You shall freely open your hand to your brother, to your needy, and to your poor in your land.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“If your fellow Israelite, a Hebrew man or woman, is sold to you, and serves you for six years, then in the seventh year you shall set him free [from your service]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When you set him free, you shall not let him go away empty-handed. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You shall give him generous provisions from your flock, from your threshing floor and from your wine press; you shall give to him as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has blessed you. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And you shall remember '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoughtfully consider that you were [once] a slave in the land of Egypt, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God redeemed you; therefore, I am commanding you these things today. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now if the servant says to you, ‘I will not leave you,’ because he loves you and your household, since he is doing well with you; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: then take an awl and pierce it through his ear into the door, and he shall [willingly] be your servant always. Also you shall do the same for your maidservant. [Ex 21:6]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“It shall not seem hard to you when you set him free, for he has served you six years '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' double the service of a hired man; so the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will bless you in everything you do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “You shall consecrate (set apart) to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God all the firstborn males that are born of your herd and flock. You shall not work with the firstborn of your herd, nor shear the firstborn of your flock. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You and your household shall eat it every year before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God in the place [for worship] which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' chooses. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But if it has any defect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' injury, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: such as
  - type: text
    text: ' lameness or blindness, or any serious defect, you shall not sacrifice it to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You shall eat it within your [city] gates; the [ceremonially] unclean and the clean alike '
  - type: usfm
    marker: it
    children:
    - type: text
      text: may eat it
  - type: text
    text: ', as [if it were] a gazelle or a deer. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Only you shall not eat its blood; you are to pour it out on the ground like water.
