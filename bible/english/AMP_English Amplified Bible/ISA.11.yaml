type_code: eng
verses:
  '1':
  - type: heading
    content: Righteous Reign of the Branch
  - type: text
    content: Then a Shoot (the Messiah) will spring from the stock of Jesse [David’s father],
  - type: text
    content: And a Branch from his roots will bear fruit. [Is 4:2; Matt 2:23; Rev 5:5; 22:16]
  '10':
  - type: text
    content: ¶Then in that day
  - type: text
    content: The nations will make supplications to the Root of Jesse
  - type: text
    content: Who will stand as a signal for the peoples;
  - type: text
    content: And His resting place will be glorious. [John 12:32]
  - type: heading
    content: The Restored Remnant
  '11':
  - type: text
    content: ¶Then it will happen on that day that the Lord
  - type: text
    content: Will again acquire with His hand a second time
  - type: text
    content: The remnant of His people, who will remain,
  - type: text
    content: From Assyria, from [Lower] Egypt, from Pathros, from Cush (Ethiopia), from Elam [in Persia], from Shinar [Babylonia], from Hamath [in Aram],
  - type: text
    content: 'And from the coastlands '
  - type: text
    content: bordering
  - type: text
    content: ' the [Mediterranean] Sea. [Jer 23:5-8]'
  '12':
  - type: text
    content: And He will lift up a signal for the nations
  - type: text
    content: 'And assemble the '
  - type: note
    content: Lit scattered.
  - type: text
    content: outcasts of Israel,
  - type: text
    content: And will gather the dispersed of Judah
  - type: text
    content: From the four corners of the earth.
  '13':
  - type: text
    content: 'Then the jealousy of '
  - type: note
    content: A reference to the ten northern tribes. Israel split into two kingdoms after Rehoboam the son of Solomon became king. Jeroboam ruled from the city of Shechem in the north, and Rehoboam ruled from the city of Jerusalem in the south (1 Kin 12:1-20).
  - type: text
    content: Ephraim will depart,
  - type: text
    content: 'And those who harass '
  - type: note
    content: A reference to the two southern tribes.
  - type: text
    content: Judah will be cut off;
  - type: text
    content: Ephraim will not be jealous of Judah,
  - type: text
    content: And Judah will not harass Ephraim.
  '14':
  - type: text
    content: Ephraim and Judah will [unite and] swoop down on the slopes of the Philistines toward the west;
  - type: text
    content: Together they will plunder the sons (Arabs) of the east.
  - type: text
    content: They will possess Edom and Moab,
  - type: text
    content: And the sons of Ammon will be subject to them.
  '15':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' will utterly destroy'
  - type: text
    content: 'The tongue of the '
  - type: note
    content: The western fork of the Red Sea.
  - type: text
    content: Sea of Egypt;
  - type: text
    content: And with His scorching wind
  - type: text
    content: He will wave His hand over the River;
  - type: text
    content: 'He will strike '
  - type: text
    content: and
  - type: text
    content: ' divide it into seven channels'
  - type: text
    content: And make [it possible for] people [to] walk over in sandals.
  '16':
  - type: text
    content: And there will be a highway from Assyria
  - type: text
    content: For the remnant of His people who will be left,
  - type: text
    content: Just as there was for Israel
  - type: text
    content: In the day when they came up out of the land of Egypt.
  '2':
  - type: text
    content: And the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' will rest on Him—'
  - type: text
    content: The Spirit of wisdom and understanding,
  - type: text
    content: The Spirit of counsel and strength,
  - type: text
    content: The Spirit of knowledge and of the [reverential and obedient] fear of the L
  - type: heading
    content: ord
  - type: text
    content: —
  '3':
  - type: text
    content: And He will delight in the fear of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And He will not judge by what His eyes see,
  - type: text
    content: Nor make decisions by what His ears hear;
  '4':
  - type: text
    content: 'But with righteousness '
  - type: text
    content: and
  - type: text
    content: ' justice He will judge the poor,'
  - type: text
    content: And decide with fairness for the downtrodden of the earth;
  - type: text
    content: And He shall strike the earth with the rod of His mouth,
  - type: text
    content: And with the breath of His lips He shall slay the wicked.
  '5':
  - type: text
    content: And righteousness will be the belt around His loins,
  - type: text
    content: And faithfulness the belt around His waist.
  '6':
  - type: text
    content: ¶And the wolf will dwell with the lamb,
  - type: text
    content: And the leopard will lie down with the young goat,
  - type: text
    content: And the calf and the young lion and the fatted steer together;
  - type: text
    content: And a little child will lead them.
  '7':
  - type: text
    content: And the cow and the bear will graze [together],
  - type: text
    content: Their young will lie down together,
  - type: text
    content: And the lion shall eat straw like the ox.
  '8':
  - type: text
    content: And the nursing child will [safely] play over the hole of the cobra,
  - type: text
    content: And the weaned child will put his hand on the viper’s den [and not be hurt].
  '9':
  - type: text
    content: They will not hurt or destroy in all My holy mountain,
  - type: text
    content: For the earth will be full of the knowledge of the L
  - type: heading
    content: ord
  - type: text
    content: As the waters cover the sea.
