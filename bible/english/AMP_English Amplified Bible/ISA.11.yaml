document_id: ISA.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Righteous Reign of the Branch
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then a Shoot (the Messiah) will spring from the stock of Jesse [David’s father],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a Branch from his roots will bear fruit. [Is 4:2; Matt 2:23; Rev 5:5; 22:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And the Spirit of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will rest on Him—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Spirit of wisdom and understanding,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Spirit of counsel and strength,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Spirit of knowledge and of the [reverential and obedient] fear of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And He will delight in the fear of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will not judge by what His eyes see,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor make decisions by what His ears hear;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But with righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice He will judge the poor,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And decide with fairness for the downtrodden of the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He shall strike the earth with the rod of His mouth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with the breath of His lips He shall slay the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And righteousness will be the belt around His loins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And faithfulness the belt around His waist.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶And the wolf will dwell with the lamb,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the leopard will lie down with the young goat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the calf and the young lion and the fatted steer together;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a little child will lead them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And the cow and the bear will graze [together],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their young will lie down together,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the lion shall eat straw like the ox.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And the nursing child will [safely] play over the hole of the cobra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the weaned child will put his hand on the viper’s den [and not be hurt].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They will not hurt or destroy in all My holy mountain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the earth will be full of the knowledge of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the waters cover the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶Then in that day
- type: usfm
  marker: q1
  children:
  - type: text
    text: The nations will make supplications to the Root of Jesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who will stand as a signal for the peoples;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His resting place will be glorious. [John 12:32]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Restored Remnant
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶Then it will happen on that day that the Lord
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will again acquire with His hand a second time
- type: usfm
  marker: q1
  children:
  - type: text
    text: The remnant of His people, who will remain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From Assyria, from [Lower] Egypt, from Pathros, from Cush (Ethiopia), from Elam [in Persia], from Shinar [Babylonia], from Hamath [in Aram],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And from the coastlands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bordering
  - type: text
    text: ' the [Mediterranean] Sea. [Jer 23:5-8]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And He will lift up a signal for the nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And assemble the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: scattered
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: outcasts of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will gather the dispersed of Judah
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the four corners of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the jealousy of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A reference to the ten northern tribes. Israel split into two kingdoms after Rehoboam the son of Solomon became king. Jeroboam ruled from the city of Shechem in the north, and Rehoboam ruled from the city of Jerusalem in the south (1 Kin 12:1-20).
    marker-yv: yv-n
  - type: text
    text: Ephraim will depart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And those who harass '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A reference to the two southern tribes.
    marker-yv: yv-n
  - type: text
    text: Judah will be cut off;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim will not be jealous of Judah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Judah will not harass Ephraim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ephraim and Judah will [unite and] swoop down on the slopes of the Philistines toward the west;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Together they will plunder the sons (Arabs) of the east.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will possess Edom and Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the sons of Ammon will be subject to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will utterly destroy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The tongue of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The western fork of the Red Sea.
    marker-yv: yv-n
  - type: text
    text: Sea of Egypt;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with His scorching wind
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will wave His hand over the River;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He will strike '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' divide it into seven channels'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And make [it possible for] people [to] walk over in sandals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And there will be a highway from Assyria
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the remnant of His people who will be left,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just as there was for Israel
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the day when they came up out of the land of Egypt.
