    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joshua, the High Priest
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the guiding angel showed me Joshua the high priest [representing disobedient, sinful Israel] standing before the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see note Gen 16:7).
      marker-yv: yv-n
    - type: text
      text: Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and Satan standing at Joshua’s right hand to be his adversary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to accuse him. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In that day,’ declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘every one of you will invite his neighbor to sit under his vine and his fig tree [enjoying peace and prosperity in the kingdom].’ ” [Mic 4:1-4]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Satan, “The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rebuke you, Satan! Even the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who [now and ever] has chosen Jerusalem, rebuke you! Is this not a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The log represents the returned Jews who had nearly been consumed by the “fire” of the Babylonian captivity.
      marker-yv: yv-n
    - type: text
      text: 'log snatched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rescued from the fire?” [Jude 9] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joshua was clothed with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Symbolic of Judah’s (the Southern Kingdom) disgusting sins.
      marker-yv: yv-n
    - type: text
      text: filthy (nauseatingly vile) garments and was standing before the Angel [of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ']. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He spoke to those who stood before Him, saying, “Remove the filthy garments from him.” And He said to Joshua, “See, I have caused your wickedness to be taken away from you, and I will clothe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beautify you with rich robes [of forgiveness].” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I (Zechariah) said, “Let them put a clean turban on his head.” So they put a clean turban on his head and clothed him with [rich] garments. And the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' stood by.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [solemnly and earnestly] admonished Joshua, saying, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘If you will walk in My ways [that is, remain faithful] and perform My service, then you will also govern My house and have charge of My courts, and I will give you free access [to My presence] among these who are standing here.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Branch
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now listen, Joshua, the high priest, you and your colleagues who are sitting in front of you—indeed they are men who are a symbol [of what is to come]—for behold, I am going to bring in My servant the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Messianic title.
      marker-yv: yv-n
    - type: text
      text: 'Branch [in Messianic glory]. [Is 4:2; Jer 23:5; 33:15; Zech 6:12] '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For behold, the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably typifying the Messiah.
      marker-yv: yv-n
    - type: text
      text: stone which I have set before Joshua; on that one stone are seven eyes (symbolizing infinite intelligence, omniscience). Behold, I will engrave an inscription on it,’ declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘and I will remove the wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt of this land in a single day. [2 Chr 16:9; Jer 50:20; Zech 4:10] '
