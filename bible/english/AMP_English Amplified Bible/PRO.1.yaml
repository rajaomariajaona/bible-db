verses:
  '1':
  - type: heading
    content: The Usefulness of Proverbs
  - type: text
    content: 'The proverbs (truths obscurely expressed, maxims) of Solomon son of David, king of Israel:'
  '10':
  - type: text
    content: My son, if sinners entice you,
  - type: text
    content: Do not consent. [Ps 1:1; Eph 5:11]
  '11':
  - type: text
    content: If they say, “Come with us;
  - type: text
    content: 'Let us lie in wait to '
  - type: text
    content: shed
  - type: text
    content: ' blood,'
  - type: text
    content: Let us ambush the innocent without cause;
  '12':
  - type: text
    content: Let us swallow them alive like Sheol (the place of the dead),
  - type: text
    content: Even whole, as those who go down to the pit [of death];
  '13':
  - type: text
    content: 'We will find '
  - type: text
    content: and
  - type: text
    content: ' take all kinds of precious possessions,'
  - type: text
    content: We will fill our houses with spoil;
  '14':
  - type: text
    content: Throw in your lot with us [they insist];
  - type: text
    content: We will all have one money bag [in common],”
  '15':
  - type: text
    content: My son, do not walk on the road with them;
  - type: text
    content: Keep your foot [far] away from their path,
  '16':
  - type: text
    content: For their feet run to evil,
  - type: text
    content: And they hurry to shed blood.
  '17':
  - type: text
    content: 'Indeed, it is useless to spread the '
  - type: text
    content: baited
  - type: text
    content: ' net'
  - type: text
    content: In the sight of any bird;
  '18':
  - type: text
    content: But [when these people set a trap for others] they lie in wait for their own blood;
  - type: text
    content: They set an ambush for their own lives [and rush to their destruction].
  '19':
  - type: text
    content: So are the ways of everyone who is greedy for gain;
  - type: text
    content: Greed takes away the lives of its possessors. [Prov 15:27; 1 Tim 6:10]
  - type: heading
    content: Wisdom Warns
  '2':
  - type: text
    content: To know [skillful and godly] wisdom and instruction;
  - type: text
    content: 'To discern '
  - type: text
    content: and
  - type: text
    content: ' comprehend the words of understanding '
  - type: text
    content: and
  - type: text
    content: ' insight,'
  '20':
  - type: text
    content: ¶
  - type: note
    content: Wisdom is personified as a woman in vv 20-33 and speaks, in the first person, of godly wisdom. Read the word “wisdom” as “the wisdom of God” and see the wonderful power of this book.
  - type: text
    content: Wisdom shouts in the street,
  - type: text
    content: She raises her voice in the markets;
  '21':
  - type: text
    content: She calls out at the head of the noisy streets [where large crowds gather];
  - type: text
    content: 'At the entrance of the city gates she speaks her words:'
  '22':
  - type: text
    content: '“How long, O naive ones [you who are easily misled], will you love being simple-minded '
  - type: text
    content: and
  - type: text
    content: ' undiscerning?'
  - type: text
    content: How long
  - type: text
    content: ' will scoffers [who ridicule and deride] delight in scoffing,'
  - type: text
    content: How long
  - type: text
    content: ' will fools [who obstinately mock truth] hate knowledge?'
  '23':
  - type: text
    content: '“If you will turn '
  - type: text
    content: and
  - type: text
    content: ' pay attention to my rebuke,'
  - type: text
    content: Behold, I [Wisdom] will pour out my spirit on you;
  - type: text
    content: I will make my words known to you. [Is 11:2; Eph 1:17-20]
  '24':
  - type: text
    content: “Because I called and you refused [to answer],
  - type: text
    content: I stretched out my hand and no one has paid attention [to my offer]; [Is 65:11, 12; 66:4; Jer 7:13, 14; Zech 7:11-13]
  '25':
  - type: text
    content: And you treated all my counsel as nothing
  - type: text
    content: And would not accept my reprimand,
  '26':
  - type: text
    content: I also will laugh at your disaster;
  - type: text
    content: 'I will mock when your dread '
  - type: text
    content: and
  - type: text
    content: ' panic come,'
  '27':
  - type: text
    content: 'When your dread '
  - type: text
    content: and
  - type: text
    content: ' panic come like a storm,'
  - type: text
    content: And your disaster comes like a whirlwind,
  - type: text
    content: When anxiety and distress come upon you [as retribution].
  '28':
  - type: text
    content: “Then they will call upon me (Wisdom), but I will not answer;
  - type: text
    content: They will seek me eagerly but they will not find me, [Job 27:9; 35:12, 13; Is 1:15, 16; Jer 11:11; Mic 3:4; James 4:3]
  '29':
  - type: text
    content: Because they hated knowledge
  - type: text
    content: And did not choose the fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' [that is, obeying Him with reverence and awe-filled respect], [Prov 8:13]'
  '3':
  - type: text
    content: 'To receive instruction in wise behavior '
  - type: text
    content: and
  - type: text
    content: ' the discipline of wise thoughtfulness,'
  - type: text
    content: Righteousness, justice, and integrity;
  '30':
  - type: text
    content: They would not accept my counsel,
  - type: text
    content: And they spurned all my rebuke.
  '31':
  - type: text
    content: “Therefore they shall eat of the fruit of their own [wicked] way
  - type: text
    content: And be satiated with [the penalty of] their own devices.
  '32':
  - type: text
    content: '“For the turning away of the '
  - type: note
    content: Lit simple ones.
  - type: text
    content: naive will kill them,
  - type: text
    content: And the careless ease of [self-righteous] fools will destroy them. [Is 32:6]
  '33':
  - type: text
    content: '“But whoever listens to me (Wisdom) will live securely '
  - type: text
    content: and
  - type: text
    content: ' in confident trust'
  - type: text
    content: 'And will be at ease, without fear '
  - type: text
    content: or
  - type: text
    content: ' dread of evil.”'
  '4':
  - type: text
    content: 'That prudence (good judgment, astute common sense) may be given to the naive '
  - type: text
    content: or
  - type: text
    content: ' inexperienced [who are easily misled],'
  - type: text
    content: And knowledge and discretion (intelligent discernment) to the youth,
  '5':
  - type: text
    content: The wise will hear and increase their learning,
  - type: text
    content: 'And the person of understanding will acquire wise counsel '
  - type: text
    content: and
  - type: text
    content: ' the skill [to steer his course wisely and lead others to the truth], [Prov 9:9]'
  '6':
  - type: text
    content: 'To understand a proverb and a figure [of speech] '
  - type: text
    content: or
  - type: text
    content: ' an enigma with its interpretation,'
  - type: text
    content: And the words of the wise and their riddles [that require reflection].
  '7':
  - type: text
    content: ¶The [reverent] fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' [that is, worshiping Him and regarding Him as truly awesome] is the beginning '
  - type: text
    content: and
  - type: text
    content: ' the preeminent part of knowledge [its starting point and its essence];'
  - type: text
    content: But arrogant
  - type: text
    content: ' '
  - type: note
    content: In Proverbs various kinds of fools are discussed including those who are closed-minded, over-confident, and reject instruction and correction—the unteachable; those who lack spiritual insight—the spiritually blind; and those who are flippant, hardened, and who deliberately choose to reject God and wisdom—the arrogant.
  - type: text
    content: 'fools despise [skillful and godly] wisdom and instruction '
  - type: text
    content: and
  - type: text
    content: ' self-discipline. [Ps 111:10]'
  - type: heading
    content: The Enticement of Sinners
  '8':
  - type: text
    content: ¶My son, hear the instruction of your father,
  - type: text
    content: And do not reject the teaching of your mother.
  '9':
  - type: text
    content: For they are a garland of grace on your head,
  - type: text
    content: 'And chains '
  - type: text
    content: and
  - type: text
    content: ' ornaments [of gold] around your neck.'
