document_id: PRO.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Usefulness of Proverbs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The proverbs (truths obscurely expressed, maxims) of Solomon son of David, king of Israel:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My son, if sinners entice you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not consent. [Ps 1:1; Eph 5:11]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If they say, “Come with us;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let us lie in wait to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shed
    - type: text
      text: ' blood,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us ambush the innocent without cause;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Let us swallow them alive like Sheol (the place of the dead),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even whole, as those who go down to the pit [of death];
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'We will find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take all kinds of precious possessions,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will fill our houses with spoil;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Throw in your lot with us [they insist];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will all have one money bag [in common],”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: My son, do not walk on the road with them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep your foot [far] away from their path,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For their feet run to evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they hurry to shed blood.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Indeed, it is useless to spread the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: baited
    - type: text
      text: ' net'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the sight of any bird;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But [when these people set a trap for others] they lie in wait for their own blood;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They set an ambush for their own lives [and rush to their destruction].
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So are the ways of everyone who is greedy for gain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Greed takes away the lives of its possessors. [Prov 15:27; 1 Tim 6:10]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Wisdom Warns
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: To know [skillful and godly] wisdom and instruction;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To discern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehend the words of understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insight,'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ¶
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Wisdom is personified as a woman in vv 20-33 and speaks, in the first person, of godly wisdom. Read the word “wisdom” as “the wisdom of God” and see the wonderful power of this book.
      marker-yv: yv-n
    - type: text
      text: Wisdom shouts in the street,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She raises her voice in the markets;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: She calls out at the head of the noisy streets [where large crowds gather];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At the entrance of the city gates she speaks her words:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“How long, O naive ones [you who are easily misled], will you love being simple-minded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' undiscerning?'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: How long
    - type: text
      text: ' will scoffers [who ridicule and deride] delight in scoffing,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: How long
    - type: text
      text: ' will fools [who obstinately mock truth] hate knowledge?'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“If you will turn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay attention to my rebuke,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, I [Wisdom] will pour out my spirit on you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make my words known to you. [Is 11:2; Eph 1:17-20]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Because I called and you refused [to answer],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I stretched out my hand and no one has paid attention [to my offer]; [Is 65:11, 12; 66:4; Jer 7:13, 14; Zech 7:11-13]
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: And you treated all my counsel as nothing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And would not accept my reprimand,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I also will laugh at your disaster;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will mock when your dread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' panic come,'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'When your dread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' panic come like a storm,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your disaster comes like a whirlwind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When anxiety and distress come upon you [as retribution].
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “Then they will call upon me (Wisdom), but I will not answer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will seek me eagerly but they will not find me, [Job 27:9; 35:12, 13; Is 1:15, 16; Jer 11:11; Mic 3:4; James 4:3]
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Because they hated knowledge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And did not choose the fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [that is, obeying Him with reverence and awe-filled respect], [Prov 8:13]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'To receive instruction in wise behavior '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the discipline of wise thoughtfulness,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness, justice, and integrity;
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: They would not accept my counsel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they spurned all my rebuke.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “Therefore they shall eat of the fruit of their own [wicked] way
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And be satiated with [the penalty of] their own devices.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '“For the turning away of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: simple ones
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: naive will kill them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the careless ease of [self-righteous] fools will destroy them. [Is 32:6]
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '“But whoever listens to me (Wisdom) will live securely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in confident trust'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And will be at ease, without fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dread of evil.”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'That prudence (good judgment, astute common sense) may be given to the naive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' inexperienced [who are easily misled],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And knowledge and discretion (intelligent discernment) to the youth,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The wise will hear and increase their learning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the person of understanding will acquire wise counsel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the skill [to steer his course wisely and lead others to the truth], [Prov 9:9]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'To understand a proverb and a figure [of speech] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' an enigma with its interpretation,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the words of the wise and their riddles [that require reflection].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶The [reverent] fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [that is, worshiping Him and regarding Him as truly awesome] is the beginning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the preeminent part of knowledge [its starting point and its essence];'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But arrogant
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Proverbs various kinds of fools are discussed including those who are closed-minded, over-confident, and reject instruction and correction—the unteachable; those who lack spiritual insight—the spiritually blind; and those who are flippant, hardened, and who deliberately choose to reject God and wisdom—the arrogant.
      marker-yv: yv-n
    - type: text
      text: 'fools despise [skillful and godly] wisdom and instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-discipline. [Ps 111:10]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Enticement of Sinners
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶My son, hear the instruction of your father,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not reject the teaching of your mother.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For they are a garland of grace on your head,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And chains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ornaments [of gold] around your neck.'
