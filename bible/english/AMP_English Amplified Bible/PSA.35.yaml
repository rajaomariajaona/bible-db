document_id: PSA.35,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 35
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Rescue from Enemies.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Contend, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', with those who contend with me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fight against those who fight against me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: All my bones will say, “L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who is like You,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who rescues the afflicted from him who is too strong for him [to resist alone],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the afflicted and the needy from him who robs him?”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Malicious witnesses rise up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ask me of things that I do not know.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They repay me evil for good,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the sorrow of my soul.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But as for me, when they were sick, my clothing was sackcloth (mourning garment);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I humbled my soul with fasting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I prayed with my head bowed on my chest.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I behaved as if grieving for my friend or my brother;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I bowed down in mourning, as one who sorrows for his mother.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But in my stumbling they rejoiced and gathered together [against me];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The slanderers whom I did not know gathered against me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They slandered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reviled me without ceasing.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Like godless jesters at a feast,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They gnashed at me with their teeth [in malice].
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ¶L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', how long will You look on [without action]?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue my life from their destructions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My only '
    - type: usfm
      marker: it
      children:
      - type: text
        text: life
    - type: text
      text: ' from the young lions.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: I will give You thanks in the great congregation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will praise You among a mighty people.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Do not let those who are wrongfully my enemies rejoice over me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor let those who hate me without cause wink their eye [maliciously]. [John 15:24, 25]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Take hold of shield and buckler (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Jer 46:3.
      marker-yv: yv-n
    - type: text
      text: small shield),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And stand up for my help.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: For they do not speak peace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they devise deceitful words [half-truths and lies] against those who are quiet in the land.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: They open their mouths wide against me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They say, “Aha, aha, our eyes have seen it!”
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ¶You have seen this, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; do not keep silent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, do not be far from me.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Wake Yourself up, and arise to my right
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to my cause, my God and my Lord.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Judge me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God, according to Your righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not let them rejoice over me.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Do not let them say in their heart, “Aha, that is what we wanted!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not let them say, “We have swallowed him up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed him.”'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Let those be ashamed and humiliated together who rejoice at my distress;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let those be clothed with shame and dishonor who magnify themselves over me.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '¶Let them shout for joy and rejoice, who favor my vindication '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' want what is right for me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them say continually, “Let the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' be magnified, who delights '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' takes pleasure in the prosperity of His servant.”'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And my tongue shall declare Your righteousness (justice),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Your praise all the day long.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Draw also the spear and javelin to meet those who pursue me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say to my soul, “I am your salvation.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Let those be ashamed and dishonored who seek my life;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let those be turned back [in defeat] and humiliated who plot evil against me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Let them be [blown away] like chaff before the wind [worthless, without substance],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' driving them on.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Let their way be dark and slippery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' pursuing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' harassing them.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For without cause they hid their net for me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without cause they dug a pit [of destruction] for my life.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let destruction come upon my enemy by surprise;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the net he hid for me catch him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Into that very destruction let him fall.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ¶Then my soul shall rejoice in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It shall rejoice in His salvation.
