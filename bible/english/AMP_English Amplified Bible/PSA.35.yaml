type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 35
  - type: heading
    content: Prayer for Rescue from Enemies.
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: Contend, O L
  - type: heading
    content: ord
  - type: text
    content: ', with those who contend with me;'
  - type: text
    content: Fight against those who fight against me.
  '10':
  - type: text
    content: All my bones will say, “L
  - type: heading
    content: ord
  - type: text
    content: ', who is like You,'
  - type: text
    content: Who rescues the afflicted from him who is too strong for him [to resist alone],
  - type: text
    content: And the afflicted and the needy from him who robs him?”
  '11':
  - type: text
    content: Malicious witnesses rise up;
  - type: text
    content: They ask me of things that I do not know.
  '12':
  - type: text
    content: They repay me evil for good,
  - type: text
    content: To the sorrow of my soul.
  '13':
  - type: text
    content: But as for me, when they were sick, my clothing was sackcloth (mourning garment);
  - type: text
    content: I humbled my soul with fasting,
  - type: text
    content: And I prayed with my head bowed on my chest.
  '14':
  - type: text
    content: I behaved as if grieving for my friend or my brother;
  - type: text
    content: I bowed down in mourning, as one who sorrows for his mother.
  '15':
  - type: text
    content: But in my stumbling they rejoiced and gathered together [against me];
  - type: text
    content: The slanderers whom I did not know gathered against me;
  - type: text
    content: 'They slandered '
  - type: text
    content: and
  - type: text
    content: ' reviled me without ceasing.'
  '16':
  - type: text
    content: Like godless jesters at a feast,
  - type: text
    content: They gnashed at me with their teeth [in malice].
  '17':
  - type: text
    content: ¶L
  - type: heading
    content: ord
  - type: text
    content: ', how long will You look on [without action]?'
  - type: text
    content: Rescue my life from their destructions,
  - type: text
    content: 'My only '
  - type: text
    content: life
  - type: text
    content: ' from the young lions.'
  '18':
  - type: text
    content: I will give You thanks in the great congregation;
  - type: text
    content: I will praise You among a mighty people.
  '19':
  - type: text
    content: Do not let those who are wrongfully my enemies rejoice over me;
  - type: text
    content: Nor let those who hate me without cause wink their eye [maliciously]. [John 15:24, 25]
  '2':
  - type: text
    content: Take hold of shield and buckler (
  - type: note
    content: See note Jer 46:3.
  - type: text
    content: small shield),
  - type: text
    content: And stand up for my help.
  '20':
  - type: text
    content: For they do not speak peace,
  - type: text
    content: But they devise deceitful words [half-truths and lies] against those who are quiet in the land.
  '21':
  - type: text
    content: They open their mouths wide against me;
  - type: text
    content: They say, “Aha, aha, our eyes have seen it!”
  '22':
  - type: text
    content: ¶You have seen this, O L
  - type: heading
    content: ord
  - type: text
    content: ; do not keep silent.
  - type: text
    content: O Lord, do not be far from me.
  '23':
  - type: text
    content: Wake Yourself up, and arise to my right
  - type: text
    content: And to my cause, my God and my Lord.
  '24':
  - type: text
    content: Judge me, O L
  - type: heading
    content: ord
  - type: text
    content: ' my God, according to Your righteousness '
  - type: text
    content: and
  - type: text
    content: ' justice;'
  - type: text
    content: And do not let them rejoice over me.
  '25':
  - type: text
    content: Do not let them say in their heart, “Aha, that is what we wanted!”
  - type: text
    content: 'Do not let them say, “We have swallowed him up '
  - type: text
    content: and
  - type: text
    content: ' destroyed him.”'
  '26':
  - type: text
    content: Let those be ashamed and humiliated together who rejoice at my distress;
  - type: text
    content: Let those be clothed with shame and dishonor who magnify themselves over me.
  '27':
  - type: text
    content: '¶Let them shout for joy and rejoice, who favor my vindication '
  - type: text
    content: and
  - type: text
    content: ' want what is right for me;'
  - type: text
    content: Let them say continually, “Let the L
  - type: heading
    content: ord
  - type: text
    content: ' be magnified, who delights '
  - type: text
    content: and
  - type: text
    content: ' takes pleasure in the prosperity of His servant.”'
  '28':
  - type: text
    content: And my tongue shall declare Your righteousness (justice),
  - type: text
    content: And Your praise all the day long.
  '3':
  - type: text
    content: Draw also the spear and javelin to meet those who pursue me.
  - type: text
    content: Say to my soul, “I am your salvation.”
  '4':
  - type: text
    content: Let those be ashamed and dishonored who seek my life;
  - type: text
    content: Let those be turned back [in defeat] and humiliated who plot evil against me.
  '5':
  - type: text
    content: Let them be [blown away] like chaff before the wind [worthless, without substance],
  - type: text
    content: With the angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' driving them on.'
  '6':
  - type: text
    content: Let their way be dark and slippery,
  - type: text
    content: With the angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' pursuing '
  - type: text
    content: and
  - type: text
    content: ' harassing them.'
  '7':
  - type: text
    content: For without cause they hid their net for me;
  - type: text
    content: Without cause they dug a pit [of destruction] for my life.
  '8':
  - type: text
    content: Let destruction come upon my enemy by surprise;
  - type: text
    content: Let the net he hid for me catch him;
  - type: text
    content: Into that very destruction let him fall.
  '9':
  - type: text
    content: ¶Then my soul shall rejoice in the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: It shall rejoice in His salvation.
