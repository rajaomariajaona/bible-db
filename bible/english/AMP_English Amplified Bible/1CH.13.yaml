  '7':
  - type: text
    content: 'They '
  - type: note
    content: David’s failure to review and follow God’s instructions (Ex 25:12-15) regarding the transportation of the ark resulted in tragedy (v 10).
  - type: text
    content: 'carried the ark of God on a new cart and brought it out of the house of Abinadab, and Uzza and Ahio [his brother] drove the cart. '
  '8':
  - type: text
    content: David and all Israel celebrated [joyfully] before God with all their might, with songs, lyres, harps, tambourines, cymbals, and trumpets.
  '9':
  - type: text
    content: 'When they came to the threshing floor of Chidon, Uzza put out his hand to hold '
  - type: text
    content: and
  - type: text
    content: ' steady the ark, for the oxen [that were drawing the cart] '
  - type: note
    content: Exactly what happened is unclear. However, the oxen might have begun to run toward the threshing floor, lured by the smell of grain left over from threshing. The fact that oxen threshing grain (trampling the stalks to separate the kernels) would naturally eat some of the grain accounts for the prohibition against muzzling the ox during threshing (Deut 25:4; cf 1 Tim 5:18). But in any case, Uzza violated the great sanctity of the ark by touching it. God could have intervened and prevented the ark from being dislodged, if He so desired.
  - type: text
    content: 'nearly overturned it. '
