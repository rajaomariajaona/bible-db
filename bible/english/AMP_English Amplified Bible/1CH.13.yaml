  - type: text
    content: 'So David did not bring the ark with him to the City of David, but took it aside to the house of '
  - type: note
    content: It was appropriate to leave the ark with Oded-edom because he was a Levite, but David’s decision may not have been in Obed-edom’s best interest. David probably wanted to see what would happen to him before he risked transporting the ark to the temple.
  - type: text
