  - type: text
    content: ' everywhere to our fellow countrymen who remain in all the land of Israel, and to the priests and Levites who are with them in their cities with pasture lands, so that they may meet with us; '
  '3':
  - type: text
    content: 'and let us bring back the ark of our God to us, '
  - type: note
    content: At one time Saul did consider pursuing the return of the ark (1 Sam 14:18). The account of the loss of the ark and its journey to Kiriath-jearim is recorded in 1 Sam 4-7:2.
  - type: text
    content: 'for we did not seek it during the days of Saul.” '
  '4':
  - type: text
    content: Then all the assembly agreed to do so, for the thing was right in the eyes of all the people.
  '5':
  - type: text
    content: 'So David gathered all Israel together, from the Shihor [watercourse] of Egypt, to the entrance of Hamath [in the north], to bring the ark of God from Kiriath-jearim. '
