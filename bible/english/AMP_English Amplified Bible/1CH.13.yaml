segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Peril in Transporting the Ark
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David consulted with the captains of the thousands and the hundreds, even with every leader. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David said to all the assembly of Israel, “If it seems good to you, and if it is from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, let us send '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' everywhere to our fellow countrymen who remain in all the land of Israel, and to the priests and Levites who are with them in their cities with pasture lands, so that they may meet with us; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and let us bring back the ark of our God to us, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At one time Saul did consider pursuing the return of the ark (1 Sam 14:18). The account of the loss of the ark and its journey to Kiriath-jearim is recorded in 1 Sam 4-7:2.
    marker-yv: yv-n
  - type: text
    text: 'for we did not seek it during the days of Saul.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then all the assembly agreed to do so, for the thing was right in the eyes of all the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So David gathered all Israel together, from the Shihor [watercourse] of Egypt, to the entrance of Hamath [in the north], to bring the ark of God from Kiriath-jearim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David and all Israel went up to Baalah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that is,
  - type: text
    text: ' to Kiriath-jearim, which belongs to Judah, to bring up from there the ark of God the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who sits enthroned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: above
  - type: text
    text: ' the cherubim, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the ark
  - type: text
    text: ' which is called by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David’s failure to review and follow God’s instructions (Ex 25:12-15) regarding the transportation of the ark resulted in tragedy (v 10).
    marker-yv: yv-n
  - type: text
    text: 'carried the ark of God on a new cart and brought it out of the house of Abinadab, and Uzza and Ahio [his brother] drove the cart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: David and all Israel celebrated [joyfully] before God with all their might, with songs, lyres, harps, tambourines, cymbals, and trumpets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When they came to the threshing floor of Chidon, Uzza put out his hand to hold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steady the ark, for the oxen [that were drawing the cart] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exactly what happened is unclear. However, the oxen might have begun to run toward the threshing floor, lured by the smell of grain left over from threshing. The fact that oxen threshing grain (trampling the stalks to separate the kernels) would naturally eat some of the grain accounts for the prohibition against muzzling the ox during threshing (Deut 25:4; cf 1 Tim 5:18). But in any case, Uzza violated the great sanctity of the ark by touching it. God could have intervened and prevented the ark from being dislodged, if He so desired.
    marker-yv: yv-n
  - type: text
    text: 'nearly overturned it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' burned against Uzza, and He struck him down because he touched the ark; and there he died before God. [Num 4:15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: David became angry because of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' outburst against Uzza; so that place is called '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I.e. the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: outburst against Uzza
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Perez-uzza to this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David was afraid of God that day, and he said, “How can I bring the ark of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: home
  - type: text
    text: ' with me?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So David did not bring the ark with him to the City of David, but took it aside to the house of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was appropriate to leave the ark with Oded-edom because he was a Levite, but David’s decision may not have been in Obed-edom’s best interest. David probably wanted to see what would happen to him before he risked transporting the ark to the temple.
    marker-yv: yv-n
  - type: text
    text: 'Obed-edom the Gittite. [Josh 21:20, 24; 1 Chr 15:24] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the ark of God remained with the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: house
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: family of Obed-edom in his house three months; and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient rabbis said that the blessing was children born into his family, and that it was a reward for the hospitality that Obed-edom showed to the ark. They also noted that this happy outcome was important to show that it was not the ark itself that caused the death of Uzza (v 10), but only the sin that he committed in touching it.
    marker-yv: yv-n
  - type: text
    text: blessed the house of Obed-edom and all that he had.
