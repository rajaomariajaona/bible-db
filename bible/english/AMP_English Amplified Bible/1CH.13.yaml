  - type: text
    content: ' '
  - type: note
    content: The ancient rabbis said that the blessing was children born into his family, and that it was a reward for the hospitality that Obed-edom showed to the ark. They also noted that this happy outcome was important to show that it was not the ark itself that caused the death of Uzza (v 10), but only the sin that he committed in touching it.
  - type: text
    content: blessed the house of Obed-edom and all that he had.
  '2':
  - type: text
    content: David said to all the assembly of Israel, “If it seems good to you, and if it is from the L
  - type: heading
