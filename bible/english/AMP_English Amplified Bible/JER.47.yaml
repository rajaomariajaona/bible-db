verses:
  '1':
  - type: heading
    content: Prophecy against Philistia
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' that came to Jeremiah the prophet concerning the Philistines before Pharaoh attacked '
  - type: text
    content: and
  - type: text
    content: ' conquered [the Philistine city of] Gaza. [Is 14:29-31; Ezek 25:15-17; Amos 1:6-8; Zeph 2:4-7; Zech 9:5-7] '
  '2':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ':'
  - type: text
    content: “Behold, waters are going to rise out of the north (Babylonia)
  - type: text
    content: And become an overflowing stream
  - type: text
    content: And overflow the land and all that is in it,
  - type: text
    content: The city and those who live in it.
  - type: text
    content: Then the people will cry out,
  - type: text
    content: And all the inhabitants of the land [of Philistia] will wail.
  '3':
  - type: text
    content: “Because of the noise of the stamping of the hoofs of the war-horses [of the Babylonian king],
  - type: text
    content: The rattling of his chariots, and the rumbling of his wheels,
  - type: text
    content: 'The fathers have not looked '
  - type: text
    content: and
  - type: text
    content: ' turned back for their children,'
  - type: text
    content: So weak are their hands [with terror]
  '4':
  - type: text
    content: Because of the day that is coming
  - type: text
    content: To destroy all the Philistines
  - type: text
    content: And to cut off from Tyre and Sidon
  - type: text
    content: Every ally who remains.
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' is going to destroy the Philistines,'
  - type: text
    content: 'The remnant [still surviving] of the coastland of '
  - type: note
    content: A reference to the island of Crete, believed to be the original homeland of the Philistines.
  - type: text
    content: Caphtor. [Amos 9:7]
  '5':
  - type: text
    content: “Baldness [as a sign of mourning] will come on Gaza;
  - type: text
    content: 'Ashkelon will be cut off '
  - type: text
    content: and
  - type: text
    content: ' ruined.'
  - type: text
    content: O remnant of their valley,
  - type: text
    content: How long will you gash yourselves [as a sign of mourning]?
  '6':
  - type: text
    content: “O you sword of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: How long will it be before you are quiet?
  - type: text
    content: Put yourself into your sheath;
  - type: text
    content: Rest and be still.
  '7':
  - type: text
    content: “How can His sword be quiet
  - type: text
    content: When the L
  - type: heading
    content: ord
  - type: text
    content: ' has given it an order?'
  - type: text
    content: Against Ashkelon and against the [whole Philistine] seashore
  - type: text
    content: There He has assigned it.”
