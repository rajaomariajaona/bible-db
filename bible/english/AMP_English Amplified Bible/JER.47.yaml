document_id: JER.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prophecy against Philistia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' that came to Jeremiah the prophet concerning the Philistines before Pharaoh attacked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conquered [the Philistine city of] Gaza. [Is 14:29-31; Ezek 25:15-17; Amos 1:6-8; Zeph 2:4-7; Zech 9:5-7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Behold, waters are going to rise out of the north (Babylonia)
- type: usfm
  marker: q1
  children:
  - type: text
    text: And become an overflowing stream
- type: usfm
  marker: q1
  children:
  - type: text
    text: And overflow the land and all that is in it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The city and those who live in it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then the people will cry out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the inhabitants of the land [of Philistia] will wail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Because of the noise of the stamping of the hoofs of the war-horses [of the Babylonian king],
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rattling of his chariots, and the rumbling of his wheels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The fathers have not looked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turned back for their children,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So weak are their hands [with terror]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Because of the day that is coming
- type: usfm
  marker: q1
  children:
  - type: text
    text: To destroy all the Philistines
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to cut off from Tyre and Sidon
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every ally who remains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is going to destroy the Philistines,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The remnant [still surviving] of the coastland of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A reference to the island of Crete, believed to be the original homeland of the Philistines.
    marker-yv: yv-n
  - type: text
    text: Caphtor. [Amos 9:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Baldness [as a sign of mourning] will come on Gaza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ashkelon will be cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruined.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O remnant of their valley,
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will you gash yourselves [as a sign of mourning]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “O you sword of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will it be before you are quiet?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put yourself into your sheath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rest and be still.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “How can His sword be quiet
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has given it an order?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against Ashkelon and against the [whole Philistine] seashore
- type: usfm
  marker: q1
  children:
  - type: text
    text: There He has assigned it.”
