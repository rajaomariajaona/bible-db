document_id: JER.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Message to the Exiles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now these are the words of the letter which Jeremiah the prophet sent from Jerusalem to the rest of the elders in exile and to the priests, the prophets and all the people whom '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In Hebrew there are two ways of spelling the name of the ruler of Babylon resulting in two English variations: Nebuchadnezzar and Nebuchadrezzar.'
    marker-yv: yv-n
  - type: text
    text: 'Nebuchadnezzar had taken into captivity from Jerusalem to Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(This was after King Jeconiah and the queen mother, the eunuchs, the princes (court officials) of Judah and Jerusalem, the craftsmen and the smiths had departed from Jerusalem.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: The letter was
  - type: text
    text: ' hand-carried by Elasah the son of Shaphan and Gemariah the son of Hilkiah, whom Zedekiah king of Judah sent to Babylon to Nebuchadnezzar king of Babylon, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “So says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, to all the captives whom I have sent into exile from Jerusalem to Babylon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '‘Build houses and live '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in them;
  - type: text
    text: ' plant gardens and eat their fruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Take wives and have sons and daughters; take wives for your sons and give your daughters in marriage, that they may bear sons and daughters; multiply there and do not decrease [in number]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Seek peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' well-being for the city where I have sent you into exile, and pray to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' on its behalf; for in its peace (well-being) you will have peace.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, ‘Do not let your [false] prophets who are among you and your diviners deceive you; pay no attention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attach no significance to the dreams which they dream '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to yours, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: for they prophesy falsely to you in My Name. I have not sent them,’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “For thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘When seventy years [of exile] have been completed for Babylon, I will visit (inspect) you and keep My good promise to you, to bring you back to this place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For I know the plans '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoughts that I have for you,’ says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘plans for peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' well-being and not for disaster, to give you a future and a hope. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then you will call on Me and you will come and pray to Me, and I will hear [your voice] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I will listen to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then [with a deep longing] you will seek Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require Me [as a vital necessity] and [you will] find Me when you search for Me with all your heart. [Deut 4:29, 30] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I will be found by you,’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘and I will restore your fortunes and I will [free you and] gather you from all the nations and from all the places where I have driven you,’ says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘and I will bring you back to the place from where I sent you into exile.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Because you [who have remained in Jerusalem] have said, ‘The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has raised up prophets for us in Babylon,’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' concerning the king who sits on the throne of David, and concerning all the people who live in this city, your brothers (fellow people of Judah) who did not go with you into captivity— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, ‘Behold (listen very carefully), I am sending the sword, famine, and virulent disease (pestilence) on them, and I will make them like rotten figs that are so bad they cannot be eaten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I will pursue them with the sword, with famine and with virulent disease; and I will make them a terror (warning) to all the kingdoms of the earth, to be a curse, a horror, a hissing, and a disgrace among all the nations to which I have driven them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'because they have not listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honored My words,’ says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘which I sent to them again and again by My servants the prophets. Moreover, you [exiles] did not listen [either],’ says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [Ezek 2:5, 7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hear, therefore, the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', all you exiles whom I have sent away from Jerusalem to Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, concerning Ahab the son of Kolaiah and concerning Zedekiah the son of Maaseiah, who are prophesying lies to you in My Name, ‘Behold, I will hand them over to Nebuchadnezzar king of Babylon, and he will slaughter them before your eyes [yes, all the false prophets in Babylon whom you follow shall die]! [Jer 29:15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Because of them, this curse shall be taken up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' used by all the exiles from Judah who are in Babylon, saying, “May the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' make you like Zedekiah and like Ahab, whom the king of Babylon roasted in the fire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'because they have acted foolishly in Israel and have committed adultery with their neighbors’ wives and in My Name have spoken false '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' concocted words, which I did not command them. I am He who knows and I am a witness,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Also you shall speak to Shemaiah of Nehelam [among the exiles in Babylon], saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, ‘Because you have sent letters in your own name to all the people who are in Jerusalem, and to Zephaniah the son of Maaseiah, the priest, and to all the priests, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has made you [Zephaniah] priest instead of Jehoiada the [deputy] priest, to be the overseer in the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' over every madman who prophesies, to put him in the stocks and in the iron collar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'now therefore [continued the letter from Shemaiah in Babylon to Zephaniah in Jerusalem], why have you not rebuked Jeremiah of Anathoth, who prophesies to you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For he has sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to us in Babylon, saying, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ‘This captivity
  - type: text
    text: ' [of yours] will be long; build houses and live '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in them
  - type: text
    text: ' and plant gardens and eat their fruit.’ ” ’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Zephaniah the priest read this letter to Jeremiah the prophet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then came the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to Jeremiah, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Send [this message] to all the exiles, saying, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' concerning Shemaiah of Nehelam, “Because Shemaiah has prophesied to you, although I did not send him, and he has made you trust in a lie,” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Behold, I am about to punish Shemaiah of Nehelam and his descendants. He will not have anyone [born] to live among this people, nor will he see the good that I am about to do to My people,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “because he has spoken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preached rebellion against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .” ’ ”
