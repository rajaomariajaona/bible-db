document_id: JER.29,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Message to the Exiles
  - type: text
    content: 'Now these are the words of the letter which Jeremiah the prophet sent from Jerusalem to the rest of the elders in exile and to the priests, the prophets and all the people whom '
  - type: note
    content: 'In Hebrew there are two ways of spelling the name of the ruler of Babylon resulting in two English variations: Nebuchadnezzar and Nebuchadrezzar.'
  - type: text
    content: 'Nebuchadnezzar had taken into captivity from Jerusalem to Babylon. '
  '10':
  - type: text
    content: “For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘When seventy years [of exile] have been completed for Babylon, I will visit (inspect) you and keep My good promise to you, to bring you back to this place. '
  '11':
  - type: text
    content: 'For I know the plans '
  - type: text
    content: and
  - type: text
    content: ' thoughts that I have for you,’ says the L'
  - type: heading
    content: ord
  - type: text
    content: ', ‘plans for peace '
  - type: text
    content: and
  - type: text
    content: ' well-being and not for disaster, to give you a future and a hope. '
  '12':
  - type: text
    content: 'Then you will call on Me and you will come and pray to Me, and I will hear [your voice] '
  - type: text
    content: and
  - type: text
    content: ' I will listen to you. '
  '13':
  - type: text
    content: 'Then [with a deep longing] you will seek Me '
  - type: text
    content: and
  - type: text
    content: ' require Me [as a vital necessity] and [you will] find Me when you search for Me with all your heart. [Deut 4:29, 30] '
  '14':
  - type: text
    content: I will be found by you,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘and I will restore your fortunes and I will [free you and] gather you from all the nations and from all the places where I have driven you,’ says the L'
  - type: heading
    content: ord
  - type: text
    content: ', ‘and I will bring you back to the place from where I sent you into exile.’'
  '15':
  - type: text
    content: “Because you [who have remained in Jerusalem] have said, ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' has raised up prophets for us in Babylon,’ '
  '16':
  - type: text
    content: thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' concerning the king who sits on the throne of David, and concerning all the people who live in this city, your brothers (fellow people of Judah) who did not go with you into captivity— '
  '17':
  - type: text
    content: thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘Behold (listen very carefully), I am sending the sword, famine, and virulent disease (pestilence) on them, and I will make them like rotten figs that are so bad they cannot be eaten. '
  '18':
  - type: text
    content: 'I will pursue them with the sword, with famine and with virulent disease; and I will make them a terror (warning) to all the kingdoms of the earth, to be a curse, a horror, a hissing, and a disgrace among all the nations to which I have driven them, '
  '19':
  - type: text
    content: 'because they have not listened to '
  - type: text
    content: and
  - type: text
    content: ' honored My words,’ says the L'
  - type: heading
    content: ord
  - type: text
    content: ', ‘which I sent to them again and again by My servants the prophets. Moreover, you [exiles] did not listen [either],’ says the L'
  - type: heading
    content: ord
  - type: text
    content: '. [Ezek 2:5, 7] '
  '2':
  - type: text
    content: '(This was after King Jeconiah and the queen mother, the eunuchs, the princes (court officials) of Judah and Jerusalem, the craftsmen and the smiths had departed from Jerusalem.) '
  '20':
  - type: text
    content: Hear, therefore, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', all you exiles whom I have sent away from Jerusalem to Babylon.'
  '21':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, concerning Ahab the son of Kolaiah and concerning Zedekiah the son of Maaseiah, who are prophesying lies to you in My Name, ‘Behold, I will hand them over to Nebuchadnezzar king of Babylon, and he will slaughter them before your eyes [yes, all the false prophets in Babylon whom you follow shall die]! [Jer 29:15] '
  '22':
  - type: text
    content: 'Because of them, this curse shall be taken up '
  - type: text
    content: and
  - type: text
    content: ' used by all the exiles from Judah who are in Babylon, saying, “May the L'
  - type: heading
    content: ord
  - type: text
    content: ' make you like Zedekiah and like Ahab, whom the king of Babylon roasted in the fire, '
  '23':
  - type: text
    content: 'because they have acted foolishly in Israel and have committed adultery with their neighbors’ wives and in My Name have spoken false '
  - type: text
    content: and
  - type: text
    content: ' concocted words, which I did not command them. I am He who knows and I am a witness,” says the L'
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  '24':
  - type: text
    content: 'Also you shall speak to Shemaiah of Nehelam [among the exiles in Babylon], saying, '
  '25':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, ‘Because you have sent letters in your own name to all the people who are in Jerusalem, and to Zephaniah the son of Maaseiah, the priest, and to all the priests, saying, '
  '26':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' has made you [Zephaniah] priest instead of Jehoiada the [deputy] priest, to be the overseer in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' over every madman who prophesies, to put him in the stocks and in the iron collar, '
  '27':
  - type: text
    content: 'now therefore [continued the letter from Shemaiah in Babylon to Zephaniah in Jerusalem], why have you not rebuked Jeremiah of Anathoth, who prophesies to you? '
  '28':
  - type: text
    content: 'For he has sent '
  - type: text
    content: word
  - type: text
    content: ' to us in Babylon, saying, '
  - type: text
    content: ‘This captivity
  - type: text
    content: ' [of yours] will be long; build houses and live '
  - type: text
    content: in them
  - type: text
    content: ' and plant gardens and eat their fruit.’ ” ’ ”'
  '29':
  - type: text
    content: 'Zephaniah the priest read this letter to Jeremiah the prophet. '
  '3':
  - type: text
    content: The letter was
  - type: text
    content: ' hand-carried by Elasah the son of Shaphan and Gemariah the son of Hilkiah, whom Zedekiah king of Judah sent to Babylon to Nebuchadnezzar king of Babylon, saying, '
  '30':
  - type: text
    content: Then came the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' to Jeremiah, saying, '
  '31':
  - type: text
    content: “Send [this message] to all the exiles, saying, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' concerning Shemaiah of Nehelam, “Because Shemaiah has prophesied to you, although I did not send him, and he has made you trust in a lie,” '
  '32':
  - type: text
    content: therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Behold, I am about to punish Shemaiah of Nehelam and his descendants. He will not have anyone [born] to live among this people, nor will he see the good that I am about to do to My people,” says the L'
  - type: heading
    content: ord
  - type: text
    content: ', “because he has spoken '
  - type: text
    content: and
  - type: text
    content: ' preached rebellion against the L'
  - type: heading
    content: ord
  - type: text
    content: .” ’ ”
  '4':
  - type: text
    content: “So says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, to all the captives whom I have sent into exile from Jerusalem to Babylon, '
  '5':
  - type: text
    content: '‘Build houses and live '
  - type: text
    content: in them;
  - type: text
    content: ' plant gardens and eat their fruit. '
  '6':
  - type: text
    content: 'Take wives and have sons and daughters; take wives for your sons and give your daughters in marriage, that they may bear sons and daughters; multiply there and do not decrease [in number]. '
  '7':
  - type: text
    content: 'Seek peace '
  - type: text
    content: and
  - type: text
    content: ' well-being for the city where I have sent you into exile, and pray to the L'
  - type: heading
    content: ord
  - type: text
    content: ' on its behalf; for in its peace (well-being) you will have peace.’ '
  '8':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, ‘Do not let your [false] prophets who are among you and your diviners deceive you; pay no attention '
  - type: text
    content: and
  - type: text
    content: ' attach no significance to the dreams which they dream '
  - type: text
    content: or
  - type: text
    content: ' to yours, '
  '9':
  - type: text
    content: for they prophesy falsely to you in My Name. I have not sent them,’ says the L
  - type: heading
    content: ord
  - type: text
    content: .
