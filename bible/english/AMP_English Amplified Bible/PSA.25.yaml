document_id: PSA.25
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 25
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prayer for Protection, Guidance and Pardon.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: To You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', I lift up my soul.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O my God, in You I [have unwavering] trust [and I rely on You with steadfast confidence],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do not let me be ashamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' my hope in You be disappointed;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not let my enemies triumph over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Indeed, none of those who [expectantly] wait for You will be ashamed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Those who turn away from what is right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deal treacherously without cause will be ashamed (humiliated, embarrassed).'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶Let me know Your ways, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teach me Your paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Guide me in Your truth and teach me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You are the God of my salvation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You [and only You] I wait [expectantly] all the day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Remember, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', Your [tender] compassion and Your lovingkindnesses,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they have been from of old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Do not remember the sins of my youth or my transgressions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: According to Your lovingkindness remember me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For Your goodness’ sake, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶Good and upright is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore He instructs sinners in the way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He leads the humble in justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He teaches the humble His way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: All the paths of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' are lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goodness and truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To those who keep His covenant and His testimonies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For Your name’s sake, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pardon my wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my guilt, for they are great.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶Who is the man who fears the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [with awe-inspired reverence and worships Him with submissive wonder]?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will teach him [through His word] in the way he should choose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'His soul will dwell in prosperity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goodness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his descendants will inherit the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The secret [of the wise counsel] of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is for those who fear Him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And He will let them know His covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reveal to them [through His word] its [deep, inner] meaning. [John 7:17; 15:15]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My eyes are continually toward the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: For He will bring my feet out of the net.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶Turn to me [L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] and be gracious to me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am alone and afflicted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The troubles of my heart are multiplied;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring me out of my distresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Look upon my affliction and my trouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And forgive all my sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Look upon my enemies, for they are many;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They hate me with cruel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violent hatred.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Guard my soul and rescue me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do not let me be ashamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' disappointed,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I have taken refuge in You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Let integrity and uprightness protect me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I wait [expectantly] for You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: O God, redeem Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Out of all his troubles.
