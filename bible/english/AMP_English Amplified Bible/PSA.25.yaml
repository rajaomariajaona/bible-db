verses:
  '1':
  - type: heading
    content: Psalm 25
  - type: heading
    content: Prayer for Protection, Guidance and Pardon.
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: To You, O L
  - type: heading
    content: ord
  - type: text
    content: ', I lift up my soul.'
  '10':
  - type: text
    content: All the paths of the L
  - type: heading
    content: ord
  - type: text
    content: ' are lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' goodness and truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness'
  - type: text
    content: To those who keep His covenant and His testimonies.
  '11':
  - type: text
    content: For Your name’s sake, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'Pardon my wickedness '
  - type: text
    content: and
  - type: text
    content: ' my guilt, for they are great.'
  '12':
  - type: text
    content: ¶Who is the man who fears the L
  - type: heading
    content: ord
  - type: text
    content: ' [with awe-inspired reverence and worships Him with submissive wonder]?'
  - type: text
    content: He will teach him [through His word] in the way he should choose.
  '13':
  - type: text
    content: 'His soul will dwell in prosperity '
  - type: text
    content: and
  - type: text
    content: ' goodness,'
  - type: text
    content: And his descendants will inherit the land.
  '14':
  - type: text
    content: The secret [of the wise counsel] of the L
  - type: heading
    content: ord
  - type: text
    content: ' is for those who fear Him,'
  - type: text
    content: 'And He will let them know His covenant '
  - type: text
    content: and
  - type: text
    content: ' reveal to them [through His word] its [deep, inner] meaning. [John 7:17; 15:15]'
  '15':
  - type: text
    content: My eyes are continually toward the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: For He will bring my feet out of the net.
  '16':
  - type: text
    content: ¶Turn to me [L
  - type: heading
    content: ord
  - type: text
    content: '] and be gracious to me,'
  - type: text
    content: For I am alone and afflicted.
  '17':
  - type: text
    content: The troubles of my heart are multiplied;
  - type: text
    content: Bring me out of my distresses.
  '18':
  - type: text
    content: Look upon my affliction and my trouble,
  - type: text
    content: And forgive all my sins.
  '19':
  - type: text
    content: Look upon my enemies, for they are many;
  - type: text
    content: 'They hate me with cruel '
  - type: text
    content: and
  - type: text
    content: ' violent hatred.'
  '2':
  - type: text
    content: O my God, in You I [have unwavering] trust [and I rely on You with steadfast confidence],
  - type: text
    content: 'Do not let me be ashamed '
  - type: text
    content: or
  - type: text
    content: ' my hope in You be disappointed;'
  - type: text
    content: Do not let my enemies triumph over me.
  '20':
  - type: text
    content: Guard my soul and rescue me;
  - type: text
    content: 'Do not let me be ashamed '
  - type: text
    content: or
  - type: text
    content: ' disappointed,'
  - type: text
    content: For I have taken refuge in You.
  '21':
  - type: text
    content: Let integrity and uprightness protect me,
  - type: text
    content: For I wait [expectantly] for You.
  '22':
  - type: text
    content: O God, redeem Israel,
  - type: text
    content: Out of all his troubles.
  '3':
  - type: text
    content: Indeed, none of those who [expectantly] wait for You will be ashamed;
  - type: text
    content: 'Those who turn away from what is right '
  - type: text
    content: and
  - type: text
    content: ' deal treacherously without cause will be ashamed (humiliated, embarrassed).'
  '4':
  - type: text
    content: ¶Let me know Your ways, O L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: Teach me Your paths.
  '5':
  - type: text
    content: Guide me in Your truth and teach me,
  - type: text
    content: For You are the God of my salvation;
  - type: text
    content: For You [and only You] I wait [expectantly] all the day long.
  '6':
  - type: text
    content: Remember, O L
  - type: heading
    content: ord
  - type: text
    content: ', Your [tender] compassion and Your lovingkindnesses,'
  - type: text
    content: For they have been from of old.
  '7':
  - type: text
    content: Do not remember the sins of my youth or my transgressions;
  - type: text
    content: According to Your lovingkindness remember me,
  - type: text
    content: For Your goodness’ sake, O L
  - type: heading
    content: ord
  - type: text
    content: .
  '8':
  - type: text
    content: ¶Good and upright is the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: Therefore He instructs sinners in the way.
  '9':
  - type: text
    content: He leads the humble in justice,
  - type: text
    content: And He teaches the humble His way.
