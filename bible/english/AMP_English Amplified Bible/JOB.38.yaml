  '3':
  - type: text
    content: '“Now '
  - type: note
    content: A phrase often found in the Bible that is an urgent call to get ready for immediate action, or it may be a call to prepare for a coming action or event. The phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of garments (tunics, cloaks, mantles, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips). Gird up your mind or gird up your heart are examples of variants of this phrase and call for mental or spiritual preparation for a coming challenge.
  - type: text
    content: gird up your loins like a man,
  - type: text
    content: And I will ask you, and you instruct Me!
