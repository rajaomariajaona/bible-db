  - type: text
    content: ' '
  - type: heading
    content: confirmed by the testimony of two or three witnesses
  - type: text
    content: '. [Deut 19:15] '
  '10':
  - type: text
    content: For this reason I am writing these things while absent from you, so that when I come, I will not need to deal severely [with you], in my use of the authority which the Lord has given me [to be used] for building you up and not for tearing you down.
  '11':
  - type: text
    content: 'Finally, believers, rejoice! Be made complete [be what you should be], be comforted, be like-minded, live in peace [enjoy the spiritual well-being experienced by believers who walk closely with God]; and the God of love and peace [the source of lovingkindness] will be with you. '
  '12':
  - type: text
    content: 'Greet one another with a '
  - type: note
    content: A traditional greeting in biblical times, much like today’s handshake and hug.
  - type: text
    content: 'holy kiss. '
  '13':
  - type: text
    content: 'All '
  - type: note
    content: Lit the saints.
  - type: text
    content: God’s people greet you.
  '14':
  - type: text
    content: The grace of the Lord Jesus Christ and the love of God, and the fellowship of the Holy Spirit be with you all.
  '2':
  - type: text
    content: 'I have already warned those who have sinned in the past and all the rest '
  - type: text
    content: as well,
  - type: text
    content: ' and I warn them now even though I am absent [from you] as I did when I was with you the second time, that if I come back I will not spare '
  - type: text
    content: anyone,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'since you seek [forensic] proof that Christ is speaking in '
  - type: text
    content: and
  - type: text
    content: ' through me. He is not weak '
  - type: text
    content: or
  - type: text
    content: ' ineffective in dealing with you, but powerful within you. '
  '4':
  - type: text
    content: 'For even though He was crucified in weakness [yielding Himself], yet He lives [resurrected] by the power of God [His Father]. For we too are weak in Him [as He was humanly weak], yet we are alive '
  - type: text
    content: and
  - type: text
    content: ' well [in fellowship] with Him because of the power of God '
  - type: text
    content: directed
  - type: text
    content: ' toward you.'
  '5':
  - type: text
    content: 'Test '
  - type: text
    content: and
  - type: text
    content: ' evaluate yourselves '
  - type: text
    content: to see
  - type: text
    content: ' whether you are in the faith '
  - type: text
    content: and
  - type: text
    content: ' living your lives as [committed] believers. Examine yourselves [not me]! Or do you not recognize this about yourselves [by an ongoing experience] that Jesus Christ is in you—unless indeed you fail the test '
  - type: text
    content: and
  - type: text
    content: ' are rejected as counterfeit? '
  '6':
  - type: text
    content: 'But I hope you will acknowledge that we do not fail the test '
  - type: text
    content: nor
  - type: text
    content: ' are we to be rejected. '
  '7':
  - type: text
    content: 'But I pray to God that you may do nothing wrong. Not so that we [and our teaching] may appear to be approved, but that you may continue doing what is right, even though we [by comparison] may seem to have failed. '
  '8':
  - type: text
    content: 'For we can do nothing against the truth, but only for the truth [and the gospel—the good news of salvation]. '
  '9':
  - type: text
    content: 'We are glad when we are weak [since God’s power comes freely through us], but you [by comparison] are strong. We also pray for this, that you be made complete [fully restored, growing and maturing in godly character and spirit—pleasing your heavenly Father by the life you live]. '
