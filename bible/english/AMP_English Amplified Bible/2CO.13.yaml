document_id: 2CO.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Examine Yourselves
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This is the third time that I am visiting you. E
  - type: usfm
    marker: sc
    children:
    - type: text
      text: very fact shall be sustained
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: confirmed by the testimony of two or three witnesses
  - type: text
    text: '. [Deut 19:15] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I have already warned those who have sinned in the past and all the rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as well,
  - type: text
    text: ' and I warn them now even though I am absent [from you] as I did when I was with you the second time, that if I come back I will not spare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anyone,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'since you seek [forensic] proof that Christ is speaking in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' through me. He is not weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ineffective in dealing with you, but powerful within you. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For even though He was crucified in weakness [yielding Himself], yet He lives [resurrected] by the power of God [His Father]. For we too are weak in Him [as He was humanly weak], yet we are alive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' well [in fellowship] with Him because of the power of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: directed
  - type: text
    text: ' toward you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Test '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evaluate yourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to see
  - type: text
    text: ' whether you are in the faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' living your lives as [committed] believers. Examine yourselves [not me]! Or do you not recognize this about yourselves [by an ongoing experience] that Jesus Christ is in you—unless indeed you fail the test '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are rejected as counterfeit? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But I hope you will acknowledge that we do not fail the test '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' are we to be rejected. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But I pray to God that you may do nothing wrong. Not so that we [and our teaching] may appear to be approved, but that you may continue doing what is right, even though we [by comparison] may seem to have failed. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For we can do nothing against the truth, but only for the truth [and the gospel—the good news of salvation]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We are glad when we are weak [since God’s power comes freely through us], but you [by comparison] are strong. We also pray for this, that you be made complete [fully restored, growing and maturing in godly character and spirit—pleasing your heavenly Father by the life you live]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For this reason I am writing these things while absent from you, so that when I come, I will not need to deal severely [with you], in my use of the authority which the Lord has given me [to be used] for building you up and not for tearing you down.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Finally, believers, rejoice! Be made complete [be what you should be], be comforted, be like-minded, live in peace [enjoy the spiritual well-being experienced by believers who walk closely with God]; and the God of love and peace [the source of lovingkindness] will be with you. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Greet one another with a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A traditional greeting in biblical times, much like today’s handshake and hug.
    marker-yv: yv-n
  - type: text
    text: 'holy kiss. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'All '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the saints
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: God’s people greet you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The grace of the Lord Jesus Christ and the love of God, and the fellowship of the Holy Spirit be with you all.
