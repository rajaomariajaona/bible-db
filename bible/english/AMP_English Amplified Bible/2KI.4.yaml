          text: '4:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Gird up your loins,” a phrase often found in the Bible, is an urgent call to get ready for immediate action, or it may be a call to prepare for a coming action or event. The phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of garments (tunics, cloaks, mantles, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things.
      marker-yv: yv-n
    - type: text
      text: 'Gird up your loins (prepare now!) and take my staff in your hand, and go [to the woman’s house]; if you meet any man [along the way], do not greet him and if a man greets you, do not [stop to] answer him; and lay my staff on the face of the boy [as soon as you reach the house].” '
