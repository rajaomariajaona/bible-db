  - type: text
    content: ' spoke [by special revelation] to Moses in the Wilderness of Sinai in the Tent of Meeting (tabernacle) on the first day of the second month in the second year after the '
  - type: note
    content: In general, sons (children) of Israel or Israel or Israelites refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision sons of Israel or Israel or Israelites usually refers only to the males. Tribes of ancient peoples were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. sons of Reuben, Reuben, Reubenites and so throughout.
  - type: text
    content: 'Israelites came out of the land of Egypt, saying, '
  '10':
  - type: text
    content: 'from the sons (descendants) of Joseph: from [the tribe of] '
  - type: note
    content: Ephraim was the second son born to Joseph in Egypt, but he was chosen over his elder brother, Manasseh, by his grandfather, Jacob (Israel) to receive the birthright blessing (the double portion). Joshua, the great leader who took command after the death of Moses, was from the tribe of Ephraim. Eventually, Ephraim dominated the other nine tribes of Israel, the Northern Kingdom. “Ephraim” is often used interchangeably with “Israel” to refer to the ten tribes of the north.
  - type: text
    content: 'Ephraim, Elishama the son of Ammihud; from [the tribe of] Manasseh, Gamaliel the son of Pedahzur; '
