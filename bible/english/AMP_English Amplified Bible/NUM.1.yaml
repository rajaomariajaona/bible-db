  '47':
  - type: text
    content: 'The Levites, however, were not numbered among them by their fathers’ tribe. '
  '48':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' had said to Moses, '
  '49':
  - type: text
    content: '“Only the tribe of Levi you shall not number, nor shall you take their census among the sons of Israel [since they are unavailable to go to war]. '
  '5':
  - type: text
    content: 'These then are the names of the men who shall stand with you: from [the tribe of] Reuben, Elizur the son of Shedeur; '
  '50':
  - type: text
    content: 'But appoint the Levites over the tabernacle (sanctuary) of the Testimony, and over all its furnishings and all things that belong to it. They shall carry the tabernacle [when traveling] and all its furnishings, and they shall take care of it and camp around it. '
  '51':
  - type: text
    content: 'When the tabernacle is to go forward, the Levites shall take it down; and when the tabernacle is to [be set up for] camp, the Levites shall set it up. But the layman (non-Levite) who approaches the tabernacle shall be put to death. '
  '52':
  - type: text
    content: 'The Israelites shall camp according to their armies, every man by his own camp and every man by his own [tribal] standard (banner). '
  '53':
  - type: text
    content: 'But the Levites shall camp around the tabernacle of the Testimony, so that there will be no wrath against the congregation of the Israelites. The Levites shall be in charge of the tabernacle of the Testimony.” '
  '54':
  - type: text
    content: 'Thus the sons of Israel did '
  - type: text
    content: these things;
  - type: text
    content: ' according to all that the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses, so they did.'
