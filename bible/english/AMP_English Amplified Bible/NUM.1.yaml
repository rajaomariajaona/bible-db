document_id: NUM.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Census of Israel’s Warriors
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke [by special revelation] to Moses in the Wilderness of Sinai in the Tent of Meeting (tabernacle) on the first day of the second month in the second year after the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In general, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons (children) of Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israelites
      - type: text
        text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons of Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israelites
      - type: text
        text: ' usually refers only to the males. Tribes of ancient peoples were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons of Reuben, Reuben, Reubenites
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'Israelites came out of the land of Egypt, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Take a census of all the congregation of the sons of Israel, by their families (clans), by their fathers’ households, according to the number of names, every male, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: by their skulls,
      - type: text
        text: ' also the root word for “Golgotha.”'
    marker-yv: yv-n
  - type: text
    text: 'head by head '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'from twenty years old and upward, all in Israel who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are able to
  - type: text
    text: ' go out to war. You and Aaron shall number them, army by army. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And with you there shall be a man [to assist you] from each tribe, each being the head of his father’s household. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'These then are the names of the men who shall stand with you: from [the tribe of] Reuben, Elizur the son of Shedeur; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'from [the tribe of] Simeon, Shelumiel the son of Zurishaddai; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'from [the tribe of] Judah, Nahshon the son of Amminadab; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'from [the tribe of] Issachar, Nethanel the son of Zuar; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'from [the tribe of] Zebulun, Eliab the son of Helon; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'from the sons (descendants) of Joseph: from [the tribe of] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ephraim was the second son born to Joseph in Egypt, but he was chosen over his elder brother, Manasseh, by his grandfather, Jacob (Israel) to receive the birthright blessing (the double portion). Joshua, the great leader who took command after the death of Moses, was from the tribe of Ephraim. Eventually, Ephraim dominated the other nine tribes of Israel, the Northern Kingdom. “Ephraim” is often used interchangeably with “Israel” to refer to the ten tribes of the north.
    marker-yv: yv-n
  - type: text
    text: 'Ephraim, Elishama the son of Ammihud; from [the tribe of] Manasseh, Gamaliel the son of Pedahzur; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'from [the tribe of] Benjamin, Abidan the son of Gideoni; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'from [the tribe of] Dan, Ahiezer the son of Ammishaddai; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'from [the tribe of] Asher, Pagiel the son of Ochran; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'from [the tribe of] Gad, Eliasaph the son of Deuel; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'from [the tribe of] Naphtali, Ahira the son of Enan. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: These men were the ones called from the congregation, the leaders of their fathers’ (ancestors’) tribes; they were the heads of thousands [the highest ranking officers] in Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Moses and Aaron took these men who were designated by name, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and assembled all the congregation on the first day of the second month, and they registered by ancestry in their families (clans), by their fathers’ households, according to the number of names from twenty years old and upward, head by head, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses. So he numbered them in the Wilderness of Sinai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The sons of Reuben, Israel’s (Jacob’s) firstborn, their generations, by their families (clans), by their fathers’ households, according to the number of names, head by head, every male from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: those of the tribe of Reuben numbered 46,500.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Of the sons of Simeon, their descendants, by their families (clans), by their fathers’ households, their numbered men according to the number of names, head by head, every male from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: those of the tribe of Simeon numbered 59,300.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Of the sons of Gad, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: those of the tribe of Gad numbered 45,650.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Of the sons of Judah, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: those of the tribe of Judah numbered 74,600.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Of the sons of Issachar, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: those of the tribe of Issachar numbered 54,400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Of the sons of Zebulun, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: those of the tribe of Zebulun numbered 57,400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Of the sons of Joseph: the sons (descendants) of Ephraim, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: those of the tribe of Ephraim numbered 40,500.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Of the sons of Manasseh, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: those of the tribe of Manasseh numbered 32,200.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Of the sons of Benjamin, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: those of the tribe of Benjamin numbered 35,400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Of the sons of Dan, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: those of the tribe of Dan numbered 62,700.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Of the sons of Asher, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: those of the tribe of Asher numbered 41,500.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Of the sons of Naphtali, their descendants, by their families (clans), by their fathers’ households, according to the number of names, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war: '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: those of the tribe of Naphtali numbered 53,400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'These were the ones who were numbered, whom Moses and Aaron numbered, with the leaders of Israel, twelve men, each representing his fathers’ household. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'So all those numbered of the sons of Israel, by their fathers’ households, from twenty years old and upward, all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were able to
  - type: text
    text: ' go to war in Israel, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: all who were numbered were 603,550.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Levites Exempted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'The Levites, however, were not numbered among them by their fathers’ tribe. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: '“Only the tribe of Levi you shall not number, nor shall you take their census among the sons of Israel [since they are unavailable to go to war]. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'But appoint the Levites over the tabernacle (sanctuary) of the Testimony, and over all its furnishings and all things that belong to it. They shall carry the tabernacle [when traveling] and all its furnishings, and they shall take care of it and camp around it. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'When the tabernacle is to go forward, the Levites shall take it down; and when the tabernacle is to [be set up for] camp, the Levites shall set it up. But the layman (non-Levite) who approaches the tabernacle shall be put to death. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'The Israelites shall camp according to their armies, every man by his own camp and every man by his own [tribal] standard (banner). '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'But the Levites shall camp around the tabernacle of the Testimony, so that there will be no wrath against the congregation of the Israelites. The Levites shall be in charge of the tabernacle of the Testimony.” '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Thus the sons of Israel did '
  - type: usfm
    marker: it
    children:
    - type: text
      text: these things;
  - type: text
    text: ' according to all that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses, so they did.'
