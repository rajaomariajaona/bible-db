segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Call to Repent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Just at that time some people came who told Jesus about the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These evidently were Jews who had come to Jerusalem to offer sacrifices at the temple. They probably were identified, rightly or wrongly, as rebels whose goal it was to overthrow Roman domination. The graphic description suggests that they were executed outside the temple complex after they had offered their sacrifices.
    marker-yv: yv-n
  - type: text
    text: 'Galileans whose blood Pilate [the governor] had mixed with their sacrifices. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jesus replied to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Do you think that these Galileans were worse sinners than all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' Galileans because they have suffered in this way?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you, no; but unless you repent
  - type: text
    text: ' [change your old way of thinking, turn from your sinful ways and live changed lives], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you will all likewise perish.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Or do you assume that '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: No further details regarding this tragedy are recorded.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: those eighteen on whom the tower in Siloam fell and killed were worse sinners than all the others who live in Jerusalem?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you, no; but unless you repent
  - type: text
    text: ' [change your old way of thinking, turn from your sinful ways and live changed lives], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you will all likewise perish.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Fig Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' telling them this parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A certain man had a fig tree that had been planted in his vineyard; and he came looking for fruit on it, but did not find any;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: so he said to the vineyard-keeper, ‘For three years I have come looking for fruit on this fig tree and have found none. Cut it down! Why does it even use up the ground
  - type: text
    text: ' [depleting the soil and blocking the sunlight]?’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But he replied to him, ‘Let it alone, sir,
  - type: text
    text: ' [just] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: one more year until I dig around it and put in fertilizer;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and if it bears fruit after this, fine; but if not, cut it down.’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Healing on the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now Jesus was teaching in one of the synagogues on the Sabbath. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And there was a woman who for eighteen years had had an illness caused by a spirit (demon). She was bent double, and could not straighten up at all. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Jesus saw her, He called her over and said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Woman, you are released from your illness.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then He laid His hands on her; and immediately she stood erect again and she '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' glorifying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praising God. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But the leader of the synagogue, indignant because Jesus had healed on the Sabbath, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' saying to the crowd in response, “There are six days in which work ought to be done; so come on those days and be healed, and not on the Sabbath day.” [Ex 20:9, 10] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the Lord replied to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You hypocrites (play-actors, pretenders)! Does not each one of you on the Sabbath untie his ox or his donkey from the stall and lead it away to water it?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And this woman, a daughter (descendant) of Abraham whom Satan has bound for eighteen long years, should she not have been released from this bond on the Sabbath day?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: As He was saying this, all His opponents were being humiliated; and the entire crowd was rejoicing over all the glorious things that were being done by Him.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parables of Mustard Seed and Leaven
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So this led Him to say, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What is the kingdom of God like? And to what shall I compare it?
  - type: text
    text: ' [Matt 13:31, 32; Mark 4:30-32] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'It is like a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In ancient Israel the mustard seed was the smallest known seed, and in rabbinic teaching the mustard seed was used as an example of something very small (in the Talmud).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'mustard seed, which a man took and planted in his own garden; and it grew and became a tree, and '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: the birds of the sky found shelter
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nested in its branches
    - type: text
      text: .”
  - type: text
    text: ' [Ezek 17:23; Dan 4:12]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And again He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “To what shall I compare the kingdom of God?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is like leaven, which a woman took and hid in three peck measures of flour until it was all leavened.”
  - type: text
    text: ' [Matt 13:33]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Teaching in the Villages
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus journeyed on through cities and villages, teaching and making His way toward Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And someone asked Him, “Lord, will only a few be saved [from the penalties of the last judgment]?” And He said to them, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Strive to enter through the narrow door
  - type: text
    text: ' [force aside unbelief and the attractions of sin]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for many, I tell you, will try to enter
  - type: text
    text: ' [by their own works] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and will not be able.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Once the head of the house gets up and closes the door, and you begin to stand outside and knock on the door
  - type: text
    text: ' [again and again], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: saying, ‘Lord, open to us!’ then He will answer you, ‘I do not know where you are from
  - type: text
    text: ' [for you are not of My household].’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then you will begin to say, ‘We ate and drank in Your presence, and You taught in our streets’;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'but He will say to you, ‘I do not know where you are from; '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: depart from
    - type: text
      text: ' M'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: all you evildoers
    - type: text
      text: '!’'
  - type: text
    text: ' [Ps 6:8] '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In that place there will be weeping
  - type: text
    text: ' [in sorrow and pain] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and grinding of teeth
  - type: text
    text: ' [in distress and anger] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'when you see Abraham and Isaac and Jacob and all the prophets in the kingdom of God, but yourselves being thrown out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' driven away.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' will come from east and west, and from north and south, and they will sit down'
  - type: text
    text: ' [and feast at the table] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in the kingdom of God.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And behold, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' are last who will be first, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' are first who will be last.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'At that very hour some Pharisees came up and said to Him, “Leave and go away from here, because Herod [Antipas] wants to kill You.” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go and tell that fox
  - type: text
    text: ' [that sly, cowardly man], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '‘Listen carefully: I cast out demons and perform healings today and tomorrow, and on the third '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' I reach My goal.’'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Nevertheless I must travel on today and tomorrow and the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' after that—for it cannot be that a prophet would die outside of Jerusalem.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The nation of Israel personified.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O Jerusalem, Jerusalem, who kills the prophets and stones
  - type: text
    text: ' [to death] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: those
  - type: text
    text: ' [messengers] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who are sent to her
  - type: text
    text: ' [by God]! '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How often I have wanted to gather your children together
  - type: text
    text: ' [around Me], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'just as a hen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gathers
    - type: text
      text: ' her young under her wings, but you were not willing!'
  - type: text
    text: ' [Matt 23:37-39] '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Listen carefully: your house is left to you desolate'
  - type: text
    text: ' [abandoned by God and destitute of His protection]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and I say to you, you will not see Me until '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the time
    - type: text
      text: ' comes when you say, ‘B'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: lessed
  - type: text
    text: ' [to be celebrated with praise] '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: sc
      children:
      - type: text
        text: is
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e who comes in the name of the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '!’ ”'
  - type: text
    text: ' [Ps 118:26; Jer 22:5]'
