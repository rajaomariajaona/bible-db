  - type: text
    content: 'Just at that time some people came who told Jesus about the '
  - type: note
    content: These evidently were Jews who had come to Jerusalem to offer sacrifices at the temple. They probably were identified, rightly or wrongly, as rebels whose goal it was to overthrow Roman domination. The graphic description suggests that they were executed outside the temple complex after they had offered their sacrifices.
