  - type: text
    content: ' be My witnesses, because you have been with Me from the beginning.'
  '3':
  - type: text
    content: You are already clean because of the word which I have given you
  - type: text
    content: ' [the teachings which I have discussed with you]. '
  '4':
  - type: text
    content: Remain in Me, and I
  - type: text
    content: ' [will remain] '
  - type: text
    content: in you. Just as no branch can bear fruit by itself without remaining in the vine, neither can you
  - type: text
    content: ' [bear fruit, producing evidence of your faith] '
  - type: text
    content: unless you remain in Me.
  - type: text
    content: ' '
  '5':
  - type: note
    content: See note v 1.
  - type: text
    content: I am the Vine; you are the branches. The one who remains in Me and I in him bears much fruit, for
  - type: text
    content: ' [otherwise] '
  - type: text
    content: apart from Me
  - type: text
    content: ' [that is, cut off from vital union with Me] '
  - type: text
    content: you can do nothing.
  - type: text
    content: ' '
  '6':
  - type: text
    content: If anyone does not remain in Me, he is thrown out like a
  - type: text
    content: ' [broken off] '
  - type: text
