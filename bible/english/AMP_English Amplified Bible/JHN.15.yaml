  - type: text
    content: No one has greater love
  - type: text
    content: ' [nor stronger commitment] '
  - type: text
    content: than to lay down his own life for his friends.
  - type: text
    content: ' '
  '14':
  - type: text
    content: You are my friends if you keep on doing what I command you.
  - type: text
    content: ' '
