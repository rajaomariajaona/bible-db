document_id: JHN.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Is the Vine—Followers Are Branches
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The seventh of the memorable “I am” statements. See note 6:35.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the true Vine, and My Father is the vinedresser.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Every branch in Me that does not bear fruit, He takes away; and every '
    - type: usfm
      marker: it
      children:
      - type: text
        text: branch
    - type: text
      text: ' that continues to bear fruit, He'
  - type: text
    text: ' [repeatedly] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: prunes, so that it will bear more fruit
  - type: text
    text: ' [even richer and finer fruit]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are already clean because of the word which I have given you
  - type: text
    text: ' [the teachings which I have discussed with you]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Remain in Me, and I
  - type: text
    text: ' [will remain] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in you. Just as no branch can bear fruit by itself without remaining in the vine, neither can you
  - type: text
    text: ' [bear fruit, producing evidence of your faith] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: unless you remain in Me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 1.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the Vine; you are the branches. The one who remains in Me and I in him bears much fruit, for
  - type: text
    text: ' [otherwise] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: apart from Me
  - type: text
    text: ' [that is, cut off from vital union with Me] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you can do nothing.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If anyone does not remain in Me, he is thrown out like a
  - type: text
    text: ' [broken off] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'branch, and withers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dies; and they gather such branches and throw them into the fire, and they are burned.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you remain in Me and My words remain in you
  - type: text
    text: ' [that is, if we are vitally united and My message lives in your heart], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ask whatever you wish and it will be done for you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'My Father is glorified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honored by this, when you bear much fruit, and prove yourselves to be My'
  - type: text
    text: ' [true] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: disciples.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have loved you just as the Father has loved Me; remain in My love
  - type: text
    text: ' [and do not doubt My love for you]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If you keep My commandments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey My teaching, you will remain in My love, just as I have kept My Father’s commandments and remain in His love.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I have told you these things so that My joy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight may be in you, and that your joy may be made full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overflowing.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Disciples’ Relation to Each Other
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“This is My commandment, that you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 13:34.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unselfishly seek the best for one another, just as I have loved you.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No one has greater love
  - type: text
    text: ' [nor stronger commitment] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: than to lay down his own life for his friends.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are my friends if you keep on doing what I command you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I do not call you servants any longer, for the servant does not know what his master is doing; but I have called you
  - type: text
    text: ' [My] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: friends, because I have revealed to you everything that I have heard from My Father.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'You have not chosen Me, but I have chosen you and I have appointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' placed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purposefully planted you, so that you would go and bear fruit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep on bearing, and that your fruit will remain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be lasting, so that whatever you ask of the Father in My name'
  - type: text
    text: ' [as My representative] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He may give to you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This
  - type: text
    text: ' [is what] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I command you: that you love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unselfishly seek the best for one another.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Disciples’ Relation to the World
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If the world hates you
  - type: text
    text: ' [and it does], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'know that it has hated Me before '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it hated
    - type: text
      text: ' you.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you belonged to the world, the world would love
  - type: text
    text: ' [you as] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'its own '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' would treat you with affection. But you are not of the world'
  - type: text
    text: ' [you no longer belong to it], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but I have chosen you out of the world. And because of this the world hates you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Remember
  - type: text
    text: ' [and continue to remember] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that I told you, ‘A servant is not greater than his master.’ If they persecuted Me, they will also persecute you. If they kept My word, they will keep yours also.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But they will do all these
  - type: text
    text: ' [hurtful] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: things to you for My name’s sake
  - type: text
    text: ' [because you bear My name and are identified with Me], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for they do not know the One who sent Me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If I had not come and spoken to them, they would not have
  - type: text
    text: ' [the guilt of their] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sin; but now they have no excuse for their sin.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The one who hates Me also hates My Father.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If I had not done among them the works (attesting miracles) which no one else
  - type: text
    text: ' [ever] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: did, they would not have
  - type: text
    text: ' [the guilt of their] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sin; but now
  - type: text
    text: ' [the fact is that] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: they have both seen
  - type: text
    text: ' [these works] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and have hated Me
  - type: text
    text: ' [and continue to hate Me] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and My Father as well.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But
  - type: text
    text: ' [this is so] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that the word which has been written in their Law would be fulfilled, ‘T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: hey hated
    - type: text
      text: ' M'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e without a cause
    - type: text
      text: .’
  - type: text
    text: ' [Ps 35:19; 69:4]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“But when the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gr '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Paracletos,
      - type: text
        text: ' one called alongside to help.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Helper (Comforter, Advocate, Intercessor—Counselor, Strengthener, Standby) comes, whom I will send to you from the Father, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is
    - type: text
      text: ' the Spirit of Truth who comes from the Father, He will testify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bear witness about Me.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But you will testify also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be My witnesses, because you have been with Me from the beginning.'
