document_id: JHN.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Lord’s Supper
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now before the Passover Feast, Jesus knew that His hour had come [and it was time] for Him to leave this world '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' return to the Father. Having [greatly] loved His own who were in the world, He loved them [and continuously loves them with His perfect love] to the end (eternally). '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Anyone who has bathed needs only to wash his feet, and is completely clean. And you
    - type: text
      text: ' [My disciples] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'are clean, but not all '
      - type: usfm
        marker: it
        children:
        - type: text
          text: of you.
      - type: text
        text: ”
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For He knew who was going to betray Him; for that reason He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Not all of you are clean.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when He had washed their feet and put on His [outer] robe and reclined '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table
    - type: text
      text: ' again, He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you understand what I have done for you?
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'You call Me Teacher and Lord, and you are right in doing so, for '
      - type: usfm
        marker: it
        children:
        - type: text
          text: that is who
      - type: text
        text: ' I am.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So if I, the Lord and the Teacher, washed your feet, you ought to wash one another’s feet as well.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I gave you
    - type: text
      text: ' [this as] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: an example, so that you should do
    - type: text
      text: ' [in turn] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: as I did to you.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, a slave is not greater than his master, nor is one who is sent greater than the one who sent him.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you know these things, you are blessed
    - type: text
      text: ' [happy and favored by God] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: if you put them into practice
    - type: text
      text: ' [and faithfully do them]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am not speaking of all of you. I know whom I have chosen; but
    - type: text
      text: ' [this has happened] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'in order that the Scripture may be fulfilled: ‘H'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: e who eats
      - type: text
        text: ' M'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: y bread has raised up his heel against
      - type: text
        text: ' M'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: e
    - type: text
      text: ' [as My enemy].’ [Ps 41:9] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: From now on I am telling you
    - type: text
      text: ' [what will happen] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'before it occurs, so that when it does take place you may believe that I am '
      - type: usfm
        marker: it
        children:
        - type: text
          text: He
    - type: text
      text: ' [who I say I am—the Christ, the Anointed, the Messiah]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was during supper, when the devil had already put [the thought of] betraying Jesus into the heart of Judas Iscariot, Simon’s son, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, the one who receives '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' welcomes whomever I send receives Me; and the one who receives Me receives Him who sent Me'
    - type: text
      text: ' [in that same way].”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Predicts His Betrayal
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Jesus had said these things, He was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 11:33.
      marker-yv: yv-n
    - type: text
      text: 'troubled in spirit, and testified and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, one of you will betray Me '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' hand Me over.”'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The disciples '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' looking at one another, puzzled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disturbed as to whom He could mean. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably John the Apostle, author of this Gospel and brother of James the Apostle. The mother of John and James was Salome, who is believed to be the sister of Mary, the mother of Jesus. If so, Jesus and the brothers were related as cousins.
      marker-yv: yv-n
    - type: text
      text: 'One of His disciples, whom Jesus loved (esteemed), was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As was customary in ancient times, everyone at the meal was reclining on his side on a long dining couch or bench. When there was a pause during the meal for discussion, it was common among close friends for one to lean back on the chest or shoulder of the other.
      marker-yv: yv-n
    - type: text
      text: 'leaning against Jesus’ chest. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Simon Peter motioned to him (John) and [quietly] asked [him to ask Jesus] of whom He was speaking. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then leaning back against Jesus’ chest, he (John) asked Him [privately], “Lord, who is it?” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is the one to whom I am going to give this piece
    - type: text
      text: ' [of bread] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: after I have dipped it.”
    - type: text
      text: ' So when He had dipped the piece of bread [into the dish], He gave it to Judas, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: son
    - type: text
      text: ' of Simon Iscariot. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After [Judas had taken] the piece of bread, Satan entered him. Then Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What you are going to do, do quickly
    - type: text
      text: ' [without delay].” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But no one reclining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table
    - type: text
      text: ' knew why He said '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' to him. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some thought that, since Judas [as the treasurer of the group] had the money box, Jesus was telling him, “Buy what we need for the feast,” or that he was to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Passover was considered a special time for charitable gifts to the poor.
      marker-yv: yv-n
    - type: text
      text: 'give something to the poor. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that Jesus, knowing that the Father had put everything into His hands, and that He had come from God and was [now] returning to God, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After taking the piece of bread, he went out immediately; and it was night.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when Judas had left, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now is
    - type: text
      text: ' [the time for] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the Son of Man
    - type: text
      text: ' [to be] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: glorified, and God is glorified in Him;
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most early mss do not contain this phrase.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '[if God is glorified in Him,] God will also glorify Him (the Son) in Himself, and will glorify Him at once.'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Little children, I am with you
    - type: text
      text: ' [only] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: a little longer. You will look for Me and, as I told the Jews, so I tell you now, ‘Where I am going, you are not able to come.’
    - type: text
      text: ' [John 8:21] '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I am giving you a new commandment, that you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: agape)
        - type: text
          text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: love one another. Just as I have loved you, so you too are to love one another.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'By this everyone will know that you are My disciples, if you have love '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' unselfish concern for one another.”'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Peter said to Him, “Lord, where are You going?” Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Where I am going, you cannot follow Me now; but you will be able to follow later.”
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter said to Him, “Lord, why cannot I follow You now? I will lay down my life for You!” [Matt 26:33-35; Mark 14:29-31; Luke 22:33, 34] '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Will you
    - type: text
      text: ' [really] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'lay down your life for Me? I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, before a rooster crows you will deny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' completely disown Me three times.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: got up from supper, took off His [outer] robe, and taking a [servant’s] towel, He tied it around His waist.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Washes the Disciples’ Feet
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then He poured water into the basin and began washing the disciples’ feet and wiping them with the towel which was tied around His waist. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When He came to Simon Peter, he said to Him, “Lord, are You going to wash my feet?” '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus replied to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You do not realize now what I am doing, but you will
    - type: text
      text: ' [fully] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: understand it later.”
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Peter said to Him, “You will never wash my feet!” Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Unless I wash you, you have no part with Me
    - type: text
      text: ' [we can have nothing to do with each other].” '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Simon Peter said to Him, “Lord, [in that case, wash] not only my feet, but also my hands and my head!” '
