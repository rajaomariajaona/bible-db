  '23':
  - type: note
    content: Probably John the Apostle, author of this Gospel and brother of James the Apostle. The mother of John and James was Salome, who is believed to be the sister of Mary, the mother of Jesus. If so, Jesus and the brothers were related as cousins.
  - type: text
    content: 'One of His disciples, whom Jesus loved (esteemed), was '
  - type: note
    content: As was customary in ancient times, everyone at the meal was reclining on his side on a long dining couch or bench. When there was a pause during the meal for discussion, it was common among close friends for one to lean back on the chest or shoulder of the other.
  - type: text
    content: 'leaning against Jesus’ chest. '
  '24':
  - type: text
    content: 'So Simon Peter motioned to him (John) and [quietly] asked [him to ask Jesus] of whom He was speaking. '
  '25':
  - type: text
    content: 'Then leaning back against Jesus’ chest, he (John) asked Him [privately], “Lord, who is it?” '
