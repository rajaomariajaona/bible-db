type_code: eng
verses:
  '1':
  - type: heading
    content: King Rehoboam Acts Foolishly
  - type: text
    content: 'Rehoboam went to '
  - type: note
    content: An important city located in the tribal territory of Ephraim, about thirty miles north of Jerusalem.
  - type: text
    content: 'Shechem, for all Israel had come to Shechem to make him king. '
  '10':
  - type: text
    content: 'The young men who had grown up with him answered, “This is what you should say to this people who told you, ‘Your father made our yoke heavy, but as for you, make our yoke lighter’—say this to them: ‘My little finger is thicker than my father’s loins [and my reign will be even more severe]. '
  '11':
  - type: text
    content: 'And now, whereas my father loaded you with a heavy yoke, I will add to your yoke. My father disciplined you with whips, but I will discipline you with '
  - type: note
    content: I.e. whips with sharp metal studs.
  - type: text
    content: scorpions.’ ”
  '12':
  - type: text
    content: 'Jeroboam and all the people came back to Rehoboam on the third day, just as the king had instructed, saying, “Return to me on the third day.” '
  '13':
  - type: text
    content: 'The king answered the people harshly and '
  - type: note
    content: Lit forsook.
  - type: text
    content: 'ignored the advice which the elders had given him, '
  '14':
  - type: text
    content: 'and spoke to them in accordance with the advice of the young men, saying, “My father made your yoke heavy, but as for me, I will add to your yoke; my father disciplined you with whips, but I will discipline you with scorpions.” '
  '15':
  - type: text
    content: So the king did not listen to the people; for the situation was from the L
  - type: heading
    content: ord
  - type: text
    content: ', so that He might fulfill His word which He spoke through Ahijah the Shilonite to Jeroboam the son of Nebat. [1 Kin 11:29-33]'
  - type: heading
    content: The Kingdom Divided; Jeroboam Rules Israel
  '16':
  - type: text
    content: So when all [the ten northern tribes of] Israel saw that the king did not listen to them, the people replied to the king, saying,
  - type: text
    content: “What portion do we have in David?
  - type: text
    content: We have
  - type: text
    content: ' no inheritance in the son of Jesse;'
  - type: text
    content: To your tents, O Israel!
  - type: text
    content: 'Look now after '
  - type: note
    content: This verse indicates the decision of the ten northern tribes to break away from David’s dynasty and, in so doing, creating the divided kingdom—Israel in the north and Judah (David’s tribe) in the south.
  - type: text
    content: your own house, David!”
  - type: text
    content: 'Then Israel went back to their tents. '
  '17':
  - type: text
    content: 'But as for the sons (descendants) of Israel who lived in the cities of Judah [including Benjamin], Rehoboam reigned over them. '
  '18':
  - type: text
    content: 'Then King Rehoboam sent '
  - type: note
    content: Adoniram in 4:6; 5:14.
  - type: text
    content: 'Adoram, who was in charge of the forced labor [to represent him], and all Israel stoned him to death. And King Rehoboam quickly mounted his chariot to escape to Jerusalem. '
  '19':
  - type: text
    content: So Israel (the ten northern tribes) has rebelled against the house (royal line) of David to this day (the date of this writing).
  '2':
  - type: text
    content: 'Now when Jeroboam the son of Nebat heard about it, he was living in Egypt (for he was still in Egypt, where he had fled from King Solomon). '
  '20':
  - type: text
    content: 'It came about when all Israel heard that Jeroboam had returned, that they sent '
  - type: text
    content: word
  - type: text
    content: ' and called him to the assembly and made him king over all Israel. None followed the house of David except the tribe of Judah [including Benjamin].'
  '21':
  - type: text
    content: 'Now when Rehoboam arrived in Jerusalem, he assembled all the [fighting men from the] house of Judah, with the tribe of Benjamin, 180,000 chosen warriors, to fight against the house of Israel to bring the kingdom back to Rehoboam the son of Solomon. '
  '22':
  - type: text
    content: 'But the word of God came to Shemaiah the man of God, saying, '
  '23':
  - type: text
    content: '“Tell Rehoboam the son of Solomon, king of Judah, and all the house (fighting men) of Judah and Benjamin and the rest of the people, '
  '24':
  - type: text
    content: ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “You shall not go up and fight against your brothers, the sons of Israel. Let every man return to his house, for this thing has come about from Me.” ’ ” So they listened to the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and returned to go home, in accordance with the word of the L'
  - type: heading
    content: ord
  - type: text
    content: .
  - type: heading
    content: Jeroboam’s Idolatry
  '25':
  - type: text
    content: 'Then Jeroboam built Shechem [as his royal city] in the hill country of Ephraim and lived there. He went out from there and rebuilt Penuel [as a stronghold]. '
  '26':
  - type: text
    content: 'Jeroboam [doubted God’s promise to him and] said in his heart, “Now the kingdom will return to the house of David. [1 Kin 11:38] '
  '27':
  - type: text
    content: If these people go up to the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' in Jerusalem to offer sacrifices, then their heart will turn to their lord, to Rehoboam king of Judah; and they will kill me and return to Rehoboam king of Judah.” '
  '28':
  - type: text
    content: 'So the king took counsel [and followed bad advice] and made two '
  - type: note
    content: Cf the incident of the golden calf in the wilderness, and see note Ex 32:4. Jeroboam evidently was convinced that the Israelites would respond to calf idols just as their ancestors had (despite the consequences), and unfortunately he was right.
  - type: text
    content: 'calves of gold. And he said to the people, “It is too much for you to go [all the way] up to Jerusalem; behold your gods, O Israel, who brought you up out of the land of Egypt.” '
  '29':
  - type: text
    content: 'He set the one [golden calf] in Bethel, and the other he put in '
  - type: note
    content: Northernmost city in Jeroboam’s kingdom.
  - type: text
    content: 'Dan. '
  '3':
  - type: text
    content: 'So they sent '
  - type: text
    content: word
  - type: text
    content: ' and called for him, and Jeroboam and all the assembly of Israel came and spoke to Rehoboam, saying, '
  '30':
  - type: text
    content: 'Now this thing became a sin [for Israel]; because the people went '
  - type: text
    content: to worship
  - type: text
    content: ' before the one [or the other of them] as far as Dan. '
  '31':
  - type: text
    content: 'And Jeroboam also made houses on high places, and he made priests from '
  - type: note
    content: Lit the extremities of the people.
  - type: text
    content: 'all people who were not of the sons (descendants) of Levi. '
  '32':
  - type: text
    content: 'Jeroboam held a feast on the fifteenth day of the '
  - type: note
    content: Jeroboam chose the eighth month to worship idols in competition with the Feast of Booths in Jerusalem during the seventh month at the temple.
  - type: text
    content: 'eighth month, like the feast which is '
  - type: text
    content: kept
  - type: text
    content: ' in Judah, and he went up to the altar; he did this in Bethel, sacrificing to the calves which he had made. And he stationed in Bethel the priests of the high places which he had made. [Lev 23:34] '
  '33':
  - type: text
    content: 'So he went up to the altar which he had made in Bethel on the fifteenth day of the eighth month, in the month which he had devised in his own heart [in defiance of God’s commandments]; and he held a feast for the Israelites and he went up to the altar to burn '
  - type: note
    content: Or sacrifices.
  - type: text
    content: incense [in defiance of God’s law.]
  '4':
  - type: text
    content: '“Your father made our yoke (burden) heavy; so now lighten the hard labor and the heavy yoke your father imposed on us, and we will serve you.” '
  '5':
  - type: text
    content: Rehoboam replied to them, “Leave for three days, then come back to me [for my decision].” So the people left.
  '6':
  - type: text
    content: 'King Rehoboam consulted with the elders who had served '
  - type: text
    content: and
  - type: text
    content: ' advised his father Solomon while he was still alive and said, “How do you advise me to answer this people?” '
  '7':
  - type: text
    content: 'They spoke to him, saying, “If you will be a servant to this people today, and will serve them and grant their request, and speak good words to them, then they will be your servants forever.” '
  '8':
  - type: text
    content: 'But he '
  - type: note
    content: Lit forsook. Rehoboam’s decision was his own responsibility, but like Pharaoh in his dealings with Moses, Rehoboam was also led by the Lord to respond as he did so that the will of the Lord would be carried out (see v 15).
  - type: text
    content: 'ignored the advice which the elders gave him and consulted the young men who grew up with him and served him. '
  '9':
  - type: text
    content: 'He said to them, “What do you advise that we answer this people who have said to me, ‘Lighten the yoke (burden) which your father put on us’?” '
