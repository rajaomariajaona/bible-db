document_id: 1KI.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: King Rehoboam Acts Foolishly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoboam went to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An important city located in the tribal territory of Ephraim, about thirty miles north of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'Shechem, for all Israel had come to Shechem to make him king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The young men who had grown up with him answered, “This is what you should say to this people who told you, ‘Your father made our yoke heavy, but as for you, make our yoke lighter’—say this to them: ‘My little finger is thicker than my father’s loins [and my reign will be even more severe]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, whereas my father loaded you with a heavy yoke, I will add to your yoke. My father disciplined you with whips, but I will discipline you with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. whips with sharp metal studs.
      marker-yv: yv-n
    - type: text
      text: scorpions.’ ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeroboam and all the people came back to Rehoboam on the third day, just as the king had instructed, saying, “Return to me on the third day.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king answered the people harshly and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsook
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ignored the advice which the elders had given him, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and spoke to them in accordance with the advice of the young men, saying, “My father made your yoke heavy, but as for me, I will add to your yoke; my father disciplined you with whips, but I will discipline you with scorpions.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king did not listen to the people; for the situation was from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', so that He might fulfill His word which He spoke through Ahijah the Shilonite to Jeroboam the son of Nebat. [1 Kin 11:29-33]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Kingdom Divided; Jeroboam Rules Israel
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So when all [the ten northern tribes of] Israel saw that the king did not listen to them, the people replied to the king, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What portion do we have in David?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: We have
    - type: text
      text: ' no inheritance in the son of Jesse;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To your tents, O Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look now after '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse indicates the decision of the ten northern tribes to break away from David’s dynasty and, in so doing, creating the divided kingdom—Israel in the north and Judah (David’s tribe) in the south.
      marker-yv: yv-n
    - type: text
      text: your own house, David!”
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Israel went back to their tents. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But as for the sons (descendants) of Israel who lived in the cities of Judah [including Benjamin], Rehoboam reigned over them. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then King Rehoboam sent '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:18 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Adoniram
        - type: text
          text: ' in 4:6; 5:14.'
      marker-yv: yv-n
    - type: text
      text: 'Adoram, who was in charge of the forced labor [to represent him], and all Israel stoned him to death. And King Rehoboam quickly mounted his chariot to escape to Jerusalem. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So Israel (the ten northern tribes) has rebelled against the house (royal line) of David to this day (the date of this writing).
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Jeroboam the son of Nebat heard about it, he was living in Egypt (for he was still in Egypt, where he had fled from King Solomon). '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It came about when all Israel heard that Jeroboam had returned, that they sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and called him to the assembly and made him king over all Israel. None followed the house of David except the tribe of Judah [including Benjamin].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Rehoboam arrived in Jerusalem, he assembled all the [fighting men from the] house of Judah, with the tribe of Benjamin, 180,000 chosen warriors, to fight against the house of Israel to bring the kingdom back to Rehoboam the son of Solomon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the word of God came to Shemaiah the man of God, saying, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Tell Rehoboam the son of Solomon, king of Judah, and all the house (fighting men) of Judah and Benjamin and the rest of the people, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “You shall not go up and fight against your brothers, the sons of Israel. Let every man return to his house, for this thing has come about from Me.” ’ ” So they listened to the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and returned to go home, in accordance with the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeroboam’s Idolatry
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jeroboam built Shechem [as his royal city] in the hill country of Ephraim and lived there. He went out from there and rebuilt Penuel [as a stronghold]. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeroboam [doubted God’s promise to him and] said in his heart, “Now the kingdom will return to the house of David. [1 Kin 11:38] '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If these people go up to the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in Jerusalem to offer sacrifices, then their heart will turn to their lord, to Rehoboam king of Judah; and they will kill me and return to Rehoboam king of Judah.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king took counsel [and followed bad advice] and made two '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf the incident of the golden calf in the wilderness, and see note Ex 32:4. Jeroboam evidently was convinced that the Israelites would respond to calf idols just as their ancestors had (despite the consequences), and unfortunately he was right.
      marker-yv: yv-n
    - type: text
      text: 'calves of gold. And he said to the people, “It is too much for you to go [all the way] up to Jerusalem; behold your gods, O Israel, who brought you up out of the land of Egypt.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He set the one [golden calf] in Bethel, and the other he put in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Northernmost city in Jeroboam’s kingdom.
      marker-yv: yv-n
    - type: text
      text: 'Dan. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and called for him, and Jeroboam and all the assembly of Israel came and spoke to Rehoboam, saying, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now this thing became a sin [for Israel]; because the people went '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to worship
    - type: text
      text: ' before the one [or the other of them] as far as Dan. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jeroboam also made houses on high places, and he made priests from '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the extremities of the people
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'all people who were not of the sons (descendants) of Levi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeroboam held a feast on the fifteenth day of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jeroboam chose the eighth month to worship idols in competition with the Feast of Booths in Jerusalem during the seventh month at the temple.
      marker-yv: yv-n
    - type: text
      text: 'eighth month, like the feast which is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kept
    - type: text
      text: ' in Judah, and he went up to the altar; he did this in Bethel, sacrificing to the calves which he had made. And he stationed in Bethel the priests of the high places which he had made. [Lev 23:34] '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went up to the altar which he had made in Bethel on the fifteenth day of the eighth month, in the month which he had devised in his own heart [in defiance of God’s commandments]; and he held a feast for the Israelites and he went up to the altar to burn '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sacrifices.
      marker-yv: yv-n
    - type: text
      text: incense [in defiance of God’s law.]
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Your father made our yoke (burden) heavy; so now lighten the hard labor and the heavy yoke your father imposed on us, and we will serve you.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehoboam replied to them, “Leave for three days, then come back to me [for my decision].” So the people left.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Rehoboam consulted with the elders who had served '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' advised his father Solomon while he was still alive and said, “How do you advise me to answer this people?” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They spoke to him, saying, “If you will be a servant to this people today, and will serve them and grant their request, and speak good words to them, then they will be your servants forever.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsook
        - type: text
          text: . Rehoboam’s decision was his own responsibility, but like Pharaoh in his dealings with Moses, Rehoboam was also led by the Lord to respond as he did so that the will of the Lord would be carried out (see v 15).
      marker-yv: yv-n
    - type: text
      text: 'ignored the advice which the elders gave him and consulted the young men who grew up with him and served him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, “What do you advise that we answer this people who have said to me, ‘Lighten the yoke (burden) which your father put on us’?” '
