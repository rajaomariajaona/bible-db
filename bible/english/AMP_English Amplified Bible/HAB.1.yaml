  - type: text
    content: Why then do You look favorably
  - type: text
    content: On those who act treacherously?
  - type: text
    content: Why are you silent when the wicked (Chaldean oppressors) destroy
  - type: text
    content: Those more righteous than they?
  '14':
  - type: text
    content: Why do You make men like the fish of the sea,
  - type: text
    content: 'Like reptiles '
  - type: text
    content: and
  - type: text
    content: ' creeping things that have no ruler [and are helpless against their enemies]?'
  '15':
  - type: text
    content: ' '
  - type: text
    content: The Chaldeans
  - type: text
    content: ' bring all of them up with a hook,'
  - type: text
    content: And drag them away with a net,
  - type: text
    content: And gather them together in their fishing net;
  - type: text
    content: So they rejoice and are glad.
  '16':
  - type: text
    content: Therefore, they offer sacrifices to their net
  - type: text
