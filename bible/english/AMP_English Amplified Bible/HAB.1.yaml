  - type: text
    content: And [mercilessly] go on destroying nations without sparing?
  '2':
  - type: text
    content: ¶O L
  - type: heading
    content: ord
  - type: text
    content: ', how long will I call for help'
  - type: text
    content: And You will not hear?
  - type: text
    content: I cry out to You, “Violence!”
  - type: text
    content: Yet You do not save.
  '3':
  - type: text
    content: Why do You make me see iniquity,
  - type: text
    content: And cause me to look on wickedness?
  - type: text
    content: For destruction and violence are before me;
  - type: text
    content: Strife continues and contention arises.
  '4':
