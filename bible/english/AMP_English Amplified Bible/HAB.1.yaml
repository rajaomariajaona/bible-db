  '6':
  - type: text
    content: '“For behold, I am raising up the '
  - type: note
    content: The Chaldeans were the dominant people in Babylonia. Originally from a small part of southern Babylonia near the head of the Persian Gulf, they were an aggressive tribe and completely controlled the country after 625 b.c. Babylon was their capital city and became the scholarly and scientific center of western Asia. The words “Chaldean” and “Babylonian” are used interchangeably.
  - type: text
    content: 'Chaldeans [who rule in '
  - type: note
    content: “Babylon” was the name of the magnificent capital city of Babylonia, and the name of the city was commonly used to refer to the entire area which was located at the eastern end of the Fertile Crescent. Both the plain of Shinar and Chaldea (land of the Chaldeans) were part of ancient Babylonia.
  - type: text
    content: Babylon],
  - type: text
    content: That fierce and impetuous nation
  - type: text
    content: Who march throughout the earth
  - type: text
    content: To take possession of dwelling places that do not belong to them. [2 Kin 24:2]
  '7':
  - type: text
    content: “The Chaldeans are dreaded and feared;
  - type: text
