document_id: HAB.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Chaldeans Used to Punish Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an urgent message the prophet is under compulsion to proclaim.
    marker-yv: yv-n
  - type: text
    text: oracle (a burdensome message—a pronouncement from God) which Habakkuk the prophet saw.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ¶O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', how long will I call for help'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And You will not hear?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I cry out to You, “Violence!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet You do not save.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Why do You make me see iniquity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cause me to look on wickedness?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For destruction and violence are before me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strife continues and contention arises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore, the law is ineffective '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ignored'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And justice is never upheld,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the wicked surround the righteous;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, justice becomes perverted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶[The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' replied,] “Look among the nations! See!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be astonished! Wonder!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am doing something in your days—
- type: usfm
  marker: q1
  children:
  - type: text
    text: You would not believe it if you were told. [Acts 13:40, 41]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“For behold, I am raising up the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Chaldeans were the dominant people in Babylonia. Originally from a small part of southern Babylonia near the head of the Persian Gulf, they were an aggressive tribe and completely controlled the country after 625 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . Babylon was their capital city and became the scholarly and scientific center of western Asia. The words “Chaldean” and “Babylonian” are used interchangeably.
    marker-yv: yv-n
  - type: text
    text: 'Chaldeans [who rule in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Babylon” was the name of the magnificent capital city of Babylonia, and the name of the city was commonly used to refer to the entire area which was located at the eastern end of the Fertile Crescent. Both the plain of Shinar and Chaldea (land of the Chaldeans) were part of ancient Babylonia.
    marker-yv: yv-n
  - type: text
    text: Babylon],
- type: usfm
  marker: q1
  children:
  - type: text
    text: That fierce and impetuous nation
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who march throughout the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: To take possession of dwelling places that do not belong to them. [2 Kin 24:2]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “The Chaldeans are dreaded and feared;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their justice and authority originate with themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are defined only by their decree.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Their horses are swifter than leopards
- type: usfm
  marker: q1
  children:
  - type: text
    text: And keener than [hungry] wolves in the evening,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their horsemen come galloping,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their horsemen come from far away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They fly like an eagle swooping down to devour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “They all come for violence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their horde of faces moves [eagerly] forward,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They gather prisoners like sand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “They make fun of kings
- type: usfm
  marker: q1
  children:
  - type: text
    text: And rulers are a laughing matter to them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They ridicule every stronghold
- type: usfm
  marker: q1
  children:
  - type: text
    text: And heap up rubble [for earth mounds] and capture it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Then they will sweep by like the wind and pass on.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they will be held guilty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They [and all men] whose own power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strength is their god.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶Are You not from everlasting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', my God, My Holy One?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: We will not die.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', You have appointed the Chaldeans [who rule in Babylon] to execute [Your] judgment,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And You, O Rock, have established them to correct '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chastise. [Deut 32:4]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Your eyes are too pure to approve evil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And You cannot look '
  - type: usfm
    marker: it
    children:
    - type: text
      text: favorably
  - type: text
    text: ' on wickedness.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why then do You look favorably
- type: usfm
  marker: q1
  children:
  - type: text
    text: On those who act treacherously?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why are you silent when the wicked (Chaldean oppressors) destroy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those more righteous than they?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Why do You make men like the fish of the sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Like reptiles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' creeping things that have no ruler [and are helpless against their enemies]?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chaldeans
  - type: text
    text: ' bring all of them up with a hook,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And drag them away with a net,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gather them together in their fishing net;
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they rejoice and are glad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Therefore, they offer sacrifices to their net
- type: usfm
  marker: q1
  children:
  - type: text
    text: And burn incense to their fishing net;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because through these things their catch is large '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they live luxuriously,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their food is plentiful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Will they continue to empty their net
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [mercilessly] go on destroying nations without sparing?
