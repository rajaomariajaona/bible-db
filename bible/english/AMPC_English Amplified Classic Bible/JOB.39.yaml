document_id: JOB.39,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' DO YOU know the time when the wild goats of the rock bring forth [their young]? [Or] do you observe when the hinds are giving birth? [Do you attend to all this, Job?]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Can you bind the wild ox with a harness to the plow in the furrow? Or will he harrow the furrows for you?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Will you trust him because his strength is great, or to him will you leave your labor?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Will you depend upon him to bring home your seed and gather the grain of your threshing floor? [Who, Job, was the author of this strange variance in the disposition of animals so alike in appearance? Was it you?]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The wings of the ostrich wave proudly, [but] are they the pinions and plumage of love?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The ostrich leaves her eggs on the ground and warms them in the dust,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Forgetting that a foot may crush them or that the wild beast may trample them.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' She is hardened against her young ones, as though they were not hers; her labor is in vain because she has no sense of danger [for her unborn brood],'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' For God has deprived her of wisdom, neither has He imparted to her understanding.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Yet when she lifts herself up in flight, [so swift is she that] she can laugh to scorn the horse and his rider.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Have you given the horse his might? Have you clothed his neck with quivering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a shaking mane?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Can you number the months that they carry their offspring? Or do you know the time when they are delivered,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Was it you [Job] who made him to leap like a locust? The majesty of his [snorting] nostrils is terrible.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' He paws in the valley and exults in his strength; he goes out to meet the weapons [of armed men].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' He mocks at fear and is not dismayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' terrified; neither does he turn back [in battle] from the sword.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' The quiver rattles upon him, as do the glittering spear and the lance [of his rider].'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' [He seems in running to] devour the ground with fierceness and rage; neither can he stand still at the sound of the [war] trumpet.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' As often as the trumpet sounds he says, Ha, ha! And he smells the battle from afar, the thunder of the captains, and the shouting.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Is it by your wisdom [Job] that the hawk soars and stretches her wings toward the south [as winter approaches]?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Does the eagle mount up at your command and make his nest on [a] high [inaccessible place]?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' On the cliff he dwells and remains securely, upon the point of the rock and the stronghold.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' From there he spies out the prey; and his eyes see it afar off.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' When they bow themselves, bring forth their young ones, [and] cast out their pains?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' His young ones suck up blood, and where the slain are, there is he.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Their young ones become strong, they grow up in the open field; they go forth and return not to them.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Who has sent out the wild donkey, giving him his freedom? Or who has loosed the bands of the swift donkey [by which his tame brother is bound–he, the shy, the swift-footed, and the untamable],'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Whose home I have made the wilderness, and the salt land his dwelling place?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' He scorns the tumult of the city and hears not the shoutings of the taskmaster.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' The range of the mountains is his pasture, and he searches after every green thing.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Will the wild ox be willing to serve you, or remain beside your manger?'
