document_id: ACT.24,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' FIVE DAYS later, the high priest Ananias came down [from Jerusalem to Caesarea] with some elders and a certain forensic advocate Tertullus [acting as spokesman and counsel]. They presented to the governor their evidence against Paul.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the governor had beckoned to Paul to speak, he answered: Because I know that for many years you have been a judge over this nation, I find it easier to make my defense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do it cheerfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with good courage.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As you can readily verify, it is not more than twelve days since I went up to Jerusalem to worship;'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And neither in the temple nor in the synagogues nor in the city did they find me disputing with anybody or bringing together a seditious crowd.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Neither can they present argument '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' evidence to prove to you what they now bring against me.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But this I confess to you, however, that in accordance with the Way [of the Lord], which they call a [heretical, division-producing] sect, I worship (serve) the God of our fathers, still persuaded of the truth of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' believing in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' placing full confidence in everything laid down in the Law [of Moses] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' written in the prophets;'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Having [the same] hope in God which these themselves hold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' look for, that there is to be a resurrection both of the righteous and the unrighteous (the just and the unjust).'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore I always exercise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline myself [mortifying my body, deadening my carnal affections, bodily appetites, and worldly desires, endeavoring in all respects] to have a clear (unshaken, blameless) conscience, void of offense toward God and toward men.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now after several years I came up [to Jerusalem] to bring to my people contributions of charity and offerings.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' While I was engaged in presenting these, they found me [occupied in the rites of purification] in the temple, without any crowd or uproar. But some Jews from [the province of] Asia [were there],'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who ought to be here before you and to present their charges, if they have anything against me.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when he was called, Tertullus began the complaint [against him] by saying: Since through you we obtain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoy much peace, and since by your foresight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provision wonderful reforms (amendments and improvements) are introduced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' effected on behalf of this nation,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Or else let these men themselves tell of what crime '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' wrongdoing they found me guilty when I appeared before the council (Sanhedrin),'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Unless it be this one sentence which I cried out as I stood among them, In regard to the resurrection of the dead I am indicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' on trial before you this day!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Felix, having a rather accurate understanding of the Way [of the Lord], put them off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adjourned the trial, saying, When Lysias the commandant comes down, I will determine your case more fully.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then he ordered the centurion to keep [Paul] in custody, but to treat him with indulgence [giving him some liberty] and not to hinder his friends from ministering to his needs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' serving him.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Some days later Felix came with his wife Drusilla, who was a Jewess; and he sent for Paul and listened to him [talk] about faith in Christ Jesus.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But as he continued to argue about uprightness, purity of life (the control of the passions), and the judgment to come, Felix became alarmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrified and said, Go away for the present; when I have a convenient opportunity, I will send for you.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At the same time he hoped to get money from Paul, for which reason he continued to send for him and was in his company '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conversed with him often.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when two years had gone by, Felix was succeeded in office by Porcius Festus; and wishing to gain favor with the Jews, Felix left Paul still a prisoner in chains.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In every way and in every place, most excellent Felix, we accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge this with deep appreciation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with all gratitude.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But not to hinder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' detain you too long, I beg you in your clemency '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' courtesy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kindness to grant us a brief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' concise hearing.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For we have found this man a perfect pest (a real plague), an agitator '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' source of disturbance to all the Jews throughout the world, and a ringleader of the [heretical, division-producing] sect of the Nazarenes.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He also [even] tried to desecrate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defile the temple, but we laid hands on him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and would have sentenced him by our Law,
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: But the commandant Lysias came and took him from us with violence and force,
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: And ordered his accusers to present themselves to you.
    - type: text
      text: ' By examining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cross-questioning him yourself, you will be able to ascertain the truth from him about all these things with which we charge him.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Jews also agreed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' joined in the accusation, declaring that all these things were exactly so.'
