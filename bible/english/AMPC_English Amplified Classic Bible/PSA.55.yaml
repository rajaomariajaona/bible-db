document_id: PSA.55,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; with stringed instruments. A skillful song, {or} a didactic {or} reflective poem, of David.
  - type: text
    content: ' LISTEN TO my prayer, O God, and hide not Yourself from my supplication!'
  '10':
  - type: text
    content: ' Day and night they go about on its walls; iniquity and mischief are in its midst.'
  '11':
  - type: text
    content: ' Violence '
  - type: text
    content: and
  - type: text
    content: ' ruin are within it; fraud and guile do not depart from its streets '
  - type: text
    content: and
  - type: text
    content: ' marketplaces.'
  '12':
  - type: text
    content: ' For it is not an enemy who reproaches '
  - type: text
    content: and
  - type: text
    content: ' taunts me–then I might bear it; nor is it one who has hated me who insolently vaunts himself against me–then I might hide from him.'
  '13':
  - type: text
    content: ' But it was you, a man my equal, my companion and my familiar friend.'
  '14':
  - type: text
    content: ' We had sweet fellowship together and used to walk to the house of God in company.'
  '15':
  - type: text
    content: ' Let desolations '
  - type: text
    content: and
  - type: text
    content: ' death come suddenly upon them; let them go down alive to Sheol (the place of the dead), for evils are in their habitations, in their hearts, '
  - type: text
    content: and
  - type: text
    content: ' their inmost part.'
  '16':
  - type: text
    content: ' As for me, I will call upon God, and the Lord will save me.'
  '17':
  - type: text
    content: ' Evening and morning and at noon will I utter my complaint and moan '
  - type: text
    content: and
  - type: text
    content: ' sigh, and He will hear my voice.'
  '18':
  - type: text
    content: ' He has redeemed my life in peace from the battle that was against me [so that none came near me], for they were many who strove with me.'
  '19':
  - type: text
    content: ' God will hear and humble them, even He Who abides of old–Selah [pause, and calmly think of that]!–because in them there has been no change [of heart], and they do not fear, revere, '
  - type: text
    content: and
  - type: text
    content: ' worship God.'
  '2':
  - type: text
    content: ' Attend to me and answer me; I am restless '
  - type: text
    content: and
  - type: text
    content: ' distraught in my complaint and must moan'
  '20':
  - type: text
    content: ' [My companion] has put forth his hands against those who were at peace with him; he has broken '
  - type: text
    content: and
  - type: text
    content: ' profaned his agreement [of friendship and loyalty].'
  '21':
  - type: text
    content: ' The words of his mouth were smoother than cream '
  - type: text
    content: or
  - type: text
    content: ' butter, but war was in his heart; his words were softer than oil, yet they were drawn swords.'
  '22':
  - type: text
    content: ' Cast your burden on the Lord [releasing the weight of it] and He will sustain you; He will never allow the [consistently] righteous to be moved (made to slip, fall, or fail). [I Pet. 5:7.]'
  '23':
  - type: text
    content: ' But You, O God, will bring down the wicked into the pit of destruction; men of blood and treachery shall not live out half their days. But I will trust in, lean on, '
  - type: text
    content: and
  - type: text
    content: ' confidently rely on You.'
  '3':
  - type: text
    content: ' [And I am distracted] at the noise of the enemy, because of the oppression '
  - type: text
    content: and
  - type: text
    content: ' threats of the wicked; for they would cast trouble upon me, and in wrath they persecute me.'
  '4':
  - type: text
    content: ' My heart is grievously pained within me, and the terrors of death have fallen upon me.'
  '5':
  - type: text
    content: ' Fear and trembling have come upon me; horror '
  - type: text
    content: and
  - type: text
    content: ' fright have overwhelmed me.'
  '6':
  - type: text
    content: ' And I say, Oh, that I had wings like a dove! I would fly away and be at rest.'
  '7':
  - type: text
    content: ' Yes, I would wander far away, I would lodge in the wilderness. Selah [pause, and calmly think of that]!'
  '8':
  - type: text
    content: ' I would hasten to escape '
  - type: text
    content: and
  - type: text
    content: ' to find a shelter from the stormy wind and tempest.'
  '9':
  - type: text
    content: ' Destroy [their schemes], O Lord, confuse their tongues, for I have seen violence and strife in the city.'
