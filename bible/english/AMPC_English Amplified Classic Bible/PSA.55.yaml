document_id: PSA.55
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; with stringed instruments. A skillful song, {or} a didactic {or} reflective poem, of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' LISTEN TO my prayer, O God, and hide not Yourself from my supplication!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Attend to me and answer me; I am restless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distraught in my complaint and must moan'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' [And I am distracted] at the noise of the enemy, because of the oppression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' threats of the wicked; for they would cast trouble upon me, and in wrath they persecute me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' My heart is grievously pained within me, and the terrors of death have fallen upon me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Fear and trembling have come upon me; horror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fright have overwhelmed me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And I say, Oh, that I had wings like a dove! I would fly away and be at rest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Yes, I would wander far away, I would lodge in the wilderness. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I would hasten to escape '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to find a shelter from the stormy wind and tempest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Destroy [their schemes], O Lord, confuse their tongues, for I have seen violence and strife in the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Day and night they go about on its walls; iniquity and mischief are in its midst.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Violence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruin are within it; fraud and guile do not depart from its streets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' marketplaces.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For it is not an enemy who reproaches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taunts me–then I might bear it; nor is it one who has hated me who insolently vaunts himself against me–then I might hide from him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But it was you, a man my equal, my companion and my familiar friend.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' We had sweet fellowship together and used to walk to the house of God in company.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Let desolations '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' death come suddenly upon them; let them go down alive to Sheol (the place of the dead), for evils are in their habitations, in their hearts, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their inmost part.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' As for me, I will call upon God, and the Lord will save me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Evening and morning and at noon will I utter my complaint and moan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sigh, and He will hear my voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He has redeemed my life in peace from the battle that was against me [so that none came near me], for they were many who strove with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' God will hear and humble them, even He Who abides of old–Selah [pause, and calmly think of that]!–because in them there has been no change [of heart], and they do not fear, revere, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' [My companion] has put forth his hands against those who were at peace with him; he has broken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profaned his agreement [of friendship and loyalty].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The words of his mouth were smoother than cream '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' butter, but war was in his heart; his words were softer than oil, yet they were drawn swords.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Cast your burden on the Lord [releasing the weight of it] and He will sustain you; He will never allow the [consistently] righteous to be moved (made to slip, fall, or fail). [I Pet. 5:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But You, O God, will bring down the wicked into the pit of destruction; men of blood and treachery shall not live out half their days. But I will trust in, lean on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently rely on You.'
