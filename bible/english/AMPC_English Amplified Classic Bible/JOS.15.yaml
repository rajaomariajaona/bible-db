document_id: JOS.15,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE LOT for the tribe of Judah according to its families reached southward to the boundary of Edom, to the Wilderness of Zin at its most southern part.'
  '10':
  - type: text
    content: ' And the boundary went around west of Baalah to Mount Seir, passed along to the northern side of Mount Jearim, which is Chesalon, went down to Beth-shemesh, and then passed on by Timnah.'
  '11':
  - type: text
    content: ' And the boundary went out to the shoulder of the hill north of Ekron, then bent round to Shikkeron, and passed along to Mount Baalah, and went out to Jabneel. Then the boundary ended at the sea.'
  '12':
  - type: text
    content: ' And the west boundary was the Great Sea with its coastline. This is the boundary round about the people of Judah according to their families.'
  '13':
  - type: text
    content: ' And to Caleb son of Jephunneh, [Joshua] gave a part among the people of Judah, as the Lord commanded [him]; it was Kiriath-arba, which is Hebron, [named for] Arba the father of Anak.'
  '14':
  - type: text
    content: ' And Caleb drove from there the three sons of Anak–Sheshai and Ahiman and Talmai–the descendants of Anak.'
  '15':
  - type: text
    content: ' He went up from there against the people of Debir. Debir was formerly named Kiriath-sepher.'
  '16':
  - type: text
    content: ' Caleb said, He who smites Kiriath-sepher and takes it, to him will I give Achsah my daughter as wife.'
  '17':
  - type: text
    content: ' And Othniel son of Kenaz, Caleb''s brother, took it; and he gave him Achsah his daughter as wife.'
  '18':
  - type: text
    content: ' When Achsah came to Othniel, she got his consent to ask her father for a field. Then she returned to Caleb and when she lighted off her donkey, Caleb said, What do you wish?'
  '19':
  - type: text
    content: ' Achsah answered, Give me a present. Since you have set me in the [dry] Negeb, give me also springs of water. And he gave her the [sloping field with] upper and lower springs.'
  '2':
  - type: text
    content: ' And their south boundary was from the end of the Salt [Dead] Sea, from the bay that faces southward;'
  '20':
  - type: text
    content: ' This is the inheritance of the tribe of Judah according to their families.'
  '21':
  - type: text
    content: ' The cities of the tribe of Judah in the extreme south toward the boundary of Edom were: Kabzeel, Eder, Jagur,'
  '22':
  - type: text
    content: ' Kinah, Dimonah, Adadah,'
  '23':
  - type: text
    content: ' Kedesh, Hazor, Ithnan,'
  '24':
  - type: text
    content: ' Ziph, Telem, Bealoth,'
  '25':
  - type: text
    content: ' Hazor-hadattah, Kerioth-hezron (Hazor),'
  '26':
  - type: text
    content: ' Amam, Shema, Moladah,'
  '27':
  - type: text
    content: ' Hazar-gaddah, Heshmon, Beth-pelet,'
  '28':
  - type: text
    content: ' Hazar-shual, Beersheba, Biziothiah,'
  '29':
  - type: text
    content: ' Baalah, Iim, Ezem,'
  '3':
  - type: text
    content: ' It went out south of the ascent of Akrabbim, passed along to Zin, and went up south of Kadesh-barnea, along by Hezron, up to Addar, and turned about to Karka,'
  '30':
  - type: text
    content: ' Eltolad, Chesil, Hormah,'
  '31':
  - type: text
    content: ' Ziklag, Madmannah, Sansannah,'
  '32':
  - type: text
    content: ' Lebaoth, Shilhim, Ain, and Rimmon. All the cities were twenty-nine [later thirty-six] with their villages.'
  '33':
  - type: text
    content: ' In the lowland: Eshtaol, Zorah, Ashnah,'
  '34':
  - type: text
    content: ' Zanoah, En-gannim, Tappuah, Enam,'
  '35':
  - type: text
    content: ' Jarmuth, Adullam, Socoh, Azekah,'
  '36':
  - type: text
    content: ' Shaaraim, Adithaim, and Gederah and Gederothaim; fourteen cities with their villages.'
  '37':
  - type: text
    content: ' Zenan, Hadashah, Migdal-gad,'
  '38':
  - type: text
    content: ' Dilean, Mizpah, Joktheel,'
  '39':
  - type: text
    content: ' Lachish, Bozkath, Eglon,'
  '4':
  - type: text
    content: ' Passed along to Azmon, went out by the Brook of Egypt, and ended at the sea. This was their southern frontier.'
  '40':
  - type: text
    content: ' Cabbon, Lahmas, Chitlish,'
  '41':
  - type: text
    content: ' Gederoth, Beth-dagon, Naamah, and Makkedah; sixteen cities with their villages.'
  '42':
  - type: text
    content: ' Libnah, Ether, Ashan,'
  '43':
  - type: text
    content: ' Iphtah, Ashnah, Nezib,'
  '44':
  - type: text
    content: ' Keilah, Achzib, and Mareshah; nine cities with their villages.'
  '45':
  - type: text
    content: ' Ekron, with its towns and villages.'
  '46':
  - type: text
    content: ' From Ekron to the sea, all that lay beside Ashdod, with their villages;'
  '47':
  - type: text
    content: ' Ashdod, with its towns and its villages; Gaza, with its towns and its villages, as far as the Brook of Egypt, and the Great [Mediterranean] Sea with its coastline.'
  '48':
  - type: text
    content: ' In the hill country: Shamir, Jattir, Socoh,'
  '49':
  - type: text
    content: ' Dannah, Kiriath-sannah (that is, Debir),'
  '5':
  - type: text
    content: ' The eastern boundary was the Salt [Dead] Sea as far as the mouth of the Jordan. The northern boundary was from the bay of the sea at the mouth of the Jordan;'
  '50':
  - type: text
    content: ' Anab, Eshtemoh, Anim,'
  '51':
  - type: text
    content: ' Goshen, Holon, and Giloh; eleven cities with their villages.'
  '52':
  - type: text
    content: ' Arab, Dumah, Eshan,'
  '53':
  - type: text
    content: ' Janim, Beth-tappuah, Aphekah,'
  '54':
  - type: text
    content: ' Humtah, Kiriath-arba (that is, Hebron), and Zior; nine cities with their villages.'
  '55':
  - type: text
    content: ' Maon, Carmel, Ziph, Juttah,'
  '56':
  - type: text
    content: ' Jezreel, Jokdeam, Zanoah,'
  '57':
  - type: text
    content: ' Kain, Gibeah, and Timnah; ten cities with their villages.'
  '58':
  - type: text
    content: ' Halhul, Beth-zur, Gedor,'
  '59':
  - type: text
    content: ' Maarath, Beth-anoth, and Eltekon; six cities with their villages.'
  '6':
  - type: text
    content: ' And the boundary went up to Beth-hogla and passed along north of Beth-arabah and [it] went up to the [landmark] Stone of Bohan son of Reuben.'
  '60':
  - type: text
    content: ' Kiriath-baal (that is, Kiriath-jearim) and Rabbah; two cities with their villages.'
  '61':
  - type: text
    content: ' In the wilderness: Beth-arabah, Middin, Secacah,'
  '62':
  - type: text
    content: ' Nibshan, the City of Salt, and En-gedi; six cities with their villages.'
  '63':
  - type: text
    content: ' But the Jebusites, the inhabitants of Jerusalem, the people of Judah could not drive out; so the Jebusites dwell with the people of Judah at Jerusalem to this day.'
  '7':
  - type: text
    content: ' And the boundary went up to Debir from the Valley of Achor, and so northward, turning toward Gilgal, which is opposite the ascent to Adummim on the south side of the valley; and it passed on to the waters of En-shemesh and ended at En-rogel.'
  '8':
  - type: text
    content: ' Then the boundary went up by the Valley of Ben-hinnom [son of Hinnom] at the southern shoulder of the Jebusite [city]–that is, Jerusalem; and the boundary went up to the top of the mountain that lies before the Valley of Hinnom on the west, at the northern end of the Valley of Rephaim.'
  '9':
  - type: text
    content: ' Then the boundary extended from the top of the mountain to the spring of the waters of Nephtoah and went on to the cities of Mount Ephron; then it bent round to Baalah, that is, Kiriath-jearim.'
