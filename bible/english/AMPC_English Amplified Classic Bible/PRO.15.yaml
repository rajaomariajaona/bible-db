document_id: PRO.15,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' A SOFT answer turns away wrath, but grievous words stir up anger. [Prov. 25:15.]'
  '10':
  - type: text
    content: ' There is severe discipline for him who forsakes God''s way; and he who hates reproof will die [physically, morally, and spiritually].'
  '11':
  - type: text
    content: ' Sheol (the place of the dead) and Abaddon (the abyss, the final place of the accuser Satan) are both before the Lord–how much more, then, the hearts of the children of men? [Job 26:6; Ps. 139:8; Rev. 9:2; 20:1, 2.]'
  '12':
  - type: text
    content: ' A scorner has no love for one who rebukes him; neither will he go to the wise [for counsel].'
  '13':
  - type: text
    content: ' A glad heart makes a cheerful countenance, but by sorrow of heart the spirit is broken. [Prov. 17:22.]'
  '14':
  - type: text
    content: ' The mind of him who has understanding seeks knowledge and inquires after '
  - type: text
    content: and
  - type: text
    content: ' craves it, but the mouth of the [self-confident] fool feeds on folly. [Isa. 32:6.]'
  '15':
  - type: text
    content: ' All the days of the desponding '
  - type: text
    content: and
  - type: text
    content: ' afflicted are made evil [by anxious thoughts and forebodings], but he who has a glad heart has a continual feast [regardless of circumstances].'
  '16':
  - type: text
    content: ' Better is little with the reverent, worshipful fear of the Lord than great '
  - type: text
    content: and
  - type: text
    content: ' rich treasure and trouble with it. [Ps. 37:16; Prov. 16:8; I Tim. 6:6.]'
  '17':
  - type: text
    content: ' Better is a dinner of herbs where love is than a fatted ox and hatred with it. [Prov. 17:1.]'
  '18':
  - type: text
    content: ' A hot-tempered man stirs up strife, but he who is slow to anger appeases contention.'
  '19':
  - type: text
    content: ' The way of the sluggard is overgrown with thorns [it pricks, lacerates, and entangles him], but the way of the righteous is plain '
  - type: text
    content: and
  - type: text
    content: ' raised like a highway.'
  '2':
  - type: text
    content: ' The tongue of the wise utters knowledge rightly, but the mouth of the [self-confident] fool pours out folly.'
  '20':
  - type: text
    content: ' A wise son makes a glad father, but a self-confident '
  - type: text
    content: and
  - type: text
    content: ' foolish man despises his mother '
  - type: text
    content: and
  - type: text
    content: ' puts her to shame.'
  '21':
  - type: text
    content: ' Folly is pleasure to him who is without heart '
  - type: text
    content: and
  - type: text
    content: ' sense, but a man of understanding walks uprightly [making straight his course]. [Eph. 5:15.]'
  '22':
  - type: text
    content: ' Where there is no counsel, purposes are frustrated, but with many counselors they are accomplished.'
  '23':
  - type: text
    content: ' A man has joy in making an apt answer, and a word spoken at the right moment–how good it is!'
  '24':
  - type: text
    content: ' The path of the wise leads upward to life, that he may avoid [the gloom] in the depths of Sheol (Hades, the place of the dead). [Phil. 3:20; Col. 3:1, 2.]'
  '25':
  - type: text
    content: ' The Lord tears down the house of the proud, but He makes secure the boundaries of the [consecrated] widow.'
  '26':
  - type: text
    content: ' The thoughts of the wicked are shamefully vile '
  - type: text
    content: and
  - type: text
    content: ' exceedingly offensive to the Lord, but the words of the pure are pleasing words to Him.'
  '27':
  - type: text
    content: ' He who is greedy for unjust gain troubles his own household, but he who hates bribes will live. [Isa. 5:8; Jer. 17:11.]'
  '28':
  - type: text
    content: ' The mind of the [uncompromisingly] righteous studies how to answer, but the mouth of the wicked pours out evil things. [I Pet. 3:15.]'
  '29':
  - type: text
    content: ' The Lord is far from the wicked, but He hears the prayer of the [consistently] righteous (the upright, in right standing with Him).'
  '3':
  - type: text
    content: ' The eyes of the Lord are in every place, keeping watch upon the evil and the good. [Job 34:21; Prov. 5:21; Jer. 16:17; 32:19; Heb. 4:13.]'
  '30':
  - type: text
    content: ' The light in the eyes [of him whose heart is joyful] rejoices the hearts of others, and good news nourishes the bones.'
  '31':
  - type: text
    content: ' The ear that listens to the reproof [that leads to or gives] life will remain among the wise.'
  '32':
  - type: text
    content: ' He who refuses '
  - type: text
    content: and
  - type: text
    content: ' ignores instruction '
  - type: text
    content: and
  - type: text
    content: ' correction despises himself, but he who heeds reproof gets understanding.'
  '33':
  - type: text
    content: ' The reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord brings instruction in Wisdom, and humility comes before honor.'
  '4':
  - type: text
    content: ' A gentle tongue [with its healing power] is a tree of life, but willful contrariness in it breaks down the spirit.'
  '5':
  - type: text
    content: ' A fool despises his father''s instruction '
  - type: text
    content: and
  - type: text
    content: ' correction, but he who regards reproof acquires prudence.'
  '6':
  - type: text
    content: ' In the house of the [uncompromisingly] righteous is great [priceless] treasure, but with the income of the wicked is trouble '
  - type: text
    content: and
  - type: text
    content: ' vexation.'
  '7':
  - type: text
    content: ' The lips of the wise disperse knowledge [sifting it as chaff from the grain]; not so the minds '
  - type: text
    content: and
  - type: text
    content: ' hearts of the self-confident '
  - type: text
    content: and
  - type: text
    content: ' foolish.'
  '8':
  - type: text
    content: ' The sacrifice of the wicked is an abomination, hateful '
  - type: text
    content: and
  - type: text
    content: ' exceedingly offensive to the Lord, but the prayer of the upright is His delight! [Isa. 1:11; Jer. 6:20; Amos 5:22.]'
  '9':
  - type: text
    content: ' The way of the wicked is an abomination, extremely disgusting '
  - type: text
    content: and
  - type: text
    content: ' shamefully vile to the Lord, but He loves him who pursues righteousness (moral and spiritual rectitude in every area and relation).'
