document_id: PRO.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' A SOFT answer turns away wrath, but grievous words stir up anger. [Prov. 25:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The tongue of the wise utters knowledge rightly, but the mouth of the [self-confident] fool pours out folly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The eyes of the Lord are in every place, keeping watch upon the evil and the good. [Job 34:21; Prov. 5:21; Jer. 16:17; 32:19; Heb. 4:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' A gentle tongue [with its healing power] is a tree of life, but willful contrariness in it breaks down the spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' A fool despises his father''s instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correction, but he who regards reproof acquires prudence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' In the house of the [uncompromisingly] righteous is great [priceless] treasure, but with the income of the wicked is trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vexation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The lips of the wise disperse knowledge [sifting it as chaff from the grain]; not so the minds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hearts of the self-confident '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foolish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The sacrifice of the wicked is an abomination, hateful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exceedingly offensive to the Lord, but the prayer of the upright is His delight! [Isa. 1:11; Jer. 6:20; Amos 5:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The way of the wicked is an abomination, extremely disgusting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shamefully vile to the Lord, but He loves him who pursues righteousness (moral and spiritual rectitude in every area and relation).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' There is severe discipline for him who forsakes God''s way; and he who hates reproof will die [physically, morally, and spiritually].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Sheol (the place of the dead) and Abaddon (the abyss, the final place of the accuser Satan) are both before the Lord–how much more, then, the hearts of the children of men? [Job 26:6; Ps. 139:8; Rev. 9:2; 20:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' A scorner has no love for one who rebukes him; neither will he go to the wise [for counsel].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' A glad heart makes a cheerful countenance, but by sorrow of heart the spirit is broken. [Prov. 17:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The mind of him who has understanding seeks knowledge and inquires after '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' craves it, but the mouth of the [self-confident] fool feeds on folly. [Isa. 32:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' All the days of the desponding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflicted are made evil [by anxious thoughts and forebodings], but he who has a glad heart has a continual feast [regardless of circumstances].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Better is little with the reverent, worshipful fear of the Lord than great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rich treasure and trouble with it. [Ps. 37:16; Prov. 16:8; I Tim. 6:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Better is a dinner of herbs where love is than a fatted ox and hatred with it. [Prov. 17:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' A hot-tempered man stirs up strife, but he who is slow to anger appeases contention.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The way of the sluggard is overgrown with thorns [it pricks, lacerates, and entangles him], but the way of the righteous is plain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' raised like a highway.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' A wise son makes a glad father, but a self-confident '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foolish man despises his mother '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' puts her to shame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Folly is pleasure to him who is without heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sense, but a man of understanding walks uprightly [making straight his course]. [Eph. 5:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Where there is no counsel, purposes are frustrated, but with many counselors they are accomplished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' A man has joy in making an apt answer, and a word spoken at the right moment–how good it is!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The path of the wise leads upward to life, that he may avoid [the gloom] in the depths of Sheol (Hades, the place of the dead). [Phil. 3:20; Col. 3:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The Lord tears down the house of the proud, but He makes secure the boundaries of the [consecrated] widow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The thoughts of the wicked are shamefully vile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exceedingly offensive to the Lord, but the words of the pure are pleasing words to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' He who is greedy for unjust gain troubles his own household, but he who hates bribes will live. [Isa. 5:8; Jer. 17:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' The mind of the [uncompromisingly] righteous studies how to answer, but the mouth of the wicked pours out evil things. [I Pet. 3:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The Lord is far from the wicked, but He hears the prayer of the [consistently] righteous (the upright, in right standing with Him).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The light in the eyes [of him whose heart is joyful] rejoices the hearts of others, and good news nourishes the bones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The ear that listens to the reproof [that leads to or gives] life will remain among the wise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' He who refuses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ignores instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correction despises himself, but he who heeds reproof gets understanding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' The reverent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear of the Lord brings instruction in Wisdom, and humility comes before honor.'
