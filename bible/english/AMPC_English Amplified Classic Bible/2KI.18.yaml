document_id: 2KI.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE third year of Hoshea son of Elah king of Israel, Hezekiah son of Ahaz king of Judah began to reign.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He was twenty-five years old when he began his twenty-nine-year reign in Jerusalem. His mother was Abi daughter of Zechariah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Hezekiah did right in the sight of the Lord, according to all that David his [forefather] had done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He removed the high places, broke the images, cut down the Asherim, and broke in pieces the bronze serpent that Moses had made, for until then the Israelites had burned incense to it; but he called it Nehushtan [a bronze trifle].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Hezekiah trusted in, leaned on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was confident in the Lord, the God of Israel; so that neither after him nor before him was any one of all the kings of Judah like him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For he clung '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' held fast to the Lord and ceased not to follow Him, but kept His commandments, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the Lord was with Hezekiah; he prospered wherever he went. And he rebelled against the king of Assyria and refused to serve him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He smote the Philistines, even to Gaza [the most distant city] and its borders, from the [isolated] watchtower to the [populous] fortified city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' In the fourth year of King Hezekiah, which was the seventh of Hoshea son of Elah king of Israel, Shalmaneser king of Assyria came up against Samaria and besieged it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' After three years it was taken; in the sixth year of Hezekiah, which was the ninth year of Hoshea king of Israel, Samaria was taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The king of Assyria carried Israel away to Assyria, and put them in Halah, and on the Habor, the river of Gozan, and in the cities of the Medes,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Because they did not obey the voice of the Lord their God, but transgressed His covenant, even all that Moses the servant of the Lord commanded, and would not hear it or do it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' In the fourteenth year of Hezekiah, Sennacherib king of Assyria came up against all the fortified cities of Judah and took them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then Hezekiah king of Judah sent to the king of Assyria at Lachish, saying, I have done wrong. Depart from me; what you put on me I will bear. And the king of Assyria exacted of Hezekiah king of Judah 300 talents of silver and thirty talents of gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Hezekiah gave him all the silver that was found in the house of the Lord and in the treasuries of the king''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then Hezekiah stripped off the gold from the doors of the temple of the Lord and from the doorposts which he as king of Judah had overlaid, and gave it to the king of Assyria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the king of Assyria sent the Tartan, the Rabsaris, and the Rabshakeh [the high officials] from Lachish to King Hezekiah at Jerusalem with a great army. They went up to Jerusalem, and when they arrived, they came and stood by the canal of the Upper Pool, which is on the highway to the Fuller''s Field. [II Chron. 32:9-19; Isa. 36:1-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' When they called for the king, there came out to them Eliakim son of Hilkiah, who was over the king''s household, and Shebna the scribe, and Joah son of Asaph the recorder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The Rabshakeh told them, Say to Hezekiah, Thus says the great king of Assyria: What justifies this confidence of yours?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You say–but they are empty words–There is counsel and strength for war. Now on whom do you rely, that you rebel against me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Behold, you are relying on Egypt, that broken reed of a staff; if a man leans on it, it will pierce his hand. So is Pharaoh king of Egypt to all who trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But if you tell me, We trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on the Lord our God, is it not He Whose high places and altars Hezekiah has removed, saying to Judah and Jerusalem, You shall worship before this altar in Jerusalem?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' So now, make a wager '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give pledges to my lord the king of Assyria: I will deliver you 2,000 horses–if you can on your part put riders on them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' How then can you beat back one captain among the least of my master''s servants, when your trust is put in Egypt for chariots and horsemen?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Have I come up without the Lord against this place to destroy it? The Lord said to me, Go up against this land and destroy it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then Eliakim son of Hilkiah and Shebna and Joah said to the Rabshakeh, We pray you, speak to your servants in the Aramaic (Syrian) language, for we understand it; and do not speak to us in the Jews'' language in the hearing of the people on the wall.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But the Rabshakeh said to them, Has my master sent me to your master and you only to say these things? Has he not sent me to the men who sit on the wall [whom Hezekiah has doomed to be forced] to eat their own dung and drink their own urine along with you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then the Rabshakeh stood and cried with a loud voice in the Jews'' language, Hear the word of the great king of Assyria!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Thus says the king: Let not Hezekiah deceive you. For he will not be able to deliver you out of my hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Nor let Hezekiah make you trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on the Lord, saying, The Lord will surely deliver us, and this city will not be given into the hand of Assyria''s king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Hearken not to Hezekiah, for thus says the king of Assyria: Make your peace with me and come out to me, and eat every man from his own vine and fig tree and drink every man the waters of his own cistern,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Until I come and take you away to a land like your own, a land of grain and vintage fruit, of bread and vineyards, of olive trees and honey, that you may live and not die. Do not listen to Hezekiah when he urges you, saying, The Lord will deliver us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Has any one of the gods of the nations ever delivered his land out of the hand of the king of Assyria?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Where are the gods of Hamath and Arpad [in Syria]? Where are the gods of Sepharvaim, Hena, and Ivvah [in the Euphrates Valley]? Have they delivered Samaria [Israel''s capital] out of my hand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Who of all the gods of the countries has delivered his country out of my hand, that the Lord should deliver Jerusalem out of my hand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' But the people were silent and answered him not a word, for Hezekiah had commanded, Do not answer him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Then Eliakim son of Hilkiah, who was over the royal household, and Shebna the scribe, and Joah son of Asaph the recorder came to Hezekiah with their clothes rent, and told him what the Rabshakeh had said.'
