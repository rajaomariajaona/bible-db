document_id: REV.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN THE fifth angel blew [his] trumpet, and I saw a star that had fallen from the sky to the earth; and to the angel was given the key of the shaft of the Abyss (the bottomless pit).'
  '10':
  - type: text
    content: ' They have tails like scorpions, and they have stings, and in their tails lies their ability to hurt men for [the] five months.'
  '11':
  - type: text
    content: ' Over them as king they have the angel of the Abyss (of the bottomless pit). In Hebrew his name is Abaddon [destruction], but in Greek he is called Apollyon [destroyer].'
  '12':
  - type: text
    content: ' The first woe (calamity) has passed; behold, two others are yet to follow.'
  '13':
  - type: text
    content: ' Then the sixth angel blew [his] trumpet, and from the four horns of the golden altar which stands before God I heard a solitary voice,'
  '14':
  - type: text
    content: ' Saying to the sixth angel who had the trumpet, Liberate the four angels who are bound at the great river Euphrates.'
  '15':
  - type: text
    content: ' So the four angels who had been in readiness for that hour in the appointed day, month, and year were liberated to destroy a third of mankind.'
  '16':
  - type: text
    content: ' The number of their troops of cavalry was twice ten thousand times ten thousand (200,000,000); I heard what their number was.'
  '17':
  - type: text
    content: ' And in [my] vision the horses and their riders appeared to me like this: the riders wore breastplates the color of fiery red and sapphire blue and sulphur (brimstone) yellow. The heads of the horses looked like lions'' heads, and from their mouths there poured fire and smoke and sulphur (brimstone).'
  '18':
  - type: text
    content: ' A third of mankind was killed by these three plagues–by the fire and the smoke and the sulphur (brimstone) that poured from the mouths of the horses.'
  '19':
  - type: text
    content: ' For the power of the horses to do harm is in their mouths and also in their tails. Their tails are like serpents, for they have heads, and it is by means of them that they wound people.'
  '2':
  - type: text
    content: ' He opened the long shaft of the Abyss (the bottomless pit), and smoke like the smoke of a huge furnace puffed out of the long shaft, so that the sun and the atmosphere were darkened by the smoke from the long shaft. [Gen. 19:28; Exod. 19:18; Joel 2:10.]'
  '20':
  - type: text
    content: ' And the rest of humanity who were not killed by these plagues even then did not repent of [the worship of] the works of their [own] hands, so as to cease paying homage to the demons and idols of gold and silver and bronze and stone and wood, which can neither see nor hear nor move. [Ps. 115:4-7; 135:15-17; Isa. 17:8.]'
  '21':
  - type: text
    content: ' And they did not repent of their murders or their practice of magic (sorceries) or their sexual vice or their thefts.'
  '3':
  - type: text
    content: ' Then out of the smoke locusts came forth on the earth, and such power was granted them as the power the earth''s scorpions have. [Exod. 10: 12-15.]'
  '4':
  - type: text
    content: ' They were told not to injure the herbage of the earth nor any green thing nor any tree, but only [to attack] such human beings as do not have the seal (mark) of God on their foreheads. [Ezek. 9:4.]'
  '5':
  - type: text
    content: ' They were not permitted to kill them, but to torment (distress, vex) them for five months; and the pain caused them was like the torture of a scorpion when it stings a person.'
  '6':
  - type: text
    content: ' And in those days people will seek death and will not find it; and they will yearn to die, but death evades '
  - type: text
    content: and
  - type: text
    content: ' flees from them. [Job 3:21.]'
  '7':
  - type: text
    content: ' The locusts resembled horses equipped for battle. On their heads was something like golden crowns. Their faces resembled the faces of people. [Joel 2:4.]'
  '8':
  - type: text
    content: ' They had hair like the hair of women, and their teeth were like lions'' teeth. [Joel 1:6.]'
  '9':
  - type: text
    content: ' Their breastplates (scales) resembled breastplates made of iron, and the [whirring] noise made by their wings was like the roar of a vast number of horse-drawn chariots going at full speed into battle. [Joel 2:5.]'
