document_id: REV.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN THE fifth angel blew [his] trumpet, and I saw a star that had fallen from the sky to the earth; and to the angel was given the key of the shaft of the Abyss (the bottomless pit).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He opened the long shaft of the Abyss (the bottomless pit), and smoke like the smoke of a huge furnace puffed out of the long shaft, so that the sun and the atmosphere were darkened by the smoke from the long shaft. [Gen. 19:28; Exod. 19:18; Joel 2:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then out of the smoke locusts came forth on the earth, and such power was granted them as the power the earth''s scorpions have. [Exod. 10: 12-15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They were told not to injure the herbage of the earth nor any green thing nor any tree, but only [to attack] such human beings as do not have the seal (mark) of God on their foreheads. [Ezek. 9:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They were not permitted to kill them, but to torment (distress, vex) them for five months; and the pain caused them was like the torture of a scorpion when it stings a person.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And in those days people will seek death and will not find it; and they will yearn to die, but death evades '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' flees from them. [Job 3:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The locusts resembled horses equipped for battle. On their heads was something like golden crowns. Their faces resembled the faces of people. [Joel 2:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They had hair like the hair of women, and their teeth were like lions'' teeth. [Joel 1:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Their breastplates (scales) resembled breastplates made of iron, and the [whirring] noise made by their wings was like the roar of a vast number of horse-drawn chariots going at full speed into battle. [Joel 2:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They have tails like scorpions, and they have stings, and in their tails lies their ability to hurt men for [the] five months.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Over them as king they have the angel of the Abyss (of the bottomless pit). In Hebrew his name is Abaddon [destruction], but in Greek he is called Apollyon [destroyer].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The first woe (calamity) has passed; behold, two others are yet to follow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then the sixth angel blew [his] trumpet, and from the four horns of the golden altar which stands before God I heard a solitary voice,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Saying to the sixth angel who had the trumpet, Liberate the four angels who are bound at the great river Euphrates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So the four angels who had been in readiness for that hour in the appointed day, month, and year were liberated to destroy a third of mankind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The number of their troops of cavalry was twice ten thousand times ten thousand (200,000,000); I heard what their number was.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And in [my] vision the horses and their riders appeared to me like this: the riders wore breastplates the color of fiery red and sapphire blue and sulphur (brimstone) yellow. The heads of the horses looked like lions'' heads, and from their mouths there poured fire and smoke and sulphur (brimstone).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' A third of mankind was killed by these three plagues–by the fire and the smoke and the sulphur (brimstone) that poured from the mouths of the horses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For the power of the horses to do harm is in their mouths and also in their tails. Their tails are like serpents, for they have heads, and it is by means of them that they wound people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the rest of humanity who were not killed by these plagues even then did not repent of [the worship of] the works of their [own] hands, so as to cease paying homage to the demons and idols of gold and silver and bronze and stone and wood, which can neither see nor hear nor move. [Ps. 115:4-7; 135:15-17; Isa. 17:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And they did not repent of their murders or their practice of magic (sorceries) or their sexual vice or their thefts.'
