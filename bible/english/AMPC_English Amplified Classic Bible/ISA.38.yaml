document_id: ISA.38
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THOSE days King Hezekiah of Judah became ill and was at the point of death. And Isaiah the prophet, the son of Amoz, came to him and said, Thus says the Lord: Set your house in order, for you shall die and not live. [II Kings 20:1-11; II Chron. 32:24-26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then Hezekiah turned his face to the wall and prayed to the Lord'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And said, Remember [earnestly] now, O Lord, I beseech You, how I have walked before You in faithfulness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in truth, with a whole heart [absolutely devoted to You], and have done what is good in Your sight. And Hezekiah wept bitterly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then came the word of the Lord to Isaiah, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Go, and say to Hezekiah, Thus says the Lord, the God of David your father: I have heard your prayer, I have seen your tears; behold, I will add to your life fifteen years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And I will deliver you and this city out of the hand of the king of Assyria; and I will defend this city [Jerusalem].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And this will be the sign to you from the Lord that the Lord will do this thing that He has spoken:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Behold, I will turn the shadow [denoting the time of day] on the steps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' degrees, which has gone down on the steps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sundial of Ahaz, backward ten steps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' degrees. And the sunlight turned back ten steps on the steps on which it had gone down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' This is the writing of Hezekiah king of Judah after he had been sick and had recovered from his sickness:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I said, In the noontide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tranquillity of my days I must depart; I am to pass through the gates of Sheol (the place of the dead), deprived of the remainder of my years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I said, I shall not see the Lord, even the Lord, in the land of the living; I shall behold man no more among the inhabitants of the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' My [fleshly] dwelling is plucked up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is removed from me like a shepherd''s tent. I have rolled up my life as a weaver [rolls up the finished web]; [the Lord] cuts me free from the loom; from day to night You bring me to an end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I thought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quieted myself until morning. Like a lion He breaks all my bones; from day to night You bring me to an end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Like a twittering swallow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a crane, so do I chirp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chatter; I moan like a dove. My eyes are weary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dim with looking upward. O Lord, I am oppressed; take my side '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be my security [as of a debtor being sent to prison].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But what can I say? For He has both spoken to me and He Himself has done it. I must go softly [as in solemn procession] all my years '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my sleep has fled because of the bitterness of my soul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' O Lord, by these things men live; and in all these is the life of my spirit. O give me back my health and make me live!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Behold, it was for my peace that I had intense bitterness; but You have loved back my life from the pit of corruption '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' nothingness, for You have cast all my sins behind Your back.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For Sheol (the place of the dead) cannot confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reach out the hand to You, death cannot praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejoice in You; they who go down to the pit cannot hope for Your faithfulness [to Your promises; their probation is at an end, their destiny is sealed].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The living, the living–they shall thank '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise You, as I do this day; the father shall make known to the children Your faithfulness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The Lord is ready to save (deliver) me; therefore we will sing my songs with [my] stringed instruments all the days of our lives in the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Now Isaiah had said, Let them take a cake of figs and lay it for a plaster upon the boil, that he may recover.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Hezekiah also had said, What is the sign that I shall go up to the house of the Lord?'
