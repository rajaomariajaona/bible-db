document_id: ISA.38,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THOSE days King Hezekiah of Judah became ill and was at the point of death. And Isaiah the prophet, the son of Amoz, came to him and said, Thus says the Lord: Set your house in order, for you shall die and not live. [II Kings 20:1-11; II Chron. 32:24-26.]'
  '10':
  - type: text
    content: ' I said, In the noontide '
  - type: text
    content: and
  - type: text
    content: ' tranquillity of my days I must depart; I am to pass through the gates of Sheol (the place of the dead), deprived of the remainder of my years.'
  '11':
  - type: text
    content: ' I said, I shall not see the Lord, even the Lord, in the land of the living; I shall behold man no more among the inhabitants of the world.'
  '12':
  - type: text
    content: ' My [fleshly] dwelling is plucked up '
  - type: text
    content: and
  - type: text
    content: ' is removed from me like a shepherd''s tent. I have rolled up my life as a weaver [rolls up the finished web]; [the Lord] cuts me free from the loom; from day to night You bring me to an end.'
  '13':
  - type: text
    content: ' I thought '
  - type: text
    content: and
  - type: text
    content: ' quieted myself until morning. Like a lion He breaks all my bones; from day to night You bring me to an end.'
  '14':
  - type: text
    content: ' Like a twittering swallow '
  - type: text
    content: or
  - type: text
    content: ' a crane, so do I chirp '
  - type: text
    content: and
  - type: text
    content: ' chatter; I moan like a dove. My eyes are weary '
  - type: text
    content: and
  - type: text
    content: ' dim with looking upward. O Lord, I am oppressed; take my side '
  - type: text
    content: and
  - type: text
    content: ' be my security [as of a debtor being sent to prison].'
  '15':
  - type: text
    content: ' But what can I say? For He has both spoken to me and He Himself has done it. I must go softly [as in solemn procession] all my years '
  - type: text
    content: and
  - type: text
    content: ' my sleep has fled because of the bitterness of my soul.'
  '16':
  - type: text
    content: ' O Lord, by these things men live; and in all these is the life of my spirit. O give me back my health and make me live!'
  '17':
  - type: text
    content: ' Behold, it was for my peace that I had intense bitterness; but You have loved back my life from the pit of corruption '
  - type: text
    content: and
  - type: text
    content: ' nothingness, for You have cast all my sins behind Your back.'
  '18':
  - type: text
    content: ' For Sheol (the place of the dead) cannot confess '
  - type: text
    content: and
  - type: text
    content: ' reach out the hand to You, death cannot praise '
  - type: text
    content: and
  - type: text
    content: ' rejoice in You; they who go down to the pit cannot hope for Your faithfulness [to Your promises; their probation is at an end, their destiny is sealed].'
  '19':
  - type: text
    content: ' The living, the living–they shall thank '
  - type: text
    content: and
  - type: text
    content: ' praise You, as I do this day; the father shall make known to the children Your faithfulness '
  - type: text
    content: and
  - type: text
    content: ' Your truth.'
  '2':
  - type: text
    content: ' Then Hezekiah turned his face to the wall and prayed to the Lord'
  '20':
  - type: text
    content: ' The Lord is ready to save (deliver) me; therefore we will sing my songs with [my] stringed instruments all the days of our lives in the house of the Lord.'
  '21':
  - type: text
    content: ' Now Isaiah had said, Let them take a cake of figs and lay it for a plaster upon the boil, that he may recover.'
  '22':
  - type: text
    content: ' Hezekiah also had said, What is the sign that I shall go up to the house of the Lord?'
  '3':
  - type: text
    content: ' And said, Remember [earnestly] now, O Lord, I beseech You, how I have walked before You in faithfulness '
  - type: text
    content: and
  - type: text
    content: ' in truth, with a whole heart [absolutely devoted to You], and have done what is good in Your sight. And Hezekiah wept bitterly.'
  '4':
  - type: text
    content: ' Then came the word of the Lord to Isaiah, saying,'
  '5':
  - type: text
    content: ' Go, and say to Hezekiah, Thus says the Lord, the God of David your father: I have heard your prayer, I have seen your tears; behold, I will add to your life fifteen years.'
  '6':
  - type: text
    content: ' And I will deliver you and this city out of the hand of the king of Assyria; and I will defend this city [Jerusalem].'
  '7':
  - type: text
    content: ' And this will be the sign to you from the Lord that the Lord will do this thing that He has spoken:'
  '8':
  - type: text
    content: ' Behold, I will turn the shadow [denoting the time of day] on the steps '
  - type: text
    content: or
  - type: text
    content: ' degrees, which has gone down on the steps '
  - type: text
    content: or
  - type: text
    content: ' sundial of Ahaz, backward ten steps '
  - type: text
    content: or
  - type: text
    content: ' degrees. And the sunlight turned back ten steps on the steps on which it had gone down.'
  '9':
  - type: text
    content: ' This is the writing of Hezekiah king of Judah after he had been sick and had recovered from his sickness:'
