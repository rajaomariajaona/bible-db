document_id: DAN.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NEBUCHADNEZZAR THE king, to all people, nations, and languages that dwell on all the earth: May peace be multiplied to you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' It seemed good to me to show the signs and wonders that the Most High God has performed toward me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' How great are His signs! And how mighty His wonders! His kingdom is an everlasting kingdom, and His dominion is from generation to generation. [Dan. 7:13, 14; Luke 1:31-33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I, Nebuchadnezzar, was at rest in my house and prospering in my palace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I had a dream which made me afraid, and the thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' imaginations and the visions of my head as I was lying upon my bed troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agitated me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore I made a decree to bring in all the wise men of Babylon before me, that they might make known to me the interpretation of the dream.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then the magicians, the enchanters, the Chaldeans, and the astrologers came in, and I told them the dream, but they could not make known to me the interpretation of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But at last Daniel came in before me–he who was named Belteshazzar, after the name of my god, and in whom is the Spirit of the Holy God–and I told the dream before him, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' O Belteshazzar, chief of the magicians, because I know that the Spirit of the Holy God is in you and no secret mystery is a burden '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' troubles you, tell me the visions of my dream that I have seen and the interpretation of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The visions of my head [as I lay] on my bed were these: I saw, and behold, [there was] a tree in the midst of the earth, and its height was great.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The tree grew and was strong and its height reached to the heavens, and the sight of it reached to the end of the whole earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Its leaves were fair and its fruit abundant, and in it was food for all. The living creatures of the field found shade under it, and the birds of the sky dwelt in its branches; and all flesh was fed from it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I saw in the visions of my head [as I lay] on my bed, and behold, a watcher, a holy one, came down from heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He cried aloud [with might] and said, Cut down the tree and cut off its branches; shake off its leaves and scatter its fruit. Let the living creatures flee from under it and the fowls from its branches.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Nevertheless leave the stump of its roots in the earth, bound with a band of iron and bronze, in the midst of the tender grass of the field. Let him be wet with the dew of the heavens, and let him share the lot of the living creatures in the grass of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Let his nature '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding be changed from a man''s and let a beast''s nature '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding be given him, and let seven times [or years] pass over him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' This sentence is by the decree of the [heavenly] watchers and the decision is by the word of the holy ones, to the intent that the living may know that the Most High [God] rules the kingdom of mankind and gives it to whomever He will and sets over it the humblest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lowliest of men. [Dan. 2:21; 5:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' This dream I, King Nebuchadnezzar, have seen. And you, O Belteshazzar [Daniel], declare now its interpretation, since all the wise men of my kingdom are not able to make known to me the interpretation; but you are able, for the Spirit of the Holy God is in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then Daniel, whose name was Belteshazzar, was astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dismayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stricken dumb for a while [concerned about the king''s destiny], and his thoughts troubled, agitated, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alarmed him. The king said, Belteshazzar, let not the dream or its interpretation trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' alarm you. Belteshazzar answered, My lord, may the dream be for those who hate you and its message for your enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The tree that you saw, which grew [great] and was strong, whose height reached to the heavens and which was visible to all the earth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Whose foliage was beautiful and its fruit abundant, on which was food for all, under which the living creatures of the field dwelt, and on whose branches the birds of the sky had their nests–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' It is you, O king, who have grown and become strong; your greatness has increased and it reaches to the heavens, and your dominion to the ends of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And whereas the king saw a watcher, a holy one, coming down from heaven and saying, Cut the tree down and destroy it, but leave the stump of its roots in the earth with a band of iron and bronze around it, in the tender grass of the field; and let him be wet with the dew of the heavens, and let his portion be with the living creatures of the field until seven times [or years] pass over him–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' This is the interpretation, O king: It is the decree of the Most High [God] which has come upon my lord the king:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' You shall be driven from among men and your dwelling shall be with the beasts of the field; you shall be made to eat grass as do the oxen and you shall be wet with the dew of the heavens; and seven times [or years] shall pass over you until you learn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize that the Most High [God] rules the kingdom of mankind and gives it to whomever He will.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And in that it was commanded to leave the stump of the roots of the tree, your kingdom shall be sure to you after you have learned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that [the God of] heaven rules.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Therefore, O king, let my counsel be acceptable to you; break off your sins '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' show the reality of your repentance by righteousness (right standing with God and moral and spiritual rectitude and rightness in every area and relation) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' liberate yourself from your iniquities by showing mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness to the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressed, that [if the king will repent] there may possibly be a continuance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lengthening of your peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tranquility '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a healing of your error.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' All this was fulfilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' came upon King Nebuchadnezzar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' At the end of twelve months he was walking in the royal palace of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The king said, Is not this the great Babylon that I have built as the royal residence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seat of government by the might of my power and for the honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory of my majesty?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' While the words were still in the king''s mouth, there fell a voice from heaven, saying, O King Nebuchadnezzar, to you it is spoken: The kingdom has departed from you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And you shall be driven from among men and your dwelling will be with the living creatures of the field. You will be made to eat grass like the oxen, and seven times [or years] shall pass over you until you have learned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that the Most High [God] rules in the kingdom of men and gives it to whomever He will.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' That very hour the thing was [in process of] being fulfilled upon Nebuchadnezzar. He was driven from among men and did eat grass like oxen [as Daniel had said he would], and his body was wet with the dew of the heavens until his hair grew like eagles'' [feathers] and his nails [were] like birds'' [claws].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And at the end of the days [seven years], I, Nebuchadnezzar, lifted up my eyes to heaven, and my understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the right use of my mind returned to me; and I blessed the Most High [God] and I praised and honored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorified Him Who lives forever, Whose dominion is an everlasting dominion; and His kingdom endures from generation to generation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And all the inhabitants of the earth are accounted as nothing. And He does according to His will in the host of heaven and among the inhabitants of the earth, and none can stay His hand or say to Him, What are You doing?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Now at the same time my reason '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding returned to me; and for the glory of my kingdom, my majesty and splendor returned to me, and my counselors and my lords sought me out; I was reestablished in my kingdom, and still more greatness [than before] was added to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Now I, Nebuchadnezzar, praise and extol and honor the King of heaven, Whose works are all faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right and Whose ways are just. And those who walk in pride He is able to abase '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humble.'
