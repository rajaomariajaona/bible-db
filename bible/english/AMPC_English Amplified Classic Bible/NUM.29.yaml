document_id: NUM.29,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' ON THE first day of the seventh month [on New Year''s Day of the civil year], you shall have a holy [summoned] assembly; you shall do no servile work. It is a day of blowing of trumpets for you [everyone blowing who wishes, proclaiming that the glad New Year has come and that the great Day of Atonement and the Feast of Tabernacles are now approaching].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A tenth for each of the seven male lambs,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering, in addition to the sin offering of atonement, and the continual burnt offering and its cereal offering, and their drink offerings.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And on the fifteenth day of the seventh month you shall have a holy [summoned] assembly; you shall do no servile work, and you shall keep a feast to the Lord for seven days.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall offer a burnt offering, an offering made by fire, of a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing fragrance to the Lord: thirteen young bulls, two rams, and fourteen male lambs a year old; they shall be without blemish.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And their cereal offering shall be of fine flour mixed with oil, three-tenths of an ephah for each of the thirteen bulls, two-tenths for each of the two rams,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And a tenth part for each of the fourteen male lambs,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also one male goat for a sin offering, in addition to the continual burnt offering, its cereal offering, and its drink offering.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And on the second day you shall offer twelve young bulls, two rams, fourteen male lambs a year old without spot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' blemish,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With their cereal offering and the drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also one male goat for a sin offering, besides the continual burnt offering, its cereal offering, and their drink offerings.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall offer a burnt offering for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing odor to the Lord: one young bull, one ram, and seven male lambs a year old without blemish.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And on the third day eleven bulls, two rams, fourteen male lambs a year old without blemish,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With their cereal offering and drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one male goat for a sin offering, besides the continual burnt offering, its cereal offering, and its drink offerings.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On the fourth day ten bulls, two rams, and fourteen male lambs a year old without blemish,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their cereal offering and their drink offerings for the bulls, the rams, and the lambs shall be by number according to the ordinance,'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one male goat for a sin offering, besides the continual burnt offering, its cereal offering, and its drink offerings.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And on the fifth day nine bulls, two rams, and fourteen male lambs a year old without spot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' blemish,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And their cereal offering and drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one goat for a sin offering, besides the continual burnt offering, and its cereal offering, and its drink offerings.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And on the sixth day eight bulls, two rams, and fourteen male lambs a year old without blemish,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their cereal offering shall be of fine flour mixed with oil, three-tenths of an ephah for a bull, two-tenths for a ram,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And their cereal offering and their drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one goat for a sin offering, besides the continual burnt offering, its cereal offering, and its drink offerings.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And on the seventh day seven bulls, two rams, and fourteen male lambs a year old without blemish,'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And their cereal and drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one male goat for a sin offering, besides the continual burnt offering, and its cereal offering, and its drink offerings.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On the eighth day you shall have a solemn assembly; you shall do no servile work.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall offer a burnt offering, an offering made by fire, of a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing fragrance to the Lord: one bull, one ram, seven male lambs a year old without blemish,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their cereal offering and drink offerings for the bull, the ram, and the lambs shall be by number according to the ordinance,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one male goat for a sin offering, besides the continual burnt offering, and its cereal offering, and its drink offerings.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These you shall offer to the Lord at your appointed feasts, besides the offerings you have vowed and your freewill offerings, for your burnt offerings, cereal offerings, drink offerings, and peace offerings.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one-tenth of an ephah for each of the seven lambs,'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses told the Israelites all that the Lord commanded him.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one male goat for a sin offering to make atonement for you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These are in addition to the burnt offering of the new moon and its cereal offering, and the daily burnt offering and its cereal offering, and their drink offerings, according to the ordinance for them, for a pleasant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing fragrance, an offering made by fire to the Lord.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall have on the tenth day of this seventh month a holy [summoned] assembly; [it is the great Day of Atonement, a day of humiliation] and you shall humble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abase yourselves; you shall not do any work in it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But you shall offer a burnt offering to the Lord for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing fragrance: one young bull, one ram, and seven male lambs a year old. See that they are without blemish.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And their cereal offering shall be of fine flour mixed with oil, three-tenths of an ephah for the bull, two-tenths for the one ram,'
