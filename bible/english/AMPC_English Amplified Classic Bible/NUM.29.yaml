    content: ' And their cereal offering and their drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance,'
  '31':
  - type: text
    content: ' And one goat for a sin offering, besides the continual burnt offering, its cereal offering, and its drink offerings.'
  '32':
  - type: text
    content: ' And on the seventh day seven bulls, two rams, and fourteen male lambs a year old without blemish,'
  '33':
  - type: text
    content: ' And their cereal and drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance.'
  '34':
  - type: text
    content: ' And one male goat for a sin offering, besides the continual burnt offering, and its cereal offering, and its drink offerings.'
  '35':
  - type: text
    content: ' On the eighth day you shall have a solemn assembly; you shall do no servile work.'
  '36':
  - type: text
    content: ' You shall offer a burnt offering, an offering made by fire, of a sweet '
  - type: text
    content: and
  - type: text
    content: ' pleasing fragrance to the Lord: one bull, one ram, seven male lambs a year old without blemish,'
  '37':
  - type: text
    content: ' Their cereal offering and drink offerings for the bull, the ram, and the lambs shall be by number according to the ordinance,'
  '38':
  - type: text
    content: ' And one male goat for a sin offering, besides the continual burnt offering, and its cereal offering, and its drink offerings.'
  '39':
  - type: text
    content: ' These you shall offer to the Lord at your appointed feasts, besides the offerings you have vowed and your freewill offerings, for your burnt offerings, cereal offerings, drink offerings, and peace offerings.'
  '4':
  - type: text
    content: ' And one-tenth of an ephah for each of the seven lambs,'
  '40':
  - type: text
    content: ' And Moses told the Israelites all that the Lord commanded him.'
  '5':
  - type: text
    content: ' And one male goat for a sin offering to make atonement for you.'
  '6':
  - type: text
    content: ' These are in addition to the burnt offering of the new moon and its cereal offering, and the daily burnt offering and its cereal offering, and their drink offerings, according to the ordinance for them, for a pleasant '
  - type: text
    content: and
  - type: text
    content: ' soothing fragrance, an offering made by fire to the Lord.'
  '7':
  - type: text
    content: ' And you shall have on the tenth day of this seventh month a holy [summoned] assembly; [it is the great Day of Atonement, a day of humiliation] and you shall humble '
  - type: text
    content: and
  - type: text
    content: ' abase yourselves; you shall not do any work in it.'
  '8':
