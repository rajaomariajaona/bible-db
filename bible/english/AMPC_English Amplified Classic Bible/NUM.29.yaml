verses:
  '1':
  - type: text
    content: ' ON THE first day of the seventh month [on New Year''s Day of the civil year], you shall have a holy [summoned] assembly; you shall do no servile work. It is a day of blowing of trumpets for you [everyone blowing who wishes, proclaiming that the glad New Year has come and that the great Day of Atonement and the Feast of Tabernacles are now approaching].'
  '10':
  - type: text
    content: ' A tenth for each of the seven male lambs,'
  '11':
  - type: text
    content: ' One male goat for a sin offering, in addition to the sin offering of atonement, and the continual burnt offering and its cereal offering, and their drink offerings.'
  '12':
  - type: text
    content: ' And on the fifteenth day of the seventh month you shall have a holy [summoned] assembly; you shall do no servile work, and you shall keep a feast to the Lord for seven days.'
  '13':
  - type: text
    content: ' And you shall offer a burnt offering, an offering made by fire, of a sweet '
  - type: text
    content: and
  - type: text
    content: ' pleasing fragrance to the Lord: thirteen young bulls, two rams, and fourteen male lambs a year old; they shall be without blemish.'
  '14':
  - type: text
    content: ' And their cereal offering shall be of fine flour mixed with oil, three-tenths of an ephah for each of the thirteen bulls, two-tenths for each of the two rams,'
  '15':
  - type: text
    content: ' And a tenth part for each of the fourteen male lambs,'
  '16':
  - type: text
    content: ' Also one male goat for a sin offering, in addition to the continual burnt offering, its cereal offering, and its drink offering.'
  '17':
  - type: text
    content: ' And on the second day you shall offer twelve young bulls, two rams, fourteen male lambs a year old without spot '
  - type: text
    content: or
  - type: text
    content: ' blemish,'
  '18':
  - type: text
    content: ' With their cereal offering and the drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance,'
  '19':
  - type: text
    content: ' Also one male goat for a sin offering, besides the continual burnt offering, its cereal offering, and their drink offerings.'
  '2':
  - type: text
    content: ' And you shall offer a burnt offering for a sweet '
  - type: text
    content: and
  - type: text
    content: ' pleasing odor to the Lord: one young bull, one ram, and seven male lambs a year old without blemish.'
  '20':
  - type: text
    content: ' And on the third day eleven bulls, two rams, fourteen male lambs a year old without blemish,'
  '21':
  - type: text
    content: ' With their cereal offering and drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance,'
  '22':
  - type: text
    content: ' And one male goat for a sin offering, besides the continual burnt offering, its cereal offering, and its drink offerings.'
  '23':
  - type: text
    content: ' On the fourth day ten bulls, two rams, and fourteen male lambs a year old without blemish,'
  '24':
  - type: text
    content: ' Their cereal offering and their drink offerings for the bulls, the rams, and the lambs shall be by number according to the ordinance,'
  '25':
  - type: text
    content: ' And one male goat for a sin offering, besides the continual burnt offering, its cereal offering, and its drink offerings.'
  '26':
  - type: text
    content: ' And on the fifth day nine bulls, two rams, and fourteen male lambs a year old without spot '
  - type: text
    content: or
  - type: text
    content: ' blemish,'
  '27':
  - type: text
    content: ' And their cereal offering and drink offerings for the bulls, the rams, and the lambs, by number according to the ordinance,'
  '28':
