document_id: EXO.27,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND MAKE the altar of acacia wood, five cubits square and three cubits high [within reach of all].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their pillars shall be twenty and their sockets twenty, of bronze, but the hooks of the pillars and their joinings shall be of silver;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Likewise for the north side hangings, a hundred cubits long, and their twenty pillars and their twenty sockets of bronze, but the hooks of the pillars and their joinings shall be of silver.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the breadth of the court on the west side there shall be hangings of fifty cubits, with ten pillars and ten sockets.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The breadth of the court to the front, the east side, shall be fifty cubits.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The hangings for one side of the gate shall be fifteen cubits, with three pillars and three sockets.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On the other side the hangings shall be fifteen cubits, with three pillars and three sockets.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the gate of the court there shall be a hanging [for a screen] twenty cubits long, of blue, purple, and scarlet [stuff] and fine twined linen, embroidered. It shall have four pillars and four sockets for them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All the pillars round about the court shall be joined together with silver rods; their hooks shall be of silver and their sockets of bronze.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The length of the court shall be a hundred cubits and the breadth fifty and the height five cubits, [with hangings of] fine twined linen and sockets of bronze.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All the tabernacle''s utensils '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruments used in all its service, and all its pegs and all the pegs for the court, shall be of bronze.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Make horns for it on its four corners; they shall be of one piece with it, and you shall overlay it with bronze.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall command the Israelites to provide you with pure oil of crushed olives for the light, to cause it to burn continually [every night].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the Tent of Meeting [of God with His people], outside the veil which sets apart the Testimony, Aaron and his sons shall keep it burning from evening to morning before the Lord. It shall be a statute to be observed on behalf of the Israelites throughout their generations.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall make pots to take away its ashes, and shovels, basins, forks, and firepans; make all its utensils of bronze.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also make for it a grate, a network of bronze; and on the net you shall make four bronze rings at its four corners.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall put it under the ledge of the altar, so that the net will extend halfway down the altar.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And make poles for the altar, poles of acacia wood overlaid with bronze.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The poles shall be put through the rings on the two sides of the altar, with which to carry it. [Num. 4:14, 15.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall make [the altar] hollow with slabs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' planks; as shown you on the mountain, so shall it be made.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall make the court of the tabernacle. On the south side the court shall have hangings of fine twined linen, a hundred cubits long for one side;'
