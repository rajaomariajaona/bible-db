document_id: PSA.47,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of the sons of Korah.
  - type: text
    content: ' O CLAP your hands, all you peoples! Shout to God with the voice of triumph '
  - type: text
    content: and
  - type: text
    content: ' songs of joy!'
  '2':
  - type: text
    content: ' For the Lord Most High excites terror, awe, '
  - type: text
    content: and
  - type: text
    content: ' dread; He is a great King over all the earth.'
  '3':
  - type: text
    content: ' He subdued peoples under us, and nations under our feet.'
  '4':
  - type: text
    content: ' He chose our inheritance for us, the glory '
  - type: text
    content: and
  - type: text
    content: ' pride of Jacob, whom He loves. Selah [pause, and calmly think of that]! [I Pet. 1:4, 5.]'
  '5':
  - type: text
    content: ' God has ascended amid shouting, the Lord with the sound of a trumpet.'
  '6':
  - type: text
    content: ' Sing praises to God, sing praises! Sing praises to our King, sing praises!'
  '7':
  - type: text
    content: ' For God is the King of all the earth; sing praises in a skillful psalm '
  - type: text
    content: and
  - type: text
    content: ' with understanding.'
  '8':
  - type: text
    content: ' God reigns over the nations; God sits upon His holy throne.'
  '9':
  - type: text
    content: ' The princes '
  - type: text
    content: and
  - type: text
    content: ' nobles of the peoples are gathered together, a [united] people for the God of Abraham, for the shields of the earth belong to God; He is highly exalted.'
