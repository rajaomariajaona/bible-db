document_id: PSA.47,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. A Psalm of the sons of Korah.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O CLAP your hands, all you peoples! Shout to God with the voice of triumph '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' songs of joy!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Lord Most High excites terror, awe, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dread; He is a great King over all the earth.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He subdued peoples under us, and nations under our feet.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He chose our inheritance for us, the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pride of Jacob, whom He loves. Selah [pause, and calmly think of that]! [I Pet. 1:4, 5.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God has ascended amid shouting, the Lord with the sound of a trumpet.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Sing praises to God, sing praises! Sing praises to our King, sing praises!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For God is the King of all the earth; sing praises in a skillful psalm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with understanding.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God reigns over the nations; God sits upon His holy throne.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The princes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nobles of the peoples are gathered together, a [united] people for the God of Abraham, for the shields of the earth belong to God; He is highly exalted.'
