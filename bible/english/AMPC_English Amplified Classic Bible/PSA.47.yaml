document_id: PSA.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of the sons of Korah.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O CLAP your hands, all you peoples! Shout to God with the voice of triumph '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' songs of joy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For the Lord Most High excites terror, awe, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread; He is a great King over all the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He subdued peoples under us, and nations under our feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He chose our inheritance for us, the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pride of Jacob, whom He loves. Selah [pause, and calmly think of that]! [I Pet. 1:4, 5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' God has ascended amid shouting, the Lord with the sound of a trumpet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Sing praises to God, sing praises! Sing praises to our King, sing praises!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For God is the King of all the earth; sing praises in a skillful psalm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with understanding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' God reigns over the nations; God sits upon His holy throne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The princes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' nobles of the peoples are gathered together, a [united] people for the God of Abraham, for the shields of the earth belong to God; He is highly exalted.'
