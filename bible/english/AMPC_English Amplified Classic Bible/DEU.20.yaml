document_id: DEU.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN YOU go forth to battle against your enemies and see horses and chariots and an army greater than your own, do not be afraid of them, for the Lord your God, Who brought you out of the land of Egypt, is with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And when you come near to the battle, the priest shall approach and speak to the men,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And shall say to them, Hear, O Israel, you draw near this day to battle against your enemies. Let not your [minds and] hearts faint; fear not, and do not tremble or be terrified [and in dread] because of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For the Lord your God is He Who goes with you to fight for you against your enemies to save you. [I Sam. 17:45.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the officers shall speak to the people, saying, What man is there who has built a new house and has not dedicated it? Let him return to his house, lest he die in the battle and another man dedicate it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And what man has planted a vineyard and has not used the fruit of it? Let him also return to his house, lest he die in the battle and another man use the fruit of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And what man has betrothed a wife and has not taken her? Let him return to his house, lest he die in the battle and another man take her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the officers shall speak further to the people, and say, What man is fearful and fainthearted? Let him return to his house, lest [because of him] his brethren''s [minds and] hearts faint as does his own.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And when the officers finish speaking to the people, they shall appoint commanders at the head of the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When you draw near to a city to fight against it, then proclaim peace to it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And if that city makes an answer of peace to you and opens to you, then all the people found in it shall be tributary to you and they shall serve you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But if it refuses to make peace with you and fights against you, then you shall besiege it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And when the Lord your God has given it into your hands, you shall smite every male there with the edge of the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But the women, the little ones, the beasts, and all that is in the city, all the spoil in it, you shall take for yourselves; and you shall use the spoil of your enemies which the Lord your God has given you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So shall you treat all the cities that are very far off from you, that do not belong to the cities of these nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But in the cities of these people which the Lord your God gives you for an inheritance, you shall save alive nothing that breathes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But you shall utterly exterminate them, the Hittites, the Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites, as the Lord your God has commanded you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' So that they may not teach you all the abominable practices they have carried on for their gods, and so cause you to sin against the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' When you besiege a city for a long time, making war against it to take it, you shall not destroy its trees by using an ax on them, for you can eat their fruit; you must not cut them down, for is the tree of the field a man, that it should be besieged by you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Only the trees which you know are not trees for food you may destroy and cut down, that you may build siege works against the city that makes war with you until it falls.'
