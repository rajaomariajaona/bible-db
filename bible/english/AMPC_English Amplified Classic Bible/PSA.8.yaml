document_id: PSA.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; set to a Philistine lute, or +[possibly+] to a particular Hittite tune. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', our Lord, how excellent (majestic and glorious) is Your name in all the earth! You have set Your glory on [or above] the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Out of the mouths of babes and unweaned infants You have established strength because of Your foes, that You might silence the enemy and the avenger. [Matt. 21:15, 16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When I view '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider Your heavens, the work of Your fingers, the moon and the stars, which You have ordained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' What is man that You are mindful of him, and the son of [earthborn] man that You care for him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Yet You have made him but a little lower than God [or heavenly beings], and You have crowned him with glory and honor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You made him to have dominion over the works of Your hands; You have put all things under his feet: [I Cor. 15:27; Eph. 1:22, 23; Heb. 2:6-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' All sheep and oxen, yes, and the beasts of the field,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The birds of the air, and the fish of the sea, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' whatever passes along the paths of the seas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' O Lord, our Lord, how excellent (majestic and glorious) is Your name in all the earth!'
