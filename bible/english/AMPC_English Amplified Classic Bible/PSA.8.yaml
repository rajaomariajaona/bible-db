document_id: PSA.8,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; set to a Philistine lute, or +[possibly+] to a particular Hittite tune. A Psalm of David.
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: ', our Lord, how excellent (majestic and glorious) is Your name in all the earth! You have set Your glory on [or above] the heavens.'
  '2':
  - type: text
    content: ' Out of the mouths of babes and unweaned infants You have established strength because of Your foes, that You might silence the enemy and the avenger. [Matt. 21:15, 16.]'
  '3':
  - type: text
    content: ' When I view '
  - type: text
    content: and
  - type: text
    content: ' consider Your heavens, the work of Your fingers, the moon and the stars, which You have ordained '
  - type: text
    content: and
  - type: text
    content: ' established,'
  '4':
  - type: text
    content: ' What is man that You are mindful of him, and the son of [earthborn] man that You care for him?'
  '5':
  - type: text
    content: ' Yet You have made him but a little lower than God [or heavenly beings], and You have crowned him with glory and honor.'
  '6':
  - type: text
    content: ' You made him to have dominion over the works of Your hands; You have put all things under his feet: [I Cor. 15:27; Eph. 1:22, 23; Heb. 2:6-8.]'
  '7':
  - type: text
    content: ' All sheep and oxen, yes, and the beasts of the field,'
  '8':
  - type: text
    content: ' The birds of the air, and the fish of the sea, '
  - type: text
    content: and
  - type: text
    content: ' whatever passes along the paths of the seas.'
  '9':
  - type: text
    content: ' O Lord, our Lord, how excellent (majestic and glorious) is Your name in all the earth!'
