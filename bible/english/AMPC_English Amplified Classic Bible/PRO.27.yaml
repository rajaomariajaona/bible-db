document_id: PRO.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' DO NOT boast of [yourself and] tomorrow, for you know not what a day may bring forth. [Luke 12:19, 20; James 4:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let another man praise you, and not your own mouth; a stranger, and not your own lips.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Stone is heavy and sand weighty, but a fool''s [unreasoning] wrath is heavier '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more intolerable than both of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Wrath is cruel and anger is an overwhelming flood, but who is able to stand before jealousy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Open rebuke is better than love that is hidden. [Prov. 28:23; Gal. 2:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Faithful are the wounds of a friend, but the kisses of an enemy are lavish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deceitful.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He who is satiated [with sensual pleasures] loathes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treads underfoot a honeycomb, but to the hungry soul every bitter thing is sweet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Like a bird that wanders from her nest, so is a man who strays from his home.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Oil and perfume rejoice the heart; so does the sweetness of a friend''s counsel that comes from the heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Your own friend and your father''s friend, forsake them not; neither go to your brother''s house in the day of your calamity. Better is a neighbor who is near [in spirit] than a brother who is far off [in heart].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' My son, be wise, and make my heart glad, that I may answer him who reproaches me [as having failed in my parental duty]. [Prov. 10:1; 23:15, 24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' A prudent man sees the evil and hides himself, but the simple pass on and are punished [with suffering].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' [The judge tells the creditor] Take the garment of one who is security for a stranger; and hold him in pledge when he is security for foreigners. [Prov. 20:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The flatterer who loudly praises '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorifies his neighbor, rising early in the morning, it shall be counted as cursing him [for he will be suspected of sinister purposes].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' A continual dripping on a day of violent showers and a contentious woman are alike; [Prov. 19:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Whoever attempts to restrain [a contentious woman] might as well try to stop the wind–his right hand encounters oil [and she slips through his fingers].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Iron sharpens iron; so a man sharpens the countenance of his friend [to show rage or worthy purpose].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Whoever tends the fig tree shall eat its fruit; so he who patiently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfully guards '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heeds his master shall be honored. [I Cor. 9:7, 13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' As in water face answers to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reflects face, so the heart of man to man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Sheol (the place of the dead) and Abaddon (the place of destruction) are never satisfied; so [the lust of] the eyes of man is never satisfied. [Prov. 30:16; Hab. 2:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' As the refining pot for silver and the furnace for gold [bring forth all the impurities of the metal], so let a man be in his trial of praise [ridding himself of all that is base or insincere; for a man is judged by what he praises and of what he boasts].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Even though like grain you should pound a fool in a mortar with a pestle, yet will not his foolishness depart from him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Be diligent to know the state of your flocks, and look well to your herds;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For riches are not forever; does a crown endure to all generations?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' When the hay is gone, the tender grass shows itself, and herbs of the mountain are gathered in,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The lambs will be for your clothing, and the goats [will furnish you] the price of a field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And there will be goats'' milk enough for your food, for the food of your household, and for the maintenance of your maids.'
