document_id: AMO.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THUS THE Lord God showed to me, and behold, a basket of [ripe and therefore soon to perish] summer fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And He said, Amos, what do you see? And I said, A basket of summer fruit. Then said the Lord to me, The end has come upon My people Israel; I will not pass by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spare them any more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the songs of the temple shall become wailings in that day, says the Lord God. The dead bodies shall be many; in every place they shall be cast forth in silence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Hear this, O you who would swallow up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trample down the needy, even to make the poor of the land to fail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come to an end,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Saying, When will the New Moon festival be past that we may sell grain? And the Sabbath that we may offer wheat for sale, making the ephah [measure] small and the shekel [measure] great and falsifying the scales by deceit,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' That we may buy [into slavery] the poor for silver and the needy for a pair of sandals; yes, and sell the refuse of the wheat [as if it were good grade]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The Lord has sworn by [Himself Who is] the Glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Pride of Jacob, Surely I will never forget any of their [rebellious] deeds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Shall not the land tremble on this account, and everyone mourn who dwells in it? Yes, it shall rise like the river [Nile], all of it, and it shall be tossed about and sink back again to normal level, as does the Nile of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And in that day, says the Lord God, I will cause the sun to go down at noon, and I will darken the earth in the broad daylight. [Ezek. 32:7-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And I will turn your feasts into mourning and all your songs into lamentation, and I will cause sackcloth to be put upon all loins and baldness [for mourning] shall come on every head; and I will make that time as the mourning for an only son, and the end of it as a bitter day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Behold, the days are coming, says the Lord God, when I will send a famine in the land, not a famine of bread, nor a thirst for water, but [a famine] for hearing the words of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And [the people] shall wander from sea to sea and from the north even to the east; they shall run to and fro to seek the word of the Lord [inquiring for and requiring it as one requires food], but shall not find it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' In that day shall the fair virgins and young men faint for thirst.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Those who swear by Ashimah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the sin of Samaria and say, By the life of your god [the golden calf], O Dan! and [swear], By the life of the way of [idolatrous] Beersheba, they shall fall and rise no more.'
