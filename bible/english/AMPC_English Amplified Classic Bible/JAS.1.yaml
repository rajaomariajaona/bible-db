document_id: JAS.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' JAMES, A servant of God and of the Lord Jesus Christ, to the twelve tribes scattered abroad [among the Gentiles in the dispersion]: Greetings (rejoice)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Consider it wholly joyful, my brethren, whenever you are enveloped in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' encounter trials of any sort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fall into various temptations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Be assured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand that the trial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proving of your faith bring out endurance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfastness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patience.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But let endurance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfastness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patience have full play '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do a thorough work, so that you may be [people] perfectly and fully developed [with no defects], lacking in nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' If any of you is deficient in wisdom, let him ask of the giving God [Who gives] to everyone liberally '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ungrudgingly, without reproaching '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' faultfinding, and it will be given him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Only it must be in faith that he asks with no wavering (no hesitating, no doubting). For the one who wavers (hesitates, doubts) is like the billowing surge out at sea that is blown hither '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thither and tossed by the wind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For truly, let not such a person imagine that he will receive anything [he asks for] from the Lord,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' [For being as he is] a man of two minds (hesitating, dubious, irresolute), [he is] unstable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unreliable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncertain about everything [he thinks, feels, decides].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Let the brother in humble circumstances glory in his elevation [as a Christian, called to the true riches and to be an heir of God],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the rich [person ought to glory] in being humbled [by being shown his human frailty], because like the flower of the grass he will pass away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For the sun comes up with a scorching heat and parches the grass; its flower falls off and its beauty fades away. Even so will the rich man wither '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' die in the midst of his pursuits. [Isa. 40:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Blessed (happy, to be envied) is the man who is patient under trial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stands up under temptation, for when he has stood the test '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' been approved, he will receive [the victor''s] crown of life which God has promised to those who love Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Let no one say when he is tempted, I am tempted from God; for God is incapable of being tempted by [what is] evil and He Himself tempts no one.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But every person is tempted when he is drawn away, enticed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' baited by his own evil desire (lust, passions).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then the evil desire, when it has conceived, gives birth to sin, and sin, when it is fully matured, brings forth death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Do not be misled, my beloved brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Every good gift and every perfect (free, large, full) gift is from above; it comes down from the Father of all [that gives] light, in [the shining of] Whom there can be no variation [rising or setting] or shadow cast by His turning [as in an eclipse].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And it was of His own [free] will that He gave us birth [as sons] by [His] Word of Truth, so that we should be a kind of firstfruits of His creatures [a sample of what He created to be consecrated to Himself].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Understand [this], my beloved brethren. Let every man be quick to hear [a ready listener], slow to speak, slow to take offense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to get angry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For man''s anger does not promote the righteousness God [wishes and requires].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So get rid of all uncleanness and the rampant outgrowth of wickedness, and in a humble (gentle, modest) spirit receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcome the Word which implanted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rooted [in your hearts] contains the power to save your souls.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But be doers of the Word [obey the message], and not merely listeners to it, betraying yourselves [into deception by reasoning contrary to the Truth].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For if anyone only listens to the Word without obeying it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' being a doer of it, he is like a man who looks carefully at his [own] natural face in a mirror;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For he thoughtfully observes himself, and then goes off and promptly forgets what he was like.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But he who looks carefully into the faultless law, the [law] of liberty, and is faithful to it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perseveres in looking into it, being not a heedless listener who forgets but an active doer [who obeys], he shall be blessed in his doing (his life of obedience).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' If anyone thinks himself to be religious (piously observant of the external duties of his faith) and does not bridle his tongue but deludes his own heart, this person''s religious service is worthless (futile, barren).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' External religious worship [religion as it is expressed in outward acts] that is pure and unblemished in the sight of God the Father is this: to visit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' care for the orphans and widows in their affliction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' need, and to keep oneself unspotted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncontaminated from the world.'
