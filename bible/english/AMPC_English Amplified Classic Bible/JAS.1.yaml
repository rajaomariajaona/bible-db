document_id: JAS.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' JAMES, A servant of God and of the Lord Jesus Christ, to the twelve tribes scattered abroad [among the Gentiles in the dispersion]: Greetings (rejoice)!'
  '10':
  - type: text
    content: ' And the rich [person ought to glory] in being humbled [by being shown his human frailty], because like the flower of the grass he will pass away.'
  '11':
  - type: text
    content: ' For the sun comes up with a scorching heat and parches the grass; its flower falls off and its beauty fades away. Even so will the rich man wither '
  - type: text
    content: and
  - type: text
    content: ' die in the midst of his pursuits. [Isa. 40:6, 7.]'
  '12':
  - type: text
    content: ' Blessed (happy, to be envied) is the man who is patient under trial '
  - type: text
    content: and
  - type: text
    content: ' stands up under temptation, for when he has stood the test '
  - type: text
    content: and
  - type: text
    content: ' been approved, he will receive [the victor''s] crown of life which God has promised to those who love Him.'
  '13':
  - type: text
    content: ' Let no one say when he is tempted, I am tempted from God; for God is incapable of being tempted by [what is] evil and He Himself tempts no one.'
  '14':
  - type: text
    content: ' But every person is tempted when he is drawn away, enticed '
  - type: text
    content: and
  - type: text
    content: ' baited by his own evil desire (lust, passions).'
  '15':
  - type: text
    content: ' Then the evil desire, when it has conceived, gives birth to sin, and sin, when it is fully matured, brings forth death.'
  '16':
  - type: text
    content: ' Do not be misled, my beloved brethren.'
  '17':
  - type: text
    content: ' Every good gift and every perfect (free, large, full) gift is from above; it comes down from the Father of all [that gives] light, in [the shining of] Whom there can be no variation [rising or setting] or shadow cast by His turning [as in an eclipse].'
  '18':
  - type: text
    content: ' And it was of His own [free] will that He gave us birth [as sons] by [His] Word of Truth, so that we should be a kind of firstfruits of His creatures [a sample of what He created to be consecrated to Himself].'
  '19':
  - type: text
    content: ' Understand [this], my beloved brethren. Let every man be quick to hear [a ready listener], slow to speak, slow to take offense '
  - type: text
    content: and
  - type: text
    content: ' to get angry.'
  '2':
  - type: text
    content: ' Consider it wholly joyful, my brethren, whenever you are enveloped in '
  - type: text
    content: or
  - type: text
    content: ' encounter trials of any sort '
  - type: text
    content: or
  - type: text
    content: ' fall into various temptations.'
  '20':
  - type: text
    content: ' For man''s anger does not promote the righteousness God [wishes and requires].'
  '21':
  - type: text
    content: ' So get rid of all uncleanness and the rampant outgrowth of wickedness, and in a humble (gentle, modest) spirit receive '
  - type: text
    content: and
  - type: text
    content: ' welcome the Word which implanted '
  - type: text
    content: and
  - type: text
    content: ' rooted [in your hearts] contains the power to save your souls.'
  '22':
  - type: text
    content: ' But be doers of the Word [obey the message], and not merely listeners to it, betraying yourselves [into deception by reasoning contrary to the Truth].'
  '23':
  - type: text
    content: ' For if anyone only listens to the Word without obeying it '
  - type: text
    content: and
  - type: text
    content: ' being a doer of it, he is like a man who looks carefully at his [own] natural face in a mirror;'
  '24':
  - type: text
    content: ' For he thoughtfully observes himself, and then goes off and promptly forgets what he was like.'
  '25':
  - type: text
    content: ' But he who looks carefully into the faultless law, the [law] of liberty, and is faithful to it '
  - type: text
    content: and
  - type: text
    content: ' perseveres in looking into it, being not a heedless listener who forgets but an active doer [who obeys], he shall be blessed in his doing (his life of obedience).'
  '26':
  - type: text
    content: ' If anyone thinks himself to be religious (piously observant of the external duties of his faith) and does not bridle his tongue but deludes his own heart, this person''s religious service is worthless (futile, barren).'
  '27':
  - type: text
    content: ' External religious worship [religion as it is expressed in outward acts] that is pure and unblemished in the sight of God the Father is this: to visit '
  - type: text
    content: and
  - type: text
    content: ' help '
  - type: text
    content: and
  - type: text
    content: ' care for the orphans and widows in their affliction '
  - type: text
    content: and
  - type: text
    content: ' need, and to keep oneself unspotted '
  - type: text
    content: and
  - type: text
    content: ' uncontaminated from the world.'
  '3':
  - type: text
    content: ' Be assured '
  - type: text
    content: and
  - type: text
    content: ' understand that the trial '
  - type: text
    content: and
  - type: text
    content: ' proving of your faith bring out endurance '
  - type: text
    content: and
  - type: text
    content: ' steadfastness '
  - type: text
    content: and
  - type: text
    content: ' patience.'
  '4':
  - type: text
    content: ' But let endurance '
  - type: text
    content: and
  - type: text
    content: ' steadfastness '
  - type: text
    content: and
  - type: text
    content: ' patience have full play '
  - type: text
    content: and
  - type: text
    content: ' do a thorough work, so that you may be [people] perfectly and fully developed [with no defects], lacking in nothing.'
  '5':
  - type: text
    content: ' If any of you is deficient in wisdom, let him ask of the giving God [Who gives] to everyone liberally '
  - type: text
    content: and
  - type: text
    content: ' ungrudgingly, without reproaching '
  - type: text
    content: or
  - type: text
    content: ' faultfinding, and it will be given him.'
  '6':
  - type: text
    content: ' Only it must be in faith that he asks with no wavering (no hesitating, no doubting). For the one who wavers (hesitates, doubts) is like the billowing surge out at sea that is blown hither '
  - type: text
    content: and
  - type: text
    content: ' thither and tossed by the wind.'
  '7':
  - type: text
    content: ' For truly, let not such a person imagine that he will receive anything [he asks for] from the Lord,'
  '8':
  - type: text
    content: ' [For being as he is] a man of two minds (hesitating, dubious, irresolute), [he is] unstable '
  - type: text
    content: and
  - type: text
    content: ' unreliable '
  - type: text
    content: and
  - type: text
    content: ' uncertain about everything [he thinks, feels, decides].'
  '9':
  - type: text
    content: ' Let the brother in humble circumstances glory in his elevation [as a Christian, called to the true riches and to be an heir of God],'
