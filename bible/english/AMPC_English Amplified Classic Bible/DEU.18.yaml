document_id: DEU.18,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE LEVITICAL priests and all the tribe of Levi shall have no part or inheritance with Israel; they shall eat the offerings made by fire to the Lord, and His rightful dues.'
  '10':
  - type: text
    content: ' There shall not be found among you anyone who makes his son or daughter pass through the fire, or who uses divination, or is a soothsayer, or an augur, or a sorcerer,'
  '11':
  - type: text
    content: ' Or a charmer, or a medium, or a wizard, or a necromancer.'
  '12':
  - type: text
    content: ' For all who do these things are an abomination to the Lord, and it is because of these abominable practices that the Lord your God is driving them out before you.'
  '13':
  - type: text
    content: ' You shall be blameless [and absolutely true] to the Lord your God.'
  '14':
  - type: text
    content: ' For these nations whom you shall dispossess listen to soothsayers and diviners. But as for you, the Lord your God has not allowed you to do so.'
  '15':
  - type: text
    content: ' The Lord your God will raise up for you a prophet (Prophet) from the midst of your brethren like me [Moses]; to him you shall listen. [Matt. 21:11; John 1:21.]'
  '16':
  - type: text
    content: ' This is what you desired [and asked] of the Lord your God at Horeb on the day of the assembly when you said, Let me not hear again the voice of the Lord my God or see this great fire any more, lest I die.'
  '17':
  - type: text
    content: ' And the Lord said to me, They have well said all that they have spoken.'
  '18':
  - type: text
    content: ' I will raise up for them a prophet (Prophet) from among their brethren like you, and will put My words in his mouth; and he shall speak to them all that I command him.'
  '19':
  - type: text
    content: ' And whoever will not hearken to My words which he shall speak in My name, I Myself will require it of him.'
  '2':
  - type: text
    content: ' They shall have no inheritance among their brethren; the Lord is their inheritance, as He promised them.'
  '20':
  - type: text
    content: ' But the prophet who presumes to speak a word in My name which I have not commanded him to speak, or who speaks in the name of other gods, that same prophet shall die.'
  '21':
  - type: text
    content: ' And if you say in your [minds and] hearts, How shall we know which words the Lord has not spoken?'
  '22':
  - type: text
    content: ' When a prophet speaks in the name of the Lord, if the word does not come to pass or prove true, that is a word which the Lord has not spoken. The prophet has spoken it presumptuously; you shall not be afraid of him.'
  '3':
  - type: text
    content: ' And this shall be the priest''s due from the people, from those who offer a sacrifice, whether it be ox or sheep: they shall give to the priest the shoulder and the two cheeks and the stomach.'
  '4':
  - type: text
    content: ' The firstfruits of your grain, of your new wine, and of your oil, and the first '
  - type: text
    content: or
  - type: text
    content: ' best of the fleece of your sheep you shall give the priest.'
  '5':
  - type: text
    content: ' For the Lord your God has chosen him out of all your tribes to stand to minister in the name [and presence] of the Lord, him and his sons forever.'
  '6':
  - type: text
    content: ' And if a Levite comes from any of your towns out of all Israel where he is a temporary resident, he may come whenever he desires to [the sanctuary] the place the Lord will choose;'
  '7':
  - type: text
    content: ' Then he may minister in the name [and presence of] the Lord his God like all his brethren the Levites who stand to minister there before the Lord.'
  '8':
  - type: text
    content: ' They shall have equal portions to eat, besides what may come of the sale of his patrimony. [Jer. 32:6-15.]'
  '9':
  - type: text
    content: ' When you come into the land which the Lord your God gives you, you shall not learn to follow the abominable practices of these nations.'
