document_id: HAG.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE seventh month, on the twenty-first day of the month, in the second year of Darius king [of Persia], came the word of the Lord by the prophet Haggai, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Speak now to Zerubbabel son of Shealtiel, governor of Judah, and to Joshua son of Jehozadak, the high priest, and to the remainder of the people, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Who is left among you who saw this house in its former glory? And how do you see it now? Is not this in your sight as nothing in comparison to that?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Yet now be strong, alert, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' courageous, O Zerubbabel, says the Lord; be strong, alert, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' courageous, O Joshua son of Jehozadak, the high priest; and be strong, alert, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' courageous, all you people of the land, says the Lord, and work! For I am with you, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' According to the promise that I covenanted with you when you came out of Egypt, so My Spirit stands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abides in the midst of you; fear not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For thus says the Lord of hosts: Yet once more, in a little while, I will shake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make tremble the [starry] heavens, the earth, the sea, and the dry land; [Heb. 12:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I will shake all nations and the desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the precious things of all nations shall come in, and I will fill this house with splendor, says the Lord of hosts. [Isa. 60:5; Matt. 2:1-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The silver is Mine and the gold is Mine, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The latter glory of this house [with its successor, to which Jesus came] shall be greater than the former, says the Lord of hosts; and in this place will I give peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosperity, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' On the twenty-fourth day of the ninth month, in the second year of Darius, came the word of the Lord by Haggai the prophet, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Thus says the Lord of hosts: Ask now the priests to decide this question of law:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' If one carries in the skirt of his garment flesh that is holy [because it has been offered in sacrifice to God], and with his skirt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the flaps of his garment he touches bread, or pottage, or wine, or oil, or any kind of food, does what he touches become holy [dedicated to God''s service exclusively]? And the priests answered, No! [Holiness is not infectious.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then said Haggai, If one who is [ceremonially] unclean because he has come in contact with a dead body should touch any of these articles of food, shall it be [ceremonially] unclean? And the priests answered, It shall be unclean. [Unholiness is infectious.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then answered Haggai, So is this people and so is this nation before Me, says the Lord; and so is every work of their hands, and what they offer there [on the altar] is unclean [because they who offer it are themselves unclean].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And now, I pray you, consider what will happen from this day onward. Since the time before a stone was laid upon a stone in the temple of the Lord, how have you fared?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Through all that time [the harvests have not fulfilled expectations, for] when one has gone expecting to find a heap [of sheaves] of twenty measures, there were but ten; when he has gone to the wine vat to draw out fifty bucketfuls from the press, there were only twenty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I smote you with blight and with mildew and with hail in all [the products of] the labors of your hands; yet you returned not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' were converted to Me, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Consider, I pray you, from this day onward, from the twenty-fourth day of the ninth month, even from the day that the foundation of the Lord''s temple was [re]laid, consider this:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Is the harvested grain any longer in the barn? As to the grapevine, the fig tree, the pomegranate, and the olive tree–they have not yet borne. From this day on I will bless you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And again the word of the Lord came to Haggai on the twenty-fourth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Speak to Zerubbabel [the representative of the Davidic monarchy and covenant and in direct line of the ancestry of Jesus Christ] governor of Judah, saying, I will shake the heavens and the earth; [Hag. 2:6; Matt. 1:12, 13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And I will [in the distant future] overthrow the throne of kingdoms and I will destroy the strength of the kingdoms of the [ungodly] nations, and I will overthrow the chariots and those who ride in them, and the horses and their riders shall go down, every one by the sword of his brother. [Dan. 2:34, 35, 44, 45; Rev. 19:11-21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' In that day, says the Lord of hosts, will I take you, O Zerubbabel, My servant, the son of Shealtiel, says the Lord, and will make you [through the Messiah, your descendant] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: My
  - type: text
    text: ' signet ring; for I have chosen you [as the one with whom to renew My covenant to David''s line], says the Lord of hosts. [II Sam. 7:12, 16.]'
