document_id: HAG.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE seventh month, on the twenty-first day of the month, in the second year of Darius king [of Persia], came the word of the Lord by the prophet Haggai, saying,'
  '10':
  - type: text
    content: ' On the twenty-fourth day of the ninth month, in the second year of Darius, came the word of the Lord by Haggai the prophet, saying,'
  '11':
  - type: text
    content: ' Thus says the Lord of hosts: Ask now the priests to decide this question of law:'
  '12':
  - type: text
    content: ' If one carries in the skirt of his garment flesh that is holy [because it has been offered in sacrifice to God], and with his skirt '
  - type: text
    content: or
  - type: text
    content: ' the flaps of his garment he touches bread, or pottage, or wine, or oil, or any kind of food, does what he touches become holy [dedicated to God''s service exclusively]? And the priests answered, No! [Holiness is not infectious.]'
  '13':
  - type: text
    content: ' Then said Haggai, If one who is [ceremonially] unclean because he has come in contact with a dead body should touch any of these articles of food, shall it be [ceremonially] unclean? And the priests answered, It shall be unclean. [Unholiness is infectious.]'
  '14':
  - type: text
    content: ' Then answered Haggai, So is this people and so is this nation before Me, says the Lord; and so is every work of their hands, and what they offer there [on the altar] is unclean [because they who offer it are themselves unclean].'
  '15':
  - type: text
    content: ' And now, I pray you, consider what will happen from this day onward. Since the time before a stone was laid upon a stone in the temple of the Lord, how have you fared?'
  '16':
  - type: text
    content: ' Through all that time [the harvests have not fulfilled expectations, for] when one has gone expecting to find a heap [of sheaves] of twenty measures, there were but ten; when he has gone to the wine vat to draw out fifty bucketfuls from the press, there were only twenty.'
  '17':
  - type: text
    content: ' I smote you with blight and with mildew and with hail in all [the products of] the labors of your hands; yet you returned not '
  - type: text
    content: nor
  - type: text
    content: ' were converted to Me, says the Lord.'
  '18':
  - type: text
    content: ' Consider, I pray you, from this day onward, from the twenty-fourth day of the ninth month, even from the day that the foundation of the Lord''s temple was [re]laid, consider this:'
  '19':
  - type: text
    content: ' Is the harvested grain any longer in the barn? As to the grapevine, the fig tree, the pomegranate, and the olive tree–they have not yet borne. From this day on I will bless you.'
  '2':
  - type: text
    content: ' Speak now to Zerubbabel son of Shealtiel, governor of Judah, and to Joshua son of Jehozadak, the high priest, and to the remainder of the people, saying,'
  '20':
  - type: text
    content: ' And again the word of the Lord came to Haggai on the twenty-fourth '
  - type: text
    content: day
  - type: text
    content: ' of the month, saying,'
  '21':
  - type: text
    content: ' Speak to Zerubbabel [the representative of the Davidic monarchy and covenant and in direct line of the ancestry of Jesus Christ] governor of Judah, saying, I will shake the heavens and the earth; [Hag. 2:6; Matt. 1:12, 13.]'
  '22':
  - type: text
    content: ' And I will [in the distant future] overthrow the throne of kingdoms and I will destroy the strength of the kingdoms of the [ungodly] nations, and I will overthrow the chariots and those who ride in them, and the horses and their riders shall go down, every one by the sword of his brother. [Dan. 2:34, 35, 44, 45; Rev. 19:11-21.]'
  '23':
  - type: text
    content: ' In that day, says the Lord of hosts, will I take you, O Zerubbabel, My servant, the son of Shealtiel, says the Lord, and will make you [through the Messiah, your descendant] '
  - type: text
    content: My
  - type: text
    content: ' signet ring; for I have chosen you [as the one with whom to renew My covenant to David''s line], says the Lord of hosts. [II Sam. 7:12, 16.]'
  '3':
  - type: text
    content: ' Who is left among you who saw this house in its former glory? And how do you see it now? Is not this in your sight as nothing in comparison to that?'
  '4':
  - type: text
    content: ' Yet now be strong, alert, '
  - type: text
    content: and
  - type: text
    content: ' courageous, O Zerubbabel, says the Lord; be strong, alert, '
  - type: text
    content: and
  - type: text
    content: ' courageous, O Joshua son of Jehozadak, the high priest; and be strong, alert, '
  - type: text
    content: and
  - type: text
    content: ' courageous, all you people of the land, says the Lord, and work! For I am with you, says the Lord of hosts.'
  '5':
  - type: text
    content: ' According to the promise that I covenanted with you when you came out of Egypt, so My Spirit stands '
  - type: text
    content: and
  - type: text
    content: ' abides in the midst of you; fear not.'
  '6':
  - type: text
    content: ' For thus says the Lord of hosts: Yet once more, in a little while, I will shake '
  - type: text
    content: and
  - type: text
    content: ' make tremble the [starry] heavens, the earth, the sea, and the dry land; [Heb. 12:26.]'
  '7':
  - type: text
    content: ' And I will shake all nations and the desire '
  - type: text
    content: and
  - type: text
    content: ' the precious things of all nations shall come in, and I will fill this house with splendor, says the Lord of hosts. [Isa. 60:5; Matt. 2:1-12.]'
  '8':
  - type: text
    content: ' The silver is Mine and the gold is Mine, says the Lord of hosts.'
  '9':
  - type: text
    content: ' The latter glory of this house [with its successor, to which Jesus came] shall be greater than the former, says the Lord of hosts; and in this place will I give peace '
  - type: text
    content: and
  - type: text
    content: ' prosperity, says the Lord of hosts.'
