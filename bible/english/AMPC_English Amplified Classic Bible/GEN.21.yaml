document_id: GEN.21,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE '
  - type: text
    content: Lord
  - type: text
    content: ' visited Sarah as He had said, and the Lord did for her as He had promised.'
  '10':
  - type: text
    content: ' Therefore she said to Abraham, Cast out this bondwoman and her son, for the son of this bondwoman shall not be an heir with my son Isaac. [Gal. 4:28-31.]'
  '11':
  - type: text
    content: ' And the thing was very grievous (serious, evil) in Abraham''s sight on account of his son [Ishmael].'
  '12':
  - type: text
    content: ' God said to Abraham, Do not let it seem grievous '
  - type: text
    content: and
  - type: text
    content: ' evil to you because of the youth and your bondwoman; in all that Sarah has said to you, do what she asks, for in Isaac shall your posterity be called. [Rom. 9:7.]'
  '13':
  - type: text
    content: ' And I will make a nation of the son of the bondwoman also, because he is your offspring.'
  '14':
  - type: text
    content: ' So Abraham rose early in the morning and took bread and a bottle of water and gave them to Hagar, putting them on her shoulders, and he sent her and the youth away. And she wandered on [aimlessly] and lost her way in the wilderness of Beersheba.'
  '15':
  - type: text
    content: ' When the water in the bottle was all gone, Hagar caused the youth to lie down under one of the shrubs.'
  '16':
  - type: text
    content: ' Then she went and sat down opposite him a good way off, about a bowshot, for she said, Let me not see the death of the lad. And as she sat down opposite him, '
  - type: text
    content: he
  - type: text
    content: ' lifted up his voice and wept '
  - type: text
    content: and
  - type: text
    content: ' she raised her voice and wept.'
  '17':
  - type: text
    content: ' And God heard the voice of the youth, and the angel of God called to Hagar out of heaven and said to her, What troubles you, Hagar? Fear not, for God has heard the voice of the youth where he is.'
  '18':
  - type: text
    content: ' Arise, raise up the youth and support him with your hand, for I intend to make him a great nation.'
  '19':
  - type: text
    content: ' Then God opened her eyes and she saw a well of water; and she went and filled the [empty] bottle with water and caused the youth to drink.'
  '2':
  - type: text
    content: ' For Sarah became pregnant and bore Abraham a son in his old age, at the set time God had told him.'
  '20':
  - type: text
    content: ' And God was with the youth, and he developed; and he dwelt in the wilderness and became an archer.'
  '21':
  - type: text
    content: ' He dwelt in the Wilderness of Paran; and his mother took a wife for him out of the land of Egypt.'
  '22':
  - type: text
    content: ' At that time Abimelech and Phicol the commander of his army said to Abraham, God is with you in everything you do.'
  '23':
  - type: text
    content: ' So now, swear to me here by God that you will not deal falsely with me or with my son or with my posterity; but as I have dealt with you kindly, you will do the same with me and with the land in which you have sojourned.'
  '24':
  - type: text
    content: ' And Abraham said, I will swear.'
  '25':
  - type: text
    content: ' When Abraham complained to '
  - type: text
    content: and
  - type: text
    content: ' reasoned with Abimelech about a well of water [Abimelech''s] servants had violently seized,'
  '26':
  - type: text
    content: ' Abimelech said, I know not who did this thing; you did not tell me, and I did not hear of it until today.'
  '27':
  - type: text
    content: ' So Abraham took sheep and oxen and gave them to Abimelech, and the two men made a league '
  - type: text
    content: or
  - type: text
    content: ' covenant.'
  '28':
  - type: text
    content: ' Abraham set apart seven ewe lambs of the flock,'
  '29':
  - type: text
    content: ' And Abimelech said to Abraham, What do these seven ewe lambs which you have set apart mean?'
  '3':
  - type: text
    content: ' Abraham named his son whom Sarah bore to him Isaac [laughter].'
  '30':
  - type: text
    content: ' He said, You are to accept these seven ewe lambs from me as a witness for me that I dug this well.'
  '31':
  - type: text
    content: ' Therefore that place was called Beersheba [well of the oath], because there both parties swore an oath.'
  '32':
  - type: text
    content: ' Thus they made a covenant at Beersheba; then Abimelech and Phicol the commander of his army returned to the land of the Philistines.'
  '33':
  - type: text
    content: ' Abraham planted a tamarisk tree in Beersheba and called there on the name of the Lord, the Eternal God.'
  '34':
  - type: text
    content: ' And Abraham sojourned in Philistia many days.'
  '4':
  - type: text
    content: ' And Abraham circumcised his son Isaac when he was eight days old, as God had commanded him.'
  '5':
  - type: text
    content: ' Abraham was a hundred years old when Isaac was born.'
  '6':
  - type: text
    content: ' And Sarah said, God has made me to laugh; all who hear will laugh with me.'
  '7':
  - type: text
    content: ' And she said, Who would have said to Abraham that Sarah would nurse children at the breast? For I have borne him a son in his old age! [Heb. 11:12.]'
  '8':
  - type: text
    content: ' And the child grew and was weaned, and Abraham made a great feast the same day that Isaac was weaned.'
  '9':
  - type: text
    content: ' Now Sarah saw the son of Hagar the Egyptian, whom she had borne to Abraham, mocking [Isaac].'
