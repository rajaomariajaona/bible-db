document_id: ROM.14,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AS FOR the man who is a weak believer, welcome him [into your fellowship], but not to criticize his opinions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pass judgment on his scruples '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' perplex him with discussions.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Why do you criticize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pass judgment on your brother? Or you, why do you look down upon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' despise your brother? For we shall all stand before the judgment seat of God.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For it is written, As I live, says the Lord, every knee shall bow to Me, and every tongue shall confess to God [acknowledge Him to His honor and to His praise]. [Isa. 45:23.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And so each of us shall give an account of himself [give an answer in reference to judgment] to God.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then let us no more criticize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pass judgment on one another, but rather decide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' endeavor never to put a stumbling block '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' an obstacle or a hindrance in the way of a brother.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I know and am convinced (persuaded) as one in the Lord Jesus, that nothing is [forbidden as] essentially unclean (defiled and unholy in itself). But [none the less] it is unclean (defiled and unholy) to anyone who thinks it is unclean.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But if your brother is being pained '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' his feelings hurt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' if he is being injured by what you eat, [then] you are no longer walking in love. [You have ceased to be living and conducting yourself by the standard of love toward him.] Do not let what you eat hurt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cause the ruin of one for whom Christ died!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Do not therefore let what seems good to you be considered an evil thing [by someone else]. [In other words, do not give occasion for others to criticize that which is justifiable for you.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' [After all] the kingdom of God is not a matter of [getting the] food and drink [one likes], but instead it is righteousness (that state which makes a person acceptable to God) and [heart] peace and joy in the Holy Spirit.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' He who serves Christ in this way is acceptable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing to God and is approved by men.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' So let us then definitely aim for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eagerly pursue what makes for harmony and for mutual upbuilding (edification and development) of one another.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' One [man''s faith permits him to] believe he may eat anything, while a weaker one [limits his] eating to vegetables.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' You must not, for the sake of food, undo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' break down and destroy the work of God! Everything is indeed [ceremonially] clean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pure, but it is wrong for anyone to hurt the conscience of others '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' to make them fall by what he eats.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The right thing is to eat no meat or drink no wine [at all], or [do anything else] if it makes your brother stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hurts his conscience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' offends or weakens him.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Your personal convictions [on such matters]–exercise [them] as in God''s presence, keeping them to yourself [striving only to know the truth and obey His will]. Blessed (happy, to be envied) is he who has no reason to judge himself for what he approves [who does not convict himself by what he chooses to do].'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' But the man who has doubts (misgivings, an uneasy conscience) about eating, and then eats [perhaps because of you], stands condemned [before God], because he is not true to his convictions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he does not act from faith. For whatever does not originate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proceed from faith is sin [whatever is done without a conviction of its approval by God is sinful].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Let not him who eats look down on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' despise him who abstains, and let not him who abstains criticize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pass judgment on him who eats; for God has accepted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomed him.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Who are you to pass judgment on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' censure another''s household servant? It is before his own master that he stands or falls. And he shall stand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be upheld, for the Master (the Lord) is mighty to support him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make him stand.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' One man esteems one day as better than another, while another man esteems all days alike [sacred]. Let everyone be fully convinced (satisfied) in his own mind.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' He who observes the day, observes it in honor of the Lord. He also who eats, eats in honor of the Lord, since he gives thanks to God; while he who abstains, abstains in honor of the Lord and gives thanks to God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' None of us lives to himself [but to the Lord], and none of us dies to himself [but to the Lord, for]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' If we live, we live to the Lord, and if we die, we die to the Lord. So then, whether we live or we die, we belong to the Lord.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For Christ died and lived again for this very purpose, that He might be Lord both of the dead and of the living.'
