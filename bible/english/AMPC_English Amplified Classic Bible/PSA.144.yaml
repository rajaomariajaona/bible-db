document_id: PSA.144
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: +[A Psalm+] of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BLESSED BE the Lord, my Rock '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my keen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' firm Strength, Who teaches my hands to war and my fingers to fight–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' My Steadfast Love and my Fortress, my High Tower and my Deliverer, my Shield and He in Whom I trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take refuge, Who subdues my people under me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Lord, what is man that You take notice of him? Or [the] son of man that You take account of him? [Job 7:17; Ps. 8:4; Heb. 2:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Man is like vanity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a breath; his days are as a shadow that passes away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Bow Your heavens, O Lord, and come down; touch the mountains, and they shall smoke.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Cast forth lightning and scatter [my enemies]; send out Your arrows and embarrass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' frustrate them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Stretch forth Your hand from above; rescue me and deliver me out of great waters, from the hands of hostile aliens (tribes around us)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Whose mouths speak deceit and whose right hands are right hands [raised in taking] fraudulent oaths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I will sing a new song to You, O God; upon a harp, an instrument of ten strings, will I offer praises to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You are He Who gives salvation to kings, Who rescues David His servant from the hurtful sword [of evil].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Rescue me and deliver me out of the power of [hostile] alien [tribes] whose mouths speak deceit and whose right hands are right hands [raised in taking] fraudulent oaths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When our sons shall be as plants grown large in their youth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' our daughters as sculptured corner pillars hewn like those of a palace;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When our garners are full, affording all manner of store, and our sheep bring forth thousands and ten thousands in our pastures;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When our oxen are well loaded; when there is no invasion [of hostile armies] and no going forth [against besiegers–when there is no murder or manslaughter] and no outcry in our streets;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed are the people who are in such a case; yes, happy (blessed, fortunate, prosperous, to be envied) are the people whose God is the Lord!'
