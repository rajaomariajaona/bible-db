document_id: MIC.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WOE TO those who devise iniquity and work out evil upon their beds! When the morning is light, they perform '
  - type: text
    content: and
  - type: text
    content: ' practice it because it is in their power.'
  '10':
  - type: text
    content: ' Arise and depart, for this is not the rest [which was promised to the righteous in Canaan], because of uncleanness that works destruction, even a sharp '
  - type: text
    content: and
  - type: text
    content: ' grievous destruction.'
  '11':
  - type: text
    content: ' If a man walking in a spirit [of vanity] and in falsehood should lie and say, I will prophesy to you of wine and strong drink, O Israel, he would even be the acceptable prophet of this people! [Jer. 5:31.]'
  '12':
  - type: text
    content: ' I will surely gather all of you, O Jacob; I will surely collect the remnant of Israel. I will bring them [Israel] together like sheep in a fold, like a flock in the midst of their pasture. They [the fold and the pasture] shall swarm with men '
  - type: text
    content: and
  - type: text
    content: ' hum with much noise.'
  '13':
  - type: text
    content: ' The Breaker [the Messiah] will go up before them. They will break through, pass in through the gate and go out through it, and their King will pass on before them, the Lord at their head. [Exod. 23:20, 21; 33:14; Isa. 63:8, 9; Hos. 3:5; Amos 9:11.]'
  '2':
  - type: text
    content: ' They covet fields and seize them, and houses and take them away; they oppress '
  - type: text
    content: and
  - type: text
    content: ' crush a man and his house, a man and his inheritance. [Isa. 5:8.]'
  '3':
  - type: text
    content: ' Therefore thus says the Lord: Behold, against this family I am planning a disaster from which you cannot remove your necks, nor will you be able to walk erect; for it will be an evil time.'
  '4':
  - type: text
    content: ' In that day shall they take up a [taunting] parable against you and wail with a doleful '
  - type: text
    content: and
  - type: text
    content: ' bitter lamentation and say, We are utterly ruined '
  - type: text
    content: and
  - type: text
    content: ' laid waste! [God] changes the portion of my people. How He removes it from me! He divides our fields [to the rebellious, our captors].'
  '5':
  - type: text
    content: ' Therefore you shall have no one to cast a line by lot upon a plot [of ground] in the assembly of the Lord. [Rev. 21:27.]'
  '6':
  - type: text
    content: ' Do not preach, say the prophesying false prophets; one should not babble '
  - type: text
    content: and
  - type: text
    content: ' harp on such things; disgrace will not overtake us [the reviling has no end].'
  '7':
  - type: text
    content: ' O house of Jacob, shall it be said, Is the Spirit of the Lord restricted, impatient, '
  - type: text
    content: and
  - type: text
    content: ' shortened? Or are these [prophesied plagues] His doings? Do not My words do good to him who walks uprightly?'
  '8':
  - type: text
    content: ' But lately (yesterday) My people have stood up as an enemy [and have made Me their antagonist]. Off from the garment you strip the cloak of those who pass by in secure confidence of safety '
  - type: text
    content: and
  - type: text
    content: ' are averse to war.'
  '9':
  - type: text
    content: ' The women of My people you cast out from their pleasant houses; from their young children you take away My glory forever.'
