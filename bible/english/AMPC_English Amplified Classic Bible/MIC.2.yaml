document_id: MIC.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WOE TO those who devise iniquity and work out evil upon their beds! When the morning is light, they perform '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' practice it because it is in their power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' They covet fields and seize them, and houses and take them away; they oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crush a man and his house, a man and his inheritance. [Isa. 5:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Therefore thus says the Lord: Behold, against this family I am planning a disaster from which you cannot remove your necks, nor will you be able to walk erect; for it will be an evil time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' In that day shall they take up a [taunting] parable against you and wail with a doleful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bitter lamentation and say, We are utterly ruined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' laid waste! [God] changes the portion of my people. How He removes it from me! He divides our fields [to the rebellious, our captors].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Therefore you shall have no one to cast a line by lot upon a plot [of ground] in the assembly of the Lord. [Rev. 21:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Do not preach, say the prophesying false prophets; one should not babble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' harp on such things; disgrace will not overtake us [the reviling has no end].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' O house of Jacob, shall it be said, Is the Spirit of the Lord restricted, impatient, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shortened? Or are these [prophesied plagues] His doings? Do not My words do good to him who walks uprightly?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But lately (yesterday) My people have stood up as an enemy [and have made Me their antagonist]. Off from the garment you strip the cloak of those who pass by in secure confidence of safety '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are averse to war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The women of My people you cast out from their pleasant houses; from their young children you take away My glory forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Arise and depart, for this is not the rest [which was promised to the righteous in Canaan], because of uncleanness that works destruction, even a sharp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grievous destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' If a man walking in a spirit [of vanity] and in falsehood should lie and say, I will prophesy to you of wine and strong drink, O Israel, he would even be the acceptable prophet of this people! [Jer. 5:31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I will surely gather all of you, O Jacob; I will surely collect the remnant of Israel. I will bring them [Israel] together like sheep in a fold, like a flock in the midst of their pasture. They [the fold and the pasture] shall swarm with men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hum with much noise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The Breaker [the Messiah] will go up before them. They will break through, pass in through the gate and go out through it, and their King will pass on before them, the Lord at their head. [Exod. 23:20, 21; 33:14; Isa. 63:8, 9; Hos. 3:5; Amos 9:11.]'
