document_id: PSA.122
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Song of Ascents. Of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I WAS glad when they said to me, Let us go to the house of the Lord! [Isa. 2:3; Zech. 8:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Our feet are standing within your gates, O Jerusalem!–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Jerusalem, which is built as a city that is compacted together–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' To which the tribes go up, even the tribes of the Lord, as was decreed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' as a testimony for Israel, to give thanks to the name of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For there the thrones of judgment were set, the thrones of the house of David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Pray for the peace of Jerusalem! May they prosper who love you [the Holy City]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' May peace be within your walls and prosperity within your palaces!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For my brethren and companions'' sake, I will now say, Peace be within you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For the sake of the house of the Lord our God, I will seek, inquire for, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require your good.'
