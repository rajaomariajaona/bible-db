document_id: PSA.122,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents. Of David.
  - type: text
    content: ' I WAS glad when they said to me, Let us go to the house of the Lord! [Isa. 2:3; Zech. 8:21.]'
  '2':
  - type: text
    content: ' Our feet are standing within your gates, O Jerusalem!–'
  '3':
  - type: text
    content: ' Jerusalem, which is built as a city that is compacted together–'
  '4':
  - type: text
    content: ' To which the tribes go up, even the tribes of the Lord, as was decreed '
  - type: text
    content: and
  - type: text
    content: ' as a testimony for Israel, to give thanks to the name of the Lord.'
  '5':
  - type: text
    content: ' For there the thrones of judgment were set, the thrones of the house of David.'
  '6':
  - type: text
    content: ' Pray for the peace of Jerusalem! May they prosper who love you [the Holy City]!'
  '7':
  - type: text
    content: ' May peace be within your walls and prosperity within your palaces!'
  '8':
  - type: text
    content: ' For my brethren and companions'' sake, I will now say, Peace be within you!'
  '9':
  - type: text
    content: ' For the sake of the house of the Lord our God, I will seek, inquire for, '
  - type: text
    content: and
  - type: text
    content: ' require your good.'
