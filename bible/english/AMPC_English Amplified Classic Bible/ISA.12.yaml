document_id: ISA.12,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND IN that day you will say, I will give thanks to You, O Lord; for though You were angry with me, Your anger has turned away, and You comfort me.'
  '2':
  - type: text
    content: ' Behold, God, my salvation! I will trust and not be afraid, for the Lord God is my strength and song; yes, He has become my salvation.'
  '3':
  - type: text
    content: ' Therefore with joy will you draw water from the wells of salvation.'
  '4':
  - type: text
    content: ' And in that day you will say, Give thanks to the Lord, call upon His name '
  - type: text
    content: and
  - type: text
    content: ' by means of His name [in solemn entreaty]; declare '
  - type: text
    content: and
  - type: text
    content: ' make known His deeds among the peoples of the earth, proclaim that His name is exalted!'
  '5':
  - type: text
    content: ' Sing praises to the Lord, for He has done excellent things [gloriously]; let this be made known to all the earth.'
  '6':
  - type: text
    content: ' Cry aloud and shout joyfully, you women '
  - type: text
    content: and
  - type: text
    content: ' inhabitants of Zion, for great in your midst is the Holy One of Israel.'
