document_id: ISA.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND IN that day you will say, I will give thanks to You, O Lord; for though You were angry with me, Your anger has turned away, and You comfort me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Behold, God, my salvation! I will trust and not be afraid, for the Lord God is my strength and song; yes, He has become my salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Therefore with joy will you draw water from the wells of salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And in that day you will say, Give thanks to the Lord, call upon His name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by means of His name [in solemn entreaty]; declare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make known His deeds among the peoples of the earth, proclaim that His name is exalted!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Sing praises to the Lord, for He has done excellent things [gloriously]; let this be made known to all the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Cry aloud and shout joyfully, you women '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inhabitants of Zion, for great in your midst is the Holy One of Israel.'
