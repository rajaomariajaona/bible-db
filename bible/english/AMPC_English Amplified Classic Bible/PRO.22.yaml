document_id: PRO.22,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' A GOOD name is rather to be chosen than great riches, and loving favor rather than silver and gold.'
  '10':
  - type: text
    content: ' Drive out the scoffer, and contention will go out; yes, strife and abuse will cease.'
  '11':
  - type: text
    content: ' He who loves purity '
  - type: text
    content: and
  - type: text
    content: ' the pure in heart '
  - type: text
    content: and
  - type: text
    content: ' who is gracious in speech–because of the grace of his lips will he have the king for his friend.'
  '12':
  - type: text
    content: ' The eyes of the Lord keep guard over knowledge '
  - type: text
    content: and
  - type: text
    content: ' him who has it, but He overthrows the words of the treacherous.'
  '13':
  - type: text
    content: ' The sluggard says, There is a lion outside! I shall be slain in the streets!'
  '14':
  - type: text
    content: ' The mouth of a loose woman is a deep pit [for ensnaring wild animals]; he with whom the Lord is indignant '
  - type: text
    content: and
  - type: text
    content: ' who is abhorrent to Him will fall into it.'
  '15':
  - type: text
    content: ' Foolishness is bound up in the heart of a child, but the rod of discipline will drive it far from him.'
  '16':
  - type: text
    content: ' He who oppresses the poor to get gain for himself '
  - type: text
    content: and
  - type: text
    content: ' he who gives to the rich–both will surely come to want.'
  '17':
  - type: text
    content: ' Listen (consent and submit) to the words of the wise, and apply your mind to my knowledge;'
  '18':
  - type: text
    content: ' For it will be pleasant if you keep them in your mind [believing them]; your lips will be accustomed to [confessing] them.'
  '19':
  - type: text
    content: ' So that your trust (belief, reliance, support, and confidence) may be in the Lord, I have made known these things to you today, even to you.'
  '2':
  - type: text
    content: ' The rich and poor meet together; the Lord is the Maker of them all. [Job 31:15; Prov. 14:31.]'
  '20':
  - type: text
    content: ' Have I not written to you [long ago] excellent things in counsels and knowledge,'
  '21':
  - type: text
    content: ' To make you know the certainty of the words of truth, that you may give a true answer to those who sent you? [Luke 1:3, 4.]'
  '22':
  - type: text
    content: ' Rob not the poor [being tempted by their helplessness], neither oppress the afflicted at the gate [where the city court is held], [Exod. 23:6; Job 31:16, 21.]'
  '23':
  - type: text
    content: ' For the Lord will plead their cause and deprive of life those who deprive [the poor or afflicted]. [Zech. 7:10; Mal. 3:5.]'
  '24':
  - type: text
    content: ' Make no friendships with a man given to anger, and with a wrathful man do not associate,'
  '25':
  - type: text
    content: ' Lest you learn his ways and get yourself into a snare.'
  '26':
  - type: text
    content: ' Be not one of those who strike hands '
  - type: text
    content: and
  - type: text
    content: ' pledge themselves, or of those who become security for another''s debts.'
  '27':
  - type: text
    content: ' If you have nothing with which to pay, why should he take your bed from under you?'
  '28':
  - type: text
    content: ' Remove not the ancient landmark which your fathers have set up.'
  '29':
  - type: text
    content: ' Do you see a man diligent '
  - type: text
    content: and
  - type: text
    content: ' skillful in his business? He will stand before kings; he will not stand before obscure men.'
  '3':
  - type: text
    content: ' A prudent man sees the evil and hides himself, but the simple pass on and are punished [with suffering].'
  '4':
  - type: text
    content: ' The reward of humility '
  - type: text
    content: and
  - type: text
    content: ' the reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord is riches and honor and life.'
  '5':
  - type: text
    content: ' Thorns and snares are in the way of the obstinate '
  - type: text
    content: and
  - type: text
    content: ' willful; he who guards himself will be far from them.'
  '6':
  - type: text
    content: ' Train up a child in the way he should go [and in keeping with his individual gift or bent], and when he is old he will not depart from it. [Eph. 6:4; II Tim. 3:15.]'
  '7':
  - type: text
    content: ' The rich rule over the poor, and the borrower is servant to the lender.'
  '8':
  - type: text
    content: ' He who sows iniquity will reap calamity '
  - type: text
    content: and
  - type: text
    content: ' futility, and the rod of his wrath [with which he smites others] will fail.'
  '9':
  - type: text
    content: ' He who has a bountiful eye shall be blessed, for he gives of his bread to the poor. [II Cor. 9:6-10.]'
