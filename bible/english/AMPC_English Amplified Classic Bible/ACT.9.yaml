document_id: ACT.9,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MEANWHILE SAUL, still drawing his breath hard from threatening and murderous desire against the disciples of the Lord, went to the high priest'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Now there was in Damascus a disciple named Ananias. The Lord said to him in a vision, Ananias. And he answered, Here am I, Lord.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And the Lord said to him, Get up and go to the street called Straight and ask at the house of Judas for a man of Tarsus named Saul, for behold, he is praying [there].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And he has seen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in a vision
    - type: text
      text: ' a man named Ananias enter and lay his hands on him so that he might regain his sight.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But Ananias answered, Lord, I have heard many people tell about this man, especially how much evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' what great suffering he has brought on Your saints at Jerusalem;'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Now he is here and has authority from the high priests to put in chains all who call upon Your name.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But the Lord said to him, Go, for this man is a chosen instrument of Mine to bear My name before the Gentiles and kings and the descendants of Israel;'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For I will make clear to him how much he will be afflicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' must endure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffer for My name''s sake.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So Ananias left and went into the house. And he laid his hands on Saul and said, Brother Saul, the Lord Jesus, Who appeared to you along the way by which you came here, has sent me that you may recover your sight and be filled with the Holy Spirit.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And instantly something like scales fell from [Saul''s] eyes, and he recovered his sight. Then he arose and was baptized,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And after he took some food, he was strengthened. For several days [afterward] he remained with the disciples at Damascus.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And requested of him letters to the synagogues at Damascus [authorizing him], so that if he found any men or women belonging to the Way [of life as determined by faith in Jesus Christ], he might bring them bound [with chains] to Jerusalem.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And immediately in the synagogues he proclaimed Jesus, saying, He is the Son of God!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And all who heard him were amazed and said, Is not this the very man who harassed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overthrew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed in Jerusalem those who called upon this Name? And he has come here for the express purpose of arresting them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bringing them in chains before the chief priests.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But Saul increased all the more in strength, and continued to confound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put to confusion the Jews who lived in Damascus by comparing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' examining evidence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proving that Jesus is the Christ (the Messiah).'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' After considerable time had elapsed, the Jews conspired to put Saul out of the way by slaying him,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' But [the knowledge of] their plot was made known to Saul. They were guarding the [city''s] gates day and night to kill him,'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' But his disciples took him at night and let him down through the [city''s] wall, lowering him in a basket '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hamper.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And when he had arrived in Jerusalem, he tried to associate himself with the disciples; but they were all afraid of him, for they did not believe he really was a disciple.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' However, Barnabas took him and brought him to the apostles, and he explained to them how along the way he had seen the Lord, Who spoke to him, and how at Damascus he had preached freely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' courageously in the name of Jesus.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' So he went in and out [as one] among them at Jerusalem,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Preaching freely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' boldly in the name of the Lord. And he spoke and discussed with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disputed against the Hellenists (the Grecian Jews), but they were seeking to slay him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Now as he traveled on, he came near to Damascus, and suddenly a light from heaven flashed around him,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And when the brethren found it out, they brought him down to Caesarea and sent him off to Tarsus [his home town].'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' So the church throughout the whole of Judea and Galilee and Samaria had peace and was edified [growing in wisdom, virtue, and piety] and walking in the respect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverential fear of the Lord and in the consolation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exhortation of the Holy Spirit, continued to increase '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' was multiplied.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Now as Peter went here and there among them all, he went down also to the saints who lived at Lydda.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' There he found a man named Aeneas, who had been bedfast for eight years and was paralyzed.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And Peter said to him, Aeneas, Jesus Christ (the Messiah) [now] makes you whole. Get up and make your bed! And immediately [Aeneas] stood up.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Then all the inhabitants of Lydda and the plain of Sharon saw [what had happened to] him and they turned to the Lord.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Now there was at Joppa a disciple [a woman] named [in Aramaic] Tabitha, which [in Greek] means Dorcas. She was abounding in good deeds and acts of charity.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' About that time she fell sick and died, and when they had cleansed her, they laid [her] in an upper room.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Since Lydda was near Joppa [however], the disciples, hearing that Peter was there, sent two men to him begging him, Do come to us without delay.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' So Peter [immediately] rose and accompanied them. And when he had arrived, they took him to the upper room. All the widows stood around him, crying and displaying undershirts (tunics) and [other] garments such as Dorcas was accustomed to make while she was with them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And he fell to the ground. Then he heard a voice saying to him, Saul, Saul, why are you persecuting Me [harassing, troubling, and molesting Me]?'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' But Peter put them all out [of the room] and knelt down and prayed; then turning to the body he said, Tabitha, get up! And she opened her eyes; and when she saw Peter, she raised herself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sat upright.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' And he gave her his hand and lifted her up. Then calling in God''s people and the widows, he presented her to them alive.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' And this became known throughout all Joppa, and many came to believe on the Lord [to adhere to and trust in and rely on Him as the Christ and as their Savior].'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' And Peter remained in Joppa for considerable time with a certain Simon a tanner.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And Saul said, Who are You, Lord? And He said, I am Jesus, Whom you are persecuting. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: It is dangerous and it will turn out badly for you to keep kicking against the goad [to offer vain and perilous resistance].
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Trembling and astonished he asked, Lord, what do You desire me to do? The Lord said to him,
    - type: text
      text: ' But arise and go into the city, and you will be told what you must do.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The men who were accompanying him were unable to speak [for terror], hearing the voice but seeing no one.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then Saul got up from the ground, but though his eyes were opened, he could see nothing; so they led him by the hand and brought him into Damascus.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And he was unable to see for three days, and he neither ate nor drank [anything].'
