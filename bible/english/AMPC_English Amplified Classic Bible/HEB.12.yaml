document_id: HEB.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEREFORE THEN, since we are surrounded by so great a cloud of witnesses [who have borne testimony to the Truth], let us strip off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' throw aside every encumbrance (unnecessary weight) and that sin which so readily (deftly and cleverly) clings to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' entangles us, and let us run with patient endurance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steady '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' active persistence the appointed course of the race that is set before us,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For [our earthly fathers] disciplined us for only a short period of time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chastised us as seemed proper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good to them; but He disciplines us for our certain good, that we may become sharers in His own holiness.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For the time being no discipline brings joy, but seems grievous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' painful; but afterwards it yields a peaceable fruit of righteousness to those who have been trained by it [a harvest of fruit which consists in righteousness–in conformity to God''s will in purpose, thought, and action, resulting in right living and right standing with God].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So then, brace up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reinvigorate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set right your slackened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weakened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' drooping hands and strengthen your feeble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' palsied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tottering knees, [Isa. 35:3.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And cut through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make firm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' smooth, straight paths for your feet [yes, make them safe and upright and happy paths that go in the right direction], so that the lame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' halting [limbs] may not be put out of joint, but rather may be cured.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Strive to live in peace with everybody and pursue that consecration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' holiness without which no one will [ever] see the Lord.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Exercise foresight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be on the watch to look [after one another], to see that no one falls back from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fails to secure God''s grace (His unmerited favor and spiritual blessing), in order that no root of resentment (rancor, bitterness, or hatred) shoots forth and causes trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bitter torment, and the many become contaminated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defiled by it–'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' That no one may become guilty of sexual vice, or become a profane (godless and sacrilegious) person as Esau did, who sold his own birthright for a single meal. [Gen. 25:29-34.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' For you understand that later on, when he wanted [to regain title to] his inheritance of the blessing, he was rejected (disqualified and set aside), for he could find no opportunity to repair by repentance [what he had done, no chance to recall the choice he had made], although he sought for it carefully with [bitter] tears. [Gen. 27:30-40.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' For you have not come [as did the Israelites in the wilderness] to a [material] mountain that can be touched, [a mountain] that is ablaze with fire, and to gloom and darkness and a raging storm,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And to the blast of a trumpet and a voice whose words make the listeners beg that nothing more be said to them. [Exod. 19:12-22; 20:18-21; Deut. 4:11, 12; 5:22-27.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Looking away [from all that will distract] to Jesus, Who is the Leader '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the Source of our faith [giving the first incentive for our belief] and is also its Finisher [bringing it to maturity and perfection]. He, for the joy [of obtaining the prize] that was set before Him, endured the cross, despising '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ignoring the shame, and is now seated at the right hand of the throne of God. [Ps. 110:1.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' For they could not bear the command that was given: If even a wild animal touches the mountain, it shall be stoned to death. [Exod. 19:12, 13.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' In fact, so awful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrifying was the [phenomenal] sight that Moses said, I am terrified (aghast and trembling with fear). [Deut. 9:19.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But rather, you have come to Mount Zion, even to the city of the living God, the heavenly Jerusalem, and to countless multitudes of angels in festal gathering,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And to the church (assembly) of the Firstborn who are registered [as citizens] in heaven, and to the God Who is Judge of all, and to the spirits of the righteous (the redeemed in heaven) who have been made perfect,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And to Jesus, the Mediator (Go-between, Agent) of a new covenant, and to the sprinkled blood which speaks [of mercy], a better '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nobler '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' more gracious message than the blood of Abel [which cried out for vengeance]. [Gen. 4:10.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' So see to it that you do not reject Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' refuse to listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed Him Who is speaking [to you now]. For if they [the Israelites] did not escape when they refused to listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed Him Who warned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' divinely instructed them [here] on earth [revealing with heavenly warnings His will], how much less shall we escape if we reject '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' turn our backs on Him Who cautions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' admonishes [us] from heaven?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Then [at Mount Sinai] His voice shook the earth, but now He has given a promise: Yet once more I will shake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make tremble not only the earth but also the [starry] heavens. [Hag. 2:6.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Now this expression, Yet once more, indicates the final removal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' transformation of all [that can be] shaken–that is, of that which has been created–in order that what cannot be shaken may remain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' continue. [Ps. 102:26.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Let us therefore, receiving a kingdom that is firm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cannot be shaken, offer to God pleasing service '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acceptable worship, with modesty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pious care and godly fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awe;'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' For our God [is indeed] a consuming fire. [Deut. 4:24.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Just think of Him Who endured from sinners such grievous opposition '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bitter hostility against Himself [reckon up and consider it all in comparison with your trials], so that you may not grow weary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' exhausted, losing heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relaxing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fainting in your minds.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' You have not yet struggled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fought agonizingly against sin, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' have you yet resisted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' withstood to the point of pouring out your [own] blood.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And have you [completely] forgotten the divine word of appeal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouragement in which you are reasoned with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' addressed as sons? My son, do not think lightly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' scorn to submit to the correction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline of the Lord, nor lose courage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faint when you are reproved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' corrected by Him;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For the Lord corrects '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disciplines everyone whom He loves, and He punishes, even scourges, every son whom He accepts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomes to His heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cherishes.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' You must submit to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' endure [correction] for discipline; God is dealing with you as with sons. For what son is there whom his father does not [thus] train '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' correct '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Now if you are exempt from correction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' left without discipline in which all [of God''s children] share, then you are illegitimate offspring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' not true sons [at all]. [Prov. 3:11, 12.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Moreover, we have had earthly fathers who disciplined us and we yielded [to them] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' respected [them for training us]. Shall we not much more cheerfully submit to the Father of spirits and so [truly] live?'
