document_id: EZK.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, How is the wood of the grapevine [Israel] more than that of any tree, the vine branch which was among the trees of the forest? [Ps. 80:8-13; Jer. 2:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Shall wood be taken from it to do any work? Or will men take a peg of it on which to hang any vessel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Behold, it is cast into the fire for fuel; the fire consumes both ends of it and the middle of it is charred. Is it suitable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' profitable for any work?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Notice, even when it was whole, it was good for no work; how much less shall it be useful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profitable when the fire has devoured it and it is charred?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore thus says the Lord God: Like the wood of the grapevine among the trees of the forest, which I have given to the fire for fuel, so will I give up the inhabitants of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I will set My face against them; they shall go out from one fire and another fire shall devour them, and you shall know (understand and realize) that I am the Lord, when I set My face against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I will make the land desolate (laid waste and deserted) because they have acted faithlessly [through their idolatry], says the Lord.'
