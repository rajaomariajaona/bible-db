document_id: MRK.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IT WAS now two days before the Passover and the Feast of Unleavened Bread, and the chief priests and the scribes were all the while seeking to arrest [Jesus] by secrecy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deceit and put [Him] to death,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For they kept saying, It must not be during the Feast, for fear that there might be a riot of the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And while He was in Bethany, [a guest] in the house of Simon the leper, as He was reclining [at table], a woman came with an alabaster jar of ointment (perfume) of pure nard, very costly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' precious; and she broke the jar and poured [the perfume] over His head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But there were some who were moved with indignation and said to themselves, To what purpose was the ointment (perfume) thus wasted?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For it was possible to have sold this [perfume] for more than 300 denarii [a laboring man''s wages for a year] and to have given [the money] to the poor. And they censured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproved her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But Jesus said, Let her alone; why are you troubling her? She has done a good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beautiful thing to Me [praiseworthy and noble].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For you always have the poor with you, and whenever you wish you can do good to them; but you will not always have Me. [Deut. 15:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' She has done what she could; she came beforehand to anoint My body for the burial.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And surely I tell you, wherever the good news (the Gospel) is proclaimed in the entire world, what she has done will be told in memory of her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Judas Iscariot, who was one of the Twelve [apostles], went off to the chief priests in order to betray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hand Him over to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And when they heard it, they rejoiced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were delighted, and they promised to give him money. And he [busying himself continually] sought an opportunity to betray Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' On the first day [of the Feast] of Unleavened Bread, when [as was customary] they killed the Passover lamb, [Jesus''] disciples said to Him, Where do You wish us to go [and] prepare the Passover [supper] for You to eat?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And He sent two of His disciples and said to them, Go into the city, and a man carrying an [earthen] jar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pitcher of water will meet you; follow him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And whatever [house] he enters, say to the master of the house, The Teacher says: Where is My guest room, where I may eat the Passover [supper] with My disciples?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And he will [himself] show you a large upper room, furnished [with carpets and with dining couches properly spread] and ready; there prepare for us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then the disciples set out and came to the city and found [everything] just as He had told them; and they prepared the Passover.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And when it was evening, He came with the Twelve [apostles].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And while they were at the table eating, Jesus said, Surely I say to you, one of you will betray Me, [one] who is eating [here] with Me. [Ps. 41:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And they began to show that they were sad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hurt, and to say to Him one after another, Is it I? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or,
  - type: text
    text: ' It is not I, is it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He replied to them, It is one of the Twelve [apostles], one who is dipping [bread] into the [same deep] dish with Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For the Son of Man is going as it stands written concerning Him; but woe to that man by whom the Son of Man is betrayed! It would have been good (profitable and wholesome) for that man if he had never been born. [Ps. 41:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And while they were eating, He took a loaf [of bread], praised God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gave thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' asked Him to bless it to their use. [Then] He broke [it] and gave to them and said, Take. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Eat.
  - type: text
    text: ' This is My body.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He also took a cup [of the juice of grapes], and when He had given thanks, He gave [it] to them, and they all drank of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And He said to them, This is My blood [which ratifies] the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: new
  - type: text
    text: ' covenant, [the blood] which is being poured out for (on account of) many. [Exod. 24:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Solemnly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' surely I tell you, I shall not again drink of the fruit of the vine till that day when I drink it of a new '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a higher quality in God''s kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And when they had sung a hymn, they went out to the Mount of Olives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And Jesus said to them, You will all fall away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this night
  - type: text
    text: ' [that is, you will be caused to stumble and will begin to distrust and desert Me], for it stands written, I will strike the Shepherd, and the sheep will be scattered. [Zech. 13:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But after I am raised [to life], I will go before you into Galilee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But Peter said to Him, Even if they all fall away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are caused to stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distrust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desert You, yet I will not [do so]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Jesus said to him, Truly I tell you, this very night, before a cock crows twice, you will utterly deny Me [disclaiming all connection with Me] three times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But [Peter] said more vehemently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repeatedly, [Even] if it should be necessary for me to die with You, I will not deny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' disown You! And they all kept saying the same thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Then they went to a place called Gethsemane, and He said to His disciples, Sit down here while I pray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And He took with Him Peter and James and John, and began to be struck with terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' amazement and deeply troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depressed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And He said to them, My soul is exceedingly sad (overwhelmed with grief) so that it almost kills Me! Remain here and keep awake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be watching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And going a little farther, He fell on the ground and kept praying that if it were possible the [fatal] hour might pass from Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And He was saying, Abba, [which means] Father, everything is possible for You. Take away this cup from Me; yet not what I will, but what You [will].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And He came back and found them sleeping, and He said to Peter, Simon, are you asleep? Have you not the strength to keep awake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watch [with Me for] one hour?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Keep awake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watch and pray [constantly], that you may not enter into temptation; the spirit indeed is willing, but the flesh is weak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' He went away again and prayed, saying the same words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And again He came back and found them sleeping, for their eyes were very heavy; and they did not know what answer to give Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And He came back a third time and said to them, Are you still sleeping and resting? It is enough [of that]! The hour has come. The Son of Man is betrayed into the hands of sinful men (men whose way or nature is to act in opposition to God).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Get up, let us be going! See, My betrayer is at hand!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And at once, while He was still speaking, Judas came, one of the Twelve [apostles], and with him a crowd of men with swords and clubs, [who came] from the chief priests and the scribes and the elders [of the Sanhedrin].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Now the betrayer had given them a signal, saying, The One I shall kiss is [the Man]; seize Him and lead [Him] away safely [so as to prevent His escape].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And when he came, he went up to Jesus immediately and said, Master! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Master!
  - type: text
    text: ' and he embraced Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kissed Him fervently.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And they threw their hands on Him and arrested Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' But one of the bystanders drew his sword and struck the bond servant of the high priest and cut off his ear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And Jesus said to them, Have you come out with swords and clubs as [you would] against a robber to capture Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' I was with you daily in the temple [porches and courts] teaching, and you did not seize Me; but [this has happened] that the Scriptures might be fulfilled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' Then [His disciples], forsaking Him, fled, all [of them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' And a young man was following Him, with nothing but a linen cloth (sheet) thrown about [his] naked [body]; and they laid hold of him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' But, leaving behind the linen cloth (sheet), he fled from them naked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' And they led Jesus away to the high priest, and all the chief priests and the elders and the scribes were gathered together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' And Peter followed Him at a distance, even right into the courtyard of the high priest. And he was sitting [in the firelight] with the guards and warming himself at the fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' Now the chief priests and the entire council (the Sanhedrin) were constantly seeking [to get] testimony against Jesus with a view to condemning Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' putting Him to death, but they did not find any.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' For many were repeatedly bearing false witness against Him, but their testimonies did not agree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' And some stood up and were bearing false witness against Him, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' We heard Him say, I will destroy this temple (sanctuary) which is made with hands, and in three days I will build another, made without hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: ' Still not even [in this] did their testimony agree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: ' And the high priest stood up in the midst and asked Jesus, Have You not even one answer to make? What [about this which] these [men] are testifying against You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ' But He kept still and did not answer at all. Again the high priest asked Him, Are You the Christ (the Messiah, the Anointed One), the Son of the Blessed?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: ' And Jesus said, I AM; and you will [all] see the Son of Man seated at the right hand of Power (the Almighty) and coming on the clouds of heaven. [Ps. 110:1; Dan. 7:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: ' Then the high priest tore his garments and said, What need have we for more witnesses? [Num. 14:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: ' You have heard His blasphemy. What is your decision? And they all condemned Him as being guilty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deserving of death. [Lev. 24:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: ' And some of them began to spit on Him and to blindfold Him and to strike Him with their fists, saying to Him, Prophesy! And the guards received Him with blows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by slapping Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: ' While Peter was down below in the courtyard, one of the [serving] maids of the high priest came;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: ' And when she saw Peter warming himself, she gazed intently at him and said, You were with Jesus of Nazareth too.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: ' But he denied it falsely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disowned Him, saying, I neither know nor understand what you say. Then he went outside [the courtyard and was] into the vestibule. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: And a cock crowed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: ' And the maidservant saw him, and began again to say to the bystanders, This [man] is [one] of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: ' But again he denied it falsely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disowned Him. And after a short while, again the bystanders said to Peter, Really, you are one of them, for you are a Galilean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and your dialect shows it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: ' Then he commenced invoking a curse on himself [should he not be telling the truth] and swearing, I do not know the Man about Whom you are talking!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: ' And at once for the second time a cock crowed. And Peter remembered how Jesus said to him, Before a cock crows twice, you will utterly deny Me [disclaiming all connection with Me] three times. And having put his thought upon it [and remembering], he broke down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wept aloud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lamented.'
