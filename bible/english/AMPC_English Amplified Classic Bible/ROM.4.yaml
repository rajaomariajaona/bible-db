document_id: ROM.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [BUT] IF so, what shall we say about Abraham, our forefather humanly speaking–[what did he] find out? [How does this affect his position, and what was gained by him?]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' How then was it credited [to him]? Was it before or after he had been circumcised? It was not after, but before he was circumcised.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He received the mark of circumcision as a token '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' an evidence [and] seal of the righteousness which he had by faith while he was still uncircumcised–[faith] so that he was to be made the father of all who [truly] believe, though without circumcision, and who thus have righteousness (right standing with God) imputed to them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' credited to their account,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As well as [that he be made] the father of those circumcised persons who are not merely circumcised, but also walk in the way of that faith which our father Abraham had before he was circumcised.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the promise to Abraham or his posterity, that he should inherit the world, did not come through [observing the commands of] the Law but through the righteousness of faith. [Gen. 17:4-6; 22:16-18.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If it is the adherents of the Law who are to be the heirs, then faith is made futile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empty of all meaning and the promise [of God] is made void (is annulled and has no power).'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Law results in [divine] wrath, but where there is no law there is no transgression [of it either].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore, [inheriting] the promise is the outcome of faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' depends [entirely] on faith, in order that it might be given as an act of grace (unmerited favor), to make it stable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' valid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guaranteed to all his descendants–not only to the devotees '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adherents of the Law, but also to those who share the faith of Abraham, who is [thus] the father of us all.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As it is written, I have made you the father of many nations. [He was appointed our father] in the sight of God in Whom he believed, Who gives life to the dead and speaks of the nonexistent things that [He has foretold and promised] as if they [already] existed. [Gen. 17:5.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [For Abraham, human reason for] hope being gone, hoped in faith that he should become the father of many nations, as he had been promised, So [numberless] shall your descendants be. [Gen. 15:5.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He did not weaken in faith when he considered the [utter] impotence of his own body, which was as good as dead because he was about a hundred years old, or [when he considered] the barrenness of Sarah''s [deadened] womb. [Gen. 17:17; 18:11.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For if Abraham was justified (established as just by acquittal from guilt) by good works [that he did, then] he has grounds for boasting. But not before God!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' No unbelief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' distrust made him waver (doubtingly question) concerning the promise of God, but he grew strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' was empowered by faith as he gave praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory to God,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Fully satisfied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' assured that God was able '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mighty to keep His word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to do what He had promised.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That is why his faith was credited to him as righteousness (right standing with God).'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But [the words], It was credited to him, were written not for his sake alone,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But [they were written] for our sakes too. [Righteousness, standing acceptable to God] will be granted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' credited to us also who believe in (trust in, adhere to, and rely on) God, Who raised Jesus our Lord from the dead,'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who was betrayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put to death because of our misdeeds and was raised to secure our justification (our acquittal), [making our account balance and absolving us from all guilt before God].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For what does the Scripture say? Abraham believed in (trusted in) God, and it was credited to his account as righteousness (right living and right standing with God). [Gen. 15:6.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now to a laborer, his wages are not counted as a favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a gift, but as an obligation (something owed to him).'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But to one who, not working [by the Law], trusts (believes fully) in Him Who justifies the ungodly, his faith is credited to him as righteousness (the standing acceptable to God).'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus David congratulates the man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pronounces a blessing on him to whom God credits righteousness apart from the works he does:'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to be envied are those whose iniquities are forgiven and whose sins are covered up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' completely buried.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to be envied is the person of whose sin the Lord will take no account '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' reckon it against him. [Ps. 32:1, 2.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Is this blessing (happiness) then meant only for the circumcised, or also for the uncircumcised? We say that faith was credited to Abraham as righteousness.'
