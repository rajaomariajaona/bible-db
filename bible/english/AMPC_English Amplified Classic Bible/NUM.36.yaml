document_id: NUM.36
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE HEADS of the fathers'' houses of the families of the sons of Gilead son of Machir, the son of Manasseh, of the fathers'' houses of the sons of Joseph, came near and spoke before Moses and the leaders, the heads of the fathers'' houses of the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' They said, The Lord commanded [you] my lord to give the land for inheritance by lot to the Israelites; and my lord was commanded by the Lord to give the inheritance of Zelophehad our brother to his daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But if they are married to any of the sons of the other tribes of the Israelites, then their inheritance will be taken from that of our fathers and added to the inheritance of the tribe to which they are received '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' belong; so it will be taken out of the lot of our inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And when the Jubilee of the Israelites comes, then their inheritance will be added to that of the tribe to which they are received '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' belong; so will their inheritance be taken away from that of the tribe of our fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Moses commanded the Israelites according to the word of the Lord, saying, The tribe of the sons of Joseph is right.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' This is what the Lord commands concerning the daughters of Zelophehad: Let them marry whom they think best; only they shall marry within the family of the tribe of their father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So shall no inheritance of the Israelites be transferred from tribe to tribe, for every one of the Israelites shall cling to the inheritance of the tribe of his fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And every daughter who possesses an inheritance in any tribe of the Israelites shall be wife to one of the family of the tribe of her father, so that the Israelites may each one possess the inheritance of his fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So shall no inheritance be transferred from one tribe to another, but each of the tribes of the Israelites shall cling to its own inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The daughters of Zelophehad did as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For Mahlah, Tirzah, Hoglah, Milcah, and Noah, the daughters of Zelophehad, were married to sons of their father''s brothers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' They married into the families of the sons of Manasseh son of Joseph, and their inheritance remained in the tribe of the family of their father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' These are the commandments and ordinances which the Lord commanded the Israelites through Moses in the plains of Moab by the Jordan [River] at Jericho.'
