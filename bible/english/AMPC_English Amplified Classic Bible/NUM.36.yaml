document_id: NUM.36,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE HEADS of the fathers'' houses of the families of the sons of Gilead son of Machir, the son of Manasseh, of the fathers'' houses of the sons of Joseph, came near and spoke before Moses and the leaders, the heads of the fathers'' houses of the Israelites.'
  '10':
  - type: text
    content: ' The daughters of Zelophehad did as the Lord commanded Moses.'
  '11':
  - type: text
    content: ' For Mahlah, Tirzah, Hoglah, Milcah, and Noah, the daughters of Zelophehad, were married to sons of their father''s brothers.'
  '12':
  - type: text
    content: ' They married into the families of the sons of Manasseh son of Joseph, and their inheritance remained in the tribe of the family of their father.'
  '13':
  - type: text
    content: ' These are the commandments and ordinances which the Lord commanded the Israelites through Moses in the plains of Moab by the Jordan [River] at Jericho.'
  '2':
  - type: text
    content: ' They said, The Lord commanded [you] my lord to give the land for inheritance by lot to the Israelites; and my lord was commanded by the Lord to give the inheritance of Zelophehad our brother to his daughters.'
  '3':
  - type: text
    content: ' But if they are married to any of the sons of the other tribes of the Israelites, then their inheritance will be taken from that of our fathers and added to the inheritance of the tribe to which they are received '
  - type: text
    content: and
  - type: text
    content: ' belong; so it will be taken out of the lot of our inheritance.'
  '4':
  - type: text
    content: ' And when the Jubilee of the Israelites comes, then their inheritance will be added to that of the tribe to which they are received '
  - type: text
    content: and
  - type: text
    content: ' belong; so will their inheritance be taken away from that of the tribe of our fathers.'
  '5':
  - type: text
    content: ' And Moses commanded the Israelites according to the word of the Lord, saying, The tribe of the sons of Joseph is right.'
  '6':
  - type: text
    content: ' This is what the Lord commands concerning the daughters of Zelophehad: Let them marry whom they think best; only they shall marry within the family of the tribe of their father.'
  '7':
  - type: text
    content: ' So shall no inheritance of the Israelites be transferred from tribe to tribe, for every one of the Israelites shall cling to the inheritance of the tribe of his fathers.'
  '8':
  - type: text
    content: ' And every daughter who possesses an inheritance in any tribe of the Israelites shall be wife to one of the family of the tribe of her father, so that the Israelites may each one possess the inheritance of his fathers.'
  '9':
  - type: text
    content: ' So shall no inheritance be transferred from one tribe to another, but each of the tribes of the Israelites shall cling to its own inheritance.'
