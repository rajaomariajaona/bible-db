document_id: EZK.29
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE tenth year [of the captivity of King Jehoiachin by the king of Babylon], in the tenth [month], on the twelfth [day] of the month, the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, set your face toward Pharaoh king of Egypt and prophesy against him and against all Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Say, Thus says the Lord God: Behold, I am against you, Pharaoh king of Egypt, the great monster [of sluggish and unwieldy strength] that lies in the midst of his [delta] streams, [boastfully] declaring, My river Nile is my own and I have made it for myself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But I will put hooks in your jaws [O Egyptian dragon] and I will cause the fish of your rivers to stick to your scales, and I will draw you up out of the midst of your streams with all the fish of your streams which stick to your scales.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And I will cast you forth into the wilderness, you and all the fish of your rivers; you shall fall upon the open field and not be gathered up or buried. I have given you for food to the [wild] beasts of the earth and the birds of the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And all the inhabitants of Egypt shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service], because they have been a [deceitful] staff [made of fragile] reeds to the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' When they grasped you with the hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leaned upon you, you broke and tore their whole shoulder, and [by injuring their muscles made them so stiff and rigid that] they could do no more than stand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Therefore thus says the Lord God: Behold, I will bring a sword upon you and cut off man and beast from you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the land of Egypt shall be a desolation and a waste. And they shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service]. Because you have said, The river is mine and I have made it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Behold therefore, I am against you and against your streams, and I will make the land of Egypt an utter [plundered] waste and desolation [of subjection] from [northern] Migdol to [southern] Syene, even as far as the border of Ethiopia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' No foot of man shall pass through it [in travel], no foot of beast shall pass through it [in trade with other countries], neither shall [Egypt] be [truly] inhabited [again] for forty years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And I will make the land of Egypt a desolation [plundered and reduced to subjection] in the midst of desolated (plundered and reduced to subjection) countries, and her cities among the cities that are laid waste shall be a desolation forty years. I will scatter the Egyptians among the nations and will disperse them through the countries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Yet thus says the Lord God: At the end of [their] forty years will I gather the Egyptians from the peoples among whom they were scattered, [Jer. 46:25, 26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And I will reverse the captivity of Egypt [as I will that of Israel] and will cause them to return into the land of Pathros [under Egypt], the land of their origin, and they shall be there a lowly kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' It shall be the lowliest of the kingdoms, neither shall it exalt itself any more above the nations; I will diminish [the Egyptians] so they shall never again rule over the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And never again shall Egypt have the confidence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be the reliance of the house of Israel; their iniquity will be brought to remembrance whenever [Israel] looks toward them [for help]. They shall know (understand and realize) that I am the Lord God [Who demands loyalty and obedient service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' In the twenty-seventh year [after King Jehoiachin was taken to Babylon], in the first month, on the first day of the month, the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Son of man, Nebuchadrezzar king of Babylon caused his army to render heavy service [at My bidding] against Tyre; every [soldier''s] head became bald and every shoulder was worn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peeled [with carrying loads of earth and stones for siege works]. Yet he had no remuneration from Tyre [in proportion to the time and labor expended in the thirteen years'' siege], either for himself or his army, for the work that he had done against it [for Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Therefore thus says the Lord God: Behold, I will give the land of Egypt to Nebuchadrezzar king of Babylon, and he shall carry off her great mass of people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of things (her riches) and take her spoil and take her prey, and it shall be the wages for his army.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' I have given him the land of Egypt for his labor with which he served [against Tyre] because they did it for Me, says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' In that day will I cause a horn to spring forth to the house of Israel and I will open your lips among them, and they shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
