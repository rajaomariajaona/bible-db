document_id: PSA.126,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents.
  - type: text
    content: ' WHEN THE Lord brought back the captives [who returned] to Zion, we were like those who dream [it seemed so unreal]. [Ps. 53:6; Acts 12:9.]'
  '2':
  - type: text
    content: ' Then were our mouths filled with laughter, and our tongues with singing. Then they said among the nations, The Lord has done great things for them.'
  '3':
  - type: text
    content: ' The Lord has done great things for us! We are glad!'
  '4':
  - type: text
    content: ' Turn to freedom our captivity '
  - type: text
    content: and
  - type: text
    content: ' restore our fortunes, O Lord, as the streams in the South (the Negeb) [are restored by the torrents].'
  '5':
  - type: text
    content: ' They who sow in tears shall reap in joy '
  - type: text
    content: and
  - type: text
    content: ' singing.'
  '6':
  - type: text
    content: ' He who goes forth bearing seed and weeping [at needing his precious supply of grain for sowing] shall doubtless come again with rejoicing, bringing his sheaves with him.'
