document_id: PSA.126
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Song of Ascents.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN THE Lord brought back the captives [who returned] to Zion, we were like those who dream [it seemed so unreal]. [Ps. 53:6; Acts 12:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then were our mouths filled with laughter, and our tongues with singing. Then they said among the nations, The Lord has done great things for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The Lord has done great things for us! We are glad!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Turn to freedom our captivity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' restore our fortunes, O Lord, as the streams in the South (the Negeb) [are restored by the torrents].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They who sow in tears shall reap in joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' singing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He who goes forth bearing seed and weeping [at needing his precious supply of grain for sowing] shall doubtless come again with rejoicing, bringing his sheaves with him.'
