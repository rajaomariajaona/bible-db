document_id: DAN.9,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN THE first year of Darius son of Ahasuerus, of the offspring of the Medes, who was made king over the realm of the Chaldeans–'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And we have not obeyed the voice of the Lord our God by walking in His laws which He set before us through His servants the prophets.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Yes, all Israel has transgressed Your law, even turning aside that they might not obey Your voice. Therefore the curse has been poured out on us and the oath that is written in the Law of Moses the servant of God, because we have sinned against Him. [Lev. 26:14-45; Deut. 28:15-68.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And He has carried out intact His [threatening] words which He threatened against us and against our judges [the kings, princes, and rulers generally] who ruled us, and He has brought upon us a great evil; for under the whole heavens there has not been done before [anything so dreadful] as [He has caused to be] done against Jerusalem.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Just as it is written in the Law of Moses as to all this evil [that would surely come upon transgressors], so it has come upon us. Yet we have not earnestly begged for forgiveness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' entreated the favor of the Lord our God, that we might turn from our iniquities and have understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become wise in Your truth. [Deut. 4:29; 28:15ff.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Therefore the Lord has kept ready the calamity (evil) and has brought it upon us, for the Lord our God is [uncompromisingly] righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rigidly just in all His works which He does [keeping His word]; and we have not obeyed His voice.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And now, O Lord our God, Who brought Your people forth out of the land of Egypt with a mighty hand and secured Yourself renown '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a name as at this day, we have sinned, we have done wickedly!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' O Lord, according to all Your rightness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice, I beseech You, let Your anger and Your wrath be turned away from Your city Jerusalem, Your holy mountain. Because of our sins and the iniquities of our fathers, Jerusalem and Your people have become a reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a byword to all who are around about us.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Now therefore, O our God, listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed the prayer of Your servant [Daniel] and his supplications, and for Your own sake cause Your face to shine upon Your sanctuary which is desolate.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' O my God, incline Your ear and hear; open Your eyes and look at our desolations and the city which is called by Your name; for we do not present our supplications before You for our own righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice, but for Your great mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' O Lord, hear! O Lord, forgive! O Lord, give heed and act! Do not delay, for Your own sake, O my God, because Your city and Your people are called by Your name.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' In the first year of his reign, I, Daniel, understood from the books the number of years which, according to the word of the Lord to Jeremiah the prophet, must pass by before the desolations [which had been] pronounced on Jerusalem should end; and it was seventy years. [Jer. 25:11, 12; 29:10.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' While I was speaking and praying, confessing my sin and the sin of my people Israel, and presenting my supplication before the Lord my God for the holy hill of my God–'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Yes, while I was speaking in prayer, the man Gabriel, whom I had seen in the former vision, being caused to fly swiftly, came near to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' touched me about the time of the evening sacrifice. [Dan. 8:16.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' He instructed me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made me understand; he talked with me and said, O Daniel, I am now come forth to give you skill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wisdom and understanding.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' At the beginning of your prayers, the word [giving an answer] went forth, and I have come to tell you, for you are greatly beloved. Therefore consider the matter and understand the vision.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Seventy weeks [of years, or 490 years] are decreed upon your people and upon your holy city [Jerusalem], to finish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put an end to transgression, to seal up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make full the measure of sin, to purge away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make expiation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reconciliation for sin, to bring in everlasting righteousness (permanent moral and spiritual rectitude in every area and relation) to seal up vision and prophecy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prophet, and to anoint a Holy of Holies.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Know therefore and understand that from the going forth of the commandment to restore and to build Jerusalem until [the coming of] the Anointed One, a Prince, shall be seven weeks [of years] and sixty-two weeks [of years]; it shall be built again with [city] square and moat, but in troublous times.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And after the sixty-two weeks [of years] shall the Anointed One be cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' killed and shall have nothing [and no one] belonging to [and defending] Him. And the people of the [other] prince who will come will destroy the city and the sanctuary. Its end shall come with a flood; and even to the end there shall be war, and desolations are decreed. [Isa. 53:7-9; Nah. 1:8; Matt. 24:6-14.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And he shall enter into a strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' firm covenant with the many for one week [seven years]. And in the midst of the week he shall cause the sacrifice and offering to cease [for the remaining three and one-half years]; and upon the wing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pinnacle of abominations [shall come] one who makes desolate, until the full determined end is poured out on the desolator.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And I set my face to the Lord God to seek Him by prayer and supplications, with fasting and sackcloth and ashes;'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And I prayed to the Lord my God and made confession and said, O Lord, the great and dreadful God, Who keeps covenant, mercy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness with those who love Him and keep His commandments,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' We have sinned and dealt perversely and done wickedly and have rebelled, turning aside from Your commandments and ordinances.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Neither have we listened to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heeded Your servants the prophets, who spoke in Your name to our kings, our princes and our fathers, and to all the people of the land.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' O Lord, righteousness belongs to You, but to us confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shame of face, as at this day–to the men of Judah, to the inhabitants of Jerusalem, and to all Israel, to those who are near and those who are far off, through all the countries to which You have driven them because of the [treacherous] trespass which they have committed against You.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' O Lord, to us belong confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shame of face–to our kings, to our princes, and to our fathers–because we have sinned against You.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' To the Lord our God belong mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness and forgiveness, for we have rebelled against Him;'
