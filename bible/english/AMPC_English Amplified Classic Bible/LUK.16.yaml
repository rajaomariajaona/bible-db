document_id: LUK.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' ALSO [Jesus] said to the disciples, There was a certain rich man who had a manager of his estate, and accusations [against this man] were brought to him, that he was squandering his [master''s] possessions.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He who is faithful in a very little [thing] is faithful also in much, and he who is dishonest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unjust in a very little [thing] is dishonest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unjust also in much.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Therefore if you have not been faithful in the [case of] unrighteous mammon (deceitful riches, money, possessions), who will entrust to you the true riches?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And if you have not proved faithful in that which belongs to another [whether God or man], who will give you that which is your own [that is, the true riches]?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' No servant is able to serve two masters; for either he will hate the one and love the other, or he will stand by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be devoted to the one and despise the other. You cannot serve God and mammon (riches, or anything in which you trust and on which you rely).'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Now the Pharisees, who were covetous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovers of money, heard all these things [taken together], and they began to sneer at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ridicule '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scoff at Him.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But He said to them, You are the ones who declare yourselves just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' upright before men, but God knows your hearts. For what is exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' highly thought of among men is detestable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abhorrent (an abomination) in the sight of God. [I Sam. 16:7; Prov. 21:2.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Until John came, there were the Law and the Prophets; since then the good news (the Gospel) of the kingdom of God is being preached, and everyone strives violently to go in [would force his own way rather than God''s way into it].'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Yet it is easier for heaven and earth to pass away than for one dot of the Law to fail '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become void.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Whoever divorces (dismisses and repudiates) his wife and marries another commits adultery, and he who marries a woman who is divorced from her husband commits adultery.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' There was a certain rich man who [habitually] clothed himself in purple and fine linen and reveled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feasted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made merry in splendor every day.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And he called him and said to him, What is this that I hear about you? Turn in the account of your management [of my affairs], for you can be [my] manager no longer.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And at his gate there was [carelessly] dropped down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' left a certain utterly destitute man named Lazarus, [reduced to begging alms and] covered with [ulcerated] sores.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' He [eagerly] desired to be satisfied with what fell from the rich man''s table; moreover, the dogs even came and licked his sores.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And it occurred that the man [reduced to] begging died and was carried by the angels to Abraham''s bosom. The rich man also died and was buried.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And in Hades (the realm of the dead), being in torment, he lifted up his eyes and saw Abraham far away, and Lazarus in his bosom.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And he cried out and said, Father Abraham, have pity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy on me and send Lazarus to dip the tip of his finger in water and cool my tongue, for I am in anguish in this flame.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' But Abraham said, Child, remember that you in your lifetime fully received [what is due you in] comforts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delights, and Lazarus in like manner the discomforts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distresses; but now he is comforted here and you are in anguish.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And besides all this, between us and you a great chasm has been fixed, in order that those who want to pass from this [place] to you may not be able, and no one may pass from there to us.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And [the man] said, Then, father, I beseech you to send him to my father''s house–'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' For I have five brothers–so that he may give [solemn] testimony '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' warn them, lest they too come into this place of torment.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' But Abraham said, They have Moses and the Prophets; let them hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' listen to them.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And the manager of the estate said to himself, What shall I do, seeing that my master is taking the management away from me? I am not able to dig, and I am ashamed to beg.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' But he answered, No, father Abraham, but if someone from the dead goes to them, they will repent (change their minds for the better and heartily amend their ways, with abhorrence of their past sins).'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' He said to him, If they do not hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' listen to Moses and the Prophets, neither will they be persuaded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' convinced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' believe [even] if someone should rise from the dead.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' I have come to know what I will do, so that they [my master''s debtors] may accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome me into their houses when I am put out of the management.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' So he summoned his master''s debtors one by one, and he said to the first, How much do you owe my master?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' He said, A hundred measures [about 900 gallons] of oil. And he said to him, Take back your written acknowledgement of obligation, and sit down quickly and write fifty [about 450 gallons].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' After that he said to another, And how much do you owe? He said, A hundred measures [about 900 bushels] of wheat. He said to him, Take back your written acknowledgement of obligation, and write eighty [about 700 bushels].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And [his] master praised the dishonest (unjust) manager for acting shrewdly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prudently; for the sons of this age are shrewder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' more prudent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wiser in [relation to] their own generation [to their own age and kind] than are the sons of light.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And I tell you, make friends for yourselves by means of unrighteous mammon (deceitful riches, money, possessions), so that when it fails, they [those you have favored] may receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome you into the everlasting habitations (dwellings).'
