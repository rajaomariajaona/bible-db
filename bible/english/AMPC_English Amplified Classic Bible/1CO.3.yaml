document_id: 1CO.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' HOWEVER, BRETHREN, I could not talk to you as to spiritual [men], but as to nonspiritual [men of the flesh, in whom the carnal nature predominates], as to mere infants [in the new life] in Christ [unable to talk yet!]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' According to the grace (the special endowment for my task) of God bestowed on me, like a skillful architect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' master builder I laid [the] foundation, and now another [man] is building upon it. But let each [man] be careful how he builds upon it,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For no other foundation can anyone lay than that which is [already] laid, which is Jesus Christ (the Messiah, the Anointed One).'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But if anyone builds upon the Foundation, whether it be with gold, silver, precious stones, wood, hay, straw,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The work of each [one] will become [plainly, openly] known (shown for what it is); for the day [of Christ] will disclose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' declare it, because it will be revealed with fire, and the fire will test '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' critically appraise the character '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worth of the work each person has done.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' If the work which any person has built on this Foundation [any product of his efforts whatever] survives [this test], he will get his reward.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But if any person''s work is burned up [under the test], he will suffer the loss [of it all, losing his reward], though he himself will be saved, but only as [one who has passed] through fire. [Job 23:10.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Do you not discern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand that you [the whole church at Corinth] are God''s temple (His sanctuary), and that God''s Spirit has His permanent dwelling in you [to be at home in you, collectively as a church and also individually]?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' If anyone does hurt to God''s temple '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' corrupts it [with false doctrines] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' destroys it, God will do hurt to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bring him to the corruption of death '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy him. For the temple of God is holy (sacred to Him) and that [temple] you [the believing church and its individual believers] are.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Let no person deceive himself. If anyone among you supposes that he is wise in this age, let him become a fool [let him discard his worldly discernment and recognize himself as dull, stupid, and foolish, without true learning and scholarship], that he may become [really] wise. [Isa. 5:21.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' For this world''s wisdom is foolishness (absurdity and stupidity) with God, for it is written, He lays hold of the wise in their [own] craftiness; [Job 5:13.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I fed you with milk, not solid food, for you were not yet strong enough [to be ready for it]; but even yet you are not strong enough [to be ready for it],'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And again, The Lord knows the thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reasonings of the [humanly] wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognizes how futile they are. [Ps. 94:11.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' So let no one exult proudly concerning men [boasting of having this or that man as a leader], for all things are yours,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Whether Paul or Apollos or Cephas (Peter), or the universe or life or death, or the immediate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' threatening present or the [subsequent and uncertain] future–all are yours,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And you are Christ''s, and Christ is God''s.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For you are still [unspiritual, having the nature] of the flesh [under the control of ordinary impulses]. For as long as [there are] envying and jealousy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrangling and factions among you, are you not unspiritual '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of the flesh, behaving yourselves after a human standard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' like mere (unchanged) men?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For when one says, I belong to Paul, and another, I belong to Apollos, are you not [proving yourselves] ordinary (unchanged) men?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' What then is Apollos? What is Paul? Ministering servants [not heads of parties] through whom you believed, even as the Lord appointed to each his task:'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I planted, Apollos watered, but God [all the while] was making it grow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [He] gave the increase.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' So neither he who plants is anything nor he who waters, but [only] God Who makes it grow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become greater.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He who plants and he who waters are equal (one in aim, of the same importance and esteem), yet each shall receive his own reward (wages), according to his own labor.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For we are fellow workmen (joint promoters, laborers together) with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for God; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' are God''s garden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vineyard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' field under cultivation, [you are] God''s building. [Isa. 61:3.]'
