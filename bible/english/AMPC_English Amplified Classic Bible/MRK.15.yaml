document_id: MRK.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND IMMEDIATELY when it was morning, the chief priests, with the elders and scribes and the whole council, held a consultation; and when they had bound Jesus, they took Him away [violently] and handed Him over to Pilate. [Isa. 53:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Pilate inquired of Him, Are You the King of the Jews? And He replied, It is as you say.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the chief priests kept accusing Him of many things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Pilate again asked Him, Have You no answer to make? See how many charges they are bringing against You!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But Jesus made no further answer at all, so that Pilate wondered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' marveled. [Isa. 53:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now at the Feast he [was accustomed to] set free for them any one prisoner whom they requested.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And among the rioters in the prison who had committed murder in the insurrection there was a man named Barabbas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the throng came up and began asking Pilate to do as he usually did for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he replied to them, Do you wish me to set free for you the King of the Jews?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For he was aware that it was [because they were prompted] by envy that the chief priests had delivered Him up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But the chief priests stirred up the crowd to get him to release for them Barabbas instead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And again Pilate said to them, Then what shall I do with the Man Whom you call the King of the Jews?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they shouted back again, Crucify Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But Pilate said to them, Why? What has He done that is evil? But they shouted with all their might all the more, Crucify Him [at once]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So Pilate, wishing to satisfy the crowd, set Barabbas free for them; and after having Jesus whipped, he handed [Him] over to be crucified. [Isa. 53:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then the soldiers led Him away to the courtyard inside the palace, that is, the Praetorium, and they called the entire detachment of soldiers together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And they dressed Him in [a] purple [robe], and, weaving together a crown of thorns, they placed it on Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And they began to salute Him, Hail (greetings, good health to You, long life to You), King of the Jews!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And they struck His head with a staff made of a [bamboo-like] reed and spat on Him and kept bowing their knees in homage to Him. [Isa. 50:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And when they had [finished] making sport of Him, they took the purple [robe] off of Him and put His own clothes on Him. And they led Him out [of the city] to crucify Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And they forced a passerby, Simon of Cyrene, the father of Alexander and Rufus, who was coming in from the field (country), to carry His cross.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And they led Him to Golgotha [in Latin: Calvary], meaning The Place of a Skull.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And they [attempted to] give Him wine mingled with myrrh, but He would not take it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And they crucified Him; and they divided His garments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distributed them among themselves, throwing lots for them to decide who should take what. [Ps. 22:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And it was the third hour (about nine o''clock in the morning) when they crucified Him. [Ps. 22:14-16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And the inscription of the accusation against Him was written above, The King of the Jews.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And with Him they crucified two robbers, one on [His] right hand and one on His left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: And the Scripture was fulfilled which says, He was counted among the transgressors.
  - type: text
    text: ' [Isa. 53:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And those who passed by kept reviling Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproaching Him abusively in harsh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insolent language, wagging their heads and saying, Aha! You Who would destroy the temple and build it in three days,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Now rescue Yourself [from death], coming down from the cross!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So also the chief priests, with the scribes, made sport of Him to one another, saying, He rescued others [from death]; Himself He is unable to rescue. [Ps. 22:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Let the Christ (the Messiah), the King of Israel, come down now from the cross, that we may see [it] and trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adhere to Him! Those who were crucified with Him also reviled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproached Him [speaking abusively, harshly, and insolently].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And when the sixth hour (about midday) had come, there was darkness over the whole land until the ninth hour (about three o''clock).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And at the ninth hour Jesus cried with a loud voice, Eloi, Eloi, lama sabachthani?–which means, My God, My God, why have You forsaken Me [deserting Me and leaving Me helpless and abandoned]? [Ps. 22:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And some of those standing by, [and] hearing it, said, See! He is calling Elijah!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And one man ran, and, filling a sponge with vinegar (a mixture of sour wine and water), put it on a staff made of a [bamboo-like] reed and gave it to Him to drink, saying, Hold off! Let us see whether Elijah [does] come to take Him down. [Ps. 69:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And Jesus uttered a loud cry, and breathed out His life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And the curtain [of the Holy of Holies] of the temple was torn in two from top to bottom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And when the centurion who stood facing Him saw Him expire this way, he said, Really, this Man was God''s Son!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Now some women were there also, looking on from a distance, among whom were Mary Magdalene, and Mary the mother of James the younger and of Joses, and Salome,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Who, when [Jesus] was in Galilee, were in the habit of accompanying and ministering to Him; and [there were] also many other [women] who had come up with Him to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' As evening had already come, since it was the day of Preparation, that is, [the day] before the Sabbath, [Deut. 21:22, 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Joseph, he of Arimathea, noble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honorable in rank '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a respected member of the council (Sanhedrin), who was himself waiting for the kingdom of God, daring the consequences, took courage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ventured to go to Pilate and asked for the body of Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' But Pilate wondered whether He was dead so soon, and, having called the centurion, he asked him whether [Jesus] was already dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And when he learned from the centurion [that He was indeed dead], he gave the body to Joseph.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And Joseph bought a [fine] linen cloth [for swathing dead bodies], and, taking Him down from the cross, he rolled Him up in the [fine] linen cloth and placed Him in a tomb which had been hewn out of a rock. Then he rolled a [very large] stone against the door of the tomb. [Isa. 53:9; Matt. 16:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And Mary Magdalene and Mary [the mother] of Joses were [attentively] observing where He was laid.'
