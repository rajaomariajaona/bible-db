document_id: REV.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THIS I saw four angels stationed at the four corners of the earth, firmly holding back the four winds of the earth so that no wind should blow on the earth or sea or upon any tree. [Zech. 6:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then I saw a second angel coming up from the east (the rising of the sun) and carrying the seal of the living God. And with a loud voice he called out to the four angels who had been given authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power to injure earth and sea,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Saying, Harm neither the earth nor the sea nor the trees, until we have sealed the bond servants of our God upon their foreheads. [Ezek. 9:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And [then] I heard how many were sealed (marked) out of every tribe of the sons of Israel: there were 144,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Twelve thousand were sealed (marked) out of the tribe of Judah, 12,000 of the tribe of Reuben, 12,000 of the tribe of Gad,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Twelve thousand of the tribe of Asher, 12,000 of the tribe of Naphtali, 12,000 of the tribe of Manasseh,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Twelve thousand of the tribe of Simeon, 12,000 of the tribe of Levi, 12,000 of the tribe of Issachar,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Twelve thousand of the tribe of Zebulun, 12,000 of the tribe of Joseph, 12,000 of the tribe of Benjamin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' After this I looked and a vast host appeared which no one could count, [gathered out] of every nation, from all tribes and peoples and languages. These stood before the throne and before the Lamb; they were attired in white robes, with palm branches in their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' In loud voice they cried, saying, [Our] salvation is due to our God, Who is seated on the throne, and to the Lamb [to Them we owe our deliverance]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And all the angels were standing round the throne and round the elders [of the heavenly Sanhedrin] and the four living creatures, and they fell prostrate before the throne and worshiped God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Amen! (So be it!) they cried. Blessing and glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' majesty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor and wisdom and thanks and honor and power and might [be ascribed] to our God to the ages and ages (forever and ever, throughout the eternities of the eternities)! Amen! (So be it!)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then, addressing me, one of the elders [of the heavenly Sanhedrin] said, Who are these [people] clothed in the long white robes? And from where have they come?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I replied, Sir, you know. And he said to me, These are they who have come out of the great tribulation (persecution), and have washed their robes and made them white in the blood of the Lamb. [Gen. 49:11; Dan. 12:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For this reason they are [now] before the [very] throne of God and serve Him day and night in His sanctuary (temple); and He Who is sitting upon the throne will protect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spread His tabernacle over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shelter them with His presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They shall hunger no more, neither thirst any more; neither shall the sun smite them, nor any scorching heat. [Isa. 49:10; Ps. 121:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For the Lamb Who is in the midst of the throne will be their Shepherd, and He will guide them to the springs of the waters of life; and God will wipe away every tear from their eyes. [Ps. 23:2; Isa. 25:8; Ezek. 34:23.]'
