document_id: DEU.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ALL THE commandments which I command you this day you shall be watchful to do, that you may live and multiply and go in and possess the land which the Lord swore to give to your fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And you shall [earnestly] remember all the way which the Lord your God led you these forty years in the wilderness, to humble you and to prove you, to know what was in your [mind and] heart, whether you would keep His commandments or not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And He humbled you and allowed you to hunger and fed you with manna, which you did not know nor did your fathers know, that He might make you recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' personally know that man does not live by bread only, but man lives by every word that proceeds out of the mouth of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Your clothing did not become old upon you nor did your feet swell these forty years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Know also in your [minds and] hearts that, as a man disciplines '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instructs his son, so the Lord your God disciplines '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instructs you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So you shall keep the commandments of the Lord your God, to walk in His ways and [reverently] fear Him. [Prov. 8:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For the Lord your God is bringing you into a good land, a land of brooks of water, of fountains and springs, flowing forth in valleys and hills;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' A land of wheat and barley, and vines and fig trees and pomegranates, a land of olive trees and honey;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' A land in which you shall eat food without shortage and lack nothing in it; a land whose stones are iron and out of whose hills you can dig copper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When you have eaten and are full, then you shall bless the Lord your God for all the good land which He has given you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Beware that you do not forget the Lord your God by not keeping His commandments, His precepts, and His statutes which I command you today,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Lest when you have eaten and are full, and have built goodly houses and live in them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And when your herds and flocks multiply and your silver and gold is multiplied and all you have is multiplied,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then your [minds and] hearts be lifted up and you forget the Lord your God, Who brought you out of the land of Egypt, out of the house of bondage,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Who led you through the great and terrible wilderness, with its fiery serpents and scorpions and thirsty ground where there was no water, but Who brought you forth water out of the flinty rock,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Who fed you in the wilderness with manna, which your fathers did not know, that He might humble you and test you, to do you good in the end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And beware lest you say in your [mind and] heart, My power and the might of my hand have gotten me this wealth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But you shall [earnestly] remember the Lord your God, for it is He Who gives you power to get wealth, that He may establish His covenant which He swore to your fathers, as it is this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And if you forget the Lord your God and walk after other gods and serve them and worship them, I testify against you this day that you shall surely perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Like the nations which the Lord makes to perish before you, so shall you perish, because you would not obey the voice of the Lord your God.'
