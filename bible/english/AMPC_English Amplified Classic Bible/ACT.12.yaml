document_id: ACT.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ABOUT THAT time Herod the king stretched forth his hands to afflict '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' torment some who belonged to the church (assembly).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he killed James the brother of John with a sword;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And when he saw that it was pleasing to the Jews, he proceeded further and arrested Peter also. This was during the days of Unleavened Bread [the Passover week].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And when he had seized [Peter], he put him in prison and delivered him to four squads of soldiers of four each to guard him, purposing after the Passover to bring him forth to the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So Peter was kept in prison, but fervent prayer for him was persistently made to God by the church (assembly).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The very night before Herod was about to bring him forth, Peter was sleeping between two soldiers, fastened with two chains, and sentries before the door were guarding the prison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And suddenly an angel of the Lord appeared [standing beside him], and a light shone in the place where he was. And the angel gently smote Peter on the side and awakened him, saying, Get up quickly! And the chains fell off his hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the angel said to him, Tighten your belt and bind on your sandals. And he did so. And he said to him, Wrap your outer garment around you and follow me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And [Peter] went out [along] following him, and he was not conscious that what was apparently being done by the angel was real, but thought he was seeing a vision.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When they had passed through the first guard and the second, they came to the iron gate which leads into the city. Of its own accord [the gate] swung open, and they went out and passed on through one street; and at once the angel left him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then Peter came to himself and said, Now I really know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' am sure that the Lord has sent His angel and delivered me from the hand of Herod and from all that the Jewish people were expecting [to do to me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When he, at a glance, became aware of this [comprehending all the elements of the case], he went to the house of Mary the mother of John, whose surname was Mark, where a large number were assembled together and were praying.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And when he knocked at the gate of the porch, a maid named Rhoda came to answer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And recognizing Peter''s voice, in her joy she failed to open the gate, but ran in and told the people that Peter was standing before the porch gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' They said to her, You are crazy! But she persistently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strongly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently affirmed that it was the truth. They said, It is his angel!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But meanwhile Peter continued knocking, and when they opened the gate and saw him, they were amazed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But motioning to them with his hand to keep quiet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listen, he related to them how the Lord had delivered him out of the prison. And he said, Report all this to James [the Less] and to the brethren. Then he left and went to some other place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now as soon as it was day, there was no small disturbance among the soldiers over what had become of Peter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And when Herod had looked for him and could not find him, he placed the guards on trial and commanded that they should be led away [to execution]. Then [Herod] went down from Judea to Caesarea and stayed on there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now [Herod] cherished bitter animosity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hostility for the people of Tyre and Sidon; and [their deputies] came to him in a united body, and having made Blastus the king''s chamberlain their friend, they asked for peace, because their country was nourished by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depended on the king''s [country] for food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' On an appointed day Herod arrayed himself in his royal robes, took his seat upon [his] throne, and addressed an oration to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the assembled people shouted, It is the voice of a god, and not of a man!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And at once an angel of the Lord smote him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cut him down, because he did not give God the glory (the preeminence and kingly majesty that belong to Him as the supreme Ruler); and he was eaten by worms and died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But the Word of the Lord [concerning the attainment through Christ of salvation in the kingdom of God] continued to grow and spread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Barnabas and Saul came back from Jerusalem when they had completed their mission, bringing with them John whose surname was Mark. [Acts 11:28-30.]'
