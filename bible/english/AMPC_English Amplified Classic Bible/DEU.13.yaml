document_id: DEU.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IF A prophet arises among you, or a dreamer of dreams, and gives you a sign or a wonder,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And you shall stone him to death with stones, because he has tried to draw you away from the Lord your God, Who brought you out of the land of Egypt, from the house of bondage.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And all Israel shall hear and [reverently] fear, and shall never again do any such wickedness as this among you.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' If you hear it said in one of your cities which the Lord your God has given you in which to dwell'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' That certain base fellows have gone out from your midst and have enticed away the inhabitants of their city, saying, Let us go and serve other gods–gods you have not known–'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Then you shall inquire and make search and ask diligently. And behold, if it is true and certain that such an abominable thing has been done among you,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' You shall surely smite the inhabitants of that city with the edge of the sword, destroying it utterly and all who are in it and its beasts with the edge of the sword.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And you shall collect all its spoil into the midst of its open square and shall burn the city with fire with every bit of its spoil [as a whole burnt offering] to the Lord your God. It shall be a heap [of ruins] forever; it shall not be built again.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And nothing of the accursed thing shall cling to your hand, so that the Lord may turn from the fierceness of His anger, and show you mercy and have compassion on you and multiply you, as He swore to your fathers,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' If you obey the voice of the Lord your God, to keep all His commandments which I command you this day, to do what is right in the eyes of the Lord your God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And the sign or the wonder he foretells to you comes to pass, and if he says, Let us go after other gods–gods you have not known–and let us serve them,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' You shall not listen to the words of that prophet or to that dreamer of dreams. For the Lord your God is testing you to know whether you love the Lord your God with all your [mind and] heart and with your entire being.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' You shall walk after the Lord your God and [reverently] fear Him, and keep His commandments and obey His voice, and you shall serve Him and cling to Him.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' But that prophet or that dreamer of dreams shall be put to death, because he has talked rebellion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' turning away from the Lord your God, Who brought you out of the land of Egypt and redeemed you out of the house of bondage; that man has tried to draw you aside from the way in which the Lord your God commanded you to walk. So shall you put the evil away from your midst.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' If your brother, the son of your mother, or your son or daughter, or the wife of your bosom, or your friend who is as your own life entices you secretly, saying, Let us go and serve other gods–gods you have not known, you nor your fathers,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Of the gods of the peoples who are round about you, near you or far away from you, from one end of the earth to the other–'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' You shall not give consent to him or listen to him; nor shall your eye pity him, nor shall you spare him or conceal him.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But you shall surely kill him; your hand shall be first upon him to put him to death, and afterwards the hands of all the people.'
