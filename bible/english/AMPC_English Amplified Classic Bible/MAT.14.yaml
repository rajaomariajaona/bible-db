document_id: MAT.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AT THAT time Herod the governor heard the reports about Jesus,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he said to his attendants, This is John the Baptist; He has been raised from the dead, and that is why the powers of performing miracles are at work in Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For Herod had arrested John and bound him and put him in prison [to stow him out of the way] on account '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for the sake of Herodias, his brother Philip''s wife,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For John had said to him, It is not lawful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' right for you to have her. [Lev. 18:16; 20:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Although he wished to have him put to death, he was afraid of the people, for they regarded John as a prophet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But when Herod''s birthday came, the daughter of Herodias danced in the midst [before the company] and pleased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fascinated Herod,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And so he promised with an oath to give her whatever she might ask.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And she, being put forward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prompted by her mother, said, Give me the head of John the Baptist right here on a platter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the king was distressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sorry, but because of his oaths and his guests, he ordered it to be given her;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He sent and had John beheaded in the prison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And his head was brought in on a platter and given to the little maid, and she brought it to her mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And John''s disciples came and took up the body and buried it. Then they went and told Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When Jesus heard it, He withdrew from there privately in a boat to a solitary place. But when the crowds heard of it, they followed Him [by land] on foot from the towns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When He went ashore and saw a great throng of people, He had compassion (pity and deep sympathy) for them and cured their sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When evening came, the disciples came to Him and said, This is a remote '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' barren place, and the day is now over; send the throngs away into the villages to buy food for themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Jesus said, They do not need to go away; you give them something to eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They said to Him, We have nothing here but five loaves and two fish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He said, Bring them here to Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then He ordered the crowds to recline on the grass; and He took the five loaves and the two fish, and, looking up to heaven, He gave thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed and broke the loaves and handed the pieces to the disciples, and the disciples gave them to the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And they all ate and were satisfied. And they picked up twelve [small hand] baskets full of the broken pieces left over.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And those who ate were about 5,000 men, not including women and children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then He directed the disciples to get into the boat and go before Him to the other side, while He sent away the crowds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And after He had dismissed the multitudes, He went up into the hills by Himself to pray. When it was evening, He was still there alone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But the boat was by this time out on the sea, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: many furlongs
  - type: text
    text: ' [a furlong is one-eighth of a mile] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: distant from the land,
  - type: text
    text: ' beaten and tossed by the waves, for the wind was against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And in the fourth watch [between 3:00–6:00 a.m.] of the night, Jesus came to them, walking on the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And when the disciples saw Him walking on the sea, they were terrified and said, It is a ghost! And they screamed out with fright.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But instantly He spoke to them, saying, Take courage! I AM! Stop being afraid! [Exod. 3:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And Peter answered Him, Lord, if it is You, command me to come to You on the water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' He said, Come! So Peter got out of the boat and walked on the water, and he came toward Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But when he perceived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' felt the strong wind, he was frightened, and as he began to sink, he cried out, Lord, save me [from death]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Instantly Jesus reached out His hand and caught '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' held him, saying to him, O you of little faith, why did you doubt?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And when they got into the boat, the wind ceased.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And those in the boat knelt and worshiped Him, saying, Truly You are the Son of God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And when they had crossed over to the other side, they went ashore at Gennesaret.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And when the men of that place recognized Him, they sent around into all the surrounding country and brought to Him all who were sick'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And begged Him to let them merely touch the fringe of His garment; and as many as touched it were perfectly restored. [Matt. 9:20.]'
