document_id: MAT.14,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AT THAT time Herod the governor heard the reports about Jesus,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He sent and had John beheaded in the prison.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And his head was brought in on a platter and given to the little maid, and she brought it to her mother.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And John''s disciples came and took up the body and buried it. Then they went and told Jesus.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Jesus heard it, He withdrew from there privately in a boat to a solitary place. But when the crowds heard of it, they followed Him [by land] on foot from the towns.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When He went ashore and saw a great throng of people, He had compassion (pity and deep sympathy) for them and cured their sick.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When evening came, the disciples came to Him and said, This is a remote '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' barren place, and the day is now over; send the throngs away into the villages to buy food for themselves.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus said, They do not need to go away; you give them something to eat.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They said to Him, We have nothing here but five loaves and two fish.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said, Bring them here to Me.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He ordered the crowds to recline on the grass; and He took the five loaves and the two fish, and, looking up to heaven, He gave thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessed and broke the loaves and handed the pieces to the disciples, and the disciples gave them to the people.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he said to his attendants, This is John the Baptist; He has been raised from the dead, and that is why the powers of performing miracles are at work in Him.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they all ate and were satisfied. And they picked up twelve [small hand] baskets full of the broken pieces left over.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And those who ate were about 5,000 men, not including women and children.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He directed the disciples to get into the boat and go before Him to the other side, while He sent away the crowds.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And after He had dismissed the multitudes, He went up into the hills by Himself to pray. When it was evening, He was still there alone.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the boat was by this time out on the sea, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: many furlongs
    - type: text
      text: ' [a furlong is one-eighth of a mile] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: distant from the land,
    - type: text
      text: ' beaten and tossed by the waves, for the wind was against them.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And in the fourth watch [between 3:00–6:00 a.m.] of the night, Jesus came to them, walking on the sea.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the disciples saw Him walking on the sea, they were terrified and said, It is a ghost! And they screamed out with fright.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But instantly He spoke to them, saying, Take courage! I AM! Stop being afraid! [Exod. 3:14.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Peter answered Him, Lord, if it is You, command me to come to You on the water.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said, Come! So Peter got out of the boat and walked on the water, and he came toward Jesus.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Herod had arrested John and bound him and put him in prison [to stow him out of the way] on account '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for the sake of Herodias, his brother Philip''s wife,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when he perceived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' felt the strong wind, he was frightened, and as he began to sink, he cried out, Lord, save me [from death]!'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Instantly Jesus reached out His hand and caught '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' held him, saying to him, O you of little faith, why did you doubt?'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when they got into the boat, the wind ceased.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And those in the boat knelt and worshiped Him, saying, Truly You are the Son of God!'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when they had crossed over to the other side, they went ashore at Gennesaret.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the men of that place recognized Him, they sent around into all the surrounding country and brought to Him all who were sick'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And begged Him to let them merely touch the fringe of His garment; and as many as touched it were perfectly restored. [Matt. 9:20.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For John had said to him, It is not lawful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' right for you to have her. [Lev. 18:16; 20:21.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Although he wished to have him put to death, he was afraid of the people, for they regarded John as a prophet.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when Herod''s birthday came, the daughter of Herodias danced in the midst [before the company] and pleased '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fascinated Herod,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And so he promised with an oath to give her whatever she might ask.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And she, being put forward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prompted by her mother, said, Give me the head of John the Baptist right here on a platter.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the king was distressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorry, but because of his oaths and his guests, he ordered it to be given her;'
