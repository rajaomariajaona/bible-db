document_id: MAT.26,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' WHEN JESUS had ended this discourse, He said to His disciples,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Jesus, fully aware of this, said to them, Why do you bother the woman? She has done a noble (praiseworthy and beautiful) thing to Me.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For you always have the poor among you, but you will not always have Me. [Deut. 15:11.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In pouring this perfume on My body she has done something to prepare Me for My burial.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Truly I tell you, wherever this good news (the Gospel) is preached in the whole world, what this woman has done will be told also, in memory of her.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then one of the Twelve [apostles], who was called Judas Iscariot, went to the chief priests'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And said, What are you willing to give me if I hand Him over to you? And they weighed out for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' paid to him thirty pieces of silver [about twenty-one dollars and sixty cents]. [Exod. 21:32; Zech. 11:12.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And from that moment he sought a fitting opportunity to betray Him.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now on the first day of Unleavened Bread [Passover week], the disciples came to Jesus and said '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Him,
    - type: text
      text: ' Where do You wish us to prepare for You to eat the Passover supper?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said, Go into the city to a certain man and say to him, The Master says: My time is near; I will keep the Passover at your house with My disciples.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And accordingly the disciples did as Jesus had directed them, and they made ready the Passover supper. [Deut. 16:5-8.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You know that the Passover is in two days–and the Son of Man will be delivered up treacherously to be crucified.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When it was evening, He was reclining at table with the twelve disciples.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And as they were eating, He said, Solemnly I say to you, one of you will betray Me!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They were exceedingly pained '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deeply hurt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorrowful and began to say to Him one after another, Surely it cannot be I, Lord, can it?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He replied, He who has [just] dipped his hand in the same dish with Me will betray Me!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Son of Man is going just as it is written of Him; but woe to that man by whom the Son of Man is betrayed! It would have been better (more profitable and wholesome) for that man if he had never been born! [Ps. 41:9.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Judas, the betrayer, said, Surely it is not I, is it, Master? He said to him, You have stated [the fact].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now as they were eating, Jesus took bread and, praising God, gave thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' asked Him to bless it to their use, and when He had broken it, He gave it to the disciples and said, Take, eat; this is My body.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He took a cup, and when He had given thanks, He gave it to them, saying, Drink of it, all of you;'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this is My blood of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: new
    - type: text
      text: ' covenant, which [ratifies the agreement and] is being poured out for many for the forgiveness of sins. [Exod. 24:6-8.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I say to you, I shall not drink again of this fruit of the vine until that day when I drink it with you new '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of superior quality in My Father''s kingdom.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the chief priests and the elders of the people gathered in the [open] court of the palace of the high priest, whose name was Caiaphas,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when they had sung a hymn, they went out to the Mount of Olives.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Jesus said to them, You will all be offended '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall away because of Me this night [distrusting and deserting Me], for it is written, I will strike the Shepherd, and the sheep of the flock will be scattered. [Zech. 13:7.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But after I am raised up [to life again], I will go ahead of you to Galilee.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Peter declared to Him, Though they all are offended '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall away because of You [and distrust and desert You], I will never do so.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus said to him, Solemnly I declare to you, this very night, before a single rooster crows, you will deny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disown Me three times.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Peter said to Him, Even if I must die with You, I will not deny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' disown You! And all the disciples said the same thing.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Jesus went with them to a place called Gethsemane, and He told His disciples, Sit down here while I go over yonder and pray.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And taking with Him Peter and the two sons of Zebedee, He began to show grief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distress of mind and was deeply depressed.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He said to them, My soul is very sad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deeply grieved, so that I am almost dying of sorrow. Stay here and keep awake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep watch with Me.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And going a little farther, He threw Himself upon the ground on His face and prayed saying, My Father, if it is possible, let this cup pass away from Me; nevertheless, not what I will [not what I desire], but as You will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desire.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And consulted together in order to arrest Jesus by stratagem secretly and put Him to death.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He came to the disciples and found them sleeping, and He said to Peter, What! Are you so utterly unable to stay awake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep watch with Me for one hour?'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All of you must keep awake (give strict attention, be cautious and active) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' watch and pray, that you may not come into temptation. The spirit indeed is willing, but the flesh is weak.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Again a second time He went away and prayed, My Father, if this cannot pass by unless I drink it, Your will be done.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And again He came and found them sleeping, for their eyes were weighed down with sleep.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So, leaving them again, He went away and prayed for the third time, using the same words.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He returned to the disciples and said to them, Are you still sleeping and taking your rest? Behold, the hour is at hand, and the Son of Man is betrayed into the hands of especially wicked sinners [whose way or nature it is to act in opposition to God].'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Get up, let us be going! See, My betrayer is at hand!'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As He was still speaking, Judas, one of the Twelve [apostles], came up, and with him a great crowd with swords and clubs, from the chief priests and elders of the people.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now the betrayer had given them a sign, saying, The One I shall kiss is the Man; seize Him.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he came up to Jesus at once and said, Hail (greetings, good health to You, long life to You), Master! And he embraced Him and kissed Him with [pretended] warmth and devotion.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But they said, It must not be during the Feast, for fear that there will be a riot among the people.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus said to him, Friend, for what are you here? Then they came up and laid hands on Jesus and arrested Him.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And behold, one of those who were with Jesus reached out his hand and drew his sword and, striking the body servant of the high priest, cut off his ear.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Jesus said to him, Put your sword back into its place, for all who draw the sword will die by the sword. [Gen. 9:6.]'
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do you suppose that I cannot appeal to My Father, and He will immediately provide Me with more than twelve legions [more than 80,000] of angels?'
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But how then would the Scriptures be fulfilled, that it must come about this way?'
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At that moment Jesus said to the crowds, Have you come out with swords and clubs as [you would] against a robber to capture Me? Day after day I was accustomed to sit in the porches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' courts of the temple teaching, and you did not arrest Me.'
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But all this has taken place in order that the Scriptures of the prophets might be fulfilled. Then all the disciples deserted Him and, fleeing, escaped.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But those who had seized Jesus took Him away to Caiaphas, the high priest, where the scribes and the elders had assembled.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Peter followed Him at a distance, as far as the courtyard of the high priest''s home; he even went inside and sat with the guards to see the end.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now the chief priests and the whole council (the Sanhedrin) sought to get false witnesses to testify against Jesus, so that they might put Him to death;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now when Jesus came back to Bethany and was in the house of Simon the leper,'
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But they found none, though many witnesses came forward [to testify]. At last two men came forward'
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And testified, This Fellow said, I am able to tear down the sanctuary of the temple of God and to build it up again in three days.'
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the high priest stood up and said, Have You no answer to make? What about this that these men testify against You?'
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Jesus kept silent. And the high priest said to Him, I call upon you to swear by the living God, and tell us whether you are the Christ, the Son of God.'
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus said to him, You have stated [the fact]. More than that, I tell you: You will in the future see the Son of Man seated at the right hand of the Almighty and coming on the clouds of the sky. [Ps. 110:1; Dan. 7:13.]'
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the high priest tore his clothes and exclaimed, He has uttered blasphemy! What need have we of further evidence? You have now heard His blasphemy. [Lev. 24:16; Num. 14:6.]'
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What do you think now? They answered, He deserves to be put to death.'
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then they spat in His face and struck Him with their fists; and some slapped Him in the face, [Isa. 50:6.]'
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Saying, Prophesy to us, You Christ (the Messiah)! Who was it that struck You?'
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now Peter was sitting outside in the courtyard, and one maid came up to him and said, You were also with Jesus the Galilean!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A woman came up to Him with an alabaster flask of very precious perfume, and she poured it on His head as He reclined at table.'
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But he denied it falsely before them all, saying, I do not know what you mean.'
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when he had gone out to the porch, another maid saw him, and she said to the bystanders, This fellow was with Jesus the Nazarene!'
  '72':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And again he denied it and disowned Him with an oath, saying, I do not know the Man!'
  '73':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' After a little while, the bystanders came up and said to Peter, You certainly are one of them too, for even your accent betrays you.'
  '74':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Peter began to invoke a curse on himself and to swear, I do not even know the Man! And at that moment a rooster crowed.'
  '75':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Peter remembered Jesus'' words, when He had said, Before a single rooster crows, you will deny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disown Me three times. And he went outside and wept bitterly.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the disciples saw it, they were indignant, saying, For what purpose is all this waste?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this perfume might have been sold for a large sum and the money given to the poor.'
