document_id: JAS.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' MY BRETHREN, pay no servile regard to people [show no prejudice, no partiality]. Do not [attempt to] hold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' practice the faith of our Lord Jesus Christ [the Lord] of glory [together with snobbery]!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For whosoever keeps the Law [as a] whole but stumbles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offends in one [single instance] has become guilty of [breaking] all of it.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For He Who said, You shall not commit adultery, also said, You shall not kill. If you do not commit adultery but do kill, you have become guilty of transgressing the [whole] Law. [Exod. 20:13, 14; Deut. 5:17, 18.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So speak and so act as [people should] who are to be judged under the law of liberty [the moral instruction given by Christ, especially about love].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For to him who has shown no mercy the judgment [will be] merciless, but mercy [full of glad confidence] exults victoriously over judgment.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What is the use (profit), my brethren, for anyone to profess to have faith if he has no [good] works [to show for it]? Can [such] faith save [his soul]?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If a brother or sister is poorly clad and lacks food for each day,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one of you says to him, Good-bye! Keep [yourself] warm and well fed, without giving him the necessities for the body, what good does that do?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So also faith, if it does not have works (deeds and actions of obedience to back it up), by itself is destitute of power (inoperative, dead).'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But someone will say [to you then], You [say you] have faith, and I have [good] works. Now you show me your [alleged] faith apart from any [good] works [if you can], and I by [good] works [of obedience] will show you my faith.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You believe that God is one; you do well. So do the demons believe and shudder [in terror and horror such as make a man''s hair stand on end and contract the surface of his skin]!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For if a person comes into your congregation whose hands are adorned with gold rings and who is wearing splendid apparel, and also a poor [man] in shabby clothes comes in,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Are you willing to be shown [proof], you foolish (unproductive, spiritually deficient) fellow, that faith apart from [good] works is inactive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ineffective '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthless?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Was not our forefather Abraham [shown to be] justified (made acceptable to God) by [his] works when he brought to the altar as an offering his [own] son Isaac? [Gen. 22:1-14.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You see that [his] faith was cooperating with his works, and [his] faith was completed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reached its supreme expression [when he implemented it] by [good] works.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [so] the Scripture was fulfilled that says, Abraham believed in (adhered to, trusted in, and relied on) God, and this was accounted to him as righteousness (as conformity to God''s will in thought and deed), and he was called God''s friend. [Gen. 15:6; II Chron. 20:7; Isa. 41:8.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You see that a man is justified (pronounced righteous before God) through what he does and not alone through faith [through works of obedience as well as by what he believes].'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So also with Rahab the harlot–was she not shown to be justified (pronounced righteous before God) by [good] deeds when she took in the scouts (spies) and sent them away by a different route? [Josh. 2:1-21.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For as the human body apart from the spirit is lifeless, so faith apart from [its] works of obedience is also dead.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you pay special attention to the one who wears the splendid clothes and say to him, Sit here in this preferable seat! while you tell the poor [man], Stand there! or, Sit there on the floor at my feet!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Are you not discriminating among your own and becoming critics '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judges with wrong motives?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Listen, my beloved brethren: Has not God chosen those who are poor in the eyes of the world to be rich in faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in their position as believers and to inherit the kingdom which He has promised to those who love Him?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But you [in contrast] have insulted (humiliated, dishonored, and shown your contempt for) the poor. Is it not the rich who domineer over you? Is it not they who drag you into the law courts?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Is it not they who slander '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blaspheme that precious name by which you are distinguished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' called [the name of Christ invoked in baptism]?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If indeed you [really] fulfill the royal Law in accordance with the Scripture, You shall love your neighbor as [you love] yourself, you do well. [Lev. 19:18.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if you show servile regard (prejudice, favoritism) for people, you commit sin and are rebuked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' convicted by the Law as violators '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offenders.'
