document_id: PSA.136,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' O GIVE thanks to the Lord, for He is good; for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever.'
  '10':
  - type: text
    content: ' To Him Who smote Egypt in their firstborn, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever; [Exod. 12:29.]'
  '11':
  - type: text
    content: ' And brought out Israel from among them, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever; [Exod. 12:51; 13:3, 17.]'
  '12':
  - type: text
    content: ' With a strong hand and with an outstretched arm, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '13':
  - type: text
    content: ' To Him Who divided the Red Sea into parts, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever; [Exod. 14:21, 22.]'
  '14':
  - type: text
    content: ' And made Israel to pass through the midst of it, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '15':
  - type: text
    content: ' But shook off '
  - type: text
    content: and
  - type: text
    content: ' overthrew Pharaoh and his host into the Red Sea, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '16':
  - type: text
    content: ' To Him Who led His people through the wilderness, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '17':
  - type: text
    content: ' To Him Who smote great kings, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '18':
  - type: text
    content: ' And slew famous kings, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever–[Deut. 29:7.]'
  '19':
  - type: text
    content: ' Sihon king of the Amorites, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever; [Num. 21:21-24.]'
  '2':
  - type: text
    content: ' O give thanks to the God of gods, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever.'
  '20':
  - type: text
    content: ' And Og king of Bashan, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever; [Num. 21:33-35.]'
  '21':
  - type: text
    content: ' And gave their land as a heritage, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '22':
  - type: text
    content: ' Even a heritage to Israel His servant, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever; [Josh. 12:1.]'
  '23':
  - type: text
    content: ' To Him Who [earnestly] remembered us in our low estate '
  - type: text
    content: and
  - type: text
    content: ' imprinted us [on His heart], for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '24':
  - type: text
    content: ' And rescued us from our enemies, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '25':
  - type: text
    content: ' To Him Who gives food to all flesh, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '26':
  - type: text
    content: ' O give thanks to the God of heaven, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever!'
  '3':
  - type: text
    content: ' O give thanks to the Lord of lords, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever–'
  '4':
  - type: text
    content: ' To Him Who alone does great wonders, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '5':
  - type: text
    content: ' To Him Who by wisdom '
  - type: text
    content: and
  - type: text
    content: ' understanding made the heavens, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '6':
  - type: text
    content: ' To Him Who stretched out the earth upon the waters, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '7':
  - type: text
    content: ' To Him Who made the great lights, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever–'
  '8':
  - type: text
    content: ' The sun to rule over the day, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
  '9':
  - type: text
    content: ' The moon and stars to rule by night, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever;'
