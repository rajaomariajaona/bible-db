document_id: ECC.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' I SAID in my mind, Come now, I will prove you with mirth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' test you with pleasure; so have a good time [enjoy pleasure]. But this also was vanity (emptiness, falsity, and futility)! [Luke 12:19, 20.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And whatever my eyes desired I kept not from them; I withheld not my heart from any pleasure, for my heart rejoiced in all my labor, and this was my portion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reward for all my toil.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Then I looked on all that my hands had done and the labor I had spent in doing it, and behold, all was vanity and a striving after the wind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a feeding on it, and there was no profit under the sun. [Matt. 16:26.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So I turned to consider [human] wisdom and madness and folly; for what can the man do who succeeds the king? Nothing but what has been done already.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then I saw that even [human] wisdom [that brings sorrow] is better than [the pleasures of] folly as far as light is better than darkness.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The wise man''s eyes are in his head, but the fool walks in darkness; and yet I perceived that [in the end] one event happens to them both. [Prov. 17:24.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Then said I in my heart, As it happens to the fool, so it will happen even to me. And of what use is it then for me to be more wise? Then I said in my heart, This also is vanity (emptiness, vainglory, and futility)!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For of the wise man, the same as of the fool, there is no permanent remembrance, since in the days to come all will be long forgotten. And how does the wise man die? Even as the fool!'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So I hated life, because what is done under the sun was grievous to me; for all is vanity and a striving after the wind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a feeding on it.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And I hated all my labor in which I had toiled under the sun, seeing that I must leave it to the man who will succeed me. [Ps. 49:10.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And who knows whether he will be a wise man or a fool? Yet he will have dominion over all my labor in which I have toiled and in which I have shown myself wise under the sun. This is also vanity (emptiness, falsity, and futility)!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I said of laughter, It is mad, and of pleasure, What does it accomplish?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So I turned around and gave my heart up to despair over all the labor of my efforts under the sun.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' For here is a man whose labor is with wisdom and knowledge and skill; yet to a man who has not toiled for it he must leave it all as his portion. This also is vanity (emptiness, falsity, and futility) and a great evil!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' For what has a man left from all his labor and from the striving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vexation of his heart in which he has toiled under the sun?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' For all his days are but pain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorrow, and his work is a vexation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grief; his mind takes no rest even at night. This is also vanity (emptiness, falsity, and futility)!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' There is nothing better for a man than that he should eat and drink and make himself enjoy good in his labor. Even this, I have seen, is from the hand of God.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' For who can eat or who can have enjoyment any more than I can–'
    - type: usfm
      marker: it
      children:
      - type: text
        text: apart from Him
    - type: text
      text: ' ?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' For to the person who pleases Him God gives wisdom and knowledge and joy; but to the sinner He gives the work of gathering and heaping up, that he may give to one who pleases God. This also is vanity and a striving after the wind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a feeding on it.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' I searched in my mind how to cheer my body with wine–yet at the same time having my mind hold its course '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guide me with [human] wisdom–and how to lay hold of folly, till I might see what was good for the sons of men to do under heaven all the days of their lives.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' I made great works; I built myself houses, I planted vineyards.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' I made for myself gardens and orchards and I planted in them all kinds of fruit trees.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I made for myself pools of water from which to water the forest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make the trees bud.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' I bought menservants and maidservants and had servants born in my house. Also I had great possessions of herds and flocks, more than any who had been before me in Jerusalem.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I also gathered for myself silver and gold and the treasure of kings and of the provinces. I got for myself men singers and women singers, and the delights of the sons of men–concubines very many. [I Kings 9:28; 10:10, 14, 21.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' So I became great and increased more than all who were before me in Jerusalem. Also my wisdom remained with me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stood by me.'
