document_id: 1SA.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THE Philistines fought against Israel; and the men of Israel fled before [them] and fell slain on Mount Gilboa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the Philistines pursued Saul and his sons, and slew Jonathan and Abinadab and Malchi-shua, Saul''s sons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The battle went heavily against Saul, and the archers severely wounded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Saul said to his armor-bearer, Draw your sword and thrust me through, lest these uncircumcised come and thrust me through and abuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mock me. But his armor-bearer would not, for he was terrified. So Saul took a sword and fell upon it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When his armor-bearer saw that Saul was dead, he likewise fell upon his sword and died with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So Saul, his three sons, his armor-bearer, and all his men died that day together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when the men of Israel on the other side of the valley and beyond the Jordan saw that the Israelites had fled and that Saul and his sons were dead, they forsook the cities and fled; and the Philistines came and dwelt in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The next day, when the Philistines came to strip the slain, they found Saul and his three sons fallen on Mount Gilboa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' They cut off Saul''s head and stripped off his armor and sent them round about the land of the Philistines to publish it in the house of their idols and among the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And they put Saul''s armor in the house of the Ashtaroth [the idols representing the female deities Ashtoreth and Asherah], and they fastened his body to the wall of Beth-shan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When the people of Jabesh-gilead heard what the Philistines had done to Saul,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' All the valiant men arose and went all night, and they took the bodies of Saul and his sons from the wall of Beth-shan and came to Jabesh and cremated them there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they took their bones and buried them under a tree at Jabesh, and fasted seven days.'
