document_id: 1SA.31,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THE Philistines fought against Israel; and the men of Israel fled before [them] and fell slain on Mount Gilboa.'
  '10':
  - type: text
    content: ' And they put Saul''s armor in the house of the Ashtaroth [the idols representing the female deities Ashtoreth and Asherah], and they fastened his body to the wall of Beth-shan.'
  '11':
  - type: text
    content: ' When the people of Jabesh-gilead heard what the Philistines had done to Saul,'
  '12':
  - type: text
    content: ' All the valiant men arose and went all night, and they took the bodies of Saul and his sons from the wall of Beth-shan and came to Jabesh and cremated them there.'
  '13':
  - type: text
    content: ' And they took their bones and buried them under a tree at Jabesh, and fasted seven days.'
  '2':
  - type: text
    content: ' And the Philistines pursued Saul and his sons, and slew Jonathan and Abinadab and Malchi-shua, Saul''s sons.'
  '3':
  - type: text
    content: ' The battle went heavily against Saul, and the archers severely wounded him.'
  '4':
  - type: text
    content: ' Saul said to his armor-bearer, Draw your sword and thrust me through, lest these uncircumcised come and thrust me through and abuse '
  - type: text
    content: and
  - type: text
    content: ' mock me. But his armor-bearer would not, for he was terrified. So Saul took a sword and fell upon it.'
  '5':
  - type: text
    content: ' When his armor-bearer saw that Saul was dead, he likewise fell upon his sword and died with him.'
  '6':
  - type: text
    content: ' So Saul, his three sons, his armor-bearer, and all his men died that day together.'
  '7':
  - type: text
    content: ' And when the men of Israel on the other side of the valley and beyond the Jordan saw that the Israelites had fled and that Saul and his sons were dead, they forsook the cities and fled; and the Philistines came and dwelt in them.'
  '8':
  - type: text
    content: ' The next day, when the Philistines came to strip the slain, they found Saul and his three sons fallen on Mount Gilboa.'
  '9':
  - type: text
    content: ' They cut off Saul''s head and stripped off his armor and sent them round about the land of the Philistines to publish it in the house of their idols and among the people.'
