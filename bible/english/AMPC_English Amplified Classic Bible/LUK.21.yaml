document_id: LUK.21,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' LOOKING UP, [Jesus] saw the rich people putting their gifts into the treasury.'
  '10':
  - type: text
    content: ' Then He told them, Nation will rise against nation, and kingdom against kingdom. [II Chron. 15:6; Isa. 19:2.]'
  '11':
  - type: text
    content: ' There will be mighty '
  - type: text
    content: and
  - type: text
    content: ' violent earthquakes, and in various places famines and pestilences (plagues: malignant and contagious or infectious epidemic diseases which are deadly and devastating); and there will be sights of terror and great signs from heaven.'
  '12':
  - type: text
    content: ' But previous to all this, they will lay their hands on you and persecute you, turning you over to the synagogues and prisons, and you will be led away before kings and governors for My name''s sake.'
  '13':
  - type: text
    content: ' This will be a time (an opportunity) for you to bear testimony.'
  '14':
  - type: text
    content: ' Resolve '
  - type: text
    content: and
  - type: text
    content: ' settle it in your minds not to meditate '
  - type: text
    content: and
  - type: text
    content: ' prepare beforehand how you are to make your defense '
  - type: text
    content: and
  - type: text
    content: ' how you will answer.'
  '15':
  - type: text
    content: ' For I [Myself] will give you a mouth '
  - type: text
    content: and
  - type: text
    content: ' such utterance and wisdom that all of your foes combined will be unable to stand against or refute.'
  '16':
  - type: text
    content: ' You will be delivered up '
  - type: text
    content: and
  - type: text
    content: ' betrayed even by parents and brothers and relatives and friends, and [some] of you they will put to death.'
  '17':
  - type: text
    content: ' And you will be hated (despised) by everyone because [you bear] My name '
  - type: text
    content: and
  - type: text
    content: ' for its sake.'
  '18':
  - type: text
    content: ' But not a hair of your head shall perish. [I Sam. 14:45.]'
  '19':
  - type: text
    content: ' By your steadfastness '
  - type: text
    content: and
  - type: text
    content: ' patient endurance you shall win the true life of your souls.'
  '2':
  - type: text
    content: ' And He saw also a poor widow putting in two mites (copper coins).'
  '20':
  - type: text
    content: ' But when you see Jerusalem surrounded by armies, then know '
  - type: text
    content: and
  - type: text
    content: ' understand that its desolation has come near.'
  '21':
  - type: text
    content: ' Then let those who are in Judea flee to the mountains, and let those who are inside [the city] get out of it, and let not those who are out in the country come into it;'
  '22':
  - type: text
    content: ' For those are days of vengeance [of rendering full justice or satisfaction], that all things that are written may be fulfilled.'
  '23':
  - type: text
    content: ' Alas for those who are pregnant and for those who have babies which they are nursing in those days! For great misery '
  - type: text
    content: and
  - type: text
    content: ' anguish '
  - type: text
    content: and
  - type: text
    content: ' distress shall be upon the land and indignation '
  - type: text
    content: and
  - type: text
    content: ' punishment '
  - type: text
    content: and
  - type: text
    content: ' retribution upon this people.'
  '24':
  - type: text
    content: ' They will fall by the mouth '
  - type: text
    content: and
  - type: text
    content: ' the edge of the sword and will be led away as captives to '
  - type: text
    content: and
  - type: text
    content: ' among all nations; and Jerusalem will be trodden down by the Gentiles until the times of the Gentiles are fulfilled (completed). [Isa. 63:18; Dan. 8:13.]'
  '25':
  - type: text
    content: ' And there will be signs in the sun and moon and stars; and upon the earth [there will be] distress (trouble and anguish) of nations in bewilderment '
  - type: text
    content: and
  - type: text
    content: ' perplexity [without resources, left wanting, embarrassed, in doubt, not knowing which way to turn] at the roaring (the echo) of the tossing of the sea, [Isa. 13:10; Joel 2:10; Zeph. 1:15.]'
  '26':
  - type: text
    content: ' Men swooning away '
  - type: text
    content: or
  - type: text
    content: ' expiring with fear '
  - type: text
    content: and
  - type: text
    content: ' dread '
  - type: text
    content: and
  - type: text
    content: ' apprehension and expectation of the things that are coming on the world; for the [very] powers of the heavens will be shaken '
  - type: text
    content: and
  - type: text
    content: ' caused to totter.'
  '27':
  - type: text
    content: ' And then they will see the Son of Man coming in a cloud with great (transcendent and overwhelming) power and [all His kingly] glory (majesty and splendor). [Dan. 7:13, 14.]'
  '28':
  - type: text
    content: ' Now when these things begin to occur, look up and lift up your heads, because your redemption (deliverance) is drawing near.'
  '29':
  - type: text
    content: ' And He told them a parable: Look at the fig tree and all the trees;'
  '3':
  - type: text
    content: ' And He said, Truly I say to you, this poor widow has put in more than all of them;'
  '30':
  - type: text
    content: ' When they put forth their buds '
  - type: text
    content: and
  - type: text
    content: ' come out in leaf, you see for yourselves and perceive '
  - type: text
    content: and
  - type: text
    content: ' know that summer is already near.'
  '31':
  - type: text
    content: ' Even so, when you see these things taking place, understand '
  - type: text
    content: and
  - type: text
    content: ' know that the kingdom of God is at hand.'
  '32':
  - type: text
    content: ' Truly I tell you, this generation (those living at that definite period of time) will not perish '
  - type: text
    content: and
  - type: text
    content: ' pass away until all has taken place.'
  '33':
  - type: text
    content: ' The sky and the earth (the universe, the world) will pass away, but My words will not pass away.'
  '34':
  - type: text
    content: ' But take heed to yourselves '
  - type: text
    content: and
  - type: text
    content: ' be on your guard, lest your hearts be overburdened '
  - type: text
    content: and
  - type: text
    content: ' depressed (weighed down) with the giddiness '
  - type: text
    content: and
  - type: text
    content: ' headache '
  - type: text
    content: and
  - type: text
    content: ' nausea of self-indulgence, drunkenness, and worldly worries '
  - type: text
    content: and
  - type: text
    content: ' cares pertaining to [the business of] this life, and [lest] that day come upon you suddenly like a trap '
  - type: text
    content: or
  - type: text
    content: ' a noose;'
  '35':
  - type: text
    content: ' For it will come upon all who live upon the face of the entire earth.'
  '36':
  - type: text
    content: ' Keep awake then '
  - type: text
    content: and
  - type: text
    content: ' watch at all times [be discreet, attentive, and ready], praying that you may have the full strength '
  - type: text
    content: and
  - type: text
    content: ' ability '
  - type: text
    content: and
  - type: text
    content: ' be accounted worthy to escape all these things [taken together] that will take place, and to stand in the presence of the Son of Man.'
  '37':
  - type: text
    content: ' Now in the daytime Jesus was teaching in [the porches and courts of] the temple, but at night He would go out and stay on the mount called Olivet.'
  '38':
  - type: text
    content: ' And early in the morning all the people came to Him in the temple [porches or courts] to listen to Him.'
  '4':
  - type: text
    content: ' For they all gave out of their abundance (their surplus); but she has contributed out of her lack '
  - type: text
    content: and
  - type: text
    content: ' her want, putting in all that she had on which to live.'
  '5':
  - type: text
    content: ' And as some were saying of the temple that it was decorated with handsome (shapely and magnificent) stones and consecrated offerings [laid up to be kept], He said,'
  '6':
  - type: text
    content: ' As for all this that you [thoughtfully] look at, the time will come when there shall not be left here one stone upon another that will not be thrown down.'
  '7':
  - type: text
    content: ' And they asked Him, Teacher, when will this happen? And what sign will there be when this is about to occur?'
  '8':
  - type: text
    content: ' And He said, Be on your guard '
  - type: text
    content: and
  - type: text
    content: ' be careful that you are not led astray; for many will come in My name [appropriating to themselves the name Messiah which belongs to Me], saying, I am He! and, The time is at hand! Do not go out after them.'
  '9':
  - type: text
    content: ' And when you hear of wars and insurrections (disturbances, disorder, and confusion), do not become alarmed '
  - type: text
    content: and
  - type: text
    content: ' panic-stricken '
  - type: text
    content: and
  - type: text
    content: ' terrified; for all this must take place first, but the end will not [come] immediately.'
