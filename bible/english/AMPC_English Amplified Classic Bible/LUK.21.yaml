document_id: LUK.21,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' LOOKING UP, [Jesus] saw the rich people putting their gifts into the treasury.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He told them, Nation will rise against nation, and kingdom against kingdom. [II Chron. 15:6; Isa. 19:2.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There will be mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' violent earthquakes, and in various places famines and pestilences (plagues: malignant and contagious or infectious epidemic diseases which are deadly and devastating); and there will be sights of terror and great signs from heaven.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But previous to all this, they will lay their hands on you and persecute you, turning you over to the synagogues and prisons, and you will be led away before kings and governors for My name''s sake.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This will be a time (an opportunity) for you to bear testimony.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Resolve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' settle it in your minds not to meditate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prepare beforehand how you are to make your defense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' how you will answer.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For I [Myself] will give you a mouth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' such utterance and wisdom that all of your foes combined will be unable to stand against or refute.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You will be delivered up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' betrayed even by parents and brothers and relatives and friends, and [some] of you they will put to death.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you will be hated (despised) by everyone because [you bear] My name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for its sake.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But not a hair of your head shall perish. [I Sam. 14:45.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' By your steadfastness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' patient endurance you shall win the true life of your souls.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He saw also a poor widow putting in two mites (copper coins).'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when you see Jerusalem surrounded by armies, then know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand that its desolation has come near.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then let those who are in Judea flee to the mountains, and let those who are inside [the city] get out of it, and let not those who are out in the country come into it;'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For those are days of vengeance [of rendering full justice or satisfaction], that all things that are written may be fulfilled.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Alas for those who are pregnant and for those who have babies which they are nursing in those days! For great misery '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anguish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distress shall be upon the land and indignation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' retribution upon this people.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They will fall by the mouth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the edge of the sword and will be led away as captives to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' among all nations; and Jerusalem will be trodden down by the Gentiles until the times of the Gentiles are fulfilled (completed). [Isa. 63:18; Dan. 8:13.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there will be signs in the sun and moon and stars; and upon the earth [there will be] distress (trouble and anguish) of nations in bewilderment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perplexity [without resources, left wanting, embarrassed, in doubt, not knowing which way to turn] at the roaring (the echo) of the tossing of the sea, [Isa. 13:10; Joel 2:10; Zeph. 1:15.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Men swooning away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' expiring with fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' apprehension and expectation of the things that are coming on the world; for the [very] powers of the heavens will be shaken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' caused to totter.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And then they will see the Son of Man coming in a cloud with great (transcendent and overwhelming) power and [all His kingly] glory (majesty and splendor). [Dan. 7:13, 14.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now when these things begin to occur, look up and lift up your heads, because your redemption (deliverance) is drawing near.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He told them a parable: Look at the fig tree and all the trees;'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said, Truly I say to you, this poor widow has put in more than all of them;'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When they put forth their buds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' come out in leaf, you see for yourselves and perceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know that summer is already near.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Even so, when you see these things taking place, understand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know that the kingdom of God is at hand.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Truly I tell you, this generation (those living at that definite period of time) will not perish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pass away until all has taken place.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sky and the earth (the universe, the world) will pass away, but My words will not pass away.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But take heed to yourselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be on your guard, lest your hearts be overburdened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' depressed (weighed down) with the giddiness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' headache '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nausea of self-indulgence, drunkenness, and worldly worries '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cares pertaining to [the business of] this life, and [lest] that day come upon you suddenly like a trap '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a noose;'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For it will come upon all who live upon the face of the entire earth.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Keep awake then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' watch at all times [be discreet, attentive, and ready], praying that you may have the full strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ability '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be accounted worthy to escape all these things [taken together] that will take place, and to stand in the presence of the Son of Man.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now in the daytime Jesus was teaching in [the porches and courts of] the temple, but at night He would go out and stay on the mount called Olivet.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And early in the morning all the people came to Him in the temple [porches or courts] to listen to Him.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For they all gave out of their abundance (their surplus); but she has contributed out of her lack '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' her want, putting in all that she had on which to live.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And as some were saying of the temple that it was decorated with handsome (shapely and magnificent) stones and consecrated offerings [laid up to be kept], He said,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for all this that you [thoughtfully] look at, the time will come when there shall not be left here one stone upon another that will not be thrown down.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they asked Him, Teacher, when will this happen? And what sign will there be when this is about to occur?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said, Be on your guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be careful that you are not led astray; for many will come in My name [appropriating to themselves the name Messiah which belongs to Me], saying, I am He! and, The time is at hand! Do not go out after them.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when you hear of wars and insurrections (disturbances, disorder, and confusion), do not become alarmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' panic-stricken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrified; for all this must take place first, but the end will not [come] immediately.'
