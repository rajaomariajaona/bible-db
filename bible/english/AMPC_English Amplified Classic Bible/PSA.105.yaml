document_id: PSA.105,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' O GIVE thanks unto the Lord, call upon His name, make known His doings among the peoples!'
  '10':
  - type: text
    content: ' Which He confirmed to Jacob as a statute, to Israel as an everlasting covenant,'
  '11':
  - type: text
    content: ' Saying, Unto you will I give the land of Canaan as your measured portion, possession, '
  - type: text
    content: and
  - type: text
    content: ' inheritance.'
  '12':
  - type: text
    content: ' When they were but a few men in number, in fact, very few, and were temporary residents '
  - type: text
    content: and
  - type: text
    content: ' strangers in it,'
  '13':
  - type: text
    content: ' When they went from one nation to another, from one kingdom to another people,'
  '14':
  - type: text
    content: ' He allowed no man to do them wrong; in fact, He reproved kings for their sakes, [Gen. 12:17; 20:3-7.]'
  '15':
  - type: text
    content: ' Saying, Touch not My anointed, and do My prophets no harm. [I Chron. 16:8-22.]'
  '16':
  - type: text
    content: ' Moreover, He called for a famine upon the land [of Egypt]; He cut off every source of bread. [Gen. 41:54.]'
  '17':
  - type: text
    content: ' He sent a man before them, even Joseph, who was sold as a servant. [Gen. 45:5; 50:20, 21.]'
  '18':
  - type: text
    content: ' His feet they hurt with fetters; he was laid in chains of iron '
  - type: text
    content: and
  - type: text
    content: ' his soul entered into the iron,'
  '19':
  - type: text
    content: ' Until his word [to his cruel brothers] came true, until the word of the Lord tried '
  - type: text
    content: and
  - type: text
    content: ' tested him.'
  '2':
  - type: text
    content: ' Sing to Him, sing praises to Him; meditate on '
  - type: text
    content: and
  - type: text
    content: ' talk of all His marvelous deeds '
  - type: text
    content: and
  - type: text
    content: ' devoutly praise them.'
  '20':
  - type: text
    content: ' The king sent and loosed him, even the ruler of the peoples, and let him go free.'
  '21':
  - type: text
    content: ' He made Joseph lord of his house and ruler of all his substance, [Gen. 41:40.]'
  '22':
  - type: text
    content: ' To bind his princes at his pleasure and teach his elders wisdom.'
  '23':
  - type: text
    content: ' Israel also came into Egypt; and Jacob sojourned in the land of Ham. [Gen. 46:6.]'
  '24':
  - type: text
    content: ' There [the Lord] greatly increased His people and made them stronger than their oppressors.'
  '25':
  - type: text
    content: ' He turned the hearts [of the Egyptians] to hate His people, to deal craftily with His servants.'
  '26':
  - type: text
    content: ' He sent Moses His servant, and Aaron, whom He had chosen.'
  '27':
  - type: text
    content: ' They showed His signs among them, wonders '
  - type: text
    content: and
  - type: text
    content: ' miracles in the land of Ham (Egypt).'
  '28':
  - type: text
    content: ' He sent [thick] darkness and made the land dark, and they [God''s two servants] rebelled not against His word. [Exod. 10:22; Ps. 99:7.]'
  '29':
  - type: text
    content: ' He turned [Egypt''s] waters into blood and caused their fish to die. [Exod. 7:20, 21.]'
  '3':
  - type: text
    content: ' Glory in His holy name; let the hearts of those rejoice who seek '
  - type: text
    content: and
  - type: text
    content: ' require the Lord [as their indispensable necessity].'
  '30':
  - type: text
    content: ' Their land brought forth frogs in abundance, even in the chambers of their kings. [Exod. 8:6.]'
  '31':
  - type: text
    content: ' He spoke, and there came swarms of beetles '
  - type: text
    content: and
  - type: text
    content: ' flies and mosquitoes '
  - type: text
    content: and
  - type: text
    content: ' lice in all their borders. [Exod. 8:17, 24.]'
  '32':
  - type: text
    content: ' He gave them hail for rain, with lightning like flaming fire in their land. [Exod. 9:23, 25.]'
  '33':
  - type: text
    content: ' He smote their vines also and their fig trees and broke the [ice-laden] trees of their borders. [Ps. 78:47.]'
  '34':
  - type: text
    content: ' He spoke, and the locusts came, and the grasshoppers, and that without number, [Exod. 10:4, 13, 14.]'
  '35':
  - type: text
    content: ' And ate up all the vegetation in their land and devoured the fruit of their ground.'
  '36':
  - type: text
    content: ' He smote also all the firstborn in their land, the beginning '
  - type: text
    content: and
  - type: text
    content: ' chief substance of all their strength. [Exod. 12:29; Ps. 78:51.]'
  '37':
  - type: text
    content: ' He brought [Israel] forth also with silver and gold, and there was not one feeble person among their tribes. [Exod. 12:35.]'
  '38':
  - type: text
    content: ' Egypt was glad when they departed, for the fear of them had fallen upon the people. [Exod. 12:33.]'
  '39':
  - type: text
    content: ' The Lord spread a cloud for a covering [by day], and a fire to give light in the night. [Exod. 13:21.]'
  '4':
  - type: text
    content: ' Seek, inquire of '
  - type: text
    content: and
  - type: text
    content: ' for the Lord, '
  - type: text
    content: and
  - type: text
    content: ' crave Him and His strength (His might and inflexibility to temptation); seek '
  - type: text
    content: and
  - type: text
    content: ' require His face '
  - type: text
    content: and
  - type: text
    content: ' His presence [continually] evermore.'
  '40':
  - type: text
    content: ' [The Israelites] asked, and He brought quails and satisfied them with the bread of heaven. [Exod. 16:12-15.]'
  '41':
  - type: text
    content: ' He opened the rock, and water gushed out; it ran in the dry places like a river. [Exod. 17:6; Num. 20:11.]'
  '42':
  - type: text
    content: ' For He [earnestly] remembered His holy word '
  - type: text
    content: and
  - type: text
    content: ' promise to Abraham His servant. [Gen. 15:14.]'
  '43':
  - type: text
    content: ' And He brought forth His people with joy, and His chosen ones with gladness '
  - type: text
    content: and
  - type: text
    content: ' singing,'
  '44':
  - type: text
    content: ' And gave them the lands of the nations [of Canaan], and they reaped the fruits of those peoples'' labor, [Deut. 6:10, 11.]'
  '45':
  - type: text
    content: ' That they might observe His statutes and keep His laws [hearing, receiving, loving, and obeying them]. Praise the Lord! (Hallelujah!)'
  '5':
  - type: text
    content: ' [Earnestly] remember the marvelous deeds that He has done, His miracles '
  - type: text
    content: and
  - type: text
    content: ' wonders, the judgments '
  - type: text
    content: and
  - type: text
    content: ' sentences which He pronounced [upon His enemies, as in Egypt]. [Ps. 78:43-51.]'
  '6':
  - type: text
    content: ' O you offspring of Abraham His servant, you children of Jacob, His chosen ones,'
  '7':
  - type: text
    content: ' He is the Lord our God; His judgments are in all the earth.'
  '8':
  - type: text
    content: ' He is [earnestly] mindful of His covenant '
  - type: text
    content: and
  - type: text
    content: ' forever it is imprinted on His heart, the word which He commanded '
  - type: text
    content: and
  - type: text
    content: ' established to a thousand generations,'
  '9':
  - type: text
    content: ' The covenant which He made with Abraham, and His sworn promise to Isaac, [Luke 1:72, 73.]'
