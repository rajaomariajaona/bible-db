document_id: PSA.105
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O GIVE thanks unto the Lord, call upon His name, make known His doings among the peoples!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Sing to Him, sing praises to Him; meditate on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' talk of all His marvelous deeds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devoutly praise them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Glory in His holy name; let the hearts of those rejoice who seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require the Lord [as their indispensable necessity].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Seek, inquire of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for the Lord, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crave Him and His strength (His might and inflexibility to temptation); seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require His face '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His presence [continually] evermore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [Earnestly] remember the marvelous deeds that He has done, His miracles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wonders, the judgments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sentences which He pronounced [upon His enemies, as in Egypt]. [Ps. 78:43-51.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' O you offspring of Abraham His servant, you children of Jacob, His chosen ones,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He is the Lord our God; His judgments are in all the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He is [earnestly] mindful of His covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forever it is imprinted on His heart, the word which He commanded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established to a thousand generations,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The covenant which He made with Abraham, and His sworn promise to Isaac, [Luke 1:72, 73.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Which He confirmed to Jacob as a statute, to Israel as an everlasting covenant,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Saying, Unto you will I give the land of Canaan as your measured portion, possession, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When they were but a few men in number, in fact, very few, and were temporary residents '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strangers in it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When they went from one nation to another, from one kingdom to another people,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He allowed no man to do them wrong; in fact, He reproved kings for their sakes, [Gen. 12:17; 20:3-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Saying, Touch not My anointed, and do My prophets no harm. [I Chron. 16:8-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Moreover, He called for a famine upon the land [of Egypt]; He cut off every source of bread. [Gen. 41:54.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He sent a man before them, even Joseph, who was sold as a servant. [Gen. 45:5; 50:20, 21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' His feet they hurt with fetters; he was laid in chains of iron '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' his soul entered into the iron,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Until his word [to his cruel brothers] came true, until the word of the Lord tried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tested him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The king sent and loosed him, even the ruler of the peoples, and let him go free.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He made Joseph lord of his house and ruler of all his substance, [Gen. 41:40.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' To bind his princes at his pleasure and teach his elders wisdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Israel also came into Egypt; and Jacob sojourned in the land of Ham. [Gen. 46:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' There [the Lord] greatly increased His people and made them stronger than their oppressors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' He turned the hearts [of the Egyptians] to hate His people, to deal craftily with His servants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' He sent Moses His servant, and Aaron, whom He had chosen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' They showed His signs among them, wonders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miracles in the land of Ham (Egypt).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' He sent [thick] darkness and made the land dark, and they [God''s two servants] rebelled not against His word. [Exod. 10:22; Ps. 99:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' He turned [Egypt''s] waters into blood and caused their fish to die. [Exod. 7:20, 21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Their land brought forth frogs in abundance, even in the chambers of their kings. [Exod. 8:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' He spoke, and there came swarms of beetles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' flies and mosquitoes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lice in all their borders. [Exod. 8:17, 24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' He gave them hail for rain, with lightning like flaming fire in their land. [Exod. 9:23, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' He smote their vines also and their fig trees and broke the [ice-laden] trees of their borders. [Ps. 78:47.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' He spoke, and the locusts came, and the grasshoppers, and that without number, [Exod. 10:4, 13, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And ate up all the vegetation in their land and devoured the fruit of their ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' He smote also all the firstborn in their land, the beginning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chief substance of all their strength. [Exod. 12:29; Ps. 78:51.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' He brought [Israel] forth also with silver and gold, and there was not one feeble person among their tribes. [Exod. 12:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Egypt was glad when they departed, for the fear of them had fallen upon the people. [Exod. 12:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' The Lord spread a cloud for a covering [by day], and a fire to give light in the night. [Exod. 13:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' [The Israelites] asked, and He brought quails and satisfied them with the bread of heaven. [Exod. 16:12-15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' He opened the rock, and water gushed out; it ran in the dry places like a river. [Exod. 17:6; Num. 20:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' For He [earnestly] remembered His holy word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' promise to Abraham His servant. [Gen. 15:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And He brought forth His people with joy, and His chosen ones with gladness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' singing,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And gave them the lands of the nations [of Canaan], and they reaped the fruits of those peoples'' labor, [Deut. 6:10, 11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' That they might observe His statutes and keep His laws [hearing, receiving, loving, and obeying them]. Praise the Lord! (Hallelujah!)'
