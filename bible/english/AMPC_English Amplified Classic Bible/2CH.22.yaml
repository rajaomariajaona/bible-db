document_id: 2CH.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE PEOPLE of Jerusalem made Ahaziah, his youngest son, king in his stead, for the troop that came with the Arabs to the camp had slain all the older sons. So Ahaziah son of Jehoram king of Judah reigned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Forty-two years old was Ahaziah when he began his one-year reign in Jerusalem. His mother was Athaliah, a granddaughter of Omri. [II Kings 8:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He also walked in the ways of the house of Ahab, for his mother was his counselor to do wickedly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So he did evil in the sight of the Lord like the house of Ahab, for they were his counselors after his father''s death, to his destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He followed their counsel and even went with Joram son of Ahab king of Israel to war against Hazael king of Syria at Ramoth-gilead. And the Syrians wounded Joram; [II Kings 8:28ff.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he returned to be healed in Jezreel of the wounds given him at Ramah when he fought against Hazael king of Syria. Azariah son of Jehoram king of Judah went down to see Joram son of Ahab in Jezreel because he was sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But the destruction of Ahaziah was ordained of God in his coming to visit Joram. For when he got there he went out with Joram against Jehu son of Nimshi, whom the Lord had anointed to destroy the house of Ahab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And when Jehu was executing judgment upon the house of Ahab, he met the princes of Judah and the sons of Ahaziah''s slain brothers, who attended Ahaziah, and he slew them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And [Jehu] sought Ahaziah, who was hiding in Samaria; he was captured, brought to Jehu, and slain. They buried him, for they said, After all, he is the grandson of Jehoshaphat, who sought the Lord with all his heart. So the house of Ahaziah had no one left able to rule the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But when Athaliah mother of Ahaziah saw that her son was dead, she arose and destroyed all the royal family of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But Jehosheba, the daughter of the king, took Joash [infant] son of Ahaziah and stole him away from among the king''s sons who were to be slain, and she put him and his nurse in a bedchamber. So Jehosheba daughter of King Jehoram, sister of Ahaziah, and wife of Jehoiada the priest, hid [Joash] from [his grandmother] Athaliah, so that she did not slay him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Joash was with them hidden in the house of God six years, and Athaliah reigned over the land.'
