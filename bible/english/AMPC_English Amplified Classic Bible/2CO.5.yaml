document_id: 2CO.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' FOR WE know that if the tent which is our earthly home is destroyed (dissolved), we have from God a building, a house not made with hands, eternal in the heavens.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For we must all appear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be revealed as we are before the judgment seat of Christ, so that each one may receive [his pay] according to what he has done in the body, whether good or evil [considering what his purpose and motive have been, and what he has achieved, been busy with, and given himself and his attention to accomplishing].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Therefore, being conscious of fearing the Lord with respect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverence, we seek to win people over [to persuade them]. But what sort of persons we are is plainly recognized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoroughly understood by God, and I hope that it is plainly recognized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoroughly understood also by your consciences (your inborn discernment).'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' We are not commending ourselves to you again, but we are providing you with an occasion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' incentive to be [rightfully] proud of us, so that you may have a reply for those who pride themselves on surface appearances [on the virtues they only appear to have], although their heart is devoid of them.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For if we are beside ourselves [mad, as some say], it is for God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' concerns Him; if we are in our right mind, it is for your benefit,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For the love of Christ controls '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' urges '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' impels us, because we are of the opinion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conviction that [if] One died for all, then all died;'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And He died for all, so that all those who live might live no longer to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for themselves, but to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for Him Who died and was raised again for their sake.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Consequently, from now on we estimate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' regard no one from a [purely] human point of view [in terms of natural standards of value]. [No] even though we once did estimate Christ from a human viewpoint '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' as a man, yet now [we have such knowledge of Him that] we know Him no longer [in terms of the flesh].'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Therefore if any person is [ingrafted] in Christ (the Messiah) he is a new creation (a new creature altogether); the old [previous moral and spiritual condition] has passed away. Behold, the fresh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' new has come!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' But all things are from God, Who through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus
    - type: text
      text: ' Christ reconciled us to Himself [received us into favor, brought us into harmony with Himself] and gave to us the ministry of reconciliation [that by word and deed we might aim to bring others into harmony with Him].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' It was God [personally present] in Christ, reconciling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restoring the world to favor with Himself, not counting up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' holding against [men] their trespasses [but cancelling them], and committing to us the message of reconciliation (of the restoration to favor).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Here indeed, in this [present abode, body], we sigh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' groan inwardly, because we yearn to be clothed over [we yearn to put on our celestial body like a garment, to be fitted out] with our heavenly dwelling,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So we are Christ''s ambassadors, God making His appeal as it were through us. We [as Christ''s personal representatives] beg you for His sake to lay hold of the divine favor [now offered you] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be reconciled to God.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' For our sake He made Christ [virtually] to be sin Who knew no sin, so that in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' through Him we might become [endued with, viewed as being in, and examples of] the righteousness of God [what we ought to be, approved and acceptable and in right relationship with Him, by His goodness].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So that by putting it on we may not be found naked (without a body).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For while we are still in this tent, we groan under the burden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sigh deeply (weighed down, depressed, oppressed)–not that we want to put off the body (the clothing of the spirit), but rather that we would be further clothed, so that what is mortal (our dying body) may be swallowed up by life [after the resurrection].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Now He Who has fashioned us [preparing and making us fit] for this very thing is God, Who also has given us the [Holy] Spirit as a guarantee [of the fulfillment of His promise].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' So then, we are always full of good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hopeful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident courage; we know that while we are at home in the body, we are abroad from the home with the Lord [that is promised us].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For we walk by faith [we regulate our lives and conduct ourselves by our conviction or belief respecting man''s relationship to God and divine things, with trust and holy fervor; thus we walk] not by sight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' appearance.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' [Yes] we have confident '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hopeful courage and are pleased rather to be away from home out of the body and be at home with the Lord.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Therefore, whether we are at home [on earth away from Him] or away from home [and with Him], we are constantly ambitious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strive earnestly to be pleasing to Him.'
