document_id: LUK.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' JUST AT that time there [arrived] some people who informed Jesus about the Galileans whose blood Pilate had mixed with their sacrifices.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Now Jesus was teaching in one of the synagogues on the Sabbath.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And there was a woman there who for eighteen years had had an infirmity caused by a spirit (a demon of sickness). She was bent completely forward and utterly unable to straighten herself up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' to look upward.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And when Jesus saw her, He called [her to Him] and said to her, Woman, you are released from your infirmity!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then He laid [His] hands on her, and instantly she was made straight, and she recognized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thanked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praised God.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But the leader of the synagogue, indignant because Jesus had healed on the Sabbath, said to the crowd, There are six days on which work ought to be done; so come on those days and be cured, and not on the Sabbath day. [Exod. 20:9, 10.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But the Lord replied to him, saying, You playactors (hypocrites)! Does not each one of you on the Sabbath loose his ox or his donkey from the stall and lead it out to water it?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And ought not this woman, a daughter of Abraham, whom Satan has kept bound for eighteen years, be loosed from this bond on the Sabbath day?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Even as He said this, all His opponents were put to shame, and all the people were rejoicing over all the glorious things that were being done by Him.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' This led Him to say, What is the kingdom of God like? And to what shall I compare it?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' It is like a grain of mustard seed, which a man took and planted in his own garden; and it grew and became a tree, and the wild birds found shelter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' roosted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nested in its branches.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And He replied by saying to them, Do you think that these Galileans were greater sinners than all the other Galileans because they have suffered in this way?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And again He said, To what shall I liken the kingdom of God?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' It is like leaven which a woman took and hid in three measures of wheat flour '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' meal until it was all leavened (fermented).'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' [Jesus] journeyed on through towns and villages, teaching, and making His way toward Jerusalem.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And someone asked Him, Lord, will only a few be saved (rescued, delivered from the penalties of the last judgment, and made partakers of the salvation by Christ)? And He said to them,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Strive to enter by the narrow door [force yourselves through it], for many, I tell you, will try to enter and will not be able.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' When once the Master of the house gets up and closes the door, and you begin to stand outside and to knock at the door [again and again], saying, Lord, open to us! He will answer you, I do not know where [what household–certainly not Mine] you come from.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Then you will begin to say, We ate and drank in Your presence, and You taught in our streets.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' But He will say, I tell you, I do not know where [what household–certainly not Mine] you come from; depart from Me, all you wrongdoers!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' There will be weeping and grinding of teeth when you see Abraham and Isaac and Jacob and all the prophets in the kingdom of God, but you yourselves being cast forth (banished, driven away).'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And [people] will come from east and west, and from north and south, and sit down (feast at table) in the kingdom of God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' I tell you, No; but unless you repent (change your mind for the better and heartily amend your ways, with abhorrence of your past sins), you will all likewise perish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be lost eternally.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And behold, there are some [now] last who will be first [then], and there are some [now] first who will be last [then].'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' At that very hour some Pharisees came up and said to Him, Go away from here, for Herod is determined to kill You.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And He said to them, Go and tell that fox [sly and crafty, skulking and cowardly], Behold, I drive out demons and perform healings today and tomorrow, and on the third day I finish (complete) My course.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Nevertheless, I must continue on My way today and tomorrow and the day after that–for it will never do for a prophet to be destroyed away from Jerusalem!'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' O Jerusalem, Jerusalem, you who continue to kill the prophets and to stone those who are sent to you! How often I have desired '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' yearned to gather your children together [around Me], as a hen [gathers] her young under her wings, but you would not!'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Behold, your house is forsaken (abandoned, left to you destitute of God''s help)! And I tell you, you will not see Me again until the time comes when you shall say, Blessed (to be celebrated with praises) is He Who comes in the name of the Lord! [Ps. 118:26; Jer. 22:5.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Or those eighteen on whom the tower in Siloam fell and killed them–do you think that they were more guilty offenders (debtors) than all the others who dwelt in Jerusalem?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' I tell you, No; but unless you repent (change your mind for the better and heartily amend your ways, with abhorrence of your past sins), you will all likewise perish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be lost eternally.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And He told them this parable: A certain man had a fig tree, planted in his vineyard, and he came looking for fruit on it, but did not find [any].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' So he said to the vinedresser, See here! For these three years I have come looking for fruit on this fig tree and I find none. Cut it down! Why should it continue also to use up the ground [to deplete the soil, intercept the sun, and take up room]?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But he replied to him, Leave it alone, sir, [just] this one more year, till I dig around it and put manure [on the soil].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then perhaps it will bear fruit after this; but if not, you can cut it down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' out.'
