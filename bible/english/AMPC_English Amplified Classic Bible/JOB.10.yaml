document_id: JOB.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I AM weary of my life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loathe it! I will give free expression to my complaint; I will speak in the bitterness of my soul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I will say to God, Do not condemn me [do not make me guilty]! Show me why You contend with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Does it seem good to You that You should oppress, that You should despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject the work of Your hands, and favor the schemes of the wicked?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Have You eyes of flesh? Do You see as man sees?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Are Your days as the days of man, are Your years as man''s [years],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' That You inquire after my iniquity and search for my sin–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Although You know that I am not wicked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' guilty and that there is none who can deliver me out of Your hand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Your hands have formed me and made me. Would You turn around and destroy me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Remember [earnestly], I beseech You, that You have fashioned me as clay [out of the same earth material, exquisitely and elaborately]. And will You bring me into dust again?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Have You not poured me out like milk and curdled me like cheese?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' You have clothed me with skin and flesh and have knit me together with bones and sinews.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' You have granted me life and favor, and Your providence has preserved my spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Yet these [the present evils] have You hid in Your heart [for me since my creation]; I know that this was with You [in Your purpose and thought].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' If I sin, then You observe me, and You will not acquit me from my iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' If I am wicked, woe unto me! And if I am righteous, yet must I not lift up my head, for I am filled with disgrace and the sight of my affliction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' If I lift myself up, You hunt me like a lion and again show Yourself [inflicting] marvelous [trials] upon me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You renew Your witnesses against me and increase Your indignation toward me; I am as if attacked by a troop time after time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Why then did You bring me forth out of the womb? Would that I had perished and no eye had seen me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' I should have been as though I had not existed; I should have been carried from the womb to the grave.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Are not my days few? Cease then and let me alone, that I may take a little comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cheer up'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Before I go whence I shall not return, even to the land of darkness and the shadow of death,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The land of sunless gloom as intense darkness, [the land] of the shadow of death, without any order, and where the light is as thick darkness.'
