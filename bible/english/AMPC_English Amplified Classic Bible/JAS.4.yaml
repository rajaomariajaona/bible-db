document_id: JAS.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHAT LEADS to strife (discord and feuds) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' how do conflicts (quarrels and fightings) originate among you? Do they not arise from your sensual desires that are ever warring in your bodily members?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Humble yourselves [feeling very insignificant] in the presence of the Lord, and He will exalt you [He will lift you up and make your lives significant].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' [My] brethren, do not speak evil about or accuse one another. He that maligns a brother or judges his brother is maligning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' criticizing the Law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judging the Law. But if you judge the Law, you are not a practicer of the Law but a censor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judge [of it].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' One only is the Lawgiver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Judge Who is able to save and to destroy [the One Who has the absolute power of life and death]. [But you] who are you that [you presume to] pass judgment on your neighbor?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Come now, you who say, Today or tomorrow we will go into such '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' such a city and spend a year there and carry on our business and make money.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Yet you do not know [the least thing] about what may happen tomorrow. What is the nature of your life? You are [really] but a wisp of vapor (a puff of smoke, a mist) that is visible for a little while and then disappears [into thin air].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' You ought instead to say, If the Lord is willing, we shall live and we shall do this or that [thing].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But as it is, you boast [falsely] in your presumption '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your self-conceit. All such boasting is wrong.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So any person who knows what is right to do but does not do it, to him it is sin.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' You are jealous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' covet [what others have] and your desires go unfulfilled; [so] you become murderers. [To hate is to murder as far as your hearts are concerned.] You burn with envy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anger and are not able to obtain [the gratification, the contentment, and the happiness that you seek], so you fight and war. You do not have, because you do not ask. [I John 3:15.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' [Or] you do ask [God for them] and yet fail to receive, because you ask with wrong purpose and evil, selfish motives. Your intention is [when you get what you desire] to spend it in sensual pleasures.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' You [are like] unfaithful wives [having illicit love affairs with the world and breaking your marriage vow to God]! Do you not know that being the world''s friend is being God''s enemy? So whoever chooses to be a friend of the world takes his stand as an enemy of God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Or do you suppose that the Scripture is speaking to no purpose that says, The Spirit Whom He has caused to dwell in us yearns over us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He yearns for the Spirit [to be welcome] with a jealous love? [Jer. 3:14; Hos. 2:19ff.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But He gives us more and more grace (power of the Holy Spirit, to meet this evil tendency and all others fully). That is why He says, God sets Himself against the proud and haughty, but gives grace [continually] to the lowly (those who are humble enough to receive it). [Prov. 3:34.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' So be subject to God. Resist the devil [stand firm against him], and he will flee from you.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Come close to God and He will come close to you. [Recognize that you are] sinners, get your soiled hands clean; [realize that you have been disloyal] wavering individuals with divided interests, and purify your hearts [of your spiritual adultery].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' [As you draw near to God] be deeply penitent and grieve, even weep [over your disloyalty]. Let your laughter be turned to grief and your mirth to dejection '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heartfelt shame [for your sins].'
