document_id: JAS.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHAT LEADS to strife (discord and feuds) '
  - type: text
    content: and
  - type: text
    content: ' how do conflicts (quarrels and fightings) originate among you? Do they not arise from your sensual desires that are ever warring in your bodily members?'
  '10':
  - type: text
    content: ' Humble yourselves [feeling very insignificant] in the presence of the Lord, and He will exalt you [He will lift you up and make your lives significant].'
  '11':
  - type: text
    content: ' [My] brethren, do not speak evil about or accuse one another. He that maligns a brother or judges his brother is maligning '
  - type: text
    content: and
  - type: text
    content: ' criticizing the Law '
  - type: text
    content: and
  - type: text
    content: ' judging the Law. But if you judge the Law, you are not a practicer of the Law but a censor '
  - type: text
    content: and
  - type: text
    content: ' judge [of it].'
  '12':
  - type: text
    content: ' One only is the Lawgiver '
  - type: text
    content: and
  - type: text
    content: ' Judge Who is able to save and to destroy [the One Who has the absolute power of life and death]. [But you] who are you that [you presume to] pass judgment on your neighbor?'
  '13':
  - type: text
    content: ' Come now, you who say, Today or tomorrow we will go into such '
  - type: text
    content: and
  - type: text
    content: ' such a city and spend a year there and carry on our business and make money.'
  '14':
  - type: text
    content: ' Yet you do not know [the least thing] about what may happen tomorrow. What is the nature of your life? You are [really] but a wisp of vapor (a puff of smoke, a mist) that is visible for a little while and then disappears [into thin air].'
  '15':
  - type: text
    content: ' You ought instead to say, If the Lord is willing, we shall live and we shall do this or that [thing].'
  '16':
  - type: text
    content: ' But as it is, you boast [falsely] in your presumption '
  - type: text
    content: and
  - type: text
    content: ' your self-conceit. All such boasting is wrong.'
  '17':
  - type: text
    content: ' So any person who knows what is right to do but does not do it, to him it is sin.'
  '2':
  - type: text
    content: ' You are jealous '
  - type: text
    content: and
  - type: text
    content: ' covet [what others have] and your desires go unfulfilled; [so] you become murderers. [To hate is to murder as far as your hearts are concerned.] You burn with envy '
  - type: text
    content: and
  - type: text
    content: ' anger and are not able to obtain [the gratification, the contentment, and the happiness that you seek], so you fight and war. You do not have, because you do not ask. [I John 3:15.]'
  '3':
  - type: text
    content: ' [Or] you do ask [God for them] and yet fail to receive, because you ask with wrong purpose and evil, selfish motives. Your intention is [when you get what you desire] to spend it in sensual pleasures.'
  '4':
  - type: text
    content: ' You [are like] unfaithful wives [having illicit love affairs with the world and breaking your marriage vow to God]! Do you not know that being the world''s friend is being God''s enemy? So whoever chooses to be a friend of the world takes his stand as an enemy of God.'
  '5':
  - type: text
    content: ' Or do you suppose that the Scripture is speaking to no purpose that says, The Spirit Whom He has caused to dwell in us yearns over us '
  - type: text
    content: and
  - type: text
    content: ' He yearns for the Spirit [to be welcome] with a jealous love? [Jer. 3:14; Hos. 2:19ff.]'
  '6':
  - type: text
    content: ' But He gives us more and more grace (power of the Holy Spirit, to meet this evil tendency and all others fully). That is why He says, God sets Himself against the proud and haughty, but gives grace [continually] to the lowly (those who are humble enough to receive it). [Prov. 3:34.]'
  '7':
  - type: text
    content: ' So be subject to God. Resist the devil [stand firm against him], and he will flee from you.'
  '8':
  - type: text
    content: ' Come close to God and He will come close to you. [Recognize that you are] sinners, get your soiled hands clean; [realize that you have been disloyal] wavering individuals with divided interests, and purify your hearts [of your spiritual adultery].'
  '9':
  - type: text
    content: ' [As you draw near to God] be deeply penitent and grieve, even weep [over your disloyalty]. Let your laughter be turned to grief and your mirth to dejection '
  - type: text
    content: and
  - type: text
    content: ' heartfelt shame [for your sins].'
