document_id: 2SA.17,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MOREOVER, AHITHOPHEL said to Absalom, Let me choose 12,000 men and I will set out and pursue David this night.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And even he who is brave, whose heart is as the heart of a lion, will utterly melt, for all Israel knows that your father is a mighty man and that those who are with him are brave men.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Therefore I counsel that all [the men of] Israel be gathered to you, from Dan even to Beersheba, as the sand that is by the sea for multitude, and that you go to battle in your own person.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So shall we come upon [David] some place where he shall be found, and we will light upon him as the dew settles [unseen and unheard] on the ground; and of him and of all the men with him there shall not be left so much as one.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' If he withdraws into a city, then shall all Israel bring ropes to that city, and we will drag it into the ravine until not one pebble is left there.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Absalom and all the men of Israel said, The counsel of Hushai the Archite is better than that of Ahithophel. For the Lord had ordained to defeat the good counsel of Ahithophel, so that the Lord might bring evil upon Absalom.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Then said Hushai to Zadok and Abiathar the priests, Thus and thus did Ahithophel counsel Absalom and the elders of Israel, and thus and thus have I counseled.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Now send quickly and tell David, Lodge not this night at the fords [at the Jordan] of the wilderness, but by all means pass over, lest the king be swallowed up and all the people with him.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Now [the youths] Jonathan and Ahimaaz stayed at En-rogel, for they must not be seen coming into the city. But a maidservant went and told them, and they went and told King David.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' But a lad saw them and told Absalom; but they left quickly and came to the house of a man in Bahurim, who had a well in his court, and they went down into it.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And the woman spread a covering over the well''s mouth and spread ground corn on it; and the thing was not discovered.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I will come upon him while he is exhausted and weak, and cause him to panic; all the people with him will flee. Then I will strike down the king alone.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' For when Absalom''s servants came to the woman at the house, they said, Where are Ahimaaz and Jonathan? And the woman said to them, They went over the brook of water. When they had sought and could not find them, they returned to Jerusalem.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' After they had departed, the boys came up out of the well and went and told King David, and said, Arise and pass quickly over the river Jordan; for thus and so has Ahithophel counseled against you.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' David arose and all the people with him and passed over the Jordan. By daybreak, not one was left who had not crossed.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' But when Ahithophel saw that his counsel was not followed, he saddled his donkey, went home to his city, put his household in order, and hanged himself and died, and was buried in the tomb of his father.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Then David came to Mahanaim. And Absalom passed over the Jordan, he and all the men of Israel with him.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Absalom made Amasa captain of the army instead of Joab. Amasa was the son of an [Ishmaelite] named Ithra, who married Abigail daughter of Nahash, [half sister of David and] sister of Zeruiah, Joab''s mother.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' So Israel and Absalom encamped in the land of Gilead.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' When David came to Mahanaim, Shobi son of Nahash of Rabbah of the Ammonites, and Machir son of Ammiel of Lo-debar, and Barzillai the Gileadite of Rogelim'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Brought beds, basins, earthen vessels, wheat, barley, meal, parched grain, beans, lentils, parched [pulse–seeds of peas and beans],'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Honey, curds, sheep, and cheese of cows for David and the people with him to eat; for they said, The people are hungry, weary, and thirsty in the wilderness.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' I will bring back all the people to you. [The removal of] the man whom you seek is the assurance that all will return; and all the people will be at peace.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And what he said pleased Absalom well and all the elders of Israel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Absalom said, Now call Hushai the Archite also, and let us hear what he says.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' When Hushai came, Absalom said to him, Ahithophel has counseled thus. Shall we do what he says? If not, speak up.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And Hushai said to Absalom, The counsel that Ahithophel has given is not good at this time.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' For, said Hushai, you know your father and his men, that they are mighty men, and they are embittered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enraged like a bear robbed of her whelps in the field. And your father is a man of war, and will not lodge with the people.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Behold, he is hidden even now in some pit or other place; and when some of them are overthrown at the first, whoever hears it will say, There is a slaughter among the followers of Absalom.'
