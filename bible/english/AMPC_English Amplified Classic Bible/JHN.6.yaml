document_id: JHN.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THIS, Jesus went to the farther side of the Sea of Galilee–that is, the Sea of Tiberias.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And a great crowd was following Him because they had seen the signs (miracles) which He [continually] performed upon those who were sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Jesus walked up the mountainside and sat down there with His disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Now the Passover, the feast of the Jews, was approaching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Jesus looked up then, and seeing that a vast multitude was coming toward Him, He said to Philip, Where are we to buy bread, so that all these people may eat?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But He said this to prove (test) him, for He well knew what He was about to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Philip answered Him, Two hundred pennies'' (forty dollars) worth of bread is not enough that everyone may receive even a little.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Another of His disciples, Andrew, Simon Peter''s brother, said to Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' There is a little boy here, who has [with him] five barley loaves, and two small fish; but what are they among so many people?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Jesus said, Make all the people recline (sit down). Now the ground (a pasture) was covered with thick grass at the spot, so the men threw themselves down, about 5,000 in number.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Jesus took the loaves, and when He had given thanks, He distributed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to the disciples and the disciples
  - type: text
    text: ' to the reclining people; so also [He did] with the fish, as much as they wanted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When they had all had enough, He said to His disciples, Gather up now the fragments (the broken pieces that are left over), so that nothing may be lost '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wasted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So accordingly they gathered them up, and they filled twelve [small hand] baskets with fragments left over by those who had eaten from the five barley loaves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When the people saw the sign (miracle) that Jesus had performed, they began saying, Surely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beyond a doubt this is the Prophet Who is to come into the world! [Deut. 18:15, 18; John 1:21; Acts 3:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then Jesus, knowing that they meant to come and seize Him that they might make Him king, withdrew again to the hillside by Himself alone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When evening came, His disciples went down to the sea,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And they took a boat and were going across the sea to Capernaum. It was now dark, and still Jesus had not [yet] come back to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Meanwhile, the sea was getting rough '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rising high because of a great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violent wind that was blowing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [However] when they had rowed three or four miles, they saw Jesus walking on the sea and approaching the boat. And they were afraid (terrified).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But Jesus said to them, It is I; be not afraid! [I AM; stop being frightened!] [Exod. 3:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then they were quite willing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glad for Him to come into the boat. And now the boat went at once to the land they had steered toward. [And immediately they reached the shore toward which they had been slowly making their way.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The next day the crowd [that still remained] standing on the other side of the sea realized that there had been only one small boat there, and that Jesus had not gone into it with His disciples, but that His disciples had gone away by themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But now some other boats from Tiberias had come in near the place where they ate the bread after the Lord had given thanks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So the people, finding that neither Jesus nor His disciples were there, themselves got into the small boats and came to Capernaum looking for Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And when they found Him on the other side of the lake, they said to Him, Rabbi! When did You come here?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Jesus answered them, I assure you, most solemnly I tell you, you have been searching for Me, not because you saw the miracles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' signs but because you were fed with the loaves and were filled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satisfied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Stop toiling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' producing for the food that perishes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' decomposes [in the using], but strive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' work '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' produce rather for the [lasting] food which endures [continually] unto life eternal; the Son of Man will give (furnish) you that, for God the Father has authorized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' certified Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put His seal of endorsement upon Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' They then said, What are we to do, that we may [habitually] be working the works of God? [What are we to do to carry out what God requires?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Jesus replied, This is the work (service) that God asks of you: that you believe in the One Whom He has sent [that you cleave to, trust, rely on, and have faith in His Messenger].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Therefore they said to Him, What sign (miracle, wonderwork) will You perform then, so that we may see it and believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adhere to You? What [supernatural] work have You [to show what You can do]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Our forefathers ate the manna in the wilderness; as the Scripture says, He gave them bread out of heaven to eat. [Exod. 16:15; Neh. 9:15; Ps. 78:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Jesus then said to them, I assure you, most solemnly I tell you, Moses did not give you the Bread from heaven [what Moses gave you was not the Bread from heaven], but it is My Father Who gives you the true heavenly Bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' For the Bread of God is He Who comes down out of heaven and gives life to the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Then they said to Him, Lord, give us this bread always (all the time)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Jesus replied, I am the Bread of Life. He who comes to Me will never be hungry, and he who believes in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cleaves to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusts in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on Me will never thirst any more (at any time).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' But [as] I told you, although you have seen Me, still you do not believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have faith.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' All whom My Father gives (entrusts) to Me will come to Me; and the one who comes to Me I will most certainly not cast out [I will never, no never, reject one of them who comes to Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' For I have come down from heaven not to do My own will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose but to do the will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose of Him Who sent Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And this is the will of Him Who sent Me, that I should not lose any of all that He has given Me, but that I should give new life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' raise [them all] up at the last day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' For this is My Father''s will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His purpose, that everyone who sees the Son and believes in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cleaves to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusts in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on Him should have eternal life, and I will raise him up [from the dead] at the last day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Now the Jews murmured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' found fault with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grumbled about Jesus because He said, I am [Myself] the Bread that came down from heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' They kept asking, Is not this Jesus, the Son of Joseph, Whose father and mother we know? How then can He say, I have come down from heaven?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' So Jesus answered them, Stop grumbling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' saying things against Me to one another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' No one is able to come to Me unless the Father Who sent Me attracts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' draws him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gives him the desire to come to Me, and [then] I will raise him up [from the dead] at the last day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' It is written in [the book of] the Prophets, And they shall all be taught of God [have Him in person for their Teacher]. Everyone who has listened to and learned from the Father comes to Me–[Isa. 54:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Which does not imply that anyone has seen the Father [not that anyone has ever seen Him] except He [Who was with the Father] Who comes from God; He [alone] has seen the Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' I assure you, most solemnly I tell you, he who believes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in Me
  - type: text
    text: ' [who adheres to, trusts in, relies on, and has faith in Me] has (now possesses) eternal life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' I am the Bread of Life [that gives life–the Living Bread].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' Your forefathers ate the manna in the wilderness, and [yet] they died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' [But] this is the Bread that comes down from heaven, so that [any]one may eat of it and never die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' I [Myself] am this Living Bread that came down from heaven. If anyone eats of this Bread, he will live forever; and also the Bread that I shall give for the life of the world is My flesh (body).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' Then the Jews angrily contended with one another, saying, How is He able to give us His flesh to eat?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' And Jesus said to them, I assure you, most solemnly I tell you, you cannot have any life in you unless you eat the flesh of the Son of Man and drink His blood [unless you appropriate His life and the saving merit of His blood].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' He who feeds on My flesh and drinks My blood has (possesses now) eternal life, and I will raise him up [from the dead] on the last day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' For My flesh is true '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' genuine food, and My blood is true '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' genuine drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' He who feeds on My flesh and drinks My blood dwells continually in Me, and I [in like manner dwell continually] in him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' Just as the living Father sent Me and I live by (through, because of) the Father, even so whoever continues to feed on Me [whoever takes Me for his food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is nourished by Me] shall [in his turn] live through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' because of Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' This is the Bread that came down from heaven. It is not like the manna which our forefathers ate, and yet died; he who takes this Bread for his food shall live forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: ' He said these things in a synagogue while He was teaching at Capernaum.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: ' When His disciples heard this, many of them said, This is a hard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' difficult '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strange saying (an offensive and unbearable message). Who can stand to hear it? [Who can be expected to listen to such teaching?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ' But Jesus, knowing within Himself that His disciples were complaining '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protesting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grumbling about it, said to them: Is this a stumbling block '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an offense to you? [Does this upset and displease and shock and scandalize you?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: ' What then [will be your reaction] if you should see the Son of Man ascending to [the place] where He was before?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: ' It is the Spirit Who gives life [He is the Life-giver]; the flesh conveys no benefit whatever [there is no profit in it]. The words (truths) that I have been speaking to you are spirit and life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: ' But [still] some of you fail to believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have faith. For Jesus knew from the first who did not believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' had no faith and who would betray Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be false to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: ' And He said, This is why I told you that no one can come to Me unless it is granted him [unless he is enabled to do so] by the Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: ' After this, many of His disciples drew back (returned to their old associations) and no longer accompanied Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: ' Jesus said to the Twelve, Will you also go away? [And do you too desire to leave Me?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: ' Simon Peter answered, Lord, to whom shall we go? You have the words (the message) of eternal life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: ' And we have learned to believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust, and [more] we have come to know [surely] that You are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Holy One of God
  - type: text
    text: ', the Christ (the Anointed One), the Son of the living God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: ' Jesus answered them, Did I not choose you, the Twelve? And [yet] one of you is a devil (of the evil one and a false accuser).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: ' He was speaking of Judas, the son of Simon Iscariot, for he was about to betray Him, [although] he was one of the Twelve.'
