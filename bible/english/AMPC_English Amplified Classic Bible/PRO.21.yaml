document_id: PRO.21,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE KING''S heart is in the hand of the Lord, as are the watercourses; He turns it whichever way He wills.'
  '10':
  - type: text
    content: ' The soul '
  - type: text
    content: or
  - type: text
    content: ' life of the wicked craves '
  - type: text
    content: and
  - type: text
    content: ' seeks evil; his neighbor finds no favor in his eyes. [James 2:16.]'
  '11':
  - type: text
    content: ' When the scoffer is punished, the fool gets a lesson in being wise; but men of [godly] Wisdom '
  - type: text
    content: and
  - type: text
    content: ' good sense learn by being instructed.'
  '12':
  - type: text
    content: ' The [uncompromisingly] righteous man considers well the house of the wicked–how the wicked are cast down to ruin.'
  '13':
  - type: text
    content: ' Whoever stops his ears at the cry of the poor will cry out himself and not be heard. [Matt. 18:30-34; James 2:13.]'
  '14':
  - type: text
    content: ' A gift in secret pacifies '
  - type: text
    content: and
  - type: text
    content: ' turns away anger, and a bribe in the lap, strong wrath.'
  '15':
  - type: text
    content: ' When justice is done, it is a joy to the righteous (the upright, in right standing with God), but to the evildoers it is dismay, calamity, '
  - type: text
    content: and
  - type: text
    content: ' ruin.'
  '16':
  - type: text
    content: ' A man who wanders out of the way of understanding shall abide in the congregation of the spirits (of the dead).'
  '17':
  - type: text
    content: ' He who loves pleasure will be a poor man; he who loves wine and oil will not be rich.'
  '18':
  - type: text
    content: ' The wicked become a ransom for the [uncompromisingly] righteous, and the treacherous for the upright [because the wicked themselves fall into the traps and pits they have dug for the good].'
  '19':
  - type: text
    content: ' It is better to dwell in a desert land than with a contentious woman and with vexation.'
  '2':
  - type: text
    content: ' Every way of a man is right in his own eyes, but the Lord weighs '
  - type: text
    content: and
  - type: text
    content: ' tries the hearts. [Prov. 24:12; Luke 16:15.]'
  '20':
  - type: text
    content: ' There are precious treasures and oil in the dwelling of the wise, but a self-confident '
  - type: text
    content: and
  - type: text
    content: ' foolish man swallows it up '
  - type: text
    content: and
  - type: text
    content: ' wastes it.'
  '21':
  - type: text
    content: ' He who earnestly seeks after '
  - type: text
    content: and
  - type: text
    content: ' craves righteousness, mercy, '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness will find life in addition to righteousness (uprightness and right standing with God) and honor. [Prov. 15:9; Matt. 5:6.]'
  '22':
  - type: text
    content: ' A wise man scales the city walls of the mighty and brings down the stronghold in which they trust.'
  '23':
  - type: text
    content: ' He who guards his mouth and his tongue keeps himself from troubles. [Prov. 12:13; 13:3; 18:21; James 3:2.]'
  '24':
  - type: text
    content: ' The proud '
  - type: text
    content: and
  - type: text
    content: ' haughty man–Scoffer is his name–deals '
  - type: text
    content: and
  - type: text
    content: ' acts with overbearing pride.'
  '25':
  - type: text
    content: ' The desire of the slothful kills him, for his hands refuse to labor.'
  '26':
  - type: text
    content: ' He covets greedily all the day long, but the [uncompromisingly] righteous gives and does not withhold. [II Cor. 9:6-10.]'
  '27':
  - type: text
    content: ' The sacrifice of the wicked is exceedingly disgusting '
  - type: text
    content: and
  - type: text
    content: ' abhorrent [to the Lord]–how much more when he brings it with evil intention?'
  '28':
  - type: text
    content: ' A false witness will perish, but the word of a man who hears attentively will endure '
  - type: text
    content: and
  - type: text
    content: ' go unchallenged.'
  '29':
  - type: text
    content: ' A wicked man puts on the bold, unfeeling face [of guilt], but as for the upright, he considers, directs, '
  - type: text
    content: and
  - type: text
    content: ' establishes his way [with the confidence of integrity].'
  '3':
  - type: text
    content: ' To do righteousness and justice is more acceptable to the Lord than sacrifice. [I Sam. 15:22; Prov. 15:8; Isa. 1:11; Hos. 6:6; Mic. 6:7, 8.]'
  '30':
  - type: text
    content: ' There is no [human] wisdom or understanding or counsel [that can prevail] against the Lord.'
  '31':
  - type: text
    content: ' The horse is prepared for the day of battle, but deliverance '
  - type: text
    content: and
  - type: text
    content: ' victory are of the Lord.'
  '4':
  - type: text
    content: ' Haughtiness of eyes and a proud heart, even the tillage of the wicked '
  - type: text
    content: or
  - type: text
    content: ' the lamp [of joy] to them [whatever it may be], are sin [in the eyes of God].'
  '5':
  - type: text
    content: ' The thoughts of the [steadily] diligent tend only to plenteousness, but everyone who is impatient '
  - type: text
    content: and
  - type: text
    content: ' hasty hastens only to want.'
  '6':
  - type: text
    content: ' Securing treasures by a lying tongue is a vapor driven to and fro; those who seek them seek death.'
  '7':
  - type: text
    content: ' The violence of the wicked shall sweep them away, because they refuse to do justice.'
  '8':
  - type: text
    content: ' The way of the guilty is exceedingly crooked, but as for the pure, his work is right '
  - type: text
    content: and
  - type: text
    content: ' his conduct is straight.'
  '9':
  - type: text
    content: ' It is better to dwell in a corner of the housetop [on the flat oriental roof, exposed to all kinds of weather] than in a house shared with a nagging, quarrelsome, '
  - type: text
    content: and
  - type: text
    content: ' faultfinding woman.'
