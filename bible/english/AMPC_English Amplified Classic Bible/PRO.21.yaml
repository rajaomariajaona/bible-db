document_id: PRO.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE KING''S heart is in the hand of the Lord, as are the watercourses; He turns it whichever way He wills.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Every way of a man is right in his own eyes, but the Lord weighs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tries the hearts. [Prov. 24:12; Luke 16:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' To do righteousness and justice is more acceptable to the Lord than sacrifice. [I Sam. 15:22; Prov. 15:8; Isa. 1:11; Hos. 6:6; Mic. 6:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Haughtiness of eyes and a proud heart, even the tillage of the wicked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the lamp [of joy] to them [whatever it may be], are sin [in the eyes of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The thoughts of the [steadily] diligent tend only to plenteousness, but everyone who is impatient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hasty hastens only to want.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Securing treasures by a lying tongue is a vapor driven to and fro; those who seek them seek death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The violence of the wicked shall sweep them away, because they refuse to do justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The way of the guilty is exceedingly crooked, but as for the pure, his work is right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' his conduct is straight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' It is better to dwell in a corner of the housetop [on the flat oriental roof, exposed to all kinds of weather] than in a house shared with a nagging, quarrelsome, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faultfinding woman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The soul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' life of the wicked craves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seeks evil; his neighbor finds no favor in his eyes. [James 2:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When the scoffer is punished, the fool gets a lesson in being wise; but men of [godly] Wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good sense learn by being instructed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The [uncompromisingly] righteous man considers well the house of the wicked–how the wicked are cast down to ruin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Whoever stops his ears at the cry of the poor will cry out himself and not be heard. [Matt. 18:30-34; James 2:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' A gift in secret pacifies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turns away anger, and a bribe in the lap, strong wrath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When justice is done, it is a joy to the righteous (the upright, in right standing with God), but to the evildoers it is dismay, calamity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' A man who wanders out of the way of understanding shall abide in the congregation of the spirits (of the dead).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He who loves pleasure will be a poor man; he who loves wine and oil will not be rich.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The wicked become a ransom for the [uncompromisingly] righteous, and the treacherous for the upright [because the wicked themselves fall into the traps and pits they have dug for the good].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' It is better to dwell in a desert land than with a contentious woman and with vexation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' There are precious treasures and oil in the dwelling of the wise, but a self-confident '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foolish man swallows it up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wastes it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He who earnestly seeks after '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' craves righteousness, mercy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness will find life in addition to righteousness (uprightness and right standing with God) and honor. [Prov. 15:9; Matt. 5:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' A wise man scales the city walls of the mighty and brings down the stronghold in which they trust.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He who guards his mouth and his tongue keeps himself from troubles. [Prov. 12:13; 13:3; 18:21; James 3:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' haughty man–Scoffer is his name–deals '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acts with overbearing pride.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The desire of the slothful kills him, for his hands refuse to labor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' He covets greedily all the day long, but the [uncompromisingly] righteous gives and does not withhold. [II Cor. 9:6-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The sacrifice of the wicked is exceedingly disgusting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abhorrent [to the Lord]–how much more when he brings it with evil intention?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' A false witness will perish, but the word of a man who hears attentively will endure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' go unchallenged.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' A wicked man puts on the bold, unfeeling face [of guilt], but as for the upright, he considers, directs, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establishes his way [with the confidence of integrity].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' There is no [human] wisdom or understanding or counsel [that can prevail] against the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The horse is prepared for the day of battle, but deliverance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' victory are of the Lord.'
