document_id: NEH.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN THE month of Nisan in the twentieth year of King Artaxerxes, when wine was before him, I took up the wine and gave it to the king. Now I had not been sad before in his presence.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' When Sanballat the Horonite and Tobiah the servant, the Ammonite, heard this, it distressed them exceedingly that a man had come to inquire for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require the good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosperity of the Israelites.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' So I came to Jerusalem and had been there three days.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then I arose in the night, I and a few men with me. And I told no one what my God had put in my heart to do for Jerusalem. No beast was with me except the one I rode.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' I went out by night by the Valley Gate toward the Dragon''s Well and to the Dung Gate and inspected the walls of Jerusalem, which were broken down, and its gates, which had been destroyed by fire.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I passed over to the Fountain Gate and to the King''s Pool, but there was no place for the beast that was under me to pass.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' So [gradually] I went up by the brook [Kidron] in the night and inspected the wall; then I turned back and entered [the city] by the Valley Gate, and so returned.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And the magistrates knew not where I went or what I did; nor had I yet told the Jews, the priests, the nobles, the officials, or the rest who did the work.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Then I said to them, You see the bad situation we are in–how Jerusalem lies in ruins, and its gates are burned with fire. Come, let us build up the wall of Jerusalem, that we may no longer be a disgrace.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Then I told them of the hand of my God which was upon me for good, and also the words that the king had spoken to me. And they said, Let us rise up and build! So they strengthened their hands for the good work.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But when Sanballat the Horonite and Tobiah the servant, the Ammonite, and Geshem the Arab heard of it, they laughed us to scorn and despised us and said, What is this thing you are doing? Will you rebel against the king?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' So the king said to me, Why do you look sad, since you are not sick? This is nothing but sorrow of heart. Then I was very much afraid'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' I answered them, The God of heaven will prosper us; therefore we His servants will arise and build, but you have no portion or right or memorial in Jerusalem.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And said to the king, Let the king live forever! Why should I not be sad faced when the city, the place of my fathers'' sepulchers, lies waste, and its [fortified] gates are consumed by fire?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' The king said to me, For what do you ask? So I prayed to the God of heaven.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And I said to [him], If it pleases the king and if your servant has found favor in your sight, I ask that you will send me to Judah, to the city of my fathers'' sepulchers, that I may rebuild it.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' The king, beside whom the queen was sitting, asked me, How long will your journey take, and when will you return? So it pleased [him] to send me; and I set him a time.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Also I said to the king, If it pleases the king, let letters be given me for the governors beyond the [Euphrates] River, that they may let me pass through to Judah,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And a letter to Asaph, keeper of the king''s forest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' park, that he may give me timber to make beams for the gates of the fortress of the temple and for the city wall and for the house that I shall occupy. And the king granted what I asked, for the good hand of my God was upon me.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then I came to the governors beyond the River and gave them the king''s letters. Now the king had sent captains of the army and horsemen with me.'
