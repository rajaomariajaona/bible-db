document_id: JON.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JONAH prayed to the Lord his God from the fish''s belly,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And said, I cried out of my distress to the Lord, and He heard me; out of the belly of Sheol cried I, and You heard my voice. [Ps. 120:1; 130:1; 142:1; Lam. 3:55-58.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For You cast me into the deep, into the heart of the seas, and the floods surrounded me; all Your waves and Your billows passed over me. [Ps. 42:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then I said, I have been cast out of Your presence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your sight; yet I will look again toward Your holy temple. [Ps. 31:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The waters compassed me about, even to [the extinction of] life; the abyss surrounded me, the seaweed was wrapped about my head. [Ps. 69:1; Lam. 3:54.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I went down to the bottoms '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the very roots of the mountains; the earth with its bars closed behind me forever. Yet You have brought up my life from the pit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' corruption, O Lord my God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' When my soul fainted upon me [crushing me], I earnestly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seriously remembered the Lord; and my prayer came to You, into Your holy temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Those who pay regard to false, useless, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthless idols forsake their own [Source of] mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But as for me, I will sacrifice to You with the voice of thanksgiving; I will pay that which I have vowed. Salvation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliverance belong to the Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the Lord spoke to the fish, and it vomited out Jonah upon the dry land.'
