document_id: 1PE.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' SO, SINCE Christ suffered in the flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for us, for you
    - type: text
      text: ', arm yourselves with the same thought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose [patiently to suffer rather than fail to please God]. For whoever has suffered in the flesh [having the mind of Christ] is done with [intentional] sin [has stopped pleasing himself and the world, and pleases God],'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As each of you has received a gift (a particular spiritual talent, a gracious divine endowment), employ it for one another as [befits] good trustees of God''s many-sided grace [faithful stewards of the extremely diverse powers and gifts granted to Christians by unmerited favor].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Whoever speaks, [let him do it as one who utters] oracles of God; whoever renders service, [let him do it] as with the strength which God furnishes abundantly, so that in all things God may be glorified through Jesus Christ (the Messiah). To Him be the glory and dominion forever and ever (through endless ages). Amen (so be it).'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Beloved, do not be amazed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bewildered at the fiery ordeal which is taking place to test your quality, as though something strange (unusual and alien to you and your position) were befalling you.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But insofar as you are sharing Christ''s sufferings, rejoice, so that when His glory [full of radiance and splendor] is revealed, you may also rejoice with triumph [exultantly].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If you are censured '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffer abuse [because you bear] the name of Christ, blessed [are you–happy, fortunate, to be envied, with life-joy, and satisfaction in God''s favor and salvation, regardless of your outward condition], because the Spirit of glory, the Spirit of God, is resting upon you. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: On their part He is blasphemed, but on your part He is glorified.
    - type: text
      text: ' [Isa. 11:2.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But let none of you suffer as a murderer or a thief or any sort of criminal, or as a mischief-maker (a meddler) in the affairs of others [infringing on their rights].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if [one is ill-treated and suffers] as a Christian [which he is contemptuously called], let him not be ashamed, but give glory to God that he is [deemed worthy to suffer] in this name.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the time [has arrived] for judgment to begin with the household of God; and if it begins with us, what will [be] the end of those who do not respect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' believe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' obey the good news (the Gospel) of God?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if the righteous are barely saved, what will become of the godless and wicked? [Prov. 11:31.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore, those who are ill-treated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffer in accordance with God''s will must do right and commit their souls [in charge as a deposit] to the One Who created [them] and will never fail [them].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So that he can no longer spend the rest of his natural life living by [his] human appetites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desires, but [he lives] for what God wills.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the time that is past already suffices for doing what the Gentiles like to do–living [as you have done] in shameless, insolent wantonness, in lustful desires, drunkenness, reveling, drinking bouts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abominable, lawless idolatries.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They are astonished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' think it very queer that you do not now run hand in hand with them in the same excesses of dissipation, and they abuse [you].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But they will have to give an account to Him Who is ready to judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pass sentence on the living and the dead.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this is why the good news (the Gospel) was preached [in their lifetime] even to the dead, that though judged in fleshly bodies as men are, they might live in the spirit as God does.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the end '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' culmination of all things has now come near; keep sound minded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-restrained and alert therefore for [the practice of] prayer.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Above all things have intense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unfailing love for one another, for love covers a multitude of sins [forgives and disregards the offenses of others]. [Prov. 10:12.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Practice hospitality to one another (those of the household of faith). [Be hospitable, be a lover of strangers, with brotherly affection for the unknown guests, the foreigners, the poor, and all others who come your way who are of Christ''s body.] And [in each instance] do it ungrudgingly (cordially and graciously, without complaining but as representing Him).'
