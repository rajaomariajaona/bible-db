document_id: ISA.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE MOURNFUL, inspired prediction (a burden to be lifted up) concerning Moab: Because in a night Ar of Moab is laid waste and brought to silence! Because in a night Kir of Moab is laid waste and brought to silence!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' They are gone up to Bayith and to Dibon, to the high places to weep. Moab wails over Nebo and over Medeba; on all their heads is baldness, and every beard is cut off [as a sign of deep sorrow and humiliation]. [Jer. 48:37.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' In their streets they gird themselves with sackcloth; on the tops of their houses and in their broad places everyone wails, weeping abundantly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Heshbon and Elealeh [cities in possession of Moab] cry out; their voice is heard even to Jahaz. Therefore the armed soldiers of Moab cry out; [Moab''s] life is grievous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trembles within him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' My heart cries out for Moab; his nobles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' other fugitives flee to Zoar, to Eglath-shelishiyah [like a heifer three years old]. For with weeping they go up the ascent of Luhith; for on the road to Horonaim they raise a cry of destruction. [Jer. 48:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For the waters of Nimrim are desolations, for the grass is withered away and the new growth fails; there is no green thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore the abundance [of possessions] they have acquired and stored away they [now] carry over the willow brook '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to the valley of the Arabians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For the cry [of distress] has gone round the borders of Moab; the wailing has reached to Eglaim, and the prolonged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mournful cry to Beer-elim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For the waters of Dimon are full of blood; yet I [the Lord] will bring even more on Dimon–a lion upon those of Moab who escape and upon the remnant of the land.'
