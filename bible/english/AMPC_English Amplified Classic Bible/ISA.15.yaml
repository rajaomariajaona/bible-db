document_id: ISA.15,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE MOURNFUL, inspired prediction (a burden to be lifted up) concerning Moab: Because in a night Ar of Moab is laid waste and brought to silence! Because in a night Kir of Moab is laid waste and brought to silence!'
  '2':
  - type: text
    content: ' They are gone up to Bayith and to Dibon, to the high places to weep. Moab wails over Nebo and over Medeba; on all their heads is baldness, and every beard is cut off [as a sign of deep sorrow and humiliation]. [Jer. 48:37.]'
  '3':
  - type: text
    content: ' In their streets they gird themselves with sackcloth; on the tops of their houses and in their broad places everyone wails, weeping abundantly.'
  '4':
  - type: text
    content: ' And Heshbon and Elealeh [cities in possession of Moab] cry out; their voice is heard even to Jahaz. Therefore the armed soldiers of Moab cry out; [Moab''s] life is grievous '
  - type: text
    content: and
  - type: text
    content: ' trembles within him.'
  '5':
  - type: text
    content: ' My heart cries out for Moab; his nobles '
  - type: text
    content: and
  - type: text
    content: ' other fugitives flee to Zoar, to Eglath-shelishiyah [like a heifer three years old]. For with weeping they go up the ascent of Luhith; for on the road to Horonaim they raise a cry of destruction. [Jer. 48:5.]'
  '6':
  - type: text
    content: ' For the waters of Nimrim are desolations, for the grass is withered away and the new growth fails; there is no green thing.'
  '7':
  - type: text
    content: ' Therefore the abundance [of possessions] they have acquired and stored away they [now] carry over the willow brook '
  - type: text
    content: and
  - type: text
    content: ' to the valley of the Arabians.'
  '8':
  - type: text
    content: ' For the cry [of distress] has gone round the borders of Moab; the wailing has reached to Eglaim, and the prolonged '
  - type: text
    content: and
  - type: text
    content: ' mournful cry to Beer-elim.'
  '9':
  - type: text
    content: ' For the waters of Dimon are full of blood; yet I [the Lord] will bring even more on Dimon–a lion upon those of Moab who escape and upon the remnant of the land.'
