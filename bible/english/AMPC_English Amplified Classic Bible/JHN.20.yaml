document_id: JHN.20,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW ON the first day of the week, Mary Magdalene came to the tomb early, while it was still dark, and saw that the stone had been removed from (lifted out of the groove across the entrance of) the tomb.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Then the disciples went back again to their homes (lodging places).'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' But Mary remained standing outside the tomb sobbing. As she wept, she stooped down [and looked] into the tomb.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And she saw two angels in white sitting there, one at the head and one at the feet, where the body of Jesus had lain.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And they said to her, Woman, why are you sobbing? She told them, Because they have taken away my Lord, and I do not know where they have laid Him.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' On saying this, she turned around and saw Jesus standing [there], but she did not know (recognize) that it was Jesus.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Jesus said to her, Woman, why are you crying [so]? For Whom are you looking? Supposing that it was the gardener, she replied, Sir, if you carried Him away from here, tell me where you have put Him and I will take Him away.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Jesus said to her, Mary! Turning around she said to Him in Hebrew, Rabboni!–which means Teacher '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' Master.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Jesus said to her, Do not cling to Me [do not hold Me], for I have not yet ascended to the Father. But go to My brethren and tell them, I am ascending to My Father and your Father, and to My God and your God.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Away came Mary Magdalene, bringing the disciples news (word) that she had seen the Lord and that He had said these things to her.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Then on that same first day of the week, when it was evening, though the disciples were behind closed doors for fear of the Jews, Jesus came and stood among them and said, Peace to you!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' So she ran and went to Simon Peter and the other disciple, whom Jesus [tenderly] loved, and said to them, They have taken away the Lord out of the tomb, and we do not know where they have laid Him!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So saying, He showed them His hands and His side. And when the disciples saw the Lord, they were filled with joy (delight, exultation, ecstasy, rapture).'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Then Jesus said to them again, Peace to you! [Just] as the Father has sent Me forth, so I am sending you.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And having said this, He breathed on them and said to them, Receive the Holy Spirit!'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' [Now having received the Holy Spirit, and being led and directed by Him] if you forgive the sins of anyone, they are forgiven; if you retain the sins of anyone, they are retained.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' But Thomas, one of the Twelve, called the Twin, was not with them when Jesus came.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' So the other disciples kept telling him, We have seen the Lord! But he said to them, Unless I see in His hands the marks made by the nails and put my finger into the nail prints, and put my hand into His side, I will never believe [it].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Eight days later His disciples were again in the house, and Thomas was with them. Jesus came, though they were behind closed doors, and stood among them and said, Peace to you!'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Then He said to Thomas, Reach out your finger here, and see My hands; and put out your hand and place [it] in My side. Do not be faithless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' incredulous, but [stop your unbelief and] believe!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Thomas answered Him, My Lord and my God!'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Jesus said to him, Because you have seen Me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thomas,
    - type: text
      text: ' do you now believe (trust, have faith)? Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to be envied are those who have never seen Me and yet have believed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adhered to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relied on Me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Upon this, Peter and the other disciple came out and they went toward the tomb.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' There are also many other signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' miracles which Jesus performed in the presence of the disciples which are not written in this book.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' But these are written (recorded) in order that you may believe that Jesus is the Christ (the Anointed One), the Son of God, and that through believing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cleaving to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relying upon Him you may have life through (in) His name [through Who He is]. [Ps. 2:7, 12.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And they came running together, but the other disciple outran Peter and arrived at the tomb first.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And stooping down, he saw the linen cloths lying there, but he did not enter.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Then Simon Peter came up, following him, and went into the tomb and saw the linen cloths lying there;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But the burial napkin (kerchief) which had been around Jesus'' head, was not lying with the other linen cloths, but was [still] rolled up (wrapped round and round) in a place by itself.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then the other disciple, who had reached the tomb first, went in too; and he saw and was convinced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' believed.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For as yet they did not know (understand) the statement of Scripture that He must rise again from the dead. [Ps. 16:10.]'
