document_id: PSA.137
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BY THE rivers of Babylon, there we [captives] sat down, yes, we wept when we [earnestly] remembered Zion [the city of our God imprinted on our hearts].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' On the willow trees in the midst of [Babylon] we hung our harps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For there they who led us captive required of us a song with words, and our tormentors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they who wasted us required of us mirth, saying, Sing us one of the songs of Zion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' How shall we sing the Lord''s song in a strange land?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' If I forget you, O Jerusalem, let my right hand forget its skill [with the harp].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Let my tongue cleave to the roof of my mouth if I remember you not, if I prefer not Jerusalem above my chief joy! [Ezek. 3:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Remember, O Lord, against the Edomites, that they said in the day of Jerusalem''s fall, Down, down to the ground with her!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' O Daughter of Babylon [you devastator, you!], who [ought to be and] shall be destroyed, happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed shall he be who requites you as you have served us. [Isa. 13:1-22; Jer. 25:12, 13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed shall he be who takes and dashes your little ones against the rock!'
