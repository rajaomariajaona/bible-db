document_id: REV.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN I saw another wonder (sign, token, symbol) in heaven, great and marvelous [warning of events of ominous significance]: There were seven angels bringing seven plagues (afflictions, calamities), which are the last, for with them God''s wrath (indignation) is completely expressed [reaches its climax and is ended]. [Lev. 26:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then I saw what seemed to be a glassy sea blended with fire, and those who had come off victorious from the beast and from his statue and from the number corresponding to his name were standing beside the glassy sea, with harps of God in their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they sang the song of Moses the servant of God and the song of the Lamb, saying, Mighty and marvelous are Your works, O Lord God the Omnipotent! Righteous (just) and true are Your ways, O Sovereign of the ages (King of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nations
  - type: text
    text: )! [Exod. 15:1; Ps. 145:17.]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Who shall not reverence and glorify Your name, O Lord [giving You honor and praise in worship]? For You only are holy. All the nations shall come and pay homage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adoration to You, for Your just judgments (Your righteous sentences and deeds) have been made known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' displayed. [Ps. 86:9, 10; Jer. 10:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' After this I looked and the sanctuary of the tent of the testimony in heaven was thrown open,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And there came out of the temple sanctuary the seven angels bringing the seven plagues (afflictions, calamities). They were arrayed in pure gleaming linen, and around their breasts they wore golden girdles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And one of the four living creatures [then] gave the seven angels seven golden bowls full of the wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation of God, Who lives forever and ever (in the eternities of the eternities).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the sanctuary was filled with smoke from the glory (the radiance, the splendor) of God and from His might '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power, and no one was able to go into the sanctuary until the seven plagues (afflictions, calamities) of the seven angels were ended. [I Kings 8:10; Isa. 6:4; Ezek. 44:4.]'
