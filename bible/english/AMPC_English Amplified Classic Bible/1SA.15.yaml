document_id: 1SA.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SAMUEL TOLD Saul, The Lord sent me to anoint you king over His people Israel. Now listen and heed the words of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Thus says the Lord of hosts, I have considered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' will punish what Amalek did to Israel, how he set himself against him in the way when [Israel] came out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Now go and smite Amalek and utterly destroy all they have; do not spare them, but kill both man and woman, infant and suckling, ox and sheep, camel and donkey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So Saul assembled the men and numbered them at Telaim–200,000 men on foot and 10,000 men of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Saul came to the city of Amalek and laid wait in the valley.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Saul warned the Kenites, Go, depart, get down from among the Amalekites, lest I destroy you with them; for you showed kindness to all the Israelites when they came up out of Egypt. So the Kenites departed from among the Amalekites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Saul smote the Amalekites from Havilah as far as Shur, which is east of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And he took Agag king of the Amalekites alive, though he utterly destroyed all the rest of the people with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Saul and the people spared Agag and the best of the sheep, oxen, fatlings, lambs, and all that was good, and would not utterly destroy them; but all that was undesirable or worthless they destroyed utterly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then the word of the Lord came to Samuel, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I regret making Saul king, for he has turned back from following Me and has not performed My commands. And Samuel was grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' angry [with Saul], and he cried to the Lord all night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When Samuel rose early to meet Saul in the morning, he was told, Saul came to Carmel, and behold, he set up for himself a monument or trophy [of his victory] and passed on and went down to Gilgal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Samuel came to Saul, and Saul said to him, Blessed are you of the Lord. I have performed what the Lord ordered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And Samuel said, What then means this bleating of the sheep in my ears, and the lowing of the oxen which I hear?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Saul said, They have brought them from the Amalekites; for the people spared the best of the sheep and oxen to sacrifice to the Lord your God, but the rest we have utterly destroyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then Samuel said to Saul, Stop! I will tell you what the Lord said to me tonight. Saul said to him, Say on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Samuel said, When you were small in your own sight, were you not made the head of the tribes of Israel, and the Lord anointed you king over Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the Lord sent you on a mission and said, Go, utterly destroy the sinners, the Amalekites; and fight against them until they are consumed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Why then did you not obey the voice of the Lord, but swooped down upon the plunder and did evil in the Lord''s sight?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Saul said to Samuel, Yes, I have obeyed the voice of the Lord and have gone the way which the Lord sent me, and have brought Agag king of Amalek and have utterly destroyed the Amalekites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But the people took from the spoil sheep and oxen, the chief of the things to be utterly destroyed, to sacrifice to the Lord your God in Gilgal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Samuel said, Has the Lord as great a delight in burnt offerings and sacrifices as in obeying the voice of the Lord? Behold, to obey is better than sacrifice, and to hearken than the fat of rams.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For rebellion is as the sin of witchcraft, and stubbornness is as idolatry and teraphim (household good luck images). Because you have rejected the word of the Lord, He also has rejected you from being king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Saul said to Samuel, I have sinned; for I have transgressed the commandment of the Lord and your words, because I feared the people and obeyed their voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Now, I pray you, pardon my sin and go back with me, that I may worship the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And Samuel said to Saul, I will not return with you; for you have rejected the word of the Lord, and the Lord has rejected you from being king over Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And as Samuel turned to go away, Saul seized the skirt of Samuel''s mantle, and it tore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And Samuel said to him, The Lord has torn the kingdom of Israel from you this day and has given it to a neighbor of yours who is better than you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And also the Strength of Israel will not lie or repent; for He is not a man, that He should repent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Saul said, I have sinned; yet honor me now, I pray you, before the elders of my people and before Israel, and return with me, that I may worship the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So Samuel turned back after Saul, and Saul worshiped the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Then Samuel said, Bring here to me Agag king of the Amalekites. And Agag came to him cheerfully. And Agag said, Surely the bitterness of death is past.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Samuel said, As your sword has made women childless, so shall your mother be childless among women. And Samuel hewed Agag in pieces before the Lord in Gilgal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Then Samuel went to Ramah, but Saul went up to his house in Gibeah of Saul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And Samuel came no more to see Saul until the day of his death, though Samuel grieved over Saul. And the Lord repented that He had made Saul king over Israel.'
