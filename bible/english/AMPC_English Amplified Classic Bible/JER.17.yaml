document_id: JER.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE SIN of Judah is written with a pen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' stylus of iron and with the point of a diamond; it is engraved on the tablets of their hearts and on the horns of their altars,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' While their children [earnestly] remember their [heathen] altars and their Asherim [wooden symbols of the goddess Asherah] beside the green trees upon the high hills.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' O [Jerusalem] My mountain in the field, I will give your wealth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' all your treasures to the spoil and your high places for sin [as the price of your sin] throughout all your territory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And you, through your own fault, will loosen your hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discontinue from your heritage which I gave you; and I will cause you to serve your enemies in a land which you do not know, for you have kindled a fire in My anger which will burn throughout the ages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thus says the Lord: Cursed [with great evil] is the strong man who trusts in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on frail man, making weak [human] flesh his arm, and whose mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heart turn aside from the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For he shall be like a shrub '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a person naked and destitute in the desert; and he shall not see any good come, but shall dwell in the parched places in the wilderness, in an uninhabited salt land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [Most] blessed is the man who believes in, trusts in, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on the Lord, and whose hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidence the Lord is.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For he shall be like a tree planted by the waters that spreads out its roots by the river; and it shall not see '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fear when heat comes; but its leaf shall be green. It shall not be anxious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' full of care in the year of drought, nor shall it cease yielding fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The heart is deceitful above all things, and it is exceedingly perverse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' corrupt and severely, mortally sick! Who can know it [perceive, understand, be acquainted with his own heart and mind]? [Matt. 13:15-17; Mark 7:21-23; Eph. 4:20-24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I the Lord search the mind, I try the heart, even to give to every man according to his ways, according to the fruit of his doings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Like the partridge that gathers a brood which she did not hatch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sits on eggs which she has not laid, so is he who gets riches by unjust means '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' not by right. He will leave them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' they will leave him, in the midst of his days, and at his end he will be a fool.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' A glorious throne, set on high from the beginning, is the place of our sanctuary (the temple).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' O Lord, the Hope of Israel, all who forsake You shall be put to shame. They who depart from You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' me [Your prophet] shall [disappear like] writing upon the ground, because they have forsaken the Lord, the Fountain of living waters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Heal me, O Lord, and I shall be healed; save me, and I shall be saved, for You are my praise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Behold, they say to me, Where is the word of the Lord [predicting the disaster that you said would befall us]? Let it come now!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But as for me, I have not sought to escape from being a shepherd after You, nor have I desired the woeful day [of judgment]; You know that. Whatever I said was spoken in Your presence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was from You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Be not a terror to me; You are my refuge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my hope in the day of evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Let those be put to shame who persecute me, but let me not be put to shame; let them be dismayed, but let me not be dismayed. Bring on them the day of evil, and destroy them with double destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Thus said the Lord to me: Go and stand in the gate of the sons of the people, through which the kings of Judah enter and through which they go out, and also [stand] in all the gates of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Say to them, Hear the word of the Lord, you kings of Judah, and all Judah, and all the inhabitants of Jerusalem who enter through these gates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Thus says the Lord: Take heed to yourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for the sake of your lives bear no burden on the Sabbath day or bring it in through the gates of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And do not carry a burden out of your houses on the Sabbath day or do any work, but keep the Sabbath day holy (set apart to the worship of God), as I commanded your fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Yet they would not listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey or incline their ears; but they stiffened their necks, that they might not hear and might not receive instruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But if you diligently listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey Me, says the Lord, and bring in no burden through the gates of this city on the Sabbath day, but keep the Sabbath day holy (set apart to the worship of God), to do no work on it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then there will enter through the gates of this city kings and princes who will sit upon the throne of David, riding in chariots and on horses–the kings and their princes, the men of Judah and the inhabitants of Jerusalem; and this city will be inhabited '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' last throughout the ages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And people shall come from the cities of Judah and the places round about Jerusalem, from the land of Benjamin, from the lowland, from the hill country, and from the South (the Negeb), bringing burnt offerings and sacrifices, cereal offerings and frankincense, and bringing sacrifices of thanksgiving to the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But if you will not listen to Me to keep the Sabbath day holy (set apart to the worship of God), and not to bear a burden and enter in at the gates of Jerusalem [with one] on the Sabbath day, then I will kindle a fire in her gates, and it shall devour the palaces of Jerusalem, and it shall not be quenched.'
