document_id: EZK.25,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD of the Lord came again to me, saying,'
  '10':
  - type: text
    content: ' I will give it along with the children of Ammon to the people of the East for a possession, that it '
  - type: text
    content: and
  - type: text
    content: ' the children of Ammon may not be [any more seriously] remembered among the nations.'
  '11':
  - type: text
    content: ' And I will execute judgments '
  - type: text
    content: and
  - type: text
    content: ' punishments upon Moab, and they shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service]. [Isa. 15, 16; Jer. 48; Amos 2:1-3; Zeph. 2:8-11.]'
  '12':
  - type: text
    content: ' Thus says the Lord God: Because Edom has dealt against the house of Judah by taking vengeance and has greatly offended '
  - type: text
    content: and
  - type: text
    content: ' has become doubly guilty by taking revenge upon them,'
  '13':
  - type: text
    content: ' Therefore thus says the Lord God: I will also stretch out My hand against Edom and will cut off '
  - type: text
    content: and
  - type: text
    content: ' root out man and beast from it, and I will make it desolate; from Teman even to Dedan they shall fall by the sword.'
  '14':
  - type: text
    content: ' And I will lay My vengeance upon Edom by the hand of My people Israel, and they shall do upon Edom according to My anger and according to My wrath, and they shall know My vengeance, says the Lord God. [Isa. 34; Ezek. 35; Amos 1:11, 12; Obad.]'
  '15':
  - type: text
    content: ' Thus says the Lord God: Because the Philistines have dealt revengefully and have taken vengeance contemptuously, with malice '
  - type: text
    content: and
  - type: text
    content: ' spite in their hearts, to destroy in perpetual enmity,'
  '16':
  - type: text
    content: ' Therefore thus says the Lord God: Behold, I will stretch out My hand against the Philistines, and I will cut off the Cherethites [an immigration in Philistia] and destroy the remainder of the seacoast.'
  '17':
  - type: text
    content: ' And I will execute great vengeance upon them with wrathful rebukes '
  - type: text
    content: and
  - type: text
    content: ' chastisements, and they shall know (understand and realize) that I am the Lord, when I lay My vengeance upon them. [Isa. 14:29-31; Jer. 47; Amos 1:6-8; Zeph. 2:4-7; Zech. 9:5-7.]'
  '2':
  - type: text
    content: ' Son of man, set your face toward the Ammonites and prophesy against them.'
  '3':
  - type: text
    content: ' And say to the Ammonites, Hear the word of the Lord God, for thus says the Lord God: Because you said Aha! over My sanctuary when it was profaned and over the land of Israel when it was made desolate and over the house of Judah when it went into captivity '
  - type: text
    content: and
  - type: text
    content: ' exile,'
  '4':
  - type: text
    content: ' Therefore behold, I am delivering you to the people of the East for a possession, and they shall set their encampments among you and make their dwellings in your midst; they shall eat your fruit and they shall drink your milk.'
  '5':
  - type: text
    content: ' And I will make Rabbah [your chief city] a stable for camels and [the cities of] the Ammonites a fold for flocks. And you shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '6':
  - type: text
    content: ' For thus says the Lord God: Because you have clapped your hands and stamped with the feet and rejoiced [in heart] with all the contempt, malice, '
  - type: text
    content: and
  - type: text
    content: ' spite that is in you against the land of Israel,'
  '7':
  - type: text
    content: ' Therefore behold, I have stretched out My hand against you and will hand you over for a prey '
  - type: text
    content: and
  - type: text
    content: ' a spoil to the nations, and I will cut you off from the peoples and will cause you to perish '
  - type: text
    content: and
  - type: text
    content: ' be lost out of the countries; I will destroy you. Then will you know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service]. [Jer. 49:1-6; Ezek. 21:28-32; Amos 1:13-15; Zeph. 2:8-11.]'
  '8':
  - type: text
    content: ' Thus says the Lord God: Because Moab says, as does Seir [Edom], Behold, the house of Judah is like all the [heathen] nations,'
  '9':
  - type: text
    content: ' Therefore behold, I will lay open the flank of Moab from the cities, from its cities on its frontiers '
  - type: text
    content: and
  - type: text
    content: ' in every quarter, the glory of the country, Beth-jeshimoth, Baal-meon, and Kiriathaim.'
