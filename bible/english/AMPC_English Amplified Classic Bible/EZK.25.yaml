document_id: EZK.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD of the Lord came again to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, set your face toward the Ammonites and prophesy against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And say to the Ammonites, Hear the word of the Lord God, for thus says the Lord God: Because you said Aha! over My sanctuary when it was profaned and over the land of Israel when it was made desolate and over the house of Judah when it went into captivity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exile,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Therefore behold, I am delivering you to the people of the East for a possession, and they shall set their encampments among you and make their dwellings in your midst; they shall eat your fruit and they shall drink your milk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And I will make Rabbah [your chief city] a stable for camels and [the cities of] the Ammonites a fold for flocks. And you shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For thus says the Lord God: Because you have clapped your hands and stamped with the feet and rejoiced [in heart] with all the contempt, malice, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spite that is in you against the land of Israel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore behold, I have stretched out My hand against you and will hand you over for a prey '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a spoil to the nations, and I will cut you off from the peoples and will cause you to perish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be lost out of the countries; I will destroy you. Then will you know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service]. [Jer. 49:1-6; Ezek. 21:28-32; Amos 1:13-15; Zeph. 2:8-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Thus says the Lord God: Because Moab says, as does Seir [Edom], Behold, the house of Judah is like all the [heathen] nations,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Therefore behold, I will lay open the flank of Moab from the cities, from its cities on its frontiers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in every quarter, the glory of the country, Beth-jeshimoth, Baal-meon, and Kiriathaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I will give it along with the children of Ammon to the people of the East for a possession, that it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the children of Ammon may not be [any more seriously] remembered among the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And I will execute judgments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishments upon Moab, and they shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service]. [Isa. 15, 16; Jer. 48; Amos 2:1-3; Zeph. 2:8-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Thus says the Lord God: Because Edom has dealt against the house of Judah by taking vengeance and has greatly offended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has become doubly guilty by taking revenge upon them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Therefore thus says the Lord God: I will also stretch out My hand against Edom and will cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' root out man and beast from it, and I will make it desolate; from Teman even to Dedan they shall fall by the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And I will lay My vengeance upon Edom by the hand of My people Israel, and they shall do upon Edom according to My anger and according to My wrath, and they shall know My vengeance, says the Lord God. [Isa. 34; Ezek. 35; Amos 1:11, 12; Obad.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Thus says the Lord God: Because the Philistines have dealt revengefully and have taken vengeance contemptuously, with malice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spite in their hearts, to destroy in perpetual enmity,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Therefore thus says the Lord God: Behold, I will stretch out My hand against the Philistines, and I will cut off the Cherethites [an immigration in Philistia] and destroy the remainder of the seacoast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And I will execute great vengeance upon them with wrathful rebukes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chastisements, and they shall know (understand and realize) that I am the Lord, when I lay My vengeance upon them. [Isa. 14:29-31; Jer. 47; Amos 1:6-8; Zeph. 2:4-7; Zech. 9:5-7.]'
