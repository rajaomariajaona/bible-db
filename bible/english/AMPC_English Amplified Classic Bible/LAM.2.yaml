document_id: LAM.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' HOW THE Lord has covered the Daughter of Zion with a cloud in His anger! He has cast down from heaven to the earth the beauty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor of Israel and has not [earnestly] remembered His footstool in the day of His anger!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The elders of the Daughter of Zion sit on the ground keeping silent; they have cast dust on their heads, they have girded themselves with sackcloth. The maidens of Jerusalem have bowed their heads to the ground [says Jeremiah].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' My eyes fail from weeping, my emotions are deeply disturbed, my heart is poured out upon the ground [in grief] because of the destruction of the daughter of my people, because infants and nurslings faint in the streets of the city.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' They keep crying to their mothers, Where is corn and wine [food and drink]? as they faint like wounded men in the streets of the city, as their lives ebb away on their mothers'' bosom.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' What [example of suffering in the past] is sufficient for me to remind you for your [comfort]? To what shall I liken you, O Daughter of Jerusalem? With what shall I compare you, that I may comfort you, O Virgin Daughter of Zion? For your ruin is as measureless as the sea! Who can heal you? [Lam. 1:12; Dan. 9:12.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Your prophets have predicted for you falsehood and delusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' foolish things; and they have not exposed your iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt to avert your captivity [by causing you to repent]. But they have divined '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' declared to you false '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceptive prophecies, worthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' misleading.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' All who pass by clap their hands at you; they hiss and wag their heads at the Daughter of Jerusalem, saying, Is this the city which was called the perfection of beauty, the joy of all the earth?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' All your enemies have opened wide their mouths against you; they scornfully hiss and gnash their teeth. They cry, We have swallowed her up! Certainly this is the day we have looked for; we have it, we see it!'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The Lord has done what He planned; He has carried out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' finished His word which He threatened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decreed in the days of old. He has demolished without pity; He has made the enemy rejoice over you and has exalted the might of your foes. [Lev. 26:14-39; Deut. 28:15-68.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' The hearts [of the inhabitants of Jerusalem] cried to the Lord. [Then to the congregation, I, Jeremiah, cried, addressing the wall as its symbol] O wall of the Daughter of Zion, let tears run down like a river day and night; give yourself no rest, let not your eyes stop [shedding tears].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Arise [from your bed], cry out in the night, at the beginning of the watches; pour out your heart like water before the face of the Lord. Lift up your hands toward Him for the lives of your young children, who faint from hunger at the head of every street. [Ps. 62:8.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The Lord has swallowed up all the country places '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' habitations of Jacob and has spared not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' pitied; He has demolished in His wrath the strongholds of the Daughter of Judah. He has cast down to the ground the kingdom and its rulers, polluting them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' depriving them of their sanctity.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Behold, O Lord, and consider [carefully] to whom You have done this. Should '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shall women eat the fruit of their own bodies, the children whom they have tended '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swaddled with their hands? Should '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shall priest and prophet be slain in the place set apart [for the worship] of the Lord?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The young and the old lie on the ground in the streets; my maidens and my young men have fallen by the sword. You have slain them in the day of Your anger, slaughtering them without pity.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' You [Lord] called together, as on an appointed feast day of solemn assembly, my terrors (dangers) from every side. And there was not one in the day of God''s wrath who escaped or survived; those I have nursed and brought up, my enemy has destroyed.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' He has broken off in His fierce anger every horn (means of defense) of Israel. He has drawn back His right hand from before the enemy. And He has burned amidst Jacob like a flaming fire consuming all around.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' He has bent His bow like an enemy; He has stood with His right hand set like a foe and has slain all the delights '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pride of the eye; on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in the tent of the Daughter of Zion He has poured out His wrath like fire.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' The Lord has become like an enemy; He has destroyed Israel. He has destroyed all its palaces, has laid in ruins its strongholds, and has multiplied in the Daughter of Judah groaning and moaning and lamentation.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And He has violently broken down His temple like a booth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hedge of a garden; He has destroyed the place of His appointed assembly. The Lord has caused the solemn appointed feasts and Sabbaths to be forgotten in Zion and has spurned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected in the indignation of His anger the king and the priest.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The Lord has scorned, rejected, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cast off His altar; He has abhorred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disowned His sanctuary. He has given into the hand of the enemy the walls of her palaces [and high buildings]; they have raised a clamor in the house of the Lord as on a day of a solemn appointed feast.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' The Lord purposed to lay in ruins the [city] wall of the Daughter of Zion. He marked it off by measuring line; He restrained not His hand from destroying. He made rampart and wall lament; they languished together.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Her gates have sunk into the ground; He has destroyed and broken her bars. Her king and her princes are [exiled] among the nations; the law is no more; her prophets also obtain no vision from the Lord.'
