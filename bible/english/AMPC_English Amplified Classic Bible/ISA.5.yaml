document_id: ISA.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' LET ME [as God''s representative] sing of '
  - type: text
    content: and
  - type: text
    content: ' for my greatly Beloved [God, the Son] a tender song of my Beloved concerning His vineyard [His chosen people]. My greatly Beloved had a vineyard on a very fruitful hill. [S. of Sol. 6:3; Matt. 21:33-40.]'
  '10':
  - type: text
    content: ' For ten acres of vineyard shall yield only about eight gallons, and ten bushels of seed will produce but one bushel.'
  '11':
  - type: text
    content: ' Woe unto those who rise early in the morning, that they may pursue strong drink, who tarry late into the night till wine inflames them!'
  '12':
  - type: text
    content: ' They have lyre and harp, tambourine and flute and wine at their feasts, but they do not regard the deeds of the Lord, neither do they consider the operation of His hands [in mercy and in judgment].'
  '13':
  - type: text
    content: ' Therefore My people go into captivity [to their enemies] without knowing it '
  - type: text
    content: and
  - type: text
    content: ' because they have no knowledge [of God]. And their honorable men [their glory] are famished, and their common people are parched with thirst.'
  '14':
  - type: text
    content: ' Therefore Sheol (the unseen state, the realm of the dead) has enlarged its appetite and opened its mouth without measure; and [Jerusalem''s] nobility '
  - type: text
    content: and
  - type: text
    content: ' her multitude and her pomp '
  - type: text
    content: and
  - type: text
    content: ' tumult and [the drunken reveler] who exults in her descend into it.'
  '15':
  - type: text
    content: ' And the common man is bowed down, and the great man is brought low, and the eyes of the haughty are humbled.'
  '16':
  - type: text
    content: ' But the Lord of hosts is exalted in justice, and God, the Holy One, shows Himself holy in righteousness '
  - type: text
    content: and
  - type: text
    content: ' through righteous judgments.'
  '17':
  - type: text
    content: ' Then shall the lambs feed [among the ruins] as in their own pasture, and [among] the desolate places of the [exiled] rich shall sojourners '
  - type: text
    content: and
  - type: text
    content: ' aliens eat.'
  '18':
  - type: text
    content: ' Woe to those who draw [calamity] with cords of iniquity '
  - type: text
    content: and
  - type: text
    content: ' falsehood, who bring punishment to themselves with a cart rope of wickedness,'
  '19':
  - type: text
    content: ' Who say, Let [the Holy One] make haste '
  - type: text
    content: and
  - type: text
    content: ' speed His [prophesied] vengeance, that we may see it; and let the purpose of the Holy One of Israel draw near and come, that we may know it!'
  '2':
  - type: text
    content: ' And He dug '
  - type: text
    content: and
  - type: text
    content: ' trenched the ground and gathered out the stones from it and planted it with the choicest vine and built a tower in the midst of it and hewed out a winepress in it. And He looked for it to bring forth grapes, and it brought forth wild grapes.'
  '20':
  - type: text
    content: ' Woe to those who call evil good and good evil, who put darkness for light and light for darkness, who put bitter for sweet and sweet for bitter!'
  '21':
  - type: text
    content: ' Woe to those who are wise in their own eyes and prudent '
  - type: text
    content: and
  - type: text
    content: ' shrewd in their own sight!'
  '22':
  - type: text
    content: ' Woe to those who are mighty heroes at drinking wine and men of strength in mixing alcoholic drinks!–'
  '23':
  - type: text
    content: ' Who justify '
  - type: text
    content: and
  - type: text
    content: ' acquit the guilty for a bribe, but take away the rights of the innocent '
  - type: text
    content: and
  - type: text
    content: ' righteous from them!'
  '24':
  - type: text
    content: ' Therefore, as the tongue of fire devours the stubble, and as the dry grass sinks down in the flame, so their root shall be like rottenness and their blossom shall go up like fine dust–because they have rejected '
  - type: text
    content: and
  - type: text
    content: ' cast away the law '
  - type: text
    content: and
  - type: text
    content: ' the teaching of the Lord of hosts and have not believed '
  - type: text
    content: but
  - type: text
    content: ' have treated scornfully '
  - type: text
    content: and
  - type: text
    content: ' have despised the word of the Holy One of Israel.'
  '25':
  - type: text
    content: ' Therefore is the anger of the Lord kindled against His people, and He has stretched forth His hand against them and has smitten them. And the mountains trembled, and their dead bodies were like dung '
  - type: text
    content: and
  - type: text
    content: ' sweepings in the midst of the streets. For all this, His anger is not turned away, but His hand is still stretched out [in judgment].'
  '26':
  - type: text
    content: ' And He will lift up a signal to call together a hostile people from afar [to execute His judgment on Judea], and will hiss for them from the end of the earth [as bees are hissed from their hives], and behold, they shall come with speed, swiftly!'
  '27':
  - type: text
    content: ' None is weary or stumbles among them, none slumbers or sleeps; nor is the girdle of their loins loosed or the latchet (thong) of their shoes broken;'
  '28':
  - type: text
    content: ' Their arrows are sharp, and all their bows bent; their horses'' hoofs seem like flint, and their wheels like a whirlwind.'
  '29':
  - type: text
    content: ' Their roaring is like that of a lioness, they roar like young lions; they growl and seize their prey and carry it safely away, and there is none to deliver it.'
  '3':
  - type: text
    content: ' And now, O inhabitants of Jerusalem and men of Judah, judge, I pray you, between Me and My vineyard [My people, says the Lord].'
  '30':
  - type: text
    content: ' And in that day they [the army from afar] shall roar against [the Jews] like the roaring of the sea. And if one looks to the land, behold, there is darkness and distress; and the light [itself] will be darkened by the clouds of it.'
  '4':
  - type: text
    content: ' What more could have been done for My vineyard that I have not done in it? When I looked for it to bring forth grapes, why did it yield wild grapes?'
  '5':
  - type: text
    content: ' And now I will tell you what I will do to My vineyard: I will take away its hedge, and it shall be eaten '
  - type: text
    content: and
  - type: text
    content: ' burned up; and I will break down its wall, and it shall be trodden down [by enemies].'
  '6':
  - type: text
    content: ' And I will lay it waste; it shall not be pruned or cultivated, but there shall come up briers and thorns. I will also command the clouds that they rain no rain upon it.'
  '7':
  - type: text
    content: ' For the vineyard of the Lord of hosts is the house of Israel, and the men of Judah His pleasant planting [the plant of His delight]. And He looked for justice, but behold, [He saw] oppression '
  - type: text
    content: and
  - type: text
    content: ' bloodshed; [He looked] for righteousness (for uprightness and right standing with God), but behold, [He heard] a cry [of oppression and distress]!'
  '8':
  - type: text
    content: ' Woe to those who join house to house [and by violently expelling the poorer occupants enclose large acreage] and join field to field until there is no place for others and you are made to dwell alone in the midst of the land!'
  '9':
  - type: text
    content: ' In my [Isaiah''s] ears the Lord of hosts said, Of a truth many houses shall be desolate, even great and beautiful ones shall be without inhabitant.'
