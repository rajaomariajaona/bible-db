verses:
  '1':
  - type: text
    content: ' THE SPIRIT of the Lord God is upon me, because the Lord has anointed '
  - type: text
    content: and
  - type: text
    content: ' qualified me to preach the Gospel '
  - type: text
    content: of
  - type: text
    content: ' good tidings to the meek, the poor, '
  - type: text
    content: and
  - type: text
    content: ' afflicted; He has sent me to bind up '
  - type: text
    content: and
  - type: text
    content: ' heal the brokenhearted, to proclaim liberty to the [physical and spiritual] captives and the opening of the prison '
  - type: text
    content: and
  - type: text
    content: ' of the eyes to those who are bound, [Rom. 10:15.]'
  '10':
  - type: text
    content: ' I will greatly rejoice in the Lord, my soul will exult in my God; for He has clothed me with the garments of salvation, He has covered me with the robe of righteousness, as a bridegroom decks himself with a garland, and as a bride adorns herself with her jewels.'
  '11':
  - type: text
    content: ' For as [surely as] the earth brings forth its shoots, and as a garden causes what is sown in it to spring forth, so [surely] the Lord God will cause rightness '
  - type: text
    content: and
  - type: text
    content: ' justice and praise to spring forth before all the nations [through the self-fulfilling power of His word].'
  '2':
  - type: text
    content: ' To proclaim the acceptable year of the Lord [the year of His favor] and the day of vengeance of our God, to comfort all who mourn, [Matt. 11:2-6; Luke 4:18, 19; 7:22.]'
  '3':
  - type: text
    content: ' To grant [consolation and joy] to those who mourn in Zion–to give them an ornament (a garland or diadem) of beauty instead of ashes, the oil of joy instead of mourning, the garment [expressive] of praise instead of a heavy, burdened, '
  - type: text
    content: and
  - type: text
    content: ' failing spirit–that they may be called oaks of righteousness [lofty, strong, and magnificent, distinguished for uprightness, justice, and right standing with God], the planting of the Lord, that He may be glorified.'
  '4':
  - type: text
    content: ' And they shall rebuild the ancient ruins; they shall raise up the former desolations and renew the ruined cities, the devastations of many generations.'
  '5':
  - type: text
    content: ' Aliens shall stand [ready] and feed your flocks, and foreigners shall be your plowmen and your vinedressers.'
  '6':
  - type: text
    content: ' But you shall be called the priests of the Lord; people will speak of you as the ministers of our God. You shall eat the wealth of the nations, and the glory [once that of your captors] shall be yours. [Exod. 19:6; I Pet. 2:5; Rev. 1:6; 5:10; 20:6.]'
  '7':
  - type: text
    content: ' Instead of your [former] shame you shall have a twofold recompense; instead of dishonor '
  - type: text
    content: and
  - type: text
    content: ' reproach [your people] shall rejoice in their portion. Therefore in their land they shall possess double [what they had forfeited]; everlasting joy shall be theirs.'
  '8':
  - type: text
    content: ' For I the Lord love justice; I hate robbery '
  - type: text
    content: and
  - type: text
    content: ' wrong with violence '
  - type: text
    content: or
  - type: text
    content: ' a burnt offering. And I will faithfully give them their recompense in truth, and I will make an everlasting covenant '
  - type: text
    content: or
  - type: text
    content: ' league with them.'
  '9':
  - type: text
    content: ' And their offspring shall be known among the nations and their descendants among the peoples. All who see them [in their prosperity] will recognize '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that they are the people whom the Lord has blessed.'
