document_id: JDG.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' BUT AFTER Ehud died the Israelites again did evil in the sight of the Lord.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And Barak called Zebulun and Naphtali to Kedesh, and he went up with 10,000 men at his heels, and Deborah went up with him.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Now Heber the Kenite, of the descendants of Hobab, the father-in-law of Moses, had separated from the Kenites and encamped as far away as the oak in Zaanannim, which is near Kedesh.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' When it was told Sisera that Barak son of Abinoam had gone up to Mount Tabor,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Sisera gathered together all his chariots, even 900 chariots of iron, and all the men who were with him from Harosheth-hagoiim to the river Kishon.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And Deborah said to Barak, Up! For this is the day when the Lord has given Sisera into your hand. Is not the Lord gone out before you? So Barak went down from Mount Tabor with 10,000 men following him.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the Lord confused '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrified Sisera and all his chariot drivers and all his army before Barak with the sword. And Sisera alighted from his chariot and fled on foot.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But Barak pursued after the chariots and the army to Harosheth-hagoiim, and all the army of Sisera fell by the sword; not a man was left.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But Sisera fled on foot to the tent of Jael, the wife of Heber the Kenite, for there was peace between Jabin the king of Hazor and the house of Heber the Kenite.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And Jael went out to meet Sisera and said to him, Turn aside, my lord, turn aside to me; have no fear. So he turned aside to her into the tent, and she covered him with a rug.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And he said to her, Give me, I pray you, a little water to drink for I am thirsty. And she opened a skin of milk and gave him a drink and covered him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' So the Lord sold them into the hand of Jabin king of Canaan, who reigned in Hazor. The commander of his army was Sisera, who dwelt in Harosheth-hagoiim [fortress or city of the nations].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And he said to her, Stand at the door of the tent, and if any man comes and asks you, Is there any man here? Tell him, No.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' But Jael, Heber''s wife, took a tent pin and a hammer in her hand and went softly to him and drove the pin through his temple and into the ground; for he was in a deep sleep from weariness. So he died.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And behold, as Barak pursued Sisera, Jael came out to meet him and said to him, Come, and I will show you the man you seek. And when he came into her tent, behold, Sisera lay dead, and the tent pin was in his temples.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' So God subdued on that day Jabin king of Canaan before the Israelites.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And the hand of the Israelites bore more and more upon Jabin king of Canaan until they had destroyed [him].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Then the Israelites cried to the Lord, for [Jabin] had 900 chariots of iron and had severely oppressed the Israelites for twenty years.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Now Deborah, a prophetess, the wife of Lappidoth, judged Israel at that time.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' She sat under the palm tree of Deborah between Ramah and Bethel in the hill country of Ephraim, and the Israelites came up to her for judgment.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And she sent and called Barak son of Abinoam from Kedesh in Naphtali and said to him, Has not the Lord, the God of Israel, commanded [you], Go, gather your men at Mount Tabor, taking 10,000 men from the tribes of Naphtali and Zebulun?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And I will draw out Sisera, the general of Jabin''s army, to meet you at the river Kishon with his chariots and his multitude, and I will deliver him into your hand?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And Barak said to her, If you will go with me, then I will go; but if you will not go with me, I will not go.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And she said, I will surely go with you; nevertheless, the trip you take will not be for your glory, for the Lord will sell Sisera into the hand of a woman. And Deborah arose and went with Barak to Kedesh. [Fulfilled in Judg. 4:22.]'
