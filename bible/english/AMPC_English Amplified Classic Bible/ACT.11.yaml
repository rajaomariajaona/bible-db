document_id: ACT.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW THE apostles (special messengers) and the brethren who were throughout Judea heard [with astonishment] that the Gentiles (heathen) also had received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accepted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomed the Word of God [the doctrine concerning the attainment through Christ of salvation in the kingdom of God].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' This occurred three times, and then all was drawn up again into heaven.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And right then the three men sent to me from Caesarea arrived at the house in which we were.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And the [Holy] Spirit instructed me to accompany them without [the least] hesitation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' misgivings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' discrimination. So these six brethren accompanied me also, and we went into the man''s house.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And he related to us how he had seen the angel in his house which stood and said to him, Send men to Joppa and bring Simon who is surnamed Peter;'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' He will give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' explain to you a message by means of which you and all your household [as well] will be saved [from eternal death].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' When I began to speak, the Holy Spirit fell on them just as He did on us at the beginning. [Acts 2:1-4.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Then I recalled the declaration of the Lord, how He said, John indeed baptized with water, but you shall be baptized with (be placed in, introduced into) the Holy Spirit.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' If then God gave to them the same Gift [equally] as He gave to us when we believed in (adhered to, trusted in, and relied on) the Lord Jesus Christ, who was I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' what power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' authority had I to interfere '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hinder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' forbid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' withstand God?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' When they heard this, they were quieted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made no further objection. And they glorified God, saying, Then God has also granted to the Gentiles repentance unto [real] life [after resurrection].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Meanwhile those who were scattered because of the persecution that arose in connection with Stephen had traveled as far away as Phoenicia and Cyprus and Antioch, without delivering the message [concerning the attainment through Christ of salvation in the kingdom of God] to anyone except Jews.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' So when Peter went up to Jerusalem, the circumcision party [certain Jewish Christians] found fault with him [separating themselves from him in a hostile spirit, opposing and disputing and contending with him],'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But there were some of them, men of Cyprus and Cyrene, who on returning to Antioch spoke to the Greeks also, proclaiming [to them] the good news (the Gospel) about the Lord Jesus.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And the presence of the Lord was with them with power, so that a great number [learned] to believe (to adhere to and trust in and rely on the Lord) and turned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' surrendered themselves to Him.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' The rumors of this came to the ears of the church (assembly) in Jerusalem, and they sent Barnabas to Antioch.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' When he arrived and saw what grace (favor) God was bestowing upon them, he was full of joy; and he continuously exhorted (warned, urged, and encouraged) them all to cleave unto '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remain faithful to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devoted to the Lord with [resolute and steady] purpose of heart.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' For he was a good man [good in himself and also at once for the good and the advantage of other people], full of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' controlled by the Holy Spirit and full of faith (of his belief that Jesus is the Messiah, through Whom we obtain eternal salvation). And a large company was added to the Lord.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' [Barnabas] went on to Tarsus to hunt for Saul.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And when he had found him, he brought him back to Antioch. For a whole year they assembled together with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were guests of the church and instructed a large number of people; and in Antioch the disciples were first called Christians.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And during these days prophets (inspired teachers and interpreters of the divine will and purpose) came down from Jerusalem to Antioch.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And one of them named Agabus stood up and prophesied through the [Holy] Spirit that a great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' severe famine would come upon the whole world. And this did occur during the reign of Claudius.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' So the disciples resolved to send relief, each according to his individual ability [in proportion as he had prospered], to the brethren who lived in Judea.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Saying, Why did you go to uncircumcised men and [even] eat with them?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And so they did, sending [their contributions] to the elders by the hand of Barnabas and Saul.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But Peter began [at the beginning] and narrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' explained to them step by step [the whole list of events]. He said:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' I was in the town of Joppa praying, and [falling] in a trance I saw a vision of something coming down from heaven, like a huge sheet lowered by the four corners; and it descended until it came to me.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Gazing intently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' closely at it, I observed in it [a variety of] four-footed animals and wild beasts and reptiles of the earth and birds of the air,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And I heard a voice saying to me, Get up, Peter; kill and eat.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But I said, No, by no means, Lord; for nothing common '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' unhallowed or [ceremonially] unclean has ever entered my mouth.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But the voice answered a second time from heaven, What God has cleansed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pronounced clean, do not you defile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profane by regarding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' calling it common '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' unhallowed or unclean.'
