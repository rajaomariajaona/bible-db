document_id: ZEC.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND I lifted up my eyes and saw, and behold, a man with a measuring line in his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then said I, Where are you going? And he said to me, To measure Jerusalem, to see what is its breadth and what is its length.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And behold, the angel who talked with me went forth and another angel went out to meet him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And he said to the second angel, Run, speak to this young man, saying, Jerusalem shall be inhabited '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dwell as villages without walls, because of the multitude of people and livestock in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For I, says the Lord, will be to her a wall of fire round about, and I will be the glory in the midst of her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Ho! ho! [Hear and] flee from the land of the north, says the Lord, and from the four winds of the heavens, for to them have I scattered you, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Ho! Escape to Zion, you who dwell with the daughter of Babylon!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For thus said the Lord of hosts, after [His] glory had sent me [His messenger] to the nations who plundered you–for he who touches you touches the apple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pupil of His eye:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Behold, I will swing my hand over them and they shall become plunder for those who served them. Then you shall know (recognize and understand) that the Lord of hosts has sent me [His messenger].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Sing and rejoice, O Daughter of Zion; for behold, I come, and I will dwell in the midst of you, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And many nations shall join themselves to the Lord in that day and shall be My people. And I will dwell in the midst of you, and you shall know (recognize and understand) that the Lord of hosts has sent me [His messenger] to you. [Isa. 2:3; Mic. 4:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the Lord shall inherit Judah as His portion in the holy land and shall again choose Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Be still, all flesh, before the Lord, for He is aroused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' risen from His holy habitation. [Hab. 2:20; Zeph. 1:7.]'
