document_id: NUM.32,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW THE sons of Reuben and of Gad had a very great multitude of cattle, and they saw the land of Jazer and the land of Gilead [on the east side of the Jordan], and behold, the place was suitable for cattle.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord''s anger was kindled on that day and He swore, saying,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Surely none of the men who came up out of Egypt, from twenty years old and upward, shall see the land which I swore to Abraham, to Isaac, and to Jacob, because they have not wholly followed Me–'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Except Caleb son of Jephunneh the Kenizzite and Joshua son of Nun, for they have wholly followed the Lord.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord''s anger was kindled against Israel and He made them wander in the wilderness for forty years, until all the generation that had done evil in the sight of the Lord was consumed.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And behold, you are risen up in your fathers'' stead, a brood of sinful men, to increase still more the fierce anger of the Lord against Israel.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For if you turn from following Him, He will again abandon them in the wilderness, and you will destroy all this people.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But they came near to him and said, We will build sheepfolds here for our flocks and walled settlements for our little ones.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But we will be armed and ready to go before the Israelites until we have brought them to their place. Our little ones shall dwell in the fortified settlements because of the people of the land.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We will not return to our homes until the Israelites have inherited every man his inheritance.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For we will not inherit with them on the [west] side of the Jordan and beyond, because our inheritance is fallen to us on this side of the Jordan eastward.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So the sons of Gad and of Reuben came and said to Moses, Eleazar the priest, and the leaders of the congregation,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses replied, If you will do as you say, going armed before the Lord to war,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And every armed man of you will pass over the Jordan before the Lord until He has driven out His enemies before Him'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the land is subdued before the Lord, then afterward you shall return and be guiltless [in this matter] before the Lord and before Israel, and this land shall be your possession before the Lord.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if you will not do so, behold, you have sinned against the Lord; and be sure your sin will find you out.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Build settlements for your little ones, and folds for your sheep, and do that of which you have spoken.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the sons of Gad and of Reuben said to Moses, Your servants will do as my lord commands.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Our little ones, our wives, our flocks, and all our cattle shall be there in the cities of Gilead.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But your servants will pass over, every man armed for war, before the Lord to battle, as my lord says.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Moses gave command concerning them to Eleazar the priest and Joshua son of Nun and the heads of the fathers'' houses of the tribes of Israel.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses said to them, If the sons of Gad and Reuben will pass with you over the Jordan, every man armed to battle before the Lord, and the land shall be subdued before you, then you shall give them the land of Gilead for a possession.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [The country around] Ataroth, Dibon, Jazer, Nimrah, Heshbon, Elealeh, Sebam, Nebo, and Beon,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if they will not pass over with you armed, they shall have possessions among you in the land of Canaan.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Gad and Reuben answered, As the Lord has said to your servants, so will we do.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We will pass over armed before the Lord into the land of Canaan, that the possession of our inheritance on this side of the Jordan may be ours.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses gave to them, to the sons of Gad and of Reuben and to half the tribe of Manasseh son of Joseph, the kingdom of Sihon king of the Amorites and the kingdom of Og king of Bashan–the land with its cities and their territories, even the cities round about the country.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the sons of Gad built Dibon, Ataroth, Aroer,'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Atroth-shophan, Jazer, Jogbehah,'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Beth-nimrah, and Beth-haran, fortified cities, and folds for sheep.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the sons of Reuben built Heshbon, Elealeh, Kiriathaim,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nebo, and Baal-meon–their names were to be changed–and Shibmah; and they gave other names to the cities they built.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the sons of Machir son of Manasseh went to Gilead and took it and dispossessed the Amorites who were in it.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The land the Lord smote before the congregation of Israel, is a land for cattle, and your servants have cattle.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses gave Gilead to Machir son of Manasseh, and he settled in it.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jair son of Manasseh took their villages and called them Havvoth-jair.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Nobah took Kenath and its villages and called it Nobah after his own name.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they said, If we have found favor in your sight, let this land be given to your servants for a possession. Do not take us over the Jordan.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses said to the sons of Gad and of Reuben, Shall your brethren go to war while you sit here?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Why do you discourage the hearts of the Israelites from going over into the land which the Lord has given them?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus your fathers did when I sent them from Kadesh-barnea to see the land!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For when they went up to the Valley of Eshcol and saw the land, they discouraged the hearts of the Israelites from going into the land the Lord had given them.'
