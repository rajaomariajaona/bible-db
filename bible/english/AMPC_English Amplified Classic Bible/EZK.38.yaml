document_id: EZK.38,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND THE word of the Lord came to me, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Thus says the Lord God: At the same time thoughts shall come into your mind, and you will devise an evil plan.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And you will say, I will go up against an open country [the land of unwalled villages]; I will fall upon those who are at rest, who dwell securely, all of them dwelling without walls and having neither bars nor gates,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' To take spoil and prey, to turn your hand upon the desolate places now inhabited and assail the people gathered out of the nations, who have obtained livestock and goods, who dwell at the center of the earth [Palestine].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Sheba and Dedan and the merchants of Tarshish, with all their lionlike cubs [or satellite areas], shall say to you, Have you come to take spoil? Have you gathered your hosts to take the prey? To carry away silver and gold, to take away livestock and goods, to take a great spoil?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Therefore, son of man, prophesy and say to Gog, Thus says the Lord God: In that day when My people Israel dwell securely, will you not know it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be aroused?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And you will come from your place out of the uttermost parts of the north, you and many peoples with you, all of them riding on horses, a great host, a mighty army.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And you shall come up against My people Israel like a cloud to cover the land. In the latter days I will bring you against My land, that the nations may know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize Me when My holiness shall be vindicated through you [vindicated and honored in your overwhelming destruction], O Gog, before their eyes.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Thus says the Lord God: Are you he of whom I have spoken in olden times by My servants the prophets of Israel, who prophesied in those days for years that I would bring you [Gog] against them?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' But in that day when Gog shall come against the land of Israel, says the Lord God, My wrath shall come up into My nostrils.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' For in My jealousy and in the fire of My wrath have I said, Surely in that day there shall be a great shaking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cosmic catastrophe in the land of Israel,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Son of man, set your face against Gog, of the land of Magog, the prince of Rosh, of Meshech, and of Tubal, and prophesy against him,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So that the fishes of the sea and the birds of the heavens, the beasts of the field and all creeping things that creep upon the earth, and all the men that are upon the face of the earth, shall tremble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shake at My presence; and the mountains shall be thrown down and the steep places shall fall and every wall [natural or artificial] shall fall to the ground.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And I will call for a sword against [Gog] throughout all My mountains, says the Lord God, every man''s sword shall be against his brother [over the dividing of booty].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And with pestilence and with bloodshed will I enter into judgment with [Gog], and I will rain upon him and upon his hordes and upon the many peoples that are with him torrents of rain and great hailstones, fire and brimstone. [Ps. 11:6.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Thus will I demonstrate My greatness and My holiness, and I will be recognized, understood, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' known in the eyes of many nations; yes, they shall know that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And say, Thus says the Lord God: Behold, I am against you, O Gog, chief prince (ruler) of Rosh, of Meshech, and of Tubal.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And I will turn you back and put hooks into your jaws, and I will bring you forth and all your army, horses and horsemen, all of them clothed in full armor, a great company with buckler and shield, all of them handling swords–'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Persia, Cush, and Put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' Libya with them, all of them with shield and helmet,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Gomer and all his hordes, the house of Togarmah in the uttermost parts of the north and all his hordes–many people are with you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' You [Gog] be prepared; yes, prepare yourself, you and all your companies that are assembled about you, and you be a guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a commander for them.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' After many days you shall be visited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mustered [for service]; in the latter years you shall go against the land that is restored from the ravages of the sword, where people are gathered out of many nations upon the mountains of Israel, which had been a continual waste; but its [people] are brought forth out of the nations and they shall dwell securely, all of them. [Isa. 24:22.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' You shall ascend and come like a storm; you shall be like a cloud to cover the land, you and all your hosts and many people with you.'
