document_id: EZK.38,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE word of the Lord came to me, saying,'
  '10':
  - type: text
    content: ' Thus says the Lord God: At the same time thoughts shall come into your mind, and you will devise an evil plan.'
  '11':
  - type: text
    content: ' And you will say, I will go up against an open country [the land of unwalled villages]; I will fall upon those who are at rest, who dwell securely, all of them dwelling without walls and having neither bars nor gates,'
  '12':
  - type: text
    content: ' To take spoil and prey, to turn your hand upon the desolate places now inhabited and assail the people gathered out of the nations, who have obtained livestock and goods, who dwell at the center of the earth [Palestine].'
  '13':
  - type: text
    content: ' Sheba and Dedan and the merchants of Tarshish, with all their lionlike cubs [or satellite areas], shall say to you, Have you come to take spoil? Have you gathered your hosts to take the prey? To carry away silver and gold, to take away livestock and goods, to take a great spoil?'
  '14':
  - type: text
    content: ' Therefore, son of man, prophesy and say to Gog, Thus says the Lord God: In that day when My people Israel dwell securely, will you not know it '
  - type: text
    content: and
  - type: text
    content: ' be aroused?'
  '15':
  - type: text
    content: ' And you will come from your place out of the uttermost parts of the north, you and many peoples with you, all of them riding on horses, a great host, a mighty army.'
  '16':
  - type: text
    content: ' And you shall come up against My people Israel like a cloud to cover the land. In the latter days I will bring you against My land, that the nations may know, understand, '
  - type: text
    content: and
  - type: text
    content: ' realize Me when My holiness shall be vindicated through you [vindicated and honored in your overwhelming destruction], O Gog, before their eyes.'
  '17':
  - type: text
    content: ' Thus says the Lord God: Are you he of whom I have spoken in olden times by My servants the prophets of Israel, who prophesied in those days for years that I would bring you [Gog] against them?'
  '18':
  - type: text
    content: ' But in that day when Gog shall come against the land of Israel, says the Lord God, My wrath shall come up into My nostrils.'
  '19':
  - type: text
    content: ' For in My jealousy and in the fire of My wrath have I said, Surely in that day there shall be a great shaking '
  - type: text
    content: or
  - type: text
    content: ' cosmic catastrophe in the land of Israel,'
  '2':
  - type: text
    content: ' Son of man, set your face against Gog, of the land of Magog, the prince of Rosh, of Meshech, and of Tubal, and prophesy against him,'
  '20':
  - type: text
    content: ' So that the fishes of the sea and the birds of the heavens, the beasts of the field and all creeping things that creep upon the earth, and all the men that are upon the face of the earth, shall tremble '
  - type: text
    content: and
  - type: text
    content: ' shake at My presence; and the mountains shall be thrown down and the steep places shall fall and every wall [natural or artificial] shall fall to the ground.'
  '21':
  - type: text
    content: ' And I will call for a sword against [Gog] throughout all My mountains, says the Lord God, every man''s sword shall be against his brother [over the dividing of booty].'
  '22':
  - type: text
    content: ' And with pestilence and with bloodshed will I enter into judgment with [Gog], and I will rain upon him and upon his hordes and upon the many peoples that are with him torrents of rain and great hailstones, fire and brimstone. [Ps. 11:6.]'
  '23':
  - type: text
    content: ' Thus will I demonstrate My greatness and My holiness, and I will be recognized, understood, '
  - type: text
    content: and
  - type: text
    content: ' known in the eyes of many nations; yes, they shall know that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '3':
  - type: text
    content: ' And say, Thus says the Lord God: Behold, I am against you, O Gog, chief prince (ruler) of Rosh, of Meshech, and of Tubal.'
  '4':
  - type: text
    content: ' And I will turn you back and put hooks into your jaws, and I will bring you forth and all your army, horses and horsemen, all of them clothed in full armor, a great company with buckler and shield, all of them handling swords–'
  '5':
  - type: text
    content: ' Persia, Cush, and Put '
  - type: text
    content: or
  - type: text
    content: ' Libya with them, all of them with shield and helmet,'
  '6':
  - type: text
    content: ' Gomer and all his hordes, the house of Togarmah in the uttermost parts of the north and all his hordes–many people are with you.'
  '7':
  - type: text
    content: ' You [Gog] be prepared; yes, prepare yourself, you and all your companies that are assembled about you, and you be a guard '
  - type: text
    content: and
  - type: text
    content: ' a commander for them.'
  '8':
  - type: text
    content: ' After many days you shall be visited '
  - type: text
    content: and
  - type: text
    content: ' mustered [for service]; in the latter years you shall go against the land that is restored from the ravages of the sword, where people are gathered out of many nations upon the mountains of Israel, which had been a continual waste; but its [people] are brought forth out of the nations and they shall dwell securely, all of them. [Isa. 24:22.]'
  '9':
  - type: text
    content: ' You shall ascend and come like a storm; you shall be like a cloud to cover the land, you and all your hosts and many people with you.'
