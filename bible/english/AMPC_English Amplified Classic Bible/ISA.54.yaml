document_id: ISA.54
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SING, O barren one, you who did not bear; break forth into singing and cry aloud, you who did not travail with child! For the [spiritual] children of the desolate one will be more than the children of the married wife, says the Lord. [Gal. 4:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Enlarge the place of your tent, and let the curtains of your habitations be stretched out; spare not; lengthen your cords and strengthen your stakes,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For you will spread abroad to the right hand and to the left; and your offspring will possess the nations and make the desolate cities to be inhabited.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Fear not, for you shall not be ashamed; neither be confounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depressed, for you shall not be put to shame. For you shall forget the shame of your youth, and you shall not [seriously] remember the reproach of your widowhood any more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For your Maker is your Husband–the Lord of hosts is His name–and the Holy One of Israel is your Redeemer; the God of the whole earth He is called.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For the Lord has called you like a woman forsaken, grieved in spirit, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heartsore–even a wife [wooed and won] in youth, when she is [later] refused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scorned, says your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For a brief moment I forsook you, but with great compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy I will gather you [to Me] again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' In a little burst of wrath I hid My face from you for a moment, but with age-enduring love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness I will have compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy on you, says the Lord, your Redeemer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For this is like the days of Noah to Me; as I swore that the waters of Noah should no more go over the earth, so have I sworn that I will not be angry with you or rebuke you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For though the mountains should depart and the hills be shaken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' removed, yet My love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness shall not depart from you, nor shall My covenant of peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' completeness be removed, says the Lord, Who has compassion on you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' O you afflicted [city], storm-tossed and not comforted, behold, I will set your stones in fair colors [in antimony to enhance their brilliance] and lay your foundations with sapphires.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And I will make your windows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pinnacles of [sparkling] agates '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rubies, and your gates of [shining] carbuncles, and all your walls [of your enclosures] of precious stones. [Rev. 21:19-21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And all your [spiritual] children shall be disciples [taught by the Lord and obedient to His will], and great shall be the peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' undisturbed composure of your children. [John 6:45.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You shall establish yourself in righteousness (rightness, in conformity with God''s will and order): you shall be far from even the thought of oppression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' destruction, for you shall not fear, and from terror, for it shall not come near you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Behold, they may gather together '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stir up strife, but it is not from Me. Whoever stirs up strife against you shall fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' surrender to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Behold, I have created the smith who blows on the fire of coals and who produces a weapon for its purpose; and I have created the devastator to destroy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But no weapon that is formed against you shall prosper, and every tongue that shall rise against you in judgment you shall show to be in the wrong. This [peace, righteousness, security, triumph over opposition] is the heritage of the servants of the Lord [those in whom the ideal Servant of the Lord is reproduced]; this is the righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the vindication which they obtain from Me [this is that which I impart to them as their justification], says the Lord.'
