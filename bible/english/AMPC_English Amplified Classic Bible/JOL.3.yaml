document_id: JOL.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR BEHOLD, in those days and at that time when I shall reverse the captivity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' restore the fortunes of Judah and Jerusalem,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I will gather all nations and will bring them down into the Valley of Jehoshaphat, and there will I deal with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' execute judgment upon them for [their treatment of] My people and of My heritage Israel, whom they have scattered among the nations and [because] they have divided My land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they have cast lots for My people, and have given a boy for a harlot and have sold a girl for juice [of the grape] and have drunk it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Yes, and what are you to Me, O Tyre and Sidon and all the [five small] divisions of Philistia? Will you pay Me back for something? Even if you pay Me back, swiftly and speedily I will return your deed [of retaliation] upon your own head, [Isa. 23; Ezek. 26:1-18; Amos 1:6-10; Zeph. 2:4-7; Zech. 9:2-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Because you have taken My silver and My gold and have carried into your temples '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' palaces My precious treasures,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And have sold the children of Judah and the children of Jerusalem to the sons of the Grecians, that you may remove them far from their border.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Behold, I will stir them up out of the place to which you have sold them and will return your deed [of retaliation] upon your own head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I will sell your sons and your daughters into the hand of the children of Judah, and they will sell them to the Sabeans, to a nation far off, for the Lord has spoken it. [Isa. 14:2; 60:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Proclaim this among the nations: Prepare war! Stir up the mighty men! Let all the men of war draw near, let them come up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Beat your plowshares into swords, and your pruning hooks into spears; let the weak say, I am strong [a warrior]! [Isa. 2:4; Mic. 4:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Hasten and come, all you nations round about, and assemble yourselves; there You, O Lord, will bring down Your mighty ones (Your warriors).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Let the nations bestir themselves and come up to the Valley of Jehoshaphat, for there will I sit to judge all the nations round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Put in the sickle, for the [vintage] harvest is ripe; come, get down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tread the grapes, for the winepress is full; the vats overflow, for the wickedness [of the peoples] is great. [Mark 4:29; Rev. 14:15, 18-20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Multitudes, multitudes in the valley of decision! For the day of the Lord is near in the valley of decision. [Zech. 14:1-9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The sun and the moon are darkened and the stars withdraw their shining.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The Lord will thunder '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' roar from Zion and utter His voice from Jerusalem, and the heavens and the earth shall shake; but the Lord will be a refuge for His people and a stronghold to the children of Israel. [Amos 9:11-15; Mic. 4:1-3; 5:2; Zeph. 3:13-20; Zech. 6:12, 13; 12:8, 9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So shall you know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord your God, dwelling in Zion, My holy mountain. Then shall Jerusalem be holy, and strangers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foreigners [not born into the family of God] shall no more pass through it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And in that day, the mountains shall drip with fresh juice [of the grape] and the hills shall flow with milk; and all the brooks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' riverbeds of Judah shall flow with water, and a fountain shall come forth from the house of the Lord and shall water the Valley of Shittim. [Ezek. 47:1-12; Amos 9:13; Zech. 14:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Egypt shall be a desolation and Edom shall be a desolate wilderness for their violence against the children of Judah, because they have shed innocent blood in their land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But Judah shall remain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be inhabited forever, and Jerusalem from generation to generation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And I will cleanse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hold as innocent their blood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avenge it, blood which I have not cleansed, held innocent, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avenged, for the Lord dwells in Zion.'
