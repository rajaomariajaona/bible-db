document_id: EXO.36,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BEZALEL AND Aholiab and every wisehearted man in whom the Lord has put wisdom and understanding to know how to do all the work for the service of the sanctuary shall work according to all that the Lord has commanded.'
  '10':
  - type: text
    content: ' [Bezalel] coupled five curtains one to another and the other five curtains he coupled one to another.'
  '11':
  - type: text
    content: ' And he made loops of blue on the outer edge of the last curtain in the first set; this he did also on the inner edge of the first curtain in the second set.'
  '12':
  - type: text
    content: ' Fifty loops he made in the one curtain and fifty loops in the edge of the curtain which was the second set; the loops were opposite one another.'
  '13':
  - type: text
    content: ' And he made fifty clasps of gold and coupled the curtains together with the clasps so that the tabernacle became one unit.'
  '14':
  - type: text
    content: ' And he made eleven curtains of goats'' hair for a tent over the tabernacle.'
  '15':
  - type: text
    content: ' The length of one curtain was thirty cubits and four cubits was the breadth; the eleven curtains were of equal size.'
  '16':
  - type: text
    content: ' And he coupled five curtains by themselves and the other six curtains by themselves.'
  '17':
  - type: text
    content: ' And he made fifty loops on the outmost edge of the curtain to be coupled and fifty loops he made on the inner edge of the second curtain to be coupled.'
  '18':
  - type: text
    content: ' He made fifty clasps of bronze to couple the tent together into one whole.'
  '19':
  - type: text
    content: ' He made a covering for the tent of rams'' skins tanned red, and above it a covering of dolphin '
  - type: text
    content: or
  - type: text
    content: ' porpoise skins.'
  '2':
  - type: text
    content: ' And Moses called Bezalel and Aholiab and every able '
  - type: text
    content: and
  - type: text
    content: ' wisehearted man in whose mind the Lord had put wisdom '
  - type: text
    content: and
  - type: text
    content: ' ability, everyone whose heart stirred him up to come to do the work;'
  '20':
  - type: text
    content: ' He made boards of acacia wood for the upright framework of the tabernacle.'
  '21':
  - type: text
    content: ' The length of a board was ten cubits and the breadth one cubit and a half.'
  '22':
  - type: text
    content: ' Each board had two tenons (projections) to fit into a mortise to form a clutch; he did this for all the boards of the tabernacle.'
  '23':
  - type: text
    content: ' And he made thus the boards [for frames] for the tabernacle: twenty boards for the south side,'
  '24':
  - type: text
    content: ' And he made under the twenty boards forty sockets '
  - type: text
    content: or
  - type: text
    content: ' bases of silver, two sockets under one board for its two tenons '
  - type: text
    content: or
  - type: text
    content: ' hands, and two sockets under another board for its two tenons.'
  '25':
  - type: text
    content: ' For the other side of the tabernacle, the north side, he made twenty boards'
  '26':
  - type: text
    content: ' And their forty sockets '
  - type: text
    content: or
  - type: text
    content: ' bases of silver, two sockets under [the end of] each board.'
  '27':
  - type: text
    content: ' And for the rear or west side of the tabernacle he made six [frame] boards.'
  '28':
  - type: text
    content: ' And two boards he made for each corner of the tabernacle in the rear.'
  '29':
  - type: text
    content: ' They were separate below but linked together at the top with one ring; thus he made both of them in both corners.'
  '3':
  - type: text
    content: ' And they received from Moses all the freewill offerings which the Israelites had brought for doing the work of the sanctuary, to prepare it for service. And they continued to bring him freewill offerings every morning.'
  '30':
  - type: text
    content: ' There were eight boards with sixteen sockets '
  - type: text
    content: or
  - type: text
    content: ' bases of silver, and under [the end of] each board two sockets.'
  '31':
  - type: text
    content: ' He made bars of acacia wood, five for the [frame] boards of the one side of the tabernacle,'
  '32':
  - type: text
    content: ' And five bars for the boards of its other side, and five bars for the boards at the rear or west side.'
  '33':
  - type: text
    content: ' And he made the middle bar pass through halfway up the boards from one end to the other.'
  '34':
  - type: text
    content: ' He overlaid the boards and the bars with gold and made their rings of gold as places for the bars.'
  '35':
  - type: text
    content: ' And he made the veil of blue, purple, and scarlet [stuff] and fine twined linen, with cherubim skillfully worked. [Matt. 27:50, 51; Heb. 10:19-22.]'
  '36':
  - type: text
    content: ' For [the veil] he made four pillars of acacia [wood] and overlaid them with gold; their hooks were of gold, and he cast for them four sockets '
  - type: text
    content: or
  - type: text
    content: ' bases of silver.'
  '37':
  - type: text
    content: ' And he made a screen for the tent door of blue, purple, and scarlet [stuff] and fine twined linen, embroidered,'
  '38':
  - type: text
    content: ' And he made the five pillars of it with their hooks, and overlaid their ornamental tops and joinings with gold, but their five sockets were of bronze.'
  '4':
  - type: text
    content: ' And all the wise '
  - type: text
    content: and
  - type: text
    content: ' able men who were doing the work on the sanctuary came, every man from the work he was doing,'
  '5':
  - type: text
    content: ' And they said to Moses, The people bring much more than enough for doing the work which the Lord commanded to do.'
  '6':
  - type: text
    content: ' So Moses commanded and it was proclaimed in all the camp, Let no man or woman do anything more for the sanctuary offering. So the people were restrained from bringing,'
  '7':
  - type: text
    content: ' For the stuff they had was sufficient to do all the work and more.'
  '8':
  - type: text
    content: ' And all the able '
  - type: text
    content: and
  - type: text
    content: ' wisehearted men among them who did the work on the tabernacle made ten curtains of fine twined linen and blue, purple, and scarlet [stuff], with cherubim skillfully worked on them.'
  '9':
  - type: text
    content: ' The length of each curtain was twenty-eight cubits and its breadth four cubits; all the curtains were one size.'
