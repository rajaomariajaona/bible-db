document_id: EXO.36
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BEZALEL AND Aholiab and every wisehearted man in whom the Lord has put wisdom and understanding to know how to do all the work for the service of the sanctuary shall work according to all that the Lord has commanded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Moses called Bezalel and Aholiab and every able '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wisehearted man in whose mind the Lord had put wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability, everyone whose heart stirred him up to come to do the work;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they received from Moses all the freewill offerings which the Israelites had brought for doing the work of the sanctuary, to prepare it for service. And they continued to bring him freewill offerings every morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And all the wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' able men who were doing the work on the sanctuary came, every man from the work he was doing,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they said to Moses, The people bring much more than enough for doing the work which the Lord commanded to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So Moses commanded and it was proclaimed in all the camp, Let no man or woman do anything more for the sanctuary offering. So the people were restrained from bringing,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For the stuff they had was sufficient to do all the work and more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And all the able '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wisehearted men among them who did the work on the tabernacle made ten curtains of fine twined linen and blue, purple, and scarlet [stuff], with cherubim skillfully worked on them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The length of each curtain was twenty-eight cubits and its breadth four cubits; all the curtains were one size.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' [Bezalel] coupled five curtains one to another and the other five curtains he coupled one to another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And he made loops of blue on the outer edge of the last curtain in the first set; this he did also on the inner edge of the first curtain in the second set.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Fifty loops he made in the one curtain and fifty loops in the edge of the curtain which was the second set; the loops were opposite one another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And he made fifty clasps of gold and coupled the curtains together with the clasps so that the tabernacle became one unit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he made eleven curtains of goats'' hair for a tent over the tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The length of one curtain was thirty cubits and four cubits was the breadth; the eleven curtains were of equal size.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he coupled five curtains by themselves and the other six curtains by themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And he made fifty loops on the outmost edge of the curtain to be coupled and fifty loops he made on the inner edge of the second curtain to be coupled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He made fifty clasps of bronze to couple the tent together into one whole.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He made a covering for the tent of rams'' skins tanned red, and above it a covering of dolphin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' porpoise skins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He made boards of acacia wood for the upright framework of the tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The length of a board was ten cubits and the breadth one cubit and a half.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Each board had two tenons (projections) to fit into a mortise to form a clutch; he did this for all the boards of the tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And he made thus the boards [for frames] for the tabernacle: twenty boards for the south side,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And he made under the twenty boards forty sockets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bases of silver, two sockets under one board for its two tenons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hands, and two sockets under another board for its two tenons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For the other side of the tabernacle, the north side, he made twenty boards'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And their forty sockets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bases of silver, two sockets under [the end of] each board.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And for the rear or west side of the tabernacle he made six [frame] boards.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And two boards he made for each corner of the tabernacle in the rear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' They were separate below but linked together at the top with one ring; thus he made both of them in both corners.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' There were eight boards with sixteen sockets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bases of silver, and under [the end of] each board two sockets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' He made bars of acacia wood, five for the [frame] boards of the one side of the tabernacle,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And five bars for the boards of its other side, and five bars for the boards at the rear or west side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And he made the middle bar pass through halfway up the boards from one end to the other.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' He overlaid the boards and the bars with gold and made their rings of gold as places for the bars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And he made the veil of blue, purple, and scarlet [stuff] and fine twined linen, with cherubim skillfully worked. [Matt. 27:50, 51; Heb. 10:19-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' For [the veil] he made four pillars of acacia [wood] and overlaid them with gold; their hooks were of gold, and he cast for them four sockets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bases of silver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And he made a screen for the tent door of blue, purple, and scarlet [stuff] and fine twined linen, embroidered,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And he made the five pillars of it with their hooks, and overlaid their ornamental tops and joinings with gold, but their five sockets were of bronze.'
