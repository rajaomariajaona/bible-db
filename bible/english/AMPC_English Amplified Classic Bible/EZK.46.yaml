document_id: EZK.46
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THUS SAYS the Lord God: The gate of the inner court that faces east shall be shut during the six working days, but on the Sabbath it shall be opened, and also on the day of the New Moon it shall be opened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the prince shall enter by the porch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vestibule of the gate from without and shall stand by the sidepost of the gate. The priests shall prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offer his burnt offering and his peace offerings, and he shall worship at the threshold of the gate. Then he shall go out, but the gate shall not be shut until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The people of the land shall worship at the entrance of that gate before the Lord on the Sabbaths and on the New Moons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the burnt offering that the prince shall offer to the Lord on the Sabbath day shall be six lambs without blemish and a ram without blemish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the bloodless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' meal offering with the ram shall be an ephah, and the meal offering with the lambs shall be as much as he is able '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' willing to give, and a hin of oil with each ephah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And on the day of the New Moon the offering shall be a young bull without blemish and six lambs and a ram without blemish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the prince shall provide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make a meal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bloodless offering, an ephah for the bullock and an ephah for the ram, and for the lambs as he is able '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' willing according to what has been made available to his hand, and a hin of oil to each ephah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And when the prince shall enter, he shall go in by the porch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vestibule of that gate and he shall go out by way of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But when the people of the land shall come before the Lord at the appointed solemn feasts, he who enters the north gate to worship shall go out by the south gate, and he who enters by the south gate shall go out by the north gate; he shall not return by the gate by which he came in but shall go out by the opposite gate [straight ahead]. [Phil. 3:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the prince, when they go in, shall go in with them, and when they go out, he shall go out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And in the appointed and solemn feasts the meal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bloodless offering shall be with a bullock an ephah, and with a ram an ephah, and with the lambs as much as the prince is willing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' able to give [from what has been made available to him], and a hin of oil with each ephah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When the prince shall prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make a freewill burnt offering or peace offerings voluntarily to the Lord, the gate that faces east shall be opened for him, and he shall offer his burnt offering and his peace offerings as he does on the Sabbath day. Then he shall go out, and after he has gone out, the gate shall be shut.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And a lamb a year old without blemish shall you [the priests, for the congregation] offer daily to the Lord; you shall prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offer it every morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And you [the priests] shall prepare a meal offering to go with it every morning, one-sixth of an ephah with one-third of a hin of oil to moisten the fine flour. This is a perpetual ordinance for a continual meal offering to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Thus shall they prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offer the lamb and the meal offering and the oil every morning for a continual burnt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Thus says the Lord God: If the prince gives a gift to any of his sons out of his inheritance, it shall belong to his sons; it is their property by inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But if he gives a gift out of his inheritance to one of his servants, then it shall be his until the year of liberty [the Year of Jubilee]; after that it shall be returned to the prince; only his sons may keep a gift from his inheritance [permanently].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Moreover, the prince shall not take of the people''s inheritance by oppression, thrusting them out of their property; what he gives to his sons he shall take out of his own possession, so that none of My people shall be separated from his [inherited] possession.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then he [my guide] led me through the entrance which was at the side of the gate into the holy chambers for the priests, which faced the north; and behold, there was a place at the extreme western end of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And he said to me, This is the place where the priests shall boil the guilt offering and the sin offering, and where they shall bake the [bloodless] meal offering, to prevent their having to bring them into the outer court, lest they should thereby wrongfully sanctify (separate and consecrate for holy service) the people who are there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And he brought me out into the outer court and caused me to pass by the four corners of the court, and behold, in every corner of the court there was a court.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' In the four corners of the court there were courts joined on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enclosed, forty cubits long and thirty broad; these four in the corners were the same size.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And there was a row of masonry inside them, round about [each of] the four courts, and it was made with hearths for boiling at the bottom of the rows round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then said he to me, These are the kitchens of those who do the boiling, where the ministers [the Levites] of the temple shall boil the sacrifices of the people.'
