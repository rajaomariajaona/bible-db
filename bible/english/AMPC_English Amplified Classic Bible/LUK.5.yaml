document_id: LUK.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW IT occurred that while the people pressed upon Jesus to hear the message of God, He was standing by the Lake of Gennesaret (Sea of Galilee).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And He saw two boats drawn up by the lake, but the fishermen had gone down from them and were washing their nets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And getting into one of the boats, [the one] that belonged to Simon (Peter), He requested him to draw away a little from the shore. Then He sat down and continued to teach the crowd [of people] from the boat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When He had stopped speaking, He said to Simon (Peter), Put out into the deep [water], and lower your nets for a haul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Simon (Peter) answered, Master, we toiled all night [exhaustingly] and caught nothing [in our nets]. But on the ground of Your word, I will lower the nets [again].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And when they had done this, they caught a great number of fish; and as their nets were [at the point of] breaking,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They signaled to their partners in the other boat to come and take hold with them. And they came and filled both the boats, so that they began to sink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But when Simon Peter saw this, he fell down at Jesus'' knees, saying, Depart from me, for I am a sinful man, O Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For he was gripped with bewildering amazement [allied to terror], and all who were with him, at the haul of fish which they had made;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And so also were James and John, the sons of Zebedee, who were partners with Simon (Peter). And Jesus said to Simon, Have no fear; from now on you will be catching men!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And after they had run their boats on shore, they left everything and joined Him as His disciples '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sided with His party '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accompanied Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' While He was in one of the towns, there came a man full of (covered with) leprosy; and when he saw Jesus, he fell on his face and implored Him, saying, Lord, if You are willing, You are able to cure me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make me clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And [Jesus] reached out His hand and touched him, saying, I am willing; be cleansed! And immediately the leprosy left him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And [Jesus] charged him to tell no one [that he might chance to meet], until [He said] you go and show yourself to the priest, and make an offering for your purification, as Moses commanded, for a testimony '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proof to the people, that they may have evidence [of your healing]. [Lev. 13:49; 14:2-32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But so much the more the news spread abroad concerning Him, and great crowds kept coming together to hear [Him] and to be healed by Him of their infirmities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But He Himself withdrew [in retirement] to the wilderness (desert) and prayed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' One of those days, as He was teaching, there were Pharisees and teachers of the Law sitting by, who had come from every village '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' town of Galilee and Judea and from Jerusalem. And the power of the Lord was [present] with Him to heal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And behold, some men were bringing on a stretcher a man who was paralyzed, and they tried to carry him in and lay him before [Jesus].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But finding no way to bring him in because of the crowd, they went up on the roof and lowered him with his stretcher through the tiles into the midst, in front of Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And when He saw [their confidence in Him, springing from] their faith, He said, Man, your sins are forgiven you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the scribes and the Pharisees began to reason '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' question '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' argue, saying, Who is this [Man] Who speaks blasphemies? Who can forgive sins but God alone?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But Jesus, knowing their thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' questionings, answered them, Why do you question in your hearts?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Which is easier: to say, Your sins are forgiven you, or to say, Arise and walk [about]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But that you may know that the Son of Man has the [power of] authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right on earth to forgive sins, He said to the paralyzed man, I say to you, arise, pick up your litter (stretcher), and go to your own house!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And instantly [the man] stood up before them and picked up what he had been lying on and went away to his house, recognizing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praising '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanking God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And overwhelming astonishment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ecstasy seized them all, and they recognized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanked God; and they were filled with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' controlled by reverential fear and kept saying, We have seen wonderful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strange '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incredible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unthinkable things today!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And after this, Jesus went out and looked [attentively] at a tax collector named Levi sitting at the tax office; and He said to him, Join Me as a disciple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' side with My party '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accompany Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And he forsook everything and got up and followed Him [becoming His disciple and siding with His party].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And Levi (Matthew) made a great banquet for Him in his own house, and there was a large company of tax collectors and others who were reclining [at the table] with them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Now the Pharisees and their scribes were grumbling against Jesus'' disciples, saying, Why are you eating and drinking with tax collectors and [preeminently] sinful people?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And Jesus replied to them, It is not those who are healthy who need a physician, but those who are sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' I have not come to arouse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' invite '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' call the righteous, but the erring ones (those not free from sin) to repentance [to change their minds for the better and heartily to amend their ways, with abhorrence of their past sins].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Then they said to Him, The disciples of John practice fasting often and offer up prayers of [special] petition, and so do [the disciples] of the Pharisees also, but Yours eat and drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And Jesus said to them, Can you make the wedding guests fast as long as the bridegroom is with them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' But the days will come when the bridegroom will be taken from them; and then they will fast in those days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' He told them a proverb also: No one puts a patch from a new garment on an old garment; if he does, he will both tear the new one, and the patch from the new [one] will not match the old [garment].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And no one pours new wine into old wineskins; if he does, the fresh wine will burst the skins and it will be spilled and the skins will be ruined (destroyed).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But new wine must be put into fresh wineskins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And no one after drinking old wine immediately desires new wine, for he says, The old is good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: better
  - type: text
    text: .
