document_id: PSA.133
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Song of Ascents. Of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BEHOLD, HOW good and how pleasant it is for brethren to dwell together in unity!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' It is like the precious ointment poured on the head, that ran down on the beard, even the beard of Aaron [the first high priest], that came down upon the collar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skirts of his garments [consecrating the whole body]. [Exod. 30:25, 30.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' It is like the dew of [lofty] Mount Hermon and the dew that comes on the hills of Zion; for there the Lord has commanded the blessing, even life forevermore [upon the high and the lowly].'
