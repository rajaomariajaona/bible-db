document_id: PSA.133,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents. Of David.
  - type: text
    content: ' BEHOLD, HOW good and how pleasant it is for brethren to dwell together in unity!'
  '2':
  - type: text
    content: ' It is like the precious ointment poured on the head, that ran down on the beard, even the beard of Aaron [the first high priest], that came down upon the collar '
  - type: text
    content: and
  - type: text
    content: ' skirts of his garments [consecrating the whole body]. [Exod. 30:25, 30.]'
  '3':
  - type: text
    content: ' It is like the dew of [lofty] Mount Hermon and the dew that comes on the hills of Zion; for there the Lord has commanded the blessing, even life forevermore [upon the high and the lowly].'
