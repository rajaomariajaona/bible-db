document_id: MAT.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' DO NOT judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' criticize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemn others, so that you may not be judged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' criticized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemned yourselves.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Or if he asks for a fish, will hand him a serpent?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If you then, evil as you are, know how to give good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' advantageous gifts to your children, how much more will your Father Who is in heaven [perfect as He is] give good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' advantageous things to those who keep on asking Him!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So then, whatever you desire that others would do to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for you, even so do also to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for them, for this is (sums up) the Law and the Prophets.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Enter through the narrow gate; for wide is the gate and spacious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broad is the way that leads away to destruction, and many are those who are entering through it.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the gate is narrow (contracted by pressure) and the way is straitened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compressed that leads away to life, and few are those who find it. [Deut. 30:19; Jer. 21:8.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Beware of false prophets, who come to you dressed as sheep, but inside they are devouring wolves. [Ezek. 22:27.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You will fully recognize them by their fruits. Do people pick grapes from thorns, or figs from thistles?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Even so, every healthy (sound) tree bears good fruit [worthy of admiration], but the sickly (decaying, worthless) tree bears bad (worthless) fruit.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A good (healthy) tree cannot bear bad (worthless) fruit, nor can a bad (diseased) tree bear excellent fruit [worthy of admiration].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Every tree that does not bear good fruit is cut down and cast into the fire.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For just as you judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' criticize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemn others, you will be judged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' criticized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemned, and in accordance with the measure you [use to] deal out to others, it will be dealt out again to you.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore, you will fully know them by their fruits.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Not everyone who says to Me, Lord, Lord, will enter the kingdom of heaven, but he who does the will of My Father Who is in heaven.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Many will say to Me on that day, Lord, Lord, have we not prophesied in Your name and driven out demons in Your name and done many mighty works in Your name?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And then I will say to them openly (publicly), I never knew you; depart from Me, you who act wickedly [disregarding My commands]. [Ps. 6:8.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So everyone who hears these words of Mine and acts upon them [obeying them] will be like a sensible (prudent, practical, wise) man who built his house upon the rock.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the rain fell and the floods came and the winds blew and beat against that house; yet it did not fall, because it had been founded on the rock.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And everyone who hears these words of Mine and does not do them will be like a stupid (foolish) man who built his house upon the sand.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the rain fell and the floods came and the winds blew and beat against that house, and it fell–and great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete was the fall of it.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Jesus had finished these sayings [the Sermon on the Mount], the crowds were astonished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overwhelmed with bewildered wonder at His teaching,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For He was teaching as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: One
    - type: text
      text: ' Who had [and was] authority, and not as [did] the scribes.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Why do you stare from without at the very small particle that is in your brother''s eye but do not become aware of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consider the beam of timber that is in your own eye?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Or how can you say to your brother, Let me get the tiny particle out of your eye, when there is the beam of timber in your own eye?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You hypocrite, first get the beam of timber out of your own eye, and then you will see clearly to take the tiny particle out of your brother''s eye.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do not give that which is holy (the sacred thing) to the dogs, and do not throw your pearls before hogs, lest they trample upon them with their feet and turn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tear you in pieces.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Keep on asking and it will be given you; keep on seeking and you will find; keep on knocking [reverently] and [the door] will be opened to you.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For everyone who keeps on asking receives; and he who keeps on seeking finds; and to him who keeps on knocking, [the door] will be opened.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Or what man is there of you, if his son asks him for a loaf of bread, will hand him a stone?'
