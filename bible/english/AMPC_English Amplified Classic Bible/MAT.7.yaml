document_id: MAT.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' DO NOT judge '
  - type: text
    content: and
  - type: text
    content: ' criticize '
  - type: text
    content: and
  - type: text
    content: ' condemn others, so that you may not be judged '
  - type: text
    content: and
  - type: text
    content: ' criticized '
  - type: text
    content: and
  - type: text
    content: ' condemned yourselves.'
  '10':
  - type: text
    content: ' Or if he asks for a fish, will hand him a serpent?'
  '11':
  - type: text
    content: ' If you then, evil as you are, know how to give good '
  - type: text
    content: and
  - type: text
    content: ' advantageous gifts to your children, how much more will your Father Who is in heaven [perfect as He is] give good '
  - type: text
    content: and
  - type: text
    content: ' advantageous things to those who keep on asking Him!'
  '12':
  - type: text
    content: ' So then, whatever you desire that others would do to '
  - type: text
    content: and
  - type: text
    content: ' for you, even so do also to '
  - type: text
    content: and
  - type: text
    content: ' for them, for this is (sums up) the Law and the Prophets.'
  '13':
  - type: text
    content: ' Enter through the narrow gate; for wide is the gate and spacious '
  - type: text
    content: and
  - type: text
    content: ' broad is the way that leads away to destruction, and many are those who are entering through it.'
  '14':
  - type: text
    content: ' But the gate is narrow (contracted by pressure) and the way is straitened '
  - type: text
    content: and
  - type: text
    content: ' compressed that leads away to life, and few are those who find it. [Deut. 30:19; Jer. 21:8.]'
  '15':
  - type: text
    content: ' Beware of false prophets, who come to you dressed as sheep, but inside they are devouring wolves. [Ezek. 22:27.]'
  '16':
  - type: text
    content: ' You will fully recognize them by their fruits. Do people pick grapes from thorns, or figs from thistles?'
  '17':
  - type: text
    content: ' Even so, every healthy (sound) tree bears good fruit [worthy of admiration], but the sickly (decaying, worthless) tree bears bad (worthless) fruit.'
  '18':
  - type: text
    content: ' A good (healthy) tree cannot bear bad (worthless) fruit, nor can a bad (diseased) tree bear excellent fruit [worthy of admiration].'
  '19':
  - type: text
    content: ' Every tree that does not bear good fruit is cut down and cast into the fire.'
  '2':
  - type: text
    content: ' For just as you judge '
  - type: text
    content: and
  - type: text
    content: ' criticize '
  - type: text
    content: and
  - type: text
    content: ' condemn others, you will be judged '
  - type: text
    content: and
  - type: text
    content: ' criticized '
  - type: text
    content: and
  - type: text
    content: ' condemned, and in accordance with the measure you [use to] deal out to others, it will be dealt out again to you.'
  '20':
  - type: text
    content: ' Therefore, you will fully know them by their fruits.'
  '21':
  - type: text
    content: ' Not everyone who says to Me, Lord, Lord, will enter the kingdom of heaven, but he who does the will of My Father Who is in heaven.'
  '22':
  - type: text
    content: ' Many will say to Me on that day, Lord, Lord, have we not prophesied in Your name and driven out demons in Your name and done many mighty works in Your name?'
  '23':
  - type: text
    content: ' And then I will say to them openly (publicly), I never knew you; depart from Me, you who act wickedly [disregarding My commands]. [Ps. 6:8.]'
  '24':
  - type: text
    content: ' So everyone who hears these words of Mine and acts upon them [obeying them] will be like a sensible (prudent, practical, wise) man who built his house upon the rock.'
  '25':
  - type: text
    content: ' And the rain fell and the floods came and the winds blew and beat against that house; yet it did not fall, because it had been founded on the rock.'
  '26':
  - type: text
    content: ' And everyone who hears these words of Mine and does not do them will be like a stupid (foolish) man who built his house upon the sand.'
  '27':
  - type: text
    content: ' And the rain fell and the floods came and the winds blew and beat against that house, and it fell–and great '
  - type: text
    content: and
  - type: text
    content: ' complete was the fall of it.'
  '28':
  - type: text
    content: ' When Jesus had finished these sayings [the Sermon on the Mount], the crowds were astonished '
  - type: text
    content: and
  - type: text
    content: ' overwhelmed with bewildered wonder at His teaching,'
  '29':
  - type: text
    content: ' For He was teaching as '
  - type: text
    content: One
  - type: text
    content: ' Who had [and was] authority, and not as [did] the scribes.'
  '3':
  - type: text
    content: ' Why do you stare from without at the very small particle that is in your brother''s eye but do not become aware of '
  - type: text
    content: and
  - type: text
    content: ' consider the beam of timber that is in your own eye?'
  '4':
  - type: text
    content: ' Or how can you say to your brother, Let me get the tiny particle out of your eye, when there is the beam of timber in your own eye?'
  '5':
  - type: text
    content: ' You hypocrite, first get the beam of timber out of your own eye, and then you will see clearly to take the tiny particle out of your brother''s eye.'
  '6':
  - type: text
    content: ' Do not give that which is holy (the sacred thing) to the dogs, and do not throw your pearls before hogs, lest they trample upon them with their feet and turn '
  - type: text
    content: and
  - type: text
    content: ' tear you in pieces.'
  '7':
  - type: text
    content: ' Keep on asking and it will be given you; keep on seeking and you will find; keep on knocking [reverently] and [the door] will be opened to you.'
  '8':
  - type: text
    content: ' For everyone who keeps on asking receives; and he who keeps on seeking finds; and to him who keeps on knocking, [the door] will be opened.'
  '9':
  - type: text
    content: ' Or what man is there of you, if his son asks him for a loaf of bread, will hand him a stone?'
