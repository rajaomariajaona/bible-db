document_id: 1CH.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE SONS of Issachar were: Tola, Puah, Jashub, and Shimron–four in all.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The son of Jediael: Bilhan. The sons of Bilhan: Jeush, Benjamin, Ehud, Chenaanah, Zethan, Tarshish, and Ahishahar.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' All these were the sons of Jediael, according to the heads of their fathers'' houses, mighty men of valor, 17,200, able '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fit for service in war.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Shuppim and Huppim were the sons of Ir, and Hushim the son of Aher.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The sons of Naphtali: Jahziel, Guni, Jezer, and Shallum, whose [grandmother] was Bilhah.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The sons of Manasseh: Ashriel, whom his concubine the Aramitess bore; she bore Machir the father of Gilead.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And Machir took as wife the sister of Huppim and Shuppim; her name was Maacah. The name of a second [and later descendant, the first being Gilead], was Zelophehad; and Zelophehad had daughters [only]. [Num. 27:1-7.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Maacah the wife of Machir bore a son; she called his name Peresh. The name of his brother was Sheresh; his sons were Ulam and Rakem.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The son of Ulam: Bedan. These were the sons of Gilead son of Machir, the son of Manasseh.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' His sister Hammolecheth bore Ishbod, Abiezer, and Mahlah.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The sons of Shemida were: Ahian, Shechem, Likhi, and Aniam.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The sons of Tola: Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam, Shemuel (Samuel)–heads of their fathers'' houses, descendants of Tola. They were mighty men of valor in their generations; their number in David''s days was 22,600.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' The sons of Ephraim: Shuthelah, Bered his son, Tahath [I] his son, Eleadah his son, Tahath [II] his son,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Zabad his son, and Shuthelah his son. [During Ephraim''s lifetime, his sons] Ezer and Elead were slain by men of Gath born in the land, who had come down to steal the cattle [of the Ephraimites, probably before the Israelites left Egypt].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And Ephraim their father mourned many days, and his brethren came to comfort him.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Then his wife conceived and bore a son, and he called his name Beriah [in evil], because calamity had befallen his house.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' [Beriah''s] daughter was Sheerah, who built both Lower and Upper Beth-horon, and also Uzzen-sheerah.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Rephah was his son, and Resheph [his son]; Resheph''s son was Telah, Tahan his son,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Ladan his son, Ammihud his son, Elishama his son,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Nun his son, Joshua [Moses'' successor] his son.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And their possessions and settlements were Bethel and its towns, and eastward Naaran, and westward Gezer, and Shechem, and as far as Azzah (Gaza) with all their towns,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And along the borders of the Manassites, Beth-shean, Taanach, Megiddo, Dor, with all their towns. In these dwelt the sons of Joseph son of Israel.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The son of Uzzi: Izrahiah. The sons of Izrahiah: Michael, Obadiah, Joel, Isshiah–five, all of them chief men.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' The sons of Asher: Imnah, Ishvah, Ishvi, Beriah; and Serah their sister.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' The sons of Beriah: Heber and Malchiel, who was the father of Birzaith.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Heber was the father of Japhlet, Shomer, Hotham, and Shua their sister.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' The sons of Japhlet: Pasach, Bimhal, and Ashvath. These were the sons of Japhlet.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' The sons of Shemer (Shomer) his brother: Rohgah, Jehubbah, and Aram.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' The sons of his brother Helem (Hotham): Zophah, Imna, Shelesh, and Amal.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' The sons of Zophah: Suah, Harnepher, Shual, Beri, Imrah,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' Bezer, Hod, Shamma, Shilshah, Ithran, and Beera.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' The sons of Jether: Jephunneh, Pispa, and Ara.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' The sons of Ulla: Arah, Hanniel, and Rizia.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And with them by their generations according to their fathers'' houses were units of the army for war, 36,000, for they had many wives and children [with them].'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' All these were offspring of Asher, heads of their fathers'' houses, approved men, mighty warriors, chief of the princes. Their number enrolled by genealogies for service in war, was 26,000 men.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Their kinsmen from all the families of Issachar, mighty men of valor, registered by genealogies, were in all 87,000.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' The sons of Benjamin: Bela, Becher, and Jediael–three in all.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' The sons of Bela: Ezbon, Uzzi, Uzziel, Jerimoth, and Iri–five, heads of the houses of their fathers, mighty men of valor. By their genealogies they numbered 22,034.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' The sons of Becher: Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth, Abijah, Anathoth, and Alemeth, all sons of Becher.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' The number of them by their genealogies by generations, as heads of their fathers'' houses, mighty warriors, was 20,200.'
