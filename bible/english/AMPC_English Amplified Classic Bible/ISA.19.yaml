document_id: ISA.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE MOURNFUL, inspired prediction (a burden to be lifted up) concerning Egypt: Behold, the Lord is riding on a swift cloud and comes to Egypt; and the idols of Egypt will tremble at His presence, and the hearts of the Egyptians will melt within them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And I will stir up Egyptians against Egyptians, and they will fight, every one against his brother and every one against his neighbor, city against city, kingdom against kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the spirit of the Egyptians within them will become exhausted and emptied out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' will fail, and I will destroy their counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confound their plans; and they will seek counsel from the idols and the sorcerers, and from those having familiar spirits (the mediums) and the wizards.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And I will give over the Egyptians into the hand of a hard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cruel master, and a fierce king will rule over them, says the Lord, the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the waters shall fail from the Nile, and the river shall be wasted and become dry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the rivers shall become foul, the streams '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' canals of Egypt shall be diminished and dried up, the reeds and the rushes shall wither '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rot away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The meadows by the Nile, by the brink of the Nile, and all the sown fields of the Nile shall become dry, be blown away, and be no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The fishermen will lament, and all who cast a hook into the Nile will mourn; and they who spread nets upon the waters will languish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Moreover, they who work with combed flax and they who weave white [cotton] cloth will be confounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in despair.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' [Those who are] the pillars '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foundations of Egypt will be crushed, and all those who work for hire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' who build dams will be grieved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The princes of Zoan [ancient capital of the Pharaohs] are utterly foolish; the counsel of the wisest counselors of Pharaoh has become witless (stupid). How can you say to Pharaoh, I am a son of the wise, a son of ancient kings?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Where then are your wise men? Let them tell you now [if they are so wise], and let them make known what the Lord of hosts has purposed against Egypt [if they can].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The princes of Zoan have become fools, and the princes of Memphis are confused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deceived; those who are the cornerstones of her tribes have led Egypt astray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The Lord has mingled a spirit of perverseness, error, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confusion within her; [her leaders] have caused Egypt to stagger in all her doings, as a drunken man staggers in his vomit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Neither can any work [done singly or by concerted action] accomplish anything for Egypt, whether by head or tail, palm branch or rush [high or low].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' In that day will the Egyptians be like women [timid and helpless]; and they will tremble and fear because of the shaking of the hand of the Lord of hosts which He shakes over them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the land of Judah [allied to Assyria] shall become a terror to the Egyptians; everyone to whom mention of it is made will be afraid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' everyone who mentions it–to him will they turn in fear, because of the purpose of the Lord of hosts which He purposes against Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' In that day there will be five cities in the land of Egypt that speak the language of [the Hebrews of] Canaan and swear allegiance to the Lord of hosts. One of them will be called the City of the Sun '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' In that day there will be an altar to the Lord in the midst of the land of Egypt, and a pillar to the Lord at its border.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And it will be a sign and a witness to the Lord of hosts in the land of Egypt; for they will cry to the Lord because of oppressors, and He will send them a savior, even a mighty one, and he will deliver them. [Judg. 2:18; 3:9, 15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the Lord will make Himself known to Egypt, and the Egyptians will know (have knowledge of, be acquainted with, give heed to, and cherish) the Lord in that day and will worship with sacrifices of animal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vegetable offerings; they will vow a vow to the Lord and perform it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the Lord shall smite Egypt, smiting and healing it; and they will return to the Lord, and He will listen to their entreaties and heal them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' In that day shall there be a highway out of Egypt to Assyria, and the Assyrian will come into Egypt and the Egyptian into Assyria; and the Egyptians will worship [the Lord] with the Assyrians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' In that day Israel shall be the third, with Egypt and with Assyria [in a Messianic league], a blessing in the midst of the earth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Whom the Lord of hosts has blessed, saying, Blessed be Egypt My people and Assyria the work of My hands and Israel My heritage.'
