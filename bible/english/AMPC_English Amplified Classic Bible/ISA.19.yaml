document_id: ISA.19,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE MOURNFUL, inspired prediction (a burden to be lifted up) concerning Egypt: Behold, the Lord is riding on a swift cloud and comes to Egypt; and the idols of Egypt will tremble at His presence, and the hearts of the Egyptians will melt within them.'
  '10':
  - type: text
    content: ' [Those who are] the pillars '
  - type: text
    content: and
  - type: text
    content: ' foundations of Egypt will be crushed, and all those who work for hire '
  - type: text
    content: or
  - type: text
    content: ' who build dams will be grieved.'
  '11':
  - type: text
    content: ' The princes of Zoan [ancient capital of the Pharaohs] are utterly foolish; the counsel of the wisest counselors of Pharaoh has become witless (stupid). How can you say to Pharaoh, I am a son of the wise, a son of ancient kings?'
  '12':
  - type: text
    content: ' Where then are your wise men? Let them tell you now [if they are so wise], and let them make known what the Lord of hosts has purposed against Egypt [if they can].'
  '13':
  - type: text
    content: ' The princes of Zoan have become fools, and the princes of Memphis are confused '
  - type: text
    content: and
  - type: text
    content: ' deceived; those who are the cornerstones of her tribes have led Egypt astray.'
  '14':
  - type: text
    content: ' The Lord has mingled a spirit of perverseness, error, '
  - type: text
    content: and
  - type: text
    content: ' confusion within her; [her leaders] have caused Egypt to stagger in all her doings, as a drunken man staggers in his vomit.'
  '15':
  - type: text
    content: ' Neither can any work [done singly or by concerted action] accomplish anything for Egypt, whether by head or tail, palm branch or rush [high or low].'
  '16':
  - type: text
    content: ' In that day will the Egyptians be like women [timid and helpless]; and they will tremble and fear because of the shaking of the hand of the Lord of hosts which He shakes over them.'
  '17':
  - type: text
    content: ' And the land of Judah [allied to Assyria] shall become a terror to the Egyptians; everyone to whom mention of it is made will be afraid '
  - type: text
    content: and
  - type: text
    content: ' everyone who mentions it–to him will they turn in fear, because of the purpose of the Lord of hosts which He purposes against Egypt.'
  '18':
  - type: text
    content: ' In that day there will be five cities in the land of Egypt that speak the language of [the Hebrews of] Canaan and swear allegiance to the Lord of hosts. One of them will be called the City of the Sun '
  - type: text
    content: or
  - type: text
    content: ' Destruction.'
  '19':
  - type: text
    content: ' In that day there will be an altar to the Lord in the midst of the land of Egypt, and a pillar to the Lord at its border.'
  '2':
  - type: text
    content: ' And I will stir up Egyptians against Egyptians, and they will fight, every one against his brother and every one against his neighbor, city against city, kingdom against kingdom.'
  '20':
  - type: text
    content: ' And it will be a sign and a witness to the Lord of hosts in the land of Egypt; for they will cry to the Lord because of oppressors, and He will send them a savior, even a mighty one, and he will deliver them. [Judg. 2:18; 3:9, 15.]'
  '21':
  - type: text
    content: ' And the Lord will make Himself known to Egypt, and the Egyptians will know (have knowledge of, be acquainted with, give heed to, and cherish) the Lord in that day and will worship with sacrifices of animal '
  - type: text
    content: and
  - type: text
    content: ' vegetable offerings; they will vow a vow to the Lord and perform it.'
  '22':
  - type: text
    content: ' And the Lord shall smite Egypt, smiting and healing it; and they will return to the Lord, and He will listen to their entreaties and heal them.'
  '23':
  - type: text
    content: ' In that day shall there be a highway out of Egypt to Assyria, and the Assyrian will come into Egypt and the Egyptian into Assyria; and the Egyptians will worship [the Lord] with the Assyrians.'
  '24':
  - type: text
    content: ' In that day Israel shall be the third, with Egypt and with Assyria [in a Messianic league], a blessing in the midst of the earth,'
  '25':
  - type: text
    content: ' Whom the Lord of hosts has blessed, saying, Blessed be Egypt My people and Assyria the work of My hands and Israel My heritage.'
  '3':
  - type: text
    content: ' And the spirit of the Egyptians within them will become exhausted and emptied out '
  - type: text
    content: and
  - type: text
    content: ' will fail, and I will destroy their counsel '
  - type: text
    content: and
  - type: text
    content: ' confound their plans; and they will seek counsel from the idols and the sorcerers, and from those having familiar spirits (the mediums) and the wizards.'
  '4':
  - type: text
    content: ' And I will give over the Egyptians into the hand of a hard '
  - type: text
    content: and
  - type: text
    content: ' cruel master, and a fierce king will rule over them, says the Lord, the Lord of hosts.'
  '5':
  - type: text
    content: ' And the waters shall fail from the Nile, and the river shall be wasted and become dry.'
  '6':
  - type: text
    content: ' And the rivers shall become foul, the streams '
  - type: text
    content: and
  - type: text
    content: ' canals of Egypt shall be diminished and dried up, the reeds and the rushes shall wither '
  - type: text
    content: and
  - type: text
    content: ' rot away.'
  '7':
  - type: text
    content: ' The meadows by the Nile, by the brink of the Nile, and all the sown fields of the Nile shall become dry, be blown away, and be no more.'
  '8':
  - type: text
    content: ' The fishermen will lament, and all who cast a hook into the Nile will mourn; and they who spread nets upon the waters will languish.'
  '9':
  - type: text
    content: ' Moreover, they who work with combed flax and they who weave white [cotton] cloth will be confounded '
  - type: text
    content: and
  - type: text
    content: ' in despair.'
