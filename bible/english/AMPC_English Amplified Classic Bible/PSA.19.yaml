document_id: PSA.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE HEAVENS declare the glory of God; and the firmament shows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proclaims His handiwork. [Rom. 1:20, 21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Day after day pours forth speech, and night after night shows forth knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' There is no speech nor spoken word [from the stars]; their voice is not heard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Yet their voice [in evidence] goes out through all the earth, their sayings to the end of the world. Of the heavens has God made a tent for the sun, [Rom. 10:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Which is as a bridegroom coming out of his chamber; and it rejoices as a strong man to run his course.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Its going forth is from the end of the heavens, and its circuit to the ends of it; and nothing [yes, no one] is hidden from the heat of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The law of the Lord is perfect, restoring the [whole] person; the testimony of the Lord is sure, making wise the simple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The precepts of the Lord are right, rejoicing the heart; the commandment of the Lord is pure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bright, enlightening the eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The [reverent] fear of the Lord is clean, enduring forever; the ordinances of the Lord are true and righteous altogether.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' More to be desired are they than gold, even than much fine gold; they are sweeter also than honey and drippings from the honeycomb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Moreover, by them is Your servant warned (reminded, illuminated, and instructed); and in keeping them there is great reward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Who can discern his lapses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' errors? Clear me from hidden [and unconscious] faults.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Keep back Your servant also from presumptuous sins; let them not have dominion over me! Then shall I be blameless, and I shall be innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clear of great transgression.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Let the words of my mouth and the meditation of my heart be acceptable in Your sight, O Lord, my [firm, impenetrable] Rock and my Redeemer.'
