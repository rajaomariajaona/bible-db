document_id: PSA.19,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' THE HEAVENS declare the glory of God; and the firmament shows '
  - type: text
    content: and
  - type: text
    content: ' proclaims His handiwork. [Rom. 1:20, 21.]'
  '10':
  - type: text
    content: ' More to be desired are they than gold, even than much fine gold; they are sweeter also than honey and drippings from the honeycomb.'
  '11':
  - type: text
    content: ' Moreover, by them is Your servant warned (reminded, illuminated, and instructed); and in keeping them there is great reward.'
  '12':
  - type: text
    content: ' Who can discern his lapses '
  - type: text
    content: and
  - type: text
    content: ' errors? Clear me from hidden [and unconscious] faults.'
  '13':
  - type: text
    content: ' Keep back Your servant also from presumptuous sins; let them not have dominion over me! Then shall I be blameless, and I shall be innocent '
  - type: text
    content: and
  - type: text
    content: ' clear of great transgression.'
  '14':
  - type: text
    content: ' Let the words of my mouth and the meditation of my heart be acceptable in Your sight, O Lord, my [firm, impenetrable] Rock and my Redeemer.'
  '2':
  - type: text
    content: ' Day after day pours forth speech, and night after night shows forth knowledge.'
  '3':
  - type: text
    content: ' There is no speech nor spoken word [from the stars]; their voice is not heard.'
  '4':
  - type: text
    content: ' Yet their voice [in evidence] goes out through all the earth, their sayings to the end of the world. Of the heavens has God made a tent for the sun, [Rom. 10:18.]'
  '5':
  - type: text
    content: ' Which is as a bridegroom coming out of his chamber; and it rejoices as a strong man to run his course.'
  '6':
  - type: text
    content: ' Its going forth is from the end of the heavens, and its circuit to the ends of it; and nothing [yes, no one] is hidden from the heat of it.'
  '7':
  - type: text
    content: ' The law of the Lord is perfect, restoring the [whole] person; the testimony of the Lord is sure, making wise the simple.'
  '8':
  - type: text
    content: ' The precepts of the Lord are right, rejoicing the heart; the commandment of the Lord is pure '
  - type: text
    content: and
  - type: text
    content: ' bright, enlightening the eyes.'
  '9':
  - type: text
    content: ' The [reverent] fear of the Lord is clean, enduring forever; the ordinances of the Lord are true and righteous altogether.'
