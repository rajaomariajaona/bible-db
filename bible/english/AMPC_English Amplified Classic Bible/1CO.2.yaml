document_id: 1CO.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AS FOR myself, brethren, when I came to you, I did not come proclaiming to you the testimony '
  - type: text
    content: and
  - type: text
    content: ' evidence '
  - type: text
    content: or mystery and secret
  - type: text
    content: ' of God [concerning what He has done through Christ for the salvation of men] in lofty words of eloquence or human philosophy '
  - type: text
    content: and
  - type: text
    content: ' wisdom;'
  '10':
  - type: text
    content: ' Yet to us God has unveiled '
  - type: text
    content: and
  - type: text
    content: ' revealed them by '
  - type: text
    content: and
  - type: text
    content: ' through His Spirit, for the [Holy] Spirit searches diligently, exploring '
  - type: text
    content: and
  - type: text
    content: ' examining everything, even sounding the profound and bottomless things of God [the divine counsels and things hidden and beyond man''s scrutiny].'
  '11':
  - type: text
    content: ' For what person perceives (knows and understands) what passes through a man''s thoughts except the man''s own spirit within him? Just so no one discerns (comes to know and comprehend) the thoughts of God except the Spirit of God.'
  '12':
  - type: text
    content: ' Now we have not received the spirit [that belongs to] the world, but the [Holy] Spirit Who is from God, [given to us] that we might realize '
  - type: text
    content: and
  - type: text
    content: ' comprehend '
  - type: text
    content: and
  - type: text
    content: ' appreciate the gifts [of divine favor and blessing so freely and lavishly] bestowed on us by God.'
  '13':
  - type: text
    content: ' And we are setting these truths forth in words not taught by human wisdom but taught by the [Holy] Spirit, combining '
  - type: text
    content: and
  - type: text
    content: ' interpreting spiritual truths with spiritual language [to those who possess the Holy Spirit].'
  '14':
  - type: text
    content: ' But the natural, nonspiritual man does not accept '
  - type: text
    content: or
  - type: text
    content: ' welcome '
  - type: text
    content: or
  - type: text
    content: ' admit into his heart the gifts '
  - type: text
    content: and
  - type: text
    content: ' teachings '
  - type: text
    content: and
  - type: text
    content: ' revelations of the Spirit of God, for they are folly (meaningless nonsense) to him; and he is incapable of knowing them [of progressively recognizing, understanding, and becoming better acquainted with them] because they are spiritually discerned '
  - type: text
    content: and
  - type: text
    content: ' estimated '
  - type: text
    content: and
  - type: text
    content: ' appreciated.'
  '15':
  - type: text
    content: ' But the spiritual man tries all things [he examines, investigates, inquires into, questions, and discerns all things], yet is himself to be put on trial and judged by no one [he can read the meaning of everything, but no one can properly discern '
  - type: text
    content: or
  - type: text
    content: ' appraise '
  - type: text
    content: or
  - type: text
    content: ' get an insight into him].'
  '16':
  - type: text
    content: ' For who has known '
  - type: text
    content: or
  - type: text
    content: ' understood the mind (the counsels and purposes) of the Lord so as to guide '
  - type: text
    content: and
  - type: text
    content: ' instruct Him '
  - type: text
    content: and
  - type: text
    content: ' give Him knowledge? But we have the mind of Christ (the Messiah) '
  - type: text
    content: and
  - type: text
    content: ' do hold the thoughts (feelings and purposes) of His heart. [Isa. 40:13.]'
  '2':
  - type: text
    content: ' For I resolved to know nothing (to be acquainted with nothing, to make a display of the knowledge of nothing, and to be conscious of nothing) among you except Jesus Christ (the Messiah) and Him crucified.'
  '3':
  - type: text
    content: ' And I was in (passed into a state of) weakness and fear (dread) and great trembling [after I had come] among you.'
  '4':
  - type: text
    content: ' And my language and my message were not set forth in persuasive (enticing and plausible) words of wisdom, but they were in demonstration of the [Holy] Spirit and power [a proof by the Spirit and power of God, operating on me and stirring in the minds of my hearers the most holy emotions and thus persuading them],'
  '5':
  - type: text
    content: ' So that your faith might not rest in the wisdom of men (human philosophy), but in the power of God.'
  '6':
  - type: text
    content: ' Yet when we are among the full-grown (spiritually mature Christians who are ripe in understanding), we do impart a [higher] wisdom (the knowledge of the divine plan previously hidden); but it is indeed not a wisdom of this present age '
  - type: text
    content: or
  - type: text
    content: ' of this world nor of the leaders '
  - type: text
    content: and
  - type: text
    content: ' rulers of this age, who are being brought to nothing '
  - type: text
    content: and
  - type: text
    content: ' are doomed to pass away.'
  '7':
  - type: text
    content: ' But rather what we are setting forth is a wisdom of God once hidden [from the human understanding] and now revealed to us by God–[that wisdom] which God devised '
  - type: text
    content: and
  - type: text
    content: ' decreed before the ages for our glorification [to lift us into the glory of His presence].'
  '8':
  - type: text
    content: ' None of the rulers of this age '
  - type: text
    content: or
  - type: text
    content: ' world perceived '
  - type: text
    content: and
  - type: text
    content: ' recognized '
  - type: text
    content: and
  - type: text
    content: ' understood this, for if they had, they would never have crucified the Lord of glory.'
  '9':
  - type: text
    content: ' But, on the contrary, as the Scripture says, What eye has not seen and ear has not heard and has not entered into the heart of man, [all that] God has prepared (made and keeps ready) for those who love Him [who hold Him in affectionate reverence, promptly obeying Him and gratefully recognizing the benefits He has bestowed]. [Isa. 64:4; 65:17.]'
