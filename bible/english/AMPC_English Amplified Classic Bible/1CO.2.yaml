document_id: 1CO.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AS FOR myself, brethren, when I came to you, I did not come proclaiming to you the testimony '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evidence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or mystery and secret
    - type: text
      text: ' of God [concerning what He has done through Christ for the salvation of men] in lofty words of eloquence or human philosophy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wisdom;'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Yet to us God has unveiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revealed them by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' through His Spirit, for the [Holy] Spirit searches diligently, exploring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' examining everything, even sounding the profound and bottomless things of God [the divine counsels and things hidden and beyond man''s scrutiny].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For what person perceives (knows and understands) what passes through a man''s thoughts except the man''s own spirit within him? Just so no one discerns (comes to know and comprehend) the thoughts of God except the Spirit of God.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Now we have not received the spirit [that belongs to] the world, but the [Holy] Spirit Who is from God, [given to us] that we might realize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appreciate the gifts [of divine favor and blessing so freely and lavishly] bestowed on us by God.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And we are setting these truths forth in words not taught by human wisdom but taught by the [Holy] Spirit, combining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' interpreting spiritual truths with spiritual language [to those who possess the Holy Spirit].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But the natural, nonspiritual man does not accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' welcome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' admit into his heart the gifts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' teachings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revelations of the Spirit of God, for they are folly (meaningless nonsense) to him; and he is incapable of knowing them [of progressively recognizing, understanding, and becoming better acquainted with them] because they are spiritually discerned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' estimated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appreciated.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But the spiritual man tries all things [he examines, investigates, inquires into, questions, and discerns all things], yet is himself to be put on trial and judged by no one [he can read the meaning of everything, but no one can properly discern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' appraise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' get an insight into him].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For who has known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' understood the mind (the counsels and purposes) of the Lord so as to guide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruct Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give Him knowledge? But we have the mind of Christ (the Messiah) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do hold the thoughts (feelings and purposes) of His heart. [Isa. 40:13.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For I resolved to know nothing (to be acquainted with nothing, to make a display of the knowledge of nothing, and to be conscious of nothing) among you except Jesus Christ (the Messiah) and Him crucified.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And I was in (passed into a state of) weakness and fear (dread) and great trembling [after I had come] among you.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And my language and my message were not set forth in persuasive (enticing and plausible) words of wisdom, but they were in demonstration of the [Holy] Spirit and power [a proof by the Spirit and power of God, operating on me and stirring in the minds of my hearers the most holy emotions and thus persuading them],'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' So that your faith might not rest in the wisdom of men (human philosophy), but in the power of God.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Yet when we are among the full-grown (spiritually mature Christians who are ripe in understanding), we do impart a [higher] wisdom (the knowledge of the divine plan previously hidden); but it is indeed not a wisdom of this present age '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' of this world nor of the leaders '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rulers of this age, who are being brought to nothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are doomed to pass away.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But rather what we are setting forth is a wisdom of God once hidden [from the human understanding] and now revealed to us by God–[that wisdom] which God devised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decreed before the ages for our glorification [to lift us into the glory of His presence].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' None of the rulers of this age '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' world perceived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understood this, for if they had, they would never have crucified the Lord of glory.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But, on the contrary, as the Scripture says, What eye has not seen and ear has not heard and has not entered into the heart of man, [all that] God has prepared (made and keeps ready) for those who love Him [who hold Him in affectionate reverence, promptly obeying Him and gratefully recognizing the benefits He has bestowed]. [Isa. 64:4; 65:17.]'
