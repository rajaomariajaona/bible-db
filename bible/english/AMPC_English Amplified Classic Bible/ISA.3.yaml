document_id: ISA.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' FOR BEHOLD, the Lord, the Lord of hosts, is taking away from Jerusalem and from Judah the stay and the staff [every kind of prop], the whole stay of bread and the whole stay of water,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Say to the righteous that it shall be well with them, for they shall eat the fruit of their deeds.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Woe to the wicked! It shall be ill with them, for what their hands have done shall be done to them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' As for My people, children are their oppressors, and women rule over them. O My people, your leaders cause you to err, and they confuse (destroy and swallow up) the course of your paths.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The Lord stands up to contend, and stands to judge the peoples '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His people.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The Lord enters into judgment with the elders of His people and their princes: For [by your exactions and oppressions you have robbed the people and ruined the country] you have devoured the vineyard; the spoil of the poor is in your houses.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' What do you mean by crushing My people and grinding the faces of the poor? says the Lord God of hosts.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Moreover, the Lord said, Because the daughters of Zion are haughty and walk with outstretched necks and with undisciplined (flirtatious and alluring) eyes, tripping along with mincing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affected gait, and making a tinkling noise with [the anklets on] their feet,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Therefore the Lord will smite with a scab the crown of the heads of the daughters of Zion [making them bald], and the Lord will cause them to be [taken as captives and to suffer the indignity of being] stripped naked.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' In that day the Lord will take away the finery of their tinkling anklets, the caps of network, the crescent head ornaments,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The pendants, the bracelets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' chains, and the spangled face veils '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scarfs,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The mighty man and the man of war, the judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the [professional] prophet, the one who foretells by divination and the old man,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' The headbands, the short ankle chains [attached from one foot to the other to insure a measured gait], the sashes, the perfume boxes, the amulets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' charms [suspended from the ears or neck],'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The signet rings and nose rings,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' The festal robes, the cloaks, the stoles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shawls, and the handbags,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' The hand mirrors, the fine linen [undergarments], the turbans, and the [whole body-enveloping] veils.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And it shall come to pass that instead of the sweet odor of spices there shall be the stench of rottenness; and instead of a girdle, a rope; and instead of well-set hair, baldness; and instead of a rich robe, a girding of sackcloth; and searing [of captives by the scorching heat] instead of beauty.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Your men shall fall by the sword, and your mighty men in battle.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And [Jerusalem''s] gates shall lament and mourn [as those who wail for the dead]; and she, being ruined '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desolate, shall sit upon the ground.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The captain of fifty and the man of rank, the counselor and the expert craftsman and the skillful enchanter.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And I will make boys their princes, and with childishness shall they rule over them [with outrage instead of justice].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And the people shall be oppressed, each one by another, and each one by his neighbor; the child shall behave himself proudly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with insolence against the old man, and the lowborn against the honorable [person of rank].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' When a man shall take hold of his brother in the house of his father, saying, You have a robe, you shall be our judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruler, and this heap of ruins shall be under your control–'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' In that day he will answer, saying, I will not be a healer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' one who binds up; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I am not a physician
    - type: text
      text: '. For in my house is neither bread nor clothing; you shall not make me judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruler of the people.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' For Jerusalem is ruined and Judah is fallen, because their speech and their deeds are against the Lord, to provoke the eyes of His glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defy His glorious presence.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Their respecting of persons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' showing of partiality witnesses against them; they proclaim their sin like Sodom; they do not hide it. Woe to them! For they have brought evil [as a reward upon themselves].'
