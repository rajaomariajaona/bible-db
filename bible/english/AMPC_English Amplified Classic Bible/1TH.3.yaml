document_id: 1TH.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEREFORE, WHEN [the suspense of separation and our yearning for some personal communication from you] became intolerable, we consented to being left behind alone at Athens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And we sent Timothy, our brother and God''s servant in [spreading] the good news (the Gospel) of Christ, to strengthen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish and to exhort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encourage you in your faith,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' That no one [of you] should be disturbed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beguiled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' led astray by these afflictions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' difficulties [to which I have referred]. For you yourselves know that this is [unavoidable in our position, and must be recognized as] our appointed lot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For even when we were with you, [you know] we warned you plainly beforehand that we were to be pressed with difficulties '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made to suffer affliction, just as to your own knowledge it has [since] happened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' That is the reason that, when I could bear [the suspense] no longer, I sent that I might learn [how you were standing the strain, and the endurance of] your faith, [for I was fearful] lest somehow the tempter had tempted you and our toil [among you should prove to] be fruitless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to no purpose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But now that Timothy has just come back to us from [his visit to] you and has brought us the good news of [the steadfastness of] your faith and [the warmth of your] love, and [reported] how kindly you cherish a constant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affectionate remembrance of us [and that you are] longing to see us as we [are to see] you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Brethren, for this reason, in [spite of all] our stress and crushing difficulties we have been filled with comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cheer about you [because of] your faith (the leaning of your whole personality on God in complete trust and confidence).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Because now we [really] live, if you stand [firm] in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For what [adequate] thanksgiving can we render to God for you for all the gladness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight which we enjoy for your sakes before our God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' [And we] continue to pray especially '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with most intense earnestness night and day that we may see you face to face and mend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make good whatever may be imperfect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lacking in your faith.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now may our God and Father Himself and our Lord Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ (the Messiah)
  - type: text
    text: ' guide our steps to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And may the Lord make you to increase and excel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overflow in love for one another and for all people, just as we also do for you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So that He may strengthen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confirm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish your hearts faultlessly pure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unblamable in holiness in the sight of our God and Father, at the coming of our Lord Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ (the Messiah)
  - type: text
    text: ' with all His saints (the holy and glorified people of God)! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen, (so be it)!
