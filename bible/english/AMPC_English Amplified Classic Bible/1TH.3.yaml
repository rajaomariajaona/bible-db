document_id: 1TH.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEREFORE, WHEN [the suspense of separation and our yearning for some personal communication from you] became intolerable, we consented to being left behind alone at Athens.'
  '10':
  - type: text
    content: ' [And we] continue to pray especially '
  - type: text
    content: and
  - type: text
    content: ' with most intense earnestness night and day that we may see you face to face and mend '
  - type: text
    content: and
  - type: text
    content: ' make good whatever may be imperfect '
  - type: text
    content: and
  - type: text
    content: ' lacking in your faith.'
  '11':
  - type: text
    content: ' Now may our God and Father Himself and our Lord Jesus '
  - type: text
    content: Christ (the Messiah)
  - type: text
    content: ' guide our steps to you.'
  '12':
  - type: text
    content: ' And may the Lord make you to increase and excel '
  - type: text
    content: and
  - type: text
    content: ' overflow in love for one another and for all people, just as we also do for you,'
  '13':
  - type: text
    content: ' So that He may strengthen '
  - type: text
    content: and
  - type: text
    content: ' confirm '
  - type: text
    content: and
  - type: text
    content: ' establish your hearts faultlessly pure '
  - type: text
    content: and
  - type: text
    content: ' unblamable in holiness in the sight of our God and Father, at the coming of our Lord Jesus '
  - type: text
    content: Christ (the Messiah)
  - type: text
    content: ' with all His saints (the holy and glorified people of God)! '
  - type: text
    content: Amen, (so be it)!
  '2':
  - type: text
    content: ' And we sent Timothy, our brother and God''s servant in [spreading] the good news (the Gospel) of Christ, to strengthen '
  - type: text
    content: and
  - type: text
    content: ' establish and to exhort '
  - type: text
    content: and
  - type: text
    content: ' comfort '
  - type: text
    content: and
  - type: text
    content: ' encourage you in your faith,'
  '3':
  - type: text
    content: ' That no one [of you] should be disturbed '
  - type: text
    content: and
  - type: text
    content: ' beguiled '
  - type: text
    content: and
  - type: text
    content: ' led astray by these afflictions '
  - type: text
    content: and
  - type: text
    content: ' difficulties [to which I have referred]. For you yourselves know that this is [unavoidable in our position, and must be recognized as] our appointed lot.'
  '4':
  - type: text
    content: ' For even when we were with you, [you know] we warned you plainly beforehand that we were to be pressed with difficulties '
  - type: text
    content: and
  - type: text
    content: ' made to suffer affliction, just as to your own knowledge it has [since] happened.'
  '5':
  - type: text
    content: ' That is the reason that, when I could bear [the suspense] no longer, I sent that I might learn [how you were standing the strain, and the endurance of] your faith, [for I was fearful] lest somehow the tempter had tempted you and our toil [among you should prove to] be fruitless '
  - type: text
    content: and
  - type: text
    content: ' to no purpose.'
  '6':
  - type: text
    content: ' But now that Timothy has just come back to us from [his visit to] you and has brought us the good news of [the steadfastness of] your faith and [the warmth of your] love, and [reported] how kindly you cherish a constant '
  - type: text
    content: and
  - type: text
    content: ' affectionate remembrance of us [and that you are] longing to see us as we [are to see] you,'
  '7':
  - type: text
    content: ' Brethren, for this reason, in [spite of all] our stress and crushing difficulties we have been filled with comfort '
  - type: text
    content: and
  - type: text
    content: ' cheer about you [because of] your faith (the leaning of your whole personality on God in complete trust and confidence).'
  '8':
  - type: text
    content: ' Because now we [really] live, if you stand [firm] in the Lord.'
  '9':
  - type: text
    content: ' For what [adequate] thanksgiving can we render to God for you for all the gladness '
  - type: text
    content: and
  - type: text
    content: ' delight which we enjoy for your sakes before our God?'
