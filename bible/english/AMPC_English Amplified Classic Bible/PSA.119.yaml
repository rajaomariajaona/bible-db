document_id: PSA.119,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BLESSED (HAPPY, fortunate, to be envied) are the undefiled (the upright, truly sincere, and blameless) in the way [of the revealed will of God], who walk (order their conduct and conversation) in the law of the Lord (the whole of God''s revealed will).'
  '10':
  - type: text
    content: ' With my whole heart have I sought You, inquiring for '
  - type: text
    content: and
  - type: text
    content: ' of You '
  - type: text
    content: and
  - type: text
    content: ' yearning for You; Oh, let me not wander '
  - type: text
    content: or
  - type: text
    content: ' step aside [either in ignorance or willfully] from Your commandments. [II Chron. 15:15.]'
  '100':
  - type: text
    content: ' I understand more than the aged, because I keep Your precepts [hearing, receiving, loving, and obeying them].'
  '101':
  - type: text
    content: ' I have restrained my feet from every evil way, that I might keep Your word [hearing, receiving, loving, and obeying it]. [Prov. 1:15.]'
  '102':
  - type: text
    content: ' I have not turned aside from Your ordinances, for You Yourself have taught me.'
  '103':
  - type: text
    content: ' How sweet are Your words to my taste, sweeter than honey to my mouth! [Ps. 19:10; Prov. 8:11.]'
  '104':
  - type: text
    content: ' Through Your precepts I get understanding; therefore I hate every false way.'
  '105':
  - type: text
    content: ' Your word is a lamp to my feet and a light to my path. [Prov. 6:23.]'
  '106':
  - type: text
    content: ' I have sworn [an oath] and have confirmed it, that I will keep Your righteous ordinances [hearing, receiving, loving, and obeying them]. [Neh. 10:29.]'
  '107':
  - type: text
    content: ' I am sorely afflicted; renew '
  - type: text
    content: and
  - type: text
    content: ' quicken me [give me life], O Lord, according to Your word!'
  '108':
  - type: text
    content: ' Accept, I beseech You, the freewill offerings of my mouth, O Lord, and teach me Your ordinances. [Hos. 14:2; Heb. 13:15.]'
  '109':
  - type: text
    content: ' My life is continually in my hand, yet I do not forget Your law.'
  '11':
  - type: text
    content: ' Your word have I laid up in my heart, that I might not sin against You.'
  '110':
  - type: text
    content: ' The wicked have laid a snare for me, yet I do not stray from Your precepts.'
  '111':
  - type: text
    content: ' Your testimonies have I taken as a heritage forever, for they are the rejoicing of my heart. [Deut. 33:4.]'
  '112':
  - type: text
    content: ' I have inclined my heart to perform Your statutes forever, even to the end.'
  '113':
  - type: text
    content: ' I hate the thoughts of undecided [in religion], double-minded people, but Your law do I love.'
  '114':
  - type: text
    content: ' You are my hiding place and my shield; I hope in Your word. [Ps. 32:7; 91:1.]'
  '115':
  - type: text
    content: ' Depart from me, you evildoers, that I may keep the commandments of my God [hearing, receiving, loving, and obeying them]. [Ps. 6:8; 139:19; Matt. 7:23.]'
  '116':
  - type: text
    content: ' Uphold me according to Your promise, that I may live; and let me not be put to shame in my hope! [Ps. 25:2; Rom. 5:5; 9:33; 10:11.]'
  '117':
  - type: text
    content: ' Hold me up, that I may be safe and have regard for Your statutes continually!'
  '118':
  - type: text
    content: ' You spurn '
  - type: text
    content: and
  - type: text
    content: ' set at nought all those who stray from Your statutes, for their own lying deceives them '
  - type: text
    content: and
  - type: text
    content: ' their tricks are in vain.'
  '119':
  - type: text
    content: ' You put away '
  - type: text
    content: and
  - type: text
    content: ' count as dross all the wicked of the earth [for there is no true metal in them]; therefore I love Your testimonies.'
  '12':
  - type: text
    content: ' Blessed are You, O Lord; teach me Your statutes.'
  '120':
  - type: text
    content: ' My flesh trembles '
  - type: text
    content: and
  - type: text
    content: ' shudders for fear '
  - type: text
    content: and
  - type: text
    content: ' reverential, worshipful awe of You, and I am afraid '
  - type: text
    content: and
  - type: text
    content: ' in dread of Your judgments.'
  '121':
  - type: text
    content: ' I have done justice and righteousness; leave me not to those who would oppress me.'
  '122':
  - type: text
    content: ' Be surety for Your servant for good [as Judah was surety for the safety of Benjamin]; let not the proud oppress me. [Gen. 43:9.]'
  '123':
  - type: text
    content: ' My eyes fail, watching for Your salvation and for the fulfillment of Your righteous promise.'
  '124':
  - type: text
    content: ' Deal with Your servant according to Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, and teach me Your statutes.'
  '125':
  - type: text
    content: ' I am Your servant; give me understanding (discernment and comprehension), that I may know (discern and be familiar with the character of) Your testimonies.'
  '126':
  - type: text
    content: ' It is time for the Lord to act; they have frustrated Your law.'
  '127':
  - type: text
    content: ' Therefore I love Your commandments more than [resplendent] gold, yes, more than [perfectly] refined gold.'
  '128':
  - type: text
    content: ' Therefore I esteem as right all, yes, all Your precepts; I hate every false way.'
  '129':
  - type: text
    content: ' Your testimonies are wonderful [far exceeding anything conceived by man]; therefore my [penitent] self keeps them [hearing, receiving, loving, and obeying them].'
  '13':
  - type: text
    content: ' With my lips have I declared '
  - type: text
    content: and
  - type: text
    content: ' recounted all the ordinances of Your mouth.'
  '130':
  - type: text
    content: ' The entrance '
  - type: text
    content: and
  - type: text
    content: ' unfolding of Your words give light; their unfolding gives understanding (discernment and comprehension) to the simple.'
  '131':
  - type: text
    content: ' I opened my mouth and panted [with eager desire], for I longed for Your commandments.'
  '132':
  - type: text
    content: ' Look upon me, be merciful unto me, '
  - type: text
    content: and
  - type: text
    content: ' show me favor, as is Your way to those who love Your name.'
  '133':
  - type: text
    content: ' Establish my steps '
  - type: text
    content: and
  - type: text
    content: ' direct them by [means of] Your word; let not any iniquity have dominion over me.'
  '134':
  - type: text
    content: ' Deliver me from the oppression of man; so will I keep Your precepts [hearing, receiving, loving, and obeying them]. [Luke 1:74.]'
  '135':
  - type: text
    content: ' Make Your face shine [with pleasure] upon Your servant, and teach me Your statutes. [Ps. 4:6.]'
  '136':
  - type: text
    content: ' Streams of water run down my eyes, because men do not keep Your law [they hear it not, nor receive it, love it, or obey it].'
  '137':
  - type: text
    content: ' [Rigidly] righteous are You, O Lord, and upright are Your judgments '
  - type: text
    content: and
  - type: text
    content: ' all expressions of Your will.'
  '138':
  - type: text
    content: ' You have commanded '
  - type: text
    content: and
  - type: text
    content: ' appointed Your testimonies in righteousness and in great faithfulness.'
  '139':
  - type: text
    content: ' My zeal has consumed me '
  - type: text
    content: and
  - type: text
    content: ' cut me off, because my adversaries have forgotten Your words.'
  '14':
  - type: text
    content: ' I have rejoiced in the way of Your testimonies as much as in all riches.'
  '140':
  - type: text
    content: ' Your word is very pure (tried and well refined); therefore Your servant loves it.'
  '141':
  - type: text
    content: ' I am small (insignificant) and despised, but I do not forget Your precepts.'
  '142':
  - type: text
    content: ' Your righteousness is an everlasting righteousness, and Your law is truth. [Ps. 19:9; John 17:17.]'
  '143':
  - type: text
    content: ' Trouble and anguish have found '
  - type: text
    content: and
  - type: text
    content: ' taken hold on me, yet Your commandments are my delight.'
  '144':
  - type: text
    content: ' Your righteous testimonies are everlasting '
  - type: text
    content: and
  - type: text
    content: ' Your decrees are binding to eternity; give me understanding and I shall live [give me discernment and comprehension and I shall not die].'
  '145':
  - type: text
    content: ' I cried with my whole heart; hear me, O Lord; I will keep Your statutes [I will hear, receive, love, and obey them].'
  '146':
  - type: text
    content: ' I cried to You; save me, that I may keep Your testimonies [hearing, receiving, loving, and obeying them].'
  '147':
  - type: text
    content: ' I anticipated the dawning of the morning and cried [in childlike prayer]; I hoped in Your word.'
  '148':
  - type: text
    content: ' My eyes anticipate the night watches '
  - type: text
    content: and
  - type: text
    content: ' I am awake before the cry of the watchman, that I may meditate on Your word.'
  '149':
  - type: text
    content: ' Hear my voice according to Your steadfast love; O Lord, quicken me '
  - type: text
    content: and
  - type: text
    content: ' give me life according to Your [righteous] decrees.'
  '15':
  - type: text
    content: ' I will meditate on Your precepts and have respect to Your ways [the paths of life marked out by Your law]. [Ps. 104:34.]'
  '150':
  - type: text
    content: ' They draw near who follow after wrong thinking '
  - type: text
    content: and
  - type: text
    content: ' persecute me with wickedness; they are far from Your law.'
  '151':
  - type: text
    content: ' You are near, O Lord [nearer to me than my foes], and all Your commandments are truth.'
  '152':
  - type: text
    content: ' Of old have I known Your testimonies, '
  - type: text
    content: and
  - type: text
    content: ' for a long time, [therefore it is a thoroughly established conviction] that You have founded them forever. [Luke 21:33.]'
  '153':
  - type: text
    content: ' Consider my affliction and deliver me, for I do not forget Your law.'
  '154':
  - type: text
    content: ' Plead my cause and redeem me; revive me '
  - type: text
    content: and
  - type: text
    content: ' give me life according to Your word.'
  '155':
  - type: text
    content: ' Salvation is far from the wicked, for they seek not '
  - type: text
    content: nor
  - type: text
    content: ' hunger for Your statutes.'
  '156':
  - type: text
    content: ' Great are Your tender mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, O Lord; give me life according to Your ordinances.'
  '157':
  - type: text
    content: ' Many are my persecutors and my adversaries, yet I do not swerve from Your testimonies.'
  '158':
  - type: text
    content: ' I behold the treacherous and am grieved '
  - type: text
    content: and
  - type: text
    content: ' loathe them, because they do not respect Your law [neither hearing, receiving, loving, nor obeying it].'
  '159':
  - type: text
    content: ' Consider how I love Your precepts; revive me '
  - type: text
    content: and
  - type: text
    content: ' give life to me, O Lord, according to Your loving-kindness!'
  '16':
  - type: text
    content: ' I will delight myself in Your statutes; I will not forget Your word.'
  '160':
  - type: text
    content: ' The sum of Your word is truth [the total of the full meaning of all Your individual precepts]; and every one of Your righteous decrees endures forever.'
  '161':
  - type: text
    content: ' Princes pursue '
  - type: text
    content: and
  - type: text
    content: ' persecute me without cause, but my heart stands in awe of Your words [dreading violation of them far more than the force of prince or potentate]. [I Sam. 24:11, 14; 26:18.]'
  '162':
  - type: text
    content: ' I rejoice at Your word as one who finds great spoil.'
  '163':
  - type: text
    content: ' I hate and abhor falsehood, but Your law do I love.'
  '164':
  - type: text
    content: ' Seven times a day '
  - type: text
    content: and
  - type: text
    content: ' all day long do I praise You because of Your righteous decrees.'
  '165':
  - type: text
    content: ' Great peace have they who love Your law; nothing shall offend them '
  - type: text
    content: or
  - type: text
    content: ' make them stumble. [Prov. 3:2; Isa. 32:17.]'
  '166':
  - type: text
    content: ' I am hoping '
  - type: text
    content: and
  - type: text
    content: ' waiting [eagerly] for Your salvation, O Lord, and I do Your commandments. [Gen. 49:18.]'
  '167':
  - type: text
    content: ' Your testimonies have I kept [hearing, receiving, loving, and obeying them]; I love them exceedingly!'
  '168':
  - type: text
    content: ' I have observed Your precepts '
  - type: text
    content: and
  - type: text
    content: ' Your testimonies, for all my ways are [fully known] before You.'
  '169':
  - type: text
    content: ' Let my mournful cry '
  - type: text
    content: and
  - type: text
    content: ' supplication come [near] before You, O Lord; give me understanding (discernment and comprehension) according to Your word [of assurance and promise].'
  '17':
  - type: text
    content: ' Deal bountifully with Your servant, that I may live; and I will observe Your word [hearing, receiving, loving, and obeying it]. [Ps. 119:97-101.]'
  '170':
  - type: text
    content: ' Let my supplication come before You; deliver me according to Your word!'
  '171':
  - type: text
    content: ' My lips shall pour forth praise [with thanksgiving and renewed trust] when You teach me Your statutes.'
  '172':
  - type: text
    content: ' My tongue shall sing [praise for the fulfillment] of Your word, for all Your commandments are righteous.'
  '173':
  - type: text
    content: ' Let Your hand be ready to help me, for I have chosen Your precepts.'
  '174':
  - type: text
    content: ' I have longed for Your salvation, O Lord, and Your law is my delight.'
  '175':
  - type: text
    content: ' Let me live that I may praise You, and let Your decrees help me.'
  '176':
  - type: text
    content: ' I have gone astray like a lost sheep; seek, inquire for, '
  - type: text
    content: and
  - type: text
    content: ' demand Your servant, for I do not forget Your commandments. [Isa. 53:6; Luke 15:4; I Pet. 2:25.]'
  '18':
  - type: text
    content: ' Open my eyes, that I may behold wondrous things out of Your law.'
  '19':
  - type: text
    content: ' I am a stranger '
  - type: text
    content: and
  - type: text
    content: ' a temporary resident on the earth; hide not Your commandments from me. [Gen. 47:9; I Chron. 29:15; Ps. 39:12; II Cor. 5:6; Heb. 11:13.]'
  '2':
  - type: text
    content: ' Blessed (happy, fortunate, to be envied) are they who keep His testimonies, and who seek, inquire for '
  - type: text
    content: and
  - type: text
    content: ' of Him '
  - type: text
    content: and
  - type: text
    content: ' crave Him with the whole heart.'
  '20':
  - type: text
    content: ' My heart is breaking with the longing that it has for Your ordinances '
  - type: text
    content: and
  - type: text
    content: ' judgments at all times.'
  '21':
  - type: text
    content: ' You rebuke the proud '
  - type: text
    content: and
  - type: text
    content: ' arrogant, the accursed ones, who err '
  - type: text
    content: and
  - type: text
    content: ' wander from Your commandments.'
  '22':
  - type: text
    content: ' Take away from me reproach and contempt, for I keep Your testimonies.'
  '23':
  - type: text
    content: ' Princes also sat '
  - type: text
    content: and
  - type: text
    content: ' talked against me, but Your servant meditated on Your statutes.'
  '24':
  - type: text
    content: ' Your testimonies also are my delight and my counselors.'
  '25':
  - type: text
    content: ' My earthly life cleaves to the dust; revive '
  - type: text
    content: and
  - type: text
    content: ' stimulate me according to Your word! [Ps. 143:11.]'
  '26':
  - type: text
    content: ' I have declared my ways '
  - type: text
    content: and
  - type: text
    content: ' opened my griefs to You, and You listened to me; teach me Your statutes.'
  '27':
  - type: text
    content: ' Make me understand the way of Your precepts; so shall I meditate on '
  - type: text
    content: and
  - type: text
    content: ' talk of Your wondrous works. [Ps. 145:5, 6.]'
  '28':
  - type: text
    content: ' My life dissolves '
  - type: text
    content: and
  - type: text
    content: ' weeps itself away for heaviness; raise me up '
  - type: text
    content: and
  - type: text
    content: ' strengthen me according to [the promises of] Your word.'
  '29':
  - type: text
    content: ' Remove from me the way of falsehood '
  - type: text
    content: and
  - type: text
    content: ' unfaithfulness [to You], and graciously impart Your law to me.'
  '3':
  - type: text
    content: ' Yes, they do no unrighteousness [no willful wandering from His precepts]; they walk in His ways. [I John 3:9; 5:18.]'
  '30':
  - type: text
    content: ' I have chosen the way of truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness; Your ordinances have I set before me.'
  '31':
  - type: text
    content: ' I cleave to Your testimonies; O Lord, put me not to shame!'
  '32':
  - type: text
    content: ' I will [not merely walk, but] run the way of Your commandments, when You give me a heart that is willing.'
  '33':
  - type: text
    content: ' Teach me, O Lord, the way of Your statutes, and I will keep it to the end [steadfastly].'
  '34':
  - type: text
    content: ' Give me understanding, that I may keep Your law; yes, I will observe it with my whole heart. [Prov. 2:6; James 1:5.]'
  '35':
  - type: text
    content: ' Make me go in the path of Your commandments, for in them do I delight.'
  '36':
  - type: text
    content: ' Incline my heart to Your testimonies and not to covetousness (robbery, sensuality, unworthy riches). [Ezek. 33:31; Mark 7:21, 22; I Tim. 6:10; Heb. 13:5.]'
  '37':
  - type: text
    content: ' Turn away my eyes from beholding vanity (idols and idolatry); and restore me to vigorous life '
  - type: text
    content: and
  - type: text
    content: ' health in Your ways.'
  '38':
  - type: text
    content: ' Establish Your word '
  - type: text
    content: and
  - type: text
    content: ' confirm Your promise to Your servant, which is for those who reverently fear '
  - type: text
    content: and
  - type: text
    content: ' devotedly worship You. [Deut. 10:12; Ps. 96:9.]'
  '39':
  - type: text
    content: ' Turn away my reproach which I fear '
  - type: text
    content: and
  - type: text
    content: ' dread, for Your ordinances are good.'
  '4':
  - type: text
    content: ' You have commanded us to keep Your precepts, that we should observe them diligently.'
  '40':
  - type: text
    content: ' Behold, I long for Your precepts; in Your righteousness give me renewed life.'
  '41':
  - type: text
    content: ' Let Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness come also to me, O Lord, even Your salvation according to Your promise;'
  '42':
  - type: text
    content: ' Then shall I have an answer for those who taunt '
  - type: text
    content: and
  - type: text
    content: ' reproach me, for I lean on, rely on, '
  - type: text
    content: and
  - type: text
    content: ' trust in Your word.'
  '43':
  - type: text
    content: ' And take not the word of truth utterly out of my mouth, for I hope in Your ordinances.'
  '44':
  - type: text
    content: ' I will keep Your law continually, forever and ever [hearing, receiving, loving, and obeying it].'
  '45':
  - type: text
    content: ' And I will walk at liberty '
  - type: text
    content: and
  - type: text
    content: ' at ease, for I have sought and inquired for [and desperately required] Your precepts.'
  '46':
  - type: text
    content: ' I will speak of Your testimonies also before kings and will not be put to shame. [Ps. 138:1; Matt. 10:18, 19; Acts 26:1, 2.]'
  '47':
  - type: text
    content: ' For I will delight myself in Your commandments, which I love.'
  '48':
  - type: text
    content: ' My hands also will I lift up [in fervent supplication] to Your commandments, which I love, and I will meditate on Your statutes.'
  '49':
  - type: text
    content: ' Remember [fervently] the word '
  - type: text
    content: and
  - type: text
    content: ' promise to Your servant, in which You have caused me to hope.'
  '5':
  - type: text
    content: ' Oh, that my ways were directed '
  - type: text
    content: and
  - type: text
    content: ' established to observe Your statutes [hearing, receiving, loving, and obeying them]!'
  '50':
  - type: text
    content: ' This is my comfort '
  - type: text
    content: and
  - type: text
    content: ' consolation in my affliction: that Your word has revived me '
  - type: text
    content: and
  - type: text
    content: ' given me life. [Rom. 15:4.]'
  '51':
  - type: text
    content: ' The proud have had me greatly in derision, yet have I not declined in my interest in '
  - type: text
    content: or
  - type: text
    content: ' turned aside from Your law.'
  '52':
  - type: text
    content: ' When I have [earnestly] recalled Your ordinances from of old, O Lord, I have taken comfort.'
  '53':
  - type: text
    content: ' Burning indignation, terror, '
  - type: text
    content: and
  - type: text
    content: ' sadness seize upon me because of the wicked, who forsake Your law.'
  '54':
  - type: text
    content: ' Your statutes have been my songs in the house of my pilgrimage.'
  '55':
  - type: text
    content: ' I have [earnestly] remembered Your name, O Lord, in the night, and I have observed Your law.'
  '56':
  - type: text
    content: ' This I have had [as the gift of Your grace and as my reward]: that I have kept Your precepts [hearing, receiving, loving, and obeying them].'
  '57':
  - type: text
    content: ' You are my portion, O Lord; I have promised to keep Your words.'
  '58':
  - type: text
    content: ' I entreated Your favor with my whole heart; be merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious to me according to Your promise.'
  '59':
  - type: text
    content: ' I considered my ways; I turned my feet to [obey] Your testimonies.'
  '6':
  - type: text
    content: ' Then shall I not be put to shame [by failing to inherit Your promises] when I have respect to all Your commandments.'
  '60':
  - type: text
    content: ' I made haste and delayed not to keep Your commandments.'
  '61':
  - type: text
    content: ' Though the cords of the wicked have enclosed '
  - type: text
    content: and
  - type: text
    content: ' ensnared me, I have not forgotten Your law.'
  '62':
  - type: text
    content: ' At midnight I will rise to give thanks to You because of Your righteous ordinances.'
  '63':
  - type: text
    content: ' I am a companion of all those who fear, revere, '
  - type: text
    content: and
  - type: text
    content: ' worship You, and of those who observe '
  - type: text
    content: and
  - type: text
    content: ' give heed to Your precepts.'
  '64':
  - type: text
    content: ' The earth, O Lord, is full of Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness; teach me Your statutes.'
  '65':
  - type: text
    content: ' You have dealt well with Your servant, O Lord, according to Your promise.'
  '66':
  - type: text
    content: ' Teach me good judgment, wise '
  - type: text
