document_id: PSA.119
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BLESSED (HAPPY, fortunate, to be envied) are the undefiled (the upright, truly sincere, and blameless) in the way [of the revealed will of God], who walk (order their conduct and conversation) in the law of the Lord (the whole of God''s revealed will).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Blessed (happy, fortunate, to be envied) are they who keep His testimonies, and who seek, inquire for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crave Him with the whole heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Yes, they do no unrighteousness [no willful wandering from His precepts]; they walk in His ways. [I John 3:9; 5:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' You have commanded us to keep Your precepts, that we should observe them diligently.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Oh, that my ways were directed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established to observe Your statutes [hearing, receiving, loving, and obeying them]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then shall I not be put to shame [by failing to inherit Your promises] when I have respect to all Your commandments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' I will praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks to You with uprightness of heart when I learn [by sanctified experiences] Your righteous judgments [Your decisions against and punishments for particular lines of thought and conduct].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I will keep Your statutes; O forsake me not utterly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' How shall a young man cleanse his way? By taking heed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keeping watch [on himself] according to Your word [conforming his life to it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' With my whole heart have I sought You, inquiring for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yearning for You; Oh, let me not wander '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' step aside [either in ignorance or willfully] from Your commandments. [II Chron. 15:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Your word have I laid up in my heart, that I might not sin against You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Blessed are You, O Lord; teach me Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' With my lips have I declared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recounted all the ordinances of Your mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I have rejoiced in the way of Your testimonies as much as in all riches.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I will meditate on Your precepts and have respect to Your ways [the paths of life marked out by Your law]. [Ps. 104:34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I will delight myself in Your statutes; I will not forget Your word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Deal bountifully with Your servant, that I may live; and I will observe Your word [hearing, receiving, loving, and obeying it]. [Ps. 119:97-101.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Open my eyes, that I may behold wondrous things out of Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' I am a stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a temporary resident on the earth; hide not Your commandments from me. [Gen. 47:9; I Chron. 29:15; Ps. 39:12; II Cor. 5:6; Heb. 11:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' My heart is breaking with the longing that it has for Your ordinances '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judgments at all times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' You rebuke the proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant, the accursed ones, who err '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wander from Your commandments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Take away from me reproach and contempt, for I keep Your testimonies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Princes also sat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' talked against me, but Your servant meditated on Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Your testimonies also are my delight and my counselors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' My earthly life cleaves to the dust; revive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stimulate me according to Your word! [Ps. 143:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' I have declared my ways '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' opened my griefs to You, and You listened to me; teach me Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Make me understand the way of Your precepts; so shall I meditate on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' talk of Your wondrous works. [Ps. 145:5, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' My life dissolves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weeps itself away for heaviness; raise me up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthen me according to [the promises of] Your word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Remove from me the way of falsehood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unfaithfulness [to You], and graciously impart Your law to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' I have chosen the way of truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness; Your ordinances have I set before me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' I cleave to Your testimonies; O Lord, put me not to shame!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' I will [not merely walk, but] run the way of Your commandments, when You give me a heart that is willing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Teach me, O Lord, the way of Your statutes, and I will keep it to the end [steadfastly].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Give me understanding, that I may keep Your law; yes, I will observe it with my whole heart. [Prov. 2:6; James 1:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Make me go in the path of Your commandments, for in them do I delight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Incline my heart to Your testimonies and not to covetousness (robbery, sensuality, unworthy riches). [Ezek. 33:31; Mark 7:21, 22; I Tim. 6:10; Heb. 13:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Turn away my eyes from beholding vanity (idols and idolatry); and restore me to vigorous life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' health in Your ways.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Establish Your word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confirm Your promise to Your servant, which is for those who reverently fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devotedly worship You. [Deut. 10:12; Ps. 96:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Turn away my reproach which I fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread, for Your ordinances are good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Behold, I long for Your precepts; in Your righteousness give me renewed life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Let Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness come also to me, O Lord, even Your salvation according to Your promise;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Then shall I have an answer for those who taunt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproach me, for I lean on, rely on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust in Your word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And take not the word of truth utterly out of my mouth, for I hope in Your ordinances.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' I will keep Your law continually, forever and ever [hearing, receiving, loving, and obeying it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And I will walk at liberty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' at ease, for I have sought and inquired for [and desperately required] Your precepts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' I will speak of Your testimonies also before kings and will not be put to shame. [Ps. 138:1; Matt. 10:18, 19; Acts 26:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' For I will delight myself in Your commandments, which I love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' My hands also will I lift up [in fervent supplication] to Your commandments, which I love, and I will meditate on Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' Remember [fervently] the word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' promise to Your servant, in which You have caused me to hope.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' This is my comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consolation in my affliction: that Your word has revived me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' given me life. [Rom. 15:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' The proud have had me greatly in derision, yet have I not declined in my interest in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' turned aside from Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' When I have [earnestly] recalled Your ordinances from of old, O Lord, I have taken comfort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' Burning indignation, terror, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sadness seize upon me because of the wicked, who forsake Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' Your statutes have been my songs in the house of my pilgrimage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' I have [earnestly] remembered Your name, O Lord, in the night, and I have observed Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' This I have had [as the gift of Your grace and as my reward]: that I have kept Your precepts [hearing, receiving, loving, and obeying them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' You are my portion, O Lord; I have promised to keep Your words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' I entreated Your favor with my whole heart; be merciful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gracious to me according to Your promise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: ' I considered my ways; I turned my feet to [obey] Your testimonies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: ' I made haste and delayed not to keep Your commandments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ' Though the cords of the wicked have enclosed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ensnared me, I have not forgotten Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: ' At midnight I will rise to give thanks to You because of Your righteous ordinances.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: ' I am a companion of all those who fear, revere, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship You, and of those who observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give heed to Your precepts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: ' The earth, O Lord, is full of Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness; teach me Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: ' You have dealt well with Your servant, O Lord, according to Your promise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: ' Teach me good judgment, wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right discernment, and knowledge, for I have believed (trusted, relied on, and clung to) Your commandments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: ' Before I was afflicted I went astray, but now Your word do I keep [hearing, receiving, loving, and obeying it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: ' You are good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kind and do good; teach me Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: ' The arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godless have put together a lie against me, but I will keep Your precepts with my whole heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: ' Their hearts are as fat as grease [their minds are dull and brutal], but I delight in Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: ' It is good for me that I have been afflicted, that I might learn Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: ' The law from Your mouth is better to me than thousands of gold and silver pieces.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: ' Your hands have made me, cunningly fashioned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established me; give me understanding, that I may learn Your commandments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: ' Those who reverently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fear You will see me and be glad, because I have hoped in Your word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tarried for it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: ' I know, O Lord, that Your judgments are right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous, and that in faithfulness You have afflicted me. [Heb. 12:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: ' Let, I pray You, Your merciful kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast love be for my comfort, according to Your promise to Your servant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: ' Let Your tender mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness come to me that I may live, for Your law is my delight!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: ' Let the proud be put to shame, for they dealt perversely with me without a cause; but I will meditate on Your precepts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: ' Let those who reverently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fear You turn to me, and those who have known Your testimonies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: ' Let my heart be sound (sincere and wholehearted and blameless) in Your statutes, that I may not be put to shame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '81'
  - type: text
    text: ' My soul languishes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grows faint for Your salvation, but I hope in Your word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '82'
  - type: text
    text: ' My eyes fail, watching for [the fulfillment of] Your promise. I say, When will You comfort me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '83'
  - type: text
    text: ' For I have become like a bottle [a wineskin blackened and shriveled] in the smoke [in which it hangs], yet do I not forget Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '84'
  - type: text
    text: ' How many are the days of Your servant [which he must endure]? When will You judge those who pursue and persecute me? [Rev. 6:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '85'
  - type: text
    text: ' The godless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant have dug pitfalls for me, men who do not conform to Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '86'
  - type: text
    text: ' All Your commandments are faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sure. [The godless] pursue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecute me with falsehood; help me [Lord]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '87'
  - type: text
    text: ' They had almost consumed me upon earth, but I forsook not Your precepts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: ' According to Your steadfast love give life to me; then I will keep the testimony of Your mouth [hearing, receiving, loving, and obeying it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '89'
  - type: text
    text: ' Forever, O Lord, Your word is settled in heaven [stands firm as the heavens]. [Ps. 89:2; Matt. 24:34, 35; I Pet. 1:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '90'
  - type: text
    text: ' Your faithfulness is from generation to generation; You have established the earth, and it stands fast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '91'
  - type: text
    text: ' All [the whole universe] are Your servants; therefore they continue this day according to Your ordinances. [Jer. 33:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '92'
  - type: text
    text: ' Unless Your law had been my delight, I would have perished in my affliction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '93'
  - type: text
    text: ' I will never forget Your precepts, [how can I?] for it is by them You have quickened me (granted me life).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '94'
  - type: text
    text: ' I am Yours, therefore save me [Your own]; for I have sought (inquired of and for) Your precepts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' required them [as my urgent need]. [Ps. 42:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '95'
  - type: text
    text: ' The wicked wait for me to destroy me, but I will consider Your testimonies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '96'
  - type: text
    text: ' I have seen that everything [human] has its limits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' end [no matter how extensive, noble, and excellent]; but Your commandment is exceedingly broad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extends without limits [into eternity]. [Rom. 3:10-19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '97'
  - type: text
    text: ' Oh, how love I Your law! It is my meditation all the day. [Ps. 1:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '98'
  - type: text
    text: ' You, through Your commandments, make me wiser than my enemies, for [Your words] are ever before me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '99'
  - type: text
    text: ' I have better understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deeper insight than all my teachers, because Your testimonies are my meditation. [II Tim. 3:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '100'
  - type: text
    text: ' I understand more than the aged, because I keep Your precepts [hearing, receiving, loving, and obeying them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '101'
  - type: text
    text: ' I have restrained my feet from every evil way, that I might keep Your word [hearing, receiving, loving, and obeying it]. [Prov. 1:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '102'
  - type: text
    text: ' I have not turned aside from Your ordinances, for You Yourself have taught me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '103'
  - type: text
    text: ' How sweet are Your words to my taste, sweeter than honey to my mouth! [Ps. 19:10; Prov. 8:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '104'
  - type: text
    text: ' Through Your precepts I get understanding; therefore I hate every false way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '105'
  - type: text
    text: ' Your word is a lamp to my feet and a light to my path. [Prov. 6:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '106'
  - type: text
    text: ' I have sworn [an oath] and have confirmed it, that I will keep Your righteous ordinances [hearing, receiving, loving, and obeying them]. [Neh. 10:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '107'
  - type: text
    text: ' I am sorely afflicted; renew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quicken me [give me life], O Lord, according to Your word!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '108'
  - type: text
    text: ' Accept, I beseech You, the freewill offerings of my mouth, O Lord, and teach me Your ordinances. [Hos. 14:2; Heb. 13:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '109'
  - type: text
    text: ' My life is continually in my hand, yet I do not forget Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '110'
  - type: text
    text: ' The wicked have laid a snare for me, yet I do not stray from Your precepts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '111'
  - type: text
    text: ' Your testimonies have I taken as a heritage forever, for they are the rejoicing of my heart. [Deut. 33:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '112'
  - type: text
    text: ' I have inclined my heart to perform Your statutes forever, even to the end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '113'
  - type: text
    text: ' I hate the thoughts of undecided [in religion], double-minded people, but Your law do I love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '114'
  - type: text
    text: ' You are my hiding place and my shield; I hope in Your word. [Ps. 32:7; 91:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '115'
  - type: text
    text: ' Depart from me, you evildoers, that I may keep the commandments of my God [hearing, receiving, loving, and obeying them]. [Ps. 6:8; 139:19; Matt. 7:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '116'
  - type: text
    text: ' Uphold me according to Your promise, that I may live; and let me not be put to shame in my hope! [Ps. 25:2; Rom. 5:5; 9:33; 10:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '117'
  - type: text
    text: ' Hold me up, that I may be safe and have regard for Your statutes continually!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '118'
  - type: text
    text: ' You spurn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set at nought all those who stray from Your statutes, for their own lying deceives them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their tricks are in vain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '119'
  - type: text
    text: ' You put away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' count as dross all the wicked of the earth [for there is no true metal in them]; therefore I love Your testimonies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '120'
  - type: text
    text: ' My flesh trembles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shudders for fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverential, worshipful awe of You, and I am afraid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in dread of Your judgments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '121'
  - type: text
    text: ' I have done justice and righteousness; leave me not to those who would oppress me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '122'
  - type: text
    text: ' Be surety for Your servant for good [as Judah was surety for the safety of Benjamin]; let not the proud oppress me. [Gen. 43:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '123'
  - type: text
    text: ' My eyes fail, watching for Your salvation and for the fulfillment of Your righteous promise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '124'
  - type: text
    text: ' Deal with Your servant according to Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, and teach me Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '125'
  - type: text
    text: ' I am Your servant; give me understanding (discernment and comprehension), that I may know (discern and be familiar with the character of) Your testimonies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '126'
  - type: text
    text: ' It is time for the Lord to act; they have frustrated Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '127'
  - type: text
    text: ' Therefore I love Your commandments more than [resplendent] gold, yes, more than [perfectly] refined gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '128'
  - type: text
    text: ' Therefore I esteem as right all, yes, all Your precepts; I hate every false way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '129'
  - type: text
    text: ' Your testimonies are wonderful [far exceeding anything conceived by man]; therefore my [penitent] self keeps them [hearing, receiving, loving, and obeying them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '130'
  - type: text
    text: ' The entrance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unfolding of Your words give light; their unfolding gives understanding (discernment and comprehension) to the simple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '131'
  - type: text
    text: ' I opened my mouth and panted [with eager desire], for I longed for Your commandments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '132'
  - type: text
    text: ' Look upon me, be merciful unto me, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' show me favor, as is Your way to those who love Your name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '133'
  - type: text
    text: ' Establish my steps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' direct them by [means of] Your word; let not any iniquity have dominion over me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '134'
  - type: text
    text: ' Deliver me from the oppression of man; so will I keep Your precepts [hearing, receiving, loving, and obeying them]. [Luke 1:74.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '135'
  - type: text
    text: ' Make Your face shine [with pleasure] upon Your servant, and teach me Your statutes. [Ps. 4:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '136'
  - type: text
    text: ' Streams of water run down my eyes, because men do not keep Your law [they hear it not, nor receive it, love it, or obey it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '137'
  - type: text
    text: ' [Rigidly] righteous are You, O Lord, and upright are Your judgments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' all expressions of Your will.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '138'
  - type: text
    text: ' You have commanded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appointed Your testimonies in righteousness and in great faithfulness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '139'
  - type: text
    text: ' My zeal has consumed me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cut me off, because my adversaries have forgotten Your words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '140'
  - type: text
    text: ' Your word is very pure (tried and well refined); therefore Your servant loves it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '141'
  - type: text
    text: ' I am small (insignificant) and despised, but I do not forget Your precepts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '142'
  - type: text
    text: ' Your righteousness is an everlasting righteousness, and Your law is truth. [Ps. 19:9; John 17:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '143'
  - type: text
    text: ' Trouble and anguish have found '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taken hold on me, yet Your commandments are my delight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '144'
  - type: text
    text: ' Your righteous testimonies are everlasting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your decrees are binding to eternity; give me understanding and I shall live [give me discernment and comprehension and I shall not die].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '145'
  - type: text
    text: ' I cried with my whole heart; hear me, O Lord; I will keep Your statutes [I will hear, receive, love, and obey them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '146'
  - type: text
    text: ' I cried to You; save me, that I may keep Your testimonies [hearing, receiving, loving, and obeying them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '147'
  - type: text
    text: ' I anticipated the dawning of the morning and cried [in childlike prayer]; I hoped in Your word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '148'
  - type: text
    text: ' My eyes anticipate the night watches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I am awake before the cry of the watchman, that I may meditate on Your word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '149'
  - type: text
    text: ' Hear my voice according to Your steadfast love; O Lord, quicken me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give me life according to Your [righteous] decrees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '150'
  - type: text
    text: ' They draw near who follow after wrong thinking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecute me with wickedness; they are far from Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '151'
  - type: text
    text: ' You are near, O Lord [nearer to me than my foes], and all Your commandments are truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '152'
  - type: text
    text: ' Of old have I known Your testimonies, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for a long time, [therefore it is a thoroughly established conviction] that You have founded them forever. [Luke 21:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '153'
  - type: text
    text: ' Consider my affliction and deliver me, for I do not forget Your law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '154'
  - type: text
    text: ' Plead my cause and redeem me; revive me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give me life according to Your word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '155'
  - type: text
    text: ' Salvation is far from the wicked, for they seek not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' hunger for Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '156'
  - type: text
    text: ' Great are Your tender mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, O Lord; give me life according to Your ordinances.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '157'
  - type: text
    text: ' Many are my persecutors and my adversaries, yet I do not swerve from Your testimonies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '158'
  - type: text
    text: ' I behold the treacherous and am grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loathe them, because they do not respect Your law [neither hearing, receiving, loving, nor obeying it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '159'
  - type: text
    text: ' Consider how I love Your precepts; revive me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give life to me, O Lord, according to Your loving-kindness!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '160'
  - type: text
    text: ' The sum of Your word is truth [the total of the full meaning of all Your individual precepts]; and every one of Your righteous decrees endures forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '161'
  - type: text
    text: ' Princes pursue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecute me without cause, but my heart stands in awe of Your words [dreading violation of them far more than the force of prince or potentate]. [I Sam. 24:11, 14; 26:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '162'
  - type: text
    text: ' I rejoice at Your word as one who finds great spoil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '163'
  - type: text
    text: ' I hate and abhor falsehood, but Your law do I love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '164'
  - type: text
    text: ' Seven times a day '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' all day long do I praise You because of Your righteous decrees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '165'
  - type: text
    text: ' Great peace have they who love Your law; nothing shall offend them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' make them stumble. [Prov. 3:2; Isa. 32:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '166'
  - type: text
    text: ' I am hoping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' waiting [eagerly] for Your salvation, O Lord, and I do Your commandments. [Gen. 49:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '167'
  - type: text
    text: ' Your testimonies have I kept [hearing, receiving, loving, and obeying them]; I love them exceedingly!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '168'
  - type: text
    text: ' I have observed Your precepts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your testimonies, for all my ways are [fully known] before You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '169'
  - type: text
    text: ' Let my mournful cry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' supplication come [near] before You, O Lord; give me understanding (discernment and comprehension) according to Your word [of assurance and promise].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '170'
  - type: text
    text: ' Let my supplication come before You; deliver me according to Your word!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '171'
  - type: text
    text: ' My lips shall pour forth praise [with thanksgiving and renewed trust] when You teach me Your statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '172'
  - type: text
    text: ' My tongue shall sing [praise for the fulfillment] of Your word, for all Your commandments are righteous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '173'
  - type: text
    text: ' Let Your hand be ready to help me, for I have chosen Your precepts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '174'
  - type: text
    text: ' I have longed for Your salvation, O Lord, and Your law is my delight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '175'
  - type: text
    text: ' Let me live that I may praise You, and let Your decrees help me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '176'
  - type: text
    text: ' I have gone astray like a lost sheep; seek, inquire for, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demand Your servant, for I do not forget Your commandments. [Isa. 53:6; Luke 15:4; I Pet. 2:25.]'
