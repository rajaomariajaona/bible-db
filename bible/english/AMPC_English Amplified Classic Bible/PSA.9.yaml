document_id: PSA.9,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; set for +[possibly+] soprano voices. A Psalm of David.
  - type: text
    content: ' I WILL praise You, O Lord, with my whole heart; I will show forth (recount and tell aloud) all Your marvelous works '
  - type: text
    content: and
  - type: text
    content: ' wonderful deeds!'
  '10':
  - type: text
    content: ' And they who know Your name [who have experience and acquaintance with Your mercy] will lean on '
  - type: text
    content: and
  - type: text
    content: ' confidently put their trust in You, for You, Lord, have not forsaken those who seek (inquire of and for) You [on the authority of God''s Word and the right of their necessity]. [Ps. 42:1.]'
  '11':
  - type: text
    content: ' Sing praises to the Lord, Who dwells in Zion! Declare among the peoples His doings!'
  '12':
  - type: text
    content: ' For He Who avenges the blood [of His people shed unjustly] remembers them; He does not forget the cry of the afflicted (the poor and the humble).'
  '13':
  - type: text
    content: ' Have mercy upon me '
  - type: text
    content: and
  - type: text
    content: ' be gracious '
  - type: text
    content: to me,
  - type: text
    content: ' O Lord; consider how I am afflicted by those who hate me, You Who lift me up from the gates of death,'
  '14':
  - type: text
    content: ' That I may show forth (recount and tell aloud) all Your praises! In the gates of the Daughter of Zion I will rejoice in Your salvation '
  - type: text
    content: and
  - type: text
    content: ' Your saving help.'
  '15':
  - type: text
    content: ' The nations have sunk down in the pit that they made; in the net which they hid is their own foot caught.'
  '16':
  - type: text
    content: ' The Lord has made Himself known; He executes judgment; the wicked are snared in the work of their own hands. Higgaion [meditation]. Selah [pause, and calmly think of that]!'
  '17':
  - type: text
    content: ' The wicked shall be turned back [headlong into premature death] into Sheol (the place of the departed spirits of the wicked), even all the nations that forget '
  - type: text
    content: or
  - type: text
    content: ' are forgetful of God.'
  '18':
  - type: text
    content: ' For the needy shall not always be forgotten, and the expectation '
  - type: text
    content: and
  - type: text
    content: ' hope of the meek '
  - type: text
    content: and
  - type: text
    content: ' the poor shall not perish forever.'
  '19':
  - type: text
    content: ' Arise, O Lord! Let not man prevail; let the nations be judged before You.'
  '2':
  - type: text
    content: ' I will rejoice in You and be in high spirits; I will sing praise to Your name, O Most High!'
  '20':
  - type: text
    content: ' Put them in fear [make them realize their frail nature], O Lord, that the nations may know themselves to be but men. Selah [pause, and calmly think of that]!'
  '3':
  - type: text
    content: ' When my enemies turned back, they stumbled and perished before You.'
  '4':
  - type: text
    content: ' For You have maintained my right and my cause; You sat on the throne judging righteously.'
  '5':
  - type: text
    content: ' You have rebuked the nations, You have destroyed the wicked; You have blotted out their name forever and ever.'
  '6':
  - type: text
    content: ' The enemy have been cut off '
  - type: text
    content: and
  - type: text
    content: ' have vanished in everlasting ruins, You have plucked up '
  - type: text
    content: and
  - type: text
    content: ' overthrown their cities; the very memory of them has perished '
  - type: text
    content: and
  - type: text
    content: ' vanished.'
  '7':
  - type: text
    content: ' But the Lord shall remain '
  - type: text
    content: and
  - type: text
    content: ' continue forever; He has prepared '
  - type: text
    content: and
  - type: text
    content: ' established His throne for judgment. [Heb. 1:11.]'
  '8':
  - type: text
    content: ' And He will judge the world in righteousness (rightness and equity); He will minister justice to the peoples in uprightness. [Acts 17:31.]'
  '9':
  - type: text
    content: ' The Lord also will be a refuge '
  - type: text
    content: and
  - type: text
    content: ' a high tower for the oppressed, a refuge '
  - type: text
    content: and
  - type: text
    content: ' a stronghold in times of trouble (high cost, destitution, and desperation).'
