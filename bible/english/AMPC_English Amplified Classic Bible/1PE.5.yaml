document_id: 1PE.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' I WARN '
  - type: text
    content: and
  - type: text
    content: ' counsel the elders among you (the pastors and spiritual guides of the church) as a fellow elder and as an eyewitness [called to testify] of the sufferings of Christ, as well as a sharer in the glory (the honor and splendor) that is to be revealed (disclosed, unfolded):'
  '10':
  - type: text
    content: ' And after you have suffered a little while, the God of all grace [Who imparts all blessing and favor], Who has called you to His [own] eternal glory in Christ '
  - type: text
    content: Jesus,
  - type: text
    content: ' will Himself complete '
  - type: text
    content: and
  - type: text
    content: ' make you what you ought to be, establish '
  - type: text
    content: and
  - type: text
    content: ' ground you securely, and strengthen, and settle you.'
  '11':
  - type: text
    content: ' To Him be the dominion (power, authority, rule) forever and ever. Amen (so be it).'
  '12':
  - type: text
    content: ' By Silvanus, a true (loyal, consistent, incorruptible) brother, as I consider him, I have written briefly to you, to counsel '
  - type: text
    content: and
  - type: text
    content: ' urge '
  - type: text
    content: and
  - type: text
    content: ' stimulate [you] and to declare [to you] that this is the true [account of the] grace (the undeserved favor) of God. Be steadfast '
  - type: text
    content: and
  - type: text
    content: ' persevere in it.'
  '13':
  - type: text
    content: ' She [your sister church here] in Babylon, [who is] elect (chosen) with [yourselves], sends you greetings, and [so does] my son (disciple) Mark.'
  '14':
  - type: text
    content: ' Salute one another with a kiss of love [the symbol of mutual affection]. To all of you that are in Christ '
  - type: text
    content: Jesus
  - type: text
    content: ' (the Messiah), may there be peace (every kind of peace and blessing, especially peace with God, and freedom from fears, agitating passions, and moral conflicts). '
  - type: text
    content: Amen (so be it).
  '2':
  - type: text
    content: ' Tend (nurture, guard, guide, and fold) the flock of God that is [your responsibility], not by coercion '
  - type: text
    content: or
  - type: text
    content: ' constraint, but willingly; not dishonorably motivated by the advantages '
  - type: text
    content: and
  - type: text
    content: ' profits [belonging to the office], but eagerly '
  - type: text
    content: and
  - type: text
    content: ' cheerfully;'
  '3':
  - type: text
    content: ' Not domineering [as arrogant, dictatorial, and overbearing persons] over those in your charge, but being examples (patterns and models of Christian living) to the flock (the congregation).'
  '4':
  - type: text
    content: ' And [then] when the Chief Shepherd is revealed, you will win the conqueror''s crown of glory.'
  '5':
  - type: text
    content: ' Likewise, you who are younger '
  - type: text
    content: and
  - type: text
    content: ' of lesser rank, be subject to the elders (the ministers and spiritual guides of the church)–[giving them due respect and yielding to their counsel]. Clothe (apron) yourselves, all of you, with humility [as the garb of a servant, so that its covering cannot possibly be stripped from you, with freedom from pride and arrogance] toward one another. For God sets Himself against the proud (the insolent, the overbearing, the disdainful, the presumptuous, the boastful)–[and He opposes, frustrates, and defeats them], but gives grace (favor, blessing) to the humble. [Prov. 3:34.]'
  '6':
  - type: text
    content: ' Therefore humble yourselves [demote, lower yourselves in your own estimation] under the mighty hand of God, that in due time He may exalt you,'
  '7':
  - type: text
    content: ' Casting the whole of your care [all your anxieties, all your worries, all your concerns, once and for all] on Him, for He cares for you affectionately '
  - type: text
    content: and
  - type: text
    content: ' cares about you watchfully. [Ps. 55:22.]'
  '8':
  - type: text
    content: ' Be well balanced (temperate, sober of mind), be vigilant '
  - type: text
    content: and
  - type: text
    content: ' cautious at all times; for that enemy of yours, the devil, roams around like a lion roaring [in fierce hunger], seeking someone to seize upon '
  - type: text
    content: and
  - type: text
    content: ' devour.'
  '9':
  - type: text
    content: ' Withstand him; be firm in faith [against his onset–rooted, established, strong, immovable, and determined], knowing that the same (identical) sufferings are appointed to your brotherhood (the whole body of Christians) throughout the world.'
