document_id: 1PE.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I WARN '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counsel the elders among you (the pastors and spiritual guides of the church) as a fellow elder and as an eyewitness [called to testify] of the sufferings of Christ, as well as a sharer in the glory (the honor and splendor) that is to be revealed (disclosed, unfolded):'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Tend (nurture, guard, guide, and fold) the flock of God that is [your responsibility], not by coercion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' constraint, but willingly; not dishonorably motivated by the advantages '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profits [belonging to the office], but eagerly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cheerfully;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Not domineering [as arrogant, dictatorial, and overbearing persons] over those in your charge, but being examples (patterns and models of Christian living) to the flock (the congregation).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And [then] when the Chief Shepherd is revealed, you will win the conqueror''s crown of glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Likewise, you who are younger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of lesser rank, be subject to the elders (the ministers and spiritual guides of the church)–[giving them due respect and yielding to their counsel]. Clothe (apron) yourselves, all of you, with humility [as the garb of a servant, so that its covering cannot possibly be stripped from you, with freedom from pride and arrogance] toward one another. For God sets Himself against the proud (the insolent, the overbearing, the disdainful, the presumptuous, the boastful)–[and He opposes, frustrates, and defeats them], but gives grace (favor, blessing) to the humble. [Prov. 3:34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore humble yourselves [demote, lower yourselves in your own estimation] under the mighty hand of God, that in due time He may exalt you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Casting the whole of your care [all your anxieties, all your worries, all your concerns, once and for all] on Him, for He cares for you affectionately '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cares about you watchfully. [Ps. 55:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Be well balanced (temperate, sober of mind), be vigilant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cautious at all times; for that enemy of yours, the devil, roams around like a lion roaring [in fierce hunger], seeking someone to seize upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Withstand him; be firm in faith [against his onset–rooted, established, strong, immovable, and determined], knowing that the same (identical) sufferings are appointed to your brotherhood (the whole body of Christians) throughout the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And after you have suffered a little while, the God of all grace [Who imparts all blessing and favor], Who has called you to His [own] eternal glory in Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus,
  - type: text
    text: ' will Himself complete '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make you what you ought to be, establish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ground you securely, and strengthen, and settle you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' To Him be the dominion (power, authority, rule) forever and ever. Amen (so be it).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' By Silvanus, a true (loyal, consistent, incorruptible) brother, as I consider him, I have written briefly to you, to counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' urge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stimulate [you] and to declare [to you] that this is the true [account of the] grace (the undeserved favor) of God. Be steadfast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persevere in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' She [your sister church here] in Babylon, [who is] elect (chosen) with [yourselves], sends you greetings, and [so does] my son (disciple) Mark.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Salute one another with a kiss of love [the symbol of mutual affection]. To all of you that are in Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' (the Messiah), may there be peace (every kind of peace and blessing, especially peace with God, and freedom from fears, agitating passions, and moral conflicts). '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
