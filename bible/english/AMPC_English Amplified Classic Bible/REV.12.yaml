document_id: REV.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND A great sign (wonder)–[warning of future events of ominous significance] appeared in heaven: a woman clothed with the sun, with the moon under her feet, and with a crownlike garland (tiara) of twelve stars on her head.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Then I heard a strong (loud) voice in heaven, saying, Now it has come–the salvation and the power and the kingdom (the dominion, the reign) of our God, and the power (the sovereignty, the authority) of His Christ (the Messiah); for the accuser of our brethren, he who keeps bringing before our God charges against them day and night, has been cast out! [Job 1:9-11.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And they have overcome (conquered) him by means of the blood of the Lamb and by the utterance of their testimony, for they did not love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cling to life even when faced with death [holding their lives cheap till they had to die for their witnessing].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Therefore be glad (exult), O heavens and you that dwell in them! But woe to you, O earth and sea, for the devil has come down to you in fierce anger (fury), because he knows that he has [only] a short time [left]! [Isa. 44:23; 49:13.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And when the dragon saw that he was cast down to the earth, he went in pursuit of the woman who had given birth to the male Child.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But the woman was supplied with the two wings of a giant eagle, so that she might fly from the presence of the serpent into the desert (wilderness), to the retreat where she is to be kept safe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fed for a time, and times, and half a time (three and one-half years, or 1,260 days). [Dan. 7:25; 12:7.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Then out of his mouth the serpent spouted forth water like a flood after the woman, that she might be carried off with the torrent.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But the earth came to the rescue of the woman, and the ground opened its mouth and swallowed up the stream of water which the dragon had spouted from his mouth.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So then the dragon was furious (enraged) at the woman, and he went away to wage war on the remainder of her descendants–[on those] who obey God''s commandments and who have the testimony of Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Christ
    - type: text
      text: ' [and adhere to it and bear witness to Him].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' She was pregnant and she cried out in her birth pangs, in the anguish of her delivery.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Then another ominous sign (wonder) was seen in heaven: Behold, a huge, fiery-red dragon, with seven heads and ten horns, and seven kingly crowns (diadems) upon his heads. [Dan. 7:7.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' His tail swept [across the sky] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dragged down a third of the stars and flung them to the earth. And the dragon stationed himself in front of the woman who was about to be delivered, so that he might devour her child as soon as she brought it forth. [Dan. 8:10.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And she brought forth a male Child, One Who is destined to shepherd (rule) all the nations with an iron staff (scepter), and her Child was caught up to God and to His throne. [Ps. 2:8, 9; 110:1, 2.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And the woman [herself] fled into the desert (wilderness), where she has a retreat prepared [for her] by God, in which she is to be fed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kept safe for 1,260 days (42 months; three and one-half years).'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then war broke out in heaven; Michael and his angels went forth to battle with the dragon, and the dragon and his angels fought.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But they were defeated, and there was no room found for them in heaven any longer.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And the huge dragon was cast down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' out–that age-old serpent, who is called the Devil and Satan, he who is the seducer (deceiver) of all humanity the world over; he was forced out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' down to the earth, and his angels were flung out along with him. [Gen. 3:1, 14, 15; Zech. 3:1.]'
