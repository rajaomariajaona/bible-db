document_id: 2SA.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THESE are the last words of David: David son of Jesse says, and the man who was raised on high, the anointed of the God of Jacob, and the sweet psalmist of Israel, says,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Spirit of the Lord spoke in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by me, and His word was upon my tongue.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The God of Israel spoke, the Rock of Israel said to me, When one rules over men righteously, ruling in the fear of God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He dawns on them like the morning light when the sun rises on a cloudless morning, when the tender grass springs out of the earth through clear shining after rain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Truly does not my house stand so with God? For He has made with me an everlasting covenant, ordered in all things, and sure. For will He not cause to prosper all my help and my desire?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But wicked, godless, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthless lives are all like thorns to be thrust away, because they cannot be taken with the hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But the man who touches them arms himself with iron and the shaft of a spear, and they are utterly consumed with fire on the spot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' These are the names of the mighty men whom David had: Josheb-basshebeth, a Tahchemonite, chief of the Three [heroes], known also as Adino the Eznite; he wielded his spear and went against 800 men, who were slain at one time. [I Chron. 11:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Next to him among the three mighty men was Eleazar son of Dodo, son of Ahohi. He was with David when they defied the Philistines assembled there for battle, and the men of Israel had departed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' [Eleazar] arose and struck down the Philistines until his hand was weary and clung to the sword. The Lord wrought a great deliverance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' victory that day; the men returned after him only to take the spoil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Next to [Eleazar] was Shammah son of Agee the Hararite. The Philistines were gathered at Lehi on a piece of ground full of lentils; and the [Israelites] fled from the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But he stood in the midst of the ground and defended it and slew the Philistines; and the Lord wrought a great victory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And three of the thirty chief men went down at harvest time to David in the cave of Adullam, and a troop of Philistines was encamped in the Valley of Rephaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And David was then in the stronghold, and the garrison of the Philistines was then in Bethlehem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And David said longingly, Oh, that someone would give me a drink of water from the well of Bethlehem by the gate!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the three mighty men broke through the army of the Philistines and drew water out of the well of Bethlehem by the gate and brought it to David. But he would not drink it, but poured it out to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And he said, Be it far from me, O Lord, to drink this. Is it not [the same as] the blood of the men who went at the risk of their lives? So he would not drink it. These things did the three mighty men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now Abishai the brother of Joab son of Zeruiah was chief of the Three. He wielded his spear against 300 men and slew them, and won a name beside the Three.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Was he not most renowned of the Three? So he was their captain; however, he did not attain to the Three.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And Benaiah son of Jehoiada, a valiant man of Kabzeel, who had done many notable acts, slew two lionlike men of Moab. He went down also and slew a lion in a pit on a snowy day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And he slew an Egyptian, a handsome man. The Egyptian had a spear in his hand, but Benaiah went down to him with a staff, snatched the spear out of the Egyptian''s hand, and slew the man with his own spear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' These things Benaiah son of Jehoiada did, and won a name beside the three mighty men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He was more renowned than the Thirty, but he attained not to the [first] Three. David set him over his guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' council.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Asahel brother of Joab was one of the Thirty; then Elhanan son of Dodo of Bethlehem,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Shammah of Harod, Elika of Harod,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Helez the Paltite, Ira son of Ikkesh of Tekoa,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Abiezer of Anathoth, Mebunnai the Hushathite,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Zalmon the Ahohite, Maharai of Netophah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Heleb son of Baanah of Netophah, Ittai son of Ribai of Gibeah of the Benjamites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Benaiah of Pirathon, Hiddai of the brooks of Gaash,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Abi-albon the Arbathite, Azmaveth the Barhumite,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Eliahba of Shaalbon, the sons of Jashen, Jonathan,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Shammah the Hararite, Ahiam son of Sharar the Hararite,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Eliphelet son of Ahasbai, son of Maacah, Eliam son of Ahithophel of Giloh,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Hezro (Hezrai) of Carmel, Paarai the Arbite,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Igal son of Nathan of Zobah, Bani the Gadite,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Zelek the Ammonite, Naharai of Beeroth, armor-bearer of Joab son of Zeruiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Ira the Ithrite, Gareb the Ithrite,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Uriah the Hittite–thirty-seven in all.'
