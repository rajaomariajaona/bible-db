document_id: PSA.85,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. A Psalm of the sons of Korah.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', YOU have [at last] been favorable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have dealt graciously with Your land [of Canaan]; You have brought back [from Babylon] the captives of Jacob.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness and truth have met together; righteousness and peace have kissed each other.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Truth shall spring up from the earth, and righteousness shall look down from heaven.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yes, the Lord will give what is good, and our land will yield its increase.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Righteousness shall go before Him and shall make His footsteps a way in which to walk.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have forgiven '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' taken away the iniquity of Your people, You have covered all their sin. Selah [pause, and calmly realize what that means]!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have withdrawn all Your wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indignation, You have turned away from the blazing anger [which You had let loose].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Restore us, O God of our salvation, and cause Your anger toward us to cease [forever].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Will You be angry with us forever? Will You prolong Your anger [and disfavor] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spread it out to all generations?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Will You not revive us again, that Your people may rejoice in You?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Show us Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness, O Lord, and grant us Your salvation.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will listen [with expectancy] to what God the Lord will say, for He will speak peace to His people, to His saints (those who are in right standing with Him)–but let them not turn again to [self-confident] folly.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Surely His salvation is near to those who reverently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipfully fear Him, [and is ready to be appropriated] that [the manifest presence of God, His] glory may tabernacle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abide in our land.'
