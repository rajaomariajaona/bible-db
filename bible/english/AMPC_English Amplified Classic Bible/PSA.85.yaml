document_id: PSA.85,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of the sons of Korah.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', YOU have [at last] been favorable '
  - type: text
    content: and
  - type: text
    content: ' have dealt graciously with Your land [of Canaan]; You have brought back [from Babylon] the captives of Jacob.'
  '10':
  - type: text
    content: ' Mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness and truth have met together; righteousness and peace have kissed each other.'
  '11':
  - type: text
    content: ' Truth shall spring up from the earth, and righteousness shall look down from heaven.'
  '12':
  - type: text
    content: ' Yes, the Lord will give what is good, and our land will yield its increase.'
  '13':
  - type: text
    content: ' Righteousness shall go before Him and shall make His footsteps a way in which to walk.'
  '2':
  - type: text
    content: ' You have forgiven '
  - type: text
    content: and
  - type: text
    content: ' taken away the iniquity of Your people, You have covered all their sin. Selah [pause, and calmly realize what that means]!'
  '3':
  - type: text
    content: ' You have withdrawn all Your wrath '
  - type: text
    content: and
  - type: text
    content: ' indignation, You have turned away from the blazing anger [which You had let loose].'
  '4':
  - type: text
    content: ' Restore us, O God of our salvation, and cause Your anger toward us to cease [forever].'
  '5':
  - type: text
    content: ' Will You be angry with us forever? Will You prolong Your anger [and disfavor] '
  - type: text
    content: and
  - type: text
    content: ' spread it out to all generations?'
  '6':
  - type: text
    content: ' Will You not revive us again, that Your people may rejoice in You?'
  '7':
  - type: text
    content: ' Show us Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, O Lord, and grant us Your salvation.'
  '8':
  - type: text
    content: ' I will listen [with expectancy] to what God the Lord will say, for He will speak peace to His people, to His saints (those who are in right standing with Him)–but let them not turn again to [self-confident] folly.'
  '9':
  - type: text
    content: ' Surely His salvation is near to those who reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fear Him, [and is ready to be appropriated] that [the manifest presence of God, His] glory may tabernacle '
  - type: text
    content: and
  - type: text
    content: ' abide in our land.'
