document_id: PSA.85
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of the sons of Korah.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', YOU have [at last] been favorable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have dealt graciously with Your land [of Canaan]; You have brought back [from Babylon] the captives of Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You have forgiven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taken away the iniquity of Your people, You have covered all their sin. Selah [pause, and calmly realize what that means]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You have withdrawn all Your wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation, You have turned away from the blazing anger [which You had let loose].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Restore us, O God of our salvation, and cause Your anger toward us to cease [forever].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Will You be angry with us forever? Will You prolong Your anger [and disfavor] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spread it out to all generations?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Will You not revive us again, that Your people may rejoice in You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Show us Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, O Lord, and grant us Your salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I will listen [with expectancy] to what God the Lord will say, for He will speak peace to His people, to His saints (those who are in right standing with Him)–but let them not turn again to [self-confident] folly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Surely His salvation is near to those who reverently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fear Him, [and is ready to be appropriated] that [the manifest presence of God, His] glory may tabernacle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abide in our land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness and truth have met together; righteousness and peace have kissed each other.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Truth shall spring up from the earth, and righteousness shall look down from heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Yes, the Lord will give what is good, and our land will yield its increase.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Righteousness shall go before Him and shall make His footsteps a way in which to walk.'
