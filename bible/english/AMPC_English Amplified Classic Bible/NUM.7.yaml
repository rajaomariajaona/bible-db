document_id: NUM.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ON THE day that Moses had fully completed setting up the tabernacle and had anointed and consecrated it and all its furniture, and the altar and all its utensils, and had anointed and set them apart for holy use,'
  '10':
  - type: text
    content: ' And the princes '
  - type: text
    content: or
  - type: text
    content: ' leaders offered sacrifices for the dedication of the altar [of burnt offering] on the day that it was anointed; and they offered their sacrifice before the altar.'
  '11':
  - type: text
    content: ' And the Lord said to Moses, They shall offer their offerings, each prince '
  - type: text
    content: or
  - type: text
    content: ' leader on his day, for the dedication of the altar.'
  '12':
  - type: text
    content: ' He who offered his offering on the first day was Nahshon son of Amminadab, of the tribe of Judah.'
  '13':
  - type: text
    content: ' And his offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '14':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '15':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '16':
  - type: text
    content: ' One male goat for a sin offering;'
  '17':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Nahshon son of Amminadab.'
  '18':
  - type: text
    content: ' The second day Nethanel son of Zuar, leader [of the tribe] of Issachar, offered.'
  '19':
  - type: text
    content: ' He gave for his offering one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '2':
  - type: text
    content: ' The princes '
  - type: text
    content: or
  - type: text
    content: ' leaders of Israel, heads of their fathers'' houses, made offerings. These were the leaders of the tribes and were over those who were numbered.'
  '20':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '21':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '22':
  - type: text
    content: ' One male goat for a sin offering;'
  '23':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Nethanel son of Zuar.'
  '24':
  - type: text
    content: ' The third day Eliab son of Helon, leader of the sons of Zebulun, offered.'
  '25':
  - type: text
    content: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '26':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '27':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '28':
  - type: text
    content: ' One male goat for a sin offering;'
  '29':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Eliab son of Helon.'
  '3':
  - type: text
    content: ' And they brought their offering before the Lord, six covered wagons and twelve oxen; a wagon for each two of the princes '
  - type: text
    content: or
  - type: text
    content: ' leaders and an ox for each one; and they brought them before the tabernacle.'
  '30':
  - type: text
    content: ' The fourth day Elizur son of Shedeur, leader of the sons of Reuben, offered.'
  '31':
  - type: text
    content: ' His offering was one silver platter of the weight of 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '32':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '33':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '34':
  - type: text
    content: ' One male goat for a sin offering;'
  '35':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Elizur son of Shedeur.'
  '36':
  - type: text
    content: ' The fifth day Shelumiel son of Zurishaddai, leader of the sons of Simeon, offered.'
  '37':
  - type: text
    content: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '38':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '39':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '4':
  - type: text
    content: ' Then the Lord said to Moses,'
  '40':
  - type: text
    content: ' One male goat for a sin offering;'
  '41':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Shelumiel son of Zurishaddai.'
  '42':
  - type: text
    content: ' The sixth day Eliasaph son of Deuel, leader of the sons of Gad, offered.'
  '43':
  - type: text
    content: ' His offering was one silver platter of the weight of 130 shekels, a silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '44':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '45':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '46':
  - type: text
    content: ' One male goat for a sin offering;'
  '47':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, [and] five male lambs a year old. This was the offering of Eliasaph son of Deuel.'
  '48':
  - type: text
    content: ' The seventh day Elishama son of Ammihud, leader of the sons of Ephraim, offered.'
  '49':
  - type: text
    content: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '5':
  - type: text
    content: ' Accept the things from them, that they may be used in doing the service of the Tent of Meeting, and give them to the Levites, to each man according to his service.'
  '50':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '51':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '52':
  - type: text
    content: ' One male goat for a sin offering;'
  '53':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, [and] five male lambs a year old. This was the offering of Elishama son of Ammihud.'
  '54':
  - type: text
    content: ' The eighth day Gamaliel son of Pedahzur, leader of the sons of Manasseh, offered.'
  '55':
  - type: text
    content: ' His offering was one silver platter of the weight of 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '56':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '57':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '58':
  - type: text
    content: ' One male goat for a sin offering;'
  '59':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Gamaliel son of Pedahzur.'
  '6':
  - type: text
    content: ' So Moses took the wagons and the oxen and gave them to the Levites.'
  '60':
  - type: text
    content: ' The ninth day Abidan son of Gideoni, prince '
  - type: text
    content: or
  - type: text
    content: ' leader of the sons of Benjamin, offered.'
  '61':
  - type: text
    content: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '62':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '63':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '64':
  - type: text
    content: ' One male goat for a sin offering;'
  '65':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Abidan son of Gideoni.'
  '66':
  - type: text
    content: ' The tenth day Ahiezer son of Ammishaddai, leader of the sons of Dan, offered.'
  '67':
  - type: text
    content: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '68':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '69':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '7':
  - type: text
    content: ' Two wagons and four oxen he gave to the sons of Gershon, according to their service;'
  '70':
  - type: text
    content: ' One male goat for a sin offering;'
  '71':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Ahiezer son of Ammishaddai.'
  '72':
  - type: text
    content: ' The eleventh day Pagiel son of Ochran, leader of the sons of Asher, offered.'
  '73':
  - type: text
    content: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '74':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '75':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '76':
  - type: text
    content: ' One male goat for a sin offering;'
  '77':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Pagiel son of Ochran.'
  '78':
  - type: text
    content: ' The twelfth day Ahira son of Enan, leader of the sons of Naphtali, offered.'
  '79':
  - type: text
    content: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '8':
  - type: text
    content: ' And four wagons and eight oxen he gave to the sons of Merari, according to their service, under the supervision of Ithamar son of Aaron, the [high] priest.'
  '80':
  - type: text
    content: ' One golden bowl of ten shekels, full of incense;'
  '81':
  - type: text
    content: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '82':
  - type: text
    content: ' One male goat for a sin offering;'
  '83':
  - type: text
    content: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Ahira son of Enan.'
  '84':
  - type: text
    content: ' This was the dedication offering for the altar [of burnt offering] from the leaders of Israel on the day when it was anointed: twelve platters of silver, twelve silver basins, twelve golden bowls;'
  '85':
  - type: text
    content: ' Each platter of silver weighing 130 shekels, each basin seventy; all the silver vessels weighed 2,400 shekels, after the shekel of the sanctuary.'
  '86':
  - type: text
    content: ' The twelve golden bowls full of incense, weighing ten shekels apiece, after the shekel of the sanctuary, all the gold of the bowls being 120 shekels.'
  '87':
  - type: text
    content: ' All the oxen for the burnt offering were twelve bulls, the rams twelve, the male lambs a year old twelve, together with their cereal offering; and the male goats for a sin offering twelve.'
  '88':
  - type: text
    content: ' And all the oxen for the sacrifice of the peace offerings were twenty-four bulls, the rams sixty, the male goats sixty, the male lambs a year old sixty. This was the dedication of the altar [of burnt offering] after it was anointed.'
  '89':
  - type: text
    content: ' And when Moses went into the Tent of Meeting to speak with the Lord, he heard the voice speaking to him from above the mercy seat that was upon the ark of the Testimony from between the two cherubim; and He spoke to [Moses].'
  '9':
  - type: text
    content: ' But to the sons of Kohath he gave none, because they were assigned the care of the sanctuary '
  - type: text
    content: and
  - type: text
    content: ' the holy things which had to be carried on their shoulders.'
