document_id: NUM.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' ON THE day that Moses had fully completed setting up the tabernacle and had anointed and consecrated it and all its furniture, and the altar and all its utensils, and had anointed and set them apart for holy use,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the princes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leaders offered sacrifices for the dedication of the altar [of burnt offering] on the day that it was anointed; and they offered their sacrifice before the altar.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses, They shall offer their offerings, each prince '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leader on his day, for the dedication of the altar.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who offered his offering on the first day was Nahshon son of Amminadab, of the tribe of Judah.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And his offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Nahshon son of Amminadab.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The second day Nethanel son of Zuar, leader [of the tribe] of Issachar, offered.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He gave for his offering one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The princes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leaders of Israel, heads of their fathers'' houses, made offerings. These were the leaders of the tribes and were over those who were numbered.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Nethanel son of Zuar.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The third day Eliab son of Helon, leader of the sons of Zebulun, offered.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Eliab son of Helon.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they brought their offering before the Lord, six covered wagons and twelve oxen; a wagon for each two of the princes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leaders and an ox for each one; and they brought them before the tabernacle.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The fourth day Elizur son of Shedeur, leader of the sons of Reuben, offered.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter of the weight of 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Elizur son of Shedeur.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The fifth day Shelumiel son of Zurishaddai, leader of the sons of Simeon, offered.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the Lord said to Moses,'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Shelumiel son of Zurishaddai.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sixth day Eliasaph son of Deuel, leader of the sons of Gad, offered.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter of the weight of 130 shekels, a silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, [and] five male lambs a year old. This was the offering of Eliasaph son of Deuel.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The seventh day Elishama son of Ammihud, leader of the sons of Ephraim, offered.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Accept the things from them, that they may be used in doing the service of the Tent of Meeting, and give them to the Levites, to each man according to his service.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, [and] five male lambs a year old. This was the offering of Elishama son of Ammihud.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The eighth day Gamaliel son of Pedahzur, leader of the sons of Manasseh, offered.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter of the weight of 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Gamaliel son of Pedahzur.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Moses took the wagons and the oxen and gave them to the Levites.'
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The ninth day Abidan son of Gideoni, prince '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leader of the sons of Benjamin, offered.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Abidan son of Gideoni.'
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The tenth day Ahiezer son of Ammishaddai, leader of the sons of Dan, offered.'
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Two wagons and four oxen he gave to the sons of Gershon, according to their service;'
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Ahiezer son of Ammishaddai.'
  '72':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The eleventh day Pagiel son of Ochran, leader of the sons of Asher, offered.'
  '73':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '74':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '75':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '76':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '77':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Pagiel son of Ochran.'
  '78':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The twelfth day Ahira son of Enan, leader of the sons of Naphtali, offered.'
  '79':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His offering was one silver platter, the weight of which was 130 shekels, one silver basin of seventy shekels, after the shekel of the sanctuary, both of them full of fine flour mixed with oil for a cereal offering;'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And four wagons and eight oxen he gave to the sons of Merari, according to their service, under the supervision of Ithamar son of Aaron, the [high] priest.'
  '80':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One golden bowl of ten shekels, full of incense;'
  '81':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One young bull, one ram, one male lamb a year old, for a burnt offering;'
  '82':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' One male goat for a sin offering;'
  '83':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs a year old. This was the offering of Ahira son of Enan.'
  '84':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This was the dedication offering for the altar [of burnt offering] from the leaders of Israel on the day when it was anointed: twelve platters of silver, twelve silver basins, twelve golden bowls;'
  '85':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Each platter of silver weighing 130 shekels, each basin seventy; all the silver vessels weighed 2,400 shekels, after the shekel of the sanctuary.'
  '86':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The twelve golden bowls full of incense, weighing ten shekels apiece, after the shekel of the sanctuary, all the gold of the bowls being 120 shekels.'
  '87':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All the oxen for the burnt offering were twelve bulls, the rams twelve, the male lambs a year old twelve, together with their cereal offering; and the male goats for a sin offering twelve.'
  '88':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all the oxen for the sacrifice of the peace offerings were twenty-four bulls, the rams sixty, the male goats sixty, the male lambs a year old sixty. This was the dedication of the altar [of burnt offering] after it was anointed.'
  '89':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when Moses went into the Tent of Meeting to speak with the Lord, he heard the voice speaking to him from above the mercy seat that was upon the ark of the Testimony from between the two cherubim; and He spoke to [Moses].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But to the sons of Kohath he gave none, because they were assigned the care of the sanctuary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the holy things which had to be carried on their shoulders.'
