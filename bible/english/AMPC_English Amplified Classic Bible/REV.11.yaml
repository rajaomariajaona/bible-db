document_id: REV.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A REED [as a measuring rod] was then given to me, [shaped] like a staff, and I was told: Rise up and measure the sanctuary of God and the altar [of incense], and [number] those who worship there. [Ezek. 40:3.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And those who dwell on the earth will gloat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exult over them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejoice exceedingly, taking their ease and sending presents [in congratulation] to one another, because these two prophets had been such a vexation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' torment to all the dwellers on the earth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But after three and a half days, by God''s gift the breath of life again entered into them, and they rose up on their feet, and great dread and terror fell on those who watched them. [Ezek. 37:5, 10.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then [the two witnesses] heard a strong voice from heaven calling to them, Come up here! And before the very eyes of their enemies they ascended into heaven in a cloud. [II Kings 2:11.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And at that [very] hour there was a tremendous earthquake and one tenth of the city was destroyed (fell); seven thousand people perished in the earthquake, and those who remained were filled with dread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were awe-struck, and they glorified the God of heaven.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The second woe (calamity) has passed; now the third woe is speedily to come.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The seventh angel then blew [his] trumpet, and there were mighty voices in heaven, shouting, The dominion (kingdom, sovereignty, rule) of the world has now come into the possession and become the kingdom of our Lord and of His Christ (the Messiah), and He shall reign forever and ever (for the eternities of the eternities)! [Ps. 22:28; Dan. 7:13, 14, 27.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the twenty-four elders [of the heavenly Sanhedrin], who sit on their thrones before God, prostrated themselves before Him and worshiped,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Exclaiming, To You we give thanks, Lord God Omnipotent, [the One] Who is and [ever] was, for assuming the high sovereignty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the great power that are Yours and for beginning to reign.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the heathen (the nations) raged, but Your wrath (retribution, indignation) came, the time when the dead will be judged and Your servants the prophets and saints rewarded–and those who revere (fear) Your name, both low and high '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' small and great–and [the time] for destroying the corrupters of the earth. [Ps. 2:1.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the sanctuary of God in heaven was thrown open, and the ark of His covenant was seen standing inside in His sanctuary; and there were flashes of lightning, loud rumblings (blasts, mutterings), peals of thunder, an earthquake, and a terrific hailstorm. [I Kings 8:1-6.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But leave out of your measuring the court outside the sanctuary of God; omit that, for it is given over to the Gentiles (the nations), and they will trample the holy city underfoot for 42 months (three and one-half years). [Isa. 63:18; Zech. 12:3.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will grant the power of prophecy to My two witnesses for 1,260 (42 months; three and one-half years), dressed in sackcloth.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These [witnesses] are the two olive trees and the two lampstands which stand before the Lord of the earth. [Zech. 4:3, 11-14.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if anyone attempts to injure them, fire pours from their mouth and consumes their enemies; if anyone should attempt to harm them, thus he is doomed to be slain. [II Kings 1:10; Jer. 5:14.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These [two witnesses] have power to shut up the sky, so that no rain may fall during the days of their prophesying (their prediction of events relating to Christ''s kingdom and its speedy triumph); and they also have power to turn the waters into blood and to smite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scourge the earth with all manner of plagues as often as they choose. [Exod. 7:17, 19; I Kings 17:1.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when they have finished their testimony '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their evidence is all in, the beast (monster) that comes up out of the Abyss (bottomless pit) will wage war on them, and conquer them and kill them. [Dan. 7:3, 7, 21.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And their dead bodies [will lie exposed] in the open street (a public square) of the great city which is in a spiritual sense called [by the mystical and allegorical names of] Sodom and Egypt, where also their Lord was crucified. [Isa. 1:9.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For three and a half days men from the races and tribes and languages and nations will gaze at their dead bodies and will not allow them to be put in a tomb.'
