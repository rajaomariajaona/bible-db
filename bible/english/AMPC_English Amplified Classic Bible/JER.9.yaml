document_id: JER.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' OH, THAT my head were waters and my eyes a reservoir of tears, that I might weep day and night for the slain of the daughter of my people!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Oh, that I had in the wilderness a lodging place (a mere shelter) for wayfaring men, that I might leave my people and go away from them! For they are all adulterers [rendering worship to idols instead of to the Lord, Who has espoused the people to Himself]; they are a gang of treacherous men [faithless even to each other].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they bend their tongue, [which is] their bow for the lies [they shoot]. And not according to faithfulness do they rule '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become strong in the land; for they proceed from evil to evil, and they do not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge Me, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Let everyone beware of his neighbor and put no trust in any brother. For every brother is an utter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete supplanter (one who takes by the heel and trips up, a deceiver, a Jacob), and every neighbor goes about as a slanderer. [Gen. 25:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they deceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mock every one his neighbor and do not speak the truth. They have taught their tongues to speak lies; they weary themselves committing iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Your habitation is in the midst of deceit [oppression upon oppression and deceit upon deceit]; through deceit they refuse to know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand Me, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore thus says the Lord of hosts: Behold, I will melt them [by the process of affliction to remove the dross] and test them, for how else should I deal with the daughter of My people?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Their tongue is a murderous arrow; it speaks deceitfully; one speaks peaceably to his neighbor with his mouth, but in his heart he lays snares and waits in ambush for him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Shall I not punish them for these things? says the Lord. Shall I not avenge Myself on such a nation as this?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For the mountains I will take up a weeping and wailing and for the pastures of the wilderness a lament, because they are burned up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolated, so that no one passes through [them]; neither can men hear [any longer] the lowing of cattle. Both the fowls of the air and the beasts have fled, they are gone!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I will make Jerusalem heaps [of ruins], a dwelling place of jackals; and I will make the cities of Judah a desolation, without inhabitant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Who is the wise man who may understand this? To whom has the mouth of the Lord spoken, that he may declare it? Why is the land ruined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' laid waste like a wilderness, so that no one passes through it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the Lord says, Because they have forsaken My law, which I set before them, and have not listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed My voice or walked in accordance with it'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But have walked stubbornly after their own hearts and after the Baals, as their fathers taught them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Therefore thus says the Lord of hosts, the God of Israel: Behold, I will feed them, even this people, with wormwood and give them bitter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' poisonous water to drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I will scatter them also among nations that neither they nor their fathers have known, and I will send the sword among them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' after them until I have consumed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Thus says the Lord of hosts: Consider and call for the mourning women to come; send for the skillful women to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Let them make haste and raise a wailing over us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for us, that our eyes may run down with tears and our eyelids gush with water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For a sound of wailing is heard [coming] out of Zion: How we are plundered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruined! We are greatly confounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' utterly put to shame, because we have forsaken the land, because they have cast down our dwellings [our dwellings that have cast us out].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Yet hear the word of the Lord, O you women, and let your ears receive the word of His mouth; teach your daughters a lament, and each one [teach] her neighbor a dirge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For death has come up into our windows; it has entered into our palaces, cutting off the children from outdoors and the young men from the streets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Speak, Thus says the Lord: The dead bodies of men shall fall like dung on the open field and like sheaves [of grain] behind the reaper, and none shall gather them. [Jer. 8:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Thus says the Lord: Let not the wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skillful person glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boast in his wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skill; let not the mighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerful person glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boast in his strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power; let not the person who is rich [in physical gratification and earthly wealth] glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boast in his [temporal satisfactions and earthly] riches;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But let him who glories glory in this: that he understands and knows Me [personally and practically, directly discerning and recognizing My character], that I am the Lord, Who practices loving-kindness, judgment, and righteousness in the earth, for in these things I delight, says the Lord. [I Cor. 1:31; II Cor. 10:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Behold, the days are coming, says the Lord, when I will punish all who though circumcised [outwardly, in the flesh] are still uncircumcised [in corresponding inward purity]–[Rom. 2:25-29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Egypt, Judah, Edom, the children of Ammon, Moab [all of whom are related except Egypt], and all who live in the desert and who clip off the corners of their hair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beards; for all these nations are uncircumcised [in heart], and all the house of Israel is uncircumcised in heart.'
