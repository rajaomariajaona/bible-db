document_id: GAL.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN AFTER [an interval] of fourteen years I again went up to Jerusalem. [This time I went] with Barnabas, taking Titus along with [me] also.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' They only [made one stipulation], that we were to remember the poor, which very thing I was also eager to do.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' But when Cephas (Peter) came to Antioch, I protested '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' opposed him to his face [concerning his conduct there], for he was blameable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stood condemned.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For up to the time that certain persons came from James, he ate his meals with the Gentile [converts]; but when the men [from Jerusalem] arrived, he withdrew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' held himself aloof from the Gentiles and [ate] separately for fear of those of the circumcision [party].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And the rest of the Jews along with him also concealed their true convictions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acted insincerely, with the result that even Barnabas was carried away by their hypocrisy (their example of insincerity and pretense).'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But as soon as I saw that they were not straightforward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were not living up to the truth of the Gospel, I said to Cephas (Peter) before everybody present, If you, though born a Jew, can live [as you have been living] like a Gentile and not like a Jew, how do you dare now to urge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' practically force the Gentiles to [comply with the ritual of Judaism and] live like Jews?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' [I went on to say] Although we ourselves (you and I) are Jews by birth and not Gentile (heathen) sinners,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Yet we know that a man is justified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reckoned righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in right standing with God not by works of the Law, but [only] through faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [absolute] reliance on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adherence to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trust in Jesus Christ (the Messiah, the Anointed One). [Therefore] even we [ourselves] have believed on Christ Jesus, in order to be justified by faith in Christ and not by works of the Law [for we cannot be justified by any observance of the ritual of the Law given by Moses], because by keeping legal rituals '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by works no human being can ever be justified (declared righteous and put in right standing with God). [Ps. 143:2.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But if, in our desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' endeavor to be justified in Christ [to be declared righteous and put in right standing with God wholly and solely through Christ], we have shown ourselves sinners also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' convicted of sin, does that make Christ a minister (a party and contributor) to our sin? Banish the thought! [Of course not!]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' For if I [or any others who have taught that the observance of the Law of Moses is not essential to being justified by God should now by word or practice teach or intimate that it is essential to] build up again what I tore down, I prove myself a transgressor.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' For I through the Law [under the operation of the curse of the Law] have [in Christ''s death for me] myself died to the Law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' all the Law''s demands upon me, so that I may [henceforth] live to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I went because it was specially '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' divinely revealed to me that I should go, and I put before them the Gospel [declaring to them that] which I preach among the Gentiles. However, [I presented the matter] privately before those of repute, [for I wanted to make certain, by thus at first confining my communication to this private conference] that I was not running or had not run in vain [guarding against being discredited either in what I was planning to do or had already done].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' I have been crucified with Christ [in Him I have shared His crucifixion]; it is no longer I who live, but Christ (the Messiah) lives in me; and the life I now live in the body I live by faith in (by adherence to and reliance on and complete trust in) the Son of God, Who loved me and gave Himself up for me.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' [Therefore, I do not treat God''s gracious gift as something of minor importance and defeat its very purpose]; I do not set aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' invalidate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' frustrate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nullify the grace (unmerited favor) of God. For if justification (righteousness, acquittal from guilt) comes through [observing the ritual of] the Law, then Christ (the Messiah) died groundlessly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to no purpose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in vain. [His death was then wholly superfluous.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But [all went well!] even Titus, who was with me, was not compelled [as some had anticipated] to be circumcised, although he was a Greek.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' [My precaution was] because of false brethren who had been secretly smuggled in [to the Christian brotherhood]; they had slipped in to spy on our liberty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the freedom which we have in Christ Jesus, that they might again bring us into bondage [under the Law of Moses].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' To them we did not yield submission even for a moment, that the truth of the Gospel might continue to be [preserved] for you [in its purity].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Moreover, [no new requirements were made] by those who were reputed to be something–though what was their individual position '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' whether they really were of importance or not makes no difference to me; God is not impressed with the positions that men hold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He is not partial '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognizes no external distinctions–those [I say] who were of repute imposed no new requirements upon me [had nothing to add to my Gospel, and from them I received no new suggestions]. [Deut. 10:17.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But on the contrary, when they [really] saw that I had been entrusted [to carry] the Gospel to the uncircumcised [Gentiles, just as definitely] as Peter had been entrusted [to proclaim] the Gospel to the circumcised [Jews, they were agreeable];'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' For He Who motivated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fitted Peter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worked effectively through him for the mission to the circumcised, motivated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fitted me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worked through me also for [the mission to] the Gentiles.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And when they knew (perceived, recognized, understood, and acknowledged) the grace (God''s unmerited favor and spiritual blessing) that had been bestowed upon me, James and Cephas (Peter) and John, who were reputed to be pillars of the Jerusalem church, gave to me and Barnabas the right hand of fellowship, with the understanding that we should go to the Gentiles and they to the circumcised (Jews).'
