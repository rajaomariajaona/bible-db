document_id: 2SA.22,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' DAVID SPOKE to the Lord the words of this song on the day when the Lord delivered him from the hands of all his enemies and from the hand of Saul.'
  '10':
  - type: text
    content: ' He bowed the heavens and came down; thick darkness was under His feet.'
  '11':
  - type: text
    content: ' He rode on a cherub and flew; He was seen upon the wings of the wind.'
  '12':
  - type: text
    content: ' He made darkness His canopy around Him, gathering of waters, thick clouds of the skies.'
  '13':
  - type: text
    content: ' Out of the brightness before Him coals of fire flamed forth.'
  '14':
  - type: text
    content: ' The Lord thundered from heaven, and the Most High uttered His voice.'
  '15':
  - type: text
    content: ' He sent out arrows and scattered them; lightning confused '
  - type: text
    content: and
  - type: text
    content: ' troubled them.'
  '16':
  - type: text
    content: ' The channels of the sea were visible, the foundations of the world were uncovered at the rebuke of the Lord, at the blast of the breath of His nostrils.'
  '17':
  - type: text
    content: ' He sent from above, He took me; He drew me out of great waters.'
  '18':
  - type: text
    content: ' He delivered me from my strong enemy, from those who hated me, for they were too mighty for me.'
  '19':
  - type: text
    content: ' They came upon me in the day of my calamity, but the Lord was my stay.'
  '2':
  - type: text
    content: ' He said: The Lord is my Rock [of escape from Saul] and my Fortress [in the wilderness] and my Deliverer; [I Sam. 23:14, 25, 28.]'
  '20':
  - type: text
    content: ' He brought me forth into a large place; He delivered me because He delighted in me.'
  '21':
  - type: text
    content: ' The Lord rewarded me according to my uprightness with Him; He compensated '
  - type: text
    content: and
  - type: text
    content: ' benefited me according to the cleanness of my hands.'
  '22':
  - type: text
    content: ' For I have kept the ways of the Lord, and have not wickedly departed from my God.'
  '23':
  - type: text
    content: ' For all His ordinances were before me; and from His statutes I did not turn aside.'
  '24':
  - type: text
    content: ' I was also blameless before Him and kept myself from guilt '
  - type: text
    content: and
  - type: text
    content: ' iniquity.'
  '25':
  - type: text
    content: ' Therefore the Lord has recompensed me according to my righteousness, according to my cleanness in His [holy] sight.'
  '26':
  - type: text
    content: ' Toward the loving '
  - type: text
    content: and
  - type: text
    content: ' loyal You will show Yourself loving '
  - type: text
    content: and
  - type: text
    content: ' loyal, and with the upright '
  - type: text
    content: and
  - type: text
    content: ' blameless You will show Yourself upright '
  - type: text
    content: and
  - type: text
    content: ' blameless.'
  '27':
  - type: text
    content: ' To the pure You will show Yourself pure, and to the willful You will show Yourself willful.'
  '28':
  - type: text
    content: ' And the afflicted people You will deliver, but Your eyes are upon the haughty, whom You will bring down.'
  '29':
  - type: text
    content: ' For You, O Lord, are my Lamp; the Lord lightens my darkness.'
  '3':
  - type: text
    content: ' My God, my Rock, in Him will I take refuge; my Shield and the Horn of my salvation; my Stronghold and my Refuge, my Savior–You save me from violence. [Gen. 15:1.]'
  '30':
  - type: text
    content: ' For by You I run through a troop; by my God I leap over a wall.'
  '31':
  - type: text
    content: ' As for God, His way is perfect; the word of the Lord is tried. He is a Shield to all those who trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge in Him.'
  '32':
  - type: text
    content: ' For who is God but the Lord? And who is a Rock except our God?'
  '33':
  - type: text
    content: ' God is my strong Fortress; He guides the blameless in His way '
  - type: text
    content: and
  - type: text
    content: ' sets him free.'
  '34':
  - type: text
    content: ' He makes my feet like the hinds'' [firm and able]; He sets me secure '
  - type: text
    content: and
  - type: text
    content: ' confident upon the heights.'
  '35':
  - type: text
    content: ' He trains my hands for war, so that my arms can bend a bow of bronze.'
  '36':
  - type: text
    content: ' You have also given me the shield of Your salvation; and Your condescension '
  - type: text
    content: and
  - type: text
    content: ' gentleness have made me great.'
  '37':
  - type: text
    content: ' You have enlarged my steps under me, so that my feet have not slipped.'
  '38':
  - type: text
    content: ' I have pursued my enemies and destroyed them; and I did not turn back until they were consumed.'
  '39':
  - type: text
    content: ' I consumed them and thrust them through, so that they did not arise; they fell at my feet.'
  '4':
  - type: text
    content: ' I call on the Lord, Who is worthy to be praised, and I am saved from my enemies.'
  '40':
  - type: text
    content: ' For You girded me with strength for the battle; those who rose up against me You subdued under me.'
  '41':
  - type: text
    content: ' You have made my enemies turn their backs to me, that I might cut off those who hate me.'
  '42':
  - type: text
    content: ' They looked, but there was none to save–even to the Lord, but He did not answer them.'
  '43':
  - type: text
    content: ' Then I beat them small as the dust of the earth; I crushed them as the mire of the street and scattered them abroad.'
  '44':
  - type: text
    content: ' You also have delivered me from strife with my people; You kept me as the head of the nations. People whom I had not known served me.'
  '45':
  - type: text
    content: ' Foreigners yielded feigned obedience to me; as soon as they heard of me, they became obedient to me.'
  '46':
  - type: text
    content: ' Foreigners faded away; they came limping '
  - type: text
    content: and
  - type: text
    content: ' trembling from their strongholds.'
  '47':
  - type: text
    content: ' The Lord lives; blessed be my Rock, and exalted be God, the Rock of my salvation.'
  '48':
  - type: text
    content: ' It is God Who executes vengeance for me and Who brought down [and disciplined] the peoples under me,'
  '49':
  - type: text
    content: ' Who brought me out from my enemies. You also lifted me up above those who rose up against me; You delivered me from the violent man.'
  '5':
  - type: text
    content: ' For the waves of death enveloped me; the torrents of destruction made me afraid.'
  '50':
  - type: text
    content: ' For this I will give thanks '
  - type: text
    content: and
  - type: text
    content: ' extol You, O Lord, among the nations; I will sing praises to Your name.'
  '51':
  - type: text
    content: ' He is a Tower of salvation '
  - type: text
    content: and
  - type: text
    content: ' great deliverance to His king, and shows loving-kindness to His anointed, to David and his offspring forever.'
  '6':
  - type: text
    content: ' The cords of Sheol were entangling me; I encountered the snares of death.'
  '7':
  - type: text
    content: ' In my distress I called upon the Lord; I cried to my God, and He heard my voice from His temple; my cry came into His ears.'
  '8':
  - type: text
    content: ' Then the earth reeled and quaked, the foundations of the heavens trembled and shook because He was angry.'
  '9':
  - type: text
    content: ' Smoke went up from His nostrils, and devouring fire from His mouth; coals were kindled by it.'
