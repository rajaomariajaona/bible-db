document_id: 2SA.22,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' DAVID SPOKE to the Lord the words of this song on the day when the Lord delivered him from the hands of all his enemies and from the hand of Saul.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He bowed the heavens and came down; thick darkness was under His feet.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' He rode on a cherub and flew; He was seen upon the wings of the wind.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' He made darkness His canopy around Him, gathering of waters, thick clouds of the skies.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Out of the brightness before Him coals of fire flamed forth.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The Lord thundered from heaven, and the Most High uttered His voice.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He sent out arrows and scattered them; lightning confused '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' troubled them.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The channels of the sea were visible, the foundations of the world were uncovered at the rebuke of the Lord, at the blast of the breath of His nostrils.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' He sent from above, He took me; He drew me out of great waters.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' He delivered me from my strong enemy, from those who hated me, for they were too mighty for me.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' They came upon me in the day of my calamity, but the Lord was my stay.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He said: The Lord is my Rock [of escape from Saul] and my Fortress [in the wilderness] and my Deliverer; [I Sam. 23:14, 25, 28.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' He brought me forth into a large place; He delivered me because He delighted in me.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The Lord rewarded me according to my uprightness with Him; He compensated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' benefited me according to the cleanness of my hands.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' For I have kept the ways of the Lord, and have not wickedly departed from my God.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' For all His ordinances were before me; and from His statutes I did not turn aside.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' I was also blameless before Him and kept myself from guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' iniquity.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Therefore the Lord has recompensed me according to my righteousness, according to my cleanness in His [holy] sight.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Toward the loving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loyal You will show Yourself loving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loyal, and with the upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blameless You will show Yourself upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blameless.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' To the pure You will show Yourself pure, and to the willful You will show Yourself willful.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And the afflicted people You will deliver, but Your eyes are upon the haughty, whom You will bring down.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' For You, O Lord, are my Lamp; the Lord lightens my darkness.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' My God, my Rock, in Him will I take refuge; my Shield and the Horn of my salvation; my Stronghold and my Refuge, my Savior–You save me from violence. [Gen. 15:1.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' For by You I run through a troop; by my God I leap over a wall.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' As for God, His way is perfect; the word of the Lord is tried. He is a Shield to all those who trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take refuge in Him.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' For who is God but the Lord? And who is a Rock except our God?'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' God is my strong Fortress; He guides the blameless in His way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sets him free.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' He makes my feet like the hinds'' [firm and able]; He sets me secure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident upon the heights.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' He trains my hands for war, so that my arms can bend a bow of bronze.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' You have also given me the shield of Your salvation; and Your condescension '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gentleness have made me great.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' You have enlarged my steps under me, so that my feet have not slipped.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' I have pursued my enemies and destroyed them; and I did not turn back until they were consumed.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' I consumed them and thrust them through, so that they did not arise; they fell at my feet.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' I call on the Lord, Who is worthy to be praised, and I am saved from my enemies.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' For You girded me with strength for the battle; those who rose up against me You subdued under me.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' You have made my enemies turn their backs to me, that I might cut off those who hate me.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' They looked, but there was none to save–even to the Lord, but He did not answer them.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' Then I beat them small as the dust of the earth; I crushed them as the mire of the street and scattered them abroad.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' You also have delivered me from strife with my people; You kept me as the head of the nations. People whom I had not known served me.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' Foreigners yielded feigned obedience to me; as soon as they heard of me, they became obedient to me.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' Foreigners faded away; they came limping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trembling from their strongholds.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' The Lord lives; blessed be my Rock, and exalted be God, the Rock of my salvation.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' It is God Who executes vengeance for me and Who brought down [and disciplined] the peoples under me,'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' Who brought me out from my enemies. You also lifted me up above those who rose up against me; You delivered me from the violent man.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For the waves of death enveloped me; the torrents of destruction made me afraid.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' For this I will give thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extol You, O Lord, among the nations; I will sing praises to Your name.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' He is a Tower of salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' great deliverance to His king, and shows loving-kindness to His anointed, to David and his offspring forever.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' The cords of Sheol were entangling me; I encountered the snares of death.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' In my distress I called upon the Lord; I cried to my God, and He heard my voice from His temple; my cry came into His ears.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then the earth reeled and quaked, the foundations of the heavens trembled and shook because He was angry.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Smoke went up from His nostrils, and devouring fire from His mouth; coals were kindled by it.'
