document_id: PSA.60
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; +[set to the tune of+] ``The Lily of the Testimony." A poem of David intended to record memorable thoughts and to teach; when he had striven with the Arameans of Mesopotamia and the Arameans of Zobah, and when Joab returned and smote twelve thousand Edomites in the Valley of Salt.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O GOD, You have rejected us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cast us off, broken down [our defenses], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scattered us; You have been angry–O restore us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turn Yourself to us again!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You have made the land to quake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tremble, You have rent it [open]; repair its breaches, for it shakes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' totters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You have made Your people suffer hard things; You have given us to drink wine that makes us reel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be dazed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [But now] You have set up a banner for those who fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully revere You [to which they may flee from the bow], a standard displayed because of the truth. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' That Your beloved ones may be delivered, save with Your right hand and answer us [or me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' God has spoken in His holiness [in His promises]: I will rejoice, I will divide and portion out [the land] Shechem and the Valley of Succoth [west to east].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Gilead is Mine, and Manasseh is Mine; Ephraim also is My helmet (the defense of My head); Judah is My scepter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' My lawgiver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Moab is My washpot [reduced to vilest servitude]; upon Edom I cast My shoe in triumph; over Philistia I raise the shout of victory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Who will bring me [David] into the strong city [of Petra]? Who will lead me into Edom?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Have You not rejected us, O God? And will You not go forth, O God, with our armies?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' O give us help against the adversary, for vain (ineffectual and to no purpose) is the help or salvation of man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Through God we shall do valiantly, for He it is Who shall tread down our adversaries.'
