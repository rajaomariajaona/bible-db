document_id: PSA.60,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; +[set to the tune of+] ``The Lily of the Testimony." A poem of David intended to record memorable thoughts and to teach; when he had striven with the Arameans of Mesopotamia and the Arameans of Zobah, and when Joab returned and smote twelve thousand Edomites in the Valley of Salt.
  - type: text
    content: ' O GOD, You have rejected us '
  - type: text
    content: and
  - type: text
    content: ' cast us off, broken down [our defenses], '
  - type: text
    content: and
  - type: text
    content: ' scattered us; You have been angry–O restore us '
  - type: text
    content: and
  - type: text
    content: ' turn Yourself to us again!'
  '10':
  - type: text
    content: ' Have You not rejected us, O God? And will You not go forth, O God, with our armies?'
  '11':
  - type: text
    content: ' O give us help against the adversary, for vain (ineffectual and to no purpose) is the help or salvation of man.'
  '12':
  - type: text
    content: ' Through God we shall do valiantly, for He it is Who shall tread down our adversaries.'
  '2':
  - type: text
    content: ' You have made the land to quake '
  - type: text
    content: and
  - type: text
    content: ' tremble, You have rent it [open]; repair its breaches, for it shakes '
  - type: text
    content: and
  - type: text
    content: ' totters.'
  '3':
  - type: text
    content: ' You have made Your people suffer hard things; You have given us to drink wine that makes us reel '
  - type: text
    content: and
  - type: text
    content: ' be dazed.'
  '4':
  - type: text
    content: ' [But now] You have set up a banner for those who fear '
  - type: text
    content: and
  - type: text
    content: ' worshipfully revere You [to which they may flee from the bow], a standard displayed because of the truth. Selah [pause, and calmly think of that]!'
  '5':
  - type: text
    content: ' That Your beloved ones may be delivered, save with Your right hand and answer us [or me].'
  '6':
  - type: text
    content: ' God has spoken in His holiness [in His promises]: I will rejoice, I will divide and portion out [the land] Shechem and the Valley of Succoth [west to east].'
  '7':
  - type: text
    content: ' Gilead is Mine, and Manasseh is Mine; Ephraim also is My helmet (the defense of My head); Judah is My scepter '
  - type: text
    content: and
  - type: text
    content: ' My lawgiver.'
  '8':
  - type: text
    content: ' Moab is My washpot [reduced to vilest servitude]; upon Edom I cast My shoe in triumph; over Philistia I raise the shout of victory.'
  '9':
  - type: text
    content: ' Who will bring me [David] into the strong city [of Petra]? Who will lead me into Edom?'
