document_id: JER.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER NEBUCHADREZZAR king of Babylon had taken into exile Jeconiah [also called Coniah and Jehoiachin] son of Jehoiakim king of Judah and the princes of Judah, with the craftsmen and smiths from Jerusalem, and had brought them to Babylon, the Lord showed me [in a vision] two baskets of figs set before the temple of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' One basket had very good figs, like the figs that are first ripe; but the other basket had very bad figs, so bad that they could not be eaten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then the Lord said to me, What do you see, Jeremiah? And I said, Figs–the good figs very good, and the bad very bad, so bad that they cannot be eaten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Again the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thus says the Lord, the God of Israel: Like these good figs, so will I regard the captives of Judah whom I have sent out of this place into the land of the Chaldeans for their good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For I will set My eyes upon them for good, and I will bring them again to this land; and I will build them up and not pull them down, and I will plant them and not pluck them up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I will give them a heart to know (recognize, understand, and be acquainted with) Me, that I am the Lord; and they will be My people, and I will be their God, for they will return to Me with their whole heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And as for the bad figs, which are so bad that they cannot be eaten, surely thus says the Lord, So will I give up Zedekiah king of Judah and his princes and the residue of Jerusalem who remains in this land and those who dwell in the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I will even give them up to be a dismay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a horror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be tossed to and fro among all the kingdoms of the earth for evil, to be a reproach, a byword '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' proverb, a taunt, and a curse in all places where I will drive them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And I will send the sword, famine, and pestilence among them until they are consumed from off the land that I gave to them and to their fathers.'
