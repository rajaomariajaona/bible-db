document_id: LAM.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HOW THE gold has become dim! How the most pure gold has changed! The hallowed stones [of the temple] are poured out at the head of every street.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The noble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' precious sons of Zion, [once] worth their weight in fine gold–how they are esteemed [merely] as earthen pots '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pitchers, the work of the hands of the potter! [Isa. 30:14; Jer. 19:11; II Cor. 4:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Even the jackals draw out the breast, they give suck to their young ones, but the daughter of my people has become cruel like ostriches in the wilderness [that desert their young].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The tongue of the nursing babe cleaves to the roof of its mouth because of thirst; the young children beg for food, but no one gives it to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Those who feasted on dainties are perishing in the streets; those who were brought up in purple lie cleaving to refuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ash heaps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For the punishment of the iniquity of the daughter of my people is greater than the punishment of the sin of Sodom, which was overthrown in a moment, and no hands had come against her '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' been laid on her. [Gen. 19:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [In physical appearance] her princes were purer than snow, they were whiter than milk; they were more ruddy in body than rubies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' corals, their shapely figures [suggested a carefully cut] sapphire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' [Prolonged famine has made] them look blacker than soot and darkness; they are not recognized in the streets. Their skin clings to their bones; it is withered and it has become [dry] like a stick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Those who are slain with the sword are more fortunate than those who are the victims of hunger [slain by the famine]; for they [the hungry] pine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ebb away, stricken through for want of the fruits of the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The hands of [heretofore] compassionate women have boiled their own children; they were their food during the destruction of the daughter of my people [Judah].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Lord has fulfilled His wrath; He has poured out His fierce anger and has kindled a fire in Zion that has consumed her foundations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The kings of the earth did not believe, nor did any of the inhabitants of the earth, that the oppressor and enemy could enter the gates of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' [But this happened] because of the sins of her [false] prophets and the iniquities of her priests, who shed the blood of the just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous in the midst of her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' [The false prophets and priests] wandered [staggering] in the streets as if blind; they had so polluted themselves with blood it was not [lawful] for men to touch their garments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' [People] cried to them, Go away! Unclean! Depart! Depart! Touch not! When they fled away, then they wandered [as fugitives]; men said among the nations, They shall not stay here any longer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The anger of the Lord has scattered [and divided them among the nations]; He will no longer look after them. They did not respect the persons of the priests; they did not favor the elders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' As for us, our eyes yet failed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wasted away in looking for our worthless help. In our watching [on our watchtower] we have watched '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' waited expectantly for a nation [Egypt or some other one to come to our rescue] that could not save us. [Ezek. 29:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' [The missiles of the enemy] dog our steps, so that we cannot go into our streets; our end is near, our days are fulfilled–yes, our end has come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Our pursuers were swifter than the eagles of the sky; they pursued us on the mountains, they lay in wait for us in the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The breath of our nostrils, the anointed of the Lord [our king], was taken in their snares–he of whom we said, Under his shadow we shall live among the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Rejoice and be glad, O Daughter of Edom, you who dwell in the land of Uz. But the cup [of the wine of God''s wrath] also shall pass to you; you shall become drunk and make yourself naked. [Jer. 25:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The punishment of your iniquity will be accomplished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' completed, O Daughter of Zion; [the Lord] will no more carry you away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' keep you in exile. But He will inspect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish your iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt, O Daughter of Edom; He will uncover your sins. [Ps. 137:7.]'
