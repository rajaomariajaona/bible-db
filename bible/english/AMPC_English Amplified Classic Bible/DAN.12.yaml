document_id: DAN.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND AT that time [of the end] Michael shall arise, the great [angelic] prince who defends '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has charge of your [Daniel''s] people. And there shall be a time of trouble, straitness, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distress such as never was since there was a nation till that time. But at that time your people shall be delivered, everyone whose name shall be found written in the Book [of God''s plan for His own].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And many of those who sleep in the dust of the earth shall awake: some to everlasting life and some to shame and everlasting contempt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abhorrence. [John 5:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the teachers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' those who are wise shall shine like the brightness of the firmament, and those who turn many to righteousness (to uprightness and right standing with God) [shall give forth light] like the stars forever and ever. [Matt. 13:43.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But you, O Daniel, shut up the words and seal the Book until the time of the end. [Then] many shall run to and fro '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' search anxiously [through the Book], and knowledge [of God''s purposes as revealed by His prophets] shall be increased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become great. [Amos 8:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then I, Daniel, looked, and behold, there stood two others, the one on the brink of the river on this side and the other on the brink of the river on that side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And one said to the man clothed in linen, who was above the waters of the river, How long shall it be to the end of these wonders? [Dan. 10:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I heard the man clothed in linen, who was above the waters of the river, when he held up his right and his left hand toward the heavens and swore by Him Who lives forever that it shall be for a time, times, and a half a time [or three and one-half years]; and when they have made an end of shattering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushing the power of the holy people, all these things shall be finished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I heard, but I did not understand. Then I said, O my lord, what shall be the issue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' final end of these things?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he [the angel] said, Go your way, Daniel, for the words are shut up and sealed till the time of the end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Many shall purify themselves and make themselves white and be tried, smelted, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refined, but the wicked shall do wickedly. And none of the wicked shall understand, but the teachers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' those who are wise shall understand. [Dan. 11:33-35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And from the time that the continual burnt offering is taken away and the abomination that makes desolate is set up, there shall be 1,290 days. [Dan. 11:31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Blessed, happy, fortunate, spiritually prosperous, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be envied is he who waits expectantly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' earnestly [who endures without wavering beyond the period of tribulation] and comes to the 1,335 days!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But you [Daniel, who was now over ninety years of age], go your way until the end; for you shall rest and shall stand [fast] in your allotted place at the end of the days. [Heb. 11:32-40.]'
