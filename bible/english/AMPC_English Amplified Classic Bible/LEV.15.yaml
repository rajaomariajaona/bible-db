document_id: LEV.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses and Aaron,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Say to the Israelites, When any man has a running discharge from his body, because of his discharge he is unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' This shall be [the law concerning] his uncleanness in his discharge: whether his body runs with his discharge or has stopped [running], it is uncleanness in him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Every bed on which the one who has the discharge lies is unclean, and everything on which he sits shall be unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Whoever touches that person''s bed shall wash his clothes, and bathe himself in water, and be unclean until the evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And whoever sits on anything on which he who has the discharge has sat shall wash his clothes and bathe himself in water, and be unclean until the evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he who touches the flesh of him who has the discharge shall wash his clothes and bathe himself in water, and be unclean until the evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And if he who has the discharge spits on him who is clean, then he shall wash his clothes and bathe himself in water, and be unclean until the evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And any saddle on which he who has the discharge rides shall be unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Whoever touches anything that has been under him shall be unclean until evening; and he who carries those things shall wash his clothes and bathe himself in water, and be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Whomever he who has the discharge touches without rinsing his hands in water shall wash his clothes and bathe himself in water, and be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The earthen vessel that he with the discharge touches shall be broken, and every vessel of wood shall be rinsed in water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When he who has a discharge is cleansed of it, he shall count seven days for his purification, then wash his clothes, bathe in running water, and be clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' On the eighth day he shall take two turtledoves or two young pigeons and come before the Lord to the door of the Tent of Meeting and give them to the priest;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the priest shall offer them, one for a sin offering and the other for a burnt offering; and [he] shall make atonement for the man before the Lord for his discharge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And if any man has a discharge of semen, he shall wash all his body in water, and be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And every garment and every skin on which the sperm comes shall be washed with water, and be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The woman also with whom a man with emission of semen shall lie, they shall both bathe themselves in water, and be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And if a woman has a discharge, her [regular] discharge of blood of her body, she shall be in her impurity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' separation for seven days, and whoever touches her shall be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And everything that she lies on in her separation shall be unclean; everything also that she sits on shall be unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And whoever touches her bed shall wash his clothes and bathe himself in water, and be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Whoever touches anything she sat on shall wash his clothes and bathe himself in water, and be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And if her flow has stained her bed or anything on which she sat, when he touches it, he shall be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And if any man lie with her and her impurity be upon him, he shall be unclean seven days; and every bed on which he lies shall be unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And if a woman has an issue of blood for many days, not during the time of her separation, or if she has a discharge beyond the time of her [regular] impurity, all the days of the issue of her uncleanness she shall be as in the days of her impurity; she shall be unclean. [Matt. 9:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Every bed on which she lies all the days of her discharge shall be as the bed of her impurity, and whatever she sits on shall be unclean, as in her impurity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And whoever touches those things shall be unclean, and shall wash his clothes and bathe himself in water, and be unclean until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But if she is cleansed of her discharge, then she shall wait seven days, and after that she shall be clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And on the eighth day she shall take two turtledoves or two young pigeons and bring them to the priest at the door of the Tent of Meeting;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' He shall offer one for a sin offering and the other for a burnt offering; and he shall make atonement for her before the Lord for her unclean discharge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Thus you shall separate the Israelites from their uncleanness, lest they die in their uncleanness by defiling My tabernacle that is in the midst of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' This is the law for him who has a discharge and for him who has emissions of sperm, being made unclean by it;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And for her who is sick with her impurity, and for any person who has a discharge, whether man or woman, and for him who lies with her who is unclean.'
