document_id: PSA.80,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; +[set to the tune of+] ``Lilies, a Testimony." A Psalm of Asaph.
  - type: text
    content: ' GIVE EAR, O Shepherd of Israel, You Who lead Joseph like a flock; You Who sit enthroned upon the cherubim [of the ark of the covenant], shine forth'
  '10':
  - type: text
    content: ' The mountains were covered with the shadow of it, and the boughs of it were like the great cedars [cedars of God].'
  '11':
  - type: text
    content: ' [Israel] sent out its boughs to the [Mediterranean] Sea and its branches to the [Euphrates] River. [I Kings 4:21.]'
  '12':
  - type: text
    content: ' Why have You broken down its hedges '
  - type: text
    content: and
  - type: text
    content: ' walls so that all who pass by pluck from its fruit?'
  '13':
  - type: text
    content: ' The boar out of the wood wastes it and the wild beast of the field feeds on it.'
  '14':
  - type: text
    content: ' Turn again, we beseech You, O God of hosts! Look down from heaven and see, visit, '
  - type: text
    content: and
  - type: text
    content: ' have regard for this vine!'
  '15':
  - type: text
    content: ' [Protect and maintain] the stock which Your right hand planted, and the branch (the son) that You have reared '
  - type: text
    content: and
  - type: text
    content: ' made strong for Yourself.'
  '16':
  - type: text
    content: ' They have burned it with fire, it is cut down; may they perish at the rebuke of Your countenance.'
  '17':
  - type: text
    content: ' Let Your hand be upon the man of Your right hand, upon the son of man whom You have made strong for Yourself.'
  '18':
  - type: text
    content: ' Then will we not depart from You; revive us (give us life) and we will call upon Your name.'
  '19':
  - type: text
    content: ' Restore us, O Lord God of hosts; cause Your face to shine [in pleasure, approval, and favor on us], and we shall be saved!'
  '2':
  - type: text
    content: ' Before Ephraim and Benjamin and Manasseh! Stir up Your might, and come to save us!'
  '3':
  - type: text
    content: ' Restore us again, O God; and cause Your face to shine [in pleasure and approval on us], and we shall be saved!'
  '4':
  - type: text
    content: ' O Lord God of hosts, how long will You be angry with Your people''s prayers?'
  '5':
  - type: text
    content: ' You have fed them with the bread of tears, and You have given them tears to drink in large measure.'
  '6':
  - type: text
    content: ' You make us a strife '
  - type: text
    content: and
  - type: text
    content: ' scorn to our neighbors, and our enemies laugh among themselves.'
  '7':
  - type: text
    content: ' Restore us again, O God of hosts; and cause Your face to shine [upon us with favor as of old], and we shall be saved!'
  '8':
  - type: text
    content: ' You brought a vine [Israel] out of Egypt; You drove out the [heathen] nations and planted it [in Canaan].'
  '9':
  - type: text
    content: ' You prepared room before it, and it took deep root and it filled the land.'
