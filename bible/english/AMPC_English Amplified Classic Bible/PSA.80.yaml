document_id: PSA.80
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; +[set to the tune of+] ``Lilies, a Testimony." A Psalm of Asaph.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' GIVE EAR, O Shepherd of Israel, You Who lead Joseph like a flock; You Who sit enthroned upon the cherubim [of the ark of the covenant], shine forth'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Before Ephraim and Benjamin and Manasseh! Stir up Your might, and come to save us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Restore us again, O God; and cause Your face to shine [in pleasure and approval on us], and we shall be saved!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' O Lord God of hosts, how long will You be angry with Your people''s prayers?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You have fed them with the bread of tears, and You have given them tears to drink in large measure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You make us a strife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scorn to our neighbors, and our enemies laugh among themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Restore us again, O God of hosts; and cause Your face to shine [upon us with favor as of old], and we shall be saved!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You brought a vine [Israel] out of Egypt; You drove out the [heathen] nations and planted it [in Canaan].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You prepared room before it, and it took deep root and it filled the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The mountains were covered with the shadow of it, and the boughs of it were like the great cedars [cedars of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' [Israel] sent out its boughs to the [Mediterranean] Sea and its branches to the [Euphrates] River. [I Kings 4:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Why have You broken down its hedges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' walls so that all who pass by pluck from its fruit?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The boar out of the wood wastes it and the wild beast of the field feeds on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Turn again, we beseech You, O God of hosts! Look down from heaven and see, visit, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have regard for this vine!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' [Protect and maintain] the stock which Your right hand planted, and the branch (the son) that You have reared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made strong for Yourself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They have burned it with fire, it is cut down; may they perish at the rebuke of Your countenance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Let Your hand be upon the man of Your right hand, upon the son of man whom You have made strong for Yourself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then will we not depart from You; revive us (give us life) and we will call upon Your name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Restore us, O Lord God of hosts; cause Your face to shine [in pleasure, approval, and favor on us], and we shall be saved!'
