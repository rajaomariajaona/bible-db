document_id: MAT.28,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW AFTER the Sabbath, near dawn of the first day of the week, Mary of Magdala and the other Mary went to take a look at the tomb.'
  '10':
  - type: text
    content: ' Then Jesus said to them, Do not be alarmed '
  - type: text
    content: and
  - type: text
    content: ' afraid; go and tell My brethren to go into Galilee, and there they will see Me.'
  '11':
  - type: text
    content: ' While they were on their way, behold, some of the guards went into the city and reported to the chief priests everything that had occurred.'
  '12':
  - type: text
    content: ' And when they [the chief priests] had gathered with the elders and had consulted together, they gave a sufficient sum of money to the soldiers,'
  '13':
  - type: text
    content: ' And said, Tell people, His disciples came at night and stole Him away while we were sleeping.'
  '14':
  - type: text
    content: ' And if the governor hears of it, we will appease him and make you safe '
  - type: text
    content: and
  - type: text
    content: ' free from trouble '
  - type: text
    content: and
  - type: text
    content: ' care.'
  '15':
  - type: text
    content: ' So they took the money and did as they were instructed; and this story has been current among the Jews to the present day.'
  '16':
  - type: text
    content: ' Now the eleven disciples went to Galilee, to the mountain to which Jesus had directed '
  - type: text
    content: and
  - type: text
    content: ' made appointment with them.'
  '17':
  - type: text
    content: ' And when they saw Him, they fell down and worshiped Him; but some doubted.'
  '18':
  - type: text
    content: ' Jesus approached and, breaking the silence, said to them, All authority (all power of rule) in heaven and on earth has been given to Me.'
  '19':
  - type: text
    content: ' Go then and make disciples of all the nations, baptizing them into the name of the Father and of the Son and of the Holy Spirit,'
  '2':
  - type: text
    content: ' And behold, there was a great earthquake, for an angel of the Lord descended from heaven and came and rolled the boulder back and sat upon it.'
  '20':
  - type: text
    content: ' Teaching them to observe everything that I have commanded you, and behold, I am with you all the days (perpetually, uniformly, and on every occasion), to the [very] close '
  - type: text
    content: and
  - type: text
    content: ' consummation of the age. '
  - type: text
    content: Amen (so let it be).
  '3':
  - type: text
    content: ' His appearance was like lightning, and his garments as white as snow.'
  '4':
  - type: text
    content: ' And those keeping guard were so frightened at the sight of him that they were agitated '
  - type: text
    content: and
  - type: text
    content: ' they trembled and became like dead men.'
  '5':
  - type: text
    content: ' But the angel said to the women, Do not be alarmed '
  - type: text
    content: and
  - type: text
    content: ' frightened, for I know that you are looking for Jesus, Who was crucified.'
  '6':
  - type: text
    content: ' He is not here; He has risen, as He said [He would do]. Come, see the place where He lay.'
  '7':
  - type: text
    content: ' Then go quickly and tell His disciples, He has risen from the dead, and behold, He is going before you to Galilee; there you will see Him. Behold, I have told you.'
  '8':
  - type: text
    content: ' So they left the tomb hastily with fear and great joy and ran to tell the disciples.'
  '9':
  - type: text
    content: ' And '
  - type: text
    content: as they went,
  - type: text
    content: ' behold, Jesus met them and said, Hail (greetings)! And they went up to Him and clasped His feet and worshiped Him.'
