document_id: MAT.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW AFTER the Sabbath, near dawn of the first day of the week, Mary of Magdala and the other Mary went to take a look at the tomb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And behold, there was a great earthquake, for an angel of the Lord descended from heaven and came and rolled the boulder back and sat upon it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' His appearance was like lightning, and his garments as white as snow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And those keeping guard were so frightened at the sight of him that they were agitated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they trembled and became like dead men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But the angel said to the women, Do not be alarmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' frightened, for I know that you are looking for Jesus, Who was crucified.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He is not here; He has risen, as He said [He would do]. Come, see the place where He lay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then go quickly and tell His disciples, He has risen from the dead, and behold, He is going before you to Galilee; there you will see Him. Behold, I have told you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So they left the tomb hastily with fear and great joy and ran to tell the disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as they went,
  - type: text
    text: ' behold, Jesus met them and said, Hail (greetings)! And they went up to Him and clasped His feet and worshiped Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Jesus said to them, Do not be alarmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afraid; go and tell My brethren to go into Galilee, and there they will see Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' While they were on their way, behold, some of the guards went into the city and reported to the chief priests everything that had occurred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And when they [the chief priests] had gathered with the elders and had consulted together, they gave a sufficient sum of money to the soldiers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And said, Tell people, His disciples came at night and stole Him away while we were sleeping.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And if the governor hears of it, we will appease him and make you safe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' free from trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' care.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So they took the money and did as they were instructed; and this story has been current among the Jews to the present day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Now the eleven disciples went to Galilee, to the mountain to which Jesus had directed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made appointment with them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And when they saw Him, they fell down and worshiped Him; but some doubted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Jesus approached and, breaking the silence, said to them, All authority (all power of rule) in heaven and on earth has been given to Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Go then and make disciples of all the nations, baptizing them into the name of the Father and of the Son and of the Holy Spirit,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Teaching them to observe everything that I have commanded you, and behold, I am with you all the days (perpetually, uniformly, and on every occasion), to the [very] close '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consummation of the age. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so let it be).
