document_id: 1CH.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN [after the death of Ish-bosheth, Saul''s son, who ruled over eleven tribes of Israel for two troubled years after Saul''s death] all Israel gathered at Hebron and said to David, Behold, we are your bone and your flesh. [II Sam. 2:8-10.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Now these are the chiefs of David''s mighty men, who strongly supported him in his kingdom, together with all Israel, to make him king, according to the word of the Lord concerning Israel.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And this is the number [thirty, and list] of David''s mighty men: Jashobeam, a Hachmonite, the chief of the Thirty [captains]. He lifted up his spear against 300, whom he slew at one time.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Next to him in rank was Eleazar son of Dodo the Ahohite, one of the three mighty men.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He was with David at Pas-dammim [where David had long before slain Goliath], and there the Philistines were gathered for battle, where there was a plot of ground full of barley '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' lentils; and the men [of Israel] fled before the Philistines.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And Eleazar [one of the Three] stood in the midst of that plot and defended it and slew the Philistines [until his hand was weary, and his hand cleaved to the sword], and the Lord saved by a great victory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliverance. [II Sam. 23:9, 10.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Three of the thirty chief men went down to the rock to David, into the cave of Adullam, and the army of the Philistines was encamped in the Valley of Rephaim.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' David was then in the stronghold, and the Philistines'' garrison was in Bethlehem.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And David longingly said, Oh, that someone would give me water to drink from the well of Bethlehem which is by the gate!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Then the Three [mighty men] broke through the camp of the Philistines and drew water out of the well of Bethlehem which was by the gate and brought it to David. But David would not drink it; he poured it out to the Lord,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And said, My God forbid that I should do this thing. Shall I drink the blood of these men who have put their lives in jeopardy? For at the risk of their lives they brought it. So he would not drink it. These things did these three mighty men.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' In times past, even when Saul was king, it was you who led out and brought in Israel; and the Lord your God said to you, You shall be shepherd of My people Israel, and you shall be prince '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' leader over [them].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Abishai the brother of Joab was chief of the Three. For he lifted up his spear against 300 and slew them, and was named among the Three.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Of the Three [in the second rank] he was more renowned than the two, and became their captain; however, he attained not to the first three.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Benaiah son of Jehoiada, whose father was a valiant man of Kabzeel, had done mighty deeds. He slew the two sons of Ariel of Moab. Also he went down and slew a lion in a pit in time of snow.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' He slew an Egyptian also, a man of great stature, five cubits tall. The Egyptian held a spear like a weaver''s beam, and [Benaiah] went to him with a staff and plucked the spear out of the Egyptian''s hand and slew him with the man''s own spear.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' These things did Benaiah son of Jehoiada, and won a name beside the three mighty men.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' He was renowned among the Thirty, but he did not attain to the rank of the first three. David put him over his guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' council.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Also the mighty men of the armies were: Asahel the brother of Joab, Elhanan son of Dodo of Bethlehem,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Shammoth of Harod, Helez the Pelonite,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Ira son of Ikkesh of Tekoa, Abiezer of Anathoth,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Sibbecai the Hushathite, Ilai the Ahohite,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So all the elders of Israel came to the king at Hebron, and David made a covenant with them there before the Lord, and they anointed [him] king over Israel, according to the word of the Lord through Samuel. [I Sam. 16:1, 12, 13.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Maharai of Netophah, Heled son of Baanah of Netophah,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Ithai son of Ribai of Gibeah of the Benjamites, Benaiah of Pirathon,'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Hurai of the brooks of Gaash, Abiel the Arbathite,'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Azmaveth of Baharum, Eliahba of Shaalbon,'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' The sons of Hashem the Gizonite, Jonathan son of Shagee the Hararite,'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Ahiam son of Sacar the Hararite, Eliphal son of Ur,'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Hepher the Mecherathite, Ahijah the Pelonite,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' Hezro of Carmel, Naarai son of Ezbai,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Joel the brother of Nathan, Mibhar son of Hagri,'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Zelek the Ammonite, Naharai the Berothite, the armor-bearer of Joab son of Zeruiah [David''s half sister],'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And David and all Israel went to Jerusalem, that is Jebus, where the Jebusites, the inhabitants of the land, were.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' Ira the Ithrite, Gareb the Ithrite,'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' Uriah the Hittite [Bathsheba''s husband], Zabad son of Ahlai,'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' Adina son of Shiza, a leader of the Reubenites, and thirty heroes with him,'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' Hanan son of Maacah, and Joshaphat the Mithnite,'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' Uzzia the Ashterathite, Shama and Jeiel the sons of Hotham the Aroerite,'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' Jediael son of Shimri, and Joha his brother, the Tizite,'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' Eliel the Mahavite, Jeribai and Joshaviah sons of Elnaam, Ithmah the Moabite,'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' Eliel, Obed, and Jaasiel the Mezobaite.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then the Jebusites said to David, You shall not come in here! But David took the stronghold of Zion, that is, the City of David.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And David said, Whoever smites the Jebusites first shall be chief and commander. Joab son of Zeruiah [David''s half sister] went up first, and so he was made chief.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' David dwelt in the stronghold; so it was called the City of David.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He built the city from the Millo [a fortification] on around; and Joab repaired '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revived the rest of the [old Jebusite] city.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And David became greater and greater, for the Lord of hosts was with him.'
