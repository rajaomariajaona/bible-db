document_id: PSA.4,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; on stringed instruments. A Psalm of David.
  - type: text
    content: ' ANSWER ME when I call, O God of my righteousness (uprightness, justice, and right standing with You)! You have freed me when I was hemmed in '
  - type: text
    content: and
  - type: text
    content: ' enlarged me when I was in distress; have mercy upon me and hear my prayer.'
  '2':
  - type: text
    content: ' O you sons of men, how long will you turn my honor '
  - type: text
    content: and
  - type: text
    content: ' glory into shame? How long will you love vanity '
  - type: text
    content: and
  - type: text
    content: ' futility '
  - type: text
    content: and
  - type: text
    content: ' seek after lies? Selah [pause, and calmly think of that]!'
  '3':
  - type: text
    content: ' But know that the Lord has set apart for Himself [and given distinction to] him who is godly [the man of loving-kindness]. The Lord listens '
  - type: text
    content: and
  - type: text
    content: ' heeds when I call to Him.'
  '4':
  - type: text
    content: ' Be angry [or stand in awe] and sin not; commune with your own hearts upon your beds and be silent (sorry for the things you say in your hearts). Selah [pause, and calmly think of that]! [Eph. 4:26.]'
  '5':
  - type: text
    content: ' Offer just '
  - type: text
    content: and
  - type: text
    content: ' right sacrifices; trust (lean on and be confident) in the Lord.'
  '6':
  - type: text
    content: ' Many say, Oh, that we might see some good! Lift up the light of Your countenance upon us, O Lord.'
  '7':
  - type: text
    content: ' You have put more joy '
  - type: text
    content: and
  - type: text
    content: ' rejoicing in my heart than [they know] when their wheat and new wine have yielded abundantly.'
  '8':
  - type: text
    content: ' In peace I will both lie down and sleep, for You, Lord, alone make me dwell in safety '
  - type: text
    content: and
  - type: text
    content: ' confident trust.'
