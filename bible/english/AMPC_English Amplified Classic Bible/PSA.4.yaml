document_id: PSA.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; on stringed instruments. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ANSWER ME when I call, O God of my righteousness (uprightness, justice, and right standing with You)! You have freed me when I was hemmed in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enlarged me when I was in distress; have mercy upon me and hear my prayer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' O you sons of men, how long will you turn my honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory into shame? How long will you love vanity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' futility '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seek after lies? Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But know that the Lord has set apart for Himself [and given distinction to] him who is godly [the man of loving-kindness]. The Lord listens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heeds when I call to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Be angry [or stand in awe] and sin not; commune with your own hearts upon your beds and be silent (sorry for the things you say in your hearts). Selah [pause, and calmly think of that]! [Eph. 4:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Offer just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right sacrifices; trust (lean on and be confident) in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Many say, Oh, that we might see some good! Lift up the light of Your countenance upon us, O Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You have put more joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejoicing in my heart than [they know] when their wheat and new wine have yielded abundantly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' In peace I will both lie down and sleep, for You, Lord, alone make me dwell in safety '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident trust.'
