verses:
  '1':
  - type: text
    content: ' AND [Jesus] left there [Capernaum] and went to the region of Judea and beyond [east of] the Jordan; and crowds [constantly] gathered around Him again, and as was His custom, He began to teach them again.'
  '10':
  - type: text
    content: ' And indoors the disciples questioned Him again about this subject.'
  '11':
  - type: text
    content: ' And He said to them, Whoever dismisses (repudiates and divorces) his wife and marries another commits adultery against her;'
  '12':
  - type: text
    content: ' And if a woman dismisses (repudiates and divorces) her husband and marries another, she commits adultery.'
  '13':
  - type: text
    content: ' And they kept bringing young children to Him that He might touch them, and the disciples were reproving them [for it].'
  '14':
  - type: text
    content: ' But when Jesus saw [it], He was indignant '
  - type: text
    content: and
  - type: text
    content: ' pained and said to them, Allow the children to come to Me–do not forbid '
  - type: text
    content: or
  - type: text
    content: ' prevent '
  - type: text
    content: or
  - type: text
    content: ' hinder them–for to such belongs the kingdom of God.'
  '15':
  - type: text
    content: ' Truly I tell you, whoever does not receive '
  - type: text
    content: and
  - type: text
    content: ' accept '
  - type: text
    content: and
  - type: text
    content: ' welcome the kingdom of God like a little child [does] positively shall not enter it at all.'
  '16':
  - type: text
    content: ' And He took them [the children up one by one] in His arms and [fervently invoked a] blessing, placing His hands upon them.'
  '17':
  - type: text
    content: ' And as He was setting out on His journey, a man ran up and knelt before Him and asked Him, Teacher, [You are essentially and perfectly morally] good, what must I do to inherit eternal life [that is, to partake of eternal salvation in the Messiah''s kingdom]?'
  '18':
  - type: text
    content: ' And Jesus said to him, Why do you call Me [essentially and perfectly morally] good? There is no one [essentially and perfectly morally] good–except God alone.'
  '19':
  - type: text
    content: ' You know the commandments: Do not kill, do not commit adultery, do not steal, do not bear false witness, do not defraud, honor your father and mother. [Exod. 20:12-16; Deut. 5:16-20.]'
  '2':
  - type: text
    content: ' And some Pharisees came up, and, in order to test Him '
  - type: text
    content: and
  - type: text
    content: ' try to find a weakness in Him, asked, Is it lawful for a man to dismiss '
  - type: text
    content: and
  - type: text
    content: ' repudiate '
  - type: text
    content: and
  - type: text
    content: ' divorce his wife?'
  '20':
  - type: text
    content: ' And he replied to Him, Teacher, I have carefully guarded '
  - type: text
    content: and
  - type: text
    content: ' observed all these '
  - type: text
    content: and
  - type: text
    content: ' taken care not to violate them from my boyhood.'
  '21':
  - type: text
    content: ' And Jesus, looking upon him, loved him, and He said to him, You lack one thing; go and sell all you have and give [the money] to the poor, and you will have treasure in heaven; and come [and] accompany Me [walking the same road that I walk].'
  '22':
  - type: text
    content: ' At that saying the man''s countenance fell '
  - type: text
    content: and
  - type: text
    content: ' was gloomy, and he went away grieved '
  - type: text
    content: and
  - type: text
    content: ' sorrowing, for he was holding great possessions.'
  '23':
  - type: text
    content: ' And Jesus looked around and said to His disciples, With what difficulty will those who possess wealth '
  - type: text
    content: and
  - type: text
    content: ' keep on holding it enter the kingdom of God!'
  '24':
  - type: text
    content: ' And the disciples were amazed '
  - type: text
    content: and
  - type: text
    content: ' bewildered '
  - type: text
    content: and
  - type: text
    content: ' perplexed at His words. But Jesus said to them again, Children, how hard it is '
  - type: text
    content: for those who trust (place their confidence, their sense of safety) in riches
  - type: text
    content: ' to enter the kingdom of God!'
  '25':
  - type: text
    content: ' It is easier for a camel to go through the eye of a needle than for a rich man to enter the kingdom of God.'
  '26':
  - type: text
    content: ' And they were shocked '
  - type: text
    content: and
  - type: text
    content: ' exceedingly astonished, and said to Him '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: to one another
  - type: text
    content: ', Then who can be saved?'
  '27':
  - type: text
    content: ' Jesus glanced around at them and said, With men [it is] impossible, but not with God; for all things are possible with God.'
  '28':
  - type: text
    content: ' Peter started to say to Him, Behold, we have yielded up '
  - type: text
    content: and
  - type: text
    content: ' abandoned everything [once and for all and joined You as Your disciples, siding with Your party] and accompanied You [walking the same road that You walk].'
  '29':
  - type: text
    content: ' Jesus said, Truly I tell you, there is no one who has given up '
  - type: text
    content: and
  - type: text
    content: ' left house or brothers or sisters or mother or father or children or lands for My sake and for the Gospel''s'
  '3':
  - type: text
    content: ' He answered them, What did Moses command you?'
  '30':
  - type: text
    content: ' Who will not receive a hundred times as much now in this time–houses and brothers and sisters and mothers and children and lands, with persecutions–and in the age to come, eternal life.'
  '31':
  - type: text
    content: ' But many [who are now] first will be last [then], and many [who are now] last will be first [then].'
  '32':
  - type: text
    content: ' They were on the way going up to Jerusalem, and Jesus was walking on in front of them; and they were bewildered '
  - type: text
    content: and
  - type: text
    content: ' perplexed '
  - type: text
    content: and
  - type: text
    content: ' greatly astonished, and those [who were still] following were seized with alarm '
  - type: text
    content: and
  - type: text
    content: ' were afraid. And He took the Twelve [apostles] again and began to tell them what was about to happen to Him,'
  '33':
  - type: text
    content: ' [Saying], Behold, we are going up to Jerusalem, and the Son of Man will be turned over to the chief priests and the scribes; and they will condemn '
  - type: text
    content: and
  - type: text
    content: ' sentence Him to death and turn Him over to the Gentiles.'
  '34':
  - type: text
    content: ' And they will mock Him and spit on Him, and whip Him and put Him to death; but after three days He will rise again [from death].'
  '35':
  - type: text
    content: ' And James and John, the sons of Zebedee, approached Him and said to Him, Teacher, we desire You to do for us whatever we ask of You.'
  '36':
  - type: text
    content: ' And He replied to them, What do you desire Me to do for you?'
  '37':
  - type: text
    content: ' And they said to Him, Grant that we may sit, one at Your right hand and one at [Your] left hand, in Your glory (Your majesty and splendor).'
  '38':
  - type: text
    content: ' But Jesus said to them, You do not know what you are asking. Are you able to drink the cup that I drink or be baptized with the baptism [of affliction] with which I am baptized?'
  '39':
  - type: text
    content: ' And they replied to Him, We are able. And Jesus told them, The cup that I drink you will drink, and you will be baptized with the baptism with which I am baptized,'
  '4':
  - type: text
    content: ' They replied, Moses allowed a man to write a bill of divorce and to put her away. [Deut. 24:1-4.]'
  '40':
  - type: text
    content: ' But to sit at My right hand or at My left hand is not Mine to give; but [it will be given to those] for whom it is ordained '
  - type: text
    content: and
  - type: text
    content: ' prepared.'
  '41':
  - type: text
    content: ' And when the other ten [apostles] heard it, they began to be indignant with James and John.'
  '42':
  - type: text
    content: ' But Jesus called them to [Him] and said to them, You know that those who are recognized as governing '
  - type: text
    content: and
  - type: text
    content: ' are supposed to rule the Gentiles (the nations) lord it over them [ruling with absolute power, holding them in subjection], and their great men exercise authority '
  - type: text
    content: and
  - type: text
    content: ' dominion over them.'
  '43':
  - type: text
    content: ' But this is not to be so among you; instead, whoever desires to be great among you must be your servant,'
  '44':
  - type: text
    content: ' And whoever wishes to be most important '
  - type: text
    content: and
  - type: text
    content: ' first in rank among you must be slave of all.'
  '45':
  - type: text
    content: ' For even the Son of Man came not to have service rendered to Him, but to serve, and to give His life as a ransom for (instead of) many.'
  '46':
  - type: text
    content: ' Then they came to Jericho. And as He was leaving Jericho with His disciples and a great crowd, Bartimaeus, a blind beggar, a son of Timaeus, was sitting by the roadside.'
  '47':
  - type: text
    content: ' And when he heard that it was Jesus of Nazareth, he began to shout, saying, Jesus, Son of David, have pity '
  - type: text
    content: and
  - type: text
    content: ' mercy on me [now]!'
  '48':
  - type: text
    content: ' And many severely censured '
  - type: text
    content: and
  - type: text
    content: ' reproved him, telling him to keep still, but he kept on shouting out all the more, You Son of David, have pity '
  - type: text
    content: and
  - type: text
    content: ' mercy on me [now]!'
  '49':
  - type: text
    content: ' And Jesus stopped and said, Call him. And they called the blind man, telling him, Take courage! Get up! He is calling you.'
  '5':
  - type: text
    content: ' But Jesus said to them, Because of your hardness of heart [your condition of insensibility to the call of God] he wrote you this precept in your Law.'
  '50':
  - type: text
    content: ' And throwing off his outer garment, he leaped up and came to Jesus.'
  '51':
  - type: text
    content: ' And Jesus said to him, What do you want Me to do for you? And the blind man said to Him, Master, let me receive my sight.'
  '52':
  - type: text
    content: ' And Jesus said to him, Go your way; your faith has healed you. And at once he received his sight and accompanied Jesus on the road. [Isa. 42:6, 7.]'
  '6':
  - type: text
    content: ' But from the beginning of creation God made them male and female. [Gen. 1:27; 5:2.]'
  '7':
  - type: text
    content: ' For this reason a man shall leave [behind] his father and his mother '
  - type: text
    content: and be
  - type: text
    content: ' '
  - type: text
    content: joined to his wife and cleave closely to her permanently,
  '8':
  - type: text
    content: ' And the two shall become one flesh, so that they are no longer two, but one flesh. [Gen. 2:24.]'
  '9':
  - type: text
    content: ' What therefore God has united (joined together), let not man separate '
  - type: text
    content: or
  - type: text
    content: ' divide.'
