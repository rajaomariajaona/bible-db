document_id: MRK.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND [Jesus] left there [Capernaum] and went to the region of Judea and beyond [east of] the Jordan; and crowds [constantly] gathered around Him again, and as was His custom, He began to teach them again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And some Pharisees came up, and, in order to test Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' try to find a weakness in Him, asked, Is it lawful for a man to dismiss '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repudiate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' divorce his wife?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He answered them, What did Moses command you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They replied, Moses allowed a man to write a bill of divorce and to put her away. [Deut. 24:1-4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But Jesus said to them, Because of your hardness of heart [your condition of insensibility to the call of God] he wrote you this precept in your Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But from the beginning of creation God made them male and female. [Gen. 1:27; 5:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For this reason a man shall leave [behind] his father and his mother '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and be
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: joined to his wife and cleave closely to her permanently,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the two shall become one flesh, so that they are no longer two, but one flesh. [Gen. 2:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' What therefore God has united (joined together), let not man separate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' divide.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And indoors the disciples questioned Him again about this subject.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And He said to them, Whoever dismisses (repudiates and divorces) his wife and marries another commits adultery against her;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And if a woman dismisses (repudiates and divorces) her husband and marries another, she commits adultery.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they kept bringing young children to Him that He might touch them, and the disciples were reproving them [for it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But when Jesus saw [it], He was indignant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pained and said to them, Allow the children to come to Me–do not forbid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' prevent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hinder them–for to such belongs the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Truly I tell you, whoever does not receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcome the kingdom of God like a little child [does] positively shall not enter it at all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And He took them [the children up one by one] in His arms and [fervently invoked a] blessing, placing His hands upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And as He was setting out on His journey, a man ran up and knelt before Him and asked Him, Teacher, [You are essentially and perfectly morally] good, what must I do to inherit eternal life [that is, to partake of eternal salvation in the Messiah''s kingdom]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Jesus said to him, Why do you call Me [essentially and perfectly morally] good? There is no one [essentially and perfectly morally] good–except God alone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You know the commandments: Do not kill, do not commit adultery, do not steal, do not bear false witness, do not defraud, honor your father and mother. [Exod. 20:12-16; Deut. 5:16-20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And he replied to Him, Teacher, I have carefully guarded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' observed all these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taken care not to violate them from my boyhood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Jesus, looking upon him, loved him, and He said to him, You lack one thing; go and sell all you have and give [the money] to the poor, and you will have treasure in heaven; and come [and] accompany Me [walking the same road that I walk].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' At that saying the man''s countenance fell '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was gloomy, and he went away grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sorrowing, for he was holding great possessions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And Jesus looked around and said to His disciples, With what difficulty will those who possess wealth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep on holding it enter the kingdom of God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the disciples were amazed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bewildered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perplexed at His words. But Jesus said to them again, Children, how hard it is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for those who trust (place their confidence, their sense of safety) in riches
  - type: text
    text: ' to enter the kingdom of God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' It is easier for a camel to go through the eye of a needle than for a rich man to enter the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And they were shocked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exceedingly astonished, and said to Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to one another
  - type: text
    text: ', Then who can be saved?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Jesus glanced around at them and said, With men [it is] impossible, but not with God; for all things are possible with God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Peter started to say to Him, Behold, we have yielded up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abandoned everything [once and for all and joined You as Your disciples, siding with Your party] and accompanied You [walking the same road that You walk].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Jesus said, Truly I tell you, there is no one who has given up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' left house or brothers or sisters or mother or father or children or lands for My sake and for the Gospel''s'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Who will not receive a hundred times as much now in this time–houses and brothers and sisters and mothers and children and lands, with persecutions–and in the age to come, eternal life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But many [who are now] first will be last [then], and many [who are now] last will be first [then].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' They were on the way going up to Jerusalem, and Jesus was walking on in front of them; and they were bewildered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' greatly astonished, and those [who were still] following were seized with alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were afraid. And He took the Twelve [apostles] again and began to tell them what was about to happen to Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' [Saying], Behold, we are going up to Jerusalem, and the Son of Man will be turned over to the chief priests and the scribes; and they will condemn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sentence Him to death and turn Him over to the Gentiles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And they will mock Him and spit on Him, and whip Him and put Him to death; but after three days He will rise again [from death].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And James and John, the sons of Zebedee, approached Him and said to Him, Teacher, we desire You to do for us whatever we ask of You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And He replied to them, What do you desire Me to do for you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And they said to Him, Grant that we may sit, one at Your right hand and one at [Your] left hand, in Your glory (Your majesty and splendor).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But Jesus said to them, You do not know what you are asking. Are you able to drink the cup that I drink or be baptized with the baptism [of affliction] with which I am baptized?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And they replied to Him, We are able. And Jesus told them, The cup that I drink you will drink, and you will be baptized with the baptism with which I am baptized,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' But to sit at My right hand or at My left hand is not Mine to give; but [it will be given to those] for whom it is ordained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prepared.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And when the other ten [apostles] heard it, they began to be indignant with James and John.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' But Jesus called them to [Him] and said to them, You know that those who are recognized as governing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are supposed to rule the Gentiles (the nations) lord it over them [ruling with absolute power, holding them in subjection], and their great men exercise authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dominion over them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' But this is not to be so among you; instead, whoever desires to be great among you must be your servant,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And whoever wishes to be most important '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' first in rank among you must be slave of all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' For even the Son of Man came not to have service rendered to Him, but to serve, and to give His life as a ransom for (instead of) many.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Then they came to Jericho. And as He was leaving Jericho with His disciples and a great crowd, Bartimaeus, a blind beggar, a son of Timaeus, was sitting by the roadside.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And when he heard that it was Jesus of Nazareth, he began to shout, saying, Jesus, Son of David, have pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy on me [now]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And many severely censured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproved him, telling him to keep still, but he kept on shouting out all the more, You Son of David, have pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy on me [now]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' And Jesus stopped and said, Call him. And they called the blind man, telling him, Take courage! Get up! He is calling you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' And throwing off his outer garment, he leaped up and came to Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' And Jesus said to him, What do you want Me to do for you? And the blind man said to Him, Master, let me receive my sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' And Jesus said to him, Go your way; your faith has healed you. And at once he received his sight and accompanied Jesus on the road. [Isa. 42:6, 7.]'
