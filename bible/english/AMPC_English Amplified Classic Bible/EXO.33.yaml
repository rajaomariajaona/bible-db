document_id: EXO.33,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, Depart, go up from here, you and the people whom you have brought from the land of Egypt, to the land which I swore to Abraham, Isaac, and Jacob, saying, To your descendants I will give it.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And all the people saw the pillar of cloud stand at the tent door, and all the people rose up and worshiped, every man at his tent door.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And the Lord spoke to Moses face to face, as a man speaks to his friend. Moses returned to the camp, but his minister Joshua son of Nun, a young man, did not depart from the [temporary prayer] tent.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Moses said to the Lord, See, You say to me, Bring up this people, but You have not let me know whom You will send with me. Yet You said, I know you by name and you have also found favor in My sight.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Now therefore, I pray You, if I have found favor in Your sight, show me now Your way, that I may know You [progressively become more deeply and intimately acquainted with You, perceiving and recognizing and understanding more strongly and clearly] and that I may find favor in Your sight. And [Lord, do] consider that this nation is Your people.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And the Lord said, My Presence shall go with you, and I will give you rest.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And Moses said to the Lord, If Your Presence does not go with me, do not carry us up from here!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For by what shall it be known that I and Your people have found favor in Your sight? Is it not in Your going with us so that we are distinguished, I and Your people, from all the other people upon the face of the earth?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And the Lord said to Moses, I will do this thing also that you have asked, for you have found favor, loving-kindness, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy in My sight and I know you personally '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by name. [Rev. 2:17.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And Moses said, I beseech You, show me Your glory.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And God said, I will make all My goodness pass before you, and I will proclaim My name, THE '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', before you; for I will be gracious to whom I will be gracious, and will show mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness on whom I will show mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness. [Rom. 9:15, 16.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I will send an Angel before you, and I will drive out the Canaanite, Amorite, Hittite, Perizzite, Hivite, and Jebusite. [Exod. 23:23; 34:11.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But, He said, You can not see My face, for no man shall see Me and live.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And the Lord said, Behold, there is a place beside Me, and you shall stand upon the rock,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And while My glory passes by, I will put you in a cleft of the rock and cover you with My hand until I have passed by.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Then I will take away My hand and you shall see My back; but My face shall not be seen.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Go up to a land flowing with milk and honey; but I will not go up among you, for you are a stiff-necked people, lest I destroy you on the way.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' When the people heard these evil tidings, they mourned and no man put on his ornaments.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For the Lord had said to Moses, Say to the Israelites, You are a stiff-necked people! If I should come among you for one moment, I would consume '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy you. Now therefore [penitently] leave off your ornaments, that I may know what to do with you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And the Israelites left off all their ornaments, from Mount Horeb onward.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Now Moses used to take [his own] tent and pitch it outside the camp, far off from the camp, and he called it the tent of meeting [of God with His own people]. And everyone who sought the Lord went out to [that temporary] tent of meeting which was outside the camp.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' When Moses went out to the tent of meeting, all the people rose and stood, every man at his tent door, and looked after Moses until he had gone into the tent.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' When Moses entered the tent, the pillar of cloud would descend and stand at the door of the tent, and the Lord would talk with Moses.'
