document_id: JHN.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW A certain man named Lazarus was ill. He was of Bethany, the village where Mary and her sister Martha lived.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' This Mary was the one who anointed the Lord with perfume and wiped His feet with her hair. It was her brother Lazarus who was [now] sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So the sisters sent to Him, saying, Lord, he whom You love [so well] is sick.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When Jesus received the message, He said, This sickness is not to end in death; but [on the contrary] it is to honor God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to promote His glory, that the Son of God may be glorified through (by) it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now Jesus loved Martha and her sister and Lazarus. [They were His dear friends, and He held them in loving esteem.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore [even] when He heard that Lazarus was sick, He still stayed two days longer in the same place where He was.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then after that interval He said to His disciples, Let us go back again to Judea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The disciples said to Him, Rabbi, the Jews only recently were intending '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trying to stone You, and are You [thinking of] going back there again?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Jesus answered, Are there not twelve hours in the day? Anyone who walks about in the daytime does not stumble, because he sees [by] the light of this world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But if anyone walks about in the night, he does stumble, because there is no light in him [the light is lacking to him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He said these things, and then added, Our friend Lazarus is at rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sleeping; but I am going there that I may awaken him out of his sleep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The disciples answered, Lord, if he is sleeping, he will recover.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' However, Jesus had spoken of his death, but they thought that He referred to falling into a refreshing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' natural sleep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So then Jesus told them plainly, Lazarus is dead,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And for your sake I am glad that I was not there; it will help you to believe (to trust and rely on Me). However, let us go to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then Thomas, who was called the Twin, said to his fellow disciples, Let us go too, that we may die [be killed] along with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So when Jesus arrived, He found that he [Lazarus] had already been in the tomb four days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Bethany was near Jerusalem, only about two miles away,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And a considerable number of the Jews had gone out to see Martha and Mary to console them concerning their brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' When Martha heard that Jesus was coming, she went to meet Him, while Mary remained sitting in the house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Martha then said to Jesus, Master, if You had been here, my brother would not have died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And even now I know that whatever You ask from God, He will grant it to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Jesus said to her, Your brother shall rise again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Martha replied, I know that he will rise again in the resurrection at the last day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Jesus said to her, I am [Myself] the Resurrection and the Life. Whoever believes in (adheres to, trusts in, and relies on) Me, although he may die, yet he shall live;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And whoever continues to live and believes in (has faith in, cleaves to, and relies on) Me shall never [actually] die at all. Do you believe this?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' She said to Him, Yes, Lord, I have believed [I do believe] that You are the Christ (the Messiah, the Anointed One), the Son of God, [even He] Who was to come into the world. [It is for Your coming that the world has waited.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' After she had said this, she went back and called her sister Mary, privately whispering to her, The Teacher is close at hand and is asking for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' When she heard this, she sprang up quickly and went to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Now Jesus had not yet entered the village, but was still at the same spot where Martha had met Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' When the Jews who were sitting with her in the house and consoling her saw how hastily Mary had arisen and gone out, they followed her, supposing that she was going to the tomb to pour out her grief there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' When Mary came to the place where Jesus was and saw Him, she dropped down at His feet, saying to Him, Lord, if You had been here, my brother would not have died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' When Jesus saw her sobbing, and the Jews who came with her [also] sobbing, He was deeply moved in spirit and troubled. [He chafed in spirit and sighed and was disturbed.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And He said, Where have you laid him? They said to Him, Lord, come and see.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Jesus wept.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The Jews said, See how [tenderly] He loved him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' But some of them said, Could not He Who opened a blind man''s eyes have prevented this man from dying?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Now Jesus, again sighing repeatedly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deeply disquieted, approached the tomb. It was a cave (a hole in the rock), and a boulder lay against [the entrance to close] it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Jesus said, Take away the stone. Martha, the sister of the dead man, exclaimed, But Lord, by this time he [is decaying and] throws off an offensive odor, for he has been dead four days!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Jesus said to her, Did I not tell you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' promise you that if you would believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on Me, you would see the glory of God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' So they took away the stone. And Jesus lifted up His eyes and said, Father, I thank You that You have heard Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Yes, I know You always hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listen to Me, but I have said this on account of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for the benefit of the people standing around, so that they may believe that You did send Me [that You have made Me Your Messenger].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' When He had said this, He shouted with a loud voice, Lazarus, come out!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And out walked the man who had been dead, his hands and feet wrapped in burial cloths (linen strips), and with a [burial] napkin bound around his face. Jesus said to them, Free him of the burial wrappings and let him go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Upon seeing what Jesus had done, many of the Jews who had come with Mary believed in Him. [They trusted in Him and adhered to Him and relied on Him.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' But some of them went back to the Pharisees and told them what Jesus had done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' So the chief priests and Pharisees called a meeting of the council (the Sanhedrin) and said, What are we to do? For this Man performs many signs (evidences, miracles).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' If we let Him alone to go on like this, everyone will believe in Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adhere to Him, and the Romans will come and suppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take away our [holy] place and our nation [our temple and city and our civil organization].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' But one of them, Caiaphas, who was the high priest that year, declared, You know nothing at all!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' Nor do you understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reason out that it is expedient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' better for your own welfare that one man should die on behalf of the people than that the whole nation should perish (be destroyed, ruined).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' Now he did not say this simply of his own accord [he was not self-moved]; but being the high priest that year, he prophesied that Jesus was to die for the nation, [Isa. 53:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' And not only for the nation but also for the purpose of uniting into one body the children of God who have been scattered far and wide. [Isa. 49:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' So from that day on they took counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plotted together how they might put Him to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' For that reason Jesus no longer appeared publicly among the Jews, but left there and retired to the district that borders on the wilderness (the desert), to a village called Ephraim, and there He stayed with the disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' Now the Jewish Passover was at hand, and many from the country went up to Jerusalem in order that they might purify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consecrate themselves before the Passover.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' So they kept looking for Jesus and questioned among themselves as they were standing about in the temple [area], What do you think? Will He not come to the Feast at all?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' Now the chief priests and Pharisees had given orders that if anyone knew where He was, he should report it to them, so that they might arrest Him.'
