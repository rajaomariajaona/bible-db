document_id: JHN.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW A certain man named Lazarus was ill. He was of Bethany, the village where Mary and her sister Martha lived.'
  '10':
  - type: text
    content: ' But if anyone walks about in the night, he does stumble, because there is no light in him [the light is lacking to him].'
  '11':
  - type: text
    content: ' He said these things, and then added, Our friend Lazarus is at rest '
  - type: text
    content: and
  - type: text
    content: ' sleeping; but I am going there that I may awaken him out of his sleep.'
  '12':
  - type: text
    content: ' The disciples answered, Lord, if he is sleeping, he will recover.'
  '13':
  - type: text
    content: ' However, Jesus had spoken of his death, but they thought that He referred to falling into a refreshing '
  - type: text
    content: and
  - type: text
    content: ' natural sleep.'
  '14':
  - type: text
    content: ' So then Jesus told them plainly, Lazarus is dead,'
  '15':
  - type: text
    content: ' And for your sake I am glad that I was not there; it will help you to believe (to trust and rely on Me). However, let us go to him.'
  '16':
  - type: text
    content: ' Then Thomas, who was called the Twin, said to his fellow disciples, Let us go too, that we may die [be killed] along with Him.'
  '17':
  - type: text
    content: ' So when Jesus arrived, He found that he [Lazarus] had already been in the tomb four days.'
  '18':
  - type: text
    content: ' Bethany was near Jerusalem, only about two miles away,'
  '19':
  - type: text
    content: ' And a considerable number of the Jews had gone out to see Martha and Mary to console them concerning their brother.'
  '2':
  - type: text
    content: ' This Mary was the one who anointed the Lord with perfume and wiped His feet with her hair. It was her brother Lazarus who was [now] sick.'
  '20':
  - type: text
    content: ' When Martha heard that Jesus was coming, she went to meet Him, while Mary remained sitting in the house.'
  '21':
  - type: text
    content: ' Martha then said to Jesus, Master, if You had been here, my brother would not have died.'
  '22':
  - type: text
    content: ' And even now I know that whatever You ask from God, He will grant it to You.'
  '23':
  - type: text
    content: ' Jesus said to her, Your brother shall rise again.'
  '24':
  - type: text
    content: ' Martha replied, I know that he will rise again in the resurrection at the last day.'
  '25':
  - type: text
    content: ' Jesus said to her, I am [Myself] the Resurrection and the Life. Whoever believes in (adheres to, trusts in, and relies on) Me, although he may die, yet he shall live;'
  '26':
  - type: text
    content: ' And whoever continues to live and believes in (has faith in, cleaves to, and relies on) Me shall never [actually] die at all. Do you believe this?'
  '27':
  - type: text
    content: ' She said to Him, Yes, Lord, I have believed [I do believe] that You are the Christ (the Messiah, the Anointed One), the Son of God, [even He] Who was to come into the world. [It is for Your coming that the world has waited.]'
  '28':
  - type: text
    content: ' After she had said this, she went back and called her sister Mary, privately whispering to her, The Teacher is close at hand and is asking for you.'
  '29':
  - type: text
    content: ' When she heard this, she sprang up quickly and went to Him.'
  '3':
  - type: text
    content: ' So the sisters sent to Him, saying, Lord, he whom You love [so well] is sick.'
  '30':
  - type: text
    content: ' Now Jesus had not yet entered the village, but was still at the same spot where Martha had met Him.'
  '31':
  - type: text
    content: ' When the Jews who were sitting with her in the house and consoling her saw how hastily Mary had arisen and gone out, they followed her, supposing that she was going to the tomb to pour out her grief there.'
  '32':
  - type: text
    content: ' When Mary came to the place where Jesus was and saw Him, she dropped down at His feet, saying to Him, Lord, if You had been here, my brother would not have died.'
  '33':
  - type: text
    content: ' When Jesus saw her sobbing, and the Jews who came with her [also] sobbing, He was deeply moved in spirit and troubled. [He chafed in spirit and sighed and was disturbed.]'
  '34':
  - type: text
    content: ' And He said, Where have you laid him? They said to Him, Lord, come and see.'
  '35':
  - type: text
    content: ' Jesus wept.'
  '36':
  - type: text
    content: ' The Jews said, See how [tenderly] He loved him!'
  '37':
  - type: text
    content: ' But some of them said, Could not He Who opened a blind man''s eyes have prevented this man from dying?'
  '38':
  - type: text
    content: ' Now Jesus, again sighing repeatedly '
  - type: text
    content: and
  - type: text
    content: ' deeply disquieted, approached the tomb. It was a cave (a hole in the rock), and a boulder lay against [the entrance to close] it.'
  '39':
  - type: text
    content: ' Jesus said, Take away the stone. Martha, the sister of the dead man, exclaimed, But Lord, by this time he [is decaying and] throws off an offensive odor, for he has been dead four days!'
  '4':
  - type: text
    content: ' When Jesus received the message, He said, This sickness is not to end in death; but [on the contrary] it is to honor God '
  - type: text
    content: and
  - type: text
    content: ' to promote His glory, that the Son of God may be glorified through (by) it.'
  '40':
  - type: text
    content: ' Jesus said to her, Did I not tell you '
  - type: text
    content: and
  - type: text
    content: ' promise you that if you would believe '
  - type: text
    content: and
  - type: text
    content: ' rely on Me, you would see the glory of God?'
  '41':
  - type: text
    content: ' So they took away the stone. And Jesus lifted up His eyes and said, Father, I thank You that You have heard Me.'
  '42':
  - type: text
    content: ' Yes, I know You always hear '
  - type: text
    content: and
  - type: text
    content: ' listen to Me, but I have said this on account of '
  - type: text
    content: and
  - type: text
    content: ' for the benefit of the people standing around, so that they may believe that You did send Me [that You have made Me Your Messenger].'
  '43':
  - type: text
    content: ' When He had said this, He shouted with a loud voice, Lazarus, come out!'
  '44':
  - type: text
    content: ' And out walked the man who had been dead, his hands and feet wrapped in burial cloths (linen strips), and with a [burial] napkin bound around his face. Jesus said to them, Free him of the burial wrappings and let him go.'
  '45':
  - type: text
    content: ' Upon seeing what Jesus had done, many of the Jews who had come with Mary believed in Him. [They trusted in Him and adhered to Him and relied on Him.]'
  '46':
  - type: text
    content: ' But some of them went back to the Pharisees and told them what Jesus had done.'
  '47':
  - type: text
    content: ' So the chief priests and Pharisees called a meeting of the council (the Sanhedrin) and said, What are we to do? For this Man performs many signs (evidences, miracles).'
  '48':
  - type: text
    content: ' If we let Him alone to go on like this, everyone will believe in Him '
  - type: text
    content: and
  - type: text
    content: ' adhere to Him, and the Romans will come and suppress '
  - type: text
    content: and
  - type: text
    content: ' destroy '
  - type: text
    content: and
  - type: text
    content: ' take away our [holy] place and our nation [our temple and city and our civil organization].'
  '49':
  - type: text
    content: ' But one of them, Caiaphas, who was the high priest that year, declared, You know nothing at all!'
  '5':
  - type: text
    content: ' Now Jesus loved Martha and her sister and Lazarus. [They were His dear friends, and He held them in loving esteem.]'
  '50':
  - type: text
    content: ' Nor do you understand '
  - type: text
    content: or
  - type: text
    content: ' reason out that it is expedient '
  - type: text
    content: and
  - type: text
    content: ' better for your own welfare that one man should die on behalf of the people than that the whole nation should perish (be destroyed, ruined).'
  '51':
  - type: text
    content: ' Now he did not say this simply of his own accord [he was not self-moved]; but being the high priest that year, he prophesied that Jesus was to die for the nation, [Isa. 53:8.]'
  '52':
  - type: text
    content: ' And not only for the nation but also for the purpose of uniting into one body the children of God who have been scattered far and wide. [Isa. 49:6.]'
  '53':
  - type: text
    content: ' So from that day on they took counsel '
  - type: text
    content: and
  - type: text
    content: ' plotted together how they might put Him to death.'
  '54':
  - type: text
    content: ' For that reason Jesus no longer appeared publicly among the Jews, but left there and retired to the district that borders on the wilderness (the desert), to a village called Ephraim, and there He stayed with the disciples.'
  '55':
  - type: text
    content: ' Now the Jewish Passover was at hand, and many from the country went up to Jerusalem in order that they might purify '
  - type: text
    content: and
  - type: text
    content: ' consecrate themselves before the Passover.'
  '56':
  - type: text
    content: ' So they kept looking for Jesus and questioned among themselves as they were standing about in the temple [area], What do you think? Will He not come to the Feast at all?'
  '57':
  - type: text
    content: ' Now the chief priests and Pharisees had given orders that if anyone knew where He was, he should report it to them, so that they might arrest Him.'
  '6':
  - type: text
    content: ' Therefore [even] when He heard that Lazarus was sick, He still stayed two days longer in the same place where He was.'
  '7':
  - type: text
    content: ' Then after that interval He said to His disciples, Let us go back again to Judea.'
  '8':
  - type: text
    content: ' The disciples said to Him, Rabbi, the Jews only recently were intending '
  - type: text
    content: and
  - type: text
    content: ' trying to stone You, and are You [thinking of] going back there again?'
  '9':
  - type: text
    content: ' Jesus answered, Are there not twelve hours in the day? Anyone who walks about in the daytime does not stumble, because he sees [by] the light of this world.'
