document_id: DAN.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE first year of Belshazzar king of Babylon Daniel had a dream and visions in his head as he was lying upon his bed. Then he wrote down the dream and told the gist of the matter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Daniel said, I saw in my vision by night, and behold, the four winds of the heavens [political and social agitations] were stirring up the great sea [the nations of the world].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And four great beasts came up out of the sea in succession, and different from one another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The first [the Babylonian empire under Nebuchadnezzar] was like a lion and had eagle''s wings. I looked till the wings of it were plucked, and it was lifted up from the earth and made to stand upon two feet as a man, and a man''s heart was given to it. [Dan. 2:37, 38.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And behold another beast, a second one [the Medo-Persian empire], was like a bear, and it raised up itself on one side [or one dominion] and three ribs were in its mouth between its teeth; and it was told, Arise, devour much flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' After this I looked, and behold, another [the Grecian empire of Alexander the Great], like a leopard which had four wings of a bird on its back. The beast had also four heads [Alexander''s generals, his successors], and dominion was given to it. [Dan. 2:39; 8:20-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' After this I saw in the night visions, and behold, a fourth beast [the Roman empire]–terrible, powerful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dreadful, and exceedingly strong. And it had great iron teeth; it devoured and crushed and trampled what was left with its feet. And it was different from all the beasts that came before it, and it had ten horns [symbolizing ten kings]. [Dan. 2:40-43; 7:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I considered the horns, and behold, there came up among them another horn, a little one, before which three of the first horns were plucked up by the roots; and behold, in this horn were eyes like the eyes of a man and a mouth speaking great things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I kept looking until thrones were placed [for the assessors with the Judge], and the Ancient of Days [God, the eternal Father] took His seat, Whose garment was white as snow and the hair of His head like pure wool. His throne was like the fiery flame; its wheels were burning fire. [I Kings 22:19; Ps. 90:2; Ezek. 1:26-28; Dan. 7:13, 22; Matt. 19:28; Rev. 20:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' A stream of fire came forth from before Him; a thousand thousands ministered to Him and ten thousand times ten thousand rose up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stood before Him; the Judge was seated [the court was in session] and the books were opened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I looked then because of the sound of the great words which the horn was speaking. I watched until the beast was slain and its body destroyed and given over to be burned with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And as for the rest of the beasts, their power of dominion was taken away; yet their lives were prolonged [for the duration of their lives was fixed] for a season and a time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I saw in the night visions, and behold, on the clouds of the heavens came One like a Son of man, and He came to the Ancient of Days and was presented before Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And there was given Him [the Messiah] dominion and glory and kingdom, that all peoples, nations, and languages should serve Him. His dominion is an everlasting dominion which shall not pass away, and His kingdom is one which shall not be destroyed. [Rev. 5:1-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' As for me, Daniel, my spirit was grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anxious within me, and the visions of my head alarmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agitated me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I came near to one of those who stood there and asked him the truth of all this. So he told me and made known to me the interpretation of the things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' These four great beasts are four kings who shall arise out of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But the saints of the Most High [God] shall receive the kingdom and possess the kingdom forever, even forever and ever. [Rom. 8:17; I Pet. 2:9; Rev. 3:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then I wished to know the truth about the fourth beast–which was different from all the others, exceedingly terrible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shocking, whose teeth were of iron and its nails of bronze, which devoured, broke '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed, and trampled what was left with its feet–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And about the ten horns [representing kings] that were on its head, and the other horn which came up later and before which three of [the horns] fell, the horn which had eyes and a mouth that spoke great things and which looked greater than the others.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' As I looked, this horn made war with the saints and prevailed over them [Rev. 13:7-9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Until the Ancient of Days came, and judgment was given to the saints of the Most High [God], and the time came when the saints possessed the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Thus [the angel] said, The fourth beast shall be a fourth kingdom on earth, which shall be different from all other kingdoms and shall devour the whole earth, tread it down, and break it in pieces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crush it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And as for the ten horns, out of this kingdom ten kings shall arise; and another shall arise after them, and he shall be different from the former ones, and he shall subdue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put down three kings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And he shall speak words against the Most High [God] and shall wear out the saints of the Most High and think to change the time [of sacred feasts and holy days] and the law; and the saints shall be given into his hand for a time, two times, and half a time [three and one-half years]. [Rev. 13:1-6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But the judgment shall be set [by the court of the Most High], and they shall take away his dominion to consume it [gradually] and to destroy it [suddenly] in the end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And the kingdom and the dominion and the greatness of the kingdom under the whole heavens shall be given to the people of the saints of the Most High; His kingdom is an everlasting kingdom, and all the dominions shall serve and obey Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Here is the end of the matter. As for me, Daniel, my [waking] thoughts troubled and alarmed me much and my cheerfulness of countenance was changed in me; but I kept the matter [of the interpreting angel''s information] in my heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mind.'
