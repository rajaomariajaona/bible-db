document_id: 1SA.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE ARK of the Lord was in the country of the Philistines seven months.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the Philistines called for the priests and the diviners, saying, What shall we do to the ark of the Lord? Tell us with what we shall send it to its place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they said, If you send away the ark of the God of Israel, do not send it empty, but at least return to Him a guilt offering. Then you will be healed, and it will be known to you why His hand is not removed [and healing granted you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then they said, What shall be the guilt offering which we shall return to Him? They answered, Five golden tumors and five golden mice, according to the number of the Philistine lords, for one plague was on you all, even on your lords.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Therefore you must make images of your tumors and of your mice that destroy the land, and give glory to the God of Israel. Perhaps He will lighten His hand from off you and your gods and your land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Why then do you harden your hearts as the Egyptians and Pharaoh hardened their hearts? When He had done wonders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made a mock of them, did they not let the people go, and they departed?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now then, make and prepare a new cart and two milch cows on which no yoke has ever come; and yoke the cows to the cart, but take their calves home, away from them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And take the ark of the Lord and place it upon the cart, and put in a box at its side the figures of gold which you are returning to Him as a guilt offering. Then send it away and let it be gone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And watch. If it goes up by the way of its own land to Beth-shemesh, then He has done us this great evil. But if not, then we shall know that it was not His hand that struck us; it happened to us by chance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the men did so, and took two milch cows and yoked them to the cart and shut up their calves at home.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And they put the ark of the Lord on the cart and along with it the box with the mice of gold and the images of their tumors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the cows went straight toward Beth-shemesh along the highway, lowing as they went, and turned not aside to the right or the left. And the Philistine lords followed them as far as the border of Beth-shemesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Now the men of Beth-shemesh were reaping their wheat harvest in the valley, and they lifted up their eyes and saw the ark, and rejoiced to see it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The cart came into the field of Joshua of Beth-shemesh and stopped there. A great stone was there; and the men split up the wood of the cart and offered the cows as a burnt offering to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The Levites took down the ark of the Lord and the box beside it in which were the figures of gold and put them upon the great stone. And the men of Beth-shemesh offered burnt offerings and made sacrifices that day to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When the five lords of the Philistines saw it, they returned that day to Ekron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And these are the tumors of gold which the Philistines returned for a guilt offering to the Lord: one each for Ashdod, Gaza, Ashkelon, Gath and Ekron;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Also the mice of gold was according to the number of all the cities of the Philistines belonging to the five lords, both fortified cities and country villages. The great stone, on which they set the ark of the Lord, remains as a witness to this day in the field of Joshua of Beth-shemesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the Lord slew some of the men of Beth-shemesh because they had looked into the ark of the Lord; He slew seventy men of them, and the people mourned because the Lord had made a great slaughter among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the men of Beth-shemesh said, Who is able to stand before the Lord, this holy God? And to whom shall He go away from us?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And they sent messengers to the inhabitants of Kiriath-jearim, saying, The Philistines have returned the ark of the Lord. Come down and take it up to you.'
