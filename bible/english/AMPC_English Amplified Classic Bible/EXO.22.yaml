document_id: EXO.22,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IF A man steals an ox or sheep and kills or sells it, he shall pay five oxen for an ox, or four sheep for a sheep.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' If a man delivers to his neighbor a donkey or an ox or a sheep or any beast to keep and it dies or is hurt or driven away, no man seeing it,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Then an oath before the Lord shall be required between the two that the man has not taken his neighbor''s property; and the owner of it shall accept his word and not require him to make good the loss.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But if it is stolen when in his care, he shall make restitution to its owner.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' If it be torn in pieces [by some wild beast or by accident], let him bring [the mangled carcass] for witness; he shall not make good what was torn.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And if a man borrows anything of his neighbor and it gets hurt or dies without its owner being with it, the borrower shall make full restitution.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But if the owner is with it [when the damage is done], the borrower shall not make it good. If it is a hired thing, the damage is included in its hire.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' If a man seduces a virgin not betrothed and lies with her, he shall surely pay a dowry for her to become his wife.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' If her father utterly refuses to give her to him, he shall pay money equivalent to the dowry of virgins.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' You shall not allow a woman to live who practices sorcery.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Whoever lies carnally with a beast shall surely be put to death.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' If a thief is found breaking in and is struck so that he dies, there shall be no blood shed for him.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' He who sacrifices to any god but the Lord only shall be utterly destroyed.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' You shall not wrong a stranger or oppress him; for you were strangers in the land of Egypt.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' You shall not afflict any widow or fatherless child.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' If you afflict them in any way and they cry at all to Me, I will surely hear their cry;'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And My wrath shall burn; I will kill you with the sword, and your wives shall be widows and your children fatherless.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' If you lend money to any of My people with you who is poor, you shall not be to him as a creditor, neither shall you require interest from him.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' If you ever take your neighbor''s garment in pledge, you shall give it back to him before the sun goes down;'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' For that is his only covering, his clothing for his body. In what shall he sleep? When he cries to Me, I will hear, for I am gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' merciful.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' You shall not revile God [the judges as His agents] or esteem lightly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' curse a ruler of your people.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' You shall not delay to bring to Me from the fullness [of your harvested grain] and the outflow [of your grape juice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' olive oil]; give Me the firstborn of your sons [or redeem them]. [Exod. 34:19, 20.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But if the sun has risen [so he can be seen], blood must be shed for slaying him. The thief [if he lives] must make full restitution; if he has nothing, then he shall be sold for his theft.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Likewise shall you do with your oxen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your sheep. Seven days the firstborn [beast] shall be with its mother; on the eighth day you shall give it to Me.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And you shall be holy men [consecrated] to Me; therefore you shall not eat any flesh that is torn by beasts in the field; you shall throw it to the dogs.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' If the beast which he stole is found in his possession alive, whether it is ox or ass or sheep, he shall restore double.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' If a man causes a field or vineyard to be grazed over or lets his beast loose and it feeds in another man''s field, he shall make restitution of the best of his own field or his own vineyard.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' If fire breaks out and catches so that the stacked grain or standing grain or the field be consumed, he who kindled the fire shall make full restitution.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' If a man delivers to his neighbor money or goods to keep and it is stolen out of the neighbor''s house, then, if the thief is found, he shall pay double.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But if the thief is not found, the house owner shall appear before God [the judges as His agents] to find whether he stole his neighbor''s goods.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For every unlawful deed, whether it concerns ox, donkey, sheep, clothing, or any lost thing at all, which another identifies as his, the cause of both parties shall come before God [the judges]. Whomever [they] shall condemn shall pay his neighbor double.'
