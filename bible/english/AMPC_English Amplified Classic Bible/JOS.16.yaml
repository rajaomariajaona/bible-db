document_id: JOS.16,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE ALLOTMENT for the people of Joseph went from the Jordan by Jericho, east of the waters of Jericho, into the wilderness, going up from Jericho into the hill country to Bethel;'
  '10':
  - type: text
    content: ' But they did not drive out the Canaanites who dwelt in Gezer; but the Canaanites dwell among the Ephraimites to this day, and they became slaves required to do forced labor.'
  '2':
  - type: text
    content: ' Then it went from Bethel to Luz and passed on to Ataroth, the border of the Archites.'
  '3':
  - type: text
    content: ' And it went down westward to the territory of the Japhletites as far as the outskirts of Lower Beth-horon, then to Gezer, and ended at the sea.'
  '4':
  - type: text
    content: ' The descendants of Joseph, Manasseh and Ephraim, received their inheritance.'
  '5':
  - type: text
    content: ' The boundary of the Ephraimites according to their families was thus: on the east side their border was Ataroth-addar as far as Upper Beth-horon.'
  '6':
  - type: text
    content: ' Then the boundary went from there to the sea; on the north was Michmethath; then on the east the boundary went out to Taanath-shiloh, and eastward to Janoah,'
  '7':
  - type: text
    content: ' Then it went down from Janoah to Ataroth and to Naarah, touched Jericho, and ended at the Jordan [River].'
  '8':
  - type: text
    content: ' The border went out from Tappuah westward to the brook Kanah and ended at the [Mediterranean] Sea. This is the inheritance of the Ephraimites by their families,'
  '9':
  - type: text
    content: ' With the towns set apart for the Ephraimites within the inheritance of the Manassites, all those towns with their villages.'
