document_id: JOS.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE ALLOTMENT for the people of Joseph went from the Jordan by Jericho, east of the waters of Jericho, into the wilderness, going up from Jericho into the hill country to Bethel;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then it went from Bethel to Luz and passed on to Ataroth, the border of the Archites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And it went down westward to the territory of the Japhletites as far as the outskirts of Lower Beth-horon, then to Gezer, and ended at the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The descendants of Joseph, Manasseh and Ephraim, received their inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The boundary of the Ephraimites according to their families was thus: on the east side their border was Ataroth-addar as far as Upper Beth-horon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then the boundary went from there to the sea; on the north was Michmethath; then on the east the boundary went out to Taanath-shiloh, and eastward to Janoah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then it went down from Janoah to Ataroth and to Naarah, touched Jericho, and ended at the Jordan [River].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The border went out from Tappuah westward to the brook Kanah and ended at the [Mediterranean] Sea. This is the inheritance of the Ephraimites by their families,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' With the towns set apart for the Ephraimites within the inheritance of the Manassites, all those towns with their villages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But they did not drive out the Canaanites who dwelt in Gezer; but the Canaanites dwell among the Ephraimites to this day, and they became slaves required to do forced labor.'
