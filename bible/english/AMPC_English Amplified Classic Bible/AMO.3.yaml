document_id: AMO.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEAR THIS word that the Lord has spoken against you, O children of Israel, against the whole family which I brought up from the land of Egypt:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You only have I known (chosen, sympathized with, and loved) of all the families of the earth; therefore I will visit upon you all your wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish you for all your iniquities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Do two walk together except they make an appointment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have agreed?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Will a lion roar in the forest when he has no prey? Will a young lion cry out of his den if he has taken nothing?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Can a bird fall in a snare upon the earth where there is no trap for him? Does a trap spring up from the ground when nothing at all has sprung it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Shall a trumpet be blown in the city and the people not be alarmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afraid? Shall misfortune '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' evil occur [as punishment] and the Lord has not caused it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Surely the Lord God will do nothing without revealing His secret to His servants the prophets. [Rev. 10:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The lion has roared; who will not fear? The Lord God has spoken; who can but prophesy? [Acts 4:20; 5:20, 29; I Cor. 9:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Publish to the strongholds in Ashdod [Philistia] and to the strongholds in the land of Egypt, and say, Assemble yourselves upon the mountains of Samaria, and behold what great tumults (confusion and disorder) are in her and what oppressions are in the midst of her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For they know not how to do right, says the Lord, they who store up violence and robbery in their strongholds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Therefore thus says the Lord God: An adversary shall surround the land, and he shall bring down your defenses from you and your strongholds shall be plundered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Thus says the Lord: As the shepherd rescues out of the mouth of the lion two legs or a piece of an ear [of a sheep], so shall the children of Israel who dwell in Samaria be rescued with the corner of a couch and [part of] the damask covering of a bed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Hear and bear witness in the house of Jacob, says the Lord God, the God of hosts,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' That in the day when I visit Israel''s transgressions upon him I will also visit [with punishment] the altars of Bethel [with its golden calf], and the horns of the altar shall be cut off and fall to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And I will smite the winter house with the summer house, and the houses of ivory shall perish and the many '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' great houses shall come to an end, says the Lord.'
