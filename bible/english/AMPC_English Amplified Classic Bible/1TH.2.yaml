document_id: 1TH.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR YOU yourselves know, brethren, that our coming among you was not useless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fruitless.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But though we had already suffered and been outrageously treated at Philippi, as you know, yet in [the strength of] our God we summoned courage to proclaim to you unfalteringly the good news (the Gospel) with earnest contention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' much conflict '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' great opposition.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For our appeal [in preaching] does not [originate] from delusion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' error or impure purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' motive, nor in fraud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' deceit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But just as we have been approved by God to be entrusted with the glad tidings (the Gospel), so we speak not to please men but to please God, Who tests our hearts [expecting them to be approved].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For as you well know, we never resorted either to words of flattery or to any cloak to conceal greedy motives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pretexts for gain, [as] God is our witness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Nor did we seek to extract praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory from men, either from you or from anyone else, though we might have asserted our authority [stood on our dignity and claimed honor] as apostles (special missionaries) of Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But we behaved gently when we were among you, like a devoted mother nursing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cherishing her own children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So, being thus tenderly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affectionately desirous of you, we continued to share with you not only God''s good news (the Gospel) but also our own lives as well, for you had become so very dear to us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For you recall our hard toil and struggles, brethren. We worked night and day [and plied our trade] in order not to be a burden to any of you [for our support] while we proclaimed the glad tidings (the Gospel) of God to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You are witnesses, [yes] and God [also], how unworldly and upright and blameless was our behavior toward you believers [who adhered to and trusted in and relied on our Lord Jesus Christ].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For you know how, as a father [dealing with] his children, we used to exhort each of you personally, stimulating '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraging and charging you'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' To live lives worthy of God, Who calls you into His own kingdom and the glorious blessedness [into which true believers will enter after Christ''s return].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And we also [especially] thank God continually for this, that when you received the message of God [which you heard] from us, you welcomed it not as the word of [mere] men, but as it truly is, the Word of God, which is effectually at work in you who believe [exercising its superhuman power in those who adhere to and trust in and rely on it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For you, brethren, became imitators of the assemblies (churches) of God in Christ Jesus which are in Judea, for you too have suffered the same kind of treatment from your own fellow countrymen as they did [who were persecuted at the hands] of the Jews,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Who killed both the Lord Jesus and the prophets, and harassed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' drove us out, and continue to make themselves hateful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offensive to God and to show themselves foes of all men,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Forbidding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hindering us from speaking to the Gentiles (the nations) that they may be saved. So as always they fill up [to the brim the measure of] their sins. But God''s wrath has come upon them at last [completely and forever]! [Gen. 15:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But since we were bereft of you, brethren, for a little while in person, [of course] not in heart, we endeavored the more eagerly and with great longing to see you face to face,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Because it was our will to come to you. [I mean that] I, Paul, again and again [wanted to come], but Satan hindered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impeded us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For what is our hope or happiness or our victor''s wreath of exultant triumph when we stand in the presence of our Lord Jesus at His coming? Is it not you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For you are [indeed] our glory and our joy!'
