document_id: 1TH.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR YOU yourselves know, brethren, that our coming among you was not useless '
  - type: text
    content: and
  - type: text
    content: ' fruitless.'
  '10':
  - type: text
    content: ' You are witnesses, [yes] and God [also], how unworldly and upright and blameless was our behavior toward you believers [who adhered to and trusted in and relied on our Lord Jesus Christ].'
  '11':
  - type: text
    content: ' For you know how, as a father [dealing with] his children, we used to exhort each of you personally, stimulating '
  - type: text
    content: and
  - type: text
    content: ' encouraging and charging you'
  '12':
  - type: text
    content: ' To live lives worthy of God, Who calls you into His own kingdom and the glorious blessedness [into which true believers will enter after Christ''s return].'
  '13':
  - type: text
    content: ' And we also [especially] thank God continually for this, that when you received the message of God [which you heard] from us, you welcomed it not as the word of [mere] men, but as it truly is, the Word of God, which is effectually at work in you who believe [exercising its superhuman power in those who adhere to and trust in and rely on it].'
  '14':
  - type: text
    content: ' For you, brethren, became imitators of the assemblies (churches) of God in Christ Jesus which are in Judea, for you too have suffered the same kind of treatment from your own fellow countrymen as they did [who were persecuted at the hands] of the Jews,'
  '15':
  - type: text
    content: ' Who killed both the Lord Jesus and the prophets, and harassed '
  - type: text
    content: and
  - type: text
    content: ' drove us out, and continue to make themselves hateful '
  - type: text
    content: and
  - type: text
    content: ' offensive to God and to show themselves foes of all men,'
  '16':
  - type: text
    content: ' Forbidding '
  - type: text
    content: and
  - type: text
    content: ' hindering us from speaking to the Gentiles (the nations) that they may be saved. So as always they fill up [to the brim the measure of] their sins. But God''s wrath has come upon them at last [completely and forever]! [Gen. 15:16.]'
  '17':
  - type: text
    content: ' But since we were bereft of you, brethren, for a little while in person, [of course] not in heart, we endeavored the more eagerly and with great longing to see you face to face,'
  '18':
  - type: text
    content: ' Because it was our will to come to you. [I mean that] I, Paul, again and again [wanted to come], but Satan hindered '
  - type: text
    content: and
  - type: text
    content: ' impeded us.'
  '19':
  - type: text
    content: ' For what is our hope or happiness or our victor''s wreath of exultant triumph when we stand in the presence of our Lord Jesus at His coming? Is it not you?'
  '2':
  - type: text
    content: ' But though we had already suffered and been outrageously treated at Philippi, as you know, yet in [the strength of] our God we summoned courage to proclaim to you unfalteringly the good news (the Gospel) with earnest contention '
  - type: text
    content: and
  - type: text
    content: ' much conflict '
  - type: text
    content: and
  - type: text
    content: ' great opposition.'
  '20':
  - type: text
    content: ' For you are [indeed] our glory and our joy!'
  '3':
  - type: text
    content: ' For our appeal [in preaching] does not [originate] from delusion '
  - type: text
    content: or
  - type: text
    content: ' error or impure purpose '
  - type: text
    content: or
  - type: text
    content: ' motive, nor in fraud '
  - type: text
    content: or
  - type: text
    content: ' deceit.'
  '4':
  - type: text
    content: ' But just as we have been approved by God to be entrusted with the glad tidings (the Gospel), so we speak not to please men but to please God, Who tests our hearts [expecting them to be approved].'
  '5':
  - type: text
    content: ' For as you well know, we never resorted either to words of flattery or to any cloak to conceal greedy motives '
  - type: text
    content: or
  - type: text
    content: ' pretexts for gain, [as] God is our witness.'
  '6':
  - type: text
    content: ' Nor did we seek to extract praise '
  - type: text
    content: and
  - type: text
    content: ' honor '
  - type: text
    content: and
  - type: text
    content: ' glory from men, either from you or from anyone else, though we might have asserted our authority [stood on our dignity and claimed honor] as apostles (special missionaries) of Christ (the Messiah).'
  '7':
  - type: text
    content: ' But we behaved gently when we were among you, like a devoted mother nursing '
  - type: text
    content: and
  - type: text
    content: ' cherishing her own children.'
  '8':
  - type: text
    content: ' So, being thus tenderly '
  - type: text
    content: and
  - type: text
    content: ' affectionately desirous of you, we continued to share with you not only God''s good news (the Gospel) but also our own lives as well, for you had become so very dear to us.'
  '9':
  - type: text
    content: ' For you recall our hard toil and struggles, brethren. We worked night and day [and plied our trade] in order not to be a burden to any of you [for our support] while we proclaimed the glad tidings (the Gospel) of God to you.'
