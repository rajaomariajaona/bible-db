document_id: MAT.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AT THAT time the disciples came up and asked Jesus, Who then is [really] the greatest in the kingdom of heaven?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And He called a little child to Himself and put him in the midst of them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And said, Truly I say to you, unless you repent (change, turn about) and become like little children [trusting, lowly, loving, forgiving], you can never enter the kingdom of heaven [at all].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Whoever will humble himself therefore and become like this little child [trusting, lowly, loving, forgiving] is greatest in the kingdom of heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And whoever receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes one little child like this for My sake and in My name receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But whoever causes one of these little ones who believe in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cleave to Me to stumble and sin [that is, who entices him or hinders him in right conduct or thought], it would be better (more expedient and profitable or advantageous) for him to have a great millstone fastened around his neck and to be sunk in the depth of the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Woe to the world for such temptations to sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' influences to do wrong! It is necessary that temptations come, but woe to the person on whose account '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' by whom the temptation comes!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And if your hand or your foot causes you to stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sin, cut it off and throw it away from you; it is better (more profitable and wholesome) for you to enter life maimed or lame than to have two hands or two feet and be thrown into everlasting fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And if your eye causes you to stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sin, pluck it out and throw it away from you; it is better (more profitable and wholesome) for you to enter life with only one eye than to have two eyes and be thrown into the hell (Gehenna) of fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Beware that you do not despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' feel scornful toward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' think little of one of these little ones, for I tell you that in heaven their angels always are in the presence of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' look upon the face of My Father Who is in heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For the Son of man came to save [from the penalty of eternal death] that which was lost.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' What do you think? If a man has a hundred sheep, and one of them has gone astray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gets lost, will he not leave the ninety-nine on the mountain and go in search of the one that is lost?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And if it should be that he finds it, truly I say to you, he rejoices more over it than over the ninety-nine that did not get lost.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Just so it is not the will of My Father Who is in heaven that one of these little ones should be lost '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' If your brother wrongs you, go and show him his fault, between you and him privately. If he listens to you, you have won back your brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But if he does not listen, take along with you one or two others, so that every word may be confirmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upheld by the testimony of two or three witnesses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' If he pays no attention to them [refusing to listen and obey], tell it to the church; and if he refuses to listen even to the church, let him be to you as a pagan and a tax collector. [Lev. 19:17; Deut. 19:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Truly I tell you, whatever you forbid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' declare to be improper and unlawful on earth must be what is already forbidden in heaven, and whatever you permit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' declare proper and lawful on earth must be what is already permitted in heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Again I tell you, if two of you on earth agree (harmonize together, make a symphony together) about whatever [anything and everything] they may ask, it will come to pass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be done for them by My Father in heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For wherever two or three are gathered (drawn together as My followers) in (into) My name, there I AM in the midst of them. [Exod. 3:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then Peter came up to Him and said, Lord, how many times may my brother sin against me and I forgive him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' let it go? [As many as] up to seven times?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Jesus answered him, I tell you, not up to seven times, but seventy times seven! [Gen. 4:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Therefore the kingdom of heaven is like a human king who wished to settle accounts with his attendants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' When he began the accounting, one was brought to him who owed him 10,000 talents [probably about $10,000,000],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And because he could not pay, his master ordered him to be sold, with his wife and his children and everything that he possessed, and payment to be made.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So the attendant fell on his knees, begging him, Have patience with me and I will pay you everything.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And his master''s heart was moved with compassion, and he released him and forgave him [cancelling] the debt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But that same attendant, as he went out, found one of his fellow attendants who owed him a hundred denarii [about twenty dollars]; and he caught him by the throat and said, Pay what you owe!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' So his fellow attendant fell down and begged him earnestly, Give me time, and I will pay you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all
  - type: text
    text: ' !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But he was unwilling, and he went out and had him put in prison till he should pay the debt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' When his fellow attendants saw what had happened, they were greatly distressed, and they went and told everything that had taken place to their master.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Then his master called him and said to him, You contemptible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked attendant! I forgave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cancelled all that [great] debt of yours because you begged me to.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And should you not have had pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy on your fellow attendant, as I had pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy on you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And in wrath his master turned him over to the torturers (the jailers), till he should pay all that he owed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' So also My heavenly Father will deal with every one of you if you do not freely forgive your brother from your heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his offenses.
