  '23':
  - type: text
    content: ' Therefore the kingdom of heaven is like a human king who wished to settle accounts with his attendants.'
  '24':
  - type: text
    content: ' When he began the accounting, one was brought to him who owed him 10,000 talents [probably about $10,000,000],'
  '25':
  - type: text
    content: ' And because he could not pay, his master ordered him to be sold, with his wife and his children and everything that he possessed, and payment to be made.'
  '26':
  - type: text
    content: ' So the attendant fell on his knees, begging him, Have patience with me and I will pay you everything.'
  '27':
  - type: text
    content: ' And his master''s heart was moved with compassion, and he released him and forgave him [cancelling] the debt.'
  '28':
  - type: text
    content: ' But that same attendant, as he went out, found one of his fellow attendants who owed him a hundred denarii [about twenty dollars]; and he caught him by the throat and said, Pay what you owe!'
  '29':
  - type: text
    content: ' So his fellow attendant fell down and begged him earnestly, Give me time, and I will pay you '
  - type: text
    content: all
  - type: text
    content: ' !'
  '3':
  - type: text
    content: ' And said, Truly I say to you, unless you repent (change, turn about) and become like little children [trusting, lowly, loving, forgiving], you can never enter the kingdom of heaven [at all].'
  '30':
  - type: text
    content: ' But he was unwilling, and he went out and had him put in prison till he should pay the debt.'
  '31':
  - type: text
    content: ' When his fellow attendants saw what had happened, they were greatly distressed, and they went and told everything that had taken place to their master.'
  '32':
  - type: text
    content: ' Then his master called him and said to him, You contemptible '
  - type: text
