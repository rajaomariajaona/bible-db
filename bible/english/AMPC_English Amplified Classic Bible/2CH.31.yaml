document_id: 2CH.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW WHEN all this was finished, all Israel present there went out to the cities of Judah and broke in pieces the pillars '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' obelisks, cut down the Asherim, and threw down the high places [of idolatry] and the altars in all Judah and Benjamin, in Ephraim and Manasseh, until they had utterly destroyed them all. Then all the Israelites returned to their own cities, every man to his possession.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Hezekiah appointed the priests and the Levites after their divisions, each man according to his service, the priests and Levites for burnt offerings and for peace offerings, to minister, to give thanks, and to praise in the gates of the camp of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' King Hezekiah''s personal contribution was for the burnt offerings: [those] of morning and evening, for the Sabbaths, for the New Moons, and for the appointed feasts, as written in the Law of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He commanded the people living in Jerusalem to give the portion due the priests and Levites, that they might [be free to] give themselves to the Law of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' As soon as the command went abroad, the Israelites gave in abundance the firstfruits of grain, vintage fruit, oil, honey, and of all the produce of the field; and they brought in abundantly the tithe of everything.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The people of Israel and Judah who lived in Judah''s cities also brought the tithe of cattle and sheep and of the dedicated things which were consecrated to the Lord their God, and they laid them in heaps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' In the third month [at the end of wheat harvest] they began to lay the foundation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' beginning of the heaps and finished them in the seventh month.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When Hezekiah and the princes came and saw the heaps, they blessed the Lord and His people Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Hezekiah questioned the priests and Levites about the heaps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Azariah the high priest, of the house of Zadok, answered him, Since the people began to bring the offerings into the Lord''s house, we have eaten and have plenty left, for the Lord has blessed His people, and what is left is this great store.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then Hezekiah commanded them to prepare chambers [for storage] in the house of the Lord, and they prepared them'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And brought in the offerings, tithes, and dedicated things faithfully. Conaniah the Levite was in charge of them, and Shimei his brother came next.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismachiah, Mahath, and Benaiah were overseers directed by Conaniah and Shimei his brother, at the appointment of King Hezekiah and Azariah the chief officer of the house of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Kore son of Imnah the Levite, keeper of the East Gate, was over the freewill offerings to God, to apportion the contributions of the Lord and the most holy things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Under him were Eden, Miniamin, Jeshua, Shemaiah, Amariah, and Shecaniah, in the priests'' cities, in their office of trust faithfully to give to their brethren by divisions, to great and small alike,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Except those [Levites] registered as males from three years old and upward–who were consecrated to the temple service [in Jerusalem, for their daily portion] as the duty of every day required, for their service according to their offices by their divisions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The registration of the priests was according to their fathers'' houses; that of the Levites from twenty years old and upward was according to their offices by their divisions;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Also there was the registration of all their little ones, their wives, and their older sons and daughters through all the congregation. For in their office of trust they cleansed themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set themselves apart in holiness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Also for the sons of Aaron the priests, who were in the fields of the suburbs of their cities or in every city, there were men who were mentioned by name to give portions to all the males among the priests and to all who were registered among the Levites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Hezekiah did this throughout all Judah, and he did what was good, right, and faithful before the Lord his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And every work that he began in the service of the house of God, in keeping with the law and the commandments to seek his God [inquiring of and yearning for Him], he did with all his heart, and he prospered.'
