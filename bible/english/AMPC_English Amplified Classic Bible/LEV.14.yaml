document_id: LEV.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' This shall be the law of the leper on the day when he is to be pronounced clean: he shall be brought to the priest [at a meeting place outside the camp];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The priest shall go out of the camp [to meet him]; and [he] shall examine him, and if the disease is healed in the leper,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then the priest shall command to take for him who is to be cleansed two living clean birds and cedar wood and scarlet [material] and hyssop. [Heb. 9:19-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the priest shall command to kill one of the birds in an earthen vessel over fresh, running water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' As for the living bird, he shall take it, the cedar wood, and the scarlet [material], and the hyssop, and shall dip them and the living bird in the blood of the bird killed over the running water;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he shall sprinkle [the blood] on him who is to be cleansed from the leprosy seven times and shall pronounce him clean, and shall let go the living bird into the open field. [Heb. 9:13-15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He who is to be cleansed shall wash his clothes, shave off all his hair, and bathe himself in water; and he shall be clean. After that he shall come into the camp, but stay outside his tent seven days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But on the seventh day he shall shave all his hair off his head, his beard, his eyebrows, and his [body]; and he shall wash his clothes and bathe his body in water, and be clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' On the eighth day he shall take two he-lambs without blemish and one ewe lamb a year old without blemish, and three-tenths of an ephah of fine flour for a cereal offering, mixed with oil, and one log of oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the priest who cleanses him shall set the man who is to be cleansed and these things before the Lord at the door of the Tent of Meeting;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The priest shall take one of the male lambs and offer it for a guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering, and the log of oil, and wave them for a wave offering before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He shall kill the lamb in the place where they kill the sin offering and the burnt offering, in the sacred place [the court of the tabernacle]; for as the sin offering is the priest''s, so is the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering; it is most holy;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the priest shall take some of the blood of the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering and put it on the tip of the right ear of him who is to be cleansed, and on the thumb of his right hand, and on the great toe of his right foot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the priest shall take some of the log of oil and pour it into the palm of his own left hand;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the priest shall dip his right finger in the oil that is in his left hand and shall sprinkle some of the oil with his finger seven times before the Lord;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And of the rest of the oil that is in his hand shall the priest put some on the tip of the right ear of him who is to be cleansed, and on the thumb of his right hand, and on the great toe of his right foot, on the blood of the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering [which he has previously placed in each of these places].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the rest of the oil that is in the priest''s hand he shall pour upon the head of him who is to be cleansed and make atonement for him before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the priest shall offer the sin offering and make atonement for him who is to be cleansed from his uncleanness, and afterward kill the burnt offering [victim].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the priest shall offer the burnt offering and the cereal offering on the altar; and he shall make atonement for him, and he shall be clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' If the cleansed leper is poor and cannot afford so much, he shall take one lamb for a guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering to be waved to make atonement for him, and one tenth of an ephah of fine flour mixed with oil for a cereal offering, and a log of oil,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And two turtledoves or two young pigeons, such as he can afford, one for a sin offering, the other for a burnt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He shall bring them on the eighth day for his cleansing to the priest at the door of the Tent of Meeting, before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the priest shall take the lamb of the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering, and the log of oil, and shall wave them for a wave offering before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And he shall kill the lamb of the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering, and the priest shall take some of the blood of the offering and put it on the tip of the right ear of him who is to be cleansed, and on the thumb of his right hand, and on the great toe of his right foot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And the priest shall pour some of the oil into the palm of his own left hand,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And shall sprinkle with his right finger some of the oil that is in his left hand seven times before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' The priest shall put some of the oil in his hand on the tip of the right ear of the one to be cleansed, and on the thumb of his right hand, and on the great toe of his right foot, on the places where he has put the blood of the guilt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The rest of the oil that is in the priest''s hand he shall put on the head of the one to be cleansed, to make atonement for him before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And he shall offer one of the turtledoves or of the young pigeons, such as he is able to get,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' As he can afford, one for a sin offering and the other for a burnt offering, together with the cereal offering; and the priest shall make atonement for him who is to be cleansed before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' This is the law of him in whom is the plague of leprosy, who is not able to get what is required for his cleansing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And the Lord said to Moses and Aaron,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' When you have come into the land of Canaan, which I give to you for a possession, and I put the disease of leprosy in a house of the land of your possession,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Then he who owns the house shall come and tell the priest, It seems to me there is some sort of disease in my house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Then the priest shall command that they empty the house before [he] goes in to examine the disease, so that all that is in the house may not be declared unclean; afterward [he] shall go in to see the house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' He shall examine the disease, and if it is in the walls of the house with depressed spots of dark green or dark red appearing beneath [the surface of] the wall,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Then the priest shall go out of the door and shut up the house seven days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' The priest shall come again on the seventh day and shall look; and if the disease has spread in the walls of the house,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' He shall command that they take out the diseased stones and cast them into an unclean place outside the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' He shall cause the house to be scraped within round about and the plaster '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' mortar that is scraped off to be emptied out in an unclean place outside the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And they shall put other stones in the place of those stones, and he shall plaster the house with fresh mortar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' If the disease returns, breaking out in the house after he has removed the stones and has scraped and plastered the house,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Then the priest shall come and look, and if the disease is spreading in the house, it is a rotting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' corroding leprosy in the house; it is unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' He shall tear down the house–its stones and its timber and all the plaster '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' mortar of the house–and shall carry them forth out of the city to an unclean place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Moreover, he who enters the house during the whole time that it is shut up shall be unclean until the evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And he who lies down or eats in the house shall wash his clothes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' But if the priest inspects it and the disease has not spread after the house was plastered, he shall pronounce the house clean, because the disease is healed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' He shall take to cleanse the house two birds, cedar wood, scarlet [material], and hyssop;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' And he shall kill one of the birds in an earthen vessel over running water,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' And he shall take the cedar wood, and the hyssop, and the scarlet [material], and the living bird, and dip them in the blood of the slain bird and in the running water, and sprinkle the house seven times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' And he shall cleanse the house with the blood of the bird, the running water, the living bird, the cedar wood, the hyssop, and the scarlet [material].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' But he shall let the living bird go out of the city into the open field; so he shall make atonement for the house, and it shall be clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' This is the law for all kinds of leprous diseases, and mangelike conditions,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' For the leprosy of a garment or of a house,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' And for a swelling or an eruption '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a scab or a bright spot,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' To teach when it is unclean and when it is clean. This is the law of leprosy.'
