document_id: LEV.14,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' On the eighth day he shall take two he-lambs without blemish and one ewe lamb a year old without blemish, and three-tenths of an ephah of fine flour for a cereal offering, mixed with oil, and one log of oil.'
  '11':
  - type: text
    content: ' And the priest who cleanses him shall set the man who is to be cleansed and these things before the Lord at the door of the Tent of Meeting;'
  '12':
  - type: text
    content: ' The priest shall take one of the male lambs and offer it for a guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering, and the log of oil, and wave them for a wave offering before the Lord.'
  '13':
  - type: text
    content: ' He shall kill the lamb in the place where they kill the sin offering and the burnt offering, in the sacred place [the court of the tabernacle]; for as the sin offering is the priest''s, so is the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering; it is most holy;'
  '14':
  - type: text
    content: ' And the priest shall take some of the blood of the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering and put it on the tip of the right ear of him who is to be cleansed, and on the thumb of his right hand, and on the great toe of his right foot.'
  '15':
  - type: text
    content: ' And the priest shall take some of the log of oil and pour it into the palm of his own left hand;'
  '16':
  - type: text
    content: ' And the priest shall dip his right finger in the oil that is in his left hand and shall sprinkle some of the oil with his finger seven times before the Lord;'
  '17':
  - type: text
    content: ' And of the rest of the oil that is in his hand shall the priest put some on the tip of the right ear of him who is to be cleansed, and on the thumb of his right hand, and on the great toe of his right foot, on the blood of the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering [which he has previously placed in each of these places].'
  '18':
  - type: text
    content: ' And the rest of the oil that is in the priest''s hand he shall pour upon the head of him who is to be cleansed and make atonement for him before the Lord.'
  '19':
  - type: text
    content: ' And the priest shall offer the sin offering and make atonement for him who is to be cleansed from his uncleanness, and afterward kill the burnt offering [victim].'
  '2':
  - type: text
    content: ' This shall be the law of the leper on the day when he is to be pronounced clean: he shall be brought to the priest [at a meeting place outside the camp];'
  '20':
  - type: text
    content: ' And the priest shall offer the burnt offering and the cereal offering on the altar; and he shall make atonement for him, and he shall be clean.'
  '21':
  - type: text
    content: ' If the cleansed leper is poor and cannot afford so much, he shall take one lamb for a guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering to be waved to make atonement for him, and one tenth of an ephah of fine flour mixed with oil for a cereal offering, and a log of oil,'
  '22':
  - type: text
    content: ' And two turtledoves or two young pigeons, such as he can afford, one for a sin offering, the other for a burnt offering.'
  '23':
  - type: text
    content: ' He shall bring them on the eighth day for his cleansing to the priest at the door of the Tent of Meeting, before the Lord.'
  '24':
  - type: text
    content: ' And the priest shall take the lamb of the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering, and the log of oil, and shall wave them for a wave offering before the Lord.'
  '25':
  - type: text
    content: ' And he shall kill the lamb of the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering, and the priest shall take some of the blood of the offering and put it on the tip of the right ear of him who is to be cleansed, and on the thumb of his right hand, and on the great toe of his right foot.'
  '26':
  - type: text
    content: ' And the priest shall pour some of the oil into the palm of his own left hand,'
  '27':
  - type: text
    content: ' And shall sprinkle with his right finger some of the oil that is in his left hand seven times before the Lord.'
  '28':
  - type: text
    content: ' The priest shall put some of the oil in his hand on the tip of the right ear of the one to be cleansed, and on the thumb of his right hand, and on the great toe of his right foot, on the places where he has put the blood of the guilt offering.'
  '29':
  - type: text
    content: ' The rest of the oil that is in the priest''s hand he shall put on the head of the one to be cleansed, to make atonement for him before the Lord.'
  '3':
  - type: text
    content: ' The priest shall go out of the camp [to meet him]; and [he] shall examine him, and if the disease is healed in the leper,'
  '30':
  - type: text
    content: ' And he shall offer one of the turtledoves or of the young pigeons, such as he is able to get,'
  '31':
  - type: text
    content: ' As he can afford, one for a sin offering and the other for a burnt offering, together with the cereal offering; and the priest shall make atonement for him who is to be cleansed before the Lord.'
  '32':
  - type: text
    content: ' This is the law of him in whom is the plague of leprosy, who is not able to get what is required for his cleansing.'
  '33':
  - type: text
    content: ' And the Lord said to Moses and Aaron,'
  '34':
  - type: text
    content: ' When you have come into the land of Canaan, which I give to you for a possession, and I put the disease of leprosy in a house of the land of your possession,'
  '35':
  - type: text
    content: ' Then he who owns the house shall come and tell the priest, It seems to me there is some sort of disease in my house.'
  '36':
  - type: text
    content: ' Then the priest shall command that they empty the house before [he] goes in to examine the disease, so that all that is in the house may not be declared unclean; afterward [he] shall go in to see the house.'
  '37':
  - type: text
    content: ' He shall examine the disease, and if it is in the walls of the house with depressed spots of dark green or dark red appearing beneath [the surface of] the wall,'
  '38':
  - type: text
    content: ' Then the priest shall go out of the door and shut up the house seven days.'
  '39':
  - type: text
    content: ' The priest shall come again on the seventh day and shall look; and if the disease has spread in the walls of the house,'
  '4':
  - type: text
    content: ' Then the priest shall command to take for him who is to be cleansed two living clean birds and cedar wood and scarlet [material] and hyssop. [Heb. 9:19-22.]'
  '40':
  - type: text
    content: ' He shall command that they take out the diseased stones and cast them into an unclean place outside the city.'
  '41':
  - type: text
    content: ' He shall cause the house to be scraped within round about and the plaster '
  - type: text
    content: or
  - type: text
    content: ' mortar that is scraped off to be emptied out in an unclean place outside the city.'
  '42':
  - type: text
    content: ' And they shall put other stones in the place of those stones, and he shall plaster the house with fresh mortar.'
  '43':
  - type: text
    content: ' If the disease returns, breaking out in the house after he has removed the stones and has scraped and plastered the house,'
  '44':
  - type: text
    content: ' Then the priest shall come and look, and if the disease is spreading in the house, it is a rotting '
  - type: text
    content: or
  - type: text
    content: ' corroding leprosy in the house; it is unclean.'
  '45':
  - type: text
    content: ' He shall tear down the house–its stones and its timber and all the plaster '
  - type: text
    content: or
  - type: text
    content: ' mortar of the house–and shall carry them forth out of the city to an unclean place.'
  '46':
  - type: text
    content: ' Moreover, he who enters the house during the whole time that it is shut up shall be unclean until the evening.'
  '47':
  - type: text
    content: ' And he who lies down or eats in the house shall wash his clothes.'
  '48':
  - type: text
    content: ' But if the priest inspects it and the disease has not spread after the house was plastered, he shall pronounce the house clean, because the disease is healed.'
  '49':
  - type: text
    content: ' He shall take to cleanse the house two birds, cedar wood, scarlet [material], and hyssop;'
  '5':
  - type: text
    content: ' And the priest shall command to kill one of the birds in an earthen vessel over fresh, running water.'
  '50':
  - type: text
    content: ' And he shall kill one of the birds in an earthen vessel over running water,'
  '51':
  - type: text
    content: ' And he shall take the cedar wood, and the hyssop, and the scarlet [material], and the living bird, and dip them in the blood of the slain bird and in the running water, and sprinkle the house seven times.'
  '52':
  - type: text
    content: ' And he shall cleanse the house with the blood of the bird, the running water, the living bird, the cedar wood, the hyssop, and the scarlet [material].'
  '53':
  - type: text
    content: ' But he shall let the living bird go out of the city into the open field; so he shall make atonement for the house, and it shall be clean.'
  '54':
  - type: text
    content: ' This is the law for all kinds of leprous diseases, and mangelike conditions,'
  '55':
  - type: text
    content: ' For the leprosy of a garment or of a house,'
  '56':
  - type: text
    content: ' And for a swelling or an eruption '
  - type: text
    content: or
  - type: text
    content: ' a scab or a bright spot,'
  '57':
  - type: text
    content: ' To teach when it is unclean and when it is clean. This is the law of leprosy.'
  '6':
  - type: text
    content: ' As for the living bird, he shall take it, the cedar wood, and the scarlet [material], and the hyssop, and shall dip them and the living bird in the blood of the bird killed over the running water;'
  '7':
  - type: text
    content: ' And he shall sprinkle [the blood] on him who is to be cleansed from the leprosy seven times and shall pronounce him clean, and shall let go the living bird into the open field. [Heb. 9:13-15.]'
  '8':
  - type: text
    content: ' He who is to be cleansed shall wash his clothes, shave off all his hair, and bathe himself in water; and he shall be clean. After that he shall come into the camp, but stay outside his tent seven days.'
  '9':
  - type: text
    content: ' But on the seventh day he shall shave all his hair off his head, his beard, his eyebrows, and his [body]; and he shall wash his clothes and bathe his body in water, and be clean.'
