document_id: JDG.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SAMSON WENT down to Timnah and at Timnah saw one of the daughters of the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he came up and told his father and mother, I saw one of the daughters of the Philistines at Timnah; now get her for me as my wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But his father and mother said to him, Is there not a woman among the daughters of your kinsmen or among all our people, that you must go to take a wife from the uncircumcised Philistines? And Samson said to his father, Get her for me, for she is all right in my eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' His father and mother did not know that it was of the Lord, and that He sought an occasion for assailing the Philistines. At that time the Philistines had dominion over Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then Samson and his father and mother went down to Timnah and came to the vineyards of Timnah. And behold, a young lion roared against him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Spirit of the Lord came mightily upon him, and he tore the lion as he would have torn a kid, and he had nothing in his hand; but he did not tell his father or mother what he had done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he went down and talked with the woman, and she pleased Samson well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And after a while he returned to take her, and he turned aside to see the body of the lion, and behold, a swarm of bees and honey were in the body of the lion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he scraped some of the honey out into his hands and went along eating. And he came to his father and mother and gave them some, and they ate it; but he did not tell them he had taken the honey from the body of the lion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' His father went down to the woman, and Samson made a feast there, for that was the customary thing for young men to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And when the people saw him, they brought thirty companions to be with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Samson said to them, I will now put forth a riddle to you; if you can tell me what it is within the seven days of the feast, and find it out, then I will give you thirty linen undergarments and thirty changes of raiment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But if you cannot declare it to me, then shall you give me thirty linen undergarments and thirty changes of festive [costly] raiment. And they said to him, Put forth your riddle, that we may hear it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he said to them, Out of the eater came forth food, and out of the strong came forth sweetness. And they could not solve the riddle in three days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And on the seventh day they said to Samson''s wife, Entice your husband to declare to us the riddle, lest we burn you and your father''s household with fire. Have you invited us to make us poor? Is this not true?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And Samson''s wife wept before him and said, You only hate me, you do not love me; you have put forth a riddle to my countrymen and have not told the answer to me. And he said to her, Behold, I have not told my father or my mother, and shall I tell you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Samson''s wife wept before him the seven days their feast lasted, and on the seventh day he told her because she pressed him with entreaties. Then she told the riddle to her countrymen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the men of the city said to [Samson] on the seventh day before sundown, What is sweeter than honey? What is stronger than a lion? And he said to them, If you had not plowed with my heifer, you would not have solved my riddle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the Spirit of the Lord came upon him, and he went down to Ashkelon and slew thirty men of them and took their apparel [as spoil], and gave the changes of garments to those who explained the riddle. And his anger was kindled, and he went up to his father''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But Samson''s wife was [given] to his companion who was his [best] friend.'
