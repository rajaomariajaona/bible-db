document_id: PRO.19,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BETTER IS a poor man who walks in his integrity than a rich man who is perverse in his speech and is a [self-confident] fool.'
  '10':
  - type: text
    content: ' Luxury is not fitting for a [self-confident] fool–much less for a slave to rule over princes.'
  '11':
  - type: text
    content: ' Good sense makes a man restrain his anger, and it is his glory to overlook a transgression '
  - type: text
    content: or
  - type: text
    content: ' an offense.'
  '12':
  - type: text
    content: ' The king''s wrath is as terrifying as the roaring of a lion, but his favor is as [refreshing as] dew upon the grass. [Hos. 14:5.]'
  '13':
  - type: text
    content: ' A self-confident '
  - type: text
    content: and
  - type: text
    content: ' foolish son is the [multiplied] calamity of his father, and the contentions of a wife are like a continual dripping [of water through a chink in the roof].'
  '14':
  - type: text
    content: ' House and riches are the inheritance from fathers, but a wise, understanding, '
  - type: text
    content: and
  - type: text
    content: ' prudent wife is from the Lord. [Prov. 18:22.]'
  '15':
  - type: text
    content: ' Slothfulness casts one into a deep sleep, and the idle person shall suffer hunger.'
  '16':
  - type: text
    content: ' He who keeps the commandment [of the Lord] keeps his own life, but he who despises His ways shall die. [Luke 10:28; 11:28.]'
  '17':
  - type: text
    content: ' He who has pity on the poor lends to the Lord, and that which he has given He will repay to him. [Prov. 28:27; Eccl. 11:1; Matt. 10:42; 25:40; II Cor. 9:6-8; Heb. 6:10.]'
  '18':
  - type: text
    content: ' Discipline your son while there is hope, but do not [indulge your angry resentments by undue chastisements and] set yourself to his ruin.'
  '19':
  - type: text
    content: ' A man of great wrath shall suffer the penalty; for if you deliver him [from the consequences], he will [feel free to] cause you to do it again.'
  '2':
  - type: text
    content: ' Desire without knowledge is not good, and to be overhasty is to sin '
  - type: text
    content: and
  - type: text
    content: ' miss the mark.'
  '20':
  - type: text
    content: ' Hear counsel, receive instruction, '
  - type: text
    content: and
  - type: text
    content: ' accept correction, that you may be wise in the time to come.'
  '21':
  - type: text
    content: ' Many plans are in a man''s mind, but it is the Lord''s purpose for him that will stand. [Job 23:13; Ps. 33:10, 11; Isa. 14:26, 27; 46:10; Acts 5:39; Heb. 6:17.]'
  '22':
  - type: text
    content: ' That which is desired in a man is loyalty '
  - type: text
    content: and
  - type: text
    content: ' kindness [and his glory and delight are his giving], but a poor man is better than a liar.'
  '23':
  - type: text
    content: ' The reverent, worshipful fear of the Lord leads to life, and he who has it rests satisfied; he cannot be visited with [actual] evil. [Job 5:19; Ps. 91:3; Prov. 12:13; Isa. 46:4; Jer. 1:8; Dan. 6:27; II Tim. 4:8.]'
  '24':
  - type: text
    content: ' The sluggard buries his hand in the dish, and will not so much as bring it to his mouth again.'
  '25':
  - type: text
    content: ' Strike a scoffer, and the simple will learn prudence; reprove a man of understanding, and he will increase in knowledge.'
  '26':
  - type: text
    content: ' He who does violence to his father and chases away his mother is a son who causes shame and brings reproach.'
  '27':
  - type: text
    content: ' Cease, my son, to hear instruction only to ignore it '
  - type: text
    content: and
  - type: text
    content: ' stray from the words of knowledge.'
  '28':
  - type: text
    content: ' A worthless witness scoffs at justice, and the mouth of the wicked swallows iniquity.'
  '29':
  - type: text
    content: ' Judgments are prepared for scoffers, and stripes for the backs of [self-confident] fools. [Isa. 32:6.]'
  '3':
  - type: text
    content: ' The foolishness of man subverts his way [ruins his affairs]; then his heart is resentful '
  - type: text
    content: and
  - type: text
    content: ' frets against the Lord.'
  '4':
  - type: text
    content: ' Wealth makes many friends, but the poor man is avoided by his neighbor. [Prov. 14:20.]'
  '5':
  - type: text
    content: ' A false witness shall not be unpunished, and he who breathes out lies shall not escape. [Exod. 23:1; Deut. 19:16-19; Prov. 6:19; 21:28.]'
  '6':
  - type: text
    content: ' Many will entreat the favor of a liberal man, and every man is a friend to him who gives gifts.'
  '7':
  - type: text
    content: ' All the brothers of a poor man detest him–how much more do his friends go far from him! He pursues them with words, but they are gone.'
  '8':
  - type: text
    content: ' He who gains Wisdom loves his own life; he who keeps understanding shall prosper '
  - type: text
    content: and
  - type: text
    content: ' find good.'
  '9':
  - type: text
    content: ' A false witness shall not be unpunished, and he who breathes forth lies shall perish.'
