document_id: PRO.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BETTER IS a poor man who walks in his integrity than a rich man who is perverse in his speech and is a [self-confident] fool.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Desire without knowledge is not good, and to be overhasty is to sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miss the mark.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The foolishness of man subverts his way [ruins his affairs]; then his heart is resentful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' frets against the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Wealth makes many friends, but the poor man is avoided by his neighbor. [Prov. 14:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' A false witness shall not be unpunished, and he who breathes out lies shall not escape. [Exod. 23:1; Deut. 19:16-19; Prov. 6:19; 21:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Many will entreat the favor of a liberal man, and every man is a friend to him who gives gifts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' All the brothers of a poor man detest him–how much more do his friends go far from him! He pursues them with words, but they are gone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He who gains Wisdom loves his own life; he who keeps understanding shall prosper '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' find good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' A false witness shall not be unpunished, and he who breathes forth lies shall perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Luxury is not fitting for a [self-confident] fool–much less for a slave to rule over princes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Good sense makes a man restrain his anger, and it is his glory to overlook a transgression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' an offense.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The king''s wrath is as terrifying as the roaring of a lion, but his favor is as [refreshing as] dew upon the grass. [Hos. 14:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' A self-confident '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foolish son is the [multiplied] calamity of his father, and the contentions of a wife are like a continual dripping [of water through a chink in the roof].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' House and riches are the inheritance from fathers, but a wise, understanding, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prudent wife is from the Lord. [Prov. 18:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Slothfulness casts one into a deep sleep, and the idle person shall suffer hunger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He who keeps the commandment [of the Lord] keeps his own life, but he who despises His ways shall die. [Luke 10:28; 11:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He who has pity on the poor lends to the Lord, and that which he has given He will repay to him. [Prov. 28:27; Eccl. 11:1; Matt. 10:42; 25:40; II Cor. 9:6-8; Heb. 6:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Discipline your son while there is hope, but do not [indulge your angry resentments by undue chastisements and] set yourself to his ruin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' A man of great wrath shall suffer the penalty; for if you deliver him [from the consequences], he will [feel free to] cause you to do it again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Hear counsel, receive instruction, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accept correction, that you may be wise in the time to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Many plans are in a man''s mind, but it is the Lord''s purpose for him that will stand. [Job 23:13; Ps. 33:10, 11; Isa. 14:26, 27; 46:10; Acts 5:39; Heb. 6:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' That which is desired in a man is loyalty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness [and his glory and delight are his giving], but a poor man is better than a liar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The reverent, worshipful fear of the Lord leads to life, and he who has it rests satisfied; he cannot be visited with [actual] evil. [Job 5:19; Ps. 91:3; Prov. 12:13; Isa. 46:4; Jer. 1:8; Dan. 6:27; II Tim. 4:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The sluggard buries his hand in the dish, and will not so much as bring it to his mouth again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Strike a scoffer, and the simple will learn prudence; reprove a man of understanding, and he will increase in knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' He who does violence to his father and chases away his mother is a son who causes shame and brings reproach.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Cease, my son, to hear instruction only to ignore it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stray from the words of knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' A worthless witness scoffs at justice, and the mouth of the wicked swallows iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Judgments are prepared for scoffers, and stripes for the backs of [self-confident] fools. [Isa. 32:6.]'
