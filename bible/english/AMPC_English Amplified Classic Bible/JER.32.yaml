document_id: JER.32,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE WORD that came to Jeremiah from the Lord in the tenth year of Zedekiah king of Judah, which was the eighteenth year of Nebuchadrezzar.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I signed the deed and sealed it, called witnesses, and weighed out for him the money on the scales.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So I took the deed of the purchase–both that which was sealed, containing the terms and conditions, and the copy which was unsealed–'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I gave the purchase deed to Baruch son of Neriah, the son of Mahseiah, in the sight of Hanamel my uncle''s son and the witnesses who signed the purchase deed, in the presence of all the Jews who were sitting in the court of the guard.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I charged Baruch before them, saying,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord of hosts, the God of Israel: Take these deeds, both this purchase deed which is sealed and this unsealed deed, and put them in an earthen vessel, that they may last a long time.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For thus says the Lord of hosts, the God of Israel: Houses and fields and vineyards shall be purchased yet again in this land.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now when I had delivered the purchase deed to Baruch son of Neriah, I prayed to the Lord, saying:'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Alas, Lord God! Behold, You have made the heavens and the earth by Your great power and by Your outstretched arm! There is nothing too hard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' too wonderful for You–'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You Who show loving-kindness to thousands but recompense the iniquity of the fathers into the bosoms of their children after them. The great, the mighty God; the Lord of hosts is His name–'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Great [are You] in counsel and mighty in deeds, Whose eyes are open to all the ways of the sons of men, to reward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' repay each one according to his ways and according to the fruit of his doings,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the king of Babylon''s army was then besieging Jerusalem, and Jeremiah the prophet was shut up in the court of the guard, which was in the house of the king of Judah.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who wrought signs and wonders in the land of Egypt, and even to this day [continues to do so], both in Israel and among other men, and made for Yourself a name, as at this day.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And You brought forth Your people Israel out of the land of Egypt with signs and wonders, with a strong hand and outstretched arm and with great terror;'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And You gave them this land which You swore to their fathers to give them, a land flowing with milk and honey;'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they entered and took possession of it, but they obeyed not Your voice, nor walked in Your law; they have done nothing of all that You commanded them to do. Therefore You have caused all this evil to come upon them.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' See the siege mounds [of earth which the foe has heaped against the walls]; they have come up to the city to take it. And the city is given into the hand of the Chaldeans who fight against it, because [the people are overcome] by the sword and the famine and the pestilence. What You have spoken has come to pass, and behold, You see it.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet, O Lord God, You said to me, Buy the field with money and get witnesses, even though the city is given into the hands of the Chaldeans.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then came the word of the Lord to Jeremiah, saying,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, I am the Lord, the God of all flesh; is there anything too hard for Me?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore thus says the Lord: Behold, I am giving this city into the hands of the Chaldeans and into the hand of Nebuchadrezzar king of Babylon, and he shall take it;'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Chaldeans who are fighting against this city shall come in and set this city on fire and burn it, along with the houses on whose roofs incense has been offered to Baal and drink offerings have been poured out to other gods to provoke Me to anger. [Jer. 19:13.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Zedekiah king of Judah had locked him up, saying, Why do you prophesy and say, Thus says the Lord: Behold, I am giving this city into the hand of the king of Babylon, and he shall take it;'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the children of Israel and the children of Judah have done only evil before Me from their youth; for the children of Israel have only provoked Me to anger with the work of their hands [the idols], says the Lord.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this city has been to Me a [such a] provocation of My anger and My wrath from the day that they [finished] building it [in the time of Solomon, who was the first Israelite king who turned to idolatry] even to this day that I must remove it from before My face–[I Kings 11:1-13.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because of all the evil of the children of Israel and of the children of Judah which they have done to provoke Me to anger–they, their kings, their princes, their priests, their prophets, the men of Judah, and the inhabitants of Jerusalem.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they have turned their backs to Me and not their faces; though I taught them persistently, yet they would not listen and receive instruction.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But they set their abominations [of idol worship] in the house which is called by My Name to defile it.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they built the high places [for worship] of Baal in the Valley of Ben-hinnom [son of Hinnom] to cause their sons and their daughters to pass through the fire [in worship also of and] to Molech–which I did not command them, nor did it come into My mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' heart that they should do this abomination, to cause Judah to sin. [Jer. 7:30-31.]'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And now therefore thus says the Lord, the God of Israel, concerning this city of which you say, It shall be delivered into the hand of the king of Babylon by sword and by famine and by pestilence:'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, I will gather them out of all countries to which I drove them in My anger and in My wrath and in great indignation; I will bring them again to this place, and I will make them dwell safely.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they will be My people, and I will be their God.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will give them one heart and one way, that they may [reverently] fear Me forever for the good of themselves and of their children after them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Zedekiah king of Judah shall not escape out of the hands of the Chaldeans but shall surely be delivered into the hand of the king of Babylon, and shall speak with him face to face and see him eye to eye;'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will make an everlasting covenant with them: I will not turn away from following them to do them good, and I will put My [reverential] fear in their hearts, so that they will not depart from Me. [Jer. 31:31-34.]'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yes, I will rejoice over them to do them good, and I will plant them in this land assuredly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in truth with My whole heart and with My whole being.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For thus says the Lord: As I have brought all this great evil upon this people, so will I bring upon them all the good that I have promised them.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And fields shall be bought in this land of which you say, It is desolate, without man or beast; it is given into the hands of the Chaldeans.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Men shall buy fields for money and shall sign deeds, seal them, and call witnesses in the land of Benjamin, in the places around Jerusalem, in the cities of Judah, in the cities of the hill country, in the cities of the lowland, and in the cities of the South (the Negeb), for I will cause them to be released from their exile, says the Lord.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he shall lead Zedekiah to Babylon, and there shall he be until I visit him [for evil], says the Lord; and though you fight against the Chaldeans, you shall not prosper [why do you thus prophesy]? [Jer. 21:3-7; 34:2-5; 37:17; 52:7-14.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jeremiah said, The word of the Lord came to me, saying,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, Hanamel son of Shallum your uncle shall come to you and say, Buy my field that is in Anathoth, for the right of redemption is yours to buy it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Hanamel my uncle''s son came to me in the court of the guard in accordance with the word of the Lord, and he said to me, I pray you, buy my field that is in Anathoth, which is in the land of Benjamin, for the right of inheritance is yours and the redemption is yours; buy it for yourself. Then I knew that this was the word of the Lord.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I bought the field that was in Anathoth from Hanamel my uncle''s son and weighed out for him the money–seventeen shekels of silver.'
