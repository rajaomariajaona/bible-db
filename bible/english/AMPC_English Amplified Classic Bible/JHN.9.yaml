document_id: JHN.9,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AS HE passed along, He noticed a man blind from his birth.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So they said to him, How were your eyes opened?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He replied, The Man called Jesus made mud and smeared it on my eyes and said to me, Go to Siloam and wash. So I went and washed, and I obtained my sight!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They asked him, Where is He? He said, I do not know.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then they conducted to the Pharisees the man who had formerly been blind.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now it was on the Sabbath day that Jesus mixed the mud and opened the man''s eyes.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So now again the Pharisees asked him how he received his sight. And he said to them, He smeared mud on my eyes, and I washed, and now I see.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then some of the Pharisees said, This Man [Jesus] is not from God, because He does not observe the Sabbath. But others said, How can a man who is a sinner (a bad man) do such signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' miracles? So there was a difference of opinion among them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Accordingly they said to the blind man again, What do you say about Him, seeing that He opened your eyes? And he said, He is [He must be] a prophet!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' However, the Jews did not believe that he had [really] been blind and that he had received his sight until they called (summoned) the parents of the man.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They asked them, Is this your son, whom you reported as having been born blind? How then does he see now?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His disciples asked Him, Rabbi, who sinned, this man or his parents, that he should be born blind?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His parents answered, We know that this is our son, and that he was born blind.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But as to how he can now see, we do not know; or who has opened his eyes, we do not know. He is of age. Ask him; let him speak for himself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give his own account of it.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His parents said this because they feared [the leaders of] the Jews; for the Jews had already agreed that if anyone should acknowledge Jesus to be the Christ, he should be expelled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' excluded from the synagogue.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On that account his parents said, He is of age; ask him.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So the second time they summoned the man who had been born blind, and said to him, Now give God the glory (praise). This Fellow we know is only a sinner (a wicked person).'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then he answered, I do not know whether He is a sinner '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wicked or not. But one thing I do know, that whereas I was blind before, now I see.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So they said to him, What did He [actually] do to you? How did He open your eyes?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He answered, I already told you and you would not listen. Why do you want to hear it again? Can it be that you wish to become His disciples also?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they stormed at him [they jeered, they sneered, they reviled him] and retorted, You are His disciple yourself, but we are the disciples of Moses.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We know for certain that God spoke with Moses, but as for this Fellow, we know nothing about where He hails from.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus answered, It was not that this man or his parents sinned, but he was born blind in order that the workings of God should be manifested (displayed and illustrated) in him.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The man replied, Well, this is astonishing! Here a Man has opened my eyes, and yet you do not know where He comes from. [That is amazing!]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We know that God does not listen to sinners; but if anyone is God-fearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a worshiper of Him and does His will, He listens to him.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Since the beginning of time it has never been heard that anyone opened the eyes of a man born blind.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If this Man were not from God, He would not be able to do anything like this.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They retorted, You were wholly born in sin [from head to foot]; and do you [presume to] teach us? So they cast him out [threw him clear outside the synagogue].'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus heard that they had put him out, and meeting him He said, Do you believe in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adhere to the Son of Man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or the Son of God
    - type: text
      text: ' ?'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He answered, Who is He, Sir? Tell me, that I may believe in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adhere to Him.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus said to him, You have seen Him; [in fact] He is talking to you right now.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He called out, Lord, I believe! [I rely on, I trust, I cleave to You!] And he worshiped Him.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Jesus said, I came into this world for judgment [as a Separator, in order that there may be separation between those who believe on Me and those who reject Me], to make the sightless see and to make those who see become blind.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We must work the works of Him Who sent Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be busy with His business while it is daylight; night is coming on, when no man can work.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Some Pharisees who were near, hearing this remark, said to Him, Are we also blind?'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus said to them, If you were blind, you would have no sin; but because you now claim to have sight, your sin remains. [If you were blind, you would not be guilty of sin; but because you insist, We do see clearly, you are unable to escape your guilt.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As long as I am in the world, I am the world''s Light.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When He had said this, He spat on the ground and made clay (mud) with His saliva, and He spread it [as ointment] on the man''s eyes.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said to him, Go, wash in the Pool of Siloam–which means Sent. So he went and washed, and came back seeing.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When the neighbors and those who used to know him by sight as a beggar saw him, they said, Is not this the man who used to sit and beg?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Some said, It is he. Others said, No, but he looks very much like him. But he said, Yes, I am the man.'
