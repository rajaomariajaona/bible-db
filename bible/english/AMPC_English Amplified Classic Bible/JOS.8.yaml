document_id: JOS.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND THE Lord said to Joshua, Fear not nor be dismayed. Take all the men of war with you, and arise, go up to Ai; see, I have given into your hand the king of Ai, his people, his city, and his land.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Joshua rose up early in the morning and mustered the men, and went up with the elders of Israel before the warriors to Ai.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And all the fighting men who were with him went up and drew near before the city and encamped on the north side of [it], with a ravine between them and Ai.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And he took about five thousand men and set them in ambush between Bethel and Ai, west of the city.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' So they stationed all the army–the main encampment that was north of the city and their men in ambush behind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' on the west of the city–and Joshua went that night into the midst of the ravine.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' When the king [and people] of Ai saw it, they hastily rose early, and the men of the city went out against Israel to battle [at a time and place appointed] before the Arabah [plain]. But he did not know of the ambush against him behind the city.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And Joshua and all Israel pretended to be beaten by them, and fled toward the wilderness.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' So all the people in Ai were called together to pursue them, and they pursued Joshua and were drawn away from the city.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Not a man was left in Ai or Bethel who did not go out after Israel. Leaving the city open, they pursued Israel.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Then the Lord said to Joshua, Stretch out the javelin that is in your hand toward Ai, for I will give it into your hand. So Joshua stretched out the javelin in his hand toward the city.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The men in the ambush arose quickly out of their place and ran when he stretched out his hand; and they entered the city and took it, and then hastened and set it afire.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And you shall do to Ai and its king as you did to Jericho and its king, except that its spoil and its cattle [this time] you shall take as booty for yourselves. Lay an ambush against the city behind it.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' When the men of Ai looked back, behold, the smoke of the city went up to the heavens, and they had no power to flee this way or that way. Then the Israelites who fled to the wilderness turned back upon the pursuers.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' When Joshua and all Israel saw that the ambush had taken the city and that the smoke of the city went up, they turned again and slew the men of Ai.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And the others came forth out of the city against them [of Ai], so that they were in the midst of Israel, some on this side and some on that side. And [the Israelites] smote them, so that they let none of them remain or escape.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' But they took the king of Ai alive and brought him to Joshua.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' When Israel had finished slaying all the inhabitants of Ai in the field and in the wilderness into which they pursued them, and they were all fallen by the sword until they were consumed, then all the Israelites returned to Ai and smote it with the sword.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And all that fell that day, both men and women, were twelve thousand, including all the men of Ai.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' For Joshua drew not back his hand with which he stretched out the javelin until he had utterly destroyed all the inhabitants of Ai.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Only the livestock and the spoil of that city Israel took as booty for themselves, according to the word of the Lord which He commanded Joshua.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' So Joshua burned Ai and made it a heap of ruins for ever, even a desolation to this day.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And he hanged the king of Ai on a tree until evening; and at sunset, Joshua commanded and they took the body down from the tree and cast it at the entrance of the city gate and raised a great heap of stones over it that is there to this day.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So Joshua arose, and all the people of war, to go up against Ai; [he] chose thirty thousand mighty men of strength and sent them forth by night.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Then Joshua built an altar to the Lord, the God of Israel, on Mount Ebal,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' As Moses the servant of the Lord commanded the Israelites, as it is written in the Book of the Law of Moses, an altar of unhewn stones, upon which no man has lifted up an iron tool; and they offered on it burnt offerings to the Lord and sacrificed peace offerings.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And there, in the presence of the Israelites, [Joshua] wrote on the stones a copy of the law of Moses.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And all Israel, sojourner as well as he who was born among them, with their elders, officers, and judges, stood on either side of the ark before the Levitical priests who carried the ark of the covenant of the Lord, half of them in front of Mount Gerizim and half of them in front of Mount Ebal, as Moses the servant of the Lord had commanded before that they should bless the Israelites.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Afterward, Joshua read all the words of the law, the blessings and cursings, all that is written in the Book of the Law.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' There was not a word of all that Moses commanded which Joshua did not read before all the assembly of Israel, and the women, and little ones, and the foreigners who were living among them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And he commanded them, Behold, you shall lie in wait against the city behind it. Do not go very far from the city, but all of you be ready.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And I and all the people who are with me will approach the city. And when they come out against us, as the first time, we will flee before them'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Till we have drawn them from the city, for they will say, They are fleeing from us as before. So we will flee before them.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then you shall rise up from the ambush and seize the city, for the Lord your God will deliver it into your hand.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' When you have taken the city, you shall set it afire; as the Lord commanded, you shall do. See, I have commanded you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' So Joshua sent them forth, and they went to the place of ambush and remained between Bethel and Ai, on the west side of Ai; but Joshua lodged that night among the people.'
