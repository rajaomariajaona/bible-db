document_id: NUM.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW MIRIAM and Aaron talked against Moses [their brother] because of his Cushite wife, for he had married a Cushite woman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And they said, Has the Lord indeed spoken only by Moses? Has He not spoken also by us? And the Lord heard it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Now the man Moses was very meek (gentle, kind, and humble) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' above all the men on the face of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Suddenly the Lord said to Moses, Aaron, and Miriam, Come out, you three, to the Tent of Meeting. And the three of them came out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The Lord came down in a pillar of cloud, and stood at the Tent door and called Aaron and Miriam, and they came forward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And He said, Hear now My words: If there is a prophet among you, I the Lord make Myself known to him in a vision and speak to him in a dream.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But not so with My servant Moses; he is entrusted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful in all My house. [Heb. 3:2, 5, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' With him I speak mouth to mouth [directly], clearly and not in dark speeches; and he beholds the form of the Lord. Why then were you not afraid to speak against My servant Moses?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the anger of the Lord was kindled against them, and He departed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And when the cloud departed from over the Tent, behold, Miriam was leprous, as white as snow. And Aaron looked at Miriam, and, behold, she was leprous!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Aaron said to Moses, Oh, my lord, I plead with you, lay not the sin upon us in which we have done foolishly and in which we have sinned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Let her not be as one dead, already half decomposed when he comes out of his mother''s womb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Moses cried to the Lord, saying, Heal her now, O God, I beseech You!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the Lord said to Moses, If her father had but spit in her face, should she not be ashamed for seven days? Let her be shut up outside the camp for seven days, and after that let her be brought in again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So Miriam was shut up without the camp for seven days, and the people did not journey on until Miriam was brought in again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Afterward [they] removed from Hazeroth and encamped in the Wilderness of Paran.'
