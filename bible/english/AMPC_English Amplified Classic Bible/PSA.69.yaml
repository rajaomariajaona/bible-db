document_id: PSA.69,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; +[set to the tune of+] ``Lilies." +[A Psalm+] of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' SAVE ME, O God, for the waters have come up to my neck [they threaten my life].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' When I wept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humbled myself with fasting, I was jeered at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humiliated;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' When I made sackcloth my clothing, I became a byword (an object of scorn) to them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' They who sit in [the city''s] gate talk about me, and I am the song of the drunkards.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But as for me, my prayer is to You, O Lord. At an acceptable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' opportune time, O God, in the multitude of Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the abundance of Your loving-kindness hear me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in the truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness of Your salvation answer me.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Rescue me out of the mire, and let me not sink; let me be delivered from those who hate me and from out of the deep waters.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Let not the floodwaters overflow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overwhelm me, neither let the deep swallow me up nor the [dug] pit [with water perhaps in the bottom] close its mouth over me.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' answer me, O Lord, for Your loving-kindness is sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comforting; according to Your plenteous tender mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast love turn to me.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Hide not Your face from Your servant, for I am in distress; O answer me speedily!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Draw close to me and redeem me; ransom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set me free because of my enemies [lest they glory in my prolonged distress]!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' You know my reproach and my shame and my dishonor; my adversaries are all before You [fully known to You].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I sink in deep mire, where there is no foothold; I have come into deep waters, where the floods overwhelm me.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Insults '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproach have broken my heart; I am full of heaviness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I am distressingly sick. I looked for pity, but there was none, and for comforters, but I found none.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' They gave me also gall [poisonous and bitter] for my food, and in my thirst they gave me vinegar (a soured wine) to drink. [Matt. 27:34, 48.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Let their own table [with all its abundance and luxury] become a snare to them; and when they are secure in peace [or at their sacrificial feasts, let it become] a trap to them.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Let their eyes be darkened so that they cannot see, and make their loins tremble continually [from terror, dismay, and feebleness].'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Pour out Your indignation upon them, and let the fierceness of Your burning anger catch up with them.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Let their habitation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their encampment be a desolation; let no one dwell in their tents. [Matt. 23:38; Acts 1:20.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' For they pursue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persecute him whom You have smitten, and they gossip about those whom You have wounded, [adding] to their grief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pain.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Let one [unforgiven] perverseness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' iniquity accumulate upon another for them [in Your book], and let them not come into Your righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be justified and acquitted by You.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Let them be blotted out of the book of the living '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the book of life and not be enrolled among the [uncompromisingly] righteous (those upright and in right standing with God). [Rev. 3:4, 5; 20:12, 15; 21:27.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' But I am poor, sorrowful, and in pain; let Your salvation, O God, set me up on high.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' I am weary with my crying; my throat is parched; my eyes fail with waiting [hopefully] for my God.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' I will praise the name of God with a song and will magnify Him with thanksgiving,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And it will please the Lord better than an ox or a bullock that has horns and hoofs.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' The humble shall see it and be glad; you who seek God, inquiring for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' requiring Him [as your first need], let your hearts revive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' live! [Ps. 22:26; 42:1.]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' For the Lord hears the poor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' needy and despises not His prisoners (His miserable and wounded ones).'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Let heaven and earth praise Him, the seas and everything that moves in them.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' For God will save Zion and rebuild the cities of Judah; and [His servants] shall remain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dwell there and have it in their possession;'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' The children of His servants shall inherit it, and those who love His name shall dwell in it.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Those who hate me without cause are more than the hairs of my head; those who would cut me off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy me, being my enemies wrongfully, are many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mighty. I am [forced] to restore what I did not steal. [John 15:25.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' O God, You know my folly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blundering; my sins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my guilt are not hidden from You.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Let not those who wait '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' look for You, O Lord of hosts, be put to shame through me; let not those who seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inquire for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require You [as their vital necessity] be brought to confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dishonor through me, O God of Israel.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Because for Your sake I have borne taunt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproach; confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shame have covered my face.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I have become a stranger to my brethren, and an alien to my mother''s children. [John 7:3-5.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For zeal for Your house has eaten me up, and the reproaches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insults of those who reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insult You have fallen upon me. [John 2:17; Rom. 15:3.]'
