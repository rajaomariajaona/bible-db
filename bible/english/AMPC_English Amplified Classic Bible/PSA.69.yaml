document_id: PSA.69,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; +[set to the tune of+] ``Lilies." +[A Psalm+] of David.
  - type: text
    content: ' SAVE ME, O God, for the waters have come up to my neck [they threaten my life].'
  '10':
  - type: text
    content: ' When I wept '
  - type: text
    content: and
  - type: text
    content: ' humbled myself with fasting, I was jeered at '
  - type: text
    content: and
  - type: text
    content: ' humiliated;'
  '11':
  - type: text
    content: ' When I made sackcloth my clothing, I became a byword (an object of scorn) to them.'
  '12':
  - type: text
    content: ' They who sit in [the city''s] gate talk about me, and I am the song of the drunkards.'
  '13':
  - type: text
    content: ' But as for me, my prayer is to You, O Lord. At an acceptable '
  - type: text
    content: and
  - type: text
    content: ' opportune time, O God, in the multitude of Your mercy '
  - type: text
    content: and
  - type: text
    content: ' the abundance of Your loving-kindness hear me, '
  - type: text
    content: and
  - type: text
    content: ' in the truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness of Your salvation answer me.'
  '14':
  - type: text
    content: ' Rescue me out of the mire, and let me not sink; let me be delivered from those who hate me and from out of the deep waters.'
  '15':
  - type: text
    content: ' Let not the floodwaters overflow '
  - type: text
    content: and
  - type: text
    content: ' overwhelm me, neither let the deep swallow me up nor the [dug] pit [with water perhaps in the bottom] close its mouth over me.'
  '16':
  - type: text
    content: ' Hear '
  - type: text
    content: and
  - type: text
    content: ' answer me, O Lord, for Your loving-kindness is sweet '
  - type: text
    content: and
  - type: text
    content: ' comforting; according to Your plenteous tender mercy '
  - type: text
    content: and
  - type: text
    content: ' steadfast love turn to me.'
  '17':
  - type: text
    content: ' Hide not Your face from Your servant, for I am in distress; O answer me speedily!'
  '18':
  - type: text
    content: ' Draw close to me and redeem me; ransom '
  - type: text
    content: and
  - type: text
    content: ' set me free because of my enemies [lest they glory in my prolonged distress]!'
  '19':
  - type: text
    content: ' You know my reproach and my shame and my dishonor; my adversaries are all before You [fully known to You].'
  '2':
  - type: text
    content: ' I sink in deep mire, where there is no foothold; I have come into deep waters, where the floods overwhelm me.'
  '20':
  - type: text
    content: ' Insults '
  - type: text
    content: and
  - type: text
    content: ' reproach have broken my heart; I am full of heaviness '
  - type: text
    content: and
  - type: text
    content: ' I am distressingly sick. I looked for pity, but there was none, and for comforters, but I found none.'
  '21':
  - type: text
    content: ' They gave me also gall [poisonous and bitter] for my food, and in my thirst they gave me vinegar (a soured wine) to drink. [Matt. 27:34, 48.]'
  '22':
  - type: text
    content: ' Let their own table [with all its abundance and luxury] become a snare to them; and when they are secure in peace [or at their sacrificial feasts, let it become] a trap to them.'
  '23':
  - type: text
    content: ' Let their eyes be darkened so that they cannot see, and make their loins tremble continually [from terror, dismay, and feebleness].'
  '24':
  - type: text
    content: ' Pour out Your indignation upon them, and let the fierceness of Your burning anger catch up with them.'
  '25':
  - type: text
    content: ' Let their habitation '
  - type: text
    content: and
  - type: text
    content: ' their encampment be a desolation; let no one dwell in their tents. [Matt. 23:38; Acts 1:20.]'
  '26':
  - type: text
    content: ' For they pursue '
  - type: text
    content: and
  - type: text
    content: ' persecute him whom You have smitten, and they gossip about those whom You have wounded, [adding] to their grief '
  - type: text
    content: and
  - type: text
    content: ' pain.'
  '27':
  - type: text
    content: ' Let one [unforgiven] perverseness '
  - type: text
    content: and
  - type: text
    content: ' iniquity accumulate upon another for them [in Your book], and let them not come into Your righteousness '
  - type: text
    content: or
  - type: text
    content: ' be justified and acquitted by You.'
  '28':
  - type: text
    content: ' Let them be blotted out of the book of the living '
  - type: text
    content: and
  - type: text
    content: ' the book of life and not be enrolled among the [uncompromisingly] righteous (those upright and in right standing with God). [Rev. 3:4, 5; 20:12, 15; 21:27.]'
  '29':
  - type: text
    content: ' But I am poor, sorrowful, and in pain; let Your salvation, O God, set me up on high.'
  '3':
  - type: text
    content: ' I am weary with my crying; my throat is parched; my eyes fail with waiting [hopefully] for my God.'
  '30':
  - type: text
    content: ' I will praise the name of God with a song and will magnify Him with thanksgiving,'
  '31':
  - type: text
    content: ' And it will please the Lord better than an ox or a bullock that has horns and hoofs.'
  '32':
  - type: text
    content: ' The humble shall see it and be glad; you who seek God, inquiring for '
  - type: text
    content: and
  - type: text
    content: ' requiring Him [as your first need], let your hearts revive '
  - type: text
    content: and
  - type: text
    content: ' live! [Ps. 22:26; 42:1.]'
  '33':
  - type: text
    content: ' For the Lord hears the poor '
  - type: text
    content: and
  - type: text
    content: ' needy and despises not His prisoners (His miserable and wounded ones).'
  '34':
  - type: text
    content: ' Let heaven and earth praise Him, the seas and everything that moves in them.'
  '35':
  - type: text
    content: ' For God will save Zion and rebuild the cities of Judah; and [His servants] shall remain '
  - type: text
    content: and
  - type: text
    content: ' dwell there and have it in their possession;'
  '36':
  - type: text
    content: ' The children of His servants shall inherit it, and those who love His name shall dwell in it.'
  '4':
  - type: text
    content: ' Those who hate me without cause are more than the hairs of my head; those who would cut me off '
  - type: text
    content: and
  - type: text
    content: ' destroy me, being my enemies wrongfully, are many '
  - type: text
    content: and
  - type: text
    content: ' mighty. I am [forced] to restore what I did not steal. [John 15:25.]'
  '5':
  - type: text
    content: ' O God, You know my folly '
  - type: text
    content: and
  - type: text
    content: ' blundering; my sins '
  - type: text
    content: and
  - type: text
    content: ' my guilt are not hidden from You.'
  '6':
  - type: text
    content: ' Let not those who wait '
  - type: text
    content: and
  - type: text
    content: ' hope '
  - type: text
    content: and
  - type: text
    content: ' look for You, O Lord of hosts, be put to shame through me; let not those who seek '
  - type: text
    content: and
  - type: text
    content: ' inquire for '
  - type: text
    content: and
  - type: text
    content: ' require You [as their vital necessity] be brought to confusion '
  - type: text
    content: and
  - type: text
    content: ' dishonor through me, O God of Israel.'
  '7':
  - type: text
    content: ' Because for Your sake I have borne taunt '
  - type: text
    content: and
  - type: text
    content: ' reproach; confusion '
  - type: text
    content: and
  - type: text
    content: ' shame have covered my face.'
  '8':
  - type: text
    content: ' I have become a stranger to my brethren, and an alien to my mother''s children. [John 7:3-5.]'
  '9':
  - type: text
    content: ' For zeal for Your house has eaten me up, and the reproaches '
  - type: text
    content: and
  - type: text
    content: ' insults of those who reproach '
  - type: text
    content: and
  - type: text
    content: ' insult You have fallen upon me. [John 2:17; Rom. 15:3.]'
