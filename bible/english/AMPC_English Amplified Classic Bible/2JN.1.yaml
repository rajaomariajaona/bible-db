document_id: 2JN.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE ELDERLY elder [of the church addresses this letter] to the elect (chosen) lady (Cyria) and her children, whom I truly love–and not only I but also all who are [progressively] learning to recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand the Truth–'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' If anyone comes to you and does not bring this doctrine [is disloyal to what Jesus Christ taught], do not receive him [do not accept him, do not welcome or admit him] into [your] house or bid him Godspeed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' give him any encouragement.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For he who wishes him success [who encourages him, wishing him Godspeed] is a partaker in his evil doings.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' I have many things to write to you, but I prefer not to do so with paper and ink; I hope to come to see you and talk with you face to face, so that our joy may be complete.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The children of your elect (chosen) sister wish to be remembered to you. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen (so be it).
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Because of the Truth which lives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stays on in our hearts and will be with us forever:'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Grace (spiritual blessing), mercy, and [soul] peace will be with us, from God the Father and from Jesus Christ (the Messiah), the Father''s Son, in all sincerity (truth) and love.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' I was greatly delighted to find some of your children walking (living) in [the] Truth, just as we have been commanded by the Father [Himself].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And now I beg you, lady (Cyria), not as if I were issuing a new charge (injunction or command), but [simply recalling to your mind] the one we have had from the beginning, that we love one another.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And what this love consists in is this: that we live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' walk in accordance with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guided by His commandments (His orders, ordinances, precepts, teaching). This is the commandment, as you have heard from the beginning, that you continue to walk in love [guided by it and following it].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For many imposters (seducers, deceivers, and false leaders) have gone out into the world, men who will not acknowledge (confess, admit) the coming of Jesus Christ (the Messiah) in bodily form. Such a one is the imposter (the seducer, the deceiver, the false leader, the antagonist of Christ) and the antichrist.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Look to yourselves (take care) that you may not lose (throw away or destroy) all that we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' you have labored for, but that you may [persevere until you] win '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' receive back a perfect reward [in full].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Anyone who runs on ahead [of God] and does not abide in the doctrine of Christ [who is not content with what He taught] does not have God; but he who continues to live in the doctrine (teaching) of Christ [does have God], he has both the Father and the Son.'
