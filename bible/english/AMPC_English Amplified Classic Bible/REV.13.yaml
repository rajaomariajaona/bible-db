document_id: REV.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' [AS] I stood on the sandy beach, I saw a beast coming up out of the sea with ten horns and seven heads. On his horns he had ten royal crowns (diadems) and blasphemous titles (names) on his heads.'
  '10':
  - type: text
    content: ' Whoever leads into captivity will himself go into captivity; if anyone slays with the sword, with the sword must he be slain. Herein is [the call for] the patience and the faith '
  - type: text
    content: and
  - type: text
    content: ' fidelity of the saints (God''s people). [Jer. 15:2.]'
  '11':
  - type: text
    content: ' Then I saw another beast rising up out of the land [itself]; he had two horns like a lamb, and he spoke (roared) like a dragon.'
  '12':
  - type: text
    content: ' He exerts all the power '
  - type: text
    content: and
  - type: text
    content: ' right of control of the former beast in his presence, and causes the earth and those who dwell upon it to exalt '
  - type: text
    content: and
  - type: text
    content: ' deify the first beast, whose deadly wound was healed, '
  - type: text
    content: and
  - type: text
    content: ' to worship him.'
  '13':
  - type: text
    content: ' He performs great signs (startling miracles), even making fire fall from the sky to the earth in men''s sight.'
  '14':
  - type: text
    content: ' And because of the signs (miracles) which he is allowed to perform in the presence of the [first] beast, he deceives those who inhabit the earth, commanding them to erect a statue (an image) in the likeness of the beast who was wounded by the [small] sword and still lived. [Deut. 13:1-5.]'
  '15':
  - type: text
    content: ' And he is permitted [also] to impart the breath of life into the beast''s image, so that the statue of the beast could actually talk and cause to be put to death those who would not bow down '
  - type: text
    content: and
  - type: text
    content: ' worship the image of the beast. [Dan. 3:5.]'
  '16':
  - type: text
    content: ' Also he compels all [alike], both small and great, both the rich and the poor, both free and slave, to be marked with an inscription [stamped] on their right hands or on their foreheads,'
  '17':
  - type: text
    content: ' So that no one will have power to buy or sell unless he bears the stamp (mark, inscription), [that is] the name of the beast or the number of his name.'
  '18':
  - type: text
    content: ' Here is [room for] discernment [a call for the wisdom of interpretation]. Let anyone who has intelligence (penetration and insight enough) calculate the number of the beast, for it is a human number [the number of a certain man]; his number is 666.'
  '2':
  - type: text
    content: ' And the beast that I saw resembled a leopard, but his feet were like those of a bear and his mouth was like that of a lion. And to him the dragon gave his [own] might '
  - type: text
    content: and
  - type: text
    content: ' power and his [own] throne and great dominion.'
  '3':
  - type: text
    content: ' And one of his heads seemed to have a deadly wound. But his death stroke was healed; and the whole earth went after the beast in amazement '
  - type: text
    content: and
  - type: text
    content: ' admiration.'
  '4':
  - type: text
    content: ' They fell down '
  - type: text
    content: and
  - type: text
    content: ' paid homage to the dragon, because he had bestowed on the beast all his dominion '
  - type: text
    content: and
  - type: text
    content: ' authority; they also praised '
  - type: text
    content: and
  - type: text
    content: ' worshiped the beast, exclaiming, Who is a match for the beast, and, Who can make war against him?'
  '5':
  - type: text
    content: ' And the beast was given the power of speech, uttering boastful and blasphemous words, and he was given freedom to exert his authority '
  - type: text
    content: and
  - type: text
    content: ' to exercise his will during forty-two months (three and a half years). [Dan. 7:8.]'
  '6':
  - type: text
    content: ' And he opened his mouth to speak slanders against God, blaspheming His name and His abode, [even vilifying] those who live in heaven.'
  '7':
  - type: text
    content: ' He was further permitted to wage war on God''s holy people (the saints) and to overcome them. And power was given him to extend his authority over every tribe and people and tongue and nation, [Dan. 7:21, 25.]'
  '8':
  - type: text
    content: ' And all the inhabitants of the earth will fall down in adoration '
  - type: text
    content: and
  - type: text
    content: ' pay him homage, everyone whose name has not been recorded in the Book of Life of the Lamb that was slain [in sacrifice] from the foundation of the world.'
  '9':
  - type: text
    content: ' If anyone is able to hear, let him listen:'
