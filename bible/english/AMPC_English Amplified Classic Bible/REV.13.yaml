document_id: REV.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' [AS] I stood on the sandy beach, I saw a beast coming up out of the sea with ten horns and seven heads. On his horns he had ten royal crowns (diadems) and blasphemous titles (names) on his heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the beast that I saw resembled a leopard, but his feet were like those of a bear and his mouth was like that of a lion. And to him the dragon gave his [own] might '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power and his [own] throne and great dominion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And one of his heads seemed to have a deadly wound. But his death stroke was healed; and the whole earth went after the beast in amazement '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admiration.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They fell down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' paid homage to the dragon, because he had bestowed on the beast all his dominion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority; they also praised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshiped the beast, exclaiming, Who is a match for the beast, and, Who can make war against him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the beast was given the power of speech, uttering boastful and blasphemous words, and he was given freedom to exert his authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to exercise his will during forty-two months (three and a half years). [Dan. 7:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he opened his mouth to speak slanders against God, blaspheming His name and His abode, [even vilifying] those who live in heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He was further permitted to wage war on God''s holy people (the saints) and to overcome them. And power was given him to extend his authority over every tribe and people and tongue and nation, [Dan. 7:21, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And all the inhabitants of the earth will fall down in adoration '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay him homage, everyone whose name has not been recorded in the Book of Life of the Lamb that was slain [in sacrifice] from the foundation of the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' If anyone is able to hear, let him listen:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Whoever leads into captivity will himself go into captivity; if anyone slays with the sword, with the sword must he be slain. Herein is [the call for] the patience and the faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fidelity of the saints (God''s people). [Jer. 15:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then I saw another beast rising up out of the land [itself]; he had two horns like a lamb, and he spoke (roared) like a dragon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He exerts all the power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right of control of the former beast in his presence, and causes the earth and those who dwell upon it to exalt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deify the first beast, whose deadly wound was healed, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to worship him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He performs great signs (startling miracles), even making fire fall from the sky to the earth in men''s sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And because of the signs (miracles) which he is allowed to perform in the presence of the [first] beast, he deceives those who inhabit the earth, commanding them to erect a statue (an image) in the likeness of the beast who was wounded by the [small] sword and still lived. [Deut. 13:1-5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And he is permitted [also] to impart the breath of life into the beast''s image, so that the statue of the beast could actually talk and cause to be put to death those who would not bow down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship the image of the beast. [Dan. 3:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Also he compels all [alike], both small and great, both the rich and the poor, both free and slave, to be marked with an inscription [stamped] on their right hands or on their foreheads,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So that no one will have power to buy or sell unless he bears the stamp (mark, inscription), [that is] the name of the beast or the number of his name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Here is [room for] discernment [a call for the wisdom of interpretation]. Let anyone who has intelligence (penetration and insight enough) calculate the number of the beast, for it is a human number [the number of a certain man]; his number is 666.'
