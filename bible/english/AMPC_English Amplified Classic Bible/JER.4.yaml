document_id: JER.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IF YOU will return, O Israel, says the Lord, if you will return to Me, and if you will put away your abominable false gods out of My sight and not stray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' waver,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And if you swear, As the Lord lives, in truth, in judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice, and in righteousness (uprightness in every area and relation), then the nations will bless themselves in Him and in Him will they glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For thus says the Lord to the men of Judah and to Jerusalem: Break up your ground left uncultivated for a season, so that you may not sow among thorns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Circumcise yourselves to the Lord and take away the foreskins of your hearts, you men of Judah and inhabitants of Jerusalem, lest My wrath go forth like fire [consuming all that gets in its way] and burn so that no one can quench it because of the evil of your doings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Declare in Judah and publish in Jerusalem and say: Blow the trumpet in the land; cry aloud and say: Assemble yourselves, and let us go into the fortified cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Raise a standard toward Zion [to mark out the safest route to those seeking safety within Jerusalem''s walls]! Flee for safety, stay not, for I bring evil from the north, and great destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' A lion has gone up from his thicket, and a destroyer of nations is on his way. He has gone forth from his place to make your land a desolate waste; and your cities shall be left in ruins without an inhabitant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For this, gird yourselves with sackcloth, lament and wail, for the fierce anger of the Lord has not turned back from us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And it shall be in that day, says the Lord, that the understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' courage of the king shall fail (be paralyzed), and also that of the princes; the priests shall be appalled and the prophets astounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dazed with horror.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then I [Jeremiah] said, Alas, Lord God! Surely You have greatly deceived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' misled this people and Jerusalem, [for the prophets represented You as] saying [to Your people], You shall have peace, whereas the sword has reached to [their very] life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' At that time it will be said to this people and to Jerusalem, A hot wind from the bare heights in the wilderness [comes at My command] against the daughter of My people–not [a wind] to fan or cleanse [from chaff, as when threshing, but]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' A wind too strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' full for winnowing comes at My word. Now I will also speak in judgment against [My people].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Behold, [the enemy] comes up like clouds, his chariots like the whirlwind; his horses are swifter than eagles. Woe to us, for we are ruined (destroyed)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' O Jerusalem, wash your heart from wickedness, that you may be saved! How long shall your iniquitous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grossly offensive thoughts lodge within you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For a voice declares from Dan [in the north] and proclaims evil from Mount Ephraim [the range dividing Israel from Judah].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Warn the [neighboring] nations [that our adversary is coming]; announce to Jerusalem that besiegers are coming from a far country, and they shout against the cities of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Like keepers of a field they are against her round about, because she has been rebellious against Me, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Your ways and your doings have brought these things upon you. This is your calamity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doom; surely it is bitter, for surely it reaches your very heart!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [It is not only the prophet but also the people who cry out in their thoughts] My anguish, my anguish! I writhe in pain! Oh, the walls of my heart! My heart is disquieted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' throbs aloud within me; I cannot be silent! For I have heard the sound of the trumpet, the alarm of war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' News of one violent disaster '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calamity comes close after another, for the whole land is laid waste; suddenly are my tents spoiled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed, and my [tent] curtains ruined in a moment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' [O Lord] how long must I see the flag [marking the route for flight] and hear the sound of the trumpet [urging the people to flee for refuge]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' [Their chastisement will continue until it has accomplished its purpose] for My people are stupid, says the Lord [replying to Jeremiah]; they do not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand Me. They are thickheaded children, and they have no understanding. They are wise to do evil, but to do good they have no knowledge [and know not how].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' [In a vision Jeremiah sees Judah laid waste by conquest and captivity.] I looked at the land, and behold, it was [as at the time of creation] waste and vacant (void); and at the heavens, and they had no light.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' I looked at the mountains, and behold, they trembled, and all the hills moved lightly to and fro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' I looked, and behold, there was no man, and all the birds of the air had fled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' I looked, and behold, the fruitful land was a desert, and all its cities were laid waste before the Lord''s presence, before His fierce anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For thus says the Lord: The whole land will be a desolation, yet I will not make a full '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete end of it. [Jer. 5:10, 18; 30:11; 46:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For this will the earth mourn and the heavens above be black; because I have spoken, I have purposed, and I will not relent, nor will I turn back [from it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Every city flees because of the noise of the horsemen and bowmen. They go into the thickets and climb among the rocks; every city is forsaken, and not a man dwells in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And you [plundered one], when you are made desolate, what will you do? Though you clothe yourself with scarlet, though you deck yourself with ornaments of gold, though you paint your eyelids '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make them look farther apart, in vain you beautify yourself. Your lovers (allies) despise you; they seek your life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' For I have heard a cry as of a woman in travail, the anguish as of one who brings forth her first child–the cry of the Daughter of Zion, who gasps for breath, who spreads her hands, saying, Woe is me now! I am fainting before the murderers.'
