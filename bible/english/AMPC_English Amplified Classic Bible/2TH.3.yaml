document_id: 2TH.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FURTHERMORE, BRETHREN, do pray for us, that the Word of the Lord may speed on (spread rapidly and run its course) and be glorified (extolled) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' triumph, even as [it has done] with you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And that we may be delivered from perverse (improper, unrighteous) and wicked (actively malicious) men, for not everybody has faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is held by it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Yet the Lord is faithful, and He will strengthen [you] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set you on a firm foundation and guard you from the evil [one].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And we have confidence in the Lord concerning you, that you are doing and will continue to do the things which we suggest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with which we charge you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' May the Lord direct your hearts into [realizing and showing] the love of God and into the steadfastness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patience of Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in waiting for His return.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now we charge you, brethren, in the name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on the authority of our Lord Jesus Christ (the Messiah) that you withdraw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep away from every brother (fellow believer) who is slack in the performance of duty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is disorderly, living as a shirker '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' not walking in accord with the traditions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instructions that you have received from us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For you yourselves know how it is necessary to imitate our example, for we were not disorderly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' shirking of duty when we were with you [we were not idle].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Nor did we eat anyone''s bread without paying for it, but with toil and struggle we worked night and day, that we might not be a burden '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' impose on any of you [for our support].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' [It was] not because we do not have a right [to such support], but [we wished] to make ourselves an example for you to follow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For while we were yet with you, we gave you this rule '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' charge: If anyone will not work, neither let him eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Indeed, we hear that some among you are disorderly [that they are passing their lives in idleness, neglectful of duty], being busy with other people''s affairs instead of their own and doing no work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now we charge and exhort such persons [as ministers in Him exhorting those] in the Lord Jesus Christ (the Messiah) that they work in quietness and earn their own food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' other necessities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And as for you, brethren, do not become weary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' lose heart in doing right [but continue in well-doing without weakening].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But if anyone [in the church] refuses to obey what we say in this letter, take note of that person and do not associate with him, so that he may be ashamed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Do not regard him as an enemy, but simply admonish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warn him as [being still] a brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Now may the Lord of peace Himself grant you His peace (the peace of His kingdom) at all times and in all ways [under all circumstances and conditions, whatever comes]. The Lord [be] with you all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I, Paul, write you this final greeting with my own hand. This is the mark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sign [that it is not a forgery] in every letter of mine. It is the way I write [my handwriting and signature].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The grace (spiritual blessing and favor) of our Lord Jesus Christ (the Messiah) be with you all. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
