document_id: ISA.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WOE TO those who go down to Egypt for help, who rely on horses and trust in chariots because they are many and in horsemen because they are very strong, but they look not to the Holy One of Israel, nor seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consult the Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And yet He is wise and brings calamity and does not retract His words; He will arise against the house (the whole race) of evildoers and against the helpers of those who work iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Now the Egyptians are men and not God, and their horses are flesh and not spirit; and when the Lord stretches out His hand, both [Egypt] who helps will stumble, and [Judah] who is helped will fall, and they will all perish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be consumed together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For the Lord has said to me, As the lion or the young lion growls over his prey–and though a large band of shepherds is called out against him, he will not be terrified at their voice or daunted at their noise–so the Lord of hosts will come down to fight upon Mount Zion and upon its hills.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Like birds hovering, so will the Lord of hosts defend Jerusalem; He will protect and deliver it, He will pass over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spare and preserve it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Return, O children of Israel, to Him against Whom you have so deeply plunged into revolt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For in that day every man of you will cast away [in contempt and disgust] his idols of silver and his idols of gold, which your own hands have sinfully made for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then the Assyrian shall fall by a sword not of man; and a sword, not of men [but of God], shall devour him. And he shall flee from the sword, and his young men shall be subjected to forced labor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' [In his flight] he shall pass beyond his rock [refuge and stronghold] because of terror; even his officers shall desert the standard in fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' panic, says the Lord, Whose fire is in Zion and Whose furnace is in Jerusalem.'
