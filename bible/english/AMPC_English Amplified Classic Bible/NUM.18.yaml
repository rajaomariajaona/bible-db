document_id: NUM.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Aaron, You and your sons and your father''s house with you shall bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remove the iniquity of the sanctuary [that is, the guilt for the offenses which the people unknowingly commit when brought into contact with the manifestations of God''s presence]. And you and your sons with you shall bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remove the iniquity of your priesthood [your own unintentional offenses].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And your brethren also of the tribe of Levi, the tribe of your [fore]father, bring with you, that they may be joined to you and minister to you; but only you and your sons with you shall come before the Tent of the Testimony [into the Holy Place where only priests may go and into the Most Holy Place which only the high priest dares enter].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the Levites shall attend you [as servants] and attend to all the duties of the Tent; only they shall not come near the sacred vessels of the sanctuary or to the brazen altar, that they and also you [Aaron] die not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And they shall be joined to you and attend to the duties of the Tent of Meeting–all the [menial] service of the Tent–and no stranger [no layman, anyone who is not a Levite] shall come near you [Aaron and your sons].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And you shall attend to the duties of the sanctuary and attend to the altar [of burnt offering and the altar of incense], that there be no wrath any more upon the Israelites [as in the incident of Korah, Dathan, and Abiram]. [Num. 16:42-50.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And I, behold, I have taken your brethren the Levites from among the Israelites; to you they are a gift, given to the Lord, to do the [menial] service of the Tent of Meeting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore you and your sons with you shall attend to your priesthood for everything of the altar [of burnt offering and the altar of incense] and [of the Holy of Holies] within the veil, and you shall serve. I give you your priesthood as a service of gift. And the stranger [anyone other than Moses or your sons, Aaron] who comes near shall be put to death. [Exod. 40:18, 20, 26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Lord said to Aaron, And I, behold, I have given you the charge of My heave offerings [whatever is taken out and kept of the offerings made to Me], all the dedicated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consecrated things of the Israelites; to you have I given them [as your portion] and to your sons as a continual allowance forever by reason of your anointing as priests. [Lev. 7:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' This shall be yours of the most holy things, reserved from the fire: every offering of the people, every cereal offering and sin offering and trespass offering of theirs, which they shall render to Me, shall be most holy for you [Aaron] and for your sons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' As the most holy thing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in a sacred place shall you eat of it; every male [of your house] shall eat of it. It shall be holy to you. [Lev. 22:10-16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And this also is yours: the heave offering of their gift, with all the wave offerings of the Israelites. I have given them to you and to your sons and to your daughters with you as a continual allowance forever; everyone in your house who is [ceremonially] clean may eat of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' All the best of the oil, and all the best of the [fresh] wine and of the grain, the firstfruits of what they give to the Lord, to you have I given them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Whatever is first ripe in the land, which they bring to the Lord, shall be yours. Everyone who is [ceremonially] clean in your house may eat of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Every devoted thing in Israel [everything that has been vowed to the Lord] shall be yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Everything that first opens the womb in all flesh, which they bring to the Lord, whether it be of men or beasts, shall be yours. Nevertheless the firstborn of man you shall surely redeem, and the firstling of unclean beasts you shall redeem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And those that are to be redeemed of them, from a month old shall you redeem, according to your estimate [of their age], for the fixed price of five shekels in silver, according to the shekel of the sanctuary, which is twenty gerahs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But the firstling of a cow or of a sheep or of a goat you shall not redeem. They [as the firstborn of clean beasts belong to God and] are holy. You shall sprinkle their blood upon the altar and shall burn their fat for an offering made by fire, for a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing odor to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the flesh of them shall be yours, as the wave breast and as the right shoulder are yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' All the heave offerings [the lifted-out and kept portions] of the holy things which the Israelites give to the Lord I give to you and to your sons and your daughters with you, as a continual debt forever. It is a covenant of salt [that cannot be dissolved or violated] forever before the Lord for you [Aaron] and for your posterity with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the Lord said to Aaron, You shall have no inheritance in the land [of the Israelites], neither shall you have any part among them. I am your portion and your inheritance among the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And, behold, I have given the Levites all the tithes in Israel for an inheritance in return for their service which they serve, the [menial] service of the Tent of Meeting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Henceforth the Israelites shall not come near the Tent of Meeting [the covered sanctuary, the Holy Place, and the Holy of Holies], lest they incur guilt and die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But the Levites shall do the [menial] service of the Tent of Meeting, and they shall bear and remove the iniquity of the people [that is, be answerable for the legal pollutions of the holy things and offer the necessary atonements for unintentional offenses in these matters]. It shall be a statute forever in all your generations, that among the Israelites the Levites have no inheritance [of land].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But the tithes of the Israelites, which they present as an offering to the Lord, I have given to the Levites to inherit; therefore I have said to them, Among the Israelites they shall have no inheritance. [They have homes and cities and pasturage to use but not to possess as their personal inheritance.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Moreover, you shall say to the Levites, When you take from the Israelites the tithe which I have given you from them for your inheritance, then you shall present an offering from it to the Lord, even a tenth of the tithe [paid by the people].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And what you lift out and keep [your heave offering] shall be credited to you as though it were the grain of the threshing floor or as the fully ripe produce of the vine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Likewise you shall also present an offering to the Lord of all your tithes which you receive from the Israelites; and therefore you shall give this heave offering [lifted out and kept] for the Lord to Aaron the priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Out of all the gifts to you, you shall present every offering due to the Lord, of all the best of it, even the hallowed part lifted out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' held back out of it [for the Levites].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Therefore you shall say to them, When you have lifted out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' held back the best from it [and presented it to the Lord by giving it to yourselves, the Levites], then it shall be counted to [you] the Levites just as if it were the increase of the threshing floor or of the winepress.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And you may eat it in every place, you and your households, for it is your reward for your service in the Tent of Meeting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And you shall be guilty of no sin by reason of it when you have lifted out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' held back the best of it; neither shall you have polluted the holy things of the Israelites, neither shall you die [because of it].'
