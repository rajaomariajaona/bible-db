document_id: JHN.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I ASSURE you, most solemnly I tell you, he who does not enter by the door into the sheepfold, but climbs up some other way (elsewhere, from some other quarter) is a thief and a robber.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But he who enters by the door is the shepherd of the sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The watchman opens the door for this man, and the sheep listen to his voice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed it; and he calls his own sheep by name and brings (leads) them out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When he has brought his own sheep outside, he walks on before them, and the sheep follow him because they know his voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They will never [on any account] follow a stranger, but will run away from him because they do not know the voice of strangers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' recognize their call.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Jesus used this parable (illustration) with them, but they did not understand what He was talking about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So Jesus said again, I assure you, most solemnly I tell you, that I Myself am the Door for the sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' All others who came [as such] before Me are thieves and robbers, but the [true] sheep did not listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I am the Door; anyone who enters in through Me will be saved (will live). He will come in and he will go out [freely], and will find pasture.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The thief comes only in order to steal and kill and destroy. I came that they may have '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enjoy life, and have it in abundance (to the full, till it overflows).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I am the Good Shepherd. The Good Shepherd risks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lays down His [own] life for the sheep. [Ps. 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But the hired servant (he who merely serves for wages) who is neither the shepherd nor the owner of the sheep, when he sees the wolf coming, deserts the flock and runs away. And the wolf chases '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' snatches them and scatters [the flock].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Now the hireling flees because he merely serves for wages and is not himself concerned about the sheep [cares nothing for them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I am the Good Shepherd; and I know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize My own, and My own know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize Me–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Even as [truly as] the Father knows Me and I also know the Father–and I am giving My [very own] life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' laying it down on behalf of the sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And I have other sheep [beside these] that are not of this fold. I must bring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impel those also; and they will listen to My voice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed My call, and so there will be [they will become] one flock under one Shepherd. [Ezek. 34:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For this [reason] the Father loves Me, because I lay down My [own] life–to take it back again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' No one takes it away from Me. On the contrary, I lay it down voluntarily. [I put it from Myself.] I am authorized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have power to lay it down (to resign it) and I am authorized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have power to take it back again. These are the instructions (orders) which I have received [as My charge] from My Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then a fresh division of opinion arose among the Jews because of His saying these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And many of them said, He has a demon and He is mad (insane–He raves, He rambles). Why do you listen to Him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Others argued, These are not the thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the language of one possessed. Can a demon-possessed person open blind eyes?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' After this the Feast of Dedication [of the reconsecration of the temple] was taking place at Jerusalem. It was winter,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And Jesus was walking in Solomon''s Porch in the temple area.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So the Jews surrounded Him and began asking Him, How long are You going to keep us in doubt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suspense? If You are really the Christ (the Messiah), tell us so plainly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' openly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Jesus answered them, I have told you so, yet you do not believe Me [you do not trust Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on Me]. The very works that I do by the power of My Father '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in My Father''s name bear witness concerning Me [they are My credentials and evidence in support of Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But you do not believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on Me because you do not belong to My fold [you are no sheep of Mine].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The sheep that are My own hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are listening to My voice; and I know them, and they follow Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And I give them eternal life, and they shall never lose it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' perish throughout the ages. [To all eternity they shall never by any means be destroyed.] And no one is able to snatch them out of My hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' My Father, Who has given them to Me, is greater '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mightier than all [else]; and no one is able to snatch [them] out of the Father''s hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' I and the Father are One.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Again the Jews brought up stones to stone Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Jesus said to them, My Father has enabled Me to do many good deeds. [I have shown many acts of mercy in your presence.] For which of these do you mean to stone Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' The Jews replied, We are not going to stone You for a good act, but for blasphemy, because You, a mere Man, make Yourself [out to be] God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Jesus answered, Is it not written in your Law, I said, You are gods? [Ps. 82:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' So men are called gods [by the Law], men to whom God''s message came–and the Scripture cannot be set aside '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cancelled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' broken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' annulled–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' [If that is true] do you say of the One Whom the Father consecrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dedicated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set apart for Himself and sent into the world, You are blaspheming, because I said, I am the Son of God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' If I am not doing the works [performing the deeds] of My Father, then do not believe Me [do not adhere to Me and trust Me and rely on Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But if I do them, even though you do not believe Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' have faith in Me, [at least] believe the works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have faith in what I do, in order that you may know and understand [clearly] that the Father is in Me, and I am in the Father [One with Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' They sought again to arrest Him, but He escaped from their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' He went back again across the Jordan to the locality where John was when he first baptized, and there He remained.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And many came to Him, and they kept saying, John did not perform a [single] sign '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' miracle, but everything John said about this Man was true.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And many [people] there became believers in Him. [They adhered to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusted in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relied on Him.]'
