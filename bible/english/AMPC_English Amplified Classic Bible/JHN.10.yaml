document_id: JHN.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' I ASSURE you, most solemnly I tell you, he who does not enter by the door into the sheepfold, but climbs up some other way (elsewhere, from some other quarter) is a thief and a robber.'
  '10':
  - type: text
    content: ' The thief comes only in order to steal and kill and destroy. I came that they may have '
  - type: text
    content: and
  - type: text
    content: ' enjoy life, and have it in abundance (to the full, till it overflows).'
  '11':
  - type: text
    content: ' I am the Good Shepherd. The Good Shepherd risks '
  - type: text
    content: and
  - type: text
    content: ' lays down His [own] life for the sheep. [Ps. 23.]'
  '12':
  - type: text
    content: ' But the hired servant (he who merely serves for wages) who is neither the shepherd nor the owner of the sheep, when he sees the wolf coming, deserts the flock and runs away. And the wolf chases '
  - type: text
    content: and
  - type: text
    content: ' snatches them and scatters [the flock].'
  '13':
  - type: text
    content: ' Now the hireling flees because he merely serves for wages and is not himself concerned about the sheep [cares nothing for them].'
  '14':
  - type: text
    content: ' I am the Good Shepherd; and I know '
  - type: text
    content: and
  - type: text
    content: ' recognize My own, and My own know '
  - type: text
    content: and
  - type: text
    content: ' recognize Me–'
  '15':
  - type: text
    content: ' Even as [truly as] the Father knows Me and I also know the Father–and I am giving My [very own] life '
  - type: text
    content: and
  - type: text
    content: ' laying it down on behalf of the sheep.'
  '16':
  - type: text
    content: ' And I have other sheep [beside these] that are not of this fold. I must bring '
  - type: text
    content: and
  - type: text
    content: ' impel those also; and they will listen to My voice '
  - type: text
    content: and
  - type: text
    content: ' heed My call, and so there will be [they will become] one flock under one Shepherd. [Ezek. 34:23.]'
  '17':
  - type: text
    content: ' For this [reason] the Father loves Me, because I lay down My [own] life–to take it back again.'
  '18':
  - type: text
    content: ' No one takes it away from Me. On the contrary, I lay it down voluntarily. [I put it from Myself.] I am authorized '
  - type: text
    content: and
  - type: text
    content: ' have power to lay it down (to resign it) and I am authorized '
  - type: text
    content: and
  - type: text
    content: ' have power to take it back again. These are the instructions (orders) which I have received [as My charge] from My Father.'
  '19':
  - type: text
    content: ' Then a fresh division of opinion arose among the Jews because of His saying these things.'
  '2':
  - type: text
    content: ' But he who enters by the door is the shepherd of the sheep.'
  '20':
  - type: text
    content: ' And many of them said, He has a demon and He is mad (insane–He raves, He rambles). Why do you listen to Him?'
  '21':
  - type: text
    content: ' Others argued, These are not the thoughts '
  - type: text
    content: and
  - type: text
    content: ' the language of one possessed. Can a demon-possessed person open blind eyes?'
  '22':
  - type: text
    content: ' After this the Feast of Dedication [of the reconsecration of the temple] was taking place at Jerusalem. It was winter,'
  '23':
  - type: text
    content: ' And Jesus was walking in Solomon''s Porch in the temple area.'
  '24':
  - type: text
    content: ' So the Jews surrounded Him and began asking Him, How long are You going to keep us in doubt '
  - type: text
    content: and
  - type: text
    content: ' suspense? If You are really the Christ (the Messiah), tell us so plainly '
  - type: text
    content: and
  - type: text
    content: ' openly.'
  '25':
  - type: text
    content: ' Jesus answered them, I have told you so, yet you do not believe Me [you do not trust Me '
  - type: text
    content: and
  - type: text
    content: ' rely on Me]. The very works that I do by the power of My Father '
  - type: text
    content: and
  - type: text
    content: ' in My Father''s name bear witness concerning Me [they are My credentials and evidence in support of Me].'
  '26':
  - type: text
    content: ' But you do not believe '
  - type: text
    content: and
  - type: text
    content: ' trust '
  - type: text
    content: and
  - type: text
    content: ' rely on Me because you do not belong to My fold [you are no sheep of Mine].'
  '27':
  - type: text
    content: ' The sheep that are My own hear '
  - type: text
    content: and
  - type: text
    content: ' are listening to My voice; and I know them, and they follow Me.'
  '28':
  - type: text
    content: ' And I give them eternal life, and they shall never lose it '
  - type: text
    content: or
  - type: text
    content: ' perish throughout the ages. [To all eternity they shall never by any means be destroyed.] And no one is able to snatch them out of My hand.'
  '29':
  - type: text
    content: ' My Father, Who has given them to Me, is greater '
  - type: text
    content: and
  - type: text
    content: ' mightier than all [else]; and no one is able to snatch [them] out of the Father''s hand.'
  '3':
  - type: text
    content: ' The watchman opens the door for this man, and the sheep listen to his voice '
  - type: text
    content: and
  - type: text
    content: ' heed it; and he calls his own sheep by name and brings (leads) them out.'
  '30':
  - type: text
    content: ' I and the Father are One.'
  '31':
  - type: text
    content: ' Again the Jews brought up stones to stone Him.'
  '32':
  - type: text
    content: ' Jesus said to them, My Father has enabled Me to do many good deeds. [I have shown many acts of mercy in your presence.] For which of these do you mean to stone Me?'
  '33':
  - type: text
    content: ' The Jews replied, We are not going to stone You for a good act, but for blasphemy, because You, a mere Man, make Yourself [out to be] God.'
  '34':
  - type: text
    content: ' Jesus answered, Is it not written in your Law, I said, You are gods? [Ps. 82:6.]'
  '35':
  - type: text
    content: ' So men are called gods [by the Law], men to whom God''s message came–and the Scripture cannot be set aside '
  - type: text
    content: or
  - type: text
    content: ' cancelled '
  - type: text
    content: or
  - type: text
    content: ' broken '
  - type: text
    content: or
  - type: text
    content: ' annulled–'
  '36':
  - type: text
    content: ' [If that is true] do you say of the One Whom the Father consecrated '
  - type: text
    content: and
  - type: text
    content: ' dedicated '
  - type: text
    content: and
  - type: text
    content: ' set apart for Himself and sent into the world, You are blaspheming, because I said, I am the Son of God?'
  '37':
  - type: text
    content: ' If I am not doing the works [performing the deeds] of My Father, then do not believe Me [do not adhere to Me and trust Me and rely on Me].'
  '38':
  - type: text
    content: ' But if I do them, even though you do not believe Me '
  - type: text
    content: or
  - type: text
    content: ' have faith in Me, [at least] believe the works '
  - type: text
    content: and
  - type: text
    content: ' have faith in what I do, in order that you may know and understand [clearly] that the Father is in Me, and I am in the Father [One with Him].'
  '39':
  - type: text
    content: ' They sought again to arrest Him, but He escaped from their hands.'
  '4':
  - type: text
    content: ' When he has brought his own sheep outside, he walks on before them, and the sheep follow him because they know his voice.'
  '40':
  - type: text
    content: ' He went back again across the Jordan to the locality where John was when he first baptized, and there He remained.'
  '41':
  - type: text
    content: ' And many came to Him, and they kept saying, John did not perform a [single] sign '
  - type: text
    content: or
  - type: text
    content: ' miracle, but everything John said about this Man was true.'
  '42':
  - type: text
    content: ' And many [people] there became believers in Him. [They adhered to '
  - type: text
    content: and
  - type: text
    content: ' trusted in '
  - type: text
    content: and
  - type: text
    content: ' relied on Him.]'
  '5':
  - type: text
    content: ' They will never [on any account] follow a stranger, but will run away from him because they do not know the voice of strangers '
  - type: text
    content: or
  - type: text
    content: ' recognize their call.'
  '6':
  - type: text
    content: ' Jesus used this parable (illustration) with them, but they did not understand what He was talking about.'
  '7':
  - type: text
    content: ' So Jesus said again, I assure you, most solemnly I tell you, that I Myself am the Door for the sheep.'
  '8':
  - type: text
    content: ' All others who came [as such] before Me are thieves and robbers, but the [true] sheep did not listen to '
  - type: text
    content: and
  - type: text
    content: ' obey them.'
  '9':
  - type: text
    content: ' I am the Door; anyone who enters in through Me will be saved (will live). He will come in and he will go out [freely], and will find pasture.'
