document_id: REV.22,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN HE showed me the river whose waters give life, sparkling like crystal, flowing out from the throne of God and of the Lamb'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And he [further] told me, Do not seal up the words of the prophecy of this book '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make no secret of them, for the time when things are brought to a crisis '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the period of their fulfillment is near.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' He who is unrighteous (unjust, wicked), let him be unrighteous still; and he who is filthy (vile, impure), let him be filthy still; and he who is righteous (just, upright, in right standing with God), let him do right still; and he who is holy, let him be holy still. [Dan. 12:10.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Behold, I am coming soon, and I shall bring My wages '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rewards with Me, to repay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' render to each one just what his own actions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' his own work merit. [Isa. 40:10; Jer. 17:10.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' I am the Alpha and the Omega, the First and the Last (the Before all and the End of all). [Isa. 44:6; 48:12.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Blessed (happy and to be envied) are those who cleanse their garments, that they may have the authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right to [approach] the tree of life and to enter through the gates into the city. [Gen. 2:9; 3:22, 24.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' [But] without are the dogs and those who practice sorceries (magic arts) and impurity [the lewd, adulterers] and the murderers and idolaters and everyone who loves and deals in falsehood (untruth, error, deception, cheating).'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' I, Jesus, have sent My messenger (angel) to you to witness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to give you assurance of these things for the churches (assemblies). I am the Root (the Source) and the Offspring of David, the radiant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliant Morning Star. [Isa. 11:1, 10.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The [Holy] Spirit and the bride (the church, the true Christians) say, Come! And let him who is listening say, Come! And let everyone come who is thirsty [who is painfully conscious of his need of those things by which the soul is refreshed, supported, and strengthened]; and whoever [earnestly] desires to do it, let him come, take, appropriate, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' drink the water of Life without cost. [Isa. 55:1.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' I [personally solemnly] warn everyone who listens to the statements of the prophecy [the predictions and the consolations and admonitions pertaining to them] in this book: If anyone shall add anything to them, God will add '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lay upon him the plagues (the afflictions and the calamities) that are recorded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' described in this book.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And if anyone cancels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' takes away from the statements of the book of this prophecy [these predictions relating to Christ''s kingdom and its speedy triumph, together with the consolations and admonitions or warnings pertaining to them], God will cancel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take away from him his share in the tree of life and in the city of holiness (purity and hallowedness), which are described '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promised in this book.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Through the middle of the broadway of the city; also, on either side of the river was the tree of life with its twelve varieties of fruit, yielding each month its fresh crop; and the leaves of the tree were for the healing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the restoration of the nations. [Gen. 2:9.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' He Who gives this warning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affirms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' testifies to these things says, Yes (it is true). [Surely] I am coming quickly (swiftly, speedily). Amen (so let it be)! Yes, come, Lord Jesus!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The grace (blessing and favor) of the Lord Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Christ (the Messiah)
    - type: text
      text: ' be with all the saints (God''s holy people, those set apart for God, to be, as it were, exclusively His). Amen (so let it be)!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' There shall no longer exist there anything that is accursed (detestable, foul, offensive, impure, hateful, or horrible). But the throne of God and of the Lamb shall be in it, and His servants shall worship Him [pay divine honors to Him and do Him holy service]. [Zech. 14:21.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' They shall see His face, and His name shall be on their foreheads. [Ps. 17:15.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And there shall be no more night; they have no need for lamplight or sunlight, for the Lord God will illuminate them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be their light, and they shall reign [as kings] forever and ever (through the eternities of the eternities).'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And he [of the seven angels further] said to me, These statements are reliable (worthy of confidence) and genuine (true). And the Lord, the God of the spirits of the prophets, has sent His messenger (angel) to make known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exhibit to His servants what must soon come to pass.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And behold, I am coming speedily. Blessed (happy and to be envied) is he who observes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lays to heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keeps the truths of the prophecy (the predictions, consolations, and warnings) contained in this [little] book.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And I, John, am he who heard and witnessed these things. And when I heard and saw them, I fell prostrate before the feet of the messenger (angel) who showed them to me, to worship him.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But he said to me, Refrain! [You must not do that!] I am [only] a fellow servant along with yourself and with your brethren the prophets and with those who are mindful of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' practice [the truths contained in] the messages of this book. Worship God!'
