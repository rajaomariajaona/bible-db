document_id: REV.22,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN HE showed me the river whose waters give life, sparkling like crystal, flowing out from the throne of God and of the Lamb'
  '10':
  - type: text
    content: ' And he [further] told me, Do not seal up the words of the prophecy of this book '
  - type: text
    content: and
  - type: text
    content: ' make no secret of them, for the time when things are brought to a crisis '
  - type: text
    content: and
  - type: text
    content: ' the period of their fulfillment is near.'
  '11':
  - type: text
    content: ' He who is unrighteous (unjust, wicked), let him be unrighteous still; and he who is filthy (vile, impure), let him be filthy still; and he who is righteous (just, upright, in right standing with God), let him do right still; and he who is holy, let him be holy still. [Dan. 12:10.]'
  '12':
  - type: text
    content: ' Behold, I am coming soon, and I shall bring My wages '
  - type: text
    content: and
  - type: text
    content: ' rewards with Me, to repay '
  - type: text
    content: and
  - type: text
    content: ' render to each one just what his own actions '
  - type: text
    content: and
  - type: text
    content: ' his own work merit. [Isa. 40:10; Jer. 17:10.]'
  '13':
  - type: text
    content: ' I am the Alpha and the Omega, the First and the Last (the Before all and the End of all). [Isa. 44:6; 48:12.]'
  '14':
  - type: text
    content: ' Blessed (happy and to be envied) are those who cleanse their garments, that they may have the authority '
  - type: text
    content: and
  - type: text
    content: ' right to [approach] the tree of life and to enter through the gates into the city. [Gen. 2:9; 3:22, 24.]'
  '15':
  - type: text
    content: ' [But] without are the dogs and those who practice sorceries (magic arts) and impurity [the lewd, adulterers] and the murderers and idolaters and everyone who loves and deals in falsehood (untruth, error, deception, cheating).'
  '16':
  - type: text
    content: ' I, Jesus, have sent My messenger (angel) to you to witness '
  - type: text
    content: and
  - type: text
    content: ' to give you assurance of these things for the churches (assemblies). I am the Root (the Source) and the Offspring of David, the radiant '
  - type: text
    content: and
  - type: text
    content: ' brilliant Morning Star. [Isa. 11:1, 10.]'
  '17':
  - type: text
    content: ' The [Holy] Spirit and the bride (the church, the true Christians) say, Come! And let him who is listening say, Come! And let everyone come who is thirsty [who is painfully conscious of his need of those things by which the soul is refreshed, supported, and strengthened]; and whoever [earnestly] desires to do it, let him come, take, appropriate, '
  - type: text
    content: and
  - type: text
    content: ' drink the water of Life without cost. [Isa. 55:1.]'
  '18':
  - type: text
    content: ' I [personally solemnly] warn everyone who listens to the statements of the prophecy [the predictions and the consolations and admonitions pertaining to them] in this book: If anyone shall add anything to them, God will add '
  - type: text
    content: and
  - type: text
    content: ' lay upon him the plagues (the afflictions and the calamities) that are recorded '
  - type: text
    content: and
  - type: text
    content: ' described in this book.'
  '19':
  - type: text
    content: ' And if anyone cancels '
  - type: text
    content: or
  - type: text
    content: ' takes away from the statements of the book of this prophecy [these predictions relating to Christ''s kingdom and its speedy triumph, together with the consolations and admonitions or warnings pertaining to them], God will cancel '
  - type: text
    content: and
  - type: text
    content: ' take away from him his share in the tree of life and in the city of holiness (purity and hallowedness), which are described '
  - type: text
    content: and
  - type: text
    content: ' promised in this book.'
  '2':
  - type: text
    content: ' Through the middle of the broadway of the city; also, on either side of the river was the tree of life with its twelve varieties of fruit, yielding each month its fresh crop; and the leaves of the tree were for the healing '
  - type: text
    content: and
  - type: text
    content: ' the restoration of the nations. [Gen. 2:9.]'
  '20':
  - type: text
    content: ' He Who gives this warning '
  - type: text
    content: and
  - type: text
    content: ' affirms '
  - type: text
    content: and
  - type: text
    content: ' testifies to these things says, Yes (it is true). [Surely] I am coming quickly (swiftly, speedily). Amen (so let it be)! Yes, come, Lord Jesus!'
  '21':
  - type: text
    content: ' The grace (blessing and favor) of the Lord Jesus '
  - type: text
    content: Christ (the Messiah)
  - type: text
    content: ' be with all the saints (God''s holy people, those set apart for God, to be, as it were, exclusively His). Amen (so let it be)!'
  '3':
  - type: text
    content: ' There shall no longer exist there anything that is accursed (detestable, foul, offensive, impure, hateful, or horrible). But the throne of God and of the Lamb shall be in it, and His servants shall worship Him [pay divine honors to Him and do Him holy service]. [Zech. 14:21.]'
  '4':
  - type: text
    content: ' They shall see His face, and His name shall be on their foreheads. [Ps. 17:15.]'
  '5':
  - type: text
    content: ' And there shall be no more night; they have no need for lamplight or sunlight, for the Lord God will illuminate them '
  - type: text
    content: and
  - type: text
    content: ' be their light, and they shall reign [as kings] forever and ever (through the eternities of the eternities).'
  '6':
  - type: text
    content: ' And he [of the seven angels further] said to me, These statements are reliable (worthy of confidence) and genuine (true). And the Lord, the God of the spirits of the prophets, has sent His messenger (angel) to make known '
  - type: text
    content: and
  - type: text
    content: ' exhibit to His servants what must soon come to pass.'
  '7':
  - type: text
    content: ' And behold, I am coming speedily. Blessed (happy and to be envied) is he who observes '
  - type: text
    content: and
  - type: text
    content: ' lays to heart '
  - type: text
    content: and
  - type: text
    content: ' keeps the truths of the prophecy (the predictions, consolations, and warnings) contained in this [little] book.'
  '8':
  - type: text
    content: ' And I, John, am he who heard and witnessed these things. And when I heard and saw them, I fell prostrate before the feet of the messenger (angel) who showed them to me, to worship him.'
  '9':
  - type: text
    content: ' But he said to me, Refrain! [You must not do that!] I am [only] a fellow servant along with yourself and with your brethren the prophets and with those who are mindful of '
  - type: text
    content: and
  - type: text
    content: ' practice [the truths contained in] the messages of this book. Worship God!'
