document_id: ISA.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND IN that day seven women shall take hold of one man, saying, We will eat our own bread and provide our own apparel; only let us be called by your name to take away our reproach [of being unmarried].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In that day the Branch of the Lord shall be beautiful and glorious, and the fruit of the land shall be excellent and lovely to those of Israel who have escaped. [Jer. 23:5; 33:15; Zech. 3:8; 6:12.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he who is left in Zion and remains in Jerusalem will be called holy, everyone who is recorded for life in Jerusalem '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and for
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eternal life
    - type: text
      text: ', [Joel 3:17; Phil. 4:3.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' After the Lord has washed away the [moral] filth of the daughters of Zion [pride, vanity, haughtiness] and has purged the bloodstains of Jerusalem from the midst of it by the spirit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blast of judgment and by the spirit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blast of burning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sifting.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord will create over the whole site, over every dwelling place of Mount Zion and over her assemblies, a cloud and smoke by day and the shining of a flaming fire by night; for over all the glory shall be a canopy (a defense of divine love and protection).'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there shall be a pavilion for shade in the daytime from the heat, and for a place of refuge and a shelter from storm and from rain.'
