document_id: ISA.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND IN that day seven women shall take hold of one man, saying, We will eat our own bread and provide our own apparel; only let us be called by your name to take away our reproach [of being unmarried].'
  '2':
  - type: text
    content: ' In that day the Branch of the Lord shall be beautiful and glorious, and the fruit of the land shall be excellent and lovely to those of Israel who have escaped. [Jer. 23:5; 33:15; Zech. 3:8; 6:12.]'
  '3':
  - type: text
    content: ' And he who is left in Zion and remains in Jerusalem will be called holy, everyone who is recorded for life in Jerusalem '
  - type: text
    content: and for
  - type: text
    content: ' '
  - type: text
    content: eternal life
  - type: text
    content: ', [Joel 3:17; Phil. 4:3.]'
  '4':
  - type: text
    content: ' After the Lord has washed away the [moral] filth of the daughters of Zion [pride, vanity, haughtiness] and has purged the bloodstains of Jerusalem from the midst of it by the spirit '
  - type: text
    content: and
  - type: text
    content: ' blast of judgment and by the spirit '
  - type: text
    content: and
  - type: text
    content: ' blast of burning '
  - type: text
    content: and
  - type: text
    content: ' sifting.'
  '5':
  - type: text
    content: ' And the Lord will create over the whole site, over every dwelling place of Mount Zion and over her assemblies, a cloud and smoke by day and the shining of a flaming fire by night; for over all the glory shall be a canopy (a defense of divine love and protection).'
  '6':
  - type: text
    content: ' And there shall be a pavilion for shade in the daytime from the heat, and for a place of refuge and a shelter from storm and from rain.'
