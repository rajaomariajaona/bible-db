document_id: NUM.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE ISRAELITES journeyed and encamped in the plains of Moab, on the east side of the Jordan [River] at Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Balak [the king of Moab] son of Zippor saw all that Israel had done to the Amorites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Moab was terrified at the people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' full of dread, because they were many. Moab was distressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overcome with fear because of the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Moab said to the elders of Midian, Now will this multitude lick up all that is round about us, as the ox licks up the grass of the field. So Balak son of Zippor, the king of the Moabites at that time,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Sent messengers to Balaam [a foreteller of events] son of Beor at Pethor, which is by the [Euphrates] River, even to the land of the children of his people, to say to him, There is a people come out from Egypt; behold, they cover the face of the earth and they have settled down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dwell opposite me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now come, I beg of you, curse this people for me, for they are too powerful for me. Perhaps I may be able to defeat them and drive them out of the land, for I know that he whom you bless is blessed, and he whom you curse is cursed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the elders of Moab and of Midian departed with the rewards of foretelling in their hands; and they came to Balaam and told him the words of Balak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And he said to them, Lodge here tonight and I will bring you word as the Lord may speak to me. And the princes of Moab abode with Balaam [that night].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And God came to Balaam, and said, What men are these with you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And Balaam said to God, Balak son of Zippor, king of Moab, has sent to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Behold, the people who came out of Egypt cover the face of the earth; come now, curse them for me. Perhaps I shall be able to fight against them and drive them out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And God said to Balaam, You shall not go with them; you shall not curse the people, for they are blessed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Balaam rose up in the morning, and said to the princes of Balak, Go back to your own land, for the Lord refuses to permit me to go with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So the princes of Moab rose up and went to Balak, and said, Balaam refuses to come with us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then Balak again sent princes, more of them and more honorable than the first ones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they came to Balaam, and said to him, Thus says Balak son of Zippor, I beg of you, let nothing hinder you from coming to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For I will promote you to very great honor and I will do whatever you tell me; so come, I beg of you, curse this people for me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Balaam answered the servants of Balak, If Balak would give me his house full of silver and gold, I cannot go beyond the word of the Lord my God, to do less or more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Now therefore, I pray you, tarry here again tonight that I may know what more the Lord will say to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And God came to Balaam at night, and said to him, If the men come to call you, rise up and go with them, but still only what I tell you may you do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Balaam rose up in the morning and saddled his donkey and went with the princes of Moab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And God''s anger was kindled because he went, and the Angel of the Lord stood in the way as an adversary against him. Now he was riding upon his donkey, and his two servants were with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And the donkey saw the Angel of the Lord standing in the way and His sword drawn in His hand, and the donkey turned aside out of the way and went into the field. And Balaam struck the donkey to turn her into the way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But the Angel of the Lord stood in a path of the vineyards, a wall on this side and a wall on that side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And when the donkey saw the Angel of the Lord, she thrust herself against the wall and crushed Balaam''s foot against it, and he struck her again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And the Angel of the Lord went further and stood in a narrow place where there was no room to turn, either to the right hand or to the left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And when the donkey saw the Angel of the Lord, she fell down under Balaam, and Balaam''s anger was kindled and he struck the donkey with his staff.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And the Lord opened the mouth of the donkey, and she said to Balaam, What have I done to you that you should strike me these three times?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And Balaam said to the donkey, Because you have ridiculed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provoked me! I wish there were a sword in my hand, for now I would kill you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And the donkey said to Balaam, Am not I your donkey, upon which you have ridden all your life long until this day? Was I ever accustomed to do so to you? And he said, No.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Then the Lord opened Balaam''s eyes, and he saw the Angel of the Lord standing in the way with His sword drawn in His hand; and he bowed his head and fell on his face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And the Angel of the Lord said to him, Why have you struck your donkey these three times? See, I came out to stand against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' resist you, for your behavior is willfully obstinate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contrary before Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And the ass saw Me and turned from Me these three times. If she had not turned from Me, surely I would have slain you and saved her alive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Balaam said to the Angel of the Lord, I have sinned, for I did not know You stood in the way against me. But now, if my going displeases You, I will return.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' The Angel of the Lord said to Balaam, Go with the men, but you shall speak only what I tell you. So Balaam went with the princes of Balak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' When Balak heard that Balaam had come, he went out to meet him at the city of Moab on the border formed by the Arnon [River], at the farthest end of the boundary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Balak said to Balaam, Did I not [earnestly] send to you to ask you [to come] to me? Why did you not come? Am not I able to promote you to honor?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And Balaam said to Balak, Indeed I have come to you, but do I now have any power at all to say anything? The word that God puts in my mouth, that shall I speak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And Balaam went with Balak, and they came to Kiriath-huzoth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And Balak offered oxen and sheep, and sent [portions] to Balaam and to the princes who were with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And on the following day Balak took Balaam and brought him up into the high places of Bamoth-baal; from there he saw the nearest of the Israelites.'
