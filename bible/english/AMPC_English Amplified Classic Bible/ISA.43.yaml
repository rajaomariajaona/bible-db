document_id: ISA.43,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BUT NOW [in spite of past judgments for Israel''s sins], thus says the Lord, He Who created you, O Jacob, and He Who formed you, O Israel: Fear not, for I have redeemed you [ransomed you by paying a price instead of leaving you captives]; I have called you by your name; you are Mine.'
  '10':
  - type: text
    content: ' You are My witnesses, says the Lord, and My servant whom I have chosen, that you may know Me, believe Me '
  - type: text
    content: and
  - type: text
    content: ' remain steadfast to Me, and understand that I am He. Before Me there was no God formed, neither shall there be after Me.'
  '11':
  - type: text
    content: ' I, even I, am the Lord, and besides Me there is no Savior.'
  '12':
  - type: text
    content: ' I have declared [the future] and have saved [the nation in times of danger], and I have shown [that I am God]–when there was no strange and alien god among you; therefore you are My witnesses, says the Lord, that I am God.'
  '13':
  - type: text
    content: ' Yes, from the time of the first existence of day '
  - type: text
    content: and
  - type: text
    content: ' from this day forth I am He; and there is no one who can deliver out of My hand. I will work, and who can hinder '
  - type: text
    content: or
  - type: text
    content: ' reverse it?'
  '14':
  - type: text
    content: ' Thus says the Lord, your Redeemer, the Holy One of Israel: For your sake I have sent [one] to Babylon, and I will bring down all of them as fugitives, [with] all their nobles, even the Chaldeans, into the ships over which they rejoiced.'
  '15':
  - type: text
    content: ' I am the Lord, your Holy One, the Creator of Israel, your King.'
  '16':
  - type: text
    content: ' Thus says the Lord, Who makes a way through the sea and a path through the mighty waters,'
  '17':
  - type: text
    content: ' Who brings forth chariot and horse, army and mighty warrior. They lie down together, they cannot rise; they are extinguished, they are quenched like a lampwick:'
  '18':
  - type: text
    content: ' Do not [earnestly] remember the former things; neither consider the things of old.'
  '19':
  - type: text
    content: ' Behold, I am doing a new thing! Now it springs forth; do you not perceive '
  - type: text
    content: and
  - type: text
    content: ' know it '
  - type: text
    content: and
  - type: text
    content: ' will you not give heed to it? I will even make a way in the wilderness and rivers in the desert.'
  '2':
  - type: text
    content: ' When you pass through the waters, I will be with you, and through the rivers, they will not overwhelm you. When you walk through the fire, you will not be burned '
  - type: text
    content: or
  - type: text
    content: ' scorched, nor will the flame kindle upon you.'
  '20':
  - type: text
    content: ' The beasts of the field honor Me, the jackals and the ostriches, because I give waters in the wilderness '
  - type: text
    content: and
  - type: text
    content: ' rivers in the desert, to give drink to My people, My chosen, [Isa. 41:17, 18; 48:21.]'
  '21':
  - type: text
    content: ' The people I formed for Myself, that they may set forth My praise [and they shall do it].'
  '22':
  - type: text
    content: ' Yet you have not called upon Me [much less toiled for Me], O Jacob; but you have been weary of Me, O Israel!'
  '23':
  - type: text
    content: ' You have not brought Me your sheep '
  - type: text
    content: and
  - type: text
    content: ' goats for burnt offerings, or honored Me with your sacrifices. I have not required you to serve with an offering '
  - type: text
    content: or
  - type: text
    content: ' treated you as a slave by demanding tribute or wearied you with offering incense.'
  '24':
  - type: text
    content: ' You have not bought Me sweet cane with money, or satiated Me with the fat of your sacrifices. But you have only burdened Me with your sins; you have wearied Me with your iniquities.'
  '25':
  - type: text
    content: ' I, even I, am He Who blots out '
  - type: text
    content: and
  - type: text
    content: ' cancels your transgressions, for My own sake, and I will not remember your sins.'
  '26':
  - type: text
    content: ' Put Me in remembrance [remind Me of your merits]; let us plead '
  - type: text
    content: and
  - type: text
    content: ' argue together. Set forth your case, that you may be justified (proved right).'
  '27':
  - type: text
    content: ' Your first father [Jacob, in particular] sinned, and your teachers [the priests and the prophets–your mediators] transgressed against Me.'
  '28':
  - type: text
    content: ' And so I will profane the chief ones of the sanctuary and will deliver Jacob to the curse (the ban, a solemn anathema or excommunication) and [will subject] Israel to reproaches '
  - type: text
    content: and
  - type: text
    content: ' reviling.'
  '3':
  - type: text
    content: ' For I am the Lord your God, the Holy One of Israel, your Savior; I give Egypt [to the Babylonians] for your ransom, Ethiopia and Seba [a province of Ethiopia] in exchange [for your release].'
  '4':
  - type: text
    content: ' Because you are precious in My sight and honored, and because I love you, I will give men in return for you and peoples in exchange for your life.'
  '5':
  - type: text
    content: ' Fear not, for I am with you; I will bring your offspring from the east [where they are dispersed] and gather you from the west. [Acts 18:10.]'
  '6':
  - type: text
    content: ' I will say to the north, Give up! and to the south, Keep not back. Bring My sons from afar and My daughters from the ends of the earth–'
  '7':
  - type: text
    content: ' Even everyone who is called by My name, whom I have created for My glory, whom I have formed, whom I have made.'
  '8':
  - type: text
    content: ' Bring forth the blind people who have eyes and the deaf who have ears.'
  '9':
  - type: text
    content: ' Let all the nations be gathered together and let the peoples be assembled. Who among [the idolaters] could predict this [that Cyrus would be the deliverer of Israel] and show us the former things? Let them bring their witnesses, that they may be justified, or let them hear and acknowledge, It is the truth. [Ps. 123:3, 4.]'
