document_id: ISA.43
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT NOW [in spite of past judgments for Israel''s sins], thus says the Lord, He Who created you, O Jacob, and He Who formed you, O Israel: Fear not, for I have redeemed you [ransomed you by paying a price instead of leaving you captives]; I have called you by your name; you are Mine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' When you pass through the waters, I will be with you, and through the rivers, they will not overwhelm you. When you walk through the fire, you will not be burned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' scorched, nor will the flame kindle upon you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For I am the Lord your God, the Holy One of Israel, your Savior; I give Egypt [to the Babylonians] for your ransom, Ethiopia and Seba [a province of Ethiopia] in exchange [for your release].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Because you are precious in My sight and honored, and because I love you, I will give men in return for you and peoples in exchange for your life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Fear not, for I am with you; I will bring your offspring from the east [where they are dispersed] and gather you from the west. [Acts 18:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I will say to the north, Give up! and to the south, Keep not back. Bring My sons from afar and My daughters from the ends of the earth–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Even everyone who is called by My name, whom I have created for My glory, whom I have formed, whom I have made.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Bring forth the blind people who have eyes and the deaf who have ears.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Let all the nations be gathered together and let the peoples be assembled. Who among [the idolaters] could predict this [that Cyrus would be the deliverer of Israel] and show us the former things? Let them bring their witnesses, that they may be justified, or let them hear and acknowledge, It is the truth. [Ps. 123:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You are My witnesses, says the Lord, and My servant whom I have chosen, that you may know Me, believe Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remain steadfast to Me, and understand that I am He. Before Me there was no God formed, neither shall there be after Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I, even I, am the Lord, and besides Me there is no Savior.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I have declared [the future] and have saved [the nation in times of danger], and I have shown [that I am God]–when there was no strange and alien god among you; therefore you are My witnesses, says the Lord, that I am God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Yes, from the time of the first existence of day '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from this day forth I am He; and there is no one who can deliver out of My hand. I will work, and who can hinder '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reverse it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Thus says the Lord, your Redeemer, the Holy One of Israel: For your sake I have sent [one] to Babylon, and I will bring down all of them as fugitives, [with] all their nobles, even the Chaldeans, into the ships over which they rejoiced.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I am the Lord, your Holy One, the Creator of Israel, your King.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Thus says the Lord, Who makes a way through the sea and a path through the mighty waters,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Who brings forth chariot and horse, army and mighty warrior. They lie down together, they cannot rise; they are extinguished, they are quenched like a lampwick:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Do not [earnestly] remember the former things; neither consider the things of old.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Behold, I am doing a new thing! Now it springs forth; do you not perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' will you not give heed to it? I will even make a way in the wilderness and rivers in the desert.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The beasts of the field honor Me, the jackals and the ostriches, because I give waters in the wilderness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rivers in the desert, to give drink to My people, My chosen, [Isa. 41:17, 18; 48:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The people I formed for Myself, that they may set forth My praise [and they shall do it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Yet you have not called upon Me [much less toiled for Me], O Jacob; but you have been weary of Me, O Israel!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' You have not brought Me your sheep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goats for burnt offerings, or honored Me with your sacrifices. I have not required you to serve with an offering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' treated you as a slave by demanding tribute or wearied you with offering incense.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' You have not bought Me sweet cane with money, or satiated Me with the fat of your sacrifices. But you have only burdened Me with your sins; you have wearied Me with your iniquities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' I, even I, am He Who blots out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cancels your transgressions, for My own sake, and I will not remember your sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Put Me in remembrance [remind Me of your merits]; let us plead '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' argue together. Set forth your case, that you may be justified (proved right).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Your first father [Jacob, in particular] sinned, and your teachers [the priests and the prophets–your mediators] transgressed against Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And so I will profane the chief ones of the sanctuary and will deliver Jacob to the curse (the ban, a solemn anathema or excommunication) and [will subject] Israel to reproaches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reviling.'
