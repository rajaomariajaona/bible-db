document_id: EXO.16,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEY SET out from Elim, and all the congregation of Israel came to the Wilderness of Sin, which is between Elim and Sinai, on the fifteenth day of the second month after they left the land of Egypt.'
  '10':
  - type: text
    content: ' And as Aaron spoke to the whole congregation of Israel, they looked toward the wilderness, and behold, the glory of the Lord appeared in the cloud!'
  '11':
  - type: text
    content: ' The Lord said to Moses,'
  '12':
  - type: text
    content: ' I have heard the murmurings of the Israelites; speak to them, saying, At twilight you shall eat meat, and between the two evenings you shall be filled with bread; and you shall know that I am the Lord your God.'
  '13':
  - type: text
    content: ' In the evening quails came up and covered the camp; and in the morning the dew lay round about the camp.'
  '14':
  - type: text
    content: ' And when the dew had gone, behold, upon the face of the wilderness there lay a fine, round '
  - type: text
    content: and
  - type: text
    content: ' flakelike thing, as fine as hoarfrost on the ground.'
  '15':
  - type: text
    content: ' When the Israelites saw it, they said one to another, Manna [What is it?]. For they did not know what it was. And Moses said to them, This is the bread which the Lord has given you to eat. [John 6:31, 33.]'
  '16':
  - type: text
    content: ' This is what the Lord has commanded: Let every man gather of it as much as he will need, an omer for each person, according to the number of your persons; take it, every man for those in his tent.'
  '17':
  - type: text
    content: ' The [people] did so, and gathered, some more, some less.'
  '18':
  - type: text
    content: ' When they measured it with an omer, he who gathered much had nothing over, and he who gathered little had no lack; each gathered according to his need.'
  '19':
  - type: text
    content: ' Moses said, Let none of it be left until morning.'
  '2':
  - type: text
    content: ' And the whole congregation of Israel murmured against Moses and Aaron in the wilderness,'
  '20':
  - type: text
    content: ' But they did not listen to Moses; some of them left of it until morning, and it bred worms, became foul, '
  - type: text
    content: and
  - type: text
    content: ' stank; and Moses was angry with them.'
  '21':
  - type: text
    content: ' They gathered it every morning, each as much as he needed, for when the sun became hot it melted.'
  '22':
  - type: text
    content: ' And on the sixth day they gathered twice as much bread, two omers for each person; and all the leaders of the congregation came and told Moses.'
  '23':
  - type: text
    content: ' He said to them, The Lord has said, Tomorrow is a solemn rest, a holy Sabbath to the Lord; bake and boil what you will bake and boil today; and all that remains over put aside for you to keep until morning.'
  '24':
  - type: text
    content: ' They laid it aside till morning, as Moses told them; and it did not become foul, neither was it wormy.'
  '25':
  - type: text
    content: ' Moses said, Eat that today, for today is a Sabbath to the Lord. Today you shall find none in the field.'
  '26':
  - type: text
    content: ' Six days you shall gather it, but on the seventh day, the Sabbath, there shall be none.'
  '27':
  - type: text
    content: ' On the seventh day some of the people went out to gather, but they found none.'
  '28':
  - type: text
    content: ' The Lord said to Moses, How long do you [people] refuse to keep My commandments and My laws?'
  '29':
  - type: text
    content: ' See, the Lord has given you the Sabbath; therefore He gives you on the sixth day the bread for two days; let every man remain in his place; let no man leave his place on the seventh day.'
  '3':
  - type: text
    content: ' And said to them, Would that we had died by the hand of the Lord in the land of Egypt, when we sat by the fleshpots and ate bread to the full; for you have brought us out into this wilderness to kill this whole assembly with hunger.'
  '30':
  - type: text
    content: ' So the people rested on the seventh day.'
  '31':
  - type: text
    content: ' The house of Israel called the bread manna; it was like coriander seed, white, and it tasted like wafers made with honey.'
  '32':
  - type: text
    content: ' Moses said, This is what the Lord commands, Take an omer of it to be kept throughout your generations, that they may see the bread with which I fed you in the wilderness when I brought you out of the land of Egypt.'
  '33':
  - type: text
    content: ' And Moses said to Aaron, Take a pot and put an omer of manna in it, and lay it up before the Lord, to be kept throughout your generations.'
  '34':
  - type: text
    content: ' As the Lord commanded Moses, Aaron laid it up before the Testimony to be kept [in the ark]. [Heb. 9:4.]'
  '35':
  - type: text
    content: ' And the Israelites ate manna forty years, until they came to a habitable land; they ate the manna until they came to the border of the land of Canaan.'
  '36':
  - type: text
    content: ' (Now an omer is the tenth of an ephah.)'
  '4':
  - type: text
    content: ' Then the Lord said to Moses, Behold, I will rain bread from the heavens for you; and the people shall go out and gather a day''s portion every day, that I may prove them, whether they will walk in My law or not.'
  '5':
  - type: text
    content: ' On the sixth day they shall prepare to bring in twice as much as they gather daily.'
  '6':
  - type: text
    content: ' So Moses and Aaron said to all Israel, At evening you shall know that the Lord has brought you out from the land of Egypt,'
  '7':
  - type: text
    content: ' And in the morning you shall see the glory of the Lord, for He hears your murmurings against the Lord. For what are we, that you murmur against us?'
  '8':
  - type: text
    content: ' And Moses said, [This will happen] when the Lord gives you in the evening flesh to eat and in the morning bread to the full, because the Lord has heard your grumblings which you murmur against Him; what are we? Your murmurings are not against us, but against the Lord.'
  '9':
  - type: text
    content: ' And Moses said to Aaron, Say to all the congregation of Israel, Come near before the Lord, for He has heard your murmurings.'
