document_id: MAT.23,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN JESUS said to the multitudes and to His disciples,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And you must not be called masters (leaders), for you have one Master (Leader), the Christ.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' He who is greatest among you shall be your servant.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Whoever exalts himself [with haughtiness and empty pride] shall be humbled (brought low), and whoever humbles himself [whoever has a modest opinion of himself and behaves accordingly] shall be raised to honor.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But woe to you, scribes and Pharisees, pretenders (hypocrites)! For you shut the kingdom of heaven in men''s faces; for you neither enter yourselves, nor do you allow those who are about to go in to do so.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Woe to you, scribes and Pharisees, pretenders (hypocrites)! For you swallow up widows' houses and for a pretense to cover it up make long prayers; therefore you will receive the greater condemnation and the heavier sentence.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Woe to you, scribes and Pharisees, pretenders (hypocrites)! For you travel over sea and land to make a single proselyte, and when he becomes one [a proselyte], you make him doubly as much a child of hell (Gehenna) as you are.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Woe to you, blind guides, who say, If anyone swears by the sanctuary of the temple, it is nothing; but if anyone swears by the gold of the sanctuary, he is a debtor [bound by his oath].'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' You blind fools! For which is greater: the gold, or the sanctuary of the temple that has made the gold sacred? [Exod. 30:29.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' You say too, Whoever swears by the altar is not duty bound; but whoever swears by the offering on the altar, his oath is binding.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' You blind men! Which is greater: the gift, or the altar which makes the gift sacred?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The scribes and Pharisees sit on Moses'' seat [of authority].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So whoever swears by the altar swears by it and by everything on it.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And he who swears by the sanctuary of the temple swears by it and by Him Who dwells in it. [I Kings 8:13; Ps. 26:8.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And whoever swears by heaven swears by the throne of God and by Him Who sits upon it.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Woe to you, scribes and Pharisees, pretenders (hypocrites)! For you give a tenth of your mint and dill and cummin, and have neglected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' omitted the weightier (more important) matters of the Law–right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice and mercy and fidelity. These you ought [particularly] to have done, without neglecting the others.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' You blind guides, filtering out a gnat and gulping down a camel! [Lev. 27:30; Mic. 6:8.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Woe to you, scribes and Pharisees, pretenders (hypocrites)! For you clean the outside of the cup and of the plate, but within they are full of extortion (prey, spoil, plunder) and grasping self-indulgence.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' You blind Pharisee! First clean the inside of the cup and of the plate, so that the outside may be clean also.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Woe to you, scribes and Pharisees, pretenders (hypocrites)! For you are like tombs that have been whitewashed, which look beautiful on the outside but inside are full of dead men''s bones and everything impure.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Just so, you also outwardly seem to people to be just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' upright but inside you are full of pretense and lawlessness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' iniquity. [Ps. 5:9.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Woe to you, scribes and Pharisees, pretenders (hypocrites)! For you build tombs for the prophets and decorate the monuments of the righteous,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So observe and practice all they tell you; but do not do what they do, for they preach, but do not practice.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Saying, If we had lived in the days of our forefathers, we would not have aided them in shedding the blood of the prophets.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Thus you are testifying against yourselves that you are the descendants of those who murdered the prophets.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Fill up, then, the measure of your fathers'' sins to the brim [so that nothing may be wanting to a full measure].'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' You serpents! You spawn of vipers! How can you escape the penalty to be suffered in hell (Gehenna)?'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Because of this, take notice: I am sending you prophets and wise men (interpreters and teachers) and scribes (men learned in the Mosaic Law and the Prophets); some of them you will kill, even crucify, and some you will flog in your synagogues and pursue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persecute from town to town,'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' So that upon your heads may come all the blood of the righteous (those who correspond to the divine standard of right) shed on earth, from the blood of the righteous Abel to the blood of Zechariah son of Barachiah, whom you murdered between the sanctuary and the altar [of burnt offering]. [Gen. 4:8; II Chron. 24:21.]'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Truly I declare to you, all these [evil, calamitous times] will come upon this generation. [II Chron. 36:15, 16.]'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' O Jerusalem, Jerusalem, murdering the prophets and stoning those who are sent to you! How often would I have gathered your children together as a mother fowl gathers her brood under her wings, and you refused!'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Behold, your house is forsaken and desolate (abandoned and left destitute of God''s help). [I Kings 9:7; Jer. 22:5.]'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' For I declare to you, you will not see Me again until you say, Blessed (magnified in worship, adored, and exalted) is He Who comes in the name of the Lord! [Ps. 118:26.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' They tie up heavy loads, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hard to bear
    - type: text
      text: ', and place them on men''s shoulders, but they themselves will not lift a finger to help bear them.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' They do all their works to be seen of men; for they make wide their phylacteries (small cases enclosing certain Scripture passages, worn during prayer on the left arm and forehead) and make long their fringes [worn by all male Israelites, according to the command]. [Exod. 13:9; Num. 15:38; Deut. 6:8.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And they take pleasure in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [thus] love the place of honor at feasts and the best seats in the synagogues,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And to be greeted with honor in the marketplaces and to have people call them rabbi.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But you are not to be called rabbi (teacher), for you have one Teacher and you are all brothers.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And do not call anyone [in the church] on earth father, for you have one Father, Who is in heaven.'
