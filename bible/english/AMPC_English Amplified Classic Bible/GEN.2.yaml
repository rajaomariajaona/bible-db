document_id: GEN.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THUS THE heavens and the earth were finished, and all the host of them.'
  '10':
  - type: text
    content: ' Now a river went out of Eden to water the garden; and from there it divided and became four [river] heads.'
  '11':
  - type: text
    content: ' The first is named Pishon; it is the one flowing around the whole land of Havilah, where there is gold.'
  '12':
  - type: text
    content: ' The gold of that land is of high quality; bdellium (pearl?) and onyx stone are there.'
  '13':
  - type: text
    content: ' The second river is named Gihon; it is the one flowing around the whole land of Cush.'
  '14':
  - type: text
    content: ' The third river is named Hiddekel [the Tigris]; it is the one flowing east of Assyria. And the fourth river is the Euphrates.'
  '15':
  - type: text
    content: ' And the Lord God took the man and put him in the Garden of Eden to tend and guard '
  - type: text
    content: and
  - type: text
    content: ' keep it.'
  '16':
  - type: text
    content: ' And the Lord God commanded the man, saying, You may freely eat of every tree of the garden;'
  '17':
  - type: text
    content: ' But of the tree of the knowledge of good and evil '
  - type: text
    content: and
  - type: text
    content: ' blessing and calamity you shall not eat, for in the day that you eat of it you shall surely die.'
  '18':
  - type: text
    content: ' Now the Lord God said, It is not good (sufficient, satisfactory) that the man should be alone; I will make him a helper meet (suitable, adapted, complementary) for him.'
  '19':
  - type: text
    content: ' And out of the ground the Lord God formed every [wild] beast '
  - type: text
    content: and
  - type: text
    content: ' living creature of the field and every bird of the air and brought them to Adam to see what he would call them; and whatever Adam called every living creature, that was its name.'
  '2':
  - type: text
    content: ' And on the seventh day God ended His work which He had done; and He rested on the seventh day from all His work which He had done. [Heb. 4:9, 10.]'
  '20':
  - type: text
    content: ' And Adam gave names to all the livestock and to the birds of the air and to every [wild] beast of the field; but for Adam there was not found a helper meet (suitable, adapted, complementary) for him.'
  '21':
  - type: text
    content: ' And the Lord God caused a deep sleep to fall upon Adam; and while he slept, He took one of his ribs '
  - type: text
    content: or
  - type: text
    content: ' a part of his side and closed up the [place with] flesh.'
  '22':
  - type: text
    content: ' And the rib '
  - type: text
    content: or
  - type: text
    content: ' part of his side which the Lord God had taken from the man He built up '
  - type: text
    content: and
  - type: text
    content: ' made into a woman, and He brought her to the man.'
  '23':
  - type: text
    content: ' Then Adam said, This [creature] is now bone of my bones and flesh of my flesh; she shall be called Woman, because she was taken out of a man.'
  '24':
  - type: text
    content: ' Therefore a man shall leave his father and his mother and shall become united '
  - type: text
    content: and
  - type: text
    content: ' cleave to his wife, and they shall become one flesh. [Matt. 19:5; I Cor. 6:16; Eph. 5:31-33.]'
  '25':
  - type: text
    content: ' And the man and his wife were both naked and were not embarrassed '
  - type: text
    content: or
  - type: text
    content: ' ashamed in each other''s presence.'
  '3':
  - type: text
    content: ' And God blessed (spoke good of) the seventh day, set it apart as His own, and hallowed it, because on it God rested from all His work which He had created and done. [Exod. 20:11.]'
  '4':
  - type: text
    content: ' This is the history of the heavens and of the earth when they were created. In the day that the Lord God made the earth and the heavens–'
  '5':
  - type: text
    content: ' When no plant of the field was yet in the earth and no herb of the field had yet sprung up, for the Lord God had not [yet] caused it to rain upon the earth and there was no man to till the ground,'
  '6':
  - type: text
    content: ' But there went up a mist (fog, vapor) from the land and watered the whole surface of the ground–'
  '7':
  - type: text
    content: ' Then the Lord God formed man from the dust of the ground and breathed into his nostrils the breath '
  - type: text
    content: or
  - type: text
    content: ' spirit of life, and man became a living being. [I Cor. 15:45-49.]'
  '8':
  - type: text
    content: ' And the Lord God planted a garden toward the east, in Eden [delight]; and there He put the man whom He had formed (framed, constituted).'
  '9':
  - type: text
    content: ' And out of the ground the Lord God made to grow every tree that is pleasant to the sight '
  - type: text
    content: or
  - type: text
    content: ' to be desired–good (suitable, pleasant) for food; the tree of life also in the center of the garden, and the tree of the knowledge of [the difference between] good and evil '
  - type: text
    content: and
  - type: text
    content: ' blessing and calamity. [Rev. 2:7; 22:14, 19.]'
