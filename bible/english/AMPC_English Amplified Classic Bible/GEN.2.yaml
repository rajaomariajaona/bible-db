document_id: GEN.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THUS THE heavens and the earth were finished, and all the host of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And on the seventh day God ended His work which He had done; and He rested on the seventh day from all His work which He had done. [Heb. 4:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And God blessed (spoke good of) the seventh day, set it apart as His own, and hallowed it, because on it God rested from all His work which He had created and done. [Exod. 20:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' This is the history of the heavens and of the earth when they were created. In the day that the Lord God made the earth and the heavens–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When no plant of the field was yet in the earth and no herb of the field had yet sprung up, for the Lord God had not [yet] caused it to rain upon the earth and there was no man to till the ground,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But there went up a mist (fog, vapor) from the land and watered the whole surface of the ground–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then the Lord God formed man from the dust of the ground and breathed into his nostrils the breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' spirit of life, and man became a living being. [I Cor. 15:45-49.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Lord God planted a garden toward the east, in Eden [delight]; and there He put the man whom He had formed (framed, constituted).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And out of the ground the Lord God made to grow every tree that is pleasant to the sight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to be desired–good (suitable, pleasant) for food; the tree of life also in the center of the garden, and the tree of the knowledge of [the difference between] good and evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessing and calamity. [Rev. 2:7; 22:14, 19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Now a river went out of Eden to water the garden; and from there it divided and became four [river] heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The first is named Pishon; it is the one flowing around the whole land of Havilah, where there is gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The gold of that land is of high quality; bdellium (pearl?) and onyx stone are there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The second river is named Gihon; it is the one flowing around the whole land of Cush.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The third river is named Hiddekel [the Tigris]; it is the one flowing east of Assyria. And the fourth river is the Euphrates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the Lord God took the man and put him in the Garden of Eden to tend and guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Lord God commanded the man, saying, You may freely eat of every tree of the garden;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But of the tree of the knowledge of good and evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessing and calamity you shall not eat, for in the day that you eat of it you shall surely die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now the Lord God said, It is not good (sufficient, satisfactory) that the man should be alone; I will make him a helper meet (suitable, adapted, complementary) for him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And out of the ground the Lord God formed every [wild] beast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' living creature of the field and every bird of the air and brought them to Adam to see what he would call them; and whatever Adam called every living creature, that was its name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And Adam gave names to all the livestock and to the birds of the air and to every [wild] beast of the field; but for Adam there was not found a helper meet (suitable, adapted, complementary) for him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the Lord God caused a deep sleep to fall upon Adam; and while he slept, He took one of his ribs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a part of his side and closed up the [place with] flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the rib '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' part of his side which the Lord God had taken from the man He built up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made into a woman, and He brought her to the man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then Adam said, This [creature] is now bone of my bones and flesh of my flesh; she shall be called Woman, because she was taken out of a man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Therefore a man shall leave his father and his mother and shall become united '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cleave to his wife, and they shall become one flesh. [Matt. 19:5; I Cor. 6:16; Eph. 5:31-33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the man and his wife were both naked and were not embarrassed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ashamed in each other''s presence.'
