document_id: PSA.15,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', WHO shall dwell [temporarily] in Your tabernacle? Who shall dwell [permanently] on Your holy hill?'
  '2':
  - type: text
    content: ' He who walks '
  - type: text
    content: and
  - type: text
    content: ' lives uprightly '
  - type: text
    content: and
  - type: text
    content: ' blamelessly, who works rightness '
  - type: text
    content: and
  - type: text
    content: ' justice and speaks '
  - type: text
    content: and
  - type: text
    content: ' thinks the truth in his heart,'
  '3':
  - type: text
    content: ' He who does not slander with his tongue, nor does evil to his friend, nor takes up a reproach against his neighbor;'
  '4':
  - type: text
    content: ' In whose eyes a vile person is despised, but he who honors those who fear the Lord (who revere and worship Him); who swears to his own hurt and does not change;'
  '5':
  - type: text
    content: ' [He who] does not put out his money for interest [to one of his own people] and who will not take a bribe against the innocent. He who does these things shall never be moved. [Exod. 22:25, 26.]'
