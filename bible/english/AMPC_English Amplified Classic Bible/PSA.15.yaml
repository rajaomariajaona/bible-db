document_id: PSA.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', WHO shall dwell [temporarily] in Your tabernacle? Who shall dwell [permanently] on Your holy hill?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He who walks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lives uprightly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blamelessly, who works rightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice and speaks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thinks the truth in his heart,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He who does not slander with his tongue, nor does evil to his friend, nor takes up a reproach against his neighbor;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' In whose eyes a vile person is despised, but he who honors those who fear the Lord (who revere and worship Him); who swears to his own hurt and does not change;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [He who] does not put out his money for interest [to one of his own people] and who will not take a bribe against the innocent. He who does these things shall never be moved. [Exod. 22:25, 26.]'
