document_id: RUT.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN NAOMI her mother-in-law said to Ruth, My daughter, shall I not seek rest '
  - type: text
    content: or
  - type: text
    content: ' a home for you, that you may prosper?'
  '10':
  - type: text
    content: ' And he said, Blessed be you of the Lord, my daughter. For you have made this last loving-kindness greater than the former, for you have not gone after young men, whether poor or rich.'
  '11':
  - type: text
    content: ' And now, my daughter, fear not. I will do for you all you require, for all my people in the city know that you are a woman of strength (worth, bravery, capability).'
  '12':
  - type: text
    content: ' It is true that I am your near kinsman; however, there is a kinsman nearer than I.'
  '13':
  - type: text
    content: ' Remain tonight, and in the morning if he will perform for you the part of a kinsman, good; let him do it. But if he will not do the part of a kinsman for you, then, as the Lord lives, I will do the part of a kinsman for you. Lie down until the morning.'
  '14':
  - type: text
    content: ' And she lay at his feet until the morning, but arose before one could recognize another; for he said, Let it not be known that the woman came to the threshing floor.'
  '15':
  - type: text
    content: ' Also he said, Bring the mantle you are wearing and hold it. So [Ruth] held it, and he measured out six measures of barley and laid it on her. And she went into the town.'
  '16':
  - type: text
    content: ' And when she came home, her mother-in-law said, How have you fared, my daughter? And Ruth told her all that the man had done for her.'
  '17':
  - type: text
    content: ' And she said, He gave me these six measures of barley, for he said to me, Do not go empty-handed to your mother-in-law.'
  '18':
  - type: text
    content: ' Then said she, Sit still, my daughter, until you learn how the matter turns out; for the man will not rest until he finishes the matter today.'
  '2':
  - type: text
    content: ' And now is not Boaz, with whose maidens you were, our relative? See, he is winnowing barley tonight at the threshing floor.'
  '3':
  - type: text
    content: ' Wash and anoint yourself therefore, and put on your best clothes and go down to the threshing floor, but do not make yourself known to the man until he has finished eating and drinking.'
  '4':
  - type: text
    content: ' But when he lies down, notice the place where he lies; then go and uncover his feet and lie down. And he will tell you what to do.'
  '5':
  - type: text
    content: ' And Ruth said to her, All that you say to me I will do.'
  '6':
  - type: text
    content: ' So she went down to the threshing floor and did just as her mother-in-law had told her.'
  '7':
  - type: text
    content: ' And when Boaz had eaten and drunk and his heart was merry, he went to lie down at the end of the heap of grain. Then [Ruth] came softly and uncovered his feet and lay down.'
  '8':
  - type: text
    content: ' At midnight the man was startled, and he turned over, and behold, a woman lay at his feet!'
  '9':
  - type: text
    content: ' And he said, Who are you? And she answered, I am Ruth your maidservant. Spread your wing [of protection] over your maidservant, for you are a next of kin.'
