document_id: HEB.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THE main point of what we have to say is this: We have such a High Priest, One Who is seated at the right hand of the majestic [God] in heaven, [Ps. 110:1.]'
  '10':
  - type: text
    content: ' For this is the covenant that I will make with the house of Israel after those days, says the Lord: I will imprint My laws upon their minds, even upon their innermost thoughts '
  - type: text
    content: and
  - type: text
    content: ' understanding, and engrave them upon their hearts; and I will be their God, and they shall be My people.'
  '11':
  - type: text
    content: ' And it will nevermore be necessary for each one to teach his neighbor and his fellow citizen or each one his brother, saying, Know (perceive, have knowledge of, and get acquainted by experience with) the Lord, for all will know Me, from the smallest to the greatest of them.'
  '12':
  - type: text
    content: ' For I will be merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious toward their sins and I will remember their deeds of unrighteousness no more. [Jer. 31:31-34.]'
  '13':
  - type: text
    content: ' When God speaks of a new [covenant or agreement], He makes the first one obsolete (out of use). And what is obsolete (out of use and annulled because of age) is ripe for disappearance '
  - type: text
    content: and
  - type: text
    content: ' to be dispensed with altogether.'
  '2':
  - type: text
    content: ' As officiating Priest, a Minister in the holy places '
  - type: text
    content: and
  - type: text
    content: ' in the true tabernacle which is erected not by man but by the Lord.'
  '3':
  - type: text
    content: ' For every high priest is appointed to offer up gifts and sacrifices; so it is essential for this [High Priest] to have some offering to make also.'
  '4':
  - type: text
    content: ' If then He were still living on earth, He would not be a priest at all, for there are [already priests] who offer the gifts in accordance with the Law.'
  '5':
  - type: text
    content: ' [But these offer] service [merely] as a pattern and as a foreshadowing of [what has its true existence and reality in] the heavenly sanctuary. For when Moses was about to erect the tabernacle, he was warned by God, saying, See to it that you make it all [exactly] according to the copy (the model) which was shown to you on the mountain. [Exod. 25:40.]'
  '6':
  - type: text
    content: ' But as it now is, He [Christ] has acquired a [priestly] ministry which is as much superior '
  - type: text
    content: and
  - type: text
    content: ' more excellent [than the old] as the covenant (the agreement) of which He is the Mediator (the Arbiter, Agent) is superior '
  - type: text
    content: and
  - type: text
    content: ' more excellent, [because] it is enacted '
  - type: text
    content: and
  - type: text
    content: ' rests upon more important (sublimer, higher, and nobler) promises.'
  '7':
  - type: text
    content: ' For if that first covenant had been without defect, there would have been no room for another one '
  - type: text
    content: or
  - type: text
    content: ' an attempt to institute another one.'
  '8':
  - type: text
    content: ' However, He finds fault with them [showing its inadequacy] when He says, Behold, the days will come, says the Lord, when I will make '
  - type: text
    content: and
  - type: text
    content: ' ratify a new covenant '
  - type: text
    content: or
  - type: text
    content: ' agreement with the house of Israel and with the house of Judah.'
  '9':
  - type: text
    content: ' It will not be like the covenant that I made with their forefathers on the day when I grasped them by the hand to help '
  - type: text
    content: and
  - type: text
    content: ' relieve them '
  - type: text
    content: and
  - type: text
    content: ' to lead them out from the land of Egypt, for they did not abide in My agreement with them, and so I withdrew My favor '
  - type: text
    content: and
  - type: text
    content: ' disregarded them, says the Lord.'
