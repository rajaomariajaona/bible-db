document_id: HEB.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THE main point of what we have to say is this: We have such a High Priest, One Who is seated at the right hand of the majestic [God] in heaven, [Ps. 110:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' As officiating Priest, a Minister in the holy places '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in the true tabernacle which is erected not by man but by the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For every high priest is appointed to offer up gifts and sacrifices; so it is essential for this [High Priest] to have some offering to make also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' If then He were still living on earth, He would not be a priest at all, for there are [already priests] who offer the gifts in accordance with the Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [But these offer] service [merely] as a pattern and as a foreshadowing of [what has its true existence and reality in] the heavenly sanctuary. For when Moses was about to erect the tabernacle, he was warned by God, saying, See to it that you make it all [exactly] according to the copy (the model) which was shown to you on the mountain. [Exod. 25:40.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But as it now is, He [Christ] has acquired a [priestly] ministry which is as much superior '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more excellent [than the old] as the covenant (the agreement) of which He is the Mediator (the Arbiter, Agent) is superior '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more excellent, [because] it is enacted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rests upon more important (sublimer, higher, and nobler) promises.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For if that first covenant had been without defect, there would have been no room for another one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' an attempt to institute another one.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' However, He finds fault with them [showing its inadequacy] when He says, Behold, the days will come, says the Lord, when I will make '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ratify a new covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' agreement with the house of Israel and with the house of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' It will not be like the covenant that I made with their forefathers on the day when I grasped them by the hand to help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relieve them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to lead them out from the land of Egypt, for they did not abide in My agreement with them, and so I withdrew My favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disregarded them, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For this is the covenant that I will make with the house of Israel after those days, says the Lord: I will imprint My laws upon their minds, even upon their innermost thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding, and engrave them upon their hearts; and I will be their God, and they shall be My people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And it will nevermore be necessary for each one to teach his neighbor and his fellow citizen or each one his brother, saying, Know (perceive, have knowledge of, and get acquainted by experience with) the Lord, for all will know Me, from the smallest to the greatest of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For I will be merciful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gracious toward their sins and I will remember their deeds of unrighteousness no more. [Jer. 31:31-34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When God speaks of a new [covenant or agreement], He makes the first one obsolete (out of use). And what is obsolete (out of use and annulled because of age) is ripe for disappearance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be dispensed with altogether.'
