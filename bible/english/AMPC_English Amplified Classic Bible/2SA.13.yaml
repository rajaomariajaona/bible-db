document_id: 2SA.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' ABSALOM SON of David had a fair sister whose name was Tamar, and Amnon [her half brother] son of David loved her.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Then Amnon said to Tamar, Bring the food here into the bedroom, so I may eat from your hand. So Tamar took the cakes she had made and brought them into the room to Amnon her brother.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And when she brought them to him, he took hold of her and said, Come lie with me, my sister.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' She replied, No, my brother! Do not force '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humble me, for no such thing should be done in Israel! Do not do this foolhardy, scandalous thing! [Gen. 34:7.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And I, how could I rid myself of my shame? And you, you will be [considered] one of the stupid fools in Israel. Now therefore, I pray you, speak to the king, for he will not withhold me from you.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But he would not listen to her, and being stronger than she, he forced her and lay with her.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Then Amnon hated her exceedingly, so that his hatred for her was greater than the love with which he had loved her. And Amnon said to her, Get up and get out!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But she said, No! This great evil of sending me away is worse than what you did to me. But he would not listen to her.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' He called the servant who served him and said, Put this woman out of my presence now, and bolt the door after her!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Now [Tamar] was wearing a long robe with sleeves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of various colors, for in such robes were the king''s virgin daughters clad of old. Then Amnon''s servant brought her out and bolted the door after her.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And [she] put ashes on her head and tore the long, sleeved robe which she wore, and she laid her hand on her head and went away shrieking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wailing.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And Amnon was so troubled that he fell sick for his [half] sister Tamar, for she was a virgin, and Amnon thought it impossible for him to do anything to her.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And Absalom her brother said to her, Has your brother Amnon been with you? Be quiet now, my sister. He is your brother; take not this matter to heart. So Tamar dwelt in her brother Absalom''s house, a desolate woman.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' But when King David heard of all these things, he was very angry.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And Absalom spoke to Amnon neither good nor bad; for Absalom hated Amnon because he had humbled his sister Tamar.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' After two full years Absalom had sheepshearers at Baal-hazor near Ephraim, and Absalom invited all the king''s sons.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Absalom came to the king and said, Behold, your servant has sheepshearers; I pray you, let the king and his servants go with your servant.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And the king said to Absalom, No, my son, let us not all go, lest we be burdensome to you. Absalom urged David; still he would not go, but he blessed him.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Then said Absalom, If not, I pray you, let my brother Amnon go with us. And the king said to him, Why should he go with you?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' But Absalom urged him, and he let Amnon and all the king''s sons go with him.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Now Absalom commanded his servants, Notice now, when Amnon''s heart is merry with wine and when I say to you, Strike Amnon, then kill him. Fear not; have I not commanded you? Be courageous and brave.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And the servants of Absalom did to Amnon as Absalom had commanded. Then all the king''s sons arose and every man mounted his mule and fled.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But Amnon had a friend whose name was Jonadab son of Shimeah, David''s brother; and Jonadab was a very crafty man.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' While they were on the way, the word came to David, Absalom has killed all the king''s sons, and not one of them is left.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Then the king arose and tore his garments and lay on the floor; and all his servants standing by tore their clothes.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' But Jonadab son of Shimeah, David''s brother, said, Let not my lord suppose they have killed all the king''s sons; for Amnon only is dead. This purpose has shown itself on Absalom''s determined mouth ever since the day Amnon humiliated his sister Tamar.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' So let not my lord the king take the thing to heart and think all the king''s sons are dead; for Amnon only is dead.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' But Absalom fled. And the young man who kept the watch looked up, and behold, many people were coming by the way of the hillside behind him.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And Jonadab said to the king, See, the king''s sons are coming. It is as your servant said.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' And as he finished speaking, the king''s sons came and lifted up their voices and wept; and the king also and all his servants wept very bitterly.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' But Absalom fled and went to [his mother''s father] Talmai son of Ammihud, king of Geshur. And David mourned for his son [Amnon] every day.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' So Absalom fled to Geshur and was there three years.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' And the spirit of King David longed to go forth to Absalom, for he was comforted about Amnon, seeing that he was dead.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' He said to Amnon, Why are you, the king''s son, so lean and weak-looking from day to day? Will you not tell me? And Amnon said to him, I love Tamar, my [half] brother Absalom''s sister.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Jonadab said to him, Go to bed and pretend you are sick; and when your father David comes to see you, say to him, Let my sister Tamar come and give me food and prepare it in my sight, that I may see it and eat it from her hand.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' So Amnon lay down and pretended to be sick; and when the king came to see him, Amnon said to the king, I pray you, let my sister Tamar come and make me a couple of cakes in my sight, that I may eat from her hand.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then David sent home and told Tamar, Go now to your brother Amnon''s house and prepare food for him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' So Tamar went to her brother Amnon''s house, and he was in bed. And she took dough and kneaded it and made cakes in his sight and baked them.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' She took the pan and emptied it out before him, but he refused to eat. And Amnon said, Send everyone out from me. So everyone went out from him.'
