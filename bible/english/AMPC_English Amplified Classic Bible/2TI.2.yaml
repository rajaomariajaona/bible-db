document_id: 2TI.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO YOU, my son, be strong (strengthened inwardly) in the grace (spiritual blessing) that is [to be found only] in Christ Jesus.'
  '10':
  - type: text
    content: ' Therefore I [am ready to] persevere '
  - type: text
    content: and
  - type: text
    content: ' stand my ground with patience '
  - type: text
    content: and
  - type: text
    content: ' endure everything for the sake of the elect [God''s chosen], so that they too may obtain [the] salvation which is in Christ Jesus, with [the reward of] eternal glory.'
  '11':
  - type: text
    content: ' The saying is sure '
  - type: text
    content: and
  - type: text
    content: ' worthy of confidence: If we have died with Him, we shall also live with Him.'
  '12':
  - type: text
    content: ' If we endure, we shall also reign with Him. If we deny '
  - type: text
    content: and
  - type: text
    content: ' disown '
  - type: text
    content: and
  - type: text
    content: ' reject Him, He will also deny '
  - type: text
    content: and
  - type: text
    content: ' disown '
  - type: text
    content: and
  - type: text
    content: ' reject us.'
  '13':
  - type: text
    content: ' If we are faithless [do not believe and are untrue to Him], He remains true (faithful to His Word and His righteous character), for He cannot deny Himself.'
  '14':
  - type: text
    content: ' Remind [the people] of these facts and [solemnly] charge them in the presence of the Lord to avoid petty controversy over words, which does no good but upsets '
  - type: text
    content: and
  - type: text
    content: ' undermines the faith of the hearers.'
  '15':
  - type: text
    content: ' Study '
  - type: text
    content: and
  - type: text
    content: ' be eager '
  - type: text
    content: and
  - type: text
    content: ' do your utmost to present yourself to God approved (tested by trial), a workman who has no cause to be ashamed, correctly analyzing '
  - type: text
    content: and
  - type: text
    content: ' accurately dividing [rightly handling and skillfully teaching] the Word of Truth.'
  '16':
  - type: text
    content: ' But avoid all empty (vain, useless, idle) talk, for it will lead people into more '
  - type: text
    content: and
  - type: text
    content: ' more ungodliness.'
  '17':
  - type: text
    content: ' And their teaching [will devour; it] will eat its way like cancer '
  - type: text
    content: or
  - type: text
    content: ' spread like gangrene. So it is with Hymenaeus and Philetus,'
  '18':
  - type: text
    content: ' Who have missed the mark '
  - type: text
    content: and
  - type: text
    content: ' swerved from the truth by arguing that the resurrection has already taken place. They are undermining the faith of some.'
  '19':
  - type: text
    content: ' But the firm foundation of (laid by) God stands, sure '
  - type: text
    content: and
  - type: text
    content: ' unshaken, bearing this seal (inscription): The Lord knows those who are His, and, Let everyone who names [himself by] the name of the Lord give up all iniquity '
  - type: text
    content: and
  - type: text
    content: ' stand aloof from it. [Num. 16:5; Isa. 26:13.]'
  '2':
  - type: text
    content: ' And the [instructions] which you have heard from me along with many witnesses, transmit '
  - type: text
    content: and
  - type: text
    content: ' entrust [as a deposit] to reliable '
  - type: text
    content: and
  - type: text
    content: ' faithful men who will be competent '
  - type: text
    content: and
  - type: text
    content: ' qualified to teach others also.'
  '20':
  - type: text
    content: ' But in a great house there are not only vessels of gold and silver, but also [utensils] of wood and earthenware, and some for honorable '
  - type: text
    content: and
  - type: text
    content: ' noble [use] and some for menial '
  - type: text
    content: and
  - type: text
    content: ' ignoble [use].'
  '21':
  - type: text
    content: ' So whoever cleanses himself [from what is ignoble '
  - type: text
    content: and
  - type: text
    content: ' unclean, who separates himself from contact with contaminating and corrupting influences] will [then himself] be a vessel set apart '
  - type: text
    content: and
  - type: text
    content: ' useful for honorable '
  - type: text
    content: and
  - type: text
    content: ' noble purposes, consecrated '
  - type: text
    content: and
  - type: text
    content: ' profitable to the Master, fit '
  - type: text
    content: and
  - type: text
    content: ' ready for any good work.'
  '22':
  - type: text
    content: ' Shun youthful lusts '
  - type: text
    content: and
  - type: text
    content: ' flee from them, and aim at '
  - type: text
    content: and
  - type: text
    content: ' pursue righteousness (all that is virtuous and good, right living, conformity to the will of God in thought, word, and deed); [and aim at and pursue] faith, love, [and] peace (harmony and concord with others) in fellowship with all [Christians], who call upon the Lord out of a pure heart.'
  '23':
  - type: text
    content: ' But refuse (shut your mind against, have nothing to do with) trifling (ill-informed, unedifying, stupid) controversies over ignorant questionings, for you know that they foster strife '
  - type: text
    content: and
  - type: text
    content: ' breed quarrels.'
  '24':
  - type: text
    content: ' And the servant of the Lord must not be quarrelsome (fighting and contending). Instead, he must be kindly to everyone '
  - type: text
    content: and
  - type: text
    content: ' mild-tempered [preserving the bond of peace]; he must be a skilled '
  - type: text
    content: and
  - type: text
    content: ' suitable teacher, patient '
  - type: text
    content: and
  - type: text
    content: ' forbearing '
  - type: text
    content: and
  - type: text
    content: ' willing to suffer wrong.'
  '25':
  - type: text
    content: ' He must correct his opponents with courtesy '
  - type: text
    content: and
  - type: text
    content: ' gentleness, in the hope that God may grant that they will repent and come to know the Truth [that they will perceive and recognize and become accurately acquainted with and acknowledge it],'
  '26':
  - type: text
    content: ' And that they may come to their senses [and] escape out of the snare of the devil, having been held captive by him, [henceforth] to do His [God''s] will.'
  '3':
  - type: text
    content: ' Take [with me] your share of the hardships '
  - type: text
    content: and
  - type: text
    content: ' suffering [which you are called to endure] as a good (first-class) soldier of Christ Jesus.'
  '4':
  - type: text
    content: ' No soldier when in service gets entangled in the enterprises of [civilian] life; his aim is to satisfy '
  - type: text
    content: and
  - type: text
    content: ' please the one who enlisted him.'
  '5':
  - type: text
    content: ' And if anyone enters competitive games, he is not crowned unless he competes lawfully (fairly, according to the rules laid down).'
  '6':
  - type: text
    content: ' [It is] the hard-working farmer [who labors to produce] who must be the first partaker of the fruits.'
  '7':
  - type: text
    content: ' Think over these things I am saying [understand them and grasp their application], for the Lord will grant you full insight '
  - type: text
    content: and
  - type: text
    content: ' understanding in everything.'
  '8':
  - type: text
    content: ' Constantly keep in mind Jesus Christ (the Messiah) [as] risen from the dead, [as the prophesied King] descended from David, according to the good news (the Gospel) that I preach. [Ps. 16:10.]'
  '9':
  - type: text
    content: ' For that [Gospel] I am suffering affliction '
  - type: text
    content: and
  - type: text
    content: ' even wearing chains like a criminal. But the Word of God is not chained '
  - type: text
    content: or
  - type: text
    content: ' imprisoned!'
