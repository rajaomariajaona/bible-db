document_id: 2TI.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO YOU, my son, be strong (strengthened inwardly) in the grace (spiritual blessing) that is [to be found only] in Christ Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the [instructions] which you have heard from me along with many witnesses, transmit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entrust [as a deposit] to reliable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful men who will be competent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' qualified to teach others also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Take [with me] your share of the hardships '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffering [which you are called to endure] as a good (first-class) soldier of Christ Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' No soldier when in service gets entangled in the enterprises of [civilian] life; his aim is to satisfy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' please the one who enlisted him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And if anyone enters competitive games, he is not crowned unless he competes lawfully (fairly, according to the rules laid down).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [It is] the hard-working farmer [who labors to produce] who must be the first partaker of the fruits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Think over these things I am saying [understand them and grasp their application], for the Lord will grant you full insight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding in everything.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Constantly keep in mind Jesus Christ (the Messiah) [as] risen from the dead, [as the prophesied King] descended from David, according to the good news (the Gospel) that I preach. [Ps. 16:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For that [Gospel] I am suffering affliction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' even wearing chains like a criminal. But the Word of God is not chained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' imprisoned!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Therefore I [am ready to] persevere '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stand my ground with patience '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure everything for the sake of the elect [God''s chosen], so that they too may obtain [the] salvation which is in Christ Jesus, with [the reward of] eternal glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The saying is sure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthy of confidence: If we have died with Him, we shall also live with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' If we endure, we shall also reign with Him. If we deny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject Him, He will also deny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' If we are faithless [do not believe and are untrue to Him], He remains true (faithful to His Word and His righteous character), for He cannot deny Himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Remind [the people] of these facts and [solemnly] charge them in the presence of the Lord to avoid petty controversy over words, which does no good but upsets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' undermines the faith of the hearers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Study '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be eager '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do your utmost to present yourself to God approved (tested by trial), a workman who has no cause to be ashamed, correctly analyzing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accurately dividing [rightly handling and skillfully teaching] the Word of Truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But avoid all empty (vain, useless, idle) talk, for it will lead people into more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more ungodliness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And their teaching [will devour; it] will eat its way like cancer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' spread like gangrene. So it is with Hymenaeus and Philetus,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Who have missed the mark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swerved from the truth by arguing that the resurrection has already taken place. They are undermining the faith of some.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But the firm foundation of (laid by) God stands, sure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unshaken, bearing this seal (inscription): The Lord knows those who are His, and, Let everyone who names [himself by] the name of the Lord give up all iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stand aloof from it. [Num. 16:5; Isa. 26:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But in a great house there are not only vessels of gold and silver, but also [utensils] of wood and earthenware, and some for honorable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' noble [use] and some for menial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ignoble [use].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So whoever cleanses himself [from what is ignoble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unclean, who separates himself from contact with contaminating and corrupting influences] will [then himself] be a vessel set apart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' useful for honorable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' noble purposes, consecrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profitable to the Master, fit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ready for any good work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Shun youthful lusts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' flee from them, and aim at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pursue righteousness (all that is virtuous and good, right living, conformity to the will of God in thought, word, and deed); [and aim at and pursue] faith, love, [and] peace (harmony and concord with others) in fellowship with all [Christians], who call upon the Lord out of a pure heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But refuse (shut your mind against, have nothing to do with) trifling (ill-informed, unedifying, stupid) controversies over ignorant questionings, for you know that they foster strife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' breed quarrels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the servant of the Lord must not be quarrelsome (fighting and contending). Instead, he must be kindly to everyone '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mild-tempered [preserving the bond of peace]; he must be a skilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suitable teacher, patient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forbearing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' willing to suffer wrong.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' He must correct his opponents with courtesy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gentleness, in the hope that God may grant that they will repent and come to know the Truth [that they will perceive and recognize and become accurately acquainted with and acknowledge it],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And that they may come to their senses [and] escape out of the snare of the devil, having been held captive by him, [henceforth] to do His [God''s] will.'
