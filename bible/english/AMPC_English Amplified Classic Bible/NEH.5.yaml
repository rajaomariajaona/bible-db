document_id: NEH.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW THERE arose a great cry of the [poor] people and of their wives [driven to borrowing] against their Jewish brethren [the few who could afford to lend].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' I, my brethren, and my servants are lending them money and grain. Let us stop this forbidden interest! [Exod. 22:25.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Return this very day to them their fields, vineyards, olive groves, and houses, and also a hundredth of all the money, grain, new wine, and oil that you have exacted from them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then they said, We will restore these and require nothing from them. We will do as you say. Then I called the priests and took an oath of the lenders that they would do according to this promise.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' I shook out my lap and said, So may God shake out every man from his house and from [the exercise and fruits of] his labor who does not keep this promise! So may he be shaken out and emptied. And all the assembly said, Amen, and praised the Lord. And the people did according to this promise.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Also, in the twelve years after I was appointed to be their governor in Judah, from the twentieth to the thirty-second year of King Artaxerxes, neither I nor my kin ate the food allowed to [me] the governor.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But the former governors lived at the expense of the people and took from them food and wine, besides forty shekels of silver [a large monthly official salary]; yes, even their servants assumed authority over the people. But I did not so because of my [reverent] fear of God.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' I also held fast to the work on this wall; and we bought no land. And all my servants were gathered there for the work.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And there were at my table 150 Jews and officials, besides those who came to us from the nations about us.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Now these were prepared for each day: one ox and six choice sheep; also fowls were prepared for me, and once in ten days a store of all sorts of wine. Yet for all this, I did not demand [my rights] the food allowed me as governor, for the [tribute] bondage was heavy upon this people.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' O my God, [earnestly] remember me for good for all I have done for this people. [Heb. 6:10.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For some said, We, our sons and daughters, are many; therefore allow us to take grain, that we may eat and live! If we are not given grain, let us take it!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Also some said, We are mortgaging our lands, vineyards, and houses to buy grain because of the scarcity.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Others said, We have borrowed money on our fields and vineyards to pay the [Persian] king''s heavy tax.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Although our flesh is the same as that of our brethren and our children are as theirs, yet we are forced to sell our children as slaves; some of our daughters have already been thus sold, and we are powerless to redeem them, for others have our lands and vineyards.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I [Nehemiah] was very angry when I heard their cry and these words.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' I thought it over and then rebuked the nobles and officials. I told them, You are exacting interest from your own kinsmen. And I held a great assembly against them.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I said to them, We, according to our ability, have bought back our Jewish brethren who were sold to the nations; but will you even sell your brethren, that they may be sold to us? Then they were silent and found not a word to say.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Also I said, What you are doing is not good. Should you not walk in the fear of our God to prevent the taunts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproach of the nations, our enemies?'
