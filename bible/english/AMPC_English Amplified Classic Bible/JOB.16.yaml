document_id: JOB.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN JOB answered,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' [The forces of evil] have gaped at me with their mouths; they have struck me upon the cheek insolently; they massed themselves together '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conspired unanimously against me. [Ps. 22:13; 35:21.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' God has delivered me to the ungodly (to the evil one) and cast me [headlong] into the hands of the wicked (Satan''s host).'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' I was living at ease, but [Satan] crushed me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broke me apart; yes, he seized me by the neck and dashed me in pieces; then he set me up for his target.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' [Satan''s] arrows whiz around me. He slashes open my vitals and does not spare; he pours out my gall on the ground.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' [Satan] stabs me, making breach after breach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attacking again and again; he runs at me like a giant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' irresistible warrior.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' I have sewed sackcloth over my skin [as a sign of mourning] and have defiled my horn (my insignia of strength) in the dust.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' My face is red '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swollen with weeping, and on my eyelids is the shadow of death [my eyes are dimmed],'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Although there is no guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' violence in my hands and my prayer is pure.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' O earth, cover not my blood, and let my cry have no resting-place [where it will cease being heard].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Even now, behold, my Witness is in heaven, and He who vouches for me is on high. [Rom. 1:9.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I have heard many such things; wearisome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' miserable comforters are you all!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' My friends scorn me, but my eye pours out tears to God.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Oh, that there might be one who would plead for a man with God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' that he would maintain his right with Him, as a son of man pleads with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' for his neighbor! [I Tim. 2:5.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' For when a few years are come, I shall go the way from which I shall not return.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Will your futile words of wind have no end? Or what makes you so bold to answer [me like this]?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' I also could speak as you do, if you were in my stead; I could join words together against you and shake my head at you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' [But] I would strengthen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourage you with [the words of] my mouth, and the consolation of my lips would soothe your suffering.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' If I speak [to you miserable comforters], my sorrow is not soothed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' lessened; and if I refrain [from speaking], in what way am I eased? [I hardly know whether to answer you or be silent.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But now [God] has taken away my strength. You [O Lord] have made desolate all my family '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' associates.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' You have laid firm hold on me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have shriveled me up, which is a witness against me; and my leanness [and wretched state of body] are further evidence [against me]; [they] testify to my face.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' [My adversary Satan] has torn [me] in his wrath and hated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persecuted me; he has gnashed upon me with his teeth; my adversary sharpens his eyes against me.'
