document_id: JOB.16,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN JOB answered,'
  '10':
  - type: text
    content: ' [The forces of evil] have gaped at me with their mouths; they have struck me upon the cheek insolently; they massed themselves together '
  - type: text
    content: and
  - type: text
    content: ' conspired unanimously against me. [Ps. 22:13; 35:21.]'
  '11':
  - type: text
    content: ' God has delivered me to the ungodly (to the evil one) and cast me [headlong] into the hands of the wicked (Satan''s host).'
  '12':
  - type: text
    content: ' I was living at ease, but [Satan] crushed me '
  - type: text
    content: and
  - type: text
    content: ' broke me apart; yes, he seized me by the neck and dashed me in pieces; then he set me up for his target.'
  '13':
  - type: text
    content: ' [Satan''s] arrows whiz around me. He slashes open my vitals and does not spare; he pours out my gall on the ground.'
  '14':
  - type: text
    content: ' [Satan] stabs me, making breach after breach '
  - type: text
    content: and
  - type: text
    content: ' attacking again and again; he runs at me like a giant '
  - type: text
    content: and
  - type: text
    content: ' irresistible warrior.'
  '15':
  - type: text
    content: ' I have sewed sackcloth over my skin [as a sign of mourning] and have defiled my horn (my insignia of strength) in the dust.'
  '16':
  - type: text
    content: ' My face is red '
  - type: text
    content: and
  - type: text
    content: ' swollen with weeping, and on my eyelids is the shadow of death [my eyes are dimmed],'
  '17':
  - type: text
    content: ' Although there is no guilt '
  - type: text
    content: or
  - type: text
    content: ' violence in my hands and my prayer is pure.'
  '18':
  - type: text
    content: ' O earth, cover not my blood, and let my cry have no resting-place [where it will cease being heard].'
  '19':
  - type: text
    content: ' Even now, behold, my Witness is in heaven, and He who vouches for me is on high. [Rom. 1:9.]'
  '2':
  - type: text
    content: ' I have heard many such things; wearisome '
  - type: text
    content: and
  - type: text
    content: ' miserable comforters are you all!'
  '20':
  - type: text
    content: ' My friends scorn me, but my eye pours out tears to God.'
  '21':
  - type: text
    content: ' Oh, that there might be one who would plead for a man with God '
  - type: text
    content: and
  - type: text
    content: ' that he would maintain his right with Him, as a son of man pleads with '
  - type: text
    content: or
  - type: text
    content: ' for his neighbor! [I Tim. 2:5.]'
  '22':
  - type: text
    content: ' For when a few years are come, I shall go the way from which I shall not return.'
  '3':
  - type: text
    content: ' Will your futile words of wind have no end? Or what makes you so bold to answer [me like this]?'
  '4':
  - type: text
    content: ' I also could speak as you do, if you were in my stead; I could join words together against you and shake my head at you.'
  '5':
  - type: text
    content: ' [But] I would strengthen '
  - type: text
    content: and
  - type: text
    content: ' encourage you with [the words of] my mouth, and the consolation of my lips would soothe your suffering.'
  '6':
  - type: text
    content: ' If I speak [to you miserable comforters], my sorrow is not soothed '
  - type: text
    content: or
  - type: text
    content: ' lessened; and if I refrain [from speaking], in what way am I eased? [I hardly know whether to answer you or be silent.]'
  '7':
  - type: text
    content: ' But now [God] has taken away my strength. You [O Lord] have made desolate all my family '
  - type: text
    content: and
  - type: text
    content: ' associates.'
  '8':
  - type: text
    content: ' You have laid firm hold on me '
  - type: text
    content: and
  - type: text
    content: ' have shriveled me up, which is a witness against me; and my leanness [and wretched state of body] are further evidence [against me]; [they] testify to my face.'
  '9':
  - type: text
    content: ' [My adversary Satan] has torn [me] in his wrath and hated '
  - type: text
    content: and
  - type: text
    content: ' persecuted me; he has gnashed upon me with his teeth; my adversary sharpens his eyes against me.'
