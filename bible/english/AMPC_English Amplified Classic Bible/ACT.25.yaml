document_id: ACT.25,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW WHEN Festus had entered into his own province, after three days he went up from Caesarea to Jerusalem.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' But Paul replied, I am standing before Caesar''s judgment seat, where I ought to be tried. To the Jews I have done no wrong, as you know better [than your question implies].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' If then I am a wrongdoer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a criminal and have committed anything for which I deserve to die, I do not beg off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek to escape death; but if there is no ground for their accusations against me, no one can give me up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make a present of me [give me up freely] to them. I appeal to Caesar.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then Festus, when he had consulted with the [men who formed his] council, answered, You have appealed to Caesar; to Caesar you shall go.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Now after an interval of some days, Agrippa the king and Bernice arrived at Caesarea to pay their respects to Festus [to welcome him and wish him well].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And while they remained there for many days, Festus acquainted the king with Paul''s case, telling him, There is a man left a prisoner in chains by Felix;'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And when I was at Jerusalem, the chief priests and the elders of the Jews informed me about him, petitioning for a judicial hearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemnation of him.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But I replied to them that it was not the custom of the Romans to give up freely any man for punishment before the accused had met the accusers face to face and had opportunity to defend himself concerning the charge brought against him.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So when they came here together, I did not delay, but on the morrow took my place on the judgment seat and ordered that the man be brought before me.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' [But] when the accusers stood up, they brought forward no accusation [in his case] of any such misconduct as I was expecting.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Instead they had some points of controversy with him about their own religion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' superstition and concerning one Jesus, Who had died but Whom Paul kept asserting [over and over] to be alive.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And [there] the chief priests and the principal men of the Jews laid charges before him against Paul, and they kept begging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' urging him,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And I, being puzzled to know how to make inquiries into such questions, asked whether he would be willing to go to Jerusalem and there be tried regarding them.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' But when Paul had appealed to have his case retained for examination '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decision by the emperor, I ordered that he be detained until I could send him to Caesar.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Then Agrippa said to Festus, I also desire to hear the man myself. Tomorrow, [Festus] replied, you shall hear him.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' So the next day Agrippa and Bernice approached with great display, and they went into the audience hall accompanied by the military commandants and the prominent citizens of the city. At the order of Festus Paul was brought in.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Then Festus said, King Agrippa and all the men present with us, you see this man about whom the whole Jewish people came to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complained, both at Jerusalem and here, insisting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shouting that he ought not to live any longer.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' But I found nothing that he had done deserving of death. Still, as he himself appealed to the emperor, I determined to send him to Rome.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' [However] I have nothing in particular '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' definite to write to my lord concerning him. So I have brought him before all of you, and especially before you, King Agrippa, so that after [further] examination has been made, I may have something to put in writing.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' For it seems to me senseless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' absurd to send a prisoner and not state the accusations against him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Asking as a favor that he would have him brought to Jerusalem; [meanwhile] they were planning an ambush to slay him on the way.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Festus answered that Paul was in custody in Caesarea and that he himself planned to leave for there soon.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' So, said he, let those who are in a position of authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are influential among you go down with me, and if there is anything amiss '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' criminal about the man, let them so charge him.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' So when Festus had remained among them not more than eight or ten days, he went down to Caesarea, took his seat the next day on the judgment bench, and ordered Paul to be brought before him.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And when he arrived, the Jews who had come down from Jerusalem stood all around him, bringing many grave accusations against him which they were not able to prove.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Paul declared in [his own] defense, Neither against the Law of the Jews, nor against the temple, nor against Caesar have I offended in any way.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But Festus, wishing to ingratiate himself with the Jews, answered Paul, Are you willing to go up to Jerusalem and there be put on trial [before the Jewish Sanhedrin] in my presence concerning these charges?'
