document_id: ACT.25,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW WHEN Festus had entered into his own province, after three days he went up from Caesarea to Jerusalem.'
  '10':
  - type: text
    content: ' But Paul replied, I am standing before Caesar''s judgment seat, where I ought to be tried. To the Jews I have done no wrong, as you know better [than your question implies].'
  '11':
  - type: text
    content: ' If then I am a wrongdoer '
  - type: text
    content: and
  - type: text
    content: ' a criminal and have committed anything for which I deserve to die, I do not beg off '
  - type: text
    content: and
  - type: text
    content: ' seek to escape death; but if there is no ground for their accusations against me, no one can give me up '
  - type: text
    content: and
  - type: text
    content: ' make a present of me [give me up freely] to them. I appeal to Caesar.'
  '12':
  - type: text
    content: ' Then Festus, when he had consulted with the [men who formed his] council, answered, You have appealed to Caesar; to Caesar you shall go.'
  '13':
  - type: text
    content: ' Now after an interval of some days, Agrippa the king and Bernice arrived at Caesarea to pay their respects to Festus [to welcome him and wish him well].'
  '14':
  - type: text
    content: ' And while they remained there for many days, Festus acquainted the king with Paul''s case, telling him, There is a man left a prisoner in chains by Felix;'
  '15':
  - type: text
    content: ' And when I was at Jerusalem, the chief priests and the elders of the Jews informed me about him, petitioning for a judicial hearing '
  - type: text
    content: and
  - type: text
    content: ' condemnation of him.'
  '16':
  - type: text
    content: ' But I replied to them that it was not the custom of the Romans to give up freely any man for punishment before the accused had met the accusers face to face and had opportunity to defend himself concerning the charge brought against him.'
  '17':
  - type: text
    content: ' So when they came here together, I did not delay, but on the morrow took my place on the judgment seat and ordered that the man be brought before me.'
  '18':
  - type: text
    content: ' [But] when the accusers stood up, they brought forward no accusation [in his case] of any such misconduct as I was expecting.'
  '19':
  - type: text
    content: ' Instead they had some points of controversy with him about their own religion '
  - type: text
    content: or
  - type: text
    content: ' superstition and concerning one Jesus, Who had died but Whom Paul kept asserting [over and over] to be alive.'
  '2':
  - type: text
    content: ' And [there] the chief priests and the principal men of the Jews laid charges before him against Paul, and they kept begging '
  - type: text
    content: and
  - type: text
    content: ' urging him,'
  '20':
  - type: text
    content: ' And I, being puzzled to know how to make inquiries into such questions, asked whether he would be willing to go to Jerusalem and there be tried regarding them.'
  '21':
  - type: text
    content: ' But when Paul had appealed to have his case retained for examination '
  - type: text
    content: and
  - type: text
    content: ' decision by the emperor, I ordered that he be detained until I could send him to Caesar.'
  '22':
  - type: text
    content: ' Then Agrippa said to Festus, I also desire to hear the man myself. Tomorrow, [Festus] replied, you shall hear him.'
  '23':
  - type: text
    content: ' So the next day Agrippa and Bernice approached with great display, and they went into the audience hall accompanied by the military commandants and the prominent citizens of the city. At the order of Festus Paul was brought in.'
  '24':
  - type: text
    content: ' Then Festus said, King Agrippa and all the men present with us, you see this man about whom the whole Jewish people came to me '
  - type: text
    content: and
  - type: text
    content: ' complained, both at Jerusalem and here, insisting '
  - type: text
    content: and
  - type: text
    content: ' shouting that he ought not to live any longer.'
  '25':
  - type: text
    content: ' But I found nothing that he had done deserving of death. Still, as he himself appealed to the emperor, I determined to send him to Rome.'
  '26':
  - type: text
    content: ' [However] I have nothing in particular '
  - type: text
    content: and
  - type: text
    content: ' definite to write to my lord concerning him. So I have brought him before all of you, and especially before you, King Agrippa, so that after [further] examination has been made, I may have something to put in writing.'
  '27':
  - type: text
    content: ' For it seems to me senseless '
  - type: text
    content: and
  - type: text
    content: ' absurd to send a prisoner and not state the accusations against him.'
  '3':
  - type: text
    content: ' Asking as a favor that he would have him brought to Jerusalem; [meanwhile] they were planning an ambush to slay him on the way.'
  '4':
  - type: text
    content: ' Festus answered that Paul was in custody in Caesarea and that he himself planned to leave for there soon.'
  '5':
  - type: text
    content: ' So, said he, let those who are in a position of authority '
  - type: text
    content: and
  - type: text
    content: ' are influential among you go down with me, and if there is anything amiss '
  - type: text
    content: or
  - type: text
    content: ' criminal about the man, let them so charge him.'
  '6':
  - type: text
    content: ' So when Festus had remained among them not more than eight or ten days, he went down to Caesarea, took his seat the next day on the judgment bench, and ordered Paul to be brought before him.'
  '7':
  - type: text
    content: ' And when he arrived, the Jews who had come down from Jerusalem stood all around him, bringing many grave accusations against him which they were not able to prove.'
  '8':
  - type: text
    content: ' Paul declared in [his own] defense, Neither against the Law of the Jews, nor against the temple, nor against Caesar have I offended in any way.'
  '9':
  - type: text
    content: ' But Festus, wishing to ingratiate himself with the Jews, answered Paul, Are you willing to go up to Jerusalem and there be put on trial [before the Jewish Sanhedrin] in my presence concerning these charges?'
