document_id: LUK.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND [Jesus] entered Jericho and was passing through it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And there was a man called Zacchaeus, a chief tax collector, and [he was] rich.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And he was trying to see Jesus, which One He was, but he could not on account of the crowd, because he was small in stature.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So he ran on ahead and climbed up in a sycamore tree in order to see Him, for He was about to pass that way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And when Jesus reached the place, He looked up and said to him, Zacchaeus, hurry and come down; for I must stay at your house today.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So he hurried and came down, and he received '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed Him joyfully.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when the people saw it, they all muttered among themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignantly complained, He has gone in to be the guest of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lodge with a man who is devoted to sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preeminently a sinner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So then Zacchaeus stood up and solemnly declared to the Lord, See, Lord, the half of my goods I [now] give [by way of restoration] to the poor, and if I have cheated anyone out of anything, I [now] restore four times as much. [Exod. 22:1; Lev. 6:5; Num. 5:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Jesus said to him, Today is [Messianic and spiritual] salvation come to [all the members of] this household, since Zacchaeus too is a [real spiritual] son of Abraham;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For the Son of Man came to seek and to save that which was lost.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now as they were listening to these things, He proceeded to tell a parable, because He was approaching Jerusalem and because they thought that the kingdom of God was going to be brought to light '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shown forth immediately.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He therefore said, A certain nobleman went into a distant country to obtain for himself a kingdom and then to return.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Calling ten of his [own] bond servants, he gave them ten minas [each equal to about one hundred days'' wages or nearly twenty dollars] and said to them, Buy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sell with these while I go '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' then return.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But his citizens detested him and sent an embassy after him to say, We do not want this man to become ruler over us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When he returned after having received the kingdom, he ordered these bond servants to whom he had given the money to be called to him, that he might know how much each one had made by buying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' selling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The first one came before him, and he said, Lord, your mina has made ten [additional] minas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And he said to him, Well done, excellent bond servant! Because you have been faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy in a very little [thing], you shall have authority over ten cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The second one also came and said, Lord, your mina has made five more minas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And he said also to him, And you will take charge over five cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then another came and said, Lord, here is your mina, which I have kept laid up in a handkerchief.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For I was [constantly] afraid of you, because you are a stern (hard, severe) man; you pick up what you did not lay down, and you reap what you did not sow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' He said to the servant, I will judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemn you out of your own mouth, you wicked slave! You knew [did you] that I was a stern (hard, severe) man, picking up what I did not lay down, and reaping what I did not sow?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then why did you not put my money in a bank, so that on my return, I might have collected it with interest?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And he said to the bystanders, Take the mina away from him and give it to him who has the ten minas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And they said to him, Lord, he has ten minas [already]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And [said Jesus,] I tell you that to everyone who gets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has will more be given, but from the man who does not get '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' does not have, even what he has will be taken away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' [The indignant king ended by saying] But as for these enemies of mine who did not want me to reign over them–bring them here and slaughter them in my presence!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And after saying these things, Jesus went on ahead of them, going up to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' When He came near Bethphage and Bethany at the mount called [the Mount of] Olives, He sent two of His disciples,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Telling [them], Go into the village yonder; there, as you go in, you will find a donkey''s colt tied, on which no man has ever yet sat. Loose it and bring [it here].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' If anybody asks you, Why are you untying [it]? you shall say this: Because the Lord has need of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' So those who were sent went away and found it [just] as He had told them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And as they were loosening the colt, its owners said to them, Why are you untying the colt?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And they said, The Lord has need of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And they brought it to Jesus; then they threw their garments over the colt and set Jesus upon it. [Zech. 9:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And as He rode along, the people kept spreading their garments on the road. [II Kings 9:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' As He was approaching [the city], at the descent of the Mount of Olives, the whole crowd of the disciples began to rejoice and to praise God [extolling Him exultantly and] loudly for all the mighty miracles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' works of power that they had witnessed,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Crying, Blessed (celebrated with praises) is the King Who comes in the name of the Lord! Peace in heaven [freedom there from all the distresses that are experienced as the result of sin] and glory (majesty and splendor) in the highest [heaven]! [Ps. 118:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And some of the Pharisees from the throng said to Jesus, Teacher, reprove Your disciples!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' He replied, I tell you that if these keep silent, the very stones will cry out. [Hab. 2:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And as He approached, He saw the city, and He wept [audibly] over it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Exclaiming, Would that you had known personally, even at least in this your day, the things that make for peace (for freedom from all the distresses that are experienced as the result of sin and upon which your peace–your security, safety, prosperity, and happiness–depends)! But now they are hidden from your eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' For a time is coming upon you when your enemies will throw up a bank [with pointed stakes] about you and surround you and shut you in on every side. [Isa. 29:3; Jer. 6:6; Ezek. 4:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And they will dash you down to the ground, you [Jerusalem] and your children within you; and they will not leave in you one stone upon another, [all] because you did not come progressively to recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand [from observation and experience] the time of your visitation [that is, when God was visiting you, the time in which God showed Himself gracious toward you and offered you salvation through Christ].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Then He went into the temple [enclosure] and began to drive out those who were selling,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Telling them, It is written, My house shall be a house of prayer; but you have made it a cave of robbers. [Isa. 56:7; Jer. 7:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And He continued to teach day after day in the temple [porches and courts]. The chief priests and scribes and the leading men of the people were seeking to put Him to death,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' But they did not discover anything they could do, for all the people hung upon His words '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stuck by Him.'
