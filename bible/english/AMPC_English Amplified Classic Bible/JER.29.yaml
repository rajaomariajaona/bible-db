document_id: JER.29,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW THESE are the words of the letter that Jeremiah the prophet sent from Jerusalem to the rest of the elders in exile and to the priests, the prophets, and all the people whom Nebuchadnezzar had carried away captive from Jerusalem to Babylon.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For thus says the Lord, When seventy years are completed for Babylon, I will visit you and keep My good promise to you, causing you to return to this place.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For I know the thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plans that I have for you, says the Lord, thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plans for welfare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' peace and not for evil, to give you hope in your final outcome.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then you will call upon Me, and you will come and pray to Me, and I will hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed you.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then you will seek Me, inquire for, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require Me [as a vital necessity] and find Me when you search for Me with all your heart. [Deut. 4:29-30.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I will be found by you, says the Lord, and I will release you from captivity and gather you from all the nations and all the places to which I have driven you, says the Lord, and I will bring you back to the place from which I caused you to be carried away captive.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' [But as for those still in Jerusalem] because you have said, The Lord has raised up prophets for us in Babylon,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Thus says the Lord concerning the king who sits upon the throne of David and concerning all the people who dwell in this city, your brethren who did not go forth with you into captivity–'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Thus says the Lord of hosts: Behold, I am sending on them the sword, famine, and pestilence, and I will make them like vile figs which are so bad they cannot be eaten.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And I will pursue them with the sword, famine, and pestilence and will give them up to be tossed to and fro '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to be a horror to all the kingdoms of the earth, to be a curse, an astonishment, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a terror, a hissing and a reproach among all the nations to which I have driven them,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Because they have not listened to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heeded My words, says the Lord, which I sent to them persistently by My servants the prophets; but you [exiles] would not listen [either], says the Lord. [Ezek. 2:5, 7.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' This was after King Jeconiah [also called Coniah and Jehoiachin] and the queen mother, the eunuchs, the princes of Judah and Jerusalem, the craftsmen and the smiths had departed from Jerusalem.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Hear therefore the word of the Lord, all you exiles whom I have sent away from Jerusalem to Babylon.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Thus says the Lord of hosts, the God of Israel, concerning Ahab son of Kolaiah and concerning Zedekiah son of Maaseiah, who are prophesying lies to you in My name: Behold, I will deliver them into the hand of Nebuchadrezzar king of Babylon, and he will slay them [those false prophets whom you say I have raised up for you in Babylon] before your eyes! [Jer. 29:15.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And because of them, this curse shall be taken up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' used by all from Judah who are in captivity in Babylon: The Lord make you like Zedekiah and like Ahab, whom the king of Babylon roasted in the fire–'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Because they have committed folly in Israel and have committed adultery with their neighbors'' wives and have spoken words in My name falsely, which I had not commanded them. I am the One Who knows and I am witness, says the Lord.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Also you shall say this concerning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to Shemaiah of Nehelam [among the exiles in Babylon]:'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Thus says the Lord of hosts, the God of Israel: Because you have sent letters in your [own] name to all the people who are in Jerusalem and to Zephaniah son of Maaseiah the priest and to all the priests, saying,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' The Lord has made you [Zephaniah] priest instead of Jehoiada the [deputy] priest, that you should have oversight in the house of the Lord over every madman who makes himself a prophet, that you should put him in the stocks and collar.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Now therefore [continued the letter from Shemaiah in Babylon to Zephaniah in Jerusalem], why have you not rebuked Jeremiah of Anathoth, who makes himself a prophet to you?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' For he has sent to us in Babylon, saying, [This captivity of yours] is to be long; build houses and dwell in them; plant gardens and eat the fruit of them.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And Zephaniah the priest read this letter in the hearing of Jeremiah the prophet.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' [The letter was sent] by the hand of Elasah son of Shaphan and Gemariah son of Hilkiah, whom Zedekiah king of Judah sent to Babylon to Nebuchadnezzar king of Babylon. It said:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Then came the word of the Lord to Jeremiah:'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Send [this message] to all those in captivity, saying, Thus says the Lord concerning Shemaiah of Nehelam: Because Shemaiah has prophesied to you, though I did not send him, and has caused you to trust in a lie,'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Therefore thus says the Lord: Behold, I will punish Shemaiah of Nehelam and his offspring. He will not have anyone [born] to dwell among this people, nor will he see the good that I will do to My people, says the Lord, because he has spoken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' taught rebellion against the Lord.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Thus says the Lord of hosts, the God of Israel, to all the captives whom I have caused to be carried into exile from Jerusalem to Babylon:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Build yourselves houses and dwell in them; plant gardens and eat the fruit of them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Take wives and have sons and daughters; take wives for your sons and give your daughters in marriage, that they may bear sons and daughters; multiply there, and do not be diminished.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And seek (inquire for, require, and request) the peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welfare of the city to which I have caused you to be carried away captive; and pray to the Lord for it, for in the welfare of [the city in which you live] you will have welfare.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' For thus says the Lord of hosts, the God of Israel: Let not your [false] prophets and your diviners who are in your midst deceive you; pay no attention '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attach no significance to your dreams which you dream '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' to theirs,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For they prophesy falsely to you in My name. I have not sent them, says the Lord.'
