document_id: GEN.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHEN MEN began to multiply on the face of the land and daughters were born to them,'
  '10':
  - type: text
    content: ' And Noah became the father of three sons: Shem, Ham, and Japheth.'
  '11':
  - type: text
    content: ' The earth was depraved '
  - type: text
    content: and
  - type: text
    content: ' putrid in God''s sight, and the land was filled with violence (desecration, infringement, outrage, assault, and lust for power).'
  '12':
  - type: text
    content: ' And God looked upon the world and saw how degenerate, debased, '
  - type: text
    content: and
  - type: text
    content: ' vicious it was, for all humanity had corrupted their way upon the earth '
  - type: text
    content: and
  - type: text
    content: ' lost their true direction.'
  '13':
  - type: text
    content: ' God said to Noah, I intend to make an end of all flesh, for through men the land is filled with violence; and behold, I will destroy them and the land.'
  '14':
  - type: text
    content: ' Make yourself an ark of gopher '
  - type: text
    content: or
  - type: text
    content: ' cypress wood; make in '
  - type: text
    content: it
  - type: text
    content: ' rooms (stalls, pens, coops, nests, cages, and compartments) and cover it inside and out with pitch (bitumen).'
  '15':
  - type: text
    content: ' And this is the way you are to make it: the length of the ark shall be 300 cubits, its breadth 50 cubits, and its height 30 cubits [that is, 450 ft. x 75 ft. x 45 ft.].'
  '16':
  - type: text
    content: ' You shall make a roof or window [a place for light] for the ark and finish it to a cubit [at least 18 inches] above–and the door of the ark you shall put in the side of it; and you shall make it with lower, second, and third stories.'
  '17':
  - type: text
    content: ' For behold, I, even I, will bring a flood of waters upon the earth to destroy '
  - type: text
    content: and
  - type: text
    content: ' make putrid all flesh under the heavens in which are the breath '
  - type: text
    content: and
  - type: text
    content: ' spirit of life; everything that is on the land shall die.'
  '18':
  - type: text
    content: ' But I will establish My covenant (promise, pledge) with you, and you shall come into the ark–you and your sons and your wife and your sons'' wives with you.'
  '19':
  - type: text
    content: ' And of every living thing of all flesh [found on land], you shall bring two of every sort into the ark, to keep them alive with you; they shall be male and female.'
  '2':
  - type: text
    content: ' The sons of God saw that the daughters of men were fair, and they took wives of all they desired '
  - type: text
    content: and
  - type: text
    content: ' chose.'
  '20':
  - type: text
    content: ' Of fowls '
  - type: text
    content: and
  - type: text
    content: ' birds according to their kinds, of beasts according to their kinds, of every creeping thing of the ground according to its kind–two of every sort shall come in with you, that they may be kept alive.'
  '21':
  - type: text
    content: ' Also take with you every sort of food that is eaten, and you shall collect '
  - type: text
    content: and
  - type: text
    content: ' store it up, and it shall serve as food for you and for them.'
  '22':
  - type: text
    content: ' Noah did this; he did all that God commanded him.'
  '3':
  - type: text
    content: ' Then the Lord said, My Spirit shall not forever dwell '
  - type: text
    content: and
  - type: text
    content: ' strive with man, for he also is flesh; but his days shall yet be 120 years.'
  '4':
  - type: text
    content: ' There were giants on the earth in those days–and also afterward–when the sons of God lived with the daughters of men, and they bore children to them. These were the mighty men who were of old, men of renown.'
  '5':
  - type: text
    content: ' The Lord saw that the wickedness of man was great in the earth, and that every imagination '
  - type: text
    content: and
  - type: text
    content: ' intention of all human thinking was only evil continually.'
  '6':
  - type: text
    content: ' And the Lord regretted that He had made man on the earth, and He was grieved at heart.'
  '7':
  - type: text
    content: ' So the Lord said, I will destroy, blot out, '
  - type: text
    content: and
  - type: text
    content: ' wipe away mankind, whom I have created from the face of the ground–not only man, [but] the beasts and the creeping things and the birds of the air–for it grieves Me '
  - type: text
    content: and
  - type: text
    content: ' makes Me regretful that I have made them.'
  '8':
  - type: text
    content: ' But Noah found grace (favor) in the eyes of the Lord.'
  '9':
  - type: text
    content: ' This is the history of the generations of Noah. Noah was a just '
  - type: text
    content: and
  - type: text
    content: ' righteous man, blameless '
  - type: text
    content: in
  - type: text
    content: ' his [evil] generation; Noah walked [in habitual fellowship] with God.'
