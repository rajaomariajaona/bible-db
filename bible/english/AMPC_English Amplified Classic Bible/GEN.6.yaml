document_id: GEN.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN MEN began to multiply on the face of the land and daughters were born to them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The sons of God saw that the daughters of men were fair, and they took wives of all they desired '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then the Lord said, My Spirit shall not forever dwell '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strive with man, for he also is flesh; but his days shall yet be 120 years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' There were giants on the earth in those days–and also afterward–when the sons of God lived with the daughters of men, and they bore children to them. These were the mighty men who were of old, men of renown.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The Lord saw that the wickedness of man was great in the earth, and that every imagination '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intention of all human thinking was only evil continually.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Lord regretted that He had made man on the earth, and He was grieved at heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So the Lord said, I will destroy, blot out, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wipe away mankind, whom I have created from the face of the ground–not only man, [but] the beasts and the creeping things and the birds of the air–for it grieves Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' makes Me regretful that I have made them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But Noah found grace (favor) in the eyes of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' This is the history of the generations of Noah. Noah was a just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous man, blameless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' his [evil] generation; Noah walked [in habitual fellowship] with God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And Noah became the father of three sons: Shem, Ham, and Japheth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The earth was depraved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' putrid in God''s sight, and the land was filled with violence (desecration, infringement, outrage, assault, and lust for power).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And God looked upon the world and saw how degenerate, debased, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vicious it was, for all humanity had corrupted their way upon the earth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lost their true direction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' God said to Noah, I intend to make an end of all flesh, for through men the land is filled with violence; and behold, I will destroy them and the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Make yourself an ark of gopher '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cypress wood; make in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' rooms (stalls, pens, coops, nests, cages, and compartments) and cover it inside and out with pitch (bitumen).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And this is the way you are to make it: the length of the ark shall be 300 cubits, its breadth 50 cubits, and its height 30 cubits [that is, 450 ft. x 75 ft. x 45 ft.].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' You shall make a roof or window [a place for light] for the ark and finish it to a cubit [at least 18 inches] above–and the door of the ark you shall put in the side of it; and you shall make it with lower, second, and third stories.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For behold, I, even I, will bring a flood of waters upon the earth to destroy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make putrid all flesh under the heavens in which are the breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit of life; everything that is on the land shall die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But I will establish My covenant (promise, pledge) with you, and you shall come into the ark–you and your sons and your wife and your sons'' wives with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And of every living thing of all flesh [found on land], you shall bring two of every sort into the ark, to keep them alive with you; they shall be male and female.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Of fowls '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' birds according to their kinds, of beasts according to their kinds, of every creeping thing of the ground according to its kind–two of every sort shall come in with you, that they may be kept alive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Also take with you every sort of food that is eaten, and you shall collect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' store it up, and it shall serve as food for you and for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Noah did this; he did all that God commanded him.'
