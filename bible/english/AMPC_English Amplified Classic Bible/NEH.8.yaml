document_id: NEH.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN ALL the people gathered together as one man in the broad place before the Water Gate; and they asked Ezra the scribe to bring the Book of the Law of Moses, which the Lord had given to Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Ezra the priest brought the Law before the assembly of both men and women and all who could hear with understanding, on the first of the seventh month.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He read from it, facing the broad place before the Water Gate, from early morning until noon, in the presence of the men and women and those who could understand; and all the people were attentive to the Book of the Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Ezra the scribe stood on a wooden pulpit which they had made for the purpose. And beside him stood Mattithiah, Shema, Anaiah, Uriah, Hilkiah, and Maaseiah on his right hand; and on his left hand, Pedaiah, Mishael, Malchijah, Hashum, Hashbaddana, Zechariah, and Meshullam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Ezra opened the book in sight of all the people, for he was standing above them; and when he opened it, all the people stood up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Ezra blessed the Lord, the great God. And all the people answered, Amen, Amen, lifting up their hands; and they bowed their heads and worshiped the Lord with faces to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Also Jeshua, Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, Pelaiah–the Levites–helped the people to understand the Law, and the people [remained] in their place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So they read from the Book of the Law of God distinctly, faithfully amplifying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' giving the sense so that [the people] understood the reading.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Nehemiah, who was the governor, and Ezra the priest and scribe, and the Levites who taught the people said to all of them, This day is holy to the Lord your God; mourn not nor weep. For all the people wept when they heard the words of the Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then [Ezra] told them, Go your way, eat the fat, drink the sweet drink, and send portions to him for whom nothing is prepared; for this day is holy to our Lord. And be not grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depressed, for the joy of the Lord is your strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stronghold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So the Levites quieted all the people, saying, Be still, for the day is holy. And do not be grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sad.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And all the people went their way to eat, drink, send portions, and make great rejoicing, for they had understood the words that were declared to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' On the second day, all the heads of fathers'' houses, with the priests and Levites, gathered to Ezra the scribe to study '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand the words of divine instruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And they found written in the law, which the Lord had commanded through Moses, that the Israelites should dwell in booths during the feast of the seventh month'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And that they should publish and proclaim in all their towns and in Jerusalem, saying, Go out to the hills and bring branches of olive, wild olive, myrtle, palm, and other leafy trees to make booths, as it is written. [Lev. 23:39, 40.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So the people went out and brought them and made themselves booths, each on the roof of his house and in their courts and the courts of God''s house and in the squares of the Water Gate and the Gate of Ephraim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' All the assembly of returned exiles made booths and dwelt in them; for since the days of Jeshua (Joshua) son of Nun up to that day, the Israelites had not done so. And there was very great rejoicing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Also day by day, from the first day to the last, Ezra read from the Book of the Law of God. They kept the feast for seven days; the eighth day was a [closing] solemn assembly, according to the ordinance.'
