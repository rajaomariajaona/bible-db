document_id: PSA.54,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; with stringed instruments. A skillful song, {or} a didactic {or} reflective poem, of David, when the Ziphites went and told Saul, David is hiding among us.
  - type: text
    content: ' SAVE ME, O God, by Your name; judge '
  - type: text
    content: and
  - type: text
    content: ' vindicate me by Your mighty strength '
  - type: text
    content: and
  - type: text
    content: ' power.'
  '2':
  - type: text
    content: ' Hear my pleading '
  - type: text
    content: and
  - type: text
    content: ' my prayer, O God; give ear to the words of my mouth.'
  '3':
  - type: text
    content: ' For strangers '
  - type: text
    content: and
  - type: text
    content: ' insolent men are rising up against me, and violent men '
  - type: text
    content: and
  - type: text
    content: ' ruthless ones seek '
  - type: text
    content: and
  - type: text
    content: ' demand my life; they do not set God before them. Selah [pause, and calmly think of that]!'
  '4':
  - type: text
    content: ' Behold, God is my helper '
  - type: text
    content: and
  - type: text
    content: ' ally; the Lord is my upholder '
  - type: text
    content: and
  - type: text
    content: ' is with them who uphold my life.'
  '5':
  - type: text
    content: ' He will pay back evil to my enemies; in Your faithfulness [Lord] put an end to them.'
  '6':
  - type: text
    content: ' With a freewill offering I will sacrifice to You; I will give thanks '
  - type: text
    content: and
  - type: text
    content: ' praise Your name, O Lord, for it is good.'
  '7':
  - type: text
    content: ' For He has delivered me out of every trouble, and my eye has looked [in triumph] on my enemies.'
