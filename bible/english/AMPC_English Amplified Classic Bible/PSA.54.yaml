document_id: PSA.54,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; with stringed instruments. A skillful song, {or} a didactic {or} reflective poem, of David, when the Ziphites went and told Saul, David is hiding among us.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' SAVE ME, O God, by Your name; judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindicate me by Your mighty strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Hear my pleading '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my prayer, O God; give ear to the words of my mouth.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For strangers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insolent men are rising up against me, and violent men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruthless ones seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' demand my life; they do not set God before them. Selah [pause, and calmly think of that]!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Behold, God is my helper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ally; the Lord is my upholder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is with them who uphold my life.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' He will pay back evil to my enemies; in Your faithfulness [Lord] put an end to them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' With a freewill offering I will sacrifice to You; I will give thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise Your name, O Lord, for it is good.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For He has delivered me out of every trouble, and my eye has looked [in triumph] on my enemies.'
