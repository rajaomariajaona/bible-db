document_id: JOB.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN ZOPHAR the Naamathite replied,'
  '10':
  - type: text
    content: ' If [God] sweeps in and arrests and calls into judgment, who can hinder Him? [If He is against a man, who shall call Him to account for it?]'
  '11':
  - type: text
    content: ' For He recognizes '
  - type: text
    content: and
  - type: text
    content: ' knows hollow, wicked, '
  - type: text
    content: and
  - type: text
    content: ' useless men (men of falsehood); when He sees iniquity, will He not consider it?'
  '12':
  - type: text
    content: ' But a stupid man will get wisdom [only] when a wild donkey''s colt is born a man [as when he thinks himself free because he is lifted up in pride].'
  '13':
  - type: text
    content: ' If you set your heart aright and stretch out your hands to [God],'
  '14':
  - type: text
    content: ' If you put sin out of your hand '
  - type: text
    content: and
  - type: text
    content: ' far away from you and let not evil dwell in your tents;'
  '15':
  - type: text
    content: ' Then can you lift up your face to Him without stain [of sin, and unashamed]; yes, you shall be steadfast '
  - type: text
    content: and
  - type: text
    content: ' secure; you shall not fear.'
  '16':
  - type: text
    content: ' For you shall forget your misery; you shall remember it as waters that pass away.'
  '17':
  - type: text
    content: ' And [your] life shall be clearer than the noonday '
  - type: text
    content: and
  - type: text
    content: ' rise above it; though there be darkness, it shall be as the morning.'
  '18':
  - type: text
    content: ' And you shall be secure '
  - type: text
    content: and
  - type: text
    content: ' feel confident because there is hope; yes, you shall search about you, and you shall take your rest in safety.'
  '19':
  - type: text
    content: ' You shall lie down, and none shall make you afraid; yes, many shall sue for your favor.'
  '2':
  - type: text
    content: ' Should not the multitude of words be answered? And should a man full of talk [and making such great professions] be pronounced free from guilt '
  - type: text
    content: or
  - type: text
    content: ' blame?'
  '20':
  - type: text
    content: ' But the eyes of the wicked shall look [for relief] in vain, and they shall not escape [the justice of God]; and their hope shall be to give up the ghost.'
  '3':
  - type: text
    content: ' Should your boastings '
  - type: text
    content: and
  - type: text
    content: ' babble make men keep silent? And when you mock '
  - type: text
    content: and
  - type: text
    content: ' scoff, shall no man make you ashamed?'
  '4':
  - type: text
    content: ' For you have said, My doctrine [that God afflicts the righteous knowingly] is pure, and I am clean in [God''s] eyes. [Job 10:7.]'
  '5':
  - type: text
    content: ' But oh, that God would speak, and open His lips against you,'
  '6':
  - type: text
    content: ' And that He would show you the secrets of wisdom! For He is manifold in understanding! Know therefore that God exacts of you less than your guilt '
  - type: text
    content: and
  - type: text
    content: ' iniquity [deserve].'
  '7':
  - type: text
    content: ' Can you find out the deep things of God, or can you by searching find out the limits of the Almighty [explore His depths, ascend to His heights, extend to His breadths, and comprehend His infinite perfection]?'
  '8':
  - type: text
    content: ' His wisdom is as high as the heights of heaven! What can you do? It is deeper than Sheol (the place of the dead)! What can you know?'
  '9':
  - type: text
    content: ' Longer in measure [and scope] is it than the earth, and broader than the sea.'
