document_id: JOB.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN ZOPHAR the Naamathite replied,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Should not the multitude of words be answered? And should a man full of talk [and making such great professions] be pronounced free from guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' blame?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Should your boastings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' babble make men keep silent? And when you mock '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scoff, shall no man make you ashamed?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For you have said, My doctrine [that God afflicts the righteous knowingly] is pure, and I am clean in [God''s] eyes. [Job 10:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But oh, that God would speak, and open His lips against you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And that He would show you the secrets of wisdom! For He is manifold in understanding! Know therefore that God exacts of you less than your guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' iniquity [deserve].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Can you find out the deep things of God, or can you by searching find out the limits of the Almighty [explore His depths, ascend to His heights, extend to His breadths, and comprehend His infinite perfection]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' His wisdom is as high as the heights of heaven! What can you do? It is deeper than Sheol (the place of the dead)! What can you know?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Longer in measure [and scope] is it than the earth, and broader than the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' If [God] sweeps in and arrests and calls into judgment, who can hinder Him? [If He is against a man, who shall call Him to account for it?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For He recognizes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knows hollow, wicked, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' useless men (men of falsehood); when He sees iniquity, will He not consider it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But a stupid man will get wisdom [only] when a wild donkey''s colt is born a man [as when he thinks himself free because he is lifted up in pride].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' If you set your heart aright and stretch out your hands to [God],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' If you put sin out of your hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' far away from you and let not evil dwell in your tents;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then can you lift up your face to Him without stain [of sin, and unashamed]; yes, you shall be steadfast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' secure; you shall not fear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For you shall forget your misery; you shall remember it as waters that pass away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And [your] life shall be clearer than the noonday '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rise above it; though there be darkness, it shall be as the morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And you shall be secure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feel confident because there is hope; yes, you shall search about you, and you shall take your rest in safety.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You shall lie down, and none shall make you afraid; yes, many shall sue for your favor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But the eyes of the wicked shall look [for relief] in vain, and they shall not escape [the justice of God]; and their hope shall be to give up the ghost.'
