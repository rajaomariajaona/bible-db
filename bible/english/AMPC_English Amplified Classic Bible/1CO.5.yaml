document_id: 1CO.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IT IS actually reported that there is sexual immorality among you, impurity of a sort that is condemned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' does not occur even among the heathen; for a man has [his own] father''s wife. [Deut. 22:30; 27:20.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Not [meaning of course that you must] altogether shun the immoral people of this world, or the greedy graspers and cheats '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thieves or idolaters, since otherwise you would need to get out of the world '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' human society altogether!'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' But now I write to you not to associate with anyone who bears the name of [Christian] brother if he is known to be guilty of immorality or greed, or is an idolater [whose soul is devoted to any object that usurps the place of God], or is a person with a foul tongue [railing, abusing, reviling, slandering], or is a drunkard or a swindler '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a robber. [No] you must not so much as eat with such a person.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' What [business] of mine is it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' what right have I to judge outsiders? Is it not those inside [the church] upon whom you are to pass disciplinary judgment [passing censuring sentence on them as the facts require]?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' God alone sits in judgment on those who are outside. Drive out that wicked one from among you [expel him from your church].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And you are proud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogant! And you ought rather to mourn (bow in sorrow and in shame) until the person who has done this [shameful] thing is removed from your fellowship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your midst!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' As for my attitude, though I am absent [from you] in body, I am present in spirit, and I have already decided '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' passed judgment, as if actually present,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' In the name of the Lord Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Christ,
    - type: text
      text: ' on the man who has committed such a deed. When you and my own spirit are met together with the power of our Lord Jesus,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' You are to deliver this man over to Satan for physical discipline [to destroy carnal lusts which prompted him to incest], that [his] spirit may [yet] be saved in the day of the Lord Jesus.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' [About the condition of your church] your boasting is not good [indeed, it is most unseemly and entirely out of place]. Do you not know that [just] a little leaven will ferment the whole lump [of dough]?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Purge (clean out) the old leaven that you may be fresh (new) dough, still uncontaminated [as you are], for Christ, our Passover [Lamb], has been sacrificed.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Therefore, let us keep the feast, not with old leaven, nor with leaven of vice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' malice and wickedness, but with the unleavened [bread] of purity (nobility, honor) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sincerity and [unadulterated] truth. [Exod. 12:19; 13:7; Deut. 16:3.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' I wrote you in my [previous] letter not to associate [closely and habitually] with unchaste (impure) people–'
