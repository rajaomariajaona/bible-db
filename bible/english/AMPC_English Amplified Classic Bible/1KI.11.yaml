document_id: 1KI.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' BUT KING Solomon [defiantly] loved many foreign women–the daughter of Pharaoh, women of the Moabites, Ammonites, Edomites, Sidonians, and Hittites.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And had commanded him concerning this thing, that he should not go after other gods, but he did not do what the Lord commanded.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore the Lord said to Solomon, Because you are doing this and have not kept My covenant and My statutes, which I have commanded you, I will surely rend the kingdom from you and will give it to your servant!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' However, in your days I will not do it, for David your father''s sake. But I will rend it out of the hand of your son!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' However, I will not tear away all the kingdom, but will give one tribe to your son for David My servant''s sake and for the sake of Jerusalem, which I have chosen.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord stirred up an adversary against Solomon, Hadad the Edomite; he was of royal descent in Edom.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For when David was in Edom, and Joab the commander of Israel''s army went up to bury the slain, he slew every male in Edom.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Joab and all Israel remained there for six months, until he had cut off every male in Edom.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Hadad fled, he and certain Edomites of his father''s servants, to Egypt, Hadad being yet a little child.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They set out from Midian and came to Paran, and took men with them out of Paran and came to Egypt, to Pharaoh king of Egypt, who gave [young] Hadad a house and land and ordered provisions for him.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hadad found great favor with Pharaoh, so that he gave him in marriage the sister of his own wife Tahpenes the queen.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They were of the very nations of whom the Lord said to the Israelites, You shall not mingle with them, neither shall they mingle with you, for surely they will turn away your hearts after their gods. Yet Solomon clung to these in love. [Deut. 17:17.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sister of Tahpenes bore Hadad Genubath his son, whom Tahpenes weaned in Pharaoh''s house; and Genubath was in Pharaoh''s household among the sons of Pharaoh.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when Hadad heard in Egypt that David slept with his fathers and that Joab the commander of Israel''s army was dead, Hadad said to Pharaoh, Let me depart, that I may go to my own country.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Pharaoh said to him, But what have you lacked with me that now you want to go to your own country? He replied, Nothing. However, let me go anyhow.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God raised up for [Hadad] another adversary, Rezon son of Eliada, who had fled from his master, Hadadezer king of Zobah.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Rezon gathered men about him and became leader of a marauding band after the slaughter by David. They went to Damascus and dwelt and made [Rezon] king in Damascus.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Rezon was an adversary to Israel all the days of Solomon, besides the mischief that Hadad did. Rezon abhorred Israel and reigned over Syria.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jeroboam son of Nebat, an Ephrathite of Zereda, Solomon''s servant, whose mother''s name was Zeruah, a widow woman, rebelled against the king–'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And for this reason: Solomon built the Millo and repaired the breaches of the city of David his father.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The man Jeroboam was a mighty man of courage. Solomon, seeing that the young man was industrious, put him in charge over all the [forced] labor of the house of Joseph.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At that time, when Jeroboam went out of Jerusalem, the prophet Ahijah the Shilonite met him on the way. Ahijah had clad himself with a new garment; and they were alone in the field.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He had 700 wives, princesses, and 300 concubines, and his wives turned away his heart from God.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ahijah caught the new garment he wore and tore it into twelve pieces.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said to Jeroboam, You take ten pieces, for thus says the Lord, the God of Israel, Behold, I will tear the kingdom from the hand of Solomon and will give you ten tribes.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But he shall have one tribe, for My servant David''s sake and for Jerusalem''s sake, the city which I have chosen out of all the tribes of Israel,'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because they have forsaken Me and have worshiped Ashtoreth the goddess of the Sidonians, Chemosh the god of the Moabites, and Milcom the god of the Ammonites, and have not walked in My ways, to do what is right in My sight, keeping My statutes and My ordinances as did David his father.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' However, I will not take the whole kingdom out of his hand; but I will make him ruler all the days of his life for David My servant''s sake, whom I chose because he kept My commandments and My statutes.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I will take the kingdom out of his son''s hand and give it to you, ten tribes.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet to his son I will give one tribe, that David My servant may always have a light before Me in Jerusalem, the city where I have chosen to put My Name.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will take you, and you shall reign according to all that your soul desires; and you shall be king over Israel.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if you will hearken to all I command you and will walk in My ways and do right in My sight, keeping My statutes and My commandments, as David My servant did, I will be with you and build you a sure house, as I built for David, and will give Israel to you.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will for this afflict the descendants of David, but not forever.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For when Solomon was old, his wives turned away his heart after other gods, and his heart was not perfect (complete and whole) with the Lord his God, as was the heart of David his father.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Solomon sought therefore to kill Jeroboam. But Jeroboam arose and fled into Egypt, to Shishak king of Egypt, and was in Egypt until Solomon died.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The rest of the acts of Solomon–and all that he did, and his wisdom (skill)–are they not written in the book of the acts of Solomon?'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The time Solomon reigned in Jerusalem over all Israel was forty years.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Solomon slept with his fathers and was buried in the city of David his father. Rehoboam his son reigned in his stead.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Solomon went after Ashtoreth the goddess of the Sidonians, and after Milcom the abominable idol of the Ammonites! [I Kings 9:6-9.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Solomon did evil in the sight of the Lord, and went not fully after the Lord, as David his father did.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Solomon built a high place for Chemosh the abominable idol of Moab, on the hill opposite Jerusalem, and for Molech the abominable idol of the Ammonites.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he did so for all of his foreign wives, who burned incense and sacrificed to their gods.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord was angry with Solomon because his heart was turned from the Lord, the God of Israel, Who had appeared to him twice,'
