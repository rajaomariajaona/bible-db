document_id: PSA.107
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O GIVE thanks to the Lord, for He is good; for His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness endure forever!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let the redeemed of the Lord say so, whom He has delivered from the hand of the adversary,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And gathered them out of the lands, from the east and from the west, from the north and from the [Red] Sea in the south.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Some wandered in the wilderness in a solitary desert track; they found no city for habitation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Hungry and thirsty, they fainted; their lives were near to being extinguished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then they cried to the Lord in their trouble, and He delivered them out of their distresses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He led them forth by the straight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right way, that they might go to a city where they could establish their homes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Oh, that men would praise [and confess to] the Lord for His goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness and His wonderful works to the children of men!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For He satisfies the longing soul and fills the hungry soul with good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Some sat in darkness and in the shadow of death, being bound in affliction and in irons, [Luke 1:79.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Because they had rebelled against the words of God and spurned the counsel of the Most High.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Therefore He bowed down their hearts with hard labor; they stumbled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fell down, and there was none to help.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then they cried to the Lord in their trouble, and He saved them out of their distresses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He brought them out of darkness and the shadow of death and broke apart the bonds that held them. [Ps. 68:6; Acts 12:7; 16:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Oh, that men would praise [and confess to] the Lord for His goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness and His wonderful works to the children of men!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For He has broken the gates of bronze and cut the bars of iron apart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Some are fools [made ill] because of the way of their transgressions and are afflicted because of their iniquities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' They loathe every kind of food, and they draw near to the gates of death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then they cry to the Lord in their trouble, and He delivers them out of their distresses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He sends forth His word and heals them and rescues them from the pit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction. [II Kings 20:4, 5; Matt. 8:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Oh, that men would praise [and confess to] the Lord for His goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness and His wonderful works to the children of men! [Heb. 13:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And let them sacrifice the sacrifices of thanksgiving and rehearse His deeds with shouts of joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' singing!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Some go down to the sea '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' travel over it in ships to do business in great waters;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' These see the works of the Lord and His wonders in the deep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For He commands and raises up the stormy wind, which lifts up the waves of the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' [Those aboard] mount up to the heavens, they go down again to the deeps; their courage melts away because of their plight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' They reel to and fro and stagger like a drunken man and are at their wits'' end [all their wisdom has come to nothing].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then they cry to the Lord in their trouble, and He brings them out of their distresses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' He hushes the storm to a calm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to a gentle whisper, so that the waves of the sea are still. [Ps. 89:9; Matt. 8:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Then the men are glad because of the calm, and He brings them to their desired haven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Oh, that men would praise [and confess to] the Lord for His goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness and His wonderful works to the children of men!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Let them exalt Him also in the congregation of the people and praise Him in the company of the elders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' He turns rivers into a wilderness, water springs into a thirsty ground, [I Kings 17:1, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' A fruitful land into a barren, salt waste, because of the wickedness of those who dwell in it. [Gen. 13:10; 14:3; 19:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' He turns a wilderness into a pool of water and a dry ground into water springs; [Isa. 41:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And there He makes the hungry to dwell, that they may prepare a city for habitation,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And sow fields, and plant vineyards which yield fruits of increase.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' He blesses them also, so that they are multiplied greatly, and allows not their cattle to decrease.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' When they are diminished and bowed down through oppression, trouble, and sorrow,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' He pours contempt upon princes and causes them to wander in waste places where there is no road.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Yet He raises the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' needy from affliction and makes their families like a flock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' The upright shall see it and be glad, but all iniquity shall shut its mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Whoso is wise [if there be any truly wise] will observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed these things; and they will diligently consider the mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness of the Lord.'
