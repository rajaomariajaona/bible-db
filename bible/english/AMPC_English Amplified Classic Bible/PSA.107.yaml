document_id: PSA.107,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' O GIVE thanks to the Lord, for He is good; for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever!'
  '10':
  - type: text
    content: ' Some sat in darkness and in the shadow of death, being bound in affliction and in irons, [Luke 1:79.]'
  '11':
  - type: text
    content: ' Because they had rebelled against the words of God and spurned the counsel of the Most High.'
  '12':
  - type: text
    content: ' Therefore He bowed down their hearts with hard labor; they stumbled '
  - type: text
    content: and
  - type: text
    content: ' fell down, and there was none to help.'
  '13':
  - type: text
    content: ' Then they cried to the Lord in their trouble, and He saved them out of their distresses.'
  '14':
  - type: text
    content: ' He brought them out of darkness and the shadow of death and broke apart the bonds that held them. [Ps. 68:6; Acts 12:7; 16:26.]'
  '15':
  - type: text
    content: ' Oh, that men would praise [and confess to] the Lord for His goodness '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness and His wonderful works to the children of men!'
  '16':
  - type: text
    content: ' For He has broken the gates of bronze and cut the bars of iron apart.'
  '17':
  - type: text
    content: ' Some are fools [made ill] because of the way of their transgressions and are afflicted because of their iniquities.'
  '18':
  - type: text
    content: ' They loathe every kind of food, and they draw near to the gates of death.'
  '19':
  - type: text
    content: ' Then they cry to the Lord in their trouble, and He delivers them out of their distresses.'
  '2':
  - type: text
    content: ' Let the redeemed of the Lord say so, whom He has delivered from the hand of the adversary,'
  '20':
  - type: text
    content: ' He sends forth His word and heals them and rescues them from the pit '
  - type: text
    content: and
  - type: text
    content: ' destruction. [II Kings 20:4, 5; Matt. 8:8.]'
  '21':
  - type: text
    content: ' Oh, that men would praise [and confess to] the Lord for His goodness '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness and His wonderful works to the children of men! [Heb. 13:15.]'
  '22':
  - type: text
    content: ' And let them sacrifice the sacrifices of thanksgiving and rehearse His deeds with shouts of joy '
  - type: text
    content: and
  - type: text
    content: ' singing!'
  '23':
  - type: text
    content: ' Some go down to the sea '
  - type: text
    content: and
  - type: text
    content: ' travel over it in ships to do business in great waters;'
  '24':
  - type: text
    content: ' These see the works of the Lord and His wonders in the deep.'
  '25':
  - type: text
    content: ' For He commands and raises up the stormy wind, which lifts up the waves of the sea.'
  '26':
  - type: text
    content: ' [Those aboard] mount up to the heavens, they go down again to the deeps; their courage melts away because of their plight.'
  '27':
  - type: text
    content: ' They reel to and fro and stagger like a drunken man and are at their wits'' end [all their wisdom has come to nothing].'
  '28':
  - type: text
    content: ' Then they cry to the Lord in their trouble, and He brings them out of their distresses.'
  '29':
  - type: text
    content: ' He hushes the storm to a calm '
  - type: text
    content: and
  - type: text
    content: ' to a gentle whisper, so that the waves of the sea are still. [Ps. 89:9; Matt. 8:26.]'
  '3':
  - type: text
    content: ' And gathered them out of the lands, from the east and from the west, from the north and from the [Red] Sea in the south.'
  '30':
  - type: text
    content: ' Then the men are glad because of the calm, and He brings them to their desired haven.'
  '31':
  - type: text
    content: ' Oh, that men would praise [and confess to] the Lord for His goodness '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness and His wonderful works to the children of men!'
  '32':
  - type: text
    content: ' Let them exalt Him also in the congregation of the people and praise Him in the company of the elders.'
  '33':
  - type: text
    content: ' He turns rivers into a wilderness, water springs into a thirsty ground, [I Kings 17:1, 7.]'
  '34':
  - type: text
    content: ' A fruitful land into a barren, salt waste, because of the wickedness of those who dwell in it. [Gen. 13:10; 14:3; 19:25.]'
  '35':
  - type: text
    content: ' He turns a wilderness into a pool of water and a dry ground into water springs; [Isa. 41:18.]'
  '36':
  - type: text
    content: ' And there He makes the hungry to dwell, that they may prepare a city for habitation,'
  '37':
  - type: text
    content: ' And sow fields, and plant vineyards which yield fruits of increase.'
  '38':
  - type: text
    content: ' He blesses them also, so that they are multiplied greatly, and allows not their cattle to decrease.'
  '39':
  - type: text
    content: ' When they are diminished and bowed down through oppression, trouble, and sorrow,'
  '4':
  - type: text
    content: ' Some wandered in the wilderness in a solitary desert track; they found no city for habitation.'
  '40':
  - type: text
    content: ' He pours contempt upon princes and causes them to wander in waste places where there is no road.'
  '41':
  - type: text
    content: ' Yet He raises the poor '
  - type: text
    content: and
  - type: text
    content: ' needy from affliction and makes their families like a flock.'
  '42':
  - type: text
    content: ' The upright shall see it and be glad, but all iniquity shall shut its mouth.'
  '43':
  - type: text
    content: ' Whoso is wise [if there be any truly wise] will observe '
  - type: text
    content: and
  - type: text
    content: ' heed these things; and they will diligently consider the mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness of the Lord.'
  '5':
  - type: text
    content: ' Hungry and thirsty, they fainted; their lives were near to being extinguished.'
  '6':
  - type: text
    content: ' Then they cried to the Lord in their trouble, and He delivered them out of their distresses.'
  '7':
  - type: text
    content: ' He led them forth by the straight '
  - type: text
    content: and
  - type: text
    content: ' right way, that they might go to a city where they could establish their homes.'
  '8':
  - type: text
    content: ' Oh, that men would praise [and confess to] the Lord for His goodness '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness and His wonderful works to the children of men!'
  '9':
  - type: text
    content: ' For He satisfies the longing soul and fills the hungry soul with good.'
