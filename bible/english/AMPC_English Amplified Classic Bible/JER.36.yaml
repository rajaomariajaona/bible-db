document_id: JER.36,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE fourth year of Jehoiakim son of Josiah king of Judah, this word came to Jeremiah from the Lord:'
  '10':
  - type: text
    content: ' Then Baruch read in the hearing of all the people the words of Jeremiah from the scroll of the book in the house of the Lord, in the chamber of Gemariah son of Shaphan the scribe, in the upper court at the entry of the New Gate of the Lord''s house.'
  '11':
  - type: text
    content: ' When Micaiah son of Gemariah, the son of Shaphan, had heard out of the book all the words of the Lord,'
  '12':
  - type: text
    content: ' He went down to the king''s house into the scribe''s chamber, and behold, all the princes were sitting there: Elishama the scribe, Delaiah son of Shemaiah, Elnathan son of Achbor, Gemariah son of Shaphan, Zedekiah son of Hananiah, and all the [other] princes.'
  '13':
  - type: text
    content: ' Then Micaiah declared to them all the words that he had heard when Baruch read the book in the hearing of the people.'
  '14':
  - type: text
    content: ' Therefore all the princes sent Jehudi son of Nethaniah, the son of Shelemiah, the son of Cushi, to Baruch, saying, Take in your hand the scroll from which you have read in the hearing of the people and come [to us]. So Baruch son of Neriah took the scroll in his hand and came to them.'
  '15':
  - type: text
    content: ' And they said to him, Sit down now and read it in our hearing. So Baruch read it in their hearing.'
  '16':
  - type: text
    content: ' Now when they had heard all the words, they turned one to another in fear and said to Baruch, We must surely tell the king of all these words.'
  '17':
  - type: text
    content: ' And they asked Baruch, Tell us now, how did you write all these words? At [Jeremiah''s] dictation?'
  '18':
  - type: text
    content: ' Then Baruch answered them, He dictated all these words to me, and I wrote them with ink in the book.'
  '19':
  - type: text
    content: ' Then the princes said to Baruch, Go and hide, you and Jeremiah, and let no one know where you are.'
  '2':
  - type: text
    content: ' Take a scroll [of parchment] for a book and write on it all the words I have spoken to you against Israel and Judah and all the nations from the day I spoke to you in the days of [King] Josiah until this day.'
  '20':
  - type: text
    content: ' Then they went into the court to the king, but they [first] put the scroll in the chamber of Elishama the scribe; then they reported all the words to the king.'
  '21':
  - type: text
    content: ' So the king sent Jehudi to get the scroll, and he took it out of the chamber of Elishama the scribe. And Jehudi read it in the hearing of the king and of all the princes who stood beside the king.'
  '22':
  - type: text
    content: ' Now it was the ninth month, and the king was sitting in the winter house, and a fire was burning there before him in the brazier.'
  '23':
  - type: text
    content: ' And [each time] when Jehudi had read three or four columns [of the scroll], he [King Jehoiakim] would cut them off with a penknife and cast them into the fire that was in the brazier, until the entire scroll was consumed in the fire that was in the brazier.'
  '24':
  - type: text
    content: ' Yet they were not afraid, nor did they rend their garments–neither the king, nor any of his servants who heard all these words.'
  '25':
  - type: text
    content: ' Even though Elnathan and Delaiah and Gemariah tried to persuade the king not to burn the scroll, he would not listen to them.'
  '26':
  - type: text
    content: ' And the king commanded Jerahmeel the king''s son and Seraiah son of Azriel and Shelemiah son of Abdeel to seize Baruch the scribe and Jeremiah the prophet, but the Lord hid them.'
  '27':
  - type: text
    content: ' Now the word of the Lord came to Jeremiah after the king had burned the scroll with the words which Baruch wrote at the dictation of Jeremiah, [and the Lord] said:'
  '28':
  - type: text
    content: ' Take another scroll and write on it all the former words that were on the first scroll, which Jehoiakim the king of Judah burned.'
  '29':
  - type: text
    content: ' And concerning Jehoiakim king of Judah you shall say, Thus says the Lord: You have burned this scroll, saying, Why have you written on it that the king of Babylon shall surely come and destroy this land and shall cut off man and beast from it?'
  '3':
  - type: text
    content: ' It may be that the house of Judah will hear all the evil which I purpose to do to them, so that each one may turn from his evil way, that I may forgive their iniquity and their sin. [Jer. 18:7-10; 26:3.]'
  '30':
  - type: text
    content: ' Therefore thus says the Lord concerning Jehoiakim king of Judah: He shall have no [heir] to sit upon the throne of David, and his dead body shall be cast out to the heat by day and to the frost by night.'
  '31':
  - type: text
    content: ' And I will punish him and his offspring and his servants for their iniquity; and I will bring upon them and the inhabitants of Jerusalem and the men of Judah all the evil that I have pronounced against them–but they would not hear.'
  '32':
  - type: text
    content: ' Then Jeremiah took another scroll and gave it to Baruch the scribe, the son of Neriah, who wrote on it at the dictation of Jeremiah all the words of the book which Jehoiakim king of Judah had burned in the fire; and besides them many similar words were added.'
  '4':
  - type: text
    content: ' Then Jeremiah called Baruch son of Neriah, and Baruch wrote upon the scroll of the book all the words which Jeremiah dictated, [words] that the Lord had spoken to him.'
  '5':
  - type: text
    content: ' And Jeremiah commanded Baruch, saying, I am [in hiding, virtually] restrained '
  - type: text
    content: and
  - type: text
    content: ' shut up; I cannot go into the house of the Lord.'
  '6':
  - type: text
    content: ' Therefore you go, and on a day of fasting, in the hearing of all the people in the Lord''s house, you shall read the words of the Lord which you have written on the scroll at my dictation. Also you shall read them in the hearing of all who come out of the cities of Judah.'
  '7':
  - type: text
    content: ' It may be that they will make their supplication [for mercy] before the Lord, and each one will turn back from his evil way, for great is the anger and the wrath that the Lord has pronounced against this people.'
  '8':
  - type: text
    content: ' And Baruch son of Neriah did according to all that Jeremiah the prophet commanded him, reading from [Jeremiah''s] book the words of the Lord in the Lord''s house.'
  '9':
  - type: text
    content: ' And in the fifth year of Jehoiakim son of Josiah king of Judah, in the ninth month, a fast was proclaimed before the Lord for all the people in Jerusalem and all the people who came to Jerusalem from the cities of Judah.'
