verses:
  '1':
  - type: text
    content: ' NOW WHEN Jesus had finished saying these things, He left Galilee and went into the part of Judea that is beyond the Jordan;'
  '10':
  - type: text
    content: ' The disciples said to Him, If the case of a man with his wife is like this, it is neither profitable '
  - type: text
    content: nor
  - type: text
    content: ' advisable to marry.'
  '11':
  - type: text
    content: ' But He said to them, Not all men can accept this saying, but it is for those to whom [the capacity to receive] it has been given.'
  '12':
  - type: text
    content: ' For there are eunuchs who have been born incapable of marriage; and there are eunuchs who have been made so by men; and there are eunuchs who have made themselves incapable of marriage for the sake of the kingdom of heaven. Let him who is able to accept this accept it.'
  '13':
  - type: text
    content: ' Then little children were brought to Jesus, that He might put His hands on them and pray; but the disciples rebuked those who brought them.'
  '14':
  - type: text
    content: ' But He said, Leave the children alone! Allow the little ones to come to Me, and do not forbid '
  - type: text
    content: or
  - type: text
    content: ' restrain '
  - type: text
    content: or
  - type: text
    content: ' hinder them, for of such [as these] is the kingdom of heaven '
  - type: text
    content: composed
  - type: text
    content: .
  '15':
  - type: text
    content: ' And He put His hands upon them, and then went on His way.'
  '16':
  - type: text
    content: ' And behold, there came a man up to Him, saying, Teacher, what excellent '
  - type: text
    content: and
  - type: text
    content: ' perfectly '
  - type: text
    content: and
  - type: text
    content: ' essentially good deed must I do to possess eternal life? [Lev. 18:5.]'
  '17':
  - type: text
    content: ' And He said to him, Why do you ask Me about the perfectly '
  - type: text
    content: and
  - type: text
    content: ' essentially good? There is only One Who is good [perfectly and essentially]–God. If you would enter into the Life, you must continually keep the commandments.'
  '18':
  - type: text
    content: ' He said to Him, What sort of commandments? [Or, which ones?] And Jesus answered, You shall not kill, You shall not commit adultery, You shall not steal, You shall not bear false witness, [Exod. 20:12-16; Deut. 5:16-20.]'
  '19':
  - type: text
    content: ' Honor your father and your mother, and, You shall love your neighbor as [you do] yourself. [Lev. 19:18; Matt. 22:39.]'
  '2':
  - type: text
    content: ' And great throngs accompanied Him, and He cured them there.'
  '20':
  - type: text
    content: ' The young man said, I have observed all these '
  - type: text
    content: from my youth;
  - type: text
    content: ' what still do I lack?'
  '21':
  - type: text
    content: ' Jesus answered him, If you would be perfect [that is, have that spiritual maturity which accompanies self-sacrificing character], go and sell what you have and give to the poor, and you will have riches in heaven; and come, be My disciple [side with My party and follow Me].'
  '22':
  - type: text
    content: ' But when the young man heard this, he went away sad (grieved and in much distress), for he had great possessions.'
  '23':
  - type: text
    content: ' And Jesus said to His disciples, Truly I say to you, it will be difficult for a rich man to get into the kingdom of heaven.'
  '24':
  - type: text
    content: ' Again I tell you, it is easier for a camel to go through the eye of a needle than for a rich man to go into the kingdom of heaven.'
  '25':
  - type: text
    content: ' When the disciples heard this, they were utterly puzzled (astonished, bewildered), saying, Who then can be saved [from eternal death]?'
  '26':
  - type: text
    content: ' But Jesus looked at them and said, With men this is impossible, but all things are possible with God. [Gen. 18:14; Job 42:2.]'
  '27':
  - type: text
    content: ' Then Peter answered Him, saying, Behold, we have left [our] all and have become Your disciples [sided with Your party and followed You]. What then shall we receive?'
  '28':
  - type: text
    content: ' Jesus said to them, Truly I say to you, in the new age [the Messianic rebirth of the world], when the Son of Man shall sit down on the throne of His glory, you who have [become My disciples, sided with My party and] followed Me will also sit on twelve thrones and judge the twelve tribes of Israel.'
  '29':
  - type: text
    content: ' And anyone '
  - type: text
    content: and
  - type: text
    content: ' everyone who has left houses or brothers or sisters or father or mother or children or lands for My name''s sake will receive many [even a hundred] times more and will inherit eternal life.'
  '3':
  - type: text
    content: ' And Pharisees came to Him and put Him to the test by asking, Is it lawful '
  - type: text
    content: and
  - type: text
    content: ' right to dismiss '
  - type: text
    content: and
  - type: text
    content: ' repudiate '
  - type: text
    content: and
  - type: text
    content: ' divorce one''s wife for any '
  - type: text
    content: and
  - type: text
    content: ' every cause?'
  '30':
  - type: text
    content: ' But many who [now] are first will be last [then], and many who [now] are last will be first [then].'
  '4':
  - type: text
    content: ' He replied, Have you never read that He Who made them from the beginning made them male and female,'
  '5':
  - type: text
    content: ' And said, For this reason a man shall leave his father and mother and shall be united firmly (joined inseparably) to his wife, and the two shall become one flesh? [Gen. 1:27; 2:24.]'
  '6':
  - type: text
    content: ' So they are no longer two, but one flesh. What therefore God has joined together, let not man put asunder (separate).'
  '7':
  - type: text
    content: ' They said to Him, Why then did Moses command [us] to give a certificate of divorce and thus to dismiss '
  - type: text
    content: and
  - type: text
    content: ' repudiate a wife? [Deut. 24:1-4.]'
  '8':
  - type: text
    content: ' He said to them, Because of the hardness (stubbornness and perversity) of your hearts Moses permitted you to dismiss '
  - type: text
    content: and
  - type: text
    content: ' repudiate '
  - type: text
    content: and
  - type: text
    content: ' divorce your wives; but from the beginning it has not been so [ordained].'
  '9':
  - type: text
    content: ' I say to you: whoever dismisses (repudiates, divorces) his wife, except for unchastity, and marries another commits adultery, '
  - type: text
    content: and he who marries a divorced woman commits adultery.
