document_id: GEN.19,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IT WAS evening when the two angels came to Sodom. Lot was sitting at Sodom''s [city] gate. Seeing them, Lot rose up to meet them and bowed to the ground.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' But the men [the angels] reached out and pulled Lot into the house to them and shut the door after him.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And they struck the men who were at the door of the house with blindness [which dazzled them], from the youths to the old men, so that they wearied themselves [groping] to find the door.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And the [two] men asked Lot, Have you any others here–sons-in-law or your sons or your daughters? Whomever you have in the city, bring them out of this place,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For we will spoil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy [Sodom]; for the outcry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shriek against its people has grown great before the Lord, and He has sent us to destroy it.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And Lot went out and spoke to his sons-in-law, who were to marry his daughters, and said, Up, get out of this place, for the Lord will spoil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy this city! But he seemed to his sons-in-law to be [only] joking.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' When morning came, the angels urged Lot to hurry, saying, Arise, take your wife and two daughters who are here [and be off], lest you [too] be consumed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swept away in the iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment of the city.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But while he lingered, the men seized him and his wife and his two daughters by the hand, for the Lord was merciful to him; and they brought him forth and set him outside the city and left him there.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And when they had brought them forth, they said, Escape for your life! Do not look behind you or stop anywhere in the whole valley; escape to the mountains [of Moab], lest you be consumed.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And Lot said to them, Oh, not that, my lords!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Behold now, your servant has found favor in your sight, and you have magnified your kindness and mercy to me in saving my life; but I cannot escape to the mountains, lest the evil overtake me, and I die.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And he said, My lords, turn aside, I beg of you, into your servant''s house and spend the night and bathe your feet. Then you can arise early and go on your way. But they said, No, we will spend the night in the square.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' See now yonder city; it is near enough to flee to, and it is a little one. Oh, let me escape to it! Is it not a little one? And my life will be saved!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And [the angel] said to him, See, I have yielded to your entreaty concerning this thing also; I will not destroy this city of which you have spoken.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Make haste and take refuge there, for I cannot do anything until you arrive there. Therefore the name of the city was called Zoar [little].'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' The sun had risen over the earth when Lot entered Zoar.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Then the Lord rained on Sodom and on Gomorrah brimstone and fire from the Lord out of the heavens.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' He overthrew, destroyed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ended those cities, and all the valley and all the inhabitants of the cities, and what grew on the ground.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' But [Lot''s] wife looked back from behind him, and she became a pillar of salt.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Abraham went up early the next morning to the place where he [only the day before] had stood before the Lord.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And he looked toward Sodom and Gomorrah, and toward all the land of the valley, and saw, and behold, the smoke of the country went up like the smoke of a furnace.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' When God ravaged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed the cities of the plain [of Siddim], He [earnestly] remembered Abraham [imprinted and fixed him indelibly on His mind], and He sent Lot out of the midst of the overthrow when He overthrew the cities where Lot lived.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' [Lot] entreated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' urged them greatly until they yielded and [with him] entered his house. And he made them a dinner [with drinking] and had unleavened bread which he baked, and they ate.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And Lot went up out of Zoar and dwelt in the mountain, and his two daughters with him, for he feared to dwell in Zoar; and he lived in a cave, he and his two daughters.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' The elder said to the younger, Our father is aging, and there is not a man on earth to live with us in the customary way.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Come, let us make our father drunk with wine, and we will lie with him, so that we may preserve offspring (our race) through our father.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And they made their father drunk with wine that night, and the older went in and lay with her father; and he was not aware of it when she lay down or when she arose.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Then the next day the firstborn said to the younger, See here, I lay last night with my father; let us make him drunk with wine tonight also, and then you go in and lie with him, so that we may preserve offspring (our race) through our father.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And they made their father drunk with wine again that night, and the younger arose and lay with him; and he was not aware of it when she lay down or when she arose.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Thus both the daughters of Lot were with child by their father.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' The older bore a son, and named him Moab [of a father]; he is the father of the Moabites to this day.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' The younger also bore a son and named him Ben-ammi [son of my people]; he is the father of the Ammonites to this day.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But before they lay down, the men of the city of Sodom, both young and old, all the men from every quarter, surrounded the house.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And they called to Lot and said, Where are the men who came to you tonight? Bring them out to us, that we may know (be intimate with) them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And Lot went out of the door to the men and shut the door after him'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And said, I beg of you, my brothers, do not behave so wickedly.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Look now, I have two daughters who are virgins; let me, I beg of you, bring them out to you, and you can do as you please with them. But only do nothing to these men, for they have come under the protection of my roof.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But they said, Stand back! And they said, This fellow came in to live here temporarily, and now he presumes to be [our] judge! Now we will deal worse with you than with them. So they rushed at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pressed violently against Lot and came close to breaking down the door.'
