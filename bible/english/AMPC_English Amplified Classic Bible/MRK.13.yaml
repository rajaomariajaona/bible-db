document_id: MRK.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND AS [Jesus] was coming out of the temple [area], one of His disciples said to Him, Look, Teacher! Notice the sort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quality of these stones and buildings!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Jesus replied to him, You see these great buildings? There will not be left here one stone upon another that will not be loosened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' torn down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And as He sat on the Mount of Olives opposite the temple [enclosure], Peter and James and John and Andrew asked Him privately,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Tell us when is this to take place and what will be the sign when these things, all [of them], are about to be accomplished?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Jesus began to tell them, Be careful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watchful that no one misleads you [about it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Many will come in [appropriating to themselves] the name [of Messiah] which belongs to Me [basing their claims on the use of My name], saying, I am [He]! And they will mislead many.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when you hear of wars and rumors of wars, do not get alarmed (troubled and frightened); it is necessary [that these things] take place, but the end is not yet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For nation will rise against nation, and kingdom against kingdom. There will be earthquakes in various places; there will be famines '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and calamities.
  - type: text
    text: ' This is but the beginning of the intolerable anguish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffering [only the first of the birth pangs].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But look to yourselves; for they will turn you over to councils, and you will be beaten in the synagogues, and you will stand before governors and kings for My sake as a testimony to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the good news (the Gospel) must first be preached to all nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now when they take you [to court] and put you under arrest, do not be anxious beforehand about what you are to say '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' ['
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' ] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: meditate about it;
  - type: text
    text: ' but say whatever is given you in that hour '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' at the moment, for it is not you who will be speaking, but the Holy Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And brother will hand over brother to death, and the father his child; and children will take a stand against their parents and [have] them put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And you will be hated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' detested by everybody for My name''s sake, but he who patiently perseveres '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endures to the end will be saved (made a partaker of the salvation by Christ, and delivered from spiritual death).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But when you see the abomination of desolation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mentioned by Daniel the prophet
  - type: text
    text: ' standing where it ought not to be–[and] let the one who reads take notice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed [this]–then let those who are in Judea flee to the mountains. [Dan. 9:27; 11:31; 12:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Let him who is on the housetop not go down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: into the house
  - type: text
    text: ' nor go inside to take anything out of his house;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And let him who is in the field not turn back again to get his mantle (cloak).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And alas for those who are pregnant and for those who have nursing babies in those days!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Pray that it may not occur in winter,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For at that time there will be such affliction (oppression and tribulation) as has not been from the beginning of the creation which God created until this particular time–and positively never will be [again].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And unless the Lord had shortened the days, no human being would be saved (rescued); but for the sake of the elect, His chosen ones (those whom He picked out for Himself), He has shortened the days. [Dan. 12:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And then if anyone says to you, See, here is the Christ (the Messiah)! or, Look, there He is! do not believe it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' False Christs (Messiahs) and false prophets will arise and show signs and [work] miracles to deceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lead astray, if possible, even the elect (those God has chosen out for Himself).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But look to yourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be on your guard; I have told you everything beforehand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But in those days, after [the affliction and oppression and distress of] that tribulation, the sun will be darkened, and the moon will not give its light; [Isa. 13:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the stars will be falling from the sky, and the powers in the heavens will be shaken. [Isa. 34:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And then they will see the Son of Man coming in clouds with great (kingly) power and glory (majesty and splendor). [Dan. 7:13, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And then He will send out the angels and will gather together His elect (those He has picked out for Himself) from the four winds, from the farthest bounds of the earth to the farthest bounds of heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Now learn a lesson from the fig tree: as soon as its branch becomes tender and it puts forth its leaves, you recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that summer is near.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' So also, when you see these things happening, you may recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that He is near, at [the very] door.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Surely I say to you, this generation (the whole multitude of people living at that one time) positively will not perish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pass away before all these things take place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Heaven and earth will perish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pass away, but My words will not perish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pass away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' But of that day or that hour not a [single] person knows, not even the angels in heaven, nor the Son, but only the Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Be on your guard [constantly alert], and watch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and pray;
  - type: text
    text: ' for you do not know when the time will come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' It is like a man [already] going on a journey; when he leaves home, he puts his servants in charge, each with his particular task, and he gives orders to the doorkeeper to be constantly alert '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on the watch.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Therefore watch (give strict attention, be cautious and alert), for you do not know when the Master of the house is coming–in the evening, or at midnight, or at cockcrowing, or in the morning–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' [Watch, I say] lest He come suddenly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unexpectedly and find you asleep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And what I say to you I say to everybody: Watch (give strict attention, be cautious, active, and alert)!'
