document_id: MRK.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND AS [Jesus] was coming out of the temple [area], one of His disciples said to Him, Look, Teacher! Notice the sort '
  - type: text
    content: and
  - type: text
    content: ' quality of these stones and buildings!'
  '10':
  - type: text
    content: ' And the good news (the Gospel) must first be preached to all nations.'
  '11':
  - type: text
    content: ' Now when they take you [to court] and put you under arrest, do not be anxious beforehand about what you are to say '
  - type: text
    content: nor
  - type: text
    content: ' ['
  - type: text
    content: even
  - type: text
    content: ' ] '
  - type: text
    content: meditate about it;
  - type: text
    content: ' but say whatever is given you in that hour '
  - type: text
    content: and
  - type: text
    content: ' at the moment, for it is not you who will be speaking, but the Holy Spirit.'
  '12':
  - type: text
    content: ' And brother will hand over brother to death, and the father his child; and children will take a stand against their parents and [have] them put to death.'
  '13':
  - type: text
    content: ' And you will be hated '
  - type: text
    content: and
  - type: text
    content: ' detested by everybody for My name''s sake, but he who patiently perseveres '
  - type: text
    content: and
  - type: text
    content: ' endures to the end will be saved (made a partaker of the salvation by Christ, and delivered from spiritual death).'
  '14':
  - type: text
    content: ' But when you see the abomination of desolation '
  - type: text
    content: mentioned by Daniel the prophet
  - type: text
    content: ' standing where it ought not to be–[and] let the one who reads take notice '
  - type: text
    content: and
  - type: text
    content: ' consider '
  - type: text
    content: and
  - type: text
    content: ' understand '
  - type: text
    content: and
  - type: text
    content: ' heed [this]–then let those who are in Judea flee to the mountains. [Dan. 9:27; 11:31; 12:11.]'
  '15':
  - type: text
    content: ' Let him who is on the housetop not go down '
  - type: text
    content: into the house
  - type: text
    content: ' nor go inside to take anything out of his house;'
  '16':
  - type: text
    content: ' And let him who is in the field not turn back again to get his mantle (cloak).'
  '17':
  - type: text
    content: ' And alas for those who are pregnant and for those who have nursing babies in those days!'
  '18':
  - type: text
    content: ' Pray that it may not occur in winter,'
  '19':
  - type: text
    content: ' For at that time there will be such affliction (oppression and tribulation) as has not been from the beginning of the creation which God created until this particular time–and positively never will be [again].'
  '2':
  - type: text
    content: ' And Jesus replied to him, You see these great buildings? There will not be left here one stone upon another that will not be loosened '
  - type: text
    content: and
  - type: text
    content: ' torn down.'
  '20':
  - type: text
    content: ' And unless the Lord had shortened the days, no human being would be saved (rescued); but for the sake of the elect, His chosen ones (those whom He picked out for Himself), He has shortened the days. [Dan. 12:1.]'
  '21':
  - type: text
    content: ' And then if anyone says to you, See, here is the Christ (the Messiah)! or, Look, there He is! do not believe it.'
  '22':
  - type: text
    content: ' False Christs (Messiahs) and false prophets will arise and show signs and [work] miracles to deceive '
  - type: text
    content: and
  - type: text
    content: ' lead astray, if possible, even the elect (those God has chosen out for Himself).'
  '23':
  - type: text
    content: ' But look to yourselves '
  - type: text
    content: and
  - type: text
    content: ' be on your guard; I have told you everything beforehand.'
  '24':
  - type: text
    content: ' But in those days, after [the affliction and oppression and distress of] that tribulation, the sun will be darkened, and the moon will not give its light; [Isa. 13:10.]'
  '25':
  - type: text
    content: ' And the stars will be falling from the sky, and the powers in the heavens will be shaken. [Isa. 34:4.]'
  '26':
  - type: text
    content: ' And then they will see the Son of Man coming in clouds with great (kingly) power and glory (majesty and splendor). [Dan. 7:13, 14.]'
  '27':
  - type: text
    content: ' And then He will send out the angels and will gather together His elect (those He has picked out for Himself) from the four winds, from the farthest bounds of the earth to the farthest bounds of heaven.'
  '28':
  - type: text
    content: ' Now learn a lesson from the fig tree: as soon as its branch becomes tender and it puts forth its leaves, you recognize '
  - type: text
    content: and
  - type: text
    content: ' know that summer is near.'
  '29':
  - type: text
    content: ' So also, when you see these things happening, you may recognize '
  - type: text
    content: and
  - type: text
    content: ' know that He is near, at [the very] door.'
  '3':
  - type: text
    content: ' And as He sat on the Mount of Olives opposite the temple [enclosure], Peter and James and John and Andrew asked Him privately,'
  '30':
  - type: text
    content: ' Surely I say to you, this generation (the whole multitude of people living at that one time) positively will not perish '
  - type: text
    content: or
  - type: text
    content: ' pass away before all these things take place.'
  '31':
  - type: text
    content: ' Heaven and earth will perish '
  - type: text
    content: and
  - type: text
    content: ' pass away, but My words will not perish '
  - type: text
    content: or
  - type: text
    content: ' pass away.'
  '32':
  - type: text
    content: ' But of that day or that hour not a [single] person knows, not even the angels in heaven, nor the Son, but only the Father.'
  '33':
  - type: text
    content: ' Be on your guard [constantly alert], and watch '
  - type: text
    content: and pray;
  - type: text
    content: ' for you do not know when the time will come.'
  '34':
  - type: text
    content: ' It is like a man [already] going on a journey; when he leaves home, he puts his servants in charge, each with his particular task, and he gives orders to the doorkeeper to be constantly alert '
  - type: text
    content: and
  - type: text
    content: ' on the watch.'
  '35':
  - type: text
    content: ' Therefore watch (give strict attention, be cautious and alert), for you do not know when the Master of the house is coming–in the evening, or at midnight, or at cockcrowing, or in the morning–'
  '36':
  - type: text
    content: ' [Watch, I say] lest He come suddenly '
  - type: text
    content: and
  - type: text
    content: ' unexpectedly and find you asleep.'
  '37':
  - type: text
    content: ' And what I say to you I say to everybody: Watch (give strict attention, be cautious, active, and alert)!'
  '4':
  - type: text
    content: ' Tell us when is this to take place and what will be the sign when these things, all [of them], are about to be accomplished?'
  '5':
  - type: text
    content: ' And Jesus began to tell them, Be careful '
  - type: text
    content: and
  - type: text
    content: ' watchful that no one misleads you [about it].'
  '6':
  - type: text
    content: ' Many will come in [appropriating to themselves] the name [of Messiah] which belongs to Me [basing their claims on the use of My name], saying, I am [He]! And they will mislead many.'
  '7':
  - type: text
    content: ' And when you hear of wars and rumors of wars, do not get alarmed (troubled and frightened); it is necessary [that these things] take place, but the end is not yet.'
  '8':
  - type: text
    content: ' For nation will rise against nation, and kingdom against kingdom. There will be earthquakes in various places; there will be famines '
  - type: text
    content: and calamities.
  - type: text
    content: ' This is but the beginning of the intolerable anguish '
  - type: text
    content: and
  - type: text
    content: ' suffering [only the first of the birth pangs].'
  '9':
  - type: text
    content: ' But look to yourselves; for they will turn you over to councils, and you will be beaten in the synagogues, and you will stand before governors and kings for My sake as a testimony to them.'
