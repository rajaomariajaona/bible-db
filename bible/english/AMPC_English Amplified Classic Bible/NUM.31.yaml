document_id: NUM.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Avenge the Israelites on the Midianites; afterward you shall be gathered to your [departed] people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Moses said to the people, Arm men from among you for the war, that they may go against Midian and execute the Lord''s vengeance on Midian [for seducing Israel]. [Num. 25:16-18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' From each of the tribes of Israel you shall send 1,000 to the war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So there were provided out of the thousands of Israel 1,000 from each tribe, 12,000 armed for war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Moses sent them to the war, 1,000 from each tribe, together with Phinehas son of Eleazar, the priest, with the [sacred] vessels of the sanctuary and the trumpets to blow the alarm in his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They fought with Midian, as the Lord commanded Moses, and slew every male,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Including the five kings of Midian: Evi, Rekem, Zur, Hur, and Reba; also Balaam son of Beor they slew with the sword. [Num. 22:31-35; Neh. 13:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the Israelites took captive the women of Midian and their little ones, and all their cattle, their flocks, and their goods as booty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They burned all the cities in which they dwelt, and all their encampments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And they took all the spoil and all the prey, both of man and of beast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then they brought the captives, the prey, and the spoil to Moses and Eleazar the priest and to the congregation of the Israelites at the camp on the plains of Moab by Jordan at Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Moses and Eleazar the priest and all the princes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' leaders of the congregation went to meet them outside the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But Moses was angry with the officers of the army, the commanders of thousands and of hundreds, who served in the war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Moses said to them, Have you let all the women live?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Behold, these caused the Israelites by the counsel of Balaam to trespass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' act treacherously against the Lord in the matter of Peor, and so a [smiting] plague came among the congregation of the Lord. [Num. 25:1-9; 31:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Now therefore, kill every male among the little ones, and kill every woman who is not a virgin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But all the young girls who have not known man by lying with him keep alive for yourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Encamp outside the camp seven days; whoever has killed any person and whoever has touched any slain, purify yourselves and your captives on the third day and on the seventh day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You shall purify every garment, all that is made of skins, all work of goats'' hair, and every article of wood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Eleazar the priest said to the men of war who had gone to battle, This is the statute of the law which the Lord has commanded Moses:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Only the gold, the silver, the bronze, the iron, the tin, and the lead,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Everything that can stand fire, you shall make go through fire, and it shall be clean. Nevertheless it shall also be purified with the water of impurity; and all that cannot stand fire [such as fabrics] you shall pass through water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And you shall wash your clothes on the seventh day and you shall be clean; then you shall come into the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Take the count of the prey that was taken, both of man and of beast, you and Eleazar the priest and the heads of the fathers'' houses of the congregation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Divide the booty into two [equal] parts between the warriors who went out to battle and all the congregation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And levy a tribute to the Lord from the warriors who went to battle, one out of every 500 of the persons, the oxen, the donkeys, and the flocks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Take [this tribute] from the warriors'' half and give it to Eleazar the priest as an offering to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And from the Israelites'' half [of the booty] you shall take one out of every fifty of the persons, the oxen, the donkeys, the flocks, and of all livestock, and give them to the Levites who have charge of the tabernacle of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And Moses and Eleazar the priest did as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' The prey, besides the booty which the men of war took, was 675,000 sheep,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And 72,000 cattle,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And 61,000 donkeys,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And 32,000 persons in all, of the women who were virgins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And the half share, the portion of those who went to war, was: 337,500 sheep,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And the Lord''s tribute of the sheep was 675;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' The cattle were 36,000, of which the Lord''s tribute was 72;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' The donkeys were 30,500, of which the Lord''s tribute was 61;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' The persons were 16,000, of whom the Lord''s tribute was 32 persons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And Moses gave the tribute which was the Lord''s offering to Eleazar the priest, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And the Israelites'' half Moses separated from that of the warriors''–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Now the congregation''s half was 337,500 sheep,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And 36,000 cattle,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And 30,500 donkeys,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And 16,000 persons–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' Even of the Israelites'' half, Moses took one of every 50, both of persons and of beasts, and gave them to the Levites, who had charge of the tabernacle of the Lord, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And the officers who were over the thousands of the army, the commanders of thousands and hundreds, came to Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' They told [him], Your servants have counted the warriors under our command, and not one man of us is missing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' We have brought as the Lord''s offering what each man obtained–articles of gold, armlets, bracelets, signet rings, earrings, neck ornaments–to make atonement for ourselves before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' Moses and Eleazar the priest took the gold from them, all the wrought articles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' And all the gold of the offering that they offered to the Lord from the commanders of thousands and of hundreds was 16,750 shekels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' For the men of war had taken booty, every man for himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' And Moses and Eleazar the priest received the gold from the commanders of thousands and of hundreds and brought it into the Tent of Meeting as a memorial for the Israelites before the Lord.'
