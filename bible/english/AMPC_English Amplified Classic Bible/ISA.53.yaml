document_id: ISA.53,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHO HAS believed (trusted in, relied upon, and clung to) our message [of that which was revealed to us]? And to whom has the arm of the Lord been disclosed? [John 12:38-41; Rom. 10:16.]'
  '10':
  - type: text
    content: ' Yet it was the will of the Lord to bruise Him; He has put Him to grief '
  - type: text
    content: and
  - type: text
    content: ' made Him sick. When You '
  - type: text
    content: and
  - type: text
    content: ' He make His life an offering for sin [and He has risen from the dead, in time to come], He shall see His [spiritual] offspring, He shall prolong His days, and the will '
  - type: text
    content: and
  - type: text
    content: ' pleasure of the Lord shall prosper in His hand.'
  '11':
  - type: text
    content: ' He shall see [the fruit] of the travail of His soul and be satisfied; by His knowledge of Himself [which He possesses and imparts to others] shall My [uncompromisingly] righteous One, My Servant, justify many '
  - type: text
    content: and
  - type: text
    content: ' make many righteous (upright and in right standing with God), for He shall bear their iniquities '
  - type: text
    content: and
  - type: text
    content: ' their guilt [with the consequences, says the Lord].'
  '12':
  - type: text
    content: ' Therefore will I divide Him a portion with the great [kings and rulers], and He shall divide the spoil with the mighty, because He poured out His life unto death, and [He let Himself] be regarded as a criminal '
  - type: text
    content: and
  - type: text
    content: ' be numbered with the transgressors; yet He bore [and took away] the sin of many and made intercession for the transgressors (the rebellious). [Luke 22:37.]'
  '2':
  - type: text
    content: ' For [the Servant of God] grew up before Him like a tender plant, and like a root out of dry ground; He has no form or comeliness [royal, kingly pomp], that we should look at Him, and no beauty that we should desire Him.'
  '3':
  - type: text
    content: ' He was despised and rejected '
  - type: text
    content: and
  - type: text
    content: ' forsaken by men, a Man of sorrows '
  - type: text
    content: and
  - type: text
    content: ' pains, and acquainted with grief '
  - type: text
    content: and
  - type: text
    content: ' sickness; and like One from Whom men hide their faces He was despised, and we did not appreciate His worth '
  - type: text
    content: or
  - type: text
    content: ' have any esteem for Him.'
  '4':
  - type: text
    content: ' Surely He has borne our griefs (sicknesses, weaknesses, and distresses) and carried our sorrows '
  - type: text
    content: and
  - type: text
    content: ' pains [of punishment], yet we [ignorantly] considered Him stricken, smitten, and afflicted by God [as if with leprosy]. [Matt. 8:17.]'
  '5':
  - type: text
    content: ' But He was wounded for our transgressions, He was bruised for our guilt '
  - type: text
    content: and
  - type: text
    content: ' iniquities; the chastisement [needful to obtain] peace '
  - type: text
    content: and
  - type: text
    content: ' well-being for us was upon Him, and with the stripes [that wounded] Him we are healed '
  - type: text
    content: and
  - type: text
    content: ' made whole.'
  '6':
  - type: text
    content: ' All we like sheep have gone astray, we have turned every one to his own way; and the Lord has made to light upon Him the guilt '
  - type: text
    content: and
  - type: text
    content: ' iniquity of us all. [I Pet. 2:24, 25.]'
  '7':
  - type: text
    content: ' He was oppressed, [yet when] He was afflicted, He was submissive '
  - type: text
    content: and
  - type: text
    content: ' opened not His mouth; like a lamb that is led to the slaughter, and as a sheep before her shearers is dumb, so He opened not His mouth.'
  '8':
  - type: text
    content: ' By oppression and judgment He was taken away; and as for His generation, who among them considered that He was cut off out of the land of the living [stricken to His death] for the transgression of my [Isaiah''s] people, to whom the stroke was due?'
  '9':
  - type: text
    content: ' And they assigned Him a grave with the wicked, and with a rich man in His death, although He had done no violence, neither was any deceit in His mouth. [Matt. 27:57-60; I Pet. 2:22, 23.]'
