document_id: 1TI.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' FIRST OF all, then, I admonish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' urge that petitions, prayers, intercessions, and thanksgivings be offered on behalf of all men,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' But by doing good deeds (deeds in themselves good and for the good and advantage of those contacted by them), as befits women who profess reverential fear for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devotion to God.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Let a woman learn in quietness, in entire submissiveness.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' I allow no woman to teach or to have authority over men; she is to remain in quietness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep silence [in religious assemblies].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For Adam was first formed, then Eve; [Gen. 2:7, 21, 22.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And it was not Adam who was deceived, but [the] woman who was deceived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deluded and fell into transgression. [Gen. 3:1-6.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Nevertheless [the sentence put upon women of pain in motherhood does not hinder their souls'' salvation, and] they will be saved [eternally] if they continue in faith and love and holiness with self-control, [saved indeed] through the Childbearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' by the birth of the divine Child.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For kings and all who are in positions of authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' high responsibility, that [outwardly] we may pass a quiet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' undisturbed life [and inwardly] a peaceable one in all godliness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverence and seriousness in every way.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For such [praying] is good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right, and [it is] pleasing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acceptable to God our Savior,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Who wishes all men to be saved and [increasingly] to perceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know precisely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' correctly the [divine] Truth.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For there [is only] one God, and [only] one Mediator between God and men, the Man Christ Jesus,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Who gave Himself as a ransom for all [people, a fact that was] attested to at the right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proper time.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And of this matter I was appointed a preacher and an apostle (special messenger)–I am speaking the truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in Christ,
    - type: text
      text: ' I do not falsify [when I say this]–a teacher of the Gentiles in [the realm of] faith and truth.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I desire therefore that in every place men should pray, without anger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' quarreling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' resentment or doubt [in their minds], lifting up holy hands.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Also [I desire] that women should adorn themselves modestly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appropriately and sensibly in seemly apparel, not with [elaborate] hair arrangement or gold or pearls or expensive clothing,'
