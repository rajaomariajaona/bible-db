document_id: 1TI.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FIRST OF all, then, I admonish '
  - type: text
    content: and
  - type: text
    content: ' urge that petitions, prayers, intercessions, and thanksgivings be offered on behalf of all men,'
  '10':
  - type: text
    content: ' But by doing good deeds (deeds in themselves good and for the good and advantage of those contacted by them), as befits women who profess reverential fear for '
  - type: text
    content: and
  - type: text
    content: ' devotion to God.'
  '11':
  - type: text
    content: ' Let a woman learn in quietness, in entire submissiveness.'
  '12':
  - type: text
    content: ' I allow no woman to teach or to have authority over men; she is to remain in quietness '
  - type: text
    content: and
  - type: text
    content: ' keep silence [in religious assemblies].'
  '13':
  - type: text
    content: ' For Adam was first formed, then Eve; [Gen. 2:7, 21, 22.]'
  '14':
  - type: text
    content: ' And it was not Adam who was deceived, but [the] woman who was deceived '
  - type: text
    content: and
  - type: text
    content: ' deluded and fell into transgression. [Gen. 3:1-6.]'
  '15':
  - type: text
    content: ' Nevertheless [the sentence put upon women of pain in motherhood does not hinder their souls'' salvation, and] they will be saved [eternally] if they continue in faith and love and holiness with self-control, [saved indeed] through the Childbearing '
  - type: text
    content: or
  - type: text
    content: ' by the birth of the divine Child.'
  '2':
  - type: text
    content: ' For kings and all who are in positions of authority '
  - type: text
    content: or
  - type: text
    content: ' high responsibility, that [outwardly] we may pass a quiet '
  - type: text
    content: and
  - type: text
    content: ' undisturbed life [and inwardly] a peaceable one in all godliness '
  - type: text
    content: and
  - type: text
    content: ' reverence and seriousness in every way.'
  '3':
  - type: text
    content: ' For such [praying] is good '
  - type: text
    content: and
  - type: text
    content: ' right, and [it is] pleasing '
  - type: text
    content: and
  - type: text
    content: ' acceptable to God our Savior,'
  '4':
  - type: text
    content: ' Who wishes all men to be saved and [increasingly] to perceive '
  - type: text
    content: and
  - type: text
    content: ' recognize '
  - type: text
    content: and
  - type: text
    content: ' discern '
  - type: text
    content: and
  - type: text
    content: ' know precisely '
  - type: text
    content: and
  - type: text
    content: ' correctly the [divine] Truth.'
  '5':
  - type: text
    content: ' For there [is only] one God, and [only] one Mediator between God and men, the Man Christ Jesus,'
  '6':
  - type: text
    content: ' Who gave Himself as a ransom for all [people, a fact that was] attested to at the right '
  - type: text
    content: and
  - type: text
    content: ' proper time.'
  '7':
  - type: text
    content: ' And of this matter I was appointed a preacher and an apostle (special messenger)–I am speaking the truth '
  - type: text
    content: in Christ,
  - type: text
    content: ' I do not falsify [when I say this]–a teacher of the Gentiles in [the realm of] faith and truth.'
  '8':
  - type: text
    content: ' I desire therefore that in every place men should pray, without anger '
  - type: text
    content: or
  - type: text
    content: ' quarreling '
  - type: text
    content: or
  - type: text
    content: ' resentment or doubt [in their minds], lifting up holy hands.'
  '9':
  - type: text
    content: ' Also [I desire] that women should adorn themselves modestly '
  - type: text
    content: and
  - type: text
    content: ' appropriately and sensibly in seemly apparel, not with [elaborate] hair arrangement or gold or pearls or expensive clothing,'
