document_id: PSA.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: +[A Psalm+] of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' UNTO YOU, O Lord, do I bring my life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' O my God, I trust, lean on, rely on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' am confident in You. Let me not be put to shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' [my hope in You] be disappointed; let not my enemies triumph over me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Yes, let none who trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wait hopefully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' look for You be put to shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' be disappointed; let them be ashamed who forsake the right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' deal treacherously without cause.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Show me Your ways, O Lord; teach me Your paths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Guide me in Your truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness and teach me, for You are the God of my salvation; for You [You only and altogether] do I wait [expectantly] all the day long.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Remember, O Lord, Your tender mercy and loving-kindness; for they have been ever from of old.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Remember not the sins (the lapses and frailties) of my youth or my transgressions; according to Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast love remember me, for Your goodness'' sake, O Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Good and upright is the Lord; therefore will He instruct sinners in [His] way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He leads the humble in what is right, and the humble He teaches His way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' All the paths of the Lord are mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast love, even truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness are they for those who keep His covenant and His testimonies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For Your name''s sake, O Lord, pardon my iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my guilt, for [they are] great.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Who is the man who reverently fears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worships the Lord? Him shall He teach in the way that he should choose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He himself shall dwell at ease, and his offspring shall inherit the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The secret [of the sweet, satisfying companionship] of the Lord have they who fear (revere and worship) Him, and He will show them His covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reveal to them its [deep, inner] meaning. [John 7:17; 15:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' My eyes are ever toward the Lord, for He will pluck my feet out of the net.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [Lord] turn to me and be gracious to me, for I am lonely and afflicted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The troubles of my heart are multiplied; bring me out of my distresses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Behold my affliction and my pain and forgive all my sins [of thinking and doing].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Consider my enemies, for they abound; they hate me with cruel hatred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' O keep me, Lord, and deliver me; let me not be ashamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' disappointed, for my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my refuge are in You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Let integrity and uprightness preserve me, for I wait for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expect You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Redeem Israel, O God, out of all their troubles.'
