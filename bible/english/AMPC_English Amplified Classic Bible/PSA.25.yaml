document_id: PSA.25,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] of David.
  - type: text
    content: ' UNTO YOU, O Lord, do I bring my life.'
  '10':
  - type: text
    content: ' All the paths of the Lord are mercy '
  - type: text
    content: and
  - type: text
    content: ' steadfast love, even truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness are they for those who keep His covenant and His testimonies.'
  '11':
  - type: text
    content: ' For Your name''s sake, O Lord, pardon my iniquity '
  - type: text
    content: and
  - type: text
    content: ' my guilt, for [they are] great.'
  '12':
  - type: text
    content: ' Who is the man who reverently fears '
  - type: text
    content: and
  - type: text
    content: ' worships the Lord? Him shall He teach in the way that he should choose.'
  '13':
  - type: text
    content: ' He himself shall dwell at ease, and his offspring shall inherit the land.'
  '14':
  - type: text
    content: ' The secret [of the sweet, satisfying companionship] of the Lord have they who fear (revere and worship) Him, and He will show them His covenant '
  - type: text
    content: and
  - type: text
    content: ' reveal to them its [deep, inner] meaning. [John 7:17; 15:15.]'
  '15':
  - type: text
    content: ' My eyes are ever toward the Lord, for He will pluck my feet out of the net.'
  '16':
  - type: text
    content: ' [Lord] turn to me and be gracious to me, for I am lonely and afflicted.'
  '17':
  - type: text
    content: ' The troubles of my heart are multiplied; bring me out of my distresses.'
  '18':
  - type: text
    content: ' Behold my affliction and my pain and forgive all my sins [of thinking and doing].'
  '19':
  - type: text
    content: ' Consider my enemies, for they abound; they hate me with cruel hatred.'
  '2':
  - type: text
    content: ' O my God, I trust, lean on, rely on, '
  - type: text
    content: and
  - type: text
    content: ' am confident in You. Let me not be put to shame '
  - type: text
    content: or
  - type: text
    content: ' [my hope in You] be disappointed; let not my enemies triumph over me.'
  '20':
  - type: text
    content: ' O keep me, Lord, and deliver me; let me not be ashamed '
  - type: text
    content: or
  - type: text
    content: ' disappointed, for my trust '
  - type: text
    content: and
  - type: text
    content: ' my refuge are in You.'
  '21':
  - type: text
    content: ' Let integrity and uprightness preserve me, for I wait for '
  - type: text
    content: and
  - type: text
    content: ' expect You.'
  '22':
  - type: text
    content: ' Redeem Israel, O God, out of all their troubles.'
  '3':
  - type: text
    content: ' Yes, let none who trust '
  - type: text
    content: and
  - type: text
    content: ' wait hopefully '
  - type: text
    content: and
  - type: text
    content: ' look for You be put to shame '
  - type: text
    content: or
  - type: text
    content: ' be disappointed; let them be ashamed who forsake the right '
  - type: text
    content: or
  - type: text
    content: ' deal treacherously without cause.'
  '4':
  - type: text
    content: ' Show me Your ways, O Lord; teach me Your paths.'
  '5':
  - type: text
    content: ' Guide me in Your truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness and teach me, for You are the God of my salvation; for You [You only and altogether] do I wait [expectantly] all the day long.'
  '6':
  - type: text
    content: ' Remember, O Lord, Your tender mercy and loving-kindness; for they have been ever from of old.'
  '7':
  - type: text
    content: ' Remember not the sins (the lapses and frailties) of my youth or my transgressions; according to Your mercy '
  - type: text
    content: and
  - type: text
    content: ' steadfast love remember me, for Your goodness'' sake, O Lord.'
  '8':
  - type: text
    content: ' Good and upright is the Lord; therefore will He instruct sinners in [His] way.'
  '9':
  - type: text
    content: ' He leads the humble in what is right, and the humble He teaches His way.'
