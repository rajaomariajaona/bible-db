document_id: 1SA.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THE boy Samuel ministered to the Lord before Eli. The word of the Lord was rare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' precious in those days; there was no frequent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' widely spread vision.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' At that time Eli, whose eyesight had dimmed so that he could not see, was lying down in his own place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The lamp of God had not yet gone out in the temple of the Lord, where the ark of God was, and Samuel was lying down'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When the Lord called, Samuel! And he answered, Here I am.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He ran to Eli and said, Here I am, for you called me. Eli said, I did not call you; lie down again. So he went and lay down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Lord called again, Samuel! And Samuel arose and went to Eli and said, Here am I; you did call me. Eli answered, I did not call, my son; lie down again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now Samuel did not yet know the Lord, and the word of the Lord was not yet revealed to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Lord called Samuel the third time. And he went to Eli and said, Here I am, for you did call me. Then Eli perceived that the Lord was calling the boy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So Eli said to Samuel, Go, lie down. And if He calls you, you shall say, Speak, Lord, for Your servant is listening. So Samuel went and lay down in his place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the Lord came and stood and called as at other times, Samuel! Samuel! Then Samuel answered, Speak, Lord, for Your servant is listening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Lord told Samuel, Behold, I am about to do a thing in Israel at which both ears of all who hear it shall tingle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' On that day I will perform against Eli all that I have spoken concerning his house, from beginning to end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And I [now] announce to him that I will judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish his house forever for the iniquity of which he knew, for his sons were bringing a curse upon themselves [blaspheming God], and he did not restrain them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Therefore I have sworn to the house of Eli that the iniquity of Eli''s house shall not be atoned for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' purged with sacrifice or offering forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Samuel lay until morning; then he opened the doors of the Lord''s house. And [he] was afraid to tell the vision to Eli.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But Eli called Samuel and said, Samuel, my son. And he answered, Here I am.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Eli said, What is it He told you? Pray do not hide it from me. May God do so to you, and more also, if you hide anything from me of all that He said to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Samuel told him everything, hiding nothing. And Eli said, It is the Lord; let Him do what seems good to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Samuel grew; the Lord was with him and let none of his words fall to the ground. [Josh. 23:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And all Israel from Dan to Beersheba knew that Samuel was established to be a prophet of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the Lord continued to appear in Shiloh, for the Lord revealed Himself to Samuel in Shiloh through the word of the Lord.'
