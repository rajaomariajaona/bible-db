document_id: PSA.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHY DO You stand afar off, O Lord? Why do You hide Yourself, [veiling Your eyes] in times of trouble (distress and desperation)?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' [The prey] is crushed, sinks down; and the helpless falls by his mighty [claws].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' [The foe] thinks in his heart, God has quite forgotten; He has hidden His face; He will never see [my deed].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Arise, O Lord! O God, lift up Your hand; forget not the humble [patient and crushed].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Why does the wicked [man] condemn (spurn and renounce) God? Why has he thought in his heart, You will not call to account?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' You have seen it; yes, You note trouble and grief (vexation) to requite it with Your hand. The unfortunate commits himself to You; You are the helper of the fatherless.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Break the arm of the wicked man; and as for the evil man, search out his wickedness until You find no more.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The Lord is King forever and ever; the nations will perish out of His land.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' O Lord, You have heard the desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the longing of the humble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppressed; You will prepare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' direct their hearts, You will cause Your ear to hear,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' To do justice to the fatherless and the oppressed, so that man, who is of the earth, may not terrify them any more.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The wicked in pride '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogance hotly pursue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persecute the poor; let them be taken in the schemes which they have devised.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' boasts (sings the praises) of his own heart''s desire, and the one greedy for gain curses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spurns, yes, renounces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' despises the Lord.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' The wicked one in the pride of his countenance will not seek, inquire for, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' yearn for God; all his thoughts are that there is no God [so He never punishes].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' His ways are grievous [or persist] at all times; Your judgments [Lord] are far above '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' on high out of his sight [so he never thinks about them]; as for all his foes, he sniffs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sneers at them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' He thinks in his heart, I shall not be moved; for throughout all generations I shall not come to want '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be in adversity.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' His mouth is full of cursing, deceit, oppression (fraud); under his tongue are trouble and sin (mischief and iniquity).'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He sits in ambush in the villages; in hiding places he slays the innocent; he watches stealthily for the poor (the helpless and unfortunate).'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' He lurks in secret places like a lion in his thicket; he lies in wait that he may seize the poor (the helpless and the unfortunate); he seizes the poor when he draws him into his net.'
