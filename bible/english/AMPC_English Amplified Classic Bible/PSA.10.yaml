document_id: PSA.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHY DO You stand afar off, O Lord? Why do You hide Yourself, [veiling Your eyes] in times of trouble (distress and desperation)?'
  '10':
  - type: text
    content: ' [The prey] is crushed, sinks down; and the helpless falls by his mighty [claws].'
  '11':
  - type: text
    content: ' [The foe] thinks in his heart, God has quite forgotten; He has hidden His face; He will never see [my deed].'
  '12':
  - type: text
    content: ' Arise, O Lord! O God, lift up Your hand; forget not the humble [patient and crushed].'
  '13':
  - type: text
    content: ' Why does the wicked [man] condemn (spurn and renounce) God? Why has he thought in his heart, You will not call to account?'
  '14':
  - type: text
    content: ' You have seen it; yes, You note trouble and grief (vexation) to requite it with Your hand. The unfortunate commits himself to You; You are the helper of the fatherless.'
  '15':
  - type: text
    content: ' Break the arm of the wicked man; and as for the evil man, search out his wickedness until You find no more.'
  '16':
  - type: text
    content: ' The Lord is King forever and ever; the nations will perish out of His land.'
  '17':
  - type: text
    content: ' O Lord, You have heard the desire '
  - type: text
    content: and
  - type: text
    content: ' the longing of the humble '
  - type: text
    content: and
  - type: text
    content: ' oppressed; You will prepare '
  - type: text
    content: and
  - type: text
    content: ' strengthen '
  - type: text
    content: and
  - type: text
    content: ' direct their hearts, You will cause Your ear to hear,'
  '18':
  - type: text
    content: ' To do justice to the fatherless and the oppressed, so that man, who is of the earth, may not terrify them any more.'
  '2':
  - type: text
    content: ' The wicked in pride '
  - type: text
    content: and
  - type: text
    content: ' arrogance hotly pursue '
  - type: text
    content: and
  - type: text
    content: ' persecute the poor; let them be taken in the schemes which they have devised.'
  '3':
  - type: text
    content: ' For the wicked '
  - type: text
    content: man
  - type: text
    content: ' boasts (sings the praises) of his own heart''s desire, and the one greedy for gain curses '
  - type: text
    content: and
  - type: text
    content: ' spurns, yes, renounces '
  - type: text
    content: and
  - type: text
    content: ' despises the Lord.'
  '4':
  - type: text
    content: ' The wicked one in the pride of his countenance will not seek, inquire for, '
  - type: text
    content: and
  - type: text
    content: ' yearn for God; all his thoughts are that there is no God [so He never punishes].'
  '5':
  - type: text
    content: ' His ways are grievous [or persist] at all times; Your judgments [Lord] are far above '
  - type: text
    content: and
  - type: text
    content: ' on high out of his sight [so he never thinks about them]; as for all his foes, he sniffs '
  - type: text
    content: and
  - type: text
    content: ' sneers at them.'
  '6':
  - type: text
    content: ' He thinks in his heart, I shall not be moved; for throughout all generations I shall not come to want '
  - type: text
    content: or
  - type: text
    content: ' be in adversity.'
  '7':
  - type: text
    content: ' His mouth is full of cursing, deceit, oppression (fraud); under his tongue are trouble and sin (mischief and iniquity).'
  '8':
  - type: text
    content: ' He sits in ambush in the villages; in hiding places he slays the innocent; he watches stealthily for the poor (the helpless and unfortunate).'
  '9':
  - type: text
    content: ' He lurks in secret places like a lion in his thicket; he lies in wait that he may seize the poor (the helpless and the unfortunate); he seizes the poor when he draws him into his net.'
