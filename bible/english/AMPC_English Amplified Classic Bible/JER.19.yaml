document_id: JER.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THUS SAYS the Lord: Go and get a potter''s earthen bottle, and take some of the old people and some of the elderly priests'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And go out to the Valley of Ben-hinnom [son of Hinnom], which is by the entrance of the Potsherd Gate; and proclaim there the words that I shall tell you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And say, Hear the word of the Lord, O kings of Judah and inhabitants of Jerusalem. Thus says the Lord of hosts, the God of Israel: Behold, I am going to bring such evil upon this place that the ears of whoever hears of it will tingle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Because the people have forsaken Me and have estranged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profaned this place [Jerusalem] by burning incense in it to other gods that neither they nor their fathers nor the kings of Judah ever knew, and because they have filled this place with the blood of innocents'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And have built the high places of Baal to burn their sons in the fire as burnt offerings to Baal, which I commanded not nor spoke of it, nor did it come into My mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heart–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore, behold, the days are coming, says the Lord, when this place shall no more be called Topheth or the Valley of Ben-hinnom [son of Hinnom], but the Valley of Slaughter. [Jer. 7:31-32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I will pour out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make void the counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the plans of [the men of] Judah and Jerusalem in this place, and I will cause their people to fall by the sword before their enemies and by the hands of those who seek their lives, and their dead bodies I will give to be food for the birds of the air and for the beasts of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I will make this city an astonishment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a horror and a hissing; everyone who passes by it will be horrified and will hiss [in scorn] because of all its plagues '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disasters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And I will cause them to eat the flesh of their sons and their daughters, and they shall eat each one the flesh of his neighbor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' friend in the siege and in the distress with which their enemies and those who seek their lives distress them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then you shall break the bottle in the sight of the men who accompany you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And say to them, Thus said the Lord of hosts: Even so will I break this people and this city as one breaks a potter''s vessel, so that it cannot be mended. Men will bury in Topheth because there will be no other place for burial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' until there is no more room to bury.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Thus will I do to this place, says the Lord, and to its inhabitants; and I will even make this city like Topheth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the houses of Jerusalem and the houses of the kings of Judah, which are defiled, shall be like the place of Topheth–even all the houses upon whose roofs incense has been burned to all the host of the heavens and drink offerings have been poured out to other gods. [Acts 7:42, 43.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then came Jeremiah from Topheth, where the Lord had sent him to prophesy, and he stood in the court of the Lord''s house and said to all the people,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Thus says the Lord of hosts, the God of Israel: Behold, I will bring upon this city and upon all its towns all the evil that I have pronounced against it, because they have stiffened their necks, refusing to hear My words.'
