document_id: ROM.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BRETHREN, [with all] my heart''s desire '
  - type: text
    content: and
  - type: text
    content: ' goodwill for [Israel], I long and pray to God that they may be saved.'
  '10':
  - type: text
    content: ' For with the heart a person believes (adheres to, trusts in, and relies on Christ) and so is justified (declared righteous, acceptable to God), and with the mouth he confesses (declares openly and speaks out freely his faith) '
  - type: text
    content: and
  - type: text
    content: ' confirms [his] salvation.'
  '11':
  - type: text
    content: ' The Scripture says, No man who believes in Him [who adheres to, relies on, and trusts in Him] will [ever] be put to shame '
  - type: text
    content: or
  - type: text
    content: ' be disappointed. [Ps. 34:22; Isa. 28:16; 49:23; Jer. 17:7.]'
  '12':
  - type: text
    content: ' [No one] for there is no distinction between Jew and Greek. The same Lord is Lord over all [of us] and He generously bestows His riches upon all who call upon Him [in faith].'
  '13':
  - type: text
    content: ' For everyone who calls upon the name of the Lord [invoking Him as Lord] will be saved. [Joel 2:32.]'
  '14':
  - type: text
    content: ' But how are people to call upon Him Whom they have not believed [in Whom they have no faith, on Whom they have no reliance]? And how are they to believe in Him [adhere to, trust in, and rely upon Him] of Whom they have never heard? And how are they to hear without a preacher?'
  '15':
  - type: text
    content: ' And how can men [be expected to] preach unless they are sent? As it is written, How beautiful are the feet of those who bring glad tidings! [How welcome is the coming of those who preach the good news of His good things!] [Isa. 52:7.]'
  '16':
  - type: text
    content: ' But they have not all heeded the Gospel; for Isaiah says, Lord, who has believed (had faith in) what he has heard from us? [Isa. 53:1.]'
  '17':
  - type: text
    content: ' So faith comes by hearing [what is told], and what is heard comes by the preaching [of the message that came from the lips] of Christ (the Messiah Himself).'
  '18':
  - type: text
    content: ' But I ask, Have they not heard? Indeed they have; [for the Scripture says] Their voice [that of nature bearing God''s message] has gone out to all the earth, and their words to the far bounds of the world. [Ps. 19:4.]'
  '19':
  - type: text
    content: ' Again I ask, Did Israel not understand? [Did the Jews have no warning that the Gospel was to go forth to the Gentiles, to all the earth?] First, there is Moses who says, I will make you jealous of those who are not a nation; with a foolish nation I will make you angry. [Deut. 32:21.]'
  '2':
  - type: text
    content: ' I bear them witness that they have a [certain] zeal '
  - type: text
    content: and
  - type: text
    content: ' enthusiasm for God, but it is not enlightened '
  - type: text
    content: and
  - type: text
    content: ' according to [correct and vital] knowledge.'
  '20':
  - type: text
    content: ' Then Isaiah is so bold as to say, I have been found by those who did not seek Me; I have shown (revealed) Myself to those who did not [consciously] ask for Me. [Isa. 65:1.]'
  '21':
  - type: text
    content: ' But of Israel he says, All day long I have stretched out My hands to a people unyielding '
  - type: text
    content: and
  - type: text
    content: ' disobedient and self-willed [to a faultfinding, contrary, and contradicting people]. [Isa. 65:2.]'
  '3':
  - type: text
    content: ' For being ignorant of the righteousness that God ascribes [which makes one acceptable to Him in word, thought, and deed] and seeking to establish a '
  - type: text
    content: righteousness
  - type: text
    content: ' '
  - type: text
    content: (a means of salvation)
  - type: text
    content: ' of their own, they did not obey '
  - type: text
    content: or
  - type: text
    content: ' submit themselves to God''s righteousness.'
  '4':
  - type: text
    content: ' For Christ is the end of the Law [the limit at which it ceases to be, for the Law leads up to Him Who is the fulfillment of its types, and in Him the purpose which it was designed to accomplish is fulfilled. That is, the purpose of the Law is fulfilled in Him] as the means of righteousness (right relationship to God) for everyone who trusts in '
  - type: text
    content: and
  - type: text
    content: ' adheres to '
  - type: text
    content: and
  - type: text
    content: ' relies on Him.'
  '5':
  - type: text
    content: ' For Moses writes that the man who [can] practice the righteousness (perfect conformity to God''s will) which is based on the Law [with all its intricate demands] shall live by it. [Lev. 18:5.]'
  '6':
  - type: text
    content: ' But the righteousness based on faith [imputed by God and bringing right relationship with Him] says, Do not say in your heart, Who will ascend into Heaven? that is, to bring Christ down;'
  '7':
  - type: text
    content: ' Or who will descend into the abyss? that is, to bring Christ up from the dead [as if we could be saved by our own efforts]. [Deut. 30:12, 13.]'
  '8':
  - type: text
    content: ' But what does it say? The Word (God''s message in Christ) is near you, on your lips and in your heart; that is, the Word (the message, the basis and object) of faith which we preach, [Deut. 30:14.]'
  '9':
  - type: text
    content: ' Because if you acknowledge '
  - type: text
    content: and
  - type: text
    content: ' confess with your lips that Jesus is Lord and in your heart believe (adhere to, trust in, and rely on the truth) that God raised Him from the dead, you will be saved.'
