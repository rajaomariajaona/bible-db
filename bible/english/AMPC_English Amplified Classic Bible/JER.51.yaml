document_id: JER.51,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THUS SAYS the Lord: Behold, I will raise up against Babylon and against those who dwell among those rebelling against Me a destroying wind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spirit;'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The Lord has brought forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made known the righteousness [of our cause]; come and let us declare in Zion the work of the Lord our God.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Make clean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sharp the arrows, take up the shields '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' coats of armor [and cover your bodies with them]! The Lord has stirred up the spirit of the kings of the Medes [who with the Persians will destroy the Babylonian Empire], for His purpose concerning Babylon is to destroy it; for that is the vengeance of the Lord, the vengeance [upon Babylon for the plundering and destruction] of His temple.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Set up a standard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' signal [to spread the news] upon the walls of Babylon! Make the watch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blockade strong, set the guards, prepare the ambushes! For the Lord has both purposed and done that which He spoke against the inhabitants of Babylon.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' O [Babylon] you who dwell by many waters, rich in treasures, your end has come, and the line measuring your life is cut. [Rev. 17:1-6.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The Lord of hosts has sworn by Himself, saying, Surely I will fill you with men, as with [a swarm of] locusts [who strip a land clean], and they will lift up a song '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shout [of victory] over you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He made the earth by His power; He established the world by His wisdom and stretched out the heavens by His understanding.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' When He utters His voice, there is a tumult of waters in the heavens, and He causes the vapors to ascend from the ends of the earth. He makes lightnings for the rain and brings forth the wind from His treasuries.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Every man has become stupid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brutelike, without knowledge [of God]; every goldsmith is put to shame by the images he has made; for his molten idols are a lie, and there is no breath [of life] in them.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' They are worthless (emptiness, falsity, futility), a work of delusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthy of derision; in the time of their inspection '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment they shall [helplessly] perish.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Not like these [gods] is He Who is the Portion of Jacob [the true God on Whom Israel has a claim], for He is the One Who formed all things, and Israel is the tribe of His inheritance–the Lord of hosts is His name. [Jer. 10:12-16.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And I will send to Babylon strangers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' winnowers who will winnow her and will empty her land; for in the day of calamity they will be against her on every side.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' You [Cyrus of Persia, soon to conquer Babylon] are My battle-ax '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' maul and weapon of war–for with you I break nations in pieces, with you I destroy kingdoms,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' With you I break in pieces the horse and his rider, with you I break in pieces the chariot and the charioteer,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' With you I break in pieces man and woman, with you I break in pieces old man and youth, with you I break in pieces young man and maiden,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' With you I break in pieces the shepherd and his flock, with you I break in pieces the farmer and his yoke of oxen, and with you I break in pieces governors and commanders.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And I will [completely] repay Babylon and all the inhabitants of Chaldea for all the evil that they have done in Zion–before your very eyes [I will do it], says the Lord.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Behold, I am against you, says the Lord, O destroying mountain [which is burning out, you who will be as barren and desolate as an extinct volcano], you who [would] destroy the whole earth. I will stretch out My hand over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' against you and roll you down from the [burnt] crags and will make you a burnt-out mountain [of combustive fires].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And [O Babylon] they shall not take your cracked stones for a cornerstone, or any stone for foundations, but you shall be waste '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desolate forever, says the Lord.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Set up a standard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' signal in the land [to spread the news]! Blow the trumpet among the nations! Prepare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dedicate the nations for war against her; call against her the kingdoms of Ararat, Minni, and Ashkenaz. Appoint a marshal against her; cause the horses to come up like [a swarm of] locusts [when their wings are not yet released from their horny cases].'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Prepare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dedicate the nations for war against her–the kings of Media, with their governors and commanders (deputies), and every land of their dominion.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' [I foresee this:] The land trembles and writhes in pain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorrow, for the purposes of the Lord against Babylon stand–to make the land of Babylon a desolation without inhabitant.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Against him who bends let the archer bend his bow, and against him who lifts himself up in his coat of mail. And spare not her young men; devote [to God] and utterly destroy her entire host.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' The mighty warriors of Babylon have ceased to fight; they have remained in their holds. Their might has failed; they have become [weak and helpless] like women. Her dwelling places are burned up; her bars [and defenses generally] are broken.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' One post shall run to meet another and one messenger to meet another to show the king of Babylon that his city is taken on every side '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to its farthest end,'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And that the passages [or ferries across the Euphrates] are stopped, and the great marshes they [the Medes] have burned with fire, and the men of war are frightened.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' For thus says the Lord of hosts, the God of Israel: The Daughter of Babylon is like a threshing floor at the time it is [being prepared]; yet a little while and the time of harvest shall come to her.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' [The inhabitants of Zion say] Nebuchadrezzar king of Babylon has devoured us, he has crushed us, he has made us an empty vessel. Like a monster he has swallowed us up, he has filled his belly with our delicacies; he has rinsed us out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cast us away.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' May the violence done to me and to my flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blood be upon Babylon, will the inhabitant of Zion say; and, May my blood be upon the inhabitants of Chaldea, will Jerusalem say.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Therefore thus says the Lord: Behold, I will plead your cause and take vengeance for you. I will dry up her lake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' great reservoir and make her fountain dry.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' And Babylon shall become heaps [of ruins], a dwelling place of jackals, a horror (an astonishing desolation) and a hissing [of amazement], without inhabitant.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' They [the Chaldean lords] shall be roaring together [before their sudden capture] like young lions [over their prey], they [the princes] shall be growling like lions'' whelps.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' When the revelers are inflamed [with wine and lust during their drinking bouts], I will prepare them a feast [of My wrath] and make them drunk, that they may rejoice and fall asleep to a perpetual sleep and not waken, says the Lord.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Thus they shall fall down slain in the land of the Chaldeans, and wounded in her streets.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' I will bring them down like lambs to the slaughter, like rams together with he-goats.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' How Sheshach [Babylon] is taken! And the praise of the whole earth is surprised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seized! How Babylon has become an astonishing desolation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a horror among the nations!'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' The sea has come up upon Babylon; she is covered with the tumult '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' multitude of its waves.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' Her cities have become a desolation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a horror, a land of drought and a wilderness, a land in which no one lives, nor does any son of man pass through it.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' And I will punish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' execute judgment upon Bel [the god] in Babylon and take out of his mouth what he has swallowed up [the sacred vessels and the people of Judah and elsewhere who were taken captive]. The nations will not flow any more to him. Yes, the wall of Babylon has fallen!'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' My people, come out of the midst of her! And let every man save his life from the fierce anger of the Lord! [Jer. 50:8; II Cor. 6:17; Rev. 18:4.]'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' And beware, lest your heart faint and you be afraid at the report (rumor) heard in the land; for in one year shall one report come and in another year another report, and violence shall be in the land, ruler against ruler.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' Therefore behold, the days will come when I will execute judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment upon the idols of Babylon; her whole land will be confounded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put to shame, and all her slain will fall in the midst of her.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' Then heaven and earth and all that is in them shall sing for joy over Babylon, for the [Median] destroyers shall come against her from the north, says the Lord. [Isa. 44:23; Jer. 51:11; Rev. 12:12; 18:20.]'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' As Babylon caused the slain of Israel to fall, so at Babylon shall fall the slain of all [her] land.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For Israel has not been widowed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forsaken, nor has Judah, by his God, the Lord of hosts, though their land is full of guilt against the Holy One of Israel.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' You who have escaped the sword, go away, stand not still! [Seriously and earnestly] remember the Lord from afar [Babylon], and let [desolate] Jerusalem come into your mind.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' We are confounded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ashamed, for we have heard reproach; confusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shame have covered our faces, for strangers have come into the [most] sacred parts of the sanctuary of the Lord [even those forbidden for entrance by all but the high priest or the appointed priests].'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' Therefore behold, the days are coming, says the Lord, when I will execute judgment upon [Babylon''s] idols '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' images, and throughout all her land the wounded will groan.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: ' Though Babylon should mount up to heaven, and though she should fortify her strong height (her lofty stronghold), yet destroyers will come upon her from Me, says the Lord.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: ' The sound of a cry [comes] from Babylon, and [the sound of] great destruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruin from the land of the Chaldeans!'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: ' For the Lord is destroying Babylon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' laying her waste and stilling her great voice [the hum of the city''s life]. And the waves [of her conquerors] roar like great waters, the noise of their voices is raised up [like the tramping of an army].'
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ' For the destroyer is coming upon her, upon Babylon; and her mighty warriors are taken, their bows are broken in pieces; for the Lord is a God of recompense; He will surely requite.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: ' And I will make drunk her princes and her wise men, her governors and her commanders (deputies) and her mighty warriors; and they will sleep a perpetual sleep and not waken, says the King–the Lord of hosts is His name.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: ' Thus says the Lord of hosts: The broad walls of Babylon shall be utterly overthrown '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [the foundations] made bare, and her high gates shall be burned with fire; the peoples shall labor in vain, and the nations [only] to satisfy the fire, and they shall be weary. [Hab. 2:13.]'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: ' The word that Jeremiah the prophet commanded Seraiah son of Neriah, the son of Mahseiah, when he went with Zedekiah king of Judah to Babylon in the fourth year of his reign. Now this Seraiah was chief chamberlain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' quartermaster [and brother of Baruch].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Flee out of the midst of Babylon! Let every man save his life! Let not destruction come upon you through her [punishment for] sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt. For it is the time of the Lord''s vengeance; He will render to her a recompense. [Jer. 50:28; II Cor. 6:17; Rev. 18:4.]'
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: ' So Jeremiah wrote in a book all the evil that would come upon Babylon–even all these words that are written against Babylon.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: ' And Jeremiah said to Seraiah, When you come to Babylon, see to it that you read all these words.'
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: ' Then say, O Lord, You have spoken concerning this place that it shall be cut off, so that nothing shall remain and dwell in it, neither man nor beast; but it shall be desolate forever.'
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: ' And it shall be that when you have finished reading this book, you shall bind a stone to it and cast it into the midst of the Euphrates.'
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: ' Then say, Thus will Babylon sink and not rise because of the evil that I will bring upon her; and [the Babylonians] will be weary (hopelessly exhausted). Thus far are the words of Jeremiah. [Rev. 18:21.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Babylon was a golden cup in the Lord''s hand, making all the earth drunken. The nations drank of her wine; therefore the nations have gone mad. [Rev. 14:8; 17:4.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Babylon has suddenly fallen and is shattered (destroyed)! Wail for her [if you care to]! Get balm for her [incurable] pain; if [you do] so she may [possibly] be healed! [Jer. 25:15; Rev. 14:8-10; 16:19; 18:2, 3.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' We would have healed Babylon, but she is not healed. Forsake her and let us each go to his own country, for her guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the judgment against her reach to heaven and are lifted even to the skies. [Gen. 18:20, 21.]'
