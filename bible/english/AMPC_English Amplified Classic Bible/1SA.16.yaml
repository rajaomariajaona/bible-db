document_id: 1SA.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Samuel, How long will you mourn for Saul, seeing I have rejected him from reigning over Israel? Fill your horn with oil; I will send you to Jesse the Bethlehemite. For I have provided for Myself a king among his sons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Samuel said, How can I go? If Saul hears it, he will kill me. And the Lord said, Take a heifer with you and say, I have come to sacrifice to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And invite Jesse to the sacrifice, and I will show you what you shall do; and you shall anoint for Me the one I name to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Samuel did what the Lord said, and came to Bethlehem. And the elders of the town trembled at his coming and said, Have you come peaceably?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And he said, Peaceably; I have come to sacrifice to the Lord. Consecrate yourselves and come with me to the sacrifice. And he consecrated Jesse and his sons and called them to the sacrifice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When they had come, he looked on Eliab [the eldest son] and said, Surely the Lord''s anointed is before Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But the Lord said to Samuel, Look not on his appearance or at the height of his stature, for I have rejected him. For the Lord sees not as man sees; for man looks on the outward appearance, but the Lord looks on the heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then Jesse called Abinadab and made him pass before Samuel. But Samuel said, Neither has the Lord chosen this one.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Jesse made Shammah pass by. Samuel said, Nor has the Lord chosen him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Jesse made seven of his sons pass before Samuel. And Samuel said to Jesse, The Lord has not chosen any of these.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then [he] said to Jesse, Are all your sons here? [Jesse] said, There is yet the youngest; he is tending the sheep. Samuel said to Jesse, Send for him; for we will not sit down to eat until he is here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Jesse sent and brought him. David had a healthy reddish complexion and beautiful eyes, and was fine-looking. The Lord said [to Samuel], Arise, anoint him; this is he.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then Samuel took the horn of oil and anointed David in the midst of his brothers; and the Spirit of the Lord came mightily upon David from that day forward. And Samuel arose and went to Ramah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But the Spirit of the Lord departed from Saul, and an evil spirit from the Lord tormented '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Saul''s servants said to him, Behold, an evil spirit from God torments you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Let our lord now command your servants here before you to find a man who plays skillfully on the lyre; and when the evil spirit from God is upon you, he will play it, and you will be well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Saul told his servants, Find me a man who plays well and bring him to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' One of the young men said, I have seen a son of Jesse the Bethlehemite who plays skillfully, a valiant man, a man of war, prudent in speech '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eloquent, an attractive person; and the Lord is with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So Saul sent messengers to Jesse and said, Send me David your son, who is with the sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And Jesse took a donkey loaded with bread, a skin of wine, and a kid and sent them by David his son to Saul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And David came to Saul and served him. Saul became very fond of him, and he became his armor-bearer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Saul sent to Jesse, saying, Let David remain in my service, for he pleases me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And when the evil spirit from God was upon Saul, David took a lyre and played it; so Saul was refreshed and became well, and the evil spirit left him.'
