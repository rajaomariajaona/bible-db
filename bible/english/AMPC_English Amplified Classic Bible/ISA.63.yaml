document_id: ISA.63
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHO IS this Who comes from Edom, with crimson-stained garments from Bozrah [in Edom]? This One Who is glorious in His apparel, striding triumphantly in the greatness of His might? It is I, [the One] Who speaks in righteousness [proclaiming vindication], mighty to save!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Why is Your apparel splashed with red, and Your garments like the one who treads in the winepress?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I have trodden the winepress alone, and of the peoples there was no one with Me. I trod them in My anger and trampled them in My wrath; and their lifeblood is sprinkled upon My garments, and I stained all My raiment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For the day of vengeance was in My heart, and My year of redemption [the year of My redeemed] has come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And I looked, but there was no one to help; I was amazed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appalled that there was no one to uphold [truth and right]. So My own arm brought Me victory, and My wrath upheld Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I trod down the peoples in My anger and made them drink of the cup of My wrath until they were intoxicated, and I spilled their lifeblood upon the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' I will recount the loving-kindnesses of the Lord and the praiseworthy deeds of the Lord, according to all that the Lord has bestowed on us, and the great goodness to the house of Israel, which He has granted them according to His mercy and according to the multitude of His loving-kindnesses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For He said, Surely they are My people, sons who will not lie [who will not deal falsely with Me]; and so He was to them a Savior [in all their distresses].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' In all their affliction He was afflicted, and the Angel of His presence saved them; in His love and in His pity He redeemed them; and He lifted them up and carried them all the days of old. [Exod. 23:20-23; 33:14-15; Deut. 1:31; 32:10-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But they rebelled and grieved His Holy Spirit; therefore He turned to become their enemy and Himself fought against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then His people [seriously] remembered the days of old, of Moses and his people [and they said], Where is He Who brought [our fathers] up out of the [Red] Sea, with [Moses and the other] shepherds of His flock? Where is He Who put His Holy Spirit within their midst,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Who caused His glorious arm to go at the right hand of Moses, dividing the waters before them, to make for Himself an everlasting name,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Who led them through the depths, like a horse in the wilderness, so that they did not stumble?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Like the cattle that go down into the valley [to find better pasturage, refuge, and rest], the Spirit of the Lord caused them to rest. So did You lead Your people [Lord] to make for Yourself a beautiful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorious name [to prepare the way for the acknowledgment of Your name by all nations].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Look down from heaven and see from the dwelling place of Your holiness and Your glory. Where are Your zeal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your jealousy and Your mighty acts [which you formerly did for Your people]? Your yearning pity and the [multitude of] compassions of Your heart are restrained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' withheld from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For [surely] You are our Father, even though Abraham [our ancestor] does not know us and Israel (Jacob) does not acknowledge us; You, O Lord, are [still] our Father, our Redeemer from everlasting is Your name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' O Lord, why have You made us [able] to err from Your ways and hardened our hearts to [reverential] fear of You? Return [to bless us] for Your servants'' sake, the tribes of Your heritage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Your holy people possessed Your sanctuary but a little while; our adversaries have trodden it down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' We have become [to You] like those over whom You never exercised rule, like those who were not called by Your name.'
