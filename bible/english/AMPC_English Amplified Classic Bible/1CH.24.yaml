document_id: 1CH.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE COURSES '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' divisions of the priests, the sons of Aaron, were these: The sons of Aaron: Nadab, and Abihu, Eleazar, and Ithamar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But Nadab and Abihu died before their father and had no children; therefore Eleazar and Ithamar executed the priest''s office.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And David, with Zadok of the sons of Eleazar and Ahimelech of the sons of Ithamar, divided '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distributed them according to their assigned duties.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Since there were more chief men found among the sons of Eleazar [because of the misfortunes of Eli, and Saul''s slaughter of the priests at Nob] than among the sons of Ithamar, they were divided thus: sixteen heads of fathers'' houses of the sons of Eleazar and eight of the sons of Ithamar according to their fathers'' houses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thus were they divided by lot, one group with the other, for there were chiefs of the sanctuary and chiefs of God [high priests] drawn both from the sons of Eleazar and from the sons of Ithamar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Shemaiah the scribe, son of Nethanel, a Levite, recorded them in the presence of the king, the princes, Zadok the priest, Ahimelech son of Abiathar [the priest who escaped being killed at Nob by Saul and fled to David], and the heads of the fathers'' houses of the priests and Levites–one father''s house being taken alternately for Eleazar and one for Ithamar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The lots fell, the first one to Jehoiarib, the second to Jedaiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The third to Harim, the fourth to Se-orim,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The fifth to Malchijah, the sixth to Mijamin,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The seventh to Hakkoz, the eighth to Abijah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The ninth to Jeshua, the tenth to Shecaniah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The eleventh to Eliashib, the twelfth to Jakim,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The thirteenth to Huppah, the fourteenth to Jeshebe-ab,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The fifteenth to Bilgah, the sixteenth to Immer,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The seventeenth to Hezir, the eighteenth to Happizzez,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The nineteenth to Pethahiah, the twentieth to Jehezkel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The twenty-first to Jachin, the twenty-second to Gamul,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The twenty-third to Delaiah, the twenty-fourth to Maaziah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' This was their order for coming on duty to serve in the house of the Lord, according to the procedure ordered for them by their [forefather] Aaron, as the Lord, the God of Israel, had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' As for the rest of the sons of Levi: of the sons of Amram: Shubael; of the sons of Shubael: Jehdeiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Of Rehabiah: of the sons of Rehabiah: Isshiah the chief.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Of the Izharites: Shelomoth; of the sons of Shelomoth: Jahath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The sons of Hebron: Jeriah the first, Amariah the second, Jahaziel the third, Jekameam the fourth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The son of Uzziel: Micah; of the sons of Micah: Shamir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The brother of Micah: Isshiah; of the sons of Isshiah: Zechariah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The sons of Merari: Mahli and Mushi. The son of Jaaziah: Beno.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The sons of Merari: by Jaaziah: Beno, Shoham, Zaccur, and Ibri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Of Mahli: Eleazar, who had no sons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Of Kish: the son of Kish: Jerahmeel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The sons of Mushi: Mahli, Eder, and Jerimoth. These were the sons of the Levites, according to their fathers'' houses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' These likewise cast lots, as did their kinsmen the sons of Aaron, in the presence of David the king, Zadok, Ahimelech, and the heads of the fathers'' houses of the priests and Levites–the head of each father''s house and his younger brother alike.'
