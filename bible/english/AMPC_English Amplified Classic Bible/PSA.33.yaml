document_id: PSA.33
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' REJOICE IN the Lord, O you [uncompromisingly] righteous [you upright in right standing with God]; for praise is becoming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appropriate for those who are upright [in heart].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Give thanks to the Lord with the lyre; sing praises to Him with the harp of ten strings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Sing to Him a new song; play skillfully [on the strings] with a loud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' joyful sound.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For the word of the Lord is right; and all His work is done in faithfulness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He loves righteousness and justice; the earth is full of the loving-kindness of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' By the word of the Lord were the heavens made, and all their host by the breath of His mouth. [Heb. 11:3; II Pet. 3:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He gathers the waters of the sea as in a bottle; He puts the deeps in storage places.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Let all the earth fear the Lord [revere and worship Him]; let all the inhabitants of the world stand in awe of Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For He spoke, and it was done; He commanded, and it stood fast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The Lord brings the counsel of the nations to nought; He makes the thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plans of the peoples of no effect.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The counsel of the Lord stands forever, the thoughts of His heart through all generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Blessed (happy, fortunate, to be envied) is the nation whose God is the Lord, the people He has chosen as His heritage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The Lord looks from heaven, He beholds all the sons of men;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' From His dwelling place He looks [intently] upon all the inhabitants of the earth–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He Who fashions the hearts of them all, Who considers all their doings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' No king is saved by the great size '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power of his army; a mighty man is not delivered by [his] much strength.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' A horse is devoid of value for victory; neither does he deliver any by his great power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Behold, the Lord''s eye is upon those who fear Him [who revere and worship Him with awe], who wait for Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope in His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' To deliver them from death and keep them alive in famine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Our inner selves wait [earnestly] for the Lord; He is our Help and our Shield.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For in Him does our heart rejoice, because we have trusted (relied on and been confident) in His holy name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Let Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, O Lord, be upon us, in proportion to our waiting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hoping for You.'
