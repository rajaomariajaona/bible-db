document_id: 1KI.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE word of the Lord came to Jehu son of Hanani against Baasha, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Because I exalted you [Baasha] out of the dust and made you leader over My people Israel, and you have walked in the way of Jeroboam and have made My people Israel sin, to provoke Me to anger with their sins,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Behold, I will utterly sweep away Baasha and his house, and will make your house like [that] of Jeroboam son of Nebat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Any of Baasha''s family who dies in the city the dogs shall eat, and any who dies in the field the birds of the heavens shall eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now the rest of the acts of Baasha, what he did and his might, are they not written in the Book of the Chronicles of the Kings of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Baasha slept with his fathers and was buried in Tirzah. Elah his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Also the word of the Lord against Baasha and his house came through the prophet Jehu son of Hanani for all the evil that Baasha did in the sight of the Lord in provoking Him to anger with the work of his hands [idols], in being like the house of Jeroboam, and also because he destroyed it [the family of Jeroboam, of his own accord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' In the twenty-sixth year of Asa king of Judah, Elah son of Baasha began his reign of two years over Israel in Tirzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Elah''s servant Zimri, captain of half his chariots, conspired against Elah. He was in Tirzah, drinking himself drunk in the house of Arza, who was over the household in Tirzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Zimri came in and smote and killed him in the twenty-seventh year of Asa king of Judah, and reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When he began to reign, as soon as he sat on his throne, he killed all the household of Baasha; he left not one male of his kinsmen or his friends.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Thus Zimri destroyed all the house of Baasha, according to the word of the Lord which He spoke against Baasha through Jehu the prophet, [I Kings 16:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For all the sins of Baasha and of Elah his son by which they sinned and made Israel sin, in provoking the Lord, the God of Israel, to anger with their idols.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The rest of the acts of Elah, and all he did, are they not written in the Book of the Chronicles of the Kings of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' In the twenty-seventh year of Asa king of Judah, Zimri reigned for seven days in Tirzah. The troops were encamped against Gibbethon, which belonged to the Philistines,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they heard the rumor, Zimri has conspired and slain the king! So all Israel made Omri, the commander of the army, king over Israel that day in the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So Omri went up from Gibbethon, and all Israel with him, and they besieged Tirzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And when Zimri saw that the city was taken, he went into the stronghold of the king''s house and burned the king''s house over him with fire and died,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Because of his sins committed in doing evil in the sight of the Lord, in walking in the way of Jeroboam, and his sin in causing Israel to sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The rest of the acts of Zimri, and his deeds of treason, are they not written in the Book of the Chronicles of the Kings of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then the people of Israel were divided into two factions. Half of the people followed Tibni son of Ginath, to make him king, and half followed Omri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But the people who followed Omri prevailed against those who followed Tibni son of Ginath. So Tibni died and Omri reigned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' In the thirty-first year of Asa king of Judah, Omri began his reign of twelve years over Israel. He reigned six years in Tirzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Omri bought the hill Samaria from Shemer for two talents of silver. He built a city on the hill '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortified it, and called it Samaria (Shomeron), after the owner of the hill, Shemer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But Omri did evil in the eyes of the Lord, even worse than all who were before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' He walked in all the ways of Jeroboam son of Nebat and in his sin, by which he made Israel sin, to provoke the Lord, the God of Israel, to anger with their idols.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The rest of the acts of Omri, and his might that he showed, are they not written in the Book of the Chronicles of the Kings of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So Omri slept with his fathers and was buried in Samaria. Ahab his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' In the thirty-eighth year of Asa king of Judah, Ahab son of Omri began his reign of twenty-two years over Israel in Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Ahab son of Omri did evil in the sight of the Lord above all before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' As if it had been a light thing for Ahab to walk in the sins of Jeroboam son of Nebat, he took for a wife Jezebel daughter of Ethbaal king of the Sidonians, and served Baal and worshiped him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' He erected an altar for Baal in the house of Baal which he built in Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And Ahab made an Asherah [idolatrous symbol of the goddess Asherah]. Ahab did more to provoke the Lord, the God of Israel, to anger than all the kings of Israel before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' In his days, Hiel the Bethelite built Jericho. He laid its foundations at the cost of the life of Abiram his firstborn, and set up its gates with the loss of his youngest son Segub, according to the word of the Lord which He spoke through Joshua son of Nun. [Josh. 6:26.]'
