document_id: HOS.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' COME AND let us return to the Lord, for He has torn so that He may heal us; He has stricken so that He may bind us up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' After two days He will revive us (quicken us, give us life); on the third day He will raise us up that we may live before Him. [Isa. 26:19; Ezek. 37:1-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Yes, let us know (recognize, be acquainted with, and understand) Him; let us be zealous to know the Lord [to appreciate, give heed to, and cherish Him]. His going forth is prepared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' certain as the dawn, and He will come to us as the [heavy] rain, as the latter rain that waters the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' O Ephraim, what shall I do with you? [says the Lord] O Judah, what shall I do with you? For your [wavering] love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness are like the night mist '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' like the dew that goes early away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Therefore have I hewn down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' smitten them by means of the prophets; I have slain them by the words of My mouth; My judgments [pronounced upon them by you prophets] are like the light that goes forth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For I desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight in dutiful steadfast love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goodness, not sacrifice, and the knowledge of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acquaintance with God more than burnt offerings. [Matt. 9:13; 12:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But they, like [less-privileged] men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' like Adam, have transgressed the covenant; there have they dealt faithlessly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treacherously with Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Gilead is a city of evildoers; it is tracked with bloody [footprints].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And as troops of robbers lie in wait for a man, so the company of priests murder on the road toward Shechem; yes, they commit villainy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' outrages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I have seen a horrible thing in the house of Israel! There harlotry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' idolatry are found in Ephraim; Israel is defiled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Also, O Judah, there is a harvest [of divine judgment] appointed for you; when I would return My people from their captivity [in which they are slaves to the misery brought on by their own sins],'
