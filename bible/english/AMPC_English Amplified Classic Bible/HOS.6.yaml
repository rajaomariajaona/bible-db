document_id: HOS.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' COME AND let us return to the Lord, for He has torn so that He may heal us; He has stricken so that He may bind us up.'
  '10':
  - type: text
    content: ' I have seen a horrible thing in the house of Israel! There harlotry '
  - type: text
    content: and
  - type: text
    content: ' idolatry are found in Ephraim; Israel is defiled.'
  '11':
  - type: text
    content: ' Also, O Judah, there is a harvest [of divine judgment] appointed for you; when I would return My people from their captivity [in which they are slaves to the misery brought on by their own sins],'
  '2':
  - type: text
    content: ' After two days He will revive us (quicken us, give us life); on the third day He will raise us up that we may live before Him. [Isa. 26:19; Ezek. 37:1-10.]'
  '3':
  - type: text
    content: ' Yes, let us know (recognize, be acquainted with, and understand) Him; let us be zealous to know the Lord [to appreciate, give heed to, and cherish Him]. His going forth is prepared '
  - type: text
    content: and
  - type: text
    content: ' certain as the dawn, and He will come to us as the [heavy] rain, as the latter rain that waters the earth.'
  '4':
  - type: text
    content: ' O Ephraim, what shall I do with you? [says the Lord] O Judah, what shall I do with you? For your [wavering] love '
  - type: text
    content: and
  - type: text
    content: ' kindness are like the night mist '
  - type: text
    content: or
  - type: text
    content: ' like the dew that goes early away.'
  '5':
  - type: text
    content: ' Therefore have I hewn down '
  - type: text
    content: and
  - type: text
    content: ' smitten them by means of the prophets; I have slain them by the words of My mouth; My judgments [pronounced upon them by you prophets] are like the light that goes forth.'
  '6':
  - type: text
    content: ' For I desire '
  - type: text
    content: and
  - type: text
    content: ' delight in dutiful steadfast love '
  - type: text
    content: and
  - type: text
    content: ' goodness, not sacrifice, and the knowledge of '
  - type: text
    content: and
  - type: text
    content: ' acquaintance with God more than burnt offerings. [Matt. 9:13; 12:7.]'
  '7':
  - type: text
    content: ' But they, like [less-privileged] men '
  - type: text
    content: and
  - type: text
    content: ' like Adam, have transgressed the covenant; there have they dealt faithlessly '
  - type: text
    content: and
  - type: text
    content: ' treacherously with Me.'
  '8':
  - type: text
    content: ' Gilead is a city of evildoers; it is tracked with bloody [footprints].'
  '9':
  - type: text
    content: ' And as troops of robbers lie in wait for a man, so the company of priests murder on the road toward Shechem; yes, they commit villainy '
  - type: text
    content: and
  - type: text
    content: ' outrages.'
