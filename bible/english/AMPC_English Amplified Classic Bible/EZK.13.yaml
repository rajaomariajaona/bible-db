document_id: EZK.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE word of the Lord came to me, saying,'
  '10':
  - type: text
    content: ' Because, even because they have seduced My people, saying, Peace, when there is no peace, and because when one builds a [flimsy] wall, behold, [these prophets] daub it over with whitewash,'
  '11':
  - type: text
    content: ' Say to them who daub it with whitewash that it shall fall! There shall be a downpour of rain; and you, O great hailstones, shall fall, and a violent wind shall tear apart [the whitewashed, flimsy wall].'
  '12':
  - type: text
    content: ' Behold, when the wall is fallen, will you not be asked, Where is the coating with which you [prophets] daubed it?'
  '13':
  - type: text
    content: ' Therefore thus says the Lord God: I will even rend it with a stormy wind in My wrath, and there shall be an overwhelming rain in My anger and great hailstones in wrath to destroy [that wall].'
  '14':
  - type: text
    content: ' So will I break down the wall that you have daubed with whitewash and bring it down to the ground, so that its foundations will be exposed; when it falls, you will perish '
  - type: text
    content: and
  - type: text
    content: ' be consumed in the midst of it. And you will know (understand and realize) that I am the Lord.'
  '15':
  - type: text
    content: ' Thus will I accomplish My wrath upon the wall and upon those who have daubed it with whitewash, and I will say to you, The wall is no more, neither are they who daubed it,'
  '16':
  - type: text
    content: ' The [false] prophets of Israel who prophesied deceitfully about Jerusalem, seeing visions of peace for her when there is no peace, says the Lord God.'
  '17':
  - type: text
    content: ' And you, son of man, set your face against the daughters of your people who prophesy out of [the wishful thinking of] their own minds '
  - type: text
    content: and
  - type: text
    content: ' hearts; prophesy against them,'
  '18':
  - type: text
    content: ' And say, Thus says the Lord God: Woe to the women who sew pillows to all armholes and fasten magic, protective charms to all wrists, and deceptive veils upon the heads of those of every stature to hunt '
  - type: text
    content: and
  - type: text
    content: ' capture human lives! Will you snare the lives of My people to keep your own selves alive?'
  '19':
  - type: text
    content: ' You have profaned Me among My people [in payment] for handfuls of barley and for pieces of bread, slaying persons who should not die and giving [a guaranty of] life to those who should not live, by your lying to My people, who give heed to lies.'
  '2':
  - type: text
    content: ' Son of man, prophesy against the prophets of Israel who prophesy, and say to those who prophesy out of their own mind '
  - type: text
    content: and
  - type: text
    content: ' heart, Hear the word of the Lord!'
  '20':
  - type: text
    content: ' Therefore thus says the Lord God: Behold, I am against your pillows '
  - type: text
    content: and
  - type: text
    content: ' charms '
  - type: text
    content: and
  - type: text
    content: ' veils with which you snare human lives like birds, and I will tear them from your arms and will let the lives you hunt go free, the lives you are snaring like birds.'
  '21':
  - type: text
    content: ' Your [deceptive] veils also will I tear and deliver My people out of your hand, and they shall be no more in your hand to be hunted '
  - type: text
    content: and
  - type: text
    content: ' snared. Then you shall know (understand and realize) that I am the Lord.'
  '22':
  - type: text
    content: ' Because with lies you have made the righteous sad '
  - type: text
    content: and
  - type: text
    content: ' disheartened, whom I have not made sad '
  - type: text
    content: or
  - type: text
    content: ' disheartened, and because you have encouraged '
  - type: text
    content: and
  - type: text
    content: ' strengthened the hands of the wicked, that he should not return from his wicked way and be saved [in that you falsely promised him life],'
  '23':
  - type: text
    content: ' Therefore you will no more see false visions or practice divinations, and I will deliver My people out of your hand. Then you will know (understand and realize) that I am the Lord.'
  '3':
  - type: text
    content: ' Thus says the Lord God: Woe to the foolish prophets who follow their own spirit [and things they have not seen] and have seen nothing!'
  '4':
  - type: text
    content: ' O Israel, your prophets have been like foxes among ruins '
  - type: text
    content: and
  - type: text
    content: ' in waste places.'
  '5':
  - type: text
    content: ' You have not gone up into the gaps '
  - type: text
    content: or
  - type: text
    content: ' breeches, nor built up the wall for the house of Israel that it might stand in the battle in the day of the Lord.'
  '6':
  - type: text
    content: ' They have seen falsehood and lying divination, saying, The Lord says; but the Lord has not sent them. Yet they have hoped '
  - type: text
    content: and
  - type: text
    content: ' made men to hope for the confirmation of their word.'
  '7':
  - type: text
    content: ' Have you not seen a false vision and have you not spoken a lying divination when you say, The Lord says, although I have not spoken?'
  '8':
  - type: text
    content: ' Therefore thus says the Lord God: Because you have spoken empty, false, '
  - type: text
    content: and
  - type: text
    content: ' delusive words and have seen lies, therefore behold, I am against you, says the Lord God.'
  '9':
  - type: text
    content: ' And My hand shall be against the prophets who see empty, false, '
  - type: text
    content: and
  - type: text
    content: ' delusive visions and who give lying prophecies. They shall not be in the secret council of My people, nor shall they be recorded in the register of the house of Israel, nor shall they enter into the land of Israel; and you shall know (understand and realize) that I am the Lord God.'
