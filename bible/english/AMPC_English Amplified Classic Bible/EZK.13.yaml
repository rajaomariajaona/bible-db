document_id: EZK.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND THE word of the Lord came to me, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Because, even because they have seduced My people, saying, Peace, when there is no peace, and because when one builds a [flimsy] wall, behold, [these prophets] daub it over with whitewash,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Say to them who daub it with whitewash that it shall fall! There shall be a downpour of rain; and you, O great hailstones, shall fall, and a violent wind shall tear apart [the whitewashed, flimsy wall].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Behold, when the wall is fallen, will you not be asked, Where is the coating with which you [prophets] daubed it?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Therefore thus says the Lord God: I will even rend it with a stormy wind in My wrath, and there shall be an overwhelming rain in My anger and great hailstones in wrath to destroy [that wall].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' So will I break down the wall that you have daubed with whitewash and bring it down to the ground, so that its foundations will be exposed; when it falls, you will perish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be consumed in the midst of it. And you will know (understand and realize) that I am the Lord.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Thus will I accomplish My wrath upon the wall and upon those who have daubed it with whitewash, and I will say to you, The wall is no more, neither are they who daubed it,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The [false] prophets of Israel who prophesied deceitfully about Jerusalem, seeing visions of peace for her when there is no peace, says the Lord God.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And you, son of man, set your face against the daughters of your people who prophesy out of [the wishful thinking of] their own minds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hearts; prophesy against them,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And say, Thus says the Lord God: Woe to the women who sew pillows to all armholes and fasten magic, protective charms to all wrists, and deceptive veils upon the heads of those of every stature to hunt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' capture human lives! Will you snare the lives of My people to keep your own selves alive?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' You have profaned Me among My people [in payment] for handfuls of barley and for pieces of bread, slaying persons who should not die and giving [a guaranty of] life to those who should not live, by your lying to My people, who give heed to lies.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Son of man, prophesy against the prophets of Israel who prophesy, and say to those who prophesy out of their own mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heart, Hear the word of the Lord!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Therefore thus says the Lord God: Behold, I am against your pillows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' charms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' veils with which you snare human lives like birds, and I will tear them from your arms and will let the lives you hunt go free, the lives you are snaring like birds.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Your [deceptive] veils also will I tear and deliver My people out of your hand, and they shall be no more in your hand to be hunted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' snared. Then you shall know (understand and realize) that I am the Lord.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Because with lies you have made the righteous sad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disheartened, whom I have not made sad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' disheartened, and because you have encouraged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthened the hands of the wicked, that he should not return from his wicked way and be saved [in that you falsely promised him life],'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Therefore you will no more see false visions or practice divinations, and I will deliver My people out of your hand. Then you will know (understand and realize) that I am the Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Thus says the Lord God: Woe to the foolish prophets who follow their own spirit [and things they have not seen] and have seen nothing!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' O Israel, your prophets have been like foxes among ruins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in waste places.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' You have not gone up into the gaps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' breeches, nor built up the wall for the house of Israel that it might stand in the battle in the day of the Lord.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' They have seen falsehood and lying divination, saying, The Lord says; but the Lord has not sent them. Yet they have hoped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made men to hope for the confirmation of their word.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Have you not seen a false vision and have you not spoken a lying divination when you say, The Lord says, although I have not spoken?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Therefore thus says the Lord God: Because you have spoken empty, false, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delusive words and have seen lies, therefore behold, I am against you, says the Lord God.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And My hand shall be against the prophets who see empty, false, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delusive visions and who give lying prophecies. They shall not be in the secret council of My people, nor shall they be recorded in the register of the house of Israel, nor shall they enter into the land of Israel; and you shall know (understand and realize) that I am the Lord God.'
