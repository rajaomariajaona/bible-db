document_id: EZK.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND HE said to me [Ezekiel], Son of man, stand upon your feet and I will speak to you.'
  '10':
  - type: text
    content: ' And He spread it before me and it was written within and on the back, and written on it were words of lamentation and mourning and woe.'
  '2':
  - type: text
    content: ' And the Spirit entered into me when He spoke to me and set me upon my feet, and I heard Him speaking to me.'
  '3':
  - type: text
    content: ' And He said to me, I send you, son of man, to the children of Israel, two rebellious nations that have rebelled against Me. They and their fathers have transgressed against Me even to this very day.'
  '4':
  - type: text
    content: ' And the children are impudent and hard of heart. I send you to them and you shall say to them, Thus says the Lord God.'
  '5':
  - type: text
    content: ' And they, whether they will hear or refuse to hear–for they are a rebellious house–yet shall they know '
  - type: text
    content: and
  - type: text
    content: ' realize that there has been a prophet among them.'
  '6':
  - type: text
    content: ' And you, son of man, be not afraid of them, neither be afraid of their words; though briers and thorns are all around you and you dwell '
  - type: text
    content: and
  - type: text
    content: ' sit among scorpions, be not afraid of their words nor be dismayed at their looks, for they are a rebellious house.'
  '7':
  - type: text
    content: ' And you shall speak My words to them whether they will hear or refuse to hear, for they are most rebellious.'
  '8':
  - type: text
    content: ' As for you, son of man, hear what I say to you; be not rebellious like that rebellious house; open your mouth and eat what I give you.'
  '9':
  - type: text
    content: ' And when I looked, behold, a hand was stretched out to me and behold, a scroll of a book was in it.'
