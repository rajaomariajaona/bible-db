document_id: EZK.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND HE said to me [Ezekiel], Son of man, stand upon your feet and I will speak to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the Spirit entered into me when He spoke to me and set me upon my feet, and I heard Him speaking to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And He said to me, I send you, son of man, to the children of Israel, two rebellious nations that have rebelled against Me. They and their fathers have transgressed against Me even to this very day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the children are impudent and hard of heart. I send you to them and you shall say to them, Thus says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they, whether they will hear or refuse to hear–for they are a rebellious house–yet shall they know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that there has been a prophet among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And you, son of man, be not afraid of them, neither be afraid of their words; though briers and thorns are all around you and you dwell '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sit among scorpions, be not afraid of their words nor be dismayed at their looks, for they are a rebellious house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And you shall speak My words to them whether they will hear or refuse to hear, for they are most rebellious.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' As for you, son of man, hear what I say to you; be not rebellious like that rebellious house; open your mouth and eat what I give you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And when I looked, behold, a hand was stretched out to me and behold, a scroll of a book was in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And He spread it before me and it was written within and on the back, and written on it were words of lamentation and mourning and woe.'
