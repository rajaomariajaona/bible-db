document_id: MAT.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHEN JESUS came down from the mountain, great throngs followed Him.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' When Jesus heard him, He marveled and said to those who followed Him [who adhered steadfastly to Him, conforming to His example in living and, if need be, in dying also], I tell you truly, I have not found so much faith as this with anyone, even in Israel.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' I tell you, many will come from east and west, and will sit at table with Abraham, Isaac, and Jacob in the kingdom of heaven,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' While the sons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heirs of the kingdom will be driven out into the darkness outside, where there will be weeping and grinding of teeth. [Ps. 107:2, 3; Isa. 49:12; 59:19; Mal. 1:11.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then to the centurion Jesus said, Go; it shall be done for you as you have believed. And the servant boy was restored to health at that very moment.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And when Jesus went into Peter''s house, He saw his mother-in-law lying ill with a fever.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He touched her hand and the fever left her; and she got up and began waiting on Him.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' When evening came, they brought to Him many who were under the power of demons, and He drove out the spirits with a word and restored to health all who were sick.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And thus He fulfilled what was spoken by the prophet Isaiah, He Himself took [in order to carry away] our weaknesses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' infirmities and bore away our diseases. [Isa. 53:4.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Now Jesus, when He saw the great throngs around Him, gave orders to cross to the other side [of the lake].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And a scribe came up and said to Him, Master, I will accompany You wherever You go.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And behold, a leper came up to Him and, prostrating himself, worshiped Him, saying, Lord, if You are willing, You are able to cleanse me by curing me.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And Jesus replied to him, Foxes have holes and the birds of the air have lodging places, but the Son of Man has nowhere to lay His head.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Another of the disciples said to Him, Lord, let me first go and bury [care for till death] my father.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But Jesus said to him, Follow Me, and leave the dead [in sin] to bury their own dead.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And after He got into the boat, His disciples followed Him.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And suddenly, behold, there arose a violent storm on the sea, so that the boat was being covered up by the waves; but He was sleeping.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And they went and awakened Him, saying, Lord, rescue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' preserve us! We are perishing!'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And He said to them, Why are you timid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afraid, O you of little faith? Then He got up and rebuked the winds and the sea, and there was a great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonderful calm (a perfect peaceableness).'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And the men were stunned with bewildered wonder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' marveled, saying, What kind of Man is this, that even the winds and the sea obey Him!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And when He arrived at the other side in the country of the Gadarenes, two men under the control of demons went to meet Him, coming out of the tombs, so fierce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' savage that no one was able to pass that way.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And behold, they shrieked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' screamed, What have You to do with us, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus,
    - type: text
      text: ' Son of God? Have You come to torment us before the appointed time? [Judg. 11:12; II Sam. 16:10.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And He reached out His hand and touched him, saying, I am willing; be cleansed by being cured. And instantly his leprosy was cured '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cleansed.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Now at some distance from there a drove of many hogs was grazing.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And the demons begged Him, If You drive us out, send us into the drove of hogs.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And He said to them, Begone! So they came out and went into the hogs, and behold, the whole drove rushed down the steep bank into the sea and died in the water.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' The herdsmen fled and went into the town and reported everything, including what had happened to the men under the power of demons.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And behold, the whole town went out to meet Jesus; and as soon as they saw Him, they begged Him to depart from their locality.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And Jesus said to him, See that you tell nothing about this to anyone; but go, show yourself to the priest and present the offering that Moses commanded, for a testimony [to your healing] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' as an evidence to the people. [Lev. 14:2.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' As Jesus went into Capernaum, a centurion came up to Him, begging Him,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And saying, Lord, my servant boy is lying at the house paralyzed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distressed with intense pains.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And Jesus said to him, I will come and restore him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But the centurion replied to Him, Lord, I am not worthy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' fit to have You come under my roof; but only speak the word, and my servant boy will be cured.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For I also am a man subject to authority, with soldiers subject to me. And I say to one, Go, and he goes; and to another, Come, and he comes; and to my slave, Do this, and he does it.'
