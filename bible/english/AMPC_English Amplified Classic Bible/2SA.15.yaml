document_id: 2SA.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THIS, Absalom got a chariot and horses, and fifty men to run before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And [he] rose up early and stood beside the gateway; and when any man who had a controversy came to the king for judgment, Absalom called to him, Of what city are you? And he would say, Your servant is of such and such a tribe of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Absalom would say to him, Your claims are good and right, but there is no man appointed as the king''s agent to hear you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Absalom added, Oh, that I were judge in the land! Then every man with any suit or cause might come to me and I would do him justice!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And whenever a man came near to do obeisance to him, he would put out his hand, take hold of him, and kiss him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Thus Absalom did to all Israel who came to the king for judgment. So Absalom stole the hearts of the men of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And after [four] years, Absalom said to the king, I pray you, let me go to Hebron [his birthplace] and pay my vow to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For your servant vowed while I dwelt at Geshur in Syria, If the Lord will bring me again to Jerusalem, then I will serve the Lord [by offering a sacrifice].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the king said to him, Go in peace. So he arose and went to Hebron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But Absalom sent secret messengers throughout all the tribes of Israel, saying, As soon as you hear the sound of the trumpet, then say, Absalom is king at Hebron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' With Absalom went 200 men from Jerusalem, who were invited [as guests to his sacrificial feast]; and they went in their simplicity, and they knew not a thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And while Absalom was offering the sacrifices, he sent for Ahithophel the Gilonite, David''s counselor, from his city Giloh. And the conspiracy was strong; the people with Absalom increased continually.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And there came a messenger to David, saying, The hearts of the men of Israel have gone after Absalom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' David said to all his servants who were with him at Jerusalem, Arise and let us flee, or else none of us will escape from Absalom. Make haste to depart, lest he overtake us suddenly and bring evil upon us and smite the city with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the king''s servants said to the king, Behold, your servants are ready to do whatever my lord the king says.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So the king and all his household after him went forth. But he left ten women who were concubines to keep the house. [II Sam. 12:11; 20:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The king went forth with all the people after him, and halted at the last house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' All David''s servants passed on beside him, along with [his bodyguards] all the Cherethites, Pelethites; also all the Gittites, 600 men who came after him from Gath, passed on before the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The king said to Ittai the Gittite, Why do you go with us also? Return to your place and remain with the king [Absalom], for you are a foreigner and an exile.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Since you came only yesterday, should I make you go up and down with us? Since I must go where I may, you return, and take back your brethren with you. May loving-kindness and faithfulness be with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But Ittai answered the king, As the Lord lives, and as my lord the king lives, wherever my lord the king shall be, whether for death or life, even there also will your servant be.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' So David said to Ittai, Go on and pass over [the Kidron]. And Ittai the Gittite passed over and all his men and all the little ones who were with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' All the country wept with a loud voice as all the people passed over. The king crossed the brook Kidron, and all the people went on toward the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Abiathar [the priest] and behold, Zadok came also, and all the Levites with him, bearing the ark of the covenant of God. And they set down the ark of God until all the people had gone from the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then the king told Zadok, Take back the ark of God to the city. If I find favor in the Lord''s eyes, He will bring me back and let me see both it and His house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But if He says, I have no delight in you, then here I am; let Him do to me what seems good to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The king also said to Zadok the priest, Are you not a seer? [You and Abiathar] return to the city in peace, and your two sons with you, Ahimaaz your son and Jonathan son of Abiathar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' See, I will wait at the fords [at the Jordan] of the wilderness until word comes from you to inform me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Zadok, therefore, and Abiathar carried the ark of God back to Jerusalem and they stayed there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And David went up over the Mount of Olives and wept as he went, barefoot and his head covered. And all the people who were with him covered their heads, weeping as they went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' David was told, Ahithophel [your counselor] is among the conspirators with Absalom. David said, O Lord, I pray You, turn Ahithophel''s counsel into foolishness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' When David came to the summit [of Olivet], where he worshiped God, behold, Hushai the Archite came to meet him with his coat rent and earth upon his head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' David said to him, If you go with me, you will be a burden to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But if you return to the city and say to Absalom, I will be your servant, O king; as I have been your father''s servant in the past, so will I be your servant now, then you may defeat for me the counsel of Ahithophel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Will not Zadok and Abiathar the priests be with you? So whatever you hear from the king''s house, just tell it to [them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Behold, their two sons are there with them, Ahimaaz, Zadok''s son and Jonathan, Abiathar''s son; and by them send to me everything you hear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' So Hushai, David''s friend, returned, and Absalom also came into Jerusalem.'
