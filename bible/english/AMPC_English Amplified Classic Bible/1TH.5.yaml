document_id: 1TH.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT AS to the suitable times and the precise seasons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dates, brethren, you have no necessity for anything being written to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For you yourselves know perfectly well that the day of the [return of the] Lord will come [as unexpectedly and suddenly] as a thief in the night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When people are saying, All is well and secure, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and,
  - type: text
    text: ' There is peace and safety, then in a moment unforeseen destruction (ruin and death) will come upon them as suddenly as labor pains come upon a woman with child; and they shall by no means escape, for there will be no escape.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But you are not in [given up to the power of] darkness, brethren, for that day to overtake you by surprise like a thief.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For you are all sons of light and sons of the day; we do not belong either to the night or to darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Accordingly then, let us not sleep, as the rest do, but let us keep wide awake (alert, watchful, cautious, and on our guard) and let us be sober (calm, collected, and circumspect).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For those who sleep, sleep at night, and those who are drunk, get drunk at night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But we belong to the day; therefore, let us be sober and put on the breastplate (corslet) of faith and love and for a helmet the hope of salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For God has not appointed us to [incur His] wrath [He did not select us to condemn us], but [that we might] obtain [His] salvation through our Lord Jesus Christ (the Messiah)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Who died for us so that whether we are still alive or are dead [at Christ''s appearing], we might live together with Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share His life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Therefore encourage (admonish, exhort) one another and edify (strengthen and build up) one another, just as you are doing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now also we beseech you, brethren, get to know those who labor among you [recognize them for what they are, acknowledge and appreciate and respect them all]–your leaders who are over you in the Lord and those who warn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindly reprove '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exhort you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And hold them in very high and most affectionate esteem in [intelligent and sympathetic] appreciation of their work. Be at peace among yourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And we earnestly beseech you, brethren, admonish (warn and seriously advise) those who are out of line [the loafers, the disorderly, and the unruly]; encourage the timid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fainthearted, help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give your support to the weak souls, [and] be very patient with everybody [always keeping your temper]. [Isa. 35:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' See that none of you repays another with evil for evil, but always aim to show kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seek to do good to one another and to everybody.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Be happy [in your faith] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejoice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be glad-hearted continually (always);'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Be unceasing in prayer [praying perseveringly];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Thank [God] in everything [no matter what the circumstances may be, be thankful and give thanks], for this is the will of God for you [who are] in Christ Jesus [the Revealer and Mediator of that will].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Do not quench (suppress or subdue) the [Holy] Spirit;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Do not spurn the gifts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' utterances of the prophets [do not depreciate prophetic revelations nor despise inspired instruction or exhortation or warning].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But test '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prove all things [until you can recognize] what is good; [to that] hold fast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Abstain from evil [shrink from it and keep aloof from it] in whatever form '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' whatever kind it may be.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And may the God of peace Himself sanctify you through and through [separate you from profane things, make you pure and wholly consecrated to God]; and may your spirit and soul and body be preserved sound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete [and found] blameless at the coming of our Lord Jesus Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Faithful is He Who is calling you [to Himself] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' utterly trustworthy, and He will also do it [fulfill His call by hallowing and keeping you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Brethren, pray for us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Greet all the brethren with a sacred kiss.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' I solemnly charge you [in the name of] the Lord to have this letter read before all the brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' The grace (the unmerited favor and blessings) of our Lord Jesus Christ (the Messiah) be with you all. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen, (so be it).
