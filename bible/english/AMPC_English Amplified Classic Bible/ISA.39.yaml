document_id: ISA.39
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AT THAT time Merodach-baladan son of Baladan king of Babylon sent [messengers with] letters and a present to Hezekiah, for he had heard that he had been sick and had recovered. [II Kings 20:12-19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Hezekiah was glad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed them and showed them the house of his spices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' precious things–the silver, the gold, the spices, the precious ointment, all the house of his armor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' his jewels, and all that was found in his treasuries. There was nothing in his house nor in all his dominion that Hezekiah did not show them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then came Isaiah the prophet to King Hezekiah and said to him, What did these men say? From where did they come to you? And Hezekiah said, They came to me from a far country, even from Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then Isaiah said, What have they seen in your house? And Hezekiah answered, They have seen all that is in my house; there is nothing among my treasures that I have not shown them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then said Isaiah to Hezekiah, Hear the word of the Lord of hosts:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Behold, the days are coming when all that is in your house, and that which your predecessors have stored up till this day, shall be carried to Babylon. Nothing shall be left, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And some of your own sons who are born to you shall be taken away, and they shall be eunuchs in the palace of the king of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then said Hezekiah to Isaiah, The word of the Lord which you have spoken is good. And he added, For there will be peace and faithfulness [to His promises to us] in my days.'
