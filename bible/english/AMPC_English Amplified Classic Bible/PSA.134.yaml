    - type: text
      text: '1'
  - type: text
    text: ' BEHOLD, BLESS (affectionately and gratefully praise) the Lord, all you servants of the Lord, [singers] who by night stand in the house of the Lord. [I Chron. 9:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Lift up your hands in holiness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to the sanctuary and bless the Lord [affectionately and gratefully praise Him]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The Lord bless you out of Zion, even He Who made heaven and earth.'
