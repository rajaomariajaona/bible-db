document_id: PSA.134,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents.
  - type: text
    content: ' BEHOLD, BLESS (affectionately and gratefully praise) the Lord, all you servants of the Lord, [singers] who by night stand in the house of the Lord. [I Chron. 9:33.]'
  '2':
  - type: text
    content: ' Lift up your hands in holiness '
  - type: text
    content: and
  - type: text
    content: ' to the sanctuary and bless the Lord [affectionately and gratefully praise Him]!'
  '3':
  - type: text
    content: ' The Lord bless you out of Zion, even He Who made heaven and earth.'
