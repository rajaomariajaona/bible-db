document_id: PSA.14,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. +[A Psalm+] of David.
  - type: text
    content: ' THE [empty-headed] fool has said in his heart, There is no God. They are corrupt, they have done abominable deeds; there is none that does good '
  - type: text
    content: or
  - type: text
    content: ' right. [Rom. 3:10.]'
  '2':
  - type: text
    content: ' The Lord looked down from heaven upon the children of men to see if there were any who understood, dealt wisely, '
  - type: text
    content: and
  - type: text
    content: ' sought after God, inquiring for '
  - type: text
    content: and
  - type: text
    content: ' of Him '
  - type: text
    content: and
  - type: text
    content: ' requiring Him [of vital necessity].'
  '3':
  - type: text
    content: ' They are all gone aside, they have '
  - type: text
    content: all
  - type: text
    content: ' together become filthy; there is none that does good '
  - type: text
    content: or
  - type: text
    content: ' right, no, not one. [Rom. 3:11, 12.]'
  '4':
  - type: text
    content: ' Have all the workers of iniquity no knowledge, who eat up my people as they eat bread and who do not call on the Lord?'
  '5':
  - type: text
    content: ' There they shall be in great fear [literally–dreading a dread], for God is with the generation of the [uncompromisingly] righteous (those upright and in right standing with Him).'
  '6':
  - type: text
    content: ' You [evildoers] would put to shame '
  - type: text
    content: and
  - type: text
    content: ' confound the plans of the poor '
  - type: text
    content: and
  - type: text
    content: ' patient, but the Lord is his safe refuge.'
  '7':
  - type: text
    content: ' Oh, that the salvation of Israel would come out of Zion! When the Lord shall restore the fortunes of His people, then Jacob shall rejoice '
  - type: text
    content: and
  - type: text
    content: ' Israel shall be glad. [Rom. 11:25-27.]'
