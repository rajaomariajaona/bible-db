document_id: PSA.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. +[A Psalm+] of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE [empty-headed] fool has said in his heart, There is no God. They are corrupt, they have done abominable deeds; there is none that does good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' right. [Rom. 3:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord looked down from heaven upon the children of men to see if there were any who understood, dealt wisely, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sought after God, inquiring for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' requiring Him [of vital necessity].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' They are all gone aside, they have '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all
  - type: text
    text: ' together become filthy; there is none that does good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' right, no, not one. [Rom. 3:11, 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Have all the workers of iniquity no knowledge, who eat up my people as they eat bread and who do not call on the Lord?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' There they shall be in great fear [literally–dreading a dread], for God is with the generation of the [uncompromisingly] righteous (those upright and in right standing with Him).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You [evildoers] would put to shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confound the plans of the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patient, but the Lord is his safe refuge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Oh, that the salvation of Israel would come out of Zion! When the Lord shall restore the fortunes of His people, then Jacob shall rejoice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Israel shall be glad. [Rom. 11:25-27.]'
