document_id: ZEC.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AGAIN I lifted up my eyes and behold, I saw a scroll flying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' floating in the air!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the angel said to me, What do you see? And I answered, I see a flying scroll; its length is twenty cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' thirty feet and its breadth is ten cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fifteen feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then he said to me, This is the curse that goes out over the face of the whole land; for everyone who steals shall be cut off from henceforth according to it [the curse written on this subject on the scroll], and everyone who swears falsely shall be cut off from henceforth according to it. [Isa. 24:6; Mal. 3:8, 9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I will bring [the curse] forth, says the Lord of hosts, and it shall enter into the house of the thief and into the house of him who swears falsely by My name; and it shall abide in the midst of his house and shall consume it, both its timber and its stones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the angel who talked with me came forward and said to me, Lift up now your eyes and see what this is that goes forth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And I said, What is it? [What does it symbolize?] And he said, This that goes forth is an ephah[-sized vessel for separate grains all collected together]. This, he continued, is the symbol of the sinners mentioned above '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is the resemblance of their iniquity throughout the whole land. [Amos 8:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And behold, a round, flat weight of lead was lifted and there sat a woman in the midst of the ephah[-sized vessel].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And he said, This is lawlessness (wickedness)! And he thrust her back into the ephah[-sized vessel] and he cast the weight of lead upon the mouth of it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then lifted I up my eyes and looked, and behold, there were two women coming forward! The wind was in their wings, for they had wings like the wings of a stork, and they lifted up the ephah[-sized vessel] between the earth and the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then said I to the angel who talked with me, Where are they taking the ephah[-sized vessel]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And he said to me, To the land of Shinar [Babylonia] to build it a house, and when it is finished, to set up the ephah[-sized vessel–the symbol of such sinners and their guilt] there upon its own base.'
