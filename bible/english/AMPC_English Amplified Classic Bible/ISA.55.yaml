document_id: ISA.55
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WAIT '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listen, everyone who is thirsty! Come to the waters; and he who has no money, come, buy and eat! Yes, come, buy [priceless, spiritual] wine and milk without money and without price [simply for the self-surrender that accepts the blessing]. [Rev. 21:6, 7; 22:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Why do you spend your money for that which is not bread, and your earnings for what does not satisfy? Hearken diligently to Me, and eat what is good, and let your soul delight itself in fatness [the profuseness of spiritual joy]. [Jer. 31:12-14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Incline your ear [submit and consent to the divine will] and come to Me; hear, and your soul will revive; and I will make an everlasting covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' league with you, even the sure mercy (kindness, goodwill, and compassion) promised to David. [II Sam. 7:8-16; Acts 13:34; Heb. 13:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Behold, I have appointed him (Him) [David, as a representative of the Messiah, or the Messiah Himself] to be a witness [one (One) who shall testify of salvation] to the nations, a prince (Prince) and commander (Commander) to the peoples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Behold, you [Israel] shall call nations that you know not, and nations that do not know you shall run to you because of the Lord your God, and of the Holy One of Israel, for He has glorified you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Seek, inquire for, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require the Lord while He may be found [claiming Him by necessity and by right]; call upon Him while He is near.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Let the wicked forsake his way and the unrighteous man his thoughts; and let him return to the Lord, and He will have love, pity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy for him, and to our God, for He will multiply to him His abundant pardon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For My thoughts are not your thoughts, neither are your ways My ways, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For as the heavens are higher than the earth, so are My ways higher than your ways and My thoughts than your thoughts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For as the rain and snow come down from the heavens, and return not there again, but water the earth and make it bring forth and sprout, that it may give seed to the sower and bread to the eater, [II Cor. 9:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So shall My word be that goes forth out of My mouth: it shall not return to Me void [without producing any effect, useless], but it shall accomplish that which I please '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose, and it shall prosper in the thing for which I sent it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For you shall go out [from the spiritual exile caused by sin and evil into the homeland] with joy and be led forth [by your Leader, the Lord Himself, and His word] with peace; the mountains and the hills shall break forth before you into singing, and all the trees of the field shall clap their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Instead of the thorn shall come up the cypress tree, and instead of the brier shall come up the myrtle tree; and it shall be to the Lord for a name of renown, for an everlasting sign [of jubilant exaltation] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' memorial [to His praise], which shall not be cut off.'
