document_id: JER.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE beginning of the reign of Zedekiah son of Josiah king of Judah, this word came to Jeremiah from the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Thus says the Lord to me: Make for yourself thongs and yoke bars and put them on your neck,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And send them to the king of Edom, to the king of Moab, to the king of the Ammonites, to the king of Tyre, and to the king of Sidon by the hand of the messengers who have come to Jerusalem to Zedekiah king of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And command them to say to their masters, Thus says the Lord of hosts, the God of Israel: Thus shall you say to your masters:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I have made the earth, the men, and the beasts that are upon the face of the earth by My great power and by My outstretched arm, and I give it to whomever it seems right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suitable to Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And now I have given all these lands into the hand of Nebuchadnezzar king of Babylon, My servant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instrument, and the beasts of the field also I have given him to serve him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And all nations shall serve him and his son and his grandson until the [God-appointed] time [of punishment] of his own land comes; and then many nations and great kings shall make him their slave.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But any nation or kingdom that will not serve this same Nebuchadnezzar king of Babylon and put its neck under the yoke of the king of Babylon, that nation will I punish, says the Lord, with the sword, with famine, and with pestilence, until I have consumed it by [Nebuchadnezzar''s] hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So do not listen to your [false] prophets, your diviners, your dreamers [and your dreams, whether your own or others''], your soothsayers, your sorcerers, who say to you, You shall not serve the king of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For they prophesy a lie to you which will cause you to be removed far from your land; and I will drive you out, and you will perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But any nation that brings its neck under the yoke of the king of Babylon and serves him, that nation will I let remain on its own land, says the Lord, to cultivate it and dwell in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I spoke also to Zedekiah king of Judah in the same way: Bring your necks under the yoke of the king of Babylon, and serve him and his people, and live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Why will you and your people die by the sword, by the famine, and by the pestilence, as the Lord has spoken concerning any nation that will not serve the king of Babylon?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Do not listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' believe the words of the [false] prophets who are saying to you, You shall not serve the king of Babylon, for it is a lie that they prophesy to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For I have not sent them, says the Lord; but they are prophesying falsely in My name. [It will only end when] I will drive you out to perish together with the [false] prophets who prophesy to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Also I said to the priests and to all these people, Thus says the Lord: Do not listen to the words of your [false] prophets who are prophesying to you, saying, Behold, the vessels of the Lord''s house shall now shortly be brought back from Babylon; for they are prophesying a lie to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Do not listen to them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' heed them; serve the king of Babylon, and live. Why should this city be laid waste?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But if they are true prophets and if the word of the Lord is really spoken by them, let them now make intercession to the Lord of hosts, that the vessels which are [still] left in the house of the Lord, in the house of the king of Judah, and in Jerusalem may not go to Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For thus says the Lord of hosts concerning the [bronze] pillars [each twenty-seven feet high], the [bronze] Sea [the laver at which the priests cleansed their hands and feet before ministering at the altar], the [bronze] bases [of the ten lavers in Solomon''s temple used for washing animals to be offered as sacrifices], and the remainder of the vessels which are left in this city [Jerusalem], [I Kings 7:23-37; II Chron. 4:6; Jer. 52:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Which Nebuchadnezzar king of Babylon did not take when he carried into exile from Jerusalem to Babylon Jeconiah [also called Coniah and Jehoiachin] son of Jehoiakim king of Judah, with all the nobles of Judah and Jerusalem–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Yes, thus says the Lord of hosts, the God of Israel, concerning the vessels which [still] remain in the house of the Lord, in the house of the king of Judah, and in Jerusalem:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' They will be carried to Babylon and there will they be until the day that I visit them [with My favor], says the Lord. Then I will bring them back and restore them to this place.'
