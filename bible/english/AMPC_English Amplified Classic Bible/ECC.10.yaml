document_id: ECC.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' DEAD FLIES cause the ointment of the perfumer to putrefy [and] send forth a vile odor; so does a little folly [in him who is valued for wisdom] outweigh wisdom and honor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' A wise man''s heart turns him toward his right hand, but a fool''s heart toward his left. [Matt. 25:31-41.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Even when he who is a fool walks along the road, his heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding fail him, and he says of everyone '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to everyone that he is a fool.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' If the temper of the ruler rises up against you, do not leave your place [or show a resisting spirit]; for gentleness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calmness prevent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' put a stop to great offenses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' There is an evil which I have seen under the sun, like an error which proceeds from the ruler:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Folly is set in great dignity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in high places, and the rich sit in low places.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' I have seen slaves on horses, and princes walking like slaves on the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He who digs a pit [for others] will fall into it, and whoever breaks through a fence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a [stone] wall, a serpent will bite him. [Ps. 57:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Whoever removes [landmark] stones '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hews out [new ones with similar intent] will be hurt with them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' he who fells trees will be endangered by them. [Prov. 26:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' If the ax is dull and the man does not whet the edge, he must put forth more strength; but wisdom helps him to succeed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' If the serpent bites before it is charmed, then it is no use to call a charmer [and the slanderer is no better than the uncharmed snake].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The words of a wise man''s mouth are gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' win him favor, but the lips of a fool consume him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The beginning of the words of his mouth is foolishness, and the end of his talk is wicked madness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' A fool also multiplies words, though no man can tell what will be–and what will happen after he is gone, who can tell him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The labor of fools wearies every one of them, because [he is so ignorant of the ordinary matters that] he does not even know how to get to town.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Woe to you, O land, when your king is a child '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a servant and when your officials feast in the morning!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Happy (fortunate and to be envied) are you, O land, when your king is a free man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of noble birth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' character and when your officials feast at the proper time–for strength and not for drunkenness! [Isa. 32:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Through indolence the rafters [of state affairs] decay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the roof sinks in, and through idleness of the hands the house leaks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [Instead of repairing the breaches, the officials] make a feast for laughter, serve wine to cheer life, and [depend on tax] money to answer for all of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Curse not the king, no, not even in your thoughts, and curse not the rich in your bedchamber, for a bird of the air will carry the voice, and a winged creature will tell the matter. [Exod. 22:28.]'
