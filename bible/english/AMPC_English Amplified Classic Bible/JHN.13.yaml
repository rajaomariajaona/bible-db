document_id: JHN.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' [NOW] BEFORE the Passover Feast began, Jesus knew (was fully aware) that the time had come for Him to leave this world '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return to the Father. And as He had loved those who were His own in the world, He loved them to the last '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to the highest degree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So [it was] during supper, Satan having already put the thought of betraying Jesus in the heart of Judas Iscariot, Simon''s son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' [That] Jesus, knowing (fully aware) that the Father had put everything into His hands, and that He had come from God and was [now] returning to God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Got up from supper, took off His garments, and taking a [servant''s] towel, He fastened it around His waist.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then He poured water into the washbasin and began to wash the disciples'' feet and to wipe them with the [servant''s] towel with which He was girded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When He came to Simon Peter, [Peter] said to Him, Lord, are my feet to be washed by You? [Is it for You to wash my feet?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Jesus said to him, You do not understand now what I am doing, but you will understand later on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Peter said to Him, You shall never wash my feet! Jesus answered him, Unless I wash you, you have no part with (in) Me [you have no share in companionship with Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Simon Peter said to Him, Lord, [wash] not only my feet, but my hands and my head too!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Jesus said to him, Anyone who has bathed needs only to wash his feet, but is clean all over. And you [My disciples] are clean, but not all of you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For He knew who was going to betray Him; that was the reason He said, Not all of you are clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' So when He had finished washing their feet and had put on His garments and had sat down again, He said to them, Do you understand what I have done to you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You call Me the Teacher (Master) and the Lord, and you are right in doing so, for that is what I am.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' If I then, your Lord and Teacher (Master), have washed your feet, you ought [it is your duty, you are under obligation, you owe it] to wash one another''s feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For I have given you this as an example, so that you should do [in your turn] what I have done to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I assure you, most solemnly I tell you, A servant is not greater than his master, and no one who is sent is superior to the one who sent him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' If you know these things, blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be envied are you if you practice them [if you act accordingly and really do them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' I am not speaking of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I do not mean all of you. I know whom I have chosen; but it is that the Scripture may be fulfilled, He who eats My bread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with Me
  - type: text
    text: ' has raised up his heel against Me. [Ps. 41:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' I tell you this now before it occurs, so that when it does take place you may be persuaded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' believe that I am He [Who I say I am–the Christ, the Anointed One, the Messiah].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' I assure you, most solemnly I tell you, he who receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' takes into his heart any messenger of Mine receives Me [in just that way]; and he who receives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' takes Me into his heart receives Him Who sent Me [in that same way].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' After Jesus had said these things, He was troubled (disturbed, agitated) in spirit and said, I assure you, most solemnly I tell you, one of you will deliver Me up [one of you will be false to Me and betray Me]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The disciples kept looking at one another, puzzled as to whom He could mean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' One of His disciples, whom Jesus loved [whom He esteemed and delighted in], was reclining [next to Him] on Jesus'' bosom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So Simon Peter motioned to him to ask of whom He was speaking.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then leaning back against Jesus'' breast, he asked Him, Lord, who is it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Jesus answered, It is the one to whom I am going to give this morsel (bit) of food after I have dipped it. So when He had dipped the morsel of bread [into the dish], He gave it to Judas, Simon Iscariot''s son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then after [he had taken] the bit of food, Satan entered into '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' took possession of [Judas]. Jesus said to him, What you are going to do, do more swiftly than you seem to intend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make quick work of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But nobody reclining at the table knew why He spoke to him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' what He meant by telling him this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Some thought that, since Judas had the money box (the purse), Jesus was telling him, Buy what we need for the Festival, or that he should give something to the poor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' So after receiving the bit of bread, he went out immediately. And it was night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' When he had left, Jesus said, Now is the Son of Man glorified! [Now He has achieved His glory, His honor, His exaltation!] And God has been glorified through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And if God is glorified through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in Him, God will also glorify Him in Himself, and He will glorify Him at once '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' not delay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' [Dear] little children, I am to be with you only a little longer. You will look for Me and, as I told the Jews, so I tell you now: you are not able to come where I am going.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' I give you a new commandment: that you should love one another. Just as I have loved you, so you too should love one another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' By this shall all [men] know that you are My disciples, if you love one another [if you keep on showing love among yourselves].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Simon Peter said to Him, Lord, where are You going? Jesus answered, You are not able to follow Me now where I am going, but you shall follow Me afterwards.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Peter said to Him, Lord, why cannot I follow You now? I will lay down my life for You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Jesus answered, Will you [really] lay down your life for Me? I assure you, most solemnly I tell you, before a rooster crows, you will deny Me [completely disown Me] three times.'
