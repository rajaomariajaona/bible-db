document_id: JHN.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' [NOW] BEFORE the Passover Feast began, Jesus knew (was fully aware) that the time had come for Him to leave this world '
  - type: text
    content: and
  - type: text
    content: ' return to the Father. And as He had loved those who were His own in the world, He loved them to the last '
  - type: text
    content: and
  - type: text
    content: ' to the highest degree.'
  '10':
  - type: text
    content: ' Jesus said to him, Anyone who has bathed needs only to wash his feet, but is clean all over. And you [My disciples] are clean, but not all of you.'
  '11':
  - type: text
    content: ' For He knew who was going to betray Him; that was the reason He said, Not all of you are clean.'
  '12':
  - type: text
    content: ' So when He had finished washing their feet and had put on His garments and had sat down again, He said to them, Do you understand what I have done to you?'
  '13':
  - type: text
    content: ' You call Me the Teacher (Master) and the Lord, and you are right in doing so, for that is what I am.'
  '14':
  - type: text
    content: ' If I then, your Lord and Teacher (Master), have washed your feet, you ought [it is your duty, you are under obligation, you owe it] to wash one another''s feet.'
  '15':
  - type: text
    content: ' For I have given you this as an example, so that you should do [in your turn] what I have done to you.'
  '16':
  - type: text
    content: ' I assure you, most solemnly I tell you, A servant is not greater than his master, and no one who is sent is superior to the one who sent him.'
  '17':
  - type: text
    content: ' If you know these things, blessed '
  - type: text
    content: and
  - type: text
    content: ' happy '
  - type: text
    content: and
  - type: text
    content: ' to be envied are you if you practice them [if you act accordingly and really do them].'
  '18':
  - type: text
    content: ' I am not speaking of '
  - type: text
    content: and
  - type: text
    content: ' I do not mean all of you. I know whom I have chosen; but it is that the Scripture may be fulfilled, He who eats My bread '
  - type: text
    content: with Me
  - type: text
    content: ' has raised up his heel against Me. [Ps. 41:9.]'
  '19':
  - type: text
    content: ' I tell you this now before it occurs, so that when it does take place you may be persuaded '
  - type: text
    content: and
  - type: text
    content: ' believe that I am He [Who I say I am–the Christ, the Anointed One, the Messiah].'
  '2':
  - type: text
    content: ' So [it was] during supper, Satan having already put the thought of betraying Jesus in the heart of Judas Iscariot, Simon''s son,'
  '20':
  - type: text
    content: ' I assure you, most solemnly I tell you, he who receives '
  - type: text
    content: and
  - type: text
    content: ' welcomes '
  - type: text
    content: and
  - type: text
    content: ' takes into his heart any messenger of Mine receives Me [in just that way]; and he who receives '
  - type: text
    content: and
  - type: text
    content: ' welcomes '
  - type: text
    content: and
  - type: text
    content: ' takes Me into his heart receives Him Who sent Me [in that same way].'
  '21':
  - type: text
    content: ' After Jesus had said these things, He was troubled (disturbed, agitated) in spirit and said, I assure you, most solemnly I tell you, one of you will deliver Me up [one of you will be false to Me and betray Me]!'
  '22':
  - type: text
    content: ' The disciples kept looking at one another, puzzled as to whom He could mean.'
  '23':
  - type: text
    content: ' One of His disciples, whom Jesus loved [whom He esteemed and delighted in], was reclining [next to Him] on Jesus'' bosom.'
  '24':
  - type: text
    content: ' So Simon Peter motioned to him to ask of whom He was speaking.'
  '25':
  - type: text
    content: ' Then leaning back against Jesus'' breast, he asked Him, Lord, who is it?'
  '26':
  - type: text
    content: ' Jesus answered, It is the one to whom I am going to give this morsel (bit) of food after I have dipped it. So when He had dipped the morsel of bread [into the dish], He gave it to Judas, Simon Iscariot''s son.'
  '27':
  - type: text
    content: ' Then after [he had taken] the bit of food, Satan entered into '
  - type: text
    content: and
  - type: text
    content: ' took possession of [Judas]. Jesus said to him, What you are going to do, do more swiftly than you seem to intend '
  - type: text
    content: and
  - type: text
    content: ' make quick work of it.'
  '28':
  - type: text
    content: ' But nobody reclining at the table knew why He spoke to him '
  - type: text
    content: or
  - type: text
    content: ' what He meant by telling him this.'
  '29':
  - type: text
    content: ' Some thought that, since Judas had the money box (the purse), Jesus was telling him, Buy what we need for the Festival, or that he should give something to the poor.'
  '3':
  - type: text
    content: ' [That] Jesus, knowing (fully aware) that the Father had put everything into His hands, and that He had come from God and was [now] returning to God,'
  '30':
  - type: text
    content: ' So after receiving the bit of bread, he went out immediately. And it was night.'
  '31':
  - type: text
    content: ' When he had left, Jesus said, Now is the Son of Man glorified! [Now He has achieved His glory, His honor, His exaltation!] And God has been glorified through '
  - type: text
    content: and
  - type: text
    content: ' in Him.'
  '32':
  - type: text
    content: ' And if God is glorified through '
  - type: text
    content: and
  - type: text
    content: ' in Him, God will also glorify Him in Himself, and He will glorify Him at once '
  - type: text
    content: and
  - type: text
    content: ' not delay.'
  '33':
  - type: text
    content: ' [Dear] little children, I am to be with you only a little longer. You will look for Me and, as I told the Jews, so I tell you now: you are not able to come where I am going.'
  '34':
  - type: text
    content: ' I give you a new commandment: that you should love one another. Just as I have loved you, so you too should love one another.'
  '35':
  - type: text
    content: ' By this shall all [men] know that you are My disciples, if you love one another [if you keep on showing love among yourselves].'
  '36':
  - type: text
    content: ' Simon Peter said to Him, Lord, where are You going? Jesus answered, You are not able to follow Me now where I am going, but you shall follow Me afterwards.'
  '37':
  - type: text
    content: ' Peter said to Him, Lord, why cannot I follow You now? I will lay down my life for You.'
  '38':
  - type: text
    content: ' Jesus answered, Will you [really] lay down your life for Me? I assure you, most solemnly I tell you, before a rooster crows, you will deny Me [completely disown Me] three times.'
  '4':
  - type: text
    content: ' Got up from supper, took off His garments, and taking a [servant''s] towel, He fastened it around His waist.'
  '5':
  - type: text
    content: ' Then He poured water into the washbasin and began to wash the disciples'' feet and to wipe them with the [servant''s] towel with which He was girded.'
  '6':
  - type: text
    content: ' When He came to Simon Peter, [Peter] said to Him, Lord, are my feet to be washed by You? [Is it for You to wash my feet?]'
  '7':
  - type: text
    content: ' Jesus said to him, You do not understand now what I am doing, but you will understand later on.'
  '8':
  - type: text
    content: ' Peter said to Him, You shall never wash my feet! Jesus answered him, Unless I wash you, you have no part with (in) Me [you have no share in companionship with Me].'
  '9':
  - type: text
    content: ' Simon Peter said to Him, Lord, [wash] not only my feet, but my hands and my head too!'
