document_id: GEN.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND GOD [earnestly] remembered Noah and every living thing and all the animals that were with him in the ark; and God made a wind blow over the land, and the waters sank down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abated.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He waited another seven days and again sent forth the dove out of the ark.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And the dove came back to him in the evening, and behold, in her mouth was a newly sprouted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' freshly plucked olive leaf! So Noah knew that the waters had subsided from the land.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then he waited another seven days and sent forth the dove, but she did not return to him any more.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' In the year 601 [of Noah''s life], on the first day of the first month, the waters were drying up from the land. And Noah removed the covering of the ark and looked, and behold, the surface of the ground was drying.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And on the twenty-seventh day of the second month the land was entirely dry.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And God spoke to Noah, saying,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Go forth from the ark, you and your wife and your sons and their wives with you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Bring forth every living thing that is with you of all flesh–birds and beasts and every creeping thing that creeps on the ground–that they may breed abundantly on the land and be fruitful and multiply upon the earth.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And Noah went forth, and his wife and his sons and their wives with him [after being in the ark one year and ten days].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Every beast, every creeping thing, every bird–and whatever moves on the land–went forth by families out of the ark.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Also the fountains of the deep and the windows of the heavens were closed, the gushing rain from the sky was checked,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And Noah built an altar to the Lord and took of every clean [four-footed] animal and of every clean fowl '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bird and offered burnt offerings on the altar.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' When the Lord smelled the pleasing odor [a scent of satisfaction to His heart], the Lord said to Himself, I will never again curse the ground because of man, for the imagination (the strong desire) of man''s heart is evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wicked from his youth; neither will I ever again smite '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy every living thing, as I have done.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' While the earth remains, seedtime and harvest, cold and heat, summer and winter, and day and night shall not cease.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And the waters receded from the land continually. At the end of 150 days the waters had diminished.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' On the seventeenth day of the seventh month the ark came to rest on the mountains of Ararat [in Armenia].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And the waters continued to diminish until the tenth month; on the first day of the tenth month the tops of the high hills were seen.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' At the end of [another] forty days Noah opened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a
    - type: text
      text: ' window of the ark which he had made'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And sent forth a raven, which kept going to and fro until the waters were dried up from the land.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then he sent forth a dove to see if the waters had decreased from the surface of the ground.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But the dove found no resting-place on which to roost, and she returned to him to the ark, for the waters were [yet] on the face of the whole land. So he put forth his hand and drew her to him into the ark.'
