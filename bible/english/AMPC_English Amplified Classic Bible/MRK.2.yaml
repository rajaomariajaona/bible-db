document_id: MRK.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND JESUS having returned to Capernaum, after some days it was rumored about that He was in the house [probably Peter''s].'
  '10':
  - type: text
    content: ' But that you may know positively '
  - type: text
    content: and
  - type: text
    content: ' beyond a doubt that the Son of Man has right '
  - type: text
    content: and
  - type: text
    content: ' authority '
  - type: text
    content: and
  - type: text
    content: ' power on earth to forgive sins–He said to the paralyzed man,'
  '11':
  - type: text
    content: ' I say to you, arise, pick up '
  - type: text
    content: and
  - type: text
    content: ' carry your sleeping pad '
  - type: text
    content: or
  - type: text
    content: ' mat, and be going on home.'
  '12':
  - type: text
    content: ' And he arose at once and picked up the sleeping pad '
  - type: text
    content: or
  - type: text
    content: ' mat and went out before them all, so that they were all amazed and recognized '
  - type: text
    content: and
  - type: text
    content: ' praised '
  - type: text
    content: and
  - type: text
    content: ' thanked God, saying, We have never seen anything like this before!'
  '13':
  - type: text
    content: ' [Jesus] went out again along the seashore; and all the multitude kept gathering about Him, and He kept teaching them.'
  '14':
  - type: text
    content: ' And as He was passing by, He saw Levi (Matthew) son of Alphaeus sitting at the tax office, and He said to him, Follow Me! [Be joined to Me as a disciple, side with My party!] And he arose and joined Him as His disciple '
  - type: text
    content: and
  - type: text
    content: ' sided with His party '
  - type: text
    content: and
  - type: text
    content: ' accompanied Him.'
  '15':
  - type: text
    content: ' And as Jesus, together with His disciples, sat at table in his [Levi''s] house, many tax collectors and persons [definitely stained] with sin were dining with Him, for there were many who walked the same road (followed) with Him.'
  '16':
  - type: text
    content: ' And the scribes [belonging to the party] of the Pharisees, when they saw that He was eating with [those definitely known to be especially wicked] sinners and tax collectors, said to His disciples, Why does He eat '
  - type: text
    content: and drink
  - type: text
    content: ' with tax collectors and [notorious] sinners?'
  '17':
  - type: text
    content: ' And when Jesus heard it, He said to them, Those who are strong '
  - type: text
    content: and
  - type: text
    content: ' well have no need of a physician, but those who are weak '
  - type: text
    content: and
  - type: text
    content: ' sick; I came not to call the righteous ones '
  - type: text
    content: to repentance,
  - type: text
    content: ' but sinners (the erring ones and all those not free from sin).'
  '18':
  - type: text
    content: ' Now John''s disciples and the Pharisees were observing a fast; and [some people] came and asked Jesus, Why are John''s disciples and the disciples of the Pharisees fasting, but Your disciples are not doing so?'
  '19':
  - type: text
    content: ' Jesus answered them, Can the wedding guests fast (abstain from food and drink) while the bridegroom is with them? As long as they have the bridegroom with them, they cannot fast.'
  '2':
  - type: text
    content: ' And so many people gathered together there that there was no longer room [for them], not even around the door; and He was discussing the Word.'
  '20':
  - type: text
    content: ' But the days will come when the bridegroom will be taken away from them, and they will fast in that day.'
  '21':
  - type: text
    content: ' No one sews a patch of unshrunken (new) goods on an old garment; if he does, the patch tears away from it, the new from the old, and the rent (tear) becomes bigger '
  - type: text
    content: and
  - type: text
    content: ' worse [than it was before].'
  '22':
  - type: text
    content: ' And no one puts new wine into old wineskins; if he does, the wine will burst the skins, and the wine is lost and the bottles destroyed; but new wine is to be put in new (fresh) wineskins.'
  '23':
  - type: text
    content: ' One Sabbath He was going along beside the fields of standing grain, and as they made their way, His disciples began to pick off the grains. [Deut. 23:25.]'
  '24':
  - type: text
    content: ' And the Pharisees said to Him, Look! Why are they doing what is not permitted '
  - type: text
    content: or
  - type: text
    content: ' lawful on the Sabbath?'
  '25':
  - type: text
    content: ' And He said to them, Have you never [even] read what David did when he was in need and was hungry, he and those who were accompanying him?–'
  '26':
  - type: text
    content: ' How he went into the house of God when Abiathar was the high priest, and ate the sacred loaves set forth [before God], which it is not permitted '
  - type: text
    content: or
  - type: text
    content: ' lawful for any but the priests to eat, and [how he] also gave [them] to those who were with him? [I Sam. 21:1-6; II Sam. 8:17.]'
  '27':
  - type: text
    content: ' And Jesus said to them, The Sabbath was made on account '
  - type: text
    content: and
  - type: text
    content: ' for the sake of man, not man for the Sabbath; [Exod. 23:12; Deut. 5:14.]'
  '28':
  - type: text
    content: ' So the Son of Man is Lord even of the Sabbath.'
  '3':
  - type: text
    content: ' Then they came, bringing a paralytic to Him, who had been picked up '
  - type: text
    content: and
  - type: text
    content: ' was being carried by four men.'
  '4':
  - type: text
    content: ' And when they could not get him to a place in front of Jesus because of the throng, they dug through the roof above Him; and when they had scooped out an opening, they let down the [thickly padded] quilt '
  - type: text
    content: or
  - type: text
    content: ' mat upon which the paralyzed man lay.'
  '5':
  - type: text
    content: ' And when Jesus saw their faith [their confidence in God through Him], He said to the paralyzed man, Son, your sins are forgiven [you] '
  - type: text
    content: and
  - type: text
    content: ' put away [that is, the penalty is remitted, the sense of guilt removed, and you are made upright and in right standing with God].'
  '6':
  - type: text
    content: ' Now some of the scribes were sitting there, holding a dialogue with themselves as they questioned in their hearts,'
  '7':
  - type: text
    content: ' Why does this Man talk like this? He is blaspheming! Who can forgive sins [remove guilt, remit the penalty, and bestow righteousness instead] except God alone?'
  '8':
  - type: text
    content: ' And at once Jesus, becoming fully aware in His spirit that they thus debated within themselves, said to them, Why do you argue (debate, reason) about all this in your hearts?'
  '9':
  - type: text
    content: ' Which is easier: to say to the paralyzed man, Your sins are forgiven '
  - type: text
    content: and
  - type: text
    content: ' put away, or to say, Rise, take up your sleeping pad '
  - type: text
    content: or
  - type: text
    content: ' mat, and start walking about [and keep on walking]?'
