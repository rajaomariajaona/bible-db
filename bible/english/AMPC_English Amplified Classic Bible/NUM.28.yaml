document_id: NUM.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Command the Israelites, saying, My offering, My food for My offerings made by fire, My sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing odor you shall be careful to offer to Me at its proper time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And you shall say to the people, This is the offering made by fire which you shall offer to the Lord: two male lambs a year old without spot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' blemish, two day by day, for a continual burnt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' One lamb you shall offer in the morning and the other in the evening,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Also a tenth of an ephah of flour for a cereal offering, mixed with a fourth of a hin of beaten oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' It is a continual burnt offering which was ordained in Mount Sinai for a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing odor, an offering made by fire to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Its drink offering shall be a fourth of a hin for each lamb; in the Holy Place you shall pour out a fermented drink offering to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the other lamb you shall offer in the evening; like the cereal offering of the morning and like its drink offering, you shall offer it, an offering made by fire, a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing odor to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And on the Sabbath day two male lambs a year old without spot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' blemish, and two-tenths of an ephah of flour for a cereal offering, mixed with oil, and its drink offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' This is the burnt offering of every Sabbath, besides the continual burnt offering and its drink offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And at the beginning of your months you shall offer a burnt offering to the Lord: two young bulls, one ram, seven male lambs a year old without spot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' blemish;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And three-tenths of an ephah of fine flour for a cereal offering, mixed with oil, for each bull; and two-tenths of an ephah of fine flour for a cereal offering, mixed with oil, for the one ram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And a tenth part of fine flour mixed with oil as a cereal offering, for each lamb, for a burnt offering of a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasant fragrance, an offering made by fire to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And their drink offerings shall be half a hin of wine for a bull, and a third of a hin for a ram, and a fourth of a hin for a lamb. This is the burnt offering of each month throughout the months of the year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And one male goat for a sin offering to the Lord–it shall be offered in addition to the continual burnt offering and its drink offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' On the fourteenth day of the first month is the Lord''s Passover.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' On the fifteenth day of this month is a feast; for seven days shall unleavened bread be eaten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' On the first day there shall be a holy [summoned] assembly; you shall do no servile work that day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But you shall offer an offering made by fire, a burnt offering to the Lord: two young bulls, one ram, and seven male lambs a year old; they shall be without blemish to the best of your knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And their cereal offering shall be of fine flour mixed with oil; three-tenths of an ephah shall you offer for a bull, and two-tenths for a ram;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' A tenth shall you offer for each of the seven male lambs,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Also one male goat for a sin offering to make atonement for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' You shall offer these in addition to the burnt offering of the morning, which is for a continual burnt offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' In this way you shall offer daily for seven days the food of an offering made by fire, a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing odor to the Lord; it shall be offered in addition to the continual burnt offering and its drink offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And on the seventh day you shall have a holy [summoned] assembly; you shall do no work befitting a slave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a servant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Also in the day of the firstfruits, when you offer a cereal offering of new grain to the Lord at your Feast of Weeks, you shall have a holy [summoned] assembly; you shall do no servile work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But you shall offer the burnt offering for a sweet, pleasing, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing fragrance to the Lord: two young bulls, one ram, seven male lambs a year old,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And their cereal offering of fine flour mixed with oil, three-tenths of an ephah for each bull, two-tenths for one ram,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' A tenth for each of the seven male lambs,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And one male goat to make atonement for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' You shall offer them in addition to the continual burnt offering and its cereal offering and their drink offerings. See that they are without blemish.'
