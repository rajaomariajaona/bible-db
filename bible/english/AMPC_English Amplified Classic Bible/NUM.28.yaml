document_id: NUM.28,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' This is the burnt offering of every Sabbath, besides the continual burnt offering and its drink offering.'
  '11':
  - type: text
    content: ' And at the beginning of your months you shall offer a burnt offering to the Lord: two young bulls, one ram, seven male lambs a year old without spot '
  - type: text
    content: or
  - type: text
    content: ' blemish;'
  '12':
  - type: text
    content: ' And three-tenths of an ephah of fine flour for a cereal offering, mixed with oil, for each bull; and two-tenths of an ephah of fine flour for a cereal offering, mixed with oil, for the one ram.'
  '13':
  - type: text
    content: ' And a tenth part of fine flour mixed with oil as a cereal offering, for each lamb, for a burnt offering of a sweet '
  - type: text
    content: and
  - type: text
    content: ' pleasant fragrance, an offering made by fire to the Lord.'
  '14':
  - type: text
    content: ' And their drink offerings shall be half a hin of wine for a bull, and a third of a hin for a ram, and a fourth of a hin for a lamb. This is the burnt offering of each month throughout the months of the year.'
  '15':
  - type: text
    content: ' And one male goat for a sin offering to the Lord–it shall be offered in addition to the continual burnt offering and its drink offering.'
  '16':
  - type: text
    content: ' On the fourteenth day of the first month is the Lord''s Passover.'
  '17':
  - type: text
    content: ' On the fifteenth day of this month is a feast; for seven days shall unleavened bread be eaten.'
  '18':
  - type: text
    content: ' On the first day there shall be a holy [summoned] assembly; you shall do no servile work that day.'
  '19':
  - type: text
    content: ' But you shall offer an offering made by fire, a burnt offering to the Lord: two young bulls, one ram, and seven male lambs a year old; they shall be without blemish to the best of your knowledge.'
  '2':
  - type: text
    content: ' Command the Israelites, saying, My offering, My food for My offerings made by fire, My sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing odor you shall be careful to offer to Me at its proper time.'
  '20':
  - type: text
    content: ' And their cereal offering shall be of fine flour mixed with oil; three-tenths of an ephah shall you offer for a bull, and two-tenths for a ram;'
  '21':
  - type: text
    content: ' A tenth shall you offer for each of the seven male lambs,'
  '22':
  - type: text
    content: ' Also one male goat for a sin offering to make atonement for you.'
  '23':
  - type: text
    content: ' You shall offer these in addition to the burnt offering of the morning, which is for a continual burnt offering.'
  '24':
  - type: text
    content: ' In this way you shall offer daily for seven days the food of an offering made by fire, a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing odor to the Lord; it shall be offered in addition to the continual burnt offering and its drink offering.'
  '25':
  - type: text
    content: ' And on the seventh day you shall have a holy [summoned] assembly; you shall do no work befitting a slave '
  - type: text
    content: or
  - type: text
    content: ' a servant.'
  '26':
  - type: text
    content: ' Also in the day of the firstfruits, when you offer a cereal offering of new grain to the Lord at your Feast of Weeks, you shall have a holy [summoned] assembly; you shall do no servile work.'
  '27':
  - type: text
    content: ' But you shall offer the burnt offering for a sweet, pleasing, '
  - type: text
    content: and
  - type: text
    content: ' soothing fragrance to the Lord: two young bulls, one ram, seven male lambs a year old,'
  '28':
  - type: text
    content: ' And their cereal offering of fine flour mixed with oil, three-tenths of an ephah for each bull, two-tenths for one ram,'
  '29':
  - type: text
    content: ' A tenth for each of the seven male lambs,'
  '3':
  - type: text
    content: ' And you shall say to the people, This is the offering made by fire which you shall offer to the Lord: two male lambs a year old without spot '
  - type: text
    content: or
  - type: text
    content: ' blemish, two day by day, for a continual burnt offering.'
  '30':
  - type: text
    content: ' And one male goat to make atonement for you.'
  '31':
  - type: text
    content: ' You shall offer them in addition to the continual burnt offering and its cereal offering and their drink offerings. See that they are without blemish.'
  '4':
  - type: text
    content: ' One lamb you shall offer in the morning and the other in the evening,'
  '5':
  - type: text
    content: ' Also a tenth of an ephah of flour for a cereal offering, mixed with a fourth of a hin of beaten oil.'
  '6':
  - type: text
    content: ' It is a continual burnt offering which was ordained in Mount Sinai for a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing odor, an offering made by fire to the Lord.'
  '7':
  - type: text
    content: ' Its drink offering shall be a fourth of a hin for each lamb; in the Holy Place you shall pour out a fermented drink offering to the Lord.'
  '8':
  - type: text
    content: ' And the other lamb you shall offer in the evening; like the cereal offering of the morning and like its drink offering, you shall offer it, an offering made by fire, a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing odor to the Lord.'
  '9':
  - type: text
    content: ' And on the Sabbath day two male lambs a year old without spot '
  - type: text
    content: or
  - type: text
    content: ' blemish, and two-tenths of an ephah of flour for a cereal offering, mixed with oil, and its drink offering.'
