document_id: ZEC.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE word of the Lord of hosts came to me, saying,'
  '10':
  - type: text
    content: ' For before those days there was no hire for man nor any hire for beast, neither was there any peace '
  - type: text
    content: or
  - type: text
    content: ' success to him who went out or came in because of the adversary '
  - type: text
    content: and
  - type: text
    content: ' oppressor, for I set (let loose) all men, every one against his neighbor.'
  '11':
  - type: text
    content: ' But now [in this period since you began to build] I am not to the remnant of this people as in the former days, says the Lord of hosts.'
  '12':
  - type: text
    content: ' For there shall the seed produce peace '
  - type: text
    content: and
  - type: text
    content: ' prosperity; the vine shall yield her fruit and the ground shall give its increase and the heavens shall give their dew; and I will cause the remnant of this people to inherit '
  - type: text
    content: and
  - type: text
    content: ' possess all these things.'
  '13':
  - type: text
    content: ' And as you have been a curse '
  - type: text
    content: and
  - type: text
    content: ' a byword among the nations, O house of Judah and house of Israel, so will I save you, and you shall be a blessing. Fear not, but let your hands be strong '
  - type: text
    content: and
  - type: text
    content: ' hardened. [Jer. 22:8, 9.]'
  '14':
  - type: text
    content: ' For thus says the Lord of hosts: As I thought to bring calamity upon you when your fathers provoked Me to wrath, says the Lord of hosts, and I did not relent '
  - type: text
    content: or
  - type: text
    content: ' revoke your sentence,'
  '15':
  - type: text
    content: ' So again have I purposed in these days to do good to Jerusalem and to the house of Judah. Fear not!'
  '16':
  - type: text
    content: ' These are the things that you shall do: speak every man the truth with his neighbor; render the truth and pronounce the judgment '
  - type: text
    content: or
  - type: text
    content: ' verdict that makes for peace in [the courts at] your gates. [Eph. 4:25.]'
  '17':
  - type: text
    content: ' And let none of you think '
  - type: text
    content: or
  - type: text
    content: ' imagine '
  - type: text
    content: or
  - type: text
    content: ' devise evil '
  - type: text
    content: or
  - type: text
    content: ' injury in your hearts against his neighbor, and love no false oath, for all these things I hate, says the Lord.'
  '18':
  - type: text
    content: ' And the word of the Lord of hosts came to me [Zechariah], saying,'
  '19':
  - type: text
    content: ' Thus says the Lord of hosts: The fast of the fourth month and the fast of the fifth, the fast of the seventh and the fast of the tenth, shall be to the house of Judah times of joy and gladness and cheerful, appointed seasons; therefore [in order that this may happen to you, as the condition of fulfilling the promise] love truth and peace.'
  '2':
  - type: text
    content: ' Thus says the Lord of hosts: I am jealous for Zion with great jealousy, and I am jealous for her with great wrath [against her enemies].'
  '20':
  - type: text
    content: ' Thus says the Lord of hosts: It shall yet come to pass that there shall come [to Jerusalem] peoples and the inhabitants of many '
  - type: text
    content: and
  - type: text
    content: ' great cities,'
  '21':
  - type: text
    content: ' And the inhabitants of one city shall go to them of another, saying, Let us go speedily to pray '
  - type: text
    content: and
  - type: text
    content: ' entreat the favor of the Lord and to seek, inquire of, '
  - type: text
    content: and
  - type: text
    content: ' require [to meet our own most essential need] the Lord of hosts. I will go also.'
  '22':
  - type: text
    content: ' Yes, many people and strong nations shall come to Jerusalem to seek, inquire of, '
  - type: text
    content: and
  - type: text
    content: ' require [to fill their own urgent need] the Lord of hosts and to pray to the Lord for His favor.'
  '23':
  - type: text
    content: ' Thus says the Lord of hosts: In those days ten men out of all languages of the nations shall take hold of the robe of him who is a Jew, saying, Let us go with you, for we have heard that God is with you.'
  '3':
  - type: text
    content: ' Thus says the Lord: I shall return to Zion and will dwell in the midst of Jerusalem, and Jerusalem shall be called the [faithful] City of Truth, and the mountain of the Lord of hosts, the Holy Mountain.'
  '4':
  - type: text
    content: ' Thus says the Lord of hosts: Old men and old women shall again dwell in Jerusalem '
  - type: text
    content: and
  - type: text
    content: ' sit out in the streets, every man with his staff in his hand for very [advanced] age.'
  '5':
  - type: text
    content: ' And the streets of the city shall be full of boys and girls playing in its streets.'
  '6':
  - type: text
    content: ' Thus says the Lord of hosts: Because it will be marvelous in the eyes of the remnant of this people in those days [in which it comes to pass], should it also be marvelous in My eyes? says the Lord of hosts. [Gen. 18:14; Jer. 32:17, 27; Luke 18:27.]'
  '7':
  - type: text
    content: ' Thus says the Lord of hosts: Behold, I will save My people from the east country and from the west [the country of the going down of the sun]. [Isa. 43:5, 6.]'
  '8':
  - type: text
    content: ' And I will bring them [home] and they shall dwell in the midst of Jerusalem; and they shall be My people, and I will be their God in truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness and in righteousness.'
  '9':
  - type: text
    content: ' Thus says the Lord of hosts: Let your hands be strong '
  - type: text
    content: and
  - type: text
    content: ' hardened, you who in these days hear these words from the mouths of the prophets who on the day that the foundation of the house of the Lord of hosts was laid foretold that the temple should be rebuilt.'
