document_id: ZEC.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE word of the Lord of hosts came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Thus says the Lord of hosts: I am jealous for Zion with great jealousy, and I am jealous for her with great wrath [against her enemies].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Thus says the Lord: I shall return to Zion and will dwell in the midst of Jerusalem, and Jerusalem shall be called the [faithful] City of Truth, and the mountain of the Lord of hosts, the Holy Mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Thus says the Lord of hosts: Old men and old women shall again dwell in Jerusalem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sit out in the streets, every man with his staff in his hand for very [advanced] age.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the streets of the city shall be full of boys and girls playing in its streets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Thus says the Lord of hosts: Because it will be marvelous in the eyes of the remnant of this people in those days [in which it comes to pass], should it also be marvelous in My eyes? says the Lord of hosts. [Gen. 18:14; Jer. 32:17, 27; Luke 18:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Thus says the Lord of hosts: Behold, I will save My people from the east country and from the west [the country of the going down of the sun]. [Isa. 43:5, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I will bring them [home] and they shall dwell in the midst of Jerusalem; and they shall be My people, and I will be their God in truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness and in righteousness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Thus says the Lord of hosts: Let your hands be strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hardened, you who in these days hear these words from the mouths of the prophets who on the day that the foundation of the house of the Lord of hosts was laid foretold that the temple should be rebuilt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For before those days there was no hire for man nor any hire for beast, neither was there any peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' success to him who went out or came in because of the adversary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressor, for I set (let loose) all men, every one against his neighbor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But now [in this period since you began to build] I am not to the remnant of this people as in the former days, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For there shall the seed produce peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosperity; the vine shall yield her fruit and the ground shall give its increase and the heavens shall give their dew; and I will cause the remnant of this people to inherit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' possess all these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And as you have been a curse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a byword among the nations, O house of Judah and house of Israel, so will I save you, and you shall be a blessing. Fear not, but let your hands be strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hardened. [Jer. 22:8, 9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For thus says the Lord of hosts: As I thought to bring calamity upon you when your fathers provoked Me to wrath, says the Lord of hosts, and I did not relent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' revoke your sentence,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So again have I purposed in these days to do good to Jerusalem and to the house of Judah. Fear not!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' These are the things that you shall do: speak every man the truth with his neighbor; render the truth and pronounce the judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' verdict that makes for peace in [the courts at] your gates. [Eph. 4:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And let none of you think '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' imagine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' devise evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' injury in your hearts against his neighbor, and love no false oath, for all these things I hate, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the word of the Lord of hosts came to me [Zechariah], saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Thus says the Lord of hosts: The fast of the fourth month and the fast of the fifth, the fast of the seventh and the fast of the tenth, shall be to the house of Judah times of joy and gladness and cheerful, appointed seasons; therefore [in order that this may happen to you, as the condition of fulfilling the promise] love truth and peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Thus says the Lord of hosts: It shall yet come to pass that there shall come [to Jerusalem] peoples and the inhabitants of many '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' great cities,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the inhabitants of one city shall go to them of another, saying, Let us go speedily to pray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entreat the favor of the Lord and to seek, inquire of, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require [to meet our own most essential need] the Lord of hosts. I will go also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Yes, many people and strong nations shall come to Jerusalem to seek, inquire of, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require [to fill their own urgent need] the Lord of hosts and to pray to the Lord for His favor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Thus says the Lord of hosts: In those days ten men out of all languages of the nations shall take hold of the robe of him who is a Jew, saying, Let us go with you, for we have heard that God is with you.'
