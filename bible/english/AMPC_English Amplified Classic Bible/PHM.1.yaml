document_id: PHM.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PAUL, A prisoner [for the sake] of Christ Jesus (the Messiah), and our brother Timothy, to Philemon our dearly beloved sharer with us in our work,'
  '10':
  - type: text
    content: ' I appeal to you for my [own spiritual] child, Onesimus [meaning profitable], whom I have begotten [in the faith] while a captive in these chains.'
  '11':
  - type: text
    content: ' Once he was unprofitable to you, but now he is indeed profitable to you as well as to me.'
  '12':
  - type: text
    content: ' I am sending him back to you in his own person, [and it is like sending] my very heart.'
  '13':
  - type: text
    content: ' I would have chosen to keep him with me, in order that he might minister to my needs in your stead during my imprisonment for the Gospel''s sake.'
  '14':
  - type: text
    content: ' But it has been my wish to do nothing about it without first consulting you '
  - type: text
    content: and
  - type: text
    content: ' getting your consent, in order that your benevolence might not seem to be the result of compulsion '
  - type: text
    content: or
  - type: text
    content: ' of pressure but might be voluntary [on your part].'
  '15':
  - type: text
    content: ' Perhaps it was for this reason that he was separated [from you] for a while, that you might have him back as yours forever,'
  '16':
  - type: text
    content: ' Not as a slave any longer but as [something] more than a slave, as a brother [Christian], especially dear to me but how much more to you, both in the flesh [as a servant] and in the Lord [as a fellow believer].'
  '17':
  - type: text
    content: ' If then you consider me a partner '
  - type: text
    content: and
  - type: text
    content: ' a comrade in fellowship, welcome '
  - type: text
    content: and
  - type: text
    content: ' receive him as you would [welcome and receive] me.'
  '18':
  - type: text
    content: ' And if he has done you any wrong in any way or owes anything [to you], charge that to my account.'
  '19':
  - type: text
    content: ' I, Paul, write it with my own hand, I promise to repay it [in full]–and that is to say nothing [of the fact] that you owe me your very self!'
  '2':
  - type: text
    content: ' And to Apphia our sister and Archippus our fellow soldier [in the Christian warfare], and to the church [assembly that meets] in your house:'
  '20':
  - type: text
    content: ' Yes, brother, let me have some profit from you in the Lord. Cheer '
  - type: text
    content: and
  - type: text
    content: ' refresh my heart in Christ.'
  '21':
  - type: text
    content: ' I write to you [perfectly] confident of your obedient compliance, knowing that you will do even more than I ask.'
  '22':
  - type: text
    content: ' At the same time prepare a guest room [in expectation of extending your hospitality] to me, for I am hoping through your prayers to be granted [the gracious privilege of coming] to you.'
  '23':
  - type: text
    content: ' Greetings to you from Epaphras, my fellow prisoner here in [the cause of] Christ Jesus (the Messiah),'
  '24':
  - type: text
    content: ' And [from] Mark, Aristarchus, Demas, and Luke, my fellow workers.'
  '25':
  - type: text
    content: ' The grace (blessing and favor) of the Lord Jesus Christ (the Messiah) be with your spirit. '
  - type: text
    content: Amen (so be it).
  '3':
  - type: text
    content: ' Grace (spiritual blessing and favor) be to all of you and [heart] peace from God our Father and the Lord Jesus Christ (the Messiah).'
  '4':
  - type: text
    content: ' I give thanks to my God for you always when I mention you in my prayers,'
  '5':
  - type: text
    content: ' Because I continue to hear of your love and of your loyal faith which you have toward the Lord Jesus and [which you show] toward all the saints (God''s consecrated people).'
  '6':
  - type: text
    content: ' [And I pray] that the participation in '
  - type: text
    content: and
  - type: text
    content: ' sharing of your faith may produce '
  - type: text
    content: and
  - type: text
    content: ' promote full recognition '
  - type: text
    content: and
  - type: text
    content: ' appreciation '
  - type: text
    content: and
  - type: text
    content: ' understanding '
  - type: text
    content: and
  - type: text
    content: ' precise knowledge of every good [thing] that is ours in [our identification with] Christ '
  - type: text
    content: Jesus
  - type: text
    content: ' [and unto His glory].'
  '7':
  - type: text
    content: ' For I have derived great joy and comfort '
  - type: text
    content: and
  - type: text
    content: ' encouragement from your love, because the hearts of the saints [who are your fellow Christians] have been cheered '
  - type: text
    content: and
  - type: text
    content: ' refreshed through you, [my] brother.'
  '8':
  - type: text
    content: ' Therefore, though I have abundant boldness in Christ to charge you to do what is fitting '
  - type: text
    content: and
  - type: text
    content: ' required '
  - type: text
    content: and
  - type: text
    content: ' your duty to do,'
  '9':
  - type: text
    content: ' Yet for love''s sake I prefer to appeal to you just for what I am–I, Paul, an ambassador [of Christ Jesus] '
  - type: text
    content: and
  - type: text
    content: ' an old man and now a prisoner for His sake also–'
