document_id: PHM.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PAUL, A prisoner [for the sake] of Christ Jesus (the Messiah), and our brother Timothy, to Philemon our dearly beloved sharer with us in our work,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And to Apphia our sister and Archippus our fellow soldier [in the Christian warfare], and to the church [assembly that meets] in your house:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Grace (spiritual blessing and favor) be to all of you and [heart] peace from God our Father and the Lord Jesus Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I give thanks to my God for you always when I mention you in my prayers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Because I continue to hear of your love and of your loyal faith which you have toward the Lord Jesus and [which you show] toward all the saints (God''s consecrated people).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [And I pray] that the participation in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sharing of your faith may produce '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' promote full recognition '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appreciation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' precise knowledge of every good [thing] that is ours in [our identification with] Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' [and unto His glory].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For I have derived great joy and comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouragement from your love, because the hearts of the saints [who are your fellow Christians] have been cheered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refreshed through you, [my] brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Therefore, though I have abundant boldness in Christ to charge you to do what is fitting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' required '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your duty to do,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Yet for love''s sake I prefer to appeal to you just for what I am–I, Paul, an ambassador [of Christ Jesus] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an old man and now a prisoner for His sake also–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I appeal to you for my [own spiritual] child, Onesimus [meaning profitable], whom I have begotten [in the faith] while a captive in these chains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Once he was unprofitable to you, but now he is indeed profitable to you as well as to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I am sending him back to you in his own person, [and it is like sending] my very heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I would have chosen to keep him with me, in order that he might minister to my needs in your stead during my imprisonment for the Gospel''s sake.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But it has been my wish to do nothing about it without first consulting you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' getting your consent, in order that your benevolence might not seem to be the result of compulsion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' of pressure but might be voluntary [on your part].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Perhaps it was for this reason that he was separated [from you] for a while, that you might have him back as yours forever,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Not as a slave any longer but as [something] more than a slave, as a brother [Christian], especially dear to me but how much more to you, both in the flesh [as a servant] and in the Lord [as a fellow believer].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' If then you consider me a partner '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a comrade in fellowship, welcome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' receive him as you would [welcome and receive] me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And if he has done you any wrong in any way or owes anything [to you], charge that to my account.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' I, Paul, write it with my own hand, I promise to repay it [in full]–and that is to say nothing [of the fact] that you owe me your very self!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Yes, brother, let me have some profit from you in the Lord. Cheer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refresh my heart in Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' I write to you [perfectly] confident of your obedient compliance, knowing that you will do even more than I ask.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' At the same time prepare a guest room [in expectation of extending your hospitality] to me, for I am hoping through your prayers to be granted [the gracious privilege of coming] to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Greetings to you from Epaphras, my fellow prisoner here in [the cause of] Christ Jesus (the Messiah),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And [from] Mark, Aristarchus, Demas, and Luke, my fellow workers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The grace (blessing and favor) of the Lord Jesus Christ (the Messiah) be with your spirit. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
