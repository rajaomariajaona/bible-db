document_id: JOL.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD of the Lord that came to Joel the son of Pethuel.'
  '10':
  - type: text
    content: ' The field is laid waste, the ground mourns; for the grain is destroyed, the new juice [of the grape] is dried up, the oil fails.'
  '11':
  - type: text
    content: ' Be ashamed, O you tillers of the soil; wail, O you vinedressers, for the wheat and for the barley, because the harvest of the field has perished.'
  '12':
  - type: text
    content: ' The vine is dried up and the fig tree fails; the pomegranate tree, the palm tree also, and the apple '
  - type: text
    content: or
  - type: text
    content: ' quince tree, even all the trees of the field are withered, so that joy has withered '
  - type: text
    content: and
  - type: text
    content: ' fled away from the sons of men.'
  '13':
  - type: text
    content: ' Gird yourselves and lament, you priests; wail, you ministers of the altar; come, lie all night in sackcloth, you ministers of my [Joel''s] God, for the cereal '
  - type: text
    content: or
  - type: text
    content: ' meal offering and the drink offering are withheld from the house of your God.'
  '14':
  - type: text
    content: ' Sanctify a fast, call a solemn assembly, gather the elders and all the inhabitants of the land in the house of the Lord, your God, and cry to the Lord [in penitent pleadings].'
  '15':
  - type: text
    content: ' Alas for the day! For the day of [the judgment of] the Lord is at hand, and as a destructive tempest from the Almighty will it come. [Zeph. 1:14-18.]'
  '16':
  - type: text
    content: ' Is not the food cut off before our eyes, joy and gladness from the house of our God?'
  '17':
  - type: text
    content: ' The seed [grain] rots '
  - type: text
    content: and
  - type: text
    content: ' shrivels under the clods, the garners are desolate '
  - type: text
    content: and
  - type: text
    content: ' empty, the barns are in ruins because the grain has failed.'
  '18':
  - type: text
    content: ' How the beasts groan! The herds of cattle are perplexed '
  - type: text
    content: and
  - type: text
    content: ' huddle together because they have no pasture; even the flocks of sheep suffer punishment (are forsaken and made wretched).'
  '19':
  - type: text
    content: ' O Lord, to You will I cry, for the fire has devoured the pastures '
  - type: text
    content: and
  - type: text
    content: ' folds of the plain '
  - type: text
    content: and
  - type: text
    content: ' the wilderness, and flame has burned all the trees of the field.'
  '2':
  - type: text
    content: ' Hear this, you aged men, and give ear, all you inhabitants of the land! Has such a thing as this occurred in your days or even in the days of your fathers?'
  '20':
  - type: text
    content: ' Even the wild beasts of the field pant '
  - type: text
    content: and
  - type: text
    content: ' cry to You, for the water brooks are dried up and fire has consumed the pastures '
  - type: text
    content: and
  - type: text
    content: ' folds of the wilderness '
  - type: text
    content: and
  - type: text
    content: ' the plain.'
  '3':
  - type: text
    content: ' Tell your children of it, and let your children tell their children, and their children another generation.'
  '4':
  - type: text
    content: ' What the crawling locust left, the swarming locust has eaten; and what the swarming locust left, the hopping locust has eaten; and what the hopping locust left, the stripping locust has eaten.'
  '5':
  - type: text
    content: ' Awake, you drunkards, and weep; wail, all you drinkers of wine, because of the [fresh] sweet juice [of the grape], for it is cut off '
  - type: text
    content: and
  - type: text
    content: ' removed from your mouth.'
  '6':
  - type: text
    content: ' For a [heathen and hostile] nation [of locusts, illustrative of a human foe] has invaded My land, mighty and without number; its teeth are the teeth of a lion, and it has the jaw teeth of a lioness. [Rev. 9:7, 8.]'
  '7':
  - type: text
    content: ' It has laid waste My vine [symbol of God''s people] and barked '
  - type: text
    content: and
  - type: text
    content: ' broken My fig tree; it has made them completely bare and thrown them down; their branches are made white. [Isa. 5:5, 6.]'
  '8':
  - type: text
    content: ' Lament like a virgin [bride] girded with sackcloth for the husband of her youth [who has died].'
  '9':
  - type: text
    content: ' The meal '
  - type: text
    content: or
  - type: text
    content: ' cereal offering and the drink offering are cut off from the house of the Lord; the priests, the Lord''s ministers, mourn.'
