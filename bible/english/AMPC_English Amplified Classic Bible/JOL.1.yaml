document_id: JOL.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD of the Lord that came to Joel the son of Pethuel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Hear this, you aged men, and give ear, all you inhabitants of the land! Has such a thing as this occurred in your days or even in the days of your fathers?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Tell your children of it, and let your children tell their children, and their children another generation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' What the crawling locust left, the swarming locust has eaten; and what the swarming locust left, the hopping locust has eaten; and what the hopping locust left, the stripping locust has eaten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Awake, you drunkards, and weep; wail, all you drinkers of wine, because of the [fresh] sweet juice [of the grape], for it is cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' removed from your mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For a [heathen and hostile] nation [of locusts, illustrative of a human foe] has invaded My land, mighty and without number; its teeth are the teeth of a lion, and it has the jaw teeth of a lioness. [Rev. 9:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' It has laid waste My vine [symbol of God''s people] and barked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' broken My fig tree; it has made them completely bare and thrown them down; their branches are made white. [Isa. 5:5, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Lament like a virgin [bride] girded with sackcloth for the husband of her youth [who has died].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The meal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cereal offering and the drink offering are cut off from the house of the Lord; the priests, the Lord''s ministers, mourn.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The field is laid waste, the ground mourns; for the grain is destroyed, the new juice [of the grape] is dried up, the oil fails.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Be ashamed, O you tillers of the soil; wail, O you vinedressers, for the wheat and for the barley, because the harvest of the field has perished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The vine is dried up and the fig tree fails; the pomegranate tree, the palm tree also, and the apple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' quince tree, even all the trees of the field are withered, so that joy has withered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fled away from the sons of men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Gird yourselves and lament, you priests; wail, you ministers of the altar; come, lie all night in sackcloth, you ministers of my [Joel''s] God, for the cereal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' meal offering and the drink offering are withheld from the house of your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Sanctify a fast, call a solemn assembly, gather the elders and all the inhabitants of the land in the house of the Lord, your God, and cry to the Lord [in penitent pleadings].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Alas for the day! For the day of [the judgment of] the Lord is at hand, and as a destructive tempest from the Almighty will it come. [Zeph. 1:14-18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Is not the food cut off before our eyes, joy and gladness from the house of our God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The seed [grain] rots '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shrivels under the clods, the garners are desolate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' empty, the barns are in ruins because the grain has failed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' How the beasts groan! The herds of cattle are perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' huddle together because they have no pasture; even the flocks of sheep suffer punishment (are forsaken and made wretched).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' O Lord, to You will I cry, for the fire has devoured the pastures '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' folds of the plain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the wilderness, and flame has burned all the trees of the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Even the wild beasts of the field pant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cry to You, for the water brooks are dried up and fire has consumed the pastures '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' folds of the wilderness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the plain.'
