document_id: 2CO.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' LABORING TOGETHER [as God''s fellow workers] with Him then, we beg of you not to receive the grace of God in vain [that merciful kindness by which God exerts His holy influence on souls and turns them to Christ, keeping and strengthening them–do not receive it to no purpose].'
  '10':
  - type: text
    content: ' As grieved '
  - type: text
    content: and
  - type: text
    content: ' mourning, yet [we are] always rejoicing; as poor [ourselves, yet] bestowing riches on many; as having nothing, and [yet in reality] possessing all things.'
  '11':
  - type: text
    content: ' Our mouth is open to you, Corinthians [we are hiding nothing, keeping nothing back], and our heart is expanded wide [for you]! [Isa. 60:5; Ezek. 33:22.]'
  '12':
  - type: text
    content: ' There is no lack of room for you in [our hearts], but you lack room in your own affections [for us].'
  '13':
  - type: text
    content: ' By way of return then, do this for me–I speak as to children–open wide your hearts also [to us].'
  '14':
  - type: text
    content: ' Do not be unequally yoked with unbelievers [do not make mismated alliances with them or come under a different yoke with them, inconsistent with your faith]. For what partnership have right living '
  - type: text
    content: and
  - type: text
    content: ' right standing with God with iniquity '
  - type: text
    content: and
  - type: text
    content: ' lawlessness? Or how can light have fellowship with darkness?'
  '15':
  - type: text
    content: ' What harmony can there be between Christ and Belial [the devil]? Or what has a believer in common with an unbeliever?'
  '16':
  - type: text
    content: ' What agreement [can there be between] a temple of God and idols? For we are the temple of the living God; even as God said, I will dwell in '
  - type: text
    content: and
  - type: text
    content: ' with '
  - type: text
    content: and
  - type: text
    content: ' among them and will walk in '
  - type: text
    content: and
  - type: text
    content: ' with '
  - type: text
    content: and
  - type: text
    content: ' among them, and I will be their God, and they shall be My people. [Exod. 25:8; 29:45; Lev. 26:12; Jer. 31:1; Ezek. 37:27.]'
  '17':
  - type: text
    content: ' So, come out from among [unbelievers], and separate (sever) yourselves from them, says the Lord, and touch not [any] unclean thing; then I will receive you kindly '
  - type: text
    content: and
  - type: text
    content: ' treat you with favor, [Isa. 52:11.]'
  '18':
  - type: text
    content: ' And I will be a Father to you, and you shall be My sons and daughters, says the Lord Almighty. [Isa. 43:6; Hos. 1:10.]'
  '2':
  - type: text
    content: ' For He says, In the time of favor (of an assured welcome) I have listened to '
  - type: text
    content: and
  - type: text
    content: ' heeded your call, and I have helped you on the day of deliverance (the day of salvation). Behold, now is truly the time for a gracious welcome '
  - type: text
    content: and
  - type: text
    content: ' acceptance [of you from God]; behold, now is the day of salvation! [Isa. 49:8.]'
  '3':
  - type: text
    content: ' We put no obstruction in anybody''s way [we give no offense in anything], so that no fault may be found '
  - type: text
    content: and
  - type: text
    content: ' [our] ministry blamed '
  - type: text
    content: and
  - type: text
    content: ' discredited.'
  '4':
  - type: text
    content: ' But we commend ourselves in every way as [true] servants of God: through great endurance, in tribulation '
  - type: text
    content: and
  - type: text
    content: ' suffering, in hardships '
  - type: text
    content: and
  - type: text
    content: ' privations, in sore straits '
  - type: text
    content: and
  - type: text
    content: ' calamities,'
  '5':
  - type: text
    content: ' In beatings, imprisonments, riots, labors, sleepless watching, hunger;'
  '6':
  - type: text
    content: ' By innocence '
  - type: text
    content: and
  - type: text
    content: ' purity, knowledge '
  - type: text
    content: and
  - type: text
    content: ' spiritual insight, longsuffering '
  - type: text
    content: and
  - type: text
    content: ' patience, kindness, in the Holy Spirit, in unfeigned love;'
  '7':
  - type: text
    content: ' By [speaking] the word of truth, in the power of God, with the weapons of righteousness for the right hand [to attack] and for the left hand [to defend];'
  '8':
  - type: text
    content: ' Amid honor and dishonor; in defaming '
  - type: text
    content: and
  - type: text
    content: ' evil report and in praise '
  - type: text
    content: and
  - type: text
    content: ' good report. [We are branded] as deceivers (impostors), and [yet vindicated as] truthful '
  - type: text
    content: and
  - type: text
    content: ' honest.'
  '9':
  - type: text
    content: ' [We are treated] as unknown '
  - type: text
    content: and
  - type: text
    content: ' ignored [by the world], and [yet we are] well-known '
  - type: text
    content: and
  - type: text
    content: ' recognized [by God and His people]; as dying, and yet here we are alive; as chastened by suffering and [yet] not killed;'
