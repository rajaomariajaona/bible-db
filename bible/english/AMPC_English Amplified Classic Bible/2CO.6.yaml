document_id: 2CO.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' LABORING TOGETHER [as God''s fellow workers] with Him then, we beg of you not to receive the grace of God in vain [that merciful kindness by which God exerts His holy influence on souls and turns them to Christ, keeping and strengthening them–do not receive it to no purpose].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For He says, In the time of favor (of an assured welcome) I have listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heeded your call, and I have helped you on the day of deliverance (the day of salvation). Behold, now is truly the time for a gracious welcome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acceptance [of you from God]; behold, now is the day of salvation! [Isa. 49:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' We put no obstruction in anybody''s way [we give no offense in anything], so that no fault may be found '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [our] ministry blamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discredited.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But we commend ourselves in every way as [true] servants of God: through great endurance, in tribulation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffering, in hardships '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' privations, in sore straits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calamities,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' In beatings, imprisonments, riots, labors, sleepless watching, hunger;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' By innocence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purity, knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spiritual insight, longsuffering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patience, kindness, in the Holy Spirit, in unfeigned love;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' By [speaking] the word of truth, in the power of God, with the weapons of righteousness for the right hand [to attack] and for the left hand [to defend];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Amid honor and dishonor; in defaming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil report and in praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good report. [We are branded] as deceivers (impostors), and [yet vindicated as] truthful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' [We are treated] as unknown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ignored [by the world], and [yet we are] well-known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognized [by God and His people]; as dying, and yet here we are alive; as chastened by suffering and [yet] not killed;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' As grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mourning, yet [we are] always rejoicing; as poor [ourselves, yet] bestowing riches on many; as having nothing, and [yet in reality] possessing all things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Our mouth is open to you, Corinthians [we are hiding nothing, keeping nothing back], and our heart is expanded wide [for you]! [Isa. 60:5; Ezek. 33:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' There is no lack of room for you in [our hearts], but you lack room in your own affections [for us].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' By way of return then, do this for me–I speak as to children–open wide your hearts also [to us].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Do not be unequally yoked with unbelievers [do not make mismated alliances with them or come under a different yoke with them, inconsistent with your faith]. For what partnership have right living '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right standing with God with iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lawlessness? Or how can light have fellowship with darkness?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' What harmony can there be between Christ and Belial [the devil]? Or what has a believer in common with an unbeliever?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' What agreement [can there be between] a temple of God and idols? For we are the temple of the living God; even as God said, I will dwell in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' among them and will walk in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' among them, and I will be their God, and they shall be My people. [Exod. 25:8; 29:45; Lev. 26:12; Jer. 31:1; Ezek. 37:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So, come out from among [unbelievers], and separate (sever) yourselves from them, says the Lord, and touch not [any] unclean thing; then I will receive you kindly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treat you with favor, [Isa. 52:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And I will be a Father to you, and you shall be My sons and daughters, says the Lord Almighty. [Isa. 43:6; Hos. 1:10.]'
