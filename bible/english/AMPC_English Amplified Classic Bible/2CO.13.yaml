document_id: 2CO.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THIS IS the third time that I am coming to you. By the testimony of two or three witnesses must any charge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' every accusing statement be sustained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confirmed. [Deut. 19:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I have already warned those who sinned formerly and all the rest also, and I warn them now again while I am absent, as I did when present on my second visit, that if I come back, I will not spare [them],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Since you desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seek [perceptible] proof of the Christ Who speaks in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' through me. [For He] is not weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feeble in dealing with you, but is a mighty power within you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For though He was crucified in weakness, yet He goes on living by the power of God. And though we too are weak in Him [as He was humanly weak], yet in dealing with you [we shall show ourselves] alive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strong in [fellowship with] Him by the power of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Examine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' test '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evaluate your own selves to see whether you are holding to your faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' showing the proper fruits of it. Test '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prove yourselves [not Christ]. Do you not yourselves realize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know [thoroughly by an ever-increasing experience] that Jesus Christ is in you–unless you are [counterfeits] disapproved on trial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But I hope you will recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that we are not disapproved on trial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But I pray to God that you may do nothing wrong, not in order that we [our teaching] may appear to be approved, but that you may continue doing right, [though] we may seem to have failed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be unapproved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For we can do nothing against the Truth [not serve any party or personal interest], but only for the Truth [which is the Gospel].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For we are glad when we are weak (unapproved) and you are really strong. And this we also pray for: your all-round strengthening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perfecting of soul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So I write these things while I am absent from you, that when I come to you, I may not have to deal sharply in my use of the authority which the Lord has given me [to be employed, however] for building [you] up and not for tearing [you] down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Finally, brethren, farewell (rejoice)! Be strengthened (perfected, completed, made what you ought to be); be encouraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consoled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comforted; be of the same [agreeable] mind one with another; live in peace, and [then] the God of love [Who is the Source of affection, goodwill, love, and benevolence toward men] and the Author '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Promoter of peace will be with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Greet one another with a consecrated kiss.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' All the saints (the people of God here) salute you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The grace (favor and spiritual blessing) of the Lord Jesus Christ and the love of God and the presence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fellowship (the communion and sharing together, and participation) in the Holy Spirit be with you all. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
