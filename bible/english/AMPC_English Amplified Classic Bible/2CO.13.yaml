document_id: 2CO.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THIS IS the third time that I am coming to you. By the testimony of two or three witnesses must any charge '
  - type: text
    content: and
  - type: text
    content: ' every accusing statement be sustained '
  - type: text
    content: and
  - type: text
    content: ' confirmed. [Deut. 19:15.]'
  '10':
  - type: text
    content: ' So I write these things while I am absent from you, that when I come to you, I may not have to deal sharply in my use of the authority which the Lord has given me [to be employed, however] for building [you] up and not for tearing [you] down.'
  '11':
  - type: text
    content: ' Finally, brethren, farewell (rejoice)! Be strengthened (perfected, completed, made what you ought to be); be encouraged '
  - type: text
    content: and
  - type: text
    content: ' consoled '
  - type: text
    content: and
  - type: text
    content: ' comforted; be of the same [agreeable] mind one with another; live in peace, and [then] the God of love [Who is the Source of affection, goodwill, love, and benevolence toward men] and the Author '
  - type: text
    content: and
  - type: text
    content: ' Promoter of peace will be with you.'
  '12':
  - type: text
    content: ' Greet one another with a consecrated kiss.'
  '13':
  - type: text
    content: ' All the saints (the people of God here) salute you.'
  '14':
  - type: text
    content: ' The grace (favor and spiritual blessing) of the Lord Jesus Christ and the love of God and the presence '
  - type: text
    content: and
  - type: text
    content: ' fellowship (the communion and sharing together, and participation) in the Holy Spirit be with you all. '
  - type: text
    content: Amen (so be it).
  '2':
  - type: text
    content: ' I have already warned those who sinned formerly and all the rest also, and I warn them now again while I am absent, as I did when present on my second visit, that if I come back, I will not spare [them],'
  '3':
  - type: text
    content: ' Since you desire '
  - type: text
    content: and
  - type: text
    content: ' seek [perceptible] proof of the Christ Who speaks in '
  - type: text
    content: and
  - type: text
    content: ' through me. [For He] is not weak '
  - type: text
    content: and
  - type: text
    content: ' feeble in dealing with you, but is a mighty power within you;'
  '4':
  - type: text
    content: ' For though He was crucified in weakness, yet He goes on living by the power of God. And though we too are weak in Him [as He was humanly weak], yet in dealing with you [we shall show ourselves] alive '
  - type: text
    content: and
  - type: text
    content: ' strong in [fellowship with] Him by the power of God.'
  '5':
  - type: text
    content: ' Examine '
  - type: text
    content: and
  - type: text
    content: ' test '
  - type: text
    content: and
  - type: text
    content: ' evaluate your own selves to see whether you are holding to your faith '
  - type: text
    content: and
  - type: text
    content: ' showing the proper fruits of it. Test '
  - type: text
    content: and
  - type: text
    content: ' prove yourselves [not Christ]. Do you not yourselves realize '
  - type: text
    content: and
  - type: text
    content: ' know [thoroughly by an ever-increasing experience] that Jesus Christ is in you–unless you are [counterfeits] disapproved on trial '
  - type: text
    content: and
  - type: text
    content: ' rejected?'
  '6':
  - type: text
    content: ' But I hope you will recognize '
  - type: text
    content: and
  - type: text
    content: ' know that we are not disapproved on trial '
  - type: text
    content: and
  - type: text
    content: ' rejected.'
  '7':
  - type: text
    content: ' But I pray to God that you may do nothing wrong, not in order that we [our teaching] may appear to be approved, but that you may continue doing right, [though] we may seem to have failed '
  - type: text
    content: and
  - type: text
    content: ' be unapproved.'
  '8':
  - type: text
    content: ' For we can do nothing against the Truth [not serve any party or personal interest], but only for the Truth [which is the Gospel].'
  '9':
  - type: text
    content: ' For we are glad when we are weak (unapproved) and you are really strong. And this we also pray for: your all-round strengthening '
  - type: text
    content: and
  - type: text
    content: ' perfecting of soul.'
