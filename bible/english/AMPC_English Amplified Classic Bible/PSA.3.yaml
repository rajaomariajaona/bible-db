document_id: PSA.3,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David. When he fled from Absalom his son.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', HOW they are increased who trouble me! Many are they who rise up against me.'
  '2':
  - type: text
    content: ' Many are saying of me, There is no help for him in God. Selah [pause, and calmly think of that]!'
  '3':
  - type: text
    content: ' But You, O Lord, are a shield for me, my glory, and the lifter of my head.'
  '4':
  - type: text
    content: ' With my voice I cry to the Lord, and He hears and answers me out of His holy hill. Selah [pause, and calmly think of that]!'
  '5':
  - type: text
    content: ' I lay down and slept; I wakened again, for the Lord sustains me.'
  '6':
  - type: text
    content: ' I will not be afraid of ten thousands of people who have set themselves against me round about.'
  '7':
  - type: text
    content: ' Arise, O Lord; save me, O my God! For You have struck all my enemies on the cheek; You have broken the teeth of the ungodly.'
  '8':
  - type: text
    content: ' Salvation belongs to the Lord; May Your blessing be upon Your people. Selah [pause, and calmly think of that]!'
