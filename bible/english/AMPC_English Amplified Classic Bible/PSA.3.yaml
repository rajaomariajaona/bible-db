document_id: PSA.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Psalm of David. When he fled from Absalom his son.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', HOW they are increased who trouble me! Many are they who rise up against me.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Many are saying of me, There is no help for him in God. Selah [pause, and calmly think of that]!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But You, O Lord, are a shield for me, my glory, and the lifter of my head.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' With my voice I cry to the Lord, and He hears and answers me out of His holy hill. Selah [pause, and calmly think of that]!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' I lay down and slept; I wakened again, for the Lord sustains me.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I will not be afraid of ten thousands of people who have set themselves against me round about.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Arise, O Lord; save me, O my God! For You have struck all my enemies on the cheek; You have broken the teeth of the ungodly.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Salvation belongs to the Lord; May Your blessing be upon Your people. Selah [pause, and calmly think of that]!'
