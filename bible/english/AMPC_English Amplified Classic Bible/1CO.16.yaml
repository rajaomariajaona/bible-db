document_id: 1CO.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW CONCERNING the money contributed for [the relief of] the saints (God''s people): you are to do the same as I directed the churches of Galatia to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' On the first [day] of each week, let each one of you [personally] put aside something and save it up as he has prospered [in proportion to what he is given], so that no collections will need to be taken after I come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And when I arrive, I will send on those whom you approve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authorize with credentials to carry your gift [of charity] to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' If it seems worthwhile that I should go too, they will accompany me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' After passing through Macedonia, I will visit you, for I intend [only] to pass through Macedonia;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But it may be that I will stay with you [for a while], perhaps even spend the winter, so that you may bring me forward [on my journey] to wherever I may go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For I am unwilling to see you right now [just] in passing, but I hope later to remain for some time with you, if the Lord permits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I will remain in Ephesus [however] until Pentecost,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For a wide door of opportunity for effectual [service] has opened to me [there, a great and promising one], and [there are] many adversaries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When Timothy arrives, see to it that [you put him at ease, so that] he may be fearless among you, for he is [devotedly] doing the Lord''s work, just as I am.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So [see to it that] no one despises him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' treats him as if he were of no account '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' slights him. But send him off [cordially, speed him on his way] in peace, that he may come to me, for I am expecting him [to come along] with the other brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' As for our brother Apollos, I have urgently encouraged him to visit you with the other brethren, but it was not at all his will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' God''s will that he should go now. He will come when he has opportunity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Be alert '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on your guard; stand firm in your faith (your conviction respecting man''s relationship to God and divine things, keeping the trust and holy fervor born of faith and a part of it). Act like men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be courageous; grow in strength! [Ps. 31:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Let everything you do be done in love (true love to God and man as inspired by God''s love for us).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now, brethren, you know that the household of Stephanas were the first converts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' our firstfruits in Achaia (most of Greece), and how they have consecrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devoted themselves to the service of the saints (God''s people).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I urge you to pay all deference to such leaders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to enlist under them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be subject to them, as well as to everyone who joins '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cooperates [with you] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' labors earnestly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I am happy because Stephanas and Fortunatus and Achaicus have come [to me], for they have made up for your absence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For they gave me respite from labor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rested me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refreshed my spirit as well as yours. Deeply appreciate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoroughly know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fully recognize such men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The churches of Asia send greetings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' best wishes. Aquila and Prisca, together with the church [that meets] in their house, send you their hearty greetings in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' All the brethren wish to be remembered to you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wish you well. Greet one another with a holy kiss.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' I, Paul, [add this final] greeting with my own hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' If anyone does not love the Lord [does not have a friendly affection for Him and is not kindly disposed toward Him], he shall be accursed! Our Lord will come! (Maranatha!)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The grace (favor and spiritual blessing) of our Lord Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ
  - type: text
    text: ' be with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' My love (that true love growing out of sincere devotion to God) be with you all in Christ Jesus. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
