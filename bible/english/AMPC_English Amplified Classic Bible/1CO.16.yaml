document_id: 1CO.16,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW CONCERNING the money contributed for [the relief of] the saints (God''s people): you are to do the same as I directed the churches of Galatia to do.'
  '10':
  - type: text
    content: ' When Timothy arrives, see to it that [you put him at ease, so that] he may be fearless among you, for he is [devotedly] doing the Lord''s work, just as I am.'
  '11':
  - type: text
    content: ' So [see to it that] no one despises him '
  - type: text
    content: or
  - type: text
    content: ' treats him as if he were of no account '
  - type: text
    content: or
  - type: text
    content: ' slights him. But send him off [cordially, speed him on his way] in peace, that he may come to me, for I am expecting him [to come along] with the other brethren.'
  '12':
  - type: text
    content: ' As for our brother Apollos, I have urgently encouraged him to visit you with the other brethren, but it was not at all his will '
  - type: text
    content: or
  - type: text
    content: ' God''s will that he should go now. He will come when he has opportunity.'
  '13':
  - type: text
    content: ' Be alert '
  - type: text
    content: and
  - type: text
    content: ' on your guard; stand firm in your faith (your conviction respecting man''s relationship to God and divine things, keeping the trust and holy fervor born of faith and a part of it). Act like men '
  - type: text
    content: and
  - type: text
    content: ' be courageous; grow in strength! [Ps. 31:24.]'
  '14':
  - type: text
    content: ' Let everything you do be done in love (true love to God and man as inspired by God''s love for us).'
  '15':
  - type: text
    content: ' Now, brethren, you know that the household of Stephanas were the first converts '
  - type: text
    content: and
  - type: text
    content: ' our firstfruits in Achaia (most of Greece), and how they have consecrated '
  - type: text
    content: and
  - type: text
    content: ' devoted themselves to the service of the saints (God''s people).'
  '16':
  - type: text
    content: ' I urge you to pay all deference to such leaders '
  - type: text
    content: and
  - type: text
    content: ' to enlist under them '
  - type: text
    content: and
  - type: text
    content: ' be subject to them, as well as to everyone who joins '
  - type: text
    content: and
  - type: text
    content: ' cooperates [with you] '
  - type: text
    content: and
  - type: text
    content: ' labors earnestly.'
  '17':
  - type: text
    content: ' I am happy because Stephanas and Fortunatus and Achaicus have come [to me], for they have made up for your absence.'
  '18':
  - type: text
    content: ' For they gave me respite from labor '
  - type: text
    content: and
  - type: text
    content: ' rested me '
  - type: text
    content: and
  - type: text
    content: ' refreshed my spirit as well as yours. Deeply appreciate '
  - type: text
    content: and
  - type: text
    content: ' thoroughly know '
  - type: text
    content: and
  - type: text
    content: ' fully recognize such men.'
  '19':
  - type: text
    content: ' The churches of Asia send greetings '
  - type: text
    content: and
  - type: text
    content: ' best wishes. Aquila and Prisca, together with the church [that meets] in their house, send you their hearty greetings in the Lord.'
  '2':
  - type: text
    content: ' On the first [day] of each week, let each one of you [personally] put aside something and save it up as he has prospered [in proportion to what he is given], so that no collections will need to be taken after I come.'
  '20':
  - type: text
    content: ' All the brethren wish to be remembered to you '
  - type: text
    content: and
  - type: text
    content: ' wish you well. Greet one another with a holy kiss.'
  '21':
  - type: text
    content: ' I, Paul, [add this final] greeting with my own hand.'
  '22':
  - type: text
    content: ' If anyone does not love the Lord [does not have a friendly affection for Him and is not kindly disposed toward Him], he shall be accursed! Our Lord will come! (Maranatha!)'
  '23':
  - type: text
    content: ' The grace (favor and spiritual blessing) of our Lord Jesus '
  - type: text
    content: Christ
  - type: text
    content: ' be with you.'
  '24':
  - type: text
    content: ' My love (that true love growing out of sincere devotion to God) be with you all in Christ Jesus. '
  - type: text
    content: Amen (so be it).
  '3':
  - type: text
    content: ' And when I arrive, I will send on those whom you approve '
  - type: text
    content: and
  - type: text
    content: ' authorize with credentials to carry your gift [of charity] to Jerusalem.'
  '4':
  - type: text
    content: ' If it seems worthwhile that I should go too, they will accompany me.'
  '5':
  - type: text
    content: ' After passing through Macedonia, I will visit you, for I intend [only] to pass through Macedonia;'
  '6':
  - type: text
    content: ' But it may be that I will stay with you [for a while], perhaps even spend the winter, so that you may bring me forward [on my journey] to wherever I may go.'
  '7':
  - type: text
    content: ' For I am unwilling to see you right now [just] in passing, but I hope later to remain for some time with you, if the Lord permits.'
  '8':
  - type: text
    content: ' I will remain in Ephesus [however] until Pentecost,'
  '9':
  - type: text
    content: ' For a wide door of opportunity for effectual [service] has opened to me [there, a great and promising one], and [there are] many adversaries.'
