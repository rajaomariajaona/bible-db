document_id: 1JN.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BELOVED, DO not put faith in every spirit, but prove (test) the spirits to discover whether they proceed from God; for many false prophets have gone forth into the world.'
  '10':
  - type: text
    content: ' In this is love: not that we loved God, but that He loved us and sent His Son to be the propitiation (the atoning sacrifice) for our sins.'
  '11':
  - type: text
    content: ' Beloved, if God loved us so [very much], we also ought to love one another.'
  '12':
  - type: text
    content: ' No man has at any time [yet] seen God. But if we love one another, God abides (lives and remains) in us and His love (that love which is essentially His) is brought to completion (to its full maturity, runs its full course, is perfected) in us!'
  '13':
  - type: text
    content: ' By this we come to know (perceive, recognize, and understand) that we abide (live and remain) in Him and He in us: because He has given (imparted) to us of His [Holy] Spirit.'
  '14':
  - type: text
    content: ' And [besides] we ourselves have seen (have deliberately and steadfastly contemplated) and bear witness that the Father has sent the Son [as the] Savior of the world.'
  '15':
  - type: text
    content: ' Anyone who confesses (acknowledges, owns) that Jesus is the Son of God, God abides (lives, makes His home) in him and he [abides, lives, makes his home] in God.'
  '16':
  - type: text
    content: ' And we know (understand, recognize, are conscious of, by observation and by experience) and believe (adhere to and put faith in and rely on) the love God cherishes for us. God is love, and he who dwells '
  - type: text
    content: and
  - type: text
    content: ' continues in love dwells '
  - type: text
    content: and
  - type: text
    content: ' continues in God, and God dwells '
  - type: text
    content: and
  - type: text
    content: ' continues in him.'
  '17':
  - type: text
    content: ' In this [union and communion with Him] love is brought to completion '
  - type: text
    content: and
  - type: text
    content: ' attains perfection with us, that we may have confidence for the day of judgment [with assurance and boldness to face Him], because as He is, so are we in this world.'
  '18':
  - type: text
    content: ' There is no fear in love [dread does not exist], but full-grown (complete, perfect) love turns fear out of doors '
  - type: text
    content: and
  - type: text
    content: ' expels every trace of terror! For fear brings with it the thought of punishment, and [so] he who is afraid has not reached the full maturity of love [is not yet grown into love''s complete perfection].'
  '19':
  - type: text
    content: ' We love '
  - type: text
    content: Him,
  - type: text
    content: ' because He first loved us.'
  '2':
  - type: text
    content: ' By this you may know (perceive and recognize) the Spirit of God: every spirit which acknowledges '
  - type: text
    content: and
  - type: text
    content: ' confesses [the fact] that Jesus Christ (the Messiah) [actually] has become man '
  - type: text
    content: and
  - type: text
    content: ' has come in the flesh is of God [has God for its source];'
  '20':
  - type: text
    content: ' If anyone says, I love God, and hates (detests, abominates) his brother [in Christ], he is a liar; for he who does not love his brother, whom he has seen, cannot love God, Whom he has not seen.'
  '21':
  - type: text
    content: ' And this command (charge, order, injunction) we have from Him: that he who loves God shall love his brother [believer] also.'
  '3':
  - type: text
    content: ' And every spirit which does not acknowledge '
  - type: text
    content: and
  - type: text
    content: ' confess '
  - type: text
    content: that
  - type: text
    content: ' Jesus '
  - type: text
    content: Christ has come in the flesh
  - type: text
    content: ' [but would annul, destroy, sever, disunite Him] is not of God [does not proceed from Him]. This [nonconfession] is the [spirit] of the antichrist, [of] which you heard that it was coming, and now it is already in the world.'
  '4':
  - type: text
    content: ' Little children, you are of God [you belong to Him] and have [already] defeated '
  - type: text
    content: and
  - type: text
    content: ' overcome them [the agents of the antichrist], because He Who lives in you is greater (mightier) than he who is in the world.'
  '5':
  - type: text
    content: ' They proceed from the world '
  - type: text
    content: and
  - type: text
    content: ' are of the world; therefore it is out of the world [its whole economy morally considered] that they speak, and the world listens (pays attention) to them.'
  '6':
  - type: text
    content: ' We are [children] of God. Whoever is learning to know God [progressively to perceive, recognize, and understand God by observation and experience, and to get an ever-clearer knowledge of Him] listens to us; and he who is not of God does not listen '
  - type: text
    content: or
  - type: text
    content: ' pay attention to us. By this we know (recognize) the Spirit of Truth and the spirit of error.'
  '7':
  - type: text
    content: ' Beloved, let us love one another, for love is (springs) from God; and he who loves [his fellowmen] is begotten (born) of God and is coming [progressively] to know '
  - type: text
    content: and
  - type: text
    content: ' understand God [to perceive and recognize and get a better and clearer knowledge of Him].'
  '8':
  - type: text
    content: ' He who does not love has not become acquainted with God [does not and never did know Him], for God is love.'
  '9':
  - type: text
    content: ' In this the love of God was made manifest (displayed) where we are concerned: in that God sent His Son, the only begotten '
  - type: text
    content: or
  - type: text
    content: ' unique [Son], into the world so that we might live through Him.'
