document_id: 1JN.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BELOVED, DO not put faith in every spirit, but prove (test) the spirits to discover whether they proceed from God; for many false prophets have gone forth into the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' By this you may know (perceive and recognize) the Spirit of God: every spirit which acknowledges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confesses [the fact] that Jesus Christ (the Messiah) [actually] has become man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has come in the flesh is of God [has God for its source];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And every spirit which does not acknowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ has come in the flesh
  - type: text
    text: ' [but would annul, destroy, sever, disunite Him] is not of God [does not proceed from Him]. This [nonconfession] is the [spirit] of the antichrist, [of] which you heard that it was coming, and now it is already in the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Little children, you are of God [you belong to Him] and have [already] defeated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overcome them [the agents of the antichrist], because He Who lives in you is greater (mightier) than he who is in the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They proceed from the world '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are of the world; therefore it is out of the world [its whole economy morally considered] that they speak, and the world listens (pays attention) to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' We are [children] of God. Whoever is learning to know God [progressively to perceive, recognize, and understand God by observation and experience, and to get an ever-clearer knowledge of Him] listens to us; and he who is not of God does not listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pay attention to us. By this we know (recognize) the Spirit of Truth and the spirit of error.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Beloved, let us love one another, for love is (springs) from God; and he who loves [his fellowmen] is begotten (born) of God and is coming [progressively] to know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand God [to perceive and recognize and get a better and clearer knowledge of Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He who does not love has not become acquainted with God [does not and never did know Him], for God is love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' In this the love of God was made manifest (displayed) where we are concerned: in that God sent His Son, the only begotten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unique [Son], into the world so that we might live through Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' In this is love: not that we loved God, but that He loved us and sent His Son to be the propitiation (the atoning sacrifice) for our sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Beloved, if God loved us so [very much], we also ought to love one another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' No man has at any time [yet] seen God. But if we love one another, God abides (lives and remains) in us and His love (that love which is essentially His) is brought to completion (to its full maturity, runs its full course, is perfected) in us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' By this we come to know (perceive, recognize, and understand) that we abide (live and remain) in Him and He in us: because He has given (imparted) to us of His [Holy] Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And [besides] we ourselves have seen (have deliberately and steadfastly contemplated) and bear witness that the Father has sent the Son [as the] Savior of the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Anyone who confesses (acknowledges, owns) that Jesus is the Son of God, God abides (lives, makes His home) in him and he [abides, lives, makes his home] in God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And we know (understand, recognize, are conscious of, by observation and by experience) and believe (adhere to and put faith in and rely on) the love God cherishes for us. God is love, and he who dwells '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continues in love dwells '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continues in God, and God dwells '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continues in him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' In this [union and communion with Him] love is brought to completion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attains perfection with us, that we may have confidence for the day of judgment [with assurance and boldness to face Him], because as He is, so are we in this world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' There is no fear in love [dread does not exist], but full-grown (complete, perfect) love turns fear out of doors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expels every trace of terror! For fear brings with it the thought of punishment, and [so] he who is afraid has not reached the full maturity of love [is not yet grown into love''s complete perfection].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' We love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him,
  - type: text
    text: ' because He first loved us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' If anyone says, I love God, and hates (detests, abominates) his brother [in Christ], he is a liar; for he who does not love his brother, whom he has seen, cannot love God, Whom he has not seen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And this command (charge, order, injunction) we have from Him: that he who loves God shall love his brother [believer] also.'
