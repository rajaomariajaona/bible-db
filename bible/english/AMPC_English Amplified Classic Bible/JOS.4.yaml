document_id: JOS.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHEN ALL the nation had fully passed over the Jordan, the Lord said to Joshua,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For the priests who bore the ark stood in the midst of the Jordan until everything was finished that the Lord commanded Joshua to tell the people, according to all that Moses had commanded Joshua. The people passed over in haste.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' When all the people had passed over, the ark of the Lord and the priests went over in the presence of the people.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And the sons of Reuben, Gad, and half the tribe of Manasseh passed over armed before the [other] Israelites, as Moses had bidden them;'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' About 40,000 [of these] prepared for war passed over before the Lord to the plains of Jericho for battle.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' On that day the Lord magnified Joshua in the sight of all Israel; and they stood in awe of him, as they stood in awe of Moses, all the days of his life.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the Lord said to Joshua,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Order the priests bearing the ark of the Testimony to come up out of the Jordan.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So Joshua commanded the priests, Come up out of the Jordan.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And when the priests who bore the ark of the covenant of the Lord had come up out of the midst of the Jordan, and the soles of their feet were lifted up to the dry land, the waters of the Jordan returned to their place and flowed over all its banks as they had before.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And the people came up out of the Jordan on the tenth day of the first month and encamped in Gilgal on the east border of Jericho.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Take twelve men from among the people, one man out of every tribe,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And those twelve stones which they took out of the Jordan Joshua set up in Gilgal.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And he said to the Israelites, When your children ask their fathers in time to come, What do these stones mean?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' You shall let your children know, Israel came over this Jordan on dry ground.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' For the Lord your God dried up the waters of the Jordan for you until you passed over, as the Lord your God did to the Red Sea, which He dried up for us until we passed over,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' That all the peoples of the earth may know that the hand of the Lord is mighty and that you may reverence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fear the Lord your God forever.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And command them, Take twelve stones out of the midst of the Jordan from the place where the priests'' feet stood firm; carry them over with you and leave them at the place where you lodge tonight.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Then Joshua called the twelve men of the Israelites whom he had appointed, a man from each tribe.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And Joshua said to them, Pass over before the ark of the Lord your God in the midst of the Jordan, and take up every man of you a stone on his shoulder, as is the number of the tribes of the Israelites,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' That this may be a sign among you when your children ask in time to come, What do these stones mean to you?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then you shall tell them that the waters of the Jordan were cut off before the ark of the covenant of the Lord; when it passed over the Jordan, the waters of Jordan were cut off. So these stones shall be to the Israelites a memorial forever.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And the Israelites did as Joshua commanded, and took up twelve stones out of the midst of the Jordan, according to the number of the tribes of the Israelites, as the Lord told Joshua, and carried them over with them to the place where they lodged and laid them down there.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And Joshua set up twelve stones in the midst of the Jordan in the place where the feet of the priests bearing the ark of the covenant had stood. And they are there to this day.'
