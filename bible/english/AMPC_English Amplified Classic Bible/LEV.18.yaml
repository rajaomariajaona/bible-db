document_id: LEV.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Say to the Israelites, I am the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You shall not do as was done in the land of Egypt in which you dwelt, nor shall you do as is done in the land of Canaan to which I am bringing you; neither shall you walk in their statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' You shall do My ordinances and keep My statutes and walk in them. I am the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You shall therefore keep My statutes and My ordinances which, if a man does, he shall live by them. I am the Lord. [Luke 10:25-28; Rom. 10:4, 5; Gal. 3:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' None of you shall approach anyone close of kin to him to have sexual relations. I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The nakedness of your father, which is the nakedness of your mother, you shall not uncover; she is your mother; you shall not have intercourse with her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The nakedness of your father''s wife you shall not uncover; it is your father''s nakedness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You shall not have intercourse with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' uncover the nakedness of your sister, the daughter of your father or of your mother, whether born at home or born abroad.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You must not have sexual relations with your son''s daughter or your daughter''s daughter; their nakedness you shall not uncover, for they are your own flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' You must not have intercourse with your father''s wife''s daughter; begotten by your father, she is your sister; you shall not uncover her nakedness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' You shall not have intercourse with your father''s sister; she is your father''s near kinswoman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You shall not have sexual relations with your mother''s sister, for she is your mother''s near kinswoman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You shall not have intercourse with your father''s brother''s wife; you shall not approach his wife; she is your aunt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You shall not uncover the nakedness of your daughter-in-law; she is your son''s wife; you shall not have intercourse with her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' You shall not have intercourse with your brother''s wife; she belongs to your brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You shall not marry a woman and her daughter, nor shall you take her son''s daughter or her daughter''s daughter to have intercourse; they are [her] near kinswomen; it is wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an outrageous offense.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' You must not marry a woman in addition to her sister, to be a rival to her, having sexual relations with the second sister when the first one is alive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Also you shall not have intercourse with a woman during her [menstrual period or similar] uncleanness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Moreover, you shall not lie carnally with your neighbor''s wife, to defile yourself with her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' You shall not give any of your children to pass through the fire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sacrifice them to Molech [the fire god], nor shall you profane the name of your God [by giving it to false gods]. I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' You shall not lie with a man as with a woman; it is an abomination. [I Cor. 6:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Neither shall you lie with any beast and defile yourself with it; neither shall any woman yield herself to a beast to lie with it; it is confusion, perversion, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' degradedly carnal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Do not defile yourselves in any of these ways, for in all these things the nations are defiled which I am casting out before you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the land is defiled; therefore I visit the iniquity of it upon it, and the land itself vomits out her inhabitants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So you shall keep My statutes and My ordinances and shall not commit any of these abominations, neither the native-born nor any stranger who sojourns among you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For all these abominations have the men of the land done who were before you, and the land is defiled–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' [Do none of these things] lest the land spew you out when you defile it as it spewed out the nation that was before you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Whoever commits any of these abominations shall be cut off from among [his] people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' So keep My charge: do not practice any of these abominable customs which were practiced before you and defile yourselves by them. I am the Lord your God.'
