document_id: LEV.18,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' You must not have sexual relations with your son''s daughter or your daughter''s daughter; their nakedness you shall not uncover, for they are your own flesh.'
  '11':
  - type: text
    content: ' You must not have intercourse with your father''s wife''s daughter; begotten by your father, she is your sister; you shall not uncover her nakedness.'
  '12':
  - type: text
    content: ' You shall not have intercourse with your father''s sister; she is your father''s near kinswoman.'
  '13':
  - type: text
    content: ' You shall not have sexual relations with your mother''s sister, for she is your mother''s near kinswoman.'
  '14':
  - type: text
    content: ' You shall not have intercourse with your father''s brother''s wife; you shall not approach his wife; she is your aunt.'
  '15':
  - type: text
    content: ' You shall not uncover the nakedness of your daughter-in-law; she is your son''s wife; you shall not have intercourse with her.'
  '16':
  - type: text
    content: ' You shall not have intercourse with your brother''s wife; she belongs to your brother.'
  '17':
  - type: text
    content: ' You shall not marry a woman and her daughter, nor shall you take her son''s daughter or her daughter''s daughter to have intercourse; they are [her] near kinswomen; it is wickedness '
  - type: text
    content: and
  - type: text
    content: ' an outrageous offense.'
  '18':
  - type: text
    content: ' You must not marry a woman in addition to her sister, to be a rival to her, having sexual relations with the second sister when the first one is alive.'
  '19':
  - type: text
    content: ' Also you shall not have intercourse with a woman during her [menstrual period or similar] uncleanness.'
  '2':
  - type: text
    content: ' Say to the Israelites, I am the Lord your God.'
  '20':
  - type: text
    content: ' Moreover, you shall not lie carnally with your neighbor''s wife, to defile yourself with her.'
  '21':
  - type: text
    content: ' You shall not give any of your children to pass through the fire '
  - type: text
    content: and
  - type: text
    content: ' sacrifice them to Molech [the fire god], nor shall you profane the name of your God [by giving it to false gods]. I am the Lord.'
  '22':
  - type: text
    content: ' You shall not lie with a man as with a woman; it is an abomination. [I Cor. 6:9, 10.]'
  '23':
  - type: text
    content: ' Neither shall you lie with any beast and defile yourself with it; neither shall any woman yield herself to a beast to lie with it; it is confusion, perversion, '
  - type: text
    content: and
  - type: text
    content: ' degradedly carnal.'
  '24':
  - type: text
    content: ' Do not defile yourselves in any of these ways, for in all these things the nations are defiled which I am casting out before you.'
  '25':
  - type: text
    content: ' And the land is defiled; therefore I visit the iniquity of it upon it, and the land itself vomits out her inhabitants.'
  '26':
  - type: text
    content: ' So you shall keep My statutes and My ordinances and shall not commit any of these abominations, neither the native-born nor any stranger who sojourns among you,'
  '27':
  - type: text
    content: ' For all these abominations have the men of the land done who were before you, and the land is defiled–'
  '28':
  - type: text
    content: ' [Do none of these things] lest the land spew you out when you defile it as it spewed out the nation that was before you.'
  '29':
  - type: text
    content: ' Whoever commits any of these abominations shall be cut off from among [his] people.'
  '3':
  - type: text
    content: ' You shall not do as was done in the land of Egypt in which you dwelt, nor shall you do as is done in the land of Canaan to which I am bringing you; neither shall you walk in their statutes.'
  '30':
  - type: text
    content: ' So keep My charge: do not practice any of these abominable customs which were practiced before you and defile yourselves by them. I am the Lord your God.'
  '4':
  - type: text
    content: ' You shall do My ordinances and keep My statutes and walk in them. I am the Lord your God.'
  '5':
  - type: text
    content: ' You shall therefore keep My statutes and My ordinances which, if a man does, he shall live by them. I am the Lord. [Luke 10:25-28; Rom. 10:4, 5; Gal. 3:12.]'
  '6':
  - type: text
    content: ' None of you shall approach anyone close of kin to him to have sexual relations. I am the Lord.'
  '7':
  - type: text
    content: ' The nakedness of your father, which is the nakedness of your mother, you shall not uncover; she is your mother; you shall not have intercourse with her.'
  '8':
  - type: text
    content: ' The nakedness of your father''s wife you shall not uncover; it is your father''s nakedness.'
  '9':
  - type: text
    content: ' You shall not have intercourse with '
  - type: text
    content: or
  - type: text
    content: ' uncover the nakedness of your sister, the daughter of your father or of your mother, whether born at home or born abroad.'
