document_id: SNG.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE SONG of songs [the most excellent of them all] which is Solomon''s. [I Kings 4:32.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Your cheeks are comely with ornaments, your neck with strings of jewels.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' We will make for you chains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ornaments of gold, studded with silver.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' While the king sits at his table [she said], my spikenard [my absent lover] sends forth [his] fragrance [over me].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' My beloved [shepherd] is to me like a [scent] bag of myrrh that lies in my bosom.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' My beloved [shepherd] is to me a cluster of henna flowers in the vineyards of En-gedi [famed for its fragrant shrubs].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Behold, you are beautiful, my love! Behold, you are beautiful! You have doves'' eyes.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' [She cried] Behold, you are beautiful, my beloved [shepherd], yes, delightful! Our arbor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' couch are green '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' leafy.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The beams of our house are cedars, and our rafters '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' panels are cypresses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pines.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Let him kiss me with the kisses of his mouth! [she cries. Then, realizing that Solomon has arrived and has heard her speech, she turns to him and adds] For your love is better than wine!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' [And she continues] The odor of your ointments is fragrant; your name is like perfume poured out. Therefore do the maidens love you.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Draw me! We will run after you! The king brings me into his apartments! We will be glad and rejoice in you! We will recall [when we were favored with] your love, more fragrant than wine. The upright [are not offended at your choice, but sincerely] love you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' I am so black; but [you are] lovely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasant [the ladies assured her]. O you daughters of Jerusalem, [I am as dark] as the tents of [the Bedouin tribe] Kedar, like the [beautiful] curtains of Solomon!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' [Please] do not look at me, [she said, for] I am swarthy. [I have worked out] in the sun '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' it has left its mark upon me. My stepbrothers were angry with me, and they made me keeper of the vineyards; but my own vineyard [my complexion] I have not kept.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' [Addressing her shepherd, she said] Tell me, O you whom my soul loves, where you pasture your flock, where you make it lie down at noon. For why should I [as I think of you] be as a veiled one straying beside the flocks of your companions? [Ps. 23:1, 2.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' If you do not know [where your lover is], O you fairest among women, run along, follow the tracks of the flock, and [amuse yourself by] pasturing your kids beside the shepherds'' tents.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' O my love [he said as he saw her], you remind me of my [favorite] mare in the chariot spans of Pharaoh.'
