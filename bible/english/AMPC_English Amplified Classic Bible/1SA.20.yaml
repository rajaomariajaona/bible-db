document_id: 1SA.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' DAVID FLED from Naioth in Ramah and came and said to Jonathan, What have I done? Of what am I guilty? What is my sin before your father, that he seeks my life?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Jonathan said, God forbid! You shall not die. My father does nothing great or small but what he tells me. And why should [he] hide this thing from me? It is not so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But David replied, Your father certainly knows that I have found favor in your eyes, and he thinks, Let not Jonathan know this, lest he be grieved. But truly as the Lord lives and as your soul lives, there is but a step between me and death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then Jonathan said to David, Whatever you desire, I will do for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' David said to Jonathan, Tomorrow is the New Moon [festival], and I should not fail to sit at the table with the king; but let me go, that I may hide myself in the field till the third day at evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' If your father misses me at all, then say, David earnestly asked leave of me that he might run to Bethlehem, his city, for there is a yearly sacrifice there for all the family.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' If he says, All right, then it will be well with your servant; but if he is angry, then be sure that evil is determined by him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Therefore deal kindly with your servant, for you have brought [me] into a covenant of the Lord with you. But if there is guilt in me, kill me yourself; for why should you bring me to your father?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Jonathan said, Far be it from you! If I knew that evil was determined for you by my father, would I not tell you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then said David to Jonathan, Who will tell me if your father answers you roughly?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Jonathan said, Come, let us go into the field. So they went into the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Jonathan said to David, The Lord, the God of Israel, be witness. When I have sounded out my father about this time tomorrow, or the third day, behold, if he is well inclined toward David, and I do not send and let you know it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The Lord do so, and much more, to Jonathan. But if it please my father to do you harm, then I will disclose it to you and send you away, that you may go in safety. And may the Lord be with you as He has been with my father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' While I am still alive you shall not only show me the loving-kindness of the Lord, so that I die not,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But also you shall not cut off your kindness from my house forever–no, not even when the Lord has cut off every enemy of David from the face of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So Jonathan made a covenant with the house of David, saying, And the Lord will require that this covenant be kept at the hands of David''s enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Jonathan caused David to swear again by his love for him, for Jonathan loved him as he loved his own life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then Jonathan said to David, Tomorrow is the New Moon festival; and you will be missed, for your seat will be empty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' On the third day you will go quickly and come to the place where you hid yourself when the matter was in hand, and remain by the stone Ezel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And I will shoot three arrows on the side of it, as though I shot at a mark.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And I will send a lad, saying, Go, find the arrows. If I expressly say to the lad, Look, the arrows are on this side of you, take them–then you are to come, for it is safe for you and there is no danger, as the Lord lives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But if I say to the youth, Look, the arrows are beyond you–then go, for the Lord has sent you away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And as touching the matter of which you and I have spoken, behold, the Lord is between you and me forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So David hid himself in the field, and when the New Moon [festival] came, the king sat down to eat food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The king sat, as at other times, on his seat by the wall, and Jonathan sat opposite, and Abner sat by Saul''s side, but David''s place was empty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Yet Saul said nothing that day, for he thought, Something has befallen him and he is not clean–surely he is not clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But on the morrow, the second day after the new moon, David''s place was empty; and Saul said to Jonathan his son, Why has not the son of Jesse come to the meal, either yesterday or today?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And Jonathan answered, David earnestly asked leave of me to go to Bethlehem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' He said, Let me go, I pray, for our family holds a sacrifice in the city and my brother commanded me to be there. Now, if I have found favor in your eyes, let me get away and see my brothers. That is why he has not come to the king''s table.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Then Saul''s anger was kindled against Jonathan and he said to him, You son of a perverse, rebellious woman, do not I know that you have chosen the son of Jesse to your own shame and to the shame of your mother who bore you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' For as long as the son of Jesse lives upon the earth, you shall not be established nor shall your kingdom. So now send and bring him to me, for he shall surely die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Jonathan answered Saul his father, Why should he be killed? What has he done?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' But Saul cast his spear at him to smite him, by which Jonathan knew that his father had determined to kill David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' So Jonathan arose from the table in fierce anger, and ate no food that second day of the month, for he grieved for David because his father had disgraced him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' In the morning Jonathan went out into the field at the time appointed with David, and a little lad was with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And he said to his lad, Run, find the arrows which I shoot. And as the lad ran, he shot an arrow beyond him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' When the lad came to the place where Jonathan had shot the arrow, Jonathan called to [him], Is not the arrow beyond you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And Jonathan cried after the lad, Make speed, haste, stay not! The lad gathered up the arrow and came to his master.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But the lad knew nothing; only Jonathan and David knew the matter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Jonathan gave his weapons to his lad and told him, Go, carry them to the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And as soon as the lad was gone, David arose from beside the heap of stones and fell on his face to the ground and bowed himself three times. And they kissed one another and wept with one another until David got control of himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And Jonathan told David, Go in peace, forasmuch as we have sworn to each other in the name of the Lord, saying, The Lord shall be between me and you, and between my descendants and yours forever. And Jonathan arose and departed into the city.'
