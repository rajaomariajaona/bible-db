document_id: PSA.42,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A skillful song, {or} a didactic {or} reflective poem, of the sons of Korah.
  - type: text
    content: ' AS THE hart pants '
  - type: text
    content: and
  - type: text
    content: ' longs for the water brooks, so I pant '
  - type: text
    content: and
  - type: text
    content: ' long for You, O God.'
  '10':
  - type: text
    content: ' As with a sword [crushing] in my bones, my enemies taunt '
  - type: text
    content: and
  - type: text
    content: ' reproach me, while they say continually to me, Where is your God?'
  '11':
  - type: text
    content: ' Why are you cast down, O my inner self? And why should you moan over me '
  - type: text
    content: and
  - type: text
    content: ' be disquieted within me? Hope in God '
  - type: text
    content: and
  - type: text
    content: ' wait expectantly for Him, for I shall yet praise Him, Who is the help of my countenance, and my God.'
  '2':
  - type: text
    content: ' My inner self thirsts for God, for the living God. When shall I come and behold the face of God? [John 7:37; I Thess. 1:9, 10.]'
  '3':
  - type: text
    content: ' My tears have been my food day and night, while men say to me all day long, Where is your God?'
  '4':
  - type: text
    content: ' These things I [earnestly] remember and pour myself out within me: how I went slowly before the throng and led them in procession to the house of God [like a bandmaster before his band, timing the steps to the sound of music and the chant of song], with the voice of shouting and praise, a throng keeping festival.'
  '5':
  - type: text
    content: ' Why are you cast down, O my inner self? And why should you moan over me '
  - type: text
    content: and
  - type: text
    content: ' be disquieted within me? Hope in God '
  - type: text
    content: and
  - type: text
    content: ' wait expectantly for Him, for I shall yet praise Him, my Help and my God.'
  '6':
  - type: text
    content: ' O my God, my life is cast down upon me [and I find the burden more than I can bear]; therefore will I [earnestly] remember You from the land of the Jordan [River] and the [summits of Mount] Hermon, from the little mountain Mizar.'
  '7':
  - type: text
    content: ' [Roaring] deep calls to [roaring] deep at the thunder of Your waterspouts; all Your breakers and Your rolling waves have gone over me.'
  '8':
  - type: text
    content: ' Yet the Lord will command His loving-kindness in the daytime, and in the night His song shall be with me, a prayer to the God of my life.'
  '9':
  - type: text
    content: ' I will say to God my Rock, Why have You forgotten me? Why go I mourning because of the oppression of the enemy?'
