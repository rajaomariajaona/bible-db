document_id: PSA.36,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. +[A Psalm+] of David the servant of the Lord.
  - type: text
    content: ' TRANSGRESSION [like an oracle] speaks to the wicked deep in his heart. There is no fear '
  - type: text
    content: or
  - type: text
    content: ' dread of God before his eyes. [Rom. 3:18.]'
  '10':
  - type: text
    content: ' O continue Your loving-kindness to those who know You, Your righteousness (salvation) to the upright in heart.'
  '11':
  - type: text
    content: ' Let not the foot of pride overtake me, and let not the hand of the wicked drive me away.'
  '12':
  - type: text
    content: ' There the workers of iniquity fall '
  - type: text
    content: and
  - type: text
    content: ' lie prostrate; they are thrust down and shall not be able to rise.'
  '2':
  - type: text
    content: ' For he flatters '
  - type: text
    content: and
  - type: text
    content: ' deceives himself in his own eyes that his iniquity will not be found out and be hated.'
  '3':
  - type: text
    content: ' The words of his mouth are wrong and deceitful; he has ceased to be wise '
  - type: text
    content: and
  - type: text
    content: ' to do good.'
  '4':
  - type: text
    content: ' He plans wrongdoing on his bed; he sets himself in a way that is not good; he does not reject '
  - type: text
    content: or
  - type: text
    content: ' despise evil.'
  '5':
  - type: text
    content: ' Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, O Lord, extend to the skies, '
  - type: text
    content: and
  - type: text
    content: ' Your faithfulness to the clouds.'
  '6':
  - type: text
    content: ' Your righteousness is like the mountains of God, Your judgments are like the great deep. O Lord, You preserve man and beast.'
  '7':
  - type: text
    content: ' How precious is Your steadfast love, O God! The children of men take refuge '
  - type: text
    content: and
  - type: text
    content: ' put their trust under the shadow of Your wings.'
  '8':
  - type: text
    content: ' They relish '
  - type: text
    content: and
  - type: text
    content: ' feast on the abundance of Your house; and You cause them to drink of the stream of Your pleasures.'
  '9':
  - type: text
    content: ' For with You is the fountain of life; in Your light do we see light. [John 4:10, 14.]'
