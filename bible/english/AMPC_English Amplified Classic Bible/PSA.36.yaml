document_id: PSA.36,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician. +[A Psalm+] of David the servant of the Lord.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' TRANSGRESSION [like an oracle] speaks to the wicked deep in his heart. There is no fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dread of God before his eyes. [Rom. 3:18.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O continue Your loving-kindness to those who know You, Your righteousness (salvation) to the upright in heart.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let not the foot of pride overtake me, and let not the hand of the wicked drive me away.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There the workers of iniquity fall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lie prostrate; they are thrust down and shall not be able to rise.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For he flatters '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceives himself in his own eyes that his iniquity will not be found out and be hated.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The words of his mouth are wrong and deceitful; he has ceased to be wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to do good.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He plans wrongdoing on his bed; he sets himself in a way that is not good; he does not reject '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' despise evil.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness, O Lord, extend to the skies, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Your faithfulness to the clouds.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your righteousness is like the mountains of God, Your judgments are like the great deep. O Lord, You preserve man and beast.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' How precious is Your steadfast love, O God! The children of men take refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put their trust under the shadow of Your wings.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They relish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feast on the abundance of Your house; and You cause them to drink of the stream of Your pleasures.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For with You is the fountain of life; in Your light do we see light. [John 4:10, 14.]'
