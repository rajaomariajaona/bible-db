document_id: PSA.124,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents. Of David.
  - type: text
    content: ' IF IT had not been the Lord Who was on our side–now may Israel say–'
  '2':
  - type: text
    content: ' If it had not been the Lord Who was on our side when men rose up against us,'
  '3':
  - type: text
    content: ' Then they would have quickly swallowed us up alive when their wrath was kindled against us;'
  '4':
  - type: text
    content: ' Then the waters would have overwhelmed us '
  - type: text
    content: and
  - type: text
    content: ' swept us away, the torrent would have gone over us;'
  '5':
  - type: text
    content: ' Then the proud waters would have gone over us.'
  '6':
  - type: text
    content: ' Blessed be the Lord, Who has not given us as prey to their teeth!'
  '7':
  - type: text
    content: ' We are like a bird escaped from the snare of the fowlers; the snare is broken, and we have escaped!'
  '8':
  - type: text
    content: ' Our help is in the name of the Lord, Who made heaven and earth.'
