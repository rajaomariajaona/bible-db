document_id: 2CO.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW I myself, Paul, beseech you, by the gentleness and consideration of Christ [Himself; I] who [am] lowly enough [so they say] when among you face to face, but bold (fearless and outspoken) to you when [I am] absent from you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I entreat you when I do come [to you] that I may not [be driven to such] boldness as I intend to show toward those few who suspect us of acting according to the flesh [on the low level of worldly motives and as if invested with only human powers].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For though we walk (live) in the flesh, we are not carrying on our warfare according to the flesh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' using mere human weapons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For the weapons of our warfare are not physical [weapons of flesh and blood], but they are mighty before God for the overthrow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction of strongholds,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [Inasmuch as we] refute arguments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' theories '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reasonings and every proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lofty thing that sets itself up against the [true] knowledge of God; and we lead every thought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose away captive into the obedience of Christ (the Messiah, the Anointed One),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Being in readiness to punish every [insubordinate for his] disobedience, when your own submission '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obedience [as a church] are fully secured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Look at [this obvious fact] which is before your eyes. If anyone is confident that he is Christ''s, let him reflect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remind himself that even as he is Christ''s, so too are we.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For even though I boast rather freely about our power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority, which the Lord gave for your upbuilding and not for demolishing you, yet I shall not be put to shame [for exceeding the truth],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Neither would I seem to be overawing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' frightening you with my letters;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For they say, His letters are weighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impressive and forceful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' telling, but his personality '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bodily presence are weak, and his speech '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delivery are utterly contemptible (of no account).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Let such people realize that what we say by letters when we are absent, [we put] also into deeds when we are present–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Not that we [have the audacity to] venture to class or [even to] compare ourselves with some who exalt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' furnish testimonials for themselves! However, when they measure themselves with themselves and compare themselves with one another, they are without understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' behave unwisely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' We, on the other hand, will not boast beyond our legitimate province '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proper limit, but will keep within the limits [of our commission which] God has allotted us as our measuring line and which reaches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' includes even you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For we are not overstepping the limits of our province '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stretching beyond our ability to reach, as though we reached not (had no legitimate mission) to you, for we were [the very first] to come even as far as to you with the good news (the Gospel) of Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' We do not boast therefore, beyond our proper limit, over other men''s labors, but we have the hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident expectation that as your faith continues to grow, our field among you may be greatly enlarged, still within the limits of our commission,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So that [we may even] preach the Gospel in lands [lying] beyond you, without making a boast of work already done in another [man''s] sphere of activity [before we came on the scene].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' However, let him who boasts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glories boast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory in the Lord. [Jer. 9:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For [it is] not [the man] who praises '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commends himself who is approved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepted, but [it is the person] whom the Lord accredits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commends.'
