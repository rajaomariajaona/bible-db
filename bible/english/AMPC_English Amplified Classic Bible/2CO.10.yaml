document_id: 2CO.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW I myself, Paul, beseech you, by the gentleness and consideration of Christ [Himself; I] who [am] lowly enough [so they say] when among you face to face, but bold (fearless and outspoken) to you when [I am] absent from you!'
  '10':
  - type: text
    content: ' For they say, His letters are weighty '
  - type: text
    content: and
  - type: text
    content: ' impressive and forceful '
  - type: text
    content: and
  - type: text
    content: ' telling, but his personality '
  - type: text
    content: and
  - type: text
    content: ' bodily presence are weak, and his speech '
  - type: text
    content: and
  - type: text
    content: ' delivery are utterly contemptible (of no account).'
  '11':
  - type: text
    content: ' Let such people realize that what we say by letters when we are absent, [we put] also into deeds when we are present–'
  '12':
  - type: text
    content: ' Not that we [have the audacity to] venture to class or [even to] compare ourselves with some who exalt '
  - type: text
    content: and
  - type: text
    content: ' furnish testimonials for themselves! However, when they measure themselves with themselves and compare themselves with one another, they are without understanding '
  - type: text
    content: and
  - type: text
    content: ' behave unwisely.'
  '13':
  - type: text
    content: ' We, on the other hand, will not boast beyond our legitimate province '
  - type: text
    content: and
  - type: text
    content: ' proper limit, but will keep within the limits [of our commission which] God has allotted us as our measuring line and which reaches '
  - type: text
    content: and
  - type: text
    content: ' includes even you.'
  '14':
  - type: text
    content: ' For we are not overstepping the limits of our province '
  - type: text
    content: and
  - type: text
    content: ' stretching beyond our ability to reach, as though we reached not (had no legitimate mission) to you, for we were [the very first] to come even as far as to you with the good news (the Gospel) of Christ.'
  '15':
  - type: text
    content: ' We do not boast therefore, beyond our proper limit, over other men''s labors, but we have the hope '
  - type: text
    content: and
  - type: text
    content: ' confident expectation that as your faith continues to grow, our field among you may be greatly enlarged, still within the limits of our commission,'
  '16':
  - type: text
    content: ' So that [we may even] preach the Gospel in lands [lying] beyond you, without making a boast of work already done in another [man''s] sphere of activity [before we came on the scene].'
  '17':
  - type: text
    content: ' However, let him who boasts '
  - type: text
    content: and
  - type: text
    content: ' glories boast '
  - type: text
    content: and
  - type: text
    content: ' glory in the Lord. [Jer. 9:24.]'
  '18':
  - type: text
    content: ' For [it is] not [the man] who praises '
  - type: text
    content: and
  - type: text
    content: ' commends himself who is approved '
  - type: text
    content: and
  - type: text
    content: ' accepted, but [it is the person] whom the Lord accredits '
  - type: text
    content: and
  - type: text
    content: ' commends.'
  '2':
  - type: text
    content: ' I entreat you when I do come [to you] that I may not [be driven to such] boldness as I intend to show toward those few who suspect us of acting according to the flesh [on the low level of worldly motives and as if invested with only human powers].'
  '3':
  - type: text
    content: ' For though we walk (live) in the flesh, we are not carrying on our warfare according to the flesh '
  - type: text
    content: and
  - type: text
    content: ' using mere human weapons.'
  '4':
  - type: text
    content: ' For the weapons of our warfare are not physical [weapons of flesh and blood], but they are mighty before God for the overthrow '
  - type: text
    content: and
  - type: text
    content: ' destruction of strongholds,'
  '5':
  - type: text
    content: ' [Inasmuch as we] refute arguments '
  - type: text
    content: and
  - type: text
    content: ' theories '
  - type: text
    content: and
  - type: text
    content: ' reasonings and every proud '
  - type: text
    content: and
  - type: text
    content: ' lofty thing that sets itself up against the [true] knowledge of God; and we lead every thought '
  - type: text
    content: and
  - type: text
    content: ' purpose away captive into the obedience of Christ (the Messiah, the Anointed One),'
  '6':
  - type: text
    content: ' Being in readiness to punish every [insubordinate for his] disobedience, when your own submission '
  - type: text
    content: and
  - type: text
    content: ' obedience [as a church] are fully secured '
  - type: text
    content: and
  - type: text
    content: ' complete.'
  '7':
  - type: text
    content: ' Look at [this obvious fact] which is before your eyes. If anyone is confident that he is Christ''s, let him reflect '
  - type: text
    content: and
  - type: text
    content: ' remind himself that even as he is Christ''s, so too are we.'
  '8':
  - type: text
    content: ' For even though I boast rather freely about our power '
  - type: text
    content: and
  - type: text
    content: ' authority, which the Lord gave for your upbuilding and not for demolishing you, yet I shall not be put to shame [for exceeding the truth],'
  '9':
  - type: text
    content: ' Neither would I seem to be overawing '
  - type: text
    content: or
  - type: text
    content: ' frightening you with my letters;'
