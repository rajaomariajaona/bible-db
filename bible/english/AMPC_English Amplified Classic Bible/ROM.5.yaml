document_id: ROM.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEREFORE, SINCE we are justified (acquitted, declared righteous, and given a right standing with God) through faith, let us [grasp the fact that we] have [the peace of reconciliation to hold and to enjoy] peace with God through our Lord Jesus Christ (the Messiah, the Anointed One).'
  '10':
  - type: text
    content: ' For if while we were enemies we were reconciled to God through the death of His Son, it is much more [certain], now that we are reconciled, that we shall be saved (daily delivered from sin''s dominion) through His [resurrection] life.'
  '11':
  - type: text
    content: ' Not only so, but we also rejoice '
  - type: text
    content: and
  - type: text
    content: ' exultingly glory in God [in His love and perfection] through our Lord Jesus Christ, through Whom we have now received '
  - type: text
    content: and
  - type: text
    content: ' enjoy [our] reconciliation. [Jer. 9:24.]'
  '12':
  - type: text
    content: ' Therefore, as sin came into the world through one man, and death as the result of sin, so death spread to all men, [no one being able to stop it or to escape its power] because all men sinned.'
  '13':
  - type: text
    content: ' [To be sure] sin was in the world before ever the Law was given, but sin is not charged to men''s account where there is no law [to transgress].'
  '14':
  - type: text
    content: ' Yet death held sway from Adam to Moses [the Lawgiver], even over those who did not themselves transgress [a positive command] as Adam did. Adam was a type (prefigure) of the One Who was to come [in reverse, the former destructive, the Latter saving]. [Gen. 5:5; 7:22; Deut. 34:5.]'
  '15':
  - type: text
    content: ' But God''s free gift is not at all to be compared to the trespass [His grace is out of all proportion to the fall of man]. For if many died through one man''s falling away (his lapse, his offense), much more profusely did God''s grace and the free gift [that comes] through the undeserved favor of the one Man Jesus Christ abound '
  - type: text
    content: and
  - type: text
    content: ' overflow to '
  - type: text
    content: and
  - type: text
    content: ' for [the benefit of] many.'
  '16':
  - type: text
    content: ' Nor is the free gift at all to be compared to the effect of that one [man''s] sin. For the sentence [following the trespass] of one [man] brought condemnation, whereas the free gift [following] many transgressions brings justification (an act of righteousness).'
  '17':
  - type: text
    content: ' For if because of one man''s trespass (lapse, offense) death reigned through that one, much more surely will those who receive [God''s] overflowing grace (unmerited favor) and the free gift of righteousness [putting them into right standing with Himself] reign as kings in life through the one Man Jesus Christ (the Messiah, the Anointed One).'
  '18':
  - type: text
    content: ' Well then, as one man''s trespass [one man''s false step and falling away led] to condemnation for all men, so one Man''s act of righteousness [leads] to acquittal '
  - type: text
    content: and
  - type: text
    content: ' right standing with God and life for all men.'
  '19':
  - type: text
    content: ' For just as by one man''s disobedience (failing to hear, heedlessness, and carelessness) the many were constituted sinners, so by one Man''s obedience the many will be constituted righteous (made acceptable to God, brought into right standing with Him).'
  '2':
  - type: text
    content: ' Through Him also we have [our] access (entrance, introduction) by faith into this grace (state of God''s favor) in which we [firmly and safely] stand. And let us rejoice '
  - type: text
    content: and
  - type: text
    content: ' exult in our hope of experiencing '
  - type: text
    content: and
  - type: text
    content: ' enjoying the glory of God.'
  '20':
  - type: text
    content: ' But then Law came in, [only] to expand '
  - type: text
    content: and
  - type: text
    content: ' increase the trespass [making it more apparent and exciting opposition]. But where sin increased '
  - type: text
    content: and
  - type: text
    content: ' abounded, grace (God''s unmerited favor) has surpassed it '
  - type: text
    content: and
  - type: text
    content: ' increased the more '
  - type: text
    content: and
  - type: text
    content: ' superabounded,'
  '21':
  - type: text
    content: ' So that, [just] as sin has reigned in death, [so] grace (His unearned and undeserved favor) might reign also through righteousness (right standing with God) which issues in eternal life through Jesus Christ (the Messiah, the Anointed One) our Lord.'
  '3':
  - type: text
    content: ' Moreover [let us also be full of joy now!] let us exult '
  - type: text
    content: and
  - type: text
    content: ' triumph in our troubles '
  - type: text
    content: and
  - type: text
    content: ' rejoice in our sufferings, knowing that pressure '
  - type: text
    content: and
  - type: text
    content: ' affliction '
  - type: text
    content: and
  - type: text
    content: ' hardship produce patient '
  - type: text
    content: and
  - type: text
    content: ' unswerving endurance.'
  '4':
  - type: text
    content: ' And endurance (fortitude) develops maturity of character (approved faith and tried integrity). And character [of this sort] produces [the habit of] joyful and confident hope of eternal salvation.'
  '5':
  - type: text
    content: ' Such hope never disappoints '
  - type: text
    content: or
  - type: text
    content: ' deludes '
  - type: text
    content: or
  - type: text
    content: ' shames us, for God''s love has been poured out in our hearts through the Holy Spirit Who has been given to us.'
  '6':
  - type: text
    content: ' While we were yet in weakness [powerless to help ourselves], at the fitting time Christ died for (in behalf of) the ungodly.'
  '7':
  - type: text
    content: ' Now it is an extraordinary thing for one to give his life even for an upright man, though perhaps for a noble '
  - type: text
    content: and
  - type: text
    content: ' lovable '
  - type: text
    content: and
  - type: text
    content: ' generous benefactor someone might even dare to die.'
  '8':
  - type: text
    content: ' But God shows '
  - type: text
    content: and
  - type: text
    content: ' clearly proves His [own] love for us by the fact that while we were still sinners, Christ (the Messiah, the Anointed One) died for us.'
  '9':
  - type: text
    content: ' Therefore, since we are now justified (acquitted, made righteous, and brought into right relationship with God) by Christ''s blood, how much more [certain is it that] we shall be saved by Him from the indignation '
  - type: text
    content: and
  - type: text
    content: ' wrath of God.'
