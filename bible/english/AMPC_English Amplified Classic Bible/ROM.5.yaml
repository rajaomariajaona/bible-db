document_id: ROM.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEREFORE, SINCE we are justified (acquitted, declared righteous, and given a right standing with God) through faith, let us [grasp the fact that we] have [the peace of reconciliation to hold and to enjoy] peace with God through our Lord Jesus Christ (the Messiah, the Anointed One).'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For if while we were enemies we were reconciled to God through the death of His Son, it is much more [certain], now that we are reconciled, that we shall be saved (daily delivered from sin''s dominion) through His [resurrection] life.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Not only so, but we also rejoice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exultingly glory in God [in His love and perfection] through our Lord Jesus Christ, through Whom we have now received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoy [our] reconciliation. [Jer. 9:24.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Therefore, as sin came into the world through one man, and death as the result of sin, so death spread to all men, [no one being able to stop it or to escape its power] because all men sinned.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' [To be sure] sin was in the world before ever the Law was given, but sin is not charged to men''s account where there is no law [to transgress].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Yet death held sway from Adam to Moses [the Lawgiver], even over those who did not themselves transgress [a positive command] as Adam did. Adam was a type (prefigure) of the One Who was to come [in reverse, the former destructive, the Latter saving]. [Gen. 5:5; 7:22; Deut. 34:5.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But God''s free gift is not at all to be compared to the trespass [His grace is out of all proportion to the fall of man]. For if many died through one man''s falling away (his lapse, his offense), much more profusely did God''s grace and the free gift [that comes] through the undeserved favor of the one Man Jesus Christ abound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overflow to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for [the benefit of] many.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Nor is the free gift at all to be compared to the effect of that one [man''s] sin. For the sentence [following the trespass] of one [man] brought condemnation, whereas the free gift [following] many transgressions brings justification (an act of righteousness).'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' For if because of one man''s trespass (lapse, offense) death reigned through that one, much more surely will those who receive [God''s] overflowing grace (unmerited favor) and the free gift of righteousness [putting them into right standing with Himself] reign as kings in life through the one Man Jesus Christ (the Messiah, the Anointed One).'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Well then, as one man''s trespass [one man''s false step and falling away led] to condemnation for all men, so one Man''s act of righteousness [leads] to acquittal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right standing with God and life for all men.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' For just as by one man''s disobedience (failing to hear, heedlessness, and carelessness) the many were constituted sinners, so by one Man''s obedience the many will be constituted righteous (made acceptable to God, brought into right standing with Him).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Through Him also we have [our] access (entrance, introduction) by faith into this grace (state of God''s favor) in which we [firmly and safely] stand. And let us rejoice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exult in our hope of experiencing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoying the glory of God.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But then Law came in, [only] to expand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' increase the trespass [making it more apparent and exciting opposition]. But where sin increased '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abounded, grace (God''s unmerited favor) has surpassed it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' increased the more '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' superabounded,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' So that, [just] as sin has reigned in death, [so] grace (His unearned and undeserved favor) might reign also through righteousness (right standing with God) which issues in eternal life through Jesus Christ (the Messiah, the Anointed One) our Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Moreover [let us also be full of joy now!] let us exult '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' triumph in our troubles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejoice in our sufferings, knowing that pressure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affliction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hardship produce patient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unswerving endurance.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And endurance (fortitude) develops maturity of character (approved faith and tried integrity). And character [of this sort] produces [the habit of] joyful and confident hope of eternal salvation.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Such hope never disappoints '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' deludes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' shames us, for God''s love has been poured out in our hearts through the Holy Spirit Who has been given to us.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' While we were yet in weakness [powerless to help ourselves], at the fitting time Christ died for (in behalf of) the ungodly.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Now it is an extraordinary thing for one to give his life even for an upright man, though perhaps for a noble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' generous benefactor someone might even dare to die.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But God shows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clearly proves His [own] love for us by the fact that while we were still sinners, Christ (the Messiah, the Anointed One) died for us.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Therefore, since we are now justified (acquitted, made righteous, and brought into right relationship with God) by Christ''s blood, how much more [certain is it that] we shall be saved by Him from the indignation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrath of God.'
