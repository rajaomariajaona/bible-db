verses:
  '1':
  - type: text
    content: ' PRAISE THE Lord! (Hallelujah!) I will praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to the Lord with my whole heart in the council of the upright and in the congregation.'
  '10':
  - type: text
    content: ' The reverent fear '
  - type: text
    content: and
  - type: text
    content: ' worship of the Lord is the beginning of Wisdom '
  - type: text
    content: and
  - type: text
    content: ' skill [the preceding and the first essential, the prerequisite and the alphabet]; a good understanding, wisdom, '
  - type: text
    content: and
  - type: text
    content: ' meaning have all those who do [the will of the Lord]. Their praise of Him endures forever. [Job. 28:28; Prov. 1:7; Matt. 22:37, 38; Rev. 14:7.]'
  '2':
  - type: text
    content: ' The works of the Lord are great, sought out by all those who have delight in them.'
  '3':
  - type: text
    content: ' His work is honorable and glorious, and His righteousness endures forever.'
  '4':
  - type: text
    content: ' He has made His wonderful works to be remembered; the Lord is gracious, merciful, '
  - type: text
    content: and
  - type: text
    content: ' full of loving compassion.'
  '5':
  - type: text
    content: ' He has given food '
  - type: text
    content: and
  - type: text
    content: ' provision to those who reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fear Him; He will remember His covenant forever '
  - type: text
    content: and
  - type: text
    content: ' imprint it [on His mind]. [Deut. 10:12; Ps. 96:9.]'
  '6':
  - type: text
    content: ' He has declared '
  - type: text
    content: and
  - type: text
    content: ' shown to His people the power of His works in giving them the heritage of the nations [of Canaan].'
  '7':
  - type: text
    content: ' The works of His hands are [absolute] truth and justice [faithful and right]; and all His decrees '
  - type: text
    content: and
  - type: text
    content: ' precepts are sure (fixed, established, and trustworthy).'
  '8':
  - type: text
    content: ' They stand fast '
  - type: text
    content: and
  - type: text
    content: ' are established forever and ever and are done in [absolute] truth and uprightness.'
  '9':
  - type: text
    content: ' He has sent redemption to His people; He has commanded His covenant to be forever; holy is His name, inspiring awe, reverence, '
  - type: text
    content: and
  - type: text
    content: ' godly fear.'
