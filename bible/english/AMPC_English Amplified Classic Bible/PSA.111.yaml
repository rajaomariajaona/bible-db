document_id: PSA.111
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PRAISE THE Lord! (Hallelujah!) I will praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks to the Lord with my whole heart in the council of the upright and in the congregation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The works of the Lord are great, sought out by all those who have delight in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' His work is honorable and glorious, and His righteousness endures forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He has made His wonderful works to be remembered; the Lord is gracious, merciful, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' full of loving compassion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He has given food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provision to those who reverently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fear Him; He will remember His covenant forever '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' imprint it [on His mind]. [Deut. 10:12; Ps. 96:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He has declared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shown to His people the power of His works in giving them the heritage of the nations [of Canaan].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The works of His hands are [absolute] truth and justice [faithful and right]; and all His decrees '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' precepts are sure (fixed, established, and trustworthy).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They stand fast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are established forever and ever and are done in [absolute] truth and uprightness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He has sent redemption to His people; He has commanded His covenant to be forever; holy is His name, inspiring awe, reverence, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly fear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The reverent fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship of the Lord is the beginning of Wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skill [the preceding and the first essential, the prerequisite and the alphabet]; a good understanding, wisdom, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' meaning have all those who do [the will of the Lord]. Their praise of Him endures forever. [Job. 28:28; Prov. 1:7; Matt. 22:37, 38; Rev. 14:7.]'
