document_id: LEV.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IF A man''s offering is a sacrifice of peace offering, if he offers an animal from the herd, whether male or female, he shall offer it without blemish before the Lord.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And the two kidneys, and the fat on them at the loins, and the appendage of the liver, which he shall take away with the kidneys.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' The priest shall burn it upon the altar, a food offering made by fire to the Lord.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' If [a man''s] offering is a goat, he shall offer it before the Lord,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And lay his hands upon its head, and kill it before the Tent of Meeting; and the sons of Aaron shall throw its blood against the altar round about.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Then he shall offer from it as his offering made by fire to the Lord: the fat that covers and is on the entrails,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the two kidneys and the fat that is on them at the loins, and the appendage of the liver which he shall take away with the kidneys.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The priest shall burn them on the altar as food, offered by fire, for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying fragrance. All the fat is the Lord''s.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' It shall be a perpetual statute for your generations in all your dwelling places, that you eat neither fat nor blood.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He shall lay [both] his hands upon the head of his offering and kill it at the door of the Tent of Meeting; and Aaron''s sons the priests shall throw the blood against the altar round about.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And from the sacrifice of the peace offering, an offering made by fire to the Lord, he shall offer the fat that covers and is upon the entrails,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And the two kidneys with the fat that is on them at the loins, and the appendage of the liver which he shall take away with the kidneys.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Aaron''s sons shall burn it all on the altar upon the burnt offering which is on the wood on the fire, an offering made by fire, of a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfying odor to the Lord.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' If his peace offering to the Lord is an animal from the flock, male or female, he shall offer it without blemish.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' If he offers a lamb, then he shall offer it before the Lord.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He shall lay [both] his hands on the head of his offering and kill it before the Tent of Meeting; and Aaron''s sons shall throw its blood around against the altar.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And he shall offer from the peace offering as an offering made by fire to the Lord: the fat of it, the fat tail as a whole, taking it off close to the backbone, and the fat that covers and is upon the entrails,'
