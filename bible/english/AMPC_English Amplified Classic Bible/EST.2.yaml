document_id: EST.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THESE things, when the wrath of King Ahasuerus was pacified, he [earnestly] remembered Vashti and what she had done and what was decreed against her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then the king''s servants who ministered to him said, Let beautiful young virgins be sought for the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And let the king appoint officers in all the provinces of his kingdom to gather all the beautiful young virgins to the capital in Shushan, to the harem under the custody of Hegai, the king''s eunuch, who is in charge of the women; and let their things for purification be given them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And let the maiden who pleases the king be queen instead of Vashti. This pleased the king, and he did so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' There was a certain Jew in the capital in Shushan whose name was Mordecai son of Jair, the son of Shimei, the son of Kish, a Benjamite,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Who had been carried away from Jerusalem with the captives taken away with Jeconiah king of Judah, whom Nebuchadnezzar the king of Babylon had carried into exile.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He had brought up Hadassah, that is Esther, his uncle''s daughter, for she had neither father nor mother. The maiden was beautiful and lovely, and when her father and mother died, Mordecai took her as his own daughter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So when the king''s command and his decree were proclaimed and when many maidens were gathered in Shushan the capital under the custody of Hegai, Esther also was taken to the king''s house into the custody of Hegai, keeper of the women.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the maiden pleased [Hegai] and obtained his favor. And he speedily gave her the things for her purification and her portion of food and the seven chosen maids to be given her from the king''s palace; and he removed her and her maids to the best [apartment] in the harem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Esther had not made known her nationality or her kindred, for Mordecai had charged her not to do so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Mordecai [who was an attendant in the king''s court] walked every day before the court of the harem to learn how Esther was and what would become of her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now when the turn of each maiden came to go in to King Ahasuerus, after the regulations for the women had been carried out for twelve months–since this was the regular period for their beauty treatments, six months with oil of myrrh and six months with sweet spices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perfumes and the things for the purifying of the women–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then in this way the maiden came to the king: whatever she desired was given her to take with her from the harem into the king''s palace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' In the evening she went and next day she returned into the second harem in the custody of Shaashgaz, the king''s eunuch who was in charge of the concubines. She came to the king no more unless the king delighted in her and she was called for by name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now when the turn for Esther the daughter of Abihail, the uncle of Mordecai who had taken her as his own daughter, had come to go in to the king, she required nothing but what Hegai the king''s attendant, the keeper of the women, suggested. And Esther won favor in the sight of all who saw her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So Esther was taken to King Ahasuerus into his royal palace in the tenth month, the month of Tebeth, in the seventh year of his reign.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the king loved Esther more than all the women, and she obtained grace and favor in his sight more than all the maidens, so that he set the royal crown on her head and made her queen instead of Vashti.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then the king gave a great feast for all his princes and his servants, Esther''s feast; and he gave a holiday [or a lessening of taxes] to the provinces and gave gifts in keeping with the generosity of the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And when the maidens were gathered together the second time, Mordecai was sitting at the king''s gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now Esther had not yet revealed her nationality or her people, for she obeyed Mordecai''s command to her [to fear God and execute His commands] just as when she was being brought up by him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' In those days, while Mordecai sat at the king''s gate, two of the king''s eunuchs, Bigthan and Teresh, of those who guarded the door, were angry and sought to lay hands on King Ahasuerus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And this was known to Mordecai, who told it to Queen Esther, and Esther told the king in Mordecai''s name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' When it was investigated and found to be true, both men were hanged on the gallows. And it was recorded in the Book of the Chronicles in the king''s presence.'
