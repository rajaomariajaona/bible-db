document_id: ECC.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR ALL this I took to heart, exploring '
  - type: text
    content: and
  - type: text
    content: ' examining it all, how the righteous (the upright, in right standing with God) and the wise and their works are in the hands of God. Whether it is to be love or hatred no man knows; all that is before them.'
  '10':
  - type: text
    content: ' Whatever your hand finds to do, do it with all your might, for there is no work or device or knowledge or wisdom in Sheol (the place of the dead), where you are going.'
  '11':
  - type: text
    content: ' I returned and saw under the sun that the race is not to the swift nor the battle to the strong, neither is bread to the wise nor riches to men of intelligence '
  - type: text
    content: and
  - type: text
    content: ' understanding nor favor to men of skill; but time and chance happen to them all. [Ps. 33:16-19; Rom. 9:16.]'
  '12':
  - type: text
    content: ' For man also knows not his time [of death]: as the fishes are taken in an evil net, and as the birds are caught in the snare, so are the sons of men snared in an evil time when [calamity] falls suddenly upon them.'
  '13':
  - type: text
    content: ' This [illustration of] wisdom have I seen also under the sun, and it seemed great to me:'
  '14':
  - type: text
    content: ' There was a little city with few men in it. And a great king came against it and besieged it and built great bulwarks against it.'
  '15':
  - type: text
    content: ' But there was found in it a poor wise man, and he by his wisdom delivered the city. Yet no man [seriously] remembered that poor man.'
  '16':
  - type: text
    content: ' But I say that wisdom is better than might, though the poor man''s wisdom is despised and his words are not heeded.'
  '17':
  - type: text
    content: ' The words of wise men heard in quiet are better than the shouts of him who rules among fools.'
  '18':
  - type: text
    content: ' Wisdom is better than weapons of war, but one sinner destroys much good.'
  '2':
  - type: text
    content: ' All things come alike to all. There is one event to the righteous and to the wicked, to the good and to the clean and to the unclean; to him who sacrifices and to him who does not sacrifice. As is the good man, so is the sinner; and he who swears is as he who fears '
  - type: text
    content: and
  - type: text
    content: ' shuns an oath.'
  '3':
  - type: text
    content: ' This evil is in all that is done under the sun: one fate comes to all. Also the hearts of men are full of evil, and madness is in their hearts while they live, and after that they go to the dead.'
  '4':
  - type: text
    content: ' [There is no exemption] but he who is joined to all the living has hope–for a living dog is better than a dead lion.'
  '5':
  - type: text
    content: ' For the living know that they will die, but the dead know nothing; and they have no more reward [here], for the memory of them is forgotten.'
  '6':
  - type: text
    content: ' Their love and their hatred and their envy have already perished; neither have they any more a share in anything that is done under the sun.'
  '7':
  - type: text
    content: ' Go your way, eat your bread with joy, and drink your wine with a cheerful heart [if you are righteous, wise, and in the hands of God], for God has already accepted your works.'
  '8':
  - type: text
    content: ' Let your garments be always white [with purity], and let your head not lack [the] oil [of gladness].'
  '9':
  - type: text
    content: ' Live joyfully with the wife whom you love all the days of your vain life which He has given you under the sun–all the days of futility. For that is your portion in this life and in your work at which you toil under the sun.'
