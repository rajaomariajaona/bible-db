document_id: ECC.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR ALL this I took to heart, exploring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' examining it all, how the righteous (the upright, in right standing with God) and the wise and their works are in the hands of God. Whether it is to be love or hatred no man knows; all that is before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' All things come alike to all. There is one event to the righteous and to the wicked, to the good and to the clean and to the unclean; to him who sacrifices and to him who does not sacrifice. As is the good man, so is the sinner; and he who swears is as he who fears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shuns an oath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' This evil is in all that is done under the sun: one fate comes to all. Also the hearts of men are full of evil, and madness is in their hearts while they live, and after that they go to the dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [There is no exemption] but he who is joined to all the living has hope–for a living dog is better than a dead lion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For the living know that they will die, but the dead know nothing; and they have no more reward [here], for the memory of them is forgotten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Their love and their hatred and their envy have already perished; neither have they any more a share in anything that is done under the sun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Go your way, eat your bread with joy, and drink your wine with a cheerful heart [if you are righteous, wise, and in the hands of God], for God has already accepted your works.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Let your garments be always white [with purity], and let your head not lack [the] oil [of gladness].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Live joyfully with the wife whom you love all the days of your vain life which He has given you under the sun–all the days of futility. For that is your portion in this life and in your work at which you toil under the sun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Whatever your hand finds to do, do it with all your might, for there is no work or device or knowledge or wisdom in Sheol (the place of the dead), where you are going.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I returned and saw under the sun that the race is not to the swift nor the battle to the strong, neither is bread to the wise nor riches to men of intelligence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding nor favor to men of skill; but time and chance happen to them all. [Ps. 33:16-19; Rom. 9:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For man also knows not his time [of death]: as the fishes are taken in an evil net, and as the birds are caught in the snare, so are the sons of men snared in an evil time when [calamity] falls suddenly upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' This [illustration of] wisdom have I seen also under the sun, and it seemed great to me:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' There was a little city with few men in it. And a great king came against it and besieged it and built great bulwarks against it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But there was found in it a poor wise man, and he by his wisdom delivered the city. Yet no man [seriously] remembered that poor man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But I say that wisdom is better than might, though the poor man''s wisdom is despised and his words are not heeded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The words of wise men heard in quiet are better than the shouts of him who rules among fools.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Wisdom is better than weapons of war, but one sinner destroys much good.'
