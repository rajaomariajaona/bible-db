document_id: GEN.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THIS IS the book (the written record, the history) of the generations of the offspring of Adam. When God created man, He made him in the likeness of God.'
  '10':
  - type: text
    content: ' Enosh lived after the birth of Kenan 815 years and had other sons and daughters.'
  '11':
  - type: text
    content: ' So Enosh lived 905 years, and he died.'
  '12':
  - type: text
    content: ' When Kenan was 70 years old, Mahalalel was born.'
  '13':
  - type: text
    content: ' Kenan lived after the birth of Mahalalel 840 years and had other sons and daughters.'
  '14':
  - type: text
    content: ' So Kenan lived 910 years, and he died.'
  '15':
  - type: text
    content: ' When Mahalalel was 65 years old, Jared was born.'
  '16':
  - type: text
    content: ' Mahalalel lived after the birth of Jared 830 years and had other sons and daughters.'
  '17':
  - type: text
    content: ' So Mahalalel lived 895 years, and he died.'
  '18':
  - type: text
    content: ' When Jared was 162 years old, Enoch was born.'
  '19':
  - type: text
    content: ' Jared lived after the birth of Enoch 800 years and had other sons and daughters.'
  '2':
  - type: text
    content: ' He created them male and female and blessed them and named them [both] Adam [Man] at the time they were created.'
  '20':
  - type: text
    content: ' So Jared lived 962 years, and he died.'
  '21':
  - type: text
    content: ' When Enoch was 65 years old, Methuselah was born.'
  '22':
  - type: text
    content: ' Enoch walked [in habitual fellowship] with God after the birth of Methuselah 300 years and had other sons and daughters.'
  '23':
  - type: text
    content: ' So all the days of Enoch were 365 years.'
  '24':
  - type: text
    content: ' And Enoch walked [in habitual fellowship] with God; and he was not, for God took him [home with Him]. [Heb. 11:5.]'
  '25':
  - type: text
    content: ' When Methuselah was 187 years old, Lamech was born to him.'
  '26':
  - type: text
    content: ' Methuselah lived after the birth of Lamech 782 years and had other sons and daughters.'
  '27':
  - type: text
    content: ' So Methuselah lived 969 years, and he died.'
  '28':
  - type: text
    content: ' When Lamech was 182 years old, a son was born.'
  '29':
  - type: text
    content: ' He named him Noah, saying, This one shall bring us relief '
  - type: text
    content: and
  - type: text
    content: ' comfort from our work and the [grievous] toil of our hands due to the ground being cursed by the Lord.'
  '3':
  - type: text
    content: ' When Adam had lived 130 years, he had a son in his own likeness, after his image; and he named him Seth.'
  '30':
  - type: text
    content: ' Lamech lived after the birth of Noah 595 years and had other sons and daughters.'
  '31':
  - type: text
    content: ' So all the days of Lamech were 777 years, and he died.'
  '32':
  - type: text
    content: ' After Noah was 500 years old, he became the father of Shem, Ham, and Japheth.'
  '4':
  - type: text
    content: ' After he had Seth, Adam lived 800 years and had other sons and daughters.'
  '5':
  - type: text
    content: ' So altogether Adam lived 930 years, and he died.'
  '6':
  - type: text
    content: ' When Seth was 105 years old, Enosh was born.'
  '7':
  - type: text
    content: ' Seth lived after the birth of Enosh 807 years and had other sons and daughters.'
  '8':
  - type: text
    content: ' So Seth lived 912 years, and he died.'
  '9':
  - type: text
    content: ' When Enosh was 90 years old, Kenan was born to him.'
