document_id: JOB.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AGAIN THERE was a day when the sons of God [the angels] came to present themselves before the Lord, and Satan (the adversary and the accuser) came also among them to present himself before the Lord.'
  '10':
  - type: text
    content: ' But he said to her, You speak as one of the impious '
  - type: text
    content: and
  - type: text
    content: ' foolish women would speak. What? Shall we accept [only] good at the hand of God and shall we not accept [also] misfortune '
  - type: text
    content: and
  - type: text
    content: ' what is of a bad nature? In [spite of] all this, Job did not sin with his lips.'
  '11':
  - type: text
    content: ' Now when Job''s three friends heard of all this evil that was come upon him, they came each one from his own place, Eliphaz the Temanite and Bildad the Shuhite and Zophar the Naamathite, for they had made an appointment together to come to condole with him and to comfort him.'
  '12':
  - type: text
    content: ' And when they looked from afar off and saw him [disfigured] beyond recognition, they lifted up their voices and wept; and each one tore his robe, and they cast dust over their heads toward the heavens.'
  '13':
  - type: text
    content: ' So they sat down with [Job] on the ground for seven days and seven nights, and none spoke a word to him, for they saw that his grief '
  - type: text
    content: and
  - type: text
    content: ' pain were very great.'
  '2':
  - type: text
    content: ' And the Lord said to Satan, From where do you come? And Satan (the adversary and the accuser) answered the Lord, From going to and fro on the earth and from walking up and down on it.'
  '3':
  - type: text
    content: ' And the Lord said to Satan, Have you considered My servant Job, that there is none like him on the earth, a blameless and upright man, one who [reverently] fears God and abstains from '
  - type: text
    content: and
  - type: text
    content: ' shuns all evil [because it is wrong]? And still he holds fast his integrity, although you moved Me against him to destroy him without cause.'
  '4':
  - type: text
    content: ' Then Satan answered the Lord, Skin for skin! Yes, all that a man has will he give for his life.'
  '5':
  - type: text
    content: ' But put forth Your hand now, and touch his bone and his flesh, and he will curse '
  - type: text
    content: and
  - type: text
    content: ' renounce You to Your face.'
  '6':
  - type: text
    content: ' And the Lord said to Satan, Behold, he is in your hand; only spare his life.'
  '7':
  - type: text
    content: ' So Satan went forth from the presence of the Lord and smote Job with loathsome '
  - type: text
    content: and
  - type: text
    content: ' painful sores from the sole of his foot to the crown of his head.'
  '8':
  - type: text
    content: ' And he took a piece of broken pottery with which to scrape himself, and he sat [down] among the ashes.'
  '9':
  - type: text
    content: ' Then his wife said to him, Do you still hold fast your blameless uprightness? Renounce God and die!'
