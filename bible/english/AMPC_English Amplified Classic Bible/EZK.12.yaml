document_id: EZK.12,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD of the Lord also came to me, saying,'
  '10':
  - type: text
    content: ' Say to them, Thus says the Lord God: This oracle '
  - type: text
    content: or
  - type: text
    content: ' revelation concerns the prince in Jerusalem and all the house of Israel who are in it.'
  '11':
  - type: text
    content: ' Say, I am your sign; as I have done, so shall it be done to them; into banishment, into captivity, they shall go.'
  '12':
  - type: text
    content: ' And the prince who is in their midst shall lift up his luggage to his shoulder in the dark; then shall he go forth. They shall dig through the wall to carry out through the hole in it. He shall cover his face so that he will not see with his eyes the land.'
  '13':
  - type: text
    content: ' My net also will I spread over him, and he shall be taken in My snare, and I will bring him to Babylonia, to the land of the Chaldeans; yet shall he not see it, though he shall die there. [II Kings 25:1-7; 39:5; Jer. 52:7-11.]'
  '14':
  - type: text
    content: ' And I will scatter toward every wind all who are about him to help him, even all his bands; and I will draw out the sword after them.'
  '15':
  - type: text
    content: ' And they shall know (recognize, understand, and realize) that I am the Lord, when I shall scatter them among the nations and disperse them in the countries.'
  '16':
  - type: text
    content: ' But I will leave a few survivors who will escape the sword, the famine, and the pestilence, that they may declare '
  - type: text
    content: and
  - type: text
    content: ' confess all their [idolatrous] abominations among the nations to which they go, and [thus God''s punishment of them will be justified before everyone and] they shall know (understand and realize) that I am the Lord.'
  '17':
  - type: text
    content: ' Moreover, the word of the Lord came to me, saying,'
  '18':
  - type: text
    content: ' Son of man, eat your bread with shaking, and drink water with trembling and with fearfulness;'
  '19':
  - type: text
    content: ' And say to the people of the land, Thus says the Lord God concerning the inhabitants of Jerusalem in the land of Israel: They shall eat their bread with fearfulness and drink water with dismay, for their land will be stripped '
  - type: text
    content: and
  - type: text
    content: ' plundered of all its fullness, because of the violence of all those who dwell in it.'
  '2':
  - type: text
    content: ' Son of man, you dwell in the midst of the house of the rebellious, who have eyes to see and see not, who have ears to hear and hear not, for they are a rebellious house. [Mark 8:18.]'
  '20':
  - type: text
    content: ' And the cities that are inhabited shall be laid waste, and the land shall be deserted '
  - type: text
    content: and
  - type: text
    content: ' become a desolation; and you shall know (understand and realize) that I am the Lord.'
  '21':
  - type: text
    content: ' And the word of the Lord came to me, saying,'
  '22':
  - type: text
    content: ' Son of man, what is this proverb that you have in the land of Israel, saying, The days drag on and every vision comes to nothing '
  - type: text
    content: and
  - type: text
    content: ' is not fulfilled?'
  '23':
  - type: text
    content: ' Tell them therefore, Thus says the Lord God: I will put an end to this proverb, and they shall use it no more as a proverb in Israel. But say to them, The days are at hand and the fulfillment of every vision.'
  '24':
  - type: text
    content: ' For there shall be no more any false, empty, '
  - type: text
    content: and
  - type: text
    content: ' fruitless vision or flattering divination in the house of Israel.'
  '25':
  - type: text
    content: ' For I am the Lord; I will speak, and the word that I shall speak shall be performed (come to pass); it shall be no more delayed '
  - type: text
    content: or
  - type: text
    content: ' prolonged, for in your days, O rebellious house, I will speak the word and will perform it, says the Lord God.'
  '26':
  - type: text
    content: ' Again the word of the Lord came to me, saying,'
  '27':
  - type: text
    content: ' Son of man, behold, they of the house of Israel say, The vision that [Ezekiel] sees is for many days to come, and he prophesies of the times that are far off.'
  '28':
  - type: text
    content: ' Therefore say to them, Thus says the Lord God: There shall none of My words be deferred any more, but the word which I have spoken shall be performed, says the Lord God.'
  '3':
  - type: text
    content: ' Therefore, son of man, prepare your belongings for removing '
  - type: text
    content: and
  - type: text
    content: ' going into exile, and move out by day in their sight; and you shall remove from your place to another place in their sight. It may be they will consider '
  - type: text
    content: and
  - type: text
    content: ' perceive that they are a rebellious house.'
  '4':
  - type: text
    content: ' And you shall bring forth your baggage by day in their sight, as baggage for removing into exile; and you shall go forth yourself at evening in their sight, as those who go forth into exile.'
  '5':
  - type: text
    content: ' Dig through the wall in their sight and carry the stuff out through the hole.'
  '6':
  - type: text
    content: ' In their sight you shall bear your baggage upon your shoulder and carry it forth in the dark; you shall cover your face so that you cannot see the land, for I have set you as a sign for the house of Israel.'
  '7':
  - type: text
    content: ' And I did as I was commanded. I brought forth my baggage by day, as baggage for exile, and in the evening I dug through the wall with my own hands. I brought out my baggage in the dark, carrying it upon my shoulder in their sight.'
  '8':
  - type: text
    content: ' And in the morning came the word of the Lord to me, saying,'
  '9':
  - type: text
    content: ' Son of man, has not the house of Israel, the rebellious house, asked you what you are doing?'
