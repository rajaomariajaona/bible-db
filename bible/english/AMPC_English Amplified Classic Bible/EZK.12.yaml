document_id: EZK.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD of the Lord also came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, you dwell in the midst of the house of the rebellious, who have eyes to see and see not, who have ears to hear and hear not, for they are a rebellious house. [Mark 8:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Therefore, son of man, prepare your belongings for removing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' going into exile, and move out by day in their sight; and you shall remove from your place to another place in their sight. It may be they will consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perceive that they are a rebellious house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And you shall bring forth your baggage by day in their sight, as baggage for removing into exile; and you shall go forth yourself at evening in their sight, as those who go forth into exile.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Dig through the wall in their sight and carry the stuff out through the hole.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' In their sight you shall bear your baggage upon your shoulder and carry it forth in the dark; you shall cover your face so that you cannot see the land, for I have set you as a sign for the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I did as I was commanded. I brought forth my baggage by day, as baggage for exile, and in the evening I dug through the wall with my own hands. I brought out my baggage in the dark, carrying it upon my shoulder in their sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And in the morning came the word of the Lord to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Son of man, has not the house of Israel, the rebellious house, asked you what you are doing?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Say to them, Thus says the Lord God: This oracle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' revelation concerns the prince in Jerusalem and all the house of Israel who are in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Say, I am your sign; as I have done, so shall it be done to them; into banishment, into captivity, they shall go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the prince who is in their midst shall lift up his luggage to his shoulder in the dark; then shall he go forth. They shall dig through the wall to carry out through the hole in it. He shall cover his face so that he will not see with his eyes the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' My net also will I spread over him, and he shall be taken in My snare, and I will bring him to Babylonia, to the land of the Chaldeans; yet shall he not see it, though he shall die there. [II Kings 25:1-7; 39:5; Jer. 52:7-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And I will scatter toward every wind all who are about him to help him, even all his bands; and I will draw out the sword after them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And they shall know (recognize, understand, and realize) that I am the Lord, when I shall scatter them among the nations and disperse them in the countries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But I will leave a few survivors who will escape the sword, the famine, and the pestilence, that they may declare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confess all their [idolatrous] abominations among the nations to which they go, and [thus God''s punishment of them will be justified before everyone and] they shall know (understand and realize) that I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Moreover, the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Son of man, eat your bread with shaking, and drink water with trembling and with fearfulness;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And say to the people of the land, Thus says the Lord God concerning the inhabitants of Jerusalem in the land of Israel: They shall eat their bread with fearfulness and drink water with dismay, for their land will be stripped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plundered of all its fullness, because of the violence of all those who dwell in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the cities that are inhabited shall be laid waste, and the land shall be deserted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become a desolation; and you shall know (understand and realize) that I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Son of man, what is this proverb that you have in the land of Israel, saying, The days drag on and every vision comes to nothing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is not fulfilled?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Tell them therefore, Thus says the Lord God: I will put an end to this proverb, and they shall use it no more as a proverb in Israel. But say to them, The days are at hand and the fulfillment of every vision.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For there shall be no more any false, empty, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fruitless vision or flattering divination in the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For I am the Lord; I will speak, and the word that I shall speak shall be performed (come to pass); it shall be no more delayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' prolonged, for in your days, O rebellious house, I will speak the word and will perform it, says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Again the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Son of man, behold, they of the house of Israel say, The vision that [Ezekiel] sees is for many days to come, and he prophesies of the times that are far off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Therefore say to them, Thus says the Lord God: There shall none of My words be deferred any more, but the word which I have spoken shall be performed, says the Lord God.'
