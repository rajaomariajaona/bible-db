document_id: 1CO.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AM I not an apostle (a special messenger)? Am I not free (unrestrained and exempt from any obligation)? Have I not seen Jesus our Lord? Are you [yourselves] not [the product and proof of] my workmanship in the Lord?'
  '10':
  - type: text
    content: ' Or does He speak certainly '
  - type: text
    content: and
  - type: text
    content: ' entirely for our sakes? [Assuredly] it is written for our sakes, because the plowman ought to plow in hope, and the thresher ought to thresh in expectation of partaking of the harvest.'
  '11':
  - type: text
    content: ' If we have sown [the seed of] spiritual good among you, [is it too] much if we reap from your material benefits?'
  '12':
  - type: text
    content: ' If others share in this rightful claim upon you, do not we [have a still better and greater claim]? However, we have never exercised this right, but we endure everything rather than put a hindrance in the way [of the spread] of the good news (the Gospel) of Christ.'
  '13':
  - type: text
    content: ' Do you not know that those men who are employed in the services of the temple get their food from the temple? And that those who tend the altar share with the altar [in the offerings brought]? [Deut. 18:1.]'
  '14':
  - type: text
    content: ' [On the same principle] the Lord directed that those who publish the good news (the Gospel) should live (get their maintenance) by the Gospel.'
  '15':
  - type: text
    content: ' But I have not made use of any of these privileges, nor am I writing this [to suggest] that any such provision be made for me [now]. For it would be better for me to die than to have anyone make void '
  - type: text
    content: and
  - type: text
    content: ' deprive me of my [ground for] glorifying [in this matter].'
  '16':
  - type: text
    content: ' For if I [merely] preach the Gospel, that gives me no reason to boast, for I feel compelled of necessity to do it. Woe is me if I do not preach the glad tidings (the Gospel)!'
  '17':
  - type: text
    content: ' For if I do this work of my own free will, then I have my pay (my reward); but if it is not of my own will, but is done reluctantly '
  - type: text
    content: and
  - type: text
    content: ' under compulsion, I am [still] entrusted with a [sacred] trusteeship '
  - type: text
    content: and
  - type: text
    content: ' commission.'
  '18':
  - type: text
    content: ' What then is the [actual] reward that I get? Just this: that in my preaching the good news (the Gospel), I may offer it [absolutely] free of expense [to anybody], not taking advantage of my rights '
  - type: text
    content: and
  - type: text
    content: ' privileges [as a preacher] of the Gospel.'
  '19':
  - type: text
    content: ' For although I am free in every way from anyone''s control, I have made myself a bond servant to everyone, so that I might gain the more [for Christ].'
  '2':
  - type: text
    content: ' Even if I am not considered an apostle (a special messenger) by others, at least I am one to you; for you are the seal (the certificate, the living evidence) of my apostleship in the Lord [confirming and authenticating it].'
  '20':
  - type: text
    content: ' To the Jews I became as a Jew, that I might win Jews; to men under the Law, [I became] as one under the Law, though not myself being under the Law, that I might win those under the Law.'
  '21':
  - type: text
    content: ' To those without (outside) law I became as one without law, not that I am without the law of God '
  - type: text
    content: and
  - type: text
    content: ' lawless toward Him, but that I am [especially keeping] within '
  - type: text
    content: and
  - type: text
    content: ' committed to the law of Christ, that I might win those who are without law.'
  '22':
  - type: text
    content: ' To the weak (wanting in discernment) I have become weak (wanting in discernment) that I might win the weak '
  - type: text
    content: and
  - type: text
    content: ' overscrupulous. I have [in short] become all things to all men, that I might by all means (at all costs and in any and every way) save some [by winning them to faith in Jesus Christ].'
  '23':
  - type: text
    content: ' And I do this for the sake of the good news (the Gospel), in order that I may become a participator in it '
  - type: text
    content: and
  - type: text
    content: ' share in its [blessings along with you].'
  '24':
  - type: text
    content: ' Do you not know that in a race all the runners compete, but [only] one receives the prize? So run [your race] that you may lay hold [of the prize] '
  - type: text
    content: and
  - type: text
    content: ' make it yours.'
  '25':
  - type: text
    content: ' Now every athlete who goes into training conducts himself temperately '
  - type: text
    content: and
  - type: text
    content: ' restricts himself in all things. They do it to win a wreath that will soon wither, but we [do it to receive a crown of eternal blessedness] that cannot wither.'
  '26':
  - type: text
    content: ' Therefore I do not run uncertainly (without definite aim). I do not box like one beating the air '
  - type: text
    content: and
  - type: text
    content: ' striking without an adversary.'
  '27':
  - type: text
    content: ' But [like a boxer] I buffet my body [handle it roughly, discipline it by hardships] and subdue it, for fear that after proclaiming to others the Gospel '
  - type: text
    content: and
  - type: text
    content: ' things pertaining to it, I myself should become unfit [not stand the test, be unapproved and rejected as a counterfeit].'
  '3':
  - type: text
    content: ' This is my [real ground of] defense (my vindication of myself) to those who would put me on trial '
  - type: text
    content: and
  - type: text
    content: ' cross-examine me.'
  '4':
  - type: text
    content: ' Have we not the right to our food and drink [at the expense of the churches]?'
  '5':
  - type: text
    content: ' Have we not the right also to take along with us a Christian sister as wife, as do the other apostles and the Lord''s brothers and Cephas (Peter)?'
  '6':
  - type: text
    content: ' Or is it only Barnabas and I who have no right to refrain from doing manual labor for a livelihood [in order to go about the work of the ministry]?'
  '7':
  - type: text
    content: ' [Consider this:] What soldier at any time serves at his own expense? Who plants a vineyard and does not eat any of the fruit of it? Who tends a flock and does not partake of the milk of the flock?'
  '8':
  - type: text
    content: ' Do I say this only on human authority '
  - type: text
    content: and
  - type: text
    content: ' as a man reasons? Does not the Law endorse the same principle?'
  '9':
  - type: text
    content: ' For in the Law of Moses it is written, You shall not muzzle an ox when it is treading out the corn. Is it [only] for oxen that God cares? [Deut. 25:4.]'
