document_id: 2TH.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' BUT RELATIVE to the coming of our Lord Jesus Christ (the Messiah) and our gathering together to [meet] Him, we beg you, brethren,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And by unlimited seduction to evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with all wicked deception for those who are perishing (going to perdition) because they did not welcome the Truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' refused to love it that they might be saved.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore God sends upon them a misleading influence, a working of error '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a strong delusion to make them believe what is false,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In order that all may be judged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemned who did not believe in [who refused to adhere to, trust in, and rely on] the Truth, but [instead] took pleasure in unrighteousness.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But we, brethren beloved by the Lord, ought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are obligated [as those who are in debt] to give thanks always to God for you, because God chose you from the beginning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as His firstfruits (first converts)
    - type: text
      text: ' for salvation through the sanctifying work of the [Holy] Spirit and [your] belief in (adherence to, trust in, and reliance on) the Truth.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [It was] to this end that He called you through our Gospel, so that you may obtain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' share in the glory of our Lord Jesus Christ (the Messiah).'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So then, brethren, stand firm and hold fast to the traditions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instructions which you were taught by us, whether by our word of mouth or by letter.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now may our Lord Jesus Christ Himself and God our Father, Who loved us and gave us everlasting consolation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouragement and well-founded hope through [His] grace (unmerited favor),'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Comfort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourage your hearts and strengthen them [make them steadfast and keep them unswerving] in every good work and word.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Not to allow your minds to be quickly unsettled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' disturbed or kept excited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' alarmed, whether it be by some [pretended] revelation of [the] Spirit or by word or by letter [alleged to be] from us, to the effect that the day of the Lord has [already] arrived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is here.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let no one deceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' beguile you in any way, for that day will not come except the apostasy comes first [unless the predicted great falling away of those who have professed to be Christians has come], and the man of lawlessness (sin) is revealed, who is the son of doom (of perdition), [Dan. 7:25; 8:25; I Tim. 4:1.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who opposes and exalts himself so proudly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insolently against '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' over all that is called God or that is worshiped, [even to his actually] taking his seat in the temple of God, proclaiming that he himself is God. [Ezek. 28:2; Dan. 11:36, 37.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do you not recollect that when I was still with you, I told you these things?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And now you know what is restraining him [from being revealed at this time]; it is so that he may be manifested (revealed) in his own [appointed] time.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the mystery of lawlessness (that hidden principle of rebellion against constituted authority) is already at work in the world, [but it is] restrained only until he who restrains is taken out of the way.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And then the lawless one (the antichrist) will be revealed and the Lord Jesus will slay him with the breath of His mouth and bring him to an end by His appearing at His coming. [Isa. 11:4.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The coming [of the lawless one, the antichrist] is through the activity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' working of Satan and will be attended by great power and with all sorts of [pretended] miracles and signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delusive marvels–[all of them] lying wonders–'
