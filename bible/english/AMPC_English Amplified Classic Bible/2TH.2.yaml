document_id: 2TH.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BUT RELATIVE to the coming of our Lord Jesus Christ (the Messiah) and our gathering together to [meet] Him, we beg you, brethren,'
  '10':
  - type: text
    content: ' And by unlimited seduction to evil '
  - type: text
    content: and
  - type: text
    content: ' with all wicked deception for those who are perishing (going to perdition) because they did not welcome the Truth '
  - type: text
    content: but
  - type: text
    content: ' refused to love it that they might be saved.'
  '11':
  - type: text
    content: ' Therefore God sends upon them a misleading influence, a working of error '
  - type: text
    content: and
  - type: text
    content: ' a strong delusion to make them believe what is false,'
  '12':
  - type: text
    content: ' In order that all may be judged '
  - type: text
    content: and
  - type: text
    content: ' condemned who did not believe in [who refused to adhere to, trust in, and rely on] the Truth, but [instead] took pleasure in unrighteousness.'
  '13':
  - type: text
    content: ' But we, brethren beloved by the Lord, ought '
  - type: text
    content: and
  - type: text
    content: ' are obligated [as those who are in debt] to give thanks always to God for you, because God chose you from the beginning '
  - type: text
    content: as His firstfruits (first converts)
  - type: text
    content: ' for salvation through the sanctifying work of the [Holy] Spirit and [your] belief in (adherence to, trust in, and reliance on) the Truth.'
  '14':
  - type: text
    content: ' [It was] to this end that He called you through our Gospel, so that you may obtain '
  - type: text
    content: and
  - type: text
    content: ' share in the glory of our Lord Jesus Christ (the Messiah).'
  '15':
  - type: text
    content: ' So then, brethren, stand firm and hold fast to the traditions '
  - type: text
    content: and
  - type: text
    content: ' instructions which you were taught by us, whether by our word of mouth or by letter.'
  '16':
  - type: text
    content: ' Now may our Lord Jesus Christ Himself and God our Father, Who loved us and gave us everlasting consolation '
  - type: text
    content: and
  - type: text
    content: ' encouragement and well-founded hope through [His] grace (unmerited favor),'
  '17':
  - type: text
    content: ' Comfort '
  - type: text
    content: and
  - type: text
    content: ' encourage your hearts and strengthen them [make them steadfast and keep them unswerving] in every good work and word.'
  '2':
  - type: text
    content: ' Not to allow your minds to be quickly unsettled '
  - type: text
    content: or
  - type: text
    content: ' disturbed or kept excited '
  - type: text
    content: or
  - type: text
    content: ' alarmed, whether it be by some [pretended] revelation of [the] Spirit or by word or by letter [alleged to be] from us, to the effect that the day of the Lord has [already] arrived '
  - type: text
    content: and
  - type: text
    content: ' is here.'
  '3':
  - type: text
    content: ' Let no one deceive '
  - type: text
    content: or
  - type: text
    content: ' beguile you in any way, for that day will not come except the apostasy comes first [unless the predicted great falling away of those who have professed to be Christians has come], and the man of lawlessness (sin) is revealed, who is the son of doom (of perdition), [Dan. 7:25; 8:25; I Tim. 4:1.]'
  '4':
  - type: text
    content: ' Who opposes and exalts himself so proudly '
  - type: text
    content: and
  - type: text
    content: ' insolently against '
  - type: text
    content: and
  - type: text
    content: ' over all that is called God or that is worshiped, [even to his actually] taking his seat in the temple of God, proclaiming that he himself is God. [Ezek. 28:2; Dan. 11:36, 37.]'
  '5':
  - type: text
    content: ' Do you not recollect that when I was still with you, I told you these things?'
  '6':
  - type: text
    content: ' And now you know what is restraining him [from being revealed at this time]; it is so that he may be manifested (revealed) in his own [appointed] time.'
  '7':
  - type: text
    content: ' For the mystery of lawlessness (that hidden principle of rebellion against constituted authority) is already at work in the world, [but it is] restrained only until he who restrains is taken out of the way.'
  '8':
  - type: text
    content: ' And then the lawless one (the antichrist) will be revealed and the Lord Jesus will slay him with the breath of His mouth and bring him to an end by His appearing at His coming. [Isa. 11:4.]'
  '9':
  - type: text
    content: ' The coming [of the lawless one, the antichrist] is through the activity '
  - type: text
    content: and
  - type: text
    content: ' working of Satan and will be attended by great power and with all sorts of [pretended] miracles and signs '
  - type: text
    content: and
  - type: text
    content: ' delusive marvels–[all of them] lying wonders–'
