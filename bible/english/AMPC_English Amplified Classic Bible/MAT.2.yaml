document_id: MAT.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW WHEN Jesus was born in Bethlehem of Judea in the days of Herod the king, behold, wise men [astrologers] from the east came to Jerusalem, asking,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Where is He Who has been born King of the Jews? For we have seen His star in the east at its rising and have come to worship Him. [Num. 24:17; Jer. 23:5; Zech. 9:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When Herod the king heard this, he was disturbed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled, and the whole of Jerusalem with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So he called together all the chief priests and learned men (scribes) of the people and anxiously asked them where the Christ was to be born.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They replied to him, In Bethlehem of Judea, for so it is written by the prophet:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And you Bethlehem, in the land of Judah, you are not in any way least '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' insignificant among the chief cities of Judah; for from you shall come a Ruler (Leader) Who will govern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shepherd My people Israel. [Mic. 5:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then Herod sent for the wise men [astrologers] secretly, and accurately to the last point ascertained from them the time of the appearing of the star [that is, how long the star had made itself visible since its rising in the east].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then he sent them to Bethlehem, saying, Go and search for the Child carefully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' diligently, and when you have found Him, bring me word, that I too may come and worship Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' When they had listened to the king, they went their way, and behold, the star which had been seen in the east in its rising went before them until it came and stood over the place where the young Child was.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When they saw the star, they were thrilled with ecstatic joy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And on going into the house, they saw the Child with Mary His mother, and they fell down and worshiped Him. Then opening their treasure bags, they presented to Him gifts–gold and frankincense and myrrh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And receiving an answer to their asking, they were divinely instructed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warned in a dream not to go back to Herod; so they departed to their own country by a different way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Now after they had gone, behold, an angel of the Lord appeared to Joseph in a dream and said, Get up! [Tenderly] take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: unto you
  - type: text
    text: ' the young Child and His mother and flee to Egypt; and remain there till I tell you [otherwise], for Herod intends to search for the Child in order to destroy Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And having risen, he took the Child and His mother by night and withdrew to Egypt'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And remained there until Herod''s death. This was to fulfill what the Lord had spoken by the prophet, Out of Egypt have I called My Son. [Hos. 11:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then Herod, when he realized that he had been misled by the wise men, was furiously enraged, and he sent and put to death all the male children in Bethlehem and in all that territory who were two years old and under, reckoning according to the date which he had investigated diligently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' had learned exactly from the wise men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then was fulfilled what was spoken by the prophet Jeremiah:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' A voice was heard in Ramah, wailing and loud lamentation, Rachel weeping for her children; she refused to be comforted, because they were no more. [Jer. 31:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But when Herod died, behold, an angel of the Lord appeared in a dream to Joseph in Egypt'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And said, Rise, [tenderly] take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: unto you
  - type: text
    text: ' the Child and His mother and go to the land of Israel, for those who sought the Child''s life are dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then he awoke and arose and [tenderly] took the Child and His mother and came into the land of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But because he heard that Archelaus was ruling over Judea in the place of his father Herod, he was afraid to go there. And being divinely warned in a dream, he withdrew to the region of Galilee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He went and dwelt in a town called Nazareth, so that what was spoken through the prophets might be fulfilled: He shall be called a Nazarene [Branch, Separated One]. [Isa. 11:1.]'
