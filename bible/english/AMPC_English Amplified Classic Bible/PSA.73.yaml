document_id: PSA.73
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Psalm of Asaph.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' TRULY GOD is [only] good to Israel, even to those who are upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pure in heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But as for me, my feet were almost gone, my steps had well-nigh slipped.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For I was envious of the foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant when I saw the prosperity of the wicked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For they suffer no violent pangs in their death, but their strength is firm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They are not in trouble as other men; neither are they smitten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plagued like other men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore pride is about their necks like a chain; violence covers them like a garment [like a long, luxurious robe].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Their eyes stand out with fatness, they have more than heart could wish; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the imaginations of their minds overflow [with follies].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They scoff, and wickedly utter oppression; they speak loftily [from on high, maliciously and blasphemously].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' They set their mouths against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' speak down from heaven, and their tongues swagger through the earth [invading even heaven with blasphemy and smearing earth with slanders]. [Rev. 13:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Therefore His people return here, and waters of a full cup [offered by the wicked] are [blindly] drained by them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And they say, How does God know? Is there knowledge in the Most High?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Behold, these are the ungodly, who always prosper '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are at ease in the world; they increase in riches.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Surely then in vain have I cleansed my heart and washed my hands in innocency.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For all the day long have I been smitten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plagued, and chastened every morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Had I spoken thus [and given expression to my feelings], I would have been untrue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have dealt treacherously against the generation of Your children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But when I considered how to understand this, it was too great an effort for me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' too painful'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Until I went into the sanctuary of God; then I understood [for I considered] their end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' [After all] You do set the [wicked] in slippery places; You cast them down to ruin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' How they become a desolation in a moment! They are utterly consumed with terrors!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' As a dream [which seems real] until one awakens, so, O Lord, when You arouse Yourself [to take note of the wicked], You will despise their outward show.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For my heart was grieved, embittered, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in a state of ferment, and I was pricked in my heart [as with the sharp fang of an adder].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' So foolish, stupid, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brutish was I, and ignorant; I was like a beast before You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Nevertheless I am continually with You; You do hold my right hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' You will guide me with Your counsel, and afterward receive me to honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Whom have I in heaven but You? And I have no delight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' desire on earth besides You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' My flesh and my heart may fail, but God is the Rock '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' firm Strength of my heart and my Portion forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For behold, those who are far from You shall perish; You will destroy all who are false to You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' like [spiritual] harlots depart from You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But it is good for me to draw near to God; I have put my trust in the Lord God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made Him my refuge, that I may tell of all Your works.'
