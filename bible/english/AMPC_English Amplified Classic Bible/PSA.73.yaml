document_id: PSA.73,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of Asaph.
  - type: text
    content: ' TRULY GOD is [only] good to Israel, even to those who are upright '
  - type: text
    content: and
  - type: text
    content: ' pure in heart.'
  '10':
  - type: text
    content: ' Therefore His people return here, and waters of a full cup [offered by the wicked] are [blindly] drained by them.'
  '11':
  - type: text
    content: ' And they say, How does God know? Is there knowledge in the Most High?'
  '12':
  - type: text
    content: ' Behold, these are the ungodly, who always prosper '
  - type: text
    content: and
  - type: text
    content: ' are at ease in the world; they increase in riches.'
  '13':
  - type: text
    content: ' Surely then in vain have I cleansed my heart and washed my hands in innocency.'
  '14':
  - type: text
    content: ' For all the day long have I been smitten '
  - type: text
    content: and
  - type: text
    content: ' plagued, and chastened every morning.'
  '15':
  - type: text
    content: ' Had I spoken thus [and given expression to my feelings], I would have been untrue '
  - type: text
    content: and
  - type: text
    content: ' have dealt treacherously against the generation of Your children.'
  '16':
  - type: text
    content: ' But when I considered how to understand this, it was too great an effort for me '
  - type: text
    content: and
  - type: text
    content: ' too painful'
  '17':
  - type: text
    content: ' Until I went into the sanctuary of God; then I understood [for I considered] their end.'
  '18':
  - type: text
    content: ' [After all] You do set the [wicked] in slippery places; You cast them down to ruin '
  - type: text
    content: and
  - type: text
    content: ' destruction.'
  '19':
  - type: text
    content: ' How they become a desolation in a moment! They are utterly consumed with terrors!'
  '2':
  - type: text
    content: ' But as for me, my feet were almost gone, my steps had well-nigh slipped.'
  '20':
  - type: text
    content: ' As a dream [which seems real] until one awakens, so, O Lord, when You arouse Yourself [to take note of the wicked], You will despise their outward show.'
  '21':
  - type: text
    content: ' For my heart was grieved, embittered, '
  - type: text
    content: and
  - type: text
    content: ' in a state of ferment, and I was pricked in my heart [as with the sharp fang of an adder].'
  '22':
  - type: text
    content: ' So foolish, stupid, '
  - type: text
    content: and
  - type: text
    content: ' brutish was I, and ignorant; I was like a beast before You.'
  '23':
  - type: text
    content: ' Nevertheless I am continually with You; You do hold my right hand.'
  '24':
  - type: text
    content: ' You will guide me with Your counsel, and afterward receive me to honor '
  - type: text
    content: and
  - type: text
    content: ' glory.'
  '25':
  - type: text
    content: ' Whom have I in heaven but You? And I have no delight '
  - type: text
    content: or
  - type: text
    content: ' desire on earth besides You.'
  '26':
  - type: text
    content: ' My flesh and my heart may fail, but God is the Rock '
  - type: text
    content: and
  - type: text
    content: ' firm Strength of my heart and my Portion forever.'
  '27':
  - type: text
    content: ' For behold, those who are far from You shall perish; You will destroy all who are false to You '
  - type: text
    content: and
  - type: text
    content: ' like [spiritual] harlots depart from You.'
  '28':
  - type: text
    content: ' But it is good for me to draw near to God; I have put my trust in the Lord God '
  - type: text
    content: and
  - type: text
    content: ' made Him my refuge, that I may tell of all Your works.'
  '3':
  - type: text
    content: ' For I was envious of the foolish '
  - type: text
    content: and
  - type: text
    content: ' arrogant when I saw the prosperity of the wicked.'
  '4':
  - type: text
    content: ' For they suffer no violent pangs in their death, but their strength is firm.'
  '5':
  - type: text
    content: ' They are not in trouble as other men; neither are they smitten '
  - type: text
    content: and
  - type: text
    content: ' plagued like other men.'
  '6':
  - type: text
    content: ' Therefore pride is about their necks like a chain; violence covers them like a garment [like a long, luxurious robe].'
  '7':
  - type: text
    content: ' Their eyes stand out with fatness, they have more than heart could wish; '
  - type: text
    content: and
  - type: text
    content: ' the imaginations of their minds overflow [with follies].'
  '8':
  - type: text
    content: ' They scoff, and wickedly utter oppression; they speak loftily [from on high, maliciously and blasphemously].'
  '9':
  - type: text
    content: ' They set their mouths against '
  - type: text
    content: and
  - type: text
    content: ' speak down from heaven, and their tongues swagger through the earth [invading even heaven with blasphemy and smearing earth with slanders]. [Rev. 13:6.]'
