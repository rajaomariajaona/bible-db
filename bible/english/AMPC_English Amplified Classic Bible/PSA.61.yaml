document_id: PSA.61,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; on stringed instruments. +[A Psalm+] of David.
  - type: text
    content: ' HEAR MY cry, O God; listen to my prayer.'
  '2':
  - type: text
    content: ' From the end of the earth will I cry to You, when my heart is overwhelmed '
  - type: text
    content: and
  - type: text
    content: ' fainting; lead me to the rock that is higher than I [yes, a rock that is too high for me].'
  '3':
  - type: text
    content: ' For You have been a shelter '
  - type: text
    content: and
  - type: text
    content: ' a refuge for me, a strong tower against the adversary.'
  '4':
  - type: text
    content: ' I will dwell in Your tabernacle forever; let me find refuge '
  - type: text
    content: and
  - type: text
    content: ' trust in the shelter of Your wings. Selah [pause, and calmly think of that]!'
  '5':
  - type: text
    content: ' For You, O God, have heard my vows; You have given me the heritage of those who fear, revere, '
  - type: text
    content: and
  - type: text
    content: ' honor Your name.'
  '6':
  - type: text
    content: ' May You prolong the [true] King''s life [adding days upon days], and may His years be to the last generation [of this world and the generations of the world to come].'
  '7':
  - type: text
    content: ' May He sit enthroned forever before [the face of] God; O ordain that loving-kindness and faithfulness may watch over Him!'
  '8':
  - type: text
    content: ' So will I sing praise to Your name forever, paying my vows day by day.'
