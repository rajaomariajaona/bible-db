document_id: PSA.61,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; on stringed instruments. +[A Psalm+] of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' HEAR MY cry, O God; listen to my prayer.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' From the end of the earth will I cry to You, when my heart is overwhelmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fainting; lead me to the rock that is higher than I [yes, a rock that is too high for me].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For You have been a shelter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a refuge for me, a strong tower against the adversary.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' I will dwell in Your tabernacle forever; let me find refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trust in the shelter of Your wings. Selah [pause, and calmly think of that]!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For You, O God, have heard my vows; You have given me the heritage of those who fear, revere, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor Your name.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' May You prolong the [true] King''s life [adding days upon days], and may His years be to the last generation [of this world and the generations of the world to come].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' May He sit enthroned forever before [the face of] God; O ordain that loving-kindness and faithfulness may watch over Him!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' So will I sing praise to Your name forever, paying my vows day by day.'
