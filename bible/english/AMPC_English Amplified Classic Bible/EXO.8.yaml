document_id: EXO.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN THE Lord said to Moses, Go to Pharaoh and say to him, Thus says the Lord, Let My people go, that they may serve Me.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And [Pharaoh] said, Tomorrow. [Moses] said, Let it be as you say, that you may know that there is no one like the Lord our God.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And the frogs shall depart from you and your houses and from your servants and your people; they shall remain in the river only.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So Moses and Aaron went out from Pharaoh, and Moses cried to the Lord [as he had agreed with Pharaoh] concerning the frogs which He had brought against him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And the Lord did according to the word of Moses, and the frogs died out of the houses, out of the courtyards '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' villages, and out of the fields.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' [The people] gathered them together in heaps, and the land was loathsome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stank.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But when Pharaoh saw that there was temporary relief, he made his heart stubborn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hard and would not listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' heed them, just as the Lord had said.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Then the Lord said to Moses, Say to Aaron, Stretch out your rod and strike the dust of the ground, that it may become biting gnats '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' mosquitoes throughout all the land of Egypt.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And they did so; Aaron stretched out his hand with his rod and struck the dust of the earth, and there came biting gnats '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' mosquitoes on man and beast; all the dust of the land became biting gnats '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' mosquitoes throughout all the land of Egypt.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' The magicians tried by their enchantments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secret arts to bring forth gnats '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' mosquitoes, but they could not; and there were gnats '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' mosquitoes on man and beast.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Then the magicians said to Pharaoh, This is the finger of God! But Pharaoh''s heart was hardened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strong and he would not listen to them, just as the Lord had said.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And if you refuse to let them go, behold, I will smite your entire land with frogs;'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Then the Lord said to Moses, Rise up early in the morning and stand before Pharaoh as he comes forth to the water; and say to him, Thus says the Lord, Let My people go, that they may serve Me.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Else, if you will not let My people go, behold, I will send swarms [of bloodsucking gadflies] upon you, your servants, and your people, and into your houses; and the houses of the Egyptians shall be full of swarms [of bloodsucking gadflies], and also the ground on which they stand.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But on that day I will sever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set apart the land of Goshen in which My people dwell, that no swarms [of gadflies] shall be there, so that you may know that I am the Lord in the midst of the earth.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And I will put a division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a sign of deliverance between My people and your people. By tomorrow shall this sign be in evidence.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And the Lord did so; and there came heavy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppressive swarms [of bloodsucking gadflies] into the house of Pharaoh and his servants'' houses; and in all of Egypt the land was corrupted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruined by reason of the great invasion [of gadflies].'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And Pharaoh called for Moses and Aaron, and said, Go, sacrifice to your God [here] in the land [of Egypt].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And Moses said, It is not suitable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' right to do that; for the animals the Egyptians hold sacred and will not permit to be slain are those which we are accustomed to sacrifice to the Lord our God; if we did this before the eyes of the Egyptians, would they not stone us?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' We will go a three days'' journey into the wilderness and sacrifice to the Lord our God, as He will command us.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' So Pharaoh said, I will let you go, that you may sacrifice to the Lord your God in the wilderness; only you shall not go very far away. Entreat [your God] for me.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Moses said, I go out from you, and I will entreat the Lord that the swarms [of bloodsucking gadflies] may depart from Pharaoh, his servants, and his people tomorrow; only let not Pharaoh deal deceitfully any more in not letting the people go to sacrifice to the Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And the river shall swarm with frogs which shall go up and come into your house, into your bedchamber and on your bed, and into the houses of your servants and upon your people, and into your ovens, your kneading bowls, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your dough.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' So Moses went out from Pharaoh and entreated the Lord.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And the Lord did as Moses had spoken: He removed the swarms [of attacking gadflies] from Pharaoh, from his servants, and his people; there remained not one.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' But Pharaoh hardened his heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made it stubborn this time also, nor would he let the people go.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And the frogs shall come up on you and on your people and all your servants.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And the Lord said to Moses, Say to Aaron, Stretch out your hand with your rod over the rivers, the streams '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' canals, and over the pools, and cause frogs to come up on the land of Egypt.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' So Aaron stretched out his hand over the waters of Egypt, and the frogs came up and covered the land.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But the magicians did the same thing with their enchantments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secret arts, and brought up [more] frogs upon the land of Egypt.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then Pharaoh called for Moses and Aaron, and said, Entreat the Lord, that He may take away the frogs from me and my people; and I will let the people go that they may sacrifice to the Lord.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Moses said to Pharaoh, Glory over me in this: dictate when I shall pray [to the Lord] for you, your servants, and your people, that the frogs may be destroyed from you and your houses and remain only in the river.'
