document_id: 2CO.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW ABOUT the offering that is [to be made] for the saints (God''s people in Jerusalem), it is quite superfluous that I should write you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For I am well acquainted with your willingness (your readiness and your eagerness to promote it) and I have proudly told about you to the people of Macedonia, saying that Achaia (most of Greece) has been prepared since last year for this contribution; and [consequently] your enthusiasm has stimulated the majority of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Still, I am sending the brethren [on to you], lest our pride in you should be made an empty boast in this particular case, and so that you may be all ready, as I told them you would be;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Lest, if [any] Macedonians should come with me and find you unprepared [for this generosity], we, to say nothing of yourselves, be humiliated for our being so confident.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' That is why I thought it necessary to urge these brethren to go to you before I do and make arrangements in advance for this bountiful, promised gift of yours, so that it may be ready, not as an extortion [wrung out of you] but as a generous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' willing gift.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [Remember] this: he who sows sparingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grudgingly will also reap sparingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grudgingly, and he who sows generously [that blessings may come to someone] will also reap generously '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with blessings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Let each one [give] as he has made up his own mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purposed in his heart, not reluctantly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sorrowfully or under compulsion, for God loves (He takes pleasure in, prizes above other things, and is unwilling to abandon or to do without) a cheerful (joyous, "prompt to do it") giver [whose heart is in his giving]. [Prov. 22:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And God is able to make all grace (every favor and earthly blessing) come to you in abundance, so that you may always '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' under all circumstances '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' whatever the need be self-sufficient [possessing enough to require no aid or support and furnished in abundance for every good work and charitable donation].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' As it is written, He [the benevolent person] scatters abroad; He gives to the poor; His deeds of justice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' benevolence will go on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure forever! [Ps. 112:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And [God] Who provides seed for the sower and bread for eating will also provide and multiply your [resources for] sowing and increase the fruits of your righteousness [which manifests itself in active goodness, kindness, and charity]. [Isa. 55:10; Hos. 10:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Thus you will be enriched in all things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in every way, so that you can be generous, and [your generosity as it is] administered by us will bring forth thanksgiving to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For the service that the ministering of this fund renders does not only fully supply what is lacking to the saints (God''s people), but it also overflows in many [cries of] thanksgiving to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Because at [your] standing of the test of this ministry, they will glorify God for your loyalty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obedience to the Gospel of Christ which you confess, as well as for your generous-hearted liberality to them and to all [the other needy ones].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And they yearn for you while they pray for you, because of the surpassing measure of God''s grace (His favor and mercy and spiritual blessing which is shown forth) in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now thanks be to God for His Gift, [precious] beyond telling [His indescribable, inexpressible, free Gift]!'
