document_id: 2CO.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW ABOUT the offering that is [to be made] for the saints (God''s people in Jerusalem), it is quite superfluous that I should write you;'
  '10':
  - type: text
    content: ' And [God] Who provides seed for the sower and bread for eating will also provide and multiply your [resources for] sowing and increase the fruits of your righteousness [which manifests itself in active goodness, kindness, and charity]. [Isa. 55:10; Hos. 10:12.]'
  '11':
  - type: text
    content: ' Thus you will be enriched in all things '
  - type: text
    content: and
  - type: text
    content: ' in every way, so that you can be generous, and [your generosity as it is] administered by us will bring forth thanksgiving to God.'
  '12':
  - type: text
    content: ' For the service that the ministering of this fund renders does not only fully supply what is lacking to the saints (God''s people), but it also overflows in many [cries of] thanksgiving to God.'
  '13':
  - type: text
    content: ' Because at [your] standing of the test of this ministry, they will glorify God for your loyalty '
  - type: text
    content: and
  - type: text
    content: ' obedience to the Gospel of Christ which you confess, as well as for your generous-hearted liberality to them and to all [the other needy ones].'
  '14':
  - type: text
    content: ' And they yearn for you while they pray for you, because of the surpassing measure of God''s grace (His favor and mercy and spiritual blessing which is shown forth) in you.'
  '15':
  - type: text
    content: ' Now thanks be to God for His Gift, [precious] beyond telling [His indescribable, inexpressible, free Gift]!'
  '2':
  - type: text
    content: ' For I am well acquainted with your willingness (your readiness and your eagerness to promote it) and I have proudly told about you to the people of Macedonia, saying that Achaia (most of Greece) has been prepared since last year for this contribution; and [consequently] your enthusiasm has stimulated the majority of them.'
  '3':
  - type: text
    content: ' Still, I am sending the brethren [on to you], lest our pride in you should be made an empty boast in this particular case, and so that you may be all ready, as I told them you would be;'
  '4':
  - type: text
    content: ' Lest, if [any] Macedonians should come with me and find you unprepared [for this generosity], we, to say nothing of yourselves, be humiliated for our being so confident.'
  '5':
  - type: text
    content: ' That is why I thought it necessary to urge these brethren to go to you before I do and make arrangements in advance for this bountiful, promised gift of yours, so that it may be ready, not as an extortion [wrung out of you] but as a generous '
  - type: text
    content: and
  - type: text
    content: ' willing gift.'
  '6':
  - type: text
    content: ' [Remember] this: he who sows sparingly '
  - type: text
    content: and
  - type: text
    content: ' grudgingly will also reap sparingly '
  - type: text
    content: and
  - type: text
    content: ' grudgingly, and he who sows generously [that blessings may come to someone] will also reap generously '
  - type: text
    content: and
  - type: text
    content: ' with blessings.'
  '7':
  - type: text
    content: ' Let each one [give] as he has made up his own mind '
  - type: text
    content: and
  - type: text
    content: ' purposed in his heart, not reluctantly '
  - type: text
    content: or
  - type: text
    content: ' sorrowfully or under compulsion, for God loves (He takes pleasure in, prizes above other things, and is unwilling to abandon or to do without) a cheerful (joyous, "prompt to do it") giver [whose heart is in his giving]. [Prov. 22:9.]'
  '8':
  - type: text
    content: ' And God is able to make all grace (every favor and earthly blessing) come to you in abundance, so that you may always '
  - type: text
    content: and
  - type: text
    content: ' under all circumstances '
  - type: text
    content: and
  - type: text
    content: ' whatever the need be self-sufficient [possessing enough to require no aid or support and furnished in abundance for every good work and charitable donation].'
  '9':
  - type: text
    content: ' As it is written, He [the benevolent person] scatters abroad; He gives to the poor; His deeds of justice '
  - type: text
    content: and
  - type: text
    content: ' goodness '
  - type: text
    content: and
  - type: text
    content: ' kindness '
  - type: text
    content: and
  - type: text
    content: ' benevolence will go on '
  - type: text
    content: and
  - type: text
    content: ' endure forever! [Ps. 112:9.]'
