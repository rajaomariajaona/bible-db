document_id: JDG.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT SOME days later, in the time of wheat harvest, Samson went to visit his wife, taking along a kid [as a token of reconciliation]; and he said, I will go unto my wife in the inner chamber. But her father would not allow him to go in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And her father said, I truly thought you utterly hated her, so I gave her to your companion. Is her younger sister not fairer than she? Take her, I pray you, instead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Samson said of them, This time shall I be blameless as regards the Philistines, though I do them evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So Samson went and caught 300 foxes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' jackals and took torches and turning the foxes tail to tail, he put a torch between each pair of tails.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And when he had set the torches ablaze, he let the foxes go into the standing grain of the Philistines, and he burned up the shocks and the standing grain, along with the olive orchards.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then the Philistines said, Who has done this? And they were told, Samson, the son-in-law of the Timnite, because he [the Timnite] has taken his [Samson''s] wife and has given her to his companion. And the Philistines came up and burned her and her father with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Samson said to them, If this is the way you act, surely I will take revenge on you, and after that I will quit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And he smote them hip and thigh [unsparingly], a great slaughter; and he went down and dwelt in the cleft of the rock of Etam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then the Philistines came up and encamped in Judah and spread themselves in Lehi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the men of Judah said, Why have you come up against us? And they answered, We have come up to bind Samson, to do to him as he has done to us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then 3,000 men of Judah went down to the cleft of the rock Etam and said to Samson, Have you not known that the Philistines are rulers over us? What is this that you have done to us? He said to them, As they did to me, so have I done to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they said to him, We have come down to bind you, that we may deliver you into the hands of the Philistines. And Samson said to them, Swear to me that you will not fall upon me yourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they said to him, No, we will bind you fast and give you into their hand; but surely we will not kill you. So they bound him with two new ropes and brought him up from the rock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And when he came to Lehi, the Philistines came shouting to meet him. And the Spirit of the Lord came mightily upon [Samson], and the ropes on his arms became as flax that had caught fire, and his bonds melted off his hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And he found a still moist jawbone of a donkey and reached out and took it and slew 1,000 men with it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And Samson said, With the jawbone of a donkey, heaps upon heaps, with the jawbone of a donkey I have slain 1,000 men!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And when he stopped speaking, he cast the jawbone from his hand; and that place was called Ramath-lehi [the hill of the jawbone].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Samson was very thirsty, and he prayed to the Lord and said, You have given this great deliverance by the hand of Your servant, and now shall I die of thirst and fall into the hands of the uncircumcised?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And God split open the hollow place that was at Lehi, and water came out of it. And when he drank, his spirit returned and he revived. Therefore the name of it was called En-hakkore [the spring of him who prayed], which is at Lehi to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And [Samson] judged (defended) Israel in the days of the Philistines twenty years. [Judg. 17:6.]'
