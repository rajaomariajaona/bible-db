document_id: MAT.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' SEEING THE crowds, He went up on the mountain; and when He was seated, His disciples came to Him.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enviably fortunate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spiritually prosperous (in the state in which the born-again child of God enjoys and finds satisfaction in God''s favor and salvation, regardless of his outward conditions) are those who are persecuted for righteousness'' sake (for being and doing right), for theirs is the kingdom of heaven!'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed (happy, to be envied, and spiritually prosperous–with life-joy and satisfaction in God''s favor and salvation, regardless of your outward conditions) are you when people revile you and persecute you and say all kinds of evil things against you falsely on My account.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Be glad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' supremely joyful, for your reward in heaven is great (strong and intense), for in this same way people persecuted the prophets who were before you. [II Chron. 36:16.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You are the salt of the earth, but if salt has lost its taste (its strength, its quality), how can its saltness be restored? It is not good for anything any longer but to be thrown out and trodden underfoot by men.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You are the light of the world. A city set on a hill cannot be hidden.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nor do men light a lamp and put it under a peck measure, but on a lampstand, and it gives light to all in the house.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let your light so shine before men that they may see your moral excellence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your praiseworthy, noble, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good deeds and recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorify your Father Who is in heaven.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do not think that I have come to do away with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' undo the Law or the Prophets; I have come not to do away with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' undo but to complete '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fulfill them.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For truly I tell you, until the sky and earth pass away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perish, not one smallest letter nor one little hook [identifying certain Hebrew letters] will pass from the Law until all things [it foreshadows] are accomplished.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Whoever then breaks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' does away with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' relaxes one of the least [important] of these commandments and teaches men so shall be called least [important] in the kingdom of heaven, but he who practices them and teaches others to do so shall be called great in the kingdom of heaven.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He opened His mouth and taught them, saying:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For I tell you, unless your righteousness (your uprightness and your right standing with God) is more than that of the scribes and Pharisees, you will never enter the kingdom of heaven.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have heard that it was said to the men of old, You shall not kill, and whoever kills shall be liable to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unable to escape the punishment imposed by the court. [Exod. 20:13; Deut. 5:17; 16:18.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I say to you that everyone who continues to be angry with his brother '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' harbors malice (enmity of heart) against him shall be liable to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unable to escape the punishment imposed by the court; and whoever speaks contemptuously '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insultingly to his brother shall be liable to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unable to escape the punishment imposed by the Sanhedrin, and whoever says, You cursed fool! [You empty-headed idiot!] shall be liable to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unable to escape the hell (Gehenna) of fire.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So if when you are offering your gift at the altar you there remember that your brother has any [grievance] against you,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Leave your gift at the altar and go. First make peace with your brother, and then come back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' present your gift.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Come to terms quickly with your accuser while you are on the way traveling with him, lest your accuser hand you over to the judge, and the judge to the guard, and you be put in prison.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Truly I say to you, you will not be released until you have paid the last fraction of a penny.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have heard that it was said, You shall not commit adultery. [Exod. 20:14; Deut. 5:18.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I say to you that everyone who so much as looks at a woman with evil desire for her has already committed adultery with her in his heart.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If your right eye serves as a trap to ensnare you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' is an occasion for you to stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sin, pluck it out and throw it away. It is better that you lose one of your members than that your whole body be cast into hell (Gehenna).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed (happy, to be envied, and spiritually prosperous–with life-joy and satisfaction in God''s favor and salvation, regardless of their outward conditions) are the poor in spirit (the humble, who rate themselves insignificant), for theirs is the kingdom of heaven!'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if your right hand serves as a trap to ensnare you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' is an occasion for you to stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sin, cut it off and cast it from you. It is better that you lose one of your members than that your entire body should be cast into hell (Gehenna).'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It has also been said, Whoever divorces his wife must give her a certificate of divorce.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I tell you, Whoever dismisses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' repudiates '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' divorces his wife, except on the grounds of unfaithfulness (sexual immorality), causes her to commit adultery, and whoever marries a woman who has been divorced commits adultery. [Deut. 24:1-4.]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Again, you have heard that it was said to the men of old, You shall not swear falsely, but you shall perform your oaths to the Lord [as a religious duty].'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I tell you, Do not bind yourselves by an oath at all: either by heaven, for it is the throne of God;'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Or by the earth, for it is the footstool of His feet; or by Jerusalem, for it is the city of the Great King. [Ps. 48:2; Isa. 66:1.]'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And do not swear by your head, for you are not able to make a single hair white or black.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let your Yes be simply Yes, and your No be simply No; anything more than that comes from the evil one. [Lev. 19:12; Num. 30:2; Deut. 23:21.]'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have heard that it was said, An eye for an eye, and a tooth for a tooth. [Exod. 21:24; Lev. 24:20; Deut. 19:21.]'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I say to you, Do not resist the evil man [who injures you]; but if anyone strikes you on the right jaw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cheek, turn to him the other one too.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enviably happy [with a happiness produced by the experience of God''s favor and especially conditioned by the revelation of His matchless grace] are those who mourn, for they shall be comforted! [Isa. 61:2.]'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if anyone wants to sue you and take your undershirt (tunic), let him have your coat also.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if anyone forces you to go one mile, go with him two [miles].'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Give to him who keeps on begging from you, and do not turn away from him who would borrow [at interest] from you. [Deut. 15:8; Prov. 24:29.]'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have heard that it was said, You shall love your neighbor and hate your enemy; [Lev. 19:18; Ps. 139:21, 22.]'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I tell you, Love your enemies and pray for those who persecute you, [Prov. 25:21, 22.]'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To show that you are the children of your Father Who is in heaven; for He makes His sun rise on the wicked and on the good, and makes the rain fall upon the upright and the wrongdoers [alike].'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For if you love those who love you, what reward can you have? Do not even the tax collectors do that?'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if you greet only your brethren, what more than others are you doing? Do not even the Gentiles (the heathen) do that?'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You, therefore, must be perfect [growing into complete maturity of godliness in mind and character, having reached the proper height of virtue and integrity], as your heavenly Father is perfect. [Lev. 19:2, 18.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed (happy, blithesome, joyous, spiritually prosperous–with life-joy and satisfaction in God''s favor and salvation, regardless of their outward conditions) are the meek (the mild, patient, long-suffering), for they shall inherit the earth! [Ps. 37:11.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortunate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spiritually prosperous (in that state in which the born-again child of God enjoys His favor and salvation) are those who hunger and thirst for righteousness (uprightness and right standing with God), for they shall be completely satisfied! [Isa. 55:1, 2.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed (happy, to be envied, and spiritually prosperous–with life-joy and satisfaction in God''s favor and salvation, regardless of their outward conditions) are the merciful, for they shall obtain mercy!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed (happy, enviably fortunate, and spiritually prosperous–possessing the happiness produced by the experience of God''s favor and especially conditioned by the revelation of His grace, regardless of their outward conditions) are the pure in heart, for they shall see God! [Ps. 24:3, 4.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed (enjoying enviable happiness, spiritually prosperous–with life-joy and satisfaction in God''s favor and salvation, regardless of their outward conditions) are the makers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' maintainers of peace, for they shall be called the sons of God!'
