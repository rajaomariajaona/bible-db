document_id: REV.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN I looked, and behold, the Lamb stood on Mount Zion, and with Him 144,000 [men] who had His name and His Father''s name inscribed on their foreheads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And I heard a voice from heaven like the sound of great waters and like the rumbling of mighty thunder; the voice I heard [seemed like the music] of harpists accompanying themselves on their harps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they sang a new song before the throne [of God] and before the four living creatures and before the elders [of the heavenly Sanhedrin]. No one could learn [to sing] that song except the 144,000 who had been ransomed (purchased, redeemed) from the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' These are they who have not defiled themselves by relations with women, for they are [pure as] virgins. These are they who follow the Lamb wherever He goes. These are they who have been ransomed (purchased, redeemed) from among men as the firstfruits for God and the Lamb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' No lie was found to be upon their lips, for they are blameless (spotless, untainted, without blemish) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: before the throne of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then I saw another angel flying in midair, with an eternal Gospel (good news) to tell to the inhabitants of the earth, to every race and tribe and language and people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he cried with a mighty voice, Revere God and give Him glory (honor and praise in worship), for the hour of His judgment has arrived. Fall down before Him; pay Him homage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adoration '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship Him Who created heaven and earth, the sea and the springs (fountains) of water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then another angel, a second, followed, declaring, Fallen, fallen is Babylon the great! She who made all nations drink of the [maddening] wine of her passionate unchastity [idolatry]. [Isa. 21:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then another angel, a third, followed them, saying with a mighty voice, Whoever pays homage to the beast and his statue and permits the [beast''s] stamp (mark, inscription) to be put on his forehead or on his hand,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He too shall [have to] drink of the wine of God''s indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrath, poured undiluted into the cup of His anger; and he shall be tormented with fire and brimstone in the presence of the holy angels and in the presence of the Lamb. [Gen. 19:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the smoke of their torment ascends forever and ever; and they have no respite (no pause, no intermission, no rest, no peace) day or night–these who pay homage to the beast and to his image and whoever receives the stamp of his name upon him. [Isa. 34:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Here [comes in a call for] the steadfastness of the saints [the patience, the endurance of the people of God], those who [habitually] keep God''s commandments and [their] faith in Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then I heard further [perceiving the distinct words of] a voice from heaven, saying, Write this: Blessed (happy, to be envied) are the dead from now on who die in the Lord! Yes, blessed (happy, to be envied indeed), says the Spirit, [in] that they may rest from their labors, for their works (deeds) do follow (attend, accompany) them!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Again I looked, and behold, [I saw] a white cloud, and sitting on the cloud One resembling a Son of Man, with a crown of gold on His head and a sharp scythe (sickle) in His hand. [Dan. 7:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And another angel came out of the temple sanctuary, calling with a mighty voice to Him Who was sitting upon the cloud, Put in Your scythe and reap, for the hour has arrived to gather the harvest, for the earth''s crop is fully ripened. [Joel 3:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So He Who was sitting upon the cloud swung His scythe (sickle) on the earth, and the earth''s crop was harvested.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then another angel came out of the temple [sanctuary] in heaven, and he also carried a sharp scythe (sickle).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And another angel came forth from the altar, [the angel] who has authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power over fire, and he called with a loud cry to him who had the sharp scythe (sickle), Put forth your scythe and reap the fruitage of the vine of the earth, for its grapes are entirely ripe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So the angel swung his scythe on the earth and stripped the grapes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gathered the vintage from the vines of the earth and cast it into the huge winepress of God''s indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And [the grapes in] the winepress were trodden outside the city, and blood poured from the winepress, [reaching] as high as horses'' bridles, for a distance of 1,600 stadia (about 200 miles). [Joel 3:13.]'
