document_id: PRO.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEAR, MY sons, the instruction of a father, and pay attention in order to gain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to know intelligent discernment, comprehension, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' interpretation [of spiritual matters].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For I give you good doctrine [what is to be received]; do not forsake my teaching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When I [Solomon] was a son with my father [David], tender and the only son in the sight of my mother [Bathsheba],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He taught me and said to me, Let your heart hold fast my words; keep my commandments and live. [I Chron. 28:9; Eph. 6:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Get skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly Wisdom, get understanding (discernment, comprehension, and interpretation); do not forget and do not turn back from the words of my mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Forsake not [Wisdom], and she will keep, defend, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect you; love her, and she will guard you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The beginning of Wisdom is: get Wisdom (skillful and godly Wisdom)! [For skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly Wisdom is the principal thing.] And with all you have gotten, get understanding (discernment, comprehension, and interpretation). [James 1:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Prize Wisdom highly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exalt her, and she will exalt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' promote you; she will bring you to honor when you embrace her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' She shall give to your head a wreath of gracefulness; a crown of beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory will she deliver to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Hear, O my son, and receive my sayings, and the years of your life shall be many.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I have taught you in the way of skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly Wisdom [which is comprehensive insight into the ways and purposes of God]; I have led you in paths of uprightness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When you walk, your steps shall not be hampered [your path will be clear and open]; and when you run, you shall not stumble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Take firm hold of instruction, do not let go; guard her, for she is your life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Enter not into the path of the wicked, and go not in the way of evil men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Avoid it, do not go on it; turn from it and pass on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For they cannot sleep unless they have caused trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vexation; their sleep is taken away unless they have caused someone to fall.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For they eat the bread of wickedness and drink the wine of violence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But the path of the [uncompromisingly] just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous is like the light of dawn, that shines more and more (brighter and clearer) until [it reaches its full strength and glory in] the perfect day [to be prepared]. [II Sam. 23:4; Matt. 5:14; Phil. 2:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The way of the wicked is like deep darkness; they do not know over what they stumble. [John 12:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' My son, attend to my words; consent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' submit to my sayings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Let them not depart from your sight; keep them in the center of your heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For they are life to those who find them, healing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' health to all their flesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guard your heart with all vigilance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' above all that you guard, for out of it flow the springs of life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Put away from you false '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dishonest speech, and willful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contrary talk put far from you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Let your eyes look right on [with fixed purpose], and let your gaze be straight before you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Consider well the path of your feet, and let all your ways be established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ordered aright.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Turn not aside to the right hand or to the left; remove your foot from evil.'
