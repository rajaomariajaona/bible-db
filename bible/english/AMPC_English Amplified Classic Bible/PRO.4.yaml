document_id: PRO.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' HEAR, MY sons, the instruction of a father, and pay attention in order to gain '
  - type: text
    content: and
  - type: text
    content: ' to know intelligent discernment, comprehension, '
  - type: text
    content: and
  - type: text
    content: ' interpretation [of spiritual matters].'
  '10':
  - type: text
    content: ' Hear, O my son, and receive my sayings, and the years of your life shall be many.'
  '11':
  - type: text
    content: ' I have taught you in the way of skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom [which is comprehensive insight into the ways and purposes of God]; I have led you in paths of uprightness.'
  '12':
  - type: text
    content: ' When you walk, your steps shall not be hampered [your path will be clear and open]; and when you run, you shall not stumble.'
  '13':
  - type: text
    content: ' Take firm hold of instruction, do not let go; guard her, for she is your life.'
  '14':
  - type: text
    content: ' Enter not into the path of the wicked, and go not in the way of evil men.'
  '15':
  - type: text
    content: ' Avoid it, do not go on it; turn from it and pass on.'
  '16':
  - type: text
    content: ' For they cannot sleep unless they have caused trouble '
  - type: text
    content: or
  - type: text
    content: ' vexation; their sleep is taken away unless they have caused someone to fall.'
  '17':
  - type: text
    content: ' For they eat the bread of wickedness and drink the wine of violence.'
  '18':
  - type: text
    content: ' But the path of the [uncompromisingly] just '
  - type: text
    content: and
  - type: text
    content: ' righteous is like the light of dawn, that shines more and more (brighter and clearer) until [it reaches its full strength and glory in] the perfect day [to be prepared]. [II Sam. 23:4; Matt. 5:14; Phil. 2:15.]'
  '19':
  - type: text
    content: ' The way of the wicked is like deep darkness; they do not know over what they stumble. [John 12:35.]'
  '2':
  - type: text
    content: ' For I give you good doctrine [what is to be received]; do not forsake my teaching.'
  '20':
  - type: text
    content: ' My son, attend to my words; consent '
  - type: text
    content: and
  - type: text
    content: ' submit to my sayings.'
  '21':
  - type: text
    content: ' Let them not depart from your sight; keep them in the center of your heart.'
  '22':
  - type: text
    content: ' For they are life to those who find them, healing '
  - type: text
    content: and
  - type: text
    content: ' health to all their flesh.'
  '23':
  - type: text
    content: ' Keep '
  - type: text
    content: and
  - type: text
    content: ' guard your heart with all vigilance '
  - type: text
    content: and
  - type: text
    content: ' above all that you guard, for out of it flow the springs of life.'
  '24':
  - type: text
    content: ' Put away from you false '
  - type: text
    content: and
  - type: text
    content: ' dishonest speech, and willful '
  - type: text
    content: and
  - type: text
    content: ' contrary talk put far from you.'
  '25':
  - type: text
    content: ' Let your eyes look right on [with fixed purpose], and let your gaze be straight before you.'
  '26':
  - type: text
    content: ' Consider well the path of your feet, and let all your ways be established '
  - type: text
    content: and
  - type: text
    content: ' ordered aright.'
  '27':
  - type: text
    content: ' Turn not aside to the right hand or to the left; remove your foot from evil.'
  '3':
  - type: text
    content: ' When I [Solomon] was a son with my father [David], tender and the only son in the sight of my mother [Bathsheba],'
  '4':
  - type: text
    content: ' He taught me and said to me, Let your heart hold fast my words; keep my commandments and live. [I Chron. 28:9; Eph. 6:4.]'
  '5':
  - type: text
    content: ' Get skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom, get understanding (discernment, comprehension, and interpretation); do not forget and do not turn back from the words of my mouth.'
  '6':
  - type: text
    content: ' Forsake not [Wisdom], and she will keep, defend, '
  - type: text
    content: and
  - type: text
    content: ' protect you; love her, and she will guard you.'
  '7':
  - type: text
    content: ' The beginning of Wisdom is: get Wisdom (skillful and godly Wisdom)! [For skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom is the principal thing.] And with all you have gotten, get understanding (discernment, comprehension, and interpretation). [James 1:5.]'
  '8':
  - type: text
    content: ' Prize Wisdom highly '
  - type: text
    content: and
  - type: text
    content: ' exalt her, and she will exalt '
  - type: text
    content: and
  - type: text
    content: ' promote you; she will bring you to honor when you embrace her.'
  '9':
  - type: text
    content: ' She shall give to your head a wreath of gracefulness; a crown of beauty '
  - type: text
    content: and
  - type: text
    content: ' glory will she deliver to you.'
