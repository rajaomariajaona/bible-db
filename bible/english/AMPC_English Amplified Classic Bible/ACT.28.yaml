document_id: ACT.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER WE were safe on the island, we knew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognized that it was called Malta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the natives showed us unusual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remarkable kindness, for they kindled a fire and welcomed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' received us all, since it had begun to rain and was cold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Now Paul had gathered a bundle of sticks, and he was laying them on the fire when a viper crawled out because of the heat and fastened itself on his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When the natives saw the little animal hanging from his hand, they said to one another, Doubtless this man is a murderer, for though he has been saved from the sea, Justice [the goddess of avenging] has not permitted that he should live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then [Paul simply] shook off the small creature into the fire and suffered no evil effects.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' However, they were waiting, expecting him to swell up or suddenly drop dead; but when they had watched him a long time and saw nothing fatal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' harmful come to him, they changed their minds and kept saying over and over that he was a god.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' In the vicinity of that place there were estates belonging to the head man of the island, named Publius, who accepted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entertained us with hearty hospitality for three days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And it happened that the father of Publius was sick in bed with recurring attacks of fever and dysentery; and Paul went to see him, and after praying and laying his hands on him, he healed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' After this had occurred, the other people on the island who had diseases also kept coming and were cured.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They showed us every respect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' presented many gifts to us, honoring us with many honors; and when we sailed, they provided '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put on [board our ship] everything we needed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' It was after three months'' stay there that we set sail in a ship which had wintered in the island, an Alexandrian ship with the Twin Brothers [Castor and Pollux] as its figurehead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' We landed at Syracuse and remained there three days,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And from there we made a circuit [following the coast] and reached Rhegium; and one day later a south wind sprang up, and the next day we arrived at Puteoli.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' There we found some [Christian] brethren and were entreated to stay with them for seven days. And so we came to Rome.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the [Christian] brethren there, having had news of us, came as far as the Forum of Appius and the Three Taverns to meet us. When Paul saw them, he thanked God and received new courage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When we arrived at Rome, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the centurion delivered the prisoners to the captain of the guard, but
  - type: text
    text: ' Paul was permitted to live by himself with the soldier who guarded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Three days after [our arrival], he called together the leading local Jews; and when they had gathered, he said to them, Brethren, though I have done nothing against the people or against the customs of our forefathers, yet I was turned over as a prisoner from Jerusalem into the hands of the Romans.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' After they had examined me, they were ready to release me because I was innocent of any offense deserving the death penalty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But when the Jews protested, I was forced to appeal to Caesar, though it was not because I had any charge to make against my nation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' This is the reason therefore why I have begged to see you and to talk with you, since it is because of the Hope of Israel (the Messiah) that I am bound with this chain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And they answered him, We have not received any letters about you from Judea, and none of the [Jewish] brethren coming here has reported or spoken anything evil about you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But we think it fitting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are eager to hear from you what it is that you have in mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what your opinion is, for with regard to this sect it is known to all of us that it is everywhere denounced.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' So when they had set a day with him, they came in large numbers to his lodging. And he fully set forth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' explained the matter to them from morning until night, testifying to the kingdom of God and trying to persuade them concerning Jesus both from the Law of Moses and from the Prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And some were convinced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' believed what he said, and others did not believe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And as they disagreed among themselves, they began to leave, [but not before] Paul had added one statement [more]: The Holy Spirit was right in saying through Isaiah the prophet to your forefathers:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Go to this people and say to them, You will indeed hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hear with your ears but will not understand, and you will indeed look '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' look with your eyes but will not see [not perceive, have knowledge of or become acquainted with what you look at, at all].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For the heart (the understanding, the soul) of this people has grown dull (stupid, hardened, and calloused), and their ears are heavy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hard of hearing and they have shut tight their eyes, so that they may not perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become acquainted with their eyes and hear with their ears and understand with their souls and turn [to Me and be converted], that I may heal them. [Isa. 6:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So let it be understood by you then that [this message of] the salvation of God has been sent to the Gentiles, and they will listen [to it]! [Ps. 67:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: And when he had said these things, the Jews went away, arguing and disputing among themselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' After this Paul lived there for two entire years [at his own expense] in his own rented lodging, and he welcomed all who came to him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Preaching to them the kingdom of God and teaching them about the Lord Jesus Christ with boldness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quite openly, and without being molested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hindered.'
