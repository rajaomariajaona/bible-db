document_id: PSA.150,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' PRAISE THE Lord! Praise God in His sanctuary; praise Him in the heavens of His power!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Praise Him for His mighty acts; praise Him according to the abundance of His greatness! [Deut. 3:24; Ps. 145:5, 6.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Praise Him with trumpet sound; praise Him with lute and harp!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Praise Him with tambourine and [single or group] dance; praise Him with stringed and wind instruments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' flutes!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Praise Him with resounding cymbals; praise Him with loud clashing cymbals!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Let everything that has breath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' every breath of life praise the Lord! Praise the Lord! (Hallelujah!)'
