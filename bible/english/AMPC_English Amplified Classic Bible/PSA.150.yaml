document_id: PSA.150,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PRAISE THE Lord! Praise God in His sanctuary; praise Him in the heavens of His power!'
  '2':
  - type: text
    content: ' Praise Him for His mighty acts; praise Him according to the abundance of His greatness! [Deut. 3:24; Ps. 145:5, 6.]'
  '3':
  - type: text
    content: ' Praise Him with trumpet sound; praise Him with lute and harp!'
  '4':
  - type: text
    content: ' Praise Him with tambourine and [single or group] dance; praise Him with stringed and wind instruments '
  - type: text
    content: or
  - type: text
    content: ' flutes!'
  '5':
  - type: text
    content: ' Praise Him with resounding cymbals; praise Him with loud clashing cymbals!'
  '6':
  - type: text
    content: ' Let everything that has breath '
  - type: text
    content: and
  - type: text
    content: ' every breath of life praise the Lord! Praise the Lord! (Hallelujah!)'
