document_id: MAT.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND SIX days after this, Jesus took with Him Peter and James and John his brother, and led them up on a high mountain by themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And His appearance underwent a change in their presence; and His face shone clear and bright like the sun, and His clothing became as white as light.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And behold, there appeared to them Moses and Elijah, who kept talking with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then Peter began to speak and said to Jesus, Lord, it is good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delightful that we are here; if You approve, I will put up three booths here–one for You and one for Moses and one for Elijah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' While he was still speaking, behold, a shining cloud [composed of light] overshadowed them, and a voice from the cloud said, This is My Son, My Beloved, with Whom I am [and have always been] delighted. Listen to Him! [Ps. 2:7; Isa. 42:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When the disciples heard it, they fell on their faces and were seized with alarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' struck with fear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But Jesus came and touched them and said, Get up, and do not be afraid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And when they raised their eyes, they saw no one but Jesus only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And as they were going down the mountain, Jesus cautioned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commanded them, Do not mention to anyone what you have seen, until the Son of Man has been raised from the dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The disciples asked Him, Then why do the scribes say that Elijah must come first?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He replied, Elijah does come and will get everything restored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ready.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But I tell you that Elijah has come already, and they did not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' recognize him, but did to him as they liked. So also the Son of Man is going to be treated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer at their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then the disciples understood that He spoke to them about John the Baptist. [Mal. 4:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And when they approached the multitude, a man came up to Him, kneeling before Him and saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Lord, do pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have mercy on my son, for he has epilepsy (is moonstruck) and he suffers terribly; for frequently he falls into the fire and many times into the water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And I brought him to Your disciples, and they were not able to cure him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Jesus answered, O you unbelieving (warped, wayward, rebellious) and thoroughly perverse generation! How long am I to remain with you? How long am I to bear with you? Bring him here to Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Jesus rebuked the demon, and it came out of him, and the boy was cured instantly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then the disciples came to Jesus and asked privately, Why could we not drive it out?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He said to them, Because of the littleness of your faith [that is, your lack of firmly relying trust]. For truly I say to you, if you have faith [that is living] like a grain of mustard seed, you can say to this mountain, Move from here to yonder place, and it will move; and nothing will be impossible to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: But this kind does not go out except by prayer and fasting.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When they were going about here and there in Galilee, Jesus said to them, The Son of Man is going to be turned over into the hands of men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And they will kill Him, and He will be raised [to life] again on the third day. And they were deeply '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exceedingly grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distressed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' When they arrived in Capernaum, the collectors of the half shekel [the temple tax] went up to Peter and said, Does not your Teacher pay the half shekel? [Exod. 30:13; 38:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' He answered, Yes. And when he came home, Jesus spoke to him [about it] first, saying, What do you think, Simon? From whom do earthly rulers collect duties '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' tribute–from their own sons or from others not of their own family?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And when Peter said, From other people not of their own family, Jesus said to him, Then the sons are exempt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' However, in order not to give offense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cause them to stumble [that is, to cause them to judge unfavorably and unjustly] go down to the sea and throw in a hook. Take the first fish that comes up, and when you open its mouth you will find there a shekel. Take it and give it to them to pay the temple tax for Me and for yourself.'
