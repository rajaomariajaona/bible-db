document_id: DEU.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AT THE end of every seven years you shall grant a release.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And this is the manner of the release: every creditor shall release that which he has lent to his neighbor; he shall not exact it of his neighbor, his brother, for the Lord''s release is proclaimed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Of a foreigner you may exact it, but whatever of yours is with your brother [Israelite] your hand shall release.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But there will be no poor among you, for the Lord will surely bless you in the land which the Lord your God gives you for an inheritance to possess,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' If only you carefully listen to the voice of the Lord your God, to do watchfully all these commandments which I command you this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When the Lord your God blesses you as He promised you, then you shall lend to many nations, but you shall not borrow; and you shall rule over many nations, but they shall not rule over you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' If there is among you a poor man, one of your kinsmen in any of the towns of your land which the Lord your God gives you, you shall not harden your [minds and] hearts or close your hands to your poor brother;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But you shall open your hands wide to him and shall surely lend him sufficient for his need in whatever he lacks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Beware lest there be a base thought in your [minds and] hearts, and you say, The seventh year, the year of release, is at hand, and your eye be evil against your poor brother and you give him nothing, and he cry to the Lord against you, and it be sin in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You shall give to him freely without begrudging it; because of this the Lord will bless you in all your work and in all you undertake.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For the poor will never cease out of the land; therefore I command you, You shall open wide your hands to your brother, to your needy, and to your poor in your land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And if your brother, a Hebrew man or a Hebrew woman, is sold to you and serves you six years, then in the seventh year you shall let him go free from you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And when you send him out free from you, you shall not let him go away empty-handed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You shall furnish him liberally out of your flock, your threshing floor, and your winepress; of what the Lord your God has blessed you, you shall give to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And you shall [earnestly] remember that you were a bondman in the land of Egypt and the Lord your God redeemed you; therefore I give you this command today.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But if the servant says to you, I will not go away from you, because he loves you and your household, since he does well with you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then take an awl and pierce his ear through to the door, and he shall be your servant always. And also to your bondwoman you shall do likewise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' It shall not seem hard to you when you let him go free from you, for at half the cost of a hired servant he has served you six years; and the Lord your God will bless you in all you do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' All the firstling males that are born of your herd and flock you shall set apart for the Lord your God; you shall do no work with the firstling of your herd, nor shear the firstling of your flock.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You shall eat it before the Lord your God annually in the place [for worship] which the Lord shall choose, you and your household.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But if it has any blemish, if it is lame, blind, or has any bad blemish whatsoever, you shall not sacrifice it to the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' You shall eat it within your towns; the [ceremonially] unclean and the clean alike may eat it, as if it were a gazelle or a hart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Only you shall not eat its blood; you shall pour it on the ground like water.'
