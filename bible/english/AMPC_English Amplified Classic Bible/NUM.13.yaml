document_id: NUM.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Send men to explore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scout out [for yourselves] the land of Canaan, which I give to the Israelites. From each tribe of their fathers you shall send a man, every one a leader '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' head among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So Moses by the command of the Lord sent scouts from the Wilderness of Paran, all of them men who were heads of the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' These were their names: of the tribe of Reuben, Shammua son of Zaccur;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Of the tribe of Simeon, Shaphat son of Hori;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Of the tribe of Judah, Caleb son of Jephunneh;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Of the tribe of Issachar, Igal son of Joseph;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Of the tribe of Ephraim, Hoshea [that is, Joshua] son of Nun;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Of the tribe of Benjamin, Palti son of Raphu;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Of the tribe of Zebulun, Gaddiel son of Sodi;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Of the tribe of Joseph, that is, of the tribe of Manasseh, Gaddi son of Susi;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Of the tribe of Dan, Ammiel son of Gemalli;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Of the tribe of Asher, Sethur son of Michael;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Of the tribe of Naphtali, Nahbi son of Vophsi;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Of the tribe of Gad, Geuel son of Machi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' These are the names of the men whom Moses sent to explore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scout out the land. And Moses called Hoshea son of Nun, Joshua.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Moses sent them to scout out the land of Canaan, and said to them, Get up this way by the South (the Negeb) and go up into the hill country,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And see what the land is and whether the people who dwell there are strong or weak, few or many,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And whether the land they live in is good or bad, and whether the cities they dwell in are camps or strongholds,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And what the land is, whether it is fat or lean, whether there is timber on it or not. And be of good courage and bring some of the fruit of the land. Now the time was the time of the first ripe grapes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So they went up and scouted through the land from the Wilderness of Zin to Rehob, to the entrance of Hamath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And then went up into the South (the Negeb) and came to Hebron; and Ahiman, Sheshai, and Talmai [probably three tribes of] the sons of Anak were there. (Hebron was built seven years before Zoan in Egypt.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And they came to the Valley of Eshcol, and cut down from there a branch with one cluster of grapes, and they carried it on a pole between two [of them]; they brought also some pomegranates and figs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' That place was called the Valley of Eshcol [cluster] because of the cluster which the Israelites cut down there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And they returned from scouting out the land after forty days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' They came to Moses and Aaron and to all the Israelite congregation in the Wilderness of Paran at Kadesh, and brought them word, and showed them the land''s fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' They told Moses, We came to the land to which you sent us; surely it flows with milk and honey. This is its fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But the people who dwell there are strong, and the cities are fortified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' very large; moreover, there we saw the sons of Anak [of great stature and courage].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Amalek dwells in the land of the South (the Negeb); the Hittite, the Jebusite, and the Amorite dwell in the hill country; and the Canaanite dwells by the sea and along by the side of the Jordan [River].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Caleb quieted the people before Moses, and said, Let us go up at once and possess it; we are well able to conquer it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But his fellow scouts said, We are not able to go up against the people [of Canaan], for they are stronger than we are.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' So they brought the Israelites an evil report of the land which they had scouted out, saying, The land through which we went to spy it out is a land that devours its inhabitants. And all the people that we saw in it are men of great stature.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' There we saw the Nephilim [or giants], the sons of Anak, who come from the giants; and we were in our own sight as grasshoppers, and so we were in their sight.'
