document_id: ISA.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN THE Lord said to me, Take a large tablet [of wood, metal, or stone] and write upon it with a graving tool '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in ordinary characters [which the humblest man can read]: Belonging to Maher-shalal-hash-baz [they (the Assyrians) hasten to the spoil (of Syria and Israel), they speed to the prey].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And I took faithful witnesses to record '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attest [this prophecy] for me, Uriah the priest and Zechariah son of Jeberechiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And I approached [my wife] the prophetess, and when she had conceived and borne a son, the Lord said to me, Call his name Maher-shalal-hash-baz [as a continual reminder to the people of the prophecy],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For before the child knows how to say, My father or my mother, the riches of Damascus [Syria''s capital] and the spoil of Samaria [Israel''s capital] shall be carried away before the king of Assyria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The Lord spoke to me yet again and said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Because this people [Israel and Judah] have refused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despised the waters of Shiloah [Siloam, the only perennial fountain of Jerusalem, and symbolic of God''s protection and sustaining power] that go gently, and rejoice in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with Rezin [the king of Syria] and Remaliah''s son [Pekah the king of Israel],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now therefore, behold, the Lord brings upon them the waters of the River [Euphrates], strong and many–even the king of Assyria and all the glory [of his gorgeous retinue]; and it will rise over all its channels, brooks, valleys, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' canals and extend far beyond its banks; [Isa. 7:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And it will sweep on into Judah; it will overflow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' go over [the hills], reaching even [but only] to the neck [of which Jerusalem is the head], and the outstretched wings [of the armies of Assyria] shall fill the breadth of Your land, O Immanuel [Messiah, God is with us]! [Num. 14:9; Ps. 46:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Make an uproar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be broken in pieces, O you peoples [rage, raise the war cry, do your worst, and be utterly dismayed]! Give ear, all you [our enemies] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' far countries. Gird yourselves [for war], and be thrown into consternation! Gird yourselves, and be [utterly] dismayed!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Take counsel together [against Judah], but it shall come to nought; speak the word, but it will not stand, for God is with us [Immanuel]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For the Lord spoke thus to me with His strong hand [upon me], and warned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instructed me not to walk in the way of this people, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Do not call conspiracy [or hard, or holy] all that this people will call conspiracy [or hard, or holy]; neither be in fear of what they fear, nor [make others afraid and] in dread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The Lord of hosts–regard Him as holy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor His holy name [by regarding Him as your only hope of safety], and let Him be your fear and let Him be your dread [lest you offend Him by your fear of man and distrust of Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And He shall be a sanctuary [a sacred and indestructible asylum to those who reverently fear and trust in Him]; but He shall be a Stone of stumbling and a Rock of offense to both the houses of Israel, a trap and a snare to the inhabitants of Jerusalem. [Isa. 28:6; Rom. 9:33; I Pet. 2:6-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And many among them shall stumble thereon; and they shall fall and be broken, and be snared and taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Bind up the testimony, seal the law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the teaching among my [Isaiah''s] disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And I will wait for the Lord, Who is hiding His face from the house of Jacob; and I will look for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope in Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Behold, I and the children whom the Lord has given me are signs and wonders [that are to take place] in Israel from the Lord of hosts, Who dwells on Mount Zion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And when the people [instead of putting their trust in God] shall say to you, Consult for direction mediums and wizards who chirp and mutter, should not a people seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consult their God? Should they consult the dead on behalf of the living?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' [Direct such people] to the teaching and to the testimony! If their teachings are not in accord with this word, it is surely because there is no dawn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' no morning for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And they [who consult mediums and wizards] shall pass through [the land] sorely distressed and hungry; and when they are hungry, they will fret, and will curse by their king and their God; and whether they look upward'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Or look to the earth, they will behold only distress and darkness, the gloom of anguish, and into thick darkness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' widespread, obscure night they shall be driven away.'
