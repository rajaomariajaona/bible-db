document_id: JDG.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JERUBBAAL, that is, Gideon, and all the people who were with him rose early and encamped beside the spring of Harod; and the camp of Midian was north of them by the hill of Moreh in the valley.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord said to Gideon, The people who are with you are too many for Me to give the Midianites into their hands, lest Israel boast about themselves against Me, saying, My own hand has delivered me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So now proclaim in the ears of the men, saying, Whoever is fearful and trembling, let him turn back and depart from Mount Gilead. And 22,000 of the men returned, but 10,000 remained.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the Lord said to Gideon, The men are still too many; bring them down to the water, and I will test them for you there. And he of whom I say to you, This man shall go with you, shall go with you; and he of whom I say to you, This man shall not go with you, shall not go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So he brought the men down to the water, and the Lord said to Gideon, Everyone who laps up the water with his tongue as a dog laps it, you shall set by himself, likewise everyone who bows down on his knees to drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the number of those who lapped, putting their hand to their mouth, was 300 men, but all the rest of the people bowed down upon their knees to drink water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the Lord said to Gideon, With the 300 men who lapped I will deliver you, and give the Midianites into your hand. Let all the others return every man to his home.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So the people took provisions and their trumpets in their hands, and he sent all the rest of Israel every man to his home and retained those 300 men. And the host of Midian was below him in the valley.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' That same night the Lord said to Gideon, Arise, go down against their camp, for I have given it into your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But if you fear to go down, go with Purah your servant down to the camp'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And you shall hear what they say, and afterward your hands shall be strengthened to go down against the camp. Then he went down with Purah his servant to the outposts of the camp of the armed men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the Midianites and the Amalekites and all the sons of the east lay along the valley like locusts for multitude; and their camels were without number, as the sand on the seashore for multitude.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When Gideon arrived, behold, a man was telling a dream to his comrade. And he said, Behold, I dreamed a dream, and behold, a cake of barley bread tumbled into the camp of Midian and came to the tent and struck it so that it fell, and turned it upside down so that the tent lay flat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And his comrade replied, This is nothing else but the sword of Gideon son of Joash, a man of Israel. Into his hand God has given Midian and all the host.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When Gideon heard the telling of the dream and its interpretation, he worshiped and returned to the camp of Israel and said, Arise, for the Lord has given into your hand the host of Midian.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he divided the 300 men into three companies, and he put into the hands of all of them trumpets and empty pitchers, with torches inside the pitchers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And he said to them, Look at me, then do likewise. When I come to the edge of their camp, do as I do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' When I blow the trumpet, I and all who are with me, then you blow the trumpets also on every side of all the camp and shout, For the Lord and for Gideon!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So Gideon and the 100 men who were with him came to the outskirts of the camp at the beginning of the middle watch, when the guards had just been changed, and they blew the trumpets and smashed the pitchers that were in their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the three companies blew the trumpets and shattered the pitchers, holding the torches in their left hands, and in their right hands the trumpets to blow [leaving no chance to use swords], and they cried, The sword for the Lord and Gideon!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' They stood every man in his place round about the camp, and all the [Midianite] army ran–they cried out and fled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When [Gideon''s men] blew the 300 trumpets, the Lord set every [Midianite''s] sword against his comrade and against all the army, and the army fled as far as Beth-shittah toward Zererah, as far as the border of Abel-meholah by Tabbath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And the men of Israel were called together out of Naphtali and Asher and all Manasseh, and they pursued Midian.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Gideon sent messengers throughout all the hill country of Ephraim, saying, Come down against the Midianites and take all the intervening fords as far as Beth-barah and also the Jordan. So all the men of Ephraim were gathered together and took all the fords as far as Beth-barah and also the Jordan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And [the men of Ephraim] took the two princes of Midian, Oreb and Zeeb, and they slew Oreb at the rock of Oreb, and Zeeb they slew at the winepress of Zeeb, and pursued Midian; and they brought the heads of Oreb and Zeeb to Gideon beyond the Jordan.'
