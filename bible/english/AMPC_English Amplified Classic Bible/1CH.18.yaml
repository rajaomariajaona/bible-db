document_id: 1CH.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THIS, David smote and subdued the Philistines, and took Gath and its villages out of the hand of the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He smote Moab, and the Moabites became David''s servants and brought tribute.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Also David defeated Hadadezer king of Zobah toward Hamath, as he went to establish his dominion by the river Euphrates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' David took from him 1,000 chariots, 7,000 horsemen, and 20,000 foot soldiers. David also hamstrung all the chariot horses, but reserved enough for 100 chariots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When the Syrians of Damascus came to help Hadadezer king of Zobah, David slew of the Syrians 22,000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then David put garrisons in Syria, [whose capital was] Damascus; the Syrians became David''s servants and brought tribute. Thus the Lord preserved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gave victory to David wherever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' David took the shields of gold that were carried by the servants of Hadadezer and brought them to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Likewise from Tibhath and from Cun, cities of Hadadezer, David brought very much bronze, with which Solomon later made the bronze laver, the pillars, and the vessels of bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' When Tou king of Hamath heard how David had defeated all the hosts of Hadadezer king of Zobah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He sent Hadoram his son to King David to salute him and to congratulate him because he had fought and defeated Hadadezer, for Hadadezer had had wars with Tou. And Hadoram brought with him all manner of vessels of gold, silver, and bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' King David dedicated them also to the Lord, with the silver and the gold he brought from all these nations: Edom, Moab, the Ammonites, the Philistines, and the Amalekites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Also Abishai son of Zeruiah slew 18,000 of the Edomites in the Valley of Salt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He put garrisons in Edom, and all the Edomites became David''s servants. Thus the Lord preserved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gave victory to David wherever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So David reigned over all Israel and executed judgment and justice among all his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Joab son of Zeruiah [David''s half sister] was over the army; and Jehoshaphat son of Ahilud was the recorder;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Zadok son of Ahitub and Abimelech son of Abiathar were the priests; and Shavsha was secretary [of state];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Benaiah son of Jehoiada was over [David''s bodyguards] the Cherethites and the Pelethites; and David''s sons were chiefs next to the king.'
