document_id: 1CH.18,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AFTER THIS, David smote and subdued the Philistines, and took Gath and its villages out of the hand of the Philistines.'
  '10':
  - type: text
    content: ' He sent Hadoram his son to King David to salute him and to congratulate him because he had fought and defeated Hadadezer, for Hadadezer had had wars with Tou. And Hadoram brought with him all manner of vessels of gold, silver, and bronze.'
  '11':
  - type: text
    content: ' King David dedicated them also to the Lord, with the silver and the gold he brought from all these nations: Edom, Moab, the Ammonites, the Philistines, and the Amalekites.'
  '12':
  - type: text
    content: ' Also Abishai son of Zeruiah slew 18,000 of the Edomites in the Valley of Salt.'
  '13':
  - type: text
    content: ' He put garrisons in Edom, and all the Edomites became David''s servants. Thus the Lord preserved '
  - type: text
    content: and
  - type: text
    content: ' gave victory to David wherever he went.'
  '14':
  - type: text
    content: ' So David reigned over all Israel and executed judgment and justice among all his people.'
  '15':
  - type: text
    content: ' Joab son of Zeruiah [David''s half sister] was over the army; and Jehoshaphat son of Ahilud was the recorder;'
  '16':
  - type: text
    content: ' Zadok son of Ahitub and Abimelech son of Abiathar were the priests; and Shavsha was secretary [of state];'
  '17':
  - type: text
    content: ' Benaiah son of Jehoiada was over [David''s bodyguards] the Cherethites and the Pelethites; and David''s sons were chiefs next to the king.'
  '2':
  - type: text
    content: ' He smote Moab, and the Moabites became David''s servants and brought tribute.'
  '3':
  - type: text
    content: ' Also David defeated Hadadezer king of Zobah toward Hamath, as he went to establish his dominion by the river Euphrates.'
  '4':
  - type: text
    content: ' David took from him 1,000 chariots, 7,000 horsemen, and 20,000 foot soldiers. David also hamstrung all the chariot horses, but reserved enough for 100 chariots.'
  '5':
  - type: text
    content: ' When the Syrians of Damascus came to help Hadadezer king of Zobah, David slew of the Syrians 22,000 men.'
  '6':
  - type: text
    content: ' Then David put garrisons in Syria, [whose capital was] Damascus; the Syrians became David''s servants and brought tribute. Thus the Lord preserved '
  - type: text
    content: and
  - type: text
    content: ' gave victory to David wherever he went.'
  '7':
  - type: text
    content: ' David took the shields of gold that were carried by the servants of Hadadezer and brought them to Jerusalem.'
  '8':
  - type: text
    content: ' Likewise from Tibhath and from Cun, cities of Hadadezer, David brought very much bronze, with which Solomon later made the bronze laver, the pillars, and the vessels of bronze.'
  '9':
  - type: text
    content: ' When Tou king of Hamath heard how David had defeated all the hosts of Hadadezer king of Zobah,'
