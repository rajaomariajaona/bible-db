document_id: 1CH.19,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AFTER THIS, Nahash king of the Ammonites died, and his son reigned in his stead.'
  '10':
  - type: text
    content: ' When Joab saw that the battle was set against him before and behind, he chose from all the choice men of Israel and put them in array against the Syrians.'
  '11':
  - type: text
    content: ' The rest of the soldiers he delivered to Abishai his brother, and they were arrayed against the Ammonites.'
  '12':
  - type: text
    content: ' And he said, If the Syrians are too strong for me, then you help me; but if the Ammonites are too strong for you, I will help you.'
  '13':
  - type: text
    content: ' Be of good courage and let us behave ourselves courageously for our people and for the cities of our God; and may the Lord do what is good in His sight.'
  '14':
  - type: text
    content: ' So Joab and the people who were with him drew near before the Syrians for battle, and they fled before him.'
  '15':
  - type: text
    content: ' And when the Ammonites saw that the Syrians fled, they likewise fled before Abishai, Joab''s brother, and entered into the city [Medeba]. Then Joab came to Jerusalem.'
  '16':
  - type: text
    content: ' When the Syrians saw that they were defeated by Israel, they sent messengers and drew forth the Syrians who were beyond the Euphrates River, with Shophach the commander of the army of Hadadezer at their head.'
  '17':
  - type: text
    content: ' It was told to David, and he gathered all Israel and crossed the Jordan and drew up his army against them. So when David set the battle in array against the Syrians, they fought with him.'
  '18':
  - type: text
    content: ' But the Syrians fled before Israel, and David slew of the Syrians 7,000 men in chariots and 40,000 foot soldiers, and killed Shophach the commander of the army.'
  '19':
  - type: text
    content: ' When the servants of Hadadezer saw that they were defeated before Israel, they made peace with David and became subject to him; nor would the Syrians any longer help the Ammonites.'
  '2':
  - type: text
    content: ' David said, I will show kindness to Hanun son of Nahash, because his father showed kindness to me. And David sent messengers to comfort him concerning his father''s death. So the servants of David came into the land of the Ammonites to comfort Hanun.'
  '3':
  - type: text
    content: ' But the princes of the Ammonites said to Hanun, Do you think that David has sent comforters to you because he honors your father? Have his servants not come to you to search, to overthrow, and to spy out the land?'
  '4':
  - type: text
    content: ' Therefore Hanun took David''s servants, shaved them, cut off their garments in the middle near their buttocks, and sent them away.'
  '5':
  - type: text
    content: ' When David was told how the men were served, he sent to meet them, for [they] were greatly shamed '
  - type: text
    content: and
  - type: text
    content: ' embarrassed. The king said, Stay in Jericho until your beards are grown, and then return.'
  '6':
  - type: text
    content: ' When the Ammonites saw that they had made themselves hateful to David, Hanun and [his people] sent 1,000 talents of silver to hire chariots and horsemen from Mesopotamia and Aram-maacah and Zobah.'
  '7':
  - type: text
    content: ' So they hired 32,000 chariots, and the king of Maacah and his troops, who came and pitched before Medeba. And the Ammonites gathered from their cities and came to battle.'
  '8':
  - type: text
    content: ' When David heard of it, he sent Joab and all the army of mighty men.'
  '9':
  - type: text
    content: ' And the Ammonites came out and lined up in battle array before the entrance of the city [Medeba], and the kings who had come were by themselves in the open country.'
