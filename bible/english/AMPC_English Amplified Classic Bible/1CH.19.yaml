document_id: 1CH.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THIS, Nahash king of the Ammonites died, and his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' David said, I will show kindness to Hanun son of Nahash, because his father showed kindness to me. And David sent messengers to comfort him concerning his father''s death. So the servants of David came into the land of the Ammonites to comfort Hanun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But the princes of the Ammonites said to Hanun, Do you think that David has sent comforters to you because he honors your father? Have his servants not come to you to search, to overthrow, and to spy out the land?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Therefore Hanun took David''s servants, shaved them, cut off their garments in the middle near their buttocks, and sent them away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When David was told how the men were served, he sent to meet them, for [they] were greatly shamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' embarrassed. The king said, Stay in Jericho until your beards are grown, and then return.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When the Ammonites saw that they had made themselves hateful to David, Hanun and [his people] sent 1,000 talents of silver to hire chariots and horsemen from Mesopotamia and Aram-maacah and Zobah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So they hired 32,000 chariots, and the king of Maacah and his troops, who came and pitched before Medeba. And the Ammonites gathered from their cities and came to battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When David heard of it, he sent Joab and all the army of mighty men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the Ammonites came out and lined up in battle array before the entrance of the city [Medeba], and the kings who had come were by themselves in the open country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When Joab saw that the battle was set against him before and behind, he chose from all the choice men of Israel and put them in array against the Syrians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The rest of the soldiers he delivered to Abishai his brother, and they were arrayed against the Ammonites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And he said, If the Syrians are too strong for me, then you help me; but if the Ammonites are too strong for you, I will help you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Be of good courage and let us behave ourselves courageously for our people and for the cities of our God; and may the Lord do what is good in His sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So Joab and the people who were with him drew near before the Syrians for battle, and they fled before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And when the Ammonites saw that the Syrians fled, they likewise fled before Abishai, Joab''s brother, and entered into the city [Medeba]. Then Joab came to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When the Syrians saw that they were defeated by Israel, they sent messengers and drew forth the Syrians who were beyond the Euphrates River, with Shophach the commander of the army of Hadadezer at their head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' It was told to David, and he gathered all Israel and crossed the Jordan and drew up his army against them. So when David set the battle in array against the Syrians, they fought with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But the Syrians fled before Israel, and David slew of the Syrians 7,000 men in chariots and 40,000 foot soldiers, and killed Shophach the commander of the army.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' When the servants of Hadadezer saw that they were defeated before Israel, they made peace with David and became subject to him; nor would the Syrians any longer help the Ammonites.'
