document_id: LEV.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Moreover, you shall say to the Israelites, Any one of the Israelites or of the strangers that sojourn in Israel who gives any of his children to Molech [the fire god worshiped with human sacrifices] shall surely be put to death; the people of the land shall stone him with stones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I also will set My face against that man [opposing him, withdrawing My protection from him, and excluding him from My covenant] and will cut him off from among his people, because he has given of his children to Molech, defiling My sanctuary and profaning My holy name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And if the people of the land do at all hide their eyes from the man when he gives one of his children [as a burnt offering] to Molech [the fire god] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they overlook it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' neglect to take legal action to punish him, winking at his sin, and do not kill him [as My law requires],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then I will set My face against that man and against his family and will cut him off from among their people, him and all who follow him to [unfaithfulness to Me, and thus] play the harlot after Molech.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The person who turns to those who have familiar spirits and to wizards, [being unfaithful to Israel''s Maker Who is her Husband, and thus] playing the harlot after them, I will set My face against that person and will cut him off from among his people [that he may not be included in the atonement made for them]. [Isa. 54:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Consecrate yourselves therefore, and be holy; for I am the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And you shall keep My statutes and do them. I am the Lord Who sanctifies you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Everyone who curses his father or mother shall surely be put to death; he has cursed his father or mother; his bloodguilt is upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The man who commits adultery with another''s wife, even his neighbor''s wife, the adulterer and the adulteress shall surely be put to death. [John 8:4-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the man who lies carnally with his father''s wife has uncovered his father''s nakedness; both of the guilty ones shall surely be put to death; their blood shall be upon their own heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And if a man lies carnally with his daughter-in-law, both of them shall surely be put to death; they have wrought confusion, perversion, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defilement; their blood shall be upon their own heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' If a man lies with a male as if he were a woman, both men have committed an offense (something perverse, unnatural, abhorrent, and detestable); they shall surely be put to death; their blood shall be upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And if a man takes a wife and her mother, it is wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an outrageous offense; all three shall be burned with fire, both he and they [after being stoned to death], that there be no wickedness among you. [Josh. 7:15, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And if a man lies carnally with a beast, he shall surely be [stoned] to death, and you shall slay the beast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' If a woman approaches any beast and lies carnally with it, you shall [stone] the woman and the beast; they shall surely be put to death; their blood is upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' If a man takes his sister, his father''s or his mother''s daughter, and sees her nakedness and she sees his nakedness, it is a wicked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shameful thing; and they shall be cut off in the sight of their people; he has had sexual relations with his sister; he shall bear his iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And if a man shall lie with a woman having her menstrual pains and shall uncover her nakedness, he has made naked her fountain, and she has uncovered the fountain of her blood; and both of them shall be cut off from among their people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You shall not uncover the nakedness of your mother''s sister or of your father''s sister, for that is to make naked his close kin; they shall bear their iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And if a man shall lie carnally with his uncle''s wife, he has uncovered his uncle''s nakedness; they shall bear their sin; they shall die childless [not literally, but in a legal sense].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And if a man shall take his brother''s wife, it is impurity; he has uncovered his brother''s nakedness; they shall be childless [not literally, but in a legal sense].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' You shall therefore keep all My statutes and all My ordinances and do them, that the land where I am bringing you to dwell may not vomit you out [as it did those before you]. [Lev. 18:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' You shall not walk in the customs of the nation which I am casting out before you; for they did all these things, and therefore I was wearied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grieved by them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But I have said to you, You shall inherit their land, and I will give it to you to possess, a land flowing with milk and honey. I am the Lord your God, Who has separated you from the peoples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' You shall therefore make a distinction between the clean beast and the unclean, and between the unclean fowl and the clean; and you shall not make yourselves detestable with beast or with bird or with anything with which the ground teems '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' that creeps, which I have set apart from you as unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And you shall be holy to Me; for I the Lord am holy, and have separated you from the peoples, that you should be Mine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' A man or woman who is a medium '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has a familiar spirit or is a wizard shall surely be put to death, be stoned with stones; their blood shall be upon them.'
