document_id: ECC.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' A GOOD name is better than precious perfume, and the day of death better than the day of one''s birth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' It is better to go to the house of mourning than to go to the house of feasting, for that is the end of all men; and the living will lay it to heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Sorrow is better than laughter, for by the sadness of the countenance the heart is made better '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gains gladness. [II Cor. 7:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The heart of the wise is in the house of mourning, but the heart of fools is in the house of mirth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sensual joy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' It is better for a man to hear the rebuke of the wise than to hear the song of fools.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For like the crackling of thorns under a pot, so is the laughter of the fool. This also is vanity (emptiness, falsity, and futility)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Surely oppression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extortion make a wise man foolish, and a bribe destroys the understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judgment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Better is the end of a thing than the beginning of it, and the patient in spirit is better than the proud in spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Do not be quick in spirit to be angry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vexed, for anger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vexation lodge in the bosom of fools. [James 1:19, 20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Do not say, Why were the old days better than these? For it is not wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' because of wisdom that you ask this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Wisdom is as good as an inheritance, yes, more excellent it is for those [the living] who see the sun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For wisdom is a defense even as money is a defense, but the excellency of knowledge is that wisdom shields '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preserves the life of him who has it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Consider the work of God: who can make straight what He has made crooked?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' In the day of prosperity be joyful, but in the day of adversity consider that God has made the one side by side with the other, so that man may not find out anything that shall be after him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I have seen everything in the days of my vanity (my emptiness, falsity, vainglory, and futility): there is a righteous man who perishes in his righteousness, and there is a wicked man who prolongs his life in [spite of] his evildoing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Be not [morbidly exacting and externally] righteous overmuch, neither strive to make yourself [pretentiously appear] overwise–why should you [get puffed up and] destroy yourself [with presumptuous self-sufficiency]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' [Although all have sinned] be not wicked overmuch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' willfully, neither be foolish–why should you die before your time?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' It is good that you should take hold of this and from that withdraw not your hand; for he who [reverently] fears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worships God will come forth from them all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [True] wisdom is a strength to the wise man more than ten rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' valiant generals who are in the city. [Ps. 127:1; II Tim. 3:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Surely there is not a righteous man upon earth who does good and never sins. [Isa. 53:6; Rom. 3:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Do not give heed to everything that is said, lest you hear your servant cursing you–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For often your own heart knows that you have likewise cursed others.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' All this have I tried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proved by wisdom. I said, I will be wise [independently of God]–but it was far from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' That which is is far off, and that which is deep is very deep–who can find it out [true wisdom independent of the fear of God]? [Job 28:12-28; I Cor. 2:9-16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' I turned about [penitent] and my heart was set to know and to search out and to seek [true] wisdom and the reason of things, and to know that wickedness is folly and that foolishness is madness [and what had led me into such wickedness and madness].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And I found that [of all sinful follies none has been so ruinous in seducing one away from God as idolatrous women] more bitter than death is the woman whose heart is snares and nets and whose hands are bands. Whoever pleases God shall escape from her, but the sinner shall be taken by her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Behold, this I have found, says the Preacher, while weighing one thing after another to find out the right estimate [and the reason]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Which I am still seeking but have not found–one upright man among a thousand have I found, but an upright woman among all those [one thousand in my harem] have I not found. [I Kings 11:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Behold, this is the only [reason for it that] I have found: God made man upright, but they [men and women] have sought out many devices [for evil].'
