document_id: PSA.29,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David.
  - type: text
    content: ' ASCRIBE TO the Lord, O sons of the mighty, ascribe to the Lord glory and strength.'
  '10':
  - type: text
    content: ' The Lord sat as King over the deluge; the Lord [still] sits as King [and] forever!'
  '11':
  - type: text
    content: ' The Lord will give [unyielding and impenetrable] strength to His people; the Lord will bless His people with peace.'
  '2':
  - type: text
    content: ' Give to the Lord the glory due to His name; worship the Lord in the beauty of holiness '
  - type: text
    content: or
  - type: text
    content: ' in holy array.'
  '3':
  - type: text
    content: ' The voice of the Lord is upon the waters; the God of glory thunders; the Lord is upon many (great) waters.'
  '4':
  - type: text
    content: ' The voice of the Lord is powerful; the voice of the Lord is full of majesty.'
  '5':
  - type: text
    content: ' The voice of the Lord breaks the cedars; yes, the Lord breaks in pieces the cedars of Lebanon.'
  '6':
  - type: text
    content: ' He makes them also to skip like a calf; Lebanon and Sirion (Mount Hermon) like a young, wild ox.'
  '7':
  - type: text
    content: ' The voice of the Lord splits '
  - type: text
    content: and
  - type: text
    content: ' flashes forth forked lightning.'
  '8':
  - type: text
    content: ' The voice of the Lord makes the wilderness tremble; the Lord shakes the Wilderness of Kadesh.'
  '9':
  - type: text
    content: ' The voice of the Lord makes the hinds bring forth their young, and His voice strips bare the forests, while in His temple everyone is saying, Glory!'
