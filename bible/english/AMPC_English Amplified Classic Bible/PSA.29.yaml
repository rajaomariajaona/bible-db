document_id: PSA.29,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' ASCRIBE TO the Lord, O sons of the mighty, ascribe to the Lord glory and strength.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord sat as King over the deluge; the Lord [still] sits as King [and] forever!'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord will give [unyielding and impenetrable] strength to His people; the Lord will bless His people with peace.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Give to the Lord the glory due to His name; worship the Lord in the beauty of holiness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' in holy array.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The voice of the Lord is upon the waters; the God of glory thunders; the Lord is upon many (great) waters.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The voice of the Lord is powerful; the voice of the Lord is full of majesty.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The voice of the Lord breaks the cedars; yes, the Lord breaks in pieces the cedars of Lebanon.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He makes them also to skip like a calf; Lebanon and Sirion (Mount Hermon) like a young, wild ox.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The voice of the Lord splits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' flashes forth forked lightning.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The voice of the Lord makes the wilderness tremble; the Lord shakes the Wilderness of Kadesh.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The voice of the Lord makes the hinds bring forth their young, and His voice strips bare the forests, while in His temple everyone is saying, Glory!'
