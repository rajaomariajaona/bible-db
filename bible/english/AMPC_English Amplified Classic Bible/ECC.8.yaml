document_id: ECC.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHO IS like the wise man? And who knows the interpretation of a thing? A man''s wisdom makes his face shine, and the hardness of his countenance is changed.'
  '10':
  - type: text
    content: ' And so I saw the wicked buried–those who had come and gone out of the holy place [but did not thereby escape their doom], and they are [praised and] forgotten in the city where they had done such things. This also is vanity (emptiness, falsity, vainglory, and futility)!'
  '11':
  - type: text
    content: ' Because the sentence against an evil work is not executed speedily, the hearts of the sons of men are fully set to do evil.'
  '12':
  - type: text
    content: ' Though a sinner does evil a hundred times and his days [seemingly] are prolonged [in his wickedness], yet surely I know that it will be well with those who [reverently] fear God, who revere '
  - type: text
    content: and
  - type: text
    content: ' worship Him, realizing His continual presence. [Ps. 37:11, 18, 19; Isa. 3:10, 11; Matt. 25:34.]'
  '13':
  - type: text
    content: ' But it will not be well with the wicked, neither will he prolong his days like a shadow, because he does not [reverently] fear '
  - type: text
    content: and
  - type: text
    content: ' worship God. [Matt. 25:41.]'
  '14':
  - type: text
    content: ' Here also is a futility that goes on upon the earth: there are righteous men who fare as though they were wicked, and wicked men who fare as though they were righteous. I say that this also is vanity (emptiness, falsity, and futility)!'
  '15':
  - type: text
    content: ' Then I commended enjoyment, because a man has no better thing under the sun [without God] than to eat and to drink and to be joyful, for that will remain with him in his toil through the days of his life which God gives him under the sun.'
  '16':
  - type: text
    content: ' When I applied my mind to know wisdom and to see the business activity '
  - type: text
    content: and
  - type: text
    content: ' the painful effort that take place upon the earth–how neither day nor night some men''s eyes sleep–'
  '17':
  - type: text
    content: ' Then I saw all the work of God, that man cannot find out the work that is done under the sun–because however much a man may toil in seeking, yet he will not find it out; yes, more than that, though a wise man thinks '
  - type: text
    content: and
  - type: text
    content: ' claims he knows, yet will he not be able to find it out. [Deut. 29:29; Rom. 11:33.]'
  '2':
  - type: text
    content: ' I counsel you to keep the king''s command, and that in regard to the oath of God [by which you swore to him loyalty]. [II Sam. 21:7.]'
  '3':
  - type: text
    content: ' Be not panic-stricken '
  - type: text
    content: and
  - type: text
    content: ' hasty to get out of his presence. Persist not in an evil thing, for he does whatever he pleases.'
  '4':
  - type: text
    content: ' For the word of a king is authority '
  - type: text
    content: and
  - type: text
    content: ' power, and who can say to him, What are you doing?'
  '5':
  - type: text
    content: ' Whoever observes the [king''s] command will experience no harm, and a wise man''s mind will know both when and what to do.'
  '6':
  - type: text
    content: ' For every purpose '
  - type: text
    content: and
  - type: text
    content: ' matter has its [right] time and judgment, although the misery '
  - type: text
    content: and
  - type: text
    content: ' wickedness of man lies heavily upon him [who rebels against the king].'
  '7':
  - type: text
    content: ' For he does not know what is to be, for who can tell him how '
  - type: text
    content: and
  - type: text
    content: ' when it will be?'
  '8':
  - type: text
    content: ' There is no man who has power over the spirit to retain the breath of life, neither has he power over the day of death; and there is no discharge in battle [against death], neither will wickedness deliver those who are its possessors '
  - type: text
    content: and
  - type: text
    content: ' given to it.'
  '9':
  - type: text
    content: ' All this have I seen while applying my mind to every work that is done under the sun. There is a time in which one man has power over another to his own hurt '
  - type: text
    content: or
  - type: text
    content: ' to the other man''s.'
