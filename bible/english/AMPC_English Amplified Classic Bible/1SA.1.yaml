document_id: 1SA.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THERE WAS a certain man of Ramathaim-zophim, of the hill country of Ephraim, named Elkanah son of Jeroham, the son of Elihu, the son of Tohu, the son of Zuph, an Ephraimite.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And [Hannah] was in distress of soul, praying to the Lord and weeping bitterly.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' She vowed, saying, O Lord of hosts, if You will indeed look on the affliction of Your handmaid and [earnestly] remember, and not forget Your handmaid but will give me a son, I will give him to the Lord all his life; no razor shall touch his head.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And as she continued praying before the Lord, Eli noticed her mouth.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Hannah was speaking in her heart; only her lips moved but her voice was not heard. So Eli thought she was drunk.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Eli said to her, How long will you be intoxicated? Put wine away from you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But Hannah answered, No, my lord, I am a woman of a sorrowful spirit. I have drunk neither wine nor strong drink, but I was pouring out my soul before the Lord. [Gen. 19:34.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Regard not your handmaid as a wicked woman; for out of my great complaint and bitter provocation I have been speaking.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Then Eli said, Go in peace, and may the God of Israel grant your petition which you have asked of Him.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Hannah said, Let your handmaid find grace in your sight. So [she] went her way and ate, her countenance no longer sad.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The family rose early the next morning, worshiped before the Lord, and returned to their home in Ramah. Elkanah knew Hannah his wife, and the Lord remembered her.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He had two wives, one named Hannah and the other named Peninnah. Peninnah had children, but Hannah had none.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Hannah became pregnant and in due time bore a son and named him Samuel [heard of God], Because, she said, I have asked him of the Lord.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And Elkanah and all his house went up to offer to the Lord the yearly sacrifice and pay his vow.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But Hannah did not go, for she said to her husband, I will not go until the child is weaned, and then I will bring him, that he may appear before the Lord and remain there as long as he lives.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Elkanah her husband said to her, Do what seems best to you. Wait until you have weaned him; only may the Lord establish His word. So Hannah remained and nursed her son until she weaned him.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' When she had weaned him, she took him with her, with a three-year-old bull, an ephah of flour, and a skin bottle of wine [to pour over the burnt offering for a sweet odor], and brought Samuel to the Lord''s house in Shiloh. The child was growing.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Then they slew the bull, and brought the child to Eli.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Hannah said, Oh, my lord! As your soul lives, my lord, I am the woman who stood by you here praying to the Lord.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' For this child I prayed, and the Lord has granted my petition made to Him.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Therefore I have given him to the Lord; as long as he lives he is given to the Lord. And they worshiped the Lord there.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' This man went from his city year by year to worship and sacrifice to the Lord of hosts at Shiloh, where Hophni and Phinehas, the two sons of Eli, were the Lord''s priests.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' When the day came that Elkanah sacrificed, he would give to Peninnah his wife and all her sons and daughters portions [of the sacrificial meat].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' But to Hannah he gave a double portion, for he loved Hannah, but the Lord had given her no children.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' [This embarrassed and grieved Hannah] and her rival provoked her greatly to vex her, because the Lord had left her childless.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' So it was year after year; whenever Hannah went up to the Lord''s house, Peninnah provoked her, so she wept and did not eat.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then Elkanah her husband said to her, Hannah, why do you cry? And why do you not eat? And why are you grieving? Am I not more to you than ten sons?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' So Hannah rose after they had eaten and drunk in Shiloh. Now Eli the priest was sitting on his seat beside a post of the temple (tent) of the Lord.'
