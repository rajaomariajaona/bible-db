document_id: EXO.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW MOSES kept the flock of Jethro his father-in-law, the priest of Midian; and he led the flock to the back '
  - type: text
    content: or
  - type: text
    content: ' west side of the wilderness and came to Horeb '
  - type: text
    content: or
  - type: text
    content: ' Sinai, the mountain of God.'
  '10':
  - type: text
    content: ' Come now therefore, and I will send you to Pharaoh, that you may bring forth My people, the Israelites, out of Egypt.'
  '11':
  - type: text
    content: ' And Moses said to God, Who am I, that I should go to Pharaoh and bring the Israelites out of Egypt?'
  '12':
  - type: text
    content: ' God said, I will surely be with you; and this shall be the sign to you that I have sent you: when you have brought the people out of Egypt, you shall serve God on this mountain [Horeb, or Sinai].'
  '13':
  - type: text
    content: ' And Moses said to God, Behold, when I come to the Israelites and say to them, The God of your fathers has sent me to you, and they say to me, What is His name? What shall I say to them?'
  '14':
  - type: text
    content: ' And God said to Moses, I AM WHO I AM '
  - type: text
    content: and
  - type: text
    content: ' WHAT I AM, '
  - type: text
    content: and
  - type: text
    content: ' I WILL BE WHAT I WILL BE; and He said, You shall say this to the Israelites: I AM has sent me to you!'
  '15':
  - type: text
    content: ' God said also to Moses, This shall you say to the Israelites: The Lord, the God of your fathers, of Abraham, of Isaac, and of Jacob, has sent me to you! This is My name forever, and by this name I am to be remembered to all generations.'
  '16':
  - type: text
    content: ' Go, gather the elders of Israel together [the mature teachers and tribal leaders], and say to them, The Lord God of your fathers, the God of Abraham, of Isaac, and of Jacob, appeared to me, saying, I have surely visited you and seen that which is done to you in Egypt;'
  '17':
  - type: text
    content: ' And I have declared that I will bring you up out of the affliction of Egypt to the land of the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and the Jebusite, to a land flowing with milk and honey.'
  '18':
  - type: text
    content: ' And [the elders] shall believe '
  - type: text
    content: and
  - type: text
    content: ' obey your voice; and you shall go, you and the elders of Israel, to the king of Egypt and you shall say to him, The Lord, the God of the Hebrews, has met with us; and now let us go, we beseech you, three days'' journey into the wilderness, that we may sacrifice to the Lord our God.'
  '19':
  - type: text
    content: ' And I know that the king of Egypt will not let you go [unless forced to do so], no, not by a mighty hand.'
  '2':
  - type: text
    content: ' The Angel of the Lord appeared to him in a flame of fire out of the midst of a bush; and he looked, and behold, the bush burned with fire, yet was not consumed.'
  '20':
  - type: text
    content: ' So I will stretch out My hand and smite Egypt with all My wonders which I will do in it; and after that he will let you go.'
  '21':
  - type: text
    content: ' And I will give this people favor '
  - type: text
    content: and
  - type: text
    content: ' respect in the sight of the Egyptians; and it shall be that when you go, you shall not go empty-handed.'
  '22':
  - type: text
    content: ' But every woman shall [insistently] solicit of her neighbor and of her that may be residing at her house jewels and articles of silver and gold, and garments, which you shall put on your sons and daughters; and you shall strip the Egyptians [of belongings due to you].'
  '3':
  - type: text
    content: ' And Moses said, I will now turn aside and see this great sight, why the bush is not burned.'
  '4':
  - type: text
    content: ' And when the Lord saw that he turned aside to see, God called to him out of the midst of the bush and said, Moses, Moses! And he said, Here am I.'
  '5':
  - type: text
    content: ' God said, Do not come near; put your shoes off your feet, for the place on which you stand is holy ground.'
  '6':
  - type: text
    content: ' Also He said, I am the God of your father, the God of Abraham, the God of Isaac, and the God of Jacob. And Moses hid his face, for he was afraid to look at God.'
  '7':
  - type: text
    content: ' And the Lord said, I have surely seen the affliction of My people who are in Egypt, and have heard their cry because of their taskmasters '
  - type: text
    content: and
  - type: text
    content: ' oppressors; for I know their sorrows '
  - type: text
    content: and
  - type: text
    content: ' sufferings '
  - type: text
    content: and
  - type: text
    content: ' trials.'
  '8':
  - type: text
    content: ' And I have come down to deliver them out of the hand '
  - type: text
    content: and
  - type: text
    content: ' power of the Egyptians and to bring them up out of that land to a land good and large, a land flowing with milk and honey [a land of plenty]–to the place of the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and the Jebusite.'
  '9':
  - type: text
    content: ' Now behold, the cry of the Israelites has come to Me, and I have also seen how the Egyptians oppress them.'
