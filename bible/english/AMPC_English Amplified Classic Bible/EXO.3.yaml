document_id: EXO.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW MOSES kept the flock of Jethro his father-in-law, the priest of Midian; and he led the flock to the back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' west side of the wilderness and came to Horeb '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Sinai, the mountain of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Angel of the Lord appeared to him in a flame of fire out of the midst of a bush; and he looked, and behold, the bush burned with fire, yet was not consumed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Moses said, I will now turn aside and see this great sight, why the bush is not burned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And when the Lord saw that he turned aside to see, God called to him out of the midst of the bush and said, Moses, Moses! And he said, Here am I.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' God said, Do not come near; put your shoes off your feet, for the place on which you stand is holy ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Also He said, I am the God of your father, the God of Abraham, the God of Isaac, and the God of Jacob. And Moses hid his face, for he was afraid to look at God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the Lord said, I have surely seen the affliction of My people who are in Egypt, and have heard their cry because of their taskmasters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressors; for I know their sorrows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sufferings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trials.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I have come down to deliver them out of the hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power of the Egyptians and to bring them up out of that land to a land good and large, a land flowing with milk and honey [a land of plenty]–to the place of the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and the Jebusite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Now behold, the cry of the Israelites has come to Me, and I have also seen how the Egyptians oppress them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Come now therefore, and I will send you to Pharaoh, that you may bring forth My people, the Israelites, out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Moses said to God, Who am I, that I should go to Pharaoh and bring the Israelites out of Egypt?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' God said, I will surely be with you; and this shall be the sign to you that I have sent you: when you have brought the people out of Egypt, you shall serve God on this mountain [Horeb, or Sinai].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Moses said to God, Behold, when I come to the Israelites and say to them, The God of your fathers has sent me to you, and they say to me, What is His name? What shall I say to them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And God said to Moses, I AM WHO I AM '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' WHAT I AM, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I WILL BE WHAT I WILL BE; and He said, You shall say this to the Israelites: I AM has sent me to you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' God said also to Moses, This shall you say to the Israelites: The Lord, the God of your fathers, of Abraham, of Isaac, and of Jacob, has sent me to you! This is My name forever, and by this name I am to be remembered to all generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Go, gather the elders of Israel together [the mature teachers and tribal leaders], and say to them, The Lord God of your fathers, the God of Abraham, of Isaac, and of Jacob, appeared to me, saying, I have surely visited you and seen that which is done to you in Egypt;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And I have declared that I will bring you up out of the affliction of Egypt to the land of the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and the Jebusite, to a land flowing with milk and honey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And [the elders] shall believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey your voice; and you shall go, you and the elders of Israel, to the king of Egypt and you shall say to him, The Lord, the God of the Hebrews, has met with us; and now let us go, we beseech you, three days'' journey into the wilderness, that we may sacrifice to the Lord our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And I know that the king of Egypt will not let you go [unless forced to do so], no, not by a mighty hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' So I will stretch out My hand and smite Egypt with all My wonders which I will do in it; and after that he will let you go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And I will give this people favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' respect in the sight of the Egyptians; and it shall be that when you go, you shall not go empty-handed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But every woman shall [insistently] solicit of her neighbor and of her that may be residing at her house jewels and articles of silver and gold, and garments, which you shall put on your sons and daughters; and you shall strip the Egyptians [of belongings due to you].'
