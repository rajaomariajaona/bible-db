verses:
  '1':
  - type: text
    content: ' THEN FROM Jerusalem came scribes and Pharisees and said,'
  '10':
  - type: text
    content: ' And Jesus called the people to Him and said to them, Listen and grasp '
  - type: text
    content: and
  - type: text
    content: ' comprehend this:'
  '11':
  - type: text
    content: ' It is not what goes into the mouth of a man that makes him unclean '
  - type: text
    content: and
  - type: text
    content: ' defiled, but what comes out of the mouth; this makes a man unclean '
  - type: text
    content: and
  - type: text
    content: ' defiles [him].'
  '12':
  - type: text
    content: ' Then the disciples came and said to Him, Do You know that the Pharisees were displeased '
  - type: text
    content: and
  - type: text
    content: ' offended '
  - type: text
    content: and
  - type: text
    content: ' indignant when they heard this saying?'
  '13':
  - type: text
    content: ' He answered, Every plant which My heavenly Father has not planted will be torn up by the roots. [Isa. 60:21.]'
  '14':
  - type: text
    content: ' Let them alone '
  - type: text
    content: and
  - type: text
    content: ' disregard them; they are blind guides '
  - type: text
    content: and
  - type: text
    content: ' teachers. And if a blind man leads a blind man, both will fall into a ditch.'
  '15':
  - type: text
    content: ' But Peter said to Him, Explain this proverb (this maxim) to us.'
  '16':
  - type: text
    content: ' And He said, Are you also even yet dull '
  - type: text
    content: and
  - type: text
    content: ' ignorant [without understanding and unable to put things together]?'
  '17':
  - type: text
    content: ' Do you not see '
  - type: text
    content: and
  - type: text
    content: ' understand that whatever goes into the mouth passes into the abdomen and so passes on into the place where discharges are deposited?'
  '18':
  - type: text
    content: ' But whatever comes out of the mouth comes from the heart, and this is what makes a man unclean '
  - type: text
    content: and
  - type: text
    content: ' defiles [him].'
  '19':
  - type: text
    content: ' For out of the heart come evil thoughts (reasonings and disputings and designs) such as murder, adultery, sexual vice, theft, false witnessing, slander, '
  - type: text
    content: and
  - type: text
    content: ' irreverent speech.'
  '2':
  - type: text
    content: ' Why do Your disciples transgress '
  - type: text
    content: and
  - type: text
    content: ' violate the rules handed down by the elders of the past? For they do not practice [ceremonially] washing their hands before they eat.'
  '20':
  - type: text
    content: ' These are what make a man unclean '
  - type: text
    content: and
  - type: text
    content: ' defile [him]; but eating with unwashed hands does not make him unclean '
  - type: text
    content: or
  - type: text
    content: ' defile [him].'
  '21':
  - type: text
    content: ' And going away from there, Jesus withdrew to the district of Tyre and Sidon.'
  '22':
  - type: text
    content: ' And behold, a woman who was a Canaanite from that district came out and, with a [loud, troublesomely urgent] cry, begged, Have mercy on me, O Lord, Son of David! My daughter is miserably '
  - type: text
    content: and
  - type: text
    content: ' distressingly '
  - type: text
    content: and
  - type: text
    content: ' cruelly possessed by a demon!'
  '23':
  - type: text
    content: ' But He did not answer her a word. And His disciples came and implored Him, saying, Send her away, for she is crying out after us.'
  '24':
  - type: text
    content: ' He answered, I was sent only to the lost sheep of the house of Israel.'
  '25':
  - type: text
    content: ' But she came and, kneeling, worshiped Him and kept praying, Lord, help me!'
  '26':
  - type: text
    content: ' And He answered, It is not right (proper, becoming, or fair) to take the children''s bread and throw it to the little dogs.'
  '27':
  - type: text
    content: ' She said, Yes, Lord, yet even the little pups (little whelps) eat the crumbs that fall from their [young] masters'' table.'
  '28':
  - type: text
    content: ' Then Jesus answered her, O woman, great is your faith! Be it done for you as you wish. And her daughter was cured from that moment.'
  '29':
  - type: text
    content: ' And Jesus went on from there and passed along the shore of the Sea of Galilee. Then He went up into the hills and kept sitting there.'
  '3':
  - type: text
    content: ' He replied to them, And why also do you transgress '
  - type: text
    content: and
  - type: text
    content: ' violate the commandment of God for the sake of the rules handed down to you by your forefathers (the elders)?'
  '30':
  - type: text
    content: ' And a great multitude came to Him, bringing with them the lame, the maimed, the blind, the dumb, and many others, and they put them down at His feet; and He cured them,'
  '31':
  - type: text
    content: ' So that the crowd was amazed when they saw the dumb speaking, the maimed made whole, the lame walking, and the blind seeing; and they recognized '
  - type: text
    content: and
  - type: text
    content: ' praised '
  - type: text
    content: and
  - type: text
    content: ' thanked '
  - type: text
    content: and
  - type: text
    content: ' glorified the God of Israel.'
  '32':
  - type: text
    content: ' Then Jesus called His disciples to Him and said, I have pity '
  - type: text
    content: and
  - type: text
    content: ' sympathy '
  - type: text
    content: and
  - type: text
    content: ' am deeply moved for the crowd, because they have been with Me now three days and they have nothing [at all left] to eat; and I am not willing to send them away hungry, lest they faint '
  - type: text
    content: or
  - type: text
    content: ' become exhausted on the way.'
  '33':
  - type: text
    content: ' And the disciples said to Him, Where are we to get bread sufficient to feed so great a crowd in this isolated '
  - type: text
    content: and
  - type: text
    content: ' desert place?'
  '34':
  - type: text
    content: ' And Jesus asked them, How many loaves of bread do you have? They replied, Seven, and a few small fish.'
  '35':
  - type: text
    content: ' And ordering the crowd to recline on the ground,'
  '36':
  - type: text
    content: ' He took the seven loaves and the fish, and when He had given thanks, He broke them and gave them to the disciples, and the disciples gave them to the people.'
  '37':
  - type: text
    content: ' And they all ate and were satisfied. And they gathered up seven [large provision] baskets full of the broken pieces that were left over.'
  '38':
  - type: text
    content: ' Those who ate were 4,000 men, not including the women and the children.'
  '39':
  - type: text
    content: ' Then He dismissed the crowds, got into the boat, and went to the district of Magadan.'
  '4':
  - type: text
    content: ' For God commanded, Honor your father and your mother, and, He who curses '
  - type: text
    content: or
  - type: text
    content: ' reviles '
  - type: text
    content: or
  - type: text
    content: ' speaks evil of '
  - type: text
    content: or
  - type: text
    content: ' abuses '
  - type: text
    content: or
  - type: text
    content: ' treats improperly his father or mother, let him surely come to his end by death. [Exod. 20:12; 21:17; Lev. 20:9; Deut. 5:16.]'
  '5':
  - type: text
    content: ' But you say, If anyone tells his father or mother, What you would have gained from me [that is, the money and whatever I have that might be used for helping you] is already dedicated as a gift to God, then he is exempt '
  - type: text
    content: and
  - type: text
    content: ' no longer under obligation to honor '
  - type: text
    content: and
  - type: text
    content: ' help his father '
  - type: text
    content: or his mother.
  '6':
  - type: text
    content: ' So for the sake of your tradition (the rules handed down by your forefathers), you have set aside the Word of God [depriving it of force and authority and making it of no effect].'
  '7':
  - type: text
    content: ' You pretenders (hypocrites)! Admirably '
  - type: text
    content: and
  - type: text
    content: ' truly did Isaiah prophesy of you when he said:'
  '8':
  - type: text
    content: ' These people '
  - type: text
    content: draw near Me with their mouths and
  - type: text
    content: ' honor Me with their lips, but their hearts hold off '
  - type: text
    content: and
  - type: text
    content: ' are far away from Me.'
  '9':
  - type: text
    content: ' Uselessly do they worship Me, for they teach as doctrines the commands of men. [Isa. 29:13.]'
