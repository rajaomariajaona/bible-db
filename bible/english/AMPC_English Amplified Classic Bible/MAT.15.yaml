document_id: MAT.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN FROM Jerusalem came scribes and Pharisees and said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Why do Your disciples transgress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violate the rules handed down by the elders of the past? For they do not practice [ceremonially] washing their hands before they eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He replied to them, And why also do you transgress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violate the commandment of God for the sake of the rules handed down to you by your forefathers (the elders)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For God commanded, Honor your father and your mother, and, He who curses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reviles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' speaks evil of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' abuses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' treats improperly his father or mother, let him surely come to his end by death. [Exod. 20:12; 21:17; Lev. 20:9; Deut. 5:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But you say, If anyone tells his father or mother, What you would have gained from me [that is, the money and whatever I have that might be used for helping you] is already dedicated as a gift to God, then he is exempt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' no longer under obligation to honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' help his father '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or his mother.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So for the sake of your tradition (the rules handed down by your forefathers), you have set aside the Word of God [depriving it of force and authority and making it of no effect].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You pretenders (hypocrites)! Admirably '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' truly did Isaiah prophesy of you when he said:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' These people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: draw near Me with their mouths and
  - type: text
    text: ' honor Me with their lips, but their hearts hold off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are far away from Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Uselessly do they worship Me, for they teach as doctrines the commands of men. [Isa. 29:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And Jesus called the people to Him and said to them, Listen and grasp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comprehend this:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' It is not what goes into the mouth of a man that makes him unclean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defiled, but what comes out of the mouth; this makes a man unclean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defiles [him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then the disciples came and said to Him, Do You know that the Pharisees were displeased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignant when they heard this saying?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He answered, Every plant which My heavenly Father has not planted will be torn up by the roots. [Isa. 60:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Let them alone '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disregard them; they are blind guides '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' teachers. And if a blind man leads a blind man, both will fall into a ditch.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But Peter said to Him, Explain this proverb (this maxim) to us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And He said, Are you also even yet dull '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ignorant [without understanding and unable to put things together]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Do you not see '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand that whatever goes into the mouth passes into the abdomen and so passes on into the place where discharges are deposited?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But whatever comes out of the mouth comes from the heart, and this is what makes a man unclean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defiles [him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For out of the heart come evil thoughts (reasonings and disputings and designs) such as murder, adultery, sexual vice, theft, false witnessing, slander, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' irreverent speech.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' These are what make a man unclean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defile [him]; but eating with unwashed hands does not make him unclean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' defile [him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And going away from there, Jesus withdrew to the district of Tyre and Sidon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And behold, a woman who was a Canaanite from that district came out and, with a [loud, troublesomely urgent] cry, begged, Have mercy on me, O Lord, Son of David! My daughter is miserably '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distressingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cruelly possessed by a demon!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But He did not answer her a word. And His disciples came and implored Him, saying, Send her away, for she is crying out after us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' He answered, I was sent only to the lost sheep of the house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But she came and, kneeling, worshiped Him and kept praying, Lord, help me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And He answered, It is not right (proper, becoming, or fair) to take the children''s bread and throw it to the little dogs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' She said, Yes, Lord, yet even the little pups (little whelps) eat the crumbs that fall from their [young] masters'' table.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then Jesus answered her, O woman, great is your faith! Be it done for you as you wish. And her daughter was cured from that moment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And Jesus went on from there and passed along the shore of the Sea of Galilee. Then He went up into the hills and kept sitting there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And a great multitude came to Him, bringing with them the lame, the maimed, the blind, the dumb, and many others, and they put them down at His feet; and He cured them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So that the crowd was amazed when they saw the dumb speaking, the maimed made whole, the lame walking, and the blind seeing; and they recognized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorified the God of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Then Jesus called His disciples to Him and said, I have pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sympathy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' am deeply moved for the crowd, because they have been with Me now three days and they have nothing [at all left] to eat; and I am not willing to send them away hungry, lest they faint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' become exhausted on the way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And the disciples said to Him, Where are we to get bread sufficient to feed so great a crowd in this isolated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desert place?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And Jesus asked them, How many loaves of bread do you have? They replied, Seven, and a few small fish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And ordering the crowd to recline on the ground,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' He took the seven loaves and the fish, and when He had given thanks, He broke them and gave them to the disciples, and the disciples gave them to the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And they all ate and were satisfied. And they gathered up seven [large provision] baskets full of the broken pieces that were left over.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Those who ate were 4,000 men, not including the women and the children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Then He dismissed the crowds, got into the boat, and went to the district of Magadan.'
