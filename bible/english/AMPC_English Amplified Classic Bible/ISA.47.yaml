document_id: ISA.47
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' COME DOWN, and sit in the dust, O Virgin Daughter of Babylon; sit on the ground [in abject humiliation]; there is no throne for you, O Daughter of the Chaldeans, for you shall no longer be called dainty and delicate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Take the millstones [like the poorest female slave of the household does] and grind meal; take off your veil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncover your hair. Remove your skirt, bare your leg, wade through the rivers [at the command of your captors].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Your nakedness shall be exposed, and your shame shall be seen. I will take vengeance, and I will spare no man [none I encounter will be able to resist Me],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [Says] our Redeemer–the Lord of hosts is His name–the Holy One of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Sit in silence and go into darkness, O Daughter of the Chaldeans; for you shall no more be called the lady '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mistress of kingdoms.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I was angry with My people, I profaned My inheritance [Judah]; and I gave them into your hand [Babylon]. You showed them no mercy; upon the old people you made your yoke very heavy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And you said, I shall be the mistress forever! So you did not lay these things to heart, nor did you [seriously] remember the certain, ultimate end of such conduct.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Therefore now, hear this, you who love pleasures '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are given over to them, you who dwell safely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sit securely, who say in your mind, I am [the mistress] and there is no one else besides me. I shall not sit as a widow, nor shall I know the loss of children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But these two things shall come to you in a moment, in one day: loss of children and widowhood. They shall come upon you in full measure, in spite of the multitude of [your claims to] power given you by the assistance of evil spirits, in spite of the great abundance of your enchantments. [Rev. 18:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For you [Babylon] have trusted in your wickedness; you have said, No one sees me. Your wisdom and your knowledge led you astray, and you said in your heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mind, I am, and there is no one besides me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Therefore shall evil come upon you; you shall not know the dawning of it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' how to charm it away. And a disaster '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil shall fall upon you that you shall not be able to atone for [with all your offerings to your gods]; and desolation shall come upon you suddenly, about which you shall know nothing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' how to avert it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Persist, then, with your enchantments and the multitude of your sorceries [Babylon], in which you have labored from your youth; and see if perhaps you will be able to profit, if you will prevail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strike terror!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You are wearied with your many counsels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plans. Let now the astrologers, the stargazers, and the monthly prognosticators stand up and make known to you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' save you from the things that shall come upon you [Babylon].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Behold, they are like stubble; the fire consumes them. They cannot even deliver themselves from the power of the flame [much less deliver the nation]. There is no coal for warming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fire before which to sit!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Such to you shall they [the astrologers and their kind] be, those with whom you have labored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' such their fate, those who have done business with you from your youth; they will wander, every one to his own quarter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in his own direction. No one will save you.'
