document_id: ISA.47,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' COME DOWN, and sit in the dust, O Virgin Daughter of Babylon; sit on the ground [in abject humiliation]; there is no throne for you, O Daughter of the Chaldeans, for you shall no longer be called dainty and delicate.'
  '10':
  - type: text
    content: ' For you [Babylon] have trusted in your wickedness; you have said, No one sees me. Your wisdom and your knowledge led you astray, and you said in your heart '
  - type: text
    content: and
  - type: text
    content: ' mind, I am, and there is no one besides me.'
  '11':
  - type: text
    content: ' Therefore shall evil come upon you; you shall not know the dawning of it '
  - type: text
    content: or
  - type: text
    content: ' how to charm it away. And a disaster '
  - type: text
    content: and
  - type: text
    content: ' evil shall fall upon you that you shall not be able to atone for [with all your offerings to your gods]; and desolation shall come upon you suddenly, about which you shall know nothing '
  - type: text
    content: or
  - type: text
    content: ' how to avert it.'
  '12':
  - type: text
    content: ' Persist, then, with your enchantments and the multitude of your sorceries [Babylon], in which you have labored from your youth; and see if perhaps you will be able to profit, if you will prevail '
  - type: text
    content: and
  - type: text
    content: ' strike terror!'
  '13':
  - type: text
    content: ' You are wearied with your many counsels '
  - type: text
    content: and
  - type: text
    content: ' plans. Let now the astrologers, the stargazers, and the monthly prognosticators stand up and make known to you '
  - type: text
    content: and
  - type: text
    content: ' save you from the things that shall come upon you [Babylon].'
  '14':
  - type: text
    content: ' Behold, they are like stubble; the fire consumes them. They cannot even deliver themselves from the power of the flame [much less deliver the nation]. There is no coal for warming '
  - type: text
    content: or
  - type: text
    content: ' fire before which to sit!'
  '15':
  - type: text
    content: ' Such to you shall they [the astrologers and their kind] be, those with whom you have labored '
  - type: text
    content: and
  - type: text
    content: ' such their fate, those who have done business with you from your youth; they will wander, every one to his own quarter '
  - type: text
    content: and
  - type: text
    content: ' in his own direction. No one will save you.'
  '2':
  - type: text
    content: ' Take the millstones [like the poorest female slave of the household does] and grind meal; take off your veil '
  - type: text
    content: and
  - type: text
    content: ' uncover your hair. Remove your skirt, bare your leg, wade through the rivers [at the command of your captors].'
  '3':
  - type: text
    content: ' Your nakedness shall be exposed, and your shame shall be seen. I will take vengeance, and I will spare no man [none I encounter will be able to resist Me],'
  '4':
  - type: text
    content: ' [Says] our Redeemer–the Lord of hosts is His name–the Holy One of Israel.'
  '5':
  - type: text
    content: ' Sit in silence and go into darkness, O Daughter of the Chaldeans; for you shall no more be called the lady '
  - type: text
    content: and
  - type: text
    content: ' mistress of kingdoms.'
  '6':
  - type: text
    content: ' I was angry with My people, I profaned My inheritance [Judah]; and I gave them into your hand [Babylon]. You showed them no mercy; upon the old people you made your yoke very heavy.'
  '7':
  - type: text
    content: ' And you said, I shall be the mistress forever! So you did not lay these things to heart, nor did you [seriously] remember the certain, ultimate end of such conduct.'
  '8':
  - type: text
    content: ' Therefore now, hear this, you who love pleasures '
  - type: text
    content: and
  - type: text
    content: ' are given over to them, you who dwell safely '
  - type: text
    content: and
  - type: text
    content: ' sit securely, who say in your mind, I am [the mistress] and there is no one else besides me. I shall not sit as a widow, nor shall I know the loss of children.'
  '9':
  - type: text
    content: ' But these two things shall come to you in a moment, in one day: loss of children and widowhood. They shall come upon you in full measure, in spite of the multitude of [your claims to] power given you by the assistance of evil spirits, in spite of the great abundance of your enchantments. [Rev. 18:7, 8.]'
