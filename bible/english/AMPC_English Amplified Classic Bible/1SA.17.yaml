document_id: 1SA.17,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW THE Philistines gathered their armies for battle and were assembled at Socoh, which belongs to Judah, and encamped between Socoh and Azekah in Ephes-dammim.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Philistine said, I defy the ranks of Israel this day; give me a man, that we may fight together.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Saul and all Israel heard those words of the Philistine, they were dismayed and greatly afraid.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David was the son of an Ephrathite of Bethlehem in Judah named Jesse, who had eight sons. [Jesse] in the days of Saul was old, advanced in years.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [His] three eldest sons had followed Saul into battle. Their names were Eliab the firstborn; next, Abinadab; and third, Shammah.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David was the youngest. The three eldest followed Saul,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But David went back and forth from Saul to feed his father''s sheep at Bethlehem.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Philistine came out morning and evening, presenting himself for forty days.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jesse said to David his son, Take for your brothers an ephah of this parched grain and these ten loaves and carry them quickly to your brothers at the camp.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also take these ten cheeses to the commander of their thousand. See how your brothers fare and bring some token from them.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now Saul and the brothers and all the men of Israel were in the Valley of Elah, fighting with the Philistines.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Saul and the men of Israel were encamped in the Valley of Elah and drew up in battle array against the Philistines.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So David rose up early next morning, left the sheep with a keeper, took the provisions, and went, as Jesse had commanded him. And he came to the encampment as the host going forth to the battleground shouted the battle cry.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Israel and the Philistines put the battle in array, army against army.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David left his packages in the care of the baggage keeper and ran into the ranks and came and greeted his brothers.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As they talked, behold, Goliath, the champion, the Philistine of Gath, came forth from the Philistine ranks and spoke the same words as before, and David heard him.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all the men of Israel, when they saw the man, fled from him, terrified.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Israelites said, Have you seen this man who has come out? Surely he has come out to defy Israel; and the man who kills him the king will enrich with great riches, and will give him his daughter and make his father''s house free [from taxes and service] in Israel.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David said to the men standing by him, What shall be done for the man who kills this Philistine and takes away the reproach from Israel? For who is this uncircumcised Philistine that he should defy the armies of the living God?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the [men] told him, Thus shall it be done for the man who kills him.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now Eliab his eldest brother heard what he said to the men; and Eliab''s anger was kindled against David and he said, Why did you come here? With whom have you left those few sheep in the wilderness? I know your presumption and evilness of heart; for you came down that you might see the battle.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David said, What have I done now? Was it not a harmless question?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Philistines stood on a mountain on one side and Israel stood on a mountain on the other side, with the valley between them.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David turned away from Eliab to another and he asked the same question, and again the men gave him the same answer.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When David''s words were heard, they were repeated to Saul, and he sent for him.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David said to Saul, Let no man''s heart fail because of this Philistine; your servant will go out and fight with him.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Saul said to David, You are not able to go to fight against this Philistine. You are only an adolescent, and he has been a warrior from his youth.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David said to Saul, Your servant kept his father''s sheep. And when there came a lion or again a bear and took a lamb out of the flock,'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I went out after it and smote it and delivered the lamb out of its mouth; and when it arose against me, I caught it by its beard and smote it and killed it.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your servant killed both the lion and the bear; and this uncircumcised Philistine shall be like one of them, for he has defied the armies of the living God!'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David said, The Lord Who delivered me out of the paw of the lion and out of the paw of the bear, He will deliver me out of the hand of this Philistine. And Saul said to David, Go, and the Lord be with you!'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Saul clothed David with his armor; he put a bronze helmet on his head and clothed him with a coat of mail.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David girded his sword over his armor. Then he tried to go, but could not, for he was not used to it. And David said to Saul, I cannot go with these, for I am not used to them. And David took them off.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And a champion went out of the camp of the Philistines named Goliath of Gath, whose height was six cubits and a span [almost ten feet].'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then he took his staff in his hand and chose five smooth stones out of the brook and put them in his shepherd''s [lunch] bag [a whole kid''s skin slung from his shoulder], in his pouch, and his sling was in his hand, and he drew near the Philistine.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Philistine came on and drew near to David, the man who bore the shield going before him.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the Philistine looked around and saw David, he scorned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' despised him, for he was but an adolescent, with a healthy reddish color and a fair face.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Philistine said to David, Am I a dog, that you should come to me with sticks? And the Philistine cursed David by his gods.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Philistine said to David, Come to me, and I will give your flesh to the birds of the air and the beasts of the field.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then said David to the Philistine, You come to me with a sword, a spear, and a javelin, but I come to you in the name of the Lord of hosts, the God of the ranks of Israel, Whom you have defied.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This day the Lord will deliver you into my hand, and I will smite you and cut off your head. And I will give the corpses of the army of the Philistines this day to the birds of the air and the wild beasts of the earth, that all the earth may know that there is a God in Israel.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all this assembly shall know that the Lord saves not with sword and spear; for the battle is the Lord''s, and He will give you into our hands.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When the Philistine came forward to meet David, David ran quickly toward the battle line to meet the Philistine.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David put his hand into his bag and took out a stone and slung it, and it struck the Philistine, sinking into his forehead, and he fell on his face to the earth.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he had a bronze helmet on his head and wore a coat of mail, and the coat weighed 5,000 shekels of bronze.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So David prevailed over the Philistine with a sling and with a stone, and struck down the Philistine and slew him. But no sword was in David''s hand.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So he ran and stood over the Philistine, took his sword and drew it out of its sheath, and killed him, and cut off his head with it. When the Philistines saw that their mighty champion was dead, they fled.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the men of Israel and Judah rose with a shout and pursued the Philistines as far as Gath and the gates of Ekron. So the wounded Philistines fell along the way from Shaaraim as far as Gath and Ekron.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Israelites returned from their pursuit of the Philistines and plundered their tents.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David took the head of the Philistine and brought it to Jerusalem, but he put his armor in his tent.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Saul saw David go out against the Philistine, he said to Abner, the captain of the host, Abner, whose son is this youth? And Abner said, As your soul lives, O king, I cannot tell.'
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the king said, Inquire whose son the stripling is.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When David returned from killing Goliath the Philistine, Abner brought him before Saul with the head of the Philistine in his hand.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Saul said to him, Whose son are you, young man? And David answered, I am the son of your servant Jesse of Bethlehem.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He had bronze shin armor on his legs and a bronze javelin across his shoulders.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the shaft of his spear was like a weaver''s beam; his spear''s head weighed 600 shekels of iron. And a shield bearer went before him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Goliath stood and shouted to the ranks of Israel, Why have you come out to draw up for battle? Am I not a Philistine, and are you not servants of Saul? Choose a man for yourselves and let him come down to me.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If he is able to fight with me and kill me, then we will be your servants; but if I prevail against him and kill him, then you shall be our servants and serve us.'
