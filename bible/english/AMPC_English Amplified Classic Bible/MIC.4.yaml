document_id: MIC.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' BUT IN the latter days it shall come to pass that the mountain of the house of the Lord shall be established as the highest of the mountains; and it shall be exalted above the hills, and peoples shall flow to it.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Writhe in pain and labor to bring forth, O Daughter of Zion, like a woman in childbirth; for now you shall go forth out of the city and you shall live in the open country. You shall go to Babylon; there you shall be rescued. There the Lord shall redeem you from the hand of your enemies.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Now many nations are assembled against you, saying, Let her be profaned and let our eyes gaze upon Zion.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But they know not the thoughts of the Lord, neither do they understand His plan, for He shall gather them as the sheaves to the threshing floor.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Arise and thresh, O Daughter of Zion! For I will make your horn iron and I will make your hoofs bronze; you shall beat in pieces many peoples, and I will devote their gain to the Lord and their treasure to the Lord of all the earth. [Zech. 12:1-8; 14:14.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And many nations shall come and say, Come, let us go up to the mountain of the Lord, to the house of the God of Jacob, that He may teach us His ways, and we may walk in His paths. For the law shall go forth out of Zion and the word of the Lord from Jerusalem.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And He shall judge between many peoples and shall decide for strong nations afar off, and they shall beat their swords into plowshares and their spears into pruning hooks; nation shall not lift up sword against nation, neither shall they learn war any more. [Isa. 2:2-4; Joel 3:10.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But they shall sit every man under his vine and under his fig tree, and none shall make them afraid, for the mouth of the Lord of hosts has spoken it. [Zech. 3:10.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For all the peoples [now] walk every man in the name of his god, but we will walk in the name of the Lord our God forever and ever.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' In that day, says the Lord, I will assemble the lame, and I will gather those who have been driven away and those whom I have afflicted.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And I will make the lame a remnant, and those who were cast off a strong nation; and the Lord shall reign over them in Mount Zion from this time forth and forever.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And you, O tower of the flock, the hill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stronghold of the Daughter of Zion, unto you the former dominion shall come, the kingdom of the Daughter of Jerusalem.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Now why do you cry aloud? Is there no king among you? Has your counselor perished, that pains have taken you like a woman in labor?'
