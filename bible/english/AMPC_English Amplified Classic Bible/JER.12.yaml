document_id: JER.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' UNCOMPROMISINGLY RIGHTEOUS '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rigidly just are You, O Lord, when I complain against '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contend with You. Yet let me plead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reason the case with You: Why does the way of the wicked prosper? Why are all they at ease '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thriving who deal very treacherously '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceitfully?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Many shepherds [of an invading host] have destroyed My vineyard, they have trampled My portion underfoot; they have made My pleasant portion a desolate wilderness.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' They have made it a desolation, and desolate it mourns before Me; the whole land has been made desolate, but no man lays it to heart.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Destroyers have come upon all the bare heights in the desert, for the sword of the Lord devours from one end of the land even to the other; no flesh has peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' can find the means to escape.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' They have sown wheat but have reaped thorns; they have worn themselves out but without profit. And they shall be ashamed of your [lack of] harvests '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revenues because of the fierce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glowing anger of the Lord.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Thus says the Lord against all My evil neighbor [nations] who touch the inheritance which I have caused My people Israel to inherit: Behold, I will pluck them up from their land and I will pluck up the house of Judah from among them.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And after I have plucked them up, I will return and have compassion on them and will bring them back again, every man to his heritage and every man to his land.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And if these [neighbor nations] will diligently learn the ways of My people, to swear by My name, saying, As the Lord lives–even as they taught My people to swear by Baal–then will they be built up in the midst of My people.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But if any nation will not hear and obey, I will utterly pluck up and destroy that nation, says the Lord.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' You have planted them, yes, they have taken root; they grow, yes, they bring forth fruit. You are near in their mouths but far from their hearts.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But You, O Lord, know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my devotion to You; You see me and try my heart toward You. [O Lord] pull [these rebellious ones] out like sheep for the slaughter and devote '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prepare them for the day of slaughter.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' How long must the land mourn and the grass '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' herbs of the whole country wither? Through the wickedness of those who dwell in it, the beasts and the birds are consumed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are swept away [by the drought], because men [mocked] me, saying, He shall not [live to] see our final end.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' [But the Lord rebukes Jeremiah''s impatience, saying] If you have raced with men on foot and they have tired you out, then how can you compete with horses? And if [you take to flight] in a land of peace where you feel secure, then what will you do [when you tread the tangled maze of jungle haunted by lions] in the swelling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' flooding of the Jordan?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For even your brethren and the house of your father–even they have dealt treacherously with you; yes, even they are [like a pack of hounds] in full cry after you. Believe them not, though they speak fair words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promise good things to you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' I have forsaken My house, I have cast off My heritage; I have given the dearly beloved of My life into the hands of her enemies.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' My heritage has become to Me like a lion in the forest; she has uttered her voice against Me; therefore I have [treated her as if I] hated her.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Is My heritage to Me like a speckled bird of prey? Are the birds of prey against her round about? Go, assemble all the wild beasts of the field; bring them to devour.'
