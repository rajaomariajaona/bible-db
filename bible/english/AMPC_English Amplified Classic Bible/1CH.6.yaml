document_id: 1CH.6,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE SONS of Levi: Gershom, Kohath, and Merari.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Johanan of Azariah, who was priest in the temple Solomon built in Jerusalem,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Azariah of Amariah, and Amariah of Ahitub,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Ahitub of Zadok, and Zadok of Shallum,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Shallum of Hilkiah, and Hilkiah of Azariah,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Azariah of Seraiah, and Seraiah of Jehozadak;'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Jehozadak went into captivity when the Lord sent Judah and Jerusalem into exile by the hand of Nebuchadnezzar.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The sons of Levi: Gershom, Kohath, and Merari.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' These are the names of the sons of Gershom: Libni and Shimei.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' The sons of Kohath: Amram, Izhar, Hebron, and Uzziel.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The sons of Merari: Mahli and Mushi. These are the families of the Levites according to their fathers:'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The sons of Kohath: Amram, Izhar, Hebron, and Uzziel.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Of Gershom: Libni his son, Jahath his son, Zimmah his son,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Joah his son, Iddo his son, Zerah his son, Jeatherai his son.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' The sons of Kohath: Amminadab his son, Korah his son, Assir his son,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Elkanah his son, Ebiasaph his son, Assir his son,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Tahath his son, Uriel his son, Uzziah his son, and Shaul his son.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And the sons of Elkanah: Amasai, Ahimoth,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Elkanah his son, Zophai his son, Nahath his son,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Eliab his son, Jeroham his son, Elkanah [Samuel''s father] his son.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' The sons of Samuel: the firstborn [Joel] and Abijah.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' The sons of Merari: Mahli, Libni his son, Shimei his son, Uzza his son,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The children of Amram: Aaron, Moses, and Miriam. The sons also of Aaron: Nadab, Abihu, Eleazar, and Ithamar.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Shimea his son, Haggiah his son, Asaiah his son.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' These David put over the service of song in the house of the Lord after the ark of the covenant rested there [after being taken by the Philistines and later placed in the house of Abinadab, where it remained for nearly 100 years during the rest of Samuel''s judgeship and Saul''s entire reign and into David''s reign].'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' They ministered before the tabernacle of the Tent of Meeting with singing until Solomon had built the Lord''s house in Jerusalem, performing their service in due order.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' These and their sons served of the Kohathites: Heman, the singer, the son of Joel, the son of Samuel [the great prophet and judge],'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' The son of Elkanah [III], the son of Jeroham, the son of Eliel, the son of Toah,'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' The son of Zuph, the son of Elkanah [II], the son of Mahath, the son of Amasai,'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' The son of Elkanah [I], the son of Joel, the son of Azariah, the son of Zephaniah,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' The son of Tahath, the son of Assir, the son of Ebiasaph, the son of Korah,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' The son of Izhar, the son of Kohath, the son of Levi, the son of Israel (Jacob).'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Heman''s [tribal] brother Asaph stood at his right hand: Asaph son of Berechiah, the son of Shimea,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Eleazar was the father of Phinehas, Phinehas of Abishua.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' The son of Michael, the son of Baaseiah, the son of Malchijah,'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' The son of Ethni, the son of Zerah, the son of Adaiah,'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' The son of Ethan, the son of Zimmah, the son of Shimei,'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' The son of Jahath, the son of Gershom, the son of Levi.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' Their kinsmen the sons of Merari stood at the left hand: Ethan son of Kishi, the son of Abdi, the son of Malluch,'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' The son of Hashabiah, the son of Amaziah, the son of Hilkiah,'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' The son of Amzi, the son of Bani, the son of Shemer,'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' The son of Mahli, the son of Mushi, the son of Merari, the son of Levi.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' And their brethren the Levites [who were not descended from Aaron] were appointed for all other kinds of service of the tabernacle of the house of God.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' But [the line of] Aaron and his sons offered upon the altar of burnt offering and the altar of incense, ministering for all the work of the Holy of Holies, and to make atonement for Israel, according to all that Moses, God''s servant, had commanded.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Abishua was the father of Bukki, and Bukki of Uzzi,'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' The sons of Aaron: Eleazar his son, Phinehas his son, Abishua his son,'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' Bukki his son, Uzzi his son, Zerahiah his son,'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' Meraioth his son, Amariah his son, Ahitub his son,'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: ' Zadok his son, Ahimaaz his son.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: ' Their dwelling places are according to their settlements within their borders: to the sons of Aaron of the families of the Kohathites, for theirs was the [first] lot–[Josh. 21:10.]'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: ' To them they gave Hebron in the land of Judah and its surrounding suburbs.'
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ' But the fields of the city and its villages they gave to Caleb son of Jephunneh.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: ' To the sons of Aaron they gave the city of refuge, Hebron; also Libnah with its pasturelands, Jattir, Eshtemoa with its pasturelands, [Josh. 21:13.]'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: ' Hilen with its pasturelands, Debir with its pasturelands,'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: ' Ashan with its pasturelands, and Beth-shemesh with its pasturelands.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Uzzi of Zerahiah, and Zerahiah of Meraioth,'
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: ' And out of the tribe of Benjamin: Geba, Alemeth, and Anathoth, with their pasturelands. All their cities according to their families were thirteen.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: ' And to the rest of the Kohathites ten cities were given by lot out of the family of the tribe [of Ephraim and of Dan and], of the half-tribe, the half of Manasseh. [Josh. 21:5.]'
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: ' To the Gershomites, according to their families, [were allotted] thirteen cities out of the tribes of Issachar, Asher, Naphtali, and Manasseh in Bashan.'
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: ' To the Merarites were given by lot, according to their families, twelve cities out of the tribes of Reuben, Gad, and Zebulun.'
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: ' And the Israelites gave to the Levites these cities with their pasturelands.'
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: ' They gave by lot out of the tribes of Judah, Simeon, and Benjamin these cities whose names are mentioned.'
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: ' Some of the families of the Kohathites had cities in the allotted territory out of the tribe of Ephraim.'
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: ' And [the Ephraimites] gave to [the Levites] the city of refuge, Shechem in the hill country of Ephraim; also Gezer, [both] with their suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands;'
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: ' Jokmeam, Beth-horon,'
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: ' Aijalon, and Gath-rimmon, with their suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Meraioth of Amariah, and Amariah of Ahitub,'
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: ' And out of the half-tribe of Manasseh [these cities], with their suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands: Aner and Bileam, for the rest of the families of the sons of Kohath.'
  '71':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: ' To the Gershomites were given out of the half-tribe of Manasseh: Golan in Bashan and Ashtaroth, with their suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands;'
  '72':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: ' Out of the tribe of Issachar, with their suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands: Kedesh, Daberath,'
  '73':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '73'
    - type: text
      text: ' Ramoth, and Anem;'
  '74':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '74'
    - type: text
      text: ' Out of the tribe of Asher, with their suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands: Mashal, Abdon,'
  '75':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '75'
    - type: text
      text: ' Hukok, and Rehob;'
  '76':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '76'
    - type: text
      text: ' And out of the tribe of Naphtali, with their suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands: Kedesh in Galilee, Hammon, and Kiriathaim.'
  '77':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '77'
    - type: text
      text: ' To the rest of the Merarites were given from the tribe of Zebulun: Rimmono and Tabor, with their suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands;'
  '78':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '78'
    - type: text
      text: ' On the other side of the Jordan, on the east side by Jericho, the Levites were given out of the tribe of Reuben [these cities], with their suburbs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pasturelands: Bezer in the wilderness, Jahzah,'
  '79':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '79'
    - type: text
      text: ' Kedemoth, and Mephaath;'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Ahitub of Zadok, and Zadok of Ahimaaz,'
  '80':
  - type: usfm
    marker: p
