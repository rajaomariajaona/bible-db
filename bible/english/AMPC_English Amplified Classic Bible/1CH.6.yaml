document_id: 1CH.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE SONS of Levi: Gershom, Kohath, and Merari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The sons of Kohath: Amram, Izhar, Hebron, and Uzziel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The children of Amram: Aaron, Moses, and Miriam. The sons also of Aaron: Nadab, Abihu, Eleazar, and Ithamar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Eleazar was the father of Phinehas, Phinehas of Abishua.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Abishua was the father of Bukki, and Bukki of Uzzi,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Uzzi of Zerahiah, and Zerahiah of Meraioth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Meraioth of Amariah, and Amariah of Ahitub,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Ahitub of Zadok, and Zadok of Ahimaaz,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Ahimaaz of Azariah, and Azariah of Johanan,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Johanan of Azariah, who was priest in the temple Solomon built in Jerusalem,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Azariah of Amariah, and Amariah of Ahitub,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Ahitub of Zadok, and Zadok of Shallum,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Shallum of Hilkiah, and Hilkiah of Azariah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Azariah of Seraiah, and Seraiah of Jehozadak;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Jehozadak went into captivity when the Lord sent Judah and Jerusalem into exile by the hand of Nebuchadnezzar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The sons of Levi: Gershom, Kohath, and Merari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' These are the names of the sons of Gershom: Libni and Shimei.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The sons of Kohath: Amram, Izhar, Hebron, and Uzziel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The sons of Merari: Mahli and Mushi. These are the families of the Levites according to their fathers:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Of Gershom: Libni his son, Jahath his son, Zimmah his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Joah his son, Iddo his son, Zerah his son, Jeatherai his son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The sons of Kohath: Amminadab his son, Korah his son, Assir his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Elkanah his son, Ebiasaph his son, Assir his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Tahath his son, Uriel his son, Uzziah his son, and Shaul his son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the sons of Elkanah: Amasai, Ahimoth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Elkanah his son, Zophai his son, Nahath his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Eliab his son, Jeroham his son, Elkanah [Samuel''s father] his son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' The sons of Samuel: the firstborn [Joel] and Abijah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The sons of Merari: Mahli, Libni his son, Shimei his son, Uzza his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Shimea his son, Haggiah his son, Asaiah his son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' These David put over the service of song in the house of the Lord after the ark of the covenant rested there [after being taken by the Philistines and later placed in the house of Abinadab, where it remained for nearly 100 years during the rest of Samuel''s judgeship and Saul''s entire reign and into David''s reign].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' They ministered before the tabernacle of the Tent of Meeting with singing until Solomon had built the Lord''s house in Jerusalem, performing their service in due order.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' These and their sons served of the Kohathites: Heman, the singer, the son of Joel, the son of Samuel [the great prophet and judge],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' The son of Elkanah [III], the son of Jeroham, the son of Eliel, the son of Toah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' The son of Zuph, the son of Elkanah [II], the son of Mahath, the son of Amasai,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The son of Elkanah [I], the son of Joel, the son of Azariah, the son of Zephaniah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' The son of Tahath, the son of Assir, the son of Ebiasaph, the son of Korah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' The son of Izhar, the son of Kohath, the son of Levi, the son of Israel (Jacob).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Heman''s [tribal] brother Asaph stood at his right hand: Asaph son of Berechiah, the son of Shimea,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' The son of Michael, the son of Baaseiah, the son of Malchijah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' The son of Ethni, the son of Zerah, the son of Adaiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' The son of Ethan, the son of Zimmah, the son of Shimei,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' The son of Jahath, the son of Gershom, the son of Levi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Their kinsmen the sons of Merari stood at the left hand: Ethan son of Kishi, the son of Abdi, the son of Malluch,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' The son of Hashabiah, the son of Amaziah, the son of Hilkiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' The son of Amzi, the son of Bani, the son of Shemer,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' The son of Mahli, the son of Mushi, the son of Merari, the son of Levi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And their brethren the Levites [who were not descended from Aaron] were appointed for all other kinds of service of the tabernacle of the house of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' But [the line of] Aaron and his sons offered upon the altar of burnt offering and the altar of incense, ministering for all the work of the Holy of Holies, and to make atonement for Israel, according to all that Moses, God''s servant, had commanded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' The sons of Aaron: Eleazar his son, Phinehas his son, Abishua his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' Bukki his son, Uzzi his son, Zerahiah his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' Meraioth his son, Amariah his son, Ahitub his son,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' Zadok his son, Ahimaaz his son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' Their dwelling places are according to their settlements within their borders: to the sons of Aaron of the families of the Kohathites, for theirs was the [first] lot–[Josh. 21:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' To them they gave Hebron in the land of Judah and its surrounding suburbs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' But the fields of the city and its villages they gave to Caleb son of Jephunneh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' To the sons of Aaron they gave the city of refuge, Hebron; also Libnah with its pasturelands, Jattir, Eshtemoa with its pasturelands, [Josh. 21:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' Hilen with its pasturelands, Debir with its pasturelands,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: ' Ashan with its pasturelands, and Beth-shemesh with its pasturelands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: ' And out of the tribe of Benjamin: Geba, Alemeth, and Anathoth, with their pasturelands. All their cities according to their families were thirteen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ' And to the rest of the Kohathites ten cities were given by lot out of the family of the tribe [of Ephraim and of Dan and], of the half-tribe, the half of Manasseh. [Josh. 21:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: ' To the Gershomites, according to their families, [were allotted] thirteen cities out of the tribes of Issachar, Asher, Naphtali, and Manasseh in Bashan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: ' To the Merarites were given by lot, according to their families, twelve cities out of the tribes of Reuben, Gad, and Zebulun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: ' And the Israelites gave to the Levites these cities with their pasturelands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: ' They gave by lot out of the tribes of Judah, Simeon, and Benjamin these cities whose names are mentioned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: ' Some of the families of the Kohathites had cities in the allotted territory out of the tribe of Ephraim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: ' And [the Ephraimites] gave to [the Levites] the city of refuge, Shechem in the hill country of Ephraim; also Gezer, [both] with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: ' Jokmeam, Beth-horon,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: ' Aijalon, and Gath-rimmon, with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: ' And out of the half-tribe of Manasseh [these cities], with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands: Aner and Bileam, for the rest of the families of the sons of Kohath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: ' To the Gershomites were given out of the half-tribe of Manasseh: Golan in Bashan and Ashtaroth, with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: ' Out of the tribe of Issachar, with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands: Kedesh, Daberath,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: ' Ramoth, and Anem;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: ' Out of the tribe of Asher, with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands: Mashal, Abdon,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: ' Hukok, and Rehob;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: ' And out of the tribe of Naphtali, with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands: Kedesh in Galilee, Hammon, and Kiriathaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: ' To the rest of the Merarites were given from the tribe of Zebulun: Rimmono and Tabor, with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: ' On the other side of the Jordan, on the east side by Jericho, the Levites were given out of the tribe of Reuben [these cities], with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands: Bezer in the wilderness, Jahzah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: ' Kedemoth, and Mephaath;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: ' Out of the tribe of Gad [these cities], with their suburbs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasturelands: Ramoth in Gilead, Mahanaim,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '81'
  - type: text
    text: ' Heshbon, and Jazer.'
