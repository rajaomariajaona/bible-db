document_id: ISA.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR THE Lord will have mercy on Jacob [the captive Jews in Babylon] and will again choose Israel and set them in their own land; and foreigners [who are proselytes] will join them and will cleave to the house of Jacob (Israel). [Esth. 8:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the peoples [of Babylonia] shall take them and bring them to their own country [of Judea] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' help restore them. And the house of Israel will possess [the foreigners who prefer to stay with] them in the land of the Lord as male and female servants; and they will take captive [not by physical but by moral might] those whose captives they have been, and they will rule over their [former] oppressors. [Ezra 1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When the Lord has given you rest from your sorrow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pain and from your trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unrest and from the hard service with which you were made to serve,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' You shall take up this [taunting] parable against the king of Babylon and say, How the oppressor has stilled [the restless insolence]! The golden '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exacting city has ceased!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The Lord has broken the staff of the wicked, the scepter of the [tyrant] rulers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Who smote the peoples in anger with incessant blows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trod down the nations in wrath with unrelenting persecution–[until] he who smote is persecuted and no one hinders any more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The whole earth is at rest and is quiet; they break forth into singing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Yes, the fir trees '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cypresses rejoice at you [O kings of Babylon], even the cedars of Lebanon, saying, Since you have been laid low, no woodcutter comes up against us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Sheol (Hades, the place of the dead) below is stirred up to meet you at your coming [O tyrant Babylonian rulers]; it stirs up the shades of the dead to greet you–even all the chief ones of the earth; it raises from their thrones [in astonishment at your humbled condition] all the kings of the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' All of them will [tauntingly] say to you, Have you also become weak as we are? Have you become like us?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Your pomp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnificence are brought down to Sheol (the underworld), along with the sound of your harps; the maggots [which prey upon dead bodies] are spread out under you and worms cover you [O Babylonian rulers].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' How have you fallen from heaven, O light-bringer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' daystar, son of the morning! How you have been cut down to the ground, you who weakened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' laid low the nations [O blasphemous, satanic king of Babylon!]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And you said in your heart, I will ascend to heaven; I will exalt my throne above the stars of God; I will sit upon the mount of assembly in the uttermost north.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I will ascend above the heights of the clouds; I will make myself like the Most High.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Yet you shall be brought down to Sheol (Hades), to the innermost recesses of the pit (the region of the dead).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Those who see you will gaze at you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider you, saying, Is this the man who made the earth tremble, who shook kingdoms?–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Who made the world like a wilderness and overthrew its cities, who would not permit his prisoners to return home?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' All the kings of the nations, all of them lie sleeping in glorious array, each one in his own sepulcher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But you are cast away from your tomb like a loathed growth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' premature birth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' an abominable branch [of the family] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' like the raiment of the slain; and you are clothed with the slain, those thrust through with the sword, who go down to the stones of the pit [into which carcasses are thrown], like a dead body trodden underfoot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You shall not be joined with them in burial, because you have destroyed your land and have slain your people. May the descendants of evildoers nevermore be named!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Prepare a slaughtering place for his sons because of the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' iniquity of their fathers, so that they may not rise, possess the earth, and fill the face of the world with cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And I will rise up against them, says the Lord of hosts, and cut off from Babylon name and remnant, and son and son''s son, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' I will also make it a possession of the hedgehog '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' porcupine, and of marshes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pools of water, and I will sweep it with the broom of destruction, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The Lord of hosts has sworn, saying, Surely, as I have thought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' planned, so shall it come to pass, and as I have purposed, so shall it stand–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' That I will break the Assyrian in My land, and upon My mountains I will tread him underfoot. Then shall the [Assyrian''s] yoke depart from [the people of Judah], and his burden depart from their shoulders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' This is the [Lord''s] purpose that is purposed upon the whole earth [regarded as conquered and put under tribute by Assyria]; and this is [His omnipotent] hand that is stretched out over all the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For the Lord of hosts has purposed, and who can annul it? And His hand is stretched out, and who can turn it back?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' In the year that King Ahaz [of Judah] died there came this mournful, inspired prediction (a burden to be lifted up):'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Rejoice not, O Philistia, all of you, because the rod [of Judah] that smote you is broken; for out of the serpent''s root shall come forth an adder [King Hezekiah of Judah], and its [the serpent''s] offspring will be a fiery, flying serpent. [II Kings 18:1, 3, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And the firstborn of the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the poorest of the poor [of Judah] shall feed on My meadows, and the needy will lie down in safety; but I will kill your root with famine, and your remnant shall be slain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Howl, O gate! Cry, O city! Melt away, O Philistia, all of you! For there is coming a smoke out of the north, and there is no straggler in his ranks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' none stands aloof [in Hezekiah''s battalions].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' What then shall one answer the messengers of the [Philistine] nation? That the Lord has founded Zion, and in her shall the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflicted of His people trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' find refuge.'
