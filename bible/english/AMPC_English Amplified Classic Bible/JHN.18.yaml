document_id: JHN.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HAVING SAID these things, Jesus went out with His disciples beyond (across) the winter torrent of the Kidron [in the ravine]. There was a garden there, which He and His disciples entered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Judas, who was betraying Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delivering Him up, also knew the place, because Jesus had often retired there with His disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So Judas, obtaining '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taking charge of the band of soldiers and some guards (attendants) of the high priests and Pharisees, came there with lanterns and torches and weapons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then Jesus, knowing all that was about to befall Him, went out to them and said, Whom are you seeking? [Whom do you want?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They answered Him, Jesus the Nazarene. Jesus said to them, I am He. Judas, who was betraying Him, was also standing with them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When Jesus said to them, I am He, they went backwards (drew back, lurched backward) and fell to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then again He asked them, Whom are you seeking? And they said, Jesus the Nazarene.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Jesus answered, I told you that I am He. So, if you want Me [if it is only I for Whom you are looking], let these men go their way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Thus what He had said was fulfilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' verified, Of those whom You have given Me, I have not lost even one. [John 6:39; 17:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Simon Peter, who had a sword, drew it and struck the high priest''s servant and cut off his right ear. The servant''s name was Malchus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Therefore, Jesus said to Peter, Put the sword [back] into the sheath! The cup which My Father has given Me, shall I not drink it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' So the troops and their captain and the guards (attendants) of the Jews seized Jesus and bound Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they brought Him first to Annas, for he was the father-in-law of Caiaphas, who was the high priest that year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' It was Caiaphas who had counseled the Jews that it was expedient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for their welfare that one man should die for (instead of, in behalf of) the people. [John 11:49, 50.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now Simon Peter and another disciple were following Jesus. And that disciple was known to the high priest, and so he entered along with Jesus into the court of the palace of the high priest;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But Peter was standing outside at the door. So the other disciple, who was known to the high priest, went out and spoke to the maid who kept the door and brought Peter inside.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then the maid who was in charge at the door said to Peter, You are not also one of the disciples of this Man, are you? He said, I am not!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now the servants and the guards (the attendants) had made a fire of coals, for it was cold, and they were standing and warming themselves. And Peter was with them, standing and warming himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then the high priest questioned Jesus about His disciples and about His teaching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Jesus answered him, I have spoken openly to the world. I have always taught in a synagogue and in the temple [area], where the Jews [habitually] congregate (assemble); and I have spoken nothing secretly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Why do you ask Me? Ask those who have heard [Me] what I said to them. See! They know what I said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But when He said this, one of the attendants who stood by struck Jesus, saying, Is that how You answer the high priest?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Jesus replied, If I have said anything wrong [if I have spoken abusively, if there was evil in what I said] tell what was wrong with it. But if I spoke rightly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' properly, why do you strike Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then Annas sent Him bound to Caiaphas the high priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But Simon Peter [still] was standing and was warming himself. They said to him, You are not also one of His disciples, are you? He denied it and said, I am not!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' One of the high priest''s servants, a relative of the man whose ear Peter cut off, said, Did I not see you in the garden with Him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And again Peter denied it. And immediately a rooster crowed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then they brought Jesus from Caiaphas into the Praetorium (judgment hall, governor''s palace). And it was early. They themselves did not enter the Praetorium, that they might not be defiled (become ceremonially unclean), but might be fit to eat the Passover [supper].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' So Pilate went out to them and said, What accusation do you bring against this Man?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' They retorted, If He were not an evildoer (criminal), we would not have handed Him over to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Pilate said to them, Take Him yourselves and judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sentence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish Him according to your [own] law. The Jews answered, It is not lawful for us to put anyone to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' This was to fulfill the word which Jesus had spoken to show (indicate, predict) by what manner of death He was to die. [John 12:32-34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' So Pilate went back again into the judgment hall and called Jesus and asked Him, Are You the King of the Jews?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Jesus replied, Are you saying this of yourself [on your own initiative], or have others told you about Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Pilate answered, Am I a Jew? Your [own] people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' nation and their chief priests have delivered You to me. What have You done?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Jesus answered, My kingdom (kingship, royal power) belongs not to this world. If My kingdom were of this world, My followers would have been fighting to keep Me from being handed over to the Jews. But as it is, My kingdom is not from here (this world); [it has no such origin or source].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Pilate said to Him, Then You are a King? Jesus answered, You say it! [You speak correctly!] For I am a King. [Certainly I am a King!] This is why I was born, and for this I have come into the world, to bear witness to the Truth. Everyone who is of the Truth [who is a friend of the Truth, who belongs to the Truth] hears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listens to My voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Pilate said to Him, What is Truth? On saying this he went out to the Jews again and told them, I find no fault in Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But it is your custom that I release one [prisoner] for you at the Passover. So shall I release for you the King of the Jews?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Then they all shouted back again, Not Him [not this Man], but Barabbas! Now Barabbas was a robber.'
