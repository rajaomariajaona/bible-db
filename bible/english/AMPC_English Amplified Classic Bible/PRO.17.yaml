document_id: PRO.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BETTER IS a dry morsel with quietness than a house full of feasting [on offered sacrifices] with strife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' A wise servant shall have rule over a son who causes shame, and shall share in the inheritance among the brothers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The refining pot is for silver and the furnace for gold, but the Lord tries the hearts. [Ps. 26:2; Prov. 27:21; Jer. 17:10; Mal. 3:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' An evildoer gives heed to wicked lips; and a liar listens to a mischievous tongue.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Whoever mocks the poor reproaches his Maker, and he who is glad at calamity shall not be held innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' go unpunished. [Job 31:29; Prov. 14:31; Obad. 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Children''s children are the crown of old men, and the glory of children is their fathers. [Ps. 127:3; 128:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Fine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' arrogant speech does not befit [an empty-headed] fool–much less do lying lips befit a prince.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' A bribe is like a bright, precious stone that dazzles the eyes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affects the mind of him who gives it; [as if by magic] he prospers, whichever way he turns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He who covers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forgives an offense seeks love, but he who repeats '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' harps on a matter separates even close friends.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' A reproof enters deeper into a man of understanding than a hundred lashes into a [self-confident] fool. [Isa. 32:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' An evil man seeks only rebellion; therefore a stern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pitiless messenger shall be sent against him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Let [the brute ferocity of] a bear robbed of her whelps meet a man rather than a [self-confident] fool in his folly [when he is in a rage]. [Hos. 13:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Whoever rewards evil for good, evil shall not depart from his house. [Ps. 109:4, 5; Jer. 18:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The beginning of strife is as when water first trickles [from a crack in a dam]; therefore stop contention before it becomes worse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quarreling breaks out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He who justifies the wicked and he who condemns the righteous are both an abomination [exceedingly disgusting and hateful] to the Lord. [Exod. 23:7; Prov. 24:24; Isa. 5:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Of what use is money in the hand of a [self-confident] fool to buy skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly Wisdom–when he has no understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' heart for it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' A friend loves at all times, and is born, as is a brother, for adversity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' A man void of good sense gives a pledge and becomes security for another in the presence of his neighbor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He who loves strife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is quarrelsome loves transgression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' involves himself in guilt; he who raises high his gateway '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is boastful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant invites destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He who has a wayward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crooked mind finds no good, and he who has a willful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contrary tongue will fall into calamity. [James 3:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He who becomes the parent of a [self-confident] fool does it to his sorrow, and the father of [an empty-headed] fool has no joy [in him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' A happy heart is good medicine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a cheerful mind works healing, but a broken spirit dries up the bones. [Prov. 12:25; 15:13, 15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' A wicked man receives a bribe out of the bosom (pocket) to pervert the ways of justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' A man of understanding sets skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly Wisdom before his face, but the eyes of a [self-confident] fool are on the ends of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' A self-confident '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foolish son is a grief to his father and bitterness to her who bore him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Also, to punish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fine the righteous is not good, nor to smite the noble for their uprightness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' He who has knowledge spares his words, and a man of understanding has a cool spirit. [James 1:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Even a fool when he holds his peace is considered wise; when he closes his lips he is esteemed a man of understanding.'
