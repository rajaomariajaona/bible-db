document_id: PRO.17,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BETTER IS a dry morsel with quietness than a house full of feasting [on offered sacrifices] with strife.'
  '10':
  - type: text
    content: ' A reproof enters deeper into a man of understanding than a hundred lashes into a [self-confident] fool. [Isa. 32:6.]'
  '11':
  - type: text
    content: ' An evil man seeks only rebellion; therefore a stern '
  - type: text
    content: and
  - type: text
    content: ' pitiless messenger shall be sent against him.'
  '12':
  - type: text
    content: ' Let [the brute ferocity of] a bear robbed of her whelps meet a man rather than a [self-confident] fool in his folly [when he is in a rage]. [Hos. 13:8.]'
  '13':
  - type: text
    content: ' Whoever rewards evil for good, evil shall not depart from his house. [Ps. 109:4, 5; Jer. 18:20.]'
  '14':
  - type: text
    content: ' The beginning of strife is as when water first trickles [from a crack in a dam]; therefore stop contention before it becomes worse '
  - type: text
    content: and
  - type: text
    content: ' quarreling breaks out.'
  '15':
  - type: text
    content: ' He who justifies the wicked and he who condemns the righteous are both an abomination [exceedingly disgusting and hateful] to the Lord. [Exod. 23:7; Prov. 24:24; Isa. 5:23.]'
  '16':
  - type: text
    content: ' Of what use is money in the hand of a [self-confident] fool to buy skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom–when he has no understanding '
  - type: text
    content: or
  - type: text
    content: ' heart for it?'
  '17':
  - type: text
    content: ' A friend loves at all times, and is born, as is a brother, for adversity.'
  '18':
  - type: text
    content: ' A man void of good sense gives a pledge and becomes security for another in the presence of his neighbor.'
  '19':
  - type: text
    content: ' He who loves strife '
  - type: text
    content: and
  - type: text
    content: ' is quarrelsome loves transgression '
  - type: text
    content: and
  - type: text
    content: ' involves himself in guilt; he who raises high his gateway '
  - type: text
    content: and
  - type: text
    content: ' is boastful '
  - type: text
    content: and
  - type: text
    content: ' arrogant invites destruction.'
  '2':
  - type: text
    content: ' A wise servant shall have rule over a son who causes shame, and shall share in the inheritance among the brothers.'
  '20':
  - type: text
    content: ' He who has a wayward '
  - type: text
    content: and
  - type: text
    content: ' crooked mind finds no good, and he who has a willful '
  - type: text
    content: and
  - type: text
    content: ' contrary tongue will fall into calamity. [James 3:8.]'
  '21':
  - type: text
    content: ' He who becomes the parent of a [self-confident] fool does it to his sorrow, and the father of [an empty-headed] fool has no joy [in him].'
  '22':
  - type: text
    content: ' A happy heart is good medicine '
  - type: text
    content: and
  - type: text
    content: ' a cheerful mind works healing, but a broken spirit dries up the bones. [Prov. 12:25; 15:13, 15.]'
  '23':
  - type: text
    content: ' A wicked man receives a bribe out of the bosom (pocket) to pervert the ways of justice.'
  '24':
  - type: text
    content: ' A man of understanding sets skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom before his face, but the eyes of a [self-confident] fool are on the ends of the earth.'
  '25':
  - type: text
    content: ' A self-confident '
  - type: text
    content: and
  - type: text
    content: ' foolish son is a grief to his father and bitterness to her who bore him.'
  '26':
  - type: text
    content: ' Also, to punish '
  - type: text
    content: or
  - type: text
    content: ' fine the righteous is not good, nor to smite the noble for their uprightness.'
  '27':
  - type: text
    content: ' He who has knowledge spares his words, and a man of understanding has a cool spirit. [James 1:19.]'
  '28':
  - type: text
    content: ' Even a fool when he holds his peace is considered wise; when he closes his lips he is esteemed a man of understanding.'
  '3':
  - type: text
    content: ' The refining pot is for silver and the furnace for gold, but the Lord tries the hearts. [Ps. 26:2; Prov. 27:21; Jer. 17:10; Mal. 3:3.]'
  '4':
  - type: text
    content: ' An evildoer gives heed to wicked lips; and a liar listens to a mischievous tongue.'
  '5':
  - type: text
    content: ' Whoever mocks the poor reproaches his Maker, and he who is glad at calamity shall not be held innocent '
  - type: text
    content: or
  - type: text
    content: ' go unpunished. [Job 31:29; Prov. 14:31; Obad. 12.]'
  '6':
  - type: text
    content: ' Children''s children are the crown of old men, and the glory of children is their fathers. [Ps. 127:3; 128:3.]'
  '7':
  - type: text
    content: ' Fine '
  - type: text
    content: or
  - type: text
    content: ' arrogant speech does not befit [an empty-headed] fool–much less do lying lips befit a prince.'
  '8':
  - type: text
    content: ' A bribe is like a bright, precious stone that dazzles the eyes '
  - type: text
    content: and
  - type: text
    content: ' affects the mind of him who gives it; [as if by magic] he prospers, whichever way he turns.'
  '9':
  - type: text
    content: ' He who covers '
  - type: text
    content: and
  - type: text
    content: ' forgives an offense seeks love, but he who repeats '
  - type: text
    content: or
  - type: text
    content: ' harps on a matter separates even close friends.'
