document_id: JOS.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN ADONI-ZEDEK king of Jerusalem heard how Joshua had taken Ai and had utterly destroyed it, doing to Jericho and its king as he had done to Ai and its king, and how the residents of Gibeon had made peace with Israel and were among them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He feared greatly, because Gibeon was a great city, like one of the royal cities, and because it was greater than Ai, and all its men were mighty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So Adoni-zedek king of Jerusalem sent to Hoham king of Hebron, to Piram king of Jarmuth, to Japhia king of Lachish, and to Debir king of Eglon, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Come up to me and help me, and let us smite Gibeon, for it has made peace with Joshua and with the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the five kings of the Amorites–the kings of Jerusalem, Hebron, Jarmuth, Lachish, and Eglon–gathered their forces and went up with all their armies and encamped before Gibeon to fight against it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the men of Gibeon sent to Joshua at the camp in Gilgal, saying, Do not relax your hand from your servants; come up to us quickly and save us and help us, for all the kings of the Amorites who dwell in the hill country are gathered against us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So Joshua went up from Gilgal, he and all the warriors with him and all the mighty men of valor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Lord said to Joshua, Do not fear them, for I have given them into your hand; there shall not a man of them stand before you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So Joshua came upon them suddenly, having gone up from Gilgal all night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the Lord caused [the enemies] to panic before Israel, who slew them with a great slaughter at Gibeon and chased them along the way that goes up to Beth-horon and smote them as far as Azekah and Makkedah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' As they fled before Israel, while they were descending [the pass] to Beth-horon, the Lord cast great stones from the heavens on them as far as Azekah, killing them. More died because of the hailstones than the Israelites slew with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then Joshua spoke to the Lord on the day when the Lord gave the Amorites over to the Israelites, and he said in the sight of Israel, Sun, be silent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stand still at Gibeon, and you, moon, in the Valley of Ajalon!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the sun stood still, and the moon stayed, until the nation took vengeance upon their enemies. Is not this written in the Book of Jasher? So the sun stood still in the midst of the heavens and did not hasten to go down for about a whole day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' There was no day like it before or since, when the Lord heeded the voice of a man. For the Lord fought for Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then Joshua returned, and all Israel with him, to the camp at Gilgal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Those five kings fled and hid themselves in the cave of Makkedah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And it was told Joshua, The five kings are hidden in the cave at Makkedah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Joshua said, Roll great stones to the cave''s mouth, and set men to guard them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But do not stay. Pursue your enemies and fall upon their rear; do not allow them to enter their cities, for the Lord your God has given them into your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' When Joshua and the Israelites had ended slaying them until they were wiped out and the remnant remaining of them had entered into fortified cities,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' All the people returned to the camp to Joshua at Makkedah in peace; none moved his tongue against any of the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then said Joshua, Open the mouth of the cave and bring out those five kings to me from the cave.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' They brought the five kings out of the cave to him–the kings of Jerusalem, Hebron, Jarmuth, Lachish, and Eglon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' When they brought out those kings to Joshua, [he] called for all the Israelites and told the commanders of the men of war who went with him, Come, put your feet on the necks of these kings. And they came and put their feet on the [kings''] necks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Joshua said to them, Fear not nor be dismayed; be strong and of good courage. For thus shall the Lord do to all your enemies against whom you fight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Afterward Joshua smote and slew them and hanged their bodies on five trees, and they hung on the trees until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' At sunset Joshua ordered and they took the bodies down from the trees and cast them into the cave where the kings had hidden and laid great stones on the cave''s mouth, which remain to this very day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Joshua took Makkedah that day and smote it and its king with the sword and utterly destroyed everyone in it. He left none remaining. And he did to the king of Makkedah as he had done to the king of Jericho. [Josh. 6:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then Joshua and all Israel went from Makkedah to Libnah and attacked Libnah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And the Lord gave it also and its king into Israel''s hands, and Joshua smote it with the sword, and all the people in it. He left none remaining in it. And he did to its king as he had done to the king of Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And Joshua passed from Libnah, and all Israel with him, to Lachish and encamped against it and attacked it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And the Lord delivered Lachish into the hands of Israel, and Joshua took it on the second day and smote it with the sword, and all the people in it, as he had done to Libnah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Then Horam king of Gezer came up to help Lachish, and Joshua smote him and his people–until he had left none remaining.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' From Lachish Joshua and all Israel went on to Eglon, laid siege to it, and attacked it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And they took it that day and smote it with the sword and utterly destroyed all who were in it that day, as he had done to Lachish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Then Joshua with all Israel went up from Eglon to Hebron, and they attacked it'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And took it and smote it with the sword, and its king and all its towns and everyone in it. He left none remaining, as he had done to Eglon, and utterly destroyed it and all its people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And Joshua and all Israel with him returned to Debir and attacked it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And he took it, with its king and all its towns, and they smote them with the sword and utterly destroyed everyone in it. He left none remaining. As he had done to Hebron and to Libnah and its king, so he did to Debir and its king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' So Joshua smote all the land, the hill country, the South, the lowland, and the slopes, and all their kings. He left none remaining, but utterly destroyed all that breathed, as the Lord, the God of Israel, commanded. [Deut. 20:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And Joshua smote them from Kadesh-barnea even to Gaza, and all the country of Goshen even to Gibeon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Joshua took all these kings and their land at one time, because the Lord, the God of Israel, fought for Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And Joshua returned, and all Israel with him, to the camp at Gilgal.'
