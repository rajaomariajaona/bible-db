document_id: EZK.39,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND YOU, son of man, prophesy against Gog, Thus says the Lord God: Behold, I am against you, O Gog, chief prince (ruler) of Rosh, of Meshech, and of Tubal.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' So that My people shall take no firewood out of the field or cut down any out of the forests, for they shall make their fires of the weapons. And they shall despoil those who despoiled them and plunder those who plundered them, says the Lord God.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And in that day, I will give to Gog a place for burial there in Israel, the valley of those who pass through on the east side in front of the [Dead] Sea [the highway between Syria, Petra, and Egypt], and it will delay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stop those who pass through. And there shall they bury Gog and all his multitude, and they shall call it the Valley of Hamon-gog [multitude of Gog].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For seven months the house of Israel will be burying them, that they may cleanse the land.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Yes, all the people of the land will bury them, and it shall bring them renown in the day that I shall be glorified, says the Lord God.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And they shall set apart men to work continually who shall pass through the land, men commissioned to bury, with the help of those who are passing by, those bodies that lie unburied on the face of the ground, in order to cleanse the land. After the end of seven months they shall make their search.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And when these pass through the land and anyone sees a human bone, he shall set up a marker by it as a sign to the buriers, until they have buried it in the Valley of Hamon-gog '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' of Gog''s multitude.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And Hamonah [multitude] shall also be the name of the city [of the dead]. Thus shall they cleanse the land.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And you, son of man, thus says the Lord God: Say to the birds of prey of every sort and to every beast of the field, Assemble yourselves and come, gather from every side to the sacrificial feast that I am preparing for you, even a great sacrificial feast on the mountains of Israel at which you may eat flesh and drink blood.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' You shall eat the flesh of the mighty and drink the blood of the princes of the earth, of rams, of lambs, of goats, and of bullocks, all of them fatlings of Bashan [east of the Jordan].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And you shall eat fat till you are filled and drink blood till you are drunk at the sacrificial feast which I am preparing for you.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And I will turn you about and will lead you on, and will cause you to come up from the uttermost parts of the north and will lead you against the mountains of Israel;'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And you shall be filled at My table with horses and riders, with mighty men, and with soldiers of every kind, says the Lord God.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And I will manifest My honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory among the nations, and all the nations shall see My judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice [in the punishment] which I have executed and My hand which I have laid on them.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' So the house of Israel shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize beyond all question that I am the Lord their God from that day forward.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And the nations shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize positively that the house of Israel went into captivity for their iniquity, because they trespassed against Me; and I hid My face from them. So I gave them into the hand of their enemies and they all fell [into captivity or were slain] by the power of the sword. [Deut. 31:17.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' According to their uncleanness and according to their transgressions I dealt with them and hid My face from them.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Therefore thus says the Lord God: Now will I reverse the captivity of Jacob and have mercy upon the whole house of Israel and will be jealous for My holy name.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' They shall forget their shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-reproach and all their treachery '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unfaithfulness in which they have transgressed against Me, when they dwell securely in their land and there is none who makes them afraid.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' When I have brought them again from the peoples and gathered them out of their enemies'' lands, and My justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' holiness are set apart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindicated through them in the sight of many nations,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Then shall they know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize positively that I am the Lord their God, because I sent them into captivity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exile among the nations and then gathered them to their own land. I will leave none of them remaining among the nations any more [in the latter days].'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Neither will I hide My face any more then from them, when I have poured out My Spirit upon the house of Israel, says the Lord God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And I will smite your bow from your left hand and will cause your arrows to fall out of your right hand.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' You shall fall [dead] upon the mountains of Israel, you and all your hosts and the peoples who are with you. I will give you to the ravenous birds of every sort and to the beasts of the field to be devoured.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' You shall fall in the open field, for I have spoken [it], says the Lord God.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I will send fire on Magog and upon those who dwell securely in the coastlands, and they shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And I will make My holy name known in the midst of My people Israel, and I will not let them profane My holy name any more; and the nations shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord, the Holy One of Israel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Behold, it is coming and it will be done, says the Lord God; that is the day of which I have spoken.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And [when you, Gog, are no longer] they who dwell in the cities of Israel shall go forth and shall set on fire and burn the battle gear, the shields and the bucklers, the bows and the arrows, the handspikes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' riding whips and the spears; and they shall burn them as fuel for seven years,'
