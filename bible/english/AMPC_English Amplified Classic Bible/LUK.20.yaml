document_id: LUK.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ONE DAY as Jesus was instructing the people in the temple [porches] and preaching the good news (the Gospel), the chief priests and the scribes came up with the elders (members of the Sanhedrin)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And said to Him, Tell us by what [sort of] authority You are doing these things? Or who is it who gave You this authority?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He replied to them, I will also ask you a question. Now answer Me:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Was the baptism of John from heaven, or from men?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they argued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discussed [it] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reasoned together with themselves, saying, If we reply, From heaven, He will say, Why then did you not believe him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But if we answer, From men, all the people will stone us to death, for they are long since firmly convinced that John was a prophet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So they replied that they did not know from where it came.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then Jesus said to them, Neither will I tell you by what authority I do these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then He began to relate to the people this parable (this story to figuratively portray what He had to say): A man planted a vineyard and leased it to some vinedressers and went into another country for a long stay. [Isa. 5:1-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When the [right] season came, he sent a bond servant to the tenants, that they might give him [his part] of the fruit of the vineyard; but the tenants beat (thrashed) him and sent him away empty-handed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And he sent still another servant; him they also beat (thrashed) and dishonored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insulted him disgracefully and sent him away empty-handed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And he sent yet a third; this one they wounded and threw out [of the vineyard].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then the owner of the vineyard said, What shall I do? I will send my beloved son; it is probable that they will respect him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But when the tenants saw him, they argued among themselves, saying, This is the heir; let us kill him, so that the inheritance may be ours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So they drove him out of the vineyard and killed him. What then will the owner of the vineyard do to them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He will come and [utterly] put an end to those tenants and will give the vineyard to others. When they [the chief priests and the scribes and the elders] heard this, they said, May it never be!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But [Jesus] looked at them and said, What then is [the meaning of] this that is written: The [very] Stone which the builders rejected has become the chief Stone of the corner [Cornerstone]? [Ps. 118:22, 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Everyone who falls on that Stone will be broken [in pieces]; but upon whomever It falls, It will crush him [winnow him and scatter him as dust]. [Isa. 8:14, 15; Dan. 2:34, 35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The scribes and the chief priests desired '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tried to find a way to arrest Him at that very hour, but they were afraid of the people; for they discerned that He had related this parable against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' So they watched [for an opportunity to ensnare] Him, and sent spies who pretended to be upright (honest and sincere), that they might lay hold of something He might say, so as to turn Him over to the control and authority of the governor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' They asked Him, Teacher, we know that You speak and teach what is right, and that You show no partiality to anyone but teach the way of God honestly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Is it lawful for us to give tribute to Caesar or not?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But He recognized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understood their cunning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unscrupulousness and said to them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Show Me a denarius (a coin)! Whose image and inscription does it have? They answered, Caesar''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' He said to them, Then render to Caesar the things that are Caesar''s, and to God the things that are God''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So they could not in the presence of the people take hold of anything He said to turn it against Him; but marveling at His reply, they were silent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Also there came to Him some Sadducees, those who say that there is no resurrection.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And they asked Him a question, saying, Teacher, Moses wrote for us [a law] that if a man''s brother dies, leaving a wife and no children, the man shall take the woman and raise up offspring for his brother. [Deut. 25:5, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Now there were seven brothers; and the first took a wife and died without [having any] children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And the second'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And then the third took her, and in like manner all seven, and they died, leaving no children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Last of all, the woman died also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Now in the resurrection whose wife will the woman be? For the seven married her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And Jesus said to them, The people of this world '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' present age marry and are given in marriage;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' But those who are considered worthy to gain that other world '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' that future age and to attain to the resurrection from the dead neither marry nor are given in marriage;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' For they cannot die again, but they are angel-like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' equal to angels. And being sons of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sharers in the resurrection, they are sons of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' But that the dead are raised [from death]–even Moses made known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' showed in the passage concerning the [burning] bush, where he calls the Lord, The God of Abraham, the God of Isaac, and the God of Jacob. [Exod. 3:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Now He is not the God of the dead, but of the living, for to Him all men are alive [whether in the body or out of it] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they are alive [not dead] unto Him [in definite relationship to Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And some of the scribes replied, Teacher, you have spoken well '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expertly [so that there is no room for blame].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' For they did not dare to question Him further.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' But He asked them, How can people say that the Christ (the Messiah, the Anointed One) is David''s Son?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' For David himself says in [the] Book of Psalms, The Lord said to my Lord, Sit at My right hand'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Until I make Your enemies a footstool for Your feet. [Ps. 110:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' So David calls Him Lord; how then is He his Son?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And with all the people listening, He said to His disciples,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Beware of the scribes, who like to walk about in long robes and love to be saluted [with honor] in places where people congregate and love the front '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' best seats in the synagogues and places of distinction at feasts,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' Who make away with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devour widows'' houses, and [to cover it up] with pretense make long prayers. They will receive the greater condemnation (the heavier sentence, the severer punishment).'
