document_id: DEU.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THIS is the instruction, the laws, and the precepts which the Lord your God commanded me to teach you, that you might do them in the land to which you go to possess it,'
  '10':
  - type: text
    content: ' And when the Lord your God brings you into the land which He swore to your fathers, to Abraham, Isaac, and Jacob, to give you, with great and goodly cities which you did not build,'
  '11':
  - type: text
    content: ' And houses full of all good things which you did not fill, and cisterns hewn out which you did not hew, and vineyards and olive trees which you did not plant, and when you eat and are full,'
  '12':
  - type: text
    content: ' Then beware lest you forget the Lord, Who brought you out of the land of Egypt, out of the house of bondage.'
  '13':
  - type: text
    content: ' You shall [reverently] fear the Lord your God and serve Him and swear by His name [and presence].'
  '14':
  - type: text
    content: ' You shall not go after other gods, any of the gods of the peoples who are round about you;'
  '15':
  - type: text
    content: ' For the Lord your God in the midst of you is a jealous God; lest the anger of the Lord your God be kindled against you, and He destroy you from the face of the earth.'
  '16':
  - type: text
    content: ' You shall not tempt '
  - type: text
    content: and
  - type: text
    content: ' try the Lord your God as you tempted '
  - type: text
    content: and
  - type: text
    content: ' tried Him in Massah. [Exod. 17:7.]'
  '17':
  - type: text
    content: ' You shall diligently keep the commandments of the Lord your God and His exhortations and His statutes which He commanded you.'
  '18':
  - type: text
    content: ' And you shall do what is right and good in the sight of the Lord, that it may go well with you and that you may go in and possess the good land which the Lord swore to give to your fathers,'
  '19':
  - type: text
    content: ' To cast out all your enemies from before you, as the Lord has promised.'
  '2':
  - type: text
    content: ' That you may [reverently] fear the Lord your God, you and your son and your son''s son, and keep all His statutes and His commandments which I command you all the days of your life, and that your days may be prolonged.'
  '20':
  - type: text
    content: ' When your son asks you in time to come, What is the meaning of the testimonies and statutes and precepts which the Lord our God has commanded you?'
  '21':
  - type: text
    content: ' Then you shall say to your son, We were Pharaoh''s bondmen in Egypt, and the Lord brought us out of Egypt with a mighty hand.'
  '22':
  - type: text
    content: ' And the Lord showed signs and wonders, great and evil, against Egypt, against Pharaoh, and all his household, before our eyes;'
  '23':
  - type: text
    content: ' And He brought us out from there, that He might bring us in to give us the land which He swore to give our fathers.'
  '24':
  - type: text
    content: ' And the Lord commanded us to do all these statutes, to [reverently] fear the Lord our God for our good always, that He might preserve us alive, as it is this day.'
  '25':
  - type: text
    content: ' And it will be accounted as righteousness (conformity to God''s will in word, thought, and action) for us if we are watchful to do all this commandment before the Lord our God, as He has commanded us.'
  '3':
  - type: text
    content: ' Hear therefore, O Israel, and be watchful to do them, that it may be well with you and that you may increase exceedingly, as the Lord, the God of your fathers, has promised you, in a land flowing with milk and honey.'
  '4':
  - type: text
    content: ' Hear, O Israel: the Lord our God is one Lord [the only Lord].'
  '5':
  - type: text
    content: ' And you shall love the Lord your God with all your [mind and] heart and with your entire being and with all your might.'
  '6':
  - type: text
    content: ' And these words which I am commanding you this day shall be [first] in your [own] minds '
  - type: text
    content: and
  - type: text
    content: ' hearts; [then]'
  '7':
  - type: text
    content: ' You shall whet '
  - type: text
    content: and
  - type: text
    content: ' sharpen them so as to make them penetrate, '
  - type: text
    content: and
  - type: text
    content: ' teach '
  - type: text
    content: and
  - type: text
    content: ' impress them diligently upon the [minds and] hearts of your children, and shall talk of them when you sit in your house and when you walk by the way, and when you lie down and when you rise up.'
  '8':
  - type: text
    content: ' And you shall bind them as a sign upon your hand, and they shall be as frontlets (forehead bands) between your eyes.'
  '9':
  - type: text
    content: ' And you shall write them upon the doorposts of your house and on your gates.'
