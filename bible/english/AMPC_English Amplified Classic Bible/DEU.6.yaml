document_id: DEU.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THIS is the instruction, the laws, and the precepts which the Lord your God commanded me to teach you, that you might do them in the land to which you go to possess it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' That you may [reverently] fear the Lord your God, you and your son and your son''s son, and keep all His statutes and His commandments which I command you all the days of your life, and that your days may be prolonged.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Hear therefore, O Israel, and be watchful to do them, that it may be well with you and that you may increase exceedingly, as the Lord, the God of your fathers, has promised you, in a land flowing with milk and honey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Hear, O Israel: the Lord our God is one Lord [the only Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And you shall love the Lord your God with all your [mind and] heart and with your entire being and with all your might.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And these words which I am commanding you this day shall be [first] in your [own] minds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hearts; [then]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You shall whet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sharpen them so as to make them penetrate, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' teach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impress them diligently upon the [minds and] hearts of your children, and shall talk of them when you sit in your house and when you walk by the way, and when you lie down and when you rise up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And you shall bind them as a sign upon your hand, and they shall be as frontlets (forehead bands) between your eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And you shall write them upon the doorposts of your house and on your gates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And when the Lord your God brings you into the land which He swore to your fathers, to Abraham, Isaac, and Jacob, to give you, with great and goodly cities which you did not build,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And houses full of all good things which you did not fill, and cisterns hewn out which you did not hew, and vineyards and olive trees which you did not plant, and when you eat and are full,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then beware lest you forget the Lord, Who brought you out of the land of Egypt, out of the house of bondage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You shall [reverently] fear the Lord your God and serve Him and swear by His name [and presence].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You shall not go after other gods, any of the gods of the peoples who are round about you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For the Lord your God in the midst of you is a jealous God; lest the anger of the Lord your God be kindled against you, and He destroy you from the face of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' You shall not tempt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' try the Lord your God as you tempted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tried Him in Massah. [Exod. 17:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You shall diligently keep the commandments of the Lord your God and His exhortations and His statutes which He commanded you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And you shall do what is right and good in the sight of the Lord, that it may go well with you and that you may go in and possess the good land which the Lord swore to give to your fathers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' To cast out all your enemies from before you, as the Lord has promised.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' When your son asks you in time to come, What is the meaning of the testimonies and statutes and precepts which the Lord our God has commanded you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then you shall say to your son, We were Pharaoh''s bondmen in Egypt, and the Lord brought us out of Egypt with a mighty hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the Lord showed signs and wonders, great and evil, against Egypt, against Pharaoh, and all his household, before our eyes;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And He brought us out from there, that He might bring us in to give us the land which He swore to give our fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the Lord commanded us to do all these statutes, to [reverently] fear the Lord our God for our good always, that He might preserve us alive, as it is this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And it will be accounted as righteousness (conformity to God''s will in word, thought, and action) for us if we are watchful to do all this commandment before the Lord our God, as He has commanded us.'
