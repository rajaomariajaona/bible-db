document_id: PSA.102,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer of the afflicted; when he is overwhelmed {and} faint and pours out his complaint to God.
  - type: text
    content: ' HEAR MY prayer, O Lord, and let my cry come to You.'
  '10':
  - type: text
    content: ' Because of Your indignation and Your wrath, for You have taken me up and cast me away.'
  '11':
  - type: text
    content: ' My days are like an evening shadow that stretches out '
  - type: text
    content: and
  - type: text
    content: ' declines [with the sun]; and I am withered like grass.'
  '12':
  - type: text
    content: ' But You, O Lord, are enthroned forever; and the fame of Your name endures to all generations.'
  '13':
  - type: text
    content: ' You will arise '
  - type: text
    content: and
  - type: text
    content: ' have mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness for Zion, for it is time to have pity '
  - type: text
    content: and
  - type: text
    content: ' compassion for her; yes, the set time has come [the moment designated]. [Ps. 12:5; 119:126.]'
  '14':
  - type: text
    content: ' For Your servants take [melancholy] pleasure in the stones [of her ruins] and show pity for her dust.'
  '15':
  - type: text
    content: ' So the nations shall fear '
  - type: text
    content: and
  - type: text
    content: ' worshipfully revere the name of the Lord, and all the kings of the earth Your glory. [Ps. 96:9.]'
  '16':
  - type: text
    content: ' When the Lord builds up Zion, He will appear in His glory;'
  '17':
  - type: text
    content: ' He will regard the plea of the destitute and will not despise their prayer.'
  '18':
  - type: text
    content: ' Let this be recorded for the generation yet unborn, that a people yet to be created shall praise the Lord.'
  '19':
  - type: text
    content: ' For He looked down from the height of His sanctuary, from heaven did the Lord behold the earth,'
  '2':
  - type: text
    content: ' Hide not Your face from me in the day when I am in distress! Incline Your ear to me; in the day when I call, answer me speedily.'
  '20':
  - type: text
    content: ' To hear the sighing '
  - type: text
    content: and
  - type: text
    content: ' groaning of the prisoner, to loose those who are appointed to death,'
  '21':
  - type: text
    content: ' So that men may declare the name of the Lord in Zion and His praise in Jerusalem'
  '22':
  - type: text
    content: ' When peoples are gathered together, and the kingdoms, to worship '
  - type: text
    content: and
  - type: text
    content: ' serve the Lord.'
  '23':
  - type: text
    content: ' He has afflicted '
  - type: text
    content: and
  - type: text
    content: ' weakened my strength, humbling '
  - type: text
    content: and
  - type: text
    content: ' bringing me low [with sorrow] in the way; He has shortened my days [aging me prematurely].'
  '24':
  - type: text
    content: ' I said, O my God, take me not away in the midst of my days, You Whose years continue throughout all generations.'
  '25':
  - type: text
    content: ' At the beginning You existed '
  - type: text
    content: and
  - type: text
    content: ' laid the foundations of the earth; the heavens are the work of Your hands.'
  '26':
  - type: text
    content: ' They shall perish, but You shall remain '
  - type: text
    content: and
  - type: text
    content: ' endure; yes, all of them shall wear out '
  - type: text
    content: and
  - type: text
    content: ' become old like a garment. Like clothing You shall change them, and they shall be changed '
  - type: text
    content: and
  - type: text
    content: ' pass away.'
  '27':
  - type: text
    content: ' But You remain the same, and Your years shall have no end. [Heb. 1:10-12.]'
  '28':
  - type: text
    content: ' The children of Your servants shall dwell safely '
  - type: text
    content: and
  - type: text
    content: ' continue, and their descendants shall be established before You.'
  '3':
  - type: text
    content: ' For my days consume away like smoke, and my bones burn like a firebrand '
  - type: text
    content: or
  - type: text
    content: ' like a hearth.'
  '4':
  - type: text
    content: ' My heart is smitten like grass and withered, so that [in absorption] I forget to eat my food.'
  '5':
  - type: text
    content: ' By reason of my loud groaning [from suffering and trouble] my flesh cleaves to my bones.'
  '6':
  - type: text
    content: ' I am like a melancholy pelican '
  - type: text
    content: or
  - type: text
    content: ' vulture of the wilderness; I am like a [desolate] owl of the waste places.'
  '7':
  - type: text
    content: ' I am sleepless '
  - type: text
    content: and
  - type: text
    content: ' lie awake [mourning], like a bereaved sparrow alone on the housetop.'
  '8':
  - type: text
    content: ' My adversaries taunt '
  - type: text
    content: and
  - type: text
    content: ' reproach me all the day; and they who are angry with me use my name as a curse.'
  '9':
  - type: text
    content: ' For I have eaten the ashes [in which I sat] as if they were bread and have mingled my drink with weeping'
