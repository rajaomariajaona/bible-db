document_id: PSA.102
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prayer of the afflicted; when he is overwhelmed {and} faint and pours out his complaint to God.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEAR MY prayer, O Lord, and let my cry come to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Hide not Your face from me in the day when I am in distress! Incline Your ear to me; in the day when I call, answer me speedily.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For my days consume away like smoke, and my bones burn like a firebrand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' like a hearth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' My heart is smitten like grass and withered, so that [in absorption] I forget to eat my food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' By reason of my loud groaning [from suffering and trouble] my flesh cleaves to my bones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I am like a melancholy pelican '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vulture of the wilderness; I am like a [desolate] owl of the waste places.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' I am sleepless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lie awake [mourning], like a bereaved sparrow alone on the housetop.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' My adversaries taunt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproach me all the day; and they who are angry with me use my name as a curse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For I have eaten the ashes [in which I sat] as if they were bread and have mingled my drink with weeping'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Because of Your indignation and Your wrath, for You have taken me up and cast me away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' My days are like an evening shadow that stretches out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' declines [with the sun]; and I am withered like grass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But You, O Lord, are enthroned forever; and the fame of Your name endures to all generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You will arise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness for Zion, for it is time to have pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassion for her; yes, the set time has come [the moment designated]. [Ps. 12:5; 119:126.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For Your servants take [melancholy] pleasure in the stones [of her ruins] and show pity for her dust.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So the nations shall fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully revere the name of the Lord, and all the kings of the earth Your glory. [Ps. 96:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When the Lord builds up Zion, He will appear in His glory;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He will regard the plea of the destitute and will not despise their prayer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Let this be recorded for the generation yet unborn, that a people yet to be created shall praise the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For He looked down from the height of His sanctuary, from heaven did the Lord behold the earth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' To hear the sighing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' groaning of the prisoner, to loose those who are appointed to death,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So that men may declare the name of the Lord in Zion and His praise in Jerusalem'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When peoples are gathered together, and the kingdoms, to worship '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' serve the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He has afflicted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weakened my strength, humbling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bringing me low [with sorrow] in the way; He has shortened my days [aging me prematurely].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' I said, O my God, take me not away in the midst of my days, You Whose years continue throughout all generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' At the beginning You existed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' laid the foundations of the earth; the heavens are the work of Your hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' They shall perish, but You shall remain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure; yes, all of them shall wear out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become old like a garment. Like clothing You shall change them, and they shall be changed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pass away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But You remain the same, and Your years shall have no end. [Heb. 1:10-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' The children of Your servants shall dwell safely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continue, and their descendants shall be established before You.'
