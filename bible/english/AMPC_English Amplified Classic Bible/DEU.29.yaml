document_id: DEU.29
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THESE ARE the words of the covenant which the Lord commanded Moses to make with the Israelites in the land of Moab, besides the covenant which He made with them in Horeb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Moses called to all Israel and said to them, You have seen all that the Lord did before your eyes in the land of Egypt to Pharaoh, to all his servants, and to all his land;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The great trials which your eyes saw, the signs, and those great wonders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Yet the Lord has not given you a [mind and] heart to understand and eyes to see and ears to hear, to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I have led you forty years in the wilderness; your clothes have not worn out upon you, and your sandals have not worn off your feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You have not eaten [grain] bread, nor have you drunk wine or strong drink, that you might recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know [your dependence on Him Who is saying], I am the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when you came to this place, Sihon king of Heshbon and Og king of Bashan came out against us to battle, but we defeated them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' We took their land and gave it as an inheritance to the Reubenites, the Gadites, and the half-tribe of the Manassites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Therefore keep the words of this covenant and do them, that you may deal wisely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosper in all that you do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' All of you stand today before the Lord your God–your heads, your tribes, your elders, and your officers, even all the men of Israel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Your little ones, your wives, and the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sojourner in your camp, from the hewer of your wood to the drawer of your water–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' That you may enter into the covenant of the Lord your God, and into His oath which He makes with you today,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' That He may establish you this day as a people for Himself, and that He may be to you a God as He said to you and as He swore to your fathers, Abraham, Isaac, and Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' It is not with you only that I make this sworn covenant'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But with future Israelites who do not stand here with us today before the Lord our God, as well as with those who are here with us this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' You know how we lived in the land of Egypt and how we came through the midst of the nations you crossed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And you have seen their abominations and their idols of wood and stone, of silver and gold, which were among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Beware lest there should be among you a man or woman, or family or tribe, whose [mind and] heart turns away this day from the Lord our God to go and serve the gods of these nations; lest there should be among you a [poisonous] root that bears gall and wormwood,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And lest, when he hears the words of this curse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oath, he flatters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' congratulates himself in his [mind and] heart, saying, I shall have peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' safety, though I walk in the stubbornness of my [mind and] heart [bringing down a hurricane of destruction] and sweep away the watered land with the dry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The Lord will not pardon him, but then the anger of the Lord and His jealousy will smoke against that man, and all the curses that are written in this book shall settle on him; the Lord will blot out his very name from under the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the Lord will single him out for ruin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction from all the tribes of Israel, according to all the curses of the covenant that are written in this Book of the Law,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' So that the next generation, your children who rise up after you, and the foreigner who shall come from a distant land, shall say, when they see the plagues of this land and the diseases with which the Lord has made it sick–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The whole land is brimstone and salt and a burned waste, not sown or bearing anything, where no grass can take root, like the overthrow of Sodom and Gomorrah with Admah and Zeboiim, which the Lord overthrew in His anger and wrath–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Even all the nations shall say, Why has the Lord done thus to this land? What does the heat of this great anger mean?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then men shall say, Because they forsook the covenant of the Lord, the God of their fathers, which He made with them when He brought them forth out of the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For they went and served other gods and worshiped them, gods they knew not and that He had not given to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' So the anger of the Lord was kindled against this land, bringing upon it all the curses that are written in this book.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And the Lord rooted them out of their land in anger and in wrath and in great indignation and cast them into another land, as it is this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The secret things belong unto the Lord our God, but the things which are revealed belong to us and to our children forever, that we may do all of the words of this law.'
