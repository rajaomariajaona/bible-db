document_id: DEU.26
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN YOU have come into the land which the Lord your God gives you as an inheritance and possess it and live in it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You shall take some of the first of all the produce of the soil which you harvest from the land the Lord your God gives you and put it in a basket, and go to the place [the sanctuary] which the Lord your God has chosen as the abiding place for His Name [and His Presence].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And you shall go to the priest who is in office in those days, and say to him, I give thanks this day to the Lord your God that I have come to the land which the Lord swore to our fathers to give us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the priest shall take the basket from your hand and set it down before the altar of the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And you shall say before the Lord your God, A wandering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lost Aramean ready to perish was my father [Jacob], and he went down into Egypt and sojourned there, few in number, and he became there a nation, great, mighty, and numerous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Egyptians treated us very badly and afflicted us and laid upon us hard bondage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when we cried to the Lord, the God of our fathers, the Lord heard our voice and looked on our affliction and our labor and our [cruel] oppression;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Lord brought us forth out of Egypt with a mighty hand and with an outstretched arm, and with great (awesome) power and with signs and with wonders;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And He brought us into this place and gave us this land, a land flowing with milk and honey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And now, behold, I bring the firstfruits of the ground which You, O Lord, have given me. And you shall set it down before the Lord your God and worship before the Lord your God;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And you and the Levite and the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the sojourner among you shall rejoice in all the good which the Lord your God has given you and your household.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When you have finished paying all the tithe of your produce the third year, which is the year of tithing, and have given it to the Levite, the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the sojourner, the fatherless, and to the widow, that they may eat within your towns and be filled,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then you shall say before the Lord your God, I have brought the hallowed things (the tithe) out of my house and moreover have given them to the Levite, to the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the sojourner, to the fatherless, and to the widow, according to all Your commandments which You have commanded me; I have not transgressed any of Your commandments, neither have I forgotten them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I have not eaten of the tithe in my mourning [making the tithe unclean], nor have I handled any of it when I was unclean, nor given any of it to the dead. I have hearkened to the voice of the Lord my God; I have done according to all that You have commanded me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Look down from Your holy habitation, from heaven, and bless Your people Israel and the land which You have given us as You swore to our fathers, a land flowing with milk and honey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' This day the Lord your God has commanded you to do these statutes and ordinances. Therefore you shall keep and do them with all your [mind and] heart and with all your being.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You have [openly] declared the Lord this day to be your God, [pledging] to walk in His ways, to keep His statutes and His commandments and His precepts, and to hearken to His voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the Lord has declared this day that you are His peculiar people as He promised you, and you are to keep all His commandments;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And He will make you high above all nations which He has made, in praise and in fame and in honor, and that you shall be a holy people to the Lord your God, as He has spoken.'
