verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' On the eighth day he shall bring two turtledoves or two young pigeons to the priest to the door of the Tent of Meeting,'
  '11':
  - type: text
    content: ' And the priest shall offer the one for a sin offering and the other for a burnt offering and make atonement for him because he sinned by reason of the dead body. He shall consecrate his head the same day,'
  '12':
  - type: text
    content: ' And he shall consecrate '
  - type: text
    content: and
  - type: text
    content: ' separate himself to the Lord for the days of his separation and shall bring a male lamb a year old for a trespass '
  - type: text
    content: or
  - type: text
    content: ' guilt offering; but the previous days shall be void '
  - type: text
    content: and
  - type: text
    content: ' lost, because his separation was defiled.'
  '13':
  - type: text
    content: ' And this is the law of the Nazirite when the days of his separation '
  - type: text
    content: and
  - type: text
    content: ' abstinence are fulfilled. He shall be brought to the door of the Tent of Meeting,'
  '14':
  - type: text
    content: ' And he shall offer his gift to the Lord, one he-lamb a year old without blemish for a burnt offering, and one ewe lamb a year old without blemish for a sin offering, and one ram without blemish for a peace offering,'
  '15':
  - type: text
    content: ' And a basket of unleavened bread, cakes of fine flour mingled with oil, and wafers of unleavened bread spread with oil, and their cereal offering, and their drink offering.'
  '16':
  - type: text
    content: ' And the priest shall present them before the Lord and shall offer the person''s sin offering and his burnt offering.'
  '17':
  - type: text
    content: ' And he shall offer the ram for a sacrifice of peace offering to the Lord, with the basket of unleavened bread; the priest shall offer also its cereal offering and its drink offering.'
  '18':
  - type: text
    content: ' And the Nazirite shall shave his consecrated head at the door of the Tent of Meeting, and shall take the hair and put it on the fire which is under the sacrifice of the peace offerings.'
  '19':
  - type: text
    content: ' And the priest shall take the boiled shoulder of the ram, and one unleavened cake out of the basket, and one unleavened wafer and shall put them upon the hands of the Nazirite, after he has shaven the hair of his separation '
  - type: text
    content: and
  - type: text
    content: ' abstinence.'
  '2':
  - type: text
    content: ' Say to the Israelites, When either a man or a woman shall make a special vow, the vow of a Nazirite, that is, one separated '
  - type: text
    content: and
  - type: text
    content: ' consecrated to the Lord,'
  '20':
  - type: text
    content: ' And the priest shall wave them for a wave offering before the Lord; they are a holy portion for the priest, with the breast that is waved and the thigh '
  - type: text
    content: or
  - type: text
    content: ' shoulder that is offered; and after that the Nazirite may drink wine.'
  '21':
  - type: text
    content: ' This is the law for the Nazirite who has made a vow. His offering to the Lord, besides what else he is able to afford, shall be according to the vow which he has vowed; so shall he do according to the law for his separation '
  - type: text
    content: and
  - type: text
    content: ' abstinence [as a Nazirite]. [Acts 21:24, 26.]'
  '22':
  - type: text
    content: ' And the Lord said to Moses,'
  '23':
  - type: text
    content: ' Say to Aaron and his sons, This is the way you shall bless the Israelites. Say to them,'
  '24':
  - type: text
    content: ' The Lord bless you and watch, guard, '
  - type: text
    content: and
  - type: text
    content: ' keep you;'
  '25':
  - type: text
    content: ' The Lord make His face to shine upon '
  - type: text
    content: and
  - type: text
    content: ' enlighten you and be gracious (kind, merciful, and giving favor) to you;'
  '26':
  - type: text
    content: ' The Lord lift up His [approving] countenance upon you and give you peace (tranquility of heart and life continually).'
  '27':
  - type: text
    content: ' And they shall put My name upon the Israelites, and I will bless them.'
  '3':
  - type: text
    content: ' He shall separate himself from wine and strong drink; he shall drink no vinegar of wine or of strong drink, and shall drink no grape juice, or eat grapes, fresh or dried. [Luke 1:15.]'
  '4':
  - type: text
    content: ' All the days of his separation he shall eat nothing produced from the grapevine, not even the seeds or the skins.'
  '5':
  - type: text
    content: ' All the days of the vow of his separation '
  - type: text
    content: and
  - type: text
    content: ' abstinence there shall no razor come upon his head. Until the time is completed for which he separates himself to the Lord, he shall be holy, and shall let the locks of the hair of his head grow long.'
  '6':
  - type: text
    content: ' All the days that he separates himself to the Lord he shall not go near a dead body.'
  '7':
  - type: text
    content: ' He shall not make himself unclean for his father, mother, brother, or sister, when they die, because his separation '
  - type: text
    content: and
  - type: text
