  '8':
  - type: text
    content: ' All the days of his separation '
  - type: text
    content: and
  - type: text
    content: ' abstinence he is holy to the Lord.'
  '9':
  - type: text
    content: ' And if any man dies very suddenly beside him, and he has defiled his consecrated head, then he shall shave his head on the day of his cleansing; on the seventh day shall he shave it.'
