document_id: 1SA.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO THE men of Kiriath-jearim came and took the ark of the Lord and brought it into the house of Abinadab on the hill and consecrated Eleazar his son to have charge of the ark of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the ark remained in Kiriath-jearim a very long time [nearly 100 years, through Samuel''s entire judgeship, Saul''s reign, and well into David''s, when it was brought to Jerusalem]. For it was twenty years before all the house of Israel lamented after the Lord. [I Chron. 13:5-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then Samuel said to all the house of Israel, If you are returning to the Lord with all your hearts, then put away the foreign gods and the Ashtaroth [female deities] from among you and direct your hearts to the Lord and serve Him only, and He will deliver you out of the hand of the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So the Israelites put away the Baals and the Ashtaroth, and served the Lord only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Samuel said, Gather all Israel to Mizpah and I will pray to the Lord for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So they gathered at Mizpah and drew water and poured it out before the Lord and fasted on that day and said there, We have sinned against the Lord. And Samuel judged the Israelites at Mizpah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now when the Philistines heard that the Israelites had gathered at Mizpah, the lords of the Philistines went up against Israel. And when the Israelites heard of it, they were afraid of the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Israelites said to Samuel, Do not cease to cry to the Lord our God for us, that He may save us from the hand of the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So Samuel took a sucking lamb and offered it as a whole burnt offering to the Lord; and Samuel cried to the Lord for Israel, and the Lord answered him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' As Samuel was offering up the burnt offering, the Philistines drew near to attack Israel. But the Lord thundered with a great voice that day against the Philistines and threw them into confusion, and they were defeated before Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the men of Israel went out of Mizpah and pursued the Philistines and smote them as far as below Beth-car.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then Samuel took a stone and set it between Mizpah and Shen, and he called the name of it Ebenezer [stone of help], saying, Heretofore the Lord has helped us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So the Philistines were subdued and came no more into Israelite territory. And the hand of the Lord was against the Philistines all the days of Samuel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The cities the Philistines had taken from Israel were restored to Israel, from Ekron to Gath, and Israel rescued [the cities''] territory from the Philistines. There was peace also between Israel and the Amorites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Samuel judged Israel all his days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he went from year to year on a circuit to Bethel, Gilgal, and Mizpah, and was judge for Israel in all those places.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then he would return to Ramah, for his home was there; there he judged Israel, and there he built an altar to the Lord.'
