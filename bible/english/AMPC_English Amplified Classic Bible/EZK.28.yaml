document_id: EZK.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD of the Lord came again to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, say to the prince of Tyre, Thus says the Lord God: Because your heart is lifted up and you have said '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thought, I am a god, I sit in the seat of the gods, in the heart of the seas; yet you are only man [weak, feeble, made of earth] and not God, though you imagine yourself to be almost more than mortal with your mind as the mind of God;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Indeed, you are [imagining yourself] wiser than Daniel; there is no secret [you think] that is hidden from you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' With your own wisdom and with your own understanding you have gotten you riches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power and have brought gold and silver into your treasuries;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' By your great wisdom and by your traffic you have increased your riches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power, and your heart is proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lifted up because of your wealth;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore thus says the Lord God: Because you have imagined your mind as the mind of God [having thoughts and purposes suitable only to God Himself], [Obad. 3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Behold therefore, I am bringing strangers upon you, the most terrible of the nations, and they shall draw their swords against the beauty of your wisdom [O Tyre], and they shall defile your splendor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They shall bring you down to the pit [of destruction] and you shall die the [many] deaths of all the Tyrians that are slain in the heart of the seas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Will you still say, I am a god, before him who slays you? But you are only a man [made of earth] and no god in the hand of him who wounds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profanes you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You shall die the death of the uncircumcised by the hand of strangers, for I have spoken it, says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Moreover, the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Son of man, take up a lamentation over the king of Tyre and say to him, Thus says the Lord God: You are the full measure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pattern of exactness [giving the finishing touch to all that constitutes completeness], full of wisdom and perfect in beauty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You were in Eden, the garden of God; every precious stone was your covering, the carnelian, topaz, jasper, chrysolite, beryl, onyx, sapphire, carbuncle, and emerald; and your settings and your sockets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' engravings were wrought in gold. On the day that you were created they were prepared. [Gen. 3:14, 15; Isa. 14:12-15; Matt. 16:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You were the anointed cherub that covers with overshadowing [wings], and I set you so. You were upon the holy mountain of God; you walked up and down in the midst of the stones of fire [like the paved work of gleaming sapphire stone upon which the God of Israel walked on Mount Sinai]. [Exod. 24:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You were blameless in your ways from the day you were created until iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt were found in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Through the abundance of your commerce you were filled with lawlessness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violence, and you sinned; therefore I cast you out as a profane thing from the mountain of God and the guardian cherub drove you out from the midst of the stones of fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Your heart was proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lifted up because of your beauty; you corrupted your wisdom for the sake of your splendor. I cast you to the ground; I lay you before kings, that they might gaze at you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' You have profaned your sanctuaries by the multitude of your iniquities '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the enormity of your guilt, by the unrighteousness of your trade. Therefore I have brought forth a fire from your midst; it has consumed you, and I have reduced you to ashes upon the earth in the sight of all who looked at you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' All who know you among the people are astonished and appalled at you; you have come to a horrible end and shall never return to being. [Isa. 23; Joel 3:4-8; Amos 1:9, 10; Zech. 9:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Again the word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Son of man, set your face toward Sidon and prophesy against her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And say, Thus says the Lord God: Behold, I am against you, O Sidon, and I will show forth My glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be glorified in the midst of you. And they shall know (understand and realize) that I am the Lord when I execute judgments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishments in her, and am set apart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' separated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' My holiness is manifested in her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For I will send pestilence into her and blood into her streets, and the wounded shall be judged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall by the sword in the midst of her on every side, and they shall know (understand and realize) that I am the Lord [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And there shall be no more a brier to prick the house of Israel or a hurting thorn of all those around them who have treated them with contempt, and they shall know (understand and realize) that I am the Lord God [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Thus says the Lord God: When I gather the house of Israel from the peoples among whom they are scattered, and I shall be set apart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' separated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' My holiness made apparent in them in the sight of the nations, then shall they dwell in their own land which I gave to My servant Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And they shall dwell safely in it and shall build houses and plant vineyards; yes, they shall dwell securely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with confidence when I have executed judgments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishments upon all those round about them who have despised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trodden upon them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pushed them away, and they shall know (understand and realize) that I am the Lord their God [their Sovereign Ruler, Who calls forth loyalty and obedient service].'
