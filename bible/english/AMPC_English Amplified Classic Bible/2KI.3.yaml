document_id: 2KI.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' JORAM SON of Ahab began to reign over Israel in Samaria in the eighteenth year of Jehoshaphat king of Judah, and reigned twelve years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He did evil in the sight of the Lord, but not like his father and mother; for he put away the pillar of Baal that his father had made.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Yet he clung to the sins of Jeroboam son of Nebat, which made Israel to sin; he departed not from them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Mesha king of Moab was a sheepmaster, and paid in tribute to the king of Israel [annually] 100,000 lambs and 100,000 rams, with the wool.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But when Ahab died, the king of Moab rebelled against the king of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So King Joram went out of Samaria at that time and mustered all Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he sent to Jehoshaphat king of Judah, saying, The king of Moab has rebelled against me. Will you go with me to war against Moab? And he said, I will go; I am as you are, my people as your people, my horses as your horses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Joram said, Which way shall we go up? Jehoshaphat answered, The way through the Wilderness of Edom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So the king of Israel went with the king of Judah and the king of Edom. They made a circuit of seven days'' journey, but there was no water for the army or for the animals following them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then the king of Israel said, Alas! The Lord has called [us] three kings together to be delivered into Moab''s hand!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But Jehoshaphat said, Is there no prophet of the Lord here by whom we may inquire of the Lord? One of the king of Israel''s servants answered, Elisha son of Shaphat, who served Elijah, is here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Jehoshaphat said, The word of the Lord is with him. So Joram king of Israel and Jehoshaphat and the king of Edom went down to Elisha.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Elisha said to the king of Israel, What have I to do with you? Go to the prophets of your [wicked] father Ahab and your [wicked] mother Jezebel. But the king of Israel said to him, No, for the Lord has called [us] three kings together to be delivered into the hand of Moab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And Elisha said, As the Lord of hosts lives, before Whom I stand, surely, were it not that I respect the presence of Jehoshaphat king of Judah, I would neither look at you nor see you [King Joram].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But now bring me a minstrel. And while the minstrel played, the hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power of the Lord came upon [Elisha].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he said, Thus says the Lord: Make this [dry] brook bed full of trenches.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For thus says the Lord: You shall not see wind or rain, yet that ravine shall be filled with water, so you, your cattle, and your beasts [of burden] may drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' This is but a light thing in the sight of the Lord. He will deliver the Moabites also into your hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You shall smite every fenced city and every choice city, and shall fell every good tree and stop all wells of water and mar every good piece of land with stones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' In the morning, when the sacrifice was offered, behold, there came water by the way of Edom, and the country was filled with water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' When all the Moabites heard that the kings had come up to fight against them, all who were able to put on armor, young and old, gathered and drew up at the border.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When they rose up early next morning, and the sun shone upon the water, the Moabites saw the water across from them as red as blood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And they said, This is blood; the kings have surely been fighting and have slain one another. Now then, Moab, to the spoil!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But when they came to the camp of Israel, the Israelites rose up and smote the Moabites, so that they fled before them. And they went forward, slaying the Moabites as they went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' They beat down the cities [walls], and on every good piece of land every man cast a stone, covering it [with stones]. And they stopped all the springs of water and felled all the good trees, until only the stones [of the walls of Moab''s capital city] of Kir-hareseth were left standing, and the slingers surrounded and took it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And when the king of Moab saw that the battle was against him, he took with him 700 swordsmen to break through to the king of Edom, but they could not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then he [Moab''s king] took his eldest son, who was to reign in his stead, and offered him for a burnt offering on the wall [in full view of the horrified enemy kings]. And there was great indignation, wrath, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bitterness against Israel; and they [his allies Judah and Edom] withdrew from [Joram] and returned to their own land.'
