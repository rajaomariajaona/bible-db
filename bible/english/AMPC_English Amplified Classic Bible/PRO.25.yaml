document_id: PRO.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THESE ARE also the proverbs of Solomon, which the men of Hezekiah king of Judah copied: [I Kings 4:32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' It is the glory of God to conceal a thing, but the glory of kings is to search out a thing. [Deut. 29:29; Rom. 11:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' As the heavens for height and the earth for depth, so the hearts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' minds of kings are unsearchable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Take away the dross from the silver, and there shall come forth [the material for] a vessel for the silversmith [to work up]. [II Tim. 2:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Take away the wicked from before the king, and his throne will be established in righteousness (moral and spiritual rectitude in every area and relation).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Be not forward (self-assertive and boastfully ambitious) in the presence of the king, and stand not in the place of great men;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For better it is that it should be said to you, Come up here, than that you should be put lower in the presence of the prince, whose eyes have seen you. [Luke 14:8-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Rush not forth soon to quarrel [before magistrates or elsewhere], lest you know not what to do in the end when your neighbor has put you to shame. [Prov. 17:14; Matt. 5:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Argue your cause with your neighbor himself; discover not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disclose not another''s secret, [Matt. 18:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Lest he who hears you revile you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring shame upon you and your ill repute have no end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' A word fitly spoken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in due season is like apples of gold in settings of silver. [Prov. 15:23; Isa. 50:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Like an earring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' nose ring of gold or an ornament of fine gold is a wise reprover to an ear that listens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeys.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Like the cold of snow [brought from the mountains] in the time of harvest, so is a faithful messenger to those who send him; for he refreshes the life of his masters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Whoever falsely boasts of gifts [he does not give] is like clouds and wind without rain. [Jude 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' By long forbearance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calmness of spirit a judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ruler is persuaded, and soft speech breaks down the most bonelike resistance. [Gen. 32:4; I Sam. 25:24; Prov. 15:1; 16:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Have you found [pleasure sweet like] honey? Eat only as much as is sufficient for you, lest, being filled with it, you vomit it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Let your foot seldom be in your neighbor''s house, lest he become tired of you and hate you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' A man who bears false witness against his neighbor is like a heavy sledgehammer and a sword and a sharp arrow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Confidence in an unfaithful man in time of trouble is like a broken tooth or a foot out of joint.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He who sings songs to a heavy heart is like him who lays off a garment in cold weather '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' like vinegar upon soda. [Dan. 6:18; Rom. 12:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' If your enemy is hungry, give him bread to eat; and if he is thirsty, give him water to drink; [Matt. 5:44; Rom. 12:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For in doing so, you will heap coals of fire upon his head, and the Lord will reward you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The north wind brings forth rain; so does a backbiting tongue bring forth an angry countenance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' It is better to dwell in the corner of the housetop than to share a house with a disagreeing, quarrelsome, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scolding woman. [Prov. 21:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Like cold water to a thirsty soul, so is good news from a far [home] country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Like a muddied fountain and a polluted spring is a righteous man who yields, falls down, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compromises his integrity before the wicked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' It is not good to eat much honey; so for men to seek glory, their own glory, causes suffering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is not glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' He who has no rule over his own spirit is like a city that is broken down and without walls. [Prov. 16:32.]'
