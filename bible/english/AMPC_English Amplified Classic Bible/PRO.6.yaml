document_id: PRO.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MY SON, if you have become security for your neighbor, if you have given your pledge for a stranger '
  - type: text
    content: or
  - type: text
    content: ' another,'
  '10':
  - type: text
    content: ' Yet a little sleep, a little slumber, a little folding of the hands to lie down '
  - type: text
    content: and
  - type: text
    content: ' sleep–'
  '11':
  - type: text
    content: ' So will your poverty come like a robber '
  - type: text
    content: or
  - type: text
    content: ' one who travels [with slowly but surely approaching steps] and your want like an armed man [making you helpless]. [Prov. 10:4; 13:4; 20:4.]'
  '12':
  - type: text
    content: ' A worthless person, a wicked man, is he who goes about with a perverse (contrary, wayward) mouth.'
  '13':
  - type: text
    content: ' He winks with his eyes, he speaks by shuffling '
  - type: text
    content: or
  - type: text
    content: ' tapping with his feet, he makes signs [to mislead and deceive] '
  - type: text
    content: and
  - type: text
    content: ' teaches with his fingers.'
  '14':
  - type: text
    content: ' Willful '
  - type: text
    content: and
  - type: text
    content: ' contrary in his heart, he devises trouble, vexation, '
  - type: text
    content: and
  - type: text
    content: ' evil continually; he lets loose discord '
  - type: text
    content: and
  - type: text
    content: ' sows it.'
  '15':
  - type: text
    content: ' Therefore upon him shall the crushing weight of calamity come suddenly; suddenly shall he be broken, and that without remedy.'
  '16':
  - type: text
    content: ' These six things the Lord hates, indeed, seven are an abomination to Him:'
  '17':
  - type: text
    content: ' A proud look [the spirit that makes one overestimate himself and underestimate others], a lying tongue, and hands that shed innocent blood, [Ps. 120:2, 3.]'
  '18':
  - type: text
    content: ' A heart that manufactures wicked thoughts '
  - type: text
    content: and
  - type: text
    content: ' plans, feet that are swift in running to evil,'
  '19':
  - type: text
    content: ' A false witness who breathes out lies [even under oath], and he who sows discord among his brethren.'
  '2':
  - type: text
    content: ' You are snared with the words of your lips, you are caught by the speech of your mouth.'
  '20':
  - type: text
    content: ' My son, keep your father''s [God-given] commandment and forsake not the law of [God] your mother [taught you]. [Eph. 6:1-3.]'
  '21':
  - type: text
    content: ' Bind them continually upon your heart and tie them about your neck. [Prov. 3:3; 7:3.]'
  '22':
  - type: text
    content: ' When you go, they [the words of your parents'' God] shall lead you; when you sleep, they shall keep you; and when you waken, they shall talk with you.'
  '23':
  - type: text
    content: ' For the commandment is a lamp, and the whole teaching [of the law] is light, and reproofs of discipline are the way of life, [Ps. 19:8; 119:105.]'
  '24':
  - type: text
    content: ' To keep you from the evil woman, from the flattery of the tongue of a loose woman.'
  '25':
  - type: text
    content: ' Lust not after her beauty in your heart, neither let her capture you with her eyelids.'
  '26':
  - type: text
    content: ' For on account of a harlot a man is brought to a piece of bread, and the adulteress stalks '
  - type: text
    content: and
  - type: text
    content: ' snares [as with a hook] the precious life [of a man].'
  '27':
  - type: text
    content: ' Can a man take fire in his bosom and his clothes not be burned?'
  '28':
  - type: text
    content: ' Can one go upon hot coals and his feet not be burned?'
  '29':
  - type: text
    content: ' So he who cohabits with his neighbor''s wife [will be tortured with evil consequences and just retribution]; he who touches her shall not be innocent '
  - type: text
    content: or
  - type: text
    content: ' go unpunished.'
  '3':
  - type: text
    content: ' Do this now [at once and earnestly], my son, and deliver yourself when you have put yourself into the power of your neighbor; go, bestir '
  - type: text
    content: and
  - type: text
    content: ' humble yourself, and beg your neighbor [to pay his debt and thereby release you].'
  '30':
  - type: text
    content: ' Men do not despise a thief if he steals to satisfy himself when he is hungry;'
  '31':
  - type: text
    content: ' But if he is found out, he must restore seven times [what he stole]; he must give the whole substance of his house [if necessary–to meet his fine].'
  '32':
  - type: text
    content: ' But whoever commits adultery with a woman lacks heart '
  - type: text
    content: and
  - type: text
    content: ' understanding (moral principle and prudence); he who does it is destroying his own life.'
  '33':
  - type: text
    content: ' Wounds and disgrace will he get, and his reproach will not be wiped away.'
  '34':
  - type: text
    content: ' For jealousy makes [the wronged] man furious; therefore he will not spare in the day of vengeance [upon the detected one].'
  '35':
  - type: text
    content: ' He will not consider any ransom [offered to buy him off from demanding full punishment]; neither will he be satisfied, though you offer him many gifts '
  - type: text
    content: and
  - type: text
    content: ' bribes.'
  '4':
  - type: text
    content: ' Give not [unnecessary] sleep to your eyes, nor slumber to your eyelids;'
  '5':
  - type: text
    content: ' Deliver yourself, as a roe '
  - type: text
    content: or
  - type: text
    content: ' gazelle from the hand of the hunter, and as a bird from the hand of the fowler.'
  '6':
  - type: text
    content: ' Go to the ant, you sluggard; consider her ways and be wise!–[Job 12:7.]'
  '7':
  - type: text
    content: ' Which, having no chief, overseer, or ruler,'
  '8':
  - type: text
    content: ' Provides her food in the summer and gathers her supplies in the harvest.'
  '9':
  - type: text
    content: ' How long will you sleep, O sluggard? When will you arise out of your sleep? [Prov. 24:33, 34.]'
