document_id: PRO.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MY SON, if you have become security for your neighbor, if you have given your pledge for a stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' another,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You are snared with the words of your lips, you are caught by the speech of your mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Do this now [at once and earnestly], my son, and deliver yourself when you have put yourself into the power of your neighbor; go, bestir '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humble yourself, and beg your neighbor [to pay his debt and thereby release you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Give not [unnecessary] sleep to your eyes, nor slumber to your eyelids;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Deliver yourself, as a roe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' gazelle from the hand of the hunter, and as a bird from the hand of the fowler.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Go to the ant, you sluggard; consider her ways and be wise!–[Job 12:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Which, having no chief, overseer, or ruler,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Provides her food in the summer and gathers her supplies in the harvest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' How long will you sleep, O sluggard? When will you arise out of your sleep? [Prov. 24:33, 34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Yet a little sleep, a little slumber, a little folding of the hands to lie down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sleep–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So will your poverty come like a robber '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' one who travels [with slowly but surely approaching steps] and your want like an armed man [making you helpless]. [Prov. 10:4; 13:4; 20:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' A worthless person, a wicked man, is he who goes about with a perverse (contrary, wayward) mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He winks with his eyes, he speaks by shuffling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' tapping with his feet, he makes signs [to mislead and deceive] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' teaches with his fingers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Willful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contrary in his heart, he devises trouble, vexation, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil continually; he lets loose discord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sows it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Therefore upon him shall the crushing weight of calamity come suddenly; suddenly shall he be broken, and that without remedy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' These six things the Lord hates, indeed, seven are an abomination to Him:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' A proud look [the spirit that makes one overestimate himself and underestimate others], a lying tongue, and hands that shed innocent blood, [Ps. 120:2, 3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' A heart that manufactures wicked thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plans, feet that are swift in running to evil,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' A false witness who breathes out lies [even under oath], and he who sows discord among his brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' My son, keep your father''s [God-given] commandment and forsake not the law of [God] your mother [taught you]. [Eph. 6:1-3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Bind them continually upon your heart and tie them about your neck. [Prov. 3:3; 7:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When you go, they [the words of your parents'' God] shall lead you; when you sleep, they shall keep you; and when you waken, they shall talk with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For the commandment is a lamp, and the whole teaching [of the law] is light, and reproofs of discipline are the way of life, [Ps. 19:8; 119:105.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' To keep you from the evil woman, from the flattery of the tongue of a loose woman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Lust not after her beauty in your heart, neither let her capture you with her eyelids.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For on account of a harlot a man is brought to a piece of bread, and the adulteress stalks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' snares [as with a hook] the precious life [of a man].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Can a man take fire in his bosom and his clothes not be burned?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Can one go upon hot coals and his feet not be burned?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' So he who cohabits with his neighbor''s wife [will be tortured with evil consequences and just retribution]; he who touches her shall not be innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' go unpunished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Men do not despise a thief if he steals to satisfy himself when he is hungry;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But if he is found out, he must restore seven times [what he stole]; he must give the whole substance of his house [if necessary–to meet his fine].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' But whoever commits adultery with a woman lacks heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding (moral principle and prudence); he who does it is destroying his own life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Wounds and disgrace will he get, and his reproach will not be wiped away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' For jealousy makes [the wronged] man furious; therefore he will not spare in the day of vengeance [upon the detected one].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' He will not consider any ransom [offered to buy him off from demanding full punishment]; neither will he be satisfied, though you offer him many gifts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bribes.'
