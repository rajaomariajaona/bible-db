document_id: JAS.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOT MANY [of you] should become teachers (self-constituted censors and reprovers of others), my brethren, for you know that we [teachers] will be judged by a higher standard '
  - type: text
    content: and
  - type: text
    content: ' with greater severity [than other people; thus we assume the greater accountability and the more condemnation].'
  '10':
  - type: text
    content: ' Out of the same mouth come forth blessing and cursing. These things, my brethren, ought not to be so.'
  '11':
  - type: text
    content: ' Does a fountain send forth [simultaneously] from the same opening fresh water and bitter?'
  '12':
  - type: text
    content: ' Can a fig tree, my brethren, bear olives, or a grapevine figs? Neither can a salt spring furnish fresh water.'
  '13':
  - type: text
    content: ' Who is there among you who is wise and intelligent? Then let him by his noble living show forth his [good] works with the [unobtrusive] humility [which is the proper attribute] of true wisdom.'
  '14':
  - type: text
    content: ' But if you have bitter jealousy (envy) and contention (rivalry, selfish ambition) in your hearts, do not pride yourselves on it and thus be in defiance of '
  - type: text
    content: and
  - type: text
    content: ' false to the Truth.'
  '15':
  - type: text
    content: ' This [superficial] wisdom is not such as comes down from above, but is earthly, unspiritual (animal), even devilish (demoniacal).'
  '16':
  - type: text
    content: ' For wherever there is jealousy (envy) and contention (rivalry and selfish ambition), there will also be confusion (unrest, disharmony, rebellion) and all sorts of evil '
  - type: text
    content: and
  - type: text
    content: ' vile practices.'
  '17':
  - type: text
    content: ' But the wisdom from above is first of all pure (undefiled); then it is peace-loving, courteous (considerate, gentle). [It is willing to] yield to reason, full of compassion and good fruits; it is wholehearted '
  - type: text
    content: and
  - type: text
    content: ' straightforward, impartial '
  - type: text
    content: and
  - type: text
    content: ' unfeigned (free from doubts, wavering, and insincerity).'
  '18':
  - type: text
    content: ' And the harvest of righteousness (of conformity to God''s will in thought and deed) is [the fruit of the seed] sown in peace by those who work for '
  - type: text
    content: and
  - type: text
    content: ' make peace [in themselves and in others, that peace which means concord, agreement, and harmony between individuals, with undisturbedness, in a peaceful mind free from fears and agitating passions and moral conflicts].'
  '2':
  - type: text
    content: ' For we all often stumble '
  - type: text
    content: and
  - type: text
    content: ' fall '
  - type: text
    content: and
  - type: text
    content: ' offend in many things. And if anyone does not offend in speech [never says the wrong things], he is a fully developed character '
  - type: text
    content: and
  - type: text
    content: ' a perfect man, able to control his whole body '
  - type: text
    content: and
  - type: text
    content: ' to curb his entire nature.'
  '3':
  - type: text
    content: ' If we set bits in the horses'' mouths to make them obey us, we can turn their whole bodies about.'
  '4':
  - type: text
    content: ' Likewise, look at the ships: though they are so great and are driven by rough winds, they are steered by a very small rudder wherever the impulse of the helmsman determines.'
  '5':
  - type: text
    content: ' Even so the tongue is a little member, and it can boast of great things. See how much wood '
  - type: text
    content: or
  - type: text
    content: ' how great a forest a tiny spark can set ablaze!'
  '6':
  - type: text
    content: ' And the tongue is a fire. [The tongue is a] world of wickedness set among our members, contaminating '
  - type: text
    content: and
  - type: text
    content: ' depraving the whole body and setting on fire the wheel of birth (the cycle of man''s nature), being itself ignited by hell (Gehenna).'
  '7':
  - type: text
    content: ' For every kind of beast and bird, of reptile and sea animal, can be tamed and has been tamed by human genius (nature).'
  '8':
  - type: text
    content: ' But the human tongue can be tamed by no man. It is a restless (undisciplined, irreconcilable) evil, full of deadly poison.'
  '9':
  - type: text
    content: ' With it we bless the Lord and Father, and with it we curse men who were made in God''s likeness!'
