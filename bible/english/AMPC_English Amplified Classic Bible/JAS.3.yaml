document_id: JAS.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOT MANY [of you] should become teachers (self-constituted censors and reprovers of others), my brethren, for you know that we [teachers] will be judged by a higher standard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with greater severity [than other people; thus we assume the greater accountability and the more condemnation].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For we all often stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offend in many things. And if anyone does not offend in speech [never says the wrong things], he is a fully developed character '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a perfect man, able to control his whole body '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to curb his entire nature.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' If we set bits in the horses'' mouths to make them obey us, we can turn their whole bodies about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Likewise, look at the ships: though they are so great and are driven by rough winds, they are steered by a very small rudder wherever the impulse of the helmsman determines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Even so the tongue is a little member, and it can boast of great things. See how much wood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' how great a forest a tiny spark can set ablaze!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the tongue is a fire. [The tongue is a] world of wickedness set among our members, contaminating '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depraving the whole body and setting on fire the wheel of birth (the cycle of man''s nature), being itself ignited by hell (Gehenna).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For every kind of beast and bird, of reptile and sea animal, can be tamed and has been tamed by human genius (nature).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But the human tongue can be tamed by no man. It is a restless (undisciplined, irreconcilable) evil, full of deadly poison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' With it we bless the Lord and Father, and with it we curse men who were made in God''s likeness!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Out of the same mouth come forth blessing and cursing. These things, my brethren, ought not to be so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Does a fountain send forth [simultaneously] from the same opening fresh water and bitter?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Can a fig tree, my brethren, bear olives, or a grapevine figs? Neither can a salt spring furnish fresh water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Who is there among you who is wise and intelligent? Then let him by his noble living show forth his [good] works with the [unobtrusive] humility [which is the proper attribute] of true wisdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But if you have bitter jealousy (envy) and contention (rivalry, selfish ambition) in your hearts, do not pride yourselves on it and thus be in defiance of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' false to the Truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' This [superficial] wisdom is not such as comes down from above, but is earthly, unspiritual (animal), even devilish (demoniacal).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For wherever there is jealousy (envy) and contention (rivalry and selfish ambition), there will also be confusion (unrest, disharmony, rebellion) and all sorts of evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vile practices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But the wisdom from above is first of all pure (undefiled); then it is peace-loving, courteous (considerate, gentle). [It is willing to] yield to reason, full of compassion and good fruits; it is wholehearted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' straightforward, impartial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unfeigned (free from doubts, wavering, and insincerity).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the harvest of righteousness (of conformity to God''s will in thought and deed) is [the fruit of the seed] sown in peace by those who work for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make peace [in themselves and in others, that peace which means concord, agreement, and harmony between individuals, with undisturbedness, in a peaceful mind free from fears and agitating passions and moral conflicts].'
