document_id: MRK.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND WHEN the Sabbath was past [that is, after the sun had set], Mary Magdalene, and Mary [the mother] of James, and Salome purchased sweet-smelling spices, so that they might go and anoint [Jesus'' body].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' She went and reported it to those who had been with Him, as they grieved and wept.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And when they heard that He was alive and that she had seen Him, they did not believe it.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' After this, He appeared in a different form to two of them as they were walking [along the way] into the country.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And they returned [to Jerusalem] and told the others, but they did not believe them either.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Afterward He appeared to the Eleven [apostles themselves] as they reclined at table; and He reproved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproached them for their unbelief (their lack of faith) and their hardness of heart, because they had refused to believe those who had seen Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' looked at Him attentively after He had risen [from death].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And He said to them, Go into all the world and preach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' publish openly the good news (the Gospel) to every creature [of the whole human race].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' He who believes [who adheres to and trusts in and relies on the Gospel and Him Whom it sets forth] and is baptized will be saved [from the penalty of eternal death]; but he who does not believe [who does not adhere to and trust in and rely on the Gospel and Him Whom it sets forth] will be condemned.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And these attesting signs will accompany those who believe: in My name they will drive out demons; they will speak in new languages;'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' They will pick up serpents; and [even] if they drink anything deadly, it will not hurt them; they will lay their hands on the sick, and they will get well.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' So then the Lord Jesus, after He had spoken to them, was taken up into heaven and He sat down at the right hand of God. [Ps. 110:1.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And very early on the first day of the week they came to the tomb; [by then] the sun had risen.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And they went out and preached everywhere, while the Lord kept working with them and confirming the message by the attesting signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' miracles that closely accompanied [it]. Amen (so be it).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And they said to one another, Who will roll back the stone for us out of [the groove across the floor at] the door of the tomb?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And when they looked up, they [distinctly] saw that the stone was already rolled back, for it was very large.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And going into the tomb, they saw a young man sitting [there] on the right [side], clothed in a [long, stately, sweeping] robe of white, and they were utterly amazed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' struck with terror.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And he said to them, Do not be amazed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrified; you are looking for Jesus of Nazareth, Who was crucified. He has risen; He is not here. See the place where they laid Him. [Ps. 16:10.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But be going; tell the disciples and Peter, He goes before you into Galilee; you will see Him there, [just] as He told you. [Mark 14:28.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Then they went out [and] fled from the tomb, for trembling and bewilderment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consternation had seized them. And they said nothing about it to anyone, for they were held by alarm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fear.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Now Jesus, having risen [from death] early on the first day of the week, appeared first to Mary Magdalene, from whom He had driven out seven demons.'
