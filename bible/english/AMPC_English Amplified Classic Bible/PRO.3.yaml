document_id: PRO.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MY SON, forget not my law '
  - type: text
    content: or
  - type: text
    content: ' teaching, but let your heart keep my commandments;'
  '10':
  - type: text
    content: ' So shall your storage places be filled with plenty, and your vats shall be overflowing with new wine. [Deut. 28:8.]'
  '11':
  - type: text
    content: ' My son, do not despise '
  - type: text
    content: or
  - type: text
    content: ' shrink from the chastening of the Lord [His correction by punishment or by subjection to suffering or trial]; neither be weary of '
  - type: text
    content: or
  - type: text
    content: ' impatient about '
  - type: text
    content: or
  - type: text
    content: ' loathe '
  - type: text
    content: or
  - type: text
    content: ' abhor His reproof, [Ps. 94:12; Heb. 12:5, 6; Rev. 3:19.]'
  '12':
  - type: text
    content: ' For whom the Lord loves He corrects, even as a father corrects the son in whom he delights.'
  '13':
  - type: text
    content: ' Happy (blessed, fortunate, enviable) is the man who finds skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom, and the man who gets understanding [drawing it forth from God''s Word and life''s experiences],'
  '14':
  - type: text
    content: ' For the gaining of it is better than the gaining of silver, and the profit of it better than fine gold.'
  '15':
  - type: text
    content: ' Skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom is more precious than rubies; and nothing you can wish for is to be compared to her. [Job 28:12-18.]'
  '16':
  - type: text
    content: ' Length of days is in her right hand, and in her left hand are riches and honor. [Prov. 8:12-21; I Tim. 4:8.]'
  '17':
  - type: text
    content: ' Her ways are highways of pleasantness, and all her paths are peace.'
  '18':
  - type: text
    content: ' She is a tree of life to those who lay hold on her; and happy (blessed, fortunate, to be envied) is everyone who holds her fast.'
  '19':
  - type: text
    content: ' The Lord by skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom has founded the earth; by understanding He has established the heavens. [Col. 1:16.]'
  '2':
  - type: text
    content: ' For length of days and years of a life [worth living] and tranquility [inward and outward and continuing through old age till death], these shall they add to you.'
  '20':
  - type: text
    content: ' By His knowledge the deeps were broken up, and the skies distill the dew.'
  '21':
  - type: text
    content: ' My son, let them not escape from your sight, but keep sound '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom and discretion,'
  '22':
  - type: text
    content: ' And they will be life to your inner self, and a gracious ornament to your neck (your outer self).'
  '23':
  - type: text
    content: ' Then you will walk in your way securely '
  - type: text
    content: and
  - type: text
    content: ' in confident trust, and you shall not dash your foot '
  - type: text
    content: or
  - type: text
    content: ' stumble. [Ps. 91:11, 12; Prov. 10:9.]'
  '24':
  - type: text
    content: ' When you lie down, you shall not be afraid; yes, you shall lie down, and your sleep shall be sweet.'
  '25':
  - type: text
    content: ' Be not afraid of sudden terror '
  - type: text
    content: and
  - type: text
    content: ' panic, nor of the stormy blast '
  - type: text
    content: or
  - type: text
    content: ' the storm and ruin of the wicked when it comes [for you will be guiltless],'
  '26':
  - type: text
    content: ' For the Lord shall be your confidence, firm '
  - type: text
    content: and
  - type: text
    content: ' strong, and shall keep your foot from being caught [in a trap or some hidden danger].'
  '27':
  - type: text
    content: ' Withhold not good from those to whom it is due [its rightful owners], when it is in the power of your hand to do it. [Rom. 13:7; Gal. 6:10.]'
  '28':
  - type: text
    content: ' Do not say to your neighbor, Go, and come again; and tomorrow I will give it–when you have it with you. [Lev. 19:13; Deut. 24:15.]'
  '29':
  - type: text
    content: ' Do not contrive '
  - type: text
    content: or
  - type: text
    content: ' dig up '
  - type: text
    content: or
  - type: text
    content: ' cultivate evil against your neighbor, who dwells trustingly '
  - type: text
    content: and
  - type: text
    content: ' confidently beside you.'
  '3':
  - type: text
    content: ' Let not mercy and kindness [shutting out all hatred and selfishness] and truth [shutting out all deliberate hypocrisy or falsehood] forsake you; bind them about your neck, write them upon the tablet of your heart. [Col. 3:9-12.]'
  '30':
  - type: text
    content: ' Contend not with a man for no reason–when he has done you no wrong. [Rom. 12:18.]'
  '31':
  - type: text
    content: ' Do not resentfully envy '
  - type: text
    content: and
  - type: text
    content: ' be jealous of an unscrupulous, grasping man, and choose none of his ways. [Ps. 37:1; 73:3; Prov. 24:1.]'
  '32':
  - type: text
    content: ' For the perverse are an abomination [extremely disgusting and detestable] to the Lord; but His confidential communion '
  - type: text
    content: and
  - type: text
    content: ' secret counsel are with the [uncompromisingly] righteous (those who are upright and in right standing with Him). [Ps. 25:14.]'
  '33':
  - type: text
    content: ' The curse of the Lord is in '
  - type: text
    content: and
  - type: text
    content: ' on the house of the wicked, but He declares blessed (joyful and favored with blessings) the home of the just '
  - type: text
    content: and
  - type: text
    content: ' consistently righteous. [Ps. 37:22; Zech. 5:4; Mal. 2:2.]'
  '34':
  - type: text
    content: ' Though He scoffs at the scoffers '
  - type: text
    content: and
  - type: text
    content: ' scorns the scorners, yet He gives His undeserved favor to the low [in rank], the humble, '
  - type: text
    content: and
  - type: text
    content: ' the afflicted. [James 4:6; I Pet. 5:5.]'
  '35':
  - type: text
    content: ' The wise shall inherit glory (all honor and good) but shame is the highest rank conferred on [self-confident] fools. [Isa. 32:6.]'
  '4':
  - type: text
    content: ' So shall you find favor, good understanding, '
  - type: text
    content: and
  - type: text
    content: ' high esteem in the sight [or judgment] of God and man. [Luke 2:52.]'
  '5':
  - type: text
    content: ' Lean on, trust in, '
  - type: text
    content: and
  - type: text
    content: ' be confident in the Lord with all your heart '
  - type: text
    content: and
  - type: text
    content: ' mind and do not rely on your own insight '
  - type: text
    content: or
  - type: text
    content: ' understanding.'
  '6':
  - type: text
    content: ' In all your ways know, recognize, '
  - type: text
    content: and
  - type: text
    content: ' acknowledge Him, and He will direct '
  - type: text
    content: and
  - type: text
    content: ' make straight '
  - type: text
    content: and
  - type: text
    content: ' plain your paths.'
  '7':
  - type: text
    content: ' Be not wise in your own eyes; reverently fear '
  - type: text
    content: and
  - type: text
    content: ' worship the Lord and turn [entirely] away from evil. [Prov. 8:13.]'
  '8':
  - type: text
    content: ' It shall be health to your nerves '
  - type: text
    content: and
  - type: text
    content: ' sinews, and marrow '
  - type: text
    content: and
  - type: text
    content: ' moistening to your bones.'
  '9':
  - type: text
    content: ' Honor the Lord with your capital '
  - type: text
    content: and
  - type: text
    content: ' sufficiency [from righteous labors] and with the firstfruits of all your income; [Deut. 26:2; Mal. 3:10; Luke 14:13, 14.]'
