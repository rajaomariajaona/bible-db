document_id: PRO.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' MY SON, forget not my law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' teaching, but let your heart keep my commandments;'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' So shall your storage places be filled with plenty, and your vats shall be overflowing with new wine. [Deut. 28:8.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' My son, do not despise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' shrink from the chastening of the Lord [His correction by punishment or by subjection to suffering or trial]; neither be weary of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' impatient about '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' loathe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' abhor His reproof, [Ps. 94:12; Heb. 12:5, 6; Rev. 3:19.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For whom the Lord loves He corrects, even as a father corrects the son in whom he delights.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Happy (blessed, fortunate, enviable) is the man who finds skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom, and the man who gets understanding [drawing it forth from God''s Word and life''s experiences],'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For the gaining of it is better than the gaining of silver, and the profit of it better than fine gold.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom is more precious than rubies; and nothing you can wish for is to be compared to her. [Job 28:12-18.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Length of days is in her right hand, and in her left hand are riches and honor. [Prov. 8:12-21; I Tim. 4:8.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Her ways are highways of pleasantness, and all her paths are peace.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' She is a tree of life to those who lay hold on her; and happy (blessed, fortunate, to be envied) is everyone who holds her fast.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The Lord by skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom has founded the earth; by understanding He has established the heavens. [Col. 1:16.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For length of days and years of a life [worth living] and tranquility [inward and outward and continuing through old age till death], these shall they add to you.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' By His knowledge the deeps were broken up, and the skies distill the dew.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' My son, let them not escape from your sight, but keep sound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom and discretion,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And they will be life to your inner self, and a gracious ornament to your neck (your outer self).'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Then you will walk in your way securely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in confident trust, and you shall not dash your foot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' stumble. [Ps. 91:11, 12; Prov. 10:9.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' When you lie down, you shall not be afraid; yes, you shall lie down, and your sleep shall be sweet.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Be not afraid of sudden terror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' panic, nor of the stormy blast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' the storm and ruin of the wicked when it comes [for you will be guiltless],'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' For the Lord shall be your confidence, firm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strong, and shall keep your foot from being caught [in a trap or some hidden danger].'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Withhold not good from those to whom it is due [its rightful owners], when it is in the power of your hand to do it. [Rom. 13:7; Gal. 6:10.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Do not say to your neighbor, Go, and come again; and tomorrow I will give it–when you have it with you. [Lev. 19:13; Deut. 24:15.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Do not contrive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dig up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cultivate evil against your neighbor, who dwells trustingly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently beside you.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Let not mercy and kindness [shutting out all hatred and selfishness] and truth [shutting out all deliberate hypocrisy or falsehood] forsake you; bind them about your neck, write them upon the tablet of your heart. [Col. 3:9-12.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Contend not with a man for no reason–when he has done you no wrong. [Rom. 12:18.]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Do not resentfully envy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be jealous of an unscrupulous, grasping man, and choose none of his ways. [Ps. 37:1; 73:3; Prov. 24:1.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' For the perverse are an abomination [extremely disgusting and detestable] to the Lord; but His confidential communion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secret counsel are with the [uncompromisingly] righteous (those who are upright and in right standing with Him). [Ps. 25:14.]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' The curse of the Lord is in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' on the house of the wicked, but He declares blessed (joyful and favored with blessings) the home of the just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consistently righteous. [Ps. 37:22; Zech. 5:4; Mal. 2:2.]'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Though He scoffs at the scoffers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scorns the scorners, yet He gives His undeserved favor to the low [in rank], the humble, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the afflicted. [James 4:6; I Pet. 5:5.]'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' The wise shall inherit glory (all honor and good) but shame is the highest rank conferred on [self-confident] fools. [Isa. 32:6.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' So shall you find favor, good understanding, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' high esteem in the sight [or judgment] of God and man. [Luke 2:52.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Lean on, trust in, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be confident in the Lord with all your heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind and do not rely on your own insight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' understanding.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' In all your ways know, recognize, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge Him, and He will direct '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make straight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plain your paths.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Be not wise in your own eyes; reverently fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship the Lord and turn [entirely] away from evil. [Prov. 8:13.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' It shall be health to your nerves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sinews, and marrow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' moistening to your bones.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Honor the Lord with your capital '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sufficiency [from righteous labors] and with the firstfruits of all your income; [Deut. 26:2; Mal. 3:10; Luke 14:13, 14.]'
