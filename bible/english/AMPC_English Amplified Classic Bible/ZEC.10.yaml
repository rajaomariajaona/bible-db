document_id: ZEC.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ASK OF the Lord rain in the time of the latter '
  - type: text
    content: or
  - type: text
    content: ' spring rain. It is the Lord Who makes lightnings which usher in the rain '
  - type: text
    content: and
  - type: text
    content: ' give men showers, and grass to everyone in the field.'
  '10':
  - type: text
    content: ' I will bring them [all Israel] home again from the land of Egypt and gather them out of Assyria, and I will bring them into the land [on the east and on the west of the Jordan, into] Gilead and Lebanon, and room enough shall not be found for them.'
  '11':
  - type: text
    content: ' And [the Lord] will pass through the sea of distress '
  - type: text
    content: and
  - type: text
    content: ' affliction [at the head of His people, as He did at the Red Sea]; and He will smite down the waves of the sea, and all the depths of the [river] Nile shall be dried up '
  - type: text
    content: and
  - type: text
    content: ' put to shame; and the pride of Assyria shall be brought down and the scepter '
  - type: text
    content: or
  - type: text
    content: ' rod [of the taskmasters of Egypt] shall pass away.'
  '12':
  - type: text
    content: ' And I will strengthen [Israel] in the Lord, and they shall walk up and down '
  - type: text
    content: and
  - type: text
    content: ' glory in His name, says the Lord.'
  '2':
  - type: text
    content: ' For the teraphim (household idols) have spoken vanity (emptiness, falsity, and futility) and the diviners have seen a lie and the dreamers have told false dreams; they comfort in vain. Therefore the people go their way like sheep; they are afflicted '
  - type: text
    content: and
  - type: text
    content: ' hurt because there is no shepherd.'
  '3':
  - type: text
    content: ' My anger is kindled against the shepherds [who are not true shepherds] and I will punish the goat leaders, for the Lord of hosts has visited His flock, the house of Judah, and will make them as His beautiful '
  - type: text
    content: and
  - type: text
    content: ' majestic horse in the battle. [Ezek. 34:1-10.]'
  '4':
  - type: text
    content: ' Out of him [Judah] shall come forth the Cornerstone, out of him the tent peg, out of him the battle bow; every ruler shall proceed from him. [Jer. 30:21.]'
  '5':
  - type: text
    content: ' And they shall be like mighty men treading down their enemies in the mire of the streets in the battle, and they shall fight because the Lord is with them, and the [oppressor''s] riders on horses shall be confounded '
  - type: text
    content: and
  - type: text
    content: ' put to shame.'
  '6':
  - type: text
    content: ' And I will strengthen the house of Judah and I will save the house of Joseph [Ephraim]. I will bring them back '
  - type: text
    content: and
  - type: text
    content: ' cause them to dwell securely, for I have mercy, loving-kindness, '
  - type: text
    content: and
  - type: text
    content: ' compassion for them. They shall be as though I had not cast them off, for I am the Lord their God, and I will hear them.'
  '7':
  - type: text
    content: ' Then Ephraim [the ten tribes] shall become like a mighty warrior, and their hearts shall rejoice as through wine; yes, their children shall see it and rejoice; their hearts shall feel great delight '
  - type: text
    content: and
  - type: text
    content: ' glory triumphantly in the Lord!'
  '8':
  - type: text
    content: ' I will hiss for them [as the keeper does for his bees] and gather them in, for I have redeemed them, and they shall increase [again] as they have increased [before, in Egypt]. [Ezek. 36:10, 11.]'
  '9':
  - type: text
    content: ' And though I sow them among the nations, yet they shall [earnestly] remember Me in far countries, and with their children they shall live and shall return [to God and the land He gave them].'
