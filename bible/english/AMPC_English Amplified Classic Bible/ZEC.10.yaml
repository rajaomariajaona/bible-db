document_id: ZEC.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ASK OF the Lord rain in the time of the latter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' spring rain. It is the Lord Who makes lightnings which usher in the rain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give men showers, and grass to everyone in the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For the teraphim (household idols) have spoken vanity (emptiness, falsity, and futility) and the diviners have seen a lie and the dreamers have told false dreams; they comfort in vain. Therefore the people go their way like sheep; they are afflicted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hurt because there is no shepherd.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' My anger is kindled against the shepherds [who are not true shepherds] and I will punish the goat leaders, for the Lord of hosts has visited His flock, the house of Judah, and will make them as His beautiful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' majestic horse in the battle. [Ezek. 34:1-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Out of him [Judah] shall come forth the Cornerstone, out of him the tent peg, out of him the battle bow; every ruler shall proceed from him. [Jer. 30:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they shall be like mighty men treading down their enemies in the mire of the streets in the battle, and they shall fight because the Lord is with them, and the [oppressor''s] riders on horses shall be confounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put to shame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And I will strengthen the house of Judah and I will save the house of Joseph [Ephraim]. I will bring them back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cause them to dwell securely, for I have mercy, loving-kindness, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassion for them. They shall be as though I had not cast them off, for I am the Lord their God, and I will hear them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then Ephraim [the ten tribes] shall become like a mighty warrior, and their hearts shall rejoice as through wine; yes, their children shall see it and rejoice; their hearts shall feel great delight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory triumphantly in the Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I will hiss for them [as the keeper does for his bees] and gather them in, for I have redeemed them, and they shall increase [again] as they have increased [before, in Egypt]. [Ezek. 36:10, 11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And though I sow them among the nations, yet they shall [earnestly] remember Me in far countries, and with their children they shall live and shall return [to God and the land He gave them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I will bring them [all Israel] home again from the land of Egypt and gather them out of Assyria, and I will bring them into the land [on the east and on the west of the Jordan, into] Gilead and Lebanon, and room enough shall not be found for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And [the Lord] will pass through the sea of distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affliction [at the head of His people, as He did at the Red Sea]; and He will smite down the waves of the sea, and all the depths of the [river] Nile shall be dried up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put to shame; and the pride of Assyria shall be brought down and the scepter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rod [of the taskmasters of Egypt] shall pass away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And I will strengthen [Israel] in the Lord, and they shall walk up and down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory in His name, says the Lord.'
