document_id: 2KI.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE seventeenth year of Pekah son of Remaliah, Ahaz son of Jotham king of Judah became king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Ahaz was twenty years old when he began his sixteen-year reign in Jerusalem. He did not do right in the sight of the Lord his God, like David his [forefather].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But he walked in the ways of Israel''s kings, yes, and made his son pass through the fire [and offered him as a sacrifice], in accord with the abominable [idolatrous] practices of the [heathen] nations whom the Lord drove out before the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He sacrificed and burned incense in the high places, on the hills, and under every green tree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then Rezin king of Syria and Pekah son of Remaliah king of Israel came up to Jerusalem to wage war; they besieged Ahaz, but could not conquer him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' At that time, Rezin king of Syria got back Elath [in Edom] for Syria and drove the Jews from [it]. The Syrians came to Elath and dwell there to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So Ahaz sent messengers to Tiglath-pileser king of Assyria, saying, I am your servant and son. Come up and save me out of the hands of the kings of Syria and of Israel, who are attacking me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And Ahaz took the silver and gold in the house of the Lord and in the treasuries of the king''s house and sent a present to the king of Assyria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Assyria''s king hearkened to him; he went up against Damascus, took it, carried its people captive to Kir, and slew Rezin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' King Ahaz went to Damascus to meet Tiglath-pileser king of Assyria, and saw there their [heathen] altar. King Ahaz sent to Urijah the priest a model of the altar and an exact pattern for its construction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So Urijah the priest built an altar according to all that King Ahaz had sent from Damascus, finishing it before King Ahaz returned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When the king came from Damascus, he looked at the altar and offered on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' King Ahaz burned his burnt offering and his cereal offering, poured his drink offering, and dashed the blood of his peace offerings upon that altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The bronze altar which was before the Lord he removed from the front of the house, from between his [new] altar and the house of the Lord, and put it on the north side of his altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And King Ahaz commanded Urijah the priest: Upon the principal (the new) altar, burn the morning burnt offering, the evening cereal offering, the king''s burnt sacrifice and his cereal offering, with the burnt offering and cereal offering and drink offering of all the people of the land; and dash upon the [new] altar all the blood of the burnt offerings and the sacrifices. But the [old] bronze altar shall be kept for me to use to inquire by [of the Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Urijah the priest did all this as King Ahaz commanded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' [To keep Assyria''s king from getting them] King Ahaz cut off the panels of the bases [of the ten lavers] and removed the laver from each of them; and he took down the Sea from off the bronze oxen that were under it and put it upon stone supports.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the covered way for the Sabbath that they had built in the temple court, and the king''s outer entrance, he removed from the house of the Lord, because of the king of Assyria [who if he heard of them might seize them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The rest of the acts of Ahaz, are they not written in the Book of the Chronicles of the Kings of Judah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Ahaz slept with his fathers and was buried [with them] in the City of David. Hezekiah his son reigned in his stead.'
