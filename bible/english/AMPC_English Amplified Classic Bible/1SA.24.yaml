document_id: 1SA.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN SAUL returned from following the Philistines, he was told, Behold, David is in the Wilderness of En-gedi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then Saul took 3,000 chosen men out of all Israel and went to seek David and his men among the Rocks of the Wild Goats.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He came to the sheepfolds on the way, where there was a cave, and Saul went in to relieve himself. Now David and his men were sitting in the cave''s innermost recesses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' David''s men said to him, Behold the day of which the Lord said to you, Behold, I will deliver your enemy into your hands and you shall do to him as seems good to you. Then David arose [in the darkness] and stealthily cut off the skirt of Saul''s robe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Afterward, David''s heart smote him because he had cut off Saul''s skirt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He said to his men, The Lord forbid that I should do this to my master, the Lord''s anointed, to put my hand out against him, when he is the anointed of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So David checked his men with these words and did not let them rise against Saul. But Saul rose up and left the cave and went on his way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' David also arose afterward and went out of the cave and called after Saul, saying, My lord the king! And when Saul looked behind him, David bowed with his face to the earth and did obeisance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And David said to Saul, Why do you listen to the words of men who say, David seeks to do you harm?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Behold, your eyes have seen how the Lord gave you today into my hands in the cave. Some told me to kill you, but I spared you; I said, I will not put forth my hand against my lord, for he is the Lord''s anointed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' See, my father, see the skirt of your robe in my hand! Since I cut off the skirt of your robe and did not kill you, you know and see that there is no evil or treason in my hands. I have not sinned against you, yet you hunt my life to take it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' May the Lord judge between me and you, and may the Lord avenge me upon you, but my hand shall not be upon you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' As the proverb of the ancients says, Out of the wicked comes forth wickedness; but my hand shall not be against you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' After whom has the king of Israel come out? After whom do you pursue? After a dead dog? After a flea?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' May the Lord be judge and judge between me and you, and see and plead my cause, and deliver me out of your hands. [Ps. 142.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When David had said this to Saul, Saul said, Is this your voice, my son David? And Saul lifted up his voice and wept.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He said to David, You are more upright in God''s eyes than I, for you have repaid me good, but I have rewarded you evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' You have declared today how you have dealt well with me; for when the Lord gave me into your hand, you did not kill me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For if a man finds his enemy, will he let him go away unharmed? Therefore may the Lord reward you with good for what you have done for me this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And now, behold, I well know that you shall surely be king and that the kingdom of Israel shall be established in your hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Swear now therefore to me by the Lord that you will not cut off my descendants after me and that you will not destroy my name out of my father''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' David gave Saul his oath; and Saul went home, but David and his men went up to the stronghold.'
