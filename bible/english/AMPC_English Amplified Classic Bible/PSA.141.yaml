document_id: PSA.141,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', I call upon You; hasten to me. Give ear to my voice when I cry to You.'
  '10':
  - type: text
    content: ' Let the wicked fall together into their own nets, while I pass over them '
  - type: text
    content: and
  - type: text
    content: ' escape.'
  '2':
  - type: text
    content: ' Let my prayer be set forth as incense before You, the lifting up of my hands as the evening sacrifice. [I Tim. 2:8; Rev. 8:3, 4.]'
  '3':
  - type: text
    content: ' Set a guard, O Lord, before my mouth; keep watch at the door of my lips.'
  '4':
  - type: text
    content: ' Incline my heart not to submit '
  - type: text
    content: or
  - type: text
    content: ' consent to any evil thing or to be occupied in deeds of wickedness with men who work iniquity; and let me not eat of their dainties.'
  '5':
  - type: text
    content: ' Let the righteous man smite and correct me–it is a kindness. Oil so choice let not my head refuse '
  - type: text
    content: or
  - type: text
    content: ' discourage; for even in their evils '
  - type: text
    content: or
  - type: text
    content: ' calamities shall my prayer continue. [Prov. 9:8; 19:25; 25:12; Gal. 6:1.]'
  '6':
  - type: text
    content: ' When their rulers are overthrown in stony places, [their followers] shall hear my words, that they are sweet (pleasant, mild, and just).'
  '7':
  - type: text
    content: ' The unburied bones [of slaughtered rulers] shall lie scattered at the mouth of Sheol, [as unregarded] as the lumps of soil behind the plowman when he breaks open the ground. [II Cor. 1:9.]'
  '8':
  - type: text
    content: ' But my eyes are toward You, O God the Lord; in You do I trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge; pour not out my life '
  - type: text
    content: nor
  - type: text
    content: ' leave it destitute '
  - type: text
    content: and
  - type: text
    content: ' bare.'
  '9':
  - type: text
    content: ' Keep me from the trap which they have laid for me, and the snares of evildoers.'
