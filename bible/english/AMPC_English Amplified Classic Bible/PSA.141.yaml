document_id: PSA.141
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I call upon You; hasten to me. Give ear to my voice when I cry to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let my prayer be set forth as incense before You, the lifting up of my hands as the evening sacrifice. [I Tim. 2:8; Rev. 8:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Set a guard, O Lord, before my mouth; keep watch at the door of my lips.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Incline my heart not to submit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' consent to any evil thing or to be occupied in deeds of wickedness with men who work iniquity; and let me not eat of their dainties.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Let the righteous man smite and correct me–it is a kindness. Oil so choice let not my head refuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' discourage; for even in their evils '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' calamities shall my prayer continue. [Prov. 9:8; 19:25; 25:12; Gal. 6:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When their rulers are overthrown in stony places, [their followers] shall hear my words, that they are sweet (pleasant, mild, and just).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The unburied bones [of slaughtered rulers] shall lie scattered at the mouth of Sheol, [as unregarded] as the lumps of soil behind the plowman when he breaks open the ground. [II Cor. 1:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But my eyes are toward You, O God the Lord; in You do I trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take refuge; pour not out my life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' leave it destitute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bare.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Keep me from the trap which they have laid for me, and the snares of evildoers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Let the wicked fall together into their own nets, while I pass over them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' escape.'
