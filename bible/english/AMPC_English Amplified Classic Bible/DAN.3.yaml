document_id: DAN.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NEBUCHADNEZZAR THE king [caused to be] made an image of gold, whose height was sixty cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ninety feet and its breadth six cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' nine feet. He set it up on the plain of Dura in the province of Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then Nebuchadnezzar the king sent to gather together the satraps, the deputies, the governors, the judges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chief stargazers, the treasurers, the counselors, the sheriffs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lawyers, and all the chief officials of the provinces to come to the dedication of the image which King Nebuchadnezzar had [caused to be] set up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then the satraps, the deputies, the governors, the judges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chief stargazers, the treasurers, the counselors, the sheriffs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lawyers, and all the chief officials of the provinces were gathered together for the dedication of the image that King Nebuchadnezzar had set up, and they stood before the image that Nebuchadnezzar had set up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then the herald cried aloud, You are commanded, O peoples, nations, and languages,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' That when you hear the sound of the horn, pipe, lyre, trigon, harp, dulcimer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bagpipe, and every kind of music, you are to fall down and worship the golden image that King Nebuchadnezzar has set up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And whoever does not fall down and worship shall that very hour be cast into the midst of a burning fiery furnace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore, when all the peoples heard the sound of the horn, pipe, lyre, trigon, dulcimer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bagpipe, and every kind of music, all the peoples, nations, and languages fell down and worshiped the golden image that King Nebuchadnezzar had set up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Therefore at that time certain men of Chaldean descent came near and brought [malicious] accusations against the Jews.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' They said to King Nebuchadnezzar, O king, live forever!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You, O king, have made a decree that every man who hears the sound of the horn, pipe, lyre, trigon, harp, dulcimer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bagpipe, and every kind of music shall fall down and worship the golden image,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And that whoever does not fall down and worship shall be cast into the midst of a burning fiery furnace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' There are certain Jews whom you have appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set over the affairs of the province of Babylon–Shadrach, Meshach, and Abednego. These men, O king, pay no attention to you; they do not serve your gods or worship the golden image which you have set up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then Nebuchadnezzar in rage and fury commanded to bring Shadrach, Meshach, and Abednego; and these men were brought before the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' [Then] Nebuchadnezzar said to them, Is it true, O Shadrach, Meshach, and Abednego, that you do not serve my gods or worship the golden image which I have set up?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now if you are ready when you hear the sound of the horn, pipe, lyre, trigon, harp, dulcimer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bagpipe, and every kind of music to fall down and worship the image which I have made, very good. But if you do not worship, you shall be cast at once into the midst of a burning fiery furnace, and who is that god who can deliver you out of my hands?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Shadrach, Meshach, and Abednego answered the king, O Nebuchadnezzar, it is not necessary for us to answer you on this point.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' If our God Whom we serve is able to deliver us from the burning fiery furnace, He will deliver us out of your hand, O king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But if not, let it be known to you, O king, that we will not serve your gods or worship the golden image which you have set up! [Job 13:15; Acts 4:19, 20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then Nebuchadnezzar was full of fury and his facial expression was changed [to antagonism] against Shadrach, Meshach, and Abednego. Therefore he commanded that the furnace should be heated seven times hotter than it was usually heated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And he commanded the strongest men in his army to bind Shadrach, Meshach, and Abednego and to cast them into the burning fiery furnace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then these [three] men were bound in their cloaks, their tunics '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' undergarments, their turbans, and their other clothing, and they were cast into the midst of the burning fiery furnace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Therefore because the king''s commandment was urgent and the furnace exceedingly hot, the flame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sparks from the fire killed those men who handled Shadrach, Meshach, and Abednego.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And these three men, Shadrach, Meshach, and Abednego, fell down bound into the burning fiery furnace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then Nebuchadnezzar the king [saw and] was astounded, and he jumped up and said to his counselors, Did we not cast three men bound into the midst of the fire? They answered, True, O king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' He answered, Behold, I see four men loose, walking in the midst of the fire, and they are not hurt! And the form of the fourth is like a son of the gods! [Phil. 2:5-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then Nebuchadnezzar came near to the mouth of the burning fiery furnace and said, Shadrach, Meshach, and Abednego, you servants of the Most High God, come out and come here. Then Shadrach, Meshach, and Abednego came out from the midst of the fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And the satraps, the deputies, the governors, and the king''s counselors gathered around together and saw these men–that the fire had no power upon their bodies, nor was the hair of their head singed; neither were their garments scorched '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' changed in color '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' condition, nor had even the smell of smoke clung to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then Nebuchadnezzar said, Blessed be the God of Shadrach, Meshach, and Abednego, Who has sent His angel and delivered His servants who believed in, trusted in, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relied on Him! And they set aside the king''s command and yielded their bodies rather than serve or worship any god except their own God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Therefore I make a decree that any people, nation, and language that speaks anything amiss against the God of Shadrach, Meshach, and Abednego shall be cut in pieces and their houses be made a dunghill, for there is no other God who can deliver in this way!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Then the king promoted Shadrach, Meshach, and Abednego in the province of Babylon.'
