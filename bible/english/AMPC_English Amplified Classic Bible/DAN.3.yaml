document_id: DAN.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NEBUCHADNEZZAR THE king [caused to be] made an image of gold, whose height was sixty cubits '
  - type: text
    content: or
  - type: text
    content: ' ninety feet and its breadth six cubits '
  - type: text
    content: or
  - type: text
    content: ' nine feet. He set it up on the plain of Dura in the province of Babylon.'
  '10':
  - type: text
    content: ' You, O king, have made a decree that every man who hears the sound of the horn, pipe, lyre, trigon, harp, dulcimer '
  - type: text
    content: or
  - type: text
    content: ' bagpipe, and every kind of music shall fall down and worship the golden image,'
  '11':
  - type: text
    content: ' And that whoever does not fall down and worship shall be cast into the midst of a burning fiery furnace.'
  '12':
  - type: text
    content: ' There are certain Jews whom you have appointed '
  - type: text
    content: and
  - type: text
    content: ' set over the affairs of the province of Babylon–Shadrach, Meshach, and Abednego. These men, O king, pay no attention to you; they do not serve your gods or worship the golden image which you have set up.'
  '13':
  - type: text
    content: ' Then Nebuchadnezzar in rage and fury commanded to bring Shadrach, Meshach, and Abednego; and these men were brought before the king.'
  '14':
  - type: text
    content: ' [Then] Nebuchadnezzar said to them, Is it true, O Shadrach, Meshach, and Abednego, that you do not serve my gods or worship the golden image which I have set up?'
  '15':
  - type: text
    content: ' Now if you are ready when you hear the sound of the horn, pipe, lyre, trigon, harp, dulcimer '
  - type: text
    content: or
  - type: text
    content: ' bagpipe, and every kind of music to fall down and worship the image which I have made, very good. But if you do not worship, you shall be cast at once into the midst of a burning fiery furnace, and who is that god who can deliver you out of my hands?'
  '16':
  - type: text
    content: ' Shadrach, Meshach, and Abednego answered the king, O Nebuchadnezzar, it is not necessary for us to answer you on this point.'
  '17':
  - type: text
    content: ' If our God Whom we serve is able to deliver us from the burning fiery furnace, He will deliver us out of your hand, O king.'
  '18':
  - type: text
    content: ' But if not, let it be known to you, O king, that we will not serve your gods or worship the golden image which you have set up! [Job 13:15; Acts 4:19, 20.]'
  '19':
  - type: text
    content: ' Then Nebuchadnezzar was full of fury and his facial expression was changed [to antagonism] against Shadrach, Meshach, and Abednego. Therefore he commanded that the furnace should be heated seven times hotter than it was usually heated.'
  '2':
  - type: text
    content: ' Then Nebuchadnezzar the king sent to gather together the satraps, the deputies, the governors, the judges '
  - type: text
    content: and
  - type: text
    content: ' chief stargazers, the treasurers, the counselors, the sheriffs '
  - type: text
    content: and
  - type: text
    content: ' lawyers, and all the chief officials of the provinces to come to the dedication of the image which King Nebuchadnezzar had [caused to be] set up.'
  '20':
  - type: text
    content: ' And he commanded the strongest men in his army to bind Shadrach, Meshach, and Abednego and to cast them into the burning fiery furnace.'
  '21':
  - type: text
    content: ' Then these [three] men were bound in their cloaks, their tunics '
  - type: text
    content: or
  - type: text
    content: ' undergarments, their turbans, and their other clothing, and they were cast into the midst of the burning fiery furnace.'
  '22':
  - type: text
    content: ' Therefore because the king''s commandment was urgent and the furnace exceedingly hot, the flame '
  - type: text
    content: and
  - type: text
    content: ' sparks from the fire killed those men who handled Shadrach, Meshach, and Abednego.'
  '23':
  - type: text
    content: ' And these three men, Shadrach, Meshach, and Abednego, fell down bound into the burning fiery furnace.'
  '24':
  - type: text
    content: ' Then Nebuchadnezzar the king [saw and] was astounded, and he jumped up and said to his counselors, Did we not cast three men bound into the midst of the fire? They answered, True, O king.'
  '25':
  - type: text
    content: ' He answered, Behold, I see four men loose, walking in the midst of the fire, and they are not hurt! And the form of the fourth is like a son of the gods! [Phil. 2:5-8.]'
  '26':
  - type: text
    content: ' Then Nebuchadnezzar came near to the mouth of the burning fiery furnace and said, Shadrach, Meshach, and Abednego, you servants of the Most High God, come out and come here. Then Shadrach, Meshach, and Abednego came out from the midst of the fire.'
  '27':
  - type: text
    content: ' And the satraps, the deputies, the governors, and the king''s counselors gathered around together and saw these men–that the fire had no power upon their bodies, nor was the hair of their head singed; neither were their garments scorched '
  - type: text
    content: or
  - type: text
    content: ' changed in color '
  - type: text
    content: or
  - type: text
    content: ' condition, nor had even the smell of smoke clung to them.'
  '28':
  - type: text
    content: ' Then Nebuchadnezzar said, Blessed be the God of Shadrach, Meshach, and Abednego, Who has sent His angel and delivered His servants who believed in, trusted in, '
  - type: text
    content: and
  - type: text
    content: ' relied on Him! And they set aside the king''s command and yielded their bodies rather than serve or worship any god except their own God.'
  '29':
  - type: text
    content: ' Therefore I make a decree that any people, nation, and language that speaks anything amiss against the God of Shadrach, Meshach, and Abednego shall be cut in pieces and their houses be made a dunghill, for there is no other God who can deliver in this way!'
  '3':
  - type: text
    content: ' Then the satraps, the deputies, the governors, the judges '
  - type: text
    content: and
  - type: text
    content: ' chief stargazers, the treasurers, the counselors, the sheriffs '
  - type: text
    content: and
  - type: text
    content: ' lawyers, and all the chief officials of the provinces were gathered together for the dedication of the image that King Nebuchadnezzar had set up, and they stood before the image that Nebuchadnezzar had set up.'
  '30':
  - type: text
    content: ' Then the king promoted Shadrach, Meshach, and Abednego in the province of Babylon.'
  '4':
  - type: text
    content: ' Then the herald cried aloud, You are commanded, O peoples, nations, and languages,'
  '5':
  - type: text
    content: ' That when you hear the sound of the horn, pipe, lyre, trigon, harp, dulcimer '
  - type: text
    content: or
  - type: text
    content: ' bagpipe, and every kind of music, you are to fall down and worship the golden image that King Nebuchadnezzar has set up.'
  '6':
  - type: text
    content: ' And whoever does not fall down and worship shall that very hour be cast into the midst of a burning fiery furnace.'
  '7':
  - type: text
    content: ' Therefore, when all the peoples heard the sound of the horn, pipe, lyre, trigon, dulcimer '
  - type: text
    content: or
  - type: text
    content: ' bagpipe, and every kind of music, all the peoples, nations, and languages fell down and worshiped the golden image that King Nebuchadnezzar had set up.'
  '8':
  - type: text
    content: ' Therefore at that time certain men of Chaldean descent came near and brought [malicious] accusations against the Jews.'
  '9':
  - type: text
    content: ' They said to King Nebuchadnezzar, O king, live forever!'
