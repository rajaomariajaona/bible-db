document_id: PSA.26,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] of David.
  - type: text
    content: ' VINDICATE ME, O Lord, for I have walked in my integrity; I have [expectantly] trusted in, leaned on, '
  - type: text
    content: and
  - type: text
    content: ' relied on the Lord without wavering '
  - type: text
    content: and
  - type: text
    content: ' I shall not slide.'
  '10':
  - type: text
    content: ' In whose hands is wickedness, and their right hands are full of bribes.'
  '11':
  - type: text
    content: ' But as for me, I will walk in my integrity; redeem me and be merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious to me.'
  '12':
  - type: text
    content: ' My foot stands on an even place; in the congregations will I bless the Lord.'
  '2':
  - type: text
    content: ' Examine me, O Lord, and prove me; test my heart and my mind.'
  '3':
  - type: text
    content: ' For Your loving-kindness is before my eyes, and I have walked in Your truth [faithfully].'
  '4':
  - type: text
    content: ' I do not sit with false persons, nor fellowship with pretenders;'
  '5':
  - type: text
    content: ' I hate the company of evildoers and will not sit with the wicked.'
  '6':
  - type: text
    content: ' I will wash my hands in innocence, and go about Your altar, O Lord,'
  '7':
  - type: text
    content: ' That I may make the voice of thanksgiving heard and may tell of all Your wondrous works.'
  '8':
  - type: text
    content: ' Lord, I love the habitation of Your house, and the place where Your glory dwells.'
  '9':
  - type: text
    content: ' Gather me not with sinners '
  - type: text
    content: and
  - type: text
    content: ' sweep me not away [with them], nor my life with bloodthirsty men,'
