document_id: PSA.26,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: +[A Psalm+] of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' VINDICATE ME, O Lord, for I have walked in my integrity; I have [expectantly] trusted in, leaned on, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relied on the Lord without wavering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I shall not slide.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In whose hands is wickedness, and their right hands are full of bribes.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But as for me, I will walk in my integrity; redeem me and be merciful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious to me.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My foot stands on an even place; in the congregations will I bless the Lord.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Examine me, O Lord, and prove me; test my heart and my mind.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Your loving-kindness is before my eyes, and I have walked in Your truth [faithfully].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I do not sit with false persons, nor fellowship with pretenders;'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I hate the company of evildoers and will not sit with the wicked.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will wash my hands in innocence, and go about Your altar, O Lord,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That I may make the voice of thanksgiving heard and may tell of all Your wondrous works.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Lord, I love the habitation of Your house, and the place where Your glory dwells.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Gather me not with sinners '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sweep me not away [with them], nor my life with bloodthirsty men,'
