document_id: PSA.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: +[A Psalm+] of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' VINDICATE ME, O Lord, for I have walked in my integrity; I have [expectantly] trusted in, leaned on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relied on the Lord without wavering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I shall not slide.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Examine me, O Lord, and prove me; test my heart and my mind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For Your loving-kindness is before my eyes, and I have walked in Your truth [faithfully].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I do not sit with false persons, nor fellowship with pretenders;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I hate the company of evildoers and will not sit with the wicked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I will wash my hands in innocence, and go about Your altar, O Lord,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' That I may make the voice of thanksgiving heard and may tell of all Your wondrous works.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Lord, I love the habitation of Your house, and the place where Your glory dwells.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Gather me not with sinners '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sweep me not away [with them], nor my life with bloodthirsty men,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' In whose hands is wickedness, and their right hands are full of bribes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But as for me, I will walk in my integrity; redeem me and be merciful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gracious to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' My foot stands on an even place; in the congregations will I bless the Lord.'
