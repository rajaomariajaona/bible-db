document_id: GEN.23,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SARAH LIVED 127 years; this was the length of the life of Sarah.'
  '10':
  - type: text
    content: ' Now Ephron was present there among the sons of Heth; so, in the hearing of all who went in at the gate of his city, Ephron the Hittite answered Abraham, saying,'
  '11':
  - type: text
    content: ' No, my lord, hear me; I give you the field, and the cave that is in it I give you. In the presence of the sons of my people I give it to you. Bury your dead.'
  '12':
  - type: text
    content: ' Then Abraham bowed himself down before the people of the land.'
  '13':
  - type: text
    content: ' And he said to Ephron in the presence of the people of the land, But if you will give it, I beg of you, hear me. I will give you the price of the field; accept it from me, and I will bury my dead there.'
  '14':
  - type: text
    content: ' Ephron replied to Abraham, saying,'
  '15':
  - type: text
    content: ' My lord, listen to me. The land is worth 400 shekels of silver; what is that between you and me? So bury your dead.'
  '16':
  - type: text
    content: ' So Abraham listened to what Ephron said '
  - type: text
    content: and
  - type: text
    content: ' acted upon it. He weighed to Ephron the silver which he had named in the hearing of the Hittites: 400 shekels of silver, according to the weights current among the merchants.'
  '17':
  - type: text
    content: ' So the field of Ephron in Machpelah, which was to the east of Mamre [Hebron]–the field and the cave which was in it, and all the trees that were in the field and in all its borders round about–was made over'
  '18':
  - type: text
    content: ' As a possession to Abraham in the presence of the Hittites, before all who went in at his city gate.'
  '19':
  - type: text
    content: ' After this, Abraham buried Sarah his wife in the cave of the field of Machpelah to the east of Mamre, that is, Hebron, in the land of Canaan.'
  '2':
  - type: text
    content: ' And Sarah died in Kiriath-arba, that is, Hebron, in the land of Canaan. And Abraham went to mourn for Sarah and to weep for her.'
  '20':
  - type: text
    content: ' The field and the cave in it were conveyed to Abraham for a permanent burial place by the sons of Heth.'
  '3':
  - type: text
    content: ' And Abraham stood up from before his dead and said to the sons of Heth,'
  '4':
  - type: text
    content: ' I am a stranger and a sojourner with you; give me property for a burial place among you, that I may bury my dead out of my sight.'
  '5':
  - type: text
    content: ' And the Hittites replied to Abraham,'
  '6':
  - type: text
    content: ' Listen to us, my lord; you are a mighty prince among us. Bury your dead in any tomb '
  - type: text
    content: or
  - type: text
    content: ' grave of ours that you choose; none of us will withhold from you his tomb or hinder you from burying your dead.'
  '7':
  - type: text
    content: ' And Abraham stood up and bowed himself to the people of the land, the Hittites.'
  '8':
  - type: text
    content: ' And he said to them, If you are willing to grant my dead a burial out of my sight, listen to me and ask Ephron son of Zohar for me,'
  '9':
  - type: text
    content: ' That he may give me the cave of Machpelah, which he owns–it is at the end of his field. For the full price let him give it to me here in your presence as a burial place to which I may hold fast among you.'
