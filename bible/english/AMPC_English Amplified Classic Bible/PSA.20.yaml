document_id: PSA.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MAY THE Lord answer you in the day of trouble! May the name of the God of Jacob set you up on high [and defend you];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Send you help from the sanctuary and support, refresh, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthen you from Zion;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Remember all your offerings and accept your burnt sacrifice. Selah [pause, and think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' May He grant you according to your heart''s desire and fulfill all your plans.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' We will [shout in] triumph at your salvation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' victory, and in the name of our God we will set up our banners. May the Lord fulfill all your petitions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now I know that the Lord saves His anointed; He will answer him from His holy heaven with the saving strength of His right hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Some trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boast of chariots and some of horses, but we will trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boast of the name of the Lord our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They are bowed down and fallen, but we are risen and stand upright.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' O Lord, give victory; let the King answer us when we call.'
