document_id: PSA.20,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' MAY THE Lord answer you in the day of trouble! May the name of the God of Jacob set you up on high [and defend you];'
  '2':
  - type: text
    content: ' Send you help from the sanctuary and support, refresh, '
  - type: text
    content: and
  - type: text
    content: ' strengthen you from Zion;'
  '3':
  - type: text
    content: ' Remember all your offerings and accept your burnt sacrifice. Selah [pause, and think of that]!'
  '4':
  - type: text
    content: ' May He grant you according to your heart''s desire and fulfill all your plans.'
  '5':
  - type: text
    content: ' We will [shout in] triumph at your salvation '
  - type: text
    content: and
  - type: text
    content: ' victory, and in the name of our God we will set up our banners. May the Lord fulfill all your petitions.'
  '6':
  - type: text
    content: ' Now I know that the Lord saves His anointed; He will answer him from His holy heaven with the saving strength of His right hand.'
  '7':
  - type: text
    content: ' Some trust in '
  - type: text
    content: and
  - type: text
    content: ' boast of chariots and some of horses, but we will trust in '
  - type: text
    content: and
  - type: text
    content: ' boast of the name of the Lord our God.'
  '8':
  - type: text
    content: ' They are bowed down and fallen, but we are risen and stand upright.'
  '9':
  - type: text
    content: ' O Lord, give victory; let the King answer us when we call.'
