document_id: 2SA.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AFTER THIS David smote the Philistines and subdued them, and he took Metheg-ammah out of the hands of the Philistines.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [He] sent Joram his son to King David to salute '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' congratulate him about his battle and defeat of Hadadezer. For Hadadezer had had wars with Toi. Joram brought vessels of silver, gold, and bronze.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These King David dedicated to the Lord, with the silver and gold that he had dedicated from all the nations he subdued:'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' From Syria, Moab, the Ammonites, the Philistines, Amalek, and from the spoil of Hadadezer son of Rehob, king of Zobah.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David won renown. When he returned he slew 18,000 Edomites in the Valley of Salt.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He put garrisons throughout all Edom, and all the Edomites became his servants. And the Lord preserved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gave victory to [him] wherever he went.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So David reigned over all Israel, and executed justice and righteousness for all his people.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Joab son of Zeruiah was over the army; Jehoshaphat son of Ahilud was recorder;'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Zadok son of Ahitub and Ahimelech son of Abiathar were the [chief] priests, and Seraiah was the scribe;'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Benaiah son of Jehoiada was over both the Cherethites and Pelethites [the king''s bodyguards]; and David''s sons were chief [confidential] assistants to the king.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He defeated Moab, and measured them with a line, making them lie down on the ground; two lines he measured to be put to death, and one full line to keep alive. And the Moabites became servants to David, bringing tribute.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David also defeated Hadadezer son of Rehob, king of Zobah, as he went to restore his power at the river [Euphrates].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David took from him 1,700 horsemen and 20,000 foot soldiers; and David hamstrung all the chariot horses, except he reserved enough of them for 100 chariots.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the Syrians of Damascus came to help Hadadezer king of Zobah, David slew 22,000 of them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David put garrisons in Syrian Damascus, and the Syrians became [his] servants and brought tribute. The Lord preserved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gave victory to David wherever he went.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David took the shields of gold that were on the servants of Hadadezer and brought them to Jerusalem.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And from Betah and Berothai, cities of Hadadezer, King David exacted an immense amount of bronze.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Toi king of Hamath heard about David''s defeat of all the forces of Hadadezer,'
