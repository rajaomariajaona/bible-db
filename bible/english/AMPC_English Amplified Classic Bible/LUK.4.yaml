document_id: LUK.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THEN JESUS, full of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' controlled by the Holy Spirit, returned from the Jordan and was led in [by] the [Holy] Spirit'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For it is written, He will give His angels charge over you to guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' watch over you closely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carefully;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And on their hands they will bear you up, lest you strike your foot against a stone. [Ps. 91:11, 12.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jesus replied to him, [The Scripture] says, You shall not tempt (try, test exceedingly) the Lord your God. [Deut. 6:16.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the devil had ended every [the complete cycle of] temptation, he [temporarily] left Him [that is, stood off from Him] until another more opportune '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favorable time.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Jesus went back full of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' under the power of the [Holy] Spirit into Galilee, and the fame of Him spread through the whole region round about.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He Himself conducted [a course of] teaching in their synagogues, being recognized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praised by all.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So He came to Nazareth, [that Nazareth] where He had been brought up, and He entered the synagogue, as was His custom on the Sabbath day. And He stood up to read.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there was handed to Him [the roll of] the book of the prophet Isaiah. He opened (unrolled) the book and found the place where it was written, [Isa. 61:1, 2.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Spirit of the Lord [is] upon Me, because He has anointed Me [the Anointed One, the Messiah] to preach the good news (the Gospel) to the poor; He has sent Me to announce release to the captives and recovery of sight to the blind, to send forth as delivered those who are oppressed [who are downtrodden, bruised, crushed, and broken down by calamity],'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To proclaim the accepted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acceptable year of the Lord [the day when salvation and the free favors of God profusely abound]. [Isa. 61:1, 2.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For (during) forty days in the wilderness (desert), where He was tempted (tried, tested exceedingly) by the devil. And He ate nothing during those days, and when they were completed, He was hungry. [Deut. 9:9; I Kings 19:8.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He rolled up the book and gave it back to the attendant and sat down; and the eyes of all in the synagogue were gazing [attentively] at Him.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He began to speak to them: Today this Scripture has been fulfilled while you are present '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hearing.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all spoke well of Him and marveled at the words of grace that came forth from His mouth; and they said, Is not this Joseph''s Son?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So He said to them, You will doubtless quote to Me this proverb: Physician, heal Yourself! What we have learned by hearsay that You did in Capernaum, do here also in Your [own] town.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He said, Solemnly I say to you, no prophet is acceptable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome in his [own] town (country).'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But in truth I tell you, there were many widows in Israel in the days of Elijah, when the heavens were closed up for three years and six months, so that there came a great famine over all the land;'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And yet Elijah was not sent to a single one of them, but only to Zarephath in the country of Sidon, to a woman who was a widow. [I Kings 17:1, 8-16; 18:1.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there were many lepers in Israel in the time of Elisha the prophet, and yet not one of them was cleansed [by being healed]–but only Naaman the Syrian. [II Kings 5:1-14.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When they heard these things, all the people in the synagogue were filled with rage.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And rising up, they pushed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' drove Him out of the town, and [laying hold of Him] they led Him to the [projecting] upper part of the hill on which their town was built, that they might hurl Him headlong down [over the cliff].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the devil said to Him, If You are the Son of God, order this stone to turn into a loaf [of bread].'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But passing through their midst, He went on His way.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He descended to Capernaum, a town of Galilee, and there He continued to teach the people on the Sabbath days.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they were amazed at His teaching, for His word was with authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ability '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now in the synagogue there was a man who was possessed by the foul spirit of a demon; and he cried out with a loud (deep, terrible) cry,'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let us alone!
    - type: text
      text: ' What have You to do with us [What have we in common], Jesus of Nazareth? Have You come to destroy us? I know Who You are–the Holy One of God!'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Jesus rebuked him, saying, Be silent (muzzled, gagged), and come out of him! And when the demon had thrown the man down in their midst, he came out of him without injuring him in any possible way.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they were all amazed and said to one another, What kind of talk is this? For with authority and power He commands the foul spirits and they come out!'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And a rumor about Him spread into every place in the surrounding country.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He arose and left the synagogue and went into Simon''s (Peter''s) house. Now Simon''s mother-in-law was suffering in the grip of a burning fever, and they pleaded with Him for her.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And standing over her, He rebuked the fever, and it left her; and immediately she got up and began waiting on them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jesus replied to him, It is written, Man shall not live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be sustained by (on) bread alone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but by every word and expression of God.
    - type: text
      text: ' [Deut. 8:3.]'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now at the setting of the sun [indicating the end of the Sabbath], all those who had any [who were] sick with various diseases brought them to Him, and He laid His hands upon every one of them and cured them.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And demons even came out of many people, screaming '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crying out, You are the Son of God! But He rebuked them and would not permit them to speak, because they knew that He was the Christ (the Messiah).'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when daybreak came, He left [Peter''s house] and went into an isolated [desert] place. And the people looked for Him until they came up to Him and tried to prevent Him from leaving them.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But He said to them, I must preach the good news (the Gospel) of the kingdom of God to the other cities [and towns] also, for I was sent for this [purpose].'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He continued to preach in the synagogues of Galilee.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the devil took Him up to a high mountain and showed Him all the kingdoms of the habitable world in a moment of time [in the twinkling of an eye].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he said to Him, To You I will give all this power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority and their glory (all their magnificence, excellence, preeminence, dignity, and grace), for it has been turned over to me, and I give it to whomever I will.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore if You will do homage to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship me [just once], it shall all be Yours.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jesus replied to him, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Get behind Me, Satan!
    - type: text
      text: ' It is written, You shall do homage to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship the Lord your God, and Him only shall you serve. [Deut. 6:13; 10:20.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then he took Him to Jerusalem and set Him on a gable of the temple, and said to Him, If You are the Son of God, cast Yourself down from here;'
