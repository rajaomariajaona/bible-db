document_id: GEN.41
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER TWO full years, Pharaoh dreamed that he stood by the river [Nile].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And behold, there came up out of the river [Nile] seven well-favored cows, sleek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' handsome and fat; and they grazed in the reed grass [in a marshy pasture].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And behold, seven other cows came up after them out of the river [Nile], ill favored and gaunt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ugly, and stood by the fat cows on the bank of the river [Nile].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the ill-favored, gaunt, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ugly cows ate up the seven well-favored and fat cows. Then Pharaoh awoke.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But he slept and dreamed the second time; and behold, seven ears of grain came out on one stalk, plump and good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And behold, after them seven ears [of grain] sprouted, thin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blighted by the east wind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the seven thin ears [of grain] devoured the seven plump and full ears. And Pharaoh awoke, and behold, it was a dream.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So when morning came his spirit was troubled, and he sent and called for all the magicians and all the wise men of Egypt. And Pharaoh told them his dreams, but not one could interpret them to [him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then the chief butler said to Pharaoh, I remember my faults today.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When Pharaoh was angry with his servants and put me in custody in the captain of the guard''s house, both me and the chief baker,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' We dreamed a dream in the same night, he and I; we dreamed each of us according to [the significance of] the interpretation of his dream.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And there was there with us a young man, a Hebrew, servant to the captain of the guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chief executioner; and we told him our dreams, and he interpreted them to us, to each man according to the significance of his dream.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And as he interpreted to us, so it came to pass; I was restored to my office [as chief butler], and the baker was hanged.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then Pharaoh sent and called Joseph, and they brought him hastily out of the dungeon. But Joseph [first] shaved himself, changed his clothes, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made himself presentable; then he came into Pharaoh''s presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Pharaoh said to Joseph, I have dreamed a dream, and there is no one who can interpret it; and I have heard it said of you that you can understand a dream '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' interpret it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Joseph answered Pharaoh, It is not in me; God [not I] will give Pharaoh a [favorable] answer of peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Pharaoh said to Joseph, In my dream, behold, I stood on the bank of the river [Nile];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And behold, there came up out of the river [Nile] seven fat, sleek, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' handsome cows, and they grazed in the reed grass [of a marshy pasture].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And behold, seven other cows came up after them, undernourished, gaunt, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ugly [just skin and bones; such emaciated animals] as I have never seen in all of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the lean and ill favored cows ate up the seven fat cows that had come first.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And when they had eaten them up, it could not be detected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' known that they had eaten them, for they were still as thin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' emaciated as at the beginning. Then I awoke. [But again I fell asleep and dreamed.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And I saw in my dream, and behold, seven ears [of grain] growing on one stalk, plump and good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And behold, seven [other] ears, withered, thin, and blighted by the east wind, sprouted after them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the thin ears devoured the seven good ears. Now I told this to the magicians, but there was no one who could tell me what it meant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then Joseph said to Pharaoh, The [two] dreams are one; God has shown Pharaoh what He is about to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The seven good cows are seven years, and the seven good ears [of grain] are seven years; the [two] dreams are one [in their meaning].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And the seven thin and ill favored cows that came up after them are seven years, and also the seven empty ears [of grain], blighted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shriveled by the east wind; they are seven years of hunger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' famine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' This is the message just as I have told Pharaoh: God has shown Pharaoh what He is about to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Take note! Seven years of great plenty throughout all the land of Egypt are coming.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Then there will come seven years of hunger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' famine, and [there will be so much want that] all the great abundance of the previous years will be forgotten in the land of Egypt; and hunger (destitution, starvation) will exhaust (consume, finish) the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And the plenty will become quite unknown in the land because of that following famine, for it will be very woefully severe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' That the dream was sent twice to Pharaoh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in two forms indicates that this thing which God will very soon bring to pass is fully prepared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established by God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' So now let Pharaoh seek out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provide a man discreet, understanding, proficient, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wise and set him over the land of Egypt [as governor].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Let Pharaoh do this; then let him select and appoint officers over the land, and take one-fifth [of the produce] of the [whole] land of Egypt in the seven plenteous years [year by year].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And let them gather all the food of these good years that are coming and lay up grain under the direction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority of Pharaoh, and let them retain food [in fortified granaries] in the cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And that food shall be put in store for the country against the seven years of hunger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' famine that are to come upon the land of Egypt, so that the land may not be ruined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cut off by the famine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And the plan seemed good in the eyes of Pharaoh and in the eyes of all his servants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And Pharaoh said to his servants, Can we find this man''s equal, a man in whom is the spirit of God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And Pharaoh said to Joseph, Forasmuch as [your] God has shown you all this, there is nobody as intelligent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discreet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding and wise as you are.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' You shall have charge over my house, and all my people shall be governed according to your word [with reverence, submission, and obedience]. Only in matters of the throne will I be greater than you are.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Then Pharaoh said to Joseph, See, I have set you over all the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And Pharaoh took off his [signet] ring from his hand and put it on Joseph''s hand, and arrayed him in [official] vestments of fine linen and put a gold chain about his neck;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' He made him to ride in the second chariot which he had, and [officials] cried before him, Bow the knee! And he set him over all the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And Pharaoh said to Joseph, I am Pharaoh, and without you shall no man lift up his hand or foot in all the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And Pharaoh called Joseph''s name Zaphenath-paneah and he gave him Asenath daughter of Potiphera, priest of On, to be his wife. And Joseph made an [inspection] tour of all the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Joseph [who had been in Egypt thirteen years] was thirty years old when he stood before Pharaoh king of Egypt. Joseph went out from the presence of Pharaoh and went [about his duties] through all the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' In the seven abundant years the earth brought forth by handfuls [for each seed planted].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And he gathered up all the [surplus] food of the seven [good] years in the land of Egypt and stored up the food in the cities; he stored away in each city the food from the fields around it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' And Joseph gathered grain as the sand of the sea, very much, until he stopped counting, for it could not be measured.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' Now to Joseph were born two sons before the years of famine came, whom Asenath daughter of Potiphera, the priest of On, bore to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' And Joseph called the firstborn Manasseh [making to forget], For God, said he, has made me forget all my toil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hardship and all my father''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' And the second he called Ephraim [to be fruitful], For [he said] God has caused me to be fruitful in the land of my affliction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' When the seven years of plenty were ended in the land of Egypt,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' The seven years of scarcity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' famine began to come, as Joseph had said they would; the famine was in all [the surrounding] lands, but in all of Egypt there was food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' But when all the land of Egypt was weakened with hunger, the people [there] cried to Pharaoh for food; and Pharaoh said to [them] all, Go to Joseph; what he says to you, do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' When the famine was over all the land, Joseph opened all the storehouses and sold to the Egyptians; for the famine grew extremely distressing in the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' And all countries came to Egypt to Joseph to buy grain, because the famine was severe over all [the known] earth.'
