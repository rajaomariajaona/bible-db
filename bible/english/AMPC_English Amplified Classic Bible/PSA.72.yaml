document_id: PSA.72
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: +[A Psalm+] for Solomon.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' GIVE THE king [knowledge of] Your [way of] judging, O God, and [the spirit of] Your righteousness to the king''s son [to control all his actions].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let him judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' govern Your people with righteousness, and Your poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflicted ones with judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The mountains shall bring peace to the people, and the hills, through [the general establishment of] righteousness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' May he judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defend the poor of the people, deliver the children of the needy, and crush the oppressor,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So that they may revere '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fear You while the sun and moon endure, throughout all generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' May he [Solomon as a type of King David''s greater Son] be like rain that comes down upon the mown grass, like showers that water the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' In His [Christ''s] days shall the [uncompromisingly] righteous flourish and peace abound till there is a moon no longer. [Isa. 11:3-9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He [Christ] shall have dominion also from sea to sea and from the River [Euphrates] to the ends of the earth. [Zech. 14:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Those who dwell in the wilderness shall bow before Him and His enemies shall lick the dust.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The kings of Tarshish and of the coasts shall bring offerings; the kings of Sheba and Seba shall offer gifts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Yes, all kings shall fall down before Him, all nations shall serve Him. [Ps. 138:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For He delivers the needy when he calls out, the poor also and him who has no helper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He will have pity on the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weak and needy and will save the lives of the needy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He will redeem their lives from oppression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fraud and violence, and precious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' costly shall their blood be in His sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And He shall live; and to Him shall be given gold of Sheba; prayer also shall be made for Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' through Him continually, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they shall bless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise Him all the day long.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' There shall be abundance of grain in the soil upon the top of the mountains [the least fruitful places in the land]; the fruit of it shall wave like [the forests of] Lebanon, and [the inhabitants of] the city shall flourish like grass of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' His name shall endure forever; His name shall continue as long as the sun [indeed, His name continues before the sun]. And men shall be blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bless themselves by Him; all nations shall call Him blessed!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Blessed be the Lord God, the God of Israel, Who alone does wondrous things!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Blessed be His glorious name forever; let the whole earth be filled with His glory! Amen and Amen!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The prayers of David son of Jesse are ended.'
