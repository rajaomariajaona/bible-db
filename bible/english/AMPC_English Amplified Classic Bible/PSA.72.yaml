document_id: PSA.72,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] for Solomon.
  - type: text
    content: ' GIVE THE king [knowledge of] Your [way of] judging, O God, and [the spirit of] Your righteousness to the king''s son [to control all his actions].'
  '10':
  - type: text
    content: ' The kings of Tarshish and of the coasts shall bring offerings; the kings of Sheba and Seba shall offer gifts.'
  '11':
  - type: text
    content: ' Yes, all kings shall fall down before Him, all nations shall serve Him. [Ps. 138:4.]'
  '12':
  - type: text
    content: ' For He delivers the needy when he calls out, the poor also and him who has no helper.'
  '13':
  - type: text
    content: ' He will have pity on the poor '
  - type: text
    content: and
  - type: text
    content: ' weak and needy and will save the lives of the needy.'
  '14':
  - type: text
    content: ' He will redeem their lives from oppression '
  - type: text
    content: and
  - type: text
    content: ' fraud and violence, and precious '
  - type: text
    content: and
  - type: text
    content: ' costly shall their blood be in His sight.'
  '15':
  - type: text
    content: ' And He shall live; and to Him shall be given gold of Sheba; prayer also shall be made for Him '
  - type: text
    content: and
  - type: text
    content: ' through Him continually, '
  - type: text
    content: and
  - type: text
    content: ' they shall bless '
  - type: text
    content: and
  - type: text
    content: ' praise Him all the day long.'
  '16':
  - type: text
    content: ' There shall be abundance of grain in the soil upon the top of the mountains [the least fruitful places in the land]; the fruit of it shall wave like [the forests of] Lebanon, and [the inhabitants of] the city shall flourish like grass of the earth.'
  '17':
  - type: text
    content: ' His name shall endure forever; His name shall continue as long as the sun [indeed, His name continues before the sun]. And men shall be blessed '
  - type: text
    content: and
  - type: text
    content: ' bless themselves by Him; all nations shall call Him blessed!'
  '18':
  - type: text
    content: ' Blessed be the Lord God, the God of Israel, Who alone does wondrous things!'
  '19':
  - type: text
    content: ' Blessed be His glorious name forever; let the whole earth be filled with His glory! Amen and Amen!'
  '2':
  - type: text
    content: ' Let him judge '
  - type: text
    content: and
  - type: text
    content: ' govern Your people with righteousness, and Your poor '
  - type: text
    content: and
  - type: text
    content: ' afflicted ones with judgment '
  - type: text
    content: and
  - type: text
    content: ' justice.'
  '20':
  - type: text
    content: ' The prayers of David son of Jesse are ended.'
  '3':
  - type: text
    content: ' The mountains shall bring peace to the people, and the hills, through [the general establishment of] righteousness.'
  '4':
  - type: text
    content: ' May he judge '
  - type: text
    content: and
  - type: text
    content: ' defend the poor of the people, deliver the children of the needy, and crush the oppressor,'
  '5':
  - type: text
    content: ' So that they may revere '
  - type: text
    content: and
  - type: text
    content: ' fear You while the sun and moon endure, throughout all generations.'
  '6':
  - type: text
    content: ' May he [Solomon as a type of King David''s greater Son] be like rain that comes down upon the mown grass, like showers that water the earth.'
  '7':
  - type: text
    content: ' In His [Christ''s] days shall the [uncompromisingly] righteous flourish and peace abound till there is a moon no longer. [Isa. 11:3-9.]'
  '8':
  - type: text
    content: ' He [Christ] shall have dominion also from sea to sea and from the River [Euphrates] to the ends of the earth. [Zech. 14:9.]'
  '9':
  - type: text
    content: ' Those who dwell in the wilderness shall bow before Him and His enemies shall lick the dust.'
