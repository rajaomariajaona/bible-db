document_id: GAL.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' O YOU poor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' silly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughtless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unreflecting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' senseless Galatians! Who has fascinated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bewitched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cast a spell over you, unto whom–right before your very eyes–Jesus Christ (the Messiah) was openly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' graphically set forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' portrayed as crucified?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And all who depend on the Law [who are seeking to be justified by obedience to the Law of rituals] are under a curse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' doomed to disappointment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destruction, for it is written in the Scriptures, Cursed (accursed, devoted to destruction, doomed to eternal punishment) be everyone who does not continue to abide (live and remain) by all the precepts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' commands written in the Book of the Law and to practice them. [Deut. 27:26.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Now it is evident that no person is justified (declared righteous and brought into right standing with God) through the Law, for the Scripture says, The man in right standing with God [the just, the righteous] shall live by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' out of faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he who through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by faith is declared righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in right standing with God shall live. [Hab. 2:4.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But the Law does not rest on faith [does not require faith, has nothing to do with faith], for it itself says, He who does them [the things prescribed by the Law] shall live by them [not by faith]. [Lev. 18:5.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Christ purchased our freedom [redeeming us] from the curse (doom) of the Law [and its condemnation] by [Himself] becoming a curse for us, for it is written [in the Scriptures], Cursed is everyone who hangs on a tree (is crucified); [Deut. 21:23.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' To the end that through [their receiving] Christ Jesus, the blessing [promised] to Abraham might come upon the Gentiles, so that we through faith might [all] receive [the realization of] the promise of the [Holy] Spirit.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' To speak in terms of human relations, brethren, [if] even a man makes a last will and testament (a merely human covenant), no one sets it aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' makes it void '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' adds to it when once it has been drawn up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' signed (ratified, confirmed).'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Now the promises (covenants, agreements) were decreed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made to Abraham and his Seed (his Offspring, his Heir). He [God] does not say, And to seeds (descendants, heirs), as if referring to many persons, but, And to your Seed (your Descendant, your Heir), obviously referring to one individual, Who is [none other than] Christ (the Messiah). [Gen. 13:15; 17:8.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' This is my argument: The Law, which began 430 years after the covenant [concerning the coming Messiah], does not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cannot annul the covenant previously established (ratified) by God, so as to abolish the promise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make it void. [Exod. 12:40.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' For if the inheritance [of the promise depends on observing] the Law [as these false teachers would like you to believe], it no longer [depends] on the promise; however, God gave it to Abraham [as a free gift solely] by virtue of His promise.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' What then was the purpose of the Law? It was added [later on, after the promise, to disclose and expose to men their guilt] because of transgressions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [to make men more conscious of the sinfulness] of sin; and it was intended to be in effect until the Seed (the Descendant, the Heir) should come, to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' concerning Whom the promise had been made. And it [the Law] was arranged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordained '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appointed through the instrumentality of angels [and was given] by the hand (in the person) of a go-between [Moses, an intermediary person between God and man].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Let me ask you this one question: Did you receive the [Holy] Spirit as the result of obeying the Law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' doing its works, or was it by hearing [the message of the Gospel] and believing [it]? [Was it from observing a law of rituals or from a message of faith?]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Now a go-between (intermediary) has to do with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' implies more than one party [there can be no mediator with just one person]. Yet God is [only] one Person [and He was the sole party in giving that promise to Abraham. But the Law was a contract between two, God and Israel; its validity was dependent on both].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Is the Law then contrary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' opposed to the promises of God? Of course not! For if a Law had been given which could confer [spiritual] life, then righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right standing with God would certainly have come by Law.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But the Scriptures [picture all mankind as sinners] shut up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' imprisoned by sin, so that [the inheritance, blessing] which was promised through faith in Jesus Christ (the Messiah) might be given (released, delivered, and committed) to [all] those who believe [who adhere to and trust in and rely on Him].'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Now before the faith came, we were perpetually guarded under the Law, kept in custody in preparation for the faith that was destined to be revealed (unveiled, disclosed),'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' So that the Law served [to us Jews] as our trainer [our guardian, our guide to Christ, to lead us] until Christ [came], that we might be justified (declared righteous, put in right standing with God) by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' through faith.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' But now that the faith has come, we are no longer under a trainer (the guardian of our childhood).'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' For in Christ Jesus you are all sons of God through faith.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' For as many [of you] as were baptized into Christ [into a spiritual union and communion with Christ, the Anointed One, the Messiah] have put on (clothed yourselves with) Christ.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' There is [now no distinction] neither Jew nor Greek, there is neither slave nor free, there is not male and female; for you are all one in Christ Jesus.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And if you belong to Christ [are in Him Who is Abraham''s Seed], then you are Abraham''s offspring and [spiritual] heirs according to promise.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Are you so foolish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' so senseless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' so silly? Having begun [your new life spiritually] with the [Holy] Spirit, are you now reaching perfection [by dependence] on the flesh?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Have you suffered so many things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' experienced so much all for nothing (to no purpose)–if it really is to no purpose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in vain?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then does He Who supplies you with His marvelous [Holy] Spirit and works powerfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' miraculously among you do so on [the grounds of your doing] what the Law demands, or because of your believing in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adhering to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusting in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relying on the message that you heard?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Thus Abraham believed in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adhered to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusted in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relied on God, and it was reckoned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' placed to his account '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' credited as righteousness (as conformity to the divine will in purpose, thought, and action). [Gen. 15:6.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand that it is [really] the people [who live] by faith who are [the true] sons of Abraham.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And the Scripture, foreseeing that God would justify (declare righteous, put in right standing with Himself) the Gentiles in consequence of faith, proclaimed the Gospel [foretelling the glad tidings of a Savior long beforehand] to Abraham in the promise, saying, In you shall all the nations [of the earth] be blessed. [Gen. 12:3.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' So then, those who are people of faith are blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favored by God [as partners in fellowship] with the believing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusting Abraham.'
