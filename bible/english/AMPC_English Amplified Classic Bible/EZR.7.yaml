document_id: EZR.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW AFTER this, in the reign of Artaxerxes [son of Xerxes, or Ahasuerus] king of Persia, Ezra son of Seraiah, the son of Azariah, the son of Hilkiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The son of Shallum, the son of Zadok, the son of Ahitub,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The son of Amariah, the son of Azariah, the son of Meraioth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The son of Zerahiah, the son of Uzzi, the son of Bukki,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The son of Abishua, the son of Phinehas, the son of Eleazar, the son of Aaron the chief priest–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' This Ezra went up from Babylon. He was a skilled scribe in the five books of Moses, which the Lord, the God of Israel, had given. And the king granted him all he asked, for the hand of the Lord his God was upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And also some of the Israelites, with some of the priests and Levites, the singers and gatekeepers, and the temple servants, went up [from Babylon] to Jerusalem in the seventh year of King Artaxerxes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Ezra came to Jerusalem in the fifth month of the seventh year of the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' On the first of the first month he started out from Babylon, and on the first of the fifth month he arrived in Jerusalem, for upon him was the good hand of his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For Ezra had prepared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set his heart to seek the Law of the Lord [to inquire for it and of it, to require and yearn for it], and to do and teach in Israel its statutes and its ordinances.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now this is the copy of the letter that King Artaxerxes gave to Ezra the priest, the scribe, even a scribe [occupied with] the words of the commands of the Lord and of His statutes to Israel:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Artaxerxes, king of kings, to Ezra the priest, scribe of the instructions of the God of heaven: Greetings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I make a decree that all of the people of Israel and of their priests and Levites in my realm, who offer freely to go up to Jerusalem, may go with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For you are sent by the king and his seven counselors to inquire about Judah and Jerusalem according to the instruction of your God, which is in your hand,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And to carry the silver and gold which the king and his counselors have freely offered to the God of Israel, Whose dwelling is in Jerusalem,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And all the silver and gold that you may find in all the province of Babylonia, with the freewill offerings of the people and of the priests, offered willingly for the house of their God in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Therefore you shall with all speed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exactness buy with this money young bulls, rams, lambs, with their cereal offerings and drink offerings, and offer them on the altar of the house of your God in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And whatever shall seem good to you and to your brethren to do with the rest of the silver and the gold, that do after the will of your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The vessels also that are given to you for the service of the house of your God, those deliver before the God of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And whatever more shall be needful for the house of your God which you shall have occasion to provide, provide it out of the king''s treasury.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And I, Artaxerxes the king, make a decree to all the treasurers in the province beyond the [Euphrates] River that whatever Ezra the priest, the scribe of the instructions of the God of heaven, shall require of you, it shall be done exactly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' at once–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Up to 100 talents of silver, 100 measures of wheat, 100 baths of wine, 100 baths of oil, and salt not specified.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Whatever is commanded by the God of heaven, let it be done diligently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honorably for the house of the God of heaven, lest His wrath be against the realm of the king and his sons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Also we notify you that as to any of the priests and Levites, singers, gatekeepers, temple servants, or other servants of this house of God, it shall not be lawful to impose tribute, custom, or toll on them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' You, Ezra, after the wisdom of your God, which is [in His instructions] in your hand, set magistrates and judges who may judge all the people [west] of the River; choose those who know the instructions of your God, and teach him who does not know them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And whoever will not do the law of your God and the law of the king, let judgment be executed upon him exactly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' speedily, whether it be unto death or banishment or confiscation of goods or imprisonment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Blessed be the Lord, the God of our fathers [said Ezra], Who put such a thing as this into the king''s heart, to beautify the house of the Lord in Jerusalem,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And Who has extended His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast love to me before the king, his counselors, and all the king''s mighty officers. I was strengthened and encouraged, for the hand of the Lord my God was upon me, and I gathered together outstanding men of Israel to go with me to Jerusalem.'
