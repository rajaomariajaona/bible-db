document_id: 2CH.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN REHOBOAM had established the kingdom and had strengthened himself, he forsook the law of the Lord, and all Israel with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And in the fifth year of King Rehoboam, because they had transgressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' been unfaithful to the Lord, Shishak king of Egypt came up against Jerusalem'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' With 1,200 chariots and 60,000 horsemen, and the people were without number who came with him from Egypt–the Libyans, Sukkiim, and Ethiopians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And he took the fortified cities of Judah and came on to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then Shemaiah the prophet came to Rehoboam and the princes of Judah who had gathered at Jerusalem because of Shishak, and said to them, Thus says the Lord: You have forsaken Me, so I have abandoned you into the hands of Shishak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then the princes of Israel and the king humbled themselves and said, The Lord is righteous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when the Lord saw that they humbled themselves, the word of the Lord came to Shemaiah, saying, They have humbled themselves, so I will not destroy them, but I will grant them some deliverance; and My wrath shall not be poured out upon Jerusalem by the hand of Shishak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Nevertheless, they shall be his servants, that they may know [the difference between] My service and the service of the kingdoms of the countries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So Shishak king of Egypt came up against Jerusalem; he took away the treasures of the house of the Lord and of the king''s house. He took everything. He took away also the shields of gold Solomon had made.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Instead of them King Rehoboam made shields of bronze and committed them to the hands of the officers of the guard who kept the door of the king''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And whenever the king entered the Lord''s house, the guards came and got the shields of bronze and brought them again into the guard chamber.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When Rehoboam humbled himself, the wrath of the Lord turned from him, so as not to destroy him entirely; also in Judah conditions were good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So King Rehoboam established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthened himself in Jerusalem and reigned. Rehoboam was forty-one years old when he began to reign, and he reigned seventeen years in Jerusalem, the city in which the Lord had chosen out of all the tribes of Israel to put His Name [and the symbol of His presence]. His mother was Naamah an Ammonitess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he did evil because he did not set his heart to seek (inquire of, yearn for) the Lord with all his desire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now the acts of Rehoboam, from first to last, are they not written in the histories of Shemaiah the prophet and of Iddo the seer regarding genealogies? There were wars between Rehoboam of Judah and Jeroboam of Israel continually.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And Rehoboam slept with his fathers and was buried in the City of David; and Abijah his son reigned in his stead.'
