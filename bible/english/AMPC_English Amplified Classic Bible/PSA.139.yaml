document_id: PSA.139
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have searched me [thoroughly] and have known me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You know my downsitting and my uprising; You understand my thought afar off. [Matt. 9:4; John 2:24, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You sift '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' search out my path and my lying down, and You are acquainted with all my ways.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For there is not a word in my tongue [still unuttered], but, behold, O Lord, You know it altogether. [Heb. 4:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You have beset me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shut me in–behind and before, and You have laid Your hand upon me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Your [infinite] knowledge is too wonderful for me; it is high above me, I cannot reach it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Where could I go from Your Spirit? Or where could I flee from Your presence?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' If I ascend up into heaven, You are there; if I make my bed in Sheol (the place of the dead), behold, You are there. [Rom. 11:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' If I take the wings of the morning or dwell in the uttermost parts of the sea,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Even there shall Your hand lead me, and Your right hand shall hold me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' If I say, Surely the darkness shall cover me and the night shall be [the only] light about me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Even the darkness hides nothing from You, but the night shines as the day; the darkness and the light are both alike to You. [Dan. 2:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For You did form my inward parts; You did knit me together in my mother''s womb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I will confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for You are fearful and wonderful and
  - type: text
    text: ' for the awful wonder of my birth! Wonderful are Your works, and that my inner self knows right well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' My frame was not hidden from You when I was being formed in secret [and] intricately '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' curiously wrought [as if embroidered with various colors] in the depths of the earth [a region of darkness and mystery].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Your eyes saw my unformed substance, and in Your book all the days [of my life] were written before ever they took shape, when as yet there was none of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' How precious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weighty also are Your thoughts to me, O God! How vast is the sum of them! [Ps. 40:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' If I could count them, they would be more in number than the sand. When I awoke, [could I count to the end] I would still be with You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' If You would [only] slay the wicked, O God, and the men of blood depart from me–[Isa. 11:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Who speak against You wickedly, Your enemies who take Your name in vain! [Jude 15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Do I not hate them, O Lord, who hate You? And am I not grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do I not loathe those who rise up against You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' I hate them with perfect hatred; they have become my enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Search me [thoroughly], O God, and know my heart! Try me and know my thoughts!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And see if there is any wicked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hurtful way in me, and lead me in the way everlasting.'
