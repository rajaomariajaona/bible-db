type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: ', you have searched me [thoroughly] and have known me.'
  '10':
  - type: text
    content: ' Even there shall Your hand lead me, and Your right hand shall hold me.'
  '11':
  - type: text
    content: ' If I say, Surely the darkness shall cover me and the night shall be [the only] light about me,'
  '12':
  - type: text
    content: ' Even the darkness hides nothing from You, but the night shines as the day; the darkness and the light are both alike to You. [Dan. 2:22.]'
  '13':
  - type: text
    content: ' For You did form my inward parts; You did knit me together in my mother''s womb.'
  '14':
  - type: text
    content: ' I will confess '
  - type: text
    content: and
  - type: text
    content: ' praise You '
  - type: text
    content: for You are fearful and wonderful and
  - type: text
    content: ' for the awful wonder of my birth! Wonderful are Your works, and that my inner self knows right well.'
  '15':
  - type: text
    content: ' My frame was not hidden from You when I was being formed in secret [and] intricately '
  - type: text
    content: and
  - type: text
    content: ' curiously wrought [as if embroidered with various colors] in the depths of the earth [a region of darkness and mystery].'
  '16':
  - type: text
    content: ' Your eyes saw my unformed substance, and in Your book all the days [of my life] were written before ever they took shape, when as yet there was none of them.'
  '17':
  - type: text
    content: ' How precious '
  - type: text
    content: and
  - type: text
    content: ' weighty also are Your thoughts to me, O God! How vast is the sum of them! [Ps. 40:5.]'
  '18':
  - type: text
    content: ' If I could count them, they would be more in number than the sand. When I awoke, [could I count to the end] I would still be with You.'
  '19':
  - type: text
    content: ' If You would [only] slay the wicked, O God, and the men of blood depart from me–[Isa. 11:4.]'
  '2':
  - type: text
    content: ' You know my downsitting and my uprising; You understand my thought afar off. [Matt. 9:4; John 2:24, 25.]'
  '20':
  - type: text
    content: ' Who speak against You wickedly, Your enemies who take Your name in vain! [Jude 15.]'
  '21':
  - type: text
    content: ' Do I not hate them, O Lord, who hate You? And am I not grieved '
  - type: text
    content: and
  - type: text
    content: ' do I not loathe those who rise up against You?'
  '22':
  - type: text
    content: ' I hate them with perfect hatred; they have become my enemies.'
  '23':
  - type: text
    content: ' Search me [thoroughly], O God, and know my heart! Try me and know my thoughts!'
  '24':
  - type: text
    content: ' And see if there is any wicked '
  - type: text
    content: or
  - type: text
    content: ' hurtful way in me, and lead me in the way everlasting.'
  '3':
  - type: text
    content: ' You sift '
  - type: text
    content: and
  - type: text
    content: ' search out my path and my lying down, and You are acquainted with all my ways.'
  '4':
  - type: text
    content: ' For there is not a word in my tongue [still unuttered], but, behold, O Lord, You know it altogether. [Heb. 4:13.]'
  '5':
  - type: text
    content: ' You have beset me '
  - type: text
    content: and
  - type: text
    content: ' shut me in–behind and before, and You have laid Your hand upon me.'
  '6':
  - type: text
    content: ' Your [infinite] knowledge is too wonderful for me; it is high above me, I cannot reach it.'
  '7':
  - type: text
    content: ' Where could I go from Your Spirit? Or where could I flee from Your presence?'
  '8':
  - type: text
    content: ' If I ascend up into heaven, You are there; if I make my bed in Sheol (the place of the dead), behold, You are there. [Rom. 11:33.]'
  '9':
  - type: text
    content: ' If I take the wings of the morning or dwell in the uttermost parts of the sea,'
