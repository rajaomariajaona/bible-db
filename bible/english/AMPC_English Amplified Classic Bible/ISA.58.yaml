document_id: ISA.58
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' CRY ALOUD, spare not. Lift up your voice like a trumpet and declare to My people their transgression and to the house of Jacob their sins!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Yet they seek, inquire for, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require Me daily and delight [externally] to know My ways, as [if they were in reality] a nation that did righteousness and forsook not the ordinance of their God. They ask of Me righteous judgments, they delight to draw near to God [in visible ways].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Why have we fasted, they say, and You do not see it? Why have we afflicted ourselves, and You take no knowledge [of it]? Behold [O Israel], on the day of your fast [when you should be grieving for your sins], you find profit in your business, and [instead of stopping all work, as the law implies you and your workmen should do] you extort from your hired servants a full amount of labor. [Lev. 16:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [The facts are that] you fast only for strife and debate and to smite with the fist of wickedness. Fasting as you do today will not cause your voice to be heard on high.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Is such a fast as yours what I have chosen, a day for a man to humble himself with sorrow in his soul? [Is true fasting merely mechanical?] Is it only to bow down his head like a bulrush and to spread sackcloth and ashes under him [to indicate a condition of heart that he does not have]? Will you call this a fast and an acceptable day to the Lord?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [Rather] is not this the fast that I have chosen: to loose the bonds of wickedness, to undo the bands of the yoke, to let the oppressed go free, and that you break every [enslaving] yoke? [Acts 8:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Is it not to divide your bread with the hungry and bring the homeless poor into your house–when you see the naked, that you cover him, and that you hide not yourself from [the needs of] your own flesh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blood?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then shall your light break forth like the morning, and your healing (your restoration and the power of a new life) shall spring forth speedily; your righteousness (your rightness, your justice, and your right relationship with God) shall go before you [conducting you to peace and prosperity], and the glory of the Lord shall be your rear guard. [Exod. 14:19, 20; Isa. 52:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then you shall call, and the Lord will answer; you shall cry, and He will say, Here I am. If you take away from your midst yokes of oppression [wherever you find them], the finger pointed in scorn [toward the oppressed or the godly], and every form of false, harsh, unjust, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked speaking, [Exod. 3:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And if you pour out that with which you sustain your own life for the hungry and satisfy the need of the afflicted, then shall your light rise in darkness, and your obscurity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gloom become like the noonday.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the Lord shall guide you continually and satisfy you in drought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in dry places and make strong your bones. And you shall be like a watered garden and like a spring of water whose waters fail not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And your ancient ruins shall be rebuilt; you shall raise up the foundations of [buildings that have laid waste for] many generations; and you shall be called Repairer of the Breach, Restorer of Streets to Dwell In.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' If you turn away your foot from [traveling unduly on] the Sabbath, from doing your own pleasure on My holy day, and call the Sabbath a [spiritual] delight, the holy day of the Lord honorable, and honor Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' it, not going your own way or seeking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' finding your own pleasure or speaking with your own [idle] words,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then will you delight yourself in the Lord, and I will make you to ride on the high places of the earth, and I will feed you with the heritage [promised for you] of Jacob your father; for the mouth of the Lord has spoken it. [Gen. 27:28, 29; 28:13-15.]'
