document_id: HEB.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN MANY separate revelations [each of which set forth a portion of the Truth] and in different ways God spoke of old to [our] forefathers in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by the prophets,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [But] in the last of these days He has spoken to us in [the person of a] Son, Whom He appointed Heir '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lawful Owner of all things, also by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' through Whom He created the worlds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the reaches of space '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the ages of time [He made, produced, built, operated, and arranged them in order].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He is the sole expression of the glory of God [the Light-being, the out-raying or radiance of the divine], and He is the perfect imprint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' very image of [God''s] nature, upholding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' maintaining '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guiding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' propelling the universe by His mighty word of power. When He had '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by offering Himself
  - type: text
    text: ' accomplished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' cleansing of sins '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' riddance of guilt, He sat down at the right hand of the divine Majesty on high,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [Taking a place and rank by which] He Himself became as much superior to angels as the glorious Name (title) which He has inherited is different from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more excellent than theirs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For to which of the angels did [God] ever say, You are My Son, today I have begotten You [established You in an official Sonship relation, with kingly dignity]? And again, I will be to Him a Father, and He will be to Me a Son? [II Sam. 7:14; Ps. 2:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Moreover, when He brings the firstborn Son again into the habitable world, He says, Let all the angels of God worship Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Referring to the angels He says, [God] Who makes His angels winds and His ministering servants flames of fire; [Ps. 104:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But as to the Son, He says to Him, Your throne, O God, is forever and ever (to the ages of the ages), and the scepter of Your kingdom is a scepter of absolute righteousness (of justice and straightforwardness).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You have loved righteousness [You have delighted in integrity, virtue, and uprightness in purpose, thought, and action] and You have hated lawlessness (injustice and iniquity). Therefore God, [even] Your God (Godhead), has anointed You with the oil of exultant joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gladness above '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beyond Your companions. [Ps. 45:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And [further], You, Lord, did lay the foundation of the earth in the beginning, and the heavens are the works of Your hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They will perish, but You remain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continue permanently; they will all grow old '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wear out like a garment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Like a mantle [thrown about one''s self] You will roll them up, and they will be changed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' replaced by others. But You remain the same, and Your years will never end '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' come to failure. [Ps. 102:25-27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Besides, to which of the angels has He ever said, Sit at My right hand [associated with Me in My royal dignity] till I make your enemies a stool for your feet? [Ps. 110:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Are not the angels all ministering spirits (servants) sent out in the service [of God for the assistance] of those who are to inherit salvation?'
