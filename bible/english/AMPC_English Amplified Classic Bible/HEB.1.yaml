verses:
  '1':
  - type: text
    content: ' IN MANY separate revelations [each of which set forth a portion of the Truth] and in different ways God spoke of old to [our] forefathers in '
  - type: text
    content: and
  - type: text
    content: ' by the prophets,'
  '10':
  - type: text
    content: ' And [further], You, Lord, did lay the foundation of the earth in the beginning, and the heavens are the works of Your hands.'
  '11':
  - type: text
    content: ' They will perish, but You remain '
  - type: text
    content: and
  - type: text
    content: ' continue permanently; they will all grow old '
  - type: text
    content: and
  - type: text
    content: ' wear out like a garment.'
  '12':
  - type: text
    content: ' Like a mantle [thrown about one''s self] You will roll them up, and they will be changed '
  - type: text
    content: and
  - type: text
    content: ' replaced by others. But You remain the same, and Your years will never end '
  - type: text
    content: nor
  - type: text
    content: ' come to failure. [Ps. 102:25-27.]'
  '13':
  - type: text
    content: ' Besides, to which of the angels has He ever said, Sit at My right hand [associated with Me in My royal dignity] till I make your enemies a stool for your feet? [Ps. 110:1.]'
  '14':
  - type: text
    content: ' Are not the angels all ministering spirits (servants) sent out in the service [of God for the assistance] of those who are to inherit salvation?'
  '2':
  - type: text
    content: ' [But] in the last of these days He has spoken to us in [the person of a] Son, Whom He appointed Heir '
  - type: text
    content: and
  - type: text
    content: ' lawful Owner of all things, also by '
  - type: text
    content: and
  - type: text
    content: ' through Whom He created the worlds '
  - type: text
    content: and
  - type: text
    content: ' the reaches of space '
  - type: text
    content: and
  - type: text
    content: ' the ages of time [He made, produced, built, operated, and arranged them in order].'
  '3':
  - type: text
    content: ' He is the sole expression of the glory of God [the Light-being, the out-raying or radiance of the divine], and He is the perfect imprint '
  - type: text
    content: and
  - type: text
    content: ' very image of [God''s] nature, upholding '
  - type: text
    content: and
  - type: text
    content: ' maintaining '
  - type: text
    content: and
  - type: text
    content: ' guiding '
  - type: text
    content: and
  - type: text
    content: ' propelling the universe by His mighty word of power. When He had '
  - type: text
    content: by offering Himself
  - type: text
    content: ' accomplished '
  - type: text
    content: our
  - type: text
    content: ' cleansing of sins '
  - type: text
    content: and
  - type: text
    content: ' riddance of guilt, He sat down at the right hand of the divine Majesty on high,'
  '4':
  - type: text
    content: ' [Taking a place and rank by which] He Himself became as much superior to angels as the glorious Name (title) which He has inherited is different from '
  - type: text
    content: and
  - type: text
    content: ' more excellent than theirs.'
  '5':
  - type: text
    content: ' For to which of the angels did [God] ever say, You are My Son, today I have begotten You [established You in an official Sonship relation, with kingly dignity]? And again, I will be to Him a Father, and He will be to Me a Son? [II Sam. 7:14; Ps. 2:7.]'
  '6':
  - type: text
    content: ' Moreover, when He brings the firstborn Son again into the habitable world, He says, Let all the angels of God worship Him.'
  '7':
  - type: text
    content: ' Referring to the angels He says, [God] Who makes His angels winds and His ministering servants flames of fire; [Ps. 104:4.]'
  '8':
  - type: text
    content: ' But as to the Son, He says to Him, Your throne, O God, is forever and ever (to the ages of the ages), and the scepter of Your kingdom is a scepter of absolute righteousness (of justice and straightforwardness).'
  '9':
  - type: text
    content: ' You have loved righteousness [You have delighted in integrity, virtue, and uprightness in purpose, thought, and action] and You have hated lawlessness (injustice and iniquity). Therefore God, [even] Your God (Godhead), has anointed You with the oil of exultant joy '
  - type: text
    content: and
  - type: text
    content: ' gladness above '
  - type: text
    content: and
  - type: text
    content: ' beyond Your companions. [Ps. 45:6, 7.]'
