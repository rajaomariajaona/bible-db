document_id: ROM.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FROM PAUL, a bond servant of Jesus Christ (the Messiah) called to be an apostle, (a special messenger) set apart to [preach] the Gospel (good news) of '
  - type: text
    content: and
  - type: text
    content: ' from God,'
  '10':
  - type: text
    content: ' I keep pleading that somehow by God''s will I may now at last prosper '
  - type: text
    content: and
  - type: text
    content: ' come to you.'
  '11':
  - type: text
    content: ' For I am yearning to see you, that I may impart '
  - type: text
    content: and
  - type: text
    content: ' share with you some spiritual gift to strengthen '
  - type: text
    content: and
  - type: text
    content: ' establish you;'
  '12':
  - type: text
    content: ' That is, that we may be mutually strengthened '
  - type: text
    content: and
  - type: text
    content: ' encouraged '
  - type: text
    content: and
  - type: text
    content: ' comforted by each other''s faith, both yours and mine.'
  '13':
  - type: text
    content: ' I want you to know, brethren, that many times I have planned '
  - type: text
    content: and
  - type: text
    content: ' intended to come to you, though thus far I have been hindered '
  - type: text
    content: and
  - type: text
    content: ' prevented, in order that I might have some fruit (some result of my labors) among you, as I have among the rest of the Gentiles.'
  '14':
  - type: text
    content: ' Both to Greeks and to barbarians (to the cultured and to the uncultured), both to the wise and the foolish, I have an obligation to discharge '
  - type: text
    content: and
  - type: text
    content: ' a duty to perform '
  - type: text
    content: and
  - type: text
    content: ' a debt to pay.'
  '15':
  - type: text
    content: ' So, for my part, I am willing '
  - type: text
    content: and
  - type: text
    content: ' eagerly ready to preach the Gospel to you also who are in Rome.'
  '16':
  - type: text
    content: ' For I am not ashamed of the Gospel (good news) '
  - type: text
    content: of Christ,
  - type: text
    content: ' for it is God''s power working unto salvation [for deliverance from eternal death] to everyone who believes '
  - type: text
    content: with
  - type: text
    content: ' a personal trust '
  - type: text
    content: and
  - type: text
    content: ' a confident surrender '
  - type: text
    content: and
  - type: text
    content: ' firm reliance, to the Jew first and also to the Greek,'
  '17':
  - type: text
    content: ' For in the Gospel a righteousness which God ascribes is revealed, both springing from faith and leading to faith [disclosed through the way of faith that arouses to more faith]. As it is written, The man who through faith is just '
  - type: text
    content: and
  - type: text
    content: ' upright shall live '
  - type: text
    content: and
  - type: text
    content: ' shall live by faith. [Hab. 2:4.]'
  '18':
  - type: text
    content: ' For God''s [holy] wrath '
  - type: text
    content: and
  - type: text
    content: ' indignation are revealed from heaven against all ungodliness and unrighteousness of men, who in their wickedness repress '
  - type: text
    content: and
  - type: text
    content: ' hinder the truth '
  - type: text
    content: and
  - type: text
    content: ' make it inoperative.'
  '19':
  - type: text
    content: ' For that which is known about God is evident to them '
  - type: text
    content: and
  - type: text
    content: ' made plain in their inner consciousness, because God [Himself] has shown it to them.'
  '2':
  - type: text
    content: ' Which He promised in advance [long ago] through His prophets in the sacred Scriptures–'
  '20':
  - type: text
    content: ' For ever since the creation of the world His invisible nature '
  - type: text
    content: and
  - type: text
    content: ' attributes, that is, His eternal power and divinity, have been made intelligible '
  - type: text
    content: and
  - type: text
    content: ' clearly discernible in '
  - type: text
    content: and
  - type: text
    content: ' through the things that have been made (His handiworks). So [men] are without excuse [altogether without any defense or justification], [Ps. 19: 1-4.]'
  '21':
  - type: text
    content: ' Because when they knew '
  - type: text
    content: and
  - type: text
    content: ' recognized Him as God, they did not honor '
  - type: text
    content: and
  - type: text
    content: ' glorify Him as God or give Him thanks. But instead they became futile '
  - type: text
    content: and
  - type: text
    content: ' godless in their thinking [with vain imaginings, foolish reasoning, and stupid speculations] and their senseless minds were darkened.'
  '22':
  - type: text
    content: ' Claiming to be wise, they became fools [professing to be smart, they made simpletons of themselves].'
  '23':
  - type: text
    content: ' And by them the glory and majesty '
  - type: text
    content: and
  - type: text
    content: ' excellence of the immortal God were exchanged for '
  - type: text
    content: and
  - type: text
    content: ' represented by images, resembling mortal man and birds and beasts and reptiles.'
  '24':
  - type: text
    content: ' Therefore God gave them up in the lusts of their [own] hearts to sexual impurity, to the dishonoring of their bodies among themselves [abandoning them to the degrading power of sin],'
  '25':
  - type: text
    content: ' Because they exchanged the truth of God for a lie and worshiped and served the creature rather than the Creator, Who is blessed forever! Amen (so be it). [Jer. 2:11.]'
  '26':
  - type: text
    content: ' For this reason God gave them over '
  - type: text
    content: and
  - type: text
    content: ' abandoned them to vile affections '
  - type: text
    content: and
  - type: text
    content: ' degrading passions. For their women exchanged their natural function for an unnatural '
  - type: text
    content: and
  - type: text
    content: ' abnormal one,'
  '27':
  - type: text
    content: ' And the men also turned from natural relations with women and were set ablaze (burning out, consumed) with lust for one another–men committing shameful acts with men and suffering in their own bodies '
  - type: text
    content: and
  - type: text
    content: ' personalities the inevitable consequences '
  - type: text
    content: and
  - type: text
    content: ' penalty of their wrong-doing '
  - type: text
    content: and
  - type: text
    content: ' going astray, which was [their] fitting retribution.'
  '28':
  - type: text
    content: ' And so, since they did not see fit to acknowledge God '
  - type: text
    content: or
  - type: text
    content: ' approve of Him '
  - type: text
    content: or
  - type: text
    content: ' consider Him worth the knowing, God gave them over to a base '
  - type: text
    content: and
  - type: text
    content: ' condemned mind to do things not proper '
  - type: text
    content: or
  - type: text
    content: ' decent '
  - type: text
    content: but
  - type: text
    content: ' loathsome,'
  '29':
  - type: text
    content: ' Until they were filled (permeated and saturated) with every kind of unrighteousness, iniquity, grasping '
  - type: text
    content: and
  - type: text
    content: ' covetous greed, and malice. [They were] full of envy '
  - type: text
    content: and
  - type: text
    content: ' jealousy, murder, strife, deceit '
  - type: text
    content: and
  - type: text
    content: ' treachery, ill will '
  - type: text
    content: and
  - type: text
    content: ' cruel ways. [They were] secret backbiters '
  - type: text
    content: and
  - type: text
    content: ' gossipers,'
  '3':
  - type: text
    content: ' [The Gospel] regarding His Son, Who as to the flesh (His human nature) was descended from David,'
  '30':
  - type: text
    content: ' Slanderers, hateful to '
  - type: text
    content: and
  - type: text
    content: ' hating God, full of insolence, arrogance, [and] boasting; inventors of new forms of evil, disobedient '
  - type: text
    content: and
  - type: text
    content: ' undutiful to parents.'
  '31':
  - type: text
    content: ' [They were] without understanding, conscienceless '
  - type: text
    content: and
  - type: text
    content: ' faithless, heartless '
  - type: text
    content: and
  - type: text
    content: ' loveless [and] merciless.'
  '32':
  - type: text
    content: ' Though they are fully aware of God''s righteous decree that those who do such things deserve to die, they not only do them themselves but approve '
  - type: text
    content: and
  - type: text
    content: ' applaud others who practice them.'
  '4':
  - type: text
    content: ' And [as to His divine nature] according to the Spirit of holiness was openly designated the Son of God in power [in a striking, triumphant and miraculous manner] by His resurrection from the dead, even Jesus Christ our Lord (the Messiah, the Anointed One).'
  '5':
  - type: text
    content: ' It is through Him that we have received grace (God''s unmerited favor) and [our] apostleship to promote obedience to the faith '
  - type: text
    content: and
  - type: text
    content: ' make disciples for His name''s sake among all the nations,'
  '6':
  - type: text
    content: ' And this includes you, called of Jesus Christ '
  - type: text
    content: and
  - type: text
    content: ' invited [as you are] to belong to Him.'
  '7':
  - type: text
    content: ' To [you then] all God''s beloved ones in Rome, called to be saints '
  - type: text
    content: and
  - type: text
    content: ' designated for a consecrated life: Grace '
  - type: text
    content: and
  - type: text
    content: ' spiritual blessing and peace be yours from God our Father and from the Lord Jesus Christ.'
  '8':
  - type: text
    content: ' First, I thank my God through Jesus Christ for all of you, because [the report of] your faith is made known to all the world '
  - type: text
    content: and
  - type: text
    content: ' is commended everywhere.'
  '9':
  - type: text
    content: ' For God is my witness, Whom I serve with my [whole] spirit [rendering priestly and spiritual service] in [preaching] the Gospel '
  - type: text
    content: and
  - type: text
    content: ' [telling] the good news of His Son, how incessantly I always mention you when at my prayers.'
