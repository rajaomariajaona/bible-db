document_id: ROM.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FROM PAUL, a bond servant of Jesus Christ (the Messiah) called to be an apostle, (a special messenger) set apart to [preach] the Gospel (good news) of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Which He promised in advance [long ago] through His prophets in the sacred Scriptures–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' [The Gospel] regarding His Son, Who as to the flesh (His human nature) was descended from David,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And [as to His divine nature] according to the Spirit of holiness was openly designated the Son of God in power [in a striking, triumphant and miraculous manner] by His resurrection from the dead, even Jesus Christ our Lord (the Messiah, the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' It is through Him that we have received grace (God''s unmerited favor) and [our] apostleship to promote obedience to the faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make disciples for His name''s sake among all the nations,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And this includes you, called of Jesus Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' invited [as you are] to belong to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' To [you then] all God''s beloved ones in Rome, called to be saints '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' designated for a consecrated life: Grace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spiritual blessing and peace be yours from God our Father and from the Lord Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' First, I thank my God through Jesus Christ for all of you, because [the report of] your faith is made known to all the world '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is commended everywhere.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For God is my witness, Whom I serve with my [whole] spirit [rendering priestly and spiritual service] in [preaching] the Gospel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [telling] the good news of His Son, how incessantly I always mention you when at my prayers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I keep pleading that somehow by God''s will I may now at last prosper '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For I am yearning to see you, that I may impart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share with you some spiritual gift to strengthen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' That is, that we may be mutually strengthened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comforted by each other''s faith, both yours and mine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I want you to know, brethren, that many times I have planned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intended to come to you, though thus far I have been hindered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prevented, in order that I might have some fruit (some result of my labors) among you, as I have among the rest of the Gentiles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Both to Greeks and to barbarians (to the cultured and to the uncultured), both to the wise and the foolish, I have an obligation to discharge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a duty to perform '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a debt to pay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So, for my part, I am willing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eagerly ready to preach the Gospel to you also who are in Rome.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For I am not ashamed of the Gospel (good news) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of Christ,
  - type: text
    text: ' for it is God''s power working unto salvation [for deliverance from eternal death] to everyone who believes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' a personal trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a confident surrender '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' firm reliance, to the Jew first and also to the Greek,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For in the Gospel a righteousness which God ascribes is revealed, both springing from faith and leading to faith [disclosed through the way of faith that arouses to more faith]. As it is written, The man who through faith is just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upright shall live '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shall live by faith. [Hab. 2:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For God''s [holy] wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation are revealed from heaven against all ungodliness and unrighteousness of men, who in their wickedness repress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hinder the truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make it inoperative.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For that which is known about God is evident to them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made plain in their inner consciousness, because God [Himself] has shown it to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For ever since the creation of the world His invisible nature '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attributes, that is, His eternal power and divinity, have been made intelligible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clearly discernible in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' through the things that have been made (His handiworks). So [men] are without excuse [altogether without any defense or justification], [Ps. 19: 1-4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Because when they knew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognized Him as God, they did not honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorify Him as God or give Him thanks. But instead they became futile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godless in their thinking [with vain imaginings, foolish reasoning, and stupid speculations] and their senseless minds were darkened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Claiming to be wise, they became fools [professing to be smart, they made simpletons of themselves].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And by them the glory and majesty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excellence of the immortal God were exchanged for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' represented by images, resembling mortal man and birds and beasts and reptiles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Therefore God gave them up in the lusts of their [own] hearts to sexual impurity, to the dishonoring of their bodies among themselves [abandoning them to the degrading power of sin],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Because they exchanged the truth of God for a lie and worshiped and served the creature rather than the Creator, Who is blessed forever! Amen (so be it). [Jer. 2:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For this reason God gave them over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abandoned them to vile affections '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' degrading passions. For their women exchanged their natural function for an unnatural '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abnormal one,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And the men also turned from natural relations with women and were set ablaze (burning out, consumed) with lust for one another–men committing shameful acts with men and suffering in their own bodies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' personalities the inevitable consequences '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' penalty of their wrong-doing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' going astray, which was [their] fitting retribution.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And so, since they did not see fit to acknowledge God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' approve of Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' consider Him worth the knowing, God gave them over to a base '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemned mind to do things not proper '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' decent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' loathsome,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Until they were filled (permeated and saturated) with every kind of unrighteousness, iniquity, grasping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' covetous greed, and malice. [They were] full of envy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' jealousy, murder, strife, deceit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treachery, ill will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cruel ways. [They were] secret backbiters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gossipers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Slanderers, hateful to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hating God, full of insolence, arrogance, [and] boasting; inventors of new forms of evil, disobedient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' undutiful to parents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' [They were] without understanding, conscienceless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithless, heartless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loveless [and] merciless.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Though they are fully aware of God''s righteous decree that those who do such things deserve to die, they not only do them themselves but approve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' applaud others who practice them.'
