document_id: EZK.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW [when I was] in [my] thirtieth year, in the fourth month, in the fifth day of the month, as I was in the midst of captivity beside the river Chebar [in Babylonia], the heavens were opened and I saw visions of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' On the fifth day of the month, which was in the fifth year of King Jehoiachin''s captivity,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The word of the Lord came expressly to Ezekiel the priest, the son of Buzi, in the land of the Chaldeans by the river Chebar; and the hand of the Lord was there upon him. [I Kings 18:46; II Kings 3:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' As I looked, behold, a stormy wind came out of the north, and a great cloud with a fire enveloping it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' flashing continually; a brightness was about it and out of the midst of it there seemed to glow amber metal, out of the midst of the fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And out of the midst of it came the likeness of four living creatures [or cherubim]. And this was their appearance: they had the likeness of a man,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But each one had four faces and each one had four wings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And their legs were straight legs, and the sole of their feet was like the sole of a calf''s foot, and they sparkled like burnished bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And they had the hands of a man under their wings on their four sides. And the four of them had their faces and their wings thus:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Their wings touched one another; they turned not when they went but went every one straight forward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' As for the likeness of their faces, they each had the face of a man [in front], and each had the face of a lion on the right side and the face of an ox on the left side; the four also had the face of an eagle [at the back of their heads]. [Rev. 4:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Such were their faces. And their wings were stretched out upward [each creature had four wings]; two wings of each one were touching the [adjacent] wing of the creatures on either side of it, and [the remaining] two wings of each creature covered its body.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they went every one straight forward; wherever the spirit would go, they went, and they turned not when they went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' In the midst of the living creatures there was what looked like burning coals of fire, like torches moving to and fro among the living creatures; the fire was bright and out of the fire went forth lightning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the living creatures darted back and forth like a flash of lightning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now as I was still looking at the living creatures, I saw one wheel upon the ground beside each of the living creatures with its four faces.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' As to the appearance of the wheels and their construction: in appearance they gleamed like chrysolite; and the four were formed alike, and their construction work was as it were a wheel within a wheel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' When they went, they went in one of their four directions without turning [for they were faced that way].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' As for their rims, they were so high that they were dreadful, and the four had their rims full of eyes round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And when the living creatures went, the wheels went beside them; and when the living creatures were lifted up from the earth, the wheels were lifted up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Wherever the spirit went, the creatures went and the wheels rose along with them, for the spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' life of the [four living creatures acting as one] living creature was in the wheels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' When those went, these went; and when those stood, these stood; and when those were lifted up from the earth, the wheels were lifted up high beside them, for the spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' life of the [combined] living creature was in the wheels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Over the head of the [combined] living creature there was the likeness of a firmament, looking like the terrible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' awesome [dazzling of shining] crystal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ice stretched across the expanse of sky over their heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And under the firmament their wings were stretched out straight, one toward another. Every living creature had two wings which covered its body on this side and two which covered it on that side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And when they went, I heard the sound of their wings like the noise of great waters, like the voice of the Almighty, the sound of tumult like the noise of a host. When they stood, they let down their wings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And there was a voice above the firmament that was over their heads; when they stood, they let down their wings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And above the firmament that was over their heads was the likeness of a throne in appearance like a sapphire stone, and seated above the likeness of a throne was a likeness with the appearance of a Man. [Phil. 2:5-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' From what had the appearance of His waist upward, I saw a lustre as it were glowing metal with the appearance of fire enclosed round about within it; and from the appearance of His waist downward, I saw as it were the appearance of fire, and there was brightness [of a halo] round about Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Like the appearance of the bow that is in the cloud on the day of rain, so was the appearance of the brightness round about. This was the appearance of the likeness of the glory of the Lord. And when I saw it, I fell upon my face and I heard a voice of One speaking. [Rev. 4:3.]'
