document_id: PRO.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WISDOM HAS built her house; she has hewn out '
  - type: text
    content: and
  - type: text
    content: ' set up her seven [perfect number of] pillars.'
  '10':
  - type: text
    content: ' The reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord is the beginning (the chief and choice part) of Wisdom, and the knowledge of the Holy One is insight '
  - type: text
    content: and
  - type: text
    content: ' understanding.'
  '11':
  - type: text
    content: ' For by me [Wisdom from God] your days shall be multiplied, and the years of your life shall be increased.'
  '12':
  - type: text
    content: ' If you are wise, you are wise for yourself; if you scorn, you alone will bear it '
  - type: text
    content: and
  - type: text
    content: ' pay the penalty.'
  '13':
  - type: text
    content: ' The foolish woman is noisy; she is simple '
  - type: text
    content: and
  - type: text
    content: ' open to all forms of evil, she [willfully and recklessly] knows nothing whatever [of eternal value].'
  '14':
  - type: text
    content: ' For she sits at the door of her house '
  - type: text
    content: or
  - type: text
    content: ' on a seat in the conspicuous places of the town,'
  '15':
  - type: text
    content: ' Calling to those who pass by, who go uprightly on their way:'
  '16':
  - type: text
    content: ' Whoever is simple (wavering and easily led astray), let him turn in here! And as for him who lacks understanding, she says to him,'
  '17':
  - type: text
    content: ' Stolen waters (pleasures) are sweet [because they are forbidden]; and bread eaten in secret is pleasant. [Prov. 20:17.]'
  '18':
  - type: text
    content: ' But he knows not that the shades of the dead are there [specters haunting the scene of past transgressions], and that her invited guests are [already sunk] in the depths of Sheol (the lower world, Hades, the place of the dead).'
  '2':
  - type: text
    content: ' She has killed her beasts, she has mixed her [spiritual] wine; she has also set her table. [Matt. 22:2-4.]'
  '3':
  - type: text
    content: ' She has sent out her maids to cry from the highest places of the town:'
  '4':
  - type: text
    content: ' Whoever is simple (easily led astray and wavering), let him turn in here! As for him who lacks understanding, [God''s] Wisdom says to him,'
  '5':
  - type: text
    content: ' Come, eat of my bread and drink of the [spiritual] wine which I have mixed. [Isa. 55:1; John 6:27.]'
  '6':
  - type: text
    content: ' Leave off, simple ones [forsake the foolish and simpleminded] and live! And walk in the way of insight '
  - type: text
    content: and
  - type: text
    content: ' understanding.'
  '7':
  - type: text
    content: ' He who rebukes a scorner heaps upon himself abuse, and he who reproves a wicked man gets for himself bruises.'
  '8':
  - type: text
    content: ' Reprove not a scorner, lest he hate you; reprove a wise man, and he will love you. [Ps. 141:5.]'
  '9':
  - type: text
    content: ' Give instruction to a wise man and he will be yet wiser; teach a righteous man (one upright and in right standing with God) and he will increase in learning.'
