document_id: PRO.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WISDOM HAS built her house; she has hewn out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set up her seven [perfect number of] pillars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' She has killed her beasts, she has mixed her [spiritual] wine; she has also set her table. [Matt. 22:2-4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' She has sent out her maids to cry from the highest places of the town:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Whoever is simple (easily led astray and wavering), let him turn in here! As for him who lacks understanding, [God''s] Wisdom says to him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Come, eat of my bread and drink of the [spiritual] wine which I have mixed. [Isa. 55:1; John 6:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Leave off, simple ones [forsake the foolish and simpleminded] and live! And walk in the way of insight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He who rebukes a scorner heaps upon himself abuse, and he who reproves a wicked man gets for himself bruises.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Reprove not a scorner, lest he hate you; reprove a wise man, and he will love you. [Ps. 141:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Give instruction to a wise man and he will be yet wiser; teach a righteous man (one upright and in right standing with God) and he will increase in learning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The reverent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear of the Lord is the beginning (the chief and choice part) of Wisdom, and the knowledge of the Holy One is insight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For by me [Wisdom from God] your days shall be multiplied, and the years of your life shall be increased.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' If you are wise, you are wise for yourself; if you scorn, you alone will bear it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay the penalty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The foolish woman is noisy; she is simple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' open to all forms of evil, she [willfully and recklessly] knows nothing whatever [of eternal value].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For she sits at the door of her house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' on a seat in the conspicuous places of the town,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Calling to those who pass by, who go uprightly on their way:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Whoever is simple (wavering and easily led astray), let him turn in here! And as for him who lacks understanding, she says to him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Stolen waters (pleasures) are sweet [because they are forbidden]; and bread eaten in secret is pleasant. [Prov. 20:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But he knows not that the shades of the dead are there [specters haunting the scene of past transgressions], and that her invited guests are [already sunk] in the depths of Sheol (the lower world, Hades, the place of the dead).'
