document_id: JER.33,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' MOREOVER, THE word of the Lord came to Jeremiah the second time, while he was still shut up in the court of the guard, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord: Yet again there shall be heard in this place of which you say, It is a desolate waste, without man and without beast–even in the cities of Judah and in the streets of Jerusalem that are desolate, without man and without inhabitant and without beast–'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [There shall be heard again] the voice of joy and the voice of gladness, the voice of the bridegroom and the voice of the bride, the voices of those who sing as they bring sacrifices of thanksgiving into the house of the Lord, Give praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thanks to the Lord of hosts, for the Lord is good; for His mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast love endure forever! For I will cause the captivity of the land to be reversed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' return to be as it was at first, says the Lord.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord of hosts: In this place which is desolate, without man and without beast, and in all its cities, there shall again be dwellings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pastures of shepherds resting their flocks.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the cities of the hill country, in the cities of the lowland, in the cities of the South (the Negeb), in the land of Benjamin, in the places around Jerusalem, and in the cities of Judah shall flocks pass again under the hands of him who counts them, says the Lord.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, the days are coming, says the Lord, when I will fulfill the good promise I have made to the house of Israel and the house of Judah.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In those days and at that time will I cause a righteous Branch [the Messiah] to grow up to David; and He shall execute justice and righteousness in the land. [Isa. 4:2; Jer. 23:5; Zech. 3:8; 6:12.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In those days Judah shall be saved and Jerusalem shall dwell safely. And this is the name by which it will be called, The Lord is Our Righteousness (our Rightness, our Justice).'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For thus says the Lord: David shall never fail [to have] a man [descendant] to sit on the throne of the house of Israel,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Nor shall the Levitical priests fail [to have] a man [descendant] to offer burnt offerings before Me and to burn cereal offerings and to make sacrifices continually (all day long).'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the word of the Lord came to Jeremiah, saying,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord Who made [the earth], the Lord Who formed it to establish it–the Lord is His name:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord: If you can break My covenant with the day, and My covenant with the night, so that there should not be day and night in their season,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then can also My covenant be broken with David My servant, so that he shall not have a son to reign upon his throne, and [My league be broken also] with the Levitical priests, My ministers.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As the host of [the stars of] the heavens cannot be numbered nor the sand of the sea be measured, so will I multiply the offspring of David My servant and the Levites who minister to Me.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moreover, the word of the Lord came to Jeremiah, saying,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Have you not noticed that these people [the Jews] are saying, The Lord has cast off the two families [Israel and Judah] which He chose? Thus My people have despised [themselves in relation to God as His covenant people], so that they are no more a nation in their [own] sight.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord: If My covenant with day and night does not stand, and if I have not appointed the ordinances of the heavens and the earth [the whole order of nature],'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then will I also cast away the descendants of Jacob and David My servant and will not choose one of his offspring to be ruler over the descendants of Abraham, Isaac, and Jacob. For I will cause their captivity to be reversed, and I will have mercy, kindness, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast love on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for them. [Gen. 49:10.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Call to Me and I will answer you and show you great and mighty things, fenced in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hidden, which you do not know (do not distinguish and recognize, have knowledge of and understand).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For thus says the Lord, the God of Israel, concerning the houses of this city and the houses of the kings of Judah which are torn down to make a defense against the siege mounds and before the sword: [Isa. 22:10; Jer. 6:6.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They [the besieged Jews] are coming in to fight against the Chaldeans, and they [the houses] will be filled with the dead bodies of men whom I shall slay in My anger and My wrath; for I have hidden My face [in indignation] from this city because of all their wickedness.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, [in the future restored Jerusalem] I will lay upon it health and healing, and I will cure them and will reveal to them the abundance of peace (prosperity, security, stability) and truth.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will cause the captivity of Judah and the captivity of Israel to be reversed and will rebuild them as they were at first.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will cleanse them from all the guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' iniquity by which they have sinned against Me, and I will forgive all their guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' iniquities by which they have sinned and rebelled against Me.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [Jerusalem] shall be to Me a name of joy, a praise and a glory before all the nations of the earth that hear of all the good I do for it, and they shall fear and tremble because of all the good and all the peace, prosperity, security, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stability I provide for it.'
