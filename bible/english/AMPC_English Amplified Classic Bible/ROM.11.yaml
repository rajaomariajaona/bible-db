document_id: ROM.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I ASK then: Has God totally rejected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disowned His people? Of course not! Why, I myself am an Israelite, a descendant of Abraham, a member of the tribe of Benjamin! [I Sam. 12:22; Jer. 31:37; 33:24-26; Phil. 3:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' No, God has not rejected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disowned His people [whose destiny] He had marked out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foreknown from the beginning. Do you not know what the Scripture says of Elijah, how he pleads with God against Israel? [Ps. 94:14; I Kings 19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Lord, they have killed Your prophets; they have demolished Your altars, and I alone am left, and they seek my life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But what is God''s reply to him? I have kept for Myself seven thousand men who have not bowed the knee to Baal! [I Kings 19:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So too at the present time there is a remnant (a small believing minority), selected (chosen) by grace (by God''s unmerited favor and graciousness).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But if it is by grace (His unmerited favor and graciousness), it is no longer conditioned on works or anything men have done. Otherwise, grace would no longer be grace [it would be meaningless].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' What then [shall we conclude]? Israel failed to obtain what it sought [God''s favor by obedience to the Law]. Only the elect (those chosen few) obtained it, while the rest of them became callously indifferent (blinded, hardened, and made insensible to it).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' As it is written, God gave them a spirit (an attitude) of stupor, eyes that should not see and ears that should not hear, [that has continued] down to this very day. [Deut. 29:4; Isa. 29:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And David says, Let their table (their feasting, banqueting) become a snare and a trap, a pitfall and a just retribution [rebounding like a boomerang upon them]; [Ps. 69:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Let their eyes be darkened (dimmed) so that they cannot see, and make them bend their back [stooping beneath their burden] forever. [Ps. 69:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So I ask, Have they stumbled so as to fall [to their utter spiritual ruin, irretrievably]? By no means! But through their false step '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' transgression salvation [has come] to the Gentiles, so as to arouse Israel [to see and feel what they forfeited] and so to make them jealous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now if their stumbling (their lapse, their transgression) has so enriched the world [at large], and if [Israel''s] failure means such riches for the Gentiles, think what an enrichment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' greater advantage will follow their full reinstatement!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But now I am speaking to you who are Gentiles. Inasmuch then as I am an apostle to the Gentiles, I lay great stress on my ministry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnify my office,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' In the hope of making my fellow Jews jealous [in order to stir them up to imitate, copy, and appropriate], and thus managing to save some of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For if their rejection '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exclusion from the benefits of salvation were [overruled] for the reconciliation of a world to God, what will their acceptance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admission mean? [It will be nothing short of] life from the dead!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Now if the first handful of dough offered as the firstfruits [Abraham and the patriarchs] is consecrated (holy), so is the whole mass [the nation of Israel]; and if the root [Abraham] is consecrated (holy), so are the branches. [Num. 15:19-21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But if some of the branches were broken off, while you, a wild olive shoot, were grafted in among them to share the richness [of the root and sap] of the olive tree,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Do not boast over the branches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pride yourself at their expense. If you do boast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feel superior, remember it is not you that support the root, but the root [that supports] you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You will say then, Branches were broken (pruned) off so that I might be grafted in!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' That is true. But they were broken (pruned) off because of their unbelief (their lack of real faith), and you are established through faith [because you do believe]. So do not become proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conceited, but rather stand in awe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be reverently afraid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For if God did not spare the natural branches [because of unbelief], neither will He spare you [if you are guilty of the same offense].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then note '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appreciate the gracious kindness and the severity of God: severity toward those who have fallen, but God''s gracious kindness to you–provided you continue in His grace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abide in His kindness; otherwise you too will be cut off (pruned away).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And even those others [the fallen branches, Jews], if they do not persist in [clinging to] their unbelief, will be grafted in, for God has the power to graft them in again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For if you have been cut from what is by nature a wild olive tree, and against nature grafted into a cultivated olive tree, how much easier will it be to graft these natural [branches] back on [the original parent stock of] their own olive tree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Lest you be self-opinionated (wise in your own conceits), I do not want you to miss this hidden truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mystery, brethren: a hardening (insensibility) has [temporarily] befallen a part of Israel [to last] until the full number of the ingathering of the Gentiles has come in,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And so all Israel will be saved. As it is written, The Deliverer will come from Zion, He will banish ungodliness from Jacob. [Isa. 59:20, 21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And this will be My covenant (My agreement) with them when I shall take away their sins. [Isa. 27:9; Jer. 31:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' From the point of view of the Gospel (good news), they [the Jews, at present] are enemies [of God], which is for your advantage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' benefit. But from the point of view of God''s choice (of election, of divine selection), they are still the beloved (dear to Him) for the sake of their forefathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' For God''s gifts and His call are irrevocable. [He never withdraws them when once they are given, and He does not change His mind about those to whom He gives His grace or to whom He sends His call.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Just as you were once disobedient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rebellious toward God but now have obtained [His] mercy, through their disobedience,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So they also now are being disobedient [when you are receiving mercy], that they in turn may one day, through the mercy you are enjoying, also receive mercy [that they may share the mercy which has been shown to you–through you as messengers of the Gospel to them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' For God has consigned (penned up) all men to disobedience, only that He may have mercy on them all [alike].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Oh, the depth of the riches and wisdom and knowledge of God! How unfathomable (inscrutable, unsearchable) are His judgments (His decisions)! And how untraceable (mysterious, undiscoverable) are His ways (His methods, His paths)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' For who has known the mind of the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' who has understood His thoughts, or who has [ever] been His counselor? [Isa. 40:13, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Or who has first given God anything that he might be paid back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' that he could claim a recompense?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' For from Him and through Him and to Him are all things. [For all things originate with Him and come from Him; all things live through Him, and all things center in and tend to consummate and to end in Him.] To Him be glory forever! Amen (so be it).'
