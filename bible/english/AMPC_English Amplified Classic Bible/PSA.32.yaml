document_id: PSA.32,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: +[A Psalm of David.+] A skillful song, {or} a didactic {or} reflective poem.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' BLESSED (HAPPY, fortunate, to be envied) is he who has forgiveness of his transgression continually exercised upon him, whose sin is covered.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Many are the sorrows of the wicked, but he who trusts in, relies on, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently leans on the Lord shall be compassed about with mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with loving-kindness.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Be glad in the Lord and rejoice, you [uncompromisingly] righteous [you who are upright and in right standing with Him]; shout for joy, all you upright in heart!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Blessed (happy, fortunate, to be envied) is the man to whom the Lord imputes no iniquity and in whose spirit there is no deceit. [Rom. 4:7, 8.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' When I kept silence [before I confessed], my bones wasted away through my groaning all the day long.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For day and night Your hand [of displeasure] was heavy upon me; my moisture was turned into the drought of summer. Selah [pause, and calmly think of that]!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' I acknowledged my sin to You, and my iniquity I did not hide. I said, I will confess my transgressions to the Lord [continually unfolding the past till all is told]–then You [instantly] forgave me the guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' iniquity of my sin. Selah [pause, and calmly think of that]!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For this [forgiveness] let everyone who is godly pray–pray to You in a time when You may be found; surely when the great waters [of trial] overflow, they shall not reach [the spirit in] him.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' You are a hiding place for me; You, Lord, preserve me from trouble, You surround me with songs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shouts of deliverance. Selah [pause, and calmly think of that]!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I [the Lord] will instruct you and teach you in the way you should go; I will counsel you with My eye upon you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Be not like the horse or the mule, which lack understanding, which must have their mouths held firm with bit and bridle, or else they will not come with you.'
