document_id: PSA.87
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Psalm of the sons of Korah. A song.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ON THE holy hills stands the city [of Jerusalem and the temple] God founded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord loves the gates of Zion [through which the crowds of pilgrims enter from all nations] more than all the dwellings of Jacob (Israel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Glorious things are spoken of you, O city of God. Selah [pause, and calmly realize what that means]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I will make mention of Rahab [the poetic name for Egypt] and Babylon as among those who know [the city of God]–behold, Philistia and Tyre, with Ethiopia (Cush)–[saying], This man was born there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Yes, of Zion it shall be said, This man and that man were born in her, for the Most High Himself will establish her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The Lord shall count, when He registers the peoples, that this man was born there. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The singers as well as the players on instruments shall say, All my springs (my sources of life and joy) are in you [city of our God].'
