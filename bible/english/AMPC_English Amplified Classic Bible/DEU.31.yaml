document_id: DEU.31,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND MOSES went on speaking these words to all Israel:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses commanded them, At the end of every seven years, at the set time of the year of release [of debtors from their debts], at the Feast of Booths,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When all Israel comes to appear before the Lord your God in the place which He chooses [for His sanctuary], you shall read this law before all Israel in their hearing.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Assemble the people–men, women, and children, and the stranger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the sojourner within your towns–that they may hear and learn [reverently] to fear the Lord your God and be watchful to do all the words of this law,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And that their children, who have not known it, may hear and learn [reverently] to fear the Lord your God as long as you live in the land which you go over the Jordan to possess.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses, Behold, your days are nearing when you must die. Call Joshua and present yourselves at the Tent of Meeting, that I may give him his charge. And Moses and Joshua went and presented themselves at the Tent of Meeting.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord appeared in the Tent in a pillar of cloud, and the pillar of cloud stood over the door of the Tent.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses, Behold, you shall sleep with your fathers, and this people will rise up and play the harlot after the strange gods of the land where they go to be among them; and they will forsake Me and break My covenant which I have made with them.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then My anger will be kindled against them in that day, and I will forsake them and hide My face from them. And they shall be devoured, and many evils and troubles shall befall them, so that they will say in that day, Have not these evils come upon us because our God is not among us?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will surely hide My face in that day because of all the evil which they have done in turning to other gods.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And now write this song for yourselves and teach it to the Israelites; put it in their mouths, that this song may be a witness for Me against the Israelites.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he said to them, I am 120 years old this day; I can no more go out and come in. And the Lord has said to me, You shall not go over this Jordan.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For when I have brought them into the land which I swore to their fathers, a land flowing with milk and honey, and they have eaten and filled themselves and become fat, then they will turn to other gods and serve them, and despise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scorn Me and break My covenant.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when many evils and troubles have befallen them, this [sacred] song will confront them as a witness, for it will never be forgotten from the mouths of their descendants. For I know their strong desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the purposes which they are forming even now, before I have brought them into the land which I swore to give them.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses wrote this song the same day and taught it to the Israelites. [Deut. 32:1-43.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [the Lord] charged Joshua son of Nun, Be strong and courageous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' firm, for you shall bring the Israelites into the land which I swore to give them, and I will be with you.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when Moses had finished writing the words of this law in a book to the very end,'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He commanded the Levites who carried the ark of the covenant of the Lord,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Take this Book of the Law and put it by the side of the ark of the covenant of the Lord your God, that it may be there for a witness against you.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For I know your rebellion and stubbornness; behold, while I am yet alive with you today, you have been rebellious against the Lord; and how much more after my death!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Gather to me all the elders of your tribes and your officers, that I may speak these words in their ears and call heaven and earth to witness against them.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For I know that after my death you will utterly corrupt yourselves and turn aside from the way which I have commanded you; and evil will befall you in the latter days because you will do what is evil in the sight of the Lord, to provoke Him to anger through the work of your hands.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord your God will Himself go over before you, and He will destroy these nations from before you, and you shall dispossess them. And Joshua shall go over before you, as the Lord has said.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses spoke in the hearing of all the congregation of Israel the words of this song until they were ended:'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord will do to them as He did to Sihon and Og, the kings of the Amorites, and to their land, when He destroyed them.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord will give them over to you, and you shall do to them according to all the commandments which I have commanded you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Be strong, courageous, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' firm; fear not nor be in terror before them, for it is the Lord your God Who goes with you; He will not fail you or forsake you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses called to Joshua and said to him in the sight of all Israel, Be strong, courageous, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' firm, for you shall go with this people into the land which the Lord has sworn to their fathers to give them, and you shall cause them to possess it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It is the Lord Who goes before you; He will [march] with you; He will not fail you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' let you go or forsake you; [let there be no cowardice or flinching, but] fear not, neither become broken [in spirit–depressed, dismayed, and unnerved with alarm].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses wrote this law and delivered it to the Levitical priests, who carried the ark of the covenant of the Lord, and to all the elders of Israel.'
