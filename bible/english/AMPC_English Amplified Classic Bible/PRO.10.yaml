document_id: PRO.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE PROVERBS of Solomon: A wise son makes a glad father, but a foolish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-confident son is the grief of his mother.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who winks with the eye [craftily and with malice] causes sorrow; the foolish of lips will fall headlong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he who boldly reproves makes peace
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The mouth of the [uncompromisingly] righteous man is a well of life, but the mouth of the wicked conceals violence.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hatred stirs up contentions, but love covers all transgressions.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On the lips of him who has discernment skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom is found, but discipline '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the rod are for the back of him who is without sense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Wise men store up knowledge [in mind and heart], but the mouth of the foolish is a present destruction.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The rich man''s wealth is his strong city; the poverty of the poor is their ruin. [Ps. 52:7; I Tim. 6:17.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The earnings of the righteous (the upright, in right standing with God) lead to life, but the profit of the wicked leads to further sin. [Rom. 6:21; I Tim. 6:10.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who heeds instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' correction is [not only himself] in the way of life [but also] is a way of life for others. And he who neglects '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' refuses reproof [not only himself] goes astray [but also] causes to err '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is a path toward ruin for others.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who hides hatred is of lying lips, and he who utters slander is a [self-confident] fool. [Prov. 26:24-26.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In a multitude of words transgression is not lacking, but he who restrains his lips is prudent.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Treasures of wickedness profit nothing, but righteousness (moral and spiritual rectitude in every area and relation) delivers from death.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The tongues of those who are upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in right standing with God are as choice silver; the minds of those who are wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' out of harmony with God are of little value.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The lips of the [uncompromisingly] righteous feed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guide many, but fools die for want of understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heart.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The blessing of the Lord–it makes [truly] rich, and He adds no sorrow with it [neither does toiling increase it].'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It is as sport to a [self-confident] fool to do wickedness, but to have skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom is pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relaxation to a man of understanding.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The thing a wicked man fears shall come upon him, but the desire of the [uncompromisingly] righteous shall be granted.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When the whirlwind passes, the wicked are no more, but the [uncompromisingly] righteous have an everlasting foundation. [Ps. 125:1; Matt. 7:24-27.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As vinegar to the teeth and as smoke to the eyes, so is the sluggard to those who employ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' send him.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The reverent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipful fear of the Lord prolongs one''s days, but the years of the wicked shall be made short.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The hope of the [uncompromisingly] righteous (the upright, in right standing with God) is gladness, but the expectation of the wicked (those who are out of harmony with God) comes to nothing.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The way of the Lord is strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a stronghold to the upright, but it is destruction to the workers of iniquity.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord will not allow the [uncompromisingly] righteous to famish, but He thwarts the desire of the wicked. [Ps. 34:9, 10; 37:25.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The [consistently] righteous shall never be removed, but the wicked shall not inhabit the earth [eventually]. [Ps. 37:22; 125:1.]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The mouths of the righteous (those harmonious with God) bring forth skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom, but the perverse tongue shall be cut down [like a barren and rotten tree].'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The lips of the [uncompromisingly] righteous know [and therefore utter] what is acceptable, but the mouth of the wicked knows [and therefore speaks only] what is obstinately willful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contrary.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He becomes poor who works with a slack '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' idle hand, but the hand of the diligent makes rich.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who gathers in summer is a wise son, but he who sleeps in harvest is a son who causes shame.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessings are upon the head of the [uncompromisingly] righteous (the upright, in right standing with God) but the mouth of the wicked conceals violence.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The memory of the [uncompromisingly] righteous is a blessing, but the name of the wicked shall rot. [Ps. 112:6; 9:5.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The wise in heart will accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey commandments, but the foolish of lips will fall headlong.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who walks uprightly walks securely, but he who takes a crooked way shall be found out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punished.'
