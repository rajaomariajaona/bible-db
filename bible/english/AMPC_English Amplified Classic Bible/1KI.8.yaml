document_id: 1KI.8,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN SOLOMON assembled the elders of Israel and all the heads of the tribes, the chiefs of the fathers'' houses of the Israelites, before the king in Jerusalem, to bring up the ark of the covenant of the Lord out of Zion, the City of David.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' When the priests had come out of the Holy Place, the cloud filled the Lord''s house,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' So the priests could not stand to minister because of the cloud, for the glory of the Lord had filled the Lord''s house.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then Solomon said, The Lord said that He would dwell in the thick darkness.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' I have surely built You a house of habitation, a settled place for You to dwell in forever.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And the king turned his face about and blessed all the assembly of Israel, and all the assembly of Israel stood.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He said, Blessed be the Lord, the God of Israel, Who spoke with His mouth to David my father and has with His hand fulfilled it, saying,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Since the day that I brought forth My people Israel out of Egypt, I chose no city out of all the tribes of Israel in which to build a house that My Name [and My Presence] might be in it, but I chose David to be over My people Israel.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Now it was in the heart of David my father to build a house for the Name [the Presence] of the Lord, the God of Israel.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And the Lord said to David my father, Whereas it was in your heart to build a house for My Name, you did well that it was in your heart.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Yet you shall not build the house, but your son, who shall be born to you, shall build it to My Name [and My actively present Person].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' All the men of Israel assembled themselves before King Solomon at the feast in the seventh month, Ethanim.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And the Lord has fulfilled His promise which He made: I have risen up in the place of David my father, and sit on the throne of Israel, as the Lord promised, and have built a house for the Name (renown) of the Lord, the God of Israel.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And I have made there a place for the ark [the token of His presence], in which is the covenant [the Ten Commandments] of the Lord which He made with our fathers when He brought them out of the land of Egypt. [Exod. 34:28.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Then Solomon stood [in the court] before the Lord''s burnt offering altar in the presence of all the assembly of Israel, and spread forth his hands toward heaven'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And he said, O Lord, the God of Israel, there is no God like You in heaven above or on earth beneath, keeping covenant and showing mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness to Your servants who walk before You with all their heart.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' You have kept what You promised Your servant David my father. You also spoke with Your mouth and have fulfilled it with Your hand, as it is this day.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Therefore now, O Lord, the God of Israel, keep with Your servant David my father what You promised him when You said, There shall not fail you a man before Me to sit on the throne of Israel, if only your children take heed to their way, that they walk before Me as you have done.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Now, O God of Israel, let Your word which You spoke to Your servant David my father be confirmed [by experience].'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' But will God indeed dwell with men on the earth? Behold, the heavens and heaven of heavens [in its most extended compass] cannot contain You; how much less this house that I have built?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Yet graciously consider the prayer and supplication of Your servant, O Lord my God, to hearken to the [loud] cry and prayer which he prays before You today,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' That Your eyes may be open toward this house night and day, toward the place of which You have said, My Name [and the token of My presence] shall be there, that You may hearken to the prayer which Your servant shall make in [or facing toward] this place.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' All the elders of Israel came, and the priests took up the ark.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Hearken to the prayer of Your servant and of Your people Israel when they pray in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' toward this place. Hear in heaven, Your dwelling place, and when You hear, forgive.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Whenever a man sins against his neighbor and is made to take an oath and comes and swears the oath before Your altar in this house,'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Then hear in heaven and do and judge Your servants, condemning the wicked by bringing his guilt upon his own head and justifying the [uncompromisingly] righteous by rewarding him according to his righteousness (his uprightness, right standing with God).'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' When Your people Israel are struck down before the enemy because they have sinned against You, and they turn again to You, confess Your name (Your revelation of Yourself), and pray, beseeching You in this house,'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Then hear in heaven and forgive the sin of Your people Israel and return them to the land You gave to their fathers.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' When heaven is shut up and no rain falls because they have sinned against You, if they pray in [or toward] this place and confess Your name (Your revelation of Yourself) and turn from their sin when You afflict them,'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Then hear in heaven and forgive the sin of Your servants, Your people Israel, when You teach them the good way in which they should walk. And give rain upon Your land which You have given to Your people as an inheritance.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' If there is famine in the land or pestilence, blight, mildew, locust, or caterpillar, if their enemy besieges them in the land of their cities, whatever plague, whatever sickness there is,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Whatever prayer or supplication is made by any or all of Your people Israel–each man knowing the affliction of his own heart, and spreading forth his hands toward this house [and its pledge of Your presence]–'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Then hear in heaven, Your dwelling place, and forgive and act and give to every man according to his ways, whose heart You know, for You and You only know the hearts of all the children of men,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And they brought up the ark of the Lord, the Tent of Meeting, and all the holy vessels that were in the tent; the priests and the Levites brought them up.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' That they may fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revere You all the days that they live in the land which You gave to our fathers.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' Moreover, concerning a stranger who is not of Your people Israel but comes from a far country for the sake of Your name [and Your active Presence]–'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' For they will hear of Your great name (Your revelation of Yourself), Your strong hand, and outstretched arm–when he shall pray in [or toward] this house,'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' Hear in heaven, Your dwelling place, and do according to all that the stranger asks of You, so that all peoples of the earth may know Your name [and Your revelation of Your presence] and fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revere You, as do Your people Israel, and may know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehend that this house which I have built is called by Your Name [and contains the token of Your presence].'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' If Your people go out to battle against their enemy, wherever You shall send them, and shall pray to the Lord toward the city which You have chosen and the house that I have built for Your Name [and Your revelation of Yourself],'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' Then hear in heaven their prayer and supplication, and defend their cause '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' maintain their right.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' If they sin against You–for there is no man who does not sin–and You are angry with them and deliver them to the enemy, so that they are carried away captive to the enemy''s land, far or near;'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' Yet if they think '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consider in the land where they were carried captive, and repent and make supplication to You there, saying, We have sinned and have done perversely and wickedly;'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' If they repent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' turn to You with all their mind and with all their heart in the land of their enemies who took them captive, and pray to You toward their land which You gave to their fathers, the city which You have chosen, and the house which I have built for Your Name;'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' Then hear their prayer and their supplication in heaven, Your dwelling place, and defend their cause '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' maintain their right.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' King Solomon and all the congregation of Israel who had assembled before him were with him before the ark, sacrificing sheep and oxen, so many that they could not be reported or counted.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' And forgive Your people, who have sinned against You, and all their transgressions against You, and grant them compassion before those who took them captive, that they may have pity and be merciful to them;'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' For they are Your people and Your heritage, which You brought out of Egypt, from the midst of the iron furnace.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: ' Let Your eyes be open to the supplication of Your servant and of Your people Israel, to hearken to them in all for which they call to You.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: ' For You separated them from among all the peoples of the earth to be Your heritage, as You declared through Moses Your servant when You brought our fathers out of Egypt, O Lord God.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: ' When Solomon finished offering all this prayer and supplication to the Lord, he arose from before the Lord''s altar, where he had knelt with hands stretched toward heaven.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: ' And he stood and blessed all the assembly of Israel with a loud voice, saying,'
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ' Blessed be the Lord, Who has given rest to His people Israel, according to all that He promised. Not one word has failed of all His good promise which He promised through Moses His servant.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: ' May the Lord our God be with us as He was with our fathers; may He not leave us or forsake us,'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: ' That He may incline our hearts to Him, to walk in all His ways and to keep His commandments, His statutes, and His precepts which He commanded our fathers.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: ' Let these my words, with which I have made supplication before the Lord, be near to the Lord our God day and night, that He may maintain the cause '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right of His servant and of His people Israel as each day requires,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And the priests brought the ark of the covenant of the Lord to its place in the Holy of Holies of the house, under the wings of the cherubim.'
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: ' That all the earth''s people may know that the Lord is God and that there is no other.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: ' Let your hearts therefore be blameless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wholly true to the Lord our God, to walk in His statutes and to keep His commandments, as today.'
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: ' And the king and all Israel with him offered sacrifice before the Lord.'
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: ' Solomon offered as peace offerings to the Lord: 22,000 oxen and 120,000 sheep. So the king and all the Israelites dedicated the house of the Lord.'
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: ' On that same day the king consecrated the middle of the court that was before the Lord''s house; there he offered burnt offerings, cereal offerings, and the fat of the peace offerings, because the bronze altar that was before the Lord was too small to receive [all] the offerings.'
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: ' So at that time Solomon held the feast, and all Israel with him, a great assembly, from the entrance of Hamath to the Brook of Egypt, before the Lord our God, for seven days [for the dedication] and seven days [for the Feast of Tabernacles], fourteen days in all.'
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: ' On the eighth day he sent the people away; they blessed the king and went to their tents with greatest joy and gratitude for all the goodness the Lord had shown to David His servant and Israel His people.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For the cherubim spread forth their two wings over the place of the ark, and the cherubim covered the ark and its poles.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' The poles were so long that the ends of them were seen from the Holy Place before the Holy of Holies, but they were not seen outside; they are there to this day.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' There was nothing in the ark except the two tables of stone which Moses put there at Horeb, where the Lord made a covenant with the Israelites when they came out of the land of Egypt. [Deut. 10:2-5.]'
