document_id: NEH.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THESE are the priests and Levites who went up with Zerubbabel son of Shealtiel and with Jeshua: Seraiah, Jeremiah, Ezra,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Amariah, Malluch, Hattush,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Shecaniah, Rehum, Meremoth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Iddo, Ginnethoi, Abijah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Mijamin, Maadiah, Bilgah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Shemaiah, Joiarib, Jedaiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Sallu, Amok, Hilkiah, and Jedaiah. These were the chiefs of the priests and their brethren in the days of Jeshua.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Levites were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah, who, with his brethren, was over the thanksgiving [choirs].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Bakbukiah and Unni, their brethren, stood opposite them according to their offices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And Jeshua was the father of Joiakim, Joiakim of Eliashib, Eliashib of Joiada,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Joiada was the father of Jonathan, and Jonathan of Jaddua.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And in the days of Joiakim were priests, heads of fathers'' houses: of Seraiah, Meraiah; of Jeremiah, Hananiah;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Of Ezra, Meshullam; of Amariah, Jehohanan;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Of Malluchi, Jonathan; of Shebaniah, Joseph;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Of Harim, Adna; of Meraioth, Helkai;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Of Iddo, Zechariah; of Ginnethon, Meshullam;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Of Abijah, Zichri; of Miniamin and of Moadiah, Piltai;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Of Bilgah, Shammua; of Shemaiah, Jehonathan;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Of Joiarib, Mattenai; of Jedaiah, Uzzi;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Of Sallai, Kallai; of Amok, Eber;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Of Hilkiah, Hashabiah; of Jedaiah, Nethanel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' As for the Levites in the days of Eliashib, Joiada, Johanan, and Jaddua, the heads of fathers'' houses were recorded, as well as the priests, until the reign of Darius the Persian.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The sons of Levi, heads of fathers'' houses, were recorded in the Book of the Chronicles until the days of Johanan son of Eliashib.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the chiefs of the Levites were Hashabiah, Sherebiah, and Jeshua son of Kadmiel, with their brethren opposite them, to praise and to give thanks, as David, God''s man, commanded, [one] watch [singing] in response to [the men in the opposite] watch.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Mattaniah, Bakbukiah, Obadiah, Meshullam, Talmon, and Akkub were gatekeepers guarding at the storehouses of the gates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' These were in the days of Joiakim son of Jeshua, the son of Jozadak, and in the days of Nehemiah the governor and of Ezra the priest and scribe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And for the dedication of the wall of Jerusalem, they sought the Levites in all their places to bring them to Jerusalem to celebrate the dedication with gladness, with thanksgivings, and with singing, cymbals, harps, and lyres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And the sons of the singers gathered together from the plain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' circuit around Jerusalem and from the villages of the Netophathites,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And also from Beth-gilgal and the fields of Geba and Azmaveth, for the singers had built for themselves villages around Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And the priests and the Levites purified themselves, the people, the gates, and the wall.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Then I brought the princes of Judah up on the wall, and I appointed two great companies of them who gave thanks and went in procession. One went to the right upon the wall toward the Dung Gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And after them went Hoshaiah and half of the princes of Judah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And Azariah, Ezra, Meshullam,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Judah, Benjamin, Shemaiah, and Jeremiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And certain of the priests'' sons with trumpets, and Zechariah son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Micaiah, the son of Zaccur, the son of Asaph,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And his kinsmen–Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, Hanani–with the musical instruments of David, God''s man. And Ezra the scribe went before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' At the Fountain Gate they went up straight ahead by the stairs of the City of David at the wall''s ascent above David''s house to the Water Gate on the east.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' The other company of those who gave thanks went to the left; I followed with half of the people upon the wall, above the Tower of the Furnaces to the Broad Wall,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And above the Gate of Ephraim, and by the Old Gate and by the Fish Gate and by the Tower of Hananel and the Tower of Hammeah, even to the Sheep Gate; and they stopped at the Gate of the Guard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' So the two companies of those who gave thanks stood in the house of God, and I, and the half of the officials with me;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And the priests Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah, and Hananiah, with trumpets;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malchijah, Elam, and Ezer. And the singers sang '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made themselves heard, with Jezrahiah as leader.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Also that day they offered great sacrifices and rejoiced, for God had made them rejoice with great joy; the women also and the children rejoiced. The joy of Jerusalem was heard even afar off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' On that day men were appointed over the chambers for the stores, the contributions, the firstfruits, and the tithes, to gather into them the portions required by law for the priests and the Levites according to the fields of the towns, for Judah rejoiced over the priests and Levites who served [faithfully].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And they performed the due service of their God and of the purification; so did the singers and gatekeepers, as David and his son Solomon had commanded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' For in the days of David and Asaph of old, there was a chief of singers and songs of praise and thanksgiving to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And all Israel in the days of Zerubbabel and [later] of Nehemiah gave the daily portions for the singers and the gatekeepers; and they set apart what was for the Levites, and the Levites set apart what was for the sons of Aaron [the priests].'
