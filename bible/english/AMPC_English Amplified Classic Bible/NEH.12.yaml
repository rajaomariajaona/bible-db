document_id: NEH.12,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THESE are the priests and Levites who went up with Zerubbabel son of Shealtiel and with Jeshua: Seraiah, Jeremiah, Ezra,'
  '10':
  - type: text
    content: ' And Jeshua was the father of Joiakim, Joiakim of Eliashib, Eliashib of Joiada,'
  '11':
  - type: text
    content: ' Joiada was the father of Jonathan, and Jonathan of Jaddua.'
  '12':
  - type: text
    content: ' And in the days of Joiakim were priests, heads of fathers'' houses: of Seraiah, Meraiah; of Jeremiah, Hananiah;'
  '13':
  - type: text
    content: ' Of Ezra, Meshullam; of Amariah, Jehohanan;'
  '14':
  - type: text
    content: ' Of Malluchi, Jonathan; of Shebaniah, Joseph;'
  '15':
  - type: text
    content: ' Of Harim, Adna; of Meraioth, Helkai;'
  '16':
  - type: text
    content: ' Of Iddo, Zechariah; of Ginnethon, Meshullam;'
  '17':
  - type: text
    content: ' Of Abijah, Zichri; of Miniamin and of Moadiah, Piltai;'
  '18':
  - type: text
    content: ' Of Bilgah, Shammua; of Shemaiah, Jehonathan;'
  '19':
  - type: text
    content: ' Of Joiarib, Mattenai; of Jedaiah, Uzzi;'
  '2':
  - type: text
    content: ' Amariah, Malluch, Hattush,'
  '20':
  - type: text
    content: ' Of Sallai, Kallai; of Amok, Eber;'
  '21':
  - type: text
    content: ' Of Hilkiah, Hashabiah; of Jedaiah, Nethanel.'
  '22':
  - type: text
    content: ' As for the Levites in the days of Eliashib, Joiada, Johanan, and Jaddua, the heads of fathers'' houses were recorded, as well as the priests, until the reign of Darius the Persian.'
  '23':
  - type: text
    content: ' The sons of Levi, heads of fathers'' houses, were recorded in the Book of the Chronicles until the days of Johanan son of Eliashib.'
  '24':
  - type: text
    content: ' And the chiefs of the Levites were Hashabiah, Sherebiah, and Jeshua son of Kadmiel, with their brethren opposite them, to praise and to give thanks, as David, God''s man, commanded, [one] watch [singing] in response to [the men in the opposite] watch.'
  '25':
  - type: text
    content: ' Mattaniah, Bakbukiah, Obadiah, Meshullam, Talmon, and Akkub were gatekeepers guarding at the storehouses of the gates.'
  '26':
  - type: text
    content: ' These were in the days of Joiakim son of Jeshua, the son of Jozadak, and in the days of Nehemiah the governor and of Ezra the priest and scribe.'
  '27':
  - type: text
    content: ' And for the dedication of the wall of Jerusalem, they sought the Levites in all their places to bring them to Jerusalem to celebrate the dedication with gladness, with thanksgivings, and with singing, cymbals, harps, and lyres.'
  '28':
  - type: text
    content: ' And the sons of the singers gathered together from the plain '
  - type: text
    content: and
  - type: text
    content: ' circuit around Jerusalem and from the villages of the Netophathites,'
  '29':
  - type: text
    content: ' And also from Beth-gilgal and the fields of Geba and Azmaveth, for the singers had built for themselves villages around Jerusalem.'
  '3':
  - type: text
    content: ' Shecaniah, Rehum, Meremoth,'
  '30':
  - type: text
    content: ' And the priests and the Levites purified themselves, the people, the gates, and the wall.'
  '31':
  - type: text
    content: ' Then I brought the princes of Judah up on the wall, and I appointed two great companies of them who gave thanks and went in procession. One went to the right upon the wall toward the Dung Gate.'
  '32':
  - type: text
    content: ' And after them went Hoshaiah and half of the princes of Judah,'
  '33':
  - type: text
    content: ' And Azariah, Ezra, Meshullam,'
  '34':
  - type: text
    content: ' Judah, Benjamin, Shemaiah, and Jeremiah,'
  '35':
  - type: text
    content: ' And certain of the priests'' sons with trumpets, and Zechariah son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Micaiah, the son of Zaccur, the son of Asaph,'
  '36':
  - type: text
    content: ' And his kinsmen–Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, Hanani–with the musical instruments of David, God''s man. And Ezra the scribe went before them.'
  '37':
  - type: text
    content: ' At the Fountain Gate they went up straight ahead by the stairs of the City of David at the wall''s ascent above David''s house to the Water Gate on the east.'
  '38':
  - type: text
    content: ' The other company of those who gave thanks went to the left; I followed with half of the people upon the wall, above the Tower of the Furnaces to the Broad Wall,'
  '39':
  - type: text
    content: ' And above the Gate of Ephraim, and by the Old Gate and by the Fish Gate and by the Tower of Hananel and the Tower of Hammeah, even to the Sheep Gate; and they stopped at the Gate of the Guard.'
  '4':
  - type: text
    content: ' Iddo, Ginnethoi, Abijah,'
  '40':
  - type: text
    content: ' So the two companies of those who gave thanks stood in the house of God, and I, and the half of the officials with me;'
  '41':
  - type: text
    content: ' And the priests Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah, and Hananiah, with trumpets;'
  '42':
  - type: text
    content: ' And Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malchijah, Elam, and Ezer. And the singers sang '
  - type: text
    content: and
  - type: text
    content: ' made themselves heard, with Jezrahiah as leader.'
  '43':
  - type: text
    content: ' Also that day they offered great sacrifices and rejoiced, for God had made them rejoice with great joy; the women also and the children rejoiced. The joy of Jerusalem was heard even afar off.'
  '44':
  - type: text
    content: ' On that day men were appointed over the chambers for the stores, the contributions, the firstfruits, and the tithes, to gather into them the portions required by law for the priests and the Levites according to the fields of the towns, for Judah rejoiced over the priests and Levites who served [faithfully].'
  '45':
  - type: text
    content: ' And they performed the due service of their God and of the purification; so did the singers and gatekeepers, as David and his son Solomon had commanded.'
  '46':
  - type: text
    content: ' For in the days of David and Asaph of old, there was a chief of singers and songs of praise and thanksgiving to God.'
  '47':
  - type: text
    content: ' And all Israel in the days of Zerubbabel and [later] of Nehemiah gave the daily portions for the singers and the gatekeepers; and they set apart what was for the Levites, and the Levites set apart what was for the sons of Aaron [the priests].'
  '5':
  - type: text
    content: ' Mijamin, Maadiah, Bilgah,'
  '6':
  - type: text
    content: ' Shemaiah, Joiarib, Jedaiah,'
  '7':
  - type: text
    content: ' Sallu, Amok, Hilkiah, and Jedaiah. These were the chiefs of the priests and their brethren in the days of Jeshua.'
  '8':
  - type: text
    content: ' And the Levites were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah, who, with his brethren, was over the thanksgiving [choirs].'
  '9':
  - type: text
    content: ' Bakbukiah and Unni, their brethren, stood opposite them according to their offices.'
