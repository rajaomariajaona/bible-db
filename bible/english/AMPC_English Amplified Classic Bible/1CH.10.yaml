document_id: 1CH.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THE Philistines fought against Israel; and the men of Israel fled from before them and fell slain on Mount Gilboa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the Philistines followed close after Saul and his sons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overtook them, and the Philistines slew Jonathan, Abinadab, and Malchi-shua, the sons of Saul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the battle raged about Saul, and the archers found and wounded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then Saul said to his armor-bearer, Draw your sword and thrust me through with it, lest these uncircumcised come and abuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make sport of me. But his armor-bearer would not, for he was terrified. So Saul took his own sword and fell on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When his armor-bearer saw that Saul was dead, he also fell on his sword and died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So Saul died; he and his three sons and all his house died together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when all the men of Israel who were in the valley saw that the army had fled and that Saul and his sons were dead, they forsook their cities and fled; and the Philistines came and dwelt in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The next day, when the Philistines came to strip the slain, they found Saul and his sons fallen on Mount Gilboa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' They stripped [Saul] and took his head and his armor, and sent [them] round about in Philistia to carry the news to their idols and to the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And they put [Saul''s] armor in the house of their gods and fastened his head in the temple of Dagon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When all Jabesh-gilead heard all that the Philistines had done to Saul,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' All the brave men arose, took away the bodies of Saul and his sons, brought them to Jabesh, and buried their bones under the oak in Jabesh; then they fasted seven days. [I Sam. 31:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So Saul died for his trespass against the Lord [in sparing Amalek], for his unfaithfulness in not keeping God''s word, and also for consulting [a medium with] a spirit of the dead to inquire pleadingly of it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And inquired not so of the Lord [in earnest penitence]. Therefore the Lord slew him and turned the kingdom over to David son of Jesse. [I Sam. 28:6.]'
