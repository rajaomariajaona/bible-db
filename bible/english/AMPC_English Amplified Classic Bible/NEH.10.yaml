      - type: text
        text: '20'
    - type: text
      text: ' Magpiash, Meshullam, Hezir,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
