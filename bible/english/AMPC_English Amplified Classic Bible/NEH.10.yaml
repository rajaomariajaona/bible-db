document_id: NEH.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THESE SET their seal: Nehemiah the governor, the son of Hacaliah. And Zedekiah,'
  '10':
  - type: text
    content: ' And their brethren: Shebaniah, Hodiah, Kelita, Pelaiah, Hanan,'
  '11':
  - type: text
    content: ' Mica, Rehob, Hashabiah,'
  '12':
  - type: text
    content: ' Zaccur, Sherebiah, Shebaniah,'
  '13':
  - type: text
    content: ' Hodiah, Bani, Beninu.'
  '14':
  - type: text
    content: ' The chiefs of the people: Parosh, Pahath-moab, Elam, Zattu, Bani,'
  '15':
  - type: text
    content: ' Bunni, Azgad, Bebai,'
  '16':
  - type: text
    content: ' Adonijah, Bigvai, Adin,'
  '17':
  - type: text
    content: ' Ater, Hezekiah, Azzur,'
  '18':
  - type: text
    content: ' Hodiah, Hashum, Bezai,'
  '19':
  - type: text
    content: ' Hariph, Anathoth, Nebai,'
  '2':
  - type: text
    content: ' Seraiah, Azariah, Jeremiah,'
  '20':
  - type: text
    content: ' Magpiash, Meshullam, Hezir,'
  '21':
  - type: text
    content: ' Meshezabel, Zadok, Jaddua,'
  '22':
  - type: text
    content: ' Pelatiah, Hanan, Anaiah,'
  '23':
  - type: text
    content: ' Hoshea, Hananiah, Hasshub,'
  '24':
  - type: text
    content: ' Hallohesh, Pilha, Shobek,'
  '25':
  - type: text
    content: ' Rehum, Hashabnah, Maaseiah,'
  '26':
  - type: text
    content: ' Ahiah, Hanan, Anan,'
  '27':
  - type: text
    content: ' Malluch, Harim, Baanah.'
  '28':
  - type: text
    content: ' And the rest of the people–the priests, Levites, gatekeepers, singers, Nethinim [temple servants], and all they who had separated themselves from the peoples of the lands to the Law of God, their wives, their sons, their daughters, all who had knowledge and understanding–'
  '29':
  - type: text
    content: ' Join now, with their brethren, their nobles, and enter into a curse and an oath to walk in God''s Law which was given to Moses the servant of God and to observe and do all the commandments of the Lord our Lord, and His ordinances and His statutes:'
  '3':
  - type: text
    content: ' Pashhur, Amariah, Malchijah,'
  '30':
  - type: text
    content: ' We shall not give our daughters to the peoples of the land or take their daughters for our sons.'
  '31':
  - type: text
    content: ' And if the peoples of the land bring wares or any grain on the Sabbath day to sell, we shall not buy it on the Sabbath or on a holy day; and we shall forego raising crops the seventh year [letting the land lie fallow] and the compulsory payment of every debt. [Exod. 23:10, 11; Deut. 15:1, 2.]'
  '32':
  - type: text
    content: ' Also we pledge ourselves to pay yearly a third of a shekel for the service expenses of the house of our God [which are]:'
  '33':
  - type: text
    content: ' For the showbread; for the continual cereal offerings and burnt offerings; [for the offerings on] the Sabbaths, the New Moons, the set feasts; for the holy things, for the sin offerings to make atonement for Israel; and for all the work of the house of our God.'
  '34':
  - type: text
    content: ' We also cast lots–the priests, the Levites, and the people–for the wood offering, to bring it into the house of our God, according to our fathers'' houses, at appointed times year by year, to burn upon the altar of the Lord our God, as it is written in the Law.'
  '35':
  - type: text
    content: ' And [we obligate ourselves] to bring the firstfruits of our ground and the first of all the fruit of all trees year by year to the house of the Lord,'
  '36':
  - type: text
    content: ' As well as the firstborn of our sons and of our cattle, as is written in the Law, and the firstlings of our herds and flocks, to bring to the house of our God, to the priests who minister in [His] house.'
  '37':
  - type: text
    content: ' And we shall bring the first '
  - type: text
    content: and
  - type: text
    content: ' best of our coarse meal, our contributions, the fruit of all kinds of trees, of new wine, and of oil to the priests, to the chambers of the house of our God. And we shall bring the tithes from our ground to the Levites, for they, the Levites, collect the tithes in all our rural towns.'
  '38':
  - type: text
    content: ' And the priest, the son of Aaron, shall be with the Levites when [they] receive tithes, and [they] shall bring one-tenth of the tithes to the house of our God, to the chambers, into the storehouse.'
  '39':
  - type: text
    content: ' For the Israelites and the sons of Levi shall bring the offering of grain, new wine, and oil to the chambers where the vessels of the sanctuary are, along with the priests who minister and the gatekeepers and singers. We will not forsake '
  - type: text
    content: or
  - type: text
    content: ' neglect the house of our God.'
  '4':
  - type: text
    content: ' Hattush, Shebaniah, Malluch,'
  '5':
  - type: text
    content: ' Harim, Meremoth, Obadiah,'
  '6':
  - type: text
    content: ' Daniel, Ginnethon, Baruch,'
  '7':
  - type: text
    content: ' Meshullam, Abijah, Mijamin,'
  '8':
  - type: text
    content: ' Maaziah, Bilgai, Shemaiah–these were the priests.'
  '9':
  - type: text
    content: ' And the Levites: Jeshua son of Azaniah, Binnui of the sons of Henadad, Kadmiel,'
