  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Rehum, Hashabnah, Maaseiah,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Ahiah, Hanan, Anan,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Malluch, Harim, Baanah.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And the rest of the people–the priests, Levites, gatekeepers, singers, Nethinim [temple servants], and all they who had separated themselves from the peoples of the lands to the Law of God, their wives, their sons, their daughters, all who had knowledge and understanding–'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Join now, with their brethren, their nobles, and enter into a curse and an oath to walk in God''s Law which was given to Moses the servant of God and to observe and do all the commandments of the Lord our Lord, and His ordinances and His statutes:'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Pashhur, Amariah, Malchijah,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' We shall not give our daughters to the peoples of the land or take their daughters for our sons.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And if the peoples of the land bring wares or any grain on the Sabbath day to sell, we shall not buy it on the Sabbath or on a holy day; and we shall forego raising crops the seventh year [letting the land lie fallow] and the compulsory payment of every debt. [Exod. 23:10, 11; Deut. 15:1, 2.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Also we pledge ourselves to pay yearly a third of a shekel for the service expenses of the house of our God [which are]:'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' For the showbread; for the continual cereal offerings and burnt offerings; [for the offerings on] the Sabbaths, the New Moons, the set feasts; for the holy things, for the sin offerings to make atonement for Israel; and for all the work of the house of our God.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' We also cast lots–the priests, the Levites, and the people–for the wood offering, to bring it into the house of our God, according to our fathers'' houses, at appointed times year by year, to burn upon the altar of the Lord our God, as it is written in the Law.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And [we obligate ourselves] to bring the firstfruits of our ground and the first of all the fruit of all trees year by year to the house of the Lord,'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' As well as the firstborn of our sons and of our cattle, as is written in the Law, and the firstlings of our herds and flocks, to bring to the house of our God, to the priests who minister in [His] house.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' And we shall bring the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' best of our coarse meal, our contributions, the fruit of all kinds of trees, of new wine, and of oil to the priests, to the chambers of the house of our God. And we shall bring the tithes from our ground to the Levites, for they, the Levites, collect the tithes in all our rural towns.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' And the priest, the son of Aaron, shall be with the Levites when [they] receive tithes, and [they] shall bring one-tenth of the tithes to the house of our God, to the chambers, into the storehouse.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' For the Israelites and the sons of Levi shall bring the offering of grain, new wine, and oil to the chambers where the vessels of the sanctuary are, along with the priests who minister and the gatekeepers and singers. We will not forsake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' neglect the house of our God.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Hattush, Shebaniah, Malluch,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Harim, Meremoth, Obadiah,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Daniel, Ginnethon, Baruch,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Meshullam, Abijah, Mijamin,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Maaziah, Bilgai, Shemaiah–these were the priests.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And the Levites: Jeshua son of Azaniah, Binnui of the sons of Henadad, Kadmiel,'
