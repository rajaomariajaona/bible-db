      children:
      - type: text
        text: '1'
    - type: text
      text: ' THESE SET their seal: Nehemiah the governor, the son of Hacaliah. And Zedekiah,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And their brethren: Shebaniah, Hodiah, Kelita, Pelaiah, Hanan,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Mica, Rehob, Hashabiah,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
