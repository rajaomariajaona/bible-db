document_id: GEN.31,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' JACOB HEARD Laban''s sons complaining, Jacob has taken away all that was our father''s; he has acquired all this wealth '
  - type: text
    content: and
  - type: text
    content: ' honor from what belonged to our father.'
  '10':
  - type: text
    content: ' And I had a dream at the time the flock conceived. I looked up and saw that the rams which mated with the she-goats were streaked, speckled, and spotted.'
  '11':
  - type: text
    content: ' And the Angel of God said to me in the dream, Jacob. And I said, Here am I.'
  '12':
  - type: text
    content: ' And He said, Look up and see, all the rams which mate with the flock are streaked, speckled, and mottled; for I have seen all that Laban does to you.'
  '13':
  - type: text
    content: ' I am the God of Bethel, where you anointed the pillar and where you vowed a vow to Me. Now arise, get out from this land and return to your native land.'
  '14':
  - type: text
    content: ' And Rachel and Leah answered him, Is there any portion or inheritance for us in our father''s house?'
  '15':
  - type: text
    content: ' Are we not counted by him as strangers? For he sold us and has also quite devoured our money [the price you paid for us].'
  '16':
  - type: text
    content: ' For all the riches which God has taken from our father are ours and our children''s. Now then, whatever God has said to you, do it.'
  '17':
  - type: text
    content: ' Then Jacob rose up and set his sons and his wives upon the camels;'
  '18':
  - type: text
    content: ' And he drove away all his livestock and all his gain which he had gotten, the livestock he had obtained '
  - type: text
    content: and
  - type: text
    content: ' accumulated in Padan-aram, to go to Isaac his father in the land of Canaan.'
  '19':
  - type: text
    content: ' Now Laban had gone to shear his sheep [possibly to the feast of sheepshearing], and Rachel stole her father''s household gods.'
  '2':
  - type: text
    content: ' And Jacob noticed that Laban looked at him less favorably than before.'
  '20':
  - type: text
    content: ' And Jacob outwitted Laban the Syrian [Aramean] in that he did not tell him that he [intended] to flee '
  - type: text
    content: and
  - type: text
    content: ' slip away secretly.'
  '21':
  - type: text
    content: ' So he fled with all that he had, and arose and crossed the river [Euphrates] and set his face toward the hill country of Gilead.'
  '22':
  - type: text
    content: ' But on the third day Laban was told that Jacob had fled.'
  '23':
  - type: text
    content: ' So he took his kinsmen with him and pursued after [Jacob] for seven days, and they overtook him in the hill country of Gilead.'
  '24':
  - type: text
    content: ' But God came to Laban the Syrian [Aramean] in a dream by night and said to him, Be careful that you do not speak from good to bad to Jacob [peaceably, then violently].'
  '25':
  - type: text
    content: ' Then Laban overtook Jacob. Now Jacob had pitched his tent on the hill, and Laban coming with his kinsmen pitched [his tents] on the same hill of Gilead.'
  '26':
  - type: text
    content: ' And Laban said to Jacob, What do you mean stealing away '
  - type: text
    content: and
  - type: text
    content: ' leaving like this without my knowing it, and carrying off my daughters as if captives of the sword?'
  '27':
  - type: text
    content: ' Why did you flee secretly and cheat me and did not tell me, so that I might have sent you away with joy '
  - type: text
    content: and
  - type: text
    content: ' gladness and with singing, with tambourine and lyre?'
  '28':
  - type: text
    content: ' And why did you not permit me to kiss my sons [grandchildren] and my daughters good-bye? Now you have done foolishly [in behaving like this].'
  '29':
  - type: text
    content: ' It is in my power to do you harm; but the God of your father spoke to me last night, saying, Be careful that you do not speak from good to bad to Jacob [peaceably, then violently].'
  '3':
  - type: text
    content: ' Then the Lord said to Jacob, Return to the land of your fathers and to your people, and I will be with you.'
  '30':
  - type: text
    content: ' And now you felt you must go because you were homesick for your father''s house, but why did you steal my [household] gods?'
  '31':
  - type: text
    content: ' Jacob answered Laban, Because I was afraid; for I thought, Suppose you would take your daughters from me by force.'
  '32':
  - type: text
    content: ' The one with whom you find those gods of yours, let him not live. Here before our kinsmen [search my possessions and] take whatever you find that belongs to you. For Jacob did not know that Rachel had stolen [the images].'
  '33':
  - type: text
    content: ' So Laban went into Jacob''s tent and into Leah''s tent and the tent of the two maids, but he did not find them. Then he went from Leah''s tent into Rachel''s tent.'
  '34':
  - type: text
    content: ' Now Rachel had taken the images (gods) and put them in the camel''s saddle and sat on them. Laban searched '
  - type: text
    content: and
  - type: text
    content: ' felt through all the tent, but did not find them.'
  '35':
  - type: text
    content: ' And [Rachel] said to her father, Do not be displeased, my lord, that I cannot rise up before you, for the period of women is upon me '
  - type: text
    content: and
  - type: text
    content: ' I am unwell. And he searched, but did not find the gods.'
  '36':
  - type: text
    content: ' Then Jacob became angry and reproached '
  - type: text
    content: and
  - type: text
    content: ' argued with Laban. And Jacob said to Laban, What is my fault? What is my sin, that you so hotly pursued me?'
  '37':
  - type: text
    content: ' Although you have searched '
  - type: text
    content: and
  - type: text
    content: ' felt through all my household possessions, what have you found of all your household goods? Put it here before my brethren and yours, that they may judge '
  - type: text
    content: and
  - type: text
    content: ' decide between us.'
  '38':
  - type: text
    content: ' These twenty years I have been with you; your ewes and your she-goats have not lost their young, and the rams of your flock have not been eaten by me.'
  '39':
  - type: text
    content: ' I did not bring you [the carcasses of the animals] torn by wild beasts; I bore the loss of it; you required of me [to make good] all that was stolen, whether it occurred by day or by night.'
  '4':
  - type: text
    content: ' So Jacob sent and called Rachel and Leah to the field to his flock,'
  '40':
  - type: text
    content: ' This was [my lot]; by day the heat consumed me and by night the cold, and I could not sleep.'
  '41':
  - type: text
    content: ' I have been twenty years in your house. I served you fourteen years for your two daughters and six years for your flocks; and you have changed my wages ten times.'
  '42':
  - type: text
    content: ' And if the God of my father, the God of Abraham and the Dread [lest he should fall] '
  - type: text
    content: and
  - type: text
    content: ' Fear [lest he offend] of Isaac, had not been with me, surely you would have sent me away now empty-handed. God has seen my affliction '
  - type: text
    content: and
  - type: text
    content: ' humiliation and the [wearying] labor of my hands and rebuked you last night.'
  '43':
  - type: text
    content: ' Laban answered Jacob, These daughters are my daughters, these children are my children, these flocks are my flocks, and all that you see is mine. But what can I do today to these my daughters or to their children whom they have borne?'
  '44':
  - type: text
    content: ' So come now, let us make a covenant '
  - type: text
    content: or
  - type: text
    content: ' league, you and I, and let it be for a witness between you and me.'
  '45':
  - type: text
    content: ' So Jacob set up a stone for a pillar '
  - type: text
    content: or
  - type: text
    content: ' monument.'
  '46':
  - type: text
    content: ' And Jacob said to his brethren, Gather stones; and they took stones and made a heap, and they ate [together] there upon the heap. [Prov. 16:7.]'
  '47':
  - type: text
    content: ' Laban called it Jegar-sahadutha [witness heap, '
  - type: text
    content: in Aramaic
  - type: text
    content: ' ], but Jacob called it Galeed [witness heap, '
  - type: text
    content: in Hebrew.
  - type: text
    content: ' ]'
  '48':
  - type: text
    content: ' Laban said, This heap is a witness today between you and me. Therefore it was named Galeed.'
  '49':
  - type: text
    content: ' And [the pillar or monument was called] Mizpah [watchpost], for he [Laban] said, May the Lord watch between you and me when we are absent '
  - type: text
    content: and
  - type: text
    content: ' hidden one from another.'
  '5':
  - type: text
    content: ' And he said to them, I see how your father looks at me, that he is not [friendly] toward me as before; but the God of my father has been with me.'
  '50':
  - type: text
    content: ' If you should afflict, humiliate, '
  - type: text
    content: or
  - type: text
    content: ' lower [divorce] my daughters, or if you should take other wives beside my daughters, although no man is with us [to witness], see (remember), God is witness between you and me.'
  '51':
  - type: text
    content: ' And Laban said to Jacob, See this heap and this pillar, which I have set up between you and me.'
  '52':
  - type: text
    content: ' This heap is a witness and this pillar is a witness, that I will not pass by this heap to you, and that you will not pass by this heap and this pillar to me, for harm.'
  '53':
  - type: text
    content: ' The God of Abraham and the God of Nahor, and the god [the object of worship] of their father [Terah, an idolator], judge between us. But Jacob swore [only] by [the one true God] the Dread '
  - type: text
    content: and
  - type: text
    content: ' Fear of his father Isaac. [Josh. 24:2.]'
  '54':
  - type: text
    content: ' Then Jacob offered a sacrifice on the mountain and called his brethren to eat food; and they ate food and lingered all night on the mountain.'
  '55':
  - type: text
    content: ' And early in the morning Laban rose up and kissed his grandchildren and his daughters and pronounced a blessing [asking God''s favor] on them. Then Laban departed and returned to his home.'
  '6':
  - type: text
    content: ' You know that I have served your father with all my might '
  - type: text
    content: and
  - type: text
    content: ' power.'
  '7':
  - type: text
    content: ' But your father has deceived me and changed my wages ten times, but God did not allow him to hurt me.'
  '8':
  - type: text
    content: ' If he said, The speckled shall be your wages, then all the flock bore speckled; and if he said, The streaked shall be your hire, then all the flock bore streaked.'
  '9':
  - type: text
    content: ' Thus God has taken away the flocks of your father and given them to me.'
