document_id: 1JN.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MY LITTLE children, I write you these things so that you may not violate God''s law '
  - type: text
    content: and
  - type: text
    content: ' sin. But if anyone should sin, we have an Advocate (One Who will intercede for us) with the Father–[it is] Jesus Christ [the all] righteous [upright, just, Who conforms to the Father''s will in every purpose, thought, and action].'
  '10':
  - type: text
    content: ' Whoever loves his brother [believer] abides (lives) in the Light, and in It '
  - type: text
    content: or
  - type: text
    content: ' in him there is no occasion for stumbling '
  - type: text
    content: or
  - type: text
    content: ' cause for error '
  - type: text
    content: or
  - type: text
    content: ' sin.'
  '11':
  - type: text
    content: ' But he who hates (detests, despises) his brother [in Christ] is in darkness and walking (living) in the dark; he is straying '
  - type: text
    content: and
  - type: text
    content: ' does not perceive '
  - type: text
    content: or
  - type: text
    content: ' know where he is going, because the darkness has blinded his eyes.'
  '12':
  - type: text
    content: ' I am writing to you, little children, because for His name''s sake your sins are forgiven [pardoned through His name and on account of confessing His name].'
  '13':
  - type: text
    content: ' I am writing to you, fathers, because you have come to know (recognize, be aware of, and understand) Him Who [has existed] from the beginning. I am writing to you, young men, because you have been victorious over the wicked [one]. I write to you, boys (lads), because you have come to know (recognize and be aware) of the Father.'
  '14':
  - type: text
    content: ' I write to you, fathers, because you have come to know (recognize, be conscious of, and understand) Him Who [has existed] from the beginning. I write to you, young men, because you are strong '
  - type: text
    content: and
  - type: text
    content: ' vigorous, and the Word of God is [always] abiding in you (in your hearts), and you have been victorious over the wicked one.'
  '15':
  - type: text
    content: ' Do not love '
  - type: text
    content: or
  - type: text
    content: ' cherish the world or the things that are in the world. If anyone loves the world, love for the Father is not in him.'
  '16':
  - type: text
    content: ' For all that is in the world–the lust of the flesh [craving for sensual gratification] and the lust of the eyes [greedy longings of the mind] and the pride of life [assurance in one''s own resources or in the stability of earthly things]–these do not come from the Father but are from the world [itself].'
  '17':
  - type: text
    content: ' And the world passes away '
  - type: text
    content: and
  - type: text
    content: ' disappears, and with it the forbidden cravings (the passionate desires, the lust) of it; but he who does the will of God and carries out His purposes in his life abides (remains) forever.'
  '18':
  - type: text
    content: ' Boys (lads), it is the last time (hour, the end of this age). And as you have heard that the antichrist [he who will oppose Christ in the guise of Christ] is coming, even now many antichrists have arisen, which confirms our belief that it is the final (the end) time.'
  '19':
  - type: text
    content: ' They went out from our number, but they did not [really] belong to us; for if they had been of us, they would have remained with us. But [they withdrew] that it might be plain that they all are not of us.'
  '2':
  - type: text
    content: ' And He [that same Jesus Himself] is the propitiation (the atoning sacrifice) for our sins, and not for ours alone but also for [the sins of] the whole world.'
  '20':
  - type: text
    content: ' But you have been anointed by [you hold a sacred appointment from, you have been given an unction from] the Holy One, and you all know [the Truth] '
  - type: text
    content: or you know all things
  - type: text
    content: .
  '21':
  - type: text
    content: ' I write to you not because you are ignorant '
  - type: text
    content: and
  - type: text
    content: ' do not perceive '
  - type: text
    content: and
  - type: text
    content: ' know the Truth, but because you do perceive '
  - type: text
    content: and
  - type: text
    content: ' know it, and [know positively] that nothing false (no deception, no lie) is of the Truth.'
  '22':
  - type: text
    content: ' Who is [such a] liar as he who denies that Jesus is the Christ (the Messiah)? He is the antichrist (the antagonist of Christ), who [habitually] denies '
  - type: text
    content: and
  - type: text
    content: ' refuses to acknowledge the Father and the Son.'
  '23':
  - type: text
    content: ' No one who [habitually] denies (disowns) the Son even has the Father. '
  - type: text
    content: Whoever confesses (acknowledges and has) the Son has the Father also.
  '24':
  - type: text
    content: ' As for you, keep in your hearts what you have heard from the beginning. If what you heard from the first dwells '
  - type: text
    content: and
  - type: text
    content: ' remains in you, then you will dwell in the Son and in the Father [always].'
  '25':
  - type: text
    content: ' And this is what He Himself has promised us–the life, the eternal [life].'
  '26':
  - type: text
    content: ' I write this to you with reference to those who would deceive you [seduce and lead you astray].'
  '27':
  - type: text
    content: ' But as for you, the anointing (the sacred appointment, the unction) which you received from Him abides [permanently] in you; [so] then you have no need that anyone should instruct you. But just as His anointing teaches you concerning everything and is true and is no falsehood, so you must abide in (live in, never depart from) Him [being rooted in Him, knit to Him], just as [His anointing] has taught you [to do].'
  '28':
  - type: text
    content: ' And now, little children, abide (live, remain permanently) in Him, so that when He is made visible, we may have '
  - type: text
    content: and
  - type: text
    content: ' enjoy perfect confidence (boldness, assurance) and not be ashamed '
  - type: text
    content: and
  - type: text
    content: ' shrink from Him at His coming.'
  '29':
  - type: text
    content: ' If you know (perceive and are sure) that He [Christ] is [absolutely] righteous [conforming to the Father''s will in purpose, thought, and action], you may also know (be sure) that everyone who does righteously [and is therefore in like manner conformed to the divine will] is born (begotten) of Him [God].'
  '3':
  - type: text
    content: ' And this is how we may discern [daily, by experience] that we are coming to know Him [to perceive, recognize, understand, and become better acquainted with Him]: if we keep (bear in mind, observe, practice) His teachings (precepts, commandments).'
  '4':
  - type: text
    content: ' Whoever says, I know Him [I perceive, recognize, understand, and am acquainted with Him] but fails to keep '
  - type: text
    content: and
  - type: text
    content: ' obey His commandments (teachings) is a liar, and the Truth [of the Gospel] is not in him.'
  '5':
  - type: text
    content: ' But he who keeps (treasures) His Word [who bears in mind His precepts, who observes His message in its entirety], truly in him has the love of '
  - type: text
    content: and
  - type: text
    content: ' for God been perfected (completed, reached maturity). By this we may perceive (know, recognize, and be sure) that we are in Him:'
  '6':
  - type: text
    content: ' Whoever says he abides in Him ought [as a personal debt] to walk '
  - type: text
    content: and
  - type: text
    content: ' conduct himself in the same way in which He walked '
  - type: text
    content: and
  - type: text
    content: ' conducted Himself.'
  '7':
  - type: text
    content: ' Beloved, I am writing you no new commandment, but an old commandment which you have had from the beginning; the old commandment is the message which you have heard [the doctrine of salvation through Christ].'
  '8':
  - type: text
    content: ' Yet I am writing you a new commandment, which is true (is realized) in Him and in you, because the darkness (moral blindness) is clearing away and the true Light (the revelation of God in Christ) is already shining.'
  '9':
  - type: text
    content: ' Whoever says he is in the Light and [yet] hates his brother [Christian, born-again child of God his Father] is in darkness even until now.'
