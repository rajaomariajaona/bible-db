document_id: 1SA.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AND NAHASH the Ammonite went up and besieged Jabesh-gilead; and all the men of Jabesh said to Nahash, Make a treaty with us, and we will serve you.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' So the men of Jabesh said to Nahash, Tomorrow we will come out to you, and you may do to us all that seems good to you.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' The next day Saul put the men in three companies; and they came into the midst of the enemy''s camp in the [darkness of the] morning watch and slew the Ammonites until midday; and the survivors were scattered, so that no two of them remained together.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' The people said to Samuel, Who is he who said, Shall Saul reign over us? Bring the men, that we may put them to death.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But Saul said, There shall not a man be put to death this day, for today the Lord has brought deliverance to Israel.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Samuel said to the people, Come, let us go to Gilgal and there renew the kingdom.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' All the people went to Gilgal and there they made Saul king before the Lord. And there they sacrificed peace offerings before the Lord, and there Saul and all the men of Israel rejoiced greatly.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' But Nahash the Ammonite told them, On this condition I will make a treaty with you, that I thrust out all your right eyes and thus lay disgrace on all Israel.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The elders of Jabesh said to Nahash, Give us seven days'' time, that we may send messengers through all the territory of Israel. Then, if there is no man to save us, we will come out to you.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Then messengers came to Gibeah of Saul and told the news in the ears of the people; and all the people wept aloud.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Now Saul came out of the field after the oxen, and [he] said, What ails the people that they are weeping? And they told him the words of the men of Jabesh.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' The Spirit of God came mightily upon Saul when he heard those tidings, and his anger was greatly kindled.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And he took a yoke of oxen and cut them in pieces and sent them throughout all the territory of Israel by the hands of messengers, saying, Whoever does not come forth after Saul and Samuel, so shall it be done to his oxen! And terror from the Lord fell on the people, and they came out with one consent.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And he numbered them at Bezek, and the Israelites were 300,000 and the men of Judah 30,000.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' The messengers who came were told, Say to the men of Jabesh-gilead, Tomorrow, by the time the sun is hot, you shall have help. The messengers came and reported to the men of Jabesh, and they were glad.'
