document_id: JHN.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THERE was a certain man among the Pharisees named Nicodemus, a ruler (a leader, an authority) among the Jews,'
  '10':
  - type: text
    content: ' Jesus replied, Are you the teacher of Israel, and yet do not know '
  - type: text
    content: nor
  - type: text
    content: ' understand these things? [Are they strange to you?]'
  '11':
  - type: text
    content: ' I assure you, most solemnly I tell you, We speak only of what we know [we know absolutely what we are talking about]; we have actually seen what we are testifying to [we were eyewitnesses of it]. And still you do not receive our testimony [you reject and refuse our evidence–that of Myself and of all those who are born of the Spirit].'
  '12':
  - type: text
    content: ' If I have told you of things that happen right here on the earth and yet none of you believes Me, how can you believe (trust Me, adhere to Me, rely on Me) if I tell you of heavenly things?'
  '13':
  - type: text
    content: ' And yet no one has ever gone up to heaven, but there is One Who has come down from heaven–the Son of Man [Himself], '
  - type: text
    content: Who is (dwells, has His home) in heaven.
  '14':
  - type: text
    content: ' And just as Moses lifted up the serpent in the desert [on a pole], so must [so it is necessary that] the Son of Man be lifted up [on the cross], [Num. 21:9.]'
  '15':
  - type: text
    content: ' In order that everyone who believes in Him [who cleaves to Him, trusts Him, and relies on Him] may '
  - type: text
    content: not perish, but
  - type: text
    content: ' have eternal life '
  - type: text
    content: and
  - type: text
    content: ' [actually] live forever!'
  '16':
  - type: text
    content: ' For God so greatly loved '
  - type: text
    content: and
  - type: text
    content: ' dearly prized the world that He [even] gave up His only begotten (unique) Son, so that whoever believes in (trusts in, clings to, relies on) Him shall not perish (come to destruction, be lost) but have eternal (everlasting) life.'
  '17':
  - type: text
    content: ' For God did not send the Son into the world in order to judge (to reject, to condemn, to pass sentence on) the world, but that the world might find salvation '
  - type: text
    content: and
  - type: text
    content: ' be made safe '
  - type: text
    content: and
  - type: text
    content: ' sound through Him.'
  '18':
  - type: text
    content: ' He who believes in Him [who clings to, trusts in, relies on Him] is not judged [he who trusts in Him never comes up for judgment; for him there is no rejection, no condemnation–he incurs no damnation]; but he who does not believe (cleave to, rely on, trust in Him) is judged already [he has already been convicted and has already received his sentence] because he has not believed in '
  - type: text
    content: and
  - type: text
    content: ' trusted in the name of the only begotten Son of God. [He is condemned for refusing to let his trust rest in Christ''s name.]'
  '19':
  - type: text
    content: ' The [basis of the] judgment (indictment, the test by which men are judged, the ground for the sentence) lies in this: the Light has come into the world, and people have loved the darkness rather than '
  - type: text
    content: and
  - type: text
    content: ' more than the Light, for their works (deeds) were evil. [Isa. 5:20.]'
  '2':
  - type: text
    content: ' Who came to Jesus at night and said to Him, Rabbi, we know '
  - type: text
    content: and
  - type: text
    content: ' are certain that You have come from God [as] a Teacher; for no one can do these signs (these wonderworks, these miracles–and produce the proofs) that You do unless God is with him.'
  '20':
  - type: text
    content: ' For every wrongdoer hates (loathes, detests) the Light, and will not come out into the Light '
  - type: text
    content: but
  - type: text
    content: ' shrinks from it, lest his works (his deeds, his activities, his conduct) be exposed '
  - type: text
    content: and
  - type: text
    content: ' reproved.'
  '21':
  - type: text
    content: ' But he who practices truth [who does what is right] comes out into the Light; so that his works may be plainly shown to be what they are–wrought with God [divinely prompted, done with God''s help, in dependence upon Him].'
  '22':
  - type: text
    content: ' After this, Jesus and His disciples went into the land (the countryside) of Judea, where He remained with them, and baptized.'
  '23':
  - type: text
    content: ' But John also was baptizing at Aenon near Salim, for there was an abundance of water there, and the people kept coming and being baptized.'
  '24':
  - type: text
    content: ' For John had not yet been thrown into prison.'
  '25':
  - type: text
    content: ' Therefore there arose a controversy between some of John''s disciples and a Jew in regard to purification.'
  '26':
  - type: text
    content: ' So they came to John and reported to him, Rabbi, the Man Who was with you on the other side of the Jordan [at the Jordan crossing]–and to Whom you yourself have borne testimony–notice, here He is baptizing too, and everybody is flocking to Him!'
  '27':
  - type: text
    content: ' John answered, A man can receive nothing [he can claim nothing, he can take unto himself nothing] except as it has been granted to him from heaven. [A man must be content to receive the gift which is given him from heaven; there is no other source.]'
  '28':
  - type: text
    content: ' You yourselves are my witnesses [you personally bear me out] that I stated, I am not the Christ (the Anointed One, the Messiah), but I have [only] been sent before Him [in advance of Him, to be His appointed forerunner, His messenger, His announcer]. [Mal. 3:1.]'
  '29':
  - type: text
    content: ' He who has the bride is the bridegroom; but the groomsman who stands by and listens to him rejoices greatly '
  - type: text
    content: and
  - type: text
    content: ' heartily on account of the bridegroom''s voice. This then is my pleasure '
  - type: text
    content: and
  - type: text
    content: ' joy, and it is now complete. [S. of Sol. 5:1.]'
  '3':
  - type: text
    content: ' Jesus answered him, I assure you, most solemnly I tell you, that unless a person is born again (anew, from above), he cannot ever see (know, be acquainted with, and experience) the kingdom of God.'
  '30':
  - type: text
    content: ' He must increase, but I must decrease. [He must grow more prominent; I must grow less so.] [Isa. 9:7.]'
  '31':
  - type: text
    content: ' He Who comes from above (heaven) is [far] above all [others]; he who comes from the earth belongs to the earth, and talks the language of earth [his words are from an earthly standpoint]. He Who comes from heaven is [far] above all others [far superior to all others in prominence and in excellence].'
  '32':
  - type: text
    content: ' It is to what He has [actually] seen and heard that He bears testimony, and yet no one accepts His testimony [no one receives His evidence as true].'
  '33':
  - type: text
    content: ' Whoever receives His testimony has set his seal of approval to this: God is true. [That man has definitely certified, acknowledged, declared once and for all, and is himself assured that it is divine truth that God cannot lie].'
  '34':
  - type: text
    content: ' For since He Whom God has sent speaks the words of God [proclaims God''s own message], God does not give Him His Spirit sparingly '
  - type: text
    content: or
  - type: text
    content: ' by measure, '
  - type: text
    content: but
  - type: text
    content: ' boundless is the gift God makes of His Spirit! [Deut. 18:18.]'
  '35':
  - type: text
    content: ' The Father loves the Son and has given (entrusted, committed) everything into His hand. [Dan. 7:14.]'
  '36':
  - type: text
    content: ' And he who believes in (has faith in, clings to, relies on) the Son has (now possesses) eternal life. But whoever disobeys (is unbelieving toward, refuses to trust in, disregards, is not subject to) the Son will never see (experience) life, but [instead] the wrath of God abides on him. [God''s displeasure remains on him; His indignation hangs over him continually.] [Hab. 2:4.]'
  '4':
  - type: text
    content: ' Nicodemus said to Him, How can a man be born when he is old? Can he enter his mother''s womb again and be born?'
  '5':
  - type: text
    content: ' Jesus answered, I assure you, most solemnly I tell you, unless a man is born of water and [even] the Spirit, he cannot [ever] enter the kingdom of God. [Ezek. 36:25-27.]'
  '6':
  - type: text
    content: ' What is born of [from] the flesh is flesh [of the physical is physical]; and what is born of the Spirit is spirit.'
  '7':
  - type: text
    content: ' Marvel not [do not be surprised, astonished] at My telling you, You must all be born anew (from above).'
  '8':
  - type: text
    content: ' The wind blows (breathes) where it wills; and though you hear its sound, yet you neither know where it comes from nor where it is going. So it is with everyone who is born of the Spirit.'
  '9':
  - type: text
    content: ' Nicodemus answered by asking, How can all this be possible?'
