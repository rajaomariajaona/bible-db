document_id: NUM.15,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' And you shall bring for the drink offering half a hin of wine for an offering made by fire, of a pleasant '
  - type: text
    content: and
  - type: text
    content: ' soothing fragrance to the Lord.'
  '11':
  - type: text
    content: ' Thus shall it be done for each bull or for each ram, or for each of the male lambs or of the kids.'
  '12':
  - type: text
    content: ' According to the number that you shall prepare, so shall you do to everyone according to their number.'
  '13':
  - type: text
    content: ' All who are native-born shall do these things in this way in bringing an offering made by fire of a sweet '
  - type: text
    content: and
  - type: text
    content: ' pleasant odor to the Lord.'
  '14':
  - type: text
    content: ' And if a stranger sojourns with you or whoever may be among you throughout your generations, and he wishes to offer an offering made by fire, of a pleasing '
  - type: text
    content: and
  - type: text
    content: ' soothing fragrance to the Lord, as you do, so shall he do.'
  '15':
  - type: text
    content: ' There shall be one [and the same] statute [both] for you [of the congregation] and for the stranger who is a temporary resident with you, a statute forever throughout your generations: as you are, so shall the stranger be before the Lord.'
  '16':
  - type: text
    content: ' One law and one ordinance shall be for you and for the stranger who sojourns with you.'
  '17':
  - type: text
    content: ' And the Lord said to Moses,'
  '18':
  - type: text
    content: ' Say to the Israelites, When you come into the land to which I am bringing you,'
  '19':
  - type: text
    content: ' Then, when you eat of the food of the land, you shall set apart a portion for a gift to the Lord [called a heave or taken-out offering].'
  '2':
  - type: text
    content: ' Say to the Israelites, When you come into the land where you are to live, which I am giving you,'
  '20':
  - type: text
    content: ' You shall set apart a cake made of the first of your coarse meal as a gift [to the Lord]; as an offering set apart from the threshing floor, so shall you lift it out '
  - type: text
    content: or
  - type: text
    content: ' heave it.'
  '21':
  - type: text
    content: ' Of the first of your coarse meal you shall give to the Lord a portion for a gift throughout your generations [your heave or lifted-out offering].'
  '22':
  - type: text
    content: ' When you have erred and have not observed all these commandments which the Lord has spoken to Moses,'
  '23':
  - type: text
    content: ' Even all that the Lord has commanded you through Moses, from the day that the Lord gave commandment and onward throughout your generations,'
  '24':
  - type: text
    content: ' Then it shall be, if it was done unwittingly '
  - type: text
    content: or
  - type: text
    content: ' in error without the knowledge of the congregation, that all the congregation shall offer one young bull for a burnt offering, for a pleasant '
  - type: text
    content: and
  - type: text
    content: ' soothing fragrance to the Lord, with its cereal offering and its drink offering, according to the ordinance, and one male goat for a sin offering.'
  '25':
  - type: text
    content: ' And the priest shall make atonement for all the congregation of the Israelites, and they shall be forgiven, for it was an error and they have brought their offering, an offering made by fire to the Lord, and their sin offering before the Lord for their error.'
  '26':
  - type: text
    content: ' And all the congregation of the Israelites shall be forgiven and the stranger who lives temporarily among them, because all the people were involved in the error.'
  '27':
  - type: text
    content: ' And if any person sins unknowingly '
  - type: text
    content: or
  - type: text
    content: ' unintentionally, he shall offer a female goat a year old for a sin offering.'
  '28':
  - type: text
    content: ' And the priest shall make atonement before the Lord for the person who commits an error when he sins unknowingly '
  - type: text
    content: or
  - type: text
    content: ' unintentionally, to make atonement for him; and he shall be forgiven.'
  '29':
  - type: text
    content: ' You shall have one law for him who sins unknowingly '
  - type: text
    content: or
  - type: text
    content: ' unintentionally, whether he is native born among the Israelites or a stranger who is sojourning among them.'
  '3':
  - type: text
    content: ' And will make an offering by fire to the Lord from the herd or from the flock, a burnt offering or a sacrifice to fulfill a special vow or as a freewill offering or in your set feasts, to make a pleasant '
  - type: text
    content: and
  - type: text
    content: ' soothing fragrance to the Lord,'
  '30':
  - type: text
    content: ' But the person who does anything [wrong] willfully '
  - type: text
    content: and
  - type: text
    content: ' openly, whether he is native-born or a stranger, that one reproaches, reviles, '
  - type: text
    content: and
  - type: text
    content: ' blasphemes the Lord, and that person shall be cut off from among his people [that the atonement made for them may not include him].'
  '31':
  - type: text
    content: ' Because he has despised and rejected the word of the Lord, and has broken His commandment, that person shall be utterly cut off; his iniquity shall be upon him.'
  '32':
  - type: text
    content: ' While the Israelites were in the wilderness, they found a man who was gathering sticks on the Sabbath day.'
  '33':
  - type: text
    content: ' Those who found him gathering sticks brought him to Moses and Aaron and to all the congregation.'
  '34':
  - type: text
    content: ' They put him in custody, because it was not certain '
  - type: text
    content: or
  - type: text
    content: ' clear what should be done to him.'
  '35':
  - type: text
    content: ' And the Lord said to Moses, The man shall surely be put to death. All the congregation shall stone him with stones without the camp.'
  '36':
  - type: text
    content: ' And all the congregation brought him without the camp and stoned him to death with stones, as the Lord commanded Moses.'
  '37':
  - type: text
    content: ' And the Lord said to Moses,'
  '38':
  - type: text
    content: ' Speak to the Israelites and bid them make fringes '
  - type: text
    content: or
  - type: text
    content: ' tassels on the corners in the borders of their garments throughout their generations, and put upon the fringe of the borders '
  - type: text
    content: or
  - type: text
    content: ' upon the tassel of each corner a cord of blue.'
  '39':
  - type: text
    content: ' And it shall be to you a fringe '
  - type: text
    content: or
  - type: text
    content: ' tassel that you may look upon and remember all the commandments of the Lord and do them, that you may not spy out '
  - type: text
    content: and
  - type: text
    content: ' follow after [the desires of] your own heart and your own eyes, after which you used to follow '
  - type: text
    content: and
  - type: text
    content: ' play the harlot [spiritually, if not physically],'
  '4':
  - type: text
    content: ' Then shall he who brings his offering to the Lord bring a cereal offering of a tenth of an ephah of fine flour mixed with a fourth of a hin of oil.'
  '40':
  - type: text
    content: ' That you may remember and do all My commandments and be holy to your God.'
  '41':
  - type: text
    content: ' I am the Lord your God, Who brought you out of the land of Egypt to be your God. I am the Lord your God.'
  '5':
  - type: text
    content: ' And a fourth of a hin of wine for the drink offering you shall prepare with the burnt offering or for the sacrifice, for each lamb.'
  '6':
  - type: text
    content: ' Or for a ram you shall prepare for a cereal offering two tenths of an ephah of fine flour mixed with a third of a hin of oil.'
  '7':
  - type: text
    content: ' And for the drink offering you shall offer a third of a hin of wine, for a sweet '
  - type: text
    content: and
  - type: text
    content: ' pleasing odor to the Lord.'
  '8':
  - type: text
    content: ' And when you prepare a bull for a burnt offering or for a sacrifice, in fulfilling a special vow or peace offering to the Lord,'
  '9':
  - type: text
    content: ' Then shall one offer with the bull a cereal offering of three tenths of an ephah of fine flour mixed with half a hin of oil.'
