document_id: NUM.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Say to the Israelites, When you come into the land where you are to live, which I am giving you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And will make an offering by fire to the Lord from the herd or from the flock, a burnt offering or a sacrifice to fulfill a special vow or as a freewill offering or in your set feasts, to make a pleasant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing fragrance to the Lord,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then shall he who brings his offering to the Lord bring a cereal offering of a tenth of an ephah of fine flour mixed with a fourth of a hin of oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And a fourth of a hin of wine for the drink offering you shall prepare with the burnt offering or for the sacrifice, for each lamb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Or for a ram you shall prepare for a cereal offering two tenths of an ephah of fine flour mixed with a third of a hin of oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And for the drink offering you shall offer a third of a hin of wine, for a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasing odor to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And when you prepare a bull for a burnt offering or for a sacrifice, in fulfilling a special vow or peace offering to the Lord,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then shall one offer with the bull a cereal offering of three tenths of an ephah of fine flour mixed with half a hin of oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And you shall bring for the drink offering half a hin of wine for an offering made by fire, of a pleasant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing fragrance to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Thus shall it be done for each bull or for each ram, or for each of the male lambs or of the kids.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' According to the number that you shall prepare, so shall you do to everyone according to their number.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' All who are native-born shall do these things in this way in bringing an offering made by fire of a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasant odor to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And if a stranger sojourns with you or whoever may be among you throughout your generations, and he wishes to offer an offering made by fire, of a pleasing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing fragrance to the Lord, as you do, so shall he do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' There shall be one [and the same] statute [both] for you [of the congregation] and for the stranger who is a temporary resident with you, a statute forever throughout your generations: as you are, so shall the stranger be before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' One law and one ordinance shall be for you and for the stranger who sojourns with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Say to the Israelites, When you come into the land to which I am bringing you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then, when you eat of the food of the land, you shall set apart a portion for a gift to the Lord [called a heave or taken-out offering].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You shall set apart a cake made of the first of your coarse meal as a gift [to the Lord]; as an offering set apart from the threshing floor, so shall you lift it out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' heave it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Of the first of your coarse meal you shall give to the Lord a portion for a gift throughout your generations [your heave or lifted-out offering].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When you have erred and have not observed all these commandments which the Lord has spoken to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Even all that the Lord has commanded you through Moses, from the day that the Lord gave commandment and onward throughout your generations,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then it shall be, if it was done unwittingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' in error without the knowledge of the congregation, that all the congregation shall offer one young bull for a burnt offering, for a pleasant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing fragrance to the Lord, with its cereal offering and its drink offering, according to the ordinance, and one male goat for a sin offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the priest shall make atonement for all the congregation of the Israelites, and they shall be forgiven, for it was an error and they have brought their offering, an offering made by fire to the Lord, and their sin offering before the Lord for their error.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And all the congregation of the Israelites shall be forgiven and the stranger who lives temporarily among them, because all the people were involved in the error.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And if any person sins unknowingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unintentionally, he shall offer a female goat a year old for a sin offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And the priest shall make atonement before the Lord for the person who commits an error when he sins unknowingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unintentionally, to make atonement for him; and he shall be forgiven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' You shall have one law for him who sins unknowingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unintentionally, whether he is native born among the Israelites or a stranger who is sojourning among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But the person who does anything [wrong] willfully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' openly, whether he is native-born or a stranger, that one reproaches, reviles, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blasphemes the Lord, and that person shall be cut off from among his people [that the atonement made for them may not include him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Because he has despised and rejected the word of the Lord, and has broken His commandment, that person shall be utterly cut off; his iniquity shall be upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' While the Israelites were in the wilderness, they found a man who was gathering sticks on the Sabbath day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Those who found him gathering sticks brought him to Moses and Aaron and to all the congregation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' They put him in custody, because it was not certain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' clear what should be done to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And the Lord said to Moses, The man shall surely be put to death. All the congregation shall stone him with stones without the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And all the congregation brought him without the camp and stoned him to death with stones, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Speak to the Israelites and bid them make fringes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' tassels on the corners in the borders of their garments throughout their generations, and put upon the fringe of the borders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' upon the tassel of each corner a cord of blue.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And it shall be to you a fringe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' tassel that you may look upon and remember all the commandments of the Lord and do them, that you may not spy out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' follow after [the desires of] your own heart and your own eyes, after which you used to follow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' play the harlot [spiritually, if not physically],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' That you may remember and do all My commandments and be holy to your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' I am the Lord your God, Who brought you out of the land of Egypt to be your God. I am the Lord your God.'
