document_id: EZR.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THESE are the people of the province [of Judah] who went up out of the captivity of those exiles whom Nebuchadnezzar the king of Babylon had carried away to Babylon, but who came again to Jerusalem and Judah, everyone to his own city.'
  '10':
  - type: text
    content: ' The sons of Bani, 642.'
  '11':
  - type: text
    content: ' The sons of Bebai, 623.'
  '12':
  - type: text
    content: ' The sons of Azgad, 1,222.'
  '13':
  - type: text
    content: ' The sons of Adonikam, 666.'
  '14':
  - type: text
    content: ' The sons of Bigvai, 2,056.'
  '15':
  - type: text
    content: ' The sons of Adin, 454.'
  '16':
  - type: text
    content: ' The sons of Ater, namely of Hezekiah, 98.'
  '17':
  - type: text
    content: ' The sons of Bezai, 323.'
  '18':
  - type: text
    content: ' The sons of Jorah, 112.'
  '19':
  - type: text
    content: ' The sons of Hashum, 223.'
  '2':
  - type: text
    content: ' These came with Zerubbabel: Jeshua, Nehemiah [not the author], Seraiah, Reelaiah, Mordecai [not Esther''s relative], Bilshan, Mispar, Bigvai, Rehum, Baanah. The number of the men of Israel:'
  '20':
  - type: text
    content: ' The sons of Gibbar, 95.'
  '21':
  - type: text
    content: ' The sons of Bethlehem, 123.'
  '22':
  - type: text
    content: ' The men of Netophah, 56.'
  '23':
  - type: text
    content: ' The men of Anathoth, 128.'
  '24':
  - type: text
    content: ' The sons of Azmaveth, 42.'
  '25':
  - type: text
    content: ' The sons of Kiriath-arim, Chephirah, and Beeroth, 743.'
  '26':
  - type: text
    content: ' The sons of Ramah and Geba, 621.'
  '27':
  - type: text
    content: ' The men of Michmas, 122.'
  '28':
  - type: text
    content: ' The men of Bethel and Ai, 223.'
  '29':
  - type: text
    content: ' The sons of Nebo, 52.'
  '3':
  - type: text
    content: ' The sons [meaning male descendants] of Parosh, 2,172.'
  '30':
  - type: text
    content: ' The sons of Magbish, 156.'
  '31':
  - type: text
    content: ' The sons of the other Elam, 1,254.'
  '32':
  - type: text
    content: ' The sons of Harim, 320.'
  '33':
  - type: text
    content: ' The sons of Lod, Hadid, and Ono, 725.'
  '34':
  - type: text
    content: ' The sons of Jericho, 345.'
  '35':
  - type: text
    content: ' The sons of Senaah, 3,630.'
  '36':
  - type: text
    content: ' The priests: the sons of Jedaiah, of the house of Jeshua, 973.'
  '37':
  - type: text
    content: ' The sons of Immer, 1,052.'
  '38':
  - type: text
    content: ' The sons of Pashhur, 1,247.'
  '39':
  - type: text
    content: ' The sons of Harim, 1,017.'
  '4':
  - type: text
    content: ' The sons of Shephatiah, 372.'
  '40':
  - type: text
    content: ' The Levites: the sons of Jeshua and Kadmiel, of the house of Hodaviah, 74.'
  '41':
  - type: text
    content: ' The singers: the sons of Asaph, 128.'
  '42':
  - type: text
    content: ' The sons of the gatekeepers: of Shallum, Ater, Talmon, Akkub, Hatita, and Shobai, in all 139.'
  '43':
  - type: text
    content: ' The Nethinim [the temple servants]: the sons of Ziba, Hasupha, Tabbaoth,'
  '44':
  - type: text
    content: ' The sons of Keros, Siaha, Padon,'
  '45':
  - type: text
    content: ' The sons of Lebanah, Hagabah, Akkub,'
  '46':
  - type: text
    content: ' The sons of Hagab, Shalmai, Hanan,'
  '47':
  - type: text
    content: ' The sons of Giddel, Gahar, Reaiah,'
  '48':
  - type: text
    content: ' The sons of Rezin, Nekoda, Gazzam,'
  '49':
  - type: text
    content: ' The sons of Uzza, Paseah, Besai,'
  '5':
  - type: text
    content: ' The sons of Arah, 775.'
  '50':
  - type: text
    content: ' The sons of Asnah, Meunim, Nephisim,'
  '51':
  - type: text
    content: ' The sons of Bakbuk, Hakupha, Harhur,'
  '52':
  - type: text
    content: ' The sons of Bazluth, Mehida, Harsha,'
  '53':
  - type: text
    content: ' The sons of Barkos, Sisera, Temah,'
  '54':
  - type: text
    content: ' The sons of Neziah [and] of Hatipha.'
  '55':
  - type: text
    content: ' The sons of [King] Solomon''s servants: the sons of Sotai, Sophereth (Hassophereth), Peruda,'
  '56':
  - type: text
    content: ' The sons of Jaalah, Darkon, Giddel,'
  '57':
  - type: text
    content: ' The sons of Shephatiah, Hattil, Pochereth-hazzebaim, Ami.'
  '58':
  - type: text
    content: ' All the Nethinim [the temple servants] and the sons of Solomon''s servants were 392.'
  '59':
  - type: text
    content: ' And these were they who came up from Tel-melah, Tel-harsha, Cherub, Addan, and Immer, but they could not show a record of their fathers'' houses or prove their descent, whether they were of Israel:'
  '6':
  - type: text
    content: ' The sons of Pahath-moab, namely of the sons of Jeshua and Joab, 2,812.'
  '60':
  - type: text
    content: ' The sons of Delaiah, Tobiah, and Nekoda, 652.'
  '61':
  - type: text
    content: ' And of the sons of the priests: the sons of Habaiah, of Hakkoz, and of Barzillai, who had taken a wife from the daughters of Barzillai the [noted] Gileadite and had assumed their name. [II Sam. 17:27, 28; 19:31-39.]'
  '62':
  - type: text
    content: ' These sought their names among those enrolled in the genealogies, but they were not found; so they were excluded from the priesthood as [ceremonially] unclean.'
  '63':
  - type: text
    content: ' [Zerubbabel] the governor told them they should not eat of the most holy things [the priests'' food] until there should be a priest with Urim and Thummim [who by consulting these articles in his breastplate could know God''s will in the matter].'
  '64':
  - type: text
    content: ' The whole congregation numbered 42,360,'
  '65':
  - type: text
    content: ' Besides their menservants and maidservants, 7,337; and among them they had 200 men and women singers.'
  '66':
  - type: text
    content: ' Their horses were 736; their mules, 245;'
  '67':
  - type: text
    content: ' Their camels were 435; their donkeys, 6,720.'
  '68':
  - type: text
    content: ' Some of the heads of families, when they came to the house of the Lord in Jerusalem, made freewill offerings for the house of God to [re]build it on its site.'
  '69':
  - type: text
    content: ' They gave as they were able to the treasury for the work 61,000 darics of gold, 5,000 minas of silver, and 100 priests'' garments.'
  '7':
  - type: text
    content: ' The sons of Elam, 1,254.'
  '70':
  - type: text
    content: ' So the priests, the Levites, some of the people, the singers, the gatekeepers, and the temple servants lived in their own towns, and all Israel [gradually settled] into their towns.'
  '8':
  - type: text
    content: ' The sons of Zattu, 945.'
  '9':
  - type: text
    content: ' The sons of Zaccai, 760.'
