  '21':
  - type: text
    content: ' When the strong man, fully armed, [from his courtyard] guards his own dwelling, his belongings are undisturbed [his property is at peace and is secure].'
  '22':
  - type: text
    content: ' But when one stronger than he attacks him and conquers him, he robs him of his whole armor on which he had relied and divides up '
  - type: text
    content: and
  - type: text
    content: ' distributes all his goods as plunder (spoil).'
  '23':
  - type: text
    content: ' He who is not with Me [siding and believing with Me] is against Me, and he who does not gather with Me [engage in My interest], scatters.'
  '24':
  - type: text
    content: ' When the unclean spirit has gone out of a person, it roams through waterless places in search [of a place] of rest (release, refreshment, ease); and finding none it says, I will go back to my house from which I came.'
  '25':
  - type: text
    content: ' And when it arrives, it finds [the place] swept '
  - type: text
    content: and
  - type: text
    content: ' put in order and furnished '
  - type: text
