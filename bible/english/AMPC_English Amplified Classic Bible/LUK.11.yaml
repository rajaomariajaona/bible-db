  - type: text
    content: and
  - type: text
    content: ' dwell there; and the last state of that person is worse than the first.'
  '27':
  - type: text
    content: ' Now it occurred that as He was saying these things, a certain woman in the crowd raised her voice and said to Him, Blessed (happy and to be envied) is the womb that bore You and the breasts that You sucked!'
  '28':
  - type: text
    content: ' But He said, Blessed (happy and to be envied) rather are those who hear the Word of God and obey '
  - type: text
    content: and
  - type: text
    content: ' practice it!'
  '29':
  - type: text
    content: ' Now as the crowds were [increasingly] thronging Him, He began to say, This present generation is a wicked one; it seeks '
  - type: text
    content: and
  - type: text
    content: ' demands a sign (miracle), but no sign shall be given to it except the sign of Jonah [the prophet]. [Jonah 1:17; Matt. 12:40.]'
  '3':
  - type: text
    content: ' Give us daily our bread [food for the morrow].'
  '30':
  - type: text
    content: ' For [just] as Jonah became a sign to the people of Nineveh, so will also the Son of Man be [a sign] to this age '
  - type: text
    content: and
  - type: text
    content: ' generation. [Jonah 3:4-10.]'
  '31':
  - type: text
    content: ' The queen of the South will arise in the judgment with the people of this age '
  - type: text
    content: and
  - type: text
    content: ' generation and condemn them; for she came from the ends of the [inhabited] earth to listen to the wisdom of Solomon, and notice, here is more than Solomon. [I Kings 10:1-13; II Chron. 9:1-12.]'
  '32':
  - type: text
    content: ' The men of Nineveh will appear as witnesses at the judgment with this generation and will condemn it; for they repented at the preaching of Jonah, and behold, here is more than Jonah. [Jonah 3:4-10.]'
  '33':
  - type: text
    content: ' No one after lighting a lamp puts it in a cellar '
  - type: text
    content: or
  - type: text
    content: ' crypt or under a bushel measure, but on a lampstand, that those who are coming in may see the light.'
  '34':
  - type: text
    content: ' Your eye is the lamp of your body; when your eye (your conscience) is sound '
  - type: text
    content: and
  - type: text
    content: ' fulfilling its office, your whole body is full of light; but when it is not sound '
  - type: text
    content: and
  - type: text
    content: ' is not fulfilling its office, your body is full of darkness.'
  '35':
  - type: text
    content: ' Be careful, therefore, that the light that is in you is not darkness.'
  '36':
  - type: text
    content: ' If then your entire body is illuminated, having no part dark, it will be wholly bright [with light], as when a lamp with its bright rays gives you light.'
  '37':
  - type: text
    content: ' Now while Jesus was speaking, a Pharisee invited Him to take dinner with him, so He entered and reclined at table.'
  '38':
  - type: text
    content: ' The Pharisee noticed and was astonished [to see] that Jesus did not first wash before dinner.'
  '39':
  - type: text
    content: ' But the Lord said to him, Now you Pharisees cleanse the outside of the cup and of the plate, but inside you yourselves are full of greed '
  - type: text
    content: and
  - type: text
    content: ' robbery '
  - type: text
    content: and
  - type: text
    content: ' extortion and malice '
  - type: text
    content: and
  - type: text
    content: ' wickedness.'
  '4':
  - type: text
    content: ' And forgive us our sins, for we ourselves also forgive everyone who is indebted to us [who has offended us or done us wrong]. And bring us not into temptation '
  - type: text
    content: but rescue us from evil.
  '40':
  - type: text
    content: ' You senseless (foolish, stupid) ones [acting without reflection or intelligence]! Did not He Who made the outside make the inside also?'
  '41':
  - type: text
    content: ' But [dedicate your inner self and] give as donations to the poor of those things which are within [of inward righteousness] and behold, everything is purified '
  - type: text
    content: and
  - type: text
    content: ' clean for you.'
  '42':
  - type: text
    content: ' But woe to you, Pharisees! For you tithe mint and rue and every [little] herb, but disregard '
  - type: text
    content: and
  - type: text
    content: ' neglect justice and the love of God. These you ought to have done without leaving the others undone. [Lev. 27:30; Mic. 6:8.]'
  '43':
  - type: text
    content: ' Woe to you, Pharisees! For you love the best seats in the synagogues and [you love] to be greeted '
  - type: text
    content: and
  - type: text
    content: ' bowed down to in the [public] marketplaces.'
  '44':
  - type: text
    content: ' Woe to you! For you are like graves which are not marked '
  - type: text
    content: or
  - type: text
    content: ' seen, and men walk over them without being aware of it [and are ceremonially defiled].'
  '45':
  - type: text
    content: ' One of the experts in the [Mosaic] Law answered Him, Teacher, in saying this, You reproach '
  - type: text
    content: and
  - type: text
    content: ' outrage '
  - type: text
    content: and
  - type: text
    content: ' affront even us!'
  '46':
  - type: text
    content: ' But He said, Woe to you, the lawyers, also! For you load men with oppressive burdens hard to bear, and you do not personally [even gently] touch the burdens with one of your fingers.'
  '47':
  - type: text
    content: ' Woe to you! For you are rebuilding '
  - type: text
    content: and
  - type: text
    content: ' repairing the tombs of the prophets, whom your fathers killed (destroyed).'
  '48':
  - type: text
    content: ' So you bear witness and give your full approval '
  - type: text
    content: and
  - type: text
    content: ' consent to the deeds of your fathers; for they actually killed them, and you rebuild '
  - type: text
    content: and
  - type: text
    content: ' repair monuments to them.'
  '49':
  - type: text
    content: ' For this reason also the wisdom of God said, I will send them prophets and apostles, [some] of whom they will put to death and persecute,'
  '5':
  - type: text
    content: ' And He said to them, Which of you who has a friend will go to him at midnight and will say to him, Friend, lend me three loaves [of bread],'
  '50':
  - type: text
    content: ' So that the blood of all the prophets shed from the foundation of the world may be charged against '
  - type: text
    content: and
  - type: text
    content: ' required of this age '
  - type: text
    content: and
  - type: text
    content: ' generation,'
  '51':
  - type: text
    content: ' From the blood of Abel to the blood of Zechariah, who was slain between the altar and the sanctuary. Yes, I tell you, it shall be charged against '
  - type: text
    content: and
  - type: text
    content: ' required of this age '
  - type: text
    content: and
  - type: text
    content: ' generation. [Gen. 4:8; II Chron. 24:20, 21; Zech. 1:1.]'
  '52':
  - type: text
    content: ' Woe to you, lawyers (experts in the Mosaic Law)! For you have taken away the key to knowledge; you did not go in yourselves, and you hindered '
  - type: text
    content: and
  - type: text
    content: ' prevented those who were entering.'
  '53':
  - type: text
    content: ' As He left there, the scribes and the Pharisees [followed Him closely, and they] began to be enraged with '
  - type: text
    content: and
  - type: text
