  - type: text
    content: and
  - type: text
    content: ' plotting '
  - type: text
    content: and
  - type: text
    content: ' lying in wait for Him, to seize upon something He might say [that they might accuse Him].'
  '6':
  - type: text
    content: ' For a friend of mine who is on a journey has just come, and I have nothing to put before him;'
  '7':
