document_id: LUK.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN HE was praying in a certain place; and when He stopped, one of His disciples said to Him, Lord, teach us to pray, [just] as John taught his disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And He said to them, When you pray, say: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Our
  - type: text
    text: ' Father '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Who is in heaven,
  - type: text
    text: ' hallowed be Your name, Your kingdom come. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your will be done [held holy and revered] on earth as it is in heaven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Give us daily our bread [food for the morrow].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And forgive us our sins, for we ourselves also forgive everyone who is indebted to us [who has offended us or done us wrong]. And bring us not into temptation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but rescue us from evil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And He said to them, Which of you who has a friend will go to him at midnight and will say to him, Friend, lend me three loaves [of bread],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For a friend of mine who is on a journey has just come, and I have nothing to put before him;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he from within will answer, Do not disturb me; the door is now closed, and my children are with me in bed; I cannot get up and supply you [with anything]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I tell you, although he will not get up and supply him anything because he is his friend, yet because of his shameless persistence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insistence he will get up and give him as much as he needs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So I say to you, Ask '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep on asking and it shall be given you; seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep on seeking and you shall find; knock '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep on knocking and the door shall be opened to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For everyone who asks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keeps on asking receives; and he who seeks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keeps on seeking finds; and to him who knocks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keeps on knocking, the door shall be opened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' What father among you, if his son asks for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a loaf of bread, will give him a stone; or if he asks for
  - type: text
    text: ' a fish, will instead of a fish give him a serpent?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Or if he asks for an egg, will give him a scorpion?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' If you then, evil as you are, know how to give good gifts [gifts that are to their advantage] to your children, how much more will your heavenly Father give the Holy Spirit to those who ask '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continue to ask Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Now Jesus was driving out a demon that was dumb; and it occurred that when the demon had gone out, the dumb man spoke. And the crowds marveled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But some of them said, He drives out demons [because He is in league with and] by Beelzebub, the prince of demons,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' While others, to try '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' test '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tempt Him, demanded a sign of Him from heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But He, [well] aware of their intent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose, said to them, Every kingdom split up against itself is doomed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brought to desolation, and so house falls upon house. [The disunited household will collapse.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And if Satan also is divided against himself, how will his kingdom last? For you say that I expel demons with the help of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by Beelzebub.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Now if I expel demons with the help of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by Beelzebub, with whose help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by whom do your sons drive them out? Therefore they shall be your judges.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But if I drive out the demons by the finger of God, then the kingdom of God has [already] come upon you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' When the strong man, fully armed, [from his courtyard] guards his own dwelling, his belongings are undisturbed [his property is at peace and is secure].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But when one stronger than he attacks him and conquers him, he robs him of his whole armor on which he had relied and divides up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distributes all his goods as plunder (spoil).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He who is not with Me [siding and believing with Me] is against Me, and he who does not gather with Me [engage in My interest], scatters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' When the unclean spirit has gone out of a person, it roams through waterless places in search [of a place] of rest (release, refreshment, ease); and finding none it says, I will go back to my house from which I came.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And when it arrives, it finds [the place] swept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put in order and furnished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' decorated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And it goes and brings other spirits, seven [of them], more evil than itself, and they enter in, settle down, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dwell there; and the last state of that person is worse than the first.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Now it occurred that as He was saying these things, a certain woman in the crowd raised her voice and said to Him, Blessed (happy and to be envied) is the womb that bore You and the breasts that You sucked!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But He said, Blessed (happy and to be envied) rather are those who hear the Word of God and obey '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' practice it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Now as the crowds were [increasingly] thronging Him, He began to say, This present generation is a wicked one; it seeks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demands a sign (miracle), but no sign shall be given to it except the sign of Jonah [the prophet]. [Jonah 1:17; Matt. 12:40.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' For [just] as Jonah became a sign to the people of Nineveh, so will also the Son of Man be [a sign] to this age '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generation. [Jonah 3:4-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The queen of the South will arise in the judgment with the people of this age '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generation and condemn them; for she came from the ends of the [inhabited] earth to listen to the wisdom of Solomon, and notice, here is more than Solomon. [I Kings 10:1-13; II Chron. 9:1-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' The men of Nineveh will appear as witnesses at the judgment with this generation and will condemn it; for they repented at the preaching of Jonah, and behold, here is more than Jonah. [Jonah 3:4-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' No one after lighting a lamp puts it in a cellar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' crypt or under a bushel measure, but on a lampstand, that those who are coming in may see the light.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Your eye is the lamp of your body; when your eye (your conscience) is sound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fulfilling its office, your whole body is full of light; but when it is not sound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is not fulfilling its office, your body is full of darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Be careful, therefore, that the light that is in you is not darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' If then your entire body is illuminated, having no part dark, it will be wholly bright [with light], as when a lamp with its bright rays gives you light.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Now while Jesus was speaking, a Pharisee invited Him to take dinner with him, so He entered and reclined at table.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' The Pharisee noticed and was astonished [to see] that Jesus did not first wash before dinner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But the Lord said to him, Now you Pharisees cleanse the outside of the cup and of the plate, but inside you yourselves are full of greed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' robbery '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extortion and malice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wickedness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' You senseless (foolish, stupid) ones [acting without reflection or intelligence]! Did not He Who made the outside make the inside also?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' But [dedicate your inner self and] give as donations to the poor of those things which are within [of inward righteousness] and behold, everything is purified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clean for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' But woe to you, Pharisees! For you tithe mint and rue and every [little] herb, but disregard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' neglect justice and the love of God. These you ought to have done without leaving the others undone. [Lev. 27:30; Mic. 6:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Woe to you, Pharisees! For you love the best seats in the synagogues and [you love] to be greeted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bowed down to in the [public] marketplaces.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Woe to you! For you are like graves which are not marked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' seen, and men walk over them without being aware of it [and are ceremonially defiled].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' One of the experts in the [Mosaic] Law answered Him, Teacher, in saying this, You reproach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' outrage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affront even us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' But He said, Woe to you, the lawyers, also! For you load men with oppressive burdens hard to bear, and you do not personally [even gently] touch the burdens with one of your fingers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' Woe to you! For you are rebuilding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repairing the tombs of the prophets, whom your fathers killed (destroyed).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' So you bear witness and give your full approval '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consent to the deeds of your fathers; for they actually killed them, and you rebuild '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repair monuments to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' For this reason also the wisdom of God said, I will send them prophets and apostles, [some] of whom they will put to death and persecute,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' So that the blood of all the prophets shed from the foundation of the world may be charged against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' required of this age '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generation,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' From the blood of Abel to the blood of Zechariah, who was slain between the altar and the sanctuary. Yes, I tell you, it shall be charged against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' required of this age '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generation. [Gen. 4:8; II Chron. 24:20, 21; Zech. 1:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' Woe to you, lawyers (experts in the Mosaic Law)! For you have taken away the key to knowledge; you did not go in yourselves, and you hindered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prevented those who were entering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' As He left there, the scribes and the Pharisees [followed Him closely, and they] began to be enraged with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set themselves violently against Him and to draw Him out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provoke Him to speak of many things,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' Secretly watching '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plotting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lying in wait for Him, to seize upon something He might say [that they might accuse Him].'
