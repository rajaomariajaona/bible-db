document_id: JON.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE word of the Lord came to Jonah the second time, saying,'
  '10':
  - type: text
    content: ' And God saw their works, that they turned from their evil way; and God revoked His [sentence of] evil that He had said that He would do to them and He did not do it [for He was comforted and eased concerning them].'
  '2':
  - type: text
    content: ' Arise, go to Nineveh, that great city, and preach '
  - type: text
    content: and
  - type: text
    content: ' cry out to it the preaching that I tell you.'
  '3':
  - type: text
    content: ' So Jonah arose and went to Nineveh according to the word of the Lord. Now Nineveh was an exceedingly great city of three days'' journey [sixty miles in circumference].'
  '4':
  - type: text
    content: ' And Jonah began to enter into the city a day''s journey, and he cried, Yet forty days and Nineveh shall be overthrown!'
  '5':
  - type: text
    content: ' So the people of Nineveh believed in God and proclaimed a fast and put on sackcloth [in penitent mourning], from the greatest of them even to the least of them.'
  '6':
  - type: text
    content: ' For word came to the king of Nineveh [of all that had happened to Jonah, and his terrifying message from God], and he arose from his throne and he laid his robe aside, covered himself with sackcloth, and sat in ashes.'
  '7':
  - type: text
    content: ' And he made proclamation and published through Nineveh, By the decree of the king and his nobles: Let neither man nor beast, herd nor flock, taste anything; let them not feed nor drink water.'
  '8':
  - type: text
    content: ' But let man and beast be covered with sackcloth and let them cry mightily to God. Yes, let every one turn from his evil way and from the violence that is in his hands.'
  '9':
  - type: text
    content: ' Who can tell, God may turn and revoke His sentence against us [when we have met His terms], and turn away from His fierce anger so that we perish not. [Joel 2:13, 14.]'
