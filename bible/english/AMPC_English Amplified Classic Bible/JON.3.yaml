document_id: JON.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE word of the Lord came to Jonah the second time, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Arise, go to Nineveh, that great city, and preach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cry out to it the preaching that I tell you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So Jonah arose and went to Nineveh according to the word of the Lord. Now Nineveh was an exceedingly great city of three days'' journey [sixty miles in circumference].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Jonah began to enter into the city a day''s journey, and he cried, Yet forty days and Nineveh shall be overthrown!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So the people of Nineveh believed in God and proclaimed a fast and put on sackcloth [in penitent mourning], from the greatest of them even to the least of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For word came to the king of Nineveh [of all that had happened to Jonah, and his terrifying message from God], and he arose from his throne and he laid his robe aside, covered himself with sackcloth, and sat in ashes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he made proclamation and published through Nineveh, By the decree of the king and his nobles: Let neither man nor beast, herd nor flock, taste anything; let them not feed nor drink water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But let man and beast be covered with sackcloth and let them cry mightily to God. Yes, let every one turn from his evil way and from the violence that is in his hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Who can tell, God may turn and revoke His sentence against us [when we have met His terms], and turn away from His fierce anger so that we perish not. [Joel 2:13, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And God saw their works, that they turned from their evil way; and God revoked His [sentence of] evil that He had said that He would do to them and He did not do it [for He was comforted and eased concerning them].'
