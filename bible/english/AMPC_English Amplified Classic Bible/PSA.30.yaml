document_id: PSA.30,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm; a Song at the Dedication of the Temple. +[A Psalm+] of David.
  - type: text
    content: ' I WILL extol You, O Lord, for You have lifted me up and have not let my foes rejoice over me.'
  '10':
  - type: text
    content: ' Hear, O Lord, have mercy '
  - type: text
    content: and
  - type: text
    content: ' be gracious to me! O Lord, be my helper!'
  '11':
  - type: text
    content: ' You have turned my mourning into dancing for me; You have put off my sackcloth and girded me with gladness,'
  '12':
  - type: text
    content: ' To the end that my tongue '
  - type: text
    content: and
  - type: text
    content: ' my heart '
  - type: text
    content: and
  - type: text
    content: ' everything glorious within me may sing praise to You and not be silent. O Lord my God, I will give thanks to You forever.'
  '2':
  - type: text
    content: ' O Lord my God, I cried to You and You have healed me.'
  '3':
  - type: text
    content: ' O Lord, You have brought my life up from Sheol (the place of the dead); You have kept me alive, that I should not go down to the pit (the grave).'
  '4':
  - type: text
    content: ' Sing to the Lord, O you saints of His, and give thanks at the remembrance of His holy name.'
  '5':
  - type: text
    content: ' For His anger is but for a moment, but His favor is for a lifetime '
  - type: text
    content: or
  - type: text
    content: ' in His favor is life. Weeping may endure for a night, but joy comes in the morning. [II Cor. 4:17.]'
  '6':
  - type: text
    content: ' As for me, in my prosperity I said, I shall never be moved.'
  '7':
  - type: text
    content: ' By Your favor, O Lord, You have established me as a strong mountain; You hid Your face, and I was troubled.'
  '8':
  - type: text
    content: ' I cried to You, O Lord, and to the Lord I made supplication.'
  '9':
  - type: text
    content: ' What profit is there in my blood, when I go down to the pit (the grave)? Will the dust praise You? Will it declare Your truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness to men?'
