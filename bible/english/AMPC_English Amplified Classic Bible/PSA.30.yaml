document_id: PSA.30,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Psalm; a Song at the Dedication of the Temple. +[A Psalm+] of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' I WILL extol You, O Lord, for You have lifted me up and have not let my foes rejoice over me.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Hear, O Lord, have mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be gracious to me! O Lord, be my helper!'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' You have turned my mourning into dancing for me; You have put off my sackcloth and girded me with gladness,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' To the end that my tongue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' everything glorious within me may sing praise to You and not be silent. O Lord my God, I will give thanks to You forever.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' O Lord my God, I cried to You and You have healed me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' O Lord, You have brought my life up from Sheol (the place of the dead); You have kept me alive, that I should not go down to the pit (the grave).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Sing to the Lord, O you saints of His, and give thanks at the remembrance of His holy name.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For His anger is but for a moment, but His favor is for a lifetime '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' in His favor is life. Weeping may endure for a night, but joy comes in the morning. [II Cor. 4:17.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' As for me, in my prosperity I said, I shall never be moved.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' By Your favor, O Lord, You have established me as a strong mountain; You hid Your face, and I was troubled.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I cried to You, O Lord, and to the Lord I made supplication.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' What profit is there in my blood, when I go down to the pit (the grave)? Will the dust praise You? Will it declare Your truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness to men?'
