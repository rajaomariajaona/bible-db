document_id: LUK.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ONE SABBATH while Jesus was passing through the fields of standing grain, it occurred that His disciples picked some of the spikes and ate [of the grain], rubbing it out in their hands. [Deut. 23:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But some of the Pharisees asked them, Why are you doing what is not permitted to be done on the Sabbath days? [Exod. 20:10; 23:12; Deut. 5:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Jesus replied to them, saying, Have you never so much as read what David did when he was hungry, he and those who were with him?–[I Sam. 21:1-6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' How he went into the house of God and took and ate the [sacred] loaves of the showbread, which it is not permitted for any except only the priests to eat, and also gave to those [who were] with him? [Lev. 24:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And He said to them, The Son of Man is Lord even of the Sabbath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And it occurred on another Sabbath that when He went into the synagogue and taught, a man was present whose right hand was withered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the scribes and the Pharisees kept watching Jesus to see whether He would [actually] heal on the Sabbath, in order that they might get [some ground for] accusation against Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But He was aware all along of their thoughts, and He said to the man with the withered hand, Come and stand here in the midst. And he arose and stood there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Jesus said to them, I ask you, is it lawful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right on the Sabbath to do good [so that someone derives advantage from it] or to do evil, to save a life [and make a soul safe] or to destroy it?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then He glanced around at them all and said to the man, Stretch out your hand! And he did so, and his hand was fully restored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like the other one.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But they were filled with lack of understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' senseless rage and discussed (consulted) with one another what they might do to Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now in those days it occurred that He went up into a mountain to pray, and spent the whole night in prayer to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And when it was day, He summoned His disciples and selected from them twelve, whom He named apostles (special messengers):'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' They were Simon, whom He named Peter, and his brother Andrew; and James and John; and Philip and Bartholomew;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Matthew and Thomas; and James son of Alphaeus, and Simon who was called the Zealot,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And Judas son of James, and Judas Iscariot, who became a traitor (a treacherous, basely faithless person).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Jesus came down with them and took His stand on a level spot, with a great crowd of His disciples and a vast throng of people from all over Judea and Jerusalem and the seacoast of Tyre and Sidon, who came to listen to Him and to be cured of their diseases–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Even those who were disturbed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubled with unclean spirits, and they were being healed [also].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And all the multitude were seeking to touch Him, for healing power was all the while going forth from Him and curing them all [saving them from severe illnesses or calamities].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And solemnly lifting up His eyes on His disciples, He said: Blessed (happy–with life-joy and satisfaction in God''s favor and salvation, apart from your outward condition–and to be envied) are you poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lowly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflicted (destitute of wealth, influence, position, and honor), for the kingdom of God is yours!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Blessed (happy–with life-joy and satisfaction in God''s favor and salvation, apart from your outward condition–and to be envied) are you who hunger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seek with eager desire now, for you shall be filled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' completely satisfied! Blessed (happy–with life-joy and satisfaction in God''s favor and salvation, apart from your outward condition–and to be envied) are you who weep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sob now, for you shall laugh!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Blessed (happy–with life-joy and satisfaction in God''s favor and salvation, apart from your outward condition–and to be envied) are you when people despise (hate) you, and when they exclude '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excommunicate you [as disreputable] and revile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' denounce you and defame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cast out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spurn your name as evil (wicked) on account of the Son of Man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Rejoice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be glad at such a time and exult '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leap for joy, for behold, your reward is rich '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abundant in heaven; for even so their forefathers treated the prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But woe to (alas for) you who are rich (abounding in material resources), for you already are receiving your consolation (the solace and sense of strengthening and cheer that come from prosperity) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have taken and enjoyed your comfort in full [having nothing left to be awarded you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Woe to (alas for) you who are full now (completely filled, luxuriously gorged and satiated), for you shall hunger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer want! Woe to (alas for) you who laugh now, for you shall mourn and weep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wail!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Woe to (alas for) you when everyone speaks fairly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' handsomely of you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praises you, for even so their forefathers did to the false prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But I say to you who are listening now to Me: [in order to heed, make it a practice to] love your enemies, treat well (do good to, act nobly toward) those who detest you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pursue you with hatred,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Invoke blessings upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pray for the happiness of those who curse you, implore God''s blessing (favor) upon those who abuse you [who revile, reproach, disparage, and high-handedly misuse you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' To the one who strikes you on the jaw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cheek, offer the other jaw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cheek also; and from him who takes away your outer garment, do not withhold your undergarment as well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Give away to everyone who begs of you [who is in want of necessities], and of him who takes away from you your goods, do not demand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' require them back again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And as you would like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desire that men would do to you, do exactly so to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' If you [merely] love those who love you, what quality of credit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanks is that to you? For even the [very] sinners love their lovers (those who love them).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And if you are kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do favors to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' benefit those who are kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do favors to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' benefit you, what quality of credit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanks is that to you? For even the preeminently sinful do the same.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And if you lend money at interest to those from whom you hope to receive, what quality of credit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanks is that to you? Even notorious sinners lend money at interest to sinners, so as to recover as much again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' But love your enemies and be kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do good [doing favors so that someone derives benefit from them] and lend, expecting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hoping for nothing in return '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' considering nothing as lost '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despairing of no one; and then your recompense (your reward) will be great (rich, strong, intense, and abundant), and you will be sons of the Most High, for He is kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' charitable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good to the ungrateful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the selfish and wicked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' So be merciful (sympathetic, tender, responsive, and compassionate) even as your Father is [all these].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Judge not [neither pronouncing judgment nor subjecting to censure], and you will not be judged; do not condemn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pronounce guilty, and you will not be condemned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pronounced guilty; acquit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forgive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' release (give up resentment, let it drop), and you will be acquitted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forgiven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' released.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Give, and [gifts] will be given to you; good measure, pressed down, shaken together, and running over, will they pour into [the pouch formed by] the bosom [of your robe and used as a bag]. For with the measure you deal out [with the measure you use when you confer benefits on others], it will be measured back to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' He further told them a proverb: Can a blind [man] guide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' direct a blind [man]? Will they not both stumble into a ditch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a hole in the ground?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' A pupil is not superior to his teacher, but everyone [when he is] completely trained (readjusted, restored, set to rights, and perfected) will be like his teacher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Why do you see the speck that is in your brother''s eye but do not notice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' consider the beam [of timber] that is in your own eye?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Or how can you say to your brother, Brother, allow me to take out the speck that is in your eye, when you yourself do not see the beam that is in your own eye? You actor (pretender, hypocrite)! First take the beam out of your own eye, and then you will see clearly to take out the speck that is in your brother''s eye.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' For there is no good (healthy) tree that bears decayed (worthless, stale) fruit, nor on the other hand does a decayed (worthless, sickly) tree bear good fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' For each tree is known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' identified by its own fruit; for figs are not gathered from thornbushes, nor is a cluster of grapes picked from a bramblebush.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' The upright (honorable, intrinsically good) man out of the good treasure [stored] in his heart produces what is upright (honorable and intrinsically good), and the evil man out of the evil storehouse brings forth that which is depraved (wicked and intrinsically evil); for out of the abundance (overflow) of the heart his mouth speaks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Why do you call Me, Lord, Lord, and do not [practice] what I tell you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' For everyone who comes to Me and listens to My words [in order to heed their teaching] and does them, I will show you what he is like:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' He is like a man building a house, who dug and went down deep and laid a foundation upon the rock; and when a flood arose, the torrent broke against that house and could not shake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' move it, because it had been securely built '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or founded on a rock
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' But he who merely hears and does not practice doing My words is like a man who built a house on the ground without a foundation, against which the torrent burst, and immediately it collapsed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
