verses:
  '1':
  - type: text
    content: ' ONE SABBATH while Jesus was passing through the fields of standing grain, it occurred that His disciples picked some of the spikes and ate [of the grain], rubbing it out in their hands. [Deut. 23:25.]'
  '10':
  - type: text
    content: ' Then He glanced around at them all and said to the man, Stretch out your hand! And he did so, and his hand was fully restored '
  - type: text
    content: like the other one.
  '11':
  - type: text
    content: ' But they were filled with lack of understanding '
  - type: text
    content: and
  - type: text
    content: ' senseless rage and discussed (consulted) with one another what they might do to Jesus.'
  '12':
  - type: text
    content: ' Now in those days it occurred that He went up into a mountain to pray, and spent the whole night in prayer to God.'
  '13':
  - type: text
    content: ' And when it was day, He summoned His disciples and selected from them twelve, whom He named apostles (special messengers):'
  '14':
  - type: text
    content: ' They were Simon, whom He named Peter, and his brother Andrew; and James and John; and Philip and Bartholomew;'
  '15':
  - type: text
    content: ' And Matthew and Thomas; and James son of Alphaeus, and Simon who was called the Zealot,'
  '16':
  - type: text
    content: ' And Judas son of James, and Judas Iscariot, who became a traitor (a treacherous, basely faithless person).'
  '17':
  - type: text
    content: ' And Jesus came down with them and took His stand on a level spot, with a great crowd of His disciples and a vast throng of people from all over Judea and Jerusalem and the seacoast of Tyre and Sidon, who came to listen to Him and to be cured of their diseases–'
  '18':
  - type: text
    content: ' Even those who were disturbed '
  - type: text
    content: and
  - type: text
    content: ' troubled with unclean spirits, and they were being healed [also].'
  '19':
  - type: text
    content: ' And all the multitude were seeking to touch Him, for healing power was all the while going forth from Him and curing them all [saving them from severe illnesses or calamities].'
  '2':
  - type: text
    content: ' But some of the Pharisees asked them, Why are you doing what is not permitted to be done on the Sabbath days? [Exod. 20:10; 23:12; Deut. 5:14.]'
  '20':
  - type: text
    content: ' And solemnly lifting up His eyes on His disciples, He said: Blessed (happy–with life-joy and satisfaction in God''s favor and salvation, apart from your outward condition–and to be envied) are you poor '
  - type: text
    content: and
  - type: text
    content: ' lowly '
  - type: text
    content: and
  - type: text
    content: ' afflicted (destitute of wealth, influence, position, and honor), for the kingdom of God is yours!'
  '21':
  - type: text
    content: ' Blessed (happy–with life-joy and satisfaction in God''s favor and salvation, apart from your outward condition–and to be envied) are you who hunger '
  - type: text
    content: and
  - type: text
    content: ' seek with eager desire now, for you shall be filled '
  - type: text
    content: and
  - type: text
    content: ' completely satisfied! Blessed (happy–with life-joy and satisfaction in God''s favor and salvation, apart from your outward condition–and to be envied) are you who weep '
  - type: text
    content: and
  - type: text
    content: ' sob now, for you shall laugh!'
  '22':
  - type: text
    content: ' Blessed (happy–with life-joy and satisfaction in God''s favor and salvation, apart from your outward condition–and to be envied) are you when people despise (hate) you, and when they exclude '
  - type: text
    content: and
  - type: text
    content: ' excommunicate you [as disreputable] and revile '
  - type: text
    content: and
  - type: text
    content: ' denounce you and defame '
  - type: text
    content: and
  - type: text
    content: ' cast out '
  - type: text
    content: and
  - type: text
    content: ' spurn your name as evil (wicked) on account of the Son of Man.'
  '23':
  - type: text
    content: ' Rejoice '
  - type: text
    content: and
  - type: text
    content: ' be glad at such a time and exult '
  - type: text
    content: and
  - type: text
    content: ' leap for joy, for behold, your reward is rich '
  - type: text
