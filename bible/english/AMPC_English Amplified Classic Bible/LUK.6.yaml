  - type: text
    content: and
  - type: text
    content: ' pray for the happiness of those who curse you, implore God''s blessing (favor) upon those who abuse you [who revile, reproach, disparage, and high-handedly misuse you].'
  '29':
  - type: text
    content: ' To the one who strikes you on the jaw '
  - type: text
    content: or
  - type: text
    content: ' cheek, offer the other jaw '
  - type: text
    content: or
  - type: text
    content: ' cheek also; and from him who takes away your outer garment, do not withhold your undergarment as well.'
  '3':
  - type: text
    content: ' And Jesus replied to them, saying, Have you never so much as read what David did when he was hungry, he and those who were with him?–[I Sam. 21:1-6.]'
  '30':
  - type: text
    content: ' Give away to everyone who begs of you [who is in want of necessities], and of him who takes away from you your goods, do not demand '
  - type: text
    content: or
  - type: text
    content: ' require them back again.'
  '31':
  - type: text
    content: ' And as you would like '
  - type: text
    content: and
  - type: text
    content: ' desire that men would do to you, do exactly so to them.'
  '32':
