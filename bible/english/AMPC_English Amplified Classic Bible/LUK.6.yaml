  '24':
  - type: text
    content: ' But woe to (alas for) you who are rich (abounding in material resources), for you already are receiving your consolation (the solace and sense of strengthening and cheer that come from prosperity) '
  - type: text
    content: and
  - type: text
    content: ' have taken and enjoyed your comfort in full [having nothing left to be awarded you].'
  '25':
  - type: text
    content: ' Woe to (alas for) you who are full now (completely filled, luxuriously gorged and satiated), for you shall hunger '
  - type: text
    content: and
  - type: text
    content: ' suffer want! Woe to (alas for) you who laugh now, for you shall mourn and weep '
  - type: text
