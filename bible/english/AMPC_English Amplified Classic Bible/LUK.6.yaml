  '27':
  - type: text
    content: ' But I say to you who are listening now to Me: [in order to heed, make it a practice to] love your enemies, treat well (do good to, act nobly toward) those who detest you '
  - type: text
    content: and
  - type: text
    content: ' pursue you with hatred,'
  '28':
