  - type: text
    content: ' released.'
  '38':
  - type: text
    content: ' Give, and [gifts] will be given to you; good measure, pressed down, shaken together, and running over, will they pour into [the pouch formed by] the bosom [of your robe and used as a bag]. For with the measure you deal out [with the measure you use when you confer benefits on others], it will be measured back to you.'
  '39':
  - type: text
    content: ' He further told them a proverb: Can a blind [man] guide '
  - type: text
    content: and
  - type: text
    content: ' direct a blind [man]? Will they not both stumble into a ditch '
  - type: text
    content: or
  - type: text
    content: ' a hole in the ground?'
  '4':
  - type: text
    content: ' How he went into the house of God and took and ate the [sacred] loaves of the showbread, which it is not permitted for any except only the priests to eat, and also gave to those [who were] with him? [Lev. 24:9.]'
  '40':
  - type: text
    content: ' A pupil is not superior to his teacher, but everyone [when he is] completely trained (readjusted, restored, set to rights, and perfected) will be like his teacher.'
  '41':
  - type: text
    content: ' Why do you see the speck that is in your brother''s eye but do not notice '
  - type: text
    content: or
  - type: text
    content: ' consider the beam [of timber] that is in your own eye?'
  '42':
  - type: text
    content: ' Or how can you say to your brother, Brother, allow me to take out the speck that is in your eye, when you yourself do not see the beam that is in your own eye? You actor (pretender, hypocrite)! First take the beam out of your own eye, and then you will see clearly to take out the speck that is in your brother''s eye.'
  '43':
  - type: text
    content: ' For there is no good (healthy) tree that bears decayed (worthless, stale) fruit, nor on the other hand does a decayed (worthless, sickly) tree bear good fruit.'
  '44':
  - type: text
    content: ' For each tree is known '
  - type: text
    content: and
  - type: text
    content: ' identified by its own fruit; for figs are not gathered from thornbushes, nor is a cluster of grapes picked from a bramblebush.'
  '45':
  - type: text
    content: ' The upright (honorable, intrinsically good) man out of the good treasure [stored] in his heart produces what is upright (honorable and intrinsically good), and the evil man out of the evil storehouse brings forth that which is depraved (wicked and intrinsically evil); for out of the abundance (overflow) of the heart his mouth speaks.'
  '46':
  - type: text
    content: ' Why do you call Me, Lord, Lord, and do not [practice] what I tell you?'
  '47':
  - type: text
    content: ' For everyone who comes to Me and listens to My words [in order to heed their teaching] and does them, I will show you what he is like:'
  '48':
  - type: text
    content: ' He is like a man building a house, who dug and went down deep and laid a foundation upon the rock; and when a flood arose, the torrent broke against that house and could not shake '
  - type: text
    content: or
  - type: text
    content: ' move it, because it had been securely built '
  - type: text
    content: or founded on a rock
  - type: text
    content: .
  '49':
  - type: text
    content: ' But he who merely hears and does not practice doing My words is like a man who built a house on the ground without a foundation, against which the torrent burst, and immediately it collapsed '
  - type: text
    content: and
  - type: text
    content: ' fell, and the breaking '
  - type: text
    content: and
  - type: text
    content: ' ruin of that house was great.'
  '5':
  - type: text
    content: ' And He said to them, The Son of Man is Lord even of the Sabbath.'
  '6':
  - type: text
    content: ' And it occurred on another Sabbath that when He went into the synagogue and taught, a man was present whose right hand was withered.'
  '7':
  - type: text
    content: ' And the scribes and the Pharisees kept watching Jesus to see whether He would [actually] heal on the Sabbath, in order that they might get [some ground for] accusation against Him.'
  '8':
  - type: text
    content: ' But He was aware all along of their thoughts, and He said to the man with the withered hand, Come and stand here in the midst. And he arose and stood there.'
  '9':
  - type: text
    content: ' Then Jesus said to them, I ask you, is it lawful '
  - type: text
    content: and
  - type: text
