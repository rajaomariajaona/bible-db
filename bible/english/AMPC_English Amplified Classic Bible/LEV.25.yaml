document_id: LEV.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses on Mount Sinai,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Say to the Israelites, When you come into the land which I give you, then shall the land keep a sabbath to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For six years you shall sow your field, and for six years you shall prune your vineyard and gather in its fruits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But in the seventh year there shall be a sabbath of solemn rest for the land, a sabbath to the Lord; you shall neither sow your field nor prune your vineyard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' What grows of itself in your harvest you shall not reap and the grapes on your uncultivated vine you shall not gather, for it is a year of rest to the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the sabbath rest of the [untilled] land shall [in its increase] furnish food for you, for your male and female slaves, your hired servant, and the temporary resident who lives with you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For your domestic animals also and for the [wild] beasts in your land; all its yield shall be for food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And you shall number seven sabbaths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' weeks of years for you, seven times seven years, so the total time of the seven weeks of years shall be forty-nine years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then you shall sound abroad the loud trumpet on the tenth day of the seventh month [almost October]; on the Day of Atonement blow the trumpet in all your land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And you shall hallow the fiftieth year and proclaim liberty throughout all the land to all its inhabitants. It shall be a jubilee for you; and each of you shall return to his ancestral possession [which through poverty he was compelled to sell], and each of you shall return to his family [from whom he was separated in bond service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' That fiftieth year shall be a jubilee for you; in it you shall not sow, or reap and store what grows of itself, or gather the grapes of the uncultivated vines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For it is a jubilee; it shall be holy to you; you shall eat the [sufficient] increase of it out of the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' In this Year of Jubilee each of you shall return to his ancestral property.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And if you sell anything to your neighbor or buy from your neighbor, you shall not wrong one another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' According to the number of years after the Jubilee, you shall buy from your neighbor. And he shall sell to you according to the number of years [remaining in which you may gather] the crops [before you must restore the property to him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' If the years [to the next Jubilee] are many, you may increase the price, and if the years remaining are few, you shall diminish the price, for the number of the crops is what he is selling to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You shall not oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrong one another, but you shall [reverently] fear your God. For I am the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Therefore you shall do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give effect to My statutes and keep My ordinances and perform them, and you will dwell in the land in safety.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The land shall yield its fruit; you shall eat your fill and dwell there in safety.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And if you say, What shall we eat in the seventh year if we are not to sow or gather in our increase?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then [this is My answer:] I will command My [special] blessings on you in the sixth year, so that it shall bring forth [sufficient] fruit for three years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And you shall sow in the eighth year, but eat of the old store of produce; until the crops of the ninth year come in you shall eat of the old supply.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The land shall not be sold into perpetual ownership, for the land is Mine; you are [only] strangers and temporary residents with Me. [Heb. 11:13; I Pet. 2:11-17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And in all the country you possess you shall grant a redemption for the land [in the Year of Jubilee].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' If your brother has become poor and has sold some of his property, if any of his kin comes to redeem it, he shall [be allowed to] redeem what his brother has sold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And if the man has no one to redeem his property, and he himself has become more prosperous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has enough to redeem it,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then let him count the years since he sold it and restore the overpayment to the man to whom he sold it, and return to his ancestral possession. [I Kings 21:2, 3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But if he is unable to redeem it, it shall remain in the buyer''s possession until the Year of Jubilee, when it shall be set free and he may return to it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' If a man sells a dwelling house in a fortified city, he may redeem it within a whole year after it is sold; for a full year he may have the right of redemption.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And if it is not redeemed within a full year, then the house that is in the fortified city shall be made sure, permanently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without limitations, for him who bought it, throughout his generations. It shall not go free in the Year of Jubilee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But the houses of the unwalled villages shall be counted with the fields of the country. They may be redeemed, and they shall go free in the Year of Jubilee.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Nevertheless, the cities of the Levites, the houses in the cities of their possession, the Levites may redeem at any time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' But if a house is not redeemed by a Levite, the sold house in the city they possess shall go free in the Year of Jubilee, for the houses in the Levite cities are their ancestral possession among the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But the field of unenclosed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pasture lands of their cities may not be sold; it is their perpetual possession.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And if your [Israelite] brother has become poor and his hand wavers [from poverty, sickness, or age and he is unable to support himself], then you shall uphold (strengthen, relieve) him, [treating him with the courtesy and consideration that you would] a stranger or a temporary resident with you [without property], so that he may live [along] with you. [I John 3:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Charge him no interest or [portion of] increase, but fear your God, so your brother may [continue to] live along with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' You shall not give him your money at interest nor lend him food at a profit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' I am the Lord your God, Who brought you forth out of the land of Egypt to give you the land of Canaan and to be your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And if your brother becomes poor beside you and sells himself to you, you shall not compel him to serve as a bondman (a slave not eligible for redemption),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' But as a hired servant and as a temporary resident he shall be with you; he shall serve you till the Year of Jubilee,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And then he shall depart from you, he and his children with him, and shall go back to his own family and return to the possession of his fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' For the Israelites are My servants; I brought them out of the land of Egypt; they shall not be sold as bondmen. [I Cor. 7:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' You shall not rule over him with harshness (severity, oppression), but you shall [reverently] fear your God. [Eph. 6:9; Col. 4:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' As for your bondmen and your bondmaids whom you may have, they shall be from the nations round about you, of whom you may buy bondmen and bondmaids.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Moreover, of the children of the strangers who sojourn among you, of them you may buy and of their families that are with you which they have begotten in your land, and they shall be your possession.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And you shall make them an inheritance for your children after you, to hold for a possession; of them shall you take your bondmen always, but over your brethren the Israelites you shall not rule one over another with harshness (severity, oppression).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And if a sojourner or stranger with you becomes rich and your [Israelite] brother becomes poor beside him and sells himself to the stranger or sojourner with you or to a member of the stranger''s family,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' After he is sold he may be redeemed. One of his brethren may redeem him:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' Either his uncle or his uncle''s son may redeem him, or a near kinsman may redeem him; or if he has enough '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is able, he may redeem himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' And [the redeemer] shall reckon with the purchaser of the servant from the year when he sold himself to the purchaser to the Year of Jubilee, and the price of his release shall be adjusted according to the number of years. The time he was with his owner shall be counted as that of a hired servant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' If there remain many years [before the Year of Jubilee], in proportion to them he must refund [to the purchaser] for his release [the overpayment] for his acquisition.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' And if little time remains until the Year of Jubilee, he shall count it over with him and he shall refund the proportionate amount for his release.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' And as a servant hired year by year shall he deal with him; he shall not rule over him with harshness (severity, oppression) in your sight [make sure of that].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' And if he is not redeemed during these years '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by these means, then he shall go free in the Year of Jubilee, he and his children with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' For to Me the Israelites are servants, My servants, whom I brought forth out of the land of Egypt. I am the Lord your God.'
