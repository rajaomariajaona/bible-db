document_id: 2CH.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN SOLOMON began to build the house of the Lord at Jerusalem on Mount Moriah, where the Lord appeared to David his father, in the place that David had appointed, on the threshing floor of Ornan the Jebusite. [I Chron. 21:20-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Solomon began to build on the second day of the second month in the fourth year of his reign.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Now these are the measurements for the foundations which Solomon laid for the house of God. The length in cubits by the former measure was sixty cubits, and the breadth twenty cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The porch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vestibule across the front of the house was the same length as the house''s breadth, twenty cubits, and the height 120 cubits. He overlaid it inside with pure gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the greater house (the Holy Place) he lined with cypress and overlaid it with fine gold and made palm trees and chains on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he adorned the house with precious stones for beauty; and the gold was gold of Parvaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He lined the house (the Holy Place), its beams, thresholds, walls, and doors with gold, and engraved cherubim on the walls.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He made the Most Holy Place, its length equaling the breadth of the house, twenty cubits, and its breadth twenty cubits; he overlaid it with 600 talents of fine gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The weight of the nails was fifty shekels of gold. And he lined the upper chambers with gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And in the Most Holy Place he made two cherubim of image work, and they were overlaid with gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the wings of the cherubim [combined] extended twenty cubits: one wing of one cherub was five cubits, reaching to the wall of the house, and its other wing of five cubits touched the other cherub''s wing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And of the other cherub one wing of five cubits touched the wall of the house, and the other wing, also five cubits, joined the wing of the first cherub.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The wings of these cherubim extended twenty cubits; the cherubim stood on their feet, their faces toward the Holy Place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he made the veil [between the Holy Place and the Most Holy Place] of blue, purple, and crimson colors, and fine linen, and embroidered cherubim on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Before the house he made two pillars, 35 cubits high, with a capital on the top of each which was five cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He made chains like a necklace and put them on the heads of the pillars, and he made 100 pomegranates and put them on the chains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He erected the pillars before the temple, one on the right, the other on the left, and called the one on the right Jachin [he shall establish] and the one on the left Boaz [in it is strength].'
