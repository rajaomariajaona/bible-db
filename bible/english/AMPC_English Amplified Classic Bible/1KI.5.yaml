document_id: 1KI.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' HIRAM KING of Tyre sent his servants to Solomon, when he heard that he was anointed king in place of his father, for Hiram always loved David.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Hiram gave Solomon all the cedar and cypress trees he desired,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Solomon gave Hiram 20,000 measures of wheat for food for his household, and 20 measures of pure, beaten oil. He gave these to Hiram yearly.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord gave Solomon wisdom, as He promised him; and there was peace between Hiram and Solomon, and they made a treaty.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' King Solomon raised a levy [of forced labor] out of all Israel; and the levy was 30,000 men.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He sent them to Lebanon, 10,000 a month by divisions; one month they were in Lebanon and two months at home. Adoniram was over the levy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Solomon had 70,000 burden bearers and 80,000 hewers [of stone] in the hill country of Judah,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Besides Solomon''s 3,300 overseers in charge of the people doing the work.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The king commanded, and they hewed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brought out great, costly stones in order to lay the foundation of the house with dressed stone.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Solomon''s builders and Hiram''s builders and the men of Gebal did the hewing and prepared the timber and stones to build the house.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Solomon sent to Hiram, saying,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You know how David my father could not build a house to the Name of the Lord his God because wars were about him on every side, until the Lord put his foes under his feet. [II Sam. 7:4ff.; I Chron. 22:8.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But now the Lord my God has given me rest on every side, so that there is neither adversary nor evil confronting me.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I purpose to build a house to the Name of the Lord my God, as the Lord said to David my father, Your son whom I will set on your throne in your place shall build the house to My Name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Presence.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So, Hiram, command them to hew me cedar trees out of Lebanon; my servants shall join yours, and I will give you whatever wages you set for your servants. For you know that no one among us can equal the skill of the Sidon men in cutting timber.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Hiram heard the words of Solomon, he rejoiced greatly and said, Blessed be the Lord this day, Who has given David a wise son to be over this great people.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Hiram sent to Solomon, saying, I have considered the things for which you sent to me; I will do all you wish concerning the cedar and cypress timber.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My servants shall bring the logs down from Lebanon to the sea, make them into rafts, and float them by sea to the place that you direct. I will have them released there, and you shall take them away. And you shall fulfill my desire by providing food for my household.'
