document_id: 1TI.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PAUL, AN apostle (special messenger) of Christ Jesus by appointment '
  - type: text
    content: and
  - type: text
    content: ' command of God our Savior and of Christ Jesus (the Messiah), our Hope,'
  '10':
  - type: text
    content: ' [For] impure '
  - type: text
    content: and
  - type: text
    content: ' immoral persons, those who abuse themselves with men, kidnapers, liars, perjurers–and whatever else is opposed to wholesome teaching '
  - type: text
    content: and
  - type: text
    content: ' sound doctrine'
  '11':
  - type: text
    content: ' As laid down by the glorious Gospel of the blessed God, with which I have been entrusted.'
  '12':
  - type: text
    content: ' I give thanks to Him Who has granted me [the needed] strength '
  - type: text
    content: and
  - type: text
    content: ' made me able [for this], Christ Jesus our Lord, because He has judged '
  - type: text
    content: and
  - type: text
    content: ' counted me faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy, appointing me to [this stewardship of] the ministry.'
  '13':
  - type: text
    content: ' Though I formerly blasphemed and persecuted and was shamefully '
  - type: text
    content: and
  - type: text
    content: ' outrageously '
  - type: text
    content: and
  - type: text
    content: ' aggressively insulting [to Him], nevertheless, I obtained mercy because I had acted out of ignorance in unbelief.'
  '14':
  - type: text
    content: ' And the grace (unmerited favor and blessing) of our Lord [actually] flowed out superabundantly '
  - type: text
    content: and
  - type: text
    content: ' beyond measure for me, accompanied by faith and love that are [to be realized] in Christ Jesus.'
  '15':
  - type: text
    content: ' The saying is sure '
  - type: text
    content: and
  - type: text
    content: ' true and worthy of full '
  - type: text
    content: and
  - type: text
    content: ' universal acceptance, that Christ Jesus (the Messiah) came into the world to save sinners, of whom I am foremost.'
  '16':
  - type: text
    content: ' But I obtained mercy for the reason that in me, as the foremost [of sinners], Jesus Christ might show forth '
  - type: text
    content: and
  - type: text
    content: ' display all His perfect long-suffering '
  - type: text
    content: and
  - type: text
    content: ' patience for an example to [encourage] those who would thereafter believe on Him for [the gaining of] eternal life.'
  '17':
  - type: text
    content: ' Now to the King of eternity, incorruptible '
  - type: text
    content: and
  - type: text
    content: ' immortal, invisible, the only God, be honor and glory forever and ever (to the ages of ages). Amen (so be it).'
  '18':
  - type: text
    content: ' This charge '
  - type: text
    content: and
  - type: text
    content: ' admonition I commit in trust to you, Timothy, my son, in accordance with prophetic intimations which I formerly received concerning you, so that inspired '
  - type: text
    content: and
  - type: text
    content: ' aided by them you may wage the good warfare,'
  '19':
  - type: text
    content: ' Holding fast to faith (that leaning of the entire human personality on God in absolute trust and confidence) and having a good (clear) conscience. By rejecting '
  - type: text
    content: and
  - type: text
    content: ' thrusting from them [their conscience], some individuals have made shipwreck of their faith.'
  '2':
  - type: text
    content: ' To Timothy, my true son in the faith: Grace (spiritual blessing and favor), mercy, and [heart] peace [be yours] from God the Father and Christ Jesus our Lord.'
  '20':
  - type: text
    content: ' Among them are Hymenaeus and Alexander, whom I have delivered to Satan in order that they may be disciplined [by punishment and learn] not to blaspheme.'
  '3':
  - type: text
    content: ' As I urged you when I was on my way to Macedonia, stay on where you are at Ephesus in order that you may warn '
  - type: text
    content: and
  - type: text
    content: ' admonish '
  - type: text
    content: and
  - type: text
    content: ' charge certain individuals not to teach any different doctrine,'
  '4':
  - type: text
    content: ' Nor to give importance to '
  - type: text
    content: or
  - type: text
    content: ' occupy themselves with legends (fables, myths) and endless genealogies, which foster '
  - type: text
    content: and
  - type: text
    content: ' promote useless speculations '
  - type: text
    content: and
  - type: text
    content: ' questionings rather than acceptance in faith of God''s administration '
  - type: text
    content: and
  - type: text
    content: ' the divine training that is in faith (in that leaning of the entire human personality on God in absolute trust and confidence)–'
  '5':
  - type: text
    content: ' Whereas the object '
  - type: text
    content: and
  - type: text
    content: ' purpose of our instruction '
  - type: text
    content: and
  - type: text
    content: ' charge is love, which springs from a pure heart and a good (clear) conscience and sincere (unfeigned) faith.'
  '6':
  - type: text
    content: ' But certain individuals have missed the mark on this very matter [and] have wandered away into vain arguments '
  - type: text
    content: and
  - type: text
    content: ' discussions '
  - type: text
    content: and
  - type: text
    content: ' purposeless talk.'
  '7':
  - type: text
    content: ' They are ambitious to be doctors of the Law (teachers of the Mosaic ritual), but they have no understanding either of the words '
  - type: text
    content: and
  - type: text
    content: ' terms they use or of the subjects about which they make [such] dogmatic assertions.'
  '8':
  - type: text
    content: ' Now we recognize '
  - type: text
    content: and
  - type: text
    content: ' know that the Law is good if anyone uses it lawfully [for the purpose for which it was designed],'
  '9':
  - type: text
    content: ' Knowing '
  - type: text
    content: and
  - type: text
    content: ' understanding this: that the Law is not enacted for the righteous (the upright and just, who are in right standing with God), but for the lawless and unruly, for the ungodly and sinful, for the irreverent and profane, for those who strike '
  - type: text
    content: and
  - type: text
    content: ' beat '
  - type: text
    content: and
  - type: text
    content: ' [even] murder fathers and strike '
  - type: text
    content: and
  - type: text
    content: ' beat '
  - type: text
    content: and
  - type: text
    content: ' [even] murder mothers, for manslayers,'
