document_id: 1TI.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' PAUL, AN apostle (special messenger) of Christ Jesus by appointment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' command of God our Savior and of Christ Jesus (the Messiah), our Hope,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' [For] impure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' immoral persons, those who abuse themselves with men, kidnapers, liars, perjurers–and whatever else is opposed to wholesome teaching '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sound doctrine'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' As laid down by the glorious Gospel of the blessed God, with which I have been entrusted.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' I give thanks to Him Who has granted me [the needed] strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made me able [for this], Christ Jesus our Lord, because He has judged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counted me faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy, appointing me to [this stewardship of] the ministry.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Though I formerly blasphemed and persecuted and was shamefully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' outrageously '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' aggressively insulting [to Him], nevertheless, I obtained mercy because I had acted out of ignorance in unbelief.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And the grace (unmerited favor and blessing) of our Lord [actually] flowed out superabundantly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beyond measure for me, accompanied by faith and love that are [to be realized] in Christ Jesus.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' The saying is sure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' true and worthy of full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' universal acceptance, that Christ Jesus (the Messiah) came into the world to save sinners, of whom I am foremost.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But I obtained mercy for the reason that in me, as the foremost [of sinners], Jesus Christ might show forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' display all His perfect long-suffering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' patience for an example to [encourage] those who would thereafter believe on Him for [the gaining of] eternal life.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Now to the King of eternity, incorruptible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' immortal, invisible, the only God, be honor and glory forever and ever (to the ages of ages). Amen (so be it).'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' This charge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' admonition I commit in trust to you, Timothy, my son, in accordance with prophetic intimations which I formerly received concerning you, so that inspired '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' aided by them you may wage the good warfare,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Holding fast to faith (that leaning of the entire human personality on God in absolute trust and confidence) and having a good (clear) conscience. By rejecting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thrusting from them [their conscience], some individuals have made shipwreck of their faith.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' To Timothy, my true son in the faith: Grace (spiritual blessing and favor), mercy, and [heart] peace [be yours] from God the Father and Christ Jesus our Lord.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Among them are Hymenaeus and Alexander, whom I have delivered to Satan in order that they may be disciplined [by punishment and learn] not to blaspheme.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' As I urged you when I was on my way to Macedonia, stay on where you are at Ephesus in order that you may warn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' admonish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' charge certain individuals not to teach any different doctrine,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Nor to give importance to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' occupy themselves with legends (fables, myths) and endless genealogies, which foster '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promote useless speculations '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' questionings rather than acceptance in faith of God''s administration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the divine training that is in faith (in that leaning of the entire human personality on God in absolute trust and confidence)–'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Whereas the object '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose of our instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' charge is love, which springs from a pure heart and a good (clear) conscience and sincere (unfeigned) faith.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But certain individuals have missed the mark on this very matter [and] have wandered away into vain arguments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discussions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purposeless talk.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' They are ambitious to be doctors of the Law (teachers of the Mosaic ritual), but they have no understanding either of the words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terms they use or of the subjects about which they make [such] dogmatic assertions.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Now we recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know that the Law is good if anyone uses it lawfully [for the purpose for which it was designed],'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Knowing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding this: that the Law is not enacted for the righteous (the upright and just, who are in right standing with God), but for the lawless and unruly, for the ungodly and sinful, for the irreverent and profane, for those who strike '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [even] murder fathers and strike '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [even] murder mothers, for manslayers,'
