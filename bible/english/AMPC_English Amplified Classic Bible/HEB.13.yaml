document_id: HEB.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' LET LOVE for your fellow believers continue '
  - type: text
    content: and
  - type: text
    content: ' be a fixed practice with you [never let it fail].'
  '10':
  - type: text
    content: ' We have an altar from which those who serve '
  - type: text
    content: and
  - type: text
    content: ' worship in the tabernacle have no right to eat.'
  '11':
  - type: text
    content: ' For when the blood of animals is brought into the sanctuary by the high priest as a sacrifice for sin, the victims'' bodies are burned outside the limits of the camp. [Lev. 16:27.]'
  '12':
  - type: text
    content: ' Therefore Jesus also suffered '
  - type: text
    content: and
  - type: text
    content: ' died outside the [city''s] gate in order that He might purify '
  - type: text
    content: and
  - type: text
    content: ' consecrate the people through [the shedding of] His own blood '
  - type: text
    content: and
  - type: text
    content: ' set them apart as holy [for God].'
  '13':
  - type: text
    content: ' Let us then go forth [from all that would prevent us] to Him outside the camp [at Calvary], bearing the contempt '
  - type: text
    content: and
  - type: text
    content: ' abuse '
  - type: text
    content: and
  - type: text
    content: ' shame with Him. [Lev. 16:27.]'
  '14':
  - type: text
    content: ' For here we have no permanent city, but we are looking for the one which is to come.'
  '15':
  - type: text
    content: ' Through Him, therefore, let us constantly '
  - type: text
    content: and
  - type: text
    content: ' at all times offer up to God a sacrifice of praise, which is the fruit of lips that thankfully acknowledge '
  - type: text
    content: and
  - type: text
    content: ' confess '
  - type: text
    content: and
  - type: text
    content: ' glorify His name. [Lev. 7:12; Isa. 57:19; Hos. 14:2.]'
  '16':
  - type: text
    content: ' Do not forget '
  - type: text
    content: or
  - type: text
    content: ' neglect to do kindness '
  - type: text
    content: and
  - type: text
    content: ' good, to be generous '
  - type: text
    content: and
  - type: text
    content: ' distribute '
  - type: text
    content: and
  - type: text
    content: ' contribute to the needy [of the church as embodiment and proof of fellowship], for such sacrifices are pleasing to God.'
  '17':
  - type: text
    content: ' Obey your spiritual leaders and submit to them [continually recognizing their authority over you], for they are constantly keeping watch over your souls '
  - type: text
    content: and
  - type: text
    content: ' guarding your spiritual welfare, as men who will have to render an account [of their trust]. [Do your part to] let them do this with gladness and not with sighing '
  - type: text
    content: and
  - type: text
    content: ' groaning, for that would not be profitable to you [either].'
  '18':
  - type: text
    content: ' Keep praying for us, for we are convinced that we have a good (clear) conscience, that we want to walk uprightly '
  - type: text
    content: and
  - type: text
    content: ' live a noble life, acting honorably '
  - type: text
    content: and
  - type: text
    content: ' in complete honesty in all things.'
  '19':
  - type: text
    content: ' And I beg of you [to pray for us] the more earnestly, in order that I may be restored to you the sooner.'
  '2':
  - type: text
    content: ' Do not forget '
  - type: text
    content: or
  - type: text
    content: ' neglect '
  - type: text
    content: or
  - type: text
    content: ' refuse to extend hospitality to strangers [in the brotherhood–being friendly, cordial, and gracious, sharing the comforts of your home and doing your part generously], for through it some have entertained angels without knowing it. [Gen. 18:1-8; 19:1-3.]'
  '20':
  - type: text
    content: ' Now may the God of peace [Who is the Author and the Giver of peace], Who brought again from among the dead our Lord Jesus, that great Shepherd of the sheep, by the blood [that sealed, ratified] the everlasting agreement (covenant, testament), [Isa. 55:3; 63:11; Ezek. 37:26; Zech. 9:11.]'
  '21':
  - type: text
    content: ' Strengthen (complete, perfect) '
  - type: text
    content: and
  - type: text
    content: ' make you what you ought to be '
  - type: text
    content: and
  - type: text
    content: ' equip you with everything good that you may carry out His will; [while He Himself] works in you '
  - type: text
    content: and
  - type: text
    content: ' accomplishes that which is pleasing in His sight, through Jesus Christ (the Messiah); to Whom be the glory forever and ever (to the ages of the ages). Amen (so be it).'
  '22':
  - type: text
    content: ' I call on you, brethren, to listen patiently '
  - type: text
    content: and
  - type: text
    content: ' bear with this message of exhortation '
  - type: text
    content: and
  - type: text
    content: ' admonition '
  - type: text
    content: and
  - type: text
    content: ' encouragement, for I have written to you briefly.'
  '23':
  - type: text
    content: ' Notice that our brother Timothy has been released [from prison]. If he comes here soon, I will see you along with him.'
  '24':
  - type: text
    content: ' Give our greetings to all of your spiritual leaders and to all of the saints (God''s consecrated believers). The Italian Christians send you their greetings [also].'
  '25':
  - type: text
    content: ' Grace (God''s favor and spiritual blessing) be with you all. '
  - type: text
    content: Amen (so be it).
  '3':
  - type: text
    content: ' Remember those who are in prison as if you were their fellow prisoner, and those who are ill-treated, since you also are liable to bodily sufferings.'
  '4':
  - type: text
    content: ' Let marriage be held in honor (esteemed worthy, precious, of great price, and especially dear) in all things. And thus let the marriage bed be undefiled (kept undishonored); for God will judge '
  - type: text
    content: and
  - type: text
    content: ' punish the unchaste [all guilty of sexual vice] and adulterous.'
  '5':
  - type: text
    content: ' Let your character '
  - type: text
    content: or
  - type: text
    content: ' moral disposition be free from love of money [including greed, avarice, lust, and craving for earthly possessions] and be satisfied with your present [circumstances and with what you have]; for He [God] Himself has said, I will not in any way fail you '
  - type: text
    content: nor
  - type: text
    content: ' give you up '
  - type: text
    content: nor
  - type: text
    content: ' leave you without support. [I will] not, [I will] not, [I will] not in any degree leave you helpless '
  - type: text
    content: nor
  - type: text
    content: ' forsake '
  - type: text
    content: nor
  - type: text
    content: ' let [you] down (relax My hold on you)! [Assuredly not!] [Josh. 1:5.]'
  '6':
  - type: text
    content: ' So we take comfort '
  - type: text
    content: and
  - type: text
    content: ' are encouraged '
  - type: text
    content: and
  - type: text
    content: ' confidently '
  - type: text
    content: and
  - type: text
    content: ' boldly say, The Lord is my Helper; I will not be seized with alarm [I will not fear or dread or be terrified]. What can man do to me? [Ps. 27:1;118:6.]'
  '7':
  - type: text
    content: ' Remember your leaders '
  - type: text
    content: and
  - type: text
    content: ' superiors in authority [for it was they] who brought to you the Word of God. Observe attentively '
  - type: text
    content: and
  - type: text
    content: ' consider their manner of living (the outcome of their well-spent lives) and imitate their faith (their conviction that God exists and is the Creator and Ruler of all things, the Provider and Bestower of eternal salvation through Christ, and their leaning of the entire human personality on God in absolute trust and confidence in His power, wisdom, and goodness).'
  '8':
  - type: text
    content: ' Jesus Christ (the Messiah) is [always] the same, yesterday, today, [yes] and forever (to the ages).'
  '9':
  - type: text
    content: ' Do not be carried about by different '
  - type: text
    content: and
  - type: text
    content: ' varied and alien teachings; for it is good for the heart to be established '
  - type: text
    content: and
  - type: text
    content: ' ennobled '
  - type: text
    content: and
  - type: text
    content: ' strengthened by means of grace (God''s favor and spiritual blessing) and not [to be devoted to] foods [rules of diet and ritualistic meals], which bring no [spiritual] benefit '
  - type: text
    content: or
  - type: text
    content: ' profit to those who observe them.'
