document_id: HEB.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' LET LOVE for your fellow believers continue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be a fixed practice with you [never let it fail].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Do not forget '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' neglect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' refuse to extend hospitality to strangers [in the brotherhood–being friendly, cordial, and gracious, sharing the comforts of your home and doing your part generously], for through it some have entertained angels without knowing it. [Gen. 18:1-8; 19:1-3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Remember those who are in prison as if you were their fellow prisoner, and those who are ill-treated, since you also are liable to bodily sufferings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Let marriage be held in honor (esteemed worthy, precious, of great price, and especially dear) in all things. And thus let the marriage bed be undefiled (kept undishonored); for God will judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish the unchaste [all guilty of sexual vice] and adulterous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Let your character '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' moral disposition be free from love of money [including greed, avarice, lust, and craving for earthly possessions] and be satisfied with your present [circumstances and with what you have]; for He [God] Himself has said, I will not in any way fail you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' give you up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' leave you without support. [I will] not, [I will] not, [I will] not in any degree leave you helpless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' forsake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' let [you] down (relax My hold on you)! [Assuredly not!] [Josh. 1:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So we take comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are encouraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boldly say, The Lord is my Helper; I will not be seized with alarm [I will not fear or dread or be terrified]. What can man do to me? [Ps. 27:1;118:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Remember your leaders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' superiors in authority [for it was they] who brought to you the Word of God. Observe attentively '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider their manner of living (the outcome of their well-spent lives) and imitate their faith (their conviction that God exists and is the Creator and Ruler of all things, the Provider and Bestower of eternal salvation through Christ, and their leaning of the entire human personality on God in absolute trust and confidence in His power, wisdom, and goodness).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Jesus Christ (the Messiah) is [always] the same, yesterday, today, [yes] and forever (to the ages).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Do not be carried about by different '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' varied and alien teachings; for it is good for the heart to be established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ennobled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthened by means of grace (God''s favor and spiritual blessing) and not [to be devoted to] foods [rules of diet and ritualistic meals], which bring no [spiritual] benefit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' profit to those who observe them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' We have an altar from which those who serve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship in the tabernacle have no right to eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For when the blood of animals is brought into the sanctuary by the high priest as a sacrifice for sin, the victims'' bodies are burned outside the limits of the camp. [Lev. 16:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Therefore Jesus also suffered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' died outside the [city''s] gate in order that He might purify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consecrate the people through [the shedding of] His own blood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set them apart as holy [for God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Let us then go forth [from all that would prevent us] to Him outside the camp [at Calvary], bearing the contempt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shame with Him. [Lev. 16:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For here we have no permanent city, but we are looking for the one which is to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Through Him, therefore, let us constantly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' at all times offer up to God a sacrifice of praise, which is the fruit of lips that thankfully acknowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorify His name. [Lev. 7:12; Isa. 57:19; Hos. 14:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Do not forget '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' neglect to do kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good, to be generous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distribute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contribute to the needy [of the church as embodiment and proof of fellowship], for such sacrifices are pleasing to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Obey your spiritual leaders and submit to them [continually recognizing their authority over you], for they are constantly keeping watch over your souls '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guarding your spiritual welfare, as men who will have to render an account [of their trust]. [Do your part to] let them do this with gladness and not with sighing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' groaning, for that would not be profitable to you [either].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Keep praying for us, for we are convinced that we have a good (clear) conscience, that we want to walk uprightly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' live a noble life, acting honorably '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in complete honesty in all things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And I beg of you [to pray for us] the more earnestly, in order that I may be restored to you the sooner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now may the God of peace [Who is the Author and the Giver of peace], Who brought again from among the dead our Lord Jesus, that great Shepherd of the sheep, by the blood [that sealed, ratified] the everlasting agreement (covenant, testament), [Isa. 55:3; 63:11; Ezek. 37:26; Zech. 9:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Strengthen (complete, perfect) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make you what you ought to be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' equip you with everything good that you may carry out His will; [while He Himself] works in you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accomplishes that which is pleasing in His sight, through Jesus Christ (the Messiah); to Whom be the glory forever and ever (to the ages of the ages). Amen (so be it).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' I call on you, brethren, to listen patiently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bear with this message of exhortation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admonition '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouragement, for I have written to you briefly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Notice that our brother Timothy has been released [from prison]. If he comes here soon, I will see you along with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Give our greetings to all of your spiritual leaders and to all of the saints (God''s consecrated believers). The Italian Christians send you their greetings [also].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Grace (God''s favor and spiritual blessing) be with you all. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
