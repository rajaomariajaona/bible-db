document_id: LUK.18,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ALSO [Jesus] told them a parable to the effect that they ought always to pray and not to turn coward (faint, lose heart, and give up).'
  '10':
  - type: text
    content: ' Two men went up into the temple [enclosure] to pray, the one a Pharisee and the other a tax collector.'
  '11':
  - type: text
    content: ' The Pharisee took his stand ostentatiously and began to pray thus before '
  - type: text
    content: and
  - type: text
    content: ' with himself: God, I thank You that I am not like the rest of men–extortioners (robbers), swindlers [unrighteous in heart and life], adulterers–or even like this tax collector here.'
  '12':
  - type: text
    content: ' I fast twice a week; I give tithes of all that I gain.'
  '13':
  - type: text
    content: ' But the tax collector, [merely] standing at a distance, would not even lift up his eyes to heaven, but kept striking his breast, saying, O God, be favorable (be gracious, be merciful) to me, the especially wicked sinner that I am!'
  '14':
  - type: text
    content: ' I tell you, this man went down to his home justified (forgiven and made upright and in right standing with God), rather than the other man; for everyone who exalts himself will be humbled, but he who humbles himself will be exalted.'
  '15':
  - type: text
    content: ' Now they were also bringing [even] babies to Him that He might touch them, and when the disciples noticed it, they reproved them.'
  '16':
  - type: text
    content: ' But Jesus called them [the parents] to Him, saying, Allow the little children to come to Me, and do not hinder them, for to such [as these] belongs the kingdom of God.'
  '17':
  - type: text
    content: ' Truly I say to you, whoever does not accept '
  - type: text
    content: and
  - type: text
    content: ' receive '
  - type: text
    content: and
  - type: text
    content: ' welcome the kingdom of God like a little child [does] shall not in any way enter it [at all].'
  '18':
  - type: text
    content: ' And a certain ruler asked Him, Good Teacher [You who are essentially and perfectly morally good], what shall I do to inherit eternal life [to partake of eternal salvation in the Messiah''s kingdom]?'
  '19':
  - type: text
    content: ' Jesus said to him, Why do you call Me [essentially and perfectly morally] good? No one is [essentially and perfectly morally] good–except God only.'
  '2':
  - type: text
    content: ' He said, In a certain city there was a judge who neither reverenced '
  - type: text
    content: and
  - type: text
    content: ' feared God nor respected '
  - type: text
    content: or
  - type: text
    content: ' considered man.'
  '20':
  - type: text
    content: ' You know the commandments: Do not commit adultery, do not kill, do not steal, do not witness falsely, honor your father and your mother. [Exod. 20:12-16; Deut. 5:16-20.]'
  '21':
  - type: text
    content: ' And he replied, All these I have kept from my youth.'
  '22':
  - type: text
    content: ' And when Jesus heard it, He said to him, One thing you still lack. Sell everything that you have and divide [the money] among the poor, and you will have [rich] treasure in heaven; and come back [and] follow Me [become My disciple, join My party, and accompany Me].'
  '23':
  - type: text
    content: ' But when he heard this, he became distressed '
  - type: text
    content: and
  - type: text
    content: ' very sorrowful, for he was rich–exceedingly so.'
  '24':
  - type: text
    content: ' Jesus, observing him, said, How difficult it is for those who have wealth to enter the kingdom of God!'
  '25':
  - type: text
    content: ' For it is easier for a camel to enter through a needle''s eye than [for] a rich man to enter the kingdom of God.'
  '26':
  - type: text
    content: ' And those who heard it said, Then who can be saved?'
  '27':
  - type: text
    content: ' But He said, What is impossible with men is possible with God. [Gen. 18:14; Jer. 32:17.]'
  '28':
  - type: text
    content: ' And Peter said, See, we have left our own [things–home, family, and business] and have followed You.'
  '29':
  - type: text
    content: ' And He said to them, I say to you truly, there is no one who has left house or wife or brothers or parents or children for the sake of the kingdom of God'
  '3':
  - type: text
    content: ' And there was a widow in that city who kept coming to him and saying, Protect '
  - type: text
    content: and
  - type: text
    content: ' defend '
  - type: text
    content: and
  - type: text
    content: ' give me justice against my adversary.'
  '30':
  - type: text
    content: ' Who will not receive in return many times more in this world and, in the coming age, eternal life.'
  '31':
  - type: text
    content: ' Then taking the Twelve [apostles] aside, He said to them, Listen! We are going up to Jerusalem, and all things that are written about the Son of Man through '
  - type: text
    content: and
  - type: text
    content: ' by the prophets will be fulfilled. [Isa. 53:1-12.]'
  '32':
  - type: text
    content: ' For He will be handed over to the Gentiles and will be made sport of '
  - type: text
    content: and
  - type: text
    content: ' scoffed '
  - type: text
    content: and
  - type: text
    content: ' jeered at and insulted and spit upon. [Isa. 50:6.]'
  '33':
  - type: text
    content: ' They will flog Him and kill Him; and on the third day He will rise again. [Ps. 16:10.]'
  '34':
  - type: text
    content: ' But they understood nothing of these things; His words were a mystery '
  - type: text
    content: and
  - type: text
    content: ' hidden from them, and they did not comprehend what He was telling them.'
  '35':
  - type: text
    content: ' As He came near to Jericho, it occurred that a blind man was sitting by the roadside begging.'
  '36':
  - type: text
    content: ' And hearing a crowd going by, he asked what it meant.'
  '37':
  - type: text
    content: ' They told him, Jesus of Nazareth is passing by.'
  '38':
  - type: text
    content: ' And he shouted, saying, Jesus, Son of David, take pity '
  - type: text
    content: and
  - type: text
    content: ' have mercy on me!'
  '39':
  - type: text
    content: ' But those who were in front reproved him, telling him to keep quiet; yet he screamed '
  - type: text
    content: and
  - type: text
    content: ' shrieked so much the more, Son of David, take pity '
  - type: text
    content: and
  - type: text
    content: ' have mercy on me!'
  '4':
  - type: text
    content: ' And for a time he would not; but later he said to himself, Though I have neither reverence '
  - type: text
    content: or
  - type: text
    content: ' fear for God nor respect '
  - type: text
    content: or
  - type: text
    content: ' consideration for man,'
  '40':
  - type: text
    content: ' Then Jesus stood still and ordered that he be led to Him; and when he came near, Jesus asked him,'
  '41':
  - type: text
    content: ' What do you want Me to do for you? He said, Lord, let me receive my sight!'
  '42':
  - type: text
    content: ' And Jesus said to him, Receive your sight! Your faith (your trust and confidence that spring from your faith in God) has healed you.'
  '43':
  - type: text
    content: ' And instantly he received his sight and began to follow Jesus, recognizing, praising, '
  - type: text
    content: and
  - type: text
    content: ' honoring God; and all the people, when they saw it, praised God.'
  '5':
  - type: text
    content: ' Yet because this widow continues to bother me, I will defend '
  - type: text
    content: and
  - type: text
    content: ' protect '
  - type: text
    content: and
  - type: text
    content: ' avenge her, lest she give me intolerable annoyance '
  - type: text
    content: and
  - type: text
    content: ' wear me out by her continual coming '
  - type: text
    content: or
  - type: text
    content: ' at the last she come and rail on me '
  - type: text
    content: or
  - type: text
    content: ' assault me '
  - type: text
    content: or
  - type: text
    content: ' strangle me.'
  '6':
  - type: text
    content: ' Then the Lord said, Listen to what the unjust judge says!'
  '7':
  - type: text
    content: ' And will not [our just] God defend '
  - type: text
    content: and
  - type: text
    content: ' protect '
  - type: text
    content: and
  - type: text
    content: ' avenge His elect (His chosen ones), who cry to Him day and night? Will He defer them '
  - type: text
    content: and
  - type: text
    content: ' delay help on their behalf?'
  '8':
  - type: text
    content: ' I tell you, He will defend '
  - type: text
    content: and
  - type: text
    content: ' protect '
  - type: text
    content: and
  - type: text
    content: ' avenge them speedily. However, when the Son of Man comes, will He find [persistence in] faith on the earth?'
  '9':
  - type: text
    content: ' He also told this parable to some people who trusted in themselves '
  - type: text
    content: and
  - type: text
    content: ' were confident that they were righteous [that they were upright and in right standing with God] and scorned '
  - type: text
    content: and
  - type: text
    content: ' made nothing of all the rest of men:'
