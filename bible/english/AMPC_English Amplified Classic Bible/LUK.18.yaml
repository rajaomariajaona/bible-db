document_id: LUK.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ALSO [Jesus] told them a parable to the effect that they ought always to pray and not to turn coward (faint, lose heart, and give up).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He said, In a certain city there was a judge who neither reverenced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feared God nor respected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' considered man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And there was a widow in that city who kept coming to him and saying, Protect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give me justice against my adversary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And for a time he would not; but later he said to himself, Though I have neither reverence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fear for God nor respect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' consideration for man,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Yet because this widow continues to bother me, I will defend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avenge her, lest she give me intolerable annoyance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wear me out by her continual coming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' at the last she come and rail on me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' assault me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' strangle me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then the Lord said, Listen to what the unjust judge says!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And will not [our just] God defend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avenge His elect (His chosen ones), who cry to Him day and night? Will He defer them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delay help on their behalf?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I tell you, He will defend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avenge them speedily. However, when the Son of Man comes, will He find [persistence in] faith on the earth?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He also told this parable to some people who trusted in themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were confident that they were righteous [that they were upright and in right standing with God] and scorned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made nothing of all the rest of men:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Two men went up into the temple [enclosure] to pray, the one a Pharisee and the other a tax collector.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Pharisee took his stand ostentatiously and began to pray thus before '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with himself: God, I thank You that I am not like the rest of men–extortioners (robbers), swindlers [unrighteous in heart and life], adulterers–or even like this tax collector here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I fast twice a week; I give tithes of all that I gain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But the tax collector, [merely] standing at a distance, would not even lift up his eyes to heaven, but kept striking his breast, saying, O God, be favorable (be gracious, be merciful) to me, the especially wicked sinner that I am!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I tell you, this man went down to his home justified (forgiven and made upright and in right standing with God), rather than the other man; for everyone who exalts himself will be humbled, but he who humbles himself will be exalted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now they were also bringing [even] babies to Him that He might touch them, and when the disciples noticed it, they reproved them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But Jesus called them [the parents] to Him, saying, Allow the little children to come to Me, and do not hinder them, for to such [as these] belongs the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Truly I say to you, whoever does not accept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcome the kingdom of God like a little child [does] shall not in any way enter it [at all].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And a certain ruler asked Him, Good Teacher [You who are essentially and perfectly morally good], what shall I do to inherit eternal life [to partake of eternal salvation in the Messiah''s kingdom]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Jesus said to him, Why do you call Me [essentially and perfectly morally] good? No one is [essentially and perfectly morally] good–except God only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You know the commandments: Do not commit adultery, do not kill, do not steal, do not witness falsely, honor your father and your mother. [Exod. 20:12-16; Deut. 5:16-20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And he replied, All these I have kept from my youth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And when Jesus heard it, He said to him, One thing you still lack. Sell everything that you have and divide [the money] among the poor, and you will have [rich] treasure in heaven; and come back [and] follow Me [become My disciple, join My party, and accompany Me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But when he heard this, he became distressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' very sorrowful, for he was rich–exceedingly so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Jesus, observing him, said, How difficult it is for those who have wealth to enter the kingdom of God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For it is easier for a camel to enter through a needle''s eye than [for] a rich man to enter the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And those who heard it said, Then who can be saved?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But He said, What is impossible with men is possible with God. [Gen. 18:14; Jer. 32:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And Peter said, See, we have left our own [things–home, family, and business] and have followed You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And He said to them, I say to you truly, there is no one who has left house or wife or brothers or parents or children for the sake of the kingdom of God'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Who will not receive in return many times more in this world and, in the coming age, eternal life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Then taking the Twelve [apostles] aside, He said to them, Listen! We are going up to Jerusalem, and all things that are written about the Son of Man through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by the prophets will be fulfilled. [Isa. 53:1-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' For He will be handed over to the Gentiles and will be made sport of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scoffed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' jeered at and insulted and spit upon. [Isa. 50:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' They will flog Him and kill Him; and on the third day He will rise again. [Ps. 16:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But they understood nothing of these things; His words were a mystery '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hidden from them, and they did not comprehend what He was telling them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' As He came near to Jericho, it occurred that a blind man was sitting by the roadside begging.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And hearing a crowd going by, he asked what it meant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' They told him, Jesus of Nazareth is passing by.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And he shouted, saying, Jesus, Son of David, take pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have mercy on me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But those who were in front reproved him, telling him to keep quiet; yet he screamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shrieked so much the more, Son of David, take pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have mercy on me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Then Jesus stood still and ordered that he be led to Him; and when he came near, Jesus asked him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' What do you want Me to do for you? He said, Lord, let me receive my sight!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And Jesus said to him, Receive your sight! Your faith (your trust and confidence that spring from your faith in God) has healed you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And instantly he received his sight and began to follow Jesus, recognizing, praising, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honoring God; and all the people, when they saw it, praised God.'
