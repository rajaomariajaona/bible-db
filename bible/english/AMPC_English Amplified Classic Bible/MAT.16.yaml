document_id: MAT.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THE Pharisees and Sadducees came up to Jesus, and they asked Him to show them a sign (spectacular miracle) from heaven [attesting His divine authority].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He replied to them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: When it is evening you say, It will be fair weather, for the sky is red,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: And in the morning, It will be stormy today, for the sky is red and has a gloomy and threatening look. You know how to interpret the appearance of the sky, but you cannot interpret the signs of the times.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' A wicked and morally unfaithful generation craves a sign, but no sign shall be given to it except the sign of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the prophet
  - type: text
    text: ' Jonah. Then He left them and went away. [Jonah 3:4, 5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When the disciples reached the other side of the sea, they found that they had forgotten to bring any bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Jesus said to them, Be careful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on your guard against the leaven (ferment) of the Pharisees and Sadducees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And they reasoned among themselves about it, saying, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: It is
  - type: text
    text: ' because we did not bring any bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But Jesus, aware of this, asked, Why are you discussing among yourselves the fact that you have no bread? O you [men, how little trust you have in Me, how] little faith!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Do you not yet discern (perceive and understand)? Do you not remember the five loaves of the five thousand, and how many [small hand] baskets you gathered?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Nor the seven loaves for the four thousand, and how many [large provision] baskets you took up?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' How is it that you fail to understand that I was not talking to you about bread? But beware of the leaven (ferment) of the Pharisees and Sadducees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then they discerned that He did not tell them to beware of the leaven of bread, but of the teaching of the Pharisees and Sadducees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Now when Jesus went into the region of Caesarea Philippi, He asked His disciples, Who do people say that the Son of Man is?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And they answered, Some say John the Baptist; others say Elijah; and others Jeremiah or one of the prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He said to them, But who do you [yourselves] say that I am?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Simon Peter replied, You are the Christ, the Son of the living God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Jesus answered him, Blessed (happy, fortunate, and to be envied) are you, Simon Bar-Jonah. For flesh and blood [men] have not revealed this to you, but My Father Who is in heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And I tell you, you are Peter [Greek, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Petros
  - type: text
    text: '–a large piece of rock], and on this rock [Greek, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: petra
  - type: text
    text: –a huge rock like Gibraltar] I will build My church, and the gates of Hades (the powers of the infernal region) shall not overpower it [or be strong to its detriment or hold out against it].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' I will give you the keys of the kingdom of heaven; and whatever you bind (declare to be improper and unlawful) on earth must be what is already bound in heaven; and whatever you loose (declare lawful) on earth must be what is already loosed in heaven. [Isa. 22:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then He sternly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strictly charged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warned the disciples to tell no one that He was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' the Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' From that time forth Jesus began [clearly] to show His disciples that He must go to Jerusalem and suffer many things at the hands of the elders and the high priests and scribes, and be killed, and on the third day be raised from death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then Peter took Him aside to speak to Him privately and began to reprove and charge Him sharply, saying, God forbid, Lord! This must never happen to You!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But Jesus turned away from Peter and said to him, Get behind Me, Satan! You are in My way [an offense and a hindrance and a snare to Me]; for you are minding what partakes not of the nature '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quality of God, but of men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then Jesus said to His disciples, If anyone desires to be My disciple, let him deny himself [disregard, lose sight of, and forget himself and his own interests] and take up his cross and follow Me [cleave steadfastly to Me, conform wholly to My example in living and, if need be, in dying, also].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For whoever is bent on saving his [temporal] life [his comfort and security here] shall lose it [eternal life]; and whoever loses his life [his comfort and security here] for My sake shall find it [life everlasting].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For what will it profit a man if he gains the whole world and forfeits his life [his blessed life in the kingdom of God]? Or what would a man give as an exchange for his [blessed] life [in the kingdom of God]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For the Son of Man is going to come in the glory (majesty, splendor) of His Father with His angels, and then He will render account '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reward every man in accordance with what he has done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Truly I tell you, there are some standing here who will not taste death before they see the Son of Man coming in (into) His kingdom.'
