document_id: MAT.16,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THE Pharisees and Sadducees came up to Jesus, and they asked Him to show them a sign (spectacular miracle) from heaven [attesting His divine authority].'
  '10':
  - type: text
    content: ' Nor the seven loaves for the four thousand, and how many [large provision] baskets you took up?'
  '11':
  - type: text
    content: ' How is it that you fail to understand that I was not talking to you about bread? But beware of the leaven (ferment) of the Pharisees and Sadducees.'
  '12':
  - type: text
    content: ' Then they discerned that He did not tell them to beware of the leaven of bread, but of the teaching of the Pharisees and Sadducees.'
  '13':
  - type: text
    content: ' Now when Jesus went into the region of Caesarea Philippi, He asked His disciples, Who do people say that the Son of Man is?'
  '14':
  - type: text
    content: ' And they answered, Some say John the Baptist; others say Elijah; and others Jeremiah or one of the prophets.'
  '15':
  - type: text
    content: ' He said to them, But who do you [yourselves] say that I am?'
  '16':
  - type: text
    content: ' Simon Peter replied, You are the Christ, the Son of the living God.'
  '17':
  - type: text
    content: ' Then Jesus answered him, Blessed (happy, fortunate, and to be envied) are you, Simon Bar-Jonah. For flesh and blood [men] have not revealed this to you, but My Father Who is in heaven.'
  '18':
  - type: text
    content: ' And I tell you, you are Peter [Greek, '
  - type: text
    content: Petros
  - type: text
    content: '–a large piece of rock], and on this rock [Greek, '
  - type: text
    content: petra
  - type: text
    content: –a huge rock like Gibraltar] I will build My church, and the gates of Hades (the powers of the infernal region) shall not overpower it [or be strong to its detriment or hold out against it].
  '19':
  - type: text
    content: ' I will give you the keys of the kingdom of heaven; and whatever you bind (declare to be improper and unlawful) on earth must be what is already bound in heaven; and whatever you loose (declare lawful) on earth must be what is already loosed in heaven. [Isa. 22:22.]'
  '2':
  - type: text
    content: ' He replied to them, '
  - type: text
    content: When it is evening you say, It will be fair weather, for the sky is red,
  '20':
  - type: text
    content: ' Then He sternly '
  - type: text
    content: and
  - type: text
    content: ' strictly charged '
  - type: text
    content: and
  - type: text
    content: ' warned the disciples to tell no one that He was '
  - type: text
    content: Jesus
  - type: text
    content: ' the Christ.'
  '21':
  - type: text
    content: ' From that time forth Jesus began [clearly] to show His disciples that He must go to Jerusalem and suffer many things at the hands of the elders and the high priests and scribes, and be killed, and on the third day be raised from death.'
  '22':
  - type: text
    content: ' Then Peter took Him aside to speak to Him privately and began to reprove and charge Him sharply, saying, God forbid, Lord! This must never happen to You!'
  '23':
  - type: text
    content: ' But Jesus turned away from Peter and said to him, Get behind Me, Satan! You are in My way [an offense and a hindrance and a snare to Me]; for you are minding what partakes not of the nature '
  - type: text
    content: and
  - type: text
    content: ' quality of God, but of men.'
  '24':
  - type: text
    content: ' Then Jesus said to His disciples, If anyone desires to be My disciple, let him deny himself [disregard, lose sight of, and forget himself and his own interests] and take up his cross and follow Me [cleave steadfastly to Me, conform wholly to My example in living and, if need be, in dying, also].'
  '25':
  - type: text
    content: ' For whoever is bent on saving his [temporal] life [his comfort and security here] shall lose it [eternal life]; and whoever loses his life [his comfort and security here] for My sake shall find it [life everlasting].'
  '26':
  - type: text
    content: ' For what will it profit a man if he gains the whole world and forfeits his life [his blessed life in the kingdom of God]? Or what would a man give as an exchange for his [blessed] life [in the kingdom of God]?'
  '27':
  - type: text
    content: ' For the Son of Man is going to come in the glory (majesty, splendor) of His Father with His angels, and then He will render account '
  - type: text
    content: and
  - type: text
    content: ' reward every man in accordance with what he has done.'
  '28':
  - type: text
    content: ' Truly I tell you, there are some standing here who will not taste death before they see the Son of Man coming in (into) His kingdom.'
  '3':
  - type: text
    content: ' '
  - type: text
    content: And in the morning, It will be stormy today, for the sky is red and has a gloomy and threatening look. You know how to interpret the appearance of the sky, but you cannot interpret the signs of the times.
  '4':
  - type: text
    content: ' A wicked and morally unfaithful generation craves a sign, but no sign shall be given to it except the sign of '
  - type: text
    content: the prophet
  - type: text
    content: ' Jonah. Then He left them and went away. [Jonah 3:4, 5.]'
  '5':
  - type: text
    content: ' When the disciples reached the other side of the sea, they found that they had forgotten to bring any bread.'
  '6':
  - type: text
    content: ' Jesus said to them, Be careful '
  - type: text
    content: and
  - type: text
    content: ' on your guard against the leaven (ferment) of the Pharisees and Sadducees.'
  '7':
  - type: text
    content: ' And they reasoned among themselves about it, saying, '
  - type: text
    content: It is
  - type: text
    content: ' because we did not bring any bread.'
  '8':
  - type: text
    content: ' But Jesus, aware of this, asked, Why are you discussing among yourselves the fact that you have no bread? O you [men, how little trust you have in Me, how] little faith!'
  '9':
  - type: text
    content: ' Do you not yet discern (perceive and understand)? Do you not remember the five loaves of the five thousand, and how many [small hand] baskets you gathered?'
