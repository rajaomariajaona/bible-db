document_id: 1CH.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND HIRAM king of Tyre sent messengers to David, and cedar timbers, with masons and carpenters, to build him a house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And David perceived that the Lord had established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confirmed him as king over Israel, for his kingdom was exalted highly for His people Israel''s sake.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And David took more wives to Jerusalem, and [he] became the father of more sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Now these are the names of the children whom he had in Jerusalem: Shammua, Shobab, Nathan, Solomon,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Ibhar, Elishua, Elpelet,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Nogah, Nepheg, Japhia,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Elishama, Beeliada, and Eliphelet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And when the Philistines heard that David was anointed king over all Israel, [they] all went up to seek David. And [he] heard of it and went out before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Now the Philistines had come and made a raid in the Valley of Rephaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' David asked God, Shall I go up against the Philistines? And will You deliver them into my hand? And the Lord said, Go up, and I will deliver them into your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So [Israel] came up to Baal-perazim, and David smote [the Philistines] there. Then David said, God has broken my enemies by my hand, like the bursting forth of waters. Therefore they called the name of that place Baal-perazim [Lord of breaking through].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' [The Philistines] left their gods there; David commanded and they were burned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the Philistines again made a raid in the valley.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And David inquired again of God, and God said to him, Do not go up after them; turn away from them and come [around] upon them over opposite the mulberry trees.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And when you hear a sound of marching in the tops of the mulberry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' balsam trees, then go out to battle, for God has gone out before you to smite the Philistine host.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So David did as God commanded him, and they smote the army of the Philistines from Gibeon even to Gezer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the fame of David went out into all lands, and the Lord brought the fear of him upon all nations.'
