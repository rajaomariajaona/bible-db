document_id: 1CH.14,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND HIRAM king of Tyre sent messengers to David, and cedar timbers, with masons and carpenters, to build him a house.'
  '10':
  - type: text
    content: ' David asked God, Shall I go up against the Philistines? And will You deliver them into my hand? And the Lord said, Go up, and I will deliver them into your hand.'
  '11':
  - type: text
    content: ' So [Israel] came up to Baal-perazim, and David smote [the Philistines] there. Then David said, God has broken my enemies by my hand, like the bursting forth of waters. Therefore they called the name of that place Baal-perazim [Lord of breaking through].'
  '12':
  - type: text
    content: ' [The Philistines] left their gods there; David commanded and they were burned.'
  '13':
  - type: text
    content: ' And the Philistines again made a raid in the valley.'
  '14':
  - type: text
    content: ' And David inquired again of God, and God said to him, Do not go up after them; turn away from them and come [around] upon them over opposite the mulberry trees.'
  '15':
  - type: text
    content: ' And when you hear a sound of marching in the tops of the mulberry '
  - type: text
    content: or
  - type: text
    content: ' balsam trees, then go out to battle, for God has gone out before you to smite the Philistine host.'
  '16':
  - type: text
    content: ' So David did as God commanded him, and they smote the army of the Philistines from Gibeon even to Gezer.'
  '17':
  - type: text
    content: ' And the fame of David went out into all lands, and the Lord brought the fear of him upon all nations.'
  '2':
  - type: text
    content: ' And David perceived that the Lord had established '
  - type: text
    content: and
  - type: text
    content: ' confirmed him as king over Israel, for his kingdom was exalted highly for His people Israel''s sake.'
  '3':
  - type: text
    content: ' And David took more wives to Jerusalem, and [he] became the father of more sons and daughters.'
  '4':
  - type: text
    content: ' Now these are the names of the children whom he had in Jerusalem: Shammua, Shobab, Nathan, Solomon,'
  '5':
  - type: text
    content: ' Ibhar, Elishua, Elpelet,'
  '6':
  - type: text
    content: ' Nogah, Nepheg, Japhia,'
  '7':
  - type: text
    content: ' Elishama, Beeliada, and Eliphelet.'
  '8':
  - type: text
    content: ' And when the Philistines heard that David was anointed king over all Israel, [they] all went up to seek David. And [he] heard of it and went out before them.'
  '9':
  - type: text
    content: ' Now the Philistines had come and made a raid in the Valley of Rephaim.'
