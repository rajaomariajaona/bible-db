document_id: EXO.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN THE Lord said to Moses, Go to Pharaoh and tell him, Thus says the Lord God of the Hebrews: Let My people go, that they may serve Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' If you refuse to let them go and still hold them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Behold, the hand of the Lord [will fall] upon your livestock which are out in the field, upon the horses, the donkeys, the camels, the herds and the flocks; there shall be a very severe plague.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But the Lord shall make a distinction between the livestock of Israel and the livestock of Egypt, and nothing shall die of all that belongs to the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the Lord set a time, saying, Tomorrow the Lord will do this thing in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Lord did that the next day, and all [kinds of] the livestock of Egypt died; but of the livestock of the Israelites not one died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Pharaoh sent to find out, and behold, there was not one of the cattle of the Israelites dead. But the heart of Pharaoh was hardened [his mind was set] and he did not let the people go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The Lord said to Moses and Aaron, Take handfuls of ashes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' soot from the brickkiln and let Moses sprinkle them toward the heavens in the sight of Pharaoh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And it shall become small dust over all the land of Egypt, and become boils breaking out in sores on man and beast in all the land [occupied by the Egyptians].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So they took ashes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' soot of the kiln and stood before Pharaoh; and Moses threw them toward the sky, and it became boils erupting in sores on man and beast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the magicians could not stand before Moses because of their boils; for the boils were on the magicians and all the Egyptians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But the Lord hardened the heart of Pharaoh, making it strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obstinate, and he did not listen to them or heed them, just as the Lord had told Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then the Lord said to Moses, Rise up early in the morning and stand before Pharaoh and say to him, Thus says the Lord, the God of the Hebrews, Let My people go, that they may serve Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For this time I will send all My plagues upon your heart and upon your servants and your people, that you may recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that there is none like Me in all the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For by now I could have put forth My hand and have struck you and your people with pestilence, and you would have been cut off from the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But for this very purpose have I let you live, that I might show you My power, and that My name may be declared throughout all the earth. [Rom. 9:17-24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Since you are still exalting yourself [in haughty defiance] against My people by not letting them go,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Behold, tomorrow about this time I will cause it to rain a very heavy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dreadful fall of hail, such as has not been in Egypt from its founding until now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Send therefore now and gather your cattle in hastily, and all that you have in the field; for every man and beast that is in the field and is not brought home shall be struck by the hail and shall die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then he who feared the word of the Lord among the servants of Pharaoh made his servants and his livestock flee into the houses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shelters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And he who ignored the word of the Lord left his servants and his livestock in the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The Lord said to Moses, Stretch forth your hand toward the heavens, that there may be hail in all the land of Egypt, upon man and beast, and upon all the vegetation of the field, throughout the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then Moses stretched forth his rod toward the heavens, and the Lord sent thunder and hail, and fire (lightning) ran down to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' along the ground, and the Lord rained hail upon the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So there was hail and fire flashing continually in the midst of the weighty hail, such as had not been in all the land of Egypt since it became a nation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The hail struck down throughout all the land of Egypt everything that was in the field, both man and beast; and the hail beat down all the vegetation of the field and shattered every tree of the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Only in the land of Goshen, where the Israelites were, was there no hail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And Pharaoh sent for Moses and Aaron, and said to them, I have sinned this time; the Lord is in the right and I and my people are in the wrong.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Entreat the Lord, for there has been enough of these mighty thunderings and hail [these voices of God]; I will let you go; you shall stay here no longer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Moses said to him, As soon as I leave the city, I will stretch out my hands to the Lord; the thunder shall cease, neither shall there be any more hail, that you may know that the earth is the Lord''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But as for you and your servants, I know that you do not yet [reverently] fear the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The flax and the barley were smitten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruined, for the barley was in the ear and the flax in bloom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' But the wheat and spelt [another wheat] were not smitten, for they ripen late and were not grown up yet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' So Moses left the city and Pharaoh, and stretched forth his hands to the Lord; and the thunder and hail ceased, and rain was no longer poured upon the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But when Pharaoh saw that the rain, the hail, and the thunder had ceased, he sinned yet more, and toughened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stiffened his hard heart, he and his servants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' So Pharaoh''s heart was strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obstinate; he would not let the Israelites go, just as the Lord had said by Moses. [Exod. 4:21.]'
