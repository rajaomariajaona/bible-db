document_id: PRO.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE PROVERBS (truths obscurely expressed, maxims, and parables) of Solomon son of David, king of Israel:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' That people may know skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly Wisdom and instruction, discern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comprehend the words of understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insight,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Receive instruction in wise dealing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the discipline of wise thoughtfulness, righteousness, justice, and integrity,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' That prudence may be given to the simple, and knowledge, discretion, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discernment to the youth–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The wise also will hear and increase in learning, and the person of understanding will acquire skill '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attain to sound counsel [so that he may be able to steer his course rightly]–[Prov. 9:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' That people may understand a proverb and a figure of speech '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' an enigma with its interpretation, and the words of the wise and their dark sayings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' riddles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The reverent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear of the Lord is the beginning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the principal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' choice part of knowledge [its starting point and its essence]; but fools despise skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly Wisdom, instruction, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discipline. [Ps. 111:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' My son, hear the instruction of your father; reject not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' forsake the teaching of your mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For they are a [victor''s] chaplet (garland) of grace upon your head and chains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pendants [of gold worn by kings] for your neck.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' My son, if sinners entice you, do not consent. [Ps. 1:1; Eph. 5:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' If they say, Come with us; let us lie in wait [to shed] blood, let us ambush the innocent without cause [and show that his piety is in vain];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Let us swallow them up alive as does Sheol (the place of the dead), and whole, as those who go down into the pit [of the dead];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' We shall find '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take all kinds of precious goods [when our victims are put out of the way], we shall fill our houses with plunder;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Throw in your lot with us [they insist] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be a sworn brother '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comrade; let us all have one purse in common–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' My son, do not walk in the way with them; restrain your foot from their path;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For their feet run to evil, and they make haste to shed blood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For in vain is the net spread in the sight of any bird!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But [when these men set a trap for others] they are lying in wait for their own blood; they set an ambush for their own lives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So are the ways of everyone who is greedy of gain; such [greed for plunder] takes away the lives of its possessors. [Prov. 15:27; I Tim. 6:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Wisdom cries aloud in the street, she raises her voice in the markets;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' She cries at the head of the noisy intersections [in the chief gathering places]; at the entrance of the city gates she speaks:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' How long, O simple ones [open to evil], will you love being simple? And the scoffers delight in scoffing and [self-confident] fools hate knowledge?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' If you will turn (repent) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give heed to my reproof, behold, I [Wisdom] will pour out my spirit upon you, I will make my words known to you. [Isa. 11:2; Eph. 1:17-20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Because I have called and you have refused [to answer], have stretched out my hand and no man has heeded it, [Isa. 65:11, 12; 66:4; Jer. 7:13, 14; Zech. 7:11-13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And you treated as nothing all my counsel and would accept none of my reproof,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' I also will laugh at your calamity; I will mock when the thing comes that shall cause you terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' panic–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' When your panic comes as a storm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolation and your calamity comes on as a whirlwind, when distress and anguish come upon you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then will they call upon me [Wisdom] but I will not answer; they will seek me early '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' diligently but they will not find me. [Job 27:9; 35:12, 13; Isa. 1:15, 16; Jer. 11:11; Mic. 3:4; James 4:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Because they hated knowledge and did not choose the reverent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear of the Lord, [Prov. 8:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Would accept none of my counsel, and despised all my reproof,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Therefore shall they eat of the fruit of their own way and be satiated with their own devices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' For the backsliding of the simple shall slay them, and the careless ease of [self-confident] fools shall destroy them. [Isa. 32:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' But whoso hearkens to me [Wisdom] shall dwell securely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in confident trust and shall be quiet, without fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dread of evil.'
