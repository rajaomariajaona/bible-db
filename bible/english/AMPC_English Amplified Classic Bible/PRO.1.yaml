document_id: PRO.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE PROVERBS (truths obscurely expressed, maxims, and parables) of Solomon son of David, king of Israel:'
  '10':
  - type: text
    content: ' My son, if sinners entice you, do not consent. [Ps. 1:1; Eph. 5:11.]'
  '11':
  - type: text
    content: ' If they say, Come with us; let us lie in wait [to shed] blood, let us ambush the innocent without cause [and show that his piety is in vain];'
  '12':
  - type: text
    content: ' Let us swallow them up alive as does Sheol (the place of the dead), and whole, as those who go down into the pit [of the dead];'
  '13':
  - type: text
    content: ' We shall find '
  - type: text
    content: and
  - type: text
    content: ' take all kinds of precious goods [when our victims are put out of the way], we shall fill our houses with plunder;'
  '14':
  - type: text
    content: ' Throw in your lot with us [they insist] '
  - type: text
    content: and
  - type: text
    content: ' be a sworn brother '
  - type: text
    content: and
  - type: text
    content: ' comrade; let us all have one purse in common–'
  '15':
  - type: text
    content: ' My son, do not walk in the way with them; restrain your foot from their path;'
  '16':
  - type: text
    content: ' For their feet run to evil, and they make haste to shed blood.'
  '17':
  - type: text
    content: ' For in vain is the net spread in the sight of any bird!'
  '18':
  - type: text
    content: ' But [when these men set a trap for others] they are lying in wait for their own blood; they set an ambush for their own lives.'
  '19':
  - type: text
    content: ' So are the ways of everyone who is greedy of gain; such [greed for plunder] takes away the lives of its possessors. [Prov. 15:27; I Tim. 6:10.]'
  '2':
  - type: text
    content: ' That people may know skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom and instruction, discern '
  - type: text
    content: and
  - type: text
    content: ' comprehend the words of understanding '
  - type: text
    content: and
  - type: text
    content: ' insight,'
  '20':
  - type: text
    content: ' Wisdom cries aloud in the street, she raises her voice in the markets;'
  '21':
  - type: text
    content: ' She cries at the head of the noisy intersections [in the chief gathering places]; at the entrance of the city gates she speaks:'
  '22':
  - type: text
    content: ' How long, O simple ones [open to evil], will you love being simple? And the scoffers delight in scoffing and [self-confident] fools hate knowledge?'
  '23':
  - type: text
    content: ' If you will turn (repent) '
  - type: text
    content: and
  - type: text
    content: ' give heed to my reproof, behold, I [Wisdom] will pour out my spirit upon you, I will make my words known to you. [Isa. 11:2; Eph. 1:17-20.]'
  '24':
  - type: text
    content: ' Because I have called and you have refused [to answer], have stretched out my hand and no man has heeded it, [Isa. 65:11, 12; 66:4; Jer. 7:13, 14; Zech. 7:11-13.]'
  '25':
  - type: text
    content: ' And you treated as nothing all my counsel and would accept none of my reproof,'
  '26':
  - type: text
    content: ' I also will laugh at your calamity; I will mock when the thing comes that shall cause you terror '
  - type: text
    content: and
  - type: text
    content: ' panic–'
  '27':
  - type: text
    content: ' When your panic comes as a storm '
  - type: text
    content: and
  - type: text
    content: ' desolation and your calamity comes on as a whirlwind, when distress and anguish come upon you.'
  '28':
  - type: text
    content: ' Then will they call upon me [Wisdom] but I will not answer; they will seek me early '
  - type: text
    content: and
  - type: text
    content: ' diligently but they will not find me. [Job 27:9; 35:12, 13; Isa. 1:15, 16; Jer. 11:11; Mic. 3:4; James 4:3.]'
  '29':
  - type: text
    content: ' Because they hated knowledge and did not choose the reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord, [Prov. 8:13.]'
  '3':
  - type: text
    content: ' Receive instruction in wise dealing '
  - type: text
    content: and
  - type: text
    content: ' the discipline of wise thoughtfulness, righteousness, justice, and integrity,'
  '30':
  - type: text
    content: ' Would accept none of my counsel, and despised all my reproof,'
  '31':
  - type: text
    content: ' Therefore shall they eat of the fruit of their own way and be satiated with their own devices.'
  '32':
  - type: text
    content: ' For the backsliding of the simple shall slay them, and the careless ease of [self-confident] fools shall destroy them. [Isa. 32:6.]'
  '33':
  - type: text
    content: ' But whoso hearkens to me [Wisdom] shall dwell securely '
  - type: text
    content: and
  - type: text
    content: ' in confident trust and shall be quiet, without fear '
  - type: text
    content: or
  - type: text
    content: ' dread of evil.'
  '4':
  - type: text
    content: ' That prudence may be given to the simple, and knowledge, discretion, '
  - type: text
    content: and
  - type: text
    content: ' discernment to the youth–'
  '5':
  - type: text
    content: ' The wise also will hear and increase in learning, and the person of understanding will acquire skill '
  - type: text
    content: and
  - type: text
    content: ' attain to sound counsel [so that he may be able to steer his course rightly]–[Prov. 9:9.]'
  '6':
  - type: text
    content: ' That people may understand a proverb and a figure of speech '
  - type: text
    content: or
  - type: text
    content: ' an enigma with its interpretation, and the words of the wise and their dark sayings '
  - type: text
    content: or
  - type: text
    content: ' riddles.'
  '7':
  - type: text
    content: ' The reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord is the beginning '
  - type: text
    content: and
  - type: text
    content: ' the principal '
  - type: text
    content: and
  - type: text
    content: ' choice part of knowledge [its starting point and its essence]; but fools despise skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom, instruction, '
  - type: text
    content: and
  - type: text
    content: ' discipline. [Ps. 111:10.]'
  '8':
  - type: text
    content: ' My son, hear the instruction of your father; reject not '
  - type: text
    content: nor
  - type: text
    content: ' forsake the teaching of your mother.'
  '9':
  - type: text
    content: ' For they are a [victor''s] chaplet (garland) of grace upon your head and chains '
  - type: text
    content: and
  - type: text
    content: ' pendants [of gold worn by kings] for your neck.'
