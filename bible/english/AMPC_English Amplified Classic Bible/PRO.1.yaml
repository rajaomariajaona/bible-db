document_id: PRO.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE PROVERBS (truths obscurely expressed, maxims, and parables) of Solomon son of David, king of Israel:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My son, if sinners entice you, do not consent. [Ps. 1:1; Eph. 5:11.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If they say, Come with us; let us lie in wait [to shed] blood, let us ambush the innocent without cause [and show that his piety is in vain];'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let us swallow them up alive as does Sheol (the place of the dead), and whole, as those who go down into the pit [of the dead];'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We shall find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take all kinds of precious goods [when our victims are put out of the way], we shall fill our houses with plunder;'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Throw in your lot with us [they insist] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be a sworn brother '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comrade; let us all have one purse in common–'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My son, do not walk in the way with them; restrain your foot from their path;'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For their feet run to evil, and they make haste to shed blood.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For in vain is the net spread in the sight of any bird!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But [when these men set a trap for others] they are lying in wait for their own blood; they set an ambush for their own lives.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So are the ways of everyone who is greedy of gain; such [greed for plunder] takes away the lives of its possessors. [Prov. 15:27; I Tim. 6:10.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That people may know skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom and instruction, discern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehend the words of understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insight,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Wisdom cries aloud in the street, she raises her voice in the markets;'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' She cries at the head of the noisy intersections [in the chief gathering places]; at the entrance of the city gates she speaks:'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' How long, O simple ones [open to evil], will you love being simple? And the scoffers delight in scoffing and [self-confident] fools hate knowledge?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If you will turn (repent) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give heed to my reproof, behold, I [Wisdom] will pour out my spirit upon you, I will make my words known to you. [Isa. 11:2; Eph. 1:17-20.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because I have called and you have refused [to answer], have stretched out my hand and no man has heeded it, [Isa. 65:11, 12; 66:4; Jer. 7:13, 14; Zech. 7:11-13.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you treated as nothing all my counsel and would accept none of my reproof,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I also will laugh at your calamity; I will mock when the thing comes that shall cause you terror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' panic–'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When your panic comes as a storm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desolation and your calamity comes on as a whirlwind, when distress and anguish come upon you.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then will they call upon me [Wisdom] but I will not answer; they will seek me early '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' diligently but they will not find me. [Job 27:9; 35:12, 13; Isa. 1:15, 16; Jer. 11:11; Mic. 3:4; James 4:3.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because they hated knowledge and did not choose the reverent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipful fear of the Lord, [Prov. 8:13.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Receive instruction in wise dealing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the discipline of wise thoughtfulness, righteousness, justice, and integrity,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Would accept none of my counsel, and despised all my reproof,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore shall they eat of the fruit of their own way and be satiated with their own devices.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the backsliding of the simple shall slay them, and the careless ease of [self-confident] fools shall destroy them. [Isa. 32:6.]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But whoso hearkens to me [Wisdom] shall dwell securely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in confident trust and shall be quiet, without fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dread of evil.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That prudence may be given to the simple, and knowledge, discretion, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discernment to the youth–'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The wise also will hear and increase in learning, and the person of understanding will acquire skill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attain to sound counsel [so that he may be able to steer his course rightly]–[Prov. 9:9.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That people may understand a proverb and a figure of speech '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' an enigma with its interpretation, and the words of the wise and their dark sayings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' riddles.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The reverent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipful fear of the Lord is the beginning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the principal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' choice part of knowledge [its starting point and its essence]; but fools despise skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom, instruction, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline. [Ps. 111:10.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My son, hear the instruction of your father; reject not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' forsake the teaching of your mother.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For they are a [victor''s] chaplet (garland) of grace upon your head and chains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pendants [of gold worn by kings] for your neck.'
