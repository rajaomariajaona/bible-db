document_id: 2CH.18,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW JEHOSHAPHAT had great riches and honor, but was allied [by marriage] with Ahab.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Zedekiah son of Chenaanah had made himself horns of iron, and said, Thus says the Lord: With these you shall push the Syrians until they are destroyed.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All the prophets prophesied so, saying, Go up to Ramoth-gilead and prosper; the Lord will deliver it into the king''s hand.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The messenger who went to call Micaiah said to him, Behold, the words of the prophets foretell good to the king with one accord. So let your word be like one of them, and speak favorably.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Micaiah said, As the Lord lives, what my God says, that will I speak.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when he had come to the king, King [Ahab] said to him, Micaiah, shall we go to Ramoth-gilead to battle, or shall I forbear? And he said, Go up and prosper, and they shall be delivered into your hand.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the king said to him, How many times shall I warn you to tell nothing but the truth to me in the name of the Lord?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Micaiah said, I did see all Israel scattered upon the mountains as sheep that have no shepherd, and the Lord said, These have no master. Let each return to his house in peace.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And King [Ahab] of Israel said to Jehoshaphat, Did I not tell you that he would not prophesy good to me, but evil?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Micaiah] said, Therefore hear the word of the Lord: I saw the Lord sitting on His throne, and all the host of heaven standing at His right hand and His left.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said, Who shall entice Ahab king of Israel, that he may go up and fall at Ramoth-gilead? And one said this thing, and another that.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' After some years he went down to Ahab in Samaria. And Ahab killed sheep and oxen for him in abundance and for the people with him and persuaded him to go up with him against Ramoth-gilead.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then there came a spirit and stood before the Lord and said, I will entice him. The Lord said to him, By what means?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he said, I will go out and be a lying spirit in the mouths of all his prophets. And the Lord said, You shall entice him and also succeed. Go forth and do so.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now, you see, the Lord put a lying spirit in the mouths of your prophets; and the Lord has spoken evil concerning you.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Zedekiah the son of Chenaanah came near and smote Micaiah upon the cheek and said, Which way went the Spirit of the Lord from me to speak to you?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Micaiah said, Behold, you shall see on that day when you shall go into an inner chamber to hide yourself.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then King [Ahab] of Israel said, Take Micaiah back to Amon the governor of the city and to Joash the king''s son,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And say, Thus says the king: Put this fellow in prison and feed him with bread and water of affliction until I return in peace.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Micaiah said, If you return at all in peace, the Lord has not spoken by me. And he [added], Hear it, you people, all of you!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Ahab king of Israel and Jehoshaphat king of Judah went up to Ramoth-gilead.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [Ahab] king of Israel said to Jehoshaphat, I will disguise myself and will go to the battle, but you put on your royal robes. So King Ahab of Israel disguised himself, and they went into the battle.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ahab king of Israel said to Jehoshaphat king of Judah, Will you go with me to Ramoth-gilead? He answered, I am as you are, and my people as your people; we will be with you in the war.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now Syria''s king had commanded his chariot captains, Fight not with small or great, but only with the king of Israel.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the captains of the chariots saw Jehoshaphat [of Judah], they said, It is the king of Israel. So they turned to fight against him, but Jehoshaphat cried out, and the Lord helped him; and God moved them to depart from him.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For when the captains of the chariots saw that it was not the king of Israel, they turned back from pursuing him.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A certain man drew his bow at a venture and smote King [Ahab] of Israel between the lower armor and the breastplate. So Ahab said to his chariot driver, Turn, carry me out of the battle, for I am wounded.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the battle increased that day; however, King [Ahab] of Israel propped himself up in his chariot opposite the Syrians until evening, and about sunset he died.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jehoshaphat said to the king of Israel, Inquire first, I pray you, for the word of the Lord today.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So King [Ahab] of Israel gathered together the prophets, 400 men, and said to them, Shall we go to Ramoth-gilead to battle, or shall I forbear? And they said, Go up, for God will deliver it into the king''s hand.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Jehoshaphat said, Is there not another prophet of the Lord here by whom we may inquire?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' King [Ahab] of Israel said to Jehoshaphat, There is another man, Micaiah son of Imla, by whom we may inquire of the Lord, but I hate him, for he never has prophesied good for me, but always evil. And Jehoshaphat said, Let not the king say so.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And King [Ahab] of Israel called for one of his officers and said, Bring quickly Micaiah son of Imla.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The king of Israel and Jehoshaphat king of Judah sat each on his throne, arrayed in their robes; they were sitting in an open place [at the threshing floor] at the entrance of the gate of Samaria; all the prophets were prophesying before them.'
