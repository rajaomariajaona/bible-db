document_id: JHN.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' LATER ON there was a Jewish festival (feast) for which Jesus went up to Jerusalem.'
  '10':
  - type: text
    content: ' So the Jews kept saying to the man who had been healed, It is the Sabbath, and you have no right to pick up your bed [it is not lawful].'
  '11':
  - type: text
    content: ' He answered them, The Man Who healed me '
  - type: text
    content: and
  - type: text
    content: ' gave me back my strength, He Himself said to me, Pick up your bed and walk!'
  '12':
  - type: text
    content: ' They asked him, Who is the Man Who told you, Pick up your bed and walk?'
  '13':
  - type: text
    content: ' Now the invalid who had been healed did not know who it was, for Jesus had quietly gone away [had passed on unnoticed], since there was a crowd in the place.'
  '14':
  - type: text
    content: ' Afterward, when Jesus found him in the temple, He said to him, See, you are well! Stop sinning or something worse may happen to you.'
  '15':
  - type: text
    content: ' The man went away and told the Jews that it was Jesus Who had made him well.'
  '16':
  - type: text
    content: ' For this reason the Jews began to persecute (annoy, torment) Jesus '
  - type: text
    content: and sought to kill Him,
  - type: text
    content: ' because He was doing these things on the Sabbath.'
  '17':
  - type: text
    content: ' But Jesus answered them, My Father has worked [even] until now, [He has never ceased working; He is still working] and I, too, must be at [divine] work.'
  '18':
  - type: text
    content: ' This made the Jews more determined than ever to kill Him [to do away with Him]; because He not only was breaking (weakening, violating) the Sabbath, but He actually was speaking of God as being [in a special sense] His own Father, making Himself equal [putting Himself on a level] with God.'
  '19':
  - type: text
    content: ' So Jesus answered them by saying, I assure you, most solemnly I tell you, the Son is able to do nothing of Himself (of His own accord); but He is able to do only what He sees the Father doing, for whatever the Father does is what the Son does in the same way [in His turn].'
  '2':
  - type: text
    content: ' Now there is in Jerusalem a pool near the Sheep Gate. This pool in the Hebrew is called Bethesda, having five porches (alcoves, colonnades, doorways).'
  '20':
  - type: text
    content: ' The Father dearly loves the Son and discloses to (shows) Him everything that He Himself does. And He will disclose to Him (let Him see) greater things yet than these, so that you may marvel '
  - type: text
    content: and
  - type: text
    content: ' be full of wonder '
  - type: text
    content: and
  - type: text
    content: ' astonishment.'
  '21':
  - type: text
    content: ' Just as the Father raises up the dead and gives them life [makes them live on], even so the Son also gives life to whomever He wills '
  - type: text
    content: and
  - type: text
    content: ' is pleased to give it.'
  '22':
  - type: text
    content: ' Even the Father judges no one, for He has given all judgment (the last judgment and the whole business of judging) entirely into the hands of the Son,'
  '23':
  - type: text
    content: ' So that all men may give honor (reverence, homage) to the Son just as they give honor to the Father. [In fact] whoever does not honor the Son does not honor the Father, Who has sent Him.'
  '24':
  - type: text
    content: ' I assure you, most solemnly I tell you, the person whose ears are open to My words [who listens to My message] and believes '
  - type: text
    content: and
  - type: text
    content: ' trusts in '
  - type: text
    content: and
  - type: text
    content: ' clings to '
  - type: text
    content: and
  - type: text
    content: ' relies on Him Who sent Me has (possesses now) eternal life. And he does not come into judgment [does not incur sentence of judgment, will not come under condemnation], but he has already passed over out of death into life.'
  '25':
  - type: text
    content: ' Believe Me when I assure you, most solemnly I tell you, the time is coming and is here now when the dead shall hear the voice of the Son of God and those who hear it shall live.'
  '26':
  - type: text
    content: ' For even as the Father has life in Himself '
  - type: text
    content: and
  - type: text
    content: ' is self-existent, so He has given to the Son to have life in Himself '
  - type: text
    content: and
  - type: text
    content: ' be self-existent.'
  '27':
  - type: text
    content: ' And He has given Him authority '
  - type: text
    content: and
  - type: text
    content: ' granted Him power to execute (exercise, practice) judgment because He is a Son of man [very man].'
  '28':
  - type: text
    content: ' Do not be surprised '
  - type: text
    content: and
  - type: text
    content: ' wonder at this, for the time is coming when all those who are in the tombs shall hear His voice,'
  '29':
  - type: text
    content: ' And they shall come out–those who have practiced doing good [will come out] to the resurrection of [new] life, and those who have done evil will be raised for judgment [raised to meet their sentence]. [Dan. 12:2.]'
  '3':
  - type: text
    content: ' In these lay a great number of sick folk–some blind, some crippled, and some paralyzed (shriveled up)–'
  - type: text
    content: waiting for the bubbling up of the water.
  '30':
  - type: text
    content: ' I am able to do nothing from Myself [independently, of My own accord–but only as I am taught by God and as I get His orders]. Even as I hear, I judge [I decide as I am bidden to decide. As the voice comes to Me, so I give a decision], and My judgment is right (just, righteous), because I do not seek '
  - type: text
    content: or
  - type: text
    content: ' consult My own will [I have no desire to do what is pleasing to Myself, My own aim, My own purpose] but only the will '
  - type: text
    content: and
  - type: text
    content: ' pleasure of the Father Who sent Me.'
  '31':
  - type: text
    content: ' If I alone testify in My behalf, My testimony is not valid '
  - type: text
    content: and
  - type: text
    content: ' cannot be worth anything.'
  '32':
  - type: text
    content: ' There is Another Who testifies concerning Me, and I know '
  - type: text
    content: and
  - type: text
    content: ' am certain that His evidence on My behalf is true and valid.'
  '33':
  - type: text
    content: ' You yourselves have sent [an inquiry] to John and he has been a witness to the truth.'
  '34':
  - type: text
    content: ' But I do not receive [a mere] human witness [the evidence which I accept on My behalf is not from man]; but I simply mention all these things in order that you may be saved (made and kept safe and sound).'
  '35':
  - type: text
    content: ' John was the lamp that kept on burning and shining [to show you the way], and you were willing for a while to delight (sun) yourselves in his light.'
  '36':
  - type: text
    content: ' But I have as My witness something greater (weightier, higher, better) than that of John; for the works that the Father has appointed Me to accomplish '
  - type: text
    content: and
  - type: text
    content: ' finish, the very same works that I am now doing, are a witness '
  - type: text
    content: and
  - type: text
    content: ' proof that the Father has sent Me.'
  '37':
  - type: text
    content: ' And the Father Who sent Me has Himself testified concerning Me. Not one of you has ever given ear to His voice or seen His form (His face–what He is like). [You have always been deaf to His voice and blind to the vision of Him.]'
  '38':
  - type: text
    content: ' And you have not His word (His thought) living in your hearts, because you do not believe '
  - type: text
    content: and
  - type: text
    content: ' adhere to '
  - type: text
    content: and
  - type: text
    content: ' trust in '
  - type: text
    content: and
  - type: text
    content: ' rely on Him Whom He has sent. [That is why you do not keep His message living in you, because you do not believe in the Messenger Whom He has sent.]'
  '39':
  - type: text
    content: ' You search '
  - type: text
    content: and
  - type: text
    content: ' investigate '
  - type: text
    content: and
  - type: text
    content: ' pore over the Scriptures diligently, because you suppose '
  - type: text
    content: and
  - type: text
    content: ' trust that you have eternal life through them. And these [very Scriptures] testify about Me!'
  '4':
  - type: text
    content: ' '
  - type: text
    content: For an angel of the Lord went down at appointed seasons into the pool and moved and stirred up the water; whoever then first, after the stirring up of the water, stepped in was cured of whatever disease with which he was afflicted.
  '40':
  - type: text
    content: ' And still you are not willing [but refuse] to come to Me, so that you might have life.'
  '41':
  - type: text
    content: ' I receive not glory from men [I crave no human honor, I look for no mortal fame],'
  '42':
  - type: text
    content: ' But I know you and recognize '
  - type: text
    content: and
  - type: text
    content: ' understand that you have not the love of God in you.'
  '43':
  - type: text
    content: ' I have come in My Father''s name '
  - type: text
    content: and
  - type: text
    content: ' with His power, and you do not receive Me [your hearts are not open to Me, you give Me no welcome]; but if another comes in his own name '
  - type: text
    content: and
  - type: text
    content: ' his own power '
  - type: text
    content: and
  - type: text
    content: ' with no other authority but himself, you will receive him '
  - type: text
    content: and
  - type: text
    content: ' give him your approval.'
  '44':
  - type: text
    content: ' How is it possible for you to believe [how can you learn to believe], you who [are content to seek and] receive praise '
  - type: text
    content: and
  - type: text
    content: ' honor '
  - type: text
    content: and
  - type: text
    content: ' glory from one another, and yet do not seek the praise '
  - type: text
    content: and
  - type: text
    content: ' honor '
  - type: text
    content: and
  - type: text
    content: ' glory which come from Him Who alone is God?'
  '45':
  - type: text
    content: ' Put out of your minds the thought '
  - type: text
    content: and
  - type: text
    content: ' do not suppose [as some of you are supposing] that I will accuse you before the Father. There is one who accuses you–it is Moses, the very one on whom you have built your hopes [in whom you trust].'
  '46':
  - type: text
    content: ' For if you believed '
  - type: text
    content: and
  - type: text
    content: ' relied on Moses, you would believe '
  - type: text
    content: and
  - type: text
    content: ' rely on Me, for he wrote about Me [personally].'
  '47':
  - type: text
    content: ' But if you do not believe '
  - type: text
    content: and
  - type: text
    content: ' trust his writings, how then will you believe '
  - type: text
    content: and
  - type: text
    content: ' trust My teachings? [How shall you cleave to and rely on My words?]'
  '5':
  - type: text
    content: ' There was a certain man there who had suffered with a deep-seated '
  - type: text
    content: and
  - type: text
    content: ' lingering disorder for thirty-eight years.'
  '6':
  - type: text
    content: ' When Jesus noticed him lying there [helpless], knowing that he had already been a long time in that condition, He said to him, Do you want to become well? [Are you really in earnest about getting well?]'
  '7':
  - type: text
    content: ' The invalid answered, Sir, I have nobody when the water is moving to put me into the pool; but while I am trying to come [into it] myself, somebody else steps down ahead of me.'
  '8':
  - type: text
    content: ' Jesus said to him, Get up! Pick up your bed (sleeping pad) and walk!'
  '9':
  - type: text
    content: ' Instantly the man became well '
  - type: text
    content: and
  - type: text
    content: ' recovered his strength and picked up his bed and walked. But that happened on the Sabbath.'
