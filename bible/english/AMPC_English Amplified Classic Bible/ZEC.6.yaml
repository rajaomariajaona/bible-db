document_id: ZEC.6,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND AGAIN I lifted up my eyes and saw, and behold, four chariots came out from between two mountains; and the mountains were mountains of firm, immovable bronze.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Accept donations '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offerings from these [as representatives of the] exiles, from Heldai, from Tobijah, and from Jedaiah, who have come from Babylon; and come the same day and go to the house of Josiah the son of Zephaniah.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yes, take from them silver and gold, and make crowns and set [one] upon the head of Joshua the son of Jehozadak, the high priest,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And say to him, Thus says the Lord of hosts: [You, Joshua] behold (look at, keep in sight, watch) the Man [the Messiah] whose name is the Branch, for He shall grow up in His place and He shall build the [true] temple of the Lord. [Isa. 4:2; Jer. 23:5; 33:15; Zech. 3:8.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yes, [you are building a temple of the Lord, but] it is He Who shall build the [true] temple of the Lord, and He shall bear the honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory [as of the only begotten of the Father] and shall sit and rule upon His throne. And He shall be a Priest upon His throne, and the counsel of peace shall be between the two [offices–Priest and King]. [John 1:14; 17:5; Heb. 2:9.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the [other] crown shall be [credited] to Helem (Heldai), to Tobijah, and to Jedaiah, and to the kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favor of Josiah the son of Zephaniah, and shall be in the temple of the Lord for a reminder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' memorial. [Matt. 10:41.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And those who are far off shall come and help build the temple of the Lord, and you shall know (recognize and understand) that the Lord sent me [Zechariah] to you. And [your part in this] shall come to pass if you will diligently obey the voice of the Lord your God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The first chariot had red '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bay horses, the second chariot had black horses,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The third chariot had white horses, and the fourth chariot had dappled, active, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strong horses.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then I said to the angel who talked with me, What are these, my lord?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the angel answered me, These are the four winds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' spirits of the heavens, which go forth from presenting themselves before the Lord of all the earth. [Ps. 104:4; Matt. 24:31.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The chariot with the black horses is going forth into the north country, and the white ones are going forth after them [because there are two northern powers to overcome], and the dappled ones are going forth toward the south country.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [the chariots with] the strong [horses] went forth and sought to go that they might patrol the earth. And [the Lord] said to them, Go, walk to and fro through the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' patrol it. So they walked about through the earth [watching and protecting it].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He summoned me and said to me, Behold, these that go toward the north country have quieted My Spirit [of wrath] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have caused it to rest in the north country.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the word of the Lord came to me, saying,'
