document_id: 2TI.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' I CHARGE [you] in the presence of God and of Christ Jesus, Who is to judge the living and the dead, and by (in the light of) His coming and His kingdom:'
  '10':
  - type: text
    content: ' For Demas has deserted me for love of this present world and has gone to Thessalonica; Crescens [has gone] to Galatia, Titus to Dalmatia.'
  '11':
  - type: text
    content: ' Luke alone is with me. Get Mark and bring him with you, for he is very helpful to me for the ministry.'
  '12':
  - type: text
    content: ' Tychicus I have sent to Ephesus.'
  '13':
  - type: text
    content: ' [When] you come, bring the cloak that I left at Troas with Carpus, also the books, especially the parchments.'
  '14':
  - type: text
    content: ' Alexander the coppersmith did me great wrongs. The Lord will pay him back for his actions.'
  '15':
  - type: text
    content: ' Beware of him yourself, for he opposed '
  - type: text
    content: and
  - type: text
    content: ' resisted our message very strongly '
  - type: text
    content: and
  - type: text
    content: ' exceedingly.'
  '16':
  - type: text
    content: ' At my first trial no one acted in my defense [as my advocate] '
  - type: text
    content: or
  - type: text
    content: ' took my part '
  - type: text
    content: or
  - type: text
    content: ' [even] stood with me, but all forsook me. May it not be charged against them!'
  '17':
  - type: text
    content: ' But the Lord stood by me and strengthened me, so that through me the [Gospel] message might be fully proclaimed and all the Gentiles might hear it. So I was delivered out of the jaws of the lion.'
  '18':
  - type: text
    content: ' [And indeed] the Lord will certainly deliver '
  - type: text
    content: and
  - type: text
    content: ' draw me to Himself from every assault of evil. He will preserve '
  - type: text
    content: and
  - type: text
    content: ' bring me safe unto His heavenly kingdom. To Him be the glory forever and ever. Amen (so be it).'
  '19':
  - type: text
    content: ' Give my greetings to Prisca and Aquila and to the household of Onesiphorus.'
  '2':
  - type: text
    content: ' Herald '
  - type: text
    content: and
  - type: text
    content: ' preach the Word! Keep your sense of urgency [stand by, be at hand and ready], whether the opportunity seems to be favorable or unfavorable. [Whether it is convenient or inconvenient, whether it is welcome or unwelcome, you as preacher of the Word are to show people in what way their lives are wrong.] And convince them, rebuking '
  - type: text
    content: and
  - type: text
    content: ' correcting, warning '
  - type: text
    content: and
  - type: text
    content: ' urging '
  - type: text
    content: and
  - type: text
    content: ' encouraging them, being unflagging '
  - type: text
    content: and
  - type: text
    content: ' inexhaustible in patience and teaching.'
  '20':
  - type: text
    content: ' Erastus stayed on at Corinth, but Trophimus I left ill at Miletus.'
  '21':
  - type: text
    content: ' Do hasten '
  - type: text
    content: and
  - type: text
    content: ' try your best to come to me before winter. Eubulus wishes to be remembered to you, as do Pudens and Linus and Claudia and all the brethren.'
  '22':
  - type: text
    content: ' The Lord '
  - type: text
    content: Jesus Christ
  - type: text
    content: ' be with your spirit. Grace (God''s favor and blessing) be with you. '
  - type: text
    content: Amen (so be it).
  '3':
  - type: text
    content: ' For the time is coming when [people] will not tolerate (endure) sound '
  - type: text
    content: and
  - type: text
    content: ' wholesome instruction, but, having ears itching [for something pleasing and gratifying], they will gather to themselves one teacher after another to a considerable number, chosen to satisfy their own liking '
  - type: text
    content: and
  - type: text
    content: ' to foster the errors they hold,'
  '4':
  - type: text
    content: ' And will turn aside from hearing the truth and wander off into myths '
  - type: text
    content: and
  - type: text
    content: ' man-made fictions.'
  '5':
  - type: text
    content: ' As for you, be calm '
  - type: text
    content: and
  - type: text
    content: ' cool '
  - type: text
    content: and
  - type: text
    content: ' steady, accept '
  - type: text
    content: and
  - type: text
    content: ' suffer unflinchingly every hardship, do the work of an evangelist, fully perform all the duties of your ministry.'
  '6':
  - type: text
    content: ' For I am already about to be sacrificed [my life is about to be poured out as a drink offering]; the time of my [spirit''s] release [from the body] is at hand '
  - type: text
    content: and
  - type: text
    content: ' I will soon go free.'
  '7':
  - type: text
    content: ' I have fought the good (worthy, honorable, and noble) fight, I have finished the race, I have kept (firmly held) the faith.'
  '8':
  - type: text
    content: ' [As to what remains] henceforth there is laid up for me the [victor''s] crown of righteousness [for being right with God and doing right], which the Lord, the righteous Judge, will award to me '
  - type: text
    content: and
  - type: text
    content: ' recompense me on that [great] day–and not to me only, but also to all those who have loved '
  - type: text
    content: and
  - type: text
    content: ' yearned for '
  - type: text
    content: and
  - type: text
    content: ' welcomed His appearing (His return).'
  '9':
  - type: text
    content: ' Make every effort to come to me soon.'
