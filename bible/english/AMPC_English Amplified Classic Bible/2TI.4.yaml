document_id: 2TI.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I CHARGE [you] in the presence of God and of Christ Jesus, Who is to judge the living and the dead, and by (in the light of) His coming and His kingdom:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Herald '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preach the Word! Keep your sense of urgency [stand by, be at hand and ready], whether the opportunity seems to be favorable or unfavorable. [Whether it is convenient or inconvenient, whether it is welcome or unwelcome, you as preacher of the Word are to show people in what way their lives are wrong.] And convince them, rebuking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correcting, warning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' urging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraging them, being unflagging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inexhaustible in patience and teaching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For the time is coming when [people] will not tolerate (endure) sound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wholesome instruction, but, having ears itching [for something pleasing and gratifying], they will gather to themselves one teacher after another to a considerable number, chosen to satisfy their own liking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to foster the errors they hold,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And will turn aside from hearing the truth and wander off into myths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' man-made fictions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' As for you, be calm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cool '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steady, accept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer unflinchingly every hardship, do the work of an evangelist, fully perform all the duties of your ministry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For I am already about to be sacrificed [my life is about to be poured out as a drink offering]; the time of my [spirit''s] release [from the body] is at hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I will soon go free.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' I have fought the good (worthy, honorable, and noble) fight, I have finished the race, I have kept (firmly held) the faith.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' [As to what remains] henceforth there is laid up for me the [victor''s] crown of righteousness [for being right with God and doing right], which the Lord, the righteous Judge, will award to me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recompense me on that [great] day–and not to me only, but also to all those who have loved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yearned for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed His appearing (His return).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Make every effort to come to me soon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For Demas has deserted me for love of this present world and has gone to Thessalonica; Crescens [has gone] to Galatia, Titus to Dalmatia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Luke alone is with me. Get Mark and bring him with you, for he is very helpful to me for the ministry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Tychicus I have sent to Ephesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' [When] you come, bring the cloak that I left at Troas with Carpus, also the books, especially the parchments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Alexander the coppersmith did me great wrongs. The Lord will pay him back for his actions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Beware of him yourself, for he opposed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' resisted our message very strongly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exceedingly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' At my first trial no one acted in my defense [as my advocate] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' took my part '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' [even] stood with me, but all forsook me. May it not be charged against them!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But the Lord stood by me and strengthened me, so that through me the [Gospel] message might be fully proclaimed and all the Gentiles might hear it. So I was delivered out of the jaws of the lion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' [And indeed] the Lord will certainly deliver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' draw me to Himself from every assault of evil. He will preserve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring me safe unto His heavenly kingdom. To Him be the glory forever and ever. Amen (so be it).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Give my greetings to Prisca and Aquila and to the household of Onesiphorus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Erastus stayed on at Corinth, but Trophimus I left ill at Miletus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Do hasten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' try your best to come to me before winter. Eubulus wishes to be remembered to you, as do Pudens and Linus and Claudia and all the brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Christ
  - type: text
    text: ' be with your spirit. Grace (God''s favor and blessing) be with you. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
