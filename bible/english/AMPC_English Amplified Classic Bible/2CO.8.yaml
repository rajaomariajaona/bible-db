document_id: 2CO.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WE WANT to tell you further, brethren, about the grace (the favor and spiritual blessing) of God which has been evident in the churches of Macedonia [arousing in them the desire to give alms];'
  '10':
  - type: text
    content: ' [It is then] my counsel '
  - type: text
    content: and
  - type: text
    content: ' my opinion in this matter that I give [you when I say]: It is profitable '
  - type: text
    content: and
  - type: text
    content: ' fitting for you [now to complete the enterprise] which more than a year ago you not only began, but were the first to wish to do anything [about contributions for the relief of the saints at Jerusalem].'
  '11':
  - type: text
    content: ' So now finish doing it, that your [enthusiastic] readiness in desiring it may be equalled by your completion of it according to your ability '
  - type: text
    content: and
  - type: text
    content: ' means.'
  '12':
  - type: text
    content: ' For if the [eager] readiness to give is there, then it is acceptable '
  - type: text
    content: and
  - type: text
    content: ' welcomed in proportion to what a person has, not according to what he does not have.'
  '13':
  - type: text
    content: ' For it is not [intended] that other people be eased '
  - type: text
    content: and
  - type: text
    content: ' relieved [of their responsibility] and you be burdened '
  - type: text
    content: and
  - type: text
    content: ' suffer [unfairly],'
  '14':
  - type: text
    content: ' But to have equality [share and share alike], your surplus over necessity at the present time going to meet their want '
  - type: text
    content: and
  - type: text
    content: ' to equalize the difference created by it, so that [at some other time] their surplus in turn may be given to supply your want. Thus there may be equality,'
  '15':
  - type: text
    content: ' As it is written, He who gathered much had nothing over, and he who gathered little did not lack. [Exod. 16:18.]'
  '16':
  - type: text
    content: ' But thanks be to God Who planted the same earnest zeal '
  - type: text
    content: and
  - type: text
    content: ' care for you in the heart of Titus.'
  '17':
  - type: text
    content: ' For he not only welcomed '
  - type: text
    content: and
  - type: text
    content: ' responded to our appeal, but was himself so keen in his enthusiasm '
  - type: text
    content: and
  - type: text
    content: ' interest in you that he is going to you of his own accord.'
  '18':
  - type: text
    content: ' But we are sending along with him that brother [Luke?] whose praise in the Gospel ministry [is spread] throughout all the churches;'
  '19':
  - type: text
    content: ' And more than that, he has been appointed by the churches to travel as our companion in regard to this bountiful contribution which we are administering for the glory of the Lord Himself and [to show] our eager readiness [as Christians to help one another].'
  '2':
  - type: text
    content: ' For in the midst of an ordeal of severe tribulation, their abundance of joy and their depth of poverty [together] have overflowed in wealth of lavish generosity on their part.'
  '20':
  - type: text
    content: ' [For] we are on our guard, intending that no one should find anything for which to blame us in regard to our administration of this large contribution.'
  '21':
  - type: text
    content: ' For we take thought beforehand '
  - type: text
    content: and
  - type: text
    content: ' aim to be honest '
  - type: text
    content: and
  - type: text
    content: ' absolutely above suspicion, not only in the sight of the Lord but also in the sight of men.'
  '22':
  - type: text
    content: ' Moreover, along with them we are sending our brother, whom we have often put to the test and have found him zealous (devoted and earnest) in many matters, but who is now more [eagerly] earnest than ever because of [his] absolute confidence in you.'
  '23':
  - type: text
    content: ' As for Titus, he is my colleague and shares my work in your service; and as for the [other two] brethren, they are the [special] messengers of the churches, a credit '
  - type: text
    content: and
  - type: text
    content: ' glory to Christ (the Messiah).'
  '24':
  - type: text
    content: ' Show to these men, therefore, in the sight of the churches, the reality '
  - type: text
    content: and
  - type: text
    content: ' plain truth of your love (your affection, goodwill, and benevolence) and what [good reasons] I had for boasting about '
  - type: text
    content: and
  - type: text
    content: ' being proud of you.'
  '3':
  - type: text
    content: ' For, as I can bear witness, [they gave] according to their ability, yes, and beyond their ability; and [they did it] voluntarily,'
  '4':
  - type: text
    content: ' Begging us most insistently for the favor '
  - type: text
    content: and
  - type: text
    content: ' the fellowship of contributing in this ministration for [the relief and support of] the saints [in Jerusalem].'
  '5':
  - type: text
    content: ' Nor [was this gift of theirs merely the contribution] that we expected, but first they gave themselves to the Lord and to us [as His agents] by the will of God [entirely disregarding their personal interests, they gave as much as they possibly could, having put themselves at our disposal to be directed by the will of God]–'
  '6':
  - type: text
    content: ' So much so that we have urged Titus that as he began it, he should also complete this beneficent '
  - type: text
    content: and
  - type: text
    content: ' gracious contribution among you [the church at Corinth].'
  '7':
  - type: text
    content: ' Now as you abound '
  - type: text
    content: and
  - type: text
    content: ' excel '
  - type: text
    content: and
  - type: text
    content: ' are at the front in everything–in faith, in expressing yourselves, in knowledge, in all zeal, and in your love for us–[see to it that you come to the front now and] abound '
  - type: text
    content: and
  - type: text
    content: ' excel in this gracious work [of almsgiving] also.'
  '8':
  - type: text
    content: ' I give this not as an order [to dictate to you], but to prove, by [pointing out] the zeal of others, the sincerity of your [own] love also.'
  '9':
  - type: text
    content: ' For you are becoming progressively acquainted with '
  - type: text
    content: and
  - type: text
    content: ' recognizing more strongly '
  - type: text
    content: and
  - type: text
    content: ' clearly the grace of our Lord Jesus Christ (His kindness, His gracious generosity, His undeserved favor and spiritual blessing), [in] that though He was [so very] rich, yet for your sakes He became [so very] poor, in order that by His poverty you might become enriched (abundantly supplied).'
