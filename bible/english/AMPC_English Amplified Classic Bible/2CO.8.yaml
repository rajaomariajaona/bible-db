document_id: 2CO.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WE WANT to tell you further, brethren, about the grace (the favor and spiritual blessing) of God which has been evident in the churches of Macedonia [arousing in them the desire to give alms];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For in the midst of an ordeal of severe tribulation, their abundance of joy and their depth of poverty [together] have overflowed in wealth of lavish generosity on their part.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For, as I can bear witness, [they gave] according to their ability, yes, and beyond their ability; and [they did it] voluntarily,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Begging us most insistently for the favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the fellowship of contributing in this ministration for [the relief and support of] the saints [in Jerusalem].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Nor [was this gift of theirs merely the contribution] that we expected, but first they gave themselves to the Lord and to us [as His agents] by the will of God [entirely disregarding their personal interests, they gave as much as they possibly could, having put themselves at our disposal to be directed by the will of God]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So much so that we have urged Titus that as he began it, he should also complete this beneficent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gracious contribution among you [the church at Corinth].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now as you abound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are at the front in everything–in faith, in expressing yourselves, in knowledge, in all zeal, and in your love for us–[see to it that you come to the front now and] abound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excel in this gracious work [of almsgiving] also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I give this not as an order [to dictate to you], but to prove, by [pointing out] the zeal of others, the sincerity of your [own] love also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For you are becoming progressively acquainted with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognizing more strongly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clearly the grace of our Lord Jesus Christ (His kindness, His gracious generosity, His undeserved favor and spiritual blessing), [in] that though He was [so very] rich, yet for your sakes He became [so very] poor, in order that by His poverty you might become enriched (abundantly supplied).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' [It is then] my counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my opinion in this matter that I give [you when I say]: It is profitable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fitting for you [now to complete the enterprise] which more than a year ago you not only began, but were the first to wish to do anything [about contributions for the relief of the saints at Jerusalem].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So now finish doing it, that your [enthusiastic] readiness in desiring it may be equalled by your completion of it according to your ability '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' means.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For if the [eager] readiness to give is there, then it is acceptable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed in proportion to what a person has, not according to what he does not have.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For it is not [intended] that other people be eased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relieved [of their responsibility] and you be burdened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer [unfairly],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But to have equality [share and share alike], your surplus over necessity at the present time going to meet their want '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to equalize the difference created by it, so that [at some other time] their surplus in turn may be given to supply your want. Thus there may be equality,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' As it is written, He who gathered much had nothing over, and he who gathered little did not lack. [Exod. 16:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But thanks be to God Who planted the same earnest zeal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' care for you in the heart of Titus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For he not only welcomed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' responded to our appeal, but was himself so keen in his enthusiasm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' interest in you that he is going to you of his own accord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But we are sending along with him that brother [Luke?] whose praise in the Gospel ministry [is spread] throughout all the churches;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And more than that, he has been appointed by the churches to travel as our companion in regard to this bountiful contribution which we are administering for the glory of the Lord Himself and [to show] our eager readiness [as Christians to help one another].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' [For] we are on our guard, intending that no one should find anything for which to blame us in regard to our administration of this large contribution.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For we take thought beforehand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' aim to be honest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' absolutely above suspicion, not only in the sight of the Lord but also in the sight of men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Moreover, along with them we are sending our brother, whom we have often put to the test and have found him zealous (devoted and earnest) in many matters, but who is now more [eagerly] earnest than ever because of [his] absolute confidence in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' As for Titus, he is my colleague and shares my work in your service; and as for the [other two] brethren, they are the [special] messengers of the churches, a credit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory to Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Show to these men, therefore, in the sight of the churches, the reality '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plain truth of your love (your affection, goodwill, and benevolence) and what [good reasons] I had for boasting about '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' being proud of you.'
