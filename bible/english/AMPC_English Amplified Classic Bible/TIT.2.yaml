document_id: TIT.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' BUT [as for] you, teach what is fitting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' becoming to sound (wholesome) doctrine [the character and right living that identify true Christians].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Nor to steal by taking things of small value, but to prove themselves truly loyal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' entirely reliable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithful throughout, so that in everything they may be an ornament '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do credit to the teaching [which is] from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' about God our Savior.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For the grace of God (His unmerited favor and blessing) has come forward (appeared) for the deliverance from sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the eternal salvation for all mankind.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' It has trained us to reject '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' renounce all ungodliness (irreligion) and worldly (passionate) desires, to live discreet (temperate, self-controlled), upright, devout (spiritually whole) lives in this present world,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Awaiting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' looking for the [fulfillment, the realization of our] blessed hope, even the glorious appearing of our great God and Savior Christ Jesus (the Messiah, the Anointed One),'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Who gave Himself on our behalf that He might redeem us (purchase our freedom) from all iniquity and purify for Himself a people [to be peculiarly His own, people who are] eager '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enthusiastic about [living a life that is good and filled with] beneficial deeds. [Deut. 14:2; Ps. 130:8; Ezek. 37:23.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Tell [them all] these things. Urge (advise, encourage, warn) and rebuke with full authority. Let no one despise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' disregard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' think little of you [conduct yourself and your teaching so as to command respect].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Urge the older men to be temperate, venerable (serious), sensible, self-controlled, and sound in the faith, in the love, and in the steadfastness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' patience [of Christ].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Bid the older women similarly to be reverent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devout in their deportment as becomes those engaged in sacred service, not slanderers or slaves to drink. They are to give good counsel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be teachers of what is right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' noble,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' So that they will wisely train the young women to be sane and sober of mind (temperate, disciplined) and to love their husbands and their children,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' To be self-controlled, chaste, homemakers, good-natured (kindhearted), adapting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' subordinating themselves to their husbands, that the word of God may not be exposed to reproach (blasphemed or discredited).'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' In a similar way, urge the younger men to be self-restrained '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to behave prudently [taking life seriously].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And show your own self in all respects to be a pattern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a model of good deeds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' works, teaching what is unadulterated, showing gravity [having the strictest regard for truth and purity of motive], with dignity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seriousness.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And let your instruction be sound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wholesome, vigorous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' irrefutable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' above censure, so that the opponent may be put to shame, finding nothing discrediting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' evil to say about us.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' [Tell] bond servants to be submissive to their masters, to be pleasing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give satisfaction in every way. [Warn them] not to talk back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' contradict,'
