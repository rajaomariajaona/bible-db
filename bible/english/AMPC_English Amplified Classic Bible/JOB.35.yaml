document_id: JOB.35
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ELIHU SPOKE further [to Job] and said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Do you think this is your right, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' are you saying, My righteousness is more than God''s,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' That you ask, What advantage have you? How am I profited more than if I had sinned?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I will answer you and your companions with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Look to the heavens and see; and behold the skies which are higher than you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' If you have sinned, how does that affect God? And if your transgressions are multiplied, what have you done to Him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' If you are righteous, what do you [by that] give God? Or what does He receive from your hand?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Your wickedness touches and affects a man such as you are, and your righteousness is for yourself, one of the human race [but it cannot touch God, Who is above such influence].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Because of the multitudes of oppressions the people cry out; they cry for help because of the violence of the mighty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But no one says, Where is God my Maker, Who gives songs of rejoicing in the night, [Acts 16:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Who teaches us more than the beasts of the earth and makes us wiser than the birds of the heavens?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' [The people] cry out because of the pride of evil men, but He does not answer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Surely God will refuse to answer [the cry which is] vanity (vain and empty–instead of abiding trust); neither will the Almighty regard it–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' How much less when [missing His righteous judgment on earth] you say that you do not see Him, that your cause is before Him, and you are waiting for Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But now because God has not [speedily] punished in His anger and seems to be unaware of the wrong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppression [of which a person is guilty],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Job uselessly opens his mouth and multiplies words without knowledge [drawing the worthless conclusion that the righteous have no more advantage than the wicked].'
