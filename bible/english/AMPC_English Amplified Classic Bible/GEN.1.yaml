document_id: GEN.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' IN THE beginning God (prepared, formed, fashioned, and) created the heavens and the earth. [Heb. 11:3.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God called the dry land Earth, and the accumulated waters He called Seas. And God saw that this was good (fitting, admirable) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He approved it.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God said, Let the earth put forth [tender] vegetation: plants yielding seed and fruit trees yielding fruit whose seed is in itself, each according to its kind, upon the earth. And it was so.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The earth brought forth vegetation: plants yielding seed according to their own kinds and trees bearing fruit in which was their seed, each according to its kind. And God saw that it was good (suitable, admirable) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He approved it.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there was evening and there was morning, a third day.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God said, Let there be lights in the expanse of the heavens to separate the day from the night, and let them be signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tokens [of God''s provident care], and [to mark] seasons, days, and years, [Gen. 8:22.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And let them be lights in the expanse of the sky to give light upon the earth. And it was so.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God made the two great lights–the greater light (the sun) to rule the day and the lesser light (the moon) to rule the night. He also made the stars.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God set them in the expanse of the heavens to give light upon the earth,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To rule over the day and over the night, and to separate the light from the darkness. And God saw that it was good (fitting, pleasant) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He approved it.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there was evening and there was morning, a fourth day.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The earth was without form and an empty waste, and darkness was upon the face of the very great deep. The Spirit of God was moving (hovering, brooding) over the face of the waters.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God said, Let the waters bring forth abundantly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swarm with living creatures, and let birds fly over the earth in the open expanse of the heavens.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God created the great sea monsters and every living creature that moves, which the waters brought forth abundantly, according to their kinds, and every winged bird according to its kind. And God saw that it was good (suitable, admirable) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He approved it.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God blessed them, saying, Be fruitful, multiply, and fill the waters in the seas, and let the fowl multiply in the earth.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there was evening and there was morning, a fifth day.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God said, Let the earth bring forth living creatures according to their kinds: livestock, creeping things, and [wild] beasts of the earth according to their kinds. And it was so.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God made the [wild] beasts of the earth according to their kinds, and domestic animals according to their kinds, and everything that creeps upon the earth according to its kind. And God saw that it was good (fitting, pleasant) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He approved it.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God said, Let Us [Father, Son, and Holy Spirit] make mankind in Our image, after Our likeness, and let them have complete authority over the fish of the sea, the birds of the air, the [tame] beasts, and over all of the earth, and over everything that creeps upon the earth. [Ps. 104:30; Heb. 1:2; 11:3.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So God created man in His own image, in the image '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' likeness of God He created him; male and female He created them. [Col. 3:9, 10; James 3:8, 9.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God blessed them and said to them, Be fruitful, multiply, and fill the earth, and subdue it [using all its vast resources in the service of God and man]; and have dominion over the fish of the sea, the birds of the air, and over every living creature that moves upon the earth.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God said, See, I have given you every plant yielding seed that is on the face of all the land and every tree with seed in its fruit; you shall have them for food.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God said, Let there be light; and there was light.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And to all the animals on the earth and to every bird of the air and to everything that creeps on the ground–to everything in which there is the breath of life–I have given every green plant for food. And it was so.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God saw everything that He had made, and behold, it was very good (suitable, pleasant) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He approved it completely. And there was evening and there was morning, a sixth day.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God saw that the light was good (suitable, pleasant) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He approved it; and God separated the light from the darkness. [II Cor. 4:6.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God called the light Day, and the darkness He called Night. And there was evening and there was morning, one day.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God said, Let there be a firmament [the expanse of the sky] in the midst of the waters, and let it separate the waters [below] from the waters [above].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God made the firmament [the expanse] and separated the waters which were under the expanse from the waters which were above the expanse. And it was so.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God called the firmament Heavens. And there was evening and there was morning, a second day.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And God said, Let the waters under the heavens be collected into one place [of standing], and let the dry land appear. And it was so.'
