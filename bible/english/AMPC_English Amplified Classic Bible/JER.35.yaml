document_id: JER.35,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD that came to Jeremiah from the Lord in the days of Jehoiakim son of Josiah king of Judah:'
  '10':
  - type: text
    content: ' But we have dwelt in tents and have obeyed and done according to all that Jonadab our ancestor commanded us.'
  '11':
  - type: text
    content: ' But when Nebuchadrezzar king of Babylon came up against the land, we said, Come and let us go to Jerusalem for fear of the army of the Chaldeans and the army of the Syrians. So we are living in Jerusalem.'
  '12':
  - type: text
    content: ' Then came the word of the Lord to Jeremiah:'
  '13':
  - type: text
    content: ' Thus says the Lord of hosts, the God of Israel: Go and say to the men of Judah and the inhabitants of Jerusalem, Will you not receive instruction and listen to My words '
  - type: text
    content: and
  - type: text
    content: ' obey them? says the Lord.'
  '14':
  - type: text
    content: ' The command which Jonadab son of Rechab gave to his sons not to drink wine, has been carried out '
  - type: text
    content: and
  - type: text
    content: ' established [as a custom for more than two hundred years]. To this day they drink no wine, but they have obeyed their father''s command. But I, even I, have persistently spoken to you, but you have not listened to '
  - type: text
    content: and
  - type: text
    content: ' obeyed Me.'
  '15':
  - type: text
    content: ' I have sent also to you all My servants the prophets earnestly '
  - type: text
    content: and
  - type: text
    content: ' persistently, saying, Return now every man from his evil way and amend your doings and go not after other gods to serve them; and then you shall dwell in the land which I have given to you and to your fathers. But you did not submit '
  - type: text
    content: and
  - type: text
    content: ' consent to Me or listen to '
  - type: text
    content: and
  - type: text
    content: ' obey Me.'
  '16':
  - type: text
    content: ' Since the sons of Jonadab son of Rechab have fulfilled '
  - type: text
    content: and
  - type: text
    content: ' established the command of their father which he commanded them, but these people have not listened to and obeyed Me,'
  '17':
  - type: text
    content: ' Therefore thus says the Lord God of hosts, the God of Israel: Behold, I am bringing upon Judah and all the inhabitants of Jerusalem all the evil that I have pronounced against them, because I have spoken to them, but they have not listened, and I have called to them, but they have not answered.'
  '18':
  - type: text
    content: ' And Jeremiah said to the house of the Rechabites, Thus says the Lord of hosts, the God of Israel: Because you have obeyed the command of Jonadab your father and have kept all his precepts and have done according to all that he commanded you,'
  '19':
  - type: text
    content: ' Therefore thus says the Lord of hosts, the God of Israel: Jonadab son of Rechab shall never fail [to have] a man [descendant] to stand before Me.'
  '2':
  - type: text
    content: ' Go to the house of the Rechabites and speak to them and bring them into the house of the Lord, into one of the chambers; then give them [who are pledged to drink no wine] some wine to drink.'
  '3':
  - type: text
    content: ' So I took Jaazaniah son of Jeremiah, the son of Habazziniah, and his brothers and all his sons, and the whole house of the Rechabites,'
  '4':
  - type: text
    content: ' And I brought them into the house of the Lord, into the chamber of the sons of Hanan son of Igdaliah the man of God, which was by the chamber of the princes, above the chamber of Maaseiah son of Shallum the keeper of the door.'
  '5':
  - type: text
    content: ' And I set before the sons of the house of the Rechabites pitchers full of wine, and cups, and I said to them, Drink wine.'
  '6':
  - type: text
    content: ' But they said, We will drink no wine, for Jonadab son of Rechab, our father, commanded us: You shall not drink wine, neither you nor your sons, forever.'
  '7':
  - type: text
    content: ' Neither shall you build a house or sow seed or plant a vineyard or have them; but you shall dwell all your days in tents, that you may live many days in the land where you are temporary residents.'
  '8':
  - type: text
    content: ' And we have obeyed the voice of Jonadab son of Rechab, our father, in all that he charged us, to drink no wine all our days–we, our wives, our sons, and our daughters–'
  '9':
  - type: text
    content: ' And not to build ourselves houses to live in; nor do we have vineyard or field or seed.'
