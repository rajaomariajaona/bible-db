document_id: 1PE.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN LIKE manner, you married women, be submissive to your own husbands [subordinate yourselves as being secondary to and dependent on them, and adapt yourselves to them], so that even if any do not obey the Word [of God], they may be won over not by discussion but by the [godly] lives of their wives,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' When they observe the pure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' modest way in which you conduct yourselves, together with your reverence [for your husband; you are to feel for him all that reverence includes: to respect, defer to, revere him–to honor, esteem, appreciate, prize, and, in the human sense, to adore him, that is, to admire, praise, be devoted to, deeply love, and enjoy your husband].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Let not yours be the [merely] external adorning with [elaborate] interweaving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knotting of the hair, the wearing of jewelry, or changes of clothes;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But let it be the inward adorning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beauty of the hidden person of the heart, with the incorruptible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unfading charm of a gentle and peaceful spirit, which [is not anxious or wrought up, but] is very precious in the sight of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For it was thus that the pious women of old who hoped in God were [accustomed] to beautify themselves and were submissive to their husbands [adapting themselves to them as themselves secondary and dependent upon them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' It was thus that Sarah obeyed Abraham [following his guidance and acknowledging his headship over her by] calling him lord (master, leader, authority). And you are now her true daughters if you do right and let nothing terrify you [not giving way to hysterical fears or letting anxieties unnerve you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' In the same way you married men should live considerately with [your wives], with an intelligent recognition [of the marriage relation], honoring the woman as [physically] the weaker, but [realizing that you] are joint heirs of the grace (God''s unmerited favor) of life, in order that your prayers may not be hindered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cut off. [Otherwise you cannot pray effectively.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Finally, all [of you] should be of one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the same mind (united in spirit), sympathizing [with one another], loving [each other] as brethren [of one household], compassionate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' courteous (tenderhearted and humble).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Never return evil for evil or insult for insult (scolding, tongue-lashing, berating), but on the contrary blessing [praying for their welfare, happiness, and protection, and truly pitying and loving them]. For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: know that
  - type: text
    text: ' to this you have been called, that you may yourselves inherit a blessing [from God–that you may obtain a blessing as heirs, bringing welfare and happiness and protection].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For let him who wants to enjoy life and see good days [good–whether apparent or not] keep his tongue free from evil and his lips from guile (treachery, deceit).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Let him turn away from wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shun it, and let him do right. Let him search for peace (harmony; undisturbedness from fears, agitating passions, and moral conflicts) and seek it eagerly. [Do not merely desire peaceful relations with God, with your fellowmen, and with yourself, but pursue, go after them!]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For the eyes of the Lord are upon the righteous (those who are upright and in right standing with God), and His ears are attentive to their prayer. But the face of the Lord is against those who practice evil [to oppose them, to frustrate, and defeat them]. [Ps. 34:12-16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Now who is there to hurt you if you are zealous followers of that which is good?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But even in case you should suffer for the sake of righteousness, [you are] blessed (happy, to be envied). Do not dread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' be afraid of their threats, nor be disturbed [by their opposition].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But in your hearts set Christ apart as holy [and acknowledge Him] as Lord. Always be ready to give a logical defense to anyone who asks you to account for the hope that is in you, but do it courteously and respectfully. [Isa. 8:12, 13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [And see to it that] your conscience is entirely clear (unimpaired), so that, when you are falsely accused as evildoers, those who threaten you abusively '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revile your right behavior in Christ may come to be ashamed [of slandering your good lives].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For [it is] better to suffer [unjustly] for doing right, if that should be God''s will, than to suffer [justly] for doing wrong.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For Christ [the Messiah Himself] died for sins once for all, the Righteous for the unrighteous (the Just for the unjust, the Innocent for the guilty), that He might bring us to God. In His human body He was put to death, but He was made alive in the spirit,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' In which He went and preached to the spirits in prison,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' [The souls of those] who long before in the days of Noah had been disobedient, when God''s patience waited during the building of the ark in which a few [people], actually eight in number, were saved through water. [Gen. 6-8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And baptism, which is a figure [of their deliverance], does now also save you [from inward questionings and fears], not by the removing of outward body filth [bathing], but by [providing you with] the answer of a good and clear conscience (inward cleanness and peace) before God [because you are demonstrating what you believe to be yours] through the resurrection of Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' [And He] has now entered into heaven and is at the right hand of God, with [all] angels and authorities and powers made subservient to Him.'
