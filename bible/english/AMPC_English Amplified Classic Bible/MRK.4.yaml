document_id: MRK.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AGAIN JESUS began to teach beside the lake. And a very great crowd gathered about Him, so that He got into a ship in order to sit in it on the sea, and the whole crowd was at the lakeside on the shore.'
  '10':
  - type: text
    content: ' And as soon as He was alone, those who were around Him, with the Twelve [apostles], began to ask Him about the parables.'
  '11':
  - type: text
    content: ' And He said to them, To you has been entrusted the mystery of the kingdom of God [that is, the secret counsels of God which are hidden from the ungodly]; but for those outside [of our circle] everything becomes a parable,'
  '12':
  - type: text
    content: ' In order that they may [indeed] look '
  - type: text
    content: and
  - type: text
    content: ' look but not see '
  - type: text
    content: and
  - type: text
    content: ' perceive, and may hear '
  - type: text
    content: and
  - type: text
    content: ' hear but not grasp '
  - type: text
    content: and
  - type: text
    content: ' comprehend, lest haply they should turn again, and it [their willful rejection of the truth] should be forgiven them. [Isa. 6:9, 10; Matt. 13:13-15.]'
  '13':
  - type: text
    content: ' And He said to them, Do you not discern '
  - type: text
    content: and
  - type: text
    content: ' understand this parable? How then is it possible for you to discern '
  - type: text
    content: and
  - type: text
    content: ' understand all the parables?'
  '14':
  - type: text
    content: ' The sower sows the Word.'
  '15':
  - type: text
    content: ' The ones along the path are those who have the Word sown [in their hearts], but when they hear, Satan comes at once and [by force] takes away the message which is sown in them.'
  '16':
  - type: text
    content: ' And in the same way the ones sown upon stony ground are those who, when they hear the Word, at once receive '
  - type: text
    content: and
  - type: text
    content: ' accept '
  - type: text
    content: and
  - type: text
    content: ' welcome it with joy;'
  '17':
  - type: text
    content: ' And they have no real root in themselves, and so they endure for a little while; then when trouble or persecution arises on account of the Word, they immediately are offended (become displeased, indignant, resentful) '
  - type: text
    content: and
  - type: text
    content: ' they stumble '
  - type: text
    content: and
  - type: text
    content: ' fall away.'
  '18':
  - type: text
    content: ' And the ones sown among the thorns are others who hear the Word;'
  '19':
  - type: text
    content: ' Then the cares '
  - type: text
    content: and
  - type: text
    content: ' anxieties of the world '
  - type: text
    content: and
  - type: text
    content: ' distractions of the age, and the pleasure '
  - type: text
    content: and
  - type: text
    content: ' delight '
  - type: text
    content: and
  - type: text
    content: ' false glamour '
  - type: text
    content: and
  - type: text
    content: ' deceitfulness of riches, and the craving '
  - type: text
    content: and
  - type: text
    content: ' passionate desire for other things creep in and choke '
  - type: text
    content: and
  - type: text
    content: ' suffocate the Word, and it becomes fruitless.'
  '2':
  - type: text
    content: ' And He taught them many things in parables (illustrations or comparisons put beside truths to explain them), and in His teaching He said to them:'
  '20':
  - type: text
    content: ' And those sown on the good (well-adapted) soil are the ones who hear the Word and receive '
  - type: text
    content: and
  - type: text
    content: ' accept '
  - type: text
    content: and
  - type: text
    content: ' welcome it and bear fruit–some thirty times as much as was sown, some sixty times as much, and some [even] a hundred times as much.'
  '21':
  - type: text
    content: ' And He said to them, Is the lamp brought in to be put under a peck measure or under a bed, and not [to be put] on the lampstand?'
  '22':
  - type: text
    content: ' [Things are hidden temporarily only as a means to revelation.] For there is nothing hidden except to be revealed, nor is anything [temporarily] kept secret except in order that it may be made known.'
  '23':
  - type: text
    content: ' If any man has ears to hear, let him be listening '
  - type: text
    content: and
  - type: text
    content: ' let him perceive '
  - type: text
    content: and
  - type: text
    content: ' comprehend.'
  '24':
  - type: text
    content: ' And He said to them, Be careful what you are hearing. The measure [of thought and study] you give [to the truth you hear] will be the measure [of virtue and knowledge] that comes back to you–and more [besides] will be given to you '
  - type: text
    content: who hear.
  '25':
  - type: text
    content: ' For to him who has will more be given; and from him who has nothing, even what he has will be taken away [by force],'
  '26':
  - type: text
    content: ' And He said, The kingdom of God is like a man who scatters seed upon the ground,'
  '27':
  - type: text
    content: ' And then continues sleeping and rising night and day while the seed sprouts and grows '
  - type: text
    content: and
  - type: text
    content: ' increases–he knows not how.'
  '28':
  - type: text
    content: ' The earth produces [acting] by itself–first the blade, then the ear, then the full grain in the ear.'
  '29':
  - type: text
    content: ' But when the grain is ripe '
  - type: text
    content: and
  - type: text
    content: ' permits, immediately he sends forth [the reapers] '
  - type: text
    content: and
  - type: text
    content: ' puts in the sickle, because the harvest stands ready.'
  '3':
  - type: text
    content: ' Give attention to this! Behold, a sower went out to sow.'
  '30':
  - type: text
    content: ' And He said, With what can we compare the kingdom of God, or what parable shall we use to illustrate '
  - type: text
    content: and
  - type: text
    content: ' explain it?'
  '31':
  - type: text
    content: ' It is like a grain of mustard seed, which, when sown upon the ground, is the smallest of all seeds upon the earth;'
  '32':
  - type: text
    content: ' Yet after it is sown, it grows up and becomes the greatest of all garden herbs and puts out large branches, so that the birds of the air are able to make nests '
  - type: text
    content: and
  - type: text
    content: ' dwell in its shade.'
  '33':
  - type: text
    content: ' With many such parables [Jesus] spoke the Word to them, as they were able to hear '
  - type: text
    content: and
  - type: text
    content: ' to comprehend '
  - type: text
    content: and
  - type: text
    content: ' understand.'
  '34':
  - type: text
    content: ' He did not tell them anything without a parable; but privately to His disciples (those who were peculiarly His own) He explained everything [fully].'
  '35':
  - type: text
    content: ' On that same day [when] evening had come, He said to them, Let us go over to the other side [of the lake].'
  '36':
  - type: text
    content: ' And leaving the throng, they took Him with them, [just] as He was, in the boat [in which He was sitting]. And other boats were with Him.'
  '37':
  - type: text
    content: ' And a furious storm of wind [of hurricane proportions] arose, and the waves kept beating into the boat, so that it was already becoming filled.'
  '38':
  - type: text
    content: ' But He [Himself] was in the stern [of the boat], asleep on the [leather] cushion; and they awoke Him and said to Him, Master, do You not care that we are perishing?'
  '39':
  - type: text
    content: ' And He arose and rebuked the wind and said to the sea, Hush now! Be still (muzzled)! And the wind ceased (sank to rest as if exhausted by its beating) and there was [immediately] a great calm (a perfect peacefulness).'
  '4':
  - type: text
    content: ' And as he was sowing, some seed fell along the path, and the birds came and ate it up.'
  '40':
  - type: text
    content: ' He said to them, Why are you so timid '
  - type: text
    content: and
  - type: text
    content: ' fearful? How is it that you have no faith (no firmly relying trust)?'
  '41':
  - type: text
    content: ' And they were filled with great awe '
  - type: text
    content: and
  - type: text
    content: ' feared exceedingly and said one to another, Who then is this, that even wind and sea obey Him?'
  '5':
  - type: text
    content: ' Other seed [of the same kind] fell on ground full of rocks, where it had not much soil; and at once it sprang up, because it had no depth of soil;'
  '6':
  - type: text
    content: ' And when the sun came up, it was scorched, and because it had not taken root, it withered away.'
  '7':
  - type: text
    content: ' Other seed [of the same kind] fell among thorn plants, and the thistles grew '
  - type: text
    content: and
  - type: text
    content: ' pressed together '
  - type: text
    content: and
  - type: text
    content: ' utterly choked '
  - type: text
    content: and
  - type: text
    content: ' suffocated it, and it yielded no grain.'
  '8':
  - type: text
    content: ' And other seed [of the same kind] fell into good (well-adapted) soil and brought forth grain, growing up and increasing, and yielded up to thirty times as much, and sixty times as much, and even a hundred times as much as had been sown.'
  '9':
  - type: text
    content: ' And He said, He who has ears to hear, let him be hearing [and let him consider, and comprehend].'
