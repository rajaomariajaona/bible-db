document_id: MRK.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AGAIN JESUS began to teach beside the lake. And a very great crowd gathered about Him, so that He got into a ship in order to sit in it on the sea, and the whole crowd was at the lakeside on the shore.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And as soon as He was alone, those who were around Him, with the Twelve [apostles], began to ask Him about the parables.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said to them, To you has been entrusted the mystery of the kingdom of God [that is, the secret counsels of God which are hidden from the ungodly]; but for those outside [of our circle] everything becomes a parable,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In order that they may [indeed] look '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' look but not see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perceive, and may hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hear but not grasp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehend, lest haply they should turn again, and it [their willful rejection of the truth] should be forgiven them. [Isa. 6:9, 10; Matt. 13:13-15.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said to them, Do you not discern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand this parable? How then is it possible for you to discern '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand all the parables?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sower sows the Word.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The ones along the path are those who have the Word sown [in their hearts], but when they hear, Satan comes at once and [by force] takes away the message which is sown in them.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And in the same way the ones sown upon stony ground are those who, when they hear the Word, at once receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome it with joy;'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they have no real root in themselves, and so they endure for a little while; then when trouble or persecution arises on account of the Word, they immediately are offended (become displeased, indignant, resentful) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' they stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall away.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the ones sown among the thorns are others who hear the Word;'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the cares '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anxieties of the world '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distractions of the age, and the pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' false glamour '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceitfulness of riches, and the craving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' passionate desire for other things creep in and choke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffocate the Word, and it becomes fruitless.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He taught them many things in parables (illustrations or comparisons put beside truths to explain them), and in His teaching He said to them:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And those sown on the good (well-adapted) soil are the ones who hear the Word and receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome it and bear fruit–some thirty times as much as was sown, some sixty times as much, and some [even] a hundred times as much.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said to them, Is the lamp brought in to be put under a peck measure or under a bed, and not [to be put] on the lampstand?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Things are hidden temporarily only as a means to revelation.] For there is nothing hidden except to be revealed, nor is anything [temporarily] kept secret except in order that it may be made known.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If any man has ears to hear, let him be listening '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' let him perceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehend.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said to them, Be careful what you are hearing. The measure [of thought and study] you give [to the truth you hear] will be the measure [of virtue and knowledge] that comes back to you–and more [besides] will be given to you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who hear.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For to him who has will more be given; and from him who has nothing, even what he has will be taken away [by force],'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said, The kingdom of God is like a man who scatters seed upon the ground,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And then continues sleeping and rising night and day while the seed sprouts and grows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' increases–he knows not how.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The earth produces [acting] by itself–first the blade, then the ear, then the full grain in the ear.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when the grain is ripe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' permits, immediately he sends forth [the reapers] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' puts in the sickle, because the harvest stands ready.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Give attention to this! Behold, a sower went out to sow.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said, With what can we compare the kingdom of God, or what parable shall we use to illustrate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' explain it?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It is like a grain of mustard seed, which, when sown upon the ground, is the smallest of all seeds upon the earth;'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet after it is sown, it grows up and becomes the greatest of all garden herbs and puts out large branches, so that the birds of the air are able to make nests '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dwell in its shade.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With many such parables [Jesus] spoke the Word to them, as they were able to hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to comprehend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He did not tell them anything without a parable; but privately to His disciples (those who were peculiarly His own) He explained everything [fully].'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On that same day [when] evening had come, He said to them, Let us go over to the other side [of the lake].'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And leaving the throng, they took Him with them, [just] as He was, in the boat [in which He was sitting]. And other boats were with Him.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And a furious storm of wind [of hurricane proportions] arose, and the waves kept beating into the boat, so that it was already becoming filled.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But He [Himself] was in the stern [of the boat], asleep on the [leather] cushion; and they awoke Him and said to Him, Master, do You not care that we are perishing?'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He arose and rebuked the wind and said to the sea, Hush now! Be still (muzzled)! And the wind ceased (sank to rest as if exhausted by its beating) and there was [immediately] a great calm (a perfect peacefulness).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And as he was sowing, some seed fell along the path, and the birds came and ate it up.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said to them, Why are you so timid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fearful? How is it that you have no faith (no firmly relying trust)?'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they were filled with great awe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feared exceedingly and said one to another, Who then is this, that even wind and sea obey Him?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Other seed [of the same kind] fell on ground full of rocks, where it had not much soil; and at once it sprang up, because it had no depth of soil;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when the sun came up, it was scorched, and because it had not taken root, it withered away.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Other seed [of the same kind] fell among thorn plants, and the thistles grew '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pressed together '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' utterly choked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffocated it, and it yielded no grain.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And other seed [of the same kind] fell into good (well-adapted) soil and brought forth grain, growing up and increasing, and yielded up to thirty times as much, and sixty times as much, and even a hundred times as much as had been sown.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said, He who has ears to hear, let him be hearing [and let him consider, and comprehend].'
