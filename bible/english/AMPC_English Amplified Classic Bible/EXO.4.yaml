document_id: EXO.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND MOSES answered, But behold, they will not believe me or listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey my voice; for they will say, The Lord has not appeared to you.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses said to the Lord, O Lord, I am not eloquent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a man of words, neither before nor since You have spoken to Your servant; for I am slow of speech and have a heavy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awkward tongue.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to him, Who has made man''s mouth? Or who makes the dumb, or the deaf, or the seeing, or the blind? Is it not I, the Lord?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now therefore go, and I will be with your mouth and will teach you what you shall say.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he said, Oh, my Lord, I pray You, send by the hand of [some other] whom You will [send].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the anger of the Lord blazed against Moses; He said, Is there not Aaron your brother, the Levite? I know he can speak well. Also, he is coming out to meet you, and when he sees you, he will be overjoyed.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You must speak to him and put the words in his mouth; and I will be with your mouth and with his mouth and will teach you what you shall do.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He shall speak for you to the people, acting as a mouthpiece for you, and you shall be as God to him.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall take this rod in your hand with which you shall work the signs [that prove I sent you].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses went away and, returning to Jethro his father-in-law, said to him, Let me go back, I pray you, to my relatives in Egypt to see whether they are still alive. And Jethro said to Moses, Go in peace.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord said to Moses in Midian, Go back to Egypt; for all the men who were seeking your life [for killing the Egyptian] are dead. [Exod. 2:11, 12.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to him, What is that in your hand? And he said, A rod.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses took his wife and his sons and set them on donkeys, and he returned to the land of Egypt; and Moses took the rod of God in his hand.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses, When you return into Egypt, see that you do before Pharaoh all those miracles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonders which I have put in your hand; but I will make him stubborn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' harden his heart, so that he will not let the people go.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall say to Pharaoh, Thus says the Lord, Israel is My son, even My firstborn.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I say to you, Let My son go, that he may serve Me; and if you refuse to let him go, behold, I will slay your son, your firstborn.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Along the way at a [resting-] place, the Lord met [Moses] and sought to kill him [made him acutely and almost fatally ill].'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Now apparently he had failed to circumcise one of his sons, his wife being opposed to it; but seeing his life in such danger] Zipporah took a flint knife and cut off the foreskin of her son and cast it to touch [Moses''] feet, and said, Surely a husband of blood you are to me!'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When He let [Moses] alone [to recover], Zipporah said, A husband of blood are you because of the circumcision.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord said to Aaron, Go into the wilderness to meet Moses. And he went, and met him in the mountain of God [Horeb, or Sinai] and kissed him.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses told Aaron all the words of the Lord with which He had sent him, and all the signs with which He had charged him.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses and Aaron went and gathered together [in Egypt] all the elders of the Israelites.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He said, Cast it on the ground. And he did so and it became a serpent [the symbol of royal and divine power worn on the crown of the Pharaohs]; and Moses fled from before it.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Aaron spoke all the words which the Lord had spoken to Moses, and did the signs in the sight of the people.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the people believed; and when they heard that the Lord had visited the Israelites, and that He had looked [in compassion] upon their affliction, they bowed their heads and worshiped.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Moses, Put forth your hand and take it by the tail. And he stretched out his hand and caught it, and it became a rod in his hand,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [This you shall do, said the Lord] that the elders may believe that the Lord, the God of their fathers, of Abraham, of Isaac, and of Jacob, has indeed appeared to you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Lord said also to him, Put your hand into your bosom. He put his hand into his bosom, and when he took it out, behold, his hand was leprous, as white as snow.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [God] said, Put your hand into your bosom again. So he put his hand back into his bosom, and when he took it out, behold, it was restored as the rest of his flesh.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Then God said] If they will not believe you or heed the voice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' the testimony of the first sign, they may believe the voice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' the witness of the second sign.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if they will also not believe these two signs or heed your voice, you shall take some water of the river [Nile] and pour it upon the dry land; and the water which you take out of the river [Nile] shall become blood on the dry land.'
