document_id: PSA.93
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' reigns, He is clothed with majesty; the Lord is robed, He has girded Himself with strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power; the world also is established, that it cannot be moved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Your throne is established from of old; You are from everlasting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The floods have lifted up, O Lord, the floods have lifted up their voice; the floods lift up the roaring of their waves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The Lord on high is mightier '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more glorious than the noise of many waters, yes, than the mighty breakers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' waves of the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Your testimonies are very sure; holiness [apparent in separation from sin, with simple trust and hearty obedience] is becoming to Your house, O Lord, forever.'
