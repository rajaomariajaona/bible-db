document_id: PSA.121,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents.
  - type: text
    content: ' I WILL lift up my eyes to the hills [around Jerusalem, to sacred Mount Zion and Mount Moriah]–From whence shall my help come? [Jer. 3:23.]'
  '2':
  - type: text
    content: ' My help comes from the Lord, Who made heaven and earth.'
  '3':
  - type: text
    content: ' He will not allow your foot to slip '
  - type: text
    content: or
  - type: text
    content: ' to be moved; He Who keeps you will not slumber. [I Sam. 2:9; Ps. 127:1; Prov. 3:23, 26; Isa. 27:3.]'
  '4':
  - type: text
    content: ' Behold, He who keeps Israel will neither slumber nor sleep.'
  '5':
  - type: text
    content: ' The Lord is your keeper; the Lord is your shade on your right hand [the side not carrying a shield]. [Isa. 25:4.]'
  '6':
  - type: text
    content: ' The sun shall not smite you by day, nor the moon by night. [Ps. 91:5; Isa. 49:10; Rev. 7:16.]'
  '7':
  - type: text
    content: ' The Lord will keep you from all evil; He will keep your life.'
  '8':
  - type: text
    content: ' The Lord will keep your going out and your coming in from this time forth and forevermore. [Deut. 28:6; Prov. 2:8; 3:6.]'
