document_id: PSA.121
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Song of Ascents.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I WILL lift up my eyes to the hills [around Jerusalem, to sacred Mount Zion and Mount Moriah]–From whence shall my help come? [Jer. 3:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' My help comes from the Lord, Who made heaven and earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He will not allow your foot to slip '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to be moved; He Who keeps you will not slumber. [I Sam. 2:9; Ps. 127:1; Prov. 3:23, 26; Isa. 27:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Behold, He who keeps Israel will neither slumber nor sleep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The Lord is your keeper; the Lord is your shade on your right hand [the side not carrying a shield]. [Isa. 25:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The sun shall not smite you by day, nor the moon by night. [Ps. 91:5; Isa. 49:10; Rev. 7:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The Lord will keep you from all evil; He will keep your life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The Lord will keep your going out and your coming in from this time forth and forevermore. [Deut. 28:6; Prov. 2:8; 3:6.]'
