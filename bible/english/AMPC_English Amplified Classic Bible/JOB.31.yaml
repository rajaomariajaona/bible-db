document_id: JOB.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I DICTATED a covenant (an agreement) to my eyes; how then could I look [lustfully] upon a girl?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For what portion should I have from God above [if I were lewd], and what heritage from the Almighty on high?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Does not calamity [justly] befall the unrighteous, and disaster the workers of iniquity?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Does not [God] see my ways and count all my steps?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' If I have walked with falsehood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vanity, or if my foot has hastened to deceit–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Oh, let me be weighed in a just balance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' let Him weigh me, that God may know my integrity!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' If my step has turned out of [God''s] way, and my heart has gone the way my eyes [covetously] invited, and if any spot has stained my hands with guilt,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then let me sow and let another eat; yes, let the produce of my field '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' my offspring be rooted out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' If my heart has been deceived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I made a fool by a woman, or if I have [covetously] laid wait at my neighbor''s door [until his departure],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then let my wife grind [meal, like a bondslave] for another, and let others bow down upon her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For [adultery] is a heinous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chief crime, an iniquity [to demand action by] the judges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishment. [Deut. 22:22; John 8:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For [uncontrolled passion] is a fire which consumes to Abaddon (to destruction, ruin, and the place of final torment); [that fire once lighted would rage until all is consumed] and would burn to the root all my [life''s] increase.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' If I have despised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected the cause of my manservant or my maidservant when they contended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' brought a complaint against me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' What then shall I do when God rises up [to judge]? When He visits [to inquire of me], what shall I answer Him? [Ps. 44:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Did not He Who made me in the womb make [my servant]? And did not One fashion us both in the womb? [Prov. 14:31; 22:2; Mal. 2:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' If I have withheld from the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' needy what they desired, or have caused the eyes of the widow to look in vain [for relief],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Or have eaten my morsel alone and have not shared it with the fatherless–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' No, but from my youth [the fatherless] grew up with me as a father, and I have been [the widow''s] guide from my mother''s womb–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' If I have seen anyone perish for want of clothing, or any poor person without covering,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' If his loins have not blessed me [for clothing them], and if he was not warmed with the fleece of my sheep,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' If I have lifted my hand against the fatherless when I saw [that the judges would be favorable and be] my help at the [council] gate,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then let my shoulder fall away from my shoulder blade, and my arm be broken from its socket.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For calamity from God was a terror to me, and because of His majesty I could not endure [to face Him] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' could do nothing. [Isa. 13:6; Joel 1:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' If I have made gold my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope or have said to fine gold, You are my confidence,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' If I rejoiced because my wealth was great and because my [powerful] hand [alone] had gotten much,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' If I beheld [as an object of worship] the sunlight when it shone or the moon walking in its brightness,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And my heart has been secretly enticed by them or my mouth has kissed my hand [in homage to them],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' This also would have been [a heinous and principal] iniquity to demand the judges'' action '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishment, for I would have denied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' been false to the God Who is above. [Deut. 4:19; 17:2-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' If I rejoiced at the destruction of him who hated me or lifted myself up [in malicious triumph] when evil overtook him–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' No, I have let my mouth sin neither by cursing my enemy nor by praying that he might die–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' [Just ask] if the men of my tent will not say, Who can find one in need who has not been satisfied with food he gave them?–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' The temporary resident has not lodged in the street, but I have opened my door to the wayfaring man–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' If like Adam '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' like [other] men I have concealed my transgressions, by hiding my iniquity in my bosom'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Because I feared the great multitude and the contempt of families terrified me so that I kept silence and did not go out of the door–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Oh, for a hearing! Oh, for an answer from the Almighty! Let my adversary write out His indictment [and put His vague accusations in tangible form] in a book!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Surely I would [proudly] bear it on my shoulder and wind the scroll about my head as a diadem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' I would count out to Him the number of my steps [with every detail of my life], approaching His presence as a prince–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' For if my land has cried out against me and its furrows have complained together with tears [that I have no right to them],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' If I have eaten its fruits without paying for them or have caused its [rightful] owners to breathe their last,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Let thistles grow instead of wheat and cockleburs instead of barley. The [controversial] words of Job [with his friends] are ended.'
