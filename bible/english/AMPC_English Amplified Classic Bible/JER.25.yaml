document_id: JER.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD that came to Jeremiah concerning all the people of Judah in the fourth year of the reign of Jehoiakim son of Josiah king of Judah–which was the first year of the reign of Nebuchadrezzar king of Babylon–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Which Jeremiah the prophet spoke to all the people of Judah and to all the inhabitants of Jerusalem:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For these twenty-three years–from the thirteenth year of Josiah son of Amon king of Judah, even to this day–the word of the Lord has come to me and I have spoken to you persistently early and late, but you have not listened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Although the Lord persistently sent you all the prophets, His servants, yet you have not listened and obeyed or [even] inclined your ear to hear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [The prophets came on My behalf] saying, Turn again now every one from his evil way and wrongdoing; [that you may not forfeit the right to] dwell in the land that the Lord gave to you and to your fathers from of old '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forevermore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Do not go after other gods to serve and worship them, and do not provoke Me to anger with the works of your hands. Then I will do you no harm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Yet you have not listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed Me, says the Lord, that you might provoke Me to anger with the works (idols) made by your hands to your own hurt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Therefore thus says the Lord of hosts: Because you have not heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed My words,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Behold, I will send for all the tribes of the north, says the Lord, and I will send for Nebuchadrezzar king of Babylon, My servant [or agent to fulfill My designs], and I will bring them against this land and its inhabitants and against all these nations round about; and I will devote them [to God] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' utterly destroy them and make them an amazement, a hissing, and perpetual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agelong desolations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Moreover, I will take from them the voice of mirth and the voice of gladness, the voice of the bridegroom and the voice of the bride, the sound of the millstones [grinding out the meal] and the light of the candle [which every home burned throughout the night]. [Jer. 7:34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And this whole land shall be a waste and an astonishment, and these nations shall serve the king of Babylon seventy years. [II Chron. 36:20-23; Jer. 4:27; 12:11, 12; Dan. 9:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then when seventy years are completed, I will punish the king of Babylon and that nation, the land of the Chaldeans, says the Lord, for their iniquity, and will make the land [of the Chaldeans] a perpetual waste. [Jer. 29:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And I will bring upon that land all My words which I have pronounced against it, even all that is written in this book, which Jeremiah has prophesied against all the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For many nations and great kings shall make bondmen of them, even them [the Chaldeans who enslaved other nations]; and I will recompense [all of] them according to their deeds and according to the work of their [own] hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For thus says the Lord, the God of Israel, to me: Take this cup of the wine of wrath from My hand and cause all the nations to whom I send you to drink it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They shall drink and reel to and fro and be crazed because of the sword that I will send among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then I [Jeremiah] took the cup from the Lord''s hand and made all the nations drink it to whom the Lord had sent me: [that is,]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Jerusalem and the cities of Judah [being most guilty because their privileges were greatest], its kings and princes, to make them a desolation, an astonishment, a hissing, and a curse, as it is to this day; [I Pet. 4:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Pharaoh king of Egypt, his servants, his princes, all his people,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And all the mixed foreign population; all the kings of the land of Uz; and all the kings of the land of the Philistines and [their cities of] Ashkelon, Gaza, Ekron, and the remnant of Ashdod;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Edom, Moab, and the children of Ammon;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' All the kings of Tyre, all the kings of Sidon, and the kings of the islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the coastlands across the [Mediterranean] Sea;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Dedan, Tema, Buz [neighboring tribes north of Arabia], and all who clip off the corners of their hair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beards; [Lev. 19:27; Jer. 9:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' All the kings of Arabia and all the kings of the mixed foreign people who dwell in the desert;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' All the kings of Zimri, all the kings of Elam (Persia), and all the kings of Media;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' All the kings of the north, far and near, one after another–and all the kingdoms of the world which are on the face of the earth. And after them the king of Sheshach (Babel or Babylon) shall drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then you shall say to them, Thus says the Lord of hosts, the God of Israel: Drink, be drunk, vomit, and fall to rise no more because of the sword which I am sending among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And if they refuse to take the cup from your hand to drink, then you shall say to them, Thus says the Lord of hosts: You shall surely drink!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' For behold, I am beginning to work evil in the city which is called by My Name, and shall you go unpunished? You shall not go unpunished, for I am calling for a sword against all the inhabitants of the earth, says the Lord of hosts. [Jer. 7:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Therefore prophesy against them all these words and say to them: The Lord shall roar from on high and utter His voice from His holy habitation; He shall roar mightily against His fold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasture. He shall give a shout like those who tread grapes [in the winepress, but His shout will be] against all the inhabitants of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' A noise will come even to the ends of the earth, for the Lord has a controversy and an indictment against the nations; He will enter into judgment with all mankind; as for the wicked, He will give them to the sword, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Thus says the Lord of hosts: Behold, evil will go forth from nation to nation, and a great whirling tempest will rise from the uttermost parts of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And those slain by the Lord shall be at that day from one end of the earth even to the other end of the earth. They shall not be lamented or gathered or buried; their [dead bodies] shall be dung upon the ground. [Jer. 8:2; 16:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Wail, you shepherds, and cry; and roll in ashes, you principal ones of the flock. For the days of your slaughter and of your dispersions have fully come, and you shall fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be dashed into pieces like a choice vessel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And the shepherds shall have no way to flee, nor the principal ones of the flock any means of escape.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' A voice! The cry of the shepherds and the wailing of the principal ones of the flock! For the Lord is laying waste '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroying their pasture.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And the peaceable folds are devastated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brought to silence because of the fierce anger of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' He has left His shelter like the lion; for their land has become a waste '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an astonishment because of the fierceness of the oppressor and because of [the Lord''s] fierce anger.'
