document_id: EZK.22,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' MOREOVER, THE word of the Lord came to me, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In you men have uncovered their fathers'' nakedness [the nakedness of mother or stepmother]; in you they have humbled women who are [ceremonially] unclean [during their periods or because of childbirth].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And one has committed abomination with his neighbor''s wife, another has lewdly defiled his daughter-in-law, and another in you has humbled his sister, his father''s daughter.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In you they have accepted bribes to shed blood; you have taken [forbidden] interest and [percentage of] increase, and you have greedily gained from your neighbors by oppression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extortion and have forgotten Me, says the Lord God.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold therefore, I have struck My hands together at your dishonest gain which you have made and at the blood which has been in the midst of you.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Can your heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' courage endure or can your hands be strong in the days that I shall deal with you? I the Lord have spoken it, and I will do it.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will scatter you among the nations and disperse you through the countries, and I will consume your filthiness out of you.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall be dishonored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profane yourself in the sight of the nations, and you shall know (understand and realize) that I am the Lord.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the word of the Lord came to me, saying,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Son of man, the house of Israel has become to Me scum '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' waste matter. All of them are bronze and tin and iron and lead in the midst of the furnace; they are the dross of silver.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore thus says the Lord God: Because you have all become scum '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' waste matter, behold therefore, I will gather you [O Israel] into the midst of Jerusalem.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you son of man [Ezekiel], will you judge, will you judge the bloodshedding city? Then cause her to know all her abominations,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As they gather silver and bronze and iron and lead and tin into the midst of the furnace, to blow the fire upon it in order to melt it, so will I gather you in My anger and in My wrath, and I will put you in and melt you.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yes, I will gather you and blow upon you with the fire of My wrath, and you shall be melted in the midst of it.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As silver is melted in the midst of the furnace, so shall you be melted in the midst of it, and you shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I the Lord have poured out My wrath upon you [O Israel].'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the word of the Lord came to me, saying,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Son of man, say to her, You are a land that is not cleansed nor rained upon in the day of indignation.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There is a conspiracy of [Israel''s false] prophets in the midst of her, like a roaring lion tearing the prey; they have devoured human lives; they have taken [in their greed] treasure and precious things; they have made many widows in the midst of her.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Her priests have done violence to My law and have profaned My holy things. They have made no distinction between the sacred and the secular, neither have they taught people the difference between the unclean and the clean and have hid their eyes from My Sabbaths, and I am profaned among them.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Her princes in the midst of her are like wolves rending '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devouring the prey, shedding blood and destroying lives to get dishonest gain.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And her prophets have daubed them over with whitewash, seeing false visions and divining lies to them, saying, Thus says the Lord God–when the Lord has not spoken.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The people of the land have used oppression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extortion and have committed robbery; yes, they have wronged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vexed the poor and needy; yes, they have oppressed the stranger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' temporary resident wrongfully.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And say, Thus says the Lord God: A city that sheds blood in the midst of her so that her time [of doom] will come, and makes idols [over those who worship them] to defile her!'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I sought a man among them who should build up the wall and stand in the gap before Me for the land, that I should not destroy it, but I found none.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore have I poured out My indignation upon them; I have consumed them with the fire of My wrath; their own way have I repaid [by bringing it] upon their own heads, says the Lord God.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In your blood which you have shed you have become guilty, and you are defiled by the idols which you have made, and you have caused your time [of judgment and punishment] to draw near and have arrived at the full measure of your years. Therefore have I made you a reproach to the [heathen] nations and a mocking to all countries.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Those who are near and those who are far from you will mock you, you infamous one, full of tumult.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, the princes of Israel in you, every one according to his power, have been intending to shed blood.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In you have they treated father and mother lightly; in the midst of you they have dealt unjustly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by oppression in relation to the stranger; in you they have wronged the fatherless and the widow.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You have despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scorned My sacred things and have profaned My Sabbaths.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In you are slanderous men who arouse suspicions to shed blood, and in you are they who have eaten [food offered to idols] upon the mountains; in the midst of you they have committed lewdness.'
