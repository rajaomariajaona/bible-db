document_id: NUM.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN THE Canaanite king of Arad, who dwelt in the South (the Negeb), heard that Israel was coming by the way of Atharim [the route traveled by the spies sent out by Moses], he fought against Israel and took some of them captive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Israel vowed a vow to the Lord, and said, If You will indeed deliver this people into my hand, then I will utterly destroy their cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the Lord hearkened to Israel and gave over the Canaanites. And they utterly destroyed them and their cities; and the name of the place was called Hormah [a banned or devoted thing].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And they journeyed from Mount Hor by the way to the Red Sea, to go around the land of Edom, and the people became impatient (depressed, much discouraged), because [of the trials] of the way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the people spoke against God and against Moses, Why have you brought us out of Egypt to die in the wilderness? For there is no bread, neither is there any water, and we loathe this light (contemptible, unsubstantial) manna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then the Lord sent fiery (burning) serpents among the people; and they bit the people, and many Israelites died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the people came to Moses, and said, We have sinned, for we have spoken against the Lord and against you; pray to the Lord, that He may take away the serpents from us. So Moses prayed for the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Lord said to Moses, Make a fiery serpent [of bronze] and set it on a pole; and everyone who is bitten, when he looks at it, shall live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Moses made a serpent of bronze and put it on a pole, and if a serpent had bitten any man, when he looked to the serpent of bronze [attentively, expectantly, with a steady and absorbing gaze], he lived.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the Israelites journeyed on and encamped at Oboth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They journeyed from Oboth and encamped at Iye-abarim, in the wilderness opposite Moab, toward the sunrise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' From there they journeyed and encamped in the Valley of Zared.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' From there they journeyed and encamped on the other side of [the river] Arnon, which is in the desert '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' wilderness that extends from the frontier of the Amorites; for [the river] Arnon is the boundary of Moab, between Moab and the Amorites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' That is why it is said in the Book of the Wars of the Lord: Waheb in Suphah, and the valleys of [the branches of] the Arnon [River],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the slope of the valleys that stretch toward the site of Ar and find support on the border of Moab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' From there the Israelites went on to Beer [a well], the well of which the Lord had said to Moses, Assemble the people together and I will give them water. [John 7:37-39.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Israel sang this song, Spring up, O well! Let all sing to it, [Rom. 14:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The fountain that the princes opened, that the nobles of the people hollowed out from their staves. And from the wilderness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' desert [Israel journeyed] to Mattanah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And from Mattanah to Nahaliel, and from Nahaliel to Bamoth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And from Bamoth to the valley that is in the field of Moab, to the top of Pisgah which looks down upon Jeshimon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the desert.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Israel sent messengers to Sihon king of the Amorites, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Let me pass through your land. We will not turn aside into field or vineyard; we will not drink the water of the wells. We will go by the king''s highway until we have passed your border.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But Sihon would not allow Israel to pass through his border. Instead Sihon gathered all his people together and went out against Israel into the wilderness, and came to Jahaz, and he fought against Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Israel smote the king of the Amorites with the edge of the sword and possessed his land from the river Arnon to the river Jabbok, as far as the Ammonites, for the boundary of the Ammonites was strong.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Israel took all these cities and dwelt in all the cities of the Amorites, in Heshbon and in all its towns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For Heshbon was the city of Sihon king of the Amorites, who had fought against the former king of Moab and taken all his land out of his hand, as far as [the river] Arnon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' That is why those who sing ballads say, Come to Heshbon, let the city of Sihon be built and established.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For fire has gone out of Heshbon, a flame from the city of Sihon; it has devoured Ar of Moab and the lords of the heights of the Arnon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Woe to you, Moab! You are undone, O people of [the god] Chemosh! Moab has given his sons as fugitives and his daughters into captivity to Sihon king of the Amorites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' We have shot them down; Heshbon has perished as far as Dibon, and we have laid them waste as far as Nophah, which reaches to Medeba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Thus Israel dwelt in the land of the Amorites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And Moses sent to spy out Jazer, and they took its villages and dispossessed the Amorites who were there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Then they turned and went up by the way of Bashan; and Og the king of Bashan went out against them, he and all his people, to battle at Edrei.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But the Lord said to Moses, Do not fear him, for I have delivered him and all his people and his land into your hand; and you shall do to him as you did to Sihon king of the Amorites, who dwelt at Heshbon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' So the Israelites slew Og and his sons and all his people until there was not one left alive, And they possessed his land.'
