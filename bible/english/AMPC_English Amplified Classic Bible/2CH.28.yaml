document_id: 2CH.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AHAZ WAS twenty years old when he began his sixteen-year reign in Jerusalem. He did not do right in the sight of the Lord, like David his father [forefather].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But he walked in the ways of the kings of Israel and even made molten images for the Baals.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And he burned incense in the Valley of Ben-hinnom [son of Hinnom] and burned his sons as an offering, after the abominable customs of the [heathen] nations whom the Lord drove out before the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He sacrificed also and burnt incense in the high places, on the hills, and under every green tree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Therefore the Lord his God gave Ahaz into the power of the king of Syria, who defeated him and carried away a great multitude of the Jews as captives, taking them to Damascus. And he was also delivered into the hands of the king of Israel, who smote Judah with a great slaughter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For Pekah son of Remaliah slew in Judah 120,000 in one day, all courageous men, because they had forsaken the Lord, the God of their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Zichri, a mighty man of Ephraim, slew Maaseiah, King Ahaz'' son, and Azrikam the governor of the house, and Elkanah, who was second to the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Israelites carried away captive 200,000 of their kinsmen [of Judah]–women, sons, and daughters–and also took much plunder from them and brought it to Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But a prophet of the Lord was there whose name was Oded, and he went out to meet the army that was returning to Samaria and said to them, Behold, because the Lord, the God of your fathers, was angry with Judah, He delivered them into your hand; but you have slain them in a fury that reaches up to heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And now you intend to suppress the people of Judah and Jerusalem, both men and women, as your slaves. But are not you yourselves guilty of crimes against the Lord your God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now hear me therefore, and set the prisoners free again whom you have taken captive of your kinsmen, for the fierce wrath of the Lord is upon you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then certain of the heads of the Ephraimites [Israel]–Azariah son of Johanan, Berechiah son of Meshillemoth, Jehizkiah son of Shallum, and Amasa son of Hadlai–stood up against those returning from the war'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And said, You shall not bring the captives in here; we are guilty before the Lord already, and what you intend will add more to our sins and our guilt. For our trespass (guilt) is great, and there is fierce anger against Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So the armed men [of Israel] left the captives and the spoil [of Judah] before the princes and all the assembly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the men who have been mentioned by name rose up and took the captives, and with the spoil they clothed all who were naked among them; and having clothed them, shod them, given them food and drink, anointed them [as was a host''s duty], and carried all the feeble of them upon donkeys, they brought them to Jericho, the City of Palm Trees, to their brethren. Then they returned to Samaria. [Luke 10:25-37.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' At that time King Ahaz sent to the king of Assyria to help him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For again the Edomites had come and smitten Judah and carried away captives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The Philistines had invaded the cities of the low country and of the South (the Negeb) of Judah, and had taken Beth-shemesh, Aijalon, Gederoth, and Soco, and also Timnah and Gimzo, with their villages, and they settled there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For the Lord brought Judah low because of Ahaz king of Israel, for Ahaz had dealt with reckless cruelty against Judah and had been faithless [had transgressed sorely] against the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' So Tilgath-pilneser king of Assyria came to him and distressed him without strengthening him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For Ahaz took [treasure] from the house of the Lord and out of the house of the king and from the princes and gave it as tribute to the king of Assyria, but it did not help Ahaz.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' In the time of his distress he became still more unfaithful to the Lord–this same King Ahaz.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For he sacrificed to the gods of Damascus, which had defeated him, for he said, Since the gods of the kings of Syria helped them, I will sacrifice to them that they may help me. But they were the ruin of him and of all Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Ahaz collected the utensils of the house of God and cut them in pieces; and he shut up the doors of the Lord''s temple [the Holy Place and the Holy of Holies] and made himself altars in every corner of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' In each city of Judah he made high places to burn incense to other gods, provoking to anger the Lord, the God of his fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Now the rest of his acts and of all his ways, from first to last, behold, they are written in the Book of the Kings of Judah and Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And Ahaz slept with his fathers, and they buried him in the city, in Jerusalem, but they did not bring him into the tombs of the kings of Israel. And Hezekiah his son reigned in his stead.'
