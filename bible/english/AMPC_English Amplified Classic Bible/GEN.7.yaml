document_id: GEN.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND THE Lord said to Noah, Come with all your household into the ark, for I have seen you to be righteous (upright and in right standing) before Me in this generation. [Ps. 27:5; 33:18, 19; II Pet. 2:9.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And after the seven days the floodwaters came upon the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' land.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the year 600 of Noah''s life, in the seventeenth day of the second month, that same day all the fountains of the great deep were broken up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' burst forth, and the windows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' floodgates of the heavens were opened.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And it rained upon the earth forty days and forty nights.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On the very same day Noah and Shem, Ham, and Japheth, the sons of Noah, and Noah''s wife and the three wives of his sons with them, went into the ark,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They and every [wild] beast according to its kind, all the livestock according to their kinds, every moving thing that creeps on the land according to its kind, and every fowl according to its kind, every winged thing of every sort.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they went into the ark with Noah, two and two of all flesh in which there were the breath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spirit of life.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they that entered, male and female of all flesh, went in as God had commanded [Noah]; and the Lord shut him in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' closed [the door] round about him.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The flood [that is, the downpour of rain] was forty days upon the earth; and the waters increased and bore up the ark, and it was lifted [high] above the land.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the waters became mighty and increased greatly upon the land, and the ark went [gently floating] upon the surface of the waters.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the waters prevailed so exceedingly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were so mighty upon the earth that all the high hills under the whole sky were covered.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of every clean beast you shall receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take with you seven pairs, the male and his mate, and of beasts that are not clean a pair of each kind, the male and his mate, [Lev. 11.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [In fact] the waters became fifteen cubits higher, as the high hills were covered.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all flesh ceased to breathe that moved upon the earth–fowls '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' birds, [tame] animals, [wild] beasts, all swarming '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' creeping things that swarm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' creep upon the land, and all mankind.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Everything on the dry land in whose nostrils were the breath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spirit of life died.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' God destroyed (blotted out) every living thing that was upon the face of the earth; man and animals and the creeping things and the birds of the heavens were destroyed (blotted out) from the land. Only Noah remained alive, and those who were with him in the ark. [Matt. 24:37-44.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the waters prevailed [mightily] upon the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' land 150 days (five months).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Also of the birds of the air seven pairs, the male and the female, to keep seed [their kind] alive over all the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' land.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For in seven days I will cause it to rain upon the earth forty days and forty nights, and every living substance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thing that I have made I will destroy, blot out, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wipe away from the face of the earth.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Noah did all that the Lord commanded him. [Heb. 11:7.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Noah was 600 years old when the flood of waters came upon the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' land.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Noah and his sons and his wife and his sons'' wives with him went into the ark because of the waters of the flood. [Matt. 24:38; Luke 17:27.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of clean animals and of animals that are not clean, and of birds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fowls, and of everything that creeps on the ground,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There went in two and two with Noah into the ark, the male and the female, as God had commanded Noah.'
