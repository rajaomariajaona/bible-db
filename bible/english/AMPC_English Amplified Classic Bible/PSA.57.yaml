document_id: PSA.57,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; +[set to the tune of+] ``Do Not Destroy." A record of memorable thoughts of David when he fled from Saul in the cave.
  - type: text
    content: ' BE MERCIFUL '
  - type: text
    content: and
  - type: text
    content: ' gracious to me, O God, be merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious to me, for my soul takes refuge '
  - type: text
    content: and
  - type: text
    content: ' finds shelter '
  - type: text
    content: and
  - type: text
    content: ' confidence in You; yes, in the shadow of Your wings will I take refuge '
  - type: text
    content: and
  - type: text
    content: ' be confident until calamities '
  - type: text
    content: and
  - type: text
    content: ' destructive storms are passed.'
  '10':
  - type: text
    content: ' For Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness are great, reaching to the heavens, and Your truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness to the clouds.'
  '11':
  - type: text
    content: ' Be exalted, O God, above the heavens; let Your glory be over all the earth.'
  '2':
  - type: text
    content: ' I will cry to God Most High, Who performs on my behalf '
  - type: text
    content: and
  - type: text
    content: ' rewards me [Who brings to pass His purposes for me and surely completes them]!'
  '3':
  - type: text
    content: ' He will send from heaven and save me from the slanders '
  - type: text
    content: and
  - type: text
    content: ' reproaches of him who would trample me down '
  - type: text
    content: or
  - type: text
    content: ' swallow me up, '
  - type: text
    content: and
  - type: text
    content: ' He will put him to shame. Selah [pause, and calmly think of that]! God will send forth His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness '
  - type: text
    content: and
  - type: text
    content: ' His truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness.'
  '4':
  - type: text
    content: ' My life is among lions; I must lie among those who are aflame–the sons of men whose teeth are spears and arrows, their tongues sharp swords.'
  '5':
  - type: text
    content: ' Be exalted, O God, above the heavens! Let Your glory be over all the earth!'
  '6':
  - type: text
    content: ' They set a net for my steps; my very life was bowed down. They dug a pit in my way; into the midst of it they themselves have fallen. Selah [pause, and calmly think of that]!'
  '7':
  - type: text
    content: ' My heart is fixed, O God, my heart is steadfast '
  - type: text
    content: and
  - type: text
    content: ' confident! I will sing and make melody.'
  '8':
  - type: text
    content: ' Awake, my glory (my inner self); awake, harp and lyre! I will awake right early [I will awaken the dawn]!'
  '9':
  - type: text
    content: ' I will praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to You, O Lord, among the peoples; I will sing praises to You among the nations.'
