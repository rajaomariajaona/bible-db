document_id: PSA.57,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician; +[set to the tune of+] ``Do Not Destroy." A record of memorable thoughts of David when he fled from Saul in the cave.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' BE MERCIFUL '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious to me, O God, be merciful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious to me, for my soul takes refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' finds shelter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidence in You; yes, in the shadow of Your wings will I take refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be confident until calamities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destructive storms are passed.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For Your mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness are great, reaching to the heavens, and Your truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness to the clouds.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Be exalted, O God, above the heavens; let Your glory be over all the earth.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I will cry to God Most High, Who performs on my behalf '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rewards me [Who brings to pass His purposes for me and surely completes them]!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' He will send from heaven and save me from the slanders '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproaches of him who would trample me down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' swallow me up, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' He will put him to shame. Selah [pause, and calmly think of that]! God will send forth His mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' My life is among lions; I must lie among those who are aflame–the sons of men whose teeth are spears and arrows, their tongues sharp swords.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Be exalted, O God, above the heavens! Let Your glory be over all the earth!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' They set a net for my steps; my very life was bowed down. They dug a pit in my way; into the midst of it they themselves have fallen. Selah [pause, and calmly think of that]!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' My heart is fixed, O God, my heart is steadfast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident! I will sing and make melody.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Awake, my glory (my inner self); awake, harp and lyre! I will awake right early [I will awaken the dawn]!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' I will praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give thanks to You, O Lord, among the peoples; I will sing praises to You among the nations.'
