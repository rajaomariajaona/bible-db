document_id: PSA.143
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEAR MY prayer, O Lord, give ear to my supplications! In Your faithfulness answer me, and in Your righteousness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And enter not into judgment with Your servant, for in Your sight no man living is [in himself] righteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' justified. [Ps. 130:3; Rom. 3:20-26; Gal. 2:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For the enemy has pursued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecuted my soul, he has crushed my life down to the ground; he has made me to dwell in dark places as those who have been long dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Therefore is my spirit overwhelmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faints within me [wrapped in gloom]; my heart within my bosom grows numb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I remember the days of old; I meditate on all Your doings; I ponder the work of Your hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I spread forth my hands to You; my soul thirsts after You like a thirsty land [for water]. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Answer me speedily, O Lord, for my spirit fails; hide not Your face from me, lest I become like those who go down into the pit (the grave).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Cause me to hear Your loving-kindness in the morning, for on You do I lean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in You do I trust. Cause me to know the way wherein I should walk, for I lift up my inner self to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Deliver me, O Lord, from my enemies; I flee to You to hide me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Teach me to do Your will, for You are my God; let Your good Spirit lead me into a level country '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' into the land of uprightness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Save my life, O Lord, for Your name''s sake; in Your righteousness, bring my life out of trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' free me from distress.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And in your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, cut off my enemies and destroy all those who afflict my inner self, for I am Your servant.'
