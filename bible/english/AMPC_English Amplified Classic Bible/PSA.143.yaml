document_id: PSA.143,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David.
  - type: text
    content: ' HEAR MY prayer, O Lord, give ear to my supplications! In Your faithfulness answer me, and in Your righteousness.'
  '10':
  - type: text
    content: ' Teach me to do Your will, for You are my God; let Your good Spirit lead me into a level country '
  - type: text
    content: and
  - type: text
    content: ' into the land of uprightness.'
  '11':
  - type: text
    content: ' Save my life, O Lord, for Your name''s sake; in Your righteousness, bring my life out of trouble '
  - type: text
    content: and
  - type: text
    content: ' free me from distress.'
  '12':
  - type: text
    content: ' And in your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, cut off my enemies and destroy all those who afflict my inner self, for I am Your servant.'
  '2':
  - type: text
    content: ' And enter not into judgment with Your servant, for in Your sight no man living is [in himself] righteous '
  - type: text
    content: or
  - type: text
    content: ' justified. [Ps. 130:3; Rom. 3:20-26; Gal. 2:16.]'
  '3':
  - type: text
    content: ' For the enemy has pursued '
  - type: text
    content: and
  - type: text
    content: ' persecuted my soul, he has crushed my life down to the ground; he has made me to dwell in dark places as those who have been long dead.'
  '4':
  - type: text
    content: ' Therefore is my spirit overwhelmed '
  - type: text
    content: and
  - type: text
    content: ' faints within me [wrapped in gloom]; my heart within my bosom grows numb.'
  '5':
  - type: text
    content: ' I remember the days of old; I meditate on all Your doings; I ponder the work of Your hands.'
  '6':
  - type: text
    content: ' I spread forth my hands to You; my soul thirsts after You like a thirsty land [for water]. Selah [pause, and calmly think of that]!'
  '7':
  - type: text
    content: ' Answer me speedily, O Lord, for my spirit fails; hide not Your face from me, lest I become like those who go down into the pit (the grave).'
  '8':
  - type: text
    content: ' Cause me to hear Your loving-kindness in the morning, for on You do I lean '
  - type: text
    content: and
  - type: text
    content: ' in You do I trust. Cause me to know the way wherein I should walk, for I lift up my inner self to You.'
  '9':
  - type: text
    content: ' Deliver me, O Lord, from my enemies; I flee to You to hide me.'
