document_id: PRO.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' A WISE son heeds [and is the fruit of] his father''s instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' correction, but a scoffer listens not to rebuke.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' By pride '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insolence comes only contention, but with the well-advised is skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Wealth [not earned but] won in haste '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' unjustly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' from the production of things for vain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' detrimental use [such riches] will dwindle away, but he who gathers little by little will increase [his riches].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Hope deferred makes the heart sick, but when the desire is fulfilled, it is a tree of life.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Whoever despises the word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counsel [of God] brings destruction upon himself, but he who [reverently] fears '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' respects the commandment [of God] is rewarded.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The teaching of the wise is a fountain of life, that one may avoid the snares of death.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Good understanding wins favor, but the way of the transgressor is hard [like the barren, dry soil or the impassable swamp].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Every prudent man deals with knowledge, but a [self-confident] fool exposes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' flaunts his folly.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' A wicked messenger falls into evil, but a faithful ambassador brings healing.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Poverty and shame come to him who refuses instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' correction, but he who heeds reproof is honored.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Satisfied desire is sweet to a person; therefore it is hateful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exceedingly offensive to [self-confident] fools to give up evil [upon which they have set their hearts].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' A good man eats good from the fruit of his mouth, but the desire of the treacherous is for violence.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' He who walks [as a companion] with wise men is wise, but he who associates with [self-confident] fools is [a fool himself and] shall smart for it. [Isa. 32:6.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Evil pursues sinners, but the consistently upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in right standing with God is recompensed with good.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' A good man leaves an inheritance [of moral stability and goodness] to his children''s children, and the wealth of the sinner [finds its way eventually] into the hands of the righteous, for whom it was laid up.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Much food is in the tilled land of the poor, but there are those who are destroyed because of injustice.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' He who spares his rod [of discipline] hates his son, but he who loves him disciplines diligently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishes him early. [Prov. 19:18; 22:15; 23:13; 29:15, 17.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' The [uncompromisingly] righteous eats to his own satisfaction, but the stomach of the wicked is in want.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' He who guards his mouth keeps his life, but he who opens wide his lips comes to ruin.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' The appetite of the sluggard craves and gets nothing, but the appetite of the diligent is abundantly supplied. [Prov. 10:4.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' A [consistently] righteous man hates lying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceit, but a wicked man is loathsome [his very breath spreads pollution] and he comes [surely] to shame.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Righteousness (rightness and justice in every area and relation) guards him who is upright in the way, but wickedness plunges into sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overthrows the sinner.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' One man considers himself rich, yet has nothing [to keep permanently]; another man considers himself poor, yet has great [and indestructible] riches. [Prov. 12:9; Luke 12:20, 21.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' A rich man can buy his way out of threatened death by paying a ransom, but the poor man does not even have to listen to threats [from the envious].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' The light of the [uncompromisingly] righteous [is within him–it grows brighter and] rejoices, but the lamp of the wicked [furnishes only a derived, temporary light and] shall be put out shortly.'
