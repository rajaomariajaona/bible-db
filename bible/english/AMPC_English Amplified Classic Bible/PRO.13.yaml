document_id: PRO.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' A WISE son heeds [and is the fruit of] his father''s instruction '
  - type: text
    content: and
  - type: text
    content: ' correction, but a scoffer listens not to rebuke.'
  '10':
  - type: text
    content: ' By pride '
  - type: text
    content: and
  - type: text
    content: ' insolence comes only contention, but with the well-advised is skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom.'
  '11':
  - type: text
    content: ' Wealth [not earned but] won in haste '
  - type: text
    content: or
  - type: text
    content: ' unjustly '
  - type: text
    content: or
  - type: text
    content: ' from the production of things for vain '
  - type: text
    content: or
  - type: text
    content: ' detrimental use [such riches] will dwindle away, but he who gathers little by little will increase [his riches].'
  '12':
  - type: text
    content: ' Hope deferred makes the heart sick, but when the desire is fulfilled, it is a tree of life.'
  '13':
  - type: text
    content: ' Whoever despises the word '
  - type: text
    content: and
  - type: text
    content: ' counsel [of God] brings destruction upon himself, but he who [reverently] fears '
  - type: text
    content: and
  - type: text
    content: ' respects the commandment [of God] is rewarded.'
  '14':
  - type: text
    content: ' The teaching of the wise is a fountain of life, that one may avoid the snares of death.'
  '15':
  - type: text
    content: ' Good understanding wins favor, but the way of the transgressor is hard [like the barren, dry soil or the impassable swamp].'
  '16':
  - type: text
    content: ' Every prudent man deals with knowledge, but a [self-confident] fool exposes '
  - type: text
    content: and
  - type: text
    content: ' flaunts his folly.'
  '17':
  - type: text
    content: ' A wicked messenger falls into evil, but a faithful ambassador brings healing.'
  '18':
  - type: text
    content: ' Poverty and shame come to him who refuses instruction '
  - type: text
    content: and
  - type: text
    content: ' correction, but he who heeds reproof is honored.'
  '19':
  - type: text
    content: ' Satisfied desire is sweet to a person; therefore it is hateful '
  - type: text
    content: and
  - type: text
    content: ' exceedingly offensive to [self-confident] fools to give up evil [upon which they have set their hearts].'
  '2':
  - type: text
    content: ' A good man eats good from the fruit of his mouth, but the desire of the treacherous is for violence.'
  '20':
  - type: text
    content: ' He who walks [as a companion] with wise men is wise, but he who associates with [self-confident] fools is [a fool himself and] shall smart for it. [Isa. 32:6.]'
  '21':
  - type: text
    content: ' Evil pursues sinners, but the consistently upright '
  - type: text
    content: and
  - type: text
    content: ' in right standing with God is recompensed with good.'
  '22':
  - type: text
    content: ' A good man leaves an inheritance [of moral stability and goodness] to his children''s children, and the wealth of the sinner [finds its way eventually] into the hands of the righteous, for whom it was laid up.'
  '23':
  - type: text
    content: ' Much food is in the tilled land of the poor, but there are those who are destroyed because of injustice.'
  '24':
  - type: text
    content: ' He who spares his rod [of discipline] hates his son, but he who loves him disciplines diligently '
  - type: text
    content: and
  - type: text
    content: ' punishes him early. [Prov. 19:18; 22:15; 23:13; 29:15, 17.]'
  '25':
  - type: text
    content: ' The [uncompromisingly] righteous eats to his own satisfaction, but the stomach of the wicked is in want.'
  '3':
  - type: text
    content: ' He who guards his mouth keeps his life, but he who opens wide his lips comes to ruin.'
  '4':
  - type: text
    content: ' The appetite of the sluggard craves and gets nothing, but the appetite of the diligent is abundantly supplied. [Prov. 10:4.]'
  '5':
  - type: text
    content: ' A [consistently] righteous man hates lying '
  - type: text
    content: and
  - type: text
    content: ' deceit, but a wicked man is loathsome [his very breath spreads pollution] and he comes [surely] to shame.'
  '6':
  - type: text
    content: ' Righteousness (rightness and justice in every area and relation) guards him who is upright in the way, but wickedness plunges into sin '
  - type: text
    content: and
  - type: text
    content: ' overthrows the sinner.'
  '7':
  - type: text
    content: ' One man considers himself rich, yet has nothing [to keep permanently]; another man considers himself poor, yet has great [and indestructible] riches. [Prov. 12:9; Luke 12:20, 21.]'
  '8':
  - type: text
    content: ' A rich man can buy his way out of threatened death by paying a ransom, but the poor man does not even have to listen to threats [from the envious].'
  '9':
  - type: text
    content: ' The light of the [uncompromisingly] righteous [is within him–it grows brighter and] rejoices, but the lamp of the wicked [furnishes only a derived, temporary light and] shall be put out shortly.'
