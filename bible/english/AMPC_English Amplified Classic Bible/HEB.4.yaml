document_id: HEB.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEREFORE, WHILE the promise of entering His rest still holds '
  - type: text
    content: and
  - type: text
    content: ' is offered [today], let us be afraid [to distrust it], lest any of you should think he has come too late '
  - type: text
    content: and
  - type: text
    content: ' has come short of [reaching] it.'
  '10':
  - type: text
    content: ' For he who has once entered [God''s] rest also has ceased from [the weariness and pain] of human labors, just as God rested from those labors peculiarly His own. [Gen. 2:2.]'
  '11':
  - type: text
    content: ' Let us therefore be zealous '
  - type: text
    content: and
  - type: text
    content: ' exert ourselves '
  - type: text
    content: and
  - type: text
    content: ' strive diligently to enter that rest [of God, to know and experience it for ourselves], that no one may fall '
  - type: text
    content: or
  - type: text
    content: ' perish by the same kind of unbelief '
  - type: text
    content: and
  - type: text
    content: ' disobedience [into which those in the wilderness fell].'
  '12':
  - type: text
    content: ' For the Word that God speaks is alive and full of power [making it active, operative, energizing, and effective]; it is sharper than any two-edged sword, penetrating to the dividing line of the breath of life (soul) and [the immortal] spirit, and of joints and marrow [of the deepest parts of our nature], exposing '
  - type: text
    content: and
  - type: text
    content: ' sifting '
  - type: text
    content: and
  - type: text
    content: ' analyzing '
  - type: text
    content: and
  - type: text
    content: ' judging the very thoughts and purposes of the heart.'
  '13':
  - type: text
    content: ' And not a creature exists that is concealed from His sight, but all things are open '
  - type: text
    content: and
  - type: text
    content: ' exposed, naked '
  - type: text
    content: and
  - type: text
    content: ' defenseless to the eyes of Him with Whom we have to do.'
  '14':
  - type: text
    content: ' Inasmuch then as we have a great High Priest Who has [already] ascended '
  - type: text
    content: and
  - type: text
    content: ' passed through the heavens, Jesus the Son of God, let us hold fast our confession [of faith in Him].'
  '15':
  - type: text
    content: ' For we do not have a High Priest Who is unable to understand '
  - type: text
    content: and
  - type: text
    content: ' sympathize '
  - type: text
    content: and
  - type: text
    content: ' have a shared feeling with our weaknesses '
  - type: text
    content: and
  - type: text
    content: ' infirmities '
  - type: text
    content: and
  - type: text
    content: ' liability to the assaults of temptation, but One Who has been tempted in every respect as we are, yet without sinning.'
  '16':
  - type: text
    content: ' Let us then fearlessly '
  - type: text
    content: and
  - type: text
    content: ' confidently '
  - type: text
    content: and
  - type: text
    content: ' boldly draw near to the throne of grace (the throne of God''s unmerited favor to us sinners), that we may receive mercy [for our failures] and find grace to help in good time for every need [appropriate help and well-timed help, coming just when we need it].'
  '2':
  - type: text
    content: ' For indeed we have had the glad tidings [Gospel of God] proclaimed to us just as truly as they [the Israelites of old did when the good news of deliverance from bondage came to them]; but the message they heard did not benefit them, because it was not mixed with faith (with the leaning of the entire personality on God in absolute trust and confidence in His power, wisdom, and goodness) by those who heard it; '
  - type: text
    content: neither were they united in faith with the ones [Joshua and Caleb] who heard (did believe).
  '3':
  - type: text
    content: ' For we who have believed (adhered to and trusted in and relied on God) do enter that rest, in accordance with His declaration that those [who did not believe] should not enter when He said, As I swore in My wrath, They shall not enter My rest; and this He said although [His] works had been completed '
  - type: text
    content: and
  - type: text
    content: ' prepared [and waiting for all who would believe] from the foundation of the world. [Ps. 95:11.]'
  '4':
  - type: text
    content: ' For in a certain place He has said this about the seventh day: And God rested on the seventh day from all His works. [Gen. 2:2.]'
  '5':
  - type: text
    content: ' And [they forfeited their part in it, for] in this [passage] He said, They shall not enter My rest. [Ps. 95:11.]'
  '6':
  - type: text
    content: ' Seeing then that the promise remains over [from past times] for some to enter that rest, and that those who formerly were given the good news about it '
  - type: text
    content: and
  - type: text
    content: ' the opportunity, failed to appropriate it '
  - type: text
    content: and
  - type: text
    content: ' did not enter because of disobedience,'
  '7':
  - type: text
    content: ' Again He sets a definite day, [a new] Today, [and gives another opportunity of securing that rest] saying through David after so long a time in the words already quoted, Today, if you would hear His voice '
  - type: text
    content: and
  - type: text
    content: ' when you hear it, do not harden your hearts. [Ps. 95:7, 8.]'
  '8':
  - type: text
    content: ' [This mention of a rest was not a reference to their entering into Canaan.] For if Joshua had given them rest, He [God] would not speak afterward about another day.'
  '9':
  - type: text
    content: ' So then, there is still awaiting a full '
  - type: text
    content: and
  - type: text
    content: ' complete Sabbath-rest reserved for the [true] people of God;'
