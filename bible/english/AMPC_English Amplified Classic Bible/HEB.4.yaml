document_id: HEB.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEREFORE, WHILE the promise of entering His rest still holds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is offered [today], let us be afraid [to distrust it], lest any of you should think he has come too late '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has come short of [reaching] it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For indeed we have had the glad tidings [Gospel of God] proclaimed to us just as truly as they [the Israelites of old did when the good news of deliverance from bondage came to them]; but the message they heard did not benefit them, because it was not mixed with faith (with the leaning of the entire personality on God in absolute trust and confidence in His power, wisdom, and goodness) by those who heard it; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: neither were they united in faith with the ones [Joshua and Caleb] who heard (did believe).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For we who have believed (adhered to and trusted in and relied on God) do enter that rest, in accordance with His declaration that those [who did not believe] should not enter when He said, As I swore in My wrath, They shall not enter My rest; and this He said although [His] works had been completed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prepared [and waiting for all who would believe] from the foundation of the world. [Ps. 95:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For in a certain place He has said this about the seventh day: And God rested on the seventh day from all His works. [Gen. 2:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And [they forfeited their part in it, for] in this [passage] He said, They shall not enter My rest. [Ps. 95:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Seeing then that the promise remains over [from past times] for some to enter that rest, and that those who formerly were given the good news about it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the opportunity, failed to appropriate it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' did not enter because of disobedience,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Again He sets a definite day, [a new] Today, [and gives another opportunity of securing that rest] saying through David after so long a time in the words already quoted, Today, if you would hear His voice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' when you hear it, do not harden your hearts. [Ps. 95:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' [This mention of a rest was not a reference to their entering into Canaan.] For if Joshua had given them rest, He [God] would not speak afterward about another day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So then, there is still awaiting a full '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete Sabbath-rest reserved for the [true] people of God;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For he who has once entered [God''s] rest also has ceased from [the weariness and pain] of human labors, just as God rested from those labors peculiarly His own. [Gen. 2:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Let us therefore be zealous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exert ourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strive diligently to enter that rest [of God, to know and experience it for ourselves], that no one may fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' perish by the same kind of unbelief '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disobedience [into which those in the wilderness fell].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For the Word that God speaks is alive and full of power [making it active, operative, energizing, and effective]; it is sharper than any two-edged sword, penetrating to the dividing line of the breath of life (soul) and [the immortal] spirit, and of joints and marrow [of the deepest parts of our nature], exposing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sifting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' analyzing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judging the very thoughts and purposes of the heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And not a creature exists that is concealed from His sight, but all things are open '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exposed, naked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defenseless to the eyes of Him with Whom we have to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Inasmuch then as we have a great High Priest Who has [already] ascended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' passed through the heavens, Jesus the Son of God, let us hold fast our confession [of faith in Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For we do not have a High Priest Who is unable to understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sympathize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have a shared feeling with our weaknesses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' infirmities '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' liability to the assaults of temptation, but One Who has been tempted in every respect as we are, yet without sinning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Let us then fearlessly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boldly draw near to the throne of grace (the throne of God''s unmerited favor to us sinners), that we may receive mercy [for our failures] and find grace to help in good time for every need [appropriate help and well-timed help, coming just when we need it].'
