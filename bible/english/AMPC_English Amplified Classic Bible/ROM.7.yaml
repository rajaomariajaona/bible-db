document_id: ROM.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' DO YOU not know, brethren–for I am speaking to men who are acquainted with the Law–that legal claims have power over a person only for as long as he is alive?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For [instance] a married woman is bound by law to her husband as long as he lives; but if her husband dies, she is loosed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discharged from the law concerning her husband.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Accordingly, she will be held an adulteress if she unites herself to another man while her husband lives. But if her husband dies, the marriage law no longer is binding on her [she is free from that law]; and if she unites herself to another man, she is not an adulteress.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Likewise, my brethren, you have undergone death as to the Law through the [crucified] body of Christ, so that now you may belong to Another, to Him Who was raised from the dead in order that we may bear fruit for God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When we were living in the flesh (mere physical lives), the sinful passions that were awakened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' aroused up by [what] the Law [makes sin] were constantly operating in our natural powers (in our bodily organs, in the sensitive appetites and wills of the flesh), so that we bore fruit for death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But now we are discharged from the Law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have terminated all intercourse with it, having died to what once restrained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' held us captive. So now we serve not under [obedience to] the old code of written regulations, but [under obedience to the promptings] of the Spirit in newness [of life].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' What then do we conclude? Is the Law identical with sin? Certainly not! Nevertheless, if it had not been for the Law, I should not have recognized sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' have known its meaning. [For instance] I would not have known about covetousness [would have had no consciousness of sin or sense of guilt] if the Law had not [repeatedly] said, You shall not covet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have an evil desire [for one thing and another]. [Exod. 20:17; Deut. 5:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But sin, finding opportunity in the commandment [to express itself], got a hold on me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' aroused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stimulated all kinds of forbidden desires (lust, covetousness). For without the Law sin is dead [the sense of it is inactive and a lifeless thing].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Once I was alive, but quite apart from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unconscious of the Law. But when the commandment came, sin lived again and I died (was sentenced by the Law to death). [Ps. 73:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the very legal ordinance which was designed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intended to bring life actually proved [to mean to me] death. [Lev. 18:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For sin, seizing the opportunity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' getting a hold on me [by taking its incentive] from the commandment, beguiled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entrapped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cheated me, and using it [as a weapon], killed me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The Law therefore is holy, and [each] commandment is holy and just and good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Did that which is good then prove fatal [bringing death] to me? Certainly not! It was sin, working death in me by using this good thing [as a weapon], in order that through the commandment sin might be shown up clearly to be sin, that the extreme malignity and immeasurable sinfulness of sin might plainly appear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' We know that the Law is spiritual; but I am a creature of the flesh [carnal, unspiritual], having been sold into slavery under [the control of] sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For I do not understand my own actions [I am baffled, bewildered]. I do not practice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' accomplish what I wish, but I do the very thing that I loathe [which my moral instinct condemns].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Now if I do [habitually] what is contrary to my desire, [that means that] I acknowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agree that the Law is good (morally excellent) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' that I take sides with it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' However, it is no longer I who do the deed, but the sin [principle] which is at home in me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has possession of me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For I know that nothing good dwells within me, that is, in my flesh. I can will what is right, but I cannot perform it. [I have the intention and urge to do what is right, but no power to carry it out.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For I fail to practice the good deeds I desire to do, but the evil deeds that I do not desire to do are what I am [ever] doing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now if I do what I do not desire to do, it is no longer I doing it [it is not myself that acts], but the sin [principle] which dwells within me [fixed and operating in my soul].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So I find it to be a law (rule of action of my being) that when I want to do what is right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good, evil is ever present with me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I am subject to its insistent demands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For I endorse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight in the Law of God in my inmost self [with my new nature]. [Ps. 1:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But I discern in my bodily members [in the sensitive appetites and wills of the flesh] a different law (rule of action) at war against the law of my mind (my reason) and making me a prisoner to the law of sin that dwells in my bodily organs [in the sensitive appetites and wills of the flesh].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' O unhappy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pitiable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wretched man that I am! Who will release '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliver me from [the shackles of] this body of death?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' O thank God! [He will!] through Jesus Christ (the Anointed One) our Lord! So then indeed I, of myself with the mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heart, serve the Law of God, but with the flesh the law of sin.'
