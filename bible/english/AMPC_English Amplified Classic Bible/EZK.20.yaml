document_id: EZK.20,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' IN THE seventh year, in the fifth [month], on the tenth [day] of the month [after the beginning of the Babylonian captivity, which was to last seventy years], certain of the elders of Israel came to inquire of the Lord and sat down before me [Ezekiel, in Babylonia]. [Jer. 25:11; 29:10.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So I caused them to go out from the land of Egypt and brought them into the wilderness.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I gave them My statutes and showed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made known to them My judgments, which, if a man keeps, he must live in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moreover, also I gave them My Sabbaths to be a sign between Me and them, that they might understand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord Who sanctifies them [separates and sets them apart].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the house of Israel rebelled against Me in the wilderness; they walked not in My statutes and they despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cast away My judgments, which, if a man keeps, he must even live in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by them; and they grievously profaned My Sabbaths. Then I thought I would pour out My wrath on them in the wilderness and uproot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consume them.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I acted for My name''s sake, that it should not be profaned before the [heathen] nations in whose sight I brought them out.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet also I lifted up My hand to swear to them in the wilderness that I would not bring them into the land which I had given them, flowing with milk and honey, which is the ornament '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory of all lands–'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because they despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected My ordinances and walked not in My statutes and profaned My Sabbaths, for their hearts went after their idols.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet My eye pitied them instead of destroying them, and I did not make a full end of them in the wilderness.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I said to their sons in the wilderness, You shall not walk in the statutes of your fathers nor observe their ordinances nor defile yourselves with their idols.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I the Lord am your God; walk in My statutes and keep My ordinances,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then came the word of the Lord to me, saying,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And hallow (separate and keep holy) My Sabbaths, and they shall be a sign between Me and you, that you may know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord your God.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet the sons rebelled against Me; they walked not in My statutes, neither kept My ordinances which, if a man does, he must live in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by them; they profaned My Sabbaths. Then I thought I would pour out My wrath on them and finish My anger against them in the wilderness.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet I withheld My hand and acted for My name''s sake, that it should not be debased and profaned in the sight of the [heathen] nations, in whose sight I had brought them forth [from bondage].'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moreover, I lifted up My hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swore to them in the wilderness that I would scatter them among the [heathen] nations and disperse them in the countries,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Because they had not executed My ordinances but had despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected My statutes and had profaned My Sabbaths, and their eyes were set on their fathers'' idols.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Wherefore also I gave them [over to] statutes that were not good and ordinances whereby they should not live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' could not have life, [Ps. 81:12; Isa. 66:4; Rom. 1:21-25, 28.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I [let them] pollute '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make themselves unclean in their own offerings [to their idols], in that they caused to pass through the fire all the firstborn, that I might make them desolate, to the end that they might know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord. [Lev. 20:2-5.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore, son of man, speak to the house of Israel and say to them, Thus says the Lord God: Again in this your fathers blasphemed Me, in that they dealt faithlessly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treacherously with Me and committed a treasonous trespass against Me.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For when I had brought them into the land which I lifted up My hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swore to give to them, then they saw every high hill and every dark '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' leafy tree [as a place for idol worship], and they offered there their sacrifices and there they presented their offering that provoked My anger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sadness; there also they made their sweet-smelling savor and poured out there their drink offerings.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then I said to them, What is the high place to which you go? And the name of it is called Bamah [high place] to this day.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Son of man, speak to the elders of Israel and say to them, Thus says the Lord God: Have you come to inquire of Me? As I live, says the Lord God, I will not be inquired of by you!'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore say to the house of Israel, Thus says the Lord God: Do you [exiles] debase '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defile yourselves after the manner of your fathers? And do you play the harlot after their loathsome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' detestable things?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when you offer your gifts, when you make your sons pass through the fire, do you not debase '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defile yourselves with all your idols to this day? And shall I be inquired of by you, O house of Israel? As I live, says the Lord God, I will not be inquired of by you!'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And that which has come up in your mind shall never happen, in that you think, We will be as the nations, as the tribes of the countries, to serve idols of wood and stone.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As I live, says the Lord God, surely with a mighty hand and an outstretched arm and with wrath poured out will I be King over you.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will bring you out from the peoples and will gather you out of the countries in which you are scattered, with a mighty hand and an outstretched arm and with wrath poured out.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will bring you into the wilderness of the peoples, and there will I enter into judgment with you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contend with you face to face.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As I entered into judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contended with your fathers in the wilderness of the land of Egypt, so will I enter into judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contend with you, says the Lord God. [Num. 11; Ps. 106:15; I Cor. 10:5-10.]'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will cause you to pass under the rod [as the shepherd does his sheep when he counts them, and I will count you as Mine and I will constrain you] and bring you into the covenant to which you are permanently bound. [Lev. 27:32.]'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will purge out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' separate from among you the rebels and those who transgress against Me; I will bring them out of the country where they temporarily dwell, but they shall not enter the land of Israel. Then you shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord. [Heb. 4:2, 3.]'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for you, O house of Israel, thus says the Lord God: Go, serve every one of you his idols, now and hereafter, if you will not listen to Me! But you shall not profane My holy name any more with your sacrificial gifts and your idols!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Will you judge them, son of man [Ezekiel], will you judge them? Then cause them to know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize the abominations of their fathers. [Matt. 23:29-33; Acts 7:51, 52.]'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For on My holy mountain, on the mountain height of Israel, says the Lord God, there all the house of Israel, all of them in the land, shall serve Me. There will I [graciously] accept them, and there will I require your offerings and the firstfruits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the choicest of your contributions, with all your sacred things.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will accept you [graciously] as a pleasant odor when I lead you out from the peoples and gather you out of the countries in which you have been scattered, and I will manifest My holiness among you in the sight of the nations [who will seek Me because of My power displayed in you]. [Eph. 5:2; Phil. 4:18.]'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord, when I bring you into the land of Israel, into the country which I lifted up My hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swore to give to your fathers.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there you shall [earnestly] remember your ways and all your doings with which you have defiled yourselves, and you shall loathe yourselves in your own sight for all your evil deeds which you have done.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord, when I deal with you for My name''s sake, not according to your evil ways nor according to your corrupt doings, O house of Israel, says the Lord God.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moreover, the word of the Lord came to me, saying,'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Son of man, set your face toward the south, preach against the south, and prophesy against the forest land of the South (the Negeb),'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And say to the forest of the South (the Negeb), Hear the word of the Lord; Thus says the Lord God: Behold, I will kindle a fire in you and it shall devour every green tree in you and every dry tree. The blazing flame shall not be quenched, and all faces from the south to the north shall be scorched by it.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All flesh shall see that I the Lord have kindled it; it shall not be quenched.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then said I, Ah, Lord God! They are saying of me, Does he not speak in parables '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make allegories?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And say to them, Thus says the Lord God: In the day when I chose Israel and lifted up My hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swore to the offspring of the house of Jacob and made Myself known to them in the land of Egypt, when I lifted up My hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swore to them, saying, I am the Lord your God,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On that day I lifted up My hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swore to them to bring them out of the land of Egypt to a land that I had searched out for them, flowing with milk and honey, [a land] which is an ornament '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a glory to all lands.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then said I to them, Let every man cast away the abominable things on which he feasts his eyes, and defile not yourselves with the idols of Egypt; I am the Lord your God.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But they rebelled against Me and would not listen to Me; they did not every man cast away the abominable things on which they feasted their eyes, nor did they forsake the idols of Egypt. Then I [thought], I will pour out My wrath upon them and finish My anger against them in the midst of the land of Egypt.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I acted for My name''s sake, that it should not be profaned in the sight of the [heathen] nations among whom they dwelt, in whose sight I made Myself known to them by bringing them out of the land of Egypt.'
