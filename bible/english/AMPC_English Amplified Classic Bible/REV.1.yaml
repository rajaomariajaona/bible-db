document_id: REV.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' [THIS IS] the revelation of Jesus Christ [His unveiling of the divine mysteries]. God gave it to Him to disclose '
  - type: text
    content: and
  - type: text
    content: ' make known to His bond servants certain things which must shortly '
  - type: text
    content: and
  - type: text
    content: ' speedily come to pass in their entirety. And He sent and communicated it through His angel (messenger) to His bond servant John,'
  '10':
  - type: text
    content: ' I was in the Spirit [rapt in His power] on the Lord''s Day, and I heard behind me a great voice like the calling of a war trumpet,'
  '11':
  - type: text
    content: ' Saying, '
  - type: text
    content: I am the Alpha and the Omega, the First and the Last.
  - type: text
    content: ' Write promptly what you see (your vision) in a book and send it to the seven churches '
  - type: text
    content: which are in Asia
  - type: text
    content: –to Ephesus and to Smyrna and to Pergamum and to Thyatira and to Sardis and to Philadelphia and to Laodicea.
  '12':
  - type: text
    content: ' Then I turned to see [whose was] the voice that was speaking to me, and on turning I saw seven golden lampstands,'
  '13':
  - type: text
    content: ' And in the midst of the lampstands [One] like a Son of Man, clothed with a robe which reached to His feet and with a girdle of gold about His breast. [Dan. 7:13; 10:5.]'
  '14':
  - type: text
    content: ' His head and His hair were white like white wool, [as white] as snow, and His eyes [flashed] like a flame of fire. [Dan. 7:9.]'
  '15':
  - type: text
    content: ' His feet glowed like burnished (bright) bronze as it is refined in a furnace, and His voice was like the sound of many waters. [Dan. 10:6.]'
  '16':
  - type: text
    content: ' In His right hand He held seven stars, and from His mouth there came forth a sharp two-edged sword, and His face was like the sun shining in full power at midday. [Exod. 34:29.]'
  '17':
  - type: text
    content: ' When I saw Him, I fell at His feet as if dead. But He laid His right hand on me and said, Do not be afraid! I am the First and the Last, [Isa. 44:6.]'
  '18':
  - type: text
    content: ' And the Ever-living One [I am living in the eternity of the eternities]. I died, but see, I am alive forevermore; and I possess the keys of death and Hades (the realm of the dead).'
  '19':
  - type: text
    content: ' Write therefore the things you see, what they are [and signify] and what is to take place hereafter.'
  '2':
  - type: text
    content: ' Who has testified to '
  - type: text
    content: and
  - type: text
    content: ' vouched for all that he saw [in his visions], the word of God and the testimony of Jesus Christ.'
  '20':
  - type: text
    content: ' As to the hidden meaning (the mystery) of the seven stars which you saw on My right hand and the seven lampstands of gold: the seven stars are the seven angels (messengers) of the seven assemblies (churches) and the seven lampstands are the seven churches.'
  '3':
  - type: text
    content: ' Blessed (happy, to be envied) is the man who reads aloud [in the assemblies] the word of this prophecy; and blessed (happy, to be envied) are those who hear [it read] and who keep themselves true to the things which are written in it [heeding them and laying them to heart], for the time [for them to be fulfilled] is near.'
  '4':
  - type: text
    content: ' John to the seven assemblies (churches) that are in Asia: May grace (God''s unmerited favor) be granted to you and spiritual peace (the peace of Christ''s kingdom) from Him Who is and Who was and Who is to come, and from the seven Spirits [the sevenfold Holy Spirit] before His throne, [Isa. 11:2.]'
  '5':
  - type: text
    content: ' And from Jesus Christ the faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy Witness, the Firstborn of the dead [first to be brought back to life] and the Prince (Ruler) of the kings of the earth. To Him Who ever loves us and has once [for all] loosed '
  - type: text
    content: and
  - type: text
    content: ' freed us from our sins by His own blood, [Ps. 89:27.]'
  '6':
  - type: text
    content: ' And formed us into a kingdom (a royal race), priests to His God and Father–to Him be the glory and the power '
  - type: text
    content: and
  - type: text
    content: ' the majesty and the dominion throughout the ages '
  - type: text
    content: and
  - type: text
    content: ' forever and ever. Amen (so be it). [Exod. 19:6; Isa. 61:6.]'
  '7':
  - type: text
    content: ' Behold, He is coming with the clouds, and every eye will see Him, even those who pierced Him; and all the tribes of the earth shall gaze upon Him '
  - type: text
    content: and
  - type: text
    content: ' beat their breasts '
  - type: text
    content: and
  - type: text
    content: ' mourn '
  - type: text
    content: and
  - type: text
    content: ' lament over Him. Even so [must it be]. Amen (so be it). [Dan. 7:13; Zech. 12:10.]'
  '8':
  - type: text
    content: ' I am the Alpha and the Omega, '
  - type: text
    content: the Beginning and the End,
  - type: text
    content: ' says the Lord God, He Who is and Who was and Who is to come, the Almighty (the Ruler of all). [Isa. 9:6.]'
  '9':
  - type: text
    content: ' I, John, your brother and companion (sharer and participator) with you in the tribulation and kingdom and patient endurance [which are] in Jesus '
  - type: text
    content: Christ,
  - type: text
    content: ' was on the isle called Patmos, [banished] on account of [my witnessing to] the Word of God and the testimony (the proof, the evidence) for Jesus '
  - type: text
    content: Christ.
