document_id: REV.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' [THIS IS] the revelation of Jesus Christ [His unveiling of the divine mysteries]. God gave it to Him to disclose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make known to His bond servants certain things which must shortly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' speedily come to pass in their entirety. And He sent and communicated it through His angel (messenger) to His bond servant John,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Who has testified to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vouched for all that he saw [in his visions], the word of God and the testimony of Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Blessed (happy, to be envied) is the man who reads aloud [in the assemblies] the word of this prophecy; and blessed (happy, to be envied) are those who hear [it read] and who keep themselves true to the things which are written in it [heeding them and laying them to heart], for the time [for them to be fulfilled] is near.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' John to the seven assemblies (churches) that are in Asia: May grace (God''s unmerited favor) be granted to you and spiritual peace (the peace of Christ''s kingdom) from Him Who is and Who was and Who is to come, and from the seven Spirits [the sevenfold Holy Spirit] before His throne, [Isa. 11:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And from Jesus Christ the faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy Witness, the Firstborn of the dead [first to be brought back to life] and the Prince (Ruler) of the kings of the earth. To Him Who ever loves us and has once [for all] loosed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' freed us from our sins by His own blood, [Ps. 89:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And formed us into a kingdom (a royal race), priests to His God and Father–to Him be the glory and the power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the majesty and the dominion throughout the ages '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forever and ever. Amen (so be it). [Exod. 19:6; Isa. 61:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Behold, He is coming with the clouds, and every eye will see Him, even those who pierced Him; and all the tribes of the earth shall gaze upon Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beat their breasts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mourn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lament over Him. Even so [must it be]. Amen (so be it). [Dan. 7:13; Zech. 12:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I am the Alpha and the Omega, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Beginning and the End,
  - type: text
    text: ' says the Lord God, He Who is and Who was and Who is to come, the Almighty (the Ruler of all). [Isa. 9:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I, John, your brother and companion (sharer and participator) with you in the tribulation and kingdom and patient endurance [which are] in Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ,
  - type: text
    text: ' was on the isle called Patmos, [banished] on account of [my witnessing to] the Word of God and the testimony (the proof, the evidence) for Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I was in the Spirit [rapt in His power] on the Lord''s Day, and I heard behind me a great voice like the calling of a war trumpet,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Saying, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I am the Alpha and the Omega, the First and the Last.
  - type: text
    text: ' Write promptly what you see (your vision) in a book and send it to the seven churches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which are in Asia
  - type: text
    text: –to Ephesus and to Smyrna and to Pergamum and to Thyatira and to Sardis and to Philadelphia and to Laodicea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then I turned to see [whose was] the voice that was speaking to me, and on turning I saw seven golden lampstands,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And in the midst of the lampstands [One] like a Son of Man, clothed with a robe which reached to His feet and with a girdle of gold about His breast. [Dan. 7:13; 10:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' His head and His hair were white like white wool, [as white] as snow, and His eyes [flashed] like a flame of fire. [Dan. 7:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' His feet glowed like burnished (bright) bronze as it is refined in a furnace, and His voice was like the sound of many waters. [Dan. 10:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' In His right hand He held seven stars, and from His mouth there came forth a sharp two-edged sword, and His face was like the sun shining in full power at midday. [Exod. 34:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' When I saw Him, I fell at His feet as if dead. But He laid His right hand on me and said, Do not be afraid! I am the First and the Last, [Isa. 44:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the Ever-living One [I am living in the eternity of the eternities]. I died, but see, I am alive forevermore; and I possess the keys of death and Hades (the realm of the dead).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Write therefore the things you see, what they are [and signify] and what is to take place hereafter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' As to the hidden meaning (the mystery) of the seven stars which you saw on My right hand and the seven lampstands of gold: the seven stars are the seven angels (messengers) of the seven assemblies (churches) and the seven lampstands are the seven churches.'
