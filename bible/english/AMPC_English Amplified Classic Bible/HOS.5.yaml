document_id: HOS.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' HEAR THIS, O you priests! And listen, O house of Israel! And give ear, O house of the king! For the judgment pronounced pertains to you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is meant for you, because you have been a snare at Mizpah and a net spread upon Tabor [military strongholds on either side of the Jordan River].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The princes of Judah are like those who remove the landmark [the barrier between right and wrong]; I will pour out My wrath upon them like water. [Deut. 19:14; Prov. 22:28.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Ephraim is oppressed; he is broken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crushed by [divine] judgment, because he was content to walk after idols (images) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' man''s [evil] command ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: vanities and filth
    - type: text
      text: ).
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Therefore I am like a moth to Ephraim and like dry rot to the house of Judah [in My judgment against them].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' When Ephraim saw his sickness and Judah saw his wound, then Ephraim went to Assyria and sent to [Assyria''s] great King Jareb [for help]. Yet he cannot heal you nor will he cure you of your wound [received in divine judgment].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' For I will be to Ephraim like a lion, and like a young lion to the house of Judah. I, even I, will rend and go on [rending]; I will carry off and there will be no one to deliver.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' I will return to My place [on high] until they acknowledge their offense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feel their guilt and seek My face; in their affliction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distress they will seek, inquire for, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require Me earnestly, saying,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The revolters are deeply sunk in corruption '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' slaughter, but I [the Lord God] am a rebuke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a chastisement for them all.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' I know Ephraim, and Israel is not hid from Me; for now, O Ephraim, you have played the harlot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have worshiped idols; Israel is defiled.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Their doings will not permit them to return to their God, for the spirit of harlotry is within them and they know not the Lord [they do not recognize, appreciate, give heed to, or cherish the Lord].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' But the pride '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-reliance of Israel testifies before his [own] face. Therefore shall [all] Israel, and [especially] Ephraim [the northern ten tribes], totter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall in their iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt, and Judah shall stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall with them.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' They shall go with their flocks and with their herds to seek the Lord [inquiring for and requiring Him], but they will not find Him; He has withdrawn Himself from them.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' They have dealt faithlessly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treacherously with the Lord [their espoused Husband], for they have borne alien children. Now shall a [single] New Moon (one month) devour them with their fields.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Blow the horn in Gibeah and the trumpet in Ramah [both lofty hills on Benjamin''s northern border]. Sound the alarm at Beth-aven: [the enemy is] behind you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' after you, O Benjamin [be on your guard]!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Ephraim shall become a desolation in the day of rebuke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment. Among the tribes of Israel I declare what shall surely be.'
