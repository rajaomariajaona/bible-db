document_id: HOS.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' HEAR THIS, O you priests! And listen, O house of Israel! And give ear, O house of the king! For the judgment pronounced pertains to you '
  - type: text
    content: and
  - type: text
    content: ' is meant for you, because you have been a snare at Mizpah and a net spread upon Tabor [military strongholds on either side of the Jordan River].'
  '10':
  - type: text
    content: ' The princes of Judah are like those who remove the landmark [the barrier between right and wrong]; I will pour out My wrath upon them like water. [Deut. 19:14; Prov. 22:28.]'
  '11':
  - type: text
    content: ' Ephraim is oppressed; he is broken '
  - type: text
    content: and
  - type: text
    content: ' crushed by [divine] judgment, because he was content to walk after idols (images) '
  - type: text
    content: and
  - type: text
    content: ' man''s [evil] command ('
  - type: text
    content: vanities and filth
  - type: text
    content: ).
  '12':
  - type: text
    content: ' Therefore I am like a moth to Ephraim and like dry rot to the house of Judah [in My judgment against them].'
  '13':
  - type: text
    content: ' When Ephraim saw his sickness and Judah saw his wound, then Ephraim went to Assyria and sent to [Assyria''s] great King Jareb [for help]. Yet he cannot heal you nor will he cure you of your wound [received in divine judgment].'
  '14':
  - type: text
    content: ' For I will be to Ephraim like a lion, and like a young lion to the house of Judah. I, even I, will rend and go on [rending]; I will carry off and there will be no one to deliver.'
  '15':
  - type: text
    content: ' I will return to My place [on high] until they acknowledge their offense '
  - type: text
    content: and
  - type: text
    content: ' feel their guilt and seek My face; in their affliction '
  - type: text
    content: and
  - type: text
    content: ' distress they will seek, inquire for, '
  - type: text
    content: and
  - type: text
    content: ' require Me earnestly, saying,'
  '2':
  - type: text
    content: ' The revolters are deeply sunk in corruption '
  - type: text
    content: and
  - type: text
    content: ' slaughter, but I [the Lord God] am a rebuke '
  - type: text
    content: and
  - type: text
    content: ' a chastisement for them all.'
  '3':
  - type: text
    content: ' I know Ephraim, and Israel is not hid from Me; for now, O Ephraim, you have played the harlot '
  - type: text
    content: and
  - type: text
    content: ' have worshiped idols; Israel is defiled.'
  '4':
  - type: text
    content: ' Their doings will not permit them to return to their God, for the spirit of harlotry is within them and they know not the Lord [they do not recognize, appreciate, give heed to, or cherish the Lord].'
  '5':
  - type: text
    content: ' But the pride '
  - type: text
    content: and
  - type: text
    content: ' self-reliance of Israel testifies before his [own] face. Therefore shall [all] Israel, and [especially] Ephraim [the northern ten tribes], totter '
  - type: text
    content: and
  - type: text
    content: ' fall in their iniquity '
  - type: text
    content: and
  - type: text
    content: ' guilt, and Judah shall stumble '
  - type: text
    content: and
  - type: text
    content: ' fall with them.'
  '6':
  - type: text
    content: ' They shall go with their flocks and with their herds to seek the Lord [inquiring for and requiring Him], but they will not find Him; He has withdrawn Himself from them.'
  '7':
  - type: text
    content: ' They have dealt faithlessly '
  - type: text
    content: and
  - type: text
    content: ' treacherously with the Lord [their espoused Husband], for they have borne alien children. Now shall a [single] New Moon (one month) devour them with their fields.'
  '8':
  - type: text
    content: ' Blow the horn in Gibeah and the trumpet in Ramah [both lofty hills on Benjamin''s northern border]. Sound the alarm at Beth-aven: [the enemy is] behind you '
  - type: text
    content: and
  - type: text
    content: ' after you, O Benjamin [be on your guard]!'
  '9':
  - type: text
    content: ' Ephraim shall become a desolation in the day of rebuke '
  - type: text
    content: and
  - type: text
    content: ' punishment. Among the tribes of Israel I declare what shall surely be.'
