document_id: NAM.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' HE WHO dashes in pieces [that is, the king of Medo-Babylon] is come up before your face [Nineveh]. Keep the fortress '
  - type: text
    content: and
  - type: text
    content: ' ramparts manned, watch the road, gird your loins, collect '
  - type: text
    content: and
  - type: text
    content: ' fortify all your strength '
  - type: text
    content: and
  - type: text
    content: ' power mightily.'
  '10':
  - type: text
    content: ' Emptiness! Desolation! Utter waste! Hearts faint and knees smite together, and anguish is in all loins, and the faces of all grow pale! [Isa. 13:7, 8.]'
  '11':
  - type: text
    content: ' Where is the den of the lions which was the feeding place of the young lions, where the lion and the lioness walked, and the lion''s whelp, and none made them afraid?'
  '12':
  - type: text
    content: ' The lion tore in pieces enough for his whelps and strangled [prey] for his lionesses; he filled his caves with prey and his dens with what he had seized '
  - type: text
    content: and
  - type: text
    content: ' carried off.'
  '13':
  - type: text
    content: ' Behold, I am against you [Nineveh], says the Lord of hosts, and I will burn '
  - type: text
    content: your
  - type: text
    content: ' chariots in the smoke, and the sword shall devour your young lions. And I will cut off your prey from the earth, and the voice of your messengers shall no more be heard.'
  '2':
  - type: text
    content: ' For the Lord restores the excellency of Jacob as the excellency of [ancient] Israel, for plunderers have plundered them '
  - type: text
    content: and
  - type: text
    content: ' emptied them out and [outrageously] destroyed their vine branches. [Isa. 10:12.]'
  '3':
  - type: text
    content: ' The shields of the mighty men [of Media and Babylon] are [dyed] red; the valiant men are [clothed] in dyed scarlet. The chariots blaze with fire of steel on the day of his preparation [for battle], and the officers'' horses prance like a cypress forest [reeling in the wind].'
  '4':
  - type: text
    content: ' The chariots rage in confusion in the streets; they run to and fro [in wild terror] in the broad ways. They flash with steel [making them appear like torches]; they rush [in various directions] like forked lightnings.'
  '5':
  - type: text
    content: ' [The Assyrian leader] remembers '
  - type: text
    content: and
  - type: text
    content: ' summons his bravest men; they stumble in their march. They hasten to the city''s wall, and their movable defense shelter is prepared '
  - type: text
    content: and
  - type: text
    content: ' set up.'
  '6':
  - type: text
    content: ' The gates '
  - type: text
    content: or
  - type: text
    content: ' dams of the rivers [surrounding and guarding Nineveh] are opened and the [imperial] palace [of sun-dried brick] is dissolved [by the torrents] '
  - type: text
    content: and
  - type: text
    content: ' is in dismay.'
  '7':
  - type: text
    content: ' It is decreed. She [Nineveh] is stripped and removed, and her maids are lamenting '
  - type: text
    content: and
  - type: text
    content: ' moaning like doves [softly for fear], beating upon their breasts [and hearts].'
  '8':
  - type: text
    content: ' And Nineveh, like a standing pool are her waters and [her inhabitants] are fleeing away! Stand! Stand [firm! a few cry], but no one looks back '
  - type: text
    content: or
  - type: text
    content: ' causes them to return.'
  '9':
  - type: text
    content: ' Take the spoil of silver; take the spoil of gold! For there is no end of the treasure, the glory '
  - type: text
    content: and
  - type: text
    content: ' wealth of all the precious furnishings.'
