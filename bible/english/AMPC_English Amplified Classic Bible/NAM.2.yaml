document_id: NAM.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' HE WHO dashes in pieces [that is, the king of Medo-Babylon] is come up before your face [Nineveh]. Keep the fortress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ramparts manned, watch the road, gird your loins, collect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortify all your strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power mightily.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Emptiness! Desolation! Utter waste! Hearts faint and knees smite together, and anguish is in all loins, and the faces of all grow pale! [Isa. 13:7, 8.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Where is the den of the lions which was the feeding place of the young lions, where the lion and the lioness walked, and the lion''s whelp, and none made them afraid?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The lion tore in pieces enough for his whelps and strangled [prey] for his lionesses; he filled his caves with prey and his dens with what he had seized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carried off.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, I am against you [Nineveh], says the Lord of hosts, and I will burn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' chariots in the smoke, and the sword shall devour your young lions. And I will cut off your prey from the earth, and the voice of your messengers shall no more be heard.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Lord restores the excellency of Jacob as the excellency of [ancient] Israel, for plunderers have plundered them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' emptied them out and [outrageously] destroyed their vine branches. [Isa. 10:12.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The shields of the mighty men [of Media and Babylon] are [dyed] red; the valiant men are [clothed] in dyed scarlet. The chariots blaze with fire of steel on the day of his preparation [for battle], and the officers'' horses prance like a cypress forest [reeling in the wind].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The chariots rage in confusion in the streets; they run to and fro [in wild terror] in the broad ways. They flash with steel [making them appear like torches]; they rush [in various directions] like forked lightnings.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [The Assyrian leader] remembers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' summons his bravest men; they stumble in their march. They hasten to the city''s wall, and their movable defense shelter is prepared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set up.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The gates '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dams of the rivers [surrounding and guarding Nineveh] are opened and the [imperial] palace [of sun-dried brick] is dissolved [by the torrents] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is in dismay.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It is decreed. She [Nineveh] is stripped and removed, and her maids are lamenting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' moaning like doves [softly for fear], beating upon their breasts [and hearts].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Nineveh, like a standing pool are her waters and [her inhabitants] are fleeing away! Stand! Stand [firm! a few cry], but no one looks back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' causes them to return.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Take the spoil of silver; take the spoil of gold! For there is no end of the treasure, the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wealth of all the precious furnishings.'
