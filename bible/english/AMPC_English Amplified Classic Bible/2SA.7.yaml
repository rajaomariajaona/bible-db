document_id: 2SA.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHEN KING David dwelt in his house and the Lord had given him rest from all his surrounding enemies,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And I will appoint a place for My people Israel and will plant them, that they may dwell in a place of their own and be moved no more. And wicked men shall afflict them no more, as formerly'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And as from the time that I appointed judges over My people Israel; and I will cause you to rest from all your enemies. Also the Lord declares to you that He will make for you a house:'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And when your days are fulfilled and you sleep with your fathers, I will set up after you your offspring who shall be born to you, and I will establish his kingdom.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He shall build a house for My Name [and My Presence], and I will establish the throne of his kingdom forever.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I will be his Father, and he shall be My son. When he commits iniquity, I will chasten him with the rod of men and with the stripes of the sons of men.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But My mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness shall not depart from him, as I took [them] from Saul, whom I took away from before you.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And your house and your kingdom shall be made sure forever before you; your throne shall be established forever.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' In accordance with all these words and all this vision Nathan spoke to David.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Then King David went in and sat before the Lord, and said, Who am I, O Lord God, and what is my house, that You have brought me this far?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Then as if this were a little thing in Your eyes, O Lord God, You have spoken also of Your servant''s house in the far distant future. And this is the law for man, O Lord God!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The king said to Nathan the prophet, See now, I dwell in a house of cedar, but the ark of God dwells within curtains.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' What more can David say to You? For You know Your servant, O Lord God.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Because of Your promise and as Your own heart dictates, You have done all these astounding things to make Your servant know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Therefore You are great, O Lord God; for none is like You, nor is there any God besides You, according to all [You have made] our ears to hear.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' What [other] one nation on earth is like Your people Israel, whom God went to redeem to be a people for Himself and to make for Himself a name? You have done great and terrible things for Yourself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for Your land, before Your people, whom You redeemed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delivered for Yourself from Egypt, from the nations and their gods.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And You have established for Yourself Your people Israel to be Your people forever, and You, Lord, became their God.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Now, O Lord God, confirm forever the word You have given as to Your servant and his house; and do as You have said,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And Your name [and presence] shall be magnified forever, saying, The Lord of hosts is God over Israel; and the house of Your servant David will be made firm before You.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' For You, O Lord of hosts, God of Israel, have revealed this to Your servant: I will build you a house. So Your servant has found courage to pray this prayer to You.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And now, O Lord God, You are God, and Your words are truth, and You have promised this good thing to Your servant.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Therefore now let it please You to bless the house of Your servant, that it may continue forever before You; for You, O Lord God, have spoken it, and with Your blessing let [his] house be blessed forever.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And Nathan said to the king, Go, do all that is in your heart, for the Lord is with you.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' That night the word of the Lord came to Nathan, saying,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Go and tell My servant David, Thus says the Lord: Shall you build Me a house in which to dwell?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For I have not dwelt in a house since I brought the Israelites out of Egypt to this day, but have moved about with a tent for My dwelling.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' In all the places where I have moved with all the Israelites, did I speak a word to any from the tribes of Israel whom I commanded to be shepherd of My people Israel, asking, Why do you not build Me a house of cedar?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' So now say this to My servant David, Thus says the Lord of hosts: I took you from the pasture, from following the sheep, to be prince over My people Israel.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And I was with you wherever you went, and have cut off all your enemies from before you; and I will make you a great name, like [that] of the great men of the earth.'
