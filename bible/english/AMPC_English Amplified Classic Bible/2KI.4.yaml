document_id: 2KI.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THE wife of a son of the prophets cried to Elisha, Your servant my husband is dead, and you know that your servant feared the Lord. But the creditor has come to take my two sons to be his slaves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Elisha said to her, What shall I do for you? Tell me, what have you [of sale value] in the house? She said, Your handmaid has nothing in the house except a jar of oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then he said, Go around and borrow vessels from all your neighbors, empty vessels–and not a few.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And when you come in, shut the door upon you and your sons. Then pour out [the oil you have] into all those vessels, setting aside each one when it is full.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So she went from him and shut the door upon herself and her sons, who brought to her the vessels as she poured the oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' When the vessels were all full, she said to her son, Bring me another vessel. And he said to her, There is not a one left. Then the oil stopped multiplying.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then she came and told the man of God. He said, Go, sell the oil and pay your debt, and you and your sons live on the rest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' One day Elisha went on to Shunem, where a rich and influential woman lived, who insisted on his eating a meal. Afterward, whenever he passed by, he stopped there for a meal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And she said to her husband, Behold now, I perceive that this is a holy man of God who passes by continually.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Let us make a small chamber on the [housetop] and put there for him a bed, a table, a chair, and a lamp. Then whenever he comes to us, he can go [up the outside stairs and rest] here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' One day he came and turned into the chamber and lay there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And he said to Gehazi his servant, Call this Shunammite. When he had called her, she stood before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And he said to Gehazi, Say now to her, You have been most painstakingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverently concerned for us; what is to be done for you? Would you like to be spoken for to the king or to the commander of the army? She answered, I dwell among my own people [they are sufficient].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Later Elisha said, What then is to be done for her? Gehazi answered, She has no child and her husband is old.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He said, Call her. [Gehazi] called her, and she stood in the doorway.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Elisha said, At this season when the time comes round, you shall embrace a son. She said, No, my lord, you man of God, do not lie to your handmaid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But the woman conceived and bore a son at that season the following year, as Elisha had said to her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' When the child had grown, he went out one day to his father with the reapers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But he said to his father, My head, my head! The man said to his servant, Carry him to his mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And when he was brought to his mother, he sat on her knees till noon, and then died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And she went up and laid him on the bed of the man of God, and shut the door upon him and went out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And she called to her husband and said, Send me one of the servants and one of the donkeys, that I may go quickly to the man of God and come back again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And he said, Why go to him today? It is neither the New Moon nor the Sabbath. And she said, It will be all right.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then she saddled the donkey and said to her servant, Ride fast; do not slacken your pace for me unless I tell you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' So she set out and came to the man of God at Mount Carmel. When the man of God saw her afar off, he said to Gehazi his servant, Behold, yonder is that Shunammite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Run to meet her and say, Is it well with you? Well with your husband? Well with the child? And she answered, It is well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' When she came to the mountain to the man of God, she clung to his feet. Gehazi came to thrust her away, but the man of God said, Let her alone, for her soul is bitter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vexed within her, and the Lord has hid it from me and has not told me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then she said, Did I desire a son of my lord? Did I not say, Do not deceive me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then he said to Gehazi, Gird up your loins and take my staff in your hand and go lay my staff on the face of the child. If you meet any man, do not salute him. If he salutes you, do not answer him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The mother of the child said, As the Lord lives and as my soul lives, I will not leave you. And he arose and followed her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Gehazi passed on before them and laid the staff on the child''s face, but the boy neither spoke nor heard. So he went back to meet Elisha and said to him, The child has not awakened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' When Elisha arrived in the house, the child was dead and laid upon his bed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' So he went in, shut the door on the two of them, and prayed to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' He went up and lay on the child, put his mouth on his mouth, his eyes on his eyes, and his hands on his hands. And as he stretched himself on him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' embraced him, the child''s flesh became warm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Then he returned and walked in the house to and fro and went up again and stretched himself upon him. And the child sneezed seven times, and then opened his eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Then [Elisha] called Gehazi and said, Call this Shunammite. So he called her. And when she came, he said, Take up your son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' She came and fell at his feet, bowing herself to the ground. Then she took up her son and went out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Elisha came back to Gilgal during a famine in the land. The sons of the prophets were sitting before him, and he said to his servant, Set on the big pot and cook pottage for the sons of the prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Then one went into the field to gather herbs and gathered from a wild vine his lap full of wild gourds, and returned and cut them up into the pot of pottage, for they were unknown to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' So they poured it out for the men to eat. But as they ate of the pottage, they cried out, O man of God, there is death in the pot! And they could not eat it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' But he said, Bring meal [as a symbol of God''s healing power]. And he cast it into the pot and said, Pour it out for the people that they may eat. Then there was no harm in the pot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' [At another time] a man from Baal-shalisha came and brought the man of God bread of the firstfruits, twenty loaves of barley, and fresh ears of grain [in the husk] in his sack. And Elisha said, Give to the men that they may eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' His servant said, How am I to set [only] this before a hundred [hungry] men? He said, Give to the men that they may eat. For thus says the Lord: They shall be fed and have some left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' So he set it before them, and they ate and left some, as the Lord had said.'
