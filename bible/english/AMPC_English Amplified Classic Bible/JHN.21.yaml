document_id: JHN.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THIS, Jesus let Himself be seen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revealed [Himself] again to the disciples, at the Sea of Tiberias. And He did it in this way:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' There were together Simon Peter, and Thomas, called the Twin, and Nathanael from Cana of Galilee, also the sons of Zebedee, and two others of His disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Simon Peter said to them, I am going fishing! They said to him, And we are coming with you! So they went out and got into the boat, and throughout that night they caught nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Morning was already breaking when Jesus came to the beach and stood there. However, the disciples did not know that it was Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So Jesus said to them, Boys (children), you do not have any meat (fish), do you? [Have you caught anything to eat along with your bread?] They answered Him, No!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And He said to them, Cast the net on the right side of the boat and you will find [some]. So they cast the net, and now they were not able to haul it in for such a big catch (mass, quantity) of fish [was in it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then the disciple whom Jesus loved said to Peter, It is the Lord! Simon Peter, hearing him say that it was the Lord, put (girded) on his upper garment (his fisherman''s coat, his outer tunic)–for he was stripped [for work]–and sprang into the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the other disciples came in the small boat, for they were not far from shore, only some hundred yards away, dragging the net full of fish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' When they got out on land (the beach), they saw a fire of coals there and fish lying on it [cooking], and bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Jesus said to them, Bring some of the fish which you have just caught.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So Simon Peter went aboard and hauled the net to land, full of large fish, 153 of them; and [though] there were so many of them, the net was not torn.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Jesus said to them, Come [and] have breakfast. But none of the disciples ventured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dared to ask Him, Who are You? because they [well] knew that it was the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Jesus came and took the bread and gave it to them, and so also [with] the fish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' This was now the third time that Jesus revealed Himself (appeared, was manifest) to the disciples after He had risen from the dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' When they had eaten, Jesus said to Simon Peter, Simon, son of John, do you love Me more than these [others do–with reasoning, intentional, spiritual devotion, as one loves the Father]? He said to Him, Yes, Lord, You know that I love You [that I have deep, instinctive, personal affection for You, as for a close friend]. He said to him, Feed My lambs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Again He said to him the second time, Simon, son of John, do you love Me [with reasoning, intentional, spiritual devotion, as one loves the Father]? He said to Him, Yes, Lord, You know that I love You [that I have a deep, instinctive, personal affection for You, as for a close friend]. He said to him, Shepherd (tend) My sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He said to him the third time, Simon, son of John, do you love Me [with a deep, instinctive, personal affection for Me, as for a close friend]? Peter was grieved (was saddened and hurt) that He should ask him the third time, Do you love Me? And he said to Him, Lord, You know everything; You know that I love You [that I have a deep, instinctive, personal affection for You, as for a close friend]. Jesus said to him, Feed My sheep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' I assure you, most solemnly I tell you, when you were young you girded yourself [put on your own belt or girdle] and you walked about wherever you pleased to go. But when you grow old you will stretch out your hands, and someone else will put a girdle around you and carry you where you do not wish to go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He said this to indicate by what kind of death Peter would glorify God. And after this, He said to him, Follow Me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But Peter turned and saw the disciple whom Jesus loved, following–the one who also had leaned back on His breast at the supper and had said, Lord, who is it that is going to betray You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' When Peter saw him, he said to Jesus, Lord, what about this man?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Jesus said to him, If I want him to stay (survive, live) until I come, what is that to you? [What concern is it of yours?] You follow Me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' So word went out among the brethren that this disciple was not going to die; yet Jesus did not say to him that he was not going to die, but, If I want him to stay (survive, live) till I come, what is that to you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' It is this same disciple who is bearing witness to these things and who has recorded (written) them; and we [well] know that his testimony is true.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And there are also many other things which Jesus did. If they should be all recorded one by one [in detail], I suppose that even the world itself could not contain (have room for) the books that would be written.'
