document_id: JON.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THE word of the Lord came to Jonah son of Amittai, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Arise, go to Nineveh, that great city, and proclaim against it, for their wickedness has come up before Me. [Gen. 10:11, 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But Jonah rose up to flee to Tarshish from being in the presence of the Lord [as His prophet] and went down to Joppa and found a ship going to Tarshish [the most remote of the Phoenician trading places then known]. So he paid the appointed fare and went down into the ship to go with them to Tarshish from being in the presence of the Lord [as His servant and minister]. [Gen. 4:16; Job 1:12; 2:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But the Lord sent out a great wind upon the sea, and there was a violent tempest on the sea so that the ship was about to be broken. [Ps. 107:23-27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the mariners were afraid, and each man cried to his god; and they cast the goods that were in the ship into the sea to lighten it for them. But Jonah had gone down into the inner part of the ship and had lain down and was fast asleep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So the captain came and said to him, What do you mean, you sleeper? Arise, call upon your God! Perhaps your God will give a thought to us so that we shall not perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And they each said to one another, Come, let us cast lots, that we may know on whose account this evil has come upon us. So they cast lots and the lot fell on Jonah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then they said to him, Tell us, we pray you, on whose account has this evil come upon us? What is your occupation? Where did you come from? And what is your country and nationality?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he said to them, I am a Hebrew, and I [reverently] fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship the Lord, the God of heaven, Who made the sea and the dry land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then the men were exceedingly afraid and said to him, What is this that you have done? For the men knew that he fled from being in the presence of the Lord [as His prophet and servant], because he had told them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then they said to him, What shall we do to you, that the sea may subside '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be calm for us? For the sea became more and more [violently] tempestuous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And [Jonah] said to them, Take me up and cast me into the sea; so shall the sea become calm for you, for I know that it is because of me that this great tempest has come upon you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Nevertheless the men rowed hard to bring the ship to the land, but they could not, for the sea became more and more violent against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Therefore they cried to the Lord, We beseech You, O Lord, we beseech You, let us not perish for this man''s life, and lay not upon us innocent blood; for You, O Lord, have done as it pleased You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So they took up Jonah and cast him into the sea, and the sea ceased from its raging.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then the men [reverently and worshipfully] feared the Lord exceedingly, and they offered a sacrifice to the Lord and made vows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Now the Lord had prepared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appointed a great fish to swallow up Jonah. And Jonah was in the belly of the fish three days and three nights. [Matt. 12:40.]'
