document_id: PSA.116,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' I LOVE the Lord, because He has heard [and now hears] my voice and my supplications.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' I believed (trusted in, relied on, and clung to my God), and therefore have I spoken [even when I said], I am greatly afflicted. [II Cor. 4:13.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' I said in my haste, All men are deceitful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' liars.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' What shall I render to the Lord for all His benefits toward me? [How can I repay Him for all His bountiful dealings?]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' I will lift up the cup of salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliverance and call on the name of the Lord.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I will pay my vows to the Lord, yes, in the presence of all His people.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Precious (important and no light matter) in the sight of the Lord is the death of His saints (His loving ones).'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' O Lord, truly I am Your servant; I am Your servant, the son of Your handmaid; You have loosed my bonds.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' I will offer to You the sacrifice of thanksgiving and will call on the name of the Lord.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' I will pay my vows to the Lord, yes, in the presence of all His people,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' In the courts of the Lord''s house–in the midst of you, O Jerusalem. Praise the Lord! (Hallelujah!)'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Because He has inclined His ear to me, therefore will I call upon Him as long as I live.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The cords '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorrows of death were around me, and the terrors of Sheol (the place of the dead) had laid hold of me; I suffered anguish and grief (trouble and sorrow).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Then called I upon the name of the Lord: O Lord, I beseech You, save my life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliver me!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Gracious is the Lord, and [rigidly] righteous; yes, our God is merciful.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' The Lord preserves the simple; I was brought low, and He helped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saved me.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Return to your rest, O my soul, for the Lord has dealt bountifully with you. [Matt. 11:29.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' For You have delivered my life from death, my eyes from tears, and my feet from stumbling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' falling.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' I will walk before the Lord in the land of the living.'
