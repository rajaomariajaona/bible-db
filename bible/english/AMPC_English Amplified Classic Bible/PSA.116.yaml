document_id: PSA.116,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' I LOVE the Lord, because He has heard [and now hears] my voice and my supplications.'
  '10':
  - type: text
    content: ' I believed (trusted in, relied on, and clung to my God), and therefore have I spoken [even when I said], I am greatly afflicted. [II Cor. 4:13.]'
  '11':
  - type: text
    content: ' I said in my haste, All men are deceitful '
  - type: text
    content: and
  - type: text
    content: ' liars.'
  '12':
  - type: text
    content: ' What shall I render to the Lord for all His benefits toward me? [How can I repay Him for all His bountiful dealings?]'
  '13':
  - type: text
    content: ' I will lift up the cup of salvation '
  - type: text
    content: and
  - type: text
    content: ' deliverance and call on the name of the Lord.'
  '14':
  - type: text
    content: ' I will pay my vows to the Lord, yes, in the presence of all His people.'
  '15':
  - type: text
    content: ' Precious (important and no light matter) in the sight of the Lord is the death of His saints (His loving ones).'
  '16':
  - type: text
    content: ' O Lord, truly I am Your servant; I am Your servant, the son of Your handmaid; You have loosed my bonds.'
  '17':
  - type: text
    content: ' I will offer to You the sacrifice of thanksgiving and will call on the name of the Lord.'
  '18':
  - type: text
    content: ' I will pay my vows to the Lord, yes, in the presence of all His people,'
  '19':
  - type: text
    content: ' In the courts of the Lord''s house–in the midst of you, O Jerusalem. Praise the Lord! (Hallelujah!)'
  '2':
  - type: text
    content: ' Because He has inclined His ear to me, therefore will I call upon Him as long as I live.'
  '3':
  - type: text
    content: ' The cords '
  - type: text
    content: and
  - type: text
    content: ' sorrows of death were around me, and the terrors of Sheol (the place of the dead) had laid hold of me; I suffered anguish and grief (trouble and sorrow).'
  '4':
  - type: text
    content: ' Then called I upon the name of the Lord: O Lord, I beseech You, save my life '
  - type: text
    content: and
  - type: text
    content: ' deliver me!'
  '5':
  - type: text
    content: ' Gracious is the Lord, and [rigidly] righteous; yes, our God is merciful.'
  '6':
  - type: text
    content: ' The Lord preserves the simple; I was brought low, and He helped '
  - type: text
    content: and
  - type: text
    content: ' saved me.'
  '7':
  - type: text
    content: ' Return to your rest, O my soul, for the Lord has dealt bountifully with you. [Matt. 11:29.]'
  '8':
  - type: text
    content: ' For You have delivered my life from death, my eyes from tears, and my feet from stumbling '
  - type: text
    content: and
  - type: text
    content: ' falling.'
  '9':
  - type: text
    content: ' I will walk before the Lord in the land of the living.'
