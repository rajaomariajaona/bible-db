document_id: ACT.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE high priest asked [Stephen], Are these charges true?'
  '10':
  - type: text
    content: ' And delivered him from all his distressing afflictions and won him goodwill '
  - type: text
    content: and
  - type: text
    content: ' favor and wisdom '
  - type: text
    content: and
  - type: text
    content: ' understanding in the sight of Pharaoh, king of Egypt, who made him governor over Egypt and all his house. [Gen. 39:2, 3, 21; 41:40-46; Ps. 105:21.]'
  '11':
  - type: text
    content: ' Then there came a famine over all of Egypt and Canaan, with great distress, and our forefathers could find no fodder [for the cattle] '
  - type: text
    content: or
  - type: text
    content: ' vegetable sustenance [for their households]. [Gen. 41:54, 55; 42:5.]'
  '12':
  - type: text
    content: ' But when Jacob heard that there was grain in Egypt, he sent forth our forefathers [to go there on their] first trip. [Gen. 42:2.]'
  '13':
  - type: text
    content: ' And on their second visit Joseph revealed himself to his brothers, and the family of Joseph became known to Pharaoh '
  - type: text
    content: and
  - type: text
    content: ' his origin '
  - type: text
    content: and
  - type: text
    content: ' race. [Gen. 45:1-4.]'
  '14':
  - type: text
    content: ' And Joseph sent an invitation calling to himself Jacob his father and all his kindred, seventy-five persons in all. [Gen. 45:9, 10.]'
  '15':
  - type: text
    content: ' And Jacob went down into Egypt, where he himself died, as did [also] our forefathers; [Deut. 10:22.]'
  '16':
  - type: text
    content: ' And their bodies [Jacob''s and Joseph''s] were taken back to Shechem and laid in the tomb which Abraham had purchased for a sum of [silver] money from the sons of Hamor in Shechem. [Gen. 50:13; Josh. 24:32.]'
  '17':
  - type: text
    content: ' But as the time for the fulfillment of the promise drew near which God had made to Abraham, the [Hebrew] people increased and multiplied in Egypt,'
  '18':
  - type: text
    content: ' Until [the time when] there arose over Egypt another '
  - type: text
    content: and
  - type: text
    content: ' a different king who did not know Joseph [neither knowing his history and services nor recognizing his merits]. [Exod. 1:7, 8.]'
  '19':
  - type: text
    content: ' He dealt treacherously with '
  - type: text
    content: and
  - type: text
    content: ' defrauded our race; he abused '
  - type: text
    content: and
  - type: text
    content: ' oppressed our forefathers, forcing them to expose their babies so that they might not be kept alive. [Exod. 1:7-11, 15-22.]'
  '2':
  - type: text
    content: ' And he answered, Brethren and fathers, listen to me! The God of glory appeared to our forefather Abraham when he was still in Mesopotamia, before he [went to] live in Haran, [Gen. 11:31; 15:7; Ps. 29:3.]'
  '20':
  - type: text
    content: ' At this juncture Moses was born, and was exceedingly beautiful in God''s sight. For three months he was nurtured in his father''s house; [Exod. 2:2.]'
  '21':
  - type: text
    content: ' Then when he was exposed [to perish], the daughter of Pharaoh rescued him and took him '
  - type: text
    content: and
  - type: text
    content: ' reared him as her own son. [Exod. 2:5, 6, 10.]'
  '22':
  - type: text
    content: ' So Moses was educated in all the wisdom '
  - type: text
    content: and
  - type: text
    content: ' culture of the Egyptians, and he was mighty (powerful) in his speech and deeds.'
  '23':
  - type: text
    content: ' And when he was in his fortieth year, it came into his heart to visit his kinsmen the children of Israel [to help them and to care for them].'
  '24':
  - type: text
    content: ' And on seeing one of them being unjustly treated, he defended the oppressed man and avenged him by striking down the Egyptian '
  - type: text
    content: and
  - type: text
    content: ' slaying [him].'
  '25':
  - type: text
    content: ' He expected his brethren to understand that God was granting them deliverance by his hand [taking it for granted that they would accept him]; but they did not understand.'
  '26':
  - type: text
    content: ' Then on the next day he suddenly appeared to some who were quarreling '
  - type: text
    content: and
  - type: text
    content: ' fighting among themselves, and he urged them to make peace '
  - type: text
    content: and
  - type: text
    content: ' become reconciled, saying, Men, you are brethren; why do you abuse '
  - type: text
    content: and
  - type: text
    content: ' wrong one another?'
  '27':
  - type: text
    content: ' Whereupon the man who was abusing his neighbor pushed [Moses] aside, saying, Who appointed you a ruler (umpire) and a judge over us?'
  '28':
  - type: text
    content: ' Do you intend to slay me as you slew the Egyptian yesterday?'
  '29':
  - type: text
    content: ' At that reply Moses sought safety by flight and he was an exile '
  - type: text
    content: and
  - type: text
    content: ' an alien in the country of Midian, where he became the father of two sons. [Exod. 2:11-15, 22; 18:3, 4.]'
  '3':
  - type: text
    content: ' And He said to him, Leave your own country and your relatives and come into the land (region) that I will point out to you. [Gen. 12:1.]'
  '30':
  - type: text
    content: ' And when forty years had gone by, there appeared to him in the wilderness (desert) of Mount Sinai an angel, in the flame of a burning bramblebush.'
  '31':
  - type: text
    content: ' When Moses saw it, he was astonished '
  - type: text
    content: and
  - type: text
    content: ' marveled at the sight; but when he went close to investigate, there came to him the voice of the Lord, saying,'
  '32':
  - type: text
    content: ' I am the God of your forefathers, the God of Abraham and of Isaac and of Jacob. And Moses trembled '
  - type: text
    content: and
  - type: text
    content: ' was so terrified that he did not venture to look.'
  '33':
  - type: text
    content: ' Then the Lord said to him, Remove the sandals from your feet, for the place where you are standing is holy ground '
  - type: text
    content: and
  - type: text
    content: ' worthy of veneration.'
  '34':
  - type: text
    content: ' Because I have most assuredly seen the abuse '
  - type: text
    content: and
  - type: text
    content: ' oppression of My people in Egypt and have heard their sighing '
  - type: text
    content: and
  - type: text
    content: ' groaning, I have come down to rescue them. So, now come! I will send you back to Egypt [as My messenger]. [Exod. 3:1-10.]'
  '35':
  - type: text
    content: ' It was this very Moses whom they had denied (disowned and rejected), saying, Who made you our ruler (referee) and judge? whom God sent to be a ruler and deliverer '
  - type: text
    content: and
  - type: text
    content: ' redeemer, by '
  - type: text
    content: and
  - type: text
    content: ' with the [protecting and helping] hand of the Angel that appeared to him in the bramblebush. [Exod. 2:14.]'
  '36':
  - type: text
    content: ' He it was who led them forth, having worked wonders and signs in Egypt and at the Red Sea and during the forty years in the wilderness (desert). [Exod. 7:3; 14:21; Num. 14:33.]'
  '37':
  - type: text
    content: ' It was this [very] Moses who said to the children of Israel, God will raise up for you a Prophet from among your brethren as He raised me up. [Deut. 18:15, 18.]'
  '38':
  - type: text
    content: ' This is he who in the assembly in the wilderness (desert) was the go-between for the Angel who spoke to him on Mount Sinai and our forefathers, and he received living oracles (words that still live) to be handed down to us. [Exod. 19.]'
  '39':
  - type: text
    content: ' [And yet] our forefathers determined not to be subject to him [refusing to listen to '
  - type: text
    content: or
  - type: text
    content: ' obey him]; but thrusting him aside they rejected him, and in their hearts yearned for '
  - type: text
    content: and
  - type: text
    content: ' turned back to Egypt. [Num. 14:3, 4.]'
  '4':
  - type: text
    content: ' So then he went forth from the land of the Chaldeans and settled in Haran. And from there, after his father died, [God] transferred him to this country in which you are now dwelling. [Gen. 11:31; 12:5; 15:7.]'
  '40':
  - type: text
    content: ' And they said to Aaron, Make us gods who shall [be our leaders and] go before us; as for this Moses who led us forth from the land of Egypt–we have no knowledge of what has happened to him. [Exod. 32:1, 23.]'
  '41':
  - type: text
    content: ' And they [even] made a calf in those days, and offered sacrifice to the idol and made merry '
  - type: text
    content: and
  - type: text
    content: ' exulted in the work of their [own] hands. [Exod. 32:4, 6.]'
  '42':
  - type: text
    content: ' But God turned [away from them] and delivered them up to worship '
  - type: text
    content: and
  - type: text
    content: ' serve the host (stars) of heaven, as it is written in the book of the prophets: Did you [really] offer to Me slain beasts and sacrifices for forty years in the wilderness (desert), O house of Israel? [Jer. 19:13.]'
  '43':
  - type: text
    content: ' [No!] You took up the tent (the portable temple) of Moloch '
  - type: text
    content: and
  - type: text
    content: ' carried it [with you], and the star of the god Rephan, the images which you [yourselves] made that you might worship them; and I will remove you [carrying you away into exile] beyond Babylon. [Amos 5:25-27.]'
  '44':
  - type: text
    content: ' Our forefathers had the tent (tabernacle) of witness in the wilderness, even as He Who directed Moses to make it had ordered, according to the pattern '
  - type: text
    content: and
  - type: text
    content: ' model he had seen. [Exod. 25:9-40.]'
  '45':
  - type: text
    content: ' Our forefathers in turn brought it [this tent of witness] in [with them into the land] with Joshua when they dispossessed the nations which God drove out before the face of our forefathers. [So it remained here] until the time of David, [Deut. 32:49; Josh. 3:14-17.]'
  '46':
  - type: text
    content: ' Who found grace (favor and spiritual blessing) in the sight of God and prayed that he might be allowed to find a dwelling place for the God of Jacob. [II Sam. 7:8-16; Ps. 132:1-5.]'
  '47':
  - type: text
    content: ' But it was Solomon who built a house for Him. [I Kings 6.]'
  '48':
  - type: text
    content: ' However, the Most High does not dwell in houses '
  - type: text
    content: and
  - type: text
    content: ' temples made with hands; as the prophet says, [Isa. 66:1, 2.]'
  '49':
  - type: text
    content: ' Heaven [is] My throne, and earth the footstool for My feet. What [kind of] house can you build for Me, says the Lord, or what is the place in which I can rest?'
  '5':
  - type: text
    content: ' Yet He gave him no inheritable property in it, [no] not even enough ground to set his foot on; but He promised that He would give it to Him for a permanent possession and to his descendants after him, even though [as yet] he had no child. [Gen. 12:7; 17:8; Deut. 2:5.]'
  '50':
  - type: text
    content: ' Was it not My hand that made all these things? [Isa. 66:1, 2.]'
  '51':
  - type: text
    content: ' You stubborn '
  - type: text
    content: and
  - type: text
    content: ' stiff-necked people, still heathen '
  - type: text
    content: and
  - type: text
    content: ' uncircumcised in heart and ears, you are always actively resisting the Holy Spirit. As your forefathers [were], so you [are and so you do]! [Exod. 33:3, 5; Num. 27:14; Isa. 63:10; Jer. 6:10; 9:26.]'
  '52':
  - type: text
    content: ' Which of the prophets did your forefathers not persecute? And they slew those who proclaimed beforehand the coming of the Righteous One, Whom you now have betrayed and murdered–'
  '53':
  - type: text
    content: ' You who received the Law as it was ordained '
  - type: text
    content: and
  - type: text
    content: ' set in order '
  - type: text
    content: and
  - type: text
    content: ' delivered by angels, and [yet] you did not obey it!'
  '54':
  - type: text
    content: ' Now upon hearing these things, they [the Jews] were cut to the heart '
  - type: text
    content: and
  - type: text
    content: ' infuriated, and they ground their teeth against [Stephen].'
  '55':
  - type: text
    content: ' But he, full of the Holy Spirit '
  - type: text
    content: and
  - type: text
    content: ' controlled by Him, gazed into heaven and saw the glory (the splendor and majesty) of God, and Jesus standing at God''s right hand;'
  '56':
  - type: text
    content: ' And he said, Look! I see the heavens opened, and the Son of man standing at God''s right hand!'
  '57':
  - type: text
    content: ' But they raised a great shout and put their hands over their ears and rushed together upon him.'
  '58':
  - type: text
    content: ' Then they dragged him out of the city and began to stone him, and the witnesses placed their garments at the feet of a young man named Saul. [Acts 22:20.]'
  '59':
  - type: text
    content: ' And while they were stoning Stephen, he prayed, Lord Jesus, receive '
  - type: text
    content: and
  - type: text
    content: ' accept '
  - type: text
    content: and
  - type: text
    content: ' welcome my spirit!'
  '6':
  - type: text
    content: ' And this is [in effect] what God told him: That his descendants would be aliens (strangers) in a land belonging to other people, who would bring them into bondage and ill-treat them 400 years.'
  '60':
  - type: text
    content: ' And falling on his knees, he cried out loudly, Lord, fix not this sin upon them [lay it not to their charge]! And when he had said this, he fell asleep [in death].'
  '7':
  - type: text
    content: ' But I will judge the nation to whom they will be slaves, said God, and after that they will escape '
  - type: text
    content: and
  - type: text
    content: ' come forth and worship Me in this [very] place. [Gen. 15:13, 14; Exod. 3:12.]'
  '8':
  - type: text
    content: ' And [God] made with Abraham a covenant (an agreement to be religiously observed) of which circumcision was the seal. And under these circumstances [Abraham] became the father of Isaac and circumcised him on the eighth day; and Isaac [did so] when he became the father of Jacob, and Jacob [when each of his sons was born], the twelve patriarchs. [Gen. 17:10-14; 21:2-4; 25:26; 29:31-35; 30:1-24; 35:16-26.]'
  '9':
  - type: text
    content: ' And the patriarchs [Jacob''s sons], boiling with envy '
  - type: text
    content: and
  - type: text
    content: ' hatred '
  - type: text
    content: and
  - type: text
    content: ' anger, sold Joseph into slavery in Egypt; but God was with him, [Gen. 37:11, 28; 45:4.]'
