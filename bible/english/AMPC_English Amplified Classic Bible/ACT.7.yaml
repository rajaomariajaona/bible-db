document_id: ACT.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE high priest asked [Stephen], Are these charges true?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he answered, Brethren and fathers, listen to me! The God of glory appeared to our forefather Abraham when he was still in Mesopotamia, before he [went to] live in Haran, [Gen. 11:31; 15:7; Ps. 29:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And He said to him, Leave your own country and your relatives and come into the land (region) that I will point out to you. [Gen. 12:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So then he went forth from the land of the Chaldeans and settled in Haran. And from there, after his father died, [God] transferred him to this country in which you are now dwelling. [Gen. 11:31; 12:5; 15:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Yet He gave him no inheritable property in it, [no] not even enough ground to set his foot on; but He promised that He would give it to Him for a permanent possession and to his descendants after him, even though [as yet] he had no child. [Gen. 12:7; 17:8; Deut. 2:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And this is [in effect] what God told him: That his descendants would be aliens (strangers) in a land belonging to other people, who would bring them into bondage and ill-treat them 400 years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But I will judge the nation to whom they will be slaves, said God, and after that they will escape '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come forth and worship Me in this [very] place. [Gen. 15:13, 14; Exod. 3:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And [God] made with Abraham a covenant (an agreement to be religiously observed) of which circumcision was the seal. And under these circumstances [Abraham] became the father of Isaac and circumcised him on the eighth day; and Isaac [did so] when he became the father of Jacob, and Jacob [when each of his sons was born], the twelve patriarchs. [Gen. 17:10-14; 21:2-4; 25:26; 29:31-35; 30:1-24; 35:16-26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the patriarchs [Jacob''s sons], boiling with envy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hatred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anger, sold Joseph into slavery in Egypt; but God was with him, [Gen. 37:11, 28; 45:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And delivered him from all his distressing afflictions and won him goodwill '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor and wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding in the sight of Pharaoh, king of Egypt, who made him governor over Egypt and all his house. [Gen. 39:2, 3, 21; 41:40-46; Ps. 105:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then there came a famine over all of Egypt and Canaan, with great distress, and our forefathers could find no fodder [for the cattle] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vegetable sustenance [for their households]. [Gen. 41:54, 55; 42:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But when Jacob heard that there was grain in Egypt, he sent forth our forefathers [to go there on their] first trip. [Gen. 42:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And on their second visit Joseph revealed himself to his brothers, and the family of Joseph became known to Pharaoh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' his origin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' race. [Gen. 45:1-4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And Joseph sent an invitation calling to himself Jacob his father and all his kindred, seventy-five persons in all. [Gen. 45:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Jacob went down into Egypt, where he himself died, as did [also] our forefathers; [Deut. 10:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And their bodies [Jacob''s and Joseph''s] were taken back to Shechem and laid in the tomb which Abraham had purchased for a sum of [silver] money from the sons of Hamor in Shechem. [Gen. 50:13; Josh. 24:32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But as the time for the fulfillment of the promise drew near which God had made to Abraham, the [Hebrew] people increased and multiplied in Egypt,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Until [the time when] there arose over Egypt another '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a different king who did not know Joseph [neither knowing his history and services nor recognizing his merits]. [Exod. 1:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He dealt treacherously with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defrauded our race; he abused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressed our forefathers, forcing them to expose their babies so that they might not be kept alive. [Exod. 1:7-11, 15-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' At this juncture Moses was born, and was exceedingly beautiful in God''s sight. For three months he was nurtured in his father''s house; [Exod. 2:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then when he was exposed [to perish], the daughter of Pharaoh rescued him and took him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reared him as her own son. [Exod. 2:5, 6, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' So Moses was educated in all the wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' culture of the Egyptians, and he was mighty (powerful) in his speech and deeds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And when he was in his fortieth year, it came into his heart to visit his kinsmen the children of Israel [to help them and to care for them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And on seeing one of them being unjustly treated, he defended the oppressed man and avenged him by striking down the Egyptian '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slaying [him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' He expected his brethren to understand that God was granting them deliverance by his hand [taking it for granted that they would accept him]; but they did not understand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then on the next day he suddenly appeared to some who were quarreling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fighting among themselves, and he urged them to make peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become reconciled, saying, Men, you are brethren; why do you abuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrong one another?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Whereupon the man who was abusing his neighbor pushed [Moses] aside, saying, Who appointed you a ruler (umpire) and a judge over us?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Do you intend to slay me as you slew the Egyptian yesterday?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' At that reply Moses sought safety by flight and he was an exile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an alien in the country of Midian, where he became the father of two sons. [Exod. 2:11-15, 22; 18:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And when forty years had gone by, there appeared to him in the wilderness (desert) of Mount Sinai an angel, in the flame of a burning bramblebush.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' When Moses saw it, he was astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' marveled at the sight; but when he went close to investigate, there came to him the voice of the Lord, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' I am the God of your forefathers, the God of Abraham and of Isaac and of Jacob. And Moses trembled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was so terrified that he did not venture to look.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Then the Lord said to him, Remove the sandals from your feet, for the place where you are standing is holy ground '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthy of veneration.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Because I have most assuredly seen the abuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppression of My people in Egypt and have heard their sighing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' groaning, I have come down to rescue them. So, now come! I will send you back to Egypt [as My messenger]. [Exod. 3:1-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' It was this very Moses whom they had denied (disowned and rejected), saying, Who made you our ruler (referee) and judge? whom God sent to be a ruler and deliverer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' redeemer, by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with the [protecting and helping] hand of the Angel that appeared to him in the bramblebush. [Exod. 2:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' He it was who led them forth, having worked wonders and signs in Egypt and at the Red Sea and during the forty years in the wilderness (desert). [Exod. 7:3; 14:21; Num. 14:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' It was this [very] Moses who said to the children of Israel, God will raise up for you a Prophet from among your brethren as He raised me up. [Deut. 18:15, 18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' This is he who in the assembly in the wilderness (desert) was the go-between for the Angel who spoke to him on Mount Sinai and our forefathers, and he received living oracles (words that still live) to be handed down to us. [Exod. 19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' [And yet] our forefathers determined not to be subject to him [refusing to listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' obey him]; but thrusting him aside they rejected him, and in their hearts yearned for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turned back to Egypt. [Num. 14:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And they said to Aaron, Make us gods who shall [be our leaders and] go before us; as for this Moses who led us forth from the land of Egypt–we have no knowledge of what has happened to him. [Exod. 32:1, 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And they [even] made a calf in those days, and offered sacrifice to the idol and made merry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exulted in the work of their [own] hands. [Exod. 32:4, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' But God turned [away from them] and delivered them up to worship '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' serve the host (stars) of heaven, as it is written in the book of the prophets: Did you [really] offer to Me slain beasts and sacrifices for forty years in the wilderness (desert), O house of Israel? [Jer. 19:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' [No!] You took up the tent (the portable temple) of Moloch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carried it [with you], and the star of the god Rephan, the images which you [yourselves] made that you might worship them; and I will remove you [carrying you away into exile] beyond Babylon. [Amos 5:25-27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Our forefathers had the tent (tabernacle) of witness in the wilderness, even as He Who directed Moses to make it had ordered, according to the pattern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' model he had seen. [Exod. 25:9-40.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Our forefathers in turn brought it [this tent of witness] in [with them into the land] with Joshua when they dispossessed the nations which God drove out before the face of our forefathers. [So it remained here] until the time of David, [Deut. 32:49; Josh. 3:14-17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Who found grace (favor and spiritual blessing) in the sight of God and prayed that he might be allowed to find a dwelling place for the God of Jacob. [II Sam. 7:8-16; Ps. 132:1-5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' But it was Solomon who built a house for Him. [I Kings 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' However, the Most High does not dwell in houses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' temples made with hands; as the prophet says, [Isa. 66:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' Heaven [is] My throne, and earth the footstool for My feet. What [kind of] house can you build for Me, says the Lord, or what is the place in which I can rest?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' Was it not My hand that made all these things? [Isa. 66:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' You stubborn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stiff-necked people, still heathen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncircumcised in heart and ears, you are always actively resisting the Holy Spirit. As your forefathers [were], so you [are and so you do]! [Exod. 33:3, 5; Num. 27:14; Isa. 63:10; Jer. 6:10; 9:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' Which of the prophets did your forefathers not persecute? And they slew those who proclaimed beforehand the coming of the Righteous One, Whom you now have betrayed and murdered–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' You who received the Law as it was ordained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set in order '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delivered by angels, and [yet] you did not obey it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' Now upon hearing these things, they [the Jews] were cut to the heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' infuriated, and they ground their teeth against [Stephen].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' But he, full of the Holy Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' controlled by Him, gazed into heaven and saw the glory (the splendor and majesty) of God, and Jesus standing at God''s right hand;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' And he said, Look! I see the heavens opened, and the Son of man standing at God''s right hand!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' But they raised a great shout and put their hands over their ears and rushed together upon him.'
- type: usfm
  marker: p
  children:
