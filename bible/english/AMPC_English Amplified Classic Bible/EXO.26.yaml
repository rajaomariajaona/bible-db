document_id: EXO.26,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MOREOVER, YOU shall make the tabernacle with ten curtains; of fine twined linen, and blue and purple and scarlet [stuff], with cherubim skillfully embroidered shall you make them.'
  '10':
  - type: text
    content: ' And make fifty loops on the edge of the outmost curtain in the one set and fifty loops on the edge of the outmost curtain in the second set.'
  '11':
  - type: text
    content: ' You shall make fifty clasps of bronze and put the clasps into the loops and couple the tent together, that it may be one whole.'
  '12':
  - type: text
    content: ' The surplus that remains of the tent curtains, the half curtain that remains, shall hang over the back of the tabernacle.'
  '13':
  - type: text
    content: ' And the cubit on the one side and the cubit on the other side of what remains in the length of the curtains of the tent shall hang over the sides of the tabernacle, on this side and that side, to cover it.'
  '14':
  - type: text
    content: ' You shall make a [third] covering for the tent of rams'' skins tanned red, and a [fourth] covering above that of dolphin '
  - type: text
    content: or
  - type: text
    content: ' porpoise skins.'
  '15':
  - type: text
    content: ' And you shall make the upright frame for the tabernacle of boards of acacia wood.'
  '16':
  - type: text
    content: ' Ten cubits shall be the length of a board and a cubit and a half shall be the breadth of one board.'
  '17':
  - type: text
    content: ' Make two tenons in each board for dovetailing '
  - type: text
    content: and
  - type: text
    content: ' fitting together; so shall you do for all the tabernacle boards.'
  '18':
  - type: text
    content: ' And make the boards for the tabernacle: twenty boards for the south side;'
  '19':
  - type: text
    content: ' And you shall make forty silver sockets under the twenty boards, two sockets under each board for its two tenons.'
  '2':
  - type: text
    content: ' The length of one curtain shall be twenty-eight cubits and the breadth of one curtain four cubits; each of the curtains shall measure the same.'
  '20':
  - type: text
    content: ' And for the north side of the tabernacle there shall be twenty boards'
  '21':
  - type: text
    content: ' And their forty silver sockets, two sockets under each board.'
  '22':
  - type: text
    content: ' For the back or west side of the tabernacle you shall make six boards.'
  '23':
  - type: text
    content: ' Make two boards for the corners of the tabernacle in the rear on both sides.'
  '24':
  - type: text
    content: ' They shall be coupled down below and coupled together on top with one ring. Thus shall it be for both of them; they shall form the two corners.'
  '25':
  - type: text
    content: ' And that will be eight boards and their sockets of silver, sixteen sockets, two sockets under each board.'
  '26':
  - type: text
    content: ' And you shall make bars of acacia wood: five for the boards of one side,'
  '27':
  - type: text
    content: ' And five bars for the boards of the other side of the tabernacle, and five bars for the boards of the rear end of the tabernacle, for the back wall to the west.'
  '28':
  - type: text
    content: ' And the middle bar halfway up the boards shall pass through from end to end.'
  '29':
  - type: text
    content: ' You shall overlay the boards with gold and make their rings of gold to hold the bars and overlay the bars with gold.'
  '3':
  - type: text
    content: ' The five curtains shall be coupled to one another, and the other five curtains shall be coupled to one another.'
  '30':
  - type: text
    content: ' You shall erect the tabernacle after the plan of it shown you on the mountain.'
  '31':
  - type: text
    content: ' And make a veil of blue, purple, and scarlet [stuff] and fine twined linen, skillfully worked with cherubim on it.'
  '32':
  - type: text
    content: ' You shall hang it on four pillars of acacia wood overlaid with gold, with gold hooks, on four sockets of silver.'
  '33':
  - type: text
    content: ' And you shall hang the veil from the clasps and bring the ark of the Testimony into place within the veil; and the veil shall separate for you the Holy Place from the Most Holy Place.'
  '34':
  - type: text
    content: ' And you shall put the mercy seat on the ark of the Testimony in the Most Holy Place.'
  '35':
  - type: text
    content: ' And you shall set the table [for the showbread] outside the veil [in the Holy Place] on the north side and the lampstand opposite the table on the south side of the tabernacle.'
  '36':
  - type: text
    content: ' You shall make a hanging [to form a screen] for the door of the tent of blue, purple, and scarlet [stuff] and fine twined linen, embroidered. [John 10:9.]'
  '37':
  - type: text
    content: ' You shall make five pillars of acacia wood to support the hanging curtain and overlay them with gold; their hooks shall be of gold, and you shall cast five [base] sockets of bronze for them.'
  '4':
  - type: text
    content: ' And you shall make loops of blue on the edge of the last curtain in the first set, and likewise in the second set.'
  '5':
  - type: text
    content: ' Fifty loops you shall make on the one curtain and fifty loops on the edge of the last curtain that is in the second coupling '
  - type: text
    content: or
  - type: text
    content: ' set, so that the loops on one correspond to the loops on the other.'
  '6':
  - type: text
    content: ' And you shall make fifty clasps of gold and fasten the curtains together with the clasps; then the tabernacle shall be one whole.'
  '7':
  - type: text
    content: ' And make curtains of goats'' hair to be a [second] covering over the tabernacle; eleven curtains shall you make.'
  '8':
  - type: text
    content: ' One curtain shall be thirty cubits long and four cubits wide; and the eleven curtains shall all measure the same.'
  '9':
  - type: text
    content: ' You shall join together five curtains by themselves and six curtains by themselves, and shall double over the sixth curtain in the front of the tabernacle [to make a closed door].'
