document_id: 2CH.34
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' JOSIAH WAS eight years old when he began his thirty-one-year reign in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He did right in the sight of the Lord and walked in the ways of David his father [forefather] and turned aside neither to the right hand nor to the left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For in the eighth year of his reign, while he was yet young [sixteen], he began to seek after '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yearn for the God of David his father [forefather]; and in the twelfth year he began to purge Judah and Jerusalem of the high places, the Asherim, and the carved and molten images.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They broke down the altars of the Baals in his presence; the sun-images that were high above them he hewed down; the Asherim and the graven images and the molten images he broke in pieces and made dust of them and strewed it upon the graves of those who sacrificed to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Josiah burned the bones of the [idolatrous] priests upon their altars, and so cleansed Judah and Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So he did in the cities of Manasseh, Ephraim, and Simeon, even to Naphtali, in their ruins round about [with their axes],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He broke down the altars and the Asherim and beat the graven images into powder and hewed down all the sun-images throughout all the land of Israel. Then he returned to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' In the eighteenth year of Josiah''s reign, when he had purged the land and the [Lord''s] house, he sent Shaphan son of Azaliah, and Maaseiah governor of the city, and Joah son of Joahaz, the recorder, to repair the house of the Lord his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' When they came to Hilkiah the high priest, they delivered the money that had been brought into the house of God, which the Levites who kept the doors had collected from Manasseh, Ephraim, all the remnant of Israel, and from all Judah, Benjamin, and Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They delivered it to the workmen who had oversight of the Lord''s house, who gave it to repair and restore the temple:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' To the carpenters and builders to buy hewn stone, and timber for couplings and beams for the houses which the kings of Judah had destroyed [by neglect].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The men did the work faithfully. Their overseers were Jahath and Obadiah, Levites of the sons of Merari, and Zechariah and Meshullam, of the sons of the Kohathites. The Levites–all who were skillful with instruments of music–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Also had oversight of the burden bearers and all who did work in any kind of service; and some of the Levites were scribes, officials, and gatekeepers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When they were bringing out the money that was brought into the house of the Lord, Hilkiah the priest found the Book of the Law of the Lord given by Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Hilkiah told Shaphan the scribe, I have found the Book of the Law in the Lord''s house. And [he] gave the book to Shaphan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Shaphan took the book to King Josiah, but [first] reported to him, All that was committed to your servants they are doing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They have emptied out the money that was found in the house of the Lord and have delivered it into the hand of the overseers and the workmen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then Shaphan the scribe said to the king, Hilkiah the priest has given me a book. And Shaphan read it before the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' When King Josiah had heard the words of the Law, he rent his clothes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the king commanded Hilkiah, Ahikam son of Shaphan, Abdon son of Micah, Shaphan the scribe, and Asaiah a servant of the king, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Go, inquire of the Lord for me and for those who are left in Israel and in Judah about the words of the book that is found. For great is the Lord''s wrath that is poured out on us because our fathers have not kept the word of the Lord, to do according to all that is written in this book.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Hilkiah and they whom the king had appointed went to Huldah the prophetess, the wife of Shallum son of Tokhath, the son of Hasrah, keeper of the wardrobe. She dwelt in Jerusalem, in the Second Quarter. They spoke to her to that effect.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And she answered them, Thus says the Lord, the God of Israel: Tell the man who sent you to me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Thus says the Lord: Behold, I will bring evil upon this place and upon its inhabitants, even all the curses that are written in the book which they have read before the king of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Because they have forsaken Me and have burned incense to other gods, that they might provoke Me to anger with all the works of their hands, therefore My wrath shall be poured out upon this place and shall not be quenched.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But say to King Josiah of Judah, who sent you to inquire of the Lord, Thus says the Lord, the God of Israel, concerning the words which you have heard:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Because your heart was tender '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' penitent and you humbled yourself before God when you heard His words against this place and its inhabitants, and humbled yourself before Me and rent your clothes and wept before Me, I have heard you, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Behold, I will gather you to your fathers, and you shall be gathered to your grave in peace, and your eyes shall not see all the evil that I will bring upon this place and its inhabitants. So they brought the king word again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then King Josiah sent and gathered all the elders of Judah and Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And [he] went up into the house of the Lord, as did all the men of Judah, the inhabitants of Jerusalem, the priests, the Levites, and all the people, great and small; and he [the king] read in their hearing all the words of the Book of the Covenant that was found in the Lord''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Then the king stood in his place and made a covenant before the Lord–to walk after the Lord and to keep His commandments, His testimonies, and His statutes with all his heart and with all his soul, to perform the words of the covenant that are written in this book.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And he caused all who were present in Jerusalem and Benjamin to stand in confirmation of it. And the inhabitants of Jerusalem did according to the covenant of God, the God of their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Josiah removed all the [idolatrous] abominations from all the territory that belonged to the Israelites, and made all who were in Israel serve the Lord their God. All his days they did not turn from following the Lord, the God of their fathers.'
