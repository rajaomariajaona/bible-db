document_id: 2TH.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PAUL, SILVANUS (Silas), and Timothy, to the church (assembly) of the Thessalonians in God our Father and the Lord Jesus Christ (the Messiah, the Anointed One):'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Grace (unmerited favor) be to you and [heart] peace from God the Father and the Lord Jesus Christ (the Messiah, the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' We ought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indeed are obligated [as those in debt] to give thanks always to God for you, brethren, as is fitting, because your faith is growing exceedingly and the love of every one of you each toward the others is increasing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abounds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And this is a cause of our mentioning you with pride among the churches (assemblies) of God for your steadfastness (your unflinching endurance and patience) and your firm faith in the midst of all the persecutions and crushing distresses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflictions under which you are holding up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' This is positive proof of the just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right judgment of God to the end that you may be deemed deserving of His kingdom [a plain token of His fair verdict which designs that you should be made '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counted worthy of the kingdom of God], for the sake of which you are also suffering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [It is a fair decision] since it is a righteous thing with God to repay with distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affliction those who distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflict you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And to [recompense] you who are so distressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflicted [by granting you] relief '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rest along with us [your fellow sufferers] when the Lord Jesus is revealed from heaven with His mighty angels in a flame of fire,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' To deal out retribution (chastisement and vengeance) upon those who do not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' become acquainted with God, and [upon those] who ignore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refuse to obey the Gospel of our Lord Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Such people will pay the penalty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer the punishment of everlasting ruin (destruction and perdition) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eternal exclusion and banishment from the presence of the Lord and from the glory of His power,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When He comes to be glorified in His saints [on that day He will be made more glorious in His consecrated people], and [He will] be marveled at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' admired [in His glory reflected] in all who have believed [who have adhered to, trusted in, and relied on Him], because our witnessing among you was confidently accepted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' believed [and confirmed in your lives].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' With this in view we constantly pray for you, that our God may deem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' count you worthy of [your] calling and [His] every gracious purpose of goodness, and with power may complete in [your] every particular work of faith (faith which is that leaning of the whole human personality on God in absolute trust and confidence in His power, wisdom, and goodness).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Thus may the name of our Lord Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ
  - type: text
    text: ' be glorified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become more glorious through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in you, and may you [also be glorified] in Him according to the grace (favor and blessing) of our God and the Lord Jesus Christ (the Messiah, the Anointed One).'
