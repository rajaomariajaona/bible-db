document_id: 2TH.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PAUL, SILVANUS (Silas), and Timothy, to the church (assembly) of the Thessalonians in God our Father and the Lord Jesus Christ (the Messiah, the Anointed One):'
  '10':
  - type: text
    content: ' When He comes to be glorified in His saints [on that day He will be made more glorious in His consecrated people], and [He will] be marveled at '
  - type: text
    content: and
  - type: text
    content: ' admired [in His glory reflected] in all who have believed [who have adhered to, trusted in, and relied on Him], because our witnessing among you was confidently accepted '
  - type: text
    content: and
  - type: text
    content: ' believed [and confirmed in your lives].'
  '11':
  - type: text
    content: ' With this in view we constantly pray for you, that our God may deem '
  - type: text
    content: and
  - type: text
    content: ' count you worthy of [your] calling and [His] every gracious purpose of goodness, and with power may complete in [your] every particular work of faith (faith which is that leaning of the whole human personality on God in absolute trust and confidence in His power, wisdom, and goodness).'
  '12':
  - type: text
    content: ' Thus may the name of our Lord Jesus '
  - type: text
    content: Christ
  - type: text
    content: ' be glorified '
  - type: text
    content: and
  - type: text
    content: ' become more glorious through '
  - type: text
    content: and
  - type: text
    content: ' in you, and may you [also be glorified] in Him according to the grace (favor and blessing) of our God and the Lord Jesus Christ (the Messiah, the Anointed One).'
  '2':
  - type: text
    content: ' Grace (unmerited favor) be to you and [heart] peace from God the Father and the Lord Jesus Christ (the Messiah, the Anointed One).'
  '3':
  - type: text
    content: ' We ought '
  - type: text
    content: and
  - type: text
    content: ' indeed are obligated [as those in debt] to give thanks always to God for you, brethren, as is fitting, because your faith is growing exceedingly and the love of every one of you each toward the others is increasing '
  - type: text
    content: and
  - type: text
    content: ' abounds.'
  '4':
  - type: text
    content: ' And this is a cause of our mentioning you with pride among the churches (assemblies) of God for your steadfastness (your unflinching endurance and patience) and your firm faith in the midst of all the persecutions and crushing distresses '
  - type: text
    content: and
  - type: text
    content: ' afflictions under which you are holding up.'
  '5':
  - type: text
    content: ' This is positive proof of the just '
  - type: text
    content: and
  - type: text
    content: ' right judgment of God to the end that you may be deemed deserving of His kingdom [a plain token of His fair verdict which designs that you should be made '
  - type: text
    content: and
  - type: text
    content: ' counted worthy of the kingdom of God], for the sake of which you are also suffering.'
  '6':
  - type: text
    content: ' [It is a fair decision] since it is a righteous thing with God to repay with distress '
  - type: text
    content: and
  - type: text
    content: ' affliction those who distress '
  - type: text
    content: and
  - type: text
    content: ' afflict you,'
  '7':
  - type: text
    content: ' And to [recompense] you who are so distressed '
  - type: text
    content: and
  - type: text
    content: ' afflicted [by granting you] relief '
  - type: text
    content: and
  - type: text
    content: ' rest along with us [your fellow sufferers] when the Lord Jesus is revealed from heaven with His mighty angels in a flame of fire,'
  '8':
  - type: text
    content: ' To deal out retribution (chastisement and vengeance) upon those who do not know '
  - type: text
    content: or
  - type: text
    content: ' perceive '
  - type: text
    content: or
  - type: text
    content: ' become acquainted with God, and [upon those] who ignore '
  - type: text
    content: and
  - type: text
    content: ' refuse to obey the Gospel of our Lord Jesus '
  - type: text
    content: Christ.
  '9':
  - type: text
    content: ' Such people will pay the penalty '
  - type: text
    content: and
  - type: text
    content: ' suffer the punishment of everlasting ruin (destruction and perdition) '
  - type: text
    content: and
  - type: text
    content: ' eternal exclusion and banishment from the presence of the Lord and from the glory of His power,'
