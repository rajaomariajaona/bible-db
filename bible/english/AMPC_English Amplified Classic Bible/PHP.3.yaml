document_id: PHP.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR THE rest, my brethren, delight yourselves in the Lord '
  - type: text
    content: and
  - type: text
    content: ' continue to rejoice that you are in Him. To keep writing to you [over and over] of the same things is not irksome to me, and it is [a precaution] for your safety.'
  '10':
  - type: text
    content: ' [For my determined purpose is] that I may know Him [that I may progressively become more deeply and intimately acquainted with Him, perceiving and recognizing and understanding the wonders of His Person more strongly and more clearly], and that I may in that same way come to know the power outflowing from His resurrection [which it exerts over believers], and that I may so share His sufferings as to be continually transformed [in spirit into His likeness even] to His death, [in the hope]'
  '11':
  - type: text
    content: ' That if possible I may attain to the [spiritual and moral] resurrection [that lifts me] out from among the dead [even while in the body].'
  '12':
  - type: text
    content: ' Not that I have now attained [this ideal], or have already been made perfect, but I press on to lay hold of (grasp) '
  - type: text
    content: and
  - type: text
    content: ' make my own, that for which Christ Jesus (the Messiah) has laid hold of me '
  - type: text
    content: and
  - type: text
    content: ' made me His own.'
  '13':
  - type: text
    content: ' I do not consider, brethren, that I have captured '
  - type: text
    content: and
  - type: text
    content: ' made it my own [yet]; but one thing I do [it is my one aspiration]: forgetting what lies behind and straining forward to what lies ahead,'
  '14':
  - type: text
    content: ' I press on toward the goal to win the [supreme and heavenly] prize to which God in Christ Jesus is calling us upward.'
  '15':
  - type: text
    content: ' So let those [of us] who are spiritually mature '
  - type: text
    content: and
  - type: text
    content: ' full-grown have this mind '
  - type: text
    content: and
  - type: text
    content: ' hold these convictions; and if in any respect you have a different attitude of mind, God will make that clear to you also.'
  '16':
  - type: text
    content: ' Only let us hold true to what we have already attained '
  - type: text
    content: and
  - type: text
    content: ' walk '
  - type: text
    content: and
  - type: text
    content: ' order our lives by that.'
  '17':
  - type: text
    content: ' Brethren, together follow my example and observe those who live after the pattern we have set for you.'
  '18':
  - type: text
    content: ' For there are many, of whom I have often told you and now tell you even with tears, who walk (live) as enemies of the cross of Christ (the Anointed One).'
  '19':
  - type: text
    content: ' They are doomed '
  - type: text
    content: and
  - type: text
    content: ' their fate is eternal misery (perdition); their god is their stomach (their appetites, their sensuality) and they glory in their shame, siding with earthly things '
  - type: text
    content: and
  - type: text
    content: ' being of their party.'
  '2':
  - type: text
    content: ' Look out for those dogs [Judaizers, legalists], look out for those mischief-makers, look out for those who mutilate the flesh.'
  '20':
  - type: text
    content: ' But we are citizens of the state (commonwealth, homeland) which is in heaven, and from it also we earnestly '
  - type: text
    content: and
  - type: text
    content: ' patiently await [the coming of] the Lord Jesus Christ (the Messiah) [as] Savior,'
  '21':
  - type: text
    content: ' Who will transform '
  - type: text
    content: and
  - type: text
    content: ' fashion anew the body of our humiliation to conform to '
  - type: text
    content: and
  - type: text
    content: ' be like the body of His glory '
  - type: text
    content: and
  - type: text
    content: ' majesty, by exerting that power which enables Him even to subject everything to Himself.'
  '3':
  - type: text
    content: ' For we [Christians] are the true circumcision, who worship God in spirit '
  - type: text
    content: and
  - type: text
    content: ' by the Spirit of God and exult '
  - type: text
    content: and
  - type: text
    content: ' glory '
  - type: text
    content: and
  - type: text
    content: ' pride ourselves in Jesus Christ, and put no confidence '
  - type: text
    content: or
  - type: text
    content: ' dependence [on what we are] in the flesh '
  - type: text
    content: and
  - type: text
    content: ' on outward privileges '
  - type: text
    content: and
  - type: text
    content: ' physical advantages '
  - type: text
    content: and
  - type: text
    content: ' external appearances–'
  '4':
  - type: text
    content: ' Though for myself I have [at least grounds] to rely on the flesh. If any other man considers that he has '
  - type: text
    content: or
  - type: text
    content: ' seems to have reason to rely on the flesh '
  - type: text
    content: and
  - type: text
    content: ' his physical '
  - type: text
    content: and
  - type: text
    content: ' outward advantages, I have still more!'
  '5':
  - type: text
    content: ' Circumcised when I was eight days old, of the race of Israel, of the tribe of Benjamin, a Hebrew [and the son] of Hebrews; as to the observance of the Law I was of [the party of] the Pharisees,'
  '6':
  - type: text
    content: ' As to my zeal, I was a persecutor of the church, and by the Law''s standard of righteousness (supposed justice, uprightness, and right standing with God) I was proven to be blameless '
  - type: text
    content: and
  - type: text
    content: ' no fault was found with me.'
  '7':
  - type: text
    content: ' But whatever former things I had that might have been gains to me, I have come to consider as [one combined] loss for Christ''s sake.'
  '8':
  - type: text
    content: ' Yes, furthermore, I count everything as loss compared to the possession of the priceless privilege (the overwhelming preciousness, the surpassing worth, and supreme advantage) of knowing Christ Jesus my Lord '
  - type: text
    content: and
  - type: text
    content: ' of progressively becoming more deeply '
  - type: text
    content: and
  - type: text
    content: ' intimately acquainted with Him [of perceiving and recognizing and understanding Him more fully and clearly]. For His sake I have lost everything and consider it all to be mere rubbish (refuse, dregs), in order that I may win (gain) Christ (the Anointed One),'
  '9':
  - type: text
    content: ' And that I may [actually] be found '
  - type: text
    content: and
  - type: text
    content: ' known as in Him, not having any [self-achieved] righteousness that can be called my own, based on my obedience to the Law''s demands (ritualistic uprightness and supposed right standing with God thus acquired), but possessing that [genuine righteousness] which comes through faith in Christ (the Anointed One), the [truly] right standing with God, which comes from God by [saving] faith.'
