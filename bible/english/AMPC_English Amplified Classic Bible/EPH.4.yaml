document_id: EPH.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' I THEREFORE, the prisoner for the Lord, appeal to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beg you to walk (lead a life) worthy of the [divine] calling to which you have been called [with behavior that is a credit to the summons to God''s service,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He Who descended is the [very] same as He Who also has ascended high above all the heavens, that He [His presence] might fill all things (the whole universe, from the lowest to the highest).'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And His gifts were [varied; He Himself appointed and gave men to us] some to be apostles (special messengers), some prophets (inspired preachers and expounders), some evangelists (preachers of the Gospel, traveling missionaries), some pastors (shepherds of His flock) and teachers.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' His intention was the perfecting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the full equipping of the saints (His consecrated people), [that they should do] the work of ministering toward building up Christ''s body (the church),'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' [That it might develop] until we all attain oneness in the faith and in the comprehension of the [full and accurate] knowledge of the Son of God, that [we might arrive] at really mature manhood (the completeness of personality which is nothing less than the standard height of Christ''s own perfection), the measure of the stature of the fullness of the Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the completeness found in Him.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' So then, we may no longer be children, tossed [like ships] to and fro between chance gusts of teaching '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wavering with every changing wind of doctrine, [the prey of] the cunning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cleverness of unscrupulous men, [gamblers engaged] in every shifting form of trickery in inventing errors to mislead.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Rather, let our lives lovingly express truth [in all things, speaking truly, dealing truly, living truly]. Enfolded in love, let us grow up in every way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in all things into Him Who is the Head, [even] Christ (the Messiah, the Anointed One).'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For because of Him the whole body (the church, in all its various parts), closely joined and firmly knit together by the joints '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ligaments with which it is supplied, when each part [with power adapted to its need] is working properly [in all its functions], grows to full maturity, building itself up in love.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So this I say and solemnly testify in [the name of] the Lord [as in His presence], that you must no longer live as the heathen (the Gentiles) do in their perverseness [in the folly, vanity, and emptiness of their souls and the futility] of their minds.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Their moral understanding is darkened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their reasoning is beclouded. [They are] alienated (estranged, self-banished) from the life of God [with no share in it; this is] because of the ignorance (the want of knowledge and perception, the willful blindness) that is deep-seated in them, due to their hardness of heart [to the insensitiveness of their moral nature].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' In their spiritual apathy they have become callous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' past feeling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reckless and have abandoned themselves [a prey] to unbridled sensuality, eager '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greedy to indulge in every form of impurity [that their depraved desires may suggest and demand].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Living as becomes you] with complete lowliness of mind (humility) and meekness (unselfishness, gentleness, mildness), with patience, bearing with one another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' making allowances because you love one another.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' But you did not so learn Christ!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Assuming that you have really heard Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' been taught by Him, as [all] Truth is in Jesus [embodied and personified in Him],'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Strip yourselves of your former nature [put off and discard your old unrenewed self] which characterized your previous manner of life and becomes corrupt through lusts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desires that spring from delusion;'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And be constantly renewed in the spirit of your mind [having a fresh mental and spiritual attitude],'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And put on the new nature (the regenerate self) created in God''s image, [Godlike] in true righteousness and holiness.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Therefore, rejecting all falsity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' being done now with it, let everyone express the truth with his neighbor, for we are all parts of one body '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' members one of another. [Zech. 8:16.]'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' When angry, do not sin; do not ever let your wrath (your exasperation, your fury or indignation) last until the sun goes down.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Leave no [such] room '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' foothold for the devil [give no opportunity to him].'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Let the thief steal no more, but rather let him be industrious, making an honest living with his own hands, so that he may be able to give to those in need.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Let no foul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' polluting language, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' evil word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' unwholesome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' worthless talk [ever] come out of your mouth, but only such [speech] as is good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beneficial to the spiritual progress of others, as is fitting to the need '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the occasion, that it may be a blessing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give grace (God''s favor) to those who hear it.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Be eager '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strive earnestly to guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep the harmony '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oneness of [and produced by] the Spirit in the binding power of peace.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And do not grieve the Holy Spirit of God [do not offend or vex or sadden Him], by Whom you were sealed (marked, branded as God''s own, secured) for the day of redemption (of final deliverance through Christ from evil and the consequences of sin).'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Let all bitterness and indignation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrath (passion, rage, bad temper) and resentment (anger, animosity) and quarreling (brawling, clamor, contention) and slander (evil-speaking, abusive or blasphemous language) be banished from you, with all malice (spite, ill will, or baseness of any kind).'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And become useful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' helpful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kind to one another, tenderhearted (compassionate, understanding, loving-hearted), forgiving one another [readily and freely], as God in Christ forgave you.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' [There is] one body and one Spirit–just as there is also one hope [that belongs] to the calling you received–'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' [There is] one Lord, one faith, one baptism,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' One God and Father of [us] all, Who is above all [Sovereign over all], pervading all and [living] in [us] all.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Yet grace (God''s unmerited favor) was given to each of us individually [not indiscriminately, but in different ways] in proportion to the measure of Christ''s [rich and bounteous] gift.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Therefore it is said, When He ascended on high, He led captivity captive [He led a train of vanquished foes] and He bestowed gifts on men. [Ps. 68:18.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' [But He ascended?] Now what can this, He ascended, mean but that He had previously descended from [the heights of] heaven into [the depths], the lower parts of the earth?'
