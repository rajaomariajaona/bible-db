document_id: PRO.29,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' HE WHO, being often reproved, hardens his neck shall suddenly be destroyed–and that without remedy.'
  '10':
  - type: text
    content: ' The bloodthirsty hate the blameless man, but the upright care for '
  - type: text
    content: and
  - type: text
    content: ' seek [to save] his life. [Gen. 4:5, 8; I John 3:12.]'
  '11':
  - type: text
    content: ' A [self-confident] fool utters all his anger, but a wise man holds it back and stills it.'
  '12':
  - type: text
    content: ' If a ruler listens to falsehood, all his officials will become wicked.'
  '13':
  - type: text
    content: ' The poor man and the oppressor meet together–the Lord gives light to the eyes of both.'
  '14':
  - type: text
    content: ' The king who faithfully judges the poor, his throne shall be established continuously.'
  '15':
  - type: text
    content: ' The rod and reproof give wisdom, but a child left undisciplined brings his mother to shame.'
  '16':
  - type: text
    content: ' When the wicked are in authority, transgression increases, but the [uncompromisingly] righteous shall see the fall of the wicked.'
  '17':
  - type: text
    content: ' Correct your son, and he will give you rest; yes, he will give delight to your heart.'
  '18':
  - type: text
    content: ' Where there is no vision [no redemptive revelation of God], the people perish; but he who keeps the law [of God, which includes that of man]–blessed (happy, fortunate, and enviable) is he. [I Sam. 3:1; Amos 8:11, 12.]'
  '19':
  - type: text
    content: ' A servant will not be corrected by words alone; for though he understands, he will not answer [the master who mistreats him].'
  '2':
  - type: text
    content: ' When the [uncompromisingly] righteous are in authority, the people rejoice; but when the wicked man rules, the people groan '
  - type: text
    content: and
  - type: text
    content: ' sigh.'
  '20':
  - type: text
    content: ' Do you see a man who is hasty in his words? There is more hope for a [self-confident] fool than for him.'
  '21':
  - type: text
    content: ' He who pampers his servant from childhood will have him expecting the rights of a son afterward.'
  '22':
  - type: text
    content: ' A man of wrath stirs up strife, and a man given to anger commits '
  - type: text
    content: and
  - type: text
    content: ' causes much transgression.'
  '23':
  - type: text
    content: ' A man''s pride will bring him low, but he who is of a humble spirit will obtain honor. [Prov. 15:33; 18:12; Isa. 66:2; Dan. 4:30; Matt. 23:12; James 4:6, 10; I Pet. 5:5.]'
  '24':
  - type: text
    content: ' Whoever is partner with a thief hates his own life; he falls under the curse [pronounced upon him who knows who the thief is] but discloses nothing.'
  '25':
  - type: text
    content: ' The fear of man brings a snare, but whoever leans on, trusts in, '
  - type: text
    content: and
  - type: text
    content: ' puts his confidence in the Lord is safe '
  - type: text
    content: and
  - type: text
    content: ' set on high.'
  '26':
  - type: text
    content: ' Many crave '
  - type: text
    content: and
  - type: text
    content: ' seek the ruler''s favor, but the wise man [waits] for justice from the Lord.'
  '27':
  - type: text
    content: ' An unjust man is an abomination to the righteous, and he who is upright in the way [of the Lord] is an abomination to the wicked.'
  '3':
  - type: text
    content: ' Whoever loves skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom rejoices his father, but he who associates with harlots wastes his substance.'
  '4':
  - type: text
    content: ' The king by justice establishes the land, but he who exacts gifts '
  - type: text
    content: and
  - type: text
    content: ' tribute overthrows it.'
  '5':
  - type: text
    content: ' A man who flatters his neighbor spreads a net for his own feet.'
  '6':
  - type: text
    content: ' In the transgression of an evil man there is a snare, but the [uncompromisingly] righteous man sings and rejoices.'
  '7':
  - type: text
    content: ' The [consistently] righteous man knows '
  - type: text
    content: and
  - type: text
    content: ' cares for the rights of the poor, but the wicked man has no interest in such knowledge. [Job 29:16; 31:13; Ps. 41:1.]'
  '8':
  - type: text
    content: ' Scoffers set a city afire [inflaming the minds of the people], but wise men turn away wrath.'
  '9':
  - type: text
    content: ' If a wise man has an argument with a foolish man, the fool only rages or laughs, and there is no rest.'
