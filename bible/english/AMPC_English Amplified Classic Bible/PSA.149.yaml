document_id: PSA.149,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PRAISE THE Lord! Sing to the Lord a new song, praise Him in the assembly of His saints!'
  '2':
  - type: text
    content: ' Let Israel rejoice in Him, their Maker; let Zion''s children triumph '
  - type: text
    content: and
  - type: text
    content: ' be joyful in their King! [Zech. 9:9; Matt. 21:5.]'
  '3':
  - type: text
    content: ' Let them praise His name in chorus '
  - type: text
    content: and
  - type: text
    content: ' choir '
  - type: text
    content: and
  - type: text
    content: ' with the [single or group] dance; let them sing praises to Him with the tambourine and lyre!'
  '4':
  - type: text
    content: ' For the Lord takes pleasure in His people; He will beautify the humble with salvation '
  - type: text
    content: and
  - type: text
    content: ' adorn the wretched with victory.'
  '5':
  - type: text
    content: ' Let the saints be joyful in the glory '
  - type: text
    content: and
  - type: text
    content: ' beauty [which God confers upon them]; let them sing for joy upon their beds.'
  '6':
  - type: text
    content: ' Let the high praises of God be in their throats and a two-edged sword in their hands, [Heb. 4:12; Rev. 1:16.]'
  '7':
  - type: text
    content: ' To wreak vengeance upon the nations and chastisement upon the peoples,'
  '8':
  - type: text
    content: ' To bind their kings with chains, and their nobles with fetters of iron,'
  '9':
  - type: text
    content: ' To execute upon them the judgment written. He [the Lord] is the honor of all His saints. Praise the Lord! (Hallelujah!)'
