document_id: PSA.149,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' PRAISE THE Lord! Sing to the Lord a new song, praise Him in the assembly of His saints!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Let Israel rejoice in Him, their Maker; let Zion''s children triumph '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be joyful in their King! [Zech. 9:9; Matt. 21:5.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Let them praise His name in chorus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' choir '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with the [single or group] dance; let them sing praises to Him with the tambourine and lyre!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For the Lord takes pleasure in His people; He will beautify the humble with salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adorn the wretched with victory.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Let the saints be joyful in the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beauty [which God confers upon them]; let them sing for joy upon their beds.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Let the high praises of God be in their throats and a two-edged sword in their hands, [Heb. 4:12; Rev. 1:16.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' To wreak vengeance upon the nations and chastisement upon the peoples,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' To bind their kings with chains, and their nobles with fetters of iron,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' To execute upon them the judgment written. He [the Lord] is the honor of all His saints. Praise the Lord! (Hallelujah!)'
