document_id: ACT.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND [Paul] went down to Derbe and also to Lystra. A disciple named Timothy was there, the son of a Jewish woman who was a believer [she had become convinced that Jesus is the Messiah and the Author of eternal salvation, and yielded obedience to Him]; but [Timothy''s] father was a Greek.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He [Timothy] had a good reputation among the brethren at Lystra and Iconium.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Paul desired Timothy to go with him [as a missionary]; and he took him and circumcised him because of the Jews that were in those places, all of whom knew that his father was a Greek.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' As they went on their way from town to town, they delivered over [to the assemblies] for their observance the regulations decided upon by the apostles and elders who were at Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So the churches were strengthened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made firm in the faith, and they increased in number day after day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Paul and Silas passed through the territory of Phrygia and Galatia, having been forbidden by the Holy Spirit to proclaim the Word in [the province of] Asia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when they had come opposite Mysia, they tried to go into Bithynia, but the Spirit of Jesus did not permit them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So passing by Mysia, they went down to Troas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' [There] a vision appeared to Paul in the night: a man from Macedonia stood pleading with him and saying, Come over to Macedonia and help us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And when he had seen the vision, we [including Luke] at once endeavored to go on into Macedonia, confidently inferring that God had called us to proclaim the glad tidings (Gospel) to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Therefore, setting sail from Troas, we came in a direct course to Samothrace, and the next day went on to Neapolis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And from there [we came] to Philippi, which is the chief city of the district of Macedonia and a [Roman] colony. We stayed on in this place some days;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And on the Sabbath day we went outside the [city''s] gate to the bank of the river where we supposed there was an [accustomed] place of prayer, and we sat down and addressed the women who had assembled there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' One of those who listened to us was a woman named Lydia, from the city of Thyatira, a dealer in fabrics dyed in purple. She was [already] a worshiper of God, and the Lord opened her heart to pay attention to what was said by Paul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And when she was baptized along with her household, she earnestly entreated us, saying, If in your opinion I am one really convinced [that Jesus is the Messiah and the Author of salvation] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' that I will be faithful to the Lord, come to my house and stay. And she induced us [to do it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' As we were on our way to the place of prayer, we were met by a slave girl who was possessed by a spirit of divination [claiming to foretell future events and to discover hidden knowledge], and she brought her owners much gain by her fortunetelling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' She kept following Paul and [the rest of] us, shouting loudly, These men are the servants of the Most High God! They announce to you the way of salvation!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And she did this for many days. Then Paul, being sorely annoyed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worn out, turned and said to the spirit within her, I charge you in the name of Jesus Christ to come out of her! And it came out that very moment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But when her owners discovered that their hope of profit was gone, they caught hold of Paul and Silas and dragged them before the authorities in the forum (marketplace), [where trials are held].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And when they had brought them before the magistrates, they declared, These fellows are Jews and they are throwing our city into great confusion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' They encourage the practice of customs which it is unlawful for us Romans to accept or observe!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The crowd [also] joined in the attack upon them, and the rulers tore the clothes off of them and commanded that they be beaten with rods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And when they had struck them with many blows, they threw them into prison, charging the jailer to keep them safely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' He, having received [so strict a] charge, put them into the inner prison (the dungeon) and fastened their feet in the stocks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But about midnight, as Paul and Silas were praying and singing hymns of praise to God, and the [other] prisoners were listening to them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Suddenly there was a great earthquake, so that the very foundations of the prison were shaken; and at once all the doors were opened and everyone''s shackles were unfastened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' When the jailer, startled out of his sleep, saw that the prison doors were open, he drew his sword and was on the point of killing himself, because he supposed that the prisoners had escaped.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But Paul shouted, Do not harm yourself, for we are all here!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then [the jailer] called for lights and rushed in, and trembling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terrified he fell down before Paul and Silas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And he brought them out [of the dungeon] and said, Men, what is it necessary for me to do that I may be saved?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And they answered, Believe in the Lord Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ
  - type: text
    text: ' [give yourself up to Him, take yourself out of your own keeping and entrust yourself into His keeping] and you will be saved, [and this applies both to] you and your household as well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And they declared the Word of the Lord [the doctrine concerning the attainment through Christ of eternal salvation in the kingdom of God] to him and to all who were in his house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And he took them the same hour of the night and bathed [them because of their bloody] wounds, and he was baptized immediately and all [the members of] his [household].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Then he took them up into his house and set food before them; and he leaped much for joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exulted with all his family that he believed in God [accepting and joyously welcoming what He had made known through Christ].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' But when it was day, the magistrates sent policemen, saying, Release those fellows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' let them go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And the jailer repeated the words to Paul, saying, The magistrates have sent to release you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' let you go; now therefore come out and go in peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' But Paul answered them, They have beaten us openly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' publicly, without a trial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncondemned, men who are Roman citizens, and have thrown us into prison; and do they now thrust us out secretly? No, indeed! Let them come here themselves and conduct us out!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' The police reported this message to the magistrates, and they were frightened when they heard that the prisoners were Roman citizens;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' So they came themselves and [striving to appease them by entreaty] apologized to them. And they brought them out and asked them to leave the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' So [Paul and Silas] left the prison and went to Lydia''s house; and when they had seen the brethren, they warned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' urged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consoled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraged them and departed.'
