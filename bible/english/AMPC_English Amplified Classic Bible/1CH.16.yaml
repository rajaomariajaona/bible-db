document_id: 1CH.16,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO THEY brought the ark of God and set it in the midst of the tent which David had pitched for it, and they offered burnt offerings and peace offerings before God.'
  '10':
  - type: text
    content: ' Glory in His holy name; let the hearts of those rejoice who seek the Lord!'
  '11':
  - type: text
    content: ' Seek the Lord and His strength; yearn for '
  - type: text
    content: and
  - type: text
    content: ' seek His face '
  - type: text
    content: and
  - type: text
    content: ' to be in His presence continually!'
  '12':
  - type: text
    content: ' [Earnestly] remember the marvelous deeds which He has done, His miracles, and the judgments He uttered [as in Egypt],'
  '13':
  - type: text
    content: ' O you offspring of [Abraham and] of Israel His servants, you children of Jacob, His chosen ones!'
  '14':
  - type: text
    content: ' He is the Lord our God; His judgments are in all the earth.'
  '15':
  - type: text
    content: ' Be mindful of His covenant forever, the promise which He commanded '
  - type: text
    content: and
  - type: text
    content: ' established to a thousand generations,'
  '16':
  - type: text
    content: ' The covenant which He made with Abraham, and His sworn promise to Isaac.'
  '17':
  - type: text
    content: ' He confirmed it as a statute to Jacob, and to Israel for an everlasting covenant, [Gen. 35:11, 12.]'
  '18':
  - type: text
    content: ' Saying, To you I will give the land of Canaan, the measured portion of your possession '
  - type: text
    content: and
  - type: text
    content: ' inheritance.'
  '19':
  - type: text
    content: ' When they were but few, even a very few, and only temporary residents '
  - type: text
    content: and
  - type: text
    content: ' strangers in it,'
  '2':
  - type: text
    content: ' And when David had finished offering the burnt offerings and the peace offerings, he blessed the people in the name of the Lord.'
  '20':
  - type: text
    content: ' When they went from nation to nation, and from one kingdom to another people,'
  '21':
  - type: text
    content: ' He allowed no man to do them wrong; yes, He reproved kings for their sakes, [Gen. 12:17; 20:3; Exod. 7:15-18.]'
  '22':
  - type: text
    content: ' Saying, Touch not My anointed, and do My prophets no harm. [Gen. 20:7.]'
  '23':
  - type: text
    content: ' Sing to the Lord, all the earth; show forth from day to day His salvation.'
  '24':
  - type: text
    content: ' Declare His glory among the nations, His marvelous works among all peoples.'
  '25':
  - type: text
    content: ' For great is the Lord and greatly to be praised; He also is to be [reverently] feared above all so-called gods.'
  '26':
  - type: text
    content: ' For all the gods of the people are [lifeless] idols, but the Lord made the heavens.'
  '27':
  - type: text
    content: ' Honor and majesty are [found] in His presence; strength and joy are [found] in His sanctuary.'
  '28':
  - type: text
    content: ' Ascribe to the Lord, you families of the peoples, ascribe to the Lord glory and strength,'
  '29':
  - type: text
    content: ' Ascribe to the Lord the glory due His name. Bring an offering and come before Him; worship the Lord in the beauty of holiness '
  - type: text
    content: and
  - type: text
    content: ' in holy array.'
  '3':
  - type: text
    content: ' And he distributed to everyone of Israel, both man and woman, to everyone a loaf of bread, a portion of meat, and a cake of raisins.'
  '30':
  - type: text
    content: ' Tremble '
  - type: text
    content: and
  - type: text
    content: ' reverently fear before Him, all the earth''s peoples; the world also shall be established, so it cannot be moved.'
  '31':
  - type: text
    content: ' Let the heavens be glad and let the earth rejoice; and let men say among the nations, The Lord reigns!'
  '32':
  - type: text
    content: ' Let the sea roar, and all the things that fill it; let the fields rejoice, and all that is in them.'
  '33':
  - type: text
    content: ' Then shall the trees of the wood sing out for joy before the Lord, for He comes to judge '
  - type: text
    content: and
  - type: text
    content: ' govern the earth.'
  '34':
  - type: text
    content: ' O give thanks to the Lord, for He is good; for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever!'
  '35':
  - type: text
    content: ' And say, Save us, O God of our salvation; gather us together and deliver us from the nations, that we may give thanks to Your holy name and glory in Your praise.'
  '36':
  - type: text
    content: ' Blessed be the Lord, the God of Israel, forever and ever! And all the people said Amen! and praised the Lord.'
  '37':
  - type: text
    content: ' So David left Asaph and his brethren before the ark of the covenant of the Lord to minister before the ark continually, as each day''s work required,'
  '38':
  - type: text
    content: ' And Obed-edom with [his] sixty-eight kinsmen. Also Obed-edom son of Jeduthun, and Hosah, were to be gatekeepers.'
  '39':
  - type: text
    content: ' And David left Zadok the priest and his brethren the priests before the tabernacle of the Lord in the high place that was at Gibeon'
  '4':
  - type: text
    content: ' He appointed Levites to minister before the ark of the Lord and to celebrate [by calling to mind], thanking and praising the Lord, the God of Israel:'
  '40':
  - type: text
    content: ' To offer burnt offerings to the Lord upon the altar of burnt offering continually, morning and evening, and to do all that is written in the Law of the Lord which He commanded Israel.'
  '41':
  - type: text
    content: ' With them were Heman and Jeduthun and the rest who were chosen and expressly named to give thanks to the Lord, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever.'
  '42':
  - type: text
    content: ' With them were Heman and Jeduthun with trumpets and cymbals for those who should sound aloud, and instruments for accompanying the songs of God. And the sons of Jeduthun were to be at the gate.'
  '43':
  - type: text
    content: ' Then all the people departed, each man to his house, and David returned home to bless his household.'
  '5':
  - type: text
    content: ' Asaph was the chief, next to him Zechariah, Jeiel (Jaaziel), Shemiramoth, Jehiel, Mattithiah, Eliab, and Benaiah, Obed-edom and Jeiel, who were to play harps and lyres; Asaph was to sound the cymbals;'
  '6':
  - type: text
    content: ' Benaiah and Jahaziel the priests were to blow trumpets continually before the ark of the covenant of God.'
  '7':
  - type: text
    content: ' Then on that day David first entrusted to Asaph and his brethren the singing of thanks to the Lord [as their chief task]:'
  '8':
  - type: text
    content: ' O give thanks to the Lord, call on His name; make known His doings among the peoples!'
  '9':
  - type: text
    content: ' Sing to Him, sing praises to Him; meditate on '
  - type: text
    content: and
  - type: text
    content: ' talk of all His wondrous works '
  - type: text
    content: and
  - type: text
    content: ' devoutly praise them!'
