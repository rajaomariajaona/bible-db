document_id: 1CH.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' SO THEY brought the ark of God and set it in the midst of the tent which David had pitched for it, and they offered burnt offerings and peace offerings before God.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Glory in His holy name; let the hearts of those rejoice who seek the Lord!'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Seek the Lord and His strength; yearn for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek His face '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to be in His presence continually!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Earnestly] remember the marvelous deeds which He has done, His miracles, and the judgments He uttered [as in Egypt],'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O you offspring of [Abraham and] of Israel His servants, you children of Jacob, His chosen ones!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He is the Lord our God; His judgments are in all the earth.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Be mindful of His covenant forever, the promise which He commanded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established to a thousand generations,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The covenant which He made with Abraham, and His sworn promise to Isaac.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He confirmed it as a statute to Jacob, and to Israel for an everlasting covenant, [Gen. 35:11, 12.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Saying, To you I will give the land of Canaan, the measured portion of your possession '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inheritance.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When they were but few, even a very few, and only temporary residents '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strangers in it,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when David had finished offering the burnt offerings and the peace offerings, he blessed the people in the name of the Lord.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When they went from nation to nation, and from one kingdom to another people,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He allowed no man to do them wrong; yes, He reproved kings for their sakes, [Gen. 12:17; 20:3; Exod. 7:15-18.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Saying, Touch not My anointed, and do My prophets no harm. [Gen. 20:7.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Sing to the Lord, all the earth; show forth from day to day His salvation.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Declare His glory among the nations, His marvelous works among all peoples.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For great is the Lord and greatly to be praised; He also is to be [reverently] feared above all so-called gods.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For all the gods of the people are [lifeless] idols, but the Lord made the heavens.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Honor and majesty are [found] in His presence; strength and joy are [found] in His sanctuary.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ascribe to the Lord, you families of the peoples, ascribe to the Lord glory and strength,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ascribe to the Lord the glory due His name. Bring an offering and come before Him; worship the Lord in the beauty of holiness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in holy array.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he distributed to everyone of Israel, both man and woman, to everyone a loaf of bread, a portion of meat, and a cake of raisins.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Tremble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverently fear before Him, all the earth''s peoples; the world also shall be established, so it cannot be moved.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let the heavens be glad and let the earth rejoice; and let men say among the nations, The Lord reigns!'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let the sea roar, and all the things that fill it; let the fields rejoice, and all that is in them.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then shall the trees of the wood sing out for joy before the Lord, for He comes to judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' govern the earth.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O give thanks to the Lord, for He is good; for His mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness endure forever!'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And say, Save us, O God of our salvation; gather us together and deliver us from the nations, that we may give thanks to Your holy name and glory in Your praise.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed be the Lord, the God of Israel, forever and ever! And all the people said Amen! and praised the Lord.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So David left Asaph and his brethren before the ark of the covenant of the Lord to minister before the ark continually, as each day''s work required,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Obed-edom with [his] sixty-eight kinsmen. Also Obed-edom son of Jeduthun, and Hosah, were to be gatekeepers.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David left Zadok the priest and his brethren the priests before the tabernacle of the Lord in the high place that was at Gibeon'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He appointed Levites to minister before the ark of the Lord and to celebrate [by calling to mind], thanking and praising the Lord, the God of Israel:'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To offer burnt offerings to the Lord upon the altar of burnt offering continually, morning and evening, and to do all that is written in the Law of the Lord which He commanded Israel.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With them were Heman and Jeduthun and the rest who were chosen and expressly named to give thanks to the Lord, for His mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness endure forever.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With them were Heman and Jeduthun with trumpets and cymbals for those who should sound aloud, and instruments for accompanying the songs of God. And the sons of Jeduthun were to be at the gate.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then all the people departed, each man to his house, and David returned home to bless his household.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Asaph was the chief, next to him Zechariah, Jeiel (Jaaziel), Shemiramoth, Jehiel, Mattithiah, Eliab, and Benaiah, Obed-edom and Jeiel, who were to play harps and lyres; Asaph was to sound the cymbals;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Benaiah and Jahaziel the priests were to blow trumpets continually before the ark of the covenant of God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then on that day David first entrusted to Asaph and his brethren the singing of thanks to the Lord [as their chief task]:'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O give thanks to the Lord, call on His name; make known His doings among the peoples!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Sing to Him, sing praises to Him; meditate on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' talk of all His wondrous works '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devoutly praise them!'
