document_id: 2CO.12
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' TRUE, THERE is nothing to be gained by it, but [as I am obliged] to boast, I will go on to visions and revelations of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I know a man in Christ who fourteen years ago–whether in the body or out of the body I do not know, God knows–was caught up to the third heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And I know that this man–whether in the body or away from the body I do not know, God knows–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Was caught up into paradise, and he heard utterances beyond the power of man to put into words, which man is not permitted to utter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Of this same [man''s experiences] I will boast, but of myself (personally) I will not boast, except as regards my infirmities (my weaknesses).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Should I desire to boast, I shall not be a witless braggart, for I shall be speaking the truth. But I abstain [from it] so that no one may form a higher estimate of me than [is justified by] what he sees in me or hears from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And to keep me from being puffed up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' too much elated by the exceeding greatness (preeminence) of these revelations, there was given me a thorn (a splinter) in the flesh, a messenger of Satan, to rack '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' buffet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' harass me, to keep me from being excessively exalted. [Job. 2:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Three times I called upon the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' besought [Him] about this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' begged that it might depart from me;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But He said to me, My grace (My favor and loving-kindness and mercy) is enough for you [sufficient against any danger and enables you to bear the trouble manfully]; for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: My
  - type: text
    text: ' strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power are made perfect (fulfilled and completed) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and show themselves most effective
  - type: text
    text: ' in [your] weakness. Therefore, I will all the more gladly glory in my weaknesses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' infirmities, that the strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power of Christ (the Messiah) may rest (yes, may pitch a tent over and dwell) upon me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So for the sake of Christ, I am well pleased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take pleasure in infirmities, insults, hardships, persecutions, perplexities '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distresses; for when I am weak [in human strength], then am I [truly] strong (able, powerful in divine strength).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now I have been [speaking like] a fool! But you forced me to it, for I ought to have been [saved the necessity and] commended by you. For I have not fallen short one bit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' proved myself at all inferior to those superlative [false] apostles [of yours], even if I am nothing (a nobody).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Indeed, the signs that indicate a [genuine] apostle were performed among you fully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' most patiently in miracles and wonders and mighty works.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For in what respect were you put to a disadvantage in comparison with the rest of the churches, unless [it was for the fact] that I myself did not burden you [with my financial support]? Pardon me [for doing you] this injustice!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Now for the third time I am ready to come to [visit] you. And I will not burden you [financially], for it is not your [money] that I want but you; for children are not duty bound to lay up store for their parents, but parents for their children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But I will most gladly spend [myself] and be utterly spent for your souls. If I love you exceedingly, am I to be loved [by you] the less?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But though granting that I did not burden you [with my support, some say that] I was crafty [and that] I cheated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' got the better of you with my trickery.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Did I [then] take advantage of you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' make any money out of you through any of those [messengers] whom I sent to you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' [Actually] I urged Titus [to go], and I sent the brother with [him]. Did Titus overreach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' take advantage of you [in anything]? Did he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I not act in the same spirit? Did we not [take the] same steps?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Have you been supposing [all this time] that we have been defending ourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' apologizing to you? [It is] in the sight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the [very] presence of God [and as one] in Christ (the Messiah) that we have been speaking, dearly beloved, and all in order to build you up [spiritually].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For I am fearful that somehow or other I may come and find you not as I desire to find you, and that you may find me too not as you want to find me–that perhaps there may be factions (quarreling), jealousy, temper (wrath, intrigues, rivalry, divided loyalties), selfishness, whispering, gossip, arrogance (self-assertion), and disorder among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' [I am fearful] that when I come again, my God may humiliate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humble me in your regard, and that I may have to sorrow over many of those who sinned before and have not repented of the impurity, sexual vice, and sensuality which they formerly practiced.'
