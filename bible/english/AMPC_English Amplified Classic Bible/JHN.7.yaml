document_id: JHN.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AFTER THIS, Jesus went from place to place in Galilee, for He would not travel in Judea because the Jews were seeking to kill Him.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But afterward, when His brothers had gone up to the Feast, He went up also, not publicly [not with a caravan], but by Himself quietly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' as if He did not wish to be observed.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore the Jews kept looking for Him at the Feast and asking, Where can He be? [Where is that Fellow?]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there was among the mass of the people much whispered discussion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hot disputing about Him. Some were saying, He is good! [He is a good Man!] Others said, No, He misleads '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceives the people [gives them false ideas]!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But no one dared speak out boldly about Him for fear of [the leaders of] the Jews.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When the Feast was already half over, Jesus went up into the temple [court] and began to teach.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Jews were astonished. They said, How is it that this Man has learning [is so versed in the sacred Scriptures and in theology] when He has never studied?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus answered them by saying, My teaching is not My own, but His Who sent Me.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If any man desires to do His will (God''s pleasure), he will know (have the needed illumination to recognize, and can tell for himself) whether the teaching is from God or whether I am speaking from Myself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of My own accord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' on My own authority.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who speaks on his own authority seeks to win honor for himself. [He whose teaching originates with himself seeks his own glory.] But He Who seeks the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is eager for the honor of Him Who sent Him, He is true; and there is no unrighteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' falsehood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' deception in Him.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Did not Moses give you the Law? And yet not one of you keeps the Law. [If that is the truth] why do you seek to kill Me [for not keeping it]?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now the Jewish Feast of Tabernacles was drawing near.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The crowd answered Him, You are possessed by a demon! [You are raving!] Who seeks to kill You?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus answered them, I did one work, and you all are astounded. [John 5:1-9.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now Moses established circumcision among you–though it did not originate with Moses but with the previous patriarchs–and you circumcise a person [even] on the Sabbath day.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If, to avoid breaking the Law of Moses, a person undergoes circumcision on the Sabbath day, have you any cause to be angry with (indignant with, bitter against) Me for making a man''s whole body well on the Sabbath?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Be honest in your judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do not decide at a glance (superficially and by appearances); but judge fairly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteously.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then some of the Jerusalem people said, Is not this the Man they seek to kill?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And here He is speaking openly, and they say nothing to Him! Can it be possible that the rulers have discovered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know that this is truly the Christ?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' No, we know where this Man comes from; when the Christ arrives, no one is to know from what place He comes.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Whereupon Jesus called out as He taught in the temple [porches], Do you know Me, and do you know where I am from? I have not come on My own authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of My own accord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' as self-appointed, but the One Who sent Me is true (real, genuine, steadfast); and Him you do not know!'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I know Him [Myself] because I come from His [very] presence, and it was He [personally] Who sent Me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So His brothers said to Him, Leave here and go into Judea, so that Your disciples [there] may also see the works that You do. [This is no place for You.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore they were eager to arrest Him, but no one laid a hand on Him, for His hour (time) had not yet come.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And besides, many of the multitude believed in Him [adhered to Him, trusted in Him, relied on Him]. And they kept saying, When the Christ comes, will He do [can He be expected to do] more miracles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' produce more proofs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' signs than what this Man has done?'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Pharisees learned how the people were saying these things about Him under their breath; and the chief priests and Pharisees sent attendants (guards) to arrest Him.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore Jesus said, For a little while I am [still] with you, and then I go back to Him Who sent Me.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You will look for Me, but you will not [be able to] find Me; where I am, you cannot come.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the Jews said among themselves, Where does this Man intend to go that we shall not find Him? Will He go to the Jews who are scattered in the Dispersion among the Greeks, and teach the Greeks?'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What does this statement of His mean, You will look for Me and not be able to find Me, and, Where I am, you cannot come?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now on the final and most important day of the Feast, Jesus stood, and He cried in a loud voice, If any man is thirsty, let him come to Me and drink!'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who believes in Me [who cleaves to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusts in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relies on Me] as the Scripture has said, From his innermost being shall flow [continuously] springs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rivers of living water.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But He was speaking here of the Spirit, Whom those who believed (trusted, had faith) in Him were afterward to receive. For the [Holy] Spirit had not yet been given, because Jesus was not yet glorified (raised to honor).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For no one does anything in secret when he wishes to be conspicuous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secure publicity. If You [must] do these things [if You must act like this], show Yourself openly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make Yourself known to the world!'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Listening to those words, some of the multitude said, This is certainly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beyond doubt the Prophet! [Deut. 18:15, 18; John 1:21; 6:14; Acts 3:22.]'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Others said, This is the Christ (the Messiah, Anointed One)! But some said, What? Does the Christ come out of Galilee?'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Does not the Scripture tell us that the Christ will come from the offspring of David and from Bethlehem, the village where David lived? [Ps. 89:3, 4; Mic. 5:2.]'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So there arose a division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dissension among the people concerning Him.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Some of them wanted to arrest Him, but no one [ventured and] laid hands on Him.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Meanwhile the attendants (guards) had gone back to the chief priests and Pharisees, who asked them, Why have you not brought Him here with you?'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The attendants replied, Never has a man talked as this Man talks! [No mere man has ever spoken as He speaks!]'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Pharisees said to them, Are you also deluded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' led astray? [Are you also swept off your feet?]'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Has any of the authorities or of the Pharisees believed in Him?'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for this multitude (rabble) that does not know the Law, they are contemptible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' doomed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accursed!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For [even] His brothers did not believe in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' adhere to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' trust in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' rely on Him either.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Nicodemus, who came to Jesus before at night and was one of them, asked,'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Does our Law convict a man without giving him a hearing and finding out what he has done?'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They answered him, Are you too from Galilee? Search [the Scriptures yourself], and you will see that no prophet comes (will rise to prominence) from Galilee.'
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they went [back], each to his own house.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Whereupon Jesus said to them, My time (opportunity) has not come yet; but any time is suitable for you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your opportunity is ready any time [is always here].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The world cannot [be expected to] hate you, but it does hate Me because I denounce it for its wicked works '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reveal that its doings are evil.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Go to the Feast yourselves. I am not [yet] going up to the Festival, because My time is not ripe. [My term is not yet completed; it is not time for Me to go.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Having said these things to them, He stayed behind in Galilee.'
