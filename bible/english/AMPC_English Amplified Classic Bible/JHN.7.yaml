document_id: JHN.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AFTER THIS, Jesus went from place to place in Galilee, for He would not travel in Judea because the Jews were seeking to kill Him.'
  '10':
  - type: text
    content: ' But afterward, when His brothers had gone up to the Feast, He went up also, not publicly [not with a caravan], but by Himself quietly '
  - type: text
    content: and
  - type: text
    content: ' as if He did not wish to be observed.'
  '11':
  - type: text
    content: ' Therefore the Jews kept looking for Him at the Feast and asking, Where can He be? [Where is that Fellow?]'
  '12':
  - type: text
    content: ' And there was among the mass of the people much whispered discussion '
  - type: text
    content: and
  - type: text
    content: ' hot disputing about Him. Some were saying, He is good! [He is a good Man!] Others said, No, He misleads '
  - type: text
    content: and
  - type: text
    content: ' deceives the people [gives them false ideas]!'
  '13':
  - type: text
    content: ' But no one dared speak out boldly about Him for fear of [the leaders of] the Jews.'
  '14':
  - type: text
    content: ' When the Feast was already half over, Jesus went up into the temple [court] and began to teach.'
  '15':
  - type: text
    content: ' The Jews were astonished. They said, How is it that this Man has learning [is so versed in the sacred Scriptures and in theology] when He has never studied?'
  '16':
  - type: text
    content: ' Jesus answered them by saying, My teaching is not My own, but His Who sent Me.'
  '17':
  - type: text
    content: ' If any man desires to do His will (God''s pleasure), he will know (have the needed illumination to recognize, and can tell for himself) whether the teaching is from God or whether I am speaking from Myself '
  - type: text
    content: and
  - type: text
    content: ' of My own accord '
  - type: text
    content: and
  - type: text
    content: ' on My own authority.'
  '18':
  - type: text
    content: ' He who speaks on his own authority seeks to win honor for himself. [He whose teaching originates with himself seeks his own glory.] But He Who seeks the glory '
  - type: text
    content: and
  - type: text
    content: ' is eager for the honor of Him Who sent Him, He is true; and there is no unrighteousness '
  - type: text
    content: or
  - type: text
    content: ' falsehood '
  - type: text
    content: or
  - type: text
    content: ' deception in Him.'
  '19':
  - type: text
    content: ' Did not Moses give you the Law? And yet not one of you keeps the Law. [If that is the truth] why do you seek to kill Me [for not keeping it]?'
  '2':
  - type: text
    content: ' Now the Jewish Feast of Tabernacles was drawing near.'
  '20':
  - type: text
    content: ' The crowd answered Him, You are possessed by a demon! [You are raving!] Who seeks to kill You?'
  '21':
  - type: text
    content: ' Jesus answered them, I did one work, and you all are astounded. [John 5:1-9.]'
  '22':
  - type: text
    content: ' Now Moses established circumcision among you–though it did not originate with Moses but with the previous patriarchs–and you circumcise a person [even] on the Sabbath day.'
  '23':
  - type: text
    content: ' If, to avoid breaking the Law of Moses, a person undergoes circumcision on the Sabbath day, have you any cause to be angry with (indignant with, bitter against) Me for making a man''s whole body well on the Sabbath?'
  '24':
  - type: text
    content: ' Be honest in your judgment '
  - type: text
    content: and
  - type: text
    content: ' do not decide at a glance (superficially and by appearances); but judge fairly '
  - type: text
    content: and
  - type: text
    content: ' righteously.'
  '25':
  - type: text
    content: ' Then some of the Jerusalem people said, Is not this the Man they seek to kill?'
  '26':
  - type: text
    content: ' And here He is speaking openly, and they say nothing to Him! Can it be possible that the rulers have discovered '
  - type: text
    content: and
  - type: text
    content: ' know that this is truly the Christ?'
  '27':
  - type: text
    content: ' No, we know where this Man comes from; when the Christ arrives, no one is to know from what place He comes.'
  '28':
  - type: text
    content: ' Whereupon Jesus called out as He taught in the temple [porches], Do you know Me, and do you know where I am from? I have not come on My own authority '
  - type: text
    content: and
  - type: text
    content: ' of My own accord '
  - type: text
    content: and
  - type: text
    content: ' as self-appointed, but the One Who sent Me is true (real, genuine, steadfast); and Him you do not know!'
  '29':
  - type: text
    content: ' I know Him [Myself] because I come from His [very] presence, and it was He [personally] Who sent Me.'
  '3':
  - type: text
    content: ' So His brothers said to Him, Leave here and go into Judea, so that Your disciples [there] may also see the works that You do. [This is no place for You.]'
  '30':
  - type: text
    content: ' Therefore they were eager to arrest Him, but no one laid a hand on Him, for His hour (time) had not yet come.'
  '31':
  - type: text
    content: ' And besides, many of the multitude believed in Him [adhered to Him, trusted in Him, relied on Him]. And they kept saying, When the Christ comes, will He do [can He be expected to do] more miracles '
  - type: text
    content: and
  - type: text
    content: ' produce more proofs '
  - type: text
    content: and
  - type: text
    content: ' signs than what this Man has done?'
  '32':
  - type: text
    content: ' The Pharisees learned how the people were saying these things about Him under their breath; and the chief priests and Pharisees sent attendants (guards) to arrest Him.'
  '33':
  - type: text
    content: ' Therefore Jesus said, For a little while I am [still] with you, and then I go back to Him Who sent Me.'
  '34':
  - type: text
    content: ' You will look for Me, but you will not [be able to] find Me; where I am, you cannot come.'
  '35':
  - type: text
    content: ' Then the Jews said among themselves, Where does this Man intend to go that we shall not find Him? Will He go to the Jews who are scattered in the Dispersion among the Greeks, and teach the Greeks?'
  '36':
  - type: text
    content: ' What does this statement of His mean, You will look for Me and not be able to find Me, and, Where I am, you cannot come?'
  '37':
  - type: text
    content: ' Now on the final and most important day of the Feast, Jesus stood, and He cried in a loud voice, If any man is thirsty, let him come to Me and drink!'
  '38':
  - type: text
    content: ' He who believes in Me [who cleaves to '
  - type: text
    content: and
  - type: text
    content: ' trusts in '
  - type: text
    content: and
  - type: text
    content: ' relies on Me] as the Scripture has said, From his innermost being shall flow [continuously] springs '
  - type: text
    content: and
  - type: text
    content: ' rivers of living water.'
  '39':
  - type: text
    content: ' But He was speaking here of the Spirit, Whom those who believed (trusted, had faith) in Him were afterward to receive. For the [Holy] Spirit had not yet been given, because Jesus was not yet glorified (raised to honor).'
  '4':
  - type: text
    content: ' For no one does anything in secret when he wishes to be conspicuous '
  - type: text
    content: and
  - type: text
    content: ' secure publicity. If You [must] do these things [if You must act like this], show Yourself openly '
  - type: text
    content: and
  - type: text
    content: ' make Yourself known to the world!'
  '40':
  - type: text
    content: ' Listening to those words, some of the multitude said, This is certainly '
  - type: text
    content: and
  - type: text
    content: ' beyond doubt the Prophet! [Deut. 18:15, 18; John 1:21; 6:14; Acts 3:22.]'
  '41':
  - type: text
    content: ' Others said, This is the Christ (the Messiah, Anointed One)! But some said, What? Does the Christ come out of Galilee?'
  '42':
  - type: text
    content: ' Does not the Scripture tell us that the Christ will come from the offspring of David and from Bethlehem, the village where David lived? [Ps. 89:3, 4; Mic. 5:2.]'
  '43':
  - type: text
    content: ' So there arose a division '
  - type: text
    content: and
  - type: text
    content: ' dissension among the people concerning Him.'
  '44':
  - type: text
    content: ' Some of them wanted to arrest Him, but no one [ventured and] laid hands on Him.'
  '45':
  - type: text
    content: ' Meanwhile the attendants (guards) had gone back to the chief priests and Pharisees, who asked them, Why have you not brought Him here with you?'
  '46':
  - type: text
    content: ' The attendants replied, Never has a man talked as this Man talks! [No mere man has ever spoken as He speaks!]'
  '47':
  - type: text
    content: ' The Pharisees said to them, Are you also deluded '
  - type: text
    content: and
  - type: text
    content: ' led astray? [Are you also swept off your feet?]'
  '48':
  - type: text
    content: ' Has any of the authorities or of the Pharisees believed in Him?'
  '49':
  - type: text
    content: ' As for this multitude (rabble) that does not know the Law, they are contemptible '
  - type: text
    content: and
  - type: text
    content: ' doomed '
  - type: text
    content: and
  - type: text
    content: ' accursed!'
  '5':
  - type: text
    content: ' For [even] His brothers did not believe in '
  - type: text
    content: or
  - type: text
    content: ' adhere to '
  - type: text
    content: or
  - type: text
    content: ' trust in '
  - type: text
    content: or
  - type: text
    content: ' rely on Him either.'
  '50':
  - type: text
    content: ' Then Nicodemus, who came to Jesus before at night and was one of them, asked,'
  '51':
  - type: text
    content: ' Does our Law convict a man without giving him a hearing and finding out what he has done?'
  '52':
  - type: text
    content: ' They answered him, Are you too from Galilee? Search [the Scriptures yourself], and you will see that no prophet comes (will rise to prominence) from Galilee.'
  '53':
  - type: text
    content: ' And they went [back], each to his own house.'
  '6':
  - type: text
    content: ' Whereupon Jesus said to them, My time (opportunity) has not come yet; but any time is suitable for you '
  - type: text
    content: and
  - type: text
    content: ' your opportunity is ready any time [is always here].'
  '7':
  - type: text
    content: ' The world cannot [be expected to] hate you, but it does hate Me because I denounce it for its wicked works '
  - type: text
    content: and
  - type: text
    content: ' reveal that its doings are evil.'
  '8':
  - type: text
    content: ' Go to the Feast yourselves. I am not [yet] going up to the Festival, because My time is not ripe. [My term is not yet completed; it is not time for Me to go.]'
  '9':
  - type: text
    content: ' Having said these things to them, He stayed behind in Galilee.'
