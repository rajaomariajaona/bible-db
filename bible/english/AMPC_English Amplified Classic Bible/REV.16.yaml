document_id: REV.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN I heard a mighty voice from the temple sanctuary saying to the seven angels, Go and empty out on the earth the seven bowls of God''s wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation. [Ps. 69:24; Isa. 66:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So the first [angel] went and emptied his bowl on the earth, and foul and painful ulcers (sores) came on the people who were marked with the stamp of the beast and who did homage to his image. [Exod. 9:10, 11; Deut. 28:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The second [angel] emptied his bowl into the sea, and it turned into blood like that of a corpse [thick, corrupt, ill-smelling, and disgusting], and every living thing that was in the sea perished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then the third [angel] emptied out his bowl into the rivers and the springs of water, and they turned into (became) blood. [Exod. 7:17-21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And I also heard the angel of the waters say, Righteous (just) are You in these Your decisions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judgments, You Who are and were, O Holy One!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Because they have poured out the blood of Your people (the saints) and the prophets, and You have given them blood to drink. Such is their due [they deserve it]! [Ps. 79:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And [from] the altar I heard [the] cry, Yes, Lord God the Omnipotent, Your judgments (sentences, decisions) are true and just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous! [Ps. 119:137.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then the fourth [angel] emptied out his bowl upon the sun, and it was permitted to burn (scorch) humanity with [fierce, glowing] heat (fire).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' People were severely burned (scorched) by the fiery heat, and they reviled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blasphemed the name of God, Who has control of these plagues, and they did not repent of their sins [felt no regret, contrition, and compunction for their waywardness, refusing to amend their ways] to give Him glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then the fifth [angel] emptied his bowl on the throne of the beast, and his kingdom was [plunged] in darkness; and people gnawed their tongues for the torment [of their excruciating distress and severe pain] [Exod. 10:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And blasphemed the God of heaven because of their anguish and their ulcers (sores), and they did not deplore their wicked deeds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' repent [for what they had done].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then the sixth [angel] emptied his bowl on the mighty river Euphrates, and its water was dried up to make ready a road for [the coming of] the kings of the east (from the rising sun). [Isa. 11:15, 16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And I saw three loathsome spirits like frogs, [leaping] from the mouth of the dragon and from the mouth of the beast and from the mouth of the false prophet. [Exod. 8:3; I Kings 22:21-23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For really they are the spirits of demons that perform signs (wonders, miracles). And they go forth to the rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leaders all over the world, to gather them together for war on the great day of God the Almighty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Behold, I am going to come like a thief! Blessed (happy, to be envied) is he who stays awake (alert) and who guards his clothes, so that he may not be naked and [have the shame of being] seen exposed!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they gathered them together at the place which in Hebrew is called Armageddon. [II Kings 9:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then the seventh [angel] emptied out his bowl into the air, and a mighty voice came out of the sanctuary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of heaven
  - type: text
    text: ' from the throne [of God], saying, It is done! [It is all over, it is all accomplished, it has come!] [Isa. 66:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And there followed lightning flashes, loud rumblings, peals of thunder, and a tremendous earthquake; nothing like it has ever occurred since men dwelt on the earth, so severe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' far-reaching was that earthquake. [Exod. 19:16; Dan. 12:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The mighty city was broken into three parts, and the cities of the nations fell. And God kept in mind mighty Babylon, to make her drain the cup of His furious wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And every island fled and no mountains could be found.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And great (excessively oppressive) hailstones, as heavy as a talent [between fifty and sixty pounds], of immense size, fell from the sky on the people; and men blasphemed God for the plague of the hail, so very great was [the torture] of that plague. [Exod. 9:23.]'
