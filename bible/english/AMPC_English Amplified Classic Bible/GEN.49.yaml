document_id: GEN.49,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND JACOB called for his sons and said, Gather yourselves together [around me], that I may tell you what shall befall you in the latter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' last days.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The scepter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leadership shall not depart from Judah, nor the ruler''s staff from between his feet, until Shiloh [the Messiah, the Peaceful One] comes to Whom it belongs, and to Him shall be the obedience of the people. [Num. 24:17; Ps. 60:7.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Binding His foal to the vine and His donkey''s colt to the choice vine, He washes His garments in wine and His clothes in the blood of grapes. [Isa. 63:1-3; Zech. 9:9; Rev. 19:11-16.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His eyes are darker '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' more sparkling than wine, and His teeth whiter than milk.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Zebulun shall live toward the seashore, and he shall be a haven '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a landing place for ships; and his border shall be toward Sidon.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Issachar is a strong-boned donkey crouching down between the sheepfolds.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he saw that rest was good and that the land was pleasant; and he bowed his shoulder to bear [his burdens] and became a servant to tribute [subjected to forced labor].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Dan shall judge his people as one of the tribes of Israel.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Dan shall be a serpent by the way, a horned snake in the path, that bites at the horse''s heels, so that his rider falls backward.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I wait for Your salvation, O Lord.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Gad–a raiding troop shall raid him, but he shall raid at their heels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' assault them [victoriously].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Gather yourselves together and hear, you sons of Jacob; and hearken to Israel your father.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Asher''s food [supply] shall be rich '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fat, and he shall yield '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliver royal delights.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Naphtali is a hind let loose which yields lovely fawns.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Joseph is a fruitful bough, a fruitful bough by a well (spring or fountain), whose branches run over the wall.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Skilled archers have bitterly attacked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorely worried him; they have shot at him and persecuted him.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But his bow remained strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steady '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rested in the Strength that does not fail him, for the arms of his hands were made strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' active by the hands of the Mighty God of Jacob, by the name of the Shepherd, the Rock of Israel, [Gen. 48:15; Deut. 32:4; Isa. 9:6; 49:26.]'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' By the God of your father, Who will help you, and by the Almighty, Who will bless you with blessings of the heavens above, blessings lying in the deep beneath, blessings of the breasts and of the womb.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The blessings of your father [on you] are greater than the blessings of my forefathers [Abraham and Isaac on me] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are as lasting as the bounties of the eternal hills; they shall be on the head of Joseph, and on the crown of the head of him who was the consecrated one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the one separated from his brethren '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [the one who] is prince among them.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Benjamin is a ravenous wolf, in the morning devouring the prey and at night dividing the spoil.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All these are the twelve tribes of Israel, and this is what their father said to them as he blessed them, blessing each one according to the blessing suited to him.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He charged them and said to them, I am to be gathered to my [departed] people; bury me with my fathers in the cave that is in the field of Ephron the Hittite,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Reuben, you are my firstborn, my might, the beginning (the firstfruits) of my manly strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vigor; [your birthright gave you] the preeminence in dignity and the preeminence in power.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the cave in the field at Machpelah, east of Mamre in the land of Canaan, that Abraham bought, along with the field of Ephron the Hittite, to possess as a cemetery. [Gen. 23:17-20.]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There they buried Abraham and Sarah his wife, there they buried Isaac and Rebekah his wife, and there I buried Leah.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The purchase of the field and the cave that is in it was from the sons of Heth.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Jacob had finished commanding his sons, he drew his feet up into the bed and breathed his last and was gathered to his [departed] people.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But unstable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' boiling over like water, you shall not excel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have the preeminence [of the firstborn], because you went to your father''s bed; you defiled it–he went to my couch! [Gen. 35:22.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Simeon and Levi are brothers [equally headstrong, deceitful, vindictive, and cruel]; their swords are weapons of violence. [Gen. 34:25-29.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O my soul, come not into their secret council; unto their assembly let not my honor be united [for I knew nothing of their plot], because in their anger they slew men [an honored man, Shechem, and the Shechemites], and in their self-will they disabled oxen.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Cursed be their anger, for it was fierce, and their wrath, for it was cruel. I will divide them in Jacob and scatter them in Israel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Judah, you are the one whom your brothers shall praise; your hand shall be on the neck of your enemies; your father''s sons shall bow down to you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Judah, a lion''s cub! With the prey, my son, you have gone high up [the mountain]. He stooped down, he crouched like a lion, and like a lioness–who dares provoke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rouse him? [Rev. 5:5.]'
