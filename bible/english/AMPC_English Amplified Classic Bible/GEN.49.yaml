document_id: GEN.49,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND JACOB called for his sons and said, Gather yourselves together [around me], that I may tell you what shall befall you in the latter '
  - type: text
    content: or
  - type: text
    content: ' last days.'
  '10':
  - type: text
    content: ' The scepter '
  - type: text
    content: or
  - type: text
    content: ' leadership shall not depart from Judah, nor the ruler''s staff from between his feet, until Shiloh [the Messiah, the Peaceful One] comes to Whom it belongs, and to Him shall be the obedience of the people. [Num. 24:17; Ps. 60:7.]'
  '11':
  - type: text
    content: ' Binding His foal to the vine and His donkey''s colt to the choice vine, He washes His garments in wine and His clothes in the blood of grapes. [Isa. 63:1-3; Zech. 9:9; Rev. 19:11-16.]'
  '12':
  - type: text
    content: ' His eyes are darker '
  - type: text
    content: and
  - type: text
    content: ' more sparkling than wine, and His teeth whiter than milk.'
  '13':
  - type: text
    content: ' Zebulun shall live toward the seashore, and he shall be a haven '
  - type: text
    content: and
  - type: text
    content: ' a landing place for ships; and his border shall be toward Sidon.'
  '14':
  - type: text
    content: ' Issachar is a strong-boned donkey crouching down between the sheepfolds.'
  '15':
  - type: text
    content: ' And he saw that rest was good and that the land was pleasant; and he bowed his shoulder to bear [his burdens] and became a servant to tribute [subjected to forced labor].'
  '16':
  - type: text
    content: ' Dan shall judge his people as one of the tribes of Israel.'
  '17':
  - type: text
    content: ' Dan shall be a serpent by the way, a horned snake in the path, that bites at the horse''s heels, so that his rider falls backward.'
  '18':
  - type: text
    content: ' I wait for Your salvation, O Lord.'
  '19':
  - type: text
    content: ' Gad–a raiding troop shall raid him, but he shall raid at their heels '
  - type: text
    content: and
  - type: text
    content: ' assault them [victoriously].'
  '2':
  - type: text
    content: ' Gather yourselves together and hear, you sons of Jacob; and hearken to Israel your father.'
  '20':
  - type: text
    content: ' Asher''s food [supply] shall be rich '
  - type: text
    content: and
  - type: text
    content: ' fat, and he shall yield '
  - type: text
    content: and
  - type: text
    content: ' deliver royal delights.'
  '21':
  - type: text
    content: ' Naphtali is a hind let loose which yields lovely fawns.'
  '22':
  - type: text
    content: ' Joseph is a fruitful bough, a fruitful bough by a well (spring or fountain), whose branches run over the wall.'
  '23':
  - type: text
    content: ' Skilled archers have bitterly attacked '
  - type: text
    content: and
  - type: text
    content: ' sorely worried him; they have shot at him and persecuted him.'
  '24':
  - type: text
    content: ' But his bow remained strong '
  - type: text
    content: and
  - type: text
    content: ' steady '
  - type: text
    content: and
  - type: text
    content: ' rested in the Strength that does not fail him, for the arms of his hands were made strong '
  - type: text
    content: and
  - type: text
    content: ' active by the hands of the Mighty God of Jacob, by the name of the Shepherd, the Rock of Israel, [Gen. 48:15; Deut. 32:4; Isa. 9:6; 49:26.]'
  '25':
  - type: text
    content: ' By the God of your father, Who will help you, and by the Almighty, Who will bless you with blessings of the heavens above, blessings lying in the deep beneath, blessings of the breasts and of the womb.'
  '26':
  - type: text
    content: ' The blessings of your father [on you] are greater than the blessings of my forefathers [Abraham and Isaac on me] '
  - type: text
    content: and
  - type: text
    content: ' are as lasting as the bounties of the eternal hills; they shall be on the head of Joseph, and on the crown of the head of him who was the consecrated one '
  - type: text
    content: and
  - type: text
    content: ' the one separated from his brethren '
  - type: text
    content: and
  - type: text
    content: ' [the one who] is prince among them.'
  '27':
  - type: text
    content: ' Benjamin is a ravenous wolf, in the morning devouring the prey and at night dividing the spoil.'
  '28':
  - type: text
    content: ' All these are the twelve tribes of Israel, and this is what their father said to them as he blessed them, blessing each one according to the blessing suited to him.'
  '29':
  - type: text
    content: ' He charged them and said to them, I am to be gathered to my [departed] people; bury me with my fathers in the cave that is in the field of Ephron the Hittite,'
  '3':
  - type: text
    content: ' Reuben, you are my firstborn, my might, the beginning (the firstfruits) of my manly strength '
  - type: text
    content: and
  - type: text
    content: ' vigor; [your birthright gave you] the preeminence in dignity and the preeminence in power.'
  '30':
  - type: text
    content: ' In the cave in the field at Machpelah, east of Mamre in the land of Canaan, that Abraham bought, along with the field of Ephron the Hittite, to possess as a cemetery. [Gen. 23:17-20.]'
  '31':
  - type: text
    content: ' There they buried Abraham and Sarah his wife, there they buried Isaac and Rebekah his wife, and there I buried Leah.'
  '32':
  - type: text
    content: ' The purchase of the field and the cave that is in it was from the sons of Heth.'
  '33':
  - type: text
    content: ' When Jacob had finished commanding his sons, he drew his feet up into the bed and breathed his last and was gathered to his [departed] people.'
  '4':
  - type: text
    content: ' But unstable '
  - type: text
    content: and
  - type: text
    content: ' boiling over like water, you shall not excel '
  - type: text
    content: and
  - type: text
    content: ' have the preeminence [of the firstborn], because you went to your father''s bed; you defiled it–he went to my couch! [Gen. 35:22.]'
  '5':
  - type: text
    content: ' Simeon and Levi are brothers [equally headstrong, deceitful, vindictive, and cruel]; their swords are weapons of violence. [Gen. 34:25-29.]'
  '6':
  - type: text
    content: ' O my soul, come not into their secret council; unto their assembly let not my honor be united [for I knew nothing of their plot], because in their anger they slew men [an honored man, Shechem, and the Shechemites], and in their self-will they disabled oxen.'
  '7':
  - type: text
    content: ' Cursed be their anger, for it was fierce, and their wrath, for it was cruel. I will divide them in Jacob and scatter them in Israel.'
  '8':
  - type: text
    content: ' Judah, you are the one whom your brothers shall praise; your hand shall be on the neck of your enemies; your father''s sons shall bow down to you.'
  '9':
  - type: text
    content: ' Judah, a lion''s cub! With the prey, my son, you have gone high up [the mountain]. He stooped down, he crouched like a lion, and like a lioness–who dares provoke '
  - type: text
    content: and
  - type: text
    content: ' rouse him? [Rev. 5:5.]'
