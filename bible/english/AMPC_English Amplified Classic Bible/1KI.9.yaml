document_id: 1KI.9,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHEN SOLOMON finished the building of the Lord''s house and the king''s house, and all he desired and was pleased to do,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' At the end of twenty years, in which Solomon had built the two houses, the Lord''s house and the king''s house,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For which Hiram king of Tyre had furnished Solomon with as much cedar and cypress timber and gold as he desired, King Solomon gave Hiram twenty cities in the land of Galilee.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And Hiram came from Tyre to see the cities which Solomon had given him, and they did not please him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He said, What are these cities worth which you have given me, my brother? So they are called the Cabul [unproductive] Land to this day.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And Hiram sent to the king 120 talents of gold.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' This is the account of the levy [of forced labor] which King Solomon raised to build the house of the Lord, his own house, the Millo, the wall of Jerusalem, Hazor, Megiddo, and Gezer.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For Pharaoh king of Egypt had gone up and taken Gezer, burned it with fire, slew the Canaanites who dwelt in the city, and had given it as dowry to his daughter, Solomon''s wife.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' So Solomon rebuilt Gezer and Lower Beth-horon,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Baalath and Tamar (Tadmor) in the wilderness, in the land of Judah,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And all the store cities which Solomon had and cities for his chariots and cities for his horsemen, and whatever Solomon desired to build for his pleasure in Jerusalem, in Lebanon, and in all the land of his dominion.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' The Lord appeared to Solomon the second time, as He had appeared to him at Gibeon.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' As for all the people who were left of the Amorites, Hittites, Perizzites, Hivites, and Jebusites, who were not Israelites,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Their children who were left after them in the land, whom the Israelites were not able utterly to destroy, of them Solomon made a forced levy of slaves to this day.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But Solomon made no slaves of the Israelites; they were the soldiers, his officials, attendants, commanders, captains, chariot officers, and horsemen.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' These were the chief officers over Solomon''s work, 550 who had charge of the people who did the work.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' But Pharaoh''s daughter came up out of the City of David to her house which Solomon had built for her; then he built the Millo.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Three times a year Solomon offered burnt offerings and peace offerings on the altar he built to the Lord, and he burned incense with them before the Lord. So he finished the house.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And King Solomon made a fleet of ships in Ezion-geber, which is beside Eloth, on the shore of the Red Sea, in Edom.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And Hiram sent with the fleet his servants, shipmen who had knowledge of the sea, with the servants of Solomon.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' They came to Ophir and got 420 talents of gold and brought it to King Solomon.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The Lord told him, I have heard your prayer and supplication which you have made before Me; I have hallowed this house which you have built, and I have put My Name [and My Presence] there forever. My eyes and My heart shall be there perpetually.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And if you will walk before Me, as David your father walked, in integrity of heart and uprightness, doing according to all that I have commanded you, keeping My statutes and My precepts,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then I will establish your royal throne over Israel forever, as I promised David your father, saying, There shall not fail you [to have] a man upon the throne of Israel.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' But if you turn away from following Me, you or your children, and will not keep My commandments and My statutes which I have set before you but go and serve other gods and worship them,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then I will cut off Israel from the land I have given them, and this house I have hallowed for My Name (renown) I will cast from My sight. And Israel shall be a proverb and a byword among all the peoples.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' This house shall become a heap of ruins; every passerby shall be astonished and shall hiss [with surprise] and say, Why has the Lord done thus to this land and to this house?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then they will answer, Because they forsook the Lord their God, Who brought their fathers out of the land of Egypt, and have laid hold of other gods and have worshiped and served them; therefore the Lord has brought on them all this evil.'
