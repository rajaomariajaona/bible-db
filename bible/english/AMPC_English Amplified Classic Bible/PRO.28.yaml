document_id: PRO.28,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE WICKED flee when no man pursues them, but the [uncompromisingly] righteous are bold as a lion. [Lev. 26:17, 36; Ps. 53:5.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Whoever leads the upright astray into an evil way, he will himself fall into his own pit, but the blameless will have a goodly inheritance.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' The rich man is wise in his own eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conceit, but the poor man who has understanding will find him out.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' When the [uncompromisingly] righteous triumph, there is great glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' celebration; but when the wicked rise [to power], men hide themselves.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He who covers his transgressions will not prosper, but whoever confesses and forsakes his sins will obtain mercy. [Ps. 32:3, 5; I John 1:8-10.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Blessed (happy, fortunate, and to be envied) is the man who reverently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipfully fears [the Lord] at all times [regardless of circumstances], but he who hardens his heart will fall into calamity.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Like a roaring lion or a ravenous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' charging bear is a wicked ruler over a poor people.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' A ruler who lacks understanding is [like a wicked one] a great oppressor, but he who hates covetousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unjust gain shall prolong his days.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' If a man willfully sheds the blood of a person [and keeps the guilt of murder upon his conscience], he is fleeing to the pit (the grave) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hastening to his own destruction; let no man stop him!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' He who walks uprightly shall be safe, but he who willfully goes in double '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrong ways shall fall in one of them.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' He who cultivates his land will have plenty of bread, but he who follows worthless people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pursuits will have poverty enough.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' When a land transgresses, it has many rulers, but when the ruler is a man of discernment, understanding, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' knowledge, its stability will long continue.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' A faithful man shall abound with blessings, but he who makes haste to be rich [at any cost] shall not go unpunished. [Prov. 13:11; 20:21; 23:4; I Tim. 6:9.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' To have respect of persons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to show partiality is not good, neither is it good that man should transgress for a piece of bread.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' He who has an evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' covetous eye hastens to be rich and knows not that want will come upon him. [Prov. 21:5; 28:20.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' He who rebukes a man shall afterward find more favor than he who flatters with the tongue.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Whoever robs his father or his mother and says, This is no sin–he is in the same class as [an open, lawless robber and] a destroyer.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' He who is of a greedy spirit stirs up strife, but he who puts his trust in the Lord shall be enriched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessed.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' He who leans on, trusts in, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is confident of his own mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heart is a [self-confident] fool, but he who walks in skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly Wisdom shall be delivered. [James 1:5.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' He who gives to the poor will not want, but he who hides his eyes [from their want] will have many a curse. [Deut. 15:7; Prov. 19:17; 22:9.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' When the wicked rise [to power], men hide themselves; but when they perish, the [consistently] righteous increase '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become many. [Prov. 28:12.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' A poor man who oppresses the poor is like a sweeping rain which leaves no food [plundering them of their last morsels]. [Matt. 18:28.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Those who forsake the law [of God and man] praise the wicked, but those who keep the law [of God and man] contend with them. [Prov. 29:18.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Evil men do not understand justice, but they who crave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek the Lord understand it fully. [John 7:17; I Cor. 2:15; I John 2:20, 27.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Better is the poor man who walks in his integrity than he who willfully goes in double '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrong ways, though he is rich.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Whoever keeps the law [of God and man] is a wise son, but he who is a companion of gluttons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the carousing, self-indulgent, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extravagant shames his father.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He who by charging excessive interest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' who by unjust efforts to get gain increases his material possession gathers it for him [to spend] who is kind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' generous to the poor. [Job 27:16, 17; Prov. 13:22; Eccl. 2:26.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' He who turns away his ear from hearing the law [of God and man], even his prayer is an abomination, hateful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revolting [to God]. [Ps. 66:18; 109:7; Prov. 15:8; Zech. 7:11.]'
