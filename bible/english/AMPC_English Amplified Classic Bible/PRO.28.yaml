document_id: PRO.28,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WICKED flee when no man pursues them, but the [uncompromisingly] righteous are bold as a lion. [Lev. 26:17, 36; Ps. 53:5.]'
  '10':
  - type: text
    content: ' Whoever leads the upright astray into an evil way, he will himself fall into his own pit, but the blameless will have a goodly inheritance.'
  '11':
  - type: text
    content: ' The rich man is wise in his own eyes '
  - type: text
    content: and
  - type: text
    content: ' conceit, but the poor man who has understanding will find him out.'
  '12':
  - type: text
    content: ' When the [uncompromisingly] righteous triumph, there is great glory '
  - type: text
    content: and
  - type: text
    content: ' celebration; but when the wicked rise [to power], men hide themselves.'
  '13':
  - type: text
    content: ' He who covers his transgressions will not prosper, but whoever confesses and forsakes his sins will obtain mercy. [Ps. 32:3, 5; I John 1:8-10.]'
  '14':
  - type: text
    content: ' Blessed (happy, fortunate, and to be envied) is the man who reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fears [the Lord] at all times [regardless of circumstances], but he who hardens his heart will fall into calamity.'
  '15':
  - type: text
    content: ' Like a roaring lion or a ravenous '
  - type: text
    content: and
  - type: text
    content: ' charging bear is a wicked ruler over a poor people.'
  '16':
  - type: text
    content: ' A ruler who lacks understanding is [like a wicked one] a great oppressor, but he who hates covetousness '
  - type: text
    content: and
  - type: text
    content: ' unjust gain shall prolong his days.'
  '17':
  - type: text
    content: ' If a man willfully sheds the blood of a person [and keeps the guilt of murder upon his conscience], he is fleeing to the pit (the grave) '
  - type: text
    content: and
  - type: text
    content: ' hastening to his own destruction; let no man stop him!'
  '18':
  - type: text
    content: ' He who walks uprightly shall be safe, but he who willfully goes in double '
  - type: text
    content: and
  - type: text
    content: ' wrong ways shall fall in one of them.'
  '19':
  - type: text
    content: ' He who cultivates his land will have plenty of bread, but he who follows worthless people '
  - type: text
    content: and
  - type: text
    content: ' pursuits will have poverty enough.'
  '2':
  - type: text
    content: ' When a land transgresses, it has many rulers, but when the ruler is a man of discernment, understanding, '
  - type: text
    content: and
  - type: text
    content: ' knowledge, its stability will long continue.'
  '20':
  - type: text
    content: ' A faithful man shall abound with blessings, but he who makes haste to be rich [at any cost] shall not go unpunished. [Prov. 13:11; 20:21; 23:4; I Tim. 6:9.]'
  '21':
  - type: text
    content: ' To have respect of persons '
  - type: text
    content: and
  - type: text
    content: ' to show partiality is not good, neither is it good that man should transgress for a piece of bread.'
  '22':
  - type: text
    content: ' He who has an evil '
  - type: text
    content: and
  - type: text
    content: ' covetous eye hastens to be rich and knows not that want will come upon him. [Prov. 21:5; 28:20.]'
  '23':
  - type: text
    content: ' He who rebukes a man shall afterward find more favor than he who flatters with the tongue.'
  '24':
  - type: text
    content: ' Whoever robs his father or his mother and says, This is no sin–he is in the same class as [an open, lawless robber and] a destroyer.'
  '25':
  - type: text
    content: ' He who is of a greedy spirit stirs up strife, but he who puts his trust in the Lord shall be enriched '
  - type: text
    content: and
  - type: text
    content: ' blessed.'
  '26':
  - type: text
    content: ' He who leans on, trusts in, '
  - type: text
    content: and
  - type: text
    content: ' is confident of his own mind '
  - type: text
    content: and
  - type: text
    content: ' heart is a [self-confident] fool, but he who walks in skillful '
  - type: text
    content: and
  - type: text
    content: ' godly Wisdom shall be delivered. [James 1:5.]'
  '27':
  - type: text
    content: ' He who gives to the poor will not want, but he who hides his eyes [from their want] will have many a curse. [Deut. 15:7; Prov. 19:17; 22:9.]'
  '28':
  - type: text
    content: ' When the wicked rise [to power], men hide themselves; but when they perish, the [consistently] righteous increase '
  - type: text
    content: and
  - type: text
    content: ' become many. [Prov. 28:12.]'
  '3':
  - type: text
    content: ' A poor man who oppresses the poor is like a sweeping rain which leaves no food [plundering them of their last morsels]. [Matt. 18:28.]'
  '4':
  - type: text
    content: ' Those who forsake the law [of God and man] praise the wicked, but those who keep the law [of God and man] contend with them. [Prov. 29:18.]'
  '5':
  - type: text
    content: ' Evil men do not understand justice, but they who crave '
  - type: text
    content: and
  - type: text
    content: ' seek the Lord understand it fully. [John 7:17; I Cor. 2:15; I John 2:20, 27.]'
  '6':
  - type: text
    content: ' Better is the poor man who walks in his integrity than he who willfully goes in double '
  - type: text
    content: and
  - type: text
    content: ' wrong ways, though he is rich.'
  '7':
  - type: text
    content: ' Whoever keeps the law [of God and man] is a wise son, but he who is a companion of gluttons '
  - type: text
    content: and
  - type: text
    content: ' the carousing, self-indulgent, '
  - type: text
    content: and
  - type: text
    content: ' extravagant shames his father.'
  '8':
  - type: text
    content: ' He who by charging excessive interest '
  - type: text
    content: and
  - type: text
    content: ' who by unjust efforts to get gain increases his material possession gathers it for him [to spend] who is kind '
  - type: text
    content: and
  - type: text
    content: ' generous to the poor. [Job 27:16, 17; Prov. 13:22; Eccl. 2:26.]'
  '9':
  - type: text
    content: ' He who turns away his ear from hearing the law [of God and man], even his prayer is an abomination, hateful '
  - type: text
    content: and
  - type: text
    content: ' revolting [to God]. [Ps. 66:18; 109:7; Prov. 15:8; Zech. 7:11.]'
