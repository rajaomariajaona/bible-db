document_id: JER.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THUS THE Lord said to me: Go and buy yourself a linen girdle and put it on your loins, but do not put it in water.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These evil people, who refuse to hear My words, who walk in the stubbornness of their hearts and have gone after other gods to serve them and to worship them, shall even be like this girdle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' waistcloth, which is profitable for nothing.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For as the girdle clings to the loins of a man, so I caused the whole house of Israel and the whole house of Judah to cling to Me, says the Lord, that they might be for Me a people, a name, a praise, and a glory; but they would not listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' obey.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore you shall speak to them this word: Thus says the Lord, the God of Israel: Every bottle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' jar should be filled with wine. [The people] will say to you, Do we not certainly know that every bottle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' jar should be filled with wine?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then say to them, Thus says the Lord: Behold, I will fill with drunkenness all the inhabitants of this land, even the kings who sit upon David''s throne, the priests, the prophets, and all the inhabitants of Jerusalem.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And I will dash them one against another, even the fathers and the sons together, says the Lord. I will not pity or spare or have compassion, that I should not destroy them.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hear and give ear, do not be proud, for the Lord has spoken [says Jeremiah].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Give glory to the Lord your God before He brings darkness and before your feet stumble upon the dark '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' twilit mountains, and [before], while you are looking for light, He turns it into the shadow of death and makes it thick darkness.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if you will not hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey, I will weep in secret for your pride; my eyes will weep bitterly and run down with tears, because the Lord''s flock has been taken captive.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Say to the king and the queen mother, Humble yourselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take a lowly seat, for down from your head has come your beautiful crown (the crown of your glory).'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The cities of the South (the Negeb) have been shut up, and there is no one to open them; all Judah has been carried away captive, it has been wholly taken captive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' into exile.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So I bought a girdle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' waistcloth, according to the word of the Lord, and put it on my loins.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Lift up your eyes and behold those [the eruption of a hostile army] who come from the north. Where is the flock that was given to you [to shepherd], your beautiful flock?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What will you say [O Jerusalem] when He [the Lord] sets over you as head those [tyrannical foreign nations] whom you yourselves [at intervals] have taught to be lovers (allies) with you [instructing them, even your friends, to be head over you]? Will not pangs take hold of you like that of a woman in travail?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if you say in your heart, Why have these things come upon me?–[the answer is], Because of the greatness of your iniquity has your long robe been pulled aside [showing you in the garb of a menial] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have you [barefooted and treated like a slave] suffered violence.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Can the Ethiopian change his skin or the leopard his spots? Then also can you do good who are accustomed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' taught [even trained] to do evil.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore I will scatter you like chaff driven away by the wind from the desert.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is your lot, the portion measured to you from Me, says the Lord, because you have forgotten Me and trusted in falsehood [false gods and alliances with idolatrous nations].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore I Myself will [retaliate], throwing your skirts up over your face, that your shame [of being clad like a slave] may be exposed.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have seen your detestable acts, even your adulteries and your lustful neighings [after idols], and the lewdness of your harlotry on the hills in the field. Woe to you, O Jerusalem! For how long a time yet will you not [meet My conditions and] be made clean?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the word of the Lord came to me the second time, saying,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Take the girdle which you have bought, which is on your loins, and arise, go to the [river] Euphrates, and hide it there in a cleft of the rock.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So I went and hid it by the Euphrates, as the Lord commanded me.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And after many days the Lord said to me, Arise, go to the Euphrates, and take from there the girdle which I commanded you to hide there.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then I went to the Euphrates and dug and took the girdle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' waistcloth from the place where I had hidden it. And behold, the girdle was decayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spoiled; it was good for nothing.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the word of the Lord came to me, saying,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus says the Lord: After this manner will I mar the pride of Judah and the great pride of Jerusalem.'
