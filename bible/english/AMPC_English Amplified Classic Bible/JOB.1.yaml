document_id: JOB.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THERE WAS a man in the land of Uz whose name was Job; and that man was blameless and upright, and one who [reverently] feared God and abstained from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shunned evil [because it was wrong].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And there were born to him seven sons and three daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He possessed 7,000 sheep, 3,000 camels, 500 yoke of oxen, 500 female donkeys, and a very great body of servants, so that this man was the greatest of all the men of the East.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' His sons used to go and feast in the house of each on his day (birthday) in turn, and they invited their three sisters to eat and drink with them. [Gen. 21:8; 40:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And when the days of their feasting were over, Job sent for them to purify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hallow them, and rose up early in the morning and offered burnt offerings according to the number of them all. For Job said, It may be that my sons have sinned and cursed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' disowned God in their hearts. Thus did Job at all [such] times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now there was a day when the sons (the angels) of God came to present themselves before the Lord, and Satan (the adversary and accuser) also came among them. [Rev. 12:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the Lord said to Satan, From where did you come? Then Satan answered the Lord, From going to and fro on the earth and from walking up and down on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the Lord said to Satan, Have you considered My servant Job, that there is none like him on the earth, a blameless and upright man, one who [reverently] fears God and abstains from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shuns evil [because it is wrong]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Satan answered the Lord, Does Job [reverently] fear God for nothing?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Have You not put a hedge about him and his house and all that he has, on every side? You have conferred prosperity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' happiness upon him in the work of his hands, and his possessions have increased in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But put forth Your hand now and touch all that he has, and he will curse You to Your face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the Lord said to Satan (the adversary and the accuser), Behold, all that he has is in your power, only upon the man himself put not forth your hand. So Satan went forth from the presence of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And there was a day when [Job''s] sons and his daughters were eating and drinking wine in their eldest brother''s house [on his birthday],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And there came a messenger to Job and said, The oxen were plowing and the donkeys feeding beside them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the Sabeans swooped down upon them and took away [the animals]. Indeed, they have slain the servants with the edge of the sword, and I alone have escaped to tell you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' While he was yet speaking, there came also another and said, The fire of God (lightning) has fallen from the heavens and has burned up the sheep and the servants and consumed them, and I alone have escaped to tell you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' While he was yet speaking, there came also another and said, The Chaldeans divided into three bands and made a raid upon the camels and have taken them away, yes, and have slain the servants with the edge of the sword, and I alone have escaped to tell you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' While he was yet speaking, there came also another and said, Your sons and your daughters were eating and drinking wine in their eldest brother''s house,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And behold, there came a great [whirlwind] from the desert, and smote the four corners of the house, and it fell upon the young people and they are dead, and I alone have escaped to tell you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then Job arose and rent his robe and shaved his head and fell down upon the ground and worshiped'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And said, Naked (without possessions) came I [into this world] from my mother''s womb, and naked (without possessions) shall I depart. The Lord gave and the Lord has taken away; blessed (praised and magnified in worship) be the name of the Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' In all this Job sinned not nor charged God foolishly.'
