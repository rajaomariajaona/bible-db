document_id: JER.47,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE WORD of the Lord that came to Jeremiah the prophet concerning the Philistines before Pharaoh smote [the Philistine city] Gaza. [Isa. 14:29-31; Ezek. 25:15-17; Amos 1:6-8; Zeph. 2:4-7; Zech. 9:5-7.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Thus says the Lord: Behold, waters are rising out of the north and shall become an overflowing stream and shall overflow the land and all that is in it, the city and those who dwell in it. Then the men shall cry, and all the inhabitants of the land [of Philistia] shall wail.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' At the noise of the stamping of the hoofs of [the Chaldean king''s] war-horses, at the rattling of his chariots, and at the rumbling of his wheels, the fathers do not look back to their children, so feeble are their hands [with terror]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Because of the day that is coming to destroy all the Philistines and to cut off from Tyre and Sidon every helper who remains. For the Lord is destroying the Philistines, the remnant [still surviving] of the isle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' coastland of Caphtor [where the Philistines originated]. [Amos 9:7.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Baldness [as a token of mourning] will come upon Gaza; Ashkelon will be cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be dumb. O remnant of their valley '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of the giants, how long will you gash yourselves [as a token of mourning]?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' O you sword of the Lord, how long will it be before you are quiet? Put yourself into your scabbard; rest and be still.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' How can it [the sword of the Lord] be quiet when the Lord has given it an assignment to discharge? Against Ashkelon and against the [whole Philistine] seashore He has appointed it.'
