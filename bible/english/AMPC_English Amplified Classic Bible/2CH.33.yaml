document_id: 2CH.33
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MANASSEH WAS twelve years old when he began to reign, and he reigned fifty-five years in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But he did evil in the Lord''s sight, like the abominations of the heathen whom the Lord drove out before the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For he built again the [idolatrous] high places which Hezekiah his father had broken down, and he reared altars for the Baals and made the Asherim and worshiped all the hosts of the heavens and served them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Also he built [heathen] altars in the Lord''s house, of which the Lord had said, In Jerusalem shall My Name be forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He built altars for all the hosts of the heavens in the two courts of the Lord''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he burned his children as an offering [to his god] in the Valley of Ben-hinnom [son of Hinnom], and practiced soothsaying, augury, and sorcery, and dealt with mediums and wizards. He did much evil in the sight of the Lord, provoking Him to anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he set a carved image, the idol which he had made, in the house of God, of which God had said to David and to Solomon his son, In this house and in Jerusalem, which I have chosen before all the tribes of Israel, will I put My Name [and Presence] forever;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I will no more remove Israel from the land which I appointed for your fathers, if they will only take heed to do all that I have commanded them, the whole law, the statutes, and the ordinances given through Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So Manasseh led Judah and the inhabitants of Jerusalem to do more evil than the heathen whom the Lord had destroyed before the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The Lord spoke to Manasseh and to his people, but they would not hearken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So the Lord brought against them the commanders of the host of the king of Assyria, who took Manasseh with hooks and in fetters and brought him to Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When he was in affliction, he besought the Lord his God and humbled himself greatly before the God of his fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He prayed to Him, and God, entreated by him, heard his supplication and brought him again to Jerusalem to his kingdom. Then Manasseh knew that the Lord is God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he built an outer wall to the City of David west of Gihon in the valley, to the entrance of the Fish Gate, and ran it around Ophel, raising it to a very great height; and he put commanders of the army in all the fortified cities of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And he took away the foreign gods and the idol out of the house of the Lord and all the altars that he had built on the mount of the house of the Lord and in Jerusalem; and he cast them out of the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he restored the Lord''s altar and sacrificed on it offerings of peace and of thanksgiving; and he commanded Judah to serve the Lord, the God of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Yet the people still sacrificed in the high places, but only to the Lord their God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now the rest of the acts of Manasseh, and his prayer to his God, and the words of the seers who spoke to him in the name of the Lord, the God of Israel, behold, they are written in the Book of the Kings of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' His prayer and how God heard him, and all his sins and unfaithfulness, and the sites on which he built high places and set up the Asherim and graven images before he humbled himself, behold, they are written in the Chronicles of the Seers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' So Manasseh slept with his fathers, and they buried him in his own house [garden]. And Amon his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Amon was twenty-two years old when he began his two-year reign in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But he did evil in the sight of the Lord, as did Manasseh his father; for Amon sacrificed to all the images which Manasseh his father had made, and served them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And he did not humble himself before the Lord, as Manasseh his father [finally] did; but Amon trespassed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' became more and more guilty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And his servants conspired against him and killed him in his own house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But the people of the land slew all those who had conspired against King Amon, and they made Josiah his son king in his stead.'
