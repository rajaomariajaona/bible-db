document_id: 1KI.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND 480 years after the Israelites came out of the land of Egypt, in the fourth year of Solomon''s reign over Israel, in the second month, Ziv, he began to build the Lord''s house.'
  '10':
  - type: text
    content: ' Then he built the stories of chambers [the lean-to] against all the house, each [story] five cubits high; and it was joined to the house with timbers of cedar.'
  '11':
  - type: text
    content: ' Now the word of the Lord came to Solomon, saying,'
  '12':
  - type: text
    content: ' Concerning this house which you are building, if you will walk in My statutes, execute My precepts, and keep all My commandments to walk in them, then I will fulfill to you My promises which I made to David your father.'
  '13':
  - type: text
    content: ' And I will dwell among the Israelites and will not forsake My people Israel.'
  '14':
  - type: text
    content: ' So Solomon built the house and finished it.'
  '15':
  - type: text
    content: ' He built the walls of the house (the Holy Place and the Holy of Holies) within with boards of cedar, from the floor of the house to the rafters of the ceiling. He covered the inside with wood, and the floor of the house with boards of cypress.'
  '16':
  - type: text
    content: ' He built twenty cubits of the rear of the house with boards of cedar from the floor to the rafters; he built it within for the sanctuary, the Holy of Holies.'
  '17':
  - type: text
    content: ' The [rest of the] house, that is, the temple in front of the Holy of Holies, was forty cubits long.'
  '18':
  - type: text
    content: ' The cedar on the house within was carved with gourds and open flowers. All was cedar; no stone was visible.'
  '19':
  - type: text
    content: ' And he prepared the Holy of Holies in the inner room in which to set the ark of the covenant of the Lord.'
  '2':
  - type: text
    content: ' The length of the house Solomon built for the Lord was sixty cubits, its breadth twenty, and its height thirty cubits.'
  '20':
  - type: text
    content: ' The Holy of Holies was twenty cubits in length, in breadth, and in height. He overlaid it with pure gold. He also overlaid the cedar altar.'
  '21':
  - type: text
    content: ' Solomon overlaid the house within with pure gold, and he drew chains of gold across in front of the Holy of Holies and overlaid it with gold.'
  '22':
  - type: text
    content: ' And the whole house he overlaid with gold, until all the house was finished. Also the whole [incense] altar that [stood outside the door but] belonged to the Holy of Holies he overlaid with gold.'
  '23':
  - type: text
    content: ' Within the Holy of Holies he made two cherubim of olive wood, each ten cubits high.'
  '24':
  - type: text
    content: ' Five cubits was the length of one wing of the cherub and five cubits its other wing; from the tip of one wing to the tip of the other was ten cubits.'
  '25':
  - type: text
    content: ' The wings of the other cherub were also ten cubits. Both cherubim were the same,'
  '26':
  - type: text
    content: ' The height of one cherub ten cubits, as was the other.'
  '27':
  - type: text
    content: ' He put the cherubim within the inner sanctuary. Their wings were stretched out, so that the wing of one touched one wall, and the wing of the other cherub touched the other wall, and their inner wings touched in the midst of the room.'
  '28':
  - type: text
    content: ' Solomon overlaid the cherubim with gold.'
  '29':
  - type: text
    content: ' He carved all the walls of the house (these two holy rooms) round about with figures of cherubim, palm trees, and open flowers, within and without.'
  '3':
  - type: text
    content: ' The length of the vestibule in front of the temple was twenty cubits, equal to the width of the house, and its depth in front of the house was ten cubits.'
  '30':
  - type: text
    content: ' The floor of the house he overlaid with gold, inside and out.'
  '31':
  - type: text
    content: ' For the Holy of Holies he made [folding] doors of olive wood; their entire width was one-fifth that of the wall.'
  '32':
  - type: text
    content: ' On the two doors of olive wood he carved cherubim, palm trees, and open flowers; he overlaid them with gold, and spread gold on the cherubim and palm trees.'
  '33':
  - type: text
    content: ' Also he made for the door of the Holy Place four-sided posts of olive wood.'
  '34':
  - type: text
    content: ' The two doors were of cypress wood; the two leaves of each door were folding.'
  '35':
  - type: text
    content: ' He carved on them cherubim, palm trees, and open flowers, covered with gold evenly applied on the carved work.'
  '36':
  - type: text
    content: ' He built the inner court with three rows of hewn stone and a row of cedar beams.'
  '37':
  - type: text
    content: ' In the fourth year the foundation of the Lord''s house was laid, in the [second] month, Ziv.'
  '38':
  - type: text
    content: ' In the eleventh year, in Bul, the eighth month, the house was finished throughout according to all its specifications. So he was seven years in building it.'
  '4':
  - type: text
    content: ' For the house he made narrow [latticed] windows.'
  '5':
  - type: text
    content: ' Against the wall of the house he built chambers running round the walls of the house both of the Holy Place and of the Holy of Holies; and he made side chambers all around.'
  '6':
  - type: text
    content: ' The first story''s side chambers were five cubits wide, those of the middle story six cubits wide, and of the third story seven cubits wide; for around the outside of the wall of the house he made offsets in order that the supporting beams should not be thrust into the walls of the house.'
  '7':
  - type: text
    content: ' When the house was being built, its stone was made ready at the quarry, and no hammer, ax, or tool of iron was heard in the house while it was in building.'
  '8':
  - type: text
    content: ' The entrance to the lowest side chamber was on the right [or south] side of the house; and one went up winding stairs into the middle chamber and from the middle into the third.'
  '9':
  - type: text
    content: ' So Solomon built the temple building and finished it, and roofed the house with beams and boards of cedar.'
