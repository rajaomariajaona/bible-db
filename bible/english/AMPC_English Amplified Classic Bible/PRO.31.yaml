document_id: PRO.31
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORDS of Lemuel king of Massa, which his mother taught him:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' What, my son? What, son of my womb? What [shall I advise you], son of my vows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dedication to God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Give not your strength to [loose] women, nor your ways to those who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' that which ruin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroy kings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' It is not for kings, O Lemuel, it is not for kings to drink wine, or for rulers to desire strong drink, [Eccl. 10:17; Hos. 4:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Lest they drink and forget the law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what it decrees, and pervert the justice due any of the afflicted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Give strong drink [as medicine] to him who is ready to pass away, and wine to him in bitter distress of heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Let him drink and forget his poverty and [seriously] remember his want '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' misery no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Open your mouth for the dumb [those unable to speak for themselves], for the rights of all who are left desolate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defenseless; [I Sam. 19:4; Esth. 4:16; Job 29:15, 16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Open your mouth, judge righteously, and administer justice for the poor and needy. [Lev. 19:15; Deut. 1:16; Job 29:12; Isa. 1:17; Jer. 22:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' A capable, intelligent, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' virtuous woman–who is he who can find her? She is far more precious than jewels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' her value is far above rubies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pearls. [Prov. 12:4; 18:22; 19:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The heart of her husband trusts in her confidently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on and believes in her securely, so that he has no lack of [honest] gain or need of [dishonest] spoil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' She comforts, encourages, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' does him only good as long as there is life within her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' She seeks out wool and flax and works with willing hands [to develop it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' She is like the merchant ships loaded with foodstuffs; she brings her household''s food from a far [country].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' She rises while it is yet night and gets [spiritual] food for her household and assigns her maids their tasks. [Job 23:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' She considers a [new] field before she buys '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' accepts it [expanding prudently and not courting neglect of her present duties by assuming other duties]; with her savings [of time and strength] she plants fruitful vines in her vineyard. [S. of Sol. 8:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' She girds herself with strength [spiritual, mental, and physical fitness for her God-given task] and makes her arms strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' firm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' She tastes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sees that her gain from work [with and for God] is good; her lamp goes not out, but it burns on continually through the night [of trouble, privation, or sorrow, warning away fear, doubt, and distrust].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' She lays her hands to the spindle, and her hands hold the distaff.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' She opens her hand to the poor, yes, she reaches out her filled hands to the needy [whether in body, mind, or spirit].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' She fears not the snow for her family, for all her household are doubly clothed in scarlet. [Josh. 2:18, 19; Heb. 9:19-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' She makes for herself coverlets, cushions, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rugs of tapestry. Her clothing is of linen, pure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fine, and of purple [such as that of which the clothing of the priests and the hallowed cloths of the temple were made]. [Isa. 61:10; I Tim. 2:9; Rev. 3:5; 19:8, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Her husband is known in the [city''s] gates, when he sits among the elders of the land. [Prov. 12:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' She makes fine linen garments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leads others to buy them; she delivers to the merchants girdles [or sashes that free one up for service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Strength and dignity are her clothing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' her position is strong and secure; she rejoices over the future [the latter day or time to come, knowing that she and her family are in readiness for it]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' She opens her mouth in skillful and godly Wisdom, and on her tongue is the law of kindness [giving counsel and instruction].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' She looks well to how things go in her household, and the bread of idleness (gossip, discontent, and self-pity) she will not eat. [I Tim. 5:14; Tit. 2:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Her children rise up and call her blessed (happy, fortunate, and to be envied); and her husband boasts of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praises her, [saying],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Many daughters have done virtuously, nobly, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' well [with the strength of character that is steadfast in goodness], but you excel them all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Charm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grace are deceptive, and beauty is vain [because it is not lasting], but a woman who reverently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fears the Lord, she shall be praised!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Give her of the fruit of her hands, and let her own works praise her in the gates [of the city]! [Phil. 4:8.]'
