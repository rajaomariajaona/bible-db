document_id: PRO.31,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORDS of Lemuel king of Massa, which his mother taught him:'
  '10':
  - type: text
    content: ' A capable, intelligent, '
  - type: text
    content: and
  - type: text
    content: ' virtuous woman–who is he who can find her? She is far more precious than jewels '
  - type: text
    content: and
  - type: text
    content: ' her value is far above rubies '
  - type: text
    content: or
  - type: text
    content: ' pearls. [Prov. 12:4; 18:22; 19:14.]'
  '11':
  - type: text
    content: ' The heart of her husband trusts in her confidently '
  - type: text
    content: and
  - type: text
    content: ' relies on and believes in her securely, so that he has no lack of [honest] gain or need of [dishonest] spoil.'
  '12':
  - type: text
    content: ' She comforts, encourages, '
  - type: text
    content: and
  - type: text
    content: ' does him only good as long as there is life within her.'
  '13':
  - type: text
    content: ' She seeks out wool and flax and works with willing hands [to develop it].'
  '14':
  - type: text
    content: ' She is like the merchant ships loaded with foodstuffs; she brings her household''s food from a far [country].'
  '15':
  - type: text
    content: ' She rises while it is yet night and gets [spiritual] food for her household and assigns her maids their tasks. [Job 23:12.]'
  '16':
  - type: text
    content: ' She considers a [new] field before she buys '
  - type: text
    content: or
  - type: text
    content: ' accepts it [expanding prudently and not courting neglect of her present duties by assuming other duties]; with her savings [of time and strength] she plants fruitful vines in her vineyard. [S. of Sol. 8:12.]'
  '17':
  - type: text
    content: ' She girds herself with strength [spiritual, mental, and physical fitness for her God-given task] and makes her arms strong '
  - type: text
    content: and
  - type: text
    content: ' firm.'
  '18':
  - type: text
    content: ' She tastes '
  - type: text
    content: and
  - type: text
    content: ' sees that her gain from work [with and for God] is good; her lamp goes not out, but it burns on continually through the night [of trouble, privation, or sorrow, warning away fear, doubt, and distrust].'
  '19':
  - type: text
    content: ' She lays her hands to the spindle, and her hands hold the distaff.'
  '2':
  - type: text
    content: ' What, my son? What, son of my womb? What [shall I advise you], son of my vows '
  - type: text
    content: and
  - type: text
    content: ' dedication to God?'
  '20':
  - type: text
    content: ' She opens her hand to the poor, yes, she reaches out her filled hands to the needy [whether in body, mind, or spirit].'
  '21':
  - type: text
    content: ' She fears not the snow for her family, for all her household are doubly clothed in scarlet. [Josh. 2:18, 19; Heb. 9:19-22.]'
  '22':
  - type: text
    content: ' She makes for herself coverlets, cushions, '
  - type: text
    content: and
  - type: text
    content: ' rugs of tapestry. Her clothing is of linen, pure '
  - type: text
    content: and
  - type: text
    content: ' fine, and of purple [such as that of which the clothing of the priests and the hallowed cloths of the temple were made]. [Isa. 61:10; I Tim. 2:9; Rev. 3:5; 19:8, 14.]'
  '23':
  - type: text
    content: ' Her husband is known in the [city''s] gates, when he sits among the elders of the land. [Prov. 12:4.]'
  '24':
  - type: text
    content: ' She makes fine linen garments '
  - type: text
    content: and
  - type: text
    content: ' leads others to buy them; she delivers to the merchants girdles [or sashes that free one up for service].'
  '25':
  - type: text
    content: ' Strength and dignity are her clothing '
  - type: text
    content: and
  - type: text
    content: ' her position is strong and secure; she rejoices over the future [the latter day or time to come, knowing that she and her family are in readiness for it]!'
  '26':
  - type: text
    content: ' She opens her mouth in skillful and godly Wisdom, and on her tongue is the law of kindness [giving counsel and instruction].'
  '27':
  - type: text
    content: ' She looks well to how things go in her household, and the bread of idleness (gossip, discontent, and self-pity) she will not eat. [I Tim. 5:14; Tit. 2:5.]'
  '28':
  - type: text
    content: ' Her children rise up and call her blessed (happy, fortunate, and to be envied); and her husband boasts of '
  - type: text
    content: and
  - type: text
    content: ' praises her, [saying],'
  '29':
  - type: text
    content: ' Many daughters have done virtuously, nobly, '
  - type: text
    content: and
  - type: text
    content: ' well [with the strength of character that is steadfast in goodness], but you excel them all.'
  '3':
  - type: text
    content: ' Give not your strength to [loose] women, nor your ways to those who '
  - type: text
    content: and
  - type: text
    content: ' that which ruin '
  - type: text
    content: and
  - type: text
    content: ' destroy kings.'
  '30':
  - type: text
    content: ' Charm '
  - type: text
    content: and
  - type: text
    content: ' grace are deceptive, and beauty is vain [because it is not lasting], but a woman who reverently '
  - type: text
    content: and
  - type: text
    content: ' worshipfully fears the Lord, she shall be praised!'
  '31':
  - type: text
    content: ' Give her of the fruit of her hands, and let her own works praise her in the gates [of the city]! [Phil. 4:8.]'
  '4':
  - type: text
    content: ' It is not for kings, O Lemuel, it is not for kings to drink wine, or for rulers to desire strong drink, [Eccl. 10:17; Hos. 4:11.]'
  '5':
  - type: text
    content: ' Lest they drink and forget the law '
  - type: text
    content: and
  - type: text
    content: ' what it decrees, and pervert the justice due any of the afflicted.'
  '6':
  - type: text
    content: ' Give strong drink [as medicine] to him who is ready to pass away, and wine to him in bitter distress of heart.'
  '7':
  - type: text
    content: ' Let him drink and forget his poverty and [seriously] remember his want '
  - type: text
    content: and
  - type: text
    content: ' misery no more.'
  '8':
  - type: text
    content: ' Open your mouth for the dumb [those unable to speak for themselves], for the rights of all who are left desolate '
  - type: text
    content: and
  - type: text
    content: ' defenseless; [I Sam. 19:4; Esth. 4:16; Job 29:15, 16.]'
  '9':
  - type: text
    content: ' Open your mouth, judge righteously, and administer justice for the poor and needy. [Lev. 19:15; Deut. 1:16; Job 29:12; Isa. 1:17; Jer. 22:16.]'
