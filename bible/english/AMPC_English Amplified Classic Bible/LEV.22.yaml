document_id: LEV.22,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' No outsider [not of the family of Aaron] shall eat of the holy thing [which has been offered to God]; a sojourner with the priest or a hired servant shall not eat of the holy thing.'
  '11':
  - type: text
    content: ' But if a priest buys a slave with his money, the slave may eat of the holy thing, and he also who is born in the priest''s house; they may eat of his food.'
  '12':
  - type: text
    content: ' If a priest''s daughter is married to an outsider [not of the priestly tribe], she shall not eat of the offering of the holy things.'
  '13':
  - type: text
    content: ' But if a priest''s daughter is a widow or divorced, and has no child, and returns to her father''s house as in her youth, she shall eat of her father''s food; but no stranger shall eat of it.'
  '14':
  - type: text
    content: ' And if a man eats unknowingly of the holy thing [which has been offered to God], then he shall add one-fifth of its value to it and repay that amount to the priest for the holy thing.'
  '15':
  - type: text
    content: ' The priests shall not profane the holy things the Israelites offer to the Lord,'
  '16':
  - type: text
    content: ' And so cause them [by neglect of any essential observance] to bear the iniquity when they eat their holy things; for I the Lord sanctify them.'
  '17':
  - type: text
    content: ' And the Lord said to Moses,'
  '18':
  - type: text
    content: ' Say to Aaron and his sons and to all the Israelites, Whoever of the house of Israel and of the foreigners in Israel brings his offering, whether to pay a vow or as a freewill offering which is offered to the Lord for a burnt offering'
  '19':
  - type: text
    content: ' That you may be accepted, you shall offer a male without blemish of the young bulls, the sheep, or the goats.'
  '2':
  - type: text
    content: ' Say to Aaron and his sons that they shall stay away from the holy things which the Israelites dedicate to Me, that they may not profane My holy name; I am the Lord.'
  '20':
  - type: text
    content: ' But you shall not offer anything which has a blemish, for it will not be acceptable for you. [I Pet. 1:19.]'
  '21':
  - type: text
    content: ' And whoever offers a sacrifice of peace offering to the Lord to make a special vow to the Lord or for a freewill offering from the herd or from the flock must bring what is perfect to be accepted; there shall be no blemish in it.'
  '22':
  - type: text
    content: ' Animals blind or made infirm '
  - type: text
    content: and
  - type: text
    content: ' weak or maimed, or having sores '
  - type: text
    content: or
  - type: text
    content: ' a wen or an itch or scabs, you shall not offer to the Lord or make an offering of them by fire upon the altar to the Lord.'
  '23':
  - type: text
    content: ' For a freewill offering you may offer either a bull or a lamb which has some part too long or too short, but for [the payment of] a vow it shall not be accepted.'
  '24':
  - type: text
    content: ' You shall not offer to the Lord any animal which has its testicles bruised or crushed or broken or cut, neither sacrifice it in your land.'
  '25':
  - type: text
    content: ' Neither shall you offer as the bread of your God any such animals obtained from a foreigner [who may wish to pay respect to the true God], because their defects render them unfit; there is a blemish in them; they will not be accepted for you.'
  '26':
  - type: text
    content: ' And the Lord said to Moses,'
  '27':
  - type: text
    content: ' When a bull or a sheep or a goat is born, it shall remain for seven days with its mother; and from the eighth day on it shall be accepted for an offering made by fire to the Lord.'
  '28':
  - type: text
    content: ' And whether [the mother] is a cow or a ewe, you shall not kill her and her young both in one day.'
  '29':
  - type: text
    content: ' And when you sacrifice an offering of thanksgiving to the Lord, sacrifice it so that you may be accepted.'
  '3':
  - type: text
    content: ' Tell them, Any one of your offspring throughout your generations who goes to the holy things which the Israelites dedicate to the Lord when he is unclean, that [priest] shall be cut off from My presence '
  - type: text
    content: and
  - type: text
    content: ' excluded from the sanctuary; I am the Lord.'
  '30':
  - type: text
    content: ' It shall be eaten on the same day; you shall leave none of it until the next day. I am the Lord.'
  '31':
  - type: text
    content: ' So shall you heartily accept My commandments '
  - type: text
    content: and
  - type: text
    content: ' conform your life and conduct to them. I am the Lord.'
  '32':
  - type: text
    content: ' Neither shall you profane My holy name [applying it to an idol, or treating it with irreverence or contempt or as a byword]; but I will be hallowed among the Israelites. I am the Lord, Who consecrates '
  - type: text
    content: and
  - type: text
    content: ' makes you holy,'
  '33':
  - type: text
    content: ' Who brought you out of the land of Egypt to be your God. I am the Lord.'
  '4':
  - type: text
    content: ' No man of the offspring of Aaron who is a leper or has a discharge shall eat of the holy things [the offerings and the showbread] until he is clean. And whoever touches any person '
  - type: text
    content: or
  - type: text
    content: ' thing made unclean by contact with a corpse or a man who has had a discharge of semen,'
  '5':
  - type: text
    content: ' Or whoever touches any dead creeping thing by which he may be made unclean, or a man from whom he may acquire uncleanness, whatever it may be, [Lev. 11:24-28.]'
  '6':
  - type: text
    content: ' The priest who has touched any such thing shall be unclean until evening and shall not eat of the holy things unless he has bathed with water. [Heb. 10:22.]'
  '7':
  - type: text
    content: ' When the sun is down, he shall be clean, and afterward may eat of the holy things, for they are his food.'
  '8':
  - type: text
    content: ' That which dies of itself or is torn by beasts he shall not eat, defiling himself with it. I am the Lord.'
  '9':
  - type: text
    content: ' The priests therefore shall observe My ordinance, lest they bear sin for it and die thereby if they profane it. I am the Lord, Who sanctifies them.'
