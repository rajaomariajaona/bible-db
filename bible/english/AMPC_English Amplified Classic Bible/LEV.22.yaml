document_id: LEV.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Say to Aaron and his sons that they shall stay away from the holy things which the Israelites dedicate to Me, that they may not profane My holy name; I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Tell them, Any one of your offspring throughout your generations who goes to the holy things which the Israelites dedicate to the Lord when he is unclean, that [priest] shall be cut off from My presence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excluded from the sanctuary; I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' No man of the offspring of Aaron who is a leper or has a discharge shall eat of the holy things [the offerings and the showbread] until he is clean. And whoever touches any person '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' thing made unclean by contact with a corpse or a man who has had a discharge of semen,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Or whoever touches any dead creeping thing by which he may be made unclean, or a man from whom he may acquire uncleanness, whatever it may be, [Lev. 11:24-28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The priest who has touched any such thing shall be unclean until evening and shall not eat of the holy things unless he has bathed with water. [Heb. 10:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' When the sun is down, he shall be clean, and afterward may eat of the holy things, for they are his food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' That which dies of itself or is torn by beasts he shall not eat, defiling himself with it. I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The priests therefore shall observe My ordinance, lest they bear sin for it and die thereby if they profane it. I am the Lord, Who sanctifies them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' No outsider [not of the family of Aaron] shall eat of the holy thing [which has been offered to God]; a sojourner with the priest or a hired servant shall not eat of the holy thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But if a priest buys a slave with his money, the slave may eat of the holy thing, and he also who is born in the priest''s house; they may eat of his food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' If a priest''s daughter is married to an outsider [not of the priestly tribe], she shall not eat of the offering of the holy things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But if a priest''s daughter is a widow or divorced, and has no child, and returns to her father''s house as in her youth, she shall eat of her father''s food; but no stranger shall eat of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And if a man eats unknowingly of the holy thing [which has been offered to God], then he shall add one-fifth of its value to it and repay that amount to the priest for the holy thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The priests shall not profane the holy things the Israelites offer to the Lord,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And so cause them [by neglect of any essential observance] to bear the iniquity when they eat their holy things; for I the Lord sanctify them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Say to Aaron and his sons and to all the Israelites, Whoever of the house of Israel and of the foreigners in Israel brings his offering, whether to pay a vow or as a freewill offering which is offered to the Lord for a burnt offering'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' That you may be accepted, you shall offer a male without blemish of the young bulls, the sheep, or the goats.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But you shall not offer anything which has a blemish, for it will not be acceptable for you. [I Pet. 1:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And whoever offers a sacrifice of peace offering to the Lord to make a special vow to the Lord or for a freewill offering from the herd or from the flock must bring what is perfect to be accepted; there shall be no blemish in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Animals blind or made infirm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weak or maimed, or having sores '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a wen or an itch or scabs, you shall not offer to the Lord or make an offering of them by fire upon the altar to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' For a freewill offering you may offer either a bull or a lamb which has some part too long or too short, but for [the payment of] a vow it shall not be accepted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' You shall not offer to the Lord any animal which has its testicles bruised or crushed or broken or cut, neither sacrifice it in your land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Neither shall you offer as the bread of your God any such animals obtained from a foreigner [who may wish to pay respect to the true God], because their defects render them unfit; there is a blemish in them; they will not be accepted for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' When a bull or a sheep or a goat is born, it shall remain for seven days with its mother; and from the eighth day on it shall be accepted for an offering made by fire to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And whether [the mother] is a cow or a ewe, you shall not kill her and her young both in one day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And when you sacrifice an offering of thanksgiving to the Lord, sacrifice it so that you may be accepted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' It shall be eaten on the same day; you shall leave none of it until the next day. I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So shall you heartily accept My commandments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conform your life and conduct to them. I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Neither shall you profane My holy name [applying it to an idol, or treating it with irreverence or contempt or as a byword]; but I will be hallowed among the Israelites. I am the Lord, Who consecrates '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' makes you holy,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Who brought you out of the land of Egypt to be your God. I am the Lord.'
