document_id: DEU.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' OBSERVE THE month of Abib and keep the Passover to the Lord your God, for in the month of Abib the Lord your God brought you out of Egypt by night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You shall offer the Passover sacrifice to the Lord your God from the flock or the herd in the place where the Lord will choose to make His Name [and His Presence] dwell.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You shall eat no leavened bread with it; for seven days you shall eat it with unleavened bread, the bread of affliction–for you fled from the land of Egypt in haste–that all the days of your life you may [earnestly] remember the day when you came out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' No leaven shall be seen with you in all your territory for seven days; nor shall any of the flesh which you sacrificed the first day at evening be left all night until the morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You may not offer the Passover sacrifice within any of your towns which the Lord your God gives you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But at the place which the Lord your God will choose in which to make His Name [and His Presence] dwell, there you shall offer the Passover sacrifice in the evening at sunset, at the season that you came out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And you shall roast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' boil and eat it in the place which the Lord your God will choose. And in the morning you shall turn and go to your tents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For six days you shall eat unleavened bread, and on the seventh day there shall be a solemn assembly to the Lord your God; you shall do no work on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You shall count seven weeks; begin to number the seven weeks from the time you begin to put the sickle to the standing grain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then you shall keep the Feast of Weeks to the Lord your God with a tribute of a freewill offering from your hand, which you shall give to the Lord your God, as the Lord your God blesses you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And you shall rejoice before the Lord your God, you and your son and daughter, your manservant and maidservant, and the Levite who is within your towns, the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' temporary resident, the fatherless, and the widow who are among you, at the place in which the Lord your God chooses to make His Name [and His Presence] dwell.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And you shall [earnestly] remember that you were a slave in Egypt, and you shall be watchful and obey these statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You shall observe the Feast of Tabernacles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Booths for seven days after you have gathered in from your threshing floor and wine vat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You shall rejoice in your Feast, you, your son and daughter, your manservant and maidservant, the Levite, the transient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the stranger, the fatherless, and the widow who are within your towns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For seven days you shall keep a solemn Feast to the Lord your God in the place which the Lord chooses; because the Lord your God will bless you in all your produce and in all the works of your hands, so that you will be altogether joyful.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Three times a year shall all your males appear before the Lord your God in the place which He chooses: at the Feast of Unleavened Bread, at the Feast of Weeks, and at the Feast of Tabernacles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Booths. They shall not appear before the Lord empty-handed:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Every man shall give as he is able, according to the blessing of the Lord your God which He has given you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' You shall appoint judges and officers in all your towns which the Lord your God gives you, according to your tribes, and they shall judge the people with righteous judgment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You shall not misinterpret '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' misapply judgment; you shall not be partial, or take a bribe, for a bribe blinds the eyes of the wise and perverts the words of the righteous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Follow what is altogether just (uncompromisingly righteous), that you may live and inherit the land which your God gives you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' You shall not plant for yourselves any kind of tree dedicated to [the goddess] Asherah beside the altar of the Lord your God which you shall make.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Neither shall you set up an idolatrous stone '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' image, which the Lord your God hates.'
