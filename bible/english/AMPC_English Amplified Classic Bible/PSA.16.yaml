  '1':
  - type: heading
    content: A Poem of David; +[probably+] intended to record memorable thoughts.
  - type: text
    content: ' KEEP '
  - type: text
    content: and
  - type: text
    content: ' protect me, O God, for in You I have found refuge, '
  - type: text
    content: and
  - type: text
    content: ' in You do I put my trust '
  - type: text
    content: and
  - type: text
    content: ' hide myself.'
  '10':
  - type: text
    content: ' For You will not abandon me to Sheol (the place of the dead), neither will You suffer Your holy one [Holy One] to see corruption. [Acts 13:35.]'
  '11':
  - type: text
    content: ' You will show me the path of life; in Your presence is fullness of joy, at Your right hand there are pleasures forevermore. [Acts 2:25-28, 31.]'
  '2':
  - type: text
    content: ' I say to the Lord, You are my Lord; I have no good beside '
  - type: text
    content: or
  - type: text
    content: ' beyond You.'
  '3':
  - type: text
    content: ' As for the godly (the saints) who are in the land, they are the excellent, the noble, '
  - type: text
    content: and
  - type: text
    content: ' the glorious, in whom is all my delight.'
  '4':
  - type: text
    content: ' Their sorrows shall be multiplied who choose another god; their drink offerings of blood will I not offer or take their names upon my lips.'
  '5':
  - type: text
    content: ' The Lord is my chosen '
  - type: text
    content: and
  - type: text
    content: ' assigned portion, my cup; You hold '
  - type: text
    content: and
  - type: text
    content: ' maintain my lot.'
  '6':
  - type: text
    content: ' The lines have fallen for me in pleasant places; yes, I have a good heritage.'
  '7':
  - type: text
    content: ' I will bless the Lord, Who has given me counsel; yes, my heart instructs me in the night seasons.'
  '8':
  - type: text
    content: ' I have set the Lord continually before me; because He is at my right hand, I shall not be moved.'
  '9':
  - type: text
    content: ' Therefore my heart is glad and my glory [my inner self] rejoices; my body too shall rest '
  - type: text
    content: and
  - type: text
    content: ' confidently dwell in safety,'
