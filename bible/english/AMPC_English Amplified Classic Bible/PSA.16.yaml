document_id: PSA.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Poem of David; +[probably+] intended to record memorable thoughts.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' KEEP '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protect me, O God, for in You I have found refuge, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in You do I put my trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hide myself.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For You will not abandon me to Sheol (the place of the dead), neither will You suffer Your holy one [Holy One] to see corruption. [Acts 13:35.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' You will show me the path of life; in Your presence is fullness of joy, at Your right hand there are pleasures forevermore. [Acts 2:25-28, 31.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' I say to the Lord, You are my Lord; I have no good beside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' beyond You.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' As for the godly (the saints) who are in the land, they are the excellent, the noble, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the glorious, in whom is all my delight.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Their sorrows shall be multiplied who choose another god; their drink offerings of blood will I not offer or take their names upon my lips.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' The Lord is my chosen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' assigned portion, my cup; You hold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' maintain my lot.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' The lines have fallen for me in pleasant places; yes, I have a good heritage.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' I will bless the Lord, Who has given me counsel; yes, my heart instructs me in the night seasons.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I have set the Lord continually before me; because He is at my right hand, I shall not be moved.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Therefore my heart is glad and my glory [my inner self] rejoices; my body too shall rest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently dwell in safety,'
