document_id: EZK.40,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN THE twenty-fifth year of our captivity [by Babylon], in the beginning of the year, on the tenth day of the month, in the fourteenth year after the city [of Jerusalem] was taken, on the very same day the hand of the Lord was upon me and He brought me to that place.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And the guardrooms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' lodges of the east gateway were three on this side and three on that side; the three were the same size, and the posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' jambs were the same size on either side.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And he measured the breadth of the opening of the gateway, ten cubits, and the length of the gateway, thirteen cubits.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And a border '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' barrier before the guardrooms was one cubit on this side, and a border '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' barrier, one cubit on that side. And the guardrooms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' lodges were six cubits on this side and six cubits on that side.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the man
    - type: text
      text: ' [an angel] measured the gate from the outer wall of one chamber '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' guardroom to the outer wall of another–a breadth of twenty-five cubits from door to door.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And the open part of the porch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule of the gateway on the outside was twenty cubits, the chambers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' guardrooms of the gate being round about.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And including this porch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule of the gate on the outside and the porch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule on the inside, the extent was fifty cubits.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And there were closed windows to the guardrooms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' chambers and to their posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars within the gate round about, and likewise to the archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule; and windows were round about facing into the court, and upon each post '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillar were palm tree [decorations].'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Then he brought me into the outward court, and behold, there were chambers and a pavement round about the court; thirty chambers fronted on the pavement.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And the pavement was along by the side of the gates, answerable to the length of the gateways; this was the lower pavement.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the man
    - type: text
      text: ' measured the distance from the inner front before the lower gate to the outer front of the inner court, a hundred cubits, both on the east and on the north.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' In the visions of God He brought me into the land of Israel and set me down upon a very high mountain, on the south side of which there was what seemed to be the structure of a city.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And the gate of the outward court which faced the north, of it he measured both the length and the breadth.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And its guardrooms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' lodges, three on this side and three on that side, and its posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars and archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule were the same size as those of the first gate; the length was fifty cubits and the breadth twenty-five cubits.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And its windows and its archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule and its palm trees were of the same size as those of the gate that faces toward the east. It was reached by going up seven steps, and the archway of its vestibule was on the inner side.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Opposite the gate on the north and on the east was a gate to the inner court, and he [the man with the measuring rod of reed] measured from gate to gate, a hundred cubits.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' After that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the man
    - type: text
      text: ' brought me toward the south, and behold, there was a gate on the south, and he measured its posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars and its archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule; they measured as the others did.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And there were windows round about in it and in its archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule, like those windows in the other gateways; its length was fifty cubits and its breadth twenty-five cubits.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And there were seven steps going up to the gate, and its archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule was on the inside. And it had palm trees, one on this side and another on that side, carved on its posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And there was a gate to the inner court on the south, and he measured from gate to gate toward the south, a hundred cubits.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the man
    - type: text
      text: ' [an angel] brought me into the inner court by the south gate, and he measured the south gate; its measurements were the same as those of the other gateways.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And its guardrooms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' chambers and its posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars and its archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule measured as did the others. And there were windows in the gateway and in its archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule round about; its length was fifty cubits and its breadth twenty-five cubits.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' He brought me there, and behold, there was a man [an angel] whose appearance was like bronze, with a line of flax and a measuring reed in his hand, and he stood in the gateway.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And there was an archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a vestibule round about, twenty-five cubits long and five cubits wide.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And its [arched] vestibule faced the outer court; and palm trees were carved upon its posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars, and the steps going up to it were eight.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And he brought me into the inner court toward the east and he measured the gate; it measured the same as the others.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And its guardrooms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' chambers and its posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars and its archway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule measured as did the others. And there were windows in it and in its [arched] vestibule round about; the gateway was fifty cubits long and twenty-five cubits wide.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And its [arched] vestibule faced the outer court; and palm trees were carved upon its posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars on either side, and the steps leading to it were eight.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the man
    - type: text
      text: ' [an angel] brought me to the north gate and measured it; the measurements were the same as those of the other gates.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Its guardrooms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' chambers, its posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars, its [arched] vestibule, and the windows to it round about [were of the same size as the others]. The length of the gateway was fifty cubits and the width was twenty-five cubits.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' And its posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars were toward the outer court, and palm trees were carved upon them on either side. And the approach to it had eight steps.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' There was an attached chamber with its door beside the posts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillars of the gates where the burnt offering was to be washed.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' And in the porch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule of the gate were two tables on this side and two tables on that side, on which to slay the burnt offering and the sin offering and the trespass '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' guilt offering.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And the man said to me, Son of man, look with your eyes and hear with your ears and set your heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind on all that I will show you, for you are brought here that I may show them to you. Declare all that you see to the house of Israel.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' And on the one side without, as one goes up to the entrance of the gate to the north, were two tables; and on the other side at the vestibule of the gate were two tables.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' Four tables were on the inside and four tables on the outside of the side of the gate, eight tables upon which the sacrifices were to be slain.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' Moreover, there were four tables of hewn stone for the burnt offering, a cubit and a half long, a cubit and a half broad, and one cubit high. Upon them were to be laid the instruments with which were slain the burnt offering and the sacrifice.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' And slabs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hooks a handbreadth long were fastened within [the room] round about. Upon the tables was to be placed the flesh of the offering.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' Then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the man
    - type: text
      text: ' [an angel] led me [from without] into the inner court, and behold, there were two chambers in the inner court: one beside the north gate but facing the south, and one beside the south gate but looking toward the north.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the man
    - type: text
      text: ' [an angel who was guiding me] said, This chamber with its view to the south is for the priests who have charge of the house [of the Lord],'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' And the chamber with its view to the north is for the priests who have charge of the altar. These are the sons of Zadok, who alone among the sons of Levi may come near to the Lord to minister to Him.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' And he measured the court, a hundred cubits long and a hundred cubits broad, foursquare; and the altar was in front of the house [of the Lord].'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' Then he brought me to the porch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule of the temple proper, and he measured each post '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pillar of the porch, five cubits on either side. And the width of the gate was three cubits for this [leaf] and three cubits for that one.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' And the length of the porch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule was twenty cubits and the breadth eleven cubits; and he brought me by the steps by which it was reached, and there were two pillars standing on the posts [as bases] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' beside them, one on either side of the entrance.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And behold, there was a wall all around the outside area of the house [of the Lord], and in the man''s hand a measuring reed six long cubits in length, each cubit being longer [than the usual one] by a handbreadth; so he measured the thickness of the wall, one reed, and the height, one reed.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Then he came to the gate which faced the east and went up its [seven] steps and measured the threshold of the gateway, one reed broad, and the other threshold of the gateway [inside the thick wall], one reed broad.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And every room for the guards was one reed long and one reed broad, and the space between the guardrooms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' lodges was five cubits. And the threshold of the gate by the porch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule of the gateway within was one reed.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He measured also the porch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' vestibule of the gate toward the house [of the Lord], one reed.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then he measured the porch '
    - type: usfm
