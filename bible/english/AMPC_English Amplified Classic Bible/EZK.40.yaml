document_id: EZK.40,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE twenty-fifth year of our captivity [by Babylon], in the beginning of the year, on the tenth day of the month, in the fourteenth year after the city [of Jerusalem] was taken, on the very same day the hand of the Lord was upon me and He brought me to that place.'
  '10':
  - type: text
    content: ' And the guardrooms '
  - type: text
    content: or
  - type: text
    content: ' lodges of the east gateway were three on this side and three on that side; the three were the same size, and the posts '
  - type: text
    content: or
  - type: text
    content: ' jambs were the same size on either side.'
  '11':
  - type: text
    content: ' And he measured the breadth of the opening of the gateway, ten cubits, and the length of the gateway, thirteen cubits.'
  '12':
  - type: text
    content: ' And a border '
  - type: text
    content: or
  - type: text
    content: ' barrier before the guardrooms was one cubit on this side, and a border '
  - type: text
    content: or
  - type: text
    content: ' barrier, one cubit on that side. And the guardrooms '
  - type: text
    content: or
  - type: text
    content: ' lodges were six cubits on this side and six cubits on that side.'
  '13':
  - type: text
    content: ' And '
  - type: text
    content: the man
  - type: text
    content: ' [an angel] measured the gate from the outer wall of one chamber '
  - type: text
    content: or
  - type: text
    content: ' guardroom to the outer wall of another–a breadth of twenty-five cubits from door to door.'
  '14':
  - type: text
    content: ' And the open part of the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule of the gateway on the outside was twenty cubits, the chambers '
  - type: text
    content: or
  - type: text
    content: ' guardrooms of the gate being round about.'
  '15':
  - type: text
    content: ' And including this porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule of the gate on the outside and the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule on the inside, the extent was fifty cubits.'
  '16':
  - type: text
    content: ' And there were closed windows to the guardrooms '
  - type: text
    content: or
  - type: text
    content: ' chambers and to their posts '
  - type: text
    content: or
  - type: text
    content: ' pillars within the gate round about, and likewise to the archway '
  - type: text
    content: or
  - type: text
    content: ' vestibule; and windows were round about facing into the court, and upon each post '
  - type: text
    content: or
  - type: text
    content: ' pillar were palm tree [decorations].'
  '17':
  - type: text
    content: ' Then he brought me into the outward court, and behold, there were chambers and a pavement round about the court; thirty chambers fronted on the pavement.'
  '18':
  - type: text
    content: ' And the pavement was along by the side of the gates, answerable to the length of the gateways; this was the lower pavement.'
  '19':
  - type: text
    content: ' Then '
  - type: text
    content: the man
  - type: text
    content: ' measured the distance from the inner front before the lower gate to the outer front of the inner court, a hundred cubits, both on the east and on the north.'
  '2':
  - type: text
    content: ' In the visions of God He brought me into the land of Israel and set me down upon a very high mountain, on the south side of which there was what seemed to be the structure of a city.'
  '20':
  - type: text
    content: ' And the gate of the outward court which faced the north, of it he measured both the length and the breadth.'
  '21':
  - type: text
    content: ' And its guardrooms '
  - type: text
    content: or
  - type: text
    content: ' lodges, three on this side and three on that side, and its posts '
  - type: text
    content: or
  - type: text
    content: ' pillars and archway '
  - type: text
    content: or
  - type: text
    content: ' vestibule were the same size as those of the first gate; the length was fifty cubits and the breadth twenty-five cubits.'
  '22':
  - type: text
    content: ' And its windows and its archway '
  - type: text
    content: or
  - type: text
    content: ' vestibule and its palm trees were of the same size as those of the gate that faces toward the east. It was reached by going up seven steps, and the archway of its vestibule was on the inner side.'
  '23':
  - type: text
    content: ' Opposite the gate on the north and on the east was a gate to the inner court, and he [the man with the measuring rod of reed] measured from gate to gate, a hundred cubits.'
  '24':
  - type: text
    content: ' After that '
  - type: text
    content: the man
  - type: text
    content: ' brought me toward the south, and behold, there was a gate on the south, and he measured its posts '
  - type: text
    content: or
  - type: text
    content: ' pillars and its archway '
  - type: text
    content: or
  - type: text
    content: ' vestibule; they measured as the others did.'
  '25':
  - type: text
    content: ' And there were windows round about in it and in its archway '
  - type: text
    content: or
  - type: text
    content: ' vestibule, like those windows in the other gateways; its length was fifty cubits and its breadth twenty-five cubits.'
  '26':
  - type: text
    content: ' And there were seven steps going up to the gate, and its archway '
  - type: text
    content: or
  - type: text
    content: ' vestibule was on the inside. And it had palm trees, one on this side and another on that side, carved on its posts '
  - type: text
    content: or
  - type: text
    content: ' pillars.'
  '27':
  - type: text
    content: ' And there was a gate to the inner court on the south, and he measured from gate to gate toward the south, a hundred cubits.'
  '28':
  - type: text
    content: ' And '
  - type: text
    content: the man
  - type: text
    content: ' [an angel] brought me into the inner court by the south gate, and he measured the south gate; its measurements were the same as those of the other gateways.'
  '29':
  - type: text
    content: ' And its guardrooms '
  - type: text
    content: or
  - type: text
    content: ' chambers and its posts '
  - type: text
    content: or
  - type: text
    content: ' pillars and its archway '
  - type: text
    content: or
  - type: text
    content: ' vestibule measured as did the others. And there were windows in the gateway and in its archway '
  - type: text
    content: or
  - type: text
    content: ' vestibule round about; its length was fifty cubits and its breadth twenty-five cubits.'
  '3':
  - type: text
    content: ' He brought me there, and behold, there was a man [an angel] whose appearance was like bronze, with a line of flax and a measuring reed in his hand, and he stood in the gateway.'
  '30':
  - type: text
    content: ' And there was an archway '
  - type: text
    content: or
  - type: text
    content: ' a vestibule round about, twenty-five cubits long and five cubits wide.'
  '31':
  - type: text
    content: ' And its [arched] vestibule faced the outer court; and palm trees were carved upon its posts '
  - type: text
    content: or
  - type: text
    content: ' pillars, and the steps going up to it were eight.'
  '32':
  - type: text
    content: ' And he brought me into the inner court toward the east and he measured the gate; it measured the same as the others.'
  '33':
  - type: text
    content: ' And its guardrooms '
  - type: text
    content: or
  - type: text
    content: ' chambers and its posts '
  - type: text
    content: or
  - type: text
    content: ' pillars and its archway '
  - type: text
    content: or
  - type: text
    content: ' vestibule measured as did the others. And there were windows in it and in its [arched] vestibule round about; the gateway was fifty cubits long and twenty-five cubits wide.'
  '34':
  - type: text
    content: ' And its [arched] vestibule faced the outer court; and palm trees were carved upon its posts '
  - type: text
    content: or
  - type: text
    content: ' pillars on either side, and the steps leading to it were eight.'
  '35':
  - type: text
    content: ' And '
  - type: text
    content: the man
  - type: text
    content: ' [an angel] brought me to the north gate and measured it; the measurements were the same as those of the other gates.'
  '36':
  - type: text
    content: ' Its guardrooms '
  - type: text
    content: or
  - type: text
    content: ' chambers, its posts '
  - type: text
    content: or
  - type: text
    content: ' pillars, its [arched] vestibule, and the windows to it round about [were of the same size as the others]. The length of the gateway was fifty cubits and the width was twenty-five cubits.'
  '37':
  - type: text
    content: ' And its posts '
  - type: text
    content: or
  - type: text
    content: ' pillars were toward the outer court, and palm trees were carved upon them on either side. And the approach to it had eight steps.'
  '38':
  - type: text
    content: ' There was an attached chamber with its door beside the posts '
  - type: text
    content: or
  - type: text
    content: ' pillars of the gates where the burnt offering was to be washed.'
  '39':
  - type: text
    content: ' And in the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule of the gate were two tables on this side and two tables on that side, on which to slay the burnt offering and the sin offering and the trespass '
  - type: text
    content: or
  - type: text
    content: ' guilt offering.'
  '4':
  - type: text
    content: ' And the man said to me, Son of man, look with your eyes and hear with your ears and set your heart '
  - type: text
    content: and
  - type: text
    content: ' mind on all that I will show you, for you are brought here that I may show them to you. Declare all that you see to the house of Israel.'
  '40':
  - type: text
    content: ' And on the one side without, as one goes up to the entrance of the gate to the north, were two tables; and on the other side at the vestibule of the gate were two tables.'
  '41':
  - type: text
    content: ' Four tables were on the inside and four tables on the outside of the side of the gate, eight tables upon which the sacrifices were to be slain.'
  '42':
  - type: text
    content: ' Moreover, there were four tables of hewn stone for the burnt offering, a cubit and a half long, a cubit and a half broad, and one cubit high. Upon them were to be laid the instruments with which were slain the burnt offering and the sacrifice.'
  '43':
  - type: text
    content: ' And slabs '
  - type: text
    content: or
  - type: text
    content: ' hooks a handbreadth long were fastened within [the room] round about. Upon the tables was to be placed the flesh of the offering.'
  '44':
  - type: text
    content: ' Then '
  - type: text
    content: the man
  - type: text
    content: ' [an angel] led me [from without] into the inner court, and behold, there were two chambers in the inner court: one beside the north gate but facing the south, and one beside the south gate but looking toward the north.'
  '45':
  - type: text
    content: ' And '
  - type: text
    content: the man
  - type: text
    content: ' [an angel who was guiding me] said, This chamber with its view to the south is for the priests who have charge of the house [of the Lord],'
  '46':
  - type: text
    content: ' And the chamber with its view to the north is for the priests who have charge of the altar. These are the sons of Zadok, who alone among the sons of Levi may come near to the Lord to minister to Him.'
  '47':
  - type: text
    content: ' And he measured the court, a hundred cubits long and a hundred cubits broad, foursquare; and the altar was in front of the house [of the Lord].'
  '48':
  - type: text
    content: ' Then he brought me to the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule of the temple proper, and he measured each post '
  - type: text
    content: or
  - type: text
    content: ' pillar of the porch, five cubits on either side. And the width of the gate was three cubits for this [leaf] and three cubits for that one.'
  '49':
  - type: text
    content: ' And the length of the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule was twenty cubits and the breadth eleven cubits; and he brought me by the steps by which it was reached, and there were two pillars standing on the posts [as bases] '
  - type: text
    content: or
  - type: text
    content: ' beside them, one on either side of the entrance.'
  '5':
  - type: text
    content: ' And behold, there was a wall all around the outside area of the house [of the Lord], and in the man''s hand a measuring reed six long cubits in length, each cubit being longer [than the usual one] by a handbreadth; so he measured the thickness of the wall, one reed, and the height, one reed.'
  '6':
  - type: text
    content: ' Then he came to the gate which faced the east and went up its [seven] steps and measured the threshold of the gateway, one reed broad, and the other threshold of the gateway [inside the thick wall], one reed broad.'
  '7':
  - type: text
    content: ' And every room for the guards was one reed long and one reed broad, and the space between the guardrooms '
  - type: text
    content: or
  - type: text
    content: ' lodges was five cubits. And the threshold of the gate by the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule of the gateway within was one reed.'
  '8':
  - type: text
    content: ' He measured also the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule of the gate toward the house [of the Lord], one reed.'
  '9':
  - type: text
    content: ' Then he measured the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule of the gateway, eight cubits, and its posts '
  - type: text
    content: or
  - type: text
    content: ' jambs, two cubits. And the porch '
  - type: text
    content: or
  - type: text
    content: ' vestibule of the gate was inside [toward the house of the Lord].'
