document_id: 1CO.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PAUL, SUMMONED by the will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose of God to be an apostle (special messenger) of Christ Jesus, and our brother Sosthenes,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' To the church (assembly) of God which is in Corinth, to those consecrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made holy in Christ Jesus, [who are] selected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' called to be saints (God''s people), together with all those who in any place call upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give honor to the name of our Lord Jesus Christ, both their Lord and ours:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Grace (favor and spiritual blessing) be to you and [heart] peace from God our Father and the Lord Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I thank my God at all times for you because of the grace (the favor and spiritual blessing) of God which was bestowed on you in Christ Jesus,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [So] that in Him in every respect you were enriched, in full power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' readiness of speech [to speak of your faith] and complete knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' illumination [to give you full insight into its meaning].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' In this way [our] witnessing concerning Christ (the Messiah) was so confirmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made sure in you'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' That you are not [consciously] falling behind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' lacking in any special spiritual endowment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Christian grace [the reception of which is due to the power of divine grace operating in your souls by the Holy Spirit], while you wait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watch [constantly living in hope] for the coming of our Lord Jesus Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [His] being made visible to all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And He will establish you to the end [keep you steadfast, give you strength, and guarantee your vindication; He will be your warrant against all accusation or indictment so that you will be] guiltless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' irreproachable in the day of our Lord Jesus Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' God is faithful (reliable, trustworthy, and therefore ever true to His promise, and He can be depended on); by Him you were called into companionship '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' participation with His Son, Jesus Christ our Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But I urge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entreat you, brethren, by the name of our Lord Jesus Christ, that all of you be in perfect harmony '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' full agreement in what you say, and that there be no dissensions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' factions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' divisions among you, but that you be perfectly united in your common understanding and in your opinions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judgments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For it has been made clear to me, my brethren, by those of Chloe''s household, that there are contentions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrangling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' factions among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' What I mean is this, that each one of you [either] says, I belong to Paul, or I belong to Apollos, or I belong to Cephas (Peter), or I belong to Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Is Christ (the Messiah) divided into parts? Was Paul crucified on behalf of you? Or were you baptized into the name of Paul?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I thank God that I did not baptize any of you except Crispus and Gaius,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Lest anyone should say that I baptized in my own name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [Yes] I did baptize the household of Stephanas also. More than these, I do not remember that I baptized anyone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For Christ (the Messiah) sent me out not to baptize but [to evangelize by] preaching the glad tidings (the Gospel), and that not with verbal eloquence, lest the cross of Christ should be deprived of force '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' emptied of its power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rendered vain (fruitless, void of value, and of no effect).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For the story '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' message of the cross is sheer absurdity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' folly to those who are perishing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on their way to perdition, but to us who are being saved it is the [manifestation of] the power of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For it is written, I will baffle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' render useless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroy the learning of the learned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the philosophy of the philosophers and the cleverness of the clever '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the discernment of the discerning; I will frustrate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' nullify [them] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring [them] to nothing. [Isa. 29:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Where is the wise man (the philosopher)? Where is the scribe (the scholar)? Where is the investigator (the logician, the debater) of this present time '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' age? Has not God shown up the nonsense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the folly of this world''s wisdom?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For when the world with all its earthly wisdom failed to perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know God by means of its own philosophy, God in His wisdom was pleased through the foolishness of preaching [salvation, procured by Christ and to be had through Him], to save those who believed (who clung to and trusted in and relied on Him).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For while Jews [demandingly] ask for signs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miracles and Greeks pursue philosophy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wisdom,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' We preach Christ (the Messiah) crucified, [preaching which] to the Jews is a scandal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an offensive stumbling block [that springs a snare or trap], and to the Gentiles it is absurd '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' utterly unphilosophical nonsense.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But to those who are called, whether Jew or Greek (Gentile), Christ [is] the Power of God and the Wisdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' [This is] because the foolish thing [that has its source in] God is wiser than men, and the weak thing [that springs] from God is stronger than men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For [simply] consider your own call, brethren; not many [of you were considered to be] wise according to human estimates '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' standards, not many influential '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerful, not many of high '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' noble birth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' [No] for God selected (deliberately chose) what in the world is foolish to put the wise to shame, and what the world calls weak to put the strong to shame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And God also selected (deliberately chose) what in the world is lowborn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insignificant and branded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treated with contempt, even the things that are nothing, that He might depose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring to nothing the things that are,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' So that no mortal man should [have pretense for glorying and] boast in the presence of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' But it is from Him that you have your life in Christ Jesus, Whom God made our Wisdom from God, [revealed to us a knowledge of the divine plan of salvation previously hidden, manifesting itself as] our Righteousness [thus making us upright and putting us in right standing with God], and our Consecration [making us pure and holy], and our Redemption [providing our ransom from eternal penalty for sin].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' So then, as it is written, Let him who boasts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proudly rejoices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glories, boast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proudly rejoice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory in the Lord. [Jer. 9:24.]'
