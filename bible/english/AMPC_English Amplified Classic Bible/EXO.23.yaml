document_id: EXO.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' YOU SHALL not repeat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' raise a false report; you shall not join with the wicked to be an unrighteous witness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You shall not follow a crowd to do evil; nor shall you bear witness at a trial so as to side with a multitude to pervert justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Neither shall you be partial to a poor man in his trial [just because he is poor].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' If you meet your enemy''s ox or his donkey going astray, you shall surely bring it back to him again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' If you see the donkey of one who hates you lying [helpless] under his load, you shall refrain from leaving the man to cope with it alone; you shall help him to release the animal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You shall not pervert the justice due to your poor in his cause.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Keep far from a false matter and [be very careful] not to condemn to death the innocent and the righteous, for I will not justify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acquit the wicked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You shall take no bribe, for the bribe blinds those who have sight and perverts the testimony '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the cause of the righteous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Also you shall not oppress a temporary resident, for you know the heart of a stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sojourner, seeing you were strangers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sojourners in Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Six years you shall sow your land and reap its yield.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But the seventh year you shall release it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' let it rest and lie fallow, that the poor of your people may eat [what the land voluntarily yields], and what they leave the wild beasts shall eat. In like manner you shall deal with your vineyard and olive grove.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Six days you shall do your work, but the seventh day you shall rest and keep Sabbath, that your ox and your donkey may rest, and the son of your bondwoman, and the alien, may be refreshed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' In all I have said to you take heed; do not mention the name of other gods [either in blessing or cursing]; do not let such speech be heard from your mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Three times in the year you shall keep a feast to Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You shall keep the Feast of Unleavened Bread; seven days you shall eat unleavened bread as I commanded you, at the time appointed in the month of Abib, for in it you came out of Egypt. None shall appear before Me empty-handed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Also you shall keep the Feast of Harvest [Pentecost], [acknowledging] the firstfruits of your toil, of what you sow in the field. And [third] you shall keep the Feast of Ingathering [Booths or Tabernacles] at the end of the year, when you gather in the fruit of your labors from the field.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Three times in the year all your males shall appear before the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' You shall not offer the blood of My sacrifice with leavened bread [but keep it unmixed], neither shall the fat of My feast remain all night until morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The first of the firstfruits of your ground you shall bring into the house of the Lord your God. You shall not boil a kid in its mother''s milk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Behold, I send an Angel before you to keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guard you on the way and to bring you to the place I have prepared.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Give heed to Him, listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey His voice; be not rebellious before Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' provoke Him, for He will not pardon your transgression; for My Name is in Him. [Exod. 32:34; 33:14; Isa. 63:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But if you will indeed listen to and obey His voice and all that I speak, then I will be an enemy to your enemies and an adversary to your adversaries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' When My Angel goes before you and brings you to the Amorites, the Hittites, the Perizzites, the Canaanites, the Hivites, and the Jebusites, and I reject them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blot them out,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' You shall not bow down to their gods or serve them or do after their works; but you shall utterly overthrow them and break down their pillars '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' images.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' You shall serve the Lord your God; He shall bless your bread and water, and I will take sickness from your midst.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' None shall lose her young by miscarriage or be barren in your land; I will fulfill the number of your days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' I will send My terror before you and will throw into confusion all the people to whom you shall come, and I will make all your foes turn from you [in flight].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And I will send hornets before you which shall drive out the Hivite, Canaanite, and Hittite from before you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' I will not drive them out from before you in one year, lest the land become desolate [for lack of attention] and the wild beasts multiply against you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Little by little I will drive them out from before you, until you have increased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are numerous enough to take possession of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' I will set your borders from the Red Sea to the Sea of the Philistines, and from the wilderness to the river [Euphrates]; for I will deliver the inhabitants of the land into your hand and you shall drive them out before you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' You shall make no covenant with them or with their gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' They shall not dwell in your land, lest they make you sin against Me; for if you serve their gods, it will surely be a snare to you.'
