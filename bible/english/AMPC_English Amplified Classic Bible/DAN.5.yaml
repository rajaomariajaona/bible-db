document_id: DAN.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BELSHAZZAR THE king [descendant of Nebuchadnezzar] made a great feast for a thousand of his lords, and he drank his wine in the presence of the thousand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Belshazzar, while he was tasting the wine, commanded that the gold and silver vessels which his father Nebuchadnezzar had taken out of the temple [out of the sacred area–the Holy Place and the Holy of Holies] which was in Jerusalem be brought, that the king and his lords, his wives, and his concubines might drink from them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then they brought in the gold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' silver vessels which had been taken out of the temple, the house of God which was in Jerusalem; and the king and his lords, his wives, and his concubines drank from them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They drank wine and praised the gods of gold and silver, of bronze, iron, wood, and stone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Immediately '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suddenly there appeared the fingers of a man''s hand and wrote on the plaster of the wall opposite the candlestick [so exposed especially to the light] in the king''s palace, and the king saw the part of the hand that wrote.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then the color '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the [drunken] hilarious brightness of the king''s face was changed, and his [terrifying] thoughts troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alarmed him; the joints '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' muscles of his hips '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' back gave way and his knees smote together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The king cried aloud [mightily] to bring in the enchanters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' soothsayers, the Chaldeans [diviners], and the astrologers. The king said to the wise men of Babylon, Whoever will read this writing and show me the interpretation of it will be clothed with purple and have a chain of gold put about his neck and will be the third ruler in the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And all the king''s wise men came in, but they could not read the writing or make known to the king the interpretation of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then King Belshazzar was greatly perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alarmed and the color faded from his face, and his lords were puzzled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' astounded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Now the queen [mother], overhearing the exciting words of the king and his lords, came into the banquet house. The queen [mother] said, O king, live forever! Do not be alarmed at your thoughts or let your cheerful expression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the color of your face be changed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' There is a man in your kingdom in whom is the Spirit of the holy God [or gods], and in the days of your father light and understanding and wisdom like the wisdom of the gods were found in him; and King Nebuchadnezzar, your father–the king, I say, your father–appointed him master of the magicians, enchanters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' soothsayers, Chaldeans, and astrologers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Because an excellent spirit, knowledge, and understanding to interpret dreams, clarify riddles, and solve knotty problems were found in this same Daniel, whom the king named Belteshazzar. Now let Daniel be called, and he will show the interpretation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then Daniel was brought in before the king. And the king said to Daniel, Are you that Daniel of the children of the captivity of Judah, whom the king my father brought out of Judah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I have heard of you, that the Spirit of the holy God [or gods] is in you and that light and understanding and superior wisdom are found in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Now the wise men, the enchanters, have been brought in before me that they might read this writing and make known to me the interpretation of it, but they could not show the interpretation of the matter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But I have heard of you, that you can make interpretations and solve knotty problems. Now if you can read the writing and make known to me its interpretation, you shall be clothed with purple and have a chain of gold put around your neck and shall be the third ruler in the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Daniel answered before the king, Let your gifts be for yourself and give your rewards to another. However, I will read the writing to the king and make known to him the interpretation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' O king, the Most High God gave Nebuchadnezzar your father a kingdom and greatness and glory and majesty;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And because of the greatness that He gave him, all peoples, nations, and languages trembled and feared before him. Whom he would he slew, and whom he would he kept alive; whom he would he set up, and whom he would he put down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But when his heart was lifted up and his mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit were hardened so that he dealt proudly, he was deposed from his kingly throne and his glory was taken from him;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He was driven from among men, and his heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' mind was made like the beasts, and his dwelling was with the wild asses. He was fed with grass like oxen, and his body was wet with the dew of the heavens until he learned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knew that the Most High God rules in the kingdom of men and that He appoints '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sets over it whomever He will.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And you his son, O Belshazzar, have not humbled your heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mind, though you knew all this [knew it and were defiant].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And you have lifted yourself up against the Lord of heaven, and the vessels of His house have been brought before you, and you and your lords, your wives, and your concubines have drunk wine from them; and you have praised the gods of silver and gold, of bronze, iron, wood, and stone, which do not see or hear or know; but the God in Whose hand your breath is and Whose are all your ways you have not honored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorified [but have dishonored and disgraced].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then was the part of the hand sent from the presence of [the Most High God], and this writing was inscribed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And this is the inscription that was written, '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: mene, mene, tekel, upharsin
  - type: text
    text: –numbered, numbered, weighed, divisions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' This is the interpretation of the matter: '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: mene,
  - type: text
    text: ' God has numbered the days of your kingship and brought them to an end;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: tekel,
  - type: text
    text: ' You are weighed in the balances and are found wanting;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: peres,
  - type: text
    text: ' Your kingdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your kingship are divided and given to the Medes and Persians. [Foretold in Isa. 21:2, 5, 9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then Belshazzar commanded, and Daniel was clothed with purple and a chain of gold put about his neck, and a proclamation was made concerning him that he should be the third ruler in the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' During that night Belshazzar the king of the Chaldeans was slain,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And Darius the Mede took the kingdom; he was about sixty-two years old.'
