document_id: NUM.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ISRAEL SETTLED down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remained in Shittim, and the people began to play the harlot with the daughters of Moab,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Who invited the [Israelites] to the sacrifices of their gods, and [they] ate and bowed down to Moab''s gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So Israel joined himself to [the god] Baal of Peor. And the anger of the Lord was kindled against Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the Lord said to Moses, Take all the leaders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' chiefs of the people, and hang them before the Lord in the sun [after killing them], that the fierce anger of the Lord may turn away from Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Moses said to the judges of Israel, Each one of you slay his men who joined themselves to Baal of Peor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And behold, one of the Israelites came and brought to his brethren a Midianite woman in the sight of Moses and of all the congregation of Israel while they were weeping at the door of the Tent of Meeting [over the divine judgment and the punishment].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when Phinehas son of Eleazar, the son of Aaron the priest, saw it, he rose up from the midst of the congregation and took a spear in his hand'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And went after the man of Israel into the inner room and thrust both of them through, the man of Israel and the woman through her body. Then the [smiting] plague was stayed from the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Nevertheless those who died in the [smiting] plague were 24,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Phinehas son of Eleazar, the son of Aaron the priest, has turned my wrath away from the Israelites, in that he was jealous with My jealousy among them, so that I did not consume the Israelites in My jealousy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Therefore say, Behold, I give to Phinehas the priest My covenant of peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And he shall have it, and his descendants after him, the covenant of an everlasting priesthood, because he was jealous for his God and made atonement for the Israelites. [Ps. 106:28-31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Now the man of Israel who was slain with the Midianite woman was Zimri son of Salu, a head of a father''s house among the Simeonites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the Midianite woman who was slain was Cozbi daughter of Zur; he was head of a father''s house in Midian.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Provoke hostilities with the Midianites and attack them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For they harass you with their wiles with which they have beguiled you in the matter of Peor, and of Cozbi, the daughter of the prince of Midian, their sister, who was slain on the day of the plague in the matter of Peor.'
