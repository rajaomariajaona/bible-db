document_id: GEN.43
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT THE hunger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destitution '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' starvation were very severe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extremely distressing in the land [Canaan].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And when [the families of Jacob''s sons] had eaten up the grain which the men had brought from Egypt, their father said to them, Go again; buy us a little food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But Judah said to him, The man solemnly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sternly warned us, saying, You shall not see my face again unless your brother is with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' If you will send our brother with us, we will go down [to Egypt] and buy you food;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But if you will not send him, we will not go down; for the man said to us, You shall not see my face unless your brother is with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Israel said, Why did you do me such a wrong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer this evil to come upon me by telling the man that you had another brother?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And they said, The man asked us straightforward questions about ourselves and our relatives. He said, Is your father still alive? Have you another brother? And we answered him accordingly. How could we know that he would say, Bring your brother down here?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And Judah said to Israel his father, Send the lad with me and we will arise and go, that we may live and not die, both we and you and also our little ones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I will be security for him; you shall require him of me [personally]; if I do not bring him back to you and put him before you, then let me bear the blame forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For if we had not lingered like this, surely by now we would have returned the second time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And their father Israel said to them, If it must be so, now do this; take of the choicest products in the land in your sacks and carry down a present to the man, a little balm (balsam) and a little honey, aromatic spices and gum (of rock rose) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' ladanum, pistachio nuts, and almonds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And take double the [grain] money with you; and the money that was put back in the mouth of your sacks, carry it again with you; there is a possibility that [its being in your sacks] was an oversight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Take your brother and arise and return to the man;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' May God Almighty give you mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor before the man, that he may release to you your other brother and Benjamin. If I am bereaved [of my sons], I am bereaved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then the men took the present, and they took double the [grain] money with them, and Benjamin; and they arose and went down to Egypt and stood before Joseph.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And when Joseph saw Benjamin with them, he said to the steward of his house, Bring the men into the house and kill an animal and make ready, for the men will dine with me at noon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the man did as Joseph ordered and brought the men to Joseph''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The men were afraid because they were brought to Joseph''s house; and they said, We are brought in because of the money that was returned in our sacks the first time we came, so that he may find occasion to accuse and assail us, take us for slaves, and seize our donkeys.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So they came near to the steward of Joseph''s house and talked with him at the door of the house,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And said, O sir, we came down truly the first time to buy food;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And when we came to the inn, we opened our sacks and there was each man''s money, full weight, returned in the mouth of his sack. Now we have brought it back again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And we have brought down with us other money to buy food; we do not know who put our money in our sacks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But [the steward] said, Peace be to you, fear not; your God and the God of your father has given you treasure in your sacks. I received your money. And he brought Simeon out to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the man brought the men into Joseph''s house and gave them water, and they washed their feet; and he gave their donkeys provender.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And they made ready the present they had brought for Joseph before his coming at noon, for they heard that they were to dine there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And when Joseph came home, they brought into the house to him the present which they had with them, and bowed themselves to him to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' He asked them of their welfare and said, Is your old father well, of whom you spoke? Is he still alive?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And they answered, Your servant our father is in good health; he is still alive. And they bowed down their heads and made obeisance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And he looked up and saw his [full] brother Benjamin, his mother''s [only other] son, and said, Is this your youngest brother, of whom you spoke to me? And he said, God be gracious to you, my son!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Joseph hurried from the room, for his heart yearned for his brother, and he sought privacy to weep; so he entered his chamber and wept there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And he washed his face and went out, and, restraining himself, said, Let dinner be served.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And [the servants] set out [the food] for [Joseph] by himself, and for [his brothers] by themselves, and for those Egyptians who ate with him by themselves, according to the Egyptian custom not to eat food with the Hebrews; for that is an abomination to the Egyptians.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And [Joseph''s brothers] were given seats before him–the eldest according to his birthright and the youngest according to his youth; and the men looked at one another amazed [that so much was known about them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' [Joseph] took and sent helpings to them from before him, but Benjamin''s portion was five times as much as any of theirs. And they drank freely and were merry with him.'
