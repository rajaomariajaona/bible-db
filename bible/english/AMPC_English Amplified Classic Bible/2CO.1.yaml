  - type: text
    content: ' [For it is He] Who rescued '
  - type: text
    content: and
  - type: text
    content: ' saved us from such a perilous death, and He will still rescue '
  - type: text
    content: and
  - type: text
    content: ' save us; in '
  - type: text
    content: and
  - type: text
    content: ' on Him we have set our hope (our joyful and confident expectation) that He will again deliver us [from danger and destruction and draw us to Himself],'
  '11':
  - type: text
    content: ' While you also cooperate by your prayers for us [helping and laboring together with us]. Thus [the lips of] many persons [turned toward God will eventually] give thanks on our behalf for the grace (the blessing of deliverance) granted us at the request of the many who have prayed.'
  '12':
  - type: text
    content: ' It is a reason for pride '
  - type: text
