  '23':
  - type: text
    content: ' But I call upon God as my soul''s witness: it was to avoid hurting you that I refrained from coming to Corinth–'
  '24':
  - type: text
    content: ' Not that we have dominion [over you] '
  - type: text
    content: and
  - type: text
