  '3':
  - type: text
    content: ' Blessed be the God and Father of our Lord Jesus Christ, the Father of sympathy (pity and mercy) and the God [Who is the Source] of every comfort (consolation and encouragement),'
  '4':
  - type: text
    content: ' Who comforts (consoles and encourages) us in every trouble (calamity and affliction), so that we may also be able to comfort (console and encourage) those who are in any kind of trouble '
  - type: text
    content: or
  - type: text
    content: ' distress, with the comfort (consolation and encouragement) with which we ourselves are comforted (consoled and encouraged) by God.'
  '5':
  - type: text
    content: ' For just as Christ''s [own] sufferings fall to our lot [as they overflow upon His disciples, and we share and experience them] abundantly, so through Christ comfort (consolation and encouragement) is also [shared and experienced] abundantly by us.'
  '6':
  - type: text
    content: ' But if we are troubled (afflicted and distressed), it is for your comfort (consolation and encouragement) and [for your] salvation; and if we are comforted (consoled and encouraged), it is for your comfort (consolation and encouragement), which works [in you] when you patiently endure the same evils (misfortunes and calamities) that we also suffer '
  - type: text
    content: and
  - type: text
    content: ' undergo.'
  '7':
  - type: text
    content: ' And our hope for you [our joyful and confident expectation of good for you] is ever unwavering (assured and unshaken); for we know that just as you share '
  - type: text
    content: and
  - type: text
    content: ' are partners in [our] sufferings '
  - type: text
    content: and
  - type: text
    content: ' calamities, you also share '
  - type: text
    content: and
  - type: text
    content: ' are partners in [our] comfort (consolation and encouragement).'
  '8':
  - type: text
    content: ' For we do not want you to be uninformed, brethren, about the affliction '
  - type: text
    content: and
  - type: text
    content: ' oppressing distress which befell us in [the province of] Asia, how we were so utterly and unbearably weighed down '
  - type: text
    content: and
  - type: text
    content: ' crushed that we despaired even of life [itself].'
  '9':
  - type: text
    content: ' Indeed, we felt within ourselves that we had received the [very] sentence of death, but that was to keep us from trusting in '
  - type: text
    content: and
  - type: text
    content: ' depending on ourselves instead of on God Who raises the dead.'
