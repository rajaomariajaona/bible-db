document_id: 2CO.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PAUL, AN apostle (a special messenger) of Christ Jesus by the will of God, and Timothy [our] brother, to the church (assembly) of God which is at Corinth, and to all the saints (the people of God) throughout Achaia (most of Greece):'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Grace (favor and spiritual blessing) to you and [heart] peace from God our Father and the Lord Jesus Christ (the Messiah, the Anointed One).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Blessed be the God and Father of our Lord Jesus Christ, the Father of sympathy (pity and mercy) and the God [Who is the Source] of every comfort (consolation and encouragement),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Who comforts (consoles and encourages) us in every trouble (calamity and affliction), so that we may also be able to comfort (console and encourage) those who are in any kind of trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' distress, with the comfort (consolation and encouragement) with which we ourselves are comforted (consoled and encouraged) by God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For just as Christ''s [own] sufferings fall to our lot [as they overflow upon His disciples, and we share and experience them] abundantly, so through Christ comfort (consolation and encouragement) is also [shared and experienced] abundantly by us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But if we are troubled (afflicted and distressed), it is for your comfort (consolation and encouragement) and [for your] salvation; and if we are comforted (consoled and encouraged), it is for your comfort (consolation and encouragement), which works [in you] when you patiently endure the same evils (misfortunes and calamities) that we also suffer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' undergo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And our hope for you [our joyful and confident expectation of good for you] is ever unwavering (assured and unshaken); for we know that just as you share '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are partners in [our] sufferings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calamities, you also share '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are partners in [our] comfort (consolation and encouragement).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For we do not want you to be uninformed, brethren, about the affliction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressing distress which befell us in [the province of] Asia, how we were so utterly and unbearably weighed down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed that we despaired even of life [itself].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Indeed, we felt within ourselves that we had received the [very] sentence of death, but that was to keep us from trusting in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depending on ourselves instead of on God Who raises the dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' [For it is He] Who rescued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' saved us from such a perilous death, and He will still rescue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' save us; in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on Him we have set our hope (our joyful and confident expectation) that He will again deliver us [from danger and destruction and draw us to Himself],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' While you also cooperate by your prayers for us [helping and laboring together with us]. Thus [the lips of] many persons [turned toward God will eventually] give thanks on our behalf for the grace (the blessing of deliverance) granted us at the request of the many who have prayed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' It is a reason for pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exultation to which our conscience testifies that we have conducted ourselves in the world [generally] and especially toward you, with devout '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pure motives and godly sincerity, not in fleshly wisdom but by the grace of God (the unmerited favor and merciful kindness by which God, exerting His holy influence upon souls, turns them to Christ, and keeps, strengthens, and increases them in Christian virtues).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For we write you nothing else but simply what you can read and understand [there is no double meaning to what we say], and I hope that you will become thoroughly acquainted [with divine things] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand [them] accurately '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' well to the end,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' [Just] as you have [already] partially known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledged us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognized that you can [honestly] be proud of us, even as we [can be proud] of you on the day of our Lord Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' It was with assurance of this that I wanted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' planned to visit you first [of all], so that you might have a double favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' token of grace (goodwill).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [I wanted] to visit you on my way to Macedonia, and [then] to come again to you [on my return trip] from Macedonia and have you send me forward on my way to Judea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Now because I changed my original plan, was I being unstable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' capricious? Or what I plan, do I plan according to the flesh [like a worldly man], ready to say Yes, yes, [when it may mean] No, no?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' As surely as God is trustworthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' means what He says, our speech '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' message to you have not been Yes [that might mean] No.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For the Son of God, Christ Jesus (the Messiah), Who has been preached among you by us, by myself, Silvanus, and Timothy, was not Yes and No; but in Him it is [always the divine] Yes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For as many as are the promises of God, they all find their Yes [answer] in Him [Christ]. For this reason we also utter the Amen (so be it) to God through Him [in His Person and by His agency] to the glory of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But it is God Who confirms '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' makes us steadfast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establishes us [in joint fellowship] with you in Christ, and has consecrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anointed us [enduing us with the gifts of the Holy Spirit];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' [He has also appropriated and acknowledged us as His by] putting His seal upon us and giving us His [Holy] Spirit in our hearts as the security deposit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guarantee [of the fulfillment of His promise].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But I call upon God as my soul''s witness: it was to avoid hurting you that I refrained from coming to Corinth–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Not that we have dominion [over you] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lord it over your faith, but [rather that we work with you as] fellow laborers [to promote] your joy, for in [your] faith (in your strong and welcome conviction or belief that Jesus is the Messiah, through Whom we obtain eternal salvation in the kingdom of God) you stand firm.'
