  - type: text
    content: and
  - type: text
    content: ' pure motives and godly sincerity, not in fleshly wisdom but by the grace of God (the unmerited favor and merciful kindness by which God, exerting His holy influence upon souls, turns them to Christ, and keeps, strengthens, and increases them in Christian virtues).'
  '13':
  - type: text
    content: ' For we write you nothing else but simply what you can read and understand [there is no double meaning to what we say], and I hope that you will become thoroughly acquainted [with divine things] '
  - type: text
    content: and
  - type: text
    content: ' know '
  - type: text
    content: and
  - type: text
    content: ' understand [them] accurately '
  - type: text
    content: and
  - type: text
    content: ' well to the end,'
  '14':
  - type: text
    content: ' [Just] as you have [already] partially known '
  - type: text
    content: and
  - type: text
    content: ' understood '
  - type: text
    content: and
  - type: text
    content: ' acknowledged us '
  - type: text
    content: and
  - type: text
    content: ' recognized that you can [honestly] be proud of us, even as we [can be proud] of you on the day of our Lord Jesus.'
  '15':
  - type: text
    content: ' It was with assurance of this that I wanted '
  - type: text
    content: and
  - type: text
