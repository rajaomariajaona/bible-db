  '1':
  - type: text
    content: ' PAUL, AN apostle (a special messenger) of Christ Jesus by the will of God, and Timothy [our] brother, to the church (assembly) of God which is at Corinth, and to all the saints (the people of God) throughout Achaia (most of Greece):'
