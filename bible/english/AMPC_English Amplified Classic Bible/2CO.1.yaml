  - type: text
    content: and
  - type: text
    content: ' token of grace (goodwill).'
  '16':
  - type: text
    content: ' [I wanted] to visit you on my way to Macedonia, and [then] to come again to you [on my return trip] from Macedonia and have you send me forward on my way to Judea.'
  '17':
  - type: text
    content: ' Now because I changed my original plan, was I being unstable '
  - type: text
    content: and
  - type: text
    content: ' capricious? Or what I plan, do I plan according to the flesh [like a worldly man], ready to say Yes, yes, [when it may mean] No, no?'
  '18':
  - type: text
    content: ' As surely as God is trustworthy '
  - type: text
    content: and
  - type: text
    content: ' faithful '
  - type: text
    content: and
  - type: text
    content: ' means what He says, our speech '
  - type: text
    content: and
  - type: text
    content: ' message to you have not been Yes [that might mean] No.'
  '19':
  - type: text
    content: ' For the Son of God, Christ Jesus (the Messiah), Who has been preached among you by us, by myself, Silvanus, and Timothy, was not Yes and No; but in Him it is [always the divine] Yes.'
  '2':
  - type: text
    content: ' Grace (favor and spiritual blessing) to you and [heart] peace from God our Father and the Lord Jesus Christ (the Messiah, the Anointed One).'
  '20':
  - type: text
    content: ' For as many as are the promises of God, they all find their Yes [answer] in Him [Christ]. For this reason we also utter the Amen (so be it) to God through Him [in His Person and by His agency] to the glory of God.'
  '21':
  - type: text
    content: ' But it is God Who confirms '
  - type: text
    content: and
  - type: text
    content: ' makes us steadfast '
  - type: text
    content: and
  - type: text
    content: ' establishes us [in joint fellowship] with you in Christ, and has consecrated '
  - type: text
    content: and
  - type: text
    content: ' anointed us [enduing us with the gifts of the Holy Spirit];'
  '22':
