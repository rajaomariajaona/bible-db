document_id: PSA.112
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PRAISE THE Lord! (Hallelujah!) Blessed (happy, fortunate, to be envied) is the man who fears (reveres and worships) the Lord, who delights greatly in His commandments. [Deut. 10:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' His [spiritual] offspring shall be mighty upon earth; the generation of the upright shall be blessed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Prosperity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welfare are in his house, and his righteousness endures forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Light arises in the darkness for the upright, gracious, compassionate, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' just [who are in right standing with God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' It is well with the man who deals generously and lends, who conducts his affairs with justice. [Ps. 37:26; Luke 6:35; Col. 4:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He will not be moved forever; the [uncompromisingly] righteous (the upright, in right standing with God) shall be in everlasting remembrance. [Prov. 10:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He shall not be afraid of evil tidings; his heart is firmly fixed, trusting (leaning on and being confident) in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' His heart is established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steady, he will not be afraid while he waits to see his desire established upon his adversaries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He has distributed freely [he has given to the poor and needy]; his righteousness (uprightness and right standing with God) endures forever; his horn shall be exalted in honor. [II Cor. 9:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The wicked man will see it and be grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' angered, he will gnash his teeth and disappear [in despair]; the desire of the wicked shall perish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come to nothing.'
