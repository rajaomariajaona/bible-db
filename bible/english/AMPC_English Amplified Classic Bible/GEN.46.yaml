document_id: GEN.46,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO ISRAEL made his journey with all that he had and came to Beersheba [a place hallowed by sacred memories] and offered sacrifices to the God of his father Isaac. [Gen. 21:33; 26:23-25.]'
  '10':
  - type: text
    content: ' The sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul the son of a Canaanite woman.'
  '11':
  - type: text
    content: ' The sons of Levi: Gershon, Kohath, and Merari.'
  '12':
  - type: text
    content: ' The sons of Judah: Er, Onan, Shelah, Perez, and Zerah; but Er and Onan died in the land of Canaan. And the sons of Perez were Hezron and Hamul.'
  '13':
  - type: text
    content: ' The sons of Issachar: Tola, Puvah, Iob, and Shimron.'
  '14':
  - type: text
    content: ' The sons of Zebulun: Sered, Elon, and Jahleel.'
  '15':
  - type: text
    content: ' These are the sons of Leah, whom she bore to Jacob in Padan-aram, together with his daughter Dinah. All of his sons and his daughters numbered thirty-three.'
  '16':
  - type: text
    content: ' The sons of Gad: Ziphion, Haggi, Shuni, Ezbon, Eri, Arodi, and Areli.'
  '17':
  - type: text
    content: ' The sons of Asher: Imnah, Ishvah, Ishvi, Beriah, and Serah their sister. And the sons of Beriah: Heber and Malchiel.'
  '18':
  - type: text
    content: ' These are the sons of Zilpah, [the maid] whom Laban gave to Leah his daughter. And these she bore to Jacob–sixteen persons all told.'
  '19':
  - type: text
    content: ' The sons of Rachel, Jacob''s wife: Joseph and Benjamin.'
  '2':
  - type: text
    content: ' And God spoke to Israel in visions of the night, and said, Jacob! Jacob! And he said, Here am I.'
  '20':
  - type: text
    content: ' And to Joseph in the land of Egypt were born Manasseh and Ephraim, whom Asenath daughter of Potiphera, priest of On, bore to him.'
  '21':
  - type: text
    content: ' And the sons of Benjamin: Bela, Becher, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim, and Ard.'
  '22':
  - type: text
    content: ' These are the sons of Rachel, who were born to Jacob–fourteen persons in all.'
  '23':
  - type: text
    content: ' The son of Dan: Hushim.'
  '24':
  - type: text
    content: ' The sons of Naphtali: Jahzeel, Guni, Jezer, and Shillem.'
  '25':
  - type: text
    content: ' These are the sons of Bilhah, [the maid] whom Laban gave to Rachel his daughter. And she bore these to Jacob–seven persons in all.'
  '26':
  - type: text
    content: ' All the persons who came with Jacob into Egypt–who were his own offspring, not counting the wives of Jacob''s sons–were sixty-six persons all told.'
  '27':
  - type: text
    content: ' And the sons of Joseph, who were born to him in Egypt, were two persons. All the persons of the house of Jacob [including Joseph and Jacob himself], who came into Egypt, were seventy.'
  '28':
  - type: text
    content: ' And he sent Judah before him to Joseph, to direct him to Goshen '
  - type: text
    content: and
  - type: text
    content: ' meet him there; and they came into the land of Goshen.'
  '29':
  - type: text
    content: ' Then Joseph made ready his chariot and went up to meet Israel his father in Goshen; and he presented himself '
  - type: text
    content: and
  - type: text
    content: ' gave distinct evidence of himself to him [that he was Joseph], and [each] fell on the [other''s] neck and wept on his neck a good while.'
  '3':
  - type: text
    content: ' And He said, I am God, the God of your father; do not be afraid to go down to Egypt, for I will there make of you a great nation.'
  '30':
  - type: text
    content: ' And Israel said to Joseph, Now let me die, since I have seen your face [and know] that you are still alive.'
  '31':
  - type: text
    content: ' Joseph said to his brothers and to his father''s household, I will go up and tell Pharaoh and say to him, My brothers and my father''s household, who were in the land of Canaan, have come to me.'
  '32':
  - type: text
    content: ' And the men are shepherds, for their occupation has been keeping livestock, and they have brought their flocks and their herds and all that they have.'
  '33':
  - type: text
    content: ' When Pharaoh calls you and says, What is your occupation?'
  '34':
  - type: text
    content: ' You shall say, Your servants'' occupation has been as keepers of livestock from our youth until now, both we and our fathers before us–in order that you may live in the land of Goshen, for every shepherd is an abomination to the Egyptians.'
  '4':
  - type: text
    content: ' I will go down with you to Egypt, and I will also surely bring you [your people Israel] up again; and Joseph will put his hand upon your eyes [when they are about to close in death].'
  '5':
  - type: text
    content: ' So Jacob arose '
  - type: text
    content: and
  - type: text
    content: ' set out from Beersheba, and Israel''s sons conveyed their father, their little ones, and their wives in the wagons that Pharaoh had sent to carry him.'
  '6':
  - type: text
    content: ' And they took their cattle and the gains which they had acquired in the land of Canaan and came into Egypt, Jacob and all his offspring with him:'
  '7':
  - type: text
    content: ' His sons and his sons'' sons with him, his daughters and his sons'' daughters–all his offspring he brought with him into Egypt.'
  '8':
  - type: text
    content: ' And these are the names of the descendants of Israel who came into Egypt, Jacob and his sons: Reuben, Jacob''s firstborn.'
  '9':
  - type: text
    content: ' And the sons of Reuben: Hanoch, Pallu, Hezron, and Carmi.'
