document_id: COL.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR I want you to know how great is my solicitude for you [how severe an inward struggle I am engaged in for you] and for those [believers] at Laodicea, and for all who [like yourselves] have never seen my face '
  - type: text
    content: and
  - type: text
    content: ' known me personally.'
  '10':
  - type: text
    content: ' And you are in Him, made full '
  - type: text
    content: and
  - type: text
    content: ' having come to fullness of life [in Christ you too are filled with the Godhead–Father, Son and Holy Spirit–and reach full spiritual stature]. And He is the Head of all rule and authority [of every angelic principality and power].'
  '11':
  - type: text
    content: ' In Him also you were circumcised with a circumcision not made with hands, but in a [spiritual] circumcision [performed by] Christ by stripping off the body of the flesh (the whole corrupt, carnal nature with its passions and lusts).'
  '12':
  - type: text
    content: ' [Thus you were circumcised when] you were buried with Him in [your] baptism, in which you were also raised with Him [to a new life] through [your] faith in the working of God [as displayed] when He raised Him up from the dead.'
  '13':
  - type: text
    content: ' And you who were dead in trespasses and in the uncircumcision of your flesh (your sensuality, your sinful carnal nature), [God] brought to life together with [Christ], having [freely] forgiven us all our transgressions,'
  '14':
  - type: text
    content: ' Having cancelled '
  - type: text
    content: and
  - type: text
    content: ' blotted out '
  - type: text
    content: and
  - type: text
    content: ' wiped away the handwriting of the note (bond) with its legal decrees '
  - type: text
    content: and
  - type: text
    content: ' demands which was in force '
  - type: text
    content: and
  - type: text
    content: ' stood against us (hostile to us). This [note with its regulations, decrees, and demands] He set aside '
  - type: text
    content: and
  - type: text
    content: ' cleared completely out of our way by nailing it to [His] cross.'
  '15':
  - type: text
    content: ' [God] disarmed the principalities and powers that were ranged against us and made a bold display '
  - type: text
    content: and
  - type: text
    content: ' public example of them, in triumphing over them in Him '
  - type: text
    content: and
  - type: text
    content: ' in it [the cross].'
  '16':
  - type: text
    content: ' Therefore let no one sit in judgment on you in matters of food and drink, or with regard to a feast day or a New Moon or a Sabbath.'
  '17':
  - type: text
    content: ' Such [things] are only the shadow of things that are to come, '
  - type: text
    content: and
  - type: text
    content: ' they have only a symbolic value. But the reality (the substance, the solid fact of what is foreshadowed, the body of it) belongs to Christ.'
  '18':
  - type: text
    content: ' Let no one defraud you by acting as an umpire '
  - type: text
    content: and
  - type: text
    content: ' declaring you unworthy '
  - type: text
    content: and
  - type: text
    content: ' disqualifying you for the prize, insisting on self-abasement and worship of angels, taking his stand on visions [he claims] he has seen, vainly puffed up by his sensuous notions '
  - type: text
    content: and
  - type: text
    content: ' inflated by his unspiritual thoughts '
  - type: text
    content: and
  - type: text
    content: ' fleshly conceit,'
  '19':
  - type: text
    content: ' And not holding fast to the Head, from Whom the entire body, supplied and knit together by means of its joints and ligaments, grows with a growth that is from God.'
  '2':
  - type: text
    content: ' [For my concern is] that their hearts may be braced (comforted, cheered, and encouraged) as they are knit together in love, that they may come to have all the abounding wealth '
  - type: text
    content: and
  - type: text
    content: ' blessings of assured conviction of understanding, and that they may become progressively more intimately acquainted with '
  - type: text
    content: and
  - type: text
    content: ' may know more definitely '
  - type: text
    content: and
  - type: text
    content: ' accurately '
  - type: text
    content: and
  - type: text
    content: ' thoroughly that mystic secret of God, [which is] Christ (the Anointed One).'
  '20':
  - type: text
    content: ' If then you have died with Christ to material ways of looking at things '
  - type: text
    content: and
  - type: text
    content: ' have escaped from the world''s crude '
  - type: text
    content: and
  - type: text
    content: ' elemental notions '
  - type: text
    content: and
  - type: text
    content: ' teachings of externalism, why do you live as if you still belong to the world? [Why do you submit to rules '
  - type: text
    content: and
  - type: text
    content: ' regulations?–such as]'
  '21':
  - type: text
    content: ' Do not handle [this], Do not taste [that], Do not even touch [them],'
  '22':
  - type: text
    content: ' Referring to things all of which perish with being used. To do this is to follow human precepts and doctrines. [Isa. 29:13.]'
  '23':
  - type: text
    content: ' Such [practices] have indeed the outward appearance [that popularly passes] for wisdom, in promoting self-imposed rigor of devotion '
  - type: text
    content: and
  - type: text
    content: ' delight in self-humiliation '
  - type: text
    content: and
  - type: text
    content: ' severity of discipline of the body, but they are of no value in checking the indulgence of the flesh (the lower nature). [Instead, they do not honor God but serve only to indulge the flesh.]'
  '3':
  - type: text
    content: ' In Him all the treasures of [divine] wisdom (comprehensive insight into the ways and purposes of God) and [all the riches of spiritual] knowledge '
  - type: text
    content: and
  - type: text
    content: ' enlightenment are stored up '
  - type: text
    content: and
  - type: text
    content: ' lie hidden.'
  '4':
  - type: text
    content: ' I say this in order that no one may mislead '
  - type: text
    content: and
  - type: text
    content: ' delude you by plausible '
  - type: text
    content: and
  - type: text
    content: ' persuasive '
  - type: text
    content: and
  - type: text
    content: ' attractive arguments '
  - type: text
    content: and
  - type: text
    content: ' beguiling speech.'
  '5':
  - type: text
    content: ' For though I am away from you in body, yet I am with you in spirit, delighted at the sight of your [standing shoulder to shoulder in such] orderly array and the firmness '
  - type: text
    content: and
  - type: text
    content: ' the solid front '
  - type: text
    content: and
  - type: text
    content: ' steadfastness of your faith in Christ [that leaning of the entire human personality on Him in absolute trust and confidence in His power, wisdom, and goodness].'
  '6':
  - type: text
    content: ' As you have therefore received Christ, [even] Jesus the Lord, [so] walk (regulate your lives and conduct yourselves) in union with '
  - type: text
    content: and
  - type: text
    content: ' conformity to Him.'
  '7':
  - type: text
    content: ' Have the roots [of your being] firmly '
  - type: text
    content: and
  - type: text
    content: ' deeply planted [in Him, fixed and founded in Him], being continually built up in Him, becoming increasingly more confirmed '
  - type: text
    content: and
  - type: text
    content: ' established in the faith, just as you were taught, and abounding '
  - type: text
    content: and
  - type: text
    content: ' overflowing in it with thanksgiving.'
  '8':
  - type: text
    content: ' See to it that no one carries you off as spoil '
  - type: text
    content: or
  - type: text
    content: ' makes you yourselves captive by his so-called philosophy '
  - type: text
    content: and
  - type: text
    content: ' intellectualism and vain deceit (idle fancies and plain nonsense), following human tradition (men''s ideas of the material rather than the spiritual world), just crude notions following the rudimentary '
  - type: text
    content: and
  - type: text
    content: ' elemental teachings of the universe and disregarding [the teachings of] Christ (the Messiah).'
  '9':
  - type: text
    content: ' For in Him the whole fullness of Deity (the Godhead) continues to dwell in bodily form [giving complete expression of the divine nature].'
