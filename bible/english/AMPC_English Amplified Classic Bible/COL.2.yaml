document_id: COL.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' FOR I want you to know how great is my solicitude for you [how severe an inward struggle I am engaged in for you] and for those [believers] at Laodicea, and for all who [like yourselves] have never seen my face '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' known me personally.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you are in Him, made full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' having come to fullness of life [in Christ you too are filled with the Godhead–Father, Son and Holy Spirit–and reach full spiritual stature]. And He is the Head of all rule and authority [of every angelic principality and power].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In Him also you were circumcised with a circumcision not made with hands, but in a [spiritual] circumcision [performed by] Christ by stripping off the body of the flesh (the whole corrupt, carnal nature with its passions and lusts).'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Thus you were circumcised when] you were buried with Him in [your] baptism, in which you were also raised with Him [to a new life] through [your] faith in the working of God [as displayed] when He raised Him up from the dead.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you who were dead in trespasses and in the uncircumcision of your flesh (your sensuality, your sinful carnal nature), [God] brought to life together with [Christ], having [freely] forgiven us all our transgressions,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Having cancelled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blotted out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wiped away the handwriting of the note (bond) with its legal decrees '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' demands which was in force '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stood against us (hostile to us). This [note with its regulations, decrees, and demands] He set aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cleared completely out of our way by nailing it to [His] cross.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [God] disarmed the principalities and powers that were ranged against us and made a bold display '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' public example of them, in triumphing over them in Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in it [the cross].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore let no one sit in judgment on you in matters of food and drink, or with regard to a feast day or a New Moon or a Sabbath.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Such [things] are only the shadow of things that are to come, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' they have only a symbolic value. But the reality (the substance, the solid fact of what is foreshadowed, the body of it) belongs to Christ.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let no one defraud you by acting as an umpire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' declaring you unworthy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disqualifying you for the prize, insisting on self-abasement and worship of angels, taking his stand on visions [he claims] he has seen, vainly puffed up by his sensuous notions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inflated by his unspiritual thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fleshly conceit,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And not holding fast to the Head, from Whom the entire body, supplied and knit together by means of its joints and ligaments, grows with a growth that is from God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [For my concern is] that their hearts may be braced (comforted, cheered, and encouraged) as they are knit together in love, that they may come to have all the abounding wealth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessings of assured conviction of understanding, and that they may become progressively more intimately acquainted with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' may know more definitely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accurately '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoroughly that mystic secret of God, [which is] Christ (the Anointed One).'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If then you have died with Christ to material ways of looking at things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have escaped from the world''s crude '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' elemental notions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' teachings of externalism, why do you live as if you still belong to the world? [Why do you submit to rules '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' regulations?–such as]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do not handle [this], Do not taste [that], Do not even touch [them],'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Referring to things all of which perish with being used. To do this is to follow human precepts and doctrines. [Isa. 29:13.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Such [practices] have indeed the outward appearance [that popularly passes] for wisdom, in promoting self-imposed rigor of devotion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight in self-humiliation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' severity of discipline of the body, but they are of no value in checking the indulgence of the flesh (the lower nature). [Instead, they do not honor God but serve only to indulge the flesh.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In Him all the treasures of [divine] wisdom (comprehensive insight into the ways and purposes of God) and [all the riches of spiritual] knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enlightenment are stored up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lie hidden.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I say this in order that no one may mislead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delude you by plausible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persuasive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attractive arguments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beguiling speech.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For though I am away from you in body, yet I am with you in spirit, delighted at the sight of your [standing shoulder to shoulder in such] orderly array and the firmness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the solid front '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfastness of your faith in Christ [that leaning of the entire human personality on Him in absolute trust and confidence in His power, wisdom, and goodness].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As you have therefore received Christ, [even] Jesus the Lord, [so] walk (regulate your lives and conduct yourselves) in union with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conformity to Him.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Have the roots [of your being] firmly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deeply planted [in Him, fixed and founded in Him], being continually built up in Him, becoming increasingly more confirmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established in the faith, just as you were taught, and abounding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overflowing in it with thanksgiving.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' See to it that no one carries you off as spoil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' makes you yourselves captive by his so-called philosophy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' intellectualism and vain deceit (idle fancies and plain nonsense), following human tradition (men''s ideas of the material rather than the spiritual world), just crude notions following the rudimentary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' elemental teachings of the universe and disregarding [the teachings of] Christ (the Messiah).'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For in Him the whole fullness of Deity (the Godhead) continues to dwell in bodily form [giving complete expression of the divine nature].'
