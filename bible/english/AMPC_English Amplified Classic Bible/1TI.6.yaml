document_id: 1TI.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' LET ALL who are under the yoke as bond servants esteem their own [personal] masters worthy of honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fullest respect, so that the name of God and the teaching [about Him] may not be brought into disrepute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blasphemed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let those who have believing masters not be disrespectful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' scornful [to them] on the grounds that they are brothers [in Christ]; rather, they should serve [them all the better] because those who benefit by their kindly service are believers and beloved. Teach and urge these duties.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But if anyone teaches otherwise and does not assent to the sound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wholesome messages of our Lord Jesus Christ (the Messiah) and the teaching which is in agreement with godliness (piety toward God),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' He is puffed up with pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stupefied with conceit, [although he is] woefully ignorant. He has a morbid fondness for controversy and disputes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strife about words, which result in (produce) envy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' jealousy, quarrels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dissension, abuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insults '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slander, and base suspicions,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And protracted wrangling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wearing discussion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perpetual friction among men who are corrupted in mind and bereft of the truth, who imagine that godliness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' righteousness is a source of profit [a moneymaking business, a means of livelihood]. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: From such withdraw.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [And it is, indeed, a source of immense profit, for] godliness accompanied with contentment (that contentment which is a sense of inward sufficiency) is great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abundant gain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For we brought nothing into the world, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: obviously
  - type: text
    text: ' we cannot take anything out of the world;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But if we have food and clothing, with these we shall be content (satisfied).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But those who crave to be rich fall into temptation and a snare and into many foolish (useless, godless) and hurtful desires that plunge men into ruin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction and miserable perishing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For the love of money is a root of all evils; it is through this craving that some have been led astray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have wandered from the faith and pierced themselves through with many acute [mental] pangs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But as for you, O man of God, flee from all these things; aim at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pursue righteousness (right standing with God and true goodness), godliness (which is the loving fear of God and being Christlike), faith, love, steadfastness (patience), and gentleness of heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Fight the good fight of the faith; lay hold of the eternal life to which you were summoned and [for which] you confessed the good confession [of faith] before many witnesses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' In the presence of God, Who preserves alive all living things, and of Christ Jesus, Who in His testimony before Pontius Pilate made the good confession, I [solemnly] charge you'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' To keep all His precepts unsullied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' flawless, irreproachable, until the appearing of our Lord Jesus Christ (the Anointed One),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Which [appearing] will be shown forth in His own proper time by the blessed, only Sovereign (Ruler), the King of kings and the Lord of lords,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Who alone has immortality [in the sense of exemption from every kind of death] and lives in unapproachable light, Whom no man has ever seen or can see. Unto Him be honor and everlasting power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dominion. Amen (so be it).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' As for the rich in this world, charge them not to be proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contemptuous of others, nor to set their hopes on uncertain riches, but on God, Who richly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ceaselessly provides us with everything for [our] enjoyment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' [Charge them] to do good, to be rich in good works, to be liberal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generous of heart, ready to share [with others],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' In this way laying up for themselves [the riches that endure forever as] a good foundation for the future, so that they may grasp that which is life indeed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' O Timothy, guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep the deposit entrusted [to you]! Turn away from the irreverent babble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godless chatter, with the vain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' empty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worldly phrases, and the subtleties '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the contradictions in what is falsely called knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spiritual illumination.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' [For] by making such profession some have erred (missed the mark) as regards the faith. Grace (divine favor and blessing) be with you all! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
