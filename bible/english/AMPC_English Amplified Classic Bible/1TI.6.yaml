document_id: 1TI.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' LET ALL who are under the yoke as bond servants esteem their own [personal] masters worthy of honor '
  - type: text
    content: and
  - type: text
    content: ' fullest respect, so that the name of God and the teaching [about Him] may not be brought into disrepute '
  - type: text
    content: and
  - type: text
    content: ' blasphemed.'
  '10':
  - type: text
    content: ' For the love of money is a root of all evils; it is through this craving that some have been led astray '
  - type: text
    content: and
  - type: text
    content: ' have wandered from the faith and pierced themselves through with many acute [mental] pangs.'
  '11':
  - type: text
    content: ' But as for you, O man of God, flee from all these things; aim at '
  - type: text
    content: and
  - type: text
    content: ' pursue righteousness (right standing with God and true goodness), godliness (which is the loving fear of God and being Christlike), faith, love, steadfastness (patience), and gentleness of heart.'
  '12':
  - type: text
    content: ' Fight the good fight of the faith; lay hold of the eternal life to which you were summoned and [for which] you confessed the good confession [of faith] before many witnesses.'
  '13':
  - type: text
    content: ' In the presence of God, Who preserves alive all living things, and of Christ Jesus, Who in His testimony before Pontius Pilate made the good confession, I [solemnly] charge you'
  '14':
  - type: text
    content: ' To keep all His precepts unsullied '
  - type: text
    content: and
  - type: text
    content: ' flawless, irreproachable, until the appearing of our Lord Jesus Christ (the Anointed One),'
  '15':
  - type: text
    content: ' Which [appearing] will be shown forth in His own proper time by the blessed, only Sovereign (Ruler), the King of kings and the Lord of lords,'
  '16':
  - type: text
    content: ' Who alone has immortality [in the sense of exemption from every kind of death] and lives in unapproachable light, Whom no man has ever seen or can see. Unto Him be honor and everlasting power '
  - type: text
    content: and
  - type: text
    content: ' dominion. Amen (so be it).'
  '17':
  - type: text
    content: ' As for the rich in this world, charge them not to be proud '
  - type: text
    content: and
  - type: text
    content: ' arrogant '
  - type: text
    content: and
  - type: text
    content: ' contemptuous of others, nor to set their hopes on uncertain riches, but on God, Who richly '
  - type: text
    content: and
  - type: text
    content: ' ceaselessly provides us with everything for [our] enjoyment.'
  '18':
  - type: text
    content: ' [Charge them] to do good, to be rich in good works, to be liberal '
  - type: text
    content: and
  - type: text
    content: ' generous of heart, ready to share [with others],'
  '19':
  - type: text
    content: ' In this way laying up for themselves [the riches that endure forever as] a good foundation for the future, so that they may grasp that which is life indeed.'
  '2':
  - type: text
    content: ' Let those who have believing masters not be disrespectful '
  - type: text
    content: or
  - type: text
    content: ' scornful [to them] on the grounds that they are brothers [in Christ]; rather, they should serve [them all the better] because those who benefit by their kindly service are believers and beloved. Teach and urge these duties.'
  '20':
  - type: text
    content: ' O Timothy, guard '
  - type: text
    content: and
  - type: text
    content: ' keep the deposit entrusted [to you]! Turn away from the irreverent babble '
  - type: text
    content: and
  - type: text
    content: ' godless chatter, with the vain '
  - type: text
    content: and
  - type: text
    content: ' empty '
  - type: text
    content: and
  - type: text
    content: ' worldly phrases, and the subtleties '
  - type: text
    content: and
  - type: text
    content: ' the contradictions in what is falsely called knowledge '
  - type: text
    content: and
  - type: text
    content: ' spiritual illumination.'
  '21':
  - type: text
    content: ' [For] by making such profession some have erred (missed the mark) as regards the faith. Grace (divine favor and blessing) be with you all! '
  - type: text
    content: Amen (so be it).
  '3':
  - type: text
    content: ' But if anyone teaches otherwise and does not assent to the sound '
  - type: text
    content: and
  - type: text
    content: ' wholesome messages of our Lord Jesus Christ (the Messiah) and the teaching which is in agreement with godliness (piety toward God),'
  '4':
  - type: text
    content: ' He is puffed up with pride '
  - type: text
    content: and
  - type: text
    content: ' stupefied with conceit, [although he is] woefully ignorant. He has a morbid fondness for controversy and disputes '
  - type: text
    content: and
  - type: text
    content: ' strife about words, which result in (produce) envy '
  - type: text
    content: and
  - type: text
    content: ' jealousy, quarrels '
  - type: text
    content: and
  - type: text
    content: ' dissension, abuse '
  - type: text
    content: and
  - type: text
    content: ' insults '
  - type: text
    content: and
  - type: text
    content: ' slander, and base suspicions,'
  '5':
  - type: text
    content: ' And protracted wrangling '
  - type: text
    content: and
  - type: text
    content: ' wearing discussion '
  - type: text
    content: and
  - type: text
    content: ' perpetual friction among men who are corrupted in mind and bereft of the truth, who imagine that godliness '
  - type: text
    content: or
  - type: text
    content: ' righteousness is a source of profit [a moneymaking business, a means of livelihood]. '
  - type: text
    content: From such withdraw.
  '6':
  - type: text
    content: ' [And it is, indeed, a source of immense profit, for] godliness accompanied with contentment (that contentment which is a sense of inward sufficiency) is great '
  - type: text
    content: and
  - type: text
    content: ' abundant gain.'
  '7':
  - type: text
    content: ' For we brought nothing into the world, and '
  - type: text
    content: obviously
  - type: text
    content: ' we cannot take anything out of the world;'
  '8':
  - type: text
    content: ' But if we have food and clothing, with these we shall be content (satisfied).'
  '9':
  - type: text
    content: ' But those who crave to be rich fall into temptation and a snare and into many foolish (useless, godless) and hurtful desires that plunge men into ruin '
  - type: text
    content: and
  - type: text
    content: ' destruction and miserable perishing.'
