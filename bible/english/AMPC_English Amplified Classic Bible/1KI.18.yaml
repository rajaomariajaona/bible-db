document_id: 1KI.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER MANY days, the word of the Lord came to Elijah in the third year, saying, Go, show yourself to Ahab, and I will send rain upon the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So Elijah went to show himself to Ahab. Now the famine was severe in Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Ahab called Obadiah, who was the governor of his house. (Now Obadiah feared the Lord greatly;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For when Jezebel cut off the prophets of the Lord, Obadiah took a hundred prophets and hid them by fifties in a cave and fed them with bread and water.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Ahab said to Obadiah, Go into the land to all the fountains of water and to all the brooks; perhaps we may find grass to keep the horses and mules alive, that we lose none of the beasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So they divided the land between them to pass through it. Ahab went one way and Obadiah went another way, each by himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' As Obadiah was on the way, behold, Elijah met him. He recognized him and fell on his face and said, Are you my lord Elijah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He answered him, It is I. Go tell your lord, Behold, Elijah is here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he said, What sin have I committed, that you would deliver your servant into the hands of Ahab to be slain?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' As the Lord your God lives, there is no nation or kingdom where my lord has not sent to seek you. And when they said, He is not here, he took an oath from the kingdom or nation that they had not found you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And now you say, Go tell your lord, Behold, Elijah is here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And as soon as I have gone out from you, the Spirit of the Lord will carry you I know not where; so when I come and tell Ahab and he cannot find you, he will kill me. But I your servant have feared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revered the Lord from my youth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Was it not told my lord what I did when Jezebel slew the prophets of the Lord, how I hid a hundred men of the Lord''s prophets by fifties in a cave and fed them with bread and water?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And now you say, Go tell your lord, Behold, Elijah is here; and he will kill me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Elijah said, As the Lord of hosts lives, before Whom I stand, I will surely show myself to Ahab today.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So Obadiah went to meet Ahab and told him, and Ahab went to meet Elijah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' When Ahab saw Elijah, Ahab said to him, Are you he who troubles Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Elijah replied, I have not troubled Israel, but you have, and your father''s house, by forsaking the commandments of the Lord and by following the Baals.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Therefore send and gather to me all Israel at Mount Carmel, and the 450 prophets of Baal and the 400 prophets of [the goddess] Asherah, who eat at [Queen] Jezebel''s table.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' So Ahab sent to all the Israelites and assembled the prophets at Mount Carmel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Elijah came near to all the people and said, How long will you halt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' limp between two opinions? If the Lord is God, follow Him! But if Baal, then follow him. And the people did not answer him a word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then Elijah said to the people, I, I only, remain a prophet of the Lord, but Baal''s prophets are 450 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Let two bulls be given us; let them choose one bull for themselves and cut it in pieces and lay it on the wood but put no fire to it. I will dress the other bull, lay it on the wood, and put no fire to it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then you call on the name of your god, and I will call on the name of the Lord; and the One Who answers by fire, let Him be God. And all the people answered, It is well spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Elijah said to the prophets of Baal, Choose one bull for yourselves and dress it first, for you are many; and call on the name of your god, but put no fire under it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So they took the bull given them, dressed it, and called on the name of Baal from morning until noon, saying, O Baal, hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answer us! But there was no voice; no one answered. And they leaped upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' limped about the altar they had made.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' At noon Elijah mocked them, saying, Cry aloud, for he is a god; either he is musing, or he has gone aside, or he is on a journey, or perhaps he is asleep and must be awakened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And they cried aloud and cut themselves after their custom with knives and lances until the blood gushed out upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Midday passed, and they played the part of prophets until the time for offering the evening sacrifice, but there was no voice, no answer, no one who paid attention.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Then Elijah said to all the people, Come near to me. And all the people came near him. And he repaired the [old] altar of the Lord that had been broken down [by Jezebel]. [I Kings 18:13; 19:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Then Elijah took twelve stones, according to the number of the tribes of the sons of Jacob, to whom the word of the Lord came, saying, Israel shall be your name. [Gen. 32:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And with the stones Elijah built an altar in the name [and self-revelation] of the Lord. He made a trench about the altar as great as would contain two measures of seed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' He put the wood in order and cut the bull in pieces and laid it on the wood and said, Fill four jars with water and pour it on the burnt offering and the wood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And he said, Do it the second time. And they did it the second time. And he said, Do it the third time. And they did it the third time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' The water ran round about the altar, and he filled the trench also with water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' At the time of the offering of the evening sacrifice, Elijah the prophet came near and said, O Lord, the God of Abraham, Isaac, and Israel, let it be known this day that You are God in Israel and that I am Your servant and that I have done all these things at Your word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Hear me, O Lord, hear me, that this people may know that You, the Lord, are God, and have turned their hearts back [to You].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Then the fire of the Lord fell and consumed the burnt sacrifice and the wood and the stones and the dust, and also licked up the water that was in the trench.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' When all the people saw it, they fell on their faces and they said, The Lord, He is God! The Lord, He is God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And Elijah said, Seize the prophets of Baal; let not one escape. They seized them, and Elijah brought them down to the brook Kishon, and [as God''s law required] slew them there. [Deut. 13:5; 18:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And Elijah said to Ahab, Go up, eat and drink, for there is the sound of abundance of rain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' So Ahab went up to eat and to drink. And Elijah went up to the top of Carmel; and he bowed himself down upon the earth and put his face between his knees'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And said to his servant, Go up now, look toward the sea. And he went up and looked and said, There is nothing. Elijah said, Go again seven times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And at the seventh time the servant said, A cloud as small as a man''s hand is arising out of the sea. And Elijah said, Go up, say to Ahab, Hitch your chariot and go down, lest the rain stop you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' In a little while, the heavens were black with wind-swept clouds, and there was a great rain. And Ahab went to Jezreel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' The hand of the Lord was on Elijah. He girded up his loins and ran before Ahab to the entrance of Jezreel [nearly twenty miles].'
