document_id: PSA.86
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prayer of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' INCLINE YOUR ear, O Lord, and answer me, for I am poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distressed, needy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desiring.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Preserve my life, for I am godly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dedicated; O my God, save Your servant, for I trust in You [leaning and believing on You, committing all and confidently looking to You, without fear or doubt].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Be merciful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gracious to me, O Lord, for to You do I cry all the day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Make me, Your servant, to rejoice, O Lord, for to You do I lift myself up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For You, O Lord, are good, and ready to forgive [our trespasses, sending them away, letting them go completely and forever]; and You are abundant in mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness to all those who call upon You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Give ear, O Lord, to my prayer; and listen to the cry of my supplications.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' In the day of my trouble I will call on You, for You will answer me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' There is none like unto You among the gods, O Lord, neither are their works like unto Yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' All nations whom You have made shall come and fall down before You, O Lord; and they shall glorify Your name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For You are great and work wonders! You alone are God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Teach me Your way, O Lord, that I may walk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' live in Your truth; direct '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unite my heart [solely, reverently] to fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor Your name. [Ps. 5:11; 69:36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I will confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise You, O Lord my God, with my whole (united) heart; and I will glorify Your name forevermore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For great is Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness toward me; and You have delivered me from the depths of Sheol [from the exceeding depths of affliction].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' O God, the proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insolent are risen against me; a rabble of violent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruthless men has sought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demanded my life, and they have not set You before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But You, O Lord, are a God merciful and gracious, slow to anger and abounding in mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness and truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' O turn to me and have mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be gracious to me; grant strength (might and inflexibility to temptation) to Your servant and save the son of Your handmaiden.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Show me a sign of [Your evident] goodwill '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor, that those who hate me may see it and be put to shame, because You, Lord, [will show Your approval of me when You] help and comfort me.'
