document_id: PSA.86,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer of David.
  - type: text
    content: ' INCLINE YOUR ear, O Lord, and answer me, for I am poor '
  - type: text
    content: and
  - type: text
    content: ' distressed, needy '
  - type: text
    content: and
  - type: text
    content: ' desiring.'
  '10':
  - type: text
    content: ' For You are great and work wonders! You alone are God.'
  '11':
  - type: text
    content: ' Teach me Your way, O Lord, that I may walk '
  - type: text
    content: and
  - type: text
    content: ' live in Your truth; direct '
  - type: text
    content: and
  - type: text
    content: ' unite my heart [solely, reverently] to fear '
  - type: text
    content: and
  - type: text
    content: ' honor Your name. [Ps. 5:11; 69:36.]'
  '12':
  - type: text
    content: ' I will confess '
  - type: text
    content: and
  - type: text
    content: ' praise You, O Lord my God, with my whole (united) heart; and I will glorify Your name forevermore.'
  '13':
  - type: text
    content: ' For great is Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness toward me; and You have delivered me from the depths of Sheol [from the exceeding depths of affliction].'
  '14':
  - type: text
    content: ' O God, the proud '
  - type: text
    content: and
  - type: text
    content: ' insolent are risen against me; a rabble of violent '
  - type: text
    content: and
  - type: text
    content: ' ruthless men has sought '
  - type: text
    content: and
  - type: text
    content: ' demanded my life, and they have not set You before them.'
  '15':
  - type: text
    content: ' But You, O Lord, are a God merciful and gracious, slow to anger and abounding in mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness and truth.'
  '16':
  - type: text
    content: ' O turn to me and have mercy '
  - type: text
    content: and
  - type: text
    content: ' be gracious to me; grant strength (might and inflexibility to temptation) to Your servant and save the son of Your handmaiden.'
  '17':
  - type: text
    content: ' Show me a sign of [Your evident] goodwill '
  - type: text
    content: and
  - type: text
    content: ' favor, that those who hate me may see it and be put to shame, because You, Lord, [will show Your approval of me when You] help and comfort me.'
  '2':
  - type: text
    content: ' Preserve my life, for I am godly '
  - type: text
    content: and
  - type: text
    content: ' dedicated; O my God, save Your servant, for I trust in You [leaning and believing on You, committing all and confidently looking to You, without fear or doubt].'
  '3':
  - type: text
    content: ' Be merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious to me, O Lord, for to You do I cry all the day.'
  '4':
  - type: text
    content: ' Make me, Your servant, to rejoice, O Lord, for to You do I lift myself up.'
  '5':
  - type: text
    content: ' For You, O Lord, are good, and ready to forgive [our trespasses, sending them away, letting them go completely and forever]; and You are abundant in mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness to all those who call upon You.'
  '6':
  - type: text
    content: ' Give ear, O Lord, to my prayer; and listen to the cry of my supplications.'
  '7':
  - type: text
    content: ' In the day of my trouble I will call on You, for You will answer me.'
  '8':
  - type: text
    content: ' There is none like unto You among the gods, O Lord, neither are their works like unto Yours.'
  '9':
  - type: text
    content: ' All nations whom You have made shall come and fall down before You, O Lord; and they shall glorify Your name.'
