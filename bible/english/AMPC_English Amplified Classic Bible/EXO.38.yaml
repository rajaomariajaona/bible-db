document_id: EXO.38,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BEZALEL MADE the burnt offering altar of acacia wood; its top was five cubits square and it was three cubits high.'
  '10':
  - type: text
    content: ' Their pillars and their bronze sockets '
  - type: text
    content: or
  - type: text
    content: ' bases were twenty; the hooks of the pillars and their joinings were silver.'
  '11':
  - type: text
    content: ' And for the north side the hangings were [also] a hundred cubits; their pillars and their sockets '
  - type: text
    content: or
  - type: text
    content: ' bases of bronze were twenty; the hooks of the pillars and their joinings were of silver.'
  '12':
  - type: text
    content: ' But for the west side were hangings of fifty cubits; their pillars and their sockets '
  - type: text
    content: or
  - type: text
    content: ' bases were ten; the hooks of the pillars and their joinings were of silver.'
  '13':
  - type: text
    content: ' And for the front, the east side, fifty cubits.'
  '14':
  - type: text
    content: ' The hangings for one side of the gate were fifteen cubits; their pillars three and their sockets '
  - type: text
    content: or
  - type: text
    content: ' bases three.'
  '15':
  - type: text
    content: ' Also for the other side of the court gate, left and right, were hangings of fifteen cubits; their pillars three and their sockets '
  - type: text
    content: or
  - type: text
    content: ' bases three.'
  '16':
  - type: text
    content: ' All the hangings around the court were of fine twined linen.'
  '17':
  - type: text
    content: ' The sockets for the pillars were of bronze, the hooks of the pillars and their joinings of silver, the overlaying of their tops of silver, and all the pillars of the court were joined with silver.'
  '18':
  - type: text
    content: ' The hanging '
  - type: text
    content: or
  - type: text
    content: ' screen for the gate of the court was embroidered in blue, purple, and scarlet [stuff], and fine twined linen; the length was twenty cubits and the height in the breadth was five cubits, corresponding to the hangings of the court.'
  '19':
  - type: text
    content: ' Their pillars were four and their sockets of bronze four; their hooks were of silver, and the overlaying of their tops and their joinings were of silver.'
  '2':
  - type: text
    content: ' He made its horns on the four corners of it; the horns were of one piece with it, and he overlaid it with bronze.'
  '20':
  - type: text
    content: ' All the pegs for the tabernacle and around the court were of bronze.'
  '21':
  - type: text
    content: ' This is the sum of the things for the tabernacle of the Testimony, as counted at the command of Moses, for the work of the Levites under the direction of Ithamar son of Aaron, the [high] priest.'
  '22':
  - type: text
    content: ' Bezalel son of Uri, the son of Hur, of the tribe of Judah, made all that the Lord commanded Moses.'
  '23':
  - type: text
    content: ' With him was Aholiab son of Ahisamach, of the tribe of Dan, an engraver, a skillful craftsman, and embroiderer in blue, purple, and scarlet [stuff], and in fine linen.'
  '24':
  - type: text
    content: ' All the gold that was used for the work in all the building '
  - type: text
    content: and
  - type: text
    content: ' furnishing of the sanctuary, the gold from the offering, was 29 talents and 730 shekels, by the shekel of the sanctuary.'
  '25':
  - type: text
    content: ' And the silver from those numbered of the congregation was 100 talents and 1,775 shekels, by sanctuary standards:'
  '26':
  - type: text
    content: ' A beka for each man, that is, half a shekel, by the sanctuary shekel, for everyone who was counted, from twenty years old and upward, for 603,550 men.'
  '27':
  - type: text
    content: ' The 100 talents of silver were for casting the sockets '
  - type: text
    content: or
  - type: text
    content: ' bases of the sanctuary and of the veil; 100 sockets for the 100 talents, a talent for a socket.'
  '28':
  - type: text
    content: ' Of the 1,775 shekels he made hooks for the pillars, and overlaid their tops, and made joinings for them.'
  '29':
  - type: text
    content: ' The bronze of the offering was 70 talents and 2,400 shekels.'
  '3':
  - type: text
    content: ' He made all the utensils '
  - type: text
    content: and
  - type: text
    content: ' vessels of the altar, the pots, shovels, basins, forks '
  - type: text
    content: or
  - type: text
    content: ' fleshhooks, and firepans; all its utensils '
  - type: text
    content: and
  - type: text
    content: ' vessels he made of bronze.'
  '30':
  - type: text
    content: ' With it Bezalel made the sockets for the door of the Tent of Meeting, and the bronze altar and the bronze grate for it, and all the utensils of the altar,'
  '31':
  - type: text
    content: ' The sockets of the court round about and of the court gate, and all the pegs of the tabernacle and around the court.'
  '4':
  - type: text
    content: ' And he made for the altar a bronze grate of network under its ledge, extending halfway down it.'
  '5':
  - type: text
    content: ' He cast four rings for the four corners of the bronze grating to be places for the poles [with which to carry it].'
  '6':
  - type: text
    content: ' And he made the poles of acacia wood and overlaid them with bronze.'
  '7':
  - type: text
    content: ' And he put the poles through the rings on the altar''s sides with which to carry it; he made it hollow with planks.'
  '8':
  - type: text
    content: ' He made the laver and its base of bronze from the mirrors of the women who ministered at the door of the Tent of Meeting.'
  '9':
  - type: text
    content: ' And he made the court: for the south side the hangings of the court were of fine twined linen, a hundred cubits;'
