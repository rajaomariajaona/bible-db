document_id: EZK.44
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the man
  - type: text
    text: ' [an angel] brought me back the way of the outer gate of the sanctuary which faces the east, and it was shut.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then the Lord said to me, This gate shall be shut; it shall not be opened and no man shall enter in by it, for the Lord, the God of Israel, has entered in by it; therefore it shall remain shut.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' As for the prince, being the prince, he shall sit in it to eat bread before the Lord; he shall enter by way of the porch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' vestibule of the gate and shall go out the same way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then he brought me by way of the north gate to the front of the temple; I looked, and behold, the glory of the Lord filled the house of the Lord, and I fell upon my face. [Rev. 15:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the Lord said to me, Son of man, mark well '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set your heart to see with your eyes and hear with your ears all that I say to you concerning all the ordinances of the house of the Lord and all its laws, and mark well '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set your heart to know who are allowed to enter the temple and all those who are excluded from the sanctuary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And you shall say to the rebellious, even to the house of Israel, Thus says the Lord God: O you house of Israel, let all your previous abominations be enough for you! [Do not repeat them!]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' You have brought into My sanctuary aliens, uncircumcised in heart and uncircumcised in flesh, to be in My sanctuary to pollute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profane it, even My house, when you offer My bread, the fat and the blood; and through it all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in addition to all your abominations, they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' you have broken My covenant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And you have not kept charge of My holy things, but you have chosen foreign keepers to please yourselves and have set them in charge of My sanctuary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Therefore thus says the Lord God: No foreigner uncircumcised in heart and flesh shall enter into My sanctuary [where no one but the priests might enter], of any foreigners who are among the children of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But the Levites who went far away from Me when Israel went astray, who went astray from Me after their idols, they shall bear [the punishment for] their iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They shall minister in My sanctuary, having oversight as guards at the gates of the temple and ministering in the temple. They shall slay the burnt offering and the sacrifice for the people, and they shall attend the people to serve them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Because [the priests] ministered to [the people] before their idols and became a stumbling block of iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt to the house of Israel, therefore I have lifted up My hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have sworn against them, says the Lord God, that they shall bear the punishment for their iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they shall not come near to Me to do the office of a priest to Me, nor come near to any of My holy things that are most sacred; but they shall bear their shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their punishment for the abominations which they have committed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Yet I will appoint them as caretakers to have charge of the temple, for all the service of the temple and for all that will be done in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But the Levitical priests, the sons of Zadok, who kept the charge of My sanctuary when the children of Israel went astray from Me, shall come near to Me to minister to Me, and they shall attend Me to offer to Me the fat and the blood, says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They shall enter into My sanctuary; and they shall come near to My table to minister to Me, and they shall keep My charge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' When they enter the gates of the inner court, they shall be clothed in linen garments; no wool shall be on them while they minister at the gates of the inner court and within the temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' They shall have linen turbans on their heads and linen breeches upon their loins; they shall not gird themselves with anything that causes [them to] sweat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And when they go out into the outer court to the people, they shall put off the garments in which they ministered and lay them in the holy chambers, and they shall put on other garments, lest by contact of their garments with the people they should consecrate (separate and set apart for holy use) such persons [unintentionally and unfittingly].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Neither shall they shave their heads or allow their locks to grow long; they shall only cut short '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trim the hair of their heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Neither shall any priest drink wine when he enters the inner court.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Neither shall they take for their wives a widow or a woman separated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' divorced from her husband; but they shall marry maidens [who are virgins] of the offspring of the house of Israel or a widow previously married to a priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The priests shall teach My people the difference between the holy and the common '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' profane, and cause them to distinguish between the unclean and the clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And in a controversy they shall act as judges, and they shall judge according to My judgments; and they shall keep My laws and My statutes in all My appointed feasts, and they shall keep My Sabbaths holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And they shall go near to no dead person to defile themselves, except for father or for mother, for son or for daughter, for brother or for sister who has had no husband; for them they may defile themselves. [Lev. 21:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And after he is cleansed [from the defilement of a dead body] they shall reckon to him seven days more before returning to the temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And on the day that he goes into the sanctuary, into the inner court to minister in the sanctuary, he shall offer his sin offering, says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' This [their ministry to Me] shall be to them as an inheritance, for I am their inheritance; and you shall give them no possession in Israel, for I am their possession. [Josh. 13:14, 33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' They shall eat the meal offering and the sin offering and the trespass offering, and every offering in Israel dedicated by a solemn vow to God shall be theirs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And the first of all the firstfruits of all kinds, and every offering of all kinds from all your offerings, shall belong to the priests. You shall also give to the priest the first of your coarse meal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bread dough, that a blessing may rest on your house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The priests shall not eat of anything that has died of itself or is torn, whether it be bird or beast.'
