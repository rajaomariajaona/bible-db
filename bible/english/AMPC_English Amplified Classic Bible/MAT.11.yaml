document_id: MAT.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN JESUS had finished His charge to His twelve disciples, He left there to teach and to preach in their [Galilean] cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Now when John in prison heard about the activities of Christ, he sent a message by his disciples'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And asked Him, Are You the One Who was to come, or should we keep on expecting a different one? [Gen. 49:10; Num. 24:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Jesus replied to them, Go and report to John what you hear and see:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The blind receive their sight and the lame walk, lepers are cleansed (by healing) and the deaf hear, the dead are raised up and the poor have good news (the Gospel) preached to them. [Isa. 35:5, 6; 61:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And blessed (happy, fortunate, and to be envied) is he who takes no offense at Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' finds no cause for stumbling in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' through Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is not hindered from seeing the Truth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then as these men went their way, Jesus began to speak to the crowds about John: What did you go out in the wilderness (desert) to see? A reed swayed by the wind?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' What did you go out to see then? A man clothed in soft garments? Behold, those who wear soft clothing are in the houses of kings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But what did you go out to see? A prophet? Yes, I tell you, and one [out of the common, more eminent, more remarkable, and] superior to a prophet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' This is the one of whom it is written, Behold, I send My messenger ahead of You, who shall make ready Your way before You. [Mal. 3:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Truly I tell you, among those born of women there has not risen anyone greater than John the Baptist; yet he who is least in the kingdom of heaven is greater than he.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And from the days of John the Baptist until the present time, the kingdom of heaven has endured violent assault, and violent men seize it by force [as a precious prize–a share in the heavenly kingdom is sought with most ardent zeal and intense exertion].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For all the Prophets and the Law prophesied up until John.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And if you are willing to receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accept it, John himself is Elijah who was to come [before the kingdom]. [Mal. 4:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He who has ears to hear, let him be listening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' let him consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comprehend by hearing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But to what shall I liken this generation? It is like little children sitting in the marketplaces who call to their playmates,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' We piped to you [playing wedding], and you did not dance; we wailed dirges [playing funeral], and you did not mourn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beat your breasts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weep aloud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For John came neither eating nor drinking [with others], and they say, He has a demon!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The Son of Man came eating and drinking [with others], and they say, Behold, a glutton and a wine drinker, a friend of tax collectors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [especially wicked] sinners! Yet wisdom is justified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vindicated by what she does (her deeds) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and by
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: her children.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then He began to censure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reproach the cities in which most of His mighty works had been performed, because they did not repent [and their hearts were not changed].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works done in you had been done in Tyre and Sidon, they would long ago have repented in sackcloth and ashes [and their hearts would have been changed].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' I tell you [further], it shall be more endurable for Tyre and Sidon on the day of judgment than for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And you, Capernaum, are you to be lifted up to heaven? You shall be brought down to Hades [the region of the dead]! For if the mighty works done in you had been done in Sodom, it would have continued until today.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But I tell you, it shall be more endurable for the land of Sodom on the day of judgment than for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' At that time Jesus began to say, I thank You, Father, Lord of heaven and earth [and I acknowledge openly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' joyfully to Your honor], that You have hidden these things from the wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clever and learned, and revealed them to babies [to the childish, untaught, and unskilled].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Yes, Father, [I praise You that] such was Your gracious will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good pleasure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' All things have been entrusted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delivered to Me by My Father; and no one fully knows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accurately understands the Son except the Father, and no one fully knows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accurately understands the Father except the Son and anyone to whom the Son deliberately wills to make Him known.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Come to Me, all you who labor and are heavy-laden '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overburdened, and I will cause you to rest. [I will ease and relieve and refresh your souls.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Take My yoke upon you and learn of Me, for I am gentle (meek) and humble (lowly) in heart, and you will find rest (relief and ease and refreshment and recreation and blessed quiet) for your souls. [Jer. 6:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' For My yoke is wholesome (useful, good–not harsh, hard, sharp, or pressing, but comfortable, gracious, and pleasant), and My burden is light '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' easy to be borne.'
