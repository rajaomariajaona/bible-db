document_id: MAT.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHEN JESUS had finished His charge to His twelve disciples, He left there to teach and to preach in their [Galilean] cities.'
  '10':
  - type: text
    content: ' This is the one of whom it is written, Behold, I send My messenger ahead of You, who shall make ready Your way before You. [Mal. 3:1.]'
  '11':
  - type: text
    content: ' Truly I tell you, among those born of women there has not risen anyone greater than John the Baptist; yet he who is least in the kingdom of heaven is greater than he.'
  '12':
  - type: text
    content: ' And from the days of John the Baptist until the present time, the kingdom of heaven has endured violent assault, and violent men seize it by force [as a precious prize–a share in the heavenly kingdom is sought with most ardent zeal and intense exertion].'
  '13':
  - type: text
    content: ' For all the Prophets and the Law prophesied up until John.'
  '14':
  - type: text
    content: ' And if you are willing to receive '
  - type: text
    content: and
  - type: text
    content: ' accept it, John himself is Elijah who was to come [before the kingdom]. [Mal. 4:5.]'
  '15':
  - type: text
    content: ' He who has ears to hear, let him be listening '
  - type: text
    content: and
  - type: text
    content: ' let him consider '
  - type: text
    content: and
  - type: text
    content: ' perceive '
  - type: text
    content: and
  - type: text
    content: ' comprehend by hearing.'
  '16':
  - type: text
    content: ' But to what shall I liken this generation? It is like little children sitting in the marketplaces who call to their playmates,'
  '17':
  - type: text
    content: ' We piped to you [playing wedding], and you did not dance; we wailed dirges [playing funeral], and you did not mourn '
  - type: text
    content: and
  - type: text
    content: ' beat your breasts '
  - type: text
    content: and
  - type: text
    content: ' weep aloud.'
  '18':
  - type: text
    content: ' For John came neither eating nor drinking [with others], and they say, He has a demon!'
  '19':
  - type: text
    content: ' The Son of Man came eating and drinking [with others], and they say, Behold, a glutton and a wine drinker, a friend of tax collectors '
  - type: text
    content: and
  - type: text
    content: ' [especially wicked] sinners! Yet wisdom is justified '
  - type: text
    content: and
  - type: text
    content: ' vindicated by what she does (her deeds) '
  - type: text
    content: and by
  - type: text
    content: ' '
  - type: text
    content: her children.
  '2':
  - type: text
    content: ' Now when John in prison heard about the activities of Christ, he sent a message by his disciples'
  '20':
  - type: text
    content: ' Then He began to censure '
  - type: text
    content: and
  - type: text
    content: ' reproach the cities in which most of His mighty works had been performed, because they did not repent [and their hearts were not changed].'
  '21':
  - type: text
    content: ' Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works done in you had been done in Tyre and Sidon, they would long ago have repented in sackcloth and ashes [and their hearts would have been changed].'
  '22':
  - type: text
    content: ' I tell you [further], it shall be more endurable for Tyre and Sidon on the day of judgment than for you.'
  '23':
  - type: text
    content: ' And you, Capernaum, are you to be lifted up to heaven? You shall be brought down to Hades [the region of the dead]! For if the mighty works done in you had been done in Sodom, it would have continued until today.'
  '24':
  - type: text
    content: ' But I tell you, it shall be more endurable for the land of Sodom on the day of judgment than for you.'
  '25':
  - type: text
    content: ' At that time Jesus began to say, I thank You, Father, Lord of heaven and earth [and I acknowledge openly '
  - type: text
    content: and
  - type: text
    content: ' joyfully to Your honor], that You have hidden these things from the wise '
  - type: text
    content: and
  - type: text
    content: ' clever and learned, and revealed them to babies [to the childish, untaught, and unskilled].'
  '26':
  - type: text
    content: ' Yes, Father, [I praise You that] such was Your gracious will '
  - type: text
    content: and
  - type: text
    content: ' good pleasure.'
  '27':
  - type: text
    content: ' All things have been entrusted '
  - type: text
    content: and
  - type: text
    content: ' delivered to Me by My Father; and no one fully knows '
  - type: text
    content: and
  - type: text
    content: ' accurately understands the Son except the Father, and no one fully knows '
  - type: text
    content: and
  - type: text
    content: ' accurately understands the Father except the Son and anyone to whom the Son deliberately wills to make Him known.'
  '28':
  - type: text
    content: ' Come to Me, all you who labor and are heavy-laden '
  - type: text
    content: and
  - type: text
    content: ' overburdened, and I will cause you to rest. [I will ease and relieve and refresh your souls.]'
  '29':
  - type: text
    content: ' Take My yoke upon you and learn of Me, for I am gentle (meek) and humble (lowly) in heart, and you will find rest (relief and ease and refreshment and recreation and blessed quiet) for your souls. [Jer. 6:16.]'
  '3':
  - type: text
    content: ' And asked Him, Are You the One Who was to come, or should we keep on expecting a different one? [Gen. 49:10; Num. 24:17.]'
  '30':
  - type: text
    content: ' For My yoke is wholesome (useful, good–not harsh, hard, sharp, or pressing, but comfortable, gracious, and pleasant), and My burden is light '
  - type: text
    content: and
  - type: text
    content: ' easy to be borne.'
  '4':
  - type: text
    content: ' And Jesus replied to them, Go and report to John what you hear and see:'
  '5':
  - type: text
    content: ' The blind receive their sight and the lame walk, lepers are cleansed (by healing) and the deaf hear, the dead are raised up and the poor have good news (the Gospel) preached to them. [Isa. 35:5, 6; 61:1.]'
  '6':
  - type: text
    content: ' And blessed (happy, fortunate, and to be envied) is he who takes no offense at Me '
  - type: text
    content: and
  - type: text
    content: ' finds no cause for stumbling in '
  - type: text
    content: or
  - type: text
    content: ' through Me '
  - type: text
    content: and
  - type: text
    content: ' is not hindered from seeing the Truth.'
  '7':
  - type: text
    content: ' Then as these men went their way, Jesus began to speak to the crowds about John: What did you go out in the wilderness (desert) to see? A reed swayed by the wind?'
  '8':
  - type: text
    content: ' What did you go out to see then? A man clothed in soft garments? Behold, those who wear soft clothing are in the houses of kings.'
  '9':
  - type: text
    content: ' But what did you go out to see? A prophet? Yes, I tell you, and one [out of the common, more eminent, more remarkable, and] superior to a prophet.'
