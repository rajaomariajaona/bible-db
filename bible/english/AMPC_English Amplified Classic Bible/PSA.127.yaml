document_id: PSA.127,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents. Of Solomon.
  - type: text
    content: ' EXCEPT THE Lord builds the house, they labor in vain who build it; except the Lord keeps the city, the watchman wakes but in vain. [Ps. 121:1, 3, 5.]'
  '2':
  - type: text
    content: ' It is vain for you to rise up early, to take rest late, to eat the bread of [anxious] toil–for He gives [blessings] to His beloved in sleep.'
  '3':
  - type: text
    content: ' Behold, children are a heritage from the Lord, the fruit of the womb a reward. [Deut. 28:4.]'
  '4':
  - type: text
    content: ' As arrows are in the hand of a warrior, so are the children of one''s youth.'
  '5':
  - type: text
    content: ' Happy, blessed, '
  - type: text
    content: and
  - type: text
    content: ' fortunate is the man whose quiver is filled with them! They will not be put to shame when they speak with their adversaries [in gatherings] at the [city''s] gate.'
