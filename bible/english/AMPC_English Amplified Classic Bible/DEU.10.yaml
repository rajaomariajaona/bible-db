document_id: DEU.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AT THAT time the Lord said to me, Hew two tables of stone like the first and come up to Me on the mountain and make an ark of wood.'
  '10':
  - type: text
    content: ' And I [Moses] stayed on the mountain, as the first time, forty days and nights, and the Lord listened to me at that time also; the Lord would not destroy you.'
  '11':
  - type: text
    content: ' And the Lord said to me, Arise, journey on before the people, that they may go in and possess the land which I swore to their fathers to give to them.'
  '12':
  - type: text
    content: ' And now, Israel, what does the Lord your God require of you but [reverently] to fear the Lord your God, [that is] to walk in all His ways, and to love Him, and to serve the Lord your God with all your [mind and] heart and with your entire being,'
  '13':
  - type: text
    content: ' To keep the commandments of the Lord and His statutes which I command you today for your good?'
  '14':
  - type: text
    content: ' Behold, the heavens and the heaven of heavens belong to the Lord your God, the earth also, with all that is in it '
  - type: text
    content: and
  - type: text
    content: ' on it.'
  '15':
  - type: text
    content: ' Yet the Lord had a delight in loving your fathers, and He chose their descendants after them, you above all peoples, as it is this day.'
  '16':
  - type: text
    content: ' So circumcise the foreskin of your [minds and] hearts; be no longer stubborn '
  - type: text
    content: and
  - type: text
    content: ' hardened.'
  '17':
  - type: text
    content: ' For the Lord your God is God of gods and Lord of lords, the great, the mighty, the terrible God, Who is not partial and takes no bribe.'
  '18':
  - type: text
    content: ' He executes justice for the fatherless and the widow, and loves the stranger '
  - type: text
    content: or
  - type: text
    content: ' temporary resident and gives him food and clothing.'
  '19':
  - type: text
    content: ' Therefore love the stranger '
  - type: text
    content: and
  - type: text
    content: ' sojourner, for you were strangers '
  - type: text
    content: and
  - type: text
    content: ' sojourners in the land of Egypt.'
  '2':
  - type: text
    content: ' And I will write on the tables the words that were on the first tables which you broke, and you shall put them in the ark.'
  '20':
  - type: text
    content: ' You shall [reverently] fear the Lord your God; you shall serve Him and cling to Him, and by His name '
  - type: text
    content: and
  - type: text
    content: ' presence you shall swear.'
  '21':
  - type: text
    content: ' He is your praise; He is your God, Who has done for you these great and terrible things which your eyes have seen.'
  '22':
  - type: text
    content: ' Your fathers went down to Egypt seventy persons in all, and now the Lord your God has made you as the stars of the heavens for multitude.'
  '3':
  - type: text
    content: ' So I [Moses] made an ark of acacia wood and hewed two tables of stone like the first, and went up the mountain with the two tables of stone in my [one] hand.'
  '4':
  - type: text
    content: ' And the Lord wrote on the tables as at the first writing, the Ten Commandments which the Lord had spoken to you on the mountain out of the midst of the fire on the day of the assembly; and the Lord gave them to me.'
  '5':
  - type: text
    content: ' And I turned and came down from the mountain and put the tables in the ark which I had made; and there they are, as the Lord commanded me.'
  '6':
  - type: text
    content: ' (The Israelites journeyed from the wells of the sons of Jaakan to Moserah. There Aaron died, and there he was buried, and Eleazar his son ministered in the priest''s office in his stead.'
  '7':
  - type: text
    content: ' From there they journeyed to Gudgodah, and then to Jotbathah, a land of brooks [dividing the valley].'
  '8':
  - type: text
    content: ' At that time the Lord set apart the tribe of Levi to bear the ark of the covenant of the Lord, to stand before the Lord to minister to Him and to bless in His name unto this day.'
  '9':
  - type: text
    content: ' Therefore Levi has no part or inheritance with his brethren; the Lord is his inheritance, as the Lord your God promised him.)'
