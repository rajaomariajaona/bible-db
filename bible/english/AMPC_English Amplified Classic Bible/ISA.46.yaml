document_id: ISA.46
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BEL BOWS down, Nebo stoops [gods of Babylon, whose idols are being carried off]; their idols are on the beasts [of burden] and on the cattle. These things that you carry about are loaded as burdens on the weary beasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [The gods] stoop, they bow down together; they cannot save [their own idols], but are themselves going into captivity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Listen to Me [says the Lord], O house of Jacob, and all the remnant of the house of Israel, you who have been borne by Me from your birth, carried from the womb:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Even to your old age I am He, and even to hair white with age will I carry you. I have made, and I will bear; yes, I will carry and will save you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' To whom will you liken Me and make Me equal and compare Me, that we may be alike? [Isa. 40:18-20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They lavish gold out of the cup '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bag, weigh out silver on the scales, and hire a goldsmith, and he fashions it into a god; [then] they fall down, yes, they worship it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They bear it upon their shoulders [in religious processions or into battle]; they carry it and set it down in its place, and there it stands. It cannot move from its place. Even if one cries to it for help, yet [the idol] cannot answer or save him out of his distress.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' [Earnestly] remember this, be ashamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' own yourselves guilty; bring it again to mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lay it to heart, O you rebels!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' [Earnestly] remember the former things, [which I did] of old; for I am God, and there is no one else; I am God, and there is none like Me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Declaring the end '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the result from the beginning, and from ancient times the things that are not yet done, saying, My counsel shall stand, and I will do all My pleasure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Calling a ravenous bird from the east–the man [Cyrus] who executes My counsel from a far country. Yes, I have spoken, and I will bring it to pass; I have purposed it, and I will do it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Listen to Me, you stiff-hearted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' you who have lost heart, you who are far from righteousness (from uprightness and right standing with God, and from His righteous deliverance).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I bring near My righteousness [in the deliverance of Israel], it will not be far off; and My salvation shall not tarry. And I will put salvation in Zion, for Israel My glory [yes, give salvation in Zion and My glory to Israel].'
