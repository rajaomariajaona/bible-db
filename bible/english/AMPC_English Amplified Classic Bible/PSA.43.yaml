document_id: PSA.43
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' JUDGE '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vindicate me, O God; plead and defend my cause against an ungodly nation. O deliver me from the deceitful and unjust man!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For You are the God of my strength [my Stronghold–in Whom I take refuge]; why have You cast me off? Why go I mourning because of the oppression of the enemy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' O send out Your light and Your truth, let them lead me; let them bring me to Your holy hill and to Your dwelling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then will I go to the altar of God, to God, my exceeding joy; yes, with the lyre will I praise You, O God, my God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Why are you cast down, O my inner self? And why should you moan over me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be disquieted within me? Hope in God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wait expectantly for Him, for I shall yet praise Him, Who is the help of my [sad] countenance, and my God.'
