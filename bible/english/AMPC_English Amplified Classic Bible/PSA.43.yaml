document_id: PSA.43,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' JUDGE '
  - type: text
    content: and
  - type: text
    content: ' vindicate me, O God; plead and defend my cause against an ungodly nation. O deliver me from the deceitful and unjust man!'
  '2':
  - type: text
    content: ' For You are the God of my strength [my Stronghold–in Whom I take refuge]; why have You cast me off? Why go I mourning because of the oppression of the enemy?'
  '3':
  - type: text
    content: ' O send out Your light and Your truth, let them lead me; let them bring me to Your holy hill and to Your dwelling.'
  '4':
  - type: text
    content: ' Then will I go to the altar of God, to God, my exceeding joy; yes, with the lyre will I praise You, O God, my God!'
  '5':
  - type: text
    content: ' Why are you cast down, O my inner self? And why should you moan over me '
  - type: text
    content: and
  - type: text
    content: ' be disquieted within me? Hope in God '
  - type: text
    content: and
  - type: text
    content: ' wait expectantly for Him, for I shall yet praise Him, Who is the help of my [sad] countenance, and my God.'
