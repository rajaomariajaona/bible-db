document_id: HOS.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEAR THE word of the Lord, you children of Israel, for the Lord has a controversy (a pleading contention) with the inhabitants of the land, because there is no faithfulness, love, pity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy, or knowledge of God [from personal experience with Him] in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' There is nothing but [false] swearing and breaking faith and killing and stealing and committing adultery; they break out [into violence], one [deed of] bloodshed following close on another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Therefore shall the land [continually] mourn, and all who dwell in it shall languish, together with the wild beasts of the open country and the birds of the heavens; yes, the fishes of the sea also shall [perish because of the drought] be collected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taken away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Yet let no man strive, neither let any man reprove [another–do not waste your time in mutual recriminations], for with you is My contention, O priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And you shall stumble in the daytime, and the [false] prophet also shall stumble with you in the night; and I will destroy your mother [the priestly nation]. [Exod. 19:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' My people are destroyed for lack of knowledge; because you [the priestly nation] have rejected knowledge, I will also reject you that you shall be no priest to Me; seeing you have forgotten the law of your God, I will also forget your children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The more they increased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' multiplied [in prosperity and power], the more they sinned against Me; I will change their glory into shame.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They feed on the sin of My people and set their heart on their iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And it shall be: Like people, like priest; I will punish them for their ways and repay them for their doings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For they shall eat and not have enough; they shall play the harlot and beget no increase, because they have forsaken the Lord for harlotry;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Harlotry and wine and new wine take away the heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the spiritual understanding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' My people [habitually] ask counsel of their [senseless] wood [idols], and their staff [of wood] gives them oracles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instructs them. For the spirit of harlotry has led them astray and they have played the harlot, withdrawing themselves from subjection to their God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' They sacrifice on the tops of the mountains, and they burn incense upon the hills and under oaks, poplars, and terebinths, because there the shade is good. Therefore your daughters play the harlot and your sons'' wives commit adultery.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I will not punish your daughters when they play the harlot nor your daughters-in-law when they commit adultery, for [the fathers and husbands] themselves go aside in order to be alone with women who prostitute themselves for gain, and they sacrifice at the altar with dedicated harlots [who surrender their chastity in honor of the goddess]. Therefore the people without understanding shall stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come to ruin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Though you, Israel, play the harlot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship idols, let not Judah offend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become guilty; come not to Gilgal, neither go up to Beth-aven [contemptuous reference to Bethel, then noted for idolatry], nor swear [in idolatrous service, saying], As the Lord lives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For Israel has behaved stubbornly, like a stubborn heifer. How then should he expect to be fed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treated by the Lord like a lamb in a large pasture?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Ephraim is joined [fast] to idols, [so] let him alone [to take the consequences].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Their drinking carousal over, they go habitually to play the harlot; [Ephraim''s] rulers [continue to] love shame more than her glory [which is the Lord, Israel''s God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The resistless wind [of God''s wrath] has bound up [Israel] in its wings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' skirts, and [in captivity] they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their altars shall be put to shame because of their sacrifices [to calves, to sun, moon, and stars, and to heathen gods].'
