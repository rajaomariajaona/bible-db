document_id: HOS.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' HEAR THE word of the Lord, you children of Israel, for the Lord has a controversy (a pleading contention) with the inhabitants of the land, because there is no faithfulness, love, pity '
  - type: text
    content: and
  - type: text
    content: ' mercy, or knowledge of God [from personal experience with Him] in the land.'
  '10':
  - type: text
    content: ' For they shall eat and not have enough; they shall play the harlot and beget no increase, because they have forsaken the Lord for harlotry;'
  '11':
  - type: text
    content: ' Harlotry and wine and new wine take away the heart '
  - type: text
    content: and
  - type: text
    content: ' the mind '
  - type: text
    content: and
  - type: text
    content: ' the spiritual understanding.'
  '12':
  - type: text
    content: ' My people [habitually] ask counsel of their [senseless] wood [idols], and their staff [of wood] gives them oracles '
  - type: text
    content: and
  - type: text
    content: ' instructs them. For the spirit of harlotry has led them astray and they have played the harlot, withdrawing themselves from subjection to their God.'
  '13':
  - type: text
    content: ' They sacrifice on the tops of the mountains, and they burn incense upon the hills and under oaks, poplars, and terebinths, because there the shade is good. Therefore your daughters play the harlot and your sons'' wives commit adultery.'
  '14':
  - type: text
    content: ' I will not punish your daughters when they play the harlot nor your daughters-in-law when they commit adultery, for [the fathers and husbands] themselves go aside in order to be alone with women who prostitute themselves for gain, and they sacrifice at the altar with dedicated harlots [who surrender their chastity in honor of the goddess]. Therefore the people without understanding shall stumble '
  - type: text
    content: and
  - type: text
    content: ' fall '
  - type: text
    content: and
  - type: text
    content: ' come to ruin.'
  '15':
  - type: text
    content: ' Though you, Israel, play the harlot '
  - type: text
    content: and
  - type: text
    content: ' worship idols, let not Judah offend '
  - type: text
    content: and
  - type: text
    content: ' become guilty; come not to Gilgal, neither go up to Beth-aven [contemptuous reference to Bethel, then noted for idolatry], nor swear [in idolatrous service, saying], As the Lord lives.'
  '16':
  - type: text
    content: ' For Israel has behaved stubbornly, like a stubborn heifer. How then should he expect to be fed '
  - type: text
    content: and
  - type: text
    content: ' treated by the Lord like a lamb in a large pasture?'
  '17':
  - type: text
    content: ' Ephraim is joined [fast] to idols, [so] let him alone [to take the consequences].'
  '18':
  - type: text
    content: ' Their drinking carousal over, they go habitually to play the harlot; [Ephraim''s] rulers [continue to] love shame more than her glory [which is the Lord, Israel''s God].'
  '19':
  - type: text
    content: ' The resistless wind [of God''s wrath] has bound up [Israel] in its wings '
  - type: text
    content: or
  - type: text
    content: ' skirts, and [in captivity] they '
  - type: text
    content: and
  - type: text
    content: ' their altars shall be put to shame because of their sacrifices [to calves, to sun, moon, and stars, and to heathen gods].'
  '2':
  - type: text
    content: ' There is nothing but [false] swearing and breaking faith and killing and stealing and committing adultery; they break out [into violence], one [deed of] bloodshed following close on another.'
  '3':
  - type: text
    content: ' Therefore shall the land [continually] mourn, and all who dwell in it shall languish, together with the wild beasts of the open country and the birds of the heavens; yes, the fishes of the sea also shall [perish because of the drought] be collected '
  - type: text
    content: and
  - type: text
    content: ' taken away.'
  '4':
  - type: text
    content: ' Yet let no man strive, neither let any man reprove [another–do not waste your time in mutual recriminations], for with you is My contention, O priest.'
  '5':
  - type: text
    content: ' And you shall stumble in the daytime, and the [false] prophet also shall stumble with you in the night; and I will destroy your mother [the priestly nation]. [Exod. 19:6.]'
  '6':
  - type: text
    content: ' My people are destroyed for lack of knowledge; because you [the priestly nation] have rejected knowledge, I will also reject you that you shall be no priest to Me; seeing you have forgotten the law of your God, I will also forget your children.'
  '7':
  - type: text
    content: ' The more they increased '
  - type: text
    content: and
  - type: text
    content: ' multiplied [in prosperity and power], the more they sinned against Me; I will change their glory into shame.'
  '8':
  - type: text
    content: ' They feed on the sin of My people and set their heart on their iniquity.'
  '9':
  - type: text
    content: ' And it shall be: Like people, like priest; I will punish them for their ways and repay them for their doings.'
