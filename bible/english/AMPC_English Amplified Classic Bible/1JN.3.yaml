document_id: 1JN.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SEE WHAT [an incredible] quality of love the Father has given (shown, bestowed on) us, that we should [be permitted to] be named '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' called '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counted the children of God! And so we are! The reason that the world does not know (recognize, acknowledge) us is that it does not know (recognize, acknowledge) Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Beloved, we are [even here and] now God''s children; it is not yet disclosed (made clear) what we shall be [hereafter], but we know that when He comes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is manifested, we shall [as God''s children] resemble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be like Him, for we shall see Him just as He [really] is.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And everyone who has this hope [resting] on Him cleanses (purifies) himself just as He is pure (chaste, undefiled, guiltless).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Everyone who commits (practices) sin is guilty of lawlessness; for [that is what] sin is, lawlessness (the breaking, violating of God''s law by transgression or neglect–being unrestrained and unregulated by His commands and His will).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You know that He appeared in visible form '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' became Man to take away [upon Himself] sins, and in Him there is no sin [essentially and forever].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' No one who abides in Him [who lives and remains in communion with and in obedience to Him–deliberately, knowingly, and habitually] commits (practices) sin. No one who [habitually] sins has either seen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' known Him [recognized, perceived, or understood Him, or has had an experiential acquaintance with Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Boys (lads), let no one deceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lead you astray. He who practices righteousness [who is upright, conforming to the divine will in purpose, thought, and action, living a consistently conscientious life] is righteous, even as He is righteous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' [But] he who commits sin [who practices evildoing] is of the devil [takes his character from the evil one], for the devil has sinned (violated the divine law) from the beginning. The reason the Son of God was made manifest (visible) was to undo (destroy, loosen, and dissolve) the works the devil [has done].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' No one born (begotten) of God [deliberately, knowingly, and habitually] practices sin, for God''s nature abides in him [His principle of life, the divine sperm, remains permanently within him]; and he cannot practice sinning because he is born (begotten) of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' By this it is made clear who take their nature from God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are His children and who take their nature from the devil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are his children: no one who does not practice righteousness [who does not conform to God''s will in purpose, thought, and action] is of God; neither is anyone who does not love his brother (his fellow believer in Christ).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For this is the message (the announcement) which you have heard from the first, that we should love one another,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' [And] not be like Cain who [took his nature and got his motivation] from the evil one and slew his brother. And why did he slay him? Because his deeds (activities, works) were wicked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' malicious and his brother''s were righteous (virtuous).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Do not be surprised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wonder, brethren, that the world detests '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pursues you with hatred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' We know that we have passed over out of death into Life by the fact that we love the brethren (our fellow Christians). He who does not love abides (remains, is held and kept continually) in [spiritual] death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Anyone who hates (abominates, detests) his brother [in Christ] is [at heart] a murderer, and you know that no murderer has eternal life abiding (persevering) within him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' By this we come to know (progressively to recognize, to perceive, to understand) the [essential] love: that He laid down His [own] life for us; and we ought to lay [our] lives down for [those who are our] brothers [in Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But if anyone has this world''s goods (resources for sustaining life) and sees his brother '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fellow believer in need, yet closes his heart of compassion against him, how can the love of God live '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remain in him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Little children, let us not love [merely] in theory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' in speech but in deed and in truth (in practice and in sincerity).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' By this we shall come to know (perceive, recognize, and understand) that we are of the Truth, and can reassure (quiet, conciliate, and pacify) our hearts in His presence,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Whenever our hearts in [tormenting] self-accusation make us feel guilty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemn us. [For we are in God''s hands.] For He is above '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' greater than our consciences (our hearts), and He knows (perceives and understands) everything [nothing is hidden from Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And, beloved, if our consciences (our hearts) do not accuse us [if they do not make us feel guilty and condemn us], we have confidence (complete assurance and boldness) before God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And we receive from Him whatever we ask, because we [watchfully] obey His orders [observe His suggestions and injunctions, follow His plan for us] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [habitually] practice what is pleasing to Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And this is His order (His command, His injunction): that we should believe in (put our faith and trust in and adhere to and rely on) the name of His Son Jesus Christ (the Messiah), and that we should love one another, just as He has commanded us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' All who keep His commandments [who obey His orders and follow His plan, live and continue to live, to stay and] abide in Him, and He in them. [They let Christ be a home to them and they are the home of Christ.] And by this we know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have the proof that He [really] lives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' makes His home in us: by the [Holy] Spirit Whom He has given us.'
