document_id: 1JN.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SEE WHAT [an incredible] quality of love the Father has given (shown, bestowed on) us, that we should [be permitted to] be named '
  - type: text
    content: and
  - type: text
    content: ' called '
  - type: text
    content: and
  - type: text
    content: ' counted the children of God! And so we are! The reason that the world does not know (recognize, acknowledge) us is that it does not know (recognize, acknowledge) Him.'
  '10':
  - type: text
    content: ' By this it is made clear who take their nature from God '
  - type: text
    content: and
  - type: text
    content: ' are His children and who take their nature from the devil '
  - type: text
    content: and
  - type: text
    content: ' are his children: no one who does not practice righteousness [who does not conform to God''s will in purpose, thought, and action] is of God; neither is anyone who does not love his brother (his fellow believer in Christ).'
  '11':
  - type: text
    content: ' For this is the message (the announcement) which you have heard from the first, that we should love one another,'
  '12':
  - type: text
    content: ' [And] not be like Cain who [took his nature and got his motivation] from the evil one and slew his brother. And why did he slay him? Because his deeds (activities, works) were wicked '
  - type: text
    content: and
  - type: text
    content: ' malicious and his brother''s were righteous (virtuous).'
  '13':
  - type: text
    content: ' Do not be surprised '
  - type: text
    content: and
  - type: text
    content: ' wonder, brethren, that the world detests '
  - type: text
    content: and
  - type: text
    content: ' pursues you with hatred.'
  '14':
  - type: text
    content: ' We know that we have passed over out of death into Life by the fact that we love the brethren (our fellow Christians). He who does not love abides (remains, is held and kept continually) in [spiritual] death.'
  '15':
  - type: text
    content: ' Anyone who hates (abominates, detests) his brother [in Christ] is [at heart] a murderer, and you know that no murderer has eternal life abiding (persevering) within him.'
  '16':
  - type: text
    content: ' By this we come to know (progressively to recognize, to perceive, to understand) the [essential] love: that He laid down His [own] life for us; and we ought to lay [our] lives down for [those who are our] brothers [in Him].'
  '17':
  - type: text
    content: ' But if anyone has this world''s goods (resources for sustaining life) and sees his brother '
  - type: text
    content: and
  - type: text
    content: ' fellow believer in need, yet closes his heart of compassion against him, how can the love of God live '
  - type: text
    content: and
  - type: text
    content: ' remain in him?'
  '18':
  - type: text
    content: ' Little children, let us not love [merely] in theory '
  - type: text
    content: or
  - type: text
    content: ' in speech but in deed and in truth (in practice and in sincerity).'
  '19':
  - type: text
    content: ' By this we shall come to know (perceive, recognize, and understand) that we are of the Truth, and can reassure (quiet, conciliate, and pacify) our hearts in His presence,'
  '2':
  - type: text
    content: ' Beloved, we are [even here and] now God''s children; it is not yet disclosed (made clear) what we shall be [hereafter], but we know that when He comes '
  - type: text
    content: and
  - type: text
    content: ' is manifested, we shall [as God''s children] resemble '
  - type: text
    content: and
  - type: text
    content: ' be like Him, for we shall see Him just as He [really] is.'
  '20':
  - type: text
    content: ' Whenever our hearts in [tormenting] self-accusation make us feel guilty '
  - type: text
    content: and
  - type: text
    content: ' condemn us. [For we are in God''s hands.] For He is above '
  - type: text
    content: and
  - type: text
    content: ' greater than our consciences (our hearts), and He knows (perceives and understands) everything [nothing is hidden from Him].'
  '21':
  - type: text
    content: ' And, beloved, if our consciences (our hearts) do not accuse us [if they do not make us feel guilty and condemn us], we have confidence (complete assurance and boldness) before God,'
  '22':
  - type: text
    content: ' And we receive from Him whatever we ask, because we [watchfully] obey His orders [observe His suggestions and injunctions, follow His plan for us] '
  - type: text
    content: and
  - type: text
    content: ' [habitually] practice what is pleasing to Him.'
  '23':
  - type: text
    content: ' And this is His order (His command, His injunction): that we should believe in (put our faith and trust in and adhere to and rely on) the name of His Son Jesus Christ (the Messiah), and that we should love one another, just as He has commanded us.'
  '24':
  - type: text
    content: ' All who keep His commandments [who obey His orders and follow His plan, live and continue to live, to stay and] abide in Him, and He in them. [They let Christ be a home to them and they are the home of Christ.] And by this we know '
  - type: text
    content: and
  - type: text
    content: ' understand '
  - type: text
    content: and
  - type: text
    content: ' have the proof that He [really] lives '
  - type: text
    content: and
  - type: text
    content: ' makes His home in us: by the [Holy] Spirit Whom He has given us.'
  '3':
  - type: text
    content: ' And everyone who has this hope [resting] on Him cleanses (purifies) himself just as He is pure (chaste, undefiled, guiltless).'
  '4':
  - type: text
    content: ' Everyone who commits (practices) sin is guilty of lawlessness; for [that is what] sin is, lawlessness (the breaking, violating of God''s law by transgression or neglect–being unrestrained and unregulated by His commands and His will).'
  '5':
  - type: text
    content: ' You know that He appeared in visible form '
  - type: text
    content: and
  - type: text
    content: ' became Man to take away [upon Himself] sins, and in Him there is no sin [essentially and forever].'
  '6':
  - type: text
    content: ' No one who abides in Him [who lives and remains in communion with and in obedience to Him–deliberately, knowingly, and habitually] commits (practices) sin. No one who [habitually] sins has either seen '
  - type: text
    content: or
  - type: text
    content: ' known Him [recognized, perceived, or understood Him, or has had an experiential acquaintance with Him].'
  '7':
  - type: text
    content: ' Boys (lads), let no one deceive '
  - type: text
    content: and
  - type: text
    content: ' lead you astray. He who practices righteousness [who is upright, conforming to the divine will in purpose, thought, and action, living a consistently conscientious life] is righteous, even as He is righteous.'
  '8':
  - type: text
    content: ' [But] he who commits sin [who practices evildoing] is of the devil [takes his character from the evil one], for the devil has sinned (violated the divine law) from the beginning. The reason the Son of God was made manifest (visible) was to undo (destroy, loosen, and dissolve) the works the devil [has done].'
  '9':
  - type: text
    content: ' No one born (begotten) of God [deliberately, knowingly, and habitually] practices sin, for God''s nature abides in him [His principle of life, the divine sperm, remains permanently within him]; and he cannot practice sinning because he is born (begotten) of God.'
