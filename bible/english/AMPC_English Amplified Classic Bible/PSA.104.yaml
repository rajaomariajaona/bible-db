document_id: PSA.104
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BLESS (AFFECTIONATELY, gratefully praise) the Lord, O my soul! O Lord my God, You are very great! You are clothed with honor and majesty–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [You are the One] Who covers Yourself with light as with a garment, Who stretches out the heavens like a curtain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a tent,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Who lays the beams of the upper room of His abode in the waters [above the firmament], Who makes the clouds His chariot, Who walks on the wings of the wind,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Who makes winds His messengers, flames of fire His ministers. [Heb. 1:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You laid the foundations of the earth, that it should not be moved forever. [Job 38:4, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You covered it with the deep as with a garment; the waters stood above the mountains. [Gen. 1:2; II Pet. 3:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' At Your rebuke they fled; at the voice of Your thunder they hastened away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The mountains rose, the valleys sank down to the place which You appointed for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You have set a boundary [for the waters] which they may not pass over, that they turn not again to deluge the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He sends forth springs into the valleys; their waters run among the mountains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They give drink to every [wild] beast of the field; the wild asses quench their thirst there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Beside them the birds of the heavens have their nests; they sing among the branches. [Matt. 13:32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He waters the mountains from His upper rooms; the earth is satisfied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abounds with the fruit of His works.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He causes vegetation to grow for the cattle, and all that the earth produces for man to cultivate, that he may bring forth food out of the earth–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And wine that gladdens the heart of man, to make his face shine more than oil, and bread to support, refresh, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthen man''s heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The trees of the Lord are watered abundantly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are filled with sap, the cedars of Lebanon which He has planted,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Where the birds make their nests; as for the stork, the fir trees are her house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The high mountains are for the wild goats; the rocks are a refuge for the conies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' badgers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [The Lord] appointed the moon for the seasons; the sun knows [the exact time of] its setting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You [O Lord] make darkness and it becomes night, in which creeps forth every wild beast of the forest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The young lions roar after their prey and seek their food from God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When the sun arises, they withdraw themselves and lie down in their dens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Man goes forth to his work and remains at his task until evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' O Lord, how many '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' varied are Your works! In wisdom have You made them all; the earth is full of Your riches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your creatures.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Yonder is the sea, great and wide, in which are swarms of innumerable creeping things, creatures both small and great.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' There go the ships of the sea, and Leviathan (the sea monster), which You have formed to sport in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' These all wait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are dependent upon You, that You may give them their food in due season.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' When You give it to them, they gather it up; You open Your hand, and they are filled with good things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' When You hide Your face, they are troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dismayed; when You take away their breath, they die and return to their dust.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' When You send forth Your Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give them breath, they are created, and You replenish the face of the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' May the glory of the Lord endure forever; may the Lord rejoice in His works–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Who looks on the earth, and it quakes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trembles, Who touches the mountains, and they smoke!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' I will sing to the Lord as long as I live; I will sing praise to my God while I have any being.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' May my meditation be sweet to Him; as for me, I will rejoice in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Let sinners be consumed from the earth, and let the wicked be no more. Bless (affectionately, gratefully praise) the Lord, O my soul! Praise the Lord! (Hallelujah!)'
