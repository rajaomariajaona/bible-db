document_id: LEV.26
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' YOU SHALL make for yourselves no idols nor shall you erect a graven image, pillar, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' obelisk, nor shall you place any figured stone in your land to which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' on which to bow down; for I am the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' You shall keep My Sabbaths and reverence My sanctuary. I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' If you walk in My statutes and keep My commandments and do them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I will give you rain in due season, and the land shall yield her increase and the trees of the field yield their fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And your threshing [time] shall reach to the vintage and the vintage [time] shall reach to the sowing time, and you shall eat your bread to the full and dwell in your land securely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I will give peace in the land; you shall lie down and none shall fill you with dread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' make you afraid; and I will clear ferocious (wild) beasts out of the land, and no sword shall go through your land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And you shall chase your enemies, and they shall fall before you by the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Five of you shall chase a hundred, and a hundred of you shall put ten thousand to flight; your enemies shall fall before you by the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For I will be leaning toward you with favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' regard for you, rendering you fruitful, multiplying you, and establishing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ratifying My covenant with you. [II Kings 13:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And you shall eat the [abundant] old store of produce long kept, and clear out the old [to make room] for the new.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I will set My dwelling in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' among you, and My soul shall not despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reject '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' separate itself from you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And I will walk in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' among you and will be your God, and you shall be My people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I am the Lord your God, Who brought you forth out of the land of Egypt, that you should no more be slaves; and I have broken the bars of your yoke and made you walk erect [as free men].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But if you will not hearken to Me and will not do all these commandments,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And if you spurn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despise My statutes, and if your soul despises '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejects My ordinances, so that you will not do all My commandments, but break My covenant,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I will do this: I will appoint over you [sudden] terror (trembling, trouble), even consumption and fever that consume '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' waste the eyes and make the [physical] life pine away. You shall sow your seed in vain, for your enemies shall eat it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I [the Lord] will set My face against you and you shall be defeated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slain before your enemies; they who hate you shall rule over you; you shall flee when no one pursues you. [I Sam. 4:10; 31:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And if in spite of all this you still will not listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be obedient to Me, then I will chastise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discipline you seven times more for your sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And I will break '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humble your pride in your power, and I will make your heavens as iron [yielding no answer, no blessing, no rain] and your earth [as sterile] as brass. [I Kings 17:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And your strength shall be spent in vain, for your land shall not yield its increase, neither shall the trees of the land yield their fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' If you walk contrary to Me and will not heed Me, I will bring seven times more plagues upon you, according to your sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' I will loose the wild beasts of the field among you, which shall rob you of your children, destroy your livestock, and make you few so that your roads shall be deserted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolate. [II Kings 17:25, 26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' If by these means you are not turned to Me but determine to walk contrary to Me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' I also will walk contrary to you, and I will smite you seven times for your sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And I will bring a sword upon you that shall execute the vengeance [for the breaking] of My covenant; and you shall be gathered together within your cities, and I will send the pestilence among you, and you shall be delivered into the hands of the enemy. [Num. 16:49; II Sam. 24:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' When I break your staff of bread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cut off your supply of food, ten women shall bake your bread in one oven, and they shall ration your bread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliver it again by weight; and you shall eat, and not be satisfied. [Hag. 1:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And if in spite of all this you will not listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give heed to Me but walk contrary to Me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Then I will walk contrary to you in wrath, and I also will chastise you seven times for your sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' You shall eat the flesh of your sons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of your daughters. [II Kings 6:28, 29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And I will destroy your high places [devoted to idolatrous worship], and cut down your sun-images, and throw your dead bodies upon the [wrecked] bodies of your idols, and My soul shall abhor you [with deep and unutterable loathing]. [II Kings 23:8, 20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' I will lay your cities waste, bring your sanctuaries to desolation, and I will not smell the fragrance of your sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing odors [of offerings made by fire]. [II Kings 25:4-10; II Chron. 36:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And I will bring the land into desolation, and your enemies who dwell in it shall be astonished at it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' I will scatter you among the nations and draw out [your enemies''] sword after you; and your land shall be desolate and your cities a waste. [Ps. 44:11-14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Then shall the land [of Israel have the opportunity to] enjoy its sabbaths as long as it lies desolate and you are in your enemies'' land; then shall the land rest, to enjoy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' receive payments for its sabbaths [divinely ordained for it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' As long as it lies desolate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' waste, it shall have rest, the rest it did not have in your sabbaths when you dwelt upon it. [II Chron. 36:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' As for those who are left of you, I will send dejection (lack of courage, a faintness) into their hearts in the lands of their enemies; the sound of a driven leaf shall put them to hasty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tumultuous flight, and they shall flee as if from the sword, and fall when no one pursues them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' They shall stumble over one another as if to escape a sword when no one pursues them; and you shall have no power to stand before your enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' You shall perish among the nations; the land of your enemies shall eat you up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And those of you who are left shall pine away in their iniquity in your enemies'' lands; also in the iniquities of their fathers shall they pine away like them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' But if they confess their own and their fathers'' iniquity in their treachery which they committed against Me–and also that because they walked contrary to Me'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' I also walked contrary to them and brought them into the land of their enemies–if then their uncircumcised hearts are humbled and they then accept the punishment for their iniquity, [II Kings 24:10-14; Dan. 9:11-14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Then will I [earnestly] remember My covenant with Jacob, My covenant with Isaac, and My covenant with Abraham, and [earnestly] remember the land. [Ps. 106:44-46.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' But the land shall be left behind them and shall enjoy its sabbaths while it lies desolate without them; and they shall accept the punishment for their sins '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make amends because they despised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected My ordinances and their soul scorned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected My statutes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And yet for all that, when they are in the land of their enemies, I will not spurn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cast them away, neither will I despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abhor them to destroy them utterly and to break My covenant with them, for I am the Lord their God. [Deut. 4:31-35; Jer. 33:4, 5, 23-26; Rom. 11:2-5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' But I will for their sake [earnestly] remember the covenant with their forefathers whom I brought forth out of the land of Egypt in the sight of the nations, that I might be their God. I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' These are the statutes, ordinances, and laws which the Lord made between Him and the Israelites on Mount Sinai through Moses.'
