verses:
  '1':
  - type: text
    content: ' YOU SHALL make for yourselves no idols nor shall you erect a graven image, pillar, '
  - type: text
    content: or
  - type: text
    content: ' obelisk, nor shall you place any figured stone in your land to which '
  - type: text
    content: or
  - type: text
    content: ' on which to bow down; for I am the Lord your God.'
  '10':
  - type: text
    content: ' And you shall eat the [abundant] old store of produce long kept, and clear out the old [to make room] for the new.'
  '11':
  - type: text
    content: ' I will set My dwelling in '
  - type: text
    content: and
  - type: text
    content: ' among you, and My soul shall not despise '
  - type: text
    content: or
  - type: text
    content: ' reject '
  - type: text
    content: or
  - type: text
    content: ' separate itself from you.'
  '12':
  - type: text
    content: ' And I will walk in '
  - type: text
    content: and
  - type: text
    content: ' with '
  - type: text
    content: and
  - type: text
    content: ' among you and will be your God, and you shall be My people.'
  '13':
  - type: text
    content: ' I am the Lord your God, Who brought you forth out of the land of Egypt, that you should no more be slaves; and I have broken the bars of your yoke and made you walk erect [as free men].'
  '14':
  - type: text
    content: ' But if you will not hearken to Me and will not do all these commandments,'
  '15':
  - type: text
    content: ' And if you spurn '
  - type: text
    content: and
  - type: text
    content: ' despise My statutes, and if your soul despises '
  - type: text
    content: and
  - type: text
    content: ' rejects My ordinances, so that you will not do all My commandments, but break My covenant,'
  '16':
  - type: text
    content: ' I will do this: I will appoint over you [sudden] terror (trembling, trouble), even consumption and fever that consume '
  - type: text
    content: and
  - type: text
    content: ' waste the eyes and make the [physical] life pine away. You shall sow your seed in vain, for your enemies shall eat it.'
  '17':
  - type: text
    content: ' I [the Lord] will set My face against you and you shall be defeated '
  - type: text
    content: and
  - type: text
    content: ' slain before your enemies; they who hate you shall rule over you; you shall flee when no one pursues you. [I Sam. 4:10; 31:1.]'
  '18':
  - type: text
    content: ' And if in spite of all this you still will not listen '
  - type: text
    content: and
  - type: text
    content: ' be obedient to Me, then I will chastise '
  - type: text
    content: and
  - type: text
    content: ' discipline you seven times more for your sins.'
  '19':
  - type: text
    content: ' And I will break '
  - type: text
    content: and
  - type: text
    content: ' humble your pride in your power, and I will make your heavens as iron [yielding no answer, no blessing, no rain] and your earth [as sterile] as brass. [I Kings 17:1.]'
  '2':
  - type: text
    content: ' You shall keep My Sabbaths and reverence My sanctuary. I am the Lord.'
  '20':
  - type: text
    content: ' And your strength shall be spent in vain, for your land shall not yield its increase, neither shall the trees of the land yield their fruit.'
  '21':
  - type: text
    content: ' If you walk contrary to Me and will not heed Me, I will bring seven times more plagues upon you, according to your sins.'
  '22':
  - type: text
    content: ' I will loose the wild beasts of the field among you, which shall rob you of your children, destroy your livestock, and make you few so that your roads shall be deserted '
  - type: text
    content: and
  - type: text
    content: ' desolate. [II Kings 17:25, 26.]'
  '23':
  - type: text
    content: ' If by these means you are not turned to Me but determine to walk contrary to Me,'
  '24':
  - type: text
    content: ' I also will walk contrary to you, and I will smite you seven times for your sins.'
  '25':
  - type: text
    content: ' And I will bring a sword upon you that shall execute the vengeance [for the breaking] of My covenant; and you shall be gathered together within your cities, and I will send the pestilence among you, and you shall be delivered into the hands of the enemy. [Num. 16:49; II Sam. 24:15.]'
  '26':
  - type: text
    content: ' When I break your staff of bread '
  - type: text
    content: and
  - type: text
    content: ' cut off your supply of food, ten women shall bake your bread in one oven, and they shall ration your bread '
  - type: text
    content: and
  - type: text
    content: ' deliver it again by weight; and you shall eat, and not be satisfied. [Hag. 1:6.]'
  '27':
  - type: text
    content: ' And if in spite of all this you will not listen '
  - type: text
    content: and
  - type: text
    content: ' give heed to Me but walk contrary to Me,'
  '28':
  - type: text
    content: ' Then I will walk contrary to you in wrath, and I also will chastise you seven times for your sins.'
  '29':
  - type: text
    content: ' You shall eat the flesh of your sons '
  - type: text
    content: and
  - type: text
    content: ' of your daughters. [II Kings 6:28, 29.]'
  '3':
  - type: text
    content: ' If you walk in My statutes and keep My commandments and do them,'
  '30':
  - type: text
    content: ' And I will destroy your high places [devoted to idolatrous worship], and cut down your sun-images, and throw your dead bodies upon the [wrecked] bodies of your idols, and My soul shall abhor you [with deep and unutterable loathing]. [II Kings 23:8, 20.]'
  '31':
  - type: text
    content: ' I will lay your cities waste, bring your sanctuaries to desolation, and I will not smell the fragrance of your sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing odors [of offerings made by fire]. [II Kings 25:4-10; II Chron. 36:19.]'
  '32':
  - type: text
    content: ' And I will bring the land into desolation, and your enemies who dwell in it shall be astonished at it.'
  '33':
  - type: text
    content: ' I will scatter you among the nations and draw out [your enemies''] sword after you; and your land shall be desolate and your cities a waste. [Ps. 44:11-14.]'
  '34':
  - type: text
    content: ' Then shall the land [of Israel have the opportunity to] enjoy its sabbaths as long as it lies desolate and you are in your enemies'' land; then shall the land rest, to enjoy '
  - type: text
    content: and
  - type: text
    content: ' receive payments for its sabbaths [divinely ordained for it].'
  '35':
  - type: text
    content: ' As long as it lies desolate '
  - type: text
    content: and
  - type: text
    content: ' waste, it shall have rest, the rest it did not have in your sabbaths when you dwelt upon it. [II Chron. 36:21.]'
  '36':
  - type: text
    content: ' As for those who are left of you, I will send dejection (lack of courage, a faintness) into their hearts in the lands of their enemies; the sound of a driven leaf shall put them to hasty '
  - type: text
    content: and
  - type: text
    content: ' tumultuous flight, and they shall flee as if from the sword, and fall when no one pursues them.'
  '37':
  - type: text
    content: ' They shall stumble over one another as if to escape a sword when no one pursues them; and you shall have no power to stand before your enemies.'
  '38':
  - type: text
    content: ' You shall perish among the nations; the land of your enemies shall eat you up.'
  '39':
  - type: text
    content: ' And those of you who are left shall pine away in their iniquity in your enemies'' lands; also in the iniquities of their fathers shall they pine away like them.'
  '4':
  - type: text
    content: ' I will give you rain in due season, and the land shall yield her increase and the trees of the field yield their fruit.'
  '40':
  - type: text
    content: ' But if they confess their own and their fathers'' iniquity in their treachery which they committed against Me–and also that because they walked contrary to Me'
  '41':
  - type: text
    content: ' I also walked contrary to them and brought them into the land of their enemies–if then their uncircumcised hearts are humbled and they then accept the punishment for their iniquity, [II Kings 24:10-14; Dan. 9:11-14.]'
  '42':
  - type: text
    content: ' Then will I [earnestly] remember My covenant with Jacob, My covenant with Isaac, and My covenant with Abraham, and [earnestly] remember the land. [Ps. 106:44-46.]'
  '43':
  - type: text
    content: ' But the land shall be left behind them and shall enjoy its sabbaths while it lies desolate without them; and they shall accept the punishment for their sins '
  - type: text
    content: and
  - type: text
    content: ' make amends because they despised '
  - type: text
    content: and
  - type: text
    content: ' rejected My ordinances and their soul scorned '
  - type: text
    content: and
  - type: text
    content: ' rejected My statutes.'
  '44':
  - type: text
    content: ' And yet for all that, when they are in the land of their enemies, I will not spurn '
  - type: text
    content: and
  - type: text
    content: ' cast them away, neither will I despise '
  - type: text
    content: and
  - type: text
    content: ' abhor them to destroy them utterly and to break My covenant with them, for I am the Lord their God. [Deut. 4:31-35; Jer. 33:4, 5, 23-26; Rom. 11:2-5.]'
  '45':
  - type: text
    content: ' But I will for their sake [earnestly] remember the covenant with their forefathers whom I brought forth out of the land of Egypt in the sight of the nations, that I might be their God. I am the Lord.'
  '46':
  - type: text
    content: ' These are the statutes, ordinances, and laws which the Lord made between Him and the Israelites on Mount Sinai through Moses.'
  '5':
  - type: text
    content: ' And your threshing [time] shall reach to the vintage and the vintage [time] shall reach to the sowing time, and you shall eat your bread to the full and dwell in your land securely.'
  '6':
  - type: text
    content: ' I will give peace in the land; you shall lie down and none shall fill you with dread '
  - type: text
    content: or
  - type: text
    content: ' make you afraid; and I will clear ferocious (wild) beasts out of the land, and no sword shall go through your land.'
  '7':
  - type: text
    content: ' And you shall chase your enemies, and they shall fall before you by the sword.'
  '8':
  - type: text
    content: ' Five of you shall chase a hundred, and a hundred of you shall put ten thousand to flight; your enemies shall fall before you by the sword.'
  '9':
  - type: text
    content: ' For I will be leaning toward you with favor '
  - type: text
    content: and
  - type: text
    content: ' regard for you, rendering you fruitful, multiplying you, and establishing '
  - type: text
    content: and
  - type: text
    content: ' ratifying My covenant with you. [II Kings 13:23.]'
