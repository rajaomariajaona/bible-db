document_id: GEN.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND ADAM knew Eve as his wife, and she became pregnant and bore Cain; and she said, I have gotten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gained a man with the help of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And [next] she gave birth to his brother Abel. Now Abel was a keeper of sheep, but Cain was a tiller of the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And in the course of time Cain brought to the Lord an offering of the fruit of the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Abel brought of the firstborn of his flock and of the fat portions. And the Lord had respect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' regard for Abel and for his offering, [Heb. 11:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But for Cain and his offering He had no respect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' regard. So Cain was exceedingly angry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignant, and he looked sad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depressed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Lord said to Cain, Why are you angry? And why do you look sad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dejected?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' If you do well, will you not be accepted? And if you do not do well, sin crouches at your door; its desire is for you, but you must master it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And Cain said to his brother, Let us go out to the field. And when they were in the field, Cain rose up against Abel his brother and killed him. [I John 3:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the Lord said to Cain, Where is Abel your brother? And he said, I do not know. Am I my brother''s keeper?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And [the Lord] said, What have you done? The voice of your brother''s blood is crying to Me from the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And now you are cursed by reason of the earth, which has opened its mouth to receive your brother''s [shed] blood from your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' When you till the ground, it shall no longer yield to you its strength; you shall be a fugitive and a vagabond on the earth [in perpetual exile, a degraded outcast].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then Cain said to the Lord, My punishment is greater than I can bear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Behold, You have driven me out this day from the face of the land, and from Your face I will be hidden; and I will be a fugitive and a vagabond '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a wanderer on the earth, and whoever finds me will kill me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And the Lord said to him, Therefore, if anyone kills Cain, vengeance shall be taken on him sevenfold. And the Lord set a mark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sign upon Cain, lest anyone finding him should kill him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So Cain went away from the presence of the Lord and dwelt in the land of Nod [wandering], east of Eden.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Cain''s wife [one of Adam''s offspring] became pregnant and bore Enoch; and Cain built a city and named it after his son Enoch.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' To Enoch was born Irad, and Irad was the father of Mehujael, and Mehujael the father of Methusael, and Methusael the father of Lamech.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Lamech took two wives; the name of the one was Adah and of the other was Zillah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Adah bore Jabal; he was the father of those who dwell in tents and have cattle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purchase possessions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' His brother''s name was Jubal; he was the father of all those who play the lyre and pipe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Zillah bore Tubal-cain; he was the forger of all [cutting] instruments of bronze and iron. The sister of Tubal-cain was Naamah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Lamech said to his wives, Adah and Zillah, Hear my voice; you wives of Lamech, listen to what I say; for I have slain a man [merely] for wounding me, and a young man [only] for striking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bruising me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' If Cain is avenged sevenfold, truly Lamech [will be avenged] seventy-sevenfold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And Adam''s wife again became pregnant, and she bore a son and called his name Seth. For God, she said, has appointed for me another child instead of Abel, for Cain slew him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And to Seth also a son was born, whom he named Enosh. At that time men began to call [upon God] by the name of the Lord.'
