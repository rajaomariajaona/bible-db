document_id: ISA.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' YOU [Moabites, now fugitives in Edom, which is ruled by the king of Judah] send lambs to the ruler of the land, from Sela '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' Petra through the desert '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wilderness to the mountain of the Daughter of Zion [Jerusalem]. [II Kings 3:4, 5.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And gladness is taken away, and joy out of the plentiful field; and in the vineyards there is no singing, nor is there joyful sound; the treaders tread out no wine in the presses, for the shout of joy has been made to cease.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Wherefore my heart sounds like a harp [in mournful compassion] for Moab, and my inner being [goes out] for Kir-hareseth [for those brick-walled citadels of his].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It shall be that when Moab presents himself, when he wearies himself [worshiping] on the high place [of idolatry], he will come to his sanctuary [of Chemosh, god of Moab], but he will not prevail. [Then will he be ashamed of his god.] [Jer. 48:13.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the word that the Lord has spoken concerning Moab since that time [when Moab''s pride and resistance to God were first known].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But now the Lord has spoken, saying, Within three years, as the years of a hireling [who will not serve longer than the allotted time], the glory of Moab shall be brought into contempt, in spite of all his mighty multitudes of people; and the remnant that survives will be very small, feeble, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of no account.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For like wandering birds, like a brood cast out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a scattered nest, so shall the daughters of Moab be at the fords of the [river] Arnon.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Say to the ruler] Give counsel, execute justice [for Moab, O king of Judah]; make your shade [over us] like night in the midst of noonday; hide the outcasts, betray not the fugitive to his pursuer.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let our outcasts of Moab dwell among you; be a sheltered hiding place to them from the destroyer. When the extortion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the extortioner have been brought to nought, and destruction has ceased, and the oppressors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' they who trample men are consumed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have vanished out of the land,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then in mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness shall a throne be established, and One shall sit upon it in truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness in the tent of David, judging and seeking justice and being swift to do righteousness. [Ps. 96:13; Jer. 48:47.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' We have heard of the pride of Moab, that he is very proud–even of his arrogance, his conceit, his wrath, his untruthful boasting.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moab therefore shall wail for Moab; everyone shall wail. For the ruins, flagons of wine, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the raisin cakes of Kir-hareseth you shall sigh and mourn, utterly stricken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discouraged.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the fields of Heshbon languish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wither, and the vines of Sibmah; the lords of the nations have broken down [Moab''s] choice vine branches, which reached even to Jazer, wandering into the wilderness; its shoots stretched out abroad, they passed over [the shores of] the [Dead] Sea.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore I [Isaiah] will weep with the weeping of Jazer for the vines of Sibmah. I will drench you with my tears, O Heshbon and Elealeh; for upon your summer fruits and your harvest the shout [of alarm and the cry of the enemy] has fallen.'
