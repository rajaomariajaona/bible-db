document_id: DEU.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN A man takes a wife and marries her, if then she finds no favor in his eyes because he has found some indecency in her, and he writes her a bill of divorce, puts it in her hand, and sends her out of his house,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And when she departs out of his house she goes and marries another man,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And if the latter husband dislikes her and writes her a bill of divorce and puts it in her hand and sends her out of his house, or if the latter husband dies, who took her as his wife,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then her former husband, who sent her away, may not take her again to be his wife after she is defiled. For that is an abomination before the Lord; and you shall not bring guilt upon the land which the Lord your God gives you as an inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When a man is newly married, he shall not go out with the army or be charged with any business; he shall be free at home one year and shall cheer his wife whom he has taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' No man shall take a mill or an upper millstone in pledge, for he would be taking a life in pledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' If a man is found kidnapping any of his brethren of the Israelites and treats him as a slave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a servant or sells him, then that thief shall die. So you shall put evil from among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Take heed in the plague of leprosy, that you watch diligently and do according to all that the Levitical priests shall teach you. As I commanded them, so you shall be watchful and do. [Lev. 13:14, 15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Remember [earnestly] what the Lord your God did to Miriam on the way after you had come out of Egypt. [Num. 12:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' When you lend your brother anything, you shall not go into his house to get his pledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' You shall stand outside and the man to whom you lend shall bring the pledge out to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And if the man is poor, you shall not keep his pledge overnight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You shall surely restore to him the pledge at sunset, that he may sleep in his garment and bless you; and it shall be credited to you as righteousness (rightness and justice) before the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You shall not oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' extort from a hired servant who is poor and needy, whether he is of your brethren or of your strangers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sojourners who are in your land inside your towns.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You shall give him his hire on the day he earns it before the sun goes down, for he is poor, and sets his heart upon it; lest he cry against you to the Lord, and it be sin to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The fathers shall not be put to death for the children, neither shall the children be put to death for the fathers; only for his own sin shall anyone be put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You shall not pervert the justice due the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the sojourner or the fatherless, or take a widow''s garment in pledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But you shall [earnestly] remember that you were a slave in Egypt and the Lord your God redeemed you from there; therefore I command you to do this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' When you reap your harvest in your field and have forgotten a sheaf in the field, you shall not go back to get it; it shall be for the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the sojourner, the fatherless, and the widow, that the Lord your God may bless you in all the work of your hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' When you beat your olive tree, do not go over the boughs again; the leavings shall be for the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the sojourner, the fatherless, and the widow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' When you gather the grapes of your vineyard, you shall not glean it afterward; it shall be for the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the sojourner, the fatherless, and the widow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' You shall [earnestly] remember that you were a slave in the land of Egypt; therefore I command you to do this.'
