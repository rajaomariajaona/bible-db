document_id: JER.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THUS SAYS the Lord: Go down to the house of the king of Judah and speak there this word:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Hear the word of the Lord, O king of Judah, you who sit upon the throne of David–you and your servants and your people who enter by these gates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Thus says the Lord: Execute justice and righteousness, and deliver out of the hand of the oppressor him who has been robbed. And do no wrong; do no violence to the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' temporary resident, the fatherless, or the widow, nor shed innocent blood in this place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For if you will indeed obey this word, then will there enter in through the gates of this [the king''s] house kings sitting [for David] upon David''s throne, riding in chariots and on horses–they and their servants and their people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But if you will not hear these words, I swear by Myself, says the Lord, that this house will become a desolation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For thus says the Lord concerning the house of the king of Judah: [If you will not listen to Me, though] you are [as valuable] to Me as [the fat pastures of] Gilead [east of the Jordan] or as the [plentiful] summit of Lebanon [west of the Jordan], yet surely I will make you a wilderness and uninhabited cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I will prepare, solemnly set apart, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appoint [to execute My judgments against you] destroyers, each with his weapons, and they will cut down your [palaces built of] choicest cedars and cast them into the fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And many nations will pass by this city, and every man will say to his neighbor, Why has the Lord done this to this great city?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then they will answer, Because [the people] forsook the covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' solemn pledge with the Lord their God and worshiped other gods and served them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Weep not for him who is dead nor bemoan him; but weep bitterly for him who goes away [into captivity], for he shall return no more nor see his native country [again].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For thus says the Lord concerning Shallum son of Josiah king of Judah, who reigned instead of Josiah his father and who went forth out of this place: [Shallum] shall not return here any more;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But he shall die in the place where they have led him captive, and he shall see this land no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Woe to him who builds his house by unrighteousness and his [upper] chambers by injustice, who uses his neighbor''s service without wages and does not give him his pay [for his work],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Who says, I will build myself a wide house with large rooms, and he cuts himself out windows, and it is ceiled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' paneled with cedar and painted with vermilion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Do you think that being a king [merely] means [self-indulgent] vying [with Solomon] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' striving to excel in cedar [palaces]? Did not your father [Josiah], as he ate and drank, do justice and righteousness [being upright and in right standing with God]? Then it was well with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He judged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defended the cause of the poor and needy; then it was well. Was not [all] this [what it means] to know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize Me? says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But your eyes and your heart are only for your covetousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dishonest gain, for shedding innocent blood, for oppression and doing violence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Therefore thus says the Lord concerning Jehoiakim son of Josiah king of Judah: [Relatives] shall not lament for him, saying, Ah, my brother! or, Ah, sister, [how great our loss! Subjects] shall not lament for him saying, Ah, lord! or Ah, his majesty! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Ah, [how great was] his glory!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [No] he shall be buried with the burial of a donkey–dragged out and cast forth beyond the gates of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Go up [north] to Lebanon and cry out, and raise your voice in [the hills] of Bashan [across the Jordan], and cry out from Abarim [a range of mountains southeast of Palestine], for all your lovers (the king''s chosen allies) are destroyed. [Jer. 27:6-7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' I spoke to you in your [times of] prosperity, but you said, I will not listen! This has been your attitude from your youth; you have not obeyed My voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The wind [of adversity] shall pasture upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consume all your shepherds (your princes and statesmen), and your lovers (allies) shall go into captivity. Surely then shall you be ashamed and confounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dismayed because of all your wickedness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' O inhabitant of Lebanon [Jerusalem, whose palaces are made of Lebanon''s trees], you who make your nest among the cedars, how you will groan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' how pitiable you will be when pangs come upon you, pain like that of a woman in childbirth! [I Kings 7:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' As I live, says the Lord, though Coniah [also called Jeconiah and Jehoiachin] son of Jehoiakim king of Judah were the signet [ring] upon My right hand, yet would I tear you off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And I will give you into the hands of those who seek your life and into the hand of those of whom you are afraid, even into the hand of Nebuchadrezzar king of Babylon and into the hands of the Chaldeans.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And I will hurl you and the mother who bore you into another country, where you were not born, and there you will die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But to the land to which they will yearn to return, there they will not return.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Is this man [King] Coniah a despised, broken pot? Is he a vessel in which no one takes pleasure? Why are they hurled out, he and his royal offspring, and cast into a land which they do not know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' recognize?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' O land, land, land, hear the word of the Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Thus says the Lord: Write this man [Coniah] down as childless, a man who shall not prosper in his days, for no man of his offspring shall succeed in sitting upon the throne of David and ruling any more in Judah.'
