document_id: EXO.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN THE Lord said to Moses, Yet will I bring one plague more on Pharaoh and on Egypt; afterwards he will let you go. When he lets you go from here, he will thrust you out altogether.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Speak now in the hearing of the people, and let every man solicit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ask of his neighbor, and every woman of her neighbor, jewels of silver and jewels of gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the Lord gave the people favor in the sight of the Egyptians. Moreover, the man Moses was exceedingly great in the land of Egypt, in the sight of Pharaoh''s servants and of the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Moses said, Thus says the Lord, About midnight I will go out into the midst of Egypt;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And all the firstborn in the land [the pride, hope, and joy] of Egypt shall die, from the firstborn of Pharaoh, who sits on his throne, even to the firstborn of the maidservant who is behind the hand mill, and all the firstborn of beasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' There shall be a great cry in all the land of Egypt, such as has never been nor ever shall be again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But against any of the Israelites shall not so much as a dog move his tongue against man or beast, that you may know that the Lord makes a distinction between the Egyptians and Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And all these your servants shall come down to me and bow down to me, saying, Get out, and all the people who follow you! And after that I will go out. And he went out from Pharaoh in great anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then the Lord said to Moses, Pharaoh will not listen to you, that My wonders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miracles may be multiplied in the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Moses and Aaron did all these wonders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miracles before Pharaoh; and the Lord hardened Pharaoh''s stubborn heart, and he did not let the Israelites go out of his land.'
