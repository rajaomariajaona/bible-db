document_id: EXO.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN THE Lord said to Moses, Yet will I bring one plague more on Pharaoh and on Egypt; afterwards he will let you go. When he lets you go from here, he will thrust you out altogether.'
  '10':
  - type: text
    content: ' Moses and Aaron did all these wonders '
  - type: text
    content: and
  - type: text
    content: ' miracles before Pharaoh; and the Lord hardened Pharaoh''s stubborn heart, and he did not let the Israelites go out of his land.'
  '2':
  - type: text
    content: ' Speak now in the hearing of the people, and let every man solicit '
  - type: text
    content: and
  - type: text
    content: ' ask of his neighbor, and every woman of her neighbor, jewels of silver and jewels of gold.'
  '3':
  - type: text
    content: ' And the Lord gave the people favor in the sight of the Egyptians. Moreover, the man Moses was exceedingly great in the land of Egypt, in the sight of Pharaoh''s servants and of the people.'
  '4':
  - type: text
    content: ' And Moses said, Thus says the Lord, About midnight I will go out into the midst of Egypt;'
  '5':
  - type: text
    content: ' And all the firstborn in the land [the pride, hope, and joy] of Egypt shall die, from the firstborn of Pharaoh, who sits on his throne, even to the firstborn of the maidservant who is behind the hand mill, and all the firstborn of beasts.'
  '6':
  - type: text
    content: ' There shall be a great cry in all the land of Egypt, such as has never been nor ever shall be again.'
  '7':
  - type: text
    content: ' But against any of the Israelites shall not so much as a dog move his tongue against man or beast, that you may know that the Lord makes a distinction between the Egyptians and Israel.'
  '8':
  - type: text
    content: ' And all these your servants shall come down to me and bow down to me, saying, Get out, and all the people who follow you! And after that I will go out. And he went out from Pharaoh in great anger.'
  '9':
  - type: text
    content: ' Then the Lord said to Moses, Pharaoh will not listen to you, that My wonders '
  - type: text
    content: and
  - type: text
    content: ' miracles may be multiplied in the land of Egypt.'
