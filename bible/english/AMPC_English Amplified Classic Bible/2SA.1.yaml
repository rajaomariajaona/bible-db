document_id: 2SA.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW AFTER the death of Saul, when David returned from the slaughter of the Amalekites, he had stayed two days in Ziklag,'
  '10':
  - type: text
    content: ' So I stood up against him and slew him, because I was sure he could not live after he had fallen. So I took the crown on his head and the bracelet on his arm and have brought them here to my lord. [I Sam. 31:4.]'
  '11':
  - type: text
    content: ' Then David grasped his own clothes and tore them; so did all the men with him.'
  '12':
  - type: text
    content: ' They mourned and wept for Saul and Jonathan his son, and fasted until evening for the Lord''s people and the house of Israel, because of their defeat in battle.'
  '13':
  - type: text
    content: ' David said to the young man who told him, Where are you from? He answered, I am the son of a foreigner, an Amalekite.'
  '14':
  - type: text
    content: ' David said to him, Why were you not afraid to stretch forth your hand to destroy the Lord''s anointed?'
  '15':
  - type: text
    content: ' David called one of the young men and said, Go near and fall upon him. And he smote him so that he died.'
  '16':
  - type: text
    content: ' David said to [the fallen man], Your blood be upon your own head; for you have testified against yourself, saying, I have slain the Lord''s anointed.'
  '17':
  - type: text
    content: ' David lamented with this lamentation over Saul and Jonathan his son,'
  '18':
  - type: text
    content: ' And he commanded to teach it, [the lament of] the bow, to the Israelites. Behold, it is written in the Book of Jashar:'
  '19':
  - type: text
    content: ' Your glory, O Israel, is slain upon your high places. How have the mighty fallen!'
  '2':
  - type: text
    content: ' When on the third day a man came from Saul''s camp with his clothes torn and dust on his head. When he came to David, he fell to the ground and did obeisance.'
  '20':
  - type: text
    content: ' Tell it not in Gath, announce it not in the streets of Ashkelon, lest the daughters of the Philistines rejoice, lest the daughters of the uncircumcised exult.'
  '21':
  - type: text
    content: ' O mountains of Gilboa, let there be no dew or rain upon you, or fields with offerings. For there the shield of the mighty was defiled, the shield of Saul, as though he were not anointed with oil.'
  '22':
  - type: text
    content: ' From the blood of the slain, from the fat of the mighty, the bow of Jonathan turned not back, and the sword of Saul returned not empty.'
  '23':
  - type: text
    content: ' Saul and Jonathan, beloved and lovely! In their lives and in their deaths they were not divided. They were swifter than eagles, they were stronger than lions.'
  '24':
  - type: text
    content: ' You daughters of Israel, weep over Saul, who clothed you in scarlet with [other] delights, who put ornaments of gold upon your apparel.'
  '25':
  - type: text
    content: ' How have the mighty fallen in the midst of the battle! Jonathan lies slain upon your high places.'
  '26':
  - type: text
    content: ' I am distressed for you, my brother Jonathan; very pleasant have you been to me. Your love to me was wonderful, passing the love of women.'
  '27':
  - type: text
    content: ' How have the mighty fallen, and the weapons of war perished!'
  '3':
  - type: text
    content: ' David said to him, Where have you come from? He said, I have escaped from the camp of Israel.'
  '4':
  - type: text
    content: ' David said to him, How did it go? Tell me. He answered, The men have fled from the battle. Many have fallen and are dead; Saul and Jonathan his son are dead also.'
  '5':
  - type: text
    content: ' David said to the young man, How do you know Saul and Jonathan his son are dead?'
  '6':
  - type: text
    content: ' The young man said, By chance I happened to be on Mount Gilboa and I saw Saul leaning on his spear, and behold, the chariots and horsemen were close behind him.'
  '7':
  - type: text
    content: ' When he looked behind him, he saw me and called to me. I answered, Here I am.'
  '8':
  - type: text
    content: ' He asked me, Who are you? I answered, An Amalekite.'
  '9':
  - type: text
    content: ' He said to me, Rise up against me and slay me; for terrible dizziness has come upon me, yet my life is still in me [and I will be taken alive].'
