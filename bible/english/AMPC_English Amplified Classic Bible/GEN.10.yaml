document_id: GEN.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THIS IS the history of the generations (descendants) of the sons of Noah, Shem, Ham, and Japheth. The sons born to them after the flood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'were:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The beginning of his kingdom was Babel, Erech, Accad, and Calneh, in the land of Shinar [in Babylonia].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Out of the land he [Nimrod] went forth into Assyria and built Nineveh, Rehoboth-Ir, Calah,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Resen, which is between Nineveh and Calah; all these [suburbs combined to form] the great city.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Egypt [Mizraim] became the father of Ludim, Anamim, Lehabim, Naphtuhim,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Pathrusim, Casluhim (from whom came the Philistines), and Caphtorim.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Canaan became the father of Sidon his firstborn, Heth [the Hittites],'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Jebusites, the Amorites, the Girgashites,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Hivites, the Arkites, the Sinites,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Arvadites, the Zemarites and the Hamathites. Afterward the families of the Canaanites spread abroad'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the territory of the Canaanites extended from Sidon as one goes to Gerar as far as Gaza, and as one goes to Sodom, Gomorrah, Admah, and Zeboiim, as far as Lasha.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These are the sons of Ham by their families, their languages, their lands, and their nations.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To Shem also, the younger brother of Japheth and the ancestor of all the children of Eber [including the Hebrews], children were born.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Shem: Elam, Asshur, Arpachshad, Lud, and Aram.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Aram: Uz, Hul, Gether, and Mash.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Arpachshad became the father of Shelah; and Shelah became the father of Eber.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To Eber were born two sons: the name of one was Peleg [division], because [the inhabitants of] the earth were divided up in his days; and his brother''s name was Joktan.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Joktan became the father of Almodad, Sheleph, Hazarmaveth, Jerah,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Hadoram, Uzal, Diklah,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Obal, Abimael, Sheba,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ophir, Havilah, and Jobab; all these were the sons of Joktan.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Gomer: Ashkenaz, Riphath, and Togarmah.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The territory in which they lived extended from Mesha as one goes toward Sephar to the hill country of the east.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These are Shem''s descendants by their families, their languages, their lands, and their nations.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These are the families of the sons of Noah, according to their generations, within their nations; and from these the nations spread abroad on the earth after the flood. [Acts 17:26.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Javan: Elishah, Tarshish, Kittim, and Dodanim.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' From these the coastland peoples spread. [These are the sons of Japheth] in their lands, each with his own language, by their families within their nations.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Ham: Cush, Egypt [Mizraim], Put, and Canaan.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Cush: Seba, Havilah, Sabtah, Raamah, and Sabteca; and the sons of Raamah: Sheba and Dedan.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Cush became the father of Nimrod; he was the first to be a mighty man on the earth.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He was a mighty hunter before the Lord; therefore it is said, Like Nimrod, a mighty hunter before the Lord.'
