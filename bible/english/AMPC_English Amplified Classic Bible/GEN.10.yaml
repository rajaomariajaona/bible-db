document_id: GEN.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THIS IS the history of the generations (descendants) of the sons of Noah, Shem, Ham, and Japheth. The sons born to them after the flood '
  - type: text
    content: 'were:'
  '10':
  - type: text
    content: ' The beginning of his kingdom was Babel, Erech, Accad, and Calneh, in the land of Shinar [in Babylonia].'
  '11':
  - type: text
    content: ' Out of the land he [Nimrod] went forth into Assyria and built Nineveh, Rehoboth-Ir, Calah,'
  '12':
  - type: text
    content: ' And Resen, which is between Nineveh and Calah; all these [suburbs combined to form] the great city.'
  '13':
  - type: text
    content: ' And Egypt [Mizraim] became the father of Ludim, Anamim, Lehabim, Naphtuhim,'
  '14':
  - type: text
    content: ' Pathrusim, Casluhim (from whom came the Philistines), and Caphtorim.'
  '15':
  - type: text
    content: ' Canaan became the father of Sidon his firstborn, Heth [the Hittites],'
  '16':
  - type: text
    content: ' The Jebusites, the Amorites, the Girgashites,'
  '17':
  - type: text
    content: ' The Hivites, the Arkites, the Sinites,'
  '18':
  - type: text
    content: ' The Arvadites, the Zemarites and the Hamathites. Afterward the families of the Canaanites spread abroad'
  '19':
  - type: text
    content: ' And the territory of the Canaanites extended from Sidon as one goes to Gerar as far as Gaza, and as one goes to Sodom, Gomorrah, Admah, and Zeboiim, as far as Lasha.'
  '2':
  - type: text
    content: ' The sons of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.'
  '20':
  - type: text
    content: ' These are the sons of Ham by their families, their languages, their lands, and their nations.'
  '21':
  - type: text
    content: ' To Shem also, the younger brother of Japheth and the ancestor of all the children of Eber [including the Hebrews], children were born.'
  '22':
  - type: text
    content: ' The sons of Shem: Elam, Asshur, Arpachshad, Lud, and Aram.'
  '23':
  - type: text
    content: ' The sons of Aram: Uz, Hul, Gether, and Mash.'
  '24':
  - type: text
    content: ' Arpachshad became the father of Shelah; and Shelah became the father of Eber.'
  '25':
  - type: text
    content: ' To Eber were born two sons: the name of one was Peleg [division], because [the inhabitants of] the earth were divided up in his days; and his brother''s name was Joktan.'
  '26':
  - type: text
    content: ' Joktan became the father of Almodad, Sheleph, Hazarmaveth, Jerah,'
  '27':
  - type: text
    content: ' Hadoram, Uzal, Diklah,'
  '28':
  - type: text
    content: ' Obal, Abimael, Sheba,'
  '29':
  - type: text
    content: ' Ophir, Havilah, and Jobab; all these were the sons of Joktan.'
  '3':
  - type: text
    content: ' The sons of Gomer: Ashkenaz, Riphath, and Togarmah.'
  '30':
  - type: text
    content: ' The territory in which they lived extended from Mesha as one goes toward Sephar to the hill country of the east.'
  '31':
  - type: text
    content: ' These are Shem''s descendants by their families, their languages, their lands, and their nations.'
  '32':
  - type: text
    content: ' These are the families of the sons of Noah, according to their generations, within their nations; and from these the nations spread abroad on the earth after the flood. [Acts 17:26.]'
  '4':
  - type: text
    content: ' The sons of Javan: Elishah, Tarshish, Kittim, and Dodanim.'
  '5':
  - type: text
    content: ' From these the coastland peoples spread. [These are the sons of Japheth] in their lands, each with his own language, by their families within their nations.'
  '6':
  - type: text
    content: ' The sons of Ham: Cush, Egypt [Mizraim], Put, and Canaan.'
  '7':
  - type: text
    content: ' The sons of Cush: Seba, Havilah, Sabtah, Raamah, and Sabteca; and the sons of Raamah: Sheba and Dedan.'
  '8':
  - type: text
    content: ' Cush became the father of Nimrod; he was the first to be a mighty man on the earth.'
  '9':
  - type: text
    content: ' He was a mighty hunter before the Lord; therefore it is said, Like Nimrod, a mighty hunter before the Lord.'
