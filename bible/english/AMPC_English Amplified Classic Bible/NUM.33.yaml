document_id: NUM.33
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THESE ARE the stages of the journeys of the Israelites by which they went out of the land of Egypt by their hosts under the leadership of Moses and Aaron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Moses recorded their starting places, as the Lord commanded, stage by stage; and these are their journeying stages from their starting places:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' They set out from Rameses on the fifteenth day of the first month; on the day after the Passover the Israelites went out [of Egypt] with a high hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' triumphantly in the sight of all the Egyptians,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' While the Egyptians were burying all their firstborn whom the Lord had struck down among them; upon their gods also the Lord executed judgments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The Israelites set out from Rameses and encamped in Succoth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And they departed from Succoth and encamped in Etham, which is at the edge of the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They set out from Etham and turned back to Pi-hahiroth, east of Baal-zephon, and they encamped before Migdol.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And they journeyed from before Pi-hahiroth and passed through the midst of the [Red] Sea into the wilderness; and they went a three days'' journey in the Wilderness of Etham and encamped at Marah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' They journeyed from Marah and came to Elim; at Elim there were twelve springs of water and seventy palm trees, and they encamped there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' They set out from Elim and encamped by the Red Sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' They journeyed from the Red Sea and encamped in the Wilderness of Sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they traveled on from the Wilderness of Sin and encamped at Dophkah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they departed from Dophkah and encamped at Alush.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And they set out from Alush and encamped at Rephidim, where there was no water for the people to drink.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And they departed from Rephidim and encamped in the Wilderness of Sinai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they journeyed from the Wilderness of Sinai and encamped at Kibroth-hattaavah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And they traveled on from Kibroth-hattaavah and encamped at Hazeroth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And they journeyed from Hazeroth and encamped at Rithmah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And they departed from Rithmah and encamped at Rimmon-perez.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And they departed from Rimmon-perez and encamped at Libnah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And they removed from Libnah and encamped at Rissah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And they journeyed from Rissah and encamped at Kehelathah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And they went from Kehelathah and encamped at Mount Shepher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And they removed from Mount Shepher and encamped at Haradah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And they set out from Haradah and encamped at Makheloth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And they removed from Makheloth and encamped at Tahath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And they departed from Tahath and encamped at Terah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And they removed from Terah and encamped at Mithkah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And they set out from Mithkah and encamped at Hashmonah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And they traveled on from Hashmonah and encamped at Moseroth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And they journeyed from Moseroth and pitched in Bene-jaakan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And they set out from Bene-jaakan and encamped at Hor-haggidgad.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And they set out from Hor-haggidgad and encamped at Jotbathah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And they journeyed from Jotbathah and encamped at Abronah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And they traveled on from Abronah and encamped at Ezion-geber.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And they removed from Ezion-geber and encamped in the Wilderness of Zin, which is Kadesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And they removed from Kadesh and encamped at Mount Hor, on the edge of Edom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Aaron the priest went up on Mount Hor at the command of the Lord, and died there in the fortieth year after the Israelites came out of Egypt, the first day of the fifth month. [Num. 20:23-29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Aaron was 123 years old when he died on Mount Hor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' The Canaanite king of Arad, who lived in the South (the Negeb) in the land of Canaan, heard of the coming of the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' They set out from Mount Hor and encamped at Zalmonah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And they set out from Zalmonah and encamped at Punon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And they set out from Punon and encamped at Oboth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' And they traveled on from Oboth and encamped at Iye-abarim, on the border of Moab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And they departed from Iyim and encamped at Dibon-gad.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And they set out from Dibon-gad and encamped in Almon-diblathaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And they traveled on from Almon-diblathaim and encamped in the mountains of Abarim, before Nebo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And they departed from the mountains of Abarim and encamped in the plains of Moab by the Jordan at Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' And they encamped by the Jordan from Beth-jeshimoth as far as Abel-shittim in the plains of Moab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' And the Lord said to Moses in the plains of Moab by the Jordan at Jericho,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' Tell the Israelites, When you have passed over the Jordan into the land of Canaan,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' Then you shall drive out all the inhabitants of the land before you and destroy all their figured stones and all their molten images and completely demolish all their [idolatrous] high places,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' And you shall take possession of the land and dwell in it, for to you I have given the land to possess it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' You shall inherit the land by lot according to your families; to the large tribe you shall give a larger inheritance, and to the small tribe you shall give a smaller inheritance. Wherever the lot falls to any man, that shall be his. According to the tribes of your fathers you shall inherit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' But if you will not drive out the inhabitants of the land from before you, then those you let remain of them shall be as pricks in your eyes and as thorns in your sides, and they shall vex you in the land in which you dwell.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' And as I thought to do to them, so will I do to you.'
