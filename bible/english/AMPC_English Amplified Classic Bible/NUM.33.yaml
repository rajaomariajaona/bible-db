document_id: NUM.33,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THESE ARE the stages of the journeys of the Israelites by which they went out of the land of Egypt by their hosts under the leadership of Moses and Aaron.'
  '10':
  - type: text
    content: ' They set out from Elim and encamped by the Red Sea.'
  '11':
  - type: text
    content: ' They journeyed from the Red Sea and encamped in the Wilderness of Sin.'
  '12':
  - type: text
    content: ' And they traveled on from the Wilderness of Sin and encamped at Dophkah.'
  '13':
  - type: text
    content: ' And they departed from Dophkah and encamped at Alush.'
  '14':
  - type: text
    content: ' And they set out from Alush and encamped at Rephidim, where there was no water for the people to drink.'
  '15':
  - type: text
    content: ' And they departed from Rephidim and encamped in the Wilderness of Sinai.'
  '16':
  - type: text
    content: ' And they journeyed from the Wilderness of Sinai and encamped at Kibroth-hattaavah.'
  '17':
  - type: text
    content: ' And they traveled on from Kibroth-hattaavah and encamped at Hazeroth.'
  '18':
  - type: text
    content: ' And they journeyed from Hazeroth and encamped at Rithmah.'
  '19':
  - type: text
    content: ' And they departed from Rithmah and encamped at Rimmon-perez.'
  '2':
  - type: text
    content: ' Moses recorded their starting places, as the Lord commanded, stage by stage; and these are their journeying stages from their starting places:'
  '20':
  - type: text
    content: ' And they departed from Rimmon-perez and encamped at Libnah.'
  '21':
  - type: text
    content: ' And they removed from Libnah and encamped at Rissah.'
  '22':
  - type: text
    content: ' And they journeyed from Rissah and encamped at Kehelathah.'
  '23':
  - type: text
    content: ' And they went from Kehelathah and encamped at Mount Shepher.'
  '24':
  - type: text
    content: ' And they removed from Mount Shepher and encamped at Haradah.'
  '25':
  - type: text
    content: ' And they set out from Haradah and encamped at Makheloth.'
  '26':
  - type: text
    content: ' And they removed from Makheloth and encamped at Tahath.'
  '27':
  - type: text
    content: ' And they departed from Tahath and encamped at Terah.'
  '28':
  - type: text
    content: ' And they removed from Terah and encamped at Mithkah.'
  '29':
  - type: text
    content: ' And they set out from Mithkah and encamped at Hashmonah.'
  '3':
  - type: text
    content: ' They set out from Rameses on the fifteenth day of the first month; on the day after the Passover the Israelites went out [of Egypt] with a high hand '
  - type: text
    content: and
  - type: text
    content: ' triumphantly in the sight of all the Egyptians,'
  '30':
  - type: text
    content: ' And they traveled on from Hashmonah and encamped at Moseroth.'
  '31':
  - type: text
    content: ' And they journeyed from Moseroth and pitched in Bene-jaakan.'
  '32':
  - type: text
    content: ' And they set out from Bene-jaakan and encamped at Hor-haggidgad.'
  '33':
  - type: text
    content: ' And they set out from Hor-haggidgad and encamped at Jotbathah.'
  '34':
  - type: text
    content: ' And they journeyed from Jotbathah and encamped at Abronah.'
  '35':
  - type: text
    content: ' And they traveled on from Abronah and encamped at Ezion-geber.'
  '36':
  - type: text
    content: ' And they removed from Ezion-geber and encamped in the Wilderness of Zin, which is Kadesh.'
  '37':
  - type: text
    content: ' And they removed from Kadesh and encamped at Mount Hor, on the edge of Edom.'
  '38':
  - type: text
    content: ' Aaron the priest went up on Mount Hor at the command of the Lord, and died there in the fortieth year after the Israelites came out of Egypt, the first day of the fifth month. [Num. 20:23-29.]'
  '39':
  - type: text
    content: ' Aaron was 123 years old when he died on Mount Hor.'
  '4':
  - type: text
    content: ' While the Egyptians were burying all their firstborn whom the Lord had struck down among them; upon their gods also the Lord executed judgments.'
  '40':
  - type: text
    content: ' The Canaanite king of Arad, who lived in the South (the Negeb) in the land of Canaan, heard of the coming of the Israelites.'
  '41':
  - type: text
    content: ' They set out from Mount Hor and encamped at Zalmonah.'
  '42':
  - type: text
    content: ' And they set out from Zalmonah and encamped at Punon.'
  '43':
  - type: text
    content: ' And they set out from Punon and encamped at Oboth.'
  '44':
  - type: text
    content: ' And they traveled on from Oboth and encamped at Iye-abarim, on the border of Moab.'
  '45':
  - type: text
    content: ' And they departed from Iyim and encamped at Dibon-gad.'
  '46':
  - type: text
    content: ' And they set out from Dibon-gad and encamped in Almon-diblathaim.'
  '47':
  - type: text
    content: ' And they traveled on from Almon-diblathaim and encamped in the mountains of Abarim, before Nebo.'
  '48':
  - type: text
    content: ' And they departed from the mountains of Abarim and encamped in the plains of Moab by the Jordan at Jericho.'
  '49':
  - type: text
    content: ' And they encamped by the Jordan from Beth-jeshimoth as far as Abel-shittim in the plains of Moab.'
  '5':
  - type: text
    content: ' The Israelites set out from Rameses and encamped in Succoth.'
  '50':
  - type: text
    content: ' And the Lord said to Moses in the plains of Moab by the Jordan at Jericho,'
  '51':
  - type: text
    content: ' Tell the Israelites, When you have passed over the Jordan into the land of Canaan,'
  '52':
  - type: text
    content: ' Then you shall drive out all the inhabitants of the land before you and destroy all their figured stones and all their molten images and completely demolish all their [idolatrous] high places,'
  '53':
  - type: text
    content: ' And you shall take possession of the land and dwell in it, for to you I have given the land to possess it.'
  '54':
  - type: text
    content: ' You shall inherit the land by lot according to your families; to the large tribe you shall give a larger inheritance, and to the small tribe you shall give a smaller inheritance. Wherever the lot falls to any man, that shall be his. According to the tribes of your fathers you shall inherit.'
  '55':
  - type: text
    content: ' But if you will not drive out the inhabitants of the land from before you, then those you let remain of them shall be as pricks in your eyes and as thorns in your sides, and they shall vex you in the land in which you dwell.'
  '56':
  - type: text
    content: ' And as I thought to do to them, so will I do to you.'
  '6':
  - type: text
    content: ' And they departed from Succoth and encamped in Etham, which is at the edge of the wilderness.'
  '7':
  - type: text
    content: ' They set out from Etham and turned back to Pi-hahiroth, east of Baal-zephon, and they encamped before Migdol.'
  '8':
  - type: text
    content: ' And they journeyed from before Pi-hahiroth and passed through the midst of the [Red] Sea into the wilderness; and they went a three days'' journey in the Wilderness of Etham and encamped at Marah.'
  '9':
  - type: text
    content: ' They journeyed from Marah and came to Elim; at Elim there were twelve springs of water and seventy palm trees, and they encamped there.'
