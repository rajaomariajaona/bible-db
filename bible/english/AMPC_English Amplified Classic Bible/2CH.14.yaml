document_id: 2CH.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO ABIJAH slept with his fathers, and they buried him in the City of David; and Asa his son reigned in his stead. In his days the land was at rest for ten years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Asa did what was good and right in the eyes of the Lord his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He took away the foreign altars and high places and broke down the idol pillars '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' obelisks and cut down the Asherim [symbols of the goddess Asherah]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And commanded Judah to seek the Lord, the God of their fathers [to inquire of and for Him and crave Him as a vital necessity], and to obey the law and the commandment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Also Asa took out of all the cities of Judah the idolatrous high places and the incense altars. And the kingdom had rest under his reign.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he built fortified cities in Judah, for the land had rest. He had no war in those years, for the Lord gave him peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore he said to Judah, Let us build these cities and surround them with walls, towers, gates, and bars. The land is still ours, because we sought the Lord our God; we have sought Him [yearning for Him with all our desire] and He has given us rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peace on every side. So they built and prospered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Asa had an army of 300,000 men out of Judah, who bore bucklers and spears, and 280,000 out of Benjamin, who bore shields and drew bows, all mighty men of courage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' There came out against Judah Zerah the Ethiopian with a host of a million [that is, too many to be numbered] and 300 chariots, and came as far as Mareshah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Asa went out against him, and they set up their lines of battle in the Valley of Zephathah at Mareshah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Asa cried to the Lord his God, O Lord, there is none besides You to help, and it makes no difference to You whether the one You help is mighty or powerless. Help us, O Lord our God! For we rely on You, and we go against this multitude in Your name. O Lord, You are our God; let no man prevail against You!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' So the Lord smote the Ethiopians before Asa and Judah, and the Ethiopians fled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Asa and the people with him pursued them to Gerar; and the Ethiopians were overthrown, so that none remained alive; for they were destroyed before the Lord and His host, who carried away very much booty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And they smote all the cities round about Gerar, for the fear of the Lord came upon them. They plundered all the cities, for there was much plunder in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' They smote also the cattle encampments and carried away sheep in abundance and camels; and they returned to Jerusalem.'
