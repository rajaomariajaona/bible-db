document_id: ISA.11,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THERE shall come forth a Shoot out of the stock of Jesse [David''s father], and a Branch out of his roots shall grow '
  - type: text
    content: and
  - type: text
    content: ' bear fruit. [Isa. 4:2; Matt. 2:23; Rev. 5:5; 22:16.]'
  '10':
  - type: text
    content: ' And it shall be in that day that the Root of Jesse shall stand as a signal for the peoples; of Him shall the nations inquire '
  - type: text
    content: and
  - type: text
    content: ' seek knowledge, and His dwelling shall be glory [His rest glorious]! [John 12:32.]'
  '11':
  - type: text
    content: ' And in that day the Lord shall again lift up His hand a second time to recover (acquire and deliver) the remnant of His people which is left, from Assyria, from Lower Egypt, from Pathros, from Ethiopia, from Elam [in Persia], from Shinar [Babylonia], from Hamath [in Upper Syria], and from the countries bordering on the [Mediterranean] Sea. [Jer. 23:5-8.]'
  '12':
  - type: text
    content: ' And He will raise up a signal for the nations and will assemble the outcasts of Israel and will gather together the dispersed of Judah from the four corners of the earth.'
  '13':
  - type: text
    content: ' The envy '
  - type: text
    content: and
  - type: text
    content: ' jealousy of Ephraim also shall depart, and they who vex '
  - type: text
    content: and
  - type: text
    content: ' harass Judah from outside '
  - type: text
    content: or
  - type: text
    content: ' inside shall be cut off; Ephraim shall not envy Judah, and Judah shall not vex '
  - type: text
    content: and
  - type: text
    content: ' harass Ephraim.'
  '14':
  - type: text
    content: ' But [with united forces Ephraim and Judah] will swoop down upon the shoulders of the Philistines'' [land sloping] toward the west; together they will strip the people on the east [the Arabs]. They will lay their hands upon Edom and Moab, and the Ammonites will obey them.'
  '15':
  - type: text
    content: ' And the Lord will utterly destroy (doom and dry up) the tongue of the Egyptian sea [the west fork of the Red Sea]; and with His [mighty] scorching wind He will wave His hand over the river [Nile] and will smite it into seven channels and will cause men to cross over dry-shod.'
  '16':
  - type: text
    content: ' And there shall be a highway from Assyria for the remnant left of His people, as there was for Israel when they came up out of the land of Egypt.'
  '2':
  - type: text
    content: ' And the Spirit of the Lord shall rest upon Him–the Spirit of wisdom and understanding, the Spirit of counsel and might, the Spirit of knowledge and of the reverential '
  - type: text
    content: and
  - type: text
    content: ' obedient fear of the Lord–'
  '3':
  - type: text
    content: ' And shall make Him of quick understanding, '
  - type: text
    content: and
  - type: text
    content: ' His delight shall be in the reverential '
  - type: text
    content: and
  - type: text
    content: ' obedient fear of the Lord. And He shall not judge by the sight of His eyes, neither decide by the hearing of His ears;'
  '4':
  - type: text
    content: ' But with righteousness '
  - type: text
    content: and
  - type: text
    content: ' justice shall He judge the poor and decide with fairness for the meek, the poor, '
  - type: text
    content: and
  - type: text
    content: ' the downtrodden of the earth; and He shall smite the earth '
  - type: text
    content: and
  - type: text
    content: ' the oppressor with the rod of His mouth, and with the breath of His lips He shall slay the wicked.'
  '5':
  - type: text
    content: ' And righteousness shall be the girdle of His waist and faithfulness the girdle of His loins.'
  '6':
  - type: text
    content: ' And the wolf shall dwell with the lamb, and the leopard shall lie down with the kid, and the calf and the young lion and the fatted domestic animal together; and a little child shall lead them.'
  '7':
  - type: text
    content: ' And the cow and the bear shall feed side by side, their young shall lie down together, and the lion shall eat straw like the ox.'
  '8':
  - type: text
    content: ' And the sucking child shall play over the hole of the asp, and the weaned child shall put his hand on the adder''s den.'
  '9':
  - type: text
    content: ' They shall not hurt or destroy in all My holy mountain, for the earth shall be full of the knowledge of the Lord as the waters cover the sea.'
