verses:
  '1':
  - type: text
    content: ' BUT ALSO [in those days] there arose false prophets among the people, just as there will be false teachers among yourselves, who will subtly '
  - type: text
    content: and
  - type: text
    content: ' stealthily introduce heretical doctrines (destructive heresies), even denying '
  - type: text
    content: and
  - type: text
    content: ' disowning the Master Who bought them, bringing upon themselves swift destruction.'
  '10':
  - type: text
    content: ' And particularly those who walk after the flesh and indulge in the lust of polluting passion and scorn '
  - type: text
    content: and
  - type: text
    content: ' despise authority. Presumptuous [and] daring [self-willed and self-loving creatures]! They scoff at '
  - type: text
    content: and
  - type: text
    content: ' revile dignitaries (glorious ones) without trembling,'
  '11':
  - type: text
    content: ' Whereas [even] angels, though superior in might and power, do not bring a defaming charge against them before the Lord.'
  '12':
  - type: text
    content: ' But these [people]! Like unreasoning beasts, mere creatures of instinct, born [only] to be captured and destroyed, railing at things of which they are ignorant, they shall utterly perish in their [own] corruption [in their destroying they shall surely be destroyed],'
  '13':
  - type: text
    content: ' Being destined to receive [punishment as] the reward of [their] unrighteousness [suffering wrong as the hire for their wrongdoing]. They count it a delight to revel in the daytime [living luxuriously and delicately]. They are blots and blemishes, reveling in their deceptions '
  - type: text
    content: and
  - type: text
    content: ' carousing together [even] as they feast with you.'
  '14':
  - type: text
    content: ' They have eyes full of harlotry, insatiable for sin. They beguile '
  - type: text
    content: and
  - type: text
    content: ' bait '
  - type: text
    content: and
  - type: text
    content: ' lure away unstable souls. Their hearts are trained in covetousness (lust, greed), [they are] children of a curse [exposed to cursing]!'
  '15':
  - type: text
    content: ' Forsaking the straight road they have gone astray; they have followed the way of Balaam [the son] of Beor, who loved the reward of wickedness. [Num. 22:5, 7.]'
  '16':
  - type: text
    content: ' But he was rebuked for his own transgression when a dumb beast of burden spoke with human voice and checked the prophet''s madness. [Num. 22:21-31.]'
  '17':
  - type: text
    content: ' These are springs without water and mists driven along before a tempest, for whom is reserved '
  - type: text
    content: forever
  - type: text
    content: ' the gloom of darkness.'
  '18':
  - type: text
    content: ' For uttering loud boasts of folly, they beguile '
  - type: text
    content: and
  - type: text
    content: ' lure with lustful desires of the flesh those who are barely escaping from them who are wrongdoers.'
  '19':
  - type: text
    content: ' They promise them liberty, when they themselves are the slaves of depravity '
  - type: text
    content: and
  - type: text
    content: ' defilement–for by whatever anyone is made inferior '
  - type: text
    content: or
  - type: text
    content: ' worse '
  - type: text
    content: or
  - type: text
    content: ' is overcome, to that [person or thing] he is enslaved.'
  '2':
  - type: text
    content: ' And many will follow their immoral ways '
  - type: text
    content: and
  - type: text
    content: ' lascivious doings; because of them the true Way will be maligned '
  - type: text
    content: and
  - type: text
    content: ' defamed.'
  '20':
  - type: text
    content: ' For if, after they have escaped the pollutions of the world through [the full, personal] knowledge of our Lord and Savior Jesus Christ, they again become entangled in them and are overcome, their last condition is worse [for them] than the first.'
  '21':
  - type: text
    content: ' For never to have obtained a [full, personal] knowledge of the way of righteousness would have been better for them than, having obtained [such knowledge], to turn back from the holy commandment which was [verbally] delivered to them.'
  '22':
  - type: text
    content: ' There has befallen them the thing spoken of in the true proverb, The dog turns back to his own vomit, and, The sow is washed only to wallow again in the mire. [Prov. 26:11.]'
  '3':
  - type: text
    content: ' And in their covetousness (lust, greed) they will exploit you with false (cunning) arguments. From of old the sentence [of condemnation] for them has not been idle; their destruction (eternal misery) has not been asleep.'
  '4':
  - type: text
    content: ' For God did not [even] spare angels that sinned, but cast them into hell, delivering them to be kept there in pits of gloom till the judgment '
  - type: text
    content: and
  - type: text
    content: ' their doom.'
  '5':
  - type: text
    content: ' And He spared not the ancient world, but preserved Noah, a preacher of righteousness, with seven other persons, when He brought a flood upon the world of ungodly [people]. [Gen. 6-8; I Peter 3:20.]'
  '6':
  - type: text
    content: ' And He condemned to ruin '
  - type: text
    content: and
  - type: text
    content: ' extinction the cities of Sodom and Gomorrah, reducing them to ashes [and thus] set them forth as an example to those who would be ungodly; [Gen. 19:24.]'
  '7':
  - type: text
    content: ' And He rescued righteous Lot, greatly worn out '
  - type: text
    content: and
  - type: text
    content: ' distressed by the wanton ways of the ungodly '
  - type: text
    content: and
  - type: text
    content: ' lawless–[Gen. 19:16, 29.]'
  '8':
  - type: text
    content: ' For that just man, living [there] among them, tortured his righteous soul every day with what he saw and heard of [their] unlawful and wicked deeds–'
  '9':
  - type: text
    content: ' Now if [all these things are true, then be sure] the Lord knows how to rescue the godly out of temptations '
  - type: text
    content: and
  - type: text
    content: ' trials, and how to keep the ungodly under chastisement until the day of judgment '
  - type: text
    content: and
  - type: text
    content: ' doom,'
