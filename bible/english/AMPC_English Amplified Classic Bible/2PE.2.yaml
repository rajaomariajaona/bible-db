document_id: 2PE.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT ALSO [in those days] there arose false prophets among the people, just as there will be false teachers among yourselves, who will subtly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stealthily introduce heretical doctrines (destructive heresies), even denying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disowning the Master Who bought them, bringing upon themselves swift destruction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And many will follow their immoral ways '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lascivious doings; because of them the true Way will be maligned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defamed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And in their covetousness (lust, greed) they will exploit you with false (cunning) arguments. From of old the sentence [of condemnation] for them has not been idle; their destruction (eternal misery) has not been asleep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For God did not [even] spare angels that sinned, but cast them into hell, delivering them to be kept there in pits of gloom till the judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their doom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And He spared not the ancient world, but preserved Noah, a preacher of righteousness, with seven other persons, when He brought a flood upon the world of ungodly [people]. [Gen. 6-8; I Peter 3:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And He condemned to ruin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extinction the cities of Sodom and Gomorrah, reducing them to ashes [and thus] set them forth as an example to those who would be ungodly; [Gen. 19:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And He rescued righteous Lot, greatly worn out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distressed by the wanton ways of the ungodly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lawless–[Gen. 19:16, 29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For that just man, living [there] among them, tortured his righteous soul every day with what he saw and heard of [their] unlawful and wicked deeds–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Now if [all these things are true, then be sure] the Lord knows how to rescue the godly out of temptations '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trials, and how to keep the ungodly under chastisement until the day of judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doom,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And particularly those who walk after the flesh and indulge in the lust of polluting passion and scorn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despise authority. Presumptuous [and] daring [self-willed and self-loving creatures]! They scoff at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revile dignitaries (glorious ones) without trembling,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Whereas [even] angels, though superior in might and power, do not bring a defaming charge against them before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But these [people]! Like unreasoning beasts, mere creatures of instinct, born [only] to be captured and destroyed, railing at things of which they are ignorant, they shall utterly perish in their [own] corruption [in their destroying they shall surely be destroyed],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Being destined to receive [punishment as] the reward of [their] unrighteousness [suffering wrong as the hire for their wrongdoing]. They count it a delight to revel in the daytime [living luxuriously and delicately]. They are blots and blemishes, reveling in their deceptions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carousing together [even] as they feast with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' They have eyes full of harlotry, insatiable for sin. They beguile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lure away unstable souls. Their hearts are trained in covetousness (lust, greed), [they are] children of a curse [exposed to cursing]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Forsaking the straight road they have gone astray; they have followed the way of Balaam [the son] of Beor, who loved the reward of wickedness. [Num. 22:5, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But he was rebuked for his own transgression when a dumb beast of burden spoke with human voice and checked the prophet''s madness. [Num. 22:21-31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' These are springs without water and mists driven along before a tempest, for whom is reserved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: forever
  - type: text
    text: ' the gloom of darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For uttering loud boasts of folly, they beguile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lure with lustful desires of the flesh those who are barely escaping from them who are wrongdoers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' They promise them liberty, when they themselves are the slaves of depravity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defilement–for by whatever anyone is made inferior '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' worse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' is overcome, to that [person or thing] he is enslaved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For if, after they have escaped the pollutions of the world through [the full, personal] knowledge of our Lord and Savior Jesus Christ, they again become entangled in them and are overcome, their last condition is worse [for them] than the first.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For never to have obtained a [full, personal] knowledge of the way of righteousness would have been better for them than, having obtained [such knowledge], to turn back from the holy commandment which was [verbally] delivered to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' There has befallen them the thing spoken of in the true proverb, The dog turns back to his own vomit, and, The sow is washed only to wallow again in the mire. [Prov. 26:11.]'
