document_id: 2KI.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE twenty-third year of Joash son of Ahaziah king of Judah, Jehoahaz son of Jehu began to reign over Israel in Samaria, and reigned seventeen years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He did evil in the sight of the Lord and followed the sins of Jeroboam son of Nebat, which made Israel to sin, and did not depart from them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The anger of the Lord was kindled against Israel, and He delivered them into the hand of Hazael king of Syria and of Ben-hadad son of Hazael continually.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But Jehoahaz besought the Lord, and the Lord hearkened to him, for He saw the oppression of Israel, how the king of Syria burdened them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the Lord gave Israel a savior [one to rescue and give them peace], so that they escaped from under the hand of the Syrians; and the Israelites dwelt in their tents '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' homes as before.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Yet they did not depart from the sins of the house of Jeroboam, who made Israel sin; but the nation walked in them. And the Asherah [symbol of the goddess Asherah] remained in Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [Ben-hadad] of Syria did not leave to Jehoahaz of [Israel] an army of more than fifty horsemen, ten chariots, and 10,000 footmen, for the Syrian king had destroyed them and made them like dust to be trampled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The rest of the acts of Jehoahaz, all that he did and his might, are they not written in the Book of the Chronicles of the Kings of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Jehoahaz slept with his fathers, and they buried him in Samaria. Jehoash his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' In the thirty-seventh year of Joash king of Judah, Jehoash son of Jehoahaz began to reign over Israel in Samaria, and reigned sixteen years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He did evil in the sight of the Lord; he departed not from all the sins of Jeroboam son of Nebat, who made Israel sin; he walked in them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The rest of the acts of Jehoash, all that he did, and his might with which he fought against Amaziah king of Judah, are they not written in the Book of the Chronicles of the Kings of Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Jehoash slept with his fathers, and Jeroboam [II] sat on his throne. Jehoash was buried in Samaria with the kings of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Now Elisha [previously] had become ill of the illness of which he died. And Jehoash king of Israel came down to him and wept over him and said, O my father, my father, the chariot of Israel and the horsemen of it! [II Kings 2:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Elisha said to him, Take bow and arrows. And he took bow and arrows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he said to the king of Israel, Put your hand upon the bow. And he put his hand upon it, and Elisha put his hands upon the king''s hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And he said, Open the window to the east. And he opened it. Then Elisha said, Shoot. And he shot. And he said, The Lord''s arrow of victory, the arrow of victory over Syria. For you shall smite the Syrians in Aphek till you have destroyed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then he said, Take the arrows. And he took them. And he said to the king of Israel, Strike on the ground. And he struck three times and stopped.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the man of God was angry with him and said, You should have struck five or six times; then you would have struck down Syria until you had destroyed it. But now you shall strike Syria down only three times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Elisha died, and they buried him. Bands of the Moabites invaded the land in the spring of the next year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' As a man was being buried [on an open bier], such a band was seen coming; and the man was cast into Elisha''s grave. And when the man being let down touched the bones of Elisha, he revived and stood on his feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Hazael king of Syria oppressed Israel all the days of Jehoahaz.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But the Lord was gracious to them and had compassion on them and turned toward them because of His covenant with Abraham, Isaac, and Jacob, and would not destroy them or cast them from His presence yet. [Mal. 3:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Hazael king of Syria died; Ben-hadad his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Jehoash son of Jehoahaz recovered from Ben-hadad son of Hazael the cities which he had taken from Jehoahaz his father by war. Three times Jehoash defeated him, and recovered the cities of Israel. [II Kings 13:19.]'
