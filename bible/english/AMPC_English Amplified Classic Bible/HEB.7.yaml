document_id: HEB.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR THIS Melchizedek, king of Salem [and] priest of the Most High God, met Abraham as he returned from the slaughter of the kings and blessed him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Abraham gave to him a tenth portion of all [the spoil]. He is primarily, as his name when translated indicates, king of righteousness, and then he is also king of Salem, which means king of peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Without [record of] father or mother or ancestral line, neither with beginning of days nor ending of life, but, resembling the Son of God, he continues to be a priest without interruption '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without successor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Now observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider how great [a personage] this was to whom even Abraham the patriarch gave a tenth [the topmost or the pick of the heap] of the spoils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And it is true that those descendants of Levi who are charged with the priestly office are commanded in the Law to take tithes from the people–which means, from their brethren–though these have descended from Abraham.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But this person who has not their Levitical ancestry received tithes from Abraham [himself] and blessed him who possessed the promises [of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Yet it is beyond all contradiction that it is the lesser person who is blessed by the greater one.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Furthermore, here [in the Levitical priesthood] tithes are received by men who are subject to death; while there [in the case of Melchizedek], they are received by one of whom it is testified that he lives [perpetually].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' A person might even say that Levi [the father of the priestly tribe] himself, who received tithes (the tenth), paid tithes through Abraham,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For he was still in the loins of his forefather [Abraham] when Melchizedek met him [Abraham].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now if perfection (a perfect fellowship between God and the worshiper) had been attainable by the Levitical priesthood–for under it the people were given the Law–why was it further necessary that there should arise another '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' different kind of Priest, one after the order of Melchizedek, rather than one appointed after the order '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rank of Aaron?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For when there is a change in the priesthood, there is of necessity an alteration of the law [concerning the priesthood] as well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For the One of Whom these things are said belonged [not to the priestly line but] to another tribe, no member of which has officiated at the altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For it is obvious that our Lord sprang from the tribe of Judah, and Moses mentioned nothing about priests in connection with that tribe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And this becomes more plainly evident when another Priest arises Who bears the likeness of Melchizedek, [Ps. 110:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Who has been constituted a Priest, not on the basis of a bodily legal requirement [an externally imposed command concerning His physical ancestry], but on the basis of the power of an endless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indestructible Life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For it is witnessed of Him, You are a Priest forever after the order (with the rank) of Melchizedek. [Ps. 110:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' So a previous physical regulation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' command is cancelled because of its weakness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ineffectiveness and uselessness–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For the Law never made anything perfect–but instead a better hope is introduced through which we [now] come close to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And it was not without the taking of an oath [that Christ was made Priest],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For those who formerly became priests received their office without its being confirmed by the taking of an oath by God, but this One was designated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' addressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' saluted with an oath, The Lord has sworn and will not regret it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' change His mind, You are a Priest forever '
  - type: usfm
    marker: it
    children:
    - type: text
      text: according to the order of Melchizedek.
  - type: text
    text: ' [Ps. 110:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' In keeping with [the oath''s greater strength and force], Jesus has become the Guarantee of a better (stronger) agreement [a more excellent and more advantageous covenant].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' [Again, the former successive line of priests] was made up of many, because they were each prevented by death from continuing [perpetually in office];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But He holds His priesthood unchangeably, because He lives on forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Therefore He is able also to save to the uttermost (completely, perfectly, finally, and for all time and eternity) those who come to God through Him, since He is always living to make petition to God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intercede with Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intervene for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' [Here is] the High Priest [perfectly adapted] to our needs, as was fitting–holy, blameless, unstained by sin, separated from sinners, and exalted higher than the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' He has no day by day necessity, as [do each of these other] high priests, to offer sacrifice first of all for his own [personal] sins and then for those of the people, because He [met all the requirements] once for all when He brought Himself [as a sacrifice] which He offered up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For the Law sets up men in their weakness [frail, sinful, dying human beings] as high priests, but the word of [God''s] oath, which [was spoken later] after the institution of the Law, [chooses and appoints as priest One Whose appointment is complete and permanent], a Son Who has been made perfect forever. [Ps. 110:4.]'
