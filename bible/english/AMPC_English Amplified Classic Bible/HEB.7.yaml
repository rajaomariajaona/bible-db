document_id: HEB.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR THIS Melchizedek, king of Salem [and] priest of the Most High God, met Abraham as he returned from the slaughter of the kings and blessed him,'
  '10':
  - type: text
    content: ' For he was still in the loins of his forefather [Abraham] when Melchizedek met him [Abraham].'
  '11':
  - type: text
    content: ' Now if perfection (a perfect fellowship between God and the worshiper) had been attainable by the Levitical priesthood–for under it the people were given the Law–why was it further necessary that there should arise another '
  - type: text
    content: and
  - type: text
    content: ' different kind of Priest, one after the order of Melchizedek, rather than one appointed after the order '
  - type: text
    content: and
  - type: text
    content: ' rank of Aaron?'
  '12':
  - type: text
    content: ' For when there is a change in the priesthood, there is of necessity an alteration of the law [concerning the priesthood] as well.'
  '13':
  - type: text
    content: ' For the One of Whom these things are said belonged [not to the priestly line but] to another tribe, no member of which has officiated at the altar.'
  '14':
  - type: text
    content: ' For it is obvious that our Lord sprang from the tribe of Judah, and Moses mentioned nothing about priests in connection with that tribe.'
  '15':
  - type: text
    content: ' And this becomes more plainly evident when another Priest arises Who bears the likeness of Melchizedek, [Ps. 110:4.]'
  '16':
  - type: text
    content: ' Who has been constituted a Priest, not on the basis of a bodily legal requirement [an externally imposed command concerning His physical ancestry], but on the basis of the power of an endless '
  - type: text
    content: and
  - type: text
    content: ' indestructible Life.'
  '17':
  - type: text
    content: ' For it is witnessed of Him, You are a Priest forever after the order (with the rank) of Melchizedek. [Ps. 110:4.]'
  '18':
  - type: text
    content: ' So a previous physical regulation '
  - type: text
    content: and
  - type: text
    content: ' command is cancelled because of its weakness '
  - type: text
    content: and
  - type: text
    content: ' ineffectiveness and uselessness–'
  '19':
  - type: text
    content: ' For the Law never made anything perfect–but instead a better hope is introduced through which we [now] come close to God.'
  '2':
  - type: text
    content: ' And Abraham gave to him a tenth portion of all [the spoil]. He is primarily, as his name when translated indicates, king of righteousness, and then he is also king of Salem, which means king of peace.'
  '20':
  - type: text
    content: ' And it was not without the taking of an oath [that Christ was made Priest],'
  '21':
  - type: text
    content: ' For those who formerly became priests received their office without its being confirmed by the taking of an oath by God, but this One was designated '
  - type: text
    content: and
  - type: text
    content: ' addressed '
  - type: text
    content: and
  - type: text
    content: ' saluted with an oath, The Lord has sworn and will not regret it '
  - type: text
    content: or
  - type: text
    content: ' change His mind, You are a Priest forever '
  - type: text
    content: according to the order of Melchizedek.
  - type: text
    content: ' [Ps. 110:4.]'
  '22':
  - type: text
    content: ' In keeping with [the oath''s greater strength and force], Jesus has become the Guarantee of a better (stronger) agreement [a more excellent and more advantageous covenant].'
  '23':
  - type: text
    content: ' [Again, the former successive line of priests] was made up of many, because they were each prevented by death from continuing [perpetually in office];'
  '24':
  - type: text
    content: ' But He holds His priesthood unchangeably, because He lives on forever.'
  '25':
  - type: text
    content: ' Therefore He is able also to save to the uttermost (completely, perfectly, finally, and for all time and eternity) those who come to God through Him, since He is always living to make petition to God '
  - type: text
    content: and
  - type: text
    content: ' intercede with Him '
  - type: text
    content: and
  - type: text
    content: ' intervene for them.'
  '26':
  - type: text
    content: ' [Here is] the High Priest [perfectly adapted] to our needs, as was fitting–holy, blameless, unstained by sin, separated from sinners, and exalted higher than the heavens.'
  '27':
  - type: text
    content: ' He has no day by day necessity, as [do each of these other] high priests, to offer sacrifice first of all for his own [personal] sins and then for those of the people, because He [met all the requirements] once for all when He brought Himself [as a sacrifice] which He offered up.'
  '28':
  - type: text
    content: ' For the Law sets up men in their weakness [frail, sinful, dying human beings] as high priests, but the word of [God''s] oath, which [was spoken later] after the institution of the Law, [chooses and appoints as priest One Whose appointment is complete and permanent], a Son Who has been made perfect forever. [Ps. 110:4.]'
  '3':
  - type: text
    content: ' Without [record of] father or mother or ancestral line, neither with beginning of days nor ending of life, but, resembling the Son of God, he continues to be a priest without interruption '
  - type: text
    content: and
  - type: text
    content: ' without successor.'
  '4':
  - type: text
    content: ' Now observe '
  - type: text
    content: and
  - type: text
    content: ' consider how great [a personage] this was to whom even Abraham the patriarch gave a tenth [the topmost or the pick of the heap] of the spoils.'
  '5':
  - type: text
    content: ' And it is true that those descendants of Levi who are charged with the priestly office are commanded in the Law to take tithes from the people–which means, from their brethren–though these have descended from Abraham.'
  '6':
  - type: text
    content: ' But this person who has not their Levitical ancestry received tithes from Abraham [himself] and blessed him who possessed the promises [of God].'
  '7':
  - type: text
    content: ' Yet it is beyond all contradiction that it is the lesser person who is blessed by the greater one.'
  '8':
  - type: text
    content: ' Furthermore, here [in the Levitical priesthood] tithes are received by men who are subject to death; while there [in the case of Melchizedek], they are received by one of whom it is testified that he lives [perpetually].'
  '9':
  - type: text
    content: ' A person might even say that Levi [the father of the priestly tribe] himself, who received tithes (the tenth), paid tithes through Abraham,'
