document_id: PSA.77
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; after the manner of Jeduthun +[one of David's three chief musicians, founder of an official musical family+]. A Psalm of Asaph.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I WILL cry to God with my voice, even to God with my voice, and He will give ear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hearken to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' In the day of my trouble I seek (inquire of and desperately require) the Lord; in the night my hand is stretched out [in prayer] without slacking up; I refuse to be comforted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I [earnestly] remember God; I am disquieted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I groan; I muse in prayer, and my spirit faints [overwhelmed]. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' You hold my eyes from closing; I am so troubled that I cannot speak.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I consider the days of old, the years of bygone times [of prosperity].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I call to remembrance my song in the night; with my heart I meditate and my spirit searches diligently:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Will the Lord cast off forever? And will He be favorable no more?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Have His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness ceased forever? Have His promises ended for all time?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Has God [deliberately] abandoned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' forgotten His graciousness? Has He in anger shut up His compassion? Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And I say, This [apparent desertion of Israel by God] is my appointed lot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trial, but I will recall the years of the right hand of the Most High [in loving-kindness extended toward us], for this is my grief, that the right hand of the Most High changes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I will [earnestly] recall the deeds of the Lord; yes, I will [earnestly] remember the wonders [You performed for our fathers] of old.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I will meditate also upon all Your works and consider all Your [mighty] deeds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Your way, O God, is in the sanctuary [in holiness, away from sin and guilt]. Who is a great God like our God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You are the God Who does wonders; You have demonstrated Your power among the peoples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You have with Your [mighty] arm redeemed Your people, the sons of Jacob and Joseph. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When the waters [at the Red Sea and the Jordan] saw You, O God, they were afraid; the deep shuddered also, for [all] the waters saw You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The clouds poured down water, the skies sent out a sound [of rumbling thunder]; Your arrows went forth [in forked lightning].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The voice of Your thunder was in the whirlwind, the lightnings illumined the world; the earth trembled and shook.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Your way [in delivering Your people] was through the sea, and Your paths through the great waters, yet Your footsteps were not traceable, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' were obliterated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You led Your people like a flock by the hand of Moses and Aaron.'
