document_id: PSA.77,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; after the manner of Jeduthun +[one of David's three chief musicians, founder of an official musical family+]. A Psalm of Asaph.
  - type: text
    content: ' I WILL cry to God with my voice, even to God with my voice, and He will give ear '
  - type: text
    content: and
  - type: text
    content: ' hearken to me.'
  '10':
  - type: text
    content: ' And I say, This [apparent desertion of Israel by God] is my appointed lot '
  - type: text
    content: and
  - type: text
    content: ' trial, but I will recall the years of the right hand of the Most High [in loving-kindness extended toward us], for this is my grief, that the right hand of the Most High changes.'
  '11':
  - type: text
    content: ' I will [earnestly] recall the deeds of the Lord; yes, I will [earnestly] remember the wonders [You performed for our fathers] of old.'
  '12':
  - type: text
    content: ' I will meditate also upon all Your works and consider all Your [mighty] deeds.'
  '13':
  - type: text
    content: ' Your way, O God, is in the sanctuary [in holiness, away from sin and guilt]. Who is a great God like our God?'
  '14':
  - type: text
    content: ' You are the God Who does wonders; You have demonstrated Your power among the peoples.'
  '15':
  - type: text
    content: ' You have with Your [mighty] arm redeemed Your people, the sons of Jacob and Joseph. Selah [pause, and calmly think of that]!'
  '16':
  - type: text
    content: ' When the waters [at the Red Sea and the Jordan] saw You, O God, they were afraid; the deep shuddered also, for [all] the waters saw You.'
  '17':
  - type: text
    content: ' The clouds poured down water, the skies sent out a sound [of rumbling thunder]; Your arrows went forth [in forked lightning].'
  '18':
  - type: text
    content: ' The voice of Your thunder was in the whirlwind, the lightnings illumined the world; the earth trembled and shook.'
  '19':
  - type: text
    content: ' Your way [in delivering Your people] was through the sea, and Your paths through the great waters, yet Your footsteps were not traceable, '
  - type: text
    content: but
  - type: text
    content: ' were obliterated.'
  '2':
  - type: text
    content: ' In the day of my trouble I seek (inquire of and desperately require) the Lord; in the night my hand is stretched out [in prayer] without slacking up; I refuse to be comforted.'
  '20':
  - type: text
    content: ' You led Your people like a flock by the hand of Moses and Aaron.'
  '3':
  - type: text
    content: ' I [earnestly] remember God; I am disquieted '
  - type: text
    content: and
  - type: text
    content: ' I groan; I muse in prayer, and my spirit faints [overwhelmed]. Selah [pause, and calmly think of that]!'
  '4':
  - type: text
    content: ' You hold my eyes from closing; I am so troubled that I cannot speak.'
  '5':
  - type: text
    content: ' I consider the days of old, the years of bygone times [of prosperity].'
  '6':
  - type: text
    content: ' I call to remembrance my song in the night; with my heart I meditate and my spirit searches diligently:'
  '7':
  - type: text
    content: ' Will the Lord cast off forever? And will He be favorable no more?'
  '8':
  - type: text
    content: ' Have His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness ceased forever? Have His promises ended for all time?'
  '9':
  - type: text
    content: ' Has God [deliberately] abandoned '
  - type: text
    content: or
  - type: text
    content: ' forgotten His graciousness? Has He in anger shut up His compassion? Selah [pause, and calmly think of that]!'
