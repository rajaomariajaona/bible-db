document_id: 2SA.6,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AGAIN DAVID gathered together all the chosen men of Israel, 30,000.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So David was not willing to take the ark of the Lord to him into the City of David; but he took it aside into the house of Obed-edom the Gittite.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the ark of the Lord remained in the house of Obed-edom the Gittite for three months, and the Lord blessed Obed-edom and all his household.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And it was told King David, The Lord has blessed the house of Obed-edom and all that belongs to him, because of the ark of God. So David went and brought up the ark of God from the house of Obed-edom into the City of David with rejoicing;'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when those who bore the ark of the Lord had gone six paces, he sacrificed an ox and a fatling.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David danced before the Lord with all his might, clad in a linen ephod [a priest''s upper garment].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So David and all the house of Israel brought up the ark of the Lord with shouting and with the sound of the trumpet.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As the ark of the Lord came into the City of David, Michal, Saul''s daughter [David''s wife], looked out of the window and saw King David leaping and dancing before the Lord, and she despised him in her heart.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They brought in the ark of the Lord and set it in its place inside the tent which David had pitched for it, and David offered burnt offerings and peace offerings before the Lord.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When David had finished offering the burnt offerings and peace offerings, he blessed the people in the name [and presence] of the Lord of hosts,'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And distributed among all the people, the whole multitude of Israel, both to men and women, to each a cake of bread, a portion of meat, and a cake of raisins. So all the people departed, each to his house.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [he] arose and went with all the people who were with him to Baale-judah [Kiriath-jearim] to bring up from there the ark of God, which is called by the name of the Lord of hosts, Who sits enthroned above the cherubim.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then David returned to bless his household. And [his wife] Michal daughter of Saul came out to meet David and said, How glorious was the king of Israel today, who stripped himself of his kingly robes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uncovered himself in the eyes of his servants'' maids as one of the worthless fellows shamelessly uncovers himself!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David said to Michal, It was before the Lord, Who chose me above your father and all his house to appoint me as prince over Israel, the people of the Lord. Therefore will I make merry [in pure enjoyment] before the Lord.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will be still more lightly esteemed than this, and will humble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lower myself in my own sight [and yours]. But by the maids you mentioned, I will be held in honor.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Michal the daughter of Saul had no child to the day of her death.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they set the ark of God upon a new cart and brought it out of the house of Abinadab, which was on the hill; and Uzzah and Ahio, sons of Abinadab, drove the new cart.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they brought it out of the house of Abinadab, which was on the hill, with the ark of God; and Ahio went before the ark.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And David and all the house of Israel played before the Lord with all their might, with songs, lyres, harps, tambourines, castanets, and cymbals.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when they came to Nacon''s threshing floor, Uzzah put out his hand to the ark of God and took hold of it, for the oxen stumbled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shook it.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the anger of the Lord was kindled against Uzzah; and God smote him there for touching the ark, and he died there by the ark of God.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David was grieved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offended because the Lord had broken forth upon Uzzah, and that place is called Perez-uzzah [the breaking forth upon Uzzah] to this day.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' David was afraid of the Lord that day and said, How can the ark of the Lord come to me?'
