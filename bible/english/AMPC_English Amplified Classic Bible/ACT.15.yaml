document_id: ACT.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT SOME men came down from Judea and were instructing the brethren, Unless you are circumcised in accordance with the Mosaic custom, you cannot be saved. [Gen. 17:9-14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And when Paul and Barnabas had no small disagreement and discussion with them, it was decided that Paul and Barnabas and some of the others of their number should go up to Jerusalem [and confer] with the apostles (special messengers) and the elders about this matter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So, being fitted out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sent on their way by the church, they went through both Phoenicia and Samaria telling of the conversion of the Gentiles (the heathen), and they caused great rejoicing among all the brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When they arrived in Jerusalem, they were heartily welcomed by the church and the apostles and the elders, and they told them all that God had accomplished through them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But some who believed [who acknowledged Jesus as their Savior and devoted themselves to Him] belonged to the sect of the Pharisees, and they rose up and said, It is necessary to circumcise [the Gentile converts] and to charge them to obey the Law of Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The apostles and the elders were assembled together to look into '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider this matter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And after there had been a long debate, Peter got up and said to them, Brethren, you know that quite a while ago God made a choice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' selection from among you, that by my mouth the Gentiles should hear the message of the Gospel [concerning the attainment through Christ of salvation in the kingdom of God] and believe (credit and place their confidence in it).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And God, Who is acquainted with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understands the heart, bore witness to them, giving them the Holy Spirit as He also did to us;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And He made no difference between us and them, but cleansed their hearts by faith (by a strong and welcome conviction that Jesus is the Messiah, through Whom we obtain eternal salvation in the kingdom of God).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Now then, why do you try to test God by putting a yoke on the necks of the disciples, such as neither our forefathers nor we [ourselves] were able to endure?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But we believe that we are saved through the grace (the undeserved favor and mercy) of the Lord Jesus, just as they [are].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then the whole assembly remained silent, and they listened [attentively] as Barnabas and Paul rehearsed what signs and wonders God had performed through them among the Gentiles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When they had finished talking, James replied, Brethren, listen to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Simeon [Peter] has rehearsed how God first visited the Gentiles, to take out of them a people [to bear and honor] His name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And with this the predictions of the prophets agree, as it is written,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' After this I will come back, and will rebuild the house of David, which has fallen; I will rebuild its [very] ruins, and I will set it up again,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So that the rest of men may seek the Lord, and all the Gentiles upon whom My name has been invoked,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Says the Lord, Who has been making these things known from the beginning of the world. [Isa. 45:21; Jer. 12:15; Amos 9:11, 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Therefore it is my opinion that we should not put obstacles in the way of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' annoy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disturb those of the Gentiles who turn to God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But we should send word to them in writing to abstain from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avoid anything that has been polluted by being offered to idols, and all sexual impurity, and [eating meat of animals] that have been strangled, and [tasting of] blood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For from ancient generations Moses has had his preachers in every town, for he is read [aloud] every Sabbath in the synagogues.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then the apostles and the elders, together with the whole church, resolved to select men from among their number and send them to Antioch with Paul and Barnabas. They chose Judas called Barsabbas, and Silas, [both] leading men among the brethren, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sent them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' With [them they sent] the following letter: The brethren, both the apostles and the elders, to the brethren who are of the Gentiles in Antioch and Syria and Cilicia, greetings:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' As we have heard that some persons from our number have disturbed you with their teaching, unsettling your minds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' throwing you into confusion, although we gave them no express orders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' instructions [on the points in question],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' It has been resolved by us in assembly to select men and send them [as messengers] to you with our beloved Barnabas and Paul,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Men who have hazarded their lives for the sake of our Lord Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' So we have sent Judas and Silas, who themselves will bring you the same message by word of mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For it has seemed good to the Holy Spirit and to us not to lay upon you any greater burden than these indispensable requirements:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' That you abstain from what has been sacrificed to idols and from [tasting] blood and from [eating the meat of animals] that have been strangled and from sexual impurity. If you keep yourselves from these things, you will do well. Farewell [be strong]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' So when [the messengers] were sent off, they went down to Antioch; and having assembled the congregation, they delivered the letter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And when they read it, the people rejoiced at the consolation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouragement [it brought them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And Judas and Silas, who were themselves prophets (inspired interpreters of the will and purposes of God), urged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consoled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraged the brethren with many words and strengthened them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And after spending some time there, they were sent back by the brethren with [the greeting] peace to those who had sent them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: However, Silas decided to stay on there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' But Paul and Barnabas remained in Antioch and with many others also continued teaching and proclaiming the good news, the Word of the Lord [concerning the attainment through Christ of eternal salvation in God''s kingdom].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And after some time Paul said to Barnabas, Come, let us go back and again visit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' minister to the brethren in every town where we made known the message of the Lord, and see how they are getting along.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Now Barnabas wanted to take with them John called Mark [his near relative].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But Paul did not think it best to have along with them the one who had quit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deserted them in Pamphylia and had not gone on with them to the work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And there followed a sharp disagreement between them, so that they separated from each other, and Barnabas took Mark with him and sailed away to Cyprus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' But Paul selected Silas and set out, being commended by the brethren to the grace (the favor and mercy) of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And he passed through Syria and Cilicia, establishing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthening the churches.'
