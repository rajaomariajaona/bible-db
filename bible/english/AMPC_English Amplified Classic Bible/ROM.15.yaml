document_id: ROM.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WE WHO are strong [in our convictions and of robust faith] ought to bear with the failings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the frailties '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the tender scruples of the weak; [we ought to help carry the doubts and qualms of others] and not to please ourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let each one of us make it a practice to please (make happy) his neighbor for his good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for his true welfare, to edify him [to strengthen him and build him up spiritually].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For Christ did not please Himself [gave no thought to His own interests]; but, as it is written, The reproaches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abuses of those who reproached '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abused you fell on Me. [Ps. 69:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For whatever was thus written in former days was written for our instruction, that by [our steadfast and patient] endurance and the encouragement [drawn] from the Scriptures we might hold fast to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cherish hope.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now may the God Who gives the power of patient endurance (steadfastness) and Who supplies encouragement, grant you to live in such mutual harmony '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' such full sympathy with one another, in accord with Christ Jesus,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' That together you may [unanimously] with united hearts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' one voice, praise and glorify the God and Father of our Lord Jesus Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Welcome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' receive [to your hearts] one another, then, even as Christ has welcomed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' received you, for the glory of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For I tell you that Christ (the Messiah) became a servant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a minister to the circumcised (the Jews) in order to show God''s truthfulness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honesty by confirming (verifying) the promises [given] to our fathers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And [also in order] that the Gentiles (nations) might glorify God for His mercy [not covenanted] to them. As it is written, Therefore I will praise You among the Gentiles and sing praises to Your name. [Ps. 18:49.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Again it is said, Rejoice (exult), O Gentiles, along with His [own] people; [Deut. 32:43.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And again, Praise the Lord, all you Gentiles, and let all the peoples praise Him! [Ps. 117:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And further Isaiah says, There shall be a Sprout from the Root of Jesse, He Who rises to rule over the Gentiles; in Him shall the Gentiles hope. [Isa. 11:1, 10; Rev. 5:5; 22:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' May the God of your hope so fill you with all joy and peace in believing [through the experience of your faith] that by the power of the Holy Spirit you may abound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be overflowing (bubbling over) with hope.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Personally I am satisfied about you, my brethren, that you yourselves are rich in goodness, amply filled with all [spiritual] knowledge and competent to admonish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruct one another also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Still on some points I have written to you the more boldly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unreservedly by way of reminder. [I have done so] because of the grace (the unmerited favor) bestowed on me by God'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' In making me a minister of Christ Jesus to the Gentiles. I act in the priestly service of the Gospel (the good news) of God, in order that the sacrificial offering of the Gentiles may be acceptable [to God], consecrated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made holy by the Holy Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' In Christ Jesus, then, I have legitimate reason to glory (exult) in my work for God [in what through Christ Jesus I have accomplished concerning the things of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For [of course] I will not venture (presume) to speak thus of any work except what Christ has actually done through me [as an instrument in His hands] to win obedience from the Gentiles, by word and deed,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [Even as my preaching has been accompanied] with the power of signs and wonders, [and all of it] by the power of the Holy Spirit. [The result is] that starting from Jerusalem and as far round as Illyricum, I have fully preached the Gospel [faithfully executing, accomplishing, carrying out to the full the good news] of Christ (the Messiah) in its entirety.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Thus my ambition has been to preach the Gospel, not where Christ''s name has already been known, lest I build on another man''s foundation;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But [instead I would act on the principle] as it is written, They shall see who have never been told of Him, and they shall understand who have never heard [of Him]. [Isa. 52:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' This [ambition] is the reason why I have so frequently been hindered from coming to visit you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But now since I have no further opportunity for work in these regions, and since I have longed for enough years to come to you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' I hope to see you in passing [through Rome] as I go [on my intended trip] to Spain, and to be aided on my journey there by you, after I have enjoyed your company for a little while.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For the present, however, I am going to Jerusalem to bring aid (relief) for the saints (God''s people there).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For it has been the good pleasure of Macedonia and Achaia to make some contribution for the poor among the saints of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' They were pleased to do it; and surely they are in debt to them, for if these Gentiles have come to share in their [the Jerusalem Jews''] spiritual blessings, then they ought also to be of service to them in material blessings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' When therefore I have completed this mission and have delivered to them [at Jerusalem] what has been raised, I shall go on by way of you to Spain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And I know that when I do come to you, I shall come in the abundant blessing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the Gospel
  - type: text
    text: ' of Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' I appeal to you [I entreat you], brethren, for the sake of our Lord Jesus Christ and by the love [given by] the Spirit, to unite with me in earnest wrestling in prayer to God in my behalf.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' [Pray] that I may be delivered (rescued) from the unbelievers in Judea and that my mission of relief to Jerusalem may be acceptable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' graciously received by the saints (God''s people there),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' So that by God''s will I may subsequently come to you with joy (with a happy heart) and be refreshed [by the interval of rest] in your company.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' May [our] peace-giving God be with you all! Amen (so be it).'
