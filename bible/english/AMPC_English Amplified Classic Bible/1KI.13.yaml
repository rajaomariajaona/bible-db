document_id: 1KI.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND BEHOLD, there came a man of God out of Judah by the word of the Lord to Bethel. Jeroboam stood by the altar to burn incense.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The man cried against the altar by the word of the Lord, O altar, altar, thus says the Lord: Behold, a son shall be born to the house of David, Josiah by name; and on you shall he offer the priests of the high places who burn incense on you, and men''s bones shall be burned on you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And he gave a sign the same day, saying, This is the sign which the Lord has spoken: Behold, the altar shall be split and the ashes that are upon it shall be poured out. [Fulfilled in II Kings 23:15, 16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When King Jeroboam heard the words the man of God cried against the altar in Bethel, he thrust out his hand, saying, Lay hold on him! And his hand which he put forth against him dried up, so that he could not draw it to him again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The altar also was split and the ashes poured out from the altar according to the sign which the man of God had given by the word of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the king said to the man of God, Entreat now the favor of the Lord your God and pray for me, that my hand may be restored to me. And the man of God entreated the Lord, and the king''s hand was restored and became as it was before.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And the king said to the man of God, Come home with me and refresh yourself, and I will give you a reward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the man of God said to the king, If you give me half your house, I will not go in with you, and I will not eat bread or drink water in this place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For I was commanded by the word of the Lord, You shall eat no bread or drink water or return by the way you came.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So he went another way and did not return by the way that he came to Bethel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now there dwelt an old prophet in Bethel; and his sons came and told him all that the man of God had done that day in Bethel; the words which he had spoken to the king they told also to their father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Their father asked them, Which way did he go? For his sons had seen which way the man of God who came from Judah had gone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He said to his sons, Saddle the donkey for me. So they saddled the donkey and he rode on it'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And went after the man of God. And he found him sitting under an oak, and he said to him, Are you the man of God who came from Judah? And he said, I am.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then he said to him, Come home with me and eat bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He said, I may not return with you or go in with you, neither will I eat bread or drink water with you in this place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For I was told by the word of the Lord, You shall not eat bread or drink water there or return by the way that you came.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He answered, I am a prophet also, as you are. And an angel spoke to me by the word of the Lord, saying, Bring him back with you to your house, that he may eat bread and drink water. But he lied to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So the man from Judah went back with him and ate and drank water in his house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And as they sat at the table, the word of the Lord came to the prophet who brought him back.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And he cried to the man of God who came from Judah, Thus says the Lord: Because you have disobeyed the word of the Lord and have not kept the command which the Lord your God commanded you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But have come back and have eaten bread and drunk water in the place of which the Lord said to you, Eat no bread and drink no water–your corpse shall not come to the tomb of your fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And after the prophet of the house had eaten bread and drunk, he saddled the donkey for the man he had brought back.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And when he had gone, a lion met him by the road and slew him, and his corpse was cast in the way, and the donkey stood by it; the lion also stood by the corpse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And behold, men passed by and saw the corpse thrown in the road, and the lion standing by the corpse, and they came and told it in the city where the old prophet dwelt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' When the prophet who brought him back from the way heard of it, he said, It is the man of God who was disobedient to the word of the Lord; therefore the Lord has given him to the lion, which has torn him and slain him, according to the word of the Lord which He spoke to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And he said to his sons, Saddle the donkey for me. And they saddled it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And he went and found the corpse thrown in the road, and the donkey and the lion stood by the body; the lion had not eaten the corpse or torn the donkey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' The prophet took up the corpse of the man of God and laid it upon the donkey and brought it back, and the old prophet came into the city to mourn and to bury him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And he laid the body in his own grave, and they mourned over him, saying, Alas, my brother!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' After he had buried him, he said to his sons, When I am dead, bury me in the grave in which the man of God is buried; lay my bones beside his bones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' For the saying which he cried by the word of the Lord against the altar in Bethel and against all the houses of the high places which are in the cities of Samaria shall surely come to pass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' After this thing, Jeroboam turned not from his evil way, but made priests for the high places again from among all the people. Whoever would, he consecrated, that there might be priests for the high places.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And this thing became the sin of the dynasty of Jeroboam that caused it to be abolished and destroyed from the face of the earth.'
