document_id: PSA.38,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Psalm of David; to bring to remembrance {and} make memorial.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', rebuke me not in Your wrath, neither chasten me in Your hot displeasure.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' My heart throbs, my strength fails me; as for the light of my eyes, it also is gone from me.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' My lovers and my friends stand aloof from my plague; and my neighbors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my near ones stand afar off. [Luke 23:49.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' They also that seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' demand my life lay snares for me, and they that seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require my hurt speak crafty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mischievous things; they meditate treachery '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceit all the day long.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But I, like a deaf man, hear not; and I am like a dumb man who opens not his mouth.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Yes, I have become like a man who hears not, in whose mouth are no arguments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' replies.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' For in You, O Lord, do I hope; You will answer, O Lord my God.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' For I pray, Let them not rejoice over me, who when my foot slips boast against me.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' For I am ready to halt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall; my pain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorrow are continually before me.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' For I do confess my guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' iniquity; I am filled with sorrow for my sin. [II Cor. 7:9, 10.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But my enemies are vigorous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strong, and those who hate me wrongfully are multiplied.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For Your arrows have sunk into me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stick fast, and Your hand has come down upon me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pressed me sorely.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' They also that render evil for good are adversaries to me, because I follow the thing that is good.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Forsake me not, O Lord; O my God, be not far from me.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Make haste to help me, O Lord, my Salvation.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' There is no soundness in my flesh because of Your indignation; neither is there any health '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' rest in my bones because of my sin.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For my iniquities have gone over my head [like waves of a flood]; as a heavy burden they weigh too much for me.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' My wounds are loathsome and corrupt because of my foolishness.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I am bent and bowed down greatly; I go about mourning all the day long.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For my loins are filled with burning; and there is no soundness in my flesh.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' I am faint and sorely bruised [deadly cold and quite worn out]; I groan by reason of the disquiet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' moaning of my heart.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Lord, all my desire is before You; and my sighing is not hidden from You.'
