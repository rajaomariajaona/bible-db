document_id: PSA.38,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David; to bring to remembrance {and} make memorial.
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: ', rebuke me not in Your wrath, neither chasten me in Your hot displeasure.'
  '10':
  - type: text
    content: ' My heart throbs, my strength fails me; as for the light of my eyes, it also is gone from me.'
  '11':
  - type: text
    content: ' My lovers and my friends stand aloof from my plague; and my neighbors '
  - type: text
    content: and
  - type: text
    content: ' my near ones stand afar off. [Luke 23:49.]'
  '12':
  - type: text
    content: ' They also that seek '
  - type: text
    content: and
  - type: text
    content: ' demand my life lay snares for me, and they that seek '
  - type: text
    content: and
  - type: text
    content: ' require my hurt speak crafty '
  - type: text
    content: and
  - type: text
    content: ' mischievous things; they meditate treachery '
  - type: text
    content: and
  - type: text
    content: ' deceit all the day long.'
  '13':
  - type: text
    content: ' But I, like a deaf man, hear not; and I am like a dumb man who opens not his mouth.'
  '14':
  - type: text
    content: ' Yes, I have become like a man who hears not, in whose mouth are no arguments '
  - type: text
    content: or
  - type: text
    content: ' replies.'
  '15':
  - type: text
    content: ' For in You, O Lord, do I hope; You will answer, O Lord my God.'
  '16':
  - type: text
    content: ' For I pray, Let them not rejoice over me, who when my foot slips boast against me.'
  '17':
  - type: text
    content: ' For I am ready to halt '
  - type: text
    content: and
  - type: text
    content: ' fall; my pain '
  - type: text
    content: and
  - type: text
    content: ' sorrow are continually before me.'
  '18':
  - type: text
    content: ' For I do confess my guilt '
  - type: text
    content: and
  - type: text
    content: ' iniquity; I am filled with sorrow for my sin. [II Cor. 7:9, 10.]'
  '19':
  - type: text
    content: ' But my enemies are vigorous '
  - type: text
    content: and
  - type: text
    content: ' strong, and those who hate me wrongfully are multiplied.'
  '2':
  - type: text
    content: ' For Your arrows have sunk into me '
  - type: text
    content: and
  - type: text
    content: ' stick fast, and Your hand has come down upon me '
  - type: text
    content: and
  - type: text
    content: ' pressed me sorely.'
  '20':
  - type: text
    content: ' They also that render evil for good are adversaries to me, because I follow the thing that is good.'
  '21':
  - type: text
    content: ' Forsake me not, O Lord; O my God, be not far from me.'
  '22':
  - type: text
    content: ' Make haste to help me, O Lord, my Salvation.'
  '3':
  - type: text
    content: ' There is no soundness in my flesh because of Your indignation; neither is there any health '
  - type: text
    content: or
  - type: text
    content: ' rest in my bones because of my sin.'
  '4':
  - type: text
    content: ' For my iniquities have gone over my head [like waves of a flood]; as a heavy burden they weigh too much for me.'
  '5':
  - type: text
    content: ' My wounds are loathsome and corrupt because of my foolishness.'
  '6':
  - type: text
    content: ' I am bent and bowed down greatly; I go about mourning all the day long.'
  '7':
  - type: text
    content: ' For my loins are filled with burning; and there is no soundness in my flesh.'
  '8':
  - type: text
    content: ' I am faint and sorely bruised [deadly cold and quite worn out]; I groan by reason of the disquiet '
  - type: text
    content: and
  - type: text
    content: ' moaning of my heart.'
  '9':
  - type: text
    content: ' Lord, all my desire is before You; and my sighing is not hidden from You.'
