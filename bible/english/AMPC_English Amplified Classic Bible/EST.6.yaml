document_id: EST.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ON THAT night the king could not sleep; and he ordered that the book of memorable deeds, the chronicles, be brought, and they were read before the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And it was found written there how Mordecai had told of Bigthana and Teresh, two of the king''s attendants who guarded the door, who had sought to lay hands on King Ahasuerus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the king said, What honor or distinction has been given Mordecai for this? Then the king''s servants who ministered to him said, Nothing has been done for him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The king said, Who is in the court? Now Haman had just come into the outer court of the king''s palace to ask the king to hang Mordecai on the gallows he had prepared for him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the king''s servants said to him, Behold, Haman is standing in the court. And the king said, Let him come in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So Haman came in. And the king said to him, What shall be done to the man whom the king delights to honor? Now Haman said to himself, To whom would the king delight to do honor more than to me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Haman said to the king, For the man whom the king delights to honor,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Let royal apparel be brought which the king has worn and the horse which the king has ridden, and a royal crown be set on his head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And let the apparel and the horse be delivered to the hand of one of the king''s most noble princes. Let him array the man whom the king delights to honor, and conduct him on horseback through the open square of the city, and proclaim before him, Thus shall it be done to the man whom the king delights to honor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then the king said to Haman, Make haste and take the apparel and the horse, as you have said, and do so to Mordecai the Jew, who sits at the king''s gate. Leave out nothing that you have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then Haman took the apparel and the horse and conducted Mordecai on horseback through the open square of the city, proclaiming before him, Thus shall it be done to the man whom the king delights to honor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then Mordecai came again to the king''s gate. But Haman hastened to his house, mourning and having his head covered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Haman recounted to Zeresh his wife and all his friends everything that had happened to him. Then his wise men and Zeresh his wife said to him, If Mordecai, before whom you have begun to fall, is of the offspring of the Jews, you cannot prevail against him, but shall surely fall before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' While they were yet talking with him, the king''s attendants came and hastily brought Haman to the dinner that Esther had prepared.'
