document_id: 1CH.29,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND KING David said to all the assembly, Solomon my son, whom alone God has chosen, is yet young, tender, '
  - type: text
    content: and
  - type: text
    content: ' inexperienced; and the work is great, for the palace is not to be for man but for the Lord God.'
  '10':
  - type: text
    content: ' Therefore David blessed the Lord before all the assembly and said, Be praised, adored, '
  - type: text
    content: and
  - type: text
    content: ' thanked, O Lord, the God of Israel our [forefather], forever and ever.'
  '11':
  - type: text
    content: ' Yours, O Lord, is the greatness and the power and the glory and the victory and the majesty, for all that is in the heavens and the earth is Yours; Yours is the kingdom, O Lord, and Yours it is to be exalted as Head over all.'
  '12':
  - type: text
    content: ' Both riches and honor come from You, and You reign over all. In Your hands are power and might; in Your hands it is to make great and to give strength to all.'
  '13':
  - type: text
    content: ' Now therefore, our God, we thank You and praise Your glorious name '
  - type: text
    content: and
  - type: text
    content: ' those attributes which that name denotes.'
  '14':
  - type: text
    content: ' But who am I, and what are my people, that we should retain strength '
  - type: text
    content: and
  - type: text
    content: ' be able to offer thus so willingly? For all things come from You, and out of Your own [hand] we have given You.'
  '15':
  - type: text
    content: ' For we are strangers before You, and sojourners, as all our fathers were; our days on the earth are like a shadow, and there is no hope '
  - type: text
    content: or
  - type: text
    content: ' expectation of remaining.'
  '16':
  - type: text
    content: ' O Lord our God, all this store that we have prepared to build You a house for Your holy Name '
  - type: text
    content: and
  - type: text
    content: ' the token of Your presence comes from Your hand, and is all Your own.'
  '17':
  - type: text
    content: ' I know also, my God, that You try the heart and delight in uprightness. In the uprightness of my heart I have freely offered all these things. And now I have seen with joy Your people who are present here offer voluntarily '
  - type: text
    content: and
  - type: text
    content: ' freely to You.'
  '18':
  - type: text
    content: ' O Lord, God of Abraham, Isaac, and Israel, our fathers, keep forever such purposes '
  - type: text
    content: and
  - type: text
    content: ' thoughts in the minds of Your people, and direct '
  - type: text
    content: and
  - type: text
    content: ' establish their hearts toward You.'
  '19':
  - type: text
    content: ' And give to Solomon my son a blameless heart to keep Your commandments, testimonies, and statutes, and to do all that is necessary to build the palace [for You] for which I have made provision.'
  '2':
  - type: text
    content: ' So I have provided with all my might for the house of my God the gold for things to be of gold, silver for things of silver, bronze for things of bronze, iron for things of iron, and wood for things of wood, as well as onyx '
  - type: text
    content: or
  - type: text
    content: ' beryl stones, stones to be set, stones of antimony, stones of various colors, and all sorts of precious stones, and marble stones in abundance.'
  '20':
  - type: text
    content: ' And David said to all the assembly, Now adore (praise and thank) the Lord your God! And all the assembly blessed the Lord, the God of their fathers, and bowed down and did obeisance to the Lord and to the king [as His earthly representative].'
  '21':
  - type: text
    content: ' The next day they offered sacrifices and burnt offerings to the Lord: 1,000 bulls, 1,000 rams, and 1,000 lambs, with their drink offerings, and sacrifices in abundance for all Israel.'
  '22':
  - type: text
    content: ' They ate and drank before the Lord on that day with great rejoicing. They made Solomon son of David king a second time, and anointed him as prince for the Lord and Zadok to be high priest.'
  '23':
  - type: text
    content: ' Then Solomon sat on the throne of the Lord as king instead of David his father; and he prospered, and all Israel obeyed him.'
  '24':
  - type: text
    content: ' All the leaders and mighty men, and also all the sons of King David, pledged allegiance to King Solomon.'
  '25':
  - type: text
    content: ' And the Lord magnified Solomon exceedingly in the sight of all Israel and bestowed upon him such royal majesty as had not been on any king before him in Israel.'
  '26':
  - type: text
    content: ' Thus David son of Jesse reigned over all Israel.'
  '27':
  - type: text
    content: ' The time he reigned over Israel was forty years–he reigned seven years in Hebron and thirty-three years in Jerusalem.'
  '28':
  - type: text
    content: ' He died in a good old age [his seventy-first year], full '
  - type: text
    content: and
  - type: text
    content: ' satisfied with days, riches, and honor. Solomon his son reigned in his stead.'
  '29':
  - type: text
    content: ' Now the acts of King David, from first to last, are written in the recorded words of Samuel the seer, Nathan the prophet, and Gad the seer,'
  '3':
  - type: text
    content: ' Moreover, because I have set my affection on the house of my God, in addition to all I have prepared for the holy house, I have a private treasure of gold and silver which I give for the house of my God:'
  '30':
  - type: text
    content: ' With accounts of all his reign and his might, and the times through which he and Israel passed, as did all the kingdoms of the countries.'
  '4':
  - type: text
    content: ' It is 3,000 talents of gold, gold of Ophir, 7,000 talents of refined silver for overlaying the walls of the house,'
  '5':
  - type: text
    content: ' Gold for the uses of gold, silver for the uses of silver, and for every work to be done by craftsmen. Now who will offer willingly to fill his hand [and consecrate it] today to the Lord [like one consecrating himself to the priesthood]?'
  '6':
  - type: text
    content: ' Then the chiefs of the fathers and princes of the tribes of Israel and the captains of thousands and of hundreds, with the rulers of the king''s work, offered willingly'
  '7':
  - type: text
    content: ' And gave for the service of the house of God–of gold 5,000 talents and 10,000 darics, of silver 10,000 talents, of bronze 18,000 talents, and 100,000 talents of iron.'
  '8':
  - type: text
    content: ' And whoever had precious stones gave them to the treasury of the house of the Lord in the care of Jehiel the Gershonite.'
  '9':
  - type: text
    content: ' Then the people rejoiced because these had given willingly, for with a whole '
  - type: text
    content: and
  - type: text
    content: ' blameless heart they had offered freely to the Lord. King David also rejoiced greatly.'
