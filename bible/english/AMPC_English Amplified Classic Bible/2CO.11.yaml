document_id: 2CO.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I WISH you would bear with me while I indulge in a little [so-called] foolishness. Do bear with me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For I am zealous for you with a godly eagerness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a divine jealousy, for I have betrothed you to one Husband, to present you as a chaste virgin to Christ. [Hos. 2:19, 20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But [now] I am fearful, lest that even as the serpent beguiled Eve by his cunning, so your minds may be corrupted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seduced from wholehearted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sincere '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pure devotion to Christ. [Gen. 3:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For [you seem readily to endure it] if a man comes and preaches another Jesus than the One we preached, or if you receive a different spirit from the [Spirit] you [once] received or a different gospel from the one you [then] received '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed; you tolerate [all that] well enough!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Yet I consider myself as in no way inferior to these [precious] extra-super [false] apostles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But even if [I am] unskilled in speaking, yet [I am] not [unskilled] in knowledge [I know what I am talking about]; we have made this evident to you in all things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But did I perhaps make a mistake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do you a wrong in debasing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cheapening myself so that you might be exalted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enriched in dignity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' happiness by preaching God''s Gospel without expense to you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Other churches I have robbed by accepting [more than their share of] support for my ministry [from them in order] to serve you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And when I was with you and ran short financially, I did not burden any [of you], for what I lacked was abundantly made up by the brethren who came from Macedonia. So I kept myself from being burdensome to you in any way, and will continue to keep [myself from being so].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' As the truth of Christ is in me, this my boast [of independence] shall not be debarred (silenced or checked) in the regions of Achaia (most of Greece).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And why? Because I do not love you [do not have a preference for you, wish you well, and regard your welfare]? God perceives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knows that I do!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But what I do, I will continue to do, [for I am determined to maintain this independence] in order to cut off the claim of those who would like [to find an occasion and incentive] to claim that in their boasted [mission] they work on the same terms that we do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For such men are false apostles [spurious, counterfeits], deceitful workmen, masquerading as apostles (special messengers) of Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And it is no wonder, for Satan himself masquerades as an angel of light;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So it is not surprising if his servants also masquerade as ministers of righteousness. [But] their end will correspond with their deeds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I repeat then, let no one think I have lost my wits; but even if you do, then bear with a witless man, so that I too may boast a little.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' What I say by way of this confident boasting, I say not with the Lord''s authority [by inspiration] but, as it were, in pure witlessness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' [For] since many boast of worldly things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' according to the flesh, I will glory (boast) also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For you readily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gladly bear with the foolish, since you are so smart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wise yourselves!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For you endure it if a man assumes control of your souls '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' makes slaves of you, or devours [your substance, spends your money] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preys upon you, or deceives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' takes advantage of you, or is arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' puts on airs, or strikes you in the face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' To my discredit, I must say, we have shown ourselves too weak [for you to show such tolerance of us and for us to do strong, courageous things like that to you]! But in whatever any person is bold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dares [to boast]–mind you, I am speaking in this foolish (witless) way–I also am bold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dare [to boast].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' They are Hebrews? So am I! They are Israelites? So am I! They are descendants of Abraham? So am I!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Are they [ministering] servants of Christ (the Messiah)? I am talking like one beside himself, [but] I am more, with far more extensive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abundant labors, with far more imprisonments, [beaten] with countless stripes, and frequently [at the point of] death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Five times I received from [the hands of] the Jews forty [lashes all] but one; [Deut. 25:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Three times I have been beaten with rods; once I was stoned. Three times I have been aboard a ship wrecked at sea; a [whole] night and a day I have spent [adrift] on the deep;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Many times on journeys, [exposed to] perils from rivers, perils from bandits, perils from [my own] nation, perils from the Gentiles, perils in the city, perils in the desert places, perils in the sea, perils from those posing as believers [but destitute of Christian knowledge and piety];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' In toil and hardship, watching often [through sleepless nights], in hunger and thirst, frequently driven to fasting by want, in cold and exposure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lack of clothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And besides those things that are without, there is the daily [inescapable pressure] of my care '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anxiety for all the churches!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Who is weak, and I do not feel [his] weakness? Who is made to stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have his faith hurt, and I am not on fire [with sorrow or indignation]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' If I must boast, I will boast of the things that [show] my infirmity [of the things by which I am made weak and contemptible in the eyes of my opponents].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The God and Father of the Lord Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ
  - type: text
    text: ' knows, He Who is blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be praised forevermore, that I do not lie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' In Damascus, the city governor acting under King Aretas guarded the city of Damascus [on purpose] to arrest me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And I was [actually] let down in a [rope] basket '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hamper through a window (a small door) in the wall, and I escaped through his fingers.'
