document_id: EST.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' KING AHASUERUS laid a tribute (tax) on the land and on the coastlands of the sea.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And all the acts of his power and of his might, and the full account of the greatness of Mordecai to which the king advanced him, are they not written in the Book of the Chronicles of the Kings of Media and Persia?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' For Mordecai the Jew was next to King Ahasuerus and great among the Jews, and was a favorite with the multitude of his brethren, for he sought the welfare of his people and spoke peace to his whole race.'
