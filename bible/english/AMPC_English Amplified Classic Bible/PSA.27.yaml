document_id: PSA.27,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] of David.
  - type: text
    content: ' THE '
  - type: text
    content: Lord
  - type: text
    content: ' is my Light and my Salvation–whom shall I fear '
  - type: text
    content: or
  - type: text
    content: ' dread? The Lord is the Refuge '
  - type: text
    content: and
  - type: text
    content: ' Stronghold of my life–of whom shall I be afraid?'
  '10':
  - type: text
    content: ' Although my father and my mother have forsaken me, yet the Lord will take me up [adopt me as His child]. [Ps. 22:10.]'
  '11':
  - type: text
    content: ' Teach me Your way, O Lord, and lead me in a plain '
  - type: text
    content: and
  - type: text
    content: ' even path because of my enemies [those who lie in wait for me].'
  '12':
  - type: text
    content: ' Give me not up to the will of my adversaries, for false witnesses have risen up against me; they breathe out cruelty '
  - type: text
    content: and
  - type: text
    content: ' violence.'
  '13':
  - type: text
    content: ' [What, what would have become of me] had I not believed that I would see the Lord''s goodness in the land of the living!'
  '14':
  - type: text
    content: ' Wait '
  - type: text
    content: and
  - type: text
    content: ' hope for '
  - type: text
    content: and
  - type: text
    content: ' expect the Lord; be brave '
  - type: text
    content: and
  - type: text
    content: ' of good courage and let your heart be stout '
  - type: text
    content: and
  - type: text
    content: ' enduring. Yes, wait for '
  - type: text
    content: and
  - type: text
    content: ' hope for '
  - type: text
    content: and
  - type: text
    content: ' expect the Lord.'
  '2':
  - type: text
    content: ' When the wicked, even my enemies and my foes, came upon me to eat up my flesh, they stumbled and fell.'
  '3':
  - type: text
    content: ' Though a host encamp against me, my heart shall not fear; though war arise against me, [even then] in this will I be confident.'
  '4':
  - type: text
    content: ' One thing have I asked of the Lord, that will I seek, inquire for, '
  - type: text
    content: and
  - type: text
    content: ' [insistently] require: that I may dwell in the house of the Lord [in His presence] all the days of my life, to behold '
  - type: text
    content: and
  - type: text
    content: ' gaze upon the beauty [the sweet attractiveness and the delightful loveliness] of the Lord and to meditate, consider, '
  - type: text
    content: and
  - type: text
    content: ' inquire in His temple. [Ps. 16:11; 18:6; 65:4; Luke 2:37.]'
  '5':
  - type: text
    content: ' For in the day of trouble He will hide me in His shelter; in the secret place of His tent will He hide me; He will set me high upon a rock.'
  '6':
  - type: text
    content: ' And now shall my head be lifted up above my enemies round about me; in His tent I will offer sacrifices '
  - type: text
    content: and
  - type: text
    content: ' shouting of joy; I will sing, yes, I will sing praises to the Lord.'
  '7':
  - type: text
    content: ' Hear, O Lord, when I cry aloud; have mercy '
  - type: text
    content: and
  - type: text
    content: ' be gracious to me and answer me!'
  '8':
  - type: text
    content: ' You have said, Seek My face [inquire for and require My presence as your vital need]. My heart says to You, Your face (Your presence), Lord, will I seek, inquire for, '
  - type: text
    content: and
  - type: text
    content: ' require [of necessity and on the authority of Your Word].'
  '9':
  - type: text
    content: ' Hide not Your face from me; turn not Your servant away in anger, You Who have been my help! Cast me not off, neither forsake me, O God of my salvation!'
