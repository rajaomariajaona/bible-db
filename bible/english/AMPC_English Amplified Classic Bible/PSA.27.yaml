document_id: PSA.27,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: +[A Psalm+] of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my Light and my Salvation–whom shall I fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dread? The Lord is the Refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Stronghold of my life–of whom shall I be afraid?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Although my father and my mother have forsaken me, yet the Lord will take me up [adopt me as His child]. [Ps. 22:10.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Teach me Your way, O Lord, and lead me in a plain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' even path because of my enemies [those who lie in wait for me].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Give me not up to the will of my adversaries, for false witnesses have risen up against me; they breathe out cruelty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' violence.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' [What, what would have become of me] had I not believed that I would see the Lord''s goodness in the land of the living!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Wait '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hope for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expect the Lord; be brave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of good courage and let your heart be stout '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enduring. Yes, wait for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hope for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expect the Lord.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' When the wicked, even my enemies and my foes, came upon me to eat up my flesh, they stumbled and fell.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Though a host encamp against me, my heart shall not fear; though war arise against me, [even then] in this will I be confident.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' One thing have I asked of the Lord, that will I seek, inquire for, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [insistently] require: that I may dwell in the house of the Lord [in His presence] all the days of my life, to behold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gaze upon the beauty [the sweet attractiveness and the delightful loveliness] of the Lord and to meditate, consider, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inquire in His temple. [Ps. 16:11; 18:6; 65:4; Luke 2:37.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For in the day of trouble He will hide me in His shelter; in the secret place of His tent will He hide me; He will set me high upon a rock.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And now shall my head be lifted up above my enemies round about me; in His tent I will offer sacrifices '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shouting of joy; I will sing, yes, I will sing praises to the Lord.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Hear, O Lord, when I cry aloud; have mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be gracious to me and answer me!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' You have said, Seek My face [inquire for and require My presence as your vital need]. My heart says to You, Your face (Your presence), Lord, will I seek, inquire for, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require [of necessity and on the authority of Your Word].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Hide not Your face from me; turn not Your servant away in anger, You Who have been my help! Cast me not off, neither forsake me, O God of my salvation!'
