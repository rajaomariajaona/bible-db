document_id: DAN.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' ALSO I [the angel], in the first year of Darius the Mede, even I, stood up to confirm and to strengthen him [Michael, the angelic prince].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' But his sons shall be stirred up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shall prepare for war and shall assemble a multitude of great forces, which shall come on and overflow and pass through and again shall make war even to the fortress [of the king of the South].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And the king of the South (Egypt) shall be moved with anger and shall come forth and fight with the king of the North (Syria); and he [the Syrian king] shall set forth a great multitude, but the multitude shall be given into his [the Egyptian king''s] hand.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' When the multitude is taken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carried away, the heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind [of the Egyptian king] shall be exalted, and he shall cast down tens of thousands, but he shall not prevail.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For the king of the North shall raise a multitude greater than [he had] before, and after some years shall certainly return, coming with a great army and much substance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' equipment.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' In those times many shall rise up against the king of the South (Egypt); also the men of violence among your own people shall lift themselves up in order to fulfill the visions [of Dan. 8 and 9], but they shall fail '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Then the king of the North shall come and cast up siege works and take a well-fortified city, and the forces of the South shall not stand, or even his chosen troops, for there shall be no strength to stand [against the Syrian king].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But he [Antiochus the Great] who comes against him [from Syria] shall do according to his own will, and none shall stand before him; he shall stand in the glorious land [of Israel], and in his hand shall be destruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' all the land shall be in his power.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' He [Antiochus the Great] shall set his face to come with the strength of his whole kingdom, and with him upright conditions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terms of peace, and he shall perform them [by making an agreement with the king of the South]. He shall give him [his] daughter to corrupt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy it [his league with Egypt] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the kingdom, but it shall not succeed or be to his advantage.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' After this he shall turn his attention to the islands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' coastlands and shall take over many of them. But a prince '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' commander shall teach him [Antiochus the Great] to put an end to the insults offered by him; in fact he shall turn his insolence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproaches back upon him.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Then he shall turn his face back toward the fortresses of his own land [of Syria], but he shall stumble and fall and not be found.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And now I will show you the truth. Behold, there shall arise three more kings in Persia, and a fourth shall be far richer than they all. And when he has become strong through his riches he shall stir up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stake all against the realm of Greece.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Then shall stand up in his place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' office one who shall send an exactor of tribute to pass through the glory of the kingdom, but within a few days he shall be destroyed, [yet] neither in anger nor in battle.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And in his place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' office [in Syria] shall arise a contemptuous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contemptible person, to whom royal majesty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor of the kingdom have not been given. But he shall come in without warning in time of security and shall obtain the kingdom by flatteries, intrigues, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cunning hypocritical conduct. [Dan. 8:9-12, 23-25.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Before him the overwhelming forces of invading armies shall be broken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' utterly swept away; yes, and a prince of the covenant [with those who were at peace with him] also [shall be broken and swept away].'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And from the time that an alliance is made with him he shall work deceitfully, and he shall come up unexpectedly and shall become strong with a small people.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Without warning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stealthily he shall come into the most productive places of a province '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' among the richest men of a province [of Egypt], and he shall do that which his fathers have not done nor his fathers'' fathers; he shall distribute among them plunder, spoil, and goods. He shall devise plans against strongholds–but only for a time [the period decreed by God].'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And he shall stir up his power and his courage against the king of the South [Egypt] with a great army; and the king of the South shall wage war with an exceedingly great and mighty army, but he shall not stand, for schemes shall be devised against [the king of the South].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Yes, those who eat of his rich '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dainty food shall break '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy him, and his army shall drift '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' turn away to flee, and many shall fall down slain.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And as for both of these kings, their hearts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' minds shall be set on doing mischief; they shall speak lies over the same table, but it will not succeed, for the end is yet to be at the time appointed.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Then shall [the vile conqueror from the North] return into his land with much booty; and his heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose shall be set against [God''s] holy covenant [with His people], and he shall accomplish [his malicious intention] and return to his own land [Syria].'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' At the time appointed [God''s own time] he shall return and come into the South, but it shall not be successful as were the former invasions [of Egypt].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Then a mighty [warlike, threatening] king shall arise who shall rule with great dominion and do according to his [own] will.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' For the ships of Kittim [or Cyprus, in Roman hands] shall come against him; therefore he shall be grieved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discouraged and turn back [to Palestine] and carry out his rage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indignation against the holy covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' God''s people, and he shall do his own pleasure; he shall even turn back and make common cause with those [Jews] who abandon the holy covenant [with God].'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And armed forces of his shall appear [in the holy land] and they shall pollute the sanctuary, the [spiritual] stronghold, and shall take away the continual [daily burnt offering]; and they shall set up [in the sanctuary] the abomination that astonishes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' makes desolate [probably an altar to a pagan god].'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And such as violate the covenant he shall pervert '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seduce with flatteries, but the people who know their God shall prove themselves strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shall stand firm and do exploits [for God].'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And they who are wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding among the people shall instruct many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make them understand, though some [of them and their followers] shall fall by the sword and flame, by captivity and plunder, for many days.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Now when they fall, they shall receive a little help. Many shall join themselves to them with flatteries '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hypocrisies.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And some of those who are wise, prudent, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding shall be weakened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall, [thus, then, the insincere among the people will lose courage and become deserters. It will be a test] to refine, to purify, and to make those among [God''s people] white, even to the time of the end, because it is yet for the time [God] appointed.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' And the king shall do according to his will; he shall exalt himself and magnify himself above every god and shall speak astonishing things against the God of gods and shall prosper till the indignation be accomplished, for that which is determined [by God] shall be done.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' He shall not regard the gods of his fathers or Him [to Whom] women desire [to give birth–the Messiah] or any other god, for he shall magnify himself above all.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' But in their place he shall honor the god of fortresses; a god whom his fathers knew not shall he honor with gold and silver, with precious stones, and with pleasant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expensive things.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' And he shall deal with the strongest fortresses by the help of a foreign god. Those who acknowledge him he shall magnify with glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor, and he shall cause them to rule over many and shall divide the land for a price.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And as soon as he has fully arisen, his [Alexander the Great''s] kingdom shall be broken [by his death] and divided toward the four winds [the east, west, north, and south] of the heavens, but not to his posterity, nor according to the [Grecian] dominion which he ruled, for his kingdom shall be torn out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uprooted and go to others [to his four generals] to the exclusion of these.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' And at the time of the end the king of the South shall push at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attack him, and the king of the North shall come against him like a whirlwind, with chariots and horsemen and with many ships; and he shall enter into the countries and shall overflow and pass through.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' He shall enter into the Glorious Land [Palestine] and many shall be overthrown, but these shall be delivered out of his hand: Edom, Moab, and the main [core] of the people of Ammon.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' He shall stretch out his hand also against the [other] countries, but the land of Egypt shall not be among the escaped ones.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' But he shall have power over the treasures of gold and of silver and over all the precious things of Egypt, and the Libyans and the Ethiopians shall accompany him [compelled to follow his steps].'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' But rumors from the east and from the north shall alarm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hasten him. And he shall go forth with great fury to destroy and utterly to sweep away many.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' And he shall pitch his palatial tents between the seas and the glorious holy Mount [Zion]; yet he shall come to his end with none to help him. [II Thess. 2:4; Rev. 13:5-8.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then the king of the South (Egypt) shall be strong, but one of his princes shall be stronger than he is and have dominion; his dominion shall be a great dominion.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' At the end of some years they [the king of the North, Syria, and the king of the South, Egypt] shall make an alliance; the daughter of the king of the South shall come to the king of the North to make [a just and peaceful marriage] agreement; but she shall not retain the power of her might, neither shall he and his might endure. She shall be handed over with her attendants, her child, and him who strengthened her in those times.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But out of a branch of the [same ancestral] roots as hers shall one [her brother] stand up in his place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' office, who shall come against the [Syrian] army and shall enter into the fortress of the king of the North and shall deal against them and shall prevail.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And also he shall carry off to Egypt their [Syria''s] gods with their molten images and with their precious vessels of silver and of gold, and he shall refrain for some years from [waging war against] the king of the North.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And he [the king of Syria] shall come into the kingdom of the king of the South but shall return to his own land.'
