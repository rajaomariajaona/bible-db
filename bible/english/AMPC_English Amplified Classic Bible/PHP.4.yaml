document_id: PHP.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEREFORE, MY brethren, whom I love and yearn to see, my delight and crown (wreath of victory), thus stand firm in the Lord, my beloved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I entreat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' advise Euodia and I entreat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' advise Syntyche to agree '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to work in harmony in the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And I exhort you too, [my] genuine yokefellow, help these [two women to keep on cooperating], for they have toiled along with me in [the spreading of] the good news (the Gospel), as have Clement and the rest of my fellow workers whose names are in the Book of Life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Rejoice in the Lord always [delight, gladden yourselves in Him]; again I say, Rejoice! [Ps. 37:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Let all men know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize your unselfishness (your considerateness, your forbearing spirit). The Lord is near [He is coming soon].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Do not fret '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' have any anxiety about anything, but in every circumstance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in everything, by prayer and petition (definite requests), with thanksgiving, continue to make your wants known to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And God''s peace [shall be yours, that tranquil state of a soul assured of its salvation through Christ, and so fearing nothing from God and being content with its earthly lot of whatever sort that is, that peace] which transcends all understanding shall garrison '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mount guard over your hearts and minds in Christ Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For the rest, brethren, whatever is true, whatever is worthy of reverence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is honorable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seemly, whatever is just, whatever is pure, whatever is lovely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovable, whatever is kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' winsome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gracious, if there is any virtue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excellence, if there is anything worthy of praise, think on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weigh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take account of these things [fix your minds on them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Practice what you have learned and received and heard and seen in me, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' model your way of living on it, and the God of peace (of untroubled, undisturbed well-being) will be with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I was made very happy in the Lord that now you have revived your interest in my welfare after so long a time; you were indeed thinking of me, but you had no opportunity to show it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Not that I am implying that I was in any personal want, for I have learned how to be content (satisfied to the point where I am not disturbed or disquieted) in whatever state I am.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I know how to be abased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' live humbly in straitened circumstances, and I know also how to enjoy plenty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' live in abundance. I have learned in any and all circumstances the secret of facing every situation, whether well-fed or going hungry, having a sufficiency '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enough to spare or going without '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' being in want.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' I have strength for all things in Christ Who empowers me [I am ready for anything and equal to anything through Him Who infuses inner strength into me; I am self-sufficient in Christ''s sufficiency].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But it was right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commendable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' noble of you to contribute for my needs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to share my difficulties with me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And you Philippians yourselves well know that in the early days of the Gospel ministry, when I left Macedonia, no church (assembly) entered into partnership with me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' opened up [a debit and credit] account in giving and receiving except you only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For even in Thessalonica you sent [me contributions] for my needs, not only once but a second time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Not that I seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' am eager for [your] gift, but I do seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' am eager for the fruit which increases to your credit [the harvest of blessing that is accumulating to your account].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But I have [your full payment] and more; I have everything I need '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' am amply supplied, now that I have received from Epaphroditus the gifts you sent me. [They are the] fragrant odor of an offering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sacrifice which God welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in which He delights.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And my God will liberally supply (fill to the full) your every need according to His riches in glory in Christ Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' To our God and Father be glory forever and ever (through the endless eternities of the eternities). '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Remember me to every saint (every born-again believer) in Christ Jesus. The brethren (my associates) who are with me greet you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' All the saints (God''s consecrated ones here) wish to be remembered to you, especially those of Caesar''s household.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The grace (spiritual favor and blessing) of the Lord Jesus Christ (the Anointed One) be with your spirit. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen (so be it).
