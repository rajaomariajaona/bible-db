document_id: PHP.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEREFORE, MY brethren, whom I love and yearn to see, my delight and crown (wreath of victory), thus stand firm in the Lord, my beloved.'
  '10':
  - type: text
    content: ' I was made very happy in the Lord that now you have revived your interest in my welfare after so long a time; you were indeed thinking of me, but you had no opportunity to show it.'
  '11':
  - type: text
    content: ' Not that I am implying that I was in any personal want, for I have learned how to be content (satisfied to the point where I am not disturbed or disquieted) in whatever state I am.'
  '12':
  - type: text
    content: ' I know how to be abased '
  - type: text
    content: and
  - type: text
    content: ' live humbly in straitened circumstances, and I know also how to enjoy plenty '
  - type: text
    content: and
  - type: text
    content: ' live in abundance. I have learned in any and all circumstances the secret of facing every situation, whether well-fed or going hungry, having a sufficiency '
  - type: text
    content: and
  - type: text
    content: ' enough to spare or going without '
  - type: text
    content: and
  - type: text
    content: ' being in want.'
  '13':
  - type: text
    content: ' I have strength for all things in Christ Who empowers me [I am ready for anything and equal to anything through Him Who infuses inner strength into me; I am self-sufficient in Christ''s sufficiency].'
  '14':
  - type: text
    content: ' But it was right '
  - type: text
    content: and
  - type: text
    content: ' commendable '
  - type: text
    content: and
  - type: text
    content: ' noble of you to contribute for my needs '
  - type: text
    content: and
  - type: text
    content: ' to share my difficulties with me.'
  '15':
  - type: text
    content: ' And you Philippians yourselves well know that in the early days of the Gospel ministry, when I left Macedonia, no church (assembly) entered into partnership with me '
  - type: text
    content: and
  - type: text
    content: ' opened up [a debit and credit] account in giving and receiving except you only.'
  '16':
  - type: text
    content: ' For even in Thessalonica you sent [me contributions] for my needs, not only once but a second time.'
  '17':
  - type: text
    content: ' Not that I seek '
  - type: text
    content: or
  - type: text
    content: ' am eager for [your] gift, but I do seek '
  - type: text
    content: and
  - type: text
    content: ' am eager for the fruit which increases to your credit [the harvest of blessing that is accumulating to your account].'
  '18':
  - type: text
    content: ' But I have [your full payment] and more; I have everything I need '
  - type: text
    content: and
  - type: text
    content: ' am amply supplied, now that I have received from Epaphroditus the gifts you sent me. [They are the] fragrant odor of an offering '
  - type: text
    content: and
  - type: text
    content: ' sacrifice which God welcomes '
  - type: text
    content: and
  - type: text
    content: ' in which He delights.'
  '19':
  - type: text
    content: ' And my God will liberally supply (fill to the full) your every need according to His riches in glory in Christ Jesus.'
  '2':
  - type: text
    content: ' I entreat '
  - type: text
    content: and
  - type: text
    content: ' advise Euodia and I entreat '
  - type: text
    content: and
  - type: text
    content: ' advise Syntyche to agree '
  - type: text
    content: and
  - type: text
    content: ' to work in harmony in the Lord.'
  '20':
  - type: text
    content: ' To our God and Father be glory forever and ever (through the endless eternities of the eternities). '
  - type: text
    content: Amen (so be it).
  '21':
  - type: text
    content: ' Remember me to every saint (every born-again believer) in Christ Jesus. The brethren (my associates) who are with me greet you.'
  '22':
  - type: text
    content: ' All the saints (God''s consecrated ones here) wish to be remembered to you, especially those of Caesar''s household.'
  '23':
  - type: text
    content: ' The grace (spiritual favor and blessing) of the Lord Jesus Christ (the Anointed One) be with your spirit. '
  - type: text
    content: Amen (so be it).
  '3':
  - type: text
    content: ' And I exhort you too, [my] genuine yokefellow, help these [two women to keep on cooperating], for they have toiled along with me in [the spreading of] the good news (the Gospel), as have Clement and the rest of my fellow workers whose names are in the Book of Life.'
  '4':
  - type: text
    content: ' Rejoice in the Lord always [delight, gladden yourselves in Him]; again I say, Rejoice! [Ps. 37:4.]'
  '5':
  - type: text
    content: ' Let all men know '
  - type: text
    content: and
  - type: text
    content: ' perceive '
  - type: text
    content: and
  - type: text
    content: ' recognize your unselfishness (your considerateness, your forbearing spirit). The Lord is near [He is coming soon].'
  '6':
  - type: text
    content: ' Do not fret '
  - type: text
    content: or
  - type: text
    content: ' have any anxiety about anything, but in every circumstance '
  - type: text
    content: and
  - type: text
    content: ' in everything, by prayer and petition (definite requests), with thanksgiving, continue to make your wants known to God.'
  '7':
  - type: text
    content: ' And God''s peace [shall be yours, that tranquil state of a soul assured of its salvation through Christ, and so fearing nothing from God and being content with its earthly lot of whatever sort that is, that peace] which transcends all understanding shall garrison '
  - type: text
    content: and
  - type: text
    content: ' mount guard over your hearts and minds in Christ Jesus.'
  '8':
  - type: text
    content: ' For the rest, brethren, whatever is true, whatever is worthy of reverence '
  - type: text
    content: and
  - type: text
    content: ' is honorable '
  - type: text
    content: and
  - type: text
    content: ' seemly, whatever is just, whatever is pure, whatever is lovely '
  - type: text
    content: and
  - type: text
    content: ' lovable, whatever is kind '
  - type: text
    content: and
  - type: text
    content: ' winsome '
  - type: text
    content: and
  - type: text
    content: ' gracious, if there is any virtue '
  - type: text
    content: and
  - type: text
    content: ' excellence, if there is anything worthy of praise, think on '
  - type: text
    content: and
  - type: text
    content: ' weigh '
  - type: text
    content: and
  - type: text
    content: ' take account of these things [fix your minds on them].'
  '9':
  - type: text
    content: ' Practice what you have learned and received and heard and seen in me, '
  - type: text
    content: and
  - type: text
    content: ' model your way of living on it, and the God of peace (of untroubled, undisturbed well-being) will be with you.'
