document_id: DEU.27
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND MOSES with the elders of Israel commanded the people, Keep all the commandments with which I charge you today.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And on the day when you pass over the Jordan to the land which the Lord your God gives you, you shall set up great stones and cover them with plaster.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And you shall write on them all the words of this law when you have passed over, that you may go into the land which the Lord your God is giving you, a land flowing with milk and honey, as the Lord, the God of your fathers, has promised you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And when you have gone over the Jordan, you shall set up these stones, as I command you this day, on Mount Ebal, and coat them with plaster.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And there you shall build an altar to the Lord your God, an altar of stones; you shall not lift up any iron tool upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You shall build the altar of the Lord your God of whole stones and offer burnt offerings on it to Him;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And you shall offer peace offerings, and eat there and rejoice before the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And you shall write upon the stones all the words of this law very plainly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Moses and the Levitical priests said to all Israel, Keep silence and hear, O Israel! This day you have become the people of the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So you shall obey the voice of the Lord your God and do His commandments and statutes which I command you today.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Moses charged the people the same day, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' These [tribes] shall stand on Mount Gerizim to bless the people, when you have passed over the Jordan: Simeon, Levi, Judah, Issachar, Joseph''s [sons], and Benjamin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And these [tribes] shall stand on Mount Ebal to pronounce the curse [for disobedience]: Reuben, Gad, Asher, Zebulun, Dan, and Naphtali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the Levites shall declare with a loud voice to all the men of Israel:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Cursed is the man who makes a graven or molten image, an abomination to the Lord, the work of the hands of the craftsman, and sets it up in secret. All the people shall answer, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Cursed is he who dishonors his father or his mother. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Cursed is he who moves [back] his neighbor''s landmark. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Cursed is he who misleads a blind man on his way. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Cursed is he who perverts the justice due to the sojourner '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the stranger, the fatherless, and the widow. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Cursed is he who lies with his father''s wife, because he uncovers what belongs to his father. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Cursed is he who lies with any beast. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Cursed is he who lies with his half sister, whether his father''s or his mother''s daughter. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Cursed is he who lies with his mother-in-law. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Cursed is he who slays his neighbor secretly. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Cursed is he who takes a bribe to slay an innocent person. All the people shall say, Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Cursed is he who does not support '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give assent to the words of this law to do them [as the rule of his life]. All the people shall say, Amen.'
