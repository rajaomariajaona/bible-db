document_id: DEU.27,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND MOSES with the elders of Israel commanded the people, Keep all the commandments with which I charge you today.'
  '10':
  - type: text
    content: ' So you shall obey the voice of the Lord your God and do His commandments and statutes which I command you today.'
  '11':
  - type: text
    content: ' And Moses charged the people the same day, saying,'
  '12':
  - type: text
    content: ' These [tribes] shall stand on Mount Gerizim to bless the people, when you have passed over the Jordan: Simeon, Levi, Judah, Issachar, Joseph''s [sons], and Benjamin.'
  '13':
  - type: text
    content: ' And these [tribes] shall stand on Mount Ebal to pronounce the curse [for disobedience]: Reuben, Gad, Asher, Zebulun, Dan, and Naphtali.'
  '14':
  - type: text
    content: ' And the Levites shall declare with a loud voice to all the men of Israel:'
  '15':
  - type: text
    content: ' Cursed is the man who makes a graven or molten image, an abomination to the Lord, the work of the hands of the craftsman, and sets it up in secret. All the people shall answer, Amen.'
  '16':
  - type: text
    content: ' Cursed is he who dishonors his father or his mother. All the people shall say, Amen.'
  '17':
  - type: text
    content: ' Cursed is he who moves [back] his neighbor''s landmark. All the people shall say, Amen.'
  '18':
  - type: text
    content: ' Cursed is he who misleads a blind man on his way. All the people shall say, Amen.'
  '19':
  - type: text
    content: ' Cursed is he who perverts the justice due to the sojourner '
  - type: text
    content: or
  - type: text
    content: ' the stranger, the fatherless, and the widow. All the people shall say, Amen.'
  '2':
  - type: text
    content: ' And on the day when you pass over the Jordan to the land which the Lord your God gives you, you shall set up great stones and cover them with plaster.'
  '20':
  - type: text
    content: ' Cursed is he who lies with his father''s wife, because he uncovers what belongs to his father. All the people shall say, Amen.'
  '21':
  - type: text
    content: ' Cursed is he who lies with any beast. All the people shall say, Amen.'
  '22':
  - type: text
    content: ' Cursed is he who lies with his half sister, whether his father''s or his mother''s daughter. All the people shall say, Amen.'
  '23':
  - type: text
    content: ' Cursed is he who lies with his mother-in-law. All the people shall say, Amen.'
  '24':
  - type: text
    content: ' Cursed is he who slays his neighbor secretly. All the people shall say, Amen.'
  '25':
  - type: text
    content: ' Cursed is he who takes a bribe to slay an innocent person. All the people shall say, Amen.'
  '26':
  - type: text
    content: ' Cursed is he who does not support '
  - type: text
    content: and
  - type: text
    content: ' give assent to the words of this law to do them [as the rule of his life]. All the people shall say, Amen.'
  '3':
  - type: text
    content: ' And you shall write on them all the words of this law when you have passed over, that you may go into the land which the Lord your God is giving you, a land flowing with milk and honey, as the Lord, the God of your fathers, has promised you.'
  '4':
  - type: text
    content: ' And when you have gone over the Jordan, you shall set up these stones, as I command you this day, on Mount Ebal, and coat them with plaster.'
  '5':
  - type: text
    content: ' And there you shall build an altar to the Lord your God, an altar of stones; you shall not lift up any iron tool upon them.'
  '6':
  - type: text
    content: ' You shall build the altar of the Lord your God of whole stones and offer burnt offerings on it to Him;'
  '7':
  - type: text
    content: ' And you shall offer peace offerings, and eat there and rejoice before the Lord your God.'
  '8':
  - type: text
    content: ' And you shall write upon the stones all the words of this law very plainly.'
  '9':
  - type: text
    content: ' And Moses and the Levitical priests said to all Israel, Keep silence and hear, O Israel! This day you have become the people of the Lord your God.'
