document_id: 1PE.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO BE done with every trace of wickedness (depravity, malignity) and all deceit and insincerity (pretense, hypocrisy) and grudges (envy, jealousy) and slander '
  - type: text
    content: and
  - type: text
    content: ' evil speaking of every kind.'
  '10':
  - type: text
    content: ' Once you were not a people [at all], but now you are God''s people; once you were unpitied, but now you are pitied '
  - type: text
    content: and
  - type: text
    content: ' have received mercy. [Hos. 2:23.]'
  '11':
  - type: text
    content: ' Beloved, I implore you as aliens and strangers '
  - type: text
    content: and
  - type: text
    content: ' exiles [in this world] to abstain from the sensual urges (the evil desires, the passions of the flesh, your lower nature) that wage war against the soul.'
  '12':
  - type: text
    content: ' Conduct yourselves properly (honorably, righteously) among the Gentiles, so that, although they may slander you as evildoers, [yet] they may by witnessing your good deeds [come to] glorify God in the day of inspection [when God shall look upon you wanderers as a pastor or shepherd looks over his flock].'
  '13':
  - type: text
    content: ' Be submissive to every human institution '
  - type: text
    content: and
  - type: text
    content: ' authority for the sake of the Lord, whether it be to the emperor as supreme,'
  '14':
  - type: text
    content: ' Or to governors as sent by him to bring vengeance (punishment, justice) to those who do wrong and to encourage those who do good service.'
  '15':
  - type: text
    content: ' For it is God''s will '
  - type: text
    content: and
  - type: text
    content: ' intention that by doing right [your good and honest lives] should silence (muzzle, gag) the ignorant charges '
  - type: text
    content: and
  - type: text
    content: ' ill-informed criticisms of foolish persons.'
  '16':
  - type: text
    content: ' [Live] as free people, [yet] without employing your freedom as a pretext for wickedness; but [live at all times] as servants of God.'
  '17':
  - type: text
    content: ' Show respect for all men [treat them honorably]. Love the brotherhood (the Christian fraternity of which Christ is the Head). Reverence God. Honor the emperor.'
  '18':
  - type: text
    content: ' [You who are] household servants, be submissive to your masters with all [proper] respect, not only to those who are kind and considerate '
  - type: text
    content: and
  - type: text
    content: ' reasonable, but also to those who are surly (overbearing, unjust, and crooked).'
  '19':
  - type: text
    content: ' For one is regarded favorably (is approved, acceptable, and thankworthy) if, as in the sight of God, he endures the pain of unjust suffering.'
  '2':
  - type: text
    content: ' Like newborn babies you should crave (thirst for, earnestly desire) the pure (unadulterated) spiritual milk, that by it you may be nurtured '
  - type: text
    content: and
  - type: text
    content: ' grow unto [completed] salvation,'
  '20':
  - type: text
    content: ' [After all] what kind of glory [is there in it] if, when you do wrong and are punished for it, you take it patiently? But if you bear patiently with suffering [which results] when you do right '
  - type: text
    content: and
  - type: text
    content: ' that is undeserved, it is acceptable '
  - type: text
    content: and
  - type: text
    content: ' pleasing to God.'
  '21':
  - type: text
    content: ' For even to this were you called [it is inseparable from your vocation]. For Christ also suffered for you, leaving you [His personal] example, so that you should follow in His footsteps.'
  '22':
  - type: text
    content: ' He was guilty of no sin, neither was deceit (guile) ever found on His lips. [Isa. 53:9.]'
  '23':
  - type: text
    content: ' When He was reviled '
  - type: text
    content: and
  - type: text
    content: ' insulted, He did not revile '
  - type: text
    content: or
  - type: text
    content: ' offer insult in return; [when] He was abused '
  - type: text
    content: and
  - type: text
    content: ' suffered, He made no threats [of vengeance]; but he trusted [Himself and everything] to Him Who judges fairly.'
  '24':
  - type: text
    content: ' He personally bore our sins in His [own] body on the tree [as on an altar and offered Himself on it], that we might die (cease to exist) to sin and live to righteousness. By His wounds you have been healed.'
  '25':
  - type: text
    content: ' For you were going astray like [so many] sheep, but now you have come back to the Shepherd and Guardian (the Bishop) of your souls. [Isa. 53:5, 6.]'
  '3':
  - type: text
    content: ' Since you have [already] tasted the goodness '
  - type: text
    content: and
  - type: text
    content: ' kindness of the Lord. [Ps. 34:8.]'
  '4':
  - type: text
    content: ' Come to Him [then, to that] Living Stone which men tried '
  - type: text
    content: and
  - type: text
    content: ' threw away, but which is chosen [and] precious in God''s sight. [Ps. 118:22; Isa. 28:16.]'
  '5':
  - type: text
    content: ' [Come] and, like living stones, be yourselves built [into] a spiritual house, for a holy (dedicated, consecrated) priesthood, to offer up [those] spiritual sacrifices [that are] acceptable '
  - type: text
    content: and
  - type: text
    content: ' pleasing to God through Jesus Christ.'
  '6':
  - type: text
    content: ' For thus it stands in Scripture: Behold, I am laying in Zion a chosen (honored), precious chief Cornerstone, and he who believes in Him [who adheres to, trusts in, and relies on Him] shall never be disappointed '
  - type: text
    content: or
  - type: text
    content: ' put to shame. [Isa. 28:16.]'
  '7':
  - type: text
    content: ' To you then who believe (who adhere to, trust in, and rely on Him) is the preciousness; but for those who disbelieve [it is true], The [very] Stone which the builders rejected has become the main Cornerstone, [Ps. 118:22.]'
  '8':
  - type: text
    content: ' And, A Stone that will cause stumbling and a Rock that will give [men] offense; they stumble because they disobey '
  - type: text
    content: and
  - type: text
    content: ' disbelieve [God''s] Word, as those [who reject Him] were destined (appointed) to do.'
  '9':
  - type: text
    content: ' But you are a chosen race, a royal priesthood, a dedicated nation, [God''s] own purchased, special people, that you may set forth the wonderful deeds '
  - type: text
    content: and
  - type: text
    content: ' display the virtues and perfections of Him Who called you out of darkness into His marvelous light. [Exod. 19:5, 6.]'
