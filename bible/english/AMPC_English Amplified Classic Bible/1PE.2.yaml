document_id: 1PE.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO BE done with every trace of wickedness (depravity, malignity) and all deceit and insincerity (pretense, hypocrisy) and grudges (envy, jealousy) and slander '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil speaking of every kind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Like newborn babies you should crave (thirst for, earnestly desire) the pure (unadulterated) spiritual milk, that by it you may be nurtured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grow unto [completed] salvation,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Since you have [already] tasted the goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness of the Lord. [Ps. 34:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Come to Him [then, to that] Living Stone which men tried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' threw away, but which is chosen [and] precious in God''s sight. [Ps. 118:22; Isa. 28:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [Come] and, like living stones, be yourselves built [into] a spiritual house, for a holy (dedicated, consecrated) priesthood, to offer up [those] spiritual sacrifices [that are] acceptable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasing to God through Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For thus it stands in Scripture: Behold, I am laying in Zion a chosen (honored), precious chief Cornerstone, and he who believes in Him [who adheres to, trusts in, and relies on Him] shall never be disappointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' put to shame. [Isa. 28:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' To you then who believe (who adhere to, trust in, and rely on Him) is the preciousness; but for those who disbelieve [it is true], The [very] Stone which the builders rejected has become the main Cornerstone, [Ps. 118:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And, A Stone that will cause stumbling and a Rock that will give [men] offense; they stumble because they disobey '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disbelieve [God''s] Word, as those [who reject Him] were destined (appointed) to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But you are a chosen race, a royal priesthood, a dedicated nation, [God''s] own purchased, special people, that you may set forth the wonderful deeds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' display the virtues and perfections of Him Who called you out of darkness into His marvelous light. [Exod. 19:5, 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Once you were not a people [at all], but now you are God''s people; once you were unpitied, but now you are pitied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have received mercy. [Hos. 2:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Beloved, I implore you as aliens and strangers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exiles [in this world] to abstain from the sensual urges (the evil desires, the passions of the flesh, your lower nature) that wage war against the soul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Conduct yourselves properly (honorably, righteously) among the Gentiles, so that, although they may slander you as evildoers, [yet] they may by witnessing your good deeds [come to] glorify God in the day of inspection [when God shall look upon you wanderers as a pastor or shepherd looks over his flock].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Be submissive to every human institution '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authority for the sake of the Lord, whether it be to the emperor as supreme,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Or to governors as sent by him to bring vengeance (punishment, justice) to those who do wrong and to encourage those who do good service.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For it is God''s will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intention that by doing right [your good and honest lives] should silence (muzzle, gag) the ignorant charges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ill-informed criticisms of foolish persons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' [Live] as free people, [yet] without employing your freedom as a pretext for wickedness; but [live at all times] as servants of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Show respect for all men [treat them honorably]. Love the brotherhood (the Christian fraternity of which Christ is the Head). Reverence God. Honor the emperor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' [You who are] household servants, be submissive to your masters with all [proper] respect, not only to those who are kind and considerate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reasonable, but also to those who are surly (overbearing, unjust, and crooked).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For one is regarded favorably (is approved, acceptable, and thankworthy) if, as in the sight of God, he endures the pain of unjust suffering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' [After all] what kind of glory [is there in it] if, when you do wrong and are punished for it, you take it patiently? But if you bear patiently with suffering [which results] when you do right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' that is undeserved, it is acceptable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasing to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For even to this were you called [it is inseparable from your vocation]. For Christ also suffered for you, leaving you [His personal] example, so that you should follow in His footsteps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' He was guilty of no sin, neither was deceit (guile) ever found on His lips. [Isa. 53:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' When He was reviled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insulted, He did not revile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' offer insult in return; [when] He was abused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffered, He made no threats [of vengeance]; but he trusted [Himself and everything] to Him Who judges fairly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' He personally bore our sins in His [own] body on the tree [as on an altar and offered Himself on it], that we might die (cease to exist) to sin and live to righteousness. By His wounds you have been healed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For you were going astray like [so many] sheep, but now you have come back to the Shepherd and Guardian (the Bishop) of your souls. [Isa. 53:5, 6.]'
