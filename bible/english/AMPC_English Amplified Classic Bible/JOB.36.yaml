document_id: JOB.36,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ELIHU PROCEEDED and said,'
  '10':
  - type: text
    content: ' He also opens their ears to instruction '
  - type: text
    content: and
  - type: text
    content: ' discipline, and commands that they return from iniquity.'
  '11':
  - type: text
    content: ' If they obey and serve Him, they shall spend their days in prosperity and their years in pleasantness '
  - type: text
    content: and
  - type: text
    content: ' joy.'
  '12':
  - type: text
    content: ' But if they obey not, they shall perish by the sword [of God''s destructive judgments], and they shall die in ignorance of true knowledge.'
  '13':
  - type: text
    content: ' But the godless '
  - type: text
    content: and
  - type: text
    content: ' profane in heart heap up anger [at the divine discipline]; they do not cry to Him when He binds them [with cords of affliction]. [Rom. 2:5.]'
  '14':
  - type: text
    content: ' They die in youth, and their life perishes among the unclean (those who are sodomites).'
  '15':
  - type: text
    content: ' He delivers the afflicted in their affliction and opens their ears [to His voice] in adversity.'
  '16':
  - type: text
    content: ' Indeed, God would have allured you out of the mouth of distress into a broad place where there is no situation of perplexity '
  - type: text
    content: or
  - type: text
    content: ' privation; and that which would be set on your table would be full of fatness.'
  '17':
  - type: text
    content: ' But if you [Job] are filled with the judgment of the wicked, judgment and justice will keep hold on you.'
  '18':
  - type: text
    content: ' For let not wrath entice you into scorning chastisements; and let not the greatness of the ransom [the suffering, if rightly endured] turn you aside.'
  '19':
  - type: text
    content: ' Will your cry be sufficient to keep you from distress, or will all the force of your strength do it?'
  '2':
  - type: text
    content: ' Bear with me '
  - type: text
    content: and
  - type: text
    content: ' wait a little longer, and I will show you, for I have something still to say on God''s behalf.'
  '20':
  - type: text
    content: ' Desire not the night, when peoples are cut off from their places;'
  '21':
  - type: text
    content: ' Take heed, turn not to iniquity, for this [the iniquity of complaining against God] you have chosen rather than [submission in] affliction.'
  '22':
  - type: text
    content: ' Behold, God exalts '
  - type: text
    content: and
  - type: text
    content: ' does loftily in His power; who is a ruler '
  - type: text
    content: or
  - type: text
    content: ' a teacher like Him?'
  '23':
  - type: text
    content: ' Who has appointed God His way? Or who can say, You have done unrighteousness?'
  '24':
  - type: text
    content: ' Remember that [by submission] you magnify God''s work, of which men have sung.'
  '25':
  - type: text
    content: ' All men have looked upon God''s work; man may behold it afar off.'
  '26':
  - type: text
    content: ' Behold, God is great, and we know Him not! The number of His years is unsearchable. [I Cor. 13:12.]'
  '27':
  - type: text
    content: ' For He draws up the drops of water, which distil as rain from His vapor,'
  '28':
  - type: text
    content: ' Which the skies pour down and drop abundantly upon [the multitudes of] mankind.'
  '29':
  - type: text
    content: ' Not only that, but can anyone understand the spreadings of the clouds '
  - type: text
    content: or
  - type: text
    content: ' the thunderings of His pavilion? [Ps. 18:11; Isa. 40:22.]'
  '3':
  - type: text
    content: ' I will bring my knowledge from afar and will ascribe righteousness to my Maker.'
  '30':
  - type: text
    content: ' Behold, He spreads His lightning against the dark clouds and covers the roots of the sea.'
  '31':
  - type: text
    content: ' For by [His clouds] God executes judgment upon the peoples; He gives food in abundance.'
  '32':
  - type: text
    content: ' He covers His hands with the lightning and commands it to strike the mark.'
  '33':
  - type: text
    content: ' His thunderings speak [awesomely] concerning Him; the cattle are told of His coming storm.'
  '4':
  - type: text
    content: ' For truly my words shall not be false; He Who is perfect in knowledge is with you.'
  '5':
  - type: text
    content: ' Behold! God is mighty, and yet despises no one nor regards anything as trivial; He is mighty in power of understanding '
  - type: text
    content: and
  - type: text
    content: ' heart.'
  '6':
  - type: text
    content: ' He does not prolong the life of the wicked, but gives the needy '
  - type: text
    content: and
  - type: text
    content: ' afflicted their right.'
  '7':
  - type: text
    content: ' He withdraws not His eyes from the righteous (the upright in right standing with God); but He sets them forever with kings upon the throne, and they are exalted.'
  '8':
  - type: text
    content: ' And if they are bound in fetters [of adversity] and held by cords of affliction, [Ps. 107:10, 11.]'
  '9':
  - type: text
    content: ' Then He shows to them [the true character of] their deeds and their transgressions, that they have acted arrogantly [with presumption and self-sufficiency].'
