document_id: JOB.36,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' ELIHU PROCEEDED and said,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He also opens their ears to instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline, and commands that they return from iniquity.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' If they obey and serve Him, they shall spend their days in prosperity and their years in pleasantness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' joy.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' But if they obey not, they shall perish by the sword [of God''s destructive judgments], and they shall die in ignorance of true knowledge.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But the godless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profane in heart heap up anger [at the divine discipline]; they do not cry to Him when He binds them [with cords of affliction]. [Rom. 2:5.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' They die in youth, and their life perishes among the unclean (those who are sodomites).'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He delivers the afflicted in their affliction and opens their ears [to His voice] in adversity.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Indeed, God would have allured you out of the mouth of distress into a broad place where there is no situation of perplexity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' privation; and that which would be set on your table would be full of fatness.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But if you [Job] are filled with the judgment of the wicked, judgment and justice will keep hold on you.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' For let not wrath entice you into scorning chastisements; and let not the greatness of the ransom [the suffering, if rightly endured] turn you aside.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Will your cry be sufficient to keep you from distress, or will all the force of your strength do it?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Bear with me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait a little longer, and I will show you, for I have something still to say on God''s behalf.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Desire not the night, when peoples are cut off from their places;'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Take heed, turn not to iniquity, for this [the iniquity of complaining against God] you have chosen rather than [submission in] affliction.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Behold, God exalts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' does loftily in His power; who is a ruler '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a teacher like Him?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Who has appointed God His way? Or who can say, You have done unrighteousness?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Remember that [by submission] you magnify God''s work, of which men have sung.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' All men have looked upon God''s work; man may behold it afar off.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Behold, God is great, and we know Him not! The number of His years is unsearchable. [I Cor. 13:12.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' For He draws up the drops of water, which distil as rain from His vapor,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' Which the skies pour down and drop abundantly upon [the multitudes of] mankind.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Not only that, but can anyone understand the spreadings of the clouds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' the thunderings of His pavilion? [Ps. 18:11; Isa. 40:22.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' I will bring my knowledge from afar and will ascribe righteousness to my Maker.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Behold, He spreads His lightning against the dark clouds and covers the roots of the sea.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' For by [His clouds] God executes judgment upon the peoples; He gives food in abundance.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' He covers His hands with the lightning and commands it to strike the mark.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' His thunderings speak [awesomely] concerning Him; the cattle are told of His coming storm.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' For truly my words shall not be false; He Who is perfect in knowledge is with you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Behold! God is mighty, and yet despises no one nor regards anything as trivial; He is mighty in power of understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heart.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' He does not prolong the life of the wicked, but gives the needy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afflicted their right.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' He withdraws not His eyes from the righteous (the upright in right standing with God); but He sets them forever with kings upon the throne, and they are exalted.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And if they are bound in fetters [of adversity] and held by cords of affliction, [Ps. 107:10, 11.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Then He shows to them [the true character of] their deeds and their transgressions, that they have acted arrogantly [with presumption and self-sufficiency].'
