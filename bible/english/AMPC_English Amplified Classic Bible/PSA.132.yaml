document_id: PSA.132
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Song of Ascents.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', [earnestly] remember to David''s credit all his humiliations '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hardships '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endurance–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' How he swore to the Lord and vowed to the Mighty One of Jacob:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Surely I will not enter my dwelling house or get into my bed–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I will not permit my eyes to sleep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' my eyelids to slumber,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Until I have found a place for the Lord, a habitation for the Mighty One of Jacob. [Acts 7:46.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Behold, at Ephratah we [first] heard of [the discovered ark]; we found it in the fields of the wood [at Kiriath-jearim]. [I Sam. 6:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Let us go into His tabernacle; let us worship at His footstool.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Arise, O Lord, to Your resting-place, You and the ark [the symbol] of Your strength.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Let Your priests be clothed with righteousness (right living and right standing with God); and let Your saints shout for joy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For Your servant David''s sake, turn not away the face of Your anointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject not Your own king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Lord swore to David in truth; He will not turn back from it: One of the fruit of your body I will set upon your throne. [Ps. 89:3, 4; Luke 1:69; Acts 2:30, 31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' If your children will keep My covenant and My testimony that I shall teach them, their children also shall sit upon your throne forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For the Lord has chosen Zion, He has desired it for His habitation:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' This is My resting-place forever [says the Lord]; here will I dwell, for I have desired it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I will surely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abundantly bless her provision; I will satisfy her poor with bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Her priests also will I clothe with salvation, and her saints shall shout aloud for joy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' There will I make a horn spring forth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bud for David; I have ordained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prepared a lamp for My anointed [fulfilling the promises of old]. [I Kings 11:36; 15:4; II Chron. 21:7; Luke 1:69.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' His enemies will I clothe with shame, but upon himself shall his crown flourish.'
