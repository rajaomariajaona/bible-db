document_id: PSA.132,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Ascents.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', [earnestly] remember to David''s credit all his humiliations '
  - type: text
    content: and
  - type: text
    content: ' hardships '
  - type: text
    content: and
  - type: text
    content: ' endurance–'
  '10':
  - type: text
    content: ' For Your servant David''s sake, turn not away the face of Your anointed '
  - type: text
    content: and
  - type: text
    content: ' reject not Your own king.'
  '11':
  - type: text
    content: ' The Lord swore to David in truth; He will not turn back from it: One of the fruit of your body I will set upon your throne. [Ps. 89:3, 4; Luke 1:69; Acts 2:30, 31.]'
  '12':
  - type: text
    content: ' If your children will keep My covenant and My testimony that I shall teach them, their children also shall sit upon your throne forever.'
  '13':
  - type: text
    content: ' For the Lord has chosen Zion, He has desired it for His habitation:'
  '14':
  - type: text
    content: ' This is My resting-place forever [says the Lord]; here will I dwell, for I have desired it.'
  '15':
  - type: text
    content: ' I will surely '
  - type: text
    content: and
  - type: text
    content: ' abundantly bless her provision; I will satisfy her poor with bread.'
  '16':
  - type: text
    content: ' Her priests also will I clothe with salvation, and her saints shall shout aloud for joy.'
  '17':
  - type: text
    content: ' There will I make a horn spring forth '
  - type: text
    content: and
  - type: text
    content: ' bud for David; I have ordained '
  - type: text
    content: and
  - type: text
    content: ' prepared a lamp for My anointed [fulfilling the promises of old]. [I Kings 11:36; 15:4; II Chron. 21:7; Luke 1:69.]'
  '18':
  - type: text
    content: ' His enemies will I clothe with shame, but upon himself shall his crown flourish.'
  '2':
  - type: text
    content: ' How he swore to the Lord and vowed to the Mighty One of Jacob:'
  '3':
  - type: text
    content: ' Surely I will not enter my dwelling house or get into my bed–'
  '4':
  - type: text
    content: ' I will not permit my eyes to sleep '
  - type: text
    content: or
  - type: text
    content: ' my eyelids to slumber,'
  '5':
  - type: text
    content: ' Until I have found a place for the Lord, a habitation for the Mighty One of Jacob. [Acts 7:46.]'
  '6':
  - type: text
    content: ' Behold, at Ephratah we [first] heard of [the discovered ark]; we found it in the fields of the wood [at Kiriath-jearim]. [I Sam. 6:21.]'
  '7':
  - type: text
    content: ' Let us go into His tabernacle; let us worship at His footstool.'
  '8':
  - type: text
    content: ' Arise, O Lord, to Your resting-place, You and the ark [the symbol] of Your strength.'
  '9':
  - type: text
    content: ' Let Your priests be clothed with righteousness (right living and right standing with God); and let Your saints shout for joy!'
