document_id: LEV.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ON THE eighth day Moses called Aaron and his sons and the elders of Israel;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he said to Aaron, Take a young calf for a sin offering and a ram for a burnt offering, [each] without blemish, and offer them before the Lord. [Heb. 10:10-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And say to the Israelites, Take a male goat for a sin offering, and a calf and a lamb, both a year old, without blemish, for a burnt offering,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Also a bull and a ram for peace offerings to sacrifice before the Lord, and a cereal offering mixed with oil, for today the Lord will appear to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They brought before the Tent of Meeting what Moses [had] commanded; all the congregation drew near and stood before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Moses said, This is the thing which the Lord commanded you to do, and the glory of the Lord will appear to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Moses said to Aaron, Draw near to the altar and offer your sin offering and your burnt offering and make atonement for yourself and for the people; and offer the offering of the people and make atonement for them, as the Lord commanded. [Heb. 5:1-5; 7:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So Aaron drew near to the altar and killed the calf of the sin offering, which was designated for himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The sons of Aaron presented the blood to him; he dipped his finger in the blood and put it on the horns of the altar and poured out the blood at the altar''s base;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But the fat, the kidneys, and the lobe of the liver from the sin offering he burned on the altar, as the Lord had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the flesh and the hide Aaron burned with fire outside the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He killed the burnt offering, and Aaron''s sons delivered to him the blood, which he dashed round about upon the altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they brought the burnt offering to him piece by piece, and the head, and Aaron burned them upon the altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he washed the entrails and the legs and burned them with the burnt offering on the altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then Aaron presented the people''s offering, and took the goat of the sin offering which was for the people and killed it and offered it for sin as he did the first sin offering. [Heb. 2:16, 17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And he presented the burnt offering and offered it according to the ordinance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Aaron presented the cereal offering and took a handful of it and burned it on the altar in addition to the burnt offering of the morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He also killed the bull and the ram, the sacrifice of peace offerings, for the people; and Aaron''s sons presented to him the blood, which he dashed upon the altar round about,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the fat of the bull and of the ram, the fat tail and that which covers the entrails, and the kidneys, and the lobe of the liver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And they put the fat upon the breasts, and Aaron burned the fat upon the altar;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But the breasts and the right thigh Aaron waved for a wave offering before the Lord, as Moses commanded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then Aaron lifted his hands toward the people and blessed them, and came down [from the altar] after offering the sin offering, the burnt offering, and the peace offerings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Moses and Aaron went into the Tent of Meeting, and when they came out they blessed the people, and the glory of the Lord [the Shekinah cloud] appeared to all the people [as promised]. [Lev. 9:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then there came a fire out from before the Lord and consumed the burnt offering and the fat on the altar; and when all the people saw it, they shouted and fell on their faces.'
