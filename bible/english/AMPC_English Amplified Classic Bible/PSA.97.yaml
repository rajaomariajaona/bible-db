document_id: PSA.97,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE '
  - type: text
    content: Lord
  - type: text
    content: ' reigns, let the earth rejoice; let the multitude of isles '
  - type: text
    content: and
  - type: text
    content: ' coastlands be glad!'
  '10':
  - type: text
    content: ' O you who love the Lord, hate evil; He preserves the lives of His saints (the children of God), He delivers them out of the hand of the wicked. [Rom. 8:13-17.]'
  '11':
  - type: text
    content: ' Light is sown for the [uncompromisingly] righteous '
  - type: text
    content: and
  - type: text
    content: ' strewn along their pathway, and joy for the upright in heart [the irrepressible joy which comes from consciousness of His favor and protection].'
  '12':
  - type: text
    content: ' Rejoice in the Lord, you [consistently] righteous (upright and in right standing with God), and give thanks at the remembrance of His holiness.'
  '2':
  - type: text
    content: ' Clouds and darkness are round about Him [as at Sinai]; righteousness and justice are the foundation of His throne. [Exod. 19:9.]'
  '3':
  - type: text
    content: ' Fire goes before Him and burns up His adversaries round about.'
  '4':
  - type: text
    content: ' His lightnings illumine the world; the earth sees and trembles.'
  '5':
  - type: text
    content: ' The hills melted like wax at the presence of the Lord, at the presence of the Lord of the whole earth.'
  '6':
  - type: text
    content: ' The heavens declare His righteousness, and all the peoples see His glory.'
  '7':
  - type: text
    content: ' Let all those be put to shame who serve graven images, who boast in idols. Fall prostrate before Him, all you gods. [Heb. 1:6.]'
  '8':
  - type: text
    content: ' Zion heard and was glad, and the daughters of Judah rejoiced [in relief] because of Your judgments, O Lord.'
  '9':
  - type: text
    content: ' For You, Lord, are high above all the earth; You are exalted far above all gods.'
