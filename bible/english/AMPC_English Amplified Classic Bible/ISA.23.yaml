document_id: ISA.23,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE MOURNFUL, inspired prediction (a burden to be lifted up) concerning Tyre: Wail, you ships of [Tyre returning from trading with] Tarshish, for Tyre is laid waste, so that there is no house, no harbor; from the land of Kittim (Cyprus) they learn of it.'
  '10':
  - type: text
    content: ' Overflow your land like [the overflow of] the Nile River, O Daughter of Tarshish; there is no girdle of restraint [on you] any more [to make you pay tribute or customs or duties to Tyre].'
  '11':
  - type: text
    content: ' He stretched out His hand over the sea, He shook the kingdoms; the Lord has given a command concerning Canaan to destroy her strongholds '
  - type: text
    content: and
  - type: text
    content: ' fortresses [Tyre, Sidon, etc.].'
  '12':
  - type: text
    content: ' And He said, You shall no more exult, you oppressed '
  - type: text
    content: and
  - type: text
    content: ' crushed one, O Virgin Daughter of Sidon. Arise, pass over to Kittim (Cyprus); but even there you will have no rest.'
  '13':
  - type: text
    content: ' Look at the land of the Chaldeans! That people and not the Assyrians designed '
  - type: text
    content: and
  - type: text
    content: ' assigned [Tyre] for the wild beasts '
  - type: text
    content: and
  - type: text
    content: ' those who [previously] dwelt in the wilderness. They set up their siege works, they overthrew its palaces, they made it a ruin!'
  '14':
  - type: text
    content: ' Howl, you ships of Tarshish, for your stronghold [of Tyre] is laid waste [your strength has been destroyed].'
  '15':
  - type: text
    content: ' And in that day Tyre will be in obscurity '
  - type: text
    content: and
  - type: text
    content: ' forgotten for seventy years, according to the days of one dynasty. After the end of seventy years will Tyre sing as a harlot [who has been forgotten but again attracts her lovers].'
  '16':
  - type: text
    content: ' Take a harp, go about the city, forgotten harlot; play skillfully '
  - type: text
    content: and
  - type: text
    content: ' make sweet melody, sing many songs, that you may be remembered.'
  '17':
  - type: text
    content: ' And after the end of seventy years the Lord will remember Tyre; and she will return to her hire and will play the harlot [resume her commerce] with all the kingdoms of the world on the face of the earth.'
  '18':
  - type: text
    content: ' But her gain and her hire [the profits of Tyre''s new prosperity] will be dedicated to the Lord [eventually]; it will not be treasured or stored up, for her gain will be used for those who dwell in the presence of the Lord [the ministers], that they may eat sufficiently and have durable '
  - type: text
    content: and
  - type: text
    content: ' stately clothing [suitable for those who minister at God''s altar].'
  '2':
  - type: text
    content: ' Be still, you inhabitants of the coast, you merchants of Sidon, '
  - type: text
    content: your messengers
  - type: text
    content: ' passing over the sea have replenished you [with wealth and industry],'
  '3':
  - type: text
    content: ' And were on great waters. The seed '
  - type: text
    content: or
  - type: text
    content: ' grain of the Shihor, the harvest [due to the overflow] of the Nile River, was [Tyre''s] revenue, and she became the merchandise of the nations.'
  '4':
  - type: text
    content: ' Be ashamed, O Sidon [mother-city of Tyre, now a widow bereaved of her children], for the sea has spoken, the stronghold of the sea, saying, I have neither travailed nor brought forth children; I have neither nourished '
  - type: text
    content: and
  - type: text
    content: ' reared young men nor brought up virgins.'
  '5':
  - type: text
    content: ' When the report comes to Egypt, they will be sorely pained over the report about Tyre.'
  '6':
  - type: text
    content: ' Pass over to Tarshish [to seek safety as exiles]! Wail, you inhabitants of the [Tyre] coast!'
  '7':
  - type: text
    content: ' Is this your jubilant city, whose origin dates back into antiquity, whose own feet are accustomed to carry her far off to settle [daughter cities]?'
  '8':
  - type: text
    content: ' Who has purposed this against Tyre, the bestower of crowns, whose merchants were princes, whose traders were the honored of the earth?'
  '9':
  - type: text
    content: ' The Lord of hosts has purposed it [in accordance with a fixed principle of His government], to defile the pride of all glory and to bring into dishonor '
  - type: text
    content: and
  - type: text
    content: ' contempt all the honored of the earth.'
