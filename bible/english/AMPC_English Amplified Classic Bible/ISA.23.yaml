document_id: ISA.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE MOURNFUL, inspired prediction (a burden to be lifted up) concerning Tyre: Wail, you ships of [Tyre returning from trading with] Tarshish, for Tyre is laid waste, so that there is no house, no harbor; from the land of Kittim (Cyprus) they learn of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Be still, you inhabitants of the coast, you merchants of Sidon, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your messengers
  - type: text
    text: ' passing over the sea have replenished you [with wealth and industry],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And were on great waters. The seed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' grain of the Shihor, the harvest [due to the overflow] of the Nile River, was [Tyre''s] revenue, and she became the merchandise of the nations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Be ashamed, O Sidon [mother-city of Tyre, now a widow bereaved of her children], for the sea has spoken, the stronghold of the sea, saying, I have neither travailed nor brought forth children; I have neither nourished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reared young men nor brought up virgins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When the report comes to Egypt, they will be sorely pained over the report about Tyre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Pass over to Tarshish [to seek safety as exiles]! Wail, you inhabitants of the [Tyre] coast!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Is this your jubilant city, whose origin dates back into antiquity, whose own feet are accustomed to carry her far off to settle [daughter cities]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Who has purposed this against Tyre, the bestower of crowns, whose merchants were princes, whose traders were the honored of the earth?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The Lord of hosts has purposed it [in accordance with a fixed principle of His government], to defile the pride of all glory and to bring into dishonor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contempt all the honored of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Overflow your land like [the overflow of] the Nile River, O Daughter of Tarshish; there is no girdle of restraint [on you] any more [to make you pay tribute or customs or duties to Tyre].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He stretched out His hand over the sea, He shook the kingdoms; the Lord has given a command concerning Canaan to destroy her strongholds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortresses [Tyre, Sidon, etc.].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And He said, You shall no more exult, you oppressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed one, O Virgin Daughter of Sidon. Arise, pass over to Kittim (Cyprus); but even there you will have no rest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Look at the land of the Chaldeans! That people and not the Assyrians designed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' assigned [Tyre] for the wild beasts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' those who [previously] dwelt in the wilderness. They set up their siege works, they overthrew its palaces, they made it a ruin!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Howl, you ships of Tarshish, for your stronghold [of Tyre] is laid waste [your strength has been destroyed].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And in that day Tyre will be in obscurity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forgotten for seventy years, according to the days of one dynasty. After the end of seventy years will Tyre sing as a harlot [who has been forgotten but again attracts her lovers].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Take a harp, go about the city, forgotten harlot; play skillfully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make sweet melody, sing many songs, that you may be remembered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And after the end of seventy years the Lord will remember Tyre; and she will return to her hire and will play the harlot [resume her commerce] with all the kingdoms of the world on the face of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But her gain and her hire [the profits of Tyre''s new prosperity] will be dedicated to the Lord [eventually]; it will not be treasured or stored up, for her gain will be used for those who dwell in the presence of the Lord [the ministers], that they may eat sufficiently and have durable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stately clothing [suitable for those who minister at God''s altar].'
