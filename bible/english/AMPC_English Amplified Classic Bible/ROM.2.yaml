document_id: ROM.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEREFORE YOU have no excuse '
  - type: text
    content: or
  - type: text
    content: ' defense '
  - type: text
    content: or
  - type: text
    content: ' justification, O man, whoever you are who judges '
  - type: text
    content: and
  - type: text
    content: ' condemns another. For in posing as judge '
  - type: text
    content: and
  - type: text
    content: ' passing sentence on another, you condemn yourself, because you who judge are habitually practicing the very same things [that you censure and denounce].'
  '10':
  - type: text
    content: ' But glory and honor and [heart] peace shall be awarded to everyone who [habitually] does good, the Jew first and also the Greek (Gentile).'
  '11':
  - type: text
    content: ' For God shows no partiality [undue favor or unfairness; with Him one man is not different from another]. [Deut. 10:17; II Chron. 19:7.]'
  '12':
  - type: text
    content: ' All who have sinned without the Law will also perish without [regard to] the Law, and all who have sinned under the Law will be judged '
  - type: text
    content: and
  - type: text
    content: ' condemned by the Law.'
  '13':
  - type: text
    content: ' For it is not merely hearing the Law [read] that makes one righteous before God, but it is the doers of the Law who will be held guiltless '
  - type: text
    content: and
  - type: text
    content: ' acquitted '
  - type: text
    content: and
  - type: text
    content: ' justified.'
  '14':
  - type: text
    content: ' When Gentiles who have not the [divine] Law do instinctively what the Law requires, they are a law to themselves, since they do not have the Law.'
  '15':
  - type: text
    content: ' They show that the essential requirements of the Law are written in their hearts '
  - type: text
    content: and
  - type: text
    content: ' are operating there, with which their consciences (sense of right and wrong) also bear witness; and their [moral] decisions (their arguments of reason, their condemning or approving thoughts) will accuse or perhaps defend '
  - type: text
    content: and
  - type: text
    content: ' excuse [them]'
  '16':
  - type: text
    content: ' On that day when, as my Gospel proclaims, God by Jesus Christ will judge men in regard to the things which they conceal (their hidden thoughts). [Eccl. 12:14.]'
  '17':
  - type: text
    content: ' But if you bear the name of Jew and rely upon the Law and pride yourselves in God '
  - type: text
    content: and
  - type: text
    content: ' your relationship to Him,'
  '18':
  - type: text
    content: ' And know '
  - type: text
    content: and
  - type: text
    content: ' understand His will and discerningly approve the better things '
  - type: text
    content: and
  - type: text
    content: ' have a sense of what is vital, because you are instructed by the Law;'
  '19':
  - type: text
    content: ' And if you are confident that you [yourself] are a guide to the blind, a light to those who are in darkness, and [that'
  '2':
  - type: text
    content: ' [But] we know that the judgment (adverse verdict, sentence) of God falls justly '
  - type: text
    content: and
  - type: text
    content: ' in accordance with truth upon those who practice such things.'
  '20':
  - type: text
    content: ' You are] a corrector of the foolish, a teacher of the childish, having in the Law the embodiment of knowledge and truth–'
  '21':
  - type: text
    content: ' Well then, you who teach others, do you not teach yourself? While you teach against stealing, do you steal (take what does not really belong to you)?'
  '22':
  - type: text
    content: ' You who say not to commit adultery, do you commit adultery [are you unchaste in action or in thought]? You who abhor '
  - type: text
    content: and
  - type: text
    content: ' loathe idols, do you rob temples [do you appropriate to your own use what is consecrated to God, thus robbing the sanctuary and doing sacrilege]?'
  '23':
  - type: text
    content: ' You who boast in the Law, do you dishonor God by breaking the Law [by stealthily infringing upon or carelessly neglecting or openly breaking it]?'
  '24':
  - type: text
    content: ' For, as it is written, The name of God is maligned '
  - type: text
    content: and
  - type: text
    content: ' blasphemed among the Gentiles because of you! [The words to this effect are from your own Scriptures.] [Isa. 52:5; Ezek. 36:20.]'
  '25':
  - type: text
    content: ' Circumcision does indeed profit if you keep the Law; but if you habitually transgress the Law, your circumcision is made uncircumcision.'
  '26':
  - type: text
    content: ' So if a man who is uncircumcised keeps the requirements of the Law, will not his uncircumcision be credited to him as [equivalent to] circumcision?'
  '27':
  - type: text
    content: ' Then those who are physically uncircumcised but keep the Law will condemn you who, although you have the code in writing and have circumcision, break the Law.'
  '28':
  - type: text
    content: ' For he is not a [real] Jew who is only one outwardly '
  - type: text
    content: and
  - type: text
    content: ' publicly, nor is [true] circumcision something external and physical.'
  '29':
  - type: text
    content: ' But he is a Jew who is one inwardly, and [true] circumcision is of the heart, a spiritual and not a literal [matter]. His praise is not from men but from God.'
  '3':
  - type: text
    content: ' And do you think '
  - type: text
    content: or
  - type: text
    content: ' imagine, O man, when you judge '
  - type: text
    content: and
  - type: text
    content: ' condemn those who practice such things and yet do them yourself, that you will escape God''s judgment '
  - type: text
    content: and
  - type: text
    content: ' elude His sentence '
  - type: text
    content: and
  - type: text
    content: ' adverse verdict?'
  '4':
  - type: text
    content: ' Or are you [so blind as to] trifle with '
  - type: text
    content: and
  - type: text
    content: ' presume upon '
  - type: text
    content: and
  - type: text
    content: ' despise '
  - type: text
    content: and
  - type: text
    content: ' underestimate the wealth of His kindness and forbearance and long-suffering patience? Are you unmindful '
  - type: text
    content: or
  - type: text
    content: ' actually ignorant [of the fact] that God''s kindness is intended to lead you to repent (to change your mind and inner man to accept God''s will)?'
  '5':
  - type: text
    content: ' But by your callous stubbornness '
  - type: text
    content: and
  - type: text
    content: ' impenitence of heart you are storing up wrath '
  - type: text
    content: and
  - type: text
    content: ' indignation for yourself on the day of wrath '
  - type: text
    content: and
  - type: text
    content: ' indignation, when God''s righteous judgment (just doom) will be revealed.'
  '6':
  - type: text
    content: ' For He will render to every man according to his works [justly, as his deeds deserve]: [Ps. 62:12.]'
  '7':
  - type: text
    content: ' To those who by patient persistence in well-doing [springing from piety] seek [unseen but sure] glory and honor and [the eternal blessedness of] immortality, He will give eternal life.'
  '8':
  - type: text
    content: ' But for those who are self-seeking '
  - type: text
    content: and
  - type: text
    content: ' self-willed '
  - type: text
    content: and
  - type: text
    content: ' disobedient to the Truth but responsive to wickedness, there will be indignation and wrath.'
  '9':
  - type: text
    content: ' [And] there will be tribulation '
  - type: text
    content: and
  - type: text
    content: ' anguish and calamity '
  - type: text
    content: and
  - type: text
    content: ' constraint for every soul of man who [habitually] does evil, the Jew first and also the Greek (Gentile).'
