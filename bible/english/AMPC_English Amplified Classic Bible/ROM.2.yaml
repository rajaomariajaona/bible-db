document_id: ROM.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEREFORE YOU have no excuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' defense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' justification, O man, whoever you are who judges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemns another. For in posing as judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' passing sentence on another, you condemn yourself, because you who judge are habitually practicing the very same things [that you censure and denounce].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [But] we know that the judgment (adverse verdict, sentence) of God falls justly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in accordance with truth upon those who practice such things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And do you think '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' imagine, O man, when you judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemn those who practice such things and yet do them yourself, that you will escape God''s judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' elude His sentence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adverse verdict?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Or are you [so blind as to] trifle with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' presume upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' underestimate the wealth of His kindness and forbearance and long-suffering patience? Are you unmindful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' actually ignorant [of the fact] that God''s kindness is intended to lead you to repent (to change your mind and inner man to accept God''s will)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But by your callous stubbornness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impenitence of heart you are storing up wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation for yourself on the day of wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation, when God''s righteous judgment (just doom) will be revealed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For He will render to every man according to his works [justly, as his deeds deserve]: [Ps. 62:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' To those who by patient persistence in well-doing [springing from piety] seek [unseen but sure] glory and honor and [the eternal blessedness of] immortality, He will give eternal life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But for those who are self-seeking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' self-willed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disobedient to the Truth but responsive to wickedness, there will be indignation and wrath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' [And] there will be tribulation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anguish and calamity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' constraint for every soul of man who [habitually] does evil, the Jew first and also the Greek (Gentile).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But glory and honor and [heart] peace shall be awarded to everyone who [habitually] does good, the Jew first and also the Greek (Gentile).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For God shows no partiality [undue favor or unfairness; with Him one man is not different from another]. [Deut. 10:17; II Chron. 19:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' All who have sinned without the Law will also perish without [regard to] the Law, and all who have sinned under the Law will be judged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemned by the Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For it is not merely hearing the Law [read] that makes one righteous before God, but it is the doers of the Law who will be held guiltless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acquitted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justified.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When Gentiles who have not the [divine] Law do instinctively what the Law requires, they are a law to themselves, since they do not have the Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' They show that the essential requirements of the Law are written in their hearts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are operating there, with which their consciences (sense of right and wrong) also bear witness; and their [moral] decisions (their arguments of reason, their condemning or approving thoughts) will accuse or perhaps defend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excuse [them]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' On that day when, as my Gospel proclaims, God by Jesus Christ will judge men in regard to the things which they conceal (their hidden thoughts). [Eccl. 12:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But if you bear the name of Jew and rely upon the Law and pride yourselves in God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your relationship to Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand His will and discerningly approve the better things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have a sense of what is vital, because you are instructed by the Law;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And if you are confident that you [yourself] are a guide to the blind, a light to those who are in darkness, and [that'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You are] a corrector of the foolish, a teacher of the childish, having in the Law the embodiment of knowledge and truth–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Well then, you who teach others, do you not teach yourself? While you teach against stealing, do you steal (take what does not really belong to you)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' You who say not to commit adultery, do you commit adultery [are you unchaste in action or in thought]? You who abhor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loathe idols, do you rob temples [do you appropriate to your own use what is consecrated to God, thus robbing the sanctuary and doing sacrilege]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' You who boast in the Law, do you dishonor God by breaking the Law [by stealthily infringing upon or carelessly neglecting or openly breaking it]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For, as it is written, The name of God is maligned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blasphemed among the Gentiles because of you! [The words to this effect are from your own Scriptures.] [Isa. 52:5; Ezek. 36:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Circumcision does indeed profit if you keep the Law; but if you habitually transgress the Law, your circumcision is made uncircumcision.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So if a man who is uncircumcised keeps the requirements of the Law, will not his uncircumcision be credited to him as [equivalent to] circumcision?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then those who are physically uncircumcised but keep the Law will condemn you who, although you have the code in writing and have circumcision, break the Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For he is not a [real] Jew who is only one outwardly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' publicly, nor is [true] circumcision something external and physical.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But he is a Jew who is one inwardly, and [true] circumcision is of the heart, a spiritual and not a literal [matter]. His praise is not from men but from God.'
