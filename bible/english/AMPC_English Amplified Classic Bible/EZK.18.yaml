document_id: EZK.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD of the Lord came to me again, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' What do you mean by using this proverb concerning the land of Israel, The fathers have eaten sour grapes, and the children''s teeth are set on edge?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' As I live, says the Lord God, you shall not have occasion any more to use this proverb in Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Behold, all souls are Mine; as the soul of the father, so also the soul of the son is Mine; the soul that sins, it shall die. [Rom. 6:23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But if a man is [uncompromisingly] righteous (upright and in right standing with God) and does what is lawful and right,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And has not eaten [at the idol shrines] upon the mountains nor lifted up his eyes to the idols of the house of Israel, has not defiled his neighbor''s wife nor come near to a woman in her time of impurity,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And has not wronged anyone but has restored to the debtor his pledge, has taken nothing by robbery but has given his bread to the hungry and has covered the naked with a garment,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Who does not charge interest or percentage of increase on what he lends [in compassion], who withholds his hand from iniquity, who executes true justice between man and man,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Who has walked in My statutes and kept My ordinances, to deal justly; [then] he is [truly] righteous; he shall surely live, says the Lord God. [Ezek. 20:11; Amos 5:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' If he begets a son who is a robber or a shedder of blood, who does to a brother either of these sins of violence,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And leaves undone all of the duties [of a righteous man], and has even eaten [the food set before idols] on the mountains and defiled his neighbor''s wife,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Has wronged the poor and needy, has taken by robbery, has not restored [to the debtor] his pledge, has lifted up his eyes to the idols, has committed abomination (things hateful and exceedingly vile in the eyes of God),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And has charged interest or percentage of increase on what he has loaned [in supposed compassion]; shall he then live? He shall not live! He has done all these abominations; he shall surely die; his blood shall be upon him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But if this wicked man begets a son who sees all the sins which his father has committed, and considers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fears [God] and does not do like his father,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Who has not eaten [food set before idols] upon the mountains nor has lifted up his eyes to the idols of the house of Israel, has not defiled his neighbor''s wife,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Nor wronged anyone, nor has taken anything in pledge, nor has taken by robbery but has given his bread to the hungry and has covered the naked with a garment,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Who has withdrawn his hand from [oppressing] the poor, who has not received interest or increase [from the needy] but has executed My ordinances and has walked in My statutes; he shall not die for the iniquity of his father; he shall surely live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' As for his father, because he cruelly oppressed, robbed his brother, and did that which is not good among his people, behold, he shall die for his iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Yet do you say, Why does not the son bear the iniquity of the father? When the son has done that which is lawful and right and has kept all My statutes and has done them, he shall surely live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The soul that sins, it [is the one that] shall die. The son shall not bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be punished for the iniquity of the father, neither shall the father bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be punished for the iniquity of the son; the righteousness of the righteous shall be upon him only, and the wickedness of the wicked shall be upon the wicked only.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But if the wicked man turns from all his sins that he has committed and keeps all My statutes and does that which is lawful and right, he shall surely live; he shall not die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' None of his transgressions which he has committed shall be remembered against him; for his righteousness which he has executed [for his moral and spiritual rectitude in every area and relation], he shall live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Have I any pleasure in the death of the wicked? says the Lord, and not rather that he should turn from his evil way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return [to his God] and live?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But if the righteous man turns away from his righteousness and commits iniquity and does according to all the abominations that the wicked man does, shall he live? None of his righteous deeds which he has done shall be remembered. In his trespass that he has trespassed and in his sin that he has sinned, in them shall he die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Yet you say, The way of the Lord is not fair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' just. Hear now, O house of Israel: Is not My way fair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' just? Are not your ways unfair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unjust?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' When a righteous man turns away from his righteousness and commits iniquity and dies in his sins, for his iniquity that he has done he shall die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Again, when the wicked man turns away from his wickedness which he has committed and does that which is lawful and right, he shall save his life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Because he considers and turns away from all his transgressions which he has committed, he shall surely live; he shall not die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Yet says the house of Israel, The way of the Lord is not fair and just! O house of Israel, are not My ways fair and just? Are not your ways unfair and unjust?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Therefore I will judge you, O house of Israel, every one according to his ways, says the Lord God. Repent and turn from all your transgressions, lest iniquity be your ruin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' so shall they not be a stumbling block to you. [Matt. 3:2; Rev. 2:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Cast away from you all your transgressions by which you have transgressed against Me, and make you a new mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heart and a new spirit. For why will you die, O house of Israel? [Eph. 4:22, 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' For I have no pleasure in the death of him who dies, says the Lord God. Therefore turn (be converted) and live!'
