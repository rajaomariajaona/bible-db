document_id: AMO.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WOE TO those who are at ease in Zion and to those on the mountain of Samaria who are careless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feel secure, the notable men of the chief [because chosen by God] of the nations, to whom the house of Israel comes! [Luke 6:24, 25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Pass over to Calneh and see, and from there go to Hamath the great [city, north of Damascus]; then go down to Gath of the Philistines. Are they better than these [your] kingdoms? Or are their boundaries greater than your boundaries,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' O you who put far away the evil day [of punishment], yet cause the sitting of violence [upon you] to come near?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Woe to those who lie upon beds of ivory and stretch themselves upon their couches, and eat the lambs out of the flock and the calves out of the midst of the stall,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Who sing idle songs to the sound of the harp and invent for themselves instruments of music like David''s, [I Chron. 23:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Who drink wine in bowls and anoint themselves with the finest oils, but are not grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sick at heart over the affliction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruin of Joseph (Israel)! [Gen. 49:22, 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Therefore now shall they go captive with the first who go into exile, and the revelry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' banqueting of those who stretch themselves shall be ended.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The Lord God has sworn by Himself–the Lord, the God of hosts, says: I abhor, reject, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despise the pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' false, futile glory of Jacob (Israel), and I hate his palaces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strongholds; and I will deliver up the city [idol-worshiping Samaria] with all that is in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And it shall come to pass that if there remain ten men in one house, they shall die [by the pestilence that comes with war].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And then a man''s uncle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' kinsman, he who is to make a burning to cremate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dispose [of his pestilence-infected body], comes in to bring the bones out of the house, and he shall say to another still alive in the farthest parts of the house, Is there anyone else with you? and he shall say, No. Then shall the newcomer say, Hush! Hold your [cursing] tongue! We dare not so mention the name of the Lord [lest we invoke more punishment]. [I Sam. 31:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For behold, the Lord commands and He will smite the great house into ruins and the little house into fragments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Do horses run upon rocks? Do men plow the ocean with oxen? But you have turned justice into [the poison of] gall and the fruit of righteousness into [the bitterness of] wormwood–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You who rejoice in Lo-debar [a thing of nought], who say, Have we not by our own strength taken Karnaim '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' horns [of resistance] for ourselves?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For behold, I will raise up against you a nation, O house of Israel, says the Lord, the God of hosts; and they shall afflict '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppress you [to the entire limits of Israel] from the entrance of Hamath to the brook of the Arabah.'
