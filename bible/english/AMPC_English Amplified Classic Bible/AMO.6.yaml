document_id: AMO.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WOE TO those who are at ease in Zion and to those on the mountain of Samaria who are careless '
  - type: text
    content: and
  - type: text
    content: ' feel secure, the notable men of the chief [because chosen by God] of the nations, to whom the house of Israel comes! [Luke 6:24, 25.]'
  '10':
  - type: text
    content: ' And then a man''s uncle '
  - type: text
    content: or
  - type: text
    content: ' kinsman, he who is to make a burning to cremate '
  - type: text
    content: and
  - type: text
    content: ' dispose [of his pestilence-infected body], comes in to bring the bones out of the house, and he shall say to another still alive in the farthest parts of the house, Is there anyone else with you? and he shall say, No. Then shall the newcomer say, Hush! Hold your [cursing] tongue! We dare not so mention the name of the Lord [lest we invoke more punishment]. [I Sam. 31:12.]'
  '11':
  - type: text
    content: ' For behold, the Lord commands and He will smite the great house into ruins and the little house into fragments.'
  '12':
  - type: text
    content: ' Do horses run upon rocks? Do men plow the ocean with oxen? But you have turned justice into [the poison of] gall and the fruit of righteousness into [the bitterness of] wormwood–'
  '13':
  - type: text
    content: ' You who rejoice in Lo-debar [a thing of nought], who say, Have we not by our own strength taken Karnaim '
  - type: text
    content: or
  - type: text
    content: ' horns [of resistance] for ourselves?'
  '14':
  - type: text
    content: ' For behold, I will raise up against you a nation, O house of Israel, says the Lord, the God of hosts; and they shall afflict '
  - type: text
    content: and
  - type: text
    content: ' oppress you [to the entire limits of Israel] from the entrance of Hamath to the brook of the Arabah.'
  '2':
  - type: text
    content: ' Pass over to Calneh and see, and from there go to Hamath the great [city, north of Damascus]; then go down to Gath of the Philistines. Are they better than these [your] kingdoms? Or are their boundaries greater than your boundaries,'
  '3':
  - type: text
    content: ' O you who put far away the evil day [of punishment], yet cause the sitting of violence [upon you] to come near?'
  '4':
  - type: text
    content: ' Woe to those who lie upon beds of ivory and stretch themselves upon their couches, and eat the lambs out of the flock and the calves out of the midst of the stall,'
  '5':
  - type: text
    content: ' Who sing idle songs to the sound of the harp and invent for themselves instruments of music like David''s, [I Chron. 23:5.]'
  '6':
  - type: text
    content: ' Who drink wine in bowls and anoint themselves with the finest oils, but are not grieved '
  - type: text
    content: and
  - type: text
    content: ' sick at heart over the affliction '
  - type: text
    content: and
  - type: text
    content: ' ruin of Joseph (Israel)! [Gen. 49:22, 23.]'
  '7':
  - type: text
    content: ' Therefore now shall they go captive with the first who go into exile, and the revelry '
  - type: text
    content: and
  - type: text
    content: ' banqueting of those who stretch themselves shall be ended.'
  '8':
  - type: text
    content: ' The Lord God has sworn by Himself–the Lord, the God of hosts, says: I abhor, reject, '
  - type: text
    content: and
  - type: text
    content: ' despise the pride '
  - type: text
    content: and
  - type: text
    content: ' false, futile glory of Jacob (Israel), and I hate his palaces '
  - type: text
    content: and
  - type: text
    content: ' strongholds; and I will deliver up the city [idol-worshiping Samaria] with all that is in it.'
  '9':
  - type: text
    content: ' And it shall come to pass that if there remain ten men in one house, they shall die [by the pestilence that comes with war].'
