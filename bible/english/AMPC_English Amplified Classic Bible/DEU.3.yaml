document_id: DEU.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN WE turned and went up the road to Bashan, and Og king of Bashan came out against us, he and all his people, to battle at Edrei.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' All the cities of the plain, and all Gilead, and all Bashan as far as Salecah and Edrei, cities of the kingdom of Og in Bashan.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For only Og king of Bashan remained of the remnant of the [gigantic] Rephaim. Behold, his bedstead was of iron; is it not in Rabbah of the Ammonites? Nine cubits was its length and four cubits its breadth, using the cubit of a man [the forearm to the end of the middle finger].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' When we took possession of this land, I gave to the Reubenites and the Gadites the territory from Aroer, which is on the edge of the Valley of the Arnon, and half the hill country of Gilead and its cities.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The rest of Gilead and all of Bashan, the kingdom of Og, that is, all the region of Argob in Bashan, I gave to the half-tribe of Manasseh. It is called the land of Rephaim [of giant stature].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Jair son of Manasseh took all the region of Argob, that is, Bashan, as far as the border of the Geshurites and the Maacathites, and called it after his own name, Havvoth-jair, so called to this day.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And I gave Gilead to Machir [son of Manasseh].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And to the Reubenites and Gadites I gave from Gilead even to the Valley of the Arnon, with the middle of the valley as the boundary of it, as far over as the river Jabbok, the boundary of the Ammonites,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The Arabah also, with the Jordan as its boundary, from Chinnereth as far as the Sea of the Arabah, the Salt [Dead] Sea, under the cliffs [of the headlands] of Pisgah on the east.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And I commanded you at that time, saying, The Lord your God has given you this land to possess it; you [Reuben, Gad, and the half-tribe of Manasseh] shall go over [the Jordan] armed before your brethren the other Israelites, all that are able for war.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But your wives and your little ones and your cattle–I know that you have many cattle–shall remain in your cities which I have given you,'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And the Lord said to me, Do not fear him, for I have given him and all his people and his land into your hand; and you shall do to him as you did to Sihon king of the Amorites, who lived at Heshbon.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Until the Lord has given rest to your brethren as to you, and until they also possess the land which the Lord your God has given them beyond the Jordan. Then shall you return every man to the possession which I have given you.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And I commanded Joshua at that time, saying, Your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' eyes have seen all that the Lord your God has done to these two kings [Sihon and Og]; so shall the Lord do to all the kingdoms into which you are going over [the Jordan].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' You shall not fear them, for the Lord your God shall fight for you.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And I besought the Lord at that time, saying,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' O Lord God, You have only begun to show Your servant Your greatness and Your mighty hand; for what god is there in heaven or on earth that can do according to Your works and according to Your might?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' I pray You, [will You not just] let me go over and see the good land that is beyond the Jordan, that goodly mountain country [with Hermon] and Lebanon?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' But the Lord was angry with me on your account and would not listen to me; and the Lord said to me, That is enough! Say no more to Me about it.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Get up to the top of Pisgah and lift up your eyes westward and northward and southward and eastward, and behold it with your eyes, for you shall not go over this Jordan.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' But charge Joshua, and encourage and strengthen him, for he shall go over before this people and he shall cause them to possess the land which you shall see.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' So we remained in the valley opposite Beth-peor.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So the Lord our God also gave into our hands Og king of Bashan and all his people, and we smote him until not one was left to him.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And we took all his cities at that time; there was not a city which we did not take from them, sixty cities, the whole region of Argob, the kingdom of Og in Bashan.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' All these cities were fortified with high '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' haughty walls, gates, and bars, besides a great many unwalled villages.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And we utterly destroyed them, as we did to Sihon king of Heshbon, utterly destroying every city–men, women, and children.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' But all the cattle and the spoil of the cities we took for booty for ourselves.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' So we took the land at that time out of the hand of the two kings of the Amorites who were beyond the Jordan, from the Valley of the Arnon to Mount Hermon'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' (The Sidonians call Hermon, Sirion, and the Amorites call it Senir),'
