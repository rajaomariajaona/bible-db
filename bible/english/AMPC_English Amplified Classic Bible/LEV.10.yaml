document_id: LEV.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND NADAB and Abihu, the sons of Aaron, each took his censer and put fire in it, and put incense on it, and offered strange '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unholy fire before the Lord, as He had not commanded them.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall make a distinction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize a difference between the holy and the common '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' unholy, and between the unclean and the clean;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you are to teach the Israelites all the statutes which the Lord has spoken to them by Moses.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses said to Aaron and to Eleazar and Ithamar, his sons who were left, Take the cereal offering that remains of the offerings of the Lord made by fire and eat it without leaven beside the altar, for it is most holy.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall eat it in a sacred place, because it is your due and your sons'' due, from the offerings made by fire to the Lord; for so I am commanded.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the breast that is waved and the thigh that is offered you shall eat in a clean place, you and your sons and daughters with you; for they are your due and your sons'' due, given out of the sacrifices of the peace offerings of the Israelites.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The thigh that is offered and the breast that is waved they shall bring with the offerings made by fire of the fat, to wave for a wave offering before the Lord; and it shall be yours and your sons'' with you as a portion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' due perpetually, as the Lord has commanded.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses diligently tried to find [what had become of] the goat [that had been offered] for the sin offering, and behold, it was burned up [as waste]! And he was angry with Eleazar and Ithamar, the sons of Aaron who were left alive, and said,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Why have you not eaten the sin offering in the Holy Place? It is most holy; and God has given it to you to bear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take away the iniquity of the congregation, to make atonement for them before the Lord.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, the blood of it was not brought within the Holy Place; you should indeed have eaten [the flesh of it] in the Holy Place, as I commanded.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Aaron said to Moses, Behold, this very day in which they have [obediently] offered their sin offering and their burnt offering before the Lord, such [terrible calamities] have befallen me [and them]! If I [and they] had eaten the most holy sin offering today [humbled as we have been by the sin of our kinsmen and God''s judgment upon them], would it have been acceptable in the sight of the Lord? [Hos. 9:4.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And there came forth fire from before the Lord and killed them, and they died before the Lord.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when Moses heard that, he was pacified.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Moses said to Aaron, This is what the Lord meant when He said, I [and My will, not their own] will be acknowledged as hallowed by those who come near Me, and before all the people I will be honored. And Aaron said nothing.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses called Mishael and Elzaphan, sons of Uzziel uncle of Aaron, and said to them, Come near, carry your brethren from before the sanctuary out of the camp.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So they drew near and carried them in their undertunics [stripped of their priestly vestments] out of the camp, as Moses had said.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses said to Aaron and Eleazar and Ithamar, his sons [the father and brothers of the two priests whom God had slain for offering false fire], Do not uncover your heads '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' let your hair go loose or tear your clothes, lest you die [also] and lest God''s wrath should come upon all the congregation; but let your brethren, the whole house of Israel, bewail the burning which the Lord has kindled.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall not go out from the door of the Tent of Meeting, lest you die, for the Lord''s anointing oil is upon you. And they did according to Moses'' word.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Lord said to Aaron,'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do not drink wine or strong drink, you or your sons, when you go into the Tent of Meeting, lest you die; it shall be a statute forever in all your generations.'
