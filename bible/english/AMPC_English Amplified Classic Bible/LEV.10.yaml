document_id: LEV.10,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND NADAB and Abihu, the sons of Aaron, each took his censer and put fire in it, and put incense on it, and offered strange '
  - type: text
    content: and
  - type: text
    content: ' unholy fire before the Lord, as He had not commanded them.'
  '10':
  - type: text
    content: ' You shall make a distinction '
  - type: text
    content: and
  - type: text
    content: ' recognize a difference between the holy and the common '
  - type: text
    content: or
  - type: text
    content: ' unholy, and between the unclean and the clean;'
  '11':
  - type: text
    content: ' And you are to teach the Israelites all the statutes which the Lord has spoken to them by Moses.'
  '12':
  - type: text
    content: ' And Moses said to Aaron and to Eleazar and Ithamar, his sons who were left, Take the cereal offering that remains of the offerings of the Lord made by fire and eat it without leaven beside the altar, for it is most holy.'
  '13':
  - type: text
    content: ' You shall eat it in a sacred place, because it is your due and your sons'' due, from the offerings made by fire to the Lord; for so I am commanded.'
  '14':
  - type: text
    content: ' But the breast that is waved and the thigh that is offered you shall eat in a clean place, you and your sons and daughters with you; for they are your due and your sons'' due, given out of the sacrifices of the peace offerings of the Israelites.'
  '15':
  - type: text
    content: ' The thigh that is offered and the breast that is waved they shall bring with the offerings made by fire of the fat, to wave for a wave offering before the Lord; and it shall be yours and your sons'' with you as a portion '
  - type: text
    content: or
  - type: text
    content: ' due perpetually, as the Lord has commanded.'
  '16':
  - type: text
    content: ' And Moses diligently tried to find [what had become of] the goat [that had been offered] for the sin offering, and behold, it was burned up [as waste]! And he was angry with Eleazar and Ithamar, the sons of Aaron who were left alive, and said,'
  '17':
  - type: text
    content: ' Why have you not eaten the sin offering in the Holy Place? It is most holy; and God has given it to you to bear '
  - type: text
    content: and
  - type: text
    content: ' take away the iniquity of the congregation, to make atonement for them before the Lord.'
  '18':
  - type: text
    content: ' Behold, the blood of it was not brought within the Holy Place; you should indeed have eaten [the flesh of it] in the Holy Place, as I commanded.'
  '19':
  - type: text
    content: ' But Aaron said to Moses, Behold, this very day in which they have [obediently] offered their sin offering and their burnt offering before the Lord, such [terrible calamities] have befallen me [and them]! If I [and they] had eaten the most holy sin offering today [humbled as we have been by the sin of our kinsmen and God''s judgment upon them], would it have been acceptable in the sight of the Lord? [Hos. 9:4.]'
  '2':
  - type: text
    content: ' And there came forth fire from before the Lord and killed them, and they died before the Lord.'
  '20':
  - type: text
    content: ' And when Moses heard that, he was pacified.'
  '3':
  - type: text
    content: ' Then Moses said to Aaron, This is what the Lord meant when He said, I [and My will, not their own] will be acknowledged as hallowed by those who come near Me, and before all the people I will be honored. And Aaron said nothing.'
  '4':
  - type: text
    content: ' Moses called Mishael and Elzaphan, sons of Uzziel uncle of Aaron, and said to them, Come near, carry your brethren from before the sanctuary out of the camp.'
  '5':
  - type: text
    content: ' So they drew near and carried them in their undertunics [stripped of their priestly vestments] out of the camp, as Moses had said.'
  '6':
  - type: text
    content: ' And Moses said to Aaron and Eleazar and Ithamar, his sons [the father and brothers of the two priests whom God had slain for offering false fire], Do not uncover your heads '
  - type: text
    content: or
  - type: text
    content: ' let your hair go loose or tear your clothes, lest you die [also] and lest God''s wrath should come upon all the congregation; but let your brethren, the whole house of Israel, bewail the burning which the Lord has kindled.'
  '7':
  - type: text
    content: ' And you shall not go out from the door of the Tent of Meeting, lest you die, for the Lord''s anointing oil is upon you. And they did according to Moses'' word.'
  '8':
  - type: text
    content: ' And the Lord said to Aaron,'
  '9':
  - type: text
    content: ' Do not drink wine or strong drink, you or your sons, when you go into the Tent of Meeting, lest you die; it shall be a statute forever in all your generations.'
