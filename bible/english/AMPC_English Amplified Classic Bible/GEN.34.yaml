document_id: GEN.34,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW DINAH daughter of Leah, whom she bore to Jacob, went out [unattended] to see the girls of the place.'
  '10':
  - type: text
    content: ' You shall dwell with us; the country will be open to you; live and trade and get your possessions in it.'
  '11':
  - type: text
    content: ' And Shechem said to [Dinah''s] father and to her brothers, Let me find favor in your eyes, and I will give you whatever you ask of me.'
  '12':
  - type: text
    content: ' Ask me ever so much dowry and [marriage] gift, and I will give according to what you tell me; only give me the girl to be my wife.'
  '13':
  - type: text
    content: ' The sons of Jacob answered Shechem and Hamor his father deceitfully, [justifying their intended action by saying, in effect, we are going to do this] because Shechem had defiled '
  - type: text
    content: and
  - type: text
    content: ' disgraced their sister Dinah.'
  '14':
  - type: text
    content: ' They said to them, We cannot do this thing '
  - type: text
    content: and
  - type: text
    content: ' give our sister to one who is not circumcised, for that would be a reproach '
  - type: text
    content: and
  - type: text
    content: ' disgrace to us.'
  '15':
  - type: text
    content: ' But we do consent to do this: if you will become as we are and every male among you be circumcised,'
  '16':
  - type: text
    content: ' Then we will give our daughters to you and we will take your daughters to us, and we will dwell with you and become one people.'
  '17':
  - type: text
    content: ' But if you will not listen to us and consent to be circumcised, then we will take our daughter and go.'
  '18':
  - type: text
    content: ' Their words pleased Hamor and his son Shechem.'
  '19':
  - type: text
    content: ' And the young man did not delay to do the thing, for he delighted in Jacob''s daughter. He was honored above all his family [so, ranking first, he acted first].'
  '2':
  - type: text
    content: ' And when Shechem son of Hamor the Hivite, prince of the country, saw her, he seized her, lay with her, and humbled, defiled, '
  - type: text
    content: and
  - type: text
    content: ' disgraced her.'
  '20':
  - type: text
    content: ' Then Hamor and Shechem his son came to the gate of their [enclosed] town and discussed the matter with the citizens, saying,'
  '21':
  - type: text
    content: ' These men are peaceable with us; so let them dwell in the land and trade in it; for the land is large enough [for us and] for them; let us take their daughters for wives and let us give them our daughters.'
  '22':
  - type: text
    content: ' But the men will consent to our request that they live among us and be one people only on condition that every male among us be circumcised, as they are.'
  '23':
  - type: text
    content: ' Shall not their cattle and their possessions and all their beasts be ours? Only let us consent to them, and they will dwell here with us.'
  '24':
  - type: text
    content: ' And all the people who went out of the town gate listened '
  - type: text
    content: and
  - type: text
    content: ' heeded what Hamor and Shechem said; and every male was circumcised who was a resident of that town.'
  '25':
  - type: text
    content: ' But on the third day [after the circumcision] when [all the men] were sore, two of the sons of Jacob, Simeon and Levi, Dinah''s [full] brothers, took their swords, boldly entered the city [without danger], and slew all the males.'
  '26':
  - type: text
    content: ' And they killed Hamor and Shechem his son with the edge of the sword and took Dinah out of Shechem''s house [where she had been all this time] and departed.'
  '27':
  - type: text
    content: ' [Then the rest of] Jacob''s [eleven] sons came upon the slain and plundered the town, because there their sister had been defiled '
  - type: text
    content: and
  - type: text
    content: ' disgraced.'
  '28':
  - type: text
    content: ' They took their flocks, their herds, their donkeys, and whatever was in the town and in the field;'
  '29':
  - type: text
    content: ' All their wealth and all their little ones and their wives they took captive, making spoil even of all [they found] in the houses.'
  '3':
  - type: text
    content: ' But his soul longed for '
  - type: text
    content: and
  - type: text
    content: ' clung to Dinah daughter of Jacob, and he loved the girl and spoke comfortingly to her young heart''s wishes.'
  '30':
  - type: text
    content: ' And Jacob said to Simeon and Levi, You have ruined me, making me infamous '
  - type: text
    content: and
  - type: text
    content: ' embroiling me with the inhabitants of the land, the Canaanites and the Perizzites! And we are few in number, and they will gather together against me and attack me; and I shall be destroyed, I and my household.'
  '31':
  - type: text
    content: ' And they said, Should he [be permitted to] deal with our sister as with a harlot?'
  '4':
  - type: text
    content: ' And Shechem said to his father Hamor, Get me this girl to be my wife.'
  '5':
  - type: text
    content: ' Jacob heard that [Shechem] had defiled Dinah his daughter. Now his sons were with his livestock in the field. So Jacob held his peace until they came.'
  '6':
  - type: text
    content: ' But Hamor father of Shechem went out to Jacob to have a talk with him.'
  '7':
  - type: text
    content: ' When Jacob''s sons heard it, they came from the field; and they were distressed and grieved and very angry, for [Shechem] had done a vile thing to Israel in lying with Jacob''s daughter, which ought not to be done.'
  '8':
  - type: text
    content: ' And Hamor conferred with them, saying, The soul of my son Shechem craves your daughter [and sister]. I beg of you give her to him to be his wife.'
  '9':
  - type: text
    content: ' And make marriages with us and give your daughters to us and take our daughters to you.'
