document_id: GEN.34,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW DINAH daughter of Leah, whom she bore to Jacob, went out [unattended] to see the girls of the place.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall dwell with us; the country will be open to you; live and trade and get your possessions in it.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Shechem said to [Dinah''s] father and to her brothers, Let me find favor in your eyes, and I will give you whatever you ask of me.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ask me ever so much dowry and [marriage] gift, and I will give according to what you tell me; only give me the girl to be my wife.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The sons of Jacob answered Shechem and Hamor his father deceitfully, [justifying their intended action by saying, in effect, we are going to do this] because Shechem had defiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgraced their sister Dinah.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They said to them, We cannot do this thing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give our sister to one who is not circumcised, for that would be a reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgrace to us.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But we do consent to do this: if you will become as we are and every male among you be circumcised,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then we will give our daughters to you and we will take your daughters to us, and we will dwell with you and become one people.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if you will not listen to us and consent to be circumcised, then we will take our daughter and go.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their words pleased Hamor and his son Shechem.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the young man did not delay to do the thing, for he delighted in Jacob''s daughter. He was honored above all his family [so, ranking first, he acted first].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when Shechem son of Hamor the Hivite, prince of the country, saw her, he seized her, lay with her, and humbled, defiled, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgraced her.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Hamor and Shechem his son came to the gate of their [enclosed] town and discussed the matter with the citizens, saying,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These men are peaceable with us; so let them dwell in the land and trade in it; for the land is large enough [for us and] for them; let us take their daughters for wives and let us give them our daughters.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But the men will consent to our request that they live among us and be one people only on condition that every male among us be circumcised, as they are.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Shall not their cattle and their possessions and all their beasts be ours? Only let us consent to them, and they will dwell here with us.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all the people who went out of the town gate listened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heeded what Hamor and Shechem said; and every male was circumcised who was a resident of that town.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But on the third day [after the circumcision] when [all the men] were sore, two of the sons of Jacob, Simeon and Levi, Dinah''s [full] brothers, took their swords, boldly entered the city [without danger], and slew all the males.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they killed Hamor and Shechem his son with the edge of the sword and took Dinah out of Shechem''s house [where she had been all this time] and departed.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Then the rest of] Jacob''s [eleven] sons came upon the slain and plundered the town, because there their sister had been defiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgraced.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They took their flocks, their herds, their donkeys, and whatever was in the town and in the field;'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All their wealth and all their little ones and their wives they took captive, making spoil even of all [they found] in the houses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But his soul longed for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clung to Dinah daughter of Jacob, and he loved the girl and spoke comfortingly to her young heart''s wishes.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jacob said to Simeon and Levi, You have ruined me, making me infamous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' embroiling me with the inhabitants of the land, the Canaanites and the Perizzites! And we are few in number, and they will gather together against me and attack me; and I shall be destroyed, I and my household.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they said, Should he [be permitted to] deal with our sister as with a harlot?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Shechem said to his father Hamor, Get me this girl to be my wife.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jacob heard that [Shechem] had defiled Dinah his daughter. Now his sons were with his livestock in the field. So Jacob held his peace until they came.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But Hamor father of Shechem went out to Jacob to have a talk with him.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Jacob''s sons heard it, they came from the field; and they were distressed and grieved and very angry, for [Shechem] had done a vile thing to Israel in lying with Jacob''s daughter, which ought not to be done.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Hamor conferred with them, saying, The soul of my son Shechem craves your daughter [and sister]. I beg of you give her to him to be his wife.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And make marriages with us and give your daughters to us and take our daughters to you.'
