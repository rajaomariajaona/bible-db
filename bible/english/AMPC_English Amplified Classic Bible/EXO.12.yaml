document_id: EXO.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses and Aaron in the land of Egypt,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' You shall let nothing of the meat remain until the morning; and the bones '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unedible bits which remain of it until morning you shall burn with fire.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And you shall eat it thus: [as fully prepared for a journey] your loins girded, your shoes on your feet, and your staff in your hand; and you shall eat it in haste. It is the Lord''s Passover.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' For I will pass through the land of Egypt this night and will smite all the firstborn in the land of Egypt, both man and beast; and against all the gods of Egypt I will execute judgment [proving their helplessness]. I am the Lord.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' The blood shall be for a token '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sign to you upon [the doorposts of] the houses where you are, [that] when I see the blood, I will pass over you, and no plague shall be upon you to destroy you when I smite the land of Egypt. [I Cor. 5:7; Heb. 11:28.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And this day shall be to you for a memorial. You shall keep it as a feast to the Lord throughout your generations, keep it as an ordinance forever.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' [In celebration of the Passover in future years] seven days shall you eat unleavened bread; even the first day you shall put away leaven [symbolic of corruption] out of your houses; for whoever eats leavened bread from the first day until the seventh day, that person shall be cut off from Israel.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' On the first day you shall hold a solemn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' holy assembly, and on the seventh day there shall be a solemn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' holy assembly; no kind of work shall be done in them, save [preparation of] that which every person must eat–that only may be done by you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And you shall observe the Feast of Unleavened Bread, for on this very day have I brought your hosts out of the land of Egypt; therefore shall you observe this day throughout your generations as an ordinance forever.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' In the first month, on the fourteenth day of the month at evening, you shall eat unleavened bread [and continue] until the twenty-first day of the month at evening.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Seven days no leaven [symbolic of corruption] shall be found in your houses; whoever eats what is leavened shall be excluded from the congregation of Israel, whether a stranger or native-born. [I Cor. 5:6-8.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' This month shall be to you the beginning of months, the first month of the year to you.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' You shall eat nothing leavened; in all your dwellings you shall eat unleavened bread [during that week].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Then Moses called for all the elders of Israel, and said to them, Go forth, select and take a lamb according to your families and kill the Passover [lamb].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And you shall take a bunch of hyssop, dip it in the blood in the basin, and touch the lintel above the door and the two side posts with the blood; and none of you shall go out of his house until morning.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' For the Lord will pass through to slay the Egyptians; and when He sees the blood upon the lintel and the two side posts, the Lord will pass over the door and will not allow the destroyer to come into your houses to slay you.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' You shall observe this rite for an ordinance to you and to your sons forever.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' When you come to the land which the Lord will give you, as He has promised, you shall keep this service.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' When your children shall say to you, What do you mean by this service?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' You shall say, It is the sacrifice of the Lord''s Passover, for He passed over the houses of the Israelites in Egypt when He slew the Egyptians but spared our houses. And the people bowed their heads and worshiped.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' The Israelites went and, as the Lord had commanded Moses and Aaron, so they did.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' At midnight the Lord slew every firstborn in the land of Egypt, from the firstborn of Pharaoh who sat on his throne to the firstborn of the prisoner in the dungeon, and all the firstborn of the livestock.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Tell all the congregation of Israel, On the tenth day of this month they shall take every man a lamb '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' kid, according to [the size of] the family of which he is the father, a lamb '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' kid for each house.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Pharaoh rose up in the night, he, all his servants, and all the Egyptians; and there was a great cry in Egypt, for there was not a house where there was not one dead.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' He called for Moses and Aaron by night, and said, Rise up, get out from among my people, both you and the Israelites; and go, serve the Lord, as you said.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Also take your flocks and your herds, as you have said, and be gone! And [ask your God to] bless me also.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' The Egyptians were urgent with the people to depart, that they might send them out of the land in haste; for they said, We are all dead men.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' The people took their dough before it was leavened, their kneading bowls being bound up in their clothes on their shoulders.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' The Israelites did according to the word of Moses; and they [urgently] asked of the Egyptians jewels of silver and of gold, and clothing.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' The Lord gave the people favor in the sight of the Egyptians, so that they gave them what they asked. And they stripped the Egyptians [of those things].'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' The Israelites journeyed from Rameses to Succoth, about 600,000 men on foot, besides women and children.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' And a mixed multitude went also with them, and very much livestock, both flocks and herds.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' They baked unleavened cakes of the dough which they brought from Egypt; it was not leavened because they were driven from Egypt and could not delay, nor had they prepared for themselves any food.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And if the household is too small to consume the lamb, let him and his next door neighbor take it according to the number of persons, every man according to what each can eat shall make your count for the lamb.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' Now the time the Israelites dwelt in Egypt was 430 years. [Gen. 15:13, 14.]'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' At the end of the 430 years, even that very day, all the hosts of the Lord went out of Egypt.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' It was a night of watching unto the Lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to be much observed for bringing them out of Egypt; this same night of watching unto the Lord is to be observed by all the Israelites throughout their generations.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' The Lord said to Moses and Aaron, This is the ordinance of the Passover: No foreigner shall eat of it;'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' But every man''s servant who is bought for money, when you have circumcised him, then may he eat of it.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' A foreigner or hired servant shall not eat of it.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' In one house shall it be eaten [by one company]; you shall not carry any of the flesh outside the house; neither shall you break a bone of it. [John 19:33, 36.]'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' All the congregation of Israel shall keep it.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' When a stranger sojourning with you wishes to keep the Passover to the Lord, let all his males be circumcised, and then let him come near and keep it; and he shall be as one that is born in the land. But no uncircumcised person shall eat of it.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' There shall be one law for the native-born and for the stranger or foreigner who sojourns among you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Your lamb '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' kid shall be without blemish, a male of the first year; you shall take it from the sheep or the goats. [I Pet. 1:19, 20.]'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' Thus did all the Israelites; as the Lord commanded Moses and Aaron, so did they.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' And on that very day the Lord brought the Israelites out of the land of Egypt by their hosts.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And you shall keep it until the fourteenth day of the same month; and the whole assembly of the congregation of Israel shall [each] kill [his] lamb in the evening.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' They shall take of the blood and put it on the two side posts and on the lintel [above the door space] of the houses in which they shall eat [the Passover lamb]. [Matt. 26:28; John 1:29; Heb. 9:14.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' They shall eat the flesh that night roasted; with unleavened bread and bitter herbs they shall eat it.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Eat not of it raw nor boiled at all with water, but roasted–its head, its legs, and its inner parts.'
