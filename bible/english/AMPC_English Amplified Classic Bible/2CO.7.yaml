document_id: 2CO.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THEREFORE, SINCE these [great] promises are ours, beloved, let us cleanse ourselves from everything that contaminates '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defiles body and spirit, and bring [our] consecration to completeness in the [reverential] fear of God.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For godly grief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the pain God is permitted to direct, produce a repentance that leads '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contributes to salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliverance from evil, and it never brings regret; but worldly grief (the hopeless sorrow that is characteristic of the pagan world) is deadly [breeding and ending in death].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For [you can look back now and] observe what this same godly sorrow has done for you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has produced in you: what eagerness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' earnest care to explain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clear yourselves [of all complicity in the condoning of incest], what indignation [at the sin], what alarm, what yearning, what zeal [to do justice to all concerned], what readiness to mete out punishment [to the offender]! At every point you have proved yourselves cleared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guiltless in the matter. [I Cor. 5.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So although I did write to you [as I did], it was not for the sake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' because of the one who did [the] wrong, nor on account of the one who suffered [the] wrong, but in order that you might realize before God [that your readiness to accept our authority revealed] how zealously you do care for us.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore we are relieved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comforted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouraged [at the result]. And in addition to our own [personal] consolation, we were especially delighted at the joy of Titus, because you have all set his mind at rest, soothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refreshing his spirit.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For if I had boasted to him at all concerning you, I was not disappointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' put to shame, but just as everything we ever said to you was true, so our boasting [about you] to Titus has proved true also.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And his heart goes out to you more abundantly than ever as he recalls the submission [to his guidance] that all of you had, and the reverence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anxiety [to meet all requirements] with which you accepted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomed him.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I am very happy because I now am of good courage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have perfect confidence in you in all things.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do open your hearts to us again [enlarge them to take us in]. We have wronged no one, we have betrayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' corrupted no one, we have cheated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' taken advantage of no one.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I do not say this to reproach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' condemn [you], for I have said before that you are [nested] in our hearts, [and you will remain there] together [with us], whether we die or live.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have great boldness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' free '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fearless confidence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cheerful courage toward you; my pride in you is great. I am filled [brimful] with the comfort [of it]; with all our tribulation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in spite of it, [I am filled with comfort] I am overflowing with joy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For even when we arrived in Macedonia, our bodies had no ease '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' rest, but we were oppressed in every way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afflicted at every turn–fighting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contentions without, dread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fears within [us].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But God, Who comforts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourages '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refreshes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cheers the depressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the sinking, comforted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouraged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refreshed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cheered us by the arrival of Titus.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Yes] and not only by his coming but also by [his account of] the comfort with which he was encouraged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refreshed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cheered as to you, while he told us of your yearning affection, of how sorry you were [for me] and how eagerly you took my part, so that I rejoiced still more.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For even though I did grieve you with my letter, I do not regret [it now], though I did regret it; for I see that that letter did pain you, though only for a little while;'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet I am glad now, not because you were pained, but because you were pained into repentance [and so turned back to God]; for you felt a grief such as God meant you to feel, so that in nothing you might suffer loss through us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' harm for what we did.'
