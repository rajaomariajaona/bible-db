document_id: EXO.40,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND THE Lord said to Moses,'
  '10':
  - type: text
    content: ' You shall anoint the altar of burnt offering and all its utensils; and consecrate (set apart for God) the altar, and the altar shall be most holy.'
  '11':
  - type: text
    content: ' And you shall anoint the laver and its base and consecrate it.'
  '12':
  - type: text
    content: ' You shall bring Aaron and his sons to the door of the Tent of Meeting and wash them with water. [John 17:17-19.]'
  '13':
  - type: text
    content: ' You shall put on Aaron the holy garments, and anoint and consecrate him, so he may serve Me as priest.'
  '14':
  - type: text
    content: ' And you shall bring his sons and put long '
  - type: text
    content: and
  - type: text
    content: ' sleeved tunics on them,'
  '15':
  - type: text
    content: ' And you shall anoint them as you anointed their father, that they may minister to Me as priests; for their anointing shall be to them for an everlasting priesthood throughout their generations.'
  '16':
  - type: text
    content: ' Thus did Moses; according to all that the Lord commanded him, so he did.'
  '17':
  - type: text
    content: ' And on the first day of the first month in the second year the tabernacle was erected.'
  '18':
  - type: text
    content: ' Moses set up the tabernacle, laid its sockets, set up its boards, put in its bars, and erected its pillars.'
  '19':
  - type: text
    content: ' [Moses] spread the tent over the tabernacle and put the covering of the tent over it, as the Lord had commanded him.'
  '2':
  - type: text
    content: ' On the first day of the first month you shall set up the tabernacle of the Tent of Meeting [of God with you].'
  '20':
  - type: text
    content: ' He took the Testimony [the Ten Commandments] and put it into the ark, and set the poles [in the rings] on the ark, and put the mercy seat on top of the ark.'
  '21':
  - type: text
    content: ' [Moses] brought the ark into the tabernacle and set up the veil of the screen and screened the ark of the Testimony, as the Lord had commanded him.'
  '22':
  - type: text
    content: ' Moses put the table [of showbread] in the Tent of Meeting on the north side of the tabernacle outside the veil;'
  '23':
  - type: text
    content: ' He set the bread [of the Presence] in order on it before the Lord, as the Lord had commanded him. [John 6:32-35.]'
  '24':
  - type: text
    content: ' And he put the lampstand in the Tent of Meeting opposite the table on the south side of the tabernacle.'
  '25':
  - type: text
    content: ' Moses set up '
  - type: text
    content: and
  - type: text
    content: ' lighted the lamps before the Lord, as the Lord commanded him.'
  '26':
  - type: text
    content: ' He put the golden altar [of incense] in the Tent of Meeting before the veil;'
  '27':
  - type: text
    content: ' He burned sweet incense [symbol of prayer] upon it, as the Lord commanded him. [Ps. 141:2; Rev. 8:3.]'
  '28':
  - type: text
    content: ' And he set up the hanging '
  - type: text
    content: or
  - type: text
    content: ' screen at the door of the tabernacle.'
  '29':
  - type: text
    content: ' [Moses] put the altar of burnt offering at the door of the tabernacle of the Tent of Meeting and offered on it the burnt offering and the cereal offering, as the Lord commanded him.'
  '3':
  - type: text
    content: ' And you shall put in it the ark of the Testimony and screen the ark [of God''s Presence] with the veil. [Heb. 10:19-23.]'
  '30':
  - type: text
    content: ' And Moses set the laver between the Tent of Meeting and the altar and put water in it for washing.'
  '31':
  - type: text
    content: ' And Moses and Aaron and his sons washed their hands and their feet there.'
  '32':
  - type: text
    content: ' When they went into the Tent of Meeting or came near the altar, they washed, as the Lord commanded Moses.'
  '33':
  - type: text
    content: ' And he erected the court round about the tabernacle and the altar and set up the hanging '
  - type: text
    content: or
  - type: text
    content: ' screen at the court gate. So Moses finished the work.'
  '34':
  - type: text
    content: ' Then the cloud [the Shekinah, God''s visible presence] covered the Tent of Meeting, and the glory of the Lord filled the tabernacle! [Rev. 15:8.]'
  '35':
  - type: text
    content: ' And Moses was not able to enter the Tent of Meeting because the cloud remained upon it, and the glory of the Lord filled the tabernacle.'
  '36':
  - type: text
    content: ' In all their journeys, whenever the cloud was taken up from over the tabernacle, the Israelites went onward;'
  '37':
  - type: text
    content: ' But if the cloud was not taken up, they did not journey on till the day that it was taken up.'
  '38':
  - type: text
    content: ' For throughout all their journeys the cloud of the Lord was upon the tabernacle by day, and fire was in it by night, in the sight of all the house of Israel.'
  '4':
  - type: text
    content: ' You shall bring in the [showbread] table and set in order the things that are to be upon it; and you shall bring in the lampstand and set up '
  - type: text
    content: and
  - type: text
    content: ' light its lamps. [Rev. 21:23-25.]'
  '5':
  - type: text
    content: ' You shall set the golden altar for the incense before the ark of the Testimony [outside the veil] and put the hanging '
  - type: text
    content: or
  - type: text
    content: ' screen at the tabernacle door.'
  '6':
  - type: text
    content: ' You shall set the altar of the burnt offering before the door of the tabernacle of the Tent of Meeting.'
  '7':
  - type: text
    content: ' And you shall set the laver between the Tent of Meeting and the altar and put water in it.'
  '8':
  - type: text
    content: ' And you shall set up the court [curtains] round about and hang up the hanging '
  - type: text
    content: or
  - type: text
    content: ' screen at the court gate.'
  '9':
  - type: text
    content: ' You shall take the anointing oil and anoint the tabernacle and all that is in it, and shall consecrate it and all its furniture, and it shall be holy.'
