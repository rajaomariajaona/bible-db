document_id: EXO.40
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' On the first day of the first month you shall set up the tabernacle of the Tent of Meeting [of God with you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And you shall put in it the ark of the Testimony and screen the ark [of God''s Presence] with the veil. [Heb. 10:19-23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' You shall bring in the [showbread] table and set in order the things that are to be upon it; and you shall bring in the lampstand and set up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' light its lamps. [Rev. 21:23-25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You shall set the golden altar for the incense before the ark of the Testimony [outside the veil] and put the hanging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' screen at the tabernacle door.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You shall set the altar of the burnt offering before the door of the tabernacle of the Tent of Meeting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And you shall set the laver between the Tent of Meeting and the altar and put water in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And you shall set up the court [curtains] round about and hang up the hanging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' screen at the court gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' You shall take the anointing oil and anoint the tabernacle and all that is in it, and shall consecrate it and all its furniture, and it shall be holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You shall anoint the altar of burnt offering and all its utensils; and consecrate (set apart for God) the altar, and the altar shall be most holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And you shall anoint the laver and its base and consecrate it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' You shall bring Aaron and his sons to the door of the Tent of Meeting and wash them with water. [John 17:17-19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You shall put on Aaron the holy garments, and anoint and consecrate him, so he may serve Me as priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And you shall bring his sons and put long '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sleeved tunics on them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And you shall anoint them as you anointed their father, that they may minister to Me as priests; for their anointing shall be to them for an everlasting priesthood throughout their generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Thus did Moses; according to all that the Lord commanded him, so he did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And on the first day of the first month in the second year the tabernacle was erected.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Moses set up the tabernacle, laid its sockets, set up its boards, put in its bars, and erected its pillars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [Moses] spread the tent over the tabernacle and put the covering of the tent over it, as the Lord had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He took the Testimony [the Ten Commandments] and put it into the ark, and set the poles [in the rings] on the ark, and put the mercy seat on top of the ark.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' [Moses] brought the ark into the tabernacle and set up the veil of the screen and screened the ark of the Testimony, as the Lord had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Moses put the table [of showbread] in the Tent of Meeting on the north side of the tabernacle outside the veil;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He set the bread [of the Presence] in order on it before the Lord, as the Lord had commanded him. [John 6:32-35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And he put the lampstand in the Tent of Meeting opposite the table on the south side of the tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Moses set up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lighted the lamps before the Lord, as the Lord commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' He put the golden altar [of incense] in the Tent of Meeting before the veil;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' He burned sweet incense [symbol of prayer] upon it, as the Lord commanded him. [Ps. 141:2; Rev. 8:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And he set up the hanging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' screen at the door of the tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' [Moses] put the altar of burnt offering at the door of the tabernacle of the Tent of Meeting and offered on it the burnt offering and the cereal offering, as the Lord commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And Moses set the laver between the Tent of Meeting and the altar and put water in it for washing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And Moses and Aaron and his sons washed their hands and their feet there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' When they went into the Tent of Meeting or came near the altar, they washed, as the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And he erected the court round about the tabernacle and the altar and set up the hanging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' screen at the court gate. So Moses finished the work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Then the cloud [the Shekinah, God''s visible presence] covered the Tent of Meeting, and the glory of the Lord filled the tabernacle! [Rev. 15:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And Moses was not able to enter the Tent of Meeting because the cloud remained upon it, and the glory of the Lord filled the tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' In all their journeys, whenever the cloud was taken up from over the tabernacle, the Israelites went onward;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' But if the cloud was not taken up, they did not journey on till the day that it was taken up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' For throughout all their journeys the cloud of the Lord was upon the tabernacle by day, and fire was in it by night, in the sight of all the house of Israel.'
