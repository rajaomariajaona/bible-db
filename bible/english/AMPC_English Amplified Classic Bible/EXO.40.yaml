document_id: EXO.40,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AND THE Lord said to Moses,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall anoint the altar of burnt offering and all its utensils; and consecrate (set apart for God) the altar, and the altar shall be most holy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall anoint the laver and its base and consecrate it.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall bring Aaron and his sons to the door of the Tent of Meeting and wash them with water. [John 17:17-19.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall put on Aaron the holy garments, and anoint and consecrate him, so he may serve Me as priest.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall bring his sons and put long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sleeved tunics on them,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall anoint them as you anointed their father, that they may minister to Me as priests; for their anointing shall be to them for an everlasting priesthood throughout their generations.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Thus did Moses; according to all that the Lord commanded him, so he did.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And on the first day of the first month in the second year the tabernacle was erected.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses set up the tabernacle, laid its sockets, set up its boards, put in its bars, and erected its pillars.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Moses] spread the tent over the tabernacle and put the covering of the tent over it, as the Lord had commanded him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' On the first day of the first month you shall set up the tabernacle of the Tent of Meeting [of God with you].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He took the Testimony [the Ten Commandments] and put it into the ark, and set the poles [in the rings] on the ark, and put the mercy seat on top of the ark.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Moses] brought the ark into the tabernacle and set up the veil of the screen and screened the ark of the Testimony, as the Lord had commanded him.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses put the table [of showbread] in the Tent of Meeting on the north side of the tabernacle outside the veil;'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He set the bread [of the Presence] in order on it before the Lord, as the Lord had commanded him. [John 6:32-35.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he put the lampstand in the Tent of Meeting opposite the table on the south side of the tabernacle.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses set up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lighted the lamps before the Lord, as the Lord commanded him.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He put the golden altar [of incense] in the Tent of Meeting before the veil;'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He burned sweet incense [symbol of prayer] upon it, as the Lord commanded him. [Ps. 141:2; Rev. 8:3.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he set up the hanging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' screen at the door of the tabernacle.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Moses] put the altar of burnt offering at the door of the tabernacle of the Tent of Meeting and offered on it the burnt offering and the cereal offering, as the Lord commanded him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall put in it the ark of the Testimony and screen the ark [of God''s Presence] with the veil. [Heb. 10:19-23.]'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses set the laver between the Tent of Meeting and the altar and put water in it for washing.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses and Aaron and his sons washed their hands and their feet there.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When they went into the Tent of Meeting or came near the altar, they washed, as the Lord commanded Moses.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he erected the court round about the tabernacle and the altar and set up the hanging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' screen at the court gate. So Moses finished the work.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the cloud [the Shekinah, God''s visible presence] covered the Tent of Meeting, and the glory of the Lord filled the tabernacle! [Rev. 15:8.]'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Moses was not able to enter the Tent of Meeting because the cloud remained upon it, and the glory of the Lord filled the tabernacle.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In all their journeys, whenever the cloud was taken up from over the tabernacle, the Israelites went onward;'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if the cloud was not taken up, they did not journey on till the day that it was taken up.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For throughout all their journeys the cloud of the Lord was upon the tabernacle by day, and fire was in it by night, in the sight of all the house of Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall bring in the [showbread] table and set in order the things that are to be upon it; and you shall bring in the lampstand and set up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' light its lamps. [Rev. 21:23-25.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall set the golden altar for the incense before the ark of the Testimony [outside the veil] and put the hanging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' screen at the tabernacle door.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall set the altar of the burnt offering before the door of the tabernacle of the Tent of Meeting.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall set the laver between the Tent of Meeting and the altar and put water in it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall set up the court [curtains] round about and hang up the hanging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' screen at the court gate.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall take the anointing oil and anoint the tabernacle and all that is in it, and shall consecrate it and all its furniture, and it shall be holy.'
