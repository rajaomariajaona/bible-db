document_id: REV.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' AFTER THIS I looked, and behold, a door standing open in heaven! And the first voice which I had heard addressing me like [the calling of] a war trumpet said, Come up here, and I will show you what must take place in the future.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The twenty-four elders (the members of the heavenly Sanhedrin) fall prostrate before Him Who is sitting on the throne, and they worship Him Who lives forever and ever; and they throw down their crowns before the throne, crying out,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Worthy are You, our Lord and God, to receive the glory and the honor and dominion, for You created all things; by Your will they were [brought into being] and were created. [Ps. 19:1.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At once I came under the [Holy] Spirit''s power, and behold, a throne stood in heaven, with One seated on the throne! [Ezek. 1:26.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He Who sat there appeared like [the crystalline brightness of] jasper and [the fiery] sardius, and encircling the throne there was a halo that looked like [a rainbow of] emerald. [Ezek. 1:28.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Twenty-four other thrones surrounded the throne, and seated on these thrones were twenty-four elders (the members of the heavenly Sanhedrin), arrayed in white clothing, with crowns of gold upon their heads.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Out from the throne came flashes of lightning and rumblings and peals of thunder, and in front of the throne seven blazing torches burned, which are the seven Spirits of God [the sevenfold Holy Spirit];'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And in front of the throne there was also what looked like a transparent glassy sea, as if of crystal. And around the throne, in the center at each side of the throne, were four living creatures (beings) who were full of eyes in front and behind [with intelligence as to what is before and at the rear of them]. [Ezek. 1:5, 18.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The first living creature (being) was like a lion, the second living creature like an ox, the third living creature had the face of a man, and the fourth living creature [was] like a flying eagle. [Ezek. 1:10.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the four living creatures, individually having six wings, were full of eyes all over and within [underneath their wings]; and day and night they never stop saying, Holy, holy, holy is the Lord God Almighty (Omnipotent), Who was and Who is and Who is to come. [Isa. 6:1-3.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And whenever the living creatures offer glory and honor and thanksgiving to Him Who sits on the throne, Who lives forever and ever (through the eternities of the eternities), [Ps. 47:8.]'
