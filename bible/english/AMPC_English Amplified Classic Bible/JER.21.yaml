document_id: JER.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD which came to Jeremiah from the Lord when King Zedekiah sent to him Pashhur son of Malchiah, and Zephaniah the priest, the son of Maaseiah, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Inquire, I pray you, of the Lord for us, for Nebuchadrezzar king of Babylon is making war against us. Perhaps the Lord will deal with us according to all His wonderful works, forcing him to withdraw from us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then said Jeremiah to them, Say this to Zedekiah:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Thus says the Lord, the God of Israel: Behold, I will turn back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dull the edge of the weapons of war that are in your hands, with which you fight against the king of Babylon and the Chaldeans who are besieging you outside the walls; and I will bring them into the midst of this city [Jerusalem].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And I Myself will fight against you with an outstretched hand and with a strong arm in anger, in fury, and in great indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And I will smite the inhabitants of this city, both man and beast; they will die of a great pestilence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And afterward, says the Lord, I will deliver Zedekiah king of Judah and his servants and the people in this city who survive the pestilence, the sword, and the famine, into the hand of Nebuchadrezzar king of Babylon and into the hands of their enemies, into the hands of those who seek their lives. And he will smite them with the edge of the sword; he will not spare them nor have pity or mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassion upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And to this people you [Jeremiah] shall say, Thus says the Lord: Behold, I set before you the way of life and the way of death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He who remains in this city [Jerusalem] shall die by the sword and by famine and by pestilence. But he who goes out and passes over to the Chaldeans who besiege you, he shall live, and his life shall be to him his only booty [as a prize of war].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For I have set My face against this city for evil and not for good, says the Lord. It shall be given into the hand of the king of Babylon, and he shall burn it with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And concerning the royal house of the king of Judah, hear the word of the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' O house of David, thus says the Lord: Execute justice in the morning, and deliver from the hand of the oppressor him who has been robbed, lest My wrath go forth like fire and burn so that none can quench it–because of the evil of your doings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Behold, I am against you, O inhabitant of the valley, O rock of the plain, says the Lord–you who say, Who shall come down against us? Or, Who shall enter into our dwelling places?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And I will punish you according to the fruit of your doings, says the Lord. I will kindle a fire in your forest, and it will devour all that is round about you.'
