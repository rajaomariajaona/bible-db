document_id: PSA.7,8
type_code: eng
verses:
  '1':
  - type: heading
    content: An Ode of David, +[probably+] in a wild, irregular, enthusiastic strain, which he sang to the Lord concerning the words of Cush, a Benjamite.
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, in You I take refuge '
  - type: text
    content: and
  - type: text
    content: ' put my trust; save me from all those who pursue '
  - type: text
    content: and
  - type: text
    content: ' persecute me, and deliver me,'
  '10':
  - type: text
    content: ' My defense '
  - type: text
    content: and
  - type: text
    content: ' shield depend on God, Who saves the upright in heart.'
  '11':
  - type: text
    content: ' God is a righteous Judge, yes, a God Who is indignant every day.'
  '12':
  - type: text
    content: ' If a man does not turn '
  - type: text
    content: and
  - type: text
    content: ' repent, [God] will whet His sword; He has strung '
  - type: text
    content: and
  - type: text
    content: ' bent His [huge] bow and made it ready [by treading it with His foot].'
  '13':
  - type: text
    content: ' He has also prepared for him deadly weapons; He makes His arrows fiery shafts.'
  '14':
  - type: text
    content: ' Behold, [the wicked man] conceives iniquity and is pregnant with mischief and gives birth to lies.'
  '15':
  - type: text
    content: ' He made a pit and hollowed it out and has fallen into the hole which he made [before the trap was completed].'
  '16':
  - type: text
    content: ' His mischief shall fall back in return upon his own head, and his violence come down [with the loose dirt] upon his own scalp.'
  '17':
  - type: text
    content: ' I will give to the Lord the thanks due to His rightness '
  - type: text
    content: and
  - type: text
    content: ' justice, and I will sing praise to the name of the Lord Most High.'
  '2':
  - type: text
    content: ' Lest my foe tear my life [from my body] like a lion, dragging '
  - type: text
    content: me
  - type: text
    content: ' away while there is none to deliver.'
  '3':
  - type: text
    content: ' O Lord my God, if I have done this, if there is wrong in my hands,'
  '4':
  - type: text
    content: ' If I have paid back with evil him who was at peace with me or without cause have robbed him who was my enemy,'
  '5':
  - type: text
    content: ' Let the enemy pursue my life and take it; yes, let him trample my life to the ground and lay my honor in the dust. Selah [pause, and calmly think of that]!'
  '6':
  - type: text
    content: ' Arise, O Lord, in Your anger; lift up Yourself against the rage of my enemies; and awake [and stir up] for me the justice '
  - type: text
    content: and
  - type: text
    content: ' vindication [that] You have commanded.'
  '7':
  - type: text
    content: ' Let the assembly of the peoples be gathered about You, and return on high over them.'
  '8':
  - type: text
    content: ' The Lord judges the people; judge me, O Lord, '
  - type: text
    content: and
  - type: text
    content: ' do me justice according to my righteousness [my rightness, justice, and right standing with You] and according to the integrity that is in me.'
  '9':
  - type: text
    content: ' Oh, let the wickedness of the wicked come to an end, but establish the [uncompromisingly] righteous [those upright and in harmony with You]; for You, Who try the hearts and emotions '
  - type: text
    content: and
  - type: text
    content: ' thinking powers, are a righteous God. [Rev. 2:23.]'
