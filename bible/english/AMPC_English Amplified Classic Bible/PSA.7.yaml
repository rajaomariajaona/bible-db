document_id: PSA.7,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An Ode of David, +[probably+] in a wild, irregular, enthusiastic strain, which he sang to the Lord concerning the words of Cush, a Benjamite.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, in You I take refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put my trust; save me from all those who pursue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persecute me, and deliver me,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' My defense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shield depend on God, Who saves the upright in heart.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' God is a righteous Judge, yes, a God Who is indignant every day.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' If a man does not turn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' repent, [God] will whet His sword; He has strung '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bent His [huge] bow and made it ready [by treading it with His foot].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He has also prepared for him deadly weapons; He makes His arrows fiery shafts.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Behold, [the wicked man] conceives iniquity and is pregnant with mischief and gives birth to lies.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He made a pit and hollowed it out and has fallen into the hole which he made [before the trap was completed].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' His mischief shall fall back in return upon his own head, and his violence come down [with the loose dirt] upon his own scalp.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' I will give to the Lord the thanks due to His rightness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice, and I will sing praise to the name of the Lord Most High.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Lest my foe tear my life [from my body] like a lion, dragging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' away while there is none to deliver.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' O Lord my God, if I have done this, if there is wrong in my hands,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' If I have paid back with evil him who was at peace with me or without cause have robbed him who was my enemy,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Let the enemy pursue my life and take it; yes, let him trample my life to the ground and lay my honor in the dust. Selah [pause, and calmly think of that]!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Arise, O Lord, in Your anger; lift up Yourself against the rage of my enemies; and awake [and stir up] for me the justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindication [that] You have commanded.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Let the assembly of the peoples be gathered about You, and return on high over them.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' The Lord judges the people; judge me, O Lord, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do me justice according to my righteousness [my rightness, justice, and right standing with You] and according to the integrity that is in me.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Oh, let the wickedness of the wicked come to an end, but establish the [uncompromisingly] righteous [those upright and in harmony with You]; for You, Who try the hearts and emotions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thinking powers, are a righteous God. [Rev. 2:23.]'
