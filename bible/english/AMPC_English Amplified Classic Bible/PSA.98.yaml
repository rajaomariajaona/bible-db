document_id: PSA.98,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm.
  - type: text
    content: ' O SING to the Lord a new song, for He has done marvelous things; His right hand and His holy arm have wrought salvation for Him.'
  '2':
  - type: text
    content: ' The Lord has made known His salvation; His righteousness has He openly shown in the sight of the nations. [Luke 2:30, 31.]'
  '3':
  - type: text
    content: ' He has [earnestly] remembered His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, His truth '
  - type: text
    content: and
  - type: text
    content: ' His faithfulness toward the house of Israel; all the ends of the earth have witnessed the salvation of our God. [Acts 13:47; 28:28.]'
  '4':
  - type: text
    content: ' Make a joyful noise to the Lord, all the earth; break forth and sing for joy, yes, sing praises!'
  '5':
  - type: text
    content: ' Sing praises to the Lord with the lyre, with the lyre and the voice of melody.'
  '6':
  - type: text
    content: ' With trumpets and the sound of the horn make a joyful noise before the King, the Lord!'
  '7':
  - type: text
    content: ' Let the sea roar, and all that fills it, the world, and those who dwell in it!'
  '8':
  - type: text
    content: ' Let the rivers clap their hands; together let the hills sing for joy'
  '9':
  - type: text
    content: ' Before the Lord, for He is coming to judge [and rule] the earth; with righteousness will He judge [and rule] the world, and the peoples with equity.'
