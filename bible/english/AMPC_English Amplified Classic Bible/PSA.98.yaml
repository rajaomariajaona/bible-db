document_id: PSA.98
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Psalm.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O SING to the Lord a new song, for He has done marvelous things; His right hand and His holy arm have wrought salvation for Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord has made known His salvation; His righteousness has He openly shown in the sight of the nations. [Luke 2:30, 31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' He has [earnestly] remembered His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, His truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His faithfulness toward the house of Israel; all the ends of the earth have witnessed the salvation of our God. [Acts 13:47; 28:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Make a joyful noise to the Lord, all the earth; break forth and sing for joy, yes, sing praises!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Sing praises to the Lord with the lyre, with the lyre and the voice of melody.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' With trumpets and the sound of the horn make a joyful noise before the King, the Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Let the sea roar, and all that fills it, the world, and those who dwell in it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Let the rivers clap their hands; together let the hills sing for joy'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Before the Lord, for He is coming to judge [and rule] the earth; with righteousness will He judge [and rule] the world, and the peoples with equity.'
