document_id: NUM.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses and Aaron,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Israelites shall encamp, each by his own [tribal] standard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' banner with the ensign of his father''s house, opposite the Tent of Meeting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' facing it on every side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' On the east side toward the sunrise shall they of the standard of the camp of Judah encamp by their companies; Nahshon son of Amminadab being the leader of the sons of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Judah''s host as numbered totaled 74,600.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Next to Judah the tribe of Issachar shall encamp, Nethanel son of Zuar being the leader of the sons of Issachar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Issachar''s host as numbered totaled 54,400.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then the tribe of Zebulun, Eliab son of Helon being the leader of the sons of Zebulun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Zebulun''s host as numbered totaled 57,400.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' All these [three tribes] numbered in the camp of Judah totaled 186,400. They shall set forth first [on the march].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' On the south side shall be the standard of the camp of Reuben by their companies, the leader of the sons of Reuben being Elizur son of Shedeur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Reuben''s host as numbered totaled 46,500.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Those who encamp next to Reuben shall be the tribe of Simeon, the leader of the sons of Simeon being Shelumiel son of Zurishaddai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Simeon''s host as numbered totaled 59,300.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then the tribe of Gad, the leader of the sons of Gad being Eliasaph son of Reuel (Deuel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Gad''s host as numbered totaled 45,650.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The whole number in [the three tribes of] the camp of Reuben was 151,450. They shall take second place [on the march].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then the Tent of Meeting shall set out, with the camp of the Levites in the midst of the camps; as they encamp so shall they set forward, every man in his place, standard after standard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' On the west side shall be the standard of the camp of Ephraim by their companies, the leader of the sons of Ephraim being Elishama son of Ammihud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Ephraim''s host as numbered totaled 40,500.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Beside Ephraim shall be the tribe of Manasseh, the leader of the sons of Manasseh being Gamaliel son of Pedahzur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Manasseh''s host as numbered totaled 32,200.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then the tribe of Benjamin, the leader of the sons of Benjamin being Abidan son of Gideoni.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Benjamin''s host as numbered totaled 35,400.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The whole number [of the three tribes] in the camp of Ephraim totaled 108,100. They shall go forward in third place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The standard of the camp of Dan shall be on the north side [of the tabernacle] by their companies, the leader of the sons of Dan being Ahiezer son of Ammishaddai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Dan''s host as numbered totaled 62,700.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Encamped next to Dan shall be the tribe of Asher, the leader of the sons of Asher being Pagiel son of Ochran.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Asher''s host as numbered totaled 41,500.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then the tribe of Naphtali, the leader of the sons of Naphtali being Ahira son of Enan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Naphtali''s host as numbered totaled 53,400.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The whole number [of the three tribes] in the camp of Dan totaled 157,600. They shall set out last, standard after standard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' These are the Israelites as numbered by their fathers'' houses. All in the camps who were numbered by their companies were 603,550.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' But the Levites were not numbered with the Israelites, for so the Lord commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Thus the Israelites did according to all the Lord commanded Moses; so they encamped by their standards, and so they set forward, everyone with his [tribal] families, according to his father''s house.'
