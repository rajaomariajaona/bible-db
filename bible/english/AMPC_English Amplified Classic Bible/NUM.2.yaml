document_id: NUM.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron,'
  '10':
  - type: text
    content: ' On the south side shall be the standard of the camp of Reuben by their companies, the leader of the sons of Reuben being Elizur son of Shedeur.'
  '11':
  - type: text
    content: ' Reuben''s host as numbered totaled 46,500.'
  '12':
  - type: text
    content: ' Those who encamp next to Reuben shall be the tribe of Simeon, the leader of the sons of Simeon being Shelumiel son of Zurishaddai.'
  '13':
  - type: text
    content: ' Simeon''s host as numbered totaled 59,300.'
  '14':
  - type: text
    content: ' Then the tribe of Gad, the leader of the sons of Gad being Eliasaph son of Reuel (Deuel).'
  '15':
  - type: text
    content: ' Gad''s host as numbered totaled 45,650.'
  '16':
  - type: text
    content: ' The whole number in [the three tribes of] the camp of Reuben was 151,450. They shall take second place [on the march].'
  '17':
  - type: text
    content: ' Then the Tent of Meeting shall set out, with the camp of the Levites in the midst of the camps; as they encamp so shall they set forward, every man in his place, standard after standard.'
  '18':
  - type: text
    content: ' On the west side shall be the standard of the camp of Ephraim by their companies, the leader of the sons of Ephraim being Elishama son of Ammihud.'
  '19':
  - type: text
    content: ' Ephraim''s host as numbered totaled 40,500.'
  '2':
  - type: text
    content: ' The Israelites shall encamp, each by his own [tribal] standard '
  - type: text
    content: or
  - type: text
    content: ' banner with the ensign of his father''s house, opposite the Tent of Meeting '
  - type: text
    content: and
  - type: text
    content: ' facing it on every side.'
  '20':
  - type: text
    content: ' Beside Ephraim shall be the tribe of Manasseh, the leader of the sons of Manasseh being Gamaliel son of Pedahzur.'
  '21':
  - type: text
    content: ' Manasseh''s host as numbered totaled 32,200.'
  '22':
  - type: text
    content: ' Then the tribe of Benjamin, the leader of the sons of Benjamin being Abidan son of Gideoni.'
  '23':
  - type: text
    content: ' Benjamin''s host as numbered totaled 35,400.'
  '24':
  - type: text
    content: ' The whole number [of the three tribes] in the camp of Ephraim totaled 108,100. They shall go forward in third place.'
  '25':
  - type: text
    content: ' The standard of the camp of Dan shall be on the north side [of the tabernacle] by their companies, the leader of the sons of Dan being Ahiezer son of Ammishaddai.'
  '26':
  - type: text
    content: ' Dan''s host as numbered totaled 62,700.'
  '27':
  - type: text
    content: ' Encamped next to Dan shall be the tribe of Asher, the leader of the sons of Asher being Pagiel son of Ochran.'
  '28':
  - type: text
    content: ' Asher''s host as numbered totaled 41,500.'
  '29':
  - type: text
    content: ' Then the tribe of Naphtali, the leader of the sons of Naphtali being Ahira son of Enan.'
  '3':
  - type: text
    content: ' On the east side toward the sunrise shall they of the standard of the camp of Judah encamp by their companies; Nahshon son of Amminadab being the leader of the sons of Judah.'
  '30':
  - type: text
    content: ' Naphtali''s host as numbered totaled 53,400.'
  '31':
  - type: text
    content: ' The whole number [of the three tribes] in the camp of Dan totaled 157,600. They shall set out last, standard after standard.'
  '32':
  - type: text
    content: ' These are the Israelites as numbered by their fathers'' houses. All in the camps who were numbered by their companies were 603,550.'
  '33':
  - type: text
    content: ' But the Levites were not numbered with the Israelites, for so the Lord commanded Moses.'
  '34':
  - type: text
    content: ' Thus the Israelites did according to all the Lord commanded Moses; so they encamped by their standards, and so they set forward, everyone with his [tribal] families, according to his father''s house.'
  '4':
  - type: text
    content: ' Judah''s host as numbered totaled 74,600.'
  '5':
  - type: text
    content: ' Next to Judah the tribe of Issachar shall encamp, Nethanel son of Zuar being the leader of the sons of Issachar.'
  '6':
  - type: text
    content: ' Issachar''s host as numbered totaled 54,400.'
  '7':
  - type: text
    content: ' Then the tribe of Zebulun, Eliab son of Helon being the leader of the sons of Zebulun.'
  '8':
  - type: text
    content: ' Zebulun''s host as numbered totaled 57,400.'
  '9':
  - type: text
    content: ' All these [three tribes] numbered in the camp of Judah totaled 186,400. They shall set forth first [on the march].'
