document_id: MAT.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE BOOK of the ancestry (genealogy) of Jesus Christ (the Messiah, the Anointed), the son (descendant) of David, the son (descendant) of Abraham. [Ps. 132:11; Isa. 11:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Abraham was the father of Isaac, Isaac the father of Jacob, Jacob the father of Judah and his brothers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Judah the father of Perez and Zerah, whose mother was Tamar, Perez the father of Hezron, Hezron the father of Aram,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Aram the father of Aminadab, Aminadab the father of Nahshon, Nahshon the father of Salmon,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Salmon the father of Boaz, whose mother was Rahab, Boaz the father of Obed, whose mother was Ruth, Obed the father of Jesse,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Jesse the father of King David, King David the father of Solomon, whose mother had been the wife of Uriah, [Ruth 4:18-22; I Chron. 2:13-15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Solomon the father of Rehoboam, Rehoboam the father of Abijah, Abijah the father of Asa,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Asa the father of Jehoshaphat, Jehoshaphat the father of Joram [Jehoram], Joram the father of Uzziah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Uzziah the father of Jotham, Jotham the father of Ahaz, Ahaz the father of Hezekiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Hezekiah the father of Manasseh, Manasseh the father of Amon, Amon the father of Josiah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Josiah became the father of Jeconiah [also called Coniah and Jehoiachin] and his brothers about the time of the removal (deportation) to Babylon. [II Kings 24:14; I Chron. 3:15, 16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' After the exile to Babylon, Jeconiah became the father of Shealtiel [Salathiel], Shealtiel the father of Zerubbabel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Zerubbabel the father of Abiud, Abiud the father of Eliakim, Eliakim the father of Azor,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Azor the father of Sadoc, Sadoc the father of Achim, Achim the father of Eliud,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Eliud the father of Eleazar, Eleazar the father of Matthan, Matthan the father of Jacob,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Jacob the father of Joseph, the husband of Mary, of whom was born Jesus, Who is called the Christ. (the Messiah, the Anointed)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So all the generations from Abraham to David are fourteen, from David to the Babylonian exile (deportation) fourteen generations, from the Babylonian exile to the Christ fourteen generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now the birth of Jesus Christ took place under these circumstances: When His mother Mary had been promised in marriage to Joseph, before they came together, she was found to be pregnant [through the power] of the Holy Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And her [promised] husband Joseph, being a just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upright man and not willing to expose her publicly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgrace her, decided to repudiate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dismiss (divorce) her quietly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' secretly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But as he was thinking this over, behold, an angel of the Lord appeared to him in a dream, saying, Joseph, descendant of David, do not be afraid to take Mary [as] your wife, for that which is conceived in her is of (from, out of) the Holy Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' She will bear a Son, and you shall call His name Jesus [the Greek form of the Hebrew Joshua, which means Savior], for He will save His people from their sins [that is, prevent them from failing and missing the true end and scope of life, which is God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' All this took place that it might be fulfilled which the Lord had spoken through the prophet,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Behold, the virgin shall become pregnant and give birth to a Son, and they shall call His name Emmanuel–which, when translated, means, God with us. [Isa. 7:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then Joseph, being aroused from his sleep, did as the angel of the Lord had commanded him: he took [her to his side as] his wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But he had no union with her as her husband until she had borne '
  - type: usfm
    marker: it
    children:
    - type: text
      text: her firstborn
  - type: text
    text: ' Son; and he called His name Jesus.'
