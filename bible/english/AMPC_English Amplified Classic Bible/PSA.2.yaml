document_id: PSA.2,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' WHY DO the nations assemble with commotion [uproar and confusion of voices], and why do the people imagine (meditate upon and devise) an empty scheme?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now therefore, O you kings, act wisely; be instructed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' warned, O you rulers of the earth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Serve the Lord with reverent awe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipful fear; rejoice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be in high spirits with trembling [lest you displease Him].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Kiss the Son [pay homage to Him in purity], lest He be angry and you perish in the way, for soon shall His wrath be kindled. O blessed (happy, fortunate, and to be envied) are all those who seek refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put their trust in Him!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The kings of the earth take their places; the rulers take counsel together against the Lord and His Anointed One (the Messiah, the Christ). '
    - type: usfm
      marker: it
      children:
      - type: text
        text: They say,
    - type: text
      text: ' [Acts 4:25-27.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let us break Their bands [of restraint] asunder and cast Their cords [of control] from us.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He Who sits in the heavens laughs; the Lord has them in derision [and in supreme contempt He mocks them].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He speaks to them in His deep anger and troubles (terrifies and confounds) them in His displeasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fury, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet have I anointed (installed and placed) My King [firmly] on My holy hill of Zion.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will declare the decree of the Lord: He said to Me, You are My Son; this day [I declare] I have begotten You. [Heb. 1:5; 3:5, 6; II Pet. 1:17, 18.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ask of Me, and I will give You the nations as Your inheritance, and the uttermost parts of the earth as Your possession.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall break them with a rod of iron; You shall dash them in pieces like potters'' ware. [Rev. 12:5; 19:15.]'
