document_id: PSA.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHY DO the nations assemble with commotion [uproar and confusion of voices], and why do the people imagine (meditate upon and devise) an empty scheme?'
  '10':
  - type: text
    content: ' Now therefore, O you kings, act wisely; be instructed '
  - type: text
    content: and
  - type: text
    content: ' warned, O you rulers of the earth.'
  '11':
  - type: text
    content: ' Serve the Lord with reverent awe '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear; rejoice '
  - type: text
    content: and
  - type: text
    content: ' be in high spirits with trembling [lest you displease Him].'
  '12':
  - type: text
    content: ' Kiss the Son [pay homage to Him in purity], lest He be angry and you perish in the way, for soon shall His wrath be kindled. O blessed (happy, fortunate, and to be envied) are all those who seek refuge '
  - type: text
    content: and
  - type: text
    content: ' put their trust in Him!'
  '2':
  - type: text
    content: ' The kings of the earth take their places; the rulers take counsel together against the Lord and His Anointed One (the Messiah, the Christ). '
  - type: text
    content: They say,
  - type: text
    content: ' [Acts 4:25-27.]'
  '3':
  - type: text
    content: ' Let us break Their bands [of restraint] asunder and cast Their cords [of control] from us.'
  '4':
  - type: text
    content: ' He Who sits in the heavens laughs; the Lord has them in derision [and in supreme contempt He mocks them].'
  '5':
  - type: text
    content: ' He speaks to them in His deep anger and troubles (terrifies and confounds) them in His displeasure '
  - type: text
    content: and
  - type: text
    content: ' fury, '
  - type: text
    content: saying,
  '6':
  - type: text
    content: ' Yet have I anointed (installed and placed) My King [firmly] on My holy hill of Zion.'
  '7':
  - type: text
    content: ' I will declare the decree of the Lord: He said to Me, You are My Son; this day [I declare] I have begotten You. [Heb. 1:5; 3:5, 6; II Pet. 1:17, 18.]'
  '8':
  - type: text
    content: ' Ask of Me, and I will give You the nations as Your inheritance, and the uttermost parts of the earth as Your possession.'
  '9':
  - type: text
    content: ' You shall break them with a rod of iron; You shall dash them in pieces like potters'' ware. [Rev. 12:5; 19:15.]'
