document_id: EZK.43,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AFTERWARD '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the man
    - type: text
      text: ' [an angel] brought me to the gate, the gate that faces east.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Son of man, show the temple by your description of it to the house of Israel, that they may be ashamed of their iniquities; and let them measure accurately its appearance and plan.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And if they are ashamed of all that they have done, make known to them the form of the temple and the arrangement of it–its exits and its entrances and the whole form of it–all its ordinances and all its forms and all its laws. And write it down in their sight so that they may keep the whole form of it and all the ordinances of it and do them.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' This is the law of the house [of the Lord]: The whole area round about on the top of the mountain [Mount Moriah] shall be most holy, separated, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set apart. Behold, this is the law of the house [of the Lord].'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And these are the measurements of the altar [of burnt offering] in cubits. The cubit is a royal cubit [the length of a forearm and a palm of the hand]; the bottom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' gutter shall be a cubit deep and a cubit wide, with a rim or lip round about it of a span''s breadth. And this shall be the height of the altar:'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' From the bottom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' gutter on the ground to the lower ledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' brim shall be two cubits, and the breadth one cubit; and from the lesser ledge to the greater ledge shall be four cubits, and the breadth one cubit.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the altar hearth shall be four cubits high, and from the altar hearth reaching upward there shall be four horns one cubit high.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And the altar hearth shall be square–twelve cubits long, twelve broad, square in its four sides.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And the ledge shall be fourteen cubits long and fourteen cubits broad on its four sides, and the border about it shall be half a cubit; and its bottom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' gutter shall be a cubit deep and wide, and its ascent [not steps] shall face the east. [Exod. 20:26.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And [the Lord] said to me, Son of man, thus says the Lord God: These are the regulations for the use of the altar in the day that it is erected, upon which to offer burnt offerings and to sprinkle blood against it:'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' You shall give to the priests, the Levites who are of the offspring of Zadok, who are near to Me to minister to Me, says the Lord God, a young bull for a sin offering.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And behold, the glory of the God of Israel came from the east and His voice was like the sound of many waters, and the earth shone with His glory. [Rev. 1:15; 14:2.]'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And you shall take of its blood and put it on the four horns of [the altar of burnt offering] and on the four corners of the ledge and on the rim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' border round about. Thus shall you cleanse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make atonement for [the altar].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' You shall also take the bullock of the sin offering, and it shall be burned in the appointed place of the temple, outside the sacred enclosure. [Heb. 13:11.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And on the second day you shall offer a male goat without blemish for a sin offering. Thus the altar shall be cleansed, as it was cleansed with the bullock.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' When you have finished cleansing it, you shall offer a young bull without blemish and a ram out of the flock without blemish.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And you shall bring them near before the Lord, and the priests shall cast salt upon them and they shall offer them up for a burnt offering to the Lord.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Seven days you shall prepare every day a goat for a sin offering; also a young bull and a ram out of the flock, without blemish, shall be prepared.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' For seven days shall they make atonement for the altar and purify it; so the priests shall consecrate, separate, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set it apart to receive offerings. [Exod. 29:37.]'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And when these days have been accomplished, on the eighth day and from then on, the priests shall offer your burnt offerings upon the altar and your peace offerings; and I will accept you, says the Lord God. [Rom. 12:1; I Pet. 2:5.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And the vision which I saw was like the vision I had seen when I came to foretell the destruction of the city and like the vision I had seen beside the river Chebar [near Babylon]; and I fell on my face. [Ezek. 1:4; 3:23; 10:15, 22.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And the glory of the Lord entered the temple by the gate facing east.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Then the Spirit caught me up and brought me into the inner court, and behold, the glory of the Lord filled the temple.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And I heard One speaking to me out of the temple, and a Man stood by me.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And He [the Lord] said to me, Son of man, this is the place of My throne and the place of the soles of My feet, where I will dwell in the midst of the children of Israel forever; and My holy name the house of Israel shall no more profane, neither they nor their kings, by their [idolatrous] harlotry, nor by the dead bodies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' monuments of their kings,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Nor by setting their threshold by My thresholds and their doorposts by My doorposts, with a mere wall between Me and them. They have profaned My holy name by their abominations which they have committed; therefore I have consumed them in My anger.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Now let them put away their [idolatrous] harlotry and the dead bodies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' monuments of their kings far from Me, and I will dwell in their midst forever.'
