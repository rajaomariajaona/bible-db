document_id: 2SA.4,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' WHEN ISH-BOSHETH, Saul''s son [king over Israel], heard that Abner was dead in Hebron, his courage failed, and all the Israelites were troubled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dismayed.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' When one told me, Behold, Saul is dead, thinking he was bringing good news, I seized and slew him in Ziklag who expected me to give him a reward for his news.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' How much more–when wicked men have slain a just man in his own house on his bed–shall I not now require his blood of your hand and remove you from the earth!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' David commanded his young men, and they slew them and cut off their hands and feet and hanged them over the pool in Hebron. But they took Ish-bosheth''s head and buried it in Hebron in the tomb of Abner [his relative and once chief supporter].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Saul''s son had two men who were captains of raiding bands. One was named Baanah and the other Rechab, sons of Rimmon the Beerothite of Benjamin–for Beeroth also was reckoned to Benjamin,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And the Beerothites fled to Gittaim and have been sojourners there to this day.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Jonathan, Saul''s son, had a son who was a cripple in his feet. He was five years old when the news came out of Jezreel [of the deaths] of Saul and Jonathan. And the boy''s nurse took him up and fled; and in her haste, he fell and became lame. His name was Mephibosheth.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Now the sons of Rimmon the Beerothite, Rechab and Baanah, went about in the heat of the day to the house of Ish-bosheth, who lay resting on his bed at noon.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And they came into the interior of the house as though they were delivering wheat, and they smote him in the body; and Rechab and Baanah his brother escaped.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Now when they had come into the house and he lay on his bed in his bedroom, they [not only] smote and slew him, [but] beheaded him and took his head and went by the way of the plain all night.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And they brought the head of Ish-bosheth to David at Hebron and said to the king, Behold, the head of Ish-bosheth son of Saul, your enemy, who sought your life; and the Lord has avenged my lord the king this day on Saul and on his offspring.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And David answered Rechab and Baanah his brother, sons of Rimmon the Beerothite, As the Lord lives, Who redeemed my life out of all adversity,'
