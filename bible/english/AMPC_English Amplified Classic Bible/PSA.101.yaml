document_id: PSA.101,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I WILL sing of mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness and justice; to You, O Lord, will I sing.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will behave myself wisely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give heed to the blameless way–O when will You come to me? I will walk within my house in integrity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with a blameless heart.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will set no base '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' wicked thing before my eyes. I hate the work of them who turn aside [from the right path]; it shall not grasp hold of me.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A perverse heart shall depart from me; I will know no evil person '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' thing.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Whoso privily slanders his neighbor, him will I cut off [from me]; he who has a haughty look and a proud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogant heart I cannot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I will not tolerate.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' My eyes shall [look with favor] upon the faithful of the land, that they may dwell with me; he who walks blamelessly, he shall minister to me.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who works deceit shall not dwell in my house; he who tells lies shall not continue in my presence.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Morning after morning I will root up all the wicked in the land, that I may eliminate all the evildoers from the city of the Lord.'
