document_id: PSA.101,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David.
  - type: text
    content: ' I WILL sing of mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness and justice; to You, O Lord, will I sing.'
  '2':
  - type: text
    content: ' I will behave myself wisely '
  - type: text
    content: and
  - type: text
    content: ' give heed to the blameless way–O when will You come to me? I will walk within my house in integrity '
  - type: text
    content: and
  - type: text
    content: ' with a blameless heart.'
  '3':
  - type: text
    content: ' I will set no base '
  - type: text
    content: or
  - type: text
    content: ' wicked thing before my eyes. I hate the work of them who turn aside [from the right path]; it shall not grasp hold of me.'
  '4':
  - type: text
    content: ' A perverse heart shall depart from me; I will know no evil person '
  - type: text
    content: or
  - type: text
    content: ' thing.'
  '5':
  - type: text
    content: ' Whoso privily slanders his neighbor, him will I cut off [from me]; he who has a haughty look and a proud '
  - type: text
    content: and
  - type: text
    content: ' arrogant heart I cannot '
  - type: text
    content: and
  - type: text
    content: ' I will not tolerate.'
  '6':
  - type: text
    content: ' My eyes shall [look with favor] upon the faithful of the land, that they may dwell with me; he who walks blamelessly, he shall minister to me.'
  '7':
  - type: text
    content: ' He who works deceit shall not dwell in my house; he who tells lies shall not continue in my presence.'
  '8':
  - type: text
    content: ' Morning after morning I will root up all the wicked in the land, that I may eliminate all the evildoers from the city of the Lord.'
