document_id: 2CH.36,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN THE people of the land took Jehoahaz son of Josiah and made him king in his father''s stead in Jerusalem.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' In the spring, King Nebuchadnezzar sent and brought him to Babylon, with the precious vessels of the house of the Lord, and made Zedekiah the [boy''s] brother king over Judah and Jerusalem.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Zedekiah was twenty-one years old when he became king, and he reigned eleven years in Jerusalem.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' He did evil in the sight of the Lord his God and did not humble himself before Jeremiah the prophet, who spoke at the dictation of the Lord.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' He also rebelled against King Nebuchadnezzar, who made him swear by God. He stiffened his neck and hardened his heart against turning to the Lord, the God of Israel.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Also all the chiefs of the priests and the people trespassed greatly in accord with all the abominations of the heathen, and they polluted the house of the Lord which He had hallowed in Jerusalem.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the Lord, the God of their fathers, sent to them persistently by His messengers, because He had compassion on His people and on His dwelling place.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' But they kept mocking the messengers of God and despising His words and scoffing at His prophets till the wrath of the Lord rose against His people, till there was no remedy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' healing.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Therefore He brought against them the king of the Chaldeans, who slew their young men with the sword in the house of their sanctuary, and had no compassion on young man or virgin, old man or hoary-headed; He gave them all into his hand.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And all the vessels of the house of God, great and small, and the treasures of the Lord''s house, of the king, and of his princes, all these he brought to Babylon.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And they burned God''s house and broke down Jerusalem''s wall and burned all its palaces with fire and destroyed all its choice vessels.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Jehoahaz was [then] twenty-three years old; he reigned three months in Jerusalem.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Those who had escaped from the sword he took away to Babylon, where they were servants to him and his sons until the kingdom of Persia was established there,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' To fulfill the Lord''s word by Jeremiah, till the land had enjoyed its sabbaths; for as long as it lay desolate it kept sabbath to fulfill seventy years. [Lev. 25:4; 26:43; Jer. 25:11; 29:10.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Now in the first year of Cyrus king of Persia, that the word of the Lord by the mouth of Jeremiah might be accomplished, the Lord stirred up the spirit of Cyrus king of Persia so that he made a proclamation throughout all his kingdom and also put it in writing:'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Thus says Cyrus king of Persia: All the kingdoms of the earth the Lord, the God of heaven, has given me, and He has charged me to build Him a house in Jerusalem, which is in Judah. Whoever there is among you of all His people, may the Lord his God be with him, and let him go up [to Jerusalem].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Then the king of Egypt deposed him at Jerusalem and fined the land a hundred talents of silver and a talent of gold.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And the king of Egypt made Eliakim, Jehoahaz'' brother, king over Judah and Jerusalem and changed his name to Jehoiakim. But Neco took Jehoahaz his brother and carried him to Egypt.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Jehoiakim was twenty-five years old when he began to reign, and he reigned eleven years in Jerusalem. He did evil in the sight of the Lord his God.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Against him came up Nebuchadnezzar king of Babylon and bound him in fetters to take him to Babylon.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Nebuchadnezzar also took some of the vessels of the house of the Lord to Babylon and put them in his temple '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' palace there.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Now the rest of the acts of Jehoiakim, and the abominations which he did, and what was found against him, behold, they are written in the Book of the Kings of Israel and Judah. And Jehoiachin his son reigned in his stead.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Jehoiachin was eight[een] years old then; he reigned three months and ten days in Jerusalem. He did evil in the Lord''s sight. [II Kings 24:8.]'
