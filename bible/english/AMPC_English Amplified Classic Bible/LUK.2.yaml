document_id: LUK.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THOSE days it occurred that a decree went out from Caesar Augustus that the whole Roman empire should be registered.'
  '10':
  - type: text
    content: ' But the angel said to them, Do not be afraid; for behold, I bring you good news of a great joy which will come to all the people.'
  '11':
  - type: text
    content: ' For to you is born this day in the town of David a Savior, Who is Christ (the Messiah) the Lord! [Mic. 5:2.]'
  '12':
  - type: text
    content: ' And this will be a sign for you [by which you will recognize Him]: you will find [after searching] a Baby wrapped in swaddling clothes and lying in a manger. [I Sam. 2:34; II Kings 19:29; Isa. 7:14.]'
  '13':
  - type: text
    content: ' Then suddenly there appeared with the angel an army of the troops of heaven (a heavenly knighthood), praising God and saying,'
  '14':
  - type: text
    content: ' Glory to God in the highest [heaven], and on earth peace among men with whom He is well pleased [men of goodwill, of His favor].'
  '15':
  - type: text
    content: ' When the angels went away from them into heaven, the shepherds said one to another, Let us go over to Bethlehem and see this thing (saying) that has come to pass, which the Lord has made known to us.'
  '16':
  - type: text
    content: ' So they went with haste and [by searching] found Mary and Joseph, and the Baby lying in a manger.'
  '17':
  - type: text
    content: ' And when they saw it, they made known what had been told them concerning this Child,'
  '18':
  - type: text
    content: ' And all who heard it were astounded '
  - type: text
    content: and
  - type: text
    content: ' marveled at what the shepherds told them.'
  '19':
  - type: text
    content: ' But Mary was keeping within herself all these things (sayings), weighing '
  - type: text
    content: and
  - type: text
    content: ' pondering them in her heart.'
  '2':
  - type: text
    content: ' This was the first enrollment, and it was made when Quirinius was governor of Syria.'
  '20':
  - type: text
    content: ' And the shepherds returned, glorifying and praising God for all the things they had heard and seen, just as it had been told them.'
  '21':
  - type: text
    content: ' And at the end of eight days, when [the Baby] was to be circumcised, He was called Jesus, the name given by the angel before He was conceived in the womb.'
  '22':
  - type: text
    content: ' And when the time for their purification [the mother''s purification and the Baby''s dedication] came according to the Law of Moses, they brought Him up to Jerusalem to present Him to the Lord–[Lev. 12:1-4.]'
  '23':
  - type: text
    content: ' As it is written in the Law of the Lord, Every [firstborn] male that opens the womb shall be set apart '
  - type: text
    content: and
  - type: text
    content: ' dedicated '
  - type: text
    content: and
  - type: text
    content: ' called holy to the Lord–[Exod. 13:1, 2, 12; Num. 8:17.]'
  '24':
  - type: text
    content: ' And [they came also] to offer a sacrifice according to what is said in the Law of the Lord: a pair of turtledoves or two young pigeons. [Lev. 12:6-8.]'
  '25':
  - type: text
    content: ' Now there was a man in Jerusalem whose name was Simeon, and this man was righteous and devout [cautiously and carefully observing the divine Law], and looking for the Consolation of Israel; and the Holy Spirit was upon him.'
  '26':
  - type: text
    content: ' And it had been divinely revealed (communicated) to him by the Holy Spirit that he would not see death before he had seen the Lord''s Christ (the Messiah, the Anointed One).'
  '27':
  - type: text
    content: ' And prompted by the [Holy] Spirit, he came into the temple [enclosure]; and when the parents brought in the little child Jesus to do for Him what was customary according to the Law,'
  '28':
  - type: text
    content: ' [Simeon] took Him up in his arms and praised '
  - type: text
    content: and
  - type: text
    content: ' thanked God and said,'
  '29':
  - type: text
    content: ' And now, Lord, You are releasing Your servant to depart (leave this world) in peace, according to Your word.'
  '3':
  - type: text
    content: ' And all the people were going to be registered, each to his own city '
  - type: text
    content: or
  - type: text
    content: ' town.'
  '30':
  - type: text
    content: ' For with my [own] eyes I have seen Your Salvation, [Isa. 52:10.]'
  '31':
  - type: text
    content: ' Which You have ordained '
  - type: text
    content: and
  - type: text
    content: ' prepared before (in the presence of) all peoples,'
  '32':
  - type: text
    content: ' A Light for revelation to the Gentiles [to disclose what was before unknown] and [to bring] praise '
  - type: text
    content: and
  - type: text
    content: ' honor '
  - type: text
    content: and
  - type: text
    content: ' glory to Your people Israel. [Isa. 42:6; 49:6.]'
  '33':
  - type: text
    content: ' And His [legal] father and [His] mother were marveling at what was said about Him.'
  '34':
  - type: text
    content: ' And Simeon blessed them and said to Mary His mother, Behold, this Child is appointed '
  - type: text
    content: and
  - type: text
    content: ' destined for the fall and rising of many in Israel, and for a sign that is spoken against–[Isa. 8:14, 15.]'
  '35':
  - type: text
    content: ' And a sword will pierce through your own soul also–that the secret thoughts '
  - type: text
    content: and
  - type: text
    content: ' purposes of many hearts may be brought out '
  - type: text
    content: and
  - type: text
    content: ' disclosed.'
  '36':
  - type: text
    content: ' And there was also a prophetess, Anna, the daughter of Phanuel, of the tribe of Asher. She was very old, having lived with her husband seven years from her maidenhood, [Josh. 19:24.]'
  '37':
  - type: text
    content: ' And as a widow even for eighty-four years. She did not go out from the temple enclosure, but was worshiping night and day with fasting and prayer.'
  '38':
  - type: text
    content: ' And she too came up at that same hour, and she returned thanks to God and talked of [Jesus] to all who were looking for the redemption (deliverance) of Jerusalem.'
  '39':
  - type: text
    content: ' And when they had done everything according to the Law of the Lord, they went back into Galilee to their own town, Nazareth.'
  '4':
  - type: text
    content: ' And Joseph also went up from Galilee from the town of Nazareth to Judea, to the town of David, which is called Bethlehem, because he was of the house and family of David,'
  '40':
  - type: text
    content: ' And the Child grew and became strong '
  - type: text
    content: in spirit,
  - type: text
    content: ' filled with wisdom; and the grace (favor and spiritual blessing) of God was upon Him. [Judg. 13:24; I Sam. 2:26.]'
  '41':
  - type: text
    content: ' Now His parents went to Jerusalem every year to the Passover Feast. [Deut. 16:1-8; Exod. 23:15.]'
  '42':
  - type: text
    content: ' And when He was twelve years [old], they went up, as was their custom.'
  '43':
  - type: text
    content: ' And when the Feast was ended, as they were returning, the boy Jesus remained behind in Jerusalem. Now His parents did not know this,'
  '44':
  - type: text
    content: ' But, supposing Him to be in the caravan, they traveled on a day''s journey; and [then] they sought Him [diligently, looking up and down for Him] among their kinsfolk and acquaintances.'
  '45':
  - type: text
    content: ' And when they failed to find Him, they went back to Jerusalem, looking for Him [up and down] all the way.'
  '46':
  - type: text
    content: ' After three days they found Him [came upon Him] in the [court of the] temple, sitting among the teachers, listening to them and asking them questions.'
  '47':
  - type: text
    content: ' And all who heard Him were astonished '
  - type: text
    content: and
  - type: text
    content: ' overwhelmed with bewildered wonder at His intelligence '
  - type: text
    content: and
  - type: text
    content: ' understanding and His replies.'
  '48':
  - type: text
    content: ' And when they [Joseph and Mary] saw Him, they were amazed; and His mother said to Him, Child, why have You treated us like this? Here Your father and I have been anxiously looking for You [distressed and tormented].'
  '49':
  - type: text
    content: ' And He said to them, How is it that you had to look for Me? Did you not see '
  - type: text
    content: and
  - type: text
    content: ' know that it is necessary [as a duty] for Me to be in My Father''s house '
  - type: text
    content: and
  - type: text
    content: ' [occupied] about My Father''s business?'
  '5':
  - type: text
    content: ' To be enrolled with Mary, his espoused (married) wife, who was about to become a mother. [Matt. 1:18-25.]'
  '50':
  - type: text
    content: ' But they did not comprehend what He was saying to them.'
  '51':
  - type: text
    content: ' And He went down with them and came to Nazareth and was [habitually] obedient to them; and his mother kept '
  - type: text
    content: and
  - type: text
    content: ' closely and persistently guarded all these things in her heart.'
  '52':
  - type: text
    content: ' And Jesus increased in wisdom (in broad and full understanding) and in stature '
  - type: text
    content: and
  - type: text
    content: ' years, and in favor with God and man.'
  '6':
  - type: text
    content: ' And while they were there, the time came for her delivery,'
  '7':
  - type: text
    content: ' And she gave birth to her Son, her Firstborn; and she wrapped Him in swaddling clothes and laid Him in a manger, because there was no room '
  - type: text
    content: or
  - type: text
    content: ' place for them in the inn.'
  '8':
  - type: text
    content: ' And in that vicinity there were shepherds living [out under the open sky] in the field, watching [in shifts] over their flock by night.'
  '9':
  - type: text
    content: ' And '
  - type: text
    content: behold,
  - type: text
    content: ' an angel of the Lord stood by them, and the glory of the Lord flashed '
  - type: text
    content: and
  - type: text
    content: ' shone all about them, and they were terribly frightened.'
