document_id: JHN.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW WHEN the Lord knew (learned, became aware) that the Pharisees had been told that Jesus was winning and baptizing more disciples than John–'
  '10':
  - type: text
    content: ' Jesus answered her, If you had only known '
  - type: text
    content: and
  - type: text
    content: ' had recognized God''s gift and Who this is that is saying to you, Give Me a drink, you would have asked Him [instead] and He would have given you living water.'
  '11':
  - type: text
    content: ' She said to Him, Sir, You have nothing to draw with [no drawing bucket] and the well is deep; how then can You provide living water? [Where do You get Your living water?]'
  '12':
  - type: text
    content: ' Are You greater than '
  - type: text
    content: and
  - type: text
    content: ' superior to our ancestor Jacob, who gave us this well and who used to drink from it himself, and his sons and his cattle also?'
  '13':
  - type: text
    content: ' Jesus answered her, All who drink of this water will be thirsty again.'
  '14':
  - type: text
    content: ' But whoever takes a drink of the water that I will give him shall never, no never, be thirsty any more. But the water that I will give him shall become a spring of water welling up (flowing, bubbling) [continually] within him unto (into, for) eternal life.'
  '15':
  - type: text
    content: ' The woman said to Him, Sir, give me this water, so that I may never get thirsty nor have to come [continually all the way] here to draw.'
  '16':
  - type: text
    content: ' At this, Jesus said to her, Go, call your husband and come back here.'
  '17':
  - type: text
    content: ' The woman answered, I have no husband. Jesus said to her, You have spoken truly in saying, I have no husband.'
  '18':
  - type: text
    content: ' For you have had five husbands, and the man you are now living with is not your husband. In this you have spoken truly.'
  '19':
  - type: text
    content: ' The woman said to Him, Sir, I see '
  - type: text
    content: and
  - type: text
    content: ' understand that You are a prophet.'
  '2':
  - type: text
    content: ' Though Jesus Himself did not baptize, but His disciples–'
  '20':
  - type: text
    content: ' Our forefathers worshiped on this mountain, but you [Jews] say that Jerusalem is the place where it is necessary '
  - type: text
    content: and
  - type: text
    content: ' proper to worship.'
  '21':
  - type: text
    content: ' Jesus said to her, Woman, believe Me, a time is coming when you will worship the Father neither [merely] in this mountain nor [merely] in Jerusalem.'
  '22':
  - type: text
    content: ' You [Samaritans] do not know what you are worshiping [you worship what you do not comprehend]. We do know what we are worshiping [we worship what we have knowledge of and understand], for [after all] salvation comes from [among] the Jews.'
  '23':
  - type: text
    content: ' A time will come, however, indeed it is already here, when the true (genuine) worshipers will worship the Father in spirit and in truth (reality); for the Father is seeking just such people as these as His worshipers.'
  '24':
  - type: text
    content: ' God is a Spirit (a spiritual Being) and those who worship Him must worship '
  - type: text
    content: Him
  - type: text
    content: ' in spirit and in truth (reality).'
  '25':
  - type: text
    content: ' The woman said to Him, I know that Messiah is coming, He Who is called the Christ (the Anointed One); and when He arrives, He will tell us everything we need to know '
  - type: text
    content: and
  - type: text
    content: ' make it clear to us.'
  '26':
  - type: text
    content: ' Jesus said to her, I Who now speak with you am He.'
  '27':
  - type: text
    content: ' Just then His disciples came and they wondered (were surprised, astonished) to find Him talking with a woman [a married woman]. However, not one of them asked Him, What are You inquiring about? '
  - type: text
    content: or
  - type: text
    content: ' What do You want? or, Why do You speak with her?'
  '28':
  - type: text
    content: ' Then the woman left her water jar and went away to the town. And she began telling the people,'
  '29':
  - type: text
    content: ' Come, see a Man Who has told me everything that I ever did! Can this be [is not this] the Christ? [Must not this be the Messiah, the Anointed One?]'
  '3':
  - type: text
    content: ' He left Judea and returned to Galilee.'
  '30':
  - type: text
    content: ' So the people left the town and set out to go to Him.'
  '31':
  - type: text
    content: ' Meanwhile, the disciples urged Him saying, Rabbi, eat something.'
  '32':
  - type: text
    content: ' But He assured them, I have food (nourishment) to eat of which you know nothing '
  - type: text
    content: and
  - type: text
    content: ' have no idea.'
  '33':
  - type: text
    content: ' So the disciples said one to another, Has someone brought Him something to eat?'
  '34':
  - type: text
    content: ' Jesus said to them, My food (nourishment) is to do the will (pleasure) of Him Who sent Me and to accomplish '
  - type: text
    content: and
  - type: text
    content: ' completely finish His work.'
  '35':
  - type: text
    content: ' Do you not say, It is still four months until harvest time comes? Look! I tell you, raise your eyes and observe the fields '
  - type: text
    content: and
  - type: text
    content: ' see how they are already white for harvesting.'
  '36':
  - type: text
    content: ' Already the reaper is getting his wages [he who does the cutting now has his reward], for he is gathering fruit (crop) unto life eternal, so that he who does the planting and he who does the reaping may rejoice together.'
  '37':
  - type: text
    content: ' For in this the saying holds true, One sows and another reaps.'
  '38':
  - type: text
    content: ' I sent you to reap a crop for which you have not toiled. Other men have labored and you have stepped in to reap the results of their work.'
  '39':
  - type: text
    content: ' Now numerous Samaritans from that town believed in '
  - type: text
    content: and
  - type: text
    content: ' trusted in Him because of what the woman said when she declared '
  - type: text
    content: and
  - type: text
    content: ' testified, He told me everything that I ever did.'
  '4':
  - type: text
    content: ' It was necessary for Him to go through Samaria.'
  '40':
  - type: text
    content: ' So when the Samaritans arrived, they asked Him to remain with them, and He did stay there two days.'
  '41':
  - type: text
    content: ' Then many more believed in '
  - type: text
    content: and
  - type: text
    content: ' adhered to '
  - type: text
    content: and
  - type: text
    content: ' relied on Him because of His personal message [what He Himself said].'
  '42':
  - type: text
    content: ' And they told the woman, Now we no longer believe (trust, have faith) just because of what you said; for we have heard Him ourselves [personally], and we know that He truly is the Savior of the world, '
  - type: text
    content: the Christ.
  '43':
  - type: text
    content: ' But after these two days Jesus went on from there into Galilee–'
  '44':
  - type: text
    content: ' Although He Himself declared that a prophet has no honor in his own country.'
  '45':
  - type: text
    content: ' However, when He came into Galilee, the Galileans also welcomed Him '
  - type: text
    content: and
  - type: text
    content: ' took Him to their hearts eagerly, for they had seen everything that He did in Jerusalem during the Feast; for they too had attended the Feast.'
  '46':
  - type: text
    content: ' So Jesus came again to Cana of Galilee, where He had turned the water into wine. And there was a certain royal official whose son was lying ill in Capernaum.'
  '47':
  - type: text
    content: ' Having heard that Jesus had come back from Judea into Galilee, he went away to meet Him and began to beg Him to come down and cure his son, for he was lying at the point of death.'
  '48':
  - type: text
    content: ' Then Jesus said to him, Unless you see signs and miracles happen, you [people] never will believe (trust, have faith) at all.'
  '49':
  - type: text
    content: ' The king''s officer pleaded with Him, Sir, do come down at once before my little child is dead!'
  '5':
  - type: text
    content: ' And in doing so, He arrived at a Samaritan town called Sychar, near the tract of land that Jacob gave to his son Joseph.'
  '50':
  - type: text
    content: ' Jesus answered him, Go in peace; your son will live! And the man put his trust in what Jesus said and started home.'
  '51':
  - type: text
    content: ' But even as he was on the road going down, his servants met him and reported, saying, Your son lives!'
  '52':
  - type: text
    content: ' So he asked them at what time he had begun to get better. They said, Yesterday during the seventh hour (about one o''clock in the afternoon) the fever left him.'
  '53':
  - type: text
    content: ' Then the father knew that it was at that very hour when Jesus had said to him, Your son will live. And he and his entire household believed (adhered to, trusted in, and relied on Jesus).'
  '54':
  - type: text
    content: ' This is the second sign (wonderwork, miracle) that Jesus performed after He had come out of Judea into Galilee.'
  '6':
  - type: text
    content: ' And Jacob''s well was there. So Jesus, tired as He was from His journey, sat down [to rest] by the well. It was then about the sixth hour (about noon).'
  '7':
  - type: text
    content: ' Presently, when a woman of Samaria came along to draw water, Jesus said to her, Give Me a drink–'
  '8':
  - type: text
    content: ' For His disciples had gone off into the town to buy food–'
  '9':
  - type: text
    content: ' The Samaritan woman said to Him, How is it that You, being a Jew, ask me, a Samaritan [and a] woman, for a drink?–For the Jews have nothing to do with the Samaritans–'
