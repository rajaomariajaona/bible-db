document_id: GEN.35,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND GOD said to Jacob, Arise, go up to Bethel and dwell there. And make there an altar to God Who appeared to you [in a distinct manifestation] when you fled from the presence of Esau your brother. [Gen. 28:11-22.]'
  '10':
  - type: text
    content: ' Again God said to him, Your name is Jacob [supplanter]; you shall not be called Jacob any longer, but Israel shall be your name. So He called him Israel [contender with God].'
  '11':
  - type: text
    content: ' And God said to him, I am God Almighty. Be fruitful and multiply; a nation and a company of nations shall come from you and kings shall be born of your stock;'
  '12':
  - type: text
    content: ' The land which I gave Abraham and Isaac I will give to you, and to your descendants after you I will give the land.'
  '13':
  - type: text
    content: ' Then God ascended from him in the place where He talked with him.'
  '14':
  - type: text
    content: ' And Jacob set up a pillar (monument) in the place where he talked with [God], a pillar of stone; and he poured a drink offering on it and he poured oil on it.'
  '15':
  - type: text
    content: ' And Jacob called the name of the place where God had talked with him Bethel [house of God].'
  '16':
  - type: text
    content: ' And they journeyed from Bethel and had but a little way to go to Ephrath [Bethlehem] when Rachel suffered the pangs of childbirth and had hard labor.'
  '17':
  - type: text
    content: ' When she was in hard labor, the midwife said to her, Do not be afraid; you shall have this son also.'
  '18':
  - type: text
    content: ' And as her soul was departing, for she died, she called his name Ben-oni [son of my sorrow]; but his father called him Benjamin [son of the right hand].'
  '19':
  - type: text
    content: ' So Rachel died and was buried on the way to Ephrath, that is, Bethlehem.'
  '2':
  - type: text
    content: ' Then Jacob said to his household and to all who were with him, Put away the [images of] strange gods that are among you, and purify yourselves and change [into fresh] garments;'
  '20':
  - type: text
    content: ' And Jacob set a pillar (monument) on her grave; that is the pillar of Rachel''s grave to this day.'
  '21':
  - type: text
    content: ' Then Israel journeyed on and spread his tent on the other side of the tower of Edar.'
  '22':
  - type: text
    content: ' When Israel dwelt there, Reuben [his eldest son] went and lay with Bilhah his father''s concubine; and Israel heard about it. Now Jacob''s sons were twelve.'
  '23':
  - type: text
    content: ' The sons of Leah: Reuben, Jacob''s firstborn, Simeon, Levi, Judah, Issachar, and Zebulun.'
  '24':
  - type: text
    content: ' The sons of Rachel: Joseph and Benjamin.'
  '25':
  - type: text
    content: ' The sons of Bilhah, Rachel''s maid: Dan and Naphtali.'
  '26':
  - type: text
    content: ' And the sons of Zilpah, Leah''s maid: Gad and Asher. These are the sons of Jacob born to him in Padan-aram.'
  '27':
  - type: text
    content: ' And Jacob came to Isaac his father at Mamre or Kiriath-arba, that is, Hebron, where Abraham and Isaac had sojourned.'
  '28':
  - type: text
    content: ' Now the days of Isaac were 180 years.'
  '29':
  - type: text
    content: ' And Isaac''s spirit departed; he died and was gathered to his people, being an old man, satisfied '
  - type: text
    content: and
  - type: text
    content: ' satiated with days; his sons Esau and Jacob buried him.'
  '3':
  - type: text
    content: ' Then let us arise and go up to Bethel, and I will make there an altar to God Who answered me in the day of my distress and was with me wherever I went.'
  '4':
  - type: text
    content: ' So they [both young men and women] gave to Jacob all the strange gods they had and their earrings which were [worn as charms against evil] in their ears; and Jacob buried '
  - type: text
    content: and
  - type: text
    content: ' hid them under the oak near Shechem.'
  '5':
  - type: text
    content: ' And they journeyed and a terror from God fell on the towns round about them, and they did not pursue the sons of Jacob.'
  '6':
  - type: text
    content: ' So Jacob came to Luz, that is, Bethel, which is in the land of Canaan, he and all the people with him.'
  '7':
  - type: text
    content: ' There he built an altar, and called the place El-bethel [God of Bethel], for there God revealed Himself to him when he fled from the presence of his brother.'
  '8':
  - type: text
    content: ' But Deborah, Rebekah''s nurse, died and was buried below Bethel under an oak; and the name of it was called Allon-bacuth [oak of weeping].'
  '9':
  - type: text
    content: ' And God [in a distinctly visible manifestation] appeared to Jacob again when he came out of Padan-aram, and declared a blessing on him. [Gen. 32:28.]'
