document_id: GEN.35
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND GOD said to Jacob, Arise, go up to Bethel and dwell there. And make there an altar to God Who appeared to you [in a distinct manifestation] when you fled from the presence of Esau your brother. [Gen. 28:11-22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then Jacob said to his household and to all who were with him, Put away the [images of] strange gods that are among you, and purify yourselves and change [into fresh] garments;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then let us arise and go up to Bethel, and I will make there an altar to God Who answered me in the day of my distress and was with me wherever I went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So they [both young men and women] gave to Jacob all the strange gods they had and their earrings which were [worn as charms against evil] in their ears; and Jacob buried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hid them under the oak near Shechem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they journeyed and a terror from God fell on the towns round about them, and they did not pursue the sons of Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So Jacob came to Luz, that is, Bethel, which is in the land of Canaan, he and all the people with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' There he built an altar, and called the place El-bethel [God of Bethel], for there God revealed Himself to him when he fled from the presence of his brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But Deborah, Rebekah''s nurse, died and was buried below Bethel under an oak; and the name of it was called Allon-bacuth [oak of weeping].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And God [in a distinctly visible manifestation] appeared to Jacob again when he came out of Padan-aram, and declared a blessing on him. [Gen. 32:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Again God said to him, Your name is Jacob [supplanter]; you shall not be called Jacob any longer, but Israel shall be your name. So He called him Israel [contender with God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And God said to him, I am God Almighty. Be fruitful and multiply; a nation and a company of nations shall come from you and kings shall be born of your stock;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The land which I gave Abraham and Isaac I will give to you, and to your descendants after you I will give the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then God ascended from him in the place where He talked with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And Jacob set up a pillar (monument) in the place where he talked with [God], a pillar of stone; and he poured a drink offering on it and he poured oil on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Jacob called the name of the place where God had talked with him Bethel [house of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they journeyed from Bethel and had but a little way to go to Ephrath [Bethlehem] when Rachel suffered the pangs of childbirth and had hard labor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' When she was in hard labor, the midwife said to her, Do not be afraid; you shall have this son also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And as her soul was departing, for she died, she called his name Ben-oni [son of my sorrow]; but his father called him Benjamin [son of the right hand].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So Rachel died and was buried on the way to Ephrath, that is, Bethlehem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And Jacob set a pillar (monument) on her grave; that is the pillar of Rachel''s grave to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then Israel journeyed on and spread his tent on the other side of the tower of Edar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When Israel dwelt there, Reuben [his eldest son] went and lay with Bilhah his father''s concubine; and Israel heard about it. Now Jacob''s sons were twelve.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The sons of Leah: Reuben, Jacob''s firstborn, Simeon, Levi, Judah, Issachar, and Zebulun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The sons of Rachel: Joseph and Benjamin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The sons of Bilhah, Rachel''s maid: Dan and Naphtali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And the sons of Zilpah, Leah''s maid: Gad and Asher. These are the sons of Jacob born to him in Padan-aram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And Jacob came to Isaac his father at Mamre or Kiriath-arba, that is, Hebron, where Abraham and Isaac had sojourned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Now the days of Isaac were 180 years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And Isaac''s spirit departed; he died and was gathered to his people, being an old man, satisfied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satiated with days; his sons Esau and Jacob buried him.'
