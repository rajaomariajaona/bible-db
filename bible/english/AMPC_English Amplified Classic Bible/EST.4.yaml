document_id: EST.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW WHEN Mordecai learned all that was done, [he] rent his clothes and put on sackcloth with ashes and went out into the midst of the city and cried with a loud and bitter cry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He came '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stood before the king''s gate, for no one might enter the king''s gate clothed with sackcloth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And in every province, wherever the king''s commandment and his decree came, there was great mourning among the Jews, with fasting, weeping, and wailing, and many lay in sackcloth and ashes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When Esther''s maids and her attendants came and told it to her, the queen was exceedingly grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distressed. She sent garments to clothe Mordecai, with orders to take his sackcloth from off him, but he would not receive them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then Esther called for Hathach, one of the king''s attendants whom he had appointed to attend her, and ordered him to go to Mordecai to learn what this was and why it was.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So Hathach went out to Mordecai in the open square of the city, which was in front of the king''s gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Mordecai told him of all that had happened to him, and the exact sum of money that Haman had promised to pay to the king''s treasuries for the Jews to be destroyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' [Mordecai] also gave him a copy of the decree to destroy them, that was given out in Shushan, that he might show it to Esther, explain it to her, and charge her to go to the king, make supplication to him, and plead with him for the lives of her people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Hathach came and told Esther the words of Mordecai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then Esther spoke to Hathach and gave him a message for Mordecai, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' All the king''s servants and the people of the king''s provinces know that any person, be it man or woman, who shall go into the inner court to the king without being called shall be put to death; there is but one law for him, except [him] to whom the king shall hold out the golden scepter, that he may live. But I have not been called to come to the king for these thirty days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And they told Mordecai what Esther said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then Mordecai told them to return this answer to Esther, Do not flatter yourself that you shall escape in the king''s palace any more than all the other Jews.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For if you keep silent at this time, relief and deliverance shall arise for the Jews from elsewhere, but you and your father''s house will perish. And who knows but that you have come to the kingdom for such a time as this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for this very occasion?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then Esther told them to give this answer to Mordecai,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Go, gather together all the Jews that are present in Shushan, and fast for me; and neither eat nor drink for three days, night or day. I also and my maids will fast as you do. Then I will go to the king, though it is against the law; and if I perish, I perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So Mordecai went away and did all that Esther had commanded him.'
