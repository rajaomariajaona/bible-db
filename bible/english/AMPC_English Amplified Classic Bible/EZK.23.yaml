document_id: EZK.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD of the Lord came again to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Son of man, there were two women, the daughters of one mother;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And they played the harlot in Egypt. There they played the harlot in their youth; there their bosoms were pressed and there their virgin breasts were handled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the names of them were Aholah the elder and Aholibah her sister, and they became Mine and they bore sons and daughters. As for the identity of their names, Aholah is Samaria and Aholibah is Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And Aholah played the harlot when she was Mine, and she was foolishly fond of her lovers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doted on the Assyrians her neighbors,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Who were clothed with blue, governors and deputies, all of them attractive young men, horsemen riding upon horses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And she bestowed her harlotries upon them, the choicest men of Assyria all of them; and on whomever she doted, with all their idols she defiled herself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Neither has she left her harlotries since the days of Egypt [from where she brought them], for in her youth men there lay with her and handled her girlish bosom, and they poured out their sinful desire upon her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Wherefore I delivered her into the hand of her lovers, into the hand of the Assyrians upon whom she doted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' These uncovered her nakedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shame; they took her sons and her daughters and they slew her with the sword, and her name became notorious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a byword among women when judgments were executed upon her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And her sister Aholibah saw this; yet she was more corrupt in her foolish fondness than she, and in her harlotries she was more wanton than her sister in her harlotries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' She doted upon the Assyrians–governors and deputies, her neighbors, clothed most gorgeously, horsemen riding upon horses, all of them desirable young men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And I saw that she was defiled, that both [of the sisters] took one way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But [Aholibah] carried her harlotries further, for she saw men pictured upon the wall, the pictures of the Chaldeans sketched in bright red pigment,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Girded with girdles on their loins, with flowing turbans on their heads, all of them looking like officers, a picture of Babylonian men whose native land was Chaldea,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then as soon as she saw [the sketches of] them, she doted on them and sent messengers to them in Chaldea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the Babylonians came to her into the bed of love, and they defiled her with their evil desire; and when she was polluted by them, she [Jerusalem] broke the relationship '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pushed them away from her in disgust.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' So she flaunted her harlotries and exposed her nakedness, and I was disgusted and turned from her, as I had turned in disgust from her sister.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Yet she multiplied her harlotries, remembering the days of her youth in which she had played the harlot in the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For she doted upon her paramours there, whose lust was sensuous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vulgar like that of asses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' stallions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Thus you yearned for the lewdness of your youth, when those of Egypt handled your bosom on account of your girlish breasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Therefore, O Aholibah, thus says the Lord God: Behold, I will rouse up your lovers against you, from whom you turned in disgust, and I will bring them against you on every side:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The Babylonians and all the Chaldeans, Pekod and Shoa and Koa, and all the Assyrians with them, desirable young men, governors and officers all of them, princes, men of renown '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counselors, all of them riding on horses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And they shall come against you with weapons, chariots, wagons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wheels, and with a host of infantry which shall array themselves against you with buckler and shield and helmet round about; and I will commit the judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishment to them, and they shall judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish you according to their [heathen] customs in such matters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And I will set My jealous indignation against you, and they shall deal with you in fury; they shall take away your nose and your ears, and those who are left of you shall fall by the sword; they shall take your sons and your daughters, and the remainder shall be devoured by the fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' They shall also strip you [Judah] of your clothes and take away your fine jewels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Thus I will put an end to your lewdness and your harlotry brought from the land of Egypt, so that you will not lift up your eyes to them nor [earnestly] remember Egypt any more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For thus says the Lord God: Behold, I will deliver you into the hands of those whom you hate, into the hands of those from whom you turned away in disgust.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' They shall deal with you in hatred and shall take away all [the earnings of] your labor and shall leave you naked and bare, and the nakedness of your harlotry shall be uncovered, both your lewdness and your wanton ways.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' These things shall be done to you, because you have played the harlot after the nations and because you have defiled yourself with their idols.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' You have walked in the way of your sister [Samaria, Israel''s capital]; therefore I will give her cup into your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Thus says the Lord God: You shall drink of your sister''s cup which is deep and wide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brimful; you shall be laughed to scorn and held in derision, for it contains much [too much to endure].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' You shall be filled with drunkenness and sorrow, with the cup of wasting astonishment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' horror and desolation, with the cup of your sister Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' You shall drink it and drain it out, and then gnaw the pieces of it [which in your drunkenness you have broken] and shall tear your [own] breasts; for I have spoken it, says the Lord God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Therefore thus says the Lord God: Because you have forgotten Me [your divine Husband] and cast Me behind your back, therefore bear also [the consequences of] your lewdness and your harlotry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The Lord said, moreover, to me: Son of man, will you judge Aholah and Aholibah? Then declare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' show to them their abominations (the detestable, loathsome, and shamefully vile things they do),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' For they have committed adultery and blood is on their hands, even with their idols have they committed adultery [against Me]. And they have also caused their sons, whom they bore to Me, to pass through the fire to their images [as an offering of food] to be devoured [by them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Moreover, this they have done to Me: they have defiled My sanctuary on the same day [of their idolatries] and have profaned My Sabbaths.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' For when they had slain their children [as offerings] to their idols, then they came the same day into My sanctuary to profane it [by daring to offer sacrifice there also]! And behold, thus have they done in the midst of My house!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And furthermore, you have sent for men to come from afar, to whom a messenger was sent; and behold, they came–those for whom you washed yourself, painted your eyelids, and decked yourself with ornaments;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And you sat upon a stately couch with a table spread before it upon which you set My incense and My oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And the sound of a careless crowd was with her, and with men of the common sort were brought drunkards from the wilderness, who put bracelets upon the hands of both sisters and beautiful crowns upon their heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Then I said of the one [Aholah] worn out with adulteries, Will they now play the harlot with her [now that she is old] and she with them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Yet they went in to her as they go in to a woman who plays the harlot; so they went in to Aholah and to Aholibah [Israel and Judah], the lewd women.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And the righteous men, they shall judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemn them to the punishment due to adulteresses, to women who shed blood, for they are adulteresses and blood is upon their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' For thus says the Lord God: I will bring up a host upon them and will give them over to be tossed to and fro and robbed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' And the host shall stone them with stones and cut them down with their swords; they shall slay their sons and their daughters and burn up their houses with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' Thus will I cause lewdness to cease out of the land, that all women may be taught not to do after your lewdness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' Thus your lewdness shall be recompensed upon you and you shall suffer the penalty for your sinful idolatry; and you shall know (understand and realize) that I am the Lord God.'
