document_id: EZK.23,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD of the Lord came again to me, saying,'
  '10':
  - type: text
    content: ' These uncovered her nakedness '
  - type: text
    content: and
  - type: text
    content: ' shame; they took her sons and her daughters and they slew her with the sword, and her name became notorious '
  - type: text
    content: and
  - type: text
    content: ' a byword among women when judgments were executed upon her.'
  '11':
  - type: text
    content: ' And her sister Aholibah saw this; yet she was more corrupt in her foolish fondness than she, and in her harlotries she was more wanton than her sister in her harlotries.'
  '12':
  - type: text
    content: ' She doted upon the Assyrians–governors and deputies, her neighbors, clothed most gorgeously, horsemen riding upon horses, all of them desirable young men.'
  '13':
  - type: text
    content: ' And I saw that she was defiled, that both [of the sisters] took one way.'
  '14':
  - type: text
    content: ' But [Aholibah] carried her harlotries further, for she saw men pictured upon the wall, the pictures of the Chaldeans sketched in bright red pigment,'
  '15':
  - type: text
    content: ' Girded with girdles on their loins, with flowing turbans on their heads, all of them looking like officers, a picture of Babylonian men whose native land was Chaldea,'
  '16':
  - type: text
    content: ' Then as soon as she saw [the sketches of] them, she doted on them and sent messengers to them in Chaldea.'
  '17':
  - type: text
    content: ' And the Babylonians came to her into the bed of love, and they defiled her with their evil desire; and when she was polluted by them, she [Jerusalem] broke the relationship '
  - type: text
    content: and
  - type: text
    content: ' pushed them away from her in disgust.'
  '18':
  - type: text
    content: ' So she flaunted her harlotries and exposed her nakedness, and I was disgusted and turned from her, as I had turned in disgust from her sister.'
  '19':
  - type: text
    content: ' Yet she multiplied her harlotries, remembering the days of her youth in which she had played the harlot in the land of Egypt.'
  '2':
  - type: text
    content: ' Son of man, there were two women, the daughters of one mother;'
  '20':
  - type: text
    content: ' For she doted upon her paramours there, whose lust was sensuous '
  - type: text
    content: and
  - type: text
    content: ' vulgar like that of asses '
  - type: text
    content: or
  - type: text
    content: ' stallions.'
  '21':
  - type: text
    content: ' Thus you yearned for the lewdness of your youth, when those of Egypt handled your bosom on account of your girlish breasts.'
  '22':
  - type: text
    content: ' Therefore, O Aholibah, thus says the Lord God: Behold, I will rouse up your lovers against you, from whom you turned in disgust, and I will bring them against you on every side:'
  '23':
  - type: text
    content: ' The Babylonians and all the Chaldeans, Pekod and Shoa and Koa, and all the Assyrians with them, desirable young men, governors and officers all of them, princes, men of renown '
  - type: text
    content: and
  - type: text
    content: ' counselors, all of them riding on horses.'
  '24':
  - type: text
    content: ' And they shall come against you with weapons, chariots, wagons '
  - type: text
    content: and
  - type: text
    content: ' wheels, and with a host of infantry which shall array themselves against you with buckler and shield and helmet round about; and I will commit the judgment '
  - type: text
    content: and
  - type: text
    content: ' punishment to them, and they shall judge '
  - type: text
    content: and
  - type: text
    content: ' punish you according to their [heathen] customs in such matters.'
  '25':
  - type: text
    content: ' And I will set My jealous indignation against you, and they shall deal with you in fury; they shall take away your nose and your ears, and those who are left of you shall fall by the sword; they shall take your sons and your daughters, and the remainder shall be devoured by the fire.'
  '26':
  - type: text
    content: ' They shall also strip you [Judah] of your clothes and take away your fine jewels.'
  '27':
  - type: text
    content: ' Thus I will put an end to your lewdness and your harlotry brought from the land of Egypt, so that you will not lift up your eyes to them nor [earnestly] remember Egypt any more.'
  '28':
  - type: text
    content: ' For thus says the Lord God: Behold, I will deliver you into the hands of those whom you hate, into the hands of those from whom you turned away in disgust.'
  '29':
  - type: text
    content: ' They shall deal with you in hatred and shall take away all [the earnings of] your labor and shall leave you naked and bare, and the nakedness of your harlotry shall be uncovered, both your lewdness and your wanton ways.'
  '3':
  - type: text
    content: ' And they played the harlot in Egypt. There they played the harlot in their youth; there their bosoms were pressed and there their virgin breasts were handled.'
  '30':
  - type: text
    content: ' These things shall be done to you, because you have played the harlot after the nations and because you have defiled yourself with their idols.'
  '31':
  - type: text
    content: ' You have walked in the way of your sister [Samaria, Israel''s capital]; therefore I will give her cup into your hand.'
  '32':
  - type: text
    content: ' Thus says the Lord God: You shall drink of your sister''s cup which is deep and wide '
  - type: text
    content: and
  - type: text
    content: ' brimful; you shall be laughed to scorn and held in derision, for it contains much [too much to endure].'
  '33':
  - type: text
    content: ' You shall be filled with drunkenness and sorrow, with the cup of wasting astonishment '
  - type: text
    content: and
  - type: text
    content: ' horror and desolation, with the cup of your sister Samaria.'
  '34':
  - type: text
    content: ' You shall drink it and drain it out, and then gnaw the pieces of it [which in your drunkenness you have broken] and shall tear your [own] breasts; for I have spoken it, says the Lord God.'
  '35':
  - type: text
    content: ' Therefore thus says the Lord God: Because you have forgotten Me [your divine Husband] and cast Me behind your back, therefore bear also [the consequences of] your lewdness and your harlotry.'
  '36':
  - type: text
    content: ' The Lord said, moreover, to me: Son of man, will you judge Aholah and Aholibah? Then declare '
  - type: text
    content: and
  - type: text
    content: ' show to them their abominations (the detestable, loathsome, and shamefully vile things they do),'
  '37':
  - type: text
    content: ' For they have committed adultery and blood is on their hands, even with their idols have they committed adultery [against Me]. And they have also caused their sons, whom they bore to Me, to pass through the fire to their images [as an offering of food] to be devoured [by them].'
  '38':
  - type: text
    content: ' Moreover, this they have done to Me: they have defiled My sanctuary on the same day [of their idolatries] and have profaned My Sabbaths.'
  '39':
  - type: text
    content: ' For when they had slain their children [as offerings] to their idols, then they came the same day into My sanctuary to profane it [by daring to offer sacrifice there also]! And behold, thus have they done in the midst of My house!'
  '4':
  - type: text
    content: ' And the names of them were Aholah the elder and Aholibah her sister, and they became Mine and they bore sons and daughters. As for the identity of their names, Aholah is Samaria and Aholibah is Jerusalem.'
  '40':
  - type: text
    content: ' And furthermore, you have sent for men to come from afar, to whom a messenger was sent; and behold, they came–those for whom you washed yourself, painted your eyelids, and decked yourself with ornaments;'
  '41':
  - type: text
    content: ' And you sat upon a stately couch with a table spread before it upon which you set My incense and My oil.'
  '42':
  - type: text
    content: ' And the sound of a careless crowd was with her, and with men of the common sort were brought drunkards from the wilderness, who put bracelets upon the hands of both sisters and beautiful crowns upon their heads.'
  '43':
  - type: text
    content: ' Then I said of the one [Aholah] worn out with adulteries, Will they now play the harlot with her [now that she is old] and she with them?'
  '44':
  - type: text
    content: ' Yet they went in to her as they go in to a woman who plays the harlot; so they went in to Aholah and to Aholibah [Israel and Judah], the lewd women.'
  '45':
  - type: text
    content: ' And the righteous men, they shall judge '
  - type: text
    content: and
  - type: text
    content: ' condemn them to the punishment due to adulteresses, to women who shed blood, for they are adulteresses and blood is upon their hands.'
  '46':
  - type: text
    content: ' For thus says the Lord God: I will bring up a host upon them and will give them over to be tossed to and fro and robbed.'
  '47':
  - type: text
    content: ' And the host shall stone them with stones and cut them down with their swords; they shall slay their sons and their daughters and burn up their houses with fire.'
  '48':
  - type: text
    content: ' Thus will I cause lewdness to cease out of the land, that all women may be taught not to do after your lewdness.'
  '49':
  - type: text
    content: ' Thus your lewdness shall be recompensed upon you and you shall suffer the penalty for your sinful idolatry; and you shall know (understand and realize) that I am the Lord God.'
  '5':
  - type: text
    content: ' And Aholah played the harlot when she was Mine, and she was foolishly fond of her lovers '
  - type: text
    content: and
  - type: text
    content: ' doted on the Assyrians her neighbors,'
  '6':
  - type: text
    content: ' Who were clothed with blue, governors and deputies, all of them attractive young men, horsemen riding upon horses.'
  '7':
  - type: text
    content: ' And she bestowed her harlotries upon them, the choicest men of Assyria all of them; and on whomever she doted, with all their idols she defiled herself.'
  '8':
  - type: text
    content: ' Neither has she left her harlotries since the days of Egypt [from where she brought them], for in her youth men there lay with her and handled her girlish bosom, and they poured out their sinful desire upon her.'
  '9':
  - type: text
    content: ' Wherefore I delivered her into the hand of her lovers, into the hand of the Assyrians upon whom she doted.'
