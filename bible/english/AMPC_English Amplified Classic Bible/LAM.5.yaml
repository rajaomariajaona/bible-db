document_id: LAM.5,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: ', [earnestly] remember what has come upon us! Look down and see our reproach (our national disgrace)!'
  '10':
  - type: text
    content: ' Our skin glows '
  - type: text
    content: and
  - type: text
    content: ' is parched as from [the heat of] an oven because of the burning heat of [the fever of] famine.'
  '11':
  - type: text
    content: ' They ravished the women in Zion, the virgins in the cities of Judah.'
  '12':
  - type: text
    content: ' They hung princes by their hands; the persons of elders were not respected.'
  '13':
  - type: text
    content: ' Young men carried millstones, and boys fell [staggering] under [burdens of] wood.'
  '14':
  - type: text
    content: ' The elders have ceased from [congregating at] the city''s gate, the young men from their music.'
  '15':
  - type: text
    content: ' Ceased is the joy of our hearts; our dancing has turned into mourning.'
  '16':
  - type: text
    content: ' The crown has fallen from our head [our honor is brought to the dust]! Woe to us, for we have sinned!'
  '17':
  - type: text
    content: ' Because of this our hearts are faint '
  - type: text
    content: and
  - type: text
    content: ' sick; because of these things our eyes are dim '
  - type: text
    content: and
  - type: text
    content: ' see darkly.'
  '18':
  - type: text
    content: ' As for Mount Zion, which lies desolate, the jackals prowl over it!'
  '19':
  - type: text
    content: ' But You, O Lord, remain '
  - type: text
    content: and
  - type: text
    content: ' reign forever; Your throne endures from generation to [all] generations.'
  '2':
  - type: text
    content: ' Our inheritance has fallen over to strangers, our houses to foreigners.'
  '20':
  - type: text
    content: ' Why do You forget us forever? Why do You forsake us so long?'
  '21':
  - type: text
    content: ' Turn us to Yourself, O Lord, and we shall be turned '
  - type: text
    content: and
  - type: text
    content: ' restored! Renew our days as of old!–'
  '22':
  - type: text
    content: ' Or have You utterly rejected us? Or are You exceedingly angry with us [still]?'
  '3':
  - type: text
    content: ' We have become orphans and fatherless; our mothers are like widows.'
  '4':
  - type: text
    content: ' We have had to pay money to drink the water that belongs to us; our [own] wood is sold to us.'
  '5':
  - type: text
    content: ' Our pursuers are upon our necks [like a yoke]; we are weary and are allowed no rest.'
  '6':
  - type: text
    content: ' We have given the hand [as a pledge of fidelity and submission] to the Egyptians and to the Assyrians [merely] to get food to satisfy [our hunger].'
  '7':
  - type: text
    content: ' Our fathers sinned and are no more, and we have borne their iniquities. [Isa. 65:7; Jer. 16:11-12; 31:29; Ezek. 18:2-4.]'
  '8':
  - type: text
    content: ' Servants '
  - type: text
    content: and
  - type: text
    content: ' slaves rule over us; there is none to deliver us out of their hands. [Neh. 5:15.]'
  '9':
  - type: text
    content: ' We get our bread at the peril of our lives because of the sword of the wilderness [the wild Arabs, who may attack if we venture into the fields to reap our harvests].'
