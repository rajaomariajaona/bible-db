document_id: LAM.5,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', [earnestly] remember what has come upon us! Look down and see our reproach (our national disgrace)!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Our skin glows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is parched as from [the heat of] an oven because of the burning heat of [the fever of] famine.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' They ravished the women in Zion, the virgins in the cities of Judah.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' They hung princes by their hands; the persons of elders were not respected.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Young men carried millstones, and boys fell [staggering] under [burdens of] wood.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' The elders have ceased from [congregating at] the city''s gate, the young men from their music.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Ceased is the joy of our hearts; our dancing has turned into mourning.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The crown has fallen from our head [our honor is brought to the dust]! Woe to us, for we have sinned!'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Because of this our hearts are faint '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sick; because of these things our eyes are dim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' see darkly.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' As for Mount Zion, which lies desolate, the jackals prowl over it!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' But You, O Lord, remain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reign forever; Your throne endures from generation to [all] generations.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Our inheritance has fallen over to strangers, our houses to foreigners.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Why do You forget us forever? Why do You forsake us so long?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Turn us to Yourself, O Lord, and we shall be turned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restored! Renew our days as of old!–'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Or have You utterly rejected us? Or are You exceedingly angry with us [still]?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' We have become orphans and fatherless; our mothers are like widows.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' We have had to pay money to drink the water that belongs to us; our [own] wood is sold to us.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Our pursuers are upon our necks [like a yoke]; we are weary and are allowed no rest.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' We have given the hand [as a pledge of fidelity and submission] to the Egyptians and to the Assyrians [merely] to get food to satisfy [our hunger].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Our fathers sinned and are no more, and we have borne their iniquities. [Isa. 65:7; Jer. 16:11-12; 31:29; Ezek. 18:2-4.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Servants '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' slaves rule over us; there is none to deliver us out of their hands. [Neh. 5:15.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' We get our bread at the peril of our lives because of the sword of the wilderness [the wild Arabs, who may attack if we venture into the fields to reap our harvests].'
