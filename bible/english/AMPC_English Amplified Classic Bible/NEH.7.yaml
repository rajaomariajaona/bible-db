  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: ' So the priests, the Levites, the gatekeepers, the singers, some of the people, the Nethinim [the temple servants], along with all Israel, dwelt in their towns, and were in them when the seventh month came.'
