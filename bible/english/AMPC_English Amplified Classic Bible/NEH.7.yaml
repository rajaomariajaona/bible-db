    children:
    - type: text
      text: '72'
  - type: text
    text: ' What the rest of the people gave was 20,000 darics of gold, 2,000 minas of silver, and 67 priests'' garments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
