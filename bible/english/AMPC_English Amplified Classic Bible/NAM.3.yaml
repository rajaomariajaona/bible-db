document_id: NAM.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' WOE TO the bloody city! It is full of lies and booty and [there is] no end to the plunder! [Ezek. 24:6, 9, 10; Hab. 2:12.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet she was carried away; she went into captivity. Her young children also were dashed in pieces at all the street corners; lots were cast [by the Assyrian officers] for her nobles, and all her great men were bound with chains.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You will be drunk [Nineveh, with the cup of God''s wrath]; you will be dazed. You will seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' require a refuge because of the enemy.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All your fortresses are fig trees with early figs; if they are shaken they will fall into the mouth of the eater.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, your troops in the midst of you are [as weak and helpless as] women; the gates of your land are set wide open to your enemies [without effort]; fire consumes your bars.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Draw for yourself the water [necessary] for a [long continued] siege, make strong your fortresses! Go down into the clay pits and trample the mortar; make ready the brickkiln [to burn bricks for the bulwarks]!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [But] there [in the very midst of these preparations] will the fire devour you; the sword will cut you off; it will destroy you as the locusts [destroy]. Multiply yourselves like the licking locusts; make yourselves many like the swarming locusts!'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You increased your merchants more than the [visible] stars of the heavens. The swarming locust spreads itself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroys, and then flies away.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your princes are like the grasshoppers and your marshals like the swarms of locusts which encamp in the hedges on a cold day–but when the sun rises, they fly away, and no one knows where they are.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Your shepherds are asleep, O king of Assyria; your nobles are lying still [in death]. Your people are scattered on the mountains and there is no one to gather them.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There is no healing of your hurt; your wound is grievous. All who hear the news about you clap their hands over [what has happened to] you. For upon whom has not your [unceasing] evil come continually?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The cracking of the whip, the noise of the rattling of wheels, and prancing horses and chariots rumbling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bounding,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Horsemen mounting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' charging, the flashing sword, the gleaming spear, a multitude of slain and a great number of corpses, no end of corpses! [The horsemen] stumble over the corpses!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All because of the multitude of the harlotries [of Nineveh], the well-favored harlot, the mistress of deadly charms who betrays '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sells nations through her whoredoms [idolatry] and peoples through her enchantments.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Behold, I am against you, says the Lord of hosts, and I will lift up your skirts over your face, and I will let the nations look on your nakedness [O Nineveh] and the kingdoms on your shame.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I will cast abominable things at you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make you filthy, treat you with contempt, and make you a gazingstock.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And all who look on you will shrink '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' flee from you and say, Nineveh is laid waste; who will pity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bemoan her? Where [then] shall I seek comforters for you?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Are you better than No-amon [Thebes, capital of Upper Egypt], that dwelt by the rivers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' canals, that had the waters round about her, whose rampart was a sea [the Nile] and water her wall?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Ethiopia and Egypt were her strength, and that without limit. Put and the Libyans were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' helpers.'
