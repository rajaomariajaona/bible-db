document_id: PRO.23,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHEN YOU sit down to eat with a ruler, consider who '
  - type: text
    content: and
  - type: text
    content: ' what are before you;'
  '10':
  - type: text
    content: ' Remove not the ancient landmark and enter not into the fields of the fatherless, [Deut. 19:14; 27:17; Prov. 22:28.]'
  '11':
  - type: text
    content: ' For their Redeemer is mighty; He will plead their cause against you.'
  '12':
  - type: text
    content: ' Apply your mind to instruction '
  - type: text
    content: and
  - type: text
    content: ' correction and your ears to words of knowledge.'
  '13':
  - type: text
    content: ' Withhold not discipline from the child; for if you strike '
  - type: text
    content: and
  - type: text
    content: ' punish him with the [reedlike] rod, he will not die.'
  '14':
  - type: text
    content: ' You shall whip him with the rod and deliver his life from Sheol (Hades, the place of the dead).'
  '15':
  - type: text
    content: ' My son, if your heart is wise, my heart will be glad, even mine;'
  '16':
  - type: text
    content: ' Yes, my heart will rejoice when your lips speak right things.'
  '17':
  - type: text
    content: ' Let not your heart envy sinners, but continue in the reverent '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord all the day long.'
  '18':
  - type: text
    content: ' For surely there is a latter end [a future and a reward], and your hope '
  - type: text
    content: and
  - type: text
    content: ' expectation shall not be cut off.'
  '19':
  - type: text
    content: ' Hear, my son, and be wise, and direct your mind in the way [of the Lord].'
  '2':
  - type: text
    content: ' For you will put a knife to your throat if you are a man given to desire.'
  '20':
  - type: text
    content: ' Do not associate with winebibbers; be not among them '
  - type: text
    content: nor
  - type: text
    content: ' among gluttonous eaters of meat, [Isa. 5:22; Luke 21:34; Rom. 13:13; Eph. 5:18.]'
  '21':
  - type: text
    content: ' For the drunkard and the glutton shall come to poverty, and drowsiness shall clothe a man with rags.'
  '22':
  - type: text
    content: ' Hearken to your father, who begot you, and despise not your mother when she is old.'
  '23':
  - type: text
    content: ' Buy the truth and sell it not; not only that, but also get discernment '
  - type: text
    content: and
  - type: text
    content: ' judgment, instruction and understanding.'
  '24':
  - type: text
    content: ' The father of the [uncompromisingly] righteous (the upright, in right standing with God) shall greatly rejoice, and he who becomes the father of a wise child shall have joy in him.'
  '25':
  - type: text
    content: ' Let your father and your mother be glad, and let her who bore you rejoice.'
  '26':
  - type: text
    content: ' My son, give me your heart and let your eyes observe '
  - type: text
    content: and
  - type: text
    content: ' delight in my ways,'
  '27':
  - type: text
    content: ' For a harlot is a deep ditch, and a loose woman is a narrow pit.'
  '28':
  - type: text
    content: ' She also lies in wait as a robber '
  - type: text
    content: or
  - type: text
    content: ' as one waits for prey, and she increases the treacherous among men.'
  '29':
  - type: text
    content: ' Who has woe? Who has sorrow? Who has strife? Who has complaining? Who has wounds without cause? Who has redness '
  - type: text
    content: and
  - type: text
    content: ' dimness of eyes?'
  '3':
  - type: text
    content: ' Be not desirous of his dainties, for it is deceitful food [offered with questionable motives].'
  '30':
  - type: text
    content: ' Those who tarry long at the wine, those who go to seek '
  - type: text
    content: and
  - type: text
    content: ' try mixed wine. [Prov. 20:1; Eph. 5:18.]'
  '31':
  - type: text
    content: ' Do not look at wine when it is red, when it sparkles in the wineglass, when it goes down smoothly.'
  '32':
  - type: text
    content: ' At the last it bites like a serpent and stings like an adder.'
  '33':
  - type: text
    content: ' [Under the influence of wine] your eyes will behold strange things [and loose women] and your mind will utter things turned the wrong way [untrue, incorrect, and petulant].'
  '34':
  - type: text
    content: ' Yes, you will be [as unsteady] as he who lies down in the midst of the sea, and [as open to disaster] as he who lies upon the top of a mast.'
  '35':
  - type: text
    content: ' You will say, They struck me, but I was not hurt! They beat me [as with a hammer], but I did not feel it! When shall I awake? I will crave '
  - type: text
    content: and
  - type: text
    content: ' seek more wine again [and escape reality].'
  '4':
  - type: text
    content: ' Weary not yourself to be rich; cease from your own [human] wisdom. [Prov. 28:20; I Tim. 6:9, 10.]'
  '5':
  - type: text
    content: ' Will you set your eyes upon wealth, when [suddenly] it is gone? For riches certainly make themselves wings, like an eagle that flies toward the heavens.'
  '6':
  - type: text
    content: ' Eat not the bread of him who has a hard, grudging, '
  - type: text
    content: and
  - type: text
    content: ' envious eye, neither desire his dainty foods;'
  '7':
  - type: text
    content: ' For as he thinks in his heart, so is he. As one who reckons, he says to you, eat and drink, yet his heart is not with you [but is grudging the cost].'
  '8':
  - type: text
    content: ' The morsel which you have eaten you will vomit up, and your complimentary words will be wasted.'
  '9':
  - type: text
    content: ' Speak not in the ears of a [self-confident] fool, for he will despise the [godly] Wisdom of your words. [Isa. 32:6.]'
