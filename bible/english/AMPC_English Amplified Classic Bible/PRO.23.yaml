document_id: PRO.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN YOU sit down to eat with a ruler, consider who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what are before you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For you will put a knife to your throat if you are a man given to desire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Be not desirous of his dainties, for it is deceitful food [offered with questionable motives].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Weary not yourself to be rich; cease from your own [human] wisdom. [Prov. 28:20; I Tim. 6:9, 10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Will you set your eyes upon wealth, when [suddenly] it is gone? For riches certainly make themselves wings, like an eagle that flies toward the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Eat not the bread of him who has a hard, grudging, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' envious eye, neither desire his dainty foods;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For as he thinks in his heart, so is he. As one who reckons, he says to you, eat and drink, yet his heart is not with you [but is grudging the cost].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The morsel which you have eaten you will vomit up, and your complimentary words will be wasted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Speak not in the ears of a [self-confident] fool, for he will despise the [godly] Wisdom of your words. [Isa. 32:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Remove not the ancient landmark and enter not into the fields of the fatherless, [Deut. 19:14; 27:17; Prov. 22:28.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For their Redeemer is mighty; He will plead their cause against you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Apply your mind to instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correction and your ears to words of knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Withhold not discipline from the child; for if you strike '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish him with the [reedlike] rod, he will not die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' You shall whip him with the rod and deliver his life from Sheol (Hades, the place of the dead).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' My son, if your heart is wise, my heart will be glad, even mine;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Yes, my heart will rejoice when your lips speak right things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Let not your heart envy sinners, but continue in the reverent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear of the Lord all the day long.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' For surely there is a latter end [a future and a reward], and your hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectation shall not be cut off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Hear, my son, and be wise, and direct your mind in the way [of the Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Do not associate with winebibbers; be not among them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' among gluttonous eaters of meat, [Isa. 5:22; Luke 21:34; Rom. 13:13; Eph. 5:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For the drunkard and the glutton shall come to poverty, and drowsiness shall clothe a man with rags.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Hearken to your father, who begot you, and despise not your mother when she is old.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Buy the truth and sell it not; not only that, but also get discernment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judgment, instruction and understanding.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The father of the [uncompromisingly] righteous (the upright, in right standing with God) shall greatly rejoice, and he who becomes the father of a wise child shall have joy in him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Let your father and your mother be glad, and let her who bore you rejoice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' My son, give me your heart and let your eyes observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight in my ways,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For a harlot is a deep ditch, and a loose woman is a narrow pit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' She also lies in wait as a robber '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' as one waits for prey, and she increases the treacherous among men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Who has woe? Who has sorrow? Who has strife? Who has complaining? Who has wounds without cause? Who has redness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dimness of eyes?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Those who tarry long at the wine, those who go to seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' try mixed wine. [Prov. 20:1; Eph. 5:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Do not look at wine when it is red, when it sparkles in the wineglass, when it goes down smoothly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' At the last it bites like a serpent and stings like an adder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' [Under the influence of wine] your eyes will behold strange things [and loose women] and your mind will utter things turned the wrong way [untrue, incorrect, and petulant].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Yes, you will be [as unsteady] as he who lies down in the midst of the sea, and [as open to disaster] as he who lies upon the top of a mast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' You will say, They struck me, but I was not hurt! They beat me [as with a hammer], but I did not feel it! When shall I awake? I will crave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seek more wine again [and escape reality].'
