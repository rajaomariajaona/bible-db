document_id: JHN.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I HAVE told you all these things, so that you should not be offended (taken unawares and falter, or be caused to stumble and fall away). [I told you to keep you from being scandalized and repelled.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' About righteousness (uprightness of heart and right standing with God), because I go to My Father, and you will see Me no longer;'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' About judgment, because the ruler (evil genius, prince) of this world [Satan] is judged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sentence already is passed upon him.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have still many things to say to you, but you are not able to bear them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' to take them upon you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' to grasp them now.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when He, the Spirit of Truth (the Truth-giving Spirit) comes, He will guide you into all the Truth (the whole, full Truth). For He will not speak His own message [on His own authority]; but He will tell whatever He hears [from the Father; He will give the message that has been given to Him], and He will announce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' declare to you the things that are to come [that will happen in the future].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He will honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorify Me, because He will take of (receive, draw upon) what is Mine and will reveal (declare, disclose, transmit) it to you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Everything that the Father has is Mine. That is what I meant when I said that He [the Spirit] will take the things that are Mine and will reveal (declare, disclose, transmit) it to you.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In a little while you will no longer see Me, and again after a short while you will see Me.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So some of His disciples questioned among themselves, What does He mean when He tells us, In a little while you will no longer see Me, and again after a short while you will see Me, and, Because I go to My Father?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' What does He mean by a little while? We do not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' understand what He is talking about.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus knew that they wanted to ask Him, so He said to them, Are you wondering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inquiring among yourselves what I meant when I said, In a little while you will no longer see Me, and again after a short while you will see Me?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They will put you out of (expel you from) the synagogues; but an hour is coming when whoever kills you will think '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' claim that he has offered service to God.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I assure you, most solemnly I tell you, that you shall weep and grieve, but the world will rejoice. You will be sorrowful, but your sorrow will be turned into joy.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A woman, when she gives birth to a child, has grief (anguish, agony) because her time has come. But when she has delivered the child, she no longer remembers her pain (trouble, anguish) because she is so glad that a man (a child, a human being) has been born into the world.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So for the present you are also in sorrow (in distress and depressed); but I will see you again and [then] your hearts will rejoice, and no one can take from you your joy (gladness, delight).'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when that time comes, you will ask nothing of Me [you will need to ask Me no questions]. I assure you, most solemnly I tell you, that My Father will grant you whatever you ask in My Name [as presenting all that I AM]. [Exod. 3:14.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Up to this time you have not asked a [single] thing in My Name [as presenting all that I AM]; but now ask '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep on asking and you will receive, so that your joy (gladness, delight) may be full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have told you these things in parables (veiled language, allegories, dark sayings); the hour is now coming when I shall no longer speak to you in figures of speech, but I shall tell you about the Father in plain words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' openly (without reserve).'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At that time you will ask (pray) in My Name; and I am not saying that I will ask the Father on your behalf [for it will be unnecessary].'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the Father Himself [tenderly] loves you because you have loved Me and have believed that I came out from the Father.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I came out from the Father and have come into the world; again, I am leaving the world and going to the Father.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' His disciples said, Ah, now You are speaking plainly to us and not in parables (veiled language and figures of speech)!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they will do this because they have not known the Father or Me.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now we know that You are acquainted with everything and have no need to be asked questions. Because of this we believe that you [really] came from God.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus answered them, Do you now believe? [Do you believe it at last?]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But take notice, the hour is coming, and it has arrived, when you will all be dispersed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scattered, every man to his own home, leaving Me alone. Yet I am not alone, because the Father is with Me.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have told you these things, so that in Me you may have [perfect] peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidence. In the world you have tribulation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trials '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' frustration; but be of good cheer [take courage; be confident, certain, undaunted]! For I have overcome the world. [I have deprived it of power to harm you and have conquered it for you.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But I have told you these things now, so that when they occur you will remember that I told you of them. I did not say these things to you from the beginning, because I was with you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But now I am going to Him Who sent Me, yet none of you asks Me, Where are You going?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But because I have said these things to you, sorrow has filled your hearts [taken complete possession of them].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' However, I am telling you nothing but the truth when I say it is profitable (good, expedient, advantageous) for you that I go away. Because if I do not go away, the Comforter (Counselor, Helper, Advocate, Intercessor, Strengthener, Standby) will not come to you [into close fellowship with you]; but if I go away, I will send Him to you [to be in close fellowship with you].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when He comes, He will convict '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' convince the world '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bring demonstration to it about sin and about righteousness (uprightness of heart and right standing with God) and about judgment:'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' About sin, because they do not believe in Me [trust in, rely on, and adhere to Me];'
