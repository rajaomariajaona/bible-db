document_id: ISA.57,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE RIGHTEOUS man perishes, and no one lays it to heart; and merciful '
  - type: text
    content: and
  - type: text
    content: ' devout men are taken away, with no one considering that the uncompromisingly upright '
  - type: text
    content: and
  - type: text
    content: ' godly person is taken away from the calamity '
  - type: text
    content: and
  - type: text
    content: ' evil to come [even through wickedness].'
  '10':
  - type: text
    content: ' You were wearied with the length of your way [in trying to find rest and satisfaction in alliances apart from the true God], yet you did not say, There is no result '
  - type: text
    content: or
  - type: text
    content: ' profit. You found quickened strength; therefore you were not faint '
  - type: text
    content: or
  - type: text
    content: ' heartsick [or penitent].'
  '11':
  - type: text
    content: ' Of whom have you been so afraid and in dread that you lied '
  - type: text
    content: and
  - type: text
    content: ' were treacherous and did not [seriously] remember Me, did not even give Me a thought? Have I not been silent, even for a long time, and so you do not fear Me?'
  '12':
  - type: text
    content: ' I will expose your [pretended] righteousness and your doings, but they will not help you.'
  '13':
  - type: text
    content: ' When you cry out, let your [rabble] collection of idols deliver you! But the wind shall take them all, a breath shall carry them away. But he who takes refuge in Me shall possess the land [Judea] and shall inherit My holy mountain [Zion, also the heavenly inheritance and the spiritual Zion]. [Ps. 37:9, 11; 69:35, 36; Isa. 49:8; Matt. 5:5; Heb. 12:22.]'
  '14':
  - type: text
    content: ' And the word of One shall go forth, Cast up, cast up, prepare the way! Take up the stumbling block out of the way [of the spiritual return] of My people.'
  '15':
  - type: text
    content: ' For thus says the high and lofty One–He Who inhabits eternity, Whose name is Holy: I dwell in the high and holy place, but with him also who is of a thoroughly penitent and humble spirit, to revive the spirit of the humble and to revive the heart of the thoroughly penitent [bruised with sorrow for sin]. [Matt. 5:3.]'
  '16':
  - type: text
    content: ' For I will not contend forever, neither will I be angry always, for [if I did stay angry] the spirit [of man] would faint '
  - type: text
    content: and
  - type: text
    content: ' be consumed before Me, and [My purpose in] creating the souls of men would be frustrated.'
  '17':
  - type: text
    content: ' Because of the iniquity of his [Judah''s] covetousness '
  - type: text
    content: and
  - type: text
    content: ' unjust gain I was angry and smote him. I hid my face and was angry, and he went on turning away '
  - type: text
    content: and
  - type: text
    content: ' backsliding in the way of his [own willful] heart.'
  '18':
  - type: text
    content: ' I have seen his [willful] ways, but I will heal him; I will lead him also and will recompense him and restore comfort to him and to those who mourn for him. [Isa. 61:1, 2; 66:10.]'
  '19':
  - type: text
    content: ' Peace, peace, to him who is far off [both Jew and Gentile] and to him who is near! says the Lord; I create the fruit of his lips, and I will heal him [make his lips blossom anew with speech in thankful praise]. [Acts 2:39; Eph. 2:13-17, 18; Heb. 13:15.]'
  '2':
  - type: text
    content: ' He [in death] enters into peace; they rest in their beds, each one who walks straight '
  - type: text
    content: and
  - type: text
    content: ' in his uprightness.'
  '20':
  - type: text
    content: ' But the wicked are like the troubled sea, for it cannot rest, and its waters cast up mire and dirt.'
  '21':
  - type: text
    content: ' There is no peace, says my God, for the wicked.'
  '3':
  - type: text
    content: ' But come close, you sons of a sorceress [nursed in witchcraft and superstition], you offspring of an adulterer and a harlot.'
  '4':
  - type: text
    content: ' Against whom do you make sport '
  - type: text
    content: and
  - type: text
    content: ' take your delight? Against whom do you open wide your mouth and put out your tongue? Are you not yourselves the children of transgression, the offspring of deceit–'
  '5':
  - type: text
    content: ' You who burn with lust [inflaming yourselves with idols] among the oaks, under every green tree, you who slay the children [in sacrifice] in the valleys under the clefts of the rocks?'
  '6':
  - type: text
    content: ' Among the smooth stones of the valley is your portion; they, they [the idols] are your lot; to them you have poured out a drink offering, you have offered a cereal offering. Should I be quiet in spite of all these things [and leave them unpunished–bearing them with patience]?'
  '7':
  - type: text
    content: ' Upon a lofty and high mountain you have openly '
  - type: text
    content: and
  - type: text
    content: ' shamelessly set your [idolatrous and adulterous] bed; even there you went up to offer sacrifice [in spiritual unfaithfulness to your divine Husband].'
  '8':
  - type: text
    content: ' Behind the door and the doorpost you have set up your [idol] symbol [as a substitute for the Scripture text God ordered]. Deserting Me, you have uncovered and ascended and enlarged your bed; and you have made a [fresh] bargain for yourself with [the adulterers], and you loved their bed, where you saw [a beckoning hand or a passion-inflaming image]. [Deut. 6:5, 6, 9; 11:18, 20.]'
  '9':
  - type: text
    content: ' And you went to the king [of foreign lands with gifts] '
  - type: text
    content: or
  - type: text
    content: ' to Molech [the god] with oil and increased your perfumes '
  - type: text
    content: and
  - type: text
    content: ' ointments; you sent your messengers far off and debased yourself even to Sheol (Hades) [symbol of an abysmal depth of degradation].'
