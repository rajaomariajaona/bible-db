document_id: ISA.57
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE RIGHTEOUS man perishes, and no one lays it to heart; and merciful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devout men are taken away, with no one considering that the uncompromisingly upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly person is taken away from the calamity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil to come [even through wickedness].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He [in death] enters into peace; they rest in their beds, each one who walks straight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in his uprightness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But come close, you sons of a sorceress [nursed in witchcraft and superstition], you offspring of an adulterer and a harlot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Against whom do you make sport '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take your delight? Against whom do you open wide your mouth and put out your tongue? Are you not yourselves the children of transgression, the offspring of deceit–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You who burn with lust [inflaming yourselves with idols] among the oaks, under every green tree, you who slay the children [in sacrifice] in the valleys under the clefts of the rocks?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Among the smooth stones of the valley is your portion; they, they [the idols] are your lot; to them you have poured out a drink offering, you have offered a cereal offering. Should I be quiet in spite of all these things [and leave them unpunished–bearing them with patience]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Upon a lofty and high mountain you have openly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shamelessly set your [idolatrous and adulterous] bed; even there you went up to offer sacrifice [in spiritual unfaithfulness to your divine Husband].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Behind the door and the doorpost you have set up your [idol] symbol [as a substitute for the Scripture text God ordered]. Deserting Me, you have uncovered and ascended and enlarged your bed; and you have made a [fresh] bargain for yourself with [the adulterers], and you loved their bed, where you saw [a beckoning hand or a passion-inflaming image]. [Deut. 6:5, 6, 9; 11:18, 20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And you went to the king [of foreign lands with gifts] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' to Molech [the god] with oil and increased your perfumes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ointments; you sent your messengers far off and debased yourself even to Sheol (Hades) [symbol of an abysmal depth of degradation].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You were wearied with the length of your way [in trying to find rest and satisfaction in alliances apart from the true God], yet you did not say, There is no result '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' profit. You found quickened strength; therefore you were not faint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' heartsick [or penitent].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Of whom have you been so afraid and in dread that you lied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were treacherous and did not [seriously] remember Me, did not even give Me a thought? Have I not been silent, even for a long time, and so you do not fear Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I will expose your [pretended] righteousness and your doings, but they will not help you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When you cry out, let your [rabble] collection of idols deliver you! But the wind shall take them all, a breath shall carry them away. But he who takes refuge in Me shall possess the land [Judea] and shall inherit My holy mountain [Zion, also the heavenly inheritance and the spiritual Zion]. [Ps. 37:9, 11; 69:35, 36; Isa. 49:8; Matt. 5:5; Heb. 12:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the word of One shall go forth, Cast up, cast up, prepare the way! Take up the stumbling block out of the way [of the spiritual return] of My people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For thus says the high and lofty One–He Who inhabits eternity, Whose name is Holy: I dwell in the high and holy place, but with him also who is of a thoroughly penitent and humble spirit, to revive the spirit of the humble and to revive the heart of the thoroughly penitent [bruised with sorrow for sin]. [Matt. 5:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For I will not contend forever, neither will I be angry always, for [if I did stay angry] the spirit [of man] would faint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be consumed before Me, and [My purpose in] creating the souls of men would be frustrated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Because of the iniquity of his [Judah''s] covetousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unjust gain I was angry and smote him. I hid my face and was angry, and he went on turning away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' backsliding in the way of his [own willful] heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' I have seen his [willful] ways, but I will heal him; I will lead him also and will recompense him and restore comfort to him and to those who mourn for him. [Isa. 61:1, 2; 66:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Peace, peace, to him who is far off [both Jew and Gentile] and to him who is near! says the Lord; I create the fruit of his lips, and I will heal him [make his lips blossom anew with speech in thankful praise]. [Acts 2:39; Eph. 2:13-17, 18; Heb. 13:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But the wicked are like the troubled sea, for it cannot rest, and its waters cast up mire and dirt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' There is no peace, says my God, for the wicked.'
