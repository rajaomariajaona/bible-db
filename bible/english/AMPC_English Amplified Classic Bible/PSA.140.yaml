document_id: PSA.140
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' DELIVER ME, O Lord, from evil men; preserve me from violent men;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' They devise mischiefs in their heart; continually they gather together '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stir up wars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' They sharpen their tongues like a serpent''s; adders'' poison is under their lips. Selah [pause, and calmly think of that]! [Rom. 3:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Keep me, O Lord, from the hands of the wicked; preserve me from the violent men who have purposed to thrust aside my steps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The proud have hidden a snare for me; they have spread cords as a net by the wayside, they have set traps for me. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' I said to the Lord, You are my God; give ear to the voice of my supplications, O Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' O God the Lord, the Strength of my salvation, You have covered my head in the day of battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Grant not, O Lord, the desires of the wicked; further not their wicked plot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' device, lest they exalt themselves. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Those who are fencing me in raise their heads; may the mischief of their own lips '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the very things they desire for me come upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Let burning coals fall upon them; let them be cast into the fire, into floods of water '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' deep water pits, from which they shall not rise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Let not a man of slanderous tongue be established in the earth; let evil hunt the violent man to overthrow him [let calamity follow his evildoings].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rest in confidence upon it that the Lord will maintain the cause of the afflicted, and will secure justice for the poor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' needy [of His believing children].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Surely the [uncompromisingly] righteous shall give thanks to Your name; the upright shall dwell in Your presence (before Your very face).'
