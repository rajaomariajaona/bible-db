document_id: PSA.140,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' DELIVER ME, O Lord, from evil men; preserve me from violent men;'
  '10':
  - type: text
    content: ' Let burning coals fall upon them; let them be cast into the fire, into floods of water '
  - type: text
    content: or
  - type: text
    content: ' deep water pits, from which they shall not rise.'
  '11':
  - type: text
    content: ' Let not a man of slanderous tongue be established in the earth; let evil hunt the violent man to overthrow him [let calamity follow his evildoings].'
  '12':
  - type: text
    content: ' I know '
  - type: text
    content: and
  - type: text
    content: ' rest in confidence upon it that the Lord will maintain the cause of the afflicted, and will secure justice for the poor '
  - type: text
    content: and
  - type: text
    content: ' needy [of His believing children].'
  '13':
  - type: text
    content: ' Surely the [uncompromisingly] righteous shall give thanks to Your name; the upright shall dwell in Your presence (before Your very face).'
  '2':
  - type: text
    content: ' They devise mischiefs in their heart; continually they gather together '
  - type: text
    content: and
  - type: text
    content: ' stir up wars.'
  '3':
  - type: text
    content: ' They sharpen their tongues like a serpent''s; adders'' poison is under their lips. Selah [pause, and calmly think of that]! [Rom. 3:13.]'
  '4':
  - type: text
    content: ' Keep me, O Lord, from the hands of the wicked; preserve me from the violent men who have purposed to thrust aside my steps.'
  '5':
  - type: text
    content: ' The proud have hidden a snare for me; they have spread cords as a net by the wayside, they have set traps for me. Selah [pause, and calmly think of that]!'
  '6':
  - type: text
    content: ' I said to the Lord, You are my God; give ear to the voice of my supplications, O Lord.'
  '7':
  - type: text
    content: ' O God the Lord, the Strength of my salvation, You have covered my head in the day of battle.'
  '8':
  - type: text
    content: ' Grant not, O Lord, the desires of the wicked; further not their wicked plot '
  - type: text
    content: and
  - type: text
    content: ' device, lest they exalt themselves. Selah [pause, and calmly think of that]!'
  '9':
  - type: text
    content: ' Those who are fencing me in raise their heads; may the mischief of their own lips '
  - type: text
    content: and
  - type: text
    content: ' the very things they desire for me come upon them.'
