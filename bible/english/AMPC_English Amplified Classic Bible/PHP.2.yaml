document_id: PHP.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO BY whatever [appeal to you there is in our mutual dwelling in Christ, by whatever] strengthening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consoling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraging [our relationship] in Him [affords], by whatever persuasive incentive there is in love, by whatever participation in the [Holy] Spirit [we share], and by whatever depth of affection and compassionate sympathy,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Fill up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete my joy by living in harmony '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' being of the same mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' one in purpose, having the same love, being in full accord and of one harmonious mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intention.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Do nothing from factional motives [through contentiousness, strife, selfishness, or for unworthy ends] or prompted by conceit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' empty arrogance. Instead, in the true spirit of humility (lowliness of mind) let each regard the others as better than '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' superior to himself [thinking more highly of one another than you do of yourselves].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Let each of you esteem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' look upon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be concerned for not [merely] his own interests, but also each for the interests of others.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Let this same attitude '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [humble] mind be in you which was in Christ Jesus: [Let Him be your example in humility:]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Who, although being essentially one with God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in the form of God [possessing the fullness of the attributes which make God God], did not think this equality with God was a thing to be eagerly grasped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' retained,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But stripped Himself [of all privileges and rightful dignity], so as to assume the guise of a servant (slave), in that He became like men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was born a human being.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And after He had appeared in human form, He abased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humbled Himself [still further] and carried His obedience to the extreme of death, even the death of the cross!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Therefore [because He stooped so low] God has highly exalted Him and has freely bestowed on Him the name that is above every name,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' That in (at) the name of Jesus every knee should (must) bow, in heaven and on earth and under the earth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And every tongue [frankly and openly] confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge that Jesus Christ is Lord, to the glory of God the Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Therefore, my dear ones, as you have always obeyed [my suggestions], so now, not only [with the enthusiasm you would show] in my presence but much more because I am absent, work out (cultivate, carry out to the goal, and fully complete) your own salvation with reverence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' awe and trembling (self-distrust, with serious caution, tenderness of conscience, watchfulness against temptation, timidly shrinking from whatever might offend God and discredit the name of Christ).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' [Not in your own strength] for it is God Who is all the while effectually at work in you [energizing and creating in you the power and desire], both to will and to work for His good pleasure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' satisfaction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Do all things without grumbling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faultfinding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complaining [against God] and questioning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doubting [among yourselves],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' That you may show yourselves to be blameless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guileless, innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncontaminated, children of God without blemish (faultless, unrebukable) in the midst of a crooked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked generation [spiritually perverted and perverse], among whom you are seen as bright lights (stars or beacons shining out clearly) in the [dark] world,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Holding out [to it] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offering [to all men] the Word of Life, so that in the day of Christ I may have something of which exultantly to rejoice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory in that I did not run my race in vain or spend my labor to no purpose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Even if [my lifeblood] must be poured out as a libation on the sacrificial offering of your faith [to God], still I am glad [to do it] and congratulate you all on [your share in] it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And you also in like manner be glad and congratulate me on [my share in] it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But I hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust in the Lord Jesus soon to send Timothy to you, so that I may also be encouraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cheered by learning news of you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For I have no one like him [no one of so kindred a spirit] who will be so genuinely interested in your welfare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devoted to your interests.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For the others all seek [to advance] their own interests, not those of Jesus Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But Timothy''s tested worth you know, how as a son with his father he has toiled with me zealously in [serving and helping to advance] the good news (the Gospel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' I hope therefore to send him promptly, just as soon as I know how my case is going to turn out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But [really] I am confident '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fully trusting in the Lord that shortly I myself shall come to you also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' However, I thought it necessary to send Epaphroditus [back] to you. [He has been] my brother and companion in labor and my fellow soldier, as well as [having come as] your special messenger (apostle) and minister to my need.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For he has been [homesick] longing for you all and has been distressed because you had heard that he was ill.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' He certainly was ill [too], near to death. But God had compassion on him, and not only on him but also on me, lest I should have sorrow [over him] coming upon sorrow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So I have sent him the more willingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eagerly, that you may be gladdened at seeing him again, and that I may be the less disquieted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Welcome him [home] then in the Lord with all joy, and honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' highly appreciate men like him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' For it was through working for Christ that he came so near death, risking his [very] life to complete the deficiencies in your service to me [which distance prevented you yourselves from rendering].'
