document_id: PHP.2,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SO BY whatever [appeal to you there is in our mutual dwelling in Christ, by whatever] strengthening '
  - type: text
    content: and
  - type: text
    content: ' consoling '
  - type: text
    content: and
  - type: text
    content: ' encouraging [our relationship] in Him [affords], by whatever persuasive incentive there is in love, by whatever participation in the [Holy] Spirit [we share], and by whatever depth of affection and compassionate sympathy,'
  '10':
  - type: text
    content: ' That in (at) the name of Jesus every knee should (must) bow, in heaven and on earth and under the earth,'
  '11':
  - type: text
    content: ' And every tongue [frankly and openly] confess '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that Jesus Christ is Lord, to the glory of God the Father.'
  '12':
  - type: text
    content: ' Therefore, my dear ones, as you have always obeyed [my suggestions], so now, not only [with the enthusiasm you would show] in my presence but much more because I am absent, work out (cultivate, carry out to the goal, and fully complete) your own salvation with reverence '
  - type: text
    content: and
  - type: text
    content: ' awe and trembling (self-distrust, with serious caution, tenderness of conscience, watchfulness against temptation, timidly shrinking from whatever might offend God and discredit the name of Christ).'
  '13':
  - type: text
    content: ' [Not in your own strength] for it is God Who is all the while effectually at work in you [energizing and creating in you the power and desire], both to will and to work for His good pleasure '
  - type: text
    content: and
  - type: text
    content: ' satisfaction '
  - type: text
    content: and
  - type: text
    content: ' delight.'
  '14':
  - type: text
    content: ' Do all things without grumbling '
  - type: text
    content: and
  - type: text
    content: ' faultfinding '
  - type: text
    content: and
  - type: text
    content: ' complaining [against God] and questioning '
  - type: text
    content: and
  - type: text
    content: ' doubting [among yourselves],'
  '15':
  - type: text
    content: ' That you may show yourselves to be blameless '
  - type: text
    content: and
  - type: text
    content: ' guileless, innocent '
  - type: text
    content: and
  - type: text
    content: ' uncontaminated, children of God without blemish (faultless, unrebukable) in the midst of a crooked '
  - type: text
    content: and
  - type: text
    content: ' wicked generation [spiritually perverted and perverse], among whom you are seen as bright lights (stars or beacons shining out clearly) in the [dark] world,'
  '16':
  - type: text
    content: ' Holding out [to it] '
  - type: text
    content: and
  - type: text
    content: ' offering [to all men] the Word of Life, so that in the day of Christ I may have something of which exultantly to rejoice '
  - type: text
    content: and
  - type: text
    content: ' glory in that I did not run my race in vain or spend my labor to no purpose.'
  '17':
  - type: text
    content: ' Even if [my lifeblood] must be poured out as a libation on the sacrificial offering of your faith [to God], still I am glad [to do it] and congratulate you all on [your share in] it.'
  '18':
  - type: text
    content: ' And you also in like manner be glad and congratulate me on [my share in] it.'
  '19':
  - type: text
    content: ' But I hope '
  - type: text
    content: and
  - type: text
    content: ' trust in the Lord Jesus soon to send Timothy to you, so that I may also be encouraged '
  - type: text
    content: and
  - type: text
    content: ' cheered by learning news of you.'
  '2':
  - type: text
    content: ' Fill up '
  - type: text
    content: and
  - type: text
    content: ' complete my joy by living in harmony '
  - type: text
    content: and
  - type: text
    content: ' being of the same mind '
  - type: text
    content: and
  - type: text
    content: ' one in purpose, having the same love, being in full accord and of one harmonious mind '
  - type: text
    content: and
  - type: text
    content: ' intention.'
  '20':
  - type: text
    content: ' For I have no one like him [no one of so kindred a spirit] who will be so genuinely interested in your welfare '
  - type: text
    content: and
  - type: text
    content: ' devoted to your interests.'
  '21':
  - type: text
    content: ' For the others all seek [to advance] their own interests, not those of Jesus Christ (the Messiah).'
  '22':
  - type: text
    content: ' But Timothy''s tested worth you know, how as a son with his father he has toiled with me zealously in [serving and helping to advance] the good news (the Gospel).'
  '23':
  - type: text
    content: ' I hope therefore to send him promptly, just as soon as I know how my case is going to turn out.'
  '24':
  - type: text
    content: ' But [really] I am confident '
  - type: text
    content: and
  - type: text
    content: ' fully trusting in the Lord that shortly I myself shall come to you also.'
  '25':
  - type: text
    content: ' However, I thought it necessary to send Epaphroditus [back] to you. [He has been] my brother and companion in labor and my fellow soldier, as well as [having come as] your special messenger (apostle) and minister to my need.'
  '26':
  - type: text
    content: ' For he has been [homesick] longing for you all and has been distressed because you had heard that he was ill.'
  '27':
  - type: text
    content: ' He certainly was ill [too], near to death. But God had compassion on him, and not only on him but also on me, lest I should have sorrow [over him] coming upon sorrow.'
  '28':
  - type: text
    content: ' So I have sent him the more willingly '
  - type: text
    content: and
  - type: text
    content: ' eagerly, that you may be gladdened at seeing him again, and that I may be the less disquieted.'
  '29':
  - type: text
    content: ' Welcome him [home] then in the Lord with all joy, and honor '
  - type: text
    content: and
  - type: text
    content: ' highly appreciate men like him,'
  '3':
  - type: text
    content: ' Do nothing from factional motives [through contentiousness, strife, selfishness, or for unworthy ends] or prompted by conceit '
  - type: text
    content: and
  - type: text
    content: ' empty arrogance. Instead, in the true spirit of humility (lowliness of mind) let each regard the others as better than '
  - type: text
    content: and
  - type: text
    content: ' superior to himself [thinking more highly of one another than you do of yourselves].'
  '30':
  - type: text
    content: ' For it was through working for Christ that he came so near death, risking his [very] life to complete the deficiencies in your service to me [which distance prevented you yourselves from rendering].'
  '4':
  - type: text
    content: ' Let each of you esteem '
  - type: text
    content: and
  - type: text
    content: ' look upon '
  - type: text
    content: and
  - type: text
    content: ' be concerned for not [merely] his own interests, but also each for the interests of others.'
  '5':
  - type: text
    content: ' Let this same attitude '
  - type: text
    content: and
  - type: text
    content: ' purpose '
  - type: text
    content: and
  - type: text
    content: ' [humble] mind be in you which was in Christ Jesus: [Let Him be your example in humility:]'
  '6':
  - type: text
    content: ' Who, although being essentially one with God '
  - type: text
    content: and
  - type: text
    content: ' in the form of God [possessing the fullness of the attributes which make God God], did not think this equality with God was a thing to be eagerly grasped '
  - type: text
    content: or
  - type: text
    content: ' retained,'
  '7':
  - type: text
    content: ' But stripped Himself [of all privileges and rightful dignity], so as to assume the guise of a servant (slave), in that He became like men '
  - type: text
    content: and
  - type: text
    content: ' was born a human being.'
  '8':
  - type: text
    content: ' And after He had appeared in human form, He abased '
  - type: text
    content: and
  - type: text
    content: ' humbled Himself [still further] and carried His obedience to the extreme of death, even the death of the cross!'
  '9':
  - type: text
    content: ' Therefore [because He stooped so low] God has highly exalted Him and has freely bestowed on Him the name that is above every name,'
