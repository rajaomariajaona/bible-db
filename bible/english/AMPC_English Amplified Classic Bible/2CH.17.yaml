document_id: 2CH.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' JEHOSHAPHAT HIS son reigned in Asa''s stead and strengthened himself against Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he placed forces in all the fortified cities of Judah and set garrisons in the land of Judah and in the cities of Ephraim which Asa his father had taken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The Lord was with Jehoshaphat because he walked in the first ways of his father [David]. He did not seek the Baals'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But sought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yearned with all his desire for the Lord, the God of his father, and walked in His commandments and not after the ways of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Therefore the Lord established the kingdom in his hand; and all Judah brought tribute to Jehoshaphat, and he had great riches and honor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' His heart was cheered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' his courage was high in the ways of the Lord; moreover, he took away the high places and the Asherim out of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Also in the third year of his reign he sent his princes Ben-hail, Obadiah, Zechariah, Nethanel, and Micaiah to teach in the cities of Judah;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And with them were the Levites–Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth, Jehonathan, Adonijah, Tobijah, and Tob-adonijah; and with these Levites were the priests Elishama and Jehoram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And they taught in Judah, and had the Book of the Law of the Lord with them; they went about throughout all the cities of Judah and taught among the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And a terror from the Lord fell upon all the kingdoms of the lands that were round about Judah, so that they made no war against Jehoshaphat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And some of the Philistines brought Jehoshaphat gifts and tribute silver, and the Arabs brought him flocks: 7,700 each of rams and of he-goats.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Jehoshaphat became very great. He built in Judah fortresses and store cities,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And he had many works in the cities of Judah, and soldiers, mighty men of courage, in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' This was the number of them by their fathers'' houses: Of Judah, the captains of thousands: Adnah the chief, with 300,000 mighty men of valor;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Next to him was Jehohanan the captain, with 280,000;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And next to him Amasiah son of Zichri, who willingly offered himself to the Lord, with 200,000 mighty men of valor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Of Benjamin: Eliada, a mighty man of valor, with 200,000 men armed with bow and shield;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Next to him was Jehozabad with 180,000 armed for war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' These were in the king''s service, besides those [he] had placed in fortified cities throughout all Judah.'
