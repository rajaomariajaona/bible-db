document_id: 2CH.17,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' JEHOSHAPHAT HIS son reigned in Asa''s stead and strengthened himself against Israel.'
  '10':
  - type: text
    content: ' And a terror from the Lord fell upon all the kingdoms of the lands that were round about Judah, so that they made no war against Jehoshaphat.'
  '11':
  - type: text
    content: ' And some of the Philistines brought Jehoshaphat gifts and tribute silver, and the Arabs brought him flocks: 7,700 each of rams and of he-goats.'
  '12':
  - type: text
    content: ' And Jehoshaphat became very great. He built in Judah fortresses and store cities,'
  '13':
  - type: text
    content: ' And he had many works in the cities of Judah, and soldiers, mighty men of courage, in Jerusalem.'
  '14':
  - type: text
    content: ' This was the number of them by their fathers'' houses: Of Judah, the captains of thousands: Adnah the chief, with 300,000 mighty men of valor;'
  '15':
  - type: text
    content: ' Next to him was Jehohanan the captain, with 280,000;'
  '16':
  - type: text
    content: ' And next to him Amasiah son of Zichri, who willingly offered himself to the Lord, with 200,000 mighty men of valor.'
  '17':
  - type: text
    content: ' Of Benjamin: Eliada, a mighty man of valor, with 200,000 men armed with bow and shield;'
  '18':
  - type: text
    content: ' Next to him was Jehozabad with 180,000 armed for war.'
  '19':
  - type: text
    content: ' These were in the king''s service, besides those [he] had placed in fortified cities throughout all Judah.'
  '2':
  - type: text
    content: ' And he placed forces in all the fortified cities of Judah and set garrisons in the land of Judah and in the cities of Ephraim which Asa his father had taken.'
  '3':
  - type: text
    content: ' The Lord was with Jehoshaphat because he walked in the first ways of his father [David]. He did not seek the Baals'
  '4':
  - type: text
    content: ' But sought '
  - type: text
    content: and
  - type: text
    content: ' yearned with all his desire for the Lord, the God of his father, and walked in His commandments and not after the ways of Israel.'
  '5':
  - type: text
    content: ' Therefore the Lord established the kingdom in his hand; and all Judah brought tribute to Jehoshaphat, and he had great riches and honor.'
  '6':
  - type: text
    content: ' His heart was cheered '
  - type: text
    content: and
  - type: text
    content: ' his courage was high in the ways of the Lord; moreover, he took away the high places and the Asherim out of Judah.'
  '7':
  - type: text
    content: ' Also in the third year of his reign he sent his princes Ben-hail, Obadiah, Zechariah, Nethanel, and Micaiah to teach in the cities of Judah;'
  '8':
  - type: text
    content: ' And with them were the Levites–Shemaiah, Nethaniah, Zebadiah, Asahel, Shemiramoth, Jehonathan, Adonijah, Tobijah, and Tob-adonijah; and with these Levites were the priests Elishama and Jehoram.'
  '9':
  - type: text
    content: ' And they taught in Judah, and had the Book of the Law of the Lord with them; they went about throughout all the cities of Judah and taught among the people.'
