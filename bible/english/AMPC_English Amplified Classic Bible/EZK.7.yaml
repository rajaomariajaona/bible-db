document_id: EZK.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MOREOVER, THE word of the Lord came to me, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Also, son of man, thus says the Lord God to the land of Israel: An end! The end has come upon the four corners of the land. [Ezek. 11:13; Amos 8:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Now is the end upon you, and I will send My anger upon you and will judge you according to your ways and will bring upon you retribution for all your abominations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And My eye will not spare you, neither will I have pity; but I will bring recompense for your evil ways upon you, while your abominations are in the midst of you [calling down punishment from a righteous God]; and you shall know (recognize, understand, and realize) that I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thus says the Lord God: Behold, an evil is coming, [an evil so destructive and injurious, so sudden and violent, that it stands alone, not as a succession but as] only one evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' An end has come! The end has come! [The end–after sleeping so long] awakes against you. See, it has come!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Your turn (your doom) has come upon you, O inhabitant of the land; the time has come, the day is near, a day not of joyful shouting, but a day of tumult upon the mountains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now will I shortly pour out My wrath upon you and finish spending My anger against you, and I will judge you according to your ways and will recompense you with punishment for all your abominations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And My eye will not spare, nor will I have pity. I will punish you according to your ways while your abominations are right in the midst of you. And you shall know, understand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that it is I the Lord Who smites you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Behold, the day! Behold, it has come! Your doom has gone forth, the rod has blossomed, pride has budded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Violence has grown up into a rod of wickedness; none of [Israel] shall remain, none of their abundance, none of their wealth; neither shall there be preeminence among them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' wailing for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The time has come, the day draws near. Let not the buyer rejoice nor the seller mourn, for wrath is upon all their multitude.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For the seller shall not return to that which is sold, even were they yet alive. For the vision [of punishment] is touching [Israel''s] whole multitude; he shall not come back, neither shall any strengthen himself whose life is in his iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' They have blown the trumpet and have made all ready, but none goes to the battle, for My wrath is upon all their multitude.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The sword is without and pestilence and famine are within. He who is in the field shall die by the sword, and him who is in the city shall famine and pestilence devour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But those of them that escape shall escape, but shall be on the mountains like doves of the valleys, all of them moaning, every one in his iniquity''s [punishment].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' All hands shall be feeble and all knees shall be weak as water. [Isa. 13:7; Jer. 6:24; Ezek. 21:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' They shall also gird themselves with sackcloth; horror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dismay shall cover them, and shame shall be upon all faces and baldness upon all their heads [as evidence of grief].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' They shall cast their silver into the streets, and their gold shall be [discarded] like an unclean thing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rubbish; their silver and their gold shall not be able to deliver them in the day of the wrath of the Lord; they shall not satisfy their animal cravings nor fill their stomachs with them, for [wealth] has been the stumbling block of their iniquity. [Prov. 11:4; Zeph. 1:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' As for the beauty of gold for ornament, they turned it to pride and made of it the images of their abominations (idols) and of their detestable things. Therefore I will make it to them as an unclean thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And I will give it for plunder into the hands of strangers and to the wicked of the earth for a spoil, and they shall profane it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Also I will turn My face from them and they shall profane My secret treasure [the temple]; and robbers shall enter into it and profane it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Prepare the chain [of imprisonment], for the land is full of bloodguiltiness [murders committed with pretended formalities of justice] and the city is full of violence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Therefore I will bring in the worst of the [heathen] nations, who will take possession of the houses [of the people of Judah]; I will also silence their strongholds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put an end to their proud might, and their holy places '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' those who sanctify them shall be profaned.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Distress, panic, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction shall come, and they [of Judah] shall seek peace, and there shall be none.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Calamity shall come upon calamity and rumor shall be upon rumor, and they shall seek a vision of the prophet; and the law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruction shall cease from the [distracted] priest and counsel from the [dismayed] elders. [Ps. 74:9; Lam. 2:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' The king [of Judah] shall wear mourning and the prince shall clothe himself with garments of despair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolation, while the hands of the people of the land shall tremble [palsied by terror]; for I will do to them in accordance with their ways, and according to their deserts will I judge them; and they shall know, recognize, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that I am the Lord.'
