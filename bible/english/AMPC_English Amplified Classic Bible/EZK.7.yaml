document_id: EZK.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' MOREOVER, THE word of the Lord came to me, saying,'
  '10':
  - type: text
    content: ' Behold, the day! Behold, it has come! Your doom has gone forth, the rod has blossomed, pride has budded.'
  '11':
  - type: text
    content: ' Violence has grown up into a rod of wickedness; none of [Israel] shall remain, none of their abundance, none of their wealth; neither shall there be preeminence among them '
  - type: text
    content: or
  - type: text
    content: ' wailing for them.'
  '12':
  - type: text
    content: ' The time has come, the day draws near. Let not the buyer rejoice nor the seller mourn, for wrath is upon all their multitude.'
  '13':
  - type: text
    content: ' For the seller shall not return to that which is sold, even were they yet alive. For the vision [of punishment] is touching [Israel''s] whole multitude; he shall not come back, neither shall any strengthen himself whose life is in his iniquity.'
  '14':
  - type: text
    content: ' They have blown the trumpet and have made all ready, but none goes to the battle, for My wrath is upon all their multitude.'
  '15':
  - type: text
    content: ' The sword is without and pestilence and famine are within. He who is in the field shall die by the sword, and him who is in the city shall famine and pestilence devour.'
  '16':
  - type: text
    content: ' But those of them that escape shall escape, but shall be on the mountains like doves of the valleys, all of them moaning, every one in his iniquity''s [punishment].'
  '17':
  - type: text
    content: ' All hands shall be feeble and all knees shall be weak as water. [Isa. 13:7; Jer. 6:24; Ezek. 21:7.]'
  '18':
  - type: text
    content: ' They shall also gird themselves with sackcloth; horror '
  - type: text
    content: and
  - type: text
    content: ' dismay shall cover them, and shame shall be upon all faces and baldness upon all their heads [as evidence of grief].'
  '19':
  - type: text
    content: ' They shall cast their silver into the streets, and their gold shall be [discarded] like an unclean thing '
  - type: text
    content: or
  - type: text
    content: ' rubbish; their silver and their gold shall not be able to deliver them in the day of the wrath of the Lord; they shall not satisfy their animal cravings nor fill their stomachs with them, for [wealth] has been the stumbling block of their iniquity. [Prov. 11:4; Zeph. 1:18.]'
  '2':
  - type: text
    content: ' Also, son of man, thus says the Lord God to the land of Israel: An end! The end has come upon the four corners of the land. [Ezek. 11:13; Amos 8:2.]'
  '20':
  - type: text
    content: ' As for the beauty of gold for ornament, they turned it to pride and made of it the images of their abominations (idols) and of their detestable things. Therefore I will make it to them as an unclean thing.'
  '21':
  - type: text
    content: ' And I will give it for plunder into the hands of strangers and to the wicked of the earth for a spoil, and they shall profane it.'
  '22':
  - type: text
    content: ' Also I will turn My face from them and they shall profane My secret treasure [the temple]; and robbers shall enter into it and profane it.'
  '23':
  - type: text
    content: ' Prepare the chain [of imprisonment], for the land is full of bloodguiltiness [murders committed with pretended formalities of justice] and the city is full of violence.'
  '24':
  - type: text
    content: ' Therefore I will bring in the worst of the [heathen] nations, who will take possession of the houses [of the people of Judah]; I will also silence their strongholds '
  - type: text
    content: and
  - type: text
    content: ' put an end to their proud might, and their holy places '
  - type: text
    content: and
  - type: text
    content: ' those who sanctify them shall be profaned.'
  '25':
  - type: text
    content: ' Distress, panic, '
  - type: text
    content: and
  - type: text
    content: ' destruction shall come, and they [of Judah] shall seek peace, and there shall be none.'
  '26':
  - type: text
    content: ' Calamity shall come upon calamity and rumor shall be upon rumor, and they shall seek a vision of the prophet; and the law '
  - type: text
    content: and
  - type: text
    content: ' instruction shall cease from the [distracted] priest and counsel from the [dismayed] elders. [Ps. 74:9; Lam. 2:9.]'
  '27':
  - type: text
    content: ' The king [of Judah] shall wear mourning and the prince shall clothe himself with garments of despair '
  - type: text
    content: and
  - type: text
    content: ' desolation, while the hands of the people of the land shall tremble [palsied by terror]; for I will do to them in accordance with their ways, and according to their deserts will I judge them; and they shall know, recognize, '
  - type: text
    content: and
  - type: text
    content: ' realize that I am the Lord.'
  '3':
  - type: text
    content: ' Now is the end upon you, and I will send My anger upon you and will judge you according to your ways and will bring upon you retribution for all your abominations.'
  '4':
  - type: text
    content: ' And My eye will not spare you, neither will I have pity; but I will bring recompense for your evil ways upon you, while your abominations are in the midst of you [calling down punishment from a righteous God]; and you shall know (recognize, understand, and realize) that I am the Lord.'
  '5':
  - type: text
    content: ' Thus says the Lord God: Behold, an evil is coming, [an evil so destructive and injurious, so sudden and violent, that it stands alone, not as a succession but as] only one evil.'
  '6':
  - type: text
    content: ' An end has come! The end has come! [The end–after sleeping so long] awakes against you. See, it has come!'
  '7':
  - type: text
    content: ' Your turn (your doom) has come upon you, O inhabitant of the land; the time has come, the day is near, a day not of joyful shouting, but a day of tumult upon the mountains.'
  '8':
  - type: text
    content: ' Now will I shortly pour out My wrath upon you and finish spending My anger against you, and I will judge you according to your ways and will recompense you with punishment for all your abominations.'
  '9':
  - type: text
    content: ' And My eye will not spare, nor will I have pity. I will punish you according to your ways while your abominations are right in the midst of you. And you shall know, understand, '
  - type: text
    content: and
  - type: text
    content: ' realize that it is I the Lord Who smites you.'
