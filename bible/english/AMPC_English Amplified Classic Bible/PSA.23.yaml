document_id: PSA.23,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Psalm of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my Shepherd [to feed, guide, and shield me], I shall not lack.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He makes me lie down in [fresh, tender] green pastures; He leads me beside the still '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restful waters. [Rev. 7:17.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' He refreshes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restores my life (my self); He leads me in the paths of righteousness [uprightness and right standing with Him–not for my earning it, but] for His name''s sake.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Yes, though I walk through the [deep, sunless] valley of the shadow of death, I will fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dread no evil, for You are with me; Your rod [to protect] and Your staff [to guide], they comfort me.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' You prepare a table before me in the presence of my enemies. You anoint my head with oil; my [brimming] cup runs over.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Surely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' only goodness, mercy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unfailing love shall follow me all the days of my life, and through the length of my days the house of the Lord [and His presence] shall be my dwelling place.'
