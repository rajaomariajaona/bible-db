document_id: PSA.23,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of David.
  - type: text
    content: ' THE '
  - type: text
    content: Lord
  - type: text
    content: ' is my Shepherd [to feed, guide, and shield me], I shall not lack.'
  '2':
  - type: text
    content: ' He makes me lie down in [fresh, tender] green pastures; He leads me beside the still '
  - type: text
    content: and
  - type: text
    content: ' restful waters. [Rev. 7:17.]'
  '3':
  - type: text
    content: ' He refreshes '
  - type: text
    content: and
  - type: text
    content: ' restores my life (my self); He leads me in the paths of righteousness [uprightness and right standing with Him–not for my earning it, but] for His name''s sake.'
  '4':
  - type: text
    content: ' Yes, though I walk through the [deep, sunless] valley of the shadow of death, I will fear '
  - type: text
    content: or
  - type: text
    content: ' dread no evil, for You are with me; Your rod [to protect] and Your staff [to guide], they comfort me.'
  '5':
  - type: text
    content: ' You prepare a table before me in the presence of my enemies. You anoint my head with oil; my [brimming] cup runs over.'
  '6':
  - type: text
    content: ' Surely '
  - type: text
    content: or
  - type: text
    content: ' only goodness, mercy, '
  - type: text
    content: and
  - type: text
    content: ' unfailing love shall follow me all the days of my life, and through the length of my days the house of the Lord [and His presence] shall be my dwelling place.'
