document_id: JOB.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THEN JOB answered,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' In His hand is the life of every living thing and the breath of all mankind.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Is it not the task of the ear to discriminate between [wise and unwise] words, just as the mouth distinguishes [between desirable and undesirable] food?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' With the aged [you say] is wisdom, and with length of days comes understanding.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' But [only] with [God] are [perfect] wisdom and might; He [alone] has [true] counsel and understanding.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Behold, He tears down, and it cannot be built again; He shuts a man in, and none can open.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' He withholds the waters, and the land dries up; again, He sends forth [rains], and they overwhelm the land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' transform it.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' With Him are might and wisdom; the deceived and the deceiver are His [and in His power].'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' He leads [great and scheming] counselors away stripped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' barefoot and makes the judges fools [in human estimation, by overthrowing their plans].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' He looses the fetters [ordered] by kings and has [the] waistcloth [of a slave] bound about their [own] loins.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' He leads away priests as spoil, and men firmly seated He overturns.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' No doubt you are the [only wise] people [in the world], and wisdom will die with you!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' He deprives of speech those who are trusted and takes away the discernment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discretion of the aged.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' He pours contempt on princes and loosens the belt of the strong [disabling them, bringing low the pride of the learned].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' He uncovers deep things out of darkness and brings into light black gloom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the shadow of death.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' He makes nations great, and He destroys them; He enlarges nations [and then straitens and shrinks them again], and leads them [away captive].'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' He takes away understanding from the leaders of the people of the land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of the earth, and causes them to wander in a wilderness where there is no path.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' They grope in the dark without light, and He makes them to stagger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wander like a drunken man.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' But I have understanding as well as you; I am not inferior to you. Who does not know such things as these [of God''s wisdom and might]?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' I am become one who is a laughingstock to his friend; I, one whom God answered when he called upon Him–a just, upright (blameless) man–laughed to scorn!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' In the thought of him who is at ease there is contempt for misfortune–but it is ready for those whose feet slip.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' The dwellings of robbers prosper; those who provoke God are [apparently] secure; God supplies them abundantly [who have no god but their own hands and power].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For ask now the animals, and they will teach you [that God does not deal with His creatures according to their character]; ask the birds of the air, and they will tell you;'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Or speak to the earth [with its other forms of life], and it will teach you; and the fish of the sea will declare [this truth] to you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Who [is so blind as] not to recognize in all these [that good and evil are promiscuously scattered throughout nature and human life] that it is God''s hand which does it [and God''s way]?'
