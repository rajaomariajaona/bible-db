document_id: DEU.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THESE ARE the words which Moses spoke to all Israel [still] on the [east] side of the Jordan [River] in the wilderness, in the Arabah [the deep valley running north and south from the eastern arm of the Red Sea to beyond the Dead Sea], over near Suph, between Paran and Tophel, Laban, Hazeroth, and Dizahab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' It is [only] eleven days'' journey from Horeb by the way of Mount Seir to Kadesh-barnea [on Canaan''s border; yet Israel took forty years to get beyond it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And in the fortieth year, on the first day of the eleventh month, Moses spoke to the Israelites according to all that the Lord had given him in commandment to them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' After He had defeated Sihon king of the Amorites, who lived in Heshbon, and Og king of Bashan, who lived in Ashtaroth [and] Edrei.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Beyond (east of) the Jordan in the land of Moab, Moses began to explain this law, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The Lord our God said to us in Horeb, You have dwelt long enough on this mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Turn and take up your journey and go to the hill country of the Amorites, and to all their neighbors in the Arabah, in the hill country, in the lowland, in the South (the Negeb), and on the coast, the land of the Canaanites, and Lebanon, as far as the great river, the river Euphrates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Behold, I have set the land before you; go in and take possession of the land which the Lord swore to your fathers, to Abraham, to Isaac, and to Jacob, to give to them and to their descendants after them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I said to you at that time, I am not able to bear you alone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The Lord your God has multiplied you, and behold, you are this day as the stars of the heavens for multitude.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' May the Lord, the God of your fathers, make you a thousand times as many as you are and bless you as He has promised you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' How can I bear alone the weariness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pressure and burden of you and your strife?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Choose wise, understanding, experienced, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' respected men according to your tribes, and I will make them heads over you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And you answered me, The thing which you have spoken is good for us to do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So I took the heads of your tribes, wise, experienced, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' respected men, and made them heads over you, commanders of thousands, and hundreds, and fifties, and tens, and officers according to your tribes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And I charged your judges at that time: Hear the cases between your brethren and judge righteously between a man and his brother or the stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sojourner who is with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' You shall not be partial in judgment; but you shall hear the small as well as the great. You shall not be afraid of the face of man, for the judgment is God''s. And the case that is too hard for you, you shall bring to me, and I will hear it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And I commanded you at that time all the things that you should do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And when we departed from Horeb, we went through all that great and terrible wilderness which you saw on the way to the hill country of the Amorites, as the Lord our God commanded us, and we came to Kadesh-barnea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And I said to you, You have come to the hill country of the Amorites, which the Lord our God gives us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Behold, the Lord your God has set the land before you; go up and possess it, as the Lord, the God of your fathers, has said to you. Fear not, neither be dismayed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then you all came near to me and said, Let us send men before us, that they may search out the land for us and bring us word again by what way we should go up and the cities into which we shall come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The thing pleased me well, and I took twelve men of you, one for each tribe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And they turned and went up into the hill country, and came to the Valley of Eshcol and spied it out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And they took of the fruit of the land in their hands and brought it down to us and brought us word again, and said, It is a good land which the Lord our God gives us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Yet you would not go up, but rebelled against the commandment of the Lord your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' You were peevish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discontented in your tents, and said, Because the Lord hated us, He brought us forth out of the land of Egypt to deliver us into the hand of the Amorites to destroy us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' To what are we going up? Our brethren have made our hearts melt, saying, The people are bigger and taller than we are; the cities are great and fortified to the heavens. And moreover we have seen the [giantlike] sons of the Anakim there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then I said to you, Dread not, neither be afraid of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The Lord your God Who goes before you, He will fight for you just as He did for you in Egypt before your eyes,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And in the wilderness, where you have seen how the Lord your God bore you, as a man carries his son, in all the way that you went until you came to this place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Yet in spite of this word you did not believe (trust, rely on, and remain steadfast to) the Lord your God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Who went in the way before you to search out a place to pitch your tents, in fire by night, to show you by what way you should go, and in the cloud by day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And the Lord heard your words, and was angered and He swore,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Not one of these men of this evil generation shall see that good land which I swore to give to your fathers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Except [Joshua, of course, and] Caleb son of Jephunneh; he shall see it, and to him and to his children I will give the land upon which he has walked, because he has wholly followed the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' The Lord was angry with me also for your sakes, and said, You also shall not enter Canaan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But Joshua son of Nun, who stands before you, he shall enter there. Encourage him, for he shall cause Israel to inherit it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Moreover, your little ones whom you said would become a prey, and your children who at this time cannot discern between good and evil, they shall enter Canaan, and to them I will give it and they shall possess it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' But as for you, turn and journey into the wilderness by way of the Red Sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Then you said to me, We have sinned against the Lord. We will go up and fight, as the Lord our God commanded us. And you girded on every man his battle weapons, and thought it a simple matter to go up into the hill country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And the Lord said to me, Say to them, Do not go up or fight, for I am not among you–lest you be dangerously hurt by your enemies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' So I spoke to you, and you would not hear, but rebelled against the commandment of the Lord, and were presumptuous and went up into the hill country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Then the Amorites who lived in that hill country came out against you and chased you as bees do and struck you down in Seir as far as Hormah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And you returned and wept before the Lord, but the Lord would not heed your voice or listen to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' So you remained in Kadesh; many days you remained there.'
