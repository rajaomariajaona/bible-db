document_id: ACT.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE former account [which I prepared], O Theophilus, I made [a continuous report] dealing with all the things which Jesus began to do and to teach [Luke 1:1-4.]'
  '10':
  - type: text
    content: ' And while they were gazing intently into heaven as He went, behold, two men [dressed] in white robes suddenly stood beside them,'
  '11':
  - type: text
    content: ' Who said, Men of Galilee, why do you stand gazing into heaven? This same Jesus, Who was caught away '
  - type: text
    content: and
  - type: text
    content: ' lifted up from among you into heaven, will return in [just] the same way in which you saw Him go into heaven.'
  '12':
  - type: text
    content: ' Then [the disciples] went back to Jerusalem from the hill called Olivet, which is near Jerusalem, [only] a Sabbath day''s journey (three-quarters of a mile) away.'
  '13':
  - type: text
    content: ' And when they had entered [the city], they mounted [the stairs] to the upper room where they were [indefinitely] staying–Peter and John and James and Andrew; Philip and Thomas, Bartholomew and Matthew; James son of Alphaeus and Simon the Zealot, and Judas [son] of James.'
  '14':
  - type: text
    content: ' All of these with their minds in full agreement devoted themselves steadfastly to prayer, [waiting together] with the women and Mary the mother of Jesus, and with His brothers.'
  '15':
  - type: text
    content: ' Now on one of those days Peter arose among the brethren, the whole number of whom gathered together was about a hundred and twenty.'
  '16':
  - type: text
    content: ' Brethren, he said, it was necessary that the Scripture be fulfilled which the Holy Spirit foretold by the lips of David, about Judas who acted as guide to those who arrested Jesus.'
  '17':
  - type: text
    content: ' For he was counted among us and received [by divine allotment] his portion in this ministry.'
  '18':
  - type: text
    content: ' Now this man obtained a piece of land with the [money paid him as a] reward for his treachery '
  - type: text
    content: and
  - type: text
    content: ' wickedness, and falling headlong he burst open in the middle [of his body] and all his intestines poured forth.'
  '19':
  - type: text
    content: ' And all the residents of Jerusalem became acquainted with the facts, so that they called the piece of land in their own dialect–Akeldama, that is, Field of Blood.'
  '2':
  - type: text
    content: ' Until the day when He ascended, after He through the Holy Spirit had instructed '
  - type: text
    content: and
  - type: text
    content: ' commanded the apostles (special messengers) whom He had chosen.'
  '20':
  - type: text
    content: ' For in the book of Psalms it is written, Let his place of residence become deserted '
  - type: text
    content: and
  - type: text
    content: ' gloomy, and let there be no one to live in it; and [again], Let another take his position '
  - type: text
    content: or
  - type: text
    content: ' overseership. [Ps. 69:25; 109:8.]'
  '21':
  - type: text
    content: ' So one of the [other] men who have accompanied us [apostles] during all the time that the Lord Jesus went in and out among us,'
  '22':
  - type: text
    content: ' From the baptism of John at the outset until the day when He was taken up from among us–one of these men must join with us and become a witness to testify to His resurrection.'
  '23':
  - type: text
    content: ' And they accordingly proposed (nominated) two men, Joseph called Barsabbas, who was surnamed Justus, and Matthias.'
  '24':
  - type: text
    content: ' And they prayed and said, You, Lord, Who know all hearts (their thoughts, passions, desires, appetites, purposes, and endeavors), indicate to us which one of these two You have chosen'
  '25':
  - type: text
    content: ' To take the place in this ministry and receive the position of an apostle, from which Judas fell away '
  - type: text
    content: and
  - type: text
    content: ' went astray to go [where he belonged] to his own [proper] place.'
  '26':
  - type: text
    content: ' And they drew lots [between the two], and the lot fell on Matthias; and he was added to '
  - type: text
    content: and
  - type: text
    content: ' counted with the eleven apostles (special messengers).'
  '3':
  - type: text
    content: ' To them also He showed Himself alive after His passion (His suffering in the garden and on the cross) by [a series of] many convincing demonstrations [unquestionable evidences and infallible proofs], appearing to them during forty days and talking [to them] about the things of the kingdom of God.'
  '4':
  - type: text
    content: ' And while being in their company '
  - type: text
    content: and
  - type: text
    content: ' eating with them, He commanded them not to leave Jerusalem but to wait for what the Father had promised, Of which [He said] you have heard Me speak. [John 14:16, 26; 15:26.]'
  '5':
  - type: text
    content: ' For John baptized with water, but not many days from now you shall be baptized with (placed in, introduced into) the Holy Spirit.'
  '6':
  - type: text
    content: ' So when they were assembled, they asked Him, Lord, is this the time when You will reestablish the kingdom '
  - type: text
    content: and
  - type: text
    content: ' restore it to Israel?'
  '7':
  - type: text
    content: ' He said to them, It is not for you to become acquainted with '
  - type: text
    content: and
  - type: text
    content: ' know what time brings [the things and events of time and their definite periods] or fixed years and seasons (their critical niche in time), which the Father has appointed (fixed and reserved) by His own choice '
  - type: text
    content: and
  - type: text
    content: ' authority '
  - type: text
    content: and
  - type: text
    content: ' personal power.'
  '8':
  - type: text
    content: ' But you shall receive power (ability, efficiency, and might) when the Holy Spirit has come upon you, and you shall be My witnesses in Jerusalem and all Judea and Samaria and to the ends (the very bounds) of the earth.'
  '9':
  - type: text
    content: ' And when He had said this, even as they were looking [at Him], He was caught up, and a cloud received '
  - type: text
    content: and
  - type: text
    content: ' carried Him away out of their sight.'
