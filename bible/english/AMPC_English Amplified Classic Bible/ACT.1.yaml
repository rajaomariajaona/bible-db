document_id: ACT.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN THE former account [which I prepared], O Theophilus, I made [a continuous report] dealing with all the things which Jesus began to do and to teach [Luke 1:1-4.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And while they were gazing intently into heaven as He went, behold, two men [dressed] in white robes suddenly stood beside them,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Who said, Men of Galilee, why do you stand gazing into heaven? This same Jesus, Who was caught away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lifted up from among you into heaven, will return in [just] the same way in which you saw Him go into heaven.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then [the disciples] went back to Jerusalem from the hill called Olivet, which is near Jerusalem, [only] a Sabbath day''s journey (three-quarters of a mile) away.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And when they had entered [the city], they mounted [the stairs] to the upper room where they were [indefinitely] staying–Peter and John and James and Andrew; Philip and Thomas, Bartholomew and Matthew; James son of Alphaeus and Simon the Zealot, and Judas [son] of James.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' All of these with their minds in full agreement devoted themselves steadfastly to prayer, [waiting together] with the women and Mary the mother of Jesus, and with His brothers.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Now on one of those days Peter arose among the brethren, the whole number of whom gathered together was about a hundred and twenty.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Brethren, he said, it was necessary that the Scripture be fulfilled which the Holy Spirit foretold by the lips of David, about Judas who acted as guide to those who arrested Jesus.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' For he was counted among us and received [by divine allotment] his portion in this ministry.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Now this man obtained a piece of land with the [money paid him as a] reward for his treachery '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wickedness, and falling headlong he burst open in the middle [of his body] and all his intestines poured forth.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And all the residents of Jerusalem became acquainted with the facts, so that they called the piece of land in their own dialect–Akeldama, that is, Field of Blood.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Until the day when He ascended, after He through the Holy Spirit had instructed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' commanded the apostles (special messengers) whom He had chosen.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' For in the book of Psalms it is written, Let his place of residence become deserted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gloomy, and let there be no one to live in it; and [again], Let another take his position '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' overseership. [Ps. 69:25; 109:8.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' So one of the [other] men who have accompanied us [apostles] during all the time that the Lord Jesus went in and out among us,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' From the baptism of John at the outset until the day when He was taken up from among us–one of these men must join with us and become a witness to testify to His resurrection.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And they accordingly proposed (nominated) two men, Joseph called Barsabbas, who was surnamed Justus, and Matthias.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And they prayed and said, You, Lord, Who know all hearts (their thoughts, passions, desires, appetites, purposes, and endeavors), indicate to us which one of these two You have chosen'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' To take the place in this ministry and receive the position of an apostle, from which Judas fell away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' went astray to go [where he belonged] to his own [proper] place.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And they drew lots [between the two], and the lot fell on Matthias; and he was added to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counted with the eleven apostles (special messengers).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' To them also He showed Himself alive after His passion (His suffering in the garden and on the cross) by [a series of] many convincing demonstrations [unquestionable evidences and infallible proofs], appearing to them during forty days and talking [to them] about the things of the kingdom of God.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And while being in their company '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eating with them, He commanded them not to leave Jerusalem but to wait for what the Father had promised, Of which [He said] you have heard Me speak. [John 14:16, 26; 15:26.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For John baptized with water, but not many days from now you shall be baptized with (placed in, introduced into) the Holy Spirit.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' So when they were assembled, they asked Him, Lord, is this the time when You will reestablish the kingdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restore it to Israel?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' He said to them, It is not for you to become acquainted with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know what time brings [the things and events of time and their definite periods] or fixed years and seasons (their critical niche in time), which the Father has appointed (fixed and reserved) by His own choice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' personal power.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But you shall receive power (ability, efficiency, and might) when the Holy Spirit has come upon you, and you shall be My witnesses in Jerusalem and all Judea and Samaria and to the ends (the very bounds) of the earth.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And when He had said this, even as they were looking [at Him], He was caught up, and a cloud received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carried Him away out of their sight.'
