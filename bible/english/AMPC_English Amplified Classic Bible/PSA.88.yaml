document_id: PSA.88
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A song. A Psalm of the sons of Korah. To the Chief Musician; set to chant mournfully. A didactic {or} reflective poem of Heman the Ezrahite.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of my salvation, I have cried to You for help by day; at night I am in Your presence. [Luke 18:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let my prayer come before You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' really enter into Your presence; incline Your ear to my cry!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For I am full of troubles, and my life draws near to Sheol (the place of the dead).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I am counted among those who go down into the pit (the grave); I am like a man who has no help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' strength [a mere shadow],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Cast away among the dead, like the slain that lie in a [nameless] grave, whom You [seriously] remember no more, and they are cut off from Your hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' You have laid me in the depths of the lowest pit, in darkness, in the deeps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Your wrath lies hard upon me, and You have afflicted me with all Your waves. Selah [pause, and calmly think of that]! [Ps. 42:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You have put my [familiar] friends far from me; You have made me an abomination to them. I am shut up, and I cannot come forth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' My eye grows dim because of sorrow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affliction. Lord, I have called daily on You; I have spread forth my hands to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Will You show wonders to the dead? Shall the departed arise and praise You? Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Shall Your steadfast love be declared in the grave? Or Your faithfulness in Abaddon (Sheol, as a place of ruin and destruction)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Shall Your wonders be known in the dark? And Your righteousness in the place of forgetfulness [where the dead forget and are forgotten]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But to You I cry, O Lord; and in the morning shall my prayer come to meet You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Lord, why do You cast me off? Why do You hide Your face from me? [Matt. 27:46.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I was afflicted and close to death from my youth up; while I suffer Your terrors I am distracted [I faint].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Your fierce wrath has swept over me; Your terrors have destroyed me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' They surround me like a flood all day long; together they have closed in upon me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Lover and friend have You put far from me; my familiar friends are darkness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the grave.'
