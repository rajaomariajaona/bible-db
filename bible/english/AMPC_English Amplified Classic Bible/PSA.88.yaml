document_id: PSA.88,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A song. A Psalm of the sons of Korah. To the Chief Musician; set to chant mournfully. A didactic {or} reflective poem of Heman the Ezrahite.
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of my salvation, I have cried to You for help by day; at night I am in Your presence. [Luke 18:7.]'
  '10':
  - type: text
    content: ' Will You show wonders to the dead? Shall the departed arise and praise You? Selah [pause, and calmly think of that]!'
  '11':
  - type: text
    content: ' Shall Your steadfast love be declared in the grave? Or Your faithfulness in Abaddon (Sheol, as a place of ruin and destruction)?'
  '12':
  - type: text
    content: ' Shall Your wonders be known in the dark? And Your righteousness in the place of forgetfulness [where the dead forget and are forgotten]?'
  '13':
  - type: text
    content: ' But to You I cry, O Lord; and in the morning shall my prayer come to meet You.'
  '14':
  - type: text
    content: ' Lord, why do You cast me off? Why do You hide Your face from me? [Matt. 27:46.]'
  '15':
  - type: text
    content: ' I was afflicted and close to death from my youth up; while I suffer Your terrors I am distracted [I faint].'
  '16':
  - type: text
    content: ' Your fierce wrath has swept over me; Your terrors have destroyed me.'
  '17':
  - type: text
    content: ' They surround me like a flood all day long; together they have closed in upon me.'
  '18':
  - type: text
    content: ' Lover and friend have You put far from me; my familiar friends are darkness '
  - type: text
    content: and
  - type: text
    content: ' the grave.'
  '2':
  - type: text
    content: ' Let my prayer come before You '
  - type: text
    content: and
  - type: text
    content: ' really enter into Your presence; incline Your ear to my cry!'
  '3':
  - type: text
    content: ' For I am full of troubles, and my life draws near to Sheol (the place of the dead).'
  '4':
  - type: text
    content: ' I am counted among those who go down into the pit (the grave); I am like a man who has no help '
  - type: text
    content: or
  - type: text
    content: ' strength [a mere shadow],'
  '5':
  - type: text
    content: ' Cast away among the dead, like the slain that lie in a [nameless] grave, whom You [seriously] remember no more, and they are cut off from Your hand.'
  '6':
  - type: text
    content: ' You have laid me in the depths of the lowest pit, in darkness, in the deeps.'
  '7':
  - type: text
    content: ' Your wrath lies hard upon me, and You have afflicted me with all Your waves. Selah [pause, and calmly think of that]! [Ps. 42:7.]'
  '8':
  - type: text
    content: ' You have put my [familiar] friends far from me; You have made me an abomination to them. I am shut up, and I cannot come forth.'
  '9':
  - type: text
    content: ' My eye grows dim because of sorrow '
  - type: text
    content: and
  - type: text
    content: ' affliction. Lord, I have called daily on You; I have spread forth my hands to You.'
