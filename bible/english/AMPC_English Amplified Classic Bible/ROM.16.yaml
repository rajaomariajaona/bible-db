document_id: ROM.16,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW I introduce '
  - type: text
    content: and
  - type: text
    content: ' commend to you our sister Phoebe, a deaconess of the church at Cenchreae,'
  '10':
  - type: text
    content: ' Greet Apelles, that one tried '
  - type: text
    content: and
  - type: text
    content: ' approved in Christ (the Messiah). Remember me to those who belong to the household of Aristobulus.'
  '11':
  - type: text
    content: ' Greet my tribal kinsman Herodion, and those in the Lord who belong to the household of Narcissus.'
  '12':
  - type: text
    content: ' Salute those workers in the Lord, Tryphaena and Tryphosa. Greet my dear Persis, who has worked so hard in the Lord.'
  '13':
  - type: text
    content: ' Remember me to Rufus, eminent in the Lord, also to his mother [who has been] a mother to me as well.'
  '14':
  - type: text
    content: ' Greet Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and the brethren who are with them.'
  '15':
  - type: text
    content: ' Greet Philologus, Julia, Nereus and his sister, and Olympas, and all the saints who are with them.'
  '16':
  - type: text
    content: ' Greet one another with a holy (consecrated) kiss. All the churches of Christ (the Messiah) wish to be remembered to you.'
  '17':
  - type: text
    content: ' I appeal to you, brethren, to be on your guard concerning those who create dissensions and difficulties '
  - type: text
    content: and
  - type: text
    content: ' cause divisions, in opposition to the doctrine (the teaching) which you have been taught. [I warn you to turn aside from them, to] avoid them.'
  '18':
  - type: text
    content: ' For such persons do not serve our Lord Christ but their own appetites '
  - type: text
    content: and
  - type: text
    content: ' base desires, and by ingratiating and flattering speech, they beguile the hearts of the unsuspecting '
  - type: text
    content: and
  - type: text
    content: ' simpleminded [people].'
  '19':
  - type: text
    content: ' For while your loyalty '
  - type: text
    content: and
  - type: text
    content: ' obedience is known to all, so that I rejoice over you, I would have you well versed '
  - type: text
    content: and
  - type: text
    content: ' wise as to what is good and innocent '
  - type: text
    content: and
  - type: text
    content: ' guileless as to what is evil.'
  '2':
  - type: text
    content: ' That you may receive her in the Lord [with a Christian welcome], as saints (God''s people) ought to receive one another. And help her in whatever matter she may require assistance from you, for she has been a helper of many including myself [shielding us from suffering].'
  '20':
  - type: text
    content: ' And the God of peace will soon crush Satan under your feet. The grace of our Lord Jesus Christ (the Messiah) be with you.'
  '21':
  - type: text
    content: ' Timothy, my fellow worker, wishes to be remembered to you, as do Lucius and Jason and Sosipater, my tribal kinsmen.'
  '22':
  - type: text
    content: ' I, Tertius, the writer of this letter, greet you in the Lord.'
  '23':
  - type: text
    content: ' Gaius, who is host to me and to the whole church here, greets you. So do Erastus, the city treasurer, and our brother Quartus.'
  '24':
  - type: text
    content: ' '
  - type: text
    content: The grace of our Lord Jesus Christ (the Messiah) be with you all. Amen (so be it).
  '25':
  - type: text
    content: ' Now to Him Who is able to strengthen you in the faith which is in accordance with my Gospel and the preaching of (concerning) Jesus Christ (the Messiah), according to the revelation (the unveiling) of the mystery of the plan of redemption which was kept in silence '
  - type: text
    content: and
  - type: text
    content: ' secret for long ages,'
  '26':
  - type: text
    content: ' But is now disclosed and through the prophetic Scriptures is made known to all nations, according to the command of the eternal God, [to win them] to obedience to the faith,'
  '27':
  - type: text
    content: ' To [the] only wise God be glory forevermore through Jesus Christ (the Anointed One)! Amen (so be it).'
  '3':
  - type: text
    content: ' Give my greetings to Prisca and Aquila, my fellow workers in Christ Jesus,'
  '4':
  - type: text
    content: ' Who risked their lives [endangering their very necks] for my life. To them not only I but also all the churches among the Gentiles give thanks.'
  '5':
  - type: text
    content: ' [Remember me] also to the church [that meets] in their house. Greet my beloved Epaenetus, who was a firstfruit (first convert) to Christ in Asia.'
  '6':
  - type: text
    content: ' Greet Mary, who has worked so hard among you.'
  '7':
  - type: text
    content: ' Remember me to Andronicus and Junias, my tribal kinsmen and once my fellow prisoners. They are men held in high esteem among the apostles, who also were in Christ before I was.'
  '8':
  - type: text
    content: ' Remember me to Ampliatus, my beloved in the Lord.'
  '9':
  - type: text
    content: ' Salute Urbanus, our fellow worker in Christ, and my dear Stachys.'
