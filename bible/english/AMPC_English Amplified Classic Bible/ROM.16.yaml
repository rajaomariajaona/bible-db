document_id: ROM.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW I introduce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' commend to you our sister Phoebe, a deaconess of the church at Cenchreae,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Greet Apelles, that one tried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' approved in Christ (the Messiah). Remember me to those who belong to the household of Aristobulus.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Greet my tribal kinsman Herodion, and those in the Lord who belong to the household of Narcissus.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Salute those workers in the Lord, Tryphaena and Tryphosa. Greet my dear Persis, who has worked so hard in the Lord.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Remember me to Rufus, eminent in the Lord, also to his mother [who has been] a mother to me as well.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Greet Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and the brethren who are with them.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Greet Philologus, Julia, Nereus and his sister, and Olympas, and all the saints who are with them.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Greet one another with a holy (consecrated) kiss. All the churches of Christ (the Messiah) wish to be remembered to you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' I appeal to you, brethren, to be on your guard concerning those who create dissensions and difficulties '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cause divisions, in opposition to the doctrine (the teaching) which you have been taught. [I warn you to turn aside from them, to] avoid them.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' For such persons do not serve our Lord Christ but their own appetites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' base desires, and by ingratiating and flattering speech, they beguile the hearts of the unsuspecting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' simpleminded [people].'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' For while your loyalty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obedience is known to all, so that I rejoice over you, I would have you well versed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wise as to what is good and innocent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guileless as to what is evil.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' That you may receive her in the Lord [with a Christian welcome], as saints (God''s people) ought to receive one another. And help her in whatever matter she may require assistance from you, for she has been a helper of many including myself [shielding us from suffering].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And the God of peace will soon crush Satan under your feet. The grace of our Lord Jesus Christ (the Messiah) be with you.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Timothy, my fellow worker, wishes to be remembered to you, as do Lucius and Jason and Sosipater, my tribal kinsmen.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' I, Tertius, the writer of this letter, greet you in the Lord.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Gaius, who is host to me and to the whole church here, greets you. So do Erastus, the city treasurer, and our brother Quartus.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The grace of our Lord Jesus Christ (the Messiah) be with you all. Amen (so be it).
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Now to Him Who is able to strengthen you in the faith which is in accordance with my Gospel and the preaching of (concerning) Jesus Christ (the Messiah), according to the revelation (the unveiling) of the mystery of the plan of redemption which was kept in silence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secret for long ages,'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' But is now disclosed and through the prophetic Scriptures is made known to all nations, according to the command of the eternal God, [to win them] to obedience to the faith,'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' To [the] only wise God be glory forevermore through Jesus Christ (the Anointed One)! Amen (so be it).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Give my greetings to Prisca and Aquila, my fellow workers in Christ Jesus,'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Who risked their lives [endangering their very necks] for my life. To them not only I but also all the churches among the Gentiles give thanks.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' [Remember me] also to the church [that meets] in their house. Greet my beloved Epaenetus, who was a firstfruit (first convert) to Christ in Asia.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Greet Mary, who has worked so hard among you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Remember me to Andronicus and Junias, my tribal kinsmen and once my fellow prisoners. They are men held in high esteem among the apostles, who also were in Christ before I was.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Remember me to Ampliatus, my beloved in the Lord.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Salute Urbanus, our fellow worker in Christ, and my dear Stachys.'
