document_id: PSA.64
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEAR MY voice, O God, in my complaint; guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preserve my life from the terror of the enemy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Hide me from the secret counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conspiracy of the ungodly, from the scheming of evildoers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Who whet their tongues like a sword, who aim venomous words like arrows,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Who shoot from ambush at the blameless man; suddenly do they shoot at him, without self-reproach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' fear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They encourage themselves in an evil purpose, they talk of laying snares secretly; they say, Who will discover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us
  - type: text
    text: ' ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They think out acts of injustice and say, We have accomplished a well-devised thing! For the inward thought of each one [is unsearchable] and his heart is deep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But God will shoot an unexpected arrow at them; and suddenly shall they be wounded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And they will be made to stumble, their own tongues turning against them; all who gaze upon them will shake their heads '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' flee away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And all men shall [reverently] fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be in awe; and they will declare the work of God, for they will wisely consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge that it is His doing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The [uncompromisingly] righteous shall be glad in the Lord and shall trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take refuge in Him; and all the upright in heart shall glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offer praise.'
