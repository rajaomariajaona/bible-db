document_id: PSA.64,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' HEAR MY voice, O God, in my complaint; guard '
  - type: text
    content: and
  - type: text
    content: ' preserve my life from the terror of the enemy.'
  '10':
  - type: text
    content: ' The [uncompromisingly] righteous shall be glad in the Lord and shall trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge in Him; and all the upright in heart shall glory '
  - type: text
    content: and
  - type: text
    content: ' offer praise.'
  '2':
  - type: text
    content: ' Hide me from the secret counsel '
  - type: text
    content: and
  - type: text
    content: ' conspiracy of the ungodly, from the scheming of evildoers,'
  '3':
  - type: text
    content: ' Who whet their tongues like a sword, who aim venomous words like arrows,'
  '4':
  - type: text
    content: ' Who shoot from ambush at the blameless man; suddenly do they shoot at him, without self-reproach '
  - type: text
    content: or
  - type: text
    content: ' fear.'
  '5':
  - type: text
    content: ' They encourage themselves in an evil purpose, they talk of laying snares secretly; they say, Who will discover '
  - type: text
    content: us
  - type: text
    content: ' ?'
  '6':
  - type: text
    content: ' They think out acts of injustice and say, We have accomplished a well-devised thing! For the inward thought of each one [is unsearchable] and his heart is deep.'
  '7':
  - type: text
    content: ' But God will shoot an unexpected arrow at them; and suddenly shall they be wounded.'
  '8':
  - type: text
    content: ' And they will be made to stumble, their own tongues turning against them; all who gaze upon them will shake their heads '
  - type: text
    content: and
  - type: text
    content: ' flee away.'
  '9':
  - type: text
    content: ' And all men shall [reverently] fear '
  - type: text
    content: and
  - type: text
    content: ' be in awe; and they will declare the work of God, for they will wisely consider '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that it is His doing.'
