  '3':
  - type: text
    content: ' And you shall tread down the lawless '
  - type: text
    content: and
  - type: text
    content: ' wicked, for they shall be ashes under the soles of your feet in the day that I shall do this, says the Lord of hosts.'
  '4':
  - type: text
    content: ' [Earnestly] remember the law of Moses, My servant, the statutes and the ordinances which I commanded him on [Mount] Horeb [to give] to all Israel.'
  '5':
  - type: text
    content: ' Behold, I will send you Elijah the prophet before the great and terrible day of the Lord comes. [Matt. 11:14; 17:10-13.]'
  '6':
  - type: text
    content: ' And he shall turn '
