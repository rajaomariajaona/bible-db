document_id: MAL.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR BEHOLD, the day comes that shall burn like an oven, and all the proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant, yes, and all that do wickedly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are lawless, shall be stubble; the day that comes shall burn them up, says the Lord of hosts, so that it will leave them neither root nor branch. [Isa. 5:21-25; Matt. 3:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But unto you who revere '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipfully fear My name shall the Sun of Righteousness arise with healing in His wings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His beams, and you shall go forth and gambol like calves [released] from the stall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leap for joy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And you shall tread down the lawless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked, for they shall be ashes under the soles of your feet in the day that I shall do this, says the Lord of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [Earnestly] remember the law of Moses, My servant, the statutes and the ordinances which I commanded him on [Mount] Horeb [to give] to all Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Behold, I will send you Elijah the prophet before the great and terrible day of the Lord comes. [Matt. 11:14; 17:10-13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he shall turn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reconcile the hearts of the [estranged] fathers to the [ungodly] children, and the hearts of the [rebellious] children to [the piety of] their fathers [a reconciliation produced by repentance of the ungodly], lest I come and smite the land with a curse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a ban of utter destruction. [Luke 1:17.]'
