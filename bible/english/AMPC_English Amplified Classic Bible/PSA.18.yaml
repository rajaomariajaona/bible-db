document_id: PSA.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'To the Chief Musician. +[A Psalm+] of David the servant of the Lord, who spoke the words of this song to the Lord on the day when the Lord delivered him from the hand of all his enemies and from the hand of Saul. And he said:'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I LOVE You fervently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devotedly, O Lord, my Strength.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The Lord is my Rock, my Fortress, and my Deliverer; my God, my keen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' firm Strength in Whom I will trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take refuge, my Shield, and the Horn of my salvation, my High Tower. [Heb. 2:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I will call upon the Lord, Who is to be praised; so shall I be saved from my enemies. [Rev. 5:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The cords '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bands of death surrounded me, and the streams of ungodliness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the torrents of ruin terrified me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The cords of Sheol (the place of the dead) surrounded me; the snares of death confronted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' came upon me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' In my distress [when seemingly closed in] I called upon the Lord and cried to my God; He heard my voice out of His temple (heavenly dwelling place), and my cry came before Him, into His [very] ears.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then the earth quaked and rocked, the foundations also of the mountains trembled; they moved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were shaken because He was indignant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' angry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' There went up smoke from His nostrils; and lightning out of His mouth devoured; coals were kindled by it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He bowed the heavens also and came down; and thick darkness was under His feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And He rode upon a cherub [a storm] and flew [swiftly]; yes, He sped on with the wings of the wind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He made darkness His secret hiding place; as His pavilion (His canopy) round about Him were dark waters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thick clouds of the skies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Out of the brightness before Him there broke forth through His thick clouds hailstones and coals of fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The Lord also thundered from the heavens, and the Most High uttered His voice, amid hailstones and coals of fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And He sent out His arrows and scattered them; and He flashed forth lightnings and put them to rout.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then the beds of the sea appeared and the foundations of the world were laid bare at Your rebuke, O Lord, at the blast of the breath of Your nostrils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He reached from on high, He took me; He drew me out of many waters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He delivered me from my strong enemy and from those who hated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abhorred me, for they were too strong for me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' They confronted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' came upon me in the day of my calamity, but the Lord was my stay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' support.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He brought me forth also into a large place; He was delivering me because He was pleased with me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delighted in me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The Lord rewarded me according to my righteousness (my conscious integrity and sincerity with Him); according to the cleanness of my hands has He recompensed me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For I have kept the ways of the Lord and have not wickedly departed from my God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For all His ordinances were before me, and I put not away His statutes from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' I was upright before Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blameless with Him, ever [on guard] to keep myself free from my sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Therefore has the Lord recompensed me according to my righteousness (my uprightness and right standing with Him), according to the cleanness of my hands in His sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' With the kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' merciful You will show Yourself kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' merciful, with an upright man You will show Yourself upright,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' With the pure You will show Yourself pure, and with the perverse You will show Yourself contrary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' For You deliver an afflicted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humble people but will bring down those with haughty looks.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For You cause my lamp to be lighted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to shine; the Lord my God illumines my darkness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' For by You I can run through a troop, and by my God I can leap over a wall.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' As for God, His way is perfect! The word of the Lord is tested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tried; He is a shield to all those who take refuge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put their trust in Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' For who is God except the Lord? Or who is the Rock save our God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' The God who girds me with strength and makes my way perfect?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' He makes my feet like hinds'' feet [able to stand firmly or make progress on the dangerous heights of testing and trouble]; He sets me securely upon my high places.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' He teaches my hands to war, so that my arms can bend a bow of bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' You have also given me the shield of Your salvation, and Your right hand has held me up; Your gentleness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condescension have made me great.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' You have given plenty of room for my steps under me, that my feet would not slip.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' I pursued my enemies and overtook them; neither did I turn again till they were consumed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' I smote them so that they were not able to rise; they fell wounded under my feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' For You have girded me with strength for the battle; You have subdued under me and caused to bow down those who rose up against me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' You have also made my enemies turn their backs to me, that I might cut off those who hate me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' They cried [for help], but there was none to deliver–even unto the Lord, but He answered them not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Then I beat them small as the dust before the wind; I emptied them out as the dirt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mire of the streets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' You have delivered me from the strivings of the people; You made me the head of the nations; a people I had not known served me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' As soon as they heard of me, they obeyed me; foreigners submitted themselves cringingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' yielded feigned obedience to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' Foreigners lost heart and came trembling out of their caves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' strongholds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' The Lord lives! Blessed be my Rock; and let the God of my salvation be exalted,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' The God Who avenges me and subdues peoples under me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' Who delivers me from my enemies; yes, You lift me up above those who rise up against me; You deliver me from the man of violence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' Therefore will I give thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extol You, O Lord, among the nations, and sing praises to Your name. [Rom. 15:9.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' Great deliverances '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' triumphs gives He to His king; and He shows mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast love to His anointed, to David and his offspring forever. [II Sam. 22:2-51.]'
