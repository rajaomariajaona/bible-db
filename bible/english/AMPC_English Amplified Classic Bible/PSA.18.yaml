document_id: PSA.18,8
type_code: eng
verses:
  '1':
  - type: heading
    content: 'To the Chief Musician. +[A Psalm+] of David the servant of the Lord, who spoke the words of this song to the Lord on the day when the Lord delivered him from the hand of all his enemies and from the hand of Saul. And he said:'
  - type: text
    content: ' I LOVE You fervently '
  - type: text
    content: and
  - type: text
    content: ' devotedly, O Lord, my Strength.'
  '10':
  - type: text
    content: ' And He rode upon a cherub [a storm] and flew [swiftly]; yes, He sped on with the wings of the wind.'
  '11':
  - type: text
    content: ' He made darkness His secret hiding place; as His pavilion (His canopy) round about Him were dark waters '
  - type: text
    content: and
  - type: text
    content: ' thick clouds of the skies.'
  '12':
  - type: text
    content: ' Out of the brightness before Him there broke forth through His thick clouds hailstones and coals of fire.'
  '13':
  - type: text
    content: ' The Lord also thundered from the heavens, and the Most High uttered His voice, amid hailstones and coals of fire.'
  '14':
  - type: text
    content: ' And He sent out His arrows and scattered them; and He flashed forth lightnings and put them to rout.'
  '15':
  - type: text
    content: ' Then the beds of the sea appeared and the foundations of the world were laid bare at Your rebuke, O Lord, at the blast of the breath of Your nostrils.'
  '16':
  - type: text
    content: ' He reached from on high, He took me; He drew me out of many waters.'
  '17':
  - type: text
    content: ' He delivered me from my strong enemy and from those who hated '
  - type: text
    content: and
  - type: text
    content: ' abhorred me, for they were too strong for me.'
  '18':
  - type: text
    content: ' They confronted '
  - type: text
    content: and
  - type: text
    content: ' came upon me in the day of my calamity, but the Lord was my stay '
  - type: text
    content: and
  - type: text
    content: ' support.'
  '19':
  - type: text
    content: ' He brought me forth also into a large place; He was delivering me because He was pleased with me '
  - type: text
    content: and
  - type: text
    content: ' delighted in me.'
  '2':
  - type: text
    content: ' The Lord is my Rock, my Fortress, and my Deliverer; my God, my keen '
  - type: text
    content: and
  - type: text
    content: ' firm Strength in Whom I will trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge, my Shield, and the Horn of my salvation, my High Tower. [Heb. 2:13.]'
  '20':
  - type: text
    content: ' The Lord rewarded me according to my righteousness (my conscious integrity and sincerity with Him); according to the cleanness of my hands has He recompensed me.'
  '21':
  - type: text
    content: ' For I have kept the ways of the Lord and have not wickedly departed from my God.'
  '22':
  - type: text
    content: ' For all His ordinances were before me, and I put not away His statutes from me.'
  '23':
  - type: text
    content: ' I was upright before Him '
  - type: text
    content: and
  - type: text
    content: ' blameless with Him, ever [on guard] to keep myself free from my sin '
  - type: text
    content: and
  - type: text
    content: ' guilt.'
  '24':
  - type: text
    content: ' Therefore has the Lord recompensed me according to my righteousness (my uprightness and right standing with Him), according to the cleanness of my hands in His sight.'
  '25':
  - type: text
    content: ' With the kind '
  - type: text
    content: and
  - type: text
    content: ' merciful You will show Yourself kind '
  - type: text
    content: and
  - type: text
    content: ' merciful, with an upright man You will show Yourself upright,'
  '26':
  - type: text
    content: ' With the pure You will show Yourself pure, and with the perverse You will show Yourself contrary.'
  '27':
  - type: text
    content: ' For You deliver an afflicted '
  - type: text
    content: and
  - type: text
    content: ' humble people but will bring down those with haughty looks.'
  '28':
  - type: text
    content: ' For You cause my lamp to be lighted '
  - type: text
    content: and
  - type: text
    content: ' to shine; the Lord my God illumines my darkness.'
  '29':
  - type: text
    content: ' For by You I can run through a troop, and by my God I can leap over a wall.'
  '3':
  - type: text
    content: ' I will call upon the Lord, Who is to be praised; so shall I be saved from my enemies. [Rev. 5:12.]'
  '30':
  - type: text
    content: ' As for God, His way is perfect! The word of the Lord is tested '
  - type: text
    content: and
  - type: text
    content: ' tried; He is a shield to all those who take refuge '
  - type: text
    content: and
  - type: text
    content: ' put their trust in Him.'
  '31':
  - type: text
    content: ' For who is God except the Lord? Or who is the Rock save our God,'
  '32':
  - type: text
    content: ' The God who girds me with strength and makes my way perfect?'
  '33':
  - type: text
    content: ' He makes my feet like hinds'' feet [able to stand firmly or make progress on the dangerous heights of testing and trouble]; He sets me securely upon my high places.'
  '34':
  - type: text
    content: ' He teaches my hands to war, so that my arms can bend a bow of bronze.'
  '35':
  - type: text
    content: ' You have also given me the shield of Your salvation, and Your right hand has held me up; Your gentleness '
  - type: text
    content: and
  - type: text
    content: ' condescension have made me great.'
  '36':
  - type: text
    content: ' You have given plenty of room for my steps under me, that my feet would not slip.'
  '37':
  - type: text
    content: ' I pursued my enemies and overtook them; neither did I turn again till they were consumed.'
  '38':
  - type: text
    content: ' I smote them so that they were not able to rise; they fell wounded under my feet.'
  '39':
  - type: text
    content: ' For You have girded me with strength for the battle; You have subdued under me and caused to bow down those who rose up against me.'
  '4':
  - type: text
    content: ' The cords '
  - type: text
    content: or
  - type: text
    content: ' bands of death surrounded me, and the streams of ungodliness '
  - type: text
    content: and
  - type: text
    content: ' the torrents of ruin terrified me.'
  '40':
  - type: text
    content: ' You have also made my enemies turn their backs to me, that I might cut off those who hate me.'
  '41':
  - type: text
    content: ' They cried [for help], but there was none to deliver–even unto the Lord, but He answered them not.'
  '42':
  - type: text
    content: ' Then I beat them small as the dust before the wind; I emptied them out as the dirt '
  - type: text
    content: and
  - type: text
    content: ' mire of the streets.'
  '43':
  - type: text
    content: ' You have delivered me from the strivings of the people; You made me the head of the nations; a people I had not known served me.'
  '44':
  - type: text
    content: ' As soon as they heard of me, they obeyed me; foreigners submitted themselves cringingly '
  - type: text
    content: and
  - type: text
    content: ' yielded feigned obedience to me.'
  '45':
  - type: text
    content: ' Foreigners lost heart and came trembling out of their caves '
  - type: text
    content: or
  - type: text
    content: ' strongholds.'
  '46':
  - type: text
    content: ' The Lord lives! Blessed be my Rock; and let the God of my salvation be exalted,'
  '47':
  - type: text
    content: ' The God Who avenges me and subdues peoples under me,'
  '48':
  - type: text
    content: ' Who delivers me from my enemies; yes, You lift me up above those who rise up against me; You deliver me from the man of violence.'
  '49':
  - type: text
    content: ' Therefore will I give thanks '
  - type: text
    content: and
  - type: text
    content: ' extol You, O Lord, among the nations, and sing praises to Your name. [Rom. 15:9.]'
  '5':
  - type: text
    content: ' The cords of Sheol (the place of the dead) surrounded me; the snares of death confronted '
  - type: text
    content: and
  - type: text
    content: ' came upon me.'
  '50':
  - type: text
    content: ' Great deliverances '
  - type: text
    content: and
  - type: text
    content: ' triumphs gives He to His king; and He shows mercy '
  - type: text
    content: and
  - type: text
    content: ' steadfast love to His anointed, to David and his offspring forever. [II Sam. 22:2-51.]'
  '6':
  - type: text
    content: ' In my distress [when seemingly closed in] I called upon the Lord and cried to my God; He heard my voice out of His temple (heavenly dwelling place), and my cry came before Him, into His [very] ears.'
  '7':
  - type: text
    content: ' Then the earth quaked and rocked, the foundations also of the mountains trembled; they moved '
  - type: text
    content: and
  - type: text
    content: ' were shaken because He was indignant '
  - type: text
    content: and
  - type: text
    content: ' angry.'
  '8':
  - type: text
    content: ' There went up smoke from His nostrils; and lightning out of His mouth devoured; coals were kindled by it.'
  '9':
  - type: text
    content: ' He bowed the heavens also and came down; and thick darkness was under His feet.'
