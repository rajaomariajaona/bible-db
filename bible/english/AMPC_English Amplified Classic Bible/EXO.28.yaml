document_id: EXO.28,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' FROM AMONG the Israelites take your brother Aaron and his sons with him, that he may minister to Me in the priest''s office, even Aaron, Nadab and Abihu, Eleazar and Ithamar, Aaron''s sons.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Six of their names on one stone and the six names of the rest on the other stone, arranged in order of their birth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' With the work of a stone engraver, like the engravings of a signet, you shall engrave the two stones according to the names of the sons of Israel. You shall have them set in sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' rosettes of gold.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall put the two stones upon the [two] shoulder straps of the ephod [of the high priest] as memorial stones for Israel; and Aaron shall bear their names upon his two shoulders as a memorial before the Lord.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall make sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' rosettes of gold for settings,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And two chains of pure gold, like cords shall you twist them, and fasten the corded chains to the settings.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall make a breastplate of judgment, in skilled work; like the workmanship of the ephod shall you make it, of gold, blue, purple, and scarlet [stuff], and of fine twined linen.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The breastplate shall be square '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' doubled; a span [nine inches] shall be its length and a span shall be its breadth.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall set in it four rows of stones: a sardius, a topaz, and a carbuncle shall be the first row;'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The second row an emerald, a sapphire, and a diamond [so called at that time];'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The third row a jacinth, an agate, and an amethyst;'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall make for Aaron your brother sacred garments [appointed official dress set apart for special holy services] for honor and for beauty.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the fourth row a beryl, an onyx, and a jasper; they shall be set in gold filigree.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the stones shall be twelve, according to the names of the sons of Israel, like the engravings of a signet, each with its name for the twelve tribes.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall make for the breastplate chains of pure gold twisted like cords.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall make on the breastplate two rings of gold and put [them] on the two edges of the breastplate.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall put the two twisted, cordlike chains of gold in the two rings which are on the edges of the breastplate.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The other two ends of the two twisted, cordlike chains you shall fasten in the two sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' rosettes in front, putting them on the shoulder straps of the ephod;'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And make two rings of gold and put them at the two ends of the breastplate on its inside edge next to the ephod.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Two gold rings you shall make and attach them to the lower part of the two shoulder pieces of the ephod in front, close by where they join, above the skillfully woven girdle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' band of the ephod.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they shall bind the breastplate by its rings to the rings of the ephod with a lace of blue, that it may be above the skillfully woven girding band of the ephod, and that the breastplate may not become loose from the ephod.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So Aaron shall bear the names of the sons of Israel in the breastplate of judgment upon his heart when he goes into the Holy Place, to bring them in continual remembrance before the Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Tell all who are expert, whom I have endowed with skill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good judgment, that they shall make Aaron''s garments to sanctify him for My priesthood.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In the breastplate of judgment you shall put the Urim and the Thummim [unspecified articles used when the high priest asked God''s counsel for all Israel]; they shall be upon Aaron''s heart when he goes in before the Lord, and Aaron shall bear the judgment (rights, judicial decisions) of the Israelites upon his heart before the Lord continually.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Make the robe [to be worn beneath] the ephod all of blue.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' There shall be a hole in the center of it [to slip over the head], with a binding of woven work around the hole, like the opening in a coat of mail '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a garment, that it may not fray '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' tear.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall make pomegranates of blue, purple, and scarlet [stuff] around about its skirts, with gold bells between them;'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' A gold bell and a pomegranate, a gold bell and a pomegranate, round about on the skirts of the robe.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Aaron shall wear the robe when he ministers, and its sound shall be heard when he goes [alone] into the Holy of Holies before the Lord and when he comes out, lest he die there.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall make a plate of pure gold and engrave on it, like the engravings of a signet, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: holy to the lord.
    - type: text
      text: ' [Exod. 39:30.]'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall fasten it on the front of the turban with a blue cord.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It shall be upon Aaron''s forehead, that Aaron may take upon himself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bear [any] iniquity [connected with] the holy things which the Israelites shall give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dedicate; and it shall always be upon his forehead, that they may be accepted before the Lord [in the priest''s person]. [Luke 24:44; Heb. 8:1, 2.]'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall weave the long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sleeved tunic of checkerwork of fine linen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' silk and make a turban of fine linen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' silk; and you shall make a girdle, the work of the embroiderer.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They shall make these garments: a breastplate, an ephod [a distinctive vestment to which the breastplate was to be attached], a robe, long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sleeved tunic of checkerwork, a turban, and a sash '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' band. They shall make sacred garments for Aaron your brother and his sons to minister to Me in the priest''s office.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For Aaron''s sons you shall make long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sleeved tunics and belts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sashes and caps, for glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor and beauty.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall put them on Aaron your brother and his sons with him, and shall anoint them and ordain and sanctify them [set them apart for God], that they may serve Me as priests.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You shall make for them [white] linen trunks to cover their naked flesh, reaching from the waist to the thighs.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they shall be on Aaron and his sons when they go into the Tent of Meeting or when they come near to the altar to minister in the Holy Place, lest they bring iniquity upon themselves and die; it shall be a statute forever to Aaron and to his descendants after him.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They shall receive [from the people] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' use gold, and blue, purple, and scarlet [stuff], and fine linen.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they shall make the ephod of gold, of blue, purple, and scarlet [stuff], and fine twined linen, skillfully woven '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worked.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' It shall have two shoulder straps to join the two [back and front] edges, that it may be held together.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The skillfully woven girding band which is on the ephod shall be made of the same, of gold, blue, purple, and scarlet [stuff], and fine twined linen.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you shall take two onyx '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' beryl stones and engrave on them the names of the twelve sons of Israel;'
