document_id: EXO.28,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FROM AMONG the Israelites take your brother Aaron and his sons with him, that he may minister to Me in the priest''s office, even Aaron, Nadab and Abihu, Eleazar and Ithamar, Aaron''s sons.'
  '10':
  - type: text
    content: ' Six of their names on one stone and the six names of the rest on the other stone, arranged in order of their birth.'
  '11':
  - type: text
    content: ' With the work of a stone engraver, like the engravings of a signet, you shall engrave the two stones according to the names of the sons of Israel. You shall have them set in sockets '
  - type: text
    content: or
  - type: text
    content: ' rosettes of gold.'
  '12':
  - type: text
    content: ' And you shall put the two stones upon the [two] shoulder straps of the ephod [of the high priest] as memorial stones for Israel; and Aaron shall bear their names upon his two shoulders as a memorial before the Lord.'
  '13':
  - type: text
    content: ' And you shall make sockets '
  - type: text
    content: or
  - type: text
    content: ' rosettes of gold for settings,'
  '14':
  - type: text
    content: ' And two chains of pure gold, like cords shall you twist them, and fasten the corded chains to the settings.'
  '15':
  - type: text
    content: ' You shall make a breastplate of judgment, in skilled work; like the workmanship of the ephod shall you make it, of gold, blue, purple, and scarlet [stuff], and of fine twined linen.'
  '16':
  - type: text
    content: ' The breastplate shall be square '
  - type: text
    content: and
  - type: text
    content: ' doubled; a span [nine inches] shall be its length and a span shall be its breadth.'
  '17':
  - type: text
    content: ' You shall set in it four rows of stones: a sardius, a topaz, and a carbuncle shall be the first row;'
  '18':
  - type: text
    content: ' The second row an emerald, a sapphire, and a diamond [so called at that time];'
  '19':
  - type: text
    content: ' The third row a jacinth, an agate, and an amethyst;'
  '2':
  - type: text
    content: ' And you shall make for Aaron your brother sacred garments [appointed official dress set apart for special holy services] for honor and for beauty.'
  '20':
  - type: text
    content: ' And the fourth row a beryl, an onyx, and a jasper; they shall be set in gold filigree.'
  '21':
  - type: text
    content: ' And the stones shall be twelve, according to the names of the sons of Israel, like the engravings of a signet, each with its name for the twelve tribes.'
  '22':
  - type: text
    content: ' You shall make for the breastplate chains of pure gold twisted like cords.'
  '23':
  - type: text
    content: ' You shall make on the breastplate two rings of gold and put [them] on the two edges of the breastplate.'
  '24':
  - type: text
    content: ' And you shall put the two twisted, cordlike chains of gold in the two rings which are on the edges of the breastplate.'
  '25':
  - type: text
    content: ' The other two ends of the two twisted, cordlike chains you shall fasten in the two sockets '
  - type: text
    content: or
  - type: text
    content: ' rosettes in front, putting them on the shoulder straps of the ephod;'
  '26':
  - type: text
    content: ' And make two rings of gold and put them at the two ends of the breastplate on its inside edge next to the ephod.'
  '27':
  - type: text
    content: ' Two gold rings you shall make and attach them to the lower part of the two shoulder pieces of the ephod in front, close by where they join, above the skillfully woven girdle '
  - type: text
    content: or
  - type: text
    content: ' band of the ephod.'
  '28':
  - type: text
    content: ' And they shall bind the breastplate by its rings to the rings of the ephod with a lace of blue, that it may be above the skillfully woven girding band of the ephod, and that the breastplate may not become loose from the ephod.'
  '29':
  - type: text
    content: ' So Aaron shall bear the names of the sons of Israel in the breastplate of judgment upon his heart when he goes into the Holy Place, to bring them in continual remembrance before the Lord.'
  '3':
  - type: text
    content: ' Tell all who are expert, whom I have endowed with skill '
  - type: text
    content: and
  - type: text
    content: ' good judgment, that they shall make Aaron''s garments to sanctify him for My priesthood.'
  '30':
  - type: text
    content: ' In the breastplate of judgment you shall put the Urim and the Thummim [unspecified articles used when the high priest asked God''s counsel for all Israel]; they shall be upon Aaron''s heart when he goes in before the Lord, and Aaron shall bear the judgment (rights, judicial decisions) of the Israelites upon his heart before the Lord continually.'
  '31':
  - type: text
    content: ' Make the robe [to be worn beneath] the ephod all of blue.'
  '32':
  - type: text
    content: ' There shall be a hole in the center of it [to slip over the head], with a binding of woven work around the hole, like the opening in a coat of mail '
  - type: text
    content: or
  - type: text
    content: ' a garment, that it may not fray '
  - type: text
    content: or
  - type: text
    content: ' tear.'
  '33':
  - type: text
    content: ' And you shall make pomegranates of blue, purple, and scarlet [stuff] around about its skirts, with gold bells between them;'
  '34':
  - type: text
    content: ' A gold bell and a pomegranate, a gold bell and a pomegranate, round about on the skirts of the robe.'
  '35':
  - type: text
    content: ' Aaron shall wear the robe when he ministers, and its sound shall be heard when he goes [alone] into the Holy of Holies before the Lord and when he comes out, lest he die there.'
  '36':
  - type: text
    content: ' And you shall make a plate of pure gold and engrave on it, like the engravings of a signet, '
  - type: heading
    content: holy to the lord.
  - type: text
    content: ' [Exod. 39:30.]'
  '37':
  - type: text
    content: ' You shall fasten it on the front of the turban with a blue cord.'
  '38':
  - type: text
    content: ' It shall be upon Aaron''s forehead, that Aaron may take upon himself '
  - type: text
    content: and
  - type: text
    content: ' bear [any] iniquity [connected with] the holy things which the Israelites shall give '
  - type: text
    content: and
  - type: text
    content: ' dedicate; and it shall always be upon his forehead, that they may be accepted before the Lord [in the priest''s person]. [Luke 24:44; Heb. 8:1, 2.]'
  '39':
  - type: text
    content: ' And you shall weave the long '
  - type: text
    content: and
  - type: text
    content: ' sleeved tunic of checkerwork of fine linen '
  - type: text
    content: or
  - type: text
    content: ' silk and make a turban of fine linen '
  - type: text
    content: or
  - type: text
    content: ' silk; and you shall make a girdle, the work of the embroiderer.'
  '4':
  - type: text
    content: ' They shall make these garments: a breastplate, an ephod [a distinctive vestment to which the breastplate was to be attached], a robe, long '
  - type: text
    content: and
  - type: text
    content: ' sleeved tunic of checkerwork, a turban, and a sash '
  - type: text
    content: or
  - type: text
    content: ' band. They shall make sacred garments for Aaron your brother and his sons to minister to Me in the priest''s office.'
  '40':
  - type: text
    content: ' For Aaron''s sons you shall make long '
  - type: text
    content: and
  - type: text
    content: ' sleeved tunics and belts '
  - type: text
    content: or
  - type: text
    content: ' sashes and caps, for glory '
  - type: text
    content: and
  - type: text
    content: ' honor and beauty.'
  '41':
  - type: text
    content: ' And you shall put them on Aaron your brother and his sons with him, and shall anoint them and ordain and sanctify them [set them apart for God], that they may serve Me as priests.'
  '42':
  - type: text
    content: ' You shall make for them [white] linen trunks to cover their naked flesh, reaching from the waist to the thighs.'
  '43':
  - type: text
    content: ' And they shall be on Aaron and his sons when they go into the Tent of Meeting or when they come near to the altar to minister in the Holy Place, lest they bring iniquity upon themselves and die; it shall be a statute forever to Aaron and to his descendants after him.'
  '5':
  - type: text
    content: ' They shall receive [from the people] '
  - type: text
    content: and
  - type: text
    content: ' use gold, and blue, purple, and scarlet [stuff], and fine linen.'
  '6':
  - type: text
    content: ' And they shall make the ephod of gold, of blue, purple, and scarlet [stuff], and fine twined linen, skillfully woven '
  - type: text
    content: and
  - type: text
    content: ' worked.'
  '7':
  - type: text
    content: ' It shall have two shoulder straps to join the two [back and front] edges, that it may be held together.'
  '8':
  - type: text
    content: ' The skillfully woven girding band which is on the ephod shall be made of the same, of gold, blue, purple, and scarlet [stuff], and fine twined linen.'
  '9':
  - type: text
    content: ' And you shall take two onyx '
  - type: text
    content: or
  - type: text
    content: ' beryl stones and engrave on them the names of the twelve sons of Israel;'
