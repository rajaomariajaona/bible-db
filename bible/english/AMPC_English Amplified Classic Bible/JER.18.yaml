document_id: JER.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD which came to Jeremiah from the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Arise and go down to the potter''s house, and there I will cause you to hear My words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then I went down to the potter''s house, and behold, he was working at the wheel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the vessel that he was making from clay was spoiled in the hand of the potter; so he made it over, reworking it into another vessel as it seemed good to the potter to make it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then the word of the Lord came to me:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' O house of Israel, can I not do with you as this potter does? says the Lord. Behold, as the clay is in the potter''s hand, so are you in My hand, O house of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' At one time I will suddenly speak concerning a nation or kingdom, that I will pluck up and break down and destroy it;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And if [the people of] that nation concerning which I have spoken turn from their evil, I will relent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverse My decision concerning the evil that I thought to do to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' At another time I will suddenly speak concerning a nation or kingdom, that I will build up and plant it;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And if they do evil in My sight, obeying not My voice, then I will regret '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverse My decision concerning the good with which I said I would benefit them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Now therefore say to the men of Judah and to the inhabitants of Jerusalem, Thus says the Lord: Behold, I am shaping evil against you and devising a plan against you. Return now each one from his evil way; reform your [accustomed] ways '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make your [individual] actions good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But they will say, That is in vain! For we will walk after our own devices, and we will each do as the stubbornness of his own evil heart dictates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Therefore thus says the Lord: Ask now among the nations: Who has heard such things? Virgin Israel has done a very vile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' horrible thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Will the snow of Mount Lebanon fail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vanish from its rocks [which tower above the land of Israel]? Will the cold, rushing waters of strange lands [that dash down from afar] be dried up?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Yet My people have forgotten Me; they burn incense to false gods, they have been caused to stumble in their ways and in the ancient roads, to walk in bypaths, in a way not graded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' built up [not on a highway],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Making their land a desolation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a horror, a thing to be hissed at perpetually; everyone who passes by shall be astounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' horrified and shake his head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I will scatter them as with an east wind before the enemy; I will show them My back and not My face in the day of their calamity [says the Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then [my enemies] said, Come and let us devise schemes against Jeremiah; for the law [of Moses] shall not perish from the priest [as this false prophet Jeremiah predicts], nor will counsel from the wise, nor the word from the prophet. Come, let us smite him with the tongue [making a charge against him to the king], and let us not pay any attention to his words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Give heed to me, Lord; listen to [what] my adversaries [are plotting to do to me–and intercede].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Shall evil be recompensed for good? Yet they have dug a pit for my life. [Earnestly] remember that I stood before You to speak good for them, to turn away Your anger from them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Therefore deliver up their children to the famine; give them over to the power of the sword. And let their wives become childless and widows; let their men meet death by pestilence, their young men be slain by the sword in battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Let a cry be heard from their houses when You suddenly bring a troop upon them, for they have dug a pit to take me and have hidden snares for my feet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Yet, Lord, You know all their plotting against me to slay me. Forgive not their iniquity, nor blot out their sin from Your sight. But let them be overthrown before You; deal with them in the time of Your anger.'
