document_id: GEN.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW [in Haran] the Lord said to Abram, Go for yourself [for your own advantage] away from your country, from your relatives and your father''s house, to the land that I will show you. [Heb. 11:8-10.]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Now there was a famine in the land, and Abram went down into Egypt to live temporarily, for the famine in the land was oppressive (intense and grievous).'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And when he was about to enter into Egypt, he said to Sarai his wife, I know that you are beautiful to behold.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' So when the Egyptians see you, they will say, This is his wife; and they will kill me, but they will let you live.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Say, I beg of you, that you are my sister, so that it may go well with me for your sake and my life will be spared because of you.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And when Abram came into Egypt, the Egyptians saw that the woman was very beautiful.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' The princes of Pharaoh also saw her and commended her to Pharaoh, and she was taken into Pharaoh''s house [harem].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And he treated Abram well for her sake; he acquired sheep, oxen, he-donkeys, menservants, maidservants, she-donkeys, and camels.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' But the Lord scourged Pharaoh and his household with serious plagues because of Sarai, Abram''s wife.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And Pharaoh called Abram and said, What is this that you have done to me? Why did you not tell me that she was your wife?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Why did you say, She is my sister, so that I took her to be my wife? Now then, here is your wife; take her and get away [from here]!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And I will make of you a great nation, and I will bless you [with abundant increase of favors] and make your name famous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distinguished, and you will be a blessing [dispensing good to others].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And Pharaoh commanded his men concerning him, and they brought him on his way with his wife and all that he had.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And I will bless those who bless you [who confer prosperity or happiness upon you] and curse him who curses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' uses insolent language toward you; in you will all the families '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kindred of the earth be blessed [and by you they will bless themselves]. [Gal. 3:8.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' So Abram departed, as the Lord had directed him; and Lot [his nephew] went with him. Abram was seventy-five years old when he left Haran.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Abram took Sarai his wife, and Lot his brother''s son, and all their possessions that they had gathered, and the persons [servants] that they had acquired in Haran, and they went forth to go to the land of Canaan. When they came to the land of Canaan,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Abram passed through the land to the locality of Shechem, to the oak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' terebinth tree of Moreh. And the Canaanite was then in the land.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Then the Lord appeared to Abram and said, I will give this land to your posterity. So Abram built an altar there to the Lord, Who had appeared to him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' From there he pulled up [his tent pegs] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' departed to the mountain on the east of Bethel and pitched his tent, with Bethel on the west and Ai on the east; and there he built an altar to the Lord and called upon the name of the Lord.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Abram journeyed on, still going toward the South (the Negeb).'
