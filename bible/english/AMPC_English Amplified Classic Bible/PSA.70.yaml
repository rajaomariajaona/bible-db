document_id: PSA.70
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. +[A Psalm+] of David, to bring to remembrance {or} make memorial.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MAKE HASTE, O God, to deliver me; make haste to help me, O Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let them be put to shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confounded that seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' demand my life; let them be turned backward and brought to confusion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dishonor who desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight in my hurt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Let them be turned back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appalled because of their shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgrace who say, Aha, aha!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' May all those who seek, inquire of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for You, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require You [as their vital need] rejoice and be glad in You; and may those who love Your salvation say continually, Let God be magnified!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But I am poor and needy; hasten to me, O God! You are my Help and my Deliverer; O Lord, do not tarry!'
