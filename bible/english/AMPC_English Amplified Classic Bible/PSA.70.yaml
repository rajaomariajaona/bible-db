document_id: PSA.70,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. +[A Psalm+] of David, to bring to remembrance {or} make memorial.
  - type: text
    content: ' MAKE HASTE, O God, to deliver me; make haste to help me, O Lord!'
  '2':
  - type: text
    content: ' Let them be put to shame '
  - type: text
    content: and
  - type: text
    content: ' confounded that seek '
  - type: text
    content: and
  - type: text
    content: ' demand my life; let them be turned backward and brought to confusion '
  - type: text
    content: and
  - type: text
    content: ' dishonor who desire '
  - type: text
    content: and
  - type: text
    content: ' delight in my hurt.'
  '3':
  - type: text
    content: ' Let them be turned back '
  - type: text
    content: and
  - type: text
    content: ' appalled because of their shame '
  - type: text
    content: and
  - type: text
    content: ' disgrace who say, Aha, aha!'
  '4':
  - type: text
    content: ' May all those who seek, inquire of '
  - type: text
    content: and
  - type: text
    content: ' for You, '
  - type: text
    content: and
  - type: text
    content: ' require You [as their vital need] rejoice and be glad in You; and may those who love Your salvation say continually, Let God be magnified!'
  '5':
  - type: text
    content: ' But I am poor and needy; hasten to me, O God! You are my Help and my Deliverer; O Lord, do not tarry!'
