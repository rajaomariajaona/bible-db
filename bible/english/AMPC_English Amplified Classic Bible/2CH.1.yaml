document_id: 2CH.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' SOLOMON SON of David was strengthened in his kingdom, and the Lord his God was with him and made him exceedingly great.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Give me now wisdom and knowledge to go out and come in before this people, for who can rule this Your people who are so great?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' God replied to Solomon, Because this was in your heart and you have not asked for riches, possessions, honor, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory, or the life of your foes, or even for long life, but have asked wisdom and knowledge for yourself, that you may rule '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judge My people over whom I have made you king,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Wisdom and knowledge are granted you. And I will give you riches, possessions, honor, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory, such as none of the kings had before you, and none after you shall have their equal.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then Solomon came from the high place at Gibeon, from before the Tent of Meeting, to Jerusalem. And he reigned over Israel.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Solomon gathered chariots and horsemen; he had 1,400 chariots and 12,000 horsemen, which he placed in the cities [suited for the use] of chariots and with the king at Jerusalem.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And the king made silver and gold in Jerusalem as common as stones, and he made cedar as plentiful as the sycamores of the lowland.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Solomon''s horses were brought out of Egypt; the king''s merchants received them in droves, each drove at a price.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' They imported from Egypt a chariot for 600 shekels of silver, and a horse for 150; so they brought out horses for all the Hittite and Syrian kings as export agents.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Solomon spoke to all Israel, to the captains of thousands and of hundreds, and to the judges, and to every prince in all Israel, the heads of the fathers'' houses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And Solomon and all the assembly [a united nation] with him went to the high place that was at Gibeon, for the Tent of Meeting of God, which Moses the servant of the Lord had made in the wilderness, was there [where the Canaanites had habitually worshiped].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' But David had brought up the ark of God from Kiriath-jearim to the place which David had prepared for it, for he had pitched a tent for it at Jerusalem.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Moreover, the bronze altar that Bezalel son of Uri, the son of Hur, had made was there before the tabernacle of the Lord, and Solomon and the assembly sought [the Lord].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Solomon went up there to the bronze altar before the Lord at the Tent of Meeting and offered 1,000 burnt offerings on it.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' That night God appeared to Solomon and said to him, Ask what I shall give you.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And Solomon said to God, You have shown great mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loving-kindness to David my father and have made me king in his place.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Now, O Lord God, let Your promise to David my father be fulfilled, for you have made me king over a people like the dust of the earth in multitude.'
