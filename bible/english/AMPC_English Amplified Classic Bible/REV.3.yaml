document_id: REV.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND TO the angel (messenger) of the assembly (church) in Sardis write: These are the words of Him Who has the seven Spirits of God [the sevenfold Holy Spirit] and the seven stars: I know your record '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what you are doing; you are supposed to be alive, but [in reality] you are dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Rouse yourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep awake, and strengthen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' invigorate what remains and is on the point of dying; for I have not found a thing that you have done [any work of yours] meeting the requirements of My God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' perfect in His sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So call to mind the lessons you received and heard; continually lay them to heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey them, and repent. In case you will not rouse yourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep awake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and watch
  - type: text
    text: ', I will come upon you like a thief, and you will not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' suspect at what hour I will come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Yet you still have a few [persons''] names in Sardis who have not soiled their clothes, and they shall walk with Me in white, because they are worthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deserving.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thus shall he who conquers (is victorious) be clad in white garments, and I will not erase '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' blot out his name from the Book of Life; I will acknowledge him [as Mine] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I will confess his name openly before My Father and before His angels. [Ps. 69:28; Dan. 12:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He who is able to hear, let him listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed what the [Holy] Spirit says to the assemblies (churches).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And to the angel (messenger) of the assembly (church) in Philadelphia write: These are the words of the Holy One, the True One, He Who has the key of David, Who opens and no one shall shut, Who shuts and no one shall open: [Isa. 22:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' I know your [record of] works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what you are doing. See! I have set before you a door wide open which no one is able to shut; I know that you have but little power, and yet you have kept My Word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guarded My message and have not renounced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' denied My name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Take note! I will make those of the synagogue of Satan who say they are Jews and are not, but lie–behold, I will make them come and bow down before your feet and learn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge that I have loved you. [Isa. 43:4; 49:23; 60:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Because you have guarded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kept My word of patient endurance [have held fast the lesson of My patience with the expectant endurance that I give you], I also will keep you [safe] from the hour of trial (testing) which is coming on the whole world to try those who dwell upon the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' I am coming quickly; hold fast what you have, so that no one may rob you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deprive you of your crown.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' He who overcomes (is victorious), I will make him a pillar in the sanctuary of My God; he shall never be put out of it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' go out of it, and I will write on him the name of My God and the name of the city of My God, the new Jerusalem, which descends from My God out of heaven, and My own new name. [Isa. 62:2; Ezek. 48:35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' He who can hear, let him listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed what the Spirit says to the assemblies (churches).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And to the angel (messenger) of the assembly (church) in Laodicea write: These are the words of the Amen, the trusty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful and true Witness, the Origin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Beginning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Author of God''s creation: [Isa. 55:4; Prov. 8:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' I know your [record of] works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what you are doing; you are neither cold nor hot. Would that you were cold or hot!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So, because you are lukewarm and neither cold nor hot, I will spew you out of My mouth!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For you say, I am rich; I have prospered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grown wealthy, and I am in need of nothing; and you do not realize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand that you are wretched, pitiable, poor, blind, and naked. [Hos. 12:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Therefore I counsel you to purchase from Me gold refined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tested by fire, that you may be [truly] wealthy, and white clothes to clothe you and to keep the shame of your nudity from being seen, and salve to put on your eyes, that you may see.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Those whom I [dearly and tenderly] love, I tell their faults and convict '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' convince '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reprove and chasten [I discipline and instruct them]. So be enthusiastic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in earnest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burning with zeal and repent [changing your mind and attitude]. [Prov. 3:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Behold, I stand at the door and knock; if anyone hears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listens to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heeds My voice and opens the door, I will come in to him and will eat with him, and he [will eat] with Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He who overcomes (is victorious), I will grant him to sit beside Me on My throne, as I Myself overcame (was victorious) and sat down beside My Father on His throne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' He who is able to hear, let him listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed what the [Holy] Spirit says to the assemblies (churches).'
