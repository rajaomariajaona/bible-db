document_id: REV.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND TO the angel (messenger) of the assembly (church) in Sardis write: These are the words of Him Who has the seven Spirits of God [the sevenfold Holy Spirit] and the seven stars: I know your record '
  - type: text
    content: and
  - type: text
    content: ' what you are doing; you are supposed to be alive, but [in reality] you are dead.'
  '10':
  - type: text
    content: ' Because you have guarded '
  - type: text
    content: and
  - type: text
    content: ' kept My word of patient endurance [have held fast the lesson of My patience with the expectant endurance that I give you], I also will keep you [safe] from the hour of trial (testing) which is coming on the whole world to try those who dwell upon the earth.'
  '11':
  - type: text
    content: ' I am coming quickly; hold fast what you have, so that no one may rob you '
  - type: text
    content: and
  - type: text
    content: ' deprive you of your crown.'
  '12':
  - type: text
    content: ' He who overcomes (is victorious), I will make him a pillar in the sanctuary of My God; he shall never be put out of it '
  - type: text
    content: or
  - type: text
    content: ' go out of it, and I will write on him the name of My God and the name of the city of My God, the new Jerusalem, which descends from My God out of heaven, and My own new name. [Isa. 62:2; Ezek. 48:35.]'
  '13':
  - type: text
    content: ' He who can hear, let him listen to '
  - type: text
    content: and
  - type: text
    content: ' heed what the Spirit says to the assemblies (churches).'
  '14':
  - type: text
    content: ' And to the angel (messenger) of the assembly (church) in Laodicea write: These are the words of the Amen, the trusty '
  - type: text
    content: and
  - type: text
    content: ' faithful and true Witness, the Origin '
  - type: text
    content: and
  - type: text
    content: ' Beginning '
  - type: text
    content: and
  - type: text
    content: ' Author of God''s creation: [Isa. 55:4; Prov. 8:22.]'
  '15':
  - type: text
    content: ' I know your [record of] works '
  - type: text
    content: and
  - type: text
    content: ' what you are doing; you are neither cold nor hot. Would that you were cold or hot!'
  '16':
  - type: text
    content: ' So, because you are lukewarm and neither cold nor hot, I will spew you out of My mouth!'
  '17':
  - type: text
    content: ' For you say, I am rich; I have prospered '
  - type: text
    content: and
  - type: text
    content: ' grown wealthy, and I am in need of nothing; and you do not realize '
  - type: text
    content: and
  - type: text
    content: ' understand that you are wretched, pitiable, poor, blind, and naked. [Hos. 12:8.]'
  '18':
  - type: text
    content: ' Therefore I counsel you to purchase from Me gold refined '
  - type: text
    content: and
  - type: text
    content: ' tested by fire, that you may be [truly] wealthy, and white clothes to clothe you and to keep the shame of your nudity from being seen, and salve to put on your eyes, that you may see.'
  '19':
  - type: text
    content: ' Those whom I [dearly and tenderly] love, I tell their faults and convict '
  - type: text
    content: and
  - type: text
    content: ' convince '
  - type: text
    content: and
  - type: text
    content: ' reprove and chasten [I discipline and instruct them]. So be enthusiastic '
  - type: text
    content: and
  - type: text
    content: ' in earnest '
  - type: text
    content: and
  - type: text
    content: ' burning with zeal and repent [changing your mind and attitude]. [Prov. 3:12.]'
  '2':
  - type: text
    content: ' Rouse yourselves '
  - type: text
    content: and
  - type: text
    content: ' keep awake, and strengthen '
  - type: text
    content: and
  - type: text
    content: ' invigorate what remains and is on the point of dying; for I have not found a thing that you have done [any work of yours] meeting the requirements of My God '
  - type: text
    content: or
  - type: text
    content: ' perfect in His sight.'
  '20':
  - type: text
    content: ' Behold, I stand at the door and knock; if anyone hears '
  - type: text
    content: and
  - type: text
    content: ' listens to '
  - type: text
    content: and
  - type: text
    content: ' heeds My voice and opens the door, I will come in to him and will eat with him, and he [will eat] with Me.'
  '21':
  - type: text
    content: ' He who overcomes (is victorious), I will grant him to sit beside Me on My throne, as I Myself overcame (was victorious) and sat down beside My Father on His throne.'
  '22':
  - type: text
    content: ' He who is able to hear, let him listen to '
  - type: text
    content: and
  - type: text
    content: ' heed what the [Holy] Spirit says to the assemblies (churches).'
  '3':
  - type: text
    content: ' So call to mind the lessons you received and heard; continually lay them to heart '
  - type: text
    content: and
  - type: text
    content: ' obey them, and repent. In case you will not rouse yourselves '
  - type: text
    content: and
  - type: text
    content: ' keep awake '
  - type: text
    content: and watch
  - type: text
    content: ', I will come upon you like a thief, and you will not know '
  - type: text
    content: or
  - type: text
    content: ' suspect at what hour I will come.'
  '4':
  - type: text
    content: ' Yet you still have a few [persons''] names in Sardis who have not soiled their clothes, and they shall walk with Me in white, because they are worthy '
  - type: text
    content: and
  - type: text
    content: ' deserving.'
  '5':
  - type: text
    content: ' Thus shall he who conquers (is victorious) be clad in white garments, and I will not erase '
  - type: text
    content: or
  - type: text
    content: ' blot out his name from the Book of Life; I will acknowledge him [as Mine] '
  - type: text
    content: and
  - type: text
    content: ' I will confess his name openly before My Father and before His angels. [Ps. 69:28; Dan. 12:1.]'
  '6':
  - type: text
    content: ' He who is able to hear, let him listen to '
  - type: text
    content: and
  - type: text
    content: ' heed what the [Holy] Spirit says to the assemblies (churches).'
  '7':
  - type: text
    content: ' And to the angel (messenger) of the assembly (church) in Philadelphia write: These are the words of the Holy One, the True One, He Who has the key of David, Who opens and no one shall shut, Who shuts and no one shall open: [Isa. 22:22.]'
  '8':
  - type: text
    content: ' I know your [record of] works '
  - type: text
    content: and
  - type: text
    content: ' what you are doing. See! I have set before you a door wide open which no one is able to shut; I know that you have but little power, and yet you have kept My Word '
  - type: text
    content: and
  - type: text
    content: ' guarded My message and have not renounced '
  - type: text
    content: or
  - type: text
    content: ' denied My name.'
  '9':
  - type: text
    content: ' Take note! I will make those of the synagogue of Satan who say they are Jews and are not, but lie–behold, I will make them come and bow down before your feet and learn '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that I have loved you. [Isa. 43:4; 49:23; 60:14.]'
