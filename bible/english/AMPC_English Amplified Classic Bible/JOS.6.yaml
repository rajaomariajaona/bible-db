document_id: JOS.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW JERICHO [a fenced town with high walls] was tightly closed because of the Israelites; no one went out or came in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And the Lord said to Joshua, See, I have given Jericho, its king and mighty men of valor, into your hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You shall march around the enclosure, all the men of war going around the city once. This you shall do for six days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And seven priests shall bear before the ark seven trumpets of rams'' horns; and on the seventh day you shall march around the enclosure seven times, and the priests shall blow the trumpets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When they make a long blast with the ram''s horn and you hear the sound of the trumpet, all the people shall shout with a great shout; and the wall of the enclosure shall fall down in its place and the people shall go up [over it], every man straight before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So Joshua son of Nun called the priests and said to them, Take up the ark of the covenant and let seven priests bear seven trumpets of rams'' horns before the ark of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He said to the people, Go on! March around the enclosure, and let the armed men pass on before the ark of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' When Joshua had spoken to the people, the seven priests bearing the seven trumpets of rams'' horns passed on before the Lord and blew the trumpets, and the ark of the covenant of the Lord followed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' The armed men went before the priests who blew the trumpets, and the rear guard came after the ark, the priests blowing the trumpets as they went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But Joshua commanded the people, You shall not shout or let your voice be heard, nor shall any word proceed out of your mouth until the day I tell you to shout. Then you shall shout!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So he caused the ark of the Lord to go around the city once; and they came into the camp and lodged in the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Joshua rose early in the morning and the priests took up the ark of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the seven priests bearing the seven trumpets of rams'' horns before the ark of the Lord passed on, blowing the trumpets continually; and the armed men went before them and the rear guard came after the ark of the Lord, the priests blowing the trumpets as they went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' On the second day they compassed the city enclosure once and returned to the camp. So they did for six days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' On the seventh day they rose early at daybreak and marched around the city as usual, only on that day they compassed the city seven times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the seventh time, when the priests had blown the trumpets, Joshua said to the people, Shout! For the Lord has given you the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the city and all that is in it shall be devoted to the Lord [for destruction]; only Rahab the harlot and all who are with her in her house shall live, because she hid the messengers whom we sent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But you, keep yourselves from the accursed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devoted things, lest when you have devoted it [to destruction], you take of the accursed thing, and so make the camp of Israel accursed and trouble it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But all the silver and gold and vessels of bronze and iron are consecrated to the Lord; they shall come into the treasury of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' So the people shouted, and the trumpets were blown. When the people heard the sound of the trumpet, they raised a great shout, and [Jericho''s] wall fell down in its place, so that the [Israelites] went up into the city, every man straight before him, and they took the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then they utterly destroyed all that was in the city, both man and woman, young and old, ox, sheep, and donkey, with the edge of the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But Joshua said to the two men who had spied out the land, Go into the harlot''s house and bring out the woman and all she has, as you swore to her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' So the young men, the spies, went in and brought out Rahab, her father and mother, her brethren, and all that she had; and they brought out all her kindred and set them outside the camp of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And they burned the city with fire and all that was in it; only the silver, the gold, and the vessels of bronze and of iron they put into the treasury of the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' So Joshua saved Rahab the harlot, with her father''s household and all that she had; and she lives in Israel even to this day, because she hid the messengers whom Joshua sent to spy out Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then Joshua laid this oath on them, Cursed is the man before the Lord who rises up and rebuilds this city, Jericho. With the loss of his firstborn shall he lay its foundation, and with the loss of his youngest son shall he set up its gates. [I Kings 16:34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' So the Lord was with Joshua, and his fame was in all the land.'
