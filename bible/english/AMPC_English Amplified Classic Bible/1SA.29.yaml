document_id: 1SA.29
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW THE Philistines gathered all their forces at Aphek, and the Israelites encamped by the fountain in Jezreel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' As the Philistine lords were passing on by hundreds and by thousands, and David and his men were in the rear with Achish,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The Philistine princes said, What are these Hebrews doing here? Achish said to the Philistine princes, Is not this David, the servant of Saul king of Israel, who has been with me these days and years, and I have found no fault in him since he deserted to me to this day?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the Philistine princes were angry with Achish and they said to him, Make this fellow return, that he may go again to his place where you have assigned him, and let him not go down with us to battle, lest in the battle he become an adversary to us. For how could David reconcile himself to his master? Would it not be with the heads of the men here?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Is not this David, of whom they sang to one another in dances, Saul slew his thousands, and David his ten thousands?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then Achish called David and said to him, As surely as the Lord lives, you have been honest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upright, and for you to go out and come in with me in the army is good in my sight; for I have found no evil in you from the day of your coming to me to this day. Yet the lords do not approve of you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So return now and go peaceably, so as not to displease the Philistine lords.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' David said to Achish, But what have I done? And what have you found in your servant as long as I have been with you to this day, that I may not go and fight against the enemies of my lord the king?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Achish said to David, I know that you are as blameless in my sight as an angel of God; nevertheless the princes of the Philistines have said, He shall not go up with us to the battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So now rise up early in the morning, with your master''s servants who have come with you, and as soon as you are up and have light, depart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' So David and his men rose up early in the morning to return to the land of the Philistines. But the Philistines went up to Jezreel [to fight against Israel].'
