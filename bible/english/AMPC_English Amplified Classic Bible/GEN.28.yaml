document_id: GEN.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SO ISAAC called Jacob and blessed him and commanded him, You shall not marry one of the women of Canaan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Arise, go to Padan-aram, to the house of Bethuel your mother''s father, and take from there as a wife one of the daughters of Laban your mother''s brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' May God Almighty bless you and make you fruitful and multiply you until you become a group of peoples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' May He give the blessing [He gave to] Abraham to you and your descendants with you, that you may inherit the land He gave to Abraham, in which you are a sojourner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Thus Isaac sent Jacob away. He went to Padan-aram, to Laban son of Bethuel the Aramean, the brother of Rebekah, Jacob and Esau''s mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now Esau saw that Isaac had blessed Jacob and sent him to Padan-aram to take him a wife from there, and that as he blessed him, he gave him a charge, saying, You shall not take a wife of the daughters of Canaan;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And that Jacob obeyed his father and his mother and had gone to Padan-aram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Also Esau saw that the daughters of Canaan did not please Isaac his father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So Esau went to Ishmael and took to be his wife, [in addition] to the wives he [already] had, Mahalath daughter of Ishmael, Abraham''s son, the sister of Nebaioth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And Jacob left Beersheba and went toward Haran.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And he came to a certain place and stayed there overnight, because the sun was set. Taking one of the stones of the place, he put it under his head and lay down there to sleep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And he dreamed that there was a ladder set up on the earth, and the top of it reached to heaven; and the angels of God were ascending and descending on it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And behold, the Lord stood over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beside him and said, I am the Lord, the God of Abraham your father [forefather] and the God of Isaac; I will give to you and to your descendants the land on which you are lying.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And your offspring shall be as [countless as] the dust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sand of the ground, and you shall spread abroad to the west and the east and the north and the south; and by you and your Offspring shall all the families of the earth be blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bless themselves. [Gen. 12:2-3; 13:16; 22:18; 26:4; Acts 3:25-26; Gal. 3:8, 16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And behold, I am with you and will keep (watch over you with care, take notice of) you wherever you may go, and I will bring you back to this land; for I will not leave you until I have done all of which I have told you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And Jacob awoke from his sleep and he said, Surely the Lord is in this place and I did not know it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He was afraid and said, How to be feared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverenced is this place! This is none other than the house of God, and this is the gateway to heaven!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Jacob rose early in the morning and took the stone he had put under his head, and he set it up for a pillar (a monument to the vision in his dream), and he poured oil on its top [in dedication].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And he named that place Bethel [the house of God]; but the name of that city was Luz at first.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then Jacob made a vow, saying, If God will be with me and will keep me in this way that I go and will give me food to eat and clothing to wear,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' So that I may come again to my father''s house in peace, then the Lord shall be my God;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And this stone which I have set up as a pillar (monument) shall be God''s house [a sacred place to me], and of all [the increase of possessions] that You give me I will give the tenth to You.'
