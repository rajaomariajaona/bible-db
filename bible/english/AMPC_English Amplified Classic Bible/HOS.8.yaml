document_id: HOS.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SET THE trumpet to your lips! [The enemy] comes as a [great] vulture against the house of the Lord, because they have broken My covenant and transgressed against My law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Then they will cry to Me, My God, we [of Israel] know You!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Israel has rejected the good [with loathing]; the enemy shall pursue him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They set up kings, but not from Me [therefore without My blessing]; they have made princes or removed them [without consulting Me; therefore], I knew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognized [them] not. With their silver and their gold they made idols for themselves, that they [the silver and the gold] may be destroyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Your calf [idol], O Samaria, is loathsome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I have spurned it. My wrath burns against them. How long will it be before they attain purity?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For this [calf] too is from Israel; a craftsman made it; therefore it is not God. The calf of Samaria shall be broken to shivers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' go up in flames.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For they sow the wind and they shall reap the whirlwind. The standing grain has no heads; it shall yield no meal; if it were to yield, strangers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' aliens would eat it up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Israel is [as if] swallowed up. Already they have become among the nations as a vessel [of cheap, coarse pottery] that is useless.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For they are gone up to Assyria, a wild ass taking her own way by herself; Ephraim has hired lovers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Yes, though with presents they hire [allies] among the nations, now will I gather them up, and in a little while they will sorrow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' begin to diminish [their gifts] because of the burden (tribute) imposed by the king of princes [the king of Assyria].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For Ephraim has multiplied altars for sinning; yes, to him altars are intended for sinning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I wrote for him the ten thousand things of My law, but they are counted as a strange thing [as something which does not concern him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' My sacrificial gifts they sacrifice [as a mere form]; yes, they sacrifice flesh and eat it, but the Lord does not accept them. Now He will [earnestly] remember their guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' iniquity and will punish their sins. They shall return to [another] Egypt [Assyria]. [Deut. 28:68.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For Israel has forgotten his Maker and built palaces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' idol temples, and Judah has multiplied fortified cities; but I will send a fire upon his cities and it shall devour his palaces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortified buildings. [Amos 1:4, 7, 10, 12, 14; 2:2, 5.]'
