document_id: HOS.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' SET THE trumpet to your lips! [The enemy] comes as a [great] vulture against the house of the Lord, because they have broken My covenant and transgressed against My law.'
  '10':
  - type: text
    content: ' Yes, though with presents they hire [allies] among the nations, now will I gather them up, and in a little while they will sorrow '
  - type: text
    content: and
  - type: text
    content: ' begin to diminish [their gifts] because of the burden (tribute) imposed by the king of princes [the king of Assyria].'
  '11':
  - type: text
    content: ' For Ephraim has multiplied altars for sinning; yes, to him altars are intended for sinning.'
  '12':
  - type: text
    content: ' I wrote for him the ten thousand things of My law, but they are counted as a strange thing [as something which does not concern him].'
  '13':
  - type: text
    content: ' My sacrificial gifts they sacrifice [as a mere form]; yes, they sacrifice flesh and eat it, but the Lord does not accept them. Now He will [earnestly] remember their guilt '
  - type: text
    content: and
  - type: text
    content: ' iniquity and will punish their sins. They shall return to [another] Egypt [Assyria]. [Deut. 28:68.]'
  '14':
  - type: text
    content: ' For Israel has forgotten his Maker and built palaces '
  - type: text
    content: and
  - type: text
    content: ' idol temples, and Judah has multiplied fortified cities; but I will send a fire upon his cities and it shall devour his palaces '
  - type: text
    content: and
  - type: text
    content: ' fortified buildings. [Amos 1:4, 7, 10, 12, 14; 2:2, 5.]'
  '2':
  - type: text
    content: ' Then they will cry to Me, My God, we [of Israel] know You!'
  '3':
  - type: text
    content: ' Israel has rejected the good [with loathing]; the enemy shall pursue him.'
  '4':
  - type: text
    content: ' They set up kings, but not from Me [therefore without My blessing]; they have made princes or removed them [without consulting Me; therefore], I knew '
  - type: text
    content: and
  - type: text
    content: ' recognized [them] not. With their silver and their gold they made idols for themselves, that they [the silver and the gold] may be destroyed.'
  '5':
  - type: text
    content: ' Your calf [idol], O Samaria, is loathsome '
  - type: text
    content: and
  - type: text
    content: ' I have spurned it. My wrath burns against them. How long will it be before they attain purity?'
  '6':
  - type: text
    content: ' For this [calf] too is from Israel; a craftsman made it; therefore it is not God. The calf of Samaria shall be broken to shivers '
  - type: text
    content: and
  - type: text
    content: ' go up in flames.'
  '7':
  - type: text
    content: ' For they sow the wind and they shall reap the whirlwind. The standing grain has no heads; it shall yield no meal; if it were to yield, strangers '
  - type: text
    content: and
  - type: text
    content: ' aliens would eat it up.'
  '8':
  - type: text
    content: ' Israel is [as if] swallowed up. Already they have become among the nations as a vessel [of cheap, coarse pottery] that is useless.'
  '9':
  - type: text
    content: ' For they are gone up to Assyria, a wild ass taking her own way by herself; Ephraim has hired lovers.'
