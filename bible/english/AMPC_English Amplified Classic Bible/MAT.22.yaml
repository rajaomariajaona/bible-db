document_id: MAT.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND AGAIN Jesus spoke to them in parables (comparisons, stories used to illustrate and explain), saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' The kingdom of heaven is like a king who gave a wedding banquet for his son'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And sent his servants to summon those who had been invited to the wedding banquet, but they refused to come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Again he sent other servants, saying, Tell those who are invited, Behold, I have prepared my banquet; my bullocks and my fat calves are killed, and everything is prepared; come to the wedding feast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But they were not concerned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' paid no attention [they ignored and made light of the summons, treating it with contempt] and they went away–one to his farm, another to his business,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' While the others seized his servants, treated them shamefully, and put them to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [Hearing this] the king was infuriated; and he sent his soldiers and put those murderers to death and burned their city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then he said to his servants, The wedding [feast] is prepared, but those invited were not worthy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So go to the thoroughfares where they leave the city [where the main roads and those from the country end] and invite to the wedding feast as many as you find.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And those servants went out on the crossroads and got together as many as they found, both bad and good, so [the room in which] the wedding feast [was held] was filled with guests.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But when the king came in to view the guests, he looked intently at a man there who had on no wedding garment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And he said, Friend, how did you come in here without putting on the [appropriate] wedding garment? And he was speechless (muzzled, gagged).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then the king said to the attendants, Tie him hand and foot, and throw him into the darkness outside; there will be weeping and grinding of teeth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For many are called (invited and summoned), but few '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' chosen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then the Pharisees went and consulted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plotted together how they might entangle Jesus in His talk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And they sent their disciples to Him along with the Herodians, saying, Teacher, we know that You are sincere '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what You profess to be and that You teach the way of God truthfully, regardless of consequences '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' being afraid of no man; for You are impartial '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do not regard either the person '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' the position of anyone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Tell us then what You think about this: Is it lawful to pay tribute [levied on individuals and to be paid yearly] to Caesar or not?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But Jesus, aware of their malicious plot, asked, Why do you put Me to the test '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' try to entrap Me, you pretenders (hypocrites)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Show me the money '
  - type: usfm
    marker: it
    children:
    - type: text
      text: used
  - type: text
    text: ' for the tribute. And they brought Him a denarius.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And Jesus said to them, Whose likeness and title are these?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' They said, Caesar''s. Then He said to them, Pay therefore to Caesar the things that are due to Caesar, and pay to God the things that are due to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' When they heard it they were amazed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' marveled; and they left Him and departed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The same day some Sadducees, who say that there is no resurrection [of the dead], came to Him and they asked Him a question,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Saying, Teacher, Moses said, If a man dies, leaving no children, his brother shall marry the widow and raise up a family for his brother. [Deut. 25:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Now there were seven brothers among us; the first married and died, and, having no children, left his wife to his brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The second also died childless, and the third, down to the seventh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Last of all, the woman died also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Now, in the resurrection, to which of the seven will she be wife? For they all had her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' But Jesus replied to them, You are wrong because you know neither the Scriptures nor God''s power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' For in the resurrected state neither do [men] marry nor are [women] given in marriage, but they are like the angels in heaven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But as to the resurrection of the dead–have you never read what was said to you by God,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' I am the God of Abraham, and the God of Isaac, and the God of Jacob? He is not the God of the dead but of the living! [Exod. 3:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And when the throng heard it, they were astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' filled with [glad] amazement at His teaching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Now when the Pharisees heard that He had silenced (muzzled) the Sadducees, they gathered together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And one of their number, a lawyer, asked Him a question to test Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Teacher, which kind of commandment is great and important (the principal kind) in the Law? [Some commandments are light–which are heavy?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And He replied to him, You shall love the Lord your God with all your heart and with all your soul and with all your mind (intellect). [Deut. 6:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' This is the great (most important, principal) and first commandment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And a second is like it: You shall love your neighbor as [you do] yourself. [Lev. 19:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' These two commandments sum up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upon them depend all the Law and the Prophets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Now while the Pharisees were still assembled there, Jesus asked them a question,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Saying, What do you think of the Christ? Whose Son is He? They said to Him, The Son of David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' He said to them, How is it then that David, under the influence of the [Holy] Spirit, calls Him Lord, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' The Lord said to My Lord, Sit at My right hand until I put Your enemies under Your feet? [Ps. 110:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' If then David thus calls Him Lord, how is He his Son?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And no one was able to answer Him a word, nor from that day did anyone venture '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dare to question Him.'
