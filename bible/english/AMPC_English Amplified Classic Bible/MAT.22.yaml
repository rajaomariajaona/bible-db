document_id: MAT.22,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AND AGAIN Jesus spoke to them in parables (comparisons, stories used to illustrate and explain), saying,'
  '10':
  - type: text
    content: ' And those servants went out on the crossroads and got together as many as they found, both bad and good, so [the room in which] the wedding feast [was held] was filled with guests.'
  '11':
  - type: text
    content: ' But when the king came in to view the guests, he looked intently at a man there who had on no wedding garment.'
  '12':
  - type: text
    content: ' And he said, Friend, how did you come in here without putting on the [appropriate] wedding garment? And he was speechless (muzzled, gagged).'
  '13':
  - type: text
    content: ' Then the king said to the attendants, Tie him hand and foot, and throw him into the darkness outside; there will be weeping and grinding of teeth.'
  '14':
  - type: text
    content: ' For many are called (invited and summoned), but few '
  - type: text
    content: are
  - type: text
    content: ' chosen.'
  '15':
  - type: text
    content: ' Then the Pharisees went and consulted '
  - type: text
    content: and
  - type: text
    content: ' plotted together how they might entangle Jesus in His talk.'
  '16':
  - type: text
    content: ' And they sent their disciples to Him along with the Herodians, saying, Teacher, we know that You are sincere '
  - type: text
    content: and
  - type: text
    content: ' what You profess to be and that You teach the way of God truthfully, regardless of consequences '
  - type: text
    content: and
  - type: text
    content: ' being afraid of no man; for You are impartial '
  - type: text
    content: and
  - type: text
    content: ' do not regard either the person '
  - type: text
    content: or
  - type: text
    content: ' the position of anyone.'
  '17':
  - type: text
    content: ' Tell us then what You think about this: Is it lawful to pay tribute [levied on individuals and to be paid yearly] to Caesar or not?'
  '18':
  - type: text
    content: ' But Jesus, aware of their malicious plot, asked, Why do you put Me to the test '
  - type: text
    content: and
  - type: text
    content: ' try to entrap Me, you pretenders (hypocrites)?'
  '19':
  - type: text
    content: ' Show me the money '
  - type: text
    content: used
  - type: text
    content: ' for the tribute. And they brought Him a denarius.'
  '2':
  - type: text
    content: ' The kingdom of heaven is like a king who gave a wedding banquet for his son'
  '20':
  - type: text
    content: ' And Jesus said to them, Whose likeness and title are these?'
  '21':
  - type: text
    content: ' They said, Caesar''s. Then He said to them, Pay therefore to Caesar the things that are due to Caesar, and pay to God the things that are due to God.'
  '22':
  - type: text
    content: ' When they heard it they were amazed '
  - type: text
    content: and
  - type: text
    content: ' marveled; and they left Him and departed.'
  '23':
  - type: text
    content: ' The same day some Sadducees, who say that there is no resurrection [of the dead], came to Him and they asked Him a question,'
  '24':
  - type: text
    content: ' Saying, Teacher, Moses said, If a man dies, leaving no children, his brother shall marry the widow and raise up a family for his brother. [Deut. 25:5.]'
  '25':
  - type: text
    content: ' Now there were seven brothers among us; the first married and died, and, having no children, left his wife to his brother.'
  '26':
  - type: text
    content: ' The second also died childless, and the third, down to the seventh.'
  '27':
  - type: text
    content: ' Last of all, the woman died also.'
  '28':
  - type: text
    content: ' Now, in the resurrection, to which of the seven will she be wife? For they all had her.'
  '29':
  - type: text
    content: ' But Jesus replied to them, You are wrong because you know neither the Scriptures nor God''s power.'
  '3':
  - type: text
    content: ' And sent his servants to summon those who had been invited to the wedding banquet, but they refused to come.'
  '30':
  - type: text
    content: ' For in the resurrected state neither do [men] marry nor are [women] given in marriage, but they are like the angels in heaven.'
  '31':
  - type: text
    content: ' But as to the resurrection of the dead–have you never read what was said to you by God,'
  '32':
  - type: text
    content: ' I am the God of Abraham, and the God of Isaac, and the God of Jacob? He is not the God of the dead but of the living! [Exod. 3:6.]'
  '33':
  - type: text
    content: ' And when the throng heard it, they were astonished '
  - type: text
    content: and
  - type: text
    content: ' filled with [glad] amazement at His teaching.'
  '34':
  - type: text
    content: ' Now when the Pharisees heard that He had silenced (muzzled) the Sadducees, they gathered together.'
  '35':
  - type: text
    content: ' And one of their number, a lawyer, asked Him a question to test Him.'
  '36':
  - type: text
    content: ' Teacher, which kind of commandment is great and important (the principal kind) in the Law? [Some commandments are light–which are heavy?]'
  '37':
  - type: text
    content: ' And He replied to him, You shall love the Lord your God with all your heart and with all your soul and with all your mind (intellect). [Deut. 6:5.]'
  '38':
  - type: text
    content: ' This is the great (most important, principal) and first commandment.'
  '39':
  - type: text
    content: ' And a second is like it: You shall love your neighbor as [you do] yourself. [Lev. 19:18.]'
  '4':
  - type: text
    content: ' Again he sent other servants, saying, Tell those who are invited, Behold, I have prepared my banquet; my bullocks and my fat calves are killed, and everything is prepared; come to the wedding feast.'
  '40':
  - type: text
    content: ' These two commandments sum up '
  - type: text
    content: and
  - type: text
    content: ' upon them depend all the Law and the Prophets.'
  '41':
  - type: text
    content: ' Now while the Pharisees were still assembled there, Jesus asked them a question,'
  '42':
  - type: text
    content: ' Saying, What do you think of the Christ? Whose Son is He? They said to Him, The Son of David.'
  '43':
  - type: text
    content: ' He said to them, How is it then that David, under the influence of the [Holy] Spirit, calls Him Lord, saying,'
  '44':
  - type: text
    content: ' The Lord said to My Lord, Sit at My right hand until I put Your enemies under Your feet? [Ps. 110:1.]'
  '45':
  - type: text
    content: ' If then David thus calls Him Lord, how is He his Son?'
  '46':
  - type: text
    content: ' And no one was able to answer Him a word, nor from that day did anyone venture '
  - type: text
    content: or
  - type: text
    content: ' dare to question Him.'
  '5':
  - type: text
    content: ' But they were not concerned '
  - type: text
    content: and
  - type: text
    content: ' paid no attention [they ignored and made light of the summons, treating it with contempt] and they went away–one to his farm, another to his business,'
  '6':
  - type: text
    content: ' While the others seized his servants, treated them shamefully, and put them to death.'
  '7':
  - type: text
    content: ' [Hearing this] the king was infuriated; and he sent his soldiers and put those murderers to death and burned their city.'
  '8':
  - type: text
    content: ' Then he said to his servants, The wedding [feast] is prepared, but those invited were not worthy.'
  '9':
  - type: text
    content: ' So go to the thoroughfares where they leave the city [where the main roads and those from the country end] and invite to the wedding feast as many as you find.'
