document_id: ISA.62,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' FOR ZION''S sake will I [Isaiah] not hold my peace, and for Jerusalem''s sake I will not rest until her imputed righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindication go forth as brightness, and her salvation radiates as does a burning torch.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Go through, go through the gates! Prepare the way for the people. Cast up, cast up the highway! Gather out the stones. Lift up a standard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' ensign over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for the peoples.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Behold, the Lord has proclaimed to the end of the earth: Say to the Daughter of Zion, Behold, your salvation comes [in the person of the Lord]; behold, His reward is with Him, and His work '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recompense before Him. [Isa. 40:10.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And they shall call them the Holy People, the Redeemed of the Lord; and you shall be called Sought Out, a City Not Forsaken.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And the nations shall see your righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindication [your rightness and justice–not your own, but His ascribed to you], and all kings shall behold your salvation and glory; and you shall be called by a new name which the mouth of the Lord shall name. [Rev. 2:17.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' You shall also be [so beautiful and prosperous as to be thought of as] a crown of glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor in the hand of the Lord, and a royal diadem [exceedingly beautiful] in the hand of your God.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' You [Judah] shall no more be termed Forsaken, nor shall your land be called Desolate any more. But you shall be called Hephzibah [My delight is in her], and your land be called Beulah [married]; for the Lord delights in you, and your land shall be married [owned and protected by the Lord].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For as a young man marries a virgin [O Jerusalem], so shall your sons marry you; and as the bridegroom rejoices over the bride, so shall your God rejoice over you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I have set watchmen upon your walls, O Jerusalem, who will never hold their peace day or night; you who [are His servants and by your prayers] put the Lord in remembrance [of His promises], keep not silence,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And give Him no rest until He establishes Jerusalem and makes her a praise in the earth.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' The Lord has sworn by His right hand and by His mighty arm: Surely I will not again give your grain as food for your enemies, and [the invading sons of] aliens shall not drink your new wine for which you have toiled;'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But they who have gathered it shall eat it and praise the Lord, and they who have brought in the vintage shall drink it [at the feasts celebrated] in the courts of My sanctuary (the temple of My holiness).'
