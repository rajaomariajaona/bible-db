document_id: MAT.24,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' JESUS DEPARTED from the temple area and was going on His way when His disciples came up to Him to call His attention to the buildings of the temple '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' point them out to Him.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And then many will be offended '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' repelled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' will begin to distrust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desert [Him Whom they ought to trust and obey] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' will stumble and fall away and betray one another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pursue one another with hatred.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And many false prophets will rise up and deceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lead many into error.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the love of the great body of people will grow cold because of the multiplied lawlessness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' iniquity,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But he who endures to the end will be saved.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And this good news of the kingdom (the Gospel) will be preached throughout the whole world as a testimony to all the nations, and then will come the end.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So when you see the appalling sacrilege [the abomination that astonishes and makes desolate], spoken of by the prophet Daniel, standing in the Holy Place–let the reader take notice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ponder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed [this]–[Dan. 9:27; 11:31; 12:11.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then let those who are in Judea flee to the mountains;'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let him who is on the housetop not come down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' go into the house to take anything;'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And let him who is in the field not turn back to get his overcoat.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And alas for the women who are pregnant and for those who have nursing babies in those days!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But He answered them, Do you see all these? Truly I tell you, there will not be left here one stone upon another that will not be thrown down.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Pray that your flight may not be in winter or on a Sabbath.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For then there will be great tribulation (affliction, distress, and oppression) such as has not been from the beginning of the world until now–no, and never will be [again]. [Dan. 12:1; Joel 2:2.]'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And if those days had not been shortened, no human being would endure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' survive, but for the sake of the elect (God''s chosen ones) those days will be shortened.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' If anyone says to you then, Behold, here is the Christ (the Messiah)! or, There He is!–do not believe it.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For false Christs and false prophets will arise, and they will show great signs and wonders so as to deceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lead astray, if possible, even the elect (God''s chosen ones).'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' See, I have warned you beforehand.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So if they say to you, Behold, He is in the wilderness (desert)–do not go out there; if they tell you, Behold, He is in the secret places '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' inner rooms–do not believe it.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For just as the lightning flashes from the east and shines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is seen as far as the west, so will the coming of the Son of Man be.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Wherever there is a fallen body (a corpse), there the vultures (or eagles) will flock together. [Job 39:30.]'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Immediately after the tribulation of those days the sun will be darkened, and the moon will not shed its light, and the stars will fall from the sky, and the powers of the heavens will be shaken. [Isa. 13:10; 34:4; Joel 2:10, 11; Zeph. 1:15.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' While He was seated on the Mount of Olives, the disciples came to Him privately and said, Tell us, when will this take place, and what will be the sign of Your coming and of the end (the completion, the consummation) of the age?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the sign of the Son of Man will appear in the sky, and then all the tribes of the earth will mourn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beat their breasts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lament in anguish, and they will see the Son of Man coming on the clouds of heaven with power and great glory [in brilliancy and splendor]. [Dan. 7:13; Rev. 1:7.]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He will send out His angels with a loud trumpet call, and they will gather His elect (His chosen ones) from the four winds, [even] from one end of the universe to the other. [Isa. 27:13; Zech. 9:14.]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' From the fig tree learn this lesson: as soon as its young shoots become soft and tender and it puts out its leaves, you know of a surety that summer is near.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So also when you see these signs, all taken together, coming to pass, you may know of a surety that He is near, at the very doors.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Truly I tell you, this generation (the whole multitude of people living at the same time, in a definite, given period) will not pass away till all these things taken together take place.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Sky and earth will pass away, but My words will not pass away.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But of that [exact] day and hour no one knows, not even the angels of heaven, nor the Son, but only the Father.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As were the days of Noah, so will be the coming of the Son of Man.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For just as in those days before the flood they were eating and drinking, [men] marrying and [women] being given in marriage, until the [very] day when Noah went into the ark,'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they did not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' understand until the flood came and swept them all away–so will be the coming of the Son of Man. [Gen. 6:5-8; 7:6-24.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus answered them, Be careful that no one misleads you [deceiving you and leading you into error].'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' At that time two men will be in the field; one will be taken and one will be left.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Two women will be grinding at the hand mill; one will be taken and one will be left.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Watch therefore [give strict attention, be cautious and active], for you do not know in what kind of a day [whether a near or remote one] your Lord is coming.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But understand this: had the householder known in what [part of the night, whether in a night or a morning] watch the thief was coming, he would have watched and would not have allowed his house to be undermined '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broken into.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You also must be ready therefore, for the Son of Man is coming at an hour when you do not expect Him.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who then is the faithful, thoughtful, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wise servant, whom his master has put in charge of his household to give to the others the food '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' supplies at the proper time?'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Blessed (happy, fortunate, and to be envied) is that servant whom, when his master comes, he will find so doing.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I solemnly declare to you, he will set him over all his possessions.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But if that servant is wicked and says to himself, My master is delayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is going to be gone a long time,'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And begins to beat his fellow servants and to eat and drink with the drunken,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For many will come in (on the strength of) My name [appropriating the name which belongs to Me], saying, I am the Christ (the Messiah), and they will lead many astray.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The master of that servant will come on a day when he does not expect him and at an hour of which he is not aware,'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And will punish him [cut him up by scourging] and put him with the pretenders (hypocrites); there will be weeping and grinding of teeth.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And you will hear of wars and rumors of wars; see that you are not frightened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' troubled, for this must take place, but the end is not yet.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For nation will rise against nation, and kingdom against kingdom, and there will be famines and earthquakes in place after place;'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All this is but the beginning [the early pains] of the birth pangs [of the intolerable anguish].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then they will hand you over to suffer affliction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tribulation and put you to death, and you will be hated by all nations for My name''s sake.'
