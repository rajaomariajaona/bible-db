document_id: GEN.36,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THIS is the history of the descendants of Esau, that is, Edom.'
  '10':
  - type: text
    content: ' These are the names of Esau''s sons: Eliphaz, the son of Adah, Esau''s wife, and Reuel, the son of Basemath, Esau''s wife.'
  '11':
  - type: text
    content: ' And the sons of Eliphaz were Teman, Omar, Zepho, Gatam, and Kenaz.'
  '12':
  - type: text
    content: ' And Timna was a concubine of Eliphaz, Esau''s son; and she bore Amalek to Eliphaz. These are the sons of Adah, Esau''s wife.'
  '13':
  - type: text
    content: ' These are the sons of Reuel: Nahath, Zerah, Shammah, and Mizzah. These are the sons of Basemath, Esau''s wife.'
  '14':
  - type: text
    content: ' And these are the sons of Oholibamah daughter of Anah, the son of Zibeon, Esau''s wife. She bore to Esau: Jeush, Jalam, and Korah.'
  '15':
  - type: text
    content: ' These are the chiefs of the sons of Esau: The sons of Eliphaz the firstborn of Esau: Chiefs Teman, Omar, Zepho, Kenaz,'
  '16':
  - type: text
    content: ' Korah, Gatam, and Amalek. These are the chiefs of Eliphaz in the land of Edom; they are the sons of Adah.'
  '17':
  - type: text
    content: ' These are the sons of Reuel, Esau''s son: Chiefs Nahath, Zerah, Shammah, Mizzah. These are the chiefs of Reuel in the land of Edom; they are the sons of Basemath, Esau''s wife.'
  '18':
  - type: text
    content: ' These are the sons of Oholibamah, Esau''s wife: Chiefs Jeush, Jalam, and Korah. These are the chiefs born of Oholibamah daughter of Anah, Esau''s wife.'
  '19':
  - type: text
    content: ' These are the sons of Esau, that is, Edom, and these are their chiefs.'
  '2':
  - type: text
    content: ' Esau took his wives from the women of Canaan: Adah daughter of Elon the Hittite, and Oholibamah daughter of Anah, the son of Zibeon the Hivite,'
  '20':
  - type: text
    content: ' These are the sons of Seir the Horite, the inhabitants of the land: Lotan, Shobal, Zibeon, Anah,'
  '21':
  - type: text
    content: ' Dishon, Ezer, and Dishan. These are the chiefs of the Horites, the sons of Seir in the land of Edom.'
  '22':
  - type: text
    content: ' The sons of Lotan are Hori and Hemam; and Lotan''s sister is Timna.'
  '23':
  - type: text
    content: ' The sons of Shobal are these: Alvan, Manahath, Ebal, Shepho, and Onam.'
  '24':
  - type: text
    content: ' These are the sons of Zibeon: Aiah and Anah. This is the Anah who found the hot springs in the wilderness as he pastured the donkeys of Zibeon his father.'
  '25':
  - type: text
    content: ' The children of Anah are these: Dishon and Oholibamah daughter of Anah [Esau''s wife].'
  '26':
  - type: text
    content: ' These are the sons of Dishon: Hemdan, Eshban, Ithran, and Cheran.'
  '27':
  - type: text
    content: ' Ezer''s sons are these: Bilhan, Zaavan, and Akan.'
  '28':
  - type: text
    content: ' The sons of Dishan are these: Uz and Aran.'
  '29':
  - type: text
    content: ' The Horite chiefs are these: Lotan, Shobal, Zibeon, Anah,'
  '3':
  - type: text
    content: ' And Basemath, Ishmael''s daughter, sister of Nebaioth.'
  '30':
  - type: text
    content: ' Dishon, Ezer, Dishan. These are the Horite chiefs, according to their clans, in the land of Seir.'
  '31':
  - type: text
    content: ' And these are the kings who reigned in Edom before any king reigned over the Israelites:'
  '32':
  - type: text
    content: ' Bela son of Beor reigned in Edom. And the name of his city was Dinhabah.'
  '33':
  - type: text
    content: ' Now Bela died, and Jobab son of Zerah of Bozrah reigned in his stead.'
  '34':
  - type: text
    content: ' Then Jobab died, and Husham of the land of the Temanites reigned in his stead.'
  '35':
  - type: text
    content: ' And Husham died, and Hadad son of Bedad, who defeated Midian in the country of Moab, reigned in his stead. The name of his [enclosed] city was Avith.'
  '36':
  - type: text
    content: ' Hadad died, and Samlah of Masrekah succeeded him.'
  '37':
  - type: text
    content: ' Then Samlah died, and Shaul of Rehoboth on the river [Euphrates] reigned in his stead.'
  '38':
  - type: text
    content: ' And Shaul died, and Baal-hanan son of Achbor reigned in his stead.'
  '39':
  - type: text
    content: ' Baal-hanan son of Achbor died, and then Hadar reigned. His [enclosed] city was Pau; his wife''s name was Mehetabel daughter of Matred, the daughter of Mezahab.'
  '4':
  - type: text
    content: ' Adah bore to Esau, Eliphaz; Basemath bore Reuel;'
  '40':
  - type: text
    content: ' And these are the names of the chiefs of Esau, according to their families and places of residence, by their names: Chiefs Timna, Alvah, Jetheth,'
  '41':
  - type: text
    content: ' Oholibamah, Elah, Pinon,'
  '42':
  - type: text
    content: ' Kenaz, Teman, Mibzar,'
  '43':
  - type: text
    content: ' Magdiel, and Iram. These are the chiefs of Edom [that is, of Esau the father of the Edomites], according to their dwelling places in their land.'
  '5':
  - type: text
    content: ' And Oholibamah bore Jeush, Jalam, and Korah. These are the sons of Esau born to him in Canaan.'
  '6':
  - type: text
    content: ' Now Esau took his wives, his sons, his daughters, and all the members of his household, his cattle, all his beasts, and all his possessions which he had obtained in the land of Canaan, and he went into a land away from his brother Jacob.'
  '7':
  - type: text
    content: ' For their great flocks '
  - type: text
    content: and
  - type: text
    content: ' herds '
  - type: text
    content: and
  - type: text
    content: ' possessions [which they had collected] made it impossible for them to dwell together; the land in which they were strangers could not support them because of their livestock.'
  '8':
  - type: text
    content: ' So Esau dwelt in the hill country of Seir; Esau is Edom.'
  '9':
  - type: text
    content: ' And this is the history of the descendants of Esau the father of the Edomites in the hill country of Seir.'
