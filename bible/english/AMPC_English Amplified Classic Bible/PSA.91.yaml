document_id: PSA.91
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HE WHO dwells in the secret place of the Most High shall remain stable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fixed under the shadow of the Almighty [Whose power no foe can withstand].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I will say of the Lord, He is my Refuge and my Fortress, my God; on Him I lean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in Him I [confidently] trust!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For [then] He will deliver you from the snare of the fowler and from the deadly pestilence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [Then] He will cover you with His pinions, and under His wings shall you trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' find refuge; His truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His faithfulness are a shield and a buckler.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' You shall not be afraid of the terror of the night, nor of the arrow (the evil plots and slanders of the wicked) that flies by day,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Nor of the pestilence that stalks in darkness, nor of the destruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sudden death that surprise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lay waste at noonday.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' A thousand may fall at your side, and ten thousand at your right hand, but it shall not come near you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Only a spectator shall you be [yourself inaccessible in the secret place of the Most High] as you witness the reward of the wicked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Because you have made the Lord your refuge, and the Most High your dwelling place, [Ps. 91:1, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' There shall no evil befall you, nor any plague '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' calamity come near your tent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For He will give His angels [especial] charge over you to accompany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preserve you in all your ways [of obedience and service].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' They shall bear you up on their hands, lest you dash your foot against a stone. [Luke 4:10, 11; Heb. 1:14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' You shall tread upon the lion and adder; the young lion and the serpent shall you trample underfoot. [Luke 10:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Because he has set his love upon Me, therefore will I deliver him; I will set him on high, because he knows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understands My name [has a personal knowledge of My mercy, love, and kindness–trusts and relies on Me, knowing I will never forsake him, no, never].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He shall call upon Me, and I will answer him; I will be with him in trouble, I will deliver him and honor him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' With long life will I satisfy him and show him My salvation.'
