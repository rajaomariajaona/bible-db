document_id: PSA.91,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' HE WHO dwells in the secret place of the Most High shall remain stable '
  - type: text
    content: and
  - type: text
    content: ' fixed under the shadow of the Almighty [Whose power no foe can withstand].'
  '10':
  - type: text
    content: ' There shall no evil befall you, nor any plague '
  - type: text
    content: or
  - type: text
    content: ' calamity come near your tent.'
  '11':
  - type: text
    content: ' For He will give His angels [especial] charge over you to accompany '
  - type: text
    content: and
  - type: text
    content: ' defend '
  - type: text
    content: and
  - type: text
    content: ' preserve you in all your ways [of obedience and service].'
  '12':
  - type: text
    content: ' They shall bear you up on their hands, lest you dash your foot against a stone. [Luke 4:10, 11; Heb. 1:14.]'
  '13':
  - type: text
    content: ' You shall tread upon the lion and adder; the young lion and the serpent shall you trample underfoot. [Luke 10:19.]'
  '14':
  - type: text
    content: ' Because he has set his love upon Me, therefore will I deliver him; I will set him on high, because he knows '
  - type: text
    content: and
  - type: text
    content: ' understands My name [has a personal knowledge of My mercy, love, and kindness–trusts and relies on Me, knowing I will never forsake him, no, never].'
  '15':
  - type: text
    content: ' He shall call upon Me, and I will answer him; I will be with him in trouble, I will deliver him and honor him.'
  '16':
  - type: text
    content: ' With long life will I satisfy him and show him My salvation.'
  '2':
  - type: text
    content: ' I will say of the Lord, He is my Refuge and my Fortress, my God; on Him I lean '
  - type: text
    content: and
  - type: text
    content: ' rely, '
  - type: text
    content: and
  - type: text
    content: ' in Him I [confidently] trust!'
  '3':
  - type: text
    content: ' For [then] He will deliver you from the snare of the fowler and from the deadly pestilence.'
  '4':
  - type: text
    content: ' [Then] He will cover you with His pinions, and under His wings shall you trust '
  - type: text
    content: and
  - type: text
    content: ' find refuge; His truth '
  - type: text
    content: and
  - type: text
    content: ' His faithfulness are a shield and a buckler.'
  '5':
  - type: text
    content: ' You shall not be afraid of the terror of the night, nor of the arrow (the evil plots and slanders of the wicked) that flies by day,'
  '6':
  - type: text
    content: ' Nor of the pestilence that stalks in darkness, nor of the destruction '
  - type: text
    content: and
  - type: text
    content: ' sudden death that surprise '
  - type: text
    content: and
  - type: text
    content: ' lay waste at noonday.'
  '7':
  - type: text
    content: ' A thousand may fall at your side, and ten thousand at your right hand, but it shall not come near you.'
  '8':
  - type: text
    content: ' Only a spectator shall you be [yourself inaccessible in the secret place of the Most High] as you witness the reward of the wicked.'
  '9':
  - type: text
    content: ' Because you have made the Lord your refuge, and the Most High your dwelling place, [Ps. 91:1, 14.]'
