document_id: JOB.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AFTER THIS, Job opened his mouth and cursed his day (birthday).'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Because it shut not the doors of my mother''s womb nor hid sorrow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trouble from my eyes.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Why was I not stillborn? Why did I not give up the ghost when my mother bore me?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Why did the knees receive me? Or why the breasts, that I should suck?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For then would I have lain down and been quiet; I would have slept; then would I have been at rest [in death]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' With kings and counselors of the earth, who built up [now] desolate ruins for themselves,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Or with princes who had gold, who filled their houses with silver.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Or [why] was I not a miscarriage, hidden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put away, as infants who never saw light?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' There [in death] the wicked cease from troubling, and there the weary are at rest.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' There the [captive] prisoners rest together; they hear not the taskmaster''s voice.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' The small and the great are there, and the servant is free from his master. [Jer. 20:14-18.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And Job said,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Why is light [of life] given to him who is in misery, and life to the bitter in soul,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Who long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait for death, but it comes not, and dig for it more than for hidden treasures,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Who rejoice exceedingly and are elated when they find the grave?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' [Why is the light of day given] to a man whose way is hidden, and whom God has hedged in?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' For my sighing comes before my food, and my groanings are poured out like water.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' For the thing which I greatly fear comes upon me, and that of which I am afraid befalls me.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' I was not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' am not at ease, nor had I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' have I rest, nor was I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' am I quiet, yet trouble came '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' still comes [upon me].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Let the day perish wherein I was born, and the night which announced, There is a man-child conceived.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Let that day be darkness! May not God above regard it, nor light shine upon it.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Let gloom and deep darkness claim it for their own; let a cloud dwell upon it; let all that blackens the day terrify it (the day that I was born).'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' As for that night, let thick darkness seize it; let it not rejoice among the days of the year; let it not come into the number of the months.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Yes, let that night be solitary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' barren; let no joyful voice come into it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Let those curse it who curse the day, who are skilled in rousing up Leviathan.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Let the stars of the early dawn of that day be dark; let [the morning] look in vain for the light, nor let it behold the day''s dawning,'
