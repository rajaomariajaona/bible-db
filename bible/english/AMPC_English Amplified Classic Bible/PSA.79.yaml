document_id: PSA.79,8
type_code: eng
verses:
  '1':
  - type: heading
    content: A Psalm of Asaph.
  - type: text
    content: ' O GOD, the nations have come into [the land of Your people] Your inheritance; Your sacred temple have they defiled; they have made Jerusalem heaps of ruins.'
  '10':
  - type: text
    content: ' Why should the Gentile nations say, Where is their God? Let vengeance for the blood of Your servants which is poured out be known among the nations in our sight [not delaying until some future generation].'
  '11':
  - type: text
    content: ' Let the groaning '
  - type: text
    content: and
  - type: text
    content: ' sighing of the prisoner come before You; according to the greatness of Your power '
  - type: text
    content: and
  - type: text
    content: ' Your arm spare those who are appointed to die!'
  '12':
  - type: text
    content: ' And return into the bosom of our neighbors sevenfold the taunts with which they have taunted '
  - type: text
    content: and
  - type: text
    content: ' scoffed at You, O Lord!'
  '13':
  - type: text
    content: ' Then we Your people, the sheep of Your pasture, will give You thanks forever; we will show forth '
  - type: text
    content: and
  - type: text
    content: ' publish Your praise from generation to generation.'
  '2':
  - type: text
    content: ' The dead bodies of Your servants they have given as food to the birds of the heavens, the flesh of Your saints to the beasts of the earth.'
  '3':
  - type: text
    content: ' Their blood they have poured out like water round about Jerusalem, and there was none to bury them.'
  '4':
  - type: text
    content: ' [Because of such humiliation] we have become a taunt '
  - type: text
    content: and
  - type: text
    content: ' reproach to our neighbors, a mocking and derision to those who are round about us.'
  '5':
  - type: text
    content: ' How long, O Lord? Will You be angry forever? Shall Your jealousy [which cannot endure a divided allegiance] burn like fire?'
  '6':
  - type: text
    content: ' Pour out Your wrath on the Gentile nations who do not acknowledge You, and upon the kingdoms that do not call on Your name. [II Thess. 1:8.]'
  '7':
  - type: text
    content: ' For they have devoured Jacob and laid waste his dwelling '
  - type: text
    content: and
  - type: text
    content: ' his pasture.'
  '8':
  - type: text
    content: ' O do not [earnestly] remember against us the iniquities '
  - type: text
    content: and
  - type: text
    content: ' guilt of our forefathers! Let Your compassion '
  - type: text
    content: and
  - type: text
    content: ' tender mercy speedily come to meet us, for we are brought very low.'
  '9':
  - type: text
    content: ' Help us, O God of our salvation, for the glory of Your name! Deliver us, forgive us, '
  - type: text
    content: and
  - type: text
    content: ' purge away our sins for Your name''s sake.'
