document_id: PSA.79,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Psalm of Asaph.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O GOD, the nations have come into [the land of Your people] Your inheritance; Your sacred temple have they defiled; they have made Jerusalem heaps of ruins.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Why should the Gentile nations say, Where is their God? Let vengeance for the blood of Your servants which is poured out be known among the nations in our sight [not delaying until some future generation].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let the groaning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sighing of the prisoner come before You; according to the greatness of Your power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Your arm spare those who are appointed to die!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And return into the bosom of our neighbors sevenfold the taunts with which they have taunted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scoffed at You, O Lord!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then we Your people, the sheep of Your pasture, will give You thanks forever; we will show forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' publish Your praise from generation to generation.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The dead bodies of Your servants they have given as food to the birds of the heavens, the flesh of Your saints to the beasts of the earth.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Their blood they have poured out like water round about Jerusalem, and there was none to bury them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Because of such humiliation] we have become a taunt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reproach to our neighbors, a mocking and derision to those who are round about us.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' How long, O Lord? Will You be angry forever? Shall Your jealousy [which cannot endure a divided allegiance] burn like fire?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Pour out Your wrath on the Gentile nations who do not acknowledge You, and upon the kingdoms that do not call on Your name. [II Thess. 1:8.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For they have devoured Jacob and laid waste his dwelling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' his pasture.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O do not [earnestly] remember against us the iniquities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt of our forefathers! Let Your compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tender mercy speedily come to meet us, for we are brought very low.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Help us, O God of our salvation, for the glory of Your name! Deliver us, forgive us, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purge away our sins for Your name''s sake.'
