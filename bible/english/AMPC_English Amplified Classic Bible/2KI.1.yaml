document_id: 2KI.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MOAB REBELLED against Israel after the death of Ahab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' [King] Ahaziah fell down through a lattice in his upper chamber in Samaria and lay sick. He sent messengers, saying, Go, ask Baal-zebub, the god of [Philistine] Ekron, if I shall recover from this illness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But the angel of the Lord said to Elijah the Tishbite, Arise, go up to meet the messengers of the king in Samaria and say to them, Is it because there is no God in Israel that you are going to inquire of Baal-zebub, the god of Ekron?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Therefore the Lord says: You [Ahaziah] shall not leave the bed on which you lie, but shall surely die. And Elijah departed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' When the messengers returned to Ahaziah, he said, Why have you turned back?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They replied, A man came up to meet us who said, Go back to the king who sent you and tell him, Thus says the Lord: Is there no God in Israel that you send to inquire of Baal-zebub, the god of Ekron? Therefore you shall not leave the bed on which you lie, but shall surely die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The king asked, What was the man like who came to meet you saying these things?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' They answered, He was a hairy man with a girdle of leather about his loins. And he said, It is Elijah the Tishbite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then the king sent to Elijah a captain of fifty men with his fifty [to seize him]. He found Elijah sitting on a hilltop and said, Man of God, the king says, Come down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Elijah said to the captain of fifty, If I am a man of God, then let fire come down from heaven and consume you and your fifty. And fire fell from heaven and consumed him and his fifty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Again King [Ahaziah] sent to him another captain of fifty with his fifty. And he said to Elijah, Man of God, the king has said, Come down quickly!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Elijah answered, If I am a man of God, let fire come down from heaven and consume you and your fifty. And the fire of God came down from heaven and consumed him and his fifty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Ahaziah sent again a captain of a third fifty with his fifty. And the third captain of fifty went up and fell on his knees before Elijah and besought him and said to him, O man of God, I pray you, let my life and the lives of these fifty, your servants, be precious in your sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Behold, fire came down from heaven and burned up the two captains of the former fifties with their fifties. Therefore let my life now be precious in your sight.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The angel of the Lord said to Elijah, Go down with him; do not be afraid of him. So he arose and went with him to the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Elijah said to [King] Ahaziah, Thus says the Lord: Since you have sent messengers to inquire of Baal-zebub, god of Ekron, is it because there is no God in Israel of Whom to inquire His word? Therefore you shall not leave the bed on which you lie, but shall surely die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So Ahaziah died according to the word of the Lord which Elijah had spoken. Joram [also a son of Ahab] reigned in Israel in his stead in the second year of Jehoram son of Jehoshaphat king of Judah, because Ahaziah had no son [but his brother].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Now the rest of the acts of Ahaziah, are they not written in the Book of the Chronicles of the Kings of Israel?'
