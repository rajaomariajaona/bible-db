document_id: PSA.53
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; in a mournful strain. A skillful song, {or} didactic {or} reflective poem of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE [empty-headed] fool has said in his heart, There is no God. Corrupt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil are they, and doing abominable iniquity; there is none who does good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' God looked down from heaven upon the children of men to see if there were any who understood, who sought (inquired after and desperately required) God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Every one of them has gone back [backslidden and fallen away]; they have altogether become filthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' corrupt; there is none who does good, no, not one. [Rom. 3:10-12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Have those who work evil no knowledge (no understanding)? They eat up My people as they eat bread; they do not call upon God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' There they are, in terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread, where there was [and had been] no terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread! For God has scattered the bones of him who encamps against you; you have put them to shame, because God has rejected them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Oh, that the salvation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliverance of Israel would come out of Zion! When God restores the fortunes of His people, then will Jacob rejoice and Israel be glad.'
