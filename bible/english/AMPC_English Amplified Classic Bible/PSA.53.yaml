document_id: PSA.53,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; in a mournful strain. A skillful song, {or} didactic {or} reflective poem of David.
  - type: text
    content: ' THE [empty-headed] fool has said in his heart, There is no God. Corrupt '
  - type: text
    content: and
  - type: text
    content: ' evil are they, and doing abominable iniquity; there is none who does good.'
  '2':
  - type: text
    content: ' God looked down from heaven upon the children of men to see if there were any who understood, who sought (inquired after and desperately required) God.'
  '3':
  - type: text
    content: ' Every one of them has gone back [backslidden and fallen away]; they have altogether become filthy '
  - type: text
    content: and
  - type: text
    content: ' corrupt; there is none who does good, no, not one. [Rom. 3:10-12.]'
  '4':
  - type: text
    content: ' Have those who work evil no knowledge (no understanding)? They eat up My people as they eat bread; they do not call upon God.'
  '5':
  - type: text
    content: ' There they are, in terror '
  - type: text
    content: and
  - type: text
    content: ' dread, where there was [and had been] no terror '
  - type: text
    content: and
  - type: text
    content: ' dread! For God has scattered the bones of him who encamps against you; you have put them to shame, because God has rejected them.'
  '6':
  - type: text
    content: ' Oh, that the salvation '
  - type: text
    content: and
  - type: text
    content: ' deliverance of Israel would come out of Zion! When God restores the fortunes of His people, then will Jacob rejoice and Israel be glad.'
