document_id: EPH.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR THIS reason [because I preached that you are thus built up together], I, Paul, [am] the prisoner of Jesus the Christ for the sake '
  - type: text
    content: and
  - type: text
    content: ' on behalf of you Gentiles–'
  '10':
  - type: text
    content: ' [The purpose is] that through the church the complicated, many-sided wisdom of God in all its infinite variety '
  - type: text
    content: and
  - type: text
    content: ' innumerable aspects might now be made known to the angelic rulers and authorities (principalities and powers) in the heavenly sphere.'
  '11':
  - type: text
    content: ' This is in accordance with the terms of the eternal '
  - type: text
    content: and
  - type: text
    content: ' timeless purpose which He has realized '
  - type: text
    content: and
  - type: text
    content: ' carried into effect in [the person of] Christ Jesus our Lord,'
  '12':
  - type: text
    content: ' In Whom, because of our faith in Him, we dare to have the boldness (courage and confidence) of free access (an unreserved approach to God with freedom and without fear).'
  '13':
  - type: text
    content: ' So I ask you not to lose heart [not to faint or become despondent through fear] at what I am suffering in your behalf. [Rather glory in it] for it is an honor to you.'
  '14':
  - type: text
    content: ' For this reason [seeing the greatness of this plan by which you are built together in Christ], I bow my knees before the Father '
  - type: text
    content: of our Lord Jesus Christ,
  '15':
  - type: text
    content: ' For Whom every family in heaven and on earth is named [that Father from Whom all fatherhood takes its title and derives its name].'
  '16':
  - type: text
    content: ' May He grant you out of the rich treasury of His glory to be strengthened '
  - type: text
    content: and
  - type: text
    content: ' reinforced with mighty power in the inner man by the [Holy] Spirit [Himself indwelling your innermost being and personality].'
  '17':
  - type: text
    content: ' May Christ through your faith [actually] dwell (settle down, abide, make His permanent home) in your hearts! May you be rooted deep in love '
  - type: text
    content: and
  - type: text
    content: ' founded securely on love,'
  '18':
  - type: text
    content: ' That you may have the power '
  - type: text
    content: and
  - type: text
    content: ' be strong to apprehend '
  - type: text
    content: and
  - type: text
    content: ' grasp with all the saints [God''s devoted people, the experience of that love] what is the breadth and length and height and depth [of it];'
  '19':
  - type: text
    content: ' [That you may really come] to know [practically, through experience for yourselves] the love of Christ, which far surpasses mere knowledge [without experience]; that you may be filled [through all your being] unto all the fullness of God [may have the richest measure of the divine Presence, and become a body wholly filled and flooded with God Himself]!'
  '2':
  - type: text
    content: ' Assuming that you have heard of the stewardship of God''s grace (His unmerited favor) that was entrusted to me [to dispense to you] for your benefit,'
  '20':
  - type: text
    content: ' Now to Him Who, by (in consequence of) the [action of His] power that is at work within us, is able to [carry out His purpose and] do superabundantly, far over '
  - type: text
    content: and
  - type: text
    content: ' above all that we [dare] ask or think [infinitely beyond our highest prayers, desires, thoughts, hopes, or dreams]–'
  '21':
  - type: text
    content: ' To Him be glory in the church and in Christ Jesus throughout all generations forever and ever. Amen (so be it).'
  '3':
  - type: text
    content: ' [And] that the mystery (secret) was made known to me '
  - type: text
    content: and
  - type: text
    content: ' I was allowed to comprehend it by direct revelation, as I already briefly wrote you.'
  '4':
  - type: text
    content: ' When you read this you can understand my insight into the mystery of Christ.'
  '5':
  - type: text
    content: ' [This mystery] was never disclosed to human beings in past generations as it has now been revealed to His holy apostles (consecrated messengers) and prophets by the [Holy] Spirit.'
  '6':
  - type: text
    content: ' [It is this:] that the Gentiles are now to be fellow heirs [with the Jews], members of the same body and joint partakers [sharing] in the same divine promise in Christ through [their acceptance of] the glad tidings (the Gospel).'
  '7':
  - type: text
    content: ' Of this [Gospel] I was made a minister according to the gift of God''s free grace (undeserved favor) which was bestowed on me by the exercise (the working in all its effectiveness) of His power.'
  '8':
  - type: text
    content: ' To me, though I am the very least of all the saints (God''s consecrated people), this grace (favor, privilege) was granted '
  - type: text
    content: and
  - type: text
    content: ' graciously entrusted: to proclaim to the Gentiles the unending (boundless, fathomless, incalculable, and exhaustless) riches of Christ [wealth which no human being could have searched out],'
  '9':
  - type: text
    content: ' Also to enlighten all men '
  - type: text
    content: and
  - type: text
    content: ' make plain to them what is the plan [regarding the Gentiles and providing for the salvation of all men] of the mystery kept hidden through the ages '
  - type: text
    content: and
  - type: text
    content: ' concealed until now in [the mind of] God Who created all things '
  - type: text
    content: by Christ Jesus.
