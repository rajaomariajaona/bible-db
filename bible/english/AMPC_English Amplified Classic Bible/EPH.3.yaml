document_id: EPH.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR THIS reason [because I preached that you are thus built up together], I, Paul, [am] the prisoner of Jesus the Christ for the sake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on behalf of you Gentiles–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Assuming that you have heard of the stewardship of God''s grace (His unmerited favor) that was entrusted to me [to dispense to you] for your benefit,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' [And] that the mystery (secret) was made known to me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I was allowed to comprehend it by direct revelation, as I already briefly wrote you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' When you read this you can understand my insight into the mystery of Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [This mystery] was never disclosed to human beings in past generations as it has now been revealed to His holy apostles (consecrated messengers) and prophets by the [Holy] Spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' [It is this:] that the Gentiles are now to be fellow heirs [with the Jews], members of the same body and joint partakers [sharing] in the same divine promise in Christ through [their acceptance of] the glad tidings (the Gospel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Of this [Gospel] I was made a minister according to the gift of God''s free grace (undeserved favor) which was bestowed on me by the exercise (the working in all its effectiveness) of His power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' To me, though I am the very least of all the saints (God''s consecrated people), this grace (favor, privilege) was granted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' graciously entrusted: to proclaim to the Gentiles the unending (boundless, fathomless, incalculable, and exhaustless) riches of Christ [wealth which no human being could have searched out],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Also to enlighten all men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make plain to them what is the plan [regarding the Gentiles and providing for the salvation of all men] of the mystery kept hidden through the ages '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' concealed until now in [the mind of] God Who created all things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by Christ Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' [The purpose is] that through the church the complicated, many-sided wisdom of God in all its infinite variety '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' innumerable aspects might now be made known to the angelic rulers and authorities (principalities and powers) in the heavenly sphere.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' This is in accordance with the terms of the eternal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' timeless purpose which He has realized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carried into effect in [the person of] Christ Jesus our Lord,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' In Whom, because of our faith in Him, we dare to have the boldness (courage and confidence) of free access (an unreserved approach to God with freedom and without fear).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So I ask you not to lose heart [not to faint or become despondent through fear] at what I am suffering in your behalf. [Rather glory in it] for it is an honor to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For this reason [seeing the greatness of this plan by which you are built together in Christ], I bow my knees before the Father '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of our Lord Jesus Christ,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For Whom every family in heaven and on earth is named [that Father from Whom all fatherhood takes its title and derives its name].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' May He grant you out of the rich treasury of His glory to be strengthened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reinforced with mighty power in the inner man by the [Holy] Spirit [Himself indwelling your innermost being and personality].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' May Christ through your faith [actually] dwell (settle down, abide, make His permanent home) in your hearts! May you be rooted deep in love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' founded securely on love,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' That you may have the power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be strong to apprehend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grasp with all the saints [God''s devoted people, the experience of that love] what is the breadth and length and height and depth [of it];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [That you may really come] to know [practically, through experience for yourselves] the love of Christ, which far surpasses mere knowledge [without experience]; that you may be filled [through all your being] unto all the fullness of God [may have the richest measure of the divine Presence, and become a body wholly filled and flooded with God Himself]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Now to Him Who, by (in consequence of) the [action of His] power that is at work within us, is able to [carry out His purpose and] do superabundantly, far over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' above all that we [dare] ask or think [infinitely beyond our highest prayers, desires, thoughts, hopes, or dreams]–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' To Him be glory in the church and in Christ Jesus throughout all generations forever and ever. Amen (so be it).'
