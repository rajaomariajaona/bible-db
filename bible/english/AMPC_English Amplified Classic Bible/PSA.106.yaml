document_id: PSA.106
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PRAISE THE Lord! (Hallelujah!) O give thanks to the Lord, for He is good; for His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness endure forever! [I Chron. 16:34.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Who can put into words '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tell the mighty deeds of the Lord? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Or
  - type: text
    text: ' who can show forth all the praise [that is due Him]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Blessed (happy, fortunate, to be envied) are those who observe justice [treating others fairly] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' who do right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are in right standing with God at all times.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [Earnestly] remember me, O Lord, when You favor Your people! O visit me also when You deliver them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grant me Your salvation!–'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' That I may see '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share the welfare of Your chosen ones, that I may rejoice in the gladness of Your nation, that I may glory with Your heritage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' We have sinned, as did also our fathers; we have committed iniquity, we have done wickedly. [Lev. 26:40-42.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Our fathers in Egypt understood not nor appreciated Your miracles; they did not [earnestly] remember the multitude of Your mercies nor imprint Your loving-kindness [on their hearts], but they were rebellious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provoked the Lord at the sea, even at the Red Sea. [Exod. 14:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Nevertheless He saved them for His name''s sake [to prove the righteousness of the divine character], that He might make His mighty power known.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He rebuked the Red Sea also, and it dried up; so He led them through the depths as through a pastureland. [Exod. 14:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And He saved them from the hand of him that hated them, and redeemed them from the hand of the [Egyptian] enemy. [Exod. 14:30.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the waters covered their adversaries; not one of them was left. [Exod. 14:27, 28; 15:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then [Israel] believed His words [trusting in, relying on them]; they sang His praise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But they hastily forgot His works; they did not [earnestly] wait for His plans [to develop] regarding them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' But lusted exceedingly in the wilderness and tempted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tried to restrain God [with their insistent desires] in the desert. [Num. 11:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And He gave them their request, but sent leanness into their souls '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [thinned their numbers by] disease and death. [Ps. 78:29-31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They envied Moses also in the camp, and Aaron [the high priest], the holy one of the Lord. [Num. 16:1-32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Therefore the earth opened and swallowed up Dathan and closed over the company of Abiram. [Num. 16:31, 32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And a fire broke out in their company; the flame burned up the wicked. [Num. 16:35, 46.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' They made a calf in Horeb and worshiped a molten image. [Exod. 32:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Thus they exchanged Him Who was their Glory for the image of an ox that eats grass [they traded their Honor for the image of a calf]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' They forgot God their Savior, Who had done such great things in Egypt,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Wonders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miracles in the land of Ham, dreadful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' awesome things at the Red Sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Therefore He said He would destroy them. [And He would have done so] had not Moses, His chosen one, stepped into the breach before Him to turn away His threatening wrath. [Exod. 32:10, 11, 32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then they spurned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despised the pleasant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desirable land [Canaan]; they believed not His word [neither trusting in, relying on, nor holding to it];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But they murmured in their tents '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hearkened not to the voice of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Therefore He lifted up His hand [as if taking an oath] against them, that He would cause them to fall in the wilderness,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Cast out their descendants among the nations, and scatter them in the lands [of the earth].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' They joined themselves also to the [idol] Baal of Peor and ate sacrifices [offered] to the lifeless [gods].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Thus they provoked the Lord to anger with their practices, and a plague broke out among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Then stood up Phinehas [the priest] and executed judgment, and so the plague was stayed. [Num. 25:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And that was credited to him for righteousness (right doing and right standing with God) to all generations forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' They angered the Lord also at the waters of Meribah, so that it went ill with Moses for their sakes; [Num. 20:3-13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' For they provoked [Moses''] spirit, so that he spoke unadvisedly with his lips.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' They did not destroy the [heathen] nations as the Lord commanded them,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' But mingled themselves with the [idolatrous] nations and learned their ways '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' works'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And served their idols, which were a snare to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Yes, they sacrificed their sons and their daughters to demons [II Kings 16:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And shed innocent blood, even the blood of their sons and of their daughters, whom they sacrificed to the idols of Canaan; and the land was polluted with their blood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' Thus were they defiled by their own works, and they played the harlot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' practiced idolatry with their own deeds [of idolatrous rites].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Therefore was the wrath of the Lord kindled against His people, insomuch that He abhorred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected His own heritage. [Deut. 32:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And He gave them into the hands of the [heathen] nations, and they that hated them ruled over them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Their enemies also oppressed them, and they were brought into subjection under the hand of their foes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' Many times did [God] deliver them, but they were rebellious in their counsel and sank low through their iniquity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Nevertheless He regarded their distress when He heard their cry;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And He [earnestly] remembered for their sake His covenant and relented their sentence of evil [comforting and easing Himself] according to the abundance of His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness [when they cried out to Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' He also caused [Israel] to find sympathy among those who had carried them away captive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' Deliver us, O Lord our God, and gather us from among the nations, that we may give thanks to Your holy name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory in praising You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' Blessed (affectionately and gratefully praised) be the Lord, the God of Israel, from everlasting to everlasting! And let all the people say, Amen! Praise the Lord! (Hallelujah!) [I Chron. 16:35, 36.]'
