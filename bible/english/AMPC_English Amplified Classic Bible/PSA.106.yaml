document_id: PSA.106,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PRAISE THE Lord! (Hallelujah!) O give thanks to the Lord, for He is good; for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever! [I Chron. 16:34.]'
  '10':
  - type: text
    content: ' And He saved them from the hand of him that hated them, and redeemed them from the hand of the [Egyptian] enemy. [Exod. 14:30.]'
  '11':
  - type: text
    content: ' And the waters covered their adversaries; not one of them was left. [Exod. 14:27, 28; 15:5.]'
  '12':
  - type: text
    content: ' Then [Israel] believed His words [trusting in, relying on them]; they sang His praise.'
  '13':
  - type: text
    content: ' But they hastily forgot His works; they did not [earnestly] wait for His plans [to develop] regarding them,'
  '14':
  - type: text
    content: ' But lusted exceedingly in the wilderness and tempted '
  - type: text
    content: and
  - type: text
    content: ' tried to restrain God [with their insistent desires] in the desert. [Num. 11:4.]'
  '15':
  - type: text
    content: ' And He gave them their request, but sent leanness into their souls '
  - type: text
    content: and
  - type: text
    content: ' [thinned their numbers by] disease and death. [Ps. 78:29-31.]'
  '16':
  - type: text
    content: ' They envied Moses also in the camp, and Aaron [the high priest], the holy one of the Lord. [Num. 16:1-32.]'
  '17':
  - type: text
    content: ' Therefore the earth opened and swallowed up Dathan and closed over the company of Abiram. [Num. 16:31, 32.]'
  '18':
  - type: text
    content: ' And a fire broke out in their company; the flame burned up the wicked. [Num. 16:35, 46.]'
  '19':
  - type: text
    content: ' They made a calf in Horeb and worshiped a molten image. [Exod. 32:4.]'
  '2':
  - type: text
    content: ' Who can put into words '
  - type: text
    content: and
  - type: text
    content: ' tell the mighty deeds of the Lord? '
  - type: text
    content: Or
  - type: text
    content: ' who can show forth all the praise [that is due Him]?'
  '20':
  - type: text
    content: ' Thus they exchanged Him Who was their Glory for the image of an ox that eats grass [they traded their Honor for the image of a calf]!'
  '21':
  - type: text
    content: ' They forgot God their Savior, Who had done such great things in Egypt,'
  '22':
  - type: text
    content: ' Wonders '
  - type: text
    content: and
  - type: text
    content: ' miracles in the land of Ham, dreadful '
  - type: text
    content: and
  - type: text
    content: ' awesome things at the Red Sea.'
  '23':
  - type: text
    content: ' Therefore He said He would destroy them. [And He would have done so] had not Moses, His chosen one, stepped into the breach before Him to turn away His threatening wrath. [Exod. 32:10, 11, 32.]'
  '24':
  - type: text
    content: ' Then they spurned '
  - type: text
    content: and
  - type: text
    content: ' despised the pleasant '
  - type: text
    content: and
  - type: text
    content: ' desirable land [Canaan]; they believed not His word [neither trusting in, relying on, nor holding to it];'
  '25':
  - type: text
    content: ' But they murmured in their tents '
  - type: text
    content: and
  - type: text
    content: ' hearkened not to the voice of the Lord.'
  '26':
  - type: text
    content: ' Therefore He lifted up His hand [as if taking an oath] against them, that He would cause them to fall in the wilderness,'
  '27':
  - type: text
    content: ' Cast out their descendants among the nations, and scatter them in the lands [of the earth].'
  '28':
  - type: text
    content: ' They joined themselves also to the [idol] Baal of Peor and ate sacrifices [offered] to the lifeless [gods].'
  '29':
  - type: text
    content: ' Thus they provoked the Lord to anger with their practices, and a plague broke out among them.'
  '3':
  - type: text
    content: ' Blessed (happy, fortunate, to be envied) are those who observe justice [treating others fairly] '
  - type: text
    content: and
  - type: text
    content: ' who do right '
  - type: text
    content: and
  - type: text
    content: ' are in right standing with God at all times.'
  '30':
  - type: text
    content: ' Then stood up Phinehas [the priest] and executed judgment, and so the plague was stayed. [Num. 25:7, 8.]'
  '31':
  - type: text
    content: ' And that was credited to him for righteousness (right doing and right standing with God) to all generations forever.'
  '32':
  - type: text
    content: ' They angered the Lord also at the waters of Meribah, so that it went ill with Moses for their sakes; [Num. 20:3-13.]'
  '33':
  - type: text
    content: ' For they provoked [Moses''] spirit, so that he spoke unadvisedly with his lips.'
  '34':
  - type: text
    content: ' They did not destroy the [heathen] nations as the Lord commanded them,'
  '35':
  - type: text
    content: ' But mingled themselves with the [idolatrous] nations and learned their ways '
  - type: text
    content: and
  - type: text
    content: ' works'
  '36':
  - type: text
    content: ' And served their idols, which were a snare to them.'
  '37':
  - type: text
    content: ' Yes, they sacrificed their sons and their daughters to demons [II Kings 16:3.]'
  '38':
  - type: text
    content: ' And shed innocent blood, even the blood of their sons and of their daughters, whom they sacrificed to the idols of Canaan; and the land was polluted with their blood.'
  '39':
  - type: text
    content: ' Thus were they defiled by their own works, and they played the harlot '
  - type: text
    content: and
  - type: text
    content: ' practiced idolatry with their own deeds [of idolatrous rites].'
  '4':
  - type: text
    content: ' [Earnestly] remember me, O Lord, when You favor Your people! O visit me also when You deliver them, '
  - type: text
    content: and
  - type: text
    content: ' grant me Your salvation!–'
  '40':
  - type: text
    content: ' Therefore was the wrath of the Lord kindled against His people, insomuch that He abhorred '
  - type: text
    content: and
  - type: text
    content: ' rejected His own heritage. [Deut. 32:17.]'
  '41':
  - type: text
    content: ' And He gave them into the hands of the [heathen] nations, and they that hated them ruled over them.'
  '42':
  - type: text
    content: ' Their enemies also oppressed them, and they were brought into subjection under the hand of their foes.'
  '43':
  - type: text
    content: ' Many times did [God] deliver them, but they were rebellious in their counsel and sank low through their iniquity.'
  '44':
  - type: text
    content: ' Nevertheless He regarded their distress when He heard their cry;'
  '45':
  - type: text
    content: ' And He [earnestly] remembered for their sake His covenant and relented their sentence of evil [comforting and easing Himself] according to the abundance of His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness [when they cried out to Him].'
  '46':
  - type: text
    content: ' He also caused [Israel] to find sympathy among those who had carried them away captive.'
  '47':
  - type: text
    content: ' Deliver us, O Lord our God, and gather us from among the nations, that we may give thanks to Your holy name '
  - type: text
    content: and
  - type: text
    content: ' glory in praising You.'
  '48':
  - type: text
    content: ' Blessed (affectionately and gratefully praised) be the Lord, the God of Israel, from everlasting to everlasting! And let all the people say, Amen! Praise the Lord! (Hallelujah!) [I Chron. 16:35, 36.]'
  '5':
  - type: text
    content: ' That I may see '
  - type: text
    content: and
  - type: text
    content: ' share the welfare of Your chosen ones, that I may rejoice in the gladness of Your nation, that I may glory with Your heritage.'
  '6':
  - type: text
    content: ' We have sinned, as did also our fathers; we have committed iniquity, we have done wickedly. [Lev. 26:40-42.]'
  '7':
  - type: text
    content: ' Our fathers in Egypt understood not nor appreciated Your miracles; they did not [earnestly] remember the multitude of Your mercies nor imprint Your loving-kindness [on their hearts], but they were rebellious '
  - type: text
    content: and
  - type: text
    content: ' provoked the Lord at the sea, even at the Red Sea. [Exod. 14:21.]'
  '8':
  - type: text
    content: ' Nevertheless He saved them for His name''s sake [to prove the righteousness of the divine character], that He might make His mighty power known.'
  '9':
  - type: text
    content: ' He rebuked the Red Sea also, and it dried up; so He led them through the depths as through a pastureland. [Exod. 14:21.]'
