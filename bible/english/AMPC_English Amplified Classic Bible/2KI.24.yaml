document_id: 2KI.24,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN HIS days, Nebuchadnezzar king of Babylon came up, and Jehoiakim became his servant for three years; then he turned and rebelled against him.'
  '10':
  - type: text
    content: ' At that time the servants of Nebuchadnezzar king of Babylon came up to Jerusalem, and the city was besieged.'
  '11':
  - type: text
    content: ' Nebuchadnezzar king of Babylon came to the city while his servants were besieging it.'
  '12':
  - type: text
    content: ' Jehoiachin king of Judah surrendered to the king of Babylon, he, his mother, his servants, princes, and palace officials. The king of Babylon took him prisoner in the eighth year of Nebuchadnezzar''s reign.'
  '13':
  - type: text
    content: ' He carried off all the treasures of the Lord''s house and the king''s house, and cut in pieces all the vessels of gold in the temple of the Lord, which Solomon king of Israel had made, as the Lord had said.'
  '14':
  - type: text
    content: ' He carried away all Jerusalem, all the princes, all the mighty men of valor, 10,000 captives, and all the craftsmen and smiths. None remained except the poorest of the land.'
  '15':
  - type: text
    content: ' Nebuchadnezzar took captive to Babylon King Jehoiachin; his mother, his wives, his officials, and the chief '
  - type: text
    content: and
  - type: text
    content: ' mighty men of the land [the prophet Ezekiel included] he took from Jerusalem to Babylon into exile. [Ezek. 1:1.]'
  '16':
  - type: text
    content: ' And the king of Babylon brought captive to Babylon all the men of valor, 7,000, and craftsmen and smiths, 1,000, all strong and fit for war.'
  '17':
  - type: text
    content: ' And the king of Babylon made Mattaniah, Jehoiachin''s uncle, king in his stead and changed his name to Zedekiah.'
  '18':
  - type: text
    content: ' Zedekiah was twenty-one years old when he began his eleven-year reign in Jerusalem. His mother was Hamutal daughter of Jeremiah of Libnah.'
  '19':
  - type: text
    content: ' He did evil in the sight of the Lord, in keeping with all Jehoiakim had done.'
  '2':
  - type: text
    content: ' The Lord sent against Jehoiakim bands of Chaldeans, of Syrians, of Moabites, and of Ammonites. And He sent them against Judah to destroy it, according to the word of the Lord which He spoke by His servants the prophets.'
  '20':
  - type: text
    content: ' For because of the anger of the Lord it came to the point in Jerusalem and Judah that He cast them out of His presence. And Zedekiah rebelled against the king of Babylon.'
  '3':
  - type: text
    content: ' Surely this came upon Judah at the command of the Lord, to remove them out of His sight because of the sins of Manasseh according to all he had done,'
  '4':
  - type: text
    content: ' And also for the innocent blood that he shed. For he filled Jerusalem with innocent blood, and the Lord would not pardon.'
  '5':
  - type: text
    content: ' The rest of the acts of Jehoiakim, all that he did, are they not written in the Book of the Chronicles of Judah''s Kings?'
  '6':
  - type: text
    content: ' So Jehoiakim slept with his fathers. Jehoiachin his son reigned in his stead.'
  '7':
  - type: text
    content: ' The king of Egypt came no more out of his land, for the king of Babylon had taken all that belonged to Egypt''s king, from the River of Egypt to the river Euphrates.'
  '8':
  - type: text
    content: ' Jehoiachin was eighteen years old when he began his three-month reign in Jerusalem. His mother was Nehushta daughter of Elnathan of Jerusalem.'
  '9':
  - type: text
    content: ' And he did evil in the sight of the Lord, in keeping with all his father had done.'
