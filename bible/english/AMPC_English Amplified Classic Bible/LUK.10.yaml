  - type: text
    content: and
  - type: text
    content: ' rejects Me slights '
  - type: text
    content: and
  - type: text
    content: ' rejects Him who sent Me.'
  '17':
  - type: text
    content: ' The seventy returned with joy, saying, Lord, even the demons are subject to us in Your name!'
  '18':
  - type: text
    content: ' And He said to them, I saw Satan falling like a lightning [flash] from heaven.'
  '19':
  - type: text
    content: ' Behold! I have given you authority '
  - type: text
    content: and
  - type: text
    content: ' power to trample upon serpents and scorpions, and [physical and mental strength and ability] over all the power that the enemy [possesses]; and nothing shall in any way harm you.'
  '2':
  - type: text
    content: ' And He said to them, The harvest indeed is abundant [there is much ripe grain], but the farmhands are few. Pray therefore the Lord of the harvest to send out laborers into His harvest.'
  '20':
  - type: text
    content: ' Nevertheless, do not rejoice at this, that the spirits are subject to you, but rejoice that your names are enrolled in heaven. [Exod. 32:32; Ps. 69:28; Dan. 12:1.]'
  '21':
  - type: text
    content: ' In that same hour He rejoiced '
  - type: text
    content: and
  - type: text
    content: ' gloried in the Holy Spirit and said, I thank You, Father, Lord of heaven and earth, that You have concealed these things [relating to salvation] from the wise and understanding '
  - type: text
    content: and
  - type: text
    content: ' learned, and revealed them to babes (the childish, unskilled, and untaught). Yes, Father, for such was Your gracious will '
  - type: text
