  '12':
  - type: text
    content: ' I tell you, it shall be more tolerable in that day for Sodom than for that town. [Gen. 19:24-28.]'
  '13':
  - type: text
    content: ' Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty miracles performed in you had been performed in Tyre and Sidon, they would have repented long ago, sitting in sackcloth and ashes.'
  '14':
  - type: text
    content: ' However, it shall be more tolerable in the judgment for Tyre and Sidon than for you.'
  '15':
  - type: text
    content: ' And you, Capernaum, will you be exalted unto heaven? You shall be brought down to Hades (the regions of the dead).'
  '16':
  - type: text
    content: ' He who hears '
  - type: text
    content: and
  - type: text
    content: ' heeds you [disciples] hears '
  - type: text
    content: and
  - type: text
    content: ' heeds Me; and he who slights '
  - type: text
