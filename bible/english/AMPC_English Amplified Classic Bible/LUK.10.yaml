  - type: text
    content: ' choice '
  - type: text
    content: and
  - type: text
    content: ' good pleasure.'
  '22':
  - type: text
    content: ' All things have been given over into My power by My Father; and no one knows Who the Son is except the Father, or Who the Father is except the Son and anyone to whom the Son may choose to reveal '
  - type: text
    content: and
  - type: text
    content: ' make Him known.'
  '23':
  - type: text
    content: ' Then turning to His disciples, He said privately, Blessed (happy, to be envied) are those whose eyes see what you see!'
  '24':
  - type: text
    content: ' For I tell you that many prophets and kings longed to see what you see and they did not see it, and to hear what you hear and they did not hear it.'
  '25':
  - type: text
    content: ' And then a certain lawyer arose to try (test, tempt) Him, saying, Teacher, what am I to do to inherit everlasting life [that is, to partake of eternal salvation in the Messiah''s kingdom]?'
  '26':
  - type: text
    content: ' Jesus said to him, What is written in the Law? How do you read it?'
  '27':
  - type: text
    content: ' And he replied, You must love the Lord your God with all your heart and with all your soul and with all your strength and with all your mind; and your neighbor as yourself. [Lev. 19:18; Deut. 6:5.]'
  '28':
  - type: text
    content: ' And Jesus said to him, You have answered correctly; do this, and you will live [enjoy active, blessed, endless life in the kingdom of God].'
  '29':
  - type: text
    content: ' And he, determined to acquit himself of reproach, said to Jesus, And who is my neighbor?'
  '3':
  - type: text
    content: ' Go your way; behold, I send you out like lambs into the midst of wolves.'
  '30':
  - type: text
    content: ' Jesus, taking him up, replied, A certain man was going from Jerusalem down to Jericho, and he fell among robbers, who stripped him of his clothes and belongings and beat him and went their way, [unconcernedly] leaving him half dead, as it happened.'
  '31':
  - type: text
    content: ' Now by coincidence a certain priest was going down along that road, and when he saw him, he passed by on the other side.'
  '32':
  - type: text
    content: ' A Levite likewise came down to the place and saw him, and passed by on the other side [of the road].'
  '33':
  - type: text
    content: ' But a certain Samaritan, as he traveled along, came down to where he was; and when he saw him, he was moved with pity '
  - type: text
    content: and
  - type: text
    content: ' sympathy [for him],'
  '34':
  - type: text
    content: ' And went to him and dressed his wounds, pouring on [them] oil and wine. Then he set him on his own beast and brought him to an inn and took care of him.'
  '35':
  - type: text
    content: ' And the next day he took out two denarii [two day''s wages] and gave [them] to the innkeeper, saying, Take care of him; and whatever more you spend, I [myself] will repay you when I return.'
  '36':
  - type: text
    content: ' Which of these three do you think proved himself a neighbor to him who fell among the robbers?'
  '37':
  - type: text
    content: ' He answered, The one who showed pity '
  - type: text
    content: and
  - type: text
    content: ' mercy to him. And Jesus said to him, Go and do likewise.'
  '38':
  - type: text
    content: ' Now while they were on their way, it occurred that Jesus entered a certain village, and a woman named Martha received '
  - type: text
    content: and
  - type: text
    content: ' welcomed Him into her house.'
  '39':
  - type: text
    content: ' And she had a sister named Mary, who seated herself at the Lord''s feet and was listening to His teaching.'
  '4':
  - type: text
    content: ' Carry no purse, no provisions bag, no [change of] sandals; refrain from [retarding your journey by] saluting '
  - type: text
    content: and
  - type: text
    content: ' wishing anyone well along the way.'
  '40':
  - type: text
    content: ' But Martha [overly occupied and too busy] was distracted with much serving; and she came up to Him and said, Lord, is it nothing to You that my sister has left me to serve alone? Tell her then to help me [to lend a hand and do her part along with me]!'
  '41':
  - type: text
    content: ' But the Lord replied to her by saying, Martha, Martha, you are anxious and troubled about many things;'
  '42':
  - type: text
    content: ' There is need of only one '
  - type: text
    content: or but a few things.
  - type: text
    content: ' Mary has chosen the good portion [that which is to her advantage], which shall not be taken away from her.'
  '5':
  - type: text
    content: ' Whatever house you enter, first say, Peace be to this household! [Freedom from all the distresses that result from sin be with this family].'
  '6':
  - type: text
    content: ' And if anyone [worthy] of peace '
  - type: text
    content: and
  - type: text
    content: ' blessedness is there, the peace '
  - type: text
    content: and
  - type: text
    content: ' blessedness you wish shall come upon him; but if not, it shall come back to you.'
  '7':
  - type: text
    content: ' And stay on in the same house, eating and drinking what they provide, for the laborer is worthy of his wages. Do not keep moving from house to house. [Deut. 24:15.]'
  '8':
  - type: text
    content: ' Whenever you go into a town and they receive '
  - type: text
    content: and
  - type: text
    content: ' accept '
  - type: text
    content: and
  - type: text
    content: ' welcome you, eat what is set before you;'
  '9':
