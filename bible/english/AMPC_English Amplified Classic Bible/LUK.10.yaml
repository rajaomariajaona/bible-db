document_id: LUK.10,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW AFTER this the Lord chose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appointed seventy others and sent them out ahead of Him, two by two, into every town and place where He Himself was about to come (visit).'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' But whenever you go into a town and they do not receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome you, go out into its streets and say,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Even the dust of your town that clings to our feet we are wiping off against you; yet know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand this: the kingdom of God has come near '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' I tell you, it shall be more tolerable in that day for Sodom than for that town. [Gen. 19:24-28.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty miracles performed in you had been performed in Tyre and Sidon, they would have repented long ago, sitting in sackcloth and ashes.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' However, it shall be more tolerable in the judgment for Tyre and Sidon than for you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And you, Capernaum, will you be exalted unto heaven? You shall be brought down to Hades (the regions of the dead).'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' He who hears '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heeds you [disciples] hears '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heeds Me; and he who slights '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejects you slights '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejects Me; and he who slights '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejects Me slights '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejects Him who sent Me.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' The seventy returned with joy, saying, Lord, even the demons are subject to us in Your name!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And He said to them, I saw Satan falling like a lightning [flash] from heaven.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Behold! I have given you authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power to trample upon serpents and scorpions, and [physical and mental strength and ability] over all the power that the enemy [possesses]; and nothing shall in any way harm you.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And He said to them, The harvest indeed is abundant [there is much ripe grain], but the farmhands are few. Pray therefore the Lord of the harvest to send out laborers into His harvest.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Nevertheless, do not rejoice at this, that the spirits are subject to you, but rejoice that your names are enrolled in heaven. [Exod. 32:32; Ps. 69:28; Dan. 12:1.]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' In that same hour He rejoiced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gloried in the Holy Spirit and said, I thank You, Father, Lord of heaven and earth, that You have concealed these things [relating to salvation] from the wise and understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' learned, and revealed them to babes (the childish, unskilled, and untaught). Yes, Father, for such was Your gracious will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' choice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good pleasure.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' All things have been given over into My power by My Father; and no one knows Who the Son is except the Father, or Who the Father is except the Son and anyone to whom the Son may choose to reveal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make Him known.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Then turning to His disciples, He said privately, Blessed (happy, to be envied) are those whose eyes see what you see!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' For I tell you that many prophets and kings longed to see what you see and they did not see it, and to hear what you hear and they did not hear it.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And then a certain lawyer arose to try (test, tempt) Him, saying, Teacher, what am I to do to inherit everlasting life [that is, to partake of eternal salvation in the Messiah''s kingdom]?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Jesus said to him, What is written in the Law? How do you read it?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And he replied, You must love the Lord your God with all your heart and with all your soul and with all your strength and with all your mind; and your neighbor as yourself. [Lev. 19:18; Deut. 6:5.]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And Jesus said to him, You have answered correctly; do this, and you will live [enjoy active, blessed, endless life in the kingdom of God].'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And he, determined to acquit himself of reproach, said to Jesus, And who is my neighbor?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Go your way; behold, I send you out like lambs into the midst of wolves.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Jesus, taking him up, replied, A certain man was going from Jerusalem down to Jericho, and he fell among robbers, who stripped him of his clothes and belongings and beat him and went their way, [unconcernedly] leaving him half dead, as it happened.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Now by coincidence a certain priest was going down along that road, and when he saw him, he passed by on the other side.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' A Levite likewise came down to the place and saw him, and passed by on the other side [of the road].'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' But a certain Samaritan, as he traveled along, came down to where he was; and when he saw him, he was moved with pity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sympathy [for him],'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And went to him and dressed his wounds, pouring on [them] oil and wine. Then he set him on his own beast and brought him to an inn and took care of him.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And the next day he took out two denarii [two day''s wages] and gave [them] to the innkeeper, saying, Take care of him; and whatever more you spend, I [myself] will repay you when I return.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Which of these three do you think proved himself a neighbor to him who fell among the robbers?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' He answered, The one who showed pity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy to him. And Jesus said to him, Go and do likewise.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' Now while they were on their way, it occurred that Jesus entered a certain village, and a woman named Martha received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomed Him into her house.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' And she had a sister named Mary, who seated herself at the Lord''s feet and was listening to His teaching.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Carry no purse, no provisions bag, no [change of] sandals; refrain from [retarding your journey by] saluting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wishing anyone well along the way.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' But Martha [overly occupied and too busy] was distracted with much serving; and she came up to Him and said, Lord, is it nothing to You that my sister has left me to serve alone? Tell her then to help me [to lend a hand and do her part along with me]!'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' But the Lord replied to her by saying, Martha, Martha, you are anxious and troubled about many things;'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' There is need of only one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or but a few things.
    - type: text
      text: ' Mary has chosen the good portion [that which is to her advantage], which shall not be taken away from her.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Whatever house you enter, first say, Peace be to this household! [Freedom from all the distresses that result from sin be with this family].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And if anyone [worthy] of peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessedness is there, the peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessedness you wish shall come upon him; but if not, it shall come back to you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And stay on in the same house, eating and drinking what they provide, for the laborer is worthy of his wages. Do not keep moving from house to house. [Deut. 24:15.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Whenever you go into a town and they receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome you, eat what is set before you;'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And heal the sick in it and say to them, The kingdom of God has come close to you.'
