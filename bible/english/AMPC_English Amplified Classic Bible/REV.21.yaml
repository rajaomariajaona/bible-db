document_id: REV.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN I saw a new sky (heaven) and a new earth, for the former sky and the former earth had passed away (vanished), and there no longer existed any sea. [Isa. 65:17; 66:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And I saw the holy city, the new Jerusalem, descending out of heaven from God, all arrayed like a bride beautified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adorned for her husband;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then I heard a mighty voice from the throne '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I perceived its distinct words, saying, See! The abode of God is with men, and He will live (encamp, tent) among them; and they shall be His people, and God shall personally be with them and be their God. [Ezek. 37:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' God will wipe away every tear from their eyes; and death shall be no more, neither shall there be anguish (sorrow and mourning) nor grief nor pain any more, for the old conditions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the former order of things have passed away. [Isa. 25:8; 35:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And He Who is seated on the throne said, See! I make all things new. Also He said, Record this, for these sayings are faithful (accurate, incorruptible, and trustworthy) and true (genuine). [Isa. 43:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And He [further] said to me, It is done! I am the Alpha and the Omega, the Beginning and the End. To the thirsty I [Myself] will give water without price from the fountain (springs) of the water of Life. [Isa. 55:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He who is victorious shall inherit all these things, and I will be God to him and he shall be My son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But as for the cowards '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the ignoble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the contemptible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the cravenly lacking in courage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the cowardly submissive, and as for the unbelieving and faithless, and as for the depraved and defiled with abominations, and as for murderers and the lewd '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adulterous and the practicers of magic arts and the idolaters (those who give supreme devotion to anyone or anything other than God) and all liars (those who knowingly convey untruth by word or deed)–[all of these shall have] their part in the lake that blazes with fire and brimstone. This is the second death. [Isa. 30:33.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then one of the seven angels who had the seven bowls filled with the seven final plagues (afflictions, calamities) came and spoke to me. He said, Come with me! I will show you the bride, the Lamb''s wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then in the Spirit He conveyed me away to a vast and lofty mountain and exhibited to me the holy (hallowed, consecrated) city of Jerusalem descending out of heaven from God, [Ezek. 40:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Clothed in God''s glory [in all its splendor and radiance]. The luster of it resembled a rare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' most precious jewel, like jasper, shining clear as crystal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' It had a massive and high wall with twelve [large] gates, and at the gates [there were stationed] twelve angels, and [on the gates] the names of the twelve tribes of the sons of Israel were written: [Exod. 28:21; Ezek. 48:30-35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' On the east side three gates, on the north side three gates, on the south side three gates, and on the west side three gates.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the wall of the city had twelve foundation [stones], and on them the twelve names of the twelve apostles of the Lamb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And he who spoke to me had a golden measuring reed (rod) to measure the city and its gates and its wall. [Ezek. 40:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The city lies in a square, its length being the same as its width. And he measured the city with his reed–12,000 stadia (about 1,500 miles); its length and width and height are the same.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' He measured its wall also–144 cubits (about 72 yards) by a man''s measure [of a cubit from his elbow to his third fingertip], which is [the measure] of the angel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The wall was built of jasper, while the city [itself was of] pure gold, clear and transparent like glass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The foundation [stones] of the wall of the city were ornamented with all of the precious stones. The first foundation [stone] was jasper, the second sapphire, the third chalcedony (or white agate), the fourth emerald, [Isa. 54:11, 12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The fifth onyx, the sixth sardius, the seventh chrysolite, the eighth beryl, the ninth topaz, the tenth chrysoprase, the eleventh jacinth, the twelfth amethyst.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the twelve gates were twelve pearls, each separate gate being built of one solid pearl. And the main street (the broadway) of the city was of gold as pure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' translucent as glass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' I saw no temple in the city, for the Lord God Omnipotent [Himself] and the Lamb [Himself] are its temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And the city has no need of the sun nor of the moon to give light to it, for the splendor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' radiance (glory) of God illuminate it, and the Lamb is its lamp. [Isa. 24:23; 60:1, 19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The nations shall walk by its light and the rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leaders of the earth shall bring into it their glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And its gates shall never be closed by day, and there shall be no night there. [Isa. 60:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' They shall bring the glory (the splendor and majesty) and the honor of the nations into it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But nothing that defiles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' profanes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' is unwashed shall ever enter it, nor anyone who commits abominations (unclean, detestable, morally repugnant things) or practices falsehood, but only those whose names are recorded in the Lamb''s Book of Life.'
