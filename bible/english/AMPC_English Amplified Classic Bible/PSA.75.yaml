document_id: PSA.75
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; +[set to the tune of+] ``Do Not Destroy." A Psalm of Asaph. A song.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WE GIVE praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanks to You, O God, we praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks; Your wondrous works declare that Your Name is near '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they who invoke Your Name rehearse Your wonders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' When the proper time has come [for executing My judgments], I will judge uprightly [says the Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' When the earth totters, and all the inhabitants of it, it is I Who will poise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep steady its pillars. Selah [pause, and calmly think of that]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' I said to the arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boastful, Deal not arrogantly [do not boast]; and to the wicked, Lift not up the horn [of personal aggrandizement].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Lift not up your [aggressive] horn on high, speak not with a stiff neck '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insolent arrogance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For not from the east nor from the west nor from the south come promotion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lifting up. [Isa. 14:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But God is the Judge! He puts down one and lifts up another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For in the hand of the Lord there is a cup [of His wrath], and the wine foams '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is red, well mixed; and He pours out from it, and all the wicked of the earth must drain it and drink its dregs. [Ps. 60:3; Jer. 25:15; Rev. 14:9, 10; 16:19.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But I will declare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejoice forever; I will sing praises to the God of Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' All the horns of the ungodly also will I cut off [says the Lord], but the horns of the [uncompromisingly] righteous shall be exalted.'
