document_id: PSA.75,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; +[set to the tune of+] ``Do Not Destroy." A Psalm of Asaph. A song.
  - type: text
    content: ' WE GIVE praise '
  - type: text
    content: and
  - type: text
    content: ' thanks to You, O God, we praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks; Your wondrous works declare that Your Name is near '
  - type: text
    content: and
  - type: text
    content: ' they who invoke Your Name rehearse Your wonders.'
  '10':
  - type: text
    content: ' All the horns of the ungodly also will I cut off [says the Lord], but the horns of the [uncompromisingly] righteous shall be exalted.'
  '2':
  - type: text
    content: ' When the proper time has come [for executing My judgments], I will judge uprightly [says the Lord].'
  '3':
  - type: text
    content: ' When the earth totters, and all the inhabitants of it, it is I Who will poise '
  - type: text
    content: and
  - type: text
    content: ' keep steady its pillars. Selah [pause, and calmly think of that]!'
  '4':
  - type: text
    content: ' I said to the arrogant '
  - type: text
    content: and
  - type: text
    content: ' boastful, Deal not arrogantly [do not boast]; and to the wicked, Lift not up the horn [of personal aggrandizement].'
  '5':
  - type: text
    content: ' Lift not up your [aggressive] horn on high, speak not with a stiff neck '
  - type: text
    content: and
  - type: text
    content: ' insolent arrogance.'
  '6':
  - type: text
    content: ' For not from the east nor from the west nor from the south come promotion '
  - type: text
    content: and
  - type: text
    content: ' lifting up. [Isa. 14:13.]'
  '7':
  - type: text
    content: ' But God is the Judge! He puts down one and lifts up another.'
  '8':
  - type: text
    content: ' For in the hand of the Lord there is a cup [of His wrath], and the wine foams '
  - type: text
    content: and
  - type: text
    content: ' is red, well mixed; and He pours out from it, and all the wicked of the earth must drain it and drink its dregs. [Ps. 60:3; Jer. 25:15; Rev. 14:9, 10; 16:19.]'
  '9':
  - type: text
    content: ' But I will declare '
  - type: text
    content: and
  - type: text
    content: ' rejoice forever; I will sing praises to the God of Jacob.'
