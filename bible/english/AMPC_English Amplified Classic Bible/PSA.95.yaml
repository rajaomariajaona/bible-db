document_id: PSA.95
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' O COME, let us sing to the Lord; let us make a joyful noise to the Rock of our salvation!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let us come before His presence with thanksgiving; let us make a joyful noise to Him with songs of praise!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For the Lord is a great God, and a great King above all gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' In His hand are the deep places of the earth; the heights '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strength of the hills are His also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The sea is His, for He made it; and His hands formed the dry land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' O come, let us worship and bow down, let us kneel before the Lord our Maker [in reverent praise and supplication].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For He is our God and we are the people of His pasture and the sheep of His hand. Today, if you will hear His voice, [Heb. 3:7-11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Harden not your hearts as at Meribah and as at Massah in the day of temptation in the wilderness, [Exod. 17:1-7; Num. 20:1-13; Deut. 6:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' When your fathers tried My patience '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tested Me, proved Me, and saw My work [of judgment].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Forty years long was I grieved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgusted with that generation, and I said, It is a people that do err in their hearts, and they do not approve, acknowledge, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' regard My ways.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Wherefore I swore in My wrath that they would not enter My rest [the land of promise]. [Heb. 4:3-11.]'
