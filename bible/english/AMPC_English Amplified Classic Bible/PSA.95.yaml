document_id: PSA.95,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' O COME, let us sing to the Lord; let us make a joyful noise to the Rock of our salvation!'
  '10':
  - type: text
    content: ' Forty years long was I grieved '
  - type: text
    content: and
  - type: text
    content: ' disgusted with that generation, and I said, It is a people that do err in their hearts, and they do not approve, acknowledge, '
  - type: text
    content: or
  - type: text
    content: ' regard My ways.'
  '11':
  - type: text
    content: ' Wherefore I swore in My wrath that they would not enter My rest [the land of promise]. [Heb. 4:3-11.]'
  '2':
  - type: text
    content: ' Let us come before His presence with thanksgiving; let us make a joyful noise to Him with songs of praise!'
  '3':
  - type: text
    content: ' For the Lord is a great God, and a great King above all gods.'
  '4':
  - type: text
    content: ' In His hand are the deep places of the earth; the heights '
  - type: text
    content: and
  - type: text
    content: ' strength of the hills are His also.'
  '5':
  - type: text
    content: ' The sea is His, for He made it; and His hands formed the dry land.'
  '6':
  - type: text
    content: ' O come, let us worship and bow down, let us kneel before the Lord our Maker [in reverent praise and supplication].'
  '7':
  - type: text
    content: ' For He is our God and we are the people of His pasture and the sheep of His hand. Today, if you will hear His voice, [Heb. 3:7-11.]'
  '8':
  - type: text
    content: ' Harden not your hearts as at Meribah and as at Massah in the day of temptation in the wilderness, [Exod. 17:1-7; Num. 20:1-13; Deut. 6:16.]'
  '9':
  - type: text
    content: ' When your fathers tried My patience '
  - type: text
    content: and
  - type: text
    content: ' tested Me, proved Me, and saw My work [of judgment].'
