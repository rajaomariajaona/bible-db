document_id: DAN.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IT PLEASED [King] Darius [successor to Belshazzar] to set over the kingdom 120 satraps who should be [in charge] throughout all the kingdom,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And over them three presidents–of whom Daniel was one–that these satraps might give account to them and that the king should have no loss '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' damage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Then this Daniel was distinguished above the presidents and the satraps because an excellent spirit was in him, and the king thought to set him over the whole realm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then the presidents and satraps sought to find occasion [to bring accusation] against Daniel concerning the kingdom, but they could find no occasion or fault, for he was faithful, nor was there any error or fault found in him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Then said these men, We shall not find any occasion [to bring accusation] against this Daniel except we find it against him concerning the law of his God. [Acts 24:13-21; I Pet. 4:12-16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then these presidents and satraps came [tumultuously] together to the king and said to him, King Darius, live forever!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' All the presidents of the kingdom, the deputies and the satraps, the counselors and the governors, have consulted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agreed that the king should establish a royal statute and make a firm decree that whoever shall ask a petition of any god or man for thirty days, except of you, O king, shall be cast into the den of lions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now, O king, establish the decree and sign the writing that it may not be changed, according to the law of the Medes and Persians, which cannot be altered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So King Darius signed the writing and the decree.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Now when Daniel knew that the writing was signed, he went into his house, and his windows being open in his chamber toward Jerusalem, he got down upon his knees three times a day and prayed and gave thanks before his God, as he had done previously. [Ps. 5:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then these men came thronging [by agreement] and found Daniel praying and making supplication before his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then they came near and said before the king concerning his prohibitory decree, Have you not signed an edict that any man who shall make a petition to any god or man within thirty days, except of you, O king, shall be cast into the den of lions? The king answered and said, The thing is true, according to the law of the Medes and Persians, which cannot be changed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' repealed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then they said before the king, That Daniel, who is one of the exiles from Judah, does not regard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pay any attention to you, O king, or to the decree that you have signed, but makes his petition three times a day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then the king, when he heard these words, was much distressed [over what he had done] and set his mind on Daniel to deliver him; and he labored until the sun went down to rescue him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then these same men came thronging [by agreement] to the king and said, Know, O king, that it is a law of the Medes and Persians that no decree or statute which the king establishes may be changed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' repealed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then the king commanded, and Daniel was brought and cast into the den of lions. The king said to Daniel, May your God, Whom you are serving continually, deliver you! [Ps. 34:7, 19; 37:39, 40; 50:15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And a stone was brought and laid upon the mouth of the den, and the king sealed it with his own signet and with the signet of his lords, that there might be no change of purpose concerning Daniel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then the king went to his palace and passed the night fasting, neither were instruments of music or dancing girls brought before him; and his sleep fled from him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then the king arose very early in the morning and went in haste to the den of lions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And when he came to the den and to Daniel, he cried out in a voice of anguish. The king said to Daniel, O Daniel, servant of the living God, is your God, Whom you serve continually, able to deliver you from the lions?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Then Daniel said to the king, O king, live forever!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' My God has sent His angel and has shut the lions'' mouths so that they have not hurt me, because I was found innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blameless before Him; and also before you, O king, [as you very well know] I have done no harm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' wrong. [II Tim. 4:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then the king was exceedingly glad and commanded that Daniel should be taken up out of the den. So Daniel was taken up out of the den, and no hurt of any kind was found on him because he believed in (relied on, adhered to, and trusted in) his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the king commanded, and those men who had accused Daniel were brought and cast into the den of lions, they, their children, and their wives; and before they ever reached the bottom of the den, the lions had overpowered them and had broken their bones in pieces.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then King Darius wrote to all peoples, nations, and languages [in his realm] that dwelt in all the earth: May peace be multiplied to you!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' I make a decree that in all my royal dominion men must tremble and fear before the God of Daniel, for He is the living God, enduring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast forever, and His kingdom shall not be destroyed and His dominion shall be even to the end [of the world].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' He is a Savior and Deliverer, and He works signs and wonders in the heavens and on the earth–He Who has delivered Daniel from the power of the lions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So this [man] Daniel prospered in the reign of Darius and in the reign of Cyrus the Persian.'
