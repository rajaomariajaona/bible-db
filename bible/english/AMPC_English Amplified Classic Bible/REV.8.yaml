document_id: REV.8,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHEN HE [the Lamb] broke open the seventh seal, there was silence for about half an hour in heaven.'
  '10':
  - type: text
    content: ' The third angel blew [his] trumpet, and a huge star fell from heaven, burning like a torch, and it dropped on a third of the rivers and on the springs of water–'
  '11':
  - type: text
    content: ' And the name of the star is Wormwood. A third part of the waters was changed into wormwood, and many people died from using the water, because it had become bitter.'
  '12':
  - type: text
    content: ' Then the fourth angel blew [his] trumpet, and a third of the sun was smitten, and a third of the moon, and a third of the stars, so that [the light of] a third of them was darkened, and a third of the daylight [itself] was withdrawn, and likewise a third [of the light] of the night was kept from shining.'
  '13':
  - type: text
    content: ' Then I [looked and I] saw a solitary eagle flying in midheaven, and as it flew I heard it crying with a loud voice, Woe, woe, woe to those who dwell on the earth, because of the rest of the trumpet blasts which the three angels are about to sound!'
  '2':
  - type: text
    content: ' Then I saw the seven angels who stand before God, and to them were given seven trumpets.'
  '3':
  - type: text
    content: ' And another angel came and stood over the altar. He had a golden censer, and he was given very much incense (fragrant spices and gums which exhale perfume when burned), that he might mingle it with the prayers of all the people of God (the saints) upon the golden altar before the throne. [Ps. 141:2.]'
  '4':
  - type: text
    content: ' And the smoke of the incense (the perfume) arose in the presence of God, with the prayers of the people of God (the saints), from the hand of the angel.'
  '5':
  - type: text
    content: ' So the angel took the censer and filled it with fire from the altar and cast it upon the earth. Then there followed peals of thunder '
  - type: text
    content: and
  - type: text
    content: ' loud rumblings and blasts '
  - type: text
    content: and
  - type: text
    content: ' noises, and flashes of lightning and an earthquake. [Lev. 16:12; Ezek. 10:2.]'
  '6':
  - type: text
    content: ' Then the seven angels who had the seven trumpets prepared to sound them.'
  '7':
  - type: text
    content: ' The first angel blew [his] trumpet, and there was a storm of hail and fire mingled with blood cast upon the earth. And a third part of the earth was burned up and a third of the trees was burned up and all the green grass was burned up. [Exod. 9:23-25.]'
  '8':
  - type: text
    content: ' The second angel blew [his] trumpet, and something resembling a great mountain, blazing with fire, was hurled into the sea. [Jer. 51:25.]'
  '9':
  - type: text
    content: ' And a third of the sea was turned to blood, a third of the living creatures in the sea perished, and a third of the ships were destroyed.'
