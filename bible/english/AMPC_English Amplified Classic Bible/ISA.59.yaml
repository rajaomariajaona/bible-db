document_id: ISA.59
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BEHOLD, THE Lord''s hand is not shortened at all, that it cannot save, nor His ear dull with deafness, that it cannot hear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' But your iniquities have made a separation between you and your God, and your sins have hidden His face from you, so that He will not hear.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For your hands are defiled with blood and your fingers with iniquity; your lips have spoken lies, your tongue mutters wickedness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' None sues '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' calls in righteousness [but for the sake of doing injury to others–to take some undue advantage]; no one goes to law honestly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleads [his case] in truth; they trust in emptiness, worthlessness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' futility, and speaking lies! They conceive mischief and bring forth evil!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' They hatch adders'' eggs and weave the spider''s web; he who eats of their eggs dies, and [from an egg] which is crushed a viper breaks out [for their nature is ruinous, deadly, evil].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Their webs will not serve as clothing, nor will they cover themselves with what they make; their works are works of iniquity, and the act of violence is in their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Their feet run to evil, and they make haste to shed innocent blood. Their thoughts are thoughts of iniquity; desolation and destruction are in their paths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' highways.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The way of peace they know not, and there is no justice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' right in their goings. They have made them into crooked paths; whoever goes in them does not know peace. [Rom. 3:15-18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Therefore are justice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right far from us, and righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' salvation do not overtake us. We expectantly wait for light, but [only] see darkness; for brightness, but we walk in obscurity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gloom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' We grope for the wall like the blind, yes, we grope like those who have no eyes. We stumble at noonday as in the twilight; in dark places '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' among those who are full of life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vigor, we are as dead men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' We all groan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' growl like bears and moan plaintively like doves. We look for justice, but there is none; for salvation, but it is far from us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For our transgressions are multiplied before You [O Lord], and our sins testify against us; for our transgressions are with us, and as for our iniquities, we know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize them [as]:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Rebelling against and denying the Lord, turning away from following our God, speaking oppression and revolt, conceiving in and muttering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' moaning from the heart words of falsehood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Justice is turned away backward, and righteousness (uprightness and right standing with God) stands far off; for truth has fallen in the street (the city''s forum), and uprightness cannot enter [the courts of justice].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Yes, truth is lacking, and he who departs from evil makes himself a prey. And the Lord saw it, and it displeased Him that there was no justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And He saw that there was no man and wondered that there was no intercessor [no one to intervene on behalf of truth and right]; therefore His own arm brought Him victory, and His own righteousness [having the Spirit without measure] sustained Him. [Isa. 53:11; Col. 2:9; I John 2:1, 2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For [the Lord] put on righteousness as a breastplate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' coat of mail, and salvation as a helmet upon His head; He put on garments of vengeance for clothing and was clad with zeal [and furious divine jealousy] as a cloak. [Eph. 6:14, 17; I Thess. 5:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' According as their deeds deserve, so will He repay wrath to His adversaries, recompense to His enemies; on the foreign islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands He will make compensation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So [as the result of the Messiah''s intervention] they shall [reverently] fear the name of the Lord from the west, and His glory from the rising of the sun. When the enemy shall come in like a flood, the Spirit of the Lord will lift up a standard against him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put him to flight [for He will come like a rushing stream which the breath of the Lord drives]. [Matt. 8:11; Luke 13:29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' He shall come as a Redeemer to Zion and to those in Jacob (Israel) who turn from transgression, says the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' As for Me, this is My covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' league with them, says the Lord: My Spirit, Who is upon you [and Who writes the law of God inwardly on the heart], and My words which I have put in your mouth shall not depart out of your mouth, or out of the mouths of your [true, spiritual] children, or out of the mouths of your children''s children, says the Lord, from henceforth and forever. [Jer. 31:33; Rom. 11:26, 27; Gal. 3:29; Heb. 12:22-24.]'
