document_id: ISA.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BEHOLD, THE Lord will make the land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the earth empty and make it waste and turn it upside down (twist the face of it) and scatter abroad its inhabitants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And it shall be–as [what happens] with the people, so with the priest; as with the servant, so with his master; as with the maid, so with her mistress; as with the buyer, so with the seller; as with the lender, so with the borrower; as with the creditor, so with the debtor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' The land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the earth shall be utterly laid waste and utterly pillaged; for the Lord has said this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the earth mourn and wither, the world languishes and withers, the high ones of the people [and the heavens with the earth] languish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' The land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the earth also are defiled by their inhabitants, because they have transgressed the laws, disregarded the statutes, and broken the everlasting covenant. [Gen. 9:1-17; Deut. 29:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore a curse devours the land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the earth, and they who dwell in it suffer the punishment of their guilt. Therefore the inhabitants of the land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the earth are scorched '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' parched [under the curse of God''s wrath], and few people are left. [Rom. 1:20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The new wine mourns, the vine languishes; all the merrymakers sigh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The mirth of the timbrels is stilled, the noise of those who rejoice ends, the joy of the lyre is stopped.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' No more will they drink wine with a song; strong drink will be bitter to those who drink it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The wasted city of emptiness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confusion is broken down; every house is shut up so that no one may enter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' There is crying in the streets for wine; all joy is darkened, the mirth of the land is banished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gone into captivity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' In the city is left desolation, and its gate is battered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For so shall it be in the midst of the earth among the peoples, as the shaking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beating of an olive tree, or as the gleaning when the vintage is done [and only a small amount of the fruit remains].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' [But] these [who have escaped and remain] lift up their voices, they shout; for the majesty of the Lord they cry aloud from the [Mediterranean] Sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Wherefore glorify the Lord in the east [whether in the region of daybreak''s lights and fires, or in the west]; [glorify] the name of the Lord, the God of Israel in the isles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coasts of the [Mediterranean] Sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' From the uttermost parts of the earth have we heard songs: Glory to the Righteous One [and to the people of Israel]! But I say, Emaciated I pine away, I pine away. Woe is me! The treacherous dealers deal treacherously! Yes, the treacherous dealers deal very treacherously.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Terror and pit [of destruction] and snare are upon you, O inhabitant of the earth!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And he who flees at the noise of the terror will fall into the pit; and he who comes up out of the pit will be caught in the snare. For the windows of the heavens are opened [as in the deluge], and the foundations of the earth tremble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shake.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The earth is utterly broken, the earth is rent asunder, the earth is shaken violently.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The earth shall stagger like a drunken man and shall sway to and fro like a hammock; its transgression shall lie heavily upon it, and it shall fall and not rise again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And in that day the Lord will visit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish the host of the high ones on high [the host of heaven in heaven, celestial beings] and the kings of the earth on the earth. [I Cor. 15:25; Eph. 3:10; 6:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And they will be gathered together as prisoners are gathered in a pit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dungeon; they will be shut up in prison, and after many days they will be visited, inspected, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pardoned. [Zech. 9:11, 12; II Pet. 2:4; Jude 6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Then the moon will be confounded and the sun ashamed, when [they compare their ineffectual fire to the light of] the Lord of hosts, Who will reign on Mount Zion and in Jerusalem, and before His elders will show forth His glory.'
