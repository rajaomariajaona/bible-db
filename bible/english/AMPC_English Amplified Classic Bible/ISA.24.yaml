document_id: ISA.24,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BEHOLD, THE Lord will make the land '
  - type: text
    content: and
  - type: text
    content: ' the earth empty and make it waste and turn it upside down (twist the face of it) and scatter abroad its inhabitants.'
  '10':
  - type: text
    content: ' The wasted city of emptiness '
  - type: text
    content: and
  - type: text
    content: ' confusion is broken down; every house is shut up so that no one may enter.'
  '11':
  - type: text
    content: ' There is crying in the streets for wine; all joy is darkened, the mirth of the land is banished '
  - type: text
    content: and
  - type: text
    content: ' gone into captivity.'
  '12':
  - type: text
    content: ' In the city is left desolation, and its gate is battered '
  - type: text
    content: and
  - type: text
    content: ' destroyed.'
  '13':
  - type: text
    content: ' For so shall it be in the midst of the earth among the peoples, as the shaking '
  - type: text
    content: and
  - type: text
    content: ' beating of an olive tree, or as the gleaning when the vintage is done [and only a small amount of the fruit remains].'
  '14':
  - type: text
    content: ' [But] these [who have escaped and remain] lift up their voices, they shout; for the majesty of the Lord they cry aloud from the [Mediterranean] Sea.'
  '15':
  - type: text
    content: ' Wherefore glorify the Lord in the east [whether in the region of daybreak''s lights and fires, or in the west]; [glorify] the name of the Lord, the God of Israel in the isles '
  - type: text
    content: and
  - type: text
    content: ' coasts of the [Mediterranean] Sea.'
  '16':
  - type: text
    content: ' From the uttermost parts of the earth have we heard songs: Glory to the Righteous One [and to the people of Israel]! But I say, Emaciated I pine away, I pine away. Woe is me! The treacherous dealers deal treacherously! Yes, the treacherous dealers deal very treacherously.'
  '17':
  - type: text
    content: ' Terror and pit [of destruction] and snare are upon you, O inhabitant of the earth!'
  '18':
  - type: text
    content: ' And he who flees at the noise of the terror will fall into the pit; and he who comes up out of the pit will be caught in the snare. For the windows of the heavens are opened [as in the deluge], and the foundations of the earth tremble '
  - type: text
    content: and
  - type: text
    content: ' shake.'
  '19':
  - type: text
    content: ' The earth is utterly broken, the earth is rent asunder, the earth is shaken violently.'
  '2':
  - type: text
    content: ' And it shall be–as [what happens] with the people, so with the priest; as with the servant, so with his master; as with the maid, so with her mistress; as with the buyer, so with the seller; as with the lender, so with the borrower; as with the creditor, so with the debtor.'
  '20':
  - type: text
    content: ' The earth shall stagger like a drunken man and shall sway to and fro like a hammock; its transgression shall lie heavily upon it, and it shall fall and not rise again.'
  '21':
  - type: text
    content: ' And in that day the Lord will visit '
  - type: text
    content: and
  - type: text
    content: ' punish the host of the high ones on high [the host of heaven in heaven, celestial beings] and the kings of the earth on the earth. [I Cor. 15:25; Eph. 3:10; 6:12.]'
  '22':
  - type: text
    content: ' And they will be gathered together as prisoners are gathered in a pit '
  - type: text
    content: or
  - type: text
    content: ' dungeon; they will be shut up in prison, and after many days they will be visited, inspected, '
  - type: text
    content: and
  - type: text
    content: ' punished '
  - type: text
    content: or
  - type: text
    content: ' pardoned. [Zech. 9:11, 12; II Pet. 2:4; Jude 6.]'
  '23':
  - type: text
    content: ' Then the moon will be confounded and the sun ashamed, when [they compare their ineffectual fire to the light of] the Lord of hosts, Who will reign on Mount Zion and in Jerusalem, and before His elders will show forth His glory.'
  '3':
  - type: text
    content: ' The land '
  - type: text
    content: and
  - type: text
    content: ' the earth shall be utterly laid waste and utterly pillaged; for the Lord has said this.'
  '4':
  - type: text
    content: ' The land '
  - type: text
    content: and
  - type: text
    content: ' the earth mourn and wither, the world languishes and withers, the high ones of the people [and the heavens with the earth] languish.'
  '5':
  - type: text
    content: ' The land '
  - type: text
    content: and
  - type: text
    content: ' the earth also are defiled by their inhabitants, because they have transgressed the laws, disregarded the statutes, and broken the everlasting covenant. [Gen. 9:1-17; Deut. 29:20.]'
  '6':
  - type: text
    content: ' Therefore a curse devours the land '
  - type: text
    content: and
  - type: text
    content: ' the earth, and they who dwell in it suffer the punishment of their guilt. Therefore the inhabitants of the land '
  - type: text
    content: and
  - type: text
    content: ' the earth are scorched '
  - type: text
    content: and
  - type: text
    content: ' parched [under the curse of God''s wrath], and few people are left. [Rom. 1:20.]'
  '7':
  - type: text
    content: ' The new wine mourns, the vine languishes; all the merrymakers sigh.'
  '8':
  - type: text
    content: ' The mirth of the timbrels is stilled, the noise of those who rejoice ends, the joy of the lyre is stopped.'
  '9':
  - type: text
    content: ' No more will they drink wine with a song; strong drink will be bitter to those who drink it.'
