document_id: 2CH.4,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' ALSO SOLOMON made an altar of bronze, its top twenty by twenty cubits and its height ten cubits.'
  '10':
  - type: text
    content: ' And he set the Sea at the southeast corner of the house.'
  '11':
  - type: text
    content: ' And Huram made the pots, shovels, and basins. So Huram finished the work of God''s house that he did for King Solomon:'
  '12':
  - type: text
    content: ' The two pillars; the bowls; the capitals on top of the two pillars; and the two networks to cover the two bowls of the capitals on top of the pillars;'
  '13':
  - type: text
    content: ' And 400 pomegranates for the two networks, two rows of pomegranates for each network, to cover the two bowls of the capitals upon the pillars.'
  '14':
  - type: text
    content: ' He made also bases '
  - type: text
    content: or
  - type: text
    content: ' stands and lavers upon the bases;'
  '15':
  - type: text
    content: ' One Sea and the twelve oxen under it;'
  '16':
  - type: text
    content: ' The pots, shovels, and fleshhooks, and all their equipment Huram his trusted counselor made of burnished bronze for King Solomon for the house of the Lord.'
  '17':
  - type: text
    content: ' In the plain of the Jordan the king cast them, in the clay ground between Succoth and Zeredah.'
  '18':
  - type: text
    content: ' Solomon made all these things in such great numbers that the weight of the bronze was not computed.'
  '19':
  - type: text
    content: ' And Solomon made all the vessels for the house of God: the golden altar also; and the tables for the showbread (the bread of the Presence);'
  '2':
  - type: text
    content: ' Also he made a round Sea of molten metal, ten cubits from brim to brim and five cubits high, and a line of thirty cubits measured around it.'
  '20':
  - type: text
    content: ' And the lampstands with their lamps of pure gold, to burn before the inner sanctuary (the Holy of Holies) as directed;'
  '21':
  - type: text
    content: ' The flowers, lamps, and tongs, of purest gold;'
  '22':
  - type: text
    content: ' The snuffers, basins, dishes for incense, and firepans, of pure gold; and for the temple entry, the inner doors for the Most Holy Place and the doors of the Holy Place were of gold.'
  '3':
  - type: text
    content: ' Under it were figures of oxen encircling it, ten to a cubit. The oxen were in two rows, cast in one piece with it.'
  '4':
  - type: text
    content: ' It stood upon twelve oxen, three looking north, three west, three south, three east; and the Sea rested upon them, and all their hind parts were inward.'
  '5':
  - type: text
    content: ' Its thickness was a handbreadth; its brim was like the brim of a cup, like the flower of a lily; it held 3,000 baths (measures).'
  '6':
  - type: text
    content: ' He made also ten lavers in which to wash and put five on the right (south) side and five on the left (north). Such things as they offered for the burnt offering they washed in them, but the Sea was for the priests to wash in.'
  '7':
  - type: text
    content: ' And he made ten golden lampstands as directed and set them in the temple, five on the right side and five on the left.'
  '8':
  - type: text
    content: ' He made also ten tables and placed them in the temple, five each on the right and left sides, and 100 basins of gold.'
  '9':
  - type: text
    content: ' Moreover, he made the priests'' court, and the great court and doors for the court, and overlaid their doors with bronze.'
