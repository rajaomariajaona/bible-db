document_id: 2CH.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ALSO SOLOMON made an altar of bronze, its top twenty by twenty cubits and its height ten cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Also he made a round Sea of molten metal, ten cubits from brim to brim and five cubits high, and a line of thirty cubits measured around it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Under it were figures of oxen encircling it, ten to a cubit. The oxen were in two rows, cast in one piece with it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' It stood upon twelve oxen, three looking north, three west, three south, three east; and the Sea rested upon them, and all their hind parts were inward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Its thickness was a handbreadth; its brim was like the brim of a cup, like the flower of a lily; it held 3,000 baths (measures).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He made also ten lavers in which to wash and put five on the right (south) side and five on the left (north). Such things as they offered for the burnt offering they washed in them, but the Sea was for the priests to wash in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And he made ten golden lampstands as directed and set them in the temple, five on the right side and five on the left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He made also ten tables and placed them in the temple, five each on the right and left sides, and 100 basins of gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Moreover, he made the priests'' court, and the great court and doors for the court, and overlaid their doors with bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And he set the Sea at the southeast corner of the house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Huram made the pots, shovels, and basins. So Huram finished the work of God''s house that he did for King Solomon:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The two pillars; the bowls; the capitals on top of the two pillars; and the two networks to cover the two bowls of the capitals on top of the pillars;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And 400 pomegranates for the two networks, two rows of pomegranates for each network, to cover the two bowls of the capitals upon the pillars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He made also bases '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' stands and lavers upon the bases;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' One Sea and the twelve oxen under it;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The pots, shovels, and fleshhooks, and all their equipment Huram his trusted counselor made of burnished bronze for King Solomon for the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' In the plain of the Jordan the king cast them, in the clay ground between Succoth and Zeredah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Solomon made all these things in such great numbers that the weight of the bronze was not computed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Solomon made all the vessels for the house of God: the golden altar also; and the tables for the showbread (the bread of the Presence);'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And the lampstands with their lamps of pure gold, to burn before the inner sanctuary (the Holy of Holies) as directed;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The flowers, lamps, and tongs, of purest gold;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The snuffers, basins, dishes for incense, and firepans, of pure gold; and for the temple entry, the inner doors for the Most Holy Place and the doors of the Holy Place were of gold.'
