document_id: 2CH.24,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' JOASH WAS seven years old when he began his forty-year reign in Jerusalem. His mother was Zibiah of Beersheba.'
  '10':
  - type: text
    content: ' And all the princes and people rejoiced and brought their tax and dropped it into the chest until they had finished.'
  '11':
  - type: text
    content: ' When the Levites brought the chest to the king''s office, and whenever they saw that there was much money, the king''s secretary and the high priest''s officer came and emptied the chest and carried it to its place again. Thus they did day by day and collected money in abundance.'
  '12':
  - type: text
    content: ' And the king and Jehoiada gave it to those who did the work of the temple service; and they hired masons and carpenters and also those who worked in iron and bronze to repair the house of the Lord.'
  '13':
  - type: text
    content: ' So the workmen labored, and the work of repairing went forward in their hands; and they set up the house of God according to its design and strengthened it.'
  '14':
  - type: text
    content: ' When they had finished it, they brought the rest of the money before the king and Jehoiada; from it were made utensils for the Lord''s house, vessels for ministering and for offerings, and cups and vessels of gold and silver. And they offered burnt offerings in the house of the Lord continually all the days of Jehoiada.'
  '15':
  - type: text
    content: ' But Jehoiada became old and full of [the handicaps of great] age, and he died. He was 130 years old at his death.'
  '16':
  - type: text
    content: ' They buried him in the City of David among the kings, because he had done good in Israel and toward God and His house.'
  '17':
  - type: text
    content: ' Now after the death of Jehoiada [the priest, who had hidden Joash], the princes of Judah came and made obeisance to King Joash; then the king hearkened to them.'
  '18':
  - type: text
    content: ' They forsook the house of the Lord, the God of their fathers, and served the Asherim and idols; and wrath came upon Judah and Jerusalem for their sin (guilt).'
  '19':
  - type: text
    content: ' Yet [God] sent prophets to them to bring them again to the Lord; these testified against them, but they would not listen.'
  '2':
  - type: text
    content: ' And Joash did what was right in the sight of the Lord all the days of Jehoiada the priest [his uncle].'
  '20':
  - type: text
    content: ' Then the Spirit of God came upon Zechariah son of Jehoiada the priest, who stood over the people, and he said to them, Thus says God: Why do you transgress the commandments of the Lord so that you cannot prosper? Because you have forsaken the Lord, He also has forsaken you.'
  '21':
  - type: text
    content: ' They conspired against Zechariah the priest and stoned him at the command of the king in the court of the Lord''s house!'
  '22':
  - type: text
    content: ' Thus Joash the king did not remember the kindness which Jehoiada, Zechariah''s father, had done him, but slew his son. And when [Zechariah the priest] was dying, he said, May the Lord see and avenge!'
  '23':
  - type: text
    content: ' At the end of the year, the army of Syria came up against Joash. They came to Judah and Jerusalem and destroyed all the princes from among the people and sent all their spoil to the king of Damascus.'
  '24':
  - type: text
    content: ' Though the army of the Syrians came with a small company of men, the Lord delivered a very great host into their hands, because Joash and Judah had forsaken the Lord, the God of their fathers. So the Syrians executed judgment against Joash.'
  '25':
  - type: text
    content: ' And when they had departed from Joash, leaving him very ill, his own servants conspired against him for the blood of the sons of Jehoiada the priest, and they slew him on his bed. So he died and they buried him in the City of David, but not in the tombs of the kings.'
  '26':
  - type: text
    content: ' The conspirators against Joash were Zabad son of Shimeath the Ammonitess, and Jehozabad son of Shimrith the Moabitess.'
  '27':
  - type: text
    content: ' Now concerning his sons and the greatness of the prophecies uttered against him and the rebuilding of the house of God, they are written in the commentary on the Book of Kings. And Amaziah his [Joash''s] son reigned in his stead.'
  '3':
  - type: text
    content: ' And Jehoiada took for him two wives, and he had sons and daughters.'
  '4':
  - type: text
    content: ' After this, Joash decided to repair the Lord''s house.'
  '5':
  - type: text
    content: ' He gathered the priests and the Levites and said to them, Go out to the cities of Judah, and gather from all Israel money to repair the house of your God from year to year; and see that you hasten the matter. But the Levites did not hasten it.'
  '6':
  - type: text
    content: ' So the king called for Jehoiada the high priest and said to him, Why have you not required the Levites to bring in from Judah and Jerusalem the tax authorized by Moses the servant of the Lord and of the assembly of Israel for the Tent of the Testimony?'
  '7':
  - type: text
    content: ' For the sons of Athaliah, that wicked woman, had broken into the house of God and also had used for the Baals all the dedicated things of the house of the Lord.'
  '8':
  - type: text
    content: ' And at the king''s command they made a chest and set it outside the gate of the house of the Lord.'
  '9':
  - type: text
    content: ' And they made a proclamation through Judah and Jerusalem to bring in for the Lord the tax that Moses the servant of God laid upon Israel in the wilderness.'
