document_id: 2CH.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' JOASH WAS seven years old when he began his forty-year reign in Jerusalem. His mother was Zibiah of Beersheba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Joash did what was right in the sight of the Lord all the days of Jehoiada the priest [his uncle].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Jehoiada took for him two wives, and he had sons and daughters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' After this, Joash decided to repair the Lord''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' He gathered the priests and the Levites and said to them, Go out to the cities of Judah, and gather from all Israel money to repair the house of your God from year to year; and see that you hasten the matter. But the Levites did not hasten it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' So the king called for Jehoiada the high priest and said to him, Why have you not required the Levites to bring in from Judah and Jerusalem the tax authorized by Moses the servant of the Lord and of the assembly of Israel for the Tent of the Testimony?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' For the sons of Athaliah, that wicked woman, had broken into the house of God and also had used for the Baals all the dedicated things of the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And at the king''s command they made a chest and set it outside the gate of the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And they made a proclamation through Judah and Jerusalem to bring in for the Lord the tax that Moses the servant of God laid upon Israel in the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And all the princes and people rejoiced and brought their tax and dropped it into the chest until they had finished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' When the Levites brought the chest to the king''s office, and whenever they saw that there was much money, the king''s secretary and the high priest''s officer came and emptied the chest and carried it to its place again. Thus they did day by day and collected money in abundance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the king and Jehoiada gave it to those who did the work of the temple service; and they hired masons and carpenters and also those who worked in iron and bronze to repair the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So the workmen labored, and the work of repairing went forward in their hands; and they set up the house of God according to its design and strengthened it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' When they had finished it, they brought the rest of the money before the king and Jehoiada; from it were made utensils for the Lord''s house, vessels for ministering and for offerings, and cups and vessels of gold and silver. And they offered burnt offerings in the house of the Lord continually all the days of Jehoiada.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' But Jehoiada became old and full of [the handicaps of great] age, and he died. He was 130 years old at his death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' They buried him in the City of David among the kings, because he had done good in Israel and toward God and His house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Now after the death of Jehoiada [the priest, who had hidden Joash], the princes of Judah came and made obeisance to King Joash; then the king hearkened to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' They forsook the house of the Lord, the God of their fathers, and served the Asherim and idols; and wrath came upon Judah and Jerusalem for their sin (guilt).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Yet [God] sent prophets to them to bring them again to the Lord; these testified against them, but they would not listen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then the Spirit of God came upon Zechariah son of Jehoiada the priest, who stood over the people, and he said to them, Thus says God: Why do you transgress the commandments of the Lord so that you cannot prosper? Because you have forsaken the Lord, He also has forsaken you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' They conspired against Zechariah the priest and stoned him at the command of the king in the court of the Lord''s house!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Thus Joash the king did not remember the kindness which Jehoiada, Zechariah''s father, had done him, but slew his son. And when [Zechariah the priest] was dying, he said, May the Lord see and avenge!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' At the end of the year, the army of Syria came up against Joash. They came to Judah and Jerusalem and destroyed all the princes from among the people and sent all their spoil to the king of Damascus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Though the army of the Syrians came with a small company of men, the Lord delivered a very great host into their hands, because Joash and Judah had forsaken the Lord, the God of their fathers. So the Syrians executed judgment against Joash.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And when they had departed from Joash, leaving him very ill, his own servants conspired against him for the blood of the sons of Jehoiada the priest, and they slew him on his bed. So he died and they buried him in the City of David, but not in the tombs of the kings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' The conspirators against Joash were Zabad son of Shimeath the Ammonitess, and Jehozabad son of Shimrith the Moabitess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Now concerning his sons and the greatness of the prophecies uttered against him and the rebuilding of the house of God, they are written in the commentary on the Book of Kings. And Amaziah his [Joash''s] son reigned in his stead.'
