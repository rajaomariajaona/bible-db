document_id: 1KI.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' SOLOMON WAS building his own house thirteen years, and he finished all of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He built also the Forest of Lebanon House; its length was a hundred cubits, its breadth fifty, and its height thirty cubits, upon four rows of cedar pillars, with cedar beams upon the pillars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And it was covered with cedar above the side chambers that were upon the forty-five pillars, fifteen in a row.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' There were window frames in three rows, and window opposite window in three tiers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' All the doorways and windows were square cut, and window was opposite window in three tiers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' He also made the Hall of Pillars; its length was fifty cubits and its breadth thirty cubits. There was a porch in front, and pillars and a cornice before them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He made the porch for the throne where he was to judge, the Porch of Judgment; it was covered with cedar from floor to ceiling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' His house where he was to dwell had another court behind the Porch of Judgment of similar work. Solomon also made a house like this porch for Pharaoh''s daughter, whom he had married.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' All were of costly stones hewn according to measure, sawed with saws back and front, even from foundation to coping, and from the outside to the great court.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The foundation was of costly stones, even great stones of eight and ten cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And above were costly stones hewn according to measure, and cedar timbers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Also the great encircling court had three courses of hewn stone and a course of cedar beams, like was around the inner court of the house of the Lord and the porch of the house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' King Solomon brought Hiram from Tyre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' He was the son of a widow of the tribe of Naphtali, and his father was a man of Tyre, a worker in bronze. He was full of wisdom, understanding, and skill to do any kind of work in bronze. So he came to King Solomon and did all his [bronze] work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' He fashioned the two pillars of bronze, each eighteen cubits high, and a line of twelve cubits measured its circumference.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He made two capitals of molten bronze to set upon the tops of the pillars; the height of each capital was five cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Nets of checkerwork and wreaths of chainwork for the capitals were on the tops of the pillars, seven for each capital.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' So Hiram made the pillars. There were two rows of pomegranates encircling each network to cover the capitals that were upon the top.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The capitals that were upon the top of the pillars in the porch were of lily work [design], four cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The capitals were upon the two pillars and also above the rounded projection beside the network. There were 200 pomegranates in two rows round about, and so with the other capital.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Hiram set up the pillars of the porch of the temple; he set up the right pillar and called its name Jachin [he will establish], and he set up the left pillar and called its name Boaz [in strength].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' On the tops of the pillars was lily work [design]. So the work of the pillars was finished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' He made a round molten Sea, ten cubits from brim to brim, five cubits high and thirty cubits in circumference. [Exod. 30:17-21; II Chron. 4:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Under its brim were gourds encircling the Sea, ten to a cubit; the gourds were in two rows, cast in one piece with it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' It stood upon twelve oxen, three facing north, three west, three south, and three east; the Sea was set upon them, and all their rears pointed inward.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' It was a handbreadth thick, and its brim was made like the brim of a cup, like a lily blossom. It held 2,000 baths [Hebrew liquid measurement].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Hiram made ten bronze bases [for the lavers]; their length and breadth were four cubits, and the height three cubits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' This is the way the bases were made: they had panels between the ledges.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' On the panels between the ledges were lions, oxen, and cherubim; and upon the ledges there was a pedestal above. Beneath the lions and oxen were wreaths of hanging work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And every base had four bronze wheels and axles of bronze, and at the four corners were supports for a laver. Beneath the laver the supports were cast, with wreaths at the side of each.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Its mouth within the capital projected upward a cubit, and its mouth was round like the work of a pedestal, a cubit and a half. Also upon its mouth were carvings, and their borders were square, not round.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Under the borders were four wheels, and the axles of the wheels were one piece with the base. And the height of a wheel was a cubit and a half.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' The wheels were made like a chariot wheel: their axles, their rims, their spokes, and their hubs were all cast.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' There were four supports to the four corners of each base; the supports were part of the base itself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' On the top of the base there was a circular elevation half a cubit high, and on the top of the base its stays and panels were of one piece with it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And on the surface of its stays and its panels Hiram carved cherubim, lions, and palm trees, according to the space of each, with wreaths round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Thus he made the ten bases. They all had one casting, one measure, and one form.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Then he made ten lavers of bronze; each laver held forty baths and measured four cubits, and there was one laver on each of the ten bases.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' He put the bases five on the south side of the house and five on the north side; and he set the Sea at the southeast corner of the house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' Hiram made the lavers, the shovels, and the basins. So Hiram finished all the work that he did for King Solomon on the house of the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' The two pillars; and the two bowls of the capitals that were on the tops of the two pillars; and the two networks to cover the two bowls;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' And the 400 pomegranates for the two networks, two rows of pomegranates for each network, to cover the two bowls of the capitals that were upon the pillars;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' The ten bases and the ten lavers on the bases;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' One Sea, and the twelve oxen under it;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' The pots, the shovels, and the basins. All these vessels which Hiram made for King Solomon in the house of the Lord were of burnished bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' In the Jordan plain the king cast them, in clay ground between Succoth and Zarethan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' Solomon left all the vessels unweighed, because they were so many; the weight of the bronze was not found out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' Solomon made all the other vessels of the Lord''s house: the [incense] altar of gold; the table of gold for the showbread;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' The lampstands of pure gold, five on the right side and five on the left, in front of the Holy of Holies; with the flowers, the lamps, and the tongs of gold;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' The cups, snuffers, basins, spoons, firepans–of pure gold; and the hinges of gold for the doors of the innermost room, the Holy of Holies, and for the doors of the Holy Place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' So all the work that King Solomon did on the house of the Lord was completed. Solomon brought in the things which David his father had dedicated–the silver, the gold, and the vessels–and put them in the treasuries of the Lord''s house.'
