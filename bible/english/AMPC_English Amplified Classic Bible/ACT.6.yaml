document_id: ACT.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW ABOUT this time, when the number of the disciples was greatly increasing, complaint was made by the Hellenists (the Greek-speaking Jews) against the [native] Hebrews because their widows were being overlooked '
  - type: text
    content: and
  - type: text
    content: ' neglected in the daily ministration (distribution of relief).'
  '10':
  - type: text
    content: ' But they were not able to resist the intelligence '
  - type: text
    content: and
  - type: text
    content: ' the wisdom and [the inspiration of] the Spirit with which '
  - type: text
    content: and
  - type: text
    content: ' by Whom he spoke.'
  '11':
  - type: text
    content: ' So they [secretly] instigated '
  - type: text
    content: and
  - type: text
    content: ' instructed men to say, We have heard this man speak, using slanderous '
  - type: text
    content: and
  - type: text
    content: ' abusive '
  - type: text
    content: and
  - type: text
    content: ' blasphemous language against Moses and God.'
  '12':
  - type: text
    content: ' [Thus] they incited the people as well as the elders and the scribes, and they came upon Stephen and arrested him and took him before the council (Sanhedrin).'
  '13':
  - type: text
    content: ' And they brought forward false witnesses who asserted, This man never stops making statements against this sacred place and the Law [of Moses];'
  '14':
  - type: text
    content: ' For we have heard him say that this Jesus the Nazarene will tear down '
  - type: text
    content: and
  - type: text
    content: ' destroy this place, and will alter the institutions '
  - type: text
    content: and
  - type: text
    content: ' usages which Moses transmitted to us.'
  '15':
  - type: text
    content: ' Then all who sat in the council (Sanhedrin), as they gazed intently at Stephen, saw that his face had the appearance of the face of an angel.'
  '2':
  - type: text
    content: ' So the Twelve [apostles] convened the multitude of the disciples and said, It is not seemly '
  - type: text
    content: or
  - type: text
    content: ' desirable '
  - type: text
    content: or
  - type: text
    content: ' right that we should have to give up '
  - type: text
    content: or
  - type: text
    content: ' neglect [preaching] the Word of God in order to attend to serving at tables '
  - type: text
    content: and
  - type: text
    content: ' superintending the distribution of food.'
  '3':
  - type: text
    content: ' Therefore select out from among yourselves, brethren, seven men of good '
  - type: text
    content: and
  - type: text
    content: ' attested character '
  - type: text
    content: and
  - type: text
    content: ' repute, full of the [Holy] Spirit and wisdom, whom we may assign to look after this business '
  - type: text
    content: and
  - type: text
    content: ' duty.'
  '4':
  - type: text
    content: ' But we will continue to devote ourselves steadfastly to prayer and the ministry of the Word.'
  '5':
  - type: text
    content: ' And the suggestion pleased the whole assembly, and they selected Stephen, a man full of faith (a strong and welcome belief that Jesus is the Messiah) and full of '
  - type: text
    content: and
  - type: text
    content: ' controlled by the Holy Spirit, and Philip, and Prochorus, and Nicanor, and Timon, and Parmenas, and Nicolaus, a proselyte (convert) from Antioch.'
  '6':
  - type: text
    content: ' These they presented to the apostles, who after prayer laid their hands on them.'
  '7':
  - type: text
    content: ' And the message of God kept on spreading, and the number of disciples multiplied greatly in Jerusalem; and [besides] a large number of the priests were obedient to the faith [in Jesus as the Messiah, through Whom is obtained eternal salvation in the kingdom of God].'
  '8':
  - type: text
    content: ' Now Stephen, full of grace (divine blessing and favor) and power (strength and ability) worked great wonders and signs (miracles) among the people.'
  '9':
  - type: text
    content: ' However, some of those who belonged to the synagogue of the Freedmen (freed Jewish slaves), as it was called, and [of the synagogues] of the Cyrenians and of the Alexandrians and of those from Cilicia and [the province of] Asia, arose [and undertook] to debate '
  - type: text
    content: and
  - type: text
    content: ' dispute with Stephen.'
