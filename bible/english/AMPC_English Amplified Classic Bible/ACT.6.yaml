document_id: ACT.6,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' NOW ABOUT this time, when the number of the disciples was greatly increasing, complaint was made by the Hellenists (the Greek-speaking Jews) against the [native] Hebrews because their widows were being overlooked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' neglected in the daily ministration (distribution of relief).'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But they were not able to resist the intelligence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the wisdom and [the inspiration of] the Spirit with which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by Whom he spoke.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So they [secretly] instigated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instructed men to say, We have heard this man speak, using slanderous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abusive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blasphemous language against Moses and God.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Thus] they incited the people as well as the elders and the scribes, and they came upon Stephen and arrested him and took him before the council (Sanhedrin).'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they brought forward false witnesses who asserted, This man never stops making statements against this sacred place and the Law [of Moses];'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For we have heard him say that this Jesus the Nazarene will tear down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy this place, and will alter the institutions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' usages which Moses transmitted to us.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then all who sat in the council (Sanhedrin), as they gazed intently at Stephen, saw that his face had the appearance of the face of an angel.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So the Twelve [apostles] convened the multitude of the disciples and said, It is not seemly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' desirable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' right that we should have to give up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' neglect [preaching] the Word of God in order to attend to serving at tables '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' superintending the distribution of food.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Therefore select out from among yourselves, brethren, seven men of good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attested character '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' repute, full of the [Holy] Spirit and wisdom, whom we may assign to look after this business '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' duty.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But we will continue to devote ourselves steadfastly to prayer and the ministry of the Word.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the suggestion pleased the whole assembly, and they selected Stephen, a man full of faith (a strong and welcome belief that Jesus is the Messiah) and full of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' controlled by the Holy Spirit, and Philip, and Prochorus, and Nicanor, and Timon, and Parmenas, and Nicolaus, a proselyte (convert) from Antioch.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These they presented to the apostles, who after prayer laid their hands on them.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the message of God kept on spreading, and the number of disciples multiplied greatly in Jerusalem; and [besides] a large number of the priests were obedient to the faith [in Jesus as the Messiah, through Whom is obtained eternal salvation in the kingdom of God].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now Stephen, full of grace (divine blessing and favor) and power (strength and ability) worked great wonders and signs (miracles) among the people.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' However, some of those who belonged to the synagogue of the Freedmen (freed Jewish slaves), as it was called, and [of the synagogues] of the Cyrenians and of the Alexandrians and of those from Cilicia and [the province of] Asia, arose [and undertook] to debate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dispute with Stephen.'
