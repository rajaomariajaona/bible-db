document_id: EZK.24,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AGAIN IN the ninth year [of King Jehoiachin''s captivity by Nebuchadnezzar of Babylon], in the tenth month, on the tenth day of the month, the word of the Lord came to me, saying,'
  '10':
  - type: text
    content: ' Heap on wood, kindle the fire '
  - type: text
    content: and
  - type: text
    content: ' make it hot, boil well the meat '
  - type: text
    content: and
  - type: text
    content: ' mix the spices, pour out the broth when thick, and let the bones be burned up.'
  '11':
  - type: text
    content: ' Then set [the pot Jerusalem] back empty upon the coals, that the bronze of it may be hot and may glow and the filthiness of it may be melted in it and the rust '
  - type: text
    content: and
  - type: text
    content: ' scum of it may be consumed.'
  '12':
  - type: text
    content: ' She has wearied herself '
  - type: text
    content: and
  - type: text
    content: ' Me with toil; yet her great rust '
  - type: text
    content: and
  - type: text
    content: ' scum go not forth out of her, for however hotly the fire burns, her thick rust '
  - type: text
    content: and
  - type: text
    content: ' filth will not go out of her by fire.'
  '13':
  - type: text
    content: ' In your filthiness is abomination; [and therefore] because I would have cleansed you and you were not cleansed, you shall not be cleansed from your filthiness any more until I have satisfied My wrath against '
  - type: text
    content: and
  - type: text
    content: ' upon you.'
  '14':
  - type: text
    content: ' I the Lord have spoken it; it shall come to pass and I will do it; I will not go back, neither will I spare, neither will I relent; according to your ways and according to your doings shall they judge '
  - type: text
    content: and
  - type: text
    content: ' punish you, says the Lord God.'
  '15':
  - type: text
    content: ' Also the word of the Lord came to me, saying,'
  '16':
  - type: text
    content: ' Son of man [Ezekiel], behold, I take away from you the desire of your eyes [your wife] at a single stroke. Yet you shall neither mourn nor weep, neither shall your tears flow.'
  '17':
  - type: text
    content: ' Sigh '
  - type: text
    content: and
  - type: text
    content: ' groan, but not aloud [be silent]; make no mourning for the dead; bind your turban upon your head and put your shoes on your feet, and do not cover your beard or eat the bread of mourners [furnished by others].'
  '18':
  - type: text
    content: ' So I spoke to the people in the morning and in the evening my wife died, and I did the next morning as I was commanded.'
  '19':
  - type: text
    content: ' And the people said to me, Will you not tell us what these things are supposed to mean to us, that you are acting as you do?'
  '2':
  - type: text
    content: ' Son of man, record the name of the day, even of this same day; the king of Babylon set himself against '
  - type: text
    content: and
  - type: text
    content: ' assailed Jerusalem this same day.'
  '20':
  - type: text
    content: ' Then I answered them, The word of the Lord came to me, saying,'
  '21':
  - type: text
    content: ' Speak to the house of Israel, Thus says the Lord God: Behold, I will profane My sanctuary–[in which you take] pride as your strength, the desire of your eyes, and the pity '
  - type: text
    content: and
  - type: text
    content: ' sympathy of your soul [that you would spare with your life]; and your sons and your daughters whom you have left behind shall fall by the sword.'
  '22':
  - type: text
    content: ' And you shall do as I [Ezekiel] have done; you shall not cover your beard nor eat the bread of mourning [brought to you by others],'
  '23':
  - type: text
    content: ' And your turbans shall be upon your heads and your shoes upon your feet; you shall not mourn or weep, but you shall pine away for your iniquities (your guilt) and sigh '
  - type: text
    content: and
  - type: text
    content: ' groan to one another. [Lev. 26:39.]'
  '24':
  - type: text
    content: ' Thus Ezekiel is to you a sign; according to all that he has done you shall do. And when this [destruction of the temple] comes, you shall know, understand, '
  - type: text
    content: and
  - type: text
    content: ' realize that I am the Lord God [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '25':
  - type: text
    content: ' And you, son of man, on the day when I take from them [My temple] their strength '
  - type: text
    content: and
  - type: text
    content: ' their stronghold, their joy and their glory, the delight of their eyes and their hearts'' chief desire, and also [take] their sons and their daughters–'
  '26':
  - type: text
    content: ' On that day an escaped fugitive shall come to you to cause you to hear of it [the destruction of Jerusalem] with your own ears.'
  '27':
  - type: text
    content: ' In that day your mouth shall be open to him who has escaped, and you shall speak and be no more speechless, and you shall be a sign to them and they shall know, understand, '
  - type: text
    content: and
  - type: text
    content: ' realize that I am the Lord.'
  '3':
  - type: text
    content: ' And utter a parable against the rebellious house [of Judah] and say to them, Thus says the Lord God: Put on a pot; put it on and also pour water into it.'
  '4':
  - type: text
    content: ' Put into it the pieces [of meat], all the good pieces, the thigh and the shoulder; fill it with the choice of the bones.'
  '5':
  - type: text
    content: ' Take the choicest of the flock and burn also the unused bones under it, and make it boil well and seethe its bones in [the pot].'
  '6':
  - type: text
    content: ' Therefore thus says the Lord God: Woe to the bloody city, to the pot whose rust '
  - type: text
    content: and
  - type: text
    content: ' scum are in it and whose rust '
  - type: text
    content: and
  - type: text
    content: ' scum have not gone out of it! Take out of it piece by piece, without making any choice.'
  '7':
  - type: text
    content: ' For the blood she has shed remains in the midst of her; she put it upon the bare rock; she did not pour it on the ground to cover it with dust.'
  '8':
  - type: text
    content: ' That it may cause wrath to come up to take vengeance, I have put her blood [guilt for her children sacrificed to Molech] upon the bare rock, that it would not be covered.'
  '9':
  - type: text
    content: ' Therefore thus says the Lord God: Woe to the bloodguilty city! Also I will make the pile [of fuel] great.'
