document_id: EZK.24,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AGAIN IN the ninth year [of King Jehoiachin''s captivity by Nebuchadnezzar of Babylon], in the tenth month, on the tenth day of the month, the word of the Lord came to me, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Heap on wood, kindle the fire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make it hot, boil well the meat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mix the spices, pour out the broth when thick, and let the bones be burned up.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Then set [the pot Jerusalem] back empty upon the coals, that the bronze of it may be hot and may glow and the filthiness of it may be melted in it and the rust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scum of it may be consumed.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' She has wearied herself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Me with toil; yet her great rust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scum go not forth out of her, for however hotly the fire burns, her thick rust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' filth will not go out of her by fire.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' In your filthiness is abomination; [and therefore] because I would have cleansed you and you were not cleansed, you shall not be cleansed from your filthiness any more until I have satisfied My wrath against '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' upon you.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' I the Lord have spoken it; it shall come to pass and I will do it; I will not go back, neither will I spare, neither will I relent; according to your ways and according to your doings shall they judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punish you, says the Lord God.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Also the word of the Lord came to me, saying,'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Son of man [Ezekiel], behold, I take away from you the desire of your eyes [your wife] at a single stroke. Yet you shall neither mourn nor weep, neither shall your tears flow.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Sigh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' groan, but not aloud [be silent]; make no mourning for the dead; bind your turban upon your head and put your shoes on your feet, and do not cover your beard or eat the bread of mourners [furnished by others].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' So I spoke to the people in the morning and in the evening my wife died, and I did the next morning as I was commanded.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And the people said to me, Will you not tell us what these things are supposed to mean to us, that you are acting as you do?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Son of man, record the name of the day, even of this same day; the king of Babylon set himself against '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' assailed Jerusalem this same day.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Then I answered them, The word of the Lord came to me, saying,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Speak to the house of Israel, Thus says the Lord God: Behold, I will profane My sanctuary–[in which you take] pride as your strength, the desire of your eyes, and the pity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sympathy of your soul [that you would spare with your life]; and your sons and your daughters whom you have left behind shall fall by the sword.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And you shall do as I [Ezekiel] have done; you shall not cover your beard nor eat the bread of mourning [brought to you by others],'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And your turbans shall be upon your heads and your shoes upon your feet; you shall not mourn or weep, but you shall pine away for your iniquities (your guilt) and sigh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' groan to one another. [Lev. 26:39.]'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Thus Ezekiel is to you a sign; according to all that he has done you shall do. And when this [destruction of the temple] comes, you shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord God [the Sovereign Ruler, Who calls forth loyalty and obedient service].'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' And you, son of man, on the day when I take from them [My temple] their strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their stronghold, their joy and their glory, the delight of their eyes and their hearts'' chief desire, and also [take] their sons and their daughters–'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' On that day an escaped fugitive shall come to you to cause you to hear of it [the destruction of Jerusalem] with your own ears.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' In that day your mouth shall be open to him who has escaped, and you shall speak and be no more speechless, and you shall be a sign to them and they shall know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And utter a parable against the rebellious house [of Judah] and say to them, Thus says the Lord God: Put on a pot; put it on and also pour water into it.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Put into it the pieces [of meat], all the good pieces, the thigh and the shoulder; fill it with the choice of the bones.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Take the choicest of the flock and burn also the unused bones under it, and make it boil well and seethe its bones in [the pot].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Therefore thus says the Lord God: Woe to the bloody city, to the pot whose rust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scum are in it and whose rust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scum have not gone out of it! Take out of it piece by piece, without making any choice.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For the blood she has shed remains in the midst of her; she put it upon the bare rock; she did not pour it on the ground to cover it with dust.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' That it may cause wrath to come up to take vengeance, I have put her blood [guilt for her children sacrificed to Molech] upon the bare rock, that it would not be covered.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Therefore thus says the Lord God: Woe to the bloodguilty city! Also I will make the pile [of fuel] great.'
