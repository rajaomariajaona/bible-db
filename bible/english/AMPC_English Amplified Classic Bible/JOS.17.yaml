document_id: JOS.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' ALLOTMENT WAS made for the tribe of Manasseh, for he was the firstborn of Joseph. To Machir the firstborn of Manasseh, the father of Gilead, were allotted Gilead and Bashan because he was a man of war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Allotment was also made for the other Manassites by their families–for the sons of Abiezer, of Helek, Asriel, Shechem, Hepher, and Shemida, the male offspring of Manasseh son of Joseph by their families.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But Zelophehad son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, had no sons but only daughters; their names were Mahlah, Noah, Hoglah, Milcah, and Tirzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' They came before Eleazar the priest and Joshua son of Nun and the leaders and said, The Lord commanded Moses to give us an inheritance with our brethren. So according to the Lord''s command, Joshua gave them an inheritance among their father''s brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So there fell ten portions to Manasseh besides the land of Gilead and Bashan, which is on the other side of the Jordan,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Because the [five] daughters of Manasseh received an inheritance among his [five] sons. The land of Gilead belonged to the other [half] of the Manassites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The territory of Manasseh reached from Asher to Michmethah east of Shechem; and the border went along southward to the inhabitants of En-tappuah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The land of Tappuah belonged to Manasseh, but the town of Tappuah on the border of Manasseh belonged to the Ephraimites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then the boundary went down to the brook Kanah. The cities south of the brook lying among the cities of Manasseh belonged to Ephraim. But Manasseh''s boundary went on north of the brook and ended at the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The land to the south was Ephraim''s and that to the north was Manasseh''s, and the sea was the boundary; on the north Asher was reached, and on the east Issachar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Also Manasseh had in Issachar and in Asher [these six towns], their inhabitants and their villages: Beth-shean, Ibleam, Dor, Endor, Taanach, and Megiddo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Yet the sons of Manasseh could not drive out the inhabitants of those cities, but the Canaanites persisted in dwelling in that land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' When the Israelites became strong, they put the Canaanites to forced labor but did not utterly drive them out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The tribe of Joseph spoke to Joshua, saying, Why have you given [us] but one lot and one portion as an inheritance when [we] are a great [abundant] people, for until now the Lord has blessed [us]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Joshua replied, If you are a great people, get up to the forest and clear ground for yourselves in the land of the Perizzites and the Rephaim, since the Ephraim hill country is too narrow for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The Josephites said, The hill country is not enough for us, and all the Canaanites who dwell in the valley have iron chariots, both those in Beth-shean and its villages and in the Valley of Jezreel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Joshua said to the house of Joseph, to Ephraim and to Manasseh, You are a great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' numerous people and have great power; you shall not have only one lot'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But the hill country shall be yours; though it is a forest, you shall clear and possess it to its farthest borders; for you shall drive out the Canaanites, though they have iron chariots and are strong.'
