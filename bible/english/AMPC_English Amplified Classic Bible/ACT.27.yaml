document_id: ACT.27,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW WHEN it was determined that we [including Luke] should sail for Italy, they turned Paul and some other prisoners over to a centurion of the imperial regiment named Julius.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Saying, Sirs, I perceive [after careful observation] that this voyage will be attended with disaster and much heavy loss, not only of the cargo and the ship but of our lives also.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' However, the centurion paid greater attention to the pilot and to the owner of the ship than to what Paul said.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And as the harbor was not well situated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' so unsuitable to winter in, the majority favored the plan of putting to sea again from there, hoping somehow to reach Phoenice, a harbor of Crete facing southwest and northwest, and winter there.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' So when the south wind blew softly, supposing they were gaining their object, they weighed anchor and sailed along Crete, hugging the coast.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' But soon afterward a violent wind [of the character of a typhoon], called a northeaster, came bursting down from the island.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And when the ship was caught and was unable to head against the wind, we gave up and, letting her drift, were borne along.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' We ran under the shelter of a small island called Cauda, where we managed with [much] difficulty to draw the [ship''s small] boat on deck '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secure it.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' After hoisting it on board, they used supports with ropes to undergird '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brace the ship; then afraid that they would be driven into the Syrtis [quicksands off the north coast of Africa], they lowered the gear (sails and ropes) and so were driven along.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' As we were being dangerously tossed about by the violence of the storm, the next day they began to throw the freight overboard;'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' And the third day they threw out with their own hands the ship''s equipment (the tackle and the furniture).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And going aboard a ship from Adramyttium which was about to sail for the ports along the coast of [the province of] Asia, we put out to sea; and Aristarchus, a Macedonian from Thessalonica, accompanied us.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And when neither sun nor stars were visible for many days and no small tempest kept raging about us, all hope of our being saved was finally abandoned.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Then as they had eaten nothing for a long time, Paul came forward into their midst and said, Men, you should have listened to me, and should not have put to sea from Crete and brought on this disaster and harm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' misery '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loss.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But [even] now I beg you to be in good spirits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take heart, for there will be no loss of life among you but only of the ship.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' For this [very] night there stood by my side an angel of the God to Whom I belong and Whom I serve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And he said, Do not be frightened, Paul! It is necessary for you to stand before Caesar; and behold, God has given you all those who are sailing with you.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' So keep up your courage, men, for I have faith (complete confidence) in God that it will be exactly as it was told me;'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' But we shall have to be stranded on some island.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' The fourteenth night had come and we were drifting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' being driven about in the Adriatic Sea, when about midnight the sailors began to suspect that they were drawing near to some land.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' So they took soundings and found twenty fathoms, and a little farther on they sounded again and found fifteen fathoms.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Then fearing that we might fall off [our course] onto rocks, they dropped four anchors from the stern and kept wishing for daybreak to come.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The following day we landed at Sidon, and Julius treated Paul in a loving way, with much consideration (kindness and care), permitting him to go to his friends [there] and be refreshed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be cared for.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' And as the sailors were trying to escape [secretly] from the ship and were lowering the small boat into the sea, pretending that they were going to lay out anchors from the bow,'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Paul said to the centurion and the soldiers, Unless these men remain in the ship, you cannot be saved.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' Then the soldiers cut away the ropes that held the small boat, and let it fall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' drift away.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' While they waited until it should become day, Paul entreated them all to take some food, saying, This is the fourteenth day that you have been continually in suspense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' on the alert without food, having eaten nothing.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' So I urge (warn, exhort, encourage, advise) you to take some food [for your safety]–it will give you strength; for not a hair is to perish from the head of any one of you.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Having said these words, he took bread and, giving thanks to God before them all, he broke it and began to eat.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Then they all became more cheerful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were encouraged and took food themselves.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' All told there were 276 souls of us in the ship.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' And after they had eaten sufficiently, [they proceeded] to lighten the ship, throwing out the wheat into the sea.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Now when it was day [and they saw the land], they did not recognize it, but they noticed a bay with a beach on which they [taking counsel] purposed to run the ship ashore if they possibly could.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' After putting to sea from there we passed to the leeward (south side) of Cyprus [for protection], for the winds were contrary to us.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' So they cut the cables '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' severed the anchors and left them in the sea; at the same time unlashing the ropes that held the rudders and hoisting the foresail to the wind, they headed for the beach.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' But striking a crosscurrent (a place open to two seas) they ran the ship aground. The prow stuck fast and remained immovable, and the stern began to break up under the violent force of the waves.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' It was the counsel of the soldiers to kill the prisoners, lest any of them should swim to land and escape;'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' But the centurion, wishing to save Paul, prevented their carrying out their purpose. He commanded those who could swim to throw themselves overboard first and make for the shore,'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' And the rest on heavy boards or pieces of the vessel. And so it was that all escaped safely to land.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And when we had sailed over [the whole length] of sea which lies off Cilicia and Pamphylia, we reached Myra in Lycia.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' There the centurion found an Alexandrian ship bound for Italy, and he transferred us to it.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For a number of days we made slow progress and arrived with difficulty off Cnidus; then, as the wind did not permit us to proceed, we went under the lee (shelter) of Crete off Salmone,'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And coasting along it with difficulty, we arrived at a place called Fair Havens, near which is located the town of Lasea.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But as [the season was well advanced, for] much time had been lost and navigation was already dangerous, for the time for the Fast [the Day of Atonement, about the beginning of October] had already gone by, Paul warned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' advised them,'
