document_id: 1CO.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' DOES ANY of you dare, when he has a matter of complaint against another [brother], to go to law before unrighteous men [men neither upright nor right with God, laying it before them] instead of before the saints (the people of God)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Do you not know that the saints (the believers) will [one day] judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' govern the world? And if the world [itself] is to be judged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruled by you, are you unworthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incompetent to try [such petty matters] of the smallest courts of justice?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Do you not know also that we [Christians] are to judge the [very] angels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pronounce opinion between right and wrong [for them]? How much more then [as to] matters pertaining to this world '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of this life only!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' If then you do have such cases of everyday life to decide, why do you appoint [as judges to lay them before] those who [from the standpoint] of the church count for least '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are without standing?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' I say this to move you to shame. Can it be that there really is not one man among you who [in action is governed by piety and integrity and] is wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' competent enough to decide [the private grievances, disputes, and quarrels] between members of the brotherhood,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But brother goes to law against brother, and that before [Gentile judges who are] unbelievers [without faith or trust in the Gospel of Christ]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Why, the very fact of your having lawsuits with one another at all is a defect (a defeat, an evidence of positive moral loss for you). Why not rather let yourselves suffer wrong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be deprived of what is your due? Why not rather be cheated (defrauded and robbed)?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' But [instead it is you] yourselves who wrong and defraud, and that even your own brethren [by so treating them]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Do you not know that the unrighteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the wrongdoers will not inherit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' have any share in the kingdom of God? Do not be deceived (misled): neither the impure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' immoral, nor idolaters, nor adulterers, nor those who participate in homosexuality,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Nor cheats (swindlers and thieves), nor greedy graspers, nor drunkards, nor foulmouthed revilers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' slanderers, nor extortioners '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' robbers will inherit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' have any share in the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And such some of you were [once]. But you were washed clean (purified by a complete atonement for sin and made free from the guilt of sin), and you were consecrated (set apart, hallowed), and you were justified [pronounced righteous, by trusting] in the name of the Lord Jesus Christ and in the [Holy] Spirit of our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Everything is permissible (allowable and lawful) for me; but not all things are helpful (good for me to do, expedient and profitable when considered with other things). Everything is lawful for me, but I will not become the slave of anything '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' be brought under its power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Food [is intended] for the stomach and the stomach for food, but God will finally end [the functions of] both '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring them to nothing. The body is not intended for sexual immorality, but [is intended] for the Lord, and the Lord [is intended] for the body [to save, sanctify, and raise it again].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And God both raised the Lord to life and will also raise us up by His power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Do you not see '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that your bodies are members (bodily parts) of Christ (the Messiah)? Am I therefore to take the parts of Christ and make [them] parts of a prostitute? Never! Never!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Or do you not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realize that when a man joins himself to a prostitute, he becomes one body with her? The two, it is written, shall become one flesh. [Gen. 2:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But the person who is united to the Lord becomes one spirit with Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Shun immorality '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' all sexual looseness [flee from impurity in thought, word, or deed]. Any other sin which a man commits is one outside the body, but he who commits sexual immorality sins against his own body.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Do you not know that your body is the temple (the very sanctuary) of the Holy Spirit Who lives within you, Whom you have received [as a Gift] from God? You are not your own,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' You were bought with a price [purchased with a preciousness and paid for, made His own]. So then, honor God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring glory to Him in your body.'
