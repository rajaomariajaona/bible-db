document_id: 1CO.6,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' DOES ANY of you dare, when he has a matter of complaint against another [brother], to go to law before unrighteous men [men neither upright nor right with God, laying it before them] instead of before the saints (the people of God)?'
  '10':
  - type: text
    content: ' Nor cheats (swindlers and thieves), nor greedy graspers, nor drunkards, nor foulmouthed revilers '
  - type: text
    content: and
  - type: text
    content: ' slanderers, nor extortioners '
  - type: text
    content: and
  - type: text
    content: ' robbers will inherit '
  - type: text
    content: or
  - type: text
    content: ' have any share in the kingdom of God.'
  '11':
  - type: text
    content: ' And such some of you were [once]. But you were washed clean (purified by a complete atonement for sin and made free from the guilt of sin), and you were consecrated (set apart, hallowed), and you were justified [pronounced righteous, by trusting] in the name of the Lord Jesus Christ and in the [Holy] Spirit of our God.'
  '12':
  - type: text
    content: ' Everything is permissible (allowable and lawful) for me; but not all things are helpful (good for me to do, expedient and profitable when considered with other things). Everything is lawful for me, but I will not become the slave of anything '
  - type: text
    content: or
  - type: text
    content: ' be brought under its power.'
  '13':
  - type: text
    content: ' Food [is intended] for the stomach and the stomach for food, but God will finally end [the functions of] both '
  - type: text
    content: and
  - type: text
    content: ' bring them to nothing. The body is not intended for sexual immorality, but [is intended] for the Lord, and the Lord [is intended] for the body [to save, sanctify, and raise it again].'
  '14':
  - type: text
    content: ' And God both raised the Lord to life and will also raise us up by His power.'
  '15':
  - type: text
    content: ' Do you not see '
  - type: text
    content: and
  - type: text
    content: ' know that your bodies are members (bodily parts) of Christ (the Messiah)? Am I therefore to take the parts of Christ and make [them] parts of a prostitute? Never! Never!'
  '16':
  - type: text
    content: ' Or do you not know '
  - type: text
    content: and
  - type: text
    content: ' realize that when a man joins himself to a prostitute, he becomes one body with her? The two, it is written, shall become one flesh. [Gen. 2:24.]'
  '17':
  - type: text
    content: ' But the person who is united to the Lord becomes one spirit with Him.'
  '18':
  - type: text
    content: ' Shun immorality '
  - type: text
    content: and
  - type: text
    content: ' all sexual looseness [flee from impurity in thought, word, or deed]. Any other sin which a man commits is one outside the body, but he who commits sexual immorality sins against his own body.'
  '19':
  - type: text
    content: ' Do you not know that your body is the temple (the very sanctuary) of the Holy Spirit Who lives within you, Whom you have received [as a Gift] from God? You are not your own,'
  '2':
  - type: text
    content: ' Do you not know that the saints (the believers) will [one day] judge '
  - type: text
    content: and
  - type: text
    content: ' govern the world? And if the world [itself] is to be judged '
  - type: text
    content: and
  - type: text
    content: ' ruled by you, are you unworthy '
  - type: text
    content: and
  - type: text
    content: ' incompetent to try [such petty matters] of the smallest courts of justice?'
  '20':
  - type: text
    content: ' You were bought with a price [purchased with a preciousness and paid for, made His own]. So then, honor God '
  - type: text
    content: and
  - type: text
    content: ' bring glory to Him in your body.'
  '3':
  - type: text
    content: ' Do you not know also that we [Christians] are to judge the [very] angels '
  - type: text
    content: and
  - type: text
    content: ' pronounce opinion between right and wrong [for them]? How much more then [as to] matters pertaining to this world '
  - type: text
    content: and
  - type: text
    content: ' of this life only!'
  '4':
  - type: text
    content: ' If then you do have such cases of everyday life to decide, why do you appoint [as judges to lay them before] those who [from the standpoint] of the church count for least '
  - type: text
    content: and
  - type: text
    content: ' are without standing?'
  '5':
  - type: text
    content: ' I say this to move you to shame. Can it be that there really is not one man among you who [in action is governed by piety and integrity and] is wise '
  - type: text
    content: and
  - type: text
    content: ' competent enough to decide [the private grievances, disputes, and quarrels] between members of the brotherhood,'
  '6':
  - type: text
    content: ' But brother goes to law against brother, and that before [Gentile judges who are] unbelievers [without faith or trust in the Gospel of Christ]?'
  '7':
  - type: text
    content: ' Why, the very fact of your having lawsuits with one another at all is a defect (a defeat, an evidence of positive moral loss for you). Why not rather let yourselves suffer wrong '
  - type: text
    content: and
  - type: text
    content: ' be deprived of what is your due? Why not rather be cheated (defrauded and robbed)?'
  '8':
  - type: text
    content: ' But [instead it is you] yourselves who wrong and defraud, and that even your own brethren [by so treating them]!'
  '9':
  - type: text
    content: ' Do you not know that the unrighteous '
  - type: text
    content: and
  - type: text
    content: ' the wrongdoers will not inherit '
  - type: text
    content: or
  - type: text
    content: ' have any share in the kingdom of God? Do not be deceived (misled): neither the impure '
  - type: text
    content: and
  - type: text
    content: ' immoral, nor idolaters, nor adulterers, nor those who participate in homosexuality,'
