document_id: 1TI.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE SAYING is true '
  - type: text
    content: and
  - type: text
    content: ' irrefutable: If any man [eagerly] seeks the office of bishop (superintendent, overseer), he desires an excellent task (work).'
  '10':
  - type: text
    content: ' And let them also be tried '
  - type: text
    content: and
  - type: text
    content: ' investigated '
  - type: text
    content: and
  - type: text
    content: ' proved first; then, if they turn out to be above reproach, let them serve [as deacons].'
  '11':
  - type: text
    content: ' [The] women likewise must be worthy of respect '
  - type: text
    content: and
  - type: text
    content: ' serious, not gossipers, but temperate '
  - type: text
    content: and
  - type: text
    content: ' self-controlled, [thoroughly] trustworthy in all things.'
  '12':
  - type: text
    content: ' Let deacons be the husbands of but one wife, and let them manage [their] children and their own households well.'
  '13':
  - type: text
    content: ' For those who perform well as deacons acquire a good standing for themselves and also gain much confidence '
  - type: text
    content: and
  - type: text
    content: ' freedom '
  - type: text
    content: and
  - type: text
    content: ' boldness in the faith which is [founded on and centers] in Christ Jesus.'
  '14':
  - type: text
    content: ' Although I hope to come to you before long, I am writing these instructions to you so that,'
  '15':
  - type: text
    content: ' If I am detained, you may know how people ought to conduct themselves in the household of God, which is the church of the living God, the pillar and stay (the prop and support) of the Truth.'
  '16':
  - type: text
    content: ' And great '
  - type: text
    content: and
  - type: text
    content: ' important '
  - type: text
    content: and
  - type: text
    content: ' weighty, we confess, is the hidden truth (the mystic secret) of godliness. He [God] was made visible in human flesh, justified '
  - type: text
    content: and
  - type: text
    content: ' vindicated in the [Holy] Spirit, was seen by angels, preached among the nations, believed on in the world, [and] taken up in glory.'
  '2':
  - type: text
    content: ' Now a bishop (superintendent, overseer) must give no grounds for accusation '
  - type: text
    content: but
  - type: text
    content: ' must be above reproach, the husband of one wife, circumspect '
  - type: text
    content: and
  - type: text
    content: ' temperate '
  - type: text
    content: and
  - type: text
    content: ' self-controlled; [he must be] sensible '
  - type: text
    content: and
  - type: text
    content: ' well behaved '
  - type: text
    content: and
  - type: text
    content: ' dignified and lead an orderly (disciplined) life; [he must be] hospitable [showing love for and being a friend to the believers, especially strangers or foreigners, and be] a capable '
  - type: text
    content: and
  - type: text
    content: ' qualified teacher,'
  '3':
  - type: text
    content: ' Not given to wine, not combative but gentle '
  - type: text
    content: and
  - type: text
    content: ' considerate, not quarrelsome '
  - type: text
    content: but
  - type: text
    content: ' forbearing '
  - type: text
    content: and
  - type: text
    content: ' peaceable, and not a lover of money [insatiable for wealth and ready to obtain it by questionable means].'
  '4':
  - type: text
    content: ' He must rule his own household well, keeping his children under control, with true dignity, commanding their respect in every way '
  - type: text
    content: and
  - type: text
    content: ' keeping them respectful.'
  '5':
  - type: text
    content: ' For if a man does not know how to rule his own household, how is he to take care of the church of God?'
  '6':
  - type: text
    content: ' He must not be a new convert, or he may [develop a beclouded and stupid state of mind] as the result of pride [be blinded by conceit, and] fall into the condemnation that the devil [once] did. [Isa. 14:12-14.]'
  '7':
  - type: text
    content: ' Furthermore, he must have a good reputation '
  - type: text
    content: and
  - type: text
    content: ' be well thought of by those outside [the church], lest he become involved in slander '
  - type: text
    content: and
  - type: text
    content: ' incur reproach and fall into the devil''s trap.'
  '8':
  - type: text
    content: ' In like manner the deacons [must be] worthy of respect, not shifty '
  - type: text
    content: and
  - type: text
    content: ' double-talkers '
  - type: text
    content: but
  - type: text
    content: ' sincere in what they say, not given to much wine, not greedy for base gain [craving wealth and resorting to ignoble and dishonest methods of getting it].'
  '9':
  - type: text
    content: ' They must possess the mystic secret of the faith [Christian truth as hidden from ungodly men] with a clear conscience.'
