document_id: 1TI.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THE SAYING is true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' irrefutable: If any man [eagerly] seeks the office of bishop (superintendent, overseer), he desires an excellent task (work).'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And let them also be tried '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' investigated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proved first; then, if they turn out to be above reproach, let them serve [as deacons].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' [The] women likewise must be worthy of respect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' serious, not gossipers, but temperate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-controlled, [thoroughly] trustworthy in all things.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Let deacons be the husbands of but one wife, and let them manage [their] children and their own households well.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' For those who perform well as deacons acquire a good standing for themselves and also gain much confidence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' freedom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' boldness in the faith which is [founded on and centers] in Christ Jesus.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Although I hope to come to you before long, I am writing these instructions to you so that,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' If I am detained, you may know how people ought to conduct themselves in the household of God, which is the church of the living God, the pillar and stay (the prop and support) of the Truth.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' important '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weighty, we confess, is the hidden truth (the mystic secret) of godliness. He [God] was made visible in human flesh, justified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindicated in the [Holy] Spirit, was seen by angels, preached among the nations, believed on in the world, [and] taken up in glory.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Now a bishop (superintendent, overseer) must give no grounds for accusation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' must be above reproach, the husband of one wife, circumspect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' temperate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-controlled; [he must be] sensible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' well behaved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dignified and lead an orderly (disciplined) life; [he must be] hospitable [showing love for and being a friend to the believers, especially strangers or foreigners, and be] a capable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' qualified teacher,'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Not given to wine, not combative but gentle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' considerate, not quarrelsome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' forbearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' peaceable, and not a lover of money [insatiable for wealth and ready to obtain it by questionable means].'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' He must rule his own household well, keeping his children under control, with true dignity, commanding their respect in every way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keeping them respectful.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For if a man does not know how to rule his own household, how is he to take care of the church of God?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' He must not be a new convert, or he may [develop a beclouded and stupid state of mind] as the result of pride [be blinded by conceit, and] fall into the condemnation that the devil [once] did. [Isa. 14:12-14.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Furthermore, he must have a good reputation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be well thought of by those outside [the church], lest he become involved in slander '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' incur reproach and fall into the devil''s trap.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' In like manner the deacons [must be] worthy of respect, not shifty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' double-talkers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' sincere in what they say, not given to much wine, not greedy for base gain [craving wealth and resorting to ignoble and dishonest methods of getting it].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' They must possess the mystic secret of the faith [Christian truth as hidden from ungodly men] with a clear conscience.'
