document_id: ACT.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT A certain man named Ananias with his wife Sapphira sold a piece of property,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And with his wife''s knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' connivance he kept back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrongfully appropriated some of the proceeds, bringing only a part and putting it at the feet of the apostles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But Peter said, Ananias, why has Satan filled your heart that you should lie to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attempt to deceive the Holy Spirit, and should [in violation of your promise] withdraw secretly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appropriate to your own use part of the price from the sale of the land?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' As long as it remained unsold, was it not still your own? And [even] after it was sold, was not [the money] at your disposal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' under your control? Why then, is it that you have proposed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purposed in your heart to do this thing? [How could you have the heart to do such a deed?] You have not [simply] lied to men [playing false and showing yourself utterly deceitful] but to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Upon hearing these words, Ananias fell down and died. And great dread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terror took possession of all who heard of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the young men arose and wrapped up [the body] and carried it out and buried it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Now after an interval of about three hours his wife came in, not having learned of what had happened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And Peter said to her, Tell me, did you sell the land for so much? Yes, she said, for so much.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Peter said to her, How could you two have agreed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conspired together to try to deceive the Spirit of the Lord? Listen! The feet of those who have buried your husband are at the door, and they will carry you out [also].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And instantly she fell down at his feet and died; and the young men entering found her dead, and they carried her out and buried her beside her husband.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And the whole church and all others who heard of these things were appalled [great awe and strange terror and dread seized them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now by the hands of the apostles (special messengers) numerous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' startling signs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wonders were being performed among the people. And by common consent they all met together [at the temple] in the covered porch (walk) called Solomon''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And none of those who were not of their number dared to join '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' associate with them, but the people held them in high regard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made much of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' More '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more there were being added to the Lord those who believed [those who acknowledged Jesus as their Savior and devoted themselves to Him joined and gathered with them], crowds both of men and of women,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So that they [even] kept carrying out the sick into the streets and placing them on couches and sleeping pads, [in the hope] that as Peter passed by, at least his shadow might fall on some of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the people gathered also from the towns '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hamlets around Jerusalem, bringing the sick and those troubled with foul spirits, and they were all cured.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But the high priest rose up and all who were his supporters, that is, the party of the Sadducees, and being filled with jealousy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rage,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' They seized and arrested the apostles (special messengers) and put them in the public jail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' But during the night an angel of the Lord opened the prison doors and, leading them out, said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Go, take your stand in the temple courts and declare to the people the whole doctrine concerning this Life (the eternal life which Christ revealed).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And when they heard this, they accordingly went into the temple about daybreak and began to teach. Now the high priest and his supporters who were with him arrived and called together the council (Sanhedrin), even all the senate of the sons of Israel, and they sent to the prison to have [the apostles] brought.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' But when the attendants arrived there, they failed to find them in the jail; so they came back and reported,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' We found the prison quite safely locked up and the guards were on duty outside the doors, but when we opened [it], we found no one on the inside.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Now when the military leader of the temple area and the chief priests heard these facts, they were much perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoroughly at a loss about them, wondering into what this might grow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But some man came and reported to them, saying, Listen! The men whom you put in jail are standing [right here] in the temple and teaching the people!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then the military leader went with the attendants and brought [the prisoners], but without violence, for they dreaded the people lest they be stoned by them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' So they brought them and set them before the council (Sanhedrin). And the high priest examined them by questioning,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Saying, We definitely commanded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strictly charged you not to teach in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' about this Name; yet here you have flooded Jerusalem with your doctrine and you intend to bring this Man''s blood upon us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Then Peter and the apostles replied, We must obey God rather than men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The God of our forefathers raised up Jesus, Whom you killed by hanging Him on a tree (cross). [Deut. 21:22, 23.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' God exalted Him to His right hand to be Prince '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Leader and Savior '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Deliverer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Preserver, in order to grant repentance to Israel and to bestow forgiveness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' release from sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And we are witnesses of these things, and the Holy Spirit is also, Whom God has bestowed on those who obey Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Now when they heard this, they were cut to the heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' infuriated and wanted to kill the disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' But a certain Pharisee in the council (Sanhedrin) named Gamaliel, a teacher of the Law, highly esteemed by all the people, standing up, ordered that the apostles be taken outside for a little while.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Then he addressed them [the council, saying]: Men of Israel, take care in regard to what you propose to do concerning these men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' For before our time there arose Theudas, asserting himself to be a person of importance, with whom a number of men allied themselves, about 400; but he was killed and all who had listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adhered to him were scattered and brought to nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And after this one rose up Judas the Galilean, [who led an uprising] during the time of the census, and drew away a popular following after him; he also perished and all his adherents were scattered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Now in the present case let me say to you, stand off (withdraw) from these men and let them alone. For if this doctrine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' purpose or undertaking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' movement is of human origin, it will fail (be overthrown and come to nothing);'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But if it is of God, you will not be able to stop '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' overthrow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' destroy them; you might even be found fighting against God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' So, convinced by him, they took his advice; and summoning the apostles, they flogged them and sternly forbade them to speak in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' about the name of Jesus, and allowed them to go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' So they went out from the presence of the council (Sanhedrin), rejoicing that they were being counted worthy [dignified by the indignity] to suffer shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be exposed to disgrace for [the sake of] His name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Yet [in spite of the threats] they never ceased for a single day, both in the temple area and at home, to teach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to proclaim the good news (Gospel) of Jesus [as] the Christ (the Messiah).'
