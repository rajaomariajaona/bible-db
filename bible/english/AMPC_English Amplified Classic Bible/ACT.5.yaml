  - type: text
    content: and
  - type: text
    content: ' adhered to him were scattered and brought to nothing.'
  '37':
  - type: text
    content: ' And after this one rose up Judas the Galilean, [who led an uprising] during the time of the census, and drew away a popular following after him; he also perished and all his adherents were scattered.'
  '38':
  - type: text
    content: ' Now in the present case let me say to you, stand off (withdraw) from these men and let them alone. For if this doctrine '
  - type: text
