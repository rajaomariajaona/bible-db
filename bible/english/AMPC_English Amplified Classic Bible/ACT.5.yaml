    content: ' And when they heard this, they accordingly went into the temple about daybreak and began to teach. Now the high priest and his supporters who were with him arrived and called together the council (Sanhedrin), even all the senate of the sons of Israel, and they sent to the prison to have [the apostles] brought.'
