document_id: JER.45,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD that Jeremiah the prophet spoke to Baruch son of Neriah, when he had written these words in a book at the dictation of Jeremiah, in the fourth year of Jehoiakim son of Josiah king of Judah, saying,'
  '2':
  - type: text
    content: ' Thus says the Lord, the God of Israel, unto you, O Baruch:'
  '3':
  - type: text
    content: ' You said, Woe is me now! For the Lord has added sorrow to my pain; I am weary with my groaning '
  - type: text
    content: and
  - type: text
    content: ' sighing and I find no rest.'
  '4':
  - type: text
    content: ' Say this to him: The Lord speaks thus: Behold, what I have built I will break down, and that which I have planted I will pluck up–and this means the whole land.'
  '5':
  - type: text
    content: ' And should you seek great things for yourself? Seek them not; for behold, I will bring evil upon all flesh, says the Lord, but your life I will give to you [as your only booty and] as a [snatched] prize of war wherever you go.'
