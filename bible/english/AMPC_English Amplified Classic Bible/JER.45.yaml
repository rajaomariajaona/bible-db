document_id: JER.45
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD that Jeremiah the prophet spoke to Baruch son of Neriah, when he had written these words in a book at the dictation of Jeremiah, in the fourth year of Jehoiakim son of Josiah king of Judah, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Thus says the Lord, the God of Israel, unto you, O Baruch:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' You said, Woe is me now! For the Lord has added sorrow to my pain; I am weary with my groaning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sighing and I find no rest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Say this to him: The Lord speaks thus: Behold, what I have built I will break down, and that which I have planted I will pluck up–and this means the whole land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And should you seek great things for yourself? Seek them not; for behold, I will bring evil upon all flesh, says the Lord, but your life I will give to you [as your only booty and] as a [snatched] prize of war wherever you go.'
