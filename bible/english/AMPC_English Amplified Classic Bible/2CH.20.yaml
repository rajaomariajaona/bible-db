document_id: 2CH.20,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' AFTER THIS, the Moabites, the Ammonites, and with them the Meunites came against Jehoshaphat to battle.'
  '10':
  - type: text
    content: ' And now behold, the men of Ammon, Moab, and Mount Seir, whom You would not let Israel invade when they came from the land of Egypt, and whom they turned from and did not destroy–[Deut. 2:9.]'
  '11':
  - type: text
    content: ' Behold, they reward us by coming to drive us out of Your possession which You have given us to inherit.'
  '12':
  - type: text
    content: ' O our God, will You not exercise judgment upon them? For we have no might to stand against this great company that is coming against us. We do not know what to do, but our eyes are upon You.'
  '13':
  - type: text
    content: ' And all Judah stood before the Lord, with their children and their wives.'
  '14':
  - type: text
    content: ' Then the Spirit of the Lord came upon Jahaziel son of Zechariah, the son of Benaiah, the son of Jeiel, the son of Mattaniah, a Levite of the sons of Asaph, in the midst of the assembly.'
  '15':
  - type: text
    content: ' He said, Hearken, all Judah, you inhabitants of Jerusalem, and you King Jehoshaphat. The Lord says this to you: Be not afraid or dismayed at this great multitude; for the battle is not yours, but God''s.'
  '16':
  - type: text
    content: ' Tomorrow go down to them. Behold, they will come up by the Ascent of Ziz, and you will find them at the end of the ravine before the Wilderness of Jeruel.'
  '17':
  - type: text
    content: ' You shall not need to fight in this battle; take your positions, stand still, and see the deliverance of the Lord [Who is] with you, O Judah and Jerusalem. Fear not nor be dismayed. Tomorrow go out against them, for the Lord is with you.'
  '18':
  - type: text
    content: ' And Jehoshaphat bowed his head with his face to the ground, and all Judah and the inhabitants of Jerusalem fell down before the Lord, worshiping Him.'
  '19':
  - type: text
    content: ' And some Levites of the Kohathites and Korahites stood up to praise the Lord, the God of Israel, with a very loud voice.'
  '2':
  - type: text
    content: ' It was told Jehoshaphat, A great multitude has come against you from beyond the [Dead] Sea, from Edom; and behold they are in Hazazon-tamar, which is En-gedi.'
  '20':
  - type: text
    content: ' And they rose early in the morning and went out into the Wilderness of Tekoa; and as they went out, Jehoshaphat stood and said, Hear me, O Judah, and you inhabitants of Jerusalem! Believe in the Lord your God and you shall be established; believe '
  - type: text
    content: and
  - type: text
    content: ' remain steadfast to His prophets and you shall prosper.'
  '21':
  - type: text
    content: ' When he had consulted with the people, he appointed singers to sing to the Lord and praise Him in their holy [priestly] garments as they went out before the army, saying, Give thanks to the Lord, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever!'
  '22':
  - type: text
    content: ' And when they began to sing and to praise, the Lord set ambushments against the men of Ammon, Moab, and Mount Seir who had come against Judah, and they were [self-] slaughtered;'
  '23':
  - type: text
    content: ' For [suspecting betrayal] the men of Ammon and Moab rose against those of Mount Seir, utterly destroying them. And when they had made an end of the men of Seir, they all helped to destroy one another.'
  '24':
  - type: text
    content: ' And when Judah came to the watchtower of the wilderness, they looked at the multitude, and behold, they were dead bodies fallen to the earth, and none had escaped!'
  '25':
  - type: text
    content: ' When Jehoshaphat and his people came to take the spoil, they found among them much cattle, goods, garments, and precious things which they took for themselves, more than they could carry away, so much they were three days in gathering the spoil.'
  '26':
  - type: text
    content: ' On the fourth day they assembled in the Valley of Beracah. There they blessed the Lord. So the name of the place is still called the Valley of Beracah [blessing].'
  '27':
  - type: text
    content: ' Then they returned, every man of Judah and Jerusalem, Jehoshaphat leading them, to Jerusalem with joy, for the Lord had made them to rejoice over their enemies.'
  '28':
  - type: text
    content: ' They came to Jerusalem with harps, lyres, and trumpets to the house of the Lord.'
  '29':
  - type: text
    content: ' And the fear of God came upon all the kingdoms of those countries when they heard that the Lord had fought against the enemies of Israel.'
  '3':
  - type: text
    content: ' Then Jehoshaphat feared, and set himself [determinedly, as his vital need] to seek the Lord; he proclaimed a fast in all Judah.'
  '30':
  - type: text
    content: ' So the realm of Jehoshaphat was quiet, for his God gave him rest round about.'
  '31':
  - type: text
    content: ' Thus Jehoshaphat reigned over Judah. He was thirty-five years old when he began his twenty-five-year reign in Jerusalem. His mother was Azubah daughter of Shilhi.'
  '32':
  - type: text
    content: ' And he walked in the ways of Asa his father and departed not from it, doing what was right in the sight of the Lord.'
  '33':
  - type: text
    content: ' But the high places [of idolatry] were not taken away, for the people had not yet set their hearts on their fathers'' God.'
  '34':
  - type: text
    content: ' Now the rest of the acts of Jehoshaphat, from first to last, they are written in the records of Jehu son of Hanani, which are in the Book of the Kings of Israel.'
  '35':
  - type: text
    content: ' After this, Jehoshaphat king of Judah joined with Ahaziah king of Israel, who did very wickedly.'
  '36':
  - type: text
    content: ' He joined him in building ships to go to Tarshish, building them in Ezion-geber.'
  '37':
  - type: text
    content: ' Then Eliezer son of Dodavahu of Mareshah prophesied against Jehoshaphat, saying, Because you have joined Ahaziah, the Lord will destroy your works. So the ships were wrecked and unable to go to Tarshish.'
  '4':
  - type: text
    content: ' And Judah gathered together to ask help from the Lord; even out of all the cities of Judah they came to seek the Lord [yearning for Him with all their desire].'
  '5':
  - type: text
    content: ' And Jehoshaphat stood in the assembly of Judah and Jerusalem in the house of the Lord before the new court'
  '6':
  - type: text
    content: ' And said, O Lord, God of our fathers, are You not God in heaven? And do You not rule over all the kingdoms of the nations? In Your hand are power and might, so that none is able to withstand You.'
  '7':
  - type: text
    content: ' Did not You, O our God, drive out the inhabitants of this land before Your people Israel and give it forever to the descendants of Abraham Your friend?'
  '8':
  - type: text
    content: ' They dwelt in it and have built You a sanctuary in it for Your Name, saying,'
  '9':
  - type: text
    content: ' If evil comes upon us, the sword of judgment, or pestilence, or famine, we will stand before this house and before You–for Your Name [and the symbol of Your presence] is in this house–and cry to You in our affliction, and You will hear and save.'
