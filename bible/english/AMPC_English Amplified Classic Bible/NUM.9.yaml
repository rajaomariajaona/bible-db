document_id: NUM.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses in the Wilderness of Sinai in the first month of the second year after they had come out of the land of Egypt,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Let the Israelites keep the Passover at its appointed time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' On the fourteenth day of this month in the evening, you shall keep it at its appointed time; according to all its statutes and ordinances you shall keep it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So Moses told the Israelites they should keep the Passover.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they kept the Passover on the fourteenth day of the first month in the evening in the Wilderness of Sinai; according to all that the Lord commanded Moses, so the Israelites did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And there were certain men who were defiled by touching the dead body of a man, so they could not keep the Passover on that day; and they came before Moses and Aaron on that day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Those men said to [Moses], We are defiled by touching the dead body. Why are we prevented from offering the Lord''s offering at its appointed time among the Israelites?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And Moses said to them, Stand still, and I will hear what the Lord will command concerning you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Say to the Israelites, If any man of you or of your posterity shall be unclean by reason of touching a dead body or is far off on a journey, still he shall keep the Passover to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' On the fourteenth day of the second month in the evening they shall keep it, and eat it with unleavened bread and bitter herbs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' They shall leave none of it until the morning nor break any bone of it; according to all the statutes for the Passover they shall keep it. [John 19:36.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But the man who is clean and is not on a journey, yet does not keep the Passover, that person shall be cut off from among his people because he did not bring the Lord''s offering at its appointed time; that man shall bear [the penalty of] his sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And if a stranger sojourns among you and will keep the Passover to the Lord, according to [its] statutes and its ordinances, so shall he do; you shall have one statute both for the temporary resident and for him who was born in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And on the day that the tabernacle was erected, the cloud [of God''s presence] covered the tabernacle, that is, the Tent of the Testimony; and at evening it was over the tabernacle, having the appearance of [a pillar of] fire until the morning. [Exod. 13:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' So it was constantly; the cloud covered it by day, and the appearance of fire by night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Whenever the cloud was taken up from over the Tent, after that the Israelites journeyed; and in the place where the cloud rested, there the Israelites encamped.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' At the Lord''s command the Israelites journeyed, and at [His] command they encamped. As long as the cloud rested upon the tabernacle they remained encamped.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Even when the cloud tarried upon the tabernacle many days, the Israelites kept the Lord''s charge and did not set out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And sometimes the cloud was only a few days upon the tabernacle, but according to the command of the Lord they remained encamped, and at His command they journeyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And sometimes the cloud remained [over the tabernacle] from evening only until morning, but when the cloud was taken up, they journeyed; whether it was taken up by day or by night, they journeyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Whether it was two days or a month or a longer time that the cloud tarried upon the tabernacle, dwelling on it, the Israelites remained encamped; but when it was taken up, they journeyed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' At the command of the Lord they remained encamped, and at [His] command they journeyed; they kept the charge of the Lord, at the command of the Lord through Moses.'
