document_id: 2CH.29,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' HEZEKIAH BEGAN to reign when he was twenty-five years old, and he reigned twenty-nine years in Jerusalem. His mother was Abijah daughter of Zechariah.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Now it is in my heart to make a covenant with the Lord, the God of Israel, that His fierce anger may turn away from us.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' My sons, do not now be negligent, for the Lord has chosen you to stand in His presence, to serve Him, to be His ministers, and to burn incense to Him.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Then the Levites arose: Mahath son of Amasai, Joel son of Azariah, of the sons of the Kohathites; of the sons of Merari: Kish son of Abdi, Azariah son of Jehallelel; of the Gershonites: Joah son of Zimmah and Eden son of Joah;'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Of the sons of Elizaphan: Shimri and Jeiel; of the sons of Asaph: Zechariah, and Mattaniah;'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Of the sons of Heman: Jehiel and Shimei; and of the sons of Jeduthun: Shemaiah and Uzziel.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' They gathered their brethren and sanctified themselves and went in, as the king had commanded by the words of the Lord, to cleanse the house of the Lord.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The priests went into the inner part of the house of the Lord to cleanse it, and brought out all the uncleanness they found in the temple of the Lord into the court of the Lord''s house. And the Levites carried it out to the brook Kidron.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' They began on the first day of the first month, and on the eighth day they came to the porch of the Lord. Then for eight days they sanctified the house of the Lord, and on the sixteenth day they finished.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Then they went to King Hezekiah and said, We have cleansed all the house of the Lord and the altar of burnt offering with all its utensils and the showbread table with all its utensils.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Moreover, all the utensils which King Ahaz in his reign cast away when he was transgressing [faithless] we have made ready and sanctified; and behold, they are before the altar of the Lord.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And he did right in the sight of the Lord, according to all that David his father [forefather] had done.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Then King Hezekiah rose early and gathered the officials of the city and went up to the house of the Lord.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' They brought seven each of bulls, rams, lambs, and he-goats for a sin offering for the kingdom, the sanctuary, and Judah. He commanded the priests, the sons of Aaron, to offer them on the Lord''s altar.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' So they killed the bulls, and the priests received the blood and dashed it against the altar. Likewise, when they had killed the rams and then the lambs, they dashed the blood against the altar.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Then the he-goats for the sin offering were brought before the king and the assembly, and they laid their hands on them.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' The priests killed them and made a sin offering with their blood upon the altar to make atonement for all Israel, for the king commanded that the burnt offering and sin offering be made for all Israel.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Hezekiah stationed the Levites in the Lord''s house with cymbals, harps, and lyres, as David [his forefather] and Gad the king''s seer and Nathan the prophet had commanded; for the commandment was from the Lord through His prophets.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' The Levites stood with the instruments of David, and the priests with the trumpets.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Hezekiah commanded to offer the burnt offering upon the altar. And when the burnt offering began, the song of the Lord began also with the trumpets and with the instruments ordained by King David of Israel.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And all the congregation worshiped, the singers sang, and the trumpeters sounded; all this continued until the burnt offering was finished.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' When they had stopped offering, the king and all present with him bowed themselves and worshiped.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' In the first year of his reign, in the first month, he opened the doors of the house of the Lord [which his father had closed] and repaired them.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Also King Hezekiah and the princes ordered the Levites to sing praises to the Lord with the words of David and of Asaph the seer. And they sang praises with gladness and bowed themselves and worshiped.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Then Hezekiah said, Now you have consecrated yourselves to the Lord; come near and bring sacrifices and thank offerings into the house of the Lord. And the assembly brought in sacrifices and thank offerings, and as many as were of a willing heart brought burnt offerings.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And the number of the burnt offerings which the assembly brought was 70 bulls, 100 rams, and 200 lambs. All these were for a burnt offering to the Lord.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And the consecrated things were 600 oxen and 3,000 sheep.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' But the priests were too few and could not skin all the burnt offerings. So until the other priests had sanctified themselves, their Levite kinsmen helped them until the work was done, for the Levites were more upright in heart than the priests in sanctifying themselves.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Also the burnt offerings were in abundance, with the fat of the peace offerings, and the drink offerings for every burnt offering. So the service of the Lord''s house was set in order.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Thus Hezekiah rejoiced, and all the people, because of what God had prepared for the people, for it was done suddenly.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' He brought together the priests and Levites in the square on the east'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And said to them, Levites, hear me! Now sanctify (purify and make free from sin) yourselves and the house of the Lord, the God of your fathers, and carry out the filth from the Holy Place.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' For our fathers have trespassed and have done what was evil in the sight of the Lord our God, and they have forsaken Him and have turned away their faces from the dwelling place of the Lord and have turned their backs.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Also they have closed the doors of the porch and put out the lamps, and they have not burned incense or offered burnt offerings in the place holy to the God of Israel. [II Kings 16:10-16.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Therefore the wrath of the Lord was upon Judah and Jerusalem, and He has delivered them to be a terror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a cause of trembling, to be an astonishment, and a hissing, as you see with your own eyes.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' For, behold, our fathers have fallen by the sword, and our sons, our daughters, and our wives are in captivity for this.'
