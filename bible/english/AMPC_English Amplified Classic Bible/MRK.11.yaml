document_id: MRK.11
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' WHEN THEY were getting near to Jerusalem, to Bethphage and Bethany at the Mount of Olives, He sent ahead two of His disciples'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And instructed them, Go into the village in front of you, and as soon as you enter it, you will find a colt tied, which has never been ridden by anyone; unfasten it and bring it [here].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' If anyone asks you, Why are you doing this? answer, The Lord needs it, and He will send it back here presently.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' So they went away and found a colt tied at the door out in the [winding] open street, and they loosed it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And some who were standing there said to them, What are you doing, untying the colt?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And they replied as Jesus had directed them, and they allowed them to go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And they brought the colt to Jesus and threw their outer garments upon it, and He sat on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And many [of the people] spread their garments on the road, and others [scattered a layer of] leafy branches which they had cut from the fields.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And those who went before and those who followed cried out [with a cry of happiness], Hosanna! [Be graciously inclined and propitious to Him!] Praised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed is He Who comes in the name of the Lord! [Ps. 118:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Praised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the name of the Lord
  - type: text
    text: ' is the coming kingdom of our father David! Hosanna (O save us) in the highest [heaven]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Jesus went into Jerusalem and entered the temple [enclosure]; and when He had looked around, surveying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' observing everything, as it was already late, He went out to Bethany together with the Twelve [apostles].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' On the day following, when they had come away from Bethany, He was hungry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And seeing in the distance a fig tree [covered] with leaves, He went to see if He could find any [fruit] on it [for in the fig tree the fruit appears at the same time as the leaves]. But when He came up to it, He found nothing but leaves, for the fig season had not yet come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And He said to it, No one ever again shall eat fruit from you. And His disciples were listening [to what He said].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And they came to Jerusalem. And He went into the temple [area, the porches and courts] and began to drive out those who sold and bought in the temple area, and He overturned the [four-footed] tables of the money changers and the seats of those who dealt in doves;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And He would not permit anyone to carry any household equipment through the temple enclosure [thus making the temple area a short-cut traffic lane].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And He taught and said to them, Is it not written, My house shall be called a house of prayer for all the nations? But you have turned it into a den of robbers. [Isa. 56:7; Jer. 7:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the chief priests and the scribes heard [of this] and kept seeking some way to destroy Him, for they feared Him, because the entire multitude was struck with astonishment at His teaching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And when evening came on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He and His disciples
  - type: text
    text: ', as accustomed, went out of the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' In the morning, when they were passing along, they noticed that the fig tree was withered [completely] away to its roots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And Peter remembered and said to Him, Master, look! The fig tree which You doomed has withered away!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Jesus, replying, said to them, Have faith in God [constantly].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Truly I tell you, whoever says to this mountain, Be lifted up and thrown into the sea! and does not doubt at all in his heart but believes that what he says will take place, it will be done for him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' For this reason I am telling you, whatever you ask for in prayer, believe (trust and be confident) that it is granted to you, and you will [get it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And whenever you stand praying, if you have anything against anyone, forgive him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' let it drop (leave it, let it go), in order that your Father Who is in heaven may also forgive you your [own] failings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shortcomings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' let them drop.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: But if you do not forgive, neither will your Father in heaven forgive your failings and shortcomings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And they came again to Jerusalem. And when Jesus was walking about in the [courts and porches of the] temple, the chief priests and the scribes and the elders came to Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And they kept saying to Him, By what [sort of] authority are You doing these things, or who gave You this authority to do them?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Jesus told them, I will ask you a question. Answer Me, and then I will tell you by what [sort of] authority I do these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Was the baptism of John from heaven or from men? Answer Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And they reasoned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' argued with one another, If we say, From heaven, He will say, Why then did you not believe him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' But [on the other hand] can we say, From men? For they were afraid of the people, because everybody considered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' held John actually to be a prophet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' So they replied to Jesus, We do not know. And Jesus said to them, Neither am I going to tell you what [sort of] authority I have for doing these things.'
