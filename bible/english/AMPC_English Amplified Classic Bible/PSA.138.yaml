document_id: PSA.138
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: +[A Psalm+] of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' I WILL confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise You [O God] with my whole heart; before the gods will I sing praises to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' I will worship toward Your holy temple and praise Your name for Your loving-kindness and for Your truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness; for You have exalted above all else Your name and Your word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' You have magnified Your word above all Your name!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' In the day when I called, You answered me; and You strengthened me with strength (might and inflexibility to temptation) in my inner self.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' All the kings of the land shall give You credit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise You, O Lord, for they have heard of the promises of Your mouth [which were fulfilled].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Yes, they shall sing of the ways of the Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' joyfully celebrate His mighty acts, for great is the glory of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For though the Lord is high, yet has He respect to the lowly [bringing them into fellowship with Him]; but the proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' haughty He knows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognizes [only] at a distance. [Prov. 3:34; James 4:6; I Pet. 5:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Though I walk in the midst of trouble, You will revive me; You will stretch forth Your hand against the wrath of my enemies, and Your right hand will save me. [Ps. 23:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' The Lord will perfect that which concerns me; Your mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness, O Lord, endure forever–forsake not the works of Your own hands. [Ps. 57:2; Phil. 1:6.]'
