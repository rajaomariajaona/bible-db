document_id: PSA.138,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] of David.
  - type: text
    content: ' I WILL confess '
  - type: text
    content: and
  - type: text
    content: ' praise You [O God] with my whole heart; before the gods will I sing praises to You.'
  '2':
  - type: text
    content: ' I will worship toward Your holy temple and praise Your name for Your loving-kindness and for Your truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness; for You have exalted above all else Your name and Your word '
  - type: text
    content: and
  - type: text
    content: ' You have magnified Your word above all Your name!'
  '3':
  - type: text
    content: ' In the day when I called, You answered me; and You strengthened me with strength (might and inflexibility to temptation) in my inner self.'
  '4':
  - type: text
    content: ' All the kings of the land shall give You credit '
  - type: text
    content: and
  - type: text
    content: ' praise You, O Lord, for they have heard of the promises of Your mouth [which were fulfilled].'
  '5':
  - type: text
    content: ' Yes, they shall sing of the ways of the Lord '
  - type: text
    content: and
  - type: text
    content: ' joyfully celebrate His mighty acts, for great is the glory of the Lord.'
  '6':
  - type: text
    content: ' For though the Lord is high, yet has He respect to the lowly [bringing them into fellowship with Him]; but the proud '
  - type: text
    content: and
  - type: text
    content: ' haughty He knows '
  - type: text
    content: and
  - type: text
    content: ' recognizes [only] at a distance. [Prov. 3:34; James 4:6; I Pet. 5:5.]'
  '7':
  - type: text
    content: ' Though I walk in the midst of trouble, You will revive me; You will stretch forth Your hand against the wrath of my enemies, and Your right hand will save me. [Ps. 23:3, 4.]'
  '8':
  - type: text
    content: ' The Lord will perfect that which concerns me; Your mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness, O Lord, endure forever–forsake not the works of Your own hands. [Ps. 57:2; Phil. 1:6.]'
