document_id: JOB.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' [JOB CONTINUED:] Behold, my eye has seen all this, my ear has heard and understood it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' What you know, I also know; I am not inferior to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Surely I wish to speak to the Almighty, and I desire to argue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reason my case with God [that He may explain the conflict between what I believe of Him and what I see of Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But you are forgers of lies [you defame my character most untruthfully]; you are all physicians of no value '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have no remedy to offer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Oh, that you would altogether hold your peace! Then you would evidence your wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' you might pass for wise men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Hear now my reasoning, and listen to the pleadings of my lips.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Will you speak unrighteously for God and talk deceitfully for Him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Will you show partiality to Him [be unjust to me in order to gain favor with Him]? Will you act as special pleaders for God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Would it be profitable for you if He should investigate your tactics [with me]? Or as one deceives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mocks a man, do you deceive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mock Him?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' He will surely reprove you if you do secretly show partiality.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Shall not His majesty make you afraid, and should not your awe for Him restrain you?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Your memorable sayings are proverbs of ashes [valueless]; your defenses are defenses of clay [and will crumble].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Hold your peace! Let me alone, so I may speak; and let come on me what may.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Why should I take my flesh in my teeth and put my life in my hands [incurring the danger of God''s wrath]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' [I do it because, though He slay me, yet will I wait for and trust Him and] behold, He will slay me; I have no hope–nevertheless, I will maintain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' argue my ways before Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' even to His face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' This will be my salvation, that a polluted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godless man shall not come before Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Listen diligently to my speech, and let my declaration be in your ears.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Behold now, I have prepared my case; I know that I shall be justified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vindicated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Who is he who will argue against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refute me? For then I would hold my peace and expire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Only [O Lord] grant two conditions to me, and then will I not hide myself from You:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Withdraw Your hand and take this bodily suffering far from me; and let not my [reverent] dread of You terrify me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Then [Lord] call and I will answer, or let me speak, and You answer me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' How many are my iniquities and sins [that so much sorrow should come to me]? Make me recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know my transgression and my sin. [Rom. 8:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Why do You hide Your face [as if offended] and alienate me as if I were Your enemy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Will You harass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' frighten a [poor, helpless] leaf driven to and fro, and will You pursue the chaff of the dry stubble?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' For You write bitter things against me [in Your bill of indictment] and make me inherit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be accountable now for the iniquities of my youth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' You put my feet also in the stocks and observe critically all my paths; You set a circle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' limit around the soles of my feet [which I must not overstep].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And he wastes away as a rotten thing, like a garment that is moth-eaten.'
