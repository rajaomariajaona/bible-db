document_id: JOB.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' [JOB CONTINUED:] Behold, my eye has seen all this, my ear has heard and understood it.'
  '10':
  - type: text
    content: ' He will surely reprove you if you do secretly show partiality.'
  '11':
  - type: text
    content: ' Shall not His majesty make you afraid, and should not your awe for Him restrain you?'
  '12':
  - type: text
    content: ' Your memorable sayings are proverbs of ashes [valueless]; your defenses are defenses of clay [and will crumble].'
  '13':
  - type: text
    content: ' Hold your peace! Let me alone, so I may speak; and let come on me what may.'
  '14':
  - type: text
    content: ' Why should I take my flesh in my teeth and put my life in my hands [incurring the danger of God''s wrath]?'
  '15':
  - type: text
    content: ' [I do it because, though He slay me, yet will I wait for and trust Him and] behold, He will slay me; I have no hope–nevertheless, I will maintain '
  - type: text
    content: and
  - type: text
    content: ' argue my ways before Him '
  - type: text
    content: and
  - type: text
    content: ' even to His face.'
  '16':
  - type: text
    content: ' This will be my salvation, that a polluted '
  - type: text
    content: and
  - type: text
    content: ' godless man shall not come before Him.'
  '17':
  - type: text
    content: ' Listen diligently to my speech, and let my declaration be in your ears.'
  '18':
  - type: text
    content: ' Behold now, I have prepared my case; I know that I shall be justified '
  - type: text
    content: and
  - type: text
    content: ' vindicated.'
  '19':
  - type: text
    content: ' Who is he who will argue against '
  - type: text
    content: and
  - type: text
    content: ' refute me? For then I would hold my peace and expire.'
  '2':
  - type: text
    content: ' What you know, I also know; I am not inferior to you.'
  '20':
  - type: text
    content: ' Only [O Lord] grant two conditions to me, and then will I not hide myself from You:'
  '21':
  - type: text
    content: ' Withdraw Your hand and take this bodily suffering far from me; and let not my [reverent] dread of You terrify me.'
  '22':
  - type: text
    content: ' Then [Lord] call and I will answer, or let me speak, and You answer me.'
  '23':
  - type: text
    content: ' How many are my iniquities and sins [that so much sorrow should come to me]? Make me recognize '
  - type: text
    content: and
  - type: text
    content: ' know my transgression and my sin. [Rom. 8:1.]'
  '24':
  - type: text
    content: ' Why do You hide Your face [as if offended] and alienate me as if I were Your enemy?'
  '25':
  - type: text
    content: ' Will You harass '
  - type: text
    content: and
  - type: text
    content: ' frighten a [poor, helpless] leaf driven to and fro, and will You pursue the chaff of the dry stubble?'
  '26':
  - type: text
    content: ' For You write bitter things against me [in Your bill of indictment] and make me inherit '
  - type: text
    content: and
  - type: text
    content: ' be accountable now for the iniquities of my youth.'
  '27':
  - type: text
    content: ' You put my feet also in the stocks and observe critically all my paths; You set a circle '
  - type: text
    content: and
  - type: text
    content: ' limit around the soles of my feet [which I must not overstep].'
  '28':
  - type: text
    content: ' And he wastes away as a rotten thing, like a garment that is moth-eaten.'
  '3':
  - type: text
    content: ' Surely I wish to speak to the Almighty, and I desire to argue '
  - type: text
    content: and
  - type: text
    content: ' reason my case with God [that He may explain the conflict between what I believe of Him and what I see of Him].'
  '4':
  - type: text
    content: ' But you are forgers of lies [you defame my character most untruthfully]; you are all physicians of no value '
  - type: text
    content: and
  - type: text
    content: ' have no remedy to offer.'
  '5':
  - type: text
    content: ' Oh, that you would altogether hold your peace! Then you would evidence your wisdom '
  - type: text
    content: and
  - type: text
    content: ' you might pass for wise men.'
  '6':
  - type: text
    content: ' Hear now my reasoning, and listen to the pleadings of my lips.'
  '7':
  - type: text
    content: ' Will you speak unrighteously for God and talk deceitfully for Him?'
  '8':
  - type: text
    content: ' Will you show partiality to Him [be unjust to me in order to gain favor with Him]? Will you act as special pleaders for God?'
  '9':
  - type: text
    content: ' Would it be profitable for you if He should investigate your tactics [with me]? Or as one deceives '
  - type: text
    content: and
  - type: text
    content: ' mocks a man, do you deceive '
  - type: text
    content: and
  - type: text
    content: ' mock Him?'
