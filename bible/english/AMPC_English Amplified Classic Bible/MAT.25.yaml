document_id: MAT.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN THE kingdom of heaven shall be likened to ten virgins who took their lamps and went to meet the bridegroom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Five of them were foolish (thoughtless, without forethought) and five were wise (sensible, intelligent, and prudent).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For when the foolish took their lamps, they did not take any [extra] oil with them;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But the wise took flasks of oil along with them [also] with their lamps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' While the bridegroom lingered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was slow in coming, they all began nodding their heads, and they fell asleep.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' But at midnight there was a shout, Behold, the bridegroom! Go out to meet him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then all those virgins got up and put their own lamps in order.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the foolish said to the wise, Give us some of your oil, for our lamps are going out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But the wise replied, There will not be enough for us and for you; go instead to the dealers and buy for yourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But while they were going away to buy, the bridegroom came, and those who were prepared went in with him to the marriage feast; and the door was shut.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Later the other virgins also came and said, Lord, Lord, open [the door] to us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' But He replied, I solemnly declare to you, I do not know you [I am not acquainted with you].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Watch therefore [give strict attention and be cautious and active], for you know neither the day nor the hour '
  - type: usfm
    marker: it
    children:
    - type: text
      text: when the Son of Man will come.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' For it is like a man who was about to take a long journey, and he called his servants together and entrusted them with his property.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' To one he gave five talents [probably about $5,000], to another two, to another one–to each in proportion to his own personal ability. Then he departed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' left the country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' He who had received the five talents went at once and traded with them, and he gained five talents more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And likewise he who had received the two talents–he also gained two talents more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But he who had received the one talent went and dug a hole in the ground and hid his master''s money.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Now after a long time the master of those servants returned and settled accounts with them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And he who had received the five talents came and brought him five more, saying, Master, you entrusted to me five talents; see, here I have gained five talents more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' His master said to him, Well done, you upright (honorable, admirable) and faithful servant! You have been faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy over a little; I will put you in charge of much. Enter into '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share the joy (the delight, the blessedness) which your master enjoys.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And he also who had the two talents came forward, saying, Master, you entrusted two talents to me; here I have gained two talents more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' His master said to him, Well done, you upright (honorable, admirable) and faithful servant! You have been faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy over a little; I will put you in charge of much. Enter into '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' share the joy (the delight, the blessedness) which your master enjoys.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' He who had received one talent also came forward, saying, Master, I knew you to be a harsh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hard man, reaping where you did not sow, and gathering where you had not winnowed [the grain].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' So I was afraid, and I went and hid your talent in the ground. Here you have what is your own.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' But his master answered him, You wicked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lazy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' idle servant! Did you indeed know that I reap where I have not sowed and gather [grain] where I have not winnowed?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Then you should have invested my money with the bankers, and at my coming I would have received what was my own with interest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So take the talent away from him and give it to the one who has the ten talents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' For to everyone who has will more be given, and he will be furnished richly so that he will have an abundance; but from the one who does not have, even what he does have will be taken away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' And throw the good-for-nothing servant into the outer darkness; there will be weeping and grinding of teeth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' When the Son of Man comes in His glory (His majesty and splendor), and all the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: holy
  - type: text
    text: ' angels with Him, then He will sit on the throne of His glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' All nations will be gathered before Him, and He will separate them [the people] from one another as a shepherd separates his sheep from the goats; [Ezek. 34:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And He will cause the sheep to stand at His right hand, but the goats at His left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Then the King will say to those at His right hand, Come, you blessed of My Father [you favored of God and appointed to eternal salvation], inherit (receive as your own) the kingdom prepared for you from the foundation of the world.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' For I was hungry and you gave Me food, I was thirsty and you gave Me something to drink, I was a stranger and you brought Me together with yourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entertained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lodged Me,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' I was naked and you clothed Me, I was sick and you visited Me with help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ministering care, I was in prison and you came to see Me. [Isa. 58:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Then the just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upright will answer Him, Lord, when did we see You hungry and gave You food, or thirsty and gave You something to drink?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' And when did we see You a stranger and welcomed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entertained You, or naked and clothed You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' And when did we see You sick or in prison and came to visit You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And the King will reply to them, Truly I tell you, in so far as you did it for one of the least [in the estimation of men] of these My brethren, you did it for Me. [Prov. 19:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' Then He will say to those at His left hand, Begone from Me, you cursed, into the eternal fire prepared for the devil and his angels!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' For I was hungry and you gave Me no food, I was thirsty and you gave Me nothing to drink,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' I was a stranger and you did not welcome Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entertain Me, I was naked and you did not clothe Me, I was sick and in prison and you did not visit Me with help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ministering care.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' Then they also [in their turn] will answer, Lord, when did we see You hungry or thirsty or a stranger or naked or sick or in prison, and did not minister to You?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' And He will reply to them, Solemnly I declare to you, in so far as you failed to do it for the least [in the estimation of men] of these, you failed to do it for Me. [Prov. 14:31; 17:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' Then they will go away into eternal punishment, but those who are just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in right standing with God into eternal life. [Dan. 12:2.]'
