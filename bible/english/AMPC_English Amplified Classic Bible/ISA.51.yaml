document_id: ISA.51
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HEARKEN TO Me, you who follow after rightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice, you who seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inquire of [and require] the Lord [claiming Him by necessity and by right]: look to the rock from which you were hewn and to the hole in the quarry from which you were dug;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Look to Abraham your father and to Sarah who bore you; for I called him when he was but one, and I blessed him and made him many.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For the Lord will comfort Zion; He will comfort all her waste places. And He will make her wilderness like Eden, and her desert like the garden of the Lord. Joy and gladness will be found in her, thanksgiving and the voice of song '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' instrument of praise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Listen to Me [the Lord], O My people, and give ear to Me, O My nation; for a [divine] law will go forth from Me, and I will establish My justice for a light to the peoples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' My rightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice are near, My salvation is going forth, and My arms shall rule the peoples; the islands shall wait for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expect Me, and on My arm shall they trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wait with hope.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Lift up your eyes to the heavens, and look upon the earth beneath; for the heavens shall be dissolved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vanish away like smoke, and the earth shall wax old like a garment, and they that dwell therein shall die in like manner [like gnats]. But My salvation shall be forever, and My rightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice [and faithfully fulfilled promise] shall not be abolished. [Matt. 24:35; Heb. 1:11; II Pet. 3:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Listen to Me, you who know rightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right standing with God, the people in whose heart is My law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' My instruction: fear not the reproach of men, neither be afraid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' dismayed at their revilings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For [in comparison with the Lord they are so weak that things as insignificant as] the moth shall eat them up like a garment, and the worm shall eat them like wool. But My rightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice [and faithfully fulfilled promise] shall be forever, and My salvation to all generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' [Zion now cries to the Lord, the God of Israel] Awake, awake, put on strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' might, O arm of the Lord; awake, as in the ancient days, as in the generations of long ago. Was it not You Who cut Rahab [Egypt] in pieces, Who pierced the dragon [symbol of Egypt]? [Isa. 30:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Was it not You Who dried up the Red Sea, the waters of the great deep, Who made the depths of the sea a way for the redeemed to pass over? [Why then are we left so long in captivity?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' [The Lord God says] And the redeemed of the Lord shall return and come with singing to Zion; everlasting joy shall be upon their heads. They shall obtain joy and gladness, and sorrow and sighing shall flee away. [Rev. 7:17; 21:1, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I, even I, am He Who comforts you. Who are you, that you should be afraid of man, who shall die, and of a son of man, who shall be made [as destructible] as grass,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' That you should forget the Lord your Maker, Who stretched forth the heavens and laid the foundations of the earth, and fear continually every day because of the fury of the oppressor, when he makes ready to destroy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' even though he did so? And where is the fury of the oppressor?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The captive exile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' he who is bent down by chains shall speedily be released; and he shall not die and go down to the pit of destruction, nor shall his food fail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For I am the Lord your God, Who stirs up the sea so that its waves roar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Who by rebuke restrains it–the Lord of hosts is His name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And I have put My words in your mouth and have covered you with the shadow of My hand, that I may fix the [new] heavens as a tabernacle and lay the foundations of a [new] earth and say to Zion, You are My people. [Isa. 65:17; 66:22; Rev. 21:1.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Arouse yourself, awake! Stand up, O Jerusalem, you who have drunk at the hand of the Lord the cup of His wrath, you who have drunk the cup of staggering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intoxication to the dregs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' There is none to guide her among all the sons she has borne; neither is there anyone to take her by the hand among all the sons whom she has brought up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Two kinds of calamities have befallen you–but who feels sorry for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commiserates you?–they are desolation and destruction [on the land and city], and famine and sword [on the inhabitants]–how shall I comfort you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' by whom?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Your sons have fainted; they lie [like corpses] at the head of all the streets, like an antelope in a net; they are full [from drinking] of the wrath of the Lord, the rebuke of your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Therefore, now hear this, you who are afflicted, and [who are] drunk, but not with wine [but thrown down by the wrath of God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Thus says your Lord, the Lord, and your God, Who pleads the cause of His people: Behold, I have taken from your hand the cup of staggering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intoxication; the cup of My wrath you shall drink no more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And I will put it into the hands of your tormentors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressors, those who said to you, Bow down, that we may ride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' tread over you; and you have made your back like the ground and like the street for them to pass over.'
