document_id: EXO.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Sanctify (consecrate, set apart) to Me all the firstborn [males]; whatever is first to open the womb among the Israelites, both of man and of beast, is Mine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Moses said to the people, [Earnestly] remember this day in which you came out from Egypt, out of the house of bondage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bondmen, for by strength of hand the Lord brought you out from this place; no leavened bread shall be eaten.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' This day you go forth in the month Abib.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And when the Lord brings you into the land of the Canaanites, Hittites, Amorites, Hivites, and Jebusites, which He promised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swore to your fathers to give you, a land flowing with milk and honey [a land of plenty], you shall keep this service in this month.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Seven days you shall eat unleavened bread and the seventh day shall be a feast to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Unleavened bread shall be eaten for seven days; no leavened bread shall be seen with you, neither shall there be leaven in all your territory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You shall explain to your son on that day, This is done because of what the Lord did for me when I came out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' It shall be as a sign to you upon your hand and as a memorial between your eyes, that the law of the Lord may be in your mouth; for with a strong hand the Lord has brought you out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You shall therefore keep this ordinance at this time from year to year.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And when the Lord brings you into the land of the Canaanites, as He promised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swore to you and your fathers, and shall give it to you,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' You shall set apart to the Lord all that first opens the womb. All the firstlings of your livestock that are males shall be the Lord''s.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Every firstborn of a donkey you shall redeem by [substituting for it] a lamb, or if you will not redeem it, then you shall break its neck; and every firstborn among your sons shall you redeem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And when, in time to come, your son asks you, What does this mean? You shall say to him, By strength of hand the Lord brought us out from Egypt, from the house of bondage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bondmen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For when Pharaoh stubbornly refused to let us go, the Lord slew all the firstborn in the land of Egypt, both the firstborn of man and of livestock. Therefore I sacrifice to the Lord all the males that first open the womb; but all the firstborn of my sons I redeem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And it shall be as a reminder upon your hand or as frontlets between your eyes, for by a strong hand the Lord brought us out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' When Pharaoh let the people go, God led them not by way of the land of the Philistines, although that was nearer; for God said, Lest the people change their purpose when they see war and return to Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But God led the people around by way of the wilderness toward the Red Sea. And the Israelites went up marshaled [in ranks] out of the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And Moses took the bones of Joseph with him, for [Joseph] had strictly sworn the Israelites, saying, Surely God will be with you, and you must carry my bones away from here with you. [Gen. 50:25.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' They journeyed from Succoth and encamped at Etham on the edge of the wilderness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The Lord went before them by day in a pillar of cloud to lead them along the way and by night in a pillar of fire to give them light, that they might travel by day and by night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The pillar of cloud by day and the pillar of fire by night did not depart from before the people.'
