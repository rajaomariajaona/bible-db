document_id: JOB.26,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' BUT JOB answered,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' He has placed an enclosing limit [the horizon] upon the waters at the boundary between light and darkness.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' The pillars of the heavens tremble and are astonished at His rebuke.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' He stills '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' stirs up the sea by His power, and by His understanding He smites proud Rahab.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' By His breath the heavens are garnished; His hand pierced the [swiftly] fleeing serpent. [Ps. 33:6.]'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Yet these are but [a small part of His doings] the outskirts of His ways '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' the mere fringes of His force, the faintest whisper of His voice! Who dares contemplate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' who can understand the thunders of His full, magnificent power?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' How you have helped him who is without power! How you have sustained the arm that is without strength!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' How you have counseled him who has no wisdom! And how plentifully you have declared to him sound knowledge!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' With whose assistance have you uttered these words? And whose spirit [inspired what] came forth from you?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' The shades of the dead tremble underneath the waters and their inhabitants.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Sheol (the place of the dead) is naked before God, and Abaddon (the place of destruction) has no covering [from His eyes].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' He it is Who spreads out the northern skies over emptiness and hangs the earth upon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' over nothing.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' He holds the waters bound in His clouds [which otherwise would spill on earth all at once], and the cloud is not rent under them.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' He covers the face of His throne and spreads over it His cloud.'
