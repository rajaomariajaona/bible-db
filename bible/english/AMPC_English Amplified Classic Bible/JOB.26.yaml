document_id: JOB.26,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BUT JOB answered,'
  '10':
  - type: text
    content: ' He has placed an enclosing limit [the horizon] upon the waters at the boundary between light and darkness.'
  '11':
  - type: text
    content: ' The pillars of the heavens tremble and are astonished at His rebuke.'
  '12':
  - type: text
    content: ' He stills '
  - type: text
    content: or
  - type: text
    content: ' stirs up the sea by His power, and by His understanding He smites proud Rahab.'
  '13':
  - type: text
    content: ' By His breath the heavens are garnished; His hand pierced the [swiftly] fleeing serpent. [Ps. 33:6.]'
  '14':
  - type: text
    content: ' Yet these are but [a small part of His doings] the outskirts of His ways '
  - type: text
    content: or
  - type: text
    content: ' the mere fringes of His force, the faintest whisper of His voice! Who dares contemplate '
  - type: text
    content: or
  - type: text
    content: ' who can understand the thunders of His full, magnificent power?'
  '2':
  - type: text
    content: ' How you have helped him who is without power! How you have sustained the arm that is without strength!'
  '3':
  - type: text
    content: ' How you have counseled him who has no wisdom! And how plentifully you have declared to him sound knowledge!'
  '4':
  - type: text
    content: ' With whose assistance have you uttered these words? And whose spirit [inspired what] came forth from you?'
  '5':
  - type: text
    content: ' The shades of the dead tremble underneath the waters and their inhabitants.'
  '6':
  - type: text
    content: ' Sheol (the place of the dead) is naked before God, and Abaddon (the place of destruction) has no covering [from His eyes].'
  '7':
  - type: text
    content: ' He it is Who spreads out the northern skies over emptiness and hangs the earth upon '
  - type: text
    content: or
  - type: text
    content: ' over nothing.'
  '8':
  - type: text
    content: ' He holds the waters bound in His clouds [which otherwise would spill on earth all at once], and the cloud is not rent under them.'
  '9':
  - type: text
    content: ' He covers the face of His throne and spreads over it His cloud.'
