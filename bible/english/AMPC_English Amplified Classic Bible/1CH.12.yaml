document_id: 1CH.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' THESE ARE the ones who came to David at Ziklag, while he yet concealed himself because of Saul son of Kish; they were among the mighty men, his helpers in war.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Mishmannah the fourth, Jeremiah the fifth,'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Attai the sixth, Eliel the seventh,'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Johanan the eighth, Elzabad the ninth,'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Jeremiah the tenth, Machbannai the eleventh.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' These Gadites were officers of the army. The lesser was equal to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' over a hundred, and the greater equal to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' over a thousand.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' These are the men who went over the Jordan in the first month when it had overflowed all its banks, and put to flight all those in the valleys, east and west.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' There came some of the men of Benjamin and Judah to the stronghold to David.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' David went out to meet them and said to them, If you have come peaceably to me to help me, my heart shall be knit to you; but if you have come to betray me to my adversaries, although there is no violence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' wrong in my hands, may the God of our fathers look upon and rebuke you.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Then the Spirit came upon Amasai, who was chief of the captains, and he said, Yours we are, David, and on your side, you son of Jesse! Peace, peace be to you, and peace be to your helpers, for your God helps you. Then David received them and made them officers of his troops.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Some of the men of Manasseh deserted to David when he came with the Philistines for the battle against Saul. But [David''s] men did not actually fight with them, for the lords of the Philistines, upon advisement, sent him away, saying, He will desert to his master Saul at the risk of our heads. [I Sam. 29:2-9.]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' They were bowmen and could use the right hand or the left to sling stones or shoot arrows from the bow; they were of Saul''s kinsmen of Benjamin.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' As David went to Ziklag, there deserted to him of Manasseh: Adnah, Jozabad, Jediael, Michael, Jozabad, Elihu, and Zillethai, chiefs of thousands in Manasseh.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' They helped David against the band of raiders, for they were all mighty men of courage, and [all seven] became commanders in [his] army.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' For at that time day by day men kept coming to David to help him, until there was a great army, like the army of God.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' These are the numbers of the armed divisions who came to David at Hebron to turn the kingdom of Saul to him, according to the word of the Lord:'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Those of Judah, who bore shield and spear, were 6,800 armed for war;'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Those of Simeon, mighty and brave warriors, 7,100;'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Those of Levi, 4,600–'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Jehoiada was the leader of the Aaronite [priests], and with him were 3,700,'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And Zadok, a young man mighty in valor, and twenty-two captains from his own father''s house;'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Of the Benjamites, the kindred of [King] Saul, 3,000–hitherto the majority of them had kept their allegiance [to Saul] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the charge of the house of Saul;'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The chief was Ahiezer and then Joash the sons of Shemaah of Gibeah; Jeziel and Pelet the sons of Azmaveth; Beracah, and Jehu of Anathoth,'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Of the Ephraimites, 20,800, mighty in valor, famous in their fathers'' houses;'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' Of the half-tribe of Manasseh, 18,000, who were mentioned by name to come and make David king;'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And of Issachar, men who had understanding of the times to know what Israel ought to do, 200 chiefs; and all their kinsmen were under their command;'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' Of Zebulun, 50,000 experienced troops, fitted out with all kinds of weapons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruments of war that could order and set the battle in array, men not of double purpose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' stable and trustworthy.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' Of Naphtali, 1,000 captains, and with them 37,000 [of the rank and file armed] with shield and spear;'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' Of Dan, 28,600, men who could set the battle in array;'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' Of Asher, men able to go forth to battle, fit for active service, 40,000;'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' On the other [the east] side of the Jordan River, of Reuben and Gad and the half-tribe of Manasseh, 120,000 men, armed with all the weapons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruments of war.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' All these, being men of war arrayed in battle order, came with a perfect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sincere heart to Hebron to make David king over all Israel; and all the rest also of Israel were of one mind to make David king.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' And they were there with David for three days, eating and drinking, for their brethren had prepared for them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Ishmaiah of Gibeon, a mighty man among the Thirty and a [leader] over them; Jeremiah, Jahaziel, Johanan, Jozabad of Gederah,'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' Also those who were near them from as far as Issachar, Zebulun, and Naphtali brought food on donkeys, camels, mules, and oxen, abundant supplies of meal, cakes of figs, bunches of raisins, wine, oil, oxen, and sheep, for there was joy in Israel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' Eluzai, Jerimoth, Bealiah, Shemariah, Shephatiah the Haruphite;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Elkanah, Isshiah, Azarel, Joezer, and Jashobeam, the Korahites;'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Joelah and Zebadiah the sons of Jeroham of Gedor.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Of the Gadites there went over to David to the stronghold in the wilderness men of might, men trained for war who could handle shield and spear, whose faces were like the faces of lions, and who were swift as gazelles on the mountains:'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Ezer the chief, Obadiah the second, Eliab the third,'
