document_id: 1CH.12,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THESE ARE the ones who came to David at Ziklag, while he yet concealed himself because of Saul son of Kish; they were among the mighty men, his helpers in war.'
  '10':
  - type: text
    content: ' Mishmannah the fourth, Jeremiah the fifth,'
  '11':
  - type: text
    content: ' Attai the sixth, Eliel the seventh,'
  '12':
  - type: text
    content: ' Johanan the eighth, Elzabad the ninth,'
  '13':
  - type: text
    content: ' Jeremiah the tenth, Machbannai the eleventh.'
  '14':
  - type: text
    content: ' These Gadites were officers of the army. The lesser was equal to '
  - type: text
    content: and
  - type: text
    content: ' over a hundred, and the greater equal to '
  - type: text
    content: and
  - type: text
    content: ' over a thousand.'
  '15':
  - type: text
    content: ' These are the men who went over the Jordan in the first month when it had overflowed all its banks, and put to flight all those in the valleys, east and west.'
  '16':
  - type: text
    content: ' There came some of the men of Benjamin and Judah to the stronghold to David.'
  '17':
  - type: text
    content: ' David went out to meet them and said to them, If you have come peaceably to me to help me, my heart shall be knit to you; but if you have come to betray me to my adversaries, although there is no violence '
  - type: text
    content: or
  - type: text
    content: ' wrong in my hands, may the God of our fathers look upon and rebuke you.'
  '18':
  - type: text
    content: ' Then the Spirit came upon Amasai, who was chief of the captains, and he said, Yours we are, David, and on your side, you son of Jesse! Peace, peace be to you, and peace be to your helpers, for your God helps you. Then David received them and made them officers of his troops.'
  '19':
  - type: text
    content: ' Some of the men of Manasseh deserted to David when he came with the Philistines for the battle against Saul. But [David''s] men did not actually fight with them, for the lords of the Philistines, upon advisement, sent him away, saying, He will desert to his master Saul at the risk of our heads. [I Sam. 29:2-9.]'
  '2':
  - type: text
    content: ' They were bowmen and could use the right hand or the left to sling stones or shoot arrows from the bow; they were of Saul''s kinsmen of Benjamin.'
  '20':
  - type: text
    content: ' As David went to Ziklag, there deserted to him of Manasseh: Adnah, Jozabad, Jediael, Michael, Jozabad, Elihu, and Zillethai, chiefs of thousands in Manasseh.'
  '21':
  - type: text
    content: ' They helped David against the band of raiders, for they were all mighty men of courage, and [all seven] became commanders in [his] army.'
  '22':
  - type: text
    content: ' For at that time day by day men kept coming to David to help him, until there was a great army, like the army of God.'
  '23':
  - type: text
    content: ' These are the numbers of the armed divisions who came to David at Hebron to turn the kingdom of Saul to him, according to the word of the Lord:'
  '24':
  - type: text
    content: ' Those of Judah, who bore shield and spear, were 6,800 armed for war;'
  '25':
  - type: text
    content: ' Those of Simeon, mighty and brave warriors, 7,100;'
  '26':
  - type: text
    content: ' Those of Levi, 4,600–'
  '27':
  - type: text
    content: ' Jehoiada was the leader of the Aaronite [priests], and with him were 3,700,'
  '28':
  - type: text
    content: ' And Zadok, a young man mighty in valor, and twenty-two captains from his own father''s house;'
  '29':
  - type: text
    content: ' Of the Benjamites, the kindred of [King] Saul, 3,000–hitherto the majority of them had kept their allegiance [to Saul] '
  - type: text
    content: and
  - type: text
    content: ' the charge of the house of Saul;'
  '3':
  - type: text
    content: ' The chief was Ahiezer and then Joash the sons of Shemaah of Gibeah; Jeziel and Pelet the sons of Azmaveth; Beracah, and Jehu of Anathoth,'
  '30':
  - type: text
    content: ' Of the Ephraimites, 20,800, mighty in valor, famous in their fathers'' houses;'
  '31':
  - type: text
    content: ' Of the half-tribe of Manasseh, 18,000, who were mentioned by name to come and make David king;'
  '32':
  - type: text
    content: ' And of Issachar, men who had understanding of the times to know what Israel ought to do, 200 chiefs; and all their kinsmen were under their command;'
  '33':
  - type: text
    content: ' Of Zebulun, 50,000 experienced troops, fitted out with all kinds of weapons '
  - type: text
    content: and
  - type: text
    content: ' instruments of war that could order and set the battle in array, men not of double purpose '
  - type: text
    content: but
  - type: text
    content: ' stable and trustworthy.'
  '34':
  - type: text
    content: ' Of Naphtali, 1,000 captains, and with them 37,000 [of the rank and file armed] with shield and spear;'
  '35':
  - type: text
    content: ' Of Dan, 28,600, men who could set the battle in array;'
  '36':
  - type: text
    content: ' Of Asher, men able to go forth to battle, fit for active service, 40,000;'
  '37':
  - type: text
    content: ' On the other [the east] side of the Jordan River, of Reuben and Gad and the half-tribe of Manasseh, 120,000 men, armed with all the weapons '
  - type: text
    content: and
  - type: text
    content: ' instruments of war.'
  '38':
  - type: text
    content: ' All these, being men of war arrayed in battle order, came with a perfect '
  - type: text
    content: and
  - type: text
    content: ' sincere heart to Hebron to make David king over all Israel; and all the rest also of Israel were of one mind to make David king.'
  '39':
  - type: text
    content: ' And they were there with David for three days, eating and drinking, for their brethren had prepared for them.'
  '4':
  - type: text
    content: ' Ishmaiah of Gibeon, a mighty man among the Thirty and a [leader] over them; Jeremiah, Jahaziel, Johanan, Jozabad of Gederah,'
  '40':
  - type: text
    content: ' Also those who were near them from as far as Issachar, Zebulun, and Naphtali brought food on donkeys, camels, mules, and oxen, abundant supplies of meal, cakes of figs, bunches of raisins, wine, oil, oxen, and sheep, for there was joy in Israel.'
  '5':
  - type: text
    content: ' Eluzai, Jerimoth, Bealiah, Shemariah, Shephatiah the Haruphite;'
  '6':
  - type: text
    content: ' Elkanah, Isshiah, Azarel, Joezer, and Jashobeam, the Korahites;'
  '7':
  - type: text
    content: ' Joelah and Zebadiah the sons of Jeroham of Gedor.'
  '8':
  - type: text
    content: ' Of the Gadites there went over to David to the stronghold in the wilderness men of might, men trained for war who could handle shield and spear, whose faces were like the faces of lions, and who were swift as gazelles on the mountains:'
  '9':
  - type: text
    content: ' Ezer the chief, Obadiah the second, Eliab the third,'
