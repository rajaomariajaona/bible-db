document_id: PSA.51
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David; when Nathan the prophet came to him after he had sinned with Bathsheba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HAVE MERCY upon me, O God, according to Your steadfast love; according to the multitude of Your tender mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loving-kindness blot out my transgressions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Wash me thoroughly [and repeatedly] from my iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt and cleanse me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make me wholly pure from my sin!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For I am conscious of my transgressions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I acknowledge them; my sin is ever before me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Against You, You only, have I sinned and done that which is evil in Your sight, so that You are justified in Your sentence and faultless in Your judgment. [Rom. 3:4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Behold, I was brought forth in [a state of] iniquity; my mother was sinful who conceived me [and I too am sinful]. [John 3:6; Rom. 5:12; Eph. 2:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Behold, You desire truth in the inner being; make me therefore to know wisdom in my inmost heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Purify me with hyssop, and I shall be clean [ceremonially]; wash me, and I shall [in reality] be whiter than snow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Make me to hear joy and gladness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be satisfied; let the bones which You have broken rejoice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Hide Your face from my sins and blot out all my guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' iniquities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Create in me a clean heart, O God, and renew a right, persevering, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast spirit within me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Cast me not away from Your presence and take not Your Holy Spirit from me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Restore to me the joy of Your salvation and uphold me with a willing spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then will I teach transgressors Your ways, and sinners shall be converted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return to You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Deliver me from bloodguiltiness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' death, O God, the God of my salvation, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my tongue shall sing aloud of Your righteousness (Your rightness and Your justice).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' O Lord, open my lips, and my mouth shall show forth Your praise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' For You delight not in sacrifice, or else would I give it; You find no pleasure in burnt offering. [I Sam. 15:22.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' My sacrifice [the sacrifice acceptable] to God is a broken spirit; a broken and a contrite heart [broken down with sorrow for sin and humbly and thoroughly penitent], such, O God, You will not despise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Do good in Your good pleasure to Zion; rebuild the walls of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Then will You delight in the sacrifices of righteousness, justice, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right, with burnt offering and whole burnt offering; then bullocks will be offered upon Your altar.'
