document_id: PSA.51,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician. A Psalm of David; when Nathan the prophet came to him after he had sinned with Bathsheba.
  - type: text
    content: ' HAVE MERCY upon me, O God, according to Your steadfast love; according to the multitude of Your tender mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness blot out my transgressions.'
  '10':
  - type: text
    content: ' Create in me a clean heart, O God, and renew a right, persevering, '
  - type: text
    content: and
  - type: text
    content: ' steadfast spirit within me.'
  '11':
  - type: text
    content: ' Cast me not away from Your presence and take not Your Holy Spirit from me.'
  '12':
  - type: text
    content: ' Restore to me the joy of Your salvation and uphold me with a willing spirit.'
  '13':
  - type: text
    content: ' Then will I teach transgressors Your ways, and sinners shall be converted '
  - type: text
    content: and
  - type: text
    content: ' return to You.'
  '14':
  - type: text
    content: ' Deliver me from bloodguiltiness '
  - type: text
    content: and
  - type: text
    content: ' death, O God, the God of my salvation, '
  - type: text
    content: and
  - type: text
    content: ' my tongue shall sing aloud of Your righteousness (Your rightness and Your justice).'
  '15':
  - type: text
    content: ' O Lord, open my lips, and my mouth shall show forth Your praise.'
  '16':
  - type: text
    content: ' For You delight not in sacrifice, or else would I give it; You find no pleasure in burnt offering. [I Sam. 15:22.]'
  '17':
  - type: text
    content: ' My sacrifice [the sacrifice acceptable] to God is a broken spirit; a broken and a contrite heart [broken down with sorrow for sin and humbly and thoroughly penitent], such, O God, You will not despise.'
  '18':
  - type: text
    content: ' Do good in Your good pleasure to Zion; rebuild the walls of Jerusalem.'
  '19':
  - type: text
    content: ' Then will You delight in the sacrifices of righteousness, justice, '
  - type: text
    content: and
  - type: text
    content: ' right, with burnt offering and whole burnt offering; then bullocks will be offered upon Your altar.'
  '2':
  - type: text
    content: ' Wash me thoroughly [and repeatedly] from my iniquity '
  - type: text
    content: and
  - type: text
    content: ' guilt and cleanse me '
  - type: text
    content: and
  - type: text
    content: ' make me wholly pure from my sin!'
  '3':
  - type: text
    content: ' For I am conscious of my transgressions '
  - type: text
    content: and
  - type: text
    content: ' I acknowledge them; my sin is ever before me.'
  '4':
  - type: text
    content: ' Against You, You only, have I sinned and done that which is evil in Your sight, so that You are justified in Your sentence and faultless in Your judgment. [Rom. 3:4.]'
  '5':
  - type: text
    content: ' Behold, I was brought forth in [a state of] iniquity; my mother was sinful who conceived me [and I too am sinful]. [John 3:6; Rom. 5:12; Eph. 2:3.]'
  '6':
  - type: text
    content: ' Behold, You desire truth in the inner being; make me therefore to know wisdom in my inmost heart.'
  '7':
  - type: text
    content: ' Purify me with hyssop, and I shall be clean [ceremonially]; wash me, and I shall [in reality] be whiter than snow.'
  '8':
  - type: text
    content: ' Make me to hear joy and gladness '
  - type: text
    content: and
  - type: text
    content: ' be satisfied; let the bones which You have broken rejoice.'
  '9':
  - type: text
    content: ' Hide Your face from my sins and blot out all my guilt '
  - type: text
    content: and
  - type: text
    content: ' iniquities.'
