document_id: GEN.45
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JOSEPH could not restrain himself [any longer] before all those who stood by him, and he called out, Cause every man to go out from me! So no one stood there with Joseph while he made himself known to his brothers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he wept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sobbed aloud, and the Egyptians [who had just left him] heard it, and the household of Pharaoh heard about it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Joseph said to his brothers, I am Joseph! Is my father still alive? And his brothers could not reply, for they were distressingly disturbed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dismayed at [the startling realization that they were in] his presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Joseph said to his brothers, Come near to me, I pray you. And they did so. And he said, I am Joseph your brother, whom you sold into Egypt!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But now, do not be distressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disheartened or vexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' angry with yourselves because you sold me here, for God sent me ahead of you to preserve life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For these two years the famine has been in the land, and there are still five years more in which there will be neither plowing nor harvest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' God sent me before you to preserve for you a posterity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to continue a remnant on the earth, to save your lives by a great escape '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' save for you many survivors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So now it was not you who sent me here, but God; and He has made me a father to Pharaoh and lord of all his house and ruler over all the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Hurry and go up to my father and tell him, Your son Joseph says this to you: God has put me in charge of all Egypt. Come down to me; do not delay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' You will live in the land of Goshen, and you will be close to me–you and your children and your grandchildren, your flocks, your herds, and all you have.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And there I will sustain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provide for you, so that you and your household and all that are yours may not come to poverty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' want, for there are yet five [more] years of [the scarcity, hunger, and starvation of] famine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now notice! Your own eyes and the eyes of my brother Benjamin can see that I am talking to you personally [in your language and not through an interpreter].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And you shall tell my father of all my glory in Egypt and of all that you have seen; and you shall hurry and bring my father down here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he fell on his brother Benjamin''s neck and wept, and Benjamin wept on his neck.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Moreover, he kissed all his brothers and wept upon them; and after that his brothers conversed with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' When the report was heard in Pharaoh''s house that Joseph''s brothers had come, it pleased Pharaoh and his servants well.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Pharaoh said to Joseph, Tell your brothers this: Load your animals and return to the land of Canaan,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And get your father and your households and come to me. And I will give you the best in the land of Egypt and you will live on the fat of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' You therefore command them, saying, You do this: take wagons from the land of Egypt for your little ones and for your wives, and bring your father and come.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Also do not look with regret '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' concern upon your goods, for the best of all the land of Egypt is yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the sons of Israel did so; and Joseph gave them wagons, as the order of Pharaoh permitted, and gave them provisions for the journey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' To each of them he gave changes of raiment, but to Benjamin he gave 300 pieces of silver and five changes of raiment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And to his father he sent as follows: ten donkeys loaded with the good things of Egypt, and ten she-donkeys laden with grain, bread, and nourishing food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provision for his father [to supply all who were with him] on the way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' So he sent his brothers away, and they departed, and he said to them, See that you do not disagree (get excited, quarrel) along the road.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' So they went up out of Egypt and came into the land of Canaan to Jacob their father,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And they said to him, Joseph is still alive! And he is governor over all the land of Egypt! And Jacob''s heart began to stop beating '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [he almost] fainted, for he did not believe them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But when they told him all the words of Joseph which he had said to them, and when he saw the wagons which Joseph had sent to carry him, the spirit of Jacob their father revived [and warmth and life returned].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And Israel said, It is enough! Joseph my son is still alive. I will go and see him before I die.'
