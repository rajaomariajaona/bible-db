document_id: JON.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BUT IT displeased Jonah exceedingly and he was very angry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And he prayed to the Lord and said, I pray You, O Lord, is not this just what I said when I was still in my country? That is why I fled to Tarshish, for I knew that You are a gracious God and merciful, slow to anger and of great kindness, and [when sinners turn to You and meet Your conditions] You revoke the [sentence of] evil against them. [Exod. 34:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Therefore now, O Lord, I beseech You, take my life from me, for it is better for me to die than to live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Then said the Lord, Do you do well to be angry?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So Jonah went out of the city and sat to the east of the city, and he made a booth there for himself. He sat there under it in the shade till he might see what would become of the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the Lord God prepared a gourd and made it to come up over Jonah, that it might be a shade over his head, to deliver him from his evil situation. So Jonah was exceedingly glad [to have the protection] of the gourd.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But God prepared a cutworm when the morning dawned the next day, and it smote the gourd so that it withered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And when the sun arose, God prepared a sultry east wind, and the sun beat upon the head of Jonah so that he fainted and wished in himself to die and said, It is better for me to die than to live.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And God said to Jonah, Do you do well to be angry for the loss of the gourd? And he said, I do well to be angry, angry enough to die!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then said the Lord, You have had pity on the gourd, for which you have not labored nor made it grow, which came up in a night and perished in a night.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And should not I spare Nineveh, that great city, in which there are more than 120,000 persons not [yet old enough to] know their right hand from their left, and also many cattle [not accountable for sin]?'
