document_id: JDG.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' NOW THESE are the nations which the Lord left to prove Israel by them, that is, all in Israel who had not previously experienced war in Canaan;'
  '10':
  - type: text
    content: ' The Spirit of the Lord came upon him, and he judged Israel. He went out to war, and the Lord delivered Chushan-rishathaim king of Mesopotamia into his hand and his hand prevailed over Chushan-rishathaim.'
  '11':
  - type: text
    content: ' And the land had rest forty years. Then Othniel son of Kenaz died.'
  '12':
  - type: text
    content: ' And the Israelites again did evil in the sight of the Lord, and the Lord strengthened Eglon king of Moab against Israel because they had done what was evil in the sight of the Lord.'
  '13':
  - type: text
    content: ' And [Eglon] gathered to him the men of Ammon and Amalek, and went and smote Israel, and they possessed the City of Palm Trees (Jericho).'
  '14':
  - type: text
    content: ' And the Israelites served Eglon king of Moab eighteen years.'
  '15':
  - type: text
    content: ' But when the Israelites cried to the Lord, the Lord raised them up a deliverer, Ehud son of Gera, a Benjamite, a left-handed man; and by him the Israelites sent tribute to Eglon king of Moab.'
  '16':
  - type: text
    content: ' Ehud made for himself a sword, a cubit long, which had two edges, and he girded it on his right thigh under his clothing.'
  '17':
  - type: text
    content: ' And he brought the tribute to Eglon king of Moab. Now Eglon was a very fat man.'
  '18':
  - type: text
    content: ' And when Ehud had finished presenting the tribute, he sent away the people who had carried it.'
  '19':
  - type: text
    content: ' He himself went [with them] as far as the sculptured [boundary] stones near Gilgal, and then turned back and came to Eglon and said, I have a secret errand to you, O king. Eglon commanded silence, and all who stood by him went out from him.'
  '2':
  - type: text
    content: ' It was only that the generations of the Israelites might know and be taught war, at least those who previously knew nothing of it.'
  '20':
  - type: text
    content: ' When Ehud had come [near] to him as he was sitting alone in his cool upper apartment, Ehud said, I have a commission from God to execute to you. And the king arose from his seat.'
  '21':
  - type: text
    content: ' Then Ehud put forth his left hand and took the sword from his right thigh and thrust it into Eglon''s belly.'
  '22':
  - type: text
    content: ' And the hilt also went in after the blade, and the fat closed upon the blade, for [Ehud] did not draw the sword out of his belly, and the dirt came out.'
  '23':
  - type: text
    content: ' Then Ehud went out into the vestibule and shut the doors of the upper room upon [Eglon] and locked them.'
  '24':
  - type: text
    content: ' When [Ehud] had gone out, [Eglon''s] servants came. And when they saw the doors of the upper room were locked, they thought, Surely he [is seeking privacy while he] relieves himself in the closet of the cool chamber.'
  '25':
  - type: text
    content: ' They waited a long time until they became embarrassed '
  - type: text
    content: and
  - type: text
    content: ' uneasy, but when he still did not open the doors of the upper room, they took the key and opened them, and there lay their master fallen to the floor, dead!'
  '26':
  - type: text
    content: ' Ehud escaped while they delayed and passed beyond the sculptured [boundary] stones (images) and escaped to Seirah.'
  '27':
  - type: text
    content: ' When he arrived, he blew a trumpet in the hill country of Ephraim, and the Israelites went down from the hill country, with him at their head.'
  '28':
  - type: text
    content: ' And he said to them, Follow me, for the Lord has delivered your enemies the Moabites into your hand. So they went down after him and seized the fords of the Jordan against the Moabites and permitted not a man to pass over.'
  '29':
  - type: text
    content: ' They slew at that time about 10,000 Moabites, all strong, courageous men; not a man escaped.'
  '3':
  - type: text
    content: ' The remaining nations are: the five lords of the Philistines, all the Canaanites, the Sidonians, and the Hivites who dwelt on Mount Lebanon from Mount Baal-hermon to the entrance of Hamath.'
  '30':
  - type: text
    content: ' So Moab was subdued that day under the hand of Israel, and the land had peace '
  - type: text
    content: and
  - type: text
    content: ' rest for eighty years.'
  '31':
  - type: text
    content: ' After [Ehud] was Shamgar son of Anath, who slew 600 Philistine men with an oxgoad. He also delivered Israel.'
  '4':
  - type: text
    content: ' They were for the testing '
  - type: text
    content: and
  - type: text
    content: ' proving of Israel to know whether Israel would listen '
  - type: text
    content: and
  - type: text
    content: ' obey the commandments of the Lord, which He commanded their fathers by Moses.'
  '5':
  - type: text
    content: ' And the Israelites dwelt among the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites;'
  '6':
  - type: text
    content: ' And they married their daughters and gave their own daughters to their sons, and served their gods. [Exod. 34:12-16.]'
  '7':
  - type: text
    content: ' And the Israelites did evil in the sight of the Lord and forgot the Lord their God and served the Baals and the Ashtaroth. [Judg. 2:13.]'
  '8':
  - type: text
    content: ' So the anger of the Lord was kindled against Israel, and He sold them into the hand of Chushan-rishathaim king of Mesopotamia; and the Israelites served Chushan-rishathaim eight years.'
  '9':
  - type: text
    content: ' But when the Israelites cried to the Lord, the Lord raised up a deliverer for the people of Israel to deliver them, Othniel son of Kenaz, Caleb''s younger brother.'
