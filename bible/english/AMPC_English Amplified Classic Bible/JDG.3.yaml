document_id: JDG.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW THESE are the nations which the Lord left to prove Israel by them, that is, all in Israel who had not previously experienced war in Canaan;'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' The Spirit of the Lord came upon him, and he judged Israel. He went out to war, and the Lord delivered Chushan-rishathaim king of Mesopotamia into his hand and his hand prevailed over Chushan-rishathaim.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And the land had rest forty years. Then Othniel son of Kenaz died.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And the Israelites again did evil in the sight of the Lord, and the Lord strengthened Eglon king of Moab against Israel because they had done what was evil in the sight of the Lord.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And [Eglon] gathered to him the men of Ammon and Amalek, and went and smote Israel, and they possessed the City of Palm Trees (Jericho).'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And the Israelites served Eglon king of Moab eighteen years.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' But when the Israelites cried to the Lord, the Lord raised them up a deliverer, Ehud son of Gera, a Benjamite, a left-handed man; and by him the Israelites sent tribute to Eglon king of Moab.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' Ehud made for himself a sword, a cubit long, which had two edges, and he girded it on his right thigh under his clothing.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And he brought the tribute to Eglon king of Moab. Now Eglon was a very fat man.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And when Ehud had finished presenting the tribute, he sent away the people who had carried it.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' He himself went [with them] as far as the sculptured [boundary] stones near Gilgal, and then turned back and came to Eglon and said, I have a secret errand to you, O king. Eglon commanded silence, and all who stood by him went out from him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' It was only that the generations of the Israelites might know and be taught war, at least those who previously knew nothing of it.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' When Ehud had come [near] to him as he was sitting alone in his cool upper apartment, Ehud said, I have a commission from God to execute to you. And the king arose from his seat.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Then Ehud put forth his left hand and took the sword from his right thigh and thrust it into Eglon''s belly.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And the hilt also went in after the blade, and the fat closed upon the blade, for [Ehud] did not draw the sword out of his belly, and the dirt came out.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Then Ehud went out into the vestibule and shut the doors of the upper room upon [Eglon] and locked them.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' When [Ehud] had gone out, [Eglon''s] servants came. And when they saw the doors of the upper room were locked, they thought, Surely he [is seeking privacy while he] relieves himself in the closet of the cool chamber.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' They waited a long time until they became embarrassed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uneasy, but when he still did not open the doors of the upper room, they took the key and opened them, and there lay their master fallen to the floor, dead!'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Ehud escaped while they delayed and passed beyond the sculptured [boundary] stones (images) and escaped to Seirah.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' When he arrived, he blew a trumpet in the hill country of Ephraim, and the Israelites went down from the hill country, with him at their head.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And he said to them, Follow me, for the Lord has delivered your enemies the Moabites into your hand. So they went down after him and seized the fords of the Jordan against the Moabites and permitted not a man to pass over.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' They slew at that time about 10,000 Moabites, all strong, courageous men; not a man escaped.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' The remaining nations are: the five lords of the Philistines, all the Canaanites, the Sidonians, and the Hivites who dwelt on Mount Lebanon from Mount Baal-hermon to the entrance of Hamath.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' So Moab was subdued that day under the hand of Israel, and the land had peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rest for eighty years.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' After [Ehud] was Shamgar son of Anath, who slew 600 Philistine men with an oxgoad. He also delivered Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' They were for the testing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proving of Israel to know whether Israel would listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey the commandments of the Lord, which He commanded their fathers by Moses.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And the Israelites dwelt among the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites;'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And they married their daughters and gave their own daughters to their sons, and served their gods. [Exod. 34:12-16.]'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And the Israelites did evil in the sight of the Lord and forgot the Lord their God and served the Baals and the Ashtaroth. [Judg. 2:13.]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' So the anger of the Lord was kindled against Israel, and He sold them into the hand of Chushan-rishathaim king of Mesopotamia; and the Israelites served Chushan-rishathaim eight years.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' But when the Israelites cried to the Lord, the Lord raised up a deliverer for the people of Israel to deliver them, Othniel son of Kenaz, Caleb''s younger brother.'
