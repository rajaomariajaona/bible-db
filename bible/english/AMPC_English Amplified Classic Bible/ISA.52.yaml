document_id: ISA.52
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AWAKE, AWAKE, put on your strength, O Zion; put on your beautiful garments, O Jerusalem, the holy city; for henceforth there shall no more come into you the uncircumcised and the unclean. [Rev. 21:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Shake yourself from the dust; arise, sit [erect in a dignified place], O Jerusalem; loose yourself from the bonds of your neck, O captive Daughter of Zion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For thus says the Lord: You were sold for nothing, and you shall be redeemed without money.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For thus says the Lord God: My people went down at the first into Egypt to sojourn there; and [many years later Sennacherib] the Assyrian oppressed them for nothing. [Now I delivered you from both Egypt and Assyria; what then can prevent Me from delivering you from Babylon?]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But now what have I here, says the Lord, seeing that My people have been taken away for nothing? Those who rule over them howl [with joy], says the Lord, and My name continually is blasphemed all day long. [Rom. 2:24.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Therefore My people shall know what My name is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what it means; therefore they shall know in that day that I am He who speaks; behold, I AM! [Exod. 3:13, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' How beautiful upon the mountains are the feet of him who brings good tidings, who publishes peace, who brings good tidings of good, who publishes salvation, who says to Zion, Your God reigns! [Acts 10:36; Rom. 10:15; Eph. 6:14-16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Hark, your watchmen lift up their voices; together they sing for joy; for they shall see eye to eye the return of the Lord to Zion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Break forth joyously, sing together, you waste places of Jerusalem, for the Lord has comforted His people, He has redeemed Jerusalem!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The Lord has made bare His holy arm before the eyes of all the nations [revealing Himself as the One by Whose direction the redemption of Israel from captivity is accomplished], and all the ends of the earth shall witness the salvation of our God. [Luke 2:29-32; 3:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Depart, depart, go out from there [the lands of exile]! Touch no unclean thing! Go out of the midst of her [Babylon]; cleanse yourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be clean, you who bear the vessels of the Lord [on your journey from there]. [II Cor. 6:16, 17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' For you will not go out with haste, nor will you go in flight [as was necessary when Israel left Egypt]; for the Lord will go before you, and the God of Israel will be your rear guard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Behold, My Servant shall deal wisely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shall prosper; He shall be exalted and extolled and shall stand very high.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' [For many the Servant of God became an object of horror; many were astonished at Him.] His face '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His whole appearance were marred more than any man''s, and His form beyond that of the sons of men–but just as many were astonished at Him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' So shall He startle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sprinkle many nations, and kings shall shut their mouths because of Him; for that which has not been told them shall they see, and that which they have not heard shall they consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand. [Rom. 15:21.]'
