document_id: TIT.1,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' PAUL, A bond servant of God and an apostle (a special messenger) of Jesus Christ (the Messiah) to stimulate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promote the faith of God''s chosen ones and to lead them on to accurate discernment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognition of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acquaintance with the Truth which belongs to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' harmonizes with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tends to godliness,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' For there are many disorderly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unruly men who are idle (vain, empty) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' misleading talkers and self-deceivers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceivers of others. [This is true] especially of those of the circumcision party [who have come over from Judaism].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Their mouths must be stopped, for they are mentally distressing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' subverting whole families by teaching what they ought not to teach, for the purpose of getting base advantage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disreputable gain.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' One of their [very] number, a prophet of their own, said, Cretans are always liars, hurtful beasts, idle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lazy gluttons.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And this account of them is [really] true. Because it is [true], rebuke them sharply [deal sternly, even severely with them], so that they may be sound in the faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' free from error,'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' [And may show their soundness by] ceasing to give attention to Jewish myths '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fables or to rules [laid down] by [mere] men who reject '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' turn their backs on the Truth.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' To the pure [in heart and conscience] all things are pure, but to the defiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' corrupt and unbelieving nothing is pure; their very minds and consciences are defiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' polluted.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' They profess to know God [to recognize, perceive, and be acquainted with Him], but deny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disown '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' renounce Him by what they do; they are detestable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loathsome, unbelieving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disobedient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disloyal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rebellious, and [they are] unfit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthless for good work (deed or enterprise) of any kind.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' [Resting] in the hope of eternal life, [life] which the ever truthful God Who cannot deceive promised before the world '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' the ages of time began.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And [now] in His own appointed time He has made manifest (made known) His Word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revealed it as His message through the preaching entrusted to me by command of God our Savior;'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' To Titus, my true child according to a common (general) faith: Grace (favor and spiritual blessing) and [heart] peace from God the Father and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Lord
    - type: text
      text: ' Christ Jesus our Savior.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' For this reason I left you [behind] in Crete, that you might set right what was defective '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' finish what was left undone, and that you might appoint elders '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set them over the churches (assemblies) in every city as I directed you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' [These elders should be] men who are of unquestionable integrity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are irreproachable, the husband of [but] one wife, whose children are [well trained and are] believers, not open to the accusation of being loose in morals '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conduct or unruly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disorderly.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For the bishop (an overseer) as God''s steward must be blameless, not self-willed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' arrogant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' presumptuous; he must not be quick-tempered or given to drink '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pugnacious (brawling, violent); he must not be grasping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greedy for filthy lucre (financial gain);'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' But he must be hospitable (loving and a friend to believers, especially to strangers and foreigners); [he must be] a lover of goodness [of good people and good things], sober-minded (sensible, discreet), upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fair-minded, a devout man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' religiously correct, temperate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keeping himself in hand.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' He must hold fast to the sure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy Word of God as he was taught it, so that he may be able both to give stimulating instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouragement in sound (wholesome) doctrine and to refute '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' convict those who contradict '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppose it [showing the wayward their error].'
