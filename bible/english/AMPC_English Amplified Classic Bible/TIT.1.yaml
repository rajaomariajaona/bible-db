document_id: TIT.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PAUL, A bond servant of God and an apostle (a special messenger) of Jesus Christ (the Messiah) to stimulate '
  - type: text
    content: and
  - type: text
    content: ' promote the faith of God''s chosen ones and to lead them on to accurate discernment '
  - type: text
    content: and
  - type: text
    content: ' recognition of '
  - type: text
    content: and
  - type: text
    content: ' acquaintance with the Truth which belongs to '
  - type: text
    content: and
  - type: text
    content: ' harmonizes with '
  - type: text
    content: and
  - type: text
    content: ' tends to godliness,'
  '10':
  - type: text
    content: ' For there are many disorderly '
  - type: text
    content: and
  - type: text
    content: ' unruly men who are idle (vain, empty) '
  - type: text
    content: and
  - type: text
    content: ' misleading talkers and self-deceivers '
  - type: text
    content: and
  - type: text
    content: ' deceivers of others. [This is true] especially of those of the circumcision party [who have come over from Judaism].'
  '11':
  - type: text
    content: ' Their mouths must be stopped, for they are mentally distressing '
  - type: text
    content: and
  - type: text
    content: ' subverting whole families by teaching what they ought not to teach, for the purpose of getting base advantage '
  - type: text
    content: and
  - type: text
    content: ' disreputable gain.'
  '12':
  - type: text
    content: ' One of their [very] number, a prophet of their own, said, Cretans are always liars, hurtful beasts, idle '
  - type: text
    content: and
  - type: text
    content: ' lazy gluttons.'
  '13':
  - type: text
    content: ' And this account of them is [really] true. Because it is [true], rebuke them sharply [deal sternly, even severely with them], so that they may be sound in the faith '
  - type: text
    content: and
  - type: text
    content: ' free from error,'
  '14':
  - type: text
    content: ' [And may show their soundness by] ceasing to give attention to Jewish myths '
  - type: text
    content: and
  - type: text
    content: ' fables or to rules [laid down] by [mere] men who reject '
  - type: text
    content: and
  - type: text
    content: ' turn their backs on the Truth.'
  '15':
  - type: text
    content: ' To the pure [in heart and conscience] all things are pure, but to the defiled '
  - type: text
    content: and
  - type: text
    content: ' corrupt and unbelieving nothing is pure; their very minds and consciences are defiled '
  - type: text
    content: and
  - type: text
    content: ' polluted.'
  '16':
  - type: text
    content: ' They profess to know God [to recognize, perceive, and be acquainted with Him], but deny '
  - type: text
    content: and
  - type: text
    content: ' disown '
  - type: text
    content: and
  - type: text
    content: ' renounce Him by what they do; they are detestable '
  - type: text
    content: and
  - type: text
    content: ' loathsome, unbelieving '
  - type: text
    content: and
  - type: text
    content: ' disobedient '
  - type: text
    content: and
  - type: text
    content: ' disloyal '
  - type: text
    content: and
  - type: text
    content: ' rebellious, and [they are] unfit '
  - type: text
    content: and
  - type: text
    content: ' worthless for good work (deed or enterprise) of any kind.'
  '2':
  - type: text
    content: ' [Resting] in the hope of eternal life, [life] which the ever truthful God Who cannot deceive promised before the world '
  - type: text
    content: or
  - type: text
    content: ' the ages of time began.'
  '3':
  - type: text
    content: ' And [now] in His own appointed time He has made manifest (made known) His Word '
  - type: text
    content: and
  - type: text
    content: ' revealed it as His message through the preaching entrusted to me by command of God our Savior;'
  '4':
  - type: text
    content: ' To Titus, my true child according to a common (general) faith: Grace (favor and spiritual blessing) and [heart] peace from God the Father and '
  - type: text
    content: the Lord
  - type: text
    content: ' Christ Jesus our Savior.'
  '5':
  - type: text
    content: ' For this reason I left you [behind] in Crete, that you might set right what was defective '
  - type: text
    content: and
  - type: text
    content: ' finish what was left undone, and that you might appoint elders '
  - type: text
    content: and
  - type: text
    content: ' set them over the churches (assemblies) in every city as I directed you.'
  '6':
  - type: text
    content: ' [These elders should be] men who are of unquestionable integrity '
  - type: text
    content: and
  - type: text
    content: ' are irreproachable, the husband of [but] one wife, whose children are [well trained and are] believers, not open to the accusation of being loose in morals '
  - type: text
    content: and
  - type: text
    content: ' conduct or unruly '
  - type: text
    content: and
  - type: text
    content: ' disorderly.'
  '7':
  - type: text
    content: ' For the bishop (an overseer) as God''s steward must be blameless, not self-willed '
  - type: text
    content: or
  - type: text
    content: ' arrogant '
  - type: text
    content: or
  - type: text
    content: ' presumptuous; he must not be quick-tempered or given to drink '
  - type: text
    content: or
  - type: text
    content: ' pugnacious (brawling, violent); he must not be grasping '
  - type: text
    content: and
  - type: text
    content: ' greedy for filthy lucre (financial gain);'
  '8':
  - type: text
    content: ' But he must be hospitable (loving and a friend to believers, especially to strangers and foreigners); [he must be] a lover of goodness [of good people and good things], sober-minded (sensible, discreet), upright '
  - type: text
    content: and
  - type: text
    content: ' fair-minded, a devout man '
  - type: text
    content: and
  - type: text
    content: ' religiously correct, temperate '
  - type: text
    content: and
  - type: text
    content: ' keeping himself in hand.'
  '9':
  - type: text
    content: ' He must hold fast to the sure '
  - type: text
    content: and
  - type: text
    content: ' trustworthy Word of God as he was taught it, so that he may be able both to give stimulating instruction '
  - type: text
    content: and
  - type: text
    content: ' encouragement in sound (wholesome) doctrine and to refute '
  - type: text
    content: and
  - type: text
    content: ' convict those who contradict '
  - type: text
    content: and
  - type: text
    content: ' oppose it [showing the wayward their error].'
