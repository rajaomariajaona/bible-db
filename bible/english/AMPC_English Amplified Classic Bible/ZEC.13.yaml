document_id: ZEC.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THAT day there shall be a fountain opened for the house of David and for the inhabitants of Jerusalem [to cleanse them from] sin and uncleanness.'
  '2':
  - type: text
    content: ' And in that day, says the Lord of hosts, I will cut off the names of the idols from the land, and they shall no more be remembered; and also I will remove from the land the [false] prophets and the unclean spirit.'
  '3':
  - type: text
    content: ' And if anyone again appears [falsely] as a prophet, then his father and his mother who bore him shall say to him, You shall not live, for you speak lies in the name of the Lord; and his father and his mother who bore him shall thrust him through when he prophesies.'
  '4':
  - type: text
    content: ' And in that day the [false] prophets shall each be ashamed of his vision when he prophesies, nor will he wear a hairy '
  - type: text
    content: or
  - type: text
    content: ' rough garment to deceive,'
  '5':
  - type: text
    content: ' But he will [deny his identity and] say, I am no prophet. I am a tiller of the ground, for I have been made a bond servant from my youth.'
  '6':
  - type: text
    content: ' And one shall say to him, What are these wounds on your breast '
  - type: text
    content: or
  - type: text
    content: ' between your hands? Then he will answer, Those with which I was wounded [when disciplined] in the house of my [loving] friends.'
  '7':
  - type: text
    content: ' Awake, O sword, against My shepherd and against the man who is My associate, says the Lord of hosts; smite the shepherd and the sheep [of the flock] shall be scattered, and I will turn back My hand '
  - type: text
    content: and
  - type: text
    content: ' stretch it out again upon the little ones [of the flock]. [Matt. 26:31, 32.]'
  '8':
  - type: text
    content: ' And in all the land, says the Lord, two-thirds shall be cut off and perish, but one-third shall be left alive. [Hos. 2:23; Rom. 11:5.]'
  '9':
  - type: text
    content: ' And I will bring the third part through the fire, and will refine them as silver is refined and will test them as gold is tested. They will call on My name, and I will hear '
  - type: text
    content: and
  - type: text
    content: ' answer them. I will say, It is My people; and they will say, The Lord is my God.'
