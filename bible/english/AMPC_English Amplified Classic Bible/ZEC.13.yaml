document_id: ZEC.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THAT day there shall be a fountain opened for the house of David and for the inhabitants of Jerusalem [to cleanse them from] sin and uncleanness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And in that day, says the Lord of hosts, I will cut off the names of the idols from the land, and they shall no more be remembered; and also I will remove from the land the [false] prophets and the unclean spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And if anyone again appears [falsely] as a prophet, then his father and his mother who bore him shall say to him, You shall not live, for you speak lies in the name of the Lord; and his father and his mother who bore him shall thrust him through when he prophesies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And in that day the [false] prophets shall each be ashamed of his vision when he prophesies, nor will he wear a hairy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rough garment to deceive,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But he will [deny his identity and] say, I am no prophet. I am a tiller of the ground, for I have been made a bond servant from my youth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And one shall say to him, What are these wounds on your breast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' between your hands? Then he will answer, Those with which I was wounded [when disciplined] in the house of my [loving] friends.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Awake, O sword, against My shepherd and against the man who is My associate, says the Lord of hosts; smite the shepherd and the sheep [of the flock] shall be scattered, and I will turn back My hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stretch it out again upon the little ones [of the flock]. [Matt. 26:31, 32.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And in all the land, says the Lord, two-thirds shall be cut off and perish, but one-third shall be left alive. [Hos. 2:23; Rom. 11:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And I will bring the third part through the fire, and will refine them as silver is refined and will test them as gold is tested. They will call on My name, and I will hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answer them. I will say, It is My people; and they will say, The Lord is my God.'
