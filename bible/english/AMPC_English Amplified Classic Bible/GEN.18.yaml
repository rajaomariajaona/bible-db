document_id: GEN.18,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW THE Lord appeared to Abraham by the oaks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' terebinths of Mamre; as he sat at the door of his tent in the heat of the day,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' [The Lord] said, I will surely return to you when the season comes round, and behold, Sarah your wife will have a son. And Sarah was listening '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heard it at the tent door which was behind Him. [Rom. 9:9-12.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Now Abraham and Sarah were old, well advanced in years; it had ceased to be with Sarah as with [young] women. [She was past the age of childbearing].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' Therefore Sarah laughed to herself, saying, After I have become aged shall I have pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight, my lord (husband), being old also? [I Pet. 3:6.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And the Lord asked Abraham, Why did Sarah laugh, saying, Shall I really bear a child when I am so old?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Is anything too hard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' too wonderful for the Lord? At the appointed time, when the season [for her delivery] comes around, I will return to you and Sarah shall have borne a son. [Matt. 19:26.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' Then Sarah denied it, saying, I did not laugh; for she was afraid. And He said, No, but you did laugh.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' The men rose up from there and faced toward Sodom, and Abraham went with them to bring them on the way.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And the Lord said, Shall I hide from Abraham [My friend and servant] what I am going to do, [Gal. 3:8.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Since Abraham shall surely become a great and mighty nation, and all the nations of the earth shall be blessed through him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shall bless themselves by him? [Gen. 12:2-3.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' For I have known (chosen, acknowledged) him [as My own], so that he may teach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' command his children and the sons of his house after him to keep the way of the Lord and to do what is just and righteous, so that the Lord may bring Abraham what He has promised him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' He lifted up his eyes and looked, and behold, three men stood at a little distance from him. He ran from the tent door to meet them and bowed himself to the ground'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And the Lord said, Because the shriek [of the sins] of Sodom and Gomorrah is great and their sin is exceedingly grievous,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' I will go down now and see whether they have done altogether [as vilely and wickedly] as is the cry of it which has come to Me; and if not, I will know.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Now the [two] men turned from there and went toward Sodom, but Abraham still stood before the Lord.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And Abraham came close and said, Will You destroy the righteous (those upright and in right standing with God) together with the wicked?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Suppose there are in the city fifty righteous; will You destroy the place and not spare it for [the sake of] the fifty righteous in it?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Far be it from You to do such a thing–to slay the righteous with the wicked, so that the righteous fare as do the wicked! Far be it from You! Shall not the Judge of all the earth execute judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do righteously?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And the Lord said, If I find in the city of Sodom fifty righteous (upright and in right standing with God), I will spare the whole place for their sake.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' Abraham answered, Behold now, I who am but dust and ashes have taken upon myself to speak to the Lord.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' If five of the fifty righteous should be lacking–will You destroy the whole city for lack of five? He said, If I find forty-five, I will not destroy it.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' And [Abraham] spoke to Him yet again, and said, Suppose [only] forty shall be found there. And He said, I will not do it for forty''s sake.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And said, My lord, if now I have found favor in your sight, do not pass by your servant, I beg of you.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' Then [Abraham] said to Him, Oh, let not the Lord be angry, and I will speak [again]. Suppose [only] thirty shall be found there. And He answered, I will not do it if I find thirty there.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And [Abraham] said, Behold now, I have taken upon myself to speak [again] to the Lord. Suppose [only] twenty shall be found there. And [the Lord] replied, I will not destroy it for twenty''s sake.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And he said, Oh, let not the Lord be angry, and I will speak again only this once. Suppose ten [righteous people] shall be found there. And [the Lord] said, I will not destroy it for ten''s sake.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' And the Lord went His way when He had finished speaking with Abraham, and Abraham returned to his place.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Let a little water be brought, and you may wash your feet and recline '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rest yourselves under the tree.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And I will bring a morsel (mouthful) of bread to refresh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sustain your hearts before you go on further–for that is why you have come to your servant. And they replied, Do as you have said.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' So Abraham hastened into the tent to Sarah and said, Quickly get ready three measures of fine meal, knead it, and bake cakes.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And Abraham ran to the herd and brought a calf tender and good and gave it to the young man [to butcher]; then he [Abraham] hastened to prepare it.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And he took curds and milk and the calf which he had made ready, and set it before [the men]; and he stood by them under the tree while they ate.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And they said to him, Where is Sarah your wife? And he said, [She is here] in the tent.'
