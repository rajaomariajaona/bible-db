document_id: 2SA.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AFTER THIS, David inquired of the Lord, saying, Shall I go up into any of the cities of Judah? And the Lord said to him, Go up. David said, To which shall I go up? And He said, To Hebron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' So David went up there with his two wives, Ahinoam the Jezreelitess and Abigail, the widow of Nabal of Carmel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And David brought up his men who were with him, each one with his household, and they dwelt in the towns of Hebron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the men of Judah came and there they anointed David king over the house of Judah. They told David, The men of Jabesh-gilead buried Saul. [I Sam. 31:11-13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And David sent messengers to the men of Jabesh-gilead, saying, May the Lord bless you because you showed kindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loyalty to Saul your king and buried him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And now may the Lord show loving-kindness and faithfulness to you. I also will do well by you because you have done this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So now, let your hands be strengthened and be valiant, for your master Saul is dead, and the house of Judah has anointed me king over them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now Abner son of Ner, commander of Saul''s army, took Ish-bosheth son of Saul and brought him over to Mahanaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And he made him king over Gilead, the Ashurites, Jezreel, Ephraim, Benjamin, and all Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Ish-bosheth, Saul''s son, was forty years old when he began his two-year reign over Israel. But the house of Judah followed David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And David was king in Hebron over the house of Judah for seven years and six months.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Abner son of Ner and the servants of Ish-bosheth son of Saul went out from Mahanaim to Gibeon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Joab son of Zeruiah and the servants of David went out also; and the two groups met by the pool of Gibeon, seating themselves with one group on either side of the pool.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And Abner said to Joab, Let the young men now arise and have a contest before us. And Joab said, Let them arise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then there arose and went over by number–twelve of Benjamin who were with Ish-bosheth son of Saul, and twelve of the servants of David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And each caught his opponent by the head and thrust his sword into his side; so they all fell together. Therefore that place was called the Field of Sharp Knives, which is at Gibeon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' A very fierce battle followed, and Abner and the men of Israel were beaten before the servants of David.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Three sons of Zeruiah [the half sister of David] were there: Joab, Abishai, and Asahel. Now Asahel was as light of foot as a wild roe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' antelope.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Asahel pursued Abner, and as he ran he turned not to the right hand or to the left from following Abner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Then Abner looked behind him and said, Are you Asahel? He answered, I am.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Abner said to him, Turn aside to your right or left, and seize one of the young men and take his armor. But Asahel would not turn aside from following him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Abner said again to Asahel, Turn aside from following me. Why should I strike you to the ground? How then should I be able to face Joab your brother?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Asahel refused to turn aside; so Abner with the rear end of his spear smote him through the abdomen, and he fell and died where he fell. And all who came to the place where Asahel fell and died stood still.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But Joab and Abishai [his brothers] pursued Abner; the sun was going down as they came to the hill of Ammah, before Giah on the way to the wilderness of Gibeon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the Benjamites gathered together behind Abner and became one troop and took their stand on the top of a hill.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Then Abner called to Joab, Shall the sword devour forever? Do you not know that bitterness will be the result? How long will it be then before you bid the people to stop pursuing their brethren?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Joab said, As God lives, if you had not spoken, surely the men would have stopped pursuing their brethren in the morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' So Joab blew a trumpet, and all the people stood still and pursued Israel no more, nor did they fight any more.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Abner and his men went all night through the Arabah [plain], crossed the Jordan, and went through the whole Bithron [district of ravines] and came to Mahanaim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Joab returned from pursuing Abner, and when he had gathered all the people together, there were missing of David''s servants nineteen men besides Asahel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' But the servants of David had slain of Benjamin 360 of Abner''s men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And they took up Asahel and buried him in the tomb of his father at Bethlehem. And Joab and his men walked all night and came to Hebron at daybreak.'
