document_id: JDG.12,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THE MEN of Ephraim were summoned together and they crossed to Zaphon and said to Jephthah, Why did you cross over to fight with the Ammonites and did not summon us to go with you? We will burn your house over you with fire.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Ibzan died and was buried at Bethlehem.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' After him Elon the Zebulunite judged Israel, and he judged Israel ten years.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Elon the Zebulunite died and was buried at Aijalon in the land of Zebulun.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And after him Abdon son of Hillel the Pirathonite judged Israel.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he had forty sons and thirty grandsons who rode on seventy donkey colts; and he judged Israel eight years.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Abdon son of Hillel the Pirathonite died, and was buried at Pirathon in the land of Ephraim, in the hill country of the Amalekites.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And Jephthah said to them, I and my people were in a severe conflict with the Ammonites, and I when I called you, you did not rescue me from their hands.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And when I saw that you would not rescue me, I put my life in my hands and crossed over against the Ammonites, and the Lord delivered them into my hand. Why then have you come up to me this day to fight against me?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then Jephthah gathered all the men of Gilead and fought with Ephraim; and the men of Gilead smote Ephraim because they had said, You Gileadites are fugitives of Ephraim in the midst of Ephraim and Manasseh.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the Gileadites took the fords of the Jordan before the Ephraimites; and when any of those Ephraimites who had escaped said, Let me go over, the men of Gilead said to him, Are you an Ephraimite? If he said, No,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They said to him, Then say Shibboleth; and he said, Sibboleth, for he could not pronounce it right. Then they seized him and slew him at the fords of the Jordan. And there fell at that time 42,000 of the Ephraimites.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jephthah judged Israel six years. Then Jephthah the Gileadite died and was buried in one of the cities of Gilead.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And after him Ibzan of Bethlehem judged Israel.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And he had thirty sons and thirty daughters whom he gave [to husbands] outside his tribe, and thirty daughters [daughters-in-law] whom he brought in from outside his tribe for his sons. And he judged Israel seven years.'
