document_id: JOB.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JOB answered,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Oh, that my impatience '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vexation might be [thoroughly] weighed and all my calamity be laid up over against them in the balances, one against the other [to see if my grief is unmanly]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For now it would be heavier than the sand of the sea; therefore my words have been rash '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wild,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [But it is] because the arrows of the Almighty are within me, the poison which my spirit drinks up; the terrors of God set themselves in array against me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Does the wild ass bray when it has grass? Or does the ox low over its fodder?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Can that which has no taste to it be eaten without salt? Or is there any flavor in the white of an egg?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' [These afflictions] my soul refuses to touch! Such things are like diseased food to me [sickening and repugnant]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Oh, that I might have my request, and that God would grant me the thing that I long for!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' I even wish that it would please God to crush me, that He would let loose His hand and cut me off!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Then would I still have consolation–yes, I would leap [for joy] amid unsparing pain [though I shrink from it]–that I have not concealed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' denied the words of the Holy One!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' What strength have I left, that I should wait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope? And what is ahead of me, that I should be patient?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Is my strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endurance that of stones? Or is my flesh made of bronze?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Is it not that I have no help in myself, and that wisdom is quite driven from me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' To him who is about to faint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despair, kindness is due from his friend, lest he forsake the fear of the Almighty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' [You] my brethren have dealt deceitfully as a brook, as the channel of brooks that pass away,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Which are black '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turbid by reason of the ice, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in which the snows hides itself;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' When they get warm, they shrink '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disappear; when it is hot, they vanish out of their place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The caravans which travel by way of them turn aside; they go into the waste places and perish. [Such is my disappointment in you, the friends I fully trusted.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The caravans of Tema looked [for water], the companies of Sheba waited for them [in vain].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' They were confounded because they had hoped [to find water]; they came there and were bitterly disappointed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Now to me you are [like a dried-up brook]; you see my dismay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terror, and [believing me to be a victim of God''s anger] you are afraid [to sympathize with me].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Did I ever say, Bring me a gift, or Pay a bribe on my account from your wealth'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' To deliver me from the adversary''s hand, or Redeem me from the hand of the oppressors?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Teach me, and I will hold my peace; and cause me to understand wherein I have erred.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' How forcible are words of straightforward speech! But what does your arguing argue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prove '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' your reproof reprove?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Do you imagine your words to be an argument, but the speeches of one who is desperate to be as wind?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Yes, you would cast lots over the fatherless and bargain away your friend.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Now be pleased to look upon me, that it may be evident to you if I lie [for surely I would not lie to your face].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Return [from your suspicion], I pray you, let there be no injustice; yes, return again [to confidence in me], my vindication is in it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Is there wrong on my tongue? Cannot my taste discern what is destructive?'
