document_id: ECC.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' TO EVERYTHING there is a season, and a time for every matter '
  - type: text
    content: or
  - type: text
    content: ' purpose under heaven:'
  '10':
  - type: text
    content: ' I have seen the painful labor '
  - type: text
    content: and
  - type: text
    content: ' exertion '
  - type: text
    content: and
  - type: text
    content: ' miserable business which God has given to the sons of men with which to exercise '
  - type: text
    content: and
  - type: text
    content: ' busy themselves.'
  '11':
  - type: text
    content: ' He has made everything beautiful in its time. He also has planted eternity in men''s hearts '
  - type: text
    content: and
  - type: text
    content: ' minds [a divinely implanted sense of a purpose working through the ages which nothing under the sun but God alone can satisfy], yet so that men cannot find out what God has done from the beginning to the end.'
  '12':
  - type: text
    content: ' I know that there is nothing better for them than to be glad and to get '
  - type: text
    content: and
  - type: text
    content: ' do good as long as they live;'
  '13':
  - type: text
    content: ' And also that every man should eat and drink and enjoy the good of all his labor–it is the gift of God.'
  '14':
  - type: text
    content: ' I know that whatever God does, it endures forever; nothing can be added to it nor anything taken from it. And God does it so that men will [reverently] fear Him [revere and worship Him, knowing that He is]. [Ps. 19:9; James 1:17.]'
  '15':
  - type: text
    content: ' That which is now already has been, and that which is to be already has been; and God seeks that which has passed by [so that history repeats itself].'
  '16':
  - type: text
    content: ' Moreover, I saw under the sun that in the place of justice there was wickedness, and that in the place of righteousness wickedness was there also.'
  '17':
  - type: text
    content: ' I said in my heart, God will judge the righteous and the wicked, for there is a time [appointed] for every matter '
  - type: text
    content: and
  - type: text
    content: ' purpose and for every work.'
  '18':
  - type: text
    content: ' I said in my heart regarding the subject of the sons of men, God is trying (separating and sifting) them, that they may see that by themselves [under the sun, without God] they are but like beasts.'
  '19':
  - type: text
    content: ' For that which befalls the sons of men befalls beasts; even [in the end] one thing befalls them both. As the one dies, so dies the other. Yes, they all have one breath '
  - type: text
    content: and
  - type: text
    content: ' spirit, so that a man has no preeminence over a beast; for all is vanity (emptiness, falsity, and futility)!'
  '2':
  - type: text
    content: ' A time to be born and a time to die, a time to plant and a time to pluck up what is planted, [Heb. 9:27.]'
  '20':
  - type: text
    content: ' All go to one place; all are of the dust, and all turn to dust again.'
  '21':
  - type: text
    content: ' Who knows the spirit of man, whether it goes upward, and the spirit of the beast, whether it goes downward to the earth?'
  '22':
  - type: text
    content: ' So I saw that there is nothing better than that a man should rejoice in his own works, for that is his portion. For who shall bring him back to see what will happen after he is gone?'
  '3':
  - type: text
    content: ' A time to kill and a time to heal, a time to break down and a time to build up,'
  '4':
  - type: text
    content: ' A time to weep and a time to laugh, a time to mourn and a time to dance,'
  '5':
  - type: text
    content: ' A time to cast away stones and a time to gather stones together, a time to embrace and a time to refrain from embracing,'
  '6':
  - type: text
    content: ' A time to get and a time to lose, a time to keep and a time to cast away,'
  '7':
  - type: text
    content: ' A time to rend and a time to sew, a time to keep silence and a time to speak, [Amos 5:13.]'
  '8':
  - type: text
    content: ' A time to love and a time to hate, a time for war and a time for peace. [Luke 14:26.]'
  '9':
  - type: text
    content: ' What profit remains for the worker from his toil?'
