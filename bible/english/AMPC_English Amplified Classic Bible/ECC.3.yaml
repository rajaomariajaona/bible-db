document_id: ECC.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' TO EVERYTHING there is a season, and a time for every matter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' purpose under heaven:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' A time to be born and a time to die, a time to plant and a time to pluck up what is planted, [Heb. 9:27.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' A time to kill and a time to heal, a time to break down and a time to build up,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' A time to weep and a time to laugh, a time to mourn and a time to dance,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' A time to cast away stones and a time to gather stones together, a time to embrace and a time to refrain from embracing,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' A time to get and a time to lose, a time to keep and a time to cast away,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' A time to rend and a time to sew, a time to keep silence and a time to speak, [Amos 5:13.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' A time to love and a time to hate, a time for war and a time for peace. [Luke 14:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' What profit remains for the worker from his toil?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' I have seen the painful labor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exertion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miserable business which God has given to the sons of men with which to exercise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' busy themselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' He has made everything beautiful in its time. He also has planted eternity in men''s hearts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' minds [a divinely implanted sense of a purpose working through the ages which nothing under the sun but God alone can satisfy], yet so that men cannot find out what God has done from the beginning to the end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' I know that there is nothing better for them than to be glad and to get '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do good as long as they live;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And also that every man should eat and drink and enjoy the good of all his labor–it is the gift of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' I know that whatever God does, it endures forever; nothing can be added to it nor anything taken from it. And God does it so that men will [reverently] fear Him [revere and worship Him, knowing that He is]. [Ps. 19:9; James 1:17.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' That which is now already has been, and that which is to be already has been; and God seeks that which has passed by [so that history repeats itself].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Moreover, I saw under the sun that in the place of justice there was wickedness, and that in the place of righteousness wickedness was there also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' I said in my heart, God will judge the righteous and the wicked, for there is a time [appointed] for every matter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose and for every work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' I said in my heart regarding the subject of the sons of men, God is trying (separating and sifting) them, that they may see that by themselves [under the sun, without God] they are but like beasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For that which befalls the sons of men befalls beasts; even [in the end] one thing befalls them both. As the one dies, so dies the other. Yes, they all have one breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit, so that a man has no preeminence over a beast; for all is vanity (emptiness, falsity, and futility)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' All go to one place; all are of the dust, and all turn to dust again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Who knows the spirit of man, whether it goes upward, and the spirit of the beast, whether it goes downward to the earth?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' So I saw that there is nothing better than that a man should rejoice in his own works, for that is his portion. For who shall bring him back to see what will happen after he is gone?'
