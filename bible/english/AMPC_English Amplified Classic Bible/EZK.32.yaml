document_id: EZK.32,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN THE twelfth year [after King Jehoiachin of Judah was taken into exile by the king of Babylon], in the twelfth month, on the first day of the month, the word of the Lord came to me, saying,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' I will make many peoples amazed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appalled at you [Egypt], and their kings shall shudder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be horribly afraid because of you when I brandish My sword before them; they shall tremble every moment, every man for his own life, in the day of your downfall.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' For thus says the Lord God: The sword of the king of Babylon shall come upon you.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' I will cause your multitude, your tumult, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your store [of wealth, strength, and glory] to fall by the swords of the mighty–the most terrible among the nations are they all. And they shall bring to nothing the pomp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pride of Egypt, and all its multitude [with its activity and its wealth in every sphere] shall be destroyed.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' I will destroy also all its beasts from beside many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' great waters, and no foot of man shall trouble them any more, nor shall the hoofs of beasts trouble them.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Then will I make their waters sink down (subside, be quiet, and become clear); their rivers I will cause to run [slowly and smoothly] like oil, says the Lord God.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' When I make the land of Egypt desolate, and the country is stripped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destitute of all that of which it was full when I smite all those who dwell in it, then will they know, understand, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realize that I am the Lord [the Sovereign Ruler, Who requires and calls forth loyalty and obedient service].'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' This is the lamentation with which they shall intone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' chant the lament for her; the daughters of the nations shall chant their lament with it; over Egypt and over all her multitude, her tumult, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' her wealth in every sphere shall they chant it, says the Lord God.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' In the twelfth year [after King Jehoiachin of Judah was taken into exile], on the fifteenth day of the month, the word of the Lord came to me, saying,'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' Son of man, wail over the multitude of Egypt and cast them down, even her and the daughters of the famous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majestic nations, to the netherworld, with those who go down to the pit;'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Whom [among them] do you surpass in beauty? Go down and be laid with the uncircumcised (the heathen).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' Son of man, take up a lamentation over Pharaoh king of Egypt and say to him, You have likened [yourself] to a young lion, leader of the nations, but you are like a [monster] dragon in the seas; you break forth in your rivers and trouble the waters with your feet, and you make foul their rivers [the sources of their prosperity].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' They shall fall in the midst of those who are slain by the sword; she [Egypt] is delivered to the sword; they draw her down [to her judgment], and all her multitudes [with their noise and stores].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' The strong among the mighty shall speak of [Pharaoh] out of the midst of Sheol (the place of the dead, the netherworld) with those who helped him; they are gone down; they lie still, even the uncircumcised (the heathen) slain by the sword.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Assyria is there and all her company; their graves are round about her, all of them slain, fallen by the sword,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Whose graves are set in the uttermost parts of the pit and whose company is round about her grave, all of them slain, fallen by the sword, who caused terror to spread in the land of the living.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Elam [an auxiliary of Assyria] is there and all her multitude round about her grave, all of them slain, fallen by the sword, who have gone down uncircumcised into the netherworld, who caused their terror to spread in the land of the living and have borne their shame with those who go down to the pit.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' They have set her a bed (a sepulcher) among the slain with all her multitude–their graves round about her, all of them uncircumcised, slain by the sword, for their terror had spread in the land of the living, and they henceforth bear their shame with those who go down to the pit; they are laid in the midst of the slain.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' Meshech, Tubal, and all their multitude are there; their graves are round about [Pharaoh], all of them uncircumcised, slain by the sword, for they caused their terror to be spread in the land of the living.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And they shall not lie with the mighty who have fallen of the uncircumcised [and] who have gone down to Sheol (the place of the dead, the netherworld) with their weapons of war, whose swords were laid [with honors] under their heads and whose iniquities are upon their bones, for they caused their terror to spread in the land of the living.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' But you [Meshech and Tubal] shall be broken in the midst of the uncircumcised and shall lie [without honors] with those who are slain with the sword.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' Edom is there, her kings and all her princes, who for all their might are laid with those who were slain by the sword; they shall lie with the uncircumcised (the heathen) and with those who go down to the pit.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' Thus says the Lord God: I will therefore throw out My net over you with a host of many peoples, and they shall bring you up in My dragnet.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' The princes of the north are there, all of them, and all the Sidonians, who have gone down with the slain; for all the terror which they caused by their might they are put to shame, and they lie uncircumcised with those who are slain by the sword and henceforth bear their shame with those who go down to the pit.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' When Pharaoh sees them, he will comfort himself for all his multitude–even Pharaoh and all his army, slain by the sword, says the Lord God.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' For I have put his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' My terror in the land of the living, and he shall be laid in the midst of the uncircumcised (the heathen) with those slain by the sword, even Pharaoh and all his multitude, says the Lord God. [Isa. 19; Jer. 46; Zech. 14:18, 19.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' Then I will leave you [Egypt] upon the shore; I will cast you on the open field and will cause all the birds of the heavens to settle upon you, and I will fill the beasts of the whole earth with you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And I will scatter your flesh upon the mountains and fill the valleys with your high heap of corpses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their worms.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' I will also water with your flowing blood the land, even to the mountains, and the hollows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' water channels shall be full of you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And when I have extinguished you, I will cover the heavens [of Egypt] and make their stars dark; I will cover the sun with a cloud and the moon shall not give her light.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' All the bright lights of the heavens I will make dark over you and set darkness upon your land, says the Lord God.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' I will also trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vex the hearts of many peoples when I bring your breaking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trembling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carry you captive among the nations, into the countries which you have not known.'
