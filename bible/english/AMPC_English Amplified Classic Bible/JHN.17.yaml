document_id: JHN.17,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' WHEN JESUS had spoken these things, He lifted up His eyes to heaven and said, Father, the hour has come. Glorify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exalt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' magnify Your Son, so that Your Son may glorify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extol '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' magnify You.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All [things that are] Mine are Yours, and all [things that are] Yours belong to Me; and I am glorified in (through) them. [They have done Me honor; in them My glory is achieved.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And [now] I am no more in the world, but these are [still] in the world, and I am coming to You. Holy Father, keep in Your Name [in the knowledge of Yourself] those whom You have given Me, that they may be one as We [are one].'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' While I was with them, I kept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' preserved them in Your Name [in the knowledge and worship of You]. Those You have given Me I guarded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protected, and not one of them has perished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' is lost except the son of perdition [Judas Iscariot–the one who is now doomed to destruction, destined to be lost], that the Scripture might be fulfilled. [Ps. 41:9; John 6:70.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And now I am coming to You; I say these things while I am still in the world, so that My joy may be made full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perfect in them [that they may experience My delight fulfilled in them, that My enjoyment may be perfected in their own souls, that they may have My gladness within them, filling their hearts].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have given '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delivered to them Your word (message) and the world has hated them, because they are not of the world [do not belong to the world], just as I am not of the world.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I do not ask that You will take them out of the world, but that You will keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protect them from the evil one.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They are not of the world (worldly, belonging to the world), [just] as I am not of the world.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Sanctify them [purify, consecrate, separate them for Yourself, make them holy] by the Truth; Your Word is Truth.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Just as You sent Me into the world, I also have sent them into the world.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And so for their sake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' on their behalf I sanctify (dedicate, consecrate) Myself, that they also may be sanctified (dedicated, consecrated, made holy) in the Truth.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [Just as] You have granted Him power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority over all flesh (all humankind), [now glorify Him] so that He may give eternal life to all whom You have given Him.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Neither for these alone do I pray [it is not for their sake only that I make this request], but also for all those who will ever come to believe in (trust in, cling to, rely on) Me through their word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' teaching,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' That they all may be one, [just] as You, Father, are in Me and I in You, that they also may be one in Us, so that the world may believe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be convinced that You have sent Me.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have given to them the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor which You have given Me, that they may be one [even] as We are one:'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I in them and You in Me, in order that they may become one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perfectly united, that the world may know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [definitely] recognize that You sent Me and that You have loved them [even] as You have loved Me.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Father, I desire that they also whom You have entrusted to Me [as Your gift to Me] may be with Me where I am, so that they may see My glory, which You have given Me [Your love gift to Me]; for You loved Me before the foundation of the world.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' O just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteous Father, although the world has not known You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has failed to recognize You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has never acknowledged You, I have known You [continually]; and these men understand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know that You have sent Me.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have made Your Name known to them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revealed Your character '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Your very Self, and I will continue to make [You] known, that the love which You have bestowed upon Me may be in them [felt in their hearts] and that I [Myself] may be in them.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And this is eternal life: [it means] to know (to perceive, recognize, become acquainted with, and understand) You, the only true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' real God, and [likewise] to know Him, Jesus [as the] Christ (the Anointed One, the Messiah), Whom You have sent.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have glorified You down here on the earth by completing the work that You gave Me to do.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And now, Father, glorify Me along with Yourself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restore Me to such majesty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor in Your presence as I had with You before the world existed.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I have manifested Your Name [I have revealed Your very Self, Your real Self] to the people whom You have given Me out of the world. They were Yours, and You gave them to Me, and they have obeyed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kept Your word.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Now [at last] they know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand that all You have given Me belongs to You [is really and truly Yours].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For the [uttered] words that You gave Me I have given them; and they have received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accepted [them] and have come to know positively '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in reality [to believe with absolute assurance] that I came forth from Your presence, and they have believed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are convinced that You did send Me.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' I am praying for them. I am not praying (requesting) for the world, but for those You have given Me, for they belong to You.'
