document_id: LUK.23,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THEN THE whole assembly of them got up and conducted [Jesus] before Pilate.'
  '10':
  - type: text
    content: ' Meanwhile, the chief priests and the scribes stood by, continuing vehemently '
  - type: text
    content: and
  - type: text
    content: ' violently to accuse Him.'
  '11':
  - type: text
    content: ' And Herod, with his soldiers, treated Him with contempt and scoffed at '
  - type: text
    content: and
  - type: text
    content: ' ridiculed Him; then, dressing Him up in bright '
  - type: text
    content: and
  - type: text
    content: ' gorgeous apparel, he sent Him back to Pilate. [Isa. 53:8.]'
  '12':
  - type: text
    content: ' And that very day Herod and Pilate became friends with each other–[though] they had been at enmity before this.'
  '13':
  - type: text
    content: ' Pilate then called together the chief priests and the rulers and the people,'
  '14':
  - type: text
    content: ' And said to them, You brought this Man before me as One Who was perverting '
  - type: text
    content: and
  - type: text
    content: ' misleading '
  - type: text
    content: and
  - type: text
    content: ' turning away '
  - type: text
    content: and
  - type: text
    content: ' corrupting the people; and behold, after examining Him before you, I have not found any offense (crime or guilt) in this Man in regard to your accusations against Him;'
  '15':
  - type: text
    content: ' No, nor indeed did Herod, for he sent Him back to us; behold, He has done nothing deserving of death.'
  '16':
  - type: text
    content: ' I will therefore chastise Him '
  - type: text
    content: and
  - type: text
    content: ' deliver Him amended (reformed, taught His lesson) and release Him.'
  '17':
  - type: text
    content: ' '
  - type: text
    content: For it was necessary for him to release to them one prisoner at the Feast.
  '18':
  - type: text
    content: ' But they all together raised a deep cry [from the depths of their throats], saying, Away with this Man! Release to us Barabbas!'
  '19':
  - type: text
    content: ' He was a man who had been thrown into prison for raising a riot in the city, and for murder.'
  '2':
  - type: text
    content: ' And they began to accuse Him, asserting, We found this Man perverting (misleading, corrupting, and turning away) our nation and forbidding to pay tribute to Caesar, saying that He Himself is Christ (the Messiah, the Anointed One), a King!'
  '20':
  - type: text
    content: ' Once more Pilate called to them, wishing to release Jesus;'
  '21':
  - type: text
    content: ' But they kept shouting out, Crucify, crucify Him!'
  '22':
  - type: text
    content: ' A third time he said to them, Why? What wrong has He done? I have found [no offense or crime or guilt] in Him nothing deserving of death; I will therefore chastise Him [in order to teach Him better] and release Him.'
  '23':
  - type: text
    content: ' But they were insistent '
  - type: text
    content: and
  - type: text
    content: ' urgent, demanding with loud cries that He should be crucified. And their voices prevailed (accomplished their purpose).'
  '24':
  - type: text
    content: ' And Pilate gave sentence, that what they asked should be done.'
  '25':
  - type: text
    content: ' So he released the man who had been thrown into prison for riot and murder, for whom they continued to ask, but Jesus he delivered up to be done with as they willed.'
  '26':
  - type: text
    content: ' And as they led Him away, they seized one Simon of Cyrene, who was coming in from the country, and laid on him the cross and made him carry it behind Jesus.'
  '27':
  - type: text
    content: ' And there accompanied [Jesus] a great multitude of the people, [including] women who bewailed and lamented Him.'
  '28':
  - type: text
    content: ' But Jesus, turning toward them, said, Daughters of Jerusalem, do not weep for Me, but weep for yourselves and for your children.'
  '29':
  - type: text
    content: ' For behold, the days are coming during which they will say, Blessed (happy, fortunate, and to be envied) are the barren, and the wombs that have not borne, and the breasts that have never nursed [babies]!'
  '3':
  - type: text
    content: ' So Pilate asked Him, Are You the King of the Jews? And He answered him, [It is just as] you say. [I AM.]'
  '30':
  - type: text
    content: ' Then they will begin to say to the mountains, Fall on us! and to the hills, Cover (conceal, hide) us!'
  '31':
  - type: text
    content: ' For if they do these things when the timber is green, what will happen when it is dry?'
  '32':
  - type: text
    content: ' Two others also, who were criminals, were led away to be executed with Him. [Isa. 53:12.]'
  '33':
  - type: text
    content: ' And when they came to the place which is called The Skull [Latin: Calvary; Hebrew: Golgotha], there they crucified Him, and [along with] the criminals, one on the right and one on the left.'
  '34':
  - type: text
    content: ' And Jesus prayed, Father, forgive them, for they know not what they do. And they divided His garments '
  - type: text
    content: and
  - type: text
    content: ' distributed them by casting lots for them. [Ps. 22:18.]'
  '35':
  - type: text
    content: ' Now the people stood by [calmly and leisurely] watching; but the rulers scoffed '
  - type: text
    content: and
  - type: text
    content: ' sneered (turned up their noses) at Him, saying, He rescued others [from death]; let Him now rescue Himself, if He is the Christ (the Messiah) of God, His Chosen One!'
  '36':
  - type: text
    content: ' The soldiers also ridiculed '
  - type: text
    content: and
  - type: text
    content: ' made sport of Him, coming up and offering Him vinegar (a sour wine mixed with water) [Ps. 69:21.]'
  '37':
  - type: text
    content: ' And saying, If you are the King of the Jews, save (rescue) Yourself [from death].'
  '38':
  - type: text
    content: ' For there was also an inscription above Him '
  - type: text
    content: in letters of Greek and Latin and Hebrew
  - type: text
    content: ': This is the King of the Jews.'
  '39':
  - type: text
    content: ' One of the criminals who was suspended kept up a railing at Him, saying, Are You not the Christ (the Messiah)? Rescue Yourself and us [from death]!'
  '4':
  - type: text
    content: ' And Pilate said to the chief priests and the throngs, I find no guilt '
  - type: text
    content: or
  - type: text
    content: ' crime in this Man.'
  '40':
  - type: text
    content: ' But the other one reproved him, saying, Do you not even fear God, seeing you yourself are under the same sentence of condemnation '
  - type: text
    content: and
  - type: text
    content: ' suffering the same penalty?'
  '41':
  - type: text
    content: ' And we indeed suffer it justly, receiving the due reward of our actions; but this Man has done nothing out of the way [nothing strange or eccentric or perverse or unreasonable].'
  '42':
  - type: text
    content: ' Then he said to Jesus, '
  - type: text
    content: Lord,
  - type: text
    content: ' remember me when You come in Your kingly glory!'
  '43':
  - type: text
    content: ' And He answered him, Truly I tell you, today you shall be with Me in Paradise.'
  '44':
  - type: text
    content: ' It was now about the sixth hour (midday), and darkness enveloped the whole land '
  - type: text
    content: and
  - type: text
    content: ' earth until the ninth hour (about three o''clock in the afternoon),'
  '45':
  - type: text
    content: ' While the sun''s light faded '
  - type: text
    content: or
  - type: text
    content: ' '
  - type: text
    content: was darkened
  - type: text
    content: ; and the curtain [of the Holy of Holies] of the temple was torn in two. [Exod. 26:31-35.]
  '46':
  - type: text
    content: ' And Jesus, crying out with a loud voice, said, Father, into Your hands I commit My spirit! And with these words, He expired. [Ps. 31:5.]'
  '47':
  - type: text
    content: ' Now the centurion, having seen what had taken place, recognized God '
  - type: text
    content: and
  - type: text
    content: ' thanked '
  - type: text
    content: and
  - type: text
    content: ' praised Him, and said, Indeed, without question, this Man was upright (just and innocent)!'
  '48':
  - type: text
    content: ' And all the throngs that had gathered to see this spectacle, when they saw what had taken place, returned to their homes, beating their breasts.'
  '49':
  - type: text
    content: ' And all the acquaintances of [Jesus] and the women who had followed Him from Galilee stood at a distance and watched these things.'
  '5':
  - type: text
    content: ' But they were urgent '
  - type: text
    content: and
  - type: text
    content: ' emphatic, saying, He stirs up '
  - type: text
    content: and
  - type: text
    content: ' excites the people, teaching throughout all Judea–from Galilee, where He began, even to this place.'
  '50':
  - type: text
    content: ' Now notice, there was a man named Joseph from the Jewish town of Arimathea. He was a member of the council (the Sanhedrin), and a good (upright, advantageous) man, and righteous (in right standing with God and man),'
  '51':
  - type: text
    content: ' Who had not agreed with '
  - type: text
    content: or
  - type: text
    content: ' assented to the purpose and action of the others; and he was expecting '
  - type: text
    content: and
  - type: text
    content: ' waiting for the kingdom of God.'
  '52':
  - type: text
    content: ' This man went to Pilate and asked for the body of Jesus.'
  '53':
  - type: text
    content: ' Then he took it down and rolled it up in a linen cloth for swathing dead bodies and laid Him in a rock-hewn tomb, where no one had ever yet been laid.'
  '54':
  - type: text
    content: ' It was the day of Preparation [for the Sabbath], and the Sabbath was dawning (approaching).'
  '55':
  - type: text
    content: ' The women who had come with [Jesus] from Galilee followed closely and saw the tomb and how His body was laid.'
  '56':
  - type: text
    content: ' Then they went back and made ready spices and ointments (perfumes). On the Sabbath day they rested in accordance with the commandment. [Exod. 12:16; 20:10.]'
  '6':
  - type: text
    content: ' Upon hearing this, Pilate asked whether the Man was a Galilean.'
  '7':
  - type: text
    content: ' And when he found out [certainly] that He belonged to Herod''s jurisdiction, he sent Him up to Herod [a higher authority], who was also in Jerusalem in those days.'
  '8':
  - type: text
    content: ' Now when Herod saw Jesus, he was exceedingly glad, for he had eagerly desired to see Him for a long time because of what he had heard concerning Him, and he was hoping to witness some sign (some striking evidence or spectacular performance) done by Him.'
  '9':
  - type: text
    content: ' So he asked Him many questions, but He made no reply. [Isa. 53:7.]'
