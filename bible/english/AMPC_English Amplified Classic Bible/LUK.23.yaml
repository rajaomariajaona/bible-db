document_id: LUK.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN THE whole assembly of them got up and conducted [Jesus] before Pilate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And they began to accuse Him, asserting, We found this Man perverting (misleading, corrupting, and turning away) our nation and forbidding to pay tribute to Caesar, saying that He Himself is Christ (the Messiah, the Anointed One), a King!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So Pilate asked Him, Are You the King of the Jews? And He answered him, [It is just as] you say. [I AM.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And Pilate said to the chief priests and the throngs, I find no guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' crime in this Man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' But they were urgent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' emphatic, saying, He stirs up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excites the people, teaching throughout all Judea–from Galilee, where He began, even to this place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Upon hearing this, Pilate asked whether the Man was a Galilean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And when he found out [certainly] that He belonged to Herod''s jurisdiction, he sent Him up to Herod [a higher authority], who was also in Jerusalem in those days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now when Herod saw Jesus, he was exceedingly glad, for he had eagerly desired to see Him for a long time because of what he had heard concerning Him, and he was hoping to witness some sign (some striking evidence or spectacular performance) done by Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' So he asked Him many questions, but He made no reply. [Isa. 53:7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Meanwhile, the chief priests and the scribes stood by, continuing vehemently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violently to accuse Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Herod, with his soldiers, treated Him with contempt and scoffed at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ridiculed Him; then, dressing Him up in bright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gorgeous apparel, he sent Him back to Pilate. [Isa. 53:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And that very day Herod and Pilate became friends with each other–[though] they had been at enmity before this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Pilate then called together the chief priests and the rulers and the people,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And said to them, You brought this Man before me as One Who was perverting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' misleading '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turning away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' corrupting the people; and behold, after examining Him before you, I have not found any offense (crime or guilt) in this Man in regard to your accusations against Him;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' No, nor indeed did Herod, for he sent Him back to us; behold, He has done nothing deserving of death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' I will therefore chastise Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliver Him amended (reformed, taught His lesson) and release Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: For it was necessary for him to release to them one prisoner at the Feast.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But they all together raised a deep cry [from the depths of their throats], saying, Away with this Man! Release to us Barabbas!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' He was a man who had been thrown into prison for raising a riot in the city, and for murder.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Once more Pilate called to them, wishing to release Jesus;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' But they kept shouting out, Crucify, crucify Him!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' A third time he said to them, Why? What wrong has He done? I have found [no offense or crime or guilt] in Him nothing deserving of death; I will therefore chastise Him [in order to teach Him better] and release Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But they were insistent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' urgent, demanding with loud cries that He should be crucified. And their voices prevailed (accomplished their purpose).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Pilate gave sentence, that what they asked should be done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' So he released the man who had been thrown into prison for riot and murder, for whom they continued to ask, but Jesus he delivered up to be done with as they willed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' And as they led Him away, they seized one Simon of Cyrene, who was coming in from the country, and laid on him the cross and made him carry it behind Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And there accompanied [Jesus] a great multitude of the people, [including] women who bewailed and lamented Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' But Jesus, turning toward them, said, Daughters of Jerusalem, do not weep for Me, but weep for yourselves and for your children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' For behold, the days are coming during which they will say, Blessed (happy, fortunate, and to be envied) are the barren, and the wombs that have not borne, and the breasts that have never nursed [babies]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Then they will begin to say to the mountains, Fall on us! and to the hills, Cover (conceal, hide) us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' For if they do these things when the timber is green, what will happen when it is dry?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Two others also, who were criminals, were led away to be executed with Him. [Isa. 53:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And when they came to the place which is called The Skull [Latin: Calvary; Hebrew: Golgotha], there they crucified Him, and [along with] the criminals, one on the right and one on the left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And Jesus prayed, Father, forgive them, for they know not what they do. And they divided His garments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distributed them by casting lots for them. [Ps. 22:18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' Now the people stood by [calmly and leisurely] watching; but the rulers scoffed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sneered (turned up their noses) at Him, saying, He rescued others [from death]; let Him now rescue Himself, if He is the Christ (the Messiah) of God, His Chosen One!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The soldiers also ridiculed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made sport of Him, coming up and offering Him vinegar (a sour wine mixed with water) [Ps. 69:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And saying, If you are the King of the Jews, save (rescue) Yourself [from death].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' For there was also an inscription above Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in letters of Greek and Latin and Hebrew
  - type: text
    text: ': This is the King of the Jews.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' One of the criminals who was suspended kept up a railing at Him, saying, Are You not the Christ (the Messiah)? Rescue Yourself and us [from death]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' But the other one reproved him, saying, Do you not even fear God, seeing you yourself are under the same sentence of condemnation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffering the same penalty?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' And we indeed suffer it justly, receiving the due reward of our actions; but this Man has done nothing out of the way [nothing strange or eccentric or perverse or unreasonable].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' Then he said to Jesus, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Lord,
  - type: text
    text: ' remember me when You come in Your kingly glory!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' And He answered him, Truly I tell you, today you shall be with Me in Paradise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' It was now about the sixth hour (midday), and darkness enveloped the whole land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' earth until the ninth hour (about three o''clock in the afternoon),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' While the sun''s light faded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was darkened
  - type: text
    text: ; and the curtain [of the Holy of Holies] of the temple was torn in two. [Exod. 26:31-35.]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' And Jesus, crying out with a loud voice, said, Father, into Your hands I commit My spirit! And with these words, He expired. [Ps. 31:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' Now the centurion, having seen what had taken place, recognized God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praised Him, and said, Indeed, without question, this Man was upright (just and innocent)!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' And all the throngs that had gathered to see this spectacle, when they saw what had taken place, returned to their homes, beating their breasts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' And all the acquaintances of [Jesus] and the women who had followed Him from Galilee stood at a distance and watched these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' Now notice, there was a man named Joseph from the Jewish town of Arimathea. He was a member of the council (the Sanhedrin), and a good (upright, advantageous) man, and righteous (in right standing with God and man),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' Who had not agreed with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' assented to the purpose and action of the others; and he was expecting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' waiting for the kingdom of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' This man went to Pilate and asked for the body of Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' Then he took it down and rolled it up in a linen cloth for swathing dead bodies and laid Him in a rock-hewn tomb, where no one had ever yet been laid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' It was the day of Preparation [for the Sabbath], and the Sabbath was dawning (approaching).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' The women who had come with [Jesus] from Galilee followed closely and saw the tomb and how His body was laid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' Then they went back and made ready spices and ointments (perfumes). On the Sabbath day they rested in accordance with the commandment. [Exod. 12:16; 20:10.]'
