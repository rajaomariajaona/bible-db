document_id: NUM.16,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW KORAH son of Izhar, the son of Kohath, the son of Levi, with Dathan and Abiram sons of Eliab, and On son of Peleth, sons of Reuben, took men,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And that He has brought you near to Him, and all your brethren the sons of Levi with you? Would you seek the priesthood also?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' Therefore you and all your company are gathered together against the Lord. And Aaron, what is he that you murmur against him?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And Moses sent to call Dathan and Abiram, the sons of Eliab, and they said, We will not come up.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Is it a small thing that you have brought us up out of a land flowing with milk and honey to kill us in the wilderness, but you must also make yourself a prince over us?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' Moreover, you have not brought us into a land that flows with milk and honey or given us an inheritance of fields and vineyards. Will you bore out the eyes of these men? We will not come up!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' And Moses was very angry and said to the Lord, Do not respect their offering! I have not taken one donkey from them, nor have I hurt one of them.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And Moses said to Korah, You and all your company be before the Lord tomorrow, you and they and Aaron.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' And let every man take his censer and put incense upon it and bring before the Lord every man his censer, 250 censers; you also and Aaron, each his censer.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' So they took every man his censer, and they put fire in them and laid incense upon it, and they stood at the entrance of the Tent of Meeting with Moses and Aaron.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' Then Korah assembled all the congregation against Moses and Aaron before the entrance of the Tent of Meeting, and the glory of the Lord appeared to all the congregation.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And they rose up before Moses, with certain of the Israelites, 250 princes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leaders of the congregation called to the assembly, men well known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of distinction.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' And the Lord said to Moses and Aaron,'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Separate yourselves from among this congregation, that I may consume them in a moment.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' And they fell upon their faces, and said, O God, the God of the spirits of all flesh, shall one man sin and will You be angry with all the congregation?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And the Lord said to Moses,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Say to the congregation, Get away from around the tents of Korah, Dathan, and Abiram.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' Then Moses rose up and went to Dathan and Abiram, and the elders of Israel followed him.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And he said to the congregation, Depart, I pray you, from the tents of these wicked men, and touch nothing of theirs, lest you be consumed in all their sins.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' So they got away from around the tents of Korah, Dathan, and Abiram. And Dathan and Abiram came out and stood in the door of their tents with their wives, and their sons, and their little ones.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' And Moses said, By this you shall know that the Lord has sent me to do all these works, for I do not act of my own accord:'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' If these men die the common death of all men or if [only] what happens to everyone happens to them, then the Lord has not sent me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' And they gathered together against Moses and Aaron, and said to them, [Enough of you!] You take too much upon yourselves, seeing that all the congregation is holy, every one of them, and the Lord is among them. Why then do you lift yourselves up above the assembly of the Lord?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' But if the Lord causes a new thing [to happen], and the earth opens its mouth and swallows them up, with all that belongs to them, and they go down alive into Sheol (the place of the dead), then you shall understand that these men have provoked (spurned, despised) the Lord!'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' As soon as he stopped speaking, the ground under the offenders split apart'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' And the earth opened its mouth and swallowed them and their households and [Korah and] all [his] men and all their possessions. [Num. 26:10, 11.]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' They and all that belonged to them went down alive into Sheol (the place of the dead); and the earth closed upon them, and they perished from among the assembly.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' And all Israel who were round about them fled at their cry, for they said, Lest the earth swallow us up also.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' And fire came forth from the Lord and devoured the 250 men who offered the incense.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' And the Lord said to Moses,'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' Speak to Eleazar son of Aaron, the priest, that he take up the censers out of the burning and scatter the fire at a distance. For the censers are hallowed–'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' The censers of these men who have sinned against themselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' at the cost of their own lives. Let the censers be made into hammered plates for a covering of the altar [of burnt offering], for they were used in offering before the Lord and therefore they are sacred. They shall be a sign [of warning] to the Israelites.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' Eleazar the priest took the bronze censers with which the Levites who were burned had offered incense, and they were hammered into broad sheets for a covering of the [brazen] altar [of burnt offering],'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' And when Moses heard it, he fell upon his face.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' To be a memorial [a warning forever] to the Israelites, so that no outsider, that is, no one not of the descendants of Aaron, should come near to offer incense before the Lord, lest he become as Korah and as his company, as the Lord said to Eleazar through Moses.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' But on the morrow all the congregation of the Israelites murmured against Moses and Aaron, saying, You have killed the people of the Lord.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' When the congregation was gathered against Moses and Aaron, they looked at the Tent of Meeting, and behold, the cloud covered it and they saw the Lord''s glory.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' And Moses and Aaron came to the front of the Tent of Meeting.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' And the Lord said to Moses,'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' Get away from among this congregation, that I may consume them in a moment. And Moses and Aaron fell on their faces.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' And Moses said to Aaron, Take a censer and put fire in it from off the altar and lay incense on it, and carry it quickly to the congregation and make atonement for them. For there is wrath gone out from the Lord; the plague has begun!'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' So Aaron took the burning censer as Moses commanded, and ran into the midst of the congregation; and behold, the plague was begun among the people; and he put on the incense and made atonement for the people.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: ' And he stood between the dead and the living, and the plague was stayed.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: ' Now those who died in the plague were 14,700, besides those who died in the matter of Korah.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And he said to Korah and all his company, In the morning the Lord will show who are His and who is holy, and will cause him to come near to Him; him whom He has chosen will He cause to come near to Him. [II Tim. 2:19.]'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ' And Aaron returned to Moses to the door of the Tent of Meeting, since the plague was stayed.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Do this: Take censers, Korah and all your company,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And put fire in them and put incense upon them before the Lord tomorrow; and the man whom the Lord chooses shall be holy. You take too much upon yourselves, you sons of Levi.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' And Moses said to Korah, Hear, I pray you, you sons of Levi:'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Does it seem but a small thing to you that the God of Israel has separated you from the congregation of Israel, to bring you near to Himself to do the service of the tabernacle of the Lord and to stand before the congregation to minister to them,'
