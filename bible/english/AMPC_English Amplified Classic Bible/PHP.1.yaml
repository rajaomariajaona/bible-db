document_id: PHP.1,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' PAUL AND Timothy, bond servants of Christ Jesus (the Messiah), to all the saints (God''s consecrated people) in Christ Jesus who are at Philippi, with the bishops (overseers) and deacons (assistants):'
  '10':
  - type: text
    content: ' So that you may surely learn to sense what is vital, '
  - type: text
    content: and
  - type: text
    content: ' approve '
  - type: text
    content: and
  - type: text
    content: ' prize what is excellent '
  - type: text
    content: and
  - type: text
    content: ' of real value [recognizing the highest and the best, and distinguishing the moral differences], and that you may be untainted '
  - type: text
    content: and
  - type: text
    content: ' pure and unerring '
  - type: text
    content: and
  - type: text
    content: ' blameless [so that with hearts sincere and certain and unsullied, you may approach] the day of Christ [not stumbling '
  - type: text
    content: nor
  - type: text
    content: ' causing others to stumble].'
  '11':
  - type: text
    content: ' May you abound in '
  - type: text
    content: and
  - type: text
    content: ' be filled with the fruits of righteousness (of right standing with God and right doing) which come through Jesus Christ (the Anointed One), to the honor and praise of God [that His glory may be both manifested and recognized].'
  '12':
  - type: text
    content: ' Now I want you to know '
  - type: text
    content: and
  - type: text
    content: ' continue to rest assured, brethren, that what [has happened] to me [this imprisonment] has actually only served to advance '
  - type: text
    content: and
  - type: text
    content: ' give a renewed impetus to the [spreading of the] good news (the Gospel).'
  '13':
  - type: text
    content: ' So much is this a fact that throughout the whole imperial guard and to all the rest [here] my imprisonment has become generally known to be in Christ [that I am a prisoner in His service and for Him].'
  '14':
  - type: text
    content: ' And [also] most of the brethren have derived fresh confidence in the Lord because of my chains and are much more bold to speak '
  - type: text
    content: and
  - type: text
    content: ' publish fearlessly the Word of God [acting with more freedom and indifference to the consequences].'
  '15':
  - type: text
    content: ' Some, it is true, [actually] preach Christ (the Messiah) [for no better reason than] out of envy and rivalry (party spirit), but others are doing so out of a loyal spirit '
  - type: text
    content: and
  - type: text
    content: ' goodwill.'
  '16':
  - type: text
    content: ' The latter [proclaim Christ] out of love, because they recognize '
  - type: text
    content: and
  - type: text
    content: ' know that I am [providentially] put here for the defense of the good news (the Gospel).'
  '17':
  - type: text
    content: ' But the former preach Christ out of a party spirit, insincerely [out of no pure motive, but thinking to annoy me], supposing they are making my bondage more bitter '
  - type: text
    content: and
  - type: text
    content: ' my chains more galling.'
  '18':
  - type: text
    content: ' But what does it matter, so long as either way, whether in pretense [for personal ends] or in all honesty [for the furtherance of the Truth], Christ is being proclaimed? And in that I [now] rejoice, yes, and I shall rejoice [hereafter] also.'
  '19':
  - type: text
    content: ' For I am well assured '
  - type: text
    content: and
  - type: text
    content: ' indeed know that through your prayers and a bountiful supply of the Spirit of Jesus Christ (the Messiah) this will turn out for my preservation (for the spiritual health and welfare of my own soul) '
  - type: text
    content: and
  - type: text
    content: ' avail toward the saving work of the Gospel.'
  '2':
  - type: text
    content: ' Grace (favor and blessing) to you and [heart] peace from God our Father and the Lord Jesus Christ (the Messiah).'
  '20':
  - type: text
    content: ' This is in keeping with my own eager desire '
  - type: text
    content: and
  - type: text
    content: ' persistent expectation '
  - type: text
    content: and
  - type: text
    content: ' hope, that I shall not disgrace myself '
  - type: text
    content: nor
  - type: text
    content: ' be put to shame in anything; but that with the utmost freedom of speech '
  - type: text
    content: and
  - type: text
    content: ' unfailing courage, now as always heretofore, Christ (the Messiah) will be magnified '
  - type: text
    content: and
  - type: text
    content: ' get glory '
  - type: text
    content: and
  - type: text
    content: ' praise in this body of mine '
  - type: text
    content: and
  - type: text
    content: ' be boldly exalted in my person, whether through (by) life or through (by) death.'
  '21':
  - type: text
    content: ' For me to live is Christ [His life in me], and to die is gain [the gain of the glory of eternity].'
  '22':
  - type: text
    content: ' If, however, it is to be life in the flesh '
  - type: text
    content: and
  - type: text
    content: ' I am to live on here, that means fruitful service for me; so I can say nothing as to my personal preference [I cannot choose],'
  '23':
  - type: text
    content: ' But I am hard pressed between the two. My yearning desire is to depart (to be free of this world, to set forth) and be with Christ, for that is far, far better;'
  '24':
  - type: text
    content: ' But to remain in my body is more needful '
  - type: text
    content: and
  - type: text
    content: ' essential for your sake.'
  '25':
  - type: text
    content: ' Since I am convinced of this, I know that I shall remain and stay by you all, to promote your progress and joy in believing,'
  '26':
  - type: text
    content: ' So that in me you may have abundant cause for exultation '
  - type: text
    content: and
  - type: text
    content: ' glorying in Christ Jesus, through my coming to you again.'
  '27':
  - type: text
    content: ' Only be sure as citizens so to conduct yourselves [that] your manner of life [will be] worthy of the good news (the Gospel) of Christ, so that whether I [do] come and see you or am absent, I may hear this of you: that you are standing firm in united spirit '
  - type: text
    content: and
  - type: text
    content: ' purpose, striving side by side '
  - type: text
    content: and
  - type: text
    content: ' contending with a single mind for the faith of the glad tidings (the Gospel).'
  '28':
  - type: text
    content: ' And do not [for a moment] be frightened '
  - type: text
    content: or
  - type: text
    content: ' intimidated in anything by your opponents '
  - type: text
    content: and
  - type: text
    content: ' adversaries, for such [constancy and fearlessness] will be a clear sign (proof and seal) to them of [their impending] destruction, but [a sure token and evidence] of your deliverance '
  - type: text
    content: and
  - type: text
    content: ' salvation, and that from God.'
  '29':
  - type: text
    content: ' For you have been granted [the privilege] for Christ''s sake not only to believe in (adhere to, rely on, and trust in) Him, but also to suffer in His behalf.'
  '3':
  - type: text
    content: ' I thank my God in all my remembrance of you.'
  '30':
  - type: text
    content: ' So you are engaged in the same conflict which you saw me [wage] and which you now hear to be mine [still].'
  '4':
  - type: text
    content: ' In every prayer of mine I always make my entreaty '
  - type: text
    content: and
  - type: text
    content: ' petition for you all with joy (delight).'
  '5':
  - type: text
    content: ' [I thank my God] for your fellowship (your sympathetic cooperation and contributions and partnership) in advancing the good news (the Gospel) from the first day [you heard it] until now.'
  '6':
  - type: text
    content: ' And I am convinced '
  - type: text
    content: and
  - type: text
    content: ' sure of this very thing, that He Who began a good work in you will continue until the day of Jesus Christ [right up to the time of His return], developing [that good work] '
  - type: text
    content: and
  - type: text
    content: ' perfecting '
  - type: text
    content: and
  - type: text
    content: ' bringing it to full completion in you.'
  '7':
  - type: text
    content: ' It is right '
  - type: text
    content: and
  - type: text
    content: ' appropriate for me to have this confidence '
  - type: text
    content: and
  - type: text
    content: ' feel this way about you all, because you have me in your heart '
  - type: text
    content: and
  - type: text
    content: ' I hold you in my heart as partakers '
  - type: text
    content: and
  - type: text
    content: ' sharers, one '
  - type: text
    content: and
  - type: text
    content: ' all with me, of grace (God''s unmerited favor and spiritual blessing). [This is true] both when I am shut up in prison and when I am out in the defense and confirmation of the good news (the Gospel).'
  '8':
  - type: text
    content: ' For God is my witness how I long for '
  - type: text
    content: and
  - type: text
    content: ' pursue you all with love, in the tender mercy of Christ Jesus [Himself]!'
  '9':
  - type: text
    content: ' And this I pray: that your love may abound yet more and more '
  - type: text
    content: and
  - type: text
    content: ' extend to its fullest development in knowledge and all keen insight [that your love may display itself in greater depth of acquaintance and more comprehensive discernment],'
