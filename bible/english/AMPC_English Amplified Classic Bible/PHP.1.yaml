document_id: PHP.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PAUL AND Timothy, bond servants of Christ Jesus (the Messiah), to all the saints (God''s consecrated people) in Christ Jesus who are at Philippi, with the bishops (overseers) and deacons (assistants):'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Grace (favor and blessing) to you and [heart] peace from God our Father and the Lord Jesus Christ (the Messiah).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' I thank my God in all my remembrance of you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' In every prayer of mine I always make my entreaty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' petition for you all with joy (delight).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [I thank my God] for your fellowship (your sympathetic cooperation and contributions and partnership) in advancing the good news (the Gospel) from the first day [you heard it] until now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And I am convinced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sure of this very thing, that He Who began a good work in you will continue until the day of Jesus Christ [right up to the time of His return], developing [that good work] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perfecting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bringing it to full completion in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' It is right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appropriate for me to have this confidence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feel this way about you all, because you have me in your heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I hold you in my heart as partakers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sharers, one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' all with me, of grace (God''s unmerited favor and spiritual blessing). [This is true] both when I am shut up in prison and when I am out in the defense and confirmation of the good news (the Gospel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For God is my witness how I long for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pursue you all with love, in the tender mercy of Christ Jesus [Himself]!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And this I pray: that your love may abound yet more and more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extend to its fullest development in knowledge and all keen insight [that your love may display itself in greater depth of acquaintance and more comprehensive discernment],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' So that you may surely learn to sense what is vital, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' approve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prize what is excellent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of real value [recognizing the highest and the best, and distinguishing the moral differences], and that you may be untainted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pure and unerring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blameless [so that with hearts sincere and certain and unsullied, you may approach] the day of Christ [not stumbling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' causing others to stumble].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' May you abound in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be filled with the fruits of righteousness (of right standing with God and right doing) which come through Jesus Christ (the Anointed One), to the honor and praise of God [that His glory may be both manifested and recognized].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Now I want you to know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continue to rest assured, brethren, that what [has happened] to me [this imprisonment] has actually only served to advance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give a renewed impetus to the [spreading of the] good news (the Gospel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So much is this a fact that throughout the whole imperial guard and to all the rest [here] my imprisonment has become generally known to be in Christ [that I am a prisoner in His service and for Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And [also] most of the brethren have derived fresh confidence in the Lord because of my chains and are much more bold to speak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' publish fearlessly the Word of God [acting with more freedom and indifference to the consequences].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Some, it is true, [actually] preach Christ (the Messiah) [for no better reason than] out of envy and rivalry (party spirit), but others are doing so out of a loyal spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goodwill.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The latter [proclaim Christ] out of love, because they recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that I am [providentially] put here for the defense of the good news (the Gospel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But the former preach Christ out of a party spirit, insincerely [out of no pure motive, but thinking to annoy me], supposing they are making my bondage more bitter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my chains more galling.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But what does it matter, so long as either way, whether in pretense [for personal ends] or in all honesty [for the furtherance of the Truth], Christ is being proclaimed? And in that I [now] rejoice, yes, and I shall rejoice [hereafter] also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' For I am well assured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indeed know that through your prayers and a bountiful supply of the Spirit of Jesus Christ (the Messiah) this will turn out for my preservation (for the spiritual health and welfare of my own soul) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avail toward the saving work of the Gospel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' This is in keeping with my own eager desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persistent expectation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope, that I shall not disgrace myself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' be put to shame in anything; but that with the utmost freedom of speech '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unfailing courage, now as always heretofore, Christ (the Messiah) will be magnified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' get glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise in this body of mine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be boldly exalted in my person, whether through (by) life or through (by) death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' For me to live is Christ [His life in me], and to die is gain [the gain of the glory of eternity].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' If, however, it is to be life in the flesh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I am to live on here, that means fruitful service for me; so I can say nothing as to my personal preference [I cannot choose],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But I am hard pressed between the two. My yearning desire is to depart (to be free of this world, to set forth) and be with Christ, for that is far, far better;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But to remain in my body is more needful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' essential for your sake.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Since I am convinced of this, I know that I shall remain and stay by you all, to promote your progress and joy in believing,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' So that in me you may have abundant cause for exultation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorying in Christ Jesus, through my coming to you again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Only be sure as citizens so to conduct yourselves [that] your manner of life [will be] worthy of the good news (the Gospel) of Christ, so that whether I [do] come and see you or am absent, I may hear this of you: that you are standing firm in united spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose, striving side by side '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contending with a single mind for the faith of the glad tidings (the Gospel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And do not [for a moment] be frightened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' intimidated in anything by your opponents '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' adversaries, for such [constancy and fearlessness] will be a clear sign (proof and seal) to them of [their impending] destruction, but [a sure token and evidence] of your deliverance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' salvation, and that from God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' For you have been granted [the privilege] for Christ''s sake not only to believe in (adhere to, rely on, and trust in) Him, but also to suffer in His behalf.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' So you are engaged in the same conflict which you saw me [wage] and which you now hear to be mine [still].'
