document_id: JOB.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEN JOB answered and said,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Yes, I know it is true. But how can mortal man be right before God?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' If one should want to contend with Him, he cannot answer one [of His questions] in a thousand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [God] is wise in heart and mighty in strength; who has [ever] hardened himself against Him and prospered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' even been safe?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [God] Who removes the mountains, and they know it not when He overturns them in His anger;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Who shakes the earth out of its place, and the pillars of it tremble;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Who commands the sun, and it rises not; Who seals up the stars [from view];'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Who alone stretches out the heavens and treads upon the waves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' high places of the sea;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Who made [the constellations] the Bear, Orion, and the [loose cluster] Pleiades, and the [vast starry] spaces of the south;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Who does great things past finding out, yes, marvelous things without number.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Behold, He goes by me, and I see Him not; He passes on also, but I perceive Him not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Behold, He snatches away; who can hinder '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' turn Him back? Who will say to Him, What are You doing?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' God will not withdraw His anger; the [proud] helpers of Rahab [arrogant monster of the sea] bow under Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' How much less shall I answer Him, choosing out my words to reason with Him'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Whom, though I were righteous (upright and innocent) yet I could not answer? I must appeal for mercy to my Opponent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Judge [for my right].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' If I called and He answered me, yet would I not believe that He listened to my voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For He overwhelms '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' breaks me with a tempest and multiplies my wounds without cause.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' He will not allow me to catch my breath, but fills me with bitterness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' If I speak of strength, behold, He is mighty! And if of justice, Who, says He, will summon Me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Though I am innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in the right, my own mouth would condemn me; though I am blameless, He would prove me perverse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Though I am blameless, I regard not myself; I despise my life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' It is all one; therefore I say, God [does not discriminate, but] destroys the blameless and the wicked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' When [His] scourge slays suddenly, He mocks at the calamity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trial of the innocent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The earth is given into the hands of the wicked; He covers the faces of its judges [so that they are blinded to justice]. If it is not [God], who then is it [responsible for all this inequality]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Now my days are swifter than a runner; they flee away, they see no good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' They are passed away like the swift rowboats made of reeds, or like the eagle that swoops down on the prey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' If I say, I will forget my complaint, I will put off my sad countenance, and be of good cheer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brighten up,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' I become afraid of all my pains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sorrows [yet to come], for I know You will not pronounce me innocent [by removing them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' I shall be held guilty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be condemned; why then should I labor in vain [to appear innocent]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' If I wash myself with snow and cleanse my hands with lye,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Yet You will plunge me into the ditch, and my own clothes will abhor me [and refuse to cover so foul a body].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' For [God] is not a [mere] man, as I am, that I should answer Him, that we should come together in court.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' There is no umpire between us, who might lay his hand upon us both, [would that there were!] [I Tim. 2:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' That He might take His rod away from [threatening] me, and that the fear of Him might not terrify me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' [Then] would I speak and not fear Him, but I am not so in myself [to make me afraid, were only a fair trial given me].'
