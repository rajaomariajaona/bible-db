document_id: EXO.10
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, Go to Pharaoh, for I have made his heart hard, and his servants'' hearts, that I might show these My signs [of divine power] before him,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And that you may recount in the ears of your son and of your grandson what I have done in derision of the Egyptians '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' what things I have [repeatedly] done there–My signs [of divine power] done among them–that you may recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that I am the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So Moses and Aaron went to Pharaoh, and said to him, Thus says the Lord, the God of the Hebrews, How long will you refuse to humble yourself before Me? Let My people go, that they may serve Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For if you refuse to let My people go, behold, tomorrow I will bring locusts into your country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And they shall cover the land so that one cannot see the ground; and they shall eat the remainder of what escaped and is left to you from the hail, and they shall eat every tree of yours that grows in the field;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The locusts shall fill your houses and those of all your servants and of all the Egyptians, as neither your fathers nor your fathers'' fathers have seen from their birth until this day. Then Moses departed from Pharaoh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And Pharaoh''s servants said to him, How long shall this man be a snare to us? Let the men go, that they may serve the Lord their God; do you not yet understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that Egypt is destroyed?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' So Moses and Aaron were brought again to Pharaoh; and he said to them, Go, serve the Lord your God; but just who are to go?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Moses said, We will go with our young and our old, with our sons and our daughters, with our flocks and our herds [all of us and all we have], for we must hold a feast to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Pharaoh said to them, Let the Lord be with you, if I ever let you go with your little ones! See, you have some evil purpose in mind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Not so! You that are men, [without your families] go and serve the Lord, for that is what you want. And [Moses and Aaron] were driven from Pharaoh''s presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Then the Lord said to Moses, Stretch out your hand over the land of Egypt for the locusts, that they may come up on the land of Egypt and eat all the vegetation of the land, all that the hail has left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And Moses stretched forth his rod over the land of Egypt, and the Lord brought an east wind upon the land all that day and all that night; when it was morning, the east wind brought the locusts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the locusts came up over all the land of Egypt and settled down on the whole country of Egypt, a very dreadful mass of them; never before were there such locusts as these, nor will there ever be again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For they covered the whole land, so that the ground was darkened, and they ate every bit of vegetation of the land and all the fruit of the trees which the hail had left; there remained not a green thing of the trees or the plants of the field in all the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Then Pharaoh sent for Moses and Aaron in haste. He said, I have sinned against the Lord your God and you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Now therefore forgive my sin, I pray you, only this once, and entreat the Lord your God only that He may remove from me this [plague of] death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Then Moses left Pharaoh and entreated the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' And the Lord turned a violent west wind, which lifted the locusts and drove them into the Red Sea; not one locust remained in all the country of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But the Lord made Pharaoh''s heart more strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obstinate, and he would not let the Israelites go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the Lord said to Moses, Stretch out your hand toward the heavens, that there may be darkness over the land of Egypt, a darkness which may be felt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' So Moses stretched out his hand toward the sky, and for three days a thick darkness was all over the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The Egyptians could not see one another, nor did anyone rise from his place for three days; but all the Israelites had natural light in their dwellings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And Pharaoh called to Moses, and said, Go, serve the Lord; let your little ones also go with you; it is only your flocks and your herds that must not go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' But Moses said, You must give into our hand also sacrifices and burnt offerings, that we may sacrifice to the Lord our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Our livestock also shall go with us; there shall not a hoof be left behind; for of them must we take to serve the Lord our God, and we know not with what we must serve the Lord until we arrive there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' But the Lord made Pharaoh''s heart stronger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more stubborn, and he would not let them go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And Pharaoh said to Moses, Get away from me! See that you never enter my presence again, for the day you see my face again you shall die!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' And Moses said, You have spoken truly; I will never see your face again.'
