document_id: GEN.42
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' NOW WHEN Jacob learned that there was grain in Egypt, he said to his sons, Why do you look at one another?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For, he said, I have heard that there is grain in Egypt; get down there and buy [grain] for us, that we may live and not die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So ten of Joseph''s brethren went to buy grain in Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' But Benjamin, Joseph''s [full] brother, Jacob did not send with his brothers; for he said, Lest perhaps some harm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' injury should befall him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' So the sons of Israel came to buy grain among those who came, for there was hunger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' general lack of food in the land of Canaan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Now Joseph was the governor over the land, and he it was who sold to all the people of the land; and Joseph''s [half] brothers came and bowed themselves down before him with their faces to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Joseph saw his brethren and he recognized them, but he treated them as if he were a stranger to them and spoke roughly to them. He said, Where do you come from? And they replied, From the land of Canaan to buy food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Joseph knew his brethren, but they did not know him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And Joseph remembered the dreams he had dreamed about them and said to them, You are spies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with unfriendly purpose you have come to observe [secretly] the nakedness of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' But they said to him, No, my lord, but your servants have come [only] to buy food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' We are all one man''s sons; we are true men; your servants are not spies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And he said to them, No, but you have come to see the nakedness of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' But they said, Your servants are twelve brothers, the sons of one man in the land of Canaan; the youngest is today with our father, and one is not.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And Joseph said to them, It is as I said to you, You are spies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' You shall be proved by this test: by the life of Pharaoh, you shall not go away from here unless your youngest brother comes here.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Send one of you and let him bring your brother, and you will be kept in prison, that your words may be proved whether there is any truth in you; or else by the life of Pharaoh you certainly are spies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then he put them all in custody for three days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And Joseph said to them on the third day, Do this and live! I reverence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fear God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' If you are true men, let one of your brothers be bound in your prison, but [the rest of] you go and carry grain for those weakened with hunger in your households.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But bring your youngest brother to me, so your words will be verified and you shall live. And they did so.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And they said one to another, We are truly guilty about our brother, for we saw the distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anguish of his soul when he begged us [to let him go], and we would not hear. So this distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' difficulty has come upon us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Reuben answered them, Did I not tell you, Do not sin against the boy, and you would not hear? Therefore, behold, his blood is required [of us].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But they did not know that Joseph understood them, for he spoke to them through an interpreter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And he turned away from them and wept; then he returned to them and talked with them, and took from them Simeon and bound him before their eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' Then [privately] Joseph commanded that their sacks be filled with grain, every man''s money be restored to his sack, and provisions be given to them for the journey. And this was done for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' They loaded their donkeys with grain and left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' And as one of them opened his sack to give his donkey fodder at the lodging place, he caught sight of his money; for behold, it was in his sack''s mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And he said to his brothers, My money is restored! Here it is in my sack! And their hearts failed them and they were afraid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turned trembling one to another, saying, What is this that God has done to us?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' When they came to Jacob their father in Canaan, they told him all that had befallen them, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The man who is the lord of the land spoke roughly to us and took us for spies of the country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' And we said to him, We are true men, not spies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' We are twelve brothers with the same father; one is no more, and the youngest is today with our father in the land of Canaan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' And the man, the lord of the country, said to us, By this test I will know whether or not you are honest men: leave one of your brothers here with me and take grain for your famishing households and be gone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Bring your youngest brother to me; then I will know that you are not spies, but that you are honest men. And I will deliver to you your brother [whom I have kept bound in prison], and you may do business in the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' When they emptied their sacks, behold, every man''s parcel of money was in his sack! When both they and their father saw the bundles of money, they were afraid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' And Jacob their father said to them, You have bereaved me! Joseph is not, and Simeon is not, and you would take Benjamin from me. All these things are against me!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' And Reuben said to his father, Slay my two sons if I do not bring [Benjamin] back to you. Deliver him into my keeping, and I will bring him back to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' But [Jacob] said, My son shall not go down with you, for his brother is dead and he alone is left [of his mother''s children]; if harm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' accident should befall him on the journey you are to take, you would bring my hoary head down to Sheol (the place of the dead) with grief.'
