document_id: 2CO.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THEREFORE, SINCE we do hold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' engage in this ministry by the mercy of God [granting us favor, benefits, opportunities, and especially salvation], we do not get discouraged (spiritless and despondent with fear) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' become faint with weariness and exhaustion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' We have renounced disgraceful ways (secret thoughts, feelings, desires and underhandedness, the methods and arts that men hide through shame); we refuse to deal craftily (to practice trickery and cunning) or to adulterate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' handle dishonestly the Word of God, but we state the truth openly (clearly and candidly). And so we commend ourselves in the sight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' presence of God to every man''s conscience.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' But even if our Gospel (the glad tidings) also be hidden (obscured and covered up with a veil that hinders the knowledge of God), it is hidden [only] to those who are perishing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obscured [only] to those who are spiritually dying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' veiled [only] to those who are lost.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' For the god of this world has blinded the unbelievers'' minds [that they should not discern the truth], preventing them from seeing the illuminating light of the Gospel of the glory of Christ (the Messiah), Who is the Image '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Likeness of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For what we preach is not ourselves but Jesus Christ as Lord, and ourselves [merely] as your servants (slaves) for Jesus'' sake.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' For God Who said, Let light shine out of darkness, has shone in our hearts so as [to beam forth] the Light for the illumination of the knowledge of the majesty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory of God [as it is manifest in the Person and is revealed] in the face of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' Christ (the Messiah). [Gen. 1:3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' However, we possess this precious treasure [the divine Light of the Gospel] in [frail, human] vessels of earth, that the grandeur '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exceeding greatness of the power may be shown to be from God and not from ourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' We are hedged in (pressed) on every side [troubled and oppressed in every way], but not cramped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' crushed; we suffer embarrassments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unable to find a way out, but not driven to despair;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' We are pursued (persecuted and hard driven), but not deserted [to stand alone]; we are struck down to the ground, but never struck out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Always carrying about in the body the liability '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exposure to the same putting to death that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Lord
  - type: text
    text: ' Jesus suffered, so that the [resurrection] life of Jesus also may be shown forth by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in our bodies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' For we who live are constantly [experiencing] being handed over to death for Jesus'' sake, that the [resurrection] life of Jesus also may be evidenced through our flesh which is liable to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Thus death is actively at work in us, but [it is in order that our] life [may be actively at work] in you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Yet we have the same spirit of faith as he had who wrote, I have believed, and therefore have I spoken. We too believe, and therefore we speak, [Ps. 116:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Assured that He Who raised up the Lord Jesus will raise us up also with Jesus and bring us [along] with you into His presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For all [these] things are [taking place] for your sake, so that the more grace (divine favor and spiritual blessing) extends to more and more people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' multiplies through the many, the more thanksgiving may increase [and redound] to the glory of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Therefore we do not become discouraged (utterly spiritless, exhausted, and wearied out through fear). Though our outer man is [progressively] decaying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wasting away, yet our inner self is being [progressively] renewed day after day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For our light, momentary affliction (this slight distress of the passing hour) is ever more and more abundantly preparing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' producing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' achieving for us an everlasting weight of glory [beyond all measure, excessively surpassing all comparisons and all calculations, a vast and transcendent glory and blessedness never to cease!],'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Since we consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' look not to the things that are seen but to the things that are unseen; for the things that are visible are temporal (brief and fleeting), but the things that are invisible are deathless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' everlasting.'
