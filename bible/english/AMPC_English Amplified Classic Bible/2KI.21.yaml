document_id: 2KI.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' MANASSEH WAS twelve years old when he began his fifty-five-year [wicked] reign in Jerusalem. His mother''s name was Hephzibah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' He [Hezekiah''s son] did evil in the sight of the Lord, after the [idolatrous] practices of the [heathen] nations whom the Lord cast out before the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' For he built up again the high places which Hezekiah his father had destroyed; and he reared up altars for Baal and made an Asherah, as did Ahab king of Israel, and worshiped all the [starry] hosts of the heavens and served them!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And he built [heathen] altars in the house of the Lord, of which the Lord said, In Jerusalem will I put My Name [and the pledge of My presence].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And he [good Hezekiah''s son] built altars for all the hosts of the heavens in the two courts of the house of the Lord!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And he made his son pass through the fire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burned him as an offering [to Molech]; he practiced soothsaying and augury, and dealt with mediums and wizards! He did much wickedness in the sight of the Lord, provoking Him to anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' He made a graven image of [the goddess] Asherah and set it in the house, of which the Lord said to David and to Solomon his son, In this house and in Jerusalem, which I have chosen out of all the tribes of Israel, will I put My Name [and the pledge of My presence] forever;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And I will not cause the feet of Israel to wander any more out of the land which I gave their fathers, if only they will observe to do according to all that I have commanded them and according to all the law that My servant Moses commanded them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' But they would not listen; and Manasseh seduced them to do more evil than the nations did whom the Lord destroyed before the Israelites!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the Lord said through His servants the prophets:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Because Manasseh king of Judah has committed these abominations, and has done wickedly above all that the Amorites did who were before him, and has made Judah also to sin with his idols,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Therefore thus says the Lord, the God of Israel: Behold, I am bringing such evil upon Jerusalem and Judah, that whoever hears of it, both his ears shall tingle!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And I will stretch over Jerusalem the measuring line of Samaria and the plummet of the house of Ahab; and I will wipe Jerusalem as one wipes a dish, wiping it and turning it upside down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And I will cast off the rest of My inheritance and deliver them into the hands of their enemies; and they shall become a prey and a spoil to all their enemies,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' For they have done evil in My sight and have provoked Me to anger since their fathers came out of Egypt to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Moreover, Manasseh shed very much innocent blood, filling Jerusalem from one end to another–besides his sin in making Judah sin, by doing evil in the sight of the Lord! [II Chron. 33:1-10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' The rest of the acts of Manasseh, all that he did, and his sin that he committed, are they not written in the Book of the Chronicles of the Kings of Judah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Manasseh slept with his fathers and was buried in the garden of his own house, in the garden of Uzza. Amon his son reigned in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Amon was twenty-two years old when he began his two-year reign in Jerusalem. His mother was Meshullemeth daughter of Haruz of Jotbah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' [But] he also did evil in the sight of the Lord, as his father Manasseh had done. [II Kings 23:26, 27; 24:3, 4.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' He walked in all the ways of his father; and he served the idols that his father served, and worshiped them;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' He forsook the Lord, the God of his [forefathers], and did not walk in the way of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The servants of Amon conspired against him and killed the king in his own house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' But the people of the land killed all those who had conspired against King Amon, and made Josiah his son king in his stead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' The rest of the acts of Amon, are they not written in the Book of the Chronicles of the Kings of Judah?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' He was buried in his tomb in the garden of Uzza. Josiah his son succeeded him.'
