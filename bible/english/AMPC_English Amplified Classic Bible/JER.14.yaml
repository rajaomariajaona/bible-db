document_id: JER.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD of the Lord that came to Jeremiah concerning the drought:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Judah mourns and her gates languish; [her people] sit in black [mourning garb] upon the ground, and the cry of Jerusalem goes up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And their nobles send their little ones '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their inferiors for water; they come to the cisterns and find no water. They return with empty vessels; they are put to shame and confounded and cover their heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Because the ground is cracked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the tillers are dismayed, since there has been no rain on the land, the plowmen are put to shame, and they cover their heads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Yes, even the hind gives birth to her calf in the field and forsakes it, because there is no grass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' herbage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And the wild donkeys stand on the bare heights; they pant for air like jackals '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' crocodiles; their eyesight fails because there is no grass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' O Lord, though our iniquities testify against us [prays Jeremiah], deal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' work with us for Your own name''s sake [that the heathen may witness Your might and faithfulness]! For our backslidings are many; we have sinned against You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' O Hope of Israel, her Savior in time of trouble, why should You be like a sojourner in the land and like a wayfaring man who turns aside '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spreads his tent to tarry [only] for a night?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Why should You be [hesitant and inactive] like a man stunned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confused, like a mighty man who cannot save? Yet You, O Lord, are in the midst of us, and we are called by Your name; do not leave us!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' [And the Lord replied to Jeremiah] Thus says the Lord to this people [Judah]: In the manner '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to the degree already pointed out have they loved to wander; they have not restrained their feet. Therefore the Lord does not accept them; He will now [seriously] remember their iniquity and punish them for their sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' The Lord said to me, Do not pray for this people for their good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Though they fast, I will not hear their cry; and though they offer burnt offering and cereal offering [without heartfelt surrender to Me, or by offering it too late], I will not accept them. But I will consume them by the sword, by famine, and by pestilence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' Then said I, Alas, Lord God! Behold, the [false] prophets say to them, You will not see the sword, nor will you have famine; but I [the Lord] will give you assured peace (peace that lasts, the peace of truth) in this place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' Then the Lord said to me, The [false] prophets prophesy lies in My name. I sent them not, neither have I commanded them, nor have I spoken to them. They prophesy to you a false '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pretended vision, a worthless divination [conjuring or practicing magic, trying to call forth the responses supposed to be given by idols], and the deceit of their own minds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Therefore thus says the Lord concerning the [false] prophets who prophesy in My name–although I did not send them–and who say, Sword and famine shall not be in this land: By sword and famine shall those prophets be consumed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the people to whom they prophesy shall be cast out in the streets of Jerusalem, victims of famine and sword; and they shall have none to bury them–them, their wives, their sons, and their daughters. For I will pour out their wickedness upon them [and not on their false teachers only, for the people could not have been deceived except by their own consent].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Therefore [Jeremiah] you shall say to them, Let my eyes run down with tears night and day, and let them not cease; for the virgin daughter of my people has been smitten with a great wound, with a very grievous blow.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' If I go out into the field, then behold, those slain with the sword! And if I enter the city, then behold, those tormented with the diseases of famine! For both prophet and priest go about not knowing what to do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' as beggars [exiled] in a land that they know not, and they have no knowledge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' [O Lord] have You utterly rejected Judah? Do You loathe Zion? Why have You smitten us so that there is no healing for us? We looked for peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' completeness, but no good came, and for a time of healing, but behold, dismay, disaster, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terror!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' We know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge, O Lord, our wickedness and the iniquity of our fathers; for we have sinned against You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' Do not abhor, condemn, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spurn us, for Your name''s sake; do not dishonor, debase, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lightly esteem Your glorious throne; [earnestly] remember, break not Your covenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' solemn pledge with us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Are there any among the false gods of the nations who can cause rain? Or can the heavens [of their own will] give showers? Are You [alone] not He, O Lord our God? Therefore we will wait [expectantly] for You, for You have made all these things [the heavens and the rain].'
