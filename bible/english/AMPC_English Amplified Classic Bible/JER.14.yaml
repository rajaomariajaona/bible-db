document_id: JER.14,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE WORD of the Lord that came to Jeremiah concerning the drought:'
  '10':
  - type: text
    content: ' [And the Lord replied to Jeremiah] Thus says the Lord to this people [Judah]: In the manner '
  - type: text
    content: and
  - type: text
    content: ' to the degree already pointed out have they loved to wander; they have not restrained their feet. Therefore the Lord does not accept them; He will now [seriously] remember their iniquity and punish them for their sins.'
  '11':
  - type: text
    content: ' The Lord said to me, Do not pray for this people for their good.'
  '12':
  - type: text
    content: ' Though they fast, I will not hear their cry; and though they offer burnt offering and cereal offering [without heartfelt surrender to Me, or by offering it too late], I will not accept them. But I will consume them by the sword, by famine, and by pestilence.'
  '13':
  - type: text
    content: ' Then said I, Alas, Lord God! Behold, the [false] prophets say to them, You will not see the sword, nor will you have famine; but I [the Lord] will give you assured peace (peace that lasts, the peace of truth) in this place.'
  '14':
  - type: text
    content: ' Then the Lord said to me, The [false] prophets prophesy lies in My name. I sent them not, neither have I commanded them, nor have I spoken to them. They prophesy to you a false '
  - type: text
    content: or
  - type: text
    content: ' pretended vision, a worthless divination [conjuring or practicing magic, trying to call forth the responses supposed to be given by idols], and the deceit of their own minds.'
  '15':
  - type: text
    content: ' Therefore thus says the Lord concerning the [false] prophets who prophesy in My name–although I did not send them–and who say, Sword and famine shall not be in this land: By sword and famine shall those prophets be consumed.'
  '16':
  - type: text
    content: ' And the people to whom they prophesy shall be cast out in the streets of Jerusalem, victims of famine and sword; and they shall have none to bury them–them, their wives, their sons, and their daughters. For I will pour out their wickedness upon them [and not on their false teachers only, for the people could not have been deceived except by their own consent].'
  '17':
  - type: text
    content: ' Therefore [Jeremiah] you shall say to them, Let my eyes run down with tears night and day, and let them not cease; for the virgin daughter of my people has been smitten with a great wound, with a very grievous blow.'
  '18':
  - type: text
    content: ' If I go out into the field, then behold, those slain with the sword! And if I enter the city, then behold, those tormented with the diseases of famine! For both prophet and priest go about not knowing what to do '
  - type: text
    content: or
  - type: text
    content: ' as beggars [exiled] in a land that they know not, and they have no knowledge.'
  '19':
  - type: text
    content: ' [O Lord] have You utterly rejected Judah? Do You loathe Zion? Why have You smitten us so that there is no healing for us? We looked for peace '
  - type: text
    content: and
  - type: text
    content: ' completeness, but no good came, and for a time of healing, but behold, dismay, disaster, '
  - type: text
    content: and
  - type: text
    content: ' terror!'
  '2':
  - type: text
    content: ' Judah mourns and her gates languish; [her people] sit in black [mourning garb] upon the ground, and the cry of Jerusalem goes up.'
  '20':
  - type: text
    content: ' We know '
  - type: text
    content: and
  - type: text
    content: ' acknowledge, O Lord, our wickedness and the iniquity of our fathers; for we have sinned against You.'
  '21':
  - type: text
    content: ' Do not abhor, condemn, '
  - type: text
    content: and
  - type: text
    content: ' spurn us, for Your name''s sake; do not dishonor, debase, '
  - type: text
    content: and
  - type: text
    content: ' lightly esteem Your glorious throne; [earnestly] remember, break not Your covenant '
  - type: text
    content: or
  - type: text
    content: ' solemn pledge with us.'
  '22':
  - type: text
    content: ' Are there any among the false gods of the nations who can cause rain? Or can the heavens [of their own will] give showers? Are You [alone] not He, O Lord our God? Therefore we will wait [expectantly] for You, for You have made all these things [the heavens and the rain].'
  '3':
  - type: text
    content: ' And their nobles send their little ones '
  - type: text
    content: and
  - type: text
    content: ' their inferiors for water; they come to the cisterns and find no water. They return with empty vessels; they are put to shame and confounded and cover their heads.'
  '4':
  - type: text
    content: ' Because the ground is cracked '
  - type: text
    content: and
  - type: text
    content: ' the tillers are dismayed, since there has been no rain on the land, the plowmen are put to shame, and they cover their heads.'
  '5':
  - type: text
    content: ' Yes, even the hind gives birth to her calf in the field and forsakes it, because there is no grass '
  - type: text
    content: or
  - type: text
    content: ' herbage.'
  '6':
  - type: text
    content: ' And the wild donkeys stand on the bare heights; they pant for air like jackals '
  - type: text
    content: or
  - type: text
    content: ' crocodiles; their eyesight fails because there is no grass.'
  '7':
  - type: text
    content: ' O Lord, though our iniquities testify against us [prays Jeremiah], deal '
  - type: text
    content: and
  - type: text
    content: ' work with us for Your own name''s sake [that the heathen may witness Your might and faithfulness]! For our backslidings are many; we have sinned against You.'
  '8':
  - type: text
    content: ' O Hope of Israel, her Savior in time of trouble, why should You be like a sojourner in the land and like a wayfaring man who turns aside '
  - type: text
    content: and
  - type: text
    content: ' spreads his tent to tarry [only] for a night?'
  '9':
  - type: text
    content: ' Why should You be [hesitant and inactive] like a man stunned '
  - type: text
    content: and
  - type: text
    content: ' confused, like a mighty man who cannot save? Yet You, O Lord, are in the midst of us, and we are called by Your name; do not leave us!'
