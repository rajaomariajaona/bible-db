document_id: EXO.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' GOD SAID to Moses, Come up to the Lord, you and Aaron, Nadab and Abihu [Aaron''s sons], and seventy of Israel''s elders, and worship at a distance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' Moses alone shall come near the Lord; the others shall not come near, and neither shall the people come up with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Moses came and told the people all that the Lord had said and all the ordinances; and all the people answered with one voice, All that the Lord has spoken we will do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Moses wrote all the words of the Lord. He rose up early in the morning and built an altar at the foot of the mountain and set up twelve pillars representing Israel''s twelve tribes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And he sent young Israelite men, who offered burnt offerings and sacrificed peace offerings of oxen to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And Moses took half of the blood and put it in basins, and half of the blood he dashed against the altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Then he took the Book of the Covenant and read in the hearing of the people; and they said, All that the Lord has said we will do, and we will be obedient.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And Moses took the [remaining half of the] blood and sprinkled it on the people, and said, Behold the blood of the covenant which the Lord has made with you in accordance with all these words. [I Cor. 11:25; Heb. 8:6; 10:28, 29.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then Moses, Aaron, Nadab, and Abihu, and seventy of the elders of Israel went up [the mountainside].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And they saw the God of Israel [that is, a convincing manifestation of His presence], and under His feet it was like pavement of bright sapphire stone, like the very heavens in clearness. [Exod. 33:20-23; Deut. 4:12; Ezek. 28:14]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And upon the nobles of the Israelites He laid not His hand [to conceal Himself from them, to rebuke their daring, or to harm them]; but they saw [the manifestation of the presence of] God, and ate and drank. [Exod. 19:21.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And the Lord said to Moses, Come up to Me into the mountain and be there, and I will give you tables of stone, with the law and the commandments which I have written that you may teach them. [II Cor. 3:2, 3.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' So Moses rose up with Joshua his attendant; and Moses went up into the mountain of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he said to the elders, Tarry here for us until we come back to you; remember, Aaron and Hur are with you; whoever has a cause, let him go to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Then Moses went up into the mountain, and the cloud covered the mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The glory of the Lord rested on Mount Sinai, and the cloud covered it for six days. On the seventh day [God] called to Moses out of the midst of the cloud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And the glory of the Lord appeared to the Israelites like devouring fire on the top of the mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Moses entered into the midst of the cloud and went up the mountain, and Moses was on the mountain forty days and nights.'
