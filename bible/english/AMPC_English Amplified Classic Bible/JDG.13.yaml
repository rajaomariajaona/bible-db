document_id: JDG.13
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' AND THE Israelites again did what was evil in the sight of the Lord, and the Lord gave them into the hands of the Philistines for forty years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And there was a certain man of Zorah, of the tribe of the Danites, whose name was Manoah; and his wife was barren and had no children.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And the Angel of the Lord appeared to the woman and said to her, Behold, you are barren and have no children, but you shall become pregnant and bear a son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Therefore beware and drink no wine or strong drink and eat nothing unclean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For behold, you shall become pregnant and bear a son. No razor shall come upon his head, for the child shall be a Nazirite to God from birth, and he shall begin to deliver Israel out of the hands of the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Then the woman went and told her husband, saying, A Man of God came to me and his face was like the face of the Angel of God, to be greatly and reverently feared. I did not ask him from where he came, and he did not tell me his name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But he said to me, Behold, you shall become pregnant and bear a son, and now drink no wine or strong drink and eat nothing unclean, for the child shall be a Nazirite to God from birth to the day of his death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then Manoah entreated the Lord and said, O Lord, let the Man of God whom You sent come again to us and teach us what we shall do with the child that shall be born.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And God listened to the voice of Manoah, and the Angel of God came again to the woman as she sat in the field; but Manoah her husband was not with her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the woman ran in haste and told her husband and said to him, Behold, the Man who came to me the other day has appeared to me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And Manoah arose and went after his wife and came to the Man and said to him, Are you the Man who spoke to this woman? And he said, I am.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And Manoah said, Now when your words come true, how shall we manage the child, and what is he to do?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the Angel of the Lord said to Manoah, Let the mother beware of all that I told her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' She may not eat of anything that comes from the grapevine, nor drink wine or strong drink nor eat any unclean thing. All that I commanded her let her observe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And Manoah said to the Angel of the Lord, Pray, let us detain you that we may prepare a kid for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Angel of the Lord said to Manoah, Though you detain me, I will not eat of your food, but if you make ready a burnt offering, offer it to the Lord. For Manoah did not know that he was the Angel of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' And Manoah said to the Angel of the Lord, What is your name, so that when your words come true, we may do you honor?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' And the Angel of the Lord said to him, Why do you ask my name, seeing it is wonderful? [Isa. 9:6.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' So Manoah took the kid with the cereal offering and offered it upon a rock to the Lord, the Angel working wonders, while Manoah and his wife looked on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' For when the flame went up toward the heavens from the altar, the Angel of the Lord ascended in the altar flame. And Manoah and his wife looked on, and they fell on their faces to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The Angel of the Lord did not appear again to Manoah or to his wife. Then Manoah knew that he was the Angel of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And Manoah said to his wife, We shall surely die, because we have seen God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' But his [sensible] wife said to him, If the Lord were pleased to kill us, He would not have received a burnt offering and a cereal offering from our hands, nor have shown us all these things or now have announced such things as these.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' And the woman [in due time] bore a son and called his name Samson; and the child grew and the Lord blessed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' And the Spirit of the Lord began to move him at times in Mahaneh-dan [the camp of Dan] between Zorah and Eshtaol.'
