document_id: PSA.56
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To the Chief Musician; +[set to the tune of+] ``Silent Dove Among Those Far Away." Of David. A record of memorable thoughts when the Philistines seized him in Gath.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' BE MERCIFUL '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gracious to me, O God, for man would trample me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' devour me; all the day long the adversary oppresses me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' They that lie in wait for me would swallow me up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trample me all day long, for they are many who fight against me, O Most High!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' What time I am afraid, I will have confidence in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reliance in You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' By [the help of] God I will praise His word; on God I lean, rely, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently put my trust; I will not fear. What can man, who is flesh, do to me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' All day long they twist my words '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trouble my affairs; all their thoughts are against me for evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my hurt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' They gather themselves together, they hide themselves, they watch my steps, even as they have [expectantly] waited for my life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' They think to escape with iniquity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shall they? In Your indignation bring down the peoples, O God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' You number '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' record my wanderings; put my tears into Your bottle–are they not in Your book?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Then shall my enemies turn back in the day that I cry out; this I know, for God is for me. [Rom. 8:31.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' In God, Whose word I praise, in the Lord, Whose word I praise,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' In God have I put my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident reliance; I will not be afraid. What can man do to me?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Your vows are upon me, O God; I will render praise to You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give You thank offerings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For You have delivered my life from death, yes, and my feet from falling, that I may walk before God in the light of life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of the living.'
