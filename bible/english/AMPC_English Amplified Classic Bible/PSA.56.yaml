document_id: PSA.56,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician; +[set to the tune of+] ``Silent Dove Among Those Far Away." Of David. A record of memorable thoughts when the Philistines seized him in Gath.
  - type: text
    content: ' BE MERCIFUL '
  - type: text
    content: and
  - type: text
    content: ' gracious to me, O God, for man would trample me '
  - type: text
    content: or
  - type: text
    content: ' devour me; all the day long the adversary oppresses me.'
  '10':
  - type: text
    content: ' In God, Whose word I praise, in the Lord, Whose word I praise,'
  '11':
  - type: text
    content: ' In God have I put my trust '
  - type: text
    content: and
  - type: text
    content: ' confident reliance; I will not be afraid. What can man do to me?'
  '12':
  - type: text
    content: ' Your vows are upon me, O God; I will render praise to You '
  - type: text
    content: and
  - type: text
    content: ' give You thank offerings.'
  '13':
  - type: text
    content: ' For You have delivered my life from death, yes, and my feet from falling, that I may walk before God in the light of life '
  - type: text
    content: and
  - type: text
    content: ' of the living.'
  '2':
  - type: text
    content: ' They that lie in wait for me would swallow me up '
  - type: text
    content: or
  - type: text
    content: ' trample me all day long, for they are many who fight against me, O Most High!'
  '3':
  - type: text
    content: ' What time I am afraid, I will have confidence in '
  - type: text
    content: and
  - type: text
    content: ' put my trust '
  - type: text
    content: and
  - type: text
    content: ' reliance in You.'
  '4':
  - type: text
    content: ' By [the help of] God I will praise His word; on God I lean, rely, '
  - type: text
    content: and
  - type: text
    content: ' confidently put my trust; I will not fear. What can man, who is flesh, do to me?'
  '5':
  - type: text
    content: ' All day long they twist my words '
  - type: text
    content: and
  - type: text
    content: ' trouble my affairs; all their thoughts are against me for evil '
  - type: text
    content: and
  - type: text
    content: ' my hurt.'
  '6':
  - type: text
    content: ' They gather themselves together, they hide themselves, they watch my steps, even as they have [expectantly] waited for my life.'
  '7':
  - type: text
    content: ' They think to escape with iniquity, '
  - type: text
    content: and
  - type: text
    content: ' shall they? In Your indignation bring down the peoples, O God.'
  '8':
  - type: text
    content: ' You number '
  - type: text
    content: and
  - type: text
    content: ' record my wanderings; put my tears into Your bottle–are they not in Your book?'
  '9':
  - type: text
    content: ' Then shall my enemies turn back in the day that I cry out; this I know, for God is for me. [Rom. 8:31.]'
