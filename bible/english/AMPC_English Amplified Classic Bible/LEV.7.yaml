document_id: LEV.7
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THIS IS the law of the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering; it is most holy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' sacred:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' In the place where they kill the burnt offering shall they kill the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering; the blood of it shall the priest dash against the altar round about.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And he shall offer all its fat, the fat tail and the fat that covers the entrails,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the two kidneys and the fat that is on them at the loins, and the lobe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' appendage of the liver, which he shall take away with the kidneys.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And the priest shall burn them on the altar for an offering made by fire to the Lord; it is a guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Every male among the priests may eat of it; it shall be eaten in a sacred place; it is most holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' As is the sin offering, so is the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering; there is one law for them: the priest who makes atonement with it shall have it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And the priest who offers any man''s burnt offering, that priest shall have for himself the hide of the burnt offering which he has offered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And every cereal offering that is baked in the oven and all that is prepared in a pan or on a griddle shall belong to the priest who offered it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And every cereal offering, mixed with oil or dry, all the sons of Aaron may have, one as well as another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And this is the law of the sacrifice of peace offerings which shall be offered to the Lord:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' If one offers it for a thanksgiving, then he shall offer with the thank offering unleavened cakes mixed with oil, and unleavened wafers spread with oil, and cakes of fine flour mixed with oil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' With cakes of leavened bread he shall offer his sacrifice of thanksgiving with the sacrifice of his peace offerings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And of it he shall offer one cake from each offering as an offering to the Lord; it shall belong to the priest who dashes the blood of the peace offerings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The flesh of the sacrifice of thanksgiving presented as a peace offering shall be eaten on the day that it is offered; none of it shall be left until morning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' But if the sacrifice of the worshiper''s offering is a vow or a freewill offering, it shall be eaten the same day that he offers his sacrifice, and on the morrow that which remains of it shall be eaten;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' But the remainder of the flesh of the sacrifice on the third day shall be [wholly] burned with fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' If any of the flesh of the sacrifice of his peace offerings be eaten at all on the third day, then the one who brought it shall not be credited with it; it shall not be accepted. It shall be an abomination '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an abhorred thing; the one who eats of it shall bear his iniquity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answer for it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' The flesh that comes in contact with anything that is not clean shall not be eaten; it shall be burned with fire. As for the meat, everyone who is clean [ceremonially] may eat of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But the one who eats of the flesh of the sacrifice of peace offerings that belong to the Lord when he is [ceremonially] unclean, that person shall be cut off from his people [deprived of the privileges of association with them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And if anyone touches any unclean thing–the uncleanness of man or an unclean beast or any unclean abomination–and then eats of the flesh of the sacrifice of the Lord''s peace offerings, that person shall be cut off from his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Say to the Israelites, You shall eat no kind of fat, of ox, or sheep, or goat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' The fat of the beast that dies of itself and the fat of one that is torn with beasts may be put to any other use, but under no circumstances are you to eat of it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' For whoever eats the fat of the beast from which men offer an offering made by fire to the Lord, that person shall be cut off from his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Moreover, you shall eat no blood of any kind, whether of bird or of beast, in any of your dwellings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Whoever eats any kind of blood, that person shall be cut off from his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' And the Lord said to Moses,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Tell the Israelites, He who offers the sacrifice of his peace offerings to the Lord shall bring his offering to the Lord; from the sacrifice of his peace offerings'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' He shall bring with his own hands the offerings made by fire to the Lord; he shall bring the fat with the breast, that the breast may be waved as a wave offering before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The priest shall burn the fat on the altar, but the breast shall be for Aaron and his sons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And the right thigh you shall give to the priest for an offering from the sacrifices of your peace offerings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' The son of Aaron who offers the blood of the peace offerings and the fat shall have the right thigh for his portion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' For I have taken the breast that was waved and the thigh that was offered from the Israelites, out of the sacrifices of their peace offerings, and have given them to Aaron the priest and to his sons as their perpetual due from the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' This is the anointing portion of Aaron and his sons out of the offerings to the Lord made by fire on the day when they were presented to minister to the Lord in the priest''s office.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' The Lord commanded this to be given them of the Israelites on the day when they were anointed. It is their portion perpetually throughout their generations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' This is the law of the burnt offering, the cereal offering, the sin offering, the guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trespass offering, the consecration offering, and the sacrifice of peace offerings,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' Which the Lord ordered Moses on Mount Sinai on the day He commanded the Israelites to offer their sacrifices to the Lord, in the Wilderness of Sinai.'
