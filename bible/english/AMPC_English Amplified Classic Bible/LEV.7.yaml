document_id: LEV.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THIS IS the law of the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering; it is most holy '
  - type: text
    content: or
  - type: text
    content: ' sacred:'
  '10':
  - type: text
    content: ' And every cereal offering, mixed with oil or dry, all the sons of Aaron may have, one as well as another.'
  '11':
  - type: text
    content: ' And this is the law of the sacrifice of peace offerings which shall be offered to the Lord:'
  '12':
  - type: text
    content: ' If one offers it for a thanksgiving, then he shall offer with the thank offering unleavened cakes mixed with oil, and unleavened wafers spread with oil, and cakes of fine flour mixed with oil.'
  '13':
  - type: text
    content: ' With cakes of leavened bread he shall offer his sacrifice of thanksgiving with the sacrifice of his peace offerings.'
  '14':
  - type: text
    content: ' And of it he shall offer one cake from each offering as an offering to the Lord; it shall belong to the priest who dashes the blood of the peace offerings.'
  '15':
  - type: text
    content: ' The flesh of the sacrifice of thanksgiving presented as a peace offering shall be eaten on the day that it is offered; none of it shall be left until morning.'
  '16':
  - type: text
    content: ' But if the sacrifice of the worshiper''s offering is a vow or a freewill offering, it shall be eaten the same day that he offers his sacrifice, and on the morrow that which remains of it shall be eaten;'
  '17':
  - type: text
    content: ' But the remainder of the flesh of the sacrifice on the third day shall be [wholly] burned with fire.'
  '18':
  - type: text
    content: ' If any of the flesh of the sacrifice of his peace offerings be eaten at all on the third day, then the one who brought it shall not be credited with it; it shall not be accepted. It shall be an abomination '
  - type: text
    content: and
  - type: text
    content: ' an abhorred thing; the one who eats of it shall bear his iniquity '
  - type: text
    content: and
  - type: text
    content: ' answer for it.'
  '19':
  - type: text
    content: ' The flesh that comes in contact with anything that is not clean shall not be eaten; it shall be burned with fire. As for the meat, everyone who is clean [ceremonially] may eat of it.'
  '2':
  - type: text
    content: ' In the place where they kill the burnt offering shall they kill the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering; the blood of it shall the priest dash against the altar round about.'
  '20':
  - type: text
    content: ' But the one who eats of the flesh of the sacrifice of peace offerings that belong to the Lord when he is [ceremonially] unclean, that person shall be cut off from his people [deprived of the privileges of association with them].'
  '21':
  - type: text
    content: ' And if anyone touches any unclean thing–the uncleanness of man or an unclean beast or any unclean abomination–and then eats of the flesh of the sacrifice of the Lord''s peace offerings, that person shall be cut off from his people.'
  '22':
  - type: text
    content: ' And the Lord said to Moses,'
  '23':
  - type: text
    content: ' Say to the Israelites, You shall eat no kind of fat, of ox, or sheep, or goat.'
  '24':
  - type: text
    content: ' The fat of the beast that dies of itself and the fat of one that is torn with beasts may be put to any other use, but under no circumstances are you to eat of it.'
  '25':
  - type: text
    content: ' For whoever eats the fat of the beast from which men offer an offering made by fire to the Lord, that person shall be cut off from his people.'
  '26':
  - type: text
    content: ' Moreover, you shall eat no blood of any kind, whether of bird or of beast, in any of your dwellings.'
  '27':
  - type: text
    content: ' Whoever eats any kind of blood, that person shall be cut off from his people.'
  '28':
  - type: text
    content: ' And the Lord said to Moses,'
  '29':
  - type: text
    content: ' Tell the Israelites, He who offers the sacrifice of his peace offerings to the Lord shall bring his offering to the Lord; from the sacrifice of his peace offerings'
  '3':
  - type: text
    content: ' And he shall offer all its fat, the fat tail and the fat that covers the entrails,'
  '30':
  - type: text
    content: ' He shall bring with his own hands the offerings made by fire to the Lord; he shall bring the fat with the breast, that the breast may be waved as a wave offering before the Lord.'
  '31':
  - type: text
    content: ' The priest shall burn the fat on the altar, but the breast shall be for Aaron and his sons.'
  '32':
  - type: text
    content: ' And the right thigh you shall give to the priest for an offering from the sacrifices of your peace offerings.'
  '33':
  - type: text
    content: ' The son of Aaron who offers the blood of the peace offerings and the fat shall have the right thigh for his portion.'
  '34':
  - type: text
    content: ' For I have taken the breast that was waved and the thigh that was offered from the Israelites, out of the sacrifices of their peace offerings, and have given them to Aaron the priest and to his sons as their perpetual due from the Israelites.'
  '35':
  - type: text
    content: ' This is the anointing portion of Aaron and his sons out of the offerings to the Lord made by fire on the day when they were presented to minister to the Lord in the priest''s office.'
  '36':
  - type: text
    content: ' The Lord commanded this to be given them of the Israelites on the day when they were anointed. It is their portion perpetually throughout their generations.'
  '37':
  - type: text
    content: ' This is the law of the burnt offering, the cereal offering, the sin offering, the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering, the consecration offering, and the sacrifice of peace offerings,'
  '38':
  - type: text
    content: ' Which the Lord ordered Moses on Mount Sinai on the day He commanded the Israelites to offer their sacrifices to the Lord, in the Wilderness of Sinai.'
  '4':
  - type: text
    content: ' And the two kidneys and the fat that is on them at the loins, and the lobe '
  - type: text
    content: or
  - type: text
    content: ' appendage of the liver, which he shall take away with the kidneys.'
  '5':
  - type: text
    content: ' And the priest shall burn them on the altar for an offering made by fire to the Lord; it is a guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering.'
  '6':
  - type: text
    content: ' Every male among the priests may eat of it; it shall be eaten in a sacred place; it is most holy.'
  '7':
  - type: text
    content: ' As is the sin offering, so is the guilt '
  - type: text
    content: or
  - type: text
    content: ' trespass offering; there is one law for them: the priest who makes atonement with it shall have it.'
  '8':
  - type: text
    content: ' And the priest who offers any man''s burnt offering, that priest shall have for himself the hide of the burnt offering which he has offered.'
  '9':
  - type: text
    content: ' And every cereal offering that is baked in the oven and all that is prepared in a pan or on a griddle shall belong to the priest who offered it.'
