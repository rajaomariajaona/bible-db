document_id: EXO.37,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' BEZALEL MADE the ark of acacia wood–two cubits and a half was the length of it, a cubit and a half the breadth of it, and a cubit and a half the height of it.'
  '10':
  - type: text
    content: ' Bezalel made the [showbread] table of acacia wood; it was two cubits long, a cubit wide, and a cubit and a half high.'
  '11':
  - type: text
    content: ' He overlaid it with pure gold and made a molding of gold around its top.'
  '12':
  - type: text
    content: ' And he made a border around it [just under the top] a handbreadth wide, and a molding of gold around the border.'
  '13':
  - type: text
    content: ' And he cast for it four rings of gold and fastened the rings on the four corners that were at its four legs.'
  '14':
  - type: text
    content: ' Close to the border were the rings, the places for the poles to pass through to carry the [showbread] table.'
  '15':
  - type: text
    content: ' [Bezalel] made the poles of acacia wood to carry the [showbread] table and overlaid them with gold.'
  '16':
  - type: text
    content: ' He made of pure gold the vessels which were to be on the table, its plates and dishes [for bread], its bowls and flagons for pouring [liquid sacrifices].'
  '17':
  - type: text
    content: ' And he made the lampstand of pure gold; its base and shaft were made of hammered work; its cups, its knobs, and its flowers were of one piece with it.'
  '18':
  - type: text
    content: ' There were six branches going out of the sides of the lampstand, three branches out of one side of it and three branches out of the other side of it;'
  '19':
  - type: text
    content: ' Three cups made like almond blossoms in one branch, each with a [calyx] knob and a flower, and three cups made like almond blossoms in the [opposite] branch, each with a [calyx] knob and a flower; and so for the six branches going out of the lampstand.'
  '2':
  - type: text
    content: ' He overlaid it with pure gold within and without and made a molding '
  - type: text
    content: or
  - type: text
    content: ' crown of gold to go around the top of it.'
  '20':
  - type: text
    content: ' On [the shaft of] the lampstand were four cups made like almond blossoms, with knobs and flowers [one at the top].'
  '21':
  - type: text
    content: ' And a knob under each pair of branches, of one piece with the lampstand, for the six branches going out of it.'
  '22':
  - type: text
    content: ' Their knobs and their branches were of one piece with it, all of it hammered work of pure gold.'
  '23':
  - type: text
    content: ' And he made of pure gold its seven lamps, its snuffers, and its ashtrays.'
  '24':
  - type: text
    content: ' Of a talent of pure gold he made the lampstand and all its utensils. [John 1:4, 5, 9; II Cor. 4:6.]'
  '25':
  - type: text
    content: ' And [Bezalel] made the incense altar of acacia wood; its top was a cubit square and it was two cubits high; the horns were one piece with it.'
  '26':
  - type: text
    content: ' He overlaid it with pure gold, its top, its sides round about, and its horns; also he made a rim around it of gold.'
  '27':
  - type: text
    content: ' And he made two rings of gold for it under its rim, on its two opposite sides, as places for the poles [to pass through] to carry it.'
  '28':
  - type: text
    content: ' And he made the poles of acacia wood and overlaid them with gold.'
  '29':
  - type: text
    content: ' He also made the holy anointing oil [symbol of the Holy Spirit] and the pure, fragrant incense, after the perfumer''s art.'
  '3':
  - type: text
    content: ' He cast four rings of gold for its four corners, two rings on either side.'
  '4':
  - type: text
    content: ' He made poles of acacia wood and overlaid them with gold.'
  '5':
  - type: text
    content: ' He put the poles through the rings at the sides of the ark to carry it.'
  '6':
  - type: text
    content: ' [Bezalel] made the mercy seat of pure gold, two cubits and a half its length and one cubit and a half its breadth.'
  '7':
  - type: text
    content: ' And he made two cherubim of beaten gold; on the two ends of the mercy seat he made them,'
  '8':
  - type: text
    content: ' One cherub at one end and one at the other end; of one piece with the mercy seat he made the cherubim at its two ends.'
  '9':
  - type: text
    content: ' And the cherubim spread out their wings on high, covering the mercy seat with their wings, with their faces to each other, looking down to the mercy seat. [Heb. 9:23-26.]'
