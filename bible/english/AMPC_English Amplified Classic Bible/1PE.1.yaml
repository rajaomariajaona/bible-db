type_code: eng
verses:
  '1':
  - type: text
    content: ' PETER, AN apostle (a special messenger) of Jesus Christ, [writing] to the elect exiles of the dispersion scattered (sowed) abroad in Pontus, Galatia, Cappadocia, Asia, and Bithynia,'
  '10':
  - type: text
    content: ' The prophets, who prophesied of the grace (divine blessing) which was intended for you, searched and inquired earnestly about this salvation.'
  '11':
  - type: text
    content: ' They sought [to find out] to whom or when this was to come which the Spirit of Christ working within them was indicating when He predicted the sufferings of Christ and the glories that should follow [them].'
  '12':
  - type: text
    content: ' It was then disclosed to them that the services they were rendering were not meant for themselves '
  - type: text
    content: and
  - type: text
    content: ' their period of time, but for you. [It is these very] things which have now already been made known plainly to you by those who preached the good news (the Gospel) to you by the [same] Holy Spirit sent from heaven. Into these things [the very] angels long to look!'
  '13':
  - type: text
    content: ' So brace up your minds; be sober (circumspect, morally alert); set your hope wholly '
  - type: text
    content: and
  - type: text
    content: ' unchangeably on the grace (divine favor) that is coming to you when Jesus Christ (the Messiah) is revealed.'
  '14':
  - type: text
    content: ' [Live] as children of obedience [to God]; do not conform yourselves to the evil desires [that governed you] in your former ignorance [when you did not know the requirements of the Gospel].'
  '15':
  - type: text
    content: ' But as the One Who called you is holy, you yourselves also be holy in all your conduct '
  - type: text
    content: and
  - type: text
    content: ' manner of living.'
  '16':
  - type: text
    content: ' For it is written, You shall be holy, for I am holy. [Lev. 11:44, 45.]'
  '17':
  - type: text
    content: ' And if you call upon Him as [your] Father Who judges each one impartially according to what he does, [then] you should conduct yourselves with true reverence throughout the time of your temporary residence [on the earth, whether long or short].'
  '18':
  - type: text
    content: ' You must know (recognize) that you were redeemed (ransomed) from the useless (fruitless) way of living inherited by tradition from [your] forefathers, not with corruptible things [such as] silver and gold,'
  '19':
  - type: text
    content: ' But [you were purchased] with the precious blood of Christ (the Messiah), like that of a [sacrificial] lamb without blemish or spot.'
  '2':
  - type: text
    content: ' Who were chosen '
  - type: text
    content: and
  - type: text
    content: ' foreknown by God the Father and consecrated (sanctified, made holy) by the Spirit to be obedient to Jesus Christ (the Messiah) and to be sprinkled with [His] blood: May grace (spiritual blessing) and peace be given you in increasing abundance [that spiritual peace to be realized in and through Christ, freedom from fears, agitating passions, and moral conflicts].'
  '20':
  - type: text
    content: ' It is true that He was chosen '
  - type: text
    content: and
  - type: text
    content: ' foreordained (destined and foreknown for it) before the foundation of the world, but He was brought out to public view (made manifest) in these last days (at the end of the times) for the sake of you.'
  '21':
  - type: text
    content: ' Through Him you believe in (adhere to, rely on) God, Who raised Him up from the dead and gave Him honor '
  - type: text
    content: and
  - type: text
    content: ' glory, so that your faith and hope are [centered and rest] in God.'
  '22':
  - type: text
    content: ' Since by your obedience to the Truth '
  - type: text
    content: through the
  - type: text
    content: ' ['
  - type: text
    content: Holy
  - type: text
    content: ' ] '
  - type: text
    content: Spirit
  - type: text
    content: ' you have purified your hearts for the sincere affection of the brethren, [see that you] love one another fervently from a '
  - type: text
    content: pure
  - type: text
    content: ' heart.'
  '23':
  - type: text
    content: ' You have been regenerated (born again), not from a mortal origin (seed, sperm), but from one that is immortal by the '
  - type: text
    content: ever
  - type: text
    content: ' living and lasting Word of God.'
  '24':
  - type: text
    content: ' For all flesh (mankind) is like grass, and all its glory (honor) like [the] flower of grass. The grass withers and the flower drops off,'
  '25':
  - type: text
    content: ' But the Word of the Lord (divine instruction, the Gospel) endures forever. And this Word is the good news which was preached to you. [Isa. 40:6-9.]'
  '3':
  - type: text
    content: ' Praised (honored, blessed) be the God and Father of our Lord Jesus Christ (the Messiah)! By His boundless mercy we have been born again to an ever-living hope through the resurrection of Jesus Christ from the dead,'
  '4':
  - type: text
    content: ' [Born anew] into an inheritance which is beyond the reach of change '
  - type: text
    content: and
  - type: text
    content: ' decay [imperishable], unsullied and unfading, reserved in heaven for you,'
  '5':
  - type: text
    content: ' Who are being guarded (garrisoned) by God''s power through [your] faith [till you fully inherit that final] salvation that is ready to be revealed [for you] in the last time.'
  '6':
  - type: text
    content: ' [You should] be exceedingly glad on this account, though now for a little while you may be distressed by trials '
  - type: text
    content: and
  - type: text
    content: ' suffer temptations,'
  '7':
  - type: text
    content: ' So that [the genuineness] of your faith may be tested, [your faith] which is infinitely more precious than the perishable gold which is tested '
  - type: text
    content: and
  - type: text
    content: ' purified by fire. [This proving of your faith is intended] to redound to [your] praise and glory and honor when Jesus Christ (the Messiah, the Anointed One) is revealed.'
  '8':
  - type: text
    content: ' Without having seen Him, you love Him; though you do not [even] now see Him, you believe in Him and exult '
  - type: text
    content: and
  - type: text
    content: ' thrill with inexpressible and glorious (triumphant, heavenly) joy.'
  '9':
  - type: text
    content: ' [At the same time] you receive the result (outcome, consummation) of your faith, the salvation of your souls.'
