document_id: PSA.11,8
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Chief Musician {or} Choir Leader. +[A Psalm+] of David.
  - type: text
    content: ' IN THE Lord I take refuge [and put my trust]; how can you say to me, Flee like a bird to your mountain?'
  '2':
  - type: text
    content: ' For see, the wicked are bending the bow; they make ready their arrow upon the string, that they [furtively] in darkness may shoot at the upright in heart.'
  '3':
  - type: text
    content: ' If the foundations are destroyed, what can the [unyieldingly] righteous do, '
  - type: text
    content: or
  - type: text
    content: ' what has He [the Righteous One] wrought '
  - type: text
    content: or
  - type: text
    content: ' accomplished?'
  '4':
  - type: text
    content: ' The Lord is in His holy temple; the Lord''s throne is in heaven. His eyes behold; His eyelids test '
  - type: text
    content: and
  - type: text
    content: ' prove the children of men. [Acts 7:49; Rev. 4:2.]'
  '5':
  - type: text
    content: ' The Lord tests '
  - type: text
    content: and
  - type: text
    content: ' proves the [unyieldingly] righteous, but His soul abhors the wicked and him who loves violence. [James 1:12.]'
  '6':
  - type: text
    content: ' Upon the wicked He will rain quick burning coals '
  - type: text
    content: or
  - type: text
    content: ' snares; fire, brimstone, and a [dreadful] scorching wind shall be the portion of their cup.'
  '7':
  - type: text
    content: ' For the Lord is [rigidly] righteous, He loves righteous deeds; the upright shall behold His face, '
  - type: text
    content: or
  - type: text
    content: ' He beholds the upright.'
