document_id: PSA.11,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Chief Musician {or} Choir Leader. +[A Psalm+] of David.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' IN THE Lord I take refuge [and put my trust]; how can you say to me, Flee like a bird to your mountain?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' For see, the wicked are bending the bow; they make ready their arrow upon the string, that they [furtively] in darkness may shoot at the upright in heart.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' If the foundations are destroyed, what can the [unyieldingly] righteous do, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' what has He [the Righteous One] wrought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' accomplished?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' The Lord is in His holy temple; the Lord''s throne is in heaven. His eyes behold; His eyelids test '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prove the children of men. [Acts 7:49; Rev. 4:2.]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' The Lord tests '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proves the [unyieldingly] righteous, but His soul abhors the wicked and him who loves violence. [James 1:12.]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Upon the wicked He will rain quick burning coals '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' snares; fire, brimstone, and a [dreadful] scorching wind shall be the portion of their cup.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' For the Lord is [rigidly] righteous, He loves righteous deeds; the upright shall behold His face, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' He beholds the upright.'
