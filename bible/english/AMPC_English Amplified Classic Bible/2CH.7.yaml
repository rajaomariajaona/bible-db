document_id: 2CH.7,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' WHEN SOLOMON had finished praying, the fire came down from heaven and consumed the burnt offering and the sacrifices, and the glory of the Lord filled the house.'
  '10':
  - type: text
    content: ' And on the twenty-third day of the seventh month he sent the people away to their homes, glad and merry in heart for the goodness that the Lord had shown to David, to Solomon, and to Israel His people.'
  '11':
  - type: text
    content: ' Thus Solomon finished the Lord''s house and the king''s house; all that [he] had planned to do in the Lord''s house and his own house he accomplished successfully.'
  '12':
  - type: text
    content: ' And the Lord appeared to Solomon by night and said to him: I have heard your prayer and have chosen this place for Myself as a house of sacrifice.'
  '13':
  - type: text
    content: ' If I shut up heaven so no rain falls, or if I command locusts to devour the land, or if I send pestilence among My people,'
  '14':
  - type: text
    content: ' If My people, who are called by My name, shall humble themselves, pray, seek, crave, '
  - type: text
    content: and
  - type: text
    content: ' require of necessity My face and turn from their wicked ways, then will I hear from heaven, forgive their sin, and heal their land.'
  '15':
  - type: text
    content: ' Now My eyes will be open and My ears attentive to prayer offered in this place.'
  '16':
  - type: text
    content: ' For I have chosen and sanctified (set apart for holy use) this house, that My Name may be here forever, and My eyes and My heart will be here perpetually.'
  '17':
  - type: text
    content: ' As for you [Solomon], if you will walk before me as David your father walked, and do all I have commanded you, and observe My statutes and My ordinances, [I Kings 11:1-11.]'
  '18':
  - type: text
    content: ' Then I will establish the throne of your kingdom, as I covenanted with David your father, saying, There shall not fail you a man to be ruler in Israel.'
  '19':
  - type: text
    content: ' But if you [people] turn away and forsake My statutes and My commandments which I have set before you and go and serve other gods and worship them,'
  '2':
  - type: text
    content: ' The priests could not enter the house of the Lord, because the glory of the Lord had filled the Lord''s house.'
  '20':
  - type: text
    content: ' Then will I pluck [Israel] up by the roots out of My land which I have given [them]; and this house which I have hallowed for My Name will I cast out of My sight, and will make it to be a proverb and a byword among all nations. [Jer. 24:9, 10.]'
  '21':
  - type: text
    content: ' And this house, which was so high, shall be an astonishment to everyone passing it, and they will say, Why has the Lord done thus to this land and to this house?'
  '22':
  - type: text
    content: ' Then men will say, Because they forsook the Lord, the God of their fathers, Who brought them out of Egypt, and they laid hold of other gods and worshiped and served them; therefore has He brought all this evil upon them.'
  '3':
  - type: text
    content: ' And when all the people of Israel saw how the fire came down and the glory of the Lord upon the house, they bowed with their faces upon the pavement and worshiped and praised the Lord, saying, For He is good, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever.'
  '4':
  - type: text
    content: ' Then the king and all the people offered sacrifices before the Lord.'
  '5':
  - type: text
    content: ' King Solomon offered a sacrifice of 22,000 oxen and 120,000 sheep. So the king and all the people dedicated God''s house.'
  '6':
  - type: text
    content: ' The priests stood at their posts, and the Levites also, with instruments of music to the Lord, which King David had made to praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to the Lord–for His mercy '
  - type: text
    content: and
  - type: text
    content: ' loving-kindness endure forever–whenever David praised through their ministry; the priests blew trumpets before them, and all Israel stood.'
  '7':
  - type: text
    content: ' Moreover, Solomon consecrated the middle of the court that was before the house of the Lord, for there he offered burnt offerings and the fat of the peace offerings, because the bronze altar which [he] had made was not sufficient to receive the burnt offerings, the cereal offerings, and the fat.'
  '8':
  - type: text
    content: ' At that time Solomon held the feast for seven days, and all Israel with him, a very great assembly, from the entrance of Hamath to the Brook of Egypt.'
  '9':
  - type: text
    content: ' The eighth day they made a solemn assembly, for they had kept the dedication of the altar and the feast, each for seven days.'
