document_id: LUK.15,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' NOW THE tax collectors and [notorious and especially wicked] sinners were all coming near to [Jesus] to listen to Him.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' Even so, I tell you, there is joy among '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in the presence of the angels of God over one [especially] wicked person who repents (changes his mind for the better, heartily amending his ways, with abhorrence of his past sins).'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' And He said, There was a certain man who had two sons;'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And the younger of them said to his father, Father, give me the part of the property that falls [to me]. And he divided the estate between them. [Deut. 21:15-17.]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' And not many days after that, the younger son gathered up all that he had and journeyed into a distant country, and there he wasted his fortune in reckless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loose [from restraint] living.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' And when he had spent all he had, a mighty famine came upon that country, and he began to fall behind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be in want.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' So he went and forced (glued) himself upon one of the citizens of that country, who sent him into his fields to feed hogs.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And he would gladly have fed on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: filled his belly with
    - type: text
      text: ' the carob pods that the hogs were eating, but [they could not satisfy his hunger and] nobody gave him anything [better]. [Jer. 30:14.]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' Then when he came to himself, he said, How many hired servants of my father have enough food, and [even food] to spare, but I am perishing (dying) here of hunger!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' I will get up and go to my father, and I will say to him, Father, I have sinned against heaven and in your sight.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' I am no longer worthy to be called your son; [just] make me like one of your hired servants.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' And the Pharisees and the scribes kept muttering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indignantly complaining, saying, This man accepts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' receives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomes [preeminently wicked] sinners and eats with them.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' So he got up and came to his [own] father. But while he was still a long way off, his father saw him and was moved with pity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tenderness [for him]; and he ran and embraced him and kissed him [fervently].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' And the son said to him, Father, I have sinned against heaven and in your sight; I am no longer worthy to be called your son [I no longer deserve to be recognized as a son of yours]!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' But the father said to his bond servants, Bring quickly the best robe (the festive robe of honor) and put it on him; and give him a ring for his hand and sandals for his feet. [Gen. 41:42; Zech. 3:4.]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' And bring out that [wheat-]fattened calf and kill it; and let us revel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make merry,'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' Because this my son was dead and is alive again; he was lost and is found! And they began to revel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make merry.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' But his older son was in the field; and as he returned and came near the house, he heard music and dancing.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' And having called one of the servant [boys] to him, he began to ask what this meant.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' And he said to him, Your brother has come, and your father has killed that [wheat-]fattened calf, because he has received him back safe and well.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' But [the elder brother] was angry [with deep-seated wrath] and resolved not to go in. Then his father came out and began to plead with him,'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' But he answered his father, Look! These many years I have served you, and I have never disobeyed your command. Yet you never gave me [so much as] a [little] kid, that I might revel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make merry with my friends;'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So He told them this parable:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' But when this son of yours arrived, who has devoured your estate with immoral women, you have killed for him that [wheat-] fattened calf!'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' And the father said to him, Son, you are always with me, and all that is mine is yours.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' But it was fitting to make merry, to revel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feast and rejoice, for this brother of yours was dead and is alive again! He was lost and is found!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' What man of you, if he has a hundred sheep and should lose one of them, does not leave the ninety-nine in the wilderness (desert) and go after the one that is lost until he finds it?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And when he has found it, he lays it on his [own] shoulders, rejoicing.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' And when he gets home, he summons together [his] friends and [his] neighbors, saying to them, Rejoice with me, because I have found my sheep which was lost.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' Thus, I tell you, there will be more joy in heaven over one [especially] wicked person who repents (changes his mind, abhorring his errors and misdeeds, and determines to enter upon a better course of life) than over ninety-nine righteous persons who have no need of repentance.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Or what woman, having ten [silver] drachmas [each one equal to a day''s wages], if she loses one coin, does not light a lamp and sweep the house and look carefully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' diligently until she finds it?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' And when she has found it, she summons her [women] friends and neighbors, saying, Rejoice with me, for I have found the silver coin which I had lost.'
