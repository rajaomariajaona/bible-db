document_id: PSA.37,8
type_code: eng
verses:
  '1':
  - type: heading
    content: +[A Psalm+] of David.
  - type: text
    content: ' FRET NOT yourself because of evildoers, neither be envious against those who work unrighteousness (that which is not upright or in right standing with God).'
  '10':
  - type: text
    content: ' For yet a little while, and the evildoers will be no more; though you look with care where they used to be, they will not be found. [Heb. 10:36, 37; Rev. 21:7, 8.]'
  '11':
  - type: text
    content: ' But the meek [in the end] shall inherit the earth and shall delight themselves in the abundance of peace. [Ps. 37:29; Matt. 5:5.]'
  '12':
  - type: text
    content: ' The wicked plot against the [uncompromisingly] righteous (the upright in right standing with God); they gnash at them with their teeth.'
  '13':
  - type: text
    content: ' The Lord laughs at [the wicked], for He sees that their own day [of defeat] is coming.'
  '14':
  - type: text
    content: ' The wicked draw the sword and bend their bows to cast down the poor and needy, to slay those who walk uprightly (blameless in conduct and in conversation).'
  '15':
  - type: text
    content: ' The swords [of the wicked] shall enter their own hearts, and their bows shall be broken.'
  '16':
  - type: text
    content: ' Better is the little that the [uncompromisingly] righteous have than the abundance [of possessions] of many who are wrong '
  - type: text
    content: and
  - type: text
    content: ' wicked. [I Tim. 6:6, 7.]'
  '17':
  - type: text
    content: ' For the arms of the wicked shall be broken, but the Lord upholds the [consistently] righteous.'
  '18':
  - type: text
    content: ' The Lord knows the days of the upright '
  - type: text
    content: and
  - type: text
    content: ' blameless, and their heritage will abide forever.'
  '19':
  - type: text
    content: ' They shall not be put to shame in the time of evil; and in the days of famine they shall be satisfied.'
  '2':
  - type: text
    content: ' For they shall soon be cut down like the grass, and wither as the green herb.'
  '20':
  - type: text
    content: ' But the wicked shall perish, and the enemies of the Lord shall be as the fat of lambs [that is consumed in smoke] '
  - type: text
    content: and
  - type: text
    content: ' as the glory of the pastures. They shall vanish; like smoke shall they consume away.'
  '21':
  - type: text
    content: ' The wicked borrow and pay not again [for they may be unable], but the [uncompromisingly] righteous deal kindly and give [for they are able].'
  '22':
  - type: text
    content: ' For such as are blessed of God shall [in the end] inherit the earth, but they that are cursed of Him shall be cut off. [Isa. 57:13c.]'
  '23':
  - type: text
    content: ' The steps of a [good] man are directed '
  - type: text
    content: and
  - type: text
    content: ' established by the Lord when He delights in his way [and He busies Himself with his every step].'
  '24':
  - type: text
    content: ' Though he falls, he shall not be utterly cast down, for the Lord grasps his hand in support '
  - type: text
    content: and
  - type: text
    content: ' upholds him.'
  '25':
  - type: text
    content: ' I have been young and now am old, yet have I not seen the [uncompromisingly] righteous forsaken or their seed begging bread.'
  '26':
  - type: text
    content: ' All day long they are merciful '
  - type: text
    content: and
  - type: text
    content: ' deal graciously; they lend, and their offspring are blessed.'
  '27':
  - type: text
    content: ' Depart from evil and do good; and you will dwell forever [securely].'
  '28':
  - type: text
    content: ' For the Lord delights in justice and forsakes not His saints; they are preserved forever, but the offspring of the wicked [in time] shall be cut off.'
  '29':
  - type: text
    content: ' [Then] the [consistently] righteous shall inherit the land and dwell upon it forever.'
  '3':
  - type: text
    content: ' Trust (lean on, rely on, and be confident) in the Lord and do good; so shall you dwell in the land and feed surely on His faithfulness, '
  - type: text
    content: and
  - type: text
    content: ' truly you shall be fed.'
  '30':
  - type: text
    content: ' The mouth of the [uncompromisingly] righteous utters wisdom, and his tongue speaks with justice.'
  '31':
  - type: text
    content: ' The law of his God is in his heart; none of his steps shall slide.'
  '32':
  - type: text
    content: ' The wicked lie in wait for the [uncompromisingly] righteous and seek to put them to death.'
  '33':
  - type: text
    content: ' The Lord will not leave them in their hands, or [suffer them to] condemn them when they are judged.'
  '34':
  - type: text
    content: ' Wait for '
  - type: text
    content: and
  - type: text
    content: ' expect the Lord and keep '
  - type: text
    content: and
  - type: text
    content: ' heed His way, and He will exalt you to inherit the land; [in the end] when the wicked are cut off, you shall see it.'
  '35':
  - type: text
    content: ' I have seen a wicked man in great power and spreading himself like a green tree in its native soil,'
  '36':
  - type: text
    content: ' Yet he passed away, and behold, he was not; yes, I sought '
  - type: text
    content: and
  - type: text
    content: ' inquired for him, but he could not be found.'
  '37':
  - type: text
    content: ' Mark the blameless man and behold the upright, for there is a happy end for the man of peace.'
  '38':
  - type: text
    content: ' As for transgressors, they shall be destroyed together; in the end the wicked shall be cut off.'
  '39':
  - type: text
    content: ' But the salvation of the [consistently] righteous is of the Lord; He is their Refuge '
  - type: text
    content: and
  - type: text
    content: ' secure Stronghold in the time of trouble.'
  '4':
  - type: text
    content: ' Delight yourself also in the Lord, and He will give you the desires '
  - type: text
    content: and
  - type: text
    content: ' secret petitions of your heart.'
  '40':
  - type: text
    content: ' And the Lord helps them and delivers them; He delivers them from the wicked and saves them, because they trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge in Him.'
  '5':
  - type: text
    content: ' Commit your way to the Lord [roll and repose each care of your load on Him]; trust (lean on, rely on, and be confident) also in Him and He will bring it to pass.'
  '6':
  - type: text
    content: ' And He will make your uprightness '
  - type: text
    content: and
  - type: text
    content: ' right standing with God go forth as the light, and your justice '
  - type: text
    content: and
  - type: text
    content: ' right as [the shining sun of] the noonday.'
  '7':
  - type: text
    content: ' Be still '
  - type: text
    content: and
  - type: text
    content: ' rest in the Lord; wait for Him '
  - type: text
    content: and
  - type: text
    content: ' patiently lean yourself upon Him; fret not yourself because of him who prospers in his way, because of the man who brings wicked devices to pass.'
  '8':
  - type: text
    content: ' Cease from anger and forsake wrath; fret not yourself–it tends only to evildoing.'
  '9':
  - type: text
    content: ' For evildoers shall be cut off, but those who wait '
  - type: text
    content: and
  - type: text
    content: ' hope '
  - type: text
    content: and
  - type: text
    content: ' look for the Lord [in the end] shall inherit the earth. [Isa. 57:13c.]'
