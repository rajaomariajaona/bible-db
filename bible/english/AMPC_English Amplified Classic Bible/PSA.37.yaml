document_id: PSA.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: +[A Psalm+] of David.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FRET NOT yourself because of evildoers, neither be envious against those who work unrighteousness (that which is not upright or in right standing with God).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' For they shall soon be cut down like the grass, and wither as the green herb.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Trust (lean on, rely on, and be confident) in the Lord and do good; so shall you dwell in the land and feed surely on His faithfulness, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' truly you shall be fed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Delight yourself also in the Lord, and He will give you the desires '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' secret petitions of your heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Commit your way to the Lord [roll and repose each care of your load on Him]; trust (lean on, rely on, and be confident) also in Him and He will bring it to pass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And He will make your uprightness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right standing with God go forth as the light, and your justice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right as [the shining sun of] the noonday.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' Be still '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rest in the Lord; wait for Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patiently lean yourself upon Him; fret not yourself because of him who prospers in his way, because of the man who brings wicked devices to pass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Cease from anger and forsake wrath; fret not yourself–it tends only to evildoing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For evildoers shall be cut off, but those who wait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' look for the Lord [in the end] shall inherit the earth. [Isa. 57:13c.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' For yet a little while, and the evildoers will be no more; though you look with care where they used to be, they will not be found. [Heb. 10:36, 37; Rev. 21:7, 8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' But the meek [in the end] shall inherit the earth and shall delight themselves in the abundance of peace. [Ps. 37:29; Matt. 5:5.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The wicked plot against the [uncompromisingly] righteous (the upright in right standing with God); they gnash at them with their teeth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' The Lord laughs at [the wicked], for He sees that their own day [of defeat] is coming.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The wicked draw the sword and bend their bows to cast down the poor and needy, to slay those who walk uprightly (blameless in conduct and in conversation).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The swords [of the wicked] shall enter their own hearts, and their bows shall be broken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' Better is the little that the [uncompromisingly] righteous have than the abundance [of possessions] of many who are wrong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wicked. [I Tim. 6:6, 7.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For the arms of the wicked shall be broken, but the Lord upholds the [consistently] righteous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' The Lord knows the days of the upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blameless, and their heritage will abide forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' They shall not be put to shame in the time of evil; and in the days of famine they shall be satisfied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' But the wicked shall perish, and the enemies of the Lord shall be as the fat of lambs [that is consumed in smoke] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' as the glory of the pastures. They shall vanish; like smoke shall they consume away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The wicked borrow and pay not again [for they may be unable], but the [uncompromisingly] righteous deal kindly and give [for they are able].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' For such as are blessed of God shall [in the end] inherit the earth, but they that are cursed of Him shall be cut off. [Isa. 57:13c.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' The steps of a [good] man are directed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established by the Lord when He delights in his way [and He busies Himself with his every step].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Though he falls, he shall not be utterly cast down, for the Lord grasps his hand in support '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' upholds him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' I have been young and now am old, yet have I not seen the [uncompromisingly] righteous forsaken or their seed begging bread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' All day long they are merciful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deal graciously; they lend, and their offspring are blessed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' Depart from evil and do good; and you will dwell forever [securely].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' For the Lord delights in justice and forsakes not His saints; they are preserved forever, but the offspring of the wicked [in time] shall be cut off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' [Then] the [consistently] righteous shall inherit the land and dwell upon it forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' The mouth of the [uncompromisingly] righteous utters wisdom, and his tongue speaks with justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' The law of his God is in his heart; none of his steps shall slide.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' The wicked lie in wait for the [uncompromisingly] righteous and seek to put them to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' The Lord will not leave them in their hands, or [suffer them to] condemn them when they are judged.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' Wait for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expect the Lord and keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed His way, and He will exalt you to inherit the land; [in the end] when the wicked are cut off, you shall see it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' I have seen a wicked man in great power and spreading himself like a green tree in its native soil,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Yet he passed away, and behold, he was not; yes, I sought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inquired for him, but he could not be found.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' Mark the blameless man and behold the upright, for there is a happy end for the man of peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' As for transgressors, they shall be destroyed together; in the end the wicked shall be cut off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' But the salvation of the [consistently] righteous is of the Lord; He is their Refuge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' secure Stronghold in the time of trouble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' And the Lord helps them and delivers them; He delivers them from the wicked and saves them, because they trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' take refuge in Him.'
