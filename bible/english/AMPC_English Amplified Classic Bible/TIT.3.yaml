document_id: TIT.3,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' REMIND PEOPLE to be submissive to [their] magistrates and authorities, to be obedient, to be prepared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' willing to do any upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honorable work,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [As for] a man who is factious [a heretical sectarian and cause of divisions], after admonishing him a first and second time, reject [him from your fellowship and have nothing more to do with him],'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Well aware that such a person has utterly changed (is perverted and corrupted); he goes on sinning [though he] is convicted of guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-condemned.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When I send Artemas or [perhaps] Tychicus to you, lose no time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' make every effort to come to me at Nicopolis, for I have decided to spend the winter there.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Do your utmost to speed Zenas the lawyer and Apollos on their way; see that they want for (lack) nothing.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And let our own [people really] learn to apply themselves to good deeds (to honest labor and honorable employment), so that they may be able to meet necessary demands whenever the occasion may require and not be living idle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uncultivated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unfruitful lives.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All who are with me wish to be remembered to you. Greet those who love us in the faith. Grace (God''s favor and blessing) be with you all. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen (so be it).
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' To slander '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' abuse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' speak evil of no one, to avoid being contentious, to be forbearing (yielding, gentle, and conciliatory), and to show unqualified courtesy toward everybody.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For we also were once thoughtless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' senseless, obstinate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disobedient, deluded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' misled; [we too were once] slaves to all sorts of cravings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasures, wasting our days in malice and jealousy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' envy, hateful (hated, detestable) and hating one another.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when the goodness and loving-kindness of God our Savior to man [as man] appeared,'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He saved us, not because of any works of righteousness that we had done, but because of His own pity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy, by [the] cleansing [bath] of the new birth (regeneration) and renewing of the Holy Spirit,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Which He poured out [so] richly upon us through Jesus Christ our Savior.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' [And He did it in order] that we might be justified by His grace (by His favor, wholly undeserved), [that we might be acknowledged and counted as conformed to the divine will in purpose, thought, and action], and that we might become heirs of eternal life according to [our] hope.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This message is most trustworthy, and concerning these things I want you to insist steadfastly, so that those who have believed in (trusted in, relied on) God may be careful to apply themselves to honorable occupations '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to doing good, for such things are [not only] excellent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right [in themselves], but [they are] good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profitable for the people.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But avoid stupid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' foolish controversies and genealogies and dissensions and wrangling about the Law, for they are unprofitable and futile.'
