document_id: TIT.3,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' REMIND PEOPLE to be submissive to [their] magistrates and authorities, to be obedient, to be prepared '
  - type: text
    content: and
  - type: text
    content: ' willing to do any upright '
  - type: text
    content: and
  - type: text
    content: ' honorable work,'
  '10':
  - type: text
    content: ' [As for] a man who is factious [a heretical sectarian and cause of divisions], after admonishing him a first and second time, reject [him from your fellowship and have nothing more to do with him],'
  '11':
  - type: text
    content: ' Well aware that such a person has utterly changed (is perverted and corrupted); he goes on sinning [though he] is convicted of guilt '
  - type: text
    content: and
  - type: text
    content: ' self-condemned.'
  '12':
  - type: text
    content: ' When I send Artemas or [perhaps] Tychicus to you, lose no time '
  - type: text
    content: but
  - type: text
    content: ' make every effort to come to me at Nicopolis, for I have decided to spend the winter there.'
  '13':
  - type: text
    content: ' Do your utmost to speed Zenas the lawyer and Apollos on their way; see that they want for (lack) nothing.'
  '14':
  - type: text
    content: ' And let our own [people really] learn to apply themselves to good deeds (to honest labor and honorable employment), so that they may be able to meet necessary demands whenever the occasion may require and not be living idle '
  - type: text
    content: and
  - type: text
    content: ' uncultivated '
  - type: text
    content: and
  - type: text
    content: ' unfruitful lives.'
  '15':
  - type: text
    content: ' All who are with me wish to be remembered to you. Greet those who love us in the faith. Grace (God''s favor and blessing) be with you all. '
  - type: text
    content: Amen (so be it).
  '2':
  - type: text
    content: ' To slander '
  - type: text
    content: or
  - type: text
    content: ' abuse '
  - type: text
    content: or
  - type: text
    content: ' speak evil of no one, to avoid being contentious, to be forbearing (yielding, gentle, and conciliatory), and to show unqualified courtesy toward everybody.'
  '3':
  - type: text
    content: ' For we also were once thoughtless '
  - type: text
    content: and
  - type: text
    content: ' senseless, obstinate '
  - type: text
    content: and
  - type: text
    content: ' disobedient, deluded '
  - type: text
    content: and
  - type: text
    content: ' misled; [we too were once] slaves to all sorts of cravings '
  - type: text
    content: and
  - type: text
    content: ' pleasures, wasting our days in malice and jealousy '
  - type: text
    content: and
  - type: text
    content: ' envy, hateful (hated, detestable) and hating one another.'
  '4':
  - type: text
    content: ' But when the goodness and loving-kindness of God our Savior to man [as man] appeared,'
  '5':
  - type: text
    content: ' He saved us, not because of any works of righteousness that we had done, but because of His own pity '
  - type: text
    content: and
  - type: text
    content: ' mercy, by [the] cleansing [bath] of the new birth (regeneration) and renewing of the Holy Spirit,'
  '6':
  - type: text
    content: ' Which He poured out [so] richly upon us through Jesus Christ our Savior.'
  '7':
  - type: text
    content: ' [And He did it in order] that we might be justified by His grace (by His favor, wholly undeserved), [that we might be acknowledged and counted as conformed to the divine will in purpose, thought, and action], and that we might become heirs of eternal life according to [our] hope.'
  '8':
  - type: text
    content: ' This message is most trustworthy, and concerning these things I want you to insist steadfastly, so that those who have believed in (trusted in, relied on) God may be careful to apply themselves to honorable occupations '
  - type: text
    content: and
  - type: text
    content: ' to doing good, for such things are [not only] excellent '
  - type: text
    content: and
  - type: text
    content: ' right [in themselves], but [they are] good '
  - type: text
    content: and
  - type: text
    content: ' profitable for the people.'
  '9':
  - type: text
    content: ' But avoid stupid '
  - type: text
    content: and
  - type: text
    content: ' foolish controversies and genealogies and dissensions and wrangling about the Law, for they are unprofitable and futile.'
