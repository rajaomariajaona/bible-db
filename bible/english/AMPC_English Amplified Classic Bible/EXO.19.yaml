document_id: EXO.19
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' IN THE third month after the Israelites left the land of Egypt, the same day, they came into the Wilderness of Sinai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' When they had departed from Rephidim and had come to the Wilderness of Sinai, they encamped there before the mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Moses went up to God, and the Lord called to him out of the mountain, Say this to the house of Jacob and tell the Israelites:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' You have seen what I did to the Egyptians, and how I bore you on eagles'' wings and brought you to Myself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Now therefore, if you will obey My voice in truth and keep My covenant, then you shall be My own peculiar possession '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treasure from among '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' above all peoples; for all the earth is Mine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And you shall be to Me a kingdom of priests, a holy nation [consecrated, set apart to the worship of God]. These are the words you shall speak to the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So Moses called for the elders of the people and told them all these words which the Lord commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' And all the people answered together, and said, All that the Lord has spoken we will do. And Moses reported the words of the people to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the Lord said to Moses, Behold, I come to you in a thick cloud, that the people may hear when I speak with you and believe you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remain steadfast forever. Then Moses told the words of the people to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And the Lord said to Moses, Go and sanctify the people [set them apart for God] today and tomorrow, and let them wash their clothes'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' And be ready by the third day, for the third day the Lord will come down upon Mount Sinai [in the cloud] in the sight of all the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' And you shall set bounds for the people round about, saying, Take heed that you go not up into the mountain or touch the border of it. Whoever touches the mountain shall surely be put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' No hand shall touch it [or the offender], but he shall surely be stoned or shot [with arrows]; whether beast or man, he shall not live. When the trumpet sounds a long blast, they shall come up to the mountain. [Num. 24:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' So Moses went down from the mountain to the people and sanctified them [set them apart for God], and they washed their clothes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' And he said to the people, Be ready by the day after tomorrow; do not go near a woman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' The third morning there were thunders and lightnings, and a thick cloud upon the mountain, and a very loud trumpet blast, so that all the people in the camp trembled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' Then Moses brought the people from the camp to meet God, and they stood at the foot of the mountain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' Mount Sinai was wrapped in smoke, for the Lord descended upon it in fire; its smoke ascended like that of a furnace, and the whole mountain quaked greatly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' As the trumpet blast grew louder and louder, Moses spoke and God answered him with a voice. [Deut. 4:12.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' The Lord came down upon Mount Sinai to the top of the mountain, and the Lord called Moses to the top of the mountain, and Moses went up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The Lord said to Moses, Go down and warn the people, lest they break through to the Lord to gaze and many of them perish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' And also let the priests, who come near to the Lord, sanctify (set apart) themselves [for God], lest the Lord break forth against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And Moses said to the Lord, The people cannot come up to Mount Sinai, for You Yourself charged us, saying, Set bounds about the mountain and sanctify it [set it apart for God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Then the Lord said to him, Go, get down and you shall come up, you and Aaron with you; but let not the priests and the people break through to come up to the Lord, lest He break forth against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' So Moses went down to the people and told them.'
