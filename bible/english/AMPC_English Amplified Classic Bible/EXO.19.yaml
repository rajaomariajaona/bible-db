document_id: EXO.19,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' IN THE third month after the Israelites left the land of Egypt, the same day, they came into the Wilderness of Sinai.'
  '10':
  - type: text
    content: ' And the Lord said to Moses, Go and sanctify the people [set them apart for God] today and tomorrow, and let them wash their clothes'
  '11':
  - type: text
    content: ' And be ready by the third day, for the third day the Lord will come down upon Mount Sinai [in the cloud] in the sight of all the people.'
  '12':
  - type: text
    content: ' And you shall set bounds for the people round about, saying, Take heed that you go not up into the mountain or touch the border of it. Whoever touches the mountain shall surely be put to death.'
  '13':
  - type: text
    content: ' No hand shall touch it [or the offender], but he shall surely be stoned or shot [with arrows]; whether beast or man, he shall not live. When the trumpet sounds a long blast, they shall come up to the mountain. [Num. 24:8.]'
  '14':
  - type: text
    content: ' So Moses went down from the mountain to the people and sanctified them [set them apart for God], and they washed their clothes.'
  '15':
  - type: text
    content: ' And he said to the people, Be ready by the day after tomorrow; do not go near a woman.'
  '16':
  - type: text
    content: ' The third morning there were thunders and lightnings, and a thick cloud upon the mountain, and a very loud trumpet blast, so that all the people in the camp trembled.'
  '17':
  - type: text
    content: ' Then Moses brought the people from the camp to meet God, and they stood at the foot of the mountain.'
  '18':
  - type: text
    content: ' Mount Sinai was wrapped in smoke, for the Lord descended upon it in fire; its smoke ascended like that of a furnace, and the whole mountain quaked greatly.'
  '19':
  - type: text
    content: ' As the trumpet blast grew louder and louder, Moses spoke and God answered him with a voice. [Deut. 4:12.]'
  '2':
  - type: text
    content: ' When they had departed from Rephidim and had come to the Wilderness of Sinai, they encamped there before the mountain.'
  '20':
  - type: text
    content: ' The Lord came down upon Mount Sinai to the top of the mountain, and the Lord called Moses to the top of the mountain, and Moses went up.'
  '21':
  - type: text
    content: ' The Lord said to Moses, Go down and warn the people, lest they break through to the Lord to gaze and many of them perish.'
  '22':
  - type: text
    content: ' And also let the priests, who come near to the Lord, sanctify (set apart) themselves [for God], lest the Lord break forth against them.'
  '23':
  - type: text
    content: ' And Moses said to the Lord, The people cannot come up to Mount Sinai, for You Yourself charged us, saying, Set bounds about the mountain and sanctify it [set it apart for God].'
  '24':
  - type: text
    content: ' Then the Lord said to him, Go, get down and you shall come up, you and Aaron with you; but let not the priests and the people break through to come up to the Lord, lest He break forth against them.'
  '25':
  - type: text
    content: ' So Moses went down to the people and told them.'
  '3':
  - type: text
    content: ' And Moses went up to God, and the Lord called to him out of the mountain, Say this to the house of Jacob and tell the Israelites:'
  '4':
  - type: text
    content: ' You have seen what I did to the Egyptians, and how I bore you on eagles'' wings and brought you to Myself.'
  '5':
  - type: text
    content: ' Now therefore, if you will obey My voice in truth and keep My covenant, then you shall be My own peculiar possession '
  - type: text
    content: and
  - type: text
    content: ' treasure from among '
  - type: text
    content: and
  - type: text
    content: ' above all peoples; for all the earth is Mine.'
  '6':
  - type: text
    content: ' And you shall be to Me a kingdom of priests, a holy nation [consecrated, set apart to the worship of God]. These are the words you shall speak to the Israelites.'
  '7':
  - type: text
    content: ' So Moses called for the elders of the people and told them all these words which the Lord commanded him.'
  '8':
  - type: text
    content: ' And all the people answered together, and said, All that the Lord has spoken we will do. And Moses reported the words of the people to the Lord.'
  '9':
  - type: text
    content: ' And the Lord said to Moses, Behold, I come to you in a thick cloud, that the people may hear when I speak with you and believe you '
  - type: text
    content: and
  - type: text
    content: ' remain steadfast forever. Then Moses told the words of the people to the Lord.'
