document_id: GEN.22,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' AFTER THESE events, God tested '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proved Abraham and said to him, Abraham! And he said, Here I am.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' And Abraham stretched forth his hand and took hold of the knife to slay his son. [Heb. 11:17-19.]'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' But the Angel of the Lord called to him from heaven and said, Abraham, Abraham! He answered, Here I am.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' And He said, Do not lay your hand on the lad or do anything to him; for now I know that you fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revere God, since you have not held back from Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' begrudged giving Me your son, your only son.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' Then Abraham looked up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glanced around, and behold, behind him was a ram caught in a thicket by his horns. And Abraham went and took the ram and offered it up for a burnt offering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' an ascending sacrifice instead of his son!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' So Abraham called the name of that place The Lord Will Provide. And it is said to this day, On the mount of the Lord it will be provided.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' The Angel of the Lord called to Abraham from heaven a second time'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' And said, I have sworn by Myself, says the Lord, that since you have done this and have not withheld [from Me] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' begrudged [giving Me] your son, your only son,'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' In blessing I will bless you and in multiplying I will multiply your descendants like the stars of the heavens and like the sand on the seashore. And your Seed (Heir) will possess the gate of His enemies, [Heb. 6:13, 14; 11:12.]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' And in your Seed [Christ] shall all the nations of the earth be blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [by Him] bless themselves, because you have heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obeyed My voice. [Gen. 12:2-3; 13:16; 22:18; 26:4; 28:14; Acts 3:25, 26; Gal. 3:16.]'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' So Abraham returned to his servants, and they rose up and went with him to Beersheba; there Abraham lived.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' [God] said, Take now your son, your only son Isaac, whom you love, and go to the region of Moriah; and offer him there as a burnt offering upon one of the mountains of which I will tell you.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' Now after these things, it was told Abraham, Milcah has also borne children to your brother Nahor:'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' Uz the firstborn, Buz his brother, Kemuel the father of Aram,'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Chesed, Hazo, Pildash, Jidlaph, and Bethuel.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' Bethuel became the father of Rebekah. These eight Milcah bore to Nahor, Abraham''s brother.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' And his concubine, whose name was Reumah, bore Tebah, Gaham, Tahash, and Maacah.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' So Abraham rose early in the morning, saddled his donkey, and took two of his young men with him and his son Isaac; and he split the wood for the burnt offering, and then began the trip to the place of which God had told him.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' On the third day Abraham looked up and saw the place in the distance.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' And Abraham said to his servants, Settle down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stay here with the donkey, and I and the young man will go yonder and worship and come again to you.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' Then Abraham took the wood for the burnt offering and laid it on [the shoulders of] Isaac his son, and he took the fire (the firepot) in his own hand, and a knife; and the two of them went on together.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' And Isaac said to Abraham, My father! And he said, Here I am, my son. [Isaac] said, See, here are the fire and the wood, but where is the lamb for the burnt sacrifice?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' Abraham said, My son, God Himself will provide a lamb for the burnt offering. So the two went on together.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' When they came to the place of which God had told him, Abraham built an altar there; then he laid the wood in order and bound Isaac his son and laid him on the altar on the wood. [Matt. 10:37.]'
