document_id: ZEC.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE BURDEN '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' oracle (the thing to be lifted up) of the word of the Lord is against the land of Hadrach [in Syria], and Damascus shall be its resting place, for the Lord has an eye upon mankind as upon all the tribes of Israel,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Hamath also, which borders on [Damascus], Tyre with Sidon, though they are very wise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' And Tyre has built herself a stronghold [on an island a half mile from the shore, which seems impregnable], and heaped up silver like dust and fine gold like the mire of the streets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Behold, the Lord will cast her out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dispossess her; He will smite her power in the sea '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' into it and [Tyre] shall be devoured by fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' [The strong cities of Philistia] shall see it and fear; Ashkelon, Gaza also, and be sorely pained, and Ekron, for her confidence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectation shall be put to shame, and a king [monarchial government] shall perish from Gaza, and Ashkelon shall not be inhabited.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And a mongrel people shall dwell in Ashdod, and I will put an end to the pride of the Philistines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' And I will take out of [the Philistines''] mouths and from between their teeth the abominable idolatrous sacrifices eaten with the blood. And they too shall remain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be a remnant for our God, and they shall be like chieftains (the head over a thousand) in Judah, and Ekron shall be like one of the Jebusites [who at last were merged and had lost their identity in Israel].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Then I will encamp about My house as a guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a garrison so that none shall march back and forth, and no oppressor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' demanding collector shall again overrun them, for now My eyes are upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Rejoice greatly, O Daughter of Zion! Shout aloud, O Daughter of Jerusalem! Behold, your King comes to you; He is [uncompromisingly] just and having salvation [triumphant and victorious], patient, meek, lowly, and riding on a donkey, upon a colt, the foal of a donkey. [Matt. 21:5; John 12:14, 15.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And I will cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exterminate the war chariot from Ephraim and the [war] horse from Jerusalem, and the battle bow shall be cut off; and He shall speak the word and peace shall come to the nations, and His dominion shall be from the [Mediterranean] Sea to [any other] sea, and from the River [Euphrates] to the ends of the earth! [Ps. 72:8.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' As for you also, because of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' for the sake of the [covenant of the Lord with His people, which was sealed with sprinkled] covenant blood, I have released '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sent forth your imprisoned people out of the waterless pit. [Gen. 37:24; Exod. 24:4-8; Heb. 9:16.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Return to the stronghold [of security and prosperity], you prisoners of hope; even today do I declare that I will restore double your former prosperity to you. [Ps. 40:2; Isa. 40:2.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' For I have bent Judah for Myself as My bow, filled the bow with Ephraim as My arrow, and will stir up your sons, O Zion, against your sons, O Greece, and will make you [Israel] as the sword of a mighty man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And the Lord shall be seen over them and His arrow shall go forth as the lightning, and the Lord God will blow the trumpet and will go forth in the windstorms of the south.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' The Lord of hosts shall defend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect them; and they shall devour and they shall tread on [their fallen enemies] as on slingstones [that have missed their aim], and they shall drink [of victory] and be noisy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turbulent as from wine and become full like bowls [used to catch the sacrificial blood], like the corners of the [sacrificial] altar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And the Lord their God will save them on that day as the flock of His people, for they shall be as the [precious] jewels of a crown, lifted high over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shining glitteringly upon His land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' For how great is God''s goodness and how great is His beauty! And how great [He will make Israel''s] goodliness and [Israel''s] beauty! Grain shall make the young men thrive and fresh wine the maidens.'
