document_id: ZEC.9,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THE BURDEN '
  - type: text
    content: or
  - type: text
    content: ' oracle (the thing to be lifted up) of the word of the Lord is against the land of Hadrach [in Syria], and Damascus shall be its resting place, for the Lord has an eye upon mankind as upon all the tribes of Israel,'
  '10':
  - type: text
    content: ' And I will cut off '
  - type: text
    content: and
  - type: text
    content: ' exterminate the war chariot from Ephraim and the [war] horse from Jerusalem, and the battle bow shall be cut off; and He shall speak the word and peace shall come to the nations, and His dominion shall be from the [Mediterranean] Sea to [any other] sea, and from the River [Euphrates] to the ends of the earth! [Ps. 72:8.]'
  '11':
  - type: text
    content: ' As for you also, because of '
  - type: text
    content: and
  - type: text
    content: ' for the sake of the [covenant of the Lord with His people, which was sealed with sprinkled] covenant blood, I have released '
  - type: text
    content: and
  - type: text
    content: ' sent forth your imprisoned people out of the waterless pit. [Gen. 37:24; Exod. 24:4-8; Heb. 9:16.]'
  '12':
  - type: text
    content: ' Return to the stronghold [of security and prosperity], you prisoners of hope; even today do I declare that I will restore double your former prosperity to you. [Ps. 40:2; Isa. 40:2.]'
  '13':
  - type: text
    content: ' For I have bent Judah for Myself as My bow, filled the bow with Ephraim as My arrow, and will stir up your sons, O Zion, against your sons, O Greece, and will make you [Israel] as the sword of a mighty man.'
  '14':
  - type: text
    content: ' And the Lord shall be seen over them and His arrow shall go forth as the lightning, and the Lord God will blow the trumpet and will go forth in the windstorms of the south.'
  '15':
  - type: text
    content: ' The Lord of hosts shall defend '
  - type: text
    content: and
  - type: text
    content: ' protect them; and they shall devour and they shall tread on [their fallen enemies] as on slingstones [that have missed their aim], and they shall drink [of victory] and be noisy '
  - type: text
    content: and
  - type: text
    content: ' turbulent as from wine and become full like bowls [used to catch the sacrificial blood], like the corners of the [sacrificial] altar.'
  '16':
  - type: text
    content: ' And the Lord their God will save them on that day as the flock of His people, for they shall be as the [precious] jewels of a crown, lifted high over '
  - type: text
    content: and
  - type: text
    content: ' shining glitteringly upon His land.'
  '17':
  - type: text
    content: ' For how great is God''s goodness and how great is His beauty! And how great [He will make Israel''s] goodliness and [Israel''s] beauty! Grain shall make the young men thrive and fresh wine the maidens.'
  '2':
  - type: text
    content: ' And Hamath also, which borders on [Damascus], Tyre with Sidon, though they are very wise.'
  '3':
  - type: text
    content: ' And Tyre has built herself a stronghold [on an island a half mile from the shore, which seems impregnable], and heaped up silver like dust and fine gold like the mire of the streets.'
  '4':
  - type: text
    content: ' Behold, the Lord will cast her out '
  - type: text
    content: and
  - type: text
    content: ' dispossess her; He will smite her power in the sea '
  - type: text
    content: and
  - type: text
    content: ' into it and [Tyre] shall be devoured by fire.'
  '5':
  - type: text
    content: ' [The strong cities of Philistia] shall see it and fear; Ashkelon, Gaza also, and be sorely pained, and Ekron, for her confidence '
  - type: text
    content: and
  - type: text
    content: ' expectation shall be put to shame, and a king [monarchial government] shall perish from Gaza, and Ashkelon shall not be inhabited.'
  '6':
  - type: text
    content: ' And a mongrel people shall dwell in Ashdod, and I will put an end to the pride of the Philistines.'
  '7':
  - type: text
    content: ' And I will take out of [the Philistines''] mouths and from between their teeth the abominable idolatrous sacrifices eaten with the blood. And they too shall remain '
  - type: text
    content: and
  - type: text
    content: ' be a remnant for our God, and they shall be like chieftains (the head over a thousand) in Judah, and Ekron shall be like one of the Jebusites [who at last were merged and had lost their identity in Israel].'
  '8':
  - type: text
    content: ' Then I will encamp about My house as a guard '
  - type: text
    content: or
  - type: text
    content: ' a garrison so that none shall march back and forth, and no oppressor '
  - type: text
    content: or
  - type: text
    content: ' demanding collector shall again overrun them, for now My eyes are upon them.'
  '9':
  - type: text
    content: ' Rejoice greatly, O Daughter of Zion! Shout aloud, O Daughter of Jerusalem! Behold, your King comes to you; He is [uncompromisingly] just and having salvation [triumphant and victorious], patient, meek, lowly, and riding on a donkey, upon a colt, the foal of a donkey. [Matt. 21:5; John 12:14, 15.]'
