document_id: 1CH.26
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' FOR THE divisions of the gatekeepers: Of the Korahites was: Meshelemiah son of Kore, of the sons of Asaph.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' And Meshelemiah had sons: Zechariah the firstborn, Jediael the second, Zebadiah the third, Jathniel the fourth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Elam the fifth, Jehohanan the sixth, Eliehoenai the seventh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' Obed-edom had sons: Shemaiah the firstborn, Jehozabad the second, Joah the third, Sacar the fourth, Nethanel the fifth,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Ammiel the sixth, Issachar the seventh, Peullethai the eighth; for God blessed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' Also to Shemaiah his son were sons born, who were rulers in their fathers'' houses, for they were mighty men of ability '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' courage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The sons of Shemaiah: Othni, Rephael, Obed, and Elzabad, whose brethren were strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' able men, Elihu and Semachiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' All these were sons of Obed-edom [in whose house the ark was kept], with their sons and brethren, strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' able men for the service–sixty-two in all. [I Chron. 13:13, 14.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' Meshelemiah had sons and brethren, strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' able men–eighteen in all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Also Hosah, of the sons of Merari, had sons: Shimri the chief (he was not the firstborn, yet his father made him chief),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Hilkiah the second, Tebaliah the third, Zechariah the fourth; all the sons and brethren of Hosah were thirteen in all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' Of these were the divisions of the gatekeepers, even of the chief men, having duties, as did their brethren, to minister in the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And they cast lots by fathers'' houses, small and great alike, for every gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' The lot for the east fell to Shelemiah. They cast lots also for Zechariah his son, a wise counselor, and his lot came out for the north.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' To Obed-edom it came out for the south, and to his sons the storehouse was allotted.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' To Shuppim and Hosah the lot fell for the west, by the refuse gate that goes into the ascending highway, post opposite post.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' On the east were six Levites, on the north four a day, on the south four a day, and two by two at the storehouse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' At the colonnade on the west side [of the outer court of the temple], there were four at the road and two at the colonnade.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' These were the divisions of the gatekeepers among the Korahites and the sons of Merari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' Of the Levites, Ahijah was over the treasuries of the house of God and the treasuries of the dedicated gifts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' The sons of Ladan, the descendants of Gershon through Ladan, the heads of families of Ladan the Gershonite: Jehieli,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' The sons of Jehieli, Zetham and Joel his brother, who were over the treasuries of the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' Of the Amramites, Izharites, Hebronites, and Uzzielites:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' Shebuel son of Gershom, the son of Moses, was ruler over the treasuries.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' His brethren from Eliezer were his son Rehabiah, his son Jeshaiah, his son Joram, his son Zichri, and his son Shelomoth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' This Shelomoth and his brethren were over all the treasuries of the dedicated gifts, which King David, the heads of the fathers'' houses, the officers over thousands and hundreds, and the commanders of the army had dedicated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' From spoil won in battles they dedicated gifts to maintain the house of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Also all that Samuel the seer, Saul son of Kish, Abner son of Ner, and Joab son of Zeruiah had dedicated, and whatever anyone had dedicated, it was in the charge of Shelomoth and his brethren.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Of the Izharites: Chenaniah and his sons were appointed to outside duties for Israel, as officers and judges.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Of the Hebronites: Hashabiah and his brethren, men of courage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability, 1,700 in all, were officers over Israel on the west side of the Jordan in all the Lord''s business and the king''s service.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Of the Hebronites: Jerijah was the chief, according to their generations by fathers'' houses. In the fortieth year of David''s reign a search was made, and men of great courage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability were found among them at Jazer in Gilead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' Jerijah''s kinsmen, men of courage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability, were 2,700 heads of fathers'' houses; King David made them overseers of the Reubenites, the Gadites, and the half-tribe of Manasseh, for everything pertaining to God and for the affairs of the king.'
