document_id: 1CH.26,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' FOR THE divisions of the gatekeepers: Of the Korahites was: Meshelemiah son of Kore, of the sons of Asaph.'
  '10':
  - type: text
    content: ' Also Hosah, of the sons of Merari, had sons: Shimri the chief (he was not the firstborn, yet his father made him chief),'
  '11':
  - type: text
    content: ' Hilkiah the second, Tebaliah the third, Zechariah the fourth; all the sons and brethren of Hosah were thirteen in all.'
  '12':
  - type: text
    content: ' Of these were the divisions of the gatekeepers, even of the chief men, having duties, as did their brethren, to minister in the house of the Lord.'
  '13':
  - type: text
    content: ' And they cast lots by fathers'' houses, small and great alike, for every gate.'
  '14':
  - type: text
    content: ' The lot for the east fell to Shelemiah. They cast lots also for Zechariah his son, a wise counselor, and his lot came out for the north.'
  '15':
  - type: text
    content: ' To Obed-edom it came out for the south, and to his sons the storehouse was allotted.'
  '16':
  - type: text
    content: ' To Shuppim and Hosah the lot fell for the west, by the refuse gate that goes into the ascending highway, post opposite post.'
  '17':
  - type: text
    content: ' On the east were six Levites, on the north four a day, on the south four a day, and two by two at the storehouse.'
  '18':
  - type: text
    content: ' At the colonnade on the west side [of the outer court of the temple], there were four at the road and two at the colonnade.'
  '19':
  - type: text
    content: ' These were the divisions of the gatekeepers among the Korahites and the sons of Merari.'
  '2':
  - type: text
    content: ' And Meshelemiah had sons: Zechariah the firstborn, Jediael the second, Zebadiah the third, Jathniel the fourth,'
  '20':
  - type: text
    content: ' Of the Levites, Ahijah was over the treasuries of the house of God and the treasuries of the dedicated gifts.'
  '21':
  - type: text
    content: ' The sons of Ladan, the descendants of Gershon through Ladan, the heads of families of Ladan the Gershonite: Jehieli,'
  '22':
  - type: text
    content: ' The sons of Jehieli, Zetham and Joel his brother, who were over the treasuries of the house of the Lord.'
  '23':
  - type: text
    content: ' Of the Amramites, Izharites, Hebronites, and Uzzielites:'
  '24':
  - type: text
    content: ' Shebuel son of Gershom, the son of Moses, was ruler over the treasuries.'
  '25':
  - type: text
    content: ' His brethren from Eliezer were his son Rehabiah, his son Jeshaiah, his son Joram, his son Zichri, and his son Shelomoth.'
  '26':
  - type: text
    content: ' This Shelomoth and his brethren were over all the treasuries of the dedicated gifts, which King David, the heads of the fathers'' houses, the officers over thousands and hundreds, and the commanders of the army had dedicated.'
  '27':
  - type: text
    content: ' From spoil won in battles they dedicated gifts to maintain the house of the Lord.'
  '28':
  - type: text
    content: ' Also all that Samuel the seer, Saul son of Kish, Abner son of Ner, and Joab son of Zeruiah had dedicated, and whatever anyone had dedicated, it was in the charge of Shelomoth and his brethren.'
  '29':
  - type: text
    content: ' Of the Izharites: Chenaniah and his sons were appointed to outside duties for Israel, as officers and judges.'
  '3':
  - type: text
    content: ' Elam the fifth, Jehohanan the sixth, Eliehoenai the seventh.'
  '30':
  - type: text
    content: ' Of the Hebronites: Hashabiah and his brethren, men of courage '
  - type: text
    content: and
  - type: text
    content: ' ability, 1,700 in all, were officers over Israel on the west side of the Jordan in all the Lord''s business and the king''s service.'
  '31':
  - type: text
    content: ' Of the Hebronites: Jerijah was the chief, according to their generations by fathers'' houses. In the fortieth year of David''s reign a search was made, and men of great courage '
  - type: text
    content: and
  - type: text
    content: ' ability were found among them at Jazer in Gilead.'
  '32':
  - type: text
    content: ' Jerijah''s kinsmen, men of courage '
  - type: text
    content: and
  - type: text
    content: ' ability, were 2,700 heads of fathers'' houses; King David made them overseers of the Reubenites, the Gadites, and the half-tribe of Manasseh, for everything pertaining to God and for the affairs of the king.'
  '4':
  - type: text
    content: ' Obed-edom had sons: Shemaiah the firstborn, Jehozabad the second, Joah the third, Sacar the fourth, Nethanel the fifth,'
  '5':
  - type: text
    content: ' Ammiel the sixth, Issachar the seventh, Peullethai the eighth; for God blessed him.'
  '6':
  - type: text
    content: ' Also to Shemaiah his son were sons born, who were rulers in their fathers'' houses, for they were mighty men of ability '
  - type: text
    content: and
  - type: text
    content: ' courage.'
  '7':
  - type: text
    content: ' The sons of Shemaiah: Othni, Rephael, Obed, and Elzabad, whose brethren were strong '
  - type: text
    content: and
  - type: text
    content: ' able men, Elihu and Semachiah.'
  '8':
  - type: text
    content: ' All these were sons of Obed-edom [in whose house the ark was kept], with their sons and brethren, strong '
  - type: text
    content: and
  - type: text
    content: ' able men for the service–sixty-two in all. [I Chron. 13:13, 14.]'
  '9':
  - type: text
    content: ' Meshelemiah had sons and brethren, strong '
  - type: text
    content: and
  - type: text
    content: ' able men–eighteen in all.'
