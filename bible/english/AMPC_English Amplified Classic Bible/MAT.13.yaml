document_id: MAT.13,8
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' THAT SAME day Jesus went out of the house and was sitting beside the sea.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then the disciples came to Him and said, Why do You speak to them in parables?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He replied to them, To you it has been given to know the secrets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mysteries of the kingdom of heaven, but to them it has not been given.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For whoever has [spiritual knowledge], to him will more be given '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he will be furnished richly so that he will have abundance; but from him who has not, even what he has will be taken away.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This is the reason that I speak to them in parables: because having the power of seeing, they do not see; and having the power of hearing, they do not hear, nor do they grasp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' In them indeed is the process of fulfillment of the prophecy of Isaiah, which says: You shall indeed hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hear but never grasp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand; and you shall indeed look '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' look but never see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perceive.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' For this nation''s heart has grown gross (fat and dull), and their ears heavy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' difficult of hearing, and their eyes they have tightly closed, lest they see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perceive with their eyes, and hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehend the sense with their ears, and grasp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand with their heart, and turn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I should heal them. [Isa. 6:9, 10.]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But blessed (happy, fortunate, and to be envied) are your eyes because they do see, and your ears because they do hear.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Truly I tell you, many prophets and righteous men [men who were upright and in right standing with God] yearned to see what you see, and did not see it, and to hear what you hear, and did not hear it.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Listen then to the [meaning of the] parable of the sower:'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' While anyone is hearing the Word of the kingdom and does not grasp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehend it, the evil one comes and snatches away what was sown in his heart. This is what was sown along the roadside.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But such great crowds gathered about Him that He got into a boat and remained sitting there, while all the throng stood on the shore.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for what was sown on thin (rocky) soil, this is he who hears the Word and at once welcomes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accepts it with joy;'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Yet it has no real root in him, but is temporary (inconstant, lasts but a little while); and when affliction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' persecution comes on account of the Word, at once he is caused to stumble [he is repelled and begins to distrust and desert Him Whom he ought to trust and obey] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he falls away.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for what was sown among thorns, this is he who hears the Word, but the cares of the world and the pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glamour '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceitfulness of riches choke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffocate the Word, and it yields no fruit.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' As for what was sown on good soil, this is he who hears the Word and grasps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehends it; he indeed bears fruit and yields in one case a hundred times as much as was sown, in another sixty times as much, and in another thirty.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Another parable He set forth before them, saying, The kingdom of heaven is like a man who sowed good seed in his field.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But while he was sleeping, his enemy came and sowed also darnel (weeds resembling wheat) among the wheat, and went on his way.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So when the plants sprouted and formed grain, the darnel (weeds) appeared also.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the servants of the owner came to him and said, Sir, did you not sow good seed in your field? Then how does it have darnel shoots in it?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He replied to them, An enemy has done this. The servants said to him, Then do you want us to go and weed them out?'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But he said, No, lest in gathering the wild wheat (weeds resembling wheat), you root up the [true] wheat along with it.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He told them many things in parables (stories by way of illustration and comparison), saying, A sower went out to sow.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Let them grow together until the harvest; and at harvest time I will say to the reapers, Gather the darnel first and bind it in bundles to be burned, but gather the wheat into my granary.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Another story by way of comparison He set forth before them, saying, The kingdom of heaven is like a grain of mustard seed, which a man took and sowed in his field.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Of all the seeds it is the smallest, but when it has grown it is the largest of the garden herbs and becomes a tree, so that the birds of the air come and find shelter in its branches.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He told them another parable: The kingdom of heaven is like leaven (sour dough) which a woman took and covered over in three measures of meal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' flour till all of it was leavened. [Gen. 18:6.]'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' These things all taken together Jesus said to the crowds in parables; indeed, without a parable He said nothing to them.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' This was in fulfillment of what was spoken by the prophet: I will open My mouth in parables; I will utter things that have been hidden since the foundation of the world. [Ps. 78:2.]'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then He left the throngs and went into the house. And His disciples came to Him saying, Explain to us the parable of the darnel in the field.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He answered, He Who sows the good seed is the Son of Man.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The field is the world, and the good seed means the children of the kingdom; the darnel is the children of the evil one,'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And the enemy who sowed it is the devil. The harvest is the close '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consummation of the age, and the reapers are angels.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And as he sowed, some seeds fell by the roadside, and the birds came and ate them up.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Just as the darnel (weeds resembling wheat) is gathered and burned with fire, so it will be at the close of the age.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The Son of Man will send forth His angels, and they will gather out of His kingdom all causes of offense [persons by whom others are drawn into error or sin] and all who do iniquity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' act wickedly,'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And will cast them into the furnace of fire; there will be weeping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wailing and grinding of teeth.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Then will the righteous (those who are upright and in right standing with God) shine forth like the sun in the kingdom of their Father. Let him who has ears [to hear] be listening, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' let him consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand by hearing. [Dan. 12:3.]'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The kingdom of heaven is like something precious buried in a field, which a man found and hid again; then in his joy he goes and sells all he has and buys that field.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Again the kingdom of heaven is like a man who is a dealer in search of fine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' precious pearls,'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Who, on finding a single pearl of great price, went and sold all he had and bought it.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Again, the kingdom of heaven is like a dragnet which was cast into the sea and gathered in fish of every sort.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When it was full, men dragged it up on the beach, and sat down and sorted out the good fish into baskets, but the worthless ones they threw away.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So it will be at the close '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consummation of the age. The angels will go forth and separate the wicked from the righteous (those who are upright and in right standing with God)'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Other seeds fell on rocky ground, where they had not much soil; and at once they sprang up, because they had no depth of soil.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And cast them [the wicked] into the furnace of fire; there will be weeping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wailing and grinding of teeth.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Have you understood all these things [parables] taken together? They said to Him, Yes, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lord.
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He said to them, Therefore every teacher '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' interpreter of the Sacred Writings who has been instructed about '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trained for the kingdom of heaven and has become a disciple is like a householder who brings forth out of his storehouse treasure that is new and [treasure that is] old [the fresh as well as the familiar].'
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When Jesus had finished these parables (these comparisons), He left there.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And coming to His own country [Nazareth], He taught in their synagogue so that they were amazed with bewildered wonder, and said, Where did this Man get this wisdom and these miraculous powers?'
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Is not this the carpenter''s Son? Is not His mother called Mary? And are not His brothers James and Joseph and Simon and Judas?'
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And do not all His sisters live here among us? Where then did this Man get all this?'
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And they took offense at Him [they were repelled and hindered from acknowledging His authority, and caused to stumble]. But Jesus said to them, A prophet is not without honor except in his own country and in his own house.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' And He did not do many works of power there, because of their unbelief (their lack of faith in the divine mission of Jesus).'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But when the sun rose, they were scorched, and because they had no root, they dried up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' withered away.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Other seeds fell among thorns, and the thorns grew up and choked them out.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Other seeds fell on good soil, and yielded grain–some a hundred times as much as was sown, some sixty times as much, and some thirty.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He who has ears [to hear], let him be listening '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' let him consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perceive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comprehend by hearing.'
