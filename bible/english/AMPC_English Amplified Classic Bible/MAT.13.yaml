document_id: MAT.13,8
type_code: eng
verses:
  '1':
  - type: text
    content: ' THAT SAME day Jesus went out of the house and was sitting beside the sea.'
  '10':
  - type: text
    content: ' Then the disciples came to Him and said, Why do You speak to them in parables?'
  '11':
  - type: text
    content: ' And He replied to them, To you it has been given to know the secrets '
  - type: text
    content: and
  - type: text
    content: ' mysteries of the kingdom of heaven, but to them it has not been given.'
  '12':
  - type: text
    content: ' For whoever has [spiritual knowledge], to him will more be given '
  - type: text
    content: and
  - type: text
    content: ' he will be furnished richly so that he will have abundance; but from him who has not, even what he has will be taken away.'
  '13':
  - type: text
    content: ' This is the reason that I speak to them in parables: because having the power of seeing, they do not see; and having the power of hearing, they do not hear, nor do they grasp '
  - type: text
    content: and
  - type: text
    content: ' understand.'
  '14':
  - type: text
    content: ' In them indeed is the process of fulfillment of the prophecy of Isaiah, which says: You shall indeed hear '
  - type: text
    content: and
  - type: text
    content: ' hear but never grasp '
  - type: text
    content: and
  - type: text
    content: ' understand; and you shall indeed look '
  - type: text
    content: and
  - type: text
    content: ' look but never see '
  - type: text
    content: and
  - type: text
    content: ' perceive.'
  '15':
  - type: text
    content: ' For this nation''s heart has grown gross (fat and dull), and their ears heavy '
  - type: text
    content: and
  - type: text
    content: ' difficult of hearing, and their eyes they have tightly closed, lest they see '
  - type: text
    content: and
  - type: text
    content: ' perceive with their eyes, and hear '
  - type: text
    content: and
  - type: text
    content: ' comprehend the sense with their ears, and grasp '
  - type: text
    content: and
  - type: text
    content: ' understand with their heart, and turn '
  - type: text
    content: and
  - type: text
    content: ' I should heal them. [Isa. 6:9, 10.]'
  '16':
  - type: text
    content: ' But blessed (happy, fortunate, and to be envied) are your eyes because they do see, and your ears because they do hear.'
  '17':
  - type: text
    content: ' Truly I tell you, many prophets and righteous men [men who were upright and in right standing with God] yearned to see what you see, and did not see it, and to hear what you hear, and did not hear it.'
  '18':
  - type: text
    content: ' Listen then to the [meaning of the] parable of the sower:'
  '19':
  - type: text
    content: ' While anyone is hearing the Word of the kingdom and does not grasp '
  - type: text
    content: and
  - type: text
    content: ' comprehend it, the evil one comes and snatches away what was sown in his heart. This is what was sown along the roadside.'
  '2':
  - type: text
    content: ' But such great crowds gathered about Him that He got into a boat and remained sitting there, while all the throng stood on the shore.'
  '20':
  - type: text
    content: ' As for what was sown on thin (rocky) soil, this is he who hears the Word and at once welcomes '
  - type: text
    content: and
  - type: text
    content: ' accepts it with joy;'
  '21':
  - type: text
    content: ' Yet it has no real root in him, but is temporary (inconstant, lasts but a little while); and when affliction '
  - type: text
    content: or
  - type: text
    content: ' trouble '
  - type: text
    content: or
  - type: text
    content: ' persecution comes on account of the Word, at once he is caused to stumble [he is repelled and begins to distrust and desert Him Whom he ought to trust and obey] '
  - type: text
    content: and
  - type: text
    content: ' he falls away.'
  '22':
  - type: text
    content: ' As for what was sown among thorns, this is he who hears the Word, but the cares of the world and the pleasure '
  - type: text
    content: and
  - type: text
    content: ' delight '
  - type: text
    content: and
  - type: text
    content: ' glamour '
  - type: text
    content: and
  - type: text
    content: ' deceitfulness of riches choke '
  - type: text
    content: and
  - type: text
    content: ' suffocate the Word, and it yields no fruit.'
  '23':
  - type: text
    content: ' As for what was sown on good soil, this is he who hears the Word and grasps '
  - type: text
    content: and
  - type: text
    content: ' comprehends it; he indeed bears fruit and yields in one case a hundred times as much as was sown, in another sixty times as much, and in another thirty.'
  '24':
  - type: text
    content: ' Another parable He set forth before them, saying, The kingdom of heaven is like a man who sowed good seed in his field.'
  '25':
  - type: text
    content: ' But while he was sleeping, his enemy came and sowed also darnel (weeds resembling wheat) among the wheat, and went on his way.'
  '26':
  - type: text
    content: ' So when the plants sprouted and formed grain, the darnel (weeds) appeared also.'
  '27':
  - type: text
    content: ' And the servants of the owner came to him and said, Sir, did you not sow good seed in your field? Then how does it have darnel shoots in it?'
  '28':
  - type: text
    content: ' He replied to them, An enemy has done this. The servants said to him, Then do you want us to go and weed them out?'
  '29':
  - type: text
    content: ' But he said, No, lest in gathering the wild wheat (weeds resembling wheat), you root up the [true] wheat along with it.'
  '3':
  - type: text
    content: ' And He told them many things in parables (stories by way of illustration and comparison), saying, A sower went out to sow.'
  '30':
  - type: text
    content: ' Let them grow together until the harvest; and at harvest time I will say to the reapers, Gather the darnel first and bind it in bundles to be burned, but gather the wheat into my granary.'
  '31':
  - type: text
    content: ' Another story by way of comparison He set forth before them, saying, The kingdom of heaven is like a grain of mustard seed, which a man took and sowed in his field.'
  '32':
  - type: text
    content: ' Of all the seeds it is the smallest, but when it has grown it is the largest of the garden herbs and becomes a tree, so that the birds of the air come and find shelter in its branches.'
  '33':
  - type: text
    content: ' He told them another parable: The kingdom of heaven is like leaven (sour dough) which a woman took and covered over in three measures of meal '
  - type: text
    content: or
  - type: text
    content: ' flour till all of it was leavened. [Gen. 18:6.]'
  '34':
  - type: text
    content: ' These things all taken together Jesus said to the crowds in parables; indeed, without a parable He said nothing to them.'
  '35':
  - type: text
    content: ' This was in fulfillment of what was spoken by the prophet: I will open My mouth in parables; I will utter things that have been hidden since the foundation of the world. [Ps. 78:2.]'
  '36':
  - type: text
    content: ' Then He left the throngs and went into the house. And His disciples came to Him saying, Explain to us the parable of the darnel in the field.'
  '37':
  - type: text
    content: ' He answered, He Who sows the good seed is the Son of Man.'
  '38':
  - type: text
    content: ' The field is the world, and the good seed means the children of the kingdom; the darnel is the children of the evil one,'
  '39':
  - type: text
    content: ' And the enemy who sowed it is the devil. The harvest is the close '
  - type: text
    content: and
  - type: text
    content: ' consummation of the age, and the reapers are angels.'
  '4':
  - type: text
    content: ' And as he sowed, some seeds fell by the roadside, and the birds came and ate them up.'
  '40':
  - type: text
    content: ' Just as the darnel (weeds resembling wheat) is gathered and burned with fire, so it will be at the close of the age.'
  '41':
  - type: text
    content: ' The Son of Man will send forth His angels, and they will gather out of His kingdom all causes of offense [persons by whom others are drawn into error or sin] and all who do iniquity '
  - type: text
    content: and
  - type: text
    content: ' act wickedly,'
  '42':
  - type: text
    content: ' And will cast them into the furnace of fire; there will be weeping '
  - type: text
    content: and
  - type: text
    content: ' wailing and grinding of teeth.'
  '43':
  - type: text
    content: ' Then will the righteous (those who are upright and in right standing with God) shine forth like the sun in the kingdom of their Father. Let him who has ears [to hear] be listening, '
  - type: text
    content: and
  - type: text
    content: ' let him consider '
  - type: text
    content: and
  - type: text
    content: ' perceive '
  - type: text
    content: and
  - type: text
    content: ' understand by hearing. [Dan. 12:3.]'
  '44':
  - type: text
    content: ' The kingdom of heaven is like something precious buried in a field, which a man found and hid again; then in his joy he goes and sells all he has and buys that field.'
  '45':
  - type: text
    content: ' Again the kingdom of heaven is like a man who is a dealer in search of fine '
  - type: text
    content: and
  - type: text
    content: ' precious pearls,'
  '46':
  - type: text
    content: ' Who, on finding a single pearl of great price, went and sold all he had and bought it.'
  '47':
  - type: text
    content: ' Again, the kingdom of heaven is like a dragnet which was cast into the sea and gathered in fish of every sort.'
  '48':
  - type: text
    content: ' When it was full, men dragged it up on the beach, and sat down and sorted out the good fish into baskets, but the worthless ones they threw away.'
  '49':
  - type: text
    content: ' So it will be at the close '
  - type: text
    content: and
  - type: text
    content: ' consummation of the age. The angels will go forth and separate the wicked from the righteous (those who are upright and in right standing with God)'
  '5':
  - type: text
    content: ' Other seeds fell on rocky ground, where they had not much soil; and at once they sprang up, because they had no depth of soil.'
  '50':
  - type: text
    content: ' And cast them [the wicked] into the furnace of fire; there will be weeping '
  - type: text
    content: and
  - type: text
    content: ' wailing and grinding of teeth.'
  '51':
  - type: text
    content: ' Have you understood all these things [parables] taken together? They said to Him, Yes, '
  - type: text
    content: Lord.
  '52':
  - type: text
    content: ' He said to them, Therefore every teacher '
  - type: text
    content: and
  - type: text
    content: ' interpreter of the Sacred Writings who has been instructed about '
  - type: text
    content: and
  - type: text
    content: ' trained for the kingdom of heaven and has become a disciple is like a householder who brings forth out of his storehouse treasure that is new and [treasure that is] old [the fresh as well as the familiar].'
  '53':
  - type: text
    content: ' When Jesus had finished these parables (these comparisons), He left there.'
  '54':
  - type: text
    content: ' And coming to His own country [Nazareth], He taught in their synagogue so that they were amazed with bewildered wonder, and said, Where did this Man get this wisdom and these miraculous powers?'
  '55':
  - type: text
    content: ' Is not this the carpenter''s Son? Is not His mother called Mary? And are not His brothers James and Joseph and Simon and Judas?'
  '56':
  - type: text
    content: ' And do not all His sisters live here among us? Where then did this Man get all this?'
  '57':
  - type: text
    content: ' And they took offense at Him [they were repelled and hindered from acknowledging His authority, and caused to stumble]. But Jesus said to them, A prophet is not without honor except in his own country and in his own house.'
  '58':
  - type: text
    content: ' And He did not do many works of power there, because of their unbelief (their lack of faith in the divine mission of Jesus).'
  '6':
  - type: text
    content: ' But when the sun rose, they were scorched, and because they had no root, they dried up '
  - type: text
    content: and
  - type: text
    content: ' withered away.'
  '7':
  - type: text
    content: ' Other seeds fell among thorns, and the thorns grew up and choked them out.'
  '8':
  - type: text
    content: ' Other seeds fell on good soil, and yielded grain–some a hundred times as much as was sown, some sixty times as much, and some thirty.'
  '9':
  - type: text
    content: ' He who has ears [to hear], let him be listening '
  - type: text
    content: and
  - type: text
    content: ' let him consider '
  - type: text
    content: and
  - type: text
    content: ' perceive '
  - type: text
    content: and
  - type: text
    content: ' comprehend by hearing.'
