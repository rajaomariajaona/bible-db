document_id: 1SA.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' HANNAH PRAYED, and said, My heart exults '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' triumphs in the Lord; my horn (my strength) is lifted up in the Lord. My mouth is no longer silent, for it is opened wide over my enemies, because I rejoice in Your salvation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' There is none holy like the Lord, there is none besides You; there is no Rock like our God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Talk no more so very proudly; let not arrogance go forth from your mouth, for the Lord is a God of knowledge, and by Him actions are weighed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' The bows of the mighty are broken, and those who stumbled are girded with strength.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' Those who were full have hired themselves out for bread, but those who were hungry have ceased to hunger. The barren has borne seven, but she who has many children languishes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is forlorn.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' The Lord slays and makes alive; He brings down to Sheol and raises up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' The Lord makes poor and makes rich; He brings low and He lifts up.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' He raises up the poor out of the dust and lifts up the needy from the ash heap, to make them sit with nobles and inherit the throne of glory. For the pillars of the earth are the Lord''s, and He has set the world upon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' He will guard the feet of His godly ones, but the wicked shall be silenced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perish in darkness; for by strength shall no man prevail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' The adversaries of the Lord shall be broken to pieces; against them will He thunder in heaven. The Lord will judge [all peoples] to the ends of the earth; and He will give strength to His king (King) and exalt the power of His anointed (Anointed His Christ). [Luke 1:46.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Elkanah and his wife Hannah returned to Ramah to his house. But the child ministered to the Lord before Eli the priest.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' The sons of Eli were base '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthless; they did not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' regard the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' And the custom of the priests with the people was this: when any man offered sacrifice, the priest''s servant came while the flesh was boiling with a fleshhook of three prongs in his hand;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' And he thrust it into the pan or kettle or caldron or pot; all that the fleshhook brought up the priest took for himself. So they did in Shiloh with all the Israelites who came there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' Also, before they burned the fat, the priest''s servant came and said to the man who sacrificed, Give the priest meat to roast, for he will not accept boiled meat from you, but raw.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' And if the man said to him, Let them burn the fat first, and then you may take as much as you want, the priest''s servant would say, No! Give it to me now or I will take it by force.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' So the sin of the [two] young men was very great before the Lord, for they despised the offering of the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' But Samuel ministered before the Lord, a child girded with a linen ephod.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' Moreover, his mother made him a little robe and brought it to him from year to year when she came up with her husband to offer the yearly sacrifice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' And Eli would bless Elkanah and his wife and say, May the Lord give you children by this woman for the gift she asked for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gave to the Lord. Then they would go to their own home.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' And the Lord visited Hannah, so that she bore three sons and two daughters. And the child Samuel grew before the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' Now Eli was very old, and he heard all that his sons did to all Israel and how they lay with the women who served at the door of the Tent of Meeting.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' And he said to them, Why do you do such things? For I hear of your evil dealings from all the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' No, my sons; it is no good report which I hear the Lord''s people spreading abroad.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' If one man wrongs another, God will mediate for him; but if a man wrongs the Lord, who shall intercede for him? Yet they did not listen to their father, for it was the Lord''s will to slay them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' Now the boy Samuel grew and was in favor both with the Lord and with men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' A man of God came to Eli and said to him, Thus has the Lord said: I plainly revealed Myself to the house of your father [forefather Aaron] when they were in Egypt in bondage to Pharaoh''s house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' Moreover, I selected him out of all the tribes of Israel to be My priest, to offer on My altar, to burn incense, to wear an ephod before Me. And I gave [from then on] to the house of your father [forefather] all the offerings of the Israelites made by fire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' Why then do you kick [trample upon, treat with contempt] My sacrifice and My offering which I commanded, and honor your sons above Me by fattening yourselves upon the choicest part of every offering of My people Israel?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' Therefore the Lord, the God of Israel, says, I did promise that your house and that of your father [forefather Aaron] should go in and out before Me forever. But now the Lord says, Be it far from Me. For those who honor Me I will honor, and those who despise Me shall be lightly esteemed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' Behold, the time is coming when I will cut off your strength and the strength of your own father''s house, that there shall not be an old man in your house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' And you shall behold the distress of My house, even in all the prosperity which God will give Israel, and there shall not be an old man in your house forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' Yet I will not cut off from My altar every man of yours; some shall survive to weep and mourn [over the family''s ruin], but all the increase of your house shall die in their best years. [I Sam. 22:17-20.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' And what befalls your two sons, Hophni and Phinehas, shall be a sign to you–in one day they both shall die. [Fulfilled in I Sam. 4:17, 18.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' And I will raise up for Myself a faithful priest (Priest), who shall do according to what is in My heart and mind. And I will build him a sure house, and he shall walk before My anointed (Anointed) forever. [I Sam. 2:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' Everyone who is left in your house shall come crouching to him for a piece of silver and a bit of bread and say, Put me, I pray you, into a priest''s office so I may have a piece of bread.'
