document_id: HOS.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' THE WORD of the Lord that came to Hosea son of Beeri in the days of Uzziah, Jotham, Ahaz, and Hezekiah, kings of Judah, and in the days of Jeroboam son of Joash king of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' When the Lord first spoke with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' through Hosea, the Lord said to him, Go, take to yourself a wife of harlotry and have children of [her] harlotry, for the land commits great whoredom by departing from the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' So he went and took Gomer the daughter of Diblaim, and she became pregnant and bore him a son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' And the Lord said to him, Call his name Jezreel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' God-sows, for yet a little while and I will avenge the blood of Jezreel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' visit the punishment for it upon the house of Jehu, and I will put an end to the kingdom of the house of Israel. [II Kings 10:11.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' And on that day I will break the bow of Israel in the Valley of Jezreel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And [Gomer] conceived again and bore a daughter. And the Lord said to Hosea, Call her name Lo-Ruhamah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Not-pitied, for I will no more have love, pity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy on the house of Israel, that I should in any way pardon them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' But I will have love, pity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy on the house of Judah and will deliver them by the Lord their God and will not save them by bow, nor by sword, nor by equipment of war, nor by horses, nor by horsemen. [Isa. 31:8; 37:33-35.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' Now when [Gomer] had weaned Lo-Ruhamah [Not-pitied], she became pregnant [again] and bore a son.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' And the Lord said, Call his name Lo-Ammi [Not-my-people], for you are not My people and I am not your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' Yet the number of the children of Israel shall be as the sand of the sea, which cannot be measured or numbered; and instead of it being said to them, You are not My people, it shall be said to them, Sons of the Living God! [Rom. 9:26.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' Then shall the children of Judah and the children of Israel be gathered together and appoint themselves one head, and they shall go up out of the land, for great shall be the day of Jezreel [for the spiritually reborn Israel, a divine offspring, the people whom the Lord has blessed.] [Isa. 11:12, 13; Ezek. 37:15-28.]'
