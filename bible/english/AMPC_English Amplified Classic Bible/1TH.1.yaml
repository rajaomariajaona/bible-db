document_id: 1TH.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' PAUL, SILVANUS (Silas), and Timothy, to the assembly (church) of the Thessalonians in God the Father and the Lord Jesus Christ (the Messiah): Grace (spiritual blessing and divine favor) to you and [heart] peace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' We are ever giving thanks to God for all of you, continually mentioning [you when engaged] in our prayers,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' Recalling unceasingly before our God and Father your work energized by faith and service motivated by love and unwavering hope in [the return of] our Lord Jesus Christ (the Messiah). [I Thess. 1:10.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' [O] brethren beloved by God, we recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' know that He has selected (chosen) you;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' For our [preaching of the] glad tidings (the Gospel) came to you not only in word, but also in [its own inherent] power and in the Holy Spirit and with great conviction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' absolute certainty [on our part]. You know what kind of men we proved [ourselves] to be among you for your good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' And you [set yourselves to] become imitators of us and [through us] of the Lord Himself, for you welcomed our message in [spite of] much persecution, with joy [inspired] by the Holy Spirit;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' So that you [thus] became a pattern to all the believers (those who adhere to, trust in, and rely on Christ Jesus) in Macedonia and Achaia (most of Greece).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' For not only has the Word concerning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from the Lord resounded forth from you unmistakably in Macedonia and Achaia, but everywhere the report has gone forth of your faith in God [of your leaning of your whole personality on Him in complete trust and confidence in His power, wisdom, and goodness]. So we [find that we] never need to tell people anything [further about it].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' For they themselves volunteer testimony concerning us, telling what an entrance we had among you, and how you turned to God from [your] idols to serve a God Who is alive and true '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' genuine,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' And [how you] look forward to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' await the coming of His Son from heaven, Whom He raised from the dead–Jesus, Who personally rescues '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delivers us out of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from the wrath [bringing punishment] which is coming [upon the impenitent] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' draws us to Himself [investing us with all the privileges and rewards of the new life in Christ, the Messiah].'
